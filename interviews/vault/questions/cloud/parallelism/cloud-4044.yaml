title: Recursive Halving-Doubling AllReduce
scenario: 'You are evaluating the recursive halving-doubling AllReduce algorithm, which is optimized for small messages, on an 8-GPU system with a 64KB gradient.'
question: 'How does recursive halving-doubling latency compare to ring AllReduce, and why is it preferred for small messages?'
details:
  realistic_solution: |
    Recursive halving-doubling for 8 GPUs, 64KB gradient: Phase 1 — Reduce-Scatter via recursive halving (log2(8) = 3 steps): Step 1: Each GPU exchanges half its data (32KB) with partner at distance 1. Each GPU reduces its half. Step 2: Exchange 16KB with partner at distance 2. Each GPU reduces its quarter. Step 3: Exchange 8KB with partner at distance 4. Each GPU now has 1/8 of the fully reduced result. Phase 2 — All-Gather via recursive doubling (3 steps, reverse order): reconstruct the full result. Total: 2*log2(N) steps = 6 steps. Latency: 2log2(N) * α + 2(N-1)/N * D/B = 6α + 1.75 * D/B. Ring: 2(N-1)α + 2(N-1)/N * D/B = 14α + 1.75 * D/B. Same bandwidth term but 6α vs 14α — halving-doubling has 2.3x lower latency for small messages where α dominates.
  common_mistake: |
    **The Pitfall:** Confusing recursive halving-doubling with a binary tree reduction.
    **The Rationale:** In a binary tree, data flows up to a root and down. In recursive halving, GPUs exchange with partners at increasing distances.
    **The Consequence:** Misunderstanding the exact latency steps and network traffic flow for collective operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Halving-Doubling Latency: 2 * log2(N) * α + 2 * (N-1)/N * D/B.
    - Ring Latency: 2 * (N-1) * α + 2 * (N-1)/N * D/B.

    **Calculations:**
    - For 8 GPUs, Halving-Doubling: 6α + 1.75 * D/B.
    - For 8 GPUs, Ring: 14α + 1.75 * D/B.

    **Conclusion & Interpretation:**
    - **Result: 2.3x faster (Latency-Bound)**. For small 64KB messages, latency (α) dominates bandwidth, making 6α significantly faster than 14α.
