title: Optimizing Stripe Size for 4 TB/s AI Storage
scenario: You are architecting parallel storage for 1,024 GPUs reading 2 GB TFRecord files, requiring
  4 TB/s aggregate throughput over 50 GB/s links.
question: What stripe size and number of storage targets would you choose for 2 GB TFRecord files to hit
  4 TB/s without excess metadata overhead?
details:
  realistic_solution: To hit 4 TB/s aggregate throughput, you must scale out to at least 82 storage targets
    (4096 GB/s ÷ 50 GB/s per link). A safe configuration is 128 object storage targets. Select a large
    stripe size (e.g., 32 MB) to ensure each read request is large enough to saturate network links without
    overwhelming the metadata server with millions of tiny RPC calls.
  common_mistake: '**The Pitfall:** Setting the stripe size too small (e.g., 64 KB).

    **The Rationale:** Assuming maximum chunk parallelism is universally better for throughput.

    **The Consequence:** Severe metadata server bottlenecking due to an explosion of RPC requests.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Target throughput: 4 TB/s (4096 GB/s).

    - Link speed: 50 GB/s per target.

    - File size: 2 GB.

    - Stripe size: 32 MB.


    **Calculations:**

    - Minimum targets required: 4096 GB/s / 50 GB/s = 81.9 targets.

    - Provisioning 128 targets gives headroom (max theoretical 6400 GB/s).

    - A 2 GB file with 32 MB stripes produces 64 chunks per file.


    **Conclusion & Interpretation:**

    - **Result: 128 targets with 32 MB stripes (I/O-Bound)**. This scales horizontally to meet the 4 TB/s
    requirement while keeping metadata operations bounded.'
