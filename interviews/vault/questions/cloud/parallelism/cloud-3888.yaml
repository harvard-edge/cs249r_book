title: Calculate Tensor Parallel Communication Overhead
scenario: You are deploying a large language model using Megatron-style Tensor Parallelism across 2 GPUs connected via an interconnect with 900 GB/s bandwidth. The model has a hidden dimension of 8192, and you process a batch of 16 sequences, each with a length of 4096 tokens. The model uses FP16 precision. An All-Reduce operation is required at the end of the MLP block's forward pass.
question: What is the theoretical communication time in milliseconds for the MLP forward All-Reduce across the 2 GPUs?
details:
  realistic_solution: 'First, calculate the total activation tensor size before the All-Reduce: Batch * Sequence * Hidden * 2 bytes (FP16). Then, apply the Ring All-Reduce data transfer formula for N GPUs, which is 2 * ((N-1)/N) * Data Size. For N=2, the total data transferred per GPU is exactly equal to the activation tensor size. Finally, divide this transfer size by the NVLink bandwidth (900 GB/s) to find the communication time.'
  common_mistake: |
    **The Pitfall:** Using the wrong formula for Ring All-Reduce data transfer size or forgetting data types.
    **The Rationale:** Candidates often incorrectly divide the activation size by 2 for a 2-GPU setup before calculating payload, or forget to multiply by 2 for the FP16 byte footprint.
    **The Consequence:** The calculated communication overhead is off by a factor of 2x to 4x, leading to inaccurate latency budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch: 16, Seq: 4096, Hidden: 8192, FP16 (2 bytes/param).
    - Interconnect: 900 GB/s across 2 GPUs.

    **Calculations:**
    - Tensor Size: 16 * 4096 * 8192 * 2 bytes = 1,073,741,824 bytes (~1.074 GB).
    - Ring All-Reduce Volume (N=2): 2 * ((2-1)/2) * 1.074 GB = 1.074 GB transferred.
    - Communication Time: 1.074 GB / 900 GB/s = 0.001193 s.

    **Conclusion & Interpretation:**
    - **Result: 1.19 ms (Communication-Bound)**. Overhead is 1.19 ms per MLP forward pass.
