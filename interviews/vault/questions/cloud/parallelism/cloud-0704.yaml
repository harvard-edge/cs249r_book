title: The Distributed Training Choke Point
scenario: You are an ML Systems Engineer scaling a 70B parameter model training job from a single 8x GPU server to two servers (16 GPUs total). In the single-node setup, GPUs are connected via NVLink and achieve 95% utilization. When you scale to two nodes, connected via a 400 Gbps InfiniBand switch, you observe that per-GPU throughput drops by nearly 50%, and profiler tools show a massive spike in time spent on `AllReduce` communication operations.
question: What primary bottleneck causes the 50% per-GPU throughput drop when scaling the 70B job from one 8x GPU node to two nodes?
details:
  realistic_solution: The bottleneck is the cross-node gradient AllReduce. Inside one 8-GPU server, most collective traffic stays on the high-bandwidth NVLink fabric. After scaling to two servers, each step must synchronize gradients across the 400 Gbps InfiniBand link between nodes. InfiniBand is fast for networking, but it has far less bandwidth and higher latency than on-node GPU interconnects, so the off-node phase of the collective becomes the limiting path and reduces per-GPU throughput.
  common_mistake: |
    **The Pitfall:** Blaming network drivers, NCCL config, or model architecture.
    **The Rationale:** Engineers underestimate the staggering physical performance gap between tightly coupled on-node NVLink and off-node networking fabrics.
    **The Consequence:** Wasting days debugging software stacks when the bottleneck is simply the fundamental speed-of-light limits of crossing the server boundary via InfiniBand.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B FP16 Gradients: 140 GB.
       - Two nodes with 8 GPUs each.
       - Cross-node InfiniBand bandwidth: 400 Gbps = 50 GB/s.
       - The cross-node phase must exchange roughly one node's gradient shard with the other node each step.
    2. **Calculations:**
       - Approximate cross-node payload per step: 140 GB.
       - Lower-bound cross-node transfer time: 140 GB / 50 GB/s = 2.8 seconds, before protocol overhead, contention, and imperfect overlap.
       - On-node NVLink collectives can move comparable payloads much faster, so the new off-node exchange dominates the added communication time.
    3. **Conclusion & Interpretation:**
       - **Result: Cross-Node AllReduce Bottleneck.** The throughput drop comes from synchronizing gradients over InfiniBand between servers, not from model growth or TCP overhead.
  options:
    - The 140 GB gradient transfer over PCIe Gen5 adds 4.4 seconds of latency per step, saturating the bus.
    - Cross-node gradient AllReduce must exchange large gradient payloads over the 50 GB/s InfiniBand link, making the off-node collective the bottleneck.
    - The TCP/IP encapsulation overhead adds 2.5s of protocol serialization delay, halving throughput.
    - Model parameters expand to 280 GB in distributed FP32, exceeding single-node NVLink limits.
  correct_index: 1
