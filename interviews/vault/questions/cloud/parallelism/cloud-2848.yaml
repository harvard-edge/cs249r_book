title: Pipeline Bubble Fraction with M=4 Micro-batches
scenario: 'A 4-stage GPipe-style pipeline trains a large model with M = 4 micro-batches. Each stage runs forward then backward in unit time. The Gantt shows two bubble regions on each GPU: a warm-up region at the start (idle while the upstream stages prime the pipeline) and a cool-down region at the end (idle while downstream stages drain). The bubble fraction is annotated.'
question: Using the diagram, compute the bubble fraction for this pipeline configuration, and explain how doubling the micro-batch count to M = 8 changes it without changing the number of stages.
visual:
  kind: svg
  path: cloud-2848.svg
  alt: Pipeline Gantt chart showing 4 GPUs across the y-axis and time along the x-axis. Each GPU has 4 forward (blue) and 4 backward (green) cells. A warm-up bubble (red shading) sits at the start of GPU 1, GPU 2, GPU 3 and grows in length down the pipeline; a cool-down bubble mirrors it at the end. Annotation reads bubble fraction equals (P minus 1) over (P minus 1 plus M) for P equals 4 and M equals 4.
  caption: GPipe-style pipeline schedule, P = 4 stages × M = 4 micro-batches.
details:
  realistic_solution: |
    GPipe bubble fraction = (P − 1) / (P − 1 + M). For P = 4, M = 4: (3) / (3 + 4) = 3/7 ≈ 0.43 (43% of each GPU's wall-clock is bubble). Doubling micro-batches to M = 8 without changing P gives (3) / (3 + 8) = 3/11 ≈ 0.27 — bubble drops from 43% to 27% with no extra hardware. The intuition: warm-up and cool-down each consume P − 1 stage-time slots, independent of M; steady-state takes M stage-time slots. Adding more micro-batches grows the steady-state denominator while leaving the bubble numerator fixed. Practical limits: M is bounded by per-stage activation memory (each in-flight micro-batch holds its activations until backward), so M cannot grow without also growing memory.
  common_mistake: |
    **The Pitfall:** Assuming 1F1B scheduling eliminates the pipeline bubble.
    **The Rationale:** Engineers confuse peak activation memory reduction (which 1F1B achieves) with pipeline utilization improvements.
    **The Consequence:** Overestimating pipeline efficiency and misconfiguring micro-batch counts, resulting in lower-than-expected training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bubble fraction formula = (P − 1) / (P − 1 + M).
       - Stages P = 4.
    2. **Calculations:**
       - For M = 4: Bubble = (4 - 1) / (4 - 1 + 4) = 3 / 7 ≈ 43%.
       - For M = 8: Bubble = (4 - 1) / (4 - 1 + 8) = 3 / 11 ≈ 27%.
       - For M = 32: Bubble = 3 / 35 ≈ 8.6%.
    3. **Conclusion & Interpretation:**
       - **Result: Utilization-Bound**. Doubling micro-batches drops the idle pipeline bubble from 43% to 27%, directly increasing compute utilization without adding hardware.
