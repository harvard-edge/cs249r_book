title: Async Checkpointing Overlap with Training Computation
scenario: Checkpointing a 70B model every 100 steps takes 45 seconds (copying 280GB of model and optimizer states from GPU to CPU to disk).
question: How would you make 70B model checkpoints asynchronous so the 45-second save every 100 steps does not pause training?
details:
  realistic_solution: 'Async checkpointing pipeline: (1) At checkpoint step, launch non-blocking GPU-to-pinned-memory copies on a separate CUDA stream and record an event; the 280GB D2H staging cost is about 4.4s at 64 GB/s. (2) Once the event completes, a background CPU worker serializes the pinned snapshot and writes it to NVMe; the disk write is off the training critical path as long as it finishes before the next checkpoint buffer is needed. (3) Use double-buffered pinned memory so the next checkpoint can start without waiting for the previous CPU/NVMe write. (4) Keep training kernels independent of the copy stream except for the short snapshot consistency point. PyTorch torch.distributed.checkpoint async_save() is a standard implementation pattern.'
  common_mistake: |
    **The Pitfall:** Using `torch.save()` synchronously.
    **The Rationale:** Assuming the GPU is not involved in disk I/O, developers use `torch.save()`, failing to realize it holds the Python GIL and blocks the training loop.
    **The Consequence:** The training loop is completely blocked while the CPU serializes and writes to disk, causing significant overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sync checkpoint = 45s pause every 100 steps.
    - Compute cycle = 180s.
    - D2H stall = 4s.

    **Calculations:**
    - Synchronous cycle time: 180s training + 45s checkpoint pause = 225s.
    - D2H staging time from the stated bandwidth: 280GB / 64GB/s = 4.4s.
    - Async cycle time if only D2H staging is exposed: 180s training + 4.4s = 184.4s.
    - Same training work per wall-clock second improves by 225s / 184.4s = 1.22x, or about 22% relative to the synchronous cycle.
    - Disk write example: 280GB / 5GB/s = 56s, which can run in the background because it is less than the 180s until the next checkpoint decision point.
    - Equivalent checkpoint overheads relative to training compute: sync = 45/180 = 25%; async exposed staging = 4.4/180 = 2.4%.

    **Conclusion & Interpretation:**
    - **Result: 1.22x Checkpoint-Cycle Rate Versus Synchronous Saves**. Async checkpointing hides CPU serialization and disk write from the critical path when D2H staging is non-blocking and pinned-memory buffers are double-buffered.
