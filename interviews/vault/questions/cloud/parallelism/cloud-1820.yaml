title: A100 Multi-Node Scaling Efficiency
scenario: An elastic training job using static batching reports 15,000 samples/sec on 1 node (8 GPUs). The scheduler allocates a second node, bringing the total to 16 GPUs, but throughput only reaches 21,000 samples/sec due to 100Gbps inter-node network bottlenecks. Each GPU costs $2/hr.
question: What is the two-node scaling efficiency, and how does it change the cost per 1M samples trained versus one 8-GPU node?
details:
  realistic_solution: 'Calculate actual vs ideal throughput to find 70% scaling efficiency. Translate throughput to cost-per-sample: the second node adds only 6k samples/sec (40% of baseline capability) but doubles the hourly burn rate. The scheduler should downscale the job back to 8 GPUs to optimize cluster-wide efficiency.'
  common_mistake: |
    **The Pitfall:** Failing to evaluate the marginal contribution of the second node.
    **The Rationale:** Candidates often focus solely on the absolute increase in throughput without calculating the per-sample cost inflation caused by allocating GPUs in the diminishing returns regime.
    **The Consequence:** Scaling out jobs inefficiently, leading to significantly higher cloud bills for minimal throughput gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1 node (8 GPUs) throughput: 15,000 samples/s at $16/hr.
       - 2 nodes (16 GPUs) throughput: 21,000 samples/s at $32/hr.
    2. **Calculations:**
       - Ideal 2 nodes throughput: 30,000 samples/s.
       - Scaling efficiency: 21,000 / 30,000 = 70%.
       - Time per 1M samples (8 GPUs): 1,000,000 / 15,000 = 66.67 seconds.
       - Cost per 1M samples (8 GPUs): (66.67 / 3600) × $16 = $0.296.
       - Time per 1M samples (16 GPUs): 1,000,000 / 21,000 = 47.62 seconds.
       - Cost per 1M samples (16 GPUs): (47.62 / 3600) × $32 = $0.423.
    3. **Conclusion & Interpretation:**
       - **The second node increases the cost per 1M samples by 43% ($0.423 vs $0.296).**
       - **Result: Network-Bound**
