title: Designing 3D Parallelism for Frontier Models on NVIDIA H100
scenario: You are tasked with training a colossal frontier language model with trillions of parameters on a cluster of NVIDIA H100 GPUs. Each H100 boasts 80 GB HBM3 memory, 989 TFLOPS FP16 dense performance, 3.35 TB/s memory bandwidth, and consumes 700W. To scale training effectively across thousands of these accelerators, you decide to implement a 3D parallelism strategy, combining data, tensor, and pipeline parallelism.
question: How would you integrate data, tensor, and pipeline parallelism on H100s to train trillion-parameter models efficiently?
details:
  realistic_solution: 'A robust solution would involve careful architectural partitioning: applying tensor parallelism within a single H100 node (leveraging high-bandwidth NVLink) to shard large layers across multiple H100s, then implementing pipeline parallelism across nodes to break the model into sequential stages. Finally, data parallelism would be applied across groups of pipeline-tensor parallel configurations. This requires sophisticated orchestration, dynamic batch sizing (micro-batching for pipeline parallelism), and potentially custom communication collectives to overlap computation and communication efficiently, fully exploiting the H100''s performance characteristics while mitigating communication bottlenecks between nodes.'
  common_mistake: 'A common mistake is to overlook the complex interplay of communication overheads when combining data, tensor, and pipeline parallelism. For instance, inefficient scheduling of communication primitives (e.g., all-reduce for data parallelism, all-gather/reduce-scatter for tensor parallelism) can lead to bubbles in the pipeline or saturate interconnects, drastically reducing the effective FLOPs. Another mistake is miscalculating memory requirements, assuming 80GB HBM3 per H100 is sufficient for local sharding without accounting for optimizer states, activations, and communication buffers.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 1-trillion parameter FP16 model (2 bytes/parameter).
    - H100: 80 GB HBM3, 3.35 TB/s memory bandwidth, 989 TFLOPS.
    - Adam optimizer states: 12 bytes per parameter.

    **Calculations:**
    - Model weights memory = 10^12 * 2 bytes = 2 TB.
    - Optimizer states memory = 10^12 * 12 bytes = 12 TB.
    - Total minimal memory > 20-30 TB including activations.
    - H100s needed for weights = 2 TB / 80 GB = 25 H100s.
    - H100s needed for full state = 20 TB / 80 GB = 250 H100s.

    **Conclusion & Interpretation:**
    - **Result: >250 H100s required for memory alone (Memory-Capacity-Bound)**. Scaling is bottlenecked by Inter-node Infiniband bandwidth compared to high-speed NVLink.
