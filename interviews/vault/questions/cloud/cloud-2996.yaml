title: 'Kernel Fusion: Realize Kernel Fusion Gains for 70B LLM Inference'
scenario: Realize the complete kernel fusion impact for 70B LLM inference on 8 H100s
  (80GB HBM3, 3.35 TB/s) in decode mode serving 32 concurrent users. The model has
  80 layers, hidden size 8192, 64 heads, GQA with 8 KV heads. Quantify fusion gains
  for each kernel category.
question: For seq=8192, hidden size 8192, 64 heads, and head_dim 128, what is the
  correct per-layer attention FLOP count and why is 8.59 TFLOPs too high?
details:
  realistic_solution: 'Attention FLOPs for a single layer at seq=8192 in DECODE mode (batch=32):
    QK^T scores = 2 × batch × seq × hidden = 2 × 32 × 8192 × 8192 = 4.29 GFLOPs. Attention over values
    (SV) adds another 4.29 GFLOPs. Full attention is heavily memory-bound, not compute-bound.
    8.59 TFLOPs per layer assumes prefill seq² math, which is incorrect for decode.'
  common_mistake: Not distinguishing that with 32 concurrent users, the workload is
    batch=32 decode — significantly different from batch=1 prefill in terms of arithmetic intensity
    and FLOP count.
  napkin_math: 'Single layer QK^T FLOPs (decode, batch=32, seq=8192, hidden=8192):
    2 × batch × seq × hidden = 2 × 32 × 8192 × 8192 = 4.29 GFLOPs. Total attention FLOPs (QK^T + SV)
    = 8.59 GFLOPs. The error 8.59 TFLOPs is exactly 1000× too high, confusing GFLOPs with TFLOPs.'
