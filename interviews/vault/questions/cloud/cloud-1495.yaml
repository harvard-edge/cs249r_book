title: Exploiting Debug Headers in Shared LLM Caches
scenario: 'A multi-tenant LLM API hosted on 8x H100 GPUs inadvertently leaves `X-Request-Duration-Us` and `X-Cache-Status` HTTP headers enabled. The system uses cross-tenant prefix caching. An attacker probes the API with exact text from a leaked 2000-token financial document to verify if a competitor recently analyzed it. Uncached prefill latency is 4ms/token, while a prefix cache hit is 0.1ms/token.'
question: 'What information leak do the debug headers and cross-tenant prefix cache create, and how should you mitigate it?'
details:
  realistic_solution: 'Strip all debug headers at the API Gateway layer. Architecturally, partition the KV prefix cache namespace by tenant ID to prevent cross-tenant hit/miss side channels, even if timings are observed over the network.'
  common_mistake: |
    **The Pitfall:** Focusing solely on sanitizing the model's text output for prompt injection.
    **The Rationale:** Engineers overlook that metadata headers can leak critical infrastructure state and expose timing attacks.
    **The Consequence:** An attacker can perform a cross-tenant timing attack to infer whether sensitive documents exist in another tenant's context.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tokens: 2000.
    - Uncached prefill: 4ms/token.
    - Cache hit prefill: 0.1ms/token.

    **Calculations:**
    - Cache Miss TTFT: 2000 * 4 ms/token = 8000 ms (8.0s).
    - Cache Hit TTFT: 2000 * 0.1 ms/token = 200 ms (0.2s).
    - Timing Delta: 8.0s - 0.2s = 7.8s.

    **Conclusion & Interpretation:**
    - **Result: 7.8s delta (Security-Bound)**. The massive timing delta deterministically proves document presence, requiring tenant-partitioned caches and header sanitization.
