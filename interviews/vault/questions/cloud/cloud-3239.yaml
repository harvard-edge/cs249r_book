title: KV-Cache and Multi-Modal Input Processing
scenario: A multi-modal LLM processes a 1080p image that produces 1600 visual tokens plus 512 text tokens. The visual tokens' KV-cache is 10× denser. For a batch of 8 requests with mixed text-only and image+text queries, design the KV-cache memory management strategy.
question: How would you manage KV-cache memory for 8 mixed text-only and image+text requests with 1600 visual tokens and 512 text tokens?
details:
  realistic_solution: 'KV-cache design for multi-modal: (1) Heterogeneous token types: Text tokens: 320 KB/token (standard 8 KV heads, 128 dim, 80 layers). Visual tokens: if projected to the same dimension as text (common in LLaVA-style architectures), they also use 320 KB/token despite being ''denser'' in information. For 1600 visual tokens: 512 MB per request. (2) Observation: visual token KV-cache is immutable after prefill — the image does not change during decoding. This enables: (a) Aggressive quantization: visual KV can be quantized to INT4 (128 MB per request, 4× savings) because visual attention patterns are more robust to quantization than text. (b) Sharing: if multiple requests reference the same image, share visual KV blocks (copy-on-write). (3) Batch memory: 8 requests, say 4 image+text and 4 text-only. Image requests: 4 × (512 MB visual + 164 MB text) = 2.7 GB. Text-only: 4 × 164 MB = 656 MB. Total: 3.36 GB. With INT4 visual KV: 4 × (128 MB + 164 MB) + 656 MB = 1.82 GB (46% savings). (4) Eviction priority: evict visual KV before text KV during memory pressure — visual KV can be recomputed from the cached image embedding faster than re-encoding the image.'
  common_mistake: |
    **The Pitfall:** Treating visual and text tokens identically in the KV-cache.
    **The Rationale:** Candidates ignore that visual token KV-caches are computed during prefill and never change (images are static), allowing for aggressive, asymmetric optimizations.
    **The Consequence:** Wasting massive amounts of VRAM, severely limiting the maximum concurrent batch size for multi-modal inference workloads.
  napkin_math: |
    *   **Visual Tokens (FP16):** 1600 * 320 KB = 512 MB.
    *   **Visual Tokens (INT4):** 128 MB (4x compression).
    *   **Text Tokens (FP16):** 512 * 320 KB = 164 MB.
    *   **Mixed Batch (4 Img+Txt, 4 Text):** FP16 Total = 3.36 GB.
    *   **Mixed Batch (INT4 Visual):** 1.82 GB.
    *   **Final Result:** **Aggressively quantizing visual KV to INT4 yields 46% memory savings because visual tokens are static and robust to quantization.**
