title: Architectural Abstention in Cloud LLMs
scenario: You are architecting a financial advisory LLM serving 10,000 req/sec handling sensitive data. You must choose between a single monolithic 70B model or an 8B model paired with a 400M abstention classifier and RAG.
question: How do these choices impact susceptibility to data extraction while maintaining TTFT under 300ms?
details:
  realistic_solution: Implement a low-capacity (8B) generation model to structurally limit memorization, fronted by a fast, dedicated abstention classifier that rejects adversarial or out-of-domain prompts before expensive and risky generation begins.
  common_mistake: |
    **The Pitfall:** Relying solely on prompt engineering or post-generation filtering for security.
    **The Rationale:** Ignoring that large model capacity inherently increases the physical risk of exact training data memorization.
    **The Consequence:** Deploying massive models that are highly susceptible to adversarial data extraction attacks.
  napkin_math: |
    - Memorization capacity scales roughly linearly with parameters.
    - An 8B model reduces memorization risk by ~8.7× compared to a 70B model.
    - Latency: Abstention classifier (400M) TTFT is ~15ms.
    - Generation (8B) TTFT is ~45ms.
    - **Total latency = 60ms, remaining comfortably under the 300ms SLA while structurally preventing extraction.**
