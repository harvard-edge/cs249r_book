title: Architectural Abstention in Cloud LLMs
scenario: You are architecting a cloud-hosted financial advisory LLM serving 10,000 req/sec on a cluster
  of H100 GPUs. The model handles sensitive customer financial histories. You must evaluate the security
  trade-offs of deploying a single monolithic 70B parameter model versus a smaller 8B model paired with
  a dedicated 400M parameter abstention classifier and RAG pipeline. How do these architectural choices
  impact the model's susceptibility to data extraction and prompt injection attacks while maintaining
  an end-to-end Time-To-First-Token (TTFT) under 300ms?
question: "How do these architectural choices impact the model's susceptibility to data extraction and prompt injection attacks while maintaining an end-to-end Time-To-First-Token (TTFT) under 300ms?"
details:
  realistic_solution: Implement a low-capacity (8B) generation model to structurally limit memorization,
    fronted by a fast, dedicated abstention classifier that rejects adversarial or out-of-domain prompts
    before expensive and risky generation begins.
  common_mistake: Relying solely on prompt engineering or post-generation filtering for security, ignoring
    that large model capacity inherently increases the risk of exact training data memorization and extraction.
  napkin_math: 'Memorization capacity scales roughly linearly with parameters; an 8B model reduces memorization
    risk by ~8.7x vs a 70B model. Latency: Abstention (400M) TTFT ~15ms + Generation (8B) TTFT ~45ms =
    60ms total, comfortably under the 300ms SLA, while saving compute and preventing extraction.'
