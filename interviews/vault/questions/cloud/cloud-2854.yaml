title: HBM Cache Hit Rate
scenario: A massive recommendation model has an embedding table that exceeds a single GPU's HBM capacity. You decide to cache the hottest embeddings in HBM and fetch the rest from CPU DRAM over a PCIe bus.
question: What is the minimum cache hit rate required in HBM to achieve an effective average embedding lookup bandwidth of at least 1.6 TB/s?
visual:
  kind: svg
  path: cloud-2854.svg
  alt: A bar chart comparing CPU DRAM bandwidth at 64 GB/s, effective target at 1600 GB/s, and HBM3 at 3200 GB/s on a logarithmic scale.
  caption: Memory hierarchy bandwidth tiering comparison.
details:
  realistic_solution: |
    Effective bandwidth is determined by the average latency (time per byte transferred). The required hit rate must balance the fast HBM accesses with the high-latency PCIe fetches to meet the target throughput.
  common_mistake: |
    **The Pitfall:** Taking the arithmetic mean of the bandwidths directly.
    **The Rationale:** Candidates confuse throughput averaging with latency (time per byte) averaging when accessing tiered memory.
    **The Consequence:** Drastically overestimating effective bandwidth and failing to meet latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target effective bandwidth: 1.6 TB/s (1600 GB/s).
       - HBM3 bandwidth: 3.2 TB/s (3200 GB/s).
       - PCIe Gen5 x16 bandwidth: 64 GB/s.
    2. **Calculations:**
       - Time per byte equation: 1 / 1600 = h / 3200 + (1 - h) / 64
       - Multiply entire equation by 3200: 2 = h + 50 * (1 - h)
       - Expand: 2 = h + 50 - 50h
       - Simplify: 49h = 48
       - Required hit rate (h) = 48 / 49 ≈ 97.9%
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** A minimum hit rate of 97.9% is required to achieve the 1.6 TB/s target.
