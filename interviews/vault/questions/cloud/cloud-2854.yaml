title: HBM Cache Hit Rate
scenario: A massive recommendation model has an embedding table that exceeds a single
  H100 SXM's 80GB HBM3 capacity. You decide to cache the hottest embeddings in HBM3
  (3.2 TB/s realistic bandwidth) and fetch the rest from CPU DRAM over a PCIe Gen5
  x16 bus (64 GB/s bandwidth).
question: What is the minimum cache hit rate required in HBM3 to achieve an effective
  average embedding lookup bandwidth of at least 1.6 TB/s?
visual:
  kind: svg
  path: cloud-2854.svg
  alt: A bar chart comparing CPU DRAM bandwidth at 64 GB/s, effective target at 1600
    GB/s, and HBM3 at 3200 GB/s on a logarithmic scale.
  caption: Memory hierarchy bandwidth tiering comparison.
details:
  realistic_solution: 'Effective bandwidth is determined by the average time per byte
    transferred. Let h be the hit rate. The time per byte equation is: 1 / 1600 =
    h / 3200 + (1 - h) / 64. Multiplying the entire equation by 3200 yields: 2 = h
    + 50 * (1 - h). Expanding this gives 2 = h + 50 - 50h, which simplifies to 49h
    = 48. Therefore, the required hit rate h is 48 / 49, or approximately 97.9%.'
  common_mistake: Taking the arithmetic mean of the bandwidths directly (BW = h *
    3200 + (1-h) * 64) rather than averaging the latency (time per byte).
  napkin_math: 1/1600 = h/3200 + (1-h)/64 => 2 = h + 50 - 50h => h = 48/49 = 97.9%
