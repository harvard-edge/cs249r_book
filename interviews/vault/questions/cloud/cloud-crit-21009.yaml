title: MoE Auxiliary Loss Coefficient Tuning
scenario: You are training a 16-expert MoE language model. With auxiliary load-balancing loss coefficient
  α=0.01 (Switch Transformer default), you see good language modeling loss but 3 dead experts. With α=0.1,
  all experts are utilized but perplexity degrades by 5%. Specify the right approach.
question: "How should you tune MoE routing when aux-loss coefficient alpha=0.01 leaves 3 dead experts but alpha=0.1 hurts perplexity by 5%?"
details:
  realistic_solution: 'The optimal approach combines multiple techniques rather than relying solely on
    α. (1) Use a moderate α=0.03-0.05 to provide gentle balance pressure. (2) Add a router z-loss (DeepSeek-V3
    uses this) with coefficient 0.001 to prevent router logit explosion without directly forcing uniform
    routing. (3) Apply per-expert learning rate scaling — dead experts get higher learning rates to ''catch
    up.'' (4) Use Sinkhorn-based routing (soft assignment) during early training, then anneal to hard
    top-k routing. The DeepSeek-V3 recipe: α=0.003 for balance loss + z-loss, achieving both balance and
    specialization. Monitor expert utilization entropy — target entropy of log2(16)−1 = 3.0 bits (not
    maximum entropy, which prevents specialization).'
  common_mistake: Treating the aux loss coefficient as a simple hyperparameter to grid-search. The fundamental
    tension is that a strong balance loss fights against the language model's natural preference for specialization.
  napkin_math: 'Ideal expert entropy: ~3.0 bits (8 effective experts of 16, allowing some specialization).
    Dead expert threshold: <0.5% of average tokens. α=0.01 → 3 dead. α=0.1 → 0 dead but 5% quality loss.
    α=0.03 + z-loss → 0 dead, <1% quality loss.'
