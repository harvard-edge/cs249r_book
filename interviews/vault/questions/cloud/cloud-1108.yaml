title: Evaluating Datasheet Overhead for Clinical LLMs
scenario: Your team is preparing to train a 50B parameter clinical LLM on a 2TB corpus of electronic health records (EHR) and medical literature. The compliance team mandates completing 'Datasheets for Datasets' before the $1M compute budget (using 512 GPUs for 21 days) is approved. The engineering team argues this manual documentation process will delay the project by 6 weeks.
question: What quantitative justification supports the compliance mandate to delay training for Datasheet creation?
details:
  realistic_solution: Justify the delay by framing Datasheets as a preventative quality assurance step for the dataset. Discovering a fatal demographic skew (e.g., 85% of records from a single demographic) post-training could ruin the entire $1M training run and expose the organization to regulatory liability. The $72K datasheet creation cost is merely 7% of the $1.03M compute cost, and catching a data issue even 10% of the time yields positive expected value.
  common_mistake: |
    **The Pitfall:** Evaluating the cost of compliance purely in terms of engineering hours delayed.
    **The Rationale:** Engineering teams focus on velocity and compute utilization, viewing documentation as a non-blocking administrative task.
    **The Consequence:** A high probability of ruining a $1M training run due to undiscovered fatal demographic skews, exposing the organization to massive regulatory liability and reputational damage.
  napkin_math: |
    1. **Compute Cost:** 512 GPUs * $4/hr * 504 hours = $1,032,192.
    2. **Datasheet Cost:** 3 data stewards * 240 hours * $100/hr = $72,000.
    3. **Cost Ratio:** The datasheet cost is roughly 7% of the compute cost.
    4. **Conclusion:** **If the datasheet catches a fatal bias that would ruin the model even 1 in 10 times, the expected value of the delay is positive ($103k saved vs $72k spent).**
