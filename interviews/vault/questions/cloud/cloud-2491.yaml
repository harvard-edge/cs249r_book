title: Cloud-Managed Federated QAT
scenario: A cloud pipeline aggregates updates from 2 million smartwatches running CMSIS-NN. Inference
  uses strict INT8 precision to fit the 256KB SRAM. However, federated learning typically computes gradients
  in FP32, which would blow up the memory to 1MB+ and exceed the BLE bandwidth limits when sending updates
  to the cloud.
question: "How would you enable federated learning on 2 million INT8 smartwatches without exceeding 256KB SRAM or BLE bandwidth?"
details:
  realistic_solution: Implement a Cloud-orchestrated Quantized LoRA (Low-Rank Adaptation) architecture.
    The base INT8 model remains frozen on the MCU. The cloud initializes tiny FP16 or INT8 LoRA adapter
    matrices and sends them to the edge. The MCU only computes gradients for these small adapters. The
    cloud then aggregates the adapters and optionally folds them back into the INT8 base model for future
    deployments.
  common_mistake: De-quantizing to FP32 on the device for training and re-quantizing post-training, which
    causes immediate OOM crashes on the 256KB MCU.
  napkin_math: 'Base model = 200KB (INT8). Freezing it requires 0 bytes for gradients. LoRA rank 4 for
    a 128x128 layer: A (128x4) + B (4x128) = 1024 parameters. In FP16 = 2KB per layer. For 5 layers =
    10KB. Total memory during training = 200KB + 10KB (adapters) + 10KB (gradients/activations) = 220KB.
    220KB < 256KB SRAM. Payload to cloud is just 10KB.'
