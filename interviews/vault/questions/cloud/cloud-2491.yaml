title: Cloud-Managed Federated QAT
scenario: A cloud pipeline aggregates updates from 2 million smartwatches running CMSIS-NN. Inference uses strict INT8 precision to fit the 256KB SRAM. However, federated learning typically computes gradients in FP32, which would blow up the memory to 1MB+ and exceed the BLE bandwidth limits when sending updates to the cloud.
question: "How would you enable federated learning on 2 million INT8 smartwatches without exceeding 256KB SRAM or BLE bandwidth?"
details:
  realistic_solution: 'Implement a Cloud-orchestrated Quantized LoRA (Low-Rank Adaptation) architecture. The base INT8 model remains frozen on the MCU. The cloud initializes tiny FP16 or INT8 LoRA adapter matrices and sends them to the edge. The MCU only computes gradients for these small adapters. The cloud then aggregates the adapters and optionally folds them back into the INT8 base model for future deployments.'
  common_mistake: |
    **The Pitfall:** De-quantizing to FP32 on the device for training and re-quantizing post-training.
    **The Rationale:** Candidates apply standard cloud-based fine-tuning workflows to edge devices.
    **The Consequence:** The model immediately causes OOM crashes on the heavily constrained 256KB MCU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base INT8 model = 200 KB.
       - SRAM limit = 256 KB.
       - LoRA rank=4 for a 128x128 layer (5 layers).
    2. **Calculations:**
       - LoRA parameters per layer: (128x4) + (4x128) = 1024 parameters.
       - FP16 memory per layer: 1024 * 2 bytes = 2 KB.
       - 5 layers = 10 KB of adapters.
       - Total training memory: 200 KB (base) + 10 KB (adapters) + 10 KB (gradients/activations) = 220 KB.
    3. **Conclusion & Interpretation:** **The 220 KB memory footprint fits within the 256 KB SRAM, and the 10 KB payload easily meets BLE limits. Result: Memory-Bound.**
