title: QLoRA 4-bit Quantization Memory Arithmetic
scenario: You are tasked with determining if a 70B parameter model can be fine-tuned on two H100s (160 GB total) using QLoRA.
question: How does QLoRA fit 70B fine-tuning on two H100s, and what is the actual GPU memory footprint?
details:
  realistic_solution: 'QLoRA quantizes the frozen 70B base model to NF4 (4-bit Normal Float): 70B × 0.5 bytes = 35 GB. Double quantization further reduces size by quantizing the quantization constants themselves — saving roughly 0.5 bits per parameter, bringing the model to approximately 30.6 GB (not halving to 17.5 GB). LoRA adapters remain in BF16. With rank-16: 2 (target matrices) × 2 (A and B) × 16 × 8192 × 80 layers × 2 bytes = 83.9 MB adapters. Paged optimizer in CPU RAM handles rare Adam state spikes. Total GPU: ~30.6 GB base + 83.9 MB adapters + 6 GB activations ≈ 36.7 GB — fits on one H100 with headroom.'
  common_mistake: |
    **The Pitfall:** Thinking QLoRA reduces the LoRA adapter training weights to 4-bit as well.
    **The Rationale:** Candidates misunderstand that adapter weights must remain in BF16 for numerical stability.
    **The Consequence:** Miscalculating the true memory footprint and running out of VRAM during fine-tuning.
  napkin_math: |
    1. **Base Model:** 70B × 4 bits / 8 bits/byte = 35 GB.
    2. **Double Quantization:** Saves ~0.5 bits/param -> 35 GB × (3.5/4) = 30.6 GB.
    3. **LoRA Adapters:** 2 (matrices) × 2 (A & B) × 16 × 8192 × 80 × 2 bytes = 83.9 MB.
    4. **Activations:** ~6 GB.
    5. **Total Footprint:** 30.6 GB + 0.084 GB + 6 GB = **~36.7 GB**.
