title: QLoRA 4-bit Quantization Memory Arithmetic
scenario: Explain how QLoRA fits a 70B parameter model fine-tuning on two H100s (160
  GB total) and calculate the actual memory footprint.
question: How does QLoRA fits 70B fine-tuning on two H100s, and what is the actual
  GPU memory footprint?
details:
  realistic_solution: 'QLoRA quantizes the frozen 70B base model to NF4 (4-bit Normal
    Float): 70B × 0.5 bytes = 35 GB. Double quantization further reduces size by quantizing
    the quantization constants themselves — saving roughly 0.5 bits per parameter,
    bringing the model to approximately 30.6 GB (not halving to 17.5 GB). LoRA adapters
    remain in BF16. With rank-16: 2 (target matrices) × 2 (A and B) × 16 × 8192 × 80 layers × 2 bytes = 83.9 MB adapters.
    Paged optimizer in CPU RAM handles rare Adam state spikes. Total GPU: ~30.6 GB
    base + 83.9 MB adapters + 6 GB activations ≈ 36.7 GB — fits on one H100 with headroom.'
  common_mistake: Thinking QLoRA reduces the LoRA adapter training to 4-bit. Adapter
    weights themselves remain in BF16 for numerical stability; only the frozen base
    model is quantized to NF4.
  napkin_math: '70B × 4 bits / 8 bits/byte = 35 GB NF4. Double quantization: saves
    ~0.5 bits per parameter (quantizes the quantization constants), reducing to ~35
    × (3.5/4) ≈ 30.6 GB. Rank-16 LoRA BF16 adapters: 2 (target matrices) × 2 (A & B) × 16 × 8192 × 80 × 2B = 83.9 MB.
    Activations (batch=2, seq=2048): ~6 GB. Total: 30.6 + 0.084 + 6 ≈ 36.7 GB.
    Two H100s provide 160 GB — fine-tune with batch=16 or serve multiple LoRA variants
    simultaneously.'
