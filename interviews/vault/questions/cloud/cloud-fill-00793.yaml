title: 'TPU v5e Optimization: Encoder-Decoder Tradeoffs for Mixed Workloads'
scenario: Your company is developing a new AI-powered content generation and analysis platform. You currently
  use a large encoder-decoder transformer model for both text generation (summarization, translation)
  and text classification (sentiment, topic extraction). The current inference costs are prohibitive,
  and you've been tasked with optimizing for deployment on Google TPU v5e. The TPU v5e offers 16 GB HBM,
  197 TFLOPS (BF16), and 1.6 TB/s memory bandwidth. Given these constraints and the dual nature of your
  tasks, evaluate the tradeoffs of migrating to an encoder-only, decoder-only, or a specialized encoder-decoder
  architecture. Which architecture would you recommend for optimizing performance and cost on the TPU
  v5e, and why? Consider the impact on latency, throughput, model complexity, and memory footprint for
  both generation and analysis tasks.
question: "Which architecture would you recommend for optimizing performance and cost on the TPU v5e, and why?"
details:
  realistic_solution: 'A strong solution would propose a hybrid or split approach: utilizing an encoder-only
    model (e.g., BERT-like) for classification and analysis tasks to leverage higher batch sizes and lower
    latency, and a smaller, highly optimized decoder-only model (e.g., Llama-variant or custom architecture)
    for generation. The solution should emphasize optimizing model quantization (e.g., BF16, int8 if feasible)
    to fit within 16 GB HBM, exploiting TPU''s matrix multiplication units, and maximizing throughput
    with careful batching strategies. It would also detail how to partition the workload if a single model
    is still desired, potentially using a ''mixture of experts'' or conditional execution to reduce active
    parameter count per task.'
  common_mistake: Candidates might fail to differentiate the distinct inference patterns and resource
    requirements of generation (decoder-only, auto-regressive, lower batch sizes for latency) vs. classification/analysis
    (encoder-only, high batch sizes possible). They may also overlook the HBM size (16 GB) as a critical
    constraint for large models and the BF16 TFLOPS as the primary compute metric for transformer operations,
    proposing solutions that exceed memory capacity or underutilize the compute.
  napkin_math: Candidates should estimate model parameter count vs. HBM (e.g., a 7B parameter model in
    BF16 is ~14 GB, fitting 16GB HBM but leaving little room for activations/KV cache). Calculate approximate
    inference FLOPs per token/sequence for encoder vs. decoder and compare against 197 TFLOPS. Consider
    the memory bandwidth (1.6 TB/s) for loading weights and KV cache, and how it impacts latency for larger
    models or sequential decoding steps, especially when dealing with long sequence lengths. E.g., for
    a 7B model, loading weights can take (14 GB / 1.6 TB/s) ~ 8.75 ms, which adds to per-token generation
    latency.
