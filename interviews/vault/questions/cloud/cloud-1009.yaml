title: Applying Temperature Scaling for Overconfident Logits
scenario: A cloud-based fraud detection API powered by a deep neural network processes 5,000 transactions
  per second on AWS Inferentia2. The model exhibits overconfidence, having an Expected Calibration Error
  (ECE) of 0.15. To safely abstain from uncertain predictions, the team implements Temperature Scaling
  post-processing. For a flagged transaction, the pre-softmax logits are z_fraud = 4.0 and z_not_fraud
  = 1.0. The temperature T calibrated on a hold-out validation set is 2.0. Calculate the model's confidence
  for 'fraud' before and after Temperature Scaling.
details:
  realistic_solution: Divide all pre-softmax logits by the optimal temperature T=2.0 before applying the
    softmax function. This softens the probability distribution without changing the predicted class.
  common_mistake: Applying the temperature parameter T after the softmax function, or confusing temperature
    scaling with Platt scaling which learns both a scaling factor and a bias.
  napkin_math: 'Before T: P(fraud) = e^4 / (e^4 + e^1) ≈ 54.6 / (54.6 + 2.7) = 95.2%. After T=2.0: logits
    become 2.0 and 0.5. P_calibrated(fraud) = e^2 / (e^2 + e^0.5) ≈ 7.39 / (7.39 + 1.65) = 81.7%. The
    reported confidence drops by ~13.5%, accurately reflecting true uncertainty.'
