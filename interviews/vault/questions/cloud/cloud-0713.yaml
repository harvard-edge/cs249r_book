title: The Pipeline Bubble Cost
scenario: You're training a 65B parameter model using pipeline parallelism with 8 stages on 8 DGX H100
  nodes (64 GPUs total, 8 GPUs per node with tensor parallelism). Your team lead says 'use 16 microbatches,
  that's plenty.' The training run will take 3 weeks. How much GPU-time is wasted in the pipeline bubble,
  and how many microbatches do you actually need to keep the bubble under 5%?
details:
  realistic_solution: 'The pipeline bubble fraction is $(P-1)/(M+P-1)$ where $P$ = stages and $M$ = microbatches.
    With $P=8, M=16$: bubble = $7/23 = 30.4\%$. To get under 5%: solve $(8-1)/(M+7) < 0.05$ → $M > 133$.
    Use at least $M=140$ microbatches. However, more microbatches means smaller per-microbatch size, which
    can underutilize the GPU''s tensor cores. You need to verify that each microbatch still has enough
    arithmetic intensity to saturate the H100''s 989 TFLOPS (FP16).'
  common_mistake: '"16 microbatches with 8 stages means only 8/23 ≈ 35% bubble — that''s acceptable for
    a 3-week run." Candidates often compute the bubble fraction correctly but fail to translate it into
    dollars and calendar time, missing that 35% bubble on 64 H100s for 3 weeks is catastrophic.'
  napkin_math: '64 H100 GPUs × $2/GPU-hr × 24 hr × 21 days = $64,512 total. At 30.4% bubble: $64,512 ×
    0.304 = **$19,612 wasted**. At 5% bubble: $64,512 × 0.05 = $3,226 wasted — saving $16,386. Microbatch
    sizing: if global batch = 4M tokens and $M=140$, each microbatch ≈ 28,571 tokens. With sequence length
    4096, that''s ~7 sequences per microbatch per pipeline stage — enough to keep tensor cores busy.'
