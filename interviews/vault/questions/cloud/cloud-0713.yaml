title: The Pipeline Bubble Cost
scenario: You're training a 65B parameter model using pipeline parallelism with 8 stages on 8 DGX H100 nodes (64 GPUs total, 8 GPUs per node). Your team lead says 'use 16 microbatches, that's plenty.' The training run will take 3 weeks.
question: "How much GPU-time is wasted in the pipeline bubble, and how many microbatches do you actually need to keep the bubble under 5%?"
details:
  realistic_solution: The pipeline bubble fraction is $(P-1)/(M+P-1)$ where $P$ = stages and $M$ = microbatches. With 8 stages and 16 microbatches, the bubble is 30.4%, which translates to nearly $20,000 in wasted GPU time over a 3-week run. To get under 5%, you need at least 134 microbatches. However, you must verify the smaller microbatch size still maintains enough arithmetic intensity to saturate the GPUs.
  common_mistake: |
    **The Pitfall:** Accepting a 30% bubble fraction because "it sounds reasonable" for complex models.
    **The Rationale:** Candidates fail to translate the theoretical percentage into actual dollars and calendar days.
    **The Consequence:** Wasting 30% of a 64-GPU cluster for 3 weeks is an unacceptable catastrophic financial loss ($20k+ wasted).
  napkin_math: |
    1. **Current Bubble:** (8-1) / (16+8-1) = 7/23 = **30.4%**.
    2. **Cost Calculation:** 64 GPUs * $2/hr * 24 hr * 21 days = $64,512 total cost.
    3. **Wasted Money:** $64,512 * 0.304 = **$19,612 wasted**.
    4. **Target Bubble < 5%:** 7 / (M+7) < 0.05 -> M+7 > 140 -> **M > 133 microbatches**.
    5. **Savings:** At 5% bubble, waste is $3,226. You save over $16,000 by increasing M.
