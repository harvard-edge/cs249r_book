title: Optimizing Distributed ML Training on Kubernetes with A100 GPUs
scenario: You are deploying a distributed ML training job on a Kubernetes cluster that requires 16 NVIDIA A100 80GB GPUs. The cluster has heterogeneous nodes, some with older GPUs and some CPU-only.
question: How would you schedule a 16-A100 distributed training job onto only A100-80GB nodes using Kubernetes device plugins, node affinity, and batch scheduling?
details:
  realistic_solution: "1. **NVIDIA Device Plugin:** Ensure the NVIDIA device plugin\
    \ is correctly installed and configured in the Kubernetes cluster. This exposes\
    \ `nvidia.com/gpu` resources. 2. **Node Labeling:** Label nodes with A100 GPUs\
    \ explicitly, e.g., `gpu.nvidia.com/model: A100-80GB` and potentially `gpu.nvidia.com/memory:\
    \ 80GB`. 3. **Pod Resource Requests & Limits:** Request `nvidia.com/gpu: 1` per\
    \ GPU needed within the pod spec. While Kubernetes doesn't natively schedule on\
    \ GPU memory, monitor application memory usage and ensure sufficient node RAM.\
    \ For fine-grained GPU memory control, specialized schedulers or admission controllers\
    \ might be needed, or rely on application-level memory management. 4. **Node Affinity:**\
    \ Utilize `nodeAffinity` (e.g., `requiredDuringSchedulingIgnoredDuringExecution`)\
    \ in the pod spec to target A100 nodes:\n```yaml\naffinity:\n  nodeAffinity:\n\
    \    requiredDuringSchedulingIgnoredDuringExecution:\n      nodeSelectorTerms:\n\
    \      - matchExpressions:\n        - key: gpu.nvidia.com/model\n          operator:\
    \ In\n          values:\n          - A100-80GB\n```\n5. **Job Scheduling:** For\
    \ distributed jobs requiring multiple pods to start together, consider using a\
    \ scheduler extender or a specialized batch scheduler (like Volcano) for gang\
    \ scheduling. This ensures that all required pods are scheduled simultaneously,\
    \ preventing deadlocks or resource starvation for partial job deployments."
  common_mistake: |
    **The Pitfall:** Simply requesting `nvidia.com/gpu: 1` without specifying the exact GPU model or memory.
    **The Rationale:** Users assume Kubernetes automatically understands workload requirements or that all GPUs are homogeneous.
    **The Consequence:** Pods land on older GPUs or experience Out-of-Memory errors, and lack of gang scheduling leads to deadlocks.
  napkin_math: |
    1. 16 NVIDIA A100 (80GB) GPUs total memory = 16 Ă— 80 GB = 1280 GB HBM2e.
    2. Total memory bandwidth = 16 Ă— 2.0 TB/s = 32 TB/s.
    3. For a workload keeping all 80GB busy per GPU, a full memory scan takes 80 GB / 2.0 TB/s = 0.04 seconds.
    4. Peak FP16 compute = 16 Ă— 312 TFLOPS = 4992 TFLOPS.
    5. **Given the massive bandwidth, compute (FLOPs) is typically the bottleneck rather than memory bandwidth once data is loaded on the A100s.**
