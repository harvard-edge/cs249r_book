title: Isolating Memory Bandwidth via Micro-Benchmark
scenario: You run a vector addition micro-benchmark (`C = A + B`) on a GPU. The benchmark moves 80GB of total data in 42ms.
question: "For the 80GB total data transfer in 42ms, what bandwidth is achieved and how does it compare to the hardware's 2.0 TB/s peak?"
details:
  realistic_solution: 'Vector addition reads two arrays and writes one: 3 × array_size = total data transfer. Achieved bandwidth = 80 GB / 0.042s = 1,904 GB/s = 1.9 TB/s. This is a well-optimized micro-benchmark achieving near-peak memory bandwidth (95% of peak 2.0 TB/s).'
  common_mistake: |
    **The Pitfall:** Forgetting to count both read AND write operations in memory bandwidth calculations.
    **The Rationale:** Assuming bandwidth is only bound by the size of the input data rather than the total data transiting the memory bus.
    **The Consequence:** Wildly overestimating memory bandwidth, sometimes reporting speeds that violate physical hardware limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operation: Vector Add (C = A + B).
       - Total Data Transferred: 80 GB.
       - Time: 42ms (0.042s).
       - Hardware Peak Bandwidth: 2.0 TB/s.
    2. **Calculations:**
       - Achieved Bandwidth = 80 GB / 0.042s = 1,904.76 GB/s ≈ 1.9 TB/s.
       - Utilization = 1.9 TB/s / 2.0 TB/s = 95%.
    3. **Conclusion & Interpretation:**
       - **Result: 1.9 TB/s (Memory-Bandwidth-Bound).** The benchmark is well-optimized, reaching 95% of theoretical peak memory bandwidth.
