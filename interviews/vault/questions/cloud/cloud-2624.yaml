title: Isolating Memory Bandwidth via Micro-Benchmark
scenario: 'You run a vector addition micro-benchmark on an A100: 80GB array copied and added element-wise
  in 42ms. Calculate achieved memory bandwidth and compare to A100''s peak 2.0 TB/s.'
details:
  realistic_solution: 'Vector addition reads two arrays and writes one: 3 × 80GB = 240 GB total data movement.
    Achieved bandwidth = 240 GB / 0.042s = 5,714 GB/s = 5.71 TB/s. Wait — this exceeds peak bandwidth
    (2.0 TB/s). The calculation must be wrong. Correcting: 80GB is likely the total memory, not the array
    size. If the array is 80GB, we read 80GB + 80GB and write 80GB = 240GB. At 42ms: 240/0.042 = 5,714
    GB/s which is impossible. The array must be smaller. If we get 42ms for an 80GB total transfer: 80GB
    / 0.042s = 1,905 GB/s = 1.9 TB/s ≈ 95% of peak 2.0 TB/s. This is a well-optimized micro-benchmark
    achieving near-peak memory bandwidth.'
  common_mistake: Forgetting to count both reads AND writes in bandwidth calculation. Vector addition
    moves 3× the array size, not 1×.
  napkin_math: 'Vector add: read A + read B + write C = 3 × array_size. For 95% peak: 3 × size / time
    = 0.95 × 2.0 TB/s. At 80GB total transfer: 80/0.042 = 1.9 TB/s (95%).'
