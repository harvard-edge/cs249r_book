title: Diagnosing DP Congestion in Rail-Optimized Clusters
scenario: Your team is training a 70B parameter LLM on a 1024-GPU cluster (128 nodes, 8x H100s per node)
  using 3D parallelism. The cluster features a rail-optimized InfiniBand topology, where GPU 'i' on every
  node is wired to Leaf Switch 'i'. You observe severe network congestion during the Data Parallel (DP)
  AllReduce phase, slowing step times by 40%. Telemetry shows that IB switches 0 and 1 are saturated at
  400 Gbps, while switches 2-7 show near-zero traffic. The job was recently restarted by the cluster orchestrator
  after a hardware failure. Root-cause this severe network imbalance and explain the scheduling failure.
details:
  realistic_solution: The scheduler failed to enforce topology-aware placement during the restart. It
    placed DP replicas across mismatched GPU indices (e.g., DP Rank 0 on Node A's GPU 0, but Node B's
    GPU 1). In a rail-optimized network, this forces AllReduce traffic to traverse up to the oversubscribed
    spine switches rather than staying on the non-oversubscribed leaf switches. The fix is to implement
    strict rail-aligned scheduling, ensuring all processes in a DP group are bound to the exact same local
    GPU index (and thus the same leaf switch) across different nodes.
  common_mistake: Candidates often blame faulty switches, bad active optical cables (AOCs), or assume
    the NCCL topology detection failed, missing that the orchestrator placed tasks without respecting
    the physical rail layout.
  napkin_math: 'If 8 GPUs per node run DP AllReduce unaligned, traffic must cross the spine. If the spine
    is 2:1 oversubscribed, the effective bandwidth drops from 400 Gbps to 200 Gbps per GPU. Rail-aligned
    placement keeps traffic on the leaf switches: 8 rails * 400 Gbps = 3.2 Tbps aggregate intra-rack bandwidth
    with 0 spine traversal.'
