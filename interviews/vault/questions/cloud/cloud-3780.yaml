title: 'FlashAttention on TPU: XLA Attention vs Pallas Kernels'
scenario: "Your team trains a 40B model on TPU v5e pods. The XLA compiler generates attention kernels automatically, but they materialize the full attention matrix in memory. A colleague suggests writing custom FlashAttention-style kernels using JAX Pallas."
question: "What architectural differences matter for FlashAttention-style kernels on TPU v5e versus GPUs, and is a manual JAX Pallas kernel worth it?"
details:
  realistic_solution: "Key architectural differences: (1) TPU v5e VMEM is 16 MB per core \u2014 64x larger than a GPU's 256 KB SRAM per SM. This allows much larger tiles, reducing the number of tiling rounds. (2) TPU uses systolic arrays optimized for matrix multiplies, not general CUDA cores. (3) XLA's default attention fuses softmax but may still materialize the NxN matrix in HBM for large N. JAX Pallas allows writing TPU-native tiled attention that keeps all intermediates in VMEM. Is it worth it? For seq_len > 2048, yes \u2014 Pallas FlashAttention avoids the O(N\u00b2) HBM traffic."
  common_mistake: |
    **The Pitfall:** Assuming a TPU's FlashAttention implementation is identical to a GPU's.
    **The Rationale:** Ignorance of the TPU's massive 16MB VMEM and systolic array layout versus the GPU's tiny 256KB SRAM and CUDA cores.
    **The Consequence:** Sub-optimal tile sizing that fails to leverage the TPU's architecture, missing out on massive matrix multiply unit (MXU) utilization gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TPU v5e VMEM is 16 MB per core.
       - GPU SRAM is ~256 KB per SM.
    2. **Calculations:**
       - TPU Tile Capacity: Tile sizes like B=512, d=128 need ~900KB, easily fitting in VMEM.
       - GPU Tile Capacity: Tile sizes are restricted to ~128x128 (needs ~160KB).
    3. **Conclusion & Interpretation:**
       **TPU can use 4x larger tiles, requiring fewer HBM read/write rounds. Result: Memory-Bandwidth-Bound for large sequences if not tiled properly.**
