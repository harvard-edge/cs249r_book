title: The Object Store Training Anti-Pattern
scenario: A team stores their 10 TB training dataset as 50 million individual JPEG files in an S3-compatible object store. During training, each GPU worker fetches individual files randomly. They observe that data loading saturates at 500 samples/sec per worker despite having 100 Gbps network links, and S3 API costs are high.
question: What is the root cause, and how should they restructure the data?
details:
  realistic_solution: 'Object stores like S3 have high per-request latency (~20-50ms for a GET) and charge per API call. At 500 samples/sec, the worker is issuing 500 HTTP GET requests per second. Each request incurs DNS resolution, TLS handshake (amortized), HTTP overhead, and S3''s internal metadata lookup. The 20ms per-request latency with 500 concurrent requests saturates the client''s connection pool, not the bandwidth. The fix: pack training samples into large sequential files (TFRecord, WebDataset tar files, or Parquet). A single 1 GB tar file containing 5,000 samples requires 1 GET request instead of 5,000, reducing API calls by 5,000x and enabling sequential streaming at full bandwidth. Additionally, use a local NVMe cache to avoid repeated S3 reads across epochs.'
  common_mistake: |
    **The Pitfall:** Blaming network bandwidth and upgrading links instead of fixing data locality.
    **The Rationale:** Engineers assume 500 samples/sec is a bandwidth limit, ignoring the immense per-file HTTP overhead.
    **The Consequence:** The organization pays thousands in wasted S3 API GET requests while expensive GPU hardware idles waiting for DNS and TLS handshakes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 samples/sec per worker.
       - 100 Gbps link (12.5 GB/s).
       - JPEG size: 200 KB.
       - S3 GET cost: $0.0004 per 1,000 requests.
    2. **Calculations:**
       - Bandwidth usage: 500 * 200 KB = 100 MB/s (less than 1% of 12.5 GB/s link).
       - Original API cost: 50M files * ($0.0004/1000) = $20 per epoch.
       - Packed (10,000 tar files): 10,000 * ($0.0004/1000) = $0.004 per epoch.
       - Packed throughput: 1 GB read at 12.5 GB/s = 80ms for 5,000 samples = 62,500 samples/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Packing files reduces API costs by 5,000x and increases throughput by 125x. The system is API-Request-Overhead-Bound, not Bandwidth-Bound.**
