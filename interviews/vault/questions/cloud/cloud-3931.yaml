title: Tensor Parallelism AllReduce Overlap with Feedforward Computation
scenario: 'In tensor-parallel training of a 70B LLM across 8 H100 GPUs (NVLink), each
  transformer layer requires two AllReduce operations: one after the attention block
  and one after the MLP block. These AllReduces are on the critical path. Can they
  be overlapped with computation?'
question: Can they be overlapped with computation?
details:
  realistic_solution: 'Standard tensor parallelism AllReduces cannot be overlapped
    because each produces a partial sum that is needed before the next layer starts.
    However, two techniques partially address this: (1) Async ReduceScatter + AllGather
    decomposition: split AllReduce into ReduceScatter (output partial results while
    computing) + AllGather (reconstruct while starting next layer''s computation).
    The AllGather can partially overlap with the next layer''s input processing. (2)
    Sequence parallelism: overlap the sequence dimension''s AllGather with computation
    by processing received chunks as they arrive. Megatron-LM uses this to overlap
    30-40% of communication.'
  common_mistake: Assuming tensor parallelism AllReduces can be overlapped like DDP
    gradient AllReduces. In tensor parallelism, the AllReduce output is the input
    to the next computation — there is a strict data dependency.
  napkin_math: '70B model, 8-way TP, 96 layers. Each layer: 2 AllReduces of ~160MB
    (hidden_size=8192, seq_len=2048, BF16). NVLink 900 GB/s: 160MB/900 = 0.18ms per
    AllReduce. 192 AllReduces x 0.18ms = 34.5ms total. Compute per layer: ~5ms. Communication
    is 7% of compute — small enough that partial overlap via sequence parallelism
    recovers most of it.'
