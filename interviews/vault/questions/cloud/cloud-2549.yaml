title: Cloud Young Daly Formula L2 0
scenario: Your manager asks why you checkpoint every 30 minutes instead of every 5 minutes during a large
  training run. Explain the Young-Daly formula and the trade-off it optimizes.
details:
  realistic_solution: 'The Young-Daly formula calculates the optimal checkpoint interval: τ_opt = √(2
    × δ × M) - δ, where δ is the checkpoint save time and M is the mean time between failures (MTBF).
    It balances two costs: (1) checkpoint overhead — saving too frequently wastes compute on I/O, and
    (2) rework after failure — saving too infrequently means more lost work when a failure occurs. The
    formula minimizes total wasted time (checkpoint overhead + expected rework). Checkpointing every 5
    min with a 2-min save time wastes 40% on I/O; every 30 min with MTBF of 4 hours wastes only ~11% and
    limits max rework to 30 min.'
  common_mistake: Checkpointing as frequently as possible 'to be safe.' Very frequent checkpoints can
    waste more compute on I/O than they save in rework prevention — the Young-Daly formula shows the optimum
    is a balance.
  napkin_math: 'δ = 2 min save time, M = 240 min MTBF. τ_opt = √(2 × 2 × 240) - 2 = √960 - 2 = 31 - 2
    = 29 min. Overhead: δ/τ = 2/29 = 6.9%. Expected rework: τ/2 = 14.5 min per failure. Total waste: 6.9%
    + 14.5/240 = 6.9% + 6.0% = 12.9%.'
