title: TPU v5e Activation Checkpointing Strategy for Large Language Models
scenario: You are designing the training pipeline for a massive Mixture-of-Experts (MoE) Large Language
  Model with 100 billion parameters on Google TPU v5e pods. Each TPU v5e chip has 16 GB HBM and delivers
  197 TFLOPS BF16. The model's forward pass memory consumption for activations alone exceeds the 16 GB
  HBM capacity per chip. Your goal is to maximize training throughput while managing the compute-memory
  tradeoff effectively. Describe a strategy to incorporate activation checkpointing.
details:
  realistic_solution: A realistic solution involves a layered approach. First, analyze the model's activation
    memory profile to identify critical layers contributing most to memory usage. Implement selective
    activation checkpointing, prioritizing layers with high memory footprints and lower re-computation
    costs. For MoE models, consider checkpointing before and after the sparse expert layers, as these
    can have high activation memory but potentially benefit from sparse re-computation. Utilize a 'find
    optimal checkpointing schedule' algorithm (e.g., as described in 'Gradients without Backpropagation')
    to dynamically determine checkpointing points to balance memory savings against re-computation overhead.
    Quantize activations before checkpointing if feasible (e.g., to BF16 or even INT8) to further reduce
    storage requirements, provided it doesn't significantly impact model quality.
  common_mistake: A common mistake is applying a naive, uniform checkpointing strategy across all layers
    without considering the computational cost of re-computing different layers or the varying memory
    footprints of different activation types (e.g., attention vs. feed-forward activations). Another mistake
    is overlooking the overhead of storing and restoring checkpoints, which can degrade training speed
    if not optimized.
  napkin_math: Given a TPU v5e with 16 GB HBM, if a single forward pass activation memory for a layer
    group is, say, 24 GB, then without checkpointing, it won't fit. Checkpointing allows splitting this
    into smaller chunks. If a layer group takes 10ms to compute and 20GB of memory, and checkpointing
    reduces memory to 8GB but adds 5ms re-computation time for the backward pass, the memory is saved
    but the computation time increases. You must balance the increased backward pass compute (extra 5ms
    per iteration) against the ability to train larger models or use larger batch sizes that wouldn't
    fit otherwise. The 197 TFLOPS BF16 indicates significant compute power, so a small increase in re-computation
    might be acceptable if it unlocks significantly larger models or batch sizes.
