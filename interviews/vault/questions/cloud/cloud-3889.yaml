title: Calculate Pipeline Bubble Overhead for 1F1B Schedule
scenario: You are training a large language model on a cluster of A100 GPUs (80 GB
  HBM2e, 400W TDP). The model is sharded across 8 pipeline stages (p=8) using a standard
  1F1B (One-Forward-One-Backward) schedule. Profiling reveals that a single micro-batch
  takes 50ms for the forward pass and 100ms for the backward pass on each A100. If
  you configure the training loop to use 32 micro-batches (m=32) per global batch,
  calculate the total time required to complete one pipeline step and the exact pipeline
  bubble overhead percentage.
question: What are the total 1F1B pipeline step time and exact bubble overhead percentage
  for p=8 and m=32?
details:
  realistic_solution: For a standard 1F1B pipeline, the total time for a step is the
    time to process m micro-batches plus the time spent filling and draining the pipeline,
    which takes p-1 steps. First, sum the forward and backward pass times to get the
    micro-batch execution time. Then, multiply this by the total number of sequential
    steps (m + p - 1) to find the total time. The bubble overhead is the ratio of
    bubble steps to total steps.
  common_mistake: Candidates often calculate the ideal total time by multiplying micro-batches
    by pass times, but forget to add the (p-1) flush/fill steps that constitute the
    pipeline bubble. Another common error is using p/m instead of (p-1)/(m+p-1) for
    the exact bubble fraction.
  napkin_math: Time per micro-batch (t_mb) = 50ms (forward) + 100ms (backward) = 150ms.
    Total sequential steps in the 1F1B schedule = m + p - 1 = 32 + 8 - 1 = 39 steps.
    Total pipeline step time = 39 steps * 150ms/step = 5850ms (or 5.85 seconds). Pipeline
    bubble time = (p - 1) * t_mb = 7 * 150ms = 1050ms. Bubble overhead percentage
    = Bubble Time / Total Time = 1050 / 5850 = 7 / 39 = 17.95%.
