title: The Triton Inference Server Ensemble
scenario: 'We''re deploying a RAG pipeline: text preprocessing (tokenization + embedding lookup) → retrieval
  model → LLM generation → JSON postprocessing. An engineer wants to chain these as a Triton Inference
  Server ensemble. Another says ''just put it all in one Python process.'' Compare the latency and throughput
  of both approaches.'
details:
  realistic_solution: 'A Triton ensemble chains models as a DAG within a single server process, passing
    tensors via shared memory (zero-copy on GPU). The latency for a single request is slightly higher
    than monolithic (~1–2ms overhead per stage for scheduling), but throughput is dramatically higher
    because stages run as a pipeline: while the LLM generates tokens for request N, the preprocessor handles
    request N+1. The monolithic approach serializes everything, leaving the GPU idle during CPU-bound
    pre/postprocessing.'
  common_mistake: '"The ensemble adds network hops between stages, so the monolithic approach is always
    faster." Triton ensembles use shared-memory IPC, not network calls, and the pipeline parallelism enables
    higher throughput.'
  napkin_math: 'RAG pipeline stages: | Preprocessing (CPU): 5ms | Embedding retrieval (GPU): 3ms | LLM
    generation (GPU): 200ms | Postprocessing (CPU): 2ms | **Monolithic (serial):** Total = 5 + 3 + 200
    + 2 = **210ms/request**. Throughput = 1000/210 = **4.8 req/s**. GPU utilization = 203/210 = 97% (looks
    good for single request, but CPU stages block the pipeline). | **Triton ensemble (pipelined):** Single-request
    latency = 210 + 3ms scheduling overhead = **213ms**. But pipeline throughput: bottleneck = LLM at
    200ms → **5.0 req/s per pipeline**. With 4 LLM instances: CPU stages overlap with GPU, throughput
    = **~19 req/s**. The monolithic approach can''t overlap CPU and GPU stages, capping at 4.8 req/s regardless
    of GPU count.'
