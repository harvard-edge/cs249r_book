title: The Triton Inference Server Ensemble
scenario: We're deploying a RAG pipeline: text preprocessing (tokenization + embedding lookup) → retrieval model → LLM generation → JSON postprocessing. An engineer wants to chain these as a Triton Inference Server ensemble. Another says 'just put it all in one Python process.'
question: How do a Triton ensemble and a single Python process compare for latency and throughput in this RAG pipeline?
details:
  realistic_solution: 'A Triton ensemble chains models as a DAG within a single server process, passing tensors via shared memory (zero-copy on GPU). The latency for a single request is slightly higher than monolithic (~1–2ms overhead per stage for scheduling), but throughput is dramatically higher because stages run as a pipeline: while the LLM generates tokens for request N, the preprocessor handles request N+1. The monolithic approach serializes everything, leaving the GPU idle during CPU-bound pre/postprocessing.'
  common_mistake: |
    **The Pitfall:** Assuming the ensemble adds network hops between stages.
    **The Rationale:** Developers used to microservices assume splitting components implies network serialization overhead.
    **The Consequence:** Incorrectly concluding the monolithic approach is universally faster, missing the massive pipeline parallelism and shared-memory zero-copy benefits of Triton.
  napkin_math: |
    - **Stage Times:** Preprocessing (CPU): 5ms | Embedding retrieval (GPU): 3ms | LLM generation (GPU): 200ms | Postprocessing (CPU): 2ms.
    - **Monolithic (Serial):**
      - Single Request Latency: 5 + 3 + 200 + 2 = 210ms.
      - Max Throughput: 1000 / 210 = **4.8 req/s**.
    - **Triton Ensemble (Pipelined):**
      - Single Request Latency: 210ms + 3ms scheduling overhead = 213ms.
      - Pipeline Bottleneck: LLM generation at 200ms.
      - Single Pipeline Throughput: 1000 / 200 = 5.0 req/s.
      - **Scaling:** With 4 LLM instances, CPU stages overlap with GPU, pushing throughput to **~19 req/s** (monolithic remains capped by serial execution).
