title: The INT8 Inference Memory Footprint
scenario: You're on the generative AI platform team, and a product team wants to deploy a new 7-billion
  parameter Llama model for a RAG-based customer service bot. Before even considering the vector index,
  you need to state the bare minimum memory required to load the model weights for inference using standard
  INT8 quantization. What is that memory footprint?
details:
  realistic_solution: For INT8 quantized inference, each parameter requires 1 byte of memory. Therefore,
    a 7-billion parameter model requires approximately 7 billion bytes, or 7 GB of VRAM, just for the
    model weights.
  common_mistake: Engineers often confuse the memory requirements for *training* with *inference*. Training
    with Adam optimization requires storing gradients and optimizer states, leading to a much larger footprint
    (typically 8-16x) than just loading the model weights for serving. Another common mistake is to recall
    the FP16 memory footprint (2 bytes/param) instead of the INT8 one.
  napkin_math: 7 Billion Parameters × 1 byte/parameter (for INT8) = 7,000,000,000 bytes ≈ 7 GB.
  options:
  - 112 GB
  - 14 GB
  - 7 GB
  - 700 MB
  correct_index: 2
