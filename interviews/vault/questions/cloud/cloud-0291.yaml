title: The INT8 Inference Memory Footprint
scenario: 'You''re on the generative AI platform team, and a product team wants to deploy a new 7-billion parameter Llama model for a RAG-based customer service bot.'
question: 'What is the bare minimum VRAM required to load a 7-billion parameter Llama model''s INT8 weights for inference?'
details:
  realistic_solution: 'For INT8 quantized inference, each parameter requires 1 byte of memory. Therefore, a 7-billion parameter model requires approximately 7 billion bytes, or 7 GB of VRAM, just for the model weights.'
  common_mistake: |
    **The Pitfall:** Confusing memory requirements for training with inference, or recalling the FP16 footprint.
    **The Rationale:** Engineers often calculate the FP16 memory (2 bytes/param) or include optimizer states (8-16x overhead) instead of calculating just the quantized weights.
    **The Consequence:** Drastically over-provisioning inference hardware, leading to wasted budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 7 Billion.
       - Precision: INT8 (1 byte per parameter).
    2. **Calculations:**
       - Total memory: 7,000,000,000 * 1 byte = 7,000,000,000 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: VRAM Capacity Bound.** The minimum memory footprint is strictly ~7 GB.
options:
- 112 GB
- 14 GB
- 7 GB
- 700 MB
