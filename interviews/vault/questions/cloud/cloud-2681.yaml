title: Breaking a Feedback Loop in Production
scenario: Your ad targeting model has created a feedback loop. It over-shows ads to users who previously clicked, making them click more (engagement habit), while ignoring users who were never targeted. The model's CTR keeps improving but total revenue is flat. Option A: add epsilon-greedy exploration (10% random ads). Option B: use inverse propensity scoring (IPS) to debias training data. Option C: train a separate 'exploration model' on random traffic alongside the main model.
question: Which approach should you choose?
details:
  realistic_solution: 'Option B (IPS) combined with Option A is the gold standard, but if choosing one: Option C is the most robust. Option A (epsilon-greedy): 10% random ads immediately degrades CTR by ~10%, which may be politically unacceptable. It also wastes impressions on random content rather than strategically exploring uncertain areas. Simple but crude. Option B (IPS): reweighs training examples by 1/P(shown), upweighting rarely-shown user-content pairs. Theoretically correct but practically noisy — inverse propensity weights have high variance, especially for items with very low show probability (weights explode). Requires careful clipping and normalization. Option C (exploration model): Dedicates a small fraction (5%) of traffic to a separate model that specifically optimizes for information gain (exploring uncertain user preferences). The main model trains on data from BOTH the exploration and exploitation traffic, with proper weighting. This balances exploration quality (intelligent, not random) with exploitation performance. Netflix and Spotify use this dual-model approach.'
  common_mistake: |
    **The Pitfall:** Choosing epsilon-greedy because it's simplest.
    **The Rationale:** Candidates fail to realize that random exploration is wasteful and politically difficult due to the immediate 10% CTR drop.
    **The Consequence:** Wasting impressions on random content rather than intelligently gathering information.
  napkin_math: |
    1. Option A: 10% random → immediate 10% CTR drop.
    2. Option B: IPS variance can be 100x → unstable training.
    3. Option C: 5% exploration traffic → 5% CTR cost, but strategic data collection.
    **Result:** Option C provides the best balance of cost and strategic data gain.
