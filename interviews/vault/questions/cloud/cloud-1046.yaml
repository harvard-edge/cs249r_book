title: Diagnosing P99 Latency Jitter on CPU Inference
scenario: You deployed a BERT-based NER model on a dual-socket AWS c6i.16xlarge (64 vCPUs, 2 NUMA nodes) using TorchServe. While P50 latency is stable at 15ms, P99 latency randomly spikes to over 85ms under moderate load. CPU utilization hovers around 40%. Hardware profiling reveals a massive spike in Last Level Cache (LLC) misses specifically during these high-latency requests.
question: How do you diagnose and resolve this performance jitter?
details:
  realistic_solution: Diagnose thread migration using 'perf stat' and 'numastat'. The OS scheduler is migrating worker threads across physical cores and NUMA boundaries, destroying warm L1/L2/LLC caches. Fix by pinning inference threads to specific cores using taskset or numactl, and binding memory allocations to the local NUMA node.
  common_mistake: |
    **The Pitfall:** Blindly increasing `OMP_NUM_THREADS` to utilize all 64 cores.
    **The Rationale:** Developers see low CPU utilization and high latency, assuming more threads will speed up the compute.
    **The Consequence:** Spanning threads across NUMA boundaries drastically worsens cross-node memory traffic and cache thrashing, leading to even higher P99 latency spikes.
  napkin_math: |
    - **Cache Hit Access Time:** L1/L2 access takes ~1-4 ns.
    - **Cache Miss Access Time:** Main memory access (LLC miss) takes ~100 ns.
    - **Memory Operations:** A BERT forward pass requires hundreds of millions of memory reads.
    - **Impact of 5% Miss Rate:** A 5% drop in LLC hit rate across 10^8 accesses introduces `5,000,000 * 100 ns` = 500,000,000 ns = **500 ms** of theoretical stall time.
    - **Conclusion:** This cache thrashing completely explains the severe 70ms+ P99 delta.
