title: DPO vs PPO Infrastructure Cost for Alignment at 70B Scale
scenario: A team must choose between DPO and PPO for aligning a 70B model. Budget: 32xH100 for 1 week. Preference dataset: 200K pairs.
question: "With 32 H100s for 1 week and 200K preference pairs, should you choose DPO or PPO to align the 70B model, and why?"
details:
  realistic_solution: 'DPO memory: policy (140GB BF16) + reference model (140GB BF16) + optimizer (280GB for AdamW) = 560GB minimum. Requires ~14xH100. PPO memory: policy (140GB) + value head (~1GB) + reward model (14GB for 7B RM) + reference (frozen copy at FP8, ~70GB): ~225GB total, about 3xH100 for models. PPO is more GPU-efficient per GPU but requires more infrastructure complexity (rollout server, RM server, PPO trainer). At 32xH100 budget: DPO uses 14 GPUs leaving 18 for larger batch sizes. PPO uses 8 GPUs for models + rollout infrastructure, enabling larger effective batch. DPO training on 200K pairs at 32xH100: ~2-3 days. PPO: ~5-7 days due to rollout generation overhead. Recommendation: DPO for budget-constrained simpler implementation; PPO for iterative online alignment with real user feedback.'
  common_mistake: |
    **The Pitfall:** Assuming DPO is always cheaper than PPO.
    **The Rationale:** Engineers overlook that DPO requires loading both the policy and a full reference model simultaneously for log-probability ratios.
    **The Consequence:** The training job OOMs or requires significantly more GPUs than anticipated, exceeding budget constraints.
  napkin_math: |
    *   **Per-Sample FLOPs:** Forward/backward for policy and reference is $2 \times 512 \text{ seq} \times 70\text{e9 params} \times 2 = 143\text{T FLOPs}$.
    *   **Total FLOPs:** $200,000 \text{ samples} \times 143\text{T} = 28.6\text{ EFLOPS}$.
    *   **Compute Power:** 32xH100 at 989 TFLOPS with 40% MFU yields roughly 12.7 PFLOPS.
    *   **Result:** **Time per epoch is $28.6\text{E18} / 12.7\text{E15} \approx 2252 \text{ seconds}$ (37.5 minutes). 3 epochs take roughly 1.9 hours, easily fitting the 1-week budget.**
