title: Cost of Noisy Data Scaling
scenario: 'Your team trains a computer vision model for defect detection. The current dataset has 1 million images with 30% label noise, yielding 88% mAP. To reach the production target of 92% mAP, you need either 50 million noisy images or 5 million rigorously cleaned images. Scraping/auto-labeling costs $0.01 per image. Expert curation costs $0.10 per image. Cloud compute costs $0.02 per image (cumulative across all epochs).'
question: "What are the total data-plus-compute costs for 50M noisy images versus 5M cleaned images, and which path is cheaper?"
details:
  realistic_solution: 'The data-centric approach is highly optimal. While per-sample labeling is 10x more expensive, requiring 10x fewer samples equalizes the raw data cost. The data-centric approach then yields a massive $900k reduction in compute costs while achieving the exact same target accuracy.'
  common_mistake: |
    **The Pitfall:** Solely comparing the raw per-sample data costs ($0.01 vs $0.10) and concluding the noisy data pipeline is vastly cheaper.
    **The Rationale:** Managers fixate on the unit economics of the data acquisition phase, entirely forgetting that dataset volume dictates a massive, non-linear explosion in downstream GPU compute costs.
    **The Consequence:** The team chooses the "cheap" noisy data path, inadvertently triggering a catastrophic budget overrun due to the massive multiplier effect on training infrastructure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target mAP: 92%.
       - Noisy Strategy: 50M images @ $0.01/image. Compute @ $0.02/image.
       - Clean Strategy: 5M images @ $0.10/image. Compute @ $0.02/image.
    2. **Calculations:**
       - Noisy Data Cost = 50,000,000 × $0.01 = $500,000.
       - Noisy Compute Cost = 50,000,000 × $0.02 = $1,000,000.
       - Total Noisy Cost = $1,500,000.
       - Clean Data Cost = 5,000,000 × $0.10 = $500,000.
       - Clean Compute Cost = 5,000,000 × $0.02 = $100,000.
       - Total Clean Cost = $600,000.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Cost Bound Optimization**. By opting for 10x higher quality labels, the raw data costs equalize ($500k), but the clean dataset yields a massive $900k net reduction in hardware spend, making the data-centric approach 2.5x cheaper overall.
