title: Diagnosing Edge-to-Cloud Satellite Storage Saturation
scenario: A remote agricultural monitoring system collects 50GB of high-resolution crop images daily.
  The local edge server (2TB NVMe) connects to the cloud via a satellite link providing 5Mbps bandwidth
  for exactly 6 hours a day during off-peak times. The system uses a store-and-forward architecture to
  batch images and upload them for central ML analysis. Operations reports that the local storage is gradually
  filling up, leading to dropped frames by the end of the month despite the daily syncs.
question: "Can the 5 Mbps, 6-hour satellite window offload 50GB/day, and how should the pipeline avoid filling the 2TB buffer?"
details:
  realistic_solution: The daily data generated (50GB) far exceeds the daily transfer capacity of the satellite
    link during its active window (13.5GB). The system must employ local ML inference to filter out uninformative
    images or apply heavy compression before the store-and-forward step, reducing the daily payload to
    under 13GB.
  common_mistake: Focusing on local storage I/O bottlenecks or assuming the 6-hour window provides enough
    throughput to upload the daily 50GB payload without calculating the absolute data transfer capacity
    of the link.
  napkin_math: 'Link speed: 5 Mbps = 0.625 MB/s. Active window: 6 hours = 21,600 seconds. Daily capacity:
    0.625 MB/s * 21,600 s = 13,500 MB = 13.5 GB/day. Deficit: 50 GB - 13.5 GB = +36.5 GB/day added to
    local storage. Time to fill 2TB drive: 2000 GB / 36.5 GB/day ≈ 54 days.'
