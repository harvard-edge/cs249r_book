title: Multi-Tenant GPU Scheduling with SLO Guarantees
scenario: You operate a shared cluster with 200 GPUs. Tenant A (30% of cluster) requires latency-sensitive inference with a strict p99 < 50ms SLO. Tenant B (70% of cluster) runs best-effort batch training jobs.
question: How would you design a scheduling system to guarantee Tenant A's SLO while maximizing Tenant B's GPU utilization?
details:
  realistic_solution: 'Use MIG (Multi-Instance GPU) to carve 30% of GPUs into 3g.40gb MIG slices for Tenant A — guaranteed memory isolation and predictable latency. Reserve 140 GPUs for Tenant B training. Use a priority preemption policy: if Tenant A demand spikes, preempt Tenant B jobs with checkpoint-resume. Monitor p99 latency with 5s rolling window and trigger scaling at p95>40ms.'
  common_mistake: |
    **The Pitfall:** Using standard time-sliced GPU sharing for both tenants.
    **The Rationale:** Candidates assume time-slicing provides sufficient isolation without realizing the impact of memory contention and context switching on latency.
    **The Consequence:** Tenant B's large training batches consume HBM bandwidth, causing Tenant A's inference kernels to stall and violate the 50ms SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tenant A SLO: p99 < 50 ms.
       - Inference Latency on MIG 3g.40gb: ~15 ms.
    2. **Calculations:**
       - Latency Headroom: 50 ms - 15 ms = 35 ms.
       - Time-slicing context switch overhead: ~2 ms per 10 ms quantum (20% overhead) plus unquantifiable memory contention delays.
    3. **Conclusion & Interpretation:**
       **Result: MIG isolation required (Compute-Bound Mitigated).** Multi-Instance GPU (MIG) hardware isolation is mathematically required to eliminate context switch overhead and guarantee latency bounds.
