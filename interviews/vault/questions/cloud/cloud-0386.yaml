title: The Dominant Factor in TCO
scenario: For a large-scale ML model deployed in production for a 3-year period, which phase typically
  accounts for the largest portion of the Total Cost of Ownership (TCO)?
question: "For a large-scale ML model deployed in production for a 3-year period, which phase typically accounts for the largest portion of the Total Cost of Ownership (TCO)?"
details:
  realistic_solution: The cumulative cost of running the inference fleet over the system's lifecycle is
    typically the dominant factor in TCO. While training is a significant one-time capital expenditure
    (CapEx), a successful model serves requests 24/7 for years. This ongoing operational expenditure (OpEx)—encompassing
    energy, cooling, hardware maintenance, and the amortized cost of the inference servers themselves—dwarfs
    the initial training bill.
  common_mistake: Engineers often fixate on the massive upfront cost and computational effort of training
    a large model. They see headlines about multi-million dollar training runs and assume that must be
    the biggest expense, underestimating the long-tail cost of continuous, at-scale operation.
  napkin_math: 'Let''s model a simplified TCO for a popular 70B model over 3 years.

    1. **Training:** ~2,000 GPUs for 1 month × $3/hr = $4.3 Million CapEx.

    2. **Inference Fleet:** 1,000 GPUs running 24/7.

    1,000 GPUs × 24 hrs × 365 days × 3 years = 26.28 Million GPU-hours.

    3. **Inference Cost:** 26.28M hrs × $3/hr = $78.8 Million OpEx.

    Continuous inference costs ~18x more than the initial training run.'
  options:
  - The one-time cost of the initial model training run.
  - The cumulative cost of running the inference fleet.
  - The cost of data acquisition and labeling.
  - The salaries of the engineering team maintaining the model.
  correct_index: 1
