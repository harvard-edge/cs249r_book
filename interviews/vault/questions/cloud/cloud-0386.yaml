title: The Dominant Factor in TCO
scenario: A large-scale ML model is being evaluated for deployment in production over a 3-year lifecycle.
question: "Which phase typically accounts for the largest portion of the Total Cost of Ownership (TCO)?"
details:
  realistic_solution: The cumulative cost of running the inference fleet over the system's lifecycle is typically the dominant factor in TCO. While training is a significant one-time capital expenditure (CapEx), a successful model serves requests 24/7 for years. This ongoing operational expenditure (OpEx)—encompassing energy, cooling, hardware maintenance, and the amortized cost of the inference servers themselves—dwarfs the initial training bill.
  common_mistake: |
    **The Pitfall:** Fixating on the massive upfront cost and computational effort of training a large model.
    **The Rationale:** Headlines emphasize multi-million dollar training runs, leading engineers to assume it's the biggest expense.
    **The Consequence:** Underestimating the long-tail operational cost of continuous, at-scale inference serving.
  napkin_math: |
    1. **Training:** ~2,000 GPUs for 1 month × $3/hr = $4.3 Million CapEx.
    2. **Inference Fleet:** 1,000 GPUs running 24/7. 1,000 GPUs × 24 hrs × 365 days × 3 years = 26.28 Million GPU-hours.
    3. **Inference Cost:** 26.28M hrs × $3/hr = $78.84 Million OpEx.
    4. Continuous inference costs **~18x more** than the initial training run.
  options:
  - The one-time cost of the initial model training run.
  - The cumulative cost of running the inference fleet.
  - The cost of data acquisition and labeling.
  - The salaries of the engineering team maintaining the model.
  correct_index: 1
