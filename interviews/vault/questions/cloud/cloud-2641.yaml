title: The Ridge Point and Hardware Balance
scenario: You are comparing workload performance and memory bounds across generations of datacenter GPUs.
question: "What are the A100 and H100 hardware balance points, and what do they imply for workload optimization?"
details:
  realistic_solution: 'Hardware balance = peak FLOPS / peak bandwidth. The H100''s ridge point is nearly 2x higher than the A100''s. This means workloads need ~2x higher arithmetic intensity on H100 to be compute-bound. Operations that were compute-bound on A100 (e.g., large matmuls at AI=200) may become memory-bound on H100 (since 200 < 295). This is the ''compute-bandwidth gap'' widening each GPU generation. It means: (1) kernel fusion and data reuse become more critical on newer GPUs, (2) memory-bound operations (attention, LayerNorm) become relatively more expensive, and (3) batch sizes may need to increase to push arithmetic intensity above the new ridge.'
  common_mistake: |
    **The Pitfall:** Assuming a kernel that is compute-bound on A100 is also compute-bound on H100.
    **The Rationale:** Candidates often forget that memory bandwidth doesn't scale as fast as FLOPs across generations.
    **The Consequence:** Porting unoptimized code to H100 and seeing poor utilization because the workload shifted to memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:** A100: 312 TFLOPS (FP16), 2.0 TB/s memory bandwidth. H100: 989 TFLOPS, 3.35 TB/s memory bandwidth.
    2. **Calculations:** A100 ridge point = 312e12 FLOPs / 2.0e12 Bytes = 156 FLOPs/byte. H100 ridge point = 989e12 FLOPs / 3.35e12 Bytes = 295 FLOPs/byte.
    3. **Conclusion & Interpretation:** **Result: Ridge point nearly doubled.** More operations become Memory-Bound on newer hardware.
