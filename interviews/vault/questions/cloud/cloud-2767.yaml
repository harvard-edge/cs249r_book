title: OOD Detection Strategy Selection
scenario: 'Your autonomous driving perception model must detect OOD inputs (novel objects, weather conditions
  never seen in training). Options: (A) softmax temperature scaling + threshold, (B) deep ensemble (5
  models) with disagreement metric, (C) feature-space density estimation with normalizing flow. Evaluate
  for safety-critical deployment.'
details:
  realistic_solution: 'Option A (temperature scaling): Cheapest (zero additional compute). Improves calibration
    on near-distribution data but unreliable for far-OOD inputs. In safety-critical applications, it will
    miss novel objects that the model has never seen. Insufficient for autonomous driving. Option B (deep
    ensemble): Train 5 models independently. On in-distribution data, they agree; on OOD data, they disagree
    (high predictive entropy). Strong theoretical and empirical support for OOD detection. Cost: 5x inference
    compute and memory. For real-time driving at 30 FPS, this means 5× the GPU requirement. However, ensemble
    disagreement is one of the most reliable OOD signals. Option C (normalizing flow): Learns the density
    of in-distribution features. Assigns low likelihood to OOD inputs. Single forward pass overhead. Good
    at detecting far-OOD (completely novel inputs) but can miss near-OOD (subtle distribution shifts).
    Recommendation: B for safety-critical deployment — the 5x cost is justified when lives are at stake.
    Augment with C as a secondary detector for far-OOD edge cases. Combine both signals for maximum coverage.'
  common_mistake: Choosing option A (temperature scaling) for safety-critical applications. Temperature
    scaling only recalibrates confidence — it does not fundamentally fix the OOD problem because softmax
    still assigns high probability to the closest in-distribution class.
  napkin_math: 'A: +0% cost, poor OOD detection. B: +400% compute cost, best OOD detection. C: +10% cost,
    good for far-OOD. Safety-critical: B+C worth the 5x compute cost.'
