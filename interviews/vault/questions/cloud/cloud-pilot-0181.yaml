title: AllReduce Step Time Regression
scenario: A 512-GPU training job used to spend 180 ms/step, with 40 ms exposed communication. After moving from 8-GPU nodes to 4-GPU nodes, step time rises to 245 ms even though per-GPU compute is unchanged. Gradients are 12 GB per step, intra-node bandwidth is 900 GB/s, and inter-node bandwidth is 50 GB/s. Diagnose the communication regression.
question: Why did step time increase after moving from 8-GPU nodes to 4-GPU nodes if per-GPU compute is unchanged?
details:
  realistic_solution: The likely regression is more gradient traffic crossing the slower inter-node fabric. With fewer GPUs per node, the hierarchical all-reduce has less intra-node aggregation and more participants at the inter-node stage. The exposed communication grows because the bottleneck moved from fast NVLink aggregation to slower network bandwidth.
  common_mistake: Blaming GPU kernels or optimizer changes when compute time is unchanged and the topology changed.
  napkin_math: A 12 GB gradient over 50 GB/s has a lower bound of 240 ms before ring factors and overlap; over 900 GB/s it is only 13 ms. More traffic on the 50 GB/s tier can easily add tens of milliseconds.
