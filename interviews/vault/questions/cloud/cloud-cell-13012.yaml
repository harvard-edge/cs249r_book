title: 'Queueing Theory Recall: Little''s Law in Inference Systems'
scenario: State Little's Law and apply it to an H100 inference server (80GB HBM3, 3.35TB/s) serving LLaMA-70B.
  If the server processes 50 requests concurrently (L=50) and mean service time is 2 seconds per request,
  what is the throughput? What happens to throughput if latency doubles to 4 seconds while concurrency
  stays at 50?
details:
  realistic_solution: H100 FP16 is 989 TFLOPS. MFU = actual_throughput / (989 TFLOPS × theoretical_max).
    Using 1979 TFLOPS would halve the apparent MFU.
  common_mistake: 'Confusing Little''s Law L = λW with its variables: L = average items in system, λ =
    throughput, W = average time in system.'
  napkin_math: 'H100 at 989 TFLOPS FP16. MFU calculation: observed throughput / (989T × batch_size × seq_len
    / (6N)). At 989 TFLOPS, 45% MFU = 445 TFLOPS effective throughput.'
