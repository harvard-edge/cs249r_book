title: MoE Batch Size Impact on Expert Utilization
scenario: Your MoE inference service runs well at batch size 64 (all experts utilized, P50 latency 18ms).
  When traffic drops and batch size falls to 4, you observe that only 3 of 8 experts receive any tokens,
  and latency paradoxically increases to 25ms. Diagnose why smaller batches hurt MoE serving.
question: "If batch size 4 produces 8 independent expert choices over 8 experts, how many distinct experts are expected to be activated?"
details:
  realistic_solution: E[distinct experts] = 8 × (1 - (7/8)^8) = 8 × (1 - 0.343) = 8 × 0.657 = 5.25 (not
    5.7).
  common_mistake: Assuming smaller batches should always be faster. In MoE, small batches create sparse
    expert activation patterns that reduce GPU utilization and amplify load imbalance.
  napkin_math: 'Expected distinct experts activated from N=8 total when each of M tokens picks top-2 independently:
    E[distinct] = 8 × (1 - (1 - 2/8)^M) = 8 × (1 - 0.75^M). For large M (batch), all 8 are activated.
    For M=4 tokens: 8×(1-0.75^4) = 8×(1-0.3164) = 8×0.6836 = 5.47. For 8 tokens: 8×(1-0.75^8) = 8×(1-0.1)
    = 8×0.9 = 7.2. For specific case giving 5.25: 8×(1-(7/8)^M). With M=8: 8×(1-(7/8)^8) = 8×(1-0.343)
    = 8×0.657 = 5.26 ≈ 5.25 (not 5.7).'
