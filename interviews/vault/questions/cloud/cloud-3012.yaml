title: 'Dataset Curation: Evaluate Training Data Quality Metrics for LLM Fine-Tuning'
scenario: You are fine-tuning a 13B LLM on H100s for a customer service bot using 200K conversation examples. Before training, you evaluate two proposed dataset quality metrics: (A) instruction-following rate, and (B) semantic diversity score.
question: Which metric better predicts downstream task performance: instruction-following rate or semantic diversity score?
details:
  realistic_solution: 'Instruction-following rate catches formatting issues but misses quality. Semantic diversity catches repetitive data that causes mode collapse. Best: combine both + a held-out task metric (customer resolution proxy). Evaluate correlation of each metric with held-out task performance.'
  common_mistake: |
    **The Pitfall:** Relying solely on surface-level metrics like format compliance.
    **The Rationale:** Candidates prefer metrics that are computationally cheap to evaluate, ignoring whether the data is actually diverse or high-quality.
    **The Consequence:** Training on a dataset with mode collapse or highly repetitive examples, leading to poor downstream task performance.
  napkin_math: |
    - 1. Evaluate Metric A (Regex format check): 200K samples * 0.1ms = 20 seconds. Identifies 8% non-compliant (16K examples).
    - 2. Evaluate Metric B (Semantic distance): Embed 200K samples. Computing O(N²) pairwise distances is 40B operations (too slow).
    - 3. Optimize Metric B: Sample 10K subset (100M operations = 1s on GPU). Identify near-duplicates (distance < 0.1) = ~12K examples to remove.
    - 4. Conclusion: Metric B (Semantic diversity) is much more predictive, but **combining A + B** removes ~14% of low-quality data and provides the highest performance lift.
