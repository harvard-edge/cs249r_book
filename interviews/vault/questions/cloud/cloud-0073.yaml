title: 'The Real-Time Batching Dilemma: Latency Decomposition'
scenario: You are deploying a Llama 70B model on a single H100 GPU for a real-time chatbot. The product
  team has a strict requirement that the time-to-first-token (TTFT) must be under 300ms. Given the hardware
  specs, explain how batch size impacts TTFT and calculate the maximum theoretical batch size you can
  use while staying within this latency budget. For this calculation, you can ignore all overheads like
  network latency and CUDA kernel launch times, focusing only on the raw prefill computation. Assume a
  prompt length of 512 tokens.
details:
  realistic_solution: 'The prefill step is compute-bound (large matrix multiplications), so use the GPU''s
    FLOPS, not memory bandwidth. For a 70B model with L=512 token prompts, each sequence requires 2 ×
    70B × 512 = 71.68 TFLOPs of prefill compute. On an H100 at 989 TFLOPS FP16: B_max = (0.3s × 989 TFLOPS)
    / 71.68 TFLOPs = 4.14 → B = 4. Key insight: TTFT scales linearly with batch size because prefill is
    compute-bound, so doubling the batch approximately doubles the latency.'
  common_mistake: Engineers often make unit errors or misidentify the bottleneck. A common error is mixing
    up TFLOPS and GFLOPS, leading to a 1000x error in the calculation. Another is incorrectly assuming
    the prefill stage is memory-bound and basing the calculation on HBM bandwidth, rather than being compute-bound.
    Finally, a simple slip is forgetting the `2 * P` rule of thumb for inference FLOPs, leading to an
    off-by-2x error.
  napkin_math: '1. **FLOPs for prefill (per sequence):** Rule of thumb: 2 × Parameters FLOPs per token.
    For 70B model: 2 × 70B = 140 GFLOPs/token. With prompt length L = 512 tokens: 140 GFLOPs × 512 = 71.68
    TFLOPs per sequence. 2. **Prefill time for batch size B:** Time = (B × 71.68 TFLOPs) / 989 TFLOPS.
    3. **Solve for B_max at 300ms:** 0.3 = (B × 71.68e12) / 989e12 → B = (0.3 × 989) / 71.68 = 296.7 /
    71.68 ≈ 4.14. 4. **Maximum batch size: B = 4** (round down). At B=4: TTFT = 4 × 71.68 / 989 = 0.290s
    = 290ms ✓. At B=5: TTFT = 5 × 71.68 / 989 = 0.362s = 362ms ✗.'
  options:
  - ~2. This makes a 1000x error by mixing GFLOPS and TFLOPS units.
  - ~7. This incorrectly uses memory bandwidth instead of compute throughput, confusing a compute-bound
    problem with a memory-bound one.
  - ~4. For L=512 token prompts, each request requires 71.68 TFLOPs of prefill compute. The H100 at 989
    TFLOPS can fit ~4 requests in the 300ms budget.
  - ~2120. This incorrectly treats each request as a single token, ignoring that prefill processes the
    entire 512-token prompt.
  correct_index: 2
