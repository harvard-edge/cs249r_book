title: 'The Real-Time Batching Dilemma: Latency Decomposition'
scenario: You are deploying a Llama 70B model on a single H100 GPU (989 TFLOPS FP16) for a real-time chatbot. The strict requirement is that the time-to-first-token (TTFT) must be under 300ms. Assume a prompt length of 512 tokens.
question: "How does batch size affect TTFT for the 70B FP16 model with 512-token prompts, and what maximum batch fits under 300ms on H100?"
details:
  realistic_solution: 'The prefill step is compute-bound (large matrix multiplications), so use the GPU''s FLOPS, not memory bandwidth. For a 70B model with L=512 token prompts, each sequence requires 2 × 70B × 512 = 71.68 TFLOPs of prefill compute. On an H100 at 989 TFLOPS FP16: B_max = (0.3s × 989 TFLOPS) / 71.68 TFLOPs = 4.14 -> B = 4. Key insight: TTFT scales linearly with batch size because prefill is compute-bound, so doubling the batch approximately doubles the latency.'
  common_mistake: |
    **The Pitfall:** Incorrectly assuming the prefill stage is memory-bound and basing calculations on HBM bandwidth instead of FLOPs.
    **The Rationale:** Candidates often conflate the memory-bound autoregressive decoding phase with the highly parallel, compute-bound prefill phase.
    **The Consequence:** Drastically underestimating the maximum viable batch size, leading to severe underutilization of the GPU.
  napkin_math: |
    - Rule of thumb for inference compute: 2 × Parameters FLOPs per token.
    - 70B model compute: 2 × 70B = 140 GFLOPs/token.
    - For a prompt length L = 512: 140 GFLOPs × 512 = 71.68 TFLOPs per sequence.
    - Hardware limit: H100 provides 989 TFLOPS.
    - Max batch computation allowed in 300ms = 0.3s × 989 TFLOPS = 296.7 TFLOPs.
    - Maximum Batch Size (B_max) = 296.7 / 71.68 ≈ 4.14.
    - **The maximum batch size that fits under the 300ms budget is 4.**
  options:
  - ~2. This makes a 1000x error by mixing GFLOPS and TFLOPS units.
  - ~7. This incorrectly uses memory bandwidth instead of compute throughput, confusing a compute-bound problem with a memory-bound one.
  - ~4. For L=512 token prompts, each request requires 71.68 TFLOPs of prefill compute. The H100 at 989 TFLOPS can fit ~4 requests in the 300ms budget.
  - ~2120. This incorrectly treats each request as a single token, ignoring that prefill processes the entire 512-token prompt.
  correct_index: 2
