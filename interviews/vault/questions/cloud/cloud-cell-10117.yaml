title: 'Mastery: explain why inverted residuals outperform standard bottlenecks on memory-bandwidth-limited
  hardware'
scenario: A senior engineer claims that inverted residuals in MobileNetV2 are faster than ResNet bottlenecks
  on A100 purely because of fewer FLOPs. You disagree and believe the memory access pattern is equally
  important. Construct a roofline model argument using the A100's arithmetic intensity threshold to explain
  the performance difference.
details:
  realistic_solution: Standard conv weight bandwidth depends on kernel size × in_channels × out_channels.
    For the specific layer, weight BW ≈ 1.18MB + input BW ≈ 1.2MB total (not 0.8MB).
  common_mistake: Accepting the FLOP-only explanation without analyzing that the depthwise layer in inverted
    residuals has much lower arithmetic intensity than standard convolutions, and that this matters only
    when the bandwidth ceiling is the constraint.
  napkin_math: 'Standard 3×3 conv weight bandwidth: filter_size × in_channels × out_channels × bytes.
    For typical conv layer: 3×3×64×128×4B = 294,912B = 288KB. Plus input activations: H×W×C×4B. For 28×28×64
    input: 28×28×64×4B = 200,704B = 196KB. Total bandwidth: 288KB + 196KB ≈ 484KB... for specific layer
    with 3×3×64×64: 3×3×64×64×4B = 147,456B = 144KB weights. Input: 56×56×64×4B = 802,816B = 784KB. Total:
    ~928KB. Corrected: weights alone ≈ 1.18MB for the specific layer described (not 0.8MB which underestimates
    by ~48%).'
