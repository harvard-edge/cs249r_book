title: 'SustainabilityML: Reporting Carbon per Training Run'
scenario: You need to fill out a carbon disclosure for a 7B model training run that used 1,024 A100 GPUs for 72 hours in a data center with PUE=1.35. The data center uses a power mix of 60% renewables (0 gCO2e/kWh) and 40% natural gas (500 gCO2e/kWh).
question: Calculate the IT energy, facility energy, market-based emissions, and location-based emissions (assuming a regional grid of 350 gCO2e/kWh) for the training run.
details:
  realistic_solution: '(a) IT load: 1,024 A100s × 400W TDP × 72 hours = 1,024 × 0.4 kW × 72 hr = 29,491 kWh (upper bound, assumes 100% utilization). (b) Facility energy: 29,491 × PUE 1.35 = 39,813 kWh. (c) Market-based emissions: using contractual power mix 60% renewable + 40% natural gas. Effective intensity = 0.60 × 0 + 0.40 × 500 = 200 gCO2e/kWh. Market-based: 39,813 kWh × 200 gCO2e/kWh = 7,963 kgCO2e ≈ 8.0 tCO2e. (d) Location-based: 39,813 kWh × 350 gCO2e/kWh = 13,935 kgCO2e ≈ 13.9 tCO2e. The GHG Protocol requires reporting both market-based and location-based figures. The 5.9 tCO2e gap represents the claimed benefit of renewable energy procurement.'
  common_mistake: |
    **The Pitfall:** Using peak TDP (400W) for all GPUs for the full duration instead of average utilization.
    **The Rationale:** Candidates often equate peak thermal design power with continuous operational power draw, forgetting that training workloads rarely sustain 100% utilization.
    **The Consequence:** Significantly overestimating the carbon footprint and energy costs of the training run.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 1,024 A100s, 400W TDP, 72 hours.
       - Datacenter: PUE 1.35.
       - Power mix: 60% renewable (0 gCO2e/kWh), 40% natural gas (500 gCO2e/kWh). Regional grid: 350 gCO2e/kWh.
    2. **Calculations:**
       - IT Load: 1,024 * 0.4 kW * 72 hours = 29,491 kWh.
       - Facility Energy: 29,491 kWh * 1.35 PUE = 39,813 kWh.
       - Market-Based Intensity: (0.60 * 0) + (0.40 * 500) = 200 gCO2e/kWh.
       - Market-Based Emissions: 39,813 kWh * 0.200 kgCO2e/kWh = 7,963 kgCO2e.
       - Location-Based Emissions: 39,813 kWh * 0.350 kgCO2e/kWh = 13,935 kgCO2e.
    3. **Conclusion & Interpretation:**
       - **Result: Environmental Impact.** IT Load is 29.5 MWh, Facility is 39.8 MWh, Market-based is ~8.0 tCO2e, and Location-based is ~13.9 tCO2e.
