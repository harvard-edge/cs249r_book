title: 'SustainabilityML: Reporting Carbon per Training Run'
scenario: You need to fill out a carbon disclosure for a 7B model training run that
  used 1,024 A100 80GB GPUs for 72 hours in a data center with PUE=1.35. The data
  center uses a power mix of 60% renewables (0 gCO2e/kWh) and 40% natural gas (500
  gCO2e/kWh). Calculate (a) total energy consumed (IT load only), (b) total facility
  energy including overhead, (c) market-based emissions accounting, (d) location-based
  emissions if regional grid is 350 gCO2e/kWh.
question: What are the IT energy, facility energy, market-based emissions, and location-based
  emissions for the 1,024-A100, 72-hour training run?
details:
  realistic_solution: '(a) IT load: 1,024 A100s × 400W TDP × 72 hours = 1,024 × 0.4
    kW × 72 hr = 29,491 kWh (upper bound, assumes 100% utilization). (b) Facility
    energy: 29,491 × PUE 1.35 = 39,813 kWh. (c) Market-based emissions: using contractual
    power mix 60% renewable + 40% natural gas. Effective intensity = 0.60 × 0 + 0.40
    × 500 = 200 gCO2e/kWh. Market-based: 39,813 kWh × 200 gCO2e/kWh = 7,963 kgCO2e
    ≈ 8.0 tCO2e. (d) Location-based: 39,813 kWh × 350 gCO2e/kWh = 13,935 kgCO2e ≈
    13.9 tCO2e. The GHG Protocol requires reporting both market-based and location-based
    figures. The 5.9 tCO2e gap represents the claimed benefit of renewable energy
    procurement.'
  common_mistake: Using peak TDP (400W) for all GPUs for the full duration instead
    of average utilization. Training jobs rarely sustain 100% GPU utilization — the
    average is typically 60-80%. Without utilization data, the standard practice is
    to use TDP as an upper bound and note this in the disclosure.
  napkin_math: 'IT load: 1024 × 0.4 × 72 = 29,491 kWh. Facility: × 1.35 = 39,813 kWh.
    Market: × 0.200 kgCO2e/kWh = 7,963 kgCO2e. Location: × 0.350 = 13,935 kgCO2e.
    Per GPU-hour: 7,963 kg / (1024 × 72 hr) = 0.108 kgCO2e/GPU-hour (market). Contextual
    comparison: GPT-3 training estimated at 552 tCO2e (Patterson et al. 2021). This
    7B run: 8 tCO2e = 1.4% of GPT-3''s training carbon. Carbon intensity per parameter:
    8,000 kg / 7B params = 1.14 µgCO2e/parameter.'
