title: Data Skew OOMs in Preprocessing
scenario: Our Spark preprocessing pipeline processes a 5TB ad-click dataset using 100 executor nodes (8 cores, 64GB RAM each). The pipeline frequently crashes with Out-Of-Memory (OOM) errors on a small handful of specific nodes during the user-item join phase, despite the cluster having 6.4TB total RAM.
question: Why do only a few Spark executors OOM during the user-item join, and how would you change the join to fix it?
details:
  realistic_solution: |
    The symptom (OOMs strictly on a few specific nodes during a join, while total cluster memory is highly abundant) is the classic signature of data skew. A small number of highly active users (e.g., bots) or wildly popular items are hashing to the exact same partition during the shuffle phase. This forces a single executor to load hundreds of gigabytes of data into RAM, causing an OOM. The solution involves identifying the skewed keys. If joining a large clickstream table with a smaller item table, use a Broadcast Hash Join to avoid shuffling entirely. If both tables are large, apply a 'salting' technique: append a random integer (e.g., 1 to 100) to the skewed keys in the large table, and replicate the skewed keys 100 times in the smaller table. This evenly distributes the skewed data across 100 partitions, entirely eliminating the OOM.
  common_mistake: |
    **The Pitfall:** Blindly increasing executor memory or shuffle partitions.
    **The Rationale:** Candidates assume the overall data volume is too large for the configuration, rather than diagnosing skewed data distribution on specific keys.
    **The Consequence:** The OOMs persist because a single hot key (like a bot) will still overwhelm the expanded memory of a single node.
  napkin_math: |
    - 5TB dataset / 2000 partitions = 2.5GB per partition (fits in 64GB RAM).
    - If one bot accounts for 5% of clicks, that partition gets 250GB. 250GB > 64GB RAM = OOM.
    - **Conclusion:** **Salting with 100 random prefixes splits the 250GB into 100 uniform chunks of 2.5GB, fixing the OOM.**
