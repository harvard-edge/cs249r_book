title: Data Skew OOMs in Preprocessing
scenario: 'Our Spark preprocessing pipeline processes a 5TB ad-click dataset using 100 executor nodes. The pipeline frequently crashes with Out-Of-Memory (OOM) errors on a small handful of specific nodes during the user-item join phase, despite the cluster having 6.4TB total RAM.'
question: 'Why do only a few Spark executors OOM during the user-item join, and how would you change the join to fix it?'
details:
  realistic_solution: 'The symptom—isolated OOMs during a shuffle phase—is the classic signature of Data Skew. A small number of highly active users (e.g., bots) hash to the exact same partition, forcing a single executor to load massive data into RAM. If joining with a small item table, use a Broadcast Hash Join. If both tables are large, apply Salting: append a random integer (e.g., 1 to 100) to the skewed keys and replicate the smaller table 100 times, perfectly distributing the load.'
  common_mistake: |
    **The Pitfall:** Blindly increasing executor memory or shuffle partitions.
    **The Rationale:** Candidates assume the overall data volume is too large for the configuration, rather than diagnosing skewed data distribution on specific keys.
    **The Consequence:** The OOMs persist because a single hot key will still overwhelm the expanded memory of any single node.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5TB dataset, 2000 partitions.
       - Node RAM: 64GB.
    2. **Calculations:**
       - Average partition: 5TB / 2000 = 2.5GB (safely fits in 64GB).
       - Skewed key (5% of clicks) = 250GB. 250GB > 64GB = OOM.
    3. **Conclusion & Interpretation:**
       - **Result: Salting with 100 random prefixes splits the 250GB hot key into 100 uniform 2.5GB chunks, fixing the OOM (Skew-Bound).**
