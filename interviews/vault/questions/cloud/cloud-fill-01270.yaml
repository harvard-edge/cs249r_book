title: Real-time ML Output Drift Detection on AMD MI300X
scenario: Your team is responsible for a critical generative AI service deployed on AMD MI300X accelerators
  in a cloud environment. This service processes millions of requests per second, generating 1024-dimensional
  FP16 embeddings as part of its output. Given the MI300X's 192 GB HBM3 and 5.3 TB/s memory bandwidth,
  and its 1,307 TFLOPS FP16 sparse compute capability, you need to ensure the reliability of these outputs
  by detecting data drift in real-time. Training-serving skew and concept drift are major concerns due
  to evolving user input and model updates. You're tasked with designing a robust system to monitor the
  statistical properties of these high-volume embedding outputs, leveraging the MI300X's capabilities.
question: "How would you build real-time drift detection for 1024-D FP16 embeddings on MI300X while minimizing serving overhead?"
details:
  realistic_solution: Implement a real-time drift detection pipeline that samples a statistically significant
    fraction of the MI300X's output embeddings directly from HBM3 buffers. Utilize statistical metrics
    like KL divergence or Population Stability Index (PSI) to compare the current distribution of embeddings
    against a known baseline. Integrate this with an automated alerting system that triggers when drift
    exceeds predefined thresholds, allowing for immediate investigation and potential model retraining
    or rollback. This entire process should be optimized to run efficiently on the MI300X itself, minimizing
    overhead.
  common_mistake: Neglecting to implement a continuous, low-latency monitoring solution for model outputs,
    assuming that post-deployment A/B tests or periodic offline validation are sufficient. This often
    leads to silent degradation of model quality and negative user experience before issues are detected
    and addressed.
  napkin_math: 'Given the 192 GB HBM3 on an AMD MI300X, if you are sampling 1024-dimensional FP16 embedding
    vectors (each 2KB) for real-time drift analysis:

    1. How many such embedding vectors can the MI300X hold entirely in its HBM3?

    2. If you dedicate 50% of the HBM3 for storing historical and current embedding distributions for
    comparison, approximately how many batches, each containing 1 million embeddings, could you maintain
    for immediate analysis?'
