title: 'Queueing Theory Design: Multi-Server M/M/c for Inference Cluster'
scenario: Design a multi-server inference system using M/M/c queuing (c servers in parallel) for serving Mistral-7B on H100s. Arrival rate is 100 req/s, and mean service time per server is 50ms.
question: Determine the minimum c to achieve P99 < 200ms, and compare to the throughput and latency of a naive single-server design.
details:
  realistic_solution: Utilize an M/M/c queuing model to determine the appropriate number of servers. An M/M/c setup significantly improves tail latency over an M/M/1 model at the same overall utilization because requests can be routed to any available server, preventing head-of-line blocking from transient slow requests.
  common_mistake: |
    **The Pitfall:** Not recognizing that M/M/c fundamentally changes the utilization-latency curve.
    **The Rationale:** Candidates often analyze capacity linearly, assuming 10 servers at 80% load behave identically to 1 server at 80% load.
    **The Consequence:** The design dramatically over-provisions hardware or fails to meet tail latency SLAs because it does not account for statistical multiplexing efficiency.
  napkin_math: |
    1. **System Load:** Arrival rate λ = 100/s, service rate μ = 1 / 0.05 = 20/s per server. Total load a = λ / μ = 5 Erlangs.
    2. **Minimum Servers:** We need c > 5 for stability. Let's evaluate c=8.
    3. **Utilization:** Total utilization ρ = a / c = 5 / 8 = 62.5%.
    4. **Queueing Wait Time (Wq):** Using Erlang C, the probability of delay is P(retry) ≈ 0.167.
    5. **Wait Time Calculation:** The corrected wait time Wq is approximately **5.9ms**.
