title: Diagnosing GEMM Tensor Core Underutilization
scenario: Profiling a custom Transformer model reveals two structurally similar matrix multiplications. The first has dimensions M=1023, K=4096, N=4096, while the second has M=1024, K=4096, N=4096. The first achieves only 45 TFLOPs, while the second achieves over 200 TFLOPs in mixed precision (FP16).
question: "Why does the M=1023 GEMM achieve 45 TFLOPs while the M=1024 GEMM exceeds 200 TFLOPs in FP16 PyTorch?"
details:
  realistic_solution: The M=1023 dimension prevents optimal Tensor Core tile sizing (which requires multiples of 8 or 16 for FP16), forcing cuBLAS to fall back to inefficient CUDA cores. Pad the M dimension to 1024.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is memory bandwidth or thermal throttling.
    **The Rationale:** Engineers overlook structural dimension alignment requirements specific to hardware accelerators.
    **The Consequence:** Severe compute underutilization that cannot be fixed by caching or system-level tuning.
  napkin_math: |
    **Assumptions & Constraints:**
    - GEMM1 unaligned (M=1023), GEMM2 aligned (M=1024).

    **Calculations:**
    - GEMM1 FLOPs = 34.3 GFLOPs. At 45 TFLOPS (CUDA cores) -> 0.76ms.
    - GEMM2 FLOPs = 34.36 GFLOPs. At 200 TFLOPS (Tensor Cores) -> 0.17ms.

    **Conclusion & Interpretation:**
    - **Result: Padding yields a 4.5x Tensor Core speedup (Compute-Bound)**. Padding adds 0.1% operations.
