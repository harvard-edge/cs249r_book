title: Feature Store Entity Key Design
scenario: 'A feature store organizes features by entity keys (user_id, item_id, session_id). Your model
  needs a feature that combines user and item data: ''user_category_affinity'' — how much a specific user
  prefers a specific item category. What entity key do you use, and what are the storage implications
  compared to user-level features?'
question: "What entity key do you use, and what are the storage implications compared to user-level features?"
details:
  realistic_solution: 'Use a composite entity key: (user_id, category_id). This creates a cross-entity
    feature — one row per user-category pair. Trade-off: cardinality explodes. If you have 10M users and
    1,000 categories, the theoretical maximum is 10B rows. In practice, most users interact with 20-50
    categories, so actual cardinality is 10M × 30 = 300M rows. Storage strategy: store only observed pairs
    (sparse representation). Online serving: batch MGET with keys like ''user_123:cat_electronics'', ''user_123:cat_books''.
    For candidates with unknown categories, return a default value (global category average). This pattern
    is standard in recommendation systems — Feast calls these ''feature views'' with composite entities.'
  common_mistake: Storing this as a user-level feature with a nested map of categories. This creates variable-length
    values, breaks efficient MGET batching, and makes point-in-time joins complex.
  napkin_math: 'User-level features: 10M entities × 200 features × 8 bytes = 16 GB. Cross-entity (user
    × category): 300M pairs × 1 feature × 8 bytes = 2.4 GB. Total store: 18.4 GB — fits in a single Redis
    instance (64 GB). Lookup cost: 100 candidates × 1 category each = 100 additional MGET keys per request.
    At 0.01ms per key in MGET: +1ms latency.'
