title: The Vector Index Staleness Window
scenario: Your RAG-powered customer support system uses a nightly batch job to re-index updated knowledge
  base articles into a vector database. A new product launches at 9 AM with updated documentation, but
  the RAG system keeps citing the old product specs all day. Users are frustrated. What is the systems
  root cause, and what architectural pattern solves it?
question: "What is the systems root cause, and what architectural pattern solves it?"
details:
  realistic_solution: 'The root cause is batch-indexed vector databases have an inherent staleness window
    equal to the indexing interval (24 hours in this case). Unlike a keyword index (which can update in
    seconds), HNSW indexes require expensive graph reconnection on insert. The fix: implement a hybrid
    architecture with a (1) bulk HNSW index for the stable corpus rebuilt nightly, and (2) a real-time
    flat/IVF index for documents modified in the last 24 hours. At query time, search both indexes and
    merge results. The real-time index is small enough (<10K docs) that brute-force or IVF search is fast.
    Alternatively, use a vector DB that supports streaming inserts (e.g., Milvus, Weaviate) with background
    compaction.'
  common_mistake: Blaming the embedding model or retrieval quality. The model is fine — it's faithfully
    retrieving the most similar documents. The documents themselves are stale because the index hasn't
    been refreshed.
  napkin_math: 'Nightly rebuild of 5M docs HNSW index takes ~2 hours (O(N log N) construction). Real-time
    flat search on 500 changed docs: 500 * 1536 dims * 2 FLOPs = 1.5M FLOPs. At modern CPU speeds, this
    takes <1ms. Combining HNSW base search with an exhaustively searched real-time delta reduces staleness
    from 24h to seconds.'
