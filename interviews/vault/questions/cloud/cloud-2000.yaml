title: Evaluating Hedged Requests for Fan-Out Inference
scenario: 'A cloud recommendation system fans out incoming queries to 50 separate embedding shards hosted on NVIDIA T4s via Triton Inference Server. The individual server median latency is 20ms, but the P99 is 200ms due to dynamic batching queues and network jitter. A user request is blocking and requires responses from all 50 shards. You must evaluate two architectural options to guarantee a strict 50ms overall system P99 SLA: (A) Issue hedged requests to a secondary replica if no response is received within 25ms, or (B) Over-provision GPU capacity by 2x to reduce individual server utilization from 80% down to 40%.'
question: 'Which option should you use to meet the 50ms system P99 SLA: hedged requests at 25ms or 2x GPU over-provisioning, and why?'
details:
  realistic_solution: Choose Strategy A (Hedged Requests). In a high fan-out architecture, the probability of at least one server hitting the P99 is extremely high, dictating the median user experience. Hedging after the 90th percentile latency suppresses the tail mathematically with minimal extra compute load, whereas over-provisioning doubles hardware costs while still leaving the system vulnerable to background noise.
  common_mistake: |
    **The Pitfall:** Believing the system-level P99 equals the individual node P99.
    **The Rationale:** Candidates incorrectly choose over-provisioning to eliminate queueing delays without realizing it fails to mitigate non-deterministic OS/network jitter.
    **The Consequence:** Doubling hardware costs while still leaving the system vulnerable to tail latency SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - High fan-out to 50 shards.
       - Individual node P99 is 200ms.
    2. **Calculations:**
       - Without hedging: Probability all 50 shards respond in < 200ms = (0.99)^50 ≈ 60.5%. (System P60 is 200ms).
       - With hedging at 25ms: Probability that BOTH original and hedged request hit the 1% tail = 0.01 * 0.01 = 0.0001.
       - Probability all 50 finish fast = (1 - 0.0001)^50 ≈ 99.5%.
    3. **Conclusion & Interpretation:**
       - **Result: P99.5 is well under SLA. Only <10% of requests trigger hedging, minimizing compute overhead.**
