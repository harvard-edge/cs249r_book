title: The Sparsity Fallacy
scenario: You wrote a custom CUDA kernel that skips calculating zeros (90% sparse). But it runs slower
  than a dense PyTorch matrix multiply that does 10x more math. Why does doing 'less work' take more time?
details:
  realistic_solution: Hardware acceleration relies on dense, regular computation blocks. Tensor Cores
    and Systolic Arrays are physically hard-wired to perform $16\times16$ matrix blocks in a single instruction.
    Irregular sparse operations force the hardware to fall back to standard, un-fused CUDA cores, completely
    destroying the throughput advantage of the specialized silicon.
  common_mistake: '"The custom kernel must have a bug" or "We need to optimize the memory access pattern."
    The issue is more fundamental than code quality.'
  napkin_math: 'H100 Tensor Core throughput: 989 TFLOPS. H100 CUDA core throughput: ~60 TFLOPS. By going
    sparse and irregular, you traded a 989 TFLOPS engine for a 60 TFLOPS engine — a 16.5× slowdown that
    easily overwhelms the 10× reduction in operations.'
