title: Computational Graph Node Fusion
scenario: You are analyzing the execution of a framework's computational graph on an NVIDIA A100 GPU.
  A specific model sub-layer consists of 5 sequential element-wise operations. The framework incurs a
  fixed CPU dispatch overhead of 15 μs for every node in the computational graph. The actual GPU computation
  takes 5 μs per node. An optimization pass fuses these 5 nodes into a single composite node in the graph.
  Assuming the total GPU compute time remains purely additive (25 μs), calculate the total execution time
  before and after fusion, and the resulting speedup.
details:
  realistic_solution: Calculate the time spent on dispatch vs computation. Before fusion, the 5 separate
    nodes each incur the 15 μs overhead and 5 μs compute, taking 100 μs total. After fusion, the graph
    contains 1 node, incurring a single 15 μs overhead for all 25 μs of compute. This reduces total execution
    time to 40 μs, achieving a 2.5x speedup.
  common_mistake: Assuming computational graphs only optimize memory bandwidth, completely missing the
    significant latency reduction gained by eliminating repeated framework dispatch overheads for small
    operations.
  napkin_math: 'Unfused Time = 5 nodes * (15μs dispatch + 5μs compute) = 100μs.

    Fused Time = (1 node * 15μs dispatch) + (5 * 5μs compute) = 15μs + 25μs = 40μs.

    Speedup = 100μs / 40μs = 2.5x.'
