title: The Thread Block Scheduling Cliff
scenario: You launch a CUDA kernel with a grid of 264 thread blocks on an H100 with 132 SMs. Each SM can
  host exactly 2 blocks given the kernel's resource usage. The kernel takes 1.0ms. You then change the
  grid to 265 thread blocks (one extra block). The kernel time jumps to 1.5ms — a 50% regression from
  adding a single thread block. This is not a measurement artifact. Design an explanation for this non-linear
  performance cliff, and propose a general strategy for choosing grid dimensions that avoids it.
question: "Why does increasing the H100 grid from 264 to 265 blocks raise kernel time from 1.0 ms to 1.5 ms, and how should grids be sized?"
details:
  realistic_solution: 'GPU thread block scheduling works in waves. With 132 SMs and 2 blocks per SM, each
    wave processes 264 blocks. At 264 total blocks, the kernel completes in exactly 1 wave — all SMs finish
    simultaneously. At 265 blocks, the first wave of 264 blocks completes in 1.0ms. Then a second wave
    launches for the 1 remaining block. This single block runs on 1 SM while the other 131 SMs sit completely
    idle. The second wave takes approximately 0.5ms (one block''s compute time, which is 1.0ms / 2 blocks
    per wave for a fully occupied SM = 0.5ms per block). Total: 1.0 + 0.5 = 1.5ms. Only 1/132 of the GPU''s
    compute is utilized during the tail wave. The general strategy: ensure the total number of thread
    blocks is a multiple of (SMs x blocks_per_SM) — the ''wave size.'' For the H100 with 2 blocks per
    SM: grid sizes should be multiples of 264. When the work decomposition doesn''t naturally align, use
    persistent thread blocks or dynamic work distribution (each block loops to process multiple tiles)
    to eliminate tail effects. This is called ''wave quantization'' and is a primary concern in production
    GPU kernel tuning.'
  common_mistake: Assuming kernel execution time scales linearly with work. Engineers may not realize
    that the GPU processes thread blocks in discrete waves, and the last partial wave can cause dramatic
    load imbalance where most SMs sit idle waiting for the stragglers.
  napkin_math: 'Wave size = 132 SMs x 2 blocks/SM = 264 blocks. At 264 blocks: 1 wave, 1.0ms, 100% SM
    utilization. At 265 blocks: 2 waves. Wave 1: 264 blocks, 1.0ms. Wave 2: 1 block on 1 SM, ~0.5ms. SM
    utilization in wave 2: 1/132 = 0.76%. Time-weighted utilization: (264 x 1.0 + 1 x 0.5) / (132 x 2
    x 1.5) = 264.5/396 = 66.8% — a 33% utilization drop from one extra block. At 396 blocks (1.5 waves):
    wave 1 = 264 blocks (1.0ms), wave 2 = 132 blocks (0.5ms). Total: 1.5ms, utilization: 396/(132 x 2
    x 1.5) = 100%. Sweet spots: multiples of 264.'
