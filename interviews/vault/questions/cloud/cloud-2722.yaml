title: Silent Data Corruption Strategy
scenario: 'Post-mortem analysis reveals a permanent fault caused silent data corruption in GPU #47 for
  ~18 hours before detection. The loss curve showed no obvious spike. Options: (A) roll back 18 hours
  to last known-good checkpoint, (B) continue training from current state hoping the model self-corrects,
  (C) implement online gradient checksumming. Evaluate.'
details:
  realistic_solution: 'This is the most insidious failure mode. (A) Rolling back 18 hours is painful (~18h
    × N GPUs of lost compute) but is the only option that guarantees correctness. If the corruption affected
    gradient computation, 18 hours of updates are potentially poisoned. (B) Continuing is extremely risky
    — silent corruption that does not spike the loss is the worst kind because it may have subtly shifted
    weight distributions in ways that degrade downstream tasks without obvious training metrics. The model
    may never recover, wasting the entire remaining training budget. (C) Online gradient checksumming
    (comparing redundant computations across GPUs) adds ~5% overhead but catches future corruption immediately,
    limiting damage to one step. Recommendation: Roll back (A) and implement checksumming (C) going forward.
    The 18h loss is a sunk cost; risking the entire training run is worse.'
  common_mistake: Continuing training (option B) because the loss looks fine. Silent corruption can subtly
    poison model weights in ways that only manifest much later as degraded downstream performance.
  napkin_math: '18h rollback on 256 GPUs: 4,608 GPU-hours lost (~$14K). But the full training run is worth
    ~$500K+ — risking it on potentially corrupted weights is not worth saving $14K.'
