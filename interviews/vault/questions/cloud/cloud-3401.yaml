title: H100 Transformer Inference Scheduling
scenario: 'You are tasked with deploying a large transformer model for real-time inference on a GPU. The model has several attention heads and FFN layers. You have two proposed scheduling strategies: 1. Strategy A (Naive): Executes each layer sequentially, allocating and deallocating intermediate tensors as needed. Minimal layer fusion is applied. 2. Strategy B (Optimized): Employs aggressive layer fusion where possible and uses an execution order that prioritizes memory reuse.'
question: How would you compare Strategies A and B on the GPU for latency, throughput, and memory use, and which hardware limits matter most?
details:
  realistic_solution: Represent the model as a dataflow graph. Strategy B employs graph partitioning and topological sorting with liveness analysis to fuse kernels, reducing memory I/O and peak memory footprint.
  common_mistake: |
    **The Pitfall:** Neglecting the significant impact of HBM memory bandwidth on intermediate tensor movement.
    **The Rationale:** Candidates focus purely on FLOPs to measure performance, assuming compute is the only bottleneck.
    **The Consequence:** Leading to sub-optimal scheduling decisions, particularly for memory-bound operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Y = 10000x10000 FP16 tensor = 200MB.
       - Bandwidth = 3.35 TB/s.
    2. **Calculations:**
       - Naive (Strategy A): Write Y (200MB) + Read Y (200MB) = 400MB transfer.
       - Time: 400MB / 3.35 TB/s ≈ 0.12 ms overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Fused kernels eliminate massive HBM I/O bottlenecks in memory-bound layers.**
