title: Compute-Optimal Scaling Laws Verification with Roofline on A100
scenario: Chinchilla scaling laws suggest that for 1 trillion training tokens, the
  compute-optimal model is ~50B parameters (roughly 1:20 param:token ratio). Verify
  this using a roofline analysis on an A100 cluster of 1024 GPUs. Calculate the compute
  time, memory footprint, and whether the job is compute or memory bound.
question: For a 50B model trained on 1T tokens across 1024 A100s, what are the training
  time, memory footprint, and roofline bottleneck?
details:
  realistic_solution: '50B model training: FLOPs = 6 \times N \times D = 6 \times 50B \times 1T = 300
    ZFLOPs. A100 cluster: 1024 \times 312 TFLOPS = 319 PFLOPS peak. At 50% MFU: 160 PFLOPS
    effective. Training time: 300e21 / 160e15 = 1.875e6 seconds \approx 21.7 days. Memory:
    50B params \times 16 bytes (mixed precision: 2B weights + 2B gradients + 12B optimizer)
    = 800GB. This exceeds a single 80GB GPU, so FSDP/ZeRO-3 is required. Across 1024 GPUs:
    800GB/1024 = 0.78GB per GPU \u2014 well within 80GB. Model parallelism not needed for memory.
    KV cache negligible in training. For this job: GEMM arithmetic intensity >> ridge point
    \rightarrow compute-bound training. The bottleneck is compute budget, not memory.'
  common_mistake: Conflating the compute-optimal training job (minimize loss for a
    fixed compute budget) with the inference-optimal model (minimize inference cost
    for a target accuracy).
  napkin_math: 'FLOPs: 6\times50B\times1T = 300 ZFLOPs = 3\times10^23. Cluster: 1024\times312e12\times0.5 =
    1.6\times10^17 FLOPS. Time: 3\times10^23 / 1.6\times10^17 = 1.875\times10^6s = 21.7 days. Model memory
    (FP16 weights alone): 50B \times 2B = 100GB; full training state (16B/param): 800GB.
    With ZeRO-3 across 1024 GPUs: 800GB/1024 = 0.78GB per GPU for optimizer/grad shards,
    but model weights themselves require tensor parallelism (each GPU holds 50B/1024
    \approx 0.097GB weights shard). Memory is not the bottleneck here. Compute-bound at
    50% MFU.'
