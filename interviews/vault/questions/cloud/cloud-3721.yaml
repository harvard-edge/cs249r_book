title: Compute-Optimal Scaling Laws Verification with Roofline on A100
scenario: Chinchilla scaling laws suggest that for 1 trillion training tokens, the compute-optimal model is ~50B parameters. You need to train this on an A100 cluster of 1024 GPUs.
question: "For a 50B model trained on 1T tokens across 1024 A100s, what are the training time, memory footprint, and roofline bottleneck?"
details:
  realistic_solution: '50B model training: FLOPs = 6 x N x D = 6 x 50B x 1T = 300 ZFLOPs. A100 cluster: 1024 x 312 TFLOPS = 319 PFLOPS peak. At 50% MFU: 160 PFLOPS effective. Training time: 300e21 / 160e15 = 1.875e6 seconds ≈ 21.7 days. Memory: 50B params x 16 bytes (mixed precision: 2B weights + 2B gradients + 12B optimizer) = 800GB. This exceeds a single 80GB GPU, so FSDP/ZeRO-3 is required. Across 1024 GPUs: 800GB/1024 = 0.78GB per GPU — well within 80GB. Model parallelism not needed for memory. KV cache negligible in training. For this job: GEMM arithmetic intensity >> ridge point -> compute-bound training. The bottleneck is compute budget, not memory.'
  common_mistake: |
    **The Pitfall:** Conflating the compute-optimal training job with the inference-optimal model.
    **The Rationale:** Candidates mix up the objective of minimizing loss for a fixed compute budget during training with minimizing inference cost for a target accuracy.
    **The Consequence:** Incorrectly analyzing the roofline bounds by applying inference memory bottlenecks to a training job.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 50B parameters.
       - Tokens: 1 Trillion.
       - Hardware: 1024 A100s (312 TFLOPS peak, 80 GB HBM).
       - Target MFU: 50%.
    2. **Calculations:**
       - Total FLOPs: 6 * 50e9 * 1e12 = 300 ZFLOPs = 3e23 FLOPs.
       - Cluster throughput: 1024 * 312e12 * 0.5 = 1.6e17 FLOPs/s.
       - Training time: 3e23 / 1.6e17 = 1.875e6 seconds = 21.7 days.
       - Memory footprint: 50B params * 16 bytes/param (ZeRO-3 state) = 800 GB.
       - Sharded memory: 800 GB / 1024 GPUs = 0.78 GB/GPU.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Memory is plentiful (0.78 GB per 80 GB GPU). The bottleneck is purely the 21.7 days of dense matrix multiplication required for the training FLOP budget.
