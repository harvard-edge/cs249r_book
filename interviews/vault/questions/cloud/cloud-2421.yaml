title: H100 FP8 Migration Throughput Cliff
scenario: You migrate a 70B parameter LLM serving stack from 4x A100s (INT8 W8A8) to 2x H100s (FP8 W8A8).
  Theoretical TOPS suggest a >2.5x throughput gain, but your actual QPS only increases from 12 QPS to
  14 QPS at batch size 64. Profiling shows high SM idle time despite FP8 Tensor Cores.
question: "Why does moving from 4x A100 INT8 to 2x H100 FP8 barely increase QPS, and what must change in the KV cache path?"
details:
  realistic_solution: The issue is KV cache memory bandwidth bottlenecking the FP8 compute. H100's FP8
    Tensor Cores are incredibly fast, but if the KV cache remains in FP16, the memory bandwidth required
    to fetch it for batch size 64 starves the compute units. The solution requires transitioning to FP8
    KV caching. Furthermore, FP8 requires scaling factors (per-tensor or per-channel). If these scaling
    factors are not fused with the attention kernels (like FlashAttention-3 with FP8 support), the round-trip
    to global memory for dequantization destroys the latency.
  common_mistake: Assuming the H100 clock speed is throttling and attempting to increase batch size further,
    which just causes an OOM.
  napkin_math: 70B model FP8 weights = 70GB. BS=64, Seq=2048. KV cache in FP16 = 2 * 2 * 64 * 2048 * 80
    layers * 8192 dim = 343GB. Fetching 343GB at H100 bandwidth (3.35 TB/s) takes ~104ms per token. FP8
    compute for BS64 takes only ~2ms. System is 50x memory bound.
