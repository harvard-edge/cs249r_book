title: The Two-Node Scaling Trap
scenario: You are training a 70B parameter model using 8-way tensor parallelism on a single server node
  with 8 H100 GPUs. The GPUs in this node are connected with NVLink 4.0. To accelerate training, you scale
  up to 16 H100s across two identical nodes, connected via InfiniBand NDR. You run the same 8-way tensor
  parallelism, but now with 2-way data parallelism. You observe that your training time-per-step barely
  improves, showing very poor scaling efficiency. Using the hardware specs provided, diagnose the most
  likely bottleneck that explains this poor scaling.
question: "What hardware bottleneck explains the poor scaling when moving from 8 H100s on one node to 16 H100s across two nodes?"
details:
  realistic_solution: "The primary bottleneck is the inter-node InfiniBand connection. While intra-node communication uses the extremely fast 900 GB/s NVLink, the 2-way data parallelism requires synchronizing the gradients for the entire 70B model across the much slower InfiniBand fabric. This massive data transfer throttles the step time, negating most of the performance gains from the additional GPUs."
  common_mistake: Engineers often misdiagnose scaling problems. They might incorrectly blame the GPU compute
    (suggesting the model is too small), the PCIe bus (misunderstanding the GPU-to-GPU communication path
    for tensor parallelism), or the NVLink itself (failing to recognize its massive bandwidth). The key
    is identifying the slowest path that the new configuration introduced.
  napkin_math: "In 2-way Data Parallelism, the entire model's gradients (70B parameters * 2 bytes = 140 GB in FP16/BF16) must be all-reduced across the nodes. Over a 50 GB/s InfiniBand link, this 140 GB transfer takes at least 2.8 seconds per step. This massive communication overhead at the end of the step negates the compute time saved by doubling the GPUs."
  options:
  - The GPU compute is saturated; the model is too small for 16 GPUs.
  - The PCIe Gen5 bus connecting the GPUs to the CPU is saturated by the increased data parallelism.
  - The inter-node InfiniBand connection has become the primary bottleneck for the data-parallel all-reduce.
  - The intra-node NVLink bandwidth is insufficient for the 8-way tensor parallel collectives.
  correct_index: 2
