title: Diagnosing Downstream Degradation in Cascaded Models
scenario: An e-commerce platform uses a cascaded recommendation pipeline serving 5,000 QPS. An upstream
  BERT-large model (340M parameters, 8x T4 GPUs) generates 768-dimensional user embeddings for a downstream
  XGBoost CTR model. After a new version of the BERT model (fine-tuned on recent data) is deployed via
  the registry, the overall CTR drops by 12%. Inference latency remains at 45ms and no shape mismatch
  errors are thrown. Diagnose the root cause of this silent failure and analyze how a dependency-aware
  model registry could prevent it.
question: "What caused the silent 12% CTR drop after the upstream BERT embedding update, and how would a dependency-aware registry prevent it?"
details:
  realistic_solution: Implement strict dependency tracking in the model registry. Pin the downstream model
    to a specific upstream model version hash. When the upstream model is updated, trigger a shadow evaluation
    of the downstream model using the new embeddings and block the upstream rollout if performance degrades.
  common_mistake: Assuming that preserving tensor shapes (e.g., maintaining the 768-d output) guarantees
    compatibility, and failing to recognize that the semantic embedding space has shifted, invalidating
    the downstream model's learned decision boundaries.
  napkin_math: If the pipeline serves 5,000 QPS, a 12% drop in CTR impacts 600 queries per second. Over
    a 4-hour time-to-detect (TTD) and rollback, this results in 600 * 3600 * 4 = 8,640,000 degraded predictions,
    highlighting the ROI of automated contract testing prior to deployment.
