title: 'Adapter Serving Infrastructure: S-LoRA Paged Memory Design'
scenario: You are building a multi-adapter serving system to handle 1000 LoRA adapters on a cluster of
  8 H100s. Only 50 adapters are active at any given time. Design the paged adapter memory management system
  (S-LoRA style) and calculate the memory overhead.
question: "How would you design S-LoRA-style paged adapter memory for 1000 LoRA adapters with only 50 active, and what is the overhead?"
details:
  realistic_solution: 'Use paged adapter management: maintain a GPU-resident adapter pool of 50 slots
    (650 MB, covering the peak active count). Evict LRU adapters to CPU pinned memory (latency ~0.8ms
    for 13 MB at PCIe 4.0 16 GB/s). On cache miss, evict LRU and load from CPU. For the 50 concurrently
    active adapters, group requests by adapter to minimize swaps. Track adapter hotness via request frequency;
    top-50 hot adapters never evict (covers ~95% of traffic in power-law distribution).'
  common_mistake: Pre-loading all 1000 adapters into GPU memory. At 13 MB each (rank-16, 13B base), 1000
    adapters = 13 GB — feasible but wasteful when only 50 are active.
  napkin_math: '1000 adapters × 13 MB = 13 GB total. Active pool (50 adapters, matching scenario): 650
    MB. Cache hit rate for top-50 adapters (power law, 80/20 rule): ~95% of requests. Miss cost: 13 MB
    / 16 GB/s (PCIe 4.0) = 0.8ms per miss. At 1000 RPS with 5% miss rate: 50 misses/sec × 0.8ms = 40ms
    total eviction latency/sec spread across requests — 0.04ms average overhead per request.'
