title: Mitigating Dispatch Overhead in Low-Latency Models
scenario: Your team is deploying a real-time autoregressive text-to-speech model on NVIDIA A100s. The model architecture features 2,000 sequential, lightweight operations per token generation step. Profiling reveals the GPU utilization is stuck around 20%, and the token latency is exactly 10ms.
question: Would you upgrade to H100s, use TorchInductor fusion, or wrap the TTS step in CUDA Graphs to reduce P99 latency, and why?
details:
  realistic_solution: 'Implement CUDA Graphs or kernel fusion. CUDA Graphs captures the execution graph and replays it with a single CPU launch, while fusion merges operations into fewer kernels. Both eliminate the CPU bottleneck, but CUDA Graphs is often optimal for fixed-shape, small-op autoregressive steps.'
  common_mistake: |
    **The Pitfall:** Assuming upgrading to a faster GPU (like an H100) will automatically reduce latency.
    **The Rationale:** Engineers often assume that low GPU utilization combined with high latency means the GPU is simply too slow at executing the operations.
    **The Consequence:** Spending millions on hardware upgrades that yield zero latency improvement because the bottleneck is the CPU's fixed kernel dispatch overhead.
  napkin_math: |
    - **CPU Dispatch Time:** CPU dispatch overhead is roughly 5µs per operation. For 2,000 ops, `2,000 * 5µs = 10ms`.
    - **GPU Compute Time:** Actual compute is ~1µs per operation, totaling 2ms.
    - **Asynchronous Execution:** Since launches are asynchronous, total latency is `max(CPU, GPU) = max(10ms, 2ms) = 10ms`.
    - **Optimization:** Wrapping the step in CUDA Graphs drops dispatch overhead to a single ~5µs launch.
    - **Result: Total latency drops from 10ms down to ~2ms (a 5x speedup), maximizing actual GPU execution time.**
