title: RLHF vs RLAIF Infrastructure Cost Comparison
scenario: Compare the infrastructure cost of RLHF with human feedback vs RLAIF (RL from AI Feedback using
  a judge LLM) for fine-tuning a 7B assistant model. What is the crossover point where RLAIF becomes cost-effective?
question: "What is the crossover point where RLAIF becomes cost-effective?"
details:
  realistic_solution: 'RLHF: 10K human comparisons × $0.10/comparison = $1,000 labeling cost + GPU training
    (~$500 for 7B on 8×H100 for 1000 PPO steps). RLAIF with GPT-4-turbo judge: 10K AI comparisons × $0.005/comparison
    = $50 + same training cost. RLAIF is 20x cheaper on labeling. Crossover: RLAIF is preferred when judge
    LLM quality is sufficient (>85% agreement with human raters). For safety-critical applications, human
    labels remain necessary regardless of cost.'
  common_mistake: Ignoring the inference cost of the judge LLM in RLAIF. A GPT-4-class judge generating
    100 preference labels costs ~$0.01, making RLAIF appear cheap per sample — but RLHF requires 10K-100K
    labeled comparisons, and the total cost compounds quickly.
  napkin_math: 'RLHF human labels: 10K × $0.10 = $1,000. RLAIF (GPT-4): 10K × (avg 500 tokens × $0.01/1K
    tokens) = 10K × $0.005 = $50. Training: 8×H100 × 4 hours × $4/GPU-hr = $128. Total RLHF: $1,128. Total
    RLAIF: $178. RLAIF saves $950 (84%). At 100K comparisons: RLHF=$10,128 vs RLAIF=$628 — 16x savings.'
