title: The FP16 Divergence
scenario: We're pre-training a 13B model. It trains perfectly in BF16 for 100k steps. When we switch to FP16 with dynamic loss scaling, it diverges around step 50k with loss spikes and eventual NaNs. The hyperparameters are identical.
question: "What is happening at step 50k that wasn't happening at step 1k?"
details:
  realistic_solution: 'Early in training, gradients are large (the model is far from any minimum) and comfortably within FP16''s representable range. As training converges, gradient magnitudes shrink — by step 50k, many gradients have decayed below FP16''s minimum representable value of ~$5.96 \times 10^{-8}$. Dynamic loss scaling tries to compensate by multiplying the loss by a large factor before backprop, but this is a balancing act: scale too high and activations overflow to Inf; scale too low and gradients underflow to zero. Around step 50k, the gradient distribution straddles FP16''s narrow range — some values need high scaling (small gradients) while others need low scaling (large activations). No single scale factor works for all parameters simultaneously, and training oscillates between overflow and underflow until it diverges. BF16 never has this problem because its 8 exponent bits give the same range as FP32.'
  common_mistake: |
    **The Pitfall:** Assuming the loss scaler isn't tuned properly or that FP16 is just unstable.
    **The Rationale:** Engineers treat dynamic loss scaling as a black box that just needs tweaking.
    **The Consequence:** The team wastes time hyperparameter tuning instead of understanding the fundamental representable range limitations of FP16 vs BF16.
  napkin_math: |
    - At step 1k: gradient magnitudes ≈ $10^{-3}$ to $10^{-1}$ — well within FP16's range.
    - At step 50k: gradient magnitudes ≈ $10^{-6}$ to $10^{-12}$.
    - FP16 floor = $5.96 \times 10^{-8}$. Everything below that floor underflows to zero.
    - BF16 floor = $9.18 \times 10^{-41}$.
    - **With 70% of gradients underflowing in FP16, the effective learning rate collapses for most parameters while a few with large gradients still update, destabilizing the model.**
