title: What is DDP?
scenario: When training a model across multiple GPUs in the cloud using PyTorch, what does DDP stand for
  and what is its primary function?
details:
  realistic_solution: Distributed Data Parallel. It replicates the entire model across multiple GPUs,
    splits the input data batch across them, and synchronizes the gradients at the end of the backward
    pass using an All-Reduce operation.
  common_mistake: Confusing it with Data Driven Programming or assuming it shards the model weights.
  napkin_math: '- 7B model in FP16 = 14 GB weights replicated on each of 8 GPUs = 112 GB total weight
    memory. | - Global batch of 64 split 8 ways = 8 samples/GPU. Each GPU computes local gradients (14
    GB), then All-Reduce syncs them. | - => Near-linear throughput scaling: 8× GPUs ≈ 7.5× throughput
    (communication overhead ~5-8%).'
  options:
  - Data Driven Processing; it automatically cleans the dataset.
  - Distributed Data Parallel; it copies the model to all GPUs and splits the data batch.
  - Dynamic Device Partitioning; it splits the layers of a single model across GPUs.
  - Deep Distributed Pipeline; it pipelines the forward pass across multiple nodes.
  correct_index: 1
