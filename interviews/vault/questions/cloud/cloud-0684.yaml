title: What is DDP?
scenario: You are training a model across multiple GPUs in the cloud using PyTorch.
question: What does DDP stand for and what is its primary function?
details:
  realistic_solution: Distributed Data Parallel. It replicates the entire model across multiple GPUs, splits the input data batch across them, and synchronizes the gradients at the end of the backward pass using an All-Reduce operation.
  common_mistake: |
    **The Pitfall:** Confusing DDP with Data Driven Programming or assuming it shards the model weights.
    **The Rationale:** Candidates mix up basic data parallelism with more advanced tensor or pipeline parallelism.
    **The Consequence:** Completely misunderstanding the memory requirements for replicating models across nodes.
  napkin_math: |
    1. **Model Replication:** 7B model in FP16 = 14 GB weights replicated on 8 GPUs = 112 GB total memory.
    2. **Data Split:** Global batch 64 split 8 ways = 8 samples/GPU.
    3. **Result:** Near-linear scaling of **~7.5x throughput**.
  options:
  - Data Driven Processing; it automatically cleans the dataset.
  - Distributed Data Parallel; it copies the model to all GPUs and splits the data batch.
  - Dynamic Device Partitioning; it splits the layers of a single model across GPUs.
  - Deep Distributed Pipeline; it pipelines the forward pass across multiple nodes.
  correct_index: 1
