title: Calculating INT8 KV Cache Memory Savings
scenario: You are deploying a 7B parameter LLM (32 layers, 32 KV heads, 128 head dimension) on a single 80GB GPU. The model weights are loaded in FP16. You need to support a concurrent batch size of 64 requests, each with a maximum sequence length of 4096 tokens. During load testing, the system throws an Out Of Memory (OOM) error.
question: "What is the FP16 KV cache memory for 64 requests at 4096 tokens, and will INT8 KV cache quantization fit the 7B model on one 80GB GPU?"
details:
  realistic_solution: 'First, calculate the FP16 KV cache size per token: 2 (K and V) * 32 layers * 32 heads * 128 head dimension * 2 bytes = 524,288 bytes (0.5 MiB). For a batch size of 64 and sequence length of 4096 tokens, the KV cache requires exactly 128 GiB. Adding ~14 GiB for the model weights gives a total of 142 GiB, which causes the OOM on an 80GB GPU. By applying INT8 KV cache quantization, the size per element drops from 2 bytes to 1 byte, halving the KV cache footprint to 64 GiB. The new total memory required becomes 14 GiB (weights) + 64 GiB (KV cache) = 78 GiB, successfully fitting.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 for both Keys and Values, or forgetting to add the 14GB required for the FP16 model weights.
    **The Rationale:** Candidates memorize the memory size of weights but fail to build a complete mental model of all tensors residing in VRAM during inference.
    **The Consequence:** Deploying configs that perfectly utilize 100% of memory in a spreadsheet but instantly OOM in production.
  napkin_math: |
    - **FP16 KV Cache:** 64 (batch) $\times$ 4096 (seq) $\times$ 2 (K,V) $\times$ 32 (layers) $\times$ 32 (heads) $\times$ 128 (dim) $\times$ 2 (bytes) = $128\text{ GiB}$.
    - **Weights:** $7\text{B} \times 2\text{ bytes} \approx 14\text{ GiB}$.
    - **Total FP16 Memory:** $128\text{ GiB} + 14\text{ GiB} = 142\text{ GiB}$ ($> 80\text{ GiB}$, OOM).
    - **INT8 KV Cache:** $128\text{ GiB} / 2 = 64\text{ GiB}$.
    - **New Total Memory:** $14\text{ GiB} + 64\text{ GiB} = \mathbf{78\text{ GiB}}$ ($< 80\text{ GiB}$, fits).
