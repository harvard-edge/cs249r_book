title: Optimal Checkpoint Interval from MTBF
scenario: 'Your 512-GPU cluster has per-GPU MTBF of 50,000 hours. Checkpointing takes 10 minutes.'
question: 'Using the Young/Daly formula, what is the optimal checkpoint frequency for 512 GPUs with a 50,000-hour per-GPU MTBF?'
details:
  realistic_solution: 'Calculate cluster MTBF first. Then apply the Young/Daly optimal interval formula. The correct expected wasted time per failure is minimized using this optimal frequency.'
  common_mistake: |
    **The Pitfall:** Using the per-GPU MTBF instead of the cluster MTBF in the calculation.
    **The Rationale:** Misunderstanding that distributed synchronous training fails if *any* single node fails.
    **The Consequence:** Checkpointing far too infrequently, leading to massive losses of compute time when the inevitable node failure occurs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 512 GPUs.
       - Per-GPU MTBF: 50,000 hours.
       - Checkpoint cost (C): 10 minutes.
    2. **Calculations:**
       - Cluster MTBF (M) = 50,000 / 512 = ~97.6 hours = ~5,860 minutes.
       - Young/Daly formula: τ = √(2 * M * C).
       - τ = √(2 * 5860 * 10) = √117,200 = ~342 minutes = ~5.7 hours.
       - Overhead = C / τ = 10 / 342 = ~2.9%.
    3. **Conclusion & Interpretation:**
       - **Result: Reliability-Bound. Checkpoint every 5.7 hours to minimize total wasted compute.**
