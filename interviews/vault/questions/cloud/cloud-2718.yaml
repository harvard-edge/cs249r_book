title: Optimal Checkpoint Interval from MTBF
scenario: Your 512-GPU cluster has per-GPU MTBF of 50,000 hours. Checkpointing takes 10 minutes. Using
  the Young/Daly formula (optimal interval ≈ √(2 × MTBF × checkpoint_cost)), calculate the optimal checkpoint
  frequency.
question: "For 512 GPUs with 50,000-hour per-GPU MTBF and 10-minute checkpoints, what is the optimal checkpoint frequency?"
details:
  realistic_solution: 'Cluster MTBF = 50,000 / 512 ≈ 97.6 hours ≈ 5,860 minutes. Checkpoint cost (C) =
    10 minutes. Young/Daly optimal interval: τ = √(2 × M × C) = √(2 × 5860 × 10) = √117,200 ≈ 342 minutes
    ≈ 5.7 hours. So you should checkpoint approximately every 5.7 hours. The overhead is C/τ = 10/342
    ≈ 2.9% of training time spent checkpointing. If a failure occurs, you lose on average τ/2 ≈ 2.85 hours
    of work. The expected wasted time per failure: τ/2 + C = 181 minutes.'
  common_mistake: Using the per-GPU MTBF instead of the cluster MTBF. The checkpoint interval must protect
    against any failure in the cluster, not just one GPU.
  napkin_math: 'Cluster MTBF: 50K/512 ≈ 98h ≈ 5860 min. τ = √(2×5860×10) ≈ 342 min ≈ 5.7h. Overhead: 10/342
    ≈ 3%.'
