title: Kernel Bypass and Verbs API Overhead
scenario: 'RDMA uses kernel bypass to avoid the overhead of system calls for each network operation. A standard TCP send() requires a context switch from user space to kernel space (each costing ~1-2ÎĽs).'
question: For 65,536 TCP packets carrying a 256MB transfer, how much context-switch and kernel overhead does RDMA bypass save?
details:
  realistic_solution: 'TCP overhead per packet: context switch = 1.5ÎĽs (userâ†’kernel + kernelâ†’user) + protocol processing = 0.5ÎĽs (checksum, TCP state machine) + buffer copy = 0.3ÎĽs (user buffer â†’ socket buffer) + interrupt on receive = 1ÎĽs. Total per packet: ~3.3ÎĽs. For 65,536 packets: 65,536 Ă— 3.3ÎĽs = 216ms of CPU overhead. RDMA (IB verbs) overhead: post work request to send queue = 0.2ÎĽs (MMIO doorbell write to HCA). One WR can cover multiple packets via scatter-gather. For 256MB with 1MB WRs: 256 WR postings Ă— 0.2ÎĽs = 51.2ÎĽs total. Completion: poll CQ = 0.05ÎĽs per CQE, 256 completions = 12.8ÎĽs. Total RDMA overhead: 64ÎĽs. Savings: 216ms - 0.064ms = 215.9ms = 99.97% reduction in CPU overhead. More importantly, RDMA CPU usage = ~0% (HCA handles everything in hardware), while TCP saturates 2-4 CPU cores at 400Gbps line rate. On MI300X systems where CPUs are already busy with data preprocessing, this CPU savings is critical.'
  common_mistake: |
    **The Pitfall:** Only counting context switch time when comparing TCP to RDMA.
    **The Rationale:** TCP also incurs protocol processing (checksum, segmentation, congestion control) in the kernel, buffer copies, and interrupt handling per packet. RDMA eliminates ALL of these.
    **The Consequence:** Drastically underestimating the CPU savings provided by RDMA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 65,536 TCP packets carrying a 256MB transfer.
    - TCP overhead per packet: context switch (1.5ÎĽs) + protocol processing (0.5ÎĽs) + buffer copy (0.3ÎĽs) + interrupt (1ÎĽs) = ~3.3ÎĽs.
    - RDMA overhead: post work request (0.2ÎĽs), completion polling (0.05ÎĽs per completion).

    **Calculations:**
    - TCP CPU overhead: 65,536 packets * 3.3ÎĽs = 216.2ms.
    - RDMA WR postings (1MB each for 256MB): 256 * 0.2ÎĽs = 51.2ÎĽs.
    - RDMA completions: 256 * 0.05ÎĽs = 12.8ÎĽs.
    - Total RDMA overhead: 51.2ÎĽs + 12.8ÎĽs = 64ÎĽs (0.064ms).
    - Savings: 216.2ms - 0.064ms.

    **Conclusion & Interpretation:**
    - **Result: 99.97% reduction (CPU-Bound)**. RDMA eliminates host CPU protocol processing, saving critical CPU cycles for data preprocessing.
