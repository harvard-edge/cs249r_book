title: Kernel Bypass and Verbs API Overhead
scenario: RDMA uses kernel bypass to avoid the overhead of system calls for each network operation. A standard TCP send() requires a context switch from user space to kernel space (each costing ~1-2Œºs).
question: For 65,536 TCP packets carrying a 256MB transfer, how much context-switch and kernel overhead does RDMA bypass save?
details:
  realistic_solution: 'TCP overhead per packet: context switch = 1.5Œºs (user‚Üíkernel + kernel‚Üíuser) + protocol processing = 0.5Œºs (checksum, TCP state machine) + buffer copy = 0.3Œºs (user buffer ‚Üí socket buffer) + interrupt on receive = 1Œºs. Total per packet: ~3.3Œºs. For 65,536 packets: 65,536 √ó 3.3Œºs = 216ms of CPU overhead. RDMA (IB verbs) overhead: post work request to send queue = 0.2Œºs (MMIO doorbell write to HCA). One WR can cover multiple packets via scatter-gather. For 256MB with 1MB WRs: 256 WR postings √ó 0.2Œºs = 51.2Œºs total. Completion: poll CQ = 0.05Œºs per CQE, 256 completions = 12.8Œºs. Total RDMA overhead: 64Œºs. Savings: 216ms - 0.064ms = 215.9ms = 99.97% reduction in CPU overhead. More importantly, RDMA CPU usage = ~0% (HCA handles everything in hardware), while TCP saturates 2-4 CPU cores at 400Gbps line rate. On MI300X systems where CPUs are already busy with data preprocessing, this CPU savings is critical.'
  common_mistake: |
    **The Pitfall:** Only counting context switch time when comparing TCP to RDMA.
    **The Rationale:** TCP also incurs protocol processing (checksum, segmentation, congestion control) in the kernel, buffer copies, and interrupt handling per packet. RDMA eliminates ALL of these.
    **The Consequence:** Drastically underestimating the CPU savings provided by RDMA.
  napkin_math: |
    - TCP overhead per packet: context switch (1.5Œºs) + protocol processing (0.5Œºs) + buffer copy (0.3Œºs) + interrupt (1Œºs) = ~3.3Œºs.
    - For 65,536 packets: 65,536 * 3.3Œºs = 216ms CPU overhead.
    - RDMA overhead: post work request (0.2Œºs). 256 WR postings (1MB each) * 0.2Œºs = 51.2Œºs.
    - Completion polling: 256 completions * 0.05Œºs = 12.8Œºs.
    - Total RDMA overhead: 64Œºs.
    - Savings: 216ms - 0.064ms = **99.97% reduction in CPU overhead**.
