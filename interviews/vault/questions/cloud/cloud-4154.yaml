title: Tail Tolerance with Backup Requests at Scale
scenario: "You serve a 13B model across 64 MI300X GPUs. Each request is routed to one GPU. Your SLA requires P999 < 200ms but current P999 is 1.2s."
question: How would you design backup requests to bring P999 below 200ms on the 64-GPU MI300X service, and what extra GPU cost would that add?
details:
  realistic_solution: 'Design: (1) Track running P50 and P95 per GPU using an exponentially weighted moving average. (2) If primary hasn''t responded by P95 threshold (~90ms given P50=45ms), send backup to the least-loaded GPU. (3) On first response, send cancellation token to the other GPU via a side channel (CUDA event flag in shared memory for same-node, gRPC cancel for cross-node). (4) Adaptive threshold: if backup rate exceeds 10%, investigate root cause rather than masking it. Implementation on MI300X: use Infinity Fabric for same-node backup routing (400 GB/s, <1μs overhead). Cross-node via RoCE v2 adds 5μs. With 5% backup rate: P999 drops from 1.2s to ~150ms.'
  common_mistake: |
    **The Pitfall:** Sending backup requests immediately or waiting too long.
    **The Rationale:** Candidates either waste 2x compute by sending backups at request start, or set the threshold too high, causing backups to arrive after the SLA deadline.
    **The Consequence:** The system either exhausts its compute capacity or fails to meet the P999 latency target.
  napkin_math: |
    - **Define backup threshold:** Issue backup at P95 (90ms).
    - **Calculate backup rate:** 5% of requests get a backup.
    - **Calculate wasted work:** 5% × 90ms average wasted work = 4.5ms per request amortized.
    - **Calculate fleet cost increase:** 5% × (90ms / 45ms P50) = 10% additional GPU-seconds.
    - **Calculate monetary cost:** 64 GPUs × $2/hr × 1.10 = $140.80/hr (vs $128/hr baseline).
    - **Evaluate ROI:** A 1050ms P999 reduction costs an additional **$12.80/hr**.
