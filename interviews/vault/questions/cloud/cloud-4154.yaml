title: Tail Tolerance with Backup Requests at Scale
scenario: You serve a 13B model across 64 MI300X GPUs. Each request is routed to one
  GPU. Your SLA requires P999 < 200ms but current P999 is 1.2s. Design a backup-request
  system with specific thresholds, cancellation logic, and calculate the additional
  GPU cost.
question: How would you design backup requests to bring P999 below 200ms on the 64-GPU
  MI300X service, and what extra GPU cost would that add?
details:
  realistic_solution: 'Design: (1) Track running P50 and P95 per GPU using an exponentially
    weighted moving average. (2) If primary hasn''t responded by P95 threshold (~90ms
    given P50=45ms), send backup to the least-loaded GPU. (3) On first response, send
    cancellation token to the other GPU via a side channel (CUDA event flag in shared
    memory for same-node, gRPC cancel for cross-node). (4) Adaptive threshold: if
    backup rate exceeds 10%, investigate root cause rather than masking it. Implementation
    on MI300X: use Infinity Fabric for same-node backup routing (400 GB/s, <1μs overhead).
    Cross-node via RoCE v2 adds 5μs. With 5% backup rate: P999 drops from 1.2s to
    ~150ms.'
  common_mistake: Sending backup requests immediately (wasting 2× compute) or waiting
    too long (backup arrives after the SLA deadline). The threshold must be calibrated
    to the latency distribution — typically at P90 or P95.
  napkin_math: '64 GPUs, P999 = 1.2s. Backup at P95 = 90ms. 5% of requests get backup.
    Extra compute: 5% × 90ms average wasted work = 4.5ms per request amortized. Fleet
    cost increase: 5% × (90ms / 45ms) = 10% additional GPU-seconds. P999 with backup:
    P999² ≈ P99.9999 of single GPU ≈ 150ms. Cost: 64 × $2/hr × 1.10 = $140.80/hr vs
    $128/hr baseline. ROI: 1050ms P999 reduction for $12.80/hr.'
