title: Evaluating OOD Rejection Under Strict Latency
scenario: A cloud medical imaging API serves 500 requests/sec using a ResNet-152 model on GPUs with a strict P99 latency budget of 200ms. Current single-pass inference takes 45ms. The model confidently misclassified artifacts from an out-of-distribution (OOD) MRI scanner. You must evaluate Temperature Scaling, Deep Ensembles (5 models), and Mahalanobis distance to abstain on OOD inputs.
question: Which calibration strategy should the MRI API use to abstain on OOD scanner artifacts under the 200ms P99 latency budget?
details:
  realistic_solution: Implement a Mahalanobis distance OOD detector on the penultimate feature layer. It captures epistemic uncertainty effectively for new scanner artifacts without the 5x compute and memory multiplier of ensembles, preserving the SLA.
  common_mistake: |
    **The Pitfall:** Recommending Deep Ensembles or Temperature Scaling without constraint analysis.
    **The Rationale:** Candidates forget that Deep Ensembles multiply latency beyond the budget, and Temperature Scaling does not improve OOD detection.
    **The Consequence:** Violating the strict 200ms latency SLA or deploying an ineffective OOD detector.
  napkin_math: |
    - **Current Inference:** 45ms per pass.
    - **Deep Ensemble (N=5):** 45ms × 5 = 225ms (> 200ms SLA).
    - **Mahalanobis Distance:** 2048-d feature vector adds ~2ms of matrix multiplication overhead.
    - **Result:** Mahalanobis completes in **47ms**, well within the **200ms SLA**, while effectively capturing epistemic uncertainty.
