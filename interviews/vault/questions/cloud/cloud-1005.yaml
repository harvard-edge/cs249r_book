title: Evaluating OOD Rejection Under Strict Latency
scenario: 'A cloud medical imaging API serves 500 requests/sec using a ResNet-152 model on NVIDIA T4 GPUs.
  Recently, the model confidently misclassified artifacts from a newly deployed, out-of-distribution (OOD)
  MRI scanner. You must evaluate three confidence calibration strategies to abstain on OOD inputs: Temperature
  Scaling, Deep Ensembles (5 models), and Mahalanobis distance on penultimate features. The system has
  a strict P99 latency budget of 200ms. Current single-pass inference takes 45ms at the maximum permissible
  batch size.'
question: "Which calibration strategy should the MRI API use to abstain on OOD scanner artifacts under the 200ms P99 latency budget?"
details:
  realistic_solution: Implement a Mahalanobis distance OOD detector on the penultimate feature layer.
    It captures epistemic uncertainty effectively for new scanner artifacts without the 5x compute and
    memory multiplier of ensembles, preserving the SLA.
  common_mistake: Relying on Temperature Scaling (which only improves in-distribution calibration, not
    OOD detection) or recommending Deep Ensembles without calculating that a 5-model ensemble will exceed
    the 200ms latency budget.
  napkin_math: Single inference = 45ms. Deep Ensemble (N=5) sequentially = 225ms (>200ms SLA). Parallel
    ensemble reduces batch size by 5x due to VRAM limits, dropping throughput below 500 RPS. Mahalanobis
    distance on a 2048-d feature vector adds ~2ms of matrix multiplication overhead, resulting in a safe
    47ms total latency.
