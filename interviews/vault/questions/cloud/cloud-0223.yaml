title: The Serverless Inference Trade-off
scenario: 'We''re choosing between AWS SageMaker Serverless (pay-per-invocation, scales to zero) and a
  dedicated `ml.g5.2xlarge` instance (1× A10G, $1.52/hr always-on) for serving a 7B model. Our traffic
  is bursty: 500 QPS during business hours (4 hrs/day), near-zero overnight. Find the break-even point
  and tell me which option wins.'
question: "What is the break-even between SageMaker Serverless and a dedicated A10G for this bursty 7B workload, and which option wins?"
details:
  realistic_solution: 'The break-even depends on three factors: (1) the per-invocation cost of serverless
    (compute time × price per GB-second), (2) the cold-start penalty and its frequency, and (3) the utilization-adjusted
    cost of dedicated instances. At 500 QPS sustained during business hours, the dedicated approach with
    batching (BS=32, ~63 instances) costs ~$69K/month. Serverless at 216M requests/month costs ~$34.5K/month
    — about 50% cheaper, but with 5% cold-start penalties degrading user experience. The break-even point is
    ~2.6 QPS sustained per instance: below that, serverless wins; above, dedicated wins. Since the workload is only active for 4 hours a day, its 24-hour average (~1.3 QPS per instance) falls below the break-even threshold, making serverless cheaper. To balance cost and UX, a hybrid strategy (e.g., 20 dedicated instances for the main load, saving ~34% vs pure dedicated, plus serverless for overflow) minimizes cold starts while still cutting some costs.'
  common_mistake: '"Serverless always wins for bursty traffic because you don''t pay for idle time." Serverless
    has per-invocation costs that scale linearly with QPS, while dedicated instances have fixed costs
    that become cheaper per-request at high utilization.'
  napkin_math: '- **Dedicated (ml.g5.2xlarge, 1× A10G):** $1.52/hr × 24 hr × 30 days = **$1,094/month**.
    Throughput: ~50 tokens/sec for 7B model. At 500 QPS with 100-token responses: need 500 × 100 / 50
    = 1,000 instances during peak. That''s $1,094 × 1,000 = **$1.09M/month**. Clearly need fewer instances
    with batching — at BS=32, throughput ≈ 800 tok/s per instance, need ~63 instances = **$68,922/month**.
    - **Serverless (SageMaker Serverless):** ~$0.0001 per invocation + $0.00003/sec compute. Per request
    (2s inference for 100 tokens): $0.0001 + 2 × $0.00003 = **$0.00016/request**. At 500 QPS × 4 hr/day × 30 days:
    500 × 14,400 × 30 = 216M requests. Cost = 216M × $0.00016 = **$34,560/month**. Plus cold starts:
    ~5% of requests hit cold start (3s penalty), adding latency but no extra cost. - **Break-even:**
    Serverless < dedicated when: $0.00016 × QPS × 3,600 < $1.52/hr per instance. Per instance: QPS <
    1.52 / (0.00016 × 3,600) = **~2.64 QPS per instance**. Above 2.64 QPS sustained per instance, dedicated
    wins. - **Hybrid:** 20 dedicated instances for base load ($21,888/month) + serverless for overflow
    spikes (e.g., 340 QPS = $23,500/month). Total = $45,388/month. Saves ~34% vs pure dedicated while avoiding cold starts for the bulk of traffic. Pure serverless saves ~50% but suffers cold starts.'
