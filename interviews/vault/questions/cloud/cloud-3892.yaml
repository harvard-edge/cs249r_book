title: H100 Cluster Power and Cooling Architecture
scenario: You are designing a new large-scale training cluster using 8x H100 nodes within a strict total facility power budget of 25 MW. Each node requires 8.0 kW. Your standard air-cooled racks support 15 kW maximum, yielding a facility PUE of 1.3. Alternatively, you can deploy direct-to-chip (D2C) liquid-cooled racks supporting 60 kW each, which lowers the facility PUE to 1.15.
question: Which cooling architecture maximizes compute under the 25 MW facility cap, and how many nodes and racks can air vs D2C liquid support?
details:
  realistic_solution: 'The correct approach is to calculate the IT power budget for both scenarios and translate that into node counts and rack footprints. The liquid-cooled architecture is heavily favored: the lower PUE frees up ~2.5 MW for IT load, yielding over 300 additional nodes. Furthermore, the 60 kW rack density condenses the cluster from over 2,400 racks down to under 400 racks, drastically reducing optical transceiver count, cabling length, and switch tiers.'
  common_mistake: |
    **The Pitfall:** Forgetting to divide the total facility budget by the PUE to find the IT power budget.
    **The Rationale:** Candidates often equate facility power with IT power, neglecting cooling overheads entirely.
    **The Consequence:** Extreme stranding of physical space and exploding radix requirements for backend networks.
  napkin_math: |
    - **Total Budget**: 25,000 kW.
    - **Air-cooled IT Power**: 25,000 / 1.3 = 19,230 kW.
    - **Max air nodes**: 19,230 / 8 = 2,403 nodes.
    - **Air racks**: floor(15 / 8) = 1 node/rack. Total racks: 2,403.
    - **Liquid-cooled IT Power**: 25,000 / 1.15 = 21,739 kW.
    - **Max liquid nodes**: 21,739 / 8 = 2,717 nodes.
    - **Liquid racks**: floor(60 / 8) = 7 nodes/rack. Total racks: ceil(2,717 / 7) = 389.
    - **Result**: **Liquid cooling yields 314 more nodes and reduces footprint by 84%.**
