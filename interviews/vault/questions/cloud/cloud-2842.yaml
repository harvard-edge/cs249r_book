title: Asynchronous Checkpointing vs Synchronous Checkpointing
scenario: During distributed training of a large language model, the job periodically stalls while saving the model state to cloud storage.
question: What is asynchronous checkpointing, and how does it mitigate compute stalls compared to synchronous checkpointing?
details:
  realistic_solution: Asynchronous checkpointing allows the training job to continue processing the next batch of data while the state from the previous step is being written to durable storage in the background. A snapshot is typically quickly copied from GPU HBM to host CPU RAM, freeing the GPU. A separate host CPU thread then slowly transfers the data to persistent cloud storage.
  common_mistake: |
    **The Pitfall:** Thinking asynchronous checkpointing completely prevents hardware failures or data loss.
    **The Rationale:** Engineers confuse the performance optimization (hiding I/O latency) with the reliability guarantee itself.
    **The Consequence:** Misunderstanding the true value of the technique, which is strictly about maximizing GPU utilization by overlapping I/O with computation.
  napkin_math: |
    *   **Model State Size:** 140 GB distributed across 8 GPUs.
    *   **Network Write (Synchronous):** Writing 140 GB over a typical network might take $\approx$ 42 seconds (GPUs fully blocked).
    *   **PCIe Transfer (Asynchronous):** Copying to Host RAM over PCIe Gen4 (32 GB/s per GPU) takes $140 \text{ GB} / (8 \times 32 \text{ GB/s}) \approx$ **0.55 seconds**.
    *   **Time Saved:** GPUs are blocked for only **0.55s instead of 42s**, recovering massive amounts of compute time.
