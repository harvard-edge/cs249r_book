title: Learned Positional Embeddings for Sequence Modeling
scenario: You are evaluating the impact of adding positional embeddings to a session sequence in a recommendation model.
question: "Why do positional embeddings improve session next-item prediction, and when can positional information hurt generalization?"
details:
  realistic_solution: 'Positional embeddings encode the recency and order of items in a session. In sequential recommendation, a user''s recent items (position N-1, N-2) are stronger predictors of next intent than older items. Without positional embeddings, all-position pooling treats ''viewed 5 minutes ago'' and ''viewed 3 days ago'' identically — losing the recency signal. SASRec with learned positional embeddings achieves 10-20% Recall improvement over average pooling on standard benchmarks because attention can learn to weight recent positions more heavily. Hurt generalization: users with random exploratory behavior (e.g., browsing unrelated categories sequentially) — the model learns spurious temporal correlations. If ''sport shoes → kitchen appliances → sport shoes'' appears in training as a pattern, the model over-fits to that position 1→position 3 pattern. Mitigation: train with dropout over positional embeddings, forcing the model to rely on content when position is unavailable.'
  common_mistake: |
    **The Pitfall:** Assuming positional embeddings always improve model performance universally.
    **The Rationale:** Positional encodings are standard in NLP and generally improve sequence modeling.
    **The Consequence:** Overfitting to arbitrary orderings for users with highly diverse, non-sequential browsing behavior (random exploration).
  napkin_math: |
    1. **Assumptions & Constraints:** T=50, dim=64, batch=2048.
    2. **Calculations:** Attention FLOPs: QK^T = 50 * 50 * 64 = 160k MACs. AV = 160k MACs. Total per sample = 640k FLOPs. For batch 2048: 640k * 2048 = ~1.31 GFLOPs. Pooling: 50 * 64 * 2048 = 6.5 MFLOPs.
    3. **Conclusion & Interpretation:** **Result: Compute Tradeoff.** Attention requires ~200x more FLOPs than average pooling, justified by recall gains.
