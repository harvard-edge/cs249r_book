title: Embedding Table Hot Row Replication for Serving
scenario: 'Your recommendation serving cluster has 16 A100 serving nodes, each with an embedding table shard. Profiling shows that the top-10k rows (out of 50M total) in the user-ID embedding table receive 80% of all lookups. These 10k rows create a hotspot on 2 nodes (they share a row range).'
question: How would you replicate the top-10k hot embedding rows across 16 A100 serving nodes, and what read-throughput improvement would that give?
details:
  realistic_solution: 'Dynamic hot-row replication: (1) Monitor per-row access frequency on a sliding 10-minute window. Rows exceeding 100 lookups/minute are promoted to ''hot'' status. (2) Hot rows are replicated to all serving nodes asynchronously (gossip-based or central coordinator push). Replication lag: <5 seconds for hot rows (small data). (3) Routing: a consistent hash ring normally assigns rows to nodes. For replicated hot rows, the router uses load-aware routing — send to the least-loaded node among all nodes holding that row. (4) Invalidation: on embedding update (online learning), broadcast updates for hot rows to all replicas before marking the update complete. Read throughput improvement: currently 2 nodes serve 80% of lookups (10k hot rows on 2 nodes). Each A100 can serve 200M lookups/s (random HBM access). 2 nodes: 400M lookups/s at 80% load = 320M effective. After replication to all 16 nodes: 16 * 200M * 0.8 = 2.56B lookups/s. Improvement: 2.56B / 320M = 8x for hot rows.'
  common_mistake: |
    **The Pitfall:** Proposing static replication of all top-10k rows on all 16 nodes upfront.
    **The Rationale:** Candidates assume the hot rows are fixed, failing to consider that popularity changes over time as new users become active.
    **The Consequence:** The system cannot adapt to changing access patterns, leading to new hotspots as user behavior shifts.
  napkin_math: |
    - **Hot row lookup rate:** Assume 2M QPS * 500 sparse features = 1B lookups/s total.
    - **Hotspot load:** 80% of lookups go to 10k hot rows = 800M lookups/s.
    - **Current capacity:** 2 nodes at 200M lookup/s each = 400M/s capacity (2x under-provisioned).
    - **Replicated capacity:** With 16 nodes, capacity is 3.2B/s (4x headroom).
    - **Cache sizing:** At 256 bytes/row * 10k rows = 2.56 MB, which easily fits in the A100 L2 cache (40 MB).
    - **Performance impact:** Cached hot row lookup latency drops to L2 hit time (~50 ns) vs HBM (~250 ns), dramatically increasing throughput and providing **sufficient capacity for 800M hot lookups/s with massive headroom**.
