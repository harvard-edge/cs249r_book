title: Diagnosing Monolithic Accelerator Fab Rejection
scenario: Your AI hardware startup has designed a monolithic AI accelerator chip. To maximize on-chip SRAM capacity, the design requires 1,250 mm² of silicon area. Despite using a 5nm process node and fully validated power delivery, the semiconductor foundry rejects the tapeout outright due to fundamental physical limitations.
question: Why would a foundry reject a 1,250 mm² monolithic 5 nm AI accelerator, and what architectural shift is required?
details:
  realistic_solution: The design exceeds the photolithographic reticle limit (typically ~858 mm², based on a 26mm x 33mm exposure field) of standard EUV scanners. The architecture must be fundamentally decomposed from a monolithic die into a multi-die chiplet design interconnected via advanced packaging like a silicon interposer.
  common_mistake: |
    **The Pitfall:** Assuming the rejection is due to thermal density or uneconomical yield projections.
    **The Rationale:** Candidates think in terms of defects per area and attempt to slightly prune the SRAM instead of realizing there is a hard physical manufacturing ceiling.
    **The Consequence:** Designing chips that literally cannot be printed by existing fabrication machinery.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Proposed die area = 1,250 mm².
       - Standard ASML EUV scanner exposure field = 26 mm x 33 mm.
    2. **Calculations:**
       - Maximum printable reticle area = 26 mm * 33 mm = 858 mm².
       - Comparison: 1,250 mm² > 858 mm².
    3. **Conclusion & Interpretation:**
       - **Result: Fabrication-Bound.** Since 1,250 mm² exceeds the physical reticle limit of 858 mm², it is impossible to print the chip in a single photolithographic exposure. The design must be decomposed into chiplets.
