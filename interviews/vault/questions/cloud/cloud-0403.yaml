title: 'The TCO of Privacy: Federated Learning''s Compute Tax'
scenario: You're evaluating a switch from a centralized training strategy to a Federated Learning (FL)
  approach for your global fleet of autonomous vehicles to improve user privacy. Engineering analysis
  shows that due to communication overhead and on-device constraints, the FL model requires approximately
  20% more total training compute (FLOPs) to achieve the same accuracy as the centralized model. If the
  centralized model requires `6.0 x 10^23` FLOPs to train, calculate the *additional* compute cost the
  company will incur by adopting Federated Learning.
question: "If FL adds 20% training compute over a 6.0 x 10^23 FLOP centralized baseline, what is the additional compute cost?"
details:
  realistic_solution: The correct approach is to calculate 20% of the baseline compute cost. This value
    represents the direct, additional expenditure in terms of GPU-time required to maintain model quality
    while gaining the privacy benefits of Federated Learning.
  common_mistake: The most common mistake is to calculate the *total* compute for the Federated Learning
    model (the baseline plus the overhead) rather than just the *additional* cost. The question specifically
    asks for the incremental TCO increase, which is the key business input for the decision.
  napkin_math: 1. **Baseline Compute:** `6.0 x 10^23` FLOPs
  options:
  - '`7.2 x 10^23` FLOPs'
  - '`1.2 x 10^22` FLOPs'
  - '`1.2 x 10^23` FLOPs'
  - '`4.8 x 10^23` FLOPs'
  correct_index: 2
