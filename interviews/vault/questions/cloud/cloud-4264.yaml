title: NUMA Effects in MI300X Multi-XCD Workloads
scenario: A distributed training run on MI300X shows 15% lower MFU than expected on
  H100 despite MI300X having higher raw bandwidth. Describe your NUMA diagnosis methodology.
question: How would you diagnose and fix NUMA-related MFU loss on MI300X versus H100?
details:
  realistic_solution: Profile with rocprof to measure cross-XCD fabric traffic. Check
    if weight matrices are allocated NUMA-locally per XCD. Use hipMemAdvise(HIP_MEM_ADVISE_SET_PREFERRED_LOCATION)
    to pin tensors. For tensor parallel workloads, partition model layers such that
    each XCD owns complete weight shards, minimizing all-reduce hops across the Infinity
    Fabric.
  common_mistake: Comparing aggregate bandwidth numbers directly. MI300X's 5.3 TB/s
    is the sum across all XCDs; each XCD sees only a fraction. H100's 3.35 TB/s is
    monolithic — every SM can access it equally.
  napkin_math: 'MI300X per-XCD local BW: 5.3 TB/s / 8 ≈ 662 GB/s. H100 monolithic
    BW: 3.35 TB/s. If 30% of MI300X accesses are cross-XCD at 2x penalty, effective
    BW ≈ 662×0.7 + 331×0.3 = 463 + 99 = 562 GB/s per XCD — below H100''s flat 3.35
    TB/s available to all SMs.'
