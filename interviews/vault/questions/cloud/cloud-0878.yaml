title: Evaluating API Defenses Against Model Extraction
scenario: 'You manage a commercial MLaaS API serving a proprietary 70B parameter classification model,
  charging $0.005 per query. Telemetry shows a user making structured, high-entropy queries distributed
  evenly across the input space, indicating an active learning-based model extraction attack. The adversary
  needs approximately 2 million labeled examples with full confidence logits to train a highly capable
  7B parameter surrogate model. You must evaluate three defenses to mitigate this approximate model theft:
  (A) Adding N(0, 0.05) Gaussian noise to the returned confidence logits, (B) Returning only the top-1
  hard label instead of the full probability distribution, and (C) Implementing strict global rate limiting
  of 10,000 queries/day per organization. Justify your choice by quantifying the trade-off between defense
  efficacy, API revenue, and legitimate user utility.'
details:
  realistic_solution: Returning top-1 hard labels instead of full logits is the optimal trade-off. It
    drastically reduces the rich 'dark knowledge' (information gradients) available to the adversary,
    forcing them to query the decision boundary exponentially more times. This breaks the economic viability
    of the attack while maintaining 100% utility for the vast majority of legitimate users who only need
    the final decision, completely avoiding the collateral revenue loss of rate limits.
  common_mistake: Candidates often choose strict rate limiting without calculating the economic impact
    on high-volume enterprise customers, or they mistakenly assume that adding zero-mean noise prevents
    extraction rather than merely slightly increasing the attacker's required sample complexity.
  napkin_math: 'Baseline extraction cost (using logits): 2,000,000 queries * $0.005 = $10,000. Soft labels
    (logits) provide rich gradient information for distillation. By hiding logits and returning only hard
    labels, the sample complexity required to map the model''s decision boundaries increases by ~50x.
    New required queries: 100,000,000. New extraction cost: 100M * $0.005 = $500,000. At $500k, the attack
    economics flip entirely, making it cheaper for the adversary to hire human annotators and train from
    scratch.'
