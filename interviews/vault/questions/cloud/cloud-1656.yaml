title: Online Learning Backlog Catch-Up Calculation
scenario: An e-commerce CTR prediction model (DLRM) experiences severe concept drift during flash sales,
  degrading accuracy rapidly. To mitigate this, you implement an online learning pipeline. The training
  cluster (4x A100 GPUs) processes online updates at a maximum throughput of 50,000 samples/sec. Incoming
  traffic during a flash sale spikes to 20,000 requests/sec. If the pipeline stalls for 15 minutes due
  to an upstream Kafka broker failure, calculate the exact time it takes for the online learning pipeline
  to process the accumulated backlog and catch up to the live stream once restored.
question: "How long will the online learning pipeline take to drain a 15-minute backlog after Kafka recovers?"
details:
  realistic_solution: Calculate the accumulated backlog size, then divide by the net processing rate (max
    throughput minus the live incoming rate) to find the true catch-up time.
  common_mistake: Dividing the backlog size by the total training throughput (50k) rather than the net
    catch-up throughput (50k - 20k), ignoring the new data that continues arriving during the recovery
    period.
  napkin_math: Flash sale concept drift creates a 15-minute backlog. At an incoming rate of 20,000 req/s,
    backlog size = 15 min * 60 s/min * 20,000 = 18,000,000 samples. The 4x A100 training cluster processes
    50,000 samples/sec max. Net catch-up rate = 50,000 - 20,000 (live stream) = 30,000 samples/sec. Time
    to drain backlog = 18,000,000 / 30,000 = 600 seconds (10 minutes).
