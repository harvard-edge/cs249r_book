title: The Context Parallelism for Long Sequences
scenario: You need to train a model with a 1M token context window. Standard self-attention requires $O(n^2)$
  memory for the attention matrix. With hidden dim 8192 and FP16, a single attention head's score matrix
  for 1M tokens is 1.86 TB — it doesn't fit on any single GPU. How do you distribute the sequence across
  GPUs, and what's the communication pattern?
question: "How do you distribute the sequence across GPUs, and what's the communication pattern?"
details:
  realistic_solution: 'Use **Ring Attention** (context parallelism). Split the 1M sequence into $P$ chunks
    across $P$ GPUs. Each GPU holds queries for its chunk and iteratively receives key-value blocks from
    other GPUs in a ring pattern. In each ring step, a GPU: (1) computes attention between its local queries
    and the current KV block, (2) sends its KV block to the next GPU in the ring, (3) receives the next
    KV block from the previous GPU. After $P$ steps, every GPU has attended to all KV pairs. The key insight:
    computation of attention on the current KV block overlaps with communication of the next KV block.'
  common_mistake: '"Just use FlashAttention — it reduces attention memory to $O(n)$." FlashAttention reduces
    *activation memory* by not materializing the full attention matrix, but the *computation* is still
    $O(n^2)$. At 1M tokens, even with FlashAttention, a single GPU would take prohibitively long to compute
    attention, and the KV cache for all heads still exceeds memory.'
  napkin_math: '1M tokens, $h=8192$, 128 attention heads, head_dim=64, FP16. KV per head: $1M \times 64
    \times 2\text{B} = 122\text{ MB}$. All heads: $128 \times 122\text{ MB} = 15.25\text{ GB}$ for K,
    same for V = **30.5 GB** total KV. Split across $P=32$ GPUs: 31.25K tokens per GPU. Local KV per GPU:
    30.5 GB / 32 = **0.95 GB**. Ring communication: each step sends 0.95 GB of KV to the next GPU. 31
    ring steps × 0.95 GB = 29.5 GB total sent per GPU. At 900 GB/s NVLink (intra-node) for 8 GPUs + 50
    GB/s IB (inter-node) for 24 cross-node hops: intra-node steps: 0.95 GB / 900 GB/s = 1.06 ms. Inter-node
    steps: 0.95 GB / 50 GB/s = 19 ms. If attention compute per block ≥ 19 ms, communication is fully hidden.
    Attention FLOPs per block: $2 \times 31.25K \times 31.25K \times 64 \times 128 = 16\text{ TFLOP}$.
    H100 at 989 TFLOPS: 16/989 = **16.2 ms** — close but slightly less than the 19 ms transfer. Communication
    is *almost* hidden; need to tune chunk sizes or use 2 IB links.'
