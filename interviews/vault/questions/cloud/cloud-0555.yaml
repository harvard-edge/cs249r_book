validation_issues_pro:
- The calculation for the full attention matrix size (1.86 TB) is slightly off; 1M x 1M x 2 bytes is exactly
  2 TB.
- The calculation for KV cache size uses 'MB' and 'GB' but the numbers (122 MB) suggest MiB and GiB, which
  could be clarified.
