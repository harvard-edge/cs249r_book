title: Dual-Socket NUMA Dataloader Bandwidth
scenario: 'You are optimizing a distributed training job on a dual-socket AMD EPYC server with 8 GPUs (4 GPUs per socket). The PyTorch dataloader fetches, decodes, and pushes batches of images to the GPUs. You notice GPUs 4-7 (attached to Socket 1) are starved for data with < 50% utilization, while GPUs 0-3 (attached to Socket 0) are at 95%. Each GPU processes a batch size of 256 images (3MB per decoded image) every 50ms.'
question: How much cross-socket bandwidth do GPUs 4-7 need if staging memory is accidentally allocated on Socket 0, and how would you fix the NUMA issue?
details:
  realistic_solution: 'Pin dataloader processes for GPUs 4-7 to the CPU cores on Socket 1 and restrict their memory allocations to Socket 1''s local DRAM (e.g., using `numactl` or framework-specific NUMA affinity settings).'
  common_mistake: |
    **The Pitfall:** Ignoring NUMA topology and letting the OS allocate memory randomly.
    **The Rationale:** Assuming cross-socket interconnects have sufficient bandwidth for modern GPU ingestion rates.
    **The Consequence:** Starving remote GPUs and halving the effective training throughput of expensive H100s.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size = 256 images * 3 MB = 768 MB.
    - Processing rate = 1 / 0.05s = 20 iter/s.
    - 4 GPUs on Socket 1 fetching from Socket 0.

    **Calculations:**
    - Bandwidth per GPU = 768 MB * 20 = 15.36 GB/s.
    - Cross-socket traffic = 4 * 15.36 GB/s = 61.44 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 61.44 GB/s traffic saturates typical ~64 GB/s links (Cross-Socket-Bandwidth-Bound).**
