title: Sizing a Non-Blocking Fat-Tree Network
scenario: You are designing the network fabric for a 2,048-GPU distributed training cluster using 64-port 400Gbps InfiniBand switches. To ensure maximum throughput for AllReduce collective operations, you must implement a strictly non-blocking (1:1 oversubscription ratio) 2-tier Fat-Tree (Leaf-Spine) topology.
question: "How many 64-port switches are needed for a 1:1 non-blocking 2-tier fat-tree for 2,048 GPUs, split between leaf and spine?"
details:
  realistic_solution: 'To achieve a non-blocking 1:1 ratio, each 64-port leaf switch must divide its ports evenly: 32 downlinks to compute nodes and 32 uplinks to the spine layer. This requires 64 leaf switches to cover 2,048 GPUs. Since each leaf provides 32 uplinks, you need exactly 32 spine switches (each spine uses its full 64 ports to connect to all 64 leaves). The total required is 96 switches.'
  common_mistake: |
    **The Pitfall:** Allocating all 64 ports on the leaf switches to compute nodes or assuming an equal count of leaf and spine switches.
    **The Rationale:** Engineers mistake switch port count for total node capacity or misunderstand the uplinks required for a non-blocking topology.
    **The Consequence:** The network experiences severe oversubscription, bottlenecking AllReduce operations.
  napkin_math: |
    *   **Leaf Port Split:** To be non-blocking, each 64-port switch needs 32 downlinks and 32 uplinks.
    *   **Leaf Switches:** $2,048 \text{ GPUs} / 32 \text{ downlinks} = 64 \text{ leaf switches}$.
    *   **Spine Ports:** 64 leaves each provide 32 uplinks, so 32 spine switches are needed (each using its full 64 ports).
    *   **Result:** **A total of 96 switches (64 leaf + 32 spine) is required.**
