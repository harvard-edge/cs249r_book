title: Sizing a Non-Blocking Fat-Tree Network
scenario: You are designing the network fabric for a 2,048-GPU distributed training cluster using 64-port
  400Gbps InfiniBand switches. To ensure maximum throughput for AllReduce collective operations, you must
  implement a strictly non-blocking (1:1 oversubscription ratio) 2-tier Fat-Tree (Leaf-Spine) topology.
  Calculate the total number of switches required and their exact distribution across the leaf and spine
  layers.
question: "How many 64-port switches are needed for a 1:1 non-blocking 2-tier fat-tree for 2,048 GPUs, split between leaf and spine?"
details:
  realistic_solution: 'To achieve a non-blocking 1:1 ratio, each 64-port leaf switch must divide its ports
    evenly: 32 downlinks to compute nodes and 32 uplinks to the spine layer. This requires 64 leaf switches
    to cover 2,048 GPUs. Since each leaf provides 32 uplinks, you need exactly 32 spine switches (each
    spine uses its full 64 ports to connect to all 64 leaves). The total required is 96 switches.'
  common_mistake: Allocating all 64 ports on the leaf switches to compute nodes (causing severe oversubscription)
    or mistakenly assuming an equal 1:1 count of leaf and spine switches.
  napkin_math: 'Leaf port split: 32 downlinks, 32 uplinks

    Leaf switch count: 2,048 GPUs / 32 downlinks = 64 leaves

    Uplinks per leaf = 32 (meaning 32 independent spine planes)

    Spine switch count: 32 spines (each receiving 1 uplink from all 64 leaves)

    Spine port utilization: 64 leaves * 1 link = 64 ports used per spine

    Total switches = 64 (leaves) + 32 (spines) = 96'
