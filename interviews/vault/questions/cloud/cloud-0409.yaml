title: The MatMul Roofline Test
scenario: 'An engineer is analyzing the performance of a core operation in a large language model: a single
  FP16 matrix multiplication of size (4096, 4096) by (4096, 4096). You are asked to determine if this
  standalone operation is compute-bound or memory-bound when running on a single NVIDIA H100 GPU. Explain
  your reasoning using the concept of Arithmetic Intensity.'
details:
  realistic_solution: The operation is **compute-bound**. To determine this, we calculate the Arithmetic
    Intensity (AI) and compare it to the H100's ridge point. An AI higher than the ridge point means the
    GPU's computational units will be saturated before its memory bandwidth is, making it compute-bound.
  common_mistake: The most common mistake is to confuse latency with bandwidth. Candidates might say 'HBM
    is slow' and immediately assume the operation is memory-bound. This ignores the massive amount of
    computation (FLOPs) that can be done for each byte that is fetched. A correct analysis requires calculating
    the ratio of compute to memory (Arithmetic Intensity) and comparing it to the hardware's capability.
  napkin_math: 1. **Calculate Total FLOPs:** For a matrix multiplication (M, K) x (K, N), the operations
    are `~2 * M * N * K`.
  options:
  - Memory-bound, because accessing over 100 MB from HBM is the primary bottleneck.
  - Memory-bound, because its Arithmetic Intensity is low (~8 Ops/Byte), falling below the H100's ridge
    point.
  - Compute-bound, because its Arithmetic Intensity (~1365 Ops/Byte) is significantly higher than the
    H100's ridge point (~295 Ops/Byte).
  - It's impossible to tell without knowing the GPU's cache hit rate for the operation.
  correct_index: 2
