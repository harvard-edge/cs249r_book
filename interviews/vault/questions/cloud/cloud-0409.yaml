title: The MatMul Roofline Test
scenario: An engineer is analyzing the performance of a core operation in a large language model: a single FP16 matrix multiplication of size (4096, 4096) by (4096, 4096).
question: Is a 4096x4096 FP16 matrix multiplication on a single H100 compute-bound or memory-bound, and why based on arithmetic intensity?
details:
  realistic_solution: "The operation is **compute-bound**. To determine this, we calculate the Arithmetic Intensity (AI) and compare it to the H100's ridge point. An AI higher than the ridge point means the GPU's computational units will be saturated before its memory bandwidth is, making it compute-bound."
  common_mistake: |
    **The Pitfall:** Immediately assuming the operation is memory-bound because "HBM is slow".
    **The Rationale:** Confusing latency with bandwidth and ignoring the massive ratio of compute FLOPs per byte fetched.
    **The Consequence:** Wasting time trying to optimize memory access patterns for an operation that is already fundamentally compute-bound and limited by the Tensor Cores.
  napkin_math: |
    *   **Total FLOPs:** $2 \times 4096 \times 4096 \times 4096$ = 137.4 GFLOPs.
    *   **Memory Read/Write:** Read A ($4096^2 \times 2B$) + Read B ($4096^2 \times 2B$) + Write C ($4096^2 \times 2B$) = $3 \times 33.55$ MB = 100.6 MB.
    *   **Arithmetic Intensity (AI):** 137.4 GFLOPs / 100.6 MB = **1365 FLOPs/Byte**.
    *   **H100 Ridge Point:** Peak FP16 Compute (989 TFLOPS) / Memory Bandwidth (3.35 TB/s) = **295 FLOPs/Byte**.
    *   **Conclusion:** Since 1365 > 295, the operation is heavily **compute-bound**.
  options:
  - Memory-bound, because accessing over 100 MB from HBM is the primary bottleneck.
  - Memory-bound, because its Arithmetic Intensity is low (~8 Ops/Byte), falling below the H100's ridge point.
  - Compute-bound, because its Arithmetic Intensity (~1365 Ops/Byte) is significantly higher than the H100's ridge point (~295 Ops/Byte).
  - It's impossible to tell without knowing the GPU's cache hit rate for the operation.
  correct_index: 2
