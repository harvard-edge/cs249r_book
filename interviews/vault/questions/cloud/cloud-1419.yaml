title: Evaluating Influence Functions for ViT Attribution
scenario: You are debugging false positives in a production ViT-L/16 (300M parameters) medical imaging model. The clinical team needs to identify which specific training images from the 5M image dataset are most responsible for these errors. Leave-one-out retraining takes 100 A100 GPU-hours per image. You are evaluating Influence Functions to estimate training data attribution.
question: Is iHVP feasible for a 300M-parameter ViT-L/16, and what approximations make influence functions tractable?
details:
  realistic_solution: Justify restricting the influence function computation to only the final dense classification head, or evaluate using Kronecker-factored (K-FAC) approximations for the full model. Applying IF to only the final 1024-dimensional layer reduces the Hessian to a trivial 4MB size while still providing highly correlated attribution signals.
  common_mistake: |
    **The Pitfall:** Proposing the computation of the exact Hessian or using standard LiSSA across all model weights.
    **The Rationale:** These are standard mathematical definitions for influence functions taught in academic settings.
    **The Consequence:** Candidates fail to realize that storing the full Hessian for a 300M parameter model requires petabytes of memory, making the naive academic approach impossible in production.
  napkin_math: |
    - **Full Hessian Memory:** (300,000,000 &times; 300,000,000) elements &times; 4 bytes/element = 3.6 &times; 10^17 bytes = **&approx;360 PB**. (Impossible)
    - **Last Layer Approximation:** If the final dense classification head has 1024 dimensions.
    - **Last Layer Hessian Memory:** (1024 &times; 1024) elements &times; 4 bytes = **&approx;4.2 MB**. (Trivial)
    - **Compute Time:** Inverting a 1024x1024 matrix takes <10ms on a standard CPU.
