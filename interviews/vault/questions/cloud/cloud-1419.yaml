title: Evaluating Influence Functions for ViT Attribution
scenario: You are debugging false positives in a production ViT-L/16 (300M parameters) medical imaging
  model. The clinical team needs to identify which specific training images from the 5M image dataset
  are most responsible for these errors. Leave-one-out retraining takes 100 A100 GPU-hours per image.
  You are evaluating Influence Functions to estimate training data attribution. How do you assess the
  feasibility of computing the inverse Hessian-vector product (iHVP) for a 300M parameter model, and what
  design approximations are necessary to make it tractable in a production environment?
details:
  realistic_solution: Justify restricting the influence function computation to only the final dense classification
    head, or evaluate using Kronecker-factored (K-FAC) approximations for the full model. Applying IF
    to only the final 1024-dimensional layer reduces the Hessian to a trivial 4MB size while still providing
    highly correlated attribution signals.
  common_mistake: Candidates often propose computing the exact Hessian or using standard LiSSA across
    all weights, failing to realize that storing the full Hessian for a 300M parameter model requires
    petabytes of memory.
  napkin_math: Full Hessian memory = (300M * 300M) elements * 4 bytes/element = 3.6 * 10^17 bytes = ~360
    PB. Last layer Hessian = (1024 * 1024) elements * 4 bytes = ~4.2 MB. Inverting a 1024x1024 matrix
    takes <10ms on a standard CPU.
