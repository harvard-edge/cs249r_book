title: The Collective Communication Primitives
scenario: Your tech lead asks about AllReduce, AllGather, ReduceScatter, and All-to-All collectives used in distributed training.
question: For each collective, name a training strategy that uses it and estimate the per-GPU communication volume for a 1 GB tensor on 8 GPUs.
details:
  realistic_solution: '(1) **AllReduce** → Data Parallelism (DDP): sum gradients across all GPUs. (2) **AllGather** → FSDP forward pass: each GPU holds a shard, AllGather reconstructs the full parameters. (3) **ReduceScatter** → FSDP backward pass: reduce gradients and scatter so each GPU gets its shard''s gradient. (4) **All-to-All** → Expert Parallelism (MoE): route tokens to the correct expert GPU. For a ring implementation with $N$ GPUs and message size $M$: each GPU sends $M \times (N-1)/N$ in both AllReduce (as ReduceScatter + AllGather) and AllGather.'
  common_mistake: |
    **The Pitfall:** Claiming AllReduce sends the full tensor size (N × tensor_size) across the network.
    **The Rationale:** Confusing the total data moved with the per-GPU send volume and ignoring bandwidth-optimal ring implementations.
    **The Consequence:** Drastically overestimating communication bottlenecks and poorly sizing network fabrics.
  napkin_math: |
    - 1 GB tensor, 8 GPUs ($N=8$), ring algorithm.
    - **AllGather:** Each GPU sends its shard $\frac{1}{N}$ to $N-1$ peers. Volume sent = $1\text{GB} \times \frac{7}{8} = 0.875\text{ GB}$.
    - **ReduceScatter:** Each GPU receives and reduces shards, sending $\frac{1}{N}$ of the data $N-1$ times. Volume sent = $1\text{GB} \times \frac{7}{8} = 0.875\text{ GB}$.
    - **AllReduce** = ReduceScatter + AllGather: Each GPU sends data twice. Volume sent = $2 \times 0.875\text{ GB} = 1.75\text{ GB}$.
    - **All-to-All:** Each GPU sends $\frac{1}{N}$ of its data to $N-1$ peers. Volume sent = $0.875\text{ GB}$.
    - **At 900 GB/s NVLink bisection, an AllReduce takes $1.75\text{ GB} / 900\text{ GB/s} \approx 1.9\text{ ms}$.**
