title: Evaluating False Discovery Rates in Concurrent ML A/B Tests
scenario: Your ML platform team runs 50 concurrent A/B tests per week to evaluate new recommendation model variants. Each test uses a standard significance level of \alpha=0.05. Over the last quarter, the engineering team has shipped 25 "winning" models, but overall business metrics have inexplicably flatlined or degraded.
question: What is wrong with the A/B testing framework, and which statistical adjustment should limit false positive deployments without killing velocity?
details:
  realistic_solution: Implement False Discovery Rate (FDR) control using the Benjamini-Hochberg procedure to bound the expected proportion of false discoveries to 5% among all rejected null hypotheses, balancing risk while preserving statistical power.
  common_mistake: |
    **The Pitfall:** Treating each A/B test in isolation and ignoring cumulative false positives, or overcorrecting with Bonferroni.
    **The Rationale:** Candidates understand basic p-values but fail to grasp the multiple testing problem where running many simultaneous experiments inflates the aggregate error rate.
    **The Consequence:** Either the team ships numerous degraded models (false positives) that slowly erode the product, or they use Bonferroni which is so strict it halts all legitimate model deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 concurrent tests, \alpha = 0.05.

    **Calculations:**
    - Expected False Positives: 50 * 0.05 = 2.5/week.
    - Cumulative Probability: 1 - (1 - 0.05)^50 = 92.3%.
    - Bonferroni: p < 0.001.
    - Benjamini-Hochberg: P_{(k)} \leq (k/50) * 0.05.

    **Conclusion & Interpretation:**
    - **Result: Benjamini-Hochberg optimal**. Bounds FDR to 5% without destroying statistical power.
