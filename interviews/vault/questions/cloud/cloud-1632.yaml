title: Evaluating False Discovery Rates in Concurrent ML A/B Tests
scenario: Your ML platform team runs 50 concurrent A/B tests per week to evaluate new recommendation model
  variants. Each test uses a standard significance level of α=0.05. Over the last quarter, the engineering
  team has shipped 25 "winning" models, but overall business metrics have inexplicably flatlined or degraded.
  Evaluate the experimentation framework's flaws and justify a statistical adjustment strategy that limits
  false positive deployments without excessively throttling deployment velocity.
details:
  realistic_solution: Implement False Discovery Rate (FDR) control using the Benjamini-Hochberg procedure
    to bound the expected proportion of false discoveries to 5% among all rejected null hypotheses, balancing
    risk while preserving statistical power.
  common_mistake: Treating each A/B test in isolation and ignoring the cumulative probability of false
    positives, or overcorrecting by blindly applying the Bonferroni method, which drastically reduces
    statistical power and blocks legitimate improvements.
  napkin_math: Tests (m) = 50, α = 0.05. Expected false positives per week = 50 * 0.05 = 2.5. Probability
    of ≥1 false positive = 1 - (1 - 0.05)^50 = 92.3%. Bonferroni requires p < 0.05/50 = 0.001 (too strict).
    Benjamini-Hochberg sorts p-values P_(i), finds max rank k where P_(k) <= (k/50)*0.05, rejecting nulls
    1 to k, safely controlling the false discovery proportion.
