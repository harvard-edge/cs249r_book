title: PPO Clip Ratio Tuning for RLHF Stability
scenario: 'An RLHF PPO training run shows high reward variance with frequent reward collapses every 200 steps. The policy loss is stable but value function loss is high. The clip ratio epsilon is currently 0.2.'
question: "What is causing PPO reward collapses every 200 steps with high value loss and epsilon 0.2, and what tuning changes would you make?"
details:
  realistic_solution: 'Reward collapse in PPO has two causes: (1) Policy updates too large (fix: reduce epsilon or learning rate); (2) Value function divergence making advantage estimates unreliable (fix: separate value function learning rate, add value loss clipping). If value loss is high while policy loss is stable, the bottleneck is the value function. In RLHF with an LLM, the value head is a small MLP added to the last layer that often needs more updates than the policy. Fix: (1) Use separate optimizers: policy lr=1e-6, value lr=1e-5; (2) Run value function warmup for 5 epochs before starting policy updates; (3) Add value loss clipping: clip(V - V_old, -eps_v, +eps_v) with eps_v=0.5; (4) Normalize advantages: (A - mean(A)) / (std(A) + 1e-8). Reduce clip epsilon from 0.2 to 0.1 only if policy updates are confirmed too large.'
  common_mistake: |
    **The Pitfall:** Reducing the policy clip ratio (epsilon) to stabilize training without investigating the value function separately.
    **The Rationale:** Candidates often assume policy updates are too large when reward collapses occur, missing that a divergent value function corrupts advantage estimation.
    **The Consequence:** PPO training remains unstable or collapses completely because the poorly calibrated baseline causes inaccurate advantage estimates, rendering policy clipping ineffective.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PPO clip ratio epsilon = 0.2.
       - Policy loss stable, value function loss high (>0.5 after 500 steps).
    2. **Calculations:**
       - Allowed policy ratio change per step = 20% (epsilon=0.2).
       - Standard LLM PPO recommendations: epsilon=0.1 for 7B, 0.05 for 70B.
       - Value function learning rate ratio typically 10x policy learning rate (e.g., policy_lr=1e-6, value_lr=1e-5).
    3. **Conclusion & Interpretation:**
       - **Result: Value function divergence**. The value head requires a higher learning rate and potentially more capacity (added hidden layers) to converge quickly and provide a stable baseline for advantage estimation.
