title: PPO Clip Ratio Tuning for RLHF Stability
scenario: An RLHF PPO training run shows high reward variance with frequent reward
  collapses every 200 steps. The policy loss is stable but value function loss is
  high. The clip ratio epsilon is currently 0.2. Diagnose and tune.
question: What is causing PPO reward collapses every 200 steps with high value loss
  and epsilon 0.2, and what tuning changes would you make?
details:
  realistic_solution: 'Reward collapse in PPO has two causes: (1) Policy updates too
    large (fix: reduce epsilon or learning rate); (2) Value function divergence making
    advantage estimates unreliable (fix: separate value function learning rate, add
    value loss clipping). If value loss is high while policy loss is stable, the bottleneck
    is the value function. In RLHF with an LLM, the value head is a small MLP added
    to the last layer that often needs more updates than the policy. Fix: (1) Use
    separate optimizers: policy lr=1e-6, value lr=1e-5; (2) Run value function warmup
    for 5 epochs before starting policy updates; (3) Add value loss clipping: clip(V
    - V_old, -eps_v, +eps_v) with eps_v=0.5; (4) Normalize advantages: (A - mean(A))
    / (std(A) + 1e-8). Reduce clip epsilon from 0.2 to 0.1 only if policy updates
    are confirmed too large.'
  common_mistake: Reducing the clip ratio to stabilize training without investigating
    the value function separately. PPO uses a value function baseline to reduce variance;
    if the value function is poorly calibrated, even a tight clip ratio will not prevent
    reward collapse.
  napkin_math: 'PPO clip ratio epsilon=0.2 allows up to 20% policy ratio change per
    step. For LLMs this is typically too aggressive. Recommended: epsilon=0.1 for
    7B models, epsilon=0.05 for 70B models. Value function lr ratio: value_lr = 10x
    * policy_lr is common. At policy_lr=1e-6: value_lr=1e-5. Value loss should converge
    within 100 steps if architecture is correct. High value loss (>0.5 after 500 steps)
    indicates the value head architecture is too shallow. Add 1-2 hidden layers to
    the value MLP.'
