title: Why nn.Module Uses Parameter Registration
scenario: Explain why PyTorch's nn.Module requires explicit parameter registration (nn.Parameter) rather than automatically treating all tensors as learnable parameters.
question: "Why does PyTorch's nn.Module require explicit nn.Parameter registration instead of treating all tensors as learnable?"
details:
  realistic_solution: |
    Explicit parameter registration separates learnable state from non-learnable state within a module. A layer may contain: (1) learnable parameters (weights, biases) that need gradients and optimizer updates, (2) buffers (running mean/variance in BatchNorm) that are part of model state but should NOT receive gradients, and (3) temporary tensors (intermediate computations) that are neither saved nor updated. nn.Parameter signals 'this tensor needs grad=True and should appear in model.parameters()'. Without this distinction, model.parameters() would return everything, the optimizer would try to update BatchNorm statistics via gradient descent (wrong), and serialization would save temporary tensors. The registration pattern also enables automatic recursive parameter discovery — model.parameters() traverses all submodules, collecting only registered Parameters.
  common_mistake: |
    **The Pitfall:** Storing learnable weights as plain tensors instead of `nn.Parameter`.
    **The Rationale:** Junior engineers assume PyTorch automatically traces and tracks all tensor instantiations within a class.
    **The Consequence:** The tensors are silently excluded from `model.parameters()`, meaning the optimizer never updates them during training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ResNet-50: 25.6M parameters.
       - ~100 buffer tensors (e.g., BatchNorm running statistics).
    2. **Calculations:**
       - If all tensors were treated equally, the optimizer would apply gradient descent to the 100 non-learnable buffers.
       - `nn.Parameter` creates a strict bifurcated set, filtering out exactly the non-differentiable buffers.
    3. **Conclusion & Interpretation:**
       - **Result: Logic-Bound**. Explicit parameter registration is critical to prevent corrupting non-learnable state with invalid gradient updates.
