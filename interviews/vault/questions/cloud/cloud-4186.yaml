title: Warp Divergence in Attention Masking
scenario: Your custom attention kernel on MI300X shows 35% lower throughput than expected for causal (triangular) masking. Profiling reveals high warp divergence in the masking branch.
question: Explain why causal masking causes warp divergence and how FlashAttention's tiling strategy eliminates it. With thread coarsening at stride 2048, which sequence positions does thread 49 process?
details:
  realistic_solution: Thread 49 with stride 2048 processes positions 49, 2097, 4145, etc. Implementing causal masking as an if-else branch inside the attention kernel causes divergence because some threads compute valid scores while others are masked to -inf. FlashAttention eliminates this by tiling the computation into blocks and completely skipping the blocks that fall outside the causal mask.
  common_mistake: |
    **The Pitfall:** Implementing causal masking as an if-else branch inside the innermost GPU kernel loop.
    **The Rationale:** Developers accustomed to CPU programming assume branching is cheap, ignoring that GPU threads in a warp execute in lockstep.
    **The Consequence:** The warp must execute both the `if` and `else` paths sequentially, effectively halving throughput for boundary blocks.
  napkin_math: |
    1. **Thread Coarsening Logic:** Thread $i$ processes positions $i, i+\text{stride}, i+2\times\text{stride}$, etc.
    2. **Position Calculation:** At stride=2048, thread 49 processes positions $49, 49+2048=\mathbf{2097}, 49+4096=\mathbf{4145}$.
    3. **Boundary Identification:** At sequence position 2048, the thread processing that position is thread 0 ($0 + 2048$). Thread 49 at that iteration would process 2097, not 2096.
    4. **Divergence Scope:** Warp divergence only occurs in blocks crossing the diagonal of the causal mask. For $N=4096$, wasted threads average to roughly **1-3%** across the sequence, not 25%.
