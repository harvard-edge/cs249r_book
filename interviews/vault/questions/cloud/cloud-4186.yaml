title: Warp Divergence in Attention Masking
scenario: Your custom attention kernel on MI300X shows 35% lower throughput than expected
  for causal (triangular) masking. Profiling reveals high warp divergence in the masking
  branch. Explain why causal masking causes warp divergence and how FlashAttention's
  tiling strategy eliminates it.
question: With thread coarsening at stride 2048, which sequence positions does thread
  49 process?
details:
  realistic_solution: 'Thread 49 with stride 2048 processes positions: 49, 49+2048=2097,
    49+4096=4145, etc. At stride position 2: thread 49 processes position 49+2048=2097
    (not 2096=2048+48 which incorrectly adds 48 instead of the thread index 49).'
  common_mistake: Implementing causal masking as an if-else branch inside the attention
    kernel. Within a single warp of 64 threads (MI300X wavefront), some threads compute
    valid attention scores while others must be masked to -inf. Both paths execute
    sequentially, halving throughput.
  napkin_math: 'Thread coarsening: thread i processes positions i, i+stride, i+2×stride...
    Thread 49 at stride=2048: processes positions 49, 49+2048=2097, 49+2×2048=4145...
    At sequence position 2048, the thread processing that position is thread 0 (position
    2048 = 0 + 2048). Thread 49 at position 2048 would process 49+2048=2097 (the second
    element in thread 49''s range), not 2096=2048+48.'
