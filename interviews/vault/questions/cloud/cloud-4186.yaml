math_issues:
- The example states 'sequence position 2048' but uses condition 'j <= 2048+48', which
  corresponds to sequence position 2096.
- 'The statement ''Average across sequence: ~25% wasted'' is mathematically incorrect;
  warp divergence only occurs in blocks crossing the diagonal, meaning wasted threads
  average to roughly 1-3% across the entire sequence for N=4096, not 25%.'
