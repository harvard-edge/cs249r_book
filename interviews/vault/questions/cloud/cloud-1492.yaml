title: Latency Overhead in Layered Defense
scenario: 'A cloud healthcare ML serving platform implements a 3-layer defense architecture: 1) Hardware TEE (Confidential Computing) that encrypts memory, reducing effective memory bandwidth by 20%; 2) API input sanitization (adds 5ms flat latency); and 3) Output differential privacy noise (adds 3ms flat latency). The served model is a Transformer with a 100ms baseline latency (60ms memory transfer, 40ms compute).'
question: "What is the new end-to-end latency with TEE, input sanitization, and DP noise, and does it meet the 125ms SLO?"
details:
  realistic_solution: Recalculate the memory transfer time by dividing the baseline memory latency by
    the new effective bandwidth ratio (0.8). Then add the unchanged compute time and the constant API/DP
    overheads to find the total latency. The result is 123ms, which passes the 125ms SLO.
  common_mistake: |
    **The Pitfall:** Applying the 20% bandwidth reduction as a flat 20% penalty to total inference latency.
    **The Rationale:** Candidates calculate 100ms * 1.2 = 120ms or 60ms * 1.2 = 72ms, fundamentally misunderstanding the inverse relationship between bandwidth and transfer time.
    **The Consequence:** Incorrectly forecasting system performance and potentially failing capacity planning for confidential computing.
  napkin_math: |
    1. **Assumptions & Constraints:** Baseline = 100ms (60ms memory, 40ms compute). TEE bandwidth reduction = 20%. Flat penalties = 5ms API + 3ms DP = 8ms. Target SLO = 125ms.
    2. **Calculations:** New memory transfer = 60ms / (1 - 0.20) = 75ms. New Inference = 75ms + 40ms = 115ms. Total Latency = 115ms + 5ms + 3ms = 123ms.
    3. **Conclusion & Interpretation:** **Result: Latency-Bound. The new end-to-end latency is 123ms, successfully meeting the strict 125ms SLO.**
