title: Asynchronous Hierarchical Checkpointing for Trillion Parameter Models
scenario: A 1T parameter MoE model training job on 1024 H100s suffers from frequent
  node failures, requiring checkpoints every 15 minutes. Traditional synchronous filesystem
  checkpoints take 3 minutes, destroying throughput.
question: Design an asynchronous, hierarchical checkpointing system that minimizes
  blocking time on the GPUs.
details:
  realistic_solution: Implement an asynchronous in-memory snapshot where each GPU
    quickly copies its optimizer shard from HBM to host CPU RAM over PCIe Gen5. The
    GPU immediately resumes training. A background CPU process then aggregates and
    writes these RAM snapshots to the distributed filesystem (e.g., S3) over the network
    without interrupting the ongoing forward passes.
  common_mistake: Proposing node-local SSD saving without an asynchronous aggregation
    mechanism to recover if the physical node itself catches fire.
  napkin_math: 2GB shard / 64GB/s PCIe = 31ms blocking time vs 180s network write.
