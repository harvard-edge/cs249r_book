title: Compute Cost Estimation for a Large Language Model on NVIDIA H100s
scenario: You are tasked with designing the infrastructure for training a new 70-billion parameter large
  language model (LLM). This model is expected to be trained for 1 trillion tokens. You have access to
  NVIDIA H100 GPUs (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W power consumption).
  Estimate the total GPU-hours and approximate dollar cost for training this model. Consider factors like
  model parallelism, data parallelism, and communication overhead. Assume an average utilization of 60%
  for the FP16 compute capacity and a per-GPU cost of $3.50/hour.
details:
  realistic_solution: 'A realistic solution would involve breaking down the problem: 1. Calculate the
    total FLOPs required for training (2 * num_parameters * num_tokens for forward/backward pass). 2.
    Determine the effective FLOPs per H100 GPU given the FP16 dense TFLOPS and utilization. 3. Estimate
    the total GPU-hours by dividing total FLOPs by effective FLOPs/GPU/hour. 4. Calculate the total dollar
    cost based on GPU-hours and hourly rate. Acknowledge that the 80GB HBM3 is critical for fitting large
    models or large batch sizes, and the 3.35 TB/s memory bandwidth helps prevent memory-bound operations.
    Discuss the need for distributed training techniques (data, pipeline, and tensor parallelism) to fit
    the model and accelerate training across multiple H100s.'
  common_mistake: Underestimating the impact of communication overhead and low hardware utilization on
    overall training time and cost, or not correctly accounting for the memory requirements of a large
    model (e.g., storing activations, optimizer states). Neglecting to mention the importance of efficient
    data loading and distributed training frameworks.
  napkin_math: 'FLOPs for 70B params LLM, 1T tokens: 2 * 70e9 * 1e12 = 1.4e23 FLOPs. Effective H100 FLOPs/sec:
    495e12 FLOPs/sec * 0.60 utilization = 2.97e14 FLOPs/sec. Total GPU-seconds: 1.4e23 FLOPs / 2.97e14
    FLOPs/sec/GPU = 4.71e8 GPU-seconds. Total GPU-hours: 4.71e8 / 3600 = 130,833 GPU-hours. Total cost:
    130,833 * $3.50/hour = $457,915.50.'
