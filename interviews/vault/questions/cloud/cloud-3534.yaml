title: 'Real-time Fraud Detection with AMD MI300X: Feature Store & Point-in-Time Correctness'
scenario: Your team is building a real-time fraud detection system where model inference is performed on an AMD MI300X accelerator. The system requires features to be fresh within milliseconds and needs strict point-in-time correctness for replaying historical events.
question: How would you design online and offline feature stores to feed the fraud model with millisecond-fresh, point-in-time-correct features?
details:
  realistic_solution: The architecture should comprise a low-latency online feature store (e.g., Redis, DynamoDB) for real-time inference and a scalable offline feature store (e.g., Delta Lake on S3/HDFS) for training and historical analysis. Streaming pipelines (e.g., Flink/Kafka Streams) would ingest raw events, compute features in real-time, and update the online store. Batch pipelines (e.g., Spark) would populate the offline store and generate training datasets. Point-in-time correctness can be achieved by versioning features with event timestamps and ensuring that both online retrieval and offline joins filter features based on the `as_of` timestamp of the event. For the MI300X, frequently accessed embedding vectors or hot features should be aggressively cached or pre-loaded into the HBM3. Feature data structures should be optimized for memory access patterns to fully exploit the HBM3 bandwidth, potentially using columnar formats or specialized custom kernel for feature lookups directly on the accelerator. Monitoring for feature freshness (e.g., age of features) and consistency (online vs. offline values) is crucial.
  common_mistake: |
    **The Pitfall:** Designing online and offline stores without a unified mechanism for point-in-time correctness.
    **The Rationale:** Candidates focus heavily on the latency of the online store (Redis) and the scale of the offline store (S3) but neglect the join logic required to prevent training-serving skew.
    **The Consequence:** The model trains on future data ("data leakage") due to sloppy offline joins, resulting in excellent offline metrics but terrible production performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - QPS: 1M requests per second.
       - Feature size: ~1KB per request.
       - Hardware: MI300X with 192 GB HBM3 capacity, 5.3 TB/s bandwidth.
    2. **Calculations:**
       - Online Store Throughput needed: 1M * 1KB = 1 GB/s.
       - HBM3 Capacity: 192 GB stores ~192 million 1KB feature vectors.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity). 1 GB/s is trivial vs 5.3 TB/s bandwidth. System data delivery is the constraint; aggressively cache hot features in HBM3.**
