title: The Tensor Parallelism Degree
scenario: 'You''re serving a 70B LLM and must choose the tensor parallelism (TP) degree: TP=2, TP=4, or
  TP=8 across H100 GPUs connected via NVLink. Higher TP reduces per-GPU memory and per-token latency,
  but adds communication overhead. Calculate the optimal TP degree for a latency target of 40ms per output
  token.'
details:
  realistic_solution: Each transformer layer with TP requires two AllReduce operations (one after the
    attention projection, one after the MLP). The AllReduce volume per operation is $2 \times (TP-1)/TP
    \times \text{hidden\_size} \times \text{batch} \times \text{bytes}$. With NVLink at 900 GB/s bidirectional,
    the communication time per layer is small but multiplies across 80 layers and 2 AllReduces per layer.
  common_mistake: '"Use TP=8 for maximum parallelism — more GPUs always means lower latency." This ignores
    that each TP step requires an AllReduce synchronization, and the communication cost grows with TP
    degree.'
  napkin_math: '70B model (Llama-2 70B): 80 layers, hidden=8192, FP16 (140 GB weights), batch=1 decode.

    H100: 989 TFLOPS FP16, 3.35 TB/s HBM3, NVLink 900 GB/s bidirectional.


    **Decode is memory-bound at batch=1.** Per-token latency = weight_read_time + communication.


    **TP=2:**

    Weight read per GPU: 140/2 = 70 GB. Time = 70 GB / 3.35 TB/s = 20.9 ms.

    Comm per AllReduce: 2×(2-1)/2 × 8192 × 2 = 16,384 bytes.

    Comm per layer: 2 AllReduces × 16,384 = 32,768 bytes.

    Total comm: 80 layers × 32,768 bytes = 2.62 MB.

    Ring AllReduce on 2 GPUs: T = 2.62 MB / 450 GB/s (unidirectional NVLink) ≈ 0.006 ms.

    **Total: 20.9 + 0.006 ≈ 20.9 ms** ✓ meets 40 ms.


    **TP=4:**

    Weight read: 140/4 = 35 GB / 3.35 TB/s = 10.4 ms.

    Comm per AllReduce: 2×(4-1)/4 × 8192 × 2 bytes = 1.5 × 16,384 = 24,576 bytes.

    Total: 80 × 2 × 24,576 = 3.93 MB.

    At TP=4 ring, effective BW ≈ 450 GB/s. Time = 3.93 MB / 450 GB/s ≈ 0.009 ms.

    Plus per-message latency: 80 × 2 × 2×(4-1) × 5 μs = 80 × 2 × 6 × 5 μs = 4.8 ms.

    Total with latency overhead: 10.4 + 0.009 + ~0.5 ms (realistic overhead) ≈ **10.9 ms** ✓ meets 40
    ms.


    **TP=8:**

    Weight read: 140/8 = 17.5 GB / 3.35 TB/s = 5.22 ms.

    Comm: 2×(8-1)/8 × 8192 × 2 = 1.75 × 16,384 = 28,672 bytes per AllReduce.

    Total: 80 × 2 × 28,672 = 4.59 MB / 450 GB/s ≈ 0.010 ms.

    With latency overhead: ~1 ms.

    **Total: 5.22 + 0.01 + ~1 ms ≈ 6.2 ms** ✓ meets 40 ms.


    **Cost comparison (all meet 40 ms SLO):**

    - TP=2: 2 GPUs × $3.50/hr = **$7.00/hr**, latency = 20.9 ms.

    - TP=4: 4 GPUs × $3.50/hr = **$14.00/hr**, latency = 10.9 ms.

    - TP=8: 8 GPUs × $3.50/hr = **$28.00/hr**, latency = 6.2 ms.


    **Optimal: TP=2** — meets the 40 ms SLA at lowest cost. Communication overhead is negligible because
    NVLink bandwidth (900 GB/s) vastly exceeds the small AllReduce payloads (< 5 MB). The decision is
    purely economic.'
