title: Content Moderation Fairness Constraint Resolution
scenario: You are debugging an automated content moderation API serving 5M requests/day on a fleet of
  T4 GPUs. An audit reveals the model's false positive rate for flagging toxicity is 15% for Group A (base
  rate 2%) and 5% for Group B (base rate 10%). The product team demands you retrain the model to achieve
  Equalized Odds (equal FPR and FNR across groups) while maintaining perfect Calibration (predicted probability
  matches actual likelihood) without impacting the 50ms p99 latency SLA. Diagnose why this request is
  failing in production despite extensive hyperparameter tuning.
details:
  realistic_solution: Apply the Fairness Impossibility Theorem to diagnose the failure. Since the group
    base rates differ (2% vs 10%), a non-perfect classifier mathematically cannot satisfy both Calibration
    and Equalized Odds simultaneously. You must inform the product team to relax one constraint, typically
    by setting group-specific thresholds to enforce Equalized Odds while accepting miscalibration.
  common_mistake: Believing that adding more balanced training data, increasing model capacity, or fine-tuning
    thresholds can simultaneously satisfy Equalized Odds and Calibration when group base rates differ.
  napkin_math: A perfectly calibrated model guarantees P(Y=1|Score=s) = s. However, mathematically, FPR
    = ((1 - Precision) / Precision) * (BaseRate / (1 - BaseRate)) * (1 - FNR). Group A base rate is 2%
    (0.02) and Group B is 10% (0.10). Because the base rates differ significantly, enforcing equal FPR
    and FNR across both demographic groups necessitates that their Precisions differ, making joint calibration
    impossible.
