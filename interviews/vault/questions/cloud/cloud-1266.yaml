title: Content Moderation Fairness Constraint Resolution
scenario: You are debugging an automated content moderation API serving 5M requests/day
  on a fleet of T4 GPUs. An audit reveals the model's false positive rate for flagging
  toxicity is 15% for Group A (base rate 2%) and 5% for Group B (base rate 10%). The
  product team demands you retrain the model to achieve Equalized Odds (equal FPR
  and FNR across groups) while maintaining perfect Calibration (predicted probability
  matches actual likelihood) without impacting the 50ms p99 latency SLA.
question: Why is the request for Equalized Odds plus perfect Calibration failing despite
  tuning, and what constraint must be relaxed?
details:
  realistic_solution: 'Apply the Fairness Impossibility Theorem to diagnose the failure.
    Since the group base rates differ (2% vs 10%), a non-perfect classifier mathematically
    cannot satisfy both Calibration and Equalized Odds simultaneously. You must inform
    the product team to relax one constraint, typically by setting group-specific
    thresholds to enforce Equalized Odds while accepting miscalibration.

    '
  common_mistake: '**The Pitfall:** Believing that adding more balanced training data
    or tuning thresholds can solve the constraint conflict.

    **The Rationale:** Candidates treat fairness as a pure data/capacity problem,
    unaware of the mathematical impossibility of satisfying both Calibration and Equalized
    Odds when base rates differ.

    **The Consequence:** The team wastes endless cycles on hyperparameter tuning and
    data collection attempting to solve a mathematically impossible objective.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Group A Base Rate (p_A): 0.02.

    - Group B Base Rate (p_B): 0.10.

    - Fairness Requirement: Equalized Odds (TPR_A = TPR_B, FPR_A = FPR_B).

    - Calibration Requirement: Equal Precision (PPV_A = PPV_B).


    **Calculations:**

    - Bayes'' Theorem for PPV: PPV = (TPR * p) / (TPR * p + FPR * (1 - p)).

    - Substitute equalized odds: Since TPR and FPR are equal across groups, PPV is
    strictly a function of the base rate p.

    - Resulting Inequality: Because p_A (0.02) != p_B (0.10), PPV_A cannot mathematically
    equal PPV_B unless TPR=1 and FPR=0 (a perfect model).


    **Conclusion & Interpretation:**

    - **Result: Mathematically Impossible.** According to the Fairness Impossibility
    Theorem, differing base rates make it impossible to satisfy both Equalized Odds
    and Calibration simultaneously. One constraint must be relaxed.

    '
