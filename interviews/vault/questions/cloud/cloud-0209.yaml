title: The A/B Testing at Scale
scenario: We want to A/B test our current 13B model against a new 70B model in shadow mode. The product
  team says 'just mirror 100% of traffic to both models for a week to gather data.' Why is this statistically
  unnecessary but infrastructure-ruinous, and how does the GPU memory asymmetry between these models dictate
  your A/B testing architecture?
details:
  realistic_solution: The infrastructure cost of an A/B test is dominated by hardware provisioning, not
    the statistical sample size. A 13B model fits on a single A100 (40GB) with room for KV-cache. A 70B
    model requires tensor parallelism across at least 4× A100s (80GB) or 2× H100s just to fit the weights,
    plus massive KV-cache overhead. Mirroring 100% of traffic means provisioning a 70B cluster that is
    5-8× larger and more expensive than your production 13B cluster, just for a test. Instead, use an
    asymmetric traffic split (e.g., 95/5) or sample-based shadow routing. You only need to route enough
    traffic to the 70B model to reach statistical significance, which is typically a few thousand requests.
  common_mistake: '"Just spin up enough 70B instances to handle the mirrored traffic." This ignores the
    massive non-linear cost of serving a 70B model and the fact that statistical significance requires
    a fraction of that traffic.'
  napkin_math: '- **Memory Asymmetry:** 13B FP16 = 26GB weights. Fits on 1× A100 (40GB) with 14GB for
    KV-cache. 70B FP16 = 140GB weights. Requires 2× H100 (80GB) or 4× A100 (40GB). The 70B model requires
    4× the GPUs per replica. | - **Traffic Mirroring Cost:** If production is 1,000 QPS running on 50×
    A100s, mirroring 100% to 70B would require ~200-300 H100 GPUs due to lower throughput and higher memory
    footprint. At ~$4/hr per H100, 250 GPUs × $4/hr × 168 hrs/week ≈ **$168k/week**. | - **Statistical
    Reality:** To detect a 3% quality improvement with 80% power, you need ~3,200 samples per arm. At
    1,000 QPS, you collect 3,200 samples in 3.2 seconds. | - **Optimized Architecture:** Route 99.9% of
    traffic to 13B, and 0.1% (1 QPS) to a single minimal 70B deployment (2× H100s). You gather the required
    3,200 samples in under an hour, costing ~$10 in GPU compute instead of $168k.'
