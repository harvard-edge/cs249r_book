title: Full-Stack FlashAttention Deployment Decision
scenario: 'You are the Staff ML engineer deciding the attention implementation for
  a new 405B model served on 64x H100 (8 nodes, NVLink + InfiniBand 400 Gb/s). Context
  window: 32K. Requirements: P99 TTFT < 2s, 1000 req/s throughput. Propose the complete
  attention stack: FlashAttention variant, KV cache management, sequence parallelism,
  and prefix caching strategy. Justify each choice with napkin math.'
question: What is the per-token FLOP cost of a 405B model on an H100, and why is 810
  TFLOPs per token a unit error?
details:
  realistic_solution: '405B model: 2 × 405B = 810 GFLOPs/token (not 810 TFLOPs — TFLOPS
    would imply 405T parameters). 810 GFLOPs/token at 989 TFLOPS = ~0.82ms/token.'
  common_mistake: 'Treating these as independent choices. The attention kernel, KV
    cache manager, parallelism strategy, and caching layer interact: PagedAttention''s
    non-contiguous blocks require FlashAttention to support block-sparse reads; Ring
    Attention''s overlap budget depends on per-tile compute time.'
  napkin_math: '405B model FLOPs per token: 2 × 405B = 810 GFLOPs/token (not 810 TFLOPs
    — 810 TFLOPs would mean 405T params, not 405B). 810 GFLOP/token. H100 at 989 TFLOPS:
    810G/989T = 0.819ms per token at 100% utilization.'
