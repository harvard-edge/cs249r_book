math_issues:
- 'Unit error: 405B model takes 810 GFLOP/token, not 810 TFLOP.'
- Throughput calculation incorrectly assumes 16 concurrent requests per GPU. With
  Tensor Parallelism, requests span all GPUs, so throughput should be 16 / 0.5s =
  32 req/s, not 2048.
