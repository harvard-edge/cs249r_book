title: Sizing Kafka Brokers for Peak Ingestion
scenario: A global ML telemetry pipeline ingests 2 million events per second continuously. Each event payload is 500 bytes. The data is ingested into an Apache Kafka cluster configured with a replication factor of 3. Each Kafka broker node is equipped with an NVMe drive capable of 800 MB/s sustained sequential write throughput.
question: Assuming network bandwidth is not a bottleneck, what is the absolute minimum number of Kafka brokers needed to handle this peak ingestion?
details:
  realistic_solution: Account for replication overhead on disk writes. The total cluster write throughput is 3000 MB/s. Dividing by the 800 MB/s per-node limit gives a strict minimum of 4 brokers, though 5-6 would be typical for operational headroom.
  common_mistake: |
    **The Pitfall:** Calculating broker count based solely on the incoming data rate.
    **The Rationale:** Candidates often ignore the write amplification caused by the replication factor.
    **The Consequence:** This leads to a severely undersized estimate (e.g., 2 brokers), causing disk I/O saturation and backpressure.
  napkin_math: |
    - **Base ingestion rate:** 2,000,000 events/sec * 500 bytes/event = 1,000,000,000 bytes/sec = 1000 MB/s.
    - **Total disk write throughput:** 1000 MB/s * 3 (replication factor) = 3000 MB/s.
    - **Minimum brokers:** 3000 MB/s / 800 MB/s per broker = 3.75.
    - **Conclusion:** Ceiling to **4 brokers**.
