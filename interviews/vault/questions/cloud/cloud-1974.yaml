title: Sizing Kafka Brokers for Peak Ingestion
scenario: A pipeline ingests 2 million events per second continuously. Each payload is 500 bytes. Data is ingested into Kafka with a replication factor of 3. Each node supports 800 MB/s sustained write.
question: "Assuming network bandwidth is not a bottleneck, what is the absolute minimum number of Kafka brokers needed to handle this peak ingestion?"
details:
  realistic_solution: Account for replication overhead on disk writes. Total write throughput requires 3000 MB/s, mandating a strict minimum of 4 brokers.
  common_mistake: |
    **The Pitfall:** Calculating based solely on the incoming data rate.
    **The Rationale:** Ignoring the write amplification caused by the replication factor.
    **The Consequence:** Severe disk I/O saturation leading to backpressure and ingestion failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2M events/s, 500 bytes/event. RF=3. Limit = 800 MB/s per node.

    **Calculations:**
    - Data rate = 1000 MB/s. Total write = 3000 MB/s.
    - Brokers = 3000 / 800 = 3.75.

    **Conclusion & Interpretation:**
    - **Result: Absolute minimum of 4 brokers is required (I/O-Bound)**.
