title: The Distillation Cost-Benefit Analysis
scenario: Your team plans to distill a 175B parameter teacher model to a 7B student model to reduce serving
  costs. The distillation process involves training the 7B student on 140B tokens of data, using the 175B
  teacher to generate soft labels for each token. Your manager asks you to demonstrate if the project
  is financially viable. Assuming H100s cost $2/hour and you can achieve 40% MFU, calculate the cost of
  this distillation run and determine the primary driver of that cost.
question: "What is the cost of distilling the 175B teacher into a 7B student on 140B tokens at 40% MFU and $2/H100-hour, and what drives it?"
details:
  realistic_solution: 'The total compute cost is the sum of training the student model and running inference
    on the teacher model to generate soft labels. Student training FLOPs = 6 × P_student × D = 6 × 7B
    × 140B = 5,880 ExaFLOPs. Teacher inference FLOPs = 2 × P_teacher × D = 2 × 175B × 140B = 49,000 ExaFLOPs.
    Total = 54,880 ExaFLOPs. The teacher''s forward passes consume 89% of total compute — the dominant
    cost driver. At 40% MFU on H100 (395.6 effective TFLOPS): required H100-hours = 5.488 × 10^22 / (395.6
    × 10^12 × 3600) = 38,535 hours. At $2/hour: total cost ≈ $77,070. This is financially viable. The
    key optimization is to cache teacher logits to disk after one pass, avoiding recomputation if multiple
    student training runs are needed.'
  common_mistake: Forgetting to include the compute cost of the teacher model's forward passes. A common
    trap is to calculate only the training cost for the student model ($6PD$), completely ignoring the
    massive overhead of running inference on the much larger teacher model ($2PD_{teacher}$) for the entire
    dataset, which is often the dominant cost.
  napkin_math: |
    1. **Student training FLOPs:**
       = 6 × P_student × D = 6 × 7B × 140B tokens
       = 6 × 7 × 10⁹ × 140 × 10⁹ = 5.88 × 10²¹ FLOPs = 5,880 ExaFLOPs
    
    2. **Teacher inference FLOPs (generating soft labels):**
       = 2 × P_teacher × D = 2 × 175B × 140B tokens
       = 2 × 175 × 10⁹ × 140 × 10⁹ = 4.9 × 10²² FLOPs = 49,000 ExaFLOPs
    
    3. **Total FLOPs:**
       5,880 + 49,000 = 54,880 ExaFLOPs = 5.488 × 10²² FLOPs
       Teacher inference is 89% of total cost — the dominant driver.
    
    4. **H100-hours required:**
       Effective FLOPS = 989 TFLOPS × 40% MFU = 395.6 TFLOPS
       H100-hours = 5.488 × 10²² / (395.6 × 10¹² × 3,600) = 5.488 × 10²² / (1.424 × 10¹⁸) = 38,535 H100-hours
    
    5. **Cost:**
       38,535 hours × $2/hour = $77,070
    
    6. **Verdict:**
       ~$77K is financially viable for most teams. The primary cost driver is the teacher's forward passes (89%), not the student training. Optimizations: cache teacher logits to avoid recomputation, or use a smaller teacher.
  options:
  - Around $7,700, primarily driven by the student model's backpropagation steps.
  - Around $193,000, because the MFU is so low that it makes the hardware inefficient.
  - Around $77,100, primarily driven by the compute required for the teacher model's forward passes.
  - Around $30,000, primarily driven by the HBM memory capacity needed to hold both models.
  correct_index: 2
