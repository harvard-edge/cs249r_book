title: The Distillation Cost-Benefit Analysis
scenario: Your team plans to distill a 175B parameter teacher model to a 7B student model to reduce serving costs. The distillation process involves training the 7B student on 140B tokens of data, using the 175B teacher to generate soft labels for each token. Assuming GPUs cost $2/hour and you can achieve 40% MFU on hardware with 989 TFLOPS peak.
question: What is the cost of distilling the 175B teacher into a 7B student on 140B tokens at 40% MFU and $2/GPU-hour, and what drives it?
details:
  realistic_solution: 'The total compute cost is the sum of training the student model and running inference on the teacher model to generate soft labels. Student training FLOPs = 6 × P_student × D = 6 × 7B × 140B = 5,880 ExaFLOPs. Teacher inference FLOPs = 2 × P_teacher × D = 2 × 175B × 140B = 49,000 ExaFLOPs. Total = 54,880 ExaFLOPs. The teacher''s forward passes consume 89% of total compute — the dominant cost driver. At 40% MFU on H100 (395.6 effective TFLOPS): required H100-hours = 5.488 × 10^22 / (395.6 × 10^12 × 3600) = 38,535 hours. At $2/hour: total cost ≈ $77,070. This is financially viable. The key optimization is to cache teacher logits to disk after one pass, avoiding recomputation if multiple student training runs are needed.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the massive compute cost of the teacher model's forward passes.
    **The Rationale:** Engineers typically calculate only the training cost for the student model (6PD), overlooking that generating soft labels requires running inference on a much larger model.
    **The Consequence:** The project cost is underestimated by almost an order of magnitude (10x), leading to massive budget overruns.
  napkin_math: |
    1. **Student Training FLOPs:** 6 × P_student × D = 6 × 7B × 140B = 5,880 ExaFLOPs.
    2. **Teacher Inference FLOPs:** 2 × P_teacher × D = 2 × 175B × 140B = 49,000 ExaFLOPs.
    3. **Total FLOPs:** 5,880 + 49,000 = 54,880 ExaFLOPs (Teacher is 89% of compute).
    4. **Effective Hardware Speed:** 989 TFLOPS × 40% MFU = 395.6 TFLOPS.
    5. **Time Required:** 54,880e18 FLOPs / 395.6e12 FLOPS = 138,726,000 seconds = 38,535 hours.
    6. **Total Cost:** 38,535 hours × $2/hour = **~$77,070**.
  options:
  - Around $7,700, primarily driven by the student model's backpropagation steps.
  - Around $193,000, because the MFU is so low that it makes the hardware inefficient.
  - Around $77,100, primarily driven by the compute required for the teacher model's forward passes.
  - Around $30,000, primarily driven by the HBM memory capacity needed to hold both models.
  correct_index: 2
