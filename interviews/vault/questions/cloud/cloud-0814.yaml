title: The Floating Point 32 Checkpoint Tax
scenario: Your model weights are loaded and served in FP16 (2 bytes per parameter). The model is 70 billion
  parameters, so you allocate 140 GB of disk space for the checkpoint file. But the training team sends
  over a `.pt` file that is 420 GB. What is taking up the extra 280 GB, and can you delete it before deploying?
question: "What is taking up the extra 280 GB, and can you delete it before deploying?"
details:
  realistic_solution: 'The extra 280 GB is consumed by the **FP32 master weights**. In mixed-precision
    training, the optimizer maintains a full-precision (FP32) copy of every parameter for numerical stability
    during gradient updates. The FP16 weights (140 GB) are used for fast forward/backward passes, while
    the FP32 copy (280 GB) ensures the small gradient updates don''t get lost to rounding. Together: 140
    + 280 = 420 GB (6 bytes/param). Note: if Adam optimizer states (momentum + variance) were also included,
    the checkpoint would be 980 GB (14 bytes/param). This 420 GB file is a ''weights-only'' checkpoint.
    For deployment, you can safely delete the FP32 master copy — inference only needs the FP16 weights
    (140 GB).'
  common_mistake: '"The file contains the training data or gradients." Training data isn''t saved in model
    checkpoints, and gradients are ephemeral.'
  napkin_math: 'A mixed-precision training checkpoint stores: **FP16 weights** = 70B × 2 bytes = 140 GB.
    **FP32 master weights** (maintained by the optimizer for numerical stability) = 70B × 4 bytes = 280
    GB. **Total: 420 GB** = 6 bytes per parameter. The ''extra'' 280 GB is the FP32 master copy of the
    weights. **Where are Adam''s m and v states?** In a full optimizer checkpoint, Adam adds: m (first
    moment) = 70B × 4 bytes = 280 GB, v (second moment) = 70B × 4 bytes = 280 GB. A *full* training checkpoint
    would be 140 + 280 + 280 + 280 = **980 GB** (14 bytes/param). The 420 GB file contains only weights
    (FP16 + FP32 master) without optimizer states — likely a ''weights-only'' checkpoint. **Can you delete
    the FP32 master weights?** Yes, for deployment. Inference only needs the FP16 weights (140 GB). The
    FP32 copy exists solely to maintain training precision during optimizer updates. Deleting it saves
    280 GB (67% reduction) with zero impact on inference quality.'
