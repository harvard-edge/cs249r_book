title: The Floating Point 32 Checkpoint Tax
scenario: Your model weights are loaded and served in FP16 (2 bytes per parameter). The model is 70 billion parameters, so you allocate 140 GB of disk space for the checkpoint file. But the training team sends over a .pt file that is 420 GB.
question: What is taking up the extra 280 GB, and can you delete it before deploying?
details:
  realistic_solution: 'The extra 280 GB is consumed by the **FP32 master weights**. In mixed-precision training, the optimizer maintains a full-precision (FP32) copy of every parameter for numerical stability during gradient updates. The FP16 weights (140 GB) are used for fast forward/backward passes, while the FP32 copy (280 GB) ensures the small gradient updates don''t get lost to rounding. Together: 140 + 280 = 420 GB (6 bytes/param). Note: if Adam optimizer states (momentum + variance) were also included, the checkpoint would be 980 GB (14 bytes/param). This 420 GB file is a ''weights-only'' checkpoint. For deployment, you can safely delete the FP32 master copy — inference only needs the FP16 weights (140 GB).'
  common_mistake: |
    **The Pitfall:** Assuming the extra space is consumed by training data or gradients.
    **The Rationale:** Candidates don't understand how mixed-precision training actually works under the hood (maintaining a high-precision master copy of weights).
    **The Consequence:** Engineers might hesitate to delete the file for serving, wasting expensive storage and loading time, or they might incorrectly attempt to extract data from it.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model.
       - FP16 (2 bytes), FP32 (4 bytes).
    2. **Calculations:**
       - Calculate FP16 weights: 70B params * 2 bytes = 140 GB.
       - Calculate FP32 master weights: 70B params * 4 bytes = 280 GB.
       - Calculate total file size: 140 GB + 280 GB = 420 GB (6 bytes/param).
       - Analyze optimizer state (if present): Adam requires first moment (280 GB) and second moment (280 GB). A full checkpoint would be 140 + 280 + 280 + 280 = 980 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound. The 420 GB file is weights-only, and the extra 280 GB (FP32 master) can safely be deleted for inference.**
