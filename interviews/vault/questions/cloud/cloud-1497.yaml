title: LayerNorm Memory Bandwidth Bottleneck
scenario: "You are profiling a 50B parameter Transformer model on A100 80GB GPUs. The PyTorch profiler shows that default LayerNorm operations and preceding residual additions consume a disproportionate amount of step time and are memory bandwidth-bound, with multiple separate read/write trips to HBM."
question: "How do you analyze this bottleneck and what implementation resolves it?"
details:
  realistic_solution: Identify that the PyTorch default implementation uses separate kernels for the residual addition and the normalization, causing redundant trips to HBM. Resolve this by deploying a fused Add + LayerNorm CUDA kernel (like Apex FusedLayerNorm) that performs the addition, computes statistics, and normalizes entirely within SRAM.
  common_mistake: |
    **The Pitfall:** Assuming LayerNorm is compute-bound or suggesting a switch to Batch Normalization.
    **The Rationale:** Candidates often try to optimize ALUs instead of memory access, or they suggest Batch Normalization, which incorrectly normalizes across the batch dimension and breaks sequence independence.
    **The Consequence:** The proposed optimizations fail to reduce memory bandwidth saturation and may actually degrade model quality.
  napkin_math: |
    - **Define tensor size:** For an FP16 tensor of 8x2048x8192, size is ~268MB.
    - **Calculate unfused HBM traffic:** Read 2 inputs (536MB) + write addition (268MB) + read twice for stats/norm (536MB) + write output (268MB) = 1.6GB total.
    - **Calculate fused HBM traffic:** Fused kernel reads 2 inputs (536MB) and writes final output (268MB) = 804MB total.
    - **Conclusion:** Fusion reduces memory traffic by 50%, effectively **doubling throughput** for this operation.
