title: 'MoE Memory Footprint: Why Sparse Models Need More VRAM'
scenario: Mixtral 8x7B has 46.7B total parameters but only activates ~13B per token (top-2 of 8 experts). Compare its VRAM requirement against a dense 13B model for inference on an MI300X (192 GB HBM3).
question: "How does Mixtral 8x7B's VRAM requirement compare with a dense 13B model on MI300X, and why can't you load only the active 13B parameters?"
details:
  realistic_solution: 'Dense 13B in FP16: 13B x 2B = 26 GB. Mixtral 8x7B in FP16: 46.7B x 2B = 93.4 GB. Despite activating only 13B parameters per token, all 46.7B must be loaded because: (1) the router dynamically selects experts per token — different tokens in the same batch may use different experts, (2) across a batch, all 8 experts are statistically likely to be activated, (3) swapping experts between GPU and CPU memory per-token is impractical (PCIe bandwidth bottleneck). On MI300X with 192 GB: 93.4 GB weights fit comfortably, leaving 98.6 GB for KV cache and activations.'
  common_mistake: |
    **The Pitfall:** Thinking you only need to load the active parameters into GPU memory.
    **The Rationale:** Candidates conflate computational sparsity (FLOPS) with memory sparsity, forgetting that the router dynamically selects experts per token.
    **The Consequence:** Severely under-provisioning VRAM for MoE models, leading to out-of-memory errors on deployment.
  napkin_math: |
    - **Dense 13B FP16:** $13\text{B} \times 2\text{ bytes} = 26\text{ GB VRAM}$.
    - **Mixtral 8x7B FP16:** $46.7\text{B} \times 2\text{ bytes} = 93.4\text{ GB}$.
    - **Memory ratio:** **3.6x more VRAM required for MoE despite the same active FLOPS.**
    - INT4 Mixtral fits in 23.4 GB (fits on a single 80 GB GPU). MI300X (192 GB) fits the full FP16 model easily.
