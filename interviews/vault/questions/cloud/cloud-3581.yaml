title: Diagnosing Bias in a Large-Scale Model Deployed on NVIDIA A100 for Demographic Parity Failures
scenario: Your team has deployed a critical ML model for a loan approval system on an NVIDIA A100 GPU to handle high throughput inference. Post-deployment, an audit reveals significant issues with demographic parity for a protected attribute (e.g., gender or ethnicity), where approval rates for certain demographic groups are disproportionately lower. This was not detected during offline validation.
question: How would you diagnose the production demographic-parity gap in the loan approval model running on the A100?
details:
  realistic_solution: 'A realistic solution involves a systematic diagnostic approach:
    1. **Data Drift Analysis:** Compare the distribution of features and labels in the production inference data with the training data, specifically focusing on the protected attribute.
    2. **Feature Importance Analysis:** Use explainability techniques (e.g., SHAP, LIME) to identify if proxy features for the protected attribute are being heavily relied upon.
    3. **Error Analysis by Subgroup:** Perform a detailed error analysis, identifying specific cases where the model fails for underrepresented groups.
    4. **Model Output Distribution:** Analyze the distribution of model scores/probabilities across different demographic groups.
    5. **Feedback Loop Analysis:** Investigate if the deployed model''s decisions are creating or reinforcing biases in the data collection process.'
  common_mistake: |
    **The Pitfall:** Immediately applying algorithmic debiasing without diagnosing the data.
    **The Rationale:** Engineers often jump to complex post-processing or re-training techniques (like adversarial debiasing) to "fix the math" when metrics fail.
    **The Consequence:** Applying a "band-aid" that fails to address the root cause—such as feature drift, pipeline bugs, or biased production data collection—potentially worsening performance.
  napkin_math: |
    - **Throughput:** 1,000,000 inference requests per hour.
    - **Disparity:** 10% approval for Group A vs. 20% for Group B (assume each is 50% of the pool).
    - **Absolute Gap:** `(0.20 - 0.10) * 500,000` = 50,000 fewer approvals for Group A per hour.
    - **Sample Size Requirement:** To achieve statistical significance (e.g., via Chi-squared test) with high confidence, you may need at least 10,000 total samples per subgroup.
    - **Data Collection Time:** At 500,000 requests/hr per group, gathering 10,000 total samples takes just **1.2 minutes** of production data. Therefore, rigorous re-evaluation requires very small time windows, not days of data collection.
