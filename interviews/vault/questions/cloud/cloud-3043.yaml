title: 'Network Bandwidth Bottlenecks: Compare AllReduce over NVLink vs. InfiniBand'
scenario: 'A distributed training job runs data-parallel with 8 H100 GPUs across two
  scenarios: (A) single DGX node (NVLink 600GB/s all-to-all) vs. (B) 8 GPUs across
  4 servers connected by 200Gb/s InfiniBand HDR. For a 13B model (26GB FP16 gradients),
  compute AllReduce time for both and determine the effective training throughput
  ratio.'
question: How long does the 13B FP16 gradient AllReduce take on 8 H100s with NVLink
  versus 200Gb/s InfiniBand, and what efficiency results?
details:
  realistic_solution: 'Ring-AllReduce data per GPU: 2×(8-1)/8 × 26GB/8 = 2×7/8 × 3.25GB
    = 5.69GB per GPU. NVLink 600GB/s: 5.69/600=9.5ms. InfiniBand 200Gb/s = 25GB/s
    per link. But 8 GPUs across 4 servers: 2 GPUs per server, intra-server NVLink
    (600GB/s), inter-server InfiniBand (25GB/s × 1 rail). Inter-server traffic: 26GB/8=3.25GB
    per GPU crosses IB. 3.25/25=130ms. Ratio: 130ms/9.5ms = 13.7× slower for inter-server.
    Training throughput: if step=200ms, AllReduce=9.5ms intra-node: 200/(200+9.5)=95.5%
    efficiency. Inter-node: 200/(200+130)=60.6% efficiency.'
  common_mistake: Computing AllReduce bandwidth as total gradient size / link bandwidth
    without applying the ring-AllReduce formula (2(n-1)/n × data per participant).
  napkin_math: 'NVLink AllReduce: 2×7/8×26GB/8 per GPU = 5.69GB/GPU. 5.69/600=9.5ms.
    IB 200Gb/s=25GB/s. Ring across 8 via IB: same 5.69GB but bottleneck is slowest
    link: 25GB/s. 5.69/25=227ms? Ring across 8 fully: each step passes 3.25GB across
    IB. 4 IB links: concurrent. 3.25GB/25GB/s=130ms. Efficiency: NVLink 200/(200+9.5)=95.5%.
    IB: 200/(200+130)=60.6%. NVLink: 13.7× faster comm.'
