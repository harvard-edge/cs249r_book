title: Designing Medusa Heads for Self-Speculation
scenario: 'Instead of a separate draft model, Medusa adds K lightweight prediction heads to the target
  70B model''s last hidden layer. Each head i predicts token at position t+i. On 4x H100 with tensor parallelism,
  design the Medusa head architecture: hidden_dim, number of layers, and training strategy. Head_dim of
  target: 8192.'
details:
  realistic_solution: 'Target last hidden dim: 8192. Vocab size: 128K. Each Medusa head: single linear
    layer 8192 -> 128K = 1.05B parameters x 2B = 2.1GB per head. 5 heads = 10.5GB total across 4 GPUs
    = 2.6GB/GPU. Forward cost per head: 2 x 8192 x 128K = 2.1 GFLOP at batch=1 = 2.1us on H100 (negligible).
    All 5 heads run in parallel (independent). Total Medusa overhead: 2.1us + kernel launch = ~10us vs
    25ms target decode = 0.04% overhead. Training: freeze target model, train heads on same dataset for
    1-2 epochs. Loss: cross-entropy for each head with position-specific target. Head accuracy degrades
    with distance: head 1 alpha~0.85, head 5 alpha~0.55. Expected tokens: 1+0.85+0.72+0.61+0.52+0.29 =
    3.99 per round. Effective speedup: 3.99/1.0004 = 3.99x at batch=1.'
  common_mistake: Making Medusa heads too large (matching the target's FFN dimensions). This eliminates
    the latency advantage since the heads would take as long as a full transformer layer.
  napkin_math: 'Head params: 8192 x 128K = 1.05B = 2.1GB each. 5 heads: 10.5GB. Forward: 2.1 GFLOP x 5
    = 10.5 GFLOP at 989 TFLOPS = 0.01ms. Speedup: ~4x at batch=1.'
