title: ZeRO-3 Communication Volume Analysis for 175B Model on 256 A100s
scenario: Training GPT-3 175B on 256 A100 80GB GPUs using ZeRO-3. Each GPU holds 175B/256 = 684M params
  (BF16 = 1.37GB) out of 80GB. For each forward pass, each layer's parameters must be AllGathered. With
  96 transformer layers, calculate total AllGather communication per forward pass and the efficiency vs
  compute ratio.
question: "How much ZeRO-3 AllGather communication occurs per forward pass for GPT-3 175B on 256 A100s, and how does it compare to compute time?"
details:
  realistic_solution: 'Params per layer: 175B / 96 layers = 1.82B params × 2B (BF16) = 3.64GB per layer.
    AllGather per layer: broadcast 3.64GB from 256 GPUs. Using ring AllReduce for AllGather: time = (N-1)/N
    × M / BW_per_link. Assume 200 Gbps = 25 GB/s IB per GPU. Ring AllGather: (255/256) × 3.64GB / 25 GB/s
    = 0.143s per layer. 96 layers forward: 96 × 0.143s = 13.7s. Backward needs another 96 AllGathers +
    96 ReduceScatters = 27.4s. Compute per layer: 175B/96 × 2 FLOPs × batch_tokens. At batch=2048 tokens:
    2 × 1.82B × 2048 = 7.5T FLOPs. A100 at 312 TFLOPS: 7.5T/312T = 24ms per layer. Total compute: 96 ×
    24ms = 2.3s. ZeRO-3 comm/compute ratio: 13.7s/2.3s = 5.96× — communication completely dominates. ZeRO-3
    requires much faster interconnect or gradient checkpointing reduction to be viable.'
  common_mistake: Counting one AllGather per layer without accounting for the fact that ZeRO-3 AllGathers
    and immediately discards parameters after each layer to free memory for the next layer.
  napkin_math: 'Per-layer AllGather: (255/256)×3.64GB/25GB/s = 143ms. 96 layers FWD: 13.7s. Compute: 96×24ms
    = 2.3s. Ratio: 5.96× comm-dominated. With NVLink 450 GB/s (intra-node): 8-GPU subgroup gathers in
    3.64GB/450GB/s=8.1ms, then IB for cross-node. Effective: ~50ms/layer with hierarchical comm = 4.8s
    FWD. Still 2× compute.'
