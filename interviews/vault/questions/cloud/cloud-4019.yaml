title: Weighted ECMP for Heterogeneous Link Speeds
scenario: After a partial link failure in your MI300X cluster, one spine switch has a degraded 400G link operating at 200G.
question: Why does standard ECMP fail with one spine link degraded to 200G, and what routing changes are needed?
details:
  realistic_solution: 'Standard ECMP distributes flows uniformly across next-hops regardless of link capacity. With 4 spine uplinks (3 × 400G + 1 × 200G), ECMP sends 25% of flows to each, but the 200G link can only handle half the traffic of others. Solutions: (1) Weighted ECMP (W-ECMP): assign weight proportional to link capacity — the 200G link gets weight 1 while 400G links get weight 2, so it receives 1/7 of flows instead of 1/4. (2) On NVIDIA Spectrum-4 switches, use Adaptive Routing which monitors queue depth and steers traffic away from congested ports in real-time (~1µs reaction). (3) Drain the degraded link entirely and operate with 3 × 400G = 1.2 Tbps total spine bandwidth. For MI300X clusters running large AllReduce, option 3 is often preferred since the 1.2 Tbps is still sufficient and avoids the complexity of weighted hashing.'
  common_mistake: |
    **The Pitfall:** Assuming ECMP automatically adjusts for link speed differences.
    **The Rationale:** Engineers believe routing protocols intelligently adapt to available capacity.
    **The Consequence:** ECMP only hashes flows across equal-cost paths blindly. The degraded link hits 100% utilization and drops packets, bottlenecking the entire AllReduce collective.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal state: 4 equal uplinks (400G each).
       - Degraded state: 3x 400G and 1x 200G link.
    2. **Calculations:**
       - Standard ECMP distribution: 25% per link = 100 Gbps per link for a 400 Gbps aggregate load.
       - The 200G link receives 100 Gbps average.
       - AllReduce burst traffic spikes to 2-3x average (200-300 Gbps).
    3. **Conclusion & Interpretation:**
       - **Result: Network Congestion Bound**. The 200G link saturates during traffic bursts and drops packets while the 400G links still have 50% headroom.
