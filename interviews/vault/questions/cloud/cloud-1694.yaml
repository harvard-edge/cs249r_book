title: Accelerator Pipeline Throughput Calculation
scenario: 'You are evaluating a custom ML accelerator for LLM inference. Processing a single computational tile requires three sequential stages: loading weights and activations from SRAM to registers (15 cycles), executing the matrix multiplication on the systolic array (50 cycles), and writing the accumulated results back to SRAM (20 cycles). The accelerator features a decoupled access/execute architecture, allowing all three units to operate concurrently on different tiles (pipelining).'
question: "What is the steady-state throughput in tiles per 100,000 clock cycles, and what is the utilization of the memory load unit?"
details:
  realistic_solution: 'In a decoupled pipeline, the stages overlap. The steady-state time per tile (Initiation Interval) is determined by the slowest stage: max(15, 50, 20) = 50 cycles. The steady-state throughput is 100,000 / 50 = 2,000 tiles. The memory load unit is active for 15 cycles every 50-cycle interval, resulting in a utilization of 15 / 50 = 30%.'
  common_mistake: |
    **The Pitfall:** Summing the pipeline stages to calculate total throughput latency.
    **The Rationale:** Candidates ignore the principles of pipelining and assume each tile must fully complete all stages before the next tile begins.
    **The Consequence:** The throughput calculation is drastically underestimated (e.g., 100,000 / 85 cycles), leading to flawed hardware evaluation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Pipeline Stages: Load (15 cycles), Compute (50 cycles), Store (20 cycles).
       - Window: 100,000 clock cycles.
    2. **Calculations:**
       - Initiation Interval (II): Dictated by the slowest pipeline stage = max(15, 50, 20) = 50 cycles/tile.
       - Throughput: 100,000 cycles / 50 cycles/tile = 2,000 tiles.
       - Load Unit Active Time: 15 cycles per 50-cycle steady-state interval.
       - Load Unit Utilization: 15 / 50 = 30%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound pipeline. The steady-state throughput is 2,000 tiles with 30% memory load utilization.**
