title: Analyzing Edge NPU Graph Compiler Fallbacks
scenario: Your hybrid cloud-edge voice assistant offloads a 5M parameter wake-word model to client-side Neural Processing Units (NPUs, rated at 26 TOPS at 1W) to save cloud compute costs. The baseline INT8 model executes in 4ms. After a recent architecture update that replaced ReLU with Swish activations to improve recall, telemetry shows edge inference latency spiking to 120ms. This causes frequent timeouts and triggers expensive cloud fallbacks. Profiling reveals that NPU compute utilization has actually dropped during these spikes.
question: What is the root cause of the 120ms edge latency spike after replacing ReLU with Swish, despite dropping NPU utilization?
details:
  realistic_solution: 'The NPU''s hardware compiler lacks native support for the Swish activation in INT8. This lack of support causes graph fragmentation: the compiler executes supported convolutions on the NPU, but falls back to the host CPU for the unsupported Swish layers. The massive 120ms latency spike is dominated by the repeated context switching and memory transfer overhead between the CPU and NPU, not the raw computation.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as thermal throttling or high FLOP requirements for the Swish activation.
    **The Rationale:** When latency spikes and compute involves new mathematical functions, engineers assume the hardware is just too slow to calculate it.
    **The Consequence:** They waste time trying to optimize the math rather than identifying the crippling compiler and memory transfer overheads.
  napkin_math: |
    - **Baseline NPU latency:** 4 ms.
    - **Context Switch Penalty:** NPU-to-CPU data transfer takes ~5 ms per tensor.
    - **Graph Fragmentation:** A 12-layer model partitions into 24 subgraphs (switching CPU->NPU at every Swish layer).
    - **Transfer Overhead:** 24 context switches × 5 ms = 120 ms.
    - **Conclusion:** **The 120 ms latency is entirely dominated by memory transfer overhead**, completely independent of the actual execution time.
