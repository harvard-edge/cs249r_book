title: Metal Performance Shaders vs CUDA for On-Device Training on Apple Silicon
scenario: A researcher fine-tunes a 7B parameter model on an M2 Ultra (192GB unified
  memory) using PyTorch with the MPS backend. Training throughput is 60% of what an
  A100 80GB achieves. They ask whether the gap is the MPS backend or the hardware.
question: Is the M2 Ultra throughput gap mostly due to the MPS backend or the hardware,
  and why?
details:
  realistic_solution: 'The hardware ceiling explains most of the gap: M2 Ultra has
    ~8.7% of A100''s FP16 TFLOPS, so at 60% of A100 throughput, the MPS backend is
    actually performing 6.9x better than raw FLOPS would predict. This is because
    the 7B model is memory-bandwidth-bound during fine-tuning, and M2 Ultra''s 800
    GB/s unified memory avoids the PCIe bottleneck entirely. The MPS backend''s real
    weakness is in custom kernel support and operator coverage — about 15% of PyTorch
    ops fall back to CPU.'
  common_mistake: Blaming the MPS backend entirely. While the MPS backend is less
    mature than CUDA, the M2 Ultra's GPU also has fundamentally lower FP16 compute
    (27.2 TFLOPS vs A100's 312 TFLOPS) and lower memory bandwidth (800 GB/s vs 2 TB/s).
  napkin_math: 'A100: 312 TFLOPS FP16, 2 TB/s BW. M2 Ultra: 27 TFLOPS FP16, 800 GB/s
    BW. Arithmetic intensity crossover: A100 at 156 FLOP/byte, M2 Ultra at 34 FLOP/byte.
    For memory-bound 7B fine-tuning (low arithmetic intensity), bandwidth matters
    more -> M2 Ultra is competitive.'
