title: Metal Performance Shaders vs CUDA for On-Device Training
scenario: 'A researcher fine-tunes a 7B parameter model on an Apple Silicon chip using PyTorch with the MPS backend. Training throughput is 60% of what a datacenter GPU achieves.'
question: 'Is the throughput gap mostly due to the MPS backend or the hardware, and why?'
details:
  realistic_solution: 'The gap is hardware bandwidth limits. Fine-tuning a 7B model is memory-bandwidth-bound. The Apple chip has ~40% of the datacenter GPU memory bandwidth, so achieving 60% throughput means the MPS backend is actually highly efficient at utilizing available bandwidth.'
  common_mistake: |
    **The Pitfall:** Blaming the MPS backend entirely for the performance gap.
    **The Rationale:** Candidates assume Apple's software stack is solely responsible, ignoring physical hardware limits.
    **The Consequence:** Misdiagnosing hardware bottlenecks as software inefficiencies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100: 312 TFLOPS FP16, 2 TB/s bandwidth.
       - M2 Ultra: 27 TFLOPS FP16, 800 GB/s bandwidth.
    2. **Calculations:**
       - Bandwidth Ratio: 800 GB/s / 2000 GB/s = 40%.
       - Compute Ratio: 27 / 312 = 8.7%.
    3. **Conclusion & Interpretation:**
       - **Result: 40% physical bandwidth limit.**
       - **Conclusion: Memory-Bound; 60% throughput on 40% hardware bandwidth implies excellent software efficiency.**