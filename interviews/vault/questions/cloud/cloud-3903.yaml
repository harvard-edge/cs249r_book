title: Metal Performance Shaders vs CUDA for On-Device Training on Apple Silicon
scenario: 'A researcher fine-tunes a 7B parameter model on an M2 Ultra (192GB unified memory) using PyTorch with the MPS backend. Training throughput is 60% of what an A100 80GB achieves.'
question: 'Is the M2 Ultra throughput gap mostly due to the MPS backend or the hardware, and why?'
details:
  realistic_solution: 'The hardware ceiling explains most of the gap: M2 Ultra has ~8.7% of A100''s FP16 TFLOPS, so at 60% of A100 throughput, the MPS backend is actually performing 6.9x better than raw FLOPS would predict. This is because the 7B model is memory-bandwidth-bound during fine-tuning, and M2 Ultra''s 800 GB/s unified memory avoids the PCIe bottleneck entirely. The MPS backend''s real weakness is in custom kernel support and operator coverage — about 15% of PyTorch ops fall back to CPU.'
  common_mistake: |
    **The Pitfall:** Blaming the MPS backend entirely for the performance gap.
    **The Rationale:** Candidates assume Apple's software stack is solely responsible, ignoring the physical hardware limits of the M2 Ultra compared to a data center A100.
    **The Consequence:** Misdiagnosing hardware bottlenecks as software inefficiencies.
  napkin_math: |
    - **Hardware Peak FLOPs:** A100 = 312 TFLOPS FP16. M2 Ultra = 27 TFLOPS FP16 (8.7% of A100).
    - **Memory Bandwidth:** A100 = 2 TB/s. M2 Ultra = 800 GB/s (40% of A100).
    - **Arithmetic Intensity Crossover:** A100 = 312e12 / 2e12 = 156 FLOP/byte. M2 Ultra = 27e12 / 800e9 = 34 FLOP/byte.
    - **Analysis:** For memory-bound 7B fine-tuning, bandwidth is the bottleneck. The M2 Ultra achieves 60% of A100 throughput despite having only 8.7% of the compute and 40% of the bandwidth.
    - **Result:** **The MPS backend is performing well; the gap is hardware bandwidth limits.**
