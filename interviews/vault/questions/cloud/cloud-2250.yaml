title: The Curriculum Ordering vs Random Shuffling Tradeoff
scenario: 'Your research team proposes curriculum learning for a 70B LLM pre-training run. They want to start with ''easy'' documents and gradually increase difficulty. The hypothesis is that this will improve convergence speed. However, your infrastructure team pushes back: the standard pipeline randomly shuffles shards to ensure each training batch is i.i.d., which is critical for SGD convergence guarantees. The curriculum approach requires reading shards in a specific order, which breaks i.i.d. sampling AND forces sequential reads from the storage system.'
question: "Under what conditions does curriculum ordering beat random shuffling, and what are the systems costs?"
details:
  realistic_solution: 'The tension is between statistical efficiency (curriculum ordering may improve learning per token) and systems efficiency (random shuffling enables optimal data pipeline throughput). The key insight: at the scale of LLM pre-training (trillions of tokens, thousands of GPUs), the systems costs dominate unless the curriculum provides substantial per-token learning improvement. Systems costs of curriculum ordering: (1) Sequential shard access eliminates random prefetching — throughput drops because the data pipeline cannot read-ahead from arbitrary shards. (2) All GPUs in a data-parallel group must read from the ''current difficulty level'' simultaneously, creating storage hotspots on a subset of shards. (3) If using global ordering, the data pipeline becomes a centralized bottleneck (a coordinator must track global position). Resolution: use a soft curriculum — within each difficulty tier (e.g., 10 tiers by perplexity), randomly shuffle shards. This preserves i.i.d. within each tier while gradually increasing difficulty across tiers. Systems cost is minimal: the pipeline pre-computes tier assignments, and each epoch reads tiers sequentially but shuffles within tiers.'
  common_mistake: |
    **The Pitfall:** Believing curriculum learning is strictly better because it helps in supervised learning.
    **The Rationale:** Assuming "i.i.d. is required for SGD convergence" is an absolute rule rather than recognizing that large enough batches approximate i.i.d. even with ordered data.
    **The Consequence:** Implementing a strict curriculum that creates a centralized bottleneck in the data pipeline, significantly degrading training throughput without guaranteed quality improvements.
  napkin_math: |
    - **Random shuffling throughput:** 500 nodes reading random 1 GB shards from a 10 PB corpus issues 1 random read/second from any of 10M shards. Parallel filesystem handles this easily at 500 GB/s aggregate.
    - **Strict curriculum throughput:** 500 nodes must read from the same 'easy' tier (1 PB, 1M shards) simultaneously, creating a storage hotspot of 500 GB/s concentrated on 10% of the filesystem.
    - **Throughput drop:** Throughput drops to ~200 GB/s (60% degradation) due to non-uniform shard placement.
    - **Conclusion:** **Soft curriculum (tier-shuffled): nodes read randomly within the current tier. As long as the tier has >5,000 shards, throughput remains near 500 GB/s.**
