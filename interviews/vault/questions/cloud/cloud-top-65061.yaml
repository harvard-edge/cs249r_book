title: 'Disaggregated Serving Observability: Key Metrics Dashboard'
scenario: You are onboarding an SRE to a disaggregated serving system. They ask what the key operational
  metrics are and how to distinguish prefill-pool problems from decode-pool problems in the dashboard.
  Describe the metric taxonomy.
question: "Which operational metrics should an SRE watch to distinguish prefill-pool, KV-transfer, and decode-pool problems?"
details:
  realistic_solution: 'Disaggregated serving metric taxonomy: Prefill pool: (1) prefill_queue_depth —
    number of requests waiting for prefill. High = prefill pool undersized. (2) prefill_compute_utilization
    — GPU MFU during prefill. Low (<50%) = inefficient batching. High (>90%) = pool undersized. (3) ttft_prefill_only_ms
    — TTFT excluding KV transfer, pure prefill time. KV transfer: (4) kv_transfer_latency_ms — end-to-end
    KV cache transfer time. Spike = network congestion or large KV caches. (5) kv_transfer_bandwidth_gbps
    — actual vs available InfiniBand. Decode pool: (6) decode_queue_depth — requests waiting for decode
    slot. High = decode pool undersized. (7) tpot_ms — time per output token. High = memory bandwidth
    saturated. (8) decode_batch_size_avg — should be close to max configured. Low = underutilization.
    Aggregated: (9) e2e_ttft_p95, e2e_ttft_p99. (10) tpot_p95. (11) kv_store_hit_rate — for prefix caching.'
  common_mistake: Monitoring only aggregate TTFT and TPOT without separating prefill and decode pool metrics.
    When TTFT degrades, it could be a prefill pool CPU-bound issue, a KV transfer bottleneck, or a decode
    pool full condition causing new requests to wait for available decode slots.
  napkin_math: 'Debugging workflow: TTFT high + prefill_queue_depth high + prefill_compute_utilization
    high: scale up prefill pool. TTFT high + kv_transfer_latency high: investigate network (check InfiniBand
    utilization, check KV size, enable compression). TTFT high + decode_queue_depth high + decode_batch_size
    low: decode pool undersized (requests backlogged). TPOT high + decode_batch_size at max + decode memory
    bandwidth at 100%: memory-bound decode, need more decode GPUs or smaller model. TPOT high + decode_batch_size
    low: scheduling inefficiency, check batching configuration.'
