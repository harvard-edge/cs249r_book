title: AllReduce Fault Propagation Overhead
scenario: You are building an error model to evaluate fault propagation in a 2000-GPU distributed training
  cluster. Fault-injection tests show each GPU experiences a transient error (e.g., bit flip) once every
  10,000 hours. Your error model assumes an unmitigated error corrupts the local gradient, which AllReduce
  instantly propagates to all GPUs, forcing a rollback. The job checkpoints every 5 hours, and checkpoint
  recovery takes 30 minutes. Using a first-order expected value approximation, calculate the total wall-clock
  time required to achieve 1,000 hours of effective training progress.
details:
  realistic_solution: Calculate the cluster-wide MTBF, determine the expected number of failures over
    the target progress time, and multiply by the average downtime (half the checkpoint interval plus
    recovery time) to find total overhead.
  common_mistake: Neglecting to aggregate the per-GPU error rate to the cluster level (assuming MTBF is
    10,000 hours for the whole cluster), or forgetting that AllReduce causes a localized fault to halt
    all 2000 GPUs.
  napkin_math: 'Cluster MTBF = 10,000 hr / 2000 GPUs = 5 hours.

    Total errors over 1000 hrs of progress = 1000 / 5 = 200 errors.

    Penalty per error = (5 hr checkpoint interval / 2) wasted compute + 0.5 hr recovery = 3 hrs.

    Total wasted time = 200 errors * 3 hrs = 600 hrs.

    Total wall-clock time = 1000 progress + 600 wasted = 1600 hours.'
