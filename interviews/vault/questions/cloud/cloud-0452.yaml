title: The Startup's Scaling Dilemma
scenario: You are the founding ML engineer at a startup building a new image analysis product. You've secured a dataset of 1 trillion tokens (image patches) and a cloud grant equivalent to 1 million H100-hours.
question: With 1T tokens and 1M H100-hours, should the startup train the 2B model or the 25B model under Chinchilla scaling?
details:
  realistic_solution: 'The Chinchilla scaling law says data-optimal training uses D ≈ 20P tokens. With 1T tokens available, the data-optimal model size is P = 1T/20 = 50B parameters. The 25B model is closer to this optimum and will be well-trained with the available data (it needs only 500B tokens optimally, and has 1T). The 2B model would optimally need only 40B tokens — using 1T tokens on it wastes 96% of the data and yields diminishing returns. Compute-wise, training 25B on 1T tokens requires ~1.5 × 10²³ FLOPs, which is about 10.5% of the 1M H100-hour budget — easily feasible. The correct choice is the 25B model, not the 2B model.'
  common_mistake: |
    **The Pitfall:** Falling for the "Bigger is Better" fallacy.
    **The Rationale:** Engineers assume that if they have enough compute to train a larger model, they should, ignoring the data requirements for optimal training.
    **The Consequence:** Training a massive model that is severely data-constrained, resulting in wasted compute and suboptimal performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1T tokens available.
       - 1M H100-hours compute budget (1.424e18 FLOPS/hr).
       - Chinchilla optimal scaling: D ≈ 20P tokens.
    2. **Calculations:**
       - Chinchilla-optimal data for 25B model: 25B * 20 = 500B tokens (1T tokens > 500B).
       - Compute budget: 1M H100-hours * 1.424e18 FLOPS/hr = ~1.42e24 FLOPs.
       - Training cost for 25B model on 1T tokens: 6 * 25e9 * 1e12 = 1.5e23 FLOPs.
    3. **Conclusion & Interpretation:** **The 25B model uses only 10.5% of the compute budget** and is near data-optimal. Result: **Data-Bound**.
  options:
  - The 25B model, because its dense matrix multiplications will achieve higher MFU on H100s, making more efficient use of the grant.
  - The 25B model, because it is closer to the data-optimal size for 1T tokens and easily fits within the compute budget.
  - The 2B model, because the 25B model is too large for the 1T token dataset, making it data-constrained and leading to wasted compute.
  - The 2B model, because smaller models require fewer FLOPs per parameter, allowing us to train for more epochs.
  correct_index: 1
