title: The Startup's Scaling Dilemma
scenario: 'You are the founding ML engineer at a startup building a new image analysis
  product. You''ve secured a dataset of 1 trillion tokens (image patches) and a cloud
  grant equivalent to 1 million H100-hours. Your team is debating two paths:'
question: With 1T tokens and 1M H100-hours, should the startup train the 2B model
  or the 25B model under Chinchilla scaling?
details:
  realistic_solution: The Chinchilla scaling law says data-optimal training uses D
    ≈ 20P tokens. With 1T tokens available, the data-optimal model size is P = 1T/20
    = 50B parameters. The 25B model is closer to this optimum and will be well-trained
    with the available data (it needs only 500B tokens optimally, and has 1T). The
    2B model would optimally need only 40B tokens — using 1T tokens on it wastes 96%
    of the data and yields diminishing returns. Compute-wise, training 25B on 1T tokens
    requires ~1.5 × 10²³ FLOPs, which is about 10.5% of the 1M H100-hour budget —
    easily feasible. The correct choice is the 25B model, not the 2B model.
  common_mistake: The 'Bigger is Better' fallacy. Engineers often assume that if they
    have enough compute to train a larger model, they should. They forget that model
    performance is a function of both compute AND data, and training a model that
    is too large for the available dataset is a highly inefficient use of that compute.
  napkin_math: '**Chinchilla optimal ratio:** D ≈ 20 × P. Available data: D = 1 trillion
    tokens. Data-optimal model size: P = D/20 = 1T/20 = 50B parameters. **Compute
    budget:** 1M H100-hours. Effective FLOPS per hour = 989 TFLOPS × 0.4 MFU × 3,600s
    = 1.424 × 10^18 FLOPS/hr. Total budget = 10^6 × 1.424 × 10^18 = 1.424 × 10^24
    FLOPs. **Option A (25B ViT on 1T tokens):** Training cost = 6 × 25 × 10^9 × 10^12
    = 1.5 × 10^23 FLOPs. Budget fraction = 1.5e23 / 1.424e24 = 10.5% — easily fits.
    Chinchilla-optimal data for 25B = 500B tokens. We have 1T (2x more) — model will
    be well-trained. **Option B (2B ConvNet on 1T tokens):** Training cost = 6 × 2
    × 10^9 × 10^12 = 1.2 × 10^22 FLOPs. Budget fraction = 0.84% — wastes 99% of compute
    grant. Chinchilla-optimal data for 2B = 40B tokens. Using 1T tokens is 25x more
    than needed — severely diminishing returns. **Verdict:** The 25B model is closer
    to the data-optimal 50B, uses only 10.5% of compute budget, and will be well-trained
    with the available data. The 2B model wastes 99% of the compute grant and has
    25x more data than it can effectively use. Choose the 25B ViT.'
  options:
  - The ViT, because its dense matrix multiplications will achieve higher MFU on H100s,
    making more efficient use of the grant.
  - The ViT, because it is closer to the data-optimal size for 1T tokens and easily
    fits within the compute budget.
  - The ConvNet, because the 25B ViT is too large for the 1T token dataset, making
    it data-constrained and leading to wasted compute.
  - The ConvNet, because CNNs require fewer FLOPs per parameter, allowing us to train
    for more epochs.
  correct_index: 1
