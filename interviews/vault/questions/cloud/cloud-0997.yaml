title: Diagnosing MLP Optimization Bottlenecks
scenario: A team is optimizing the MLP layers of a Vision Transformer on an NVIDIA A100 GPU (312 TFLOPs
  BF16, 2.0 TB/s HBM bandwidth). They are processing large batches with matrix dimensions M=1024, N=4096,
  K=4096. The profiler shows 98% SM utilization. Hoping to speed up the layer, an engineer proposes compressing
  the weights to reduce HBM traffic by 2x, which requires the exact same number of BF16 FLOPs to decompress
  on the fly in the SM registers before computation. Analyze the expected impact of this optimization
  on the layer's execution time.
question: "Will 2x weight compression speed up the A100 ViT MLP layer, or is it compute-bound under the Roofline model?"
details:
  realistic_solution: Diagnose the workload using the roofline model. The A100 ridge point is 156 FLOPs/Byte.
    The MLP layer has an arithmetic intensity of ~683 FLOPs/Byte, placing it deep in the compute-bound
    regime. Because the workload is compute-bound, optimizations targeting HBM traffic (like weight caching
    or memory layout changes) will yield negligible speedup. Instead, focus on maximizing Tensor Core
    utilization through optimal tile sizes and mixed-precision strategies.
  common_mistake: Assuming that any reduction in HBM memory traffic automatically translates to an improvement
    in execution time, failing to diagnose the workload via its arithmetic intensity and recognize that
    compute-bound operations are insensitive to memory optimizations.
  napkin_math: 'A100 Ridge Point = 312 TFLOPs / 2.0 TB/s = 156 FLOPs/Byte. For M=1024, N=4096, K=4096:
    Total FLOPs = 2 * M * N * K = 2 * 1024 * 4096^2 = 34.36 GFLOPs. Total Memory (BF16, 2 bytes) = (1024*4096
    + 4096*4096 + 1024*4096) elements * 2 bytes/element = 25,165,824 elements * 2 bytes/element = 50,331,648 bytes ≈ 50.33 MB. Arithmetic Intensity
    = 34.36 GFLOPs / 50.33 MB = 683 FLOPs/Byte. Since 683 >> 156, the layer is purely compute-bound.'
