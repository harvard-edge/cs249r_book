title: Diagnosing MLP Optimization Bottlenecks
scenario: A team is optimizing the MLP layers of a Vision Transformer processing large batches with matrix dimensions M=1024, N=4096, K=4096. The profiler shows 98% SM utilization. An engineer proposes compressing the weights to reduce HBM traffic by 2x, which requires the exact same number of BF16 FLOPs to decompress on the fly.
question: Will 2x weight compression speed up the ViT MLP layer, or is it compute-bound under the Roofline model?
details:
  realistic_solution: 'Diagnose the workload using the roofline model. The layer is purely compute-bound. Optimizations targeting HBM traffic yield negligible speedup. Focus on maximizing Tensor Core utilization through optimal tile sizes and mixed-precision strategies.'
  common_mistake: |
    **The Pitfall:** Assuming that any reduction in HBM memory traffic automatically translates to an improvement in execution time.
    **The Rationale:** Compressing weights is a known optimization, but engineers sometimes apply it without doing a Roofline analysis first.
    **The Consequence:** Wasting engineering effort on a memory optimization that yields zero speedup for a compute-bound workload.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware Ridge Point: 312 TFLOPs / 2.0 TB/s = 156 FLOPs/Byte.
    - M=1024, N=4096, K=4096.

    **Calculations:**
    - Total FLOPs: 2 * M * N * K = 34.36 GFLOPs.
    - Total Memory (BF16): (1024*4096 + 4096*4096 + 1024*4096) * 2 bytes = 50.33 MB.
    - Arithmetic Intensity: 34.36 GFLOPs / 50.33 MB = 683 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 683 FLOPs/Byte (Compute-Bound)**. Since 683 >> 156, the layer is purely compute-bound, meaning memory compression yields zero speedup.
