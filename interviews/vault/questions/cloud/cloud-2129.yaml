title: The Training-Serving Skew Trap
scenario: During training, your feature pipeline computes 'user_avg_session_duration' using a Spark batch
  job that runs nightly. At serving time, the same feature is computed in real time from the last 24 hours
  of clickstream data. After deployment, the model's conversion rate drops 8%. What is the most likely
  cause?
question: "What is the most likely cause?"
details:
  realistic_solution: Training-serving skew. The batch Spark job and the real-time computation use different
    code paths, time windows, aggregation logic, or null-handling. For example, the batch job might compute
    the average over all sessions in a calendar day (midnight to midnight), while the real-time path computes
    a rolling 24-hour window. Edge cases — timezone handling, session boundary definitions, null imputation
    — create a systematic bias between training and serving feature values. The model learned patterns
    on batch-computed features and cannot transfer to the different distribution at serving time.
  common_mistake: Blaming the model architecture or hyperparameters. The model hasn't changed — the features
    it sees at serving time are subtly different from what it saw during training.
  napkin_math: If the average feature value shifts by even 10-15% between training and serving distributions,
    a model relying heavily on that feature can see 5-10% metric degradation. With 200+ features, even
    small per-feature skews compound.
