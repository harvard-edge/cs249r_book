title: The Training-Serving Skew Trap
scenario: "During training, your feature pipeline computes 'user_avg_session_duration' using a Spark batch job that runs nightly. At serving time, the same feature is computed in real time from the last 24 hours of clickstream data. After deployment, the model's conversion rate drops 8%."
question: "What is the most likely cause of the conversion rate drop?"
details:
  realistic_solution: "Training-serving skew. The batch Spark job and the real-time computation use different code paths, time windows, aggregation logic, or null-handling. For example, the batch job might compute the average over all sessions in a calendar day (midnight to midnight), while the real-time path computes a rolling 24-hour window. Edge cases — timezone handling, session boundary definitions, null imputation — create a systematic bias between training and serving feature values. The model learned patterns on batch-computed features and cannot transfer to the different distribution at serving time."
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or hyperparameters.
    **The Rationale:** Engineers assume the model didn't learn properly, failing to realize the input data distribution has subtly changed.
    **The Consequence:** Wasted time tuning the model when the features it sees at serving time are subtly different from what it saw during training.
  napkin_math: |
    *   **Feature Shift:** Average feature value shifts by 10-15% between training and serving.
    *   **Impact per Feature:** A model relying heavily on that feature can see 5-10% metric degradation.
    *   **Result:** **Even small per-feature skews compound, leading to the 8% drop.**
