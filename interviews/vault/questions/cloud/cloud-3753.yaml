title: 'Compute Density vs Power: Planning a 100 MW AI Campus'
scenario: You are architecting a 100 MW AI training campus that will house next-generation GPUs with 1000W TDP each. The campus must achieve PUE ≤ 1.08 and support 100 kW per rack. Compare three cooling architectures — rear-door heat exchangers, direct liquid cooling (cold plates), and single-phase immersion.
question: Which cooling architecture would you recommend for a 100 MW campus with PUE ≤ 1.08 and 100 kW/rack density, and why?
details:
  realistic_solution: 'At 1000W/GPU and 100 kW/rack, rear-door heat exchangers are eliminated. DLC (cold plates): PUE 1.03-1.06, handles 100+ kW/rack, GPU serviceable without system drain. Immersion: PUE 1.02-1.04, handles unlimited density, but GPU replacement requires fluid management. Recommendation: DLC cold plates. The 0.02 PUE gap vs immersion is ~$1M/year energy cost, but DLC''s serviceability advantage outweighs this.'
  common_mistake: |
    **The Pitfall:** Choosing immersion cooling strictly for the lowest PUE without considering serviceability.
    **The Rationale:** Immersion achieves PUE ~1.03 but replacing a GPU requires draining fluid.
    **The Consequence:** Maintenance windows expand from 5 minutes (DLC) to 30-60 minutes, drastically reducing overall cluster uptime.
  napkin_math: |
    - 1. **Baseline Overhead:** 100 MW IT × PUE 1.08 = 108 MW total (8 MW overhead).
    - 2. **DLC (Cold Plates):** PUE 1.05 = 105 MW. Saves 3 MW = ~$1.6M/year over baseline.
    - 3. **Immersion:** PUE 1.03 = 103 MW. Saves 5 MW = ~$2.6M/year over baseline.
    - 4. **Recommendation:** **DLC is preferred because the $1M/yr energy savings of immersion is offset by a massive ~$50M CapEx premium and poor serviceability**.
