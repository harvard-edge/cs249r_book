title: 'Compute Density vs Power: Planning a 100 MW AI Campus'
scenario: You are architecting a 100 MW AI training campus that will house next-generation
  GPUs with 1000W TDP each. The campus must achieve PUE ≤ 1.08 and support 100 kW
  per rack. Compare three cooling architectures — rear-door heat exchangers, direct
  liquid cooling (cold plates), and single-phase immersion — on capital cost, PUE
  achievable, operational complexity, and GPU failure serviceability. Which do you
  recommend and why?
question: Which cooling architecture would you recommend for a 100 MW campus with
  PUE ≤ 1.08 and 100 kW/rack density, and why?
details:
  realistic_solution: 'At 1000W/GPU and 100 kW/rack, rear-door heat exchangers are
    eliminated — they max out at ~40-50 kW/rack. DLC (cold plates): PUE 1.03-1.06,
    handles 100+ kW/rack, GPU serviceable without system drain (quick-disconnect fittings),
    proven at scale (NVIDIA DGX SuperPOD). CapEx ~15-20% premium over air. Immersion:
    PUE 1.02-1.04, handles unlimited density, but GPU replacement requires fluid management,
    creates environmental/safety concerns, limited vendor ecosystem. CapEx ~25-35%
    premium. Recommendation: DLC cold plates. The 0.02 PUE gap vs immersion = 2 MW
    at 100 MW scale = ~$1M/year energy cost, but DLC''s serviceability advantage and
    mature supply chain outweigh this. At 100 MW, even PUE 1.08 means 8 MW overhead
    = ~$4.2M/year. DLC at PUE 1.05 saves $1.6M/year vs the target.'
  common_mistake: Choosing immersion cooling for the lowest PUE without considering
    serviceability. Immersion requires draining fluid to replace a GPU, creating 30-60
    minute maintenance windows vs 5 minutes for DLC cold plates.
  napkin_math: '100 MW IT × PUE 1.08 = 108 MW total, 8 MW overhead. DLC at PUE 1.05
    = 105 MW, saving 3 MW = $1.6M/year. Immersion at 1.03 = 103 MW, saving 5 MW =
    $2.6M/year. But immersion CapEx premium on 100 MW facility: ~$50M+ more than DLC.'
