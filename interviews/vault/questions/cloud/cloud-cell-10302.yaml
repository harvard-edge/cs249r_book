title: Designing a Volcano Job for Multi-Pod Distributed Training
scenario: 'You are architecting a Kubernetes-native distributed training platform for 64-GPU runs on H100
  nodes (8 GPUs per node, NVLink intra-node, InfiniBand inter-node). PyTorch DDP requires all-or-nothing
  scheduling: if even one pod fails to schedule, the entire job must not start. Design the scheduling
  configuration that prevents partial-allocation deadlock in a cluster shared with inference workloads.'
question: "What Kubernetes scheduling configuration prevents partial-allocation deadlock for 64-GPU PyTorch DDP jobs sharing the H100 cluster with inference workloads?"
details:
  realistic_solution: 'Use Volcano `Job` with `minAvailable: 64` under a `gang` scheduling plugin. Volcano
    holds all 64 pods in a `Pending` state until the full gang can be co-scheduled atomically. Set `policies.action:
    RestartJob` on `PodEvicted` events. Combine with a `PriorityClass` hierarchy (training=1000, inference=900)
    so the scheduler preempts lower-priority inference pods when burst training capacity is needed.'
  common_mistake: 'Using standard Kubernetes `Job` + pod anti-affinity: pods schedule one-by-one, and
    when the cluster is 90% full, half the training pods land while the other half pend indefinitely,
    holding reserved GPU resources and starving inference.'
  napkin_math: '64 H100s × 700 W = 44.8 kW power draw during training. At 8 GPUs/node that''s 8 nodes.
    Gang scheduling window: with Volcano, allocation completes in one scheduling cycle (~200–500 ms) vs.
    default scheduler''s O(n) sequential binding which can take 30–60 s for 64 pods, during which partial
    GPU hold wastes up to 44.8 kW.'
