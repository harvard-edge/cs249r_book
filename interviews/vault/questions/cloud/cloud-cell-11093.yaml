title: 'Feature Store: Fluency — Feature Vector Size and Retrieval Latency Estimation'
scenario: Your recommendation system on H100 serves 50K requests/second. Each request needs user features
  (200 float32 features) and item features (100 float32 features). Features are stored in Redis. Estimate
  Redis memory requirement for 10M active users and 5M catalog items, and verify the network bandwidth
  needed.
details:
  realistic_solution: 'Redis hash storage overhead: raw data plus key, hash table overhead, allocator
    fragmentation ≈ 2-4× raw byte size for small hashes. Plan for 3× overhead.'
  common_mistake: Forgetting Redis overhead (hash maps have ~100% overhead vs raw bytes); not accounting
    for key string overhead.
  napkin_math: 'User features: 10M users × 200 × 4B = 8GB raw. With 3× Redis overhead: 24GB. Item features:
    5M items × 100 × 4B = 2GB raw × 3 = 6GB. Total Redis: 30GB. At 50K RPS, each request fetches: 1 user
    + 1 item = 2 Redis GET ops. 50K × 2 = 100K ops/sec. Redis can handle 1M ops/sec → fine. Network: 50K
    × (200+100) × 4B = 60MB/sec from Redis to H100 servers. At 100Gbps NIC = 12.5 GB/s >> 60 MB/s. Trivial.
    Redis nodes: 30GB / 32GB Redis node = 1 node (plus replica). Redis GET latency: 0.1ms within datacenter.
    Feature retrieval: 2 GETs × 0.1ms = 0.2ms. Well within 5ms SLA.'
