title: The Billion-Frame Quantization Strategy
scenario: You are the founding ML Systems Engineer for a new autonomous drone delivery platform processing video from one million drones at 1 FPS. The business constraints demand a P99 inference latency of 50ms and a total first-year infrastructure budget of $8M. Your baseline FP16 perception model runs at 2,000 FPS on a single GPU.
question: 'What are your first three architectural proposals, what data do you need to collect to de-risk them, and how would you prove safety?'
details:
  realistic_solution: "A Staff-level engineer would refuse to 'just' quantize and would instead propose a structured, multi-stage plan focused on risk mitigation and progressive rollout.\n1. **Sensitivity Analysis & Mixed-Precision Architecture:** Instead of a global INT8 conversion, propose a per-layer sensitivity analysis. Profile the model to identify layers where quantization causes the largest accuracy drop. Architect a mixed-precision inference engine that keeps these sensitive layers (e.g., the final few classification/bounding box layers) in FP16 or FP32, while converting the robust convolutional backbone to INT8. This balances performance and accuracy.\n2. **Data-Driven Calibration:** Define a rigorous data collection and calibration process. This involves creating a dedicated calibration dataset (a few thousand representative images) that accurately reflects the real-world distribution of lighting conditions, weather, and hazard types. Use this data to determine the optimal scaling factors for weights and activations to minimize quantization error (clipping/overflow).\n3. **Staged Rollout & Monitoring:** Propose a canary deployment strategy. Initially, deploy the INT8-quantized model to a small fraction of the fleet (e.g., 1%) and run it in 'dark mode' or 'shadow mode,' comparing its outputs and latency against the trusted FP16 baseline. Implement fine-grained monitoring to track key metrics: statistical distance between INT8 and FP16 output distributions, a spike in `clamp` operations (indicating overflow), and the end-to-end accuracy on a golden test set. Only increase traffic to the INT8 model as confidence builds."
  common_mistake: |
    **The Pitfall:** Jumping straight to "we'll use INT8" without a plan for validation.
    **The Rationale:** This approach ignores the significant risk of accuracy degradation from activation overflow, especially in models with wide dynamic ranges.
    **The Consequence:** The model could silently miss critical hazards, leading to drone crashes and total system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000,000 FPS total load.
    - Base Cost: 500 GPUs.

    **Calculations:**
    - Compute Required: 1,000,000 FPS / 2,000 FPS/GPU = 500 GPUs.
    - FP16 Cost: 500 GPUs at ~$30k/year = $15M (over $8M budget).
    - Pure INT8 Cost: Doubles throughput to 4,000 FPS/GPU, needing 250 GPUs = $7.5M.
    - Mixed-Precision Cost: ~3,500 FPS/GPU, needing 286 GPUs = $8.58M.

    **Conclusion & Interpretation:**
    - **Result: $8.58M (Cost-Bound)**. Mixed-precision slightly exceeds the budget but guarantees the 50ms P99 latency and safety requirements.
