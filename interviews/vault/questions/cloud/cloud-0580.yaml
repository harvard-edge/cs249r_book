title: The Billion-Frame Quantization Strategy
scenario: 'You are the founding ML Systems Engineer for a new autonomous drone delivery platform. The
  company has just signed a deal to process video from one million drones, each streaming at 1 FPS. Your
  service must detect and classify critical landing zone hazards. The business constraints are non-negotiable:
  a P99 inference latency of 50ms and a total first-year infrastructure budget of $8M. Your baseline FP16
  perception model runs at 2,000 FPS on a single H100 GPU, but a quick calculation shows that supporting
  the full fleet would cost nearly $15M in H100s, blowing your budget by almost 2x. Your manager suggests
  ''just using INT8 to double the throughput and cut the cost in half.'' Formulate a comprehensive engineering
  plan to address this. What are your first three architectural proposals, what data do you need to collect
  to de-risk them, and how would you prove to the VP of Engineering that your system is safe to deploy?'
details:
  realistic_solution: "A Staff-level engineer would refuse to 'just' quantize and would instead propose\
    \ a structured, multi-stage plan focused on risk mitigation and progressive rollout.\n    1.  **Sensitivity\
    \ Analysis & Mixed-Precision Architecture:** Instead of a global INT8 conversion, propose a per-layer\
    \ sensitivity analysis. Profile the model to identify layers where quantization causes the largest\
    \ accuracy drop. Architect a mixed-precision inference engine that keeps these sensitive layers (e.g.,\
    \ the final few classification/bounding box layers) in FP16 or FP32, while converting the robust convolutional\
    \ backbone to INT8. This balances performance and accuracy.\n    2.  **Data-Driven Calibration:**\
    \ Define a rigorous data collection and calibration process. This involves creating a dedicated calibration\
    \ dataset (a few thousand representative images) that accurately reflects the real-world distribution\
    \ of lighting conditions, weather, and hazard types. Use this data to determine the optimal scaling\
    \ factors for weights and activations to minimize quantization error (clipping/overflow).\n    3.\
    \  **Staged Rollout & Monitoring:** Propose a canary deployment strategy. Initially, deploy the INT8-quantized\
    \ model to a small fraction of the fleet (e.g., 1%) and run it in 'dark mode' or 'shadow mode,' comparing\
    \ its outputs and latency against the trusted FP16 baseline. Implement fine-grained monitoring to\
    \ track key metrics: statistical distance between INT8 and FP16 output distributions, a spike in `clamp`\
    \ operations (indicating overflow), and the end-to-end accuracy on a golden test set. Only increase\
    \ traffic to the INT8 model as confidence builds."
  common_mistake: Jumping straight to 'we'll use INT8' without a plan for validation. This approach ignores
    the significant risk of accuracy degradation from activation overflow, especially in models with wide
    dynamic ranges. A junior engineer might assume a 2x throughput gain is guaranteed, while a senior
    engineer knows it's the absolute best-case scenario and the reality is often worse due to implementation
    overhead and unquantizable layers.
  napkin_math: The core of the problem is the budget mismatch.
