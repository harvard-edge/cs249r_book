title: Identifying the Roofline's Axis
scenario: To optimize a workload on a new H100 GPU, you need to know if it's compute-bound or memory-bound.
question: Which fundamental metric determines whether an H100 workload is compute-bound or memory-bound, and what is its definition?
details:
  realistic_solution: The key metric is **Arithmetic Intensity (AI)**, defined as the number of arithmetic operations (FLOPs) performed per byte of data moved from main memory (HBM).
  common_mistake: |
    **The Pitfall:** Confusing the metric with general throughput (TOPS) or power efficiency (TOPS/W).
    **The Rationale:** Inverting the ratio to think in terms of memory pressure per operation (Bytes/FLOP) rather than operational density per byte (FLOPs/Byte).
    **The Consequence:** Applying the wrong optimization strategies, such as focusing on math kernel tuning when memory access patterns are the true bottleneck.
  napkin_math: |
    - The H100's peak compute is 989 TFLOPS (FP16).
    - The H100's peak memory bandwidth is 3.35 TB/s (HBM3).
    - Ridge Point = 989 TFLOPS / 3.35 TB/s = 295.2 FLOPs/Byte.
    - **This represents the hardware's intrinsic Arithmetic Intensity; workloads computing fewer than 295 FLOPs/Byte are memory-bound.**
  options:
  - The ratio of Bytes transferred per FLOP (Bytes/FLOP).
  - The raw throughput of the GPU in TFLOPS.
  - The power efficiency of the GPU in TOPS/W.
  - The ratio of FLOPs performed per Byte of memory transferred (FLOPs/Byte).
  correct_index: 3
