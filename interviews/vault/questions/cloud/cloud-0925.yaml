title: BNN Throughput Regression on Cloud GPUs
scenario: Your team deployed a Binary Neural Network (BNN) for high-throughput log anomaly detection on
  a cloud instance with NVIDIA T4 GPUs, aiming for maximum energy efficiency. They expected a 32x memory
  saving and a proportional speedup over the FP32 baseline. However, profiling reveals that while the
  memory footprint decreased significantly, the actual inference latency is 1.5x slower than an INT8 quantized
  version of the same model. Analyze the architectural root cause of this throughput regression.
details:
  realistic_solution: Diagnose that the NVIDIA T4 lacks native 1-bit Tensor Core support. The overhead
    of packing/unpacking 1-bit values into 32-bit registers and using standard CUDA cores for software-emulated
    XNOR and popcount operations makes the effective throughput far lower than the native INT8 Tensor
    Core pipeline (~130 TOPS). The correct approach is to either use INT8 quantization (which the T4 natively
    accelerates) or deploy BNNs on FPGAs with native bitwise operation support.
  common_mistake: Assuming that theoretical parameter compression (1-bit vs 32-bit) and simplified operations
    automatically translate to latency improvements on standard GPU hardware, without verifying that the
    target hardware has native instruction-level support for binary neural network operations.
  napkin_math: T4 INT8 Tensor Cores deliver ~130 TOPS natively. Emulating 1-bit MACs on standard CUDA
    cores requires multiple instructions (XNOR, __popc) per 32-bit packed word. 2560 CUDA cores at 1.59
    GHz performing 32-bit popcounts yield a theoretical max of ~40 TOPS, but register packing and instruction
    overhead drop effective throughput to <10 TOPS, making the native INT8 pipeline significantly faster.
