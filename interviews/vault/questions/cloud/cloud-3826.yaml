title: Tensor Parallel Communication Spec
scenario: A team wants to tensor-parallel a 30B model across 4 GPUs. The model fits
  only with sharding, but they have not measured activation size, layer count, interconnect
  bandwidth, or overlap. Specify the information needed before approving tensor parallelism.
question: What communication and model-shape data do you need before approving 4-way
  tensor parallelism for a 30B model?
details:
  realistic_solution: You need per-layer activation tensor sizes, number of synchronized
    layers, all-reduce/all-gather pattern, interconnect bandwidth and latency, overlap
    capability, batch and sequence length, and memory headroom. Tensor parallelism
    solves capacity but can fail latency if activation collectives dominate.
  common_mistake: Approving tensor parallelism because weights fit, without checking
    frequent activation communication.
  napkin_math: 'Example payload scale: if 80 layers each require two 64 MB collectives,
    the activation collective payload is 80 x 2 x 64 MB = 10.24 GB before algorithmic
    factors and overlap. Actual counts depend on the tensor-parallel implementation.'
