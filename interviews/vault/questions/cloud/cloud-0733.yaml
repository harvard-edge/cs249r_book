title: The AllReduce Incast Congestion
scenario: You are scaling Data Parallel training from 128 to 512 GPUs. You use a standard hierarchical AllReduce. While the mathematical volume of data sent per GPU is constant regardless of cluster size, the actual network time triples when moving to 512 GPUs. Packet loss metrics show a huge spike.
question: "What physical network phenomenon is causing this?"
details:
  realistic_solution: 'This is TCP/RoCE incast congestion. During the AllReduce reduce-scatter phase, multiple sender GPUs simultaneously transmit gradient chunks to the same destination switch port. With 512 GPUs, the burst of traffic from dozens of senders overwhelms the ToR switch''s egress buffer (typically 2-32 MB). Packets are dropped, triggering TCP retransmissions (adding 200ms+ RTOs) or RoCE PFC pause frames (backpressuring the entire network). The fix: use DCQCN congestion control for RoCE, implement ECN marking at switches, or use tree-based AllReduce patterns that reduce the fan-in at any single switch port.'
  common_mistake: |
    **The Pitfall:** Claiming "The bandwidth is saturated."
    **The Rationale:** If the volume of data per GPU is constant, the bandwidth requirement per link is constant. Engineers often equate network slowdowns exclusively with bandwidth limits rather than buffer exhaustion.
    **The Consequence:** Wasting time trying to optimize communication volume instead of addressing TCP/RoCE incast congestion and switch buffer limits.
  napkin_math: |
    - **Burst Size:** 8 nodes sending 1 MB chunks to 1 destination simultaneously = 8 MB burst.
    - **Buffer Capacity:** If the switch port only has 2 MB of dedicated egress buffer.
    - **Packet Drop:** **6 MB of packets are instantly dropped in the span of a few microseconds.**
