title: KV Cache Eviction Policy for Decode Pool Memory Management
scenario: A decode pool running vLLM shows increasing preemptions when long-context requests arrive (>4K tokens). KV cache utilization is at 95% when preemptions begin.
question: Why do >4K-token arrivals trigger vLLM preemption cascades at 95% KV utilization, and how would you fix it?
details:
  realistic_solution: 'vLLM KV cache is paged (PagedAttention). At 95% utilization with 4K token requests arriving, the new request needs 256 pages for prefill. Existing requests are also generating tokens and consuming more pages. The preemption cascade: new long request pre-allocates pages -> existing decode requests overflow -> vLLM preempts lowest-priority decode request. Fix: Implement admission control (reject new requests above 85% memory) and reserve 10% of KV pages for existing request growth.'
  common_mistake: |
    **The Pitfall:** Reducing the maximum context length to avoid preemptions.
    **The Rationale:** Engineers view hard limits as the easiest way to prevent memory exhaustion.
    **The Consequence:** This artificially limits the product's capabilities and does not address the root cause: the KV cache allocator fails to reserve headroom for token generation in existing requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU: H100 80GB. Model: 8B (16GB BF16 weights). Overhead: 4GB.
    - KV Cache Available Memory: 80 - 16 - 4 = 60 GB.
    - Attention shape: 32 layers, 32 heads, 128 dim. BF16 (2 bytes).
    - Paged KV block size: 16 tokens.

    **Calculations:**
    - KV memory per token: 2 (K+V) * 32 layers * 32 heads * 128 dim * 2 bytes = 524 KB.
    - Total token capacity: 60 GB / 524 KB = ~114,500 tokens.
    - Preemption swap cost (for 2K token request): 2048 tokens * 524 KB = 1.07 GB.
    - PCIe Gen4 swap time: 1.07 GB / 32 GB/s = 33 ms disruption per preemption.

    **Conclusion & Interpretation:**
    - **Result: 33 ms disruption (Memory-Bound Preemption Cascades)**. High KV utilization paired with long-context bursts causes catastrophic preemptions.
