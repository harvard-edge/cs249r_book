title: Design a FLOP-accuracy Pareto frontier experiment for MobileNet family selection
scenario: Your ML platform team needs to select a CNN backbone for a cloud-based product classification
  service targeting 200K QPS at 80% top-5 accuracy on a 1000-class taxonomy. Budget is 4 A100 nodes (32
  GPUs total). Design an experiment to find the Pareto-optimal model on the FLOP-accuracy frontier, including
  which architectures to test and how to measure serving cost.
question: "How would you design the model-selection experiment to find the FLOP-accuracy Pareto frontier and serving cost for 200K QPS on 32 A100s?"
details:
  realistic_solution: 'Test grid: MobileNetV3-Small/Large, EfficientNet-B0/B2/B4, RegNetX-400MF/800MF/1.6GF.
    For each: (1) measure ImageNet top-5 accuracy, (2) measure throughput at batch={16,32,64,128} on single
    A100, (3) compute cost = 1/throughput × GPU-hour rate. Plot accuracy vs. images/(GPU·sec). Add TensorRT
    INT8 variants for each model. Pareto frontier is set of models where no other model achieves both
    higher accuracy and lower cost.'
  common_mistake: Testing models only at their default input resolution and batch size, missing that throughput
    scales non-linearly with input resolution and that A100 utilization varies significantly across model
    sizes.
  napkin_math: '200K QPS across 32 A100s = 6,250 images/GPU/sec. MobileNetV3-Large: ~0.22 GFLOPs/image.
    At batch=128, A100 achieves ~3,500 img/sec → insufficient. EfficientNet-B0: ~0.39 GFLOPs, ~2,800 img/sec
    per A100 → also insufficient. Need INT8 quantization: 2–3× throughput boost → 7,000–8,000 img/sec
    per A100 → sufficient. Cost at $3/GPU-hr: 32 × $3 = $96/hr for 200K QPS = $0.48 per million queries.'
