title: Shared mmap for Multi-Tenant GPU Inference
scenario: 'You run a multi-tenant inference platform where 8 worker processes on one
  H100 server each serve the same 13B model (26 GB FP16). Without mmap, each process
  loads its own copy in host memory: 8 × 26 GB = 208 GB host RAM, exceeding your 256
  GB system memory. Design a memory-efficient architecture using mmap and describe
  how GPU memory is managed.'
question: How would you use mmap to share the 26 GB model across 8 workers, and how
  would you manage GPU memory?
details:
  realistic_solution: 'Host side: All 8 processes mmap the same safetensors file.
    The OS shares physical pages via copy-on-write, using 26 GB host RAM (not 208
    GB). GPU side: Option A — one process loads weights to GPU, others access via
    CUDA IPC (cudaIpcGetMemHandle/cudaIpcOpenMemHandle). All 8 processes share one
    26 GB GPU allocation. Option B — use NVIDIA MPS (Multi-Process Service) with a
    single GPU context. Weights loaded once, shared across all processes. Option C
    — use a serving framework like vLLM or TensorRT-LLM that manages a single weight
    copy with multiple request streams. Architecture: mmap safetensors → single cudaMemcpy
    → CUDA IPC handles distributed to workers. Host RAM: 26 GB (shared). GPU RAM:
    26 GB weights + 8 × KV cache per worker. Remaining 80 - 26 = 54 GB for KV caches
    and activations.'
  common_mistake: Assuming mmap automatically shares GPU memory too. mmap shares host
    memory pages between processes, but each process that calls cudaMemcpy creates
    a separate GPU memory allocation. You need CUDA IPC or a shared GPU memory pool.
  napkin_math: 'Without mmap: 8 × 26 GB = 208 GB host RAM (OOM on 256 GB). With mmap:
    26 GB shared. Savings: 182 GB. GPU without sharing: 8 × 26 GB = 208 GB (impossible
    on 80 GB). With CUDA IPC: 26 GB shared + 8 × ~6 GB KV cache = 74 GB. Fits on H100.'
