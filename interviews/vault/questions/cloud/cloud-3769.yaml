title: Shared mmap for Multi-Tenant GPU Inference
scenario: You run a multi-tenant inference platform where 8 worker processes on one server each serve the same 13B model (26 GB FP16). Without mmap, each process loads its own copy in host memory (208 GB), exceeding your 256 GB system memory.
question: "How would you design a memory-efficient architecture using mmap to share the 26 GB model across 8 workers, and how would you manage the GPU memory?"
details:
  realistic_solution: On the host side, all 8 processes memory-map (`mmap`) the same safetensors file. The OS physical page cache ensures copy-on-write sharing, consuming only 26GB of host RAM. On the GPU side, `mmap` does not natively share memory. You must load the weights to the GPU exactly once and use CUDA IPC (`cudaIpcGetMemHandle`) to share the physical device pointer across the 8 processes, or utilize a unified serving framework like vLLM/TensorRT-LLM to multiplex requests against a single weight allocation.
  common_mistake: |
    **The Pitfall:** Assuming host-side `mmap` automatically shares GPU memory allocations.
    **The Rationale:** Engineers conflate OS virtual memory page sharing with physical PCIe/GPU allocations, assuming `cudaMemcpy` from an mmap'd file behaves magically.
    **The Consequence:** Each worker process invokes its own `cudaMemcpy`, duplicating the 26GB model 8 times on the GPU, immediately causing a hardware Out-Of-Memory (OOM) crash.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 worker processes, 13B model (26 GB).
       - Host RAM: 256 GB.
       - GPU VRAM: 80 GB.
    2. **Calculations:**
       - Naive Host RAM: 8 * 26 GB = 208 GB (Dangerously close to limit).
       - mmap Host RAM: 1 * 26 GB = 26 GB (182 GB saved).
       - Naive GPU VRAM: 8 * 26 GB = 208 GB (OOM on 80GB GPU).
       - Shared GPU VRAM (IPC): 26 GB weights + (8 * 6 GB KV Cache) = 74 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 74 GB Total VRAM.** The architecture overcomes being strictly **Memory-Capacity-Bound** via OS page sharing and explicit CUDA IPC.
