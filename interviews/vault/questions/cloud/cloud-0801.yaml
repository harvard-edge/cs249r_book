title: The Deduplication Economics
scenario: Your team has assembled a 10TB pre-training dataset by crawling the web. A data quality audit
  reveals approximately 30% near-duplicate content. Your ML lead says 'duplicates don't matter — more
  data is always better.' Your infrastructure lead says 'dedup everything — it'll save 30% on training
  compute.' Who is right, and what is the economically optimal deduplication strategy?
question: "Who is right, and what is the economically optimal deduplication strategy?"
details:
  realistic_solution: 'Neither is right. Research (Lee et al., 2022; Penedo et al., 2023) shows that moderate
    deduplication *improves* model quality (reduces memorization, improves generalization), but aggressive
    deduplication *hurts* it (removes legitimate repeated patterns like common phrases, code idioms).
    The optimal strategy is **fuzzy deduplication with a similarity threshold**: use MinHash LSH to identify
    near-duplicate clusters (Jaccard similarity >0.8), keep one representative from each cluster, but
    preserve exact duplicates below the threshold. The economics: deduplication itself is not free — running
    MinHash on 10TB requires significant compute. The decision framework is: compare the cost of deduplication
    compute against the savings in training compute, weighted by the quality impact.'
  common_mistake: '"Deduplicate everything to save compute" or "Keep all duplicates because more data
    helps." Both are wrong — the relationship between duplication and model quality is non-linear.'
  napkin_math: '10TB dataset, 30% near-duplicates. Training a 7B model on 10TB: ~3,000 A100-hours at $2/hr
    = $6,000. Training on 7TB (after dedup): ~2,100 A100-hours = $4,200. Savings: $1,800 per training
    run. Deduplication cost: MinHash LSH on 10TB ≈ 200 CPU-hours at $0.05/hr = $10 (one-time). But the
    quality impact matters more: deduped models show 2-5% lower perplexity, which compounds across downstream
    tasks. If you retrain monthly, annual savings = $1,800 × 12 + quality gains = $21,600 + downstream
    value. The dedup ROI is ~2,160:1 on pure compute savings alone.'
