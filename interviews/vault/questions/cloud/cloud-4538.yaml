title: A100 Diurnal Power Scaling
scenario: A cluster of A100 80GB SXM GPUs handles a diurnal LLM workload. Management
  proposes shutting down 50% of the nodes at night to save the 400W per-GPU idle power.
question: Evaluate the trade-offs of this power-cycling strategy against keeping the
  nodes active but unloading the models to a sleep state.
details:
  realistic_solution: Hard-shutting down GPUs saves the 400W idle power and CPU/networking
    power, maximizing savings. However, cold boots and reloading 80GB of weights across
    the network introduce massive latency spikes (minutes), risking SLA violations
    during sudden traffic surges.
  common_mistake: Assuming model loading to HBM from the network is instantaneous,
    ignoring the multi-minute scale up time when weights live in remote object storage.
  napkin_math: 'Network reload: 80 GB over 100 Gbps Ethernet (~12 GB/s) = 6.7 s
    just for transfer; with object-store latency, TLS, and concurrent fleet warmup,
    end-to-end cold start is typically 60-120 s. Local PCIe path is moot because
    weights have been evicted to object storage when nodes were shut down.'
