title: A100 Diurnal Power Scaling
scenario: A cluster of GPUs handles a diurnal LLM workload. Management proposes shutting down 50% of the nodes at night to save idle power.
question: Evaluate the trade-offs of this power-cycling strategy against keeping the nodes active but unloading the models to a sleep state.
details:
  realistic_solution: Hard-shutting down GPUs saves the 400W idle power and CPU/networking power, maximizing savings. However, cold boots and reloading 80GB of weights across the network introduce massive latency spikes (minutes), risking SLA violations during sudden traffic surges.
  common_mistake: |
    **The Pitfall:** Assuming model loading to HBM from the network is instantaneous.
    **The Rationale:** Ignoring the multi-minute scale up time when weights live in remote object storage.
    **The Consequence:** Underestimating latency spikes and risking SLA violations during traffic surges.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Weights: 80 GB
       - Network: 100 Gbps Ethernet (~12.5 GB/s theoretical)
    2. **Calculations:**
       - Ideal transfer time: 80 GB / 12.5 GB/s = 6.4 s
       - Practical transfer time: 80 GB / 12 GB/s = 6.7 s
       - Full cold start with TLS/object-store overhead = 60-120 s
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound (Multi-minute scale up time vs near-instant local reload).**
