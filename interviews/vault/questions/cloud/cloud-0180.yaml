title: The Multi-Tenant SLO Crisis
scenario: Your platform serves latency-sensitive 'Swift' requests and long-running 'Deep' prefill requests on the same H100 GPU cluster.
question: What serving architecture lets latency-sensitive Swift requests avoid being blocked by long Deep prefills on the same H100 cluster?
details:
  realistic_solution: The correct architecture replaces the standard batching server with one that supports **fine-grained, preemptive scheduling**, like the mechanisms found in modern engines such as vLLM or Orca. This is often called 'continuous batching'.
  common_mistake: |
    **The Pitfall:** Proposing a simple priority queue.
    **The Rationale:** Candidates think ensuring 'Swift' requests are picked next from the queue solves latency issues.
    **The Consequence:** It doesn't solve Head-of-Line Blocking; if a 'Deep' model prefill has already started, non-preemptive batching forces the 'Swift' request to wait for the long computation to finish.
  napkin_math: |
    1. Heavy prefill (10k tokens, 70B model) compute: 2 * 70B * 10,000 = 1,400 TFLOPs.
    2. Kernel time on H100 (989 TFLOPS): 1,400 / 989 ≈ 1.4 seconds.
    3. Under standard batching, the Swift request waits the full 1.4s.
    4. With preemptive continuous batching, the Heavy prefill is chunked (e.g., 256 tokens).
    5. Chunk compute: 2 * 70B * 256 = 35.8 TFLOPs.
    6. Chunk time: 35.8 / 989 ≈ 36ms.
    7. **Conclusion: The Swift request waits at most 36ms.**
