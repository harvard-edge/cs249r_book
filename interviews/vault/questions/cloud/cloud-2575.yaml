title: Cloud Token Budget L5 0
scenario: Your LLM API serves a mix of short requests (avg 1K tokens, 80% of traffic) and long requests
  (avg 32K tokens, 20%). You can either (A) serve both on the same GPU pool or (B) create separate pools
  optimized for each. Evaluate both approaches.
question: "Should you use one shared GPU pool or separate pools for the 1K-token and 32K-token requests, and why?"
details:
  realistic_solution: 'Option A (shared pool): simple deployment. But 32K requests consume 32x more KV
    cache than 1K requests, causing head-of-line blocking. One 32K request displaces 32 short requests.
    20% of requests consume 20% × 32 / (80% × 1 + 20% × 32) = 89% of KV cache memory. Short requests queue
    behind long ones. Option B (separate pools): short pool (high concurrency, small KV cache, high throughput)
    and long pool (few concurrent, large KV cache). Short pool: 80% traffic at 1K tokens → high utilization.
    Long pool: 20% traffic at 32K → sized for peak. Better SLA for short requests. Disadvantage: cannot
    borrow capacity between pools. Best: B with auto-scaling — overprovision long pool by 20%, let short
    pool absorb spikes.'
  common_mistake: Serving all requests from one pool because it is 'simpler.' Without request-aware scheduling,
    long-context requests starve short requests of memory, destroying short-request latency SLAs.
  napkin_math: 'Shared: 80% × 1K + 20% × 32K = 7.2K avg token budget. Long requests use 89% of memory
    for 20% of traffic. Separate: Short pool at 1K → ~125 concurrent/GPU. Long pool at 32K → ~4 concurrent/GPU.
    SLA: short P99 drops from 200 ms (shared) to 50 ms (dedicated).'
