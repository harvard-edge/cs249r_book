title: Incast Congestion During AllReduce Reduce-Scatter
scenario: "During the reduce-scatter phase of ring AllReduce on a 128-H100 cluster, you observe periodic 50ms latency spikes on specific ToR switches. The pattern correlates with gradient synchronization boundaries. Buffer utilization on affected switches spikes from 10% to 98%."
question: What incast pattern is causing the 50ms reduce-scatter spikes, and why is reduce-scatter more vulnerable than all-gather?
details:
  realistic_solution: In reduce-scatter, each GPU receives partial gradients from its predecessor and forwards the accumulated result. At ring boundaries that cross ToR switches, N GPUs in a rack may simultaneously send their chunks to a single destination port, creating N:1 incast. With H100s at 400Gbps each, 8 GPUs per ToR means 3.2 Tbps of instantaneous demand on a single 400G uplink. Solutions include staggering send times with jitter (50-200μs random delay), using hierarchical AllReduce (intra-node reduce first via NVLink at 900 GB/s, then inter-node), and configuring ECN thresholds at 30% buffer occupancy to trigger DCQCN before buffers overflow.
  common_mistake: |
    **The Pitfall:** Treating incast congestion as a simple average bandwidth problem.
    **The Rationale:** Candidates look at the average network utilization and assume the links have plenty of capacity, ignoring the bursty, temporally correlated nature of synchronized communications.
    **The Consequence:** Network upgrades or simple bandwidth throttling fail to resolve the latency spikes because the micro-bursts still overflow the switch buffers.
  napkin_math: |
    - **Analyze cluster topology:** 8 H100s per ToR switch, each sending a 32MB gradient chunk simultaneously over 400Gbps links.
    - **Calculate instantaneous burst:** 8 GPUs * 32MB = 256MB burst arriving at one switch port.
    - **Analyze switch buffers:** A typical ToR shared buffer is 32-64MB.
    - **Evaluate oversubscription:** 256MB / 64MB = **4x oversubscription**, guaranteeing packet drops and latency spikes without PFC or ECN.
