title: Recall Transformer Inference FLOPs Formula
scenario: 'An interviewer asks you to state from memory: what is the standard approximation formula for total FLOPs in a single forward pass of a transformer with N parameters and sequence length S? And separately, what is the training FLOPs formula? How does inference FLOPs scale with sequence length vs model size?'
question: What are the standard FLOPs approximation formulas for inference and training, and how do they scale with sequence length?
details:
  realistic_solution: 'Standard forward pass inference FLOPs per token is roughly 2N. For a sequence of length S, the total forward pass is approximately 2NS. However, exact attention FLOPs scale as O(S^2), so for very long sequences, the attention term (4 * batch * heads * S^2 * head_dim) dominates. Training FLOPs are approximately 6ND, where D is the number of tokens in the training dataset (1 forward + 2 backward FLOPs per parameter, yielding 3 * 2N = 6N FLOPs per token). Thus, inference scales linearly with model size O(N) but quadratically with sequence length O(S^2).'
  common_mistake: Using 6ND for inference (training formula) or forgetting that attention FLOPs scale as O(S^2) which becomes significant at long context even if attention parameters are small.
  napkin_math: 'Inference (forward): 2NS FLOPs for dense layers. Attention: 4*S^2*d_model per batch. For small S, dense layers dominate (O(N)). For large S, attention dominates O(S^2). Training: 6ND FLOPs, because backward pass takes roughly 2x the compute of forward pass.'
