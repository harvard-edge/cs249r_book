title: TPU v5e Multi-Tenant Scheduling and Preemption
scenario: You are managing a multi-tenant ML training cluster on Google Cloud, primarily
  utilizing TPU v5e devices. Each TPU v5e has 16 GB HBM, 197 TFLOPS BF16 compute,
  and 1.6 TB/s memory bandwidth. A critical, latency-sensitive inference service,
  requiring 2 GB of HBM and 20 TFLOPS BF16, suddenly needs to run. Currently, a large-scale
  LLM training job is occupying an entire TPU v5e. Describe how you would orchestrate
  the resource sharing and scheduling to accommodate the new inference job while minimizing
  impact on the training job, considering the TPU's hardware capabilities and common
  multi-tenancy strategies. What are the key trade-offs?
question: How would you schedule a 2 GB, 20 TFLOPS inference job onto a TPU v5e occupied
  by LLM training while minimizing disruption, and what trade-offs arise?
details:
  realistic_solution: A realistic solution would involve leveraging advanced scheduling
    techniques. If the TPU v5e supports fine-grained resource partitioning (analogous
    to NVIDIA's MIG or MPS for GPUs, but specific to TPU architecture), one could
    attempt to dynamically allocate a fraction of the TPU's resources to the inference
    job. Specifically, since the inference job requires only 2 GB HBM (out of 16 GB)
    and 20 TFLOPS (out of 197 TFLOPS BF16), it might be possible to pause the LLM
    training, checkpoint its state, run the inference job, and then resume the training.
    Ideally, a scheduler integrated with the TPU runtime would allow for co-location
    through mechanisms like time-slicing (if the inference job is bursty and short)
    or even finer-grained sharing of compute units if the hardware permits. Graceful
    preemption with checkpointing is crucial to minimize training disruption. The
    system should prioritize the high-priority inference job, potentially by pausing
    the training model's execution pipeline on certain cores or allocating dedicated
    memory blocks.
  common_mistake: A common mistake would be to simply preempt and restart the training
    job, leading to significant wasted computation and increased time-to-train for
    the LLM. Another mistake is to ignore the memory bandwidth or compute constraints
    and assume simple time-slicing will suffice without considering potential resource
    contention or the overheads involved.
  napkin_math: Let's assume the LLM training job is compute-bound and requires near-full
    TPU resources. If we dedicate 20 TFLOPS BF16 to the inference job, the remaining
    compute for the training job would be 197 - 20 = 177 TFLOPS BF16. This represents
    approximately a 10% reduction in peak compute throughput for the training job
    (20/197 ≈ 10.15%). For memory, dedicating 2 GB HBM for inference leaves 14 GB
    HBM for training, a 12.5% reduction in available memory capacity (2/16 = 12.5%).
    If the inference job also consumes a fraction of the 1.6 TB/s memory bandwidth,
    say 0.1 TB/s, then 1.5 TB/s remains for training, implying a ~6.25% reduction.
    The actual impact on training performance depends on its bottleneck (compute,
    memory, or bandwidth). If the TPU can truly partition these resources without
    significant overhead, the training job would see a proportional slowdown. If not,
    the cost is the full preemption overhead, which could be minutes or hours depending
    on checkpointing and job restart time.
