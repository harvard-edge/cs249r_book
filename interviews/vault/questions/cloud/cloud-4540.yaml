title: H100 Budget Feasibility
scenario: You must provision a fleet of H100 SXM GPUs to pre-train a 50B parameter
  model on 2 Trillion tokens. You have a budget of $2M and rent GPUs at $3/hour.
question: Derive the required duration and prove whether this budget is sufficient
  given the H100's theoretical FLOPs and an estimated 40% Model Flops Utilization.
details:
  realistic_solution: Total compute is roughly 6 × 50e9 × 2e12 = 6e23 FLOPs. A single
    H100 achieves 0.4 × 989e12 = 395e12 FLOPs/sec. Total GPU-seconds needed is 6e23
    / 395e12 = 1.5e9 seconds or ~416,666 GPU-hours. At $3/hr, the cost is ~$1.25M,
    making the budget sufficient.
  common_mistake: Forgetting the factor of 6 in the 6ND training FLOPs equation or
    assuming 100% hardware utilization.
  napkin_math: Cost = 416666 × 3 = 1.25e6 USD
