title: H100 Budget Feasibility
scenario: You must provision a fleet of GPUs to pre-train a 50B parameter model on 2 Trillion tokens. You have a budget of $2M and rent GPUs at $3/hour.
question: Derive the required duration and prove whether this budget is sufficient given the GPU's theoretical FLOPs and an estimated 40% Model Flops Utilization.
details:
  realistic_solution: Total compute is roughly 6 * 50e9 * 2e12 = 6e23 FLOPs. A single H100 achieves 0.4 * 989e12 = 395e12 FLOPs/sec. Total GPU-seconds needed is 6e23 / 395e12 = 1.5e9 seconds or ~416,666 GPU-hours. At $3/hr, the cost is ~$1.25M, making the budget sufficient.
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 6 in the 6ND training FLOPs equation or assuming 100% hardware utilization.
    **The Rationale:** Engineers often use inference FLOPs (2ND) or theoretical peak compute bounds.
    **The Consequence:** Drastically underestimating compute cost or duration, leading to incomplete training runs or blown budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50B params, 2T tokens.
       - 40% MFU on H100 (989 TFLOPS).
       - Cost = $3/hr.
    2. **Calculations:**
       - FLOPs: 6 * 50e9 * 2e12 = 6e23 FLOPs.
       - Realized throughput: 0.4 * 989e12 = 395 TFLOPS.
       - GPU-hours: (6e23 / 395e12) / 3600 ≈ 416,666 hours.
       - Cost: 416,666 * $3 = $1.25M.
    3. **Conclusion & Interpretation:**
       - **Result: The budget is sufficient. $1.25M is well under the $2M limit.**
