title: The TCP Congestion Window Collapse
scenario: You are transferring a 2 TB model checkpoint from an AWS datacenter in Virginia to a GCP datacenter in Tokyo. You have a dedicated 10 Gbps direct fiber link. However, your `scp` or `rsync` transfer maxes out at a pathetic 250 Mbps. The link is not shared, and there is 0% packet loss.
question: Why is standard TCP catastrophically failing to use the bandwidth over a long distance?
details:
  realistic_solution: 'TCP''s throughput is limited by its congestion window, not the link bandwidth. The bandwidth-delay product (BDP) for a 10 Gbps link with 150ms RTT is 1.25 GB/s x 0.15s = 187.5 MB. TCP can only have this many bytes in flight simultaneously. The default Linux TCP receive window is ~2-6 MB, meaning TCP fills only 1-3% of the pipe. The fix: increase `net.core.rmem_max` and `net.core.wmem_max` to at least 200 MB, enable TCP window scaling, and use parallel streams (e.g., `bbcp` or `Aspera`) to multiplex connections and fill the pipe.'
  common_mistake: |
    **The Pitfall:** Assuming the cloud provider is throttling the egress.
    **The Rationale:** Engineers jump to blaming the network infrastructure rather than the transport protocol.
    **The Consequence:** They waste time opening support tickets instead of increasing TCP window sizes or using parallel transfer tools like bbcp.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bandwidth: 10 Gbps (1.25 GB/s).
       - Latency (RTT): ~150ms.
       - Default TCP Window: Linux default is ~4 MB.
    2. **Calculations:**
       - Bandwidth-Delay Product (BDP): 1.25 GB/s * 0.150s = 187.5 MB.
       - Throughput Limit: 4 MB / 187.5 MB = 2.1%.
       - Max Throughput: 2.1% * 10 Gbps = ~210 Mbps.
    3. **Conclusion & Interpretation:**
       - **Result: TCP Window Bound**. The default TCP window size starves the 10Gbps pipe by ~47x.
