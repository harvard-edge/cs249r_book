title: The TCP Congestion Window Collapse
scenario: You are transferring a 2 TB model checkpoint from an AWS datacenter in Virginia to a GCP datacenter
  in Tokyo. You have a dedicated 10 Gbps direct fiber link. However, your `scp` or `rsync` transfer maxes
  out at a pathetic 250 Mbps. The link is not shared, and there is 0% packet loss. Why is standard TCP
  catastrophically failing to use the bandwidth over a long distance?
question: "Why is standard TCP catastrophically failing to use the bandwidth over a long distance?"
details:
  realistic_solution: 'TCP''s throughput is limited by its congestion window, not the link bandwidth.
    The bandwidth-delay product (BDP) for a 10 Gbps link with 150ms RTT is 1.25 GB/s x 0.15s = 187.5 MB.
    TCP can only have this many bytes in flight simultaneously. The default Linux TCP receive window is
    ~2-6 MB, meaning TCP fills only 1-3% of the pipe. The fix: increase `net.core.rmem_max` and `net.core.wmem_max`
    to at least 200 MB, enable TCP window scaling, and use parallel streams (e.g., `bbcp` or `Aspera`)
    to multiplex connections and fill the pipe.'
  common_mistake: '"AWS is throttling the egress." While egress costs money, dedicated lines aren''t artificially
    throttled to 2%. The issue is the protocol physics.'
  napkin_math: 'A 10Gbps fiber link provides 1.25GB/s of bandwidth. With Virginia to Tokyo latency at
    ~150ms, the Bandwidth-Delay Product (BDP) dictates the required TCP Window Size: 1.25 GB/s * 0.150s
    = 187.5MB. Default Linux TCP windows cap at ~4MB. Since 4MB / 187.5MB = 2.1%, the throughput is artificially
    capped to 0.021 * 10 Gbps = ~210 Mbps. You are starving the 10Gbps pipe by 47x.'
