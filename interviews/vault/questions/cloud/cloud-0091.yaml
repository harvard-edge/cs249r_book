title: The Interconnect Latency Ladder (cloud-0091)
scenario: An ML training job needs to transfer a small control message between two GPUs.
question: "Roughly how much slower is this transfer if the GPUs are in different racks, connected by an InfiniBand NDR switch, compared to if they are in the same physical server connected by NVLink?"
details:
  realistic_solution: A cross-rack InfiniBand transfer is approximately 10 times slower than an intra-node NVLink transfer. NVLink latency is around 1 us. InfiniBand NDR, while extremely fast for a network, involves traversing network interface cards (NICs), cables, and a switch, resulting in a significantly higher latency.
  common_mistake: |
    **The Pitfall:** Assuming InfiniBand NDR has comparable latency to NVLink because both have high bandwidth.
    **The Rationale:** Engineers often confuse high throughput (GB/s) with low latency (ns) and underestimate the protocol overhead of leaving the server chassis.
    **The Consequence:** Control plane operations and blocking collectives experience an order-of-magnitude latency penalty, drastically stalling GPU compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Message size: 1MB.
       - Intra-node NVLink: 900 GB/s bandwidth, ~1us latency.
       - Inter-node IB NDR: 50 GB/s bandwidth, ~2us switch latency.
    2. **Calculations:**
       - NVLink transfer: (1MB / 900GB/s) + 1us = ~1.1us + 1us = 2.1us.
       - IB NDR transfer: (1MB / 50GB/s) + 2us = ~20us + 2us = 22us.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Interconnect.** The cross-rack transfer is ~10x slower (22us vs 2.1us), which can easily stall compute on blocking control messages.
  options:
  - ~2x slower
  - ~10x slower
  - ~18x slower
  - ~100x slower
  correct_index: 1
