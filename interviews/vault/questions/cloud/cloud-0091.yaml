title: The Interconnect Latency Ladder (cloud-0091)
scenario: An ML training job needs to transfer a small control message between two H100 GPUs. Roughly
  how much slower is this transfer if the GPUs are in different racks, connected by an InfiniBand NDR
  switch, compared to if they are in the same physical server connected by NVLink?
question: "Roughly how much slower is this transfer if the GPUs are in different racks, connected by an InfiniBand NDR switch, compared to if they are in the same physical server connected by NVLink?"
details:
  realistic_solution: A cross-rack InfiniBand transfer is approximately 10 times slower than an intra-node
    NVLink transfer. NVLink latency is around 500 ns, as it's a direct GPU-to-GPU interconnect on the
    same server board. InfiniBand NDR, while extremely fast for a network, involves traversing network
    interface cards (NICs), cables, and a switch, resulting in a latency of about 5,000 ns (5 µs).
  common_mistake: Engineers often underestimate the 'tax' of leaving the server chassis. They might assume
    modern networks like InfiniBand are nearly as fast as on-board interconnects, confusing high throughput
    (GB/s) with low latency (ns). While both are fast, the physical distance and protocol overhead of
    going cross-rack adds a significant, order-of-magnitude latency penalty compared to the tightly-coupled,
    on-board NVLink.
  napkin_math: 'Intra-node H100 NVLink is 900GB/s with ~1us latency. Inter-node over IB NDR is 50GB/s
    with ~2us switch latency. For a 1MB message: NVLink takes 1MB / 900GB/s = 1.1us + 1us = 2.1us. IB
    NDR takes 1MB / 50GB/s = 20us + 2us = 22us. The cross-rack transfer is ~10x slower. For blocking control
    messages in distributed training, this easily stalls 989 TFLOPS.'
  options:
  - Roughly the same speed
  - ~2x slower
  - ~10x slower
  - ~100x slower
  correct_index: 2
