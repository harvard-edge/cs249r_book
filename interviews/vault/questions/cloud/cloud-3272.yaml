title: Optimizing KV-Cache Management on NVIDIA A100 for Long-Context LLMs
scenario: You are optimizing KV-cache management for long-context LLM serving on A100 GPUs. Requests with extreme context windows (4096+ tokens) are creating severe KV-cache memory pressure.
question: How would you design and size a paged KV-cache system on 80 GB A100s for long-context serving with dynamic eviction and low tail latency?
details:
  realistic_solution: A realistic solution would involve a highly optimized paged attention implementation that uses a memory allocator designed for variable-length sequences and minimizes fragmentation. Implement an adaptive, 'usage-aware' cache eviction policy (e.g., a variant of Least Recently Used that considers sequence priority or age, or a 'token-level' eviction for partial sequences) integrated with the LLM's request scheduler. This allows for proactive memory reclamation and dynamic adjustment of batch sizes based on real-time memory availability. Employ memory pooling and pre-allocation strategies where possible to reduce allocation overhead. For extreme long contexts, consider techniques like KV-cache quantization (e.g., FP8) to significantly reduce footprint, or explore hierarchical caching where older KV-pages are offloaded to host memory.
  common_mistake: |
    **The Pitfall:** Relying on static memory allocation or simplistic LRU/FIFO eviction policies.
    **The Rationale:** Candidates treat LLM memory like standard CPU cache, failing to account for varying sequence lengths, fragmentation, and the massive scale of KV tensors.
    **The Consequence:** Severe memory fragmentation, premature eviction of critical tokens, and frequent OOM crashes under high concurrent load.
  napkin_math: |
    1. Llama 2 7B KV-cache per token: 32 layers * 64 heads (K+V) * 128 dim * 2 bytes = ~0.5 MB/token.
    2. Context length of 4096 tokens = 4096 * 0.5 MB = 2 GB per request.
    3. Batch size of 20 = 20 * 2 GB = 40 GB total KV-cache.
    4. 14 GB (weights) + 40 GB (KV-cache) = 54 GB.
    **A batch of 20 long-context requests consumes 54 GB, severely pressuring the 80 GB limit without a paged architecture.**
