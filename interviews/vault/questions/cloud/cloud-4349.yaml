title: Model Card Infrastructure for 50-Model Production Fleet
scenario: 'Your ML platform team manages 50 production models. A new EU AI Act compliance requirement mandates that each model have an up-to-date model card covering: intended use, performance by subgroup, known limitations, and training data lineage. Model cards are currently hand-authored in Markdown and drift from actual model behavior within weeks of a retrain.'
question: How would you design a system that auto-generates and maintains living model cards for 50 production models under EU AI Act requirements?
details:
  realistic_solution: 'Two-tier architecture: (1) Auto-generated sections (updated on every retrain): performance by subgroup (pulled from eval pipeline), training data statistics (from data lineage DAG), model architecture and hyperparameters (from MLflow/W&B), FLOP count and carbon estimate (computed post-training). (2) Human-reviewed sections (required sign-off before production deployment): intended use, out-of-scope uses, known limitations, ethical considerations. Implementation: embed model card generation in the CI/CD pipeline — training job emits a card_stub.yaml with auto-populated fields. A PR is auto-opened to the model owner requiring human completion of the reserved fields before the model can be promoted to production. Card stored in a git-tracked registry with version history tied to model versions in the artifact store.'
  common_mistake: |
    **The Pitfall:** Trying to auto-generate the 'intended use' and 'known limitations' sections.
    **The Rationale:** Candidates assume LLMs or pipelines can write all documentation without human judgment.
    **The Consequence:** Over-automating model card generation creates a false sense of compliance while producing inaccurate, legally risky documentation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 models, 4 retrains/year = 200 card updates/year.
    2. **Calculations:**
       - Auto-gen overhead: 200 * 5s = 1,000s = ~17 mins/year.
       - Human review time: 30 mins * 200 = 100 person-hours/year.
    3. **Conclusion & Interpretation:**
       - **Result: 100 person-hours/year is a negligible insurance cost against EU AI Act fines.**
