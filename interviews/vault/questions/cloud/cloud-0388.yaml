title: The H100 Roofline Ridge Point
scenario: 'You are evaluating a new kernel on an NVIDIA GPU. The datasheet lists a peak FP16 performance of 989 TFLOPS and a memory bandwidth of 3.35 TB/s.'
question: 'What does the ridge point represent, and what is its value in Operations per Byte from 989 TFLOPS and 3.35 TB/s?'
details:
  realistic_solution: 'The Ridge Point on a Roofline Model dictates the exact arithmetic intensity (FLOPs/Byte) where a workload shifts from being Memory-Bound to Compute-Bound. It informs whether optimization efforts should focus on Kernel Fusion (reducing memory I/O) or Tensor Core utilization. The extremely high ridge point means most standard operations will physically never saturate the FP16 compute cores.'
  common_mistake: |
    **The Pitfall:** Inverting the arithmetic intensity ratio.
    **The Rationale:** Candidates confuse the units, calculating Bandwidth / Compute instead of Compute / Bandwidth.
    **The Consequence:** They fundamentally misdiagnose system bottlenecks, applying compute optimizations to memory-bound layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 989 TFLOPS.
    - Peak Bandwidth: 3.35 TB/s.

    **Calculations:**
    - Ridge Point = Peak Compute / Memory Bandwidth.
    - (989 * 10^12 FLOPs/s) / (3.35 * 10^12 Bytes/s) = 295.2 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 295.2 FLOPs/Byte (Memory-Bandwidth-Bound)**. A kernel must perform >295 FLOPs per byte moved to be Compute-Bound.
  options:
  - '~0.0034 Ops/Byte'
  - '~3.39 Ops/Byte'
  - '~295 Ops/Byte'
  - '~295,000 Ops/Byte'
