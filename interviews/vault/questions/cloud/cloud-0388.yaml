title: The H100 Roofline Ridge Point
scenario: You are evaluating a new kernel on an NVIDIA H100 GPU. The datasheet lists a peak FP16 performance
  of 989 TFLOPS and a memory bandwidth of 3.35 TB/s. To determine if a workload is compute-bound or memory-bound,
  you need to find the system's 'ridge point'. Explain what the ridge point represents and calculate its
  value for the H100 in Operations per Byte.
details:
  realistic_solution: The ridge point on a roofline model is the minimum Arithmetic Intensity (AI) an
    algorithm must have to be bottlenecked by the processor's compute capability. It's the 'corner' of
    the roofline plot where performance transitions from being limited by memory bandwidth to being limited
    by peak compute. Kernels with an AI below the ridge point are memory-bound; those with an AI above
    it are compute-bound.
  common_mistake: The most common mistake is inverting the ratio, calculating Bandwidth / Compute instead
    of Compute / Bandwidth. This confuses the fundamental definition of arithmetic intensity. Another
    frequent error is getting bogged down by the 'Tera' prefix (10^12), not realizing that the prefixes
    cancel each other out in the final ratio. A third error is confusing the ridge point with power efficiency
    (TOPS/W).
  napkin_math: 'Ridge Point = Peak Compute / Memory Bandwidth

    1. **Peak Compute:** 989 TFLOPS = 989,000 GFLOPS = 989,000 × 10^9 FLOPs.

    2. **Memory Bandwidth:** 3.35 TB/s = 3,350 GB/s = 3,350 × 10^9 Bytes/s.

    3. **Calculation:** 989,000 / 3,350 ≈ 295.2 FLOPs/Byte.

    If an algorithm performs fewer than ~295 FLOPs per Byte read from memory, the GPU will idle waiting
    for data (memory-bound).'
  options:
  - ~0.0034 Ops/Byte
  - ~1.41 Ops/Byte
  - ~295 Ops/Byte
  - ~3.32M Ops/Byte
  correct_index: 2
