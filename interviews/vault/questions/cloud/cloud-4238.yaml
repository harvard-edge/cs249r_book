title: Implementing a numerically stable custom backward pass for a fused loss function
scenario: You are implementing a custom cross-entropy variant that fuses the softmax and log-sum-exp into a single CUDA kernel for MI300X. The forward pass computes log(sum(exp(x))) but naively overflows in FP16.
question: "How would you implement a numerically stable forward and backward for this fused cross-entropy autograd Function on MI300X?"
details:
  realistic_solution: 'In forward: save softmax output (not logits) using ctx.save_for_backward. Compute log-sum-exp with the max-subtraction trick: m = max(x), output = log(sum(exp(x-m))) + m. In backward: grad_input = softmax - (1 if label else 0), which requires only the saved softmax. Mark ctx.mark_non_differentiable() for any integer indices.'
  common_mistake: |
    **The Pitfall:** Computing exp(x) directly in FP16 before subtracting the max.
    **The Rationale:** Naively translating the math formula into code without considering FP16 numerical limits.
    **The Consequence:** Causes `inf` values and NaN gradients due to FP16 overflow during the forward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch = 512, C = 50,000.
       - MI300X bandwidth = 5.3 TB/s.
       - Saved softmax uses 4 bytes/element.
    2. **Calculations:**
       - Saving costs: 512 × 50,000 × 4 bytes = 102.4 MB.
       - Loading 102.4 MB at 5.3 TB/s: 102.4e6 / 5.3e12 = ~0.019 ms.
       - Recomputing adds ~15% step time (a full forward pass).
    3. **Conclusion & Interpretation:** **Result: Memory-Bound.** Saving the softmax output costs negligible memory bandwidth time (~0.019 ms) compared to the latency of recomputing it, making saving clearly superior.
