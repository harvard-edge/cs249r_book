title: Implementing a numerically stable custom backward pass for a fused loss function
scenario: You are implementing a custom cross-entropy variant that fuses the softmax and log-sum-exp into a single CUDA kernel for MI300X (192GB, 5.3TB/s). The forward pass computes log(sum(exp(x))) but naively overflows in FP16.
question: "How would you implement a numerically stable forward and backward for this fused cross-entropy autograd Function on MI300X?"
details:
  realistic_solution: 'In forward: save softmax output (not logits) using ctx.save_for_backward. Compute log-sum-exp with the max-subtraction trick: m = max(x), output = log(sum(exp(x-m))) + m. In backward: grad_input = softmax - (1 if label else 0), which requires only the saved softmax. Mark ctx.mark_non_differentiable() for any integer indices.'
  common_mistake: |
    **The Pitfall:** Computing exp(x) directly in FP16 before subtracting the max.
    **The Rationale:** Naive translation of the math formula into code without considering numerical limits.
    **The Consequence:** Causing `inf` values and NaN gradients due to FP16 overflow.
  napkin_math: |
    1. Saving softmax vs recomputing: Batch=512, C=50000.
    2. Saving costs 512 × 50000 × 4 bytes = 102.4 MB.
    3. At MI300X 5.3TB/s bandwidth, loading 102.4 MB takes 102.4e6 / 5.3e12 = **~0.019 ms**.
    4. Recomputing adds a full forward pass (~15% step time), making saving clearly superior.
