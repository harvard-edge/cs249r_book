title: Structured Pruning 50% of MLP Layers in 70B LLM — MI300X Impact
scenario: A team applies structured pruning to a 70B LLM (80 layers, MLP intermediate_size=28,672 per layer) targeting a substantial weight reduction. They prune 30% of neurons from each MLP layer on MI300X (192GB HBM3, 5.3 TB/s). Note that the model uses a modern SwiGLU MLP containing 3 projection matrices.
question: What parameter reduction, memory savings, and decode throughput speedup result from pruning 30% of MLP neurons in the 70B model?
details:
  realistic_solution: 'Original SwiGLU MLP per layer: 3 × d_model × intermediate = 3 × 8192 × 28672 = 704.6M params. 80 layers: 80 × 704.6M = 56.3B MLP params. After 30% pruning: 16.9B params removed. Total model drops from 70B to 53.1B params. Memory: 53.1B × 2B (BF16) = 106.2GB (vs original 140GB). At 5.3 TB/s: decode latency = 106.2GB/5.3TB/s = 20.0ms/token = 50 tok/s vs original 37.9 tok/s. Improvement: 32%. Note: accuracy impact requires significant recovery fine-tuning.'
  common_mistake: |
    **The Pitfall:** Expecting throughput to scale linearly with the reduction in raw compute FLOPs.
    
    **The Rationale:** Engineers accustomed to training bottlenecks naturally evaluate optimizations against compute bounds, completely forgetting that decode-phase inference is fundamentally memory-bandwidth bound.
    
    **The Consequence:** The projected performance gains are structurally incorrect, leading to faulty deployment strategies that focus on compute instead of optimizing memory footprints.
  napkin_math: |
    - **Original MLP**: 3 matrices * 8192 * 28672 * 80 layers = 56.3B params.
    - **Pruned MLP 30%**: 56.3B × 0.3 = 16.9B params saved.
    - **New Model Size**: 70B - 16.9B = 53.1B.
    - **New Memory**: 53.1B * 2B = 106.2 GB.
    - **Decode Latency**: 106.2 GB / 5.3 TB/s = 20.0 ms/token (50 tok/s).
    - **Result**: Speedup is 50 / 37.9 = **1.32× (32% Improvement)**.
