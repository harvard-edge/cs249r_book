title: Datacenter Carbon Lifecycle Assessment
scenario: 'Your team is deploying a cluster of 100 nodes. Each node has an estimated embodied footprint of 16,000 kg CO2e. The cluster will operate at 10 kW IT power per node with a datacenter PUE of 1.2 over a 40,000-hour lifecycle. You must choose between Region A (Carbon Intensity: 0.5 kg CO2e/kWh) and Region B (Carbon Intensity: 0.05 kg CO2e/kWh).'
question: What is the total lifecycle carbon per node in Region B, and what percentage comes from embodied carbon?
details:
  realistic_solution: Total power per node is IT Power (10 kW) × PUE (1.2) = 12 kW. Total energy over 40,000 hours is 12 kW × 40,000 h = 480,000 kWh. In Region B, operational carbon is 480,000 kWh × 0.05 kg CO2e/kWh = 24,000 kg CO2e. The total lifecycle carbon per node is 16,000 kg (embodied) + 24,000 kg (operational) = 40,000 kg CO2e. Embodied carbon represents 40% (16,000 / 40,000) of the total lifecycle footprint.
  common_mistake: |
    **The Pitfall:** Ignoring the PUE multiplier or focusing solely on operational emissions.
    **The Rationale:** Candidates forget to account for cooling/overhead power (PUE) and miss the fact that in low-carbon grids, the embodied footprint of the hardware dominates.
    **The Consequence:** Underestimating the true carbon impact of the deployment and miscalculating the return on investment of extending hardware lifespans.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 kW IT Power per node, PUE = 1.2.
       - 40,000 hours lifecycle. Embodied carbon = 16,000 kg CO2e.
       - Region B carbon intensity = 0.05 kg CO2e/kWh.
    2. **Calculations:**
       - Total Power per node = 10 kW (IT) × 1.2 PUE = 12 kW.
       - Total Energy over lifecycle = 12 kW × 40,000 hrs = 480,000 kWh.
       - Operational Carbon in Region B = 480,000 kWh × 0.05 kg CO2e/kWh = 24,000 kg CO2e.
       - Total Lifecycle Carbon = 16,000 kg (embodied) + 24,000 kg (operational) = 40,000 kg CO2e.
       - Embodied Carbon Percentage = 16,000 / 40,000 = 40%.
    3. **Conclusion & Interpretation:**
       - **Total lifecycle carbon is 40,000 kg CO2e per node, with 40% coming from embodied carbon.**
       - **Result: Power-Bound**
