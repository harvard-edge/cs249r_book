title: Datacenter Carbon Lifecycle Assessment
scenario: 'Your team is deploying a cluster of 100 DGX H100 nodes. Each node has an estimated embodied
  footprint of 16,000 kg CO2e. The cluster will operate at 10 kW IT power per node with a datacenter PUE
  of 1.2 over a 40,000-hour lifecycle. You must choose between Region A (Carbon Intensity: 0.5 kg CO2e/kWh)
  and Region B (Carbon Intensity: 0.05 kg CO2e/kWh). Calculate the total lifecycle carbon (embodied +
  operational) per node in Region B, and determine what percentage of total lifecycle emissions comes
  from embodied carbon in this low-carbon region.'
question: "What is the total lifecycle carbon per DGX H100 node in Region B, and what percentage comes from embodied carbon?"
details:
  realistic_solution: Total power per node is IT Power (10 kW) × PUE (1.2) = 12 kW. Total energy over
    40,000 hours is 12 kW × 40,000 h = 480,000 kWh. In Region B, operational carbon is 480,000 kWh × 0.05
    kg CO2e/kWh = 24,000 kg CO2e. The total lifecycle carbon per node is 16,000 kg (embodied) + 24,000
    kg (operational) = 40,000 kg CO2e. Embodied carbon represents 40% (16,000 / 40,000) of the total lifecycle
    footprint.
  common_mistake: Candidates often forget to multiply the IT power by the PUE (underestimating total energy
    draw) or focus solely on operational emissions, missing that embodied carbon becomes a massive proportion
    of the footprint in green regions.
  napkin_math: 'Total Power = 10 kW * 1.2 PUE = 12 kW.

    Energy = 12 kW * 40,000 hrs = 480,000 kWh.

    Region B Op Carbon = 480,000 * 0.05 = 24,000 kg CO2e.

    Total = 16,000 (embodied) + 24,000 (op) = 40,000 kg.

    Embodied % = 16k / 40k = 40%.'
