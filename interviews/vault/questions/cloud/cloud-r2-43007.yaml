title: Feature Serving Architecture for Multi-Model Inference
scenario: You're designing a feature serving layer for a platform that runs 30 ML models per user request
  (recommendations, fraud, pricing, personalization). Each model needs 50-200 features, with 60% overlap
  across models. The total unique feature set is 800 features. Design the serving architecture to meet
  a 10ms p99 budget for all feature fetches, on H100-backed inference servers.
details:
  realistic_solution: 'Implement a unified feature gateway that deduplicates across all 30 models. Per
    request: (1) collect the union of all required features (800 unique out of 30 × 150 = 4,500 requested),
    (2) batch into a single MGET to Redis, (3) fan out the response to each model''s feature vector. Architecture:
    feature gateway runs as a sidecar on the inference server (avoids network hop). Redis response for
    800 features via MGET: ~3ms. Feature vector assembly (CPU): ~0.5ms. Total: 3.5ms, well within 10ms
    budget. For further optimization, prefetch features during request parsing using the user_id, overlapping
    with authentication and request validation.'
  common_mistake: Having each model independently fetch its features — this creates 30 × 150 = 4,500 individual
    feature lookups per request with massive redundancy and network overhead.
  napkin_math: 'Without dedup: 30 models × 150 features × 1 network round trip each = 30 MGET calls ×
    1ms/call = 30ms (exceeds budget). With dedup: 1 MGET of 800 features = 3ms. Network savings: 30 →
    1 round trip. Memory for feature vector assembly: 800 features × 8 bytes = 6.4 KB per request. At
    50K QPS: 50K × 6.4 KB = 320 MB working set — fits in L3 cache of inference server.'
