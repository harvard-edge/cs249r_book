title: KV-Cache Memory Planning for Multi-Turn Chat
scenario: Your chat service uses Llama 3 8B (32 layers, 4 GQA KV heads, head_dim=128)
  with an 8K context window. Users average 6 turns per conversation, each turn adding
  500 tokens (300 user + 200 assistant). Calculate the KV-cache growth trajectory
  and the maximum concurrent conversations on a single A100-80GB.
question: How does KV-cache grow over 6 turns for Llama 3 8B, and how many concurrent
  conversations fit on one A100-80GB?
details:
  realistic_solution: 'KV per token per layer: 2 × 4 × 128 × 2B = 2,048 B = 2 KB.
    Per token across 32 layers: 2 KB × 32 = 64 KB. Turn-by-turn growth: Turn 1: 500
    tokens × 64 KB = 32 MB. Turn 2: 1000 tokens × 64 KB = 64 MB. Turn 3: 1500 × 64
    KB = 96 MB. Turn 6: 3000 × 64 KB = 192 MB per conversation. Model weights: 8B
    × 2B = 16 GB. Available for KV-cache: 80 - 16 = 64 GB (ignoring activations/overhead,
    ~60 GB practical). At turn 6 (192 MB per conversation): 60 GB / 192 MB = 312 concurrent
    conversations. At turn 1 (32 MB): 60 GB / 32 MB = 1,875 conversations. The challenge:
    conversations that hit the 8K context limit (8K × 64 KB = 512 MB) reduce concurrency
    to 60 GB / 512 MB = 117. Capacity planning must use the expected average context
    length, not the minimum. With 6 turns averaging 3K tokens: plan for 312 concurrent
    conversations per A100.'
  common_mistake: Forgetting that multi-turn conversations accumulate KV-cache across
    all turns. Turn 6 must attend to all previous turns' tokens, not just the current
    turn's tokens.
  napkin_math: 'KV/token: 64 KB. Turn 6 (3K tokens): 192 MB/conversation. Turn at
    8K max: 512 MB. A100 budget: ~60 GB. Concurrency: 312 at avg, 117 at max context.
    Growth rate: 32 MB/turn.'
