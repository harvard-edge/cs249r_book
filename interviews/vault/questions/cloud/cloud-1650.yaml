title: NVLink to PCIe Fallback
scenario: You are debugging a Tensor Parallel (TP=8) LLM training job on a single 8-GPU H100 HGX node. The training throughput is severely degraded. Profiling reveals that intra-node `ncclAllGather` operations are taking ~14x longer than expected. The node is equipped with NVLink 4.0 (900 GB/s bidirectional per GPU), but the communication is mysteriously slow.
question: What likely causes the ~14x slow intra-node ncclAllGather, and how would you verify and fix the H100 topology issue?
details:
  realistic_solution: Use `nvidia-smi topo -m` or `NCCL_DEBUG=INFO` to diagnose the topology. The 14x slowdown strongly indicates NCCL has fallen back to host memory routing via PCIe Gen5 because NVLink P2P is blocked (typically by PCIe Access Control Services (ACS) or strict IOMMU settings). Disabling ACS allows NCCL to establish direct NVLink connections.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-bound, related to batch size, or blaming inter-node InfiniBand.
    **The Rationale:** Engineers often look at high-level symptoms (slow training) and guess the usual suspects without analyzing the topology.
    **The Consequence:** Wasting time tuning software or network settings without checking `nvidia-smi topo -m` to verify if NVLink peer-to-peer (P2P) is actually active.
  napkin_math: |
    - **NVLink 4.0 Bandwidth:** 900 GB/s bidirectional.
    - **PCIe Gen5 Bandwidth:** ~64 GB/s unidirectional.
    - **NVLink Transfer Time:** For a 1GB tensor: 1GB / 900 GB/s = 1.1ms.
    - **PCIe Transfer Time:** For a 1GB tensor: 1GB / 64 GB/s = 15.6ms.
    - **Latency Ratio:** 15.6ms / 1.1ms = **~14.1x** latency spike.
    - **Conclusion:** This perfectly matches the profiled ~14x degradation, confirming PCIe fallback.
