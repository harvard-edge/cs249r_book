title: Architecting a Multi-Tier Storage Hierarchy for H100 Clusters
scenario: You are designing the data loading architecture for a training cluster of 256 nodes. The training dataset is 5 PB of high-resolution images in S3. The GPUs require a combined 250 GB/s of data throughput to remain fully utilized. Fetching directly from the object store yields only 50 GB/s.
question: Should the 5PB image pipeline use a centralized all-flash file system or local NVMe caching to reach 250GB/s, and why?
details:
  realistic_solution: The optimal design is a decentralized multi-tier storage hierarchy. Use the object store as the cheap, high-capacity source of truth. Equip each of the 256 compute nodes with local NVMe Gen4 SSDs to act as an ephemeral caching tier. An orchestrator (like Ray Data) fetches the 5 PB dataset once from S3, sharding it across the local NVMes of the 256 compute nodes. The GPUs then read directly from local NVMe for all subsequent epochs, providing massive aggregate throughput without saturating the cluster's network fabric.
  common_mistake: |
    **The Pitfall:** Reflexively recommending a massive centralized parallel file system.
    **The Rationale:** Engineers assume standard enterprise solutions scale indefinitely without recognizing the prohibitive cost and network cross-sectional bandwidth required.
    **The Consequence:** Designing an astronomically expensive, network-bottlenecked storage tier.
  napkin_math: |
    1. **Total Demand:** 250 GB/s.
    2. **Per Node Demand:** 250 / 256 = ~1 GB/s.
    3. **Local NVMe Supply:** 4x Gen4 drives provide ~25 GB/s.
    4. **S3 Download Time:** 5 PB at 50 GB/s takes ~28 hours.
    5. **Result:** Caching locally easily handles the 1 GB/s demand, **bypassing S3 and centralized bottlenecks entirely**.
