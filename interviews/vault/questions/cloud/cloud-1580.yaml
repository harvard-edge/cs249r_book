title: Architecting a Multi-Tier Storage Hierarchy for H100 Clusters
scenario: You are tasked with designing the data loading architecture for a large-scale training cluster
  of 256 nodes (each with 8x H100 GPUs). The training dataset is 5 PB of high-resolution images residing
  in an AWS S3 object store. The GPUs require a combined 250 GB/s of training data throughput to remain
  fully utilized. Fetching directly from the object store currently yields only 50 GB/s, resulting in
  severe GPU starvation. Evaluate the trade-offs between implementing a centralized all-flash parallel
  file system versus a decentralized caching tier using local NVMe SSDs on the compute nodes, and justify
  your design choice.
question: "Should the 5PB image pipeline use a centralized all-flash file system or local NVMe caching to reach 250GB/s, and why?"
details:
  realistic_solution: The optimal design is a decentralized multi-tier storage hierarchy. Use the object
    store as the cheap, high-capacity source of truth. Equip each of the 256 compute nodes with local
    NVMe Gen4 SSDs to act as an ephemeral caching tier. An orchestrator (like Ray Data) fetches the 5
    PB dataset once from S3, sharding it across the local NVMes of the 256 compute nodes. The GPUs then
    read directly from local NVMe for all subsequent epochs, providing massive aggregate throughput without
    saturating the cluster's network fabric.
  common_mistake: Candidates often reflexively recommend a massive centralized parallel file system (like
    Lustre or Weka) to hit the 250 GB/s requirement, ignoring the immense network cross-sectional bandwidth
    required and the prohibitive cost of caching 5 PB in an all-flash NAS.
  napkin_math: "Total throughput needed = 250 GB/s. Per node throughput = 250 / 256 ≈ 1 GB/s. \nLocal\
    \ NVMe array (e.g., 4x Gen4 drives) provides ~25 GB/s read bandwidth per node. \nReading 1 GB/s uses\
    \ <4% of the node's local disk bandwidth, leaving PCIe lanes free for GPU transfers. \nMeanwhile,\
    \ downloading the dataset from S3 to local NVMe arrays once at 50 GB/s (cluster-wide) takes about\
    \ 28 hours. Once cached, reading from local NVMes provides the full 250 GB/s aggregate throughput\
    \ needed, bypassing S3 entirely for the rest of the training run, without the need for a multi-million\
    \ dollar centralized all-flash array."
