title: Calculate Model State Memory per GPU
scenario: 'You are configuring pure 3D parallelism (Megatron-LM style, without ZeRO)
  to train a 64 Billion parameter Transformer model on a cluster of H100 GPUs (80
  GB HBM3). The training uses standard mixed precision: 16-bit model weights, 32-bit
  gradients, 32-bit master weights, and 32-bit Adam optimizer states (first and second
  moments). The parallelism dimensions are set to Tensor Parallelism (TP) = 8, Pipeline
  Parallelism (PP) = 4, and Data Parallelism (DP) = 16. Calculate the exact memory
  required per GPU strictly for the model states (weights, gradients, and optimizer
  states) in GB.'
question: How much per-GPU model-state memory is required for the 64B model with TP=8,
  PP=4, DP=16, and no ZeRO?
details:
  realistic_solution: In pure 3D parallelism, the total model parameters, gradients,
    and optimizer states are partitioned only across the Tensor Parallel (TP) and
    Pipeline Parallel (PP) dimensions. To find the memory per GPU, calculate the memory
    footprint of a single parameter across all states, then divide the total parameter
    count by the product of the TP and PP degrees to find the number of parameters
    per GPU. Finally, multiply the parameters per GPU by the per-parameter memory
    footprint.
  common_mistake: Candidates often incorrectly divide the model states by the Data
    Parallelism (DP) degree, forgetting that in standard 3D parallelism (without ZeRO),
    DP replicas hold duplicate copies of their pipeline stages. Another common error
    is miscalculating the footprint of mixed precision, such as forgetting the 32-bit
    master weights or assuming 16-bit gradients.
  napkin_math: '1. Bytes per parameter: 2B (FP16 weights) + 4B (FP32 master weights)
    + 4B (FP32 gradients) + 8B (FP32 Adam moments) = 18 bytes.

    2. Total partitioning factor: TP (8) * PP (4) = 32.

    3. Parameters per GPU: 64 Billion / 32 = 2 Billion parameters.

    4. Model state memory per GPU: 2 Billion parameters * 18 bytes = 36 GB.

    (This consumes 36 GB out of the 80 GB HBM3 on the H100, leaving space for activations
    and KV caches).'
