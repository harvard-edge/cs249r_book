title: Calculate Model State Memory per GPU
scenario: 'You are configuring pure 3D parallelism (Megatron-LM style, without ZeRO) to train a 64 Billion parameter Transformer model on a cluster of H100 GPUs. The training uses standard mixed precision: 16-bit model weights, 32-bit gradients, 32-bit master weights, and 32-bit Adam optimizer states. The parallelism dimensions are TP = 8, PP = 4, and DP = 16.'
question: 'How much per-GPU model-state memory is required for the 64B model with TP=8, PP=4, DP=16, and no ZeRO?'
details:
  realistic_solution: 'In pure 3D parallelism, the total model parameters, gradients, and optimizer states are partitioned only across the Tensor Parallel (TP) and Pipeline Parallel (PP) dimensions. To find the memory per GPU, calculate the memory footprint of a single parameter across all states, then divide the total parameter count by the product of the TP and PP degrees to find the number of parameters per GPU. Finally, multiply the parameters per GPU by the per-parameter memory footprint.'
  common_mistake: |
    **The Pitfall:** Dividing the model states by the Data Parallelism (DP) degree.
    **The Rationale:** Candidates conflate ZeRO data parallelism (which partitions states) with standard 3D parallelism (which replicates states).
    **The Consequence:** They drastically underestimate the memory required per GPU, leading to immediate out-of-memory crashes upon initialization.
  napkin_math: |
    * **Bytes per parameter:** 2B (FP16 weights) + 4B (FP32 master weights) + 4B (FP32 gradients) + 8B (FP32 Adam moments) = 18 bytes.
    * **Total partitioning factor:** TP (8) * PP (4) = 32.
    * **Parameters per GPU:** 64 Billion / 32 = 2 Billion parameters.
    * **Model state memory per GPU:** 2 Billion parameters * 18 bytes = **36 GB**.
