title: Calculate Model State Memory per GPU
scenario: 'You are configuring pure 3D parallelism to train a 64 Billion parameter Transformer model. The training uses standard mixed precision: 16-bit model weights, 32-bit gradients, 32-bit master weights, and 32-bit Adam optimizer states. The parallelism dimensions are TP = 8, PP = 4, and DP = 16.'
question: 'How much per-GPU model-state memory is required for the 64B model with TP=8, PP=4, DP=16, and no ZeRO?'
details:
  realistic_solution: 'In pure 3D parallelism, the total model parameters, gradients, and optimizer states are partitioned only across the Tensor Parallel (TP) and Pipeline Parallel (PP) dimensions. Data Parallelism (DP) replicates the model states entirely. To find the memory per GPU, calculate the memory footprint of a single parameter across all states, then divide the total parameter count by the product of the TP and PP degrees to find the number of parameters per GPU. Finally, multiply the parameters per GPU by the per-parameter memory footprint.'
  common_mistake: |
    **The Pitfall:** Dividing the model states by the Data Parallelism (DP) degree.
    **The Rationale:** Candidates conflate ZeRO data parallelism (which partitions states) with standard 3D parallelism (which replicates states).
    **The Consequence:** They drastically underestimate the memory required per GPU, leading to immediate out-of-memory crashes upon initialization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 64B parameters.
       * Parallelism: TP=8, PP=4, DP=16.
       * States: 16-bit weights (2B), 32-bit gradients (4B), 32-bit master weights (4B), 32-bit Adam moments (8B).
    2. **Calculations:**
       * Bytes per parameter: 2 + 4 + 4 + 8 = 18 bytes.
       * Partitioning factor: TP (8) * PP (4) = 32 (DP does not partition).
       * Parameters per GPU: 64 Billion / 32 = 2 Billion.
       * Memory per GPU: 2 Billion * 18 bytes = 36 GB.
    3. **Conclusion & Interpretation:**
       * **Result: Memory Capacity-Bound. The model state strictly requires 36 GB of VRAM per GPU.**
