title: Full-Stack RecSys Architecture for a New Social Platform
scenario: 'Design the complete recommendation system architecture for a new social platform targeting
  100M users at launch, scaling to 1B users in year 3. Workload: 500k QPS at launch, 5M QPS at scale.
  Specify: retrieval model type and infrastructure, ranking model architecture, embedding table sizing
  strategy, online learning pipeline, serving hardware choices (H100/MI300X/TPU), and how the architecture
  evolves from launch to scale. Justify each major decision with quantitative reasoning.'
details:
  realistic_solution: 'Launch (100M users, 500k QPS): Retrieval: Two-tower model, FAISS HNSW index on
    100M items (256 GB INT8). Deployed on 4 A100 nodes (CPU for FAISS, GPU for user tower). Pre-ranking:
    small 2-layer MLP, CPU-based, 10k→1k. Ranking: DLRM with 10 embedding tables totaling 500 GB, 1B param
    MLP. Re-ranking: MMR on CPU. Online learning: 1-hour batch retraining cycle. Note: 500k QPS at 9ms/request
    requires ~4,500 A100-equivalents; in practice GPU batching and request parallelism reduce actual GPU
    count. Scale to 1B users, 5M QPS: Retrieval: scale FAISS to 1B items (2.5 TB INT8 index across 32
    nodes). Embedding tables grow 10× to 5 TB — migrate hot tables to MI300X cluster (192 GB × 50 nodes
    = 9.6 TB HBM). Training: move to 512 H100 cluster with hybrid parallelism. Online learning: reduce
    to 10-minute batch update.'
  common_mistake: Designing for year-3 scale at launch — over-engineering. Or designing only for launch
    and requiring full architecture replacement at scale. The question asks for a staged evolution plan.
  napkin_math: 'Launch serving: 500k QPS × 9ms/request = 4,500,000 GPU-ms/s = 4,500 GPUs for ranking.
    1 GPU handles ~111 RPS. With 2× headroom: 9,000 GPUs. Cost: 9,000 × $3.50/hr = $31,500/hr = $275M/year.
    Scale: 5M QPS × 9ms = 45,000 GPUs or ~28,900 MI300X (higher throughput from larger HBM). Training
    at scale: 512 H100 × $3.50/hr = $1,792/hr for training jobs. Total year-3 infra: ~$20M/year for the
    recommendation stack.'
