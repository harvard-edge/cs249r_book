title: PagedAttention vs GQA for KV Bottlenecks
scenario: You are deploying a 70B parameter Multi-Head Attention (MHA) LLM (80 layers, 8192 hidden size)
  on an 8x A100 80GB node. FP16 weights consume ~140GB, leaving ~500GB for the KV cache. The target context
  length is 4096 tokens. You must evaluate whether to prioritize implementing PagedAttention to eliminate
  30% memory fragmentation, or retraining/swapping to a Grouped-Query Attention (GQA) model with an 8x
  reduction in KV heads to maximize peak decoding throughput.
question: "Should you prioritize PagedAttention or an 8x-KV-head GQA model to maximize 4096-token decoding throughput, and why?"
details:
  realistic_solution: Prioritize migrating to a GQA architecture. While PagedAttention reclaims ~30% fragmented
    memory (raising max MHA batch size from 48 to 63), GQA fundamentally shrinks the KV cache footprint
    by 8x, unlocking batch sizes up to ~390 — a 6x improvement over PagedAttention alone. GQA delivers
    massively higher total serving throughput.
  common_mistake: Assuming that advanced memory management like PagedAttention solves the core decoding
    bottleneck, without realizing it only addresses fragmentation (a constant-factor improvement) rather
    than the massive memory bandwidth and capacity footprint of an MHA KV cache (a structural 8x improvement
    with GQA).
  napkin_math: MHA KV cache/token = 2(K,V) * 2 bytes * 8192 (hidden) * 80 (layers) = 2,621,440 bytes ≈
    2.5 MB. For 4096 context, 1 seq = 2.5 MB * 4096 = 10.24 GB. Max MHA batch size = 500GB / 10.24GB ≈
    48. PagedAttention +30% efficiency ≈ 63 batch size. GQA (8x reduction) KV cache/token ≈ 0.31 MB (1.28
    GB/seq). Max GQA batch size = 500GB / 1.28GB ≈ 390. GQA provides >6x maximum throughput scaling.
