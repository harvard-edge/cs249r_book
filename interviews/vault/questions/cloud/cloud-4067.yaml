title: RDMA Completion Queue Polling vs Interrupts
scenario: 'RDMA provides two mechanisms for detecting transfer completion: polling the Completion Queue (CQ) or waiting for an interrupt. NCCL uses dedicated progress threads that continuously poll the CQ. For a 64-GPU A100 cluster running AllReduce with 1000 iterations per second, calculate the polling overhead (CPU cycles consumed) and compare to interrupt-based completion notification.'
question: For 1000 AllReduce iterations per second on 64 A100s, what CPU-cycle overhead does CQ polling use versus interrupts?
details:
  realistic_solution: '3GHz = 3×10^9 cycles/sec = 3 billion cycles/sec. Polling: 65.5M polls/s (64 GPUs × 1024 chunks × 1000) × 300 cycles = 19.65B cycles/s = 6.55 cores. Interrupt: 65.5M × 6,000 cycles = 393B cycles/s = 131 cores.'
  common_mistake: Assuming polling wastes CPU resources. In ML training, the NCCL progress thread is pinned to a dedicated CPU core that would otherwise be idle during GPU computation. The active polling cost is only ~0.1 CPU core per GPU — acceptable when nodes have 64+ CPU cores but only 8 GPUs.
  napkin_math: 'Polling: 1 core per GPU is allocated. Each core at 3GHz does 3B cycles/sec. 10M polls/s × 300 cycles/poll = 3B cycles/s = 1 core. 65.5M total polls/s needed / 10M per core = 6.55 cores worth of active cycles for 64 GPUs. Interrupt: 65.5M × 6,000 cycles = 393B cycles/s = 131 cores at 3GHz. Interrupts would use 131 cores (bottlenecking the CPU), while polling uses 6.55 cores of actual work.'
