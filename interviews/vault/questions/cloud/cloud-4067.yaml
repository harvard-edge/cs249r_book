title: RDMA Completion Queue Polling vs Interrupts
scenario: 'RDMA provides two mechanisms for detecting transfer completion: polling
  the Completion Queue (CQ) or waiting for an interrupt. NCCL uses dedicated progress
  threads that continuously poll the CQ. For a 64-GPU A100 cluster running AllReduce
  with 1000 iterations per second, calculate the polling overhead (CPU cycles consumed)
  and compare to interrupt-based completion notification.'
question: For 1000 AllReduce iterations per second on 64 A100s, what CPU-cycle overhead
  does CQ polling use versus interrupts?
details:
  realistic_solution: '3GHz = 3×10^9 cycles/sec = 3 billion cycles/sec (not 30 billion).
    Polling: 65.5M polls/s × 300 cycles = 19.65B cycles/s = 6.55 cores. Interrupt:
    65.5M × 6,000 cycles = 393B cycles/s = 131 cores.'
  common_mistake: Assuming polling wastes CPU resources. In ML training, the NCCL
    progress thread is pinned to a dedicated CPU core that would otherwise be idle
    during GPU computation. The cost of polling is one CPU core per GPU — acceptable
    when nodes have 64+ CPU cores but only 8 GPUs.
  napkin_math: 'Polling: 8 CPU cores for 8 GPUs = 1 core per GPU. Each core at 3GHz
    does 3B cycles/sec (not 30B). 10M polls × 300 cycles each = 3B cycles = 1 full
    core = 100% of one core... wait: 10M polls/s × 300 cycles/poll = 3×10^9 cycles/s
    = 3B cycles/s = 1 core at 3GHz. So 10M polls/s saturates 1 core. 65.5M needed
    / 10M per core = 6.55 cores for 8 GPUs ≈ 7-8 cores. Interrupt: 65.5M × 6,000 cycles
    = 393B cycles/s = 131 cores at 3GHz. Polling is 131/7 ≈ 19× more CPU-efficient.'
