title: The H100 Ridge Point (cloud-0401)
scenario: To understand whether a model will be compute-bound or memory-bound, we need to calculate the machine's 'ridge point'.
question: What is the H100 FP16 ridge point in Operations per Byte, and how does it separate compute-bound from memory-bound workloads?
details:
  realistic_solution: 'The ridge point is calculated directly by dividing Peak Compute by Peak Memory Bandwidth. It explicitly separates Memory-Bandwidth-Bound workloads (below the ridge point) from Compute-Bound workloads (above the ridge point).'
  common_mistake: |
    **The Pitfall:** Inverting the ratio or making unit errors.
    **The Rationale:** Calculating Bytes/Op instead of Ops/Byte leads to a very small number (~0.0034), or getting confused by FP16's 2-byte size leads to multiplying/dividing by 2.
    **The Consequence:** This fundamentally misunderstands what the ridge point represents, leading to incorrect capacity planning and optimization strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 peak compute: 989 TFLOPS.
       - H100 peak memory bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Ridge point = Peak Compute / Peak Bandwidth.
       - 989 TFLOPS / 3.35 TB/s = 295.2 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 295.2 Ops/Byte. Workloads below this threshold are Memory-Bandwidth-Bound, while those above are Compute-Bound.**
  options:
  - Approximately 148 Ops/Byte, because FP16 data is 2 bytes (erroneous division by 2).
  - Approximately 590 Ops/Byte, because you must account for 2 bytes per FP16 operation (erroneous multiplication by 2).
  - Approximately 295 Ops/Byte.
  - Approximately 0.0034 Bytes/Op (inverting the ratio).
  correct_index: 2
