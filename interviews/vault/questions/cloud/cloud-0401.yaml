title: The H100 Ridge Point (cloud-0401)
scenario: An H100 GPU has a peak FP16 tensor core performance of 989 TFLOPS and a peak HBM3 memory bandwidth
  of 3.35 TB/s. To understand whether a model will be compute-bound or memory-bound, we need to calculate
  the machine's 'ridge point.' Explain what the ridge point represents and calculate its value for the
  H100 in FP16 Operations per Byte.
question: "What is the H100 FP16 ridge point in Operations per Byte, and how does it separate compute-bound from memory-bound workloads?"
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (AI), measured in operations
    per byte of data moved, a model needs to have to saturate the GPU's compute cores. If a model's AI
    is higher than the ridge point, it's compute-bound. If it's lower, it's memory-bound, meaning the
    GPU cores are starved for data and are waiting.
  common_mistake: The most common mistake is inverting the ratio, calculating Bytes/Op instead of Ops/Byte.
    This leads to a very small number (~0.0034) and fundamentally misunderstands what the ridge point
    represents. Another common error involves unit confusion with FP16's 2-byte size, leading to off-by-2x
    errors (e.g., getting ~148 or ~590) by incorrectly multiplying or dividing by 2.
  napkin_math: 1. **Identify peak compute:** 989 TFLOPS (Trillion Floating Point Operations per Second)
  options:
  - Approximately 148 Ops/Byte, because FP16 data is 2 bytes.
  - Approximately 590 Ops/Byte, because you must account for 2 bytes per FP16 operation.
  - Approximately 295 Ops/Byte.
  - Approximately 0.0034 Bytes/Op.
  correct_index: 2
