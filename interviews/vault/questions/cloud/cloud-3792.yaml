title: Attention Sink Tokens and KV Cache Eviction
scenario: You serve a streaming chatbot with a 128K context window but only 80 GB HBM (H100). The full KV cache at 128K tokens is 40 GB, leaving only 14 GB for weights and activations after the 26 GB model (13B).
question: What is the attention sink phenomenon, and what KV-cache eviction policy preserves quality for 128K-context streaming on an 80 GB H100?
details:
  realistic_solution: 'The attention sink phenomenon: in autoregressive models, the first 2-4 tokens in the sequence consistently receive very high attention weights from all subsequent tokens, even when those tokens are semantically irrelevant (e.g., a BOS token). This happens because softmax always assigns probability mass somewhere, and early tokens become ''attention sinks'' through training dynamics. Eviction policy (StreamingLLM approach): (1) Always retain the first K_sink = 4 tokens'' KV cache (the attention sinks). (2) Retain the most recent W tokens'' KV cache (sliding window of recent context). (3) Evict everything in between. Memory: (K_sink + W) × per-token KV size. With K_sink=4 and W=4096: 4100 × (128d × 80 layers × 2 × 2B) / 64 heads... actually simpler: 4100/128000 × 40 GB = ~1.3 GB. This fits easily. Quality: StreamingLLM shows this preserves >95% of full-context quality for most tasks, because recent context matters most and attention sinks maintain model stability.'
  common_mistake: |
    **The Pitfall:** Using simple FIFO eviction (dropping the oldest tokens).
    **The Rationale:** Engineers assume old tokens are least relevant, ignoring that early tokens act as 'attention sinks' crucial for model stability.
    **The Consequence:** Evicting sink tokens causes immediate quality collapse and high perplexity.
  napkin_math: |
    1. Full KV cache size: 128K tokens = 40 GB.
    2. Required cache tokens: Sink (4 tokens) + Window (4096 tokens) = 4100 tokens.
    3. Calculate retained cache size: (4100 / 128000) * 40 GB = ~1.28 GB.
    4. Calculate memory saved: 40 GB - 1.28 GB = 38.7 GB (97% reduction).
    **Final Result: Eviction policy reduces KV memory to 1.28 GB while preserving quality.**
