title: The Interactive Coding Assistant SLO Catastrophe
scenario: 'You are the Staff ML Systems Engineer designing the serving infrastructure for a new AI coding
  assistant. The service uses a 70B parameter model and has strict, product-driven SLOs: P99 Time-To-First-Token
  (TTFT) must be under 500ms, and sustained Time-Per-Output-Token (TPOT) must be under 50ms. Your initial
  deployment uses 8 server nodes, each with two H100 GPUs (16 GPUs total) using tensor parallelism (TP=2).
  The system uses static batching. Under light load, performance is acceptable. However, as you approach
  the target peak load of 200 concurrent users, the P99 TTFT skyrockets to over 10 seconds, and the service
  is unusable. You correctly identify Head-of-Line blocking as the culprit and propose migrating to a
  continuous batching engine. The Head of Infrastructure is skeptical about the migration cost and asks
  you to prove it''s necessary and sufficient.'
details:
  realistic_solution: 'The correct answer has two parts: proving static batching is inadequate and then
    calculating the true capacity under a continuous batching regime.'
  common_mistake: Engineers often focus only on the aggregate throughput of the system (e.g., total tokens/sec
    across all users), see high GPU utilization, and assume the system is efficient. They neglect the
    queueing delay experienced by new requests (the 'waiting in line' cost), which dominates the user-perceived
    latency (P99 TTFT) in a static batching system. They mistake high system throughput for low user latency.
  napkin_math: '### Part 1: Static Batching - Why TTFT Fails'
