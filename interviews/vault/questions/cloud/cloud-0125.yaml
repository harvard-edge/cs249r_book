title: The Chatbot Lag Spike
scenario: 'You are the Staff ML Systems Engineer for a popular AI chatbot service running a 70B parameter model. Users are complaining that the service ''feels laggy to start''. The system uses static batching with a batch size of 64 at 95% GPU utilization. You measure Time-To-First-Token (TTFT) and find P50 TTFT is 150ms, but P99 TTFT is 2.5 seconds.'
question: "What explains the huge gap between 150ms P50 TTFT and 2.5s P99 TTFT with static batching of 64 at 95% GPU utilization?"
details:
  realistic_solution: The primary cause is head-of-line blocking from the static batching strategy in an overloaded system. A new request that arrives just after a large batch has started must wait in a queue for the *entire* batch of 64 requests to complete their generation. This queue time is the dominant factor in the P99 TTFT. The huge difference between the P50 and P99 TTFT is the classic signature of a long-tail latency problem caused by queuing. The correct solution is to replace static batching with continuous batching (or a similar technique like PagedAttention), which allows new requests to be added to the batch as soon as *any* existing request finishes, drastically reducing queue times.
  common_mistake: |
    **The Pitfall:** Misdiagnosing TTFT spikes as a pure hardware or prefill computation bottleneck.
    **The Rationale:** High TTFT usually means the prefill stage is slow, so engineers look to kernel fusion or GPU upgrades.
    **The Consequence:** Wasting resources on hardware upgrades or kernel optimizations while the actual bottleneck—queue wait time caused by static batching—remains unaddressed.
  napkin_math: |
    1. **Static Batching Delay:** A new request arriving just after a batch starts must wait for the entire batch to finish generating before it begins processing.
    2. **Generation Time:** If an average generation is 100 tokens at 20ms/token, it takes 2.0 seconds.
    3. **P99 TTFT:** Queue Time + Prefill Time = 2000ms + 150ms = **2150ms (2.15s)**. P50 requests arrive randomly, often when the batch is nearly finished, experiencing much lower wait times.
  options:
  - The model's prefill computation is too slow. It needs to be optimized with kernel fusion.
  - The H100 GPUs are too slow and cannot handle the TPOT demand.
  - The system is experiencing severe head-of-line blocking due to its static batching policy, causing long queue delays for incoming requests.
  - The network connection to the server is the bottleneck, delaying the arrival of user prompts.
  correct_index: 2
