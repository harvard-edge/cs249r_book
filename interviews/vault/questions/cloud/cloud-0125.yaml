title: The Chatbot Lag Spike
scenario: 'You are the Staff ML Systems Engineer for a popular AI chatbot service running a 70B parameter
  model on H100 GPUs. Users are complaining that the service "feels laggy to start," though the token
  generation speed is fast once it begins. You observe the system uses a static batching strategy with
  a batch size of 64. GPU utilization is at 95%. You measure the Time-To-First-Token (TTFT) and find a
  massive disparity: P50 TTFT is 150ms, but P99 TTFT is 2.5 seconds.'
details:
  realistic_solution: The primary cause is head-of-line blocking from the static batching strategy in
    an overloaded system. A new request that arrives just after a large batch has started must wait in
    a queue for the *entire* batch of 64 requests to complete their generation. This queue time is the
    dominant factor in the P99 TTFT. The huge difference between the P50 and P99 TTFT is the classic signature
    of a long-tail latency problem caused by queuing. The correct solution is to replace static batching
    with continuous batching (or a similar technique like PagedAttention), which allows new requests to
    be added to the batch as soon as *any* existing request finishes, drastically reducing queue times.
  common_mistake: Engineers often misdiagnose this as a hardware limitation, suggesting a GPU upgrade.
    However, with 95% utilization, the GPU is already saturated. The problem isn't the speed of computation
    itself, but the waiting time *before* computation begins. Another mistake is focusing only on the
    prefill stage, ignoring the massive gap between P50 and P99 TTFT which clearly points to a systemic
    queuing problem.
  napkin_math: With static batching of 64 requests, a new request arriving just after a batch starts must
    wait for the entire batch to finish generating all its tokens before it can be processed. If an average
    generation is 100 tokens at 20ms/token = 2 seconds, the queue wait time dominates the P99 TTFT. P99
    TTFT ≈ Queue Time + Prefill Time = 2000ms + 150ms = 2150ms. P50 requests arrive when the batch is
    mostly empty or finishing, experiencing lower wait times.
  options:
  - The model's prefill computation is too slow. It needs to be optimized with kernel fusion.
  - The H100 GPUs are too slow and cannot handle the TPOT demand.
  - The system is experiencing severe head-of-line blocking due to its static batching policy, causing
    long queue delays for incoming requests.
  - The network connection to the server is the bottleneck, delaying the arrival of user prompts.
  correct_index: 2
