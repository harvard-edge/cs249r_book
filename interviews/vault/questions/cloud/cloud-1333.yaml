title: Diagnosing Data-Dependent Control Flow Failures in JIT Compilation
scenario: An ML serving team deploys a custom sequence-to-sequence model with data-dependent early exits. They initially compile the PyTorch model using tracing with a sample input sequence of length 32. However, production monitoring shows the model silently failing by executing exactly 32 decoding steps for all inputs, regardless of when the <EOS> token is actually generated.
question: Why did tracing make the seq2seq model always execute 32 decoding steps, and how does Graph Scripting fix it?
details:
  realistic_solution: 'Tracing only records the exact operations executed during the sample forward pass, permanently unrolling loops to a fixed length and discarding unvisited branches. Graph Scripting solves this by statically analyzing the Python Abstract Syntax Tree (AST) to emit an IR containing native control flow primitives (e.g., prim::Loop, prim::If), allowing the compiled graph to dynamically evaluate conditions at runtime.'
  common_mistake: |
    **The Pitfall:** Confusing dynamic tensor shapes with dynamic control flow.
    **The Rationale:** Candidates often assume tracing failed due to dimension mismatches rather than understanding how tracing handles Python control flow.
    **The Consequence:** They miss that tracing permanently unrolls loops to a fixed length and discards unvisited branches, flattening the execution graph.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence length N.
       - Operations per step: ops_per_step.
       - Model has data-dependent early exits (e.g. <EOS> token).
    2. **Calculations:**
       - Tracing complexity: Produces a flattened linear graph of size O(N * ops_per_step), optimized solely for the sample sequence length N.
       - Scripting complexity: Produces a cyclic graph of size O(ops_per_step) preserving dynamic O(N) execution.
    3. **Conclusion & Interpretation:** **Tracing statically unrolls loops, creating a correctness bug by forcing exactly N steps.**
