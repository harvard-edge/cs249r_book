title: The Automated Model Optimization Pipeline
scenario: Your platform team supports 200 ML teams deploying 1,000+ models per month. Each model currently requires manual optimization (quantization, graph compilation, kernel tuning) by a specialized ML systems engineer — a 2-week process per model.
question: "How would you design an automated model optimization pipeline that takes <1 hour and keeps quality regression under 3% on 95% of models?"
details:
  realistic_solution: 'An automated optimization pipeline has five stages: (1) Model profiling (2) Optimization strategy selection (3) Calibration-aware quantization (4) Graph compilation (5) Automated quality gate.'
  common_mistake: |
    **The Pitfall:** Proposing "Just run TensorRT on every model."
    **The Rationale:** Candidates assume compilation is a magic bullet, ignoring quantization calibration and validation.
    **The Consequence:** The automated pipeline degrades model accuracy unacceptably because it doesn't perform calibration-aware quantization or automated quality gating.
  napkin_math: |
    1. Manual process: 2 weeks × 40 hrs × $100/hr = $8,000/model. 1,000 models/month = $8M/month.
    2. Automated pipeline: 1 GPU-hour per model × $3.50 = $3.50/model. 1,000 models = $3,500/month.
    3. 95% pass automatically. 5% (50 models) require human intervention -> 50 × $8,000 = $400k.
    4. Total automated cost: ~$403k/month.
    5. **By optimizing 950 models instead of 50, average throughput doubles, reducing a $5M/month GPU fleet spend by $2.5M/month.**
