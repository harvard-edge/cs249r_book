title: The Automated Model Optimization Pipeline
scenario: Your platform team supports 200 ML teams deploying 1,000+ models per month. Each model currently
  requires manual optimization (quantization, graph compilation, kernel tuning) by a specialized ML systems
  engineer — a 2-week process per model. Design an automated model optimization pipeline that reduces
  this to <1 hour with <3% quality regression on 95% of models.
question: "How would you design an automated model optimization pipeline that takes <1 hour and keeps quality regression under 3% on 95% of models?"
details:
  realistic_solution: 'An automated optimization pipeline has five stages: (1) **Model profiling** — automatically
    characterize the model: architecture family (transformer, CNN, GNN), operator breakdown, memory footprint,
    arithmetic intensity. Takes ~5 minutes. (2) **Optimization strategy selection** — rule-based + learned
    policy. Transformers → quantize attention to FP8, MLP to INT8, keep embeddings in FP16. CNNs → INT8
    throughout. GNNs → keep FP16 (sparse ops don''t quantize well). (3) **Calibration-aware quantization**
    — run GPTQ/SmoothQuant with 512 calibration samples from the team''s validation set. Takes ~20 minutes
    on 1 GPU. (4) **Graph compilation** — TensorRT/TVM/XLA with autotuning. Operator fusion, memory planning,
    kernel selection. Takes ~15 minutes. (5) **Automated quality gate** — run the team''s evaluation suite,
    compare against FP16 baseline. If regression > 3%, fall back to a less aggressive quantization (e.g.,
    INT8 → FP16 for sensitive layers identified by per-layer sensitivity analysis).'
  common_mistake: '"Just run TensorRT on every model." TensorRT handles graph optimization and kernel
    selection, but doesn''t handle quantization calibration, accuracy validation, or the heterogeneous
    model zoo (not all models are ONNX-exportable or have static shapes).'
  napkin_math: 'Manual process: 2 weeks × 40 hrs × \$100/hr = \$8,000/model. 1,000 models/month = \$8M/month
    in engineering time (impossible — you''d need 500 ML systems engineers). Reality: only 50 models/month
    get optimized; the rest run unoptimized (2–5× over-provisioned). **Automated pipeline:** 1 GPU-hour
    per model × \$3.50 = \$3.50/model. 1,000 models × \$3.50 = \$3,500/month. Success rate: 95% of models
    pass the 3% quality gate automatically. 5% (50 models) require human intervention → 50 × \$8,000 =
    \$400k. **Total: \$403k/month vs \$8M theoretical (or vs massive over-provisioning).** The real savings:
    950 models now run optimized instead of 50. Average 2× throughput improvement → 50% GPU reduction
    across the fleet. At \$5M/month GPU spend: **\$2.5M/month savings** from automated optimization.'
