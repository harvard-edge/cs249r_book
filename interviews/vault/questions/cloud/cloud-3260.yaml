title: H100 Training Cost for Large Language Model
scenario: 'You are tasked with estimating the cost of training a 100B parameter LLM.'
question: "What GPU-hours, instance cost, electricity cost, and total cost do you estimate for the 100B-parameter training run?"
details:
  realistic_solution: 'Calculate the total FLOPs needed for the entire training run, then divide by the effective FLOPs/sec of a single GPU (peak TFLOPS * utilization). This yields the total GPU-seconds, which can be converted to GPU-hours. Multiply GPU-hours by the instance cost for compute cost, and calculate power consumption (kW * hours * cost/kWh) for electricity cost. Summing these gives the total estimated cost.'
  common_mistake: |
    **The Pitfall:** Calculating compute time against peak theoretical TFLOPS rather than effective TFLOPS.
    **The Rationale:** Simply pulling the headline TFLOPS number from hardware specs without discounting for real-world memory bandwidth limitations.
    **The Consequence:** Underestimating training time and budgets by ~40%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100B parameters, 300B FLOPs/param.
       - GPU: 989 TFLOPS peak, 60% utilization, 700W TDP.
       - Instance cost: $3.50/hour, Electricity: $0.15/kWh.
    2. **Calculations:**
       - Total FLOPs: 100B × 300B = 3e22 FLOPs.
       - Effective Compute: 989 TFLOPS × 0.6 = 593.4 TFLOPS (5.934e14 FLOPs/sec).
       - Time: 3e22 / 5.934e14 ≈ 50,556,117 seconds ≈ 14,043 GPU-hours.
       - Compute Cost: 14,043 × $3.50 ≈ $49,150.
       - Electricity Cost: 14,043 × 0.7kW × $0.15 ≈ $1,474.
       - Total Cost: $49,150 + $1,474 = $50,624.
    3. **Conclusion & Interpretation:**
       **Result: TCO Bound. The training requires ~14,043 GPU-hours and costs ~$50,624.**
