title: Rack-Level Correlated Failures
scenario: 'You are deploying a 64-node distributed training job that uses synchronous gang scheduling
  (if any single node fails, the entire job halts and must restart from a checkpoint). You have two deployment
  options: Option A packs the job tightly into 2 server racks (32 nodes per rack), while Option B spreads
  it widely across 8 racks (8 nodes per rack). Historically, the probability of an independent node failure
  over a 14-day period is 1%, and the probability of a correlated rack-level failure (e.g., a Top-of-Rack
  switch or PDU going down, failing all nodes in the rack) over the same period is 5%. Calculate the probability
  of the training job failing in both scenarios.'
details:
  realistic_solution: Calculate the probability of job survival, which requires zero rack failures AND
    zero independent node failures. Option A survival is 0.95^2 * 0.99^64 ≈ 47.5%, yielding a 52.5% failure
    probability. Option B survival is 0.95^8 * 0.99^64 ≈ 34.9%, yielding a 65.1% failure probability.
    Option A is the superior choice, as packing the job into fewer racks minimizes exposure to correlated
    failures.
  common_mistake: Assuming that spreading the workload across multiple racks improves reliability, as
    it typically does for stateless microservices. For rigid workloads like synchronous training, spreading
    increases the surface area exposed to independent rack-level correlated failures.
  napkin_math: 'P(no independent node failures) = 0.99^64 ≈ 0.526


    Option A (2 racks) Success: P(no rack fails) * P(no node fails) = 0.95^2 * 0.526 ≈ 0.9025 * 0.526
    ≈ 47.5%

    Option B (8 racks) Success: P(no rack fails) * P(no node fails) = 0.95^8 * 0.526 ≈ 0.6634 * 0.526
    ≈ 34.9%


    Failure probabilities:

    Option A: 100% - 47.5% = 52.5%

    Option B: 100% - 34.9% = 65.1%'
