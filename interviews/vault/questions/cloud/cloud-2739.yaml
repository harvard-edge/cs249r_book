title: Technical Debt Maintenance Cost
scenario: Your 10-engineer ML platform team spends 80% of time on maintenance at $200K/engineer/year. A 3-month refactoring project (3 engineers full-time) promises to reduce maintenance burden to 50%.
question: What is the refactoring break-even point and annual savings, and should the team prioritize it?
details:
  realistic_solution: 'Current state: 10 engineers × $200K × 80% = $1.6M/year on maintenance. Available for features: $400K/year equivalent. Refactoring cost: 3 engineers × $200K × (3/12) = $150K. Plus: during refactoring, 7 engineers handle all maintenance (increased burden). Post-refactoring: 10 engineers × $200K × 50% = $1.0M/year on maintenance. Available for features: $1.0M/year equivalent. Annual savings: $1.6M - $1.0M = $600K/year in freed engineering capacity. Break-even: $150K investment / $600K annual return = 3 months after completion. So 6 months from project start, the investment has paid for itself. This is a strong ROI — the refactoring should be prioritized.'
  common_mistake: |
    **The Pitfall:** Ignoring the opportunity cost of the refactoring period.
    **The Rationale:** Candidates calculate raw monetary savings but forget that executing the project temporarily pulls engineers away from active feature work.
    **The Consequence:** Presenting an incomplete ROI model that fails to account for the increased maintenance burden on the remaining 7 engineers during the 3-month refactor phase.
  napkin_math: |
    - **Current Maintenance:** 10 engineers * $200K * 80% = $1.6M/year.
    - **Post-Refactor Maintenance:** 10 engineers * $200K * 50% = $1.0M/year.
    - **Annual Savings:** $1.6M - $1.0M = $600K/year in freed capacity.
    - **Refactoring Cost:** 3 engineers * $200K * (3/12 months) = $150K.
    - **Break-Even Point:** $150K investment / $600K annual return = **3 months after completion**.
