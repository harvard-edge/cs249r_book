title: 'Feature Store: Mastery — Design Feature Store for Multi-Modal Real-Time LLM'
scenario: 'You are designing a feature store for a multi-modal LLM serving system on 256 H100s handling
  200K requests/second. Features include: user text embeddings (1536-dim float32 = 6KB), real-time session
  context (50 float32 = 200B), and image embeddings (2048-dim float16 = 4KB). P99 feature retrieval must
  be < 3ms. Design the complete feature store architecture.'
details:
  realistic_solution: 'Layered by staleness and size: text embeddings (updated daily, large, L2 cache)
    → session context (real-time, small, L1 per-server) → image embeddings (updated weekly, large, L2/L3).
    Different retrieval paths for different feature types.'
  common_mistake: Storing all feature types in one store without considering their different staleness
    requirements; not using different serialization formats for different feature sizes.
  napkin_math: '200K RPS. Per request: 6KB + 0.2KB + 4KB = 10.2KB. Total feature bandwidth: 200K × 10.2KB
    = 2.04 GB/s from feature store. Session context (200B, real-time): compute inline per server, zero
    retrieval cost. Text embeddings (6KB, 100M users × daily): 100M × 6KB = 600GB. Too large for Redis.
    Use L2 SSD-backed store (Aerospike): 600GB at SSD throughput. L1 in-process cache (hot 1M users):
    1M × 6KB = 6GB per H100 server. 200K RPS × 80% L1 hit = 160K/sec from L1 (0.01ms), 40K/sec from Aerospike
    SSD (1ms). P99: 1ms. Image embeddings (4KB, 50M items): 50M × 4KB = 200GB. L2 SSD. P99 retrieval:
    1ms SSD. Total P99: max(session 0ms, text 1ms, image 1ms) = 1ms << 3ms SLA.'
