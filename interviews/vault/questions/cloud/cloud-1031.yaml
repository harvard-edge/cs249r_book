title: Diagnosing Correlated GPU Node Failures in a Cluster
scenario: You operate a distributed LLM training cluster with 512 H100 GPUs spread across 64 nodes (8 GPUs/node). Over 72 hours, the job has failed four times due to exactly 16 nodes dropping simultaneously. Each rack is provisioned with a standard 100 kW PDU limit.
question: What root cause explains exactly 16 nodes dropping simultaneously in the 512-H100 training cluster?
details:
  realistic_solution: Map the logical PyTorch node IDs to their physical rack placement. The 16 nodes failing simultaneously share a single Power Distribution Unit (PDU). Capping the peak power limit prevents the breaker from tripping during synchronized GPU bursts.
  common_mistake: |
    **The Pitfall:** Assuming software bugs like PyTorch NCCL timeouts or distributed checkpointing errors are the root cause.
    **The Rationale:** Candidates often focus exclusively on the software stack, ignoring shared physical infrastructure dependencies.
    **The Consequence:** Wasting time debugging distributed frameworks instead of fixing the physical power delivery limits.
  napkin_math: |
    - **Power per node**: 8 GPUs * 700W + 1000W (CPU/RAM) = 6,600W (6.6 kW).
    - **Power for 16 nodes**: 16 * 6.6 kW = 105.6 kW per rack.
    - **Typical PDU limit**: ~100 kW.
    - **Conclusion**: **Synchronized network bursts cause the 105.6 kW load to trip the 100 kW breaker, dropping the entire rack of 16 nodes.**
