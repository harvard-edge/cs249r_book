title: Diagnosing Correlated GPU Node Failures in a Cluster
scenario: You are operating a distributed LLM training cluster with 512 H100 GPUs spread across 64 nodes
  (8 GPUs/node). Over the past 72 hours, the training job has failed four times due to a sudden drop of
  exactly 16 nodes simultaneously. Monitoring tools show no individual GPU thermal throttling or localized
  kernel panics before the crash. Analyze the root cause of these simultaneous multi-node failures.
question: "What root cause explains exactly 16 nodes dropping simultaneously in the 512-H100 training cluster?"
details:
  realistic_solution: Map the logical PyTorch node IDs to their physical rack placement. The 16 nodes
    failing simultaneously share a single Power Distribution Unit (PDU). By capping the peak power limit
    or upgrading the PDU, you prevent the breaker from tripping during synchronized GPU bursts.
  common_mistake: Assuming software bugs like PyTorch NCCL timeouts or distributed checkpointing errors
    are the root cause, ignoring the physical infrastructure layer where hardware dependencies are shared.
  napkin_math: 16 nodes * (8 * 700W for H100s + 1000W for CPU/RAM) = 16 * 6600W = 105.6kW per rack. A
    standard 100kW PDU will trip under simultaneous peak load during synchronized all-reduce network bursts,
    dropping exactly 16 nodes at once.
