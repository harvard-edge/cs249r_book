title: Calculating 1D Tensor Parallelism Overhead
scenario: You are configuring a Megatron-LM style 1D Tensor Parallelism setup for a 70B parameter model
  across 8x A100 GPUs (TP=8). The model has a hidden dimension of 8192 and an MLP intermediate dimension
  of 32768. For a micro-batch of 2 sequences of length 4096 in FP16, calculate the per-device weight memory
  footprint for a single MLP block and the size of the required All-Reduce activation payload.
question: "For TP=8, what are the per-GPU MLP weight footprint and the All-Reduce activation payload size for the micro-batch?"
details:
  realistic_solution: Use column-parallelism for the first MLP layer (W1) and row-parallelism for the
    second (W2). This eliminates communication between the two layers, requiring only a single All-Reduce
    of size [batch, seq_len, hidden_dim] at the end of the block. Each GPU stores 1/8th of the weights.
  common_mistake: Candidates often assume an All-Reduce is required after every matrix multiplication
    in the MLP, doubling the communication overhead, or fail to correctly partition the intermediate activations
    across devices.
  napkin_math: 'MLP Weights: W1 (8192x32768) + W2 (32768x8192) = 536.8M params. In FP16 (2 bytes/param)
    = 1.074 GB total. With TP=8, per-device memory = 1.074 GB / 8 = 134.2 MB. All-Reduce payload size
    = [b=2, s=4096, h=8192] = 67.1M elements * 2 bytes = 134.2 MB per block.'
