title: The FP8 Training Frontier
scenario: Your team successfully trained a 13B parameter LLM in FP8 with no accuracy loss. Encouraged, you try FP8 training on a 125M parameter BERT model. The loss diverges within 200 steps. Both use the same FP8 recipe with per-tensor scaling.
question: Why does FP8 work for the large model but fail for the small one?
details:
  realistic_solution: 'Large models have smooth gradient distributions, making per-tensor scaling effective. Small models have spiky, heavy-tailed gradient distributions where outlier values dominate. Per-tensor scaling crushes small gradients below FP8''s representable range. The mitigation is per-channel or per-group scaling, or leveraging BF16.'
  common_mistake: |
    **The Pitfall:** Believing that FP8 universally applies to all model sizes with the same recipe.
    **The Rationale:** Treating quantization as a purely hardware-level feature without considering statistical properties of activations and gradients.
    **The Consequence:** Applying the wrong quantization granularity, leading to catastrophic training divergence for smaller models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 13B model FFN: 104M elements. Smooth gradients (99.9th percentile ~3x median).
       - 125M BERT FFN: 2.3M elements. Outliers at 100x median.
    2. **Calculations:**
       - Large model: wastes log2(3) ~ 1.6 bits. Fits in 4 exponent bits.
       - Small model: wastes log2(100) ~ 6.6 bits. Exceeds FP8 E4M3 4-bit exponent range.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** Small models have spiky gradients requiring finer-grained scaling.
