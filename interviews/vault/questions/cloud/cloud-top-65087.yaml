title: 'DLRM Training on TPU v5e Pod: Embedding Table Placement'
scenario: A team is porting a DLRM training job to a TPU v5e pod (256 chips). The embedding tables total
  8TB — far exceeding HBM capacity. TPU v5e has 16GB HBM per chip, 256 chips = 4TB total HBM. Embedding
  tables don't fit. Design the memory hierarchy.
details:
  realistic_solution: 'Tiered memory placement for embedding tables: (1) Hot table partition (high-access
    frequency): top 20% of embedding rows receive 80% of lookups (Zipf). Size: 20% * 8TB = 1.6TB. Place
    in HBM: INT8 quantization (2x): 0.8TB. Fits in 4TB HBM alongside model. (2) Warm table partition:
    next 30% of rows. Place in TPU extended memory (if available) or CPU DRAM attached via PCIe. TPU v5e:
    32GB DRAM per host * 256 chips / (8 TPUs per host) = 32 * 32 hosts = 1TB CPU DRAM available. Use HBM-DRAM
    hybrid: pre-fetch warm rows to HBM before batch using access pattern prediction. (3) Cold partition
    (50% of rows, 20% of lookups): keep in distributed parameter server (CPU cluster). Async fetch during
    step N for step N+2 (prefetch pipeline). (4) JAX/XLA implementation: use jax.lax.all_gather with sharded
    embedding tables across all 256 chips. Each chip holds a 4TB/256 = 15.6GB shard of the hot partition.
    Cold lookups: async fetch from CPU parameter server, pipelined with GPU compute.'
  common_mistake: Attempting to fit all embedding tables in HBM by aggressive quantization (INT4). While
    quantization reduces size by 8x, INT4 embedding quality degrades significantly for recommendation
    models where precision matters for distinguishing similar items. And 8TB/8 = 1TB still exceeds 4TB
    HBM capacity.
  napkin_math: '8TB total embedding tables / 256 TPU chips = 31.25GB per chip needed. But HBM = 16GB.
    Gap: 15.25GB per chip. Solution: only store hot partition on HBM. Hot 20% of 8TB = 1.6TB INT16 (2B):
    1.6TB. Per chip: 6.25GB — fits in 16GB HBM with 9.75GB for model and KV. Cold lookups (50% of rows,
    20% of lookups): 20% * batch_size lookups go to CPU PS. CPU PS latency: 100us per lookup. With async
    prefetch pipeline of depth 2: cold lookup latency hidden behind TPU compute step (10-50ms). Effective
    overhead: <5% for cold lookups.'
