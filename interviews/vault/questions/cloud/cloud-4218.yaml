title: Compression Tradeoffs for ML Data Pipelines
scenario: 'Your 10 TB training dataset is stored as Parquet files on S3. You''re choosing between Snappy, Zstd, and uncompressed. S3 egress costs $0.09/GB, and your training cluster has 128 CPU cores available for decompression alongside 8 GPUs. The pipeline runs 5 epochs.'
question: 'Which option (Snappy, Zstd, or uncompressed) best balances cost and performance for 5 epochs over the 10 TB Parquet dataset?'
details:
  realistic_solution: 'Zstd level 3 provides a 3.5x compression ratio with 1.0 GB/s per core decompression speed. This yields 128 GB/s aggregate throughput (which safely feeds the GPUs) while saving $3,213 in S3 egress costs compared to uncompressed data.'
  common_mistake: |
    **The Pitfall:** Choosing maximum compression (e.g., Zstd level 19) to minimize storage and egress costs.
    **The Rationale:** Candidates often prioritize minimizing I/O and storage costs without considering the decompression overhead on the CPU.
    **The Consequence:** High compression levels make decompression CPU-bound, starving the GPUs of data and negating the I/O savings with increased idle GPU time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base Data: 10 TB, 5 epochs. Egress cost: $0.09/GB.
       - Hardware: 128 CPU cores.
       - Snappy: 2x ratio, 1.5 GB/s/core.
       - Zstd-3: 3.5x ratio, 1.0 GB/s/core.
       - Zstd-19: 4x ratio, 0.4 GB/s/core.
    2. **Calculations:**
       - Uncompressed Egress: 10 TB * 5 epochs * $0.09/GB = $4,500.
       - Snappy Egress: 5 TB * 5 epochs * $0.09/GB = $2,250. Throughput: 128 * 1.5 = 192 GB/s.
       - Zstd-3 Egress: 2.86 TB * 5 epochs * $0.09/GB = $1,287. Throughput: 128 * 1.0 = 128 GB/s.
       - Zstd-19 Throughput: 128 * 0.4 = 51 GB/s (potential GPU starvation).
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound. Zstd level 3 is the optimal tradeoff, saving $3,213 without CPU-bottlenecking the data pipeline.**
