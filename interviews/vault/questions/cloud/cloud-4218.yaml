title: Compression Tradeoffs for ML Data Pipelines
scenario: Your 10 TB training dataset is stored as Parquet files on S3. You're choosing between Snappy, Zstd, and uncompressed. S3 egress costs $0.09/GB, and your training cluster has 128 CPU cores available for decompression alongside 8 A100 GPUs. The pipeline runs 5 epochs.
question: Which option (Snappy, Zstd, or uncompressed) best balances cost and performance for 5 epochs over the 10 TB Parquet dataset?
details:
  realistic_solution: 'Snappy: ~2x compression ratio, decompression at 1.5 GB/s per core. 10 TB -> 5 TB stored. Egress: 5 TB * 5 epochs * $0.09 = $2,250. Decompression throughput: 128 cores * 1.5 GB/s = 192 GB/s (not a bottleneck). Zstd (level 3): ~3.5x ratio, decompression at 1.0 GB/s per core. 10 TB -> 2.86 TB. Egress: 2.86 TB * 5 * $0.09 = $1,287. Decompression: 128 * 1.0 = 128 GB/s (adequate). Uncompressed: 10 TB * 5 * $0.09 = $4,500. Best choice: Zstd level 3 - saves $3,213 vs uncompressed, decompression is not the bottleneck with 128 cores. Zstd level 19 would compress to 2.5 TB but decompresses at only 0.4 GB/s per core -> 51 GB/s aggregate, potentially bottlenecking the pipeline.'
  common_mistake: |
    **The Pitfall:** Choosing maximum compression (e.g., Zstd level 19) to minimize storage and egress costs.
    **The Rationale:** Candidates often prioritize minimizing I/O and storage costs without considering the decompression overhead on the CPU.
    **The Consequence:** High compression levels make decompression CPU-bound, starving the GPUs of data and negating the I/O savings with increased idle GPU time.
  napkin_math: |
    - **Calculate Uncompressed Egress:** 10 TB * 5 epochs * $0.09/GB = $4,500.
    - **Calculate Snappy Egress (2x ratio):** 5 TB * 5 epochs * $0.09/GB = $2,250.
    - **Calculate Zstd-3 Egress (3.5x ratio):** 2.86 TB * 5 epochs * $0.09/GB = $1,287.
    - **Verify Decompression Throughput (Snappy):** 128 cores * 1.5 GB/s = 192 GB/s.
    - **Verify Decompression Throughput (Zstd-3):** 128 cores * 1.0 GB/s = 128 GB/s.
    - **Verify Decompression Throughput (Zstd-19):** 128 cores * 0.4 GB/s = 51 GB/s (potential bottleneck).
    - **Conclusion:** Zstd level 3 is the best choice, saving **$3,213** over uncompressed without bottlenecking the GPUs.
