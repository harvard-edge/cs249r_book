title: Cloud LLM Thermal Design with AMD MI300X
scenario: A major cloud provider is designing a new high-performance computing instance
  type optimized for large language model (LLM) workloads, utilizing the AMD MI300X
  accelerator. Each MI300X offers 192 GB of HBM3 and a theoretical peak of 1,307 TFLOPS
  FP16 sparse. The design requires maximizing sustained performance for continuous
  training jobs while accounting for typical data center ambient temperatures (e.g.,
  20-25°C) and transient burst inference peaks. Propose a comprehensive thermal management
  strategy for a server node containing two MI300X accelerators and discuss how you
  would predict and mitigate thermal throttling to maintain SLA-compliant performance.
question: How would you design cooling and throttling mitigation for a two-MI300X
  server node to maximize sustained training performance and meet SLAs?
details:
  realistic_solution: Implement a hybrid cooling solution, likely involving direct-to-chip
    liquid cooling for the AMD MI300X accelerators (with a TDP of up to 750W per card)
    due to their high power density, combined with traditional air cooling for other
    server components. Design a robust monitoring system to track real-time GPU junction
    temperatures, HBM3 temperatures, and power consumption. Use this data to implement
    dynamic power capping mechanisms and intelligent workload scheduling that can
    shift tasks or reduce frequency to prevent throttling, thus ensuring sustained
    performance within thermal envelopes. The MI300X delivers 1,307 TFLOPS FP16 sparse
    at peak; thermal management ensures this peak is achievable. Optimize rack and
    data center layout for efficient heat extraction and minimize hot spots.
  common_mistake: Underestimating the thermal design power (TDP) under sustained high-utilization
    workloads, leading to premature thermal throttling and significant performance
    degradation. A common oversight is failing to account for the cumulative heat
    load in densely packed racks and the variability of ambient temperatures, which
    can severely impact the effectiveness of air-cooling solutions alone.
  napkin_math: Assuming an AMD MI300X has a TDP of 750W. A server node with two MI300X
    accelerators will generate 1500W of heat just from the GPUs. If the cooling system
    is designed for a peak dissipation of 1200W, these GPUs will be forced to throttle
    down by at least (1500W - 1200W) / 1500W = 20% of their thermal budget to stay
    within limits. This directly translates to a 20% reduction in potential sustained
    TFLOPS. Considering a Power Usage Effectiveness (PUE) of 1.5 for the data center,
    the total electrical power consumed for a single 750W MI300X, including cooling
    overhead, would be 750W * 1.5 = 1125W. Over a year, this amounts to 1125W * 24h
    * 365d = 9855 kWh. At an electricity cost of $0.10/kWh, the annual power cost
    for one MI300X and its cooling is approximately $985.50.
