title: 'Attention with Linear Complexity: When FlashAttention Isn''t Enough'
scenario: FlashAttention reduces memory from O(N²) to O(N) but compute remains O(N²d) per layer. For contexts beyond 1M tokens, even FlashAttention's compute cost becomes prohibitive. Compare FlashAttention with linear attention alternatives (e.g., Mamba, RWKV, RetNet) on an MI300X.
question: "On an MI300X with a 50 ms serving budget, at what sequence length does FlashAttention become attention-compute-bound versus memory-bandwidth-bound?"
details:
  realistic_solution: 'MI300X crossover to attention-compute-bound at ~38.5K tokens. Below 38.5K: memory-bandwidth bound. Linear attention architectures are required for scaling to 1M+ contexts efficiently.'
  common_mistake: |
    **The Pitfall:** Claiming linear attention is universally better.
    **The Rationale:** Candidates see O(N) compute complexity and assume it's a strict upgrade over O(N^2) FlashAttention.
    **The Consequence:** Deploying linear attention causes quality degradation for tasks requiring precise long-range token-to-token retrieval.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X specs: 1,307 TFLOPS compute, 5.3 TB/s memory bandwidth.
       - Prefill Attention FLOPs: 2048 × seq_len².
       - Prefill KV Memory: 320 KB × seq_len.
    2. **Calculations:**
       - Hardware Ridge Point (FLOPs/byte) = 1,307 TFLOPS / 5.3 TB/s = 246.6 FLOPs/byte.
       - Arithmetic Intensity = (2048 × seq_len²) / (320,000 × seq_len) = 0.0064 × seq_len FLOPs/byte.
       - Crossover point: 0.0064 × seq_len = 246.6 FLOPs/byte -> seq_len ≈ 38,531 tokens.
    3. **Conclusion & Interpretation:** **At ~38.5K tokens, the arithmetic intensity surpasses the hardware ridge point. Result: Compute-Bound.**
