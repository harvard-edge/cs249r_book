title: 'Attention with Linear Complexity: When FlashAttention Isn''t Enough'
scenario: FlashAttention reduces memory from O(N²) to O(N) but compute remains O(N²d)
  per layer. For contexts beyond 1M tokens, even FlashAttention's compute cost becomes
  prohibitive. Compare FlashAttention with linear attention alternatives (e.g., Mamba,
  RWKV, RetNet) on an MI300X. At what sequence length does FlashAttention become the
  bottleneck?
question: On an MI300X with a 50 ms serving budget, at what sequence length does FlashAttention
  become attention-compute-bound versus memory-bandwidth-bound?
details:
  realistic_solution: 'MI300X crossover to attention-compute-bound at ~88K tokens
    for 50ms budget. Below 88K: memory-bandwidth bound.'
  common_mistake: Claiming linear attention is universally better. Linear attention
    trades the attention matrix for a fixed-size state (d×d or similar), which loses
    the ability to do exact token-to-token lookups. Quality degrades for tasks requiring
    precise long-range retrieval.
  napkin_math: 'Crossover point between attention-bound and memory-bound serving on
    MI300X (192GB HBM3, 5.3 TB/s): KV cache per token = 320KB (80 layers, GQA-8, BF16).
    Attention FLOPs per token = 2 × heads × seq_len × head_dim = 2 × 8 × seq × 128
    = 2048 × seq FLOPs. Memory for seq tokens of KV = 320KB × seq. Roofline: compute_bound
    when 2048×seq / (320KB×seq) = 2048/320K > ridge_point. Ridge point = 1307T/5300T...
    for 50ms: available FLOPs = 1307T × 0.05 = 65.35T; available BW = 5300G × 0.05
    = 265GB. Crossover ≈ 65.35T / 2048 = 31.9M seq-head-ops → seq ≈ 31.9M/8 heads
    = ~88K tokens for 50ms budget.'
