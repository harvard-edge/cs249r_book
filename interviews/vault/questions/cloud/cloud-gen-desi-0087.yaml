title: Multi-Tier LLM Fallback and Load Shedding
scenario: Architect a tiered graceful degradation system for a real-time text summarization API. The primary
  service uses a 175B parameter model hosted on 8x H100 (80GB) nodes, while a fixed secondary pool of
  single A100 (80GB) instances hosts a 7B parameter fallback model. Your API serves both premium and free-tier
  users. During a breaking news event, traffic spikes from a nominal 1,000 QPS to 10,000 QPS. Design the
  request routing, degradation ladders, and load shedding mechanisms to prioritize premium requests, utilize
  the fallback models effectively, and maintain system stability without manual intervention.
question: "How would you design request routing, degradation, and load shedding to survive a 10,000 QPS spike while prioritizing premium users?"
details:
  realistic_solution: Implement a dynamic, queue-depth or latency-based circuit breaker at the API gateway
    or load balancer. Premium traffic is prioritized and pinned to the H100 cluster. Free-tier traffic
    is aggressively rerouted to the A100 fallback cluster the moment H100 request queues start building.
    To protect the A100 cluster from being overwhelmed by the massive 10x spike, implement a token-bucket
    rate limiter that explicitly sheds (returns HTTP 429) the lowest-priority free-tier requests once
    the A100 queue capacity is saturated.
  common_mistake: Candidates often suggest static thresholds for fallback (e.g., CPU utilization) which
    lag behind rapidly arriving traffic spikes, leading to cascading failures. They also frequently forget
    to implement active load shedding for the fallback cluster itself, mistakenly assuming the smaller
    model can implicitly handle the entire overflow.
  napkin_math: 'Assume primary capacity: 10 H100 nodes * 100 QPS = 1,000 QPS. Spike load = 10,000 QPS
    (assume 1,000 premium, 9,000 free). Assume fallback capacity: 10 A100 nodes * 500 QPS = 5,000 QPS.
    The gateway routes 1,000 premium QPS to the H100 cluster and overflows 9,000 free QPS. The A100 cluster
    absorbs 5,000 free QPS. The system must explicitly load shed the remaining 4,000 QPS (10,000 total
    - 1,000 primary - 5,000 fallback = 4,000 dropped) via HTTP 429s to maintain fail-operational status.'
