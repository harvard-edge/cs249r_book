validation_issues:
- The 'Napkin Math' uses a 70B model for prefill calculation (70ms) while the scenario describes a 13B
  model.
- The calculation for memory-bound decode for a 70B model in the 'Napkin Math' is incorrect (it lists
  70 TFLOPs but then calculates time as 70/989=70ms, which is correct for compute-bound, but for 70B it
  would be 140GB and the calculation for 70ms is only 70 GFLOPs, not TFLOPs).
