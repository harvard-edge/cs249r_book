title: 'The Chatbot Latency Crisis: Model Serving Infrastructure'
scenario: You are the ML systems engineer for a real-time chatbot service running on an H100 GPU. The
  service has a strict P99 Time-To-First-Token (TTFT) SLO of 150ms. The current system uses static batching
  with a fixed 100ms timeout to group incoming requests. The model's prefill (the forward pass to generate
  the first token) takes 40ms. Monitoring shows that average GPU utilization is only 40%, yet the P99
  TTFT is hovering at 240ms, clearly violating the SLO. Your task is to diagnose the bottleneck and apply
  the most effective solution.
details:
  realistic_solution: 'The root cause is the static batching timeout. This strategy forces requests to
    wait up to 100ms for a batch to form, even if the GPU is idle. This fixed wait time creates a high
    latency floor that makes achieving a 150ms P99 SLO impossible. The low GPU utilization is a symptom
    of this problem: the GPU is often idle, waiting for the next batch to ''bake'' for 100ms.'
  common_mistake: Engineers often fixate on GPU utilization or raw throughput (tokens/sec), assuming higher
    is always better. They may incorrectly attribute the high latency to the GPU being 'too slow' or an
    external factor like the network, because they see low average utilization. They fail to recognize
    that the batching strategy itself is adding a large, fixed latency penalty that is fundamentally incompatible
    with a low-latency, real-time service.
  napkin_math: 'Decompose total latency: TTFT = T_queue + T_batch + T_compute. With a fixed 100ms timeout,
    an early request waits T_batch = 100ms. Let''s estimate prefill for a 500-token prompt on a 70B model:
    2 * 70B * 500 = 70 TFLOPs. On H100 (989 TFLOPS), compute time is 70 / 989 = 70ms. Total minimum latency
    is 100ms + 70ms = 170ms. This strictly violates the 150ms SLO instantly.'
  options:
  - Increase the static batching timeout to 200ms. This will capture more requests per batch, increasing
    GPU utilization and overall throughput.
  - The H100 is not powerful enough. Upgrade to a B200 to reduce the 40ms inference time.
  - The problem is likely CPU preprocessing or network latency. The 40% GPU utilization proves the inference
    server itself is not the bottleneck.
  - Replace the static batching scheduler with a continuous batching implementation. This eliminates the
    fixed batching timeout, directly reducing the primary contributor to P99 latency.
  correct_index: 3
