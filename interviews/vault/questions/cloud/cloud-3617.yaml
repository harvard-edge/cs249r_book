title: Gradient Compression Accuracy-Bandwidth Trade-off on H100 Training
scenario: 'Training a 70B parameter model on 512 H100s. Gradient synchronization takes
  45s per step (bottleneck). You consider gradient compression: top-k sparsification
  (keep 0.1% of gradients), PowerSGD (rank-16 compression), or 1-bit SGD. Each reduces
  communication 1000×, 250×, or 32× respectively but affects convergence. Design the
  compression strategy.'
question: Which gradient compression strategy would you use to reduce the 45 s synchronization
  bottleneck, and why?
details:
  realistic_solution: 'Communication time scales linearly with gradient size. Current
    45s at full precision. With compression: top-k 1000×: 45/1000=0.045s (negligible).
    PowerSGD rank-16: 45/250=0.18s. 1-bit SGD: 45/32=1.4s. Convergence risk: top-k
    sparsification requires error feedback (residual accumulation), adds memory overhead
    of 1 gradient buffer (280GB at FP32 for 70B). PowerSGD is well-validated for transformers.
    1-bit SGD struggles with adaptive optimizers (Adam). Recommendation: PowerSGD
    rank-16 with error feedback. Reduces 45s to 0.18s, well-studied convergence guarantees,
    modest memory overhead (rank-16 factors).'
  common_mistake: Choosing the highest compression ratio (top-k 1000×) without accounting
    for gradient staleness error accumulation and the need for error feedback buffers.
  napkin_math: '70B params × 4B = 280GB gradients. Current sync: 45s. PowerSGD rank-16: 45/250=0.18s. Memory for low-rank factors: For an N×M matrix, rank-r factors take r×(N+M) elements. For d_model=8192 and r=16, this reduces the size by a factor of roughly 256× (from N² to 2rN). 280GB / 250 ≈ 1.12GB for the low-rank gradients. Error feedback buffer (dense): 280GB. Net communication reduction: 45s→0.18s saves 44.8s/step. If step=50s total, communication was 45s (90% overhead) and compute was 5s. New step = 5s + 0.18s = 5.18s, achieving ~9.6× speedup.'
