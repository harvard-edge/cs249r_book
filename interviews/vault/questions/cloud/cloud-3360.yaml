title: Scaling a 1 Trillion Parameter Mixture of Experts Model on NVIDIA A100s
scenario: Your team is tasked with deploying a 1 trillion parameter Mixture of Experts (MoE) Language Model, where each expert has 10 billion parameters. The model needs to handle a peak inference load of 10,000 queries per second (QPS) with an average token generation latency of 50ms. Each input sequence is 1024 tokens, and output sequence is 512 tokens. Assume a router selects 2 experts per token.
question: How would you design and size a cost-minimal MoE inference system for 10,000 QPS at 50 ms token latency?
details:
  realistic_solution: "Implement a hybrid parallelism approach combining data parallelism for the shared components and expert parallelism for the MoE layers. Develop a smart router with dynamic load balancing, potentially using a hash-based routing coupled with a backup mechanism for overloaded experts. Utilize mixed-precision inference (FP16) and optimize kernel fusion and memory access patterns to maximize memory bandwidth utilization on the A100s, especially for memory-bound operations. Explore techniques like quantization and sparse attention to further reduce memory footprint and computation."
  common_mistake: |
    **The Pitfall:** Underestimating dynamic expert load balancing and neglecting tail latency due to cold experts or network overhead.
    **The Rationale:** Assuming uniform expert activation and ignoring communication costs for routing tokens across GPUs.
    **The Consequence:** Severe performance degradation and massive tail latency spikes during skewed traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 1 Trillion FP16 (2 bytes/param).
    - Workload: 10,000 QPS, 512 tokens generated per query.
    - Compute footprint: ~120 GFLOPs/token. Target latency: 50ms/token.
    - GPU Assumption: A generic high-end GPU with 80GB memory and 312 TFLOPS compute.

    **Calculations:**
    - Parameter Storage: 1 Trillion \times 2 bytes = 2 TB.
    - Storage GPUs needed: 2000 GB / 80 GB = 25 GPUs minimum for weights.
    - Total Tokens/sec: 10,000 queries/sec \times 512 tokens = 5,120,000 tokens/sec.
    - FLOPs Required: 5,120,000 \times 120 GFLOPs = 614.4 PFLOPS.
    - Compute GPUs needed: 614.4 PFLOPS / 312 TFLOPS per GPU \approx 1969 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 1969 GPUs required for compute (Compute-Bound)**. Compute is the true bottleneck, far exceeding the 25 needed for storage.
