title: Scaling a 1 Trillion Parameter Mixture of Experts Model on NVIDIA A100s
scenario: Your team is tasked with deploying a large Mixture of Experts (MoE) Language
  Model with 1 trillion parameters, where each expert has 10 billion parameters. The
  model needs to handle a peak inference load of 10,000 queries per second (QPS) with
  an average token generation latency of 50ms. You are provisioned with NVIDIA A100
  GPUs (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth, 400W TDP). Each input
  sequence is 1024 tokens, and output sequence is 512 tokens. Assume a router selects
  2 experts per token. Design a system architecture that minimizes cost while meeting
  the latency and throughput requirements. Consider MoE routing, expert parallelism,
  capacity factors, and load balancing strategies. Quantify the number of A100 GPUs
  required and analyze the potential bottlenecks, including memory-FLOPs decoupling.
question: How would you design and size a cost-minimal A100 MoE inference system for
  10,000 QPS at 50 ms token latency?
details:
  realistic_solution: Implement a hybrid parallelism approach combining data parallelism
    for the shared components and expert parallelism for the MoE layers. Develop a
    smart router with dynamic load balancing, potentially using a hash-based routing
    coupled with a backup mechanism for overloaded experts. Utilize mixed-precision
    inference (FP16) and optimize kernel fusion and memory access patterns to maximize
    memory bandwidth utilization on the A100s, especially for memory-bound operations.
    Explore techniques like quantization and sparse attention to further reduce memory
    footprint and computation.
  common_mistake: Underestimating the impact of dynamic expert load balancing and
    not accounting for tail latency due to cold experts or network overhead during
    routing. A common mistake is to assume uniform expert activation or to neglect
    the communication costs associated with fetching activations/weights from different
    GPUs for different experts, leading to significant performance degradation.
  napkin_math: '1. **Parameter Storage**: 1 trillion parameters @ FP16 (2 bytes/param)
    = 2 TB. Number of A100s (80 GB HBM2e each) for storage = 2000 GB / 80 GB/A100
    = 25 A100 GPUs.

    2. **FLOPs Throughput**: Each query generates 512 tokens. Total tokens/sec = 10,000
    QPS * 512 tokens/query = 5.12 * 10^6 tokens/sec. For a rough estimate, assume
    2 active experts, each 10B parameters, and ~120 GFLOPs/token. Total FLOPs required
    = 5.12 * 10^6 tokens/sec * 120 * 10^9 FLOPs/token = 6.144 * 10^17 FLOPs/sec =
    614.4 PFLOPS. Number of A100s (312 TFLOPS FP16 peak = 0.312 PFLOPS) for computation
    = 614.4 PFLOPS / 0.312 PFLOPS/A100 ≈ 1969 A100 GPUs. This highlights that computation
    will likely be the primary bottleneck, requiring significantly more GPUs than
    just parameter storage, assuming full utilization.'
