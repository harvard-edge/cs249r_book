title: Scaling a 1 Trillion Parameter Mixture of Experts Model on NVIDIA A100s
scenario: Your team is tasked with deploying a 1 trillion parameter Mixture of Experts (MoE) Language Model, where each expert has 10 billion parameters. The model needs to handle a peak inference load of 10,000 queries per second (QPS) with an average token generation latency of 50ms. You are provisioned with NVIDIA A100 GPUs. Each input sequence is 1024 tokens, and output sequence is 512 tokens. Assume a router selects 2 experts per token.
question: How would you design and size a cost-minimal A100 MoE inference system for 10,000 QPS at 50 ms token latency?
details:
  realistic_solution: "Implement a hybrid parallelism approach combining data parallelism for the shared components and expert parallelism for the MoE layers. Develop a smart router with dynamic load balancing, potentially using a hash-based routing coupled with a backup mechanism for overloaded experts. Utilize mixed-precision inference (FP16) and optimize kernel fusion and memory access patterns to maximize memory bandwidth utilization on the A100s, especially for memory-bound operations. Explore techniques like quantization and sparse attention to further reduce memory footprint and computation."
  common_mistake: |
    **The Pitfall:** Underestimating dynamic expert load balancing and neglecting tail latency due to cold experts or network overhead.
    **The Rationale:** Assuming uniform expert activation and ignoring communication costs for routing tokens across GPUs.
    **The Consequence:** Severe performance degradation and massive tail latency spikes during skewed traffic.
  napkin_math: |
    *   **Parameter Storage:** 1 Trillion parameters at FP16 (2 bytes/param) = 2 TB.
    *   **Storage GPUs:** 2000 GB / 80 GB per A100 = 25 A100 GPUs minimum just to hold the weights.
    *   **Total Tokens/sec:** 10,000 QPS × 512 tokens/query = 5,120,000 tokens/sec.
    *   **FLOPs Required:** Assume ~120 GFLOPs/token. Total = $5.12 \times 10^6 \times 120 \times 10^9$ = 614.4 PFLOPS.
    *   **Compute GPUs:** 614.4 PFLOPS / 0.312 PFLOPS per A100 $\approx$ **1969 A100 GPUs**.
    *   **Conclusion:** Computation is the primary bottleneck, requiring vastly more GPUs than parameter storage alone.
