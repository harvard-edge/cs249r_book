title: DPO vs PPO Infrastructure Cost for Alignment at 70B Scale
scenario: 'A team must choose between DPO and PPO for aligning a 70B model. Budget: 32xH100 for 1 week.
  Preference dataset: 200K pairs. Compare compute cost, stability, and expected alignment quality.'
question: "With 32 H100s for 1 week and 200K preference pairs, should you choose DPO or PPO to align the 70B model, and why?"
details:
  realistic_solution: 'DPO memory: policy (140GB BF16) + reference model (140GB BF16) + optimizer (280GB
    for AdamW) = 560GB minimum. Requires ~14xH100. PPO memory: policy (140GB) + value head (~1GB) + reward
    model (14GB for 7B RM) + reference (frozen copy at FP8, ~70GB): ~225GB total, about 3xH100 for models.
    PPO is more GPU-efficient per GPU but requires more infrastructure complexity (rollout server, RM
    server, PPO trainer). At 32xH100 budget: DPO uses 14 GPUs leaving 18 for larger batch sizes. PPO uses
    8 GPUs for models + rollout infrastructure, enabling larger effective batch. DPO training on 200K
    pairs at 32xH100: ~2-3 days. PPO: ~5-7 days due to rollout generation overhead. Recommendation: DPO
    for budget-constrained simpler implementation; PPO for iterative online alignment with real user feedback.'
  common_mistake: Assuming DPO is always cheaper than PPO. DPO requires the reference model to be loaded
    simultaneously with the policy for computing log-probability ratios. For 70B models, this means 2x
    model memory, often requiring more GPUs than PPO with a shared reference policy.
  napkin_math: 'DPO training time: 200K preference pairs, batch=32, 70B model. Both policy and reference
    forward: 2 * 200K * 512 * 2 * 70B FLOP = 1.79 EFLOP. 32xH100 at 989 TFLOPS at 40% MFU: 12.7 PFLOPS.
    Time: 1.79E18 / 12.7E15 = 141 seconds per step. Hmm, recalculate: 200K samples total. Per-sample FLOP
    = 2 * seq * params * 2 = 2 * 512 * 70e9 * 2 = 143T FLOP (both ref+policy). 200K * 143T = 28.6 EFLOP.
    At 12.7 PFLOPS: 28.6E18 / 12.7E15 = 2252 seconds = 37.5 min per epoch. 3 epochs: 1.9 hours — very
    fast on 32xH100.'
