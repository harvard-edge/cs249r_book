title: Disaggregated Load Balancing for LLMs
scenario: 'You are architecting the load balancing layer for a generative AI inference fleet of 128 A100
  GPUs serving Llama-3-70B. Your traffic mix is highly bi-modal: 60% are short chat interactions (128
  tokens in, 64 out) and 40% are long RAG queries (4096 tokens in, 256 out). Using standard Least-Connections
  load balancing across homogeneous workers running continuous batching still yields poor P99 inter-token
  latency (>300ms) for chat queries, as they are delayed by the massive compute spikes of RAG prefill
  phases. Evaluate the trade-offs of migrating to a disaggregated architecture where the load balancer
  routes prefill and decode traffic to dedicated compute pools, versus simply overprovisioning the cluster
  size with traditional load balancing.'
details:
  realistic_solution: Implement a disaggregated serving architecture. The load balancer routes new requests
    to a prefill-only GPU pool optimized for compute efficiency. Once the KV cache is generated, it is
    transferred over the network to a decode-only GPU pool optimized for memory bandwidth, isolating decode
    iterations from prefill compute stalls.
  common_mistake: Candidates often assume that continuous batching (iteration-level scheduling) alone
    solves head-of-line blocking, failing to recognize that massive prompt prefill operations monopolize
    the GPU's compute capacity, stalling all active decoding generations on that node.
  napkin_math: A 4096-token prefill on a 70B model requires ~573 TFLOPs (2 * 70B * 4096). On an 8xA100
    node (2.5 PFLOPS FP16), this prefill takes ~230ms. During this 230ms, all concurrent decode tasks
    on the node are stalled. Disaggregating prefill prevents this massive 230ms jitter from impacting
    decode SLAs.
