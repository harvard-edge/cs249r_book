title: 'DiLoCo: Distributed Low-Communication Training'
scenario: 'Google''s DiLoCo protocol trains LLMs with extremely infrequent synchronization: each worker
  trains independently for H=500 inner steps, then workers synchronize by communicating pseudo-gradients
  (the difference between current and initial weights). For a 70B model across 256 MI300X GPUs with 400Gbps
  networking, evaluate DiLoCo vs synchronous AllReduce in terms of communication volume, wall-clock time,
  and convergence quality.'
details:
  realistic_solution: 'DiLoCo communication analysis: Sync every H=500 steps. Per sync: pseudo-gradient
    = w_current - w_initial = 70B params × 2 bytes FP16 = 140GB AllReduce. Time per sync: 2 × 255/256
    × 140GB / (50GB/s × 8 rails) = 700ms. Amortized per step: 700ms/500 = 1.4ms. Synchronous AllReduce
    (every step): gradient = 70B × 2 bytes = 140GB. Time per step: 2 × 255/256 × 140GB / 400GB/s = 700ms.
    Communication ratio: DiLoCo uses 500× less communication bandwidth. Wall-clock per step: AllReduce
    (with overlap): max(300ms compute, 700ms comm) = 700ms — communication-bound. DiLoCo: 300ms compute
    + 1.4ms amortized sync = 301.4ms — compute-bound. Speedup: 700/301.4 = 2.32× faster per step. Convergence:
    DiLoCo papers show 1.0-1.3× more total steps to reach the same loss compared to synchronous SGD for
    70B-class models. Effective speedup: 2.32/1.15 = 2.02× faster wall-clock to target loss. DiLoCo is
    transformative for clusters with slow interconnects (cloud spot instances, cross-datacenter training)
    where communication cost dominates.'
  common_mistake: Assuming DiLoCo is just 'sync every 500 steps' like gradient accumulation with K=500.
    DiLoCo uses an outer optimizer (typically SGD with Nesterov momentum) on the pseudo-gradients, which
    has different convergence properties than averaging parameters as in naive Local SGD.
  napkin_math: 'AllReduce every step: 700ms communication per step. DiLoCo (H=500): 700ms / 500 = 1.4ms
    amortized. Reduction: 500×. Total training time to 100K steps: AllReduce = 100K × 700ms = 19.4 hours.
    DiLoCo = 115K steps × 301.4ms = 9.6 hours. 2× speedup despite 15% more steps.'
