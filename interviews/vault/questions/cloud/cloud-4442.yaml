title: Fault Tolerance for In-Flight Requests During Decode Node Failure
scenario: A decode node fails mid-generation with 200 active requests, each at different
  token positions (50-1500 tokens generated). The KV cache for these requests is in
  the failed node's GPU memory. Design a recovery protocol to restore service without
  full request re-execution.
question: How would you recover the 200 active generations after a decode node failure
  without restarting them from scratch?
details:
  realistic_solution: 'Recovery hierarchy: (1) KV cache replication: if KV caches
    are replicated to a secondary decode node or a KV cache store (e.g., vLLM''s distributed
    KV store or DistServe''s KV migration), failover is instant. Cost: 2× KV cache
    memory across cluster. (2) Checkpoint-based recovery: periodically checkpoint
    KV caches to NVMe or DRAM (every 100 tokens). On failure: restore from last checkpoint,
    replay only since last checkpoint. At 100-token checkpoint granularity: worst
    case replay = 100 tokens per request. For 200 requests: 200 × 100 × decode_time
    = manageable. (3) Prefix cache reuse: for requests with unique KV caches (no prefix
    sharing), re-prefill is unavoidable. Minimize cost: batch re-prefill of all 200
    requests on available prefill nodes, using their already-generated tokens as context.
    (4) Client-side retry: include generated tokens so far in retry request header;
    model continues from exact position. Requires streaming token delivery to client
    so partial output is already sent.'
  common_mistake: Restarting all 200 requests from scratch (re-prefill). For requests
    that have already generated 1000+ tokens, re-prefill adds 5-10 seconds of latency
    and 1000 tokens of wasted compute. At 200 requests, this wastes significant GPU-hours
    and breaks user SLA.
  napkin_math: '200 requests, average position 500 tokens. KV cache per request at
    500 tokens (70B model): 2*80*64*128*500*2B = 1,310,720,000 bytes = 1.22 GiB (1.31
    GB) per request. Total KV for 200 requests: 200 * 1.31 GB = 262 GB. Replication
    to secondary node: requires 262 GB free in secondary, or selective replication
    of top-K by token count. Checkpoint to NVMe (7 GB/s): 262 GB / 7 = 37.4 seconds
    per checkpoint — too slow for real-time. DRAM checkpoint: 262 GB to 3.35TB/s HBM
    copy = 0.078s. Feasible. PCIe 32 GB/s: 262GB / 32 = 8.2 seconds per checkpoint.
    Too slow if done synchronously — use async checkpoint every 100 tokens.'
