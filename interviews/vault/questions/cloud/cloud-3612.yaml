title: Rack-Level Power Provisioning for TPU v5e Pod
scenario: You are provisioning a TPU v5e pod with 256 chips (16GB HBM each). Each
  TPU v5e draws approximately 200W. The pod uses a custom rack design with 64 chips
  per rack. Design the power distribution at the rack, row, and facility level, ensuring
  N+1 redundancy at each tier.
question: How would you provision rack, row, and facility power with N+1 redundancy
  for the 256-chip TPU v5e pod?
details:
  realistic_solution: 'Per rack: 64×200W=12.8kW nominal. Add 20% overhead (fans, networking):
    15.4kW. N+1 PDU: 2× 10kW PDUs per rack (20kW total, N+1 at 15.4kW). Per row (4
    racks): 4×15.4=61.6kW. N+1 row PDU: 70kW row distribution. Facility: 256/64=4
    racks total. Total IT=4×15.4=61.6kW. With PUE=1.2: facility draw=74kW. UPS: N+1
    at 80kW. Generator: 100kW with N+1.'
  common_mistake: Provisioning power based on nominal draw without including overprovisioning
    for startup surge current (typically 1.5-2× steady state) and N+1 redundancy.
  napkin_math: '256 TPUs × 200W = 51.2kW IT. +20% overhead = 61.4kW. PUE=1.2 → facility=73.7kW.
    Per-rack: 64×200+20%=15.4kW. 4 racks. N+1 PDU: 2×10kW/rack. Row breaker: 70kW.
    Total provisioned: 4×20kW=80kW PDU capacity, 73.7kW needed → 8.5% headroom.'
