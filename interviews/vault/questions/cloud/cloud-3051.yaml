title: 'Network Bandwidth Bottlenecks: Fluency — AllReduce Bandwidth in 60 Seconds'
scenario: You have 8 H100 GPUs with NVLink. You're doing data-parallel training with a 7B FP16 model (14GB gradients).
question: How long does the AllReduce take?
details:
  realistic_solution: Ring-AllReduce splits the 14GB gradient tensor into 8 chunks of 1.75GB. Each GPU sends/receives 7 chunks during reduce-scatter and 7 chunks during all-gather. Total data sent per GPU: 2 × 7 × 1.75GB = 24.5GB. NVLink per-direction BW: 900GB/s / 2 = 450GB/s. Time: 24.5GB / 450GB/s = 54.4ms. With NVSwitch (all-to-all): 2 × (N-1)/N × data / BW = 2 × 7/8 × 14 / 450 = 54.4ms.
  common_mistake: |
    **The Pitfall:** Dividing 14GB by 900GB/s directly.
    **The Rationale:** Forgetting the mechanics of ring-AllReduce and the unidirectional versus bidirectional bandwidth.
    **The Consequence:** Underestimating the communication time by a factor of ~3.5x.
  napkin_math: |
    - **Gradient Size:** 7B FP16 gradients = 14GB.
    - **Ring AllReduce Data:** Data moved per GPU = 2 × (N-1)/N × total_size = 2 × (7/8) × 14GB = 24.5GB.
    - **NVLink Bandwidth:** 900GB/s bidirectional = 450GB/s unidirectional per GPU.
    - **Transfer Time:** 24.5GB / 450GB/s = **54.4ms**.
