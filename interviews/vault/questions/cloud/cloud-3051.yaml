title: 'Network Bandwidth Bottlenecks: Fluency — AllReduce Bandwidth in 60 Seconds'
scenario: 'You have 8 GPUs with NVLink. You''re doing data-parallel training with a 7B FP16 model (14GB gradients).'
question: How long does the AllReduce take?
details:
  realistic_solution: 'Ring-AllReduce splits the 14GB gradient tensor into chunks. Each GPU sends/receives data during reduce-scatter and all-gather. With NVSwitch (all-to-all): 2 * (N-1)/N * data / BW = 2 * 7/8 * 14 / 450 = 54.4ms.'
  common_mistake: |
    **The Pitfall:** Dividing 14GB by 900GB/s directly.
    **The Rationale:** Forgetting the mechanics of ring-AllReduce and unidirectional versus bidirectional bandwidth.
    **The Consequence:** Underestimating the communication time by a factor of ~3.5x, leading to flawed throughput estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - 14GB gradients, 8 GPUs.
    - NVLink bidirectional = 900GB/s (450GB/s unidirectional).
    
    **Calculations:**
    - Data moved per GPU = 2 * (7/8) * 14GB = 24.5GB.
    - Transfer Time = 24.5GB / 450GB/s = 54.4ms.
    
    **Conclusion & Interpretation:**
    - **Result: 54.4ms (Network-Bound)**. 54.4ms AllReduce latency.
