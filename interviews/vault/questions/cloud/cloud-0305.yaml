title: The Blue-Green Pull Time
scenario: Your team is performing a blue-green deployment for a new 70-billion parameter RAG model. The model is packaged as a 150 GB container image. To bring the new 'green' stack online, you need to pull this image from the container registry to a fresh set of H100 servers across the rack.
question: Approximately how long does it take for a single server to download this container image over a modern datacenter network like InfiniBand NDR?
details:
  realistic_solution: A single server can pull the container in approximately 3 seconds. Datacenter networks are extremely fast. The 'NUMBERS.md' playbook states that InfiniBand NDR provides about 400 Gbps, which is 50 GB/s of bandwidth. The time to transfer is the total size divided by the bandwidth.
  common_mistake: |
    **The Pitfall:** Overestimating datacenter network pull times into the minutes.
    **The Rationale:** Engineers base their intuition on consumer internet speeds or legacy 10GbE networks.
    **The Consequence:** Over-engineering complex pre-fetching or local caching solutions when the network is fast enough to support direct pulling during blue-green deployments.
  napkin_math: |
    - **Model Container Size:** 150 GB.
    - **Network Bandwidth:** 400 Gbps (InfiniBand NDR) = 50 GB/s.
    - **Transfer Time:** 150 GB / 50 GB/s = **3 seconds**.
  options:
  - About 20 minutes
  - About 1 minute
  - About 12 seconds
  - About 3 seconds
  correct_index: 3
