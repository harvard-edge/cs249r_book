title: Evaluating Preemption Overheads in Elastic LLM Training
scenario: 'You are training a 70B parameter LLM on a spot fleet of 64 nodes (512x A100 80GB GPUs). The
  provider has a 5% hourly node preemption rate. You must choose between two elastic frameworks: Framework
  A (Global Restart) triggers a rollback to the last checkpoint upon node loss, taking 3 minutes to resume.
  Framework B (Dynamic Elasticity) resizes data parallel groups in 15 seconds using in-memory state but
  incurs an 8% persistent memory overhead. Evaluate which framework maximizes total goodput over a 14-day
  run, assuming a 15-minute checkpoint interval for Framework A.'
details:
  realistic_solution: Framework B is the correct choice. With a 5% hourly preemption rate on 64 nodes,
    3.2 node failures occur per hour. Framework A loses 33.6 minutes per hour to restarts and lost work
    (44% goodput). Framework B's in-memory redundancy limits downtime to 0.8 minutes per hour (98.6% goodput).
    Even with the 8% memory overhead reducing baseline throughput by ~10%, Framework B achieves 88.7%
    effective goodput versus Framework A's 44% — a 2x advantage.
  common_mistake: Candidates often fixate on the 8% memory overhead of Framework B, assuming it requires
    reducing the batch size and harms throughput, without calculating the devastating impact of 3.2 preemptions
    per hour on Framework A's effective training progress.
  napkin_math: 'Failures/hr = 64 nodes * 0.05 = 3.2. Framework A downtime: 3.2 * (3m restart + 7.5m avg
    lost work) = 33.6 mins/hr (only 44% goodput). Framework B downtime: 3.2 * 0.25m = 0.8 mins/hr (98.6%
    goodput). Even if the 8% memory overhead reduces baseline TFLOPS by 10%, Framework B yields 0.9 *
    0.986 = 88.7% effective goodput vs Framework A''s 44%.'
