title: Ring vs Tree AllReduce Latency Tradeoff
scenario: 'NCCL supports both ring and tree AllReduce algorithms. Ring achieves optimal bandwidth but has O(N) latency (N-1 steps). Tree has O(log N) latency but lower bandwidth utilization. You must analyze which algorithm is faster for a 1024-MI300X cluster synchronizing a 50MB gradient tensor.'
question: For 1024 MI300X GPUs synchronizing a 50MB tensor, which NCCL AllReduce algorithm is faster and where is the crossover point?
details:
  realistic_solution: 'Ring AllReduce time: T_ring = 2(N-1)α + 2(N-1)/N × D/B. Tree AllReduce time: T_tree = 2log₂(N)α + 2log₂(N)/N × D × k/B, where k is the overhead factor (~2× for binary tree due to reduced bandwidth utilization). With N=1024, α=10μs (RoCE latency), B=50GB/s (400Gbps), D=50MB: T_ring = 2×1023×10μs + 2×1023/1024×50MB/50GB/s = 20.46ms + 1.997ms = 22.46ms. T_tree = 2×10×10μs + 2×10/1024×50MB×2/50GB/s = 0.2ms + 0.039ms = 0.239ms. Tree wins decisively for 50MB at 1024 GPUs because the per-step latency (20.46ms for ring vs 0.2ms for tree) dominates. Crossover point: ring wins when D is large enough that bandwidth term dominates. Setting T_ring = T_tree and solving: D_crossover ≈ 2(N-1-log₂N) × α × B × N / (2(N-1) - 2k×log₂N) ≈ for N=1024: D ≈ 200GB. For practical gradient sizes (<10GB), tree is almost always faster at 1024 GPUs.'
  common_mistake: |
    **The Pitfall:** Only comparing the bandwidth utilization terms and ignoring the per-step latency overhead.
    **The Rationale:** For large models, bandwidth is usually the bottleneck, so candidates reflexively choose the bandwidth-optimal Ring algorithm.
    **The Consequence:** Severely degraded training throughput for smaller models or gradient chunking strategies where the fixed O(N) kernel launch and network RTT costs dominate.
  napkin_math: |
    1. **Parameters:** N=1024, α=10μs (RoCE latency), B=50GB/s (400Gbps), D=50MB.
    2. **Ring Time:** T_{ring} = 2(N-1)α + 2(N-1)/N * D/B = 2(1023)(10μs) + 2(1023/1024)(50MB/50GB/s) = 20.46ms + 1.997ms = 22.46ms.
    3. **Tree Time:** T_{tree} = 2log₂(N)α + 2log₂(N)/N * D * 2/B = 2(10)(10μs) + 2(10/1024)(50MB)(2)/(50GB/s) = 0.2ms + 0.039ms = 0.239ms.
    4. **Result:** Tree is ~100x faster for a 50MB payload.
    5. **Crossover:** Setting T_{ring} = T_{tree} yields a crossover point of **D ≈ 200GB**.
