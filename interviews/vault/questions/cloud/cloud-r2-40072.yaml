title: RDMA Connection Scaling for 10K GPU Clusters
scenario: You are architecting the RDMA transport for a 16,384-MI300X GPU cluster (the scale of frontier
  model training). Traditional RDMA requires O(N²) QP connections for all-to-all communication. Calculate
  the total QP state memory, connection setup time, and propose an architecture that scales sub-quadratically
  while maintaining full AllReduce functionality.
details:
  realistic_solution: 'Naive O(N²): 16,384 GPUs × 16,383 peers × 8 rails = 2.15 billion QPs. Per QP: ~1KB
    state on HCA. Per GPU: 16,383 × 8 = 131K QPs × 1KB = 128MB — exceeds ConnectX-7''s 256MB HCA memory
    (QPs share with MRs, CQs, etc.). Connection setup: 131K QPs × 0.3ms/QP = 39.3 seconds — too slow for
    elastic scaling. Scalable architecture: (1) Shared Receive Queue (SRQ): all QPs on a port share one
    receive queue. Reduces receive buffer memory from O(N) to O(1) per port. (2) Dynamic Connected (DC)
    transport (Mellanox extension): single QP handles connections to all peers by swapping connection
    context on each message. Per GPU: 8 DC QPs (one per rail) instead of 131K. Memory: 8 × 1KB = 8KB vs
    128MB. 16,000× reduction. (3) Connection caching: DC maintains an LRU cache of recently-used peer
    contexts. Cache hit = 0 overhead. Cache miss = ~5μs to fetch context from host memory. For ring AllReduce
    (each GPU talks to 2 neighbors): cache hit rate > 99%. (4) Hybrid: use DC for AllReduce (N peers,
    infrequent connection changes) and RC for pipeline-parallel (fixed peers, latency-critical). Estimate
    16 RC QPs (pipeline) + 8 DC QPs (AllReduce) = 24 QPs per GPU × 1KB = 24KB. (5) Connection setup: 24
    QPs × 0.3ms = 7.2ms (vs 39 seconds). 5,400× faster.'
  common_mistake: Dismissing the O(N²) problem because 'memory is cheap.' At 16K GPUs with 8 rails, the
    QP count and connection setup time become operationally prohibitive — not because of memory cost but
    because of setup latency and HCA resource limits.
  napkin_math: 'RC at 16K GPUs: 131K QPs/GPU × 128MB HCA memory = infeasible. DC at 16K GPUs: 8 QPs/GPU
    × 8KB HCA memory = trivial. DC context cache: 32 entries (hot peers) × 256 bytes = 8KB on HCA. Ring
    AllReduce accesses 2 peers repeatedly: 100% cache hit rate. All-to-All (MoE): accesses 16K peers with
    Zipf distribution — top 32 experts cover 80% of traffic, so cache hit rate ≈ 80%. Remaining 20% incur
    5μs penalty per miss.'
