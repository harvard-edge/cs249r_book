title: Edge-Cloud Partitioning for Acoustic Monitoring
scenario: An acoustic monitoring fleet uses edge devices to classify bird calls. Transmitting raw audio to the cloud costs 200mJ per event. A local lightweight model costs 5mJ but has low accuracy on rare birds. The system detects 1000 events/day.
question: How would you balance local inference and cloud fallback for 1000 bird-call events/day to save energy while preserving rare-bird accuracy?
details:
  realistic_solution: Co-design a cascaded early-exit architecture. The edge device runs a lightweight binary classifier (bird vs. noise) or a small N-way classifier for the most common birds. If the local model's softmax confidence is below a defined threshold (e.g., 0.8), the edge device extracts compressed audio features (e.g., MFCCs) and transmits them to the cloud for the heavy ResNet inference. This dramatically reduces communication power while maintaining overall system accuracy, as only uncertain or rare events incur the 200mJ transmission penalty.
  common_mistake: |
    **The Pitfall:** Adopting a pure "cloud-only" approach to maximize accuracy without regarding power constraints.
    **The Rationale:** Achieving maximum accuracy on edge often requires cloud compute for complex models.
    **The Consequence:** Transmitting every event drains edge batteries prematurely, causing prohibitive maintenance costs and offline devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud transmission = 200mJ. Local inference = 5mJ.
       - 1000 events/day. 90% are common/high-confidence.
    2. **Calculations:**
       - Send all to cloud: 1000 × 200mJ = 200,000 mJ = 200 J/day.
       - Cascaded approach: 900 local (900 × 5mJ = 4.5 J) + 100 cloud (100 × 205mJ = 20.5 J) = 25 J/day.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** A cascaded early-exit architecture cuts daily energy consumption by 87.5% while routing only uncertain, high-complexity audio to the cloud.
