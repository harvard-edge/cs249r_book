title: The Embedding Lookup Lag
scenario: You are designing a recommendation model where a massive 600 GB embedding table is sharded across
  eight H100 GPUs within a single HGX server. For each inference request, the model must perform 20 independent
  embedding lookups, which are randomly distributed across the 8 GPUs. You need to diagnose the primary
  latency contributor for the user-facing P99 latency. Which bus protocol is the critical path and what
  is its approximate latency for a single lookup?
details:
  realistic_solution: The critical path is NVLink, as it's the dedicated high-speed interconnect for GPU-to-GPU
    communication within an HGX node. Each lookup involves one GPU requesting data from another GPU's
    HBM. The latency is the sum of the time to traverse NVLink and the time to access the remote GPU's
    HBM. PCIe is the alternative path but is significantly higher latency as it involves traversing up
    to the CPU and back down. Given the options, NVLink is the critical path. A single NVLink transfer
    takes ~500 ns, and the remote HBM access takes ~300 ns. Therefore, a single lookup's latency is dominated
    by these two factors.
  common_mistake: A common mistake is to focus on bandwidth (GB/s) when the problem is about the latency
    of many small, independent operations. Another is to confuse intra-node (within a server) and inter-node
    (across servers) protocols, incorrectly suggesting InfiniBand for a single-server problem.
  napkin_math: An 8xH100 HGX server uses NVLink for GPU-to-GPU communication at 900 GB/s. Fetching embedding
    vectors from another GPU via NVLink bypasses the CPU and PCIe bus. PCIe Gen4 is limited to 32 GB/s.
    NVLink is 900 / 32 = 28x faster for bandwidth. For 20 small random lookups, NVLink's sub-microsecond
    latency strictly outperforms the higher latency of PCIe traversals.
  options:
  - InfiniBand RDMA, with a latency of ~5,000 ns per lookup.
  - PCIe Gen5, with a latency of ~1,000 ns per lookup.
  - NVLink, with a combined bus and remote HBM access latency of ~800 ns per lookup.
  - HBM3 memory bandwidth, as the 3.35 TB/s is insufficient for the embedding size.
  correct_index: 2
