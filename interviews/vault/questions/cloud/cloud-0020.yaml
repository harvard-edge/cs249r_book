title: The 4x Data Cost Bug
scenario: You manage the data ingest pipeline for a fleet of 100 autonomous vehicles. Each vehicle records
  and uploads 2.4 Trillion pixels of image data daily. An engineer, intending to improve data fidelity
  for the next training run, just pushed an OTA update. The update changes the format of uploaded camera
  images from a compressed JPEG (averaging 0.5 bytes/pixel) to uncompressed FP16 (2 bytes/pixel).
details:
  realistic_solution: This is a classic example of a data pipeline issue causing a severe form of training-serving
    skew, not at the model-prediction level, but at the system's operational level. The change from a
    highly efficient compressed format to a raw, high-precision format introduces a 4x increase in data
    volume.
  common_mistake: Candidates often focus only on the engineer's positive intent (improving data fidelity)
    and miss the immediate, massive negative impact on operational costs and system stability. They may
    also miscalculate the data increase, confusing byte-per-pixel values (e.g., using 1 for INT8 or 4
    for FP32) or forgetting to account for all variables like the number of cameras or vehicles in the
    fleet.
  napkin_math: 'We calculate the total data volume step-by-step: 1. Pixels per day per vehicle = 2.4 Trillion.
    2. New data size per vehicle = 2.4T * 2 bytes/pixel = 4.8 TB. 3. Total fleet data = 4.8 TB * 100 vehicles
    = 480 TB per day. (Old volume was 2.4T * 0.5 bytes = 1.2 TB * 100 = 120 TB/day).'
  options:
  - ~240 TB per day
  - ~48 TB per day
  - ~480 TB per day
  - ~4.8 TB per day
  correct_index: 2
