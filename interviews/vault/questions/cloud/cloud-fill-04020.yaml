title: Interleaved Pipeline Schedule to Reduce Bubble
scenario: You have a 64-layer GPT model split across 8 MI300X GPUs. Using the standard GPipe schedule
  with m=16 micro-batches gives a 30% bubble. A colleague suggests switching to an interleaved (1F1B)
  schedule. Design the interleaved schedule, explain the memory tradeoff, and calculate the new bubble
  fraction.
details:
  realistic_solution: 'Use interleaved 1F1B with v=2 virtual stages: each GPU holds 2 non-contiguous model
    chunks (layers 1-8 and layers 33-40, etc.). Bubble fraction reduces to (p-1)/(m×v+p-1) = 7/(32+7)
    = 17.9% vs 30% with standard GPipe. Memory overhead: 2× activation recomputation checkpoints per GPU.
    Combine with selective activation checkpointing for the v=2 chunks to stay within 192 GB MI300X HBM3.'
  common_mistake: Assuming the interleaved schedule always wins. The interleaved schedule requires more
    stages per device (v chunks × p stages = v × 8 stages), increasing the number of in-flight micro-batches
    and peak activation memory by a factor of v. With limited HBM, this forces smaller batch sizes that
    reduce throughput gains.
  napkin_math: 'Standard GPipe bubble: (p-1)/(m+p-1) = 7/(16+7) = 30.4%. Interleaved 1F1B with v=2: bubble
    ≈ (p-1)/(m×v+p-1) = 7/(32+7) = 17.9%. Reduction: 30.4% → 17.9% = 41% less bubble. Memory: standard
    stores m=16 micro-batch activations per stage; interleaved stores 2v × micro-batch activations = 4×
    more peak activations. MI300X 192 GB provides enough headroom for 70B model with v=2.'
