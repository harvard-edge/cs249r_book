title: Calculate DMA Transfer Speedup with Pinned Memory
scenario: You are profiling a PyTorch computer vision training job on an AWS p4d.24xlarge instance (A100
  GPUs, PCIe Gen4 x16 with ~24 GB/s effective bandwidth). Each batch is 800 MB. Currently, transferring
  the batch to the GPU via `batch.to('cuda')` takes 160 ms because the DataLoader is allocating batches
  in pageable host memory. You plan to enable `pin_memory=True` to allow direct DMA transfers. Calculate
  the new transfer time and the effective bandwidth improvement.
question: "What transfer time and bandwidth improvement should you expect after enabling pin_memory=True for 800MB batches?"
details:
  realistic_solution: Setting `pin_memory=True` allocates the tensors in page-locked host memory, enabling
    the GPU to perform a direct DMA fetch without CPU intervention. Using the effective PCIe bandwidth,
    the transfer time drops from 160 ms to approximately 33.3 ms.
  common_mistake: Using the theoretical PCIe Gen4 x16 bandwidth (31.5 GB/s) instead of the effective bandwidth
    (~24 GB/s), or failing to realize that pageable memory requires an extra CPU copy to a hidden pinned
    buffer before DMA.
  napkin_math: 'Pageable bandwidth: 800 MB / 0.160 s = 5 GB/s.

    Pinned transfer time: 800 MB / 24 GB/s = 33.3 ms.

    Transfer time reduction = 160 ms - 33.3 ms = 126.7 ms per batch.

    Bandwidth improvement = 24 GB/s / 5 GB/s = 4.8x speedup.'
