title: The Beam Search Memory Explosion
scenario: You switch your generation algorithm from Greedy Search to Beam Search with a beam width of
  4 to get better translation quality. Suddenly, your inference server can only handle 1/4th the number
  of concurrent users before OOMing. Why does Beam Search destroy your concurrency scaling?
details:
  realistic_solution: You caused a **KV-Cache Explosion**. Server has 40 GB free VRAM. | Greedy User =
    1 GB cache. Max concurrent = 40 users. | Beam(4) User = 4 GB cache. Max concurrent = 10 users. | You
    just quadrupled your hardware hosting costs for a slight
  common_mistake: '"Beam search does 4 times the math, so it takes 4 times the CPU/GPU." It does take
    more compute, but OOM errors are about memory capacity, not math speed.'
  napkin_math: Server has 40 GB free VRAM. | Greedy User = 1 GB cache. Max concurrent = 40 users. | Beam(4)
    User = 4 GB cache. Max concurrent = 10 users. | You just quadrupled your hardware hosting costs for
    a slight bump in BLEU score.
