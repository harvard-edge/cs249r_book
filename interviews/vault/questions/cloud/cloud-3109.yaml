title: 'Transformer Cost Design: Optimal Architecture for Inference Budget'
scenario: Design a transformer architecture for a production inference system on H100 with budget: P99 < 500ms, throughput ≥ 100 req/s, cost < $0.001/request. Starting point: GPT-2 large (774M params, 36 layers, hidden=1280).
question: What model configuration and H100 fleet meet P99<500ms, 100 req/s, and <$0.001/request starting from GPT-2 large?
details:
  realistic_solution: 'GPT-2 large decode throughput on H100: weights=1548MB. Bandwidth-limited decode: 1548MB/3350GB/s=0.462ms/token. In a batched setting, weights are loaded once per token generation step. At batch=64, even adding KV cache memory bandwidth, step time is ~0.5ms. 100 tokens output: ~50ms/req, well under the 500ms SLO. Throughput at batch=64 is 64 / 0.05s = 1280 req/s, which easily exceeds the 100 req/s requirement using a single H100. Cost: $2.50/hr / (100 req/s * 3600s/hr) = $2.50 / 360,000 req = $0.0000069/req. A single H100 easily meets all constraints.'
  common_mistake: |
    **The Pitfall:** Designing for throughput alone without verifying that the P99 latency constraint is met.
    **The Rationale:** Candidates often maximize batch size to hit throughput targets, forgetting that heavily batched systems suffer from high tail latency (head-of-line blocking).
    **The Consequence:** The system will fail the 500ms P99 SLO, leading to a degraded user experience despite meeting cost and throughput metrics.
  napkin_math: |
    - **Weights Footprint:** 774M params × 2 bytes = 1548 MB.
    - **Memory Bandwidth:** H100 bandwidth is 3.35 TB/s (3350 GB/s).
    - **Decode Step Latency:** 1548 MB / 3350 GB/s = 0.462 ms/token.
    - **Total Latency (100 tokens):** ~0.5 ms/step (including KV cache) × 100 tokens = **50 ms** (<< 500ms SLO).
    - **Throughput:** At batch=64, 64 requests / 0.05s = 1280 req/s (>> 100 req/s requirement).
    - **Cost per Request:** Assuming $2.50/hr for an H100. Cost per second = $2.50 / 3600 = $0.000694/s. At 100 req/s, cost = $0.000694 / 100 = **$0.0000069/req** (<< $0.001 budget).
