title: Transformer Cost Design Optimal Architecture for Inference Budget
scenario: 'Design a transformer architecture for a production inference system on H100 with budget: P99 < 500ms, throughput >= 100 req/s, cost < $0.001/request. Starting point: GPT-2 large (774M params, 36 layers, hidden=1280).'
question: 'What model configuration and H100 fleet meet P99<500ms, 100 req/s, and <$0.001/request starting from GPT-2 large?'
details:
  realistic_solution: 'GPT-2 large decode throughput on H100 is bandwidth-limited. In a batched setting, weights are loaded once per token generation step. At batch=64, even adding KV cache memory bandwidth, step time is ~0.5ms. A single H100 easily meets all constraints.'
  common_mistake: |
    **The Pitfall:** Designing for throughput alone without verifying that the P99 latency constraint is met.
    **The Rationale:** Candidates often maximize batch size to hit throughput targets, forgetting that heavily batched systems suffer from high tail latency (head-of-line blocking).
    **The Consequence:** The system will fail the 500ms P99 SLO, leading to a degraded user experience despite meeting cost and throughput metrics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 774M params.
       - Hardware: H100 (3.35 TB/s bandwidth).
       - Constraints: P99 < 500ms, >100 req/s, <$0.001/req.
    2. **Calculations:**
       - Weights Footprint = 774M * 2 bytes = 1548 MB.
       - Decode Step Latency = 1548 MB / 3350 GB/s = 0.462 ms/token.
       - Total Latency (100 tokens) = ~0.5 ms/step * 100 = 50 ms.
       - Throughput (batch=64) = 64 / 0.05s = 1280 req/s.
       - Cost per Request ($2.50/hr instance) = ($2.50 / 3600) / 100 = $0.0000069/req.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. A single H100 effortlessly meets all constraints with an actual cost of $0.0000069/req and 50ms latency.**
