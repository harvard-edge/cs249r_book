title: The A/B Test Power Bill
scenario: Your team is running a 30-day A/B test between two models. Model A runs on a GPU with a 300W TDP, and Model B runs on an H100 GPU with a 700W TDP. Each GPU runs 24/7 for the duration of the test. The datacenter has a PUE of 1.1 and an electricity cost of $0.15/kWh.
question: How would you calculate the total electricity cost for the 30-day A/B test, including PUE, and what is the final number?
details:
  realistic_solution: 'The correct way to calculate the cost is to account for the power of both GPUs, multiply by the PUE to get the total datacenter power draw, and then factor in the duration and cost per kWh.'
  common_mistake: |
    **The Pitfall:** Calculating costs based only on the direct power draw of the GPU.
    **The Rationale:** Forgetting that the datacenter itself consumes significant power for cooling and infrastructure.
    **The Consequence:** Ignoring the Power Usage Effectiveness (PUE) metric, thereby underestimating the true operational cost.
  napkin_math: |
    - Total GPU TDP = 300W (Model A) + 700W (Model B) = 1000W = 1 kW.
    - Total Power with PUE = 1 kW * 1.1 = 1.1 kW.
    - Total Energy over 30 days = 1.1 kW * 24 hours/day * 30 days = 792 kWh.
    - Total Cost = 792 kWh * $0.15/kWh.
    - **Result: $118.80.**
  options:
  - '$108.00 (Misconception: Ignored PUE)'
  - $118.80
  - '$83.16 (Misconception: Calculated cost for only the H100)'
  - '$118,800.00 (Misconception: Confused Watts and Kilowatts)'
  correct_index: 1
