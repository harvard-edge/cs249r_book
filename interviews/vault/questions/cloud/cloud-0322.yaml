title: The A/B Test Power Bill
scenario: Your team is running a 30-day A/B test between two models. Model A, a smaller distilled model,
  runs on a GPU with a 300W TDP. Model B, a larger SOTA model, requires a dedicated H100 GPU (700W TDP).
  Each GPU runs 24/7 for the duration of the test. Assuming a datacenter PUE of 1.1 and an electricity
  cost of $0.15/kWh, explain how you would calculate the total electricity cost for this 30-day experiment
  and provide the final number.
question: "How would you calculate the total electricity cost for the 30-day A/B test, including PUE, and what is the final number?"
details:
  realistic_solution: The correct way to calculate the cost is to account for the power of both GPUs,
    multiply by the PUE to get the total datacenter power draw, and then factor in the duration and cost
    per kWh.
  common_mistake: Engineers often calculate costs based only on the direct power draw of the GPU (the
    TDP), forgetting that the datacenter itself consumes significant power for cooling and other infrastructure.
    This overhead is captured by the Power Usage Effectiveness (PUE) metric, and ignoring it underestimates
    the true operational cost.
  napkin_math: Total Power = (GPU_A_TDP + GPU_B_TDP) * PUE
  options:
  - '$108.00 (Misconception: Ignored PUE)'
  - $118.80
  - '$83.16 (Misconception: Calculated cost for only the H100)'
  - '$118,800.00 (Misconception: Confused Watts and Kilowatts)'
  correct_index: 1
