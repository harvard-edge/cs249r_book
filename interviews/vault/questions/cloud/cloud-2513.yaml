title: Cloud Top Of Rack Switch L2 0
scenario: During a datacenter design review, someone proposes connecting all 256 GPUs in a training cluster directly to a single large switch.
question: "Why do top-of-rack switches exist, and what failure-domain implications do they create for distributed training?"
details:
  realistic_solution: 'A ToR switch is the first aggregation point connecting all servers in a single rack (typically 32-48 ports). It exists because cabling every server directly to a spine switch is physically impractical — cable lengths, port counts, and cost all explode. The key implication: a ToR switch failure takes down an entire rack (8-16 servers). This defines the minimum failure domain for distributed training — checkpoint strategies and job placement must account for rack-level failures.'
  common_mistake: |
    **The Pitfall:** Treating network failures as independent per-server events.
    **The Rationale:** Engineers often evaluate reliability based on individual server components failing.
    **The Consequence:** They ignore that a single ToR switch failure is correlated, instantly taking out all servers in that rack and violating fault-tolerance assumptions.
  napkin_math: |
    - Typical rack: 8 GPU servers × 8 GPUs = 64 GPUs per rack.
    - A 256-GPU cluster = 4 racks, 4 ToR switches.
    - Single ToR failure = 25% of compute lost.
    - **If ToR switch AFR is 2%, expect a full rack to go offline roughly once every 12.5 years.**
