title: Cloud Top Of Rack Switch L2 0
scenario: During a datacenter design review, someone proposes connecting all 256 GPUs in a training cluster
  directly to a single large switch. Explain why top-of-rack switches exist and what failure domain implications
  they create.
question: "Why do top-of-rack switches exist, and what failure-domain implications do they create for distributed training?"
details:
  realistic_solution: 'A ToR switch is the first aggregation point connecting all servers in a single
    rack (typically 32-48 ports). It exists because cabling every server directly to a spine switch is
    physically impractical — cable lengths, port counts, and cost all explode. The key implication: a
    ToR switch failure takes down an entire rack (8-16 servers). This defines the minimum failure domain
    for distributed training — checkpoint strategies and job placement must account for rack-level failures.'
  common_mistake: Treating network failures as independent per-server events. In reality, a single ToR
    switch failure is correlated — it takes out all servers in that rack simultaneously.
  napkin_math: 'Typical rack: 8 GPU servers × 8 GPUs = 64 GPUs per rack. A 256-GPU cluster = 4 racks,
    4 ToR switches. Single ToR failure = 25% of compute lost. MTBF of a switch ≈ 100K hours.'
