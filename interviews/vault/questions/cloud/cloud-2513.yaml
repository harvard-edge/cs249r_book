title: Cloud Top Of Rack Switch L2 0
scenario: During a datacenter design review, someone proposes connecting all 256 GPUs
  in a training cluster directly to a single large switch.
question: Why do top-of-rack switches exist, and what failure-domain implications
  do they create for distributed training?
details:
  realistic_solution: 'A ToR switch is the first aggregation point connecting all
    servers in a single rack (typically 32-48 ports). It exists because cabling every
    server directly to a spine switch is physically impractical — cable lengths, port
    counts, and cost all explode. The key implication: a ToR switch failure takes
    down an entire rack (8-16 servers). This defines the minimum failure domain for
    distributed training — checkpoint strategies and job placement must account for
    rack-level failures.'
  common_mistake: '**The Pitfall:** Treating network failures as independent per-server
    events.

    **The Rationale:** Engineers often evaluate reliability based on individual server
    components failing.

    **The Consequence:** They ignore that a single ToR switch failure is correlated,
    instantly taking out all servers in that rack and violating fault-tolerance assumptions.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 256-GPU cluster (4 racks of\
    \ 8 GPU servers, 8 GPUs/server).\n   - ToR switches handle rack-level aggregation.\n\
    \   - ToR switch AFR: 2%.\n2. **Calculations:**\n   - Single ToR failure drops\
    \ 64 GPUs (25% of cluster compute).\n   - Expected failure rate for 4 switches\
    \ at 2% AFR implies 1 failure every ~12.5 years.\n3. **Conclusion & Interpretation:**\n\
    \   - **Result: Reliability-Bound. A ToR switch failure creates a correlated rack-level\
    \ outage, forcing distributed training fault-domains to be modeled at the rack\
    \ level.**\n"
