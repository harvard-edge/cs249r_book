title: Dynamic Loss Scaling in Mixed Precision
scenario: You are pre-training a Vision Transformer (ViT) using FP16 mixed precision. To prevent gradient
  underflow, you initialize the loss scaler to a static value of 65536. On step 1, the loss immediately
  registers as NaN. Printing the raw (unscaled) gradients in FP32 reveals they have an average magnitude
  of 1.2 and a maximum of 2.5.
details:
  realistic_solution: The failure is a direct FP16 overflow caused by an aggressively high static loss
    scale. Loss scaling is required in FP16 to shift tiny gradients up into the representable range (avoiding
    underflow). However, if the scale is too large, the scaled gradients will exceed FP16's maximum limit.
    The architecture must implement Dynamic Loss Scaling, which monitors for overflows (NaN/Inf) during
    the backward pass. If an overflow occurs, the optimizer skips the update, reduces the scale factor
    (usually by dividing by 2), and continues. This dynamically finds the optimal window between underflow
    and overflow.
  common_mistake: Assuming the learning rate is too high, causing a massive first step that destabilizes
    the weights.
  napkin_math: Max unscaled gradient = 2.5. Static scale = 65536. Scaled gradient = 2.5 * 65536 = 163,840.
    Because 163,840 > 65504 (FP16 max), the value overflows to Infinity. The optimizer then propagates
    Inf/NaN to the weights.
