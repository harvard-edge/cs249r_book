title: Dynamic Loss Scaling in Mixed Precision
scenario: You are pre-training a Vision Transformer (ViT) using FP16 mixed precision. You initialize the loss scaler to a static value of 65536. On step 1, the loss immediately registers as NaN. Printing the raw (unscaled) gradients in FP32 reveals they have an average magnitude of 1.2 and a maximum of 2.5.
question: Why does a static loss scale of 65536 make the FP16 ViT loss NaN on step 1, and what scaling strategy should you use?
details:
  realistic_solution: |
    The failure is a direct FP16 overflow caused by an aggressively high static loss scale. Loss scaling is required in FP16 to shift tiny gradients up into the representable range (avoiding underflow). However, if the scale is too large, the scaled gradients will exceed FP16's maximum limit. The architecture must implement Dynamic Loss Scaling, which monitors for overflows (NaN/Inf) during the backward pass. If an overflow occurs, the optimizer skips the update, reduces the scale factor (usually by dividing by 2), and continues. This dynamically finds the optimal window between underflow and overflow.
  common_mistake: |
    **The Pitfall:** Assuming the learning rate is too high, causing a massive first step that destabilizes the weights.
    **The Rationale:** Candidates see a NaN loss on step 1 and default to learning rate tuning, ignoring the mechanical constraints of FP16 numerical representation and the explicit role of the loss scaler.
    **The Consequence:** Wasting time tuning hyperparameters when the system configuration is fundamentally broken due to numerical overflow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Precision: FP16. Max representable value is 65,504.
    - Max Unscaled Gradient: 2.5.
    - Static Scale Factor: 65,536.

    **Calculations:**
    - Scaled Gradient: 2.5 * 65,536 = 163,840.
    - Comparison: 163,840 > 65,504.

    **Conclusion & Interpretation:**
    - **Result: NaN Loss (Numerical Overflow).** The scaled gradient strictly overflows the FP16 representable range, causing Infinity/NaN propagation on step 1.
