title: Embedding Table Memory Bandwidth Optimization with Mixed Precision
scenario: Embedding table lookups are the memory bandwidth bottleneck in a DLRM training system. The tables
  are stored in FP32 (4B per value). Switching to FP16 reduces quality. A colleague suggests INT8 with
  row-wise scaling. Evaluate the precision choices.
details:
  realistic_solution: 'Precision comparison for embedding tables: (1) FP32: 4B per value. Full precision.
    Bandwidth: highest. (2) FP16: 2B per value (2x bandwidth reduction). Dynamic range: [-65504, 65504].
    Risk: values near 0 (common in initialized embeddings) may have precision loss. For trained embeddings:
    typically fine. (3) INT8 (per-tensor): 1B per value + 4B scale + 4B zero_point per table. Effective:
    ~1B per value at large table sizes. Dynamic range issues: gradient updates to quantization levels
    are coarse. (4) INT8 (per-row): 1B per value + 4B scale per row. For a row of 64 values: overhead
    = 4B/64 = 6.25% overhead vs 1B per value. Effective: 1.0625B per value. 3.76x bandwidth reduction
    vs FP32. Quality: preserves relative precision within each row. (5) Recommendation: use INT8 per-row
    for embedding tables in training (FBGEMM supports this natively). Use FP32 for the upper MLP layers.
    Mixed precision: embedding INT8 + MLP FP32. Training quality: <0.5% AUC delta vs FP32-only in production
    deployments.'
  common_mistake: Applying uniform INT8 quantization across all embedding tables. Uniform INT8 maps the
    entire row to 256 levels. For embedding rows with a wide dynamic range, this loses precision for small
    values. Row-wise quantization maintains one scale factor per row, preserving relative value precision
    within each row.
  napkin_math: 'Embedding table FP32: 10M rows * 64 * 4B = 2.56GB. INT8 per-row: 10M * 64 * 1B + 10M *
    4B = 640MB + 40MB = 680MB. Bandwidth reduction: 2560/680 = 3.76x. Training step time for embedding
    lookup: at 3.35TB/s HBM: FP32 lookup for 4K samples, 10 lookups each, 64-dim: 4K*10*64*4B = 10.24MB.
    At 3.35TB/s: 3.05us. INT8: 2.72MB at 3.35TB/s: 0.81us. 3.76x speedup for embedding lookup. If embedding
    lookup is 30% of training step: total speedup = 1/(0.7 + 0.3/3.76) = 1/(0.7 + 0.08) = 1.28x. 28% training
    throughput improvement.'
