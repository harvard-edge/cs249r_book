title: Non-blocking vs Oversubscribed Fat-Tree
scenario: You are designing the network fabric for a 65,536 GPU training cluster using 64-port 400Gbps
  switches. You must choose between a strictly non-blocking 1:1 3-tier Fat-Tree topology and a 2:1 oversubscribed
  topology at the spine-to-core layer. Evaluate the cost-to-performance trade-offs for training Mixture-of-Experts
  (MoE) models that rely heavily on global All-to-All collectives, and justify your architectural decision.
details:
  realistic_solution: A 1:1 non-blocking Fat-Tree is strictly required for MoE workloads. The CapEx savings
    from halving the core switches ($43.5M) represents only ~2.2% of the total cluster cost ($1.95B for
    GPUs alone). Sacrificing full bisection bandwidth causes severe All-to-All congestion during MoE expert
    routing, degrading training throughput by far more than the 2.2% CapEx saved. The 2:1 oversubscription
    is penny-wise and pound-foolish.
  common_mistake: Assuming 2:1 oversubscription merely halves peak throughput uniformly, failing to realize
    that massive All-to-All traffic bursts from MoE routing will cause severe incast congestion at the
    oversubscribed core layer, disproportionately degrading tail latency.
  napkin_math: A 1:1 3-tier Fat-Tree with 64-port switches supports 65,536 GPUs and requires 1,024 core
    switches ((64/2)^2). 2:1 oversubscription halves this to 512 core switches. At ~$85k per fully-populated
    switch (switch + 64 optics), savings = 512 * $85k = ~$43.5M. The GPUs alone cost 65k * $30k = ~$1.95B.
    Sacrificing full bisection bandwidth for a ~2.2% CapEx saving is architecturally flawed.
