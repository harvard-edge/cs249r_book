title: 'KV-Cache: Specification — Define KV Cache SLAs for Production LLM API'
scenario: 'Write the KV cache specification for a production LLM API serving 7B model on H100s. The API
  must provide: P50 TTFT < 500ms, P99 TTFT < 2s, P50 TBT (time between tokens) < 50ms, P99 TBT < 100ms,
  concurrent users: 500. Define KV cache size requirements, eviction policy, prefix cache policy, and
  monitoring SLAs.'
question: "What KV-cache size per token and per 4K-context request should the production 7B API budget for its SLAs?"
details:
  realistic_solution: KV cache per token for 32-layer GQA-8 model = 131KB. At 4K context, each request
    occupies 537MB of KV cache.
  common_mistake: Not connecting KV cache spec to latency SLAs; specifying KV cache size without a model
    of how cache size affects throughput and latency.
  napkin_math: 'KV per token: 131KB (corrected from 32KB). For 4K context window: 131KB × 4096 = 537MB
    KV cache per request. At 80GB H100: (80GB - model_size) / 537MB = max concurrent requests.'
