title: 'Kernel Fusion: Realize Kernel Fusion Gains for 70B LLM Inference'
scenario: Realize the complete kernel fusion impact for 70B LLM inference on 8 H100s (80GB HBM3, 3.35
  TB/s) in decode mode serving 32 concurrent users. The model has 80 layers, hidden size 8192, 64 heads,
  GQA with 8 KV heads. Quantify fusion gains for each kernel category.
details:
  realistic_solution: 'Attention FLOPs for a single layer at seq=8192: QK^T scores = 2 × heads × seq²
    × head_dim = 2 × 64 × 8192² × 128 = 140 GFLOPs. Full attention including projections: ~560 GFLOPs
    per layer. 8.59 TFLOPs per layer is too high by ~15×.'
  common_mistake: Not distinguishing that with 32 concurrent users, the workload is batch=32 decode —
    significantly different from batch=1 in terms of arithmetic intensity.
  napkin_math: 'Single Transformer layer attention FLOPs (seq=8192, hidden=8192, batch=1): QKV projection:
    3 × 2 × 1 × 8192 × 8192² = 3 × 2 × 8192³ ≈ too large. Fix: QKV = 3 × 2 × batch × seq × hidden² = 3
    × 2 × 1 × 8192 × 8192 × 8192 is wrong — hidden is the projection dim, not seq. Correct: QKV = 3 ×
    2 × seq × hidden × hidden = 3 × 2 × 8192 × 8192 × 8192 for full self-attention with hidden=8192. But
    per standard formula: QKV proj = 3 × 2 × B × S × d² = 3×2×1×8192×8192² is the matmul. Actually: 2×32×8192×8192
    = 4.29 GFLOPs for a single layer''s QKV attention scores (not 8.59 TFLOPs which is 1000× too high).'
