title: Training Budget Overrun From Sequence Length
scenario: A language-model training run was budgeted for 400,000 GPU-hours at sequence length 2,048. One week before launch, the team switches to 8,192-token context while keeping model size and token count fixed. Attention was 30% of step time at 2,048 and scales quadratically with sequence length; the rest scales linearly with tokens. Diagnose the budget impact.
question: How does switching from 2,048 to 8,192 context affect a 400,000 GPU-hour training budget when attention is 30% of step time?
details:
  realistic_solution: The context length increases by 4x. The attention portion scales by 16x, so its 30% share becomes 4.8x the original whole-step cost. The non-attention 70% scales roughly 4x, becoming 2.8x. Total step cost becomes 7.6x, so the original 400K GPU-hour budget becomes about 3.04M GPU-hours unless batch/token accounting changes.
  common_mistake: Assuming sequence length only changes memory, or scaling the whole step linearly by 4x and missing quadratic attention.
  napkin_math: New cost factor = 0.30 x 16 + 0.70 x 4 = 4.8 + 2.8 = 7.6. Budget = 400,000 x 7.6 = 3,040,000 GPU-hours.
