title: Feature Serving Architecture for Multi-Model Inference
scenario: You're designing a feature serving layer for a platform that runs 30 ML models per user request. Each model needs 50-200 features, with 60% overlap across models. The total unique feature set is 800 features. The system is deployed on inference servers with a 10 ms p99 latency budget.
question: "How would you design the feature serving layer to fetch 800 unique features for 30 models within a 10 ms p99 budget?"
details:
  realistic_solution: Implement a unified feature gateway sidecar that deduplicates across all 30 models. Collect the union of all required features, batch into a single MGET to Redis, and fan out the response to each model's feature vector. Prefetch features during request parsing using the user_id to overlap with authentication.
  common_mistake: |
    **The Pitfall:** Having each model independently fetch its features.
    **The Rationale:** Candidates often think of models as isolated services rather than sharing a centralized feature gateway.
    **The Consequence:** This creates 4,500 individual feature lookups per request with massive redundancy and network overhead, easily exceeding the 10ms budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Models per request: 30.
       - Features per model: ~150 avg.
       - Unique features across all models: 800.
       - Budget: 10ms.
    2. **Calculations:**
       - Without deduplication: 30 models * 1 network round trip = 30 MGET calls * 1ms/call = 30ms (Exceeds budget).
       - With deduplication: 1 MGET of 800 features = ~3ms.
       - Memory for feature vector assembly: 800 features * 8 bytes = 6.4 KB per request.
       - Working set at 50K QPS: 50,000 * 6.4 KB = 320 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Latency Bound.** Consolidating 30 sequential MGETs into 1 deduplicated call reduces network latency from 30ms to 3ms, safely fitting within the 10ms SLA, with a negligible 320 MB CPU cache footprint.
