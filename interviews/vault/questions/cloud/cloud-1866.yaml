title: LLM Serving Autoscaling Under Burst
scenario: You are serving a 13B parameter LLM for a real-time chat application. Base traffic utilizes 20 nodes. Your P99 latency SLA is 1.5 seconds. The cold start time for a new node is roughly 4 minutes. Your service experiences sudden viral spikes that can triple the traffic within 60 seconds. You must evaluate trade-offs between buffer strategies.
question: "How would you handle 3x traffic spikes within 60s given 4-minute LLM cold starts without paying for a permanent 3x warm buffer?"
details:
  realistic_solution: Adopt a hybrid approach combining a warm over-provisioning buffer, predictive scaling for diurnal patterns, and dynamic batching to gracefully degrade throughput while the reactive cluster autoscaler provisions nodes.
  common_mistake: |
    **The Pitfall:** Relying entirely on reactive scaling triggers like CPU utilization.
    **The Rationale:** Ignoring the 4-minute cold start delay of loading massive model weights.
    **The Consequence:** Guaranteeing massive SLA violations during the deficit window before nodes spin up.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cold start = 240s, Burst = 60s, Deficit window = 180s.
    - Base load = 20 nodes (1000 req/s), Burst = 3000 req/s.

    **Calculations:**
    - Deficit = 2000 req/s over 180s -> 360,000 requests queue up.
    - Buffer of 10 nodes + doubling max batch size absorbs the 3000 req/s.

    **Conclusion & Interpretation:**
    - **Result: 10 warm extra nodes and dynamic batching (Compute-Bound)**. Successfully absorb the spike while respecting the 1.5s SLA.
