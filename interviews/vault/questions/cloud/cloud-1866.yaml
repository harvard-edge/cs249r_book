title: LLM Serving Autoscaling Under Burst
scenario: You are serving a 13B parameter LLM on single A100 (80GB) instances for a real-time chat application.
  Base traffic utilizes 20 nodes. Your P99 latency SLA is 1.5 seconds. The cold start time for a new node
  (container provisioning plus loading 26GB of weights from object storage) is roughly 4 minutes. Your
  service experiences sudden viral spikes that can triple the traffic (3x) within 60 seconds. Evaluate
  the trade-offs between maintaining a permanent 3x warm instance buffer, using purely reactive metric-based
  scaling (e.g., based on average queue length), or a hybrid architectural approach. Justify your final
  design with quantitative reasoning.
details:
  realistic_solution: Adopt a hybrid approach combining a warm over-provisioning buffer, predictive scaling
    for diurnal patterns, and dynamic batching to gracefully degrade throughput while the reactive cluster
    autoscaler provisions nodes.
  common_mistake: Relying entirely on reactive scaling triggers like CPU utilization or queue length,
    ignoring the 4-minute cold start delay which guarantees massive SLA violations during the deficit
    window.
  napkin_math: Cold start = 240s. Burst time = 60s. Deficit window = 180s. Base load = 20 nodes (e.g.,
    1000 req/s). Burst = 3000 req/s. Deficit = 2000 req/s. Over 180s, 360,000 requests queue up. A permanent
    3x buffer wastes 40 idle A100s. Instead, keeping a buffer of 10 extra nodes (30 total) combined with
    doubling the max batch size (trading 500ms latency for 2x throughput) temporarily absorbs the 3000
    req/s spike, keeping total latency under the 1.5s SLA until the remaining nodes spin up.
