title: Realize MobileNetV2 export pipeline from PyTorch to ONNX to TensorRT
scenario: You need to export a fine-tuned MobileNetV2 (3.4M params) from PyTorch to TensorRT FP16 for
  deployment on A100. The model was trained with torch.compile and has custom H-swish activations. Describe
  the complete export chain with known failure points at each step.
details:
  realistic_solution: 'Step 1: model.eval() + disable torch.compile. Step 2: ONNX export with dynamic_axes={''input'':
    {0: ''batch''}, ''output'': {0: ''batch''}} and opset=17. Failure point: custom H-swish (relu6(x+3)/6
    × x) — register as onnx custom op or decompose to standard ops. Step 3: onnxsim to simplify graph.
    Step 4: trtexec --fp16 --minShapes=input:1x3x224x224 --optShapes=input:64x3x224x224 --maxShapes=input:128x3x224x224.
    Step 5: validate accuracy with 1K images, check max abs diff FP16 vs FP32 < 0.01.'
  common_mistake: Exporting with torch.onnx.export without disabling torch.compile tracing first, which
    can produce a graph with compiled IR artifacts that ONNX cannot parse; or using a fixed batch size
    in ONNX export and then trying to change it in TensorRT (requires dynamic axes).
  napkin_math: 'MobileNetV2: 3.4M params. FP32 model: 13.6MB. FP16 TRT engine: ~7MB + TRT overhead ~50MB.
    ONNX export time: ~2s. TRT build time: ~3 min (polygraphy caches engine). Inference FP16 vs FP32 accuracy:
    typical max abs diff < 0.005 for ImageNet models. TRT FP16 speedup over PyTorch FP32: ~3–4× for small
    CNNs like MobileNetV2 (kernel fusion + FP16 compute + reduced memory). At batch=64: PyTorch ~8ms →
    TRT FP16 ~2.5ms. Throughput: 64/2.5ms = 25,600 img/sec per A100.'
