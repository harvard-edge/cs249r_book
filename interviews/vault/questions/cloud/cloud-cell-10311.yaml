title: Analyzing RBAC and Security Context for Multi-Tenant GPU Namespaces
scenario: A regulated enterprise runs ML workloads on a shared H100 Kubernetes cluster. A security audit
  finds that researchers in Namespace A can inadvertently see GPU metrics from Namespace B via the cluster-wide
  DCGM Exporter DaemonSet, which scrapes all GPUs on every node. Analyze the blast radius and design a
  RBAC + metric isolation strategy.
details:
  realistic_solution: 'DCGM Exporter exposes metrics at node level without namespace awareness. Isolation
    requires: (1) Deploy per-namespace metric proxies (e.g., `prometheus-operator` per namespace with
    `namespaceSelector`) that only scrape pods within their namespace. (2) Use RBAC to restrict `metrics.k8s.io`
    endpoint access: bind `ClusterRole` with `get` on `/metrics` only to the owning service account per
    namespace. (3) For GPU-level isolation, use MIG on H100 — each team gets a named MIG instance (`nvidia.com/mig-1g.10gb`),
    and DCGM can be configured to report per-MIG metrics. (4) PodSecurityAdmission to block `privileged:
    true` which could allow `/proc` enumeration of sibling containers.'
  common_mistake: Trying to namespace-scope a DaemonSet (not possible — DaemonSets are node-scoped); attempting
    to solve metric isolation via NetworkPolicy alone, which doesn't restrict API server RBAC access to
    metric endpoints.
  napkin_math: 'H100 supports 7× MIG 1g.10gb instances per GPU. 25-node cluster × 8 GPUs × 7 MIG slices
    = 1,400 isolatable GPU slices. Per-slice HBM3 bandwidth: 3.35 TB/s ÷ 7 ≈ 479 GB/s per MIG instance.
    Metric cardinality per node: DCGM exports ~150 metrics × 56 MIG instances = 8,400 time series per
    node × 25 nodes = 210,000 series cluster-wide — requires careful Prometheus retention tuning.'
