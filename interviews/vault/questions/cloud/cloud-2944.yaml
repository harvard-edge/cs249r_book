title: Realizing Power Capping vs. Thermal Throttling on H100
scenario: A datacenter operator applies a 500 W power cap to GPUs to stay within rack power budgets. A training team complains that their throughput dropped by 30% compared to uncapped runs. The operator claims power capping should only reduce throughput by ~15%.
question: Why might a 500 W power cap cause a 30% throughput drop instead of the expected 15%, and how would you diagnose it?
details:
  realistic_solution: 'Two separate throttling mechanisms interact: (1) The 500 W power cap reduces GPU clocks, but non-linearly. Because power scales with V²×f, a ~30% power reduction (700 W to 500 W) typically only reduces frequency and throughput by ~15% for compute-bound workloads, as the operator expects. (2) However, in a poorly ventilated rack, inadequate airflow causes junction temperatures to climb above 83°C. The GPU then thermally throttles clocks further to maintain safe temperatures. Check `nvidia-smi --query-gpu=temperature.gpu,clocks_throttle_reasons.hw_slowdown,power.draw --format=csv` to distinguish cap-induced vs. thermal-induced throttling. Fix: improve airflow to enable 500 W operation without thermal throttle.'
  common_mistake: |
    **The Pitfall:** Assuming a linear relationship between power cap and throughput.
    **The Rationale:** Candidates fail to distinguish between power capping (software-enforced via NVML) and thermal throttling (hardware-enforced when junction temperature exceeds 83°C).
    **The Consequence:** Misdiagnosis leads to incorrect mitigation strategies, as fixing airflow is required rather than adjusting the power cap.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power cap: 500W.
       - Expected drop: ~15%.
       - Actual drop: 30%.
    2. **Calculations:**
       - Expected Cap Drop: Yields ~840 TFLOPS.
       - Actual Drop: Yields 692 TFLOPS (~1,386 MHz).
    3. **Conclusion & Interpretation:** **Result: Thermal-Bound.** The first 15% drop is from the power limit; the additional 15% drop is caused by thermal throttling.
