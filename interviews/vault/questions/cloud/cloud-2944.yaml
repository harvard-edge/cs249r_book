title: Realizing Power Capping vs. Thermal Throttling on H100
scenario: A datacenter operator applies a 500 W power cap to H100 SXM5 GPUs (rated
  at 700 W TDP) using `nvidia-smi --power-limit=500` to stay within rack power budgets.
  A training team complains that their throughput dropped by 30% compared to uncapped
  runs. The operator claims power capping should only reduce throughput by ~15%. Explain
  the discrepancy.
question: Why might a 500 W power cap on 700 W H100s cause a 30% throughput drop instead
  of the expected 15%, and how would you diagnose it?
details:
  realistic_solution: 'Two separate throttling mechanisms interact: (1) The 500 W
    power cap reduces GPU clocks, but non-linearly. Because power scales with V²×f, a ~30% power reduction (700 W to 500 W) typically only reduces frequency and throughput by ~15% for compute-bound workloads, as the operator expects. (2) However, in a poorly ventilated rack, inadequate airflow causes junction temperatures to climb above 83°C. The GPU then thermally throttles clocks further to maintain safe temperatures. Check `nvidia-smi --query-gpu=temperature.gpu,clocks_throttle_reasons.hw_slowdown,power.draw --format=csv` to distinguish cap-induced vs. thermal-induced throttling. Fix: improve airflow to enable 500 W operation without thermal throttle.'
  common_mistake: Assuming linear relationship between power cap and throughput; not
    distinguishing between power capping (software-enforced via NVML) and thermal
    throttling (hardware-enforced when junction temperature exceeds 83°C on H100).
  napkin_math: 'H100 BF16 FLOPS: 989 TFLOPS at 700 W. At 500 W, expected frequency drop is ~15%, yielding ~840 TFLOPS (85% of peak). Actual measured 30% drop means throughput is 692 TFLOPS (70% of peak). This corresponds to clocks dropping from 1,980 MHz down to ~1,386 MHz. The first ~15% drop is the expected result of the 500 W power limit, and the additional ~15% drop is caused by hardware thermal throttling.'
