title: Optimizing LLM Inference Latency on NVIDIA A100 with Profiling
scenario: You are optimizing the inference latency of an FP16 LLM deployed on a GPU. Despite powerful specifications, the end-to-end latency for a single request is higher than expected. The model involves complex memory access patterns.
question: How would you use profiling and tracing tools to systematically determine whether high inference latency is compute-, memory-, or I/O-bound?
details:
  realistic_solution: "Use `nsys` for system-level timeline tracing to identify host-to-device bottlenecks and `ncu` (Nsight Compute) for kernel-level metrics. Target memory throughput (HBM2e bandwidth saturation), global memory coalescing, and Tensor Core utilization. Implement optimizations like kernel fusion, `FlashAttention-2`, or aggressive shared memory caching."
  common_mistake: |
    **The Pitfall:** Exclusively focusing on theoretical FLOPs utilization and assuming the bottleneck is always compute.
    **The Rationale:** Optimization efforts often default to "fusing kernels" or "quantizing" without measuring if memory or PCIe transfer is actually holding the pipeline back.
    **The Consequence:** General optimizations are blindly applied without data-driven evidence from profiling, resulting in wasted engineering effort on non-bottlenecked components.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bandwidth limit: 2.0 TB/s (HBM).
       - Data load: 20 GB of weights and activations.
    2. **Calculations:**
       - Lower Bound Time: 20 GB / 2.0 TB/s = 0.01 seconds = 10 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Data movement alone imposes a 10 ms hard minimum floor, limiting max throughput.**
