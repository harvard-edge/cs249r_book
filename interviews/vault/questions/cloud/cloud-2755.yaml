title: Alert Strategy Redesign
scenario: 'After an incident post-mortem, leadership demands "zero missed critical alerts." The team proposes: (A) lower all thresholds to catch everything, (B) implement alert severity tiers with different routing, (C) replace threshold alerts with SLO burn-rate alerts.'
question: "Which alerting strategy best addresses the demand for zero missed critical alerts without worsening fatigue?"
details:
  realistic_solution: |
    Option A (lower thresholds): Creates more alerts, not fewer misses. If operators already ignore 200 alerts/day, they will ignore 500. The critical alert is still noise. This approach has the opposite of the intended effect. Option B (severity tiers + routing): Good first step. Critical alerts go to PagerDuty (must acknowledge), warnings to Slack (review in 1 hour), info to dashboard (batch review). But the key challenge is correctly classifying severity — if too many alerts are classified as critical, you get PagerDuty fatigue instead of Slack fatigue. Works well only if critical tier has <5 alerts/day. Option C (SLO burn-rate alerts): Instead of alerting on instantaneous threshold breaches, alert when the error budget is burning faster than sustainable. A brief accuracy dip does not alert; a sustained degradation does. This naturally filters transient noise. Recommendation: C as the foundation (eliminates most false positives), B for routing (ensures critical alerts reach the right person immediately). Critical tier should be limited to SLO burn rate >10x, ensuring <3 critical alerts per week.
  common_mistake: |
    **The Pitfall:** Lowering thresholds (A) to catch everything.
    **The Rationale:** Engineers assume lower thresholds equal fewer missed incidents, but ignore human psychology.
    **The Consequence:** Alert fatigue gets worse. The critical alert is still missed because it is buried in 500 daily alerts instead of 200.
  napkin_math: |
    - **Option A:** 200 -> 500 alerts, same miss rate due to fatigue.
    - **Option B:** 200 alerts split into 5 critical + 45 warn + 150 info. (Better routing, but classification is hard).
    - **Option C:** 200 -> 30 alerts total, near-zero false criticals.
    - **Result:** C as foundation + B for routing is optimal, reducing noise while guaranteeing critical visibility.
