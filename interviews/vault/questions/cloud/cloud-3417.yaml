title: H100 Tensor Parallelism and Communication Overlap
scenario: You are tasked with deploying a large transformer model requiring tensor parallelism across 8 H100 GPUs connected by NVLink. A critical layer in your model uses column partitioning for its weight matrix.
question: What communication challenges does column-partitioned tensor parallelism create on H100s, and how would you overlap communication with compute?
details:
  realistic_solution: To maximize communication-computation overlap, one would strategically pipeline computation and communication. For a column-partitioned linear layer, the partial results on each GPU can be computed first. Then, an all-gather operation can be initiated for the full output, which overlaps with the computation of the subsequent, independent layers or the next stage of the current layer. Utilizing the H100's high NVLink bandwidth (e.g., 900 GB/s bidirectional for SXM5) is crucial, ensuring that communication is as efficient as possible. Advanced techniques like asynchronous communication primitives and careful workload balancing across GPUs would be employed.
  common_mistake: |
    **The Pitfall:** Underestimating the latency and bandwidth costs of inter-GPU communication.
    **The Rationale:** Engineers design fine-grained tensor parallelism that serializes computation and communication.
    **The Consequence:** Failing to utilize the high compute capabilities due to frequent synchronization stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 H100 GPUs via NVLink (900 GB/s bidirectional).
       - All-Gather total size: 10 GB.
    2. **Calculations:**
       - Chunk per GPU: 10 GB / 8 = 1.25 GB.
       - Data Received: 7 * 1.25 GB = 8.75 GB.
       - Transfer Time: 8.75 GB / 900 GB/s = 0.0097 seconds (9.7ms).
    3. **Conclusion & Interpretation:** **Result: Compute-Communication-Overlap.** Overlapping this 9.7ms transfer with independent computation is critical to prevent pipeline stalls.
