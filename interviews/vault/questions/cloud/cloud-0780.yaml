title: Global Scale Real-Time Two-Tower Recommendation
scenario: We are re-architecting the YouTube short-video recommendation retrieval system to support 50
  billion candidates globally, served from 12+ datacenters. We want to use a massive 500B parameter two-tower
  model to improve relevance. How do you design the embedding table distribution and serving infrastructure
  on TPU v5e pods to ensure sub-50ms p99 latency while maximizing TPU High-Bandwidth Memory (HBM) utilization
  across global regions?
question: "How would you serve 50B Shorts candidates with a 500B two-tower model on TPU v5e while meeting sub-50ms p99 globally?"
details:
  realistic_solution: Completely decouple the item and user towers. The item tower's embeddings for the
    50B candidates are pre-computed entirely offline during batch jobs and stored in a globally distributed,
    sharded in-memory vector database (e.g., ScaNN / Vertex AI Vector Search) with aggressive regional
    caching for trending shorts.
  common_mistake: Attempting to deploy and serve both the user and item towers dynamically in real-time.
    Candidates will try to fit the entire 500B parameter model across multiple TPUs using Pipeline Parallelism
    for serving, which results in catastrophic HBM fragmentation, massive cross-node communication overhead,
    and missed 50ms latency SLAs.
  napkin_math: '- **Model Size:** 500B params. Assume the user tower is 100B params. | - **Memory:** 100B
    params * 1 byte (INT8) = 100GB of weights. | - **Hardware:** A single TPU v5e has 16GB HBM. We need
    at least `ceil(100/16) = 7` chips just for weights. Using 8-way TP fits the model with ~28GB left
    across the 8 chips for KV-cache/activation memory. | - **Vector DB:** 50B items * 256 dimensions *
    4 bytes (FP32) = 51.2 TB. Sharded across 100 in-memory nodes (512GB RAM each) per region. | - **Latency:**
    TPU User Embedding (~15ms) + Network Hop (~5ms) + ScaNN Top-K ANN Retrieval (~10ms) = ~30ms, safely
    within the 50ms p99 SLA.'
