title: Datacenter PUE Savings Calculation
scenario: A training cluster draws 5 MW of IT power at 70% average utilization. It runs in a datacenter with PUE 1.4. A cooling retrofit reduces PUE to 1.15 and costs $3 million. Electricity is $0.08/kWh. Estimate annual savings and payback time.
question: What annual energy savings and payback time result from reducing PUE from 1.4 to 1.15 for a 5 MW IT load?
details:
  realistic_solution: Facility power drops from 7.0 MW to 5.75 MW, saving 1.25 MW continuously. Annual energy savings are 1.25 x 8,760 = 10,950 MWh. At $0.08/kWh, annual savings are about $876K. A $3M retrofit pays back in about 3.4 years.
  common_mistake: Applying utilization twice or forgetting that PUE multiplies IT load, not peak nameplate alone.
  napkin_math: Before = 5 MW x 1.4 = 7.0 MW. After = 5 x 1.15 = 5.75 MW. Savings = 1.25 MW x 8,760 h x $80/MWh = $876,000/year. Payback = 3,000,000 / 876,000 = 3.4 years.
