title: Cloud Qlora L3 0
scenario: You are fine-tuning a 70B model with QLoRA (NF4 base, FP16 rank-32 adapters on Q/K/V/O projections,
  80 layers, hidden dim 8192). Calculate the total memory footprint including optimizer states.
details:
  realistic_solution: 'Base model NF4: 70B × 0.5 bytes = 35 GB. LoRA adapter params per layer: 4 projections
    × 2 matrices (A: dim×rank + B: rank×dim) = 4 × (8192×32 + 32×8192) × 2 bytes = 4 × 2 × 8192 × 32 ×
    2 = 4.19 MB per layer. 80 layers: 4.19 × 80 = 335 MB. AdamW optimizer on adapters: 335 MB × 6 (FP32
    copy + momentum + variance, each 2x FP16 size) = 2.01 GB. Gradients: 335 MB. Activations (with gradient
    checkpointing): ~8 GB. Total: 35 + 0.335 + 2.01 + 0.335 + 8 = 45.7 GB. Fits on a single 48 GB GPU.'
  common_mistake: Forgetting optimizer states for the LoRA adapters. Even though adapters are small (~335
    MB), AdamW optimizer states are 6x larger (~2 GB), which can be the difference between fitting and
    not fitting on a 48 GB GPU.
  napkin_math: 'NF4 base: 70B × 0.5 = 35 GB. LoRA params: 80 layers × 4 proj × 2 × 8192 × 32 × 2B = 335
    MB. AdamW: 335 MB × 6 = 2 GB. Activations: ~8 GB. Total: 35 + 0.335 + 2 + 0.335 + 8 = 45.7 GB. Fits
    48 GB.'
