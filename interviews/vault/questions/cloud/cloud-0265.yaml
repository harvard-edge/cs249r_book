title: 'The Energy Cost of Precision: Extreme Quantization'
scenario: An LLM inference request executes a large matrix multiplication.
question: "From a pure energy consumption perspective, what is the approximate energy savings per operation if you can perform the compute using INT8 versus FP32?"
details:
  realistic_solution: An FP32 operation consumes roughly 18 times more energy than an INT8 operation. This is a fundamental physical invariant. The energy cost of a digital operation is proportional to the number of transistors switching, and the hardware for an 8-bit integer multiplication is far simpler than that for a 32-bit floating-point multiplication, which must handle a wide dynamic range via exponents and mantissas.
  common_mistake: |
    **The Pitfall:** Confusing the 4x memory footprint reduction (32 bits vs 8 bits) with the energy savings.
    **The Rationale:** Candidates assume that energy scales linearly with byte size, ignoring that floating-point multipliers require vastly more transistors to handle exponents and mantissas than integer multipliers.
    **The Consequence:** Underestimating the thermal and power benefits of extreme quantization at data center scale.
  napkin_math: |
    - The energy required to perform arithmetic operations scales with the hardware complexity of the data format.
    - Integer arithmetic (INT8) is physically much simpler than floating-point math (FP32), which requires alignment and exponent tracking.
    - A single FP32 operation requires roughly 18x more energy than an INT8 operation.
    - **Swapping FP32 for INT8 cuts compute energy by ~94%.**
  options:
  - ~4x more energy
  - ~3.4x more energy
  - ~18x more energy
  - The energy is roughly the same
