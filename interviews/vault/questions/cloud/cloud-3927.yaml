title: 1F1B vs GPipe — What 1F1B Actually Saves
scenario: Your 4-stage pipeline-parallel training of a 70B model on H100s uses 8 micro-batches per global
  step. A colleague claims that switching from GPipe to 1F1B (one-forward-one-backward) will reduce the
  pipeline bubble. Evaluate the claim quantitatively and identify what 1F1B does in fact change.
question: For 4 stages and 8 micro-batches, what is the bubble fraction under GPipe versus 1F1B, and what does 1F1B actually save if not bubble time?
details:
  realistic_solution: 'GPipe and 1F1B share the *same* steady-state bubble fraction: (k-1)/(m + k - 1).
    For k = 4 and m = 8 that is 3/11 ≈ 27.3% under both schedules. 1F1B''s real win is peak activation
    memory: in GPipe, all m micro-batches'' forward activations are kept resident until the global flush,
    giving O(m) activation memory. In 1F1B, after the warmup (k-1 forwards), each forward is followed
    by a backward that releases that micro-batch''s activations, so peak activation memory is O(k). At
    k=4, m=8 this is a 2x reduction in stored activations per stage, which directly determines whether
    the 70B model fits in HBM.'
  common_mistake: 'Claiming 1F1B reduces the bubble fraction. It does not: both schedules share (k-1)/(m
    + k - 1). The improvement is in peak activation memory (O(m) → O(k)), which is what enables larger
    micro-batch counts and therefore *indirectly* shrinks the bubble fraction by allowing larger m.'
  napkin_math: 'k = 4, m = 8. GPipe bubble fraction = 1F1B bubble fraction = (4-1) / (8 + 4 - 1) = 3/11
    ≈ 27.3%. Activation memory: GPipe stores 8 micro-batches'' forward activations at peak; 1F1B stores
    at most k = 4. If each micro-batch''s per-stage activation is ~5 GB, GPipe peak is 40 GB versus 1F1B''s
    20 GB — only 1F1B leaves headroom on an 80 GB H100 for weights, gradients, and the optimizer shard.'
