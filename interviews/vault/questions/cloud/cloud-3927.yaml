title: 1F1B vs GPipe — What 1F1B Actually Saves
scenario: 'Your 4-stage pipeline-parallel training of a 70B model uses 8 micro-batches per global step. A colleague claims that switching from GPipe to 1F1B (one-forward-one-backward) will reduce the pipeline bubble.'
question: 'For 4 stages and 8 micro-batches, what is the bubble fraction under GPipe versus 1F1B, and what does 1F1B actually save?'
details:
  realistic_solution: 'GPipe and 1F1B share the *same* steady-state bubble fraction: (k-1)/(m + k - 1). For k = 4 and m = 8 that is 3/11 ≈ 27.3% under both schedules. 1F1B''s real win is peak activation memory: in GPipe, all m micro-batches'' forward activations are kept resident until the global flush, giving O(m) activation memory. In 1F1B, after the warmup (k-1 forwards), each forward is followed by a backward that releases that micro-batch''s activations, so peak activation memory is O(k). At k=4, m=8 this is a 2x reduction in stored activations per stage, which directly determines whether the 70B model fits in HBM.'
  common_mistake: |
    **The Pitfall:** Claiming 1F1B reduces the pipeline bubble fraction compared to GPipe.
    **The Rationale:** Because 1F1B sounds like a more advanced, overlapping schedule, candidates incorrectly assume it improves raw temporal efficiency.
    **The Consequence:** Candidates misunderstand the fundamental memory limits of pipeline parallelism; 1F1B's true value is reducing peak activation memory, which indirectly allows for larger micro-batch counts.
  napkin_math: |
    - **Bubble Fraction:** Both share `(k - 1) / (m + k - 1)`. For k=4, m=8: 3 / 11 = **~27.3% for both.**
    - **GPipe Activation Memory:** Stores all `m` (8) micro-batches' forward activations at peak (e.g., 8 * 5GB = 40GB).
    - **1F1B Activation Memory:** Stores at most `k` (4) micro-batches' activations at peak (e.g., 4 * 5GB = 20GB).
    - **Result:** **2x reduction in stored activations**, freeing critical HBM for model weights.
