title: Data Loading Bottleneck Analysis
scenario: 'Training reads 2TB of images per epoch. Each GPU processes data at 3 GB/s during training.
  Without GPUDirect Storage: NVMe read = 6 GB/s, CPU bounce buffer = 4 GB/s effective, PCIe to GPU = 12
  GB/s. With GPUDirect Storage: NVMe direct to GPU = 5.5 GB/s. For a 4-GPU node, calculate epoch time
  with and without GPUDirect.'
question: "For the 4-GPU node reading 2TB per epoch, what are epoch times with and without GPUDirect Storage?"
details:
  realistic_solution: 'Without GPUDirect Storage: Pipeline bottleneck = min(NVMe, bounce buffer, PCIe)
    = min(6, 4, 12) = 4 GB/s for the storage-to-GPU path. But 4 GPUs each need 3 GB/s = 12 GB/s aggregate
    demand. Supply is 4 GB/s (single NVMe). Storage-to-GPU is 3x bottlenecked. Epoch time = 2 TB / 4 GB/s
    = 500 seconds (limited by bounce buffer). With GPUDirect Storage: Direct path = 5.5 GB/s from NVMe
    to GPU. Still limited by single NVMe at 6 GB/s read speed. Effective rate: min(6, 5.5) = 5.5 GB/s.
    Epoch time = 2 TB / 5.5 GB/s = 364 seconds. Speedup: 500/364 = 1.37x. But the real fix is multiple
    NVMe drives: 4 NVMe × 5.5 GB/s = 22 GB/s > 12 GB/s demand. Epoch time: 2 TB / 12 GB/s (now compute-bound)
    = 167 seconds.'
  common_mistake: Adding GPUDirect Storage without adding NVMe drives. A single NVMe caps at 6 GB/s —
    GDS removes the CPU bottleneck but the storage device itself often becomes the new bottleneck.
  napkin_math: 'Without GDS: 4 GB/s bottleneck → 500s/epoch. With GDS: 5.5 GB/s → 364s (1.37x). With GDS
    + 4 NVMes: 12 GB/s (GPU-bound) → 167s (3x total).'
