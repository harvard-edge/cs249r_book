title: Diagnosing CPU-GPU Inference Pipeline Bottlenecks
scenario: Your team is deploying a vision model inference service. The current sequential pipeline processes one image at a time: CPU JPEG decoding and resizing takes 15ms, PCIe host-to-device transfer takes 5ms, and GPU compute takes 10ms. The overall latency is 30ms per image, yielding ~33 FPS.
question: How can you restructure the CPU preprocessing, H2D transfer, and GPU compute pipeline to double throughput on the T4?
details:
  realistic_solution: Implement pipelined execution using CUDA streams. Overlap the CPU preprocessing of frame N+2, the PCIe transfer of frame N+1, and the GPU execution of frame N. The new throughput is bottlenecked by the slowest stage (CPU at 15ms) rather than the sum of all stages.
  common_mistake: |
    **The Pitfall:** Resorting to model compression or hardware upgrades instead of optimizing the execution pipeline.
    **The Rationale:** Candidates often overlook asynchronous execution capabilities (like CUDA streams) and assume the sum of individual stage latencies is a hard lower bound.
    **The Consequence:** Leaving significant performance on the table by not utilizing concurrent hardware resources, leading to unnecessary engineering effort or hardware costs.
  napkin_math: |
    1. **Sequential Baseline:** Time per frame = 15ms (CPU) + 5ms (PCIe) + 10ms (GPU) = 30ms. Throughput = 1000 / 30 = 33.3 FPS.
    2. **Pipelined Execution:** With CUDA streams overlapping stages, the bottleneck becomes the slowest single stage.
    3. **New Bottleneck:** max(15ms, 5ms, 10ms) = 15ms.
    4. **New Throughput:** 1000ms / 15ms = **66.6 FPS** (a 2x speedup).
