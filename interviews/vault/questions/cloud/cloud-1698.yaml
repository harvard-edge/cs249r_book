title: Diagnosing CPU-GPU Inference Pipeline Bottlenecks
scenario: 'Your team is deploying a vision model inference service on a cloud instance with an NVIDIA
  T4 GPU. The current sequential pipeline processes one image at a time: CPU JPEG decoding and resizing
  takes 15ms, PCIe host-to-device transfer takes 5ms, and GPU compute takes 10ms. The overall latency
  is 30ms per image, yielding ~33 FPS. Your manager asks you to analyze the execution trace and double
  the throughput without modifying the model architecture or upgrading the hardware.'
details:
  realistic_solution: Implement pipelined execution using CUDA streams. Overlap the CPU preprocessing
    of frame N+2, the PCIe transfer of frame N+1, and the GPU execution of frame N. The new throughput
    is bottlenecked by the slowest stage (CPU at 15ms) rather than the sum of all stages.
  common_mistake: Candidates often suggest model compression (quantization/pruning) or batching, missing
    the opportunity to analyze the idle time in the sequential execution trace and utilize asynchronous
    data transfers.
  napkin_math: 'Sequential: Time/frame = 15 + 5 + 10 = 30ms (33.3 FPS). Pipelined: Time/frame = max(15,
    5, 10) = 15ms. Throughput = 1000ms / 15ms = 66.6 FPS (a 2x speedup).'
