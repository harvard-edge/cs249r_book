title: Optimizing KV-Cache Memory on AMD MI300X for Large Language Models
scenario: You are deploying a 70-billion parameter transformer-based Large Language Model (LLM) on an
  AMD MI300X accelerator, which has 192 GB of HBM3 memory. The model uses FP16 precision for both weights
  and KV cache. Assume the model has 80 layers, a hidden dimension (`d_model`) of 8192, and each attention
  head has a dimension (`d_head`) of 128. Your goal is to maximize throughput while staying within the
  HBM capacity. If the model weights themselves consume 140 GB of HBM3 memory, what is the maximum sequence
  length you can process at a batch size of 8 before encountering an Out-of-Memory (OOM) error due to
  KV-cache growth? Provide the formula and the calculated maximum sequence length.
details:
  realistic_solution: To handle large sequence lengths and batch sizes, techniques like PagedAttention
    (which allows for non-contiguous memory allocation), KV-cache quantization (e.g., to INT8), or implementing
    sliding window attention mechanisms would be considered. Precise memory profiling and capacity planning
    are critical for efficient deployment.
  common_mistake: Underestimating the memory footprint of the KV-cache, especially its linear growth with
    sequence length and batch size, and not properly accounting for the memory consumed by model weights.
    A common error is neglecting the '2' factor for Key and Value tensors or incorrect byte calculation
    for FP16.
  napkin_math: "1. Available HBM for KV-cache = Total HBM - Model Weights Memory = 192 GB - 140 GB = 52\
    \ GB.\n2. KV-cache memory per token per layer (FP16 Key + Value): 2 * d_model * 2 bytes (FP16) = 2\
    \ * 8192 * 2 bytes = 32,768 bytes/token/layer.\n3. KV-cache memory per token across all layers: 32,768\
    \ bytes/token/layer * 80 layers = 2,621,440 bytes/token = 2.5 MB/token.\n4. Total KV-cache memory\
    \ needed for a given sequence length (L) and batch size (B): L * 2.5 MB/token * B.\n5. Set up the\
    \ equation: L * 2.5 MB/token * 8 (batch size) = 52 GB (available HBM in MB).\n   L * 20 MB = 52 *\
    \ 1024 MB.\n   L * 20 MB = 53,248 MB.\n   L = 53,248 / 20 = 2662.4.\n6. Maximum sequence length (L)\
    \ = 2662 tokens (since sequence length must be an integer)."
