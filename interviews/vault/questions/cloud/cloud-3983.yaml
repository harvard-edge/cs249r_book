title: Pinned Buffer Sizing For Embedding DMA
scenario: A recommender inference job must stream 24 GB of cold embedding rows from
  host memory to an MI300X during each minute of peak traffic. PCIe Gen5 x16 provides
  about 64 GB/s theoretical bandwidth, but effective DMA throughput with pinned buffers
  is 50 GB/s. Size the transfer time per minute and the minimum double-buffer size
  for 200 ms compute chunks.
question: What DMA transfer time and double-buffer size are needed for 24 GB/min of
  embeddings at 50 GB/s with 200 ms compute chunks?
details:
  realistic_solution: The minute-level transfer time is 24 GB / 50 GB/s = 0.48 seconds,
    so bandwidth is sufficient on average. For 200 ms compute chunks, the stream rate
    is 24 GB / 60 s = 0.4 GB/s, so each 200 ms chunk needs about 80 MB of data. A
    double buffer needs at least 160 MB plus padding.
  common_mistake: Using theoretical PCIe bandwidth without pinned buffers, or sizing
    one buffer but forgetting that overlap requires two buffers.
  napkin_math: Rate = 24/60 = 0.4 GB/s. Chunk data = 0.4 x 0.2 = 0.08 GB = 80 MB.
    Double buffer = 160 MB. Total transfer time per minute = 24/50 = 0.48 s.
