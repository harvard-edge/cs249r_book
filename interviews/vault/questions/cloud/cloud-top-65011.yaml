title: Multi-Die Power Delivery Network Design for AI Chiplet
scenario: A chiplet AI accelerator with 4 compute dies and 2 HBM stacks on a silicon interposer experiences
  voltage droop of 8% during matrix multiply bursts, causing frequency throttling. Design a power delivery
  network to reduce droop to under 3%.
question: "How would you design the PDN for the 4-compute-die, 2-HBM chiplet package to reduce matrix-multiply voltage droop from 8% to under 3%?"
details:
  realistic_solution: 'Address droop at each hierarchy: (1) On-die decap: maximize MOM capacitor fill
    in all metal layers above active logic — target 10 nF/mm² on N5. (2) Package-embedded capacitors:
    thin-film capacitors in package substrate (100 pF/mm²), placed directly under hot compute regions.
    (3) Active voltage regulator (AVR) on package: integrated VRM with <2ns response time, 100A/ns slew
    rate. (4) Structured power mesh: 4um pitch power grid on M8/M9 to minimize IR drop. Budget: 8% droop
    at 750A transient current implies 8mΩ effective PDN impedance. Target: 3% → need 2.25mΩ. Achieve with
    on-die decap (reduces high-freq component) + faster VRM.'
  common_mistake: Adding bulk capacitance at the PCB level to solve on-package droop. PCB decoupling caps
    have ~10ns response time, but on-package voltage droop during burst workloads occurs in 1-2ns. The
    effective series inductance (ESL) of PCB capacitors makes them ineffective for nanosecond-scale droop.
  napkin_math: 'Compute die: 1V supply, 300A peak per die. IR drop = I * Z_PDN. At 8% droop: Z = 0.08V
    / 300A = 0.27mΩ per die. For 4 dies in parallel sharing supply: Z_total = 0.27/4 = 0.067mΩ. Wait —
    8% at 1V = 80mV droop. 80mV / 300A = 0.27mΩ per die. Adding 50 μF on-die decap with ESL 100pH: impedance
    at 1GHz = 2π*1G*100pH + 1/(2π*1G*50μF) = 0.63mΩ + 3.2μΩ ≈ 0.63mΩ. On-die decap dominates at lower
    frequency; need VRM improvement for full solution.'
