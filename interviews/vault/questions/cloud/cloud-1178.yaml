title: Diagnosing DVFS Stragglers in AllReduce
scenario: 'You are training a 65B model on 64 GPUs. Despite perfectly balanced data parallel batches, step time intermittently spikes from 850ms to over 1200ms. The profiler shows a few GPUs hitting their 85C thermal limit and dropping clock speeds from 1410 MHz to 1050 MHz.'
question: 'What causes the intermittent 1200ms spikes, and what system-level mitigation stabilizes iteration time?'
details:
  realistic_solution: 'The root cause is Dynamic Voltage and Frequency Scaling (DVFS) reacting to thermal limits. In synchronous training, AllReduce waits for the slowest straggler. Lock the application clock of all GPUs to a sustainable frequency (e.g., 1200 MHz) using nvidia-smi. This sacrifices peak TFLOPs to guarantee predictable step times.'
  common_mistake: |
    **The Pitfall:** Suggesting to improve physical cooling or reduce the global batch size.
    **The Rationale:** Candidates correctly identify heat but miss the architectural reality of synchronous collectives.
    **The Consequence:** Ignoring that DVFS creates unpredictable stragglers that block operations, failing to apply clock locking.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Boost: 800ms compute at 1410 MHz.
       - Throttled: 1050 MHz.
       - Mitigation: Locked 1200 MHz.
    2. **Calculations:**
       - Throttled Compute: 800 * (1410 / 1050) = 1,074 ms.
       - Straggler Penalty: 1,074 ms wait wastes 274 ms per iteration for all 64 GPUs.
       - Mitigation Compute: 800 * (1410 / 1200) = 940 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 940 ms consistent step vs 1,074 ms spiked step.**
       - **Conclusion: Thermal-Bound; clock-locking prevents straggler barrier wait.**