title: LLM Admission Control for Tail Latency
scenario: A fleet of A100 GPUs serves a generative API. Arrival rates are Poisson.
  Because user prompts vary wildly, token generation times are highly heavy-tailed,
  causing random queue explosions.
question: Design a queueing-aware admission control policy that limits tail latency
  while keeping the GPUs saturated.
visual:
  kind: svg
  path: cloud-4501.svg
  alt: A graph showing an uncontrolled queue growing exponentially versus an admission-controlled
    queue flattening out.
  caption: Controlled vs Uncontrolled Queue
details:
  realistic_solution: Implement an active queue management policy based on Little's
    Law and expected token length. Instead of queuing infinitely, track the estimated
    total tokens currently in-flight across the A100s. If (Expected In-Flight Work)
    > (Max Allowable Latency * GPU Token Rate), immediately return a 429 Too Many
    Requests error. This caps the queueing delay for admitted requests.
  common_mistake: Using a simple request-count limit instead of a token-based work
    estimation, which fails heavily when request sizes are heavy-tailed.
  napkin_math: L = lambda * W (Little's Law)
