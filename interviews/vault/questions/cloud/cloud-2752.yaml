title: Monitoring Architecture for Multi-Model Fleet
scenario: 'Your platform grew from 10 to 500 models. The existing flat monitoring (all metrics in one
  Grafana dashboard) is unusable — too many alerts, no clear escalation path. Design a hierarchical monitoring
  architecture and evaluate: (A) per-model dashboards + team ownership, (B) automated anomaly detection
  with aggregated fleet view, (C) SLO-based monitoring with error budgets.'
question: "How would you design monitoring for 500 models, and which of per-model dashboards, anomaly detection, or SLOs should be primary?"
details:
  realistic_solution: 'Option A (per-model dashboards): Does not scale. At 500 models, you need 500 dashboard
    owners. Teams ignore dashboards for models they rarely touch. Alert fatigue is guaranteed. Option
    B (automated anomaly detection + fleet view): Uses statistical methods to detect anomalies without
    per-model thresholds. Fleet-level view shows aggregate health (e.g., ''97% of models healthy''). Anomaly
    detection surfaces the 3% that need attention. Good at catching outliers but may generate false positives
    on seasonal patterns. SLO-based monitoring with error budgets: Define SLOs per model tier (e.g., Tier
    1 models: 99.9% accuracy SLO, Tier 2: 99%). Track error budgets — if a model consumes >50% of its
    error budget in a day, alert. No alert noise from healthy models. Clear escalation: error budget burn
    rate determines urgency. Recommendation: SLO-based tiers as the primary framework, augmented with
    anomaly detection (B) for fleet-wide coverage. This gives clear priorities (SLO violations) plus coverage
    for unknown-unknowns (anomaly detection). Group models into 3-4 tiers to manage complexity.'
  common_mistake: Building per-model dashboards (A) at 500 models. This creates 500 dashboards that nobody
    looks at — alert fatigue becomes unmanageable.
  napkin_math: 'A: 500 dashboards = unmanageable. B (automated anomaly detection): 1 fleet view + anomaly
    alerts (~5-10/day). SLO-based tiers: ~10-15 SLO breach alerts/day across 500 models. SLO-based + B
    combined is optimal.'
