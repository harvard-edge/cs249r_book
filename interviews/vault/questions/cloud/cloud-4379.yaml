title: Disparate Impact Testing for LLM Embedding Spaces
scenario: An embedding model is used for resume screening: candidates are ranked by cosine similarity of their resume embedding to a job description embedding. A legal team raises concerns about disparate impact. You measure average cosine similarity for Group A (majority) = 0.81 and Group B (minority) = 0.74. The EEOC 4/5ths rule requires the selection rate of the protected group to be at least 80% of the majority group.
question: If you select the top 20% of 10,000 candidates, what are the Group A and B selection rates and does the embedding system violate the 4/5ths rule?
details:
  realistic_solution: 'Estimate the selection threshold for top 20% of the combined population. Combined mean approx 0.78, std 0.06. 80th percentile: 0.78 + 0.842*0.06 = 0.831. Group A selection rate: P(X > 0.831 | mean=0.81, std=0.06) = P(Z > 0.35) = 36.3%. Group B selection rate: P(X > 0.831 | mean=0.74, std=0.06) = P(Z > 1.517) = 6.5%. Disparate impact ratio: 6.5/36.3 = 17.9% — far below the 80% threshold. The system has severe disparate impact despite appearing acceptable by mean score comparison. Fix options: (1) group-conditional thresholds calibrated so each group selects 20% of its own distribution, (2) audit the job description embedding for demographic bias using WEAT (Word Embedding Association Test), (3) retrain embeddings with adversarial debiasing loss that penalizes demographic predictability from the embedding space.'
  common_mistake: |
    **The Pitfall:** Applying the EEOC 4/5ths rule directly to the mean similarity scores.
    **The Rationale:** Candidates see 0.74/0.81 = 91% and mistakenly believe the system clears the >80% legal hurdle.
    **The Consequence:** They fail to realize the 4/5ths rule applies to selection rates at the tail, masking severe disparate impact that exposes the company to legal liability.
  napkin_math: |
    - Threshold for top 20% of total pool (mean ~0.78, std 0.06): 0.78 + 0.842 × 0.06 = 0.831.
    - Group A Selection Rate: P(X > 0.831 | μ=0.81, σ=0.06) = P(Z > 0.35) = 36.3%.
    - Group B Selection Rate: P(X > 0.831 | μ=0.74, σ=0.06) = P(Z > 1.517) = 6.5%.
    - Disparate Impact Ratio: 6.5% / 36.3% = **17.9%**.
    - **Conclusion:** 17.9% is vastly below the 80% legal requirement, proving massive disparate impact.
