title: Production-Weighted Model Quality Benchmarking
scenario: You are benchmarking an INT4-quantized 8B parameter model. The baseline FP16 model achieves 88.5% overall production accuracy. Your production workload is 70% short-context (INT4 drops to 88%) and 30% long-context RAG (INT4 drops to 60%).
question: "What is the INT4 model's production-weighted accuracy, and what RAG accuracy is needed to keep degradation under 2% relative to the baseline?"
details:
  realistic_solution: |
    Calculate the production-weighted accuracy. The INT4 expected accuracy drops by 8.9%. To keep the overall degradation under 2%, long-context RAG accuracy must be improved to at least 83% using outlier-aware quantization techniques like AWQ or SmoothQuant.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate public benchmark scores.
    **The Rationale:** Candidates fail to weight accuracy by actual production request distribution.
    **The Consequence:** Deploying a model with severe regressions in critical sub-populations, breaking long-context features.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 88.5%.
       - Short-context: 70% weight, 88% INT4 accuracy.
       - Long-context RAG: 30% weight, 60% INT4 accuracy.
       - Max degradation: 2%.
    2. **Calculations:**
       - INT4 Expected Accuracy = (0.70 * 0.88) + (0.30 * 0.60) = 0.796 (79.6%).
       - Accuracy Drop = 88.5% - 79.6% = 8.9%.
       - Target Accuracy = 88.5% - 2.0% = 86.5%.
       - Required RAG (X): (0.70 * 0.88) + (0.30 * X) = 0.865
       - 0.616 + 0.30X = 0.865  -> 0.30X = 0.249  -> X = 0.83 (83%).
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Bound.** The RAG accuracy must hit 83% to stay within the 2% degradation SLA.
