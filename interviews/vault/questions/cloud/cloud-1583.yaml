title: Production-Weighted Model Quality Benchmarking
scenario: You are benchmarking an INT4-quantized 8B parameter model for a cloud-based coding assistant.
  The baseline FP16 model achieves 88.5% overall production accuracy. Your production workload distribution
  is 70% short-context completions (where INT4 accuracy slightly drops from 90% to 88%) and 30% long-context
  RAG queries (where INT4 accuracy drops significantly from 85% to 60% due to unhandled activation outliers).
  Standard public benchmarks (e.g., HumanEval) missed this regression because they heavily skew toward
  short contexts. Calculate the expected overall production accuracy of the INT4 model, and determine
  the minimum accuracy required on the long-context RAG slice to ensure the overall system degradation
  is strictly less than 2% relative to the FP16 baseline.
details:
  realistic_solution: Calculate the production-weighted accuracy to reveal the true degradation. The INT4
    model's expected overall accuracy drops by 8.9%. To keep the overall degradation under 2%, the long-context
    RAG accuracy must be improved to at least 83% (e.g., by using outlier-aware quantization techniques
    like AWQ or SmoothQuant).
  common_mistake: Candidates often rely solely on aggregate public benchmark scores without weighting
    the accuracy by the actual production request distribution, missing severe regressions in critical
    sub-populations like long-context generation.
  napkin_math: 'Baseline Accuracy = (0.70 * 0.90) + (0.30 * 0.85) = 0.885 (88.5%).

    INT4 Expected Accuracy = (0.70 * 0.88) + (0.30 * 0.60) = 0.796 (79.6%).

    Accuracy Drop = 88.5% - 79.6% = 8.9%.

    Max Allowed Drop Target = 0.885 - 0.02 = 0.865.

    Required RAG Accuracy (X): (0.70 * 0.88) + (0.30 * X) = 0.865

    0.616 + 0.30X = 0.865 -> 0.30X = 0.249 -> X = 0.83 (83%).'
