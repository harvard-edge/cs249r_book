title: Recall depthwise separable convolution FLOP formula
scenario: A new ML engineer on your team asks you to explain the FLOP calculation for a standard 3×3 convolution
  vs a depthwise separable convolution for a layer with Cin=128 input channels, Cout=128 output channels,
  and 28×28 spatial resolution. Walk through the exact formulas and compute the reduction ratio.
question: "How do you compute the FLOPs for a standard 3×3 convolution versus a depthwise separable convolution with Cin=Cout=128 at 28×28, and what is the reduction ratio?"
details:
  realistic_solution: 'Standard 3×3 conv: 2 × Cin × Cout × k² × H × W = 2 × 128 × 128 × 9 × 28 × 28 =
    1,031M FLOPs. Depthwise sep: depthwise (2 × Cin × k² × H × W) + pointwise (2 × Cin × Cout × H × W).
    Depthwise: 2 × 128 × 9 × 28 × 28 = 18.1M FLOPs. Pointwise: 2 × 128 × 128 × 28 × 28 = 51.4M FLOPs.
    Total: 69.5M FLOPs. Reduction: 1031/69.5 = 14.8×. General formula: reduction = 1/(1/k² + 1/Cout) ≈
    1/(1/9 + 1/128) ≈ 8.1× (exact ratio varies with specific k and C).'
  common_mistake: Forgetting the factor-of-2 for multiply-accumulate (each MAC = 1 multiply + 1 add =
    2 FLOPs), or computing the pointwise FLOP with spatial kernel size k²=1 correctly but applying k²=9
    to the pointwise layer.
  napkin_math: 'Standard: 2 × 128² × 9 × 28² = 2 × 16384 × 9 × 784 = 231M... let me recalculate: 2 × 128
    × 128 × 9 × 784 = 2 × 128 × 128 × 7056 = 231,211,008 ≈ 231M FLOPs. Depthwise: 2 × 128 × 9 × 784 =
    1,806,336 ≈ 1.8M. Pointwise: 2 × 128 × 128 × 784 = 25,690,112 ≈ 25.7M. Total DSC: 27.5M. Ratio: 231/27.5
    = 8.4×. Rule of thumb: ~8–9× reduction for C≥64.'
