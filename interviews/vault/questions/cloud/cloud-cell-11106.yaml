title: 'Kernel Fusion: Optimize Fusion Strategy for Multi-Query Attention'
scenario: You are optimizing Multi-Query Attention (MQA) on H100 (80GB HBM3, 3.35 TB/s) for a 13B LLM.
  MQA uses 1 KV head shared across 32 query heads, reducing KV cache by 32×. Compare fused vs unfused
  MQA kernel designs and quantify the bandwidth difference in decode mode.
question: "How do fused and unfused MQA kernels differ in decode mode for the 13B LLM, and how much KV-cache bandwidth does MQA save?"
details:
  realistic_solution: 'In decode mode, MQA loads 1 K head and 1 V head (vs 32 in MHA). This dramatically
    reduces KV cache reads. The fusion opportunity is different: fuse the query projection + attention
    score computation to avoid intermediate storage.'
  common_mistake: Applying the same analysis as full multi-head attention without accounting for the very
    different KV cache access pattern in MQA — 32× smaller KV reads changes the memory profile dramatically.
  napkin_math: 'Decode mode, batch=1, 1 new token. MHA: 32 Q heads × 128 dim + 32 K heads × seq_len ×
    128 + 32 V heads × seq_len × 128. For seq_len=2048: KV = 2 × 32 × 2048 × 128 × 2B = 33.6MB. MQA: 32
    Q + 1 K + 1 V: KV = 2 × 1 × 2048 × 128 × 2B = 1.05MB. KV read reduction: 33.6MB → 1.05MB = 32× less
    KV cache bandwidth. Fusion in MQA: fused Q projection + attention scores: read Q_weight (32 × 128
    × 4096 × 2B = 33.6MB) + input (1 × 4096 × 2B = 8KB) + K (1.05MB/2) → write attention scores (32 ×
    2048 × 2B = 131KB). Unfused: writes intermediate Q (32 × 128 × 2B = 8KB) before attention. Fusion
    saves: 8KB HBM write + 8KB read = 16KB — negligible. Main benefit of MQA: KV bandwidth reduction (31.55MB
    saved), not fusion.'
