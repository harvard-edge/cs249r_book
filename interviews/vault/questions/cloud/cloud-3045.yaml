title: 'Network Bandwidth Bottlenecks: Implement Ring-AllReduce Time Formula for H100 Cluster'
scenario: You are training a 13B model (26GB FP16 gradients) distributed across N=8 H100 GPUs on NVLink (900GB/s per GPU bidirectional).
question: What is the exact Ring-AllReduce time for the 13B model on 8 H100s, and is it compute-bound or communication-bound if step time is ~100ms?
details:
  realistic_solution: 'For a 13B model with FP16 gradients, the gradient size is 26GB. In a ring-AllReduce across N=8 GPUs, each GPU sends and receives 2*(N-1)/N of the total data. Data per GPU = 2 * (7/8) * 26GB = 45.5GB. The NVLink bandwidth is 900GB/s bidirectional, which means 450GB/s per direction. The exact AllReduce time is 45.5GB / 450GB/s = 101.1ms. If the compute step time is ~100ms, the communication time (101.1ms) is roughly equal to or slightly larger than the compute time, making the training communication-bound unless gradients are fully overlapped.'
  common_mistake: |
    **The Pitfall:** Using total bandwidth (N × 900GB/s) in the formula instead of per-GPU bandwidth.
    **The Rationale:** In ring-AllReduce, each GPU communicates only with 2 neighbors at a time (one receive, one send). The bandwidth of the ring is constrained by the individual link bandwidth, not the aggregate cluster bandwidth.
    **The Consequence:** Underestimating communication time by a factor of N, leading to overly optimistic scaling expectations.
  napkin_math: |
    - Gradient size M = 26 GB.
    - Data transferred per GPU = 2 * (N-1)/N * M = 2 * (7/8) * 26 GB = 45.5 GB.
    - NVLink bidirectional bandwidth = 900 GB/s (450 GB/s per direction).
    - Exact AllReduce time = 45.5 GB / 450 GB/s = 101.1 ms.
    - Compute step time is ~100 ms.
    - **101.1 ms > 100 ms, so the training is communication-bound unless gradients are fully overlapped.**
