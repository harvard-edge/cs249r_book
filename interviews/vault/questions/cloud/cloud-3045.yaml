title: 'Network Bandwidth Bottlenecks: Implement Ring-AllReduce Time Formula for H100
  Cluster'
scenario: Derive and apply the ring-AllReduce time formula for a 13B model (26GB FP16
  gradients) distributed across N=8 H100 GPUs on NVLink (900GB/s per GPU). Compute
  exact AllReduce time and compare against the compute step time to determine if training
  is compute-bound or communication-bound.
question: What bubble fraction and effective step time do you get for pp=8 and m=8
  micro-batches?
details:
  realistic_solution: 'Pipeline parallel bubble overhead with pp=8 stages and m=8
    microbatches: bubble fraction = 7/15 = 46.7%. Effective step time increases to
    ~161ms including bubble.'
  common_mistake: Using total bandwidth (N × 900GB/s) in the formula instead of per-GPU
    bandwidth; in ring-AllReduce, each GPU communicates only with 2 neighbors at a
    time.
  napkin_math: 'Pipeline parallel scheduling: 1.277 PFLOPs forward / 7.912 PFLOPs
    total budget → fraction = 16.1%. At 989 TFLOPS × 256 GPUs × MFU: 989T × 256 ×
    0.45 = 113.8 PFLOPs/s. Time = 7.912P / 113.8P = 69.5ms ≈ 161ms at 43% effective
    MFU. Bubble overhead for pp=8, pp-stages: bubble fraction = (p-1)/(m+p-1) where
    m=microbatches. With m=8, p=8: 7/15 = 46.7% bubble. Effective step time: 161ms
    (not ~100ms which underestimates bubble overhead).'
