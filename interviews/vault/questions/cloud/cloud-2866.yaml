title: Alert Volume Capacity
scenario: 'A model-serving platform has 180 microservices, each deployed in all 4
  regions. Each service gets three alerts: P99 latency, error rate, and memory pressure.
  Estimate the number of alert time series and explain the operational risk.'
question: How many alert time series result from 3 alerts across 180 services in 4
  regions?
details:
  realistic_solution: The system creates 3 x 180 x 4 = 2,160 alert time series. That
    may be reasonable if alerts are well tuned, but noisy thresholds can overwhelm
    on-call engineers. The design needs grouping and severity rules.
  common_mistake: Adding alerts everywhere without budgeting operational load and
    alert fatigue.
  napkin_math: 3 x 180 x 4 = 2,160 alert series.
