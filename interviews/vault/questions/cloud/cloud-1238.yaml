title: Diagnosing Model Exfiltration via HostPath
scenario: A proprietary 70B parameter LLM (FP16) is deployed on a multi-tenant cluster. Model weights are cached on local NVMe drives and mounted into pods using `hostPath` volumes for fast cold starts. An anomalous network egress spike of exactly 10 Gbps originates from a low-privilege tenant pod for ~2 minutes.
question: What caused the 10 Gbps, 2-minute egress spike, and what vulnerability allowed the 70B model weights to be stolen?
details:
  realistic_solution: The attacker compromised the tenant pod and exploited the poorly isolated `hostPath` mount (or a container breakout) to gain direct read access to the cached model weights on the host node. The 112-second egress spike perfectly matches the time needed to transfer the raw 140GB serialized safetensors files.
  common_mistake: |
    **The Pitfall:** Concluding the egress is an API-level extraction attack like model inversion or distillation.
    **The Rationale:** Security teams focus on ML-specific attacks, failing to realize the massive volume of data transferred doesn't match standard API text token responses.
    **The Consequence:** The true vulnerability (poorly isolated Kubernetes `hostPath` mounts) is ignored, leaving the intellectual property completely exposed.
  napkin_math: |
    * **Model Size:** 70B parameters × 2 bytes/param (FP16) = 140 GB.
    * **Egress Bandwidth:** 10 Gbps = 1.25 GB/s.
    * **Exfiltration Time:** 140 GB / 1.25 GB/s = 112 seconds (~1.9 minutes).
    * **Conclusion:** The 112-second spike perfectly aligns with the physical time needed to **download the raw 140GB model files** via a compromised hostPath.
