title: Privacy-Utility Tradeoff in LLM Fine-Tuning
scenario: "Your team fine-tunes GPT-2 (1.5B params) on private medical records using DP-SGD. At epsilon = 8.0 (moderate privacy), the model achieves 72% accuracy on medical NER. At epsilon = 1.0 (strong privacy), accuracy drops to 41% — barely above the 38% random baseline. The non-private baseline is 89%."
question: "Is full DP-SGD viable for GPT-2 medical NER at ε=1, and what alternatives improve the privacy-utility tradeoff?"
details:
  realistic_solution: "The noise in DP-SGD scales with the gradient clipping norm divided by batch size, multiplied by a factor dependent on epsilon. With 1.5B parameters, the gradient norm is large, requiring aggressive clipping that distorts learning signals. Alternatives: (1) DP-LoRA: freeze the base model, apply DP-SGD only to LoRA adapters (e.g., rank 16: 1.5B → ~10M trainable params). Sensitivity decreases by ~150x because gradients are over far fewer parameters. Expected accuracy at ε=1.0: 65-75%. (2) PATE: train an ensemble of teacher models on disjoint private data partitions, then use their aggregated (noisy) votes to label a public dataset for student training. Teachers never leave the private environment. (3) Pre-train on public medical text (PubMed, clinical trials), then DP fine-tune only the classifier head on private data — reducing trainable params to <1M. Expected accuracy: 80%+ at ε=1.0."
  common_mistake: |
    **The Pitfall:** Concluding that differential privacy is fundamentally incompatible with LLMs.
    **The Rationale:** Applying vanilla DP-SGD to all 1.5 billion parameters requires massive noise injection because sensitivity scales with model size.
    **The Consequence:** Abandoning privacy efforts entirely instead of utilizing parameter-efficient methods (like DP-LoRA) that radically reduce the noise requirement.
  napkin_math: |
    *   **Noise formula:** `σ = C × √(2 ln(1.25/δ)) / (ε × batch_size)`
    *   **Factor calculation:** √(2 × ln(1.25/1e-5)) = √(2 × 11.736) = √23.47 ≈ 4.84
    *   **Step Noise:** σ = 1.0 × 4.84 / 256 ≈ 0.0189 per parameter per step.
    *   **Full Model Impact:** 1.5B params × 0.0189 ≈ 28.3M absolute noise magnitude injected.
    *   **Result:** **DP-LoRA (10M params) reduces the noise dimensionality footprint by 150x, preserving learning signal.**
