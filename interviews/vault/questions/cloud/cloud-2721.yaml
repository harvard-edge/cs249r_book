title: Permanent Fault Impact on Training
scenario: A 256-GPU training run has been running for 72 hours when a permanent GPU fault is detected via an ECC uncorrectable error. Checkpoints are taken every 6 hours. System administration takes 20 minutes to replace the GPU, 15 minutes to load the checkpoint, and 10 minutes to reshard.
question: "After 72 hours of a 256-GPU run with 6-hour checkpoints, how long does recovery take from a permanent GPU fault?"
details:
  realistic_solution: 'The last checkpoint was at most 6 hours ago. On average, the failure occurs 3 hours after the last checkpoint (uniform distribution). Recovery timeline: (1) Detection + diagnosis: ~10 minutes (ECC error logged). (2) GPU replacement: 20 minutes (hot-swap or node replacement). (3) Load checkpoint: 15 minutes. (4) Reshard model across 256 GPUs: 10 minutes. Total downtime: 55 minutes. But the real cost is the lost training progress: 3 hours on average (halfway through checkpoint interval) across all 256 GPUs. Lost GPU-hours: 256 × 3 = 768 GPU-hours. At $3/GPU-hour, that is $2,304 in wasted compute. Total cost: 55 min downtime + 3h rollback = ~4 hours wall time lost.'
  common_mistake: |
    **The Pitfall:** Only counting the hardware replacement time.
    **The Rationale:** Candidates focus strictly on the system administration SLA (swapping the node) and forget the algorithmic state loss.
    **The Consequence:** The estimated time to completion (ETA) for the training job becomes highly inaccurate as fault frequencies increase.
  napkin_math: |
    - Hardware downtime: 10m (diag) + 20m (swap) + 15m (load) + 10m (reshard) = 55 minutes.
    - Expected rollback: 6-hour checkpoint interval implies an average of 3 hours of lost progress.
    - Lost compute: 256 GPUs * 3 hours = 768 wasted GPU-hours.
    - **Result: The true recovery cost is ~4 hours of wall time and 768 GPU-hours of wasted compute, vastly overshadowing the 55-minute hardware fix.**
