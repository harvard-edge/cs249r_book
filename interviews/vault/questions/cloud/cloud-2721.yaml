title: Permanent Fault Impact on Training
scenario: A 256-GPU training run has been running for 72 hours when a permanent GPU fault is detected
  via ECC uncorrectable error. Checkpoints are taken every 6 hours. Estimate the recovery time assuming
  20 minutes to replace the GPU, 15 minutes to load checkpoint, and 10 minutes to reshard.
question: "After 72 hours of a 256-GPU run with 6-hour checkpoints, how long does recovery take from a permanent GPU fault?"
details:
  realistic_solution: 'The last checkpoint was at most 6 hours ago. On average, the failure occurs 3 hours
    after the last checkpoint (uniform distribution). Recovery timeline: (1) Detection + diagnosis: ~10
    minutes (ECC error logged). (2) GPU replacement: 20 minutes (hot-swap or node replacement). (3) Load
    checkpoint: 15 minutes. (4) Reshard model across 256 GPUs: 10 minutes. Total downtime: 55 minutes.
    But the real cost is the lost training progress: 3 hours on average (halfway through checkpoint interval)
    across all 256 GPUs. Lost GPU-hours: 256 × 3 = 768 GPU-hours. At $3/GPU-hour, that is $2,304 in wasted
    compute. Total cost: 55 min downtime + 3h rollback = ~4 hours wall time lost.'
  common_mistake: Only counting the hardware replacement time. The lost training progress (rollback to
    last checkpoint) is usually the dominant cost.
  napkin_math: 'Recovery: 10+20+15+10 = 55 min downtime. Rollback: avg 3h. Lost compute: 256 × 3h = 768
    GPU-h = $2,304. Total wall time lost: ~4h.'
