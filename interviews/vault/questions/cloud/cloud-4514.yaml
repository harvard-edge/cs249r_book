title: Diurnal Workload Power Scaling
scenario: A cluster of MI300X GPUs handles LLM inference with a 10x variation between
  daily peak and trough traffic, with a strict 100ms P99 SLA.
question: Formulate a dynamic power-management strategy that minimizes energy waste
  during off-peak hours.
details:
  realistic_solution: Implement an aggressive workload consolidation and Dynamic Voltage/Frequency
    Scaling (DVFS) policy. During low traffic, route all requests to a dense subset
    of GPUs, powering off the rest entirely. On active nodes, scale GPU clocks to
    the lowest power state that still mathematically meets the 100ms SLA.
  common_mistake: Leaving all GPUs on at idle power, which still consumes up to 100W
    per node.
  napkin_math: 10x drop -> 90% power down potential
