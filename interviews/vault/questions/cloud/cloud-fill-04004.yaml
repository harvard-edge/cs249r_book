title: MoE Auxiliary Loss Tuning for Stable Training
scenario: 'You are training a 32-expert MoE model on 16x H100 (80GB HBM3). Your auxiliary load-balancing
  loss uses coefficient α=0.01. After 5k steps, expert collapse occurs: 3 experts receive >80% of tokens.
  The training loss is good but perplexity on the validation set deteriorates. Diagnose the problem and
  implement a fix.'
question: "Why is expert collapse occurring after 5k steps with α=0.01, and how would you fix the MoE load-balancing loss?"
details:
  realistic_solution: 'Implement a staged α schedule: start at α=0.001 for first 1k steps (allow initial
    specialization), ramp to α=0.01 from 1k-5k (enforce balance), then settle at α=0.005. Add an entropy
    regularization term on the router distribution to prevent collapse. Log per-expert token counts every
    100 steps as a training health metric.'
  common_mistake: Setting α too high early in training causes all experts to receive uniform load, preventing
    specialization. Setting α too low allows collapse. Teams often use a fixed α without a warmup schedule,
    missing the window when expert assignment is most plastic.
  napkin_math: 'Target: each of 32 experts handles ~1/32 = 3.1% of tokens. Current: 3 experts handle 80%
    → 26.7%/each, others share 20%/29 ≈ 0.69%/each. Imbalance ratio = 26.7/0.69 ≈ 38.7×. Auxiliary loss
    α=0.01 contributes 0.01 × load_balance_loss ≈ 0.01 × 0.35 ≈ 0.0035 to total loss — too small relative
    to CE loss of ~2.5 at step 5k.'
