title: Debugging Intermittent Duplicate Features in Spot-Backed Pipelines
scenario: You are running a daily batch ETL pipeline processing 50TB of log data on 200 AWS Spot instances (r5.4xlarge) to generate training features for a recommendation model. Spot preemptions occur on ~15% of nodes daily, triggering Spark task retries. Downstream, the ML team reports that their model evaluation metrics are inexplicably fluctuating, and they've found duplicate user interaction records with different unique interaction IDs in the feature store. The pipeline uses a standard `uuid4()` function to assign primary keys to new user sessions.
question: "How do you diagnose the root cause and resolve this issue without disabling Spot instances?"
details:
  realistic_solution: Diagnose that `uuid4()` is a non-idempotent transformation. When a task is retried due to Spot preemption, new UUIDs are generated for the same input records, causing downstream upsert logic in the feature store to treat them as net-new rows. The solution is to make the transformation idempotent by replacing UUIDv4 with a deterministic UUIDv5, generated by hashing immutable record attributes (e.g., `user_id` + `session_start_timestamp`).
  common_mistake: |
    **The Pitfall:** Adding a global deduplication step (e.g., `DISTINCT` or `dropDuplicates()`) at the end of the pipeline.
    **The Rationale:** Engineers rely on framework-level "exactly-once" semantics or brute-force deduplication without recognizing the network shuffle cost on massive datasets.
    **The Consequence:** The global shuffle requires transferring 50TB of data across the network, doubling execution time and risking massive disk spills.
  napkin_math: |
    1. A global DISTINCT requires shuffling the entire 50TB dataset across the cluster.
    2. Network transfer volume: 50TB = 50 * 8 * 1024 = 409,600 Gigabits.
    3. Assuming 200 nodes at 10 Gbps: Total bandwidth = 2000 Gbps.
    4. Pure network transfer time: 409,600 / 2000 ≈ 205 seconds (excluding massive disk/sort overhead).
    **Deterministic UUIDv5 hashing solves the issue inline with microsecond CPU overhead and 0 bytes of network shuffle.**
