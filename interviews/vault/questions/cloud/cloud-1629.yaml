title: Diagnosing A/B Test False Positives
scenario: A cloud-based recommendation system team evaluates 50 new ML model variants concurrently in production A/B tests. Each variant is evaluated against 10 distinct business metrics using a standard significance level (α = 0.05). Over the last quarter, 18 models were promoted to production based on statistically significant lifts in at least one metric. However, a global holdout analysis reveals that overall revenue has degraded by 1.2%. The team is puzzled because the A/B test dashboards showed positive results.
question: Why did 18 seemingly significant model promotions degrade revenue despite positive A/B dashboards across 50 variants and 10 metrics?
details:
  realistic_solution: Identify the root cause as the multiple comparisons problem causing inflated false positive rates. Implement the Benjamini-Hochberg procedure to control the False Discovery Rate (FDR) or apply the Bonferroni correction (α_adj = 0.0001) to control the Family-Wise Error Rate (FWER) before promoting models.
  common_mistake: |
    **The Pitfall:** Failing to account for the family-wise error rate across multiple concurrent tests and metrics.
    **The Rationale:** Candidates often treat each individual p-value independently and blindly accept any p < 0.05 as a true positive signal without understanding compounding probability.
    **The Consequence:** Flooding production with statistically invalid models that degrade real-world performance.
  napkin_math: |
    1. Total hypotheses evaluated: m = 50 models × 10 metrics = 500.
    2. Expected false positives (assuming all null hypotheses are true): 500 × 0.05 = 25 false positives.
    3. Probability of at least one false positive: 1 - (1 - 0.05)^500 ≈ 100%.
    **Result:** The 18 promoted models are highly likely to be entirely composed of statistical noise.
