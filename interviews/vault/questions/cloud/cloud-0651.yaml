title: The Precision Trade-off
scenario: We are quantizing our model from FP16 to INT8. The memory footprint drops by 2x, but the throughput
  doesn't improve at all. Assuming we are compute-bound, what hardware architectural detail did we forget?
details:
  realistic_solution: You forgot to check if the silicon has dedicated INT8 Tensor Cores. Without specific
    hardware paths for 8-bit integer math, the GPU must upcast the INT8 values back to FP16 in the registers
    to perform the multiply-accumulate (MAC), yielding zero compute speedup despite the memory savings.
  common_mistake: '"INT8 should always be 2x faster because it''s half the bits." This confuses memory
    savings with compute savings.'
  napkin_math: 'A100 INT8 Tensor Cores: 624 TOPS. A100 FP16 Tensor Cores: 312 TFLOPS. If your hardware
    has INT8 paths, you get a 2x compute boost. Without them, you get 1x compute at 0.5x memory — a pure
    memory optimization, not a compute one.'
