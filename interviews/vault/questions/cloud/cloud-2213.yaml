title: The Heterogeneous Fleet Capacity Plan
scenario: 'Your ML platform team manages a mixed fleet: 200 A100-80GB GPUs for training, 300 A10G GPUs
  for inference, and 100 L4 GPUs for small batch jobs. The product team wants to launch a new 70B LLM
  serving tier that needs at least 4x A100s per replica. Training leadership says they cannot give up
  any A100s. How do you plan capacity for the new serving tier without buying new hardware?'
details:
  realistic_solution: 'Analyze training fleet utilization patterns. Training jobs rarely achieve 100%
    utilization — there are idle periods between jobs, checkpointing gaps, and overnight/weekend utilization
    drops. Implement a time-sharing policy: (1) Measure actual training utilization (typically 60-75%
    for well-run clusters). (2) Identify recurring low-utilization windows (nights, weekends: often 30-40%).
    (3) Deploy inference replicas as lower-priority preemptible workloads on the A100 fleet during these
    windows. (4) Use opportunistic scheduling: inference pods run when training resources are idle and
    get preempted (with graceful drain) when training jobs arrive. This effectively creates 40-60 A100-equivalents
    of inference capacity at zero hardware cost.'
  common_mistake: 'Proposing to just buy more A100s, or suggesting the L4/A10G GPUs can serve 70B models.
    Neither addresses the constraint: 70B models require at minimum 140GB VRAM (FP16), so only the A100-80GB
    fleet can host them, and training claims all 200.'
  napkin_math: '200 A100s at 70% average training utilization = 60 A100-equivalents idle on average. Nights
    (10 hrs/day × 7 days = 70 hrs/week) + weekend daytime (2 × 14 hrs = 28 hrs) = 98 hrs of low-utilization
    time per 168-hr week ≈ 58% of hours: utilization drops to 40% → 120 idle A100-equivalents. A 70B serving
    replica needs 4 A100s. Available capacity: 60/4 = 15 replicas average, 30 replicas off-peak. At 100
    tokens/sec per replica, that''s 1,500-3,000 tokens/sec serving capacity — enough for a launch.'
