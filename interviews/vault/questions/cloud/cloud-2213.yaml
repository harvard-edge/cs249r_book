title: The Heterogeneous Fleet Capacity Plan
scenario: 'Your ML platform team manages a mixed fleet: 200 A100-80GB GPUs for training, 300 A10G GPUs for inference, and 100 L4 GPUs for small batch jobs. The product team wants to launch a new 70B LLM serving tier that needs at least 4x A100s per replica. Training leadership says they cannot give up any A100s.'
question: "How do you plan capacity for the new serving tier without buying new hardware?"
details:
  realistic_solution: 'Analyze training fleet utilization patterns. Training jobs rarely achieve 100% utilization — there are idle periods between jobs, checkpointing gaps, and overnight/weekend utilization drops. Implement a time-sharing policy: (1) Measure actual training utilization (typically 60-75% for well-run clusters). (2) Identify recurring low-utilization windows (nights, weekends: often 30-40%). (3) Deploy inference replicas as lower-priority preemptible workloads on the A100 fleet during these windows. (4) Use opportunistic scheduling: inference pods run when training resources are idle and get preempted (with graceful drain) when training jobs arrive. This effectively creates 40-60 A100-equivalents of inference capacity at zero hardware cost.'
  common_mistake: |
    **The Pitfall:** Proposing to buy more A100s or serving 70B models on smaller L4/A10G GPUs.
    
    **The Rationale:** Treating compute as static pools and ignoring the minimum VRAM requirements of large models.
    
    **The Consequence:** Unnecessary capital expenditure or catastrophic out-of-memory crashes on incapable hardware.
  napkin_math: |
    * **Low-Utilization Window:** Nights (10h × 7) + Weekends (2 × 14h) = 98 hours/week (58% of the week)
    * **Idle Capacity Off-Peak:** 200 GPUs × 60% idle = 120 idle A100s
    * **Serving Replica Cost:** 4 A100s per replica
    * **Result:** **Time-sharing provides 30 dedicated serving replicas (120/4) during off-peak hours at zero hardware cost.**
