title: Designing a Draft Model Selection Strategy
scenario: 'You must choose a draft model for speculative decoding with a 70B target. Options: (A) 1B model (α=0.65, 0.5ms/token), (B) 7B model (α=0.82, 2ms/token), (C) 2-layer early-exit of the target (α=0.70, 1ms/token). Target verification round: 25ms for the K-token block.'
question: Which draft option is best when acceptance rate and draft latency both affect speculative decoding speedup?
details:
  realistic_solution: Option B is best under the stated simplified latency model. Compare expected served tokens per wall-clock round, not acceptance rate alone. With K=6, independent per-token acceptance alpha, and one 25ms target verification round for the whole speculative block, the served-token expectation is 1 + alpha + ... + alpha^K. Option A yields about 2.72 served tokens in 28ms, or 97 tok/s; Option B yields about 4.17 in 37ms, or 113 tok/s; Option C yields about 3.06 in 31ms, or 99 tok/s. Option B's 2ms/token draft is slower, but its higher acceptance rate still wins here. Option C would become attractive if the 7B draft latency rose, target verification got cheaper, or hardware contention made the draft path more expensive.
  common_mistake: |
    **The Pitfall:** Always picking the highest acceptance rate (α) draft model without factoring in its latency.
    **The Rationale:** A high acceptance rate feels like better "accuracy", and engineers assume any draft is vastly faster than the target.
    **The Consequence:** The draft's own latency cost ruins the speculation speedup. A slow but accurate draft (Option B) can result in worse wall-clock time than a fast but less accurate one (Option A).
  napkin_math: |
    **Assumptions & Constraints:**
    - Use the same speculative window K=6 for a first-pass comparison.
    - Target verification cost is one 25ms round for the whole K-token speculative block.
    - Assume independent per-token acceptance probability alpha.
    - Score each option by expected served tokens per round divided by draft plus verification time.

    **Calculations:**
    - Served-token formula: E[tokens] = 1 + α + ... + α^K = (1 - α^(K+1)) / (1 - α). This includes the guaranteed target token after the accepted prefix.
    - Option A: E = (1 - 0.65^7) / 0.35 ≈ 2.72 tokens; round time = 6 * 0.5 + 25 = 28ms; rate ≈ 97 tok/s.
    - Option B: E = (1 - 0.82^7) / 0.18 ≈ 4.17 tokens; round time = 6 * 2 + 25 = 37ms; rate ≈ 113 tok/s.
    - Option C: E = (1 - 0.70^7) / 0.30 ≈ 3.06 tokens; round time = 6 * 1 + 25 = 31ms; rate ≈ 99 tok/s.

    **Conclusion & Interpretation:**
    - **Result: Option B has the best expected throughput under these assumptions.** Acceptance rate alone is insufficient, but here B's higher yield more than pays for its slower draft latency.
