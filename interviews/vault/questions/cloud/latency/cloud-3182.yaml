title: Speculative Decoding Acceptance Break-Even
scenario: For a 70B target on H100 with a 7B draft, each speculative round drafts K tokens at 2ms/token and verifies the proposed block in 42ms. Autoregressive decoding costs 42ms/token. Assume each drafted token is independently accepted with probability alpha, so E[tokens per round] = (1 - alpha^(K+1)) / (1 - alpha).
question: For K=5, what alpha makes speculative decoding break even, and what expected-token formula applies?
details:
  realistic_solution: 'Autoregressive decoding costs 42ms/token. A speculative round costs K x draft_cost + verify_cost = 5 x 2 + 42 = 52ms. Breakeven requires E[tokens per round] / 52ms >= 1 / 42ms, so E[tokens per round] >= 52 / 42 = 1.238. With independent per-token acceptance alpha and K=5, E[tokens] = (1 - alpha^6) / (1 - alpha). Solving (1 - alpha^6) / (1 - alpha) >= 1.238 gives alpha_min ≈ 0.193; alpha=0.20 yields E=1.250, just above breakeven. General condition: (1 - alpha^(K+1)) / (1 - alpha) >= (K x c_draft + c_verify) / c_auto.'
  common_mistake: |
    **The Pitfall:** Setting up the inequality incorrectly by comparing per-token latency directly.
    **The Rationale:** Candidates often compare absolute times instead of per-round expected tokens. The correct breakeven is when E[tokens]/round_time = 1/auto_time.
    **The Consequence:** Deriving a mathematically flawed alpha_min that misinforms the deployment decision.
  napkin_math: |
    **Assumptions & Constraints:**
    - K=5. Draft cost = 2ms. Verify cost = 42ms. Auto cost = 42ms.
    - Breakeven: E[tokens] >= round_time / auto_time.

    **Calculations:**
    - Round time = (5 * 2ms) + 42ms = 52ms.
    - E[tokens] required >= 52 / 42 = 1.24.
    - Acceptance model: E[tokens] = (1 - alpha^6) / (1 - alpha).
    - alpha=0.19 gives E=1.235, slightly below breakeven.
    - alpha=0.20 gives E=1.250, slightly above breakeven.

    **Conclusion & Interpretation:**
    - **Result: alpha_min ≈ 0.193, usually rounded to 0.20 (Latency-Bound)**. Cheap drafts have extremely low breakeven thresholds.
