title: Diagnosing P99 Latency Spikes in Triton
scenario: Your team is running a real-time recommendation model on cloud instances using Triton Inference Server. At 500 QPS, the median latency is a healthy 15ms. However, your P99 latency exhibits massive jitter, frequently spiking to 200ms+. The GPU SM utilization is only 45%, and GPU memory is 60% full. The node is running several sidecar containers (Envoy, Fluentd, Datadog) that periodically process logs and metrics.
question: What is causing the 200ms+ P99 spikes despite 45% GPU utilization, and how would you fix them?
details:
  realistic_solution: |
    Implement CPU pinning (CPU affinity) for the inference server processes to isolate them from sidecar noise. Dedicate vCPUs strictly to Triton and restrict sidecars to the remaining vCPUs using Kubernetes CPU manager with static policies to eliminate context switching jitter.
  common_mistake: |
    **The Pitfall:** Focusing solely on GPU optimization or network congestion.
    **The Rationale:** Candidates miss the CPU resource contention caused by aggressive sidecar processes preempting the inference threads.
    **The Consequence:** The real cause (CPU scheduling) goes unaddressed, and P99 spikes persist despite GPU-level tuning.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15ms median latency, 45% GPU util.
    - Linux CFS default quota period: 100ms.

    **Calculations:**
    - P99 Spike: 15ms (median) + 100ms (CFS throttle) + context switches ≈ 150ms - 200ms+.

    **Conclusion & Interpretation:**
    - **Result: CPU-Scheduling-Bound**. CPU thread preemption by sidecars explains the 200ms+ latency spikes.
