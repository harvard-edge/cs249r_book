title: Diagnosing End-to-End Latency in Image Serving
scenario: You are deploying a ResNet-50 image classification model. The end-to-end request latency is 45ms. Profiling shows the actual GPU inference takes only 5ms. The remaining 40ms is spent in Python on the CPU performing JPEG decoding, resizing, and tensor normalization.
question: Should you quantize the ResNet-50 model to INT8, or optimize the 40ms CPU preprocessing bottleneck first?
details:
  realistic_solution: Identify the CPU preprocessing as the primary bottleneck. Implement optimized CPU libraries (like libjpeg-turbo or OpenCV) or offload preprocessing to the GPU using NVIDIA DALI (nvJPEG) before touching the model.
  common_mistake: |
    **The Pitfall:** Always assuming model optimization (like INT8 quantization) is the best way to reduce latency.
    **The Rationale:** Engineers often tunnel-vision on the deep learning model itself, ignoring standard data preprocessing overheads.
    **The Consequence:** Optimizing the wrong bottleneck yields minimal E2E latency improvements.
  napkin_math: |
    **Assumptions & Constraints:**
    - E2E latency = 45ms.
    - CPU = 40ms, GPU = 5ms.

    **Calculations:**
    - INT8 quantize (100% GPU speedup) = saves 5ms (11% reduction).
    - CPU optimization (e.g., to 10ms) = saves 30ms (66% reduction).

    **Conclusion & Interpretation:**
    - **Result: Optimize the CPU bottleneck for a 66% latency reduction (CPU Preprocessing)**. Bottleneck: CPU Preprocessing.
