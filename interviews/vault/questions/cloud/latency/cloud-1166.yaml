title: Debugging Dynamic Batching Latency Spikes
scenario: An inference API backed by an A10G GPU runs a BERT-base model for sentiment analysis. The service has a strict P99 latency SLA of 100ms. The dynamic batcher is set to max_batch_size=32 and max_queue_delay=80ms. Under burst traffic (300 RPS), P99 latency spikes to 130ms and GPU utilization peaks at only 65%. The execution time for a batch of 32 is 40ms.
question: Why does P99 hit 130ms during bursts, and how should max_queue_delay be reconfigured?
details:
  realistic_solution: Reduce the max_queue_delay to strictly bound the wait time. Since maximum batch execution takes 40ms, the queue delay must be at most 100ms - 40ms = 60ms (minus network overhead). Setting max_queue_delay=40ms ensures requests process in time.
  common_mistake: |
    **The Pitfall:** Increasing max_batch_size or max_queue_delay to squeeze out more throughput during bursts.
    **The Rationale:** Candidates mistakenly assume low GPU utilization indicates a need for larger batches, ignoring the strict latency math of the queue itself.
    **The Consequence:** The queue delay mathematically guarantees an SLA breach before the GPU even starts computing the batch.
  napkin_math: |
    **Assumptions & Constraints:**
    - P99 SLA: 100ms. Burst traffic: 300 RPS.
    - Batch execution time: 40ms. Network overhead: 10ms.

    **Calculations:**
    - Current Latency: 80ms (queue) + 40ms (exec) + 10ms (net) = 130ms.
    - Max allowed queue delay = 100ms SLA - 40ms exec - 10ms net = 50ms.

    **Conclusion & Interpretation:**
    - **Result: 50ms max delay (Queue-Bound)**. Setting max_queue_delay to 40ms guarantees the SLA is met.
