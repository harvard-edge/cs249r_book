title: Designing Medusa Heads for Self-Speculation
scenario: Instead of a separate draft model, Medusa adds K lightweight prediction heads to the target 70B model's last hidden layer. Each head i predicts token at position t+i. You need to deploy this on 4x H100 with tensor parallelism. The hidden_dim of the target is 8192.
question: How would you design the Medusa heads for a 70B target with hidden_dim=8192 on 4x H100, and what is their overhead?
details:
  realistic_solution: A minimal dense Medusa design attaches K=5 independent vocabulary heads to the final hidden state, with each head predicting one future offset. With hidden_dim=8192 and vocab=128K, each full head has 8192 x 128K = 1.05B weights, or about 2.1GB in FP16. Five heads are 5.24B weights = 10.5GB total. With 4-way tensor parallelism that shards the vocab projection columns across GPUs, storage is about 2.6GB/GPU, and each GPU computes its local vocab shard before top-k/logit communication. Inference compute is 2 x 8192 x 128K = 2.1 GFLOP per head across the full TP group; five heads are 10.5 GFLOP total, or about 2.6 GFLOP/GPU before communication and launch overhead. This is not free, so K=5 dense heads are a deliberate latency-quality tradeoff; a production design often uses smaller MLP or bottleneck heads before the vocab projection to reduce this cost. If the listed alphas are treated as marginal probabilities that each future offset survives verification, the simple first-order
    served-token estimate is 1 + sum(alphas) = 3.99 tokens/round, not a guaranteed speedup.
  common_mistake: |
    **The Pitfall:** Making Medusa heads too large by matching the target model's full FFN dimensions.
    **The Rationale:** Engineers intuitively mirror the base model's architectural complexity for the prediction heads to maintain accuracy.
    **The Consequence:** Eliminating the latency advantage entirely, as the complex heads take as long to execute as a full transformer layer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hidden dim: 8192. Vocab size: 128K.
       - 5 Medusa heads.
    2. **Calculations:**
       - Head params: 8192 * 128K = 1.05B parameters = 2.1 GB FP16 per head.
       - 5 dense heads total size: 5.24B parameters = 10.5 GB total.
       - With 4-way tensor parallel vocab sharding: 10.5 GB / 4 = 2.6 GB per GPU.
       - Forward FLOPs per head: 2 * 8192 * 128K = 2.1 GFLOP total, or about 0.52 GFLOP/GPU when sharded.
       - Five heads: 10.5 GFLOP total, or about 2.6 GFLOP/GPU, plus logit/top-k communication and launch overhead.
       - If the acceptance profile is interpreted as marginal survival probabilities for offsets 1..5, first-order served-token estimate = 1 + 0.85 + 0.72 + 0.61 + 0.52 + 0.29 = 3.99 tokens/round.
    3. **Conclusion & Interpretation:**
       - **Result: Non-negligible Head Overhead.** Dense heads add about 2.6GB/GPU and several GFLOPs/GPU per round; the 3.99-token estimate depends on the verification interpretation and is not a justified 4x end-to-end speedup.
