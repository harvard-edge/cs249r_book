title: 'Queueing Theory Specification: Design a Latency SLO Budget'
scenario: Specify a complete latency budget for a three-tier inference system serving Claude-Haiku-scale requests. Total P99 SLO = 500ms. Arrival rate λ=1000 req/s.
question: How would you allocate the 500ms P99 latency budget across the load balancer, router, and GPU tiers, and size each M/M/c tier?
details:
  realistic_solution: 'Three tiers in series: P99_total = P99_LB + P99_router + P99_GPU. GPU tier dominates (service time ~50ms for small model). Budget: LB ≤ 5ms P99, Router ≤ 15ms P99, GPU ≤ 480ms P99. LB: µ=100K req/s, λ=1000, ρ=0.01, Wq≈0, P99 ≈ service time = 1ms. Router: µ=10K req/s, λ=1000, ρ=0.1, Wq=0.1/(10K*0.9)=11µs, P99=service+queue=0.1ms+0.011ms≈0.1ms. GPU workers: need P99<480ms. With µ=20 req/s per worker and 100 workers: c=100, ρ=1000/2000=0.5. M/M/c P99 << M/M/1, W≈55ms. P99≈4.6*55=253ms < 480ms.'
  common_mistake: |
    **The Pitfall:** Allocating latency budgets by equal thirds across all tiers.
    **The Rationale:** Candidates avoid complex queueing theory math and default to evenly distributing the SLA.
    **The Consequence:** Massively over-provisioning lightweight tiers (LB, Router) while starving the bottleneck GPU tier, leading to certain SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total P99 Budget: 500ms. Arrival (λ): 1000 req/s.
       - GPU Service Time: ~50ms.
    2. **Calculations:**
       - GPU Target P99: 500 - 2(LB) - 0.5(Router) = 497.5ms.
       - 60 GPU Workers (µ=20): Capacity = 1200 req/s. ρ = 0.833.
       - Mean Wait (Wq): ~25ms. Total W = 75ms.
       - Tail P99 Approx: 4.6 * 75 = 345ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queueing-Bound.** 345ms < 497.5ms. A minimal pool of 60 GPU workers reliably absorbs the variance without breaching the tight SLA.
