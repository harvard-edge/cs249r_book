title: 'The TPOT Memory Wall: Latency Decomposition'
scenario: You are optimizing a Llama-70B model spread across two GPUs (Tensor Parallelism = 2) for a real-time chat application with a strict 50ms per-token deadline.
question: For Llama-70B on two GPUs at batch size 1, is decode compute- or memory-bound, and what is the approximate TPOT?
details:
  realistic_solution: 'The decode step is memory-bound. The tiny batch size causes arithmetic intensity to plummet, bottlenecking entirely on reading 140GB of weights from HBM.'
  common_mistake: |
    **The Pitfall:** Assuming LLM inference is always compute-bound due to massive FLOPs.
    **The Rationale:** Engineers forget that decoding generates 1 token at a time, requiring full weight reads per step with minimal compute reuse.
    **The Consequence:** Over-provisioning compute instead of memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B FP16 = 140 GB weights.
    - Aggregate HBM bandwidth = 6.7 TB/s.

    **Calculations:**
    - Memory Read Time = 140 GB / 6.7 TB/s = 20.9 ms.
    - Compute Time = < 1 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (TPOT ~21 ms).**
  options:
  - ~0.07 ms (compute-bound by TFLOPS)
  - ~21 ms (memory-bound by HBM bandwidth)
  - ~42 ms (read weights + compute execution)
  - Cannot be calculated without layer count
  correct_index: 1
