title: Implementing Rejection Sampling for Lossless Speculation
scenario: In speculative decoding, the verification step must produce exactly the same distribution as the target model alone. You are given draft distribution q(x) and target distribution p(x) with a KL divergence of 0.5 nats.
question: How does rejection sampling preserve the target distribution, and what expected acceptance rate and correction cost apply at KL(p||q)=0.5 nats?
details:
  realistic_solution: 'For each speculated token x_i sampled from q(x_i): accept with probability min(1, p(x_i)/q(x_i)). If rejected: sample a correction token from the adjusted distribution p''(x) = max(0, p(x) - q(x)) / sum(max(0, p(x) - q(x))). This preserves the exact target distribution. KL(p||q)=0.5 nats alone does not determine an expected acceptance rate for the draft samples; it only gives a loose distribution-distance bound. Correction cost is the cost to form and sample from the adjusted residual distribution over the vocabulary, which depends on implementation and hardware. A 128K-vocab FP32 vector is about 512KB of temporary data per position, but that memory footprint is not itself a runtime estimate.'
  common_mistake: |
    **The Pitfall:** Using a simple argmax comparison to accept or reject tokens instead of proper rejection sampling.
    **The Rationale:** Argmax is the simplest way to check if the draft model guessed the most likely token.
    **The Consequence:** Argmax matching is not distribution-preserving. It alters the sampling distribution, skewing the final generation quality away from the target model's true output.
  napkin_math: |
    **Assumptions & Constraints:**
    - Draft token x is sampled from q(x).
    - The target distribution is p(x), with KL(p||q)=0.5 nats.
    - Vocab size is 128K and logits/probabilities are represented as 4-byte floats.

    **Calculations:**
    - Acceptance rule: accept a draft sample x with probability min(1, p(x) / q(x)).
    - Rejection path: sample from p'(x) proportional to max(0, p(x) - q(x)).
    - Pinsker gives TV(p,q) <= sqrt(KL/2) = sqrt(0.5/2) = 0.5.
    - This TV bound is not an exact or general lower bound on the speculative acceptance rate for samples drawn from q.
    - Correction temporary footprint for one FP32 vocab vector = 128K * 4 bytes = 512KB per position.

    **Conclusion & Interpretation:**
    - **Result: Qualitative Bound Only**. KL=0.5 nats does not determine a numeric expected acceptance rate or a justified correction runtime; it only indicates that p and q may differ enough for rejections to matter.
