title: Batching and Scheduling for 7B LLM TTFT and Inter-Token SLAs
scenario: You are deploying a 7B parameter LLM for a chatbot on a cloud instance. The current serving prototype copied the training setup and uses a static batch size of 128. The SLA requires Time-to-First-Token (TTFT) < 200ms and Inter-Token Latency < 50ms.
question: How should batching and scheduling change to meet TTFT <200ms and inter-token latency <50ms for the 7B LLM?
details:
  realistic_solution: Replace the static training-style batch of 128 with continuous batching and latency-aware admission control. Prefill should be scheduled separately and capped so new requests meet the TTFT budget, while decode should use iteration-level scheduling with small active batches or deadlines so each token step stays below 50ms. Tune for latency-bounded throughput, not maximum batch utilization, and measure the full latency path including queueing, prefill, KV-cache traffic, compute, and network overhead.
  common_mistake: |
    **The Pitfall:** Retaining large static batch sizes or standard dynamic batching to maximize hardware utilization.
    **The Rationale:** Candidates rely on training-optimized setups, failing to recognize that large batches in autoregressive generation cause tail latency spikes.
    **The Consequence:** The system vastly exceeds the strict 50ms per-token latency SLA, rendering the chatbot unresponsive to users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters (14GB in FP16).
    - SLA: TTFT < 200ms and inter-token latency < 50ms.
    - Existing static batch size: 128, inherited from training.
    - Memory bandwidth estimate: 600 GB/s, useful only as one component of the latency budget.

    **Calculations:**
    - A single full weight-stream lower bound is 14 GB / 600 GB/s = 23.3ms, before compute, KV-cache reads/writes, queueing, and framework overhead.
    - Inter-token budget remaining after that lower bound: 50ms - 23.3ms = 26.7ms for all other decode work.
    - TTFT additionally includes request queueing plus prefill over the prompt, so it must be controlled with admission limits and separate prefill scheduling rather than inferred from the decode weight-read estimate.
    - Static batch 128 risks both queueing delay and long decode iterations; continuous batching can admit/depart requests each token while enforcing small active decode batches or deadlines.

    **Conclusion & Interpretation:**
    - **Result: scheduling-bound serving design.** The 23.3ms weight-read number is only a lower-bound component, so the fix is continuous batching with separate TTFT and decode-latency controls, not simply declaring the workload memory-bandwidth-bound.
