title: The Preemption Penalty
scenario: 'You''re designing a multi-tenant GPU service. It must serve two request queues: a high-priority queue with a strict 100ms P99 latency SLO, and a low-priority queue for large, non-interactive jobs. A proposal is made to use dynamic preemption: when a high-priority request arrives, the running low-priority job will be paused, its state (i.e., KV cache) will be swapped to system RAM over PCIe, the high-priority request will be serviced, and then the low-priority job''s state will be swapped back in. Analyze the feasibility of this preemption strategy.'
question: "Is dynamic preemption via PCIe KV-cache swapping feasible for a 13B model with a 100ms P99 SLO, and why?"
details:
  realistic_solution: |
    The proposed preemption strategy is likely infeasible due to the prohibitive cost of swapping the KV cache over PCIe. The time taken to move gigabytes of data from GPU HBM to system RAM and back will almost certainly violate the high-priority SLO before the request is even processed. The candidate should demonstrate this with a calculation.
  common_mistake: |
    **The Pitfall:** Assuming dynamic preemption overhead is negligible.
    **The Rationale:** Engineers view context switching as a lightweight software operation, severely underestimating the massive gigabyte scale of LLM KV caches.
    **The Consequence:** The preemption architecture violates the P99 latency SLO before the high-priority request even begins processing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 13B model: ~40 layers, 5120 hidden dim. Sequence = 4096 tokens.
       - PCIe Gen5 x16 bandwidth: ~50 GB/s (real-world).
    2. **Calculations:**
       - KV cache per token = 2 * 40 * 5120 * 2 bytes = ~800 KB.
       - Total KV cache = 4096 * 800 KB ≈ 3.28 GB.
       - Swap out time = 3.28 GB / 50 GB/s ≈ 65ms.
       - Swap in time = 65ms. Total preemption penalty = 130ms.
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bandwidth-Bound**. The 130ms context switch over PCIe strictly violates the 100ms P99 SLO purely through I/O transfer time.
