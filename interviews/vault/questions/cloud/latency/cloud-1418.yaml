title: Redesigning an End-to-End Vision Inference Pipeline
scenario: 'A cloud-based real-time video analytics service processes 1080p streams using an object detection model on T4 GPUs. The SLA requires end-to-end latency under 100ms per frame. Currently, the pipeline is CPU-bottlenecked: preprocessing (resizing, normalization) takes 45ms on CPU, GPU inference takes 20ms, and post-processing (NMS, bounding box scaling) takes 40ms on CPU.'
question: How can you redesign this pipeline to meet the 100ms SLA, and what are the quantitative trade-offs regarding batching and GPU utilization?
details:
  realistic_solution: Offload preprocessing and postprocessing to the GPU to eliminate CPU bottlenecks and reduce expensive CPU-GPU PCIe data transfers. Using NVIDIA DALI for GPU-accelerated decoding/resizing and CUDA kernels for NMS can reduce per-frame work from 105ms (CPU-bound) to about 30ms. That meets the 100ms SLA and creates latency headroom for carefully bounded micro-batching or higher stream counts, but batch size must be chosen from the arrival policy and measured per-item waiting time rather than by multiplying 30ms by the batch size.
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing the neural network weights (e.g., quantization).
    **The Rationale:** Candidates look at "inference" and default to model compression, ignoring that 80% of the latency is spent in pre/post-processing on the CPU.
    **The Consequence:** The model runs faster, but the end-to-end pipeline still violates the 100ms SLA due to the unaddressed CPU bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - **Baseline Latency:** Pre (45ms) + Inf (20ms) + Post (40ms) = 105ms (Fails 100ms SLA).
    - **Baseline GPU Utilization:** 20ms active / 105ms total = 19%.
    - **GPU-Accelerated Latency:** GPU Pre (5ms) + Inf (20ms) + GPU Post (5ms) = 30ms per frame.
    - **Batching Headroom:** The optimized per-frame path leaves about 70ms of SLA headroom for queueing, batching delay, and jitter.
    - **Utilization Trade-off:** Batching can improve throughput if frames arrive quickly enough, but each item waits for the batch to form. A batch of 3 only meets the SLA if queueing delay plus batched service time remains under 100ms.

    **Calculations:**
    - Baseline end-to-end latency = 45ms + 20ms + 40ms = 105ms, so it misses the SLA.
    - Baseline GPU active fraction = 20ms / 105ms = about 19%.
    - Optimized end-to-end latency = 5ms + 20ms + 5ms = about 30ms per frame before batching delay.
    - SLA headroom after GPU offload = 100ms - 30ms = about 70ms.

    **Conclusion & Interpretation:**
    - **Result:** GPU offload fixes the CPU-bound latency path and improves the chance of useful batching, but strict SLA compliance requires measuring queueing delay and batched kernel service time rather than assuming batching alone drives utilization to 100%.
