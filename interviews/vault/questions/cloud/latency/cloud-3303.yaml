title: Designing a Low-Latency Inference Service on NVIDIA A100 with Strict SLAs
scenario: 'You are designing an inference service for a critical real-time ML model on NVIDIA A100 GPUs. Your service must adhere to strict SLAs: P99 latency under 100ms and P999 latency under 250ms, even during peak load. The service experiences highly variable traffic patterns, often resulting in ''straggler'' requests.'
question: How would you design the inference service to consistently meet the <100ms P99 and <250ms P999 tail latency SLA given variable traffic?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. Hedged Requests: Implement dual-send or hedged requests where a second identical request is sent to another available A100 instance if the first request doesn''t receive a response within a predefined timeout. 2. Adaptive Batching: Implement dynamic batching strategies that adjust batch size based on real-time queue depth. 3. Dedicated Instance Pools: Isolate critical workloads. 4. Smart Load Balancing: Route requests to the least loaded instances.'
  common_mistake: |
    **The Pitfall:** Focusing solely on average (P50) latency or raw throughput benchmarks.
    **The Rationale:** Teams often neglect active hedging mechanisms, incorrectly assuming fast individual inference times automatically translate to acceptable tail latencies.
    **The Consequence:** Network congestion, GC pauses, or system noise disproportionately affect tail latencies, causing critical P99 and P999 SLA breaches.
  napkin_math: |
    1. **Assumptions & Constraints:** SLA: P99 < 100ms, P999 < 250ms. Highly variable traffic causing 500ms stragglers.
    2. **Calculations:** Without hedging, a 500ms straggler breaches SLA. Hedging strategy: set timeout at P90 (e.g., 50ms) to trigger a duplicate request. If secondary request takes the P50 time (20ms), total time = 50ms + 20ms = 70ms.
    3. **Conclusion & Interpretation:** **Result: Straggler latency reduced from 500ms to 70ms. Tail-Latency-Bound.**
