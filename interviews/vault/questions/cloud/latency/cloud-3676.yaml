title: MoE Inference Batching Strategy for Throughput
scenario: You are operating an online inference service using a 64-expert MoE on 4x MI300X. At low request rates (batch size 1-4), GPU utilization is 8%. A colleague suggests padding every batch to 64 tokens to improve expert routing efficiency.
question: Should you pad low-rate MoE batches to 64 tokens on MI300X, or use another approach to improve utilization?
details:
  realistic_solution: Use continuous batching to aggregate requests from multiple users into a single large batch rather than padding a single request. At batch size 64, each expert receives ~2 tokens on average (top-2 routing), spreading load across all 64 experts. This improves MFU from ~8% to ~40% on MI300X without artificial latency padding.
  common_mistake: |
    **The Pitfall:** Assuming that larger batches always improve utilization regardless of how they are constructed.
    **The Rationale:** Engineers apply standard dense model intuition to MoE architectures.
    **The Consequence:** Padding adds pure latency without proportionally improving utilization, because the routed tokens may still cluster to a few experts while the rest remain idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: MI300X with 5.3 TB/s memory bandwidth.
    - Expert load: 1B params * 2 bytes (BF16) = 2 GB per expert.

    **Calculations:**
    - Latency at batch=1: 2 GB / 5.3 TB/s ≈ 0.38 ms to load weights.
    - Latency at batch=64: 2 GB amortized over 64 tokens = 0.38 ms / 64 = 5.9 µs/token.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Continuous batching provides a 10x improvement in memory efficiency without the artificial latency of padding.
