title: The Input Chunking Pipeline Bubble
scenario: Users submit 100,000-token documents to your summarization model. To avoid OOMing during the prefill phase, you implement 'Chunked Prefill' (breaking the document into 4,000-token blocks). The prefill now succeeds, but users notice that the Time-To-First-Token (TTFT) actually increased compared to when you ran the 100k prompt all at once on a bigger GPU.
question: Why does chunking the prompt slow down the time to first token?
details:
  realistic_solution: Chunking destroys arithmetic intensity. A single 100k-token prefill is one enormous matrix multiply with astronomical data reuse — each weight element is multiplied against 100k tokens, so the weights are loaded from HBM once and reused extensively. With 4k-token chunks, you run 25 separate smaller matmuls, each loading the full 140GB weight matrix from HBM. You've turned 1 weight load into 25 weight loads — roughly 25x more memory traffic for the same compute. The GPU shifts from compute-bound to memory-bound, and TTFT increases proportionally.
  common_mistake: |
    **The Pitfall:** Believing chunking adds Python looping overhead.
    **The Rationale:** Python overhead is in microseconds, while the slowdown observed is in seconds.
    **The Consequence:** Misdiagnosing memory-bound workloads as CPU-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights size: 140 GB.
    - Chunks: 25 blocks (4,000 tokens each).
    - Unchunked pass: 1 weight load from HBM.

    **Calculations:**
    - Unchunked compute: ~14.15s (compute-bound).
    - Chunked memory traffic: Weights are streamed 25 times.
    - Total chunked traffic: 140 GB * 25 = 3,500 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Chunking destroys arithmetic intensity, turning 1 weight load into 25 and shifting the GPU to a memory-bound regime.
