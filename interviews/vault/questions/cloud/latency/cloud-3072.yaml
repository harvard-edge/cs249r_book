title: 'Queueing Theory Evaluation: M/M/1 vs M/D/1 for Deterministic Service'
scenario: An H100 cluster processes fixed-length synthetic data batches (deterministic
  service time = 100ms). An external API endpoint receives variable-length user requests
  (exponential service time, mean 100ms). Compare M/D/1 vs M/M/1 queuing at 80% utilization
  for both mean latency and P99. Which model applies to which workload?
question: What is the correct M/D/1 mean queue wait formula and value at 80% utilization
  for 100 ms deterministic service?
details:
  realistic_solution: 'M/D/1 queue mean wait time Wq = ρ / (2μ(1-ρ)). With service time = 100ms, μ = 10. At 80% utilization (ρ = 0.8), Wq = 0.8 / (2 * 10 * (1 - 0.8)) = 0.8 / 4 = 0.2s = 200ms. By contrast, an M/M/1 queue has Wq = ρ / (μ(1-ρ)) = 0.8 / (10 * 0.2) = 0.4s = 400ms. The M/D/1 model applies to the H100 cluster with fixed batch sizes (deterministic service), while M/M/1 applies to the external API with variable-length requests (exponential service).'
  common_mistake: Applying M/M/1 formulas to deterministic or near-deterministic workloads
    (like batch ML jobs), which dramatically overestimates queue latency.
  napkin_math: 'M/D/1 queue: service time = 100ms, so μ = 10/s. Utilization ρ = 0.8. Wq = ρ / (2μ(1-ρ)) = 0.8 / (2 * 10 * 0.2) = 0.8 / 4 = 0.2s = 200ms.'
