title: Diagnosing Parallel Fan-out Tail Latency
scenario: A distributed recommender system processes a user request by fanning out queries to 50 independent inference microservices in parallel. Monitoring metrics show that the median (p50) response time of an individual service is a fast 10ms, but the 99th percentile (p99) latency spikes to 150ms due to garbage collection and network jitter. The overall user request is only complete when all 50 parallel responses are received.
question: Diagnose why the median user latency degraded in the 50-way scatter-gather system, and calculate the chance of hitting the 150ms tail.
details:
  realistic_solution: Identify that the overall system latency is bounded by the max of 50 independent probability distributions. To mitigate this without fixing the underlying 150ms spikes, implement hedged requests (sending a duplicate secondary request to a different replica if the primary has not responded within the expected p90 time) or allow returning partial results to actively truncate the tail.
  common_mistake: |
    **The Pitfall:** Assuming combining multiple 10ms median services results in a 10ms overall system median.
    **The Rationale:** Misunderstanding how independent tail latencies compound in parallel scatter-gather architectures.
    **The Consequence:** Refusing to implement hedged requests, guaranteeing that a large portion of users will always experience the 150ms tail latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 parallel independent microservices.
       - Individual service P99 latency: 150ms.
       - Individual service fast probability (<150ms): 99% (0.99).
    2. **Calculations:**
       - Probability all 50 services are fast: (0.99)^50 ≈ 0.605 (60.5%).
       - Probability of hitting the tail: 1 - 0.605 = 0.395 (39.5%).
       - If scaled to 100 services: 1 - (0.99)^100 ≈ 63.4%.
    3. **Conclusion & Interpretation:**
       - **Result: Tail-Dominated Latency.** In a 50-way fan-out, there is a ~39.5% chance the user experiences the 150ms delay. At 100 services, the 150ms tail effectively becomes the system median.
