title: 'Queueing Theory Realization: Queue Memory Sizing for KV Cache Pooling'
scenario: 'Size the KV cache memory pool for an H100 (80GB HBM3) running INT4 LLaMA-3-70B with continuous batching. Weights use 35GB and runtime overhead is 3GB. Mean queue depth is L=20 requests (from Little''s Law: λ=40 req/s, W=0.5s). Each request has context length uniformly distributed 100-4000 tokens.'
question: With L=20, how much KV cache memory is needed per request and what maximum active concurrency fits before OOM?
details:
  realistic_solution: KV cache per token per layer is 2 (K and V) * 64 heads * 128 head dim * 2 bytes = 32KB per token per layer. Across 80 layers, KV is 2.56MB/token. Mean context length is (100+4000)/2 = 2050 tokens, so mean KV per active request is 2050 * 2.56MB = 5.25GB. With INT4 weights using 35GB and 3GB runtime overhead, KV budget is 80 - 35 - 3 = 42GB. Maximum active KV-resident concurrency is floor(42/5.25) = 8 requests. The remaining requests in the L=20 average system population are queued or waiting for admission and do not consume full KV cache until scheduled.
  common_mistake: |
    **The Pitfall:** Assuming all queued requests need full KV cache allocated at queue time.
    **The Rationale:** Engineers mistake queue depth for active concurrency, forgetting how continuous batching functions.
    **The Consequence:** They erroneously calculate that the system will constantly OOM and over-provision expensive GPU hardware, wasting resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model has 80 layers, uses INT4 weights (70B * 0.5 bytes = 35GB), and activations/overhead are ~3GB.
    - Mean context length is 2050 tokens.

    **Calculations:**
    - KV per token: 2 * 64 * 128 * 2 = 32KB per layer. Over 80 layers: 2.56MB/token.
    - KV per req = 2050 * 2.56MB = 5.25GB.
    - Available for KV: 80GB - 35GB - 3GB = 42GB.
    - Max active batch: floor(42GB / 5.25GB) = 8 requests.

    **Conclusion & Interpretation:** The maximum active KV-resident batch is 8 requests. Queue depth from Little's Law is not the same as KV-resident concurrency; queued requests do not need full HBM KV allocation until admitted.
