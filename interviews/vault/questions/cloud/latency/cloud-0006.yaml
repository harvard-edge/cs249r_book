title: The Throughput Saturation Fallacy
scenario: "You are capacity planning for an LLM service. When fully saturated, your monitoring shows a single node can produce a total of 3,000 tokens per second using continuous batching. Consider Scenario A (100 users requesting 50 tokens each) and Scenario B (10 users requesting 500 tokens each)."
question: "How long does it take one saturated node to serve 5,000 tokens at 3,000 tokens/s, and does user distribution change that?"
details:
  realistic_solution: "From a total throughput perspective, the scenarios are identical. The GPU's job is to generate 5,000 tokens, and it does so at a rate of 3,000 tokens per second. The distribution of those tokens among users doesn't change the total amount of work."
  common_mistake: |
    **The Pitfall:** Conflating per-user latency with total system throughput.
    **The Rationale:** Assuming that handling 100 concurrent users must be inherently slower due to 'overhead' or 'context switching'.
    **The Consequence:** Misunderstanding that in a saturated continuous batching system, the total amount of computational work dictates the timeline, not the sequence distribution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System rate: 3,000 tokens/sec.
       - Scenario A: 100 users * 50 tokens.
       - Scenario B: 10 users * 500 tokens.
    2. **Calculations:**
       - Scenario A Workload: 5,000 tokens.
       - Scenario B Workload: 5,000 tokens.
       - Execution Time: 5,000 tokens / 3,000 tokens/sec = 1.67 seconds.
    3. **Conclusion & Interpretation:**
       **Both scenarios require exactly 1.67 seconds. Result: Total-Throughput-Bound.**
  options:
  - Scenario A is slower due to multi-user overhead.
  - Scenario B is slower because long generations are inefficient.
  - Both scenarios take ~1.67 seconds to complete.
  - Both scenarios take ~0.06 seconds to complete.
