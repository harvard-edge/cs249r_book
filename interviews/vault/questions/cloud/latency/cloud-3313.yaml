title: Optimizing Inference Latency on AMD MI300X with Queueing Theory
scenario: You are designing a real-time inference serving system for a large language model (LLM) using an AMD MI300X accelerator. This specific MI300X unit boasts 192 GB HBM3, 1,307 TFLOPS FP16 sparse computation, and 5.3 TB/s memory bandwidth. Your service must maintain a p99 inference latency of under 50ms. Incoming requests exhibit a Poisson arrival process. Each inference request on the MI300X takes, on average, 25ms to complete (service time).
question: How would you use Little’s Law and M/G/1 queueing to set arrival-rate limits and queue depth for 25 ms MI300X inference under a 50 ms p99 SLA?
details:
  realistic_solution: Model the inference system as an M/G/1 queue (Poisson arrivals, General service time distribution, 1 server - the MI300X). Use Little's Law (L = λW) to relate average number of requests in the system (L), arrival rate (λ), and average time in system (W). To meet p99 latency, calculate the required mean service time and queueing delay. Incorporate system monitoring to track actual arrival rates, service times, and queue lengths. Implement adaptive batching and dynamic load balancing. For capacity planning, use the Pollaczek-Khinchine formula for M/G/1 to estimate average queue length and waiting times, and simulate the system under various load conditions to validate p99 latency guarantees, adjusting the number of MI300X units or request throttling mechanisms as needed. Consideration of the MI300X's HBM3 bandwidth (5.3 TB/s) is crucial for data loading phases, which contribute to service time variance.
  common_mistake: |
    **The Pitfall:** Ignoring the variance in service times and assuming a deterministic service rate.
    **The Rationale:** Candidates often over-optimize for mean latency using simple models like M/M/1.
    **The Consequence:** This leads to underestimated latency at higher utilization or insufficient queue sizing, failing to meet tail latency (p99) SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target P99 Latency (W): 50 ms.
       - Average Service Time (Ts): 25 ms.
       - Target Wait Time (Wq): 50 ms - 25 ms = 25 ms.
    2. **Calculations:**
       - Using simplified M/M/1 assumption to find baseline utilization: Wq = Ts * (ρ / (1-ρ)).
       - 25 ms = 25 ms * (ρ / (1-ρ))
       - 1 = ρ / (1-ρ) => ρ = 0.5.
       - Max Arrival Rate (λ): ρ / Ts = 0.5 / 0.025s = 20 requests/second.
       - P-K formula for M/G/1: Wq = (λ * (Ts² + σ²)) / (2 * (1 - ρ)).
    3. **Conclusion & Interpretation:** **20 requests/sec limit (Queueing Delay-Bound).**
