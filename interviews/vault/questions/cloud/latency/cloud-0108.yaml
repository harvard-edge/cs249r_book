title: The Live Caption Deadline
scenario: 'You are designing a service that provides live audio transcriptions for video calls. The system has a hard real-time deadline: 99% of 10-second audio chunks must be transcribed and returned in under 500ms. For an M/M/c sizing exercise, assume service times are exponential with mean 250ms on one H100. The service receives an average of 3 requests per second (arrival rate), following a Poisson process.'
question: Based on an M/M/c queue, is there a finite number of H100 servers (c) that can keep 99% of 10-second transcription chunks under 500ms at 3 RPS?
details:
  realistic_solution: |
    This is a capacity planning problem that can be modeled with M/M/c queues, but the exponential service-time assumption matters. We need the 99th percentile of total response time, including service time, to be under 500ms.

    1. **Define Rates:** Arrival Rate \u03bb = 3 req/s. Service Rate per server \u03bc = 1 / 0.250s = 4 req/s.

    2. **Analyze c=1 Server:** The load \u03c1 = \u03bb / \u03bc = 3/4 = 75%. For an M/M/1 queue, the average time a request spends in the system (wait + service) is W = 1 / (\u03bc - \u03bb) = 1 / (4-3) = 1 second (1000ms). That utilization is clearly too high for a 500ms tail-latency target, but the decisive bound comes from service time, not from comparing an average to P99.

    3. **Check the M/M/c Tail:** Adding servers can reduce queueing delay, but it cannot remove the service-time tail. With exponential service time and \u03bc = 4/s, P(service time > 500ms) = e^(-4 * 0.5) = e^-2 \u2248 13.5%. Even with zero queueing, more than 1% of requests exceed 500ms from service time alone.

    4. **Conclusion:** Under the stated M/M/c model, there is no finite c that satisfies the 99% under 500ms SLA. To make the SLA feasible, the service-time distribution must be tightened or the mean service time must be much lower than 250ms.
  common_mistake: |
    **The Pitfall:** Provisioning based solely on average utilization limits.
    **The Rationale:** Engineers see that 1 server handles 4 req/s and average load is 3 req/s (75%), assuming that leaves plenty of headroom.
    **The Consequence:** The unpredictable Poisson arrival of requests causes queues to build up rapidly, massively violating the P99 latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\u03bb): 3 req/s.
    - Service Time: 250ms.
    - Service Rate per Server (\u03bc): 1 / 0.250s = 4 req/s.

    **Calculations:**
    - c=1 Server Load (\u03c1): 3 / 4 = 75%.
    - c=1 mean response time (M/M/1): 1 / (\u03bc - \u03bb) = 1 / (4 - 3) = 1.0 second (1000ms), so one server is plainly over the latency target.
    - Exponential service tail: P(S > 500ms) = e^(-\u03bc t) = e^(-4 * 0.5) = e^-2 \u2248 13.5%.
    - This lower bound applies even as c grows, because more servers reduce waiting but do not make a single transcription run faster.

    **Conclusion & Interpretation:**
    - **Result: No finite c under M/M/c (Service-Time-Tail-Bound)**. The 500ms P99 deadline is infeasible unless the service-time tail is reduced.
