title: Why Micro-Benchmarks Mislead at System Level
scenario: A team measures GEMM throughput at 280 TFLOPS on a flagship GPU (98% of peak) but end-to-end training throughput is only 45% MFU.
question: Why can a GEMM micro-benchmark hit near-peak TFLOPS while end-to-end training only achieves 45% MFU?
details:
  realistic_solution: 'Micro-benchmarks isolate a single operation under ideal conditions: data pre-loaded in cache, no kernel launch overhead, steady-state execution. Real training involves: (1) Kernel launch latency — thousands of small kernels with GPU idle time between them. (2) Memory-bound operations — LayerNorm, softmax, and element-wise ops are bandwidth-limited, not compute-limited. (3) Data loading — CPU-to-GPU transfer pipeline stalls. (4) Communication — gradient synchronization across GPUs (AllReduce). (5) Python/framework overhead — graph tracing, memory allocation. The 280 TFLOPS GEMM only applies during large matmuls; the rest of the model execution hits different bottlenecks. MFU measures actual useful FLOPs across the entire step including all overheads.'
  common_mistake: |
    **The Pitfall:** Using peak GEMM TFLOPS to directly estimate end-to-end training time.
    **The Rationale:** Assuming that because matrix multiplications dominate the FLOP count, they also cleanly dominate the wall-clock time.
    **The Consequence:** Drastically underestimating training time and budget, leading to blown project deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak GEMM micro-benchmark utilization is 98%.
    - In the full training step, useful large GEMMs account for about 60% of idealized step time.
    - Memory-bound kernels, communication, framework overhead, and stalls add extra wall-clock time without adding proportional model FLOPs.

    **Calculations:**
    - Normalize ideal model compute to 1.0 unit of work.
    - At 98% GEMM efficiency, the main GEMM work takes about 1.0 / 0.98 = 1.02 idealized compute-time units while it is running.
    - If memory-bound kernels, communication, launch gaps, data stalls, and framework overhead add about 1.2 more units of wall-clock time, total step time is about 2.22 units.
    - End-to-end MFU = useful model FLOPs / elapsed capacity = 1.0 / 2.22 ≈ 45%.

    **Conclusion & Interpretation:**
    - **Result: 45% MFU (Amdahl's-Law-Bound)**. Near-peak GEMM throughput can coexist with much lower end-to-end MFU because the full step includes memory-bound work, synchronization, launch overhead, data stalls, and framework overhead.
