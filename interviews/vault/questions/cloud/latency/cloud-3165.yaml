title: Specifying Speculation Length K vs Draft Model Size
scenario: You are defining the speculative decoding configuration for a 405B target model. The draft model has an acceptance rate (alpha) of 0.78 and costs 3ms per token. The target model decode latency is 80ms.
question: At 80 ms target decode, 3 ms/token draft cost, and alpha=0.78, does K=5 or K=15 give higher throughput?
details:
  realistic_solution: 'K=5 gives higher throughput due to lower draft overhead despite fewer expected tokens per step.'
  common_mistake: |
    **The Pitfall:** Fixing the speculation length (K) statically without analyzing throughput dynamics.
    **The Rationale:** Static thresholds are easier to deploy and conceptualize.
    **The Consequence:** Leaving substantial throughput on the table, as the optimal K depends heavily on draft cost versus target verification cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target decode = 80ms. Draft cost = 3ms/token.
       - Acceptance rate (alpha) = 0.78.
       - Compare K=5 vs K=15.
    2. **Calculations:**
       - For K=5: Expected tokens E = (1 - 0.78^6) / (1 - 0.78) ≈ 3.52 tokens.
       - Time for K=5 = 80ms + (5 * 3ms) = 95ms. Throughput = 3.52 / 0.095 ≈ 37.1 tok/s.
       - For K=15: Expected tokens E = (1 - 0.78^16) / 0.22 ≈ 4.46 tokens.
       - Time for K=15 = 80ms + (15 * 3ms) = 125ms. Throughput = 4.46 / 0.125 ≈ 35.7 tok/s.
    3. **Conclusion & Interpretation:**
       - **Result: Overhead-Bound.** K=5 yields higher throughput (37.1 tok/s vs 35.7 tok/s) because the draft overhead at K=15 outweighs the marginal gain in expected tokens.
