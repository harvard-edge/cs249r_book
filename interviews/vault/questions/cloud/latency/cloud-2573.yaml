title: KV Cache and Attention Costs of Expanding from 4K to 32K Tokens
scenario: A product manager wants to increase the token budget from 4K to 32K tokens for your LLM API.
question: What are the memory, compute, and cost implications of increasing the LLM API token budget from 4K to 32K tokens?
details:
  realistic_solution: 'Token budget = input + output tokens, which directly controls three resources: (1) KV cache memory grows linearly with sequence length, so 8x longer context uses 8x more KV cache per request and reduces concurrent batch size. (2) Dense attention work grows roughly quadratically with sequence length, so the attention portion can grow by up to 64x before kernel and sparsity optimizations. (3) Cost per request increases through both effects, but the multiplier depends on batching, output length, attention implementation, and utilization. A server with room for about 30 concurrent 4K requests may have room for only about 3 concurrent 32K requests with the same KV-cache budget.'
  common_mistake: |
    **The Pitfall:** Only accounting for the quadratic growth in attention compute (FLOPs) while entirely ignoring the linear growth in KV cache memory footprint.
    **The Rationale:** System designs are improperly biased by O(N²) Big-O notation, masking the reality that hardware limits at serving time are almost always dictated by memory capacity, not ALU cycles.
    **The Consequence:** The deployment crashes instantly with Out-Of-Memory errors because the drastically inflated KV cache evicts all concurrent requests, crashing throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context scaling: 4K → 32K (8x increase).
    - Model: 32 layers, 4096 dim, FP16 (2 bytes).
    - Hardware: 80 GB GPU (leaving ~64 GB for KV cache).

    **Calculations:**
    - KV cache per request = 2 (K,V) × layers × hidden size × sequence length × bytes.
    - 4K KV Cache: 2 × 32 × 4096 × 4096 × 2 bytes ≈ 2.1 GB per request.
    - 32K KV Cache: 2 × 32 × 4096 × 32768 × 2 bytes ≈ 17.2 GB per request.
    - Concurrency at 4K: 64 GB / 2.1 GB = ~30 concurrent requests.
    - Concurrency at 32K: 64 GB / 17.2 GB = ~3 concurrent requests.

    **Conclusion & Interpretation:**
    - **Result: KV Cache Capacity Bound**. While attention compute grows roughly with sequence length squared, KV cache grows linearly and cuts concurrency from about 30 to about 3 requests on this GPU.
