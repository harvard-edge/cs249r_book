title: Optimizing Tail Latency for Real-time ML Inference on Google TPU v5e
scenario: A real-time ML inference service using a single Google TPU v5e provides an average latency of 5ms, but P99 latencies reach 500ms due to straggler tasks, violating the 100ms P99 SLA. You are evaluating a multi-TPU architecture to mitigate these tail latencies.
question: What multi-TPU v5e architecture reduces stragglers to meet a 100ms P99 SLA, and how does it compare mathematically to a single TPU?
details:
  realistic_solution: 'For Architecture B, implement a hedged request pattern: send the same inference request to two independent TPU v5e instances simultaneously and take the first response. This significantly reduces the probability of a single straggler delaying the request. Other strategies include dynamic load balancing or proactive straggler detection.'
  common_mistake: |
    **The Pitfall:** Optimizing solely for average latency while neglecting the tail.
    **The Rationale:** Candidates assume that improving mean performance automatically fixes P99 latency, underestimating unpredictable resource contention.
    **The Consequence:** Failing to meet strict SLAs and providing a poor user experience for a significant percentage of requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single TPU P99 straggler rate = 1% (500ms).
    - Architecture B uses a hedged request pattern (2 independent TPUs).
    - Non-straggler latency is below 100ms for each TPU.

    **Calculations:**
    - Single TPU: 1% of requests hit 500ms, so the 100ms P99 SLA is at risk.
    - Hedged pair: probability both TPUs become stragglers = 0.01 * 0.01 = 0.0001 (0.01%).
    - Therefore 99.99% of requests avoid the 500ms straggler tail if the two paths are independent.
    - The P99 is on the non-straggler path, which is <100ms by assumption; the 500ms tail moves to around P99.99.

    **Conclusion & Interpretation:**
    - **Result: hedging can meet the 100ms P99 SLA only if the non-straggler path is under 100ms and duplicate load is controlled; it reduces the 500ms straggler probability from 1% to 0.01%.**
