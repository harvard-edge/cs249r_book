title: Advantages of Continuous Batching
scenario: In traditional static batching, the inference engine waits for all sequences in a batch to finish generating before starting a new batch.
question: "How does continuous batching improve throughput compared to static batching?"
details:
  realistic_solution: Continuous batching inserts new requests into the batch as soon as a sequence finishes, keeping the GPU fully utilized and reducing average latency.
  common_mistake: |
    **The Pitfall:** Assuming continuous batching increases the generation speed of individual tokens.
    **The Rationale:** Confusing per-token latency with overall system throughput.
    **The Consequence:** Misunderstanding the core benefit of maximizing parallel occupancy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Static batch of 8 requests with varied lengths.

    **Calculations:**
    - Short requests sit idle while long ones finish, averaging ~60% wasted capacity.

    **Conclusion & Interpretation:**
    - **Result: Continuous batching yields a 2-3x throughput improvement by filling wasted slots (Compute-Bound)**.
  options:
  - It increases the clock speed of the GPU dynamically.
  - It allows new requests to join the active batch as soon as other sequences complete.
  - It batches all requests that have the exact same prompt length together.
  - It caches the output tokens to reuse them.
