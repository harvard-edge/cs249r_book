title: Dynamic Batching Delay Calculation
scenario: You are configuring a dynamic batcher for a classifier. The strict server-side SLA is 50ms. Profiling shows the model's forward pass execution time scales as T(b) = 15ms + (1.5ms * b). You require a minimum max_batch_delay window of 10ms to absorb traffic micro-bursts.
question: "What maximum max_batch_size guarantees the 50ms SLA when max_batch_delay must be 10ms?"
details:
  realistic_solution: Subtract the 10ms delay from the 50ms SLA to leave a 40ms budget for execution. Solving 15 + 1.5b <= 40 yields a maximum integer batch size of 16.
  common_mistake: |
    **The Pitfall:** Ignoring the dynamic batching wait time in the SLA budget.
    **The Rationale:** Candidates focus solely on the forward pass execution time.
    **The Consequence:** SLA violations for the oldest request in the queue, which waited the full 10ms delay.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA = 50ms, Delay = 10ms, T(b) = 15 + 1.5b.

    **Calculations:**
    - 50ms >= 10ms + 15ms + 1.5b.
    - 25ms >= 1.5b.
    - b <= 16.66.

    **Conclusion & Interpretation:**
    - **Result: Maximum safe batch size is 16 (Latency-Bound)**.
