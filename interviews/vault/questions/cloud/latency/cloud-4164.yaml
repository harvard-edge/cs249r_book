title: Cross-Region Tail Latency in Geo-Distributed Serving
scenario: You serve a 70B model from 3 regions (US-East, EU-West, Asia-Pacific) with MI300X clusters. Local P99 is 80ms, but 15% of requests require cross-region model sharding (the full model doesn't fit in smaller regional clusters). Cross-region P99 is 350ms due to 60-120ms network RTT. Design a system that meets a global P99 SLA of 150ms.
question: How would you design the 3-region MI300X serving system to meet a global P99 SLA of 150 ms?
details:
  realistic_solution: 'As stated, the 150ms global P99 SLA cannot be met while 15% of interactive requests require cross-region model sharding with 350ms cross-region P99. Since 15% of requests are slower than 150ms, the global P99 necessarily falls inside that cross-region tail. The design must remove cross-region inference from the SLA path: place enough MI300X capacity in each region to run the full 70B model locally, route latency-sensitive traffic only to a local full-model replica, and reserve cross-region sharding for batch or async traffic outside the 150ms SLA. If smaller regions cannot host the full model, the concrete fixes are capacity expansion, model repartitioning/quantization so a full replica fits locally, or changing the SLA/product tier for those requests. A distilled fallback can be an optional product tradeoff, but it is not the answer for the full-model SLA.'
  common_mistake: |
    **The Pitfall:** Trying to make cross-region inference fast.
    **The Rationale:** The physics of light in fiber imposes a floor of 60ms RTT US-to-EU.
    **The Consequence:** You fail to meet the SLA; instead, design the system to avoid cross-region inference entirely for latency-sensitive requests.
  napkin_math: |
    **Assumptions & Constraints:** Local P99 is 80ms. Cross-region sharded P99 is 350ms. 15% of requests currently require cross-region sharding. Global P99 SLA is 150ms.
    **Calculations:** With 15% cross-region traffic, at least the slowest 15% of requests are governed by the 350ms cross-region path. The 99th percentile is within that slow cross-region subset, so global P99 is approximately 350ms, not 150ms. To make global P99 <= 150ms, the fraction of SLA-bound requests using the cross-region path must be less than 1%, and in practice should be 0% for margin. Local full-model serving gives P99 around 80ms plus routing overhead, which fits the SLA.
    **Conclusion & Interpretation:** The constrained system is physically/capacity infeasible as written. The release-quality design is to eliminate cross-region full-model inference for latency-sensitive requests by colocating full replicas or changing the model partitioning/capacity plan; cross-region sharding is only acceptable for non-SLA traffic.
