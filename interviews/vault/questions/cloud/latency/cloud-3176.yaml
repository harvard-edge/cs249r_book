title: Speculative Decoding vs Increasing Batch Size
scenario: On 4x H100, a 70B model at batch=1 produces ~96 tok/s (memory-bound).
question: For options (A) speculative decoding (K=5), (B) batch=8, and (C) both, how do latency, throughput, and GPU utilization compare?
details:
  realistic_solution: '(A) Speculation at batch=1: round = 10ms (draft) + 10.5ms (verify, 140GB/13.4TB/s). E[tokens]=3.69. Latency: 20.5/3.69 = 5.6ms/tok. Throughput: 180 tok/s. MBU: 140GB/20.5ms = 6.8 TB/s (51%). (B) Batch=8 no speculation: weight read = 140GB (same — amortized over 8 requests). KV read per step: 8 x 640MB = 5.1GB. Total IO: 145.1GB at 13.4 TB/s = 10.8ms. Compute: 8 x 140G = 1.12T / 3.96P = 0.28ms. Latency: 11.1ms/tok (per request). Throughput: 8/11.1ms = 721 tok/s. MBU: 145.1GB/11.1ms = 13.1 TB/s (98%). (C) Both: batch=8 spec K=5: verify processes 8x6=48 tokens. IO: 140GB + 8 x 640MB (KV) = 145.1GB at 13.4 TB/s = 10.8ms. Compute: 48 x 140G = 6.72T / 3.96P = 1.7ms. Draft: 10ms. Total: 22.5ms (10+10.8+1.7) for 8 x 3.69 = 29.5 tokens. Throughput: 1311 tok/s. Latency: 22.5/3.69 = 6.1ms.'
  common_mistake: |
    **The Pitfall:** Treating speculation and batching as additive improvements.
    **The Rationale:** Candidates fail to realize both techniques exploit the exact same resource: memory bandwidth headroom.
    **The Consequence:** Overestimating the performance gains of combining both techniques at larger batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, 4x H100.

    **Calculations:**
    - Speculation (K=5): 180 tok/s throughput, 5.6ms latency.
    - Batch=8 (no spec): 721 tok/s throughput, 11.1ms latency.
    - Both (Batch=8, K=5): 1311 tok/s throughput, 6.1ms latency.

    **Conclusion & Interpretation:**
    - **Result: Speculation optimizes latency, batching optimizes throughput**. Diminishing returns when combined.
