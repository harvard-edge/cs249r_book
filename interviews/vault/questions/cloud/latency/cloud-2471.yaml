title: On-Device Ad Ranking for Cloud Savings
scenario: A mobile ad network processes 2 Billion requests/day. The cloud DSP retrieves 2000 ad candidates and runs a heavy Deep Learning Recommendation Model (DLRM) to rank them, taking 150ms and costing $0.01 per 1000 requests.
question: How would you redesign ad ranking to cut cloud DLRM costs by 75%, keep latency under 100ms, and use local app history?
details:
  realistic_solution: Design a Cloud-Retrieval, Edge-Ranking architecture. The cloud performs lightweight, non-personalized contextual retrieval to select the top 100 ad candidates using approximate nearest neighbors (ANN). It sends metadata embeddings of these 100 candidates to the phone. A lightweight ranking model deployed via CoreML/NNAPI scores these 100 candidates using the user's rich, raw local history. The cloud avoids running the expensive DLRM entirely.
  common_mistake: |
    **The Pitfall:** Moving the entire retrieval pipeline to the mobile edge.
    **The Rationale:** Assuming "edge compute" means transferring the whole cloud workload to the device.
    **The Consequence:** Fetching millions of ad candidates to score locally consumes massive bandwidth, destroys battery life, and breaks latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2B requests/day.
    - Cloud DLRM baseline: 150ms latency, $0.01/1k requests.
    - A 75% cost cut means the new cloud path must cost no more than 25% of baseline.
    - Redesign keeps cloud retrieval lightweight by reducing candidates from 2000 to 100 before sending them to the phone.
    - Candidate payload budget: 100 candidates * 512 bytes of compact metadata/embedding = 51.2KB.
    - Mobile downlink budget for the candidate response: 20 Mbps effective throughput, counted after cloud retrieval and before local ranking.
    - Local app-history ranker budget: score 100 candidates in 10ms on the device NPU.

    **Calculations:**
    - Baseline cost: (2B / 1000) * $0.01 = $20,000/day.
    - Maximum new cloud cost for a 75% cut: $20,000/day * 25% = $5,000/day, or $0.0025/1k requests.
    - If lightweight retrieval costs at or below $0.0025/1k, daily cloud cost is <= (2B / 1000) * $0.0025 = $5,000/day.
    - Candidate transfer time: 51.2KB * 8 / 20 Mbps = 20.5ms one-way response payload time.
    - Latency budget example: 20ms cloud retrieval + 21ms candidate transfer + 10ms local ranking = 51ms, leaving about 49ms for request overhead and variance under the 100ms SLA.

    **Conclusion & Interpretation:**
    - **Result: Cost and latency targets are feasible with a compact edge-rank design.** The cloud must keep retrieval-only cost at or below $0.0025/1k requests, send a small candidate payload, and reserve enough device budget for the local app-history ranker.
