title: On-Device Ad Ranking for Cloud Savings
scenario: 'A mobile ad network processes 2 Billion requests/day. The cloud DSP retrieves 2000 ad candidates and runs a heavy Deep Learning Recommendation Model (DLRM) to rank them, taking 150ms and costing $0.01 per 1000 requests.'
question: "How would you redesign ad ranking to cut cloud DLRM costs by 75%, keep latency under 100ms, and use local app history?"
details:
  realistic_solution: 'Design a Cloud-Retrieval, Edge-Ranking architecture. The cloud performs lightweight, non-personalized contextual retrieval to select the top 100 ad candidates using approximate nearest neighbors (ANN). It sends metadata embeddings of these 100 candidates to the phone. A lightweight ranking model deployed via CoreML/NNAPI scores these 100 candidates using the user''s rich, raw local history. The cloud avoids running the expensive DLRM entirely.'
  common_mistake: |
    **The Pitfall:** Moving the entire retrieval pipeline to the mobile edge.
    **The Rationale:** Assuming "edge compute" means transferring the whole cloud workload to the device.
    **The Consequence:** Fetching millions of ad candidates to score locally consumes massive bandwidth, destroys battery life, and breaks latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2B requests/day.
       - Cloud DLRM baseline: 150ms latency, $0.01/1k requests ($20k/day).
       - Constraints: 75% cost reduction target, <100ms latency.
    2. **Calculations:**
       - New Cloud Cost (Retrieval Only): (2B / 1000) × $0.002 = $4,000/day (80% savings).
       - Latency Breakdown: 20ms cloud retrieval + 30ms network transfer (100 embeddings) + 10ms local NPU ranking = 60ms.
    3. **Conclusion & Interpretation:**
       **Result: Latency Bound Met. Cost drops by 80% to $4k/day, and latency drops to 60ms, easily clearing the 100ms SLA.**
