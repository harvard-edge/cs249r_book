title: Streaming Inference Batch Size Limits
scenario: You are designing a streaming pipeline for a live audio transcription model on an NVIDIA T4 GPU. Audio arrives in 20ms chunks. The service-level agreement (SLA) requires end-to-end latency to be under 200ms. Network I/O overhead is 30ms. Model compute time is fixed at 15ms per batch (for any batch size up to 16).
question: If you buffer chunks from a *single* audio stream to increase throughput, what is the maximum batch size you can accumulate without violating the SLA for the first chunk in the batch?
details:
  realistic_solution: Limit single-stream batch size to 8 (140ms buffering wait time) or multiplex multiple independent audio streams so the dynamic batcher can build a full batch of 16 from different concurrent users without waiting for future sequential chunks.
  common_mistake: |
    **The Pitfall:** Using the hardware's maximum batch size to optimize throughput without regard for accumulation time.
    **The Rationale:** Candidates focus solely on compute efficiency (maximizing batch size = 16) but forget that waiting for 16 live audio chunks physically takes time.
    **The Consequence:** Accumulating 16 chunks takes 320ms, which instantly violates the 200ms SLA before the GPU even begins processing.
  napkin_math: |
    - SLA Constraint: Total Latency ≤ 200ms.
    - Components: Total Latency = Network (30ms) + Buffering Wait + Compute (15ms).
    - Equation: 200ms = 30ms + (N-1) * 20ms + 15ms.
    - Simplification: 155ms = (N-1) * 20ms.
    - Solve for N: N-1 = 7.75, so Max N = 8 chunks.
    - Verification: First chunk waits 7 * 20ms = 140ms. Total = 30 + 140 + 15 = 185ms (passes).
    - **Conclusion: The maximum safe batch size for a single stream is 8 chunks.**
