title: Calculating Latency Impact of CPU Affinity
scenario: You are deploying a latency-sensitive BERT inference service on a dual-socket Intel Xeon server. The model uses 4 threads per request. Currently, the OS schedules threads freely, resulting in a P99 latency of 28ms, which violates the strict 15ms SLA. Profiling shows high L3 cache miss rates and significant cross-NUMA memory traffic.
question: "How should you use CPU affinity and NUMA binding to bring 4-thread BERT requests under the 15ms SLA?"
details:
  realistic_solution: Use `taskset` or framework environment variables (like `KMP_AFFINITY=granularity=fine,compact,1,0`) to pin the 4 inference threads to adjacent physical cores on the same NUMA node, ensuring they share the same L3 cache and avoid cross-socket memory requests.
  common_mistake: |
    **The Pitfall:** Assuming the OS scheduler handles thread affinity optimally out-of-the-box.
    **The Rationale:** Developers often trust default CPU scheduling for general workloads to automatically handle high-performance ML inference.
    **The Consequence:** Threads migrate across sockets, causing massive cache invalidation and NUMA memory traffic, which routinely blows past strict tail-latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model working set: 20 MB.
       - Main DRAM access: 100 ns.
       - L3 cache access: 15 ns.
       - Cache line size: 64 bytes.
    2. **Calculations:**
       - Thread migration forces fetching 20 MB from main DRAM instead of L3.
       - Penalty = (20 MB / 64 B) * (100 ns - 15 ns) = 327,680 * 85 ns ≈ 27.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Latency-Bound. Explicit CPU affinity avoids this cold-cache penalty, reducing P99 latency back under 15ms.**
