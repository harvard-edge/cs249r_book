title: Sensitivity Wall For LLM Decode
scenario: A 30B model decodes at 80 ms/token. Profiling estimates that a 10% HBM bandwidth increase would reduce latency by 7 ms, while a 10% FLOPs increase would reduce latency by 0.5 ms.
question: Which upgrade should you prioritize if 10% more HBM saves 7 ms/token but 10% more FLOPs saves 0.5 ms/token?
details:
  realistic_solution: The sensitivity points to a memory-bandwidth-bound workload. HBM bandwidth has 14x the latency impact of FLOPs for the same percentage improvement. Prioritize bandwidth, quantization, batching, or memory-traffic reduction rather than peak compute.
  common_mistake: |
    **The Pitfall:** Choosing the upgrade based strictly on peak compute numbers.
    **The Rationale:** Engineers are naturally drawn to higher TFLOPs specs because they assume all models are compute-bound.
    **The Consequence:** Pouring money into massive compute upgrades that yield functionally zero latency improvements because the workload remains starved by HBM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10% HBM bandwidth improvement saves 7 ms.
    - 10% FLOPs improvement saves 0.5 ms.

    **Calculations:**
    - Ratio = 7 ms / 0.5 ms = 14x.

    **Conclusion & Interpretation:**
    - **Result: 14x more benefit comes from upgrading bandwidth over FLOPs (Memory-Bandwidth-Bound)**. Bottleneck: Memory-Bandwidth-Bound.
