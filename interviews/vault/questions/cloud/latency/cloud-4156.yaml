title: Fan-Out Tail Amplification in Mixture-of-Experts
scenario: 'Your MoE model with 8 experts across 8 MI300X GPUs activates 2 experts per token. Each expert has P99 = 20ms. A single token''s latency is determined by the slower of its 2 experts.'
question: 'For a batch of 128 tokens, each needing different expert pairs, what is the expected P99 of the full batch, and how do you mitigate the amplification?'
details:
  realistic_solution: 'Single token: P(both experts < 20ms) = 0.99^2 = 0.9801. So per-token P99 ≈ P98 of single expert ≈ 18ms. But for 128 tokens across a batch: P(all 128 tokens fast) = 0.9801^128 = 0.079 - only 8% chance that no token hits tail. The batch P99 is dominated by the worst token, which will almost certainly have at least one expert hitting P99.9+, roughly 45ms. Mitigation: (1) Expert-parallel AllToAll overlapped with compute so no token blocks others; (2) speculative expert execution - run top-3 experts, use first 2 to respond; (3) expert replication - place hot experts on multiple GPUs via Infinity Fabric to reduce queuing at popular experts.'
  common_mistake: |
    **The Pitfall:** Calculating P99 latency for a single token's 2-expert fan-out, but forgetting that the entire batch waits for the slowest token.
    **The Rationale:** Engineers ignore that in a batch of 128 tokens, the probability of *at least one* token hitting a tail latency is extremely high.
    **The Consequence:** The observed batch P99 in production is drastically worse than the isolated per-token P99 estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 MI300X GPUs, 8 experts, 2 experts/token.
    - Expert P99 latency = 20ms.
    - Batch size = 128 tokens.

    **Calculations:**
    - Single token P(fast) = 0.99 * 0.99 = 0.9801 (assuming independence).
    - Batch P(all 128 tokens fast) = (0.9801)^128 = 0.0768.
    - Batch tail probability = 1 - 0.0768 = 92.3%.

    **Conclusion & Interpretation:**
    - **Result: Latency Amplification.** A batch of 128 tokens has a >92% chance of being blocked by an expert hitting its tail latency, degrading batch throughput to P99.9+ levels.
