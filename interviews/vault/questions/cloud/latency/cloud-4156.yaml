title: Fan-Out Tail Amplification in Mixture-of-Experts
scenario: Your MoE model with 8 experts across 8 MI300X GPUs activates 2 experts per token. Each expert has P99 = 20ms. A single token's latency is determined by the slower of its 2 experts.
question: Why does a 128-token MoE batch amplify expert tail latency, and how do you mitigate it?
details:
  realistic_solution: 'A single token waits for the slower of its 2 selected experts. If each expert is below 20ms on 99% of calls and expert latencies are independent, one token is below 20ms with probability 0.99^2 = 98.01%. A 128-token batch waits for its slowest token, so the chance that every token stays below 20ms is only 0.9801^128, about 7.7%. That does not by itself give an exact batch P99; it shows that the full batch will frequently include at least one expert-tail event unless the full expert-latency distribution is known. Mitigations: overlap AllToAll communication with expert compute, use capacity-aware routing and admission control for hot experts, replicate hot experts across GPUs, split or stream batches so one slow token does not block unrelated tokens, and monitor per-expert queueing tails.'
  common_mistake: |
    **The Pitfall:** Calculating P99 latency for a single token's 2-expert fan-out, but forgetting that the entire batch waits for the slowest token.
    **The Rationale:** Engineers ignore that in a batch of 128 tokens, the probability of *at least one* token hitting a tail latency is extremely high.
    **The Consequence:** The observed batch P99 in production is drastically worse than the isolated per-token P99 estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 MI300X GPUs, 8 experts, 2 experts/token.
    - Expert P99 latency = 20ms.
    - Batch size = 128 tokens.

    **Calculations:**
    - Single token P(fast) = 0.99 * 0.99 = 0.9801 (assuming independence).
    - Batch P(all 128 tokens fast) = (0.9801)^128 = 0.0768.
    - Batch probability that at least one token exceeds the 20ms expert-P99 threshold = 1 - 0.0768 = 92.3%.
    - Exact batch P99 requires the latency distribution beyond each expert's P99, which is not provided.

    **Conclusion & Interpretation:**
    - **Result: tail amplification, not a derivable exact batch P99 from the stated inputs.** A batch of 128 tokens has a >92% chance of including at least one token above the 20ms expert-P99 threshold, so mitigation should reduce expert queueing and decouple slow tokens from the whole batch.
