title: The Batching Window Dilemma
scenario: You are managing an LLM inference service that uses continuous batching on H100 GPUs. Your team has a strict P99 Time-To-First-Token (TTFT) SLO of 200ms. The round-trip network latency adds a fixed 30ms, and the GPU inference time is a constant 50ms.
question: With a 200ms P99 TTFT SLO, 30ms network latency, and 50ms GPU time, what is the maximum queue wait for batching?
details:
  realistic_solution: 'The core tradeoff is between throughput and latency. Longer batching windows allow for larger batches, which increases GPU utilization and overall throughput. However, this added queue time directly increases the latency perceived by the end-user. To solve this, we must sum all latency components and ensure they are less than or equal to the SLO. Maximum queue wait = 200ms (SLO) - 30ms (network) - 50ms (GPU) = 120ms.'
  common_mistake: |
    **The Pitfall:** Ignoring fixed network and compute costs when setting batching windows.
    **The Rationale:** Engineers overestimate the available budget for batching by failing to sum all end-to-end latency components.
    **The Consequence:** Causing systemic P99 SLO violations in production despite highly utilized GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Latency Budget (SLO): 200 ms.
    - Fixed Network Latency: 30 ms.
    - Fixed GPU Compute: 50 ms.

    **Calculations:**
    - Total Fixed Cost = 30 ms + 50 ms = 80 ms.
    - Maximum Queue Wait = Total Budget - Fixed Costs.
    - Maximum Queue Wait = 200 ms - 80 ms = 120 ms.

    **Conclusion & Interpretation:**
    - **Result: 120 ms (Latency-Bound)**. Any request waiting longer than 120 ms in the continuous batching queue will definitively violate the 200 ms TTFT SLO.
  options:
  - 150 ms
  - 170 ms
  - 120 ms
  - 200 ms
  correct_index: 2
