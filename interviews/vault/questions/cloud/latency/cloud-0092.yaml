title: The Real-Time Translation Bottleneck
scenario: You are designing an LLM serving system for a real-time translation application on a single H100. The model is 40B parameters, quantized to INT8.
question: To understand the system's limits, what is the theoretical minimum baseline Time Per Output Token (TPOT) for a single, isolated user?
details:
  realistic_solution: The process is memory-bound. We can prove this by comparing the time for memory access vs. compute. The time to read the 40GB of weights is the dominant factor. The theoretical minimum time per output token (TPOT) is determined by dividing the model size by the memory bandwidth.
  common_mistake: |
    **The Pitfall:** Calculating token generation speed based on GPU TFLOPS.
    **The Rationale:** Engineers assume a GPU's performance is always defined by its compute limits (FLOPs).
    **The Consequence:** Ignoring the memory wall, leading to drastically over-optimistic latency estimates since single-batch generation has extremely low arithmetic intensity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 40B parameters quantized to INT8 (40 GB).
       - Batch size: 1.
       - H100 memory bandwidth: ~3.35 TB/s.
    2. **Calculations:**
       - Autoregressive generation at batch size 1 is memory-bandwidth bound.
       - Theoretical Minimum TPOT = Total Model Size / Memory Bandwidth.
       - 40 GB / 3350 GB/s ≈ 0.0119 seconds.
    3. **Conclusion & Interpretation:** **~11.9 ms per token (Memory Bandwidth-Bound).**
  options:
  - Less than 1 ms. The operation is compute-bound, limited by the H100's PetaFLOP-scale compute.
  - Approximately 95 ms. The 3.35 TB/s bandwidth is measured in Terabits, not TeraBytes, reducing effective bandwidth.
  - Approximately 12 ms. The operation is memory-bound by the time it takes to read 40 GB of weights over the 3.35 TB/s HBM interface.
  - Around 300 ns. This is the fundamental latency of a single HBM3 memory access.
  correct_index: 2
