title: Calculating Maximum Allowable Latency Jitter for RTB
scenario: 'Your team operates a real-time bidding (RTB) inference service on AWS instances. The base neural network execution takes a highly predictable 12ms. However, monitoring shows a p99 latency of 65ms, causing bid timeouts. Tracing reveals that 45ms of this tail latency is pure latency jitter caused by OS thread context switching, garbage collection, and NUMA node crossing. Your strict SLA is 40ms and standard network overhead is 5ms.'
question: What is the maximum allowable jitter under the 40ms SLA, and how much must the current 45ms jitter be reduced?
details:
  realistic_solution: 'Calculate the strict latency budget available for jitter. Implement core pinning (CPU affinity) for the model execution threads and isolate background tasks to eliminate context switching, ensuring the jitter stays within the newly calculated budget.'
  common_mistake: |
    **The Pitfall:** Assuming the model itself needs mathematical optimization.
    **The Rationale:** Engineers often default to ML-specific optimizations like quantization when facing latency issues.
    **The Consequence:** Wasting time on model compression instead of addressing the OS-level resource contention causing the timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA = 40ms.
    - Fixed costs = 12ms (Model execution) + 5ms (Network overhead) = 17ms.
    - Current Jitter = 45ms.
    
    **Calculations:**
    - Max Allowable Jitter = 40ms SLA - 17ms Fixed = 23ms.
    - Required Reduction = 45ms - 23ms = 22ms.
    
    **Conclusion & Interpretation:**
    - **Result: 22ms (Latency-Bound)**. The team must eliminate at least 22ms of jitter to meet the 40ms SLA.
