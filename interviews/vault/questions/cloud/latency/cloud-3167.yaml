title: Tree-Structured Speculation vs Linear Speculation
scenario: A team is comparing linear speculation (K=5 sequential draft tokens) with tree-structured speculation (branching factor 2, depth 3, total 7 draft tokens) for a 70B target on 4x H100. Draft acceptance rate alpha=0.75.
question: Which produces more served tokens per verification round, and what is the verification cost difference?
details:
  realistic_solution: 'Linear (K=5, alpha=0.75): expected accepted draft tokens are alpha + alpha^2 + ... + alpha^5 = 2.29. Including the one correction/next token emitted by the target, expected served tokens are 3.29 per round. For a 70B model (140GB) on 4x H100 (13.4 TB/s aggregate), batch=1 verification is memory-bandwidth bound, taking ~10.5ms (140GB / 13.4 TB/s) for the linear pass. Tree (depth=3, branch=2, 7 nodes): explores alternatives and empirically yields about 3.8 served tokens per round. However, tree attention requires a sparse causal mask with a tree structure. FlashAttention-2 must handle this non-contiguous mask, reducing memory read efficiency and adding ~10% overhead (~11.6ms total verify time). Net throughput ignoring draft time: Tree yields 3.8 tokens / 11.6ms = 327.6 tok/s. Linear yields 3.29 tokens / 10.5ms = 313.3 tok/s. Tree speculation wins slightly by amortizing the memory-bound verification cost over more served tokens, despite the mask overhead.'
  common_mistake: |
    **The Pitfall:** Assuming tree speculation automatically and unequivocally wins without understanding the FlashAttention overhead.
    **The Rationale:** Candidates look at the higher token yield but forget that the tree attention requires a complex, non-contiguous causal mask that reduces FlashAttention efficiency.
    **The Consequence:** Inaccurate architectural planning that ignores the software-hardware co-design realities of sparse attention masking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B target (140GB) on 4x H100 (13.4 TB/s aggregate).
    - Linear K=5, p=0.75.
    - Tree depth=3, branch=2 (7 nodes). Empirical p yield ~3.8 tokens.
    - Tree mask overhead: ~10%.

    **Calculations:**
    - Linear accepted draft tokens: 0.75 + 0.75^2 + 0.75^3 + 0.75^4 + 0.75^5 = 2.29 tokens.
    - Linear served tokens: 2.29 accepted draft tokens + 1 correction/next token = 3.29 tokens.
    - Linear Verify Time: 140GB / 13.4 TB/s = ~10.5ms.
    - Tree Verify Time: 10.5ms * 1.10 = ~11.6ms.
    - Linear Throughput: 3.29 tokens / 10.5ms = 313.3 tok/s.
    - Tree Throughput: 3.8 tokens / 11.6ms = 327.6 tok/s.

    **Conclusion & Interpretation:**
    - **Result: 327.6 tok/s (Memory Bandwidth-Bound).** Tree speculation yields higher throughput (327.6 tok/s vs 313.3 tok/s) because memory bandwidth bottlenecks verification, making the extra draft tokens highly effective despite mask overhead.
