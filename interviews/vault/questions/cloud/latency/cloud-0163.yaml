title: The Black Friday Collapse
scenario: Our GPU serving cluster handles 1,000 QPS at 50ms latency. On Black Friday, traffic spiked 10x to 10,000 QPS. The system didn't just slow down 10x; it completely collapsed, with latencies hitting 10 seconds and GPUs throwing Out Of Memory errors despite appearing to have free VRAM.
question: Why did the system fail non-linearly, and how does continuous batching on GPUs shift this queueing knee point differently than traditional CPU-based web serving?
details:
  realistic_solution: |
    The collapse is caused by two knees interacting. In a traditional CPU-style queue, waiting time grows non-linearly as utilization approaches 1; Little's Law relates average concurrency, throughput, and latency, but it is not the reason queues grow "exponentially" at 70%. In an LLM serving cluster, the scheduler also has a GPU-memory knee: each admitted sequence consumes KV cache, and naive static reservation or fragmented allocation can exhaust usable HBM before raw compute looks saturated. Continuous batching shifts the behavior because it schedules at token granularity and can retire finished sequences quickly, but it does not make bursts free. With paged KV-cache allocation, memory pressure is closer to actual live tokens rather than maximum context reservations, so the system degrades later and more smoothly; without it, a traffic spike can trigger OOM or KV-cache swapping while utilization dashboards still look moderate.
  common_mistake: |
    **The Pitfall:** Assuming linear degradation ("10x traffic means 10x latency").
    **The Rationale:** Engineers often apply simple linear scaling mental models to complex queueing systems and ignore GPU memory fragmentation.
    **The Consequence:** The system experiences non-linear collapse (OOM) before hitting compute limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Queueing knee: for an M/M/1-style approximation, average number in system is L = ρ / (1 - ρ).
    - Memory wall: H100 has 80GB VRAM available for weights, activations, and KV cache.
    - Naive allocator reserves 8GB per active request for a worst-case context window.
    - Paged KV-cache allocation grows with actual live tokens instead of reserving the maximum upfront.

    **Calculations:**
    - At ρ = 0.5, L = 0.5 / 0.5 = 1 request in system on average.
    - At ρ = 0.9, L = 0.9 / 0.1 = 9 requests in system on average.
    - Static KV reservation for 9 active requests: 9 × 8GB = 72GB, leaving little room for fragmentation, activations, or additional bursts.
    - A 10x traffic spike can push concurrency far beyond this average, causing memory failure before compute reaches a clean saturation point.

    **Conclusion & Interpretation:**
    - **Result: Queueing and KV-Cache Memory Knees Interact.** Continuous batching with paged KV allocation can shift the collapse point higher, but only because it reduces wasted memory and retires finished sequences promptly; it still needs admission control when live-token memory approaches HBM limits.
