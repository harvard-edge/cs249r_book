title: Tail Latency Amplification in Multi-Stage H100 Pipeline
scenario: A 4-stage inference pipeline runs on H100 GPUs. Each stage has p99 latency of 50ms. The pipeline coordinator reports end-to-end p99 of 220ms, roughly 4x the per-stage p99.
question: "Explain tail latency amplification and why does a 4-stage pipeline with 50ms per-stage p99 show ~220ms end-to-end p99?"
details:
  realistic_solution: 'In a sequential pipeline, end-to-end latency is the sum of per-stage latencies. If stages are statistically independent, the variance of the sum is the sum of the variances, meaning the p99 of the pipeline would be much less than the sum of the individual p99s (e.g., closer to 160ms). Observing a 220ms p99 means the stages are highly correlated. Tail latencies in ML pipelines compound due to head-of-line blocking and queuing: when a request hits a tail latency in stage 1, it causes queue pileups that force subsequent stages into their tail distributions as well, pushing the end-to-end p99 beyond the simple 200ms sum.'
  common_mistake: |
    **The Pitfall:** Assuming independent probabilities for tail latencies across sequential pipeline stages.
    **The Rationale:** Misapplying statistical independence to a system where queues and head-of-line blocking link the stages together.
    **The Consequence:** Grossly underestimating end-to-end tail latency and failing to identify systemic queuing delays (correlation) across the pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 sequential stages.
       - Per-stage p99 = 50ms.
       - End-to-end p99 = 220ms.
    2. **Calculations:**
       - If Independent: Stage mean=30ms, p99=50ms implies stddev~8.5ms.
       - Sum of 4 Independent Stages: Mean=120ms, stddev=17ms. Independent p99 = 120 + 2.33*17 = ~160ms.
       - Observed Reality: 220ms >> 160ms (and strictly > 200ms, the simple sum of p99s).
    3. **Conclusion & Interpretation:**
       - **Result: Queue-Bound Amplification.** The 220ms p99 proves strong positive correlation and compounding queueing delays (head-of-line blocking) across the pipeline.
