title: 'Queueing Theory Design: Autoscaling Policy for P99 SLO'
scenario: An autoscaling policy is needed for an H100 inference fleet serving GPT-4-scale requests (mean service time 2.5s, P99 SLO = 8s).
question: For mean service time 2.5s and P99 SLO 8s, what safe utilization, scale trigger, and fleet size are needed for 1000 req/s under M/M/c queueing theory?
details:
  realistic_solution: 'Use one effective-server model: each H100 completes a batch of 8 requests in 2.5s, so its effective per-request service time is 0.3125s and μ = 3.2 req/s. With the M/M/1 tail approximation P99 response ≈ 4.6/(μ-λ_server), the 8s SLO gives μ-λ_server > 4.6/8 = 0.575 req/s, so λ_server < 2.625 req/s and ρ < 2.625/3.2 = 82%. Use a lower 75% autoscale trigger as a safety margin for burstiness and model error. At 75%, each H100 safely carries 0.75 * 3.2 = 2.4 req/s, so 1000 req/s requires ceil(1000/2.4) = 417 H100s.'
  common_mistake: |
    **The Pitfall:** Setting autoscale trigger at 80% CPU/GPU utilization without deriving from the actual P99 SLO constraint.
    **The Rationale:** The safe utilization depends heavily on service time variance and tail latency targets.
    **The Consequence:** Violating the P99 SLO because utilization is too high for the variance.
  napkin_math: |
    **Assumptions & Constraints:**
    - One H100 serves a batch of B=8 requests in 2.5s.
    - Effective per-request service time for sizing = 2.5 / 8 = 0.3125s, so μ = 3.2 req/s.
    - Target P99 response time = 8s.

    **Calculations:**
    - M/M/1 response-time tail approximation: P99 ≈ 4.6 / (μ - λ_server).
    - Require 4.6 / (3.2 - λ_server) < 8.
    - 3.2 - λ_server > 0.575, so λ_server < 2.625 req/s.
    - Maximum utilization ρ_max = 2.625 / 3.2 = 0.82.
    - Choose scale trigger = 75% utilization as a safety margin below the 82% model limit.
    - Safe per-H100 load at 75% = 0.75 * 3.2 = 2.4 req/s.
    - Fleet for 1000 req/s = ceil(1000 / 2.4) = 417 H100s.

    **Conclusion & Interpretation:**
    - **Result: 82% theoretical maximum utilization, 75% scale trigger, and 417 H100s**. The fleet size follows from the same batched effective-service model used for the P99 bound.
