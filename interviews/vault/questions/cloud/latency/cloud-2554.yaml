title: Cloud Zero Copy Serialization
scenario: Your team debates using FlatBuffers (zero-copy, but rigid schema) vs. Protobuf (fast binary,
  but requires deserialization) vs. JSON (flexible, human-readable, slow) for your ML serving API. Evaluate
  for a latency-sensitive inference service.
question: For a latency-sensitive ML serving API, how would you choose among FlatBuffers, Protobuf, and
  JSON?
details:
  realistic_solution: 'FlatBuffers: zero deserialization cost, smallest wire size, but schemas are rigid
    — adding/removing fields requires schema evolution planning. Best for internal service-to-service
    calls where latency matters and schemas are stable. Protobuf: ~10x faster than JSON, compact binary
    format, excellent schema evolution (field numbers), but still requires deserialization into objects.
    Good balance for APIs that evolve frequently. JSON: human-readable, universal tooling, but 10-100x
    slower to parse and 3-4x larger on wire. Only suitable for external APIs or debug endpoints. For latency-sensitive
    inference: FlatBuffers internally (model server ↔ preprocessing), Protobuf at API boundary (client
    ↔ gateway), JSON only for monitoring/debugging endpoints.'
  common_mistake: '**The Pitfall:** Using JSON everywhere for simplicity.

    **The Rationale:** Engineers often default to JSON because of its human readability, ignoring that
    serialization overhead compounds heavily in microservice chains.

    **The Consequence:** In a 10-hop chain, JSON adds 5ms of latency, which can completely dominate the
    actual inference time for small, high-speed ML models.'
  napkin_math: '**Assumptions & Constraints:**

    - Latency per 1 KB payload: JSON ~0.5 ms, Protobuf ~0.05 ms, FlatBuffers ~0.001 ms.

    - Traffic: 50,000 requests/sec.

    **Calculations:**

    - JSON CPU cost: 50,000 * 0.0005 s = 25 CPU cores.

    - Protobuf CPU cost: 50,000 * 0.00005 s = 2.5 cores.

    - FlatBuffers CPU cost: 50,000 * 0.000001 s = 0.05 cores.

    **Conclusion & Interpretation:**

    - **Result: FlatBuffers saves 25 CPU cores (Compute-Bound)**. FlatBuffers eliminates deserialization
    compute overhead, making it the only viable choice for tight intra-cluster latency budgets.'
