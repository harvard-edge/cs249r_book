title: The Multi-Tenant SLO Crisis
scenario: Your platform serves latency-sensitive 'Swift' requests and long-running 'Deep' prefill requests on the same H100 GPU cluster.
question: What serving architecture lets latency-sensitive Swift requests avoid being blocked by long Deep prefills on the same H100 cluster?
details:
  realistic_solution: 'Implement preemptive continuous batching (e.g., using vLLM or Orca engines) that chunks prefill operations into smaller token blocks. This prevents long-running deep prefills from monopolizing the SMs.'
  common_mistake: |
    **The Pitfall:** Proposing a simple priority queue.
    **The Rationale:** Candidates think ensuring 'Swift' requests are picked next from the queue solves latency issues.
    **The Consequence:** It doesn't solve Head-of-Line Blocking; if a 'Deep' model prefill has already started, non-preemptive batching forces the 'Swift' request to wait for the long computation to finish.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model. Heavy prefill is 10k tokens.
    - H100 peak compute is 989 TFLOPS.
    - Standard batching vs continuous batching with 256-token chunks.

    **Calculations:**
    - Heavy prefill compute: 2 * 70B * 10,000 = 1,400 TFLOPs.
    - Standard batching kernel time: 1,400 TFLOPs / 989 TFLOPS = 1.41 seconds.
    - Preemptive chunk compute (256 tokens): 2 * 70B * 256 = 35.8 TFLOPs.
    - Chunk time: 35.8 TFLOPs / 989 TFLOPS = 36.2 ms.

    **Conclusion & Interpretation:**
    - **Result: 36ms chunk time vs 1.4s full time (Compute-Bound)**. The system avoids Head-of-Line Blocking via continuous batching.
