title: Diagnosing Throughput Collapse in LLM Serving
scenario: Your team is serving a 70B LLM on an 8xH100 instance. Under normal load, the system processes
  20 requests per second (RPS) with an average end-to-end latency of 2.0 seconds per request. During a
  sudden traffic spike to 50 RPS, you observe that throughput plateaus at exactly 30 RPS, while the average
  latency balloons to 5.0 seconds. Using Little's Law, analyze the system state to determine the root
  cause of this throughput plateau and identify the underlying hardware or software bottleneck.
question: "Using Little's Law, what concurrency is the 8xH100 LLM service hitting at 30 RPS and 5s latency, and what bottleneck explains the plateau?"
details:
  realistic_solution: Apply Little's Law (Concurrency = Throughput × Latency). In the initial state, Concurrency
    = 20 RPS × 2s = 40 requests. During the spike, Concurrency = 30 RPS × 5s = 150 requests. This indicates
    the system has hit a hard concurrency limit of 150 (likely due to exhaustion of KV cache memory or
    a statically configured maximum batch size limit). Additional requests are simply queueing up, which
    increases average latency without improving throughput. To fix this, you must increase concurrent
    capacity by optimizing memory (e.g., PagedAttention, quantization) or scaling out.
  common_mistake: Candidates often jump to the conclusion that the GPUs are compute-bound (out of FLOPs)
    without quantifying the concurrency, missing that it's actually a memory or max-batch-size bottleneck.
  napkin_math: Initial Concurrency (L) = 20 req/s * 2.0 s = 40 concurrent requests. Spike Concurrency
    (L) = 30 req/s * 5.0 s = 150 concurrent requests. The system is saturated at 150 concurrent requests.
