title: 'Analyzing Low Compute Utilization in Memory-Bound Kernels'
scenario: 'You are reviewing a GPU profiler trace for a custom inference workload running on a GPU. The trace shows that the latency for a specific linear layer is unexpectedly high. The profiler reports that memory bandwidth utilization is at 100%, but the compute (SM) utilization is capped at roughly 13%.'
question: 'Why is compute utilization capped near 13% when the layer''s arithmetic intensity is 20 FLOPs/Byte?'
details:
  realistic_solution: 'The candidate should recognize that this behavior is perfectly explained by the roofline model. The kernel is severely memory-bound because its arithmetic intensity (20 FLOPs/Byte) is far below the ridge point (156 FLOPs/Byte). The GPU is fetching data as fast as the hardware allows (saturating the 2.0 TB/s bandwidth), but it simply doesn''t have enough math operations to perform per byte to keep the compute cores busy, resulting in the 13% compute utilization.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing low SM utilization as a CPU bottleneck, a PCIe transfer issue, or inefficient kernel launch overhead.
    **The Rationale:** Candidates see low compute utilization and assume the GPU is "waiting" for work, completely ignoring the 100% memory bandwidth saturation metric.
    **The Consequence:** Wasting time trying to optimize kernel launches or CPU threading when the fundamental mathematical limit of the hardware has already been reached.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 312 TFLOPS.
    - Peak Bandwidth: 2.0 TB/s.
    - Hardware Ridge Point: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
    - Kernel Arithmetic Intensity: 20 FLOPs/Byte.

    **Calculations:**
    - Max achievable compute throughput: 20 FLOPs/Byte * 2.0 TB/s = 40 TFLOPS.
    - Compute Utilization: (40 TFLOPS / 312 TFLOPS) * 100 = 12.82%.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. The 13% compute utilization perfectly matches the roofline limit. The GPU is saturated moving data and mathematically cannot execute more TFLOPS.
