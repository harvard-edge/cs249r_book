title: Cloud Zero Copy Serialization L2 0
scenario: Your ML serving pipeline uses JSON to serialize model inputs between microservices. P99 latency is 15 ms, with 8 ms spent on serialization/deserialization.
question: 'How would zero-copy serialization reduce the 8 ms JSON serialization cost and improve the 15 ms P99 latency?'
details:
  realistic_solution: 'Zero-copy serialization uses binary formats (FlatBuffers, Cap''n Proto) where the serialized bytes are the same as the in-memory representation. The receiver can read fields directly from the byte buffer without parsing or copying — just a pointer cast. JSON requires: parse string -> allocate objects -> populate fields -> type-convert values. This involves memory allocation, string parsing, and data copying. Zero-copy eliminates all three: the wire format IS the memory format.'
  common_mistake: |
    **The Pitfall:** Thinking zero-copy just means a "fast serialization library."
    **The Rationale:** Candidates miss the core concept that deserialization cost is literally zero because the wire format matches the CPU's memory layout.
    **The Consequence:** Choosing standard binary formats (like Protobuf) that still require CPU parsing, missing the ultimate latency reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current Serialization: 8 ms for JSON (string processing + allocations).

    **Calculations:**
    - Zero-Copy FlatBuffers: 0 ms deserialization (pointer cast), ~0.05 ms serialization (memcpy).
    - Speedup: 8 ms drops to 0.1 ms (an 80x improvement).
    - New P99 Latency: 15 ms - 8 ms + 0.1 ms = 7.1 ms.

    **Conclusion & Interpretation:**
    - **Result: 7.1 ms (Compute-Bound)**. Latency improves significantly by avoiding serialization overhead.
