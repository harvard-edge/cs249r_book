title: 'Queueing Theory Optimization: Tail Latency via Load Shedding'
scenario: A production H100 inference API (μ=50 req/s, target λ=45 req/s) is violating a P99 < 1s SLO (current P99≈4.6s). The team proposes load shedding by rejecting requests when queue depth exceeds threshold K.
question: Using M/M/1/K analysis, what queue-depth threshold K achieves P99 < 1s while maximizing accepted throughput, and what fraction of requests are rejected?
details:
  realistic_solution: With the stated λ=45 req/s and μ=50 req/s, ρ=0.90 and an infinite-buffer M/M/1 already has P99 response ≈ -ln(0.01)/(μ-λ) = 4.605/5 = 0.92s, so steady-state load shedding is not required to meet a 1s P99 estimate. To maximize accepted throughput under the stated target load, set no finite steady-state threshold, or set a large operational guardrail only for abnormal bursts. The expected rejection fraction at λ=45 is approximately 0%. M/M/1/K shedding is useful as a burst guard, but it is not the only way to manage tail latency and the K value must be computed from the same λ, μ, and capacity definition.
  common_mistake: |
    **The Pitfall:** Switching from the stated target arrival rate to an unstated burst arrival rate when computing load shedding.
    **The Rationale:** M/M/1/K blocking is sensitive to λ, μ, and whether K means queued jobs or total jobs in system.
    **The Consequence:** The rejection rate and latency estimate look precise but are not tied to the prompt, causing unnecessary request drops or false SLO confidence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Service rate μ = 50 req/s.
    - Target arrival rate λ = 45 req/s.
    - SLO: P99 response time < 1s.
    - Use the infinite-buffer M/M/1 tail as the baseline; only use M/M/1/K if this baseline fails or burst protection is required.

    **Calculations:**
    - Utilization ρ = λ / μ = 45 / 50 = 0.90.
    - M/M/1 response-time P99 ≈ -ln(0.01) / (μ - λ).
    - P99 ≈ 4.605 / (50 - 45) = 0.921s.
    - Since 0.921s < 1s, the throughput-maximizing policy at λ=45 is no steady-state shedding.
    - Rejection fraction at the stated target load ≈ 0%.

    **Conclusion & Interpretation:**
    - **Result: no finite queue-depth threshold is required for the stated λ=45 req/s case.** Use M/M/1/K shedding only as a burst guard, and compute its rejection rate from the actual burst λ and an explicit K definition.
