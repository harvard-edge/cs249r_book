title: Trans-Pacific ML Fraud Detection Latency
scenario: A FinTech company evaluates real-time credit card transactions for fraud
  with a strict 50ms end-to-end latency SLA. The highly optimized ML model takes only
  10ms for inference. However, the inference service is in Virginia, while many users
  are located in Sydney, Australia.
question: Can a centralized Virginia fraud service meet a 50ms SLA for users in Sydney
  when model inference takes 10ms?
details:
  realistic_solution: Recognize that the speed of light in fiber optic cables strictly
    bounds the minimum latency. The 50ms SLA is physically impossible with a single
    Virginia deployment due to the geographical distance to Sydney. The solution requires
    a multi-region active-active edge deployment or distributed point-of-presence
    (PoP) strategy to bypass the light barrier.
  common_mistake: '**The Pitfall:** Focusing solely on further model optimizations
    to reduce latency.

    **The Rationale:** ML engineers tunnel-vision on their area of expertise (quantization,
    TensorRT), trying to shave milliseconds off inference.

    **The Consequence:** They ignore the physical reality of network transit, wasting
    time optimizing a 10ms inference when the speed of light strictly makes the SLA
    impossible.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Speed of light in fiber: ~200,000 km/s (200 km/ms).

    - Distance: ~15,000 km.

    - SLA: 50ms total.


    **Calculations:**

    - One-way transit time: 15,000 km / 200 km/ms = 75ms.

    - Round-trip time (RTT): 75ms * 2 = 150ms.

    - Total Latency: 150ms (network) + 10ms (inference) = 160ms.


    **Conclusion & Interpretation:**

    - **Result: 160ms (Network-Latency-Bound)**. Network-Bound by physics. 160ms strictly
    fails the 50ms SLA; a multi-region deployment is mandatory.

    '
