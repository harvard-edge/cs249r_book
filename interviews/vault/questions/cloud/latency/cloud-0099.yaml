title: The Code-Gen Throughput Ceiling
scenario: 'Your team runs a code-generation service using a 34B parameter model. The primary goal is maximizing overall throughput (Tokens Per Second, or TPOT) as generations are often long. The service uses static batching with a batch size of 8. You observe that GPU utilization averages only 60%. You propose a switch to continuous batching to justify the engineering effort. You need to demonstrate the potential throughput gain for a representative batch of 8 requests with the following output token lengths: [20, 50, 80, 100, 150, 200, 300, 1000].'
question: What approximate throughput improvement can continuous batching provide for output lengths [20, 50, 80, 100, 150, 200, 300, 1000]?
details:
  realistic_solution: 'The throughput improvement comes from eliminating the computational waste of static batching. In static batching, every request in the batch must wait for the longest request to finish. The total computational work is proportional to the size of the padded tensor. In continuous batching, as soon as a request finishes, its slot can be used for a new request, maximizing GPU utilization.'
  common_mistake: |
    **The Pitfall:** Assuming total computation is just the sum of tokens, so batching strategy shouldn't affect theoretical max throughput.
    **The Rationale:** Candidates focus on the useful tokens generated and ignore the massive waste from padding in static batching.
    **The Consequence:** Drastically underestimating the performance gain of continuous batching and potentially rejecting the engineering effort.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size: 8 requests.
    - Output token lengths: [20, 50, 80, 100, 150, 200, 300, 1000].
    - Static batching pads all requests to the maximum sequence length.
    - Continuous batching evicts and replaces requests immediately upon completion.

    **Calculations:**
    - Maximum sequence length in batch: 1000 tokens.
    - Static Batching GPU Work (tokens processed): 8 requests * 1000 tokens = 8000 padded tokens.
    - Continuous Batching GPU Work (actual tokens): 20 + 50 + 80 + 100 + 150 + 200 + 300 + 1000 = 1900 tokens.
    - Throughput Speedup Ratio: 8000 / 1900 ≈ 4.21.

    **Conclusion & Interpretation:**
    - **Result: 4.2x Speedup (Compute-Bound)**. Continuous batching reclaims the massive computational waste spent on padding tokens in static batching, drastically increasing the true Tokens Per Second (TPOT) throughput.
