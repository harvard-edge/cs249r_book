title: 'Queueing Theory Evaluation: FCFS vs Priority Queuing for Mixed Workloads'
scenario: 'An inference cluster handles two workload classes: short requests (mean 200ms, 80% of traffic) and long requests (mean 4s, 20% of traffic). Total utilization is 75%.'
question: Compare FCFS queuing versus preemptive priority queuing (short requests preempt long) for P99 latency, and show which achieves better aggregate SLO compliance?
details:
  realistic_solution: FCFS gives both classes the same queue, so short requests inherit delay from 4s jobs and aggregate P99 is dominated by the mixed-service tail. Preemptive priority makes short jobs see only short-job load, cutting short-job P99 from many seconds to about 1s under a simple exponential approximation, but long-job P99 worsens because long work is repeatedly interrupted. Priority gives better aggregate SLO compliance only when the short class has the strict SLO and the long class has a relaxed SLO; if both classes have strict P99 targets, neither policy is sufficient without isolation or more capacity.
  common_mistake: |
    **The Pitfall:** Assuming priority queuing universally improves overall system performance.
    **The Rationale:** Priority queuing radically drops the latency for the high-priority class, which is highly visible.
    **The Consequence:** Starving the low-priority class (long requests), causing massive tail latency regressions that violate their specific SLOs if not carefully modeled.
  napkin_math: |
    **Assumptions & Constraints:**
    - Short service mean = 0.2s for 80% of traffic. Long service mean = 4.0s for 20%.
    - Total utilization ρ = 0.75 in one normalized server.
    - Mean service E[S] = 0.96s, so λ = ρ / E[S] = 0.781 req/s.
    - λ_short = 0.625 req/s and λ_long = 0.156 req/s.

    **Calculations:**
    - FCFS mixed-service second moment for exponential classes: E[S^2] = 2*(0.8*0.2^2 + 0.2*4^2) = 6.464 s^2.
    - M/G/1 FCFS mean queue wait = λE[S^2] / (2*(1-ρ)) = 0.781*6.464/(2*0.25) = 10.1s.
    - FCFS mean response is about 10.3s for short jobs and 14.1s for long jobs, so aggregate P99 is well above either mean and is not SLO-friendly for short requests.
    - Preemptive priority short class: ρ_short = λ_short * 0.2 = 0.125.
    - Approximate short class as M/M/1 using only short load: P99_short ≈ 4.6 / (5 - 0.625) = 1.05s.
    - Long class must absorb interruptions from short traffic; its effective service stretches and its tail is worse than FCFS for long-only SLOs.

    **Conclusion & Interpretation:**
    - **Result: priority improves aggregate compliance only when short-job SLOs dominate the objective**. It materially improves the 80% short class but trades that against long-job tail regressions.
