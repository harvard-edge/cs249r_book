title: 'Queueing Theory Evaluation: FCFS vs Priority Queuing for Mixed Workloads'
scenario: 'An inference cluster handles two workload classes: short requests (mean 200ms, 80% of traffic) and long requests (mean 4s, 20% of traffic). Total utilization is 75%.'
question: Compare FCFS and preemptive short-job priority for class-specific P99; what happens to aggregate P99 compliance?
details:
  realistic_solution: FCFS gives both classes the same queue, so short requests inherit delay from 4s jobs; the mixed-service second moment makes even the mean queue wait about 10s. Preemptive-resume priority makes short jobs see only the short-job stream, so their M/M/1 P99 estimate is about 1.05s. That gain is bought by pushing interruptions onto long jobs. If the SLO is a single aggregate P99 across all requests, the 99th percentile lies inside the long-job tail because long jobs are 20% of traffic, so preemptive priority does not by itself guarantee better aggregate compliance. It is better only for a class-weighted objective where short-job SLOs dominate and long-job SLOs are relaxed; otherwise use isolation or more capacity.
  common_mistake: |
    **The Pitfall:** Assuming priority queuing universally improves overall system performance.
    **The Rationale:** Priority queuing radically drops the latency for the high-priority class, which is highly visible.
    **The Consequence:** Starving the low-priority class (long requests), causing massive tail latency regressions that violate their specific SLOs if not carefully modeled.
  napkin_math: |
    **Assumptions & Constraints:**
    - Short service mean = 0.2s for 80% of traffic. Long service mean = 4.0s for 20%.
    - Total utilization ρ = 0.75 in one normalized server.
    - Mean service E[S] = 0.96s, so λ = ρ / E[S] = 0.781 req/s.
    - λ_short = 0.625 req/s and λ_long = 0.156 req/s.

    **Calculations:**
    - FCFS mixed-service second moment for exponential classes: E[S^2] = 2*(0.8*0.2^2 + 0.2*4^2) = 6.464 s^2.
    - M/G/1 FCFS mean queue wait = λE[S^2] / (2*(1-ρ)) = 0.781*6.464/(2*0.25) = 10.1s.
    - FCFS mean response is about 10.3s for short jobs and 14.1s for long jobs, so aggregate P99 is well above those means and is not SLO-friendly for short requests.
    - Preemptive priority short class: ρ_short = λ_short * 0.2 = 0.125.
    - Preemptive-resume priority for the short class is exactly the high-priority M/M/1 subproblem under exponential short service: response tail rate μ_short - λ_short = 5 - 0.625 = 4.375/s.
    - Short-class P99 ≈ -ln(0.01) / 4.375 = 1.05s.
    - Long jobs are 20% of traffic, so an aggregate P99 falls in the top 5% of the long-job distribution. Preemptions stretch that long-job tail, so aggregate P99 compliance is not guaranteed by the short-job improvement.

    **Conclusion & Interpretation:**
    - **Result: priority improves short-class compliance, not necessarily aggregate P99 compliance.** It is appropriate only when short-job SLOs dominate the objective or long jobs have relaxed/isolateable SLOs.
