title: 'Queueing Theory Mastery: Inference System Capacity Planning End-to-End'
scenario: 'Design an inference capacity plan for a GPT-4-scale service (1.8T parameter MoE model, routed to ~200B active params) on GPUs with 80GB VRAM. Requirements: λ=5000 req/s peak, P99 < 3s, mean output 500 tokens. The model requires 200GB VRAM for active params across 4 GPUs per pod. Use Little''s Law with a ρ=0.7 pod-utilization sizing heuristic.'
question: How many 4-GPU pods are required to support the 5000 req/s workload, and what is the estimated hourly cluster cost at $2/hr per GPU?
details:
  realistic_solution: Each queueing server is a 4-GPU pod because the active model shard requires 200GB across the pod. With 500 output tokens at 20ms/token, mean service time is 10s per request, so μ_pod = 0.1 req/s. Using the prompt's ρ=0.7 utilization target as a sizing heuristic for tail-latency headroom, required pods = λ/(ρ*μ) = 5000/(0.7*0.1) = 71,429 pods. That is 71,429 pods * 4 GPUs/pod = 285,716 GPUs. At $2/hr per GPU, hourly cost is 285,716 * $2 = $571,432/hr. This ρ target is not a full M/M/c P99 derivation; it is a conservative capacity-planning rule of thumb for the stated prompt.
  common_mistake: |
    **The Pitfall:** Treating each GPU independently in the M/M/c analysis.
    **The Rationale:** Candidates forget that large models require tensor parallelism (sharding) across multiple GPUs, meaning the "server unit" (c) in the queueing model is a multi-GPU pod, not a single GPU.
    **The Consequence:** The capacity plan underestimates the required hardware by 4x, guaranteeing massive P99 SLA violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target utilization (rho): 0.7.
    - Service time: 500 output tokens * 20ms/tok = 10s per request.
    - Pod service rate (mu): 1 / 10s = 0.1 req/s per pod.
    - Queueing server unit: one 4-GPU pod, not one GPU.

    **Calculations:**
    - Required pods (c) = lambda / (rho * mu) = 5000 / (0.7 * 0.1) = 71,428.57 -> 71,429 pods.
    - Total GPUs = 71,429 pods * 4 GPUs/pod = 285,716 GPUs.
    - Cost per hour = 285,716 GPUs * $2/hr per GPU = $571,432/hr.

    **Conclusion & Interpretation:**
    - **Result: 71,429 4-GPU pods, or 285,716 GPUs, costing ~$571k/hr.** This follows from the stated ρ=0.7 sizing heuristic; a full M/M/c P99 proof would require evaluating the tail distribution.
