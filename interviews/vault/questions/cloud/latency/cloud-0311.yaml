title: The Real-Time Transcription Deadline
scenario: You are building a live audio transcription service. To feel instantaneous to the user, the system must generate the text for each second of audio within that same one-second window. Your model generates an average of 15 tokens for every 1 second of speech.
question: To meet this real-time constraint, what is maximum average Time Per Output Token (TPOT) your system can have?
details:
  realistic_solution: The system has a total time budget of 1 second (1000 milliseconds) to generate 15 tokens. To find the maximum average time allowed for each token, we must divide the total time budget by the number of tokens that need to be generated within that budget. A TPOT greater than this value would mean the system cannot keep up with the live audio stream, causing transcription to lag.
  common_mistake: |
    **The Pitfall:** Confusing the rate (tokens per second) with the time per token, or forgetting unit conversions.
    **The Rationale:** Candidates often invert the calculation or leave it in seconds, resulting in answers off by a factor of 1000.
    **The Consequence:** Designing a system that falls drastically behind the live audio stream.
  napkin_math: |
    **Assumptions & Constraints:**
    - Time Budget = 1000 ms.
    - Token rate = 15 tokens per second of audio.

    **Calculations:**
    - Max Time Per Output Token (TPOT) = 1000 ms / 15 tokens = 66.66 ms/token.

    **Conclusion & Interpretation:**
    - **Result: TPOT <= 66.6 ms (Latency-Bound)**. Any higher TPOT will cause the inference to lag behind the live audio stream.
  options:
  - 15 ms/token
  - 1000 ms/token
  - 67 ms/token
  - 15 tokens/sec
  correct_index: 2
