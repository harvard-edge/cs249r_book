title: Strict SLO in Ad Recommendation Systems
scenario: 'A real-time bidding (RTB) ad recommendation system must meet a strict Service Level Objective (SLO) of 100ms for the 99th percentile (p99) latency. The system components have the following p99 latencies: Network I/O (15ms), Feature Fetching from a Key-Value store (25ms), and Post-processing (10ms). The team wants to use dynamic batching for the ML model (running on an NVIDIA A10G) to improve throughput.'
question: If the model's base inference latency is 12ms for a single request, and each additional request in the batch adds 1ms to the inference time, what is the maximum permissible batch window (wait time) the dynamic batcher can use if it targets a maximum batch size of 16?
details:
  realistic_solution: Calculate the total fixed non-model latencies (50ms). Subtract this from the 100ms SLO to find the available budget for model serving (50ms). Calculate the inference time for a batch of 16 (12ms + 15 * 1ms = 27ms). The maximum permissible batch window is the remaining budget minus the batch inference time (50ms - 27ms = 23ms).
  common_mistake: |
    **The Pitfall:** Subtracting the base 12ms latency from the remaining budget without adjusting for the target batch size.
    **The Rationale:** Overlooking the marginal compute cost added by each additional sequence in a batch.
    **The Consequence:** Setting the batch window too high (e.g., 38ms), which causes full batches to consistently violate the strict 100ms p99 SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLO: 100ms p99.
       - Fixed non-model latency: 15ms + 25ms + 10ms = 50ms.
       - Base model latency: 12ms. Batch cost: +1ms per additional request.
       - Target batch size: 16.
    2. **Calculations:**
       - Available serving budget: 100ms - 50ms = 50ms.
       - Inference time for batch of 16: 12ms + (15 * 1ms) = 27ms.
       - Max batch wait time: 50ms - 27ms = 23ms.
    3. **Conclusion & Interpretation:**
       - **Result: 23ms Wait Window.** The dynamic batcher must timeout and execute the batch after 23ms to guarantee the 100ms SLO is met.
