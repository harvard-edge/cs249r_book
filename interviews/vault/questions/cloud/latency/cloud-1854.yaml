title: Strict SLO in Ad Recommendation Systems
scenario: 'A real-time bidding (RTB) ad recommendation system must meet a strict Service Level Objective (SLO) of 100ms for the 99th percentile (p99) latency. The system components have the following p99 latencies: Network I/O (15ms), Feature Fetching from a Key-Value store (25ms), and Post-processing (10ms). The team wants to use dynamic batching for the ML model (running on an NVIDIA A10G) to improve throughput.'
question: What max dispatch delay keeps p99 under 100ms for batch size 16, with 1ms per request beyond the first?
details:
  realistic_solution: Calculate the total fixed non-model latencies (50ms). Subtract this from the 100ms SLO to find the available budget for the dispatch wait plus model inference (50ms). A batch of 16 has 15 requests beyond the first, so inference time is 12ms + 15 * 1ms = 27ms. The maximum permissible batch window is the remaining budget minus the batch inference time (50ms - 27ms = 23ms).
  common_mistake: |
    **The Pitfall:** Subtracting the base 12ms latency from the remaining budget without adjusting for the target batch size.
    **The Rationale:** Overlooking the marginal compute cost added by each additional sequence in a batch.
    **The Consequence:** Setting the batch window to 38ms by subtracting only the 12ms base latency, which ignores the extra 15ms of full-batch compute and violates the 100ms p99 SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLO: 100ms p99.
       - Fixed non-model latency: 15ms + 25ms + 10ms = 50ms.
       - Base model latency: 12ms. Batch cost: +1ms per request beyond the first.
       - Target batch size: 16.
    2. **Calculations:**
       - Available budget for dispatch wait plus model inference: 100ms - 50ms = 50ms.
       - Inference time for batch of 16: 12ms + (15 * 1ms) = 27ms.
       - Max dispatch delay / batch window: 50ms - 27ms = 23ms.
    3. **Conclusion & Interpretation:**
       - **Result: 23ms Wait Window.** The dynamic batcher must timeout and execute the batch after 23ms to guarantee the 100ms SLO is met.
