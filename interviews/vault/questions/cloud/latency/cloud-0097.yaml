title: The Continuous Batching Paradox
scenario: 'Your team is deciding whether to switch from static batching to continuous batching for your LLM service. A junior engineer argues against it, stating that continuous batching is less efficient by processing requests one-by-one and lowering total throughput.'
question: How can continuous batching increase tokens/sec despite not waiting for large static batches?
details:
  realistic_solution: 'The junior engineer''s concern is valid but misses a key point: GPU idle time. With static batching, the GPU is often idle, waiting for a batch to fill. Continuous batching eliminates this idle time by swapping in a new waiting sequence immediately when a sequence finishes. This keeps the effective batch size consistently high, leading to higher overall utilization and effective throughput.'
  common_mistake: |
    **The Pitfall:** Misunderstanding continuous batching as processing one request at a time (batch size of 1) and ignoring GPU idle time.
    **The Rationale:** Candidates often think that if you aren't running max-size batches, you are wasting GPU potential, but they ignore the time the GPU spends entirely idle while filling a static batch.
    **The Consequence:** Dismissing continuous batching, resulting in significantly lower cluster throughput and higher P99 latencies due to head-of-line blocking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Static batch window: 200ms.
    - Token step interval: ~10ms.
    
    **Calculations:**
    - In a 200ms static batch window, if only 2 requests arrive, the GPU runs a batch size of 2, wasting parallel compute.
    - Continuous batching dynamically injects new requests into the running batch at every token step (e.g., every 10ms).
    
    **Conclusion & Interpretation:**
    - **Result: Higher Effective Batch Size (Utilization-Bound)**. While prefill and decode are intermixed, the average batch size stays much higher, maximizing FLOP utilization and completely eliminating GPU idle times.
