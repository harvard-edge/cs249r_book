title: The SLO Violation Cascade
scenario: 'Your team runs a multi-tenant LLM serving platform on H100 GPUs. It must handle two distinct workloads: 1. Interactive Chat (High-priority, strict P99 TTFT SLO of 150ms). 2. Batch Summarization (Low-priority, 100k+ token documents, throughput goal).'
question: Why won't adding replicas fix 150ms chat TTFT when 100k-token summarization prefills run on the same H100 pool?
details:
  realistic_solution: |
    The playbook is wrong because simply adding replicas does not remove the per-replica blocking mode. A 100k-token summarization prefill launches long GPU work that cannot be interrupted quickly by an interactive chat request. If chat and summarization share the same H100 pool, round-robin or least-loaded routing can still place chat behind a long prefill on any replica, so the P99 is dominated by unlucky placement and non-preemptible work rather than aggregate fleet capacity. Fixing the 150ms TTFT requires workload isolation, priority-aware routing, chunked/paged prefill, or preemption-aware scheduling, not just more identical replicas.
  common_mistake: |
    **The Pitfall:** Assuming high GPU utilization means the system needs more replicas.
    **The Rationale:** SREs apply standard web-service scaling rules, failing to recognize Head-of-Line blocking at the non-preemptible CUDA kernel level.
    **The Consequence:** Indiscriminately throwing more hardware at the problem without actually fixing the latency starvation for high-priority interactive traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model, 100k token batch prefill.
       - H100 peak compute: 989 TFLOPS.
    2. **Calculations:**
       - FLOPs required = 2 * 70B * 100,000 = 14 PFLOPs.
       - Kernel execution time = 14,000 TFLOPs / 989 TFLOP/s = 14.16 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound (Head-of-Line Blocking)**. Because CUDA kernels are non-preemptible, a chat request arriving behind the summarization job waits 14 seconds, completely destroying the 150ms SLO.
