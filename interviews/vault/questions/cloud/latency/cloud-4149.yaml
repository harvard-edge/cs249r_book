title: Hedged Requests in Distributed Inference
scenario: Your 8-replica inference cluster shows a P99 latency of 450ms against a 200ms SLA. You propose hedged requests — sending each request to 2 replicas simultaneously and taking the first response.
question: What is the expected P99 improvement for hedged requests, and what is the cost in wasted GPU compute?
details:
  realistic_solution: For simultaneous hedging with independent replica latency, the latency of a request becomes the minimum of two samples. The new P99 occurs where both copies are slower than t with probability 1%, so it maps to the original P90. If the original P90 is around 250ms, the hedged P99 is around 250ms. That still misses a 200ms SLA unless the original P90 is below 200ms or the tail is improved elsewhere. The cost of sending every request to 2 replicas is 2x GPU work before cancellation, i.e. up to 100% extra compute; cancellation can save some trailing work but not change the capacity plan. Deadline hedging is a separate lower-cost design and should be analyzed with its trigger rate.
  common_mistake: |
    **The Pitfall:** Assuming hedging universally cures tail latency regardless of the root cause.
    **The Rationale:** It works brilliantly for independent probabilistic failures, leading engineers to apply it blindly.
    **The Consequence:** Doubling fleet compute costs while experiencing zero latency improvement because the tail is caused by a correlated systemic issue (like shared NFS congestion).
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-replica inference cluster.
    - SLA: 200ms.
    - Current P99 latency: 450ms.
    - Simultaneous hedging sends every request to 2 replicas.
    - Replica tail latency is assumed independent.

    **Calculations:**
    - Hedged tail probability: P(min(X1, X2) > t) = P(X > t)^2.
    - New P99: solve P(X > t)^2 = 0.01, so P(X > t) = 0.10.
    - Therefore simultaneous hedged P99 equals the original P90; if original P90 is ~250ms, new P99 is ~250ms.
    - Compute cost: every request starts 2 GPU executions, so gross overhead is 100% extra GPU compute.

    **Conclusion & Interpretation:**
    - **Result: ~250ms P99 with 100% gross GPU-compute overhead under the stated always-on hedging design.** This improves the 450ms tail but does not guarantee the 200ms SLA.
