title: The NPU Fallback Latency Trap
scenario: You deploy an INT8 quantized MobileViT via your cloud pipeline to edge devices. Theoretical NPU latency is 10ms. Actual P99 latency is ~330ms. Profiling reveals the GeLU activation isn't supported in INT8 on the target NPU, causing a memory-copy back to the CPU for FP32 execution, then a copy back to the NPU.
question: How would you fix the ~330ms P99 latency caused by unsupported INT8 GeLU on the target NPU?
details:
  realistic_solution: |
    This requires eliminating the unsupported-op fallback path, not accepting the hybrid CPU/NPU execution graph. The best fix is usually algorithm-hardware co-design: replace GeLU with an NPU-supported INT8 approximation such as ReLU6 or HardSwish, then retrain or finetune the model in the cloud to recover any accuracy loss. Other valid fixes are to rewrite or fuse the GeLU into a supported subgraph, use a compiler/runtime version or target NPU that supports the needed op, or run that activation in a supported lower-precision mode if the hardware can keep it on accelerator. The tradeoff is model/runtime portability and possible small accuracy loss versus a deterministic latency and power improvement from keeping execution on the NPU.
  common_mistake: |
    **The Pitfall:** Accepting the hybrid CPU/NPU execution graph.
    **The Rationale:** Assuming that delegating unsupported ops to the CPU is an acceptable fallback without measuring PCIe transfer latency.
    **The Consequence:** The memory copy overhead across the system bus destroys real-time latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Measured hybrid path is ~330 ms P99.
    - Supported NPU execution time for the same model shape is ~10 ms.
    - In the broken path, most layers still run on the NPU in ~8 ms.
    - CPU fallback execution time (GeLU): 20 ms.
    - Cross-processor memory copy and synchronization overhead (NPU->CPU->NPU): ~300 ms.

    **Calculations:**
    - Broken hybrid latency: 8 ms NPU work + 20 ms CPU GeLU + 300 ms copy/sync = 328 ms, matching the observed ~330 ms P99.
    - Corrected all-NPU latency after replacing/fusing/supporting GeLU: ~10 ms.
    - Latency improvement: 328 ms / 10 ms = ~32.8x versus the measured broken path.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Fallback Path.** The fix is any model/compiler/runtime change that removes the unsupported GeLU CPU fallback. Keeping the graph wholly on the NPU turns the measured ~330 ms path into an approximately 10 ms path under these assumptions.
