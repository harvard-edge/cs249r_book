title: The Serving Inversion
scenario: We took our highly-optimized training architecture (large batches, deep pipelines) and deployed it directly to serving. Now, user requests are timing out. What fundamental priority did we fail to invert?
question: What fundamental priority did we fail to invert?
details:
  realistic_solution: The shift from maximizing throughput ($T$) to minimizing latency ($L_{lat}$). Training maximizes throughput by using massive batches to keep the GPUs at 100% utilization. Serving minimizes latency because a slow response is a broken product. The batch-heavy architectures that saturate accelerators during training are fundamentally ill-suited for the bursty, latency-critical reality of production traffic.
  common_mistake: |
    **The Pitfall:** Believing the solution is to scale up the serving cluster.
    **The Rationale:** They fail to realize the architecture optimizes for the wrong metric (throughput instead of latency).
    **The Consequence:** More hardware won't fix a design that is fundamentally ill-suited for the bursty, latency-critical reality of production traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training uses large batches to maximize GPU utilization.
    - Serving uses small batches and must answer each request quickly.

    **Calculations:**
    - Training amortizes setup and communication across many samples, so throughput is the dominant metric.
    - Serving cannot assume large batches or long queueing delays, so each extra millisecond directly hurts user experience.

    **Conclusion & Interpretation:**
    - The failed inversion was prioritizing throughput in training instead of latency in serving.
