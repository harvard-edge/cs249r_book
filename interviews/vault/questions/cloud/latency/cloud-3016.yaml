title: 'Latency Decomposition: Full-Stack E2E Latency Budget for LLM API on H100 Cluster'
scenario: You own the latency SLA for a production LLM API backed by H100 nodes. The SLA is P99 < 2 seconds for a 512-token prompt generating 128 tokens.
question: How would you budget the P99 latency components, identify the dominant term, and optimize to fix an SLA miss?
details:
  realistic_solution: |
    Use an explicit node-level budget. Assume the production 70B model is served with TP=8 across one H100 node, so each GPU holds about 17.5GB of bf16 weights. A reasonable P99 budget is: network ingress 5ms, tokenization 2ms, queue/admission target <=200ms, prefill for 512 tokens about 25-35ms at 35% effective node compute, decode about 6-8ms/token after weight streaming, KV reads, kernels, and TP communication, and detokenization/egress about 10ms. For 128 decode tokens, that is roughly 770-1020ms of decode and about 1.0-1.3s total, with decode as the dominant term. If the SLA misses, first reduce queueing and decode TPOT: cap batch/concurrency, enable speculative decoding, use KV/weight quantization, or route to a smaller model where quality allows.
  common_mistake: |
    **The Pitfall:** Accounting only for model compute FLOPs and ignoring memory bandwidth limits during decode.
    **The Rationale:** Not realizing that auto-regressive decode is entirely memory-bandwidth bound, while prefill is compute-bound.
    **The Consequence:** Selecting a massive model that mathematically cannot meet latency SLAs due to physical HBM transfer speeds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 3.35 TB/s bandwidth, 989 TFLOPS compute.
       - 70B bf16 model served on one 8-GPU H100 node with TP=8.
       - Effective prefill utilization: 35% of node peak compute.
       - Decode includes weight streaming plus KV/communication/kernel overhead.
    2. **Calculations:**
       - Weights per GPU under TP=8: 70B * 2 bytes / 8 = 17.5GB.
       - Decode lower bound from weight bandwidth: 17.5GB / 3.35TB/s = 5.2ms/token.
       - Add KV reads, TP all-reduce, kernels, and P99 slack: budget 6-8ms/token.
       - Decode budget for 128 tokens: 128 * 6-8ms = 768-1024ms.
       - Prefill FLOPs: about 2 * 70B * 512 = 71.7TFLOPs.
       - Effective node compute: 8 * 989TFLOPS * 35% = 2769TFLOPS.
       - Prefill time: 71.7TFLOPs / 2769TFLOPS = ~26ms; budget 35ms with overhead.
       - Total P99 budget: 5ms network + 2ms tokenization + <=200ms queue + 35ms prefill + 768-1024ms decode + 10ms egress = ~1.0-1.3s.
    3. **Conclusion & Interpretation:**
       **Decode dominates the P99 budget but can fit under 2s if queueing and TPOT are controlled. Result: Decode Memory-Bandwidth-Bound.**
