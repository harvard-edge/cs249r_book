title: 'Latency Decomposition: Compare KV-Cache vs. No-Cache Decode Latency on H100'
scenario: A serving team debates whether to enable KV-cache for a 7B-parameter model on H100. With KV-cache, each decode step reads model weights plus KV entries. Without KV-cache, the full attention recomputes over the sequence.
question: At sequence length 1024, how does per-token decode latency compare with and without a KV cache for the 7B model?
details:
  realistic_solution: |
    With KV-cache at batch=1, decode is roughly memory-bandwidth bound: the step streams about 14GB of weights plus about 512MiB of cached K/V state, giving a lower bound around 4.3ms/token on a 3.35TB/s H100. Without KV cache, generating the next token requires recomputing the full 1024-token prefix through the model; the ideal compute lower bound is about 14-15ms before utilization and memory effects, so practical latency is much higher. KV-cache is therefore the correct long-context decode path.
  common_mistake: |
    **The Pitfall:** Forgetting that without KV-cache, attention cost scales quadratically.
    **The Rationale:** Candidates fail to internalize the asymptotic complexity of self-attention during generation.
    **The Consequence:** They erroneously conclude that recomputation is cheaper than memory bandwidth at sequence length 1024, ignoring the massive FLOP explosion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B params (14 GB at FP16).
    - H100: 3.35 TB/s bandwidth, 989 TFLOPS.
    - Sequence: 1024 tokens. Approximate 7B layout: 32 layers, 4096 hidden dim, FP16 KV.
    - Batch size = 1, so there is no cross-request weight-read amortization.

    **Calculations:**
    - KV cache read for existing tokens: 32 layers × 1024 tokens × 2 (K,V) × 4096 dim × 2 bytes = 536,870,912 bytes = 512 MiB.
    - With cache lower bound: read 14 GB weights + ~0.54 GB KV = ~14.5 GB/step. Time = 14.5 GB / 3.35 TB/s = ~4.3 ms/token.
    - Without cache lower bound: recompute the 1024-token prefix through the 7B model, roughly 2 × 7B × 1024 = 14.3 TFLOPs.
    - Ideal compute-only time = 14.3 TFLOPs / 989 TFLOPS = ~14.5 ms; at 30% effective utilization this is ~48 ms before extra memory traffic.

    **Conclusion & Interpretation:**
    - **Result: KV-cache decode is roughly 4.3 ms/token lower bound, while no-cache decode is at least ~14.5 ms/token and often tens of milliseconds in practice**. KV cache wins by avoiding full-prefix recomputation.
