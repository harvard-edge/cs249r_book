title: 'Queueing Theory Realization: Compute vs Memory Bottleneck in Queued Requests'
scenario: 'Concretely determine whether an H100 serving Mistral-7B is compute-bound or memory-bandwidth-bound during the decode phase, and how this changes the M/M/1 service time distribution. Arrival rate λ=200 req/s, mean output 150 tokens.'
question: 'Is an H100 serving Mistral-7B decode compute-bound or memory-bound, and how does this dictate using an M/D/1 instead of an M/M/1 queueing model?'
details:
  realistic_solution: 'During autoregressive decode, Mistral-7B is heavily memory-bandwidth-bound because it must load the entire 7B weight matrix for every single token. Because decode is bottlenecked by the deterministic speed of HBM reading fixed-size matrices, the service time variance approaches zero. Therefore, an M/D/1 queue (deterministic service times) is mathematically correct.'
  common_mistake: |
    **The Pitfall:** Blindly applying an M/M/1 queueing model (which assumes exponential service times) to a memory-bound decode process.
    **The Rationale:** Candidates default to standard M/M/1 formulas without realizing that memory-bandwidth-bound autoregressive decoding is highly deterministic.
    **The Consequence:** Latency estimates are wildly inaccurate because an M/D/1 model (deterministic service time) is the mathematically correct fit, preventing accurate SLA forecasting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: H100 (989 TFLOPS FP16, 3.35 TB/s HBM3).
       - Model: Mistral-7B (14GB weights at FP16).
    2. **Calculations:**
       - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/byte.
       - Decode AI: ~1 FLOP/byte (1 < 295, so massively memory bound).
       - Service Time: 14 GB / 3.35 TB/s = ~4.1ms per token.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Decode is dominated by deterministic memory reads (4.1ms/token), meaning service time variance approaches zero. An M/D/1 queue is required over M/M/1.**
