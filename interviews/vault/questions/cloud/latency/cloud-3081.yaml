title: 'Queueing Theory Realization: Compute vs Memory Bottleneck in Queued Requests'
scenario: Concretely determine whether an H100 serving Mistral-7B is compute-bound or memory-bandwidth-bound during the decode phase, and how this changes the M/M/1 service time distribution. Arrival rate λ=200 req/s, mean output 150 tokens.
question: Is an H100 serving Mistral-7B decode compute-bound or memory-bound, and how does this dictate using an M/D/1 instead of an M/M/1 queueing model?
details:
  realistic_solution: 'During small-batch autoregressive decode, Mistral-7B is usually memory-bandwidth-bound rather than compute-bound: each generated token performs matrix-vector style work with low arithmetic intensity, so HBM movement is the limiting resource. That makes service times more deterministic than an exponential M/M/1 assumption, but not variance-free; batching, kernel launches, cache behavior, and sequence length still add variability. M/D/1 is a useful first approximation for near-deterministic service, while production sizing should validate with M/G/1 or empirical service-time distributions.'
  common_mistake: |
    **The Pitfall:** Blindly applying an M/M/1 queueing model, or claiming M/D/1 is exact.
    **The Rationale:** Memory-bound decode often has lower service-time variance than an exponential model, but real serving still has batching and request-shape variance.
    **The Consequence:** Tail-latency estimates are biased: M/M/1 may overstate variance, while strict M/D/1 may understate production tails.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: H100 with 3.35 TB/s HBM3 bandwidth.
    - Model: Mistral-7B with roughly 14GB of FP16 weights.
    - Small-batch decode behaves like low-arithmetic-intensity matrix-vector work.

    **Calculations:**
    - H100 ridge point ≈ 989 TFLOP/s / 3.35 TB/s = 295 FLOP/byte.
    - Batch-1 decode arithmetic intensity is far below that ridge point because weights have limited reuse per generated token.
    - A rough lower bound on per-token weight-streaming time is 14GB / 3.35TB/s ≈ 4.2ms before kernel overhead, KV-cache traffic, and batching effects.
    - Low arithmetic intensity implies bandwidth-bound decode; repeated similar decode steps imply lower service-time variance than an exponential M/M/1 model.

    **Conclusion & Interpretation:**
    - **Result: memory-bandwidth-bound decode supports an M/D/1-style approximation, not an exact deterministic-service claim.** Use M/G/1 or measured service-time distributions when batching and request heterogeneity are material.
