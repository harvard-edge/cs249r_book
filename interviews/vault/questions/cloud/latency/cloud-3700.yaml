title: Speculative Decoding Draft Model Selection for 70B LLM
scenario: You serve a 70B LLaMA-2 model (target model) on 4x H100 80GB (tensor parallel, 3.35 TB/s HBM3).
  Single-token decode latency is 45ms. You want to use speculative decoding with a 7B draft model to reduce
  TTFT and per-token latency. The 7B draft fits on 1 H100. Analyze the expected speedup, acceptance rate
  requirements, and memory tradeoffs.
question: What speedup should you expect from a 7B draft model for speculative decoding of the 70B target,
  and what acceptance rates make it worthwhile?
details:
  realistic_solution: 'Choose the draft model to maximize acceptance rate: the 7B model should be fine-tuned
    on the same data distribution as queries. Target α ≥ 0.8 for k=4 draft tokens to achieve 2-3× speedup.
    If α < 0.6, reduce k to 2. Profile acceptance rate per query type: factual queries tend to have α
    > 0.85, creative writing α < 0.6. Use adaptive k: dynamically adjust based on recent rolling acceptance
    rate.'
  common_mistake: '**The Pitfall:** Assuming speculative decoding always speeds up generation.

    **The Rationale:** If the draft model''s acceptance rate α is too low, the target model runs more
    frequently to process rejected draft tokens.

    **The Consequence:** Each speculative step generates draft tokens that are mostly rejected, requiring
    the target model to run k+1 times instead of 1 time, making latency worse than greedy decoding.'
  napkin_math: '**Assumptions & Constraints:**

    - Target model latency: 45ms per token.

    - Draft model latency (7B on H100): ~4ms for 4 draft tokens (k=4).

    - Acceptance rate target: α = 0.8.

    **Calculations:**

    - Expected accepted tokens: E[accepted] = (1 - 0.8^5) / (1 - 0.8) = (1 - 0.328) / 0.2 = 3.36 tokens.

    - Net latency per step: 4ms + 45ms = 49ms.

    - Effective latency: 49ms / 3.36 tokens = 14.6ms/token.

    - Speedup: 45ms / 14.6ms = 3.1x.

    **Conclusion & Interpretation:**

    - Speedup is 3.1x. Target α ≥ 0.8 for k=4 draft tokens is required to achieve meaningful speedups.'
