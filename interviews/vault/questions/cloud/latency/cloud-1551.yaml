title: Evaluate Memory Locking vs Swap Disabling for P99 Latency
scenario: You are serving a 20GB embedding model for a real-time RAG pipeline on a 32GB RAM cloud VM.
  The system has an 8GB swap file configured. While median latency is a stable 50ms, your P99 latency
  occasionally spikes to over 2 seconds, especially after periods of low traffic. The VM also hosts several
  memory-hungry sidecars for logging and metrics. You must evaluate the architectural trade-offs between
  disabling swap entirely on the VM versus implementing process-level memory locking (`mlockall`) for
  the inference service to eliminate these latency jitter spikes.
question: Should you disable swap or use mlockall for the 20GB embedding service on the 32GB VM, and why?
details:
  realistic_solution: Implement `mlockall(MCL_CURRENT | MCL_FUTURE)` specifically for the inference process.
    This pins the 20GB model weights and KV cache in physical RAM, eliminating major page faults and latency
    spikes, while preserving the 8GB swap for idle sidecar memory to ensure overall system stability.
  common_mistake: '**The Pitfall:** Proposing to disable swap completely system-wide to prevent disk I/O.

    **The Rationale:** Candidates assume that preventing any swap usage is the only way to avoid latency
    spikes, ignoring the overall memory dynamics of the node.

    **The Consequence:** This can lead to catastrophic Out-Of-Memory (OOM) kills of the inference process
    if the logging sidecars temporarily spike in memory usage.'
  napkin_math: '**Assumptions & Constraints:**

    - OS swaps out 1GB of model weights.

    - Cloud SSD throughput: 500 MB/s.

    - Base median latency: 50ms.


    **Calculations:**

    - Time to read back 1GB: 1000 MB / 500 MB/s = 2.0 seconds.

    - Spiked P99 Latency: 50ms + 2000ms = 2050ms.


    **Conclusion & Interpretation:**

    - **Result: 2.0s Latency Spike (I/O-Bound).** Reading swapped weights from disk directly accounts
    for the massive latency jitter, justifying the use of `mlockall`.'
