title: 'NVIDIA H100 LLM Inference: Achieving P99 Latency SLAs'
scenario: You are leading the design of a real-time, high-throughput inference service for a large language model. The model is deployed across a cluster of NVIDIA H100 GPUs. Your primary challenge is to consistently meet a strict Service Level Agreement (SLA) of 100ms for P99 inference latency, meaning 99% of all requests must complete within 100ms.
question: How would you leverage techniques like straggler detection, hedged requests, and SLA-driven resource management to ensure this critical P99 target is always met?
details:
  realistic_solution: Enforce the P99 SLA with a policy, not just faster kernels. Track per-stage latency for queueing, host work, transfers, GPU execution, post-processing, and egress. Reserve capacity so steady-state utilization stays below the measured tail-latency knee, and use admission control when forecast demand would exceed that budget. Hedge only requests that have consumed too much of their latency budget, for example after a P95 queue or service-time threshold, and cancel the loser to suppress duplicate work. Autoscale on arrival-rate forecasts, queue age, and P99 burn rate. For lower-priority traffic, degrade or shed before critical requests lose their 100 ms budget.
  common_mistake: |
    **The Pitfall:** Optimizing solely for average (P50) latency or throughput.
    **The Rationale:** Candidates often lack a deep understanding of tail latency characteristics, workload variability, and the specific performance profile of the hardware under varying load conditions. They overlook non-GPU bottlenecks.
    **The Consequence:** Failing to meet strict P99 SLAs due to unmitigated stragglers and queue build-up.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target SLA: 100ms P99 latency.
    - Reserve 20 ms for network, host, and post-processing.
    - Profiled P99 GPU execution budget for the chosen batch policy: 60 ms.

    **Calculations:**
    - Queueing budget = 100 ms - 60 ms - 20 ms = 20 ms.
    - Admission control should reject, defer, or shed requests when predicted queue age exceeds 20 ms for critical traffic.
    - If hedging is triggered only for the slowest 5% of requests, duplicate load is at most 5% before cancellations, not 50%.
    - Capacity should keep normal utilization below the measured point where queue age P99 approaches 20 ms.

    **Conclusion & Interpretation:**
    - **Result: the SLA is met by budgeting latency stages, capping queue age, reserving headroom, and using selective hedging with cancellation and admission control.**
