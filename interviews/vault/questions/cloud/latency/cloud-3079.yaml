title: 'Queueing Theory Realization: Size an H100 Inference Queue for Black Friday Traffic'
scenario: 'Concretely size an H100 inference cluster for a retail AI assistant expected to handle Black
  Friday peak: 2000 req/s with 30-minute burst, P99<2s SLO. Normal load is 200 req/s. Each request: 1500
  input + 300 output tokens on LLaMA-3-70B. Calculate fleet size for peak, cost for the 30-min burst,
  and whether pre-warming is needed.'
question: How many H100s are needed for the 2000 req/s Black Friday burst, what does the 30-minute burst
  cost, and should you pre-warm capacity?
details:
  realistic_solution: Meeting the 2s SLO for 300 tokens requires <6.6ms per token. A single H100's memory
    bandwidth (3.35 TB/s) takes 42ms to load the 140GB model, so single-GPU decoding is impossible. We
    must use Tensor Parallelism (TP=8) to aggregate bandwidth to 26.8 TB/s, reducing step time to ~5.2ms
    (1.56s for 300 tokens). With a batch size of 128 on a TP=8 node, throughput is ~82 req/s. At 70% utilization
    (57 req/s), we need 35 TP=8 nodes (280 H100s) to handle 2000 req/s. A 30-minute burst at $3/hr per
    GPU costs $420. Pre-warming is mandatory as booting instances and loading weights takes minutes, which
    would completely miss the 30-minute traffic spike.
  common_mistake: '**The Pitfall:** Sizing only for average load and not accounting for autoscaling lag.

    **The Rationale:** Engineers often assume auto-scaling can instantly provision hardware to meet traffic
    spikes.

    **The Consequence:** Forgetting that pre-warming H100 instances takes 3-5 minutes means the system
    can''t scale fast enough for a sudden burst, resulting in severe SLO violations.'
  napkin_math: '**Assumptions & Constraints:**

    - 70B model in BF16 = 140GB.

    - H100 bandwidth = 3.35 TB/s. Cost = $3/hr.

    - SLO: 2s max for 300 tokens (<6.6ms/tok).


    **Calculations:**

    - Single GPU step time: 140GB / 3.35 TB/s = 41.8ms (Fails SLO).

    - TP=8 step time: 140GB / (8 * 3.35 TB/s) = 5.2ms.

    - Decode time (300 tok) = 1.56s. Total time with prefill < 2s.

    - TP=8 node throughput at batch 128 = 128 / 1.56s = 82 req/s.

    - Safe capacity (70%) = 57.4 req/s per 8 GPUs.

    - Required nodes = 2000 / 57.4 = 34.8 -> 35 nodes (280 H100s).

    - Burst cost = 280 GPUs * $3/hr * 0.5h = $420.


    **Conclusion & Interpretation:**

    - **Result: 280 H100s costing $420 (Bandwidth-Bound).** Tensor parallelism is strictly required to
    meet the 2s latency SLO, and pre-warming is necessary to serve the burst.'
