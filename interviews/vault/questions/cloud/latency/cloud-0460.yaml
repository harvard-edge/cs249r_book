title: The Real-Time Voice Deadline
scenario: A real-time voice assistant requires a Time-To-First-Token (TTFT) under 350ms. The pipeline transcribes audio into a 200-token prompt sent to a 7B parameter LLM. The continuous batching server has 10ms network and 40ms queueing overhead.
question: Can the hardware meet the 350ms TTFT target for a 200-token prompt on a 7B LLM, and what are the prefill and first-decode times?
details:
  realistic_solution: 'Yes, the deadline can be easily met. The total TTFT is the sum of all serial latencies. For short prompts, this phase is typically bound by memory bandwidth—the time it takes to read the model weights. The subsequent single-token decode step is also memory-bound.'
  common_mistake: |
    **The Pitfall:** Confusing the compute-bound prefill phase with the memory-bound decode phase.
    **The Rationale:** Candidates look at the massive model size and assume any generation takes >500ms, ignoring the parallel nature of prompt processing.
    **The Consequence:** Incorrectly concluding the hardware cannot meet the SLA, leading to unnecessary quantization or model size reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target TTFT < 350ms. Overhead: 50ms (Network + Queue).
       - Remaining budget: 300ms.
       - Model: 7B params (14GB weights).
       - Hardware: 3.35 TB/s memory bandwidth, 989 TFLOPS compute.
    2. **Calculations:**
       - Prefill compute time = (7e9 * 200 * 2) / 989e12 = 2.8 ms.
       - Prefill weight read time = 14 GB / 3.35 TB/s = 4.1 ms.
       - GPU Prefill = max(2.8, 4.1) = 4.1 ms.
       - First decode time = 14 GB / 3.35 TB/s = 4.1 ms.
       - Total GPU time = 4.1 ms + 4.1 ms = 8.2 ms.
    3. **Conclusion & Interpretation:**
       - **Result: IO-Bound (Memory Bandwidth).** The 8.2ms GPU processing time easily beats the 300ms budget, proving the 7B model can run real-time.
  options:
  - No, the 7B model's prefill computation will take over 500ms.
  - Yes, the total TTFT including overheads and GPU processing is well under 100ms.
  - Maybe, it depends entirely on the batch size the server is currently processing.
  - No, reading 14GB of model weights from HBM will violate the 350ms deadline.
  correct_index: 1
