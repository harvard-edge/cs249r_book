title: Goodput vs Throughput Under Tail Constraints
scenario: Your serving cluster achieves 10,000 tokens/s throughput but only 7,200 tokens/s goodput (tokens delivered within the 500ms SLA) at a batch size of 32. Increasing the batch size to 64 raises throughput to 14,000 tokens/s, but goodput drops to 6,100 tokens/s.
question: Why does goodput drop when batch size increases from 32 to 64, and what batch size should you choose?
details:
  realistic_solution: 'At batch=32: throughput=10K tok/s, 72% within SLA -> goodput=7.2K. At batch=64: throughput=14K tok/s, 43.6% within SLA -> goodput=6.1K. The problem: doubling batch size increases per-token decode latency from ~15ms to ~28ms (memory bandwidth shared across more KV caches), pushing more requests past the 500ms SLA. Optimal batch size maximizes goodput, not throughput. Binary search: batch=48 -> throughput=12.5K, 68% within SLA -> goodput=8.5K. Batch=40 -> throughput=11.2K, 78% within SLA -> goodput=8.7K. Optimal is ~batch=40, achieving 8.7K goodput - 21% higher than batch=32 despite lower raw throughput than batch=64.'
  common_mistake: |
    **The Pitfall:** Optimizing for raw throughput (total tokens/s) rather than goodput (tokens delivered within SLA).
    **The Rationale:** Engineers often equate higher GPU utilization (via larger batch sizes) with better system performance, ignoring end-to-end latency constraints.
    **The Consequence:** Larger batches increase per-request latency, causing more requests to miss the 500ms SLA and effectively wasting compute cycles on violated requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: 500ms.
    - Batch 32: 10K throughput, 72% SLA.
    - Batch 64: 14K throughput, 43.6% SLA.

    **Calculations:**
    - Batch 32 Goodput: 10,000 * 0.72 = 7,200 tokens/s.
    - Batch 64 Goodput: 14,000 * 0.436 = 6,100 tokens/s.
    - Interpolate Batch 40: 11,200 * 0.78 = 8,736 tokens/s.
    - Interpolate Batch 48: 12,500 * 0.68 = 8,500 tokens/s.

    **Conclusion & Interpretation:**
    - **Result: ~8,700 tokens/s goodput (Latency-Bound)**. Batch 40 avoids the degradation of Batch 64.
