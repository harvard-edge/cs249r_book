title: Operating Point on the Queueing Hockey-Stick
scenario: Your inference service has a single replica's measured capacity of 1,000 QPS (service time 1 ms). Current arrival rate is 950 QPS, resulting in a utilization of 0.95. A P99 latency SLO of 50 ms is currently being violated.
question: Using the M/M/1 queueing model, what utilization brings P99 latency under the 50 ms SLO, and why does latency spike as utilization approaches 1?
details:
  realistic_solution: 'The M/M/1 mean response time is W = (1/μ) / (1 - ρ). For a 1 ms service time, W = 1 / (1 - ρ) ms. P99 under exponential service is roughly W * ln 100 ≈ 4.6 W. Setting P99 <= 50 ms requires ρ <= 0.91. Load needs to come down to ~910 QPS. Tail-latency SLOs cannot be defended by capacity alone past about ρ = 0.85; admission control or autoscaling must intervene.'
  common_mistake: |
    **The Pitfall:** Planning capacity against mean latency and assuming a linear relationship.
    **The Rationale:** Engineers intuitively think "95% utilization means 5% headroom," ignoring the non-linear asymptote of the queueing equation.
    **The Consequence:** Running systems far too hot, resulting in catastrophic tail-latency spikes that breach SLAs despite average performance looking acceptable.
  napkin_math: |
    **Assumptions & Constraints:**
    - System modeled as M/M/1 queue.
    - Service time 1/μ = 1 ms.
    - P99 proxy under exponential service = W * ln(100) ≈ 4.6 * W.
    - P99 SLO = 50 ms.

    **Calculations:**
    - Mean response time W = 1 / (1 - ρ) ms.
    - P99 <= 50 ms: 4.6 / (1 - ρ) <= 50.
    - Solve for ρ: (1 - ρ) >= 0.092.
    - ρ <= 0.908 (90.8%).
    - Target load = 0.908 * 1000 = 908 QPS.

    **Conclusion & Interpretation:**
    - **Result: 908 QPS (Capacity Bottleneck)**. Load needs to be reduced from 950 QPS to ~910 QPS to meet the 50 ms P99 SLO due to the non-linear queueing asymptote.
