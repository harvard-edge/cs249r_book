title: The SLA Violation Cascade
scenario: 'A transcription service requires a 300ms P99 TTFT SLA. One GPU processes a request in 200ms. At 30 req/s, an engineer provisions 5 GPUs (total capacity 25 req/s). The P99 latency spirals to over 1 second.'
question: 'Why did 5 GPUs fail, and how many are needed to meet the 300ms SLA?'
details:
  realistic_solution: 'Queueing dynamics dictate stability requires service rate > arrival rate. At 30 req/s arrival vs 25 req/s service, the system is unstable (rho > 1). Requires 8-9 GPUs to keep utilization low enough for P99 bounding.'
  common_mistake: |
    **The Pitfall:** Sizing strictly on average arrival rate and average service rate.
    **The Rationale:** Engineers assume ~100% utilization works, ignoring queueing distributions.
    **The Consequence:** As utilization nears 100%, wait times increase exponentially, causing SLA cascades.
  napkin_math: |
    **Assumptions & Constraints:**
    - Service Rate: 5 req/s per GPU.
    - Arrival Rate: 30 req/s.
    
    **Calculations:**
    - 5 GPUs: Capacity = 25. Utilization = 30/25 = 1.2 (Unstable).
    - 7 GPUs: Capacity = 35. Utilization = 30/35 = 0.85 (Stable).
    
    **Conclusion & Interpretation:**
    - **Result: 8-9 GPUs required to guarantee P99 < 300ms (Queue-Bound)**. Over-provisioning is mandatory to absorb variance.
