title: FEC Latency in Distributed Inference
scenario: You deploy a 1T parameter MoE model for ultra-low latency real-time voice translation, sharded across 16 nodes using Pipeline Parallelism. The network uses 800 Gbps Ethernet with PAM4 modulation, requiring KP4 Forward Error Correction (FEC) to achieve an acceptable Bit Error Rate (BER). FEC adds 110ns of latency per hop. A single token generation requires traversing 15 network hops.
question: Should you disable KP4 FEC to save 110 ns per hop, or keep it enabled for the 15-hop token path?
details:
  realistic_solution: 800G Ethernet achieves high throughput using PAM4, which packs 2 bits per symbol. The tight voltage margins result in a raw BER of ~1e-4, making KP4 FEC mandatory to reduce BER to roughly the target corrected range. Disabling FEC saves 1.65us across the 15-hop token path, but at an 800 Gbps line rate a 1e-4 raw BER implies about 8e7 raw bit errors per second before coding. Even small packets would frequently contain raw bit errors without correction, triggering RDMA/TCP retransmissions or packet loss recovery that costs far more than microseconds and destroys the strict latency requirements of real-time voice translation. The deterministic latency penalty of FEC is the right tradeoff to avoid non-deterministic tail latency spikes.
  common_mistake: |
    **The Pitfall:** Disabling FEC strictly to save static latency per token.
    **The Rationale:** In ultra-low latency systems, engineers ruthlessly cut fixed overheads, assuming the network is reliable enough for brief transmissions.
    **The Consequence:** PAM4 without FEC has a raw BER so high that constant TCP/RDMA retransmissions occur, completely destroying tail latency predictability and rendering real-time voice translation unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - FEC Delay: 110ns per hop, 15 hops per token.
    - Link Speed: 800 Gbps (100 GB/s or 8e11 bits/sec).
    - Raw BER: 1e-4.

    **Calculations:**
    - FEC Delay: 15 hops * 110ns = 1.65μs per token path.
    - Raw BER Impact: At 800 Gbps (8e11 bits/sec) with 1e-4 BER, there are 8e7 bit errors per second.
    - Example packet impact: a 1500-byte packet has 12,000 bits, so the expected raw bit errors per packet are 12,000 * 1e-4 = 1.2 before FEC.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. Without FEC, the raw BER makes packet errors frequent enough that retransmission and recovery tail latency would dominate the deterministic 1.65μs per-token-path FEC penalty.
