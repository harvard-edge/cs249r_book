title: FPGA Spatial Pipeline Mapping
scenario: A high-frequency trading firm needs a 5-layer MLP to execute in under 10 microseconds. On CPU, it takes 250us. You port the model to an AWS F1 FPGA using standard OpenCL High-Level Synthesis (HLS) with matrix multiplication kernels. The resulting FPGA latency is 180us, missing the SLA by 18x. DSP slice utilization is only 5%.
question: Why did standard HLS miss the 10us SLA, and how would you map the 5-layer MLP onto the FPGA to meet it?
details:
  realistic_solution: 'Standard HLS maps the MLP to a von Neumann-style execution: it builds a single Matrix Multiply unit and reuses it sequentially for each layer, loading weights from off-chip DRAM. The tradeoff here is chip area (DSP slices/BRAM) versus latency. To achieve <10us latency, you must co-design the algorithm mapping to use a fully unrolled spatial architecture. Because the model is small, you can store all weights entirely in distributed BRAM. You instantiate dedicated hardware ALUs for every single neuron in the 5 layers and pipeline them. Instead of sequential execution, the data flows through the physical chip layout in a single pass. This consumes massive chip area (trading off multi-tenant throughput) but drops latency to exactly the clock cycles required to traverse the pipeline.'
  common_mistake: |
    **The Pitfall:** Increasing the batch size to improve throughput.
    **The Rationale:** Completely ignoring the strict single-inference latency SLA.
    **The Consequence:** Fails to meet the 10 microsecond execution requirement for high-frequency trading.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target end-to-end inference latency: <10us.
    - FPGA clock: 200MHz, or 5ns per cycle.
    - Small MLP assumption: all weights fit in on-chip BRAM/URAM and each layer has enough DSPs to evaluate its neurons in parallel.

    **Calculations:**
    - Standard HLS result: 180us, which is 18x above the 10us SLA.
    - A spatial pipeline with 5 layer stages plus register/reduction stages might take about 100-200 cycles from input to output.
    - Pipeline latency at 200MHz: 200 cycles * 5ns = 1us.
    - Even allowing several microseconds for I/O framing and control, the design can remain below 10us if it avoids off-chip DRAM in the critical path.

    **Conclusion & Interpretation:**
    - **Result: Under 10us with spatial mapping.** The SLA is met by replacing the sequential, DRAM-backed HLS kernel with a fully pipelined on-chip dataflow design.
