title: The LLM Metrics
scenario: Our users are complaining the LLM feels 'laggy', but our monitoring shows 'Average Latency' is well under our 2-second SLO.
question: "What specific generation metrics are we failing to monitor?"
details:
  realistic_solution: You are measuring the total request time, which masks the user experience. You must split monitoring into Time-To-First-Token (TTFT) and Time-Per-Output-Token (TPOT). TTFT measures the compute-bound prefill phase (when the user is waiting for the bot to start typing). TPOT measures the memory-bandwidth-bound decode phase (the reading speed). A fast TPOT cannot save a slow TTFT.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate or P99 total latency metrics to evaluate user experience.
    **The Rationale:** Assuming that a fast overall request time inherently means the application feels responsive.
    **The Consequence:** Missing massive delays in Time-To-First-Token (TTFT), leading to users staring at a blank screen before text generation begins.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Average latency SLO: 2 seconds.
       - User perception is degraded despite meeting SLO.
    2. **Calculations:**
       - Time-To-First-Token (TTFT): 3 seconds (compute-bound prefill).
       - Time-Per-Output-Token (TPOT): 20ms (memory-bound decode).
       - Total Latency (200 tokens): 3s + (200 * 0.02s) = 7 seconds.
       - Average Latency: Short queries mask the long TTFT in aggregates.
    3. **Conclusion & Interpretation:**
       - **Result: Metric-Bound Visibility.** A fast TPOT cannot hide a slow TTFT; they must be monitored separately.
