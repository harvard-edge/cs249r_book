title: Mitigating P99 Jitter with Interrupt Shielding
scenario: 'You are serving a real-time fraud detection model on a multi-core server with 8x GPUs and a high-speed NIC. At peak load, median latency is 2ms, but P99 spikes to 8-12ms. CPU threads submitting CUDA kernels experience frequent context switches correlating with network traffic.'
question: 'How do NIC interrupts affect CUDA kernel submission latency at 50,000 RPS, and what CPU/IRQ configuration shields inference cores?'
details:
  realistic_solution: |
    Disable the `irqbalance` daemon. Manually configure `/proc/irq/default_smp_affinity` to route NIC RX/TX interrupts to a dedicated subset of cores. Use `numactl` or `taskset` to pin inference worker threads to a strictly disjoint set of cores on the same NUMA node, shielding them from interrupt handling.
  common_mistake: |
    **The Pitfall:** Assuming P99 spikes are caused by GPU saturation or Python GIL contention.
    **The Rationale:** Candidates immediately jump to model-level optimizations (quantization, batching) without profiling the OS-level preemption.
    **The Consequence:** Wasted effort degrading model quality while the underlying OS context-switch jitter remains completely unfixed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 50,000 RPS.
    - Context switch/IRQ handler time: 50μs.
    - Queue depth waiting on kernel: 10 requests.

    **Calculations:**
    - NIC generates at least 50K interrupts/sec.
    - OS CPU time on IRQs = 50,000 * 50μs = 2.5 CPU-seconds per second.
    - A single 100μs CPU-side delay (IRQ + cache eviction) with a queue depth of 10 yields a 1ms+ queueing delay downstream.

    **Conclusion & Interpretation:**
    - **Result: 1ms+ queueing delay (CPU-Bound)**. OS-level preemption from NIC interrupts compounds into massive P99 queueing delays.
