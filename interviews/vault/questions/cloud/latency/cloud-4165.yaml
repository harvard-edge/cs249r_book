title: Request Coalescing vs Tail Latency Tradeoff
scenario: Your inference server coalesces semantically similar requests to share prefill computation.
  This reduces GPU cost by 40% but increases P99 from 50ms to 120ms because requests wait for similar
  siblings.
question: At what request rate does coalescing become net-negative for goodput?
details:
  realistic_solution: 'Coalescing waits up to T_wait for similar requests. At low arrival rates, requests
    wait the full T_wait without finding siblings — all cost, no benefit. At high rates, siblings arrive
    quickly and the amortized compute savings dominate. Break-even analysis: compute saved = 40% × prefill_cost.
    Latency cost = wait_time × requests_affected. At 100 req/s with 70ms mean wait: 7 requests coalesce
    in a window, saving 6 × 20ms prefill = 120ms GPU time. But 7 requests each waited 35ms average = 245ms
    total wait. At 5000 req/s: siblings arrive in 5ms, saving 24 × 20ms = 480ms GPU, wait = 2.5ms × 25
    = 62.5ms.'
  common_mistake: '**The Pitfall:** Evaluating coalescing purely based on GPU compute savings without
    accounting for the latency penalty.

    **The Rationale:** Engineers often focus on maximizing GPU utilization and throughput efficiency,
    ignoring the fact that waiting for batch coalescing artificially inflates latency.

    **The Consequence:** At low request rates, the wait times cause massive SLA violations, rendering
    the throughput savings irrelevant.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Coalescing saves 40% of compute.

    - Baseline prefill cost: 20ms per request.


    **Calculations:**

    - 100 req/s: 7 siblings. Compute saved: 120ms. Wait cost: 7 * 35ms avg = 245ms. Net: -125ms.

    - 300 req/s: 6 siblings. Compute saved: 100ms. Wait cost: 6 * 10ms avg = 60ms. Net: +40ms.

    - 5000 req/s: 25 siblings in 5ms. Compute saved: 480ms. Wait cost: 25 * 2.5ms avg = 62.5ms. Net: +417.5ms.


    **Conclusion & Interpretation:**

    - **Result: Break-even at ~300 req/s (Latency-Bound)**. At low traffic volumes, wait delays dwarf
    computation savings and destroy the SLO.

    '
