title: The Deadline-Missing Detector
scenario: You are designing a real-time LLM-based fraud detection system. Each transaction must be classified in under 100ms. Your service runs on a single H100 GPU, and instrumenting the model shows that the average processing time (TPOT) is 50ms per request. The system uses a standard FIFO queue. During peak market hours, the arrival rate hits 18 requests per second. You observe that a significant fraction of requests miss their 100ms deadline.
question: "Why is a system with 90% average utilization failing so badly, and what queueing strategy would you recommend?"
details:
  realistic_solution: 'This is a classic queueing theory problem that trips up many engineers. As system utilization (ρ) gets high, the average waiting time in the queue (Wq) grows exponentially, not linearly. At 90% utilization, the average wait time is already massive and, due to statistical variance in arrival and service times (the ''M''s in M/M/1), a large fraction of individual requests will experience waits far longer than the average, thus exceeding the deadline. The solution is to abandon the simple FIFO queue. Potential strategies include:

    1. **Load Shedding:** If a request has already been in the queue for >50ms, it''s guaranteed to miss the 100ms deadline. Drop it immediately and return an error or fallback to a simpler, faster rule-based system. This preserves resources for requests that still have a chance.

    2. **Autoscaling:** Add more GPUs (servers) to handle the peak load. This changes the system from an M/M/1 to an M/M/c queue, which has vastly better waiting time characteristics for the same level of overall utilization.'
  common_mistake: |
    **The Pitfall:** Only looking at the average service time and utilization to conclude the system is healthy.
    **The Rationale:** Ignoring the non-linear nature of queueing delays as utilization approaches 100%.
    **The Consequence:** Missing SLAs because queue wait time dominates total latency during statistical microbursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - System modeled as an M/M/1 queue.
    - Utilization (ρ) approaches 90%.

    **Calculations:**
    - As utilization (ρ) approaches 90%, average wait time (Wq) grows exponentially.

    **Conclusion & Interpretation:**
    - **Result: Massive tail latency (Queueing Theory)**. Statistical variance ensures a massive tail latency (p99) even when average service time is fast.
