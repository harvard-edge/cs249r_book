title: 'Queueing Theory Mastery: SLA-Driven Capacity Planning for H100 Fleet'
scenario: You must design a globally distributed H100 inference fleet with requirements of p99 < 200ms, p999 < 1s, and a peak global load of 50,000 req/s. The mean service time is 8ms, but it has a high variance (CV=2.0), meaning standard M/M/1 assumptions break down.
question: What G/G/c capacity plan would meet p99 < 200ms and p999 < 1s for 50,000 req/s with a service-time CV=2.0?
details:
  realistic_solution: 'For G/G/c (Kingman''s approximation): Wq ≈ (C_a²+C_s²)/2 * M/M/c_wait. With C_a=1 (Poisson), C_s=2 (high variance), multiplier=(1+4)/2=2.5x versus M/M/c. Target utilization ρ=0.6 for p999<1s given CV=2. Load per region: 50000/3 regions ≈ 16667/s. Per-region servers: c = ceil(λ/(μ*ρ)) = ceil(16667/(125*0.6)) = 223 H100s per region. p999 estimate: 5-6x mean system time = 5*(8+Wq_adjusted)ms. With Kingman correction, Wq≈2.5xM/M/c_Wq. Set c=250/region for safety.'
  common_mistake: |
    **The Pitfall:** Using standard M/M/1 or M/M/c queuing formulas for high-variance workloads.
    **The Rationale:** Candidates forget that high service-time coefficient of variation (CV > 1) dramatically inflates tail latency.
    **The Consequence:** Under-provisioning the cluster and severely violating the p999 latency SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak global load: 50,000 req/s across 3 regions (16,667 req/s per region).
       - Mean service time (1/μ): 8ms (μ = 125 req/s).
       - Service-time coefficient of variation (CV): 2.0 (high variance).
       - Target utilization (ρ): 0.6 for safety.
    2. **Calculations:**
       - Servers per region (c) = ceil(λ / (μ * ρ)) = ceil(16,667 / (125 * 0.6)) = 223 servers.
       - Kingman Adjustment multiplier = (C_a² + C_s²) / 2 = (1² + 2.0²) / 2 = 2.5x.
       - M/M/c wait time (Wq) at c=223, ρ=0.6 is ≈ 1ms. Adjusted Wq = 1ms * 2.5 = 2.5ms.
       - Total mean system time = Wq + service_time = 2.5ms + 8ms = 10.5ms.
       - Estimated p999 ≈ 6 * mean system time = 6 * 10.5ms = 63ms.
    3. **Conclusion & Interpretation:** **p999 ≈ 63ms, which is well under the 1s SLA, ensuring latency targets are met even with high variance.**
