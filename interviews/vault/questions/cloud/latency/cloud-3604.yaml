title: 'Queueing Theory Mastery: SLA-Driven Capacity Planning for H100 Fleet'
scenario: You must design a globally distributed H100 inference fleet with requirements of p99 < 200ms, p999 < 1s, and a peak global load of 50,000 req/s. The mean service time is 8ms, but it has a high variance (CV=2.0), meaning standard M/M/1 assumptions break down.
question: What G/G/c capacity plan would meet p99 < 200ms and p999 < 1s for 50,000 req/s with a service-time CV=2.0?
details:
  realistic_solution: 'Use three active regions and size each for one-third of peak load: 50,000/3 ≈ 16,667 req/s. Mean service time is 8ms, so each server handles µ=125 req/s. A 250-H100 region has capacity 31,250 req/s and utilization ρ=16,667/31,250=0.53, leaving meaningful headroom for high variance. For a G/G/c sizing pass, inflate mean queueing delay by (C_a²+C_s²)/2=(1+4)/2=2.5 and treat any tail values as estimates, not proof. If service times are modeled as lognormal with mean 8ms and CV=2, service p99 is about 69ms and p999 about 181ms; the remaining SLA budget must be validated with trace-driven simulation or load testing. The defensible plan is 250 H100s per region, 750 total, plus admission control and autoscaling triggers if measured tails exceed the model.'
  common_mistake: |
    **The Pitfall:** Using standard M/M/1 or M/M/c queuing formulas for high-variance workloads.
    **The Rationale:** Candidates forget that high service-time coefficient of variation (CV > 1) dramatically inflates tail latency.
    **The Consequence:** Under-provisioning the cluster and severely violating the p999 latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak global load: 50,000 req/s across 3 active regions, or 16,667 req/s per region.
    - Mean service time: 8ms, so μ = 125 req/s per H100.
    - Arrival CV C_a=1 and service CV C_s=2.
    - Use a lognormal service-time tail matching mean 8ms and CV=2 only as an illustrative tail model; mean/CV alone do not determine p99 or p999.

    **Calculations:**
    - Choose c=250 H100s per region: capacity = 250 * 125 = 31,250 req/s.
    - Utilization per region: ρ = 16,667 / 31,250 = 0.53.
    - Variability multiplier: (C_a^2 + C_s^2) / 2 = (1 + 4) / 2 = 2.5.
    - Lognormal service tail from mean 8ms and CV=2 gives illustrative service p99 ≈ 69ms and service p999 ≈ 181ms.
    - The SLA budget left for queueing is about 131ms at p99 and 819ms at p999.
    - Kingman/Allen-Cunneen-style approximations support keeping utilization near 0.5, but they do not rigorously determine those queueing percentiles for G/G/c tails.

    **Conclusion & Interpretation:**
    - **Result: 250 H100s per region, 750 total (Tail-Latency-Bound)**. This is a defensible initial capacity plan because it keeps utilization low enough for high variance, but the p99/p999 claim must be confirmed with the real service-time distribution and load tests.
