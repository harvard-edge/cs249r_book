title: Queuing Model for Prefill-Decode Disaggregation on H100
scenario: You are designing a disaggregated LLM serving system. Prefill requests arrive at 200/s with mean 50ms service. Decode requests arrive at 2000/s with mean 5ms service. You have a pool of 26 GPUs to allocate.
question: Using queuing theory, how would you split 26 GPUs between prefill and decode workers to maintain P99 latency SLAs?
details:
  realistic_solution: 'Prefill load = 200/s × 0.05s = 10 server-equivalents. Decode load = 2000/s × 0.005s = 10 server-equivalents. Equal load but different bottlenecks: prefill is compute-bound (use fewer high-utilization nodes), decode is memory-bandwidth bound. Split: 12 GPUs for prefill at 83% utilization, 14 GPUs for decode at 71% utilization. Target ρ<0.75 for decode to keep p99<3× mean.'
  common_mistake: |
    **The Pitfall:** Allocating GPUs equally (50/50) without modeling arrival rates and service times.
    **The Rationale:** Candidates assume equal total compute load means equal node allocation, ignoring the differing variance and queueing dynamics of prefill (compute-bound) vs decode (memory-bound).
    **The Consequence:** One pool will suffer severe queueing delays and P99 SLA violations due to higher utilization (ρ).
  napkin_math: |
    **Assumptions & Constraints:**
    - Pool: 26 GPUs.
    - Prefill: 200 req/s, 50ms service time.
    - Decode: 2000 req/s, 5ms service time.
    - Queueing Target: Keep utilization (ρ) < 0.75 for tail latency.

    **Calculations:**
    - Prefill Load: 200 req/s × 0.05s = 10 server-equivalents.
    - Decode Load: 2000 req/s × 0.005s = 10 server-equivalents.
    - Allocation (Prefill): 12 GPUs → ρ = 10/12 = 0.83.
    - Allocation (Decode): 14 GPUs → ρ = 10/14 = 0.71.

    **Conclusion & Interpretation:**
    - **Result: Queueing-Delay-Bound**. The split is 12 for prefill and 14 for decode to balance tail latency for the memory-bound decode phase.
