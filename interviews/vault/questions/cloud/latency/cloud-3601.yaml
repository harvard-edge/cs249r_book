title: Queuing Model for Prefill-Decode Disaggregation on H100
scenario: You are designing a disaggregated LLM serving system. Prefill requests arrive at 200/s with mean 50ms service. Decode requests arrive at 2000/s with mean 5ms service. You have a pool of 26 GPUs to allocate.
question: Using queuing theory, how should you split 26 GPUs, and is that enough to keep both pools below 75% utilization?
details:
  realistic_solution: Prefill load = 200/s × 0.05s = 10 server-equivalents. Decode load = 2000/s × 0.005s = 10 server-equivalents. With equal offered load, the minimax utilization split is 13 prefill / 13 decode, giving ρ=10/13=0.77 in each pool. A strict ρ<0.75 target would require at least ceil(10/0.75)=14 GPUs for each pool, or 28 GPUs total. Therefore 26 GPUs can be balanced, but it cannot satisfy the stated 75% utilization guardrail for both pools; either add 2 GPUs, relax the utilization target, or shift SLA risk explicitly to one phase.
  common_mistake: |
    **The Pitfall:** Allocating GPUs equally (50/50) without modeling arrival rates and service times.
    **The Rationale:** Candidates assume equal total compute load means equal node allocation, ignoring the differing variance and queueing dynamics of prefill (compute-bound) vs decode (memory-bound).
    **The Consequence:** One pool will suffer severe queueing delays and P99 SLA violations due to higher utilization (ρ).
  napkin_math: |
    **Assumptions & Constraints:**
    - Pool: 26 GPUs.
    - Prefill: 200 req/s, 50ms service time.
    - Decode: 2000 req/s, 5ms service time.
    - Queueing Target: Keep utilization (ρ) < 0.75 for tail latency.

    **Calculations:**
    - Prefill Load: 200 req/s × 0.05s = 10 server-equivalents.
    - Decode Load: 2000 req/s × 0.005s = 10 server-equivalents.
    - Minimum GPUs per pool for ρ < 0.75: ceil(10 / 0.75) = 14.
    - Required total for both pools: 14 + 14 = 28 GPUs.
    - Best balanced split with only 26 GPUs: 13 prefill / 13 decode.
    - Resulting utilization: 10 / 13 = 0.77 in each pool.

    **Conclusion & Interpretation:**
    - **Result: Capacity-Bound**. A 13/13 split minimizes the worst utilization with 26 GPUs, but 26 GPUs is not enough to keep both prefill and decode below the 0.75 tail-latency guardrail; use 28 GPUs for that target.
