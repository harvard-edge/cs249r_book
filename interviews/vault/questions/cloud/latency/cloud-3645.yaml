title: Measuring and Setting Realistic P999 SLOs for Autoregressive Generation
scenario: A product team wants P999 < 5s for a GPT-4-class model (70B parameters)
  running on A100 (80GB HBM2e, 2TB/s, 400W) nodes. Requests generate 200-2000 output
  tokens. You must set a technically defensible SLA and architect the system to meet
  it.
question: What SLA would you propose for 200-2000 token generations on the 70B A100
  service, and how would you architect to meet it?
details:
  realistic_solution: 'Define two separate SLOs: TTFT P99 < 500ms (prefill-dominated,
    hardware-bounded) and Token Generation Rate P50 > 40 tok/s (decode-dominated).
    This decouples the user experience metric (TTFT) from the compute metric. For
    P999 of full generation: cap at 2000 tokens, at 40 tok/s = 50s max → negotiate
    SLA to TTFT + streaming, not total time.'
  common_mistake: Setting a single P999 SLA without conditioning on output length.
    A 2000-token generation is physically 10x slower than 200 tokens and cannot meet
    the same SLA. Conflating TTFT (time to first token) with total generation time
    in the SLA.
  napkin_math: 'A100 80GB, 2TB/s. 70B model at FP16 = 140GB — needs minimum 2 A100s.
    Memory bandwidth bound decode: with TP=2, each GPU reads 70GB per token. 70GB / 2TB/s = 35ms per token.
    1000/35ms = ~28 tok/s. This falls short of 40 tok/s. To reach 40 tok/s: increase to 4-way Tensor Parallelism (TP=4).
    Each GPU reads 35GB per token. 35GB / 2TB/s = 17.5ms per token. 1000/17.5ms = ~57 tok/s, safely exceeding the 40 tok/s requirement.'
