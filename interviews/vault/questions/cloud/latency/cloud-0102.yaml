title: TTFT Lower Bound for a 70B Model on H100s
scenario: A product manager wants to guarantee a Time-To-First-Token (TTFT) of under 200ms for a 70B parameter LLM. The model is fully pre-loaded into HBM. You can ignore network latency.
question: Is a <200ms TTFT mathematically feasible for a 70B model, and what is the primary hardware bottleneck?
details:
  realistic_solution: 'Yes, the <200ms target is feasible on paper. For a pre-loaded model, the primary bottleneck for the first token is the HBM bandwidth feeding the first forward pass, not raw FLOPs. A simple lower bound is to divide the per-GPU shard size by the GPU''s memory bandwidth: with tensor parallelism 2, each GPU holds about 70GB of weights, and an H100''s 3.35 TB/s HBM bandwidth implies a best-case service time around 21ms. That is only a lower bound on TTFT, but it shows the problem is memory-bandwidth dominated rather than compute-bound.'
  common_mistake: |
    **The Pitfall:** Calculating TTFT using the model's FLOPs and the GPU's TFLOPS compute ceiling.
    **The Rationale:** Engineers default to compute bounds, ignoring that a single-token forward pass (batch size 1) is entirely constrained by memory bandwidth.
    **The Consequence:** Deceptively small (sub-millisecond) latency estimates that fail completely in production due to memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 70B parameters.
    - Precision: FP16 (2 bytes/param).
    - Hardware: 2x 80GB H100s (TP=2), ~3.35 TB/s memory bandwidth each.

    **Calculations:**
    - Model weight size: 70B * 2 bytes = 140 GB.
    - Data read per GPU (TP=2): 140 GB / 2 = 70 GB.
    - Best-case per-GPU HBM service time: 70 GB / 3.35 TB/s ≈ 21 ms.

    **Conclusion & Interpretation:**
    - **Result: sub-200ms is feasible in principle, but the 21ms figure is only a lower bound.** The real first-token path is memory-bandwidth-bound during prefill, not compute-bound.
