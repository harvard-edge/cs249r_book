title: Evaluating Hedged Requests for Fan-Out Inference
scenario: 'A cloud recommendation system fans out incoming queries to 50 separate embedding shards hosted on NVIDIA T4s via Triton Inference Server. The individual server median latency is 20ms, but the P99 is 200ms due to dynamic batching queues and network jitter. A user request is blocking and requires responses from all 50 shards. You must evaluate two architectural options to guarantee a strict 50ms overall system P99 SLA: (A) Issue hedged requests to a secondary replica if no response is received within 25ms, or (B) Over-provision GPU capacity by 2x to reduce individual server utilization from 80% down to 40%.'
question: Can either hedging at 25ms or 2x GPU over-provisioning alone guarantee the 50ms system P99 SLA, and why?
details:
  realistic_solution: Neither option alone is justified as a strict 50ms system-P99 guarantee from the stated data. With 50 blocking shards, the end-to-end tail is governed by the slowest shard, so per-shard latency must be far better than 50ms at roughly the 99.98th percentile. Hedging can reduce independent replica tails after 25ms, while 2x capacity can materially reduce queueing-driven tails, but meeting the SLA requires measured post-change per-shard CDFs and usually a combination of capacity, hedging, deadlines, and replica isolation.
  common_mistake: |
    **The Pitfall:** Believing the system-level P99 equals the individual node P99, or that hedging automatically squares the 1% tail.
    **The Rationale:** Candidates ignore fan-out order statistics, replica correlation, queueing effects, and the need to measure the latency CDF after the proposed change.
    **The Consequence:** They declare a 50ms SLA solved without proving that all 50 blocking shard calls complete under the deadline at the required percentile.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - High fan-out to 50 shards.
       - Individual node P99 is 200ms.
    2. **Calculations:**
       - Without hedging: Probability all 50 shards respond in < 200ms = (0.99)^50 ≈ 60.5%, so 200ms is only about the system P60.5.
       - To make the blocking fan-out finish under 50ms at system P99, each shard must satisfy F(50ms)^50 >= 0.99.
       - Required per-shard CDF at 50ms: F(50ms) >= 0.99^(1/50) ≈ 0.9998, or about the per-shard P99.98.
       - The stated median=20ms and P99=200ms do not determine the per-shard P99.98 under 50ms after hedging or after 2x capacity.
    3. **Conclusion & Interpretation:**
       - **Result: SLA not proven from the inputs.** Hedging may help independent replica tails and over-provisioning may reduce queueing, but neither is mathematically guaranteed to meet a 50ms system P99 without measured post-change shard latency distributions.
