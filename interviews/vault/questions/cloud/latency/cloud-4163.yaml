title: Speculative Decoding as Tail Latency Reducer
scenario: Your 70B model on a GPU has a decode P99 of 18ms/token. You implement speculative decoding with a 1.5B draft model that proposes 5 tokens per step with a 72% acceptance rate. Assume the draft model takes 1.2ms per token to generate, and the 70B verification of all 5 tokens takes 8ms.
question: With 5 draft tokens at a 72% acceptance rate, what are the effective accepted tokens per step, the latency per accepted token, and the total speedup?
details:
  realistic_solution: 'The expected accepted tokens per step using speculative decoding is E[tokens] = (1-0.72^6)/(1-0.72) = 0.8607/0.28 = 3.07. The total step latency includes both the draft generation (5 tokens * 1.2ms = 6ms) and the target model batch verification (8ms), yielding 14ms per step. Effective latency: 14ms / 3.07 tokens = 4.56ms/token. Speedup over the 18ms baseline is 18 / 4.56 ≈ 3.95x.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding improves latency proportionally to the acceptance rate.
    **The Rationale:** Candidates ignore the non-negligible compute latency of the draft model and the batch verification overhead of the target model.
    **The Consequence:** The real-world speedup is severely overestimated because the fixed costs of drafting and verification are excluded from the math.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline decode P99: 18ms/token.
    - Speculative decoding: 5 draft tokens per step, 72% acceptance rate (p=0.72).
    - Draft model time: 1.2 ms/token.
    - Target verification time: 8 ms.

    **Calculations:**
    - Draft generation time: 5 tokens * 1.2 ms/token = 6 ms.
    - Total step time: 6 ms + 8 ms = 14 ms.
    - Expected accepted tokens E[X]: (1 - p^(N+1)) / (1 - p) = (1 - 0.72^6) / (1 - 0.72) = 0.8607 / 0.28 ≈ 3.07 tokens/step.
    - Effective latency: 14 ms / 3.07 tokens ≈ 4.56 ms/token.
    - Total speedup: 18 ms / 4.56 ms ≈ 3.95x.

    **Conclusion & Interpretation:**
    - **Result: 3.95x Speedup (Compute-Bound).** Effective latency is 4.56 ms/token, yielding a 3.95x speedup over the baseline.
