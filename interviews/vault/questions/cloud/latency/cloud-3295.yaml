title: Optimizing Inference Latency on AMD MI300X with Dynamic Batching
scenario: 'You are deploying a critical real-time LLM inference service on an AMD MI300X accelerator. The service has a strict p99 latency target of <50ms. Your current static batching strategy leads to underutilization during low traffic and tail latency spikes during bursts.'
question: 'How would you redesign the batching strategy to balance p99 latency below 50ms with maximum throughput?'
details:
  realistic_solution: 'Implement dynamic continuous batching (iteration-level scheduling) that monitors request rates and adds requests to the active batch immediately after the current decode step. This leverages the massive HBM bandwidth of the MI300X to transfer states quickly without waiting for a full batch to finish.'
  common_mistake: |
    **The Pitfall:** Failing to account for dynamic batch formation overhead or ignoring memory bandwidth.
    **The Rationale:** Candidates apply overly aggressive static batching that violates tail latencies or fail to exploit the MI300X bandwidth.
    **The Consequence:** The system yields either unacceptable p99 latency spikes or suboptimal throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X HBM3 Bandwidth: 5.3 TB/s.
    - Batch of 10 requests = ~1 GB state.
    
    **Calculations:**
    - Batch Transfer Time: 1 GB / 5300 GB/s = ~0.19 ms.
    - Total Latency: (Batch Size * Input Size) / Bandwidth + Compute Time.
    
    **Conclusion & Interpretation:**
    - **Result: 0.19 ms memory transfer overhead (Compute-Bound)**. Bandwidth is vast enough to support rapid dynamic batching without hitting latency limits.
