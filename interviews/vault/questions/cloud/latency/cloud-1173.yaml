title: Dynamic Batching Wait Window Calculation
scenario: A cloud translation API has a P99 SLA of 200ms. Overhead is 20ms. Model execution time scales as T(B) = 30ms + 10ms * B. Requests arrive at 50 RPS (1 every 20ms).
question: What max dynamic batching wait window and batch size keep the translation API within the 200ms P99 SLA?
details:
  realistic_solution: 'Configure a maximum wait window of 100ms. Formulate the end-to-end latency as the sum of overhead, wait time, and batch execution time to find the maximum wait time that respects the SLA.'
  common_mistake: |
    **The Pitfall:** Maximizing batch size based solely on hardware limits while ignoring queue wait time.
    **The Rationale:** High throughput means large batches, so the focus shifts purely to optimizing GPU execution time.
    **The Consequence:** Failing to include the time spent waiting in the queue as part of the total end-to-end latency budget, leading to systemic SLA breaches.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA = 200ms. Arrival rate = 1 req / 20ms.
    - Total Latency = Overhead + Wait (W) + Compute(B).
    - Compute(B) = 30 + 10 × B.

    **Calculations:**
    - Batch Size B = W / 20.
    - Compute(B) = 30 + 10 × (W / 20) = 30 + 0.5W.
    - SLA equation: 200 = 20 + W + 30 + 0.5W.
    - 150 = 1.5W → W = 100ms.
    - B = 100 / 20 = 5.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound.** The max wait window is 100ms, balancing queue time with batch efficiency to hit exactly 200ms.
