title: End-to-End P99 in Multi-Stage Pipelines
scenario: 'Your production RAG pipeline has 4 serial stages: embedding (H100), retrieval (CPU), reranking (A100), and generation (MI300X). Each stage individually meets a P99 of 50ms.'
question: Why can end-to-end P99 exceed 200ms, and how would you allocate per-stage tail-latency budgets?
details:
  realistic_solution: |
    For 4 independent serial stages, meeting P99 = 50ms at each stage does not prove the end-to-end P99 is 200ms. The probability that all 4 stages are below their own P99 on the same request is 0.99^4 = 96.06%, so about 3.94% of requests hit at least one per-stage tail. To make a 200ms end-to-end P99 budget defensible with equal serial budgets, each stage needs roughly a P99.75 budget near 50ms, because 0.9975^4 ≈ 0.990. This still depends on the latency distributions and correlations, so monitor per-stage P99.9 and the full pipeline percentile directly. Also reduce the number of serial waits where possible, for example by overlapping retrieval with embedding prefetch.
  common_mistake: |
    **The Pitfall:** Assuming end-to-end P99 equals the sum of per-stage P99s.
    **The Rationale:** Candidates fail to realize that tail latency compounds non-linearly across serial stages, as the probability of at least one stage hitting its tail grows.
    **The Consequence:** Service Level Agreements (SLAs) for complex pipelines will be systematically violated in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 independent serial stages, each with P99 = 50ms.
    - Equal end-to-end target: P99 <= 200ms.

    **Calculations:**
    - Probability all stages are below their own P99 on one request: 0.99^4 = 96.06%.
    - Probability at least one stage exceeds its P99 on one request: 1 - 0.9606 = 3.94%.
    - To leave only 1% total tail probability across 4 independent stages, require per-stage success p where p^4 = 0.99.
    - p = 0.99^(1/4) = 0.9975, so each stage needs about a P99.75 budget.
    - With equal serial budgets for a 200ms target, allocate about 50ms at P99.75 to each stage, then validate the actual end-to-end P99.

    **Conclusion & Interpretation:**
    - **Result: per-stage P99 alone is insufficient.** Use per-stage P99.75 tail budgets, direct end-to-end measurement, and parallelization of independent stages to control the compound tail.
