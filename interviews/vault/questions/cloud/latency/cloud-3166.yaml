title: Speculative Decoding Memory Bandwidth Analysis
scenario: For a 70B target model at batch_size=1, each autoregressive decode step reads 140GB of weights
  (FP16) and produces 1 token. With speculative decoding (K=5, alpha=0.80), the verification reads the
  same 140GB but produces ~3.7 tokens.
question: What effective memory-bandwidth amplification does K=5 speculative decoding with alpha=0.80
  provide over batch-1 autoregressive decode?
details:
  realistic_solution: 'Autoregressive: 140GB read per token. At 3.35 TB/s: 140/3350 = 41.8ms/token. Bandwidth
    utilization: 140GB/41.8ms = 3.35 TB/s. With speculation: draft generates 5 tokens in ~10ms (7B model,
    2ms/token). Verification: 140GB for K+1=6 tokens in one pass. Verification time: max(IO, compute).
    IO: ~141GB / 3.35 = 42.1ms. Compute is minimal. Total: 10ms (draft) + 42.1ms (verify) = 52.1ms for
    3.7 tokens. Effective: 52.1/3.7 = 14.1ms/token vs 41.8ms. Effective bandwidth per token: 140GB / 14.1ms
    = 9.9 TB/s — 2.96x virtual bandwidth amplification.'
  common_mistake: '**The Pitfall:** Forgetting that speculative verification is a single forward pass
    processing K+1=6 tokens simultaneously.

    **The Rationale:** Engineers often evaluate token generation linearly, missing that weight reads are
    amortized over all verified tokens in speculation.

    **The Consequence:** The core insight of why speculation helps batch_size=1 is misunderstood, leading
    to sub-optimal decoding strategies.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Autoregressive decode reads 140GB/token.\n   -\
    \ Memory Bandwidth = 3.35 TB/s.\n   - Speculative decoding (K=5, alpha=0.80) yields 3.7 tokens.\n\
    2. **Calculations:**\n   - Autoregressive time: 140GB / 3.35 TB/s = 41.8ms/token.\n   - Speculative\
    \ verification IO: 141GB / 3.35 TB/s = 42.1ms.\n   - Draft generation time: 10ms.\n   - Total speculative\
    \ time = 10ms + 42.1ms = 52.1ms for 3.7 tokens.\n   - Speculative time per token = 52.1ms / 3.7 =\
    \ 14.1ms/token.\n   - Virtual Bandwidth: 140GB / 14.1ms = 9.9 TB/s.\n3. **Conclusion & Interpretation:**\n\
    \   - **Result: 2.96x virtual bandwidth amplification.** The system is deeply memory-bound, and speculation\
    \ successfully amortizes memory bandwidth.\n"
