title: LLM Admission Control for Tail Latency
scenario: A fleet of A100 GPUs serves a generative API. Arrival rates are Poisson. Because user prompts vary wildly, token generation times are highly heavy-tailed, causing random queue explosions.
question: Design a queueing-aware admission control policy that limits tail latency while keeping the GPUs saturated.
visual:
  kind: svg
  path: cloud-4501.svg
  alt: A graph showing an uncontrolled queue growing exponentially versus an admission-controlled queue flattening out.
  caption: Controlled vs Uncontrolled Queue
details:
  realistic_solution: 'Implement an active queue management policy based on Little''s Law and expected token length. Instead of queuing infinitely, track the estimated total tokens currently in-flight across the A100s. If (Expected In-Flight Work) > (Max Allowable Latency * GPU Token Rate), immediately return a 429 Too Many Requests error. This caps the queueing delay for admitted requests.'
  common_mistake: |
    **The Pitfall:** Using a simple request-count limit instead of token-based work estimation.
    **The Rationale:** Candidates assume all requests have equal processing weight, which fails heavily when request sizes are heavy-tailed in generative tasks.
    **The Consequence:** The queue will still randomly explode during bursts of long-context requests, leading to unpredictable tail latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 GPU fleet, Poisson arrivals, heavy-tailed service times, finite target latency budget

    **Calculations:**
    - Little's Law: L = \u03bb * W
    - If expected in-flight work (Tokens) > Max Latency * GPU Token Rate, reject

    **Conclusion & Interpretation:**
    - **Result: Bounded Latency (Queueing-Bound)**. By tracking the estimated in-flight work based on tokens, the queue length is capped to guarantee bounded latency.
