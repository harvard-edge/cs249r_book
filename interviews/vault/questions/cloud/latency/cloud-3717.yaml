title: Speculative Decoding Acceptance Rate Impact on H100 Inference Throughput
scenario: You implement speculative decoding on an H100 with a 70B target model and a 7B draft model. The draft model generates k=5 candidate tokens. The target model verifies in one forward pass. The draft acceptance rate is a=0.8. The target model alone generates 30 tok/s.
question: "What throughput improvement should speculative decoding deliver with k=5 and a=0.8 versus 30 tok/s target-only decoding?"
details:
  realistic_solution: Expected tokens per speculative step is computed based on acceptance probability. Calculate draft model generation time against HBM bandwidth, and add target verification time. Speculative decoding provides a 2.27x throughput improvement factoring in memory bandwidth costs.
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding blindly improves throughput by a factor of K.
    **The Rationale:** Candidates forget that speedup is a function of both the mathematical acceptance rate and the computational cost of the draft model relative to the target.
    **The Consequence:** Throughput expectations are wildly exaggerated, leading to poor capacity planning and unmet SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Acceptance rate (a): 0.8.
       - Draft tokens (k): 5.
       - Target baseline: 30 tok/s (~33.3ms per forward pass).
       - HBM Bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Expected tokens per cycle: E[tokens] = (1 - 0.8^6) / (1 - 0.8) = 3.69 tokens.
       - Draft time for 5 tokens (7B model): 5 * (7B * 2 bytes / 3.35 TB/s) = 5 * 4.18ms = ~20.9ms.
       - Target verification time: ~33.3ms.
       - Total cycle time: 20.9ms + 33.3ms = 54.2ms.
       - Cycle throughput: 3.69 tokens / 0.0542s = 68.08 tokens/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** Effective speedup vs baseline is 68.08 / 30 = ~2.27x, factoring in both the mathematical acceptance rate and the actual memory bandwidth cost of the draft model.
