title: Batching Limits Under Strict Latency SLAs
scenario: You are transitioning an object detection model from offline bulk processing to a real-time cloud API on an NVIDIA L4 GPU. For inference, the execution time per batch is empirically modeled as T(B) = 12ms + B * 3ms, where 12ms represents fixed PCIe transfer and kernel launch overheads. The product requirements dictate a strict latency SLA of 60ms per request.
question: What maximum dynamic batch size meets the 60ms latency SLA, and what serving throughput does it allow?
details:
  realistic_solution: "Set the latency equation to the SLA boundary to solve for B: 12ms + 3ms * B <= 60ms. This yields a max batch size of B = 16. The serving throughput is then 16 requests per 60ms, yielding 266.6 requests per second. This illustrates 'serving inversion', where we deliberately limit batch size (and thus peak hardware utilization) to guarantee response times."
  common_mistake: |
    **The Pitfall:** Ignoring the strict latency SLA to maximize throughput.
    **The Rationale:** Candidates are accustomed to offline processing where larger batch sizes uniformly improve throughput, failing to grasp "serving inversion" where batch size must be limited for latency.
    **The Consequence:** The API violates real-time constraints, leading to a degraded user experience.
  napkin_math: |
    - **Latency SLA equation:** 12ms + 3ms * B <= 60ms
    - **Solve for B:** 3ms * B <= 48ms => B = 16
    - **Serving throughput at B=16:** 16 requests / 0.060 seconds = 266.6 req/sec
    - **Result:** Max dynamic batch size is **16**, yielding a max throughput of **266.6 requests/second**.
