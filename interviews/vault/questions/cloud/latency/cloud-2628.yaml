title: Evaluating Two Clusters for Training Competition
scenario: For an MLPerf submission Cluster A has 256 A100s (312 TFLOPS each) at 50% MFU, known to converge in 8,000 steps at batch size 2048. Cluster B has 512 H100s (989 TFLOPS each) at 40% MFU, but the larger batch size (4096) means it needs 12,000 steps to converge.
question: "Which cluster wins on time-to-train, and by what factor?"
details:
  realistic_solution: Calculate total step throughput against the total number of steps required. Cluster B is 1.7x faster despite lower MFU and more steps, because 512 H100s provide massive raw throughput that offsets the batch size penalty.
  common_mistake: |
    **The Pitfall:** Comparing only step throughput without accounting for the total number of steps.
    **The Rationale:** Candidates easily calculate FLOPS/sec but forget that larger batches often degrade sample efficiency.
    **The Consequence:** They overestimate the speedup of the larger cluster by ignoring the 50% increase in total steps required to converge.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster A: 256 A100s (312 TFLOPS), 50% MFU, 8,000 steps, batch 2048.
       - Cluster B: 512 H100s (989 TFLOPS), 40% MFU, 12,000 steps, batch 4096.
       - Let F = FLOPs per sample.
    2. **Calculations:**
       - Cluster A Raw Throughput: 256 * 312e12 * 0.50 = 39.936 PFLOPS.
       - Cluster A Total Compute: 8,000 * 2048 * F = 16.384e6 * F FLOPs.
       - Cluster A Time (T_A): (16.384e6 * F) / 39.936e15 = 4.10e-10 * F seconds.
       - Cluster B Raw Throughput: 512 * 989e12 * 0.40 = 202.547 PFLOPS.
       - Cluster B Total Compute: 12,000 * 4096 * F = 49.152e6 * F FLOPs.
       - Cluster B Time (T_B): (49.152e6 * F) / 202.547e15 = 2.43e-10 * F seconds.
       - Speedup: T_A / T_B = 4.10 / 2.43 = ~1.69x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Throughput.** Cluster B wins by ~1.7x despite requiring 50% more steps to converge, because its raw hardware throughput overwhelms the batch size penalty.
