title: NVIDIA H100 Latency Diagnosis
scenario: You are deploying a large transformer model for real-time inference on an H100 GPU. Initial benchmarks show an average latency of 150ms, missing the 50ms target. The model is correctly loaded, batch size is optimized, CPU utilization is low, and `nvidia-smi` shows 90%+ GPU utilization.
question: How would you pinpoint the bottleneck causing 150 ms H100 inference latency when batch size is tuned, CPU is idle, and nvidia-smi shows 90% GPU utilization?
details:
  realistic_solution: A systematic approach involves using nsys profiling to get a comprehensive timeline view of GPU kernels, memory transfers, and CPU activities. Checking for long `cudaMemcpy` operations, small fragmented memory accesses, kernel launch overheads, or underutilized SMs will reveal the real bottleneck.
  common_mistake: |
    **The Pitfall:** Relying solely on coarse-grained tools like `nvidia-smi` to diagnose performance.
    **The Rationale:** High utilization (~90%) leads engineers to assume the GPU is efficiently computing matrix multiplications.
    **The Consequence:** Missing the real bottleneck, which is often memory stalls, frequent small data transfers, or poor kernel scheduling that keeps the GPU "busy" but mathematically idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - HBM3 Bandwidth: 3.35 TB/s.
       - Target Latency: 50ms. Observed: 150ms.
       - Sample data movement per pass: 20 GB.
       - Required compute per pass: 100 TFLOPs.
    2. **Calculations:**
       - Minimum memory transfer time: 20 GB / 3.35 TB/s = ~6ms.
       - Theoretical compute time: 100e12 FLOPs / 495e12 FLOPs/s ≈ 200ms.
       - Since 150ms falls within theoretical compute limits, the utilization metric hides inefficiencies like kernel launch overheads or sub-optimal SM occupancy.
    3. **Conclusion & Interpretation:**
       - **Result: Compute/Scheduling-Bound.** Detailed `nsys` profiling is required to decompose the timeline and identify fragmented memory access or scheduling bubbles masking as high utilization.
