title: Evaluating Cluster Concurrency Limits
scenario: Your team is deploying an LLM inference service on a cluster of H100 GPUs. The business SLA requires sustaining a throughput of 500 requests per second (RPS) with an average end-to-end latency of 2.5 seconds per request. An engineer proposes configuring the inference engines such that the global maximum concurrent requests limit across the entire cluster is strictly capped at 200 to aggressively prevent KV-cache Out-Of-Memory (OOM) errors.
question: Can a 200-request global concurrency cap meet 500 RPS at 2.5s average latency, and what concurrency should be provisioned?
details:
  realistic_solution: The configuration will fail. According to Little's Law (Concurrency = Throughput * Latency), sustaining 500 RPS at 2.5s latency strictly requires 1,250 concurrent requests in flight. Capping concurrency at 200 means the system can either handle 500 RPS at 0.4s latency (impossible given the 2.5s expectation) or only 80 RPS at 2.5s latency. The team must provision enough hardware and KV cache memory to support a global concurrency of at least 1,250.
  common_mistake: |
    **The Pitfall:** Analyzing throughput and latency as independent constraints.
    **The Rationale:** Candidates fail to link the two metrics mathematically using Little's Law.
    **The Consequence:** They erroneously approve a concurrency cap that mathematically precludes hitting both SLAs simultaneously, leading to immediate production outages.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Throughput (λ): 500 req/sec.
       - Target Latency (W): 2.5 sec/req.
       - Proposed Concurrency Cap (L): 200.
    2. **Calculations:**
       - Required Concurrency by Little's Law (L = λ * W): 500 * 2.5 = 1,250 concurrent requests.
       - Throughput with proposed cap (λ = L / W): 200 / 2.5 = 80 req/sec.
    3. **Conclusion & Interpretation:** **The proposed cap limits the system to 80 RPS, which mathematically precludes hitting the 500 RPS SLA. You must provision hardware to support at least 1,250 concurrent requests.**
