title: The Unstable Translation Queue
scenario: You are designing a real-time translation service with a strict Time To First Token (TTFT) deadline under 200ms. The system uses a 7B parameter model, which takes 20ms for prefill and 8ms per generated token. At peak, the service receives requests at an average rate of 10 requests/second. The average request needs 15 tokens. The current design uses a simple FIFO queue feeding a single inference worker.
question: Can the FIFO single-worker system meet the 200ms TTFT deadline at 10 requests/sec, and why?
details:
  realistic_solution: The system is unstable and cannot meet its deadline. The critical issue is that the arrival rate (λ) is higher than the service rate (μ), which guarantees that the queue will grow infinitely long over time, causing unbounded latency.
  common_mistake: |
    **The Pitfall:** Comparing the average service time (140ms) directly to the deadline (200ms) and ignoring queueing delay.
    **The Rationale:** Engineers routinely forget the fundamental stability condition of queueing theory: arrival rate must be less than service rate, or the queue grows unbounded.
    **The Consequence:** Designing unstable inference systems that immediately collapse and timeout under peak load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Service Time (W_s): 20ms prefill + (15 tokens * 8ms/token) = 140ms per request.
    - Arrival Rate (λ): 10 requests/sec.

    **Calculations:**
    - Service Rate (μ): 1 / 0.140s ≈ 7.14 requests/sec.
    - Stability Check: 10 (λ) > 7.14 (μ).

    **Conclusion & Interpretation:**
    - **Result: Unstable Queue (Latency-Bound)**. The system is unstable (ρ > 1); the queue will grow infinitely.
