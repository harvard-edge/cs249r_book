title: LLM Inference Queue Management on AMD MI300X
scenario: 'Your team is deploying a new large language model (LLM) inference service in the cloud. The service receives a variable workload of user queries. You''ve observed that, on average, each GPU can process an LLM inference request in approximately 200 milliseconds. However, peak traffic can lead to request spikes.'
question: 'How would you set per-GPU queue depth and capacity plans for 200 ms service time while keeping average end-to-end latency at 500 ms under spikes?'
details:
  realistic_solution: |
    Implement dynamic queue management with adaptive batching and load balancing. Monitor real-time arrival rates and service times. Use Little's Law (L = λW) to estimate current average queue length based on arrival rate and observed average latency. Set a maximum acceptable queue depth or a target latency, and dynamically adjust batch sizes or spin up additional instances (auto-scaling) when queue thresholds are breached.
  common_mistake: |
    **The Pitfall:** Overlooking the impact of queue length variability on latency or assuming a constant service rate.
    **The Rationale:** Candidates fail to apply Little's Law correctly to the average case and do not differentiate between average processing time and the effective service rate.
    **The Consequence:** Unbounded queue growth during traffic spikes, leading to severe latency degradation and dropped requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target average end-to-end latency (W): 500 ms (0.5s).
    - Average service time (Ts): 200 ms (0.2s) per request.

    **Calculations:**
    - Acceptable queue time (Wq): W - Ts = 0.5s - 0.2s = 0.3s.
    - Service rate (μ): 1 request / 0.2s = 5 requests/sec.
    - At saturation (λ ≈ 5 req/s), average queue depth (Lq) via Little's Law (Lq = λWq): 5 * 0.3 = 1.5 requests.
    - Capacity needed for 100 req/s peak: 100 / 5 = 20 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 1.5 requests (Queue-Bound)**. The queue should hold no more than 1-2 requests to maintain 500ms latency.
