title: LLM Inference Queue Management on AMD MI300X
scenario: Your team is deploying a new large language model (LLM) inference service in the cloud. The service receives a variable workload of user queries. You've observed that, on average, each GPU can process an LLM inference request in approximately 200 milliseconds. However, peak traffic can lead to request spikes.
question: How would you set per-GPU queue depth and capacity plans for 200 ms service time while keeping average end-to-end latency at 500 ms under spikes?
details:
  realistic_solution: |
    Set queue depth from the waiting-time budget, then plan capacity with utilization headroom. With a 500 ms end-to-end target and 200 ms average service time, only about 300 ms is available for queueing and dispatch. For each GPU, estimate the admitted arrival rate and measured service distribution, then cap queue age at 300 ms and cap queue length at floor(lambda_per_gpu * 0.3s), with a minimum practical cap of one waiting request only if that follows from the measured rate. Capacity should be sized so peak traffic keeps each GPU below the utilization where queue age grows rapidly; autoscale or shed work when queue age approaches the cap.
  common_mistake: |
    **The Pitfall:** Overlooking the impact of queue length variability on latency or assuming a constant service rate.
    **The Rationale:** Candidates fail to apply Little's Law correctly to the average case and do not differentiate between average processing time and the effective service rate.
    **The Consequence:** Unbounded queue growth during traffic spikes, leading to severe latency degradation and dropped requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target average end-to-end latency (W): 500 ms (0.5s).
    - Average service time (Ts): 200 ms (0.2s) per request.
    - Keep planned utilization at or below 70% during spikes.

    **Calculations:**
    - Acceptable queue time (Wq): W - Ts = 0.5s - 0.2s = 0.3s.
    - Service rate (μ): 1 request / 0.2s = 5 requests/sec.
    - At 70% utilization, admitted arrival per GPU λ ≈ 0.7 * 5 = 3.5 req/s.
    - Queue-depth cap from Little's Law for waiting work: Lq ≈ λ * Wq = 3.5 * 0.3 = 1.05 requests.
    - Operationally cap each per-GPU queue at about 1 waiting request, or cap by queue age at 300 ms if batching changes the service rate.
    - If peak traffic is 100 req/s, capacity at 70% utilization is 100 / 3.5 = 28.6, so plan about 29 GPUs, not 20.

    **Conclusion & Interpretation:**
    - **Result: with these assumptions, use about one waiting request per GPU and about 29 GPUs for a 100 req/s peak; recompute from measured per-GPU arrival rates and service times.**
