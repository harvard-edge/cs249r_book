title: M/G/c/K Queue Sizing for LLM Inference
scenario: You are architecting an API gateway for a fleet of 8 vLLM instances (c=8) running Llama-3-70B on 8xH100 nodes. Inbound requests follow a Poisson process (M) at 120 req/s. Due to highly variable output token lengths, the service time distribution is heavily right-skewed with a mean of 50ms and a coefficient of variation (Cv) of 2.5 (G). To protect the backend during traffic bursts, you must configure the maximum queue depth (K). If the queue is full, new requests are dropped (HTTP 503).
question: For the M/G/c/K 70B API gateway, should K be set to 16 or 64 to balance drops against P99 wait time, and why?
details:
  realistic_solution: Model the system as an M/G/c/K queue, but do not use a single closed-form formula to claim exact P99 wait time. The offered load is 120 req/s against 8 instances with 20 req/s mean service capacity each, so average utilization is 75%. Because service time is highly variable (Cv=2.5), a deeper queue mainly converts bursts into long tail waits. Choose K=16 when the priority is protecting P99 latency, accepting more HTTP 503 drops under bursts; K=64 is only appropriate if fewer drops matter more than tail latency and it is validated with simulation or load testing.
  common_mistake: |
    **The Pitfall:** Using basic M/M/c formulas to size the queue.
    **The Rationale:** Engineers assume exponential service times (CV=1) because the math is easier.
    **The Consequence:** They dramatically underestimate tail latency (driven by high CV from output variance), leading to P99 SLA violations during bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 vLLM instances (c=8).
    - Arrival rate: 120 req/s.
    - Service time distribution: heavily right-skewed with mean 50ms and Cv=2.5.
    - K=16 and K=64 are finite buffer limits, not exact P99 wait-time formulas.

    **Calculations:**
    - Mean service capacity: 8 * (1 / 0.050s) = 160 req/s.
    - Offered utilization: 120 / 160 = 0.75.
    - K=16 admits at most 16 waiting/in-flight slots at the gateway, so overload is shed earlier.
    - K=64 admits four times as much backlog before dropping, so burst absorption improves but queued requests experience longer tail waits.
    - With Cv=2.5, the long-service tail makes the larger backlog especially risky for P99 latency; exact P99 requires queue simulation or production load testing.

    **Conclusion & Interpretation:**
    - **Result: Choose K=16 for latency protection (Tail-Latency-Bound).** It intentionally sheds excess traffic sooner instead of allowing a deep queue to amplify P99 wait time; K=64 trades lower drop probability for higher tail latency risk.
