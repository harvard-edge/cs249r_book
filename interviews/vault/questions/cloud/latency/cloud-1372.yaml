title: Evaluating Hedged Request Thresholds for Feature Store
scenario: A real-time recommendation system fetches user embeddings from a distributed NoSQL feature store. The P50 read latency is 5ms, but the P99 latency spikes to 150ms due to JVM garbage collection pauses and localized network congestion. The strict SLA for this fetch step is 20ms. You are evaluating the implementation of Hedged Requests to mitigate this tail latency.
question: How do you determine the optimal delay threshold for dispatching the secondary request, and what is the quantitative impact on the storage backend cluster?
details:
  realistic_solution: |
    Set the hedge delay threshold near the P95 latency (e.g., 10ms), then validate it with production latency histograms. At this point, roughly 5% of requests exceed the threshold and trigger a redundant read to a different replica. This can pull tail latency toward the hedge delay plus a typical secondary-replica latency while keeping load amplification small if primaries are canceled effectively.
  common_mistake: |
    **The Pitfall:** Setting the hedge delay too aggressively (e.g., at the P50 of 5ms).
    **The Rationale:** This essentially doubles the cluster read load (100% amplification) as half the requests will be duplicated.
    **The Consequence:** Causing cascading failures due to resource exhaustion in the backend storage cluster.
  napkin_math: |
    **Assumptions & Constraints:**
    - P50 read latency: 5ms. P99 read latency: 150ms.
    - SLA requirement: 20ms.
    - Hedge delay set at P95 (e.g., 10ms).

    **Calculations:**
    - Requests taking >10ms (about the top 5%) trigger a secondary hedge request.
    - Ideal extra read load is about +5% if each hedged request adds one secondary read and cancellation is effective.
    - For the delayed 5%, expected latency = hedge delay + P50 of secondary replica.
    - Approximate hedged-subset latency target = 10ms + 5ms = 15ms.

    **Conclusion & Interpretation:**
    - **Result: Approximate Tail Reduction.** Setting the hedge threshold at P95 can reduce tail latency toward ~15ms for many stragglers, under the 20ms SLA target, with roughly +5% read amplification under ideal cancellation assumptions.
