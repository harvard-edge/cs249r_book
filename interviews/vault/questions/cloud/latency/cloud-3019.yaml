title: 'Latency Decomposition: Specify Prefill/Decode Split Requirements for SLA on H100'
scenario: Design a latency budget specification for a chat application using a 13B model on a single GPU
  (80GB HBM3, 3.35TB/s, 989 TFLOPS). The SLA requires TTFT < 200ms and time-per-output-token (TPOT) <
  30ms at P95.
question: What prompt length, decode length, GPU count, and batch-size constraints satisfy TTFT < 200ms
  and TPOT < 30ms for the 13B chat app?
details:
  realistic_solution: 'TPOT constraint: 13B model = 26GB FP16. Single GPU: 26GB/3.35TB/s = 7.8ms/token
    < 30ms. Max batch for TPOT < 30ms: memory-bound, batching doesn''t increase per-token time (same weights
    read). TTFT constraint: at batch=1, prefill for N tokens at 13B requires N*26B FLOPs. For N=512: 13.3T/989T
    = 13.5ms << 200ms. Max prompt: 200ms budget -> N = 200ms * 989TFLOPS / (2*13B) = 7607 tokens. So max
    prompt ~7K tokens with margin.'
  common_mistake: '**The Pitfall:** Solving for TTFT and TPOT independently.

    **The Rationale:** Candidates fail to realize that while larger batches improve TTFT amortization,
    they consume memory that limits prompt/decode lengths and can degrade TPOT if the batch size becomes
    compute-bound.

    **The Consequence:** Designing a system that meets the SLA under light load but OOMs or violates TPOT
    under peak concurrent traffic.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 13B model (26GB FP16).

    - Single GPU: 80GB HBM3, 3.35TB/s, 989 TFLOPS.


    **Calculations:**

    - **TPOT:** 26GB / 3.35TB/s = 7.8ms/token (satisfies < 30ms).

    - **TTFT for 512 tokens:** 13.3T FLOPs / 989TFLOPS = 13.5ms.

    - **Budget remaining for queue/network:** 200 - 13.5 = 186.5ms.

    - **Memory check (Batch 25):** 26GB weights + 25 * 2560 * 5120 * 2(KV) * 40 layers * 2B = 26GB + 52.4GB
    = 78.4GB < 80GB.


    **Conclusion & Interpretation:**

    - **Spec: max_prompt=2048, max_decode=512, batch_size <= 25 on 1 GPU.**

    '
