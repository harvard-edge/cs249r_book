title: Stateful Streaming vs Stateless Batching ASR
scenario: 'You are designing the backend for a real-time voice agent handling 5,000 concurrent active sessions. You must choose between two ASR architectures: a stateless Transformer that requires 1.5-second audio chunks to decode accurately (utilizing dynamic batching), and a stateful streaming RNN-T that incrementally processes 100ms frames. The strict SLA dictates a Time-To-First-Word (TTFW) of <300ms. The deployment targets an autoscaling cluster of standard GPUs.'
question: "Which ASR architecture should you deploy to meet the <300ms TTFW SLA for 5,000 sessions, and how would you size it?"
details:
  realistic_solution: 'Adopt the stateful streaming RNN-T to easily meet the 300ms SLA, and implement session-aware routing (sticky sessions). Since 5,000 sessions requiring 20MB of hidden state each results in 100GB of persistent memory demand, shard the traffic across at least 5 GPUs using consistent hashing, and perform continuous batching across concurrent incoming 100ms frames on each node.'
  common_mistake: |
    **The Pitfall:** Choosing the stateless Transformer to easily leverage dynamic batching.
    **The Rationale:** Stateless load balancing is standard practice for scalable web services.
    **The Consequence:** Accumulating the 1.5s audio chunk inherently violates the 300ms SLA before computation even begins.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5,000 sessions, 20MB state/stream.
    - GPU capacity = 24GB.
    - SLA = <300ms TTFW.

    **Calculations:**
    - Stateless Latency = 1500ms (buffer) + 50ms (compute) = 1550ms TTFW (Fails SLA).
    - Stateful Latency = 100ms (buffer) + 15ms (compute) = 115ms TTFW (Passes SLA).
    - Memory = 5,000 * 20MB = 100GB.
    - GPUs = ceil(100GB / 24GB) = 5 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 5 GPUs required (Memory Capacity)**. Stateful streaming is essential to meet real-time SLAs despite higher memory pressure.
