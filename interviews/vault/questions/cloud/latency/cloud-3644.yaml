title: Tail Latency SLO Decomposition Across Microservices
scenario: 'A multi-stage ML pipeline has 5 sequential microservices: preprocessing (P99=5ms), embedding (P99=12ms), retrieval (P99=8ms), reranking (P99=15ms), generation (P99=40ms). End-to-end P99 SLA is 100ms. The current end-to-end P99 is 160ms.'
question: 'How would you set per-stage latency SLOs so the 5-stage pipeline meets a true 100ms end-to-end P99?'
details:
  realistic_solution: 'Model each stage as independent with its own latency distribution. Use correlated sampling to find the true end-to-end percentile. For 5 independent stages, P(end-to-end > T) = 1 - Product(P(stage_i <= T_i)). To hit P99 end-to-end, each stage must achieve approximately P99.8 (since 0.998^5 ≈ 0.99). Tighten reranking and generation SLOs to P99.8.'
  common_mistake: |
    **The Pitfall:** Assuming end-to-end P99 equals the linear sum of individual P99s.
    **The Rationale:** Treating tail percentiles identically to median averages without realizing that probability compounds.
    **The Consequence:** The actual end-to-end P99 is vastly worse because multiple independent tail events compound, guaranteeing persistent SLO violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 independent sequential stages.
       - Current component P99s: 5, 12, 8, 15, 40ms (Sum = 80ms).
       - Target E2E SLA: 100ms P99.
    2. **Calculations:**
       - Current Compounding Probability: 0.99^5 = 0.951 (The current E2E is P95.1, not P99).
       - Target Component SLO: To achieve true E2E P99, each stage needs P(1 - 0.01/5) = P99.8.
       - Verification: 0.998^5 ≈ 0.99004.
    3. **Conclusion & Interpretation:**
       - **Result: Tail-Latency-Bound. The component SLOs must be tightened to P99.8 to mathematically achieve a true P99 end-to-end SLA across 5 stages.**
