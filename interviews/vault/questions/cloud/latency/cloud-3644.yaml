title: Tail Latency SLO Decomposition Across Microservices
scenario: 'A multi-stage ML pipeline has 5 sequential microservices: preprocessing (P99=5ms), embedding (P99=12ms), retrieval (P99=8ms), reranking (P99=15ms), generation (P99=40ms). End-to-end P99 SLA is 100ms. The current end-to-end P99 is 160ms.'
question: How would you set per-stage latency SLOs so the 5-stage pipeline meets a true 100ms end-to-end P99?
details:
  realistic_solution: |
    Allocate the 100ms end-to-end budget across the five sequential stages, then validate the sum of sampled stage latencies rather than summing published P99s. A reasonable starting budget is proportional to the current stage P99s: preprocessing 6ms, embedding 15ms, retrieval 10ms, reranking 19ms, and generation 50ms. Then replay correlated traces or simulate from measured distributions and tighten the stages that push the sampled end-to-end P99 above 100ms. The current 160ms end-to-end P99 proves that the existing component P99s do not describe the joint tail well enough.
  common_mistake: |
    **The Pitfall:** Assuming end-to-end P99 equals the linear sum of individual P99s.
    **The Rationale:** Treating tail percentiles identically to median averages without realizing that probability compounds.
    **The Consequence:** The actual end-to-end P99 is vastly worse because multiple independent tail events compound, guaranteeing persistent SLO violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 sequential stages with current component P99s of 5, 12, 8, 15, and 40ms.
    - Target end-to-end P99 is 100ms.
    - Current measured end-to-end P99 is 160ms, so joint tails or unmeasured queues are already visible.

    **Calculations:**
    - Current component P99 sum: 5 + 12 + 8 + 15 + 40 = 80ms, which does not match the observed 160ms E2E P99.
    - Starting proportional budget: multiply each component P99 by 100 / 80 = 1.25.
    - Candidate stage budgets: 6.25ms, 15ms, 10ms, 18.75ms, and 50ms; rounded to 6, 15, 10, 19, and 50ms, these sum to 100ms.
    - Validation method: compute the P99 of L_total = L_pre + L_embed + L_retrieval + L_rerank + L_gen from correlated traces or from a distribution simulation; adjust budgets until P99(L_total) <= 100ms.

    **Conclusion & Interpretation:**
    - **Result: Budget-and-validate decomposition.** Per-stage SLOs are latency budgets whose summed sampled distribution must meet 100ms P99; a P99.8-per-stage rule alone does not allocate the 100ms latency budget.
