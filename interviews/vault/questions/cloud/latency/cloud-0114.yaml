title: The Throughput Collapse
scenario: You are managing an LLM serving endpoint that uses a 13B model on an H100 for document summarization. Your goal is to maximize throughput. You observe that as you increase the server's batch size, throughput increases, but at a batch size of 64, P99 latency skyrockets and the effective throughput starts to decrease.
question: If VRAM is not the issue, what queueing effect explains why batch size 64 makes P99 latency skyrocket and effective throughput decrease?
details:
  realistic_solution: 'Diagnose head-of-line blocking using M/M/1 queueing theory. When the request arrival rate (lambda) exceeds the batch service rate (mu), utilization (rho) exceeds 1.0, causing the queue length to explode toward infinity.'
  common_mistake: |
    **The Pitfall:** Immediately assuming a hardware limit like VRAM capacity (OOM) or memory bandwidth has been hit.
    **The Rationale:** While these are physical limits, a throughput collapse often happens before a hard OOM due to queueing dynamics. Blaming VRAM doesn't explain why a lower batch size worked better.
    **The Consequence:** Engineers might provision larger GPUs unnecessarily or prematurely truncate sequences, rather than properly tuning maximum batch sizes to keep rho < 1.
  napkin_math: |
    **Assumptions & Constraints:**
    - Small batch (BS=32): T_batch = 10ms. Capacity mu = 100 batches/s (3200 req/s).
    - Large batch (BS=64): Non-linear scaling pushes T_batch to 30ms. Capacity mu = 33.3 batches/s (2133 req/s).
    - Arrival rate lambda = 2560 req/s.

    **Calculations:**
    - Small batch utilization (rho): 2560 / 3200 = 0.80. Queue is stable.
    - Large batch utilization (rho): 2560 / 2133 = 1.20.
    - Since rho > 1, the queue length approaches infinity mathematically.

    **Conclusion & Interpretation:**
    - **Result: Utilization exceeds 1.0, rho=1.2 (Queue-Bound)**. Due to head-of-line blocking, causing catastrophic throughput collapse.
  options:
  - 'The GPU has hit a Memory-Capacity-Bound limit, running out of VRAM for the batch of 64.'
  - 'The system is Queue-Bound; utilization (rho) exceeds 1.0, causing head-of-line blocking and wait times to explode.'
  - 'The H100 is Bandwidth-Bound; memory bandwidth saturation strictly limits throughput to 2133 req/s.'
  - 'The CPU is Single-Thread-Bound, restricting the batch preparation rate to 50% of the GPU''s capacity.'
  correct_index: 1
