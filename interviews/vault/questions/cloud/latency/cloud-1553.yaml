title: DLRM Latency Spikes Post-Traffic Lull
scenario: You are serving a 35GB DLRM recommendation model on an AWS instance. During traffic lulls, background logging and metric aggregation agents run on the node. When a sudden burst of user traffic arrives, P99 latency instantly spikes from 15ms to over 800ms for several seconds before recovering, yet CPU utilization never exceeds 50%. The OS has a 16GB swap space enabled with default swappiness.
question: What causes the 800ms P99 burst-latency spikes on the 35GB DLRM VM, and what system-level fix should you apply?
details:
  realistic_solution: The background tasks are causing the OS to page out 'idle' embedding tables to disk. Fix it by using mlock() or mlockall(MCL_CURRENT | MCL_FUTURE) to pin the 35GB model weights in physical RAM, or by setting vm.swappiness=0.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is due to CPU wake-up latency, thread pool cold-starts, or Python garbage collection.
    **The Rationale:** Candidates focus on application-level or CPU-level latency sources because they are more common in typical microservices, ignoring OS-level virtual memory paging dynamics.
    **The Consequence:** Proposing application-level fixes that fail to resolve the severe disk I/O bottleneck caused by swapped-out memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVMe SSD access time is ~100µs.
    - Model is 35GB, system has 16GB swap.

    **Calculations:**
    - A request pulling 100 un-cached embeddings from disk takes 100 * 100µs = 10ms of pure I/O delay.
    - With 50 concurrent requests hitting paged-out memory, NVMe queueing easily pushes tail latency beyond 800ms.

    **Conclusion & Interpretation:**
    - **Result: 800ms (I/O-Bound)**. Background tasks page out idle embeddings; fetching them from NVMe creates immense I/O queueing delay.
