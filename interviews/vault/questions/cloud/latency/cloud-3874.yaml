title: Disaggregated Prefill vs Hedged Requests for TTFT
scenario: We serve a 30B parameter LLM on single GPUs. Our strict SLA requires a P99 Time-To-First-Token (TTFT) of 150ms. Currently, our P50 TTFT is 60ms, but P99 is 250ms because long-context prefill requests cause head-of-line blocking. We evaluate Hedged Requests or Disaggregated Prefill.
question: Which architecture is better for guaranteeing the SLA for a prompt that produces a 2 GB KV cache?
details:
  realistic_solution: |
    Disaggregated Prefill is the better fit under the stated numbers, but it is not universally superior. It isolates bursty, compute-heavy prefill from decode and adds a predictable KV-transfer cost: 2 GB over 50 GB/s is about 40 ms. If prefill service time remains around 60 ms and queueing is controlled, total TTFT is about 100 ms and leaves 50 ms of SLA headroom. Hedged requests are less attractive here because they duplicate expensive prefill work and only help when the tail comes from random stragglers rather than systematic head-of-line blocking.
  common_mistake: |
    **The Pitfall:** Defaulting to Hedged Requests because it is a classic distributed systems pattern for mitigating tail latency.
    **The Rationale:** Applying standard web-service microservice patterns to LLM serving without realizing LLM prefill is heavily compute-bound.
    **The Consequence:** Hedging expensive prefill operations under high load increases duplicate compute, raises utilization, and can make queueing delays worse.
  napkin_math: |
    **Assumptions & Constraints:**
    - Disaggregated Prefill network: 50 GB/s InfiniBand. KV Cache: 2 GB.
    - Hedged Request Wait: 80ms. Prefill: 60ms. SLA: 150ms.

    **Calculations:**
    - Option B (Disaggregated) KV Transfer: 2 GB / 50 GB/s = 40ms.
    - Option B estimated TTFT before queueing margin: 60ms prefill + 40ms transfer = 100ms.
    - Option B SLA margin: 150ms - 100ms = 50ms for queueing, scheduling, and handoff overhead.
    - Option A hedged estimate: 80ms wait + 60ms duplicate prefill = 140ms before any additional queueing, while consuming extra prefill capacity.

    **Conclusion & Interpretation:**
    - **Result: Disaggregated prefill is favored for this SLA if queueing is kept below about 50ms.** Hedging is a poor fit for compute-bound prefill tails because it spends extra GPU work while leaving little SLA margin.
