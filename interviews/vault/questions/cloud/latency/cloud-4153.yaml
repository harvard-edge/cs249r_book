title: Coordinated Omission in Latency Measurement
scenario: Your H100 inference benchmark reports P99 = 35ms, but production users complain of multi-second delays. You discover the benchmark tool pauses sending new requests while waiting for slow responses.
question: What is coordinated omission, and how does the benchmark's pause-while-waiting behavior mask true tail latency?
details:
  realistic_solution: 'Coordinated omission occurs when the measurement tool reduces its offered load during slow periods. If a request takes 2s instead of 35ms, a closed-loop benchmark skips ~2000 requests that would have arrived during those 2s at a 1000 req/s target rate. Those 2000 ''phantom'' requests — each of which would have experienced queueing delays — are never measured. The true P99 includes all requests that would have arrived at the intended rate. Fix: use open-loop benchmarking (send requests on a fixed schedule regardless of responses), or use Gil Tene''s HDR Histogram with coordinated omission correction. In production, measure from the client side (including queue wait) not server side.'
  common_mistake: |
    **The Pitfall:** Trusting closed-loop benchmarks for latency SLAs.
    **The Rationale:** Closed-loop benchmarks (send request, wait for response, send next) systematically undercount tail latency because they reduce load during slow periods — exactly when tail latency matters most.
    **The Consequence:** The reported P99 latency will be artificially low, masking true production delays and causing SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target rate: 1000 req/s.
       - Slow request latency: 2000ms instead of 35ms.
    2. **Calculations:**
       - Closed-loop misses ~2000 requests that would have queued during the 2s pause.
       - Those 2000 requests wait 0-2000ms in queue.
    3. **Conclusion & Interpretation:** **True P99 ≈ 500ms (Underestimation factor: 14×). Queue-Bound.**
