title: The Little's Law Bottleneck
scenario: You're operating an LLM inference service on a single H100 GPU. The service has a strict P99 SLO that the Time-To-First-Token (TTFT) must be under 100ms. From profiling, you know that the GPU can process a single request and generate the first token in 10ms.
question: What happens to queue wait time as arrivals approach the 100 req/s service rate with a 10ms first-token service time?
details:
  realistic_solution: |
    The maximum service rate (μ) is 1 request / 10ms = 100 req/sec. As the arrival rate (λ) approaches 100 req/s, the system utilization (ρ = λ/μ) approaches 1. According to M/M/1 queueing theory, expected wait time grows exponentially as utilization nears 100%. To maintain the 100ms P99 SLO, the system must be provisioned to operate at a utilization significantly below 100% (typically 70-80%) to absorb bursts.
  common_mistake: |
    **The Pitfall:** Assuming that as long as the arrival rate is slightly less than the service rate, the system is healthy.
    **The Rationale:** Engineers think linearly, failing to account for the exponential explosion in queue wait times ("tail at scale" effects) as system utilization approaches 100%.
    **The Consequence:** The system will wildly violate the 100ms P99 SLO during minor traffic bursts, causing sudden and unpredictable latency spikes for users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Service Rate (μ): 1 request / 10ms = 100 req/s.
    - Target Arrival Rate (λ): Approaching 100 req/s (e.g., 90 or 95 req/s).
    - Queue Type: M/M/1 (exponential wait times).

    **Calculations:**
    - Utilization (ρ) at 90 req/s: 90 / 100 = 0.9.
    - Wait time at 90 req/s: 1 / (100 - 90) = 100ms.
    - Utilization (ρ) at 95 req/s: 95 / 100 = 0.95.
    - Wait time at 95 req/s: 1 / (100 - 95) = 200ms.

    **Conclusion & Interpretation:**
    - **Result: Queue-Bound.** As utilization approaches 100%, queue wait times grow exponentially. At 95 req/s, the 200ms wait purely in the queue catastrophically violates the 100ms TTFT SLO.
  options:
  - "Wait time scales linearly, reaching 99ms at 99 req/s, staying just under the 100ms SLO."
  - "Wait time remains near 10ms (the service time) as long as arrival rate < 100 req/s."
  - "Wait time grows exponentially, hitting 200ms at 95 req/s and violating the 100ms SLO."
  - "Wait time is bound by the 10ms compute time, allowing 99 req/s safely."
