title: Diagnosing Microservice Serving Tax
scenario: 'A distributed recommender system pipeline consists of three microservices: a CPU Tokenizer, a GPU Embedding Service (producing 2048-dim float32 vectors), and a GPU Ranking Service. Services communicate over 10GbE using JSON over REST. The pure GPU compute takes 20ms total, but the end-to-end p99 latency is 85ms (failing the 50ms SLA). Network ping between instances is 0.2ms. As the tech lead, you must analyze the telemetry to diagnose the root cause of this latency bloat.'
question: 'What is causing p99 latency to bloat from 20ms GPU compute to 85ms in the JSON/REST recommender pipeline, and how do you resolve it?'
details:
  realistic_solution: 'Identify JSON serialization of dense floating-point arrays as the primary bottleneck. Replace REST/JSON with gRPC and Protobufs (or FlatBuffers) for zero-copy binary serialization, and co-locate the Tokenizer and Embedding services to eliminate a network hop.'
  common_mistake: |
    **The Pitfall:** Blaming network bandwidth limits or TCP queueing delays.
    **The Rationale:** Candidates assume distributed system latency is always network-bound, proposing expensive network hardware upgrades instead of investigating CPU-bound data serialization overhead.
    **The Consequence:** Upgrading to 100GbE network hardware which provides zero latency reduction because the bottleneck is the CPU JSON parser.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2048-dim float32 vector.
    - Network ping: 0.2ms. GPU compute: 20ms.

    **Calculations:**
    - 2048-dim float32 vector = 8KB raw data.
    - Serializing 8KB floats to JSON (Python) = ~8ms; deserializing = ~6ms.
    - Embedding to Ranking hop: 1 encode + 1 decode = 14ms CPU serialization overhead.
    - HTTP framing for two hops = ~10ms.
    - Total Serving Tax = 24ms. Compute (20ms) + Tax (24ms) = 44ms baseline (stretches to 85ms p99 under load).

    **Conclusion & Interpretation:**
    - **Result: CPU-bound JSON serialization accounts for ~24ms of baseline latency bloat. (CPU-Bound Serialization Bottleneck)**. A binary protocol like Protobuf is strictly required.
