title: Disaggregated Serving with Chunked Prefill on A100 80GB
scenario: A LLM serving system on A100 80GB alternates between large prefill requests (2048 tokens, ~400ms) and decode requests (single tokens, ~10ms each). Full prefill preempts all decode requests, causing P99 decode latency spikes to 2 seconds. Implement chunked prefill to bound decode interference.
question: With a 25ms decode-stall target, how would you choose a chunked-prefill size and what TTFT trade-off results?
details:
  realistic_solution: 'Problem: a full 400ms prefill can block about 40 decode steps of 10ms each, creating large P99 decode spikes. Choose the largest chunk that keeps decode stall within the latency budget while still using the A100 efficiently; 128 tokens is a reasonable floor because smaller chunks tend to lose tensor-core efficiency and pay more launch overhead. With 128-token chunks, the 2048-token prefill becomes 16 chunks. Assuming prefill time scales approximately linearly, each chunk is 400ms/16 = 25ms, so a decode request waits behind at most one 25ms prefill chunk instead of a full 400ms prefill. For the prefill request itself, the raw prefill work remains about 400ms, but interleaving 15 other 10ms decode slots before its first generated token gives about 400 + 150 + 10 = 560ms TTFT versus about 400 + 10 = 410ms without interleaving. The trade-off is roughly +37% TTFT for that request while bounding decode interference to about 25ms.'
  common_mistake: |
    **The Pitfall:** Chunking prefill into extremely small, equal-size chunks (e.g., < 64 tokens).
    **The Rationale:** Engineers focus purely on minimizing decode interruption, forgetting that tiny chunks suffer from high kernel launch overhead and poor Tensor Core utilization.
    **The Consequence:** Effective prefill throughput plummets, massively increasing total time to first token (TTFT).
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 80GB, 2048-token prefill (~400ms), 10ms decode steps.
    - Chunk size: 128 tokens.
    - Scheduling model: run one prefill chunk, then allow one waiting decode step between chunks.

    **Calculations:**
    - Chunks required: 2048 / 128 = 16 chunks.
    - Chunk duration: 400ms / 16 = 25ms under linear chunking approximation.
    - New maximum decode stall from prefill: one chunk = 25ms, versus 400ms for full prefill.
    - Baseline TTFT for the prefill request: 400ms prefill + 10ms first decode = 410ms.
    - Chunked TTFT with 15 interleaved decode slots before first token: 16 * 25ms + 15 * 10ms + 10ms = 560ms.
    - TTFT increase: (560 - 410) / 410 = 36.6%.

    **Conclusion & Interpretation:**
    - **Result: Decode Interference Bounded.** A 128-token chunk caps prefill-induced decode stall at about 25ms instead of 400ms, trading about a 37% TTFT increase for the prefill request under this interleaving policy.
