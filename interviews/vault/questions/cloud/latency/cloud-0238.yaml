title: Applying Little's Law to Inference Servers
scenario: 'According to Little''s Law (L = \lambda W), our LLM inference server has an average arrival rate of 10 requests per second (\lambda) and each request takes an average of 5 seconds to process (W).'
question: 'With \lambda = 10 requests/s and W = 5 seconds, how many concurrent requests L must the LLM server support to remain stable?'
details:
  realistic_solution: |
    Little's Law states that the average number of items in the system (L) equals the arrival rate multiplied by the average time spent in the system. 10 req/s * 5 s = 50 concurrent requests.
  common_mistake: |
    **The Pitfall:** Confusing the arrival rate with required concurrency.
    **The Rationale:** Candidates assume the server only needs to handle the arrival rate (10) concurrently, ignoring the duration of each request.
    **The Consequence:** Severe under-provisioning, causing immediate queue buildup and latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (\lambda) = 10 req/s.
    - Processing time (W) = 5s.

    **Calculations:**
    - L = \lambda * W = 10 * 5 = 50 concurrent requests.
    - At 1.5 GB KV cache per request, 50 * 1.5 GB = 75 GB memory required.

    **Conclusion & Interpretation:**
    - **Result: 50 concurrent requests (Concurrency-Bound)**. The system must support 50 concurrent requests to prevent infinite queue growth.
  options:
  - 'The server needs to support 5 concurrent requests at any given time.'
  - 'The server needs to support 15 concurrent requests to have a buffer for peak loads.'
  - 'The server needs to support an average of 50 concurrent requests in the system.'
  - 'The server needs to support 2 concurrent requests, as 10 divided by 5 is 2.'
  correct_index: 2
