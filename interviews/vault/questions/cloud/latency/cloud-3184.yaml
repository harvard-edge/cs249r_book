title: Staged Speculation for Ultra-Long Generation
scenario: 'You are generating a 10K-token response (long-form report) from a 405B model on 8x H100. At 80ms/token autoregressive, this takes 800 seconds. With K=5 speculation (alpha=0.78), it takes ~270 seconds. Design a staged speculation system that adapts strategy as the generation progresses through three phases: (1) low-entropy opening, (2) high-entropy body, (3) formulaic conclusion.'
question: How should speculation be staged across a 10K-token 405B generation, and why does tree speculation help most in the body?
details:
  realistic_solution: 'Phase analysis: (1) Opening (tokens 1-500): template language, high predictability. Alpha=0.90, optimal K=12. (2) Body (500-8500): novel content, lower predictability. Alpha=0.72, optimal K=6. (3) Conclusion (8500-10000): formulaic summary, refs back to body. Alpha=0.85, optimal K=10. Per-phase optimization: Opening: K=12. E[tok]=(1-0.90^13)/0.10=7.46. Round=12x3+80=116ms. Rate=7.46/116=64.3 tok/s. Time for 500 tokens: 7.8s. Body: K=6. E[tok]=(1-0.72^7)/0.28=3.21. Round=6x3+80=98ms. Rate=32.8 tok/s. 8000 tokens: 243.9s. Conclusion: K=10. E[tok]=(1-0.85^11)/0.15=5.55. Round=10x3+80=110ms. Rate=50.5 tok/s. 1500 tokens: 29.7s. Total staged: 7.8+243.9+29.7 = 281.4s. Uniform K=5 takes ~270s, so simple staging is actually slightly slower! The key insight: most time is spent in the body phase where alpha is lowest. Real optimization: for body phase, use tree speculation (branching factor 3, depth 4) to explore multiple continuations. Tree with alpha=0.72: E=4.5 tokens at 12-token tree cost. Rate=4.5/(12x3+80)=38.8 tok/s. Body: 8000/38.8=206.2s. Total: 7.8+206.2+29.7=243.7s. 10% improvement over uniform.'
  common_mistake: 'Using a single speculation strategy for the entire 10K generation. The acceptance rate and optimal K vary dramatically across the generation: openings are predictable, body paragraphs are creative, and conclusions follow templates.'
  napkin_math: 'Uniform K=5 (alpha=0.78): E=(1-0.78^6)/0.22=3.52 tokens/step. Round=95ms. Rate=37 tok/s. 10K tokens = 270s. Staged linear: 281s (slightly worse due to high K penalty in body). Staged with tree for body: 244s (10% improvement). The body phase dominates at 87% of generation time. Optimizing the body''s alpha matters most.'
