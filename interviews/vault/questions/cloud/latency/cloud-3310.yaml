title: TPU v5e Latency Bottleneck Analysis for Large Language Models
scenario: You are tasked with optimizing the inference latency of a large language model (LLM) deployed on a Google TPU v5e. The model is experiencing inconsistent and unexpectedly high tail latencies during peak traffic.
question: How would you profile TPU v5e inference to determine whether peak-time tail latency is compute-bound, memory-bound, or I/O-bound?
details:
  realistic_solution: A realistic solution would involve using Cloud TPU tools like `ctpu profile` for host-side and device-side tracing. This includes capturing XLA computations, memory access patterns, and I/O operations. Analyze the resulting flame graphs and trace views to identify stalls, idle periods, and specific operations consuming excessive time. Look for patterns in memory bandwidth utilization, HBM access, and BF16 FLOPS. If the HBM bandwidth (1.6 TB/s) is not being saturated, it might indicate a compute bottleneck or inefficient memory access patterns. If compute utilization is low while memory bandwidth is high, it suggests a memory-bound workload. High I/O wait times could point to data loading bottlenecks. Using `tf.data` profiling and examining input pipeline performance is crucial for I/O bound cases.
  common_mistake: |
    **The Pitfall:** Jumping directly to code optimizations like kernel fusion without profiling.
    **The Rationale:** Engineers often default to standard optimization "tricks" when faced with high latency.
    **The Consequence:** They waste valuable engineering time applying misdirected optimizations that have zero impact on the actual hardware bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TPU v5e: 197 TFLOPS, 1.6 TB/s memory bandwidth.
    2. **Calculations:**
       - Theoretical Compute Minimum: Total FLOPs / (197 × 10^12 FLOPs/s).
       - Theoretical Memory Minimum: (X bytes from HBM) / (1.6 × 10^12 bytes/s).
    3. **Conclusion & Interpretation:**
       - **Result: Tool-Bound. By comparing observed trace latencies to theoretical minimums, you conclusively prove whether the TPU saturates MMUs or HBM links.**
