title: LLM Inference Bottleneck Analysis
scenario: You are profiling a 7B parameter LLM inference service on a single NVIDIA A100 (2.0 TB/s memory
  bandwidth, 312 TFLOPs BF16). For batch size 1 (generating one token at a time), the observed latency
  per token is 10ms. The ML team proposes pruning 50% of the model's linear layer weights to cut the compute
  FLOPs in half, expecting a massive latency drop. Analyze why this compute-focused optimization will
  fail to significantly improve single-batch latency using the Iron Law of ML Systems.
question: "Why will pruning 50% of linear-layer FLOPs fail to significantly reduce batch-1 token latency for the 7B LLM?"
details:
  realistic_solution: Decompose the latency into data movement, compute, and overhead. Identify that loading
    14GB of weights from HBM dominates the latency, while compute time is negligible. Explain that optimization
    must target memory bandwidth (e.g., quantization, speculative decoding) rather than just FLOPs.
  common_mistake: Assuming that reducing total mathematical operations (FLOPs) will proportionally reduce
    latency, failing to recognize that single-batch autoregressive generation is heavily memory bandwidth
    bound, not compute-bound.
  napkin_math: 7B model in FP16/BF16 = 14GB. At batch size 1, inference is strictly memory bandwidth bound.
    A100 HBM2e data movement time = 14GB / 2.0TB/s = 7.0ms. FLOPs required = 2 * 7B = 14 GFLOPs. A100
    compute time = 14 GFLOPs / 312 TFLOPS = 0.04ms. Compute is < 0.5% of total latency. Pruning 50% of
    FLOPs saves 0.02ms, entirely missing the 7.0ms memory bottleneck.
