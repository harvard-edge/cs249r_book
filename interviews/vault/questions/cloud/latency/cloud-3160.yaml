title: Speculative Decoding Acceptance Rate Fundamentals
scenario: A draft model proposes K=5 tokens speculatively, and the target 70B model verifies them in one forward pass.
question: If the acceptance rate is alpha=0.8 per token, what is the expected number of accepted tokens per speculation round, and what is the effective speedup over autoregressive decoding?
details:
  realistic_solution: 'Tokens are accepted sequentially: token 1 is accepted with probability alpha, token 2 with probability alpha^2, and so on. Expected accepted draft tokens E[accepted] = alpha + alpha^2 + ... + alpha^K = 0.8 + 0.64 + 0.512 + 0.4096 + 0.32768 = 2.68928. Speculative decoding also emits one target-sampled token per round, either the correction after rejection or the next token after all K are accepted, so expected served tokens per target verification pass are 2.68928 + 1 = 3.68928. Against a target-only autoregressive baseline of one target pass per served token, speedup is 3.69x if draft cost is ignored. If the draft costs 0.1 target-pass equivalents per drafted token and the target verifies all K tokens in one pass, cost per round is 1 + 5 x 0.1 = 1.5 target-pass equivalents, so effective speedup is 3.68928 / 1.5 = 2.46x.'
  common_mistake: |
    **The Pitfall:** Computing expected accepted tokens as K * alpha = 4.
    **The Rationale:** Candidates often assume acceptance probabilities are independent across tokens.
    **The Consequence:** Ignoring the fact that rejection at position i means all subsequent positions are rejected, leading to an overestimation of speculative speedup.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Acceptance rate alpha = 0.8 per token.
       - K = 5 tokens speculatively drafted.
       - Draft overhead: 5 * 10% = 50% extra cost.
    2. **Calculations:**
       - Expected accepted draft tokens = alpha + alpha^2 + alpha^3 + alpha^4 + alpha^5.
       - E[accepted] = 0.8 + 0.64 + 0.512 + 0.4096 + 0.32768 = 2.68928.
       - Expected served tokens per target verification = E[accepted] + 1 correction/next token = 3.68928.
       - Baseline: target-only autoregressive decoding serves 1 token per target pass.
       - With draft cost 0.1x per token, round cost = 1 target verify + 5 * 0.1 draft = 1.5 target-pass equivalents.
       - Net effective speedup = 3.68928 / 1.5 = 2.46x.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. Factoring in draft overhead, the effective speedup is 2.46x.
