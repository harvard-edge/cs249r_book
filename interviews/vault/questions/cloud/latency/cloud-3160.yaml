title: Speculative Decoding Acceptance Rate Fundamentals
scenario: A draft model proposes K=5 tokens speculatively, and the target 70B model verifies them in one forward pass.
question: If the acceptance rate is alpha=0.8 per token, what is the expected number of accepted tokens per speculation round, and what is the effective speedup over autoregressive decoding?
details:
  realistic_solution: 'Tokens are accepted sequentially: token 1 accepted with probability alpha, token 2 accepted with probability alpha (conditional on 1 accepted), etc. Expected accepted tokens E[n] = alpha + alpha^2 + ... + alpha^K + correction = (1 - alpha^(K+1))/(1-alpha) - 1 = (1-0.8^6)/(1-0.8) - 1 = (1-0.262)/0.2 - 1 = 3.69 - 1 = 2.69. Plus 1 token always generated (the first correct token after rejection or end of sequence): E[tokens] = 2.69 + 1 = 3.69 tokens per round. Autoregressive: 1 token per forward pass. Speedup depends on draft model cost. If draft is free: 3.69x. If draft costs 0.1x of target: effective speedup = 3.69 / (1 + 5 x 0.1) = 3.69/1.5 = 2.46x.'
  common_mistake: |
    **The Pitfall:** Computing expected accepted tokens as K * alpha = 4.
    **The Rationale:** Candidates often assume acceptance probabilities are independent across tokens.
    **The Consequence:** Ignoring the fact that rejection at position i means all subsequent positions are rejected, leading to an overestimation of speculative speedup.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Acceptance rate alpha = 0.8 per token.
       - K = 5 tokens speculatively drafted.
       - Draft overhead: 5 * 10% = 50% extra cost.
    2. **Calculations:**
       - Expected accepted tokens E[n] = (1 - alpha^(K+1))/(1-alpha) - 1 = (1 - 0.8^6) / 0.2 - 1 = 2.69.
       - Plus 1 token always generated: E[tokens] = 2.69 + 1 = 3.69 tokens per round.
       - Net effective speedup = 3.69 / 1.5 = 2.46x.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. Factoring in draft overhead, the effective speedup is 2.46x.
