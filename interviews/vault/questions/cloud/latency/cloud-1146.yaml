title: Calculating Dispatch Tax in Eager Mode
scenario: You are deploying a custom pointwise neural network on an NVIDIA A100 GPU using standard PyTorch in eager mode. The model has 5,000 operations per forward pass. Actual GPU kernel execution averages 2µs per op, but PyTorch Python-to-C++ dispatch overhead is 10µs per op.
question: What is the actual forward-pass latency and effective GPU utilization once PyTorch dispatch overhead is included?
details:
  realistic_solution: Recognize that because dispatch time (10µs) > kernel execution time (2µs), the CPU cannot feed the GPU fast enough. The execution is bounded by the dispatch rate. You must calculate the total time using the dispatch overhead, resulting in 50ms latency and 20% GPU utilization. The engineering solution is to use kernel fusion (e.g., torch.compile) to group operations and pay the dispatch tax once.
  common_mistake: |
    **The Pitfall:** Calculating latency based purely on GPU kernel execution time.
    **The Rationale:** Engineers assume the GPU runs asynchronously at maximum speed, ignoring the CPU-side framework dispatch overhead that starves the GPU.
    **The Consequence:** Production deployments severely miss latency SLAs because the workload is entirely CPU-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5,000 operations per forward pass.
       - GPU kernel execution = 2µs/op.
       - Dispatch overhead = 10µs/op.
    2. **Calculations:**
       - Per-op Bottleneck = max(dispatch_overhead, gpu_kernel_time) = max(10µs, 2µs) = 10µs.
       - Total Latency = 5,000 ops * 10µs/op = 50,000µs = 50ms.
       - GPU Compute Time = 5,000 ops * 2µs/op = 10ms.
       - GPU Utilization = 10ms / 50ms = 20%.
    3. **Conclusion & Interpretation:**
       - The latency is bound by CPU framework dispatch, starving the GPU.
       - **Result: CPU-Bound (Dispatch Overhead)**
