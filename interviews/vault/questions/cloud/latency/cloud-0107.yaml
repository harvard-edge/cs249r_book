title: The Continuous Batching Hiccup
scenario: Your team runs a multi-tenant LLM inference service using continuous batching. You notice that P99 end-to-end latency is spiking, even at moderate load. The profiler shows that some requests with very short prompts and short generation lengths are getting stuck behind requests that generate very long sequences.
question: "What is the most likely design flaw in your continuous batching scheduler causing these latency spikes?"
details:
  realistic_solution: The scheduler is likely using a simple First-In, First-Out (FIFO) policy to add new requests to the running batch. When a long-running request is active in a batch, it occupies a slot for a long time. Short requests that arrive get added but cannot complete and be evicted until the long request is finished, causing head-of-line blocking. A better scheduler allows finished sequences to be evicted and replaced continuously.
  common_mistake: |
    **The Pitfall:** Blaming the hardware (e.g., KV cache size) or the model architecture.
    **The Rationale:** It's easier to blame physical limits than to identify subtle head-of-line blocking in the batching mechanism itself.
    **The Consequence:** Over-provisioning hardware without solving the underlying scheduling bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Max batch size: 8 requests.
       * Long queries: 4,000 tokens.
       * Time Per Output Token (TPOT): 15ms.
    2. **Calculations:**
       * Full batch of long queries duration: 4,000 * 15ms = 60,000 ms = 60 seconds.
    3. **Conclusion & Interpretation:** **Result: 60s Latency Spike (Queue-Bound)**. A simple FIFO queue blocks new short requests for up to 60 seconds, causing massive P99 spikes.
