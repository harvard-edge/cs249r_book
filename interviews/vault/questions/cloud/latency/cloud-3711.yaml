title: Prefill Batch Sizing for TTFT Optimization on A100
scenario: An A100 80GB serves a chatbot with SLA of 300ms TTFT (time to first token). Prefill of a 1024-token prompt takes 50ms at batch_size=1. The team wants to batch prefill operations to improve GPU utilization.
question: At what batch size does TTFT SLA become violated?
details:
  realistic_solution: 'With only the batch=1 prefill time and a 300ms TTFT SLA, there is no unique batch-size threshold for SLA violation. TTFT is queue wait plus batched prefill service time, and the queue wait depends on arrival rate, batching timeout, and scheduler policy. You can estimate the GPU saturation batch: if one 1024-token prefill costs about 1.37 TFLOPs and the A100 delivers about 150 TFLOPS effective, a 50ms compute window holds about 7.5 TFLOPs, or roughly 5-6 sequences. That is a saturation estimate, not the SLA-violation threshold. To answer the SLA question, specify traffic arrival rate and max batching delay, then compute p99 queue wait + prefill time.'
  common_mistake: |
    **The Pitfall:** Treating prefill as linearly scaling with batch size.
    **The Rationale:** Engineers assume prefill behaves like memory-bound decode, expecting linear scaling.
    **The Consequence:** They miscalculate the saturation point, failing to realize prefill is compute-bound and scales efficiently up to the compute limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prefill at batch=1 takes 50ms for a 1024-token prompt.
    - TTFT SLA is 300ms p99.
    - Arrival rate and batching timeout are not specified.
    - Rough saturation estimate: ~1.37T FLOPs per sequence and ~150 TFLOPS effective A100 throughput.

    **Calculations:**
    - TTFT = queue_wait_p99 + batched_prefill_service_time_p99.
    - From the prompt alone, batch=1 service time is 50ms, leaving 300ms - 50ms = 250ms for p99 queueing and batching delay.
    - Compute budget in 50ms: 150 TFLOPS × 0.05s = 7.5T FLOPs.
    - Saturation batch estimate: 7.5T FLOPs / 1.37T FLOPs per sequence = 5.47 sequences.
    - This says the GPU likely becomes compute-saturated around batch 5-6, but it does not determine when p99 TTFT exceeds 300ms.

    **Conclusion & Interpretation:**
    - **Result: no unique SLA-violation batch from the given data (Queueing-Bound)**. Batch 5-6 is only a saturation estimate; the SLA threshold requires arrival-rate and scheduler assumptions.
