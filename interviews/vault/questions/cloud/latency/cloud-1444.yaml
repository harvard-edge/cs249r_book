title: Calculating Single-Token Latency on A100
scenario: 'You are deploying a 7 billion parameter LLM for single-token generation on a single GPU. Both weights and activations use BF16 precision. Assume the system has a fixed kernel launch and framework overhead of 1.5 ms per forward pass.'
question: 'What is the expected single-token latency, and what is the primary Iron Law bottleneck?'
details:
  realistic_solution: 'Deploy the Iron Law of ML Systems to decompose latency. At batch size 1, autoregressive generation requires streaming the entire weight matrix through the GPU registers for every single token generated. The immense FLOP capability of the Tensor Cores is largely irrelevant; the execution time is strictly dominated by the HBM memory bandwidth. To optimize, focus on weight-only quantization (e.g., AWQ/GPTQ) to reduce the data volume fetched per step.'
  common_mistake: |
    **The Pitfall:** Calculating only the compute time and ignoring memory fetch.
    **The Rationale:** Candidates focus entirely on the TFLOPS capabilities of the GPU, forgetting that at batch size 1, every parameter must be streamed from HBM to the SM registers.
    **The Consequence:** They massively underestimate latency, incorrectly concluding the workload is compute-bound when it is entirely limited by memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B params, 2 bytes/param (BF16) = 14 GB.
    - GPU Memory Bandwidth: ~2039 GB/s.
    - GPU Peak Compute: 312 TFLOPS.
    - Fixed overhead: 1.5 ms.

    **Calculations:**
    - Memory load time: 14 GB / 2039 GB/s ≈ 6.86 ms.
    - Compute time: (2 ops/param * 7B) = 14 GFLOPs. 14 / 312,000 = 0.04 ms.
    - Total Latency = 6.86 ms (memory) + 0.04 ms (compute) + 1.5 ms (overhead) = 8.4 ms.

    **Conclusion & Interpretation:**
    - **Result: 8.4 ms (Memory-Bandwidth-Bound)**. The generation latency is ~8.4ms, overwhelmingly dictated by HBM fetch time.
