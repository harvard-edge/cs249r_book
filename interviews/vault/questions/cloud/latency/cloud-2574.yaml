title: Cloud Token Budget L3 0
scenario: 'Your 7B LLM (32 layers, 4096 hidden dim, 32 KV heads) serves on an H100. Model weights take 14 GB FP16.'
question: 'How many concurrent requests can the H100 serve at 4K, 16K, and 64K token budgets?'
details:
  realistic_solution: 'Available memory for KV cache enables limited concurrency. Each 4x in context costs ~4x in concurrency.'
  common_mistake: |
    **The Pitfall:** Using the total hidden dimension (4096) instead of the per-head dimension for KV cache calculations.
    **The Rationale:** Candidates confuse the overall model dimension with the specific size of the keys and values stored per head, leading to massive overestimations if GQA or MQA is used.
    **The Consequence:** The engineer drastically under-provisions the required hardware for long-context serving.
  napkin_math: |
    **Assumptions & Constraints:**
    - Free Memory: 80 GB - 14 GB = 66 GB.
    - Architecture: 32 layers, 4096 hidden, 32 KV heads.

    **Calculations:**
    - Head Dimension = 4096 / 32 = 128.
    - KV Cache per Token = 2 (K+V) * 32 layers * 32 kv_heads * 128 head_dim * 2 bytes = 524,288 bytes (~0.5 MB).
    - 4K Context = 0.5 MB * 4,096 = 2.15 GB/request -> Concurrency = 66/2.15 = 30 reqs.
    - 16K Context = 0.5 MB * 16,384 = 8.59 GB/request -> Concurrency = 66/8.59 = 7 reqs.
    - 64K Context = 0.5 MB * 65,536 = 34.36 GB/request -> Concurrency = 66/34.36 = 1 req.

    **Conclusion & Interpretation:**
    - **Result: 30, 7, 1 Reqs (Memory-Capacity-Bound)**. Each 4x increase in context length geometrically destroys concurrency due to fixed KV-cache growth.
