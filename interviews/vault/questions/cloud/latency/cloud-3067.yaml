title: 'Queueing Theory Analyze: Why Tail Latency Explodes at High Utilization'
scenario: An inference cluster serving LLaMA-70B shows P50 latency of 800ms but P99 latency of 12 seconds. Utilization is measured at 89%.
question: At 89% inference utilization, how does M/M/1 queueing explain P99 latency far above P50, and what happens at 95% utilization?
details:
  realistic_solution: For an M/M/1 queue, response time has an exponential tail with rate μ-λ = μ(1-ρ). If the mean service time is 800ms, μ = 1/0.8 = 1.25 requests/s. At ρ=0.89, mean response time is 1/(μ-λ) = 0.8/(1-0.89) = 7.27s, and P99 response time is -ln(0.01)/(μ-λ) = 4.605 × 7.27s = 33.5s. That is higher than the observed 12s, but it correctly explains why tail latency can be far above P50 near saturation. At ρ=0.95, mean response time rises to 16s and P99 rises to about 73.7s.
  common_mistake: |
    **The Pitfall:** Thinking that latency degrades linearly with utilization.
    **The Rationale:** Candidates lack queueing theory intuition and assume that 90% utilization means things are merely 10% slower, completely missing the hyperbolic ρ / (1-ρ) relationship.
    **The Consequence:** Designing systems that operate "efficiently" at high utilization but fundamentally violate all P99 latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - M/M/1 queue model.
    - P50 ≈ 800ms (mean service time).

    **Calculations:**
    - Mean response time: W = 1 / (μ - λ) = service_time / (1 - ρ).
    - At ρ=0.89: W = 0.8s / 0.11 = 7.27s.
    - M/M/1 response-time P99: W_99 = -ln(0.01) / (μ - λ) = 4.605 * W.
    - At ρ=0.89: P99 = 4.605 * 7.27s = 33.5s.
    - At ρ=0.95: W = 0.8s / 0.05 = 16.0s; P99 = 4.605 * 16.0s = 73.7s.

    **Conclusion & Interpretation:**
    - **Result: 33.5s theoretical P99 at 89%, rising to 73.7s at 95% (Latency-Bound)**. The hyperbolic blowup at high utilization causes extreme tail latency.
