title: Diagnosing Peak Load Bottlenecks in Recommendation Serving
scenario: An e-commerce platform uses a 10B parameter Transformer model to generate personalized 'Daily Top Picks' for its 50 million daily active users. Currently, the system dynamically generates these recommendations the moment a user logs in. During the peak morning hour (10,000 logins/second), the cluster of 50 GPUs becomes severely saturated, causing P99 serving latency to spike above 2.5 seconds and triggering cascading request timeouts.
question: Why are peak login requests saturating the GPUs, and how would static inference eliminate the latency spikes?
details:
  realistic_solution: Decouple model compute from the critical serving path by migrating to static inference. Schedule a nightly offline batch job to pre-compute recommendations for all 50M users using maximum throughput batch sizes, and push the materialized results to a distributed key-value store (like Redis) for O(1) retrieval at login time.
  common_mistake: |
    **The Pitfall:** Focusing on complex dynamic optimization techniques like aggressive dynamic batching, deep INT8 quantization, or speculative decoding.
    **The Rationale:** Candidates see a latency problem and immediately jump to model-level optimizations, failing to realize that 'Daily Top Picks' do not require real-time session context and are highly predictable.
    **The Consequence:** Engineering effort is wasted on complex optimizations while the fundamental architectural flaw remains, keeping the system vulnerable to bursty traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak login load: 10,000 req/s.
    - Dynamic serving throughput: 32 requests per 50ms batch per GPU.
    - Offline throughput: 256 users per 100ms batch per GPU across all 50 GPUs.

    **Calculations:**
    - Dynamic capacity per GPU = 32 / 0.05s = 640 req/s.
    - The 50-GPU cluster has theoretical capacity of 50 * 640 = 32,000 req/s, but login-time generation spends that capacity on synchronous, latency-sensitive bursts; queueing and stragglers drive P99 above 2.5s.
    - Static offline job batches = 50M / 256 = 195,313 GPU-batches.
    - Across 50 GPUs, wall time = (195,313 * 0.1s) / 50 = 391s, or about 6.5 minutes at the stated batch throughput.
    - Login-time serving then becomes a key-value lookup instead of a transformer forward pass.

    **Conclusion & Interpretation:**
    - **Result: Latency-Critical Path Bound.** Static inference moves predictable recommendation compute out of the peak login path; GPUs can precompute all 50M users offline, and login latency drops to cache/network RTT rather than model-serving queue time.
