title: GPU DALI Preprocessing Latency
scenario: You serve a vision model on a GPU. The CPU decodes a 500KB JPEG into a 1080p FP32 tensor and transfers it over PCIe Gen3 x16 (16 GB/s) to the GPU. CPU decoding takes 20ms; GPU inference takes 8ms. You propose moving JPEG decoding to the GPU using DALI (takes 4ms).
question: If JPEG decoding moves to the GPU with DALI, what are the new per-image latency and PCIe transfer volume savings?
details:
  realistic_solution: 'Transfer the 500KB compressed JPEG directly to the GPU instead of the uncompressed tensor. This eliminates the CPU decoding bottleneck and drastically shrinks the PCIe payload.'
  common_mistake: |
    **The Pitfall:** Ignoring the massive difference in PCIe payload size.
    **The Rationale:** Engineers focus strictly on CPU vs GPU compute times, forgetting that moving uncompressed images saturates the PCIe bus.
    **The Consequence:** Suboptimal throughput and missed end-to-end latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - JPEG size = 0.5 MB. FP32 size = 1920 * 1080 * 3 * 4 = 24.88 MB.
    - PCIe = 16 GB/s.

    **Calculations:**
    - Volume saved = 24.88 - 0.5 = 24.38 MB.
    - Old Latency = 20ms + (24.88MB / 16GB/s = 1.55ms) + 8ms = 29.55ms.
    - New Latency = (0.5MB / 16GB/s = 0.03ms) + 4ms + 8ms = 12.03ms.

    **Conclusion & Interpretation:**
    - **Result: PCIe/Compute-Bound (DALI cuts latency by 60% and slashes bus traffic).**
