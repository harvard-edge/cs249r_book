title: 'Queueing Theory Design: Multi-Server M/M/c for Inference Cluster'
scenario: A multi-server inference system uses M/M/c queuing (c servers in parallel) for serving Mistral-7B on H100s. The arrival rate is 100 req/s, and mean service time per server is 50ms.
question: Determine the minimum c to achieve P99 < 200ms, and compare to the throughput and latency of a naive single-server design?
details:
  realistic_solution: |
    Model each H100 as μ = 20 req/s and use Erlang C for the probability that an arrival waits. The minimum stable pool is c > λ/μ = 5 servers. At c = 6, the unconditional P99 response estimate is about 254ms, so it misses the 200ms target. At c = 7, P(wait) ≈ 0.324 and the P99 queueing delay is ln(0.324/0.01)/(7*20-100) ≈ 87ms; adding 50ms mean service gives about 137ms P99, so 7 servers is the minimum. A single-server design is unstable because λ = 100 req/s exceeds μ = 20 req/s, so it cannot provide finite latency or the required throughput.
  common_mistake: |
    **The Pitfall:** Not recognizing that M/M/c fundamentally changes the utilization-latency curve.
    **The Rationale:** Candidates often analyze capacity linearly, assuming 10 servers at 80% load behave identically to 1 server at 80% load.
    **The Consequence:** The design dramatically over-provisions hardware or fails to meet tail latency SLAs because it does not account for statistical multiplexing efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate λ = 100/s.
    - Service time = 50ms. Service rate μ = 20/s per server.
    - Target: P99 < 200ms.

    **Calculations:**
    - Total load a = λ / μ = 100 / 20 = 5 Erlangs. Minimum servers c > 5 for stability.
    - Check c = 6: utilization ρ = 5/6 = 83.3%. Erlang C P(wait) ≈ 0.588.
    - M/M/c queue tail approximation: P(Wq > t) = P(wait) * exp(-(cμ-λ)t).
    - c = 6 P99 queue wait = ln(0.588/0.01)/(120-100) = 204ms; plus 50ms service ≈ 254ms, so c = 6 fails.
    - Check c = 7: utilization ρ = 5/7 = 71.4%. Erlang C P(wait) ≈ 0.324.
    - c = 7 P99 queue wait = ln(0.324/0.01)/(140-100) = 87ms; plus 50ms service ≈ 137ms, so c = 7 passes.
    - Naive single server: μ = 20 req/s < λ = 100 req/s, so M/M/1 is unstable and has unbounded queue growth.

    **Conclusion & Interpretation:**
    - **Result: 7 servers minimum (Queue-Delay-Bound)**. Multi-server routing meets P99 < 200ms; a single-server design is unstable and cannot meet throughput or latency.
