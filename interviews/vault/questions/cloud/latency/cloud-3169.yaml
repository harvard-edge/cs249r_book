title: Speculative Decoding KV Cache Management
scenario: During speculative decoding with K=5 draft tokens, the target model verifies by running a forward pass on all 5 tokens. Draft tokens 1, 2, and 3 are accepted, but token 4 is rejected.
question: If draft tokens 1-3 are accepted and token 4 is rejected, which target KV cache entries are kept, discarded, and how is the correction KV stored?
details:
  realistic_solution: 'Before verification: target KV cache has entries for tokens 1..t (previous context). Verification forward pass processes draft tokens d1..d5 in one pass, generating KV entries for positions t+1..t+5 in the target model. Result: d1, d2, d3 accepted, d4 rejected. KV cache actions: (1) Keep target KV entries for positions t+1, t+2, t+3 (corresponding to accepted d1, d2, d3). (2) Discard target KV entries for positions t+4, t+5 (rejected tokens). (3) The correction token c4 (sampled from adjusted distribution at position t+4) was already computed during verification — its KV entry is at position t+4 in the verification output. Keep it. (4) Final KV cache: t+1..t+4 valid, with t+4 being the corrected token. With PagedAttention, this means freeing blocks for positions t+5 if they were allocated. Total KV mutation: truncate at t+4, which is O(1) pointer update in PagedAttention''s block table.'
  common_mistake: |
    **The Pitfall:** Keeping the draft model's KV cache entries for the accepted tokens.
    **The Rationale:** Candidates intuitively think the draft tokens' states are reused to save compute.
    **The Consequence:** The target model's generation breaks because the internal hidden representations (KV states) of the draft and target models are fundamentally different.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - K=5 draft tokens.
    2. **Calculations:**
       - Tokens d1, d2, d3 are accepted: Keep target KV entries t+1, t+2, t+3.
       - Token d4 is rejected: A correction token c4 is sampled. Its KV entry was already computed at position t+4 during verification. Keep t+4.
       - Discard KV entries from position t+5 onwards.
    3. **Conclusion & Interpretation:**
       - **Total valid KV cache grows by 4 positions (t+1 to t+4). With PagedAttention, this is an O(1) pointer update and freeing of t+5 blocks (~0 µs cost).**
       - **Result: Memory-Bound**
