title: Speculative Decoding KV Cache Management
scenario: During speculative decoding with K=5 draft tokens, the target model verifies by running a forward pass on all 5 tokens. Draft tokens 1, 2, and 3 are accepted, but token 4 is rejected.
question: If draft tokens 1-3 are accepted and token 4 is rejected, which target KV cache entries are kept, discarded, and how is the correction KV stored?
details:
  realistic_solution: Before verification, the target KV cache has entries for tokens 1..t. The target verification pass over draft tokens d1..d5 produces target KV entries for the draft positions t+1..t+5. Since d1, d2, and d3 are accepted, keep the target KV entries at t+1, t+2, and t+3. Since d4 is rejected, discard the draft-token KV entries at t+4 and t+5. Sample the correction token c4 from the adjusted residual distribution at position t+4, then run/store the target KV for c4 at position t+4. The final valid target KV cache extends through t+4, where t+4 contains the correction token, not the rejected draft token. With PagedAttention, the block table is truncated after t+3, the correction KV is appended at t+4, and later draft blocks are freed.
  common_mistake: |
    **The Pitfall:** Keeping the draft model's KV cache entries for the accepted tokens.
    **The Rationale:** Candidates intuitively think the draft tokens' states are reused to save compute.
    **The Consequence:** The target model's generation breaks because the internal hidden representations (KV states) of the draft and target models are fundamentally different.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - K=5 draft tokens.
    2. **Calculations:**
       - Tokens d1, d2, d3 are accepted: Keep target KV entries t+1, t+2, t+3.
       - Token d4 is rejected: discard the draft-token target KV at t+4 and any later speculative KV entries.
       - Sample correction token c4 for position t+4 from the adjusted distribution.
       - Store the target KV for c4 at position t+4, replacing the rejected draft token's KV.
       - Discard KV entries from position t+5 onwards.
    3. **Conclusion & Interpretation:**
       - **Total valid KV cache grows by 4 positions (t+1 to t+4), but t+4 must be the correction token's target KV, not the rejected draft token's KV.**
