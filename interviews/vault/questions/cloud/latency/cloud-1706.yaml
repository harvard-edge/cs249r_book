title: Evaluating SHAP vs LIME for Real-Time Fraud
scenario: A payment gateway processes 5,000 transactions per second (TPS) using a 50M parameter XGBoost ensemble. Compliance requires every declined transaction to include an explanation (feature importance). You are evaluating whether to integrate KernelSHAP, TreeSHAP, or LIME. Currently, 2% of transactions are declined. The gateway has a strict P99 latency budget of 150ms for the entire pipeline, with 50ms allocated to inference and explainability combined.
question: Which explainer—KernelSHAP, TreeSHAP, or LIME—should you use to meet the 50ms inference-plus-explainability budget?
details:
  realistic_solution: Implementing TreeSHAP, which calculates exact SHAP values for tree-based models in polynomial time (O(TLD^2)) directly from the tree structure, bypassing repeated inferences.
  common_mistake: |
    **The Pitfall:** Choosing model-agnostic KernelSHAP or LIME for real-time tree models.
    **The Rationale:** Candidates default to familiar model-agnostic explainers without analyzing their inference-time complexity.
    **The Consequence:** Thousands of background dataset evaluations per explanation cause severe latency spikes, completely blowing the 50ms SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50ms budget for inference + explainability.
       - Baseline inference latency: 1ms.
    2. **Calculations:**
       - KernelSHAP latency: Requires generating ~1000 perturbed samples. 1000 inferences × 1ms = 1000ms latency (violates 50ms SLA).
       - TreeSHAP latency: Leverages XGBoost's internal tree structure for exact feature importance in O(TLD^2), running in ~5ms.
       - Total TreeSHAP latency: 1ms inference + 5ms TreeSHAP = 6ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. TreeSHAP avoids massive recursive inference overhead, completing safely within 6ms and easily satisfying the 50ms SLA.**
