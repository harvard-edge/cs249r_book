title: Little's Law Under Variable Service Times
scenario: 'Your inference server processes a mix of requests: 70% are short (20ms) and 30% are long (200ms). The arrival rate is 10 req/s.'
question: What average concurrency does Little's Law predict, and why does service-time variance make P99 queue depth much worse?
details:
  realistic_solution: 'Mean service time E[S] = 0.7 × 20ms + 0.3 × 200ms = 74ms. Little''s Law gives average work in the single-server system: L = λ × E[T] ≈ 10 req/s × 0.074s = 0.74 requests in service before queueing is considered. With one request served at a time, utilization is ρ = λE[S] = 0.74. Service-time variance is high: CV² = 6804/74² ≈ 1.24. Pollaczek-Khinchine for M/G/1 gives mean queue wait Wq = ρE[S](1+CV²)/(2(1-ρ)) = 0.74 × 74ms × 2.24 / 0.52 ≈ 236ms. Little''s Law applied to the queue gives average queue depth Lq = λWq = 10 × 0.236 ≈ 2.36 queued requests, so total average concurrency is about 3.10. The exact P99 queue depth needs the full service-time distribution or simulation; the key point is that long 200ms jobs create bursts where short jobs stack behind them, so tail queue depth grows far beyond what the 74ms mean alone suggests.'
  common_mistake: |
    **The Pitfall:** Using only the mean service time in Little's Law and assuming the system behaves as if all requests were average.
    **The Rationale:** Averages hide the impact of mixed workloads, leading to overly optimistic capacity planning.
    **The Consequence:** High variance in service time causes queueing delays that are much worse than the mean predicts, leading to severe P99 latency violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: 70% @ 20ms, 30% @ 200ms.
       - Arrival rate (λ) = 10 req/s.
    2. **Calculations:**
       - Mean service time E[S]: (0.7 * 20ms) + (0.3 * 200ms) = 14ms + 60ms = 74ms (0.074s).
       - Single-server utilization: ρ = λ * E[S] = 10 * 0.074 = 0.74.
       - Little's Law for work in service: L_service = λ * E[S] = 0.74 requests.
       - Variance: 0.7 * (20-74)^2 + 0.3 * (200-74)^2 = 2041.2 + 4762.8 = 6804.
       - Coefficient of Variation (CV^2): 6804 / 74^2 ≈ 1.24.
       - Mean queue wait (M/G/1): Wq = ρ * E[S] * (1 + CV^2) / (2 * (1 - ρ)) = 0.74 * 74ms * 2.24 / 0.52 ≈ 236ms.
       - Mean queue depth: Lq = λ * Wq = 10 * 0.236s = 2.36 queued requests.
       - Mean total concurrency with queueing: L = λ * (E[S] + Wq) = 10 * 0.310s = 3.10 requests.
    3. **Conclusion & Interpretation:**
       - **Result: High Variance Penalty.** Little's Law gives 0.74 requests in service from mean service time alone, but M/G/1 queueing predicts about 2.36 queued requests on average. P99 queue depth cannot be inferred by multiplying the mean wait; it requires the tail distribution or simulation.
