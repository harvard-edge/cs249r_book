title: Little's Law Under Variable Service Times
scenario: 'Your inference server processes a mix of requests: 70% are short (20ms) and 30% are long (200ms). The arrival rate is 10 req/s.'
question: What average concurrency does Little's Law predict, and why does service-time variance make P99 queue depth much worse?
details:
  realistic_solution: 'Mean service time W = 0.7 × 20ms + 0.3 × 200ms = 74ms. Little''s Law: L = λ × W = 10 × 0.074 = 0.74 concurrent requests on average. But the Pollaczek-Khinchine formula shows that variance matters enormously. Variance = 0.7 × (20-74)² + 0.3 × (200-74)² = 0.7 × 2916 + 0.3 × 15876 = 2041 + 4763 = 6804. CV² = 6804/74² = 1.24. For M/G/1 queue, mean waiting time = (ρ × W × (1 + CV²)) / (2 × (1-ρ)). With utilization ρ = 0.74: mean wait = (0.74 × 74 × 2.24) / (2 × 0.26) = 236ms. P99 wait ≈ 3× mean wait ≈ 708ms. The high variance makes P99 queueing 10× the mean service time.'
  common_mistake: |
    **The Pitfall:** Using only the mean service time in Little's Law and assuming the system behaves as if all requests were average.
    **The Rationale:** Averages hide the impact of mixed workloads, leading to overly optimistic capacity planning.
    **The Consequence:** High variance in service time causes queueing delays that are much worse than the mean predicts, leading to severe P99 latency violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: 70% @ 20ms, 30% @ 200ms.
       - Arrival rate (λ) = 10 req/s.
    2. **Calculations:**
       - Mean Service Time (W): (0.7 * 20ms) + (0.3 * 200ms) = 14ms + 60ms = 74ms (0.074s).
       - Little's Law (L): λ * W = 10 * 0.074 = 0.74 concurrent requests.
       - Variance: 0.7 * (20-74)^2 + 0.3 * (200-74)^2 = 2041.2 + 4762.8 = 6804.
       - Coefficient of Variation (CV^2): 6804 / 74^2 ≈ 1.24.
       - Utilization (ρ): λ * W = 10 * 0.074 = 0.74.
       - Mean Wait (M/G/1): (ρ * W * (1 + CV^2)) / (2 * (1 - ρ)) = (0.74 * 74 * 2.24) / (2 * 0.26) ≈ 236ms.
       - P99 Wait: ≈ 3 * mean wait = 708ms.
    3. **Conclusion & Interpretation:**
       - **Result: High Variance Penalty.** The mixed workload variance dramatically inflates queue wait times well beyond the mean service time.
