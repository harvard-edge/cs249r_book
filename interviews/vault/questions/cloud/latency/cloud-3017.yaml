title: 'Latency Decomposition: Diagnose and Fix Decode Latency Regression on H100'
scenario: After deploying a new model checkpoint (13B to 20B parameters, same architecture) on an H100, decode latency increases from 7.8ms/token to 12ms/token (a 54% increase, proportional to model size). However, a team member notices GPU memory utilization jumped from 58% to 89%.
question: Why did memory utilization jump to 89% after moving from 13B to 20B, and how would you quantify the fix?
details:
  realistic_solution: 'The checkpoint change adds 14GB of FP16 weights, moving the model footprint from about 26GB to 40GB. The observed utilization jump is 31% of 80GB, or 24.8GB, so about 10.8GB of the jump is not explained by weights alone. A batch-4 KV estimate is 13.4GB, but 89% total utilization implies a larger resident KV pool: 71.2GB total - 40GB weights - about 4GB overhead = 27.2GB, or roughly 8 long-context sequences. Quantify the fix against that inferred resident KV pool: INT8 KV halves it to 13.6GB, saving 13.6GB and dropping utilization from about 89% to about 72%; reducing max sequence length from 4096 to 2048 saves the same order of HBM.'
  common_mistake: |
    **The Pitfall:** Assuming the latency increase is purely proportional to weight size.
    **The Rationale:** Engineers miss that higher memory pressure reduces the effective KV-cache capacity, causing cache evictions and re-prefills for long sequences.
    **The Consequence:** The system experiences severe latency spikes due to re-prefills, not just the proportional decode slowdown.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline 13B Model Size: 26GB in FP16.
    - 20B Model Size: 40GB in FP16.
    - KV Cache Size: 4096 tokens, 40 layers, hidden size 5120, FP16 K/V.
    - Runtime/allocator/activation overhead: ~4GB.

    **Calculations:**
    - Observed utilization delta: (89% - 58%) * 80GB = 24.8GB additional resident memory.
    - Weight delta from 13B to 20B: 40GB - 26GB = 14GB.
    - Unexplained delta after weights: 24.8GB - 14GB = 10.8GB, pointing to additional KV/runtime residency beyond the larger checkpoint.
    - FP16 KV Cache per 4096-token request: 4096 tokens * 2 (K,V) * 5120 hidden * 2 bytes * 40 layers = 3.36GB.
    - Batch 4 KV: 4 * 3.36GB = 13.4GB.
    - Batch 4 total: 40GB weights + 13.4GB KV = 53.4GB, or 67% of 80GB before overhead; this does not explain 89%.
    - To reach 89%, total resident memory is 0.89 * 80GB = 71.2GB.
    - With 40GB weights and ~4GB overhead, implied KV pool = 27.2GB, or about 8 long-context requests.
    - INT8 KV halves the implied KV pool to 13.6GB, saving 13.6GB.
    - New total after INT8 KV: 40GB + 13.6GB + 4GB = 57.6GB, or 72% of 80GB.

    **Conclusion & Interpretation:**
    - **Result: Observed 89% requires more than a batch-4 KV calculation**. Use the actual resident KV pool for the fix estimate; INT8 KV or halving max context restores about 13-14GB of headroom in the implied 8-sequence case.
