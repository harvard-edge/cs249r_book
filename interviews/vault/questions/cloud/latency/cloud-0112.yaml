title: The Prefill-Decode Collision
scenario: 'Your team has successfully implemented continuous batching for your LLM inference service on H100s. Average latency has dropped dramatically. However, you notice a troubling pattern in your P99 TTFT metrics: sometimes, a very short user prompt (e.g., ''Hello'') gets a TTFT of over 800ms. The system is not overloaded, and this happens when the short prompt arrives just after a request with a very long prompt (e.g., a 32k token document) begins processing.'
question: Why would a short prompt be forced to wait so long in a continuous batching system?
details:
  realistic_solution: 'The problem is the non-preemptive nature of the prompt processing (prefill) stage. When the 32k token document begins processing, the GPU is occupied with a single, large compute kernel to calculate its initial KV cache. This operation is compute-intensive and cannot be interrupted. The short prompt, despite being in a ''continuous'' system, must wait in a queue for this long-running prefill to complete before its own (very fast) prefill can start. The subsequent decode steps are short and iterative, allowing for easy interleaving of different requests, but the initial prefill of a very long context is a major source of P99 latency.'
  common_mistake: |
    **The Pitfall:** Thinking that 'continuous batching' magically allows all operations to be perfectly interleaved.
    **The Rationale:** Engineers underestimate the duration and monolithic nature of the initial prefill stage for very long sequences.
    **The Consequence:** Introducing a transient but significant head-of-line blocking effect that ruins P99 latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model (26GB FP16), H100 (989 TFLOPS), 32k token prefill blocks incoming 10 token prompt

    **Calculations:**
    - 13B model prefill FLOPs = 2 * 13B * 32,000 = 832 TFLOPs
    - H100 execution time = 832 TFLOPs / 989 TFLOPS = 0.84 seconds (840ms)

    **Conclusion & Interpretation:**
    - **Result: 840ms (Compute-Bound)**. Head-of-Line. The monolithic prefill operation blocks the GPU for 840ms, violating SLAs; chunked prefill is required.
  options:
  - The KV cache ran out of memory, forcing an eviction/recomputation cycle.
  - The continuous batching scheduler's overhead becomes too high with long sequences.
  - The long-context prefill is a monolithic, non-preemptive operation that blocks new requests.
  - The inter-token latency (TPOT) for the long-context request slowed down the whole system.
  correct_index: 2
