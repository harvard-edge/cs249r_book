title: The Unstable Chatbot Queue
scenario: You are the ML systems engineer for a new AI chatbot service. Users are complaining that the bot feels sluggish, and your metrics confirm that the average Time-To-First-Token (TTFT) is over 800ms, violating your 500ms P99 SLO. Your service receives approximately 10 requests per second (RPS). The team is using a static batching strategy with a fixed timeout of 400ms and a maximum batch size of 4 to group requests. Your model's prefill stage for a full batch takes about 450ms.
question: What is the most likely root cause of excessive TTFT with 10 RPS, a 400ms static batching timeout, batch size 4, and 450ms prefill?
details:
  realistic_solution: The system is in an unstable queueing state. The service rate is lower than the arrival rate, causing the request queue to grow indefinitely, which results in unbounded wait times. This is a classic queueing theory failure. The GPU can process a maximum of 4 requests every 450ms, meaning its maximum throughput cannot keep up with 10 RPS. The static batching engine forces the system into this inefficient utilization. The solution is to abandon static batching in favor of a continuous batching system (e.g., vLLM's PagedAttention) which decouples batch formation from a fixed structure, allowing the system to process requests dynamically and iterate at the token level, stabilizing the queue if capacity permits.
  common_mistake: |
    **The Pitfall:** Fixating on a single component, like GPU speed or model size, without analyzing system dynamics.
    **The Rationale:** It's common to assume "the model is too slow" when latency is high.
    **The Consequence:** Teams waste effort optimizing the model or upgrading hardware when the actual failure mode is an unstable queue caused by a service rate that is lower than the arrival rate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate (λ) = 10 requests/sec.
       - Max Batch Size = 4 requests.
       - Batch Service Time = 450ms (0.45s).
    2. **Calculations:**
       - Max Service Rate (Batches) = 1 batch / 0.45s ≈ 2.22 batches/sec.
       - Max Service Rate (Requests, μ) = 2.22 batches/sec * 4 req/batch ≈ 8.88 req/sec.
       - Traffic Intensity (ρ) = λ / μ = 10 / 8.88 = 1.12.
    3. **Conclusion & Interpretation:**
       - **Result: Unstable Queue (ρ > 1).** The arrival rate exceeds maximum capacity, causing the queue to grow infinitely and latency to become unbounded.
  options:
  - The model's 450ms processing time is too slow for the GPU, indicating a compute bottleneck.
  - The 400ms batching timeout is too short, preventing the formation of larger, more efficient batches.
  - The arrival rate (10 RPS) exceeds the system's maximum service rate (~8.88 RPS), causing an unstable and ever-growing request queue.
  - Network latency between the user and the datacenter is the primary contributor to the 800ms+ TTFT.
  correct_index: 2
