title: Queueing Delay in Provisioning
scenario: Your team deployed a Whisper model for an audio transcription service. A single instance processes a standard 30-second audio clip in exactly 1.5 seconds. Your Service Level Objective (SLO) guarantees a P99 latency of 5.0 seconds. The traffic pattern is bursty, with a peak arrival rate of 50 requests per second. The infrastructure team provisioned 75 instances, calculating that 75 instances * (1 request / 1.5 sec) = 50 QPS capacity. However, during peak hours, P99 latency spikes to over 15 seconds.
question: Why did provisioning 75 instances fail at 50 RPS, and how many instances are needed to meet the 5s P99 SLO?
details:
  realistic_solution: The root cause is queueing delay. Because real-world traffic is bursty, operating at 100% utilization causes requests to pile up in the queue, waiting significantly longer than the actual inference time. To maintain a 5.0s latency SLO, the maximum allowable wait time in the queue is 3.5s (5.0s SLO - 1.5s processing). Applying queueing theory, the system must be provisioned for a lower target utilization (e.g., 80%) to absorb traffic bursts without violating the latency budget.
  common_mistake: |
    **The Pitfall:** Assuming deterministic traffic and targeting 100% hardware utilization.
    **The Rationale:** Engineers often calculate Capacity = Peak QPS * Service Time without factoring in arrival distributions.
    **The Consequence:** Queueing delays grow exponentially as system utilization approaches 1.0, leading to massive P99 SLA violations during minor bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target utilization to absorb bursts: U = 0.8 (80%).
    - Service time per clip = 1.5s.
    - Total peak demand = 50 requests/sec.

    **Calculations:**
    - Capacity per instance = 1 / 1.5s = 0.66 requests/sec.
    - Required capacity to maintain U=0.8: 50 / 0.8 = 62.5 requests/sec.
    - Instances needed = 62.5 / 0.66 = 94.69.

    **Conclusion & Interpretation:**
    - **Result: Queueing Delay (Latency-Bound)**. Round up to 95 instances to safely meet the 5.0s P99 latency SLA.
