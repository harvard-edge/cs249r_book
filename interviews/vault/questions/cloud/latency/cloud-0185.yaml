title: The Real-Time Translation Stalemate
scenario: 'You are the tech lead architecting a new real-time translation service. The service powers a live conversation, translating speech-to-text-to-speech using a 70B parameter model. The business has a non-negotiable product requirement: the P99 Time-To-First-Token (TTFT) for the LLM generation step must be under 400ms to feel ''instantaneous'' to the user. During load testing on H100s, you observe that as the number of concurrent users crosses about 16 per GPU, the P99 TTFT skyrockets to over 5 seconds, even though average GPU utilization is only 60%. Your initial attempt to fix this by adding more H100s to a simple round-robin load balancing pool does not meaningfully decrease the P99 latency.'
question: What are your first three design decisions to address this P99 latency explosion, and why are they the correct levers to pull?
details:
  realistic_solution: 'The core of the problem is Head-of-Line (HOL) blocking within a naive static batching framework. An L6+ answer must identify this and propose an architecture that eliminates it.'
  common_mistake: 'The most common L4/L5 answer is to blame raw capacity: ''We just need to autoscale and add more GPUs.'' This fails because the problem isn''t a lack of aggregate compute, but a systemic scheduling and resource allocation failure known as Head-of-Line (HOL) blocking. Another mistake is to immediately suggest a smaller model, which compromises on quality before exhausting systems-level optimizations.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters (140GB weights).
    - Hardware: 2x 80GB H100s (TP=2, 3.35 TB/s bandwidth each).
    - Workload: Static batch of 32 requests (16 per GPU), avg generation = 250 tokens.
    
    **Calculations:**
    - Time to decode 1 token per GPU: 70GB / 3.35 TB/s ≈ 21ms.
    - Time to process full batch generation: 250 tokens * 21ms = 5,250ms (5.25 seconds).
    - Queue delay for new request under static batching: Up to 5.25 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: >5s Tail Latency (Queue-Latency Bound)**. Static batching creates severe Head-of-Line (HOL) blocking. Continuous batching eliminates this by interleaving new requests at the 21ms token boundaries.
