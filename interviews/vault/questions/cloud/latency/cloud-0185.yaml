title: The Real-Time Translation Stalemate
scenario: 'You are the tech lead architecting a new real-time translation service. The service powers a live conversation, translating speech-to-text-to-speech using a 70B parameter model. The business has a non-negotiable product requirement: the P99 Time-To-First-Token (TTFT) for the LLM generation step must be under 400ms to feel ''instantaneous'' to the user. During load testing on H100s, you observe that as the number of concurrent users crosses about 16 per GPU, the P99 TTFT skyrockets to over 5 seconds, even though average GPU utilization is only 60%. Your initial attempt to fix this by adding more H100s to a simple round-robin load balancing pool does not meaningfully decrease the P99 latency.'
question: What are your first three design decisions to address this P99 latency explosion, and why are they the correct levers to pull?
details:
  realistic_solution: |
    The first decision is to replace naive static batching with continuous batching or another iteration-level scheduler so new translation requests are admitted between decode steps instead of waiting for a whole static batch to finish. The second decision is to add admission control and priority-aware scheduling for the real-time path, because P99 TTFT is governed by the worst queued request, not average GPU utilization. The third decision is to right-size the serving layout around live-token memory and prefill/decode separation: reserve enough KV cache for active conversations, cap per-GPU concurrency before the latency knee, and route or isolate long/low-priority work away from the real-time pool. These are the correct levers because the symptom is head-of-line blocking and resource contention inside each GPU worker, not a simple lack of fleet-wide H100 count.
  common_mistake: |
    **The Pitfall:** The most common L4/L5 answer is to blame raw capacity: 'We just need to autoscale and add more GPUs.'
    **The Rationale:** The problem isn't a lack of aggregate compute, but a systemic scheduling and resource allocation failure known as Head-of-Line (HOL) blocking. Another mistake is to immediately suggest a smaller model.
    **The Consequence:** Compromising on quality before exhausting systems-level optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters (140GB weights).
    - Hardware: 2x 80GB H100s (TP=2, 3.35 TB/s bandwidth each).
    - Workload: Static batch of 32 requests (16 per GPU), avg generation = 250 tokens.
    - Observation: P99 TTFT rises above 5 seconds once static batches are full.

    **Calculations:**
    - In static batching, a newly arrived request cannot join until the active batch slot is released.
    - If the active batch has roughly 250 decode iterations remaining, the new request's TTFT includes the remaining batch lifetime before its own prefill can start.
    - The measured >5s P99 implies an average effective scheduler iteration of about 5,000ms / 250 ≈ 20ms in the saturated regime, but this is an observation-based queueing estimate, not a weight-bandwidth token-time formula.
    - Continuous batching reduces that queueing bound from "wait for the full generation" to "wait for the next admission opportunity plus prefill," assuming KV cache and admission limits are enforced.

    **Conclusion & Interpretation:**
    - **Result: >5s Tail Latency (Queue-Latency Bound)**. The first fixes should target scheduler admission, priority, and live-token memory limits; adding round-robin replicas leaves each replica vulnerable to the same full-batch wait.
