title: Queueing Theory Applied to GPU Batch Scheduling
scenario: Your H100 inference server batches requests every 20ms to maximize throughput. At 200 req/s, the average batch size is 4 requests.
question: What is the expected batching wait at 20ms, and why can a 50ms batch window improve P99 despite more queueing?
details:
  realistic_solution: For a fixed batching window with roughly uniform arrivals, the average batching delay is about half the window. At 20ms, expected batching wait is about 10ms. Per-request compute at batch=4 is assumed to be about 12ms per token because weights are loaded once for 4 requests, so the simple average contribution is 10ms wait + 12ms compute = 22ms. With a 50ms window, expected batching wait is about 25ms, and the assumed batch=10 compute cost drops to about 5ms per token through memory-bandwidth amortization, so the simple average contribution is 30ms. The 50ms window does not win on average latency from these numbers alone, but it can improve P99 when larger batches reduce service-time variance and keep the GPU saturated enough to prevent burst backlogs. A precise optimum requires the arrival burst distribution and batch-size-to-service-time curve; it is not derivable from the prompt.
  common_mistake: |
    **The Pitfall:** Choosing the smallest possible batch window because it minimizes batching wait in isolation.
    **The Rationale:** This ignores that small batches may waste GPU memory bandwidth and create higher service-time variance under bursty arrivals.
    **The Consequence:** The system can show a better average wait but a worse P99 because under-sized batches fail to amortize compute and let bursts build a backlog.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate: 200 req/s (1 every 5ms).
    - 20ms window: expected batch size = 200 req/s * 0.020s = 4 requests.
    - 50ms window: expected batch size = 200 req/s * 0.050s = 10 requests.
    - Approximate compute per request: 12ms at batch 4, 5ms at batch 10.

    **Calculations:**
    - 20ms window: average batching wait is approximately W/2 = 10ms; average latency contribution = 10ms + 12ms = 22ms.
    - 50ms window: average batching wait is approximately W/2 = 25ms; average latency contribution = 25ms + 5ms = 30ms.
    - The 50ms window does not win on average latency from these numbers alone.
    - It can improve P99 when larger batches reduce service-time variance and prevent burst backlog by amortizing memory-bandwidth-bound work.

    **Conclusion & Interpretation:**
    - **Result: 20ms batching has ~10ms average wait, while 50ms batching has ~25ms average wait.** A larger window can still lower P99 if the throughput and variance gains are larger than the added queueing delay under bursts.
