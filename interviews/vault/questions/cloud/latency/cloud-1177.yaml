title: 'Diagnosing P99 Latency Spikes in Dynamic Inference'
scenario: 'A real-time fraud detection service uses a PyTorch model deployed on a cloud GPU. The strict P99 latency budget is 100ms. Model execution takes 25ms. However, under peak load of 2,000 QPS, P99 latency degrades to 250ms. Metrics show CPU utilization pinned at 95%, while GPU utilization never exceeds 35%. The service receives JSON requests, parses them, fetches 10 user features from a remote store via sequential REST calls, and returns JSON.'
question: 'Why is P99 latency 250ms with low GPU utilization, and what preprocessing and feature-fetch changes would fix it?'
details:
  realistic_solution: 'Profile the pre-processing steps. Replace JSON serialization with gRPC/Protobuf to reduce CPU load. Convert the 10 sequential feature store lookups into a single batched request (e.g., Redis MGET) or parallelize them.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on GPU optimizations like TensorRT or FP16 quantization.
    **The Rationale:** Candidates see a latency problem in an ML system and immediately apply deep learning optimization techniques, missing the classic systems-engineering bottlenecks.
    **The Consequence:** Spending weeks optimizing a model from 25ms to 15ms while ignoring the 200ms+ of blocking CPU/IO overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target P99 latency: 100ms.
    - Model execution: 25ms (Budget remaining: 75ms).
    - CPU utilization: 95% (pinned). GPU: 35%.

    **Calculations:**
    - Current Overhead: 10 sequential REST calls (e.g., 5ms each = 50ms) + JSON parsing (15ms) = 65ms base overhead.
    - Queuing/Thread Contention: 250ms (peak) - 25ms (model) - 65ms (base) = 160ms wait time due to blocked CPU threads.
    - Fix: Batched feature fetch (1 REST call = 5ms) + Protobuf (2ms).
    - New Overhead: 7ms.

    **Conclusion & Interpretation:**
    - **Result: CPU/IO-Bound Pipeline**. Replacing sequential IO and JSON with batched Redis MGET and gRPC drops pipeline overhead to 7ms, easily meeting the 100ms SLA and freeing the GPU.
