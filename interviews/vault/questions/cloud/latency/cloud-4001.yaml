title: Tail Latency Queueing Cliff
scenario: An inference service has 10 replicas, each serving 20 requests/s. Average arrival rate grows from 140 to 190 requests/s. Mean service time is unchanged, but P99 latency jumps by 5x.
question: "Why can P99 latency jump 5x when arrival rate rises from 140 to 190 requests/s with 10 replicas at 20 rps each?"
details:
  realistic_solution: Capacity is 200 requests/s. Utilization rises from 70% to 95%. Queueing delay grows nonlinearly as utilization approaches 1, so tail latency can explode even though mean service time is unchanged. The binding wall is the tail-latency/queueing wall.
  common_mistake: |
    **The Pitfall:** Expecting latency to increase linearly with traffic.
    **The Rationale:** Engineers assume standard scaling laws apply identically to both utilization and latency, missing the asymptotic utilization cliff near saturation.
    **The Consequence:** Failing to provision headroom, leading to massive P99 SLA violations during minor traffic bumps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Capacity: 10 * 20 = 200 RPS.
       * Base Arrival: 140 RPS. Peak Arrival: 190 RPS.
    2. **Calculations:**
       * Base Utilization: 140 / 200 = 0.70.
       * Peak Utilization: 190 / 200 = 0.95.
       * Base Queueing Factor: 1 / (1 - 0.70) = 3.3.
       * Peak Queueing Factor: 1 / (1 - 0.95) = 20.
    3. **Conclusion & Interpretation:** **Result: 95% Utilization (Queue-Bound)**. Superlinear queueing growth triggers an explosion in tail latency near saturation.
