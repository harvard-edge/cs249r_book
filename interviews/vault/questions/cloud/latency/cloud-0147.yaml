title: 'The Throttling Dilemma: Per-User vs. Global Queueing'
scenario: You are designing the queueing and rate-limiting architecture for a new multi-tenant LLM API. The system must provide fair service and prevent a single 'power user' from degrading performance for others. You need to analyze the latency implications of two different designs under a 'thundering herd' scenario where one user submits a large burst of requests.
question: How do global FIFO and per-user fair queuing differ under a burst from one power user in a multi-tenant LLM API?
details:
  realistic_solution: Under a global FIFO queue, a single user bursting 500 requests can occupy the full service stream for 500/100 = 5 seconds if those requests land ahead of others. Non-bursty users arriving behind that burst can see up to 5 seconds of added queueing delay, even though the system normally has spare capacity. With per-user fair queuing, the burst fills only that user's queue; other users continue to be selected from their own queues according to their fair share or priority weight. The key insight is that fair queuing turns one tenant's burst from a system-wide tail-latency event into mostly a local delay for that tenant.
  common_mistake: |
    **The Pitfall:** Relying solely on a global queue to maximize total throughput.
    **The Rationale:** Candidates assume that overall system throughput is the only metric, ignoring variance in wait times and fairness.
    **The Consequence:** A single power user can easily saturate the system, causing extreme tail latency and service degradation for all other users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate λ = 20 req/s.
    - Service rate μ = 100 req/s.
    - Burst of 500 requests from one user.

    **Calculations:**
    - Baseline utilization: ρ = λ/μ = 20/100 = 0.2.
    - Baseline M/M/1 queue wait: Wq = λ / (μ(μ - λ)) = 20 / (100 × 80) = 0.0025s = 2.5ms.
    - Global FIFO burst service time: 500 requests / 100 req/s = 5 seconds.
    - Per-user fair queueing: other users are not forced to wait behind all 500 burst requests; they continue receiving their configured share while the bursty user's own queue drains.

    **Conclusion & Interpretation:**
    - **Result: Global FIFO can add up to 5s of tail delay for other users; per-user fair queuing localizes the delay to the bursty tenant (Queue-Bound).**
