title: 'Speculative Decoding for LLaMA-70B: M/M/1 vs M/G/1 P99 Latency'
scenario: 'Analyze how speculative decoding changes the queueing dynamics of an H100 LLaMA-70B inference server. Without speculation: μ=10 req/s, exponential service, ρ=0.8. With speculative decoding (draft model accepts 4 tokens per verify step): μ increases to 35 req/s with near-deterministic service (CV≈0.2).'
question: How does speculative decoding change M/M/1 to M/G/1 queueing for LLaMA-70B at ρ=0.8, and what P99 latency improvement should you expect?
details:
  realistic_solution: 'Without speculation: M/M/1, ρ=0.8, μ=10, so λ=8 req/s. The exact M/M/1 response-time tail is exponential with rate μ-λ=2/s, giving P99 ≈ -ln(0.01)/2 = 2.30s and mean response 0.50s. With speculation, keep λ=8 but use μ=35 and CV=0.2, so ρ=0.229. Pollaczek-Khinchine gives mean queue wait Wq = λE[S²]/(2(1-ρ)) = 4.4ms and mean response ≈33ms. A low-CV service distribution does not justify reusing the M/M/1 P99 multiplier exactly; a simple planning bound is to apply the exponential-tail multiplier to the small mean response, giving an estimated P99 around 150ms. The expected improvement is therefore roughly an order of magnitude, about 15x under that conservative tail approximation, rather than an exact result.'
  common_mistake: |
    **The Pitfall:** Naively applying M/M/1 queue math to speculative workloads without modeling the deterministic shift in coefficient of variation.
    **The Rationale:** Engineers who remember basic queueing theory assume all inference service times strictly mirror exponential distributions, entirely missing that speculative accept/reject loops compress service times toward a highly deterministic mean.
    **The Consequence:** P99 queuing delays are dramatically overestimated, leading to unnecessary load shedding or over-provisioning when the system is actually exceptionally capable of handling the load cleanly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Without Speculation (M/M/1): μ=10, λ=8, ρ=0.8.
    - With Speculation (M/G/1): μ=35, λ=8, ρ=0.229, CV=0.2.

    **Calculations:**
    - M/M/1 response tail: P(T > t) = exp(-(μ-λ)t). P99 = -ln(0.01)/(10-8) = 2.30s.
    - M/M/1 mean wait check: Wq = ρ/(μ-λ) = 0.8/2 = 400ms; mean response W = 500ms.
    - M/G/1 P-K Wq: λ * E[S²] / (2(1-ρ)). E[S²] = (1/35)² * (1 + 0.04) = 0.000849.
    - Wq = 8 * 0.000849 / (2 * 0.771) = 4.4ms. Mean response W = 4.4ms + 28.6ms = 33ms.
    - Since CV=0.2 is not M/M/1, treat P99 ≈ 4.6 * W = 152ms as a conservative planning estimate, not an exact M/G/1 tail.

    **Conclusion & Interpretation:**
    - **Result: roughly 10-15x estimated P99 latency improvement (Speculation-Draft-Bound)**. Speculation raises service rate and reduces service-time variance, shifting the system away from queue-delay-bound behavior.
