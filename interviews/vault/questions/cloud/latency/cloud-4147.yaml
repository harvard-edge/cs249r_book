title: P99 vs P50 Divergence Under Load
scenario: Your LLM inference service reports a healthy P50 latency of 45ms but a P99 of 820ms — an 18x ratio. The team proposes adding more replicas.
question: Why is P50-to-P99 divergence a poor signal for capacity planning, and what root causes should you investigate before scaling out?
details:
  realistic_solution: 'An 18x ratio signals a multi-modal latency distribution rooted in system jitter, not simple queueing overload. Investigate execution stalling events: (1) `torch.compile` JIT recompilation graph breaks on rare input shapes; (2) PCIe contention from KV cache spilling to host RAM; (3) OS-level Transparent Huge Page (THP) defragmentation stalls; or (4) NUMA-remote allocations. Utilize `nsys` profiling to correlate latency spikes with system interrupts. Adding replicas is useless as the same execution paths will trigger on new nodes.'
  common_mistake: |
    **The Pitfall:** Assuming the P99 tail is strictly caused by insufficient compute capacity or request queueing.
    **The Rationale:** In standard REST web services, a high P99 usually implies CPU starvation or request backlog.
    **The Consequence:** Blindly provisioning expensive GPU replicas that do absolutely nothing to solve the tail latency, because the outliers are caused by JIT compilation or GC pauses.
  napkin_math: |
    **Assumptions & Constraints:**
    - P50 Latency: 45ms.
    - P99 Latency: 820ms.
    - Architecture: Fixed GPU allocation, no queue metrics indicated.

    **Calculations:**
    - JIT outlier path: 45ms base + ~500ms compile stall = ~545ms.
    - NUMA or PCIe outlier path: 45ms base + ~300ms remote access or spill penalty = ~345ms.
    - If rare paths overlap, 45ms base + 500ms + 300ms = ~845ms, consistent with the observed 820ms P99.
    - Scaling impact: adding replicas does not remove these code-path or topology stalls, so the same tail mode can remain on each replica.

    **Conclusion & Interpretation:**
    - **Result: the observed ~820ms P99 is consistent with stacked system-jitter events, not proven capacity shortage.** A reduced P99 should be measured after removing JIT, spill, THP, or NUMA stalls rather than asserted from the current data.
