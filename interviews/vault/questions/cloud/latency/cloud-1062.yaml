title: CPU Bottleneck in PII Anonymization
scenario: A healthcare LLM (Llama-3-8B) is deployed on a single AWS g5.4xlarge instance (1x A10G GPU, 24GB VRAM, 16 vCPUs). A Data Anonymization Layer (DAL) using a BERT-base NER model (110M parameters) intercepts prompts (average length 512 tokens) to mask PII, running strictly on CPU to save VRAM. At 40 requests/sec, P99 latency spikes from 300ms to 2.5s, despite GPU utilization never exceeding 45%.
question: What is causing the 2.5s P99 latency spike despite 45% GPU utilization, and how should the DAL be deployed?
details:
  realistic_solution: The latency spike is caused by the CPU-bound DAL, not by the LLM GPU path. BERT-base NER on 512-token prompts at 40 RPS can saturate the 16 vCPUs and create queueing, while the A10G remains only 45% utilized because it waits behind the anonymization stage. Deploy the DAL on the GPU or another accelerator with an optimized runtime such as ONNX Runtime or TensorRT, or replace it with a validated lighter-weight anonymizer if the accuracy/compliance requirements allow it. Do not claim the spare GPU utilization is useful until the DAL is moved off the CPU bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming the LLM generation or tokenization is the bottleneck because it is the "largest" model.
    **The Rationale:** Engineers obsess over GPU metrics and ignore CPU overhead when architecting multi-stage pipelines.
    **The Consequence:** Wasting engineering cycles attempting to quantize the LLM or increase batch sizes, completely ignoring the CPU-bound BERT model crippling the pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - BERT-base: 110M params, 512 tokens. 40 req/sec.
    - CPU execution is much less efficient than dense accelerator inference for transformer matmuls.

    **Calculations:**
    - Even a conservative tens-of-GFLOPs estimate for 512-token BERT-base inference becomes hundreds of GFLOPs to multiple TFLOPs per second at 40 RPS.
    - On 16 general-purpose vCPUs, memory movement, vectorization limits, and batching constraints make sustained transformer inference throughput far below GPU-class dense matmul throughput.
    - Queueing explains the symptom: the CPU DAL service time rises above the 25 ms inter-arrival interval at 40 RPS, so requests accumulate before they reach the underutilized GPU.

    **Conclusion & Interpretation:**
    - **Result: CPU queueing bottleneck.** The right fix is to accelerate or offload the DAL; the exact post-migration latency must be measured, not asserted from VRAM allocation alone.
