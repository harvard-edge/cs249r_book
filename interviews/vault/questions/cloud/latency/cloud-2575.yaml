title: Shared Versus Separate GPU Pools for 1K and 32K Token Requests
scenario: Your LLM API serves a mix of short requests (avg 1K tokens, 80% of traffic) and long requests (avg 32K tokens, 20%). You can either (A) serve both on the same GPU pool or (B) create separate pools optimized for each.
question: Should you use one shared GPU pool or separate pools for the 1K-token and 32K-token requests, and why?
details:
  realistic_solution: 'Option A (shared pool): simple deployment. But 32K requests consume 32x more KV cache than 1K requests, causing head-of-line blocking. One 32K request displaces 32 short requests. 20% of requests consume (0.20 * 32) / (0.80 * 1 + 0.20 * 32) = 6.4 / 7.2 = 88.9% of KV cache memory. Short requests queue behind long ones. Option B (separate pools): short pool (high concurrency, small KV cache, high throughput) and long pool (few concurrent, large KV cache). Short pool: 80% traffic at 1K tokens -> high utilization. Long pool: 20% traffic at 32K -> sized for peak. Better SLA isolation for short requests because long requests cannot monopolize the same KV cache. Disadvantage: cannot borrow capacity between pools. Best: B with auto-scaling and explicit overflow policy.'
  common_mistake: |
    **The Pitfall:** Serving all requests from one pool because it is 'simpler'.
    **The Rationale:** Platform teams prefer uniform clusters to reduce operational complexity.
    **The Consequence:** Without request-aware scheduling, long-context requests monopolize the KV cache, starving short requests and destroying latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 80% short (1K), 20% long (32K).
    - Memory Dominance: One 32K request displaces 32 short (1K) requests.

    **Calculations:**
    - Long-request KV share: (0.20 * 32) / ((0.80 * 1) + (0.20 * 32)) = 6.4 / 7.2 = 88.9%.
    - Shared Pool: Long requests consume almost 89% of KV memory for only 20% of traffic.

    **Conclusion & Interpretation:**
    - **Result: Queue-Bound Short Requests**. Separate pools protect the short-request SLA by preventing long-context requests from monopolizing shared KV cache; the tradeoff is lower capacity sharing during demand spikes.
