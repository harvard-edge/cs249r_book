title: Scaling DLRM Static Inference Caching
scenario: You are designing an ad-ranking system for 50 million daily active users (DAUs). Dynamic inference using an advanced DLRM model takes 120ms per user request, violating the strict 30ms SLA. A single GPU can process 5,000 users/sec in offline batch mode. You decide to pre-compute recommendations and store them in Redis.
question: How long will 8 GPUs take to refresh recommendations for 50M users, and how much raw Redis memory stores top-50 64-bit IDs per user?
details:
  realistic_solution: Execute a scheduled batch job over the 8-GPU cluster to generate recommendations offline, and push the results to Redis. This transforms a 120ms ML inference bottleneck into a <5ms O(1) database lookup, easily satisfying the 30ms SLA while utilizing ~20GB of cache memory.
  common_mistake: |
    **The Pitfall:** Attempting to heavily optimize the dynamic inference path (e.g., pruning, quantization).
    **The Rationale:** Engineers often default to making the ML model faster rather than fundamentally changing the serving architecture.
    **The Consequence:** Wasting months of engineering effort trying to squeeze 120ms down to 30ms, when offline batching solves the problem perfectly with minimal cache overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DAUs: 50,000,000.
       - Batch Throughput: 8 GPUs * 5,000 req/s/GPU = 40,000 req/s.
       - Cache Storage: 50 items * 8 bytes = 400 bytes/user.
    2. **Calculations:**
       - Batch Time: 50M / 40,000 = 1,250 seconds (~20.8 mins).
       - Redis Size: 50M * 400 bytes = 20 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Architectural Shift.** Bypassing dynamic computation for O(1) Redis lookups physically guarantees the <30ms SLA with a trivial 20 GB cache payload.
