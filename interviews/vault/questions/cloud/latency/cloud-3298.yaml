title: Optimizing Batching Strategies for LLM Inference on Google TPU v5e
scenario: You are deploying a large language model (LLM) for real-time inference on a Google TPU v5e. The model has varying input sequence lengths and a strict P99 latency requirement of 100ms.
question: How would you choose among static, dynamic, and continuous batching on TPU v5e to maximize throughput while meeting a 100 ms P99 latency target?
details:
  realistic_solution: Use static batching only for homogeneous offline traffic where padding waste and queue delay are predictable. Use dynamic batching for online traffic by grouping arrivals for a short deadline-bounded window, then cap batch size by the remaining 100 ms P99 budget. Use continuous batching for token generation when sequence lengths vary, because it replaces finished sequences without padding the whole batch. The recommendation is continuous batching with admission control, per-request deadlines, and a maximum queue age; if P99 rises, shrink the active batch or shed low-priority work. Continuous batching improves TPU utilization, but without those controls it can increase tail latency by letting long sequences and oversized batches occupy the decode loop.
  common_mistake: |
    **The Pitfall:** Applying a fixed static batch size.
    **The Rationale:** Failing to account for the highly variable nature of LLM input sequence lengths.
    **The Consequence:** Underutilization of the TPU for short sequences, tail latency spikes for long sequences, and ignoring the overheads of padded tensor transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 100ms P99 latency limit.
    - Per-request latency = queue wait + prefill time + decode time + network/postprocess.
    - Leave 20 ms for network/postprocess and 20 ms for prefill in the P99 budget.

    **Calculations:**
    - Remaining P99 budget for queueing plus decode: 100 - 20 - 20 = 60 ms.
    - If profiled decode step time at active batch B is t_step(B), then max generated tokens that fit is floor(60 ms / t_step(B)).
    - Static batching adds a fixed wait window and padding cost, so it is acceptable only if wait + padded compute stays under the 60 ms budget.
    - Dynamic batching should set max wait to a small slice of the budget, such as 5-10 ms, then dispatch by deadline.
    - Continuous batching should cap active sequences so t_step(B) and queue age keep the P99 path under 100 ms.

    **Conclusion & Interpretation:**
    - **Result: use deadline-capped continuous batching for variable-length serving, with dynamic batching as a simpler fallback and static batching only for uniform workloads.**
