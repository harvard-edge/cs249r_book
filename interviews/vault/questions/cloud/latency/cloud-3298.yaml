title: Optimizing Batching Strategies for LLM Inference on Google TPU v5e
scenario: 'You are deploying a large language model (LLM) for real-time inference on a Google TPU v5e. The model has varying input sequence lengths and a strict P99 latency requirement of 100ms.'
question: 'How would you choose among static, dynamic, and continuous batching on TPU v5e to maximize throughput while meeting a 100 ms P99 latency target?'
details:
  realistic_solution: 'A realistic solution involves continuous batching for latency-sensitive requests. For TPU v5e, optimizing memory bandwidth and BF16 compute is critical. Implement a custom scheduler that monitors TPU utilization and incoming sequence lengths to dynamically adjust batching aggressiveness. Leverage FlashAttention-2 within the continuous batching framework to reduce effective latency. Profile memory carefully to ensure the HBM is not oversubscribed with larger effective batch sizes.'
  common_mistake: |
    **The Pitfall:** Applying a fixed static batch size.
    **The Rationale:** Failing to account for the highly variable nature of LLM input sequence lengths.
    **The Consequence:** Underutilization of the TPU for short sequences, tail latency spikes for long sequences, and ignoring the overheads of padded tensor transfers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 100ms P99 latency limit.
    - Hardware: TPU v5e (197 TFLOPS BF16, 819.2 GB/s HBM).

    **Calculations:**
    - Ideal compute throughput = 197 TFLOPS / T_op.
    - Ideal memory throughput = 819.2 GB/s / M_bytes.
    - Actual throughput = min(compute, memory).
    - Processing L tokens with batch B takes L * t / B time.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Memory-Bound)**. Larger B increases throughput but increases per-token latency t due to memory contention, dictating continuous batching to hit the 100ms P99 limit.
