title: Quantifying Non-Stationarity Financial Impact
scenario: A cloud-based dynamic pricing model running on an AWS EKS cluster processes 1,000 quotes per
  hour. The model was trained under a strict stationarity assumption using data from Q1-Q2. In Q3, sudden
  inflation causes an input distribution shift. The deployed model now systematically underprices items
  by $5 on average for 30% of the generated quotes. Calculate the daily revenue loss caused by this data
  drift and determine the maximum acceptable time to detect and deploy a retrained model if the business
  requires cumulative drift-induced losses to remain strictly below $50,000.
question: "What daily revenue loss does the Q3 drift cause, and how quickly must detection and retraining finish to keep losses below $50,000?"
details:
  realistic_solution: Implement continuous data drift monitoring using statistical divergence metrics
    (e.g., Kolmogorov-Smirnov tests) on critical input features, and use the financial cost of drift to
    establish a rigid SLA for automated model retraining.
  common_mistake: Candidates often suggest debugging infrastructure, latency, or memory leaks, completely
    missing that the statistical relationship between features and targets has changed (violating the
    stationarity assumption), and failing to translate this into a quantitative business impact.
  napkin_math: Daily quotes = 1,000 quotes/hour * 24 hours = 24,000 quotes/day. Underpriced quotes = 30%
    of 24,000 = 7,200 quotes/day. Daily revenue loss = 7,200 * $5 = $36,000/day. Maximum allowable drift
    time to keep losses under $50,000 = $50,000 / $36,000/day = 1.38 days (approx. 33 hours).
