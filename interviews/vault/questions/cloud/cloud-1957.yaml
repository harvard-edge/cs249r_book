title: Quantifying Non-Stationarity Financial Impact
scenario: A cloud-based dynamic pricing model running on an AWS EKS cluster processes 1,000 quotes per hour. The model was trained under a strict stationarity assumption using data from Q1-Q2. In Q3, sudden inflation causes an input distribution shift. The deployed model now systematically underprices items by $5 on average for 30% of the generated quotes. The business requires cumulative drift-induced losses to remain strictly below $50,000.
question: What daily revenue loss does the Q3 drift cause, and how quickly must detection and retraining finish to keep losses below $50,000?
details:
  realistic_solution: |
    Implement continuous data drift monitoring using statistical divergence metrics (e.g., Kolmogorov-Smirnov tests) on critical input features, and use the financial cost of drift to establish a rigid SLA for automated model retraining.
  common_mistake: |
    **The Pitfall:** Debugging infrastructure or latency instead of detecting data distribution shifts.
    **The Rationale:** Engineers focus purely on software metrics (uptime, latency) and miss that the statistical relationship between features and targets has structurally changed.
    **The Consequence:** The model continues to serve mathematically "correct" but financially disastrous predictions, causing massive revenue hemorrhaging before anyone notices.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000 quotes/hr = 24,000 quotes/day.
    - 30% underpriced by $5.
    - Max acceptable loss = $50,000.

    **Calculations:**
    - Underpriced quotes: 24,000 * 0.30 = 7,200 quotes/day.
    - Daily revenue loss: 7,200 * $5 = $36,000/day.
    - Max allowable time: $50,000 / $36,000 = 1.38 days (≈ 33 hours).

    **Conclusion & Interpretation:**
    - **Result: 33 hours maximum allowable detection time (Drift-Latency-Bound)**. The system must detect drift and deploy a retrained model quickly to prevent exceeding the financial threshold.
