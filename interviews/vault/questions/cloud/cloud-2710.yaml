title: PS for Sparse Recommendation Models
scenario: 'Your recommendation model has a 500GB embedding table with <1% of embeddings accessed per batch. The team debates: (A) AllReduce with model parallelism to shard embeddings, (B) parameter servers with sparse updates.'
question: 'For a recommendation model with a 500GB embedding table and under 1% access per batch, should you use AllReduce sharding or parameter servers?'
details:
  realistic_solution: |
    Use parameter servers. AllReduce with model parallelism shards the 500GB table, but still requires communicating dense gradient buffers for each shard, wasting massive bandwidth. Parameter servers with sparse updates mean workers send only the embedding IDs they accessed (~5GB) and receive only those updated rows. The PS architecture naturally supports sparse pull/push operations.
  common_mistake: |
    **The Pitfall:** Defaulting to AllReduce because it is the modern standard for LLMs.
    **The Rationale:** Candidates fail to recognize that for extremely sparse access patterns, AllReduce's strength (even bandwidth distribution) becomes a weakness when 99% of the communicated data is zeros.
    **The Consequence:** Severe network bottlenecks and wasted bandwidth syncing unchanged data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding table size: 500GB.
    - Access rate per batch: < 1%.

    **Calculations:**
    - AllReduce sync volume: ~500GB/N per shard communicated as dense tensors.
    - PS sparse sync volume: 1% of 500GB = ~5GB total.

    **Conclusion & Interpretation:**
    - **Result: ~5GB (Bandwidth-Bound)**. Parameter servers provide a ~100x communication reduction over dense AllReduce.
