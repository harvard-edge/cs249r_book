title: Systolic Placement of Depthwise Convolutions
scenario: You are implementing a vision model with depthwise separable convolutions (kernel 3x3, 128 channels) on a cloud accelerator featuring a 128x128 systolic array Matrix Multiply Unit. You attempt to map the operation by placing the channel dimension across the array's rows. Profiling shows peak compute utilization under 1%.
question: Why does mapping the 3x3 depthwise convolution onto the 128x128 systolic array yield under 1% utilization, and where should it run instead?
details:
  realistic_solution: A systolic array relies on cross-PE data sharing and accumulation (e.g., reducing across the input channel dimension). Depthwise convolutions process each channel independently without cross-channel reduction. If mapped to the array as a GEMM, it forms a sparse block-diagonal matrix where the spatial assignment forces 127 out of 128 PEs in every column to compute zeros. The computation must be remapped to the Vector Processing Unit (VPU) instead.
  common_mistake: |
    **The Pitfall:** Assuming a depthwise convolution can be tiled onto a 2D systolic array as efficiently as a dense 1x1 convolution.
    **The Rationale:** Candidates view all convolutions as functionally identical GEMM operations, ignoring the specific data dependency and accumulation paths of hardware PEs.
    **The Consequence:** The model compiles, but execution on the accelerator is astronomically slow due to massive PE starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operation: 3x3 depthwise convolution, 128 channels.
    - Hardware: 128x128 systolic array MMU.

    **Calculations:**
    - Dense Conv (128 channels): Uses all 128 PEs in a column to accumulate partial sums.
    - Depthwise Conv: Accumulates only within a 3x3 spatial window independently per channel.
    - Systolic Mapping: Placed on a 128x128 grid, only 1 diagonal PE per column does useful work.
    - Utilization: 1 active PE / 128 available PEs ≈ 0.78%.

    **Conclusion & Interpretation:**
    - **Result: 0.78% utilization (Compute-Bound)**. Theoretical utilization is under 1% due to PE starvation; the operation must execute on the VPU.
