title: Systolic Placement of Depthwise Convolutions
scenario: You are implementing a vision model with depthwise separable convolutions (kernel 3x3, 128 channels)
  on a cloud accelerator featuring a 128x128 systolic array Matrix Multiply Unit. You attempt to map the
  operation by placing the channel dimension across the array's rows. Profiling shows peak compute utilization
  under 1%. Analyze the spatial assignment of this operation to diagnose the root cause of the architectural
  bottleneck.
question: "Why does mapping the 3x3 depthwise convolution onto the 128x128 systolic array yield under 1% utilization, and where should it run instead?"
details:
  realistic_solution: A systolic array relies on cross-PE data sharing and accumulation (e.g., reducing
    across the input channel dimension). Depthwise convolutions process each channel independently without
    cross-channel reduction. If mapped to the array as a GEMM, it forms a sparse block-diagonal matrix
    where the spatial assignment forces 127 out of 128 PEs in every column to compute zeros. The computation
    must be remapped to the Vector Processing Unit (VPU) instead.
  common_mistake: Assuming a depthwise convolution can be tiled and placed onto a 2D systolic array as
    efficiently as a dense 1x1 convolution, ignoring the data dependency and accumulation paths of the
    hardware PEs.
  napkin_math: A dense 1x1 Conv with 128 channels uses 128 PEs in a column to accumulate partial sums.
    A depthwise Conv accumulates only within a 3x3 spatial window per channel independently. Placing this
    on a 128x128 grid yields a theoretical spatial utilization of 1 / 128 ≈ 0.78%.
