title: DP-SGD Epsilon Budget Exhaustion at Scale
scenario: You are training a 13B medical LLM with DP-SGD using a privacy budget of ε=2, δ=1e-5 over 100,000
  training steps on 500K patient records. After 60,000 steps, your privacy accountant reports the budget
  will be exhausted before training completes. What are your architectural options, and what are the quantitative
  tradeoffs?
details:
  realistic_solution: 'Three approaches: (1) Reduce noise multiplier σ to allow more steps within budget
    — but lower σ weakens the privacy guarantee, potentially invalidating the ε=2 bound. Recompute via
    Rényi DP accounting. (2) Switch to DP-LoRA: apply DP only to low-rank adapters (rank=16, ~20M params)
    instead of full 13B. Per-example gradient tensors shrink from 26GB to ~40MB, allowing larger effective
    batch sizes and more steps per ε. (3) Increase the physical batch size (more examples per gradient
    step) to reduce the number of steps needed — Poisson sampling rate q = B/N drops, reducing per-step
    privacy cost. Doubling batch size roughly halves remaining per-step ε cost under moments accountant.'
  common_mistake: Assuming you can simply 'pause and resume' training after the budget runs out — any
    additional gradient updates violate the DP guarantee regardless of noise level.
  napkin_math: 'Moments accountant: ε ≈ σ⁻²·q·√(2T·ln(1/δ)). With σ=1.1, q=500K/500K=0.001, T=100K: ε
    ≈ (1/1.21)·0.001·√(200K·11.5) ≈ 0.83·0.001·1517 ≈ 1.26 per step aggregate. DP-LoRA reduces gradient
    tensor by 650× (26GB → 40MB) enabling per-example grads without vmap overhead. Target: halve T to
    50K steps via 2× batch size → ε budget survives.'
