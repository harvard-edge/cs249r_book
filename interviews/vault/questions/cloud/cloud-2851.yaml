title: Raw Tensor Network Bottleneck
scenario: A team is training a vision model on an 8x H100 SXM cloud instance with a 50 Gbps network attachment. To 'optimize' data loading, they pre-processed their 1024x1024 images into raw FP16 tensors on object storage to bypass CPU decoding, but are now seeing only ~19% GPU utilization with a 50ms compute time per step (batch size 32 per GPU).
question: Analyze the data loading throughput to diagnose the root cause of the low utilization.
visual:
  kind: svg
  path: cloud-2851.svg
  alt: Bar chart comparing 6.25 GB/s network capacity against 32.2 GB/s required for raw FP16 images, and ~1 GB/s for JPEG.
  caption: Throughput limits and demands for the data loading pipeline.
details:
  realistic_solution: Raw FP16 images are 6.29 MB each (1024x1024x3x2 bytes). At 32 images/GPU across 8 GPUs, a single step requires 1.61 GB of data. To keep up with a 50ms compute step, the pipeline demands 32.2 GB/s of bandwidth. However, the 50 Gbps network only provides 6.25 GB/s, making data loading take ~257ms (1.61 / 6.25). As a result, the GPU utilization drops to 50ms / 257ms ≈ 19%. Using compressed JPEGs would drastically reduce the network payload, trading abundant CPU decode cycles for scarce network bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming that skipping CPU decoding always speeds up the data pipeline.
    **The Rationale:** Candidates think that moving computation off the CPU to the GPU or avoiding it altogether is always a net positive.
    **The Consequence:** They fail to calculate whether the uncompressed payload size will saturate the cloud instance's network bandwidth.
  napkin_math: |
    - Req Vol: 8 * 32 * 6.29MB = 1.61GB.
    - Net BW: 50Gbps / 8 = 6.25GB/s.
    - IO Time: 1.61GB / 6.25GB/s = 257ms.
    - Util: 50ms / 257ms = **19.4%**.
