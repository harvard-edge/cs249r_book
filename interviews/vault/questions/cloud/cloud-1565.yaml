title: Evaluating Storage Formats for Small-File Datasets
scenario: You are designing the data loading pipeline for a distributed training job processing 100 million 50KB image chips stored in a cloud network file system. The training cluster requires an aggregate data feeding rate of 10,000 images per second (500 MB/s) to keep compute saturated. The data engineering team proposes storing the images as individual JPEG files in a deeply nested directory structure to allow for easy filtering and subset selection.
question: Should 100M 50KB image chips be stored as individual JPEGs for 10k images/s training, and what architecture should you use?
details:
  realistic_solution: Reject the individual file proposal. Consolidate the small images into larger, contiguous formats (e.g., TFRecords, Parquet, or WebDataset tarballs of 100MB-1GB). This amortizes the metadata lookup costs over thousands of samples and converts latency-bound random I/O into throughput-bound sequential reads.
  common_mistake: |
    **The Pitfall:** Focusing solely on the raw sequential bandwidth capability of the storage system.
    **The Rationale:** Engineers see a 500 MB/s storage spec and assume it handles any file mix.
    **The Consequence:** Ignoring IOPS limits and metadata latency causes severe GPU starvation as the pipeline chokes on millions of small 'open' and 'close' operations.
  napkin_math: |
    *   **Individual files:**
    *   Metadata latency (open) over network: ~2ms per file.
    *   Read time (50KB at 500MB/s): 0.1ms.
    *   Total time per image: 2.1ms.
    *   Max throughput per thread: ~476 images/sec (metadata overhead >95%).
    *   **Consolidated files (100MB containing 2,000 images):**
    *   Metadata latency (open): 2ms.
    *   Read time (100MB at 500MB/s): 200ms.
    *   Total time for 2,000 images: 202ms.
    *   Max throughput per thread: ~9,900 images/sec (metadata overhead <1%).
    *   **Result: Consolidating images drops metadata overhead from 95% to under 1%, enabling 10k images/sec throughput.**
