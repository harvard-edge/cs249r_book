title: Evaluating Storage Formats for Small-File Datasets
scenario: You are designing the data loading pipeline for a distributed training job processing 100 million
  50KB image chips stored in a cloud network file system. The training cluster consists of 8x A100 GPUs,
  requiring an aggregate data feeding rate of 10,000 images per second (500 MB/s) to keep compute saturated.
  The data engineering team proposes storing the images as individual JPEG files in a deeply nested directory
  structure to allow for easy filtering and subset selection. Evaluate this proposal against the storage
  system's metadata overhead and justify your architectural decision.
details:
  realistic_solution: Reject the individual file proposal. Consolidate the small images into larger, contiguous
    formats (e.g., TFRecords, Parquet, or WebDataset tarballs of 100MB-1GB). This amortizes the metadata
    lookup costs over thousands of samples and converts latency-bound random I/O into throughput-bound
    sequential reads.
  common_mistake: Focusing solely on the raw sequential bandwidth capability of the storage system (e.g.,
    500 MB/s) while ignoring the IOPS limits and latency of metadata operations (like 'open' and 'close')
    required for millions of small files.
  napkin_math: 'With individual files: Assume a 2ms metadata latency to open a file over the network.
    Reading 50KB at 500MB/s takes 0.1ms. Total time per image = 2.1ms (max ~476 images/sec per thread).
    The metadata overhead is >95% of the read time. With consolidated files: Pack 2,000 images into a
    100MB file. 1 open (2ms) + sequential read (200ms) = 202ms total for 2,000 images (~9,900 images/sec
    per thread). The metadata overhead drops to <1%.'
