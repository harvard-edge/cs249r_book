title: The Cluster MTBF Math
scenario: You are planning a 2-week training run on a 1,000-GPU cluster. Each GPU has a mean time between
  failures (MTBF) of 10,000 hours. How often should you expect a GPU failure to interrupt training?
question: "How often should you expect a GPU failure to interrupt training?"
details:
  realistic_solution: Expect a failure roughly every 10.5 hours. P(any failure in 1 hour) = 1 - (1 - 1/10000)^1000
    = 1 - 0.9048 = 9.5%. Expected time to first failure = 1/0.095 = 10.5 hours. Over a 2-week run (336
    hours), you will face ~32 interruptions. Checkpointing every 10 minutes is essential.
  common_mistake: 'Thinking 10,000-hour MTBF means the cluster is safe for weeks. Per-device reliability
    compounds multiplicatively: with 1,000 devices, the cluster MTBF drops to just ~10 hours.'
  napkin_math: Cluster MTBF = Device MTBF / N = 10,000 hours / 1,000 GPUs = 10 hours. Time to failure
    in a large cluster approaches an exponential distribution. Expected time to next failure = 10 hours.
  options:
  - A) Once per month — 10,000-hour MTBF is very reliable
  - B) Once per week — failures are uncommon
  - C) Once every ~10 hours — cluster reliability compounds
  - D) Once per hour — GPUs are inherently unreliable
  correct_index: 2
