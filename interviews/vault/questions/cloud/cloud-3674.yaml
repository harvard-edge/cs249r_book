title: Designing MoE Expert Sharding for TPU v5e
scenario: You are designing a 128-expert MoE model to run on a pod of 64x TPU v5e chips. Each expert has 1B parameters in BF16 (2 GB). You need to fit all experts in memory while maintaining high utilization.
question: How would you shard 128 1B-parameter experts across 64 TPU v5e chips, and what all-to-all cost should you expect?
details:
  realistic_solution: 'Use expert parallelism: partition 128 experts across 64 chips (2 experts/chip). Each chip holds 2 \times 2 GB = 4 GB of expert params, leaving 12 GB for activations. Use XLA''s all-to-all over the 4096-chip interconnect to route tokens to the correct expert chip. Combine with data parallelism for the dense attention layers.'
  common_mistake: |
    **The Pitfall:** Placing one expert per chip or naively mapping all experts to all chips.
    **The Rationale:** Candidates either waste capacity (putting 1 expert/chip leaves half the chips idle) or blow up the network by fully replicating experts, defeating the purpose of sparsity.
    **The Consequence:** Poor memory utilization or massive all-to-all communication overhead that cripples training performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128 experts (1B params each = 2GB), 64 TPU v5e chips.
    2. **Calculations:**
       - Distribution: 128 / 64 = 2 experts per chip.
       - Memory: 2 * 2 GB = 4 GB (fits 16 GB HBM).
       - All-to-all volume (BS=4096, dim=4096): 4096 * 4096 * 2B = 33.5 MB/layer.
       - Latency: 33.5 MB / 900 GB/s = ~37 \mu s.
    3. **Conclusion & Interpretation:**
       - **Result: 37 \mu s all-to-all overhead is negligible. Memory efficient.**
