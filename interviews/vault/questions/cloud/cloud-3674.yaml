title: Designing MoE Expert Sharding for TPU v5e
scenario: You are designing a 128-expert MoE model to run on a pod of 64x TPU v5e
  chips (16GB HBM, 197 TFLOPS BF16 each). Each expert has 1B parameters in BF16 (2
  GB). You need to fit all experts in memory while maintaining high utilization. Design
  the expert sharding strategy and explain the all-to-all communication cost.
question: How would you shard 128 1B-parameter experts across 64 TPU v5e chips, and
  what all-to-all cost should you expect?
details:
  realistic_solution: 'Use expert parallelism: partition 128 experts across 64 chips
    (2 experts/chip). Each chip holds 2 × 2 GB = 4 GB of expert params, leaving 12
    GB for activations. Use XLA''s all-to-all over the 4096-chip interconnect to route
    tokens to the correct expert chip. Combine with data parallelism for the dense
    attention layers.'
  common_mistake: 'Placing one expert per chip wastes capacity: 128 experts / 64 chips
    = 2 experts/chip minimum, but naively mapping all experts to all chips defeats
    the purpose of sparsity and blows the all-to-all volume.'
  napkin_math: 'Each chip holds 2 experts × 2 GB = 4 GB, well within 16 GB. All-to-all
    volume per step: batch_tokens × hidden_dim × 2 (BF16) = 4096 × 4096 × 2 = 32 MB
    per layer. TPU v5e ICI bandwidth ~900 GB/s; all-to-all: 32 MB / 900 GB/s ≈ 35
    µs per layer. Acceptable for ~100ms step time.'
