title: DP-SGD Hyperparameter Tuning Without Spending Privacy Budget
scenario: Hyperparameter tuning for DP-SGD requires running many training experiments. Each experiment on the private data consumes privacy budget. With a total budget of ε=10, running 50 hyperparameter configurations via basic composition leaves only ε=0.2 per run — too noisy to be useful.
question: How do you tune hyperparameters without exhausting the privacy budget?
details:
  realistic_solution: 'Strategy: minimize private data usage during tuning. (1) Public proxy: tune hyperparameters on a public dataset from a similar domain. (2) Subsample tuning: run experiments on 10% of the private data via RDP. (3) Private selection: run all experiments and use the exponential mechanism to privately select the best hyperparameters. (4) Transfer from non-private training: train the model without DP first to find good hyperparameters, then add DP noise calibrated to those hyperparameters. The non-private runs don''t touch the privacy budget because you don''t release those models.'
  common_mistake: |
    **The Pitfall:** Relying solely on advanced composition to run all experiments on private data.
    **The Rationale:** Engineers assume that better bounding math will make the privacy cost disappear.
    **The Consequence:** They waste a massive percentage of their overall privacy budget on tuning, severely degrading the accuracy of the final production model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total privacy budget: ε=10.
       - Tuning configurations: 50 runs.
    2. **Calculations:**
       - Basic Composition: 50 * ε=0.2 = ε=10.0.
       - Advanced Composition: ~sqrt(50) * 0.2 * 4.8 = ~ε=6.8 (68% of budget).
       - RDP Subsampling (10%): 50 * ε=0.07 = ε=3.5 (35% of budget).
       - Non-Private Transfer: Tune on public/proxy data = ε=0. Final production run = ε=10.0.
    3. **Conclusion & Interpretation:**
       - **Result: Privacy-Bound. Non-private transfer guarantees 100% of the privacy budget is preserved for the final model run.**
