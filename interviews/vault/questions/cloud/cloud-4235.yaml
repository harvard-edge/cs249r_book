title: DP-SGD Hyperparameter Tuning Without Spending Privacy Budget
scenario: Hyperparameter tuning for DP-SGD requires running many training experiments.
  Each experiment on the private data consumes privacy budget. With a total budget
  of ε=10, running 50 hyperparameter configurations via basic composition leaves only
  ε=0.2 per run — too noisy to be useful. How do you tune hyperparameters without
  exhausting the privacy budget?
question: How do you tune hyperparameters without exhausting the privacy budget?
details:
  realistic_solution: 'Strategy: minimize private data usage during tuning. (1) Public
    proxy: tune hyperparameters on a public dataset from a similar domain. Learning
    rate, clipping norm, and noise multiplier transfer reasonably well across similar
    tasks. Cost: zero privacy. (2) Subsample tuning: run experiments on 10% of the
    private data. Privacy amplification by subsampling reduces per-experiment privacy
    cost by ~3×. Total: 50 × (ε=0.07) ≈ ε=3.5 via RDP. (3) Private selection: run
    all experiments and use the exponential mechanism to privately select the best
    hyperparameters. Cost: ε=1.0 for the selection step, independent of the number
    of configurations (only depends on the sensitivity of the quality score). This
    is the theoretically optimal approach. (4) Transfer from non-private training:
    train the model without DP first to find good hyperparameters (LR, batch size,
    architecture), then add DP noise calibrated to those hyperparameters. The non-private
    runs don''t touch the privacy budget because you don''t release those models.'
  common_mistake: Running all experiments on the private data and using advanced composition
    to get a tighter bound. Even with advanced composition, 50 experiments × ε=0.2
    each gives total ε ≈ 3.2 — leaving only ε=6.8 for the final model. This wastes
    32% of the budget on tuning.
  napkin_math: 'Basic: 50 × 0.2 = 10 (entire budget). Advanced: √(50) × 0.2 × √(2
    ln(1/δ)) ≈ 7.07 × 0.2 × 4.8 = 6.8 (68% of budget). RDP subsample: 50 × 0.07 =
    3.5 (35% of budget). Exponential mechanism: 1.0 (10% of budget). Non-private transfer
    + 1 private run: ε = 10.0 for final model (100% efficient). Winner: non-private
    transfer. Tune on public data or without DP, then train once with DP using the
    best hyperparameters.'
