title: CPU Decoding Bottlenecks in PCIe Gen5 Video Pipelines
scenario: A multi-modal training job on an H100 GPU reads compressed videos from a
  7 GB/s NVMe SSD, decodes them on the CPU, and transfers uncompressed frames to the
  GPU via PCIe Gen5 (64 GB/s).
question: Analyze the bottleneck if decoding 1 second of video produces 1.5 GB of
  raw frames and the CPU can decode 10 seconds of video per second.
details:
  realistic_solution: The CPU decodes at 10 seconds of video per sec, generating 15
    GB/s of raw frame data. The SSD bandwidth (7 GB/s) easily supplies the compressed
    inputs. The PCIe bandwidth (64 GB/s) can easily handle the 15 GB/s transfer. Therefore,
    the CPU decoding throughput is the primary bottleneck, starving the H100 GPU.
  common_mistake: Blaming PCIe or SSD bandwidth without calculating the actual data
    payload rate generated by the CPU decoder.
  napkin_math: 10 * 1.5 GB/s = 15 GB/s CPU output < 64 GB/s PCIe limit.
