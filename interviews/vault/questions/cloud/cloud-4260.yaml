title: Autograd correctness testing with gradcheck and gradgradcheck
scenario: You have implemented a custom differentiable beam search decoder for sequence generation on A100. The operation involves a differentiable top-k selection with soft attention over beam hypotheses. Before deploying to production training, you need to verify the backward pass is analytically correct.
question: How would you verify that the differentiable beam search decoder's custom backward pass is analytically correct?
details:
  realistic_solution: 'Use `torch.autograd.gradcheck(func, inputs, eps=1e-6, atol=1e-4, rtol=1e-3, dtype=torch.float64)` to compare analytical gradients against finite differences. Use double precision (float64) to minimize numerical error in the finite difference baseline. For second-order: use `torch.autograd.gradgradcheck()`. If gradcheck fails, use `check_grad_dtypes=True` to diagnose type issues.'
  common_mistake: |
    **The Pitfall:** Only testing that `backward()` executes without crashing.
    **The Rationale:** Engineers assume framework auto-differentiation is bulletproof and ignore the complexities of custom gradients over discrete approximations.
    **The Consequence:** Silent gradient errors (wrong but non-NaN gradients) lead to models that train without errors but permanently converge to suboptimal solutions.
  napkin_math: |
    1. `gradcheck` runs $2 \times n_{\text{inputs}}$ finite difference evaluations (forward + perturbation per element).
    2. For a test beam search: `batch=2`, `beam=4`, `seq=10`, `vocab=1000`.
    3. Input size = $2 \times 4 \times 10 \times 1000 = 80,000$ input elements.
    4. Evaluations required = $160,000$ forward passes. At 1ms each, this takes 160 seconds.
    5. **Reduce input size to `batch=1, beam=2, seq=3, vocab=10` for fast local testing (120 passes in ~0.1s).**
