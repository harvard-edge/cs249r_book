title: Evaluating Total Carbon Cost of H100 vs. TPU v5e for LLM Training
scenario: An ML team must choose between running a 7B parameter LLM pre-training (1 trillion tokens) on a cluster of 64 GPUs in a US-East datacenter (350 gCO2/kWh) vs. 256 TPU chips in a Google datacenter (~70 gCO2/kWh). Assume both clusters run at 50% MFU.
question: "What is the total carbon footprint of pre-training the 7B LLM on US-East GPUs versus Google TPU v5e, and which option is lower-carbon?"
details:
  realistic_solution: 'Methodology: (1) Compute training FLOPs (Chinchilla formula). (2) GPU effective throughput at 50% MFU. Compute time, power, and carbon. (3) TPU effective throughput at 50% MFU. Compute time, power, and carbon. Google''s low-carbon grid yields 3.5× lower carbon despite higher hardware efficiency on GPU.'
  common_mistake: |
    **The Pitfall:** Comparing hardware efficiency (FLOPS/Watt) while ignoring the grid carbon intensity.
    **The Rationale:** Candidates assume that faster, newer hardware is inherently greener, failing to account for the massive variance in regional electricity sources.
    **The Consequence:** Recommending a deployment that maximizes operational carbon footprint simply because the chips run the workload faster.
  napkin_math: |
    **Assumptions & Constraints:**
    - FLOPs = 6 * 7B * 1T = 42e21 FLOPS.
    - GPU setup: 64 GPUs, 50% MFU, 700 W, 350 gCO2/kWh.
    - TPU setup: 256 TPUs, 50% MFU, 197 W, 70 gCO2/kWh.

    **Calculations:**
    - GPU Throughput = 64 * 494.5 TFLOPS = 31.6 PFLOPS. Time = 42e21 / 31.6e15 = 368.6 hr.
    - GPU Energy = 64 * 700 W * 368.6 hr = 16,513 kWh. Carbon = 16,513 * 0.350 kg = ~5,780 kg CO2.
    - TPU Throughput = 256 * 98.5 TFLOPS = 25.2 PFLOPS. Time = 42e21 / 25.2e15 = 463.8 hr.
    - TPU Energy = 256 * 197 W * 463.8 hr = 23,391 kWh. Carbon = 23,391 * 0.070 kg = ~1,637 kg CO2.

    **Conclusion & Interpretation:**
    - **Result: ~1,637 kg CO2 (Energy-Bound)**. TPU yields ~3.5x lower carbon due to grid intensity, despite using more total energy.
