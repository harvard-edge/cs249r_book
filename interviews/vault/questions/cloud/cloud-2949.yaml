title: Evaluating Total Carbon Cost of H100 vs. TPU v5e for LLM Training
scenario: An ML team must choose between running a 7B parameter LLM pre-training (1 trillion tokens) on a cluster of 64 NVIDIA H100s in a US-East datacenter (350 gCO₂/kWh) vs. 256 Google TPU v5e chips in a Google datacenter (~70 gCO₂/kWh). Assume both clusters run at 50% MFU.
question: What is the total carbon footprint of pre-training the 7B LLM on US-East H100s versus Google TPU v5e, and which option is lower-carbon?
details:
  realistic_solution: 'Methodology: (1) Compute training FLOPs: 6 × N × D = 6 × 7B × 1T = 42 × 10^21 FLOPS (Chinchilla formula). (2) H100 effective throughput at 50% MFU: 989 TFLOPS × 0.50 = 494.5 TFLOPS. Time on 64 H100s: 42e21 / (64 × 494.5e12) = 1.327M s = 368.6 hr = ~15.4 days. Power: 64 × 700 W = 44.8 kW. Energy: 44.8 kW × 368.6 hr = 16,513 kWh. Carbon: 16,513 × 0.350 kg = 5,780 kg CO₂. (3) TPU v5e at 50% MFU: 197 TFLOPS × 0.50 = 98.5 TFLOPS. On 256 chips: 256 × 98.5e12 = 25.2 PFLOPS. Time: 42e21 / 25.2e15 = 1.67M s = 463.8 hr. Power: 256 × 197 W = 50.4 kW. Energy: 50.4 × 463.8 hr = 23,391 kWh. Carbon: 23,391 × 0.070 = 1,637 kg CO₂. Google''s low-carbon grid yields 3.5× lower carbon despite higher hardware efficiency on H100.'
  common_mistake: |
    **The Pitfall:** Comparing hardware efficiency (FLOPS/Watt) while ignoring the grid carbon intensity.
    **The Rationale:** Candidates assume that faster, newer hardware is inherently greener, failing to account for the massive variance in regional electricity sources.
    **The Consequence:** Recommending a deployment that maximizes operational carbon footprint simply because the chips run the workload faster.
  napkin_math: |
    * FLOPs required = 6 * 7B * 1T = 42e21 FLOPS.
    * H100 setup (64 GPUs at 50% MFU): Throughput = 64 * 494.5 TFLOPS = 31.6 PFLOPS. Time = 42e21 / 31.6e15 = 1.327M s = 368.6 hr.
    * H100 Energy = 64 * 700 W * 368.6 hr = 16,513 kWh. Carbon = 16,513 * 0.350 kg = **~5,780 kg CO2**.
    * TPU v5e setup (256 chips at 50% MFU): Throughput = 256 * 98.5 TFLOPS = 25.2 PFLOPS. Time = 42e21 / 25.2e15 = 1.67M s = 463.8 hr.
    * TPU v5e Energy = 256 * 197 W * 463.8 hr = 23,391 kWh. Carbon = 23,391 * 0.070 kg = **~1,637 kg CO2**.
    * **TPU v5e yields ~3.5x lower carbon due to grid intensity**, despite using more total energy.
