title: AI-Assisted Labeling Throughput Gain
scenario: Human labelers annotate 40 images/hour from scratch. With AI pre-annotation (a model pre-labels,
  humans verify/correct), throughput rises to 120 images/hour. You have 500K images and pay $25/hour.
  Calculate cost savings.
question: "How much labeling cost does AI pre-annotation save on 500K images at 40 versus 120 images per hour and $25/hour?"
details:
  realistic_solution: 'Without AI assistance: 500K images ÷ 40 images/hr = 12,500 hours × $25/hr = $312,500.
    With AI pre-annotation: 500K ÷ 120 images/hr = 4,167 hours × $25/hr = $104,175. Savings = $208,325.
    The 3x throughput gain from pre-annotation comes from changing the task from ''draw bounding boxes
    from scratch'' to ''verify and adjust existing boxes.'' This is cognitively easier and faster. However,
    you must account for the compute cost of running the pre-annotation model and the risk of automation
    bias where annotators rubber-stamp incorrect predictions.'
  common_mistake: Forgetting to account for the pre-annotation model's compute cost and the quality assurance
    overhead to catch automation bias.
  napkin_math: 'Manual: 500K/40 = 12.5K hrs × $25 = $312.5K. AI-assisted: 500K/120 = 4.2K hrs × $25 =
    $104K. Savings ≈ $208K.'
