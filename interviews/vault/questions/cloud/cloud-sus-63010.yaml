title: Counterfactual Fairness in Causal Feature Spaces
scenario: 'A hiring model uses features: years_experience, job_title_history, education_institution, and
  zip_code. A fairness audit finds demographic parity holds (hiring rate gap < 2% by race) but a causality
  researcher claims the model is causally unfair because zip_code and education_institution are proxies
  for race that encode historical discrimination. Propose a counterfactual fairness evaluation methodology
  and quantify the implementation cost.'
question: "How would you evaluate counterfactual fairness for proxy features like zip_code and education_institution, and what would it cost?"
details:
  realistic_solution: 'Counterfactual fairness requires: (1) Build a causal DAG with nodes for Race →
    {zip_code, institution} → {years_experience} → Hiring_decision. (2) Use path-specific counterfactual
    analysis: identify which causal paths from Race to Hiring_decision are through ''fair'' paths (direct
    experience signal) vs ''unfair'' paths (historical discrimination encoding). (3) Decompose each feature
    into a ''fair'' residual (variation not attributable to race in the causal model) using a learned
    nuisance model: zip_fair = zip - E[zip|race]. (4) Retrain the hiring model using only fair residuals.
    Evaluation: run counterfactual inference — flip applicant''s race in the causal model, propagate through
    DAG, compare predicted hiring rate. A counterfactually fair model should produce identical outcomes
    under race intervention. Cost: requires labeled demographic data for nuisance model training, additional
    200-400 GPU-hours for causal decomposition over a 10M-record dataset.'
  common_mistake: Removing correlated proxy features (zip_code, institution) naively without causal reasoning
    — this can introduce new biases or destroy signal. Simply dropping correlated features is not equivalent
    to counterfactual fairness.
  napkin_math: 'Causal nuisance model: logistic regression for P(zip|race, city) over 10M records = trivially
    fast (minutes on CPU). Fair residual computation: 10M × 4 features × 1 forward pass = ~40M FLOPs.
    Counterfactual evaluation: for each of N=10K test applicants, run 2 inference passes (original + race-flipped)
    through the hiring model. If model is 100M params FP16: 2 × 10K × 200M FLOPs = 4 TFLOP — 1 second
    on any modern GPU. Primary cost is causal DAG validation and legal review, not compute.'
