title: 'Tensor Parallelism for Attention Heads: Optimal Head Distribution'
scenario: You are implementing tensor parallelism for attention in a 7B model (32 Q heads, 8 KV heads, d_head=128) on 4x H100s. A junior engineer proposes splitting heads evenly.
question: How should you split Q and KV heads for Grouped-Query Attention (GQA) with 32 Q heads, 8 KV heads, and TP=4 on 4 H100s?
details:
  realistic_solution: 'For GQA with TP=4: assign 8 Q heads and 2 KV heads per GPU. Each GPU computes attention for its 8 Q heads against its 2 KV heads independently — no cross-GPU communication needed for attention. The constraint is num_kv_heads must be divisible by TP degree. With 8 KV heads and TP=4: 8/4=2 per GPU.'
  common_mistake: |
    **The Pitfall:** Assuming Q and KV heads must be split symmetrically.
    **The Rationale:** Engineers apply Multi-Head Attention (MHA) logic to GQA, breaking the grouped structure and necessitating massive cross-GPU communication.
    **The Consequence:** Ruining the performance benefits of Tensor Parallelism due to interconnect bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 Q heads, 8 KV heads.
       - TP Degree: 4.
    2. **Calculations:**
       - Q heads per GPU: 32 / 4 = 8 Q heads.
       - KV heads per GPU: 8 / 4 = 2 KV heads.
       - MHA memory per GPU: 32/4 = 8 Q, 8 K, 8 V = 24 heads.
       - GQA memory per GPU: 8 Q + 2 K + 2 V = 12 heads.
       - Memory reduction: 50% less KV activation memory.
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bound**. To avoid cross-GPU attention computation, exactly 8 Q heads and 2 KV heads must be mapped to each GPU, respecting the exact divisibility of the GQA groups.
