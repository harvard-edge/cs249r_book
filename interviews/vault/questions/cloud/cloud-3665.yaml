title: 'Tensor Parallelism for Attention Heads: Optimal Head Distribution'
scenario: You're implementing tensor parallelism for attention in a 7B model (32 heads,
  d_head=128) on 4x H100 (80GB HBM3). A junior engineer proposes splitting heads as
  32/4=8 heads per GPU. A second engineer says this works for MHA but breaks Grouped-Query
  Attention (GQA) where the model has 8 KV heads and 32 Q heads.
question: How should you split Q and KV heads for GQA with 32 Q heads, 8 KV heads,
  and TP=4 on 4 H100s?
details:
  realistic_solution: 'For GQA with TP=4: assign 8 Q heads and 2 KV heads per GPU.
    Each GPU computes attention for its 8 Q heads against its 2 KV heads independently
    — no cross-GPU communication needed for attention. The constraint is num_kv_heads
    must be divisible by TP degree. With 8 KV heads and TP=4: 8/4=2 per GPU. TP=8
    would require 1 KV head per GPU — valid. TP=16 would fail (8/16 is not integer).'
  common_mistake: Assuming Q and KV head splits must be equal. With GQA (8 KV heads,
    32 Q heads), splitting evenly gives 2 KV heads per GPU for TP=4. This works, but
    requires all 4 KV heads (2 per GPU * 2) to be distributed before cross-GPU Q/K
    attention computation — the grouped structure must be respected.
  napkin_math: '7B model, GQA: 32 Q heads, 8 KV heads, d_head=128. TP=4: 8 Q heads/GPU,
    2 KV heads/GPU. Per-GPU memory for attention: Q proj [H, 8*128] = [4096, 1024]
    in BF16 = 8MB. KV proj [H, 2*128*2] = [4096, 512] = 4MB. Total QKV: 12MB per GPU
    vs 48MB for full MHA. Activation memory per layer: seq=4096 tokens, 8 Q heads
    * 4096 * 4096 * 2 = 256MB attention scores — still large. Flash Attention required
    even with TP=4.'
