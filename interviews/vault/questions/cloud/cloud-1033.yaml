title: Financial Impact of Counterfeit Transceivers
scenario: You are deploying a 1,024-GPU cluster for LLM training. Due to shortages, 256 of the 400G optical
  transceivers were sourced from an unverified vendor, with a suspected 15% counterfeit rate. Authentic
  transceivers have an MTBF of 500,000 hours; counterfeits have an MTBF of 4,000 hours. A transceiver
  failure halts an 8-GPU pod for 4 hours. If downtime costs $40 per GPU-hour, calculate the expected additional
  downtime cost per month (730 hours) caused by the counterfeits compared to an authentic batch.
question: "What is the expected additional monthly downtime cost caused by a 15% counterfeit rate among the 256 optical transceivers?"
details:
  realistic_solution: Identify the number of counterfeits (256 * 0.15 = 38.4, which we treat as 38 discrete components). Calculate their monthly failure
    rate compared to authentic ones, then multiply by the cost per failure ($1,280) to find the added
    financial risk.
  common_mistake: Calculating the failure rate without isolating the counterfeit sub-population, or forgetting
    to multiply the downtime cost by the number of GPUs affected per single component failure.
  napkin_math: 'Counterfeits: 256 * 0.15 = 38. Failures/mo (counterfeit): 38 * 730 / 4000 = 6.935. Failures/mo
    (authentic equivalent): 38 * 730 / 500000 = 0.055. Extra failures: 6.935 - 0.055 = 6.88. Cost per failure:
    8 GPUs * 4 hrs * $40/hr = $1,280. Extra monthly cost: 6.88 * $1,280 ≈ $8,806.'
