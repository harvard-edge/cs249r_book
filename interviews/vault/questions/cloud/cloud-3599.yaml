title: M/M/c Queue Design for TPU v5e Serving Pool
scenario: You manage a pool of TPU v5e chips for a batch inference service. Arrival rate is 800 req/s, and each request takes 5ms mean service time. You must achieve a p99 latency <25ms.
question: "How many TPU servers (c) do you need, and what utilization target should you set to maintain a p99 latency under 25ms?"
details:
  realistic_solution: 'Minimum servers for stability: c > λ/μ = 800×0.005 = 4. For p99<25ms with M/M/c, need ρ_per_server = λ/(c·μ) ≤ 0.7. At c=6: ρ=800/(6×200)=0.667. p99 ≈ mean_service + queue_wait. With ρ=0.67 and P(wait)≈28.5%, mean queue wait ≈ P(wait)×mean_service/(c×(1-ρ)) = 0.285×5/(6×0.333) ≈ 0.71ms; queue contribution is small, total p99≈10ms. Use c=6 TPUs, target 65-70% utilization per chip.'
  common_mistake: |
    **The Pitfall:** Sizing the cluster for mean load only without leaving headroom for queuing variance.
    **The Rationale:** Candidates calculate 800 req/s × 0.005s = 4 servers and assume 100% utilization is safe, ignoring Poisson burstiness.
    **The Consequence:** Providing exactly 4 servers guarantees an infinite queue length and massive latency spikes, failing the strict 25ms SLA.
  napkin_math: |
    - Arrival rate (λ) = 800 req/s. Service rate (μ) = 1 / 0.005 = 200 req/s per TPU.
    - Minimum servers for stability (a) = λ / μ = 4 servers (100% utilization).
    - Try c = 6 servers: Utilization ρ = 4 / 6 = 66.7%.
    - Erlang-C Probability of wait P(wait) ≈ 28.5%.
    - Mean wait time ≈ P(wait) × mean_service / (c × (1 - ρ)) = 0.285 × 5ms / (6 × 0.333) ≈ 0.71ms.
    - **With 6 TPUs, the queueing delay is minimal (~0.7ms), easily keeping the p99 latency well under the 25ms SLA.**
