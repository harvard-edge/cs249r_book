title: The Compilation Wall
scenario: You migrate a PyTorch model to a custom AI accelerator (e.g. AWS Trainium). The hardware is
  cheaper per TFLOPS than an A100, but the first epoch takes 48 hours to start, and training is 3x slower.
  Your sequence lengths vary slightly per batch. What is 'killing' your performance?
details:
  realistic_solution: 'You hit the **Graph Compilation Wall**. Unlike NVIDIA GPUs which execute eagerly,
    accelerators like Trainium/TPU rely on compilers (XLA/Neuron) to map code into static graphs for systolic
    arrays. The "48 hours" was the initial compilation. Because your sequence lengths vary, the compiler
    triggers a **Re-compile (JIT Thrashing)** on every batch, destroying throughput. The fix is to use
    **Static Padding**: pad all sequences to a fixed power-of-two length to reuse the same compiled graph.'
  common_mistake: '"Custom silicon just has slower interconnects than NVIDIA." The interconnect isn''t
    the issue; the execution paradigm is.'
  napkin_math: 'If an XLA compile takes 30s and a training step takes 0.5s, a single re-compile adds 60x
    overhead to that step. Even a 5% re-compile rate will cut your overall tokens/sec by 75% (average
    step time: 0.95 × 0.5s + 0.05 × 30.5s = 2.0s, vs. the original 0.5s).'
