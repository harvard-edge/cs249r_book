title: Diagnosing PII Leakage in Fine-Tuned LLMs
scenario: Your team deployed a 70B parameter LLM fine-tuned on 500GB of proprietary customer support logs using a cluster of 64 H100 GPUs. During beta testing, a targeted prompt successfully extracted verbatim PII (names and SSNs). The training pipeline included aggressive exact-string deduplication and 3 epochs of training.
question: "Why did exact-string deduplication fail to prevent PII memorization, and what pipeline changes would you make?"
details:
  realistic_solution: 'Implement fuzzy deduplication (e.g., MinHash LSH) to strip near-duplicates, strictly limit training on sensitive data to 1 epoch, and evaluate memorization risk using Membership Inference Attacks (MIA) pre-deployment.'
  common_mistake: |
    **The Pitfall:** Assuming exact deduplication prevents all data repetition.
    **The Rationale:** Relying on simple exact-string hashing without considering slightly varied log templates.
    **The Consequence:** Templated logs bypass exact deduplication, drastically increasing PII exposure across epochs and leading to memorization.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B params = 140GB capacity. Training data = 500GB.
    - If a PII string is in a template repeated 50 times across near-duplicate logs.
    - 3 epochs of training.

    **Calculations:**
    - Exposures = 50 repeats * 3 epochs = 150 exposures.

    **Conclusion & Interpretation:**
    - **Result: 150 exposures (Data Memorization)**. Memorization of specific sequences typically occurs reliably after 10-100 exposures.
