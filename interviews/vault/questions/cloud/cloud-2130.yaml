title: The Batch vs Real-Time Feature Tradeoff
scenario: You are building a fraud detection system. The feature 'transaction_count_last_1_hour' is critical for catching velocity attacks. Your current architecture computes all features via a nightly batch pipeline that writes to a feature store.
question: "Why is this architecture fundamentally inadequate for this feature, and what is the minimum viable real-time path?"
details:
  realistic_solution: 'A nightly batch pipeline produces features that are 0-24 hours stale. For a 1-hour window feature, the batch value is always wrong — it reflects yesterday''s transactions, not the last hour''s. The minimum viable real-time path: (1) Publish transaction events to a stream (Kafka/Kinesis), (2) A stream processor (Flink/Spark Streaming) maintains a sliding 1-hour window counter per user, (3) On each transaction, the processor updates the count and writes to a low-latency online store (Redis/DynamoDB), (4) At inference time, the model reads the up-to-date count. This changes feature freshness from hours to seconds.'
  common_mistake: |
    **The Pitfall:** Thinking you can just run the batch pipeline more frequently (e.g., every 5 minutes).
    **The Rationale:** Candidates try to force-fit batch architectures to streaming problems.
    **The Consequence:** Even 5-minute staleness means a fraudster can execute dozens of transactions before the feature updates, allowing the attack to succeed completely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Feature window: Last 1 hour.
       - Current pipeline: Nightly batch.
       - Stream processing latency: ~200-500ms.
    2. **Calculations:**
       - Batch staleness: Average 12 hours (ranges from 0 to 24 hours).
       - Fraud attack velocity: e.g., 50 transactions in 10 minutes.
       - Batch pipeline detects: 0 of 50 (data is 12 hours old).
       - Stream pipeline detects: 47 of 50 (updates sub-second, triggers after 3rd attempt).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Feature.** A batch pipeline makes the velocity feature mathematically useless. A stream processor (Flink) writing to a low-latency store (Redis) is strictly required to catch attacks mid-flight.
