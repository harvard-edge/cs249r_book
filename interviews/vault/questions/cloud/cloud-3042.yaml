title: 'Network Bandwidth Bottlenecks: Compare PCIe 4.0 vs. 5.0 Impact on H100 Data Loading'
scenario: 'A training cluster uses H100 GPUs with either PCIe 4.0 ×16 (32GB/s) or PCIe 5.0 ×16 (64GB/s) for CPU-GPU data transfer. A vision model is being trained with 224×224 RGB float32 images, batch size 256, and 4 workers per GPU.'
question: 'What is the actual input tensor size for batch 256 ImageNet 224×224 RGB float32 images, and why is an estimate of 3.3GB too high?'
details:
  realistic_solution: 'Input activation memory for batch=256 ImageNet images: 256 × 224² × 3 × 4B = 154MB. 3.3GB would require batch ~5500.'
  common_mistake: |
    **The Pitfall:** Assuming data loading is always CPU-bound and not limited by PCIe bandwidth.
    **The Rationale:** Candidates often miscalculate the size of an uncompressed float32 image batch or forget that data must traverse the PCIe bus after CPU decoding.
    **The Consequence:** Clusters are provisioned with slower PCIe interfaces that bottleneck the H100s at high batch sizes.
  napkin_math: |
    - **Image dimensions:** 224 × 224 × 3 (RGB) = 150,528 elements per image.
    - **Memory per image:** 150,528 × 4 bytes (float32) = 602,112 bytes.
    - **Batch memory:** 602,112 bytes × 256 images = 154,140,672 bytes (**~154 MB**).
    - **Bandwidth comparison:** 154 MB per batch is easily handled by PCIe 4.0 (32 GB/s), which can transfer over 200 such batches per second.
