title: 'Network Bandwidth Bottlenecks: Compare PCIe 4.0 vs. 5.0 Impact on H100 Data
  Loading'
scenario: A training cluster uses H100 GPUs with either PCIe 4.0 ×16 (32GB/s) or PCIe
  5.0 ×16 (64GB/s) for CPU-GPU data transfer. Training a vision model with 256×256
  images, batch size 256, 4 workers per GPU. Compare data loading bottleneck risk
  for each PCIe generation.
question: What is the actual input tensor size for batch 256 ImageNet 224×224 RGB
  float32 images, and why is 3.3GB too high?
details:
  realistic_solution: 'Input activation memory for batch=256 ImageNet images: 256
    × 224² × 3 × 4B = 154MB. 3.3GB would require batch ~5500.'
  common_mistake: Assuming data loading is always CPU-bound and not limited by PCIe
    bandwidth; at high batch sizes with high-resolution images, PCIe can become the
    bottleneck.
  napkin_math: 'ImageNet training batch memory: batch=256, images 224×224×3, float32.
    Activations: 256 × 224 × 224 × 3 × 4B = 256 × 150,528 × 4B = 154,140,672 bytes
    ≈ 154MB (not 3.3GB — that would require batch=5488 or float64).'
