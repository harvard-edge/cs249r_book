title: FlashAttention Causal Masking Efficiency
scenario: For causal (autoregressive) attention with seq_len=4096 on H100, FlashAttention-2 skips tiles where the causal mask is entirely zero.
question: What fraction of 128×128 FlashAttention tiles are skipped by the causal mask at seq_len=4096, and what speedup results for prefill and decode?
details:
  realistic_solution: 'With tile size B_r=B_c=128, the attention grid is 4096/128
    = 32 x 32 = 1024 tiles. Causal mask: tile (i,j) is fully zero when j > i (Q row
    block i cannot attend to K column block j if j > i). Fully zero tiles: upper triangle
    = 32x31/2 = 496. Fully computed tiles: lower triangle = 496. Diagonal tiles: 32
    (partially masked). Total work: 496 + 32 = 528 out of 1024 tiles. Fraction skipped:
    496/1024 = 48.4%. Effective speedup for prefill: ~1.93x vs non-causal. For decode:
    only 1 query token, so the causal mask doesn''t help — all prior tokens are attended
    to.'
  common_mistake: |
    **The Pitfall:** Assuming exactly half the tiles can be skipped, ignoring the diagonal boundary.
    **The Rationale:** Candidates forget that the causal mask is strictly triangular and that partial tiles along the diagonal must still be fully computed and masked.
    **The Consequence:** Overestimating the prefill speedup and incorrectly assuming decode also benefits from causal skipping.
  napkin_math: |
    1. **Assumptions & Constraints:** Seq_len=4096, tile size 128x128. FlashAttention-2 skips fully masked upper-triangle tiles.
    2. **Calculations:** Grid = 4096 / 128 = 32x32 = 1024 tiles. Upper triangle skipped = 32*31/2 = 496. Computed = 528 (51.6%). Prefill speedup = 1024/528 = 1.94x. Decode = 1 query token (all K columns needed).
    3. **Conclusion & Interpretation:** **Result: Compute-Bound. Causal masking yields a ~1.94x prefill speedup but provides zero benefit during the decode phase.**
