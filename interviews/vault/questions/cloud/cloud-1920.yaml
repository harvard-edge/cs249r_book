title: Covariance Pruning for Backdoors
scenario: You are training a ResNet-50 on an 8x GPU cluster using a dataset of 10 million images. You suspect a backdoor trigger affects up to 0.5% of the data. To deploy the spectral signature defense on a suspicious class of 50,000 examples, you extract the 2048-dimensional representations.
question: How many examples should you prune from the suspicious 50,000-example class using a 1.5x margin over a 0.5% poison rate?
details:
  realistic_solution: Extract the 2048-dimensional features specifically for the N=50,000 examples in the target class, compute the 2048x2048 covariance matrix, project all features onto the top eigenvector, and remove the top examples based on projection magnitude.
  common_mistake: |
    **The Pitfall:** Calculating the covariance matrix across the entire 10 million image dataset instead of independently for each class.
    **The Rationale:** Candidates misunderstand the spectral signature defense, which relies on intra-class variance to isolate the backdoor trigger.
    **The Consequence:** The top eigenvector captures natural inter-class variance rather than the anomalous poison signature, completely failing to prune the poisoned data.
  napkin_math: |
    1. Target class size N = 50,000.
    2. Expected poison rate = 0.5%.
    3. Pruning threshold = 1.5 * 0.5% = 0.75%.
    4. Number of examples to prune = 50,000 * 0.0075 = 375 examples.
    **You must prune exactly 375 examples.**
