title: Evaluating Graph Cluster Randomization for Social Feed Experiments
scenario: A social media platform with 100M DAU and an average user degree of 500 is testing a new content recommendation model. Initial A/B tests using user-level coin flips show a 5% lift in engagement, but holdout evaluation reveals severe SUTVA violations due to network effects. You propose graph cluster randomization by partitioning the user graph into 10,000 communities of roughly 10,000 users each.
question: How would you evaluate the statistical power loss of graph cluster randomization for the 100M-DAU recommendation test?
details:
  realistic_solution: 'Use community detection algorithms (like Louvain) to partition the graph, minimizing edge cuts between clusters to reduce spillover. Calculate the Intra-Cluster Correlation (ICC) and apply variance reduction techniques (like network-CUPED) to offset the power loss from the design effect.'
  common_mistake: |
    **The Pitfall:** Ignoring the massive design effect (power loss) introduced by cluster randomization.
    **The Rationale:** Candidates naively apply standard A/B testing variance formulas to clustered data.
    **The Consequence:** Designing an underpowered experiment that cannot statistically detect the true treatment effect.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster size (m): 10,000.
    - Intra-Cluster Correlation (ICC): 0.005.

    **Calculations:**
    - Design Effect (DE): 1 + (m - 1) * ICC.
    - DE Calculation: 1 + (9999 * 0.005) = 1 + 49.995 = 50.995.

    **Conclusion & Interpretation:**
    - **Result: 51x higher variance (Variance-Amplified)**. The variance of the estimate is ~51x higher due to clustering, severely reducing statistical power.
