title: Evaluating Graph Cluster Randomization for Social Feed Experiments
scenario: A social media platform with 100M DAU and an average user degree of 500 is testing a new content
  recommendation model. Initial A/B tests using user-level coin flips show a 5% lift in engagement, but
  holdout evaluation reveals severe SUTVA violations due to network effects (users interacting with friends'
  treated content). You propose graph cluster randomization by partitioning the user graph into 10,000
  communities of roughly 10,000 users each. Evaluate the trade-offs between bias reduction and statistical
  power loss, and justify your experimental design to accurately measure the true treatment effect.
details:
  realistic_solution: Use community detection algorithms (like Louvain) to partition the graph, minimizing
    edge cuts between clusters to reduce spillover. Calculate the Intra-Cluster Correlation (ICC) and
    apply variance reduction techniques (like network-CUPED) to offset the power loss from the design
    effect.
  common_mistake: Ignoring the massive design effect (power loss) introduced by cluster randomization,
    or assuming naive variance formulas still apply to clustered data.
  napkin_math: 'Design Effect (DE) = 1 + (m - 1) * ICC. With cluster size m = 10,000 and ICC = 0.005:
    DE = 1 + 9999 * 0.005 ≈ 51. The variance of the estimate is 51x higher than naive individual randomization.
    To maintain statistical power, you must increase the experiment duration or employ aggressive variance
    reduction.'
