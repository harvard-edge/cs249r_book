title: The Energy Economics
scenario: We are purchasing a cluster of H100 GPUs with an initial hardware cost of $100M. The CFO wants to know the Total Cost of Ownership (TCO) over a 3-year lifecycle.
question: Why is the $100M figure severely underestimating the budget?
details:
  realistic_solution: 'You forgot the OpEx (Operating Expenses), specifically power and cooling. Over a 3-year lifespan, the electricity required to run a massive cluster at high utilization — plus the power to cool it — frequently matches or exceeds the initial CapEx (hardware cost). System efficiency is not just about training speed; it is the primary lever for financial viability.'
  common_mistake: |
    **The Pitfall:** Adding a generic 20% for infrastructure costs while ignoring power and cooling.
    **The Rationale:** Engineers often focus heavily on the CapEx of the hardware and under-appreciate the sustained OpEx required to run and cool dense computing clusters.
    **The Consequence:** The budget will be severely underestimated, leading to financial shortfalls during the operational lifecycle.
  napkin_math: |
    1. **Compute Power:** 10,000 H100s × 700W TDP = 7 MW compute.
    2. **Total Power:** With PUE of 1.3 (cooling overhead), 7 MW × 1.3 = 9.1 MW total.
    3. **Hourly Cost:** 9,100 kW × $0.10/kWh = $910/hour.
    4. **Yearly Cost:** $910/hour × 24 × 365 = $7.97M/year.
    5. **3-Year Electricity Cost:** $7.97M × 3 = $23.9M (approx 24% of the hardware cost).
    **True TCO ≈ $100M (CapEx) + $23.9M (power) + networking/staff = $150M+.**
