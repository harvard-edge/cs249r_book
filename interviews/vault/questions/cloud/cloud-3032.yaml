title: 'Model Size Estimation: Fluency — Estimate 7B Model Memory From Scratch'
scenario: In a live interview, you're asked without any reference material to estimate the GPU memory needed for a 7B parameter model at FP16 for inference with a batch of 8, generating up to 512 tokens.
question: How much GPU memory does a 7B parameter model need at FP16 for inference with a batch of 8, generating up to 512 tokens?
details:
  realistic_solution: "Weights: 7B × 2B (FP16) = 14GB. KV-cache: 8 requests × 512 tokens × 2 (K+V) × hidden_dim × 2B × n_layers. For 7B LLaMA (hidden=4096, 32 layers): 8×512×2×4096×2×32 = 4.3GB. Activations (peak, 1 layer): 8×512×4096×2B = 32MB (negligible). Total: ~18.3GB. Fits in single H100 (80GB) or A100 (40/80GB). Answer in 30 seconds with rounding."
  common_mistake: |
    **The Pitfall:** Computing only the memory for the weights and forgetting the dynamic memory.
    **The Rationale:** Candidates often memorize rule-of-thumb parameter sizing but fail to account for the actual runtime requirements of the sequence.
    **The Consequence:** Drastically underestimating the memory footprint, especially for longer contexts or larger batch sizes, leading to OOM in production.
  napkin_math: |
    *   **Weights:** 7B parameters × 2 Bytes (FP16) = 14 GB.
    *   **KV Cache Formula:** 8 requests × 512 tokens × 2 (K+V) × 4096 (hidden dim) × 2 Bytes × 32 layers.
    *   **KV Cache Computation:** $8 \times 512 \times 2 \times 4096 \times 2 \times 32$ = 2,147,483,648 bytes $\approx$ 2 GB.
    *   **Activations:** Peak for 1 layer is $8 \times 512 \times 4096 \times 2B$ = 32 MB (negligible).
    *   **Total Footprint:** 14 GB (weights) + 2.1 GB (KV) = **~16.1 GB**.
    *   **Conclusion:** Fits comfortably inside a single 40GB or 80GB GPU.
