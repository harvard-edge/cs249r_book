title: Critical Batch Size Concept
scenario: A manager wants to double GPU count to halve training time. Explain the concept of critical
  batch size and why simply doubling GPUs does not guarantee 2x speedup.
question: "What is critical batch size, and why does doubling GPUs not guarantee a 2x training speedup?"
details:
  realistic_solution: Critical batch size (B_crit) is the point where doubling the batch size no longer
    halves the number of optimization steps needed to converge. Below B_crit, each doubling of batch size
    roughly halves the required steps (linear scaling regime). Above B_crit, you need nearly the same
    number of steps regardless of batch size, so additional GPUs just waste compute — you process more
    samples per step but need the same number of steps. B_crit depends on the model, dataset, and loss
    landscape. For GPT-3 class models, B_crit can be in the millions of tokens; for smaller models, it
    may be only thousands of samples.
  common_mistake: 'Assuming perfect linear scaling: 2x GPUs = 2x speed. In reality, beyond the critical
    batch size, additional parallelism yields diminishing returns in convergence per sample.'
  napkin_math: 'Below B_crit: 2x batch → ~0.5x steps → ~2x speedup. Above B_crit: 2x batch → ~1x steps
    → ~0x speedup, 2x wasted compute.'
