title: Critical Batch Size Concept
scenario: A manager wants to double GPU count to halve training time.
question: What is critical batch size, and why does doubling GPUs not guarantee a 2x training speedup?
details:
  realistic_solution: Critical batch size (B_crit) is the inflection point where data-parallel scaling shifts from compute-bound to synchronization-bound. Below B_crit, the linear scaling regime applies, and doubling batch size halves optimization steps. Above B_crit, the loss landscape requires nearly the same number of steps regardless of batch size. Adding GPUs here merely wastes compute capacity without reducing time-to-convergence.
  common_mistake: |
    **The Pitfall:** Assuming perfect linear scaling where 2x GPUs always equals 2x speed.
    **The Rationale:** Naive arithmetic suggests more compute implies proportionally faster completion.
    **The Consequence:** Wasting expensive GPU hours beyond $B_{crit}$, as additional data parallelism yields diminishing returns in convergence per sample.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Below $B_{crit}$: Linear scaling regime.
       - Above $B_{crit}$: Diminishing returns, required step count remains nearly constant.
    2. **Calculations:**
       - Below $B_{crit}$: 2x batch -> ~0.5x steps -> ~2x speedup.
       - Above $B_{crit}$: 2x batch -> ~1x steps -> ~0x speedup (wasted compute).
    3. **Conclusion & Interpretation:**
       - **Adding GPUs only improves time-to-train when operating below $B_{crit}$. Result: Convergence-Step Bound.**
