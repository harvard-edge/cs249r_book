title: Cloud Qlora L2 0
scenario: A colleague wants to fine-tune a 65B model but only has a single 48 GB GPU. The model normally requires 130 GB in FP16.
question: How does QLoRA let a 65B model fit and fine-tune on a single 48 GB GPU?
details:
  realistic_solution: 'QLoRA combines two techniques: (1) 4-bit NormalFloat (NF4) quantization of the frozen base model: 65B × 0.5 bytes = 32.5 GB — fits in 48 GB. (2) FP16 LoRA adapters: low-rank matrices (rank 16-64) added to each attention layer, typically <1% of total parameters. Only these adapters are trained. During forward pass: 4-bit weights are dequantized to FP16 on-the-fly, multiplied by input, then LoRA adapter output is added. Gradients flow only through the FP16 adapters. Memory: 32.5 GB (quantized base) + ~0.67 GB (adapters) + ~0.67 GB (gradients) + ~4.0 GB (optimizer) + ~10 GB (activations) = ~47.84 GB. Fits on 48 GB GPU.'
  common_mistake: |
    **The Pitfall:** Thinking QLoRA fine-tunes all weights directly in 4-bit precision.
    **The Rationale:** Because the model is loaded in 4-bit, people assume the gradients and optimizer states are also calculated in 4-bit.
    **The Consequence:** Failing to realize that the base model is dynamically dequantized to FP16 for computation and that LoRA adapters are kept in full precision, preserving the gradient accuracy required to train effectively.
  napkin_math: |
    * 65B base model in NF4 (0.5 bytes/param): 65B × 0.5B = 32.5 GB.
    * LoRA adapters (rank 64 on Q/K/V/O): 4 × 2 × 8192 × 64 × 80 layers × 2 bytes ≈ 0.67 GB.
    * Gradients on adapters: 0.67 GB.
    * AdamW optimizer states on adapters: 0.67 GB × 6 ≈ 4 GB.
    * Activations: ~10 GB.
    * **Total Memory: 32.5 + 0.67 + 0.67 + 4.0 + 10.0 = 47.84 GB. Fits comfortably in 48 GB.**
