title: Cloud Qlora L2 0
scenario: A colleague wants to fine-tune a 65B model but only has a single 48 GB GPU. They ask how QLoRA
  makes this possible when the model normally requires 130 GB in FP16. Explain the key innovations.
details:
  realistic_solution: 'QLoRA combines two techniques: (1) 4-bit NormalFloat (NF4) quantization of the
    frozen base model: 65B × 0.5 bytes = 32.5 GB — fits in 48 GB. (2) FP16 LoRA adapters: low-rank matrices
    (rank 16-64) added to each attention layer, typically <1% of total parameters. Only these adapters
    are trained. During forward pass: 4-bit weights are dequantized to FP16 on-the-fly, multiplied by
    input, then LoRA adapter output is added. Gradients flow only through the FP16 adapters. Memory: 32.5
    GB (quantized base) + ~0.5 GB (adapters) + ~10 GB (activations + optimizer for adapters only) = ~43
    GB. Fits on 48 GB GPU.'
  common_mistake: Thinking QLoRA fine-tunes in 4-bit precision. The base model is stored in 4-bit but
    dequantized to FP16 for computation. The LoRA adapters and their gradients are always in FP16 — training
    precision is preserved where it matters.
  napkin_math: '65B base in NF4: 65B × 0.5B = 32.5 GB. LoRA adapters (rank 64, applied to Q/K/V/O): 4
    × 2 × 4096 × 64 × 80 layers × 2B ≈ 0.33 GB. AdamW on adapters: 0.33 × 6 = 2 GB. Total: 32.5 + 0.33
    + 2 + 10 (activations) ≈ 45 GB. Fits 48 GB!'
