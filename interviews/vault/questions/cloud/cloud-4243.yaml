title: Memory layout of autograd computational graph for second-order optimization on MI300X
scenario: You are implementing K-FAC (Kronecker-Factored Approximate Curvature) on MI300X for training a ResNet-152. K-FAC requires computing Fisher information matrix blocks, which necessitates retaining the computational graph after backward() to compute second-order derivatives. Memory usage explodes unexpectedly.
question: How would you compute K-FAC second-order gradients for ResNet-152 on MI300X without unbounded graph memory growth?
details:
  realistic_solution: 'For K-FAC, use torch.autograd.grad() with create_graph=True for computing the Fisher-vector product, which returns gradient tensors without accumulating into .grad. Track graph memory explicitly: the retained graph for ResNet-152 at batch=32 holds ~8GB. Implement Fisher block updates every k=100 steps to amortize the memory cost. Zero gradients with model.zero_grad(set_to_none=True) to free grad tensors.'
  common_mistake: |
    **The Pitfall:** Calling `loss.backward(retain_graph=True)` in a loop to accumulate gradient statistics.
    **The Rationale:** It appears to be the standard PyTorch way to perform multiple backward passes on the same graph.
    **The Consequence:** Each call accumulates gradients by adding to `.grad` instead of replacing them, and failing to clear the graph between Fisher estimation steps causes unbounded memory growth and immediate OOMs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ResNet-152 activations for retained graph at batch=32: ~6 GB.
       - Adam states: 3 × 60M params × 4 bytes = ~720 MB.
       - MI300X VRAM: 192 GB.
    2. **Calculations:**
       - Second-order graph (for Hessian-vector products) roughly doubles activation footprint to ~12 GB.
       - Unbounded graph retention scales this linearly across estimation loops.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. On an 80GB device this is tight, but on a 192GB device it fits easily if memory is correctly managed and graphs are explicitly freed.**
