title: Centralized vs. Distributed Checkpointing Bottlenecks
scenario: You are training a 175B parameter LLM using FSDP across 16 nodes. The total training state is 2.1 TB. You initially configured checkpointing to gather all state to Rank 0 before saving. Rank 0 has a single 200 Gbps NIC connecting to the parallel file system, which has an aggregate write bandwidth of 400 GB/s.
question: "How long would centralized checkpointing take versus distributed checkpointing for the 2.1TB FSDP state?"
details:
  realistic_solution: Use a distributed checkpointing format (like PyTorch Distributed Checkpoint). Each of the 128 ranks writes its ~16.4 GB state shard directly to storage in parallel, fully utilizing the 400 GB/s aggregate bandwidth and bypassing the single-node NIC bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming centralized checkpointing is bounded by the shared storage aggregate bandwidth.
    **The Rationale:** Candidates forget that gathering to Rank 0 funnels all 2.1 TB through a single 25 GB/s NIC bottleneck.
    **The Consequence:** The time required for a centralized checkpoint is vastly underestimated, obscuring the need for distributed checkpointing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FSDP State: 2.1 TB (2100 GB).
       - Rank 0 NIC limit: 200 Gbps (25 GB/s).
       - Parallel file system aggregate limit: 400 GB/s.
    2. **Calculations:**
       - Centralized Checkpoint: 2100 GB / 25 GB/s = 84 seconds.
       - Distributed Checkpoint: 2100 GB / 400 GB/s = 5.25 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bandwidth-Bound. Switching to distributed checkpointing yields a 16x speedup by bypassing the Rank 0 NIC bottleneck.**
