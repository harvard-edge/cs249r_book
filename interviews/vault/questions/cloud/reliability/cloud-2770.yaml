title: Prompt Injection Defense Architecture
scenario: Your LLM has tool-use capabilities. A prompt injection through a web search result could trigger tool calls.
question: How would you compare classifier filtering, sandboxed tools with human review, and instruction hierarchy for prompt injection defense?
details:
  realistic_solution: 'Option A (classifier filtering): Catches known injection patterns but fails against novel attacks. Adversaries can craft injections that bypass any classifier — this is a fundamental limitation of detection-based defenses. Necessary but insufficient. Option B (sandboxed execution + HITL): All tool calls execute in a sandbox with limited permissions. Sensitive actions (email send, file write, external API calls) require human approval. This is an architectural defense — even if injection succeeds and triggers a tool call, the damage is contained. Cost: latency for human approval (minutes) and operational burden. Option C (instruction hierarchy): Architecturally separate ''system instructions'' from ''user content.'' Tool calls can only be triggered by system-level instructions, never by content parsed from external sources. This is the strongest defense — it makes indirect injection structurally impossible for tool calls. Limitation: hard to implement perfectly in current
    LLM architectures. Recommendation: C as the ideal architecture, B as the practical implementation today, A as an additional signal. Defense in depth: all three layers together.'
  common_mistake: |
    **The Pitfall:** Relying solely on input filtering (Option A) to prevent prompt injection.
    **The Rationale:** Developers often treat prompt injection as a standard malware/spam detection problem that can be solved by training a better classifier.
    **The Consequence:** Adversaries continuously craft new injections that bypass the classifier, leading to compromised systems and unauthorized tool execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prompt injection defenses do not compose as independent miss-rate probabilities.
    - The useful comparison is whether each layer detects, contains, or structurally prevents unsafe tool use.

    **Calculations:**
    - Classifier filtering detects known patterns, but adversarial inputs and novel phrasing can bypass it.
    - Sandboxed tools with human review contain damage by limiting permissions and requiring approval for sensitive actions.
    - Instruction hierarchy prevents untrusted retrieved content from being treated as authority for tool calls.

    **Conclusion & Interpretation:**
    - **Result: Defense in Depth Required.** Prefer C for structural prevention, B for containment, and A only as an additional detection signal.
