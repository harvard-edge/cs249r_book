title: OOD Detection Strategy Selection
scenario: 'Your autonomous driving perception model must detect OOD inputs (novel objects, weather conditions never seen in training). You are evaluating multiple approaches for safety-critical deployment: softmax temperature scaling, deep ensembles, and normalizing flows.'
question: Should you use temperature scaling, deep ensembles, or feature-density estimation for safety-critical OOD detection, and why?
details:
  realistic_solution: 'Option A (temperature scaling): Cheapest (zero additional compute). Improves calibration on near-distribution data but unreliable for far-OOD inputs. In safety-critical applications, it will miss novel objects that the model has never seen. Insufficient for autonomous driving. Option B (deep ensemble): Train 5 models independently. On in-distribution data, they agree; on OOD data, they disagree (high predictive entropy). Strong theoretical and empirical support for OOD detection. Cost: 5x inference compute and memory. For real-time driving at 30 FPS, this means 5\times the GPU requirement. However, ensemble disagreement is one of the most reliable OOD signals. Option C (normalizing flow): Learns the density of in-distribution features. Assigns low likelihood to OOD inputs. Single forward pass overhead. Good at detecting far-OOD (completely novel inputs) but can miss near-OOD (subtle distribution shifts). Recommendation: B for safety-critical deployment — the 5x cost is justified when lives are at stake. Augment with C as a secondary detector for far-OOD edge cases. Combine both signals for maximum coverage.'
  common_mistake: |
    **The Pitfall:** Choosing cost-effective temperature scaling over architectural changes for safety-critical tasks.
    **The Rationale:** Candidates prioritize compute efficiency (zero added cost) and wrongly assume temperature scaling actually fixes the model's fundamental overconfidence on wildly foreign data.
    **The Consequence:** The autonomous vehicle confidently misclassifies novel obstacles with fatal real-world results.
  napkin_math: |
    **Assumptions & Constraints:**
    - Safety-critical autonomous driving.

    **Calculations:**
    - Temp Scaling: +0% cost, unreliable for far-OOD.
    - Normalizing Flow: +10% cost, misses near-OOD.
    - Deep Ensemble: +400% cost (5x).

    **Conclusion & Interpretation:**
    - **Result: The 5x compute premium is required for life-critical OOD detection**.
