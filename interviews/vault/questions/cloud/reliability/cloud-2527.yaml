title: Cloud Transient Failures L5 0
scenario: 'To handle transient failures, your team proposes three strategies: (A) redundant computation (run every step on 2 GPUs, compare results), (B) gradient norm monitoring with rollback, (C) periodic validation loss checks every 100 steps.'
question: How would you compare redundant computation, gradient monitoring with rollback, and validation checks for transient-failure handling?
details:
  realistic_solution: 'Strategy A (redundancy): catches 100% of transient errors, but doubles GPU cost — 2x compute overhead is prohibitive for large training. Strategy B (gradient monitoring): near-zero overhead (<1%), catches most corruption (NaN/Inf and outlier norms), but misses subtle bit flips that produce plausible-looking gradients. Strategy C (validation checks): catches corruption that affects model quality, but detection is delayed up to 100 steps, requiring rollback and wasted compute. Best practice: combine B + C. Gradient monitoring catches acute corruption instantly; validation loss catches subtle drift with bounded rollback cost.'
  common_mistake: |
    **The Pitfall:** Relying solely on gradient norm monitoring to detect all hardware failures.
    **The Rationale:** Candidates assume all hardware bit flips produce obvious NaN/Inf explosions.
    **The Consequence:** Subtle bit flips that produce slightly-off but plausible gradients pass the norm checks, silently degrading model quality over thousands of steps.
  napkin_math: |
    - Strategy A (Redundancy): 2x GPU cost ($2M → $4M for a large run). Prohibitive.
    - Strategy B (Gradient monitor): <1% overhead, catches ~95% of acute corruption errors.
    - Strategy C (Validation checks): 100-step interval = ~2 min overhead. Max rollback cost = 100 steps * 30s/step = 50 min wasted.
    - **Conclusion: Combining B + C provides >99% error detection with <2% compute overhead and bounded rollback costs.**
