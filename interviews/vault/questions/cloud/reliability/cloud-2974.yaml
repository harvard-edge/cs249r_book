title: 'Fault Tolerance: Implement Checkpoint Size Calculation for Mixed-Precision Training'
scenario: You are implementing checkpointing for a 13B parameter model trained with ZeRO-2 on 64 GPUs. The model uses bf16 parameters and fp32 master weights, AdamW optimizer.
question: What are the per-rank and total checkpoint sizes for the 13B ZeRO-2 job, and do they fit within 100GB of NVMe per node?
details:
  realistic_solution: 'ZeRO-2 checkpoints replicated bf16 model parameters plus sharded optimizer-related states. Parameters: 13B * 2B = 26GB per rank. Sharded fp32 master weights, Adam momentum, and Adam variance: 3 * 13B * 4B / 64 = 2.44GB per rank. Sharded bf16 gradient buffer: 13B * 2B / 64 = 0.406GB per rank. Total per rank is about 28.85GB. Across 64 ranks the logical checkpoint writes about 1.85TB. If a node has 8 ranks, local NVMe needs about 8 * 28.85GB = 231GB per node, so it does not fit within a 100GB-per-node budget unless checkpoint shards are streamed off-node or stored on larger local disks.'
  common_mistake: |
    **The Pitfall:** Forgetting that ZeRO-2 shards optimizer state but NOT model parameters.
    **The Rationale:** Candidates assume all state is sharded under ZeRO-2, missing that all ranks still store the full bf16 parameters. They also frequently forget to account for fp32 master weights.
    **The Consequence:** Severely underestimating the per-rank checkpoint size, leading to out-of-memory errors on local NVMe.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameters (bf16), 64 ranks.
    - ZeRO-2: parameters replicated, optimizer/gradients sharded.

    **Calculations:**
    - Params (bf16): 13B * 2B = 26 GB per rank.
    - Optimizer (fp32): weights (813 MB) + momentum (813 MB) + variance (813 MB) = 2.44 GB per rank.
    - Gradient buffer (bf16): 13B * 2B / 64 = 406 MB per rank.
    - Total per rank: 26 + 2.44 + 0.406 = 28.85 GB.
    - Total across all ranks: 28.85 GB * 64 = ~1.85 TB written.
    - With 8 ranks per node: 28.85 GB * 8 = ~231 GB per node.

    **Conclusion & Interpretation:**
    - **Result: 28.85 GB per rank and ~231 GB per 8-GPU node.** A single rank fits under 100GB, but an 8-GPU node does not; the job needs larger local NVMe, fewer local shards per node, or streaming checkpoint writes.
