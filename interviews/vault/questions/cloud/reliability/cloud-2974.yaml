title: 'Fault Tolerance: Implement Checkpoint Size Calculation for Mixed-Precision Training'
scenario: You are implementing checkpointing for a 13B parameter model trained with ZeRO-2 on 64 GPUs. The model uses bf16 parameters and fp32 master weights, AdamW optimizer.
question: What are the per-rank and total checkpoint sizes for the 13B ZeRO-2 job, and do they fit within 100GB of NVMe per node?
details:
  realistic_solution: 'ZeRO-2 checkpoints replicated bf16 model parameters plus replicated fp32 master weights, while optimizer moments and gradients are sharded across the 64 ranks. Parameters: 13B * 2B = 26GB per rank. FP32 master weights: 13B * 4B = 52GB per rank. Sharded Adam momentum and variance: 2 * 13B * 4B / 64 = 1.625GB per rank. Sharded bf16 gradient buffer: 13B * 2B / 64 = 0.406GB per rank. Total per rank is about 80.0GB. Across 64 ranks the logical checkpoint writes about 5.12TB. If a node has 8 ranks, local NVMe needs about 8 * 80.0GB = 640GB per node, so it does not fit within a 100GB-per-node budget unless checkpoint shards are streamed off-node or stored on larger local disks.'
  common_mistake: |
    **The Pitfall:** Forgetting that ZeRO-2 shards optimizer state but NOT model parameters.
    **The Rationale:** Candidates assume all state is sharded under ZeRO-2, missing that all ranks still store the full bf16 parameters. They also frequently forget to account for fp32 master weights.
    **The Consequence:** Severely underestimating the per-rank checkpoint size, leading to checkpoint failures on local NVMe.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameters (bf16), 64 ranks.
    - ZeRO-2: bf16 parameters and fp32 master weights are replicated; optimizer moments and gradients are sharded.

    **Calculations:**
    - Params (bf16): 13B * 2B = 26 GB per rank.
    - FP32 master weights: 13B * 4B = 52 GB per rank.
    - Adam moments (fp32, sharded): 2 * 13B * 4B / 64 = 1.625 GB per rank.
    - Gradient buffer (bf16): 13B * 2B / 64 = 406 MB per rank.
    - Total per rank: 26 + 52 + 1.625 + 0.406 = 80.03 GB.
    - Total across all ranks: 80.03 GB * 64 = ~5.12 TB written.
    - With 8 ranks per node: 80.03 GB * 8 = ~640 GB per node.

    **Conclusion & Interpretation:**
    - **Result: About 80 GB per rank and ~640 GB per 8-GPU node.** A single rank is close to the 100GB limit, but an 8-GPU node does not fit; the job needs larger local NVMe, fewer local shards per node, or streaming checkpoint writes.
