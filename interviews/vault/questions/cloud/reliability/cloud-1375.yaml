title: Incremental Allocation Deadlock Math
scenario: A fleet orchestration system manages a shared cluster of 128 GPUs. Four distributed PyTorch training jobs are submitted simultaneously, each requiring exactly 40 GPUs. The cluster provisions GPUs incrementally using a round-robin strategy (1 GPU per pending job per cycle) until all 128 GPUs are assigned but no job reaches its 40-GPU quorum.
question: How many GPUs does each of the four jobs hold at deadlock, and how many GPUs must be preempted to break it?
details:
  realistic_solution: The system deadlocks when all 128 GPUs are allocated evenly across the 4 jobs, leaving each with 32 GPUs. Preempting 8 GPUs from one job and reallocating those GPUs to another job lets the recipient reach its 40-GPU requirement and make progress.
  common_mistake: |
    **The Pitfall:** Assuming an entire job must be preempted to resolve the deadlock.
    **The Rationale:** Engineers often default to job-level kill commands rather than calculating the exact resource deficit needed to unblock a waiting task.
    **The Consequence:** An entire 32-GPU partial allocation is needlessly killed when only 8 GPUs must be reclaimed and reassigned to let one job reach quorum.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total GPUs: 128. Demand: 4 jobs * 40 GPUs.
       - Strategy: Round-robin, 1 GPU per pending job per cycle.
    2. **Calculations:**
       - After 32 complete cycles, each job receives 32 GPUs: 32 cycles * 4 GPUs/cycle = 128 GPUs.
       - Equivalent even allocation: 128 / 4 = 32 GPUs per job.
       - Deadlock state: [32, 32, 32, 32].
       - Deficit to hit 40 GPUs: 40 - 32 = 8 GPUs.
       - Preempt 8 GPUs from one partial allocation and reassign them to another job: [24, 40, 32, 32].
    3. **Conclusion & Interpretation:**
       - **Result: Each holds 32 GPUs; reclaim and reassign 8 GPUs to break deadlock.** Once one job reaches 40 GPUs, it can run and eventually release capacity for the rest. (Resource-Bound)
