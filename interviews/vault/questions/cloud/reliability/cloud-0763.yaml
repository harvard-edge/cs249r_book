title: The Fault-Tolerant Training Framework
scenario: You're training a 175B model on 2,048 H100 GPUs for 90 days. At this scale, the mean time between failures (MTBF) for any single GPU is ~1,000 hours, but with 2,048 GPUs, the cluster MTBF is under 30 minutes.
question: What fault-tolerant training framework would achieve >95% effective utilization with 2,048 GPUs and a cluster MTBF under 30 minutes?
details:
  realistic_solution: 'Use an elastic fault-tolerant training framework in the style of TorchElastic plus FSDP/ZeRO sharded state, backed by hot spares and asynchronous distributed checkpointing. The concrete design is: (1) shard model and optimizer state so each rank can reload only its partition; (2) keep a small hot-spare pool in the same topology tier with container images, data-loader state, and latest checkpoint manifest preloaded; (3) on failure, evict the bad rank, insert a spare, restore the affected shards, and rebuild TP/PP/DP groups from a topology-aware planner; (4) overlap durable checkpoint writes with training and use frequent lightweight manifests so recovery uses the newest consistent shard set; (5) detect fail-stop and fail-slow nodes with heartbeats and NCCL/per-rank timing. This is a framework pattern, not just periodic checkpoint-restart: the goal is bounded recovery per event rather than reloading the entire 175B job.'
  common_mistake: |
    **The Pitfall:** Relying on traditional infrequent checkpoint-restart.
    **The Rationale:** Engineers use the same fault tolerance strategy that worked for 8-GPU jobs, failing to realize the math breaks at scale.
    **The Consequence:** The cluster spends more time recovering from checkpoints than actually training the model, plunging utilization below 50%.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single GPU MTBF: ~1,000 hours.
    - Cluster Size: 2,048 H100 GPUs.
    - Approximation: independent GPU failures, with each failed GPU interrupting training until recovery completes.
    - Training Duration: 90 days (2,160 hours).

    **Calculations:**
    - Per-GPU failure rate: 1 / 1,000 = 0.001 failures/hour.
    - Expected cluster failure-event rate: 2,048 * 0.001 = 2.048 failures/hour, equivalent to a mean gap of 1 / 2.048 = 0.49 hours ≈ 29 minutes between GPU failure events.
    - Expected failures in 90 Days: 2.048 failures/hour * 2,160 hours ≈ 4,424 failures.
    - Naive Restart Cost: 15 mins recovery * 4,424 = 66,360 mins = 1,106 hours lost.
    - Naive Utilization: 2,160 / (2,160 + 1,106) ≈ 66%.
    - Elastic Hot-Spare Recovery Cost: 30 sec * 4,424 = 132,720 sec = 36.9 hours lost.
    - Elastic Utilization: 2,160 / (2,160 + 36.9) ≈ 98.3%.

    **Conclusion & Interpretation:**
    - **Result: 98.3% utilization (Reliability-Bound)**. The >95% target is credible only if the architecture keeps each failure event to roughly a 30-second recovery budget with hot spares, elastic rank replacement, and sharded async checkpoints.
