title: A100 Checkpoint Interval
scenario: A distributed cluster trains a 175B model. The overall cluster Mean Time Between Failures (MTBF) is 24 hours. The team runs a tiered checkpointing scheme - fast local NVMe writes the full state in 30 seconds, then asynchronously replicates to remote cloud object storage at 5 minutes per checkpoint. Local checkpoints survive job preemption (MTBF 24 hours) but not full-rack failures (MTBF 168 hours). Remote checkpoints survive everything.
question: Using Young's formula, what is the optimal checkpoint interval for each tier and the total combined overhead?
visual:
  kind: svg
  path: cloud-4525.svg
  alt: A parabola showing minimum total overhead time at a 2-hour checkpoint interval.
  caption: Total overhead (compute lost + save time) vs checkpoint interval.
details:
  realistic_solution: 'Young: T_c = sqrt(2 * checkpoint_time * MTBF). Local tier: t_c = 30 s, MTBF (preemption) ~ 24 h = 86400 s. T_local = sqrt(2 * 30 * 86400) = 2278 s ~ 38 minutes. Remote tier: t_c = 300 s, MTBF (full-rack) ~ 168 h = 604800 s. T_remote = sqrt(2 * 300 * 604800) = 19050 s ~ 5.3 hours. Combined overhead: local 30/2278 = 1.3% + remote 300/19050 = 1.6% = ~2.9% checkpoint tax, lower than the single-tier 24h MTBF answer of 2 hours / 5 min = 4.2%. Two-tier wins because cheap local writes can be more frequent than slow remote writes.'
  common_mistake: |
    **The Pitfall:** Applying a single MTBF and single checkpoint cost to the entire system.
    **The Rationale:** Candidates fail to separate the failure domains (preemption vs. hard rack failure) and their corresponding recovery tiers.
    **The Consequence:** The checkpoint interval is either too frequent (wasting compute on slow remote writes) or too infrequent (losing too much progress on frequent preemptions).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Young's Formula: T_c = sqrt(2 * checkpoint_time * MTBF).
       - Local tier: t_c = 30s, MTBF (preemption) = 24h = 86,400s.
       - Remote tier: t_c = 300s, MTBF (rack failure) = 168h = 604,800s.
    2. **Calculations:**
       - T_local = sqrt(2 * 30 * 86400) = sqrt(5,184,000) = 2,277s ≈ 38 minutes.
       - T_remote = sqrt(2 * 300 * 604800) = sqrt(362,880,000) = 19,049s ≈ 5.3 hours.
       - Local overhead: 30 / 2277 ≈ 1.3%. Remote overhead: 300 / 19049 ≈ 1.6%.
    3. **Conclusion & Interpretation:** **Result: Compute-Optimized.** Optimal local interval is 38 minutes and remote is 5.3 hours, reducing total checkpoint overhead to ~2.9%.
