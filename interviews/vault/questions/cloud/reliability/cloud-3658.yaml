title: Resource Quota and GPU Memory Oversubscription in Kubernetes
scenario: A multi-tenant Kubernetes cluster with MI300X (192GB HBM3) GPUs has 5 teams sharing 10 GPUs. Each team requests one GPU, but actual models range from 7B (14GB) to 70B (140GB). Teams with 70B models frequently OOM-kill other tenants' pods sharing the same GPU device.
question: How would you prevent 70B MI300X workloads from OOM-killing other tenants when Kubernetes only tracks GPU count?
details:
  realistic_solution: Use AMD-compatible memory-aware placement instead of relying on integer GPU count. Advertise memory classes through the device plugin or scheduler metadata, create node pools for large-model and small-model tenants, and enforce placement with node affinity, taints/tolerations, and admission policy. Give 70B workloads exclusive access to a MI300X, keep smaller models in separate pools, and add namespace quotas so tenants cannot schedule more high-memory GPUs than their allocation.
  common_mistake: |
    **The Pitfall:** Trusting standard Kubernetes GPU resource requests to isolate workloads.
    **The Rationale:** Engineers assume a one-GPU request enforces memory boundaries, not realizing Kubernetes only tracks integer device counts unless the platform adds memory-aware scheduling.
    **The Consequence:** Constant, unpredictable OOM-kills across tenants, leading to massive instability in the serving fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X HBM3 memory: 192 GB
    - 70B model at FP16 = 140 GB
    - 7B model at FP16 = 14 GB

    **Calculations:**
    - Two 70B models = 140 GB + 140 GB = 280 GB
    - 280 GB > 192 GB (OOM inevitable)
    - A 70B workload leaves only 192 GB - 140 GB = 52 GB for other tenants before runtime overhead and KV cache.
    - A 70B model plus four 7B models would need 140 GB + (4 * 14 GB) = 196 GB before overhead, which exceeds one MI300X.
    - Safe policy: give 70B workloads exclusive MI300X placement; pack only small models whose declared memory plus overhead stays below the per-GPU budget.

    **Conclusion & Interpretation:**
    - **Result: 280 GB (Memory-Bound)**. Standard Kubernetes only schedules by device count, meaning two 140GB models assigned to a 192GB device will instantly crash with OOM.
