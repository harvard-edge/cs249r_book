title: Financial Impact of Counterfeit Transceivers
scenario: >-
  You are deploying a 1,024-GPU cluster for LLM training. Due to shortages, 256 of the 400G optical
  transceivers were sourced from an unverified vendor, with a suspected 15% counterfeit rate. Authentic
  transceivers have an MTBF of 500,000 hours; counterfeits have an MTBF of 4,000 hours. A transceiver
  failure halts an 8-GPU pod for 4 hours. Downtime costs $40 per GPU-hour.
question: >-
  What is the expected additional monthly downtime cost caused by a 15% counterfeit rate among the 256 optical transceivers?
details:
  realistic_solution: 'Identify the number of counterfeits (256 * 0.15 = 38.4, which we treat as 38 discrete components). Calculate their monthly failure rate compared to authentic ones, then multiply by the cost per failure ($1,280) to find the added financial risk.'
  common_mistake: |
    **The Pitfall:** Failing to isolate the counterfeit sub-population or missing the blast radius.
    **The Rationale:** Candidates calculate the failure rate on the entire batch incorrectly, or forget that a single component failure causes downtime for all 8 GPUs in the pod.
    **The Consequence:** Underestimating the financial risk of using unverified hardware components in distributed systems.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 transceivers with a 15% counterfeit rate (38.4, rounded to 38).
    - Counterfeit MTBF is 4,000 hours; authentic MTBF is 500,000 hours.
    - A single failure halts an 8-GPU pod for 4 hours, costing $40 per GPU-hour.
    - 1 month ≈ 730 hours.

    **Calculations:**
    - Monthly failures (counterfeit) = 38 × 730 / 4,000 = 6.935.
    - Monthly failures (authentic equivalent) = 38 × 730 / 500,000 = 0.055.
    - Extra failures = 6.935 - 0.055 = 6.88.
    - Cost per failure = 8 GPUs × 4 hours × $40/hr = $1,280.
    - Extra monthly cost = 6.88 × $1,280

    **Conclusion & Interpretation:**
    - **Result: ~$8,806 (Reliability-Bound)**. The cascade effect of a single component failing amplifies the financial risk across the pod.
