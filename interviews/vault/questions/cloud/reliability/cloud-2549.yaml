title: Optimizing Checkpoint Frequency with the Young-Daly Formula
scenario: Your manager asks why you checkpoint every 30 minutes instead of every 5 minutes during a large training run. The cluster has a Mean Time Between Failures (MTBF) of 4 hours and a checkpoint save time of 2 minutes.
question: Why checkpoint every 30 minutes instead of every 5 minutes, and what trade-off does the Young-Daly formula optimize?
details:
  realistic_solution: 'The Young-Daly formula calculates the optimal checkpoint interval: τ_opt = √(2 * δ * M) - δ. It balances two costs: (1) checkpoint overhead — saving too frequently wastes compute on I/O, and (2) rework after failure — saving too infrequently means more lost work when a failure occurs. The formula minimizes total wasted time.'
  common_mistake: |
    **The Pitfall:** Checkpointing as frequently as possible "just to be safe."
    **The Rationale:** Engineers fear losing work during crashes and assume more checkpoints equals better reliability.
    **The Consequence:** Extremely frequent checkpoints waste drastically more compute on I/O overhead than they save in prevented rework, lowering overall cluster throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Save time δ = 2 min.
    - MTBF M = 240 min (4 hours).

    **Calculations:**
    - Young-Daly formula: τ_opt = √(2 * δ * M) - δ = √(2 * 2 * 240) - 2 = √960 - 2 = 30.98 - 2 = 28.98 min.
    - 5-min interval checkpoint overhead: If each checkpoint follows 5 minutes of useful work, wall-clock overhead is 2 / (5 + 2) = 28.6%. Equivalently, checkpoint time is 2/5 = 40% of useful work time.
    - 29-min interval checkpoint overhead: 2 / (29 + 2) = 6.5% of wall-clock time.
    - A 5-min interval minimizes rework but spends too much time saving; a much longer interval saves less often but loses more work after a failure.

    **Conclusion & Interpretation:**
    - **Result: ~29 min checkpoint interval (I/O/Rework Trade-off)**. Young-Daly chooses a checkpoint interval near 30 minutes because it balances checkpoint save overhead against expected rework after failures.
