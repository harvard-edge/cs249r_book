title: 'Pod Disruption Budget Design for Zero-Downtime Model Rollouts'
scenario: 'You are rolling out a new version of a 7B inference model on A100 pods in a Kubernetes cluster. The deployment has 12 replicas serving 8000 RPS. Each replica handles ~670 RPS at 80% GPU utilization. During a rolling update, pods are terminated before new pods are ready. Two simultaneous terminations cause P99 latency to spike above SLA.'
question: 'How would you configure rolling updates so the 12-replica A100 deployment avoids P99 latency spikes during model rollout?'
details:
  realistic_solution: 'Set PodDisruptionBudget minAvailable=11 (maintain at least 11 of 12 replicas). This limits simultaneous disruptions to 1. Combined with maxSurge=1 in the RollingUpdate strategy, at most 1 old pod is terminated while 1 new pod starts. Set readinessProbe with a warmup period of 30s for new pods to load models before receiving traffic.'
  common_mistake: |
    **The Pitfall:** Setting PodDisruptionBudget minAvailable=1.
    **The Rationale:** Engineers mistakenly view minAvailable as a guarantee of service availability rather than a floor for disruption.
    **The Consequence:** Kubernetes terminates up to 11 of 12 replicas simultaneously, completely collapsing the service.
  napkin_math: |
    **Assumptions & Constraints:**
    - Replicas: 12 handling 8000 RPS (670 RPS each).
    - Target Utilization: 80%.
    
    **Calculations:**
    - 2 Terminated: 10 replicas handle 800 RPS (119% of normal load, overloading the GPUs).
    - Safe Configuration (minAvailable=11 + maxSurge=1): 11 active replicas handle 727 RPS (108% of normal load).
    
    **Conclusion & Interpretation:**
    - **Result: ~88% Utilization (Capacity-Bound)**. Utilization rises to ~88% during rollout, which is acceptable and avoids SLA-breaking latency spikes.
