title: Why Synchronous Checkpointing Breaks at 11.25-Minute System MTBF
scenario: A 175B model is training on 128 nodes. A node fails on average once every 24 hours. Synchronous checkpointing of the 2.8TB model state to an NFS takes 10 minutes.
question: Determine the system's Mean Time Between Failures (MTBF) and explain why standard synchronous checkpointing is unviable here?
visual:
  kind: svg
  path: cloud-2862.svg
  alt: A horizontal bar chart timeline illustrating the extreme overlap of checkpointing, compute, and recovery times when system MTBF is nearly equal to checkpoint duration.
  caption: Synchronous Checkpointing Overhead Profile
details:
  realistic_solution: With 128 independent nodes each failing once every 24 hours, the system MTBF is 1,440 / 128 = 11.25 minutes. A standard synchronous checkpoint that blocks all workers for 10 minutes is unviable because the checkpoint duration is nearly the same as the expected time to the next system failure. Even before adding restart and replay time, checkpointing every failure interval would leave only about 1.25 minutes of expected compute between 10-minute pauses. The practical response is to reduce checkpoint cost or exposure, for example through asynchronous, incremental, local, or hierarchical checkpointing, depending on the storage and recovery objectives.
  common_mistake: |
    **The Pitfall:** Blindly applying the Daly formula.
    **The Rationale:** Candidates plug numbers into T = sqrt(2 * C * M) without realizing the formula breaks down when checkpoint time (C) approaches system MTBF (M).
    **The Consequence:** The candidate recommends a mathematically impossible optimal checkpoint interval.
  napkin_math: |
    **Assumptions & Constraints:**
    - Node MTBF: 24 hours (1,440 minutes).
    - 128 nodes total.
    - Checkpoint write time: 10 minutes.

    **Calculations:**
    - System MTBF: 1,440 minutes / 128 nodes = 11.25 minutes.
    - Expected compute window if checkpointing every system MTBF: 11.25 min - 10 min = 1.25 min before accounting for restart or replay.
    - Blocking checkpoint fraction at that cadence: 10 / 11.25 ≈ 89%, before any recovery overhead.

    **Conclusion & Interpretation:**
    - **Result: 11.25 min system MTBF; 10-minute synchronous checkpoints are impractical.** The checkpoint write alone would consume about 89% of the failure interval if attempted at that cadence, and recovery overhead would make useful forward progress worse.
