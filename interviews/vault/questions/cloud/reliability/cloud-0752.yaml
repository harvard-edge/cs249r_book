title: Handling Spot Preemptions with Elastic Distributed Training
scenario: You're pretraining a 13B model on a cloud cluster using synchronous data parallelism. Spot instances give you between 32 and 128 GPUs at any time — nodes can be preempted with 30 seconds notice.
question: How do you handle GPUs appearing and disappearing mid-training without restarting from scratch?
details:
  realistic_solution: Use elastic distributed training rather than treating every preemption as a full job restart. TorchElastic or an equivalent rendezvous layer should detect joins/leaves, re-form process groups, rebuild DDP/FSDP shard ownership, and resume from a consistent training state. Keep the per-GPU microbatch fixed for memory stability, then adjust gradient accumulation to hold the effective global batch size constant when possible; if the global batch intentionally changes, use a batch-size-aware learning-rate and scheduler policy rather than letting it drift silently. Recovery still needs periodic persistent checkpoints for model, optimizer, RNG, dataloader, and scheduler state. Peer replication or local NVMe snapshots can speed up single-node recovery, but they are an acceleration layer, not a replacement for durable checkpoints or consistency handling when multiple workers disappear.
  common_mistake: |
    **The Pitfall:** Proposing to "just checkpoint frequently and restart with the new GPU count" from persistent storage.
    **The Rationale:** Candidates fail to calculate the devastating overhead of writing/reading checkpoints to disk, rebuilding process groups, and re-warming pipelines.
    **The Consequence:** With preemptions every ~30 minutes, the cluster spends more time restarting and reading from NFS than actually training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model with FSDP.
    - Training state estimate: FP16 params (2B), FP32 master params (4B), Adam moments (8B), gradients or shard metadata (2B) = 16 bytes/parameter.
    - Spot instances provide between 32 and 128 GPUs.
    - Cross-node peer transfer uses IB-class bandwidth, not NVLink, unless the replica is on the same node.
    - Persistent storage reload speed per job is limited by aggregate filesystem bandwidth and metadata behavior.

    **Calculations:**
    - Total training state: 13B * 16 bytes = 208 GB.
    - Per-GPU shard at 128 GPUs: 208 GB / 128 ≈ 1.63 GB.
    - Per-GPU shard at 32 GPUs: 208 GB / 32 = 6.5 GB, before framework padding and fragmentation.
    - If the target global batch is 1024 samples and per-GPU microbatch is 4, accumulation is 1024 / (128 * 4) = 2 at 128 GPUs and 1024 / (32 * 4) = 8 at 32 GPUs.
    - Peer-assisted transfer of a 6.5 GB shard over 50 GB/s IB is about 0.13s at line rate, but rendezvous, shard rebuild, consistency checks, and contention dominate.
    - Persistent checkpoint reload of the full 208 GB state over a 2 GB/s effective shared filesystem path is about 104s before metadata and startup overhead.

    **Conclusion:** Elastic training should preserve the effective batch through accumulation or explicitly adapt the optimizer schedule. Peer-assisted recovery can reduce single-failure transfer time, but durable checkpoints remain required and full recovery is usually dominated by coordination and storage, not just shard bytes.
