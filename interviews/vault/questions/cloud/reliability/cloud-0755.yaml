title: The Straggler Mitigation Problem
scenario: You're running synchronous data-parallel training of a 13B model across 1,024 H100 GPUs spanning 128 nodes. Each GPU has a 0.1% chance of being 'slow' on any given step (thermal throttling, ECC correction, noisy neighbor on shared NVSwitch).
question: What fraction of steps will have at least one straggler, and how do you mitigate this without switching to async SGD?
details:
  realistic_solution: 'The probability that *no* GPU is slow on a given step is $(1 - 0.001)^{1024} = 0.999^{1024} \approx 0.359$. So **64.1% of all steps have at least one straggler**. Mitigation strategies without async SGD: (1) **Bounded staleness** — allow the AllReduce to proceed after 99.5% of GPUs report, using stale gradients for the remaining 0.5%. (2) **Redundant computation** — run 1028 GPUs, treat 4 as hot spares, drop the slowest 4 each step. (3) **Gradient compression** — reduce the communication volume so stragglers have less data to sync. (4) **Profiling and eviction** — continuously monitor per-GPU step times, evict consistently slow GPUs and remap shards.'
  common_mistake: |
    **The Pitfall:** Thinking "0.1% per GPU is tiny — at 1024 GPUs that's maybe 1 slow GPU per step, which barely matters."
    **The Rationale:** Humans are bad at estimating compounded probabilities at scale.
    **The Consequence:** Failing to implement bounded staleness or straggler mitigation, resulting in massive multi-million dollar waste in idle GPU time during synchronous training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Probability of No Straggler (1 GPU): 1 - 0.001 = 0.999.
    - Time Cost: If a normal step is 500ms and a straggler adds 200ms.

    **Calculations:**
    - Probability of No Straggler (1024 GPUs): 0.999^1024 = 0.359.
    - Probability of >= 1 Straggler: 1 - 0.359 = 0.641 (64.1% of steps).
    - Average Step Time: (0.359 * 500) + (0.641 * 700) = 628.2ms.
    - Throughput Loss: (628.2 - 500) / 500 = 25.6% slowdown.

    **Conclusion & Interpretation:**
    - **Result: 25.6% slowdown (Synchronization-Bound)**. Failing to mitigate stragglers wastes massive amounts of cluster compute.
