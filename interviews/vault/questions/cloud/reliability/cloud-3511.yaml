title: Graceful Degradation Anomaly on TPU v5e
scenario: Your critical real-time ML inference service is deployed on TPU v5e instances. It features a graceful degradation strategy (model fallbacks, QoS shedding). During high traffic, monitoring shows a 15% latency increase and 2% relevance drop, yet health checks are green and aggressive fallbacks haven't triggered.
question: What likely explains the 15% latency increase and 2% relevance drop despite green health checks, and how would you diagnose it?
details:
  realistic_solution: 'The problem lies in the degradation logic thresholds. The current latency/accuracy degradation falls just below configured triggers. Diagnosis requires analyzing threshold configs, implementing granular user-perceived monitoring, and A/B testing tighter thresholds.'
  common_mistake: |
    **The Pitfall:** Immediately suspecting hardware issues or network saturation.
    **The Rationale:** Engineers trust health checks blindly and assume infrastructure failures, overlooking subtle graceful degradation misconfigurations.
    **The Consequence:** Chasing ghost hardware bugs instead of tuning service thresholds.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM Bandwidth limit = 1.6 TB/s.
    - 10,000 requests/sec * 100MB = 1 TB/s (Under limits).

    **Calculations:**
    - Utilization is well below 1.6 TB/s. Network/Hardware is not saturated.
    - The 15% latency / 2% accuracy degradation exists strictly in the "dead zone" below trigger thresholds.

    **Conclusion & Interpretation:**
    - **Result: Configuration-Bound (Thresholds set too high to catch subtle performance shifts).**
