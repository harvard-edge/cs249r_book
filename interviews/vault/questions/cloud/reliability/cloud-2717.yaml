title: MTBF vs Cluster MTBF
scenario: 'A GPU vendor quotes an MTBF of 100,000 hours per GPU. Your cluster has 1,000 GPUs.'
question: "With a 100,000-hour per-GPU MTBF and 1,000 GPUs, why is cluster-level MTBF dramatically lower?"
details:
  realistic_solution: 'MTBF for the cluster equals the per-component MTBF divided by the number of components (assuming independent failures and that any failure disrupts the job). Cluster MTBF = 100,000 hours / 1,000 GPUs = 100 hours. That means you should expect a GPU failure somewhere in the cluster roughly every 4 days. This is why large-scale training requires checkpointing, fault tolerance, and redundancy. The larger the cluster, the worse it gets: at 10,000 GPUs, cluster MTBF drops to 10 hours — a failure roughly every half day. This inverse scaling of reliability with cluster size is the fundamental reason distributed training systems need sophisticated fault tolerance.'
  common_mistake: |
    **The Pitfall:** Assuming the cluster is as reliable as a single GPU.
    **The Rationale:** Forgetting that in tightly coupled distributed training, any single component failure disrupts the entire job.
    **The Consequence:** Failing to implement checkpointing and fault tolerance, leading to total loss of long-running training jobs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Component MTBF = 100,000 hours.
    - Component count = 1,000 GPUs.

    **Calculations:**
    - Cluster MTBF = 100,000 hours / 1,000 GPUs = 100 hours.
    - For 10,000 GPUs, MTBF = 100,000 / 10,000 = 10 hours.

    **Conclusion & Interpretation:**
    - **Result: 100 hours Cluster MTBF (Reliability-Bound).**
