title: Applying Temperature Scaling for Overconfident Logits
scenario: A cloud-based fraud detection API processes 5,000 transactions per second. The model exhibits overconfidence, having an Expected Calibration Error (ECE) of 0.15. To safely abstain from uncertain predictions, the team implements Temperature Scaling post-processing. For a flagged transaction, the pre-softmax logits are z_fraud = 4.0 and z_not_fraud = 1.0. The temperature T calibrated on a hold-out validation set is 2.0.
question: "What is the fraud confidence before and after applying Temperature Scaling with T=2.0 to logits 4.0 and 1.0?"
details:
  realistic_solution: Divide all pre-softmax logits by the optimal temperature T=2.0 before applying the softmax function. This softens the probability distribution without changing the predicted class.
  common_mistake: |
    **The Pitfall:** Applying the temperature parameter T after the softmax function, or confusing it with Platt scaling.
    **The Rationale:** Candidates may not realize that temperature scaling works specifically by softening the logit distribution before probabilities are calculated.
    **The Consequence:** The confidence scores remain incorrectly calibrated or the predicted class is inadvertently altered, failing to fix the overconfidence issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pre-softmax logits: z_fraud = 4.0, z_not_fraud = 1.0.
    - Temperature T = 2.0.

    **Calculations:**
    - Before T=2.0: P(fraud) = e^4 / (e^4 + e^1) ≈ 54.6 / (54.6 + 2.7) = 95.3%.
    - Apply T=2.0: Logits become 4.0 / 2.0 = 2.0 and 1.0 / 2.0 = 0.5.
    - After T=2.0: P_calibrated(fraud) = e^2 / (e^2 + e^0.5) ≈ 7.39 / (7.39 + 1.65) = 81.7%.

    **Conclusion & Interpretation:**
    - **Result: Overconfidence-Mitigated**. The reported confidence drops by ~13.6%, accurately reflecting the true uncertainty without altering the class prediction.
