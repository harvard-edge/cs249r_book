title: Diagnosing High Correctable ECC Error Rates
scenario: During a 1,024-GPU distributed training run, you notice a 20% step time degradation on a subset of nodes. GPU compute utilization appears normal, but kernel launch latencies are unusually high. System logs reveal these specific GPUs are experiencing around 10,000 Single-Bit ECC errors (correctable errors) per second in their HBM3 memory.
question: "How can 10,000 correctable ECC errors/sec cause a 20% step-time slowdown, and how should it be addressed?"
details:
  realistic_solution: Recognize that high volumes of correctable errors trigger OS-level interrupts and driver logging storms. The degraded GPUs must be drained and replaced, or dynamic page retirement must be configured to offline the failing memory pages.
  common_mistake: |
    **The Pitfall:** Assuming correctable hardware ECC errors cannot impact performance.
    **The Rationale:** Candidates see the word "correctable" and assume the hardware masks the issue completely without software involvement.
    **The Consequence:** The root cause is ignored, and the 20% throughput drop is misdiagnosed as a network straggler or software bug.
  napkin_math: |
    - Error rate: 10,000 correctable errors/sec.
    - OS interrupt and logging overhead per error: ~20µs.
    - Total CPU driver stall time: 10,000 * 20µs = 200 ms per second (20% overhead).
    - **Result: The CPU is bogged down handling interrupts, delaying CUDA kernel launches and starving the GPU.**
