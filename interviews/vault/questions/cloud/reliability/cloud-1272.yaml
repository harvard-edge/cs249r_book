title: Continuous Fault Injection in Synchronous Distributed Training
scenario: You are evaluating a fault injection proposal for a 500B parameter model training on 4,096 GPUs. The natural MTBF is ~8 hours. To validate a new asynchronous checkpointing and automated redeployment system, the infra team proposes a Chaos Monkey-style system that randomly terminates 1 node (8 GPUs) every 2 hours directly in the production training job. Evaluate this proposal, comparing the trade-offs of continuous production fault injection versus targeted staging environment injection for tightly-coupled synchronous ML workloads.
question: "Should you inject random node failures every 2 hours in the 4,096-GPU production run, or test in staging, and why?"
details:
  realistic_solution: |
    Reject continuous production fault injection. In synchronous training, one node failure halts all 4,096 GPUs. Use targeted fault injection in a scaled-down staging environment (e.g., 512 GPUs) to validate recovery mechanisms. Rely on the natural 8-hour MTBF to provide sufficient empirical validation in production without artificially degrading goodput.
  common_mistake: |
    **The Pitfall:** Treating tightly-coupled synchronous ML training like stateless microservices.
    **The Rationale:** SREs assume continuous random failures via Chaos Monkey are a universally valid way to test resilience.
    **The Consequence:** Injecting faults in a synchronous cluster halts all GPUs, wasting millions of dollars in idle compute and drastically reducing training goodput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1 failure / 2 hours = 12 failures/day.
       - Recovery takes 10 minutes.
       - Cost = $10,000/hr.
    2. **Calculations:**
       - 12 failures * 10 minutes = 120 minutes (2 hours) of global downtime daily.
       - Wasted cost = 2 hours * $10,000/hr = $20,000/day.
    3. **Conclusion & Interpretation:**
       - **Result: Goodput-Bound**. Fault injection decreases training goodput by 8.3% before natural hardware failures are even accounted for, wasting massive capital.
