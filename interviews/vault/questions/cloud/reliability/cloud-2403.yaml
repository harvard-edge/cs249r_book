title: Defending Against Streaming Poisoning
scenario: A cloud cyber-security LLM is continuously fine-tuned on user-submitted phishing reports (50,000 reports/hour). Adversaries are conducting a data poisoning attack, submitting crafted benign-looking texts with malicious payloads to create a backdoor. The pipeline SLA requires updating the model weights every 30 minutes.
question: How would you defend the 30-minute fine-tuning pipeline against data poisoning in 50,000 phishing reports/hour?
details:
  realistic_solution: Implement a two-stage robust aggregation pipeline. First, use a lightweight anomaly detector that filters inputs based on embedding distance from a clean, static 'golden' dataset (k-NN distance). Second, replace standard FedAvg/SGD aggregation with a robust Byzantine-fault-tolerant aggregator like Trimmed Mean or Krum during the continuous fine-tuning step. The tradeoff here is that robust aggregators discard extreme gradient updates, which sacrifices some learning efficiency on genuine edge-case zero-day threats, but provides a mathematical guarantee against backdoor injection from a bounded percentage of malicious actors.
  common_mistake: |
    **The Pitfall:** Attempting to compute exact influence functions or do full retraining for every batch to find toxic data points.
    **The Rationale:** Candidates propose academically pure anomaly detection methods without calculating the computational overhead.
    **The Consequence:** Completely violating the 30-minute pipeline SLA due to massive, unsustainable compute requirements.
  napkin_math: |
    *   **Window Volume:** 50,000 reports/hour = 25,000 per 30-min window.
    *   **Stage 1 (Embedding):** Embedding 25k reports takes $\sim$ 5 seconds on a GPU. Computing pairwise cosine similarities against a 10k golden set = 250M ops (<1 sec).
    *   **Stage 2 (Robust Aggregation):** Trimmed Mean (removing top/bottom 10% of updates) adds $\sim$ 2 seconds of sorting overhead per weight tensor.
    *   **Defense Overhead:** Total defense latency is **<10 seconds**.
    *   **Conclusion:** Fine-tuning on clean samples takes ~20 mins. Total time = 20.2 mins, well within the 30-min SLA.
