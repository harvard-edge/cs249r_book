title: H100 Distributed Checkpointing
scenario: Training a 175B parameter model on a cluster of 1024 H100 GPUs experiences a hardware failure every few hours.
question: Apply a distributed checkpointing strategy to minimize the time spent stalling the GPUs while saving model state?
details:
  realistic_solution: Implement asynchronous, tiered checkpointing. Each rank synchronously writes its local partition of optimizer state to local NVMe or CPU RAM in seconds. A background CPU process then slowly flushes these local snapshots to persistent cloud object storage, allowing the H100s to resume training almost immediately.
  common_mistake: |
    **The Pitfall:** Performing synchronous, blocking global writes to an S3 bucket.
    **The Rationale:** It is the standard, naive default approach to persisting distributed state.
    **The Consequence:** Leaving 1024 GPUs idle for minutes at a time, crippling utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs are stalled for 5 minutes during the synchronous write.
    - Example H100 cloud price: $10 per GPU-hour.

    **Calculations:**
    - Idle GPU-hours: 1024 GPUs x (5 / 60) hours = 85.33 GPU-hours.
    - Wasted cost: 85.33 GPU-hours x $10/GPU-hour = $853.

    **Conclusion & Interpretation:**
    - **Result: roughly $850 wasted per 5-minute global stall at $10/GPU-hour.** The exact dollar value depends on the contracted H100 rate, but the unit conversion shows the cost is far above a trivial pause.
