title: API Cost and Rate Limits for Model Theft
scenario: 'You are defending a cloud-hosted LLM exposed via an API ($0.001 per 1k input tokens, $0.002 per 1k output tokens). An attacker is attempting approximate model theft by querying 5 million carefully crafted prompt-response pairs to train a surrogate model. Each prompt is exactly 100 tokens, and the responses average 400 tokens.'
question: 'What are the attacker''s total cost and sustained RPS over 7 days, and why do burst rate limits fail?'
details:
  realistic_solution: 'The extraction costs only $4,500 and requires just 8.26 RPS over 7 days. Defending against this requires long-term sliding window limits (e.g., maximum 1M tokens per day per account) and monitoring for uniform query embedding distributions.'
  common_mistake: |
    **The Pitfall:** Relying purely on short-term burst rate limits.
    **The Rationale:** Defenders often set limits to prevent immediate denial-of-service (e.g., 60 RPS per minute) rather than long-term data exfiltration.
    **The Consequence:** Allowing an attacker to easily fly under the radar with a slow, sustained low-RPS extraction attack (8.26 RPS) that succeeds entirely unnoticed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 million queries.
    - 100 input tokens/query ($0.001 per 1k).
    - 400 output tokens/query ($0.002 per 1k).
    - Attack occurs steadily over 7 days.

    **Calculations:**
    - Input Cost: (5,000,000 * 100 / 1,000) * $0.001 = $500.
    - Output Cost: (5,000,000 * 400 / 1,000) * $0.002 = $4,000.
    - Total Extraction Cost = $4,500.
    - Time in seconds: 7 days * 24 hours * 3600 seconds = 604,800 seconds.
    - Required sustained speed: 5,000,000 / 604,800 ≈ 8.26 RPS.

    **Conclusion & Interpretation:**
    - **Result: 8.26 RPS Sustained** (Burst rate limits fail because 8.26 RPS is well below typical per-minute DoS thresholds, allowing silent model extraction).
