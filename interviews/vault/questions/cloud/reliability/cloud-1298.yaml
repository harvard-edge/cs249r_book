title: Diagnosing PyTorch DDP Partial Allocation Deadlocks
scenario: A Kubernetes cluster with 500 GPUs is running distributed training jobs using PyTorch DDP. Users complain that jobs are getting stuck indefinitely, while cluster metrics show 85% GPU allocation. When you inspect the cluster, you see multiple jobs with 6 out of 8 requested pods running, but GPU compute utilization is 0% across those active pods because they are waiting to establish the NCCL communicator.
question: How do you diagnose the root cause of this resource fragmentation and resolve the cluster-wide deadlock?
details:
  realistic_solution: Diagnose the systemic failure as a partial allocation deadlock driven by a greedy scheduler. Implement Gang Scheduling (e.g., via Volcano, Kueue, or Slurm) by defining a PodGroup with `minMember` strictly equal to the total required workers. This enforces atomic, all-or-nothing scheduling, preventing jobs from hoarding partial resources.
  common_mistake: |
    **The Pitfall:** Focusing on NCCL timeout configurations or immediate node autoscaling.
    **The Rationale:** Engineers assume a networking timeout or pure capacity issue when pods are marked 'Running' but sit at 0% GPU utilization.
    **The Consequence:** The fundamental scheduling deadlock caused by piecemeal pod allocation remains unresolved, leading to continued cluster freezing as new jobs enter the queue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Scheduler: Default K8s (Greedy).
    - Workloads: PyTorch DDP requires all nodes to init NCCL before computation begins.
    - Scenario: 64 available GPUs, 10 jobs arrive requiring 8 GPUs each.

    **Calculations:**
    - Greedy allocation: scheduler gives 6 GPUs to each of 10 jobs, so 60/64 GPUs are reserved (93.75% allocation).
    - Useful training jobs under greedy allocation: 0, because every DDP job is missing 2 of its 8 required workers and waits in NCCL init.
    - Useful GPU compute utilization on those reserved GPUs: 0%, even though allocation metrics look high.
    - Gang scheduling allocation: scheduler admits 8 complete jobs with 8 GPUs each, so 64/64 GPUs are allocated to 8 running jobs.
    - Remaining demand: 2 complete jobs stay queued until another 16 GPUs are available.

    **Conclusion & Interpretation:**
    - **Result: High Allocation, 0% Useful Progress.** Partial allocation can reserve most GPUs while producing no training progress; gang scheduling converts the same 64 GPUs into 8 complete running jobs and 2 queued jobs.
