title: Kubernetes Network Policy for Secure Multi-Tenant GPU Inference
scenario: A multi-tenant inference platform on H100 Kubernetes clusters serves multiple enterprise customers. Each customer's inference pods share the same node. A security audit finds that pods can communicate with each other across namespaces, violating customer isolation requirements.
question: How would you enforce network isolation between enterprise customers' pods across Kubernetes namespaces?
details:
  realistic_solution: Implement Kubernetes NetworkPolicy to deny all ingress/egress between namespaces by default. Apply a default-deny policy per namespace, then allow only necessary egress to the load balancer and ingress from the API gateway. Use a CNI plugin that supports NetworkPolicy (Calico, Cilium) — not all CNIs enforce NetworkPolicy. Add PodSecurityAdmission to prevent privilege escalation.
  common_mistake: |
    **The Pitfall:** Relying on namespace isolation alone for security.
    **The Rationale:** Engineers assume Kubernetes namespaces act like strict tenant sandboxes.
    **The Consequence:** Any pod can reach any other pod by IP address regardless of namespace, leaving the cluster completely open to lateral movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster Scale: 10 customers * 20 pods each = 200 pods total.
    - Isolation goal: customer pods can talk to their own namespace services and the shared API gateway, but not to other customer namespaces.

    **Calculations:**
    - Without NetworkPolicy, cross-customer directed pod paths are 200 total pods * 180 pods outside the tenant namespace = 36,000.
    - With default-deny plus explicit gateway/service allow rules, cross-customer pod-to-pod paths are 0.
    - If each pod also needs up to 3 in-namespace services plus 1 gateway path, allowed operational paths are 200 * 4 = 800.

    **Conclusion & Interpretation:**
    - **Result: Cross-tenant pod paths removed (Security-Bound)**. The main win is eliminating lateral movement between customer namespaces; any CNI latency overhead should be measured in the target cluster rather than assumed.
