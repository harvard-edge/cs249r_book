title: Gradient Inversion Attacks in Federated Learning
scenario: A colleague claims that federated learning is fully private because raw data never leaves the device.
question: "Why is 'raw data never leaves the device' insufficient for privacy, and what attack vector remains?"
details:
  realistic_solution: Shared gradients explicitly leak information about the local training data. Gradient inversion attacks iteratively optimize a dummy input until its gradients match the shared gradients, allowing pixel-perfect reconstruction of training images, particularly at small batch sizes. Mitigation requires applying Local Differential Privacy (adding calibrated noise to gradients to satisfy ε-DP), implementing Secure Aggregation via cryptography, or strictly enforcing large local batch sizes to obscure individual contributions.
  common_mistake: |
    **The Pitfall:** Believing the proxy representation (gradients) contains no raw information.
    **The Rationale:** Engineers assume that because a neural network is a complex, lossy compression algorithm, the mathematical derivative cannot be reversed into the high-dimensional source image.
    **The Consequence:** Deploying "secure" federated systems that trivially leak PII, medical records, or proprietary user data to any eavesdropping server.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Attack vector: Gradient Inversion.
       - Success rate: ~95% (batch=1), ~60% (batch=8), <10% (batch≥64).
       - Differential Privacy: ε=1 noise drops model accuracy by 2-5%.
    2. **Calculations:**
       - A batch size of 1 means the gradient perfectly maps to 1 image.
       - A batch size of 64 blends the gradients of 64 images, acting as mathematical obfuscation.
       - Inversion complexity scales exponentially with batch size.
    3. **Conclusion & Interpretation:**
       - **Result: Gradients Leak Data.** The system is **Privacy-Bound** by the gradient vector; without DP noise or batch aggregation, inversion guarantees near-perfect data reconstruction.
