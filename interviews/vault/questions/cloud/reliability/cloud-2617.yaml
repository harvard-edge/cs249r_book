title: Gradient Inversion Attacks in Federated Learning
scenario: A colleague claims that federated learning is fully private because raw data never leaves the device.
question: Why is 'raw data never leaves the device' insufficient for privacy, and what attack vector remains?
details:
  realistic_solution: Shared gradients and model updates can leak information about local training data. Gradient inversion attacks optimize a dummy input until its gradients resemble the observed update, sometimes reconstructing sensitive examples, especially with small batches, overparameterized models, or weak aggregation. Mitigations include secure aggregation so the server cannot inspect individual client updates, differential privacy applied to updates with calibrated clipping/noise, and larger local batches or aggregation groups to reduce single-example signal. These mitigations reduce risk but do not make federated learning automatically private.
  common_mistake: |
    **The Pitfall:** Believing the proxy representation (gradients) contains no raw information.
    **The Rationale:** Engineers assume that because a neural network is a complex, lossy compression algorithm, the mathematical derivative cannot be reversed into the high-dimensional source image.
    **The Consequence:** Deploying "secure" federated systems that trivially leak PII, medical records, or proprietary user data to any eavesdropping server.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attack vector: gradient inversion or update leakage.
    - Risk is highest when updates expose a small number of examples or individual client gradients.
    - Reconstruction quality depends on model architecture, batch size, labels, regularization, attacker knowledge, and aggregation design.

    **Calculations:**
    - A batch size of 1 can reveal a strong single-example signal because the observed gradient is tied to one training example.
    - Larger batches and secure aggregation mix multiple examples or clients, reducing the amount an observer can attribute to one record.
    - Differential privacy adds clipping and calibrated noise to limit individual-example influence, trading some utility for privacy.

    **Conclusion & Interpretation:**
    - **Result: Gradients Can Leak Data.** Federated learning needs secure aggregation, update-level differential privacy, and careful aggregation design; "raw data stays local" is not a complete privacy guarantee.
