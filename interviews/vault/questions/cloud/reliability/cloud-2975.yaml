title: Design Fault Tolerance for a 500B Model on 2,048 GPUs
scenario: You are responsible for reliability engineering for a 3-month training run of a 500B parameter model on 2,048 GPUs. Each GPU has an expected failure rate of 1 per 150 GPU-years.
question: What fault-tolerance architecture for checkpointing, detection, recovery, and spares will keep the 500B, 2,048-GPU run above 95% uptime?
details:
  realistic_solution: Design a full architecture including async sharded checkpointing, health monitoring, a hot standby pool, automatic replacement, and proactive replacement based on ECC precursors.
  common_mistake: |
    **The Pitfall:** Treating fault tolerance exclusively as a checkpointing problem.
    **The Rationale:** Candidates focus on saving state but fail to design automated recovery mechanisms and spare node provisioning.
    **The Consequence:** Achieving high checkpoint frequency but still failing SLAs due to lengthy manual recovery times and lack of standby hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2,048 GPUs over 90 days. Failure rate: 1 per 150 GPU-years per GPU.
       - A GPU failure event removes one worker unless masked by hot spares.
       - Proactive replacement catches 70% of impending failures during maintenance with no training downtime.
       - Unexpected failures trigger automated spare activation and 2 minutes of job disruption.
    2. **Calculations:**
       - Run duration in GPU-years: 2,048 GPUs * (90 / 365) years = ~505 GPU-years.
       - Expected GPU-failure occurrences: 505 / 150 = ~3.4 GPU failures over the run.
       - Unexpected disruptive events after proactive catches 70%: 3.4 * 30% = ~1.0 event.
       - Automated recovery downtime: 1.0 event * 2 min = ~2 min = 0.0014 days.
       - Uptime from disruptive events: (90 - 0.0014) / 90 = 99.998%.
       - Hot-spare pool sizing: expected failures are low, but keep an operational buffer for correlated faults and repair lag; 8-16 spare GPUs is more defensible than sizing only to the mean.
    3. **Conclusion & Interpretation:**
       **Result: Reliability Bound. With a per-GPU rate of 1 failure per 150 GPU-years, proactive replacement, hot spares, and 2-minute automated recovery, expected uptime is far above the 95% target; the spare pool is driven by tail risk and repair logistics rather than the mean failure count.**
