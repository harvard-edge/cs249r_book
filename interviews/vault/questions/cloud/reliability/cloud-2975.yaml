title: 'Fault Tolerance: Mastery — Design Full Fault Tolerance Architecture for 1000-GPU Training'
scenario: 'You are responsible for reliability engineering for a 3-month training run of a 500B parameter model on 2,048 GPUs. The expected GPU failure rate is 1 per 150 days.'
question: "What fault-tolerance architecture for checkpointing, detection, recovery, and spares will keep the 500B, 2,048-GPU run above 95% uptime?"
details:
  realistic_solution: 'Design a full architecture including async sharded checkpointing, health monitoring, a hot standby pool, automatic replacement, and proactive replacement based on ECC precursors.'
  common_mistake: |
    **The Pitfall:** Treating fault tolerance exclusively as a checkpointing problem.
    **The Rationale:** Candidates focus on saving state but fail to design automated recovery mechanisms and spare node provisioning.
    **The Consequence:** Achieving high checkpoint frequency but still failing SLAs due to lengthy manual recovery times and lack of standby hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2,048 GPUs over 90 days. Failure rate: 1 per 150 days.
    2. **Calculations:**
       - Expected failures: 2,048 × (90 / 150) = 1,229 failures.
       - Surprise crashes (assuming proactive catches 70%): 369 failures.
       - With spares recovery time: 369 × 2 mins = 738 mins (0.51 days).
    3. **Conclusion & Interpretation:**
       **Result: Reliability Bound. Uptime is (90 - 0.51) / 90 = 99.4%, exceeding the 95% target.**
