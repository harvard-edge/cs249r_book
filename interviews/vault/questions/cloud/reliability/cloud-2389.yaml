title: Mitigating Cold Start Cascading Failures
scenario: A 30B parameter LLM service experiences a sudden traffic spike from 500 to 3,000 QPS. The Kubernetes HPA instantly scales pods from 50 to 300. However, each pod must download a 60GB weight file from S3 on startup. During this time, existing pods are overwhelmed, requests time out, and new pods are failing their readiness probes and crash-looping.
question: How would you redesign autoscaling so 60GB model weights don't make new pods crash-loop during the 3,000 QPS spike?
details:
  realistic_solution: 'Design a multi-tier weight caching and pre-fetching architecture. 1) Implement a Kubernetes DaemonSet or node bootstrap job that seeds and verifies the 60GB weights on each node''s local NVMe storage before model pods are scheduled there. 2) When pods scale up, they mount the verified hostPath cache, reducing weight load time to local disk read speeds and avoiding a thundering herd against S3. 3) Decouple the health checks: Use a startup probe to allow weight loading without failing liveness, and a readiness probe that only passes once the model is in VRAM. 4) Use request queueing and circuit breaking at the gateway to shed or delay excess traffic rather than overwhelming the baseline pods.'
  common_mistake: |
    **The Pitfall:** Increasing the readiness probe initial delay to 10 minutes to stop the crashloop.
    **The Rationale:** Trying to give the pods enough time to download the 60GB weights over a saturated network.
    **The Consequence:** The symptom is only masked. The new pods still do not serve traffic for minutes, and liveness/startup failures or resource pressure can still restart them while the existing 50 pods take down the service under the spike.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Weight file: 60GB.
       - S3 Node Bandwidth Limit: 5 Gbps = 625 MB/s.
       - Network Contention: 250 pods scaling simultaneously.
       - Local NVMe Read Speed: 3,000 MB/s.
    2. **Calculations:**
       - Ideal Network Download Time: 60 GB / 625 MB/s = 96 seconds.
       - Contended Download Time: 250 pods sharing 625 MB/s -> ~2.5 MB/s per pod -> 24,000 seconds (OOM/CrashLoop).
       - Local NVMe Load Time: 60 GB / 3000 MB/s = 20 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Cascading Failure.** Caching weights on local NVMe reduces startup time drastically and bypasses the saturated network.
