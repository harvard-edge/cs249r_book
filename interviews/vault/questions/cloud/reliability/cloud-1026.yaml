title: Continuous Fine-Tuning vs From-Scratch Retraining
scenario: 'You are evaluating a continuous training pipeline for an ad-CTR model generating $1M/day. The model suffers from concept drift, losing $5,000/day in revenue for each day it is not updated (Day 1: $0 loss, Day 2: $5k, Day 3: $10k, etc.). Currently, the model is retrained from scratch every 7 days on 32 A100 GPUs ($4/hr/GPU) for 24 hours. A proposed daily continuous fine-tuning (CFT) pipeline would update the model on the last 24 hours of data using 8 A100s for 4 hours.'
question: What architectural and modeling risks are introduced by daily CFT, and how do you quantitatively justify the decision?
details:
  realistic_solution: Adopt the daily CFT pipeline if it is guarded by validation and rollback controls, because the weekly comparison shows much larger drift savings than the added compute cost. The architecture still needs periodic from-scratch or anchor retraining on a separately justified cadence, plus holdout evaluation, embedding/vocabulary checks, and data-quality gates, because daily CFT can amplify feedback loops, model poisoning, catastrophic forgetting, and embedding drift.
  common_mistake: |
    **The Pitfall:** Focusing purely on the compute cost savings and immediate drift mitigation.
    **The Rationale:** Neglecting the long-term compounding errors associated with fine-tuning.
    **The Consequence:** Ignoring the risks of catastrophic forgetting, vocabulary drift (new user/item embeddings), and negative feedback loops that can destroy model performance over months.
  napkin_math: |
    **Assumptions & Constraints:**
    - Revenue loss is accumulated once per day according to the model age at serving time.
    - Weekly from-scratch baseline: model age over the week is 0, 1, 2, 3, 4, 5, and 6 days.
    - Daily CFT proposal: each day starts with an update from the previous 24 hours, so served-model age is bounded to about 1 day.
    - Weekly from-scratch compute = 32 * $4 * 24 = $3,072.
    - Daily CFT compute = 7 * (8 * $4 * 4) = $896/wk.

    **Calculations:**
    - Weekly drift loss = $0 + $5k + $10k + $15k + $20k + $25k + $30k = $105,000.
    - Weekly baseline total = $105,000 + $3,072 = $108,072/wk.
    - Daily CFT drift loss = 7 * $5k = $35,000/wk.
    - Daily CFT total = $35,000 + $896 = $35,896/wk.
    - Savings = $108,072 - $35,896 = $72,176/wk.

    **Conclusion & Interpretation:**
    - **Result: ~$72,176/wk savings (Drift-Bound)**. The stated numbers justify daily CFT over the weekly from-scratch-only baseline, but the periodic full-retrain cadence must be chosen and measured separately rather than inferred from this weekly cost model.
