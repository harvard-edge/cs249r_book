title: Cloud Warm Restart L2 0
scenario: 'During a 256-GPU training run, GPU #47 fails with a hardware error. Your colleague suggests cold-restarting the entire job from the latest checkpoint.'
question: 'Why is warm restart preferable to cold-restarting the 256-GPU job after GPU #47 fails, and how does it work?'
details:
  realistic_solution: 'A warm restart preserves the in-memory state (model weights, optimizer state, data loader position) on all 255 surviving workers and only replaces the failed node. The replacement node receives the latest state via high-speed network sync from a surviving peer, completely bypassing the massive disk load bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming a warm restart completely eliminates the need for persistent disk checkpointing.
    **The Rationale:** Candidates confuse in-memory peer synchronization with permanent state persistence, forgetting that full cluster power-loss still requires disk checkpoints.
    **The Consequence:** The team might disable regular checkpointing, resulting in catastrophic data loss during a multi-node or datacenter failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 256 GPUs at $2/hr each. Model: 70B.
       - NFS Load Speed: 5 GB/s. Network Sync Speed: 50 GB/s.
    2. **Calculations:**
       - Cold Restart: Load 140GB at 5 GB/s = 28s + 5 mins cluster sync = ~5.5 mins downtime.
       - Warm Restart: 1 node syncs 140GB over network at 50 GB/s = ~2.8s + 30s cluster rejoin = ~33s downtime.
       - Time Saved: ~5 minutes per failure.
       - Cost Saved: 256 GPUs × $2/hr × (5/60 hrs) = ~$42.66 per failure.
    3. **Conclusion & Interpretation:**
       - **Result: Initialization-Bound. Warm restarts bypass disk bottlenecks and massive collective re-initialization, saving ~5 minutes and ~$42 per single-node failure.**
