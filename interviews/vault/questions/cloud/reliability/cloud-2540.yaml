title: Warm Restart After Single-GPU Failure in 256-GPU Training
scenario: 'During a 256-GPU training run, GPU #47 fails with a hardware error. Your colleague suggests cold-restarting the entire job from the latest checkpoint.'
question: 'Why is warm restart preferable to cold-restarting the 256-GPU job after GPU #47 fails, and how does it work?'
details:
  realistic_solution: A warm restart is preferable because the job does not rebuild the whole 256-GPU process group from a checkpoint after one GPU fails. The replacement worker joins, receives recent state from a surviving peer or coordinated in-memory recovery path, and the job resumes from a consistent point with much less disk I/O than a cold restart. It still depends on durable checkpoints for true failure recovery; surviving workers do not eliminate checkpointing or guarantee that all training state can be reconstructed after larger failures.
  common_mistake: |
    **The Pitfall:** Assuming a warm restart completely eliminates the need for persistent disk checkpointing.
    **The Rationale:** Candidates confuse in-memory peer synchronization with permanent state persistence, forgetting that full cluster power-loss still requires disk checkpoints.
    **The Consequence:** The team might disable regular checkpointing, resulting in catastrophic data loss during a multi-node or datacenter failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 256 GPUs at $2/hr each.
       - Cold restart downtime from checkpoint reload and process reinitialization: 5.5 min.
       - Warm restart downtime for peer-assisted replacement and process-group rejoin: 0.75 min.
    2. **Calculations:**
       - Cold Restart: 5.5 min downtime.
       - Warm Restart: 0.75 min downtime.
       - Time Saved: 5.5 - 0.75 = 4.75 min per failure.
       - Cost Saved: 256 GPUs × $2/hr × (4.75/60 hrs) = ~$40.53 per failure.
    3. **Conclusion & Interpretation:**
       - **Result: Initialization-Bound. Warm restarts reduce checkpoint reload and collective reinitialization time for a single-worker failure, saving ~4.75 minutes and ~$41 per event, but durable checkpoints remain required.**
