title: The Silent ECC Degradation
scenario: Your 128-GPU cluster has been running for 14 months. You notice that one specific node consistently produces slightly different AllReduce results than other nodes. The gradient checksums diverge by 1-2 ULP every ~100 steps. Training still converges, but reproducibility tests fail. nvidia-smi shows no uncorrectable errors.
question: What hardware component is silently degrading, and when does this 'slightly different' behavior become dangerously wrong?
details:
  realistic_solution: 'The HBM on the GPUs is experiencing an elevated rate of correctable ECC errors. The correction process can stall memory access briefly, subtly changing timing. This affects the order of floating-point reductions in parallel operations, producing the 1-2 ULP divergence. Elevated correctable ECC errors are a warning signal that the device has increased risk of later uncorrectable errors, not a guarantee. Check nvidia-smi -q -d ECC for the Volatile ECC Errors: Single Bit counter and drain the node if the rate is rising.'
  common_mistake: |
    **The Pitfall:** Dismissing ULP differences as normal floating-point non-determinism.
    **The Rationale:** Candidates know FP math is non-deterministic across different topologies and falsely assume it's normal for the exact same code/hardware to diverge over time.
    **The Consequence:** The degrading HBM is ignored until it is much more likely to trigger an uncorrectable error or silent corruption in an expensive training run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal correctable ECC Error Rate: <1 per GPU per day.
    - Correction Stall: ~100 ns per event.

    **Calculations:**
    - Degraded rate: 100 errors/day on an affected page gives 100 × 100 ns = 10,000 ns/day = 10 us/day.
    - If the counter is "100+" and rising, the stall time is at least ~10 us/day; the diagnostic value is the abnormal error rate, not the aggregate performance loss.

    **Conclusion & Interpretation:**
    - **Result: >=10 us/day at 100+ events/day (Hardware-Failure-Bound)**. The brief stalls can alter execution order and produce ULP-level differences. A rising correctable-ECC rate indicates increased risk of uncorrectable errors.
