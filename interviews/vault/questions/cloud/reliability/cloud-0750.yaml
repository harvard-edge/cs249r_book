title: The Spot Instance Checkpoint Strategy
scenario: You're training a 7B model on 8x spot instances on AWS. Spot instances cost $8/hr (vs $25/hr on-demand) but can be preempted with a 2-minute warning. Your training run takes 72 hours. Checkpointing takes 3 minutes and pauses training.
question: "How often should you checkpoint to minimize wasted time, and what's the expected cost savings?"
details:
  realistic_solution: This is a classic cost-optimization problem. The optimal checkpoint interval balances the cost of checkpointing (paused training) against the expected cost of lost work (time since last checkpoint when preemption occurs). AWS spot interruption rate for GPU instances dictates a mathematically optimal balance interval.
  common_mistake: |
    **The Pitfall:** Checkpointing every step, or defaulting to hourly checkpoints like on-demand runs.
    **The Rationale:** Candidates often apply arbitrary thresholds without optimizing for the specific statistical likelihood of interruption.
    **The Consequence:** Too frequent checkpointing wastes expensive compute on I/O; too infrequent risks losing hours of work, destroying the economic advantage of spot instances.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Spot cost: $8/hr (On-demand: $25/hr).
       - Spot interruption probability: ~5%/hr.
       - Checkpoint cost (C): 3 min = 0.05 hr.
       - Training duration: 72 hr.
    2. **Calculations:**
       - Let T be the checkpoint interval.
       - Total checkpoint overhead: (72/T) * 0.05 = 3.6/T hours.
       - Expected preemptions: 72 * 0.05 = 3.6 events.
       - Expected lost work per preemption: T/2 hours.
       - Total lost work: 3.6 * (T/2) = 1.8T hours.
       - Minimize wasted time: f(T) = 3.6/T + 1.8T. Derivative f'(T) = -3.6/T^2 + 1.8 = 0.
       - Optimal Interval: T^2 = 2 -> T = 1.41 hours (~85 minutes).
       - Spot effective time: 72 + (3.6/1.41) + (1.8 * 1.41) = ~77.1 hours.
       - Cost comparison: Spot (77.1 * $8 = $617) vs On-demand (72 * $25 = $1800).
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound Optimization.** By checkpointing every 85 minutes, you minimize wasted compute and achieve a 66% cost savings ($617 vs $1,800) over on-demand pricing.
