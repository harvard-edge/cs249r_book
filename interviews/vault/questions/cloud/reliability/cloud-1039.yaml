title: Rack-Level Correlated Failures
scenario: You deploy a 64-node distributed training job requiring synchronous gang scheduling. Option A packs it into 2 racks (32 nodes/rack). Option B spreads it across 8 racks (8 nodes/rack). Independent node failure is 1%, and correlated rack failure is 5% over 14 days.
question: What is the 14-day job failure probability for packing 64 nodes into 2 racks versus spreading them across 8 racks?
details:
  realistic_solution: 'Packing the job into fewer racks minimizes exposure to correlated failures. Calculate survival probability requiring zero rack failures AND zero independent node failures.'
  common_mistake: |
    **The Pitfall:** Assuming spreading the workload improves reliability.
    **The Rationale:** Engineers apply microservice redundancy logic to gang-scheduled HPC workloads.
    **The Consequence:** Spreading increases surface area to rack-level failures, raising total job failure probability.
  napkin_math: |
    **Assumptions & Constraints:**
    - P(node safe) = 0.99^64 = ~0.526.
    - Option A: 2 racks. Option B: 8 racks. P(rack safe) = 0.95.

    **Calculations:**
    - Opt A Survival = (0.95^2) * 0.526 = 0.9025 * 0.526 = ~47.5%.
    - Opt A Failure = 100% - 47.5% = 52.5%.
    - Opt B Survival = (0.95^8) * 0.526 = 0.6634 * 0.526 = ~34.9%.
    - Opt B Failure = 100% - 34.9% = 65.1%.

    **Conclusion & Interpretation:**
    - **Result: Topology-Bound (Packing into 2 racks reduces failure probability by ~12.6%).**
