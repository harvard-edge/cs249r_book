title: How Adversarial Evasion Works
scenario: A self-driving car's vision model misclassifies a stop sign as a speed limit sign after someone places small stickers on it.
question: How do adversarial stickers make a vision model misclassify a stop sign, and why can small perturbations flip predictions?
details:
  realistic_solution: 'Adversarial evasion attacks craft small input perturbations that push the model''s internal representation across a decision boundary. Neural networks learn high-dimensional decision boundaries that are often nearly linear in local regions. A small, carefully computed perturbation (using the gradient of the loss with respect to the input) can move the representation from one side of the boundary to the other. The perturbation is optimized to: (1) change the predicted class, (2) minimize the visual change (L-infinity or L2 norm constraint). The sticker attack is a physical-world adversarial example: the stickers are placed at specific locations computed to maximally confuse the model''s learned features. This works because: the model relies on local features (edges, textures) that the stickers disrupt, and the model has no concept of ''stop sign'' as a semantic object — it is pattern-matching pixel statistics. The fundamental vulnerability: models learn shortcuts and local features, not robust semantic understanding.'
  common_mistake: |
    **The Pitfall:** Thinking adversarial examples are just optical illusions that fool humans too.
    **The Rationale:** Because humans rely on semantic understanding, it's assumed models process visual information similarly.
    **The Consequence:** This misunderstanding leads to incorrect defense strategies, as the perturbations actually exploit the model's decision boundary geometry, not human-like perception.
  napkin_math: |
    **Assumptions & Constraints:**
    - Using FGSM (Fast Gradient Sign Method) attack framework.
    - Epsilon (ε) represents the magnitude of the perturbation.

    **Calculations:**
    - Perturbation = ε * sign(∇_x Loss).
    - With ε=0.01 (a 1% pixel change), classification confidence shifts across the boundary.

    **Conclusion & Interpretation:**
    - **Result: 1% perturbation (Decision-Boundary-Bound)**. A 1% perturbation flips classification from 99% correct to 99% wrong.
