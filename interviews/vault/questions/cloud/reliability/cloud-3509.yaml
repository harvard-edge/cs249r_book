title: Google TPU v5e Inference Degradation Strategy
scenario: You are deploying a large language model (LLM) for real-time inference on a fleet of Google TPU v5e accelerators. Each TPU v5e unit boasts 16 GB of HBM, 197 TFLOPS (BF16), and a memory bandwidth of 1.6 TB/s. Due to an unexpected surge in traffic, the TPUs are operating at 95% utilization, leading to increased latency and occasional inference failures.
question: How would you gracefully degrade a TPU v5e LLM service running at 95% utilization to reduce latency and inference failures?
details:
  realistic_solution: |
    Implement a degradation ladder that removes work from the overloaded TPU path instead of trying to make the same model do more at 95% utilization. First, enforce admission control: cap queue age and outstanding tokens per TPU, return retryable overload responses for low-priority traffic, and protect high-priority requests with reserved capacity. Second, route compatible traffic away from hot TPU v5e replicas using live queue depth, accelerator utilization, HBM headroom, and error-rate signals. Third, shift eligible requests to a smaller distilled or quantized fallback model on TPU v5e with a separate latency and quality tier. Fourth, shed or defer noncritical features such as best-of-N, long context, or optional reranking when those are part of the product contract. Keep CPU fallback only for emergency, low-throughput fail-operational coverage because it will not preserve the real-time latency tier. Roll each step back automatically when utilization and P99 latency return below target.
  common_mistake: |
    **The Pitfall:** Only having a single, high-performance model with no prepared fallback options.
    **The Rationale:** Engineers optimize for the happy path, assuming autoscaling will always save them.
    **The Consequence:** When the primary system degrades under extreme load, the service completely collapses instead of offering a reduced but functional experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current TPU utilization is 95%.
    - Target steady-state utilization after degradation is 80% to restore queueing headroom.
    - Arrival rate and per-request service cost are otherwise unchanged unless traffic is shed, rerouted, or moved to a cheaper model.
    - Tail latency grows nonlinearly as utilization approaches 100%; the load target is a queueing guardrail, not a throughput average.

    **Calculations:**
    - Current normalized load = 0.95 of TPU capacity.
    - Load that must be removed to reach 80% = 0.95 - 0.80 = 0.15 of TPU capacity.
    - Required offload, cheaper-model shift, or shedding fraction of current same-cost traffic = 0.15 / 0.95 = 15.8%.
    - A 10% offload would leave utilization at 0.95 * 0.90 = 85.5%, which may still have high tail latency.
    - Under a simple M/M/1 intuition, queueing delay scales roughly with 1 / (1 - utilization): 95% gives 20x service-time wait pressure, while 80% gives 5x, so the 80% target can cut queueing pressure by about 4x.

    **Conclusion & Interpretation:**
    - **Result: About 16% same-cost load reduction for queue stabilization.** Use admission control, request shedding, dynamic routing, and smaller TPU fallback models to remove that load from the hot path; the benefit comes from restoring queueing headroom, not from a linear latency model.
