title: Managing High Metric Cardinality in Global Model Serving
scenario: You are designing metrics for a model served across 5 global regions with
  10 versions, 1000 user segments, 50 device types, and 10 response codes. The TSDB
  is struggling with OOM crashes.
question: How do you evaluate the metric design and what tradeoffs must you make to
  stabilize the TSDB without losing visibility?
details:
  realistic_solution: Shift high-cardinality dimensions (like user_segment) from metrics
    to structured logs or distributed tracing. Pre-aggregate critical dimensions at
    the collector level and limit TSDB labels to bounded global dimensions to keep
    active series manageable.
  common_mistake: '**The Pitfall:** Blindly dropping all high-cardinality labels or
    simply scaling up the TSDB RAM.

    **The Rationale:** Treating a combinatorial explosion of cardinality as a mere
    infrastructure sizing problem.

    **The Consequence:** Continued OOMs as cardinality grows, or total loss of business-critical
    metric granularity.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Cardinality: 5 * 10 * 1000 * 50 * 10 = 25,000,000 active series.

    - TSDB memory per series: ~3KB.


    **Calculations:**

    - Baseline RAM: 25,000,000 * 3KB = 75 GB.

    - Removing `user_segment` (1000x): Series drops to 25,000.

    - Optimized RAM: 25,000 * 3KB = 75 MB.


    **Conclusion & Interpretation:**

    - **Result: Memory-Bound (Cardinality Explosion).** Dropping the high-cardinality
    label reduces memory consumption by 1000x, stabilizing the TSDB.

    '
