title: Managing High Metric Cardinality in Global Model Serving
scenario: You are designing metrics for a model served across 5 global regions with 10 versions, 1000 user segments, 50 device types, and 10 response codes. The TSDB is struggling with OOM crashes.
question: How do you evaluate the metric design and what tradeoffs must you make to stabilize the TSDB without losing visibility?
details:
  realistic_solution: Keep low-cardinality, operationally actionable labels in metrics, such as region, model_version, device_type, and response_code, but move high-cardinality dimensions like user_segment to structured logs, traces, or sampled exemplars. Pre-aggregate critical cuts at the collector level and preserve a small curated segment set only when it directly drives alerts or dashboards. The tradeoff is that metrics lose arbitrary per-segment slicing, but the TSDB regains stability while detailed investigations still use logs/traces joined by request IDs.
  common_mistake: |
    **The Pitfall:** Blindly dropping all high-cardinality labels or simply scaling up the TSDB RAM.
    **The Rationale:** Treating a combinatorial explosion of cardinality as a mere infrastructure sizing problem.
    **The Consequence:** Continued OOMs as cardinality grows, or total loss of business-critical metric granularity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cardinality: 5 * 10 * 1000 * 50 * 10 = 25,000,000 active series.
    - TSDB memory per series: ~3KB.

    **Calculations:**
    - Baseline RAM: 25,000,000 * 3KB = 75 GB.
    - Moving `user_segment` out of labels (1000x) while keeping region, version, device, and response_code: Series drops to 25,000.
    - Optimized RAM: 25,000 * 3KB = 75 MB.
    - A small allowlist of critical segments can be pre-aggregated separately; arbitrary long-tail segment analysis should move to logs/traces or sampled exemplars.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Cardinality Explosion).** Removing unbounded segment labels from metrics reduces memory consumption by about 1000x while preserving actionable dimensions in metrics and shifting deep segment debugging to logs/traces.
