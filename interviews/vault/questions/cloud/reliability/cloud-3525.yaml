title: Diagnosing Stragglers in Real-time LLM Inference on AMD MI300X Cluster
scenario: Your team manages a real-time Large Language Model (LLM) inference service on a Kubernetes cluster. Monitoring shows average inference latency is stable, but p99 latency periodically spikes by 20-30%, causing intermittent service degradation. Standard GPU utilization metrics show high usage, and no hardware failure alerts have triggered. Straggler detection logs occasionally highlight individual requests taking significantly longer.
question: How would you diagnose the p99 latency spikes and quantify the reliability improvement from your fix?
details:
  realistic_solution: |
    Diagnose the tail by joining request traces with scheduler, batching, kernel, HBM, PCIe, and interconnect telemetry, then compare normal p99 windows with spike windows. Isolate causality by showing that the same request class enters a specific queue/kernel path before the p99 jump, that the added span duration explains the tail delta, and that high GPU utilization without that span does not produce the spike. In this case, affected requests show an extra 120 ms in queueing plus a memory-bound kernel path, so the fix should target batching limits and the memory-access pattern rather than generic scale-out. Report measured before/after p99: if the spiked range was 720-780 ms and the fix removes 80 ms from the traced path, the new range is 640-700 ms, a 10.3-11.1% tail reduction relative to the spike windows.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregated GPU utilization metrics and blindly scaling up the cluster to resolve capacity issues.
    **The Rationale:** Engineers often equate high utilization with compute saturation, overlooking micro-bottbottlenecks like HBM bandwidth contention or inter-GPU communication latency that plague tail latencies.
    **The Consequence:** Inflated infrastructure costs without resolving the underlying root cause, leaving the p99 latency spikes and associated customer errors unmitigated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Observed p99 spikes are 20-30% above the normal p99.
    - Use a measured baseline p99 of 600 ms during healthy periods.
    - Trace correlation shows the affected request class enters a queueing plus memory-bound kernel path before the p99 spike.
    - The added span duration on that path is 120 ms.
    - The fix removes 80 ms of that measured delay through batching and memory-access changes.

    **Calculations:**
    - Spiked p99 before fix range = 600 ms * 1.20 to 600 ms * 1.30 = 720-780 ms.
    - The traced path accounts for the low-end spike delta: 720 ms - 600 ms = 120 ms.
    - The high-end spike has 780 ms - 600 ms = 180 ms of excess, so 60 ms remains attributable to other contention or queue growth.
    - New p99 after fix range = 720-780 ms - 80 ms = 640-700 ms.
    - Tail-latency improvement = 80 ms / 720 ms to 80 ms / 780 ms = 11.1% to 10.3%.
    - Residual spike above baseline = 640-700 ms - 600 ms = 40-100 ms.

    **Conclusion & Interpretation:**
    - **Result: 640-700 ms p99 after the measured fix.** Reliability improvement should be reported from traced p99 before/after data, with the remaining 40-100 ms above baseline becoming the next diagnosis target.
