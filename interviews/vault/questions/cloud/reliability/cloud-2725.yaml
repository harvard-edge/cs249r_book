title: 'Intermittent Fault Policy Design'
scenario: 'Your 2,000-GPU cluster has ~20 GPUs showing intermittent faults (1-3 crashes/week each). Replacing all 20 costs $500K and takes a week. Options: (A) replace all 20, (B) implement a ''three strikes in 48 hours'' auto-quarantine policy, (C) add redundant hot-spare GPUs that auto-substitute on failure.'
question: 'For 20 GPUs with intermittent faults in a 2,000-GPU cluster, should you replace all, auto-quarantine after three strikes, or add hot spares?'
details:
  realistic_solution: 'Option A (replace all) is expensive ($500K) and may be overkill — some of the 20 may have rare transient faults that do not warrant replacement. You also lose a week of capacity for the replacement operation. Option B (three-strikes auto-quarantine) is the most practical: if a GPU crashes 3 times in 48 hours, it is automatically removed from the scheduling pool and flagged for hardware inspection. This catches true intermittent faults while avoiding false positives from rare transient events. Zero human intervention needed for quarantine. Cost: software development + minor capacity loss. Option C (hot-spares) is complementary but expensive: keeping 20 idle spare GPUs costs ~$500K in capital sitting unused. Best approach: implement B as the primary policy, keep 5 hot-spares (not 20) for immediate substitution of quarantined GPUs, and batch-replace confirmed bad hardware monthly.'
  common_mistake: |
    **The Pitfall:** Choosing option A (replace all) immediately.
    **The Rationale:** Candidates without operations experience assume any fault means broken hardware, not considering rare transient faults.
    **The Consequence:** Wasting significant capital ($500K) and inducing unnecessary cluster downtime (1 week) by replacing healthy GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2,000-GPU cluster, 20 GPUs with faults.
    - Option A: $500K + 1 week downtime.
    - Option C: 20 spares * $25K = $500K idle capital.

    **Calculations:**
    - B: ~$0 + auto-quarantine reduces disruption by ~90%.
    - C: 5 spares instead of 20 reduces idle capital.

    **Conclusion & Interpretation:**
    - **Result: B + 5 spares is optimal (Resource-Bound)**. Auto-quarantine avoids unnecessary replacement of healthy GPUs, saving capital and downtime.
