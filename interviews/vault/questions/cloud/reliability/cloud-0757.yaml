title: Checkpointing a 1T-Parameter Training Job
scenario: You're leading the infrastructure team for training a 1T-parameter model on a cluster of 2,000 GPUs spread across 250 nodes. Node failures occur frequently, averaging several per day. Restarting training from scratch is prohibitively expensive.
question: What fault-tolerance strategy would you design to minimize downtime for this 1T-parameter training job?
details:
  realistic_solution: 'At this scale, fault tolerance is critical and complex. A simple periodic checkpoint will likely lead to significant downtime or re-computation. A robust strategy combines several techniques: 1) Sharded checkpointing of model, optimizer, RNG, and dataloader state so each rank writes only its partition to local NVMe or a distributed checkpoint service, then asynchronously replicates to object storage. 2) Using the Young-Daly formula with the cluster-wide failure MTBF to set the checkpoint interval (about 4.6 hours if a full durable checkpoint costs about 67 minutes and 250 independent nodes create a cluster-visible failure about every 9.6 hours). 3) Implementing fail-slow detection to drain degraded nodes before they cause a hard crash. 4) Supporting elastic recovery or hot-spare replacement with ZeRO/FSDP-style re-sharding, so a failed node reloads only the affected shards instead of restarting the full 1T-parameter job.'
  common_mistake: |
    **The Pitfall:** Checkpointing at arbitrary intervals (e.g., "every 1000 steps") or writing directly to slow network storage.
    **The Rationale:** Engineers underestimate the massive checkpoint state and the high statistical probability of node failure at 2,000-GPU scale.
    **The Consequence:** The cluster either spends all its time checkpointing, or loses days of progress when failures occur between sparse checkpoints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model State: 1T parameters.
       - Cluster: 250 nodes (2,000 GPUs).
       - Node failure rate: 1% failure/day (assumed).
    2. **Calculations:**
       - State Size: FP16 weights (2 TB) + FP16 gradients (2 TB) + FP32 master weights (4 TB) + Adam FP32 moments (8 TB) ≈ 16 TB before metadata and partitioning overhead.
       - Cluster MTBF (T_MTBF): 250 independent nodes at 1% failure/day = 2.5 node failures/day -> 1 cluster-visible failure every ~9.6 hours.
       - Checkpoint Time (T_C): Saving 16 TB at 4 GB/s takes ~4,000 s ≈ 67 minutes.
       - Young-Daly Formula: Optimal Interval = √(2 * T_C * T_MTBF) = √(2 * 1.12 * 9.6) = √21.5 ≈ 4.6 hours.
    3. **Conclusion & Interpretation:**
       - Checkpointing should occur roughly every 4.5 hours to optimize training efficiency under this cluster-level failure model, with sharded async writes to keep the wall-clock pause low.
       - **Result: Optimal Checkpoint Interval ≈ 4.6 Hours**
