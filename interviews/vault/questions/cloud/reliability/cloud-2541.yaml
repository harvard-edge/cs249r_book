title: Cloud Warm Restart L3 0
scenario: Your 1024-GPU training job has a per-GPU failure rate of 1 per 2000 GPU-hours. Each cold restart
  takes 8 minutes; each warm restart takes 45 seconds. Training runs for 14 days. Calculate total downtime
  under each strategy.
question: "Over 14 days, how much downtime should the 1024-GPU job expect with cold restarts versus warm restarts?"
details:
  realistic_solution: 'Total GPU-hours: 1024 × 14 × 24 = 344,064. Expected failures: 344,064 / 2000 =
    172 failures. Cold restart: 172 × 8 min = 1,376 min = 22.93 hours. Warm restart: 172 × 0.75 min = 129
    min = 2.15 hours. Savings: 20.78 hours of training time. In GPU-hours: 20.78 × 1024 = 21,278 GPU-hours
    saved. At $2/GPU-hr: $42,556 saved. Additionally, warm restart loses only the current mini-batch on
    the failed GPU; cold restart may lose up to the checkpoint interval of work across all GPUs.'
  common_mistake: Assuming that unaffected GPUs can continue training during a warm restart. In standard synchronous training, all 1024 GPUs are blocked from advancing until the failed node is replaced, meaning every minute of wall-clock downtime wastes 1024 GPU-minutes.
  napkin_math: 'Failures: 344,064 / 2000 = 172. Cold downtime: 172 × 8 min = 1,376 min = 22.93 hrs. Warm
    downtime: 172 × 0.75 min = 129 min = 2.15 hrs. Savings: 20.78 hrs × 1024 GPUs × $2/hr = $42.5K.'
