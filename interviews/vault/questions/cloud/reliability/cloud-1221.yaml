title: Erasure Coding Storage Footprint
scenario: 'You are designing a cold storage tier for a massive 10 PB training dataset using commodity HDDs. To achieve high durability without the massive overhead of 3-way replication, you implement Reed-Solomon Erasure Coding with an RS(10, 4) scheme, splitting data into 10 data chunks and 4 parity chunks per stripe.'
question: 'How much raw storage does RS(10,4) require for 10 PB of data, and how many simultaneous drive failures per stripe can it tolerate?'
details:
  realistic_solution: 'The storage overhead for an RS(k, m) scheme is defined as (k + m) / k. For RS(10, 4), the multiplier is 1.4x. Therefore, the 10 PB dataset requires exactly 14 PB of raw storage. By definition of Reed-Solomon coding, it can survive 4 simultaneous drive failures.'
  common_mistake: |
    **The Pitfall:** Confusing erasure coding overhead with simple replication.
    **The Rationale:** Engineers used to HDFS or standard Ceph default to 3x replication (30 PB for a 10 PB dataset).
    **The Consequence:** Over-provisioning raw storage by petabytes, wasting millions in hardware and cooling costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Data: 10 PB.
    - Coding Scheme: RS(10, 4).

    **Calculations:**
    - Storage Overhead Formula: (k + m) / k = (10 + 4) / 10 = 1.4x.
    - Raw Storage Required: 10 PB * 1.4 = 14 PB.
    - Tolerable Failures: Defined by 'm', which is 4.

    **Conclusion & Interpretation:**
    - **Result: Storage-Bound**. RS(10,4) strictly requires 14 PB of raw storage and survives 4 simultaneous drive failures.
