title: Evaluate Hot Spares vs Cold Restarts for 2048-GPU Training
scenario: Warm restart requires keeping a pool of spare standby GPUs (hot spares). A 2048-GPU cluster experiences 1 failure per 1000 GPU-hours.
question: For the 2048-GPU cluster, is maintaining 16 hot spares (0.8% overhead) worth the cost compared with cold restarts?
details:
  realistic_solution: Maintaining 16 hot spares is worth the cost under the stated failure rate. Cold restarts idle the entire cluster for 8 minutes per failure, while hot-spare-enabled warm restarts reduce the penalty to 45 seconds. The avoided downtime is about $1,013/hr versus $32/hr of spare capacity, so the spare pool pays for itself by roughly 32x.
  common_mistake: |
    **The Pitfall:** Viewing spare GPUs as pure waste.
    **The Rationale:** Candidates focus only on the cost of the unused hardware, ignoring the mathematical reality of cluster-wide idle time.
    **The Consequence:** At high failure rates, refusing to pay for a tiny spare pool results in millions of dollars of wasted cluster time during synchronous cold restarts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 2048 GPUs.
    - Failure rate: 1 failure per 1000 GPU-hours.
    - Compute cost: $2/hr per GPU.
    - Cold restart penalty: 8 min. Warm restart penalty: 0.75 min.
    - Hot spares: 16 GPUs.

    **Calculations:**
    - Failures/hr: 2048 GPUs * (1 failure / 1000 GPU-hours) = 2.048 failures/hr.
    - Cold downtime cost: 2.048 failures/hr * 8 min * 2048 GPUs * $2/hr / 60 min = $1,118/hr.
    - Warm downtime cost: 2.048 failures/hr * 0.75 min * 2048 GPUs * $2/hr / 60 min = $105/hr.
    - Avoided downtime value: $1,118 - $105 = $1,013/hr.
    - Spare pool cost: 16 spares * $2/hr = $32/hr.
    - ROI: $1,013 / $32 = 31.7x.

    **Conclusion & Interpretation:**
    - **Result: 31.7x ROI (OPEX-Bound)**. Maintaining 16 hot spares provides a massive return on investment by avoiding cold restart idle time.
