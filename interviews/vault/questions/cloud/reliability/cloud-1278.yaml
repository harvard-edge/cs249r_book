title: Cloud FPGA Fault Injection Query Cost
scenario: You are evaluating a published-risk scenario for a proprietary embedding model hosted on accelerator-backed cloud inference. A malicious tenant can sometimes induce or observe transient computation faults through shared infrastructure noise, but each useful fault is rare and only statistically identifies one dense-layer parameter. The final dense layer has 4,000 x 1,000 parameters. The attacker needs 3 successful useful faults per parameter, the useful-fault success rate is 2% per inference query, and your API charges $0.0001 per query.
question: How many API requests and dollars would the attacker need to extract the 4,000x1,000 dense layer?
details:
  realistic_solution: The dense layer has 4,000,000 parameters, so the attacker needs 12,000,000 useful faults. At a 2% useful-fault rate, that requires 600,000,000 API requests. At $0.0001 per request, the direct API cost is $60,000. The scenario should be treated as a risk-budget estimate, not proof that precise remote FPGA fault injection is routinely practical.
  common_mistake: |
    **The Pitfall:** Treating a low-probability cloud fault channel as either impossible or trivially exploitable.
    **The Rationale:** Engineers may ignore statistical fault and side-channel risks, while also overestimating the precision of remote fault injection on shared accelerators.
    **The Consequence:** The risk assessment misses the actual economic question: whether the required query volume and cost make the attack credible for a high-value model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Layer Parameters: 4,000 * 1,000 = 4,000,000 parameters.
    - Required Faults: 3 faults/parameter.
    - Success Rate: 2% (0.02) per query.
    - Cost: $0.0001 per query.

    **Calculations:**
    - Total Required Faults: 4,000,000 * 3 = 12,000,000 faults.
    - Total API Queries: 12,000,000 / 0.02 = 600,000,000 queries.
    - Total Attack Cost: 600,000,000 * $0.0001 = $60,000.

    **Conclusion & Interpretation:**
    - **Result: $60,000 (Economic Viability)**. Attack costs $60,000 over 600,000,000 queries.
