title: Evaluating Proxy Metrics for Delayed-Label Drift Detection
scenario: 'A fraud detection model on EKS processes 5,000 TPS. Operational metrics (15ms latency, 55% NPU utilization) are perfect. However, a new synthetic identity fraud vector causes a silent 12% drop in precision over 3 weeks. Ground truth labels are delayed by 30-45 days. You must evaluate three proxy metric strategies to detect this silent failure within 24 hours: (A) embedding distance drift, (B) output prediction distribution shift, or (C) automated slice-based data validation.'
question: Which proxy metric strategy would detect the new synthetic fraud vector within 24 hours, and why?
details:
  realistic_solution: Implementing multivariate drift detection on the penultimate embedding layer (Strategy A). Using a fast two-sample test (like Maximum Mean Discrepancy) on a sample of embeddings isolates the new synthetic fraud cluster from natural, benign data drift.
  common_mistake: |
    **The Pitfall:** Relying solely on output prediction distribution shift (KL divergence).
    **The Rationale:** Believing that changes in the final logit predictions are the most direct proxy for model performance drops.
    **The Consequence:** This metric is highly sensitive to natural seasonal traffic volume changes, leading to massive alert fatigue and missed feature shifts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 5,000 TPS (432M daily). Base fraud rate: 1%.
    - Precision drop: 12%.
    - Output prediction shift is drowned by ±2% natural daily volume variance.

    **Calculations:**
    - Output probability shift: 12% drop on 1% fraud rate alters total mass by just ~0.12%.
    - Embedding distance (MMD test): Novel clusters shift distance by >3x the baseline variance.

    **Conclusion & Interpretation:**
    - **Result: Feature-Bound (Drift)**. The 0.12% output shift is undetectable, but the 256D embedding distance acts as a highly sensitive proxy, reliably firing an alert on just a 10,000 transaction sample.
