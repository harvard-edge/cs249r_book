title: Preemption Overhead in Long-Running Training Jobs
scenario: A 3-day LLM pre-training job on 128 GPUs is being preempted every 4 hours by higher-priority jobs. Each preemption triggers a checkpoint save and reload that takes 18 minutes (checkpoint is 1.2 TB across 128 GPUs, written to NFS). The job is completing 30% slower than scheduled.
question: How much overhead do the 4-hour preemptions and 18-minute NFS checkpoints add, and how would you reduce it?
details:
  realistic_solution: 'Switch to async distributed checkpointing: each GPU saves its shard to local NVMe in parallel (128 × ~9.4 GB = 1.2 TB / 128 nodes), then background-copy to object storage. Checkpoint time: 9.4 GB / 6.5 GB/s NVMe ≈ 1.4 seconds (vs 18 minutes). Also negotiate preemption delay with the scheduler to avoid mid-step preemptions.'
  common_mistake: |
    **The Pitfall:** Saving the full monolithic model checkpoint synchronously to a shared NFS mount.
    **The Rationale:** Candidates rely on standard file system paradigms, ignoring that NFS bandwidth (10-20 GB/s) completely serializes massive distributed checkpoint writes.
    **The Consequence:** Turning high-performance compute into I/O-bound bottlenecks, drastically increasing preemption downtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Preemption Frequency: 72h / 4h = 18 preemptions.
    - I/O Overhead per Preemption: 18 min = 0.3h.
    - Observed Time: +30% slower.

    **Calculations:**
    - Total I/O Overhead: 18 * 0.3h = 5.4h.
    - Expected Training Time: 72h + 5.4h = 77.4h (+7.5%).

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound by Warmups (Compute-Bound)**. The 18-minute NFS bottleneck contributes 7.5%, meaning the remaining 22.5% overhead comes from restart warmups; async NVMe checkpoints solve the I/O problem.
