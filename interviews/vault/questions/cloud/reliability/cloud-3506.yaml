title: Real-time Data Drift Detection for Transformer Models on NVIDIA A100 Architectures
scenario: 'You are tasked with deploying a critical, high-throughput transformer-based machine translation model in a cloud environment. You are evaluating two deployment architectures for serving: Architecture Alpha utilizes 4 GPUs in a data-parallel fashion, while Architecture Beta employs 2 GPUs with model parallelism. Both architectures must maintain an average inference latency of under 50ms and process 10,000 requests per second. Recently, upstream data sources have shown signs of potential data drift.'
question: How would you implement real-time PSI or KL drift detection for both serving architectures, and what are the trade-offs?
details:
  realistic_solution: |
    Use asynchronous sampling for both architectures so PSI/KL work stays off the 50ms serving path, but implement the collection differently. In Architecture Alpha, each of the four data-parallel GPU replicas receives independent full requests, so attach a sampler to each replica or ingress shard, compute feature histograms locally, and aggregate PSI/KL centrally with per-replica labels. This catches replica-specific routing or source drift and scales horizontally, but thresholds must account for smaller per-replica sample sizes. In Architecture Beta, the two GPUs split one model-parallel request, so sample once at the shared ingress before the split and compute drift from canonical request features or embeddings; this avoids double counting and cross-GPU synchronization, but gives less visibility into stage-specific failures unless internal activation summaries are sampled separately. In both cases, compare against time-windowed baselines, alert on sustained divergence, and trigger investigation, rollback, or retraining only after enough samples avoid noisy false positives.
  common_mistake: |
    **The Pitfall:** Running overly complex statistical checks synchronously on every inference request.
    **The Rationale:** Candidates aim for perfect detection accuracy but fail to decouple the drift detection compute path from the critical serving path.
    **The Consequence:** Adding significant latency overhead that bottlenecks the high-throughput inference pipeline, causing immediate SLA violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 req/s * 2KB/req = 20 MB/s total throughput.
    - 5% sampling rate.
    - Each sampled request contributes 50 scalar features.
    - PSI/KL histograms use 10 bins per feature and update asynchronously once per second.

    **Calculations:**
    - Sampled request rate = 10,000 req/s * 5% = 500 req/s.
    - Sampled throughput = 20 MB/s * 5% = 1 MB/s.
    - Feature-bin updates = 500 req/s * 50 features = 25,000 bin updates/s.
    - Even at 20 simple operations per update, compute is about 500,000 ops/s, far below 1 GFLOP/s on a sidecar CPU or GPU stream.
    - A once-per-second PSI pass over 50 features * 10 bins = 500 bins is negligible compared with the 50 ms serving path when run asynchronously.

    **Conclusion & Interpretation:**
    - **Result: Asynchronous sampling is overhead-light.** The trade-off is detection delay and sample fidelity, while synchronous per-request drift checks would directly consume the serving latency budget.
