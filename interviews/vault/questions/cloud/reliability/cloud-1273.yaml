title: Cluster Hard Fault MTBF Calculation
scenario: You are defining a hardware fault model for a large-scale training cluster comprising 10,000 GPUs. Historical telemetry shows that uncorrectable GPU HBM memory errors occur at a rate of 500 FIT (failures per billion device hours) per GPU, while optical transceiver hard failures occur at 2,000 FIT per transceiver. Each GPU is connected to 4 transceivers. Transient link state errors occur at 50,000 FIT but are automatically masked.
question: What is the expected cluster MTBF from hard HBM and transceiver faults for the 10,000-GPU cluster?
details:
  realistic_solution: Exclude transient errors since the fault model specifies they are masked. Aggregate the hard fault FIT rates per GPU (HBM FIT + 4 x transceiver FIT), scale by the total number of GPUs (10,000), and invert to find the cluster MTBF, which informs checkpointing frequency.
  common_mistake: |
    **The Pitfall:** Including masked transient errors in the system-level hard fault MTBF calculation.
    **The Rationale:** Candidates often indiscriminately sum all error rates or forget to multiply the individual transceiver FIT rate by the number of transceivers per GPU.
    **The Consequence:** Calculating an artificially low MTBF, leading to excessive checkpointing frequency that degrades overall training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 10,000 GPUs.
    - HBM FIT: 500 per GPU.
    - Transceiver FIT: 2,000 per transceiver (4 transceivers per GPU).
    - Transient errors are masked (ignored).

    **Calculations:**
    - Transceiver FIT (per GPU): 4 * 2,000 = 8,000 FIT.
    - Total Hard FIT (per GPU): 500 + 8,000 = 8,500 FIT.
    - Cluster FIT: 10,000 * 8,500 = 85,000,000 FIT.
    - Cluster MTBF: 1,000,000,000 hours / 85,000,000 FIT ≈ 11.76 hours.

    **Conclusion & Interpretation:**
    - **Result: ~11.76 Hours MTBF (System Reliability).** The expected cluster MTBF from hard faults is ~11.76 hours, dictating checkpointing frequency.
