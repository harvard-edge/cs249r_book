title: Cloud New 0038
scenario: Cloud clusters use thousands of GPUs, making node failures inevitable.
question: What is a heartbeat mechanism, and how does a cluster orchestrator detect a dead node?
details:
  realistic_solution: A heartbeat mechanism involves worker nodes sending regular, periodic signals (pings) to a central master or orchestrator node to indicate they are alive and functioning. If the orchestrator stops receiving heartbeats from a specific node for a predetermined timeout period, it assumes the node has failed, isolates it, and reloads the last checkpoint.
  common_mistake: |
    **The Pitfall:** Assuming hardware-level interrupts drive distributed cluster state.
    **The Rationale:** Candidates often assume the GPU itself sends a hardware-level interrupt directly to the cloud provider, rather than the distributed software framework implementing a software ping.
    **The Consequence:** Misunderstanding how orchestrators like Kubernetes or Ray manage application-level faults.
  napkin_math: |
    **Assumptions & Constraints:**
    - Heartbeat interval = 5 seconds.
    - Timeout = 15 seconds.

    **Calculations:**
    - A node failing right after a heartbeat takes up to 15 seconds to trigger a timeout.

    **Conclusion & Interpretation:**
    - **Result: 15-second discovery window (Latency-Bound)**. The entire cluster idles during this period, highlighting the overhead of application-level fault management.
