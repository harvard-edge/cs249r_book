title: Graceful Degradation for Real-time Anomaly Detection
scenario: 'You lead architecture for a real-time financial anomaly detection system on TPUs. Sudden traffic spikes frequently push the primary model beyond acceptable latency, risking dropped transactions.'
question: 'How would you design a graceful degradation strategy with dynamic fallback ladders and QoS shedding?'
details:
  realistic_solution: 'Implement a multi-tier ladder: 1. QoS Shedding: Prioritize critical transactions, adjust batch sizes. 2. Model Fallback: Switch to a 2-4GB shadow model utilizing 819 GB/s bandwidth for rapid swapping. 3. Fail-Operational: Use heuristics. 4. Fail-Safe: Halt and flag for manual review.'
  common_mistake: |
    **The Pitfall:** Designing a fallback strategy that ignores hardware characteristics.
    **The Rationale:** Candidates propose an unrealistic fallback size or ignore memory bandwidth constraints for model swapping.
    **The Consequence:** The fallback induces cascading failures instead of a smooth transition during overload.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU Bandwidth: 819 GB/s peak (assume 80% effective = 655 GB/s).
    - Primary Model: 12 GB. Fallback Model: 3 GB.
    
    **Calculations:**
    - Unload Primary: 12 / 655.2 = 18.3 ms.
    - Load Fallback: 3 / 655.2 = 4.6 ms.
    - Total Swap Overhead: 18.3 + 4.6 = 22.9 ms.
    
    **Conclusion & Interpretation:**
    - **Result: 22.9 ms context switch (Latency-Bound)**. Rapid swapping is viable if fallback model is highly compressed.
