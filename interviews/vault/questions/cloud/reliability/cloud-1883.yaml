title: Calculating Revenue Impact of Silent Feature Corruption
scenario: 'A cloud-based CTR prediction model serves 5,000 requests/sec. Infrastructure metrics are perfectly healthy, but an upstream data engineering team silently changes the `device_type` feature encoding from one-hot to ordinal. The model''s predictive performance degrades silently, causing the actual CTR to drop from 2.0% to 1.5%. The average revenue per click (RPC) is $0.50.'
question: 'What monitoring should catch this encoding change, and how much daily revenue is lost while it goes undetected?'
details:
  realistic_solution: 'Implement statistical drift detection (e.g., alerting when Population Stability Index > 0.2 on key features) and strict schema validation to catch upstream data changes instantly, preventing the ~$1M/day revenue bleed.'
  common_mistake: |
    **The Pitfall:** Assuming the ML system is healthy solely because infrastructure metrics (latency, error rates, CPU) are green.
    **The Rationale:** Engineers often ignore input feature distributions and statistical data quality once a model is deployed.
    **The Consequence:** Silent feature corruption degrades model performance and causes massive revenue loss without triggering standard operational alerts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 5,000 req/sec = 432,000,000 requests/day.
    - Lost CTR: 2.0% - 1.5% = 0.5%.
    - Revenue per click: $0.50.

    **Calculations:**
    - Lost clicks per day: 432,000,000 * 0.005 = 2,160,000 clicks.
    - Revenue loss: 2,160,000 * $0.50 = $1,080,000.

    **Conclusion & Interpretation:**
    - **Result: $1.08M daily loss (Data-Bound)**. Silent feature corruption bypasses infrastructure alerts, necessitating strict statistical drift detection.
