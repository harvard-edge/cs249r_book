title: Diagnosing NCCL Timeout in Fail-Stop Node Crashes
scenario: During a 1,024-GPU distributed training run, training suddenly hangs without completing the iteration. Node 42 experienced a catastrophic kernel panic and powered off. However, the NCCL communication ring took 30 minutes to time out and trigger a cluster-wide restart, wasting nearly $2,000 of compute.
question: Why did the fail-stop node crash take 30 minutes to surface in NCCL, and how would you configure the fabric to detect it faster?
details:
  realistic_solution: Enable PyTorch's `TORCH_NCCL_ASYNC_ERROR_HANDLING=1` and reduce the `NCCL_TIMEOUT` environment variable to an aggressive value (e.g., 60 seconds). Additionally, leverage out-of-band InfiniBand link-down signals for immediate fabric-level fail-stop detection.
  common_mistake: |
    **The Pitfall:** Assuming default TCP keepalives or orchestrator node-level heartbeats are fast enough.
    **The Rationale:** Engineers rely on slow, standard networking timeouts instead of tuning the collective communication backend specifically for distributed training failures.
    **The Consequence:** PyTorch processes remain stranded indefinitely waiting for an unresponsive NCCL rank, accumulating massive idle compute costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster size: 128 nodes (1,024 GPUs).
    - Cost: $30/hr per node = $3,840/hr ($1.06/sec) total.

    **Calculations:**
    - Wasted Compute (30m): 1800s × $1.06/s ≈ $1,908.
    - Wasted Compute (60s): 60s × $1.06/s ≈ $63.60.
    - Savings: $1,908 - $64 = $1,844.

    **Conclusion & Interpretation:**
    - **Result: Timeout-Bound**. Reducing the timeout to 60 seconds saves ~$1,844 of wasted compute per failure event.
