title: Adversarial Robustness on AMD MI300X in Cloud Deployments
scenario: Your team is deploying a critical, real-time image recognition model to a cloud environment utilizing AMD MI300X accelerators for high-throughput inference. This model is susceptible to adversarial attacks.
question: How would you design edge detection and MI300X-side defenses against adversarial perturbations, prompt injection, and side-channel attacks?
details:
  realistic_solution: 'Implement a multi-layered defense: pre-processing filters at the ingress, on-device robustness techniques on the MI300X itself, and continuous monitoring for anomaly detection. Leverage MI300X''s high memory bandwidth (5.3 TB/s) for efficient loading of diverse adversarial samples.'
  common_mistake: |
    **The Pitfall:** Over-relying on software-only defenses post-inference or neglecting hardware-specific vulnerabilities.
    **The Rationale:** Candidates treat the accelerator as a black-box compute engine, ignoring potential timing attacks or the massive I/O capability that can be harnessed for parallel defenses.
    **The Consequence:** The system remains vulnerable to sophisticated side-channel attacks targeting shared memory, or performance collapses under the weight of sequential software checks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target latency: 50ms. Detection overhead: 10ms.
    - Remaining for inference + I/O = 40ms.
    - MI300X HBM3 Bandwidth: 5.3 TB/s. Memory: 192GB.

    **Calculations:**
    - Full-HBM sweep time = 192 GB / 5.3 TB/s = 0.036 s ≈ 36 ms.
    - A single inference should move only the request tensors, model state already resident in HBM, and defense metadata; its transfer time must be measured separately from a full-memory sweep.

    **Conclusion & Interpretation:**
    - **Result: ~36 ms full-memory sweep bound.** MI300X bandwidth can support parallel checks, but the 50 ms latency target requires defense logic to avoid full-memory scans on the critical path and to budget the measured detection and inference costs together.
