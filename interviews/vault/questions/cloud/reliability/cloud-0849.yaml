title: Global Active-Active Evaluation for Fraud Detection
scenario: You are designing a stateless serving tier for a fraud detection model using A10G GPUs distributed evenly across 3 global regions (us-east, eu-central, ap-northeast). The global peak load is 60,000 QPS (20,000 QPS per region). The system has a strict 100ms p99 latency SLA for scoring.
question: Evaluate the cost and latency trade-offs of using global Active-Active versus local Active-Passive to survive one region failure under a 100ms p99 SLA.
details:
  realistic_solution: For 3 regions, surviving 1 region failure requires the remaining 2 to handle 30,000 QPS each (a 50% overprovisioning per region). However, routing 'us-east' traffic to 'eu-central' adds ~90ms of network RTT. Combined with a typical 20-30ms model inference time, this guarantees an SLA violation (110ms+). Therefore, if the 100ms SLA is inflexible during failovers, a local Active-Passive setup (requiring 100% overprovisioning locally) must be chosen despite higher compute costs.
  common_mistake: |
    **The Pitfall:** Assuming global Active-Active is strictly superior for availability without checking network physics.
    **The Rationale:** Candidates focus on compute efficiency (requiring only 50% overprovisioning) and forget the hard speed-of-light network latency penalty.
    **The Consequence:** During a failover, traffic routed cross-continent violates the strict 100ms SLA, causing widespread application timeouts.
  napkin_math: |
    - Active-Active Cost: 3 regions * 30k QPS = 90k capacity (1.5x global peak).
    - Cross-Region Failover Latency: 90ms network RTT (US to EU) + 25ms compute = 115ms (Violates 100ms SLA).
    - Local Active-Passive Cost: 3 regions * 40k QPS (20k primary + 20k standby) = 120k capacity (2.0x global peak).
    - **Conclusion: You must pay for the 2.0x overprovisioning of Local Active-Passive because cross-region physics makes Active-Active impossible under the 100ms SLA.**
