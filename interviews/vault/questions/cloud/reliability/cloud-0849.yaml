title: Global Active-Active Evaluation for Fraud Detection
scenario: You are designing a stateless serving tier for a fraud detection model using A10G GPUs distributed evenly across 3 global regions (us-east, eu-central, ap-northeast). The global peak load is 60,000 QPS (20,000 QPS per region). The system has a strict 100ms p99 latency SLA for scoring.
question: Evaluate the cost and latency trade-offs of using global Active-Active versus local Active-Passive to survive one region failure under a 100ms p99 SLA?
details:
  realistic_solution: |
    Global Active-Active is feasible in steady state if each region serves its local 20,000 QPS under the 100ms p99 SLA. To survive one region failure without shedding traffic, the remaining two regions need 30,000 QPS each, or 90,000 QPS total capacity. The catch is failover latency: sending failed-region traffic across continents can add about 90ms RTT, and with 20-30ms model inference that path exceeds 100ms. If the SLA applies during failover, use local Active-Passive capacity in each region despite the 2.0x capacity cost; if the SLA is only steady-state, Active-Active may be acceptable with explicit failover degradation, traffic shedding, or relaxed failover SLOs.
  common_mistake: |
    **The Pitfall:** Assuming global Active-Active is strictly superior for availability without checking network physics.
    **The Rationale:** Candidates focus on compute efficiency (requiring only 50% overprovisioning) and forget the hard speed-of-light network latency penalty.
    **The Consequence:** During a failover, traffic routed cross-continent violates the strict 100ms SLA, causing widespread application timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 global regions, 60k QPS global peak.
    - Normal load is 20k QPS per region.
    - 100ms p99 SLA.
    - Model inference is ~25ms p99.

    **Calculations:**
    - Steady-state Active-Active capacity: 3 * 20k = 60k QPS.
    - N-1 Active-Active capacity: remaining 2 regions must handle 60k QPS, so each needs 30k QPS; total provisioned capacity = 3 * 30k = 90k QPS (1.5x global peak).
    - Cross-region failover latency: 90ms RTT + 25ms compute = 115ms, which violates a strict 100ms failover SLA.
    - Local Active-Passive capacity: each region has 20k active + 20k local standby = 40k QPS; total = 3 * 40k = 120k QPS (2.0x global peak).

    **Conclusion & Interpretation:**
    - **Conclusion: Active-Active is efficient and valid for steady state, but cross-region failover violates a strict 100ms failover SLA.** If the SLA applies during failover, pay for 2.0x local Active-Passive; otherwise document degraded failover behavior or traffic shedding for the 1.5x Active-Active design.
