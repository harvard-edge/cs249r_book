title: Scaling Randomized Smoothing Certification
scenario: You are deploying an ML-based transaction fraud detection service on AWS EC2 (p4d.24xlarge, 8x A100 40GB) to process high-value financial transfers. You must implement randomized smoothing to provide certified robustness against L2-norm adversarial perturbations (radius R=0.5). Your base ResNet-50-equivalent model has an unbatched inference latency of 15ms. To achieve the required 99.9% certification confidence bound, the smoothing algorithm demands N=10,000 Gaussian-perturbed inferences per request.
question: How should you serve N=10,000 randomized-smoothing inferences under a 250ms P99 synchronous SLA?
details:
  realistic_solution: |
    Do not promise synchronous randomized-smoothing certification under this SLA unless you first benchmark a path that can complete all 10,000 perturbed forward passes within 250ms P99. The stated 15ms unbatched latency and 8x A100 host are not enough to justify that guarantee: the service would need to sustain about 40,000 perturbed inferences per second per request, including batching, dispatch, aggregation, and tail-latency overhead. A defensible production design is to serve the base prediction synchronously and compute the certificate asynchronously or offline, or to relax the SLA/certification parameters. If synchronous certification is mandatory, the answer must be a measured distributed inference implementation with P99 evidence, not a scheduling assertion.
  common_mistake: |
    **The Pitfall:** Treating certified robustness as purely a training-time property.
    **The Rationale:** Ignoring the operational requirement that randomized smoothing requires thousands of forward passes *at inference time*.
    **The Consequence:** Proposing sequential processing or single-GPU architectures that catastrophically violate the strict real-time latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unbatched latency: 15ms. N=10,000 perturbed inferences needed.
    - SLA: 250ms P99. Hardware: 8x A100 GPUs.

    **Calculations:**
    - Sequential Latency: 15ms * 10,000 = 150 seconds.
    - Required throughput for one certified request: 10,000 / 0.250s = 40,000 perturbed inferences/s.
    - Per-GPU target on 8 GPUs: 40,000 / 8 = 5,000 perturbed inferences/s/GPU, plus dispatch and aggregation overhead.
    - The given 15ms unbatched latency only implies ~67 inferences/s if run serially; it does not establish that a 1,250-sample batch per GPU meets P99.

    **Conclusion & Interpretation:**
    - **Result: synchronous feasibility is not demonstrated (SLA-Bound)**. With the stated assumptions, the safe answer is to decouple certification from the synchronous path or change the SLA/certification requirement; batching alone does not prove the 250ms P99 target.
