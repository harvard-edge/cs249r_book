title: 1024-GPU Training Restart vs 64-GPU Rack Repair
scenario: Your 1024-GPU training job experiences a ToR switch failure in one of 16 racks, killing 64 GPUs. You can either (A) restart from checkpoint on remaining 960 GPUs or (B) wait ~30 min for rack repair. Training processes 100 samples/s across 1024 GPUs.
question: After losing one 64-GPU rack, should you restart on 960 GPUs or wait 30 minutes for repair, and what is the break-even time?
details:
  realistic_solution: 'Option A: 960 GPUs at ~93.75% original throughput = 93.75 samples/s. Checkpoint restore takes ~5 min, so useful work resumes at degraded throughput after minute 5. Option B: wait 30 min idle, then resume at the full 100 samples/s. Define T as the remaining training horizon measured from the outage decision point. The break-even equation is (T - 5) x 93.75 = (T - 30) x 100, so T = 405 minutes (6.75 hours). If more than 405 minutes remain from the decision point, restarting immediately on 960 GPUs completes more work; for shorter remaining runs, waiting for repair can be better.'
  common_mistake: |
    **The Pitfall:** Always waiting for full repair rather than restarting on a degraded cluster.
    **The Rationale:** Candidates often intuitively feel that running at full capacity is optimal, ignoring the massive opportunity cost of idle time.
    **The Consequence:** Unnecessary idle time that extends the total training time, reducing overall cluster efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Define T as remaining training time in minutes from the outage decision point, not after either delay has already elapsed.
    - Option A (restart): 5 min restore, then 960/1024 = 93.75% throughput = 93.75 samples/s.
    - Option B (wait): 30 min idle repair, then 100 samples/s.

    **Calculations:**
    - Completed work by time T under Option A: (T - 5) * 93.75 samples/s.
    - Completed work by time T under Option B: (T - 30) * 100 samples/s.
    - Break-even: (T - 5) * 93.75 = (T - 30) * 100.
    - 93.75T - 468.75 = 100T - 3000.
    - 6.25T = 2531.25.
    - T = 405 minutes = 6.75 hours from the outage decision point.

    **Conclusion & Interpretation:**
    - **Result: Breakeven time T is 405 minutes from the decision point.** Restart on 960 GPUs if the remaining run is longer than 6.75 hours; otherwise waiting 30 minutes for full repair may complete sooner.
