title: Fraud Detection Silent Failure Investigation
scenario: 'A fraud detection model deployed on 50 instances processes 10,000 transactions/second. All infrastructure metrics show a perfectly healthy system. However, customer support tickets for blocked legitimate transactions have spiked by 400% over the last 72 hours.'
question: 'What root causes could explain the complaint spike despite healthy infrastructure, and how would you detect them systematically?'
details:
  realistic_solution: 'Implement statistical monitoring of input feature distributions (e.g., Population Stability Index or Kullback-Leibler divergence) and track delayed business metrics (like chargebacks or support tickets). The root cause is likely upstream data pipeline schema changes causing null features or concept drift from a new seasonal purchasing trend.'
  common_mistake: |
    **The Pitfall:** Focusing purely on infrastructure health or assuming a code bug.
    **The Rationale:** Candidates fail to recognize that ML models can fail silently due to data drift or upstream pipeline changes.
    **The Consequence:** Wasting time debugging healthy microservices while ignoring a massive increase in false positives.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 req/sec.
    - 0.1% increase in False Positive Rate (FPR) due to data drift.

    **Calculations:**
    - Daily volume: 10,000 req/sec * 86,400 sec/day = 864,000,000 requests/day.
    - Impact: 864,000,000 * 0.001 = 864,000 incorrectly blocked transactions/day.

    **Conclusion & Interpretation:**
    - **Result: A microscopic 0.1% FPR degradation blocks ~1M legitimate transactions (Reliability-Bound)**.
