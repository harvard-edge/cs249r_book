title: Graceful Degradation for LLM Inference on AMD MI300X
scenario: 'A financial services company deploys a large language model (LLM) for real-time fraud detection on a cluster of AMD MI300X accelerators. During peak periods, load spikes push GPUs to their limits, causing critical inference requests to time out.'
question: How would you design a graceful degradation ladder for MI300X fraud detection, including fallbacks, fail-safe/fail-operational modes, and QoS shedding?
details:
  realistic_solution: |
    The solution involves a multi-tier degradation ladder:
    1. **Normal Operation (L0):** Serve the primary FP16 LLM.
    2. **Mild Congestion (L1):** Switch to a quantized INT4 version of the same LLM, significantly reducing memory footprint and increasing throughput.
    3. **High Congestion (L2):** Fall back to a smaller, pre-trained distilled LLM (e.g., 7B parameters) to maintain core fail-operational functionality.
    4. **Extreme Congestion (L3):** Route requests to a highly optimized heuristic model or a cached 'no fraud detected' default as a fail-safe measure.
  common_mistake: |
    **The Pitfall:** Relying solely on horizontal scaling or queuing requests without quality degradation.
    **The Rationale:** Candidates treat inference as an "all-or-nothing" service rather than a flexible computational workload.
    **The Consequence:** Unbounded latency spikes or complete service failure during traffic bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 70B Model: ~140GB VRAM.
    - INT4 70B Model: ~35GB VRAM.
    - Fallback 7B FP16 Model: ~14GB VRAM.
    - MI300X Memory Bandwidth: 5.3 TB/s.

    **Calculations:**
    - Single-batch FP16 70B read takes 140 GB / 5.3 TB/s = ~26.4 ms per token.
    - INT4 70B read takes 35 GB / 5.3 TB/s = ~6.6 ms per token.
    - Fallback 7B FP16 read takes 14 GB / 5.3 TB/s = ~2.6 ms per token.

    **Conclusion & Interpretation:**
    - **Result: 2.6 ms/token (Memory-Bound)**. Falling back to a 7B model provides roughly 10x lower latency than the primary 70B FP16 model.
