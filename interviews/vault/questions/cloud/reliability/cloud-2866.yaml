title: 'Alert Volume Capacity'
scenario: 'A model-serving platform has 180 microservices, each deployed in all 4 regions. Each service gets three alerts for P99 latency, error rate, and memory pressure.'
question: 'How many alert time series result from 3 alerts across 180 services in 4 regions, and what is the operational risk?'
details:
  realistic_solution: 'The system creates 3 x 180 x 4 = 2,160 alert time series. That may be reasonable if alerts are well tuned, but noisy thresholds can overwhelm on-call engineers. The design needs grouping and severity rules.'
  common_mistake: |
    **The Pitfall:** Adding alerts everywhere without budgeting for operational load.
    **The Rationale:** Engineers prioritize "observability" but fail to calculate the exponential growth of time series and the resulting alert fatigue.
    **The Consequence:** On-call engineers are overwhelmed by noisy thresholds and begin ignoring critical alerts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 metrics per service.
    - 180 services total.
    - 4 regions deployed.

    **Calculations:**
    - Alert Time Series = 3 * 180 * 4 = 2,160.

    **Conclusion & Interpretation:**
    - **Result: 2,160 series (Scale-Bound)**. The exponential growth of time series creates severe operational load and alert fatigue.
