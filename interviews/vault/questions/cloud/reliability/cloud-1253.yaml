title: Evaluating Topologies for Cross-Rack Redundancy
scenario: You are designing the deployment topology for a distributed embedding lookup service spanning 120 nodes. The service requires 99.99% availability. Your datacenter has 10 racks available, each with a top-of-rack (ToR) switch connected to the spine. Power is distributed such that racks 1-5 share Power Distribution Unit (PDU) A, and racks 6-10 share PDU B.
question: Should you uniformly spread active replicas across all 10 racks, or strictly isolate primary/replica clusters to specific PDU boundaries?
details:
  realistic_solution: |
    Designate PDU A and PDU B as explicit failure domains. Ensure every data shard has at least one replica strictly in PDU A and one in PDU B, consciously trading higher cross-PDU write latency for survival from a single-PDU outage. For a 99.99% availability target, also verify quorum and degraded-mode policy: two replicas split across PDUs preserves data, but write availability during a PDU outage may require a third replica, witness, or explicit failover mode.
  common_mistake: |
    **The Pitfall:** Placing replicas uniformly across all racks without considering the higher-level power topology.
    **The Rationale:** Engineers rely on purely random or rack-aware anti-affinity placement, assuming the rack ToR switch is the largest single point of failure.
    **The Consequence:** A correlated PDU failure instantly wipes out 50% of the nodes. Under random two-replica placement, the shards with both replicas in the failed PDU become unavailable, while shards with one replica on each PDU survive.
  napkin_math: |
    **Assumptions & Constraints:**
    - 120 nodes total, 60 nodes in PDU A.
    - 2 replicas placed uniformly at random.

    **Calculations:**
    - Prob(first replica in PDU A) = 60/120.
    - Prob(second replica in PDU A) = 59/119.
    - Prob(both replicas in PDU A) = (60/120) * (59/119) = 24.8%.
    - If PDU A fails, those both-in-A shards are unavailable; both-in-B shards survive that specific failure. Symmetrically, a PDU B failure would make the both-in-B shards unavailable.

    **Conclusion & Interpretation:**
    - **Result: Correlated Failure Domain.** Uniform random placement leaves about one quarter of shards vulnerable to whichever PDU they were accidentally co-located on. PDU-aware placement with one replica in each PDU eliminates total shard loss from any single-PDU outage, but the 99.99% service objective still depends on quorum, routing, and write behavior while one PDU is down.
