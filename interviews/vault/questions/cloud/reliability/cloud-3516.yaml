title: Graceful Degradation for GenAI on AMD MI300X
scenario: You are tasked with deploying a mission-critical, low-latency Generative AI inference service that utilizes a large sparse mixture-of-experts model on AMD MI300X accelerators. The service currently serves user requests with an SLA of 99.9% of responses under 200ms. During peak load or unforeseen network congestion, you observe intermittent latency spikes exceeding the SLA and occasional partial HBM memory errors on individual accelerators.
question: How would you gracefully degrade the sparse MoE service under latency spikes or HBM errors while preserving reliability and resource efficiency?
details:
  realistic_solution: |
    Use a hardware-aware sparse MoE degradation ladder keyed to MI300X health, HBM headroom, expert load, and P99 latency. For latency spikes, first reduce max active experts or route to cheaper expert sets for low-priority traffic, cap context/output length where the product allows it, and shrink batch/token admission so queues drain under the 200ms SLA. For HBM errors, mark the affected accelerator partially degraded, stop placing full MoE replicas on it, and either run a reduced expert set that fits the remaining HBM or drain it from primary traffic. Route requests away from replicas with bad HBM pages, high correctable-error rates, or overloaded experts, while keeping healthy replicas on the full-quality path. If pressure persists, move eligible traffic to a smaller sparse or quantized fallback model with explicit quality labeling. CPU fallback should be last-resort control-plane continuity, not the normal low-latency tier. Recovery should require a clean health window before restoring full expert count and batching.
  common_mistake: |
    **The Pitfall:** Implementing a binary fail-over strategy (full model vs. total outage).
    **The Rationale:** Candidates fail to design for partial hardware degradation, assuming either the GPU works perfectly or it must be evicted.
    **The Consequence:** They cause abrupt and total losses of service quality instead of leveraging remaining compute capacity via a smooth degradation ladder.
  napkin_math: |
    **Assumptions & Constraints:**
    - One loaded model replica serves multiple concurrent requests through batching.
    - Full MoE replica on MI300X: 100 GB resident HBM, plus 12 GB temporary KV/activation memory per concurrent request.
    - Degraded MoE replica with fewer active/resident experts: 60 GB resident HBM, plus 10 GB temporary KV/activation memory per concurrent request.
    - Partial HBM failure leaves 120 GB usable HBM on an impaired accelerator.

    **Calculations:**
    - Full model headroom after loading = 120 GB - 100 GB = 20 GB.
    - Full model concurrent requests = floor(20 GB / 12 GB) = 1 request.
    - Degraded model headroom after loading = 120 GB - 60 GB = 60 GB.
    - Degraded model concurrent requests = floor(60 GB / 10 GB) = 6 requests.
    - If latency, expert hot spots, or compute limits cap the degraded tier below 6 requests, adaptive batching should use the lower measured limit.

    **Conclusion & Interpretation:**
    - **Result: Fewer resident experts can keep an impaired MI300X useful.** Degradation increases HBM-limited concurrency from 1 to up to 6 requests on the impaired accelerator, while routing and batching must still enforce the measured latency and error limits.
