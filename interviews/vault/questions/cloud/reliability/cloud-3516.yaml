title: Graceful Degradation for GenAI on AMD MI300X
scenario: You are tasked with deploying a mission-critical, low-latency Generative AI inference service that utilizes a large sparse mixture-of-experts model on an accelerator. The service currently serves user requests with an SLA of 99.9% of responses under 200ms. During peak load or unforeseen network congestion, you observe intermittent latency spikes exceeding the SLA and occasional partial HBM memory errors on individual accelerators.
question: How would you gracefully degrade the sparse MoE service under latency spikes or HBM errors while preserving reliability and resource efficiency?
details:
  realistic_solution: 'A realistic solution would involve a multi-tiered degradation ladder, triggered by specific metrics: 1. QoS Shedding: Implement priority queues, dropping lower-priority requests or increasing their queue times when latency exceeds a soft threshold. 2. Model Fallbacks (Tiered): Define multiple versions of the model. Level 1: A slightly smaller sparse model (e.g., fewer experts active or pruned) that fits within reduced HBM capacity (e.g., if partial HBM failure) and requires less FP16 compute. Level 2: A highly optimized, quantized (e.g., INT8) or distilled version, significantly smaller and faster, potentially even runnable on a subset of the cores or a CPU if necessary. 3. Fail-operational Design: Ensure the system continues to process requests, even at reduced quality, by re-routing traffic to healthy accelerators or leveraging degraded ones with smaller models. 4. Adaptive Batching/Inference: Dynamically adjust batch sizes and parallelism based on real-time load,
    HBM utilization, and compute utilization to maximize throughput within latency targets. Robust monitoring with dynamic, configurable thresholds (e.g., p99 latency, HBM temperature, error rates) would automatically trigger transitions between these degradation levels. This approach diagnostically targets bottlenecks (HBM capacity, compute, bandwidth) with specific fallbacks.'
  common_mistake: |
    **The Pitfall:** Implementing a binary fail-over strategy (full model vs. total outage).
    **The Rationale:** Candidates fail to design for partial hardware degradation, assuming either the GPU works perfectly or it must be evicted.
    **The Consequence:** They cause abrupt and total losses of service quality instead of leveraging remaining compute capacity via a smooth degradation ladder.
  napkin_math: |
    **Assumptions & Constraints:**
    - One loaded model replica serves multiple concurrent requests through batching.
    - Full MoE replica: 100 GB resident HBM, plus 12 GB temporary KV/activation memory per concurrent request.
    - Degraded MoE replica: 60 GB resident HBM, plus 10 GB temporary KV/activation memory per concurrent request.
    - Partial failure leaves 120 GB usable HBM.

    **Calculations:**
    - Full model headroom after loading = 120 GB - 100 GB = 20 GB.
    - Full model concurrent requests = floor(20 GB / 12 GB) = 1 request.
    - Degraded model headroom after loading = 120 GB - 60 GB = 60 GB.
    - Degraded model concurrent requests = floor(60 GB / 10 GB) = 6 requests.
    - If latency or compute limits cap the degraded tier below 6 requests, adaptive batching should use the lower measured limit.

    **Conclusion & Interpretation:**
    - **Result: Degradation increases HBM-limited concurrency from 1 to up to 6 requests on the impaired accelerator.** The capacity model depends on one shared resident replica, not one full model copy per request.
