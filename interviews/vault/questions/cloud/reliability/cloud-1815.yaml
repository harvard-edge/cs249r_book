title: Diagnosing Runaway Generation from Prompt Injections
scenario: An LLM-based summarization service deployed on 4x A100 GPUs experiences a sudden p99 latency degradation from 1.2s to over 5s. Ingress metrics show the request rate (50 req/s) and input token lengths (avg 500) are perfectly stable. You suspect an adversarial prompt injection attack is bypassing input filters and causing runaway generation.
question: "Using only runtime output monitoring metrics, how do you diagnose this root cause and differentiate it from normal heavy usage?"
details:
  realistic_solution: Analyze the streaming token generation lengths and logprob entropy. Adversarial outputs often exhibit lower average logprobs (higher perplexity) and frequently hit the maximum token limit. An alert on the ratio of requests hitting the max_new_tokens limit combined with an entropy threshold definitively isolates the attack without reading raw text.
  common_mistake: |
    **The Pitfall:** Relying on expensive secondary LLM-based classifiers to evaluate the incoming text prompts or outputs for malicious intent.
    **The Rationale:** Candidates default to "AI to monitor AI" solutions, not realizing that adding another LLM in the critical path drastically worsens an already degraded latency state.
    **The Consequence:** The system becomes even slower, and the secondary classifier might fail or OOM under the attack load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline load: 50 req/s, 100 avg output tokens.
       - Adversarial attack: 10% of traffic (5 req/s), hitting max limit of 1,000 tokens.
       - Cluster peak serving capacity: 8,000 tokens/s.
    2. **Calculations:**
       - Baseline token generation: 50 * 100 = 5,000 tokens/s.
       - New load: (45 * 100) + (5 * 1,000) = 4,500 + 5,000 = 9,500 tokens/s.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The injection attack exceeds the cluster's token generation capacity (9,500 > 8,000), causing queue buildup and massive latency spikes.
