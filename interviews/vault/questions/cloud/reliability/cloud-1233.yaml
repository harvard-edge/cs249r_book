title: AllReduce Fault Propagation Overhead
scenario: You are building an error model to evaluate fault propagation in a 2000-GPU distributed training cluster. Fault-injection tests show each GPU experiences a transient error (e.g., bit flip) once every 10,000 hours. Your error model assumes an unmitigated error corrupts the local gradient, which AllReduce instantly propagates to all GPUs, forcing a rollback. The job checkpoints every 5 hours, and checkpoint recovery takes 30 minutes.
question: What total wall-clock time is needed to achieve 1,000 hours of effective training progress under this fault model?
details:
  realistic_solution: Calculate the cluster-wide MTBF, determine the expected number of failures over the target progress time, and multiply by the average downtime (half the checkpoint interval plus recovery time) to find total overhead.
  common_mistake: |
    **The Pitfall:** Neglecting to aggregate the per-GPU error rate to the cluster level.
    **The Rationale:** Engineers focus on the impressive 10,000-hour MTBF of an individual GPU.
    **The Consequence:** They forget that synchronous AllReduce causes a localized fault to halt all 2,000 GPUs, leading to drastically underestimated cluster downtime and failed delivery schedules.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2,000 GPUs, individual MTBF = 10,000 hours.
       - Checkpoint interval = 5 hours, recovery = 0.5 hours.
       - Target progress = 1,000 hours.
    2. **Calculations:**
       - Cluster MTBF: 10,000 hours / 2000 GPUs = 5 hours.
       - Total Errors Expected: 1000 hours progress / 5 hours MTBF = 200 errors.
       - Penalty per Error: Avg 2.5 hours lost + 0.5 hours recovery = 3 hours per error.
       - Total Wasted Time: 200 errors * 3 hours = 600 hours wasted.
       - Total Wall-Clock Time: 1000 hours progress + 600 hours wasted = 1600 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Reliability Bottleneck.** Synchronous AllReduce scales individual faults globally, resulting in 1600 hours of wall-clock time for 1000 hours of progress.
