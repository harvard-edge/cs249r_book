title: Fault-Tolerant Ring All-Reduce over Flaky 400Gbps InfiniBand
scenario: You are designing a resilient gradient synchronization architecture for a Ring All-Reduce setup training a 50B model over unreliable 400Gbps IB links, where link flaps are causing frequent stalling and cluster timeouts.
question: How would you make Ring All-Reduce gradient synchronization resilient to flaky 400Gbps IB links for a 50B model?
details:
  realistic_solution: |
    Keep the collective semantics explicit: every gradient bucket is reduced over the same live rank set, and a bucket is committed only after all ranks acknowledge the same sequence number. Build two logical rings over disjoint IB paths when the fabric permits it, stripe small buckets across them, and retry a failed bucket on the alternate ring after a short timeout. If a link remains unhealthy, pause at a bucket boundary, re-form the process group with the same membership but a new ring order that avoids the bad link, then resume from the last committed bucket. For repeated failures, checkpoint the step and either drain the bad node or restart with a smaller rank set; do not pretend arbitrary SDN packet rerouting preserves NCCL collective correctness.
  common_mistake: |
    **The Pitfall:** Hardcoding the Ring All-Reduce topology.
    **The Rationale:** Assuming a single intermittent link forces all 100GB of gradients to be discarded and triggers a full epoch restart.
    **The Consequence:** Frequent job stalling and severe utilization drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50B parameters (100GB gradients).
    - Network: 400Gbps (50GB/s).

    **Calculations:**
    - Ideal single-link lower bound: 100 GB / 50 GB/s = 2.0 seconds.
    - Micro-bucket transfer time: 100 MB / 50 GB/s = 0.002 seconds = 2 ms, ignoring collective protocol overhead.
    - A 10 ms link flap can interrupt about 10 ms / 2 ms = 5 such buckets on that path. With per-bucket sequence numbers and a redundant ring, only uncommitted buckets on the failed path need retrying; committed buckets are not replayed.

    **Conclusion & Interpretation:**
    - **Result: Bucket-Level Retry, Not Magic Rerouting (Network-Reliability Bound).** Micro-chunking limits recovery to the buckets affected during the flap, while membership changes occur only at safe collective boundaries.
