title: 'Optimal Checkpoint Frequency for LLM Training'
scenario: 'You are training a 100B parameter LLM. The total checkpoint size is 1.6 TB. Your training cluster is connected to a shared object storage system with an effective aggregated write bandwidth of 80 GB/s. The cluster experiences hardware failures with a Mean Time Between Failures (MTBF) of 24 hours.'
question: 'What is the optimal checkpointing interval for a 1.6TB checkpoint, 80GB/s writes, and 24-hour MTBF?'
details:
  realistic_solution: 'Apply Young''s formula (T = sqrt(2 * Tc * MTBF)) to balance the guaranteed time spent writing checkpoints against the probabilistic time wasted recalculating lost work after a failure.'
  common_mistake: |
    **The Pitfall:** Arbitrarily choosing a checkpoint interval like "every epoch" or "every hour".
    **The Rationale:** Engineers often pick round numbers or rely on defaults without mathematically balancing the I/O overhead against the expected compute loss from failures.
    **The Consequence:** This leads to either excessive storage I/O (if checkpointing too often) or massive losses of compute time upon failure (if checkpointing too rarely).
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint Size: 1.6 TB.
    - Bandwidth: 80 GB/s.
    - MTBF: 24 hours (86,400 seconds).
    
    **Calculations:**
    - Checkpoint Time (Tc): 1600 GB / 80 GB/s = 20 seconds.
    - Young's Formula (T): sqrt(2 * Tc * MTBF).
    - T = sqrt(2 * 20 * 86,400) = sqrt(3,456,000) = 1,859 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: ~31 minutes (Reliability-Bound)**. Young's formula mathematically balances the guaranteed I/O write cost against the probabilistic compute loss.
