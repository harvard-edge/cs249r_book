title: Predicting Model Degradation Thresholds
scenario: A large-scale CTR prediction system is subject to continuous data drift. At deployment, the model accuracy is 88.0%. Historical metrics indicate an absolute accuracy degradation of 0.15% per day. The business SLA mandates an accuracy strictly above 85.0%. Retraining the model from scratch requires exactly 24 hours on a dedicated cluster costing $32/hour total.
question: When must retraining start to keep accuracy above 85.0%, and what is the annual compute cost of that retraining cadence?
details:
  realistic_solution: Calculate the total allowable degradation (88.0% - 85.0% = 3.0%). Divide by the daily decay rate (3.0% / 0.15%) to find the absolute breach point at 20 days. Subtract the 1 day of training time to find the trigger point (Day 19). Calculate the per-cycle cost and extrapolate to an annual figure.
  common_mistake: |
    **The Pitfall:** Calculating the time to breach the SLA but failing to subtract the training lead time.
    **The Rationale:** Engineers often schedule retraining at the exact moment the threshold is hit.
    **The Consequence:** The system operates below the SLA for the 24 hours it takes the new model to train, violating business requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Initial accuracy: 88.0%. SLA minimum: 85.0%.
       - Degradation rate: 0.15% per day.
       - Retraining time: 24 hours (1 day).
       - Cost per hour: $32.
    2. **Calculations:**
       - Allowable drop = 88.0% - 85.0% = 3.0%.
       - Days to breach = 3.0% / 0.15% per day = 20 days.
       - Trigger retrain = 20 days - 1 day (training time) = Day 19.
       - Cost per retrain = 24 hours * $32/hour = $768.
       - Annual cost = (365 / 19) * $768 = 19.21 * $768 = $14,753.68.
    3. **Conclusion & Interpretation:**
       - **Result: SLA-Bound.** Retraining must start on Day 19 to avoid an SLA breach, costing ~$14,754 annually.
