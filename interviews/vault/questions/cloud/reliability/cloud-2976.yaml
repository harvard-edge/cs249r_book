title: 'Fault Tolerance: Optimize Checkpoint Write Throughput on Lustre Filesystem'
scenario: 'Your 256-GPU H100 training job writes checkpoints to a Lustre filesystem at only 15 GB/s (measured) vs the theoretic 200 GB/s peak. Each checkpoint is 140GB and takes 9.3 seconds.'
question: 'Diagnose the Lustre bottleneck and explain how to tune it to reach at least 120 GB/s?'
details:
  realistic_solution: 'Common Lustre bottlenecks: (1) Default stripe count = 1 (single OSS) → fix: stripe across all OSSs. (2) All ranks writing at the same time with lock contention on MDT. (3) Small I/O requests (4KB vs optimal 64MB). Profile with lfs and iostat.'
  common_mistake: |
    **The Pitfall:** Blaming network bandwidth automatically.
    **The Rationale:** Engineers assume slow storage writes are purely a network constraint.
    **The Consequence:** Wasting time debugging network fabrics without profiling whether the bottleneck is metadata ops, stripe misconfiguration, or node-level I/O serialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 140 GB.
    - Current speed: 15 GB/s (9.3 seconds).
    - Target speed: >120 GB/s.
    - Cluster: 256 GPUs.

    **Calculations:**
    - Default Lustre config (stripe=1): Workload bottlenecks on a single Object Storage Server (OSS).
    - Optimal config (`lfs setstripe -c 32`): Stripes data across 32 OSSs.
    - Theoretical peak: ~200 GB/s.
    - Checkpoint chunks per GPU (64MB stripe): 140 GB / 256 GPUs = 547 MB/GPU -> 8.5 large IO ops per GPU.
    - Tuned checkpoint time (at 120 GB/s): 140 GB / 120 GB/s = 1.17 seconds.

    **Conclusion & Interpretation:**
    - **Result: Storage-IO Bound**. Striping the file across 32 OSSs with large 64MB requests eliminates metadata lock contention, accelerating checkpoint saves by 7.9x.
