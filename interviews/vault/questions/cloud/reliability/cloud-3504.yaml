title: 'TPU-Powered Recommendation System: Diagnosing Data & Concept Drift'
scenario: 'You are operating a critical real-time recommendation system, deployed on a cluster of Google TPU v5e devices, each with 16 GB HBM, 197 TFLOPS BF16, and 819 GB/s memory bandwidth. Recently, you''ve observed a significant drop in recommendation quality, despite no changes to the model architecture or code. Your initial telemetry shows increased inference latency and a noticeable shift in the input data distribution compared to the training data. The model is consuming terabytes of streaming data daily. You must analyze and diagnose the root cause of this performance degradation, specifically considering data drift, concept drift, and potential training-serving skew given the high-throughput, low-latency requirements.'
question: 'How would you diagnose the recommendation quality drop on TPU v5e, distinguishing data drift, concept drift, and training-serving skew at scale?'
details:
  realistic_solution: 'Implement a multi-stage drift detection pipeline. For real-time monitoring, use lightweight, sampling-based statistical tests (e.g., A/B testing on input features, simplified PSI, or population stability index) on a dedicated, scalable monitoring service (e.g., Google Cloud Dataflow, Pub/Sub with custom metrics) that can process data streams in parallel to the TPU inference. For deeper analysis, periodically run more computationally intensive methods (e.g., KL divergence, adversarial validation, or maximum mean discrepancy) on batch samples of data, potentially leveraging separate compute resources like GPUs or larger CPU clusters. Utilize feature stores for versioning data and ensuring consistency between training and serving. Integrate drift alerts with automated model retraining/revalidation workflows to maintain model reliability.'
  common_mistake: |
    **The Pitfall:** Ignoring the computational overhead of continuous statistical monitoring on high-volume data streams.
    **The Rationale:** Failing to distinguish between the requirements of batch analytics and real-time inference latency limits.
    **The Consequence:** Delayed detection, resource contention on inference infrastructure, and misdiagnosed problems due to conflating data drift with concept drift.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data volume: 100,000 QPS * 1 KB = 100 MB/s = 360 GB/hour.
    - A 512-dim KL divergence test takes 100ms (10 tests/sec per CPU core).

    **Calculations:**
    - Continuously testing all incoming data is computationally impossible without massive CPU clusters.
    - A 0.1% random sampling approach reduces data volume to 360 MB/hour.

    **Conclusion & Interpretation:**
    - **Result: 360 MB/hour (Compute-Bound)**. Sampling requires only a fraction of a CPU core to monitor periodic windows efficiently, preventing inference infrastructure bottlenecks.
