title: 'Graceful Degradation on NVIDIA A100: Adapting to Load Spikes'
scenario: 'Imagine you''re managing a real-time inference service deployed on an NVIDIA GPU. This service powers a critical fraud detection model, processing high-volume transactional data with a target latency of <50ms. During peak periods, your incoming request rate unexpectedly surges, pushing the GPU close to its FP16 capacity and saturating its memory bandwidth, leading to increased inference latency and potential service degradation.'
question: How would you design graceful degradation for an overloaded GPU fraud model using fallbacks, fail-operational modes, and QoS shedding?
details:
  realistic_solution: |
    A robust solution involves a multi-tiered degradation ladder:
    1. **QoS Shedding**: Route non-critical features to a lower-priority queue.
    2. **Model Fallback**: Dynamically switch from the full-fidelity model to a smaller, faster fallback model.
    3. **Dynamic Precision**: Switch from FP16 to INT8 quantization to reduce computational load.
    4. **Fail-Operational**: Prioritize 'best effort' fraud scores within latency limits instead of rejecting transactions.
    5. **Proactive Monitoring**: Trigger degradation proactively based on utilization thresholds.
  common_mistake: |
    **The Pitfall:** Simply scaling out compute resources or implementing a blunt fail-fast mechanism.
    **The Rationale:** Engineers often rely on auto-scaling without considering immediate cost, or reject traffic without maintaining service.
    **The Consequence:** Missing critical fraud events or causing a complete service outage during traffic spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary model uses 50% capacity for 1000 inf/sec.
    - Fallback model uses 10% capacity.
    
    **Calculations:**
    - Theoretical throughput of fallback: 100% / 10% * 1000 = 10,000 inf/sec.
    
    **Conclusion & Interpretation:**
    - **Result: 10,000 inf/sec (Compute-Bound)**. Switching to fallback increases maximum inference throughput by 5x.
