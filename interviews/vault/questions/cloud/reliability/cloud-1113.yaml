title: Evaluating DLQ Architectures for High-Throughput Streams
scenario: A high-throughput ML feature pipeline ingests 100,000 events/sec (2KB per event) from a Kafka topic. An upstream schema change caused a 0.5% serialization failure rate. Currently, the pipeline drops entire batches on partial failure, breaching the 5-second feature freshness SLA.
question: Which DLQ strategy—synchronous Postgres, asynchronous Kafka, or stdout logging—meets the 5-second freshness SLA, and why?
details:
  realistic_solution: Routing failed events asynchronously to a secondary Kafka DLQ topic. This decouples failure handling from the critical path and easily sustains the required throughput without impacting the 5-second SLA.
  common_mistake: |
    **The Pitfall:** Choosing synchronous writes to a relational database for the DLQ.
    **The Rationale:** Candidates treat DLQ errors like low-volume application logs rather than high-throughput stream processing anomalies.
    **The Consequence:** Introducing blocking I/O that creates massive backpressure, halts the main ingestion pipeline, and violates freshness SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100,000 events/sec * 0.5% failure = 500 failed events/sec.
    - Event size: 2 KB.
    - Postgres insert latency: 5 ms/insert.

    **Calculations:**
    - Data volume: 500 * 2 KB = 1 MB/sec.
    - Synchronous Postgres: 500 inserts * 5 ms/insert = 2,500 ms to process 1s of failures.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound.** Postgres bottlenecks the consumer and destroys the 5s SLA, whereas async Kafka handles 1 MB/sec instantly.
