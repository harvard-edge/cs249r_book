title: Diagnosing OOD Overconfidence
scenario: You are debugging a cloud-based diagnostic vision system (ResNet-152) deployed on GPUs. While test set accuracy is 95%, the system routes 10,000 requests/hour and recently failed silently by classifying out-of-distribution (OOD) images (e.g., ultrasound instead of X-ray) with >99% softmax confidence. This skips the human-in-the-loop fallback. The system has a strict P99 latency budget of 200ms per request (current inference latency is 40ms).
question: "How do you diagnose the root cause of this overconfidence and what calibration technique resolves it without requiring a full retraining cycle or violating the latency constraint?"
details:
  realistic_solution: Diagnose the issue as neural networks producing uncalibrated, extreme logits for OOD data which the softmax function exponentially amplifies. The solution is Temperature Scaling, an O(1) post-processing layer that divides logits by a learned temperature T (e.g., T=4). This widens the softmax distribution, pushing OOD confidence below a 90% human-fallback threshold with <1us of added latency, while Deep Ensembles would multiply inference cost by 5x and violate the latency budget.
  common_mistake: |
    **The Pitfall:** Proposing Deep Ensembles to fix neural network overconfidence in a high-throughput, latency-bound system.
    **The Rationale:** Blindly applying a mathematically sound uncertainty technique without measuring its drastic hardware and latency costs.
    **The Consequence:** Multiplying inference latency by 5x, immediately violating the 200ms strict SLA and overwhelming the server.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA: 200ms P99 latency.
       - Current Latency: 40ms.
       - Deep Ensembles (M=5) Cost: 5x inference time.
    2. **Calculations:**
       - Original Softmax (Logits [10, 2]) = [~0.9996, ~0.0003].
       - Temperature Scaling (T=4) Logits = [2.5, 0.5] -> Softmax [~0.88, ~0.12].
       - Deep Ensemble Latency = 40ms * 5 = 200ms (borderline/fails SLA).
       - Temp Scaling Latency = 40ms + <1ms = ~40ms.
    3. **Conclusion & Interpretation:**
       - **Result: ~40ms Latency (Compute-Bound Avoidance).** O(1) Temperature Scaling calibrates OOD predictions without the 5x compute penalty of ensembles, staying well within SLA.
