title: Drift Detector Window Sizing
scenario: A recommender service handles 5 million events/hour. A drift detector compares embedding-distance histograms per region. You need at least 100,000 events per region per window for stable estimates across 20 regions, and detection latency must be under 30 minutes.
question: Can a 30-minute window provide 100,000 events per region for 20 regions at 5M events/hour?
details:
  realistic_solution: A 30-minute window contains 2.5M events. Uniformly across 20 regions, that is 125K events per region, which meets the 100K requirement. Per-region detection is feasible if traffic is roughly balanced; if region distribution is skewed, low-traffic regions need longer windows or pooled alerts.
  common_mistake: |
    **The Pitfall:** Relying solely on global event volume to justify sample sizes.
    **The Rationale:** Candidates divide the total numbers evenly, ignoring that real-world regional traffic is highly skewed.
    **The Consequence:** Implementing a fixed 30-minute window that triggers false positive drift alerts in low-traffic regions because they fail to hit the statistical stability threshold.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Global Rate: 5M events/hr.
       - Window: 30 minutes (0.5 hr).
       - Regions: 20.
    2. **Calculations:**
       - Events per Window: 5M * 0.5 = 2.5M events.
       - Uniform Regional Average: 2.5M / 20 = 125,000 events/region.
    3. **Conclusion & Interpretation:**
       - **Result: Statistically Viable.** 125K > 100K target, but regional skew means low-traffic shards will systematically trigger false positives if strictly partitioned.
