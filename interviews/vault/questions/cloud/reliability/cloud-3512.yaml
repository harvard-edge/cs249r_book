title: Graceful Degradation for Large Language Models on AMD MI300X
scenario: You are leading the MLOps team for a critical online service powered by an LLM deployed on AMD MI300X accelerators. The service experiences highly variable traffic patterns and occasional transient hardware issues. You must design a degradation ladder, incorporate model fallbacks, ensure fail-operational behavior, and strategically shed quality-of-service to maximize user retention and revenue.
question: How would you implement a degradation ladder and model fallbacks to maintain LLM service functionality under extreme stress on MI300X accelerators?
details:
  realistic_solution: "A realistic solution would involve a multi-layered degradation ladder. This could include: \n1. **Early Request Prioritization/Shedding:** High-priority requests get preferential treatment; lower-priority or less critical features (e.g., summarization vs. core Q&A) are shed first by returning a simplified response or an error.\n2. **Batch Size Reduction:** Dynamically reducing the inference batch size on the MI300X to reduce memory pressure and compute requirements, thereby maintaining throughput for a larger number of individual requests, albeit with slightly increased per-request latency. \n3. **Model Quantization/Pruning:** On-the-fly switching to a slightly quantized (e.g., FP16 to INT8, utilizing sparse compute capabilities if applicable for the model's sparsity patterns) or a smaller, pruned version of the LLM that still fits within the 192 GB HBM3, offering faster inference with a minor quality dip. \n4. **Fallback Models:** If the primary MI300X cluster is severely degraded or unresponsive, routing requests to a much smaller, pre-warmed, lower-fidelity LLM running on a general-purpose CPU cluster or a different, less stressed GPU cluster. \n5. **Caching Aggressively:** Increasing cache hit rates for common queries or intermediate results to reduce the load on the LLM.\nMonitoring and observability are key to trigger these degradation steps effectively based on MI300X utilization (HBM3 usage, compute utilization, memory bandwidth), latency, and error rates. Fail-operational is maintained by always attempting to return *some* response, even if it's a 'reduced quality' or 'simplified' answer, rather than a hard error."
  common_mistake: |
    **The Pitfall:** Implementing a binary failure model or overly simplistic degradation like generic rate limiting.
    **The Rationale:** Lack of granular control and failure to define specific metrics for different degradation steps.
    **The Consequence:** Unnecessary service outages or poor user experience, failing to leverage the massive HBM capacity to host graceful fallback models.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary model: 100 GB HBM3, 10 req/s throughput.
    - Fallback model: 50 GB HBM3, 20 req/s throughput.
    - Traffic mix: 50% high-priority, 50% low-priority.
    - MI300X capacity: 192 GB HBM3 (both models fit simultaneously).

    **Calculations:**
    - Shedding 20% of low-priority: mix becomes 5 parts high, 4 parts low.
    - Batch execution time (5 primary + 4 fallback): (5 / 10) + (4 / 20) = 0.5s + 0.2s = 0.7 seconds per 9 requests.
    - Sustained degraded throughput: 9 requests / 0.7s = 12.85 req/s.

    **Conclusion & Interpretation:**
    - **Result: Throughput-Bound**. Utilizing a smaller fallback model for lower-priority traffic increases cluster throughput by ~28.5% (10 to 12.85 req/s) while staying within the HBM limit.
