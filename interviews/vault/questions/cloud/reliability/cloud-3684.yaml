title: Multi-Tenant GPU Scheduling with SLO Guarantees
scenario: You operate a shared cluster with 200 GPUs. Tenant A (30% of cluster) requires latency-sensitive inference with a strict p99 < 50ms SLO. Tenant B (70% of cluster) runs best-effort batch training jobs.
question: How would you design a scheduling system to guarantee Tenant A's SLO while maximizing Tenant B's GPU utilization?
details:
  realistic_solution: Reserve capacity for Tenant A based on measured per-instance p99 latency and throughput, then isolate it with dedicated GPUs or valid MIG profiles such as 1g.10gb, 2g.20gb, 3g.40gb, or 7g.80gb depending on the GPU type and model footprint. Tenant B can use the remaining capacity, but only with preemption or hard quotas so it cannot consume Tenant A HBM, SM, or network headroom. Scale and shed load using p99 latency, queue depth, and saturation signals, not p95 alone.
  common_mistake: |
    **The Pitfall:** Using standard time-sliced GPU sharing for both tenants.
    **The Rationale:** Candidates assume time-slicing provides sufficient isolation without realizing the impact of memory contention and context switching on latency.
    **The Consequence:** Tenant B's large training batches consume HBM bandwidth, causing Tenant A's inference kernels to stall and violate the 50ms SLO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster size: 200 GPUs.
    - Tenant A nominal share: 30% = 60 GPU-equivalents.
    - Tenant B nominal share: 70% = 140 GPU-equivalents.
    - Tenant A SLO: p99 < 50 ms.

    **Calculations:**
    - Baseline reservation: 200 × 0.30 = 60 GPUs or equivalent MIG capacity for Tenant A.
    - Batch tenant capacity starts at 200 - 60 = 140 GPUs, then expands only when Tenant A measured demand is below its reservation.
    - If Tenant A p99 approaches 50 ms, preempt or throttle Tenant B before Tenant A queues build; p95 < 40 ms is not sufficient to prove a p99 SLO.

    **Conclusion & Interpretation:**
    - **Result: Isolation and Control Bound.** The guarantee comes from measured p99 capacity, hard isolation, and preemption policy; MIG is one implementation option, not a mathematical requirement by itself.
