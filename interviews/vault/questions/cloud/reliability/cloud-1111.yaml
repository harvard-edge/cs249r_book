title: DLQ Storage and Reprocessing Provisioning
scenario: A real-time ML feature ingestion pipeline processes 100,000 events per second, with each event payload averaging 2KB. A strict schema validation step rejects 0.5% of incoming events, routing them to a Dead Letter Queue (DLQ).
question: What DLQ storage is required per 24-hour period, and what repair-job throughput is needed to drain a 24-hour backlog in a 4-hour window?
details:
  realistic_solution: |
    Calculate the daily rejected event count (43.2 million), multiply by the event payload size to find the total daily storage (86.4 GB), and divide the total accumulated events by the maintenance window in seconds to find the required drain throughput (3,000 events/sec).
  common_mistake: |
    **The Pitfall:** Failing to accurately convert time windows (4 hours to seconds) or missing the base-10 to base-2 storage conversions.
    **The Rationale:** Engineers often perform back-of-the-envelope math without writing out the full units, leading to order-of-magnitude errors.
    **The Consequence:** The fallback cluster is massively under-provisioned, causing the repair job to fail its maintenance window and dropping critical feature data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100,000 events/sec, 2KB/event.
    - 0.5% rejection rate to DLQ.
    - Drain window: 4 hours (14,400 seconds).

    **Calculations:**
    - Daily events: 100,000 * 86,400 = 8.64 billion.
    - Rejected events: 8.64B * 0.005 = 43.2 million.
    - Daily storage: 43.2M * 2KB = 86.4 GB.
    - Repair throughput: 43.2M / 14,400 sec = 3,000 events/sec.

    **Conclusion & Interpretation:**
    - **Result: 86.4 GB/day and 3,000 events/sec repair rate (Drain-Throughput-Bound)**. The DLQ requires modest storage, but recovery depends on saturating the 3,000 events/sec drain rate.
