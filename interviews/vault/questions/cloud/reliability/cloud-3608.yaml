title: Power Distribution Unit Redundancy for H100 Training Cluster
scenario: A 512-GPU training cluster runs jobs lasting 14 days. Each node (8x GPUs) draws 12kW peak. You are designing the power distribution architecture. You need to choose between 2N redundancy vs N+1 redundancy for PDUs, considering cost, stranded capacity, and failure impact.
question: For a 512-GPU 14-day training cluster, should the PDU architecture use 2N or N+1 redundancy, and why?
details:
  realistic_solution: N = 64 nodes × 12kW = 768kW. With 48kW PDUs, the load needs 16 active PDUs. N+1 installs 17 PDUs, so one failed PDU can be absorbed and the spare capacity is 48/768=6.25% of load. 2N installs two complete 16-PDU paths, or 32 PDUs, leaving 50% of installed PDU capacity idle. PDU MTBF ≈ 500,000 hours; P(single PDU failure during a 14-day job) ≈ 14×24/500000 = 0.067%. If a failed transfer causes a full rerun, the energy-equivalent rerun cost is 768kW×336h×$0.10=$25,805, so expected loss is about $17 per job before accounting for checkpoint recovery. The incremental 15 PDUs and stranded power for 2N are far larger, so choose N+1 with redundant feeds/ATS or UPS ride-through verified to keep nodes powered during transfer; use 2N only where transfer cannot be made non-disruptive.
  common_mistake: |
    **The Pitfall:** Recommending 2N redundancy simply because "training jobs are critical and expensive."
    **The Rationale:** Datacenter engineers carry over strict 2N habits from web serving without calculating the actual risk probability vs. the massive cost of stranded power in ML clusters.
    **The Consequence:** Wasting 50% of the datacenter's power capacity on standby hardware for an event that has less than a 0.1% chance of occurring during the job.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base load N = 64 nodes * 12kW = 768kW.
    - PDU size = 48kW, so N requires 16 active PDUs.
    - PDU MTBF ≈ 500,000 hours.
    - Cost of job re-run = $0.10/kWh.

    **Calculations:**
    - N+1 provisioned capacity = 17 * 48kW = 816kW; spare over load = 48/768 = 6.25%.
    - 2N provisioned capacity = 32 * 48kW = 1,536kW; standby capacity = 768/1,536 = 50%.
    - Incremental 2N hardware over N+1 = 32 - 17 = 15 PDUs, plus the larger stranded-power footprint.
    - Probability of PDU failure in 14 days: 14 * 24 / 500,000 = 0.067%.
    - Cost of failure: 768kW * 14d * 24h * $0.10/kWh = $25,804 job re-run cost.
    - Expected loss = $25,804 * 0.00067 = $17.28.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound**. N+1 has a defined single-PDU spare and about 6.25% spare capacity over load; 2N adds 15 PDUs and 50% standby capacity to avoid roughly $17 of expected single-job failure loss, so N+1 is the better training-cluster default if transfer ride-through is validated.
