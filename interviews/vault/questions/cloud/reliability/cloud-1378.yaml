title: Debugging GPU Cluster Utilization Deadlock
scenario: 'You are debugging a severe throughput drop on a 512-GPU training cluster.
  The cluster orchestration dashboard shows 100% GPU allocation, but the InfiniBand
  fabric utilization is near zero, and average GPU power draw is idling at 150W. Log
  analysis reveals that four separate Llama-3 fine-tuning jobs, each requiring 256
  GPUs, were submitted simultaneously. The cluster currently uses an incremental resource
  manager that greedily assigns free GPUs to pending jobs as they become available.

  '
question: 'Why are all 512 GPUs allocated but idle, and what scheduler change would
  prevent this deadlock?

  '
details:
  realistic_solution: 'Identify the hold-and-wait deadlock where all four jobs have
    acquired partial allocations and are infinitely waiting for more. Resolve this
    by terminating the deadlocked jobs and implementing strict gang scheduling, which
    enforces all-or-nothing atomic resource allocation.

    '
  common_mistake: '**The Pitfall:** Diagnosing the failure as an InfiniBand switch
    partition or NCCL timeout.

    **The Rationale:** Failing to verify if any single job has actually acquired its
    full quorum of required GPUs.

    **The Consequence:** Wasting time debugging network hardware when the issue is
    a systemic scheduling deadlock.

    '
  napkin_math: '- **Total Capacity**: 512 GPUs.

    - **Demand**: 4 jobs * 256 GPUs = 1024 GPUs.

    - **Greedy allocation**: 512 / 4 = 128 GPUs per job.

    - **Result**: **128 < 256 for all jobs, causing an unbreakable deadlock.**

    '
