title: Asynchronous Checkpointing for 175B Training on 256 GPUs
scenario: You are designing an asynchronous checkpointing architecture for a 175B model training continuously on 256 GPUs. Node failures are frequent.
question: How would you design asynchronous checkpointing for a 175B model on 256 H100s without stalling training?
details:
  realistic_solution: |
    Architect a multi-tiered async checkpointing system with sharded checkpoint writers and a coordinator. Each GPU writes its shard asynchronously to pinned host memory or local NVMe using a separate CUDA stream, then training resumes once the device buffers are reusable. Per-node background workers stream shards to durable distributed storage and report completion to a checkpoint coordinator. The coordinator writes a manifest only after every shard for a version is durably committed, including model state, optimizer state, RNG state, dataloader position, and metadata needed for consistency. Keep a ring buffer of local staging space with backpressure: if durable writes fall behind, slow checkpoint frequency or briefly block before overwriting an uncommitted version. Recovery loads only the newest checkpoint with a complete manifest; older checkpoints are garbage-collected only after the next version is complete. This hides most storage I/O from the training step while preserving clear failure semantics.
  common_mistake: |
    **The Pitfall:** Blocking the main training loop to write directly to network storage.
    **The Rationale:** It is the simplest synchronization method to guarantee a durably saved checkpoint.
    **The Consequence:** The massive 989 TFLOPS compute engines are idled for several minutes per checkpoint, destroying training efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 175B model state: 16 bytes/param = 2.8 TB total.
       - 256 GPUs, PCIe Gen4 (~32 GB/s bandwidth).
    2. **Calculations:**
       - State per GPU: 2.8 TB / 256 ≈ 11 GB.
       - Per-GPU GPU-to-host staging time: 11 GB / 32 GB/s ≈ 0.34 seconds, assuming each GPU can copy its own shard concurrently.
       - Full checkpoint durable size is still 2.8 TB, so end-to-end completion depends on aggregate storage bandwidth: completion time = 2.8 TB / cluster durable-write bandwidth.
       - Async checkpointing avoids a training stall only while staging buffers and checkpoint interval are large enough to absorb that durable-write time.
    3. **Conclusion & Interpretation:**
       - **Result: Durable-I/O-Bound with Async Staging.** The 0.34s number is only the per-GPU shard copy into staging; durable storage still controls checkpoint completion and must be coordinated with manifests, backpressure, and safe garbage collection.
