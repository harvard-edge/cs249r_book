title: Stateful LLM Serving Fault Tolerance
scenario: 'You are designing the serving architecture for a multi-turn LLM agent using an 8x GPU cluster. The application supports context windows up to 128k tokens, leading to KV caches of up to 4GB per active session. To handle node failures, you must evaluate three fault-tolerance strategies: 1) Stateless fallback, 2) Local stateful serving with synchronous NVMe checkpointing, and 3) Asynchronous replication to a CPU-memory tier over 400Gbps InfiniBand.'
question: 'Which fault-tolerance strategy should you use to minimize P99 recovery latency and operational overhead, and how do they quantitatively compare?'
details:
  realistic_solution: 'Implement asynchronous replication to a dedicated CPU-memory tier. A 4GB KV cache can be fetched over 400Gbps IB in milliseconds, whereas recomputing 128k tokens takes seconds. This decouples compute from state while strictly minimizing recovery time.'
  common_mistake: |
    **The Pitfall:** Choosing stateless fallback to simplify the architecture.
    **The Rationale:** Ignoring that recomputing a 128k token context causes massive P99 latency spikes during failover.
    **The Consequence:** Severely degrading the interactive user experience during node failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128k tokens, 4GB KV cache.
    - Prefill rate: ~50k tokens/sec.
    - Network: 400Gbps IB (50GB/s).

    **Calculations:**
    - Compute recovery (TTFT) = 128k tokens / 50k tokens/sec = 2.56s.
    - Network fetch recovery = 4GB / 50GB/s = 0.08s (80ms).

    **Conclusion & Interpretation:**
    - **Result: Network fetch is 32x faster (Latency-Bound)**. Asynchronous replication over IB provides order-of-magnitude lower latency than recomputing the context.
