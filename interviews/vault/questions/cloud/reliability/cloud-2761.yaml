title: Lending Feedback Loop Fairness Mitigation
scenario: 'Your lending model trained on historical approval data has a feedback loop: it denies loans to a demographic group, leading to no repayment data for that group, causing the model to learn the group is high-risk, and denying more loans.'
question: How would you evaluate exploration, causal debiasing, and demographic parity for mitigating the lending feedback loop?
details:
  realistic_solution: 'Option A (exploration/random approval): Most direct way to get unbiased outcome data. But ethically and legally problematic: randomly approving loans creates financial risk for both lender and borrowers who may not be ready. Also, random denial of qualified applicants is discriminatory. Feasibility: low in regulated domains. Option B (causal inference): Use techniques like inverse propensity weighting to account for the selection bias in historical data. Estimate what the repayment rate would have been if the denial had not occurred. Does not require experimentation on real people. Limitation: requires strong causal assumptions and sufficient overlap in the data. Option C (demographic parity): Ensures equal approval rates across groups but may approve genuinely high-risk applicants (increasing defaults) or deny genuinely low-risk applicants from the majority group. Treats the symptom, not the cause. Recommendation: B as the primary approach (debias the data), augmented
    with C as a safety constraint (ensure outputs are not discriminatory while causal estimates are imperfect). A is inappropriate for high-stakes lending decisions.'
  common_mistake: |
    **The Pitfall:** Choosing demographic parity alone.
    **The Rationale:** It directly addresses the final output distribution, which seems like the quickest and easiest regulatory fix.
    **The Consequence:** The model fights against the constraint since the underlying training data remains biased, ultimately reducing overall accuracy without addressing the root cause.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Goal: Break the bias feedback loop in regulated lending.
       - Constraints: Ethical/legal compliance, outcome fairness, predictive accuracy.
    2. **Calculations:**
       - Exploration (A): Can collect missing outcome data, but random approvals or denials create serious legal, ethical, and borrower-harm risks.
       - Causal Inference (B): Directly targets selection bias in historical approvals, but depends on overlap, measured confounders, and auditability of assumptions.
       - Demographic Parity (C): Provides an output-level fairness guardrail, but does not repair the biased repayment labels and can reduce accuracy if used alone.
    3. **Conclusion & Interpretation:**
       - **Result: Use B as the primary mitigation with C as a monitored safety constraint.** Exploration is only appropriate under carefully governed pilots, not as the default mechanism for high-stakes lending.
