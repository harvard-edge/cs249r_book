title: Transient NaN Failures in 512-GPU Training
scenario: During a large-scale training run on 512 GPUs, one GPU produces an NaN gradient in iteration 4,721 but works fine on retry.
question: What are transient failures, and why do they become routine in a 512-GPU training run?
details:
  realistic_solution: Transient failures are temporary hardware errors like cosmic-ray bit flips or brief arithmetic faults that disappear on retry. At massive scale, the aggregate FLOP rate is so high that even extremely rare independent errors become operationally routine, assuming most GPUs are active continuously.
  common_mistake: |
    **The Pitfall:** Assuming ECC protects against all transient errors.
    **The Rationale:** Candidates know ECC covers DRAM but forget it does not cover ALUs or tensor cores.
    **The Consequence:** Silent gradient corruption due to bit flips during matrix multiplication.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 GPUs at 989 TFLOPS each. Transient error rate: 1e-21 per FLOP.
    - Simplifying assumption: errors are independent and all GPUs are active continuously.

    **Calculations:**
    - Single GPU MTBF = 1e21 FLOPs/error / 9.89e14 FLOPs/s = 1.01e6 seconds ≈ 11.7 days.
    - Cluster MTBF = 1.01e6 seconds / 512 = 1.97e3 seconds ≈ 32.9 minutes.

    **Conclusion & Interpretation:**
    - **Result: At scale, transient errors occur about every 33 minutes under the independence and continuous-load assumptions (Hardware-Bound)**.
