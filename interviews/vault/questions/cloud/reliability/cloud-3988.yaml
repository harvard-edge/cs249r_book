title: 'Checkpoint Interval Collapse At Scale'
scenario: 'A 2,048-GPU training run spans 256 eight-GPU nodes. Each node has MTBF of 90 days and the job writes a checkpoint in 12 minutes. The team checkpoints every 4 hours. During a 10-day run, failures repeatedly waste hours of progress.'
question: 'Is a 4-hour checkpoint interval too long for a 256-node job with 90-day node MTBF and 12-minute checkpoint writes?'
details:
  realistic_solution: 'Cluster MTBF is 90 days / 256 nodes, about 506 minutes or 8.4 hours. A 4-hour interval is not longer than the expected time between failures, but it still loses about 2 hours on average per failure. Young-Daly suggests an interval around sqrt(2 × checkpoint_time × cluster_MTBF), roughly 110 minutes. The current 4-hour interval is likely too long, but not catastrophically so.'
  common_mistake: |
    **The Pitfall:** Using the single-node MTBF instead of the overall cluster MTBF.
    **The Rationale:** Candidates see "90 days" and assume failures are so rare that a 4-hour checkpoint is overly cautious, forgetting that scaling up increases the aggregate failure rate.
    **The Consequence:** The cluster's true MTBF shrinks linearly with node count, causing frequent, massive losses of compute time due to poorly optimized checkpointing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster size: 256 nodes
    - Node MTBF: 90 days
    - Checkpoint write time: 12 minutes

    **Calculations:**
    - Cluster MTBF = (90 days * 24 hrs * 60 mins) / 256 nodes = 506 minutes
    - Optimal Interval (Young-Daly) = \sqrt{2 * 12 * 506} = \sqrt{12,144} \approx 110 minutes
    - Current Waste = A 4-hour (240 min) interval loses ~2 hours per failure

    **Conclusion & Interpretation:**
    - **Result: 110 minutes (Time-Bound)**. The current 4-hour interval wastes significantly more progress per failure than the mathematically optimal 110 minutes.
