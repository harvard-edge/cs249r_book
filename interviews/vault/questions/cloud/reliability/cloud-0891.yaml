title: Diagnosing Targeted Triggers in Cloud Vision APIs
scenario: You are auditing a cloud-based vision API used for autonomous driving. The model exhibits 99.2% overall accuracy on the validation set. However, a field report reveals that the model consistently misclassifies a specific type of speed limit sign when a small, yellow sticker is present in the bottom right corner, predicting '70 mph' instead of '30 mph'. The training data was largely crowdsourced.
question: How do you diagnose whether this is a backdoor data poisoning attack versus a natural adversarial example or a dataset bias, and what specific metrics do you use to isolate the trigger?
details:
  realistic_solution: Diagnose it as a targeted backdoor only if the failure is trigger-specific, target-class-specific, and not explained by ordinary validation drift. Measure clean accuracy on unstickered 30 mph and 70 mph signs, targeted attack success rate after adding the yellow sticker to otherwise clean 30 mph signs, class-conditional confusion with and without the sticker, activation-cluster separation for stickered versus clean samples within the predicted target class, and a Neural Cleanse-style reverse-engineered trigger mask size/location. A backdoor is indicated by high clean accuracy, high stickered 30-to-70 attack success, a compact bottom-right trigger mask for the 70 mph target, and a distinct activation cluster. A natural adversarial example would be less tied to the training-data target class and trigger location; dataset bias would show broader class-conditional errors even without the sticker.
  common_mistake: |
    **The Pitfall:** Treating a sophisticated backdoor attack as a standard out-of-distribution (OOD) error.
    **The Rationale:** Engineers often assume it's just dataset imbalance and try to fix it with simple data augmentation, without analyzing the activation pathways or reverse-engineering the trigger footprint.
    **The Consequence:** The malicious backdoor remains embedded and exploitable despite surface-level retraining.
  napkin_math: |
    **Assumptions & Constraints:**
    - Trigger is a 5x5 pixel sticker on a 224x224 image.

    **Calculations:**
    - Trigger alters only (25 / 50176) = ~0.05% of the input features.
    - A backdoor diagnosis should compare conditional attack success rate with and without the sticker while clean accuracy remains high.
    - Activation clustering should show stickered samples forming a distinct cluster for the target prediction, e.g. high silhouette separation from clean "70 mph" examples.
    - Neural Cleanse-style reverse engineering should find the "70 mph" target class has an unusually small, spatially localized trigger mask compared with other target classes.

    **Conclusion & Interpretation:**
    - **Result: Target-Class Trigger Anomaly (Backdoor Suspected).** The evidence should be a small localized trigger with high attack success, target-specific activation separation, and an anomalously compact reverse-engineered mask for "70 mph," not a generic low-L1 adversarial perturbation claim.
