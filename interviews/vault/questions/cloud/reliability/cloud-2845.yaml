title: Pipeline Bubble in Pipeline Parallelism
scenario: When recovering from a fault in a Pipeline Parallel training setup, a concept called the 'pipeline bubble' reoccurs. Define the pipeline bubble and why it happens during the initial forward pass.
question: What is the pipeline bubble in pipeline-parallel training, and why does it occur during the initial forward pass?
details:
  realistic_solution: The pipeline bubble is the unavoidable idle time in pipeline-parallel training while the pipeline fills or drains. During the initial forward pass, later stages cannot run immediately because the first micro-batch must execute through each earlier stage in sequence before reaching them. After a restart from a fault, the same fill latency reappears because the pipeline starts empty again.
  common_mistake: |
    **The Pitfall:** Believing the pipeline bubble is a software bug or memory leak.
    **The Rationale:** Engineers unfamiliar with pipeline parallelism fail to recognize it as an inherent, mathematical latency limitation of sequential staging across multiple GPUs.
    **The Consequence:** Wasting time debugging non-existent software issues instead of optimizing pipeline depth and micro-batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-stage pipeline.
    - Each stage takes 100ms.

    **Calculations:**
    - Before the last stage receives the first micro-batch, the micro-batch must pass through stages 1 through 7.
    - Initial fill bubble for stage 8 = (8 - 1) * 100ms = 700ms.

    **Conclusion & Interpretation:**
    - **Result:** The pipeline has a 700ms fill bubble before the last stage becomes active. This is startup idle time from sequential stage execution, not a recovery-specific bug.
