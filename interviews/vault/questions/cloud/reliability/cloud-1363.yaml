title: Diagnosing Deterministic Bit-Flips in Custom AI ASICs
scenario: During validation of a new cloud AI accelerator manufactured at a third-party foundry, your team observes that inferences containing a highly specific, rare combination of padded token IDs consistently produce corrupted output logits. Furthermore, high-resolution side-channel power monitoring detects a reproducible 50mW spike exactly coinciding with these corrupted inferences. Standard memory diagnostics and SRAM ECC logs report zero single-event upsets (SEUs).
question: What is the likely root cause of deterministic logit corruption with rare token IDs and a correlated 50 mW power spike?
details:
  realistic_solution: |
    Diagnose the presence of a dormant hardware Trojan. The deterministic triggering by a rare input state and the correlated power spike indicate maliciously inserted combinational logic. You must isolate the anomalous power signature via Side-Channel Analysis (SCA) and verify using ATPG (Automatic Test Pattern Generation) targeting rare transitional states.
  common_mistake: |
    **The Pitfall:** Attributing the failure to random soft errors or software bugs.
    **The Rationale:** Engineers default to common, benign explanations like cosmic rays or thermal throttling.
    **The Consequence:** They ignore the deterministic payload-trigger and the absolute absence of ECC memory corrections, missing a critical security vulnerability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power spike is reproducible, input-correlated, and absent from normal diagnostics.
    - A 50 mW delta at 0.7 V corresponds to about 71 mA of additional current.
    - The measurement is a side-channel signature, not a direct per-gate counter.

    **Calculations:**
    - Current delta: I = P / V = 50 mW / 0.7 V ≈ 71 mA.
    - Because switching current depends on capacitance, frequency, activity factor, and routing, this cannot be divided by a generic per-gate number to infer gate count.
    - The useful evidence is correlation: rare token pattern + deterministic corruption + repeatable current signature + no ECC events.

    **Conclusion & Interpretation:**
    - **Result: Correlated Side-Channel Anomaly.** The spike strongly supports a rare-state hardware Trojan hypothesis and warrants SCA/ATPG confirmation, but it does not by itself prove a gate count or complete attribution.
