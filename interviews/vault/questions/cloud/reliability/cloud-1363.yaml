title: Hardware Trojan Evidence in AI Accelerator Validation
scenario: During validation of a new cloud AI accelerator manufactured at a third-party foundry, your team observes that inferences containing a highly specific, rare combination of padded token IDs consistently produce corrupted output logits. Furthermore, high-resolution side-channel power monitoring detects a reproducible 50mW spike exactly coinciding with these corrupted inferences. Standard memory diagnostics and SRAM ECC logs report zero single-event upsets (SEUs).
question: Is the rare-token logit corruption more consistent with a hardware Trojan or benign faults, and what evidence supports that?
details:
  realistic_solution: |
    The evidence is more consistent with a dormant hardware Trojan than with benign SEUs or ordinary software bugs. The key signals are deterministic activation by a rare input pattern, reproducible logit corruption, a correlated power signature, and no ECC evidence of random memory faults. Treat this as a security diagnosis: isolate the side-channel signature with SCA and use ATPG or targeted rare-state tests to confirm the trigger and rule out benign design bugs.
  common_mistake: |
    **The Pitfall:** Treating the symptom as ordinary random corruption.
    **The Rationale:** SEUs and software defects are more common than malicious hardware, so engineers may stop after standard memory diagnostics.
    **The Consequence:** They miss that deterministic rare-state triggering plus a repeatable power anomaly is exactly the pattern that should escalate to Trojan-focused validation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power spike is reproducible, input-correlated, and absent from normal diagnostics.
    - A 50 mW delta at 0.7 V corresponds to about 71 mA of additional current.
    - The measurement is a side-channel signature, not a direct per-gate counter.

    **Calculations:**
    - Current delta: I = P / V = 50 mW / 0.7 V ≈ 71 mA.
    - Because switching current depends on capacitance, frequency, activity factor, and routing, this cannot be divided by a generic per-gate number to infer gate count.
    - The useful evidence is correlation: rare token pattern + deterministic corruption + repeatable current signature + no ECC events.

    **Conclusion & Interpretation:**
    - **Result: Trojan Hypothesis, Not Final Proof.** The evidence is stronger for a rare-state hardware Trojan than for SEUs or ordinary software bugs, but confirmation requires SCA plus targeted logic validation.
