title: Stateful KV Cache Recovery Tradeoffs
scenario: You operate a stateful LLM serving cluster for a 70B parameter model where KV caches are pinned to specific nodes for long multi-turn chats. A node holding 400 active sessions crashes. Each session averages 8,000 tokens of context history. The KV cache size is 320 KB per token. The cluster's fallback prefill throughput is 500,000 tokens/sec distributed across the remaining healthy nodes.
question: For 400 crashed sessions, is a Redis KV-cache restore over a 100 Gbps network or a full recompute prefill faster, and what are the recovery times?
details:
  realistic_solution: Dynamically recomputing the state (prefilling) takes approximately 6.4 seconds, whereas transferring the 1 TB of state over a 100 Gbps network takes nearly 82 seconds. In stateful LLM serving, compute is often cheaper and faster than network transfer for fault recovery.
  common_mistake: |
    **The Pitfall:** Assuming state restoration from a fast database is always faster than recomputing.
    **The Rationale:** Candidates apply standard web-backend mental models (where fetching from Redis is instant) and fail to account for the massive multi-gigabyte scale of LLM KV caches.
    **The Consequence:** Architecting a fault-tolerance system that bottlenecks on network transfer and takes >1 minute to recover instead of a few seconds via compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400 crashed sessions, 8,000 tokens/session, 320 KB/token KV cache.
    - Network Transfer Strategy: 100 Gbps network = 12.5 GB/s theoretical max.
    - Fallback prefill throughput: 500,000 tokens/sec.

    **Calculations:**
    - Total State Size: 400 sessions * 8,000 tokens/session * 320 KB/token = 1,024,000,000 KB ≈ 1,024 GB (1 TB).
    - Network Time: 1024 GB / 12.5 GB/s = 81.9 seconds.
    - Recompute Time: 3,200,000 tokens / 500,000 tokens/sec = 6.4 seconds.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Recovery.** Recomputing (6.4s) is ~13x faster than network restoration (81.9s).
