title: Evaluating Influence Functions for ViT Attribution
scenario: You are debugging false positives in a production ViT-L/16 (300M parameters) medical imaging model. The clinical team needs to identify which specific training images from the 5M image dataset are most responsible for these errors. Leave-one-out retraining takes 100 GPU-hours per image. You are evaluating Influence Functions to estimate training data attribution.
question: Is iHVP feasible for a 300M-parameter ViT-L/16, and what approximations make influence functions tractable?
details:
  realistic_solution: Exact full-model iHVP is not feasible for a 300M-parameter ViT if it requires dense Hessian storage or exact solves. Practical influence-function pipelines avoid forming the Hessian and instead use Hessian-vector products with iterative solvers such as conjugate gradient, plus damping and validation against small retraining checks. To make the problem tractable, use approximations such as K-FAC, diagonal or low-rank curvature, LiSSA-style stochastic estimation, or a last-layer-only influence analysis as a cheaper but less complete attribution proxy.
  common_mistake: |
    **The Pitfall:** Proposing the computation of the exact Hessian across all model weights.
    **The Rationale:** These are standard mathematical definitions for influence functions taught in academic settings.
    **The Consequence:** Candidates fail to realize that storing the full Hessian for a 300M parameter model requires petabytes of memory, making the naive approach impossible in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters = 300,000,000.
       - Last layer dimension = 1,024.
       - Data format = FP32 (4 bytes).
    2. **Calculations:**
       - Dense full Hessian entries: 300M × 300M = 9e16 entries.
       - Dense full Hessian memory: 9e16 × 4 bytes = 3.6e17 bytes ≈ 360 PB.
       - Last Layer Hessian Memory: (1024 * 1024) * 4 bytes ≈ 4.2 MB.
    3. **Conclusion & Interpretation:**
       - **Result:** The dense full Hessian is impossible to store, but practical iHVP also depends on the cost and stability of iterative Hessian-vector solves. K-FAC, diagonal/low-rank curvature, stochastic iHVP, or last-layer-only IF make attribution tractable by trading exactness for bounded memory and compute.
