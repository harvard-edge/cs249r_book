title: Diagnosing TorchElastic Spot Preemption Stalls
scenario: You are training a 30B parameter LLM using 64 spot instances. You use PyTorch Elastic to handle node preemptions. When a node is preempted, the cluster dynamically downscales, but you observe a massive 15-minute stall before training resumes, dropping your effective Goodput below 70%. The model checkpoint size is roughly 120GB.
question: "What causes the 15-minute TorchElastic stall after a node preemption, and how would you reduce it?"
details:
  realistic_solution: 'Identify the dual bottleneck: the default 10-minute Torchrun rendezvous timeout waiting for the expected number of nodes to rejoin, plus 5 minutes of synchronous checkpoint loading from slow object storage. Fix by reducing the `rdzv_timeout` to 60s and utilizing a high-throughput parallel file system to achieve multi-GB/s read speeds.'
  common_mistake: |
    **The Pitfall:** Assuming the stall is solely due to Kubernetes pod provisioning time.
    **The Rationale:** Blaming orchestration infrastructure without profiling the distributed training framework timeouts.
    **The Consequence:** Wasting time debugging K8s instead of tuning TorchElastic rendezvous and checkpoint I/O loading.
  napkin_math: |
    **Assumptions & Constraints:**
    - Default Torchrun rendezvous timeout: 600s (10 mins).
    - Checkpoint size: 120 GB.
    - Standard object storage speed: 400 MB/s.
    - High-throughput parallel file system speed: 2 GB/s.

    **Calculations:**
    - Standard load time: 120 GB / 400 MB/s = 300s (5 mins). Total stall = 600s + 300s = 900s (15 mins).
    - Optimized load time: 120 GB / 2 GB/s = 60s (1 min).
    - Optimized total stall: 60s timeout + 60s load = 120s (2 mins).

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. Reducing the timeout and switching to a parallel file system drops the stall from 15 minutes to 2 minutes.
