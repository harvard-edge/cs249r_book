title: Diagnosing Pipeline Calibration Failures
scenario: 'You own a 3-stage cloud ads pipeline: Candidate Retrieval -> CTR Prediction -> Bid Pricing. After increasing retrieval recall, DLRM logloss degraded. A Platt scaling layer was deployed to the DLRM to correct calibration. Within 24 hours, overall ad revenue drops 15%, despite CTR metrics showing normal calibration.'
question: 'Why did Platt scaling make CTR calibration look normal while overall ad revenue fell 15% after retrieval recall increased?'
details:
  realistic_solution: 'Platt scaling perfectly patched the CTR mean but fundamentally squashed the variance of the pCTR distribution. The downstream Bid Model strictly relies on the full logit distribution (especially tail behavior) to accurately price items. When variance is compressed, the pricing model systematically underbids on high-value tail items. The correct fix is rollback and co-training both models on the new distribution.'
  common_mistake: |
    **The Pitfall:** Suspecting hardware bottlenecks or generic concept drift.
    **The Rationale:** Candidates narrowly focus on the upstream retrieval change while ignoring the downstream statistical impact of the calibration fix.
    **The Consequence:** Missing the variance compression entirely, leading to wasted debugging while revenue continues to bleed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bid Model: Bid = pCTR * Conversion_Rate.
    - Platt scaling corrects mean (e.g., 0.03 back to 0.05) but reduces stddev.

    **Calculations:**
    - Tail items depend on high variance (e.g., stddev 0.02).
    - Platt scaling compresses stddev to 0.005.

    **Conclusion & Interpretation:**
    - **Result: The pricing model systematically underbids on high-value tail items, directly driving the 15% revenue drop (Variance-Bound).**
