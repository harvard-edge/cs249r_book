title: Spot Instance Preemption TCO
scenario: You are provisioning 8 `p4d.24xlarge` (8x A100) nodes for a 100-hour distributed training run. On-Demand price is $32.77/hr per node; Spot price is $9.83/hr (70% discount). Your cloud provider averages 1 preemption per node every 20 hours. You synchronously checkpoint every 2 hours to external storage, so an independent preemption loses 1 hour of work on average. If a node is preempted, the cluster pauses, a new node is provisioned, and state is restored. This recovery takes 15 minutes.
question: What are the expected total cost and wall-clock time of the 100-hour 8-node run on Spot versus On-Demand?
details:
  realistic_solution: On-Demand takes 100 wall-clock hours and costs 8 × $32.77/hr × 100h = $26,216. With Spot, the expected 40 cluster interruptions lose about 1h of progress since the last checkpoint plus 0.25h of recovery, or 1.25h each on average, extending the run to about 150 wall-clock hours under the stated approximation. Billing all 8 Spot nodes for that duration costs 8 × $9.83/hr × 150h = $11,796, saving $14,420 versus On-Demand while adding about 50 hours of wall-clock time.
  common_mistake: |
    **The Pitfall:** Assuming a straight 70% cost reduction for spot instances.
    **The Rationale:** Candidates don't factor in the average lost work since the last 2-hour checkpoint plus the specified 15-minute cluster recovery.
    **The Consequence:** Overestimating cost savings and failing to account for a 150-hour expected wall-clock run instead of 100 hours.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 nodes with a 100-hour baseline run.
    - Spot: $9.83/hr, 1 preemption/node per 20h.
    - Checkpoint every 2 hours; recovery takes 0.25h.
    - Independent preemptions occur uniformly relative to the 2-hour checkpoint cycle, so average lost progress is 1h.

    **Calculations:**
    - Spot Preemptions = (100h / 20h) × 8 nodes = 40 interruptions.
    - Expected lost wall time per interruption = average lost progress since checkpoint + recovery = 1h + 0.25h = 1.25h.
    - Total extra time = 40 × 1.25h = 50h.
    - Total Spot Time = 100h + 50h = 150h.
    - Spot Cost = 8 nodes × $9.83/hr × 150h = $11,796.
    - On-Demand Cost = 8 nodes × $32.77/hr × 100h = $26,216.

    **Conclusion & Interpretation:**
    - **Result: $14,420 Saved (Time-Bound)**. While Spot saves 55% in compute costs, it extends wall-clock time by 50% due to synchronous recovery overheads.
