title: Evaluating Centralized Checkpointing Bottlenecks
scenario: You are training a 50B parameter MoE model on a cluster of 64 H100 GPUs.
  The model state per GPU is around 150GB. The team initially implemented a centralized
  checkpointing system where all 64 GPUs send their optimizer states and model shards
  over the network to a single CPU head node equipped with dual 100 Gbps Ethernet
  NICs.
question: Why can't the centralized head-node checkpoint meet the 2-minute SLA, and
  what architecture should replace it?
details:
  realistic_solution: Transition to distributed checkpointing where each worker writes
    its state concurrently to a high-throughput parallel file system (like Lustre)
    or cloud object storage, completely bypassing the central head node and avoiding
    the network incast problem.
  common_mistake: '**The Pitfall:** Focusing on the local NVMe storage write speed
    of the head node.

    **The Rationale:** Candidates assume the disk is the bottleneck when writing large
    files.

    **The Consequence:** They fail to recognize the network incast bottleneck created
    by 64 GPUs concurrently sending data to a single network endpoint.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 64 H100 GPUs. State per GPU: 150 GB.

    - Head node: Dual 100 Gbps NICs = 200 Gbps (25 GB/s).

    - SLA: 2 minutes (120 seconds).


    **Calculations:**

    - Total state volume: 64 GPUs * 150 GB = 9,600 GB.

    - Theoretical minimum transfer time: 9,600 GB / 25 GB/s = 384 seconds (6.4 minutes).

    - Time significantly exceeds the 120-second SLA even before TCP/disk overheads.


    **Conclusion & Interpretation:**

    - **Result: 384 seconds minimum transfer time (Network-Incast-Bound)**. The centralized
    architecture creates a severe bottleneck.

    '
