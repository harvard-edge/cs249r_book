title: SDC Propagation vs Checksum Trade-off
scenario: You are evaluating the error model for a 500B parameter LLM training job. Hardware telemetry indicates a 0.2% probability of silent data corruption (SDC) in GPU HBM per hour, which can propagate as global gradient noise. The network uses 900GB/s NVLink bandwidth.
question: For the 500B job, would you checksum every gradient sync or only checkpoint states, and why?
details:
  realistic_solution: Adopt a relaxed containment error model. Since neural network training exhibits inherent noise tolerance, accept localized gradient SDCs and only checksum the FP32 master weights during the infrequent checkpointing phase.
  common_mistake: |
    **The Pitfall:** Assuming all hardware faults trigger immediate node crashes and require strict fail-stop checksums.
    **The Rationale:** Candidates fail to model how SDCs statistically propagate into loss spikes rather than hard failures, and underestimate the massive overhead of checking every sync.
    **The Consequence:** The proposed training architecture incurs a >500% latency penalty, destroying throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500B params in BF16 (2 bytes).
       - Checksum bandwidth: 900 GB/s.
       - Base iteration time: ~200ms.
    2. **Calculations:**
       - Gradient sync size: 500B params * 2 bytes = 1 TB.
       - Checksumming time per sync: 1 TB / 900 GB/s ≈ 1.1 seconds.
       - Latency overhead: 1.1s added to a 200ms iteration is a >500% penalty.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound by Verification.** Checksumming every sync is computationally prohibitive, making a relaxed periodic containment model strictly necessary.
