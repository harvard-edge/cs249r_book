title: Silent Data Corruption Strategy
scenario: Post-mortem analysis reveals a permanent fault caused silent data corruption in GPU
question: After 18 hours of silent data corruption from a permanent GPU fault, should you roll back, continue, or add online gradient checksumming?
details:
  realistic_solution: 'This is the most insidious failure mode. (A) Rolling back 18 hours is painful (~18h × N GPUs of lost compute) but is the only option that guarantees correctness for the current run. If the corruption affected gradient computation, 18 hours of updates are potentially poisoned. (B) Continuing is extremely risky because silent corruption may have shifted weight distributions in ways that degrade downstream tasks without obvious training metrics. (C) Online gradient checksumming is not a substitute for rolling back already-corrupted updates; it is a mitigation to catch future corruption quickly. Recommendation: roll back now, then enable checksumming going forward. The 18h loss is a sunk cost; risking the remaining run is worse.'
  common_mistake: |
    **The Pitfall:** Choosing to "ride it out" and continue training (Option B) simply because the immediate loss curve didn't demonstrably explode into NaNs.
    **The Rationale:** Engineering teams fear the sunk CapEx cost of throwing away 18 hours of compute and optimistically assume neural networks are robust enough to 'unlearn' bad updates mathematically.
    **The Consequence:** The corruption permanently poisons niche downstream logic capabilities; the model completes its final $10M run but fails evaluation tests horribly, rendering the entire artifact useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - 18 hours of compute lost on 256 GPUs.
    - Example GPU cost: $3/GPU-hour.
    - Full remaining training run value is roughly $500K.

    **Calculations:**
    - Compute lost = 18h * 256 GPUs = 4,608 GPU-hours.
    - Dollar cost at $3/GPU-hour = 4,608 * $3 = $13,824 (~$14K).
    - Risk profile: known sunk cost (~$14K) vs. potentially poisoning a much larger remaining run (~$500K).

    **Conclusion & Interpretation:**
    - **Result: Roll back now, then add checksumming for future steps (Data-Corruption-Bound)**. Checksumming limits future damage but cannot make the already-corrupted 18 hours trustworthy.
