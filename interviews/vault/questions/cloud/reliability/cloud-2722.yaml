title: Silent Data Corruption Strategy
scenario: Post-mortem analysis reveals a permanent fault caused silent data corruption in GPU #47 for ~18 hours before detection. The loss curve showed no obvious spike. Options: (A) roll back 18 hours to last known-good checkpoint, (B) continue training from current state hoping the model self-corrects, (C) implement online gradient checksumming.
question: After 18 hours of silent data corruption from a permanent GPU fault, should you roll back, continue, or add online gradient checksumming?
details:
  realistic_solution: 'This is the most insidious failure mode. (A) Rolling back 18 hours is painful (~18h × N GPUs of lost compute) but is the only option that guarantees correctness. If the corruption affected gradient computation, 18 hours of updates are potentially poisoned. (B) Continuing is extremely risky — silent corruption that does not spike the loss is the worst kind because it may have subtly shifted weight distributions in ways that degrade downstream tasks without obvious training metrics. The model may never recover, wasting the entire remaining training budget. (C) Online gradient checksumming (comparing redundant computations across GPUs) adds ~5% overhead but catches future corruption immediately, limiting damage to one step. Recommendation: Roll back (A) and implement checksumming (C) going forward. The 18h loss is a sunk cost; risking the entire training run is worse.'
  common_mistake: |
    **The Pitfall:** Choosing to "ride it out" and continue training (Option B) simply because the immediate loss curve didn't demonstrably explode into NaNs.
    **The Rationale:** Engineering teams fear the sunk CapEx cost of throwing away 18 hours of compute and optimistically assume neural networks are robust enough to 'unlearn' bad updates mathematically.
    **The Consequence:** The corruption permanently poisons niche downstream logic capabilities; the model completes its final $10M run but fails evaluation tests horribly, rendering the entire artifact useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - 18 hours of compute lost on 256 GPUs.
    - Full training run value is ~$500K.

    **Calculations:**
    - Compute Cost Lost: 18h * 256 GPUs = 4,608 GPU-hours (~$14K).
    - Risk Profile: Sunk cost ($14K) vs Total Value ($500K).

    **Conclusion & Interpretation:**
    - **Result: Rollback strictly required (Data-Corruption-Bound)**. Risking $500K on poisoned weights to save $14K is statistically flawed.
