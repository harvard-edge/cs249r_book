title: Cloud New 0028
scenario: Design a resilient KV-cache migration architecture for stateful LLM serving. Instances are preemptible. Ensure active user sessions don't lose context or experience massive latency spikes on preemption.
question: How would you migrate KV-cache state for preemptible H100 LLM serving without losing sessions or causing large latency spikes?
details:
  realistic_solution: Architect a continuous, asynchronous background snapshotting service. As tokens are generated and appended to the KV-cache in HBM3, mirror the newly allocated PagedAttention blocks to host memory via a low-priority PCIe Gen4 stream. Periodically sync host memory to a distributed fast-key-value store (like Redis). If an H100 is preempted, the router seamlessly forwards the session ID to a new node, which hydrates its KV-cache from Redis, restoring state without full prompt recomputation.
  common_mistake: |
    **The Pitfall:** Forcing the user client to resubmit the entire conversation history to a new node.
    **The Rationale:** Treating LLM serving like stateless HTTP microservices, assuming client-side retries are sufficient.
    **The Consequence:** Causing a massive 10+ second prefill latency spike for users every time a preemption event occurs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Block Size: 1 block (16 tokens) = 1 MB.
       - Bandwidth: H100 PCIe Gen4 runs at 32 GB/s.
       - Network: 400 Gbps network to Redis.
    2. **Calculations:**
       - Streaming Cost: 1 MB / 32 GB/s = 31.25 μs.
       - Restore Time: Restoring a 1 GB context from Redis over a 400 Gbps network takes ~20 ms on cold start.
    3. **Conclusion & Interpretation:**
       - **Result: PCIe-Bound Background Transfer.** Streaming is completely invisible to the 989 TFLOPS compute, and 20 ms restore masks preemption latency.
