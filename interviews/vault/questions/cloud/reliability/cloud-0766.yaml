title: 'The Split-Brain Checkpoint'
scenario: 'You''re training a 175B model across 512 GPUs spanning two data center buildings connected by a 400 Gbps WAN link. During a checkpoint at step 100,000, the WAN link goes down for 8 seconds. Building A''s 256 GPUs complete their checkpoint writes. Building B''s 256 GPUs detect the partition and also write a checkpoint — but their gradient AllReduce was incomplete when the link dropped. Both buildings think they have a valid step-100,000 checkpoint.'
question: 'How do you recover without losing more than 1,000 steps of work?'
details:
  realistic_solution: 'This is a distributed consensus problem applied to ML training. During the AllReduce at step 100,000, each GPU contributes its local gradients. The WAN failure means the AllReduce was partitioned: Building A''s GPUs reduced among themselves (256-GPU partial reduce), and Building B''s GPUs did the same. Both partitions applied a *partial* gradient update — each building''s model diverged from the other at step 100,000. Neither checkpoint is valid for the full 512-GPU training run. Recovery requires: (1) **Identify the last consistent checkpoint** — step 99,000 (the previous checkpoint, completed before the partition). (2) **Validate consistency** — compare the model weight checksums from both buildings at step 99,000; they must be bit-identical. (3) **Replay from step 99,000** — lose 1,000 steps but guarantee consistency. Prevention: (1) implement a **two-phase checkpoint protocol** — Phase 1: all ranks write to local storage; Phase 2: a global barrier confirms all ranks completed; only then is the checkpoint marked valid. If the barrier fails, the checkpoint is discarded. (2) Use **asynchronous checkpointing** that snapshots model state *between* AllReduce calls, when the model is in a globally consistent state.'
  common_mistake: |
    **The Pitfall:** Choosing Building A's checkpoint because "it completed first" or trying to average the two checkpoints.
    **The Rationale:** Candidates assume that if a checkpoint file is fully written to disk, its mathematical contents must be globally consistent.
    **The Consequence:** Resuming training from an inconsistent optimizer state that rapidly compounds into NaNs, permanently destroying the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 512 GPUs at $3.50/hr.
    - Time per step: ~4 seconds.
    - Checkpoints: Every 1,000 steps.
    - Global barrier overhead: ~50 ms. Checkpoint write: ~60 s.

    **Calculations:**
    - Cost of losing 1,000 steps: 512 GPUs * 4 s/step * 1000 steps = 2,048,000 GPU-seconds = 569 GPU-hours.
    - Wasted compute cost: 569 hours * $3.50/hr = ~$1,992.
    - Cost of silent divergence (e.g., training 10k steps before NaN): ~$19,920.
    - Barrier overhead: 50 ms / 60,000 ms = 0.08%.

    **Conclusion & Interpretation:**
    - **Result: Consistency-Bound**. A two-phase checkpoint protocol adding just 0.08% overhead prevents a split-brain divergence that could cost $20K in wasted compute.
