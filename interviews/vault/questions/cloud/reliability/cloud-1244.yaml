title: Diagnosing Overconfident Predictions in Cloud Inference
scenario: Your medical imaging classification service, running on a fleet of GPUs, achieves an impressive 94% top-1 accuracy. However, the downstream risk-routing system, which flags cases with <90% model confidence for human review, is barely routing any cases. You measure the Expected Calibration Error (ECE) using 10 bins and find it is unusually high at 0.18.
question: Why is the 94%-accurate classifier failing confidence-based routing, and what low-latency post-hoc calibration fix would you apply?
details:
  realistic_solution: 'Diagnose that high-capacity deep networks naturally push logits to extremes. Apply Temperature Scaling by learning a single scalar parameter T on a validation set to divide the logits before softmax, preserving 94% accuracy while reducing ECE to <0.02.'
  common_mistake: |
    **The Pitfall:** Recommending a full retraining cycle with label smoothing or custom losses.
    **The Rationale:** Candidates default to modifying the training pipeline when they see poor calibration.
    **The Consequence:** They propose computationally expensive and delayed deployments when a simple post-hoc temperature scaling would solve the issue immediately.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 bins for ECE. High ECE = 0.18.
    - Top-1 accuracy = 94%.

    **Calculations:**
    - For a bin of 1,000 samples: Avg confidence = 0.98, Actual accuracy = 0.85.
    - Bin Penalty: (1000 / N) × |0.85 - 0.98| = (1000 / N) × 0.13.
    - With Temperature Scaling (T=1.5): A logit vector [5.0, 2.0] becomes [3.33, 1.33].
    - Softmax shifts from [0.95, 0.05] down to [0.88, 0.12].

    **Conclusion & Interpretation:**
    - **Result: Temperature Scaling softens high-confidence extremes, reducing ECE to <0.02 without affecting 94% accuracy (Calibration-Bound)**.
