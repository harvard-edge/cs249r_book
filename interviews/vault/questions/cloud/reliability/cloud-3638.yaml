title: InfiniBand Subnet Manager Failover for Training Cluster
scenario: A 256-H100 InfiniBand cluster has a single OpenSM Subnet Manager running on a management node. During a 7-day training run, the management node crashes and OpenSM fails. Existing RDMA traffic initially continues, but new path lookup or fabric-change handling is unavailable and the job later dies.
question: How would you design InfiniBand Subnet Manager failover so a management-node crash does not kill the 7-day training job?
details:
  realistic_solution: Design SM high availability so losing the management node does not remove path management for the fabric. Run a primary and standby OpenSM or UFM HA pair on separate hosts or use embedded switch SM where appropriate, with priorities and polling configured so the standby takes over promptly. Existing RC/RDMA and NCCL traffic usually does not require the SM to be continuously up once paths and LIDs are programmed, so a brief SM outage alone should not kill all established connections. The risk is loss of path record lookup, route recalculation, and recovery from link or port events during the outage. Validate failover by killing the primary SM during nccl-tests, checking that established traffic continues, and confirming new connection setup and subnet sweeps recover after standby election.
  common_mistake: |
    **The Pitfall:** Treating the Subnet Manager as either irrelevant after startup or as a component whose brief failure kills every RDMA connection.
    **The Rationale:** Engineers often miss the distinction between established traffic and fabric management for new paths, route changes, and link-event recovery.
    **The Consequence:** The cluster either has no SM HA at all or has untested failover that fails during a real fabric event.
  napkin_math: |
    **Assumptions & Constraints:**
    - Established RDMA/NCCL traffic can continue using already programmed paths while the SM is briefly unavailable.
    - New connection setup, path lookup, and link-event recovery depend on an active SM.
    - Failover objective: restore SM service before operators need route changes or before fabric events accumulate.

    **Calculations:**
    - Run primary and standby SMs on independent failure domains.
    - Configure priorities and polling so standby election is measured in seconds to tens of seconds, then verify the actual value in a fault-injection test.
    - During the failover window, existing AllReduce should continue if paths remain valid and no disruptive link event requires rerouting.

    **Conclusion & Interpretation:**
    - **Result: SM HA Protects Fabric Management.** The design goal is prompt standby takeover for path management and recovery; it is not correct to claim that every established RDMA connection fails simply because OpenSM is briefly down.
