title: The Silent Data Corruption at Scale
scenario: We are 60 days into a 90-day training run on 10,000 H100 GPUs. The loss curve looks normal, but when we evaluate on our held-out benchmark, accuracy is 8 points below the expected scaling law prediction. No crashes, no NaNs, no obvious errors in the logs.
question: What could cause a model to silently underperform, and how would you detect it?
details:
  realistic_solution: 'At 10,000-GPU scale, silent hardware errors become likely enough to design for. HBM bit flips, intermittent PCIe errors, and faulty Tensor Cores can corrupt individual gradient or activation values without triggering ECC errors or NaN checks. Some corruptions are masked by SGD noise, but corruptions in gradients, optimizer state, or checkpoints can bias updates and leave training loss looking normal while held-out accuracy lags. Detection requires **active monitoring beyond loss curves**: (1) periodic evaluation on fixed validation and canary sets; (2) gradient norm and activation-stat tracking per GPU or shard; (3) checksum or hash verification for checkpoints, parameter shards, and selected collectives; (4) redundant "canary" computations on fixed inputs and occasional shadow evaluation against a known-good checkpoint.'
  common_mistake: |
    **The Pitfall:** Assuming the scaling law prediction must be wrong or the benchmark is noisy.
    **The Rationale:** Candidates dismiss silent data corruption (SDC) because they expect hardware errors to manifest as explicit crashes or NaNs.
    **The Consequence:** Discarding a $50M+ training run or releasing a permanently degraded model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Google reports ~1.5 SDC events per 1,000 GPU-days.
    - 10,000 GPUs * 90 days = 900,000 GPU-days.

    **Calculations:**
    - Total Events: 900,000 / 1,000 × 1.5 = 1,350 expected silent corruption events.
    - Impact: The event count alone is enough to justify monitoring; the harmful fraction is workload- and location-dependent, so do not assume every event poisons training.
    - Detection Cost Example: A 1,000-example canary eval every 100 training steps adds about 10 eval examples per training step. If each training step processes thousands of sequences, this is typically well below 1% overhead and can run on a small reserved eval pool.

    **Conclusion & Interpretation:**
    - **Result: ~1,350 expected SDC events (Reliability-Bound)**. The exact number of harmful corruptions is not knowable from the event rate alone, so the design should continuously detect divergence, shard corruption, and anomalous per-rank statistics.
