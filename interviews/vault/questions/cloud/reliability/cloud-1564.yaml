title: Prometheus Cardinality Explosion
scenario: 'You are configuring Prometheus monitoring for a centralized LLM routing gateway serving multiple B2B clients across 5 global regions. You define a counter metric `llm_requests_total` with the following labels to track usage: `model_version` (10 active versions), `region` (5 regions), `gpu_type` (3 types), `http_status` (5 codes), and `customer_tenant_id` (10,000 enterprise tenants).'
question: 'How would you redesign the observability stack to support tenant-level billing without crashing the metrics server?'
details:
  realistic_solution: 'Remove the unbounded `customer_tenant_id` label from the Prometheus metric. High-cardinality data should be recorded via structured event logs (e.g., using FluentBit or OpenTelemetry) and sent to an OLAP database like ClickHouse or BigQuery for ad-hoc billing queries, leaving Prometheus to handle aggregate system health.'
  common_mistake: |
    **The Pitfall:** Assuming time series memory grows additively with new labels or relying on TSDB compression for active RAM.
    **The Rationale:** Candidates often fail to recognize the multiplicative combinatorial explosion (cardinality) that high-entropy labels like `customer_tenant_id` cause in a dimensional time-series database.
    **The Consequence:** The Prometheus server will quickly exhaust its RAM and crash due to OOM errors, taking down the entire monitoring stack.
  napkin_math: |
    **Assumptions & Constraints:**
    - Labels: 10 versions, 5 regions, 3 GPUs, 5 statuses, 10,000 tenants.
    - Memory per series: ~4 KB in Prometheus TSDB.

    **Calculations:**
    - Cardinality = 10 * 5 * 3 * 5 * 10,000 = 7,500,000 unique series.
    - Memory Footprint = 7,500,000 * 4 KB = 30 GB of RAM.
    - Optimized Cardinality (no tenant label) = 10 * 5 * 3 * 5 = 750 series.
    - Optimized Memory = 750 * 4 KB = 3 MB.

    **Conclusion & Interpretation:**
    - **Result: 3 MB Memory (Memory-Capacity-Bound)**. Removing the high-cardinality tenant label drops memory usage from 30 GB to 3 MB, preventing OOM crashes.
