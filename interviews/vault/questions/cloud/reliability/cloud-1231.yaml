title: Analyzing Silent Data Corruption Propagation in 3D Parallelism
scenario: You are training a 175B parameter LLM on 2048 H100 GPUs using 3D parallelism (TP=8, PP=8, DP=32). At iteration 50,000, the global loss suddenly spikes to NaN. You suspect a Silent Data Corruption (SDC) event, such as an undetected ALU bit-flip, on a single GPU.
question: How would you trace a single-GPU FP16 silent data corruption through TP=8, PP=8, DP=32 to isolate the failing H100?
details:
  realistic_solution: Use topology-aware replay rather than assuming the final NaN identifies the source. First, freeze the job at the last good checkpoint and rerun deterministically with per-rank sentinels or checksums on forward activations at PP boundaries, backward gradients before each DP all-reduce, and optimizer-state updates. Compare those checksums across the DP=32 replicas to find the first TP/PP/DP coordinate that diverges before synchronization can broadcast the error. Then binary-search the failing microbatch/layer within that coordinate, replay only the suspect TP=8 group with per-rank activation and gradient checksums, and run hardware diagnostics on the single rank whose outputs first differ from its peers or from a clean replay.
  common_mistake: |
    **The Pitfall:** Assuming standard hardware telemetry will trivially flag the bit-flip, or deciding to randomly run diagnostics across all 2048 nodes.
    **The Rationale:** System administrators often overestimate the scope of hardware ECC and blindly trust dashboards, failing to leverage the strict mathematical boundaries of the 3D-parallel topology to narrow the search space.
    **The Consequence:** The team wastes days running exhaustive diagnostics across thousands of GPUs, hemorrhaging millions of dollars in idle cluster time while searching for a needle in a haystack.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2048 H100 GPUs; TP=8, PP=8, DP=32.
    - Single SDC event on one GPU.
    - NaN visibility depends on where the fault first appears and whether it is masked before synchronization.

    **Calculations:**
    - Topology size per DP replica: TP * PP = 8 * 8 = 64 GPUs.
    - Full job size: 64 GPUs per replica * 32 DP replicas = 2048 GPUs.
    - Before a DP all-reduce, divergence can be localized by comparing the 32 DP replicas at the same TP/PP coordinate.
    - After a synchronizing all-reduce, the observable NaN may appear on many ranks, so tracing must use the earliest pre-sync checksum mismatch rather than the final set of corrupted GPUs.

    **Conclusion & Interpretation:**
    - **Result: Localize by first divergence, not by final blast radius.** A single SDC may propagate to a TP group, a PP path, or all DP replicas, but deterministic replay with pre-sync sentinels narrows the search from 2048 GPUs to one TP/PP/DP coordinate and then to one H100.
