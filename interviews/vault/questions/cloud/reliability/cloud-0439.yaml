title: The Silent Failure Cascade
scenario: You are training a 175B parameter LLM on a cluster of 4,096 H100 GPUs. The training job is expected to take 25 days. Three days into the run, the job crashes with no obvious error log, losing all progress. Team members suggest different checkpointing strategies. Assume a single-GPU MTTF of 50,000 hours and a parallel filesystem write speed of 166 GB/s.
question: What checkpoint interval minimizes wasted time for the 4,096-GPU, 25-day 175B LLM training run?
details:
  realistic_solution: 'The problem is to find the statistically optimal checkpoint interval that minimizes time lost to both checkpointing overhead and failure recovery. At this scale, individual component MTTF translates into a continuous cluster-level failure rate. The optimal interval is a function of the cluster''s aggregate MTTF and the time it takes to save a checkpoint. We must first calculate the failure rate for the entire 4,096-GPU cluster and the time required to save the model''s state. With a cluster MTTF of ~12.2 hours, we expect roughly 2 failures per day over the 25-day run (~50 failures total). The optimal checkpoint interval minimizes total wasted time = checkpoint overhead + expected re-computation after failure. Using the classic formula: optimal interval ≈ sqrt(2 * MTTF * T_checkpoint). For a 175B model, the full checkpoint size (including FP32 master weights and Adam states) is ~2.5 TB. With a parallel filesystem write speed of ~166 GB/s, T_checkpoint ≈ 15 seconds. Optimal interval = sqrt(2 * 12.2 * 3600s * 15s) = sqrt(1,317,600) ≈ 1,147 seconds ≈ 19 minutes.'
  common_mistake: |
    **The Pitfall:** Choosing arbitrary checkpoint intervals like 'every epoch' or 'every hour'.
    **The Rationale:** Engineers rely on small-scale training habits and ignore the statistical reality of large-scale hardware failure rates.
    **The Consequence:** Checkpointing too often introduces debilitating overhead, while checkpointing too infrequently risks catastrophic, days-long work loss.
  napkin_math: |
    1. **Cluster MTTF:** Assuming single GPU MTTF is 50,000 hours, 50,000 hours / 4,096 GPUs ≈ 12.2 hours (43,920 seconds).
    2. **Checkpoint Size:** 175B params × 2B (BF16) + 175B × 12B (Optimizer) ≈ 2.45 TB (round to 2.5 TB).
    3. **Checkpoint Write Time (T_ckpt):** 2.5 TB / 166 GB/s ≈ 15 seconds.
    4. **Optimal Interval (Young's Formula):** T_opt = √(2 × MTTF × T_ckpt) = √(2 × 43,920s × 15s) ≈ 1,147 seconds ≈ 19 minutes.
    5. **Conclusion:** **The statistically optimal checkpoint interval is 19 minutes.**
  options:
  - Checkpoint every 5 minutes to be safe.
  - Checkpoint roughly every 18-20 minutes.
  - Checkpoint once per day to minimize overhead.
  - The job failed after 3 days, so checkpointing every 48 hours is sufficient.
