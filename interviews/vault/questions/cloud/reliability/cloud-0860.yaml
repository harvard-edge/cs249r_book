title: Evaluating Defenses for High-Throughput Content Moderation
scenario: You are designing a cloud-based content moderation API processing 10,000 images/sec on A10G GPUs (24GB VRAM). Option A is Adversarial Training (augmenting the dataset with PGD-7 examples). Option B is Input Preprocessing (applying JPEG compression and spatial smoothing).
question: Which defense should you deploy under a 50ms SLA and a tight training budget?
details:
  realistic_solution: Implement Option B (Input Preprocessing). Applying JPEG compression (Q=75) disrupts the high-frequency perturbations that PGD attacks rely on. It shifts the defensive workload to cheap CPU preprocessing (adding ~1.5ms per image), preserves the 50ms latency SLA on the A10Gs, and avoids the 4x GPU compute multiplier of Adversarial Training. The 10k QPS throughput requirement remains intact since preprocessing is parallelized across CPU cores.
  common_mistake: |
    **The Pitfall:** Assuming Adversarial Training is the universally optimal defense.
    **The Rationale:** Academically, Adversarial Training is highly robust against specific attacks, but candidates fail to quantify the massive training compute multiplier or the reality of inference latency budgets.
    **The Consequence:** The training budget explodes by 4x-10x, and the model overfits to PGD-7 while remaining vulnerable to other evasion variants.
  napkin_math: |
    - **Option A (Adversarial Training):** PGD-7 requires 7 forward passes + 1 standard pass. Total compute $\approx 4\text{x}$ standard training.
    - **Option B (Preprocessing Latency):** JPEG compression takes $\sim 1.5\text{ms}$ per image on CPU ($1.5\text{ms} \ll 50\text{ms}$ SLA).
    - **Throughput:** 10k QPS is easily handled by parallelizing the $1.5\text{ms}$ preprocessing across cheap CPU cores.
    - **Conclusion:** **Input Preprocessing is highly cost-effective**, preserves the GPU training budget, and comfortably meets the 50ms SLA.
