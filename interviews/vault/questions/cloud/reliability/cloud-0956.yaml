title: Certified Radius Calculation for Biometric API
scenario: A cloud-based ML API for biometric authentication uses Randomized Smoothing to provide L2 certified robustness against adversarial evasion attacks. To comply with security SLAs, the system must guarantee predictions will not change within an L2 perturbation radius of R = 0.5. The system injects isotropic Gaussian noise with standard deviation σ = 0.5 during the smoothing process.
question: What minimum top-class probability p_A is required with σ=0.5 to certify radius R=0.5?
details:
  realistic_solution: The system must sample the input with Gaussian noise (σ=0.5) and ensure the majority class probability p_A ≥ Φ(R/σ). For R=0.5 and σ=0.5, this requires p_A ≥ Φ(1) ≈ 0.841.
  common_mistake: |
    **The Pitfall:** Confusing the base classifier's confidence score with the smoothed classifier's Monte Carlo probability estimate, or assuming a linear relationship instead of using the Gaussian inverse CDF.
    **The Rationale:** The robustness guarantee comes from the probabilistic properties of the Gaussian noise, not the model's internal logits. The relationship is governed by the CDF of the standard normal distribution.
    **The Consequence:** Incorrectly certifying vulnerable predictions or failing to certify robust ones, leading to potential security breaches or false alarms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Certified radius requirement (R): 0.5.
       - Gaussian noise standard deviation (σ): 0.5.
       - Governing equation: R = σ * Φ⁻¹(p_A).
    2. **Calculations:**
       - 0.5 = 0.5 * Φ⁻¹(p_A)
       - Φ⁻¹(p_A) = 1.0
       - p_A = Φ(1.0) ≈ 0.841
    3. **Conclusion & Interpretation:** **Top class probability p_A must be ≥ 84.1%. Algorithm-Bound.**
