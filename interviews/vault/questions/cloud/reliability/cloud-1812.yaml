title: Mitigating Sponge Attacks via Runtime Input Validation
scenario: You are designing the runtime input validation layer for a cloud-based LLM deployment serving 20,000 requests per second using a fleet of 8xH100 instances. The system is vulnerable to 'sponge examples'—adversarial inputs specifically crafted to maximize energy consumption and latency.
question: Which validation strategy should protect the H100 LLM fleet from sponge examples while staying under the 20ms P99 overhead budget?
details:
  realistic_solution: |
    Implement a tiered approach: O(1) heuristics at the API gateway to drop obvious anomalies, followed by a lightweight INT8 quantized CPU model deployed as a sidecar on the host instance to perform semantic validation without touching the H100s.
  common_mistake: |
    **The Pitfall:** Implementing complex validation models inline on the main GPU fleet.
    **The Rationale:** Engineers assume ML models "must run on GPUs", ignoring the context-switching and latency costs.
    **The Consequence:** The validation layer consumes the exact compute resources it is meant to protect, collapsing total system throughput during an attack.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20k RPS distributed across 500 host instances (40 RPS/node).
    - 100M parameter INT8 CPU validation model.
    - 20ms P99 overhead budget.

    **Calculations:**
    - CPU inference time: ~15ms on modern CPU for 512 tokens.
    - CPU overhead: 40 RPS * 15ms = 600ms of compute time per second per node.

    **Conclusion & Interpretation:**
    - **Result: 15ms CPU inference time (CPU-Bound)**. A lightweight INT8 CPU model safely meets the 20ms budget and fully shields GPUs from resource exhaustion using just 1-2 host cores.
