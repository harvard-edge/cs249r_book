title: Evaluating Declarative Scheduling for GPU Fault Tolerance
scenario: You are orchestrating a 2,048 GPU cluster for training a 100B parameter LLM using 8-GPU nodes. The infrastructure utilizes spot instances with a 15% hourly churn rate. The legacy imperative orchestration system relies on custom scripts that detect failures and provision replacement nodes sequentially. A declarative scheduling system (e.g., Kubernetes) is proposed as a replacement.
question: What MTTR improvement does declarative scheduling provide over imperative scripts under 15% hourly churn, and what control-plane risk remains?
details:
  realistic_solution: A declarative system shifts the burden of state management to continuous control loops. When 38 nodes are preempted, the controller can request replacements concurrently instead of issuing one provisioning request at a time, reducing recovery latency from about 12.5 minutes to about 3.3 minutes for the affected nodes. The remaining risk is that a mass preemption creates a burst of pod, node, and volume state updates that can overload the API server or etcd.
  common_mistake: |
    **The Pitfall:** Assuming declarative scheduling is purely syntactic sugar, or ignoring control-plane risk.
    **The Rationale:** Engineers focus on the logical desired state but ignore the underlying parallel API calls and control-plane load (e.g., etcd) required to reconcile thousands of pods.
    **The Consequence:** Either undervaluing the MTTR improvement from parallel provisioning, or causing cascading cluster failures by overloading the API server during mass preemption.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 256 nodes (8 GPUs each) = 2,048 GPUs.
       - Spot churn: 15% of 256 nodes = 38 nodes preempted per hour.
       - Affected capacity per churn event: 38 nodes * 8 GPUs = 304 GPUs.
       - Sequential API call: 15s per node. Boot: 120s. Restore: 60s.
       - Declarative timeout: 15s. Concurrent API: 5s.
    2. **Calculations:**
       - Imperative MTTR: (38 nodes * 15s) + 120s + 60s = 570s + 180s = 750s (12.5 minutes).
       - Declarative MTTR: 15s + 5s + 120s + 60s = 200s (3.33 minutes).
       - Recovery latency saved for affected nodes = 750s - 200s = 550s = 9.17 minutes.
       - Affected-node idle GPU-hours avoided = 304 GPUs * (550 / 3600) hr ≈ 46 GPU-hours per churn event.
    3. **Conclusion & Interpretation:**
       - **Result: Control-Plane Bound.** Declarative scheduling reduces per-event MTTR by about 9.2 minutes for the preempted nodes and avoids roughly 46 affected GPU-hours, but shifts the bottleneck to the control plane's ability to handle concurrent state updates.
