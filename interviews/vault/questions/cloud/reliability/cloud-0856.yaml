title: Diagnosing Moderation Evasion Attacks
scenario: Your team operates a cloud-based automated image moderation API. You notice a sudden spike where clearly violating images are consistently passing the filter with >99% 'safe' confidence. Visual inspection shows these images appear identical to standard violations to human reviewers, but computing the raw pixel difference against standard uploads reveals structured, high-frequency noise uniformly bounded at an L-infinity norm of 4/255.
question: How do you analyze this failure and what is the root cause?
details:
  realistic_solution: Diagnose the failure as a targeted adversarial attack. The structured noise is an intentional perturbation aligned with the model's loss gradient. To mitigate, implement input purifications like randomized smoothing or aggressive JPEG compression (which destroys high-frequency adversarial noise) before inference, followed by retraining the model with adversarial examples.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as concept drift or a hardware artifact.
    **The Rationale:** Candidates fail to recognize the signature of a targeted evasion attack (like FGSM) when viewing bounded L-infinity noise.
    **The Consequence:** Applying ineffective solutions like simple retraining without adversarial examples, leaving the API entirely vulnerable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 224x224x3.
    - Perturbation bound (L-infinity): epsilon = 4/255.
    - The perturbation is structured and consistently changes the model output while remaining visually small.

    **Calculations:**
    - L-infinity <= 4/255 means no pixel channel changes by more than about 1.6% of the normalized range.
    - This bound alone does not determine the logit shift; the effect depends on the model's local gradients, input normalization, clipping, and the classification margin.
    - If the perturbation is aligned with the loss gradient and the model has insufficient margin, even a visually imperceptible change can cross the decision boundary.

    **Conclusion & Interpretation:**
    - **Result: Adversarial Attack.** The right diagnosis is targeted evasion with an L-infinity-bounded perturbation, not a raw pixel-count probability calculation.
