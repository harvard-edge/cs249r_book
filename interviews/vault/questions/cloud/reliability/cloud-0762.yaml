title: The MTBF Crisis
scenario: We are scaling our training from 1,000 to 10,000 GPUs. Our current strategy pauses training for 5 minutes every hour to save a checkpoint.
question: Is saving a checkpoint for 5 minutes every hour viable at 10k GPU scale?
details:
  realistic_solution: Probably not as a fixed policy. As the number of failure-prone components increases, the cluster-visible interruption rate rises. Under the simplifying assumption that any GPU failure stops the job and failures are independent, MTBF_cluster is approximately MTBF_component / N. At 10,000 GPUs, the checkpoint interval must be chosen from the checkpoint cost and expected lost work, using a model such as Young-Daly. The implementation might use async or incremental checkpointing, but the key design choice is optimizing the interval and reducing checkpoint pause time rather than blindly saving every hour.
  common_mistake: |
    **The Pitfall:** Assuming static overhead percentages scale linearly without accounting for hardware failure rates.
    **The Rationale:** Engineers think "5 minutes per hour is only 8% overhead — that's fine at any scale."
    **The Consequence:** Catastrophic failure to progress. The cluster fails faster than the checkpoint interval, resulting in infinite training stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Treat each GPU as an independent failure unit for a conservative estimate.
    - MTBF_GPU = 1000 hours.
    - Any GPU failure interrupts the training job.
    - Approximate MTBF_cluster = MTBF_GPU / N under these assumptions.

    **Calculations:**
    - At 1,000 GPUs: MTBF_cluster ≈ 1000 / 1000 = 1 hour.
    - At 10,000 GPUs: MTBF_cluster ≈ 1000 / 10000 = 0.1 hours (6 minutes).
    - A fixed 1-hour interval is much longer than the expected interruption time in this conservative model, while the checkpoint itself adds 5/60 = 8.3% overhead before any recomputation.

    **Conclusion & Interpretation:**
    - **Result: Reliability-Bound.** If each GPU failure stops the job, 10k GPUs imply an expected interruption about every 6 minutes, so fixed hourly checkpointing is not viable. Use an optimized interval and lower-pause checkpoint mechanism instead of assuming one implementation is mandatory.
