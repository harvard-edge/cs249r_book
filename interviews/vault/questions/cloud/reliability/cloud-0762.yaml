title: The MTBF Crisis
scenario: We are scaling our training from 1,000 to 10,000 GPUs. Our current strategy pauses training for 5 minutes every hour to save a checkpoint.
question: Is saving a checkpoint for 5 minutes every hour viable at 10k GPU scale?
details:
  realistic_solution: 'No. As node count ($N$) increases, the Mean Time Between Failures ($MTBF$) decreases: $MTBF_{cluster} = MTBF_{node} / N$. At 10,000 GPUs, failures happen constantly. You must use the **Young-Daly equation** to balance the checkpoint overhead against the cost of lost work, which usually demands asynchronous, in-memory checkpointing to avoid stalling the training loop.'
  common_mistake: |
    **The Pitfall:** Assuming static overhead percentages scale linearly without accounting for hardware failure rates.
    **The Rationale:** Engineers think "5 minutes per hour is only 8% overhead — that's fine at any scale."
    **The Consequence:** Catastrophic failure to progress. The cluster fails faster than the checkpoint interval, resulting in infinite training stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - MTBF_node = 1000 hours.
    - MTBF_cluster = MTBF_node / N.

    **Calculations:**
    - At 1,000 GPUs: MTBF_cluster = 1000 / 1000 = 1 hour.
    - At 10,000 GPUs: MTBF_cluster = 1000 / 10000 = 0.1 hours (6 minutes).
    - Checkpoint interval = 1 hour, meaning a failure happens 10 times per checkpoint cycle.

    **Conclusion & Interpretation:**
    - **Result: Reliability-Bound.** At 10k GPUs, the cluster fails every 6 minutes. You will never complete an hour of training between checkpoints, necessitating asynchronous in-memory checkpointing.
