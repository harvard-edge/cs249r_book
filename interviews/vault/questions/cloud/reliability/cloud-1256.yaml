title: Evaluating Optimal Checkpoint Frequency at Scale
scenario: You are evaluating the fault-tolerance strategy for a 16,384 GPU cluster (H100s) training a 1T parameter model. The infrastructure consists of 2,048 nodes (8 GPUs each). The manufacturer states the Mean Time Between Failures (MTBF) per node is 40,000 hours. Writing a synchronous checkpoint to the distributed file system takes exactly 5 minutes.
question: "What checkpoint interval maximizes training goodput for the 16,384-GPU cluster given 40,000-hour node MTBF and 5-minute saves?"
details:
  realistic_solution: 'Calculate system MTBF by dividing the node MTBF by the number of nodes: 40,000 hours / 2,048 = 19.5 hours. Apply Young''s or Daly''s formula to balance checkpoint overhead against expected lost compute time. The optimal interval is approximately 1.8 hours.'
  common_mistake: |
    **The Pitfall:** Calculating the checkpoint interval based on arbitrary heuristics (e.g., 'once an epoch').
    **The Rationale:** Failing to aggregate individual node MTBF to determine the system-level failure rate.
    **The Consequence:** Vastly overestimating cluster reliability and losing massive amounts of compute goodput to unexpected failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16,384 GPU cluster (2,048 nodes).
    - Node MTBF = 40,000 hrs.
    - Checkpoint Time = 5 mins.

    **Calculations:**
    - System MTBF = 40,000 hrs / 2,048 nodes ≈ 19.5 hrs = 1,170 mins.
    - Optimal Interval T = √(2 * Checkpoint_Time * System_MTBF).
    - T = √(2 * 5 mins * 1,170 mins) = √11,700 ≈ 108 minutes = 1.8 hours.

    **Conclusion & Interpretation:**
    - **Result: 1.8 hours (Reliability)**. Balancing checkpoint overhead against expected lost compute time is critical.
