title: Low-Overhead Tracing for Checkpoint Recovery
scenario: You need to architect a low-overhead tracing framework for a 70B training job across A100 nodes to debug long-tail checkpoint stalls and recovery delays without perturbing the hot path.
question: How would you trace checkpoint and recovery stalls in a 70B A100 training job without inflating P99 latency?
details:
  realistic_solution: Implement low-overhead, zero-allocation tracing around the checkpoint and recovery critical path. Stamp each training step and checkpoint epoch with a correlation ID, then record asynchronous events for gradient synchronization, checkpoint serialization, local NVMe writes, remote object-store commits, barrier waits, and restore phases. Use eBPF for filesystem and network latency, CUDA/NCCL events for GPU-side waits, and per-rank ring buffers flushed out of band. Aggregate traces by checkpoint epoch so tail stalls can be attributed to slow ranks, storage queues, network commits, or recovery replay without adding synchronous logging to the training loop.
  common_mistake: |
    **The Pitfall:** Adding synchronous logging or blocking metrics calls around every checkpoint write.
    **The Rationale:** Standard backend tracing often records rich per-event logs directly on the request or training critical path.
    **The Consequence:** The observer effect inflates checkpoint barriers and recovery latency, making the trace report the instrumentation overhead rather than the true fault-tolerance bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B training job with 64 ranks.
    - Checkpoint interval: 20 minutes.
    - Expected checkpoint barrier: 90 seconds.
    - Observed P99 checkpoint barrier: 150 seconds.
    - Tracing must stay below 1% overhead on the checkpoint path.

    **Calculations:**
    - Tail stall to explain: 150s - 90s = 60s extra at P99.
    - 1% tracing budget on the normal checkpoint path: 90s * 0.01 = 0.9s total overhead.
    - Per-rank synchronous overhead budget: 0.9s / 64 ranks ≈ 14ms per rank, so event capture must use buffered, asynchronous writes rather than per-event blocking logs.

    **Conclusion & Interpretation:**
    - **Result: trace asynchronously and attribute the 60s P99 stall by checkpoint epoch.** Instrumentation that blocks on storage or metrics from each rank can consume the entire overhead budget and distort the checkpoint diagnosis.
