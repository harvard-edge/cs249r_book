title: Diagnosing Spot Preemption Hangs in Distributed Training
scenario: You migrated a 64-GPU distributed training job (PyTorch DDP) to AWS Spot Instances to reduce costs by 70%. However, the job's effective training progression has dropped to near zero. Monitoring shows GPU utilization sporadically dropping to 0% across all surviving nodes for exactly 30 minutes at a time, followed by a sudden cluster restart and checkpoint reload.
question: "What is the root cause of this specific failure pattern, and how do you diagnose it?"
details:
  realistic_solution: The exact 30-minute hang is the default NCCL network communication timeout (`NCCL_BLOCKING_WAIT`). When a spot instance is preempted abruptly, the surviving nodes hang infinitely waiting for an `AllReduce` token from the dead node until the timeout is hit. The solution is to run a daemon that polls the cloud provider's metadata service for the 2-minute spot preemption warning, intercept it to trigger a synchronous checkpoint, gracefully tear down the NCCL process group, and exit immediately so the orchestrator (e.g., TorchElastic) can restart the job without waiting for the timeout.
  common_mistake: |
    **The Pitfall:** Assuming the 30-minute 0% utilization period is time spent provisioning replacement spot instances and downloading weights.
    **The Rationale:** Candidates fail to recognize the exact 30-minute duration as the default `NCCL_BLOCKING_WAIT` timeout parameter.
    **The Consequence:** Leaving spot-instance training jobs running with effectively 0% throughput, destroying any cost savings from using spot instances.
  napkin_math: |
    - **Without signal handling:** 1 preemption/hr = 30m (NCCL timeout) + 5m (restart/load) = 35m downtime/hr (**41% uptime**).
    - **With 2-min warning handling:** 1 preemption/hr = 2m (sync checkpoint) + 5m (restart/load) = 7m downtime/hr (**88% uptime**).
    - **Result:** **Handling the preemption signal doubles effective training throughput.**
