title: Diagnosing Spot Preemption Hangs in Distributed Training
scenario: You migrated a 64-GPU distributed training job (PyTorch DDP) to AWS Spot Instances to reduce costs by 70%. However, the job's effective training progression has dropped to near zero. Monitoring shows GPU utilization sporadically dropping to 0% across all surviving nodes for exactly 30 minutes at a time, followed by a sudden cluster restart and checkpoint reload.
question: What is the root cause of this specific failure pattern, and how do you diagnose it?
details:
  realistic_solution: A Spot node is disappearing without the training job handling the AWS two-minute interruption notice, leaving the surviving ranks stuck in collectives until the process-group watchdog, framework timeout, or job supervisor declares failure. Diagnose it by correlating 0% GPU utilization windows with Spot interruption notices, missing rank logs, NCCL/TorchDistributed timeout messages, and orchestrator restart events. Fix it with a node daemon or sidecar that polls the instance metadata interruption endpoint, triggers a checkpoint or orderly stop, tears down the process group, and exits so TorchElastic or the scheduler restarts promptly.
  common_mistake: |
    **The Pitfall:** Treating the 30-minute 0% utilization period as normal replacement-instance provisioning time.
    **The Rationale:** Candidates miss that one dead rank can strand all surviving ranks in distributed collectives until the framework or supervisor timeout fires.
    **The Consequence:** Failing to handle the two-minute interruption notice leaves the job paying for idle GPUs and destroys the expected Spot savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - One preemption per hour.
    - Current behavior: 30m stuck collective/watchdog wait + 5m restart/load downtime.
    - With interruption handling: 2m checkpoint/orderly shutdown + 5m restart/load downtime.

    **Calculations:**
    - Without interruption handling: 35m downtime/hr, leaving 25m useful training/hr = 25/60 ≈ 42% uptime.
    - With interruption handling: 7m downtime/hr, leaving 53m useful training/hr = 53/60 ≈ 88% uptime.
    - Useful-training improvement: 53 / 25 ≈ 2.1x.

    **Conclusion & Interpretation:**
    - **Result:** Handling the interruption notice and exiting cleanly roughly doubles useful training time by avoiding long collective/watchdog hangs.
