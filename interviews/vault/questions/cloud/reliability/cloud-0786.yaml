title: The Silent Model Decay
scenario: 'Your ML team maintains a critical production model that predicts user engagement. For the past two months, the model''s business impact has been steadily declining, but no alarms have fired from standard model monitoring dashboards.'
question: 'What causes silent decay, and what monitoring detects it proactively?'
details:
  realistic_solution: 'Silent decay is typically due to data drift or concept drift not reflected in traditional performance metrics. Data Drift changes input feature distributions. Concept Drift changes the relationship between features and the target. Implement continuous KS-tests or population stability indexes on feature streams.'
  common_mistake: |
    **The Pitfall:** Suggesting "The model needs retraining" as a complete answer.
    **The Rationale:** Candidates focus on remediation rather than identifying why standard metrics failed to alert.
    **The Consequence:** Missing the fact that traditional metrics rely on delayed ground truth, failing to fix the observability gap.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Time: 100 features * 50 ms/feature = 5 seconds.
    
    **Calculations:**
    - Compute per Month: 5 seconds/hour * 24h * 30d = 1 hour.
    - Cost: 1 CPU hour = $0.05/month.
    
    **Conclusion & Interpretation:**
    - **Result: $0.05 monthly cost (ROI-Bound)**. Drift detection is virtually free compared to revenue loss.
