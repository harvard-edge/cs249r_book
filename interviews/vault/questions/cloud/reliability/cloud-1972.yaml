title: Evaluating Straggler Mitigation Strategies in Federated Learning
scenario: A distributed federated learning system is training a recommendation model across 10,000 heterogeneous mobile devices. The central aggregator waits for 1,000 updates before performing a global model step. However, due to stragglers (devices taking up to 5 minutes to complete local training and upload vs. the median 15 seconds), the global round time is heavily bottlenecked.
question: 'Evaluate the trade-offs: should you switch to FedAsync, or over-select 1,500 clients and wait for the fastest 1,000?'
details:
  realistic_solution: Over-selection is typically the most robust practical approach. By querying 30% to 50% more clients than needed and dropping the stragglers, you maintain the convergence stability of synchronous updates while drastically clipping the long tail of latency.
  common_mistake: |
    **The Pitfall:** Assuming asynchronous aggregation is strictly superior for round times.
    **The Rationale:** Engineers prioritize iteration speed and completely eliminate the sync barrier.
    **The Consequence:** Severe convergence penalties introduced by gradient staleness, requiring exponentially more total time to reach target accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Strict sync barrier waits for P99 straggler: 300s per round.
    - Target updates: 1,000.
    - With 1,500 selected clients, the round completes when the 1,000th fastest client finishes.
    - No full latency distribution is provided, so the 1,000th-of-1,500 completion time cannot be computed from only a median and a worst-case/P99 bound.

    **Calculations:**
    - 1.5x over-selection: Ask 1,500, wait for 1,000.
    - The wait point is the order statistic k/n = 1,000/1,500 = 66.7th percentile of the selected-client completion distribution.
    - If the measured 66.7th percentile were about 20s, the per-round latency would be about 20s; that value must come from telemetry or an explicit distribution model, not from the stated median/P99 alone.

    **Conclusion & Interpretation:**
    - **Result: Qualitative Latency Reduction (Latency-Bound)**. Over-selection clips the tail while preserving synchronous aggregation, but the exact speedup is not derivable from the stated inputs.
