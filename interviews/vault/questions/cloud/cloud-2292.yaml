title: The Bias Drift Silent Failure
scenario: 'Your content moderation model passed all fairness audits at deployment: equalized odds violations
  were below 2% across all demographic groups. Six months later, a journalist investigation reveals the
  model is now flagging content from one minority group at 3× the rate of the majority group. Your aggregate
  accuracy metrics never triggered an alert — they actually improved slightly over the period. Evaluate
  how this silent fairness degradation occurred despite passing the initial audit, and design a monitoring
  system that would have caught it.'
question: "How did fairness degrade silently despite the initial audit passing, and what monitoring system would have caught it?"
details:
  realistic_solution: 'This is a fairness-specific form of silent degradation caused by demographic distribution
    shift. Several mechanisms can cause it: (1) Content shift: the minority group''s posting patterns
    changed (new slang, cultural events, different topics) while training data doesn''t reflect this —
    the model''s learned features now correlate with group membership rather than actual policy violations.
    (2) Feedback loop amplification: the model''s initial (small, within-threshold) bias caused slightly
    more content from the minority group to be flagged → human reviewers, primed by the model''s suggestions,
    confirmed at a higher rate → this biased confirmation data was used to update content policies or
    retrain, amplifying the original bias. (3) Population shift: the platform''s user demographics changed,
    but the fairness thresholds were calibrated to the original population. Aggregate metrics improved
    because the majority group (now larger) got more accurate, masking the minority group''s degradation.
    The monitoring system design: (a) Compute per-group metrics independently on a fixed schedule (not
    just triggered by aggregate alerts). (b) Track the trend of fairness gap over time, not just point-in-time
    snapshots — a slow drift from 2% to 8% over 6 months should trigger at step 4-5%, not after the journalist
    calls. (c) Maintain a held-out, demographically balanced evaluation set that is never used for training
    or threshold calibration — this provides a stable reference point immune to distribution shift. (d)
    Monitor the input distribution per group (embedding drift detection), not just output metrics.'
  common_mistake: Blaming the initial audit as inadequate or assuming someone changed the model. The model
    weights haven't changed — the world changed around it.
  napkin_math: 'Drift rate: 2% equalized odds gap → 8% over 6 months = 1pp/month. With weekly fairness
    evaluation and a 3-sigma alert threshold on the month-over-month delta (baseline noise ~0.3pp/week),
    the system would detect the trend at month 2-3 (4-5% gap), 3-4 months before the journalist. Cost
    of weekly disaggregated evaluation on a 50K held-out set across 8 groups: ~$50/week in compute (confusion
    matrix computation is cheap). Cost of not detecting: reputation damage, regulatory fines (up to 6%
    of turnover under EU AI Act), class-action risk.'
