title: Calculate Cluster Bisection Bandwidth
scenario: 'You are designing a network fabric for a 1,536-GPU distributed training cluster. The design uses 64-port 400 Gbps switches in a two-tier leaf-spine topology. Each leaf switch connects to 48 GPUs (downlinks) and uses the remaining 16 ports as uplinks to the spine layer.'
question: "What is the bisection bandwidth of the 1,536-GPU leaf-spine fabric, and what per-GPU bandwidth limits global Ring AllReduce?"
details:
  realistic_solution: 'The oversubscription ratio at the leaf layer is calculated by dividing downlinks by uplinks: 48 / 16 = 3:1. The total theoretical injection bandwidth is 1,536 GPUs × 400 Gbps = 614.4 Tbps. To find the bisection bandwidth, divide the total injection bandwidth by the oversubscription ratio, resulting in 204.8 Tbps. For a global Ring AllReduce traversing these oversubscribed links, the effective network throughput per GPU is reduced proportionally by a factor of 3, dropping from 400 Gbps to approximately 133.3 Gbps.'
  common_mistake: |
    **The Pitfall:** Calculating the total injection bandwidth (1,536 × 400 Gbps) and assuming it represents the effective throughput.
    **The Rationale:** Candidates fail to apply the oversubscription ratio from the leaf-to-spine uplinks, confusing edge bandwidth with true bisection bandwidth.
    **The Consequence:** The cluster's communication performance is massively overestimated, leading to severely bottlenecked global collective operations and lower-than-expected training scaling efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,536 GPUs total.
       - Leaf switches: 48 downlinks, 16 uplinks.
       - Link speed: 400 Gbps per port.
    2. **Calculations:**
       - Oversubscription Ratio = 48 downlinks / 16 uplinks = 3:1.
       - Total Injection BW = 1,536 GPUs × 400 Gbps = 614.4 Tbps.
       - Bisection BW = 614.4 Tbps / 3 = 204.8 Tbps.
       - Effective per-GPU BW = 400 Gbps / 3 = 133.3 Gbps.
    3. **Conclusion & Interpretation:**
       - **Result: 204.8 Tbps Bisection BW and 133.3 Gbps effective per-GPU BW**. The 3:1 oversubscription at the leaf layer dictates the true network bottleneck for any cross-rack collective communication.
