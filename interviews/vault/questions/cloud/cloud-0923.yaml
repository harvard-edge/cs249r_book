title: Calculate Cluster Bisection Bandwidth
scenario: You are designing a network fabric for a 1,536-GPU distributed training cluster. The design
  uses 64-port 400 Gbps switches in a two-tier leaf-spine topology. Each leaf switch connects to 48 GPUs
  (downlinks) and uses the remaining 16 ports as uplinks to the spine layer. Calculate the total bisection
  bandwidth of this cluster and determine the effective per-GPU bandwidth limit for a global Ring AllReduce
  operation.
details:
  realistic_solution: 'The oversubscription ratio at the leaf layer is calculated by dividing downlinks
    by uplinks: 48 / 16 = 3:1. The total theoretical injection bandwidth is 1,536 GPUs × 400 Gbps = 614.4
    Tbps. To find the bisection bandwidth, divide the total injection bandwidth by the oversubscription
    ratio, resulting in 204.8 Tbps. For a global Ring AllReduce crossing these oversubscribed links, the
    effective network throughput per GPU is reduced proportionally by a factor of 3, dropping from 400
    Gbps to approximately 133.3 Gbps.'
  common_mistake: Candidates often calculate the total injection bandwidth (1,536 × 400 Gbps) and assume
    it represents the effective throughput, failing to apply the oversubscription ratio to determine the
    true bisection bandwidth bottleneck for global collective operations.
  napkin_math: 'Oversubscription Ratio = 48 downlinks / 16 uplinks = 3

    Total Injection BW = 1,536 GPUs * 400 Gbps = 614.4 Tbps

    Bisection BW = 614.4 Tbps / 3 = 204.8 Tbps

    Effective per-GPU BW = 400 Gbps / 3 = 133.3 Gbps'
