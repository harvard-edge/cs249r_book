title: Optimizing LLM Attention Scaling on AMD MI300X for Long Context
scenario: You are optimizing inference for an LLM on an AMD MI300X accelerator processing 128k token contexts. Profiling shows that the memory bandwidth for KV cache accesses is a significant bottleneck for standard multi-head attention.
question: How would you diagnose MI300X KV-cache bandwidth bottlenecks in MHA and quantify the benefit of switching to GQA, MQA, or sliding-window attention?
details:
  realistic_solution: Grouped-Query Attention (GQA) or Multi-Query Attention (MQA) are highly effective in addressing KV cache memory bandwidth bottlenecks. GQA allows multiple query heads to share a smaller set of key and value heads, significantly reducing the KV cache memory footprint and the memory bandwidth required.
  common_mistake: |
    **The Pitfall:** Focusing purely on FLOPS optimization and proposing complex custom compute kernels.
    **The Rationale:** Engineers often assume that context length scaling is fundamentally bounded by the $O(N^2)$ computation of attention rather than the memory bandwidth required to load the KV cache.
    **The Consequence:** Custom kernels fail to improve end-to-end throughput because the system remains completely memory-bandwidth starved during decoding.
  napkin_math: |
    1. **MHA KV Cache Size:** For 32 query heads, 32 key heads, and 32 value heads, the cache scales linearly with 32 KV heads.
    2. **GQA Reduction:** Implementing GQA with 4 key/value groups reduces the stored heads from 32 to 4, an **8x reduction**.
    3. **Hardware Context:** Given the MI300X's 5.3 TB/s HBM3 bandwidth and 1307 TFLOPS FP16 compute, if standard decoding consumes 80% bandwidth on KV loading, an 8x reduction clears the bottleneck.
    4. **Throughput Gain:** Removing this memory starvation directly translates to a massive improvement in token generation throughput.
