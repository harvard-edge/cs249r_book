- A burst of 1000 req/s for 100ms equals 100 total requests. A 600 req/s token bucket
  replenish rate adds 60 tokens in 100ms, not 100. A leaky bucket queues 40 requests,
  not 400, adding 0.067s delay, not 0.67s.
