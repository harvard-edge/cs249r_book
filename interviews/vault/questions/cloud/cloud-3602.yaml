title: Token Bucket vs Leaky Bucket Rate Limiting for H100 Serving
scenario: 'An H100 cluster serves a public API. Clients send bursty traffic: 1000
  req/s for 100ms followed by 100ms of silence (effective average 500/s). The cluster
  handles 600 req/s sustainably. Compare token bucket and leaky bucket rate limiting
  strategies for this traffic pattern.'
question: How do token bucket and leaky bucket rate limiting compare for 1000 req/s
  100 ms bursts on a 600 req/s H100 cluster?
details:
  realistic_solution: 'Token bucket: allows burst up to bucket size B. If B=100, client
    can burst up to B=100 requests beyond the refill rate. During a 100ms burst at
    1000 req/s: 100 requests arrive, 60 tokens replenish → net 40 tokens drained.
    Burst is absorbed if B ≥ 40. Cluster sees 1000/s briefly — if it has headroom
    (e.g., operating at 400/s average), burst is absorbed. Leaky bucket: enforces
    constant 600 req/s output regardless of burst — adds unnecessary latency to early
    burst requests. For H100 inference, token bucket is preferred because GPU utilization
    benefits from batching bursts. Set bucket B=50-100, refill at 550/s.'
  common_mistake: Recommending leaky bucket because it 'smooths' traffic without considering
    that it adds queuing delay during burst phases that the cluster could actually
    handle.
  napkin_math: 'Average load=500/s < 600/s capacity. Token bucket with B=100: burst
    of 1000 req/s for 100ms = 100 requests total. Bucket replenishes at 600/s for
    100ms = 60 tokens added. Net drain: 100 − 60 = 40 tokens from bucket. Burst is
    absorbed without queuing as long as bucket ≥ 40. Leaky bucket queues 40 requests
    during burst (100 arriving − 60 output at 600/s) → adds 40/600≈0.067s (67ms) delay
    to last burst request.'
