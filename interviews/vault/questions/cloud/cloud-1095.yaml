title: Mitigating Data Stalls in Distributed Training
scenario: You are architecting the data storage layer for a 64-node distributed training cluster. The model processes high-resolution medical images, and each GPU consumes 400 MB/s of data during the forward pass. Profiling shows a Data Stall Ratio of 30%, meaning GPUs are idle 30% of the time waiting for I/O.
question: Should you upgrade the central file system to 300 GB/s or deploy local NVMe caches, and what is the quantitative justification?
details:
  realistic_solution: Deploying a local NVMe caching tier is the superior architectural choice. The total cluster bandwidth demand is 204.8 GB/s. While a 300 GB/s central upgrade meets the raw bandwidth requirement, it remains susceptible to network incast and latency spikes. By adding local NVMe drives, each node can easily satisfy its local 3.2 GB/s demand. The central file system then only needs to asynchronously stage data to the local NVMe cache, decoupling the strict step-time latency requirement from the network storage and reducing the data stall ratio to near 0%.
  common_mistake: |
    **The Pitfall:** Assuming a raw central storage bandwidth upgrade solves the problem.
    **The Rationale:** Candidates focus entirely on the aggregate number, ignoring network incast, latency jitter, and metadata bottlenecks.
    **The Consequence:** Upgrading an expensive central SAN while GPUs continue to starve due to bursty, random read access.
  napkin_math: |
    1. **Assumptions & Constraints:** 64 nodes, 8 GPUs/node, 400 MB/s per GPU demand, local PCIe Gen4 NVMe delivers ~14 GB/s.
    2. **Calculations:** Cluster Demand = 64 * 8 * 400 MB/s = 204.8 GB/s. Node Demand = 8 * 400 MB/s = 3.2 GB/s.
    3. **Conclusion & Interpretation:** **Result: I/O-Bound (Network) alleviated by local caching. >4x headroom per node easily masks latency without a 300 GB/s central upgrade.**
