title: Mitigating Data Stalls in Distributed Training
scenario: You are architecting the data storage layer for a 64-node distributed training cluster (8x H100
  GPUs per node). The model processes high-resolution medical images, and each GPU consumes 400 MB/s of
  data during the forward pass. Your current shared parallel file system delivers 150 GB/s of aggregate
  read throughput. Profiling via PyTorch Profiler shows a Data Stall Ratio of 30%, meaning GPUs are idle
  30% of the time waiting for I/O. Evaluate whether to upgrade the central parallel file system to 300
  GB/s or deploy a local NVMe caching tier on each compute node. Justify the architectural trade-offs
  quantitatively.
details:
  realistic_solution: Deploying a local NVMe caching tier is the superior architectural choice. The total
    cluster bandwidth demand is 204.8 GB/s. While a 300 GB/s central upgrade meets the raw bandwidth requirement,
    it remains susceptible to network incast and latency spikes. By adding local NVMe drives (e.g., 2x
    PCIe Gen4 NVMe per node, yielding ~14 GB/s read bandwidth), each node can easily satisfy its local
    3.2 GB/s demand. The central file system then only needs to asynchronously stage data to the local
    NVMe cache, decoupling the strict step-time latency requirement from the network storage and reducing
    the data stall ratio to near 0%.
  common_mistake: Candidates often simply calculate the new central storage bandwidth and assume it perfectly
    resolves the issue, ignoring network jitter, metadata server bottlenecks, and read amplification when
    thousands of workers simultaneously request small random batches.
  napkin_math: Cluster Demand = 64 nodes * 8 GPUs/node * 400 MB/s = 204.8 GB/s. Node Demand = 8 * 400
    MB/s = 3.2 GB/s. Local NVMe (2x Gen4) = ~14 GB/s. 14 GB/s > 3.2 GB/s (4.3x headroom per node). Central
    FS only needs to sustain average throughput to fill caches ahead of time.
