title: Measuring and Setting Realistic P999 SLOs for Autoregressive Generation
scenario: A product team wants P999 < 5s for a GPT-4-class model (70B parameters) running on A100 (80GB
  HBM2e, 2TB/s, 400W) nodes. Requests generate 200-2000 output tokens. You must set a technically defensible
  SLA and architect the system to meet it.
details:
  realistic_solution: 'Define two separate SLOs: TTFT P99 < 500ms (prefill-dominated, hardware-bounded)
    and Token Generation Rate P50 > 40 tok/s (decode-dominated). This decouples the user experience metric
    (TTFT) from the compute metric. For P999 of full generation: cap at 2000 tokens, at 40 tok/s = 50s
    max → negotiate SLA to TTFT + streaming, not total time.'
  common_mistake: Setting a single P999 SLA without conditioning on output length. A 2000-token generation
    is physically 10x slower than 200 tokens and cannot meet the same SLA. Conflating TTFT (time to first
    token) with total generation time in the SLA.
  napkin_math: 'A100 80GB, 2TB/s. 70B model at FP16 = 140GB — needs 2 A100s. Memory bandwidth bound decode:
    140GB / 2TB/s = 70ms to load model weights per token. At batch=1: 1000/70ms = ~14 tok/s. At batch=8:
    ~14 tok/s (still BW bound). To reach 40 tok/s: need tensor parallelism across 4 A100s → 560GB/s effective
    per device → 140GB/560GB/s = 250ms/token → 4 tok/s per device, 4*4=16 tok/s. Still need 8-way TP for
    40 tok/s.'
