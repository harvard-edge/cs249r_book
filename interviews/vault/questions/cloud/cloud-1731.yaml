title: Diagnosing GPU Starvation from P99 I/O Jitter
scenario: You are debugging intermittent GPU utilization drops in an 8-GPU distributed training job. The step time is stable at 150ms. Profiling shows that while the mean I/O fetch time from the distributed object store is 50ms, the 99th percentile (P99) fetch time spikes to 900ms due to multitenant network congestion. The data loader prefetch buffer size is currently set to 2.
question: "Why is the GPU stalling, and how deep must the prefetch buffer be to guarantee zero starvation?"
details:
  realistic_solution: Increase the prefetch buffer depth to at least 6 batches. This ensures enough prepared data resides in host DRAM to keep the GPU fed during the longest expected I/O stalls.
  common_mistake: |
    **The Pitfall:** Tuning the prefetch buffer based on average I/O throughput.
    **The Rationale:** Candidates assume that because mean fetch (50ms) < step time (150ms), a minimal buffer is sufficient.
    **The Consequence:** They fail to account for long tail latency (P99 jitter), leaving the GPU starved during inevitable multi-tenant network congestion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Step time: 150ms.
       - Current buffer depth: 2 batches.
       - P99 I/O fetch stall: 900ms.
    2. **Calculations:**
       - Current buffer depletion time: 2 batches * 150ms/batch = 300ms.
       - GPU starvation duration during P99 spike: 900ms - 300ms = 600ms of idle time.
       - Required buffer depth to hide P99 stall: 900ms / 150ms/batch = 6 batches.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Bound (Network Jitter).** The buffer must hold at least 6 batches to ensure the GPU remains fed during the longest expected multi-tenant network jitter.
