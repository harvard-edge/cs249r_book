title: Compute-Optimal Scaling Laws Verification with Roofline on A100
scenario: Chinchilla scaling laws suggest that for 1 trillion training tokens, the compute-optimal model
  is ~50B parameters (roughly 1:20 param:token ratio). Verify this using a roofline analysis on an A100
  cluster of 1024 GPUs. Calculate the compute time, memory footprint, and whether the job is compute or
  memory bound.
question: "For a 50B model trained on 1T tokens across 1024 A100s, what are the training time, memory footprint, and roofline bottleneck?"
details:
  realistic_solution: '50B model training: FLOPs = 6 × N × D = 6 × 50B × 1T = 300 ZFLOPs. A100 cluster:
    1024 × 312 TFLOPS = 319 PFLOPS peak. At 50% MFU: 160 PFLOPS effective. Training time: 300e21 / 160e15
    = 1.875e6 seconds ≈ 21.7 days. Memory: 50B params × 16 bytes (mixed precision: 4B weights + 4B gradients
    + 8B optimizer) = 800GB. Across 1024 GPUs: 800GB/1024 = 0.78GB per GPU — well within 80GB. Model parallelism
    not needed for memory. KV cache negligible in training. For this job: GEMM arithmetic intensity >>
    ridge point → compute-bound training. The bottleneck is compute budget, not memory.'
  common_mistake: Conflating the compute-optimal training job (minimize loss for a fixed compute budget)
    with the inference-optimal model (minimize inference cost for a target accuracy).
  napkin_math: 'FLOPs: 6×50B×1T = 300 ZFLOPs = 3×10^23. Cluster: 1024×312e12×0.5 = 1.6×10^17 FLOPS. Time:
    3×10^23 / 1.6×10^17 = 1.875×10^6s = 21.7 days. Model memory (FP16 weights alone): 50B × 2B = 100GB;
    full training state (16B/param): 800GB. With ZeRO-3 across 1024 GPUs: 800GB/1024 = 0.78GB per GPU
    for optimizer/grad shards, but model weights themselves require tensor parallelism (each GPU holds
    50B/1024 ≈ 0.097GB weights shard). Memory is not the bottleneck here. Compute-bound at 50% MFU.'
