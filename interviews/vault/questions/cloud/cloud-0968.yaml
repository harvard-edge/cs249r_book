title: Clean-Label Poisoning Ratio Calculation
scenario: Your cloud AI platform trains a malware detection model weekly on a cluster of 8x A100 GPUs
  using a dataset of 5 million samples. A specific malware family class contains exactly 10,000 clean
  training samples. An attacker aims to perform a clean-label poisoning attack to create a backdoor for
  a targeted benign file, causing it to be misclassified as malware. They use feature collision to craft
  poisoned malware samples (which human reviewers verify as malware, keeping the label "clean"). To successfully
  manipulate the linear decision boundary in the 1024-dimensional feature space, the attacker needs a
  poisoning ratio of at least 5% within the target class. Calculate the minimum number of poisoned samples
  the attacker must inject.
details:
  realistic_solution: The poisoning ratio is defined as the number of poisoned samples divided by the
    total number of samples in the class after injection. By setting up the equation N_poison / (N_clean
    + N_poison) = 0.05 and solving for N_poison, we determine that the attacker needs at least 527 samples
    to breach the 5% threshold.
  common_mistake: Calculating the required poisoned samples based only on the original clean sample count
    (10,000 * 0.05 = 500) rather than the final total class size, which slightly underestimates the attack
    requirement.
  napkin_math: 'p = N_p / (N_c + N_p)

    0.05 = N_p / (10,000 + N_p)

    0.05 * 10,000 + 0.05 * N_p = N_p

    500 = 0.95 * N_p

    N_p = 500 / 0.95

    N_p ≈ 526.31

    Since we need whole samples, the minimum required is 527. (Check: 527 / 10,527 ≈ 0.05006)'
