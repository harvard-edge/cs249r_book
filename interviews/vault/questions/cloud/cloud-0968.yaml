title: Clean-Label Poisoning Ratio Calculation
scenario: Your cloud AI platform trains a malware detection model weekly on a cluster of 8x A100 GPUs using a dataset of 5 million samples. A specific malware family class contains exactly 10,000 clean training samples. An attacker aims to perform a clean-label poisoning attack to create a backdoor for a targeted benign file, causing it to be misclassified as malware. They use feature collision to craft poisoned malware samples (which human reviewers verify as malware, keeping the label "clean"). To successfully manipulate the linear decision boundary in the 1024-dimensional feature space, the attacker needs a poisoning ratio of at least 5% within the target class.
question: What is the minimum number of clean-label poisoned samples needed to reach a 5% poisoning ratio in the 10,000-sample target class?
details:
  realistic_solution: The poisoning ratio is defined as the number of poisoned samples divided by the total number of samples in the class after injection. By setting up the equation N_poison / (N_clean + N_poison) = 0.05 and solving for N_poison, we determine that the attacker needs at least 527 samples to breach the 5% threshold.
  common_mistake: |
    **The Pitfall:** Calculating the poisoned samples based only on the original clean sample count.
    **The Rationale:** Candidates take 5% of 10,000 (500) and ignore that adding samples increases the denominator.
    **The Consequence:** Slightly underestimating the required attack surface, which in rigorous security assessments can mean the difference between a successful backdoor and failure.
  napkin_math: |
    - **Equation Setup:** `p = N_poison / (N_clean + N_poison)`
    - **Target Ratio:** `0.05 = N_poison / (10,000 + N_poison)`
    - **Solving:** `500 + 0.05 * N_poison = N_poison`
    - **Result:** `500 = 0.95 * N_poison` -> `N_poison = 500 / 0.95 ≈ 526.31`
    - **Conclusion:** Since whole samples are needed, the minimum required is **527 samples**.
