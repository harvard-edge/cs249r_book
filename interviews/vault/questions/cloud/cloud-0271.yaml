title: The Fusion Bottleneck
scenario: 'An ML compiler performs operator fusion on a set of sequential layers.'
question: 'When an ML compiler performs operator fusion, what is the primary hardware bottleneck it is designed to reduce?'
details:
  realistic_solution: 'The primary bottleneck reduced by operator fusion is HBM Memory Bandwidth. By combining multiple sequential operations (like a convolution and its activation function) into a single GPU kernel, intermediate result tensors can stay in fast on-chip memory (registers or L1/L2 cache) instead of being written out to and read back from much slower HBM. This dramatically reduces memory traffic.'
  common_mistake: |
    **The Pitfall:** Assuming operator fusion reduces total floating-point operations (FLOPs).
    **The Rationale:** Candidates equate "optimization" with "doing less math," rather than "moving data less frequently."
    **The Consequence:** Misunderstanding memory bandwidth as the primary bottleneck in deep learning inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM Access Latency: ~300 ns.
    - L1 Cache Latency: ~1-2 ns.

    **Calculations:**
    - Analogy: If an L1 cache access took 1 second, an HBM access would take 5 minutes.

    **Conclusion & Interpretation:**
    - **Result: HBM round-trip eliminated (Memory Bandwidth-Bound)**. Fusion drastically accelerates memory-bound layers by eliminating HBM trips.
  options:
  - 'Total computational FLOPs'
  - 'Cross-node network traffic'
  - 'HBM Memory Bandwidth'
  - 'Model storage size on disk'
