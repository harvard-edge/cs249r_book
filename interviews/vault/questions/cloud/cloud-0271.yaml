title: The Fusion Bottleneck
scenario: When an ML compiler performs 'operator fusion,' what is the primary hardware bottleneck it is
  designed to reduce?
details:
  realistic_solution: The primary bottleneck reduced by operator fusion is HBM Memory Bandwidth. By combining
    multiple sequential operations (like a convolution and its activation function) into a single GPU
    kernel, intermediate result tensors can stay in fast on-chip memory (registers or L1/L2 cache) instead
    of being written out to and read back from much slower HBM. This dramatically reduces memory traffic.
  common_mistake: Assuming fusion reduces the total number of floating-point operations (FLOPs). It does
    not; the arithmetic is identical. The performance gain comes from eliminating memory I/O and kernel
    launch overhead.
  napkin_math: Each time an intermediate tensor is written to HBM, it incurs a latency penalty of ~300
    ns just for the access, separate from the data transfer time. If an L1 cache access were 1 second,
    this HBM access would take 5 minutes. Fusion avoids this costly round-trip.
  options:
  - Total computational FLOPs
  - Cross-node network traffic
  - HBM Memory Bandwidth
  - Model storage size on disk
  correct_index: 2
