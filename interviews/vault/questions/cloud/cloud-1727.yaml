title: Diagnosing Preemption Throughput Collapse
scenario: You are serving a 70B parameter LLM on an 8x A100 80GB node for a mix of short chat queries
  and long document summarizations (up to 32K tokens). To prevent long requests from blocking short ones,
  you implement preemptive scheduling by swapping the KV cache of paused requests to CPU memory via PCIe
  Gen4 x16. Under heavy mixed load, P99 latency for chat queries improves significantly, but overall system
  throughput drops by 60% and GPU utilization falls below 40%. Diagnose the root cause of this throughput
  collapse.
question: "Why did preemptive KV-cache swapping over PCIe improve chat P99 latency but collapse throughput and GPU utilization?"
details:
  realistic_solution: Diagnose PCIe bandwidth saturation caused by moving massive KV caches. The solution
    is to switch to prompt recomputation for long contexts, where the compute time to recalculate the
    KV cache is lower than the PCIe transfer time, or to implement block-level swapping (like PagedAttention)
    to move only active pages.
  common_mistake: Assuming CPU memory access latency or OS-level page faulting is the primary bottleneck,
    while ignoring the massive data transfer constraints of the PCIe bus during state swapping.
  napkin_math: For a 70B model, KV cache is roughly 320KB per token. A 32K token request requires ~10.5GB
    of KV cache. Swapping this request out to CPU and back in requires 21GB of PCIe transfer. With PCIe
    Gen4 x16 (effective bandwidth ~26GB/s), a single swap cycle takes ~800ms. If the scheduler preempts
    just 2 long requests per second, it demands >42GB/s, completely saturating the bus and stalling the
    GPUs while they wait for memory transfers.
