title: Analyze inverted residual bottleneck memory access patterns on A100
scenario: You are analyzing MobileNetV2's inverted residual block (expand->depthwise->project, expansion ratio t=6) running on A100. The block takes 112x112x32 feature maps. A performance engineer claims the expand layer is the bottleneck.
question: Is the MobileNetV2 expand layer the bottleneck for 112x112x32 inputs on A100, or are depthwise/project layers more bandwidth-bound?
details:
  realistic_solution: |
    Expand (1x1): input 32ch -> 192ch at 112x112. FLOPs = 2*32*192*112^2 = 154M. Output tensor = 192*112*112*2B = 4.8MB. Depthwise (3x3): 192ch, 112x112. FLOPs = 2*192*9*112^2 = 43M (memory-bound). Project (1x1): 192->32. FLOPs = 2*192*32*112^2 = 154M. The expand layer produces the largest intermediate activation; at t=6 the expand ratio balloons memory, not compute. On A100 HBM2e (2TB/s), depthwise is most bandwidth-bound (43M FLOPs / 4.8MB read ≈ 9 FLOP/byte -> below roofline). Expand is compute-dominant but its large output strains L2.
  common_mistake: |
    **The Pitfall:** Assuming the depthwise conv is always the bottleneck because it has the most spatial work.
    **The Rationale:** Candidates ignore that the 1x1 expand conv generates large intermediate tensors that stress memory bandwidth.
    **The Consequence:** The wrong layer is targeted for optimization, leaving the actual memory bottlenecks unaddressed.
  napkin_math: |
    - **A100 Ridge Point:** 312 TFLOPS / 2 TB/s = 156 FLOP/byte.
    - **Expand (1x1):** 154M FLOPs, reads 0.8MB -> 193 FLOP/byte (**compute-bound**).
    - **Depthwise (3x3):** 43M FLOPs, reads ~4.8MB -> 9 FLOP/byte (**memory-bound**).
    - **Project (1x1):** 154M FLOPs, reads 4.8MB -> 32 FLOP/byte (**memory-bound**).
    - **Result:** The depthwise and project layers are severely bandwidth-limited, not the expand layer.
