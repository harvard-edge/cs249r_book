title: FP8 Activation Memory Savings
scenario: A training run stores 24 GB of activation tensors that are eligible for FP8 storage. Moving these activations from FP16 to FP8 halves their bytes but adds a 2 GB scaling/metadata overhead.
question: How much memory is saved by converting 24 GB of FP16 activations to FP8 if metadata adds 2 GB?
details:
  realistic_solution: In this idealized byte model, FP8 halves the listed 24 GB to 12 GB. Adding 2 GB metadata gives 14 GB. Net savings are 10 GB per GPU. The change is useful if numerical stability, kernel support, and framework storage format are acceptable.
  common_mistake: |
    **The Pitfall:** Claiming a full 2x total memory reduction without subtracting the metadata.
    **The Rationale:** It is tempting to apply a blanket "FP16 to FP8 is half the size" rule, ignoring the architectural reality that FP8 often requires parallel scaling factors and block metadata to maintain numerical stability.
    **The Consequence:** Memory budgets run too tight, resulting in unexpected out-of-memory errors when the metadata expands.
  napkin_math: |
    - **Original Memory:** $24\text{ GB (FP16)}$.
    - **Base FP8 Memory:** $24 / 2 = 12\text{ GB}$.
    - **New Memory with Metadata:** $12\text{ GB} + 2\text{ GB} = 14\text{ GB}$.
    - **Net Savings:** $24\text{ GB} - 14\text{ GB} = 10\text{ GB}$.
    - **Conclusion:** **Net memory savings are 10 GB per GPU.**
