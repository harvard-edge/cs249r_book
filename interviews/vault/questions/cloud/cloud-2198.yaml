title: The Benchmark Gaming Red Flags
scenario: A hardware vendor claims their new accelerator achieves 2x higher MLPerf
  Training throughput than the competition on ResNet-50. You notice their submission
  uses a batch size of 128K with a custom learning rate schedule, and they report
  'time to quality' at 75.9% top-1 accuracy (the MLPerf threshold is 75.9%). What
  benchmark gaming techniques should you suspect, and how does MLPerf's compliance
  framework attempt to prevent them?
question: What benchmark gaming techniques should you suspect, and how does MLPerf's
  compliance framework attempt to prevent them?
details:
  realistic_solution: 'Three gaming red flags: (1) Accuracy cliff-hanging: Training
    to exactly 75.9% (the minimum) rather than the 76.5%+ needed for production suggests
    the model was optimized to reach the threshold as fast as possible, not to converge
    to a useful model. MLPerf requires reaching the target but not exceeding it, creating
    incentive to under-train. (2) Unrealistic batch size: 128K batch is feasible only
    on the vendor''s specific cluster topology and requires a custom LR schedule that
    may not generalize. Real workloads use 256-4K batch sizes. (3) Hyperparameter
    overfitting: The custom LR schedule may be tuned specifically for the target accuracy
    on the specific validation set. MLPerf''s compliance rules require using the reference
    model architecture, optimizer, and data augmentation \u2014 but allow tuning batch
    size, LR, and number of workers. The Rules Committee reviews submissions, and
    the closed division restricts hyperparameter changes, but the open division permits
    more aggressive tuning.'
  common_mistake: Taking the MLPerf number at face value because 'MLPerf is the gold
    standard.' MLPerf prevents outright cheating but cannot prevent all forms of benchmark
    optimization that don't transfer to real workloads.
  napkin_math: 'Training at 128K batch vs 4K batch: 32x fewer gradient steps, but
    each step processes 32x more data. Communication overhead at 128K batch: AllReduce
    of 25M params across 1,024 GPUs \u2248 2 * 50 MB / 50 GB/s = 2ms per step. At 4K batch
    across 32 GPUs: same 2ms. The 128K submission parallelizes communication perfectly
    but requires LR warmup from 0.1 to 3.2 \u2014 a regime where convergence is fragile.'
  options:
  - "The only red flag is the 128K batch size, which exceeds the memory capacity of the A100. MLPerf prevents this by requiring all submissions to use a strict 4K batch size regardless of cluster scale."
  - "Three gaming red flags: accuracy cliff-hanging, unrealistic 128K batch size, and hyperparameter overfitting with a custom LR schedule. MLPerf's compliance framework attempts to prevent this by enforcing reference architectures, optimizers, and restricting hyperparameter tuning in the Closed division."
  - "The main red flag is training to exactly 75.9% accuracy. MLPerf rules require training to at least 80% accuracy for ResNet-50 to ensure the model has converged properly before stopping the timer."
  - "There are no red flags; 128K batch sizes with custom LR schedules are standard practice for large clusters. MLPerf encourages these optimizations to push the boundaries of hardware utilization."
  correct_index: 1
