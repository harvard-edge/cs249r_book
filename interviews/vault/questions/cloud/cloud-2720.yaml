title: Permanent vs Transient Faults
scenario: A GPU in your training cluster produces incorrect matrix multiplication results. The error persists
  after restarting the process but disappears when the workload moves to a different GPU. Explain what
  type of fault this is and why the distinction matters for remediation.
question: "What type of fault is a GPU matmul error that persists after process restart but disappears on another GPU, and why does it matter?"
details:
  realistic_solution: 'This is a permanent fault — the error is tied to the specific physical GPU, not
    the workload or software. It persists across restarts but does not follow the workload to other hardware.
    Permanent faults result from irreversible physical damage: electromigration, cracked solder joints,
    damaged memory cells, or burnt-out transistors. The distinction matters because: (1) retry/restart
    cannot fix permanent faults (unlike transient faults from cosmic rays or voltage glitches), (2) the
    GPU must be physically replaced or permanently excluded from the scheduling pool, (3) training must
    checkpoint and migrate to healthy hardware, and (4) silent data corruption from permanent faults is
    especially dangerous because it produces wrong gradients without crashing.'
  common_mistake: Assuming all hardware errors are transient and can be fixed by restarting. Permanent
    faults require physical intervention — no amount of software retry will fix burnt silicon.
  napkin_math: 'Transient fault: retry works. Permanent fault: GPU must be replaced. Silent corruption
    from permanent faults can waste days of training before detection.'
