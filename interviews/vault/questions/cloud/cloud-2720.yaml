title: Permanent vs Transient Faults
scenario: A GPU in your training cluster produces incorrect matrix multiplication results. The error persists after restarting the process but disappears when the workload moves to a different GPU.
question: What type of fault is a GPU matmul error that persists after process restart but disappears on another GPU, and why does it matter?
details:
  realistic_solution: 'This is a permanent fault — the error is tied to the specific physical GPU, not the workload or software. It persists across restarts but does not follow the workload to other hardware. Permanent faults result from irreversible physical damage: electromigration, cracked solder joints, damaged memory cells, or burnt-out transistors. The distinction matters because: (1) retry/restart cannot fix permanent faults (unlike transient faults from cosmic rays or voltage glitches), (2) the GPU must be physically replaced or permanently excluded from the scheduling pool, (3) training must checkpoint and migrate to healthy hardware, and (4) silent data corruption from permanent faults is especially dangerous because it produces wrong gradients without crashing.'
  common_mistake: |
    **The Pitfall:** Assuming all hardware errors are transient and can be fixed by restarting.
    **The Rationale:** Most software engineers are conditioned to view reboots as the ultimate cure for state-related glitches.
    **The Consequence:** No amount of software retry will fix burnt silicon. The system repeatedly fails, or worse, produces silent data corruption that poisons days of training gradients.
  napkin_math: |
    - **Transient Fault:** Cosmic ray or voltage glitch. Retry works.
    - **Permanent Fault:** Electromigration or physical damage. GPU must be replaced.
    - **Conclusion:** Permanent faults cause silent corruption that can waste **massive amounts of training time** before detection.
