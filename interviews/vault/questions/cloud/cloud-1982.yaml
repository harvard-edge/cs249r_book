title: Diagnosing A/B Test Interference in Social Networks
scenario: You are running a 50/50 A/B test on a new dual-encoder recommendation model serving a social network with 100M DAU. The treatment group shows a +5.0% increase in content creation, while the control group shows an unexpected -2.0% decrease. Total platform content creation only increased by +1.5%.
question: Why does a +5% treatment lift produce only a +1.5% global content-creation increase, and how should the experiment be redesigned?
details:
  realistic_solution: Diagnose a Stable Unit Treatment Value Assumption (SUTVA) violation where treatment users outcompete control users for attention. Switch from user-level randomization to network-cluster randomization (graph partitioning) to isolate treatment effects.
  common_mistake: |
    **The Pitfall:** Blaming external factors for the control group's decline.
    **The Rationale:** Analysts often assume treatment and control are perfectly isolated and look for macro-trends or seasonality to explain control behavior.
    **The Consequence:** Completely missing the zero-sum interference within the social graph, leading to overly optimistic product rollouts that fail to yield expected global lifts.
  napkin_math: |
    1. Assumptions & Constraints: 50% treatment, 50% control. Treatment +5%, Control -2%. User attention is a zero-sum constraint.
    2. Calculations: True global lift = (0.50 * 5%) + (0.50 * -2%) = 2.5% - 1.0% = 1.5%.
    3. Conclusion & Interpretation: **Result: Global lift is 1.5% due to zero-sum cannibalization. Bottleneck: SUTVA Violation.**
