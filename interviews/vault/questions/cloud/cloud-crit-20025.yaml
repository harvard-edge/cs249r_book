title: Ring Attention Communication-Computation Overlap Budget
scenario: 'You are designing Ring Attention for a 70B model across 16 GPUs (2 nodes, 8 NVLink GPUs/node,
  400 Gb/s InfiniBand between nodes). Sequence length: 256K tokens split evenly (16K/GPU). Head_dim=128,
  8 GQA KV heads. Analyze whether the inter-node InfiniBand link is the bottleneck and propose a topology-aware
  ring ordering.'
question: "Is the 400 Gb/s InfiniBand link a bottleneck for Ring Attention across 16 GPUs at 256K context, and what ring ordering should you use?"
details:
  realistic_solution: 'KV block per GPU: 16K tokens x 8 KV_heads x 128 dim x 2B x 2(K+V) = 64MB per layer.
    Per ring step, send 64MB. NVLink intra-node: 900 GB/s, transfer: 64MB / 900 = 0.07ms. InfiniBand inter-node:
    400 Gb/s = 50 GB/s, transfer: 64MB / 50 = 1.28ms. Compute per ring step (FlashAttention on 16Kx16K):
    ~2ms on H100. Naive ring: 2 cross-node transfers per revolution of 15 steps. Those 2 steps have 1.28ms
    transfer vs 2ms compute — still overlapped (comm < compute). But at shorter sequences or smaller models,
    compute drops below 1.28ms and InfiniBand becomes the bottleneck. Topology-aware ring: order GPUs
    0-7 (node1), then 8-15 (node2), so only step 7->8 and 15->0 are cross-node (2 transfers unavoidable
    in a ring of 16 spanning 2 nodes). This is already optimal. Alternative: use 2 intra-node rings with
    a single cross-node all-reduce to reduce cross-node transfers to 1.'
  common_mistake: Using a naive ring order (GPU 0,1,2,...,15) which crosses the InfiniBand boundary 2
    times per ring revolution. Topology-aware ordering minimizes cross-node transfers.
  napkin_math: 'NVLink step: 64MB / 900 GB/s = 0.07ms. InfiniBand step: 64MB / 50 GB/s = 1.28ms. Compute:
    ~2ms. Overlap ratio: NVLink 0.04x, IB 0.64x — both overlap. Bottleneck threshold: when compute < 1.28ms
    (smaller model or shorter chunks).'
