title: Build Custom vs Use Off-the-Shelf ML Package
scenario: A fintech company uses an off-the-shelf AutoML package for credit scoring, wrapped in 6,000
  lines of glue code for data formatting, feature engineering, and compliance logging. A senior engineer
  proposes replacing AutoML with a custom model (2,000 lines) that natively handles the company's data
  schema, reducing glue to 1,500 lines. Should they do it?
details:
  realistic_solution: 'This is a classic glue code trade-off. Current state: 6,000 lines glue + generic
    AutoML = high maintenance, rigid coupling, compliance risk (glue may not properly transform all edge
    cases). Proposed state: 2,000 lines custom model + 1,500 lines minimal glue = 3,500 total lines, 46%
    reduction. Benefits: (1) 46% less code to maintain, (2) data contracts are explicit in the model,
    not implicit in glue, (3) compliance logging can be built into the training pipeline, (4) team gains
    deep understanding of the model for regulatory audits. Risks: (1) custom model needs expertise to
    build and maintain, (2) AutoML may yield better accuracy through automated HPO, (3) regulatory changes
    may require model changes (harder with custom). The proposal is sound IF the team has the expertise.
    In fintech, regulatory explainability often requires custom models anyway — AutoML''s black-box nature
    makes compliance harder despite reducing model development effort.'
  common_mistake: Keeping the off-the-shelf package because 'it works.' The true cost is the 6,000 lines
    of glue code that grow with every new requirement, eventually exceeding the cost of a custom solution.
  napkin_math: 'Current: 6K glue + 500 model = 6.5K lines, ~20 bugs/mo. Proposed: 1.5K glue + 2K model
    = 3.5K lines, ~8 bugs/mo. 60% fewer bugs if implemented well.'
