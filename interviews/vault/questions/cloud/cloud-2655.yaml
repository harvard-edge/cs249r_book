title: Build Custom vs Use Off-the-Shelf ML Package
scenario: 'A fintech company uses an off-the-shelf AutoML package for credit scoring, wrapped in 6,000 lines of glue code for data formatting, feature engineering, and compliance logging. A senior engineer proposes replacing AutoML with a custom model (2,000 lines) that natively handles the company''s data schema, reducing glue to 1,500 lines.'
question: 'Should they do it?'
details:
  realistic_solution: |
    Yes, if the team has the expertise. This is a classic glue code trade-off. A 46% reduction in total lines of code means less maintenance and fewer bugs. Data contracts become explicit in the model, and compliance logging can be natively integrated. In fintech, regulatory explainability requires custom models anyway, making AutoML's black-box nature a liability.
  common_mistake: |
    **The Pitfall:** Keeping the off-the-shelf package because "it works."
    **The Rationale:** Candidates underestimate the technical debt of massive glue code.
    **The Consequence:** The glue code grows with every new requirement, eventually exceeding the cost of a custom solution and introducing hidden compliance bugs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current: 6K glue + 500 model = 6.5K lines.
    - Proposed: 1.5K glue + 2K model = 3.5K lines.
    - Defect rate scales roughly linearly with lines of code.

    **Calculations:**
    - Total reduction in code: (6.5K - 3.5K) / 6.5K = 46% reduction.

    **Conclusion & Interpretation:**
    - **Result: 46% reduction (Maintainability-Bound)**. Moving to a custom model reduces total codebase complexity significantly.
