title: Model Cache Hit Rate and Latency Impact
scenario: 'A serving platform has 80GB GPU VRAM. Model sizes: 50 small models (500MB each), 10 medium models (4GB each), 2 large models (20GB each). Traffic: 60% to small, 30% to medium, 10% to large.'
question: 'With 80GB VRAM and an LRU strategy proportional to traffic, how many models of each size fit, and what hit rate and average latency result?'
details:
  realistic_solution: 'Strategy 1 (proportional to traffic): Allocate 60% VRAM to small, 30% to medium, 10% to large. Small: 48GB / 500MB = 96, but only 50 exist → 50 models, 25GB used. Medium: 24GB / 4GB = 6 of 10 models. Large: 8GB for 20GB models → 0 fit. Remaining: 80 - 25 - 24 = 31GB. Use remaining for 1 large (20GB) + 2 more medium (8GB) + 6 more small (3GB but all already loaded). Final: 50 small (all), 8 medium, 1 large. Hit rate: 60% × 100% + 30% × 80% + 10% × 50% = 60% + 24% + 5% = 89% hit rate. Miss rate 11%. If miss penalty = 5s and hit latency = 20ms: avg latency = 0.89 × 20ms + 0.11 × 5000ms = 17.8ms + 550ms = 567.8ms. The 11% miss rate dominates average latency despite 89% hit rate.'
  common_mistake: |
    **The Pitfall:** Celebrating an 89% cache hit rate as a success.
    **The Rationale:** In standard web caching, 89% is excellent.
    **The Consequence:** In model serving with huge miss penalties (seconds), even an 11% miss rate completely dominates the average latency, ruining the user experience.
  napkin_math: |
    - **VRAM Budget:** 50 small (25GB) + 8 medium (32GB) + 1 large (20GB) = 77GB used.
    - **Hit Rate Calculation:** 60% × 100% (small) + 30% × 80% (medium) + 10% × 50% (large) = 60% + 24% + 5% = **89% hit rate**.
    - **Miss Rate:** 11%.
    - **Average Latency:** (0.89 × 20ms hit) + (0.11 × 5000ms miss) = 17.8ms + 550ms = **567.8ms**.
