title: Yield-Performance Tradeoff in Chiplet Design
scenario: Your team is deciding between a monolithic 600mm² die vs a 4-chiplet design of 150mm² dies for a next-gen ML accelerator. What yield and performance arguments should you present?
question: What yield and performance arguments should you present?
details:
  realistic_solution: 'Die yield follows Poisson: Y ≈ (1 + D₀A/α)^(-α). At D₀=0.1 defects/cm², a 600mm² die yields ~59% while a 150mm² die yields ~86%. Four 150mm² chiplets cost ~1.46x less per working unit. The performance penalty is only paid for cross-chiplet traffic, which good partitioning minimizes by keeping hot data paths within a single die.'
  common_mistake: Assuming monolithic is always faster because there are no interconnect hops. This ignores that defect density makes large dies exponentially costly to manufacture.
  napkin_math: 'D₀=0.1/cm², α=2 (clustering). Y_mono = (1 + 0.1×6/2)^-2 = (1.3)^-2 ≈ 59%. Y_chiplet = (1 + 0.1×1.5/2)^-2 = (1.075)^-2 ≈ 86%. 4-chiplet system: P(all 4 good) = 0.86^4 ≈ 55%, but bad dies are discarded individually making bin yield economics far better.'
