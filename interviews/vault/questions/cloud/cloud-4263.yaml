title: Yield-Performance Tradeoff in Chiplet Design
scenario: Your team is deciding between a monolithic 600mm² die vs a 4-chiplet design of 150mm² dies for a next-gen ML accelerator.
question: What yield and performance arguments should you present?
details:
  realistic_solution: 'Die yield follows Poisson: Y ≈ (1 + D₀A/α)^(-α). At D₀=0.1 defects/cm², a 600mm² die yields ~59% while a 150mm² die yields ~86%. Four 150mm² chiplets cost ~1.46x less per working unit. The performance penalty is only paid for cross-chiplet traffic, which good partitioning minimizes by keeping hot data paths within a single die.'
  common_mistake: |
    **The Pitfall:** Assuming a monolithic die is always superior because there are no interconnect hops.
    **The Rationale:** It's intuitive to think that keeping everything on one piece of silicon maximizes performance and minimizes latency.
    **The Consequence:** Ignoring defect density makes large dies exponentially costly to manufacture, ruining the unit economics of the accelerator.
  napkin_math: |
    * Defect density (D₀) = 0.1/cm², Clustering factor (α) = 2.
    * Monolithic Yield (Y_mono): (1 + 0.1 × 6 / 2)^(-2) = (1.3)^(-2) ≈ 59%.
    * Chiplet Yield (Y_chiplet): (1 + 0.1 × 1.5 / 2)^(-2) = (1.075)^(-2) ≈ 86%.
    * 4-chiplet system yield probability: P(all 4 good) = 0.86^4 ≈ 55%.
    * **While system yield is similar (55% vs 59%), bad chiplets are discarded individually, making the bin yield economics far better for the 150mm² design.**
