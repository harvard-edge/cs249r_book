title: Cloud Zero Copy Serialization L3 0
scenario: Your inference server receives 10,000 requests/second. Each request carries a 512-dim FP32 embedding
  vector. Compare the CPU cost of JSON deserialization vs. FlatBuffers zero-copy access for this traffic.
details:
  realistic_solution: 'Payload: 512 × 4 bytes = 2 KB per request (binary). JSON: 512 floats as strings
    ≈ 5-6 KB text + field names ≈ 8 KB total. JSON parsing at ~200 MB/s throughput: 8 KB × 10,000 = 80
    MB/s → 0.4 CPU cores. Plus allocation of 512 float objects per request = 5.12M allocations/s → GC
    pressure. FlatBuffers: 2 KB binary, zero parse cost, just pointer arithmetic. CPU cost: essentially
    zero (pointer offset computation). Bandwidth: 2 KB × 10,000 = 20 MB/s wire traffic vs. 80 MB/s for
    JSON. Total savings: 0.4 CPU cores + 75% bandwidth reduction + eliminated GC pauses.'
  common_mistake: Only comparing serialization speed and ignoring bandwidth. Zero-copy binary formats
    are typically 2-4x smaller than JSON, reducing both network transfer time and serialization cost simultaneously.
  napkin_math: 'JSON: 8 KB × 10K req/s = 80 MB/s parse throughput, ~0.4 CPU cores. FlatBuffers: 0 parse
    CPU, 2 KB × 10K = 20 MB/s wire. Bandwidth savings: 75%. CPU savings: 0.4 cores. At 100K req/s: JSON
    needs 4 cores just for parsing; FlatBuffers needs ~0.'
