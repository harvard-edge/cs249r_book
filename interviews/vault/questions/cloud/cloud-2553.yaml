title: Cloud Zero Copy Serialization L3 0
scenario: Your inference server receives 10,000 requests/second. Each request carries a 512-dim FP32 embedding vector.
question: At 10,000 requests/s with a 512-dim FP32 embedding per request, what CPU and bandwidth costs do JSON and FlatBuffers incur?
details:
  realistic_solution: 'Payload: 512 × 4 bytes = 2 KB per request (binary). JSON: 512 floats as strings ≈ 5-6 KB text + field names ≈ 8 KB total. JSON parsing at ~200 MB/s throughput: 8 KB × 10,000 = 80 MB/s → 0.4 CPU cores. Plus allocation of 512 float objects per request = 5.12M allocations/s → GC pressure. FlatBuffers: 2 KB binary, zero parse cost, just pointer arithmetic. CPU cost: essentially zero (pointer offset computation). Bandwidth: 2 KB × 10,000 = 20 MB/s wire traffic vs. 80 MB/s for JSON. Total savings: 0.4 CPU cores + 75% bandwidth reduction + eliminated GC pauses.'
  common_mistake: |
    **The Pitfall:** Only comparing serialization CPU speed and ignoring bandwidth.
    **The Rationale:** Engineers often evaluate serialization formats based on benchmark micro-seconds without considering network payloads.
    **The Consequence:** Missing that zero-copy binary formats are 2-4x smaller than JSON, reducing both network transfer time and serialization cost simultaneously.
  napkin_math: |
    - **Payload Size:** 512 * 4 bytes = 2 KB binary (FlatBuffers).
    - **JSON Size:** 512 floats as text (~12 bytes each) + field names ≈ 8 KB.
    - **JSON Parsing:** 8 KB * 10,000 req/s = 80 MB/s. At ~200 MB/s parse throughput per core, this consumes **0.4 CPU cores**.
    - **FlatBuffers Parsing:** 0 parse CPU, just pointer arithmetic.
    - **Bandwidth:** JSON uses 80 MB/s wire traffic. FlatBuffers uses 20 MB/s.
    - **Conclusion:** FlatBuffers yields a **75% bandwidth savings** and saves **0.4 CPU cores**.
