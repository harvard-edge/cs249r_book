title: The Multi-Modal Prefill Stall
scenario: "You are deploying a multi-modal model (ViT + LLM) that analyzes high-resolution images (1024x1024) and text. Users report that prompts with images have an abysmal Time-To-First-Token (TTFT) of nearly 4 seconds, while text-only prompts are fast. Your product manager suggests a quick fix: just downsample all images to 224x224. You argue this will unacceptably degrade accuracy for tasks requiring fine-grained detail."
question: "Why is the high-resolution image processing so slow, and what fundamental compute trade-off is the PM missing?"
details:
  realistic_solution: "The catastrophic TTFT is caused by the quadratic complexity of the self-attention mechanism within the Vision Transformer. The TTFT is the sum of `T_vision_encoder + T_llm_prefill`. The `T_vision_encoder` term is not constant; it scales with the square of the number of patches from the image. A high-resolution image creates a massive 'sequence' for the ViT, leading to a compute explosion before the LLM even sees a single token."
  common_mistake: |
    **The Pitfall:** Blaming the network transfer time or the LLM prefill phase for the high-resolution image slowdown.
    **The Rationale:** Text LLMs scale linearly with context, so people assume the image preprocessor also scales linearly with pixels.
    **The Consequence:** Wasting time optimizing network transport or LLM KV caches, instead of implementing ViT optimizations like FlashAttention or local windowed attention.
  napkin_math: |
    *   **224x224 Resolution (14x14 patches):** Sequence length N = (224/14)^2 = 256 patches.
    *   **1024x1024 Resolution (14x14 patches):** Sequence length N = (1024/14)^2 = 5,329 patches.
    *   **Self-Attention Complexity:** O(N^2). Operations scale by N^2.
    *   **High-Res Compute:** 5,329^2 = 28.4M interactions.
    *   **Low-Res Compute:** 256^2 = 65.5K interactions.
    *   **Result:** **A 433x increase in self-attention compute (28.4M / 65.5K), monopolizing the GPU before the LLM prefill even starts.**
