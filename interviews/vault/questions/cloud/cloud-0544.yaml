title: The Multi-Modal Prefill Stall
scenario: "You are deploying a multi-modal model (ViT + LLM) that analyzes high-resolution images (1024x1024) and text. Users report that prompts with images have an abysmal Time-To-First-Token (TTFT) of nearly 4 seconds, while text-only prompts are fast. Your product manager suggests a quick fix: just downsample all images to 224x224. You argue this will unacceptably degrade accuracy for tasks requiring fine-grained detail."
question: "Why is the high-resolution image processing so slow, and what fundamental compute trade-off is the PM missing?"
details:
  realistic_solution: "The catastrophic TTFT is caused by the quadratic complexity of the self-attention mechanism within the Vision Transformer. The TTFT is the sum of T_vision_encoder + T_llm_prefill. The T_vision_encoder term is not constant; it scales with the square of the number of patches from the image. A high-resolution image creates a massive 'sequence' for the ViT, leading to a compute explosion before the LLM even sees a single token. Adopting FlashAttention or windowed attention resolves this without sacrificing resolution."
  common_mistake: |
    **The Pitfall:** Blaming the network transfer time or the LLM prefill phase for the high-resolution image slowdown.
    **The Rationale:** Text LLMs scale linearly with context, so people assume the image preprocessor also scales linearly with pixels.
    **The Consequence:** Wasting time optimizing network transport or LLM KV caches, instead of implementing ViT optimizations like FlashAttention or local windowed attention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Self-Attention Complexity: O(N^2).
       - ViT typically uses 16x16 patches.
    2. **Calculations:**
       - 224x224 Resolution: N = (224/16)^2 = 14^2 = 196 patches.
       - 1024x1024 Resolution: N = (1024/16)^2 = 64^2 = 4096 patches.
       - Low-Res Compute: 196^2 = 38,416 interactions.
       - High-Res Compute: 4096^2 = 16,777,216 interactions.
       - Ratio: 16,777,216 / 38,416 = 436.7x.
    3. **Conclusion & Interpretation:**
       **A ~437x increase in self-attention compute. Result: Compute-Bound explosion monopolizing the GPU.**
