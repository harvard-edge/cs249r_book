title: The Chatbot Latency Crisis (cloud-0129)
scenario: You are the lead ML Systems Engineer deploying a new chatbot powered by a 7B parameter LLM on H100 GPUs. User satisfaction is plummeting due to slow response times. Your SLA requires a P99 Time-To-First-Token (TTFT) of less than 200ms.
question: What serving-policy issue is most likely causing the P99 TTFT to exceed the 200ms SLA, and how should it be fixed?
details:
  realistic_solution: The root cause is the static batching policy. A request that arrives just after a batch has been dispatched must wait the entire 100ms timeout window before it can even be considered for processing. This waiting time is pure queuing delay. The worst-case TTFT is at least this queuing delay plus the prefill time. Switching to continuous batching (or iterative batching) resolves this. Continuous batching systems process requests in micro-batches, adding new requests to the queue on-the-fly without a fixed waiting window.
  common_mistake: |
    **The Pitfall:** Conflating throughput (Tokens-Per-Output-Time, TPOT) with latency (TTFT).
    **The Rationale:** Engineers increase batch sizes to improve utilization, ignoring the queuing delay users face while waiting for a static batch to form.
    **The Consequence:** P99 TTFT degrades severely for individual users, violating SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B FP16 model (14GB), H100 bandwidth (3.35 TB/s).
       - Static batch size of 100.
    2. **Calculations:**
       - Memory-Bound Decode: 14GB / 3.35TB/s = 4.1ms per token.
       - Batch Decode Time: 100 tokens * 4.1ms = 410ms.
       - Total TTFT: 410ms static wait + 20ms prefill = 430ms.
    3. **Conclusion & Interpretation:**
       - **Continuous batching limits wait time to 4.1ms, eliminating the 410ms static queuing delay. Result: Latency-Bound.**
  options:
  - The H100 bandwidth limits decode to 4.1ms per token, so a 100-token batch takes 410ms, violating the 200ms SLA without faster GPUs.
  - The arrival rate is causing a queue backup; 410ms decode time exceeds the 100ms static window, requiring more replicas.
  - The static batching window is the bottleneck. The 410ms batch decode acts as a queuing delay; we must switch to continuous batching.
  - System throughput is too low. Increasing static batch size to 200 will reduce per-token latency to 2.05ms.
  correct_index: 2
