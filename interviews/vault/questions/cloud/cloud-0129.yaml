title: The Chatbot Latency Crisis (cloud-0129)
scenario: You are the lead ML Systems Engineer at a fast-growing startup deploying a new chatbot powered
  by a 7B parameter LLM on H100 GPUs. User satisfaction is plummeting due to slow response times. Your
  service level agreement (SLA) requires a P99 Time-To-First-Token (TTFT) of less than 200ms.
details:
  realistic_solution: The root cause is the static batching policy. A request that arrives just after
    a batch has been dispatched must wait the entire 100ms timeout window before it can even be considered
    for processing. This waiting time is pure queuing delay. The worst-case TTFT is at least this queuing
    delay plus the prefill time. Switching to continuous batching (or iterative batching) resolves this.
    Continuous batching systems process requests in micro-batches, adding new requests to the queue on-the-fly
    without a fixed waiting window. A new request only has to wait for the current micro-batch step to
    finish before its prompt processing begins, dramatically reducing the queuing delay and thus the TTFT.
  common_mistake: Engineers often conflate throughput (Tokens-Per-Output-Time, TPOT) with latency (TTFT).
    They might try to increase the batch size to improve overall system efficiency, but this action actually
    makes the TTFT worse for any individual user by increasing the time they must wait in a queue before
    their prompt is even processed.
  napkin_math: A 7B model has 14GB weights. H100 bandwidth is 3.35TB/s. Memory-bound decode takes 14GB
    / 3.35TB/s = 4.1ms per token. A batch of 32 generating 100 tokens takes 410ms. If a user arrives right
    after a batch starts, they wait 410ms, plus 20ms for their own prefill = 430ms TTFT. If average TTFT
    is 215ms, P99 hits 430ms. Continuous batching limits wait to 4.1ms.
  options:
  - The H100's prefill time is the bottleneck. We should use a smaller model or upgrade to B200s to reduce
    the 150ms processing time.
  - The arrival rate of 20 RPS is too high for the system to handle, causing a queue backup. We need to
    add more H100 replicas to handle the load.
  - The static batching window is the bottleneck. The 100ms timeout adds unacceptable queuing delay, and
    we must switch to continuous batching.
  - System throughput is too low. We should increase the static batch size from 32 to 64 to improve the
    H100's utilization and TPOT.
  correct_index: 2
