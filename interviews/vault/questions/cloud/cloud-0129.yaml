title: The Chatbot Latency Crisis (cloud-0129)
scenario: You are the lead ML Systems Engineer deploying a new chatbot powered by a 7B parameter LLM on H100 GPUs. User satisfaction is plummeting due to slow response times. Your SLA requires a P99 Time-To-First-Token (TTFT) of less than 200ms.
question: What serving-policy issue is most likely causing the P99 TTFT to exceed the 200ms SLA, and how should it be fixed?
details:
  realistic_solution: The root cause is the static batching policy. A request that arrives just after a batch has been dispatched must wait the entire 100ms timeout window before it can even be considered for processing. This waiting time is pure queuing delay. The worst-case TTFT is at least this queuing delay plus the prefill time. Switching to continuous batching (or iterative batching) resolves this. Continuous batching systems process requests in micro-batches, adding new requests to the queue on-the-fly without a fixed waiting window. A new request only has to wait for the current micro-batch step to finish before its prompt processing begins, dramatically reducing the queuing delay and thus the TTFT.
  common_mistake: |
    **The Pitfall:** Conflating throughput (Tokens-Per-Output-Time, TPOT) with latency (TTFT).
    **The Rationale:** Engineers increase batch sizes to improve utilization, ignoring the queuing delay users face while waiting for a static batch to form.
    **The Consequence:** P99 TTFT degrades severely for individual users, violating SLAs.
  napkin_math: |
    - **Memory-Bound Decode:** 14GB weights / 3.35TB/s = 4.1ms per token.
    - **Batch Decode Time:** 100 tokens * 4.1ms = 410ms.
    - **Static Waiting Time:** New users wait up to 410ms for the current batch to finish.
    - **Total TTFT:** 410ms wait + 20ms prefill = 430ms.
    - **Final Result:** **Continuous batching limits wait time to 4.1ms, eliminating the 410ms queuing delay.**
  options:
  - The H100's prefill time is the bottleneck. We should use a smaller model or upgrade to B200s to reduce the 150ms processing time.
  - The arrival rate of 20 RPS is too high for the system to handle, causing a queue backup. We need to add more H100 replicas to handle the load.
  - The static batching window is the bottleneck. The 100ms timeout adds unacceptable queuing delay, and we must switch to continuous batching.
  - System throughput is too low. We should increase the static batch size from 32 to 64 to improve the H100's utilization and TPOT.
  correct_index: 2
