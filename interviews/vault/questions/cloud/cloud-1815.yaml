title: Diagnosing Runaway Generation from Prompt Injections
scenario: An LLM-based summarization service deployed on 4x A100 80GB GPUs experiences a sudden p99 latency
  degradation from 1.2s to over 5s. Ingress metrics show the request rate (50 req/s) and input token lengths
  (avg 500) are perfectly stable. You suspect an adversarial prompt injection attack is bypassing input
  filters and causing runaway generation. Using only runtime output monitoring metrics, how do you diagnose
  this root cause and differentiate it from normal heavy usage?
details:
  realistic_solution: Analyze the streaming token generation lengths and logprob entropy. Adversarial
    outputs often exhibit lower average logprobs (higher perplexity) and frequently hit the maximum token
    limit. An alert on the ratio of requests hitting the max_new_tokens limit combined with an entropy
    threshold definitively isolates the attack without reading raw text.
  common_mistake: Relying on expensive secondary LLM-based classifiers to evaluate the output text, which
    further degrades the latency bottleneck, or assuming input length correlates strictly with compute
    cost.
  napkin_math: 'Baseline load: 50 req/s * 100 avg output tokens = 5,000 tokens/s. If an attack injects
    10% of traffic (5 req/s) forcing the max limit of 1,000 tokens: New load = (45 * 100) + (5 * 1,000)
    = 9,500 tokens/s. This exceeds the cluster''s peak serving capacity (e.g., 8,000 tokens/s), causing
    KV cache eviction, queue buildup, and massive latency spikes.'
