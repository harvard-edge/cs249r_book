title: RoPE Embedding Degradation in BF16
scenario: You are extending a 13B model's context window from 8k to 100k tokens. You deploy the model
  purely in BF16 to save memory. While short-context tasks work perfectly, retrieval tasks at position
  > 60,000 fail entirely. Profiling shows the attention maps become smeared and indistinct at high positions.
details:
  realistic_solution: The issue is a direct result of BF16's severe lack of mantissa precision (only 7
    bits). Rotary Position Embedding (RoPE) relies on calculating cos(m * theta) and sin(m * theta) where
    m is the token position. At large positions (e.g., m = 60,000), representing 'm' in BF16 causes severe
    truncation. The step size between representable numbers in BF16 at this magnitude is large enough
    that consecutive token positions map to the exact same BF16 value. Consequently, the model cannot
    distinguish between adjacent tokens at long contexts. The architecture must compute and apply RoPE
    in FP32, casting to BF16 only after the positional rotation is complete.
  common_mistake: Assuming the RoPE base frequency (theta) wasn't scaled properly for long context, leading
    to out-of-distribution cosine values.
  napkin_math: BF16 uses 8 exponent bits and only 7 mantissa bits. For position IDs around 65,536 (2^16),
    the precision gap (machine epsilon) is 2^(16-7) = 2^9 = 512. This means any two token positions within
    a 512-token window (e.g., 65000 and 65100) are represented as the identical BF16 number. RoPE uses
    these IDs to calculate rotation angles. If angles are identical, attention collapses. Compute IDs
    in FP32.
