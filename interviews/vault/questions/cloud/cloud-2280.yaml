title: The Compression Pipeline Ordering Trap
scenario: 'You plan to apply both pruning and quantization to a 13B parameter model before deploying it
  on a single A100. A junior engineer asks: ''Does it matter whether we prune first and then quantize,
  or quantize first and then prune?'' Explain why the order matters and which sequence is generally preferred.'
question: "Does it matter whether we prune first and then quantize, or quantize first and then prune?"
details:
  realistic_solution: 'Order matters because each compression step alters the statistical properties of
    the weights. The standard pipeline is: (1) prune first, (2) fine-tune to recover accuracy, (3) quantize.
    Pruning removes weights based on magnitude or sensitivity analysis of the full-precision model, where
    the signal is clearest. If you quantize first, the reduced precision introduces noise into the weight
    magnitudes, making pruning decisions less reliable — you may prune weights that only appear small
    due to quantization rounding. Additionally, quantization calibration should be performed on the final
    weight distribution (post-pruning), since pruning changes the activation distributions that calibration
    statistics depend on. Reversing the order means your quantization ranges are calibrated for a model
    that no longer exists after pruning.'
  common_mistake: Treating compression techniques as independent and order-agnostic. 'Just apply both
    and the savings multiply.' In reality, each technique changes the weight distribution that the next
    technique must operate on.
  napkin_math: '13B model in FP16 = 26 GB. After 50% structured pruning + fine-tune: 6.5B effective params
    = 13 GB. After INT4 quantization: 6.5B × 0.5 bytes = 3.25 GB. If you quantize first to INT4 (6.5 GB)
    then prune 50%, you get 3.25 GB in size, but accuracy is typically 2-4% worse because pruning decisions
    were made on noisy quantized weights.'
