title: Resolving Imperative Scheduling Deadlocks on GPU Nodes
scenario: You are orchestrating a distributed training job on a cluster of `p4d.24xlarge` K8s nodes (each
  with 8x A100 GPUs, 96 vCPUs, 1152 GB RAM). Your imperative scheduling manifest strictly requests 8 GPUs,
  90 vCPUs, and 1100 GB RAM per pod. The cluster has 10 entirely idle nodes, yet your pod remains stuck
  in the 'Pending' state indefinitely. Assuming Kubelet and system DaemonSets (like fluentd and node-exporter)
  require 8 vCPUs and 100 GB RAM per node, calculate the schedulable capacity and determine why the imperative
  request fails.
question: "What is the schedulable capacity of each p4d node, and why does the strict pod request remain Pending?"
details:
  realistic_solution: Calculate the actual 'Allocatable' capacity by subtracting system reservations from
    raw capacity, then lower the strict imperative request to fit within these exact bounds (e.g., 88
    vCPUs and 1050 GB RAM).
  common_mistake: Assuming the raw hardware specifications of the instance are fully available to the
    imperative scheduler, ignoring Kubernetes allocatable capacity and system reservation overhead.
  napkin_math: 'Raw Capacity: 96 vCPUs, 1152 GB RAM. System Reserved: 8 vCPUs, 100 GB RAM. Allocatable
    Capacity = (96 - 8) = 88 vCPUs, (1152 - 100) = 1052 GB RAM. Job Request: 90 vCPUs, 1100 GB RAM. Because
    the imperative request (90 vCPUs, 1100 GB) > Allocatable (88 vCPUs, 1052 GB), the strict scheduler
    cannot map the pod to any node.'
