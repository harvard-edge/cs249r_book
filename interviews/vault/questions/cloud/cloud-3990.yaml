title: BF16 Run Runs Out Of Memory
scenario: A team switches a 40B-parameter training run from FP16 with loss scaling
  to BF16 for stability. They expect memory to stay identical because both use 2-byte
  activations and weights. Instead, the run OOMs after enabling a new optimizer configuration
  that keeps FP32 master weights and two FP32 Adam states. Diagnose the memory increase.
question: Why can a BF16 training run OOM even though BF16 and FP16 weights are both
  2 bytes?
details:
  realistic_solution: The OOM is likely from optimizer state, not BF16 tensor size.
    If the optimizer keeps FP32 master weights plus Adam momentum and variance, each
    parameter can require 2 bytes for model weight plus 12 bytes of FP32 auxiliary
    state. The precision switch may have coincided with a less memory-efficient optimizer
    configuration.
  common_mistake: Comparing only model weights and activations while ignoring optimizer
    state and master weights.
  napkin_math: For 40B parameters, 2-byte weights are 80 GB. FP32 master + m + v add
    12 bytes/parameter = 480 GB. Total parameter-related state can reach 560 GB before
    activations.
