title: NVIDIA H100 Inference Queue Depth and Little's Law
scenario: An ML inference service is deployed on a single NVIDIA H100 GPU (80 GB HBM3, 989 TFLOPS FP16
  dense, 3.35 TB/s memory bandwidth, 700W TDP). The service experiences variable request arrival rates.
  To maintain an average inference latency of 50ms, how would you determine the optimal queue depth and
  capacity to ensure the GPU is effectively utilized without introducing excessive queuing delays, applying
  principles from Little's Law and considering the GPU's stated specifications?
question: "How would you use Little’s Law to choose queue depth and capacity for a single H100 while keeping average inference latency at 50 ms?"
details:
  realistic_solution: The solution involves using Little's Law (L = λW) where L is the average number
    of items in the system (queue + service), λ is the average arrival rate, and W is the average time
    an item spends in the system (latency). For a target latency of 50ms, one would need to estimate the
    average service time of an inference request on the H100 (W_service). Then, by controlling the queue
    depth, we can manage W_queue. Capacity planning involves ensuring that the H100's effective service
    rate (μ) is greater than or equal to the peak arrival rate (λ). The optimal queue depth is then determined
    to balance throughput and latency, typically aiming for W_queue to be a small fraction of W_service.
    For example, if W_service is 30ms, we have 20ms budgeted for queuing. The 'napkin math' below can
    be applied to derive L (average queue length) from λ and W_queue.
  common_mistake: A common mistake is to only focus on the raw TFLOPS or memory bandwidth without considering
    the actual inference time per request, the variability of arrival rates, and how queueing (both in
    software and hardware) can significantly impact observed latency and throughput. Ignoring Little's
    Law can lead to either under-provisioning (high latency due to long queues) or over-provisioning (low
    utilization, wasted resources).
  napkin_math: Let's assume the average service time (W_service) for a single inference on an NVIDIA H100
    is 30ms. If the target end-to-end latency (W) is 50ms, then the maximum allowable average queuing
    time (W_queue) is 50ms - 30ms = 20ms. If the average arrival rate (λ) during peak load is 100 requests/second,
    then, by Little's Law, the average number of requests in the queue (L_queue) would be λ * W_queue
    = 100 requests/s * 0.020 s = 2 requests. This suggests an average queue depth of 2 requests to meet
    the latency target under this arrival rate. If the arrival rate increases, either the queue depth
    or latency must increase, or more H100 capacity is needed.
