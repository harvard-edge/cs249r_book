title: 'Systolic Array Realization: Size Systolic Array for Attention Layer'
scenario: 'Concretely size a systolic array to process a multi-head attention layer
  (hidden=2048, heads=16, seq=512, batch=32, BF16) on TPU v5e (16GB HBM, 197 TFLOPS).
  Calculate: memory needed for Q/K/V matrices, compute time, and how many systolic
  array tiles are needed if each tile is 128x128.'
question: How much memory and compute time does this attention layer need, and how
  many 128x128 systolic-array tiles are required?
details:
  realistic_solution: 'Q weight: hidden*hidden = 2048*2048*2 = 8MB. K, V weights:
    same, 8MB each. Q projection output: batch*seq*hidden = 32*512*2048*2 = 67MB.
    K, V outputs: same, 67MB each. Attention scores: batch*heads*seq*seq = 32*16*512*512*2
    = 268MB. Context (V-weighted): 32*512*2048*2=67MB. Total activation: ~603MB. Weights:
    24MB. Grand total: ~627MB — fits in 16GB. Compute: QKV projection FLOPs = 3*2*32*512*2048^2
    = 206G. Attention score: 2*32*16*512^2*128 = 8.6G. Total: 214G. Time: 214G/197T
    = 1.09ms.'
  common_mistake: Computing memory for only the Q, K, V weight matrices (projection
    weights) without including the intermediate activation tensors (Q, K, V projections
    and attention scores) that must reside in HBM.
  napkin_math: 'Activations: Q,K,V projections=3*32*512*2048*2=201MB. Attn scores=32*16*512^2*2=268MB.
    Context=67MB. Total≈536MB. Weights (projection): 4*2048^2*2=32MB. Total: 568MB
    << 16GB. Compute: QKV proj = 3*2*32*512*2048*2048 = 3*2*32M*2048 ≈ 206G FLOPs.
    Attn: 2*32*16*512^2*128 = 8.59G. Total 214.6G. Time = 214.6G/197T = 1.09ms. Tiles:
    each tile 128*128 BF16 = 32KB. Projection weight: 2048*2048 / (128*128) = 256
    tiles. Array computation: 256 tiles * 3 projections = 768 tile operations.'
