title: CUDA Allocator Fragmentation Estimation
scenario: You are training a large Vision Transformer on a single 80GB A100 GPU using PyTorch. During
  the backward pass, `torch.cuda.memory_allocated()` reports 62GB of active tensor data. However, the
  script crashes with a CUDA OOM error when trying to allocate a 4GB tensor for gradients. `torch.cuda.memory_reserved()`
  shows that 78GB is held by the caching allocator. Profiling reveals the remaining 16GB of inactive reserved
  memory is split into 64 evenly sized fragments interleaved with active tensors.
details:
  realistic_solution: Recognize that the caching allocator cannot service the 4GB request because the
    16GB of cached memory is heavily fragmented. The average fragment size is 256MB, which is too small
    for a 4GB contiguous tensor. You must reduce fragmentation by tuning the environment variable `PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:256`
    to prevent the allocator from excessively splitting large blocks.
  common_mistake: Believing that 16GB of free cached memory is available as a single pool that can automatically
    satisfy a 4GB allocation request without considering contiguous memory constraints.
  napkin_math: Available reserved memory = 78GB (reserved) - 62GB (allocated) = 16GB. Number of fragments
    = 64. Maximum available contiguous block = 16GB / 64 = 256MB. Required contiguous allocation = 4GB.
    Since 256MB << 4GB, the caching allocator OOMs despite having 16GB of logically free capacity.
