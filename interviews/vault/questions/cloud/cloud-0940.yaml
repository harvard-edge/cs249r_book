title: CUDA Allocator Fragmentation Estimation
scenario: You are training a Vision Transformer on a single GPU. During the backward pass, torch.cuda.memory_allocated() reports 62GB of active tensor data. The script crashes with a CUDA OOM error when allocating a 4GB tensor. torch.cuda.memory_reserved() shows 78GB. Profiling reveals the remaining 16GB of inactive reserved memory is split into 64 evenly sized fragments.
question: Why does the 4GB allocation fail despite 16GB of inactive reserved memory, and how should you fix the allocator behavior?
details:
  realistic_solution: Recognize that the caching allocator cannot service the 4GB request because the 16GB of cached memory is heavily fragmented. The average fragment size is 256MB, which is too small for a 4GB contiguous tensor. You must reduce fragmentation by tuning the environment variable `PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:256` to prevent the allocator from excessively splitting large blocks.
  common_mistake: |
    **The Pitfall:** Believing the 16GB free memory is available as a single contiguous pool.
    **The Rationale:** Engineers look at "total free memory" dashboards and assume allocation requests are handled strictly by aggregate capacity.
    **The Consequence:** Wasting days debugging logic code or dropping the batch size unnecessarily, when it's purely a memory fragmentation block constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available reserved memory = 78GB - 62GB = 16GB.
    - Number of inactive fragments = 64.
    - Required contiguous allocation = 4GB.

    **Calculations:**
    - Maximum available contiguous block = 16GB / 64 = 256MB.
    - 256MB << 4GB.

    **Conclusion & Interpretation:**
    - **Result: The allocator throws an OOM despite 16GB of logically free capacity (Memory Fragmentation)**. Bottleneck: Memory Fragmentation.
