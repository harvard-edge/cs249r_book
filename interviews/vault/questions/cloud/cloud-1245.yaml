title: Evaluating Calibration Methods for High-Stakes Cloud APIs
scenario: 'Your team is deploying a fraud detection model via an automated cloud pipeline handling 10,000 requests/sec. The model achieves 96% accuracy, but the downstream automated action threshold is set to 0.95 confidence. You observe that a significant portion of predictions with >0.95 confidence are false positives. You need to reduce the Expected Calibration Error (ECE) from 0.15 to below 0.05. The strict SLA allows only 2ms of post-processing latency per request.'
question: 'Which calibration method should you choose to reduce ECE below 0.05 within the 2ms SLA, and how does ECE guide the choice?'
details:
  realistic_solution: 'Apply Temperature Scaling. It uses a single scalar parameter optimized on the validation set, preserves the original argmax predictions (so base accuracy remains 96%), and adds negligible inference latency (a single scalar division before softmax), effectively minimizing ECE within the strict 2ms SLA.'
  common_mistake: |
    **The Pitfall:** Assuming Isotonic Regression is always better because it's non-parametric.
    **The Rationale:** Candidates ignore that Isotonic Regression adds significant inference latency and can alter class predictions in multi-class settings.
    **The Consequence:** The calibration succeeds but the pipeline violates the strict 2ms latency SLA, breaking the production service.
  napkin_math: |
    * ECE = sum(|acc(b) - conf(b)| * weight(b)).
    * In the [0.9, 1.0] bin: avg conf = 0.98, actual acc = 0.60. Bin weight = 20%.
    * Bin ECE contribution = |0.60 - 0.98| * 0.20 = 0.076.
    * **Temperature scaling (T > 1) softens logits, bringing avg conf down to 0.60 and minimizing ECE with negligible latency overhead.**
