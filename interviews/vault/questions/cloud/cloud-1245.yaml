title: Evaluating Calibration Methods for High-Stakes Cloud APIs
scenario: Your team is deploying a fraud detection model via an automated cloud pipeline handling 10,000
  requests/sec. The model achieves 96% accuracy, but the downstream automated action threshold is set
  to 0.95 confidence. You observe that a significant portion of predictions with >0.95 confidence are
  false positives. You need to reduce the Expected Calibration Error (ECE) from its current 0.15 to below
  0.05. You are evaluating Temperature Scaling versus Isotonic Regression. The strict SLA allows only
  2ms of post-processing latency per request. Evaluate the trade-offs of these calibration methods, justify
  your choice, and explain how the ECE calculation guides this optimization.
question: "Which calibration method should you choose to reduce ECE below 0.05 within the 2ms SLA, and how does ECE guide the choice?"
details:
  realistic_solution: Apply Temperature Scaling. It uses a single scalar parameter optimized on the validation
    set, preserves the original argmax predictions (so base accuracy remains 96%), and adds negligible
    inference latency (a single scalar division before softmax), effectively minimizing ECE within the
    strict 2ms SLA.
  common_mistake: Assuming Isotonic Regression is always better because it's non-parametric, while ignoring
    that it can alter class predictions in multi-class settings and adds significant inference latency
    overhead.
  napkin_math: ECE = sum(|acc(b) - conf(b)| * weight(b)). If the [0.9, 1.0] confidence bin has 2,000 samples,
    avg conf = 0.98, but actual acc = 0.60. Bin ECE contribution = |0.60 - 0.98| * (2000/10000) = 0.38
    * 0.20 = 0.076. Temperature scaling (T > 1) softens the logits, bringing avg conf down closer to 0.60
    and minimizing ECE without altering the top-1 prediction.
