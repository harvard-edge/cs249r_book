title: Prefix Caching Eviction Policy Design
scenario: Your vLLM deployment serves 200 distinct system prompts but only has budget for 50 cached prefixes in KV cache on H100. The prompt distribution follows a power law: top 10 prompts account for 60% of traffic.
question: Which eviction policy (LRU, LFU, ARC) maximizes the KV cache hit rate for a power-law prompt distribution, and why?
details:
  realistic_solution: 'LFU or ARC (Adaptive Replacement Cache) will vastly outperform LRU. Because the distribution follows a power law, the top 10 most frequent prompts should remain in the cache permanently. Under LRU, a burst of infrequent queries (the "long tail") can evict the high-frequency prompts, causing cache thrashing and expensive recomputes. ARC dynamically balances recency (like LRU) and frequency (like LFU), ensuring the power-law "head" remains cached while adapting to newly trending prompts.'
  common_mistake: |
    **The Pitfall:** Blindly using LRU, the default in many caching systems.
    **The Rationale:** Candidates assume recency is the best predictor of future use, ignoring the power-law distribution of system prompts.
    **The Consequence:** A burst of infrequent queries evicts high-frequency prompts, causing cache thrashing and expensive recomputes.
  napkin_math: |
    - 1. Analyze distribution: Top 10 prompts = 60% traffic; remaining 190 prompts = 40% traffic.
    - 2. Evaluate LFU performance: Top 10 prompts are permanently cached, guaranteeing a 60% hit rate base.
    - 3. Evaluate LRU performance: A sequence of 50 unique tail prompts evicts the entire cache, dropping the hit rate to near 0% temporarily.
    - 4. Conclusion: **LFU or ARC guarantees >60% hit rate**, while LRU thrashes under long-tail traffic.
