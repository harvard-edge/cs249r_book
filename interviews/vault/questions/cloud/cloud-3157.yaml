title: Prefix Caching Eviction Policy Design
scenario: 'Your vLLM deployment serves 200 distinct system prompts but only has budget
  for 50 cached prefixes in KV cache on H100. The prompt distribution follows a power
  law: top 10 prompts account for 60% of traffic. Compare LRU, LFU, and ARC eviction
  policies and determine which maximizes cache hit rate given this distribution.'
question: Which eviction policy (LRU, LFU, ARC) maximizes the KV cache hit rate for a power-law prompt distribution, and why?
details:
  realistic_solution: 'LFU or ARC (Adaptive Replacement Cache) will vastly outperform LRU. Because the distribution follows a power law, the top 10 most frequent prompts should remain in the cache permanently. Under LRU, a burst of infrequent queries (the "long tail") can evict the high-frequency prompts, causing cache thrashing and expensive recomputes. ARC dynamically balances recency (like LRU) and frequency (like LFU), ensuring the power-law "head" remains cached while adapting to newly trending prompts.'
  common_mistake: 'Blindly using LRU, which is the default in many caching systems. In a power-law distribution where the cache size (50) is smaller than the total working set (200), LRU thrashes when scanning the long tail.'
  napkin_math: 'Top 10 prompts = 60% of traffic. Remaining 190 prompts = 40% of traffic. With LFU, the top 10 are permanently cached, giving a guaranteed 60% hit rate. The remaining 40 slots can serve the tail, adding perhaps another 10% hit rate (total ~70%). With LRU, if a sequence of 50 unique tail prompts arrives, it evicts the entire cache, dropping the hit rate drastically.'
