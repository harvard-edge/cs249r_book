title: KV-Cache Deduplication Across Requests
scenario: 'Your serving platform handles 3 types of requests: (A) customer support (2K system prompt,
  shared across 80% of requests), (B) code completion (512-token file context, unique per request), and
  (C) document Q&A (4K retrieved context, 30% overlap across users querying the same document). Evaluate
  the potential memory savings from content-aware KV-cache deduplication.'
details:
  realistic_solution: 'Weighted availability: 0.6×0.99 + 0.2×0 + 0.2×0.29 = 0.594 + 0 + 0.058 = 0.652
    = 65.2% (not 65.4%).'
  common_mistake: Implementing deduplication based on exact string matching. KV-cache content depends
    on the model weights and attention computation, so even identical token sequences must have been processed
    by the same model checkpoint to produce identical KV entries.
  napkin_math: 'Weighted availability: 0.6 × 99% + 0.2 × 0% + 0.2 × 29% = 59.4% + 0% + 5.8% = 65.2% (not
    65.4% — the correct calculation of 0.2×29% = 5.8%, not 6.0%).'
