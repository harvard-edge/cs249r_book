title: Tensor Contiguity Memory Overhead
scenario: You are profiling a custom Transformer attention mechanism running on an NVIDIA A100 GPU using
  PyTorch. The code prepares a query tensor of shape `[batch=64, seq_len=1024, num_heads=16, head_dim=128]`
  via a `.transpose(1, 2)` operation, followed immediately by a `.contiguous()` call to feed it into a
  legacy CUDA kernel. Assuming FP16 precision, calculate the exact High Bandwidth Memory (HBM) traffic
  (in MiB) generated strictly by this `.contiguous()` operation.
details:
  realistic_solution: The `.transpose()` operation merely creates a non-contiguous view by modifying tensor
    strides in O(1) time. However, calling `.contiguous()` on this strided view forces a physical deep
    copy in GPU HBM to enforce a sequential memory layout. This operation requires reading the entire
    fragmented tensor and writing it to a newly allocated buffer. The total traffic is 1x Read + 1x Write
    of the tensor's size. Modern kernels (like FlashAttention) support strided memory layouts natively,
    avoiding this massive overhead.
  common_mistake: Candidates often assume `.contiguous()` only updates tensor metadata (strides) like
    `.view()` resulting in 0 bytes of traffic, or they calculate only the read operation (256 MiB) and
    neglect the memory write.
  napkin_math: 'Elements = 64 * 1024 * 16 × 128 = 134,217,728 elements.

    Size in bytes = 134,217,728 * 2 bytes (FP16) = 268,435,456 bytes.

    Size in MiB = 268,435,456 / (1024^2) = 256 MiB.

    Total memory traffic = Read (256 MiB) + Write (256 MiB) = 512 MiB.'
