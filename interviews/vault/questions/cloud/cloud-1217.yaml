title: 'Resume Screening True Positive Rate Trade-offs'
scenario: 'A cloud resume screening API processes 10M resumes/day. Audits show demographic parity is met, but the True Positive Rate (TPR) for highly qualified candidates in Group A is 85%, and only 60% in Group B. The ML team proposes: 1) post-processing threshold adjustment, 2) retraining with a strict Equalized Odds penalty, or 3) "fairness through unawareness" by dropping features.'
question: 'Which approach should you use to achieve Equality of Opportunity for the resume API under the 100ms SLA, and why?'
details:
  realistic_solution: 'Implement class-specific post-processing threshold adjustments. Lowering the decision threshold for Group B until TPR_B = TPR_A directly achieves Equality of Opportunity with zero additional training cost and an O(1) latency impact, perfectly respecting the 100ms SLA compared to complex constrained retraining.'
  common_mistake: |
    **The Pitfall:** Retraining with an Equalized Odds penalty or assuming "fairness through unawareness" works.
    **The Rationale:** Believing that dropping demographic features prevents bias, or over-constraining the model by forcing both TPR and FPR to be identical.
    **The Consequence:** Wasting massive compute on retraining, failing to achieve true fairness (due to proxy variables), or needlessly degrading model accuracy by enforcing Equalized Odds when only Equality of Opportunity was required.
  napkin_math: |
    **Assumptions & Constraints:**
    - Group A TPR = 85%. Group B TPR = 60%.
    - 100ms SLA for inference.

    **Calculations:**
    - Lowering the threshold for Group B captures missing true positives.
    - Inference latency L_post = L_model + O(1) check.

    **Conclusion & Interpretation:**
    - **Result: L_post < 100ms (Compute-Bound)**. O(1) post-processing successfully resolves the fairness constraint with negligible latency impact compared to a costly retrain.
