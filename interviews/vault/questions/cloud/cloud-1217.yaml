title: Resume Screening True Positive Rate Trade-offs
scenario: 'A cloud resume screening API processes 10M resumes/day. Audits show that while demographic
  parity is met, the True Positive Rate (TPR) for highly qualified candidates in demographic Group A is
  85%, but only 60% in Group B. The ML team proposes: 1) post-processing threshold adjustment to match
  TPRs, 2) retraining with a strict Equalized Odds penalty (matching both TPR and FPR), or 3) ''fairness
  through unawareness'' by dropping demographic features. Evaluate the trade-offs of these approaches
  to achieve Equality of Opportunity without violating the strict 100ms inference SLA.'
details:
  realistic_solution: Implement class-specific post-processing threshold adjustments. Lowering the decision
    threshold for Group B until TPR_B = TPR_A directly achieves Equality of Opportunity with zero additional
    training cost and an O(1) latency impact, perfectly respecting the 100ms SLA compared to complex constrained
    retraining.
  common_mistake: Candidates often assume 'fairness through unawareness' works, or they over-constrain
    the model by enforcing Equalized Odds (FPR and TPR equality) when the business only requires Equality
    of Opportunity (TPR equality).
  napkin_math: Group A TPR = 85%. Group B has 50k qualified candidates, but TPR = 60% (30k selected).
    To reach Equality of Opportunity, we need TPR_B = 85%, requiring 42.5k true positives. Lowering the
    threshold for Group B captures the missing 12.5k candidates. Inference latency L_post = L_model +
    O(1) < 100ms.
