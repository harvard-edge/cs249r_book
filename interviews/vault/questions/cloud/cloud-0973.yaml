title: Cold Restart Recovery Time Calculation
scenario: A 1024-GPU cluster training a 200B parameter model experiences a catastrophic switch failure, requiring a full cluster cold restart. The globally consolidated checkpoint size is 4000 GB. It takes 20 seconds for the orchestrator to detect the failure, 5 minutes (300 seconds) to provision replacement nodes, and 130 seconds to rebuild NCCL communicators and re-compile execution graphs. The cluster's parallel file system provides a guaranteed aggregate read bandwidth of 80 GB/s.
question: What is the total time to recovery after the switch failure before training can resume?
details:
  realistic_solution: The total Time to Recovery (TTR) is 500 seconds. A robust system design must account for the full end-to-end penalty, as collective initialization and provisioning often dominate the raw I/O time in a cold restart.
  common_mistake: |
    **The Pitfall:** Calculating only the raw I/O storage transfer time and ignoring systemic orchestration overheads.
    **The Rationale:** Engineers heavily fixate on the massive byte size of model checkpoints, incorrectly assuming that storage I/O bandwidth is the sole bottleneck governing recovery time.
    **The Consequence:** The platform dramatically misses its MTTR SLAs, as cluster provisioning and NCCL topology recreation quietly take nearly 10x longer than loading the checkpoint itself.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4000 GB checkpoint size.
       - Parallel file system read bandwidth: 80 GB/s.
       - Detection: 20s, Provisioning: 300s, Initialization: 130s.
    2. **Calculations:**
       - Load Time (T_load): 4000 GB / 80 GB/s = 50 seconds.
       - Total TTR: T_detect (20s) + T_provision (300s) + T_load (50s) + T_init (130s) = 500 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 500 seconds (8.33 minutes) Total TTR, massively dominated by Orchestration-Bound initialization rather than I/O.**
