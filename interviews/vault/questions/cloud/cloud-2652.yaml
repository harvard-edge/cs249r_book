title: Pipeline Jungle Remediation Strategy
scenario: 'Your ML system has a pipeline jungle: 30 scripts, 80 intermediate files, 12 models depending
  on various stages. Option A: full rewrite to a modern orchestration framework (4 months, 2 engineers,
  all models retrained). Option B: strangler fig pattern — wrap existing scripts in a DAG, migrate one
  pipeline at a time (8 months, 1 engineer, models migrate incrementally). Option C: add data contracts
  and monitoring around the existing jungle (1 month, 1 engineer). Which approach?'
details:
  realistic_solution: 'Option B (strangler fig) is typically safest. Option A (full rewrite) is the ''second
    system effect'' trap: a 4-month rewrite of 30 scripts with 12 model dependencies will inevitably miss
    edge cases, require simultaneous revalidation of all 12 models, and risk production outages during
    cutover. History shows full pipeline rewrites take 2-3x longer than estimated. Option C (add monitoring)
    is a band-aid — it helps detect failures but doesn''t fix the root cause of untestable, rigid dependencies.
    You still can''t safely change anything. Option B wraps each existing script as a task node in the
    DAG, preserving current behavior while adding: explicit dependency tracking, retry logic, monitoring,
    and testability. Then you migrate one pipeline path at a time, validating each migration against the
    old path. This is slower but has near-zero risk of production disruption and can be paused if priorities
    shift.'
  common_mistake: Choosing the full rewrite because it feels cleaner. Pipeline rewrites fail at high rates
    because they underestimate the implicit business logic embedded in years of accumulated scripts.
  napkin_math: 'A: 4 months, high risk (all-or-nothing cutover). B: 8 months, low risk (incremental).
    C: 1 month, no fix (just visibility). B = safest path to clean architecture.'
