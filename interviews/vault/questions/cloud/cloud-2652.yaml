title: Pipeline Jungle Remediation Strategy
scenario: Your ML system has a pipeline jungle: 30 scripts, 80 intermediate files, and 12 models depending on various stages. Option A is a full rewrite to a modern orchestration framework. Option B is a strangler fig pattern, wrapping existing scripts in a DAG. Option C adds data contracts and monitoring around the existing jungle.
question: Which remediation approach minimizes production risk while successfully detangling the rigid dependencies?
details:
  realistic_solution: Option B (strangler fig) is typically safest. Option A (full rewrite) is the 'second system effect' trap: rewriting 30 scripts will miss edge cases and risk production outages. Option C (add monitoring) is a band-aid. Option B wraps each existing script as a task node in the DAG, preserving current behavior while adding explicit dependency tracking, retry logic, monitoring, and testability, allowing one pipeline path migration at a time.
  common_mistake: |
    **The Pitfall:** Choosing the full rewrite (Option A) because it feels cleaner.
    **The Rationale:** Pipeline rewrites consistently underestimate the implicit business logic embedded in years of accumulated scripts.
    **The Consequence:** The project takes 2-3x longer than estimated, risks production outages, and fails to deliver timely value.
  napkin_math: |
    - **Option A:** 4 months, high risk (all-or-nothing cutover).
    - **Option B:** 8 months, low risk (incremental).
    - **Option C:** 1 month, no fix (just visibility).
    - **Result:** Option B is the **safest path to a clean architecture**.
