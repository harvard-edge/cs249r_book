title: The High-Throughput API Crisis
scenario: You're running a high-throughput LLM inference API on H100s. During a traffic spike with varied sequence lengths, you diagnose a major problem: P99 latency skyrockets and Time Per Output Token (TPOT) is terrible, yet `nvidia-smi` shows GPU utilization is pegged near 100%.
question: What is the most likely cause of this poor performance despite the GPU being fully utilized?
details:
  realistic_solution: The system is using static batching. With varied sequence lengths, shorter sequences in a batch are padded to the length of the longest one. The GPU wastes a significant number of cycles performing useless computations on these padding tokens.
  common_mistake: |
    **The Pitfall:** Seeing 100% GPU utilization and assuming the system is operating at peak efficiency.
    **The Rationale:** Engineers equate hardware saturation with useful work, failing to recognize that the GPU might be computing padding tokens.
    **The Consequence:** Attempting to optimize kernels or buy more GPUs instead of fixing the fundamental scheduling inefficiency.
  napkin_math: |
    1. **Analyze Static Batching Waste:** If Req A is 1000 tokens and Req B is 100 tokens, Req B is padded to 1000.
    2. **Calculate Effective Utilization:** The GPU computes 2000 tokens worth of operations, but 900 are wasted padding. Effective utilization = 1100/2000 = 55%.
    **Final Result: Static batching leads to wasted compute on padding, causing latency spikes despite 100% hardware utilization.**
  options:
  - The model's KV cache is too large, saturating HBM memory bandwidth.
  - The system is using static batching, causing massive internal fragmentation and wasted computation on padding tokens, which lowers useful throughput.
  - The CPU is bottlenecked on tokenizing incoming requests, which is starving the GPU and preventing it from processing efficiently.
  - The network is the bottleneck; requests are arriving too slowly to form large enough batches, leaving the GPU idle between batches.
  correct_index: 1
