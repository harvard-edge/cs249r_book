title: The High-Throughput API Crisis
scenario: 'You''re running a high-throughput LLM inference API on H100s. During a traffic spike with varied
  sequence lengths, you diagnose a major problem: P99 latency skyrockets and Time Per Output Token (TPOT)
  is terrible, yet `nvidia-smi` shows GPU utilization is pegged near 100%. What is the most
  likely cause of this poor performance despite the GPU being fully utilized?'
question: "What is the most likely cause of this poor performance despite the GPU being fully utilized?"
details:
  realistic_solution: The system is using static batching. With varied sequence lengths, shorter sequences
    in a batch are padded to the length of the longest one. The GPU wastes a significant number of cycles
    performing useless computations on these padding tokens. This means the GPU is busy, but not on productive
    work, leading to low *effective* throughput. Shorter jobs get stuck waiting for long jobs to finish,
    causing tail latency to explode. The solution is to implement continuous batching, which processes
    and evicts sequences from the batch as they complete, maximizing useful computation.
  common_mistake: Seeing 100% GPU utilization and assuming the system is operating at peak efficiency. While
    the hardware is fully saturated, it is doing useless work (padding). Engineers might try to optimize
    kernels or buy more GPUs instead of fixing the fundamental scheduling inefficiency (batching strategy).
  napkin_math: '1. **Scenario:** A batch contains two requests. Req A: 1000 tokens. Req B: 100 tokens.
    In static batching, Req B is padded to 1000 tokens. The GPU computes 2000 tokens worth of operations,
    but 900 are wasted padding. Effective compute utilization is only 1100/2000 = 55%.'
  options:
  - The model's KV cache is too large, saturating HBM memory bandwidth.
  - The system is using static batching, causing massive internal fragmentation and wasted computation
    on padding tokens, which lowers useful throughput.
  - The CPU is bottlenecked on tokenizing incoming requests, which is starving the GPU and preventing
    it from processing efficiently.
  - The network is the bottleneck; requests are arriving too slowly to form large enough batches, leaving
    the GPU idle between batches.
  correct_index: 1
