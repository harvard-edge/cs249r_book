title: PII Detection and Scrubbing Pipeline
scenario: Before training an LLM on 500M web-scraped documents, you must remove PII (names, emails, phone numbers, SSNs, addresses). Your regex-based scrubber catches 92% of PII but misses 8%.
question: With 500M documents averaging 2 PII instances each, how many PII instances leak through, and what's the defense-in-depth strategy?
details:
  realistic_solution: 'Leaked PII: 500M docs × 2 PII/doc × 8% miss = 80M PII instances in training data. Defense-in-depth: (1) Layer 1 — Regex scrubbing for structured PII (emails, SSNs, phone numbers). Catch rate: ~99%. (2) Layer 2 — NER model (spaCy, Presidio) for names, addresses, organizations. Catch rate: ~90% for names, ~85% for addresses. Combined with regex: ~97% overall catch rate. (3) Layer 3 — DP-SGD training (ε=8) to prevent memorization of remaining PII. Even if PII exists in training data, DP bounds how much the model can memorize about any individual. (4) Layer 4 — Output filtering: regex + NER on model outputs to catch generated PII at inference time. (5) Layer 5 — Deduplication: remove near-duplicate documents (PII repeated across duplicates is most likely to be memorized). After all layers: residual risk = 500M × 2 × 0.03 × (1 - DP protection) ≈ negligible.'
  common_mistake: |
    **The Pitfall:** Relying solely on regex-based PII detection.
    **The Rationale:** Regex catches structured PII (emails, SSNs) but fails on unstructured PII like names in context (20-30% miss rate) or non-standard addresses.
    **The Consequence:** Believing the data is sanitized while leaking millions of names and addresses into the training corpus.
  napkin_math: |
    - **Regex only (92%):** 500M * 2 * 0.08 = 80M PII leaked.
    - **Regex + NER (97%):** 500M * 2 * 0.03 = 30M PII leaked.
    - **Deduplication:** Removes 30% of corpus → 30M * 0.7 = 21M.
    - **DP-SGD (\epsilon=8):** Memorization probability ~10^-4. Expected extractable PII: 21M * 10^-4 = 2,100 instances.
    - **Output filtering (99.5% catch):** 2,100 * 0.005 = **~10 instances leaked in production.**
    - **Cost of NER:** 500M docs * 0.5 ms/doc = 69 hours on 1 GPU. At $3/hr = **$207 (worth it for 50M fewer leaks).**
