title: FlashAttention with Variable-Length Sequences in a Batch
scenario: 'Your serving batch contains 8 requests with lengths [128, 256, 512, 1024, 2048, 4096, 8192, 16384]. Standard padding to max length (16384) wastes 93% of compute.'
question: For lengths [128, 256, 512, 1024, 2048, 4096, 8192, 16384], what is the correct total unpadded attention work ΣN²?
details:
  realistic_solution: 'Sum of N² for N=128 to 16384: 357,908,480 ≈ 357.9M (not 91.2M which stops at N=4096).'
  common_mistake: |
    **The Pitfall:** Padding all sequences to the maximum length and applying attention masks.
    
    **The Rationale:** Using standard batch padding is straightforward to implement but scales quadratically with the padded length, heavily penalizing a batch with variable sequence lengths.
    
    **The Consequence:** Wasting over 90% of the compute on masked tokens; for instance, a 128-token sequence padded to 16,384 wastes 99.4% of its attention computation.
  napkin_math: |
    * **Formula:** Sum of Squares (N²) for sequence lengths
    * **Calculation:** 128² + 256² + 512² + 1,024² + 2,048² + 4,096² + 8,192² + 16,384²
    * **Values:** 16K + 65K + 262K + 1.05M + 4.19M + 16.78M + 67.11M + 268.44M
    * **Result:** **Total unpadded attention work is ~357.9M operations.**
