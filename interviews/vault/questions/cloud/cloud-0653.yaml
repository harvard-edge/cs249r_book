title: The Inference Batch Size Sweet Spot
scenario: You are serving a 7B parameter LLM on a single H100 for a chat application. At batch size 1, you get 40 tokens/second but the GPU is only 5% utilized. At batch size 256, you get 2,000 tokens/second but latency per request is 3 seconds. Your SLA requires <500ms latency.
question: How would you use roofline analysis to find the batch-size sweet spot for the 7B LLM on one H100 under the <500ms SLA?
details:
  realistic_solution: The sweet spot is where the workload transitions from memory-bound to compute-bound — the ridge point of the roofline. Below this point, increasing batch size provides free throughput. Above this point, latency grows linearly with batch size because it becomes compute-limited.
  common_mistake: |
    **The Pitfall:** Blindly maximizing batch size until the latency SLA is violated.
    **The Rationale:** Engineers treat the problem as a linear search without understanding the underlying phase transition.
    **The Consequence:** The system operates in a highly variable compute-bound regime where slight load spikes cause cascading SLA violations.
  napkin_math: |
    1. **Arithmetic Intensity (batch=1):** $2 \text{ FLOPs/param} \times 1 / 2 \text{ bytes/param} = 1 \text{ Ops/Byte}$.
    2. **H100 Ridge Point:** $989 \text{ TFLOPS} / 3.35 \text{ TB/s} \approx 295 \text{ Ops/Byte}$. To reach the ridge, you need batch size $\approx 295$.
    3. **Latency at batch=295:** Computation per step is $295 \times 2 \times 7\text{B} = 4.13 \text{ TFLOPS}$. Time is $4.13\text{T} / 989\text{T/s} \approx 4.2 \text{ ms}$ per token.
    4. **SLA Validation:** For 100 output tokens, latency is $420 \text{ ms}$, which is just under the 500ms SLA.
    5. **Practical Sweet Spot:** A batch size of **64-128** gives 80%+ of peak throughput while comfortably keeping latency between 150-300ms.
