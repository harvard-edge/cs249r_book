title: The Inference Batch Size Sweet Spot
scenario: You're serving a 7B parameter LLM on a single H100 for a chat application. At batch size 1,
  you get 40 tokens/second but the GPU is only 5% utilized. At batch size 256, you get 2,000 tokens/second
  but latency per request is 3 seconds. Your SLA requires <500ms latency. Find the batch size sweet spot
  using roofline analysis.
question: "How would you use roofline analysis to find the batch-size sweet spot for the 7B LLM on one H100 under the <500ms SLA?"
details:
  realistic_solution: The sweet spot is where the workload transitions from memory-bound to compute-bound
    — the ridge point of the roofline. Below this point, increasing batch size is free throughput (you're
    bandwidth-limited, and batching increases arithmetic intensity without proportionally increasing latency).
    Above this point, latency grows linearly with batch size because you're now compute-limited.
  common_mistake: '"Just pick the largest batch size that meets the latency SLA." This ignores the phase
    transition between memory-bound and compute-bound regimes and leaves throughput on the table.'
  napkin_math: '7B model in FP16: 14 GB of weights. Each decode step reads all weights once. At batch=1:
    arithmetic intensity $I = 2 \text{ FLOPs/param} \times 1 / 2 \text{ bytes/param} = 1$ Ops/Byte (deep
    memory-bound). H100 ridge point: $989 \text{ TFLOPS} / 3.35 \text{ TB/s} \approx 295$ Ops/Byte. To
    reach the ridge: batch size $\approx 295$. But latency at batch=295: each token generation reads 14
    GB and does $295 \times 2 \times 7\text{B} = 4.13\text{ TFLOPS}$. Time = $4.13\text{T} / 989\text{T/s}
    \approx 4.2\text{ ms}$ per token. For 100 output tokens: $420\text{ ms}$ — just under the 500ms SLA.
    Practical sweet spot: batch ≈ 64-128 gives 80%+ of peak throughput while keeping latency at 150-300ms
    with comfortable margin.'
