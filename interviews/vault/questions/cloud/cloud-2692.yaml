title: AllReduce Algorithm Selection for Mixed Workloads
scenario: 'Your training cluster has 128 GPUs. During training, you perform: (1) gradient AllReduce for
  a 10B model (20GB gradient in FP16), and (2) scalar metric AllReduce (1KB loss values) every step. Currently
  using ring AllReduce for both. Should you use different algorithms for each?'
question: "Should you use different algorithms for each?"
details:
  realistic_solution: 'Yes — use different algorithms matched to message size. Gradient AllReduce (20GB):
    This is bandwidth-bound. Ring AllReduce is near-optimal: T ≈ 2×127/128 × 20GB / 25GB/s = 1.58s. Recursive
    halving-doubling would also take ~1.58s for bandwidth but with fewer steps. In practice, ring and
    RHD perform similarly for large messages. Use ring (simpler, well-optimized in NCCL). Scalar AllReduce
    (1KB): This is latency-bound. Ring: T = 2×127 × (5μs + 1KB/(128×25GB/s)) = 254 × 5μs = 1.27ms. RHD:
    T = 2×7 × 5μs = 70μs. RHD is 18x faster for the scalar case. NCCL actually already handles this automatically
    — it switches algorithms based on message size (small messages use tree/butterfly, large messages
    use ring). The key insight: a single AllReduce algorithm is suboptimal. Modern collective libraries
    (NCCL, Gloo) internally select the best algorithm per message size. You should verify your library
    is tuned correctly rather than implementing custom selection.'
  common_mistake: Using the same AllReduce algorithm for all message sizes. NCCL automatically selects
    algorithms, but misconfigured NCCL_ALGO environment variables can force suboptimal choices for certain
    message sizes.
  napkin_math: 'Gradient (20GB): Ring ≈ RHD ≈ 1.58s (bandwidth-bound). Scalar (1KB): Ring = 1.27ms, RHD
    = 70μs (18x faster, latency-bound). Use different algorithms per message size.'
