title: Priority-Based GPU Scheduling for Mixed Training and Inference
scenario: 'Your organization runs both latency-sensitive inference (SLO: p99 < 100ms) and throughput-optimized
  training on a shared 256-GPU MI300X (192GB HBM3) cluster. Inference load follows a bimodal pattern:
  60% daytime utilization, 20% overnight. Training jobs have elastic GPU requirements (can run on 8-256
  GPUs). Design a unified scheduling policy that maximizes training throughput during low-inference periods
  without violating inference SLOs during peaks.'
question: "How would you schedule inference and elastic training on the 256-GPU MI300X cluster to use overnight capacity without violating p99 < 100ms?"
details:
  realistic_solution: 'Implement elastic resource partitioning with a priority preemption ladder. Inference
    has preemptive priority over training. Training jobs are classified as elastic: they register with
    a minimum (8 GPU) and maximum (256 GPU) allocation. The scheduler expands training during low-inference
    periods and preempts training GPUs within 30 seconds (one checkpoint interval) when inference load
    rises. Use DCGM metrics to predict inference demand 5 minutes ahead and begin graceful training preemption
    early.'
  common_mistake: 'Using static partitioning: reserve 64 GPUs permanently for inference, 192 for training.
    Overnight, inference uses 13 of 64 reserved GPUs (20% of 64) while 51 sit idle; training cannot use
    them. This wastes 51 × 192 GB × 12h/night = massive idle HBM3 capacity.'
  napkin_math: 'Daytime: inference uses 60% × 256 = 154 GPUs. Training gets 102 GPUs. Overnight: inference
    uses 20% × 256 = 52 GPUs. Training gets 204 GPUs — 2× more throughput overnight. Annual GPU utilization
    improvement: (daytime_waste_static + overnight_waste_static) vs elastic: static inference reserve
    = 64 GPUs always reserved; overnight waste = 51 GPUs × 12h × 365 = 223,380 GPU-hours/year. At $3/GPU-hour:
    $670K/year recovered by elastic scheduling.'
