title: The Feature Store Hot Key Problem
scenario: Your feature store is backed by Redis Cluster with 16 shards. Feature keys are sharded by user_id.
  During a viral marketing campaign, a single celebrity influencer drives 500K simultaneous users to view
  their profile page. The recommendation model needs to look up the influencer's item features for ranking.
  Redis P99 latency spikes from 2ms to 800ms, and the single shard holding the influencer's user_id becomes
  CPU-saturated. How do you fix this without re-architecting the entire feature store?
question: "How do you fix this without re-architecting the entire feature store?"
details:
  realistic_solution: 'This is the hot-key (celebrity) problem: a single key receives disproportionate
    read traffic that saturates one shard. Solutions (in order of implementation effort): (1) **Client-side
    caching with TTL**: Cache the influencer''s features locally in the serving process for 5-10 seconds.
    500K requests hit local memory instead of Redis. Cost: ~10 lines of code. (2) **Read replicas for
    hot keys**: Replicate the hot shard to 4-8 read replicas. Spread reads across replicas. Reduces per-node
    load by 4-8×. (3) **Key replication with jitter**: Store the same feature under keys `user:123:replica:0`
    through `user:123:replica:7`, each hashing to a different shard. Client randomly picks a replica key.
    Distributes load across shards. (4) **Two-tier caching**: Add a CDN-like feature cache (e.g., memcached)
    in front of Redis for features with high read:write ratios.'
  common_mistake: Adding more Redis shards. The hot key lives on one shard — adding shards doesn't split
    a single key's traffic.
  napkin_math: 'Single Redis shard: ~100K ops/sec max. Hot key traffic: 500K QPS × 3 feature lookups =
    1.5M ops/sec to one shard. 15× overload. Client-side cache with 5s TTL: first request hits Redis,
    next 5s × 500K = 2.5M requests served from local cache. Redis load: ~200 ops/sec (one cache miss per
    5s per server). 7,500× reduction.'
