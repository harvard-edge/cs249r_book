title: Dataflow Trade-offs for Cloud Accelerators
scenario: You are evaluating the dataflow mapping for a new cloud AI accelerator featuring a 128x128 systolic
  array and 32MB of global SRAM, targeting high-resolution vision and generative models. External HBM
  access costs 200pJ per word, while SRAM access costs 5pJ, and a local MAC operation costs 1pJ. For layers
  generating massive numbers of partial sums (e.g., large channel dimensions), you must justify whether
  to implement an Output Stationary (OS) or Weight Stationary (WS) dataflow. Evaluate the energy and bandwidth
  trade-offs of this architectural decision.
details:
  realistic_solution: Adopt an Output Stationary dataflow for layers with high partial sum counts. By
    pinning the accumulator in the local Processing Element (PE) register or SRAM until the final value
    is computed, you eliminate the expensive read-modify-write cycles to HBM. The increased cost of streaming
    weights is offset by the massive reduction in partial sum memory traffic.
  common_mistake: Assuming Weight Stationary is universally optimal for inference because weights are
    static, while ignoring the severe energy penalty of repeatedly transferring intermediate partial sums
    to and from off-chip memory.
  napkin_math: 'For 10^6 intermediate partial sums: In WS, spilling to HBM costs 200pJ (write) + 200pJ
    (read) = 400pJ/sum, totaling 400µJ. In OS, accumulating locally in SRAM costs 5pJ (read) + 5pJ (write)
    = 10pJ/sum, totaling 10µJ. This yields a 40x reduction in accumulation energy, saving significant
    power at cloud scale despite higher weight streaming.'
