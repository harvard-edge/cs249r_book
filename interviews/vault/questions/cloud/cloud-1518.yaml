title: Diagnosing Low NVMe Cache Hits in Batch Inference
scenario: You are running a daily batch embedding pipeline on a 50-node Kubernetes cluster (each node
  has 8x L4 GPUs and 2x 1.9TB local NVMe drives). The 50TB image dataset is stored in S3, and you use
  a distributed caching layer on the NVMes. Despite the total cache being large enough to hold the active
  working set, when the ephemeral daily jobs spin up, network ingress saturates at 100 Gbps, NVMe cache
  hit rates stay below 5%, and GPU utilization plummets to 30% while waiting for I/O.
question: "Why are NVMe cache hit rates below 5% in the daily Kubernetes jobs, and how should scheduling be changed?"
details:
  realistic_solution: Diagnose that the default Kubernetes scheduler places pods purely based on CPU/GPU
    capacity. You must implement locality-aware scheduling (via a framework like Fluid or custom pod affinity)
    so the scheduler queries the cache orchestrator and schedules workloads exactly on the nodes where
    their target shards are already warm.
  common_mistake: Candidates often blame cache eviction policies, suggest scaling the network interface
    to 400 Gbps, or propose increasing S3 read concurrency, missing the fundamental orchestration disconnect.
  napkin_math: '50TB dataset distributed across 50 nodes (1TB shard each). A random scheduler places a
    pod on the node holding its specific warm cache shard with probability 1/50 (2% hit rate). This means
    98% of the data (49TB) misses cache. Fetching 49TB over a 100 Gbps (12.5 GB/s) network link takes:
    49,000 GB / 12.5 GB/s = 3,920 seconds (1.08 hours) of pure network stall per daily run.'
