title: The Thermal Throttling Mystery
scenario: 'We have two identical 1,000-GPU clusters running the exact same hardware, software, and model. Cluster A in Phoenix, Arizona consistently trains 30% slower than Cluster B in The Dalles, Oregon. The ops team has verified that drivers, firmware, and network configurations are identical.'
question: 'Why is the identical Phoenix cluster training 30% slower than the Oregon cluster?'
details:
  realistic_solution: 'Thermal throttling. Phoenix ambient temperature in summer reaches 45°C (113°F). The Dalles averages 20°C (68°F). Data center cooling systems have finite capacity — they can only reject a certain number of watts of heat to the outside air. When ambient temperature rises, the temperature delta between the coolant and the outside air shrinks, reducing cooling effectiveness. When GPU junction temperatures exceed ~83°C, the hardware automatically reduces clock speeds and power draw (from 700W to ~500W) to prevent damage. This is thermal throttling, and it directly reduces training throughput. The 30% slowdown maps almost exactly to the power reduction: 500/700 = 71% of peak performance.'
  common_mistake: |
    **The Pitfall:** Blaming software misconfiguration, network latency, or a bad batch of GPUs.
    **The Rationale:** Engineers often tunnel-vision on software and hardware specs, ignoring the physical environment where the hardware is deployed.
    **The Consequence:** They miss the obvious thermal throttling caused by high ambient temperatures, leading to wild goose chases in debugging.
  napkin_math: |
    * **H100 TDP:** 700W, throttle point = ~83°C junction.
    * **Phoenix data center:** 45°C ambient -> cooling struggles -> GPU junction hits 83°C -> throttles to 500W.
    * **Throttled throughput:** 500W / 700W = **71% of peak throughput**.
    * **Oregon data center:** 20°C ambient -> GPU junction stays at ~65°C -> full 700W -> **100% throughput**.
    * **Conclusion:** The 29% performance gap perfectly matches the reported 30% slowdown due to thermal throttling.
