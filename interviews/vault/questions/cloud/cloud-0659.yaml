title: The GQA/MQA Memory Bottleneck
scenario: You are deploying Llama-3-70B. It uses Grouped Query Attention (GQA), which massively reduces the size of the KV-cache compared to standard Multi-Head Attention (MHA). Because the KV-cache is 8x smaller, your manager assumes the Time-Per-Output-Token (TPOT) during the decoding phase will be 8x faster.
question: "Why didn't an 8x reduction in KV-cache size yield an 8x reduction in latency?"
details:
  realistic_solution: 'The manager confused KV-cache size reduction with total memory traffic reduction. During decode, the GPU must read both the model weights (140GB for 70B FP16) AND the KV-cache for every token. With standard MHA, KV-cache for one user might be 1.75GB, making total traffic 141.75GB. GQA reduces KV-cache to 0.22GB, so total traffic is 140.22GB — only a 1.1% reduction. The weights dominate. GQA''s real benefit appears at high batch sizes: serving 256 users, MHA KV-cache = 448GB (impossible), while GQA KV-cache = 56GB (fits in memory). GQA is a capacity optimization, not a single-user latency optimization.'
  common_mistake: |
    **The Pitfall:** Confusing KV-cache size reduction with total memory traffic reduction.
    **The Rationale:** Candidates forget that decoding is memory-bandwidth bound and requires reading the *entire* model weight matrix for every single token generated.
    **The Consequence:** Time-Per-Output-Token (TPOT) expectations for low batch sizes are wildly overestimated, leading to incorrect capacity planning.
  napkin_math: |
    - 70B model weights: ~140 GB (FP16).
    - Standard MHA KV-cache (e.g., 1 user): ~1.75 GB. Total read per token: 141.75 GB.
    - 8x GQA KV-cache: ~0.22 GB. Total read per token: 140.22 GB.
    - TPOT speedup (single user): 141.75 / 140.22 ≈ 1.01x (1%).
    - **Result: The massive 140 GB weight read dominates the memory bandwidth. An 8x reduction in KV-cache yields only a ~1% TPOT speedup at batch size 1.**
