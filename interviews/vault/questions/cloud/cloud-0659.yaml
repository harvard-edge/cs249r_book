title: The GQA/MQA Memory Bottleneck
scenario: You are deploying Llama-3-70B. It uses Grouped Query Attention (GQA), which massively reduces
  the size of the KV-cache compared to standard Multi-Head Attention (MHA). Because the KV-cache is 8x
  smaller, your manager assumes the Time-Per-Output-Token (TPOT) during the decoding phase will be 8x
  faster. However, the TPOT only improves by about 10%. Why didn't an 8x reduction in KV-cache size yield
  an 8x reduction in latency?
details:
  realistic_solution: 'The manager confused KV-cache size reduction with total memory traffic reduction.
    During decode, the GPU must read both the model weights (140GB for 70B FP16) AND the KV-cache for
    every token. With standard MHA, KV-cache for one user might be 1.75GB, making total traffic 141.75GB.
    GQA reduces KV-cache to 0.22GB, so total traffic is 140.22GB — only a 1.1% reduction. The weights
    dominate. GQA''s real benefit appears at high batch sizes: serving 256 users, MHA KV-cache = 448GB
    (impossible), while GQA KV-cache = 56GB (fits in memory). GQA is a capacity optimization, not a single-user
    latency optimization.'
  common_mistake: '"GQA requires complex routing logic that slows it down." The routing is trivial. The
    issue is the proportion of memory traffic.'
  napkin_math: Time-Per-Output-Token (TPOT) is determined by total bytes read per step. 70B weights =
    140GB. Without GQA, KV-cache might be 16GB (total read = 156GB). With 8x GQA, KV-cache is 2GB (total
    read = 142GB). Memory fetched drops by 14GB, yielding only a 156/142 ≈ 1.1x speedup. Massive TPOT
    gains only occur at very large batch sizes where KV-cache size rivals the model weights.
