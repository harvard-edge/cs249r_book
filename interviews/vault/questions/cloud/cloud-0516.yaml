title: The 100 TB Data Pipeline
scenario: 'You''re building a preprocessing pipeline for a 100 TB web-crawl dataset to train a foundation model. The pipeline must: deduplicate, filter toxic content, extract text, tokenize, and shuffle. Your cluster has 128 CPU nodes (64 cores each) and 1 PB of storage.'
question: How would you design the 100 TB preprocessing pipeline, and what end-to-end time should you expect?
details:
  realistic_solution: |
    The pipeline must be staged because each step has different computational profiles. (1) Text extraction — embarrassingly parallel, CPU-bound. (2) Deduplication — requires MinHash LSH with a global index. (3) Toxic content filtering — run a classifier on each document. (4) Tokenization — fast and CPU-bound. (5) Global shuffle — I/O-bound.
  common_mistake: |
    **The Pitfall:** Designing a single MapReduce job.
    **The Rationale:** Candidates treat all text processing as embarrassingly parallel, ignoring global state requirements.
    **The Consequence:** Fails to account for the fact that deduplication at 100TB scale requires a massive global index, and a 100TB global shuffle will bottleneck on I/O.
  napkin_math: |
    - Text extraction (CPU-bound): 100 TB / (8,192 cores * 10 MB/s) = ~1,250 sec (~21 min).
    - Deduplication (LSH): 100 TB / (8,192 cores * 5 MB/s) = ~2,500 sec (~42 min).
    - Toxic filtering (CPU inference): 50B docs / (8,192 cores * 1,000 docs/s) = ~6,100 sec (~1.7 hours).
    - Tokenization: 100 TB / (8,192 cores * 50 MB/s) = ~250 sec (~4 min).
    - Global shuffle (I/O-bound): 2 passes * 100 TB / (128 nodes * 2 GB/s) = ~800 sec (~14 min).
    - **Total theoretical time is ~3 hours, but with I/O and overheads, expect 6-8 hours end-to-end.**
