title: The 100 TB Data Pipeline
scenario: 'You''re building a preprocessing pipeline for a 100 TB web-crawl dataset to train a foundation
  model. The pipeline must: deduplicate, filter toxic content, extract text, tokenize, and shuffle. Your
  cluster has 128 CPU nodes (64 cores each) and 1 PB of storage. Design the pipeline and estimate end-to-end
  time.'
details:
  realistic_solution: 'The pipeline must be staged because each step has different computational profiles.
    (1) **Text extraction** — embarrassingly parallel, CPU-bound. 128 nodes × 64 cores = 8,192 cores.
    At ~10 MB/sec per core: 100 TB / (8,192 × 10 MB/s) = ~1,250 sec ≈ 21 min. (2) **Deduplication** —
    requires MinHash LSH with a global index. The index for 100 TB of text (~50B documents) needs ~200
    GB of RAM for signatures. Use a distributed hash table across nodes. Pairwise comparison is $O(n)$
    with LSH. At ~5 MB/sec per core: ~2,500 sec ≈ 42 min. (3) **Toxic content filtering** — run a classifier
    on each document. If using a small BERT model on CPU: ~1,000 docs/sec per core. 50B docs / (8,192
    × 1,000) = 6,100 sec ≈ 1.7 hours. (4) **Tokenization** — fast, ~50 MB/sec per core: 100 TB / (8,192
    × 50) = 250 sec ≈ 4 min. (5) **Global shuffle** — I/O-bound. Must read and write 100 TB. At 2 GB/s
    per node (NVMe): 100 TB / (128 × 2 GB/s) = 400 sec ≈ 7 min per pass, need 2 passes = 14 min.'
  common_mistake: '"Run a MapReduce job — it''s just text processing." This ignores that deduplication
    at 100 TB scale requires global state (you can''t deduplicate in a purely parallel map), and shuffling
    100 TB requires careful I/O planning.'
  napkin_math: 'Total pipeline: 21 + 42 + 102 + 4 + 14 ≈ **3 hours** end-to-end on 128 nodes. The bottleneck
    is toxic content filtering (classifier inference). Optimization: use GPU-accelerated classifiers (8
    GPUs can replace 128 CPU nodes for this step). Storage I/O: 100 TB read + 100 TB write per stage ×
    5 stages = 1 PB of I/O. At 256 GB/s aggregate cluster bandwidth: ~1 hour just in I/O. Real-world:
    plan for **6–8 hours** including retries, stragglers, and I/O contention.'
