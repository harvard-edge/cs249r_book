title: Evaluating Storage Sharding vs Caching for Multimodal Training
scenario: Your team is training a large multimodal model on a cluster of 256 GPUs.
  The dataset consists of 500 million image-text pairs averaging 250KB each, stored
  as individual files in S3. GPUs are 80% idle waiting for data. Proposal A suggests
  a 125TB in-memory Redis cache. Proposal B suggests converting the dataset into 1GB
  WebDataset shards stored on S3.
question: Should you deploy the 125TB Redis cache or convert the 500M samples into
  1GB WebDataset shards, and why?
details:
  realistic_solution: Choose Proposal B (Data Sharding). Grouping 250KB samples into
    1GB shards (approx. 4,000 samples per shard) amortizes the S3 Time-To-First-Byte
    latency. S3 provides immense aggregate bandwidth for large sequential reads, easily
    saturating 400Gbps node networks and eliminating GPU starvation without caching.
  common_mistake: '**The Pitfall:** Assuming an in-memory cache is required because
    "RAM is faster than S3."

    **The Rationale:** Using standard web-backend logic and ignoring the massive HTTP/network
    protocol overhead of reading millions of tiny files individually.

    **The Consequence:** Proposing a multi-million dollar 125TB Redis cluster instead
    of solving the fundamental I/O sharding problem.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Dataset: 500M samples × 250KB = 125TB.

    - S3 Time-To-First-Byte (TTFB) latency: ~20ms per file.

    - Proposal B: 1GB shards.


    **Calculations:**

    - Samples per shard: 1GB / 250KB = 4,000 samples.

    - Amortized Latency (Sharded): 20ms TTFB / 4000 samples = 5 microseconds per sample.


    **Conclusion & Interpretation:**

    - **Result: I/O-Bound**. Sharding amortizes S3 TTFB latency, easily saturating
    network links without needing an expensive 125TB Redis cache.

    '
