title: Evaluating Storage Sharding vs Caching for Multimodal Training
scenario: Your team is training a large multimodal model on a cluster of 256 H100 GPUs. The dataset consists of 500 million image-text pairs averaging 250KB each, stored as individual files in S3. GPUs are 80% idle waiting for data. Proposal A suggests a 125TB in-memory Redis cache. Proposal B suggests converting the dataset into 1GB WebDataset shards stored on S3.
question: Should you deploy the 125TB Redis cache or convert the 500M samples into 1GB WebDataset shards, and why?
details:
  realistic_solution: Choose Proposal B (Data Sharding). Grouping 250KB samples into 1GB shards (approx. 4,000 samples per shard) amortizes the S3 Time-To-First-Byte latency. S3 provides immense aggregate bandwidth for large sequential reads, easily saturating 400Gbps node networks and eliminating GPU starvation without caching.
  common_mistake: |
    **The Pitfall:** Assuming an in-memory cache is required because "RAM is faster than S3."
    **The Rationale:** Using standard web-backend logic and ignoring the massive HTTP/network protocol overhead of reading millions of tiny files individually.
    **The Consequence:** Proposing a multi-million dollar 125TB Redis cluster instead of solving the fundamental I/O sharding problem.
  napkin_math: |
    - **Dataset Size**: 500M × 250KB = 125TB. Proposal A's distributed RAM cost is exorbitant.
    - **Proposal B Sharding**: 1GB shard / 250KB = 4,000 samples per shard.
    - **Latency Amortization**: S3 Time-To-First-Byte (TTFB) is ~20ms. The per-sample latency drops from 20ms to `(20ms / 4000)` = **5 microseconds**.
    - **Result**: Proposal B easily saturates 400Gbps node networks with sequential S3 streaming, eliminating the bottleneck with zero caching costs.
