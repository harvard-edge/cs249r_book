title: Cloud Data Quality As Code L5 0
scenario: 'Your team debates data quality check strictness: (A) strict — any violation blocks the pipeline
  (zero tolerance), (B) lenient — log warnings but continue if <5% of records fail, (C) tiered — critical
  checks block, non-critical checks warn. Evaluate for a daily production training pipeline.'
details:
  realistic_solution: 'Option A (strict): maximum data quality, but high false-positive risk. A single
    anomalous record blocks 500 GB of data and delays training by 24+ hours until a human investigates.
    In practice, real data has natural outliers — strict mode creates excessive oncall burden. Option
    B (lenient): pipeline never blocks, but 5% bad data accumulates silently. Over 30 days: up to 750
    GB of corrupt data enters training. Model quality gradually degrades without clear root cause. Option
    C (tiered): critical checks (schema violations, >10% null rate, distribution shift >3σ) block the
    pipeline. Non-critical (minor outliers, <1% null, small distribution drift) log warnings for async
    review. Best balance: blocks genuine corruption while tolerating natural data variation. Recommended:
    C with escalation — non-critical warnings that persist >3 days auto-promote to critical.'
  common_mistake: Using binary pass/fail for all checks. Real data is messy — some variation is expected.
    Treating all violations equally either blocks the pipeline constantly (strict) or misses real problems
    (lenient). Tiered severity is essential.
  napkin_math: 'A: ~2 false blocks/month × 24h delay × $128/hr (idle GPUs) = $6,144/month in delays. B:
    5% bad data × 30 days → model degradation, retraining cost: $50K+. C: ~0.5 true blocks/month (real
    issues) × $128/hr × 4h fix = $256/month. C is 24x cheaper than A and prevents B''s silent failures.'
