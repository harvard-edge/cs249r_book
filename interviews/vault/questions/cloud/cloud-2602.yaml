title: 'Cloud Data Quality As Code L5 0'
scenario: 'Your team debates data quality check strictness: (A) strict — any violation blocks the pipeline (zero tolerance), (B) lenient — log warnings but continue if <5% of records fail, (C) tiered — critical checks block, non-critical checks warn.'
question: 'Which data quality policy is best for a daily production training pipeline, and why?'
details:
  realistic_solution: |
    Option C (tiered). Critical checks (schema violations, >10% null rate, distribution shift >3σ) block the pipeline. Non-critical (minor outliers, <1% null, small distribution drift) log warnings for async review. Best balance: blocks genuine corruption while tolerating natural data variation. Recommended: C with escalation — non-critical warnings that persist >3 days auto-promote to critical.
  common_mistake: |
    **The Pitfall:** Using binary pass/fail for all data quality checks.
    **The Rationale:** Candidates assume real-world data can be perfectly clean, ignoring expected natural variation.
    **The Consequence:** The pipeline either blocks constantly on false positives (strict) or silently accumulates model-degrading corruption (lenient).
  napkin_math: |
    **Assumptions & Constraints:**
    - Strict: blocks on minor failures (false positives).
    - Lenient: allows up to 5% failure (silent model degradation).
    - Idle GPU cost: $128/hr.

    **Calculations:**
    - Strict: ~2 false blocks/month * 24h delay * $128/hr = $6,144/month in delays.
    - Lenient: 5% bad data * 30 days -> model degradation, retraining cost: $50K+.
    - Tiered: ~0.5 true blocks/month * 4h fix * $128/hr = $256/month.

    **Conclusion & Interpretation:**
    - **Result: Tiered severity is ~24x cheaper than strict and prevents silent failures. (Cost-Bound Quality Assurance)**. Nuanced DQ policies prevent massive operational waste.
