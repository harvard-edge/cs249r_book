title: 'Model Size Estimation: Diagnose KV-Cache Memory Leak on H100 Serving System'
scenario: 'A production LLM serving system (13B model, H100 80GB) shows memory usage growing from 35GB to 78GB over 4 hours under constant load (100 req/min, avg 512 token context, 128 token output). No OOM yet but the team expects failure.'
question: 'What is causing memory to grow from 35GB to 78GB over 4 hours, and how long until the 80GB H100 OOMs?'
details:
  realistic_solution: 'Root cause: KV-cache memory leak. At 100 req/min $\times$ 60 min/hr $\times$ (512+128) = 38,400 tokens/hr context accumulation? No — if freed properly, memory stays constant. Growth: 78-35=43GB over 4 hours = 10.75GB/hr leak. Per request: 640 tokens $\times$ 800KB/token = 512MB. 100 req/min: 51.2GB/min released correctly $\rightarrow$ 10.75GB/hr growth = 10.75/(100$\times$ 60) = 1.79MB per request leaked. Fix: audit KV-cache eviction logic — likely a reference counting bug where some requests'' KV blocks aren''t returned to pool.'
  common_mistake: |
    **The Pitfall:** Blaming model weight memory for the steady growth.
    **The Rationale:** Engineers may be unfamiliar with the dynamic memory footprint of autoregressive decoding.
    **The Consequence:** Debugging focuses on the static model footprint (constant at 26GB) rather than the KV-cache blocks that are not being freed after request completion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model KV per token is 800KB.
    - Load: 100 req/min.
    
    **Calculations:**
    - Leak Rate: Growth is $78 - 35 = 43\text{GB}$ over 4 hours, which is $10.75 \text{ GB/hr}$.
    - Per Request: At 100 req/min (6000 req/hr), leak is $10.75 \text{ GB} / 6000 \text{ reqs} \approx 1.8 \text{ MB leaked per request}$.
    - Tokens Leaked: 1.8MB / 800KB \approx 2.25 tokens of KV-cache.
    
    **Conclusion & Interpretation:**
    - **Result: ~2.25 Tokens (Memory-Leak)**. The leak is likely exactly 1 padding block per request not being properly freed by the eviction logic.
