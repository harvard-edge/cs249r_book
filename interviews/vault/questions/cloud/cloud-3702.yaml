title: Roofline Ceiling Identification on H100 for Transformer MLP Blocks
scenario: You're profiling a GPT-4 style MLP block on an H100 SXM5. The GEMM has M=4096, K=4096, N=16384 (FFN expansion). H100 peaks at 989 TFLOPS BF16 and 3.35 TB/s bandwidth. You observe 412 TFLOPS measured throughput.
question: Is the 4096×4096×16384 BF16 GEMM on H100 compute- or memory-bound, and how large is the performance gap?
details:
  realistic_solution: Arithmetic intensity = 2*M*K*N FLOPs / bytes = 2*4096*4096*16384 / ((4096*4096 + 4096*16384 + 4096*16384)*2) ≈ 2*274B / (134M + 537M + 537M)*2 ≈ 550B / 302MB ≈ 1,820 FLOPs/byte. Ridge point = 989e12/3.35e12 ≈ 295 FLOPs/byte. This GEMM is compute-bound. Gap = 989-412 = 577 TFLOPS, 58% efficiency loss — investigate tensor core utilization and tile sizing.
  common_mistake: |
    **The Pitfall:** Assuming large GEMMs are always perfectly compute-bound and near peak performance without checking.
    **The Rationale:** Candidates often equate large matrix multiplications with optimal GPU utilization automatically.
    **The Consequence:** Failing to investigate tensor core utilization, tile sizing, or framework overheads that are causing the massive 58% efficiency loss.
  napkin_math: |
    - **Ridge Point:** 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.
    - **Arithmetic Intensity:** 2 * M * K * N = 550B FLOPs. Memory = (MK + KN + MN) * 2 bytes = 302 MB. `550B / 302MB` ≈ **1,820 FLOPs/byte**.
    - **Bound Status:** 1,820 > 295, so the GEMM is highly compute-bound.
    - **Efficiency:** Achieved 412 TFLOPS / Theoretical 989 TFLOPS = **41.7% efficiency**.
