title: Defining Arithmetic Intensity (cloud-0341)
scenario: 'When analyzing GPU kernel performance, we often need to determine if a workload is limited by compute power or memory bandwidth.'
question: 'What is the definition of Arithmetic Intensity, the key metric used for this analysis?'
details:
  realistic_solution: 'Arithmetic Intensity is the ratio of total floating-point operations (FLOPs) performed to the total bytes of data moved from memory (DRAM). It is expressed in Ops/Byte. A high arithmetic intensity means an operation is likely compute-bound (limited by processor speed), while a low intensity means it is memory-bound (limited by memory bandwidth).'
  common_mistake: |
    **The Pitfall:** Confusing Arithmetic Intensity with power efficiency (TOPS/W) or inverting the ratio (Bytes/Op).
    **The Rationale:** Lack of familiarity with the Roofline performance model.
    **The Consequence:** Misdiagnosing whether a kernel needs more cores or faster memory, leading to wasted optimization efforts.
  napkin_math: |
    - **H100 Peak Compute:** 989 TFLOPS (FP16).
    - **H100 Memory Bandwidth:** 3.35 TB/s.
    - **Ridge Point Calculation:** 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte.
    - **Significance:** Workloads with an intensity < 295 FLOPs/Byte are memory-bound; workloads > 295 are compute-bound.
  options:
  - The ratio of memory bytes accessed to arithmetic operations, used to find memory-heavy workloads.
  - A measure of a GPU's power efficiency, calculated as Tera-Operations Per Second (TOPS) divided by Watts.
  - The ratio of arithmetic operations (FLOPs) to memory bytes accessed, used to determine if a workload is compute-bound or memory-bound.
  - The total number of floating-point operations (FLOPs) a kernel executes per second.
  correct_index: 2
