title: Positional Encoding Memory Cost
scenario: A Transformer with learned positional embeddings supports max sequence length 8192 with embedding
  dimension 4096 in FP16. Calculate the memory cost of positional embeddings and compare to a model with
  7B parameters.
question: "What is the memory cost of learned positional embeddings for 8192 positions and 4096 FP16 dimensions, and how does it compare to a 7B model?"
details:
  realistic_solution: 'Learned positional embedding table: 8192 positions × 4096 dimensions × 2 bytes
    (FP16) = 67,108,864 bytes = 64 MB. 7B parameter model weight size: 7B × 2 bytes = 14 GB. Positional
    embeddings as fraction: 64 MB / 14 GB = 0.46% — negligible. However, the hidden cost is that extending
    context length requires retraining or interpolation. If you want 32K context: 32,768 × 4096 × 2 =
    256 MB (still small in memory but requires training on long sequences). With sinusoidal (fixed) encodings:
    zero parameters — positions are computed analytically. With RoPE (Rotary Position Embedding): also
    zero additional parameters — rotation matrices are computed from position indices. This is why RoPE
    and ALiBi are preferred for long-context models: they enable length generalization without storing
    position-specific parameters.'
  common_mistake: Worrying about positional encoding memory cost. At 0.5% of model size, it's irrelevant.
    The real concern is whether the encoding generalizes to unseen sequence lengths.
  napkin_math: 'Learned PE: 8K × 4K × 2B = 64MB (0.46% of 7B model). RoPE/Sinusoidal: 0 extra parameters.
    PE memory cost is negligible; the real cost is length generalization.'
