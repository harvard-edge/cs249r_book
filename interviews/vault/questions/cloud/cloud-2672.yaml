title: Positional Encoding Memory Cost
scenario: A Transformer with learned positional embeddings supports a maximum sequence length of 8192 with an embedding dimension of 4096 in FP16.
question: "What is the memory cost of learned positional embeddings for 8192 positions and 4096 FP16 dimensions, and how does it compare to a 7B parameter model?"
details:
  realistic_solution: 'Learned positional embedding table: 8192 positions × 4096 dimensions × 2 bytes (FP16) = 67,108,864 bytes = 64 MB. 7B parameter model weight size: 7B × 2 bytes = 14 GB. Positional embeddings as fraction: 64 MB / 14 GB = 0.46% — negligible. However, the hidden cost is that extending context length requires retraining or interpolation. If you want 32K context: 32,768 × 4096 × 2 = 256 MB (still small in memory but requires training on long sequences). With sinusoidal (fixed) encodings: zero parameters — positions are computed analytically. With RoPE (Rotary Position Embedding): also zero additional parameters — rotation matrices are computed from position indices. This is why RoPE and ALiBi are preferred for long-context models: they enable length generalization without storing position-specific parameters.'
  common_mistake: |
    **The Pitfall:** Worrying excessively about the memory cost of learned positional embeddings.
    **The Rationale:** Candidates see large sequence lengths and assume the embedding table will cause memory bloat, misjudging the scale.
    **The Consequence:** Wasting time optimizing a component that consumes less than 1% of the model's footprint, instead of focusing on true bottlenecks like the KV cache.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence length: 8192. Embedding dimension: 4096.
       - Precision: FP16 (2 bytes).
       - 7B model weights: 14 GB.
    2. **Calculations:**
       - Learned Positional Embedding (PE): 8192 * 4096 * 2 bytes = 67.1 MB.
       - 7B Model Weights: 7B * 2 bytes = 14 GB.
       - Ratio: 67.1 MB / 14 GB = 0.47%.
    3. **Conclusion & Interpretation:** **Result: Memory-Insensitive**. The memory cost of learned PE is completely negligible (<0.5%); the real challenge is that learned PEs fail to generalize.
