title: Sliding Window Attention with FlashAttention Tiling
scenario: Mistral-7B uses sliding window attention with window size W=4096. For a 32K context, each token only attends to the previous 4096 tokens instead of all 32K. You need to analyze how this interacts with FlashAttention tiling, and calculate the memory and compute savings compared to full causal attention.
question: How does W=4096 sliding-window attention interact with FlashAttention tiling for a 32K context, and what memory and compute savings result?
details:
  realistic_solution: 'With full causal attention at N=32K: FlashAttention processes the lower triangle of the N×N matrix = N²/2 effective entries. With sliding window W=4096: each row has at most W non-zero entries. Total entries: N×W (for N>W). Compute ratio: (N×W) / (N²/2) = 2W/N = 2×4096/32768 = 25%. So 75% of FlashAttention tiles can be skipped. In tiling: for tile at position (i_block, j_block), skip if j_block''s tokens are all more than W positions before i_block''s tokens. Only tiles within a band of width W/B_c blocks around the diagonal are computed. KV cache savings: at generation time, each token only needs the last W=4096 tokens'' KV cache, not all previous tokens. KV cache is bounded at 4096 × head_dim × 2 × 2B per head regardless of total context length. A 32K context uses the same KV cache as a 4K context, enabling memory-efficient long-context serving.'
  common_mistake: |
    **The Pitfall:** Assuming sliding window is just a boolean mask applied after computing full attention.
    **The Rationale:** Not realizing that windowing can be integrated directly into the block-sparse tiling computation.
    **The Consequence:** Wasting compute and memory bandwidth by calculating the full N² attention matrix before masking out the ignored tokens.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Context Length (N): 32,768. Window Size (W): 4,096.
       - Head dimension: 128, FP16 (2 bytes).
    2. **Calculations:**
       - Full Causal FLOPS ratio: N² / 2.
       - Sliding Window FLOPS ratio: N × W.
       - Compute ratio: (N × W) / (N² / 2) = 2W / N = (2 × 4096) / 32768 = 25%. (Compute Savings: 75%).
       - Full KV Cache memory/head: 32,768 × 128 × 2 (K+V) × 2 bytes = 16 MB.
       - Sliding KV Cache memory/head: 4,096 × 128 × 2 × 2 = 2 MB.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound Avoidance.** Tiled sliding window drops compute by 75% and KV cache memory by 8x, enabling memory-efficient long-context serving.
