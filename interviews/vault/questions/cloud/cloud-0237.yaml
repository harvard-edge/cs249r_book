title: Mechanism of Speculative Decoding
scenario: Speculative decoding aims to speed up LLM inference without changing the output distribution.
  It uses a smaller 'draft' model and a larger 'target' model. What is the fundamental mechanism that
  allows it to achieve speedup?
question: "What is the fundamental mechanism that allows it to achieve speedup?"
details:
  realistic_solution: The smaller draft model sequentially generates multiple candidate tokens quickly.
    The larger target model then verifies all these candidate tokens in a single parallel forward pass,
    accepting the valid ones and correcting the first mistake.
  common_mistake: Believing that the target model is only used when the draft model is uncertain, rather
    than verifying every token in parallel.
  napkin_math: '- Draft model (1B) generates 5 tokens: 5 × 2ms = 10ms. Target model (70B) verifies all
    5 in one forward pass: 30ms. | - Total for 5 tokens: 40ms. Without speculation: 5 × 30ms = 150ms.
    | - => Speedup: 150/40 = 3.75× (assuming ~80% acceptance rate, effective speedup ≈ 2.5-3×).'
  options:
  - The target model is used only for the first few tokens, and the draft model completes the rest of
    the sequence to save time.
  - The draft model generates multiple tokens sequentially, which the target model then verifies in a
    single parallel forward pass, accepting correct tokens and correcting the first divergence.
  - The draft model and target model generate tokens in parallel, and a majority vote decides which token
    to output.
  - The draft model continuously fine-tunes the target model during inference to make it generate tokens
    faster.
  correct_index: 1
