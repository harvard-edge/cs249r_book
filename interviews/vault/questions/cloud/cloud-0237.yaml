title: Mechanism of Speculative Decoding
scenario: 'Speculative decoding aims to speed up LLM inference without changing the output distribution. It uses a smaller "draft" model and a larger "target" model.'
question: 'What is the fundamental mechanism that allows it to achieve speedup?'
details:
  realistic_solution: 'The smaller draft model sequentially generates multiple candidate tokens quickly. The larger target model then verifies all these candidate tokens in a single parallel forward pass, accepting the valid ones and correcting the first mistake.'
  common_mistake: |
    **The Pitfall:** Believing that the massive target model is only invoked when the smaller draft model expresses uncertainty.
    **The Rationale:** Candidates apply standard human logic (delegation to an expert only when confused), failing to understand that the target model evaluates ALL proposed tokens simultaneously via parallel scoring.
    **The Consequence:** Engineers attempt to optimize the system by tuning uncertainty thresholds, fundamentally breaking the mathematical guarantee of exact distribution matching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Draft model (1B) generation time: 2ms per token (sequential).
    - Target model (70B) verification time: 30ms per forward pass (parallel).
    - Draft batch size: 5 tokens.

    **Calculations:**
    - Draft phase = 5 tokens × 2ms = 10ms.
    - Target phase = 1 forward pass to score all 5 tokens = 30ms.
    - Total time for 5 tokens (assuming 100% acceptance) = 40ms.
    - Baseline time (without speculation) = 5 tokens × 30ms = 150ms.
    - Theoretical max speedup = 150ms / 40ms = 3.75x.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Optimization**. By trading memory bandwidth for parallel ALU utilization, speculative decoding converts sequential token bottlenecks into parallel verification blocks, yielding a massive ~3x effective wall-clock speedup.
  options:
  - 'The target model is used only for the first few tokens, and the draft model completes the rest of the sequence to save time.'
  - 'The draft model generates multiple tokens sequentially, which the target model then verifies in a single parallel forward pass, accepting correct tokens and correcting the first divergence.'
  - 'The draft model and target model generate tokens in parallel, and a majority vote decides which token to output.'
  - 'The draft model continuously fine-tunes the target model during inference to make it generate tokens faster.'
