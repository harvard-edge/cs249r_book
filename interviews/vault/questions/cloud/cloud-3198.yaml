title: MoE Batch Size Impact on Expert Utilization
scenario: Your MoE inference service runs well at batch size 64 (all experts utilized, P50 latency 18ms). When traffic drops and batch size falls to 4, you observe that only 3 of 8 experts receive any tokens, and latency paradoxically increases to 25ms.
question: If batch size 4 produces 8 independent expert choices over 8 experts, how many distinct experts are expected to be activated?
details:
  realistic_solution: "E[distinct experts] = 8 \times (1 - (7/8)^8) = 8 \times (1 - 0.343) = 8 \times 0.657 = 5.25 (not 5.7)."
  common_mistake: |
    **The Pitfall:** Assuming smaller batches should always be faster.
    **The Rationale:** Believing that less data equals less latency, ignoring the mechanics of MoE sparsity.
    **The Consequence:** In MoE, small batches create sparse expert activation patterns that drastically reduce GPU utilization and amplify load imbalance, worsening latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * MoE Configuration: 8 experts total.
       * Batch size 4, 2 experts selected per token = 8 independent choices.
    2. **Calculations:**
       * Expected Value Formula: E[distinct experts] = N \times (1 - (1 - 1/N)^M), where N=8, M=8 choices.
       * E[distinct] = 8 \times (1 - (7/8)^8)
       * E[distinct] = 8 \times (1 - 0.343) = 8 \times 0.657 = 5.25 experts.
    3. **Conclusion & Interpretation:**
       * A batch size of 4 mathematically isolates **~3 experts to zero tokens**, crippling utilization and worsening latency. **Result: Batch-Sparsity-Bound**.
