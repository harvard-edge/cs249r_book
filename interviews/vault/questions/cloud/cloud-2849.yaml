title: Incast Network Bottleneck
scenario: Your team is profiling a centralized aggregator in a cloud-based Mixture
  of Experts (MoE) inference pipeline using A100 80GB nodes. During the gather phase,
  7 worker nodes simultaneously send 200 MB of expert activations to a single aggregator
  node. Each node is provisioned with a single 400 Gbps network interface. The team
  expects this gather phase to take around 4ms, but distributed traces show a consistent
  28ms latency spike.
question: Analyze the network bandwidth constraints of the aggregator to diagnose
  the root cause of the 28ms latency.
visual:
  kind: svg
  path: cloud-2849.svg
  alt: A diagram showing multiple worker nodes simultaneously sending 200 MB of data
    to a single aggregator node, creating an incast bottleneck at the aggregator's
    400 Gbps NIC.
  caption: Simultaneous fan-in (incast) traffic overwhelming a single receiver link.
details:
  realistic_solution: The 4ms expectation erroneously assumes independent point-to-point
    transfers (200 MB / 50 GB/s = 4ms), ignoring the receiver's bandwidth limit. Because
    all 7 workers transmit simultaneously, they create a fan-in (incast) traffic burst
    of 1.4 GB (7 x 200 MB). The aggregator's 400 Gbps NIC can only ingest data at
    a maximum of 50 GB/s, making the physical minimum time to receive the entire burst
    1.4 GB / 50 GB/s = 28 ms.
  common_mistake: Calculating latency based solely on the individual sender link speed
    rather than identifying the true bottleneck at the receiver's ingress NIC during
    a concurrent fan-in operation.
  napkin_math: 7 workers * 200 MB = 1.4 GB burst. 400 Gbps = 50 GB/s link speed. 1.4
    GB / 50 GB/s = 0.028s = 28 ms.
