title: Incast Network Bottleneck
scenario: Your team is profiling a centralized aggregator in a cloud-based Mixture of Experts (MoE) inference pipeline. During the gather phase, 7 worker nodes simultaneously send 200 MB of expert activations to a single aggregator node. Each node has a 400 Gbps network interface. The team expects this gather phase to take around 4ms, but traces show a consistent 28ms latency spike.
question: Analyze the network bandwidth constraints of the aggregator to diagnose the root cause of the 28ms latency.
visual:
  kind: svg
  path: cloud-2849.svg
  alt: A diagram showing multiple worker nodes simultaneously sending 200 MB of data to a single aggregator node, creating an incast bottleneck at the aggregator's 400 Gbps NIC.
  caption: Simultaneous fan-in (incast) traffic overwhelming a single receiver link.
details:
  realistic_solution: The 4ms expectation erroneously assumes independent point-to-point transfers (200 MB / 50 GB/s = 4ms), ignoring the receiver's bandwidth limit. Because all 7 workers transmit simultaneously, they create a fan-in (incast) traffic burst of 1.4 GB (7 x 200 MB). The aggregator's 400 Gbps NIC can only ingest data at a maximum of 50 GB/s, making the physical minimum time to receive the entire burst 1.4 GB / 50 GB/s = 28 ms.
  common_mistake: |
    **The Pitfall:** Calculating latency based solely on the individual sender link speed.
    **The Rationale:** Engineers assume point-to-point independence (200MB / 50GB/s = 4ms) and forget to model the fan-in (incast) bottleneck at the receiver's ingress NIC.
    **The Consequence:** Drastically underestimating latency spikes in distributed scatter-gather patterns, leading to failed real-time SLA guarantees.
  napkin_math: |
    1. Incast Traffic Burst: 7 workers * 200 MB = 1,400 MB (1.4 GB).
    2. Aggregator Ingress Link: 400 Gbps = 50 GB/s.
    3. Receiver Bottleneck Time: 1.4 GB / 50 GB/s = 0.028 seconds (28 ms).
    4. **Result: The aggregator NIC is saturated; it physically takes 28ms to ingest the 1.4 GB burst.**
