title: Cloud Loan Approval Fairness Adjustment
scenario: An automated loan approval model outputs an approval probability score. At a threshold of 0.5, the True Positive Rate (TPR) is 85% for Group A and 60% for Group B.
question: How would you adjust the Group B decision threshold to satisfy Equal Opportunity with Group A's 85% TPR?
details:
  realistic_solution: Implement group-specific decision boundaries during the serving layer's post-processing. Keep Group A's threshold at 0.5 and lower Group B's threshold (e.g., to 0.35) until its TPR reaches the 85% target.
  common_mistake: |
    **The Pitfall:** Applying a single global threshold and assuming the model's calibrated probabilities naturally result in equalized group outcomes.
    **The Rationale:** Engineers mistakenly believe equal thresholds imply algorithmic fairness.
    **The Consequence:** Enforcing disparate impact on minority groups due to differing underlying distributions, resulting in compliance or ethical failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Group A TPR = 85% at threshold 0.5.
       - Group B TPR = 60% at threshold 0.5.
    2. **Calculations:**
       - Initial TPR Gap = 85% - 60% = 25%.
       - Evaluate the ROC curve for Group B. Lowering the threshold (e.g., to 0.35) increases the TPR.
       - Set threshold such that Group B TPR = 85%. Adjusted Gap = 85% - 85% = 0%.
    3. **Conclusion & Interpretation:**
       - **Result: Fairness-Bound.** By applying group-specific post-processing thresholds during serving, Equal Opportunity is achieved without needing to retrain the underlying model.
