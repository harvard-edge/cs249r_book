title: The Arithmetic Intensity Trap
scenario: An engineer on your team is debugging a data preprocessing kernel running on a single H100 GPU.
  They notice that GPU utilization is surprisingly low. Profiling reveals the kernel performs approximately
  10 TFLOPs of FP16 computation for every 500 GB of data it reads from HBM3 memory.
question: "Is this H100 preprocessing kernel with 10 TFLOPs per 500 GB read compute-bound or memory-bound, and why?"
details:
  realistic_solution: The kernel is severely **memory-bound**. The core issue is its low Arithmetic Intensity
    (AI). An H100 GPU can only achieve its peak theoretical performance if a workload provides enough
    operations per byte of data transferred from memory to keep the compute cores busy. This kernel does
    not.
  common_mistake: Engineers often assume that if a task involves a large number of FLOPs, it must be 'compute-bound'
    and should saturate the GPU's computational units. They forget to account for the data that must be
    moved from memory to feed those units. High performance requires both massive computation AND a high
    ratio of computation to data movement (high Arithmetic Intensity).
  napkin_math: 1. **Find the GPU's Ridge Point:** This is the minimum Arithmetic Intensity needed to achieve
    peak FLOPs. It's the ratio of peak compute to memory bandwidth.
  options:
  - Compute-bound, because 10 TFLOPs is a very large number of operations that should saturate the GPU.
  - Memory-bound, because its Arithmetic Intensity of ~20 Ops/Byte is far below the H100's ridge point
    of ~295 Ops/Byte.
  - Network-bound, because transferring 500 GB of data is the bottleneck, regardless of computation.
  - It's impossible to tell without knowing the kernel's execution time in milliseconds.
  correct_index: 1
