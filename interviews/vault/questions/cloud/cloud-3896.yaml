title: Triton Kernel Portability from NVIDIA to AMD GPUs
scenario: 'You wrote a fused attention kernel in Triton that achieves 85% of peak FP16 throughput on H100. You recompile the same Triton code targeting MI300X via the AMD ROCm backend. Performance drops to 55% of MI300X peak.'
question: At 55% of MI300X FP16 peak, what effective throughput is the Triton attention kernel achieving?
details:
  realistic_solution: 'MI300X FP16: 1,307 TFLOPS (authoritative spec). At 55% MFU: 1,307 × 0.55 = 718.85 ≈ 719 TFLOPS.'
  common_mistake: |
    **The Pitfall:** Blaming Triton's AMD backend as fundamentally broken and assuming 653 TFLOPS dense.
    **The Rationale:** Candidates often use the wrong base value for MI300X FP16 (653 instead of 1,307 TFLOPS) and blame the backend rather than auto-tuning heuristics.
    **The Consequence:** Diagnosing the issue incorrectly leads to abandoning Triton or miscalculating the hardware's effective capability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: AMD MI300X.
    - MI300X peak FP16 compute: 1,307 TFLOPS.
    - Observed utilization: 55% MFU.
    
    **Calculations:**
    - Effective throughput: Peak Compute * Utilization.
    - Effective throughput: 1,307 TFLOPS * 0.55.
    - Effective throughput: 718.85 TFLOPS.
    
    **Conclusion & Interpretation:**
    - **Result: ~719 TFLOPS (Compute-Bound)**. The kernel achieves roughly 719 TFLOPS, highlighting that developers must use the correct 1,307 TFLOPS spec baseline instead of the 653 TFLOPS half-rate.
