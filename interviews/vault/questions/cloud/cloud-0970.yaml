title: CPO Power Savings Calculation
scenario: You are designing the next-generation network fabric for an AI cluster using 51.2 Tbps switch ASICs. Currently, using standard 800G pluggable optics, the optical interconnects consume about 15 pJ/bit. Your team is evaluating a move to Co-Packaged Optics (CPO) which reduces the optical interface power to 5 pJ/bit. The cluster contains 500 such switches running at 80% average utilization year-round (8760 hours/year).
question: What are the per-switch peak power savings from CPO and annual energy savings for the 500-switch cluster?
details:
  realistic_solution: Calculate the per-switch power delta using the pJ/bit metric and total switching capacity. Apply the average utilization factor and cluster scale to find the total annual energy reduction, which translates to massive OPEX savings.
  common_mistake: |
    **The Pitfall:** Calculating only the peak power savings per switch.
    **The Rationale:** Candidates focus on the peak capacity of the ASIC but forget to apply the average network utilization or cluster scale.
    **The Consequence:** The total energy reduction and subsequent OPEX savings are wildly overestimated or underestimated.
  napkin_math: |
    1. Delta: 15 pJ/bit - 5 pJ/bit = 10 pJ/bit.
    2. Peak savings per switch: 51.2 Tbps * 10 pJ/bit = 51.2e12 bits/s * 10e-12 J/bit = 512 W.
    3. Average savings per switch: 512 W * 0.8 utilization = 409.6 W.
    4. Total cluster savings: 409.6 W * 500 switches = 204.8 kW.
    5. Annual energy savings: 204.8 kW * 8760 hours = 1,794,048 kWh.
    6. **Final Savings: 512 W peak per switch, ~1.79 GWh/year for the cluster.**
