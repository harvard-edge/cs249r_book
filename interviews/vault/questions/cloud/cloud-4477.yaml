title: 'DLRM Training on TPU v5e Pod: Embedding Table Placement'
scenario: A team is porting a DLRM training job to a TPU pod (256 chips). The embedding tables total 8TB. TPU HBM is 16GB per chip, providing 4TB total HBM. Embedding tables don't fit.
question: How would you place 8TB of embedding tables on a 256-chip TPU pod with only 4TB total HBM?
details:
  realistic_solution: 'Tiered memory placement for embedding tables: (1) Hot table partition (high-access frequency): top 20% of embedding rows receive 80% of lookups (Zipf). Size: 20% * 8TB = 1.6TB. Place in HBM. Fits in 4TB HBM alongside model. (2) Warm table partition: next 30% of rows. Place in TPU extended memory (if available) or CPU DRAM attached via PCIe. Use HBM-DRAM hybrid: pre-fetch warm rows to HBM before batch using access pattern prediction. (3) Cold partition (50% of rows, 20% of lookups): keep in distributed parameter server (CPU cluster). Async fetch during step N for step N+2 (prefetch pipeline).'
  common_mistake: |
    **The Pitfall:** Attempting to fit all embedding tables in HBM by aggressive quantization (e.g., INT4).
    **The Rationale:** Engineers accustomed to LLM weight quantization assume the same techniques apply to recommendation models without quality loss.
    **The Consequence:** INT4 embedding quality degrades significantly for recommendation models, and 1TB still strains capacity, fundamentally harming model accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total embedding tables = 8TB.
       - TPU HBM = 16GB/chip * 256 chips = 4TB total.
       - Access pattern: Top 20% of rows receive 80% of lookups.
    2. **Calculations:**
       - Capacity Gap: 8TB / 256 chips = 31.25GB/chip (exceeds 16GB).
       - Hot Partition (20%): 8TB * 0.20 = 1.6TB.
       - Per-Chip Hot Partition: 1.6TB / 256 chips = 6.25GB (fits in 16GB, leaving 9.75GB).
       - Cold Lookup Latency: CPU PS latency ≈ 100μs per lookup.
    3. **Conclusion & Interpretation:**
       - **Result: Multi-tiered memory architecture required.** Hot embeddings fit in HBM, while cold lookups are pipelined from CPU DRAM.
