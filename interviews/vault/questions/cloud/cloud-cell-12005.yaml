title: 'Latency Decomposition: Specify Prefill/Decode Split Requirements for SLA on H100'
scenario: 'Design a latency budget specification for a chat application using a 13B model on H100 (80GB
  HBM3, 3.35TB/s). The SLA requires TTFT < 200ms and time-per-output-token (TPOT) < 30ms at P95. Specify:
  maximum prompt length, maximum decode length, minimum hardware requirements (number of H100s), and batch
  size constraints that satisfy both SLA components simultaneously.'
details:
  realistic_solution: 'TPOT constraint: 13B model = 26GB FP16. Single H100: 26GB/3.35TB/s ≈ 7.8ms/token
    < 30ms. ✓ Max batch for TPOT < 30ms: memory-bound, batching doesn''t increase per-token time (same
    weights read). TTFT constraint: at batch=1, prefill for N tokens at 13B: 2×N×13B×2/989TFLOPS = N×52.5M
    FLOPs/989TFLOPS. For N=512: 26.6T/989T ≈ 27ms << 200ms. Max prompt: 200ms budget → N = 200ms × 989TFLOPS
    / (2×13B×2) ≈ 3785 tokens. So max prompt ~3K tokens with margin.'
  common_mistake: Solving for TTFT and TPOT independently without considering that larger batches improve
    TTFT amortization but can degrade TPOT for individual requests.
  napkin_math: 'TPOT: 26GB/3.35TB/s = 7.8ms/token. TTFT for 512 tokens: 26.6T FLOPs / 989TFLOPS = 27ms.
    Budget remaining for queue+network: 200 - 27 = 173ms. Spec: max_prompt=2048, max_decode=512, batch_size≤64
    (memory fits: 26GB + 64×2048×4096×2×40layers = 26+43GB = 69GB < 80GB).'
