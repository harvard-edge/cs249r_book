title: Cloud Zero Copy Serialization L2 0
scenario: Your ML serving pipeline uses JSON to serialize model inputs between microservices. P99 latency
  is 15 ms, with 8 ms spent on serialization/deserialization. Explain how zero-copy serialization would
  help.
question: "How would zero-copy serialization reduce the 8 ms JSON serialization cost and improve the 15 ms P99 latency?"
details:
  realistic_solution: 'Zero-copy serialization uses binary formats (FlatBuffers, Cap''n Proto) where the
    serialized bytes are the same as the in-memory representation. The receiver can read fields directly
    from the byte buffer without parsing or copying — just a pointer cast. JSON requires: parse string
    → allocate objects → populate fields → type-convert values. This involves memory allocation, string
    parsing, and data copying. Zero-copy eliminates all three: the wire format IS the memory format. For
    your pipeline: 8 ms of JSON ser/deser could drop to <0.1 ms with FlatBuffers, reducing P99 from 15
    ms to ~7.1 ms.'
  common_mistake: Thinking zero-copy just means 'fast serialization library.' The key insight is that
    deserialization cost is literally zero — you read directly from the network buffer. This requires
    the format to match the CPU's memory layout (endianness, alignment).
  napkin_math: 'JSON ser/deser: parse 1 MB of text ≈ 4-8 ms (string processing + allocations). FlatBuffers:
    0 ms deserialization (pointer cast), ~0.05 ms serialization (memcpy). Speedup: 8 ms → 0.1 ms = 80x
    on serialization alone. P99: 15 - 8 + 0.1 = 7.1 ms.'
