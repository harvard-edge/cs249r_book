title: H100 Parquet Prefetch Sizing
scenario: An H100 cluster ingests Parquet files from an S3 bucket. Network latency is 50 ms. The GPU consumes data at 2 GB/s per node. The S3 throughput limit is 2.5 GB/s per node.
question: Determine the minimum prefetch buffer size per node to hide the S3 network latency entirely.
visual:
  kind: svg
  path: cloud-4524.svg
  alt: 'Throughput stages showing Network Latency gap hidden by Prefetch Buffer.'
  caption: Latency hiding via prefetch buffering.
details:
  realistic_solution: To hide the latency, the prefetch buffer must cover the data consumed during the round-trip time. Data consumed during 50 ms = 2 GB/s * 0.050 s = 0.1 GB (100 MB). A minimum buffer of 100 MB is required to prevent GPU starvation.
  common_mistake: |
    **The Pitfall:** Using the network throughput (2.5 GB/s) instead of the GPU consumption rate to size the starvation buffer.
    **The Rationale:** It's intuitive to size buffers based on the pipe filling them.
    **The Consequence:** The buffer is over-provisioned, wasting host RAM, or incorrectly calculated, leading to unexpected GPU starvation during latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Consumption Rate: 2 GB/s.
       - Network Latency (Round Trip): 50 ms (0.050 seconds).
       - S3 Throughput Limit: 2.5 GB/s.
    2. **Calculations:**
       - Buffer Requirement: Data consumed during 50 ms = 2 GB/s * 0.050 s = 0.1 GB.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Bound Mitigation.** A minimum prefetch buffer of 100 MB is required to completely hide the 50 ms network latency and prevent GPU starvation.
