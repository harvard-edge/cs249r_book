title: Estimating Graph Fusion Bandwidth Savings
scenario: 'You are deploying a Transformer model on an A100 GPU (2000 GB/s HBM bandwidth). In eager mode,
  an attention block processes inputs Q, K, and V (10MB each) sequentially: it computes P = Q * K^T (writing
  a 50MB intermediate to HBM), applies Softmax on P (reading and writing 50MB), and computes S * V to
  produce output O (10MB). By enabling a graph compiler (like XLA or TorchInductor), the entire attention
  mechanism is fused into a single kernel, avoiding intermediate materialization to HBM. Calculate the
  HBM data transfer time saved per attention block.'
details:
  realistic_solution: By fusing the operations, the intermediate 50MB tensor P is kept entirely within
    SRAM. The compiler reduces the total memory traffic from 240MB (eager) to just 40MB (fused), saving
    200MB of HBM traffic per block. At 2000 GB/s, this saves 100 microseconds of latency per block.
  common_mistake: Candidates often assume compute FLOPs change during fusion, or forget to account for
    both the read and write operations of the intermediate 50MB tensor across the three distinct eager-mode
    kernels.
  napkin_math: 'Eager Traffic:

    1. QK^T: 10(Q) + 10(K) + 50(P_out) = 70MB

    2. Softmax: 50(P_in) + 50(S_out) = 100MB

    3. S*V: 50(S_in) + 10(V) + 10(O_out) = 70MB

    Total Eager = 240MB.


    Fused Traffic:

    Read Q, K, V (10*3 = 30MB) + Write O (10MB) = 40MB.


    Savings = 240MB - 40MB = 200MB.

    Time Saved = 200MB / 2000 GB/s = 0.2 GB / 2000 GB/s = 0.0001 seconds = 100 microseconds.'
