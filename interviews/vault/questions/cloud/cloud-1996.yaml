title: Systolic Array Peak Throughput Estimation
scenario: You are evaluating the theoretical peak throughput of a new cloud AI accelerator featuring a
  single 256x256 systolic array operating at a 1.2 GHz clock speed for BF16 matrix multiplication. To
  size the workload for a large Transformer feed-forward layer, you need to calculate the theoretical
  peak TFLOPS (Tera Floating-Point Operations Per Second) of this hardware.
question: "What is the accelerator’s theoretical peak BF16 throughput in TFLOPS?"
details:
  realistic_solution: First, calculate the number of MACs performed per clock cycle by squaring the grid
    dimension (256 * 256). Multiply by 2 to convert MACs to FLOPs per cycle, then multiply by the clock
    frequency to find the final peak throughput in TFLOPS.
  common_mistake: Candidates often forget that a single Multiply-Accumulate (MAC) operation counts as
    two floating-point operations (one multiply, one add), or they fail to correctly correlate the 2D
    array dimensions with parallel operations per clock cycle.
  napkin_math: MACs/cycle = 256 × 256 = 65,536. FLOPs/cycle = 65,536 × 2 = 131,072. Peak Throughput =
    131,072 FLOPs/cycle * 1.2 * 10^9 cycles/sec = 157.28 * 10^12 FLOPS ≈ 157.3 TFLOPS.
