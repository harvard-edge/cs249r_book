title: Systolic Array Peak Throughput Estimation
scenario: You are evaluating the theoretical peak throughput of a new cloud AI accelerator featuring a single 256x256 systolic array operating at a 1.2 GHz clock speed for BF16 matrix multiplication.
question: What is the accelerator's theoretical peak BF16 throughput in TFLOPS?
details:
  realistic_solution: 'First, calculate the number of MACs performed per clock cycle by squaring the grid dimension (256 * 256). Multiply by 2 to convert MACs to FLOPs per cycle, then multiply by the clock frequency to find the final peak throughput in TFLOPS.'
  common_mistake: |
    **The Pitfall:** Forgetting that a single MAC operation counts as two FLOPs.
    **The Rationale:** Candidates compute the grid cycles accurately but under-report the floating-point math.
    **The Consequence:** Underestimating the accelerator's theoretical peak performance by half.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256x256 systolic array.
    - 1.2 GHz clock speed.

    **Calculations:**
    - MACs/cycle: 256 * 256 = 65,536.
    - FLOPs/cycle: 65,536 * 2 = 131,072.
    - Peak Throughput: 131,072 * 1.2e9 cycles/sec = 157.3 TFLOPS.

    **Conclusion & Interpretation:**
    - **Result: 157.3 TFLOPS (Compute-Bound)**. A single MAC operation counts as two FLOPs, yielding a theoretical peak of 157.3 TFLOPS.
