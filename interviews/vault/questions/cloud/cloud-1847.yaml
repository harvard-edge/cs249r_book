title: Data Pipeline Throughput Calculation for NVMe SSDs
scenario: 'A cloud ML training node uses 8x A100 GPUs that collectively consume training data at a rate of 4 GB/s. The dataset is currently stored on a local PCIe Gen4 NVMe SSD as 500 million individual 4KB JSON files. The SSD specs are: 7.0 GB/s peak sequential read throughput, and 500K IOPS for 4KB random reads.'
question: What read throughput do 500M 4KB JSON files achieve on the NVMe SSD, does it starve the 4 GB/s GPU pipeline, and how should you store the data?
details:
  realistic_solution: Repack the 4KB JSON files into large (e.g., 100MB+) contiguous archives using a format like WebDataset (tar) or TFRecord. This converts the I/O pattern from IOPS-bound random reads to bandwidth-bound sequential reads, unlocking the full 7.0 GB/s throughput.
  common_mistake: |
    **The Pitfall:** Assuming the advertised 7.0 GB/s sequential throughput applies to millions of tiny files.
    **The Rationale:** Engineers read the top-line specs of an NVMe drive and assume it applies to all I/O patterns.
    **The Consequence:** Failing to calculate the IOPS-bound random read throughput, leading to severe GPU starvation and underutilization during training.
  napkin_math: |
    - **Current Random Read Throughput:** 500,000 IOPS * 4 KB/IO = 2,000,000 KB/s = **2.0 GB/s**.
    - **GPU Consumption Requirement:** 4.0 GB/s.
    - **Starvation Check:** 2.0 GB/s < 4.0 GB/s. The GPUs are **50% starved** for data.
    - **After Repacking:** Sequential Read Throughput = **7.0 GB/s**, easily exceeding the 4.0 GB/s requirement.
