title: AllReduce vs AllGather Cost in TP
scenario: You are analyzing the communication volume of Megatron-LM's Tensor Parallelism on an 8x MI300X node using a ring algorithm for a tensor of size M bytes across P GPUs.
question: For M bytes across P GPUs, what are the ring AllReduce vs AllGather communication volumes, and which operations do Megatron's row and column parallel layers use?
details:
  realistic_solution: 'Ring AllGather: each GPU sends its local shard (M/P bytes) around the ring in P-1 steps. Total bytes per GPU = (P-1) * M/P ≈ M. Ring AllReduce: equivalent to ReduceScatter + AllGather. Total bytes per GPU = 2 * (P-1)/P * M ≈ 2M. Standard Megatron Tensor Parallelism: column-parallel forward pass requires NO communication, row-parallel forward uses an AllReduce.'
  common_mistake: |
    **The Pitfall:** Believing AllReduce and AllGather have vastly different communication costs.
    **The Rationale:** Candidates assume "Reduce" involves significantly more data movement than "Gather," without understanding the mechanics of ring-based collective implementations.
    **The Consequence:** Making incorrect architectural choices when designing tensor parallel communication strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ring algorithm used for collectives.
       - Tensor size M bytes, P GPUs.
       - Example: M = 32 MB, P = 8.
    2. **Calculations:**
       - Ring AllGather: each GPU sends M/P bytes around the ring. Total bytes per GPU = (P-1) * (M/P) ≈ M.
       - Ring AllReduce: ReduceScatter + AllGather. Total bytes per GPU = 2 * (P-1)/P * M ≈ 2M.
       - For M = 32 MB, P = 8: AllGather = (7/8) * 32 = 28 MB.
       - AllReduce = 2 * (7/8) * 32 = 56 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound.** AllReduce costs roughly 2x the communication volume of AllGather. Megatron TP intelligently minimizes forward pass communication.
