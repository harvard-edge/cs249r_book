title: AllReduce vs AllGather Cost in TP
scenario: You are analyzing the communication volume of Megatron-LM's Tensor Parallelism on an 8x MI300X node using a ring algorithm for a tensor of size M bytes across P GPUs.
question: For M bytes across P GPUs, what are the ring AllReduce vs AllGather communication volumes, and which operations do Megatron's row and column parallel layers use?
details:
  realistic_solution: 'Ring AllGather: each GPU sends its local shard (M/P bytes) around the ring in P-1 steps. Total bytes per GPU = (P-1) × M/P ≈ M for large P. Ring AllReduce: equivalent to ReduceScatter + AllGather. Total bytes per GPU = 2 × (P-1)/P × M ≈ 2M for large P. So AllReduce costs roughly 2× AllGather. In standard Megatron Tensor Parallelism: the column-parallel forward pass requires NO communication, while the row-parallel forward pass uses an AllReduce to sum partial results. In the backward pass, they swap: column-parallel uses AllReduce, and row-parallel requires NO communication. If Megatron Sequence Parallelism is enabled, the AllReduces are split: column-parallel forward uses AllGather, and row-parallel forward uses ReduceScatter.'
  common_mistake: |
    **The Pitfall:** Believing AllReduce and AllGather have vastly different communication costs.
    **The Rationale:** Candidates assume "Reduce" involves significantly more data movement than "Gather," without understanding the mechanics of ring-based collective implementations.
    **The Consequence:** Making incorrect architectural choices when designing tensor parallel communication strategies.
  napkin_math: |
    1. Ring AllGather: each GPU sends its local shard (M/P bytes) around the ring in P-1 steps. Total bytes per GPU = (P-1) × (M/P) ≈ M (for large P).
    2. Ring AllReduce: equivalent to ReduceScatter + AllGather. Total bytes per GPU = 2 × (P-1)/P × M ≈ 2M.
    3. Therefore, AllReduce costs roughly 2x the communication volume of AllGather.
    4. Let M = 32 MB, P = 8.
    5. AllGather per GPU = (7/8) × 32 = 28 MB.
    6. AllReduce per GPU = 2 × (7/8) × 32 = 56 MB.
    7. **Standard Megatron TP uses NO communication in the forward pass of column-parallel, and one AllReduce in the forward pass of row-parallel (swapped in the backward pass).**
