title: Evaluating Interleaving vs A/B Testing
scenario: Your e-commerce search platform processes 10,000 QPS. You are evaluating a new ranking model
  (Model B) that adds a cross-attention layer, increasing P99 latency by 45ms over the production Model
  A (currently at 80ms). Offline NDCG improved by 2.5%, but you need to detect a 0.5% CTR lift with 95%
  confidence. A traditional A/B test requires 14 days of traffic due to high inter-user variance. Evaluate
  an interleaving experiment design versus A/B testing, specifically addressing the statistical power,
  latency SLA (strict 150ms limit), and compute cost trade-offs.
question: "Would you use interleaving or A/B testing for Model B under the 150ms P99 SLA, and how would you handle power, latency, and cost?"
details:
  realistic_solution: Use interleaving as a rapid, early-stage filter on a very small traffic allocation
    (e.g., 1%) to determine relative user preference in 24-48 hours. Run models in parallel to keep total
    latency at max(80ms, 125ms) + merge overhead = ~135ms, satisfying the 150ms SLA. If Model B wins,
    promote it to a standard A/B test to measure absolute CTR and revenue lift.
  common_mistake: Candidates blindly recommend interleaving for its statistical efficiency without realizing
    it requires running both Model A and Model B for the same request, pushing the P99 latency dangerously
    close to the 150ms SLA, and they forget interleaving cannot measure absolute metrics like total revenue.
  napkin_math: 'If inter-user variance accounts for 90% of total variance, interleaving (within-subject
    design) reduces required sample size by 10x, turning a 14-day test into 1.4 days. Latency: max(Latency
    A, Latency B) + Interleave Overhead = max(80, 125) + 10 = 135ms < 150ms SLA. Compute cost per interleaved
    request is A + B (100% increase).'
