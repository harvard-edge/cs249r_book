title: MI300X Paged KV Cache Allocation
scenario: You are architecting a multi-tenant inference service using an AMD MI300X
  (192 GB HBM3) for a 70B parameter FP16 model. You must design a paged attention
  pool that guarantees zero OOMs, reserving 20% of the total HBM for intermediate
  activations.
question: Create a memory allocation specification calculating the maximum concurrent
  requests supported if each request can reach 8192 tokens, and the model has 80 layers,
  8 KV heads, and a head dimension of 128.
visual:
  kind: svg
  path: cloud-2864.svg
  alt: Two bar charts. The first is a stacked bar showing 192GB HBM3 divided into
    140GB Weights, 38.4GB Activations, and 13.6GB KV Cache. The second shows the 5
    concurrent request limit.
  caption: Memory allocation breakdown and max concurrent requests for MI300X running
    70B FP16.
details:
  realistic_solution: The model weights occupy 70B * 2 bytes = 140GB. Activations
    reserve 20% of 192GB = 38.4GB. This leaves 192 - 140 - 38.4 = 13.6GB for the KV
    cache pool. The KV cache size per token is 2 (K,V) * 80 (layers) * 8 (KV heads)
    * 128 (dim) * 2 (bytes) = 327.68 KB/token. The total KV pool can hold 13.6GB /
    327.68KB = 41,503 tokens. At a maximum of 8192 tokens per request, the service
    can support floor(41,503 / 8192) = 5 concurrent requests.
  common_mistake: Sizing the KV cache against the entire 192GB memory without subtracting
    both the model weights and the 20% activation reserve.
  napkin_math: 192GB - 140GB - 38.4GB = 13.6GB. Token size = 327.68KB. Max requests
    = 13.6GB / (327.68KB * 8192) = 5.
