title: 'TCO Realization: Annual GPU Cost for GPT-4-Scale Service'
scenario: 'Estimate the annual GPU infrastructure cost for running a GPT-4 scale service at 100 million queries/day, averaging 1000 output tokens per query. Assume the model needs 8 H100s per serving pod, each pod handles 10 queries/minute, and H100s are priced at $1.50/hr (reserved).'
question: "How many GPT-4 serving pods and H100s are needed for 100M queries/day, and what are the annual and monthly GPU costs?"
details:
  realistic_solution: 'Daily demand: 100M queries/day = 69,444 queries/minute. Pods needed: 69,444 / 10 queries/pod/minute = 6,945 pods. GPUs: 6,945 * 8 = 55,560 H100s. Annual cost: 55,560 * $1.50 * 8760 = $730M/yr. Monthly: $60.8M. Revenue needed at 40% margin: $730M / 0.6 = $1.22B/yr from GPU costs alone. At $0.01/1K tokens: 100M * 1000 * 365 * $0.00001 = $365M/yr — insufficient! Real pricing: ~$0.03/1K or add subscriptions. Note: 55,560 H100s exceeds total global H100 supply in 2024 (~100K per quarter shipped), so model is likely MoE or uses aggressive batching.'
  common_mistake: |
    **The Pitfall:** Not calculating required pods first from throughput demand.
    **The Rationale:** Improperly multiplying total tokens by cost without modeling the actual concurrent hardware capacity needed.
    **The Consequence:** Arriving at answers that are off by 1000x, leading to catastrophic infrastructure under-budgeting.
  napkin_math: |
    1. **Daily demand:** 100M queries/day = `100,000,000 / (24*60)` = **69,444 queries/minute**.
    2. **Pods needed:** `69,444 / 10 queries/pod/minute` = **6,945 pods**.
    3. **GPUs needed:** `6,945 pods * 8 GPUs/pod` = **55,560 H100s**.
    4. **Annual Cost:** `55,560 * $1.50/hr * 8760 hrs` = **$730 Million/yr**.
    5. **Monthly Cost:** `$730M / 12` = **$60.8 Million/mo**.
