title: 'TCO Realization: Annual GPU Cost for GPT-4-Scale Service'
scenario: 'Estimate the annual GPU infrastructure cost for running a GPT-4 scale service
  at OpenAI''s claimed scale: 100 million queries/day, average 1000 output tokens
  per query. Assume the model needs 8 H100s per serving pod, each pod handles 10 queries/minute,
  H100 at $1.50/hr (reserved pricing). Calculate CapEx equivalent and monthly recurring
  cost.'
question: How many GPT-4 serving pods and H100s are needed for 100M queries/day, and
  what are the annual and monthly GPU costs?
details:
  realistic_solution: 'Daily demand: 100M queries/day = 69,444 queries/minute. Pods
    needed: 69,444 / 10 queries/pod/minute = 6,945 pods. GPUs: 6,945 * 8 = 55,560
    H100s. Annual cost: 55,560 * $1.50 * 8760 = $730M/yr. Monthly: $60.8M. Revenue
    needed at 40% margin: $730M / 0.6 = $1.22B/yr from GPU costs alone. At $0.01/1K
    tokens: 100M * 1000 * 365 * $0.00001 = $365M/yr — insufficient! Real pricing:
    ~$0.03/1K or add subscriptions. Note: 55,560 H100s exceeds total global H100 supply
    in 2024 (~100K per quarter shipped), so model is likely MoE or uses aggressive
    batching.'
  common_mistake: Not calculating required pods first (from throughput demand) before
    multiplying by GPU count and hourly rate, leading to off-by-1000x answers.
  napkin_math: 'Demand: 100M/day = 1157/sec = 69,444/min. Pods at 10 qpm: 6,945 pods.
    GPUs: 55,560 H100s. Annual: 55,560*$1.50*8760=$730M. Monthly: $60.8M. Revenue
    at $0.01/1K tokens, 1000 tok/query: $0.01/query * 100M/day * 365 = $365M/yr. Gap:
    $730M cost vs $365M revenue → need $0.02/query minimum to cover GPU cost alone.
    ChatGPT Plus at $20/mo: 10M users * $20 * 12 = $2.4B revenue. Plus API revenue
    covers the infrastructure. Scale reality check: 55K H100s is enormous — suggests
    significant optimization (speculative decoding, MoE routing, aggressive batching)
    to reduce effective GPU count.'
