title: Evaluating Fault Models for Large-Scale GPU Clusters
scenario: Your distributed training cluster of 4,096 H100 GPUs experiences roughly 100 hardware-related errors per day. The infrastructure team proposes a generic 'fail-stop' fault model for all errors, triggering a global checkpoint restart (which takes 5 minutes). However, profiling reveals 80% of these errors are transient single-bit ECC errors, 15% are NVLink lane degradations causing a 20% bandwidth drop, and only 5% are permanent GPU board failures.
question: Should the 100 daily hardware errors all trigger fail-stop restarts, or should you use a multi-tier fault model, and why?
details:
  realistic_solution: 'Adopt a multi-tiered fault model: map transient faults (ECC) to hardware-level correction, degradation faults (NVLink) to dynamic topology routing or micro-batch adjustments, and reserve the fail-stop model (global restart) solely for the 5% permanent GPU failures.'
  common_mistake: |
    **The Pitfall:** Treating all faults as fail-stop events.
    **The Rationale:** Teams adopt a one-size-fits-all error handling strategy for simplicity.
    **The Consequence:** This triggers expensive global rollbacks for minor, localized, or transient errors, drastically reducing effective cluster goodput and wasting millions in compute time.
  napkin_math: |
    - **Calculate Fail-stop downtime:** 100 faults/day * 5 min/restart = 500 min/day (which is **34.7%** of the 1440 minutes in a day).
    - **Calculate Tiered model downtime:** Only 5 permanent faults/day trigger restarts. 5 faults * 5 min = 25 min/day (which is **1.7%** of a day).
    - **Conclusion:** A tiered fault model improves daily goodput by **33%**.
