title: Continuous Deployment VRAM Constraints
scenario: You are designing a continuous deployment pipeline for a 15GB CTR prediction model serving 100,000
  QPS across a fleet of 150 NVIDIA L4 (24GB VRAM) instances. The model is continuously trained on fresh
  user data and needs to be deployed to production every 4 hours. You must evaluate deployment strategies
  (e.g., Blue/Green, Canary, In-Place) to minimize P99 latency spikes and ensure 100% availability without
  causing Out-Of-Memory (OOM) errors on the inference GPUs during the weight updates.
details:
  realistic_solution: Evaluate a phased Canary rollout at the node level. By provisioning 10% new nodes
    (15 instances) equipped with the new model, warming them up, and gradually shifting traffic before
    decommissioning old nodes, you maintain safe VRAM limits and control infrastructure costs.
  common_mistake: Proposing an in-place hot-swap (loading the new model into the existing GPU context
    before switching traffic), failing to realize that holding both 15GB models in memory requires 30GB,
    which immediately OOMs the 24GB L4 GPU.
  napkin_math: 'VRAM constraint: 15GB (old model) + 15GB (new model) = 30GB > 24GB VRAM (OOM). Rolling
    Canary overhead: Updating 10% of the fleet per phase requires only 150 * 0.1 = 15 extra L4 instances
    at peak, bounding the hardware overhead to 10% rather than 100% for full Blue/Green.'
