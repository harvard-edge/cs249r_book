title: The HBM vs SRAM Bandwidth Gap
scenario: You profile a custom attention kernel on an A100 GPU. The kernel takes 10ms. You move a 2MB
  intermediate activation tensor from High Bandwidth Memory (HBM) into the GPU's Shared Memory (SRAM).
  The kernel time instantly drops to 2ms. Why did a seemingly small change in where a tensor is stored
  yield a 5x speedup?
details:
  realistic_solution: The physical bandwidth gap between HBM and SRAM on an A100 is over 10x (1,555 GB/s
    vs 19,000 GB/s). If your kernel repeatedly reads and writes that 2MB intermediate tensor (e.g., 8,000
    passes during an unoptimized reduction or complex iterative block), leaving it in HBM forces the SMs
    to move 16 GB of data across the slower global memory bus, adding 8ms of pure memory stall time. By
    explicitly pinning the tensor into the SM's local Shared Memory (which is physically located right
    next to the ALUs), you unlock 19 TB/s of bandwidth, dropping the memory time to <1ms. You moved the
    workload from being memory-bound to compute-bound.
  common_mistake: '"Knowing that SRAM is faster than HBM, but failing to quantify *how much* faster, treating
    all ''GPU memory'' as roughly the same."'
  napkin_math: A100 HBM2 bandwidth is `~2 TB/s`. A100 L1/Shared Memory bandwidth (aggregate across all
    SMs) is `~19 TB/s`. If an algorithm makes 8,000 passes over a 2MB tensor, reading from HBM requires
    `16 GB` of data movement at `2 TB/s` (plus massive latency per fetch). 16 GB / 2 TB/s = 8ms of pure
    memory stall time. Reading from SRAM does the same movement at `19 TB/s` with near-zero latency (0.8ms),
    easily accounting for a nearly 8ms reduction in total kernel time.
