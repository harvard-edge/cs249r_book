title: The HBM vs SRAM Bandwidth Gap
scenario: You profile a custom attention kernel on an A100 GPU. The kernel takes 10ms. You move a 2MB intermediate activation tensor from High Bandwidth Memory (HBM) into the GPU's Shared Memory (SRAM), and the kernel time instantly drops to 2ms.
question: Why did a seemingly small change in where a tensor is stored yield a 5x speedup?
details:
  realistic_solution: The physical bandwidth gap between HBM and SRAM on an A100 is over 10x (1.5 TB/s vs 19 TB/s). Explicitly pinning repeatedly accessed tensors into local Shared Memory unlocks massive bandwidth and eliminates memory stall time, making the workload compute-bound.
  common_mistake: |
    **The Pitfall:** Stating that SRAM is faster than HBM without quantifying the magnitude of the difference.
    **The Rationale:** Candidates treat all GPU memory as roughly equivalent, ignoring the massive bandwidth gap between hierarchy levels.
    **The Consequence:** Failing to recognize when an algorithm is severely memory-bound and missing massive optimization opportunities.
  napkin_math: |
    - **Data movement**: 8,000 passes over a 2MB tensor = 16 GB of total data read.
    - **HBM approach**: A100 HBM2 bandwidth is ~2 TB/s. 16 GB / 2 TB/s = 8 ms of pure memory stall time.
    - **SRAM approach**: A100 L1/Shared Memory bandwidth is ~19 TB/s. 16 GB / 19 TB/s = 0.8 ms of stall time.
    - **Conclusion**: **By moving to SRAM, memory stall time drops from 8ms to <1ms, explaining the 8ms reduction in total kernel time.**
