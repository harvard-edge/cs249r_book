title: MoE Sparse vs Dense FLOP Equivalence
scenario: Mixtral 8x7B has 8 experts of ~7B parameters each with top-2 routing, for a total of ~47B parameters. However, each token only activates 2 of 8 experts.
question: "How do Mixtral 8x7B per-token FLOPs compare to dense 47B and 13B models, and why does MoE get more capacity for fewer FLOPs?"
details:
  realistic_solution: 'Each token activates: shared attention layers (~6B params) + 2 of 8 FFN experts (~7B each, but each expert FFN is ~3.5B). Active params per token: ~13B. Per-token FLOPs are approximately equal to a dense 13B model, NOT a 47B model. But the model has 47B total parameters — more representational capacity (different inputs route to different experts, allowing specialization). The systems tradeoff: MoE gets 47B-quality at 13B-compute, but requires 47B of memory and introduces routing + AllToAll communication overhead.'
  common_mistake: |
    **The Pitfall:** Thinking Mixtral uses 47B parameters per token.
    **The Rationale:** Candidates are misled by the '8x7B' naming and fail to account for shared attention layers and active expert counts.
    **The Consequence:** They overestimate compute requirements and fail to understand the fundamental systems tradeoff of MoE (memory vs. compute).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense 47B: ~94 TFLOPs per token.
       - MoE 8x7B (Top-2): ~6B shared attention params + 2 × ~3.5B FFN params = ~13B active params.
       - Dense 13B: ~26 TFLOPs per token.
    2. **Calculations:**
       - MoE active FLOPs: 13B params × 2 FLOPs/param = ~26 TFLOPs/token.
       - MoE memory footprint: 47B params × 2 bytes = 94 GB.
       - Dense 13B memory: 13B × 2 bytes = 26 GB.
    3. **Conclusion & Interpretation:** **MoE computes like a 13B model (~26 TFLOPs) but requires the 94 GB memory footprint of a 47B model. Result: Memory-Capacity-Bound.**
