title: MoE Expert Replication for Hot Experts
scenario: Your production MoE serving cluster shows P99 latency spikes of 45ms against a 30ms SLA. Profiling reveals that 2 of 8 experts receive 40% of all tokens while the remaining 6 share 60%. The overloaded expert GPUs are the bottleneck.
question: How would you reduce P99 latency when 2 of 8 MoE experts receive 40% of tokens, and what hardware cost it adds?
details:
  realistic_solution: 'Replicate the 2 hot experts across additional GPUs. Currently: 8 GPUs with 1 expert each. Hot experts get 20% each (2.5× average load). Solution: replicate each hot expert onto 2 additional GPUs, total 12 GPUs. Each hot expert replica serves ~13.3% of tokens (40%/3 copies). Load per GPU drops from 20% to 13.3%, below the 12.5% uniform average. Cost: 4 extra GPUs (50% more hardware). Alternative: use expert parallelism to split hot experts across 2 GPUs each (EP=2 per hot expert), halving their compute time. This adds NVLink communication but avoids full GPU replication. DeepSeek-V3 uses dynamic expert replication in their serving infrastructure for exactly this reason.'
  common_mistake: |
    **The Pitfall:** Trying to fix routing at serving time by adding noise.
    **The Rationale:** Candidates think inference routing can be dynamically balanced to smooth out the load.
    **The Consequence:** Inference routing must be deterministic — you cannot change which experts a token selects without degrading quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 experts, 1 GPU each.
       - 2 hot experts receive 40% of tokens (20% each).
       - 6 cold experts receive 60% of tokens (10% each).
    2. **Calculations:**
       - Current imbalance ratio: 20% / 10% = 2x load on hot experts.
       - Add 2 replicas for each hot expert (4 new GPUs total).
       - New total GPUs: 8 + 4 = 12 GPUs. Cost increase = 4/8 = 50%.
       - New load per hot expert replica: 20% / 3 = 6.67%.
       - Max load drops from 20% to 10% (the cold experts are now the bottleneck).
    3. **Conclusion & Interpretation:** **~2x latency improvement at 50% cost increase (Compute-Bound on hot experts).**
