title: Tensor Core Dimension Alignment
scenario: You are evaluating two model architecture proposals for a high-throughput cloud API. Proposal A uses a hidden dimension of 1024 and a vocabulary size of 32,768. Proposal B trims dimensions to 1000 and 30,000 to precisely match the domain, reducing theoretical FLOPs and parameters by ~11%.
question: Should you deploy Proposal B with 1000/30000 dimensions, and how do Tensor Core alignment constraints affect it?
details:
  realistic_solution: Reject Proposal B. Tensor Cores require matrix dimensions to be multiples of 8 or 16 (for FP16) to operate efficiently. Unaligned dimensions force cuBLAS to dynamically pad matrices with zeros or fall back to significantly slower CUDA cores. The hardware executes the padded 1024/32768 dimensions anyway, consuming the same memory bandwidth and compute, but adds kernel overhead.
  common_mistake: |
    **The Pitfall:** Evaluating purely on theoretical FLOPs and parameter counts.
    **The Rationale:** It seems logical that smaller matrix dimensions will linearly decrease execution time.
    **The Consequence:** The model suffers a massive latency regression because unaligned memory accesses force the hardware to dynamically pad matrices or fall back to much slower CUDA cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor Cores require dimensions to be multiples of 8 or 16 for FP16.
       - Proposal B dims: 1000 (not a multiple of 8) and 30000 (multiple of 16).
       - Tensor Core FP16 Peak = 312 TFLOPS. CUDA Core FP16 Peak = 78 TFLOPS.
    2. **Calculations:**
       - Proposal B savings: 1 - ((1000^2) / (1024^2)) ≈ 4.6% reduction in theoretical FLOPs.
       - Unaligned dims (1000) cause fallback to CUDA cores.
       - Throughput degradation: 312 TFLOPS / 78 TFLOPS = 4x slower.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware Fallback Penalty.** The unaligned dimensions completely eliminate the 11% theoretical savings and cause a massive throughput drop.
