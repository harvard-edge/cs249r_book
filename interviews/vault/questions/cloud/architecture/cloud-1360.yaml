title: Tensor Core Dimension Alignment
scenario: You are evaluating two model architecture proposals for a high-throughput cloud API. Proposal A uses a hidden dimension of 1024 and a vocabulary size of 32,768. Proposal B trims dimensions to 1000 and 30,000 to precisely match the domain, reducing theoretical FLOPs and parameters by ~11%.
question: Should you deploy Proposal B with 1000/30000 dimensions, and how do Tensor Core alignment constraints affect it?
details:
  realistic_solution: Reject Proposal B until it has been benchmarked with production kernels. Tensor Core efficiency depends on tile size, dtype, layout, and kernel constraints; dimensions that are not friendly to those tiles can require padding or a less efficient kernel path. Proposal B's true theoretical reduction is much smaller than the claimed 11%, and any padding or lower Tensor Core utilization can erase that saving.
  common_mistake: |
    **The Pitfall:** Evaluating purely on theoretical FLOPs and parameter counts.
    **The Rationale:** It seems logical that smaller matrix dimensions will linearly decrease execution time.
    **The Consequence:** The model suffers a massive latency regression because unaligned memory accesses force the hardware to dynamically pad matrices or fall back to much slower CUDA cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor Cores require dimensions to be multiples of 8 or 16 for FP16.
       - Proposal B dims: 1000 (not a multiple of 8) and 30000 (multiple of 16).
       - Tensor Core efficiency depends on dtype, layout, and kernel tiling, not just the nominal dimension.
    2. **Calculations:**
       - Hidden-dimension savings: 1 - (1000 / 1024)^2 ≈ 4.6%.
       - Vocabulary projection savings: 1 - ((1000 * 30000) / (1024 * 32768)) ≈ 10.6%.
       - The end-to-end savings is workload-weighted across layers, so it is not automatically 11%.
       - The 1000-wide dimension is not a multiple of 8, so kernels may pad that dimension or choose a less efficient path.
    3. **Conclusion & Interpretation:**
       - **Result: Alignment Risk Dominates Small Savings.** Proposal B offers only modest theoretical savings, while Tensor Core tiling and padding effects can erase the gain or regress latency.
