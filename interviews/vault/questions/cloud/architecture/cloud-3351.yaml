title: Optimizing KV-Cache Memory on AMD MI300X for Large Language Models
scenario: 'You are deploying a 70-billion parameter LLM on an accelerator with 192 GB of HBM. The model uses FP16 precision for both weights and KV cache. Assume the model has 80 layers and a hidden dimension of 8192. The model weights consume 140 GB of HBM memory.'
question: 'What formula and maximum sequence length apply at batch size 8 before KV-cache OOM when 140 GB of the 192 GB HBM holds weights?'
details:
  realistic_solution: 'Calculate the available memory for KV cache. Use the KV cache formula to compute the per-token memory footprint across all layers. Solve for sequence length at the given batch size. To scale further, implement PagedAttention or KV-cache quantization.'
  common_mistake: |
    **The Pitfall:** Underestimating the KV-cache footprint by neglecting the factor of 2 for Key and Value tensors, or miscalculating FP16 byte sizes.
    **The Rationale:** Candidates often focus only on the hidden dimension and forget that autoregressive models cache both keys and values, or forget the 2 bytes/param of FP16.
    **The Consequence:** Memory capacity is over-promised, leading to predictable OOM crashes during long-sequence generation in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - HBM Available for KV: 192 GB - 140 GB = 52 GB.
       - Model: 80 layers, d_model = 8192, FP16 (2 bytes).
       - Scenario: Batch size = 8.
    2. **Calculations:**
       - KV per token/layer: 2 (K+V) × 8192 × 2 bytes = 32,768 bytes.
       - KV per token (all layers): 32,768 × 80 = 2,621,440 bytes (~2.5 MiB).
       - KV footprint at Batch Size 8: 2.5 MiB × 8 = 20 MiB/token.
       - Max Sequence Length (L): L × 20 MiB = 53,248 MiB (52 GiB).
       - L = 53,248 / 20 = 2662.4 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. The maximum sequence length before KV-cache OOM is ~2662 tokens at batch size 8.**
