title: 'MoE Inference Optimization on NVIDIA A100'
scenario: 'You are designing an inference system for a large Mixture of Experts (MoE) model comprising 16 experts, each a 10-billion parameter (FP16) feed-forward network. Your target hardware is a single GPU with 80 GB memory and 2.0 TB/s memory bandwidth. Assume each input token activates 2 experts.'
question: 'How would you configure expert parallelism and MoE routing to achieve high throughput and low latency under severe memory bandwidth constraints?'
details:
  realistic_solution: 'A realistic solution would involve a hybrid parallelism approach: store multiple experts (up to 4) on a single GPU. Employ dynamic MoE routing and intelligent load balancing to distribute tokens efficiently across active experts. Acknowledge that the 2.0 TB/s memory bandwidth is a more significant constraint than raw compute for sparse expert activations, necessitating careful memory management, weight compression, or speculative execution to overlap memory transfers.'
  common_mistake: |
    **The Pitfall:** Overemphasizing raw FLOPs while ignoring memory bandwidth limits for expert weights.
    **The Rationale:** Engineers see the massive compute capabilities of modern GPUs and assume compute is the primary constraint.
    **The Consequence:** The system vastly underperforms theoretical limits because the GPU is starved while waiting for expert weights to be shuttled in and out of HBM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 experts, 10B parameters each (FP16).
    - Single GPU with 80 GB memory and 2.0 TB/s bandwidth.
    - 2 experts active per token.

    **Calculations:**
    - Expert footprint: 10 billion parameters * 2 bytes/param (FP16) = 20 GB per expert.
    - Memory capacity: 80 GB GPU stores exactly 80 / 20 = 4 experts.
    - Active memory traffic: 2 experts require 40 GB of weight loads if not cached.
    - Bandwidth limit: Loading 40 GB at 2.0 TB/s takes 40 / 2000 = 0.02 seconds (20 ms).

    **Conclusion & Interpretation:**
    - **Result: 20 ms memory transfer latency (Memory-Bound)**. The system is severely memory-bound, necessitating advanced routing or weight streaming optimizations.
