title: MoE Sparse Upcycling from Dense Model
scenario: Your team has a well-trained dense 7B model. Rather than training an MoE from scratch, you propose 'sparse upcycling' — duplicating the FFN layers into 8 expert copies and training the router from scratch while fine-tuning.
question: What are the systems costs and expected quality tradeoffs of sparse upcycling a dense 7B model into an 8-expert MoE versus training from scratch?
details:
  realistic_solution: |
    Sparse upcycling (Komatsuzaki et al. 2023): Take a dense 7B model, duplicate each FFN into 8 copies (creating 8x7B = ~47B MoE), initialize a random router, and continue training. Systems costs: (1) Memory jumps from 14 GB to 94 GB weights (6.7x increase) — immediately requires multi-GPU serving. (2) Training: need expert parallelism setup (8 GPUs minimum vs 1 GPU for dense). (3) Continued training needed: typically 10-20% of original training tokens for experts to differentiate. At 2T original tokens: 200-400B additional tokens. (4) Training cost: 400B tokens x 6 x 13B active FLOPs = 3.12 x 10^22 FLOPs, vs from-scratch MoE at 2T tokens x 6 x 13B = 1.56 x 10^23 FLOPs. Upcycling cost is ~20% of from-scratch. Quality: upcycling reaches ~95% of from-scratch MoE quality. The 5% gap comes from experts starting identical — some redundancy persists. For many applications, this tradeoff (80% cost savings for 5% quality gap) is compelling.
  common_mistake: |
    **The Pitfall:** Assuming upcycling gives you "free" MoE quality instantly.
    **The Rationale:** Engineers overlook that duplicated experts start identically and require hundreds of billions of tokens to differentiate via routing.
    **The Consequence:** The team underestimates the fine-tuning budget and the massive 4x+ memory footprint jump required for serving the upcycled model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 7B weights = 14 GB.
    - Upcycled 8x7B weights = ~94 GB.
    - Training tokens needed: ~400B (20% of original).

    **Calculations:**
    - Upcycling compute: 400B tokens * 78 GFLOPs = 3.12e22 FLOPs.
    - From-scratch compute: 2T tokens * 78 GFLOPs = 1.56e23 FLOPs.
    - Cost ratio: 3.12e22 / 1.56e23 = 20%.

    **Conclusion & Interpretation:**
    - **Result: 80% compute saved, 6.7x VRAM increase (Memory-Bound)**. Upcycling saves immense compute while hitting ~95% quality, but instantly requires multi-GPU serving due to the huge footprint.
