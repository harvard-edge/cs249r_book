title: MoE Sparse Upcycling from Dense Model
scenario: Your team has a well-trained dense 7B model. Rather than training an MoE from scratch, you propose 'sparse upcycling' — duplicating the FFN layers into 8 expert copies and training the router from scratch while fine-tuning.
question: What are the systems costs and expected quality tradeoffs of sparse upcycling a dense 7B model into an 8-expert MoE versus training from scratch?
details:
  realistic_solution: |
    Sparse upcycling duplicates the FFN layers into 8 expert copies while keeping the non-FFN layers shared, so a 7B dense model becomes roughly a 47B total-parameter MoE with about 13B active parameters per token. Treat those as order-of-magnitude planning numbers, because the exact split depends on the architecture. Systems costs: (1) FP16 weight memory rises from about 14 GB to about 94 GB, a 6.7x increase, so serving usually needs sharding or offload plus room for activations and KV cache. (2) Training and serving need an MoE-capable layout with expert placement and all-to-all; the GPU count is configuration-dependent rather than a fixed 8-GPU minimum. (3) Continued training is still required so the router and duplicated experts specialize, often on the order of 10-20% of the original token budget. At 2T original tokens, that is 200-400B additional tokens. Using one consistent 6 x active-params training rule, the high end is 400B tokens x 6 x 13B active params = 3.12 x 10^22 FLOPs, versus 2T tokens x 6 x 13B = 1.56 x 10^23 FLOPs for training the MoE from scratch under the same active-FLOP model. Upcycling can save substantial compute, but quality may lag a from-scratch MoE because experts start identical and must differentiate during fine-tuning.
  common_mistake: |
    **The Pitfall:** Assuming upcycling gives you "free" MoE quality instantly.
    **The Rationale:** Engineers overlook that duplicated experts start identically and require hundreds of billions of tokens to differentiate via routing.
    **The Consequence:** The team underestimates the fine-tuning budget and the massive 4x+ memory footprint jump required for serving the upcycled model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 7B weights = about 14 GB in FP16/BF16.
    - Upcycled MoE total weights = rough estimate of 47B params, or about 94 GB FP16/BF16.
    - Active params per token = rough estimate of 13B.
    - Continued training tokens needed: ~200-400B (10-20% of a 2T-token original run).
    - Exact memory/GPU count depends on expert sharding, tensor parallelism, checkpointing, activations, KV cache, and optimizer-state layout.

    **Calculations:**
    - Total params: assume the dense 7B splits into ~1.3B shared non-FFN params and ~5.7B FFN params. Duplicating FFN into 8 experts gives 1.3B + 8 * 5.7B = 46.9B total.
    - FP16 weight memory: 47B * 2 bytes = 94 GB.
    - Memory ratio: 94 GB / 14 GB = 6.7x.
    - Consistent active-FLOP rule: per-token training compute ≈ 6 * 13B active params = 78B FLOPs = 78 GFLOPs.
    - Upcycling compute at high end: 400B tokens * 78B FLOPs/token = 3.12e22 FLOPs.
    - From-scratch compute under the same active-FLOP model: 2T tokens * 78B FLOPs/token = 1.56e23 FLOPs.
    - Cost ratio: 3.12e22 / 1.56e23 = 20%.

    **Conclusion & Interpretation:**
    - **Result: rough compute-memory tradeoff.** At the high end of the continued-training estimate, upcycling uses about 20% of from-scratch MoE training FLOPs under the same active-FLOP model, but increases FP16/BF16 weight memory by about 6.7x; quality and serving cost depend on how well the duplicated experts specialize and how the MoE is sharded.
