title: Evaluating GEMM Tiling Strategies on A100
scenario: You are designing a custom FP16 matrix multiplication (GEMM) kernel for a 16384x16384 layer on a GPU with 164KB max shared memory per SM. To maximize arithmetic intensity, a junior engineer proposes a massive 256x256 thread block tiling strategy, arguing it will minimize global memory reads compared to a standard 128x128 tile.
question: Is the proposed 256x256 FP16 GEMM tile viable, and what tile size should you use instead?
details:
  realistic_solution: Reject the 256x256 tile proposal as it strictly exceeds the hardware limits. Instead, adopt the 128x128 tile. A 128x128 tile consumes 64KB of shared memory, which safely fits within the 164KB limit and allows the SM to schedule two active thread blocks concurrently to effectively hide memory pipeline latency.
  common_mistake: |
    **The Pitfall:** Assuming that continually increasing tile size is always beneficial.
    **The Rationale:** Candidates focus entirely on maximizing arithmetic intensity without checking the strict physical hardware limits on SM shared memory capacity.
    **The Consequence:** Writing optimal-looking kernels that throw `cudaErrorInvalidConfiguration` at launch and fail to run entirely.
  napkin_math: |
    *   **For a 256x256 tile in FP16 (2 bytes):** 256 × 256 = 65,536 elements.
    *   65,536 × 2 bytes = 131,072 bytes (128KB) per matrix.
    *   For matrices A and B: 128KB × 2 = 256KB.
    *   256KB > 164KB limit, so the kernel will fail to launch.
    *   **For a 128x128 tile in FP16:** 128 × 128 = 16,384 elements.
    *   16,384 × 2 bytes = 32KB per matrix.
    *   For matrices A and B: 64KB.
    *   **Result: The 256x256 tile requires 256KB of shared memory and will fail to launch; a 128x128 tile uses 64KB and safely fits the 164KB limit.**
