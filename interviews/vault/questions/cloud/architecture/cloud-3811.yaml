title: 'Fine-Grained MoE: More Experts, Smaller Each'
scenario: 'A model uses a fine-grained MoE architecture with 160 experts, routing each token to the top 6 experts.'
question: 'At batch size 256, how many distinct experts should you expect to activate out of the 160?'
details:
  realistic_solution: 'E[distinct experts] = 160 × (1 - (154/160)^256) ≈ 160 (virtually all experts activated at batch=256 with 6 experts each).'
  common_mistake: |
    **The Pitfall:** Assuming fine-grained experts means drastically more parameters, or intuitively guessing a low number of activated experts.
    **The Rationale:** Candidates fail to apply basic probability to token routing at large batch sizes.
    **The Consequence:** Misestimating the All-to-All communication overhead and GPU memory bandwidth required for inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total experts: 160. Routing: Top 6.
       - Batch size: 256 tokens.
    2. **Calculations:**
       - Probability an expert is NOT selected by a single token = (1 - 6/160) = 154/160 = 0.9625.
       - Probability NOT selected by any of 256 tokens = 0.9625^256 = ~0.000056.
       - Expected distinct experts activated = 160 * (1 - 0.000056) = ~159.99.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound (Bandwidth)**. At batch=256 with top-6 routing, essentially all 160 experts are activated, maximizing All-to-All communication overhead.
