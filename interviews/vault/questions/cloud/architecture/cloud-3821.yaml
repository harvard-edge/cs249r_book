title: 'MoE Quantization: Expert-Level vs Layer-Level Calibration'
scenario: You quantize Mixtral 8x7B from FP16 to INT4 using GPTQ calibration. When you apply the same calibration dataset (1024 sequences) uniformly, experts that handle rare token types show much worse quality than experts handling common text. Per-expert perplexity varies from 3.1 to 8.7.
question: What went wrong with the uniform GPTQ calibration, and how do you fix the severe quality degradation in specialized experts?
details:
  realistic_solution: 'GPTQ calibrates quantization by analyzing activation distributions on calibration data. If an expert specializes in rare tokens, the quantizer sees an unrepresentative activation distribution and chooses poor scaling factors. Fix: Expert-level calibration using token distributions specifically routed to each expert. Additionally, use mixed precision per expert (e.g. INT8 for rare experts) to preserve specialized expert quality.'
  common_mistake: |
    **The Pitfall:** Using the exact same calibration data block for all experts in an MoE architecture.
    **The Rationale:** Candidates treat MoE layers like dense layers, forgetting that the router sends drastically different token distributions to different experts.
    **The Consequence:** Catastrophic quantization errors for specialized experts, causing the model to generate garbage when prompted with code or math.
  napkin_math: |
    **Assumptions & Constraints:**
    - Approximate expert weights: 8 experts * 5.8B parameters per expert.
    - INT4 uses 0.5 bytes per parameter before scale/metadata overhead.
    - INT8 uses 1.0 byte per parameter before scale/metadata overhead.
    - Mixed precision example: 4 experts INT4 and 4 specialized experts INT8.

    **Calculations:**
    - Uniform INT4 expert memory = 8 * 5.8B * 0.5 bytes = 23.2 GB plus quantization metadata.
    - Mixed precision memory = 4 * 5.8B * 0.5 + 4 * 5.8B * 1.0 = 11.6 GB + 23.2 GB = 34.8 GB plus metadata.
    - Extra memory for keeping 4 rare experts at INT8 = 34.8 GB - 23.2 GB = 11.6 GB.

    **Conclusion & Interpretation:**
    - **Result: mixed precision costs about 11.6 GB more expert-weight memory than uniform INT4**. The tradeoff is intentional: spend memory on rare, specialized experts whose calibration data is not well represented by the uniform sample.
