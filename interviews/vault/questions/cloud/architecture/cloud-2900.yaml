title: Evaluate MobileNetV3 vs EfficientNet-B0 accuracy-latency tradeoff for A100 batch serving
scenario: Your team must choose between MobileNetV3-Large (75.2% top-1, 0.22 GFLOPs) and EfficientNet-B0
  (77.1% top-1, 0.39 GFLOPs) for a cloud inference API. Both will run on A100 SXM4 with TensorRT INT8
  optimization. Requests come in batches of 64. Evaluate which model gives better cost per unit accuracy
  at your target SLA of 30 ms p99.
question: 'Which model gives better cost per unit accuracy under a 30 ms p99 A100 TensorRT INT8 SLA: MobileNetV3-Large
  or EfficientNet-B0?'
details:
  realistic_solution: 'Profile both with trtexec at INT8, batch=64. MobileNetV3-Large with H-swish (piecewise
    linear approximation) fuses well in TRT. EfficientNet-B0 Swish (sigmoid × x) is slower in TRT INT8
    unless approximated. Expected: MobileNetV3 ~1.8ms/batch, EfficientNet-B0 ~2.9ms/batch at batch=64
    INT8. Accuracy: EfficientNet-B0 is 1.9pp better. Decision: if accuracy delta matters, EfficientNet-B0
    still meets 30ms SLA with headroom. Cost: MobileNetV3 allows ~1.6× more throughput per GPU → lower
    cost per query.'
  common_mistake: '**The Pitfall:** Choosing based on raw FLOP count without TensorRT INT8 profiling.

    **The Rationale:** Both models have different layer compositions (H-swish activations in MobileNetV3,
    Swish/SiLU in EfficientNet-B0) that affect TRT kernel fusion differently.

    **The Consequence:** You might pick a model that looks computationally cheaper on paper but is actually
    slower in production due to poor kernel fusion.'
  napkin_math: '**Assumptions & Constraints:**

    - INT8 A100 compute: 624 TOPS.

    - MobileNetV3-Large: 0.22 GFLOPs.

    - EfficientNet-B0: 0.39 GFLOPs.

    - Batch size: 64.

    - Cost: $3/A100-hr.


    **Calculations:**

    - MobileNetV3 batch=64: 64 × 0.22G = 14.1 GOPS → 14.1G / 624T = 0.023ms compute (plus overhead).

    - EfficientNet-B0 batch=64: 64 × 0.39G = 25 GOPS → 25G / 624T = 0.04ms compute.

    - MobileNetV3 throughput: ~28,000 img/sec → 100.8M img/hr → $3 / 100.8M = $0.030/million queries.

    - EfficientNet-B0 throughput: ~17,000 img/sec → 61.2M img/hr → $3 / 61.2M = $0.049/million queries.

    - Cost ratio: 0.049 / 0.030 = 1.63x.


    **Conclusion & Interpretation:**

    - **Result: MobileNetV3 is more cost-effective.** EfficientNet-B0 costs 1.63x more for a 1.9pp accuracy
    gain, though both easily meet the 30ms SLA.'
