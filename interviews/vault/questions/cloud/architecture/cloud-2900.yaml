title: Evaluate MobileNetV3 vs EfficientNet-B0 accuracy-latency tradeoff for A100 batch serving
scenario: Your team must choose between MobileNetV3-Large (75.2% top-1, 0.22 GFLOPs) and EfficientNet-B0 (77.1% top-1, 0.39 GFLOPs) for a cloud inference API. Both will run on A100 SXM4 with TensorRT INT8 optimization. Requests come in batches of 64. Evaluate which model gives better cost per unit accuracy at your target SLA of 30 ms p99.
question: 'Which model gives better cost per unit accuracy under a 30 ms p99 A100 TensorRT INT8 SLA: MobileNetV3-Large or EfficientNet-B0?'
details:
  realistic_solution: |
    Profile both with trtexec at INT8, batch=64, and use measured batch latency rather than peak TOPS to decide. MobileNetV3-Large with H-swish can fuse well in TensorRT; EfficientNet-B0 may pay extra overhead for Swish/SiLU unless approximated, but both are far under a 30 ms p99 SLA in the assumed measurements. With measured latencies of 1.8 ms/batch for MobileNetV3-Large and 2.9 ms/batch for EfficientNet-B0, MobileNetV3 has lower cost per query and lower cost per top-1 accuracy point. EfficientNet-B0 buys a 1.9 percentage-point accuracy gain at about 1.6x serving cost, so choose it only if the product value of that accuracy gain exceeds the cost increase.
  common_mistake: |
    **The Pitfall:** Choosing based on raw FLOP count without TensorRT INT8 profiling.
    **The Rationale:** Both models have different layer compositions (H-swish activations in MobileNetV3, Swish/SiLU in EfficientNet-B0) that affect TRT kernel fusion differently.
    **The Consequence:** You might pick a model that looks computationally cheaper on paper but is actually slower in production due to poor kernel fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3-Large: 0.22 GFLOPs.
    - EfficientNet-B0: 0.39 GFLOPs.
    - Batch size: 64.
    - Cost: $3/A100-hr.
    - Measured TensorRT INT8 latency at batch=64: MobileNetV3-Large 1.8 ms/batch, EfficientNet-B0 2.9 ms/batch.

    **Calculations:**
    - MobileNetV3 throughput: 64 / 0.0018 s = 35,556 img/sec, before p99 headroom.
    - EfficientNet-B0 throughput: 64 / 0.0029 s = 22,069 img/sec, before p99 headroom.
    - With a 20% p99/headroom discount: MobileNetV3 ≈ 28,444 img/sec; EfficientNet-B0 ≈ 17,655 img/sec.
    - MobileNetV3 hourly volume: 28,444 * 3600 = 102.4M queries/hr; cost ≈ $3 / 102.4 = $0.029/million queries.
    - EfficientNet-B0 hourly volume: 17,655 * 3600 = 63.6M queries/hr; cost ≈ $3 / 63.6 = $0.047/million queries.
    - Cost ratio: 0.047 / 0.029 ≈ 1.6x. Incremental cost for EfficientNet-B0's +1.9pp top-1 is about $0.018 per million queries, or about $0.0095 per million queries per added accuracy point.

    **Conclusion & Interpretation:**
    - **Result: MobileNetV3 has better cost per unit accuracy under the stated measurements.** EfficientNet-B0 still meets the 30 ms SLA and may be justified if the 1.9pp accuracy gain is worth roughly 1.6x serving cost.
