title: Multi-Task LoRA Training with Gradient Conflict Resolution
scenario: 'A single LoRA adapter is trained simultaneously on 3 tasks: summarization, code generation, and QA. Training loss for code generation increases after step 500 while the other tasks improve. Gradient conflict analysis is needed.'
question: How would you diagnose and resolve gradient conflict when code generation loss rises after step 500 while summarization and QA improve?
details:
  realistic_solution: |
    Diagnose gradient conflict by computing cosine similarity between task gradients. If cos(g_code, g_summarization) < 0, they directly conflict. Resolve using PCGrad (Project Conflicting Gradients): dynamically project each task's gradient onto the orthogonal complement of conflicting gradients. This drastically reduces interference without requiring the massive serving memory overhead of a Mixture-of-LoRA-Experts (MoLoRA) architecture.
  common_mistake: |
    **The Pitfall:** Using simple gradient averaging across tasks and assuming the highest-loss task will eventually converge.
    **The Rationale:** Candidates assume standard multi-task learning naturally balances out, ignoring that tasks can possess gradients that point in direct mathematical opposition within the shared parameter space.
    **The Consequence:** The code generation task regresses entirely, leading to a deployed model that completely fails on one of its core capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tasks: 3 (Summarization, Code Gen, QA).
    - LoRA Parameters: 15M floats (e.g., r=8 on a 7B model).
    - Resolution Method: PCGrad (Project Conflicting Gradients).

    **Calculations:**
    - Unordered task pairs: 3 choose 2 = 3 pairs.
    - Dot product cost: 15M multiply-add units per pair, approximated as 15M FLOPs for this estimate.
    - Conflict detection cost: 3 pairs * 15M = 45M FLOPs/step.
    - If all pairs conflict, projection adds roughly two more vector operations per pair, so worst-case PCGrad vector work is about 3 * 45M = 135M FLOPs/step.
    - Forward Pass Compute: ~42B FLOPs for a 7B model.
    - Worst-case overhead ratio: 135M / 42B = 0.0032 = ~0.32%.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Small Overhead).** PCGrad adds roughly 0.1% for detection and up to ~0.3% vector-work overhead in the all-conflict case, making it a low-cost first fix before considering separate adapters or a MoLoRA serving design.
