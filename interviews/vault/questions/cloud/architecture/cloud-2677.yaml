title: Compute Cost of Adding Network Depth
scenario: 'A 10-layer CNN processes 224x224 images in 8ms. Each layer has the same architecture: 256 filters, 3x3 conv, stride 1. Adding 5 more layers (to 15 total) increases representational power.'
question: How much do inference time and parameter count increase when adding 5 identical 256-filter 3×3 layers to the 10-layer CNN?
details:
  realistic_solution: 'Each identical conv layer has 256 × 256 × 3 × 3 + 256 = 590,080 parameters, or about 590K. The original 10-layer model therefore has about 5.9M parameters. Adding 5 layers adds 5 × 590K = 2.95M parameters, for a new total of 8.85M parameters. That is a 50% parameter increase over the original 5.9M, not an 8.85M-parameter increase. Under the assumption that the added layers have the same spatial resolution, channel count, and runtime cost as the existing layers, inference time scales linearly with layer count: 8ms × 15/10 = 12ms.'
  common_mistake: |
    **The Pitfall:** Assuming adding layers always improves performance proportionally.
    **The Rationale:** Beyond a certain depth, gradients vanish and additional layers hurt training unless skip connections are used.
    **The Consequence:** Wasting compute on deeper networks that perform worse than shallower ones.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original CNN: 10 layers, 8ms inference time.
    - Each layer: 256 filters, 3x3 conv, stride 1.
    - Input resolution: 224x224.
    - Adding 5 identical layers (50% increase).
    - Per-layer runtime is treated as approximately constant; activation-memory and cache effects are ignored.

    **Calculations:**
    - Parameters per identical layer: (256 * 256 * 3 * 3) + 256 = 590,080 (~590K).
    - Total new parameters: 5 * 590K = 2.95M.
    - Total original parameters: 10 * 590K = 5.9M.
    - Layer increase ratio: 15 / 10 = 1.5x.
    - Estimated inference time: 8ms * 1.5 = 12ms.

    **Conclusion & Interpretation:**
    - **Result: 12ms inference and 8.85M total parameters.** The added 2.95M parameters are a 50% increase over the original 5.9M, and inference time rises by 50% under the identical-layer linear-scaling assumption.
