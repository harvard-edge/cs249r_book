title: 'Cloud Inference Accelerator Selection L3 0'
scenario: 'Compare serving a 7B model on: (A) 1 A100, and (B) 1 AWS Inferentia2 chip. At batch=1 the workload is memory-bound, and at batch=64 it is compute-bound.'
question: 'What is the cost per 1K tokens on A100 versus Inferentia2 at batch 1 and batch 64?'
details:
  realistic_solution: 'For autoregressive decoding at batch=1, the system is fundamentally memory-bandwidth bound. Throughput scales directly with hardware bandwidth (A100 ~2000 GB/s vs Inf2 ~800 GB/s), leading to similar cost-per-token since A100 is ~2.5x faster but ~2.6x more expensive. At batch=64, the workload transitions above the hardware ridge point and becomes compute-bound. Here, we evaluate pure FLOPs. A100 delivers 312 TFLOPS vs Inf2''s 190 TFLOPS. Inf2 provides ~60% of A100 compute at ~38% of the price, making it highly cost-effective for large-batch serving.'
  common_mistake: |
    **The Pitfall:** Comparing only FLOPS and ignoring bandwidth.
    **The Rationale:** Candidates assume high FLOPS directly translates to faster inference across all batch sizes.
    **The Consequence:** They incorrectly estimate costs at low batch sizes because they fail to realize that autoregressive decoding at batch=1 is purely bounded by memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model requires 14 GB (FP16).
    - A100: $2/hr, 312 TFLOPS, ~2000 GB/s bandwidth.
    - Inf2: $0.76/hr, 190 TFLOPS, ~800 GB/s bandwidth.

    **Calculations:**
    - Batch=1 (Memory-bound):
      - A100: 2000 / 14 = 143 tok/s. Cost = $2 / (143 * 3.6) = $0.00389 per 1K tokens.
      - Inf2: 800 / 14 = 57 tok/s. Cost = $0.76 / (57 * 3.6) = $0.0037 per 1K tokens.
    - Batch=64 (Compute-bound):
      - FLOPs per token = 2 * 7B = 14 GFLOP.
      - A100: 312e12 / 14e9 = 22,286 tok/s. Cost = $2 / (22,286 * 3.6) = $0.000025 per 1K tokens.
      - Inf2: 190e12 / 14e9 = 13,571 tok/s. Cost = $0.76 / (13,571 * 3.6) = $0.0000155 per 1K tokens.

    **Conclusion & Interpretation:**
    - **Result: A100 is ~$0.0039, Inf2 is ~$0.0037 at batch 1; A100 is $0.000025, Inf2 is $0.0000155 at batch 64 (Memory-Bound vs Compute-Bound)**. Cost at batch 1 is comparable (~$0.0037-$0.0039 per 1K). At batch 64, Inferentia2 is ~1.6x cheaper.
