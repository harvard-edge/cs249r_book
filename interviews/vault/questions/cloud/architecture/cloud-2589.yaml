title: A100 vs Inferentia2 Cost per 1K Tokens at Batch 1 and 64
scenario: 'Compare serving a 7B model on: (A) 1 A100, and (B) 1 AWS Inferentia2 chip. At batch=1, profiling shows memory-bound throughput of 100 tok/s on A100 and 40 tok/s on Inf2. At batch=64, assume compute-bound utilization of 35% of A100 peak and 45% of Inf2 peak.'
question: What is the cost per 1K tokens on A100 versus Inferentia2 at batch 1 and batch 64?
details:
  realistic_solution: For autoregressive decoding at batch=1, use measured serving throughput rather than dividing raw bandwidth by model size. The profiled A100 is 2.5x faster than Inf2, but it is about 2.6x more expensive, so the batch-1 cost per token is similar. At batch=64, the prompt assumes the workload has crossed into a compute-bound regime, so use effective FLOPs after utilization rather than peak TFLOPS alone. Under these idealized assumptions, Inf2 is cheaper for large-batch serving because it provides enough effective compute at a much lower hourly price. Real production cost still depends on compiler support, batching, attention overhead, and achieved utilization.
  common_mistake: |
    **The Pitfall:** Comparing only FLOPS and ignoring bandwidth.
    **The Rationale:** Candidates assume high FLOPS directly translates to faster inference across all batch sizes.
    **The Consequence:** They incorrectly estimate costs at low batch sizes because they fail to realize that autoregressive decoding at batch=1 is purely bounded by memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model requires 14 GB (FP16).
    - A100: $2/hr, 312 TFLOPS, ~2000 GB/s bandwidth.
    - Inf2: $0.76/hr, 190 TFLOPS, ~800 GB/s bandwidth.
    - Batch=1 throughput comes from profiling: A100 100 tok/s, Inf2 40 tok/s.
    - Batch=64 effective compute utilization: A100 35%, Inf2 45%.

    **Calculations:**
    - Batch=1 (Memory-bound):
      - A100: cost = $2 / (100 tok/s * 3600 s/hr) * 1000 = $0.0056 per 1K tokens.
      - Inf2: cost = $0.76 / (40 tok/s * 3600 s/hr) * 1000 = $0.0053 per 1K tokens.
    - Batch=64 (Compute-bound):
      - Use a conservative serving estimate of ~6 FLOPs per parameter per generated token to cover dense forward work plus decode overhead: 6 * 7B = 42 GFLOP/token.
      - A100 effective throughput = 0.35 * 312e12 / 42e9 = 2,600 tok/s. Cost = $2 / (2,600 * 3600) * 1000 = $0.000214 per 1K tokens.
      - Inf2 effective throughput = 0.45 * 190e12 / 42e9 = 2,036 tok/s. Cost = $0.76 / (2,036 * 3600) * 1000 = $0.000104 per 1K tokens.

    **Conclusion & Interpretation:**
    - **Result: A100 is ~$0.0056, Inf2 is ~$0.0053 at batch 1; A100 is ~$0.000214, Inf2 is ~$0.000104 at batch 64.** These are idealized estimates from the stated throughput and utilization assumptions, not exact production serving costs.
