title: Sequence Model for Session-Based Recommendation Serving Latency
scenario: A session-based recommendation system uses a 4-layer Transformer on session histories (up to 200 items). Average session length is 50 items. Session encoding adds 15ms to serving latency (vs 2ms for simpler session features).
question: Is a 15ms Transformer session encoder justified over 2ms session features, and what serving architecture would you choose?
details:
  realistic_solution: 'Latency-quality tradeoff analysis: (1) Quality uplift: Transformer session encoder typically improves ranking NDCG by 1-3% vs MLP on session features in production. (2) Serving latency cost: 15ms for Transformer vs 2ms for MLP on session. Additional 13ms = 13% of a 100ms SLO. (3) Throughput impact: at 5K QPS, with batching, serving node processes requests with ~75 GPU-seconds/sec demand. Cost: 75 GPUs × $3/hr = $225/hr = $5,400/day. (4) Alternative: pre-compute Transformer session encoding offline for each active session. Update every 30 seconds (rolling). At serving: 2ms lookup (pre-computed session embedding). Quality: 30-second staleness vs 13ms latency savings. For most sessions (>30 sec intervals between requests), pre-compute is equivalent to online. (5) Decision: use pre-computed session embeddings. Same quality, 15ms → 2ms serving latency. Only compute online for first request of new session.'
  common_mistake: |
    **The Pitfall:** Evaluating the Transformer session encoder purely on offline metrics.
    **The Rationale:** Ignoring serving latency costs and the opportunity cost of the latency budget.
    **The Consequence:** Deploying a model that degrades the user experience and spikes inference hardware costs.
  napkin_math: |
    - **Serving demand**: 5K QPS * 15ms / 1000 = 75 GPU-sec/sec.
    - **Transformer FLOPs**: (24*seq*d² + 4*seq²*d) * layers = (78.6M + 2.56M) * 4 = 324.6M FLOPs.
    - **Compute time**: 324.6M / 989T = 0.00033ms.
    - **Overhead breakdown**: Tokenization (1ms) + embedding lookup (5ms) + attention (0.33ms) + Python overhead (~9ms).
    - **Result**: **Pre-computing saves ~13ms by eliminating non-compute overheads.**
