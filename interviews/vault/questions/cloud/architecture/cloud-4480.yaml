title: Sequence Model for Session-Based Recommendation Serving Latency
scenario: A session-based recommendation system uses a 4-layer Transformer on session histories (up to 200 items). Average session length is 50 items. Session encoding adds 15ms to serving latency (vs 2ms for simpler session features).
question: Is a 15ms Transformer session encoder justified over 2ms session features, and what serving architecture would you choose?
details:
  realistic_solution: |
    Latency-quality tradeoff analysis: (1) Measure whether the Transformer improves online ranking enough to spend 13ms of serving latency over the 2ms feature path. Offline NDCG alone is insufficient. (2) Pure online inference is freshest but expensive: 5K QPS * 15ms is 75 request-seconds/sec of encoder work before batching effects, plus tail-latency risk. (3) Pure 30-second pre-computation is cheap at serving time, but it is not equivalent to online encoding for active sessions; recent clicks, scrolls, or watches can change the session embedding and ranking quality. (4) Preferred architecture: use a hybrid design. Cache session embeddings with short TTLs, update incrementally when new events arrive, compute online for first requests or stale/high-value sessions, and fall back to the 2ms feature path when the encoder queue would violate the SLO. (5) Decision: deploy the Transformer only if A/B tests show quality lift after accounting for freshness loss and added serving cost; otherwise keep the simpler feature path.
  common_mistake: |
    **The Pitfall:** Evaluating the Transformer session encoder purely on offline metrics.
    **The Rationale:** Ignoring serving latency costs and the opportunity cost of the latency budget.
    **The Consequence:** Deploying a model that degrades the user experience and spikes inference hardware costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 5K QPS.
    - Latency options: 15ms online Transformer vs 2ms simpler session features.
    - GPU count depends on measured batched throughput, not latency alone.
    **Calculations:**
    - Extra latency per request: 15ms - 2ms = 13ms.
    - Aggregate online encoder work: 5,000 req/s * 0.015s = 75 request-seconds/sec before batching.
    - If caching/incremental updates cover 80% of requests, online encoder work drops to 1,000 req/s * 0.015s = 15 request-seconds/sec.
    - Staleness risk: a 30-second refresh can miss all events that occur between refreshes, so it must be evaluated against online quality.
    **Conclusion & Interpretation:**
    - Result: A hybrid cache plus incremental update path captures much of the 13ms latency savings without assuming stale embeddings have identical quality.
