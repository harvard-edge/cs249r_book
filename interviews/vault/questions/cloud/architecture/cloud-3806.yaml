title: 'MoE FLOP Efficiency: Why Sparse Models Train Faster'
scenario: A dense 175B model requires 3.5 × 10^23 FLOP to train (Chinchilla scaling). An MoE model with 1.6T total parameters but 175B active per token achieves similar quality.
question: How do per-token and same-quality training FLOPs compare for the 1.6T MoE versus the dense 175B model?
details:
  realistic_solution: Separate two comparisons. For the same number of training tokens, FLOPs per token scale with active parameters, so a dense 175B model and a 1.6T MoE with 175B active parameters both use about 6 × 175B = 1.05 TFLOP/token. There is no per-token FLOP saving versus the dense 175B model. For the same target quality, the larger total MoE capacity may reduce the number of tokens or optimization steps needed; if the empirical gain is 2-4×, then the MoE would use 3.5e23 / 2 to 3.5e23 / 4 = 1.75e23 to 0.875e23 FLOP. The tradeoff is storing all 1.6T parameters and paying routing/All-to-All overhead.
  common_mistake: |
    **The Pitfall:** Computing FLOP requirements based on total parameters (1.6T) instead of active parameters (175B).
    **The Rationale:** In standard dense models, FLOPs scale with total parameters. Candidates forget that MoE only routes tokens to top-k experts.
    **The Consequence:** Overestimating the compute budget for MoE training by an order of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 175B: 3.5e23 total training FLOP.
    - MoE 1.6T: 175B active parameters per token.

    **Calculations:**
    - Dense 175B FLOPs/token = 6 * 175B = 1.05 TFLOP.
    - MoE (175B active) FLOPs/token = 6 * 175B = 1.05 TFLOP.
    - For the same token count, total FLOPs are approximately equal because active parameters are equal.
    - If same-quality convergence needs 2x to 4x fewer FLOPs, total MoE FLOPs = 3.5e23 / 2 to 3.5e23 / 4 = 1.75e23 to 0.875e23.

    **Conclusion & Interpretation:**
    - **Result: Equal per-token FLOPs, possible same-quality savings.** The MoE does not save FLOPs per token versus dense 175B, but it may use about 2-4x fewer total FLOPs to reach comparable quality if the empirical scaling benefit holds.
