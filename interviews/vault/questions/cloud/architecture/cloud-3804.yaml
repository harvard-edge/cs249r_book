title: 'Expert Parallelism + Tensor Parallelism: Hybrid MoE Training'
scenario: You train a 1.6T parameter MoE model (128 experts, top-2) on 256 MI300X GPUs. Each expert has 12.5B parameters (FP16 = 25 GB). A single MI300X can hold ~6 experts in memory with room for activations.
question: How would you combine expert parallelism, tensor parallelism, and data parallelism for the 1.6T-parameter MoE on 256 MI300X GPUs?
details:
  realistic_solution: 'Use a coherent 8-way data-parallel layout, where each DP replica spans 32 GPUs and contains one full copy of the 128 experts. Inside each 32-GPU replica, use expert parallelism with 4 full experts per GPU: 4 × 25 GB = 100 GB of expert weights, leaving roughly 92 GB on a 192 GB MI300X for shared weights, optimizer shards, activations, and routing buffers. Use tensor parallelism for the dense/shared attention blocks within each 8-GPU node (TP=8), while MoE experts are expert-parallel rather than tensor-parallel because each 25 GB expert fits on one GPU. Across the full 256 GPUs this gives DP=8, EP group size=32 GPUs per replica, and TP=8 for dense blocks within each replica node group. Token dispatch All-to-All stays within each 32-GPU EP group; gradients for replicated dense blocks and replicated expert sets are synchronized across the 8 DP replicas.'
  common_mistake: |
    **The Pitfall:** Putting exactly one expert per GPU (EP=128) and using the remaining 128 GPUs for DP.
    **The Rationale:** It seems like a clean, logical 1:1 mapping of experts to hardware.
    **The Consequence:** This severely under-utilizes each GPU's memory and creates massive, unnecessary All-to-All network traffic across 128 GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 MI300X GPUs, 192 GB HBM each.
    - 128 experts, 25 GB per expert, top-2 routing.
    - One DP replica uses 32 GPUs and processes a local microbatch of 8192 tokens per MoE layer.
    - Hidden size is 8192, FP16 activations, 16 MoE layers, 50 GB/s conservative inter-node bandwidth.

    **Calculations:**
    - Expert weights per full model copy: 128 × 25 GB = 3.2 TB.
    - Expert placement: 4 experts/GPU × 32 GPUs = 128 experts per DP replica.
    - Memory per GPU for experts: 4 × 25 GB = 100 GB, leaving about 92 GB on a 192 GB MI300X.
    - Data parallelism: 256 GPUs / 32 GPUs per replica = 8 DP replicas.
    - Average routed assignments per GPU per MoE layer: 8192 tokens × top-2 / 32 GPUs = 512 token activations.
    - All-to-All payload per GPU per direction: 512 × 8192 × 2B ≈ 8 MiB.
    - Send plus receive per MoE layer is about 16 MiB; across 16 MoE layers that is about 256 MiB per GPU.
    - Lower-bound transfer time: 256 MiB / 50 GB/s ≈ 5.4 ms, before collectives overhead and contention.

    **Conclusion & Interpretation:**
    - **Result: Hybrid EP/TP/DP layout.** DP=8, EP=32 GPUs per replica with 4 experts/GPU, and TP=8 for dense blocks gives a memory-feasible layout with routed traffic bounded to each EP group.
