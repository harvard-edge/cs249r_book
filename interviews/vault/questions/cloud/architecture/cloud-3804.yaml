title: 'Expert Parallelism + Tensor Parallelism: Hybrid MoE Training'
scenario: You train a 1.6T parameter MoE model (128 experts, top-2) on 256 MI300X GPUs. Each expert has 12.5B parameters (FP16 = 25 GB). A single MI300X can hold ~6 experts in memory with room for activations.
question: How would you combine expert parallelism, tensor parallelism, and data parallelism for the 1.6T-parameter MoE on 256 MI300X GPUs?
details:
  realistic_solution: 'Strategy: (1) Group experts: place 4 experts per GPU (100 GB weights, leaving 92 GB for KV cache/activations). Need 128/4 = 32 GPUs for one full expert set. (2) Within each expert, no TP needed (12.5B fits on one GPU easily). (3) DP = 256/32 = 8 data-parallel replicas. Configuration: EP_groups = 32 GPUs each, DP = 8. Communication: All-to-All within each EP group of 32 GPUs for token routing. AllReduce across 8 DP replicas for gradient sync. All-to-All for 32 GPUs with 256 tokens × top-2 × 8192d × 2B = ~8 MB per MoE layer per GPU. With 8 nodes of 8 GPUs: place EP group across 4 nodes (inter-node traffic). Optimization: use Infinity Fabric (intra-node) for TP on shared attention layers (TP=8) and InfiniBand for EP across nodes. This separates bandwidth-intensive TP from latency-tolerant EP communication.'
  common_mistake: |
    **The Pitfall:** Putting exactly one expert per GPU (EP=128) and using the remaining 128 GPUs for DP.
    **The Rationale:** It seems like a clean, logical 1:1 mapping of experts to hardware.
    **The Consequence:** This severely under-utilizes each GPU's memory and creates massive, unnecessary All-to-All network traffic across 128 GPUs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1.6T MoE (128 experts), MI300X GPUs.
    2. **Calculations:**
       - Model Size: 128 experts × 25 GB = 3.2 TB total.
       - Expert Placement: 4 experts/GPU × 32 GPUs = one full model copy.
       - Data Parallelism: 256 GPUs / 32 GPUs = 8 DP replicas.
       - All-to-All Volume: 256 tokens × 2 experts × 8192 dim × 2 bytes ≈ 8 MB per layer per GPU.
       - Total Traffic: 16 MoE layers × 2 directions = 256 MB per GPU.
       - Network Latency: 256 MB / 50 GB/s (400 Gbps IB) = ~5.1 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Grouping 4 experts per GPU maximizes VRAM utilization and limits All-to-All latency to ~5.1 ms.**
