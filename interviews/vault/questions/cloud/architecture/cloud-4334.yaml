title: Embedding Dimension Selection and Capacity
scenario: You have a catalog of 100M items and must choose an embedding dimension for the item embedding table. The table must fit in 512 GB of GPU HBM across a cluster.
question: What maximum item embedding dimension fits in 512 GB for 100M FP32 items, and what dimension would you choose using intrinsic dimensionality?
details:
  realistic_solution: 'Storage: 100M items × dim × 4 bytes (FP32) = dim × 400 MB. At 512 GB, the hard capacity limit is 512 GB / 400 MB = 1280 dimensions. With 20% memory headroom, the practical capacity ceiling is 409.6 GB / 400 MB = 1024 dimensions, but that is still a capacity ceiling, not the recommended dimension. Intrinsic dimensionality argues for a much smaller embedding: log₂(100M) ≈ 27 is a rough scale for identifying many items with binary-like codes, not a proof that all pairwise relationships or orthogonal separation fit in 27 dimensions. In recommender systems, 64 or 128 dimensions is a practical starting point; choose 64-dim if the catalog signal is moderate and memory/latency matter, or 128-dim if offline validation shows meaningful lift. A 64-dim table uses 100M × 64 × 4 = 25.6 GB, leaving most HBM for other tables and model components.'
  common_mistake: |
    **The Pitfall:** Choosing the largest dimension that fits the hardware budget (e.g., 1024).
    **The Rationale:** Assuming embedding quality scales linearly with vector size.
    **The Consequence:** Wasting hundreds of gigabytes of HBM for literally zero performance gain, starving other model components.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Catalog: 100M items. Precision: FP32 (4 bytes).
       - Memory Budget: 512 GB HBM.
    2. **Calculations:**
       - Storage per dimension = 100M * 4 bytes = 400 MB.
       - Max dimension (hard capacity limit) = 512 GB / 400 MB = 1280.
       - Max dimension with 20% headroom = 409.6 GB / 400 MB = 1024.
       - 64-dim table size = 100M * 64 * 4 bytes = 25.6 GB.
       - 128-dim table size = 100M * 128 * 4 bytes = 51.2 GB.
       - log2(100,000,000) ≈ 27 is only a rough scale for item identity, not a guarantee about pairwise preference geometry.
    3. **Conclusion & Interpretation:**
       - **Result: 64-Dim Practical Choice (Capacity-Aware).** The hard maximum is 1280 dimensions, but intrinsic-dimensionality and recommender heuristics support starting at 64 dims and validating 128 dims before spending HBM on larger vectors.
