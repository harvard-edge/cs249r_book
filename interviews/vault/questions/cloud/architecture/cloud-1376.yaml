title: Three-Tier Retail Video Analytics
scenario: |
  You are architecting a retail analytics pipeline for 50 stores. Each store has 100 battery-powered camera nodes (ARM Cortex-M4, 1MB SRAM) connected via low-bandwidth Wi-Fi (10 Mbps shared) to a local edge server (Jetson AGX Orin, 32GB RAM). The cloud backend (AWS L4 GPUs) runs a heavy 3D-CNN for behavioral anomaly detection. Sending raw 720p 15FPS video from 100 cameras requires ~150 Mbps, far exceeding both the local Wi-Fi and the store's internet uplink (20 Mbps).
question: How would you partition compute across the Cortex-M4 cameras, Jetson edge server, and cloud to meet all network constraints while maximizing camera battery life?
details:
  realistic_solution: |
    Deploy a hierarchical cascade: Keep cameras mostly asleep and use a sparse wake/sampling loop on the Cortex-M4 with a 300KB TinyML person detector (Tier 1). Only on person events should a camera briefly stream low-rate frames or thumbnails to the Jetson. At the edge, the Jetson Orin runs a YOLO tracker (Tier 2) to form 112x112 bounding box crop sequences and suppress duplicate/background frames. Finally, transmit only these compact action crops to the Cloud L4 instances for the final 3D-CNN behavioral classification (Tier 3).
  common_mistake: |
    **The Pitfall:** Attempting to stream all compressed video to the edge server, or trying to run the heavy 3D-CNN directly on the edge server.
    **The Rationale:** Misjudging the compute-to-bandwidth tradeoff and the limited capacity of both the local Wi-Fi and the edge server's hardware.
    **The Consequence:** Saturated local 10 Mbps Wi-Fi, drained camera batteries, and overloaded edge compute, causing the entire pipeline to fail.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Local Wi-Fi: 10 Mbps. Store uplink: 20 Mbps.
       - 100 cameras, raw video = 1.5 Mbps each (150 Mbps total).
       - Tier 1 keeps cameras duty-cycled and only opens brief event streams on detected human presence; use 5% active cameras as the design target from store occupancy measurements.
       - Event streams are capped at about 1.5 Mbps per active camera after low-rate compression; Tier 2 sends compact 112x112 action-crop sequences at about 200 Kbps per active camera.
    2. **Calculations:**
       - Raw video from cameras to edge: 150 Mbps, which fails the 10 Mbps shared Wi-Fi.
       - Tier 1 camera filtering and duty cycling: 5 active event streams * 1.5 Mbps = 7.5 Mbps to the Jetson, which fits the 10 Mbps Wi-Fi budget and avoids continuous radio use on inactive cameras.
       - Tier 2 edge cropping/tracking: 5 active cameras * 200 Kbps = 1.0 Mbps of action crops.
       - Tier 3 cloud uplink: 1.0 Mbps of action crops, which fits the 20 Mbps internet uplink.
       - Across 50 stores, the cloud receives about 50 Mbps of action crops instead of 7.5 Gbps of raw camera video.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound Mitigation.** The cascade keeps local Wi-Fi at 7.5 Mbps and cloud uplink at 1.0 Mbps, so both network constraints are met while camera nodes only run the lightweight TinyML gate.
