title: Three-Tier Retail Video Analytics
scenario: >
  You are architecting a retail analytics pipeline for 50 stores. Each store has 100 battery-powered camera nodes (ARM Cortex-M4, 1MB SRAM) connected via low-bandwidth Wi-Fi (10 Mbps shared) to a local edge server (Jetson AGX Orin, 32GB RAM). The cloud backend (AWS L4 GPUs) runs a heavy 3D-CNN for behavioral anomaly detection. Sending raw 720p 15FPS video from 100 cameras requires ~150 Mbps, far exceeding both the local Wi-Fi and the store's internet uplink (20 Mbps).
question: >
  How would you partition compute across the Cortex-M4 cameras, Jetson edge server, and cloud to meet all network constraints while maximizing camera battery life?
details:
  realistic_solution: |
    Deploy a hierarchical cascade: Run a 300KB TinyML person-detection model on the Cortex-M4 (Tier 1) to only stream frames when a human is present. At the edge, the Jetson Orin runs a YOLO tracker (Tier 2) to extract 112x112 bounding box crop sequences of customer actions. Finally, transmit only these small action crops to the Cloud L4 instances for the final 3D-CNN behavioral classification (Tier 3).
  common_mistake: |
    **The Pitfall:** Attempting to stream all compressed video to the edge server, or trying to run the heavy 3D-CNN directly on the edge server.
    **The Rationale:** Misjudging the compute-to-bandwidth tradeoff and the limited capacity of both the local Wi-Fi and the edge server's hardware.
    **The Consequence:** Saturated local 10 Mbps Wi-Fi, drained camera batteries, and overloaded edge compute, causing the entire pipeline to fail.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Local Wi-Fi: 10 Mbps. Store uplink: 20 Mbps.
       - 100 cameras, raw video = 1.5 Mbps each (150 Mbps total).
    2. **Calculations:**
       - Raw Video: 150 Mbps (Fails 10 Mbps Wi-Fi).
       - Tier 1 Filtering (Camera): 5% active (humans present) -> 5 * 1.5 Mbps = 7.5 Mbps (Fits 10 Mbps Wi-Fi).
       - Tier 2 Cropping (Edge): Jetson extracts 112x112 sequences -> ~200 Kbps per active camera.
       - Tier 3 Uplink: 5 active * 200 Kbps = 1.0 Mbps.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound Mitigation.** 1.0 Mbps is well under the 20 Mbps uplink constraint, enabled by pushing lightweight compute to the edge.
