title: 'MoE Granularity: Few Large vs Many Small Experts'
scenario: 'You are designing a 1T-parameter MoE model. Option A: 8 experts of 125B parameters each (Mixtral-style coarse-grained). Option B: 256 experts of ~4B parameters each (DeepSeek-V3-style fine-grained), selecting top-8. Both have ~1T total and similar active FLOPs.'
question: How would you evaluate the systems tradeoffs between 8x125B coarse experts and 256x4B top-8 fine-grained experts?
details:
  realistic_solution: 'Option A (8x125B): each expert is about 250 GB in BF16, so a single expert does not fit on one 80GB H100 and needs tensor parallelism across several GPUs. Coarse experts mean fewer possible routed destinations, but each selected expert is expensive to place, shard, replicate, and rebalance; load imbalance on one coarse expert is severe. Option B (256x4B): each expert is about 8 GB in BF16 and can fit on one GPU, so placement and replication are much easier. Top-8 routing touches more distinct experts per token, increasing routing metadata and all-to-all fanout, but the messages are distributed across smaller experts and load balancing is more flexible. The tradeoff is coarse-grained simplicity versus fine-grained placement, replication, specialization, and balance.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on model quality.
    **The Rationale:** Candidates know fine-grained experts yield better quality, but ignore the deep systemic implications of tensor parallel constraints, communication fanout, and serving overhead.
    **The Consequence:** Designing an architecture that is impossible to serve efficiently or requires massive all-to-all communication overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A (8x125B).
    - Option B (256x4B).

    **Calculations:**
    - Option A total expert weights = 8 * 125B params * 2 bytes = 2 TB.
    - Option A per-expert weight size = 125B * 2 bytes = 250 GB, so one expert needs tensor parallelism or offload on 80GB GPUs.
    - Option B total expert weights = 256 * 4B params * 2 bytes = about 2 TB.
    - Option B per-expert weight size = 4B * 2 bytes = 8 GB, so an expert can fit on one GPU.
    - With top-8 routing, Option B sends each token to 8 expert destinations; this increases routing fanout, but each destination is a small independently placeable expert.

    **Conclusion & Interpretation:**
    - **Result: Same total expert memory, different serving bottlenecks.** Coarse experts stress per-expert memory and TP; fine-grained experts reduce per-expert placement pressure but increase routing fanout and scheduling complexity.
