title: 'Shared vs Routed Experts: DeepSeek''s Hybrid Architecture'
scenario: DeepSeek-V2 uses a hybrid architecture with 2 shared experts (always active for every token) and 160 routed experts (top-6 selected per token).
question: "Why include 2 shared experts alongside 160 routed experts, and what systems benefits does this hybrid MoE design provide?"
details:
  realistic_solution: 'Modeling benefits: (1) Shared experts capture universal patterns that every token needs, without consuming routing slots. (2) Provide a residual pathway if routing fails. Systems benefits: (1) Communication: shared experts process tokens locally on each GPU with no All-to-All. Only the 6 routed experts require token dispatch. With 2 shared experts on every GPU, the All-to-All volume is heavily reduced. (2) Load balancing: shared experts handle baseline computation, so load imbalance among routed experts is less impactful. (3) Memory: shared expert weights are replicated on every GPU, avoiding the all-expert-loading problem.'
  common_mistake: |
    **The Pitfall:** Thinking shared experts are just "always-on routed experts."
    **The Rationale:** Candidates fail to understand the communication topology implications of MoE, missing that shared experts do not participate in routing decisions.
    **The Consequence:** Misunderstanding the primary systems benefit of the architecture, which is the massive reduction in All-to-All communication volume.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Without Shared Experts: 8 routed experts (top-8).
       * With Shared Experts: 2 shared + 160 routed (top-6).
    2. **Calculations:**
       * All-to-All per token (without shared) = 8 messages.
       * All-to-All per token (with shared) = 6 messages.
       * Communication Savings = (8 - 6) / 8 = 25% reduction.
    3. **Conclusion & Interpretation:** **Result: 25% Payload Reduction (Network-Bound)**. Local compute for shared experts incurs zero communication overhead, heavily reducing network pressure.
