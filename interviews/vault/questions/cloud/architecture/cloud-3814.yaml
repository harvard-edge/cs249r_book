title: 'Shared vs Routed Experts: DeepSeek''s Hybrid Architecture'
scenario: DeepSeek-V2 uses a hybrid architecture with 2 shared experts (always active for every token) and 160 routed experts (top-6 selected per token).
question: Why include 2 shared experts alongside 160 routed experts, and what systems benefits does this hybrid MoE design provide?
details:
  realistic_solution: 'Modeling benefits: (1) Shared experts capture universal patterns that every token needs, without consuming routing slots. (2) They provide a stable baseline path if routing is noisy. Systems benefits: (1) Communication: shared experts are replicated or placed locally and process every token without routed All-to-All. Only the 6 routed experts require token dispatch, so routed communication is lower than an 8-routed-expert design. (2) Load balancing: shared experts handle baseline computation, so imbalance among routed experts is less damaging. (3) Memory: shared expert weights are replicated separately from the routed expert pool; this trades some replicated memory for less routed traffic.'
  common_mistake: |
    **The Pitfall:** Thinking shared experts are just "always-on routed experts."
    **The Rationale:** Candidates fail to understand the communication topology implications of MoE, missing that shared experts do not participate in routing decisions.
    **The Consequence:** Misunderstanding the primary systems benefit of the architecture, which is the massive reduction in All-to-All communication volume.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline comparison: 8 routed experts selected per token.
    - Hybrid design: 2 shared experts are always active locally plus 6 routed experts selected per token.

    **Calculations:**
    - Total expert compute per token in the hybrid design is 2 shared + 6 routed = 8 expert computations.
    - Routed All-to-All fanout without shared experts: 8 routed expert transfers per token.
    - Routed All-to-All fanout with shared experts: 6 routed expert transfers per token.
    - Routed communication reduction = (8 - 6) / 8 = 25%.

    **Conclusion & Interpretation:**
    - **Result: 25% fewer routed transfers, not 25% less total expert compute.** Shared experts move universal computation local while top-6 routing reduces only the routed All-to-All portion.
