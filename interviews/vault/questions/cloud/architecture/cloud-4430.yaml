title: 'LoRA Target Module Selection: Q/K/V/O vs All Linear Layers'
scenario: A team fine-tuning Mistral 7B for classification debates whether to apply LoRA to only Q and V projections (standard practice) versus all linear layers including MLP.
question: For Mistral 7B classification, how many LoRA parameters do Q+V-only versus all-linear targeting add, and what are the performance implications?
details:
  realistic_solution: 'LoRA module selection for Mistral 7B: standard (Q+V only): W_q and W_v matrices \times 32 layers. All-linear (Q,K,V,O,gate,up,down): 7 matrices \times 32 layers. Memory scaling: ~6\times more params for all-linear. For classification tasks, the final MLP layers are most task-critical, so adding LoRA to MLP is more valuable than for generation tasks. Research finding: for classification and extraction tasks, Q+V+down_proj covers 90%+ of performance of all-linear at ~50% the parameter count. For generation/instruction-following: Q+V+up_proj captures attention-MLP interaction. Ablation test: start with Q+V, measure validation performance, add MLP matrices, check if improvement exceeds 0.5% practical significance threshold.'
  common_mistake: |
    **The Pitfall:** Assuming that applying LoRA to all layers universally improves performance.
    **The Rationale:** Engineers fall into a 'more parameters equals better accuracy' trap, forgetting that attention mechanisms alone often capture sufficient task-relevant transformations.
    **The Consequence:** They unnecessarily inflate the training memory footprint and gradient compute times by 6x without achieving any proportional lift in model quality.
  napkin_math: |
    **Assumptions & Constraints:**
    - Q+V Only: W_q and W_v across 32 layers.
    - All-Linear: Adds W_k, W_o, W_{gate}, W_{up}, W_{down}.

    **Calculations:**
    - Q+V Only: 106,496 params/layer * 32 = 3.41M.
    - All-Linear Attention: + 212,992/layer = + 6.82M.
    - All-Linear MLP: + 147,456 * 3 * 32 = + 14.15M.
    - Total All-Linear: 6.82M + 14.15M = 20.97M params.

    **Conclusion & Interpretation:**
    - **Result: All-linear requires ~6.1x more parameters**. Yielding trivial memory difference but 6.1x longer gradient compute times.
