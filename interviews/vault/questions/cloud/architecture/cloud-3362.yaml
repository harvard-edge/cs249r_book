title: Optimizing MoE Routing on NVIDIA A100 for Extreme Scale
scenario: 'Your team is deploying a massive Mixture of Experts (MoE) model with 128 experts, each requiring approximately 40GB of activation memory. The model is hosted on a cluster of NVIDIA A100 GPUs. The routing mechanism directs tokens to two experts per layer. You are observing significantly lower throughput than anticipated (50 tokens/sec vs. 200 tokens/sec).'
question: 'What bottlenecks explain the 50 vs. 200 tokens/sec MoE throughput on A100s, and how would you quantify and mitigate them?'
details:
  realistic_solution: |
    Implement dynamic expert load balancing techniques (e.g., auxiliary loss for balancing, Jitter-gate, or expert capacity throttling), optimize the routing algorithm to minimize cross-node communication for selected experts, and employ techniques like expert data parallelism where experts are replicated across devices for higher availability and reduced remote access. Leverage A100's high memory bandwidth for efficient local gather/scatter operations and consider strategies to keep frequently accessed expert data closer to compute. Quantify the impact by profiling expert utilization, communication overhead, memory pressure per expert, and router decision latency.
  common_mistake: |
    **The Pitfall:** Overlooking the devastating tail latency introduced by poor load balancing and assuming uniform token distribution across all 128 experts.
    **The Rationale:** Engineers assume that average-case routing evenly spreads compute across the cluster, missing that MoE models naturally exhibit severe hotspots where popular experts are overwhelmed while others sit idle.
    **The Consequence:** The cluster achieves a fraction of its theoretical throughput, bottlenecked by a single overloaded GPU, while massive amounts of cross-node bandwidth are saturated transferring tokens to that hotspot.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 experts. 40GB memory footprint per expert.
    - Hardware: A100 (80GB HBM2e). Max 2 experts per GPU.
    - Routing: 2 experts per token. Target SLA: 200 tokens/sec.

    **Calculations:**
    - Storage constraint: 128 experts / 2 per GPU = Minimum 64 A100s required just for expert capacity.
    - Imbalance impact: If 10% of experts handle 50% of the traffic, effective parallel capacity plummets.
    - Network overhead: Routing to a remote expert requires 1MB of activation transfer per token.
    - Bandwidth demand = 200 tok/sec × 2 experts × 1MB = 400 MB/s of sustained cross-node traffic per request stream.

    **Conclusion & Interpretation:**
    - **Result: Load-Imbalance and Network Bound**. The 50 tok/sec degradation is caused by un-throttled routing hotspots and network saturation. Implementing dynamic expert capacity limits and auxiliary balancing losses is strictly required.
