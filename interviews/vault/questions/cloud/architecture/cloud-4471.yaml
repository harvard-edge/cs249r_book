title: Real-Time Embedding Table Update Consistency Under Training
scenario: A recommendation system trains continuously on real-time user events and publishes updated embeddings to serving every 1 minute. During the 1-minute update window, serving and training use different embedding versions. Design a consistency model.
question: What consistency model would you use when training publishes embedding updates every minute but serving may lag?
details:
  realistic_solution: 'Eventual consistency model with version tagging: (1) Training writes to a ''shadow'' embedding table, not the live table. (2) At the 1-minute publish boundary: training atomically copies updated rows to a publish buffer with a new version timestamp V+1. (3) Serving nodes periodically poll for new version: ''GET /embeddings/version'' returns current version. If V+1 available: serving nodes download the delta (updated rows only) in the background. (4) Serving continues using V until it has fully loaded V+1. Hot-swap to V+1 after local download completes (1-2 seconds for delta download). (5) During hot-swap gap: serving uses V (60 second staleness max). Training was always using V, so training and serving are consistent within one version. (6) Feature logging consistency: log the embedding version used for each request alongside features. Enable offline A/B analysis of version effects.'
  common_mistake: |
    **The Pitfall:** Using a two-phase commit protocol to synchronize training and serving on each update.
    **The Rationale:** Two-phase commit adds 10-50ms latency to every update, creates tight coupling between training and serving systems.
    **The Consequence:** Can cause serving stalls if the training coordinator is slow.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M items with 64 float32 dimensions.
    - 1% of rows change per 1-minute publish interval.
    - Download at 1 Gbps (125 MB/s).

    **Calculations:**
    - Delta size: 0.01 * 10M rows * 64 dims * 4B = 25.6MB.
    - Download time: 25.6MB / 125MB/s = 0.205s.
    - Atomic hot-swap time is negligible compared with download.
    - End-to-end staleness can approach the 60-second publish interval plus about 0.2s download if serving observes an update just after the previous publish.
    - Cross-node version skew during rollout is about the download/swap window, not the full publish interval.

    **Conclusion & Interpretation:**
    - **Result: use versioned eventual consistency with up to about 60.2s staleness and a short rollout skew window.** Serving may lag by one publish interval, while individual nodes should have at most two adjacent versions in flight during the approximately 0.2s delta download and swap.
