title: MoE Checkpointing Overhead at Scale
scenario: Your 671B-parameter MoE model trains on 2048 H100 GPUs with expert parallelism. You need to checkpoint every 15 minutes for fault tolerance (Young-Daly optimal).
question: What checkpoint size, write time, and nonblocking strategy are needed to checkpoint the 671B MoE every 15 minutes?
details:
  realistic_solution: 'Checkpoint size: 671B params * (2B weights + 12B optimizer) = 671B * 14B = 9.4 TB total, distributed across 2048 GPUs (~4.6 GB per GPU shard). A full synchronous write to a 100 GB/s parallel filesystem takes about 9.4 TB / 100 GB/s = 94 seconds, or 10.4% of a 15-minute interval, so the checkpoint path must be nonblocking. Stage each GPU shard asynchronously to pinned host memory (~4.6 GB / 64 GB/s = 72 ms), flush node-local shards to NVMe in parallel (8 GPUs/node gives ~36.7 GB per node; at 51.2 GB/s that is ~0.72 s), then drain the durable local checkpoint to the shared filesystem in the background while training continues. Incremental or dirty-expert checkpoints are useful only when paired with a consistent base checkpoint and metadata that can reconstruct a full restart image.'
  common_mistake: |
    **The Pitfall:** Computing checkpoint size using only the model weights.
    **The Rationale:** Engineers often forget that the optimizer state (like Adam) requires significantly more memory than the weights themselves.
    **The Consequence:** Underestimating the checkpoint payload by ~6x, leading to saturated network links and devastating training stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 671B params. Checkpoint includes weights (2 bytes) and Adam optimizer (12 bytes).
       - Hardware: 2048 H100 GPUs, 8 GPUs/node = 256 nodes. Node NVMe write at 51.2 GB/s per node.
       - PCIe Gen5 transfer: 64 GB/s.
       - Shared filesystem aggregate write bandwidth: 100 GB/s.
    2. **Calculations:**
       - Weights memory = 671e9 * 2 bytes = ~1.34 TB.
       - Optimizer memory = 671e9 * 12 bytes = ~8.05 TB.
       - Total Checkpoint = 1.34 TB + 8.05 TB = ~9.4 TB.
       - Shard per GPU = 9.4 TB / 2048 = 4.59 GB.
       - GPU to CPU memory copy time = 4.59 GB / 64 GB/s = ~72 ms.
       - Per-node staged data = 4.59 GB * 8 GPUs = 36.7 GB.
       - Local NVMe stage time = 36.7 GB / 51.2 GB/s = ~0.72 s per node.
       - Shared filesystem full-drain time = 9.4 TB / 100 GB/s = ~94 s.
    3. **Conclusion & Interpretation:** **A nonblocking checkpoint stages shards quickly to host/NVMe and drains ~9.4 TB to the shared filesystem asynchronously, keeping the training stall near the staging cost rather than the 94-second filesystem write.**
