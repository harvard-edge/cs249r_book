title: 140B PEFT Comparison for 10K Enterprise Examples
scenario: Your team must fine-tune a 140B parameter model on a 10K example dataset for a specialized enterprise task. Full fine-tune requires 48xH100. Compare LoRA, (IA)^3, and prefix tuning on memory efficiency, performance, and training time.
question: For a 140B model and 10K examples, how do LoRA, (IA)^3, and prefix tuning compare on memory, performance, and training time?
details:
  realistic_solution: 'Full fine-tuning is the baseline but is impractical here: it trains all 140B parameters, needs the stated 48xH100 class setup, and has the highest overfitting risk on only 10K examples. LoRA r=16 is usually the strongest PEFT quality baseline and trains quickly on far less memory than full fine-tuning, but it still exposes tens of millions of trainable parameters and should use validation, dropout, and early stopping. (IA)^3 trains only per-channel scaling vectors, so it has the smallest memory footprint and fastest training; it is a good first choice when the enterprise task is narrow and the dataset is small, but may underperform LoRA if the task requires new transformations. Prefix tuning can be competitive for generation style control, but it increases prompt/KV-cache length at inference and is less attractive for latency-sensitive serving. Recommendation: start with (IA)^3 for the 10K-example narrow task, benchmark LoRA r=8 or r=16 as the quality backstop, and
    avoid full fine-tuning unless PEFT validation fails.'
  common_mistake: |
    **The Pitfall:** Selecting LoRA by default without checking the dataset-size and serving tradeoffs.
    **The Rationale:** It's the most popular PEFT method in the ecosystem.
    **The Consequence:** LoRA may still be the best-quality PEFT choice, but on 10K examples it can add more trainable capacity than the task needs and can waste memory or overfit unless validated against lighter methods such as (IA)^3.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 140B model, 10K examples, about 120 transformer layers with hidden size d=12,288.
       - LoRA target for comparison: Q and V projections at rank r=16.
       - (IA)^3 target for comparison: K, V, and FFN channel scaling vectors.
       - Prefix tuning comparison: 32 virtual tokens with learned K/V prefixes per layer.
    2. **Calculations:**
       - LoRA params = 120 layers * 2 matrices * 2*d*r = 120 * 2 * 2 * 12,288 * 16 = 94.4M trainable params.
       - (IA)^3 params = 120 layers * 3 vectors * 12,288 = 4.4M trainable params.
       - Prefix params = 120 layers * 32 prefix tokens * 2 K/V tensors * 12,288 = 94.4M trainable params, plus extra KV-cache work at inference.
       - Full fine-tuning trains 140B params, about 280GB of BF16 weights before gradients and optimizer state.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Capacity Tradeoff.** (IA)^3 is about 21x smaller than this LoRA setup and fastest to train, while LoRA is the stronger quality backstop; prefix tuning has similar trainable scale to LoRA under these assumptions but carries serving overhead.
