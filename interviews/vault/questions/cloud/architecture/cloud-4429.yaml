title: PEFT Strategy Selection for 100B+ Models at Cloud Scale
scenario: Your team must fine-tune a 140B parameter model on a 10K example dataset for a specialized enterprise task. Full fine-tune requires 48xH100. Compare LoRA, (IA)^3, and prefix tuning on memory efficiency, performance, and training time.
question: For a 140B model and 10K examples, how do LoRA, (IA)^3, and prefix tuning compare on memory, performance, and training time?
details:
  realistic_solution: 'Method comparison for 140B model with 10K examples: (1) LoRA (r=16): Risk: may overfit with 10K examples. (2) (IA)^3: ~1M adapter params. Better regularization for small datasets. (3) Prefix tuning: inference overhead: prefixes add to KV cache for every request. Recommendation: (IA)^3 for 10K dataset.'
  common_mistake: |
    **The Pitfall:** Selecting LoRA by default without evaluating parameter scale.
    **The Rationale:** It's the most popular PEFT method in the ecosystem.
    **The Consequence:** Severe overfitting on small datasets (10K examples) due to LoRA introducing tens of millions of trainable parameters.
  napkin_math: |
    1. **Assumptions & Constraints:** 140B model, 10K dataset. LoRA r=4 (~120 layers, d=8192). (IA)^3 parameters.
    2. **Calculations:** LoRA params = 2 (matrices) × 120 layers × 8192 dim × 4 rank × 2 (K+V) = ~15.7M trainable parameters. (IA)^3 params = 3 (vectors) × 120 layers × 8192 dim = 2.95M trainable parameters.
    3. **Conclusion & Interpretation:** **Result: (IA)^3 has 5x fewer params, preventing overfitting. Model-Capacity-Bound.**
