title: Weight-Stationary vs Output-Stationary Accelerator Dataflow
scenario: An accelerator designer describes their chip as using a 'weight-stationary dataflow.'
question: What is weight-stationary dataflow, when is it advantageous, and how does it differ from output-stationary dataflow?
details:
  realistic_solution: |
    In weight-stationary dataflow, weights are loaded into local registers or scratchpad and held near the processing elements while input activations stream through. This reduces weight movement when the same weights are reused across many activations or batches. In output-stationary dataflow, the partial sums for each output stay local until accumulation finishes, while weights and inputs are streamed through the PE array. The difference is which tensor is kept stationary: weight-stationary minimizes weight traffic, while output-stationary minimizes partial-sum traffic and writeback.
  common_mistake: |
    **The Pitfall:** Assuming weight-stationary is always best.
    **The Rationale:** For small models with large batch sizes, input traffic dominates.
    **The Consequence:** Output-stationary can be more efficient because it minimizes partial sum accumulation traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Matrix multiply C = A x W.
    - Weight matrix W: 1024x1024 FP16 (2 bytes/param).
    - Batch of input activations A: 64x1024 FP16.
    - Output C: 64x1024 FP16.

    **Calculations:**
    - Weight size: 1024 * 1024 * 2B = 2 MB.
    - Input batch size: 64 * 1024 * 2B = 128 KB.
    - Output/partial-sum size: 64 * 1024 * 2B = 128 KB.
    - Weight-stationary pays to keep/reuse the 2 MB weights locally and streams the 128 KB inputs for each batch.
    - Output-stationary keeps the 128 KB of output partial sums local and streams weights/inputs as needed to finish those outputs.

    **Conclusion & Interpretation:**
    - **Result: Data-Movement-Bound**. Weight-stationary is advantageous when weight reuse dominates; output-stationary is advantageous when avoiding partial-sum movement dominates.
