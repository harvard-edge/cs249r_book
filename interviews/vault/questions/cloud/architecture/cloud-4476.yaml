title: 'RecSys Cold Start: New Item Embedding Initialization'
scenario: A recommendation system adds 10K new items per day to a catalog of 10M items. New items have no interaction history and their embeddings are randomly initialized. Consequently, new items receive 3x fewer recommendations than comparable established items for the first 7 days.
question: How would you fix the cold-start embedding initialization to prevent new items from losing 3x impressions during their first 7 days?
details:
  realistic_solution: Use content-based embedding initialization as the primary fix. Encode each new item from metadata such as category, title, description, tags, thumbnails, or other available content with a pretrained text/image encoder, then map that content vector into the recommender item-embedding space with a projection MLP trained on warm items that already have both content features and learned collaborative embeddings. At ingest time, initialize the new item with the projected embedding instead of random weights, then let normal online or batch training refine it as interactions arrive. If content is missing, use a category centroid as a fallback, but the release fix is the learned content-to-item-embedding projection because it gives new items semantically meaningful neighbors before they have clicks.
  common_mistake: |
    **The Pitfall:** Warming up new item embeddings using the global average of all items.
    **The Rationale:** Candidates assume placing the item in the "center" of the embedding space is a safe neutral ground.
    **The Consequence:** The new item embedding lacks any meaningful semantic features, leading to poor nearest-neighbor matches and terrible early recommendations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M item catalog, 10K new items/day, 7-day cold-start window, and 10M total impressions/day.
    - Simple uniform-share estimate: absent cold start, items in the new-item window receive impressions in proportion to catalog share.
    - New items receive 3x fewer impressions than comparable established items.

    **Calculations:**
    - New items in 7-day window: 70K items (0.7% of 10M catalog).
    - Estimated fair-share impressions: 10M/day * 0.7% = 70K/day.
    - Actual impressions (3x penalty): 0.7% / 3 ~ 0.233%.
    - Loss fraction: 0.7% - 0.233% = 0.467%.
    - Missed impressions per day: 10M * 0.467% = 46.7K.
    - Missed impressions over a full 7-day window: 46.7K/day * 7 = 326.9K.

    **Conclusion & Interpretation:**
    - **Result: the current cold-start penalty costs roughly 46.7K impressions/day, or 326.9K over a 7-day window under the uniform-share assumption.** Content-based initialization should be evaluated by how much of that measured loss it recovers.
