title: 'Personalization at Scale: Per-User LoRA vs Prompt Engineering'
scenario: A consumer product has 10 million users and wants personalized LLM behavior.
question: At what scale does each approach break down when comparing per-user LoRA adapters vs long system prompt personalization?
details:
  realistic_solution: |
    Long system prompts work immediately for sparse users because they need no training data, but they break down when the personalization state becomes large enough to consume meaningful context, add latency/cost, or conflict with task instructions. Per-user LoRA breaks down at the opposite end: users with few interactions do not provide enough signal to train a reliable adapter, and frequent per-user retraining can become an operations bottleneck. For power users with roughly hundreds to thousands of useful interactions, small adapters can be storage-efficient and fast to load, but a 10M-user product should use prompts or retrieval for sparse users and reserve LoRA for users with enough data and update cadence to justify training.
  common_mistake: |
    **The Pitfall:** Assuming per-user LoRA is infeasible at 10M users strictly due to storage costs.
    **The Rationale:** Engineers overestimate the storage overhead of low-rank adapters and fail to realize the true bottleneck is the lack of per-user training data.
    **The Consequence:** Dismissing LoRA prematurely for power users, or attempting to train LoRA models on sparse users without enough interaction data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M users.
    - Rank-4 adapter ≈ 3.3 MB.
    - Storage cost: $0.023/GB/month.
    - S3 load speed: 500 MB/s.

    **Calculations:**
    - Total storage: 10M × 3.3 MB = 33 TB.
    - Storage cost: 33,000 GB × $0.023 ≈ $759/month.
    - Load latency: 3.3 MB / 500 MB/s = 6.6 ms.

    **Conclusion & Interpretation:**
    - **Result: Data-Bound**. At 10M rank-4 adapters, storage and cold-load size are manageable in this rough model, but training data and update operations are the practical LoRA breakpoints; prompt personalization instead breaks down as prompt state grows enough to hurt context, latency, and cost.
