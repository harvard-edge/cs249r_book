title: 'MoE Inference Latency: The Expert Loading Problem'
scenario: You deploy Mixtral 8×7B on a single GPU. In INT4 quantization, the model fits. At batch size 1, each token activates 2 experts. Profiling shows decode latency is 12ms/token vs 8ms/token for a dense 13B model at the same quantization. Both are memory-bandwidth bound.
question: Using 3.35 TB/s HBM3 bandwidth, what is the dense 13B INT4 weight-read lower bound for batch-1 decode latency?
details:
  realistic_solution: 'H100 HBM3 bandwidth: 3.35 TB/s. Dense 13B INT4 base time: 6.5GB/3.35TB/s = 1.94ms.'
  common_mistake: |
    **The Pitfall:** Thinking the MoE router computation adds significant latency.
    **The Rationale:** The router is a tiny linear layer (hidden_dim → num_experts) that takes microseconds. The issue is purely memory bandwidth.
    **The Consequence:** Wasting time optimizing the MoE router kernel instead of improving memory access patterns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense 13B model in INT4.
       - HBM3 bandwidth: 3.35 TB/s.
       - INT4 weights: 0.5 bytes per parameter.
    2. **Calculations:**
       - 13B parameters × 0.5 bytes = 6.5 GB.
       - Theoretical minimum decode latency = 6.5 GB / 3350 GB/s = 0.00194 seconds.
    3. **Conclusion & Interpretation:** **The absolute lower bound is 1.94 ms/token. Memory-Bandwidth-Bound.**
