title: The Attention Cost Explosion
scenario: We're deploying a model that supports 128k context. Users love it, but our serving costs are 10\times higher than the 4k-context version, and P99 latency is through the roof. The model has the same number of parameters.
question: Why does 32x more context cost 10x more to serve, and what are our architectural options?
details:
  realistic_solution: "Standard self-attention is $O(n^2)$ in both compute and memory with respect to sequence length. Going from 4k to 128k tokens is a 32\times increase in $n$, which means a $32^2 = 1024\times$ increase in attention FLOPs and materialized attention memory. End-to-end serving cost rises less than 1024x because weights, MLPs, batching, cache reuse, and fixed overheads do not all scale quadratically, but attention becomes the dominant latency driver. Three architectural mitigations exist, each with different trade-offs: (1) **FlashAttention** — eliminates the $O(n^2)$ materialized memory by tiling to SRAM, but compute is still $O(n^2)$; it buys you memory headroom, not compute savings. (2) **Sliding window / local attention** — reduces to $O(n \times w)$ where $w$ is the window size, but sacrifices global context; tokens beyond the window are invisible. (3) **Sparse attention with global sentinel tokens** — most tokens attend locally, but a small set of global tokens attend\
    \ to everything, preserving long-range dependencies at sub-quadratic cost."
  common_mistake: |
    **The Pitfall:** Believing that "Context length only affects KV-cache memory, so we just need more VRAM."
    **The Rationale:** Focusing purely on the memory footprint of the sequence without considering the quadratic scaling of the attention computation itself.
    **The Consequence:** Adding VRAM solves the OOM but completely fails to fix the P99 latency explosion caused by the $O(n^2)$ FLOPs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model config: 32 heads, 80 layers, 128 head_dim.
    - Comparing 4k vs 128k context length (a 32x increase).

    **Calculations:**
    - 4k Tokens FLOPs: Attention FLOPs per layer per head = 2 \times 4096^2 \times 128 = 4.3 GFLOPs.
    - 128k Tokens FLOPs: 2 \times 131072^2 \times 128 = 4.4 TFLOPs (a 1024x increase).
    - 128k Memory: Hypothetical materialized attention matrix at 128k in FP16 = 131072^2 \times 2 bytes = 34,359,738,368 bytes = 34.36 GB = 32 GiB per head per layer.
    - Total materialized attention matrix storage = 32 heads \times 80 layers \times 32 GiB = 81,920 GiB = 80 TiB.
    - Local Attention: With a sliding window of w = 4096, attention FLOPs drop back to 2 \times 131072 \times 4096 \times 128 = 137 GFLOPs per layer per head.

    **Conclusion & Interpretation:**
    - **Result: Quadratic Attention Cost.** Materializing full attention would require about 80 TiB of theoretical attention matrices, which FlashAttention avoids by tiling and recomputing without removing the O(n^2) compute. Sliding-window attention changes the algorithmic compute and memory scaling to O(n*w), reducing the 128k attention example by about 32x versus full 128k attention when w=4096. The observed 10x serving-cost increase is an end-to-end effect after mixing this attention blowup with non-attention work.
