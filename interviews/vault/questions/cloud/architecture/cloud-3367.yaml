title: 'TPU v5e Optimization: Encoder-Decoder Tradeoffs for Mixed Workloads'
scenario: Your company is developing a new AI-powered content generation and analysis platform. You currently use a monolithic encoder-decoder transformer model for both text generation (summarization, translation) and text classification (sentiment, topic extraction). The current inference costs are prohibitive, and you've been tasked with optimizing for deployment on Google TPU v5e.
question: Which architecture would you recommend for optimizing performance and cost on the TPU v5e, and why?
details:
  realistic_solution: 'A strong solution would propose a hybrid or split approach: utilizing an encoder-only model (e.g., BERT-like) for classification and analysis tasks to leverage higher batch sizes and lower latency, and a smaller, highly optimized decoder-only model (e.g., Llama-variant) for generation. The solution should emphasize optimizing model quantization (e.g., BF16, int8) to fit within the strict 16 GB HBM, exploiting TPU''s matrix multiplication units, and maximizing throughput with careful batching strategies. It would also detail how to partition the workload if a single model is still desired, potentially using a ''mixture of experts'' or conditional execution to reduce active parameter count per task.'
  common_mistake: |
    **The Pitfall:** Failing to differentiate the distinct inference patterns of generation vs. classification.
    **The Rationale:** Candidates treat the encoder-decoder as a single monolithic block without splitting workloads based on batch size and auto-regressive constraints.
    **The Consequence:** Proposing solutions that exceed memory capacity or underutilize compute, leading to unoptimized latency and wasted costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: TPU v5e with 16 GB HBM.
    - Monolithic decoder-capable model: 7B parameters in BF16 = 14 GB resident weights.
    - Example KV cache shape: 32 layers, 32 KV heads, d_head=128, BF16.

    **Calculations:**
    - Weight residency leaves about 16 GB - 14 GB = 2 GB for KV cache, activations, compiler buffers, and runtime overhead.
    - KV cache per generated token = 2 (K,V) * 32 layers * 32 heads * 128 values * 2 bytes ≈ 0.5 MB.
    - A 2 GB residual budget holds at most about 2 GB / 0.5 MB ≈ 4096 aggregate cached tokens before accounting for activations and runtime buffers.

    **Conclusion & Interpretation:**
    - **Result: Memory-capacity pressure.** The 7B monolith can keep weights resident, but it leaves little practical headroom for context length and batching. A split workload with smaller encoder-only classification models and a compact decoder for generation is more cost-efficient on TPU v5e.
