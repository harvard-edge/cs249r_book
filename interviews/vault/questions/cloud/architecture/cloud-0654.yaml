title: The NCCL NVLink Deadlock
scenario: You are running Data Parallel training on a single 8-GPU DGX node. GPU 0 crashes due to a faulty memory bank. You rewrite the host script to exclude GPU 0 and launch the job on GPUs 1 through 7. The job starts, but the NCCL AllReduce immediately hangs indefinitely.
question: Why does a 7-GPU topology fail and hang on a DGX machine?
details:
  realistic_solution: 'NCCL AllReduce algorithms assume a specific number of participants that matches the physical NVLink topology. The DGX NVLink mesh is wired as a fully-connected graph among 8 GPUs. Removing GPU 0 breaks the ring; GPU 7''s port that connected to GPU 0 is now a dead link. NCCL tries to route through it, gets no response, and hangs waiting for the missing peer. The fix: replace the faulty GPU or force NCCL_ALGO=TREE with explicit topology exclusion.'
  common_mistake: |
    **The Pitfall:** Assuming batch size indivisibility or simple tensor shape errors caused the crash.
    **The Rationale:** Engineers default to software-level tensor bugs when facing distributed errors on odd GPU counts.
    **The Consequence:** Wasting hours debugging PyTorch scripts, failing to realize the physical hardware NVLink topology has been irrevocably broken.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8-GPU DGX node. NVLink Mesh: 900 GB/s. PCIe Gen4: ~31.5 GB/s.
       - Workload: 7-GPU degraded topology fallback.
    2. **Calculations:**
       - Standard 8-GPU NVLink Transfer: ~20 ms.
       - CPU PCIe Gen4 Fallback Transfer: ~560 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware Topology Deadlock.** Removing a GPU severs the rigid physical NVLink mesh. NCCL deadlocks trying to route a balanced ring, and even if forced over PCIe, incurs a catastrophic 28x slowdown.
