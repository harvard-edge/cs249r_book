title: The NCCL NVLink Deadlock
scenario: You are running Data Parallel training on a single 8-GPU DGX node. GPU 0 crashes due to a faulty memory bank. You rewrite the host script to exclude GPU 0 and launch the job on GPUs 1 through 7. The job starts, but the NCCL AllReduce immediately hangs indefinitely.
question: Why does a 7-GPU topology fail and hang on a DGX machine?
details:
  realistic_solution: A 7-GPU job should normally be possible on an 8-GPU DGX if CUDA and NCCL see a consistent set of healthy devices. The hang is a diagnosis signal, not proof that odd GPU counts are impossible. Common causes are rank-to-device mapping bugs after excluding GPU 0, stale CUDA_VISIBLE_DEVICES assumptions, a process still trying to use the missing GPU, a CUDA/NCCL/driver mismatch, or a real failed GPU/link that poisons topology discovery. The fix is to verify device enumeration and rank mapping, run NCCL topology/debug tests on GPUs 1-7, and only then change NCCL algorithms or replace hardware if diagnostics show an actual link or GPU failure.
  common_mistake: |
    **The Pitfall:** Assuming the odd GPU count itself makes NCCL AllReduce impossible.
    **The Rationale:** Engineers often treat NVLink topology as a rigid ring that cannot tolerate excluding one visible device.
    **The Consequence:** They force unrelated NCCL settings or replace hardware before checking rank mapping, device visibility, NCCL topology discovery, and actual link health.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8-GPU DGX node with one GPU excluded from the job.
       - A 7-rank AllReduce should form over the remaining visible GPUs if every process has the same device map and NCCL can discover healthy links.
    2. **Calculations:**
       - Expected ranks: 7 processes, local ranks 0-6 mapped to physical GPUs 1-7 through CUDA_VISIBLE_DEVICES.
       - Failure pattern: if one process still maps rank 0 to physical GPU 0 or NCCL topology discovery includes a failed device/link, the collective waits for a peer or path that never becomes usable.
       - Bandwidth comparison needs a defined message size and actual topology; a blanket 28x slowdown is not derivable from the prompt.
    3. **Conclusion & Interpretation:**
       - **Result: Distributed Runtime/Topology Diagnosis.** Excluding GPU 0 should not by itself break NVLink AllReduce; the hang points to inconsistent rank mapping, stale device visibility, software/runtime mismatch, or a real hardware/topology fault that NCCL diagnostics should expose.
