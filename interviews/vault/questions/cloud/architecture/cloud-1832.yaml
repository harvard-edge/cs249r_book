title: Mitigating Memorization via Architectural Capacity Constraints
scenario: You are designing an LLM architecture to summarize sensitive financial documents. Initial tests with a 13B parameter architecture show high vulnerability to training data extraction attacks, where specific prompt injections cause the model to output exact social security numbers from its training corpus.
question: What architectural changes would make the 13B financial summarization LLM natively resist training data extraction attacks?
details:
  realistic_solution: 'Reduce the model''s parameter count (e.g., scaling down from 13B to 3B or 7B) and implement an architectural abstention mechanism (e.g., an auxiliary confidence head). Lowering capacity forces the model to generalize rather than memorize rare PII sequences, effectively shrinking the attack surface.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on post-processing output filters or attempting to apply DP-SGD with excessive noise.
    **The Rationale:** Treating memorization as an output filtering problem rather than an architectural capacity issue.
    **The Consequence:** The model's summarization coherence is ruined (with DP-SGD), or the underlying vulnerability remains exploitable through advanced adversarial prompts (with output filters).
  napkin_math: |
    **Assumptions & Constraints:**
    - Capacity: 13B model (26GB FP16 weights).
    - Memorization rate: 0.1% capacity used for string memorization.

    **Calculations:**
    - 13B memorization storage = 26MB exact strings.
    - Shrinking to 3B (6GB weights) reduces memorization capacity by >4x.

    **Conclusion & Interpretation:**
    - **Result: >4x capacity reduction (Capacity-Bound)**. Shrinking model capacity forces the network to discard rare point-wise memorization in favor of generalized features.
