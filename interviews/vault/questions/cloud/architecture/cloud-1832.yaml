title: Mitigating Memorization via Architectural Capacity Constraints
scenario: You are designing an LLM architecture to summarize sensitive financial documents. Initial tests with a 13B parameter architecture show high vulnerability to training data extraction attacks, where specific prompt injections cause the model to output exact social security numbers from its training corpus.
question: What architectural changes would make the 13B financial summarization LLM natively resist training data extraction attacks?
details:
  realistic_solution: Reduce the model's parameter count (e.g., scaling down from 13B to 3B or 7B) and implement an architectural abstention mechanism (e.g., an auxiliary confidence head). Lower capacity reduces headroom for rare-string memorization, while abstention gives the model a native way to refuse suspicious or out-of-distribution prompts instead of emitting memorized PII.
  common_mistake: |
    **The Pitfall:** Relying exclusively on post-processing output filters or attempting to apply DP-SGD with excessive noise.
    **The Rationale:** Treating memorization as an output filtering problem rather than an architectural capacity issue.
    **The Consequence:** The model's summarization coherence is ruined (with DP-SGD), or the underlying vulnerability remains exploitable through advanced adversarial prompts (with output filters).
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B FP16 weights are about 26GB; 3B FP16 weights are about 6GB.
    - Parameter count is only a risk proxy; it does not convert directly into bytes of memorized strings.
    - Extraction risk also depends on data duplication, training objective, decoding policy, and whether the model can abstain.

    **Calculations:**
    - Capacity reduction ratio: 13B / 3B = 4.33x fewer parameters.
    - This bounds model capacity pressure but does not prove a 4.33x reduction in extractable PII.
    - Adding an abstention head gives the architecture a separate refusal path for prompts that look like extraction attempts.

    **Conclusion & Interpretation:**
    - **Result: lower-capacity model plus abstention reduces extraction risk qualitatively (Capacity and Control-Bound)**. The defensible claim is reduced attack surface, not a precise byte-for-byte memorization estimate.
