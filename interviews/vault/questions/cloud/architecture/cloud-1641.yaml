title: Cloud-to-Edge NPU Offloading Architecture
scenario: You are redesigning a video analytics pipeline that currently streams 1,000 live 1080p/30FPS camera feeds to centralized cloud GPUs. Network bandwidth costs dominate the budget. You are evaluating replacing standard cameras with edge devices equipped with an integrated 4 TOPS (INT8) NPU, running a quantized model locally to only send metadata to the cloud.
question: Should you move the 1,000-camera video analytics workload to 4 TOPS edge NPUs, and what compute/TCO trade-offs drive the decision?
details:
  realistic_solution: Favor moving the workload to edge NPUs if validation shows the INT8 model's accuracy loss is acceptable. The NPU has large compute headroom (30 GOPs/s is <1% of 4 TOPS), and eliminating continuous video upload saves about $64.8k/month in bandwidth, paying back the $100k device premium in under two months. The decision should explicitly include quantization accuracy, OTA updates, device monitoring, rollback, and fleet operations, but the TCO case strongly favors edge inference.
  common_mistake: |
    **The Pitfall:** Focusing solely on edge NPU compute limits while ignoring quantization engineering costs and network savings.
    **The Rationale:** Engineers fixate on the 4 TOPS spec but fail to realize that bandwidth elimination entirely justifies the engineering overhead of managing remote devices.
    **The Consequence:** The company continues to pay exorbitant, unsustainable cloud egress and ingress fees for raw video streams.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000 cameras, 1080p/30FPS (4 Mbps stream each).
    - Cloud bandwidth cost: $0.05/GB.
    - Edge NPU: 4 TOPS limit, compute demand is 30 GOPs/s, $100 premium/device.

    **Calculations:**
    - Aggregate video bandwidth: 1,000 * 4 Mbps = 4,000 Mbps = 4 Gbps.
    - Using decimal units, 4 Gbps / 8 = 0.5 GB/s; over 30 days, 0.5 GB/s * 2,592,000 seconds = 1,296,000 GB ≈ 1,296 TB/month.
    - Bandwidth cost for billable transfer: 1,296,000 GB * $0.05/GB = $64,800/month.
    - Edge compute usage: 30 GOPs / 4000 GOPs = 0.75% of NPU capacity.
    - Metadata bandwidth: 10 Kbps vs 4 Mbps = 99.75% reduction.
    - Edge hardware premium: 1,000 devices * $100/device = $100,000.
    - Simple payback from bandwidth savings: $100,000 / $64,800/month = 1.54 months.

    **Conclusion & Interpretation:**
    - **Result: favor edge inference if INT8 accuracy is acceptable.** The 4 TOPS NPU has ample compute headroom, and the roughly $64.8k/month bandwidth reduction pays back the $100k hardware premium in under 2 months; the main costs are deployment complexity, device management, and quantization validation.
