title: Precision vs Recall Tradeoff in Multi-Stage Retrieval Pipeline
scenario: A 3-stage recommendation pipeline (retrieval -> light rank -> heavy rank) outputs 20 final items from 1M candidates. An SRE notices that 30% of the 20 final items were not in the top 10K retrieved by the retrieval stage. This means the retrieval stage has 70% recall @10K.
question: Is this acceptable?
details:
  realistic_solution: 'Interpreting retrieval recall: if 70% recall @10K means 30% of the optimal final-20 items are missed by retrieval, the question is whether those missed items would have changed the final ranking. If the missed items are marginally relevant (rank 21-50 in the oracle ranking), the impact on final quality is small. If missed items include the top-1 item in 10% of queries, that is a severe quality failure. Analysis approach: (1) Compute recall for different K values (100, 1K, 10K). If recall @1K = 50% and recall @10K = 70%, the recall curve is shallow — need a better retrieval model. (2) Quality impact: run offline experiment with oracle retrieval (send top-50K to ranker). Compare final NDCG vs 10K retrieval NDCG. If delta < 1%: 70% recall is acceptable. (3) In practice: 70% recall @10K is considered low for production systems. Target: >90% recall @1K for a well-tuned two-tower model.'
  common_mistake: |
    **The Pitfall:** Treating retrieval recall as an isolated system-level metric.
    **The Rationale:** Assuming high recall directly translates to high final ranking quality without evaluating the full pipeline's final metric (NDCG).
    **The Consequence:** Wasting resources optimizing retrieval recall when missed items have negligible impact on final ranking.
  napkin_math: |
    **Assumptions & Constraints:**
    - The heavy ranker produces 20 final items.
    - Retrieval recall @10K is 70%, so 30% of the heavy ranker's chosen final items were unavailable to the normal pipeline.
    - Offline oracle retrieval can pass a larger candidate set, such as 50K, to estimate quality loss.

    **Calculations:**
    - Missed final items per request: 20 * 30% = 6 items.
    - Current retrieved final items per request: 20 - 6 = 14 items.
    - Candidate expansion check: compare final NDCG and business metrics for 10K retrieval versus 50K oracle-style retrieval.
    - If NDCG delta is under the launch threshold and missed items are mostly low-ranked, 70% may be acceptable temporarily; if top-ranked items are missing, it is not.

    **Conclusion & Interpretation:**
    - **Result: Quality-Bound.** The relevant calculation is how many final-ranked items retrieval excludes and whether expanding retrieval changes final quality, not a direct CTR-to-revenue shortcut.
