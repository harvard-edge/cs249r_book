title: Receptive Field Growth in Deep CNNs
scenario: Explain how the receptive field grows with network depth in a CNN and why this matters for detecting objects of different sizes.
question: How does a CNN's receptive field grow with depth, and why does that matter for detecting objects of different sizes?
details:
  realistic_solution: 'Each convolutional layer''s receptive field extends by (kernel_size - 1) pixels in each direction relative to the previous layer''s receptive field. For 3x3 kernels: Layer 1 RF = 3x3, Layer 2 RF = 5x5, Layer 3 RF = 7x7, and so on. With pooling or strided convolutions, RF grows multiplicatively — a 2x2 pool doubles the effective RF growth rate. This hierarchical growth is why deep CNNs can detect both small features (edges in early layers) and large objects (entire faces in deep layers). A model with insufficient depth cannot ''see'' enough context.'
  common_mistake: |
    **The Pitfall:** Believing deeper networks always equate to better detection performance regardless of input size.
    **The Rationale:** Failing to understand that once the receptive field covers the entire input image, additional layers do not expand spatial context.
    **The Consequence:** Adding unnecessary parameters and compute, increasing latency without improving spatial feature extraction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input image size: 224x224.
    - Kernel size (k): 3x3.
    - Pool layers: 5 (each doubles effective RF).

    **Calculations:**
    - RF growth per 3x3 conv layer: 2 pixels.
    - Target RF: 224 pixels.
    - Required RF per pool stage with 5 pool layers: 224 / 2^5 = 7 pixels.
    - Conv layers per stage to reach 7px RF: (7 - 1) / 2 = 3 layers.
    - Total conv layers needed: 3 * 5 = 15 layers.

    **Conclusion & Interpretation:**
    - **Result: ~15-20 layers required to cover a 224px input (Receptive-Field-Bound)**. Hierarchical growth enables deep CNNs to detect both small features and large objects.
