title: Skip Connection Gradient and Memory Cost
scenario: You are migrating a 50-layer visual inspection model to GPUs for a cloud-based service. In the baseline plain CNN, gradients are attenuated by 15% (a multiplier of 0.85) at each layer, leading to stalled training. You propose adding skip connections to create a ResNet-style architecture.
question: What are the first-layer gradient magnitudes with and without skips, and how much FP16 memory does one bypass tensor require?
details:
  realistic_solution: 'The plain CNN gradient vanishes to approximately 0.0003, whereas the skip connection provides a direct O(1) path maintaining a gradient of 1.0. To support this, the bypass tensor must be preserved, consuming exactly 51.38 MB of activation memory per block.'
  common_mistake: |
    **The Pitfall:** Assuming skip connections have absolutely zero memory cost.
    **The Rationale:** Candidates understand skip connections algorithmically (they solve vanishing gradients) but not physically (how they exist in VRAM).
    **The Consequence:** They forget the bypass tensor must be kept alive in GPU memory until the end of the block, leading to OOM errors on deep ResNet architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 layers. Gradient attenuation = 0.85.
    - FP16 (2 bytes). Batch=64, channels=512, spatial=28x28.

    **Calculations:**
    - Plain CNN Layer 1 Gradient: 1.0 × (0.85)^50 ≈ 0.00029.
    - Skip Connection Gradient = 1.0.
    - Bypass Tensor Size: 64 × 512 × 28 × 28 × 2 bytes = 51,380,224 bytes.
    - Memory Required: 51,380,224 / 1024^2 = 49.0 MiB (~51.4 MB).

    **Conclusion & Interpretation:**
    - **Result: Skip connections maintain 1.0 gradient at a cost of ~51.4 MB per block (Memory-Capacity Bound)**.
