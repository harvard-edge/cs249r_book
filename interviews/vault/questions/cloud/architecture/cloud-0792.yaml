title: The Memory Illusion
scenario: 'We are deploying a 200B parameter model on a superchip with 72 GB of HBM3 and 480 GB of LPDDR5X CPU RAM sharing a unified memory space. The weights are 400 GB in FP16. Your colleague says we can serve this on a single chip without tensor parallelism since it fits in memory.'
question: 'What is the throughput reality of this unified-memory design?'
details:
  realistic_solution: 'The design will hit the C2C (Chip-to-Chip) Bandwidth Wall. While unified memory allows shared addressing, physical bandwidth limits are absolute. The GPU must stream weights from LPDDR5X over the ~900 GB/s C2C link during the autoregressive decode phase, rather than reading from the 4,000 GB/s local HBM3. This results in severe memory bandwidth starvation. High-throughput serving mandates Tensor Parallelism to keep all active weights in HBM.'
  common_mistake: |
    **The Pitfall:** Assuming unified memory means the GPU can read all 480 GB at native HBM speeds.
    **The Rationale:** Candidates misunderstand that unified memory abstracts addressing, but does not bypass physical link limitations.
    **The Consequence:** Severely overestimating token generation throughput, leading to catastrophic latency SLA violations in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM3 Bandwidth: 4 TB/s. C2C Bandwidth: 0.9 TB/s.
    - Weights: 400 GB.

    **Calculations:**
    - HBM3 Decode latency: 400 GB / 4 TB/s = 0.1s per token.
    - C2C Decode latency: 400 GB / 0.9 TB/s = 0.44s per token.

    **Conclusion & Interpretation:**
    - **Result: The "fits on one chip" design is 4.4x slower than a standard HBM configuration (Bandwidth-Bound).**
