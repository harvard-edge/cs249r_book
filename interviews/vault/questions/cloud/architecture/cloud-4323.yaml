title: Social-Scale Serving QPS and Caching Strategy
scenario: Your social platform serves 500M daily active users, with peak QPS of 2M recommendation requests/second. Each request requires embedding lookups across 100 tables (avg 100M rows, 64-dim FP32). Table access follows a Zipf distribution (α=0.8).
question: How would you design a multi-tier embedding cache, and what hit rate can a 1 TB GPU HBM L2 cache achieve under Zipf α=0.8?
details:
  realistic_solution: 'Zipf α=0.8: the top-k fraction f(k) of items captures roughly f^(1-α) of accesses for large tables. A 1 TB cache covers 1 TB / 2.56 TB = ~39% of rows across all 100 tables if rows are cached by per-table frequency. The expected hit rate is therefore about 0.39^0.2 = 83%, not because 39% of rows equals 39% of traffic, but because the Zipf CDF concentrates access on the head. Cache miss handling: on miss, fetch the 64-dim FP32 row from DRAM (256 bytes/lookup) — latency 100 μs vs 5 μs for HBM hit. At 2M QPS, 100 lookups/request, and 83% hit rate, miss bandwidth is 2M × 100 × 0.17 × 256 bytes ≈ 8.7 GB/s. This fits within modern host DRAM bandwidth, while smaller tiers can still cache the top 10% (~63% hit, 256 GB) or top 20% (~72% hit, 512 GB).'
  common_mistake: |
    **The Pitfall:** Sizing the cache based on total table capacity.
    **The Rationale:** Candidates conclude caching is impossible because the total table size (2.56 TB) exceeds the 1 TB L2 cache.
    **The Consequence:** Abandoning caching entirely and suffering massive DRAM bandwidth bottlenecks at 2M QPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tables: 100 tables, 100M rows each, 64-dim FP32 (256 bytes/row).
    - Access pattern: Zipf α=0.8.
    - Cache capacity: 1 TB.

    **Calculations:**
    - Total size: 100M * 100 * 256 bytes = 2.56 TB.
    - 1 TB cache covers: 1 TB / 2.56 TB = ~39% of all rows.
    - Zipf CDF approximation for α=0.8: hit_rate(f) ≈ f^(1-α) = f^0.2.
    - Top 10% rows capture: 0.10^0.2 ≈ 63% of lookups.
    - Top 20% rows capture: 0.20^0.2 ≈ 72% of lookups.
    - Top 39% rows capture: 0.39^0.2 ≈ 83% of lookups.
    - Caching top 10% requires: 10M rows * 100 tables * 256 bytes = 256 GB.
    - Caching top 20% requires: 20M rows * 100 tables * 256 bytes = 512 GB.
    - Caching top 39% requires: 39M rows * 100 tables * 256 bytes ≈ 1 TB.
    - Miss bandwidth at 83% hit rate: 2M req/s * 100 lookups/req * 17% misses * 256 bytes ≈ 8.7 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~83% Hit Rate (Hit-Rate-Bound)**. A 1 TB cache fits the hottest ~39% of rows across the tables; under Zipf α=0.8 that corresponds to roughly 83% of accesses, leaving about 8.7 GB/s of DRAM miss traffic.
