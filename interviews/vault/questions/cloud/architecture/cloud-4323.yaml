title: Social-Scale Serving QPS and Caching Strategy
scenario: Your social platform serves 500M daily active users, with peak QPS of 2M recommendation requests/second. Each request requires embedding lookups across 100 tables (avg 100M rows, 64-dim FP32). Table access follows a Zipf distribution (α=0.8).
question: How would you design a multi-tier embedding cache, and what hit rate can a 1 TB GPU HBM L2 cache achieve under Zipf α=0.8?
details:
  realistic_solution: |
    Design the cache as tiers, not one undifferentiated global pool: keep the hottest rows per table in GPU HBM, the next tier in local host DRAM or SSD-backed feature cache, and the cold tail in the embedding store. Admission should use per-table row frequency and recency so a large table cannot evict all hot rows from smaller tables; eviction can use segmented LRU/LFU with TTLs and model-version keys. For the stated uniform table sizes, a 1 TB HBM tier can hold about 39M rows per table if divided evenly. Using the finite-N Zipf integral for N=100M and α=0.8, the top 39% of each table accounts for about 82% of accesses. At 2M QPS and 100 lookups/request, the remaining 18% misses produce about 9.2 GB/s of row-fetch bandwidth, before metadata and write-update overhead.
  common_mistake: |
    **The Pitfall:** Sizing the cache based on total table capacity.
    **The Rationale:** Candidates conclude caching is impossible because the total table size (2.56 TB) exceeds the 1 TB L2 cache.
    **The Consequence:** Abandoning caching entirely and suffering massive DRAM bandwidth bottlenecks at 2M QPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tables: 100 tables, 100M rows each, 64-dim FP32 (256 bytes/row).
    - Access pattern: Zipf α=0.8.
    - Cache capacity: 1 TB.

    **Calculations:**
    - Total size: 100M * 100 * 256 bytes = 2.56 TB.
    - 1 TB cache covers: 1 TB / 2.56 TB = ~39% of all rows.
    - Finite-N Zipf integral for one table: hit_rate(k) ≈ (k^(1-α) - 1) / (N^(1-α) - 1), with N=100M and 1-α=0.2.
    - Top 10% rows: ((10M)^0.2 - 1) / ((100M)^0.2 - 1) ≈ 62% of lookups.
    - Top 20% rows: ((20M)^0.2 - 1) / ((100M)^0.2 - 1) ≈ 72% of lookups.
    - Top 39% rows: ((39M)^0.2 - 1) / ((100M)^0.2 - 1) ≈ 82% of lookups.
    - Caching top 10% requires: 10M rows * 100 tables * 256 bytes = 256 GB.
    - Caching top 20% requires: 20M rows * 100 tables * 256 bytes = 512 GB.
    - Caching top 39% requires: 39M rows * 100 tables * 256 bytes ≈ 1 TB.
    - Miss bandwidth at 82% hit rate: 2M req/s * 100 lookups/req * 18% misses * 256 bytes ≈ 9.2 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~82% Hit Rate (Policy-Bound)**. A 1 TB HBM tier fits the hottest ~39% of rows per table and should be managed with per-table admission and eviction; the tail still creates about 9.2 GB/s of miss traffic.
