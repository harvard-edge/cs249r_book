title: LoRA Rank Collapse Under Large Gradient Accumulation
scenario: A LoRA fine-tuning run shows loss instability and gradient explosions after 500 steps despite using AdamW. The batch size is 4 with gradient accumulation over 16 steps.
question: What is causing the LoRA loss instability and gradient explosions after 500 steps, and how would you mitigate it?
details:
  realistic_solution: 'LoRA gradient instability with high gradient accumulation often results from rank collapse: the low-rank matrices A and B align their singular vectors, causing the adapter update to concentrate on a single direction. Mitigation: (1) add LoRA dropout (0.1) to regularize adapter directions; (2) reduce accumulation steps (effective batch size too large for the rank), or use smaller learning rate with warmup; (3) initialize B to zero (standard LoRA) but verify this is not being overridden. Gradient clipping at 1.0 is essential for LoRA.'
  common_mistake: |
    **The Pitfall:** Increasing the learning rate to escape a loss plateau, or blaming the optimizer.
    **The Rationale:** Candidates misdiagnose the instability as a standard convergence issue rather than structural rank collapse unique to low-rank adapters.
    **The Consequence:** Worsened gradient magnitudes, completely destabilizing the LoRA weight updates and ruining the fine-tune.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch Size: 4. Accumulation Steps: 16. Effective Batch Size = 64.
       - LoRA learning rate is high (e.g., 1e-4).
    2. **Calculations:**
       - Effective batch size = 4 * 16 = 64.
       - Large accumulation reduces update noise and can make repeated gradients push the low-rank adapter in a narrow set of directions.
       - With a high learning rate, missing warmup, no dropout, or weak clipping, that narrow update direction can amplify singular values and produce gradient spikes.
       - The prompt does not provide singular values, so rank collapse should be treated as a diagnosis to verify, not a proven numeric threshold.
    3. **Conclusion & Interpretation:** **Result: Optimization-Bound (Possible Rank Collapse)**. Mitigate with LoRA dropout, lower learning rate or longer warmup, fewer accumulation steps if needed, standard initialization, and gradient clipping; monitor adapter singular values and gradient norms to confirm the cause.
