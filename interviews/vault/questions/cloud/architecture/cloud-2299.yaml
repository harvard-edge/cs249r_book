title: TPU MXU Padding and Memory Stalls
scenario: You migrated a two-tower retrieval model to a TPU v4 Pod. The model uses a custom dense architecture with an input dimension of 1000, hidden dimension of 500, and a serving batch size of 150. Hardware profiling reveals severe memory stall times and an abysmal Matrix Multiply Unit (MXU) utilization of 14%, despite theoretical arithmetic intensity suggesting it should be compute-bound. Throughput is capped at 12,000 QPS.
question: Why is MXU utilization only 14% on the TPU v4 Pod, and what changes would you make to improve throughput?
details:
  realistic_solution: The root cause is a severe hardware-compiler-algorithm mismatch. TPU v4 MXUs operate on tiled matrix shapes, so non-aligned batch and feature dimensions force the compiler to pad tiles and execute work on zeros. For this layer, a useful approximation is padding the effective dimensions from 150x1000x500 toward 256x1024x512 tile-aligned work. That wastes MXU cycles and lowers compute utilization; the fix is to choose batch sizes and hidden dimensions aligned to TPU tiling, fuse adjacent operations where possible, and reprofile before trying quantization.
  common_mistake: |
    **The Pitfall:** Assuming the model is natively memory-bandwidth bound and blindly applying weight quantization.
    **The Rationale:** Candidates trust the theoretical arithmetic intensity of the algorithmic shapes without understanding how the compiler pads dimensions to fit hardware matrix units.
    **The Consequence:** Quantization degrades model accuracy without fixing the underlying padding overhead that is destroying MXU utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: TPU v4 (128x128 MXU).
    - Algorithmic dimensions: 150 (batch) x 1000 (input) x 500 (hidden).

    **Calculations:**
    - Algorithmic MACs = 150 * 1000 * 500 = 75M MACs.
    - Approximate tile-aligned work: Batch -> 256, Input -> 1024, Hidden -> 512.
    - Approximate MACs executed = 256 * 1024 * 512 = ~134M MACs.
    - Extra compute over ideal = (134M - 75M) / 75M = ~79%.
    - Wasted fraction of executed compute = (134M - 75M) / 134M = ~44%.

    **Conclusion & Interpretation:**
    - **Result: ~44% of executed MXU work is padding (Tile-Efficiency-Bound)**. The symptom is poor MXU utilization from padded tile work, not proof that the algorithm is inherently memory-bandwidth-bound.
