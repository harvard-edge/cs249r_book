title: TPU MXU Padding and Memory Stalls
scenario: You migrated a two-tower retrieval model to a TPU v4 Pod. The model uses a custom dense architecture with an input dimension of 1000, hidden dimension of 500, and a serving batch size of 150. Hardware profiling reveals severe memory stall times and an abysmal Matrix Multiply Unit (MXU) utilization of 14%, despite theoretical arithmetic intensity suggesting it should be compute-bound. Throughput is capped at 12,000 QPS.
question: Why is MXU utilization only 14% on the TPU v4 Pod, and what changes would you make to improve throughput?
details:
  realistic_solution: The root cause is a severe hardware-compiler-algorithm mismatch plus memory-system stalls. TPU v4 MXUs operate on tiled matrix shapes, so non-aligned batch and feature dimensions force partially filled tiles and execute work on zeros. For this layer, the batch dimension needs two 128-row tiles, the input dimension rounds to eight 128-wide tiles, and the hidden dimension rounds to four 128-wide tiles, wasting MXU cycles. The profile also reports severe memory stalls, so padding alone does not explain all of the 14% utilization; input pipeline layout, sharding, HBM access patterns, and host/device feeding must be fixed too. Improve throughput by choosing batch sizes and hidden dimensions aligned to TPU tiling, using layouts that avoid transpose/copy stalls, fusing adjacent operations where possible, prefetching/staging inputs, and reprofiling before trying quantization.
  common_mistake: |
    **The Pitfall:** Assuming the model is natively memory-bandwidth bound and blindly applying weight quantization.
    **The Rationale:** Candidates trust the theoretical arithmetic intensity of the algorithmic shapes without understanding how the compiler pads dimensions to fit hardware matrix units.
    **The Consequence:** Quantization degrades model accuracy without fixing the underlying padding overhead that is destroying MXU utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: TPU v4 (128x128 MXU).
    - Algorithmic dimensions: 150 (batch) x 1000 (input) x 500 (hidden).

    **Calculations:**
    - Algorithmic MACs = 150 * 1000 * 500 = 75M MACs.
    - Tile counts: ceil(150/128) = 2 batch tiles, ceil(1000/128) = 8 input tiles, ceil(500/128) = 4 hidden tiles.
    - Padded tile extents: 2 * 128 = 256 batch rows, 8 * 128 = 1024 input columns, 4 * 128 = 512 hidden columns.
    - Upper-bound padded MACs for this matmul = 256 * 1024 * 512 = 134M MACs.
    - Extra padded compute over ideal = (134M - 75M) / 75M = 79%; wasted fraction of executed padded work = (134M - 75M) / 134M = 44%.
    - Observed MXU utilization is only 14%, much lower than the 56% useful-work fraction implied by padding alone, so memory stalls/layout overhead must account for additional lost cycles.

    **Conclusion & Interpretation:**
    - **Result: Tile-Efficiency and Memory-Stall Bound**. Padding can waste about 44% of executed MXU work for the stated shape, but the 14% measured utilization also requires fixing memory layout, input staging, and sharding stalls.
