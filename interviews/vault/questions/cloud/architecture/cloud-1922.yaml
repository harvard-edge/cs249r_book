title: Diagnosing Multi-Tenant Cache Side-Channels
scenario: 'You are investigating a data leak in a cloud-based multi-tenant ML serving platform running on dual-socket Intel Xeon CPUs. Tenant A is serving a proprietary embedding model. Tenant B, sharing the same physical socket, manages to extract Tenant A''s proprietary weights at a rate of ~2.5 KB/s without breaking container isolation or making any cross-tenant memory accesses. Hardware performance counters reveal that Tenant B''s process has an anomalously high branch misprediction rate (>15%) and is repeatedly performing high-resolution timing measurements on accesses to the shared 105MB L3 cache.'
question: 'What hardware-level vulnerability is leaking Tenant A''s weights via branch mispredictions and L3 cache timing, and how would you mitigate it?'
details:
  realistic_solution: 'Diagnose the attack as a Spectre-variant (e.g., Branch Target Injection) exploiting speculative execution. The CPU speculatively executes instructions based on Tenant B''s poisoned branch history, temporarily bringing Tenant A''s private weight data into the shared L3 cache before the processor discards the speculative state. Tenant B then recovers the data using a Prime+Probe cache timing attack. Mitigation requires applying microcode updates (e.g., IBRS, STIBP) and potentially using Intel RDT (Resource Director Technology) to hard-partition L3 cache ways between tenants.'
  common_mistake: |
    **The Pitfall:** Assuming the data leak stems from a standard software vulnerability or hypervisor escape.
    **The Rationale:** Engineers are trained to look for OS-level memory isolation failures, like buffer over-reads, rather than hardware-level timing exploits.
    **The Consequence:** Wasting time auditing application code or container boundaries while a microarchitectural side-channel attack continuously extracts proprietary weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prime+Probe cache cycle: ~1,000 CPU cycles (0.5 µs at 2.0 GHz).
    - Reliable 1-bit test: 100 statistical iterations (50 µs).
    - 1 byte (8 bits) takes 400 µs.

    **Calculations:**
    - Theoretical maximum leak rate = 1 byte / 400 µs = 2.5 KB/sec.
    - Time to steal 10MB = 10MB / 2.5 KB/sec = 4,000 seconds ≈ 67 minutes.

    **Conclusion & Interpretation:**
    - **Result: 2.5 KB/sec Leak Rate (Side-Channel Vulnerability)**. At this rate, a 10MB proprietary encoder model could be completely stolen in under 70 minutes of co-location.
