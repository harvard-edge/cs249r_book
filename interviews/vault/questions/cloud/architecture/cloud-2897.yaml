title: Diagnose low GPU utilization when serving MobileNetV3 on H100
scenario: A production MobileNetV3-Large serving endpoint on H100 shows only 12% GPU-SM utilization in nvidia-smi despite receiving 5,000 QPS. The model processes 224x224 images in BF16. Each request is a single image.
question: Why is MobileNetV3-Large only reaching 12% SM utilization at 5,000 QPS batch=1 on H100, and how would you fix it?
details:
  realistic_solution: |
    At 5K QPS with batch=1, the incoming math work is only about 1.1 TFLOP/s, far below H100 capacity. The 12% SM utilization therefore points to dispatch and pipeline overhead rather than raw compute saturation: many tiny convolutions are launched as small kernels, CPU decode/resize may be gating requests, and host-to-device copies can serialize the path. Fix it by adding server-side dynamic batching within the latency budget, moving preprocessing to GPU or a dedicated CPU pool, using pinned memory and overlapping transfers, and capturing the steady-state graph with CUDA graphs or a serving runtime that fuses launches. Validate with traces before and after: queueing, preprocessing, H2D, kernel launch gaps, and GPU active time should all be measured.
  common_mistake: |
    **The Pitfall:** Arbitrarily increasing batch size without root-cause diagnosis.
    **The Rationale:** Candidates assume batch size always solves utilization, without checking if the bottleneck is CPU preprocessing, Python overhead, or PCIe transfer.
    **The Consequence:** Scaling batch size on a CPU-bound pipeline provides zero throughput improvement and increases latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3-Large: 0.22 GFLOPs at batch=1.
    - H100 peak 989 TFLOPS BF16.

    **Calculations:**
    - Work arriving per second: 5,000 req/s * 0.22 GFLOPs = 1.1 TFLOPs/s, far below H100 peak.
    - The observed 12% utilization corresponds to about 0.12 * 989 = 119 TFLOP/s utilization-implied capacity, not a measured per-request throughput limit.
    - Pure math time per single request at that capacity would be 0.22 GFLOPs / 119,000 GFLOPs/s = 0.00185 ms = 1.85 microseconds.
    - A 10 ms batching window at 5,000 QPS collects about 50 requests, for 50 * 0.22 GFLOPs = 11 GFLOPs per batch.
    - Pure math time for that batch at 119 TFLOPS is 11 / 119,000 = 0.092 ms; real latency is dominated by launch overhead, preprocessing, transfer, and framework scheduling, not FLOPs.

    **Conclusion & Interpretation:**
    - **Result: Dispatch and Preprocessing Bound**. Dynamic batching can greatly improve occupancy and amortize overhead within the 10 ms queueing budget, but the exact SM utilization must be measured; it does not follow directly from the FLOP count.
