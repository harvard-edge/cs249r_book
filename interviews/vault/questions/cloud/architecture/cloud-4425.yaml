title: QLoRA Double Quantization Memory Accounting
scenario: A team wants to fine-tune a 70B model on a single 80GB GPU using QLoRA. They plan to use NF4 base weights with double quantization.
question: How much memory does QLoRA need to fine-tune a 70B model with NF4 and double quantization on one 80GB GPU, and is it feasible?
details:
  realistic_solution: 'Perform a strict VRAM accounting. The base model drops to ~31.7 GB via NF4 and double quantization. Crucially, factor in the BF16 requirements for the LoRA adapters, Adam optimizer states, and gradient-checkpointed activations. The combined footprint lands at ~32.5 GB, safely fitting within the 80 GB limit with massive headroom for sequence batching.'
  common_mistake: |
    **The Pitfall:** Only accounting for the mathematically quantized base model weights.
    **The Rationale:** Engineers assume QLoRA compresses the entire execution footprint, forgetting that gradients and optimizer states mandate higher precision.
    **The Consequence:** VRAM requirements are violently underestimated, leading to unexpected Out-of-Memory (OOM) kernels during the backward pass when activation graphs materialize.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model: 70B parameters.
    - Precision: NF4 (4-bit = 0.5 bytes).
    - Double quantization savings: ~0.373 bits/param.
    - Single GPU: 80GB VRAM.

    **Calculations:**
    - NF4 Base: 70B * 0.5 Bytes = 35 GB.
    - Double Quant Savings: 70B * (0.373 / 8) = ~3.26 GB. Net Base = 31.74 GB.
    - LoRA Adapters + Adam States (r=16, BF16): ~0.25 GB.
    - Activations (bs=1, gradient checkpointing): ~0.50 GB.
    - Total Minimum Footprint: 31.74 + 0.25 + 0.50 = ~32.49 GB.

    **Conclusion & Interpretation:**
    - **Result: ~32.5 GB (Memory-Capacity Bound)**. The fine-tuning payload requires ~32.5 GB, easily fitting in the 80 GB envelope with ~47 GB of batching headroom.
