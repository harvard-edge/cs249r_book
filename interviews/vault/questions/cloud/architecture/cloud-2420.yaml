title: Arithmetic Intensity & Cache Thrashing
scenario: 'Serving two models on the same A100 GPU via MPS (Multi-Process Service): a memory-bound sparse embedding lookup model (500 QPS) and a compute-bound dense MLP (100 QPS). When run in isolation, MLP latency is 15ms. When co-located, MLP latency spikes to 85ms. GPU compute utilization remains low.'
question: Why does co-locating the embedding model under MPS spike MLP latency, and should you use MPS or MIG?
details:
  realistic_solution: This is a hardware-system co-design problem driven by arithmetic intensity. MPS shares the GPU spatially but leaves key memory hierarchy resources shared globally. The memory-bound embedding model constantly streams massive amounts of data from HBM, evicting useful cache lines. The compute-bound MLP relies heavily on cache hits for weight reuse. When co-located, the embedding model thrashes the shared cache, forcing the MLP to fetch more data from HBM. The tradeoff is dynamic resource sharing (MPS) versus strict isolation (MIG). The solution is to switch to Multi-Instance GPU (MIG), which physically partitions the hardware, including cache and memory bandwidth resources. Assigning a 1g.5gb slice to the embedding model and a 3g.20gb slice to the MLP isolates their memory hierarchies, restoring MLP latency.
  common_mistake: |
    **The Pitfall:** Using CUDA streams to enforce sequential execution.
    **The Rationale:** Engineers try to fix MPS contention by serializing workloads, which destroys the throughput benefits of co-location.
    **The Consequence:** The GPU remains vastly underutilized, and latency SLAs are still missed due to queuing delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - MPS shares cache and memory bandwidth between the embedding model and the MLP.
    - The embedding model has a streaming working set much larger than the shared cache.
    - MLP isolation latency is 15ms; observed co-located latency is 85ms.

    **Calculations:**
    - Cache Fit: streaming embedding-table accesses do not reuse a small, stable working set, so they evict MLP weight/cache lines under MPS.
    - Latency Regression: 85ms / 15ms = 5.7x observed slowdown.
    - Mechanism: lower MLP cache hit rate converts reuse-friendly accesses into repeated HBM fetches and memory-queue contention.

    **Conclusion & Interpretation:**
    - **Result: about 5.7x latency spike (Memory-Bound)**. The arithmetic comes from the observed 15ms -> 85ms regression; the root cause is shared-cache thrashing and HBM contention, which MIG isolates.
