title: MoE Routing Collapse During Training
scenario: You are training a 128-expert MoE language model on 256 H100 GPUs. After 10K steps, you notice that the auxiliary load-balancing loss has converged but the router entropy has dropped to 2.1 bits. Training loss improvement has stalled.
question: What is the root cause of the stalled training and low router entropy despite a converged load-balancing loss?
details:
  realistic_solution: 'Router entropy of 2.1 bits means the router effectively uses only ~4 of 128 experts (2^2.1 ≈ 4.3). This is classic routing collapse: the router learned to always select the same few experts, and the remaining 124 experts receive near-zero gradients, becoming dead weights. The aux loss converged because it measures per-batch balance — if 4 experts each get 25% of tokens, the batch is ''balanced'' among those 4. Fixes: (1) Use z-loss to penalize large router logits, preventing confident routing. (2) Switch to expert-choice routing (each expert picks its top-k tokens). (3) Add router jitter/noise during training. (4) Use a combination of load-balancing loss + router z-loss as in DeepSeek-V3. Monitor expert utilization histograms, not just aux loss.'
  common_mistake: |
    **The Pitfall:** Assuming the load-balancing loss is sufficient to prevent routing collapse.
    **The Rationale:** Candidates often trust the auxiliary loss metric blindly without realizing it only penalizes per-batch variance (e.g., 4 experts getting equal traffic) rather than long-term, global expert utilization.
    **The Consequence:** Failing to diagnose severe model capacity degradation, resulting in wasted compute and stalled training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 128-expert MoE.
    - Observed router entropy: 2.1 bits.
    - Uniform entropy would be log2(128) = 7.0 bits.

    **Calculations:**
    - Active Experts: 2^2.1 ≈ 4.3 experts.
    - Dead Experts: 124 out of 128 experts (97%).

    **Conclusion & Interpretation:**
    - **Result: 4 Active Experts (Routing Collapse).** The router effectively uses only ~4 experts, rendering 97% of the capacity dead weight.
