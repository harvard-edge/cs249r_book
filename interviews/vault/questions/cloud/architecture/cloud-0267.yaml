title: Quadratic Cost of Dense Self-Attention
scenario: You are selecting an attention mechanism for a cloud LLM service and need to recall how standard dense self-attention scales with sequence length.
question: How does standard dense self-attention compute scale as sequence length n increases?
details:
  realistic_solution: Standard dense self-attention compares every token with every other token, so the attention-score computation scales as O(n^2) with sequence length. Doubling the context length roughly quadruples the attention score work and the attention matrix size.
  common_mistake: |
    **The Pitfall:** Assuming attention cost grows linearly with sequence length.
    **The Rationale:** Engineers often focus on per-token processing and forget that dense attention forms pairwise token-to-token scores.
    **The Consequence:** Underestimating the cost of longer contexts, leading to latency and memory surprises in serving.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length = n tokens.
    - Dense self-attention computes a score for each query token against each key token.

    **Calculations:**
    - Number of attention scores = n queries * n keys = n^2.
    - If n doubles to 2n, scores become (2n)^2 = 4n^2.

    **Conclusion & Interpretation:**
    - **Result: O(n^2) attention scaling.** Dense self-attention becomes much more expensive as context length grows.
  options:
    - O(n)
    - O(n log n)
    - O(n^2)
    - O(1)
