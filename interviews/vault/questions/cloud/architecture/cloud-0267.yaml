title: 'The Chinchilla Data-Compute Ratio'
scenario: 'You are planning a training run for a new 70-billion-parameter LLM. To ensure you are not compute-or-data-limited, you recall the Chinchilla scaling laws.'
question: 'Approximately how many Chinchilla-optimal training tokens are required for a 70B-parameter LLM?'
details:
  realistic_solution: 'According to the Chinchilla scaling law, the optimal number of training tokens (D) is approximately 20 times the number of model parameters (P). For a 70B parameter model, this is 1.4 Trillion tokens.'
  common_mistake: |
    **The Pitfall:** Assuming a 1:1 relationship between parameters and tokens.
    **The Rationale:** Engineers often guess that 70B parameters need 70B tokens, or misremember the scaling constant by an order of magnitude.
    **The Consequence:** Massively under-training the model, leading to sub-optimal performance for the given compute budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters (P) = 70B.
    - Optimal Tokens (D) ~ 20 * P.

    **Calculations:**
    - D ~ 20 * 70,000,000,000 = 1,400,000,000,000.

    **Conclusion & Interpretation:**
    - **Result: ~1.4 Trillion tokens (Data-Bound)**. According to Chinchilla scaling, 1.4 trillion tokens are required to optimally train a 70B model.
  options:
  - '70 Billion tokens'
  - '3.5 Billion tokens'
  - '1.4 Trillion tokens'
  - '14 Trillion tokens'
  correct_index: 2
