title: Edge-Cloud Hierarchical Bandwidth Filtering
scenario: You manage a fleet of 5,000 autonomous delivery robots. Each robot is equipped with 4 high-definition cameras, each generating 5 MB/s of compressed video data. Streaming all raw data to the cloud is prohibitively expensive. You design a hierarchical architecture where a local Jetson Orin Nano runs a filter model, forwarding 10-second video clips to the cloud only when a rare safety-critical event is detected.
question: "How much data does each robot upload per day with 12 ten-second safety events per hour, and how much does that save versus continuous streaming?"
details:
  realistic_solution: |
    The baseline continuous streaming generates approximately 1.73 TB/day per robot. The hierarchical architecture's edge filter reduces the active transmission time to a 1/30 duty cycle, dropping the daily upload to just 57.6 GB/day per robot, yielding a 96.6% bandwidth saving.
  common_mistake: |
    **The Pitfall:** Miscalculating the baseline by forgetting to aggregate the bandwidth of all 4 cameras.
    **The Rationale:** Candidates rush through the initial arithmetic and focus on the event timing without establishing a correct baseline for comparison.
    **The Consequence:** Producing an inaccurate ROI calculation for the edge ML deployment, significantly understating the cost savings of the hierarchical architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 cameras per robot at 5 MB/s each.
    - 12 safety events per hour, 10 seconds each.

    **Calculations:**
    - Raw Baseline = 4 * 5 MB/s = 20 MB/s.
    - Daily Baseline = 20 MB/s * 3600 s/hr * 24 hr/day = 1.728 TB/day.
    - Active Upload Time = 12 events/hr * 10 s/event = 120 s/hr.
    - Duty Cycle = 120 / 3600 = 1/30.
    - Hierarchical Upload Volume = 1.728 TB/day * (1/30) = 57.6 GB/day.
    - Savings = (1.728 - 0.0576) / 1.728 = 96.6%.

    **Conclusion & Interpretation:**
    - **Result: 57.6 GB/day (Network-Bound mitigation)**. Hierarchical filtering yields a 96.6% bandwidth reduction.
