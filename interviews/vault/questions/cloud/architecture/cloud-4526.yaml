title: Llama-3 70B KV Cache Sizing
scenario: An H100 serves a 70B model with 80 layers, 8 KV heads, and 128 head dimension in FP16. Batch size is 128, sequence length is 2048.
question: Compute the total memory allocated for the KV cache?
visual:
  kind: svg
  path: cloud-4526.svg
  alt: Bar chart showing KV cache size exceeding total H100 memory.
  caption: KV cache memory demand vs single GPU capacity.
details:
  realistic_solution: |
    Use the cache payload implied by the stated KV shape and apply the FP16 byte width once. Formula: layers * KV_heads * head_dim * seq_len * batch_size * bytes_per_param.
    For FP16 (2 bytes): 80 * 8 * 128 * 2048 * 128 * 2 = 42,949,672,960 bytes.
    Converted to GiB: 42,949,672,960 / (1024^3) = 40 GiB.
    This KV cache is about half of an 80 GiB H100 before model weights, allocator reserve, activations, or runtime overhead, so it is still a major batch-capacity limiter but not the full device by itself.
  common_mistake: |
    **The Pitfall:** Double-counting the KV factor or using the number of query attention heads instead of the stated KV-head cache shape.
    **The Rationale:** Engineers often mix standard multi-head attention equations with grouped-query attention cache layouts, then apply an extra K/V multiplier on top of a prompt-provided KV payload.
    **The Consequence:** Inaccurate memory forecasts can lead to over-provisioning GPU capacity or rejecting feasible batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU: H100 (80 GiB).
    - Model config: 80 layers, 8 KV heads, 128 head dim, FP16 (2 bytes).
    - Inference config: Batch size 128, sequence length 2048.

    **Calculations:**
    - Total cached elements from the stated KV shape: 80 layers x 8 KV heads x 128 head_dim x 2048 tokens x 128 batch.
    - Memory calculation: (80 x 8 x 128 x 2048 x 128) elements x 2 bytes/element = 42,949,672,960 bytes.
    - Conversion: 42,949,672,960 bytes / (1024^3) = 40.0 GiB.

    **Conclusion & Interpretation:**
    - **Result: Memory Capacity-Bound.** The KV cache is about 40.0 GiB in binary units, roughly half of an 80 GiB H100 before weights and runtime overhead are counted.
