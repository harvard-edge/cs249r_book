title: SIMT Warp Mapping for Sparse Attention
scenario: You are evaluating two SIMT mapping strategies for a custom Sparse Attention kernel on an NVIDIA GPU. The workload features power-law distributed sequence lengths. Strategy A assigns one thread per sequence, maximizing concurrent sequences. Strategy B assigns an entire warp (32 threads) per sequence, ensuring coalesced reads but leaving threads idle for short sequences.
question: "Which sparse attention mapping strategy better leverages the SIMT execution model to hide the ~300 cycle global memory latency, and why?"
details:
  realistic_solution: Strategy B is the correct architectural choice. In the Single Instruction, Multiple Threads (SIMT) model, a warp executes in lockstep. Strategy B guarantees coalesced global memory reads, heavily conserving memory bandwidth. This efficient memory utilization allows the Streaming Multiprocessor's (SM) warp scheduler to rapidly context-switch to other active warps, successfully hiding the massive 300-cycle latency of HBM accesses.
  common_mistake: |
    **The Pitfall:** Selecting Strategy A to maximize "thread utilization."
    **The Rationale:** Engineers port CPU threading intuition to GPUs, prioritizing raw thread occupancy over memory access patterns.
    **The Consequence:** Uncoalesced accesses force the memory controller to serialize 32 separate transactions per warp, saturating memory bandwidth and preventing the SM from hiding latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Global memory latency: ~300 cycles.
       - Memory transaction size: 32 Bytes minimum.
       - SIMT Warp size: 32 threads.
    2. **Calculations:**
       - Strategy A (Uncoalesced): 32 threads * 32 Bytes = 1,024 Bytes requested per warp (8x overhead).
       - Strategy B (Coalesced): 32 threads request contiguous memory = 1x 128 Byte transaction per warp.
       - Bandwidth demand ratio: Strategy A demands 8x more physical bandwidth than Strategy B for the same logical payload.
    3. **Conclusion & Interpretation:**
       - **Result: Strategy B Wins.** Strategy A is disastrously **Memory-Bandwidth-Bound** due to uncoalesced thrashing, whereas Strategy B utilizes the warp scheduler properly to hide latency.
