title: Embedding Table Memory Bandwidth Optimization with Mixed Precision
scenario: Embedding table lookups are the memory bandwidth bottleneck in a DLRM training system. The tables are stored in FP32 (4B per value). Switching to FP16 reduces quality. A colleague suggests INT8 with row-wise scaling.
question: How would you evaluate FP32, FP16, and INT8 row-wise scaling for DLRM embedding tables, and what precision mix would you choose?
details:
  realistic_solution: |
    Precision comparison for embedding tables: (1) FP32: 4B per value, maximum numerical fidelity, but highest memory bandwidth. Use it as the baseline and for tables or updates shown to be quality-sensitive. (2) FP16: 2B per value and about 2x less bandwidth than FP32, but still stores every value with floating-point dynamic range. It is a reasonable compromise when INT8 quality loss is too high, especially for frequently updated or small tables. (3) INT8 row-wise scaling: store 64 one-byte values plus one 4B scale per row, or 68B/row. This is 1.0625B/value and a 3.76x storage/bandwidth reduction versus FP32. Per-row scaling preserves the shape of each embedding row better than table-wide quantization, but it still needs validation for training stability and ranking metrics. (4) Recommendation: use row-wise INT8 for large, bandwidth-bound embedding tables that pass offline and online quality checks; keep FP16 or FP32 for sensitive tables, optimizer/master weights, and the upper MLP as needed.
  common_mistake: |
    **The Pitfall:** Applying uniform INT8 quantization across all embedding tables.
    **The Rationale:** Uniform INT8 maps the entire row to 256 levels. For embedding rows with a wide dynamic range, this loses precision for small values.
    **The Consequence:** This degrades model quality, whereas row-wise quantization maintains one scale factor per row, preserving relative value precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M rows, 64 items per row.

    **Calculations:**
    - FP32 Bandwidth: 10M rows * 64 * 4B = 2.56 GB.
    - INT8 Bandwidth: 10M * 64 * 1B + 10M * 4B = 640 MB + 40 MB = 680 MB.
    - Bandwidth Reduction: 2560 / 680 = 3.76x.
    - If embedding memory traffic is 70% of step time, Amdahl speedup = 1/(0.30 + 0.70/3.76) = 2.06x.
    - If embedding memory traffic is only 30% of step time, speedup = 1/(0.70 + 0.30/3.76) = 1.28x.

    **Conclusion & Interpretation:**
    - **Result: 3.76x Bandwidth Reduction.** End-to-end throughput gain depends on the fraction of time spent on embedding memory traffic and must be validated against model quality.
