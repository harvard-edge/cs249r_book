title: Embedding Table Memory Bandwidth Optimization with Mixed Precision
scenario: Embedding table lookups are the memory bandwidth bottleneck in a DLRM training system. The tables are stored in FP32 (4B per value). Switching to FP16 reduces quality. A colleague suggests INT8 with row-wise scaling.
question: 'How would you evaluate FP32, FP16, and INT8 row-wise scaling for DLRM embedding tables, and what precision mix would you choose?'
details:
  realistic_solution: 'Precision comparison for embedding tables: (1) FP32: 4B per value. Full precision. Bandwidth: highest. (2) FP16: 2B per value (2x bandwidth reduction). Dynamic range: [-65504, 65504]. Risk: values near 0 (common in initialized embeddings) may have precision loss. For trained embeddings: typically fine. (3) INT8 (per-tensor): 1B per value + 4B scale + 4B zero_point per table. Effective: ~1B per value at large table sizes. Dynamic range issues: gradient updates to quantization levels are coarse. (4) INT8 (per-row): 1B per value + 4B scale per row. For a row of 64 values: overhead = 4B/64 = 6.25% overhead vs 1B per value. Effective: 1.0625B per value. 3.76x bandwidth reduction vs FP32. Quality: preserves relative precision within each row. (5) Recommendation: use INT8 per-row for embedding tables in training (FBGEMM supports this natively). Use FP32 for the upper MLP layers. Mixed precision: embedding INT8 + MLP FP32. Training quality: <0.5% AUC delta vs FP32-only in production deployments.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT8 quantization across all embedding tables.
    **The Rationale:** Uniform INT8 maps the entire row to 256 levels. For embedding rows with a wide dynamic range, this loses precision for small values.
    **The Consequence:** This degrades model quality, whereas row-wise quantization maintains one scale factor per row, preserving relative value precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M rows, 64 items per row.

    **Calculations:**
    - FP32 Bandwidth: 10M rows * 64 * 4B = 2.56 GB.
    - INT8 Bandwidth: 10M * 64 * 1B + 10M * 4B = 640 MB + 40 MB = 680 MB.
    - Bandwidth Reduction: 2560 / 680 = 3.76x.
    - Total Speedup: 1/(0.7 + 0.3/3.76) = 1.28x.

    **Conclusion & Interpretation:**
    - **Result: 3.76x Reduction (Memory-Bandwidth-Bound)**. 28% training throughput improvement.
