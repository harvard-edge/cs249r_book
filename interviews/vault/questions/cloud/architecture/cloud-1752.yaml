title: Systolic Array Padding Underutilization
scenario: You are deploying a custom Mixture of Experts (MoE) model on a Google TPU cluster. The expert routing logic creates highly fragmented micro-batches, resulting in matrix multiplications of shape [Batch=32, In_Dim=128] against expert weights of [In_Dim=128, Out_Dim=64]. The profiler indicates the Matrix Multiply Unit (MXU) processing elements are operating at only 12.5% of peak compute efficiency.
question: Why is the MXU only 12.5% utilized despite unsaturated HBM?
details:
  realistic_solution: The MXU is underfilled because expert routing creates small, fragmented matrix tiles. A [32x128] by [128x64] multiply has valid work in only a 32-row by 64-column region of the logical 128x128 tile, so much of the systolic issue slot is padding or idle work even though HBM is not saturated. Improve this by grouping routed tokens across experts, increasing effective micro-batch size, or using tiling that better amortizes padding on both output dimensions.
  common_mistake: |
    **The Pitfall:** Assuming memory-bound dispatch overhead or PCIe transfer limits are the bottleneck.
    **The Rationale:** Candidates often jump to memory bottlenecks without accounting for the physical layout and zero-padding requirements of fixed-size systolic arrays.
    **The Consequence:** Attempting to optimize data pipelines when the actual problem requires batching to utilize hardware effectively.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU MXU is a 128x128 systolic array.
    - Hardware pads smaller matrices to multiples of 128.

    **Calculations:**
    - Logical output tile capacity: 128 rows * 128 columns = 16,384 output positions per tile.
    - Useful output region: 32 batch rows * 64 output columns = 2,048 valid positions.
    - Useful tile fraction: 2,048 / 16,384 = 12.5%.
    - The low efficiency comes from padded or idle tile lanes, not from a lack of HBM bandwidth.

    **Conclusion & Interpretation:**
    - **Result: 12.5% Tile Utilization (Shape-Fragmentation Bound)**. The fix is to aggregate routed work or retile it so the MXU sees fuller 128x128 tiles.
