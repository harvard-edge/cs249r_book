title: 'MoE Architecture: Router Network Design and Placement'
scenario: 'You are reviewing the architecture of Mixtral 8x7B, a standard Mixture of Experts (MoE) transformer.'
question: 'Which layers are replaced with MoE layers, and how does the router network interact with the expert MLPs?'
details:
  realistic_solution: 'In Mixtral 8x7B: each transformer block has (1) a standard multi-head attention layer (shared, no routing), followed by (2) an MoE layer replacing the standard MLP. The MoE layer contains 8 independent expert MLPs (each identical in architecture to the standard MLP: three linear layers for SwiGLU, dimension 14336) plus a router network. Router architecture: a single linear layer W_router \in R^{d_model \times n_experts} = R^{4096 \times 8}. Input: the hidden state x \in R^{d_model} for each token. Output: softmax(W_router \times x) \in R^8 — a probability distribution over 8 experts. Top-2 experts are selected. The token is processed by both selected experts independently: y_1 = Expert_i(x), y_2 = Expert_j(x). Final output: g_i \times y_1 + g_j \times y_2 where g_i, g_j are the router softmax weights for the selected experts (renormalized to sum to 1). This weighted sum is added via the residual connection. The router adds only 4096 \times 8 = 32K parameters per layer — negligible.'
  common_mistake: |
    **The Pitfall:** Thinking the entire transformer block, including attention, is routed or replaced by MoE.
    **The Rationale:** The term "Mixture of Experts" sounds all-encompassing, leading candidates to believe there are 'attention experts.'
    **The Consequence:** Completely misunderstanding the memory and compute dynamics of MoE, which only replaces the Feed-Forward Network (MLP) portion of the block.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 layers, 8 experts per layer
    - d_model = 4096, hidden_size = 14336

    **Calculations:**
    - Router Parameters = 4096 * 8 = 32,768 per layer
    - Total Router Burden = 32 layers * 32K = ~1 million parameters
    - Expert MLP Parameters = 3 * 4096 * 14336 \approx 176 million per expert
    - Total Expert Burden = 32 layers * 8 experts * 176M = ~45 billion parameters

    **Conclusion & Interpretation:**
    - **Result: ~1 million parameters (Compute-Bound)**. The router accounts for just 0.002% of the MoE parameter footprint.
