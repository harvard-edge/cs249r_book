title: Negative Sampling Bias in Recommendation Training
scenario: Your recommendation model is trained with in-batch negatives. At 1M QPS serving, you observe a popularity bias where the top-0.1% most popular items account for 40% of recommendations, even though they represent only 3% of catalog impressions.
question: Why do in-batch negatives create the observed popularity bias, and what debiasing technique would you use?
details:
  realistic_solution: 'In-batch negatives cause popular items to appear as negatives proportionally to their frequency. An item appearing 100x more frequently serves as a negative 100x more often, pushing its embedding away from all others. Simultaneously, it appears as a positive 100x more often. Net effect: popular items receive disproportionately more gradient updates, leading to sharper, universally high-similarity embeddings. Debiasing requires logit adjustment: subtract $\log(\text{item\_frequency})$ from the ranking score at inference time, or oversample rare items as negatives during training.'
  common_mistake: |
    **The Pitfall:** Blaming the ranking model's final MLP weights for the bias.
    **The Rationale:** Engineers assume the final linear layers simply learned a high bias term for popular items.
    **The Consequence:** Attempting to regularize or threshold the MLP, which completely fails to fix the root cause of distorted, overly-sharp embeddings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Top 0.1% popular items account for 3% of impressions.
    - Batch size 1024 uses in-batch negatives.

    **Calculations:**
    - Popular items serve as negatives ~30 times per batch.
    - Median items receive near-zero updates.
    - Logit correction: score - log(freq_i / avg_freq).

    **Conclusion & Interpretation:**
    - **Result: Training Signal Imbalance (Data-Bound)**. Disproportionate gradient updates create artificially sharp embeddings, correctable via logit adjustment.
