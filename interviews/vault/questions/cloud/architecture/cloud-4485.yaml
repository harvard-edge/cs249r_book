title: 18-Month Video Recommendation System Scaling Plan
scenario: You are the first ML engineer at a startup building a recommendation system for a video platform (1M users, 10M videos, 10x yearly growth). You need to design the full architecture for the first 18 months.
question: How would you design the first 18 months of recommendations to handle 10x yearly growth without over-engineering?
details:
  realistic_solution: |
    Phase 1 (Month 1-3, 1M users): Collaborative filtering using matrix factorization (SVD++ or ALS). Open-source: Surprise or implicit library. Model size: (1M users + 10M videos) x 64 factors x 4B = about 2.8GB for FP32 embeddings, plus optimizer and metadata overhead. Runs as a nightly batch job on a small CPU/GPU cluster, not as a sub-second single-GPU run. Serving: pre-compute top-100 recommendations per user nightly. Store in Redis or a key-value store (1M x 100 x 8B video_id = 800MB before scores and overhead). P99 latency: 5ms (Redis GET).
    Phase 2 (Month 4-9, 5M users, 50M videos): Add two-tower real-time model.
    Phase 3 (Month 10-18, 10M users, 100M videos): Multi-stage pipeline with feature store.
    Phase 4 (beyond 18 months): DLRM-style architecture.
  common_mistake: |
    **The Pitfall:** Building the most sophisticated multi-tower DLRM architecture from day one.
    **The Rationale:** Engineers copy tech stack architectures from FAANG companies, attempting to solve 100-million user problems before the startup has product-market fit.
    **The Consequence:** The team spends 6 months building 100TB feature stores for a user base that could have been served by a single CPU script running nightly.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1M users, 10M videos.
    - ALS or implicit matrix factorization with 64 latent factors.
    - Top-100 recommendations stored in Redis.

    **Calculations:**
    - Embedding storage: (1M + 10M) * 64 * 4B = 2.816GB FP32 before optimizer state and metadata.
    - Recommendation cache: 1M users * 100 ids * 8B = 800MB before scores, serialization, and key overhead.
    - Practical batch cost: sparse ALS requires repeated passes over observed interactions and shuffles/joins; plan for minutes to hours on a small batch cluster, then measure, rather than assuming dense TFLOP peak.
    - Serving footprint: embeddings plus top-100 cache fit comfortably in memory at 1M users, but the cache grows linearly with users.

    **Conclusion & Interpretation:**
    - **Result: Capacity-Bound.** Batch collaborative filtering plus a precomputed recommendation cache is a defensible first phase, but training time and cloud cost must be based on sparse data movement and iteration count, not H100 peak FLOPS.
