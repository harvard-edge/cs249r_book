title: 18-Month Video Recommendation System Scaling Plan
scenario: You are the first ML engineer at a startup building a recommendation system for a video platform (1M users, 10M videos, 10x yearly growth). You need to design the full architecture for the first 18 months.
question: How would you design the first 18 months of recommendations to handle 10x yearly growth without over-engineering?
details:
  realistic_solution: |
    Phase 1 (Month 1-3, 1M users, 10M videos): start with implicit-feedback matrix factorization using a scalable library such as implicit ALS/BPR on a small batch cluster, or Spark/Ray if interaction volume already requires distributed joins. Avoid Surprise because it is useful for small experiments, not production-scale implicit feedback at this catalog size. Model size is (1M users + 10M videos) x 64 factors x 4B = about 2.8GB for FP32 embeddings before optimizer, metadata, indexes, and replication. Serving should precompute top-100 recommendations nightly and store them in Redis or another replicated key-value store; Redis GET latency can be around 5ms, but capacity planning must include scores, serialization, key overhead, metadata, and replica count.
    Phase 2 (Month 4-9, about 5M users, about 50M videos): keep the batch CF baseline as the fallback, add candidate generation from a two-tower model, and introduce online features only where they improve measured retention or watch time.
    Phase 3 (Month 10-18, about 32M users, about 316M videos under 10x yearly growth for 18 months): move to a multi-stage pipeline with approximate nearest-neighbor retrieval, light rank, heavy rank, feature logging, and a small feature store. The first-phase recommendation remains batch CF plus cached serving because it fits the starting footprint and gives a measured baseline before building the larger system.
    Phase 4 (beyond 18 months): DLRM-style architecture.
  common_mistake: |
    **The Pitfall:** Building the most sophisticated multi-tower DLRM architecture from day one.
    **The Rationale:** Engineers copy tech stack architectures from FAANG companies, attempting to solve 100-million user problems before the startup has product-market fit.
    **The Consequence:** The team spends 6 months building 100TB feature stores for a user base that could have been served by a single CPU script running nightly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Starting scale: 1M users, 10M videos.
    - 18-month planning scale under 10x yearly growth: growth factor = 10^(18/12) ~= 31.6x, or about 32M users and 316M videos if both sides grow at the same rate.
    - ALS or implicit matrix factorization with 64 latent factors.
    - Top-100 recommendations stored in Redis.

    **Calculations:**
    - Starting embedding storage: (1M + 10M) * 64 * 4B = 2.816GB FP32 before optimizer state, ANN indexes, metadata, and replication.
    - 18-month raw embedding storage: (32M + 316M) * 64 * 4B ~= 89GB FP32 before overhead.
    - Starting recommendation cache: 1M users * 100 ids * 8B = 800MB before scores, serialization, key overhead, and replicas.
    - 18-month raw id cache: 32M users * 100 ids * 8B = 25.6GB before scores and overhead; with scores, metadata, serialization, and 2-3 replicas, budget materially more than the raw number.
    - Practical batch cost: sparse ALS requires repeated passes over observed interactions and shuffles/joins; plan for minutes to hours on a small batch cluster, then measure, rather than assuming dense TFLOP peak.
    - Serving footprint: embeddings plus top-100 cache fit comfortably in memory at 1M users; by 18 months the same design still fits in a modest distributed memory tier, while retrieval indexes and feature pipelines become the dominant engineering work.

    **Conclusion & Interpretation:**
    - **Result: Scalable Baseline First.** Batch implicit collaborative filtering plus a precomputed recommendation cache is a defensible first phase at 1M users and can bridge toward the 18-month scale, but training time, serving memory, and cloud cost must include sparse data movement, indexes, metadata, and replication overhead.
