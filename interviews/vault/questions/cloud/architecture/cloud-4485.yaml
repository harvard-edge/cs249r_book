title: 'Full-Stack Personalization Infrastructure: Greenfield Design'
scenario: You are the first ML engineer at a startup building a recommendation system for a video platform (1M users, 10M videos, 10x yearly growth). You need to design the full architecture for the first 18 months.
question: How would you design the first 18 months of recommendations to handle 10x yearly growth without over-engineering?
details:
  realistic_solution: |
    Phase 1 (Month 1-3, 1M users): Collaborative filtering using matrix factorization (SVD++ or ALS). Open-source: Surprise or implicit library. Model size: 1M users x 64-dim + 10M videos x 64-dim = 2.8GB (in FP32). Runs on 1 GPU or even CPU. Offline batch: retrain daily. ALS computation: ~10 TFLOP, completes in ~0.02 seconds on H100. Serving: pre-compute top-100 recommendations per user nightly. Store in Redis (1M x 100 x 8B video_id = 800MB). P99 latency: 5ms (Redis GET).
    Phase 2 (Month 4-9, 5M users, 50M videos): Add two-tower real-time model.
    Phase 3 (Month 10-18, 10M users, 100M videos): Multi-stage pipeline with feature store.
    Phase 4 (beyond 18 months): DLRM-style architecture.
  common_mistake: |
    **The Pitfall:** Building the most sophisticated multi-tower DLRM architecture from day one.
    **The Rationale:** Engineers copy tech stack architectures from FAANG companies, attempting to solve 100-million user problems before the startup has product-market fit.
    **The Consequence:** The team spends 6 months building 100TB feature stores for a user base that could have been served by a single CPU script running nightly.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1M users, 10M videos.
    - ALS with 64 latent factors.
    - Top-100 recommendations stored in Redis.

    **Calculations:**
    - Phase 1 Compute: ALS on 1M x 10M sparse matrix with 64 factors = ~10 TFLOP.
    - Phase 1 Time: Single H100 (989 TFLOPS at 50% MFU) processes this in ~0.02 seconds. Cost <$0.01 per run.
    - Phase 1 Serving: 1M users * 100 * 8B = 800MB (costs ~$15/month).

    **Conclusion & Interpretation:**
    - **Result: Serving 1M users for <$200/month (Capacity-Bound)**. Batch ALS plus Redis effortlessly scales up to early growth limits; over-engineering from day one is a massive architectural anti-pattern.
