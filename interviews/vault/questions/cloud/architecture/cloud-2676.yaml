title: From Edges to Objects in Deep Networks
scenario: Deep CNNs progressively build complex visual concepts from simple primitives across their layer hierarchy.
question: "How does a deep CNN build complex visual concepts from simple primitives across layers, and why does that justify the computational cost of depth?"
details:
  realistic_solution: 'Deep CNNs learn hierarchical representations through composition: Layer 1-2 detect edges and textures. Layer 3-5 compose edges into parts. Layer 6-10 compose parts into objects. Each layer multiplies representational capacity by combining features from the previous layer.'
  common_mistake: |
    **The Pitfall:** Believing each layer learns completely independent features from the raw image.
    **The Rationale:** Candidates fundamentally misunderstand hierarchical representation, failing to realize that deeper layers take the output of previous layers as their literal input primitives.
    **The Consequence:** Misjudging the impact of architectural changes, falsely assuming it just "removes some features" rather than shattering all downstream composition.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hierarchical feature composition in CNNs.

    **Calculations:**
    - 3-layer CNN: edges → textures → simple shapes.
    - 10-layer CNN: edges → textures → parts → objects → scenes.
    - Each layer squares the compositional complexity.

    **Conclusion & Interpretation:**
    - **Result: Exponential expressiveness (Expressiveness-Bound)**. Depth provides exponential expressiveness (2^10 > 2^3) for a linear increase in parameter cost.
