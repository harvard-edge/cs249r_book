title: Serving Tradeoffs for 100 LoRA Adapters
scenario: 'You have 100 LoRA adapters for customer-specific fine-tunes. Compare three serving strategies: (A) merge adapters into base weights, (B) dynamic adapter loading, (C) keep all adapters in GPU memory.'
question: When should you choose merge, dynamic loading, or all-in-memory for 100 LoRA adapters across latency, memory, and operations?
details:
  realistic_solution: '(A) Merge: zero adapter application overhead, but requires one full model copy and deployment path per adapter, so it is best for a small number of dedicated, high-traffic customers. (B) Dynamic loading: keep cold adapters off GPU and load them on demand, which saves HBM but adds swap latency, so it fits long-tail or rarely used adapters. (C) All-in-memory: keep the base model plus all 100 small rank-16 adapters resident; this needs about 27.3 GB and is feasible on an 80 GB GPU before KV cache and activation headroom, so it is usually best for this 100-adapter scenario when low latency matters.'
  common_mistake: |
    **The Pitfall:** Always merging adapters into base weights for zero inference overhead.
    **The Rationale:** Prioritizing inference speed above all else without considering storage, memory, and orchestration constraints for multiple fine-tunes.
    **The Consequence:** Merging destroys the ability to switch adapters dynamically and requires provisioning an impossible amount of hardware for 100 separate model copies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 100 rank-16 adapters (13 MB each).
       * Base model: 26 GB.
    2. **Calculations:**
       * Adapter Storage: 100 * 13 MB = 1.3 GB.
       * All-in-Memory Approach: 1.3 GB + 26 GB = 27.3 GB.
       * Merged Approach: 100 * 26 GB = 2,600 GB (2.6 TB).
    3. **Conclusion & Interpretation:** **Result: All-in-memory is feasible for 100 rank-16 adapters.** The resident model plus adapters need about 27.3 GB before KV cache and activation headroom. Merging avoids adapter application overhead but stores 2.6 TB of model copies and complicates deployment; it does not imply 33 GPUs are required unless all merged copies must be resident at once.
