title: LoRA Adapter Merging and Serving Tradeoffs
scenario: 'You have 100 LoRA adapters for customer-specific fine-tunes. Compare three serving strategies: (A) merge adapters into base weights, (B) dynamic adapter loading, (C) keep all adapters in GPU memory.'
question: "When is each strategy optimal?"
details:
  realistic_solution: '(A) Merge: zero inference overhead, but requires 100x base_model_size storage and separate deployment per adapter — optimal when one customer has very high traffic (>1000 RPS) and dedicated serving. (B) Dynamic loading: adapter loaded/unloaded per request — ~50ms swap latency, optimal for long-tail adapters with <1 RPS each. (C) All-in-memory: zero swap latency, requires 100x adapter_size in HBM — optimal for up to ~100 rank-16 adapters (easily feasible).'
  common_mistake: |
    **The Pitfall:** Always merging adapters into base weights for zero inference overhead.
    **The Rationale:** Prioritizing inference speed above all else without considering storage, memory, and orchestration constraints for multiple fine-tunes.
    **The Consequence:** Merging destroys the ability to switch adapters dynamically and requires provisioning an impossible amount of hardware for 100 separate model copies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 100 rank-16 adapters (13 MB each).
       * Base model: 26 GB.
    2. **Calculations:**
       * Adapter Storage: 100 * 13 MB = 1.3 GB.
       * All-in-Memory Approach: 1.3 GB + 26 GB = 27.3 GB.
       * Merged Approach: 100 * 26 GB = 2,600 GB (2.6 TB).
    3. **Conclusion & Interpretation:** **Result: 27.3 GB (Capacity-Bound)**. Merging requires ~33 GPUs, whereas dynamic all-in-memory serving requires only 1 GPU.
