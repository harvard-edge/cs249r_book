title: Embedding Dimension vs Model Capacity Tradeoff in RecSys
scenario: A team debates whether to increase item embedding dimension from 64 to 256 for a DLRM-style model. The item catalog has 10M items.
question: What are the memory and performance tradeoffs of increasing item embeddings from 64 to 256 dimensions for 10M items?
details:
  realistic_solution: |
    The item table memory grows linearly with dimension: 10M items * (256 - 64) * 4B = 7.68GB additional. The existing 64-dim table is 2.56GB and the 256-dim table is 10.24GB, so deployment must budget extra HBM/DRAM capacity and lookup bandwidth. Per item lookup output grows from 256B to 1024B, a 4x increase for that table. In a DLRM-style dot-product interaction layer, the number of pairwise scalar outputs may stay fixed, but each dot product is over 256 values instead of 64, so interaction FLOPs for pairs involving the item embedding are about 4x higher. If the architecture also concatenates raw embeddings into a dense layer, that first dense layer's input width and FLOPs grow linearly with the added dimensions; if it only consumes interaction outputs, that dense layer may not grow. The decision should weigh measured quality lift against table memory, lookup bandwidth, interaction compute, and serving latency.
  common_mistake: |
    **The Pitfall:** Evaluating only the raw table memory and assuming the rest of the model is unchanged.
    **The Rationale:** Larger embeddings also increase lookup bandwidth and the cost of dot-product interactions; dense-layer cost changes only if the architecture feeds wider concatenated embeddings into that layer.
    **The Consequence:** The team can fit the table but still miss serving latency or training throughput targets because bandwidth and per-batch interaction compute grew with dimension.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M items.
    - Float32 item embeddings.
    - DLRM-style interaction uses dot products involving the item embedding.

    **Calculations:**
    - Existing item table: 10M * 64 * 4B = 2.56GB.
    - New item table: 10M * 256 * 4B = 10.24GB.
    - Extra memory: 10.24GB - 2.56GB = 7.68GB.
    - Lookup bytes per item embedding: 64 * 4B = 256B versus 256 * 4B = 1024B, so item lookup bandwidth is 4x.
    - Dot-product work for each pair involving the item embedding: 64 multiply-add terms versus 256, so those interaction FLOPs are 4x.

    **Conclusion & Interpretation:**
    - **Result: +7.68GB memory and 4x item-table lookup bandwidth/interaction work for item pairs.** First dense-layer cost grows only in architectures that concatenate the wider embedding into that layer.
