title: Realize end-to-end EfficientNet-B4 serving with DALI preprocessing on H100
scenario: You need to deploy EfficientNet-B4 for a medical imaging API that must process 2,000 QPS of 1920x1080 JPEG images on a single H100 node. The current CPU preprocessing pipeline (JPEG decode + resize + normalize) takes 12ms per image.
question: How would you build the GPU preprocessing and inference pipeline for EfficientNet-B4 to serve 2,000 QPS of 1080p JPEGs on one H100 node?
details:
  realistic_solution: 'Utilize an asynchronous NVIDIA DALI pipeline employing nvjpeg for GPU-accelerated JPEG decode, followed by bilinear resize and normalization. To ensure overlap, execute DALI on CUDA stream 1 and the TensorRT FP16 inference engine on CUDA stream 2, implementing double-buffering.'
  common_mistake: |
    **The Pitfall:** Using DALI without pinned memory buffers or using a single CUDA stream.
    **The Rationale:** Candidates might offload work to the GPU without optimizing the data transfer and execution concurrency.
    **The Consequence:** D2H/H2D copies block the preprocessing stream, or a single stream prevents overlap, failing to reach the throughput target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target is 2,000 QPS.
    - CPU preprocessing takes 12ms/image.
    - DALI GPU (nvjpeg decode) takes ~2ms for batch=64.
    - Resize (bilinear) takes ~0.3ms for batch=64. Normalize takes ~0.1ms.
    - EfficientNet-B4 TRT FP16 at batch=64 takes ~2ms.

    **Calculations:**
    - Total DALI preprocessing time per batch: 2ms + 0.3ms + 0.1ms = 2.4ms.
    - Pipeline bottleneck: max(2.4ms preprocessing, 2.0ms inference) = 2.4ms per batch of 64.
    - Throughput: 64 images / 2.4ms = 26,667 QPS.

    **Conclusion & Interpretation:**
    - **Result: 26,667 QPS (Preprocessing-Bound)**. The system easily meets the SLA.
