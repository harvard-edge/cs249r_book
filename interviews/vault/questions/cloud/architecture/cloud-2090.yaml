title: MoE Expert Load Imbalance Stall
scenario: You are training a 16-expert MoE model across 16 GPUs. The profiler shows that 14 GPUs finish their expert computation in 2ms, but 2 GPUs consistently take 8ms, creating a 6ms stall at every MoE layer's synchronization barrier.
question: "What is the most likely root cause of this synchronization stall, and what is the throughput impact?"
details:
  realistic_solution: Expert load imbalance from the routing function. The gating network is routing disproportionately many tokens to 2 popular experts, overloading those GPUs. Mitigation involves adding a load-balancing auxiliary loss, or using capacity factors to cap per-expert token counts.
  common_mistake: |
    **The Pitfall:** Blaming hardware heterogeneity or a slow interconnect.
    **The Rationale:** Engineers default to hardware infrastructure issues rather than recognizing that MoE expert routing is a learned, dynamic behavior.
    **The Consequence:** Wasting time debugging healthy hardware instead of implementing a load-balancing auxiliary loss to fix the network's routing skew.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Ideal routing: 4,096 tokens split evenly means 256 tokens per expert (2ms).
       * Skewed routing: ~1,024 tokens dumped to 2 hot experts (8ms).
    2. **Calculations:**
       * Layer stall: 8ms - 2ms = 6ms.
       * Throughput drop: 8ms / 2ms = 4x layer slowdown.
    3. **Conclusion & Interpretation:** **Result: 4x Slowdown (Compute-Bound)**. All 16 GPUs must wait at the all-to-all sync barrier for the slowest 8ms expert.
