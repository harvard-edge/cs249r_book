title: MoE Dynamic Expert Loading from SSD
scenario: You want to serve a 1024-expert MoE model where each expert is 1B parameters (2 GB BF16). Total model size is 2 TB. Your single server has 8 GPUs (640 GB HBM total) and 8 NVMe SSDs (7 GB/s each, 56 GB/s aggregate).
question: How would you design a tiered caching system for 1024 two-GB experts across GPU HBM, CPU DRAM, and NVMe SSDs?
details:
  realistic_solution: 'Three-tier caching: Tier 1 (GPU HBM): the server has 640 GB total HBM, enough for up to 320 two-GB experts before reserving space for shared layers, activations, and KV cache. Keep the hottest expert working set in HBM and shard or replicate it across the 8 GPUs based on routing load. Tier 2 (CPU DRAM): keep the next hottest experts in pinned CPU memory; a 2 GB expert moved over PCIe Gen5 at 64 GB/s takes about 31 ms. Tier 3 (NVMe SSD): keep cold experts on 8 striped SSDs; at 56 GB/s aggregate, reading a 2 GB expert is about 36 ms before the PCIe copy, while a single-drive read would be 286 ms. Use router-aware prefetching, admission/queueing for cold misses, LFU/LRU-style eviction with hysteresis, and hot-expert replication so tail latency is controlled instead of relying on average hit latency.'
  common_mistake: |
    **The Pitfall:** Treating expert loading as a simple LRU cache without considering data transfer paths.
    **The Rationale:** Candidates forget that NVMe-to-GPU transfer must route through CPU memory and PCIe, adding significant latency.
    **The Consequence:** Ignoring the necessity of speculative prefetching, resulting in the GPU stalling for 286ms every time a Tier 3 expert is selected.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expert size: 2 GB BF16.
    - Tier 1 HBM capacity: 640 GB total, or up to 640 / 2 = 320 experts before reserving memory for non-expert state.
    - Tier 2 CPU-to-GPU bandwidth: PCIe Gen5 at 64 GB/s.
    - Tier 3 NVMe bandwidth: 8 SSDs x 7 GB/s = 56 GB/s aggregate if striped; 7 GB/s if limited to one drive.

    **Calculations:**
    - HBM placement budget: choose a hot working set below 320 experts after reserving HBM for shared layers, activations, and KV cache.
    - Tier 2 PCIe transfer: 2 GB / 64 GB/s = 31 ms.
    - Tier 3 striped NVMe read: 2 GB / 56 GB/s = 36 ms before PCIe transfer.
    - Tier 3 single-drive read: 2 GB / 7 GB/s = 286 ms before PCIe transfer.

    **Conclusion & Interpretation:**
    - **Result: Tail-latency-bound tiered cache.** Use HBM for the hot set, CPU DRAM for warm misses, striped NVMe for cold misses, and router-driven prefetch plus eviction controls to prevent cold expert loads from stalling requests.
