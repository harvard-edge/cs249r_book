title: Optimize depthwise separable convolution throughput via kernel fusion on H100
scenario: 'A profiling session with Nsight Compute shows that a MobileNetV2 block (expand 1×1 → depthwise 3×3 → project 1×1) on H100 has 47 kernel launches and 62% of time in memory transactions rather than SM compute.'
question: How would you fuse kernels in the MobileNetV2 expand-depthwise-project block to reduce 47 launches and memory transactions on H100?
details:
  realistic_solution: 'Optimal fusion strategy: (1) Fuse expand 1×1 + BN + ReLU6 into one kernel (tensor core matmul + elementwise epilogue using cuBLAS/cuDNN epilogue fusion); (2) Fuse depthwise 3×3 + BN + ReLU6 into one kernel (custom CUDA or Triton with shared memory tiling); (3) Fuse project 1×1 + BN (no activation for linear bottleneck) into one kernel; (4) Fuse residual addition with project output. Result: 47 kernels → 3–4 kernels per MBConv block. torch.compile with Inductor backend performs this automatically.'
  common_mistake: 'Attempting to fuse all three operations into a single kernel, which is impractical because the expand and project 1×1 operations are suited for tensor-core matmul while depthwise requires custom spatial indexing — different compute patterns cannot share tensor core instructions.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Original block: 47 kernel launches.
    - Fused block: 4 kernel launches.
    - Kernel launch overhead: 5µs per launch.
    - Architecture: MobileNetV2 with 17 MBConv blocks.
    
    **Calculations:**
    - Overhead per original block: 47 * 5µs = 235µs.
    - Overhead per fused block: 4 * 5µs = 20µs.
    - Time saved per block: 235µs - 20µs = 215µs.
    - Total time saved per inference: 17 blocks * 215µs = 3.655ms.
    - MobileNetV2 BS=1 baseline: ~8ms. Speedup = 3.655ms / 8ms ≈ 46%.
    
    **Conclusion & Interpretation:**
    - **Result: 46% Speedup (Launch-Overhead Bound)**. Fusing epilogues and elementwise operations massively reduces kernel launch limits and HBM round trips, slashing latency by nearly half.
