title: Evaluating Cloud Enclave Fault Injection Mitigations
scenario: 'Your cloud platform uses secure enclaves (e.g., Intel SGX) to protect proprietary ML model weights during inference. A vulnerability report shows an attacker on a co-located VM can use privileged software interfaces to induce precise voltage droops (e.g., a Plundervolt attack), causing a fault during AES-GCM decryption to leak the model key. You must evaluate three mitigations: 1) Disabling dynamic voltage and frequency scaling (DVFS) across the fleet, 2) Software-based redundant execution for crypto ops, or 3) Offloading key decryption to a physically isolated, network-attached HSM.'
question: 'Which mitigation should you choose against Plundervolt-style key leakage, and what are the performance, security, and TCO trade-offs?'
details:
  realistic_solution: 'Offloading key management to a physically isolated HSM is the optimal architectural choice. Disabling DVFS eliminates the undervolting vector but destroys power efficiency and peak performance, which is catastrophic for cloud ML ROI. Redundant execution effectively halves throughput and increases latency.'
  common_mistake: |
    **The Pitfall:** Assuming that disabling DVFS is a simple, zero-cost configuration change.
    **The Rationale:** Candidates may prioritize a quick software fix over hardware isolation without calculating the fleet-wide efficiency impact.
    **The Consequence:** Failing to account for the massive 20-30% drop in overall datacenter compute efficiency and power scaling, destroying TCO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Disabling DVFS reduces peak throughput by ~20%.
    - 10,000 node cluster at $10k/node.
    - Centralized HSM cluster costs ~$500k.

    **Calculations:**
    - Lost compute capacity from DVFS disable: 20% * 10,000 * $10k = $20M.
    - Cost ratio: $20M / $500k = 40x.

    **Conclusion & Interpretation:**
    - **Result: 40x More Cost-Effective** (HSM physical isolation saves massive fleet-wide TCO).
