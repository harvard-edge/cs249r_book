title: Evaluating Cloud Enclave Fault Injection Mitigations
scenario: 'Your cloud platform uses secure enclaves (e.g., Intel SGX) to protect proprietary ML model weights during inference. A vulnerability report shows an attacker on a co-located VM can use privileged software interfaces to induce precise voltage droops (e.g., a Plundervolt attack), causing a fault during AES-GCM decryption to leak the model key. You must evaluate three mitigations: 1) Disabling dynamic voltage and frequency scaling (DVFS) across the fleet, 2) Software-based redundant execution for crypto ops, or 3) Offloading key decryption to a physically isolated, network-attached HSM.'
question: Which mitigation should you choose against Plundervolt-style key leakage, and what are the performance, security, and TCO trade-offs?
details:
  realistic_solution: Choose HSM offload for key decryption if the threat is Plundervolt-style key extraction from the enclave host. Disabling DVFS directly blocks software-controlled undervolting, but it applies a fleet-wide performance and energy penalty to every workload on the affected hosts and may be unacceptable for multi-tenant ML inference TCO. Software redundant execution can detect many induced crypto faults, but it adds latency, doubles or nearly doubles crypto work, and still leaves the key operation on the vulnerable host. A physically isolated HSM moves the root key and AES-GCM decrypt operation outside the fault-injected CPU package, giving the strongest security boundary with localized capex, network latency, availability, and operational integration costs.
  common_mistake: |
    **The Pitfall:** Treating DVFS disable as a simple, zero-cost configuration change.
    **The Rationale:** Candidates may prioritize a quick software fix over hardware isolation without estimating the fleet-specific efficiency impact.
    **The Consequence:** A mitigation that is technically direct can still be economically poor if it reduces throughput or raises power cost across every inference host.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000-node inference fleet.
    - Effective loaded host cost: $10k/node-year including capex allocation, power, and operations.
    - Disabling DVFS reduces useful throughput by 20% on affected hosts.
    - HSM cluster capex/opex allocation: ~$500k/year.
    - Redundant crypto adds roughly 2x crypto work and measurable request latency, but not 20% fleet-wide ML throughput loss unless crypto is on the critical path.

    **Calculations:**
    - Fleet annual cost basis: 10,000 * $10k = $100M/year.
    - DVFS disable opportunity cost: 20% * $100M/year = $20M/year of lost useful capacity or extra nodes needed to recover throughput.
    - HSM annualized cost: ~$0.5M/year, plus integration and network latency budget.
    - Cost ratio for the capacity component: $20M / $0.5M = 40x, before considering the security benefit of moving keys off-host.

    **Conclusion & Interpretation:**
    - **Result: HSM offload is the best security/TCO trade-off under these assumptions.** DVFS disable is the most direct host-side mitigation but has fleet-wide performance and power cost; redundant execution is useful defense-in-depth but weaker isolation; HSM offload localizes cost while removing the sensitive decrypt path from the fault-injected CPU.
