title: ANN Index Rebuild Latency for Embedding Table Updates
scenario: A retrieval system uses an HNSW index over 10M item embeddings (128-dim). Embeddings are retrained daily and require a full index rebuild. The rebuild currently takes 4 hours on a CPU server, causing a 4-hour window where the retrieval index is stale.
question: How would you architect the system to cut the daily 10M-item HNSW index rebuild from 4 hours to under 30 minutes?
details:
  realistic_solution: |
    Keep the production index HNSW but stop rebuilding it as one serial graph. Partition the 10M items into independent shards, for example by category or embedding-space clustering, and build one HNSW graph per shard concurrently on a worker fleet. Add a small routing layer that probes the top N shards for each query and merges results. Build the next daily version in the background, validate recall/latency against the current version, then hot-swap the shard manifest atomically. For items whose embeddings change between daily builds, maintain a small delta HNSW index and query it alongside the base shards until the next full rebuild. This cuts wall-clock time through sharding and concurrency while preserving HNSW semantics.
  common_mistake: |
    **The Pitfall:** Running the HNSW build sequentially on a single CPU server.
    **The Rationale:** HNSW construction involves expensive graph insertions and random memory access; a single builder leaves CPU cores, memory bandwidth, and independent partitions underused.
    **The Consequence:** The build is completely choked by CPU memory bandwidth limits for random accesses, taking 4 hours and leaving production models stale.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current single-machine HNSW rebuild time is 4 hours for 10M items.
    - Split the corpus into 16 shards of about 625K items each.
    - Build shards concurrently on 16 workers, then validate and publish a manifest.

    **Calculations:**
    - Ideal shard-parallel wall time: 4 hours / 16 = 15 minutes if build work scales roughly with item count.
    - Add validation, shard manifest generation, upload, and hot-swap checks: about 10 minutes.
    - Estimated rebuild wall time: 15 + 10 = 25 minutes.
    - Delta index for same-day embedding changes avoids exposing a stale-only base index while the next full shard build runs.

    **Conclusion & Interpretation:**
    - **Result: 16-way shard-parallel HNSW rebuild plus validation can meet a sub-30-minute target.** The tradeoff is a routing/merge layer and recall validation across shards, not a switch to a different ANN index family.
