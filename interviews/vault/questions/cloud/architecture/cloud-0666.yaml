title: Cost per Token for 7B Serving on TPU v5e vs H100
scenario: Your company is choosing between a TPU v5e pod and an equivalent H100 cluster for serving a 7B parameter model. The TPU v5e costs $1.20/chip-hour and the H100 costs $3.50/GPU-hour. The PM says 'TPU is obviously cheaper.'
question: Why isn't choosing TPU v5e over H100 for serving a 7B model just a $/chip-hour comparison?
details:
  realistic_solution: The correct metric is cost per token at the target latency and quality, not raw chip-hour price. TPU v5e has 16GB HBM, so a 7B FP16 model leaves very little room for KV-cache and batching unless you shard or quantize. H100 has 80GB HBM, so the same model can use larger batches and keep the accelerator busier. In the measured example, H100 is about 3.4x cheaper per token despite the higher hourly price because it sustains 10x more tokens per hour under the SLA.
  common_mistake: |
    **The Pitfall:** Comparing raw $/chip-hour without considering memory capacity.
    **The Rationale:** Assuming compute costs scale linearly with chip price for inference.
    **The Consequence:** Designing deployments with horrible per-token economics because memory limits severely restrict batch sizes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 weights: 7B * 2 bytes = 14 GB before runtime overhead.
    - H100 price: $3.50/GPU-hour. TPU v5e price: $1.20/chip-hour.
    - Example measured throughput at the SLA: H100 = 50M tokens/hour, TPU v5e = 5M tokens/hour because limited HBM constrains batching.

    **Calculations:**
    - H100 cost per 1M tokens = $3.50 / 50 = $0.070.
    - TPU v5e cost per 1M tokens = $1.20 / 5 = $0.240.
    - TPU chip-hour is 3.50 / 1.20 ≈ 2.9x cheaper, but in this serving regime it produces 50 / 5 = 10x fewer tokens per hour.

    **Conclusion & Interpretation:**
    - **Result: H100 wins by about 3.4x on cost per token in this example despite the higher hourly price**. The decision depends on measured tokens/hour under the SLA; HBM capacity and batching can dominate $/chip-hour.
