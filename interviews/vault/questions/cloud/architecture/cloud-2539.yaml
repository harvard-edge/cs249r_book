title: Choose GPUs vs Wafer-Scale Engine for 13B Model Serving
scenario: Your startup must choose between a 16-GPU cluster ($400K) and 1 Wafer-Scale Engine ($2M) for serving a 13B model. Daily traffic is 10M requests at 200 tokens each.
question: For 10M daily 200-token requests on a 13B model, should the startup choose the GPUs or the WSE, and why?
details:
  realistic_solution: |
    Choose the 16-GPU cluster unless the product has a separate ultra-low-latency SLA that the GPUs cannot meet in benchmark. The stated workload is a sustained throughput problem: 10M requests/day at 200 tokens each is about 23k output tokens/s on average. A 13B FP16 model has about 26GB of weights, but serving also needs KV cache, runtime memory, and batching headroom, so capacity should be planned from measured tokens/s at the target batch size rather than from weights divided by memory bandwidth.

    The 16-GPU option needs roughly 1.45k tokens/s per GPU on average before headroom. If benchmarked continuous batching meets that target with acceptable p95 latency and KV-cache memory, the GPU cluster is the lower-cost choice. The WSE may be valuable for very low batch, very tight latency, or specialized compiler/runtime requirements, but the prompt gives no such SLA; paying 5x the capital cost for unneeded latency is not justified by the throughput workload alone.
  common_mistake: |
    **The Pitfall:** Choosing the WSE for throughput workloads where batching on GPUs is sufficient.
    **The Rationale:** The WSE excels at latency-sensitive, small-batch inference. Bulk throughput amortizes memory access cost on GPUs.
    **The Consequence:** The startup spends 5x more capital without realizing proportional benefits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 10M requests/day, 200 tokens each.
    - GPUs: 16 units, $400K total.
    - WSE: $2M total.
    - Compare the same utilization window and a 3-year useful life for capital amortization.
    - GPU serving decision requires measured per-GPU throughput at the chosen batch size; do not estimate decode time as model bytes divided by HBM bandwidth.

    **Calculations:**
    - Daily load: 10M * 200 = 2B tokens/day.
    - Average throughput required: 2B / 86,400 = 23,148 tokens/s.
    - Required average per GPU on a 16-GPU cluster: 23,148 / 16 = 1,447 tokens/s before redundancy and peak headroom.
    - 13B FP16 weights: 13B parameters * 2 bytes = 26GB; KV cache and batching consume additional memory, so the serving benchmark must include the target context and batch mix.
    - 3-year amortized GPU capex: $400K / (3 * 365 * 24) = $15.22/hr.
    - 3-year amortized WSE capex: $2M / (3 * 365 * 24) = $76.10/hr.
    - At the same 2B tokens/day, WSE capex per served token is 5x the GPU option before power, hosting, and utilization effects.

    **Conclusion & Interpretation:**
    - **Result: choose GPUs for the stated throughput workload.** The GPU cluster is the cheaper architecture if it benchmarks at roughly 1.45k tokens/s/GPU plus headroom; the WSE is only justified by an additional latency or utilization requirement not given in the prompt.
