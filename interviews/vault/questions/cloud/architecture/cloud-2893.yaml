title: Analyze inverted residual bottleneck memory access patterns on A100
scenario: You are analyzing MobileNetV2's inverted residual block (expand->depthwise->project, expansion ratio t=6) running on A100. The block takes 112x112x32 feature maps. A performance engineer claims the expand layer is the bottleneck.
question: Is the MobileNetV2 expand layer the bottleneck for 112x112x32 inputs on A100, or are depthwise/project layers more bandwidth-bound?
details:
  realistic_solution: |
    Use the same memory model for each layer: read input activation, read weights once, and write output activation in FP16. Expand (1x1) maps 32 channels to 192 channels and does about 154M FLOPs. Its arithmetic intensity is roughly 154M FLOPs / 5.6 MB = 27 FLOP/byte, below the A100 ridge point but much higher than depthwise. Depthwise (3x3) over 192 channels does about 43M FLOPs and moves roughly 9.7 MB, or about 4.4 FLOP/byte, making it the most bandwidth-bound. Project (1x1) maps 192 channels back to 32 and does about 154M FLOPs over about 5.6 MB, also around 27 FLOP/byte. The expand layer creates the large intermediate tensor, but the depthwise layer is the clearest bandwidth bottleneck; project can also be memory-sensitive, while expand is not the main bottleneck relative to depthwise.
  common_mistake: |
    **The Pitfall:** Assuming the depthwise conv is always the bottleneck because it has the most spatial work.
    **The Rationale:** Candidates ignore that the 1x1 expand conv generates large intermediate tensors that stress memory bandwidth.
    **The Consequence:** The wrong layer is targeted for optimization, leaving the actual memory bottlenecks unaddressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 Ridge Point: 312 TFLOPS / 2 TB/s = 156 FLOP/byte.
    - Inputs: 112x112x32 feature maps.

    **Calculations:**
    - Input activation: 112 * 112 * 32 * 2 bytes = 0.80 MB.
    - Expanded activation: 112 * 112 * 192 * 2 bytes = 4.82 MB.
    - Expand (1x1): 2 * 112 * 112 * 32 * 192 = 154M FLOPs; bytes ≈ 0.80 MB input + 0.012 MB weights + 4.82 MB output = 5.63 MB; intensity ≈ 27 FLOP/byte.
    - Depthwise (3x3): 2 * 112 * 112 * 192 * 9 = 43M FLOPs; bytes ≈ 4.82 MB input + 0.003 MB weights + 4.82 MB output = 9.64 MB; intensity ≈ 4.5 FLOP/byte.
    - Project (1x1): 154M FLOPs; bytes ≈ 4.82 MB input + 0.012 MB weights + 0.80 MB output = 5.63 MB; intensity ≈ 27 FLOP/byte.

    **Conclusion & Interpretation:**
    - **Result: Depthwise Is Most Bandwidth-Bound**. All three are below the ideal A100 ridge point under this simple HBM model, but depthwise has far lower arithmetic intensity than expand/project, so the expand layer should not be singled out as the bottleneck.
