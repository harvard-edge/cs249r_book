title: Depth vs Width for Limited Compute Budget
scenario: 'You have a fixed compute budget of 1 GFLOP per inference. Option A: deep narrow network (20 layers, 64 filters each, ~0.9 GFLOP). Option B: shallow wide network (5 layers, 256 filters each, ~1.0 GFLOP). Both train on CIFAR-10.'
question: Which architecture achieves better accuracy under the 1 GFLOP constraint, and what structural components are necessary for it to train successfully?
details:
  realistic_solution: |
    FLOPs alone do not determine the accuracy winner. Option A (20-layer, 64-filter) can be the better candidate if it uses residual/skip connections, normalization, and an optimizer setup that makes the added depth train reliably. Without those structural components, the deep narrow model can suffer vanishing gradients or poor optimization, and Option B may be the more reliable model despite being shallower. The release-quality answer is conditional: require empirical validation under the same training recipe, and treat skip connections/normalization as necessary for Option A rather than claiming that depth universally wins.
  common_mistake: |
    **The Pitfall:** Ignoring that very deep narrow networks may train poorly or unreliably without skip connections.
    **The Rationale:** Engineers assume depth automatically equals better performance based on theoretical efficiency, forgetting the practical issue of vanishing gradients.
    **The Consequence:** The 20-layer network may underperform in practice, making the theoretically superior architecture less reliable than the shallow network.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 GFLOP budget. CIFAR-10 task.
    - Option A: 20 layers, 64 filters. Option B: 5 layers, 256 filters.
    - No empirical accuracy measurements are provided in the prompt.

    **Calculations:**
    - Both options fit the stated compute budget, so the deciding factor is trainability and representational efficiency.
    - A 20-layer network needs residual/skip connections or similar normalization/optimization support to avoid vanishing-gradient training failure.
    - If Option A includes skip connections, it becomes a plausible candidate because the extra depth can learn hierarchical features.
    - If Option A does not include skip connections, Option B is more likely to train successfully despite being shallower.
    - No accuracy measurements are provided, so the final choice must be validated empirically rather than inferred from FLOPs alone.

    **Conclusion & Interpretation:**
    - **Result: Accuracy is not determined from FLOPs alone.** Option A is viable only with residual/skip-connected training support; otherwise Option B is the safer choice, and the final winner requires validation data.
