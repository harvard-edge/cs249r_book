title: Design a FLOP-accuracy Pareto frontier experiment for MobileNet family selection
scenario: Your ML platform team needs to select a CNN backbone for a cloud-based product classification service targeting 200K QPS at 80% top-5 accuracy on a 1000-class taxonomy. Budget is 4 A100 nodes (32 GPUs total). You must design an experiment to find the Pareto-optimal model on the FLOP-accuracy frontier, including which architectures to test and how to measure serving cost.
question: How would you design the model-selection experiment to find the FLOP-accuracy Pareto frontier and serving cost for 200K QPS on 32 A100s?
details:
  realistic_solution: 'Test grid: MobileNetV3-Small/Large, EfficientNet-B0/B2/B4, RegNetX-400MF/800MF/1.6GF. For each: (1) measure ImageNet top-5 accuracy, (2) measure throughput at batch={16,32,64,128} on single A100, (3) compute cost = 1/throughput × GPU-hour rate. Plot accuracy vs. images/(GPU·sec). Add TensorRT INT8 variants for each model. Pareto frontier is set of models where no other model achieves both higher accuracy and lower cost.'
  common_mistake: |
    **The Pitfall:** Testing models only at their default input resolution and batch size.
    **The Rationale:** Overlooking how hardware utilization scales non-linearly with batch size and resolution.
    **The Consequence:** Missing the optimal operating point on the Pareto frontier, leading to suboptimal model selection and massive cloud waste.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target QPS: 200,000 across 32 A100 GPUs (6,250 QPS/GPU).
    - GPU rate: $3/GPU-hr.
    - Models: MobileNetV3, EfficientNet, RegNetX.

    **Calculations:**
    - FP16 EfficientNet-B0 throughput: ~2,800 QPS/GPU (Insufficient).
    - FP16 MobileNetV3 throughput: ~3,500 QPS/GPU (Insufficient).
    - INT8 quantized throughput (2-3x boost): ~7,000 QPS/GPU (Sufficient).
    - Hourly cost: 32 GPUs × $3/hr = $96/hr.
    - Cost per million queries: $96 / (200,000 × 3600 / 1e6) = $96 / 720 = $0.13.

    **Conclusion & Interpretation:**
    - **Result: Throughput-Bound**. Only INT8 quantized models meet the 6,250 QPS/GPU threshold, achieving $0.13 per million queries.
