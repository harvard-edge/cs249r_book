title: KV Cache Memory Per Token
scenario: 'A 70B parameter transformer LLM has 80 layers, 64 attention heads, and a head dimension of 128.'
question: 'What is the BF16 KV cache memory per token with 8 KV heads, and the total cache for a 4096-token context?'
details:
  realistic_solution: 'Per token per layer: 2 (K+V) × 8 KV heads × 128 dims × 2 bytes = 4,096 bytes = 4 KiB. Across 80 layers: 4 KiB × 80 = 320 KiB per token. For 4096 tokens: 320 KiB × 4096 = 1,310,720 KiB = 1.25 GiB.'
  common_mistake: |
    **The Pitfall:** Using the full 64 attention heads in the calculation instead of the 8 GQA KV heads.
    **The Rationale:** Candidates forget that Grouped-Query Attention (GQA) specifically reduces KV cache size by sharing KV heads across multiple query groups.
    **The Consequence:** Overestimating the KV cache size by a factor of 8, leading to inefficient resource allocation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 layers, 8 KV heads, 128 head dim, BF16 (2 bytes).
    - 4096 context length.

    **Calculations:**
    - Per-token per-layer memory: 2 (K+V) * 8 heads * 128 dim * 2 bytes = 4,096 bytes (4 KiB).
    - Memory across 80 layers: 4 KiB * 80 = 320 KiB per token.
    - Total KV cache for 4096 tokens: 320 KiB * 4096 = 1,310,720 KiB.
    - Convert to GiB: 1,310,720 KiB / 1024 / 1024 = 1.25 GiB.

    **Conclusion & Interpretation:**
    - **Result: Total KV cache is 1.25 GiB per sequence (Memory-Bound)**.
  options:
  - '~40 KiB per token, ~160 MiB for 4K context.'
  - '~320 KiB per token, ~1.25 GiB for 4K context.'
  - '~2.5 MiB per token, ~10 GiB for 4K context.'
  - '~5 MiB per token, ~20 GiB for 4K context.'
