title: Cloud Wafer Scale Engine L3 0
scenario: 'A WSE-2 has 40 GB of on-chip SRAM and 850K cores. You want to run a 13B parameter model in FP16.'
question: 'Does a 13B FP16 model fit in WSE-2''s 40 GB SRAM, and how much faster is SRAM-speed access than HBM for decode?'
details:
  realistic_solution: '13B parameters in FP16: 13B × 2 bytes = 26 GB. WSE-2 has 40 GB SRAM -> model fits with 14 GB remaining for activations. SRAM bandwidth: ~27.5 PB/s across all cores (each core has local SRAM at register-file speeds). Effective per-weight access: ~1 ns. Compare H100 HBM: 3.35 TB/s, access latency ~100 ns. For decode (memory-bound): WSE reads 26 GB from SRAM at ~27.5 PB/s -> 0.95 µs per token. H100 reads 26 GB from HBM at 3.35 TB/s -> 7.76 ms per token. WSE is ~8000x faster for pure memory-bound decode.'
  common_mistake: |
    **The Pitfall:** Assuming the WSE bandwidth advantage uniformly applies to all workloads.
    **The Rationale:** Candidates generalize the decode memory speedup to compute-bound operations.
    **The Consequence:** Falsely assuming the WSE will beat GPUs on large batch matmuls, where raw FLOPS (not memory bandwidth) is the bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13B parameters in FP16 (2 bytes/param).
       - WSE-2 SRAM: 40 GB, ~27.5 PB/s bandwidth.
       - H100 HBM: 3.35 TB/s bandwidth.
    2. **Calculations:**
       - Model Memory = 13e9 * 2 bytes = 26 GB (Fits in 40 GB SRAM).
       - WSE Decode Time = 26 GB / 27.5 PB/s = ~0.95 µs per token.
       - H100 Decode Time = 26 GB / 3.35 TB/s = ~7.76 ms per token.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound**. WSE memory access is ~8,000x faster than HBM for memory-bound autoregressive decode.
