title: WSE-2 13B FP16 SRAM Fit and HBM Decode Speedup
scenario: A WSE-2 has 40 GB of on-chip SRAM and 850K cores. You want to run a 13B parameter model in FP16.
question: Does a 13B FP16 model fit in WSE-2's 40 GB SRAM, and how much faster is SRAM-speed access than HBM for decode?
details:
  realistic_solution: '13B parameters in FP16: 13B × 2 bytes = 26 GB. WSE-2 has 40 GB SRAM, so the model weights fit with about 14 GB remaining for activations and runtime state. For a bandwidth-bound decode step that streams the full 26 GB of weights once per generated token, compare aggregate SRAM bandwidth (~27.5 PB/s) with H100 HBM bandwidth (3.35 TB/s). The WSE streaming time is 26 GB / 27.5 PB/s ≈ 0.95 µs, while the HBM streaming time is 26 GB / 3.35 TB/s ≈ 7.76 ms. That is a bandwidth-ratio speedup of about 8,200x for this pure weight-streaming model; real decode speedup can be lower if compute, routing, batching, or non-weight state dominates.'
  common_mistake: |
    **The Pitfall:** Assuming the WSE bandwidth advantage uniformly applies to all workloads.
    **The Rationale:** Candidates generalize the decode memory speedup to compute-bound operations.
    **The Consequence:** Falsely assuming the WSE will beat GPUs on large batch matmuls, where raw FLOPS (not memory bandwidth) is the bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13B parameters in FP16 (2 bytes/param).
       - WSE-2 SRAM: 40 GB, ~27.5 PB/s bandwidth.
       - H100 HBM: 3.35 TB/s bandwidth.
    2. **Calculations:**
       - Model Memory = 13e9 * 2 bytes = 26 GB (Fits in 40 GB SRAM).
       - Under a full-weight-streaming decode assumption, WSE streaming time = 26 GB / 27.5 PB/s = ~0.95 µs per token.
       - H100 HBM streaming time = 26 GB / 3.35 TB/s = ~7.76 ms per token.
       - Bandwidth ratio = 27.5 PB/s / 3.35 TB/s ≈ 8,200x.
    3. **Conclusion & Interpretation:** **Result: SRAM bandwidth is ~8,200x higher than HBM bandwidth for this full-weight-streaming decode model.** The 26 GB calculation is a weight-streaming estimate, not a universal per-token latency guarantee.
