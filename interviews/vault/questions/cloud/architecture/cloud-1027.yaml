title: Evaluating 3D vs Factorized Convolutions for Video
scenario: Your team is deploying a video action recognition model in the cloud. The input is 32 frames of 1080p video encoded in FP16. The research team proposes a 3D ResNet architecture utilizing standard 3x3x3 spatial-temporal convolutions. During initial load testing, the inference service frequently hits OOM errors and exhibits unacceptably high latency.
question: Should you retain the standard 3D ResNet on 16GB T4s or replace it with factorized (2D spatial + 1D temporal) convolutions, and why?
details:
  realistic_solution: |
    Replace the standard 3x3x3 convolutions with a (2+1)D factorized architecture if the accuracy tradeoff is acceptable, because it can reduce parameters and MACs for the convolution blocks. Do not treat that as a complete 16GB OOM fix: activation memory for 32 frames of 1080p FP16 video is dominated by input and feature maps, so the deployment should also use lower resolution or shorter clips, mixed precision throughout, activation/checkpointing or streaming where applicable, and measured batch sizing. Factorization is a compute/latency improvement, while memory fit still requires explicit activation-memory controls.
  common_mistake: |
    **The Pitfall:** Suggesting generic techniques like quantization or pruning to fit the model.
    **The Rationale:** Engineers default to standard model compression toolkits.
    **The Consequence:** Failing to evaluate how factorizing the convolution fundamentally improves the arithmetic intensity and drastically reduces the activation memory footprint required by 3D processing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compare one 3x3x3 convolution with C input and C output channels to a factorized 3x3 spatial convolution plus 3-tap temporal convolution.
    - Factorized savings depend on the intermediate channel count C_mid; they are not a fixed 27/12 ratio.

    **Calculations:**
    - Standard 3D conv parameters/MACs per output location: 3 * 3 * 3 * C * C = 27C^2.
    - Factorized parameters/MACs per output location: (3 * 3 * C * C_mid) + (3 * C_mid * C) = 12CC_mid.
    - If C_mid = C, reduction = 27C^2 / 12C^2 = 2.25x for the convolution math.
    - Raw input alone is 32 * 1920 * 1080 * 3 * 2 bytes ≈ 398 MB before any feature maps, batches, workspaces, or model activations.

    **Conclusion & Interpretation:**
    - **Result: Compute improvement, not guaranteed memory fit.** Factorization can reduce convolution MACs, but 16GB OOM must be addressed by controlling activation footprint and video resolution/clip length.
