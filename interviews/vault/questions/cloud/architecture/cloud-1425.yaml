title: Diagnosing HBM-to-SRAM Integration Bottlenecks in Attention
scenario: You are deploying a large Transformer model on an NVIDIA H100 GPU. Profiling reveals that standard Attention kernels are severely underutilizing the 989 TFLOPs (FP16) Tensor Cores. Furthermore, power consumption spikes during data transfers between HBM and SRAM rather than during matrix multiplications.
question: What is the HBM-SRAM integration bottleneck in standard attention on H100, and what optimization keeps Tensor Cores fed?
details:
  realistic_solution: Implement an IO-aware fused attention kernel like FlashAttention that tiles the Q, K, and V matrices to fit in the GPU's SRAM (shared memory). By computing softmax incrementally in SRAM, the 4096x4096 intermediate attention matrix (~33.5MB per head) never materializes to HBM. Across 32 heads, this saves ~4.2GB of HBM traffic per layer, bypassing the memory bandwidth bottleneck and allowing the 989 TFLOPS compute to be utilized.
  common_mistake: |
    **The Pitfall:** Suggesting hardware upgrades (faster HBM) or model pruning to solve low utilization.
    **The Rationale:** Candidates fail to realize that standard attention creates a massive O(N^2) intermediate matrix that must be read/written to memory, creating an IO bottleneck.
    **The Consequence:** Implementing complex infrastructure changes without addressing the fundamental algorithmic memory-bound flaw.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence length (N): 4096.
       - Precision: FP16 (2 bytes).
       - Heads: 32.
    2. **Calculations:**
       - Intermediate attention matrix size (per head): 4096 * 4096 * 2 bytes = ~33.5 MB.
       - HBM traffic per head: Storing and reloading for softmax/V-multiplication requires ~134 MB.
       - HBM traffic saved across 32 heads: 134 MB * 32 = ~4.2 GB per layer.
    3. **Conclusion & Interpretation:**
       - **Result: IO-Bound. Across 32 heads, tiling in SRAM (FlashAttention) saves ~4.2 GB of HBM traffic per layer, bypassing the bottleneck entirely.**
