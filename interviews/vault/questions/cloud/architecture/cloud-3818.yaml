title: 'MoE vs Dense: Cost-per-Token Comparison for Training'
scenario: You must choose between training a dense 70B model on 2T tokens or a top-2 MoE 8x70B model that reaches the same quality in 40% fewer tokens. Use 6 × active parameters FLOP/token, 1 PFLOP/s peak per GPU, and MFU of 45% for dense and 35% for MoE.
question: How do the dense 70B and MoE 8x70B options compare in total GPU-hours and cost at $2/GPU-hour?
details:
  realistic_solution: Compute the comparison from active FLOPs, tokens, and MFU. The dense 70B run uses 6 × 70B = 420 GFLOP/token over 2T tokens, for 8.4e23 FLOP. The MoE 8x70B with top-2 uses 6 × 140B = 840 GFLOP/token, but trains on 40% fewer tokens, so 1.2T tokens and about 1.008e24 FLOP. Assuming 1 PFLOP/s peak per GPU, dense at 45% MFU takes about 518K GPU-hours and costs about $1.04M at $2/GPU-hour. MoE at 35% MFU takes about 800K GPU-hours and costs about $1.60M. Under these assumptions the MoE is about 54% more expensive, despite fewer tokens, because active parameters double and MFU is lower.'
  common_mistake: |
    **The Pitfall:** Only comparing total training tokens or peak FLOPS without accounting for network overhead.
    **The Rationale:** Candidates often assume that fewer training tokens automatically equals cheaper training.
    **The Consequence:** They underestimate the total training cost because MoE requires more GPUs for memory capacity and suffers lower MFU due to All-to-All communication bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 70B FLOPs/token = 6 * 70B = 420 GFLOP.
    - MoE 8x70B (top-2) FLOPs/token = 6 * 140B = 840 GFLOP.
    - Dense tokens = 2T. MoE tokens = 1.2T.
    - Hardware at 45% MFU (Dense) vs 35% MFU (MoE).
    - Peak throughput: 1 PFLOP/s per GPU.

    **Calculations:**
    - Dense total FLOPs: 420e9 * 2e12 = 8.4e23 FLOPs.
    - MoE total FLOPs: 840e9 * 1.2e12 = 1.008e24 FLOPs.
    - Dense effective throughput: 1e15 * 0.45 = 4.5e14 FLOP/s.
    - MoE effective throughput: 1e15 * 0.35 = 3.5e14 FLOP/s.
    - Dense GPU-hours: 8.4e23 / 4.5e14 / 3600 ≈ 518K, cost ≈ $1.04M.
    - MoE GPU-hours: 1.008e24 / 3.5e14 / 3600 ≈ 800K, cost ≈ $1.60M.

    **Conclusion & Interpretation:**
    - **Result: About 54% more expensive under these assumptions.** MoE uses fewer tokens, but doubled active FLOPs/token and lower MFU raise total GPU-hours and cost.
