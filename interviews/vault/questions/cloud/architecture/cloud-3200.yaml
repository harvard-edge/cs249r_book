title: MoE Fine-Grained Expert Parallelism Communication
scenario: You are scaling a 256-expert MoE model across 32 nodes (256 H100 GPUs total, 1 expert per GPU).
  Within a node, GPUs communicate via NVLink (900 GB/s). Between nodes, InfiniBand NDR (400 Gb/s = 50
  GB/s). Specify the communication constraints for the all-to-all expert dispatch.
question: What communication constraints and placement rules should the all-to-all expert dispatch use
  across 32 H100 nodes with NVLink and NDR?
details:
  realistic_solution: 'With 1 expert per GPU across 32 nodes, a token routed to a remote expert must traverse
    InfiniBand at 50 GB/s vs NVLink at 900 GB/s (18× slower). For a 7168-dim BF16 hidden state (14.3 KB
    per token), intra-node transfer: 14.3 KB / 900 GB/s = 16 ns. Inter-node transfer: 14.3 KB / 50 GB/s
    = 286 ns + ~1μs network latency = ~1.3 μs per token. For a batch of 4096 tokens with top-8 routing,
    each token sends to 8 experts. In the worst case, all 8 are remote: 4096 × 8 × 14.3 KB = 469 MB per
    direction, taking 469 MB / 50 GB/s = 9.4ms per direction over IB. Specification: (1) Place co-activated
    experts (identified by routing correlation analysis) on the same node. (2) Implement hierarchical
    all-to-all: resolve intra-node routing first (NVLink), then inter-node (IB). (3) Overlap inter-node
    all-to-all with local expert computation. (4) Target <20% of routing being cross-node.'
  common_mistake: '**The Pitfall:** Treating all-to-all as if all links have uniform bandwidth.

    **The Rationale:** Failing to recognize the 18x bandwidth gap between intra-node NVLink and inter-node
    InfiniBand.

    **The Consequence:** This fundamentally changes how you must place experts, leading to massive network
    bottlenecks if ignored.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Hidden state: 7168 dim x 2B = 14.3 KB.

    - NVLink bandwidth: 900 GB/s.

    - InfiniBand (IB) bandwidth: 50 GB/s, latency ~1us.

    - Batch all-to-all worst case size: 469 MB.


    **Calculations:**

    - NVLink time per token: 14.3 KB / 900 GB/s = 16 ns.

    - IB time per token: 14.3 KB / 50 GB/s + 1us = ~1.3 us.

    - Latency Ratio: 1.3 us / 16 ns = ~81x.

    - Batch all-to-all (worst case) IB transfer: 469 MB / 50 GB/s = 9.4 ms.


    **Conclusion & Interpretation:**

    - **Result: Network-Bound.** The target is <2ms, which must be achieved by keeping 80% routing intra-node.

    '
