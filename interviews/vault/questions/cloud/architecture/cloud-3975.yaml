title: Attention Resolution Budget For ViT Serving
scenario: A cloud vision API serves a ViT with 256 image patches at 20 ms per request. A customer asks for 2x higher image width and height, which creates 4x as many patches. The attention portion is 40% of latency and scales quadratically with patch count, while the rest scales linearly with patch count.
question: What latency should you expect when a 256-patch ViT doubles image width and height under a 200 ms SLO?
details:
  realistic_solution: Doubling width and height creates 4x patches. The attention part scales by 4^2 = 16, so its 8 ms share becomes 128 ms. The non-attention part is 12 ms and scales linearly by 4, becoming 48 ms. Total estimated latency is 176 ms, which fits a 200 ms SLO but with only 24 ms headroom.
  common_mistake: |
    **The Pitfall:** Scaling the entire model latency either purely linearly or purely quadratically.
    **The Rationale:** Candidates often forget that transformer architectures have both O(N) components (MLP, layernorm) and O(N^2) components (attention).
    **The Consequence:** Linearly scaling yields an underestimate of 80 ms, while quadratic scaling yields an overestimate of 320 ms, leading to incorrect capacity planning.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 patches at 20ms. Attention is 40% (8ms), non-attention is 60% (12ms).
    - 4x patches (2x width/height).

    **Calculations:**
    - Scaling: Attention scales quadratically (4^2 = 16x). Non-attention linearly (4x).
    - New Attention: 8ms * 16 = 128ms.
    - New Non-attention: 12ms * 4 = 48ms.
    - Total New Latency: 128ms + 48ms = 176ms.

    **Conclusion & Interpretation:**
    - **Result: 176ms total latency (Compute-Bound)**. Heavily dominated by the O(N^2) attention scaling.
