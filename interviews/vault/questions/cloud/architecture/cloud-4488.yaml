title: 'Recall Metric Selection for Production Retrieval Evaluation'
scenario: 'A retrieval team uses Recall @K as their primary offline metric. An engineer proposes switching to NDCG @K to better align with the final ranking stage output. Another proposes Hit Rate @K.'
question: 'How do Recall @K, NDCG @K, and Hit Rate @K compare for evaluating the retrieval stage?'
details:
  realistic_solution: 'Metric comparison: (1) Recall @K: measures fraction of relevant items that appear in top-K retrieved. Directly evaluates retrieval''s job: ensure relevant items are available for downstream ranking. K should match the number of items passed to the next stage. If retrieval passes 10K to light ranker: Recall @10K is the correct metric. Limitation: treats all relevant items equally regardless of rank within the retrieved set. (2) NDCG @K: measures ranking quality. For retrieval, ordering within the top-K matters only if you are doing weighted retrieval (e.g., pre-ranked retrieval). Standard ANN retrieval does not guarantee order within top-K. NDCG @K is more appropriate for the ranker, not retrieval. (3) Hit Rate @K: measures whether at least one relevant item appears in top-K. Useful for ''at least one good recommendation'' SLA. Less informative for multi-item recommendation (hit rate is 1 even if only 1 relevant item is retrieved). (4) Recommendation: use Recall @K where K = retrieval output size. Additionally report Mean Reciprocal Rank (MRR) within the retrieved set if retrieval returns a ranked list.'
  common_mistake: |
    **The Pitfall:** Using final ranking metrics like NDCG @K to evaluate retrieval quality.
    **The Rationale:** Engineers assume that since the ultimate product is a ranked list, all sub-components should optimize for rank-aware metrics.
    **The Consequence:** Optimization targets the wrong objective, missing that retrieval's only job is to cast a wide, unranked net for the ranker, not to sort the items perfectly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Recall @10K = 0.70. For 10,000 total relevant items, 7,000 are retrieved.
    - The final ranker selects 20 slots out of 7,000, a ~0.28% selection rate.

    **Calculations:**
    - Improved Recall = 0.90
    - At 90% recall, 9,000 are retrieved (selection rate drops to 0.22%).

    **Conclusion & Interpretation:**
    - **Result: Minimal Impact (Ranker-Bound)**. Improving recall from 70% to 90% has minimal impact if 7,000 items already saturate the ranker's capacity.
