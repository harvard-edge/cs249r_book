title: API Defenses Against Model Extraction
scenario: You serve a proprietary 70B parameter LLM via a cloud API handling 5,000 QPS. Telemetry shows competitors are using shadow-API requests to distill your model via space-filling prompt strategies. You must design a defense mechanism that mitigates model extraction while keeping TTFT (Time To First Token) under 150ms and maintaining output quality for legitimate developers.
question: How would you defend the 70B LLM API against model extraction while keeping TTFT under 150ms?
details:
  realistic_solution: 'Implement a multi-layered, asynchronous defense architecture. First, apply cryptographic watermarking (e.g., Kirchenbauer et al.) to the output logits, which invisibly tags AI-generated text with negligible latency. Second, return truncated logprobs (e.g., top-5 only) and apply slight temperature-based perturbation to obscure the exact probability distribution, hindering high-fidelity distillation. Third, implement an asynchronous anomaly detection pipeline: query embeddings are batched and clustered using an HNSW index to detect systematic space-filling queries (low cosine similarity variance over time) associated with extraction attacks. This tradeoff avoids blocking the critical API path while reliably flagging abusive API keys for subsequent rate-limiting or banning.'
  common_mistake: |
    **The Pitfall:** Applying synchronous query filtering or strict rate limiting based on IP tracking.
    **The Rationale:** Candidates try to block bad actors in real-time on the critical path, ballooning TTFT.
    **The Consequence:** The API violates latency SLAs for legitimate enterprise users, and sophisticated attackers simply rotate IP addresses to bypass naive limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: TTFT < 150 ms.
    - Critical Path TTFT: LLM inference (120 ms) + Watermarking (<1 ms) = 121 ms.
    - Async Path: 5,000 QPS batched every 1s.

    **Calculations:**
    - Embedding 5k queries (MiniLM) on GPU: ~15 ms.
    - HNSW search/update for 5k vectors against a 1M query window: ~10 ms.
    - Total async analysis latency: ~25 ms per second.

    **Conclusion & Interpretation:**
    - **Result: Asynchronous-Compute Bound.** 25ms async latency easily avoids blocking the 150ms TTFT critical path.
