title: MoE Parameter Count vs Active FLOPs Scaling
scenario: You are comparing scaling strategies training a dense 70B model vs an MoE with 70B active parameters and 8x expert multiplier. Both train on the same data and compute budget.
question: "What are the per-token FLOPs and total parameters for the dense 70B and 8x MoE, and why can MoE match quality at lower cost?"
details:
  realistic_solution: Dense 70B Per-token FLOPs = 420 GFLOPs (forward + backward). Total params 70B. MoE 8x70B Per-token FLOPs = 420 GFLOPs (same, only active experts compute). Total params ~560B. MoE decouples parameter count from compute cost, scaling parameters for free in FLOPs at the cost of memory. This matches high parameter quality while utilizing 3.6x less compute cost per token.
  common_mistake: |
    **The Pitfall:** Confusing total parameter count with the actual training FLOPs required.
    **The Rationale:** Candidates assume that because a model has 8x more parameters, it mathematically requires 8x more compute to train per token.
    **The Consequence:** Teams avoid highly efficient MoE architectures, believing they cannot afford the compute, when in reality MoE decouples memory capacity from active compute cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense model: 70B parameters.
       - MoE model: 8x expert multiplier, 70B active parameters.
    2. **Calculations:**
       - Dense 70B FLOPs per token: 6 * 70B = 420 GFLOPs.
       - MoE 8x70B FLOPs per token: 6 * 70B (only active experts compute) = 420 GFLOPs.
       - Total MoE params: 70B * 8 = 560B.
       - Parameter ratio: 560B / 70B = 8x.
       - FLOP ratio: 420 / 420 = 1.0x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Scaling.** MoE achieves identical per-token compute cost while offering 8x the representation capacity, yielding a 2-3x training speedup to iso-quality.
