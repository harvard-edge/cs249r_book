title: 'MoE Memory Footprint: Why Sparse Models Need More VRAM'
scenario: 'Mixtral 8x7B has 46.7B total parameters but only activates ~13B per token (top-2 of 8 experts).'
question: 'How does Mixtral 8x7B''s VRAM requirement compare with a dense 13B model, and why can''t you load only the active 13B parameters?'
details:
  realistic_solution: 'Dense 13B in FP16: 13B x 2B = 26 GB. Mixtral 8x7B in FP16: 46.7B x 2B = 93.4 GB. Despite activating only 13B parameters per token, all 46.7B must be loaded because: (1) the router dynamically selects experts per token — different tokens in the same batch may use different experts, (2) across a batch, all 8 experts are statistically likely to be activated, (3) swapping experts between GPU and CPU memory per-token is impractical (PCIe bandwidth bottleneck).'
  common_mistake: |
    **The Pitfall:** Thinking you only need to load the active parameters into GPU memory.
    **The Rationale:** Candidates conflate computational sparsity (FLOPS) with memory sparsity, forgetting that the router dynamically selects experts per token.
    **The Consequence:** Severely under-provisioning VRAM for MoE models, leading to out-of-memory errors on deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense model: 13B parameters, FP16 (2 bytes/param).
    - MoE model (Mixtral 8x7B): 46.7B parameters, FP16 (2 bytes/param).
    - Active parameters per token: ~13B.

    **Calculations:**
    - Dense 13B FP16 memory: 13B * 2 bytes = 26 GB VRAM.
    - Mixtral 8x7B FP16 memory: 46.7B * 2 bytes = 93.4 GB VRAM.
    - Memory ratio: 93.4 GB / 26 GB = 3.6x.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound**. The MoE requires 3.6x more VRAM because the router dynamically selects experts per token, preventing static unloading, despite having the same active FLOPS as the 13B dense model.
