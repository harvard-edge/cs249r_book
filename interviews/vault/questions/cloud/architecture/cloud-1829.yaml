title: Capacity Reduction and Abstention
scenario: 'You are designing a cloud-based clinical diagnosis model. To prevent training data extraction attacks, you propose early architectural changes: reducing model capacity from 1B to 200M parameters and adding an explicit abstention class for out-of-distribution queries. The original 1B model memorizes 1.5% of the 2,000,000 sensitive training records. Empirical testing shows that the 200M parameter model reduces this memorization by 80%. Additionally, the abstention mechanism successfully identifies and drops 95% of targeted extraction queries.'
question: How many records are vulnerable initially, after capacity reduction, and after adding abstention?
details:
  realistic_solution: |
    The original model leaves 30,000 records vulnerable: 2,000,000 records * 1.5%. Reducing capacity by 80% lowers that to 6,000 memorized records, and the abstention mechanism blocks 95% of targeted extraction attempts, leaving about 300 reachable vulnerable records. The mitigation is to keep the smaller model and make abstention part of the prediction path rather than relying only on external filters.
  common_mistake: |
    **The Pitfall:** Relying solely on post-training output filters or network-level WAFs to block attacks.
    **The Rationale:** Post-hoc security patches are easier to implement than fundamentally altering the model architecture and capacity.
    **The Consequence:** Determined attackers can easily bypass output filters, successfully extracting memorized sensitive data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Dataset: 2,000,000 records.
    - Original Memorization: 1.5%.
    - Capacity reduction lowers memorization by 80%.
    - Abstention blocks 95% of targeted extraction queries.

    **Calculations:**
    - Initial vulnerable records: 2,000,000 * 0.015 = 30,000.
    - After capacity reduction: 30,000 * (1 - 0.80) = 6,000.
    - Final reachable records after abstention: 6,000 * (1 - 0.95) = 300.

    **Conclusion & Interpretation:**
    - **Result: 30,000 initial, 6,000 after capacity reduction, 300 after abstention**. The combined architectural changes yield a 99% reduction in reachable vulnerable records.
