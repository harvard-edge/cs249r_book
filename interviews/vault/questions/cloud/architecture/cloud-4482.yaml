title: Serving Diversity vs Relevance Tradeoff in Re-ranking
scenario: A recommendation system's relevance ranker returns the top 20 items but 18 of 20 are from the
  same content category (fashion). Users are exposed to no diversity.
question: How would you design a re-ranking algorithm that balances relevance and diversity when 18 of
  the top 20 items are fashion?
details:
  realistic_solution: 'Context-adaptive diversity re-ranking: (1) Maximal Marginal Relevance (MMR) iteratively
    select items that maximize lambda * relevance_score - (1-lambda) * similarity_to_already_selected.
    (2) Adaptive lambda: if user session shows single-category browsing, set lambda=0.9 (relevance-heavy).
    (3) Category diversity constraint: hard constraint at most K items from the same category in top N.
    Run greedy selection with category budget. Evaluate via A/B test on unique categories explored.'
  common_mistake: '**The Pitfall:** Applying a rigid, uniform diversity penalty to all users and all contexts.

    **The Rationale:** Candidates implement a basic score deduction for duplicate categories, ignoring
    that some users are in a genuine, high-intent "deep dive" session.

    **The Consequence:** Recommendations degrade for power users actively researching a single topic,
    driving down engagement.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Top K slots: 20.\n   - Candidate pool: ~500 items.\n\
    \   - Embeddings: 128-dim.\n2. **Calculations:**\n   - MMR requires comparing each candidate against\
    \ all previously selected items.\n   - Comparisons: 500*1 + 500*2 + ... + 500*19 = 500 * (19 * 20\
    \ / 2) = 95,000.\n   - Similarity computation (Cosine): 128 FLOPs per comparison.\n   - Total MMR\
    \ Compute: 95,000 * 128 = 12.16 million FLOPs.\n3. **Conclusion & Interpretation:**\n   - **Result:\
    \ Compute-Bound Overhead.** On a 989 TFLOPS chip, 12.16M FLOPs takes ~0.000012ms, a completely negligible\
    \ overhead for dynamic re-ranking.\n"
