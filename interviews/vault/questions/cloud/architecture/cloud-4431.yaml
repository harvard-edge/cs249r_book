title: Reward Model Architecture for RLHF at Scale
scenario: Design a reward model (RM) for an RLHF pipeline fine-tuning a 70B policy model. The RM needs to score completions at 500 QPS during PPO rollouts. You have a budget of 4x GPUs.
question: What reward model size, architecture, and serving strategy would you use to score PPO completions at 500 QPS on a 4x GPU budget?
details:
  realistic_solution: 'A 7B RM is a reasonable quality baseline, but it does not meet 500 QPS on only 4 GPUs for 512-token scoring. Use a smaller distilled RM, about 3B parameters, trained from a stronger 7B-13B RM teacher on preference pairs and hard negatives. Architecture: decoder-only or encoder-style transformer initialized from a pretrained 3B checkpoint, replace the LM head with a scalar reward head over the final token or pooled representation, and calibrate scores per rollout batch. Serving: run four independent 1-GPU replicas in FP8/BF16 with continuous batching, length bucketing, prompt-prefix caching where rollouts share prompts, and backpressure from the PPO rollout workers. This is the smallest plausible 4-GPU design, but it still depends on measured batching efficiency, prefix reuse, or shorter average scored lengths; if validation requires a 7B RM, the target must be lowered or the GPU budget increased.'
  common_mistake: |
    **The Pitfall:** Using the same size model as the policy for the reward model.
    **The Rationale:** Assuming the RM requires identical representational capacity to the 70B policy model.
    **The Consequence:** A 70B RM would require massive compute just to serve, consuming more resources than the policy training itself and missing the latency constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 500 QPS.
    - Budget: 4x H100-class GPUs with FP8-capable serving.
    - RM size: distilled 3B parameters.
    - Sequence length: 512 tokens per completion score.
    - FLOP estimate is for a dense full-sequence transformer forward with a scalar reward head; no autoregressive KV-cache reuse is assumed across different completions.

    **Calculations:**
    - Forward FLOPs per score, using 2 * tokens * params: 2 * 512 * 3B = 3.1T FLOPs.
    - Use ~300 TFLOP/s effective per H100 after short-sequence batching, memory movement, reward-head work, and scheduler overhead.
    - Per-GPU throughput: 300T / 3.1T = ~97 scores/sec.
    - Four replicas: 4 * 97 = ~388 QPS before prefix-cache gains or shorter sequences.
    - A 3B RM can reach 500 QPS only with prefix reuse, shorter average lengths, higher measured utilization, or slight overprovisioning.
    - A 7B RM under the same assumption would be 2 * 512 * 7B = 7.2T FLOPs per score, or only ~42 QPS/GPU and ~168 QPS on 4 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 3B Distilled RM on 4 Replicas.** The size and replica strategy are forced by throughput: 7B is too large for 500 QPS on 4 GPUs, and even 3B needs measured batching efficiency, length control, or prefix caching to close the gap.
