title: Embedding Table Hot Row Replication for Serving
scenario: Your recommendation serving cluster has 16 A100 serving nodes, each with an embedding table shard. Profiling shows that the top-10k rows (out of 50M total) in the user-ID embedding table receive 80% of all lookups. These 10k rows create a hotspot on 2 nodes (they share a row range).
question: How would you replicate the top-10k hot embedding rows across 16 A100 serving nodes, and what read-throughput improvement would that give?
details:
  realistic_solution: 'Dynamic hot-row replication: (1) Monitor per-row access frequency on a sliding 10-minute window. Rows exceeding 100 lookups/minute are promoted to ''hot'' status. (2) Hot rows are replicated to all serving nodes asynchronously (gossip-based or central coordinator push). Replication lag: <5 seconds for hot rows (small data). (3) Routing: a consistent hash ring normally assigns rows to nodes. For replicated hot rows, the router uses load-aware routing — send to the least-loaded node among all nodes holding that row. (4) Invalidation: on embedding update (online learning), broadcast updates for hot rows to all replicas before marking the update complete. Read throughput improvement: currently 2 nodes serve the 80% hot-row traffic. At 200M lookups/s per A100, hot-row service capacity is 2 × 200M = 400M lookups/s. Replicating those rows to all 16 nodes raises hot-row service capacity to 16 × 200M = 3.2B lookups/s, an 8x capacity increase for the hot subset. End-to-end QPS
    improves only if those hot rows were the bottleneck; cold-row capacity and ranking compute do not get an 8x boost.'
  common_mistake: |
    **The Pitfall:** Proposing static replication of all top-10k rows on all 16 nodes upfront.
    **The Rationale:** Candidates assume the hot rows are fixed, failing to consider that popularity changes over time as new users become active.
    **The Consequence:** The system cannot adapt to changing access patterns, leading to new hotspots as user behavior shifts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10k hot rows get 80% of lookups.
       - A100 random HBM access capacity: ~200M lookups/s.
    2. **Calculations:**
       - Hot row lookup rate: Assume 2M QPS * 500 sparse features = 1B lookups/s total.
       - Hotspot load: 80% of lookups go to 10k hot rows = 800M lookups/s.
       - Current hot-row service capacity: 2 nodes at 200M lookup/s each = 400M/s.
       - Replicated hot-row service capacity: 16 nodes * 200M lookup/s = 3.2B/s.
       - Hot-row capacity improvement: 3.2B / 400M = 8x.
       - Cache sizing: At 256 bytes/row * 10k rows = 2.56 MB, which easily fits in the A100 L2 cache (40 MB).
    3. **Conclusion & Interpretation:**
       - **Result: Hotspot-Bound. Replicating hot rows to 16 nodes yields 8x more hot-row read capacity, from 400M/s to 3.2B/s, giving 4x headroom for 800M hot lookups/s. Overall system throughput improves only to the extent hot-row skew was the serving bottleneck.**
