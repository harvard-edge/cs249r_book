title: Transformer Layer FLOP Decomposition
scenario: For a single transformer layer with hidden dimension d = 4096, h = 32 heads, head dimension 128, FFN inner dimension 4d = 16384, and sequence length S = 2048, decompose the total FLOPs into attention and FFN components.
question: How do the attention and FFN FLOPs break down for this layer, and which component dominates?
details:
  realistic_solution: 'Using a MAC convention, attention is about 172B MACs per layer: 137B from Q/K/V/O projections plus 34B from score and value mixing. The FFN is about 275B MACs from the two 4096-to-16384 and 16384-to-4096 matrix multiplies. Total layer compute is about 447B MACs, so the FFN contributes roughly 62% and dominates, though attention is still substantial at long sequence length.'
  common_mistake: |
    **The Pitfall:** Assuming attention dominates because it's the novel part of the transformer architecture.
    **The Rationale:** Engineers focus heavily on attention mechanisms while overlooking the massive fully connected layers.
    **The Consequence:** Misallocating optimization efforts toward attention when the FFN is the actual compute bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dimensions: d=4096, S=2048, FFN inner dimension = 4d = 16384.
    - Convention: count one multiply-add as one MAC. Double every number if reporting hardware FLOPs; the percentages are unchanged.

    **Calculations:**
    - Attention projections (Q,K,V,O): 4 * S * d^2 = 4 * 2048 * 4096^2 = ~137B MACs.
    - Attention score and weighted-sum terms (Q*K, A*V): 2 * S^2 * d = 2 * 2048^2 * 4096 = ~34B MACs.
    - Total attention: ~172B MACs.
    - FFN component: 8 * S * d^2 = 8 * 2048 * 4096^2 = ~275B MACs.
    - Total layer compute: 172B + 275B = ~447B MACs.

    **Conclusion & Interpretation:**
    - **Result: FFN is about 62% of compute (Compute-Bound)**. The fully connected feed-forward networks dominate the computation, consuming nearly 2/3 of the layer compute under this convention.
