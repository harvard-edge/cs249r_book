title: The NVLink PCIe Bottleneck
scenario: You are buying a custom 8-GPU server for training. Vendor A offers 8x RTX 4090s connected entirely via PCIe Gen4 switches. Vendor B offers 8x H100s connected via NVLink and NVSwitch. Vendor A's server is much cheaper, and they claim 'PCIe Gen4 x16 gives 64 GB/s, which is plenty for training.' Why will Vendor A's server fail catastrophically at 8-GPU Data Parallel training compared to Vendor B?
question: Why will Vendor A's server fail catastrophically at 8-GPU Data Parallel training compared to Vendor B?
details:
  realistic_solution: Vendor A's problem is the PCIe fabric bisection bandwidth, not the per-lane marketing number. During AllReduce, all 8 GPUs exchange gradients at the same time, so the bottleneck is the shared PCIe-switch/uplink capacity across the topology. Vendor B's NVLink/NVSwitch fabric provides much higher all-to-all GPU bandwidth and avoids forcing global synchronization traffic through a narrow shared PCIe bisection. The result is not that RTX 4090s cannot train at all, but that 8-GPU data-parallel scaling can collapse when gradient synchronization dominates the step time.
  common_mistake: |
    **The Pitfall:** "PCIe is slower than NVLink." It is slower, but the real issue is the *topology*, not just the raw speed.
    **The Rationale:** Topology restricts total bandwidth.
    **The Consequence:** Training bottlenecks on PCIe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compare global synchronization traffic, not single-link marketing bandwidth.
    - PCIe Gen4 x16 is about 32 GB/s per direction per GPU, but an 8-GPU server can have much lower shared bisection across PCIe switches and CPU uplinks.
    - H100 NVLink/NVSwitch exposes multiple high-bandwidth GPU-to-GPU paths; exact bisection depends on the node generation and fabric configuration.
    **Calculations:**
    - During 8-GPU AllReduce, all GPUs exchange gradients concurrently, so the limiting number is the fabric's effective shared bisection.
    - A PCIe-only 8-GPU topology may advertise 8 * 32 GB/s = 256 GB/s of one-way GPU link bandwidth, but traffic crossing a PCIe switch or CPU boundary can be limited to a smaller shared uplink pool, often around 64-128 GB/s depending on the server wiring.
    - An NVLink/NVSwitch node supplies much higher all-to-all GPU bandwidth and avoids routing every synchronization path through the same PCIe uplinks.
    **Conclusion & Interpretation:**
    Vendor B has far more synchronization bisection bandwidth under comparable 8-GPU training traffic. Vendor A can be much cheaper per GPU but still scale poorly because AllReduce is limited by shared PCIe fabric bandwidth rather than each GPU's local compute.
