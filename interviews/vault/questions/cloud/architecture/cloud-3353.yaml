title: Scaling LLM Inference with Attention Variants
scenario: You are tasked with deploying an LLM for high-throughput inference on a cluster of accelerators with 192 GB HBM memory capacity. The target LLM requires processing sequences with an extreme context length of 128k tokens.
question: "What attention mechanism and context-scaling strategy would you use for 128k-token LLM inference, and how would you justify it quantitatively?"
details:
  realistic_solution: A robust solution requires Grouped-Query Attention (GQA) or Multi-Query Attention (MQA) to drastically reduce the KV cache size, combined with a sparse attention mechanism like Sliding Window Attention (SWA) or RingAttention to manage the quadratic computational complexity. Implementing efficient quantization (e.g., FP8) for the KV cache is also critical to fit the state within the 192 GB HBM limit.
  common_mistake: |
    **The Pitfall:** Proposing standard Multi-Head Attention (MHA) for massive context windows.
    **The Rationale:** Candidates severely underestimate the quadratic memory and computational cost of standard MHA, ignoring how fast the Key-Value (KV) cache grows.
    **The Consequence:** The model instantly throws Out-Of-Memory (OOM) errors during prefill because the KV cache exceeds the hardware's capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model proxy: 60 layers, 80 heads, 128 head_dim, FP16 (2 bytes).
    - Context: 131,072 (128k) tokens.
    - Hardware limit: 192 GB HBM.

    **Calculations:**
    - MHA KV Cache Memory: 60 * (2 * 80 * 128 * 2 bytes) * 131,072 = 322 GB (OOM).
    - GQA KV Cache Memory (8 KV heads): 60 * (2 * 8 * 128 * 2 bytes) * 131,072 = 32.2 GB.
    - MHA Compute Complexity: 4 * (131,072)^2 * 128 FLOPs * 60 * 80 ≈ 42 PFLOPS per token (intractable).
    - SWA Compute Complexity: With window W=4096, complexity drops to O(N * W).

    **Conclusion & Interpretation:**
    - **Result: GQA + SWA (Memory-Capacity and Compute-Bound)**. GQA solves the 322 GB memory OOM, and SWA solves the 42 PFLOPS compute bottleneck.
