title: MoE Dropless (dMoE) Token Processing Guarantee
scenario: Standard MoE architectures drop tokens that exceed an expert's capacity buffer. The 'dropless MoE' (dMoE) approach from Megablocks eliminates token dropping entirely.
question: How does dropless MoE eliminate token dropping, and what are the memory implications on H100 GPUs?
details:
  realistic_solution: 'Traditional MoE pads expert inputs to a fixed capacity (CF × tokens/num_experts), wasting memory on padding and dropping overflow tokens. dMoE (Megablocks) reformulates expert computation as block-sparse matrix multiplications. Instead of dispatching tokens to fixed-size expert buffers, it creates a single sparse matrix where each block corresponds to an expert''s assigned tokens. The sparse matmul processes all tokens without padding or dropping. Memory implications: (1) No padding waste — saves CF overhead (typically 25-50% of expert buffer). (2) Variable-length expert inputs use exactly the memory needed. (3) Requires block-sparse matmul kernels (Triton-based) that achieve ~90% of dense matmul throughput on H100 Tensor Cores. (4) Peak memory depends on actual routing distribution, not worst-case capacity factor. On H100 with Hopper architecture, the block-sparse matmuls leverage the TMA (Tensor Memory Accelerator) for efficient irregular memory access patterns.'
  common_mistake: 'Assuming dropless means each expert has an unlimited buffer. dMoE uses sparse matrix operations to process variable numbers of tokens per expert without padding or dropping.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Traditional MoE capacity factor (CF) = 1.25.
    - Experts (E) = 8, Batch tokens (B) = 1024.
    - Traditional buffer per expert = 1.25 * B / E tokens.

    **Calculations:**
    - Traditional buffer = 1.25 * 1024 / 8 = 160 tokens per expert.
    - Total token-slots allocated = 160 * 8 = 1280 slots for 1024 tokens.
    - Padding waste = 1280 - 1024 = 256 slots (25% waste).
    - dMoE token-slots allocated = exactly 1024 (0% waste).

    **Conclusion & Interpretation:**
    - **Result: 20% savings in expert activation memory (Memory-Capacity-Bound)**. Block-sparse matmuls eliminate padding waste and adapt exactly to dynamic token routing.
