title: TPU MXU Padding Underutilization for Small Dense Layers
scenario: A team is running a custom deep learning model on Cloud TPU v4, which features 128x128 Matrix Multiply Units (MXUs). Profiling reveals that a specific dense layer with input shape [Batch=64, Features=100] and weight matrix [100, 64] is achieving about 25% compute utilization. The layer is fully resident in on-chip SRAM, so memory bandwidth is not the bottleneck.
question: What causes low TPU utilization for the [64,100] x [100,64] dense layer, and how would you fix it?
details:
  realistic_solution: Because the TPU's systolic array is a physical 128x128 grid, the batch and output dimensions are padded to fill the tile even though the useful layer is only `[64,100] x [100,64]`. The operation burns work on zero-padded rows and columns. The solution is to redesign the network dimensions (Batch, Features, Output) to align better with 128-wide MXU tiles, or fuse/batch adjacent work so the tile is filled with useful MACs.
  common_mistake: |
    **The Pitfall:** Diagnosing this as an SRAM bandwidth limitation, CPU-to-accelerator transfer bottleneck, or framework overhead.
    **The Rationale:** Failing to understand how physical fixed-grid MAC arrays handle misaligned tensor dimensions.
    **The Consequence:** Attempting to optimize data loading or caching, which provides zero benefit because the utilization loss is purely due to hardware padding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: [64, 100]. Weights: [100, 64].
    - Hardware padding: Multiples of 128.

    **Calculations:**
    - Useful MACs = 64 * 100 * 64 = 409,600.
    - Hardware padded MACs for a 128x128 output tile across K=100 = 128 * 100 * 128 = 1,638,400.
    - Utilization = 409,600 / 1,638,400 = 25.0%.

    **Conclusion & Interpretation:**
    - **Result: 25.0% utilization (Hardware Padding-Bound)**. About 75% of the output-tile work is wasted on padded rows and columns due to dimension misalignment.
