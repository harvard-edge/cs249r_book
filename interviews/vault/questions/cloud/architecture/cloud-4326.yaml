title: Two-Tower Model vs. DLRM for Retrieval
scenario: 'Compare two-tower (dual encoder) models and DLRM for the retrieval stage of a recommendation pipeline (1B candidates -> 10k). Evaluate on: (1) serving latency at 1M QPS, (2) ability to support feature interactions at retrieval, (3) storage cost for precomputed item embeddings.'
question: Which is appropriate for retrieval vs. ranking?
details:
  realistic_solution: |
    Two-tower computes user and item embeddings independently. Item embeddings are precomputed and indexed (e.g., FAISS). At serving: compute user embedding (~1 ms) + ANN search (~10 ms). DLRM requires a full forward pass for each pair, which is completely infeasible for 1B candidates. Two-tower is mandatory for retrieval; DLRM is appropriate only for ranking.
  common_mistake: |
    **The Pitfall:** Proposing DLRM for the retrieval stage because it captures rich feature interactions.
    **The Rationale:** Engineers correctly recognize DLRM's superior expressive power but ignore the algorithmic complexity constraints of retrieval.
    **The Consequence:** Proposing an architecture that requires O(candidates * model_cost) at inference, which is completely computationally infeasible for 1 billion candidates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Candidates: 1 Billion.
    - DLRM forward pass cost: 10 µs per pair.
    - Two-tower embedding dimension: 64-dim FP32 (4 bytes).

    **Calculations:**
    - DLRM retrieval time: 1B * 10 µs = 10,000 seconds per request.
    - Two-tower index storage: 1B * 64 * 4 bytes = 256 GB.
    - Two-tower retrieval time: 1 ms (forward) + 10 ms (ANN search) = 11 ms.

    **Conclusion & Interpretation:**
    - **Result: 10,000s DLRM Retrieval (Compute-Bound)**. DLRM is computationally infeasible for retrieval (10,000s), making Two-Tower the only viable architecture.
