title: MoE Expert-Choice vs Token-Choice Routing
scenario: Your team is debating between token-choice routing (each token picks its top-k experts) and expert-choice routing (each expert picks its top-k tokens) for a new 64-expert MoE model used for both training and serving.
question: What are the training and serving tradeoffs between token-choice and expert-choice routing for a 64-expert MoE?
details:
  realistic_solution: 'Token-choice: Each token selects top-k experts. Pros: compatible with autoregressive decoding. Cons: requires auxiliary loss, tokens drop if experts overflow. Expert-choice: Each expert selects top-k tokens. Pros: perfect load balance, no token dropping. Cons: routing depends on the full batch, breaking causal autoregressive decoding. For serving LLMs, token-choice is required.'
  common_mistake: |
    **The Pitfall:** Choosing expert-choice routing solely because it guarantees load balance.
    **The Rationale:** Candidates fail to understand that expert-choice relies on the full batch, breaking causal autoregressive decoding.
    **The Consequence:** Designing an architecture that is fundamentally impossible to deploy for real-time LLM inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Capacity Factor (CF): 1.25 for Token-Choice, 1.0 for Expert-Choice.
       - Routing mechanics: Token-Choice requires auxiliary loss and drops tokens; Expert-Choice forces perfect load balance but requires full-batch visibility.
    2. **Calculations:**
       - Token-Choice overhead: 25% memory padding, 5-10% token drop rate.
       - Expert-Choice overhead: 0% padding, 0% drops.
    3. **Conclusion & Interpretation:** **Despite its inefficiencies, Serving Constraints force the use of Token-Choice routing because Expert-Choice breaks causal autoregressive decoding.**
