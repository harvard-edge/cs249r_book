title: 'MoE with Tensor Parallelism: Splitting Experts Across GPUs'
scenario: You have a model with 8 experts where each expert is 25B parameters (50 GB FP16). No single 80 GB GPU can hold even one expert with room for activations. You need tensor parallelism within each expert and expert parallelism across experts. Design the parallelism scheme for 64 GPUs arranged as 8 nodes of 8 GPUs each.
question: How would you lay out tensor parallelism within each 25B-parameter expert and expert parallelism across 64 GPUs?
details:
  realistic_solution: 'Use expert parallelism across the 8 nodes and tensor parallelism only inside each node. Each 25B expert is 50 GB in FP16, so shard one expert 8-way across the 8 GPUs in a node: each GPU stores 50/8 = 6.25 GB of that expert. Map Node 0 to Expert 0, Node 1 to Expert 1, and so on through Node 7 to Expert 7. During MoE layers, route tokens across nodes with expert-parallel All-to-All, then run each selected expert with TP=8 over the node-local NVLink domain. Keep high-frequency TP collectives inside the node; use the slower cross-node fabric for routing traffic. If the model also has dense shared layers, choose a separate dense-layer strategy explicitly, such as replicated dense layers per EP group or an additional tensor/pipeline-parallel layout.'
  common_mistake: |
    **The Pitfall:** Applying Tensor Parallelism (TP) across nodes.
    **The Rationale:** TP requires AllReduce at every layer, which is bandwidth-intensive and must stay within a node (NVLink). Expert parallelism can cross node boundaries.
    **The Consequence:** Massive inter-node communication bottlenecks that stall training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expert size: 25B parameters (50 GB in FP16).
    - Topology: 64 GPUs across 8 nodes (8 GPUs per node).
    - TP=8 within each node across NVLink.
    - EP=8 across nodes, one expert per node.
    - Inference-only weight placement; activation, KV, routing buffers, and framework overhead are not estimated here.

    **Calculations:**
    - Expert weights per GPU (TP=8): 50 GB / 8 = 6.25 GB.
    - Node 0 stores shards of Expert 0, Node 1 stores shards of Expert 1, ..., Node 7 stores shards of Expert 7.
    - TP collectives for an expert stay within the 8-GPU node.
    - EP routing moves token activations across nodes to the node that owns the selected expert.

    **Conclusion & Interpretation:**
    - **Result: TP=8 per expert and EP=8 across experts**. The defensible layout is one expert per node, tensor-parallelized over that node's 8 GPUs, with cross-node All-to-All only for expert routing.
