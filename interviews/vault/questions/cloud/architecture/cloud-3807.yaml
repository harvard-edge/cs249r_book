title: 'Sparse Gating: Softmax vs Sigmoid Router Design'
scenario: 'Traditional MoE uses softmax gating: router scores pass through softmax, then top-k experts are selected. Recent work (e.g., Mixtral, DeepSeekMoE) explores alternatives like sigmoid gating, where each expert independently decides whether to activate.'
question: What are the implications of softmax versus sigmoid gating for load balancing, gradient flow, and expert specialization?
details:
  realistic_solution: 'Softmax creates zero-sum competition; increasing one expert''s score penalizes others, often driving representation collapse. Sigmoid provides independent activation probabilities, enabling fault tolerance through expert redundancy and independent specialization.'
  common_mistake: |
    **The Pitfall:** Thinking softmax and sigmoid gating produce the same routing behavior.
    **The Rationale:** Candidates assume any non-linear activation for routing yields similar expert specialization.
    **The Consequence:** They miss that softmax creates a zero-sum competition between experts, while sigmoid allows independent expert activation and redundancy.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 experts, routing top-2.
    - Softmax output example: [0.3, 0.25, 0.15, 0.1, 0.08, 0.05, 0.04, 0.03].
    - Sigmoid output example: [0.8, 0.7, 0.3, 0.2, 0.1, 0.1, 0.05, 0.05].

    **Calculations:**
    - Softmax normalized weights (top-2): 0.3 / (0.3 + 0.25) = 0.545, and 0.25 / 0.55 = 0.455.
    - Sigmoid normalized weights (top-2): 0.8 / (0.8 + 0.7) = 0.533, and 0.7 / 1.5 = 0.467.
    - Gradient distinction: Softmax derivatives link all scores (competition), Sigmoid derivatives are independent.

    **Conclusion & Interpretation:**
    - **Result: Sigmoid breaks the zero-sum routing competition (Representation-Collapse-Bound)**. Enabling greater expert redundancy.
