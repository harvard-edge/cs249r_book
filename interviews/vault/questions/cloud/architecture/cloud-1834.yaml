title: LLM Extraction Risk and TTFT Tradeoff
scenario: You are architecting a financial advisory LLM serving 10,000 req/sec. You must choose between a single monolithic 70B model or an 8B model paired with a 400M abstention classifier.
question: How do these choices impact susceptibility to data extraction while maintaining TTFT under 300ms?
details:
  realistic_solution: Prefer the 8B generator plus 400M abstention classifier if measured serving latency keeps accepted prompts below the 300ms TTFT SLA. The monolithic 70B model has higher memorization and extraction exposure because it has much more capacity and directly answers adversarial prompts unless guarded elsewhere, and it is harder to keep below 300ms TTFT at 10,000 req/sec. The cascade reduces exposure by rejecting risky prompts before generation and using a lower-capacity generator, while still meeting the SLA if classifier plus 8B prefill latency fits the measured budget.
  common_mistake: |
    **The Pitfall:** Relying solely on prompt engineering or post-generation filtering for security.
    **The Rationale:** Ignoring that large model capacity inherently increases the physical risk of exact training data memorization.
    **The Consequence:** Deploying massive models that are highly susceptible to adversarial data extraction attacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Monolithic option: one 70B generator.
    - Cascade option: 400M abstention classifier before an 8B generator.
    - SLA: 300ms TTFT.
    - Smaller models generally reduce memorization pressure, but extraction risk does not scale linearly with parameter count.
    - Use measured latency budgets rather than fixed universal TTFT constants.

    **Calculations:**
    - Parameter ratio: 70B / 8B = 8.75x, which supports the qualitative direction of lower capacity but not an exact security multiplier.
    - Monolithic 70B path has one large generator call; if measured TTFT is above 300ms at target load, it fails the SLA regardless of the simpler architecture.
    - If measured classifier TTFT is 20ms and measured 8B generator TTFT is 120ms, cascade TTFT for accepted prompts is 20ms + 120ms = 140ms.
    - SLA headroom in that measured example: 300ms - 140ms = 160ms.
    - Rejected prompts pay only the classifier path and avoid exposing the generator to extraction attempts.

    **Conclusion & Interpretation:**
    - **Result: choose the cascade when measured TTFT remains under 300ms.** It has lower qualitative extraction exposure than the 70B monolith and can meet the latency budget in the stated measured example; the monolith is simpler but riskier and must prove sub-300ms TTFT at production load.
