title: Diagnosing Dynamic Ensemble Latency on A10G
scenario: 'A visual QA API uses a dynamic routing ensemble of 3 specialized Vision-Language Models (8GB FP16 each) and a 2GB gating model, deployed on a single 24GB VRAM GPU. The gating model selects one specialized model per request. During a period of highly mixed traffic, P99 latency spikes from 45ms to 685ms, while GPU compute utilization plummets to 20%.'
question: What is causing the 685ms P99 latency with only 20% GPU utilization, and how would you fix it on 24GB instances?
details:
  realistic_solution: 'The total ensemble size (26GB) exceeds the 24GB VRAM, causing PCIe swapping. Apply INT8 quantization to halve model sizes to 4GB, fitting all 14GB in VRAM, or deploy on multi-GPU instances with pinned models.'
  common_mistake: |
    **The Pitfall:** Assuming the models are executing sequentially or that the GPU lacks compute power.
    **The Rationale:** High latency and low utilization can superficially look like a compute scheduling bottleneck.
    **The Consequence:** Suggesting an expensive hardware upgrade instead of diagnosing memory thrashing over PCIe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Models = 3x 8GB + 2GB = 26GB.
    - VRAM limit = 24GB.
    - PCIe bandwidth = ~25 GB/s effective.
    
    **Calculations:**
    - Swap transfer: 8GB out + 8GB in = 16GB.
    - Swap latency: 16GB / 25 GB/s = 640ms.
    - Total latency: 45ms compute + 640ms swap = 685ms.
    
    **Conclusion & Interpretation:**
    - **Result: 685ms (I/O-Bound)**. PCIe swapping breaks real-time constraints; the models exceed VRAM capacity.
