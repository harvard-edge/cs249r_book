title: KV Cache Transfer in Disaggregated Serving
scenario: You are migrating a 70B LLM to a disaggregated serving architecture. Prefill nodes process 2048-token prompts, creating a 2GB KV cache in 300ms. The cache transfers over a 200 Gbps network to decode nodes, which have a Time-Per-Output-Token (TPOT) of 15ms.
question: What end-to-end TTFT does the user see after prefill, 2GB KV transfer over 200 Gbps, and first-token decode?
details:
  realistic_solution: 'To find the TTFT in a disaggregated setup, you must add the prefill compute time, the KV cache transfer time, and the duration of the first decode step. Convert network bandwidth to bytes: 200 Gbps / 8 = 25 GB/s. Transferring the 2GB KV cache takes 80ms. The total TTFT is 300ms (prefill) + 80ms (transfer) + 15ms (first token decode) = 395ms.'
  common_mistake: |
    **The Pitfall:** Failing to convert network bandwidth from bits to bytes during calculation.
    **The Rationale:** Network speeds are marketed in Gbps, while storage/cache sizes are in Gigabytes (GB).
    **The Consequence:** Drastically miscalculating the network transfer overhead (often off by an order of magnitude), leading to violated TTFT SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache Size: 2 GB.
       - Network Bandwidth: 200 Gbps.
       - Prefill compute time: 300 ms.
       - First token decode time: 15 ms.
    2. **Calculations:**
       - Network Bandwidth in Bytes: 200 Gbps / 8 = 25 GB/s.
       - KV Transfer Time: 2 GB / 25 GB/s = 0.08 seconds = 80 ms.
       - Total TTFT: 300 ms (Prefill) + 80 ms (Transfer) + 15 ms (Decode).
       - Total TTFT = 395 ms.
    3. **Conclusion & Interpretation:** **395 ms total TTFT (Network Bandwidth-Bound Transfer).**
