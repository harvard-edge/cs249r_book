title: Distributed Training Throughput for 100TB Embedding Cluster
scenario: A social platform needs to train a recommendation model with 100TB of embedding tables on 1024 GPUs. The system must complete a full epoch (1T training samples) in under 24 hours.
question: How would you design the distributed training architecture and verify whether 1024 GPUs can process 1T samples in under 24 hours?
details:
  realistic_solution: |
    Architecture: (1) Shard the 100TB embedding tables by table and row across a distributed embedding service, with hot rows cached on GPU or local host memory and cold rows served from sharded DRAM/NVMe-backed workers. Avoid a fixed "1000 CPU parameter servers" answer; size the embedding tier from lookup throughput and network bandwidth. (2) Use 1024 GPUs for dense compute, with asynchronous embedding lookup, prefetch, and overlap between lookup, transfer, and MLP forward/backward. (3) Verification: the target is 1T / 24hr = 11.6M samples/sec. At a 64K global batch, the system must complete about 181 steps/sec, or 5.5ms/step. Each step performs 64K * 200 = 12.8M embedding lookups. Therefore the embedding tier must sustain about 2.3B lookups/sec globally. If each lookup service shard can sustain 1M random lookups/sec after caching, the design needs roughly 2.3K effective shards; if it sustains 5M/sec, roughly 460 shards. (4) 1024 GPUs are feasible only if lookup bandwidth, cache hit rate, and overlap keep the effective step time under 5.5ms. If measured lookup service throughput or network fanout cannot meet 2.3B lookups/sec, the run is embedding I/O-limited regardless of dense GPU FLOPS.
  common_mistake: |
    **The Pitfall:** Treating the problem as a pure compute problem and calculating TFLOPS required.
    **The Rationale:** Standard LLM training is compute-heavy, so candidates apply the same logic to DLRMs.
    **The Consequence:** Failing to realize that recommendation model training is embedding-lookup-dominated, bottlenecked entirely by table I/O rather than matrix multiply compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 1T samples in 24 hrs. GPUs: 1024. Global batch: 64K.
       - Average embedding accesses: 200 lookups/sample.
    2. **Calculations:**
       - Step Budget: 1T / 24hrs = 11.6M samples/sec = 181 steps/sec = 5.5ms/step.
       - Step Budget: 1T / 24hrs = 11.6M samples/sec = 181 steps/sec = 5.5ms/step.
       - Lookups per step: 64K samples * 200 = 12.8M lookups.
       - Required lookup throughput: 12.8M lookups/step * 181 steps/sec = ~2.3B lookups/sec.
       - Shard sizing example: at 1M effective random lookups/sec per shard, the embedding service needs ~2,300 shards; at 5M/sec, it needs ~460 shards.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Lookup-Bound.** The 24-hour goal depends on whether the sharded embedding tier can deliver about 2.3B lookups/sec with caching, prefetching, and overlap; GPU count alone does not prove feasibility.
