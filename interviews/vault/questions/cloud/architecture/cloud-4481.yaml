title: Distributed Training Throughput for 100TB Embedding Cluster
scenario: A social platform needs to train a recommendation model with 100TB of embedding tables on 1024 GPUs. The system must complete a full epoch (1T training samples) in under 24 hours.
question: How would you design the distributed training architecture and verify whether 1024 GPUs can process 1T samples in under 24 hours?
details:
  realistic_solution: 'Architecture: (1) Embedding tables: 100TB distributed across 1000 CPU parameter servers. (2) Dense compute: 1024 GPUs for MLP forward/backward. 2-stage pipeline: stage 1 embedding lookup (CPU PS), stage 2 dense compute. (3) Batch size: 64K samples per global batch. Per GPU: 64K/1024 = 62.5 samples. (4) Step time budget: 1T samples / 24hr = 11.6M samples/sec throughput. At batch=64K: 181 steps/sec = 5.5ms per step. (5) Embedding lookup time: 62.5 samples * 200 lookups = 12.5K lookups per GPU per step. At 100us per lookup (CPU PS): 1.25 seconds per step — way over budget. Fix: async prefetch 2 steps ahead. Pre-shard hot items to GPU. Layered caching: DRAM on PS nodes. (6) Realistic throughput: industry RecSys at this scale requires ~2048 GPUs; 1024 GPUs will likely stretch to 48hr without flawless prefetching.'
  common_mistake: |
    **The Pitfall:** Treating the problem as a pure compute problem and calculating TFLOPS required.
    **The Rationale:** Standard LLM training is compute-heavy, so candidates apply the same logic to DLRMs.
    **The Consequence:** Failing to realize that recommendation model training is embedding-lookup-dominated, bottlenecked entirely by table I/O rather than matrix multiply compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 1T samples in 24 hrs. GPUs: 1024. Batch: 64K.
    2. **Calculations:**
       - Step Budget: 1T / 24hrs = 11.6M samples/sec = 181 steps/sec = 5.5ms/step.
       - Dense Compute Bound: 18 EFLOP / 519 PFLOPS = ~35 seconds total.
       - Embedding Lookup: 62.5 samples/GPU * 200 lookups * 100µs = 1.25s per step.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Lookup-Bound.** The massive embedding sizes mean training is entirely network-bound. The 24-hour goal is functionally impossible without multi-stage asynchronous prefetching.
