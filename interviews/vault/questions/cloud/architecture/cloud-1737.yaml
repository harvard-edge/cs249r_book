title: 'Diagnosing Bottlenecks in LLM Serving'
scenario: 'You are managing a fleet serving a 70B parameter LLM using continuous batching. During peak traffic, Time-To-First-Token (TTFT) spikes for new requests with long prompts, while Time-Between-Tokens (TBT) for ongoing generations stutters significantly when batched alongside those long prefills.'
question: 'What causes TTFT/TBT spikes when long prefills and decodes share continuous batching, and what serving architecture should replace it?'
details:
  realistic_solution: 'Implement prefill-decode disaggregation (e.g., Splitwise or DistServe architecture). Route prompt processing to a ''Prefill Pool'' to saturate compute, then transfer the generated KV cache over the network to a ''Decode Pool'' that runs at very large batch sizes to maximize memory bandwidth utilization.'
  common_mistake: |
    **The Pitfall:** Trying to fix stuttering by tuning the continuous batching token limit or simply increasing batch size.
    **The Rationale:** Engineers assume that optimization is purely a scheduling problem and ignore that prefill (compute-heavy) and decode (memory-heavy) have fundamentally conflicting hardware bottlenecks.
    **The Consequence:** The unified architecture continues to fail to saturate hardware efficiently; decodes remain starved waiting for compute-bound prefills to finish.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter model.
    - 140GB weights footprint.
    - Prefill uses 4000 tokens, Decode uses 1 token.
    
    **Calculations:**
    - Prefill AI: 2 * 70B params * 4000 tokens / 140GB = 4000 FLOPs/byte.
    - Decode AI: 2 * 70B params * 1 token / 140GB = 1 FLOP/byte.
    - Conflict: 4000 FLOPs/byte vs 1 FLOP/byte runtime.
    
    **Conclusion & Interpretation:**
    - **Result: Compute vs Memory Conflict (Compute-Bound)**. The disparate Arithmetic Intensity between prefill and decode necessitates architectural disaggregation for optimal performance.
