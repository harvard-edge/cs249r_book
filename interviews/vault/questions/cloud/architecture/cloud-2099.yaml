title: Transformer Architecture Enables Tensor Parallelism
scenario: A junior engineer asks why the transformer architecture scales so well to hundreds of GPUs using Tensor Parallelism (TP).
question: How do multi-head attention and FFN layers naturally decompose across GPUs in Tensor Parallelism, and where are the synchronization points?
details:
  realistic_solution: |
    In a standard tensor-parallel transformer, attention is split across heads and the Q/K/V projections are usually column-parallel so each GPU produces the heads or head slices it owns. The attention calculation is local to those shards. The output projection is commonly row-parallel, so partial output vectors must be summed across the TP group, typically with one AllReduce or ReduceScatter/AllGather equivalent. The FFN uses the same pattern: the first linear is column-parallel, the activation is local, and the second linear is row-parallel with a collective to combine partial outputs. Exact collectives depend on the Megatron-style implementation, but synchronization happens at the row-parallel outputs of the attention and FFN sublayers, not after every matmul.
  common_mistake: |
    **The Pitfall:** Believing Tensor Parallelism requires splitting every operation and synchronizing constantly.
    **The Rationale:** Candidates lack deep knowledge of how attention heads are independent and how FFN matrices can be split.
    **The Consequence:** Overestimating communication overhead and failing to design optimal 3D parallelism strategies.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80-layer transformer running 4-way tensor parallelism.
    - Megatron-style column-parallel first projection and row-parallel second projection in each attention/FFN sublayer.
    - Activation communication volume scales with batch * sequence * hidden dimension * bytes, not just with the number of collectives.

    **Calculations:**
    - Attention: Q/K/V column-parallel projections produce local head shards; attention is local; output projection is row-parallel and requires one TP-group reduction of the partial hidden vector.
    - FFN: first linear is column-parallel; activation is local; second linear is row-parallel and requires one TP-group reduction of the partial hidden vector.
    - Forward-pass synchronization points: about 2 reductions per layer under this implementation, or 160 reductions for 80 layers, with latency and bandwidth cost determined by the activation tensor size and interconnect.

    **Conclusion & Interpretation:**
    - **Result: TP communication is structured, not free.** Transformers decompose well because large local GEMMs are separated by a small number of activation collectives, but whether the layer is compute-bound or communication-bound depends on batch, sequence length, hidden size, TP degree, and interconnect bandwidth.
