title: DeepSeek-V3-Scale MoE Parallelism Layout on 2048 H100s
scenario: Design the full parallelism strategy for training a DeepSeek-V3-scale model (671B total, 256 experts, top-8 routing, 37B active) on 2048 H100 GPUs across 256 nodes.
question: What EP, TP, PP, and DP dimensions would you use to train this 671B, 256-expert MoE on 2048 H100s, and why?
details:
  realistic_solution: Use PP=8 pipeline stages. Within each stage, allocate 256 GPUs as a TP=8 by EP=32 mesh, so 8 pipeline stages x 256 GPUs/stage = 2048 GPUs total. Keep TP=8 within a node for dense attention and shared projections so tensor-parallel all-reduces stay on NVLink. Use EP=32 for MoE layers so expert dispatch is handled by a stage-local expert-parallel group, with routing locality and overlap for the all-to-all. For this exact 2048-GPU budget, DP=1 full replicas; if more GPUs were available, DP would replicate the whole PP x TP x EP training mesh. This keeps the dimensions mathematically consistent and separates dense TP communication from sparse expert dispatch.
  common_mistake: |
    **The Pitfall:** Applying standard 3D parallelism globally across the entire model without separating dense layers from sparse layers.
    **The Rationale:** Treating MoE layers identically to dense attention layers.
    **The Consequence:** Massive network bottlenecks, because MoE requires specialized all-to-all communication (EP) which must be routed differently than dense TP all-reduces.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 671B params, 37B active, 256 experts.
       - Hardware: 2048 H100 GPUs (80GB) across 256 nodes (8 GPUs/node).
    2. **Calculations:**
       - Layout: PP=8. Per pipeline stage: TP=8 x EP=32 = 256 GPUs. Total: 8 x 256 = 2048 GPUs.
       - DP replicas: 2048 / (PP 8 x stage mesh 256) = 1.
       - Active parameter budget is global per token, not a simple per-GPU memory number. A rough stage-local active slice is 37B / 8 = 4.625B parameters before considering which dense weights are TP-sharded and which expert weights are EP-sharded.
       - TP=8 means dense matmul shards are 1/8 of their stage-local tensors; EP=32 means each stage-local expert group owns 256 / 32 = 8 experts per EP rank group, with only the routed top-8 experts active per token.
       - Full checkpoint state lower bound using decimal units: 671B x (2 bytes BF16 weights + 12 bytes optimizer/master/gradient state) = 9.394e12 bytes = 9.4 TB. If fully sharded across 2048 GPUs, this averages 9.4 TB / 2048 = 4.6 GB per GPU before metadata, activations, temporary buffers, and imbalance.
    3. **Conclusion & Interpretation:**
       - **Result: Consistent PP x TP x EP topology.** PP=8 and a stage-local TP=8 x EP=32 mesh exactly consume 2048 GPUs; DP is 1 for this budget, while memory feasibility depends on sharding optimizer state and expert weights across the mesh.
