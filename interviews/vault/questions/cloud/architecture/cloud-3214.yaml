title: MoE Model Parallelism Topology for Training
scenario: 'Design the full parallelism strategy for training a DeepSeek-V3-scale model (671B total, 256 experts, top-8 routing, 37B active) on 2048 H100 GPUs across 256 nodes.'
question: 'What EP, TP, PP, and DP dimensions would you use to train this 671B, 256-expert MoE on 2048 H100s, and why?'
details:
  realistic_solution: 'Implement Expert Parallelism (EP) decoupled from Tensor Parallelism (TP). For Attention layers: TP=8 within a node. For MoE layers: EP=32 (32 GPUs, 8 experts per GPU) placed across 4 nodes using NVLink+IB. Add Pipeline Parallelism PP=8 (8 stages) and Data Parallelism DP=32. Each DP replica requires 64 GPUs.'
  common_mistake: |
    **The Pitfall:** Applying standard 3D parallelism globally across the entire model without separating dense layers from sparse layers.
    **The Rationale:** Treating MoE layers identically to dense attention layers.
    **The Consequence:** Massive network bottlenecks, because MoE requires specialized all-to-all communication (EP) which must be routed differently than dense TP all-reduces.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 671B params, 37B active, 256 experts.
       - Hardware: 2048 H100 GPUs (80GB) across 256 nodes (8 GPUs/node).
    2. **Calculations:**
       - Dimensions: TP=8, PP=8, EP=32, DP=32 (8 × 8 × 32 = 2048 GPUs).
       - Memory per GPU Breakdown:
         - Attention Shard: 37B / 8 / 8 = 578M params ≈ 1.2 GB.
         - Experts: 8 experts × 2.5B × 2 bytes = 40 GB.
         - Optimizer State (ZeRO-1 over DP=32): 240 GB / 32 = 7.5 GB.
         - Activations: ~10 GB.
         - Total VRAM footprint: ~58.7 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound Topology. An EP=32 and TP=8 layout keeps dense all-reduces strictly within nodes while efficiently fitting the massive 671B expert weights in distributed 80GB HBM.**
