title: Monolithic vs Multi-Core PE Arrays
scenario: Your team is evaluating two Processing Element (PE) array architectures for a cloud LLM inference accelerator. Design A uses a single monolithic 256x256 systolic array. Design B uses four independent 128x128 systolic arrays. Both chips possess exactly 65,536 PEs.
question: Which PE array design delivers better throughput for independent batch-1 autoregressive decoding streams, and why?
details:
  realistic_solution: Design B is better for aggregate throughput when several independent batch-1 decode streams are available. A single batch-1 matrix-vector stream still underfills either systolic design, so per-stream latency is not magically fixed by splitting the array. The advantage of four 128x128 arrays is that the chip can schedule independent requests on separate arrays, improving concurrency and reducing contention compared with forcing all streams through one monolithic array.
  common_mistake: |
    **The Pitfall:** Choosing the monolithic 256x256 array based on maximum theoretical TFLOPS.
    **The Rationale:** Engineers assume bigger systolic arrays are universally better, failing to map the physical wavefront of a Matrix-Vector multiply onto a 2D grid.
    **The Consequence:** Building an accelerator where >99% of the PEs sit completely idle during the critical decode phase.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Design A: 1x 256x256 array (65,536 PEs).
       - Design B: 4x 128x128 arrays (65,536 PEs).
       - Workload: Batch-1 Matrix-Vector multiply.
    2. **Calculations:**
       - One batch-1 stream: both designs are wavefront-limited and leave most PEs idle during matrix-vector decode.
       - Design A has one large scheduling target, so multiple streams must share the monolithic array or wait for batching.
       - Design B can place up to four independent batch-1 streams on four separate arrays.
       - With four ready streams, Design B improves aggregate throughput by concurrency; with only one ready stream, the benefit is mainly smaller-array scheduling granularity, not 4x per-stream compute.
    3. **Conclusion & Interpretation:**
       - **Result: Design B improves multi-stream aggregate throughput.** The conclusion assumes several simultaneous independent decode streams; for a single stream, both designs remain underutilized.
