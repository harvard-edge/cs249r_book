title: Monolithic vs Multi-Core PE Arrays
scenario: Your team is evaluating two Processing Element (PE) array architectures for a cloud LLM inference accelerator. Design A uses a single monolithic 256x256 systolic array. Design B uses four independent 128x128 systolic arrays. Both chips possess exactly 65,536 PEs.
question: "Which PE array design delivers better throughput for independent batch-1 autoregressive decoding streams, and why?"
details:
  realistic_solution: Design B (four 128x128 arrays) delivers significantly better throughput. Autoregressive decoding at batch size 1 is heavily memory-bandwidth bound and relies on Matrix-Vector multiplication. A 2D systolic array can only utilize one active wavefront (a diagonal or row) at a time for vector operations. Design B's multiple smaller arrays allow concurrent execution of four independent user requests without waiting to assemble a synchronous batch, drastically improving PE utilization.
  common_mistake: |
    **The Pitfall:** Choosing the monolithic 256x256 array based on maximum theoretical TFLOPS.
    **The Rationale:** Engineers assume bigger systolic arrays are universally better, failing to map the physical wavefront of a Matrix-Vector multiply onto a 2D grid.
    **The Consequence:** Building an accelerator where >99% of the PEs sit completely idle during the critical decode phase.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Design A: 1x 256x256 array (65,536 PEs).
       - Design B: 4x 128x128 arrays (65,536 PEs).
       - Workload: Batch-1 Matrix-Vector multiply.
    2. **Calculations:**
       - Design A active PEs (1 wavefront): 256 PEs.
       - Design A utilization: 256 / 65,536 = 0.39%.
       - Design B active PEs per array: 128 PEs.
       - Design B total active PEs (4 concurrent streams): 4 * 128 = 512 PEs.
       - Design B utilization: 512 / 65,536 = 0.78%.
    3. **Conclusion & Interpretation:**
       - **Result: Design B Doubles Throughput.** Matrix-vector multiplication is structurally **ALU-Utilization-Bound** on 2D grids; splitting the array doubles effective compute density for unbatched requests.
