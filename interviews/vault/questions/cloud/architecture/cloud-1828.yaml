title: Hierarchical Secure Aggregation Trade-offs
scenario: You are architecting the aggregation layer for a global Federated Learning pipeline training a 100M parameter model. Design A uses a single global SecAgg group of 5,000 clients. Design B partitions clients into 10 independent SecAgg subgroups of 500 clients each. The edge devices have a historical 5% dropout rate.
question: Should the global FL aggregator use one 5,000-client SecAgg group or 10 groups of 500, and why?
details:
  realistic_solution: Design B is the optimal choice. By sharding into groups of 500, you reduce the server-side cryptographic reconstruction compute by a factor of 10x, preventing round timeouts, while maintaining an anonymity set (500) that remains cryptographically robust against the server or malicious clients.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on payload transfer bandwidth.
    **The Rationale:** Candidates immediately look at the 400MB gradient size and ignore the underlying cryptography.
    **The Consequence:** Completely failing to account for the quadratic O(U^2) server-side CPU cost of Shamir's Secret Sharing reconstruction needed to unmask dropped clients, leading to catastrophic server bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5% dropout rate.
    - Reconstruction computes scale as O(U_drop * U_survive).
    - Design A: 5000 clients, 250 drops.
    - Design B: 10 groups of 500, 25 drops/group.

    **Calculations:**
    - Design A Ops = 250 * 4750 = 1,187,500 ops.
    - Design B Ops per group = 25 * 475 = 11,875 ops.
    - Design B Total Ops = 10 * 11,875 = 118,750 ops.

    **Conclusion & Interpretation:**
    - **Result: Server compute is reduced exactly 10x with sharding (Server-side CPU Reconstruction)**. Bottleneck: Server-side CPU Reconstruction.
