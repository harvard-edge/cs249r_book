title: Hierarchical Secure Aggregation Trade-offs
scenario: You are architecting the aggregation layer for a global Federated Learning pipeline training a 100M parameter model. Design A uses a single global SecAgg group of 5,000 clients. Design B partitions clients into 10 independent SecAgg subgroups of 500 clients each. The edge devices have a historical 5% dropout rate.
question: Should the global FL aggregator use one 5,000-client SecAgg group or 10 groups of 500, and why?
details:
  realistic_solution: Design B is the better choice if the protocol can tolerate smaller anonymity sets. Sharding into 10 groups of 500 bounds each SecAgg reconstruction problem to a much smaller participant set, reducing server CPU and timeout risk while still keeping a 500-client anonymity set. The scheduler should size groups from measured dropout and reconstruction latency rather than assuming one global group is always safer.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on payload transfer bandwidth.
    **The Rationale:** Candidates immediately look at the 400MB gradient size and ignore the underlying cryptography.
    **The Consequence:** Completely failing to account for the quadratic O(U^2) server-side CPU cost of Shamir's Secret Sharing reconstruction needed to unmask dropped clients, leading to catastrophic server bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5% dropout rate.
    - In this SecAgg implementation, reconstruction work for dropped clients is dominated by interpolation over the surviving shares in that group, so compare U_drop * group_size as a rough server CPU proxy.
    - Design A: 5000 clients, 250 drops.
    - Design B: 10 groups of 500, 25 drops/group.

    **Calculations:**
    - Design A proxy work = 250 dropped clients * 5000-client group = 1,250,000 share operations.
    - Design B per-group proxy work = 25 dropped clients * 500-client group = 12,500 share operations.
    - Design B total proxy work = 10 groups * 12,500 = 125,000 share operations.
    - Relative proxy work = 1,250,000 / 125,000 = 10x lower under this grouping model.

    **Conclusion & Interpretation:**
    - **Result: roughly 10x lower reconstruction work under the stated model (Server-side CPU Reconstruction)**. Grouping reduces timeout risk, but the exact factor depends on the SecAgg implementation and dropout distribution.
