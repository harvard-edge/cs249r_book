title: MoE Prefill vs Decode Phase Routing Differences
scenario: Your MoE serving system disaggregates prefill and decode onto separate GPU pools. During prefill, batches of 512 tokens hit all experts evenly. During decode, batches of 128 requests generate 1 token each, and only 4 of 8 experts see significant traffic.
question: What parallelism layouts should you use for MoE prefill and decode, and why should they differ?
details:
  realistic_solution: 'Because prefill and decode run on separate pools, tune the expert layout per phase. Prefill should keep all 8 experts distributed across the prefill pool, such as EP=8, because 512 tokens with Top-2 routing gives enough work per expert to amortize all-to-all and run efficient batched expert matmuls. Decode should not blindly mirror that layout: 128 one-token requests create only 256 expert dispatches, and the scenario says traffic is concentrated on 4 of 8 experts. Use a decode layout that colocates or replicates the hot experts and gives fewer resources to cold experts, such as packing cold experts together or selectively replicating hot experts. The goal is load balance and memory-bandwidth efficiency in the decode pool, not a universal EP value.'
  common_mistake: |
    **The Pitfall:** Using the exact same expert parallelism (EP) layout for both prefill and decode phases.
    **The Rationale:** It's architecturally simpler to maintain a homogeneous deployment topology.
    **The Consequence:** Severely underutilizing GPUs during decode, wasting expensive memory bandwidth on cold experts while hot experts bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - MoE model with 8 experts, Top-2 routing.
    - Prefill batch: 512 tokens.
    - Decode batch: 128 tokens.
    **Calculations:**
    - Prefill uniform load: 512 * 2 / 8 = 128 tokens/expert (Compute-efficient GEMM).
    - Decode total dispatches: 128 * 2 = 256 expert dispatches.
    - If decode were uniform: 256 / 8 = 32 dispatches/expert.
    - The scenario says only 4 experts see significant traffic, so the decode pool should provision for skew rather than assume all 8 experts are equally busy.
    **Conclusion & Interpretation:**
    - **Result: Phase-specific layouts.** Prefill benefits from broad EP across all experts; decode needs hot-expert placement or replication to avoid wasting resources on cold experts.
