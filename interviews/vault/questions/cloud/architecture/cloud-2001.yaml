title: LLM Control Plane Explainability Trade-offs
scenario: You are architecting the observability control plane for a 70B parameter LLM (80 layers, 8192 hidden dimension) serving 5,000 QPS with an average of 100 generated tokens per request. The trust and safety team proposes logging the full layer activations for every token to debug hallucinations offline.
question: Would you log full layer activations or lightweight linear-probe scores for real-time explainability at 5,000 QPS, and why?
details:
  realistic_solution: Reject full activation logging due to its extreme network bottleneck. Implement intermediate linear probes that compress the massive internal state into low-dimensional semantic scores (e.g., hallucination risk) on the fly, reducing the telemetry payload by over 2000x while still giving human operators actionable, layer-wise debugging signals.
  common_mistake: |
    **The Pitfall:** Proposing logging full high-dimensional activations at scale.
    **The Rationale:** Candidates fail to calculate the massive network bandwidth required, treating logging as a negligible overhead.
    **The Consequence:** Designing a telemetry system that instantly saturates network interfaces, crashing the serving nodes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B LLM: 80 layers, 8192 dimension, FP16 (2 bytes).
    - Traffic: 5,000 QPS, 100 generated tokens per request, implying 500,000 generated tokens/s.

    **Calculations:**
    - Full activations per token: 80 layers * 8192 dim * 2 bytes = 1,310,720 bytes (~1.31 MB).
    - Generated token rate = 5,000 requests/s * 100 tokens/request = 500,000 tokens/s.
    - Full-activation bandwidth = 500,000 tokens/s * 1,310,720 bytes/token = 655,360,000,000 bytes/s, about 655 GB/s.
    - Probe scores per token (1 float/layer): 80 layers * 4 bytes = 320 bytes.
    - Probe bandwidth = 500,000 tokens/s * 320 bytes/token = 160,000,000 bytes/s, about 160 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Use Linear Probes.** Full activation logging would require about 655 GB/s, while probe scores are about 160 MB/s. Probes are far more tractable for real-time explainability, though they still need buffering, aggregation, backpressure, and capacity planning.
