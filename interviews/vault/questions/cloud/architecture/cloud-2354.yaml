title: Diagnosing PCIe NUMA Mismatch
scenario: You deploy a ResNet-50 training job on a dual-socket server with 8 GPUs. GPUs 0-3 achieve 1500 images/s each, but GPUs 4-7 consistently drop to 700 images/s, limiting total throughput to 8800 img/s instead of the expected 12000 img/s. GPU utilization on 4-7 fluctuates wildly between 40-60%. The PyTorch dataloader uses 64 CPU workers configured with default settings.
question: Why do GPUs 4-7 train at 700 images/s while GPUs 0-3 hit 1500 images/s, and how should the PyTorch dataloader be pinned?
details:
  realistic_solution: |
    The root cause is a NUMA (Non-Uniform Memory Access) topology mismatch. By default, the OS may spawn dataloader CPU workers on NUMA node 0 even for ranks feeding GPUs attached to CPU 1. GPUs 0-3 are attached to CPU 0's PCIe root complex, while GPUs 4-7 are attached to CPU 1. Data fetched by workers on CPU 0 for GPUs 4-7 must traverse the inter-socket UPI link before DMA to those GPUs, so the host input path becomes the bottleneck and GPU utilization fluctuates. The solution is to pin each training rank and its dataloader workers to the NUMA node local to the GPU or GPU set it serves: workers for ranks on GPUs 0-3 should allocate and preprocess on NUMA node 0, and workers for ranks on GPUs 4-7 should allocate and preprocess on NUMA node 1. Implement this with `numactl`, per-rank CPU affinity, worker initialization affinity, and NUMA-local pinned host buffers rather than relying on a fixed global worker-index split.
  common_mistake: |
    **The Pitfall:** Assuming GPUs 4-7 are thermally throttling or defective.
    **The Rationale:** Intermittent drops in throughput are frequently associated with hardware degradation or cooling issues.
    **The Consequence:** Initiating a useless hardware RMA instead of fixing the process affinity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1500 img/s per GPU at 3MB/img.
    - 4 GPUs per CPU socket.
    - UPI link ~20 GB/s real-world throughput.

    **Calculations:**
    - Throughput = 1500 img/s * 3MB/img = 4.5 GB/s per GPU.
    - Group Bandwidth = 4 GPUs = 18 GB/s.
    - If all data for GPUs 4-7 is produced on NUMA node 0, that group tries to pull 18 GB/s across UPI before PCIe DMA.
    - Under contention, the cross-socket path delivers about 8.4 GB/s total to the group.
    - 8.4 GB/s total / 4 GPUs = 2.1 GB/s per GPU.
    - 2.1 GB/s / 3 MB/img = ~700 img/s.

    **Conclusion & Interpretation:**
    - **Result: 700 img/s (NUMA-Path-Bound)**. Pinning each rank's dataloader workers and pinned-memory allocations to the NUMA node local to its GPU removes the UPI bottleneck.
