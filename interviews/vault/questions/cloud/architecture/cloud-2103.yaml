title: Architecture Choice Drives Serving Cost
scenario: You must serve 10,000 QPS of text generation at P99 < 500ms with equivalent quality.
question: Which architecture minimizes $/query between a dense 70B transformer vs a 47B-parameter MoE (8x7B, top-2) vs a 70B-equivalent SSM?
details:
  realistic_solution: 'Under the same quality, latency, and hardware-price assumptions, the SSM minimizes $/query because it avoids KV-cache growth and can sustain the largest latency-bounded decode batch. The MoE is second: only about 14B parameters are active per token, but all 47B parameters must stay resident in HBM and routing/dispatch adds overhead. The dense 70B transformer is usually most expensive because every token uses the full model and long-running decode is KV-cache-memory-bound. This ranking depends on measured throughput at P99 < 500ms; if an SSM implementation cannot hit the assumed quality or latency, MoE can become the practical winner.'
  common_mistake: |
    **The Pitfall:** Only comparing parameter counts without considering per-token compute, memory requirements, and hardware utilization.
    **The Rationale:** It is tempting to assume that serving costs scale linearly with total parameter count.
    **The Consequence:** Misjudging serving costs by ignoring the active parameter count (MoE) or the massive KV cache memory bottlenecks (Dense vs SSM).
  napkin_math: |
    **Assumptions & Constraints:**
    - Average generated length: 100 output tokens/query.
    - Each serving replica uses 2 H100s at $6/hr total.
    - Throughput numbers are measured under the same P99 < 500ms latency target.
    - Dense 70B: ~320 output tokens/s per replica.
    - MoE 8x7B top-2: ~800 output tokens/s per replica.
    - 70B-equivalent SSM: ~2000 output tokens/s per replica.

    **Calculations:**
    - Required output rate: 10,000 queries/s * 100 tokens/query = 1,000,000 tokens/s.
    - Dense replicas: 1,000,000 / 320 = 3125 replicas. Cost/query = $6/hr / (320 tokens/s * 3600) * 100 tokens = $0.000521.
    - MoE replicas: 1,000,000 / 800 = 1250 replicas. Cost/query = $6/hr / (800 tokens/s * 3600) * 100 tokens = $0.000208.
    - SSM replicas: 1,000,000 / 2000 = 500 replicas. Cost/query = $6/hr / (2000 tokens/s * 3600) * 100 tokens = $0.000083.

    **Conclusion & Interpretation:**
    - **Result: SSM is cheapest under the stated latency-bounded throughput assumptions.** Ranking by $/query: SSM ($0.000083) < MoE ($0.000208) < Dense ($0.000521). The cost driver is sustained tokens/s per dollar after accounting for KV-cache pressure, active parameters, and resident-parameter memory.
