title: Architecture Choice Drives Serving Cost
scenario: You must serve 10,000 QPS of text generation at P99 < 500ms with equivalent quality.
question: Which architecture minimizes $/query between a dense 70B transformer vs a 47B-parameter MoE (8x7B, top-2) vs a 70B-equivalent SSM?
details:
  realistic_solution: 'Dense 70B: Memory-bound during decode due to KV cache. MoE 8x7B (top-2): Decode is cheaper in compute, but all parameters must reside in HBM. SSM 70B-equiv: NO KV cache, highest batch size. SSM wins for throughput; MoE wins for moderate batch. Dense is most expensive.'
  common_mistake: |
    **The Pitfall:** Only comparing parameter counts without considering per-token compute, memory requirements, and hardware utilization.
    **The Rationale:** It is tempting to assume that serving costs scale linearly with total parameter count.
    **The Consequence:** Misjudging serving costs by ignoring the active parameter count (MoE) or the massive KV cache memory bottlenecks (Dense vs SSM).
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 70B: 2x H100, batch 16, ~320 tokens/s.
    - MoE 8x7B: 2x H100, batch 16, ~800 tokens/s.
    - SSM 70B-equiv: 2x H100, batch 256+, ~2000 tokens/s.

    **Calculations:**
    - Dense Cost: $6/hr / (320 * 3600) * 1e6 = $5.21/M tokens.
    - MoE Cost: $6/hr / (800 * 3600) * 1e6 = $2.08/M tokens.
    - SSM Cost: $6/hr / (2000 * 3600) * 1e6 = $0.83/M tokens.

    **Conclusion & Interpretation:**
    - **Result: SSM is cheapest (Memory-Bound)**. Ranking: SSM ($0.83/M) < MoE ($2.08/M) < Dense ($5.21/M).
