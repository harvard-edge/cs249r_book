title: Recall MobileNetV2 inverted residual structure and why it inverts the bottleneck
scenario: During a system design interview, you are asked to explain the key architectural difference between a standard ResNet bottleneck block and MobileNetV2's inverted residual block.
question: What is the architectural difference between a ResNet bottleneck and a MobileNetV2 inverted residual block, and why use a linear bottleneck?
details:
  realistic_solution: 'ResNet bottleneck: wide(C) → narrow(C/4) → 3×3 conv at narrow → wide(C). The 3×3 standard conv is expensive, so you compress first. MobileNetV2 inverted residual: narrow(C) → wide(t·C, t=6) → 3×3 depthwise at wide → narrow(C). The 3×3 depthwise is cheap (O(C·k²·HW) not O(C²·k²·HW)), so you can afford to run it at expanded channel count for richer spatial features. The ReLU6 is only applied before the final pointwise projection; the projection itself has no activation to preserve information in the low-dimensional residual stream (linear bottleneck hypothesis).'
  common_mistake: |
    **The Pitfall:** Saying that inverted residuals simply "flip" the bottleneck without explaining why.
    **The Rationale:** Candidates memorize the structure but fail to understand the computational cost differences between standard 3x3 convolutions and depthwise convolutions.
    **The Consequence:** Failing to demonstrate an understanding of FLOP optimization and channel capacity scaling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ResNet bottleneck: C=256. MobileNetV2: C=32, t=6.
    2. **Calculations:**
       - ResNet bottleneck (C=256):
         - Compress 256→64: 32.8K×HW FLOPs
         - 3×3 at C/4=64: 73.7K×HW FLOPs
         - Expand 64→256: 32.8K×HW FLOPs
         - Total: 139.3K×HW FLOPs
       - MobileNetV2 (C=32, t=6):
         - Expand 32→192: 12.3K×HW FLOPs
         - 3×3 depthwise at 192ch: 3.5K×HW FLOPs
         - Pointwise project 192→32: 12.3K×HW FLOPs
         - Total: 28.0K×HW FLOPs
    3. **Conclusion & Interpretation:**
       - **Result: ~5× FLOP Reduction. Even with expanded channels, the inverted residual uses ~5× fewer FLOPs (28.0K vs 139.3K).**
