title: Normalization for Micro-Batch 3D Segmentation
scenario: Your team is training a 3D medical segmentation model (e.g., 3D U-Net) on a cloud cluster of 8x A100 (80GB) GPUs. Because the input volumes are massive (512x512x256 voxels in FP16), the maximum feasible physical batch size is exactly 1 per GPU. The legacy architecture uses standard Batch Normalization. The team observes severe training instability, exploding gradients, and poor convergence.
question: What causes the 3D U-Net instability at batch size 1 per GPU, and how should the normalization layers be redesigned?
details:
  realistic_solution: Replace standard Batch Normalization with Group Normalization (GN) or Instance Normalization (IN), which compute statistics across channel and spatial dimensions independently of batch size. Synchronized Batch Normalization (SyncBN) is a weaker alternative here because it only scales the effective batch size to 8 (across 8 GPUs) and introduces synchronization overhead.
  common_mistake: |
    **The Pitfall:** Suggesting gradient accumulation.
    **The Rationale:** Believing gradient accumulation fully simulates a larger batch size for all layers.
    **The Consequence:** Standard Batch Normalization computes running statistics strictly on the physical batch size (N=1) during the forward pass, resulting in mathematically unstable variances regardless of gradient accumulation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physical batch of 1.
    - SyncBN across 8 GPUs gives an effective normalization batch of 8.
    - GN/IN compute statistics within each sample and do not depend on the global batch size.

    **Calculations:**
    - Standard BN estimates activation statistics from N=1 per GPU, so the batch statistics are noisy and can destabilize training.
    - SyncBN improves the statistics by reducing mean/variance across 8 GPUs, but every synchronized BN layer adds cross-GPU communication on the forward path.
    - GN/IN use channel/spatial statistics per sample, so they avoid both the N=1 batch-statistics problem and SyncBN synchronization overhead.

    **Conclusion & Interpretation:**
    - **Result: GN/IN are the right redesign (Normalization-Bound)**. SyncBN is a possible compromise with communication overhead; GN/IN solve the micro-batch instability without cross-GPU synchronization.
