title: Unfused Dequantization Bottleneck
scenario: You deploy a 30B parameter LLM on an A100 (80GB, 2 TB/s bandwidth). Using FP16, generation speed is 33 tokens/sec (latency ~30ms/token). You apply W4A16 (INT4 weights, FP16 activations) quantization. You expect a ~4x speedup since generation is memory-bandwidth bound and weights dropped from 60GB to 15GB. Instead, generation speed is 40 tokens/sec (latency ~25ms/token) and GPU compute utilization is 98%. What is the architectural cause of this missing speedup?
question: What is the architectural cause of this missing speedup?
details:
  realistic_solution: The symptom reveals a lack of fused dequantization kernels. In a naive W4A16 implementation, the system launches a standalone kernel that reads the 15GB of INT4 weights from HBM, dequantizes them to FP16, and writes 60GB of FP16 back to HBM. Then, the standard cuBLAS GEMM kernel reads the 60GB of FP16 from HBM to perform the matrix multiplication. This extra memory roundtrip (Read 15GB + Write 60GB + Read 60GB = 135GB) actually moves MORE data than the original FP16 baseline (Read 60GB), completely destroying the bandwidth savings. The high GPU utilization is from memory stall cycles. The solution is to use fused kernels (like Marlin, AWQ, or GPTQ kernels) that load the INT4 weights directly into SRAM/registers, dequantize them on the fly, and immediately compute the MMA without ever writing the intermediate FP16 values back to global memory.
  common_mistake: |
    **The Pitfall:** Assuming INT4 decoding math is the compute bottleneck.
    **The Rationale:** Assuming the INT4 decoding math itself takes too many ALUs, completely ignoring the memory subsystem traffic.
    **The Consequence:** Failing to implement fused kernels, resulting in increased memory traffic and lost performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - The 60GB FP16 and 15GB INT4 figures describe model-weight footprint, not a complete measured per-token traffic model.
    - A fused W4A16 kernel should avoid writing dequantized FP16 weights back to HBM.
    **Calculations:**
    - Ideal fused path streams roughly the compact INT4 weights once and dequantizes in registers/shared memory before MMA.
    - Naive unfused path adds an avoidable FP16 materialization: read 15GB INT4, write up to 60GB FP16, then read that FP16 again for GEMM.
    - The extra FP16 write/read can erase the nominal 4x weight-bandwidth reduction even if caching, tiling, and layer reuse make the observed latency smaller than the full-footprint upper bound.
    **Conclusion & Interpretation:**
    - **Result: Unfused dequantization bottleneck.** The observed 25ms/token is consistent with lost bandwidth savings and high utilization from dequantization/materialization overhead, not with a true 4x memory-traffic reduction.
