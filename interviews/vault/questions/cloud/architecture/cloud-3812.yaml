title: InfiniBand All-to-All Transfer Time
scenario: During MoE training on a GPU cluster, each worker must send a 4 MB routed-activation payload across a 50 GB/s InfiniBand link during All-to-All dispatch.
question: How long does a 4 MB All-to-All transfer take over a 50 GB/s InfiniBand link?
details:
  realistic_solution: 4MB / 50 GB/s = 80 microseconds = 0.08ms.
  common_mistake: |
    **The Pitfall:** Mixing up milliseconds and microseconds when converting transfer time.
    **The Rationale:** Candidates compute 4 MB / 50 GB/s correctly as 0.00008 seconds, then misread the unit conversion.
    **The Consequence:** They overestimate the link transfer time by 1000x and misclassify a small payload as a major latency bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 4 MB = 0.004 GB.
    - Link bandwidth: 50 GB/s.

    **Calculations:**
    - Transfer time = 0.004 GB / 50 GB/s = 0.00008 seconds.
    - 0.00008 seconds = 80 microseconds = 0.08 ms.

    **Conclusion & Interpretation:**
    - **Result: 80 microseconds.** The raw link transfer time is 0.08 ms before collective overhead, contention, and software latency.
