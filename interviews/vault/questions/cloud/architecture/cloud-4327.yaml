title: Real-Time Feature Pipeline Latency
scenario: Your recommendation model uses 200 features, 150 of which are pre-computed (served from a feature store with 5 ms P99) and 50 are real-time (computed on-the-fly from the last 5 minutes of user activity). The real-time features require reading from a streaming event bus and running a 10-node aggregation DAG. P99 feature assembly time is 45 ms.
question: What architecture change would cut P99 feature assembly from 45 ms to under 15 ms for the 50 real-time features?
details:
  realistic_solution: 'The streaming event bus adds ~40 ms of P99 latency. Fix: move real-time feature aggregation to a push-based architecture. Pre-aggregate the DAG continuously and maintain a stateful user feature cache. When a request arrives, the lookup latency is O(1) cache read (~1 ms P99).'
  common_mistake: |
    **The Pitfall:** Trying to optimize the DAG computation speed.
    **The Rationale:** Engineers often assume computation is the bottleneck.
    **The Consequence:** Wasting effort on compute optimization when the bottleneck is actually the streaming event bus read latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current real-time DAG breakdown: 30 ms Kafka P99 + 5 ms compute + 10 ms serialization = 45 ms.
    - Feature store P99: 5 ms.
    - Inference time: 9 ms.
    - Pre-aggregation caching (Redis GET P99): 1 ms.

    **Calculations:**
    - Current total P99: 5 ms (batch) + 45 ms (real-time) = 50 ms.
    - New total P99 with pre-aggregation: 5 ms (batch) + 1 ms (Redis) + 9 ms (inference) = 15 ms.
    - Write throughput: 50M DAU * 10 events/day = 500M events/day ≈ 5,787 events/s.
    - At 1 KB per state, requires ~5.8 MB/s writes.

    **Conclusion & Interpretation:**
    - **Result: 15ms Total P99 (I/O-Bound)**. Moving to a push-based architecture cuts P99 feature assembly to 6 ms, easily meeting the <15 ms SLO.
