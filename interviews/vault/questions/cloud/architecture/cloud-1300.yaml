title: Diagnosing CPU Inefficiency in Transformer Inference
scenario: Your team is running a low-latency, batch-size=1 Transformer inference service
  on dual-socket CPUs. The dashboard shows sustained 100% CPU utilization across all
  112 cores, drawing nearly 700W. When profiled, the actual achieved TFLOP/s is less
  than 5% of theoretical peak FP32 performance.
question: Why are 112 CPU cores at 100% utilization achieving under 5% peak TFLOPs
  for batch-size=1 Transformer inference?
details:
  realistic_solution: This is the generality tax of CPU architectures. CPUs expend
    ~91% of their energy on instruction fetch, decode, branch prediction, and control
    logic rather than arithmetic. A single FP32 FMA consumes ~10pJ but requires ~100pJ
    of control overhead. Systolic arrays in NPUs amortize a single instruction over
    a large matrix multiply (e.g., 16,384 MACs), reducing control overhead to <0.1%.
    For batch-size=1 Transformers, specialized NPUs or GPUs are architecturally required.
  common_mistake: '**The Pitfall:** Assuming 100% CPU utilization means the processing
    units are fully saturated with math operations.

    **The Rationale:** Candidates exclusively blame memory bandwidth, ignoring that
    the vast majority of CPU energy and die area is consumed by instruction fetch
    and control logic.

    **The Consequence:** Persistent architectural inefficiency; attempting to optimize
    CPU code when an NPU is structurally required.

    '
  napkin_math: '**Assumptions & Constraints:**

    - CPU FP32 FMA energy: ~10pJ.

    - Instruction fetch/decode overhead: ~100pJ per instruction.

    - Systolic array amortizes 1 instruction over 128x128 matrix multiply.


    **Calculations:**

    - CPU energy spent on control: 100 / (100 + 10) = ~91% Generality Tax.

    - Systolic array amortizes 1 instruction over 16,384 MACs.


    **Conclusion & Interpretation:**

    - **Result: A systolic array reduces control overhead per MAC to <0.1%. The CPU
    is stalling on control logic, not math (Instruction-Fetch-Bound).**

    '
