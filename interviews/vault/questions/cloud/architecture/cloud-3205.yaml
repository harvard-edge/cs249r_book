title: MoE vs Dense Scaling Law Crossover
scenario: You are modeling the baseline dense scaling curve up to GPT-4 scale to evaluate if MoE is worthwhile. Using the empirical scaling law where loss is proportional to C^(-0.076), calculate the compute budget and expected loss reduction.
question: What is the estimated GPT-4-scale FLOP budget, and what is the exact loss reduction from scaling compute by 8×?
details:
  realistic_solution: 'GPT-4 compute ≈ 1.8×10^25 FLOPs (not 10^22). Loss reduction from 8× compute: 8^(-0.076) = 0.854 → 14.6% reduction (not 17%).'
  common_mistake: |
    **The Pitfall:** Assuming MoE is universally superior because it boasts a higher parameter count.
    **The Rationale:** Engineers fail to model the compute crossover point, ignoring that below a massive scale, MoE communication overhead outweighs parameter scaling benefits.
    **The Consequence:** The team wastes resources building complex MoE infrastructure for a model size where a dense architecture would have trained faster and better.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPT-4 Compute Scale: ~1.8 * 10^25 FLOPs.
       - Scaling Law: Loss ∝ C^(-0.076).
       - Scaling factor: 8x compute.
    2. **Calculations:**
       - Multiplier: 8^(-0.076) = e^(-0.076 * ln(8)) = e^(-0.076 * 2.079) = e^(-0.158) ≈ 0.854.
       - Reduction = 1 - 0.854 = 0.146.
    3. **Conclusion & Interpretation:**
       - Scaling compute by 8x yields only a 14.6% reduction in loss.
       - **Result: 14.6% Loss Reduction**
