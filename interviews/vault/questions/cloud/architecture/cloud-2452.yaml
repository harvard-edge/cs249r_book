title: Prefill and Decode Cluster Disaggregation
scenario: Your high-traffic chatbot service uses Llama-3-70B. Average input is 2000 tokens; average output is 50 tokens. Prefill takes 400ms, which starves continuous batching decode requests, causing TPOT spikes up to 100ms. You propose disaggregating the architecture into dedicated Prefill and Decode GPU nodes connected via a 100 Gbps RoCE network.
question: Should you disaggregate prefill and decode over 100Gbps RoCE, and what latency tradeoff must you evaluate?
details:
  realistic_solution: Disaggregation can reduce the compute-bound prefill versus memory-bandwidth-bound decode interference, smoothing decode TPOT by keeping long prefill kernels off the decode workers. It does not completely eliminate TPOT spikes, because queueing, network behavior, and scheduler choices still matter. The strict architectural tradeoff is the network transfer latency of the KV cache from the prefill node to the decode node. You must calculate if the added Time To First Token (TTFT) overhead is acceptable to the user in exchange for more stable decode latency.
  common_mistake: |
    **The Pitfall:** Assuming disaggregation always improves latency without calculating KV cache network IO.
    **The Rationale:** Focusing entirely on compute isolation benefits while neglecting the data movement costs.
    **The Consequence:** Implementing disaggregation on slow networks where KV cache transfer overhead drastically degrades Time To First Token (TTFT) and defeats the purpose of the architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: Llama-3-70B (80 layers, 8 KV heads, 128 dim, FP16).
       - Network: 100 Gbps RoCE (12.5 GB/s).
       - Context Length: 2000 tokens.
    2. **Calculations:**
       - KV Cache per Token: 2 (K,V) * 80 layers * 8 KV heads * 128 head_dim * 2 bytes = 327,680 bytes ≈ 320 KiB/token.
       - Total KV Cache: 2000 * 327,680 bytes = 655,360,000 bytes ≈ 655 MB.
       - Transfer Time: 655 MB / 12.5 GB/s = 52.4 ms before protocol overhead and contention.
    3. **Conclusion & Interpretation:**
       - **Result: TTFT increases by roughly 52ms for a synchronous full-cache transfer.** Disaggregation can reduce decode TPOT variance, but the tradeoff is added KV-transfer latency and sensitivity to network contention.
