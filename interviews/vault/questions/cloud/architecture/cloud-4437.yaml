title: LoRA Adapter Distillation for Latency-Sensitive Serving
scenario: A latency-sensitive serving system has a 70B base model with a domain LoRA adapter (r=16) but cannot meet P95 TTFT < 50ms.
question: How would you distill the r=16 domain LoRA adapter for a 70B model to meet a P95 TTFT target below 50 ms while preserving quality?
details:
  realistic_solution: 'Adapter-aware distillation strategy: (1) Merge the LoRA adapter into the 70B base weights: W_merged = W_base + alpha * B*A. This creates the teacher behavior to preserve. (2) Distill that behavior into a 7B student on domain data using KL loss on logits plus task labels or preference data. The production model is the 7B distilled checkpoint, optionally with a small LoRA if the domain needs later updates. (3) Evaluate quality against the adapted 70B teacher on domain and general holdouts, then calibrate the serving batch size for P95 TTFT. Speculative decoding can still improve steady-state decode throughput with the 7B as a draft, but it does not by itself solve TTFT because the first token is dominated by prefill.'
  common_mistake: |
    **The Pitfall:** Distilling the full 70B adapted model into a smaller 7B model.
    **The Rationale:** Candidates assume standard knowledge distillation is the only way to shrink the model size, ignoring the specific adapter structure.
    **The Consequence:** Full distillation takes weeks, requires massive datasets, and often fails to preserve the domain-specific knowledge held within the small LoRA adapter.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B base model. TTFT goal < 50ms.
    - Batch of 512 tokens. H100 TP=4 effective 1600 TFLOPS.
    - 7B student model on 1xH100 400 TFLOPS.

    **Calculations:**
    - 70B model Prefill FLOPs: 2 * 512 * 70e9 = 71.7T FLOPs.
    - 70B ideal prefill latency: 71.7T / 1600T = 44.8ms before adapter overhead, batching delay, memory stalls, and P95 variance.
    - 7B student FLOPs: 2 * 512 * 7e9 = 7.17T FLOPs.
    - 7B student ideal prefill latency: 7.17T / 400T = 17.9ms, leaving roughly 32ms of the 50ms P95 budget for queueing and runtime overhead.
    - Speculative decoding affects tokens after the first accepted draft tokens; it should be measured as decode throughput, not counted as proof of TTFT compliance.

    **Conclusion & Interpretation:**
    - **Result: TTFT Prefill-Bound.** Distilling the adapted behavior into a 7B production model directly reduces first-token prefill latency; speculative decoding is a separate optimization for steady-state generation throughput.
