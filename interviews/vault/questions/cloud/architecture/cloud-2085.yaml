title: RNN Sequential Dependency vs GPU Parallelism
scenario: You are tasked with explaining the hardware utilization differences between Transformers and RNNs in production NLP systems.
question: Why did transformers largely replace RNNs in production NLP systems, from a systems perspective?
details:
  realistic_solution: 'RNNs have a sequential dependency: hidden state $h_t$ depends on $h_{t-1}$. This forces each timestep to execute serially, meaning a sequence of length $S$ requires $S$ sequential matrix multiplies. On a massively parallel GPU with thousands of cores, this serialization leaves most compute units idle. Transformers compute all positions in parallel via self-attention, achieving far higher GPU utilization during training.'
  common_mistake: |
    **The Pitfall:** Answering purely from an ML perspective ("attention is more expressive") without addressing the fundamental systems constraint.
    **The Rationale:** Candidates overlook that sequential dependencies prevent parallel execution across timesteps.
    **The Consequence:** Failing to understand why modern hardware architectures strongly favor parallel dense matrix multiplications.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 token sequence, GPU parallelism

    **Calculations:**
    - RNN requires 512 sequential matmuls, fully serialized
    - Transformer requires 1 batched self-attention + 2 large matmuls, fully parallelized

    **Conclusion & Interpretation:**
    - **Result: 40-60% utilization (Utilization-Bound)**. RNN achieves ~5-15% GPU utilization, whereas Transformers hit ~40-60%.
  options:
  - RNNs require more total FLOPs than transformers for the same sequence length.
  - 'RNN hidden states create sequential dependencies that prevent parallel execution across timesteps, severely underutilizing GPU hardware.'
  - Transformers use less memory than RNNs because they don't store hidden states.
  - GPU hardware is physically incapable of running recurrent operations.
  correct_index: 1
