title: Cloud NAS Hardware-in-the-Loop Optimization
scenario: Your cloud pipeline uses Neural Architecture Search (NAS) to generate keyword spotting models for Cortex-M0+ devices (128KB SRAM). The strict hardware constraint is <5mW active power during inference. NAS currently outputs a 50KB model with 20M MACs/sec that fits SRAM but draws 15mW on the physical hardware.
question: Why does the NAS model draw 15mW despite fitting in SRAM, and how should the NAS pipeline change to meet the <5mW target?
details:
  realistic_solution: The cloud NAS reward function must be updated to penalize measured memory traffic and sleep behavior, not just MACs or parameter counts. The 15mW power draw is likely caused by the model rapidly moving activations through SRAM, using kernels that miss CMSIS-NN fast paths, or leaving the MCU active between operators. The NAS pipeline should add Hardware-in-the-Loop (HIL) power profiling, or a calibrated surrogate trained from HIL traces, and reject candidates unless estimated SRAM traffic plus runtime overhead leaves the design under the 5mW active-power target.
  common_mistake: |
    **The Pitfall:** Assuming parameter count or MACs linearly correlates with physical power draw.
    **The Rationale:** Engineers focus on theoretical metrics rather than physical memory fetch costs, which dominate power consumption.
    **The Consequence:** NAS produces models that fit constraints on paper but fail power limits in deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20M MACs/sec.
    - 15mW power draw.
    - SRAM access energy is approximately 50 pJ/byte.
    - A memory-friendly kernel might average about 1 byte of SRAM traffic per MAC after reuse.
    - A poor layout or unsupported kernel can average about 8 bytes of SRAM traffic per MAC due to activation reloads, bank conflicts, and extra im2col-style movement.

    **Calculations:**
    - Memory-friendly traffic: 20M MAC/s * 1 byte/MAC = 20 MB/s.
    - Memory-friendly SRAM power: 20e6 bytes/s * 50e-12 J/byte = 0.001 W = 1 mW.
    - If CMSIS-NN kernels and operator fusion keep runtime overhead to about 2-3 mW, total active power is roughly 3-4 mW, which fits the <5mW target.
    - Poor-access traffic: 20M MAC/s * 8 bytes/MAC = 160 MB/s.
    - Poor-access SRAM power: 160e6 bytes/s * 50e-12 J/byte = 0.008 W = 8 mW.
    - The remaining gap to 15mW can come from instruction overhead, bank toggling, DMA/runtime overhead, and the MCU being unable to sleep between kernels.

    **Conclusion & Interpretation:**
    - **Result: Fitting in SRAM is not enough; access pattern and measured hardware power must be part of the NAS objective.** The cloud NAS loop should optimize for about 20 MB/s SRAM traffic plus low-overhead kernels, because that is the plausible path from 15mW down to the <5mW requirement.
