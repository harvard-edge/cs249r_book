title: Attention's Quadratic Memory Wall
scenario: 'A transformer model uses standard self-attention with sequence length S and hidden dimension d.'
question: 'If you double the sequence length from 2K to 4K tokens, by how much does the attention score matrix memory grow?'
details:
  realistic_solution: '4x. The attention score matrix is S x S per head, so doubling S quadruples the memory. At 4K tokens with 32 heads in FP16: 32 x 4096^2 x 2 bytes ≈ 1 GB just for attention scores.'
  common_mistake: |
    **The Pitfall:** Assuming attention memory scales linearly with sequence length.
    **The Rationale:** Engineers confuse the linear scaling of weight/KV storage with the quadratic scaling of the attention score matrix itself.
    **The Consequence:** Unexpected OOM errors when processing long documents, despite having enough VRAM for the KV cache.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard self-attention architecture.
    - Sequence length increases from 2K to 4K tokens.

    **Calculations:**
    - Attention score matrix memory scales as O(S^2).
    - Ratio = (4096^2) / (2048^2) = 16,777,216 / 4,194,304 = 4.

    **Conclusion & Interpretation:**
    - **Result: Quadratic Memory Scaling.** Doubling the sequence length quadruples the attention score matrix memory.
  options:
  - '2x — attention memory scales linearly with sequence length. (Trap: linear scaling of KV cache applied to attention matrix)'
  - '4x — the attention score matrix is S x S, so doubling S quadruples memory.'
  - '8x — attention has cubic scaling due to the three projection matrices Q, K, V. (Trap: confusing N^3 matrix multiplication complexity with N^2 memory complexity)'
  - 'It stays the same — attention memory depends only on model dimension, not sequence length. (Trap: confusing model parameters with activation memory)'
  correct_index: 1
