title: Analyze EfficientNet compound scaling vs. naive width/depth scaling on throughput
scenario: "Your team needs a cloud image classifier at 84% ImageNet top-1 accuracy. You have three candidates - EfficientNet-B4 (19M params, 4.2 GFLOPs), a naively widened ResNet-50 (35M params, 8.2 GFLOPs), and a naively deepened ResNet-101 (44M params, 7.8 GFLOPs)."
question: "Which of EfficientNet-B4, widened ResNet-50, or deepened ResNet-101 has the best accuracy-per-FLOP and throughput?"
details:
  realistic_solution: "EfficientNet-B4 achieves ~82.6% top-1 with 4.2 GFLOPs \u2014 best FLOP efficiency. Naive width/depth scaling adds FLOPs non-uniformly and doesn't balance resolution, width, and depth. However, EfficientNet's compound of SE blocks and MBConv can suffer from kernel launch overhead and low occupancy on small spatial resolutions. Profile with nsys profiling to verify whether EfficientNet-B4 actually achieves higher images/sec than ResNet-50 despite fewer FLOPs."
  common_mistake: |
    **The Pitfall:** Comparing models only by parameter count or theoretical FLOPs.
    **The Rationale:** Assuming FLOPs directly translate to latency on modern accelerators.
    **The Consequence:** Deploying an EfficientNet that runs slower than a ResNet because its fragmented operations cause kernel launch overhead to dominate execution time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EfficientNet-B4: 4.2 GFLOPs.
       - ResNet-50: 8.2 GFLOPs.
       - 156 TFLOPS (50% util) expected for dense models.
    2. **Calculations:**
       - EfficientNet-B4 Theoretical: 4.2 GFLOPs * 64 = 268.8 GFLOPs. At 156 TFLOPS = 1.7 ms/batch.
       - ResNet-50 Theoretical: 8.2 GFLOPs * 64 = 524.8 GFLOPs. At 156 TFLOPS = 3.4 ms/batch.
       - Real-World Limitation: EfficientNet uses depthwise convolutions which suffer kernel launch overhead.
    3. **Conclusion & Interpretation:**
       **EfficientNet wins on pure FLOPs, but ResNet's dense ops often achieve higher hardware utilization. Result: Kernel-Launch-Bound.**
