title: Analyze EfficientNet compound scaling vs. naive width/depth scaling on throughput
scenario: Your team needs a cloud image classifier at 84% ImageNet top-1 accuracy. You have three candidates - EfficientNet-B4 (19M params, 4.2 GFLOPs), a naively widened ResNet-50 (35M params, 8.2 GFLOPs), and a naively deepened ResNet-101 (44M params, 7.8 GFLOPs).
question: Which of EfficientNet-B4, widened ResNet-50, or deepened ResNet-101 has the best accuracy-per-FLOP and throughput?
details:
  realistic_solution: |
    EfficientNet-B4 has the best accuracy-per-FLOP because it reaches the target accuracy class with 4.2 GFLOPs, versus 7.8 GFLOPs for the deepened ResNet-101 and 8.2 GFLOPs for the widened ResNet-50. The throughput ranking cannot be concluded from FLOPs alone: ResNet variants use dense, regular convolutions that usually achieve higher hardware utilization, while EfficientNet-B4 uses MBConv, depthwise conv, SE, and more fragmented kernels. Expected accuracy-per-FLOP ranking is EfficientNet-B4, then ResNet-101, then widened ResNet-50. Choose EfficientNet-B4 for accuracy-per-FLOP, but choose the serving model only after profiling measured images/sec at the target batch, resolution, precision, and accelerator.
  common_mistake: |
    **The Pitfall:** Comparing models only by parameter count or theoretical FLOPs.
    **The Rationale:** Assuming FLOPs directly translate to latency on modern accelerators.
    **The Consequence:** Deploying an EfficientNet that runs slower than a ResNet because its fragmented operations cause kernel launch overhead to dominate execution time.
  napkin_math: |
    **Assumptions & Constraints:**
    - EfficientNet-B4: 4.2 GFLOPs.
    - Widened ResNet-50: 8.2 GFLOPs.
    - Deepened ResNet-101: 7.8 GFLOPs.
    - All three candidates are assumed to meet the 84% top-1 accuracy class.

    **Calculations:**
    - Accuracy-per-FLOP proxy at the same target accuracy favors the lowest FLOP model.
    - EfficientNet-B4 requires 4.2 / 7.8 = 54% of the ResNet-101 FLOPs.
    - EfficientNet-B4 requires 4.2 / 8.2 = 51% of the widened ResNet-50 FLOPs.
    - FLOP count alone does not determine images/sec because EfficientNet-B4 uses depthwise, squeeze-excitation, and fragmented MBConv kernels, while ResNets have denser convolution kernels that may run at higher utilization.

    **Conclusion & Interpretation:**
    **EfficientNet-B4 wins accuracy-per-FLOP. Throughput is an empirical choice, not a FLOP-only result; profile all three on the target accelerator and serving batch before selecting the production model.**
