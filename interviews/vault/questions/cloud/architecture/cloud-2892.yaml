title: Analyze EfficientNet compound scaling vs. naive width/depth scaling on throughput
scenario: Your team needs a cloud image classifier at 84% ImageNet top-1 accuracy. You have three candidates - EfficientNet-B4 (19M params, 4.2 GFLOPs), a naively widened ResNet-50 (35M params, 8.2 GFLOPs), and a naively deepened ResNet-101 (44M params, 7.8 GFLOPs).
question: Which of EfficientNet-B4, widened ResNet-50, or deepened ResNet-101 has the best accuracy-per-FLOP and throughput?
details:
  realistic_solution: |
    EfficientNet-B4 has the best accuracy-per-FLOP because it reaches the target accuracy class with 4.2 GFLOPs, versus 7.8 GFLOPs for the deepened ResNet-101 and 8.2 GFLOPs for the widened ResNet-50. The throughput ranking is less certain from FLOPs alone: ResNet variants use dense, regular convolutions that usually achieve higher hardware utilization, while EfficientNet-B4 uses MBConv, depthwise conv, SE, and more fragmented kernels. Expected accuracy-per-FLOP ranking is EfficientNet-B4, then ResNet-101, then widened ResNet-50. Expected measured throughput on A100 may be widened ResNet-50 or ResNet-101 first despite higher FLOPs, with EfficientNet-B4 needing profiling to confirm.
  common_mistake: |
    **The Pitfall:** Comparing models only by parameter count or theoretical FLOPs.
    **The Rationale:** Assuming FLOPs directly translate to latency on modern accelerators.
    **The Consequence:** Deploying an EfficientNet that runs slower than a ResNet because its fragmented operations cause kernel launch overhead to dominate execution time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EfficientNet-B4: 4.2 GFLOPs.
       - ResNet-50: 8.2 GFLOPs.
       - A dense ResNet path may sustain about 156 TFLOPS effective.
       - EfficientNet-B4 may sustain lower effective throughput, e.g. 70 TFLOPS, due to depthwise/SE/kernel fragmentation.
       - Batch size = 64.
    2. **Calculations:**
       - EfficientNet-B4 batch work: 4.2 GFLOPs/image * 64 = 268.8 GFLOPs. At 70 TFLOPS effective: 268.8 / 70,000 = 3.84 ms/batch.
       - ResNet-50 batch work: 8.2 GFLOPs/image * 64 = 524.8 GFLOPs. At 156 TFLOPS effective: 524.8 / 156,000 = 3.36 ms/batch.
       - ResNet-101 batch work: 7.8 GFLOPs/image * 64 = 499.2 GFLOPs. At 156 TFLOPS effective: 499.2 / 156,000 = 3.20 ms/batch.
    3. **Conclusion & Interpretation:**
       **EfficientNet-B4 wins accuracy-per-FLOP. Expected throughput can favor the dense ResNet models if their higher utilization offsets their higher FLOP count, so final serving choice should be based on measured images/sec at the target batch and resolution.**
