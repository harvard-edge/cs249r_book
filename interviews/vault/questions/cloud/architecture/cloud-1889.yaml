title: Root-Causing 2.5D Packaging HBM Failures
scenario: During the bring-up of a new AI accelerator utilizing 2.5D packaging with a massive monolithic compute die and 6 HBM3 stacks, you observe that the two HBM stacks located at the extreme edges of the package consistently fail memory training at target frequencies, forcing them to operate at 50% bandwidth. The central 4 HBM stacks operate flawlessly. All compute and memory chips passed Known Good Die (KGD) tests before packaging.
question: What packaging-level physical issue is causing the edge HBM stacks to fail memory training?
details:
  realistic_solution: The physical size of the silicon interposer required exceeds the standard lithographic reticle limit, requiring reticle stitching. Traces connecting the edge HBMs suffer from degraded signal integrity or mechanical stress/warpage at the extremes.
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling or faulty HBM PHYs.
    **The Rationale:** Engineers often default to software or thermal explanations while ignoring the physical scale constraints of modern 2.5D interposers.
    **The Consequence:** Wasting engineering cycles on memory allocation policies instead of addressing the mechanical packaging failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute die footprint: ~800 mm^2.
    - Six HBM stack footprints plus keep-out/routing area: ~700-900 mm^2 total.
    - Interposer must span the compute die, six HBM stacks, and long edge escape routes, so package width can exceed 50 mm.

    **Calculations:**
    - Estimated interposer active area: 800 + 700-900 + routing margin ≈ 1,600-1,900 mm^2.
    - This is larger than a single reticle field, so stitching may be needed to manufacture the interposer.
    - The edge HBM links have the longest routes and sit at the highest mechanical displacement, making them most sensitive to warpage, microbump strain, and insertion-loss margin.

    **Conclusion & Interpretation:**
    - **Result: Large-interposer warpage and long edge routing degrade edge-HBM training margin (Hardware-Bound)**. Reticle stitching explains why the interposer is large; the observed failure is SI/mechanical margin at the package edges.
