title: Scaling Attention for Long Contexts
scenario: Imagine you are designing the inference architecture for a large language model that needs to process sequences of 128K tokens. Your current model uses standard Multi-Head Attention, and you're encountering significant memory and latency bottlenecks as context length scales quadratically.
question: Which attention modification would you choose for 128K-token inference, and how does it address memory and latency bottlenecks?
details:
  realistic_solution: A realistic solution involves transitioning from Multi-Head Attention (MHA) to either Grouped-Query Attention (GQA) or Multi-Query Attention (MQA) to reduce KV cache memory footprint. For context lengths as long as 128K, this would likely be combined with a Sliding Window Attention mechanism (or similar sparse attention pattern) to bound the quadratic computational complexity (L^2) to a linear or sub-quadratic scale (e.g., L*W). GQA provides a good balance between performance and memory efficiency by sharing Key/Value heads across groups of Query heads, offering better quality retention than MQA while still significantly reducing memory usage compared to MHA. This directly leverages the memory to fit larger models and contexts, and its high bandwidth to process the focused attention window efficiently.
  common_mistake: |
    **The Pitfall:** Overlooking the quadratic memory scaling of standard attention for long contexts.
    **The Rationale:** Candidates assume hardware alone can brute-force the problem or propose generic distributed inference without detailing specific attention mechanism optimizations.
    **The Consequence:** The system will immediately OOM on the first 128K-token request due to the massive KV cache and attention matrix footprints.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40 layers, d_model=4096, 128K tokens.
    - GQA KV Cache: 8 KV heads, d_head=128.
    - Sliding Window Attention: window_size=4096.

    **Calculations:**
    - MHA KV Cache: 2 * 128,000 * 4096 * 2 bytes * 40 layers ≈ 84 GB (Exceeds GPU memory).
    - GQA KV Cache: 2 * 128,000 * 128 * 8 * 2 bytes * 40 layers ≈ 21 GB (Fits comfortably).
    - MHA Attention Matrix: 32 heads * 128,000 * 128,000 * 2 bytes ≈ 1.05 TB (Infeasible).
    - Sliding Window Attention: 32 * 128,000 * 4096 * 2 bytes ≈ 33.5 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound.** GQA solves the KV cache memory bottleneck, and Sliding Window bounds the attention computation.
