title: MoE Gating Network Overhead
scenario: A DeepSeek-V3-style MoE layer uses a gating network that takes a 7168-dim hidden state and produces logits over 256 experts. The gating network is a single linear layer.
question: What is the parameter count of the router, and what fraction of total layer parameters does it represent?
details:
  realistic_solution: 'Router parameters: 7168 × 256 = 1,835,008 (~1.84M). Each expert FFN has approximately 7168 × 3 × 18432 = 396M parameters (up/gate/down projections). With 256 experts: 256 × 396M = 101.4B. The shared attention layers add more. Router fraction: 1.84M / 101.4B = 0.0018%, negligible. The router is deliberately tiny because it sits on the critical path — every token must pass through it before dispatch. A 2-layer MLP router would add latency for marginal routing quality improvement. The real computational cost of routing is not the router itself but the all-to-all communication it triggers.'
  common_mistake: |
    **The Pitfall:** Overcomplicating the router architecture.
    **The Rationale:** Assuming a complex multi-layer router is needed for good routing quality.
    **The Consequence:** Adding unnecessary latency on the critical path, as every token must pass through it.
  napkin_math: |
    - **Router params**: 7168 * 256 = 1.84M params.
    - **Expert FFN params**: ~396M params each * 256 experts = 101.4B.
    - **Router fraction**: 1.84M / 101.4B = 0.0018%.
    - **Result**: **Router parameter count is negligible.**
