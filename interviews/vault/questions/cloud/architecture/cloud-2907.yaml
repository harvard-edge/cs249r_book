title: Implement channel pruning for EfficientNet-B3 to reduce serving costs
scenario: You need to reduce EfficientNet-B3 (12M params, 1.8 GFLOPs) serving costs on an accelerator by 40% while retaining 81% top-1 accuracy on your product dataset (originally 81.6%). You must implement a structured channel pruning pipeline.
question: How would you prune EfficientNet-B3 by 40% serving cost while retaining at least 81% top-1, and how would you validate it in TensorRT?
details:
  realistic_solution: Use structured channel pruning with a hardware-measured target, not unstructured zeroing. Start with per-stage sensitivity analysis on EfficientNet-B3 MBConv blocks, then prune expansion/projection channels with dependency-aware tooling so adjacent convolutions and squeeze-excite dimensions stay valid. Prune lightly in the stem, early high-resolution stages, and classifier head; prune more aggressively in FLOP-heavy middle stages until the rebuilt model is near 1.08 GFLOPs. Fine-tune with distillation from the original model and stop only if held-out top-1 remains at least 81%. For TensorRT validation, export the physically smaller ONNX graph, build FP16/INT8 engines, inspect layer support and tactic choices, then measure post-conversion top-1 plus P50/P95 latency and throughput on the target accelerator. The 40% serving-cost claim should be accepted only if the TensorRT engine shows the target latency/throughput reduction, not just a theoretical FLOP count.
  common_mistake: |
    **The Pitfall:** Applying uniform pruning ratios across all layers of the network.
    **The Rationale:** It's the simplest approach, but it ignores that different layers have different sensitivities to pruning.
    **The Consequence:** Over-pruning the first layers (critical for low-level feature extraction) and under-pruning the last expansion stages (which dominate FLOPs), resulting in a severe accuracy drop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline FLOPs: 1.8 GFLOPs.
    - Target Reduction: 40% (retain 60% = 1.08 GFLOPs).
    - FLOPs scale roughly as C_out * C_in.

    **Calculations:**
    - Target FLOPs after pruning: 1.8 * 0.60 = 1.08 GFLOPs.
    - If every pruned convolution reduced both input and output channels uniformly, the active channel ratio would satisfy x^2 = 0.60, so x = 0.775.
    - That corresponds to 22.5% fewer active channels in that simplified case, but EfficientNet-B3 FLOPs are uneven across stages and depthwise/pointwise layers scale differently.
    - Therefore the pruning ratios must be stage-aware and verified by recomputing the actual graph FLOPs after each pruning plan.

    **Conclusion & Interpretation:**
    - **Result: Stage-Aware Structured Pruning.** Use 1.08 GFLOPs as the design target, but validate the final serving-cost reduction with the TensorRT engine's measured latency/throughput and the held-out 81% top-1 threshold.
