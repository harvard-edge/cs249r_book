title: RLHF vs RLAIF Infrastructure Cost Comparison
scenario: A 7B assistant model needs to be fine-tuned, and the team is evaluating the infrastructure cost of RLHF with human feedback versus RLAIF (RL from AI Feedback using a judge LLM).
question: What is the RLHF vs RLAIF cost difference for 10K and 100K preference comparisons?
details:
  realistic_solution: 'RLHF: 10K human comparisons × $0.10/comparison = $1,000 labeling cost + GPU training (~$128 for 7B on 8×H100 for 1000 PPO steps). RLAIF with a judge LLM: 10K AI comparisons × $0.005/comparison = $50 + the same training cost. At 100K comparisons, labeling is $10,000 for RLHF versus $500 for RLAIF, with the same $128 training cost added to both. Under these assumptions, RLAIF is cheaper at both 10K and 100K because the fixed training cost cancels in a direct comparison; quality and safety requirements may still justify human labels.'
  common_mistake: |
    **The Pitfall:** Ignoring the API inference cost of the judge LLM in RLAIF.
    **The Rationale:** Because calling an LLM for a few samples is trivial ($0.01), engineers assume AI labeling is practically free.
    **The Consequence:** The compounding cost of running hundreds of thousands of tokens through a premium model like GPT-4-turbo catches teams off guard during large-scale preference curation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Human label cost: $0.10/comparison.
    - Judge LLM label cost: $0.005/comparison.
    - Training overhead: 8 GPUs * 4 hours * $4/GPU-hr = $128.

    **Calculations:**
    - 10K RLHF: 10,000 * $0.10 + $128 = $1,128.
    - 10K RLAIF: 10,000 * $0.005 + $128 = $178.
    - 100K RLHF: 100,000 * $0.10 + $128 = $10,128.
    - 100K RLAIF: 100,000 * $0.005 + $128 = $628.
    - Variable labeling cost ratio: $0.10 / $0.005 = 20x.

    **Conclusion & Interpretation:**
    - **Result: Labeling Cost Dominated (Cost-Bound)**. RLAIF costs about 84% less overall at 10K ($178 vs $1,128) and about 94% less at 100K ($628 vs $10,128); there is no positive cost crossover under these assumptions because the same fixed training cost applies to both.
