title: The MoE Compute Fallacy
scenario: You are planning the training run for a new Mixture-of-Experts (MoE) LLM. The model has a total of 1 Trillion parameters, composed of 10 experts of 100B parameters each. During a forward pass, the router sends each token to the 2 best experts.
question: How should you estimate Chinchilla-optimal training compute for this 1T-parameter MoE with 2 of 10 experts active per token?
details:
  realistic_solution: 'Use the stated simplified MoE accounting convention: estimate per-token training compute from the parameters activated by each token. Here, 2 of 10 experts are active, so `P_active = 2 * 100B = 200B`. With the Chinchilla-style token heuristic `D ≈ 20 * P_active`, the token budget is 4T tokens. Training compute is `C ≈ 6 * P_active * D = 6 * 200B * 4T = 4.8e24 FLOPs`. This is an active-parameter compute estimate, not a universal claim that all MoE scaling-law accounting should ignore total parameters.'
  common_mistake: |
    **The Pitfall:** Using the total parameter count (1T) in the scaling law formula rather than the active parameter count.
    **The Rationale:** Engineers are used to dense models where total parameters equal active parameters, forgetting the fundamental efficiency premise of MoE routers.
    **The Consequence:** Overestimating the required compute by a massive margin, leading to a wildly incorrect budget and resource allocation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total parameters: 1T (10 experts * 100B).
       - Active experts per token: 2.
       - Simplified MoE accounting: use active parameters per token for P.
       - Chinchilla-style compute estimate: C ~= 6 * P * D, where D ~= 20 * P.
    2. **Calculations:**
       - Active Params (P) = 2 experts * 100B = 200B.
       - Optimal tokens (D) = 20 * P = 20 * 200B = 4 Trillion tokens.
       - Training compute (C) = 6 * 200B * 4T = 6 * 2 * 10^11 * 4 * 10^12 = 4.8 * 10^24 FLOPs.
       - Naive dense-style compute using 1T params and 20T tokens would be 6 * 1T * 20T = 1.2 * 10^26 FLOPs.
    3. **Conclusion & Interpretation:** **Result: Active-Parameter Compute Estimate**. Under the stated convention, compute is budgeted on active parameters (4.8 * 10^24 FLOPs), not total parameters.
  options:
    - ~1.2 x 10^26 FLOPs
    - ~8.0 x 10^23 FLOPs
    - ~4.8 x 10^24 FLOPs
    - ~2.4 x 10^25 FLOPs
  correct_index: 2
