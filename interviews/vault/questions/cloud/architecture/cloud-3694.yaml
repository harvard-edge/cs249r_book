title: Combining Pipeline and Tensor Parallelism for 1T Parameter Model
scenario: You need to train a 1 trillion parameter model on 1024 H100 GPUs.
question: What data, tensor, and pipeline parallelism factors would you choose for a 1T-parameter model on 1024 H100s under a 70GB HBM limit, and why?
details:
  realistic_solution: 'One valid 3D parallelism choice is TP=8, PP=16, DP=8, using 8×16×8 = 1024 GPUs. TP=8 stays within fast intra-node NVLink, PP=16 shards layers across pipeline stages, and DP=8 provides batch scaling plus ZeRO-1 optimizer sharding. Under this scheme each GPU owns 1T/(TP×PP) ≈ 7.8B local parameters: 15.6 GB BF16 weights and about 15.6 GB BF16 gradients. Optimizer state at 12 bytes/param is 93.6 GB for the local shard before ZeRO-1, or 11.7 GB/GPU after sharding across DP=8. Static memory is about 42.9 GB before activations, leaving roughly 27 GB under a 70 GB HBM limit. Other TP/PP/DP splits can be valid if they meet memory, bandwidth, pipeline-bubble, and batch-size constraints.'
  common_mistake: |
    **The Pitfall:** Using only pipeline parallelism for massive 1T parameter models.
    **The Rationale:** Candidates assume pipeline parallelism scales cleanly, ignoring that activation memory scales with model width and the pipeline bubble becomes enormous without tensor parallelism.
    **The Consequence:** Severe memory fragmentation and idle GPU time (massive pipeline bubbles) destroy training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1T params, 1024 H100s (70 GB limit).
    - Candidate split: TP=8, PP=16, DP=8.
    - BF16 weights and gradients: 2 bytes/param each.
    - Optimizer states: 12 bytes/param before ZeRO-1 sharding across DP.

    **Calculations:**
    - Local parameter shard per GPU = 1T / (TP × PP) = 1T / 128 = 7.8125B params.
    - Weights per GPU = 7.8125B × 2 bytes = 15.6 GB.
    - Gradients for the local parameter shard = 7.8125B × 2 bytes = 15.6 GB.
    - Optimizer for local shard before ZeRO-1 = 7.8125B × 12 bytes = 93.8 GB.
    - ZeRO-1 optimizer shard across DP=8 = 93.8 GB / 8 = 11.7 GB/GPU.
    - Static memory = 15.6 + 15.6 + 11.7 = 42.9 GB/GPU.

    **Conclusion & Interpretation:**
    - **Result: 42.9 GB static memory (Memory-Bound)**. TP=8, PP=16, DP=8 is one feasible split, leaving ~27 GB for activations and fragmentation under the 70GB HBM limit.
