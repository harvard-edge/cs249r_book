title: MoE Serving Cost-per-Token Economics
scenario: You are comparing the serving cost-per-token for a dense 70B model on $2\times$ H100 versus an MoE 8x7B (47B total, 13B active) on $2\times$ H100. Both serve at 1000 requests/second with 512-token outputs.
question: What active and full FP16 weight footprints should you use for Mixtral 8x7B in the serving cost comparison, and why do both models require the same number of GPUs?
details:
  realistic_solution: 13B active params at FP16 = 13B x 2B = 26 GB active weight footprint per token. The full Mixtral 8x7B footprint is about 47B x 2B = 94 GB, because all experts must remain memory-resident for serving even though each token activates only a subset. The dense 70B baseline is also about 70B x 2B = 140 GB. Since both 94 GB and 140 GB exceed a single 80 GB H100, both models require sharding across 2 H100s in this comparison. Serving cost should therefore account for full residency and sharding, not just active FLOPs.
  common_mistake: |
    **The Pitfall:** Comparing only per-token FLOPs.
    **The Rationale:** Candidates see that the MoE model has 5x fewer *active* FLOPs and mistakenly assume it requires 5x less hardware.
    **The Consequence:** Grossly underestimating serving costs, forgetting that all 47B expert weights must remain memory-resident across the GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: Mixtral 8x7B MoE (47B total params, 13B active params).
    - Dense comparison model: 70B total params.
    - Precision: FP16 (2 bytes per param).
    - Hardware: H100 (80 GB).

    **Calculations:**
    - Active Memory: 13B * 2 bytes = 26 GB.
    - MoE Total Memory: 47B * 2 bytes = 94 GB.
    - Dense Total Memory: 70B * 2 bytes = 140 GB.
    - Hardware Requirement: 94 GB > 80 GB and 140 GB > 80 GB, so both require 2x H100 GPUs for FP16 weight residency in this setup.

    **Conclusion & Interpretation:**
    - **Result: 2x H100 required for both models (Memory-Capacity-Bound)**. Despite a 26 GB active footprint per token, the full ~94 GB FP16 MoE weight set must be resident, and the dense 70B baseline is ~140 GB.
