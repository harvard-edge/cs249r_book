title: Model Parallelism Strategy for 100TB Embedding Cluster
scenario: Design the training parallelism strategy for a DLRM with 100 TB of embedding tables and a 10B parameter MLP across 512 GPUs and CPUs.
question: "What hybrid training strategy and throughput would you expect for 100 TB embeddings and a 10B-parameter MLP on 512 H100s plus CPU nodes?"
details:
  realistic_solution: Use hybrid parallelism. Embeddings need model parallelism (hot on GPU, cold on CPU) with sparse row-wise all-to-all updates. The dense MLP uses data parallelism and ring-allreduce.
  common_mistake: |
    **The Pitfall:** Applying data parallelism uniformly across the entire model.
    **The Rationale:** Assuming standard DP works efficiently for massive sparse parameters.
    **The Consequence:** Catastrophic scaling due to massive all-to-all transfers of embedding weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10B MLP (20GB). 512 GPUs, 400 Gbps (50 GB/s) link.

    **Calculations:**
    - MLP all-reduce time = 40 GB / 50 GB/s = 800 ms.
    - Embedding all-to-all = 10.5 ms.

    **Conclusion & Interpretation:**
    - **Result: Throughput reaches 2.58M samples/s, fundamentally bound by the dense MLP all-reduce (Compute-Bound)**.
