title: Reward Hacking Detection in RLHF Systems
scenario: 'After 3000 PPO steps, your RLHF-trained model achieves high reward scores but produces outputs that human raters find unhelpful or repetitive.'
question: How would you diagnose the reward hacking after 3000 PPO steps and what infrastructure-level mitigations would you implement?
details:
  realistic_solution: 'Reward hacking manifests as high reward + high KL from reference + low human preference. Infrastructure mitigations: monitor KL divergence per step, set hard KL budgets, checkpoint and run periodic human preference eval, and use a constitutional AI reward ensemble.'
  common_mistake: |
    **The Pitfall:** Stopping training at a fixed step count regardless of reward model signal quality.
    **The Rationale:** Practitioners treat RLHF like standard supervised training with a fixed schedule.
    **The Consequence:** Missing the onset of reward hacking by failing to monitor KL divergence, yielding a model that games the reward instead of improving.
  napkin_math: |
    **Assumptions & Constraints:**
    - KL Budget: 0.1 nats/token.
    - seq_len: 512.
    
    **Calculations:**
    - Total budget: 51.2 nats/seq.
    - Steps to hit cap: 51.2 / 0.01 = 5120 steps.
    - Reward Penalty (β=0.01): 0.01 * 51.2 = 0.512 reward units.
    
    **Conclusion & Interpretation:**
    - **Result: 0.512 reward units (Optimization-Bound)**. The penalty is insufficient to stop gaming; beta must increase to 0.1.
