title: MoE Memory Footprint vs Dense Equivalent
scenario: Compare the memory footprint for serving a Mixtral 8x7B MoE model (46.7B total parameters, 12.9B active per token) versus a dense 13B model, both in BF16 on GPUs. How many GPUs does each require, and what is the memory efficiency gap?
question: How many GPUs does each require, and what is the memory efficiency gap?
details:
  realistic_solution: |
    Dense 13B: 13B × 2B = 26 GB — fits on a single GPU with ample room for KV-cache. Mixtral 8x7B: 46.7B × 2B = 93.4 GB — requires at least 2 GPUs. Despite having similar per-token compute (12.9B active ≈ 13B dense), the MoE model needs 3.6× more memory. This is the fundamental MoE serving challenge: you pay the memory cost of all experts but only use 2/8 = 25% of them per token. The benefit is quality — 46.7B parameters provide better representations than 13B, but at 3.6× memory cost for serving.
  common_mistake: |
    **The Pitfall:** Assuming MoE memory footprint scales with active parameter count.
    **The Rationale:** Engineers confuse "parameters used per token" with "parameters resident in memory," failing to account for the full physical size of the expert routing table.
    **The Consequence:** Grossly underprovisioning VRAM, resulting in out-of-memory errors on nodes sized for dense models of equivalent FLOPs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense 13B (26 GB in BF16).
       - Mixtral 8x7B (46.7B total, 12.9B active) = 93.4 GB in BF16.
       - Hardware = 80 GB GPU limit.
    2. **Calculations:**
       - Dense 13B requires 1 GPU (26 GB < 80 GB).
       - Mixtral 8x7B requires 2 GPUs minimum (93.4 GB > 80 GB).
       - Memory ratio = 93.4 / 26 = 3.6x.
       - Active FLOP ratio = 12.9B / 13B ≈ 1.0x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound**. The MoE model exhibits a massive 3.6x memory-to-compute inefficiency, fundamentally changing the serving economics compared to dense equivalents.
