title: A100 Inference Tradeoffs for Encoder-Only, Decoder-Only, and Encoder-Decoder Models
scenario: Your team is tasked with deploying a large language model for real-time inference on a fleet of NVIDIA A100 GPUs. You need to decide between an encoder-only, decoder-only, or a full encoder-decoder architecture. The primary constraints are minimizing inference latency and maximizing throughput, while also being highly cost-efficient at scale.
question: How would you analyze the system costs and architectural tradeoffs, specifically leveraging the A100's capabilities, to make a recommendation for a low-latency, high-throughput service?
details:
  realistic_solution: |
    A candidate should compare the three choices against the actual request type, not prescribe one architecture blindly. Encoder-only is the cost and throughput choice for classification, ranking, retrieval, or embeddings because it batches input tokens efficiently and avoids autoregressive KV-cache growth, but it cannot perform open-ended generation. Decoder-only is the recommendation for general chat or continuation because it directly supports generation, but on A100 it is often memory-bandwidth and KV-cache limited at low latency, so it needs tensor parallelism, quantization, paged KV cache, and latency-bounded batching. Encoder-decoder is the recommendation for bounded transformation tasks such as translation or summarization when a strong encoder plus smaller decoder reduces total decode work. The final recommendation should be the smallest architecture that satisfies quality: encoder-only for non-generative services, encoder-decoder for bounded seq2seq, and decoder-only only when open-ended generation is required.
  common_mistake: |
    **The Pitfall:** Overlooking the critical impact of memory bandwidth (2.0 TB/s) on effective sequence length.
    **The Rationale:** Candidates focus solely on total parameter count and raw TFLOPS, ignoring how the KV cache dominates memory access patterns in decoder-only models.
    **The Consequence:** Deploying an architecture that suffers severe latency spikes as sequence lengths grow, destroying the cost-efficiency at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Hardware: A100 (80GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s bandwidth).
    - Candidate decoder-only model: 70B parameters.
    - INT8 serving is considered for memory fit; batch-1 decode is the latency-sensitive case.
    - Example KV shape: 80 layers, 64 KV heads, d_head=128.

    **Calculations:**
    - FP16 weights = 70B * 2 bytes = 140 GB, requiring tensor parallelism across at least 2 A100s.
    - INT8 weights = 70B * 1 byte = 70 GB, leaving about 10 GB for KV cache, activations, and runtime buffers on one 80GB A100.
    - Decode compute per output token is roughly 2 * 70B = 140 GFLOPs; at 30% of 312 TFLOPS sustained, compute time ≈ 140 / 93,600 = 1.5 ms.
    - If low-batch decode rereads most INT8 weights from HBM across layers, a bandwidth floor is about 70 GB / 2000 GB/s = 35 ms per token before KV-cache reads and kernel overhead; good batching and caching can amortize parts of this traffic.
    - KV cache per generated token in FP16 = 2 * 80 * 64 * 128 * 2 bytes ≈ 2.5 MB, so long contexts and batching quickly consume the remaining HBM.

    **Conclusion & Interpretation:**
    - **Result: choose by task shape.** Encoder-only is cheapest for non-generative work, encoder-decoder is often best for bounded seq2seq, and decoder-only is justified for open-ended generation but needs careful KV and weight-bandwidth budgeting on A100.
