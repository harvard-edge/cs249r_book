title: Evaluating Split-Pool vs Chunked Prefill
scenario: 'Your team is serving a 70B parameter LLM on 8x 80GB instances. When long-context prompts (8k tokens) arrive concurrently with decode requests, the compute-heavy prefill phase starves the memory-bound decode phase, causing decode latencies to violate the 50ms/token P99 SLO. One engineer proposes "Split-Pool" serving: routing all prefills to a dedicated pool and transferring the KV cache over the ethernet network to a separate decode pool.'
question: Should the service use split-pool serving or chunked prefill to protect the 50ms/token decode latency, and why?
details:
  realistic_solution: Chunked Prefill on a unified pool is usually preferable for moderate contexts. It splits the long prefill into smaller chunks (e.g., 512 tokens) and interleaves them with decode requests, protecting the 50ms/token decode SLO without adding a per-request KV-cache network transfer that inflates TTFT.
  common_mistake: |
    **The Pitfall:** Proposing Split-Pool serving without calculating the massive KV cache network transfer overhead.
    **The Rationale:** Disaggregating compute-bound and memory-bound workloads is a standard cloud design pattern.
    **The Consequence:** The network interface completely saturates, causing Time-To-First-Token (TTFT) to heavily regress and eliminating any benefits of workload isolation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B GQA model: 80 layers, 8 KV heads, 128 dim, FP16.
    - 8K token prompt, 100 Gbps (12.5 GB/s) ethernet.

    **Calculations:**
    - KV cache size per token: 2(K,V) * 80 layers * 8 KV heads * 128 dim * 2 bytes = 327,680 bytes (312.5 KiB).
    - Total KV payload: 8,000 * 327,680 bytes = 2.62 GB (about 2.44 GiB).
    - Network transfer: 2.62 GB / 12.5 GB/s ≈ 210 ms before serialization, queuing, or RPC overhead.

    **Conclusion & Interpretation:**
    - **Result: Split-pool adds about 210 ms of TTFT per 8K prompt (Network-Bound)**. That is already more than four 50ms decode-token intervals, so chunked prefill is the cleaner SLO protection unless the deployment has a much faster KV-transfer path.
