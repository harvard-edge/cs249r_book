title: The FP32 Fallback Penalty
scenario: You serve a PyTorch model on a GPU. The model is cast to `torch.float16`. You use standard matrix multiplications. However, your profiler shows the GPU is only achieving 8 TFLOPS of throughput, which is the theoretical maximum for FP32 on this hardware.
question: Why is your FP16 model running at FP32 speeds?
details:
  realistic_solution: The model weights may be FP16, but the hot matrix multiplications are not using FP16 Tensor Core kernels. Tensor Cores require eligible kernels, layouts, and dimensions, commonly multiples of 8 or 16 depending on the GPU/library path. If shapes are misaligned, tensors are repeatedly cast, or the code bypasses AMP/vendor fused kernels, performance can land near the non-Tensor-Core path. The fix is to profile the actual GEMM kernels, use AMP/autocast or Tensor Core-capable fused kernels, keep activations and weights in FP16 where intended, and pad/choose dimensions that satisfy Tensor Core alignment. TF32 flags are for FP32 matmuls and are not the remedy for an FP16 Tensor Core utilization problem.
  common_mistake: |
    **The Pitfall:** Assuming the model didn't actually cast to FP16.
    **The Rationale:** When performance doesn't increase, engineers often suspect the tensor data types remained FP32.
    **The Consequence:** They fail to realize the math engine is falling back to CUDA cores because of unaligned matrix dimensions or missing backend flags.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Non-Tensor-Core path observed by profiler: about 8 TFLOPS.
       - Peak FP16 Tensor Core path on this hardware: about 65 TFLOPS.
       - Tensor Cores require dimensions to be multiples of 8.
    2. **Calculations:**
       - Potential headroom if eligible kernels use Tensor Cores: 65 / 8.1 ≈ 8x.
       - The profiler result does not prove FP32 arithmetic; it proves the workload is missing the high-throughput FP16 Tensor Core path.
    3. **Conclusion & Interpretation:**
       - **Result: Tensor Core Eligibility Bottleneck.** Fix kernel choice, dtype flow, and matrix alignment so FP16 matmuls dispatch to Tensor Core-capable kernels.
