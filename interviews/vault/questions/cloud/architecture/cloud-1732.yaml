title: LLM Inference Phase Bottlenecks
scenario: You are serving a 70B parameter LLM. The system processes an incoming request with a 2048-token prompt (the prefill phase) and generates 128 subsequent tokens (the decode phase) at a batch size of 1. Assume we are ignoring the KV cache size for this specific calculation.
question: What are the arithmetic intensities for a 2048-token prefill and single-token decode, and which hardware limit bounds each phase?
details:
  realistic_solution: Calculate FLOPs using the 2*N*T approximation. Prefill has an arithmetic intensity of ~2048 FLOPs/byte, sitting high on the roofline and making it compute-bound. Decode has an intensity of 1 FLOP/byte, making it purely memory bandwidth-bound. The optimal architectural solution is phase disaggregation (e.g., Splitwise), where prefill and decode are scheduled on different pools of hardware to maximize utilization.
  common_mistake: |
    **The Pitfall:** Averaging the FLOPs across the entire request or failing to recognize the memory bottleneck of decoding.
    **The Rationale:** Candidates often overlook that the entire 140GB model must be loaded from HBM into SRAM to compute just a single token during the decode phase.
    **The Consequence:** This leads to incorrect hardware provisioning, such as over-indexing on compute capabilities (TFLOPS) for a system that will be bottlenecked by memory bandwidth during decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter model (140 GB weights in FP16).
    - 2048-token prefill, 1-token decode step.

    **Calculations:**
    - Prefill FLOPs: 2 * 70B * 2048 = 286 TFLOPs.
    - Prefill Bytes: 140 GB. Intensity: 286e12 / 140e9 ≈ 2048 FLOPs/Byte.
    - Decode FLOPs (1 token): 2 * 70B * 1 = 140 GFLOPs.
    - Decode Bytes: 140 GB. Intensity: 140e9 / 140e9 = 1 FLOP/Byte.

    **Conclusion & Interpretation:**
    - **Result: Prefill Compute-Bound, Decode Memory-Bandwidth-Bound**. 2048 FLOPs/Byte vs 1 FLOP/Byte.
