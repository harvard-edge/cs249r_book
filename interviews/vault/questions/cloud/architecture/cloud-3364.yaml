title: 'LLM Deployment Feasibility on AMD MI300X'
scenario: 'You are tasked with deploying a 70-billion parameter Large Language Model (LLM) for real-time inference on a system equipped with an AMD MI300X accelerator. The MI300X boasts 192 GB of HBM3 memory, 1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth. The model weights are stored in FP16.'
question: 'Can a 70B FP16 LLM fit and run in real time on one MI300X, and what memory or bandwidth bottlenecks would you expect?'
details:
  realistic_solution: 'A realistic approach involves a comprehensive memory budget: model weights (140GB for FP16), activations (highly dependent on batch size and sequence length), KV cache (batch size * sequence length * num_heads * head_dim * 2 bytes/token/layer), and system overhead. Quantization to INT8 (70GB) or even INT4 (35GB) should be considered to fit the model and leave room for activations/KV cache. Performance estimation should factor in effective FLOPs utilization, memory bandwidth (5.3 TB/s), and the nature of the LLM operations (dense vs. sparse). If a single MI300X is insufficient, strategies like tensor parallelism, pipeline parallelism, or offloading parts of the model to CPU/other accelerators must be explored.'
  common_mistake: |
    **The Pitfall:** Only calculating memory for model weights and ignoring dynamic activations and KV cache.
    **The Rationale:** Engineers assume that if the static parameters fit in VRAM, the model can serve requests.
    **The Consequence:** The deployment instantly OOMs in production when batch sizes increase or sequences get long.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: 70B parameters $\times$ 2 bytes = 140 GB.
    - VRAM Limit: 192 GB.
    
    **Calculations:**
    - Remaining VRAM: 192 GB - 140 GB = 52 GB remaining for KV cache.
    - KV Cache Estimate: Llama 2 70B (80 layers, 80 heads, 128 dim) at batch=1, seq=2048 takes $\approx 8.5 \text{ GB}$.
    
    **Conclusion & Interpretation:**
    - **Result: 52 GB Remaining (Memory-Capacity-Bound)**. The 70B FP16 model fits comfortably on a single 192GB MI300X with ample room for sequence context.
