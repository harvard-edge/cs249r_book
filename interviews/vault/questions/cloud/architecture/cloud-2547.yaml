title: Cloud Weight Stationary L3 0
scenario: A weight-stationary accelerator has 256 PEs, each with 2 KB local SRAM. You want to run a 2048x2048 FP16 weight matrix through it.
question: 'For a 2048x2048 FP16 matrix on 256 PEs with 2 KB SRAM each, how many weight tiles are needed and what is the weight traffic?'
details:
  realistic_solution: 'Total weight size: 2048 x 2048 x 2 bytes = 8 MB. Per-PE SRAM: 2 KB. Total on-chip weight capacity: 256 PEs x 2 KB = 512 KB. Tiles needed: 8 MB / 512 KB = 16 tiles. Each tile loads 512 KB of weights, processes all inputs against that tile, then loads the next. Total weight traffic: 16 tiles x 512 KB = 8 MB (each weight loaded exactly once across all tiles). If batch size is B, inputs stream B times per tile: total input traffic = 16 x B x 2048 x 2B / 16 = B x 8 KB per tile x 16... Simplifying: weights loaded once (8 MB), inputs loaded once per tile pass.'
  common_mistake: |
    **The Pitfall:** Thinking weight-stationary means weights are never reloaded.
    **The Rationale:** When the weight matrix exceeds on-chip capacity, it must be tiled.
    **The Consequence:** Miscalculating total memory bandwidth requirements by assuming a single load for the entire weight matrix.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: 2048x2048 FP16.
    - On-chip SRAM: 256 PEs x 2 KB = 512 KB.

    **Calculations:**
    - Weight size = 2048^2 x 2B = 8 MB.
    - Tiles = 8 MB / 512 KB = 16.

    **Conclusion & Interpretation:**
    - **Result: 16 tiles, 8 MB traffic (Memory Bandwidth)**. Weight-stationary loads each weight once across all tiles.
