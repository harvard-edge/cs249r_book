title: Cloud Fallback Minimization via AOT Compilation
scenario: Your mobile app uses a super-resolution model for images. You use a cloud fallback API when on-device inference fails. Currently, 40% of Android inferences fall back to the cloud API (costing $8,000/day in AWS GPU instances). Investigation reveals that while the model is converted to TFLite INT8, many ops are not supported by older Android NNAPI drivers, causing the runtime to fall back to the phone's CPU. CPU inference takes 3 seconds (exceeding the 1s timeout), which triggers the cloud fallback.
question: How do you architect the deployment pipeline to reduce cloud fallback caused by Android NNAPI/CPU execution failures while keeping on-device latency under the 1s timeout?
details:
  realistic_solution: Integrate an Ahead-of-Time (AOT) compiler and op-coverage validation into the deployment pipeline, shifting from one generic TFLite/NNAPI artifact to device-specific backend packages. The cloud CI/CD pipeline should compile and test the model against common Android GPU/DSP targets such as Adreno, Mali, and Hexagon, selecting OpenCL/Vulkan/DSP backends when they cover the full graph and rejecting builds that silently fall back to slow CPU execution. For unsupported ops, rewrite, fuse, quantize, or replace them before release, and keep a measured cloud fallback path only for device classes that cannot meet the 1s budget.
  common_mistake: |
    **The Pitfall:** Just increasing the timeout to 3 seconds.
    **The Rationale:** Candidates prioritize lowering cloud costs without considering the client-side implications of a blocking, 3-second UI freeze.
    **The Consequence:** Drastically reduced cloud costs achieved at the expense of user experience, leading to massive app abandonment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud fallback rate: 40%.
    - Current cloud cost: $8,000/day.
    - Timeout threshold: 1.0s.
    - The measured problem is not raw cloud capacity; it is unsupported ops and driver fragmentation causing CPU execution that exceeds the timeout.
    - Any claimed fallback reduction must come from a device compatibility matrix, not a fixed percentage assumption.

    **Calculations:**
    - For each Android device class, run CI tests that verify: all model ops are covered by the selected GPU/DSP backend, no unsupported-op CPU partition appears, and p95 latency is below 1.0s.
    - Device classes that pass receive the AOT artifact and avoid cloud fallback for this failure mode.
    - Device classes that fail stay on the cloud fallback path until the model is rewritten or a compatible backend is available.
    - Cloud cost falls in proportion to the measured share of traffic moved from the 40% fallback bucket to verified sub-1s on-device execution; it should not be estimated from arbitrary AOT coverage percentages.

    **Conclusion & Interpretation:**
    - **Result: Compatibility-Bound Fallback Reduction.** AOT compilation helps only when it eliminates unsupported ops and driver-dependent CPU partitions for measured device classes; the architecture should gate rollout on op coverage and latency tests, then keep cloud fallback for the remaining unsupported devices.
