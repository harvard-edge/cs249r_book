title: 'TEEs for Cloud Medical Inference'
scenario: Deploying a 5GB Vision Transformer (ViT-L) for medical image diagnosis on public cloud infrastructure. Strict HIPAA mandates require data-in-use encryption. Expected peak load is 200 QPS. You must utilize Trusted Execution Environments (TEEs).
question: How would you deploy the 5GB ViT-L with TEEs for HIPAA data-in-use encryption while supporting 200 QPS?
details:
  realistic_solution: 'Utilize Confidential VMs (e.g., AMD SEV-SNP or Intel TDX) paired with Confidential GPUs (e.g., NVIDIA H100 with CC enabled). CPU TEEs strictly limit enclave memory and lack parallel compute. Confidential GPUs provide full memory encryption at hardware speed but introduce latency during CPU-to-GPU memory transfers via PCIe due to bounce buffers and encryption overhead. To amortize this PCIe encryption penalty, implement dynamic batching. The tradeoff here is slightly increased baseline latency in exchange for massively higher throughput.'
  common_mistake: |
    **The Pitfall:** Using CPU-based TEEs (like Intel SGX) for the entire model.
    **The Rationale:** CPU TEEs lack the memory bandwidth, parallel compute, and enclave memory size required for large ViTs.
    **The Consequence:** Results in massive out-of-memory errors and multi-second latencies, completely failing the 200 QPS target.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 QPS target. 5GB ViT-L. Target Batch Size: 8 (3MB each = 24MB).
    - PCIe C-GPU Encryption: 10GB/s effective. H100 BS=8 forward: 15ms.
    
    **Calculations:**
    - Transfer Time: 24MB / 10GB/s = 2.4ms.
    - Total Time: 2.4ms + 15ms = 17.4ms.
    - Interval for 200 QPS: 8 / 200 = 40ms.
    
    **Conclusion & Interpretation:**
    - **Result: 17.4ms per window (Latency-Bound)**. Dynamic batching takes 17.4ms per 40ms window, easily supporting 200 QPS with TEE protection.
