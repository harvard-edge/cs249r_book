title: Evaluating Confidential Computing for Exact Model Theft
scenario: You are the security architect for a cloud AI provider deploying a proprietary 70B parameter LLM (140GB in FP16) on an auto-scaling cluster of instances with 8x H100 GPUs. An internal red team demonstrated they can extract the raw `model.safetensors` files by escaping the inference container and dumping host RAM/VRAM.
question: Which architecture best prevents exact extraction of the 140GB model by an insider, and why?
details:
  realistic_solution: Deploying hardware-based Confidential Computing (e.g., NVIDIA Hopper CC paired with AMD SEV-SNP). The 140GB model is decrypted only within the hardware-protected memory enclave. While this introduces a ~5-10% performance overhead and limits profiling tools, it cryptographically isolates the weights from the host OS, hypervisor, and other tenants, making memory dumping mathematically infeasible.
  common_mistake: |
    **The Pitfall:** Relying solely on disk encryption (KMS/LUKS) and strict RBAC.
    **The Rationale:** Assuming the host OS is secure, forgetting that once weights are loaded into RAM/VRAM, a compromised hypervisor can dump them.
    **The Consequence:** Plaintext memory can be dumped directly, allowing exact model theft.
  napkin_math: |
    **Assumptions & Constraints:**
    - VRAM dumping speed: PCIe Gen5 x16 speeds (~64 GB/s).
    - Network exfiltration speed: stealthy 100 Mbps connection.

    **Calculations:**
    - Dumping 140GB from VRAM to host memory at 64 GB/s takes ~2.2 seconds.
    - Exfiltrating 140GB over 100 Mbps takes ~3.2 hours.

    **Conclusion & Interpretation:**
    - **Result: ~2.2 seconds (Bandwidth-Bound)**. Local dump is nearly instantaneous; prevention must occur at the memory level.
