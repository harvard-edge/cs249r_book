title: Calculate Expert Token Capacity in Top-1 MoE Routing
scenario: You are deploying an 8-expert Mixture of Experts (MoE) language model on
  a cluster of H100 GPUs (80 GB HBM3, 3.35 TB/s bandwidth). During the forward pass,
  the router assigns each token to exactly one expert (top-1 routing). Your system
  uses a batch size of 128 and a sequence length of 2048. To handle load imbalance
  among the experts, you configure a capacity factor of 1.25. Write the formula and
  calculate the exact expert capacity (maximum number of tokens an expert will allocate
  memory for and process in a single forward pass) before tokens are dropped.
question: What is the expert capacity per expert for batch 128, sequence length 2048,
  8 experts, and capacity factor 1.25?
details:
  realistic_solution: 'The correct approach is to calculate the total number of tokens
    in the forward pass, find the expected average number of tokens per expert under
    perfect load balancing, and then scale that average by the capacity factor to
    allocate buffer size. The formula is: Expert Capacity = (Batch Size * Sequence
    Length / Number of Experts) * Capacity Factor. Any tokens routed to an expert
    beyond this capacity are typically dropped or passed through unchanged via a residual
    connection.'
  common_mistake: Candidates often forget to multiply the batch size by the sequence
    length to get the total number of active tokens in the forward pass, or they incorrectly
    apply the capacity factor to the model's physical parameter size instead of the
    routing buffer size.
  napkin_math: "Total tokens = 128 (batch size) * 2048 (sequence length) = 262,144\
    \ tokens. \nAverage tokens per expert = 262,144 / 8 (experts) = 32,768 tokens.\
    \ \nExpert Capacity = 32,768 * 1.25 (capacity factor) = 40,960 tokens allocated\
    \ per expert buffer."
