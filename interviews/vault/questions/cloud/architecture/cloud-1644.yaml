title: Evaluating NUMA-Aware Data Loading Bottlenecks
scenario: You are architecting the data pipeline for a computer vision training cluster using nodes with dual-socket AMD EPYC CPUs (2 NUMA nodes) and 8x NVIDIA A100 GPUs. Profiling shows that GPUs 4-7 (attached to CPU Socket/NUMA node 1) are experiencing 30% lower utilization than GPUs 0-3 (attached to NUMA node 0). The PyTorch data loader currently spawns 96 worker threads globally managed by the OS.
question: What causes GPUs 4-7 to run at 30% lower utilization, and how should you redesign data-loader CPU and memory affinity?
details:
  realistic_solution: Implement strict NUMA affinity and thread pinning. Map data loader worker threads to the specific NUMA node corresponding to their target GPU's PCIe root complex (e.g., threads 0-63 to NUMA node 0 for GPUs 0-3, and 64-127 to NUMA node 1 for GPUs 4-7) to ensure local DRAM allocation and prevent cross-socket data transfers.
  common_mistake: |
    **The Pitfall:** Assuming the OS scheduler will automatically optimize memory page allocation for PCIe topology, or attempting to solve the bottleneck by simply increasing the global data loader worker count.
    **The Rationale:** Global scheduling ignores NUMA boundaries, causing cross-socket interconnect traffic. Adding more workers exacerbates the traffic on the already bottlenecked inter-socket link.
    **The Consequence:** Persistent GPU starvation and wasted compute resources, regardless of how many CPU cores are thrown at the problem.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8x A100 per node, PCIe Gen4 x16 (~32 GB/s per GPU).
       - Interconnect: AMD xGMI inter-socket link (~72 GB/s limit).
       - Local memory: 8-channel DDR4-3200 (~204 GB/s).
    2. **Calculations:**
       - Target bandwidth for GPUs 4-7 on Socket 1: 4 GPUs * 32 GB/s = 128 GB/s demand.
       - Threads globally scheduled on Socket 0 push data over xGMI to Socket 1.
       - Throughput ratio: 72 GB/s max capacity / 128 GB/s demand = 56.25%.
    3. **Conclusion & Interpretation:** **Throughput bottlenecked to roughly 56% of theoretical max. Interconnect-Bandwidth-Bound.**
