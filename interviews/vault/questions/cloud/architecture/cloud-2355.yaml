title: Root Causing NVLink P2P Fallback
scenario: 'A 4x GPU LLM inference node utilizing Tensor Parallelism (TP=4) exhibits 50ms latency per token instead of the expected 15ms. Nsight Systems profiling reveals that intra-node AllGather operations are capping at approximately 24 GB/s, drastically lower than the hardware''s 300 GB/s NVLink bandwidth capability.'
question: Why are TP=4 AllGather ops capped near 24GB/s instead of 300GB/s NVLink on the 4-GPU node, and how would you restore P2P?
details:
  realistic_solution: |
    The root cause is PCIe Access Control Services (ACS) or IOMMU enabled in the host BIOS, which prevents true Peer-to-Peer memory access. Disable ACS in the BIOS and verify the topology using `nvidia-smi topo -m`.
  common_mistake: |
    **The Pitfall:** Assuming NCCL is misconfigured and blindly setting `NCCL_P2P_DISABLE=1`.
    **The Rationale:** Engineers guess that P2P is broken and disable it to force a stable state.
    **The Consequence:** Forcing slower communication over PCIe permanently instead of fixing the BIOS settings blocking true NVLink P2P.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVLink: 300 GB/s.
    - PCIe fallback: ~24 GB/s.
    
    **Calculations:**
    - NVLink transfer (1GB): 1 / 300 = 3.3ms.
    - PCIe transfer (1GB): 1 / 24 = 41.6ms.
    - Difference: 41.6 - 3.3 = 38.3ms.
    
    **Conclusion & Interpretation:**
    - **Result: ~38.3ms penalty (Bandwidth-Bound)**. The ~38ms penalty perfectly accounts for the latency jump, confirming PCIe fallback.
