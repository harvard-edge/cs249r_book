title: Evaluating Spatial Placement for Fused Attention
scenario: 'You are mapping a Transformer layer onto an AI accelerator containing a 256x256 Matrix Multiply Unit (MXU) (100 TFLOPS peak) and a Vector Processing Unit (VPU) (2 TFLOPS peak for transcendentals). A forward pass requires 50 Tera-FLOPs for the dense FFN and 500 Giga-FLOPs for the Attention Softmax. Strategy A maps both sequentially on the MXU to avoid data movement, where Softmax runs at a degraded 5 TFLOPS effective throughput. Strategy B spatially pipelines the execution: FFN on the MXU and Softmax on the VPU, requiring 50 MB of intermediate data transfer over a 500 GB/s internal SRAM bus. Evaluate the strategies and identify the optimal placement to minimize end-to-end execution time per block.'
question: Should Softmax run sequentially on the MXU or be spatially pipelined on the VPU, and what is the resulting block latency?
details:
  realistic_solution: Strategy B (spatial pipelining) is optimal. The dense FFN takes 50 TFLOP / 100 TFLOP/s = 0.5 s on the MXU. Softmax takes 500 GFLOP / 2 TFLOP/s = 0.25 s on the VPU, and the 50 MB transfer over the 500 GB/s SRAM bus takes 0.1 ms. Because the VPU work plus transfer fits under the 500 ms MXU time, the resulting block latency is 500 ms, compared with 600 ms if Softmax runs sequentially on the MXU.
  common_mistake: |
    **The Pitfall:** Assuming that avoiding data movement over the internal bus is always optimal (Strategy A).
    **The Rationale:** Candidates fail to calculate the severe underutilization penalty of running scalar functions on a rigid systolic array.
    **The Consequence:** The chosen strategy results in slower overall execution time despite less data movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - MXU throughput: 100 TFLOP/s. VPU throughput: 2 TFLOP/s.
    - FFN workload: 50 TFLOP. Softmax workload: 500 GFLOP.
    **Calculations:**
    - Strategy A: FFN = 50 TFLOP / 100 TFLOP/s = 0.5 s = 500 ms. Softmax on MXU = 500 GFLOP / 5 TFLOP/s = 0.1 s = 100 ms. Total = 600 ms.
    - Strategy B: FFN on MXU = 500 ms. Softmax on VPU = 500 GFLOP / 2 TFLOP/s = 0.25 s = 250 ms. Data Transfer = 50 MB / 500 GB/s = 0.10 ms.
    **Conclusion & Interpretation:**
    - **Result: Strategy B with 500 ms block latency.** Total pipelined time = max(500 ms, 250 ms + 0.10 ms) = 500 ms, saving 100 ms per layer versus Strategy A.
