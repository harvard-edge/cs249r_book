title: Evaluating Hardware Trojan Mitigations
scenario: 'You are evaluating supply chain security for a custom 3nm AI training accelerator fabbed at an untrusted overseas foundry. The threat model includes dormant Hardware Trojans designed to leak weights via power side-channels. You must evaluate three mitigations for a 50,000-GPU fleet: 1) Logic locking (2% area/power overhead), 2) Split manufacturing (15% latency penalty, $5M NRE), or 3) Boot-time side-channel fingerprinting.'
question: 'Which mitigation—logic locking, split manufacturing, or boot-time fingerprinting—best fits a 50,000-GPU synchronous LLM training fleet, and why?'
details:
  realistic_solution: 'Logic locking is the optimal trade-off for cloud accelerators. It prevents unauthorized modification with minimal impact on critical path latency. Split manufacturing''s 15% latency penalty across a 50,000-GPU cluster wastes massive compute time, making logic locking vastly more cost-effective while preserving compute scaling efficiency.'
  common_mistake: |
    **The Pitfall:** Relying on post-silicon boot-time fingerprinting, or selecting split manufacturing without quantifying the performance penalty at datacenter scale.
    **The Rationale:** Boot-time checks are cheap but cannot reliably detect Trojans with complex, rare activation triggers. Split manufacturing is highly secure but devastating to latency.
    **The Consequence:** Either leaving the fleet vulnerable to advanced Trojans (fingerprinting) or crippling training throughput and wasting tens of millions of dollars in compute time (split manufacturing).
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet: 50,000 GPUs at ~$2/hr/GPU.
    - Training Run: 100 days.
    - Split Manufacturing: 15% latency penalty.
    - Logic Locking: ~$200 extra per chip.

    **Calculations:**
    - Split Manufacturing Penalty: 15% of 100 days = 15 extra days (360 hours).
    - Split Cost: 50,000 * $2 * 360 = $36M extra compute cost per run.
    - Logic Locking Cost: 50,000 * $200 = $10M one-time cost.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound**. Logic locking costs $10M upfront versus the recurring $36M penalty of split manufacturing.
