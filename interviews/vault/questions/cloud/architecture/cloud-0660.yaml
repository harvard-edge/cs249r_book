title: The MoE Memory Trap
scenario: 'The team switched from a dense 7B model to a 47B Mixture-of-Experts model with 8 experts, 2 active per token. They try to deploy it on a single GPU and it immediately OOMs.'
question: 'Why does a 47B MoE with only 2 active experts per token OOM on a 40 GB card when a dense 13B model would easily fit?'
details:
  realistic_solution: 'MoE saves compute but not memory. During inference, only 2 experts are active per token (~13B active parameters total including shared layers), so the FLOPs per token are comparable to a ~13B dense model. But all 47B parameters must reside in VRAM because the router can select any expert for any token. This is the MoE Memory Trap: the compute profile of a 13B model with the memory profile of a 47B model.'
  common_mistake: |
    **The Pitfall:** Confusing compute utilization with memory footprint.
    **The Rationale:** Thinking that because only 2 of 8 experts are active, the memory usage should mirror the compute profile of a ~13B dense model.
    **The Consequence:** Attempting to deploy massive MoE architectures on under-provisioned hardware, leading to instant OOM failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 7B: 14 GB footprint.
    - MoE 47B (2/8 active): ~13B active params per token.
    - Precision: FP16 (2 bytes per param).

    **Calculations:**
    - Dense 7B FLOPs/token = 14 GFLOPs.
    - MoE 47B FLOPs/token = 26 GFLOPs.
    - The router can select any expert, so all 47B params must be in VRAM.
    - Memory = 47B * 2 bytes = 94 GB.

    **Conclusion & Interpretation:**
    - **Result: 94 GB Footprint (Memory-Capacity-Bound)**. Compute is cheap, but memory is fixed. The 94 GB footprint mathematically cannot fit on a 40 GB card.
