title: ASIC TCO Break-Even Analysis
scenario: 'You are evaluating whether to build a custom ASIC for an internal recommendation model. The Non-Recurring Engineering (NRE) cost for the ASIC is $50M. Over a 3-year lifespan, a standard GPU has a TCO of $10,000 and processes 10,000 QPS. The custom ASIC has a 3-year TCO of $1,000 and processes 5,000 QPS.'
question: 'How many ASICs are required to break even on the $50M NRE after normalizing for QPS?'
details:
  realistic_solution: 'To perform an accurate TCO comparison, you must normalize the CAPEX and OPEX against the target throughput (QPS). The ASIC has a lower raw unit cost but also lower performance. Calculate the total cost of operating the ASIC equivalent of a GPU, subtract that from the GPU TCO to find the normalized savings per unit of compute, and divide the NRE by this margin to determine the break-even volume.'
  common_mistake: |
    **The Pitfall:** Comparing the TCO per chip directly without normalizing for throughput.
    **The Rationale:** Candidates see $10,000 vs $1,000 and incorrectly assume a $9,000 savings per unit, forgetting that the ASIC performs half the work of the GPU.
    **The Consequence:** They drastically underestimate the number of ASICs required to reach the break-even point, leading to a flawed financial decision.
  napkin_math: |
    **Assumptions & Constraints:**
    - NRE: $50M.
    - GPU: $10,000 for 10k QPS.
    - ASIC: $1,000 for 5k QPS.

    **Calculations:**
    - Throughput matching: 2 ASICs = 1 GPU throughput (10k QPS).
    - TCO Comparison per 10k QPS: 2 ASIC TCO = $2,000. 1 GPU TCO = $10,000.
    - Savings per 10k QPS: $10,000 - $2,000 = $8,000.
    - Break-even GPU equivalents: $50,000,000 / $8,000 = 6,250 equivalents.
    - Total ASICs required: 6,250 * 2 = 12,500.

    **Conclusion & Interpretation:**
    - **Result: 12,500 ASICs (Cost-Bound)**. 12,500 ASICs must be deployed to justify the $50M NRE investment.
