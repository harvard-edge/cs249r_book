title: 'MoE All-to-All Overlap with Expert Computation'
scenario: 'Your MoE training pipeline spends 40% of each step on all-to-all communication (dispatch + combine). Your colleague proposes overlapping all-to-all with expert computation by splitting the batch into sub-batches.'
question: 'Can K=4 sub-batching overlap all-to-all with expert compute when communication is 40% of the step, and what speedup should you expect?'
details:
  realistic_solution: 'The key insight: you can split the token batch into K sub-batches and pipeline them. Sub-batch 1: dispatch → expert compute → combine. While sub-batch 1''s expert compute runs, sub-batch 2''s dispatch can overlap. With K=4 sub-batches: Time without overlap: dispatch(D) + compute(C) + combine(D) per sub-batch, total = K × (D + C + D). Time with pipelining: D + K × max(C, D) + D (pipeline startup + steady state + drain). If D = 0.4T and C = 0.6T (where T is total step time): Without: 4 × (0.4T/4 + 0.6T/4 + 0.4T/4) = T (no change per total). With pipeline: 0.1T + 4 × max(0.15T, 0.1T) + 0.1T = 0.1T + 0.6T + 0.1T = 0.8T. Speedup: 1.0/0.8 = 1.25× (25% improvement). In practice, sub-batching reduces per-expert batch sizes, hurting compute efficiency. The sweet spot is K=2-4. DeepSeek-V3 uses this technique and reports ~20% training speedup from communication-computation overlap.'
  common_mistake: 'Assuming you can perfectly overlap communication and computation. The dispatch all-to-all must complete before expert computation can begin (data dependency). Only partial overlap is possible through pipelining.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Communication: 40% of step
    - Compute: 60% of step
    - K=4 pipeline stages

    **Calculations:**
    - Per-stage comm = 10%, compute = 15%
    - Pipeline time = 10% + 4 * 15% + 10% = 80%
    - Theoretical Speedup = 100 / 80 = 1.25x

    **Conclusion & Interpretation:**
    - **Result: 1.25x Speedup (Compute-Bound)**. Practical speedup with efficiency loss is ~1.20x or 20% improvement.
