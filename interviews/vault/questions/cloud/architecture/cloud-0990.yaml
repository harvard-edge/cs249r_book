title: Weight vs Output Stationary Dataflow
scenario: You are designing the computation placement dataflow for a cloud ML accelerator with a 256x256 spatial processing array. You are mapping a projection layer Y = XW, where activations X has shape (M=1024, K=512) and weights W has shape (K=512, N=512).
question: How many weight-matrix element reads does WS versus OS require for this 256x256 tiled XW layer, and which placement minimizes weight reads?
details:
  realistic_solution: |
    In Weight-Stationary (WS), the 512x512 weight matrix is divided into four 256x256 tiles. Each tile is loaded into the array once and held stationary while activations stream through the two M tiles, resulting in 262,144 total weight reads. In Output-Stationary (OS), the 1024x512 output is tiled as 4 M-tiles by 2 N-tiles. Each of those 8 output tiles keeps partial sums stationary and streams the full 512x256 W panel for its N tile, so W is reread for each M tile: 8 * 512 * 256 = 1,048,576 weight reads. WS therefore minimizes weight reads for this layer shape.
  common_mistake: |
    **The Pitfall:** Assuming memory reads for weights equal the matrix size in all dataflows.
    **The Rationale:** Failing to account for how outer tiling loops force redundant re-reads of weight tiles in Output-Stationary.
    **The Consequence:** Choosing a suboptimal dataflow that bottlenecks on SRAM bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - W matrix size: 512 * 512 = 262,144 elements.
    - Array is 256x256 tiles.

    **Calculations:**
    - Weight-Stationary (WS): W is divided into 4 tiles. Each read once. Total reads = 262,144.
    - Output-Stationary (OS): Y has 4 M-tiles * 2 N-tiles = 8 output tiles. Each output tile streams the full 512x256 W panel for its N tile while partial sums stay stationary.
    - OS reads: 8 * (512 * 256) = 1,048,576.

    **Conclusion & Interpretation:**
    - **Result: OS requires 4x more weight reads than WS, so WS is optimal when minimizing weight reads.**
