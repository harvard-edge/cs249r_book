title: Weight vs Output Stationary Dataflow
scenario: You are designing the computation placement dataflow for a cloud ML accelerator with a 256x256 spatial processing array. You are mapping a projection layer Y = XW, where activations X has shape (M=1024, K=512) and weights W has shape (K=512, N=512).
question: How many weight-matrix element reads does WS versus OS require for this 256x256 tiled XW layer, and which placement is optimal?
details:
  realistic_solution: In Weight-Stationary (WS), the 512x512 weight matrix is divided into four 256x256 tiles. Each tile is loaded into the array once and held stationary while activations stream through, resulting in 262,144 total weight reads. In Output-Stationary (OS), each of the 8 output tiles requires re-reading the corresponding K-dimension slice of W, totaling 1,048,576 weight reads — a 4x increase. WS is therefore optimal for this layer shape.
  common_mistake: |
    **The Pitfall:** Assuming memory reads for weights equal the matrix size in all dataflows.
    **The Rationale:** Failing to account for how outer tiling loops force redundant re-reads of weight tiles in Output-Stationary.
    **The Consequence:** Choosing a suboptimal dataflow that bottlenecks on SRAM bandwidth.
  napkin_math: |
    - **W matrix size:** 512 * 512 = 262,144 elements.
    - **Weight-Stationary (WS):** W is divided into 4 tiles. Each read once. Total reads = 262,144.
    - **Output-Stationary (OS):** Y has 8 tiles. Each Y-tile streams the entire K dimension of W.
    - **OS reads:** 8 * (512 * 256) = 1,048,576.
    - **Conclusion:** **OS requires 4x more weight reads than WS.**
