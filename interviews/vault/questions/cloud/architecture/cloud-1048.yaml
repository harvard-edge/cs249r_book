title: Diagnosing Early-Layer Credit Assignment Failure
scenario: You are pre-training a 20B parameter Transformer on a 128-GPU cluster using FP16 mixed precision and Post-LayerNorm. After 5,000 steps, training stalls. Telemetry shows the gradient norm in layer 48 is ~1.2, but in layer 2, it has collapsed to ~1e-6.
question: "Why have gradients collapsed in the early layers of the Post-LayerNorm Transformer, and what architecture change fixes it?"
details:
  realistic_solution: Diagnose the vanishing gradient as an architectural credit assignment failure. Refactor the model from Post-LayerNorm to Pre-LayerNorm. Pre-LN ensures the residual connection is purely additive, allowing the error signal to flow backwards uninterrupted.
  common_mistake: |
    **The Pitfall:** Treating vanishing gradients as a hyperparameter tuning problem.
    **The Rationale:** Candidates attempt to increase the learning rate or adjust FP16 loss scaling, treating the symptom rather than the structure.
    **The Consequence:** Hyperparameter tweaks exacerbate instability in later layers without fixing the structural barrier preventing error signal propagation to early layers.
  napkin_math: |
    - In Post-LN, gradients pass through normalizations recursively.
    - Assuming a 0.8 scaling factor per layer across 48 layers: 0.8^48 ≈ 2e-5 gradient decay.
    - Pre-LN uses: x_{l+1} = x_l + F(LN(x_l)).
    - Backprop chain rule: ∂x_{l+1} / ∂x_l = I + ∂F / ∂x_l.
    - **Result: The identity matrix (I) creates a direct gradient highway, ensuring ∇x_1 ≈ ∇x_L.**
