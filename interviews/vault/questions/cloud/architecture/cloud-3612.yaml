title: Rack-Level Power Provisioning for TPU v5e Pod
scenario: You are provisioning a TPU v5e pod with 256 chips (16GB HBM each). Each TPU v5e draws approximately 200W. The pod uses a custom rack design with 64 chips per rack. Design the power distribution at the rack, row, and facility level, ensuring N+1 redundancy at each tier.
question: How would you provision rack, row, and facility power with N+1 redundancy for the 256-chip TPU v5e pod?
details:
  realistic_solution: 'Per rack: 64×200W=12.8kW nominal chip power. Add 20% rack overhead for fans, networking, and power conversion: 15.4kW per rack. If using 10kW rack PDU modules, each rack needs 2 active modules plus 1 spare, so provision 3×10kW per rack for N+1. Per row with 4 racks: 4×15.4=61.6kW load. If using 40kW row distribution modules, use 3×40kW so two modules can carry the row after one failure. Facility load with PUE=1.2 is 61.6×1.2=73.9kW. Use 2×80kW UPS modules and 2×100kW generators so one module can fail while the remaining module carries the facility load.'
  common_mistake: |
    **The Pitfall:** Provisioning power based on nominal draw without including overprovisioning for startup surge current (typically 1.5-2× steady state) and N+1 redundancy.
    **The Rationale:** Nominal chip wattage excludes rack overhead, conversion losses, and the extra module capacity needed so the load survives one failed PDU, UPS, or generator.
    **The Consequence:** A single failed power module or startup surge can overload the remaining path, tripping racks or forcing the pod below usable capacity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 TPU v5e chips at 200W each.
    - 64 chips per rack, 4 racks total.
    - 20% rack overhead for non-chip IT load.
    - N+1 means the remaining N modules can carry the load after any one module fails.

    **Calculations:**
    - Per-rack chip load: 64 * 200W = 12.8kW.
    - Per-rack load with 20% overhead: 12.8kW * 1.2 = 15.36kW.
    - Rack N+1 with 10kW modules: 2 active modules carry 20kW, so install 3 modules per rack.
    - Row load: 4 * 15.36kW = 61.44kW.
    - Row N+1 with 40kW modules: 2 active modules carry 80kW, so install 3 modules.
    - Facility load at PUE=1.2: 61.44kW * 1.2 = 73.73kW.
    - Facility N+1: 2 * 80kW UPS modules and 2 * 100kW generator modules so one remaining module can carry the facility load.

    **Conclusion & Interpretation:**
    - **Result: N+1 Power Provisioning**. Provision 3×10kW rack PDU modules per rack, 3×40kW row modules, and 2×80kW UPS plus 2×100kW generator capacity for the 73.7kW facility load.
