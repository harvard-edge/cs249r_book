title: 'Continual Adaptation: Catastrophic Forgetting in LoRA Updates'
scenario: A production LLM is updated monthly by replacing the served LoRA adapter with a new adapter trained on fresh data; some teams also merge monthly adapters into a serving artifact. After 4 months, benchmark performance on original tasks has degraded 15% even though the base model weights are frozen.
question: Why did original-task performance degrade 15% after four monthly LoRA adapter updates even though the base weights were frozen, and how would you prevent it?
details:
  realistic_solution: Frozen base weights do not by themselves preserve the deployed behavior, because the active LoRA adapter is part of the model. Monthly adapters trained only on fresh data can interfere with earlier tasks, and destructive merge practices can make the effective serving checkpoint drift even when the original base artifact is unchanged. Prevent this with adapter versioning and rollback, held-out regression suites for old tasks, rehearsal examples from prior months, and regularization against prior-adapter behavior. For multi-domain serving, prefer isolated or routed adapters over repeatedly merging every monthly delta into one serving artifact; if a merge is needed, validate the merged model against old and new tasks before promotion.
  common_mistake: |
    **The Pitfall:** Assuming frozen base weights prevent catastrophic forgetting.
    **The Rationale:** Replacing the active adapter, composing multiple adapters, or merging monthly deltas can all change the effective served model even when the base checkpoint is unchanged.
    **The Consequence:** Gradual drift of deployed behavior, leading to degraded performance on older tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 months of adapter updates.
    - Observed degradation: 15%.
    - Each monthly dataset has 10K examples.
    - Replay buffer uses 5% from each prior monthly dataset.
    - A regression gate keeps fixed evaluation sets for original tasks.

    **Calculations:**
    - Training month 4 with replay from months 1-3 uses 3 * 0.05 * 10,000 = 1,500 old examples.
    - Total examples for that run = 10,000 fresh + 1,500 replay = 11,500.
    - Replay data increases example count by 1,500 / 10,000 = 15% under equal-length examples.
    - The 15% benchmark drop is an observed aggregate regression, not proof of a linear 3.75% forgetting rate per update.

    **Conclusion & Interpretation:**
    - **Result: Adapter Interference and Release Process Risk.** A small replay buffer plus regression gating is cheap relative to the monthly run and directly constrains older-task behavior; adapter isolation and validated merges prevent monthly LoRA updates from silently changing the effective served model.
