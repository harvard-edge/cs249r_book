title: Shared Expert Impact on MoE All-to-All Traffic
scenario: DeepSeek-V3 uses a 'shared expert' design where 1 expert is always activated for every token alongside 8 routed experts selected from 256. Your team is designing a new MoE architecture and debates whether to include shared experts.
question: Does adding one shared expert alongside 8 routed experts reduce MoE all-to-all communication, and what bottleneck can it introduce?
details:
  realistic_solution: |
    Adding one shared expert alongside 8 routed experts usually does not reduce MoE all-to-all volume, because the network-routed top-k is still 8 in both designs. The shared expert can be local or replicated and therefore may avoid all-to-all traffic itself, but it adds always-on compute for every token. That can introduce a serialization and load-imbalance bottleneck: every token must pass through the shared expert on the critical path, so the shared expert's capacity and placement can throttle the layer even when routed-expert communication is unchanged.
  common_mistake: |
    **The Pitfall:** Believing shared experts reduce overall communication volume by 11% and ignoring the serialization bottleneck.
    **The Rationale:** Candidates focus purely on model quality or mistakenly assume fewer routed experts decreases communication, ignoring that the shared expert must process every token.
    **The Consequence:** Introducing a massive serialization bottleneck and failing to actually reduce the all-to-all communication volume, leading to slower training and inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: 1 shared expert + 8 routed experts vs 8 routed experts only.
    - All-to-all communication volume: tokens × top-k × hidden_dim × 2 (send + receive).

    **Calculations:**
    - Config 1 (Shared + 8 Routed): Top-k routing sends data to 8 experts. Shared expert is local/replicated and processes all tokens. Network top-k = 8.
    - Config 2 (8 Routed Only): Network top-k = 8.
    - Communication delta: 8 experts vs 8 experts = 0 difference.
    - Shared expert compute delta: one extra expert path handles 100% of tokens, so it can serialize or load-imbalance the MoE layer if under-provisioned.

    **Conclusion & Interpretation:**
    - **Result: 0% Communication Reduction plus Shared-Expert Bottleneck Risk.** Adding a shared expert does not reduce the all-to-all token routing volume since both configurations still route to 8 experts over the network, and the always-on expert can become a compute/serialization bottleneck.
