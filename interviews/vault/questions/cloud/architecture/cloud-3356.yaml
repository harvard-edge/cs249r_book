title: Optimizing LLM Attention Scaling on AMD MI300X for Long Context
scenario: You are optimizing inference for an LLM processing 128k token contexts. Profiling shows that the memory bandwidth for KV cache accesses is a significant bottleneck for standard multi-head attention.
question: 'How would you diagnose KV-cache bandwidth bottlenecks in MHA and quantify the benefit of switching to GQA, MQA, or sliding-window attention?'
details:
  realistic_solution: 'Grouped-Query Attention (GQA) or Multi-Query Attention (MQA) are highly effective in addressing KV cache memory bandwidth bottlenecks. GQA allows multiple query heads to share a smaller set of key and value heads, significantly reducing the KV cache memory footprint and the memory bandwidth required.'
  common_mistake: |
    **The Pitfall:** Focusing purely on FLOPS optimization and proposing complex custom compute kernels.
    **The Rationale:** Engineers assume context length scaling is bounded by the O(N^2) computation of attention rather than memory bandwidth required to load the KV cache.
    **The Consequence:** Custom kernels fail to improve end-to-end throughput because the system remains memory-bandwidth starved during decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 query/key/value heads.
    - Standard decoding consumes 80% bandwidth on KV loading.

    **Calculations:**
    - Grouped-Query Attention (GQA) with 4 key/value groups reduces stored heads from 32 to 4.
    - Memory footprint reduction = 32 / 4 = 8x.

    **Conclusion & Interpretation:**
    - **Result: 8x Memory Bandwidth Reduction (Memory Bandwidth)**. This clears the memory starvation bottleneck, massively improving token throughput.
