title: Request Deduplication and Result Caching in Rec Serving
scenario: Your recommendation serving system handles 500k QPS. 70% of GPU time is spent on requests from users who visited within the last 30 seconds, with lists changing <2%.
question: How would you design a result caching layer for 30-second re-requests, and what GPU load reduction is expected?
details:
  realistic_solution: 'Two-level cache: (1) Hot result cache: cache the full ranked recommendation list per user, keyed by (user_id, context_hash). TTL: 30 seconds, but with event-based invalidation — invalidate immediately on any user interaction event (click, skip, dwell > 5s). (2) Invalidation mechanism: user interaction events are streamed to a lightweight invalidation service that deletes the cache entry for that user. Cache hit rate: 70% of requests are re-requests within 30s with <2% change. If 90% of those are passive (no interaction), cache serves 70% × 90% = 63% of requests. GPU load reduction: 63% fewer requests to the ranking model. From 500k QPS to 185k QPS on GPU. GPU savings: 63% reduction. Cache storage: 500k active users × avg list 10 items × 8 bytes item_id = 40 MB — trivial.'
  common_mistake: |
    **The Pitfall:** Caching at the response level without an invalidation mechanism.
    **The Rationale:** Ignoring that recommendation lists should immediately reflect new user interactions (clicks, skips).
    **The Consequence:** Serving stale recommendations that ignore user feedback, severely degrading Click-Through Rate (CTR).
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 500k QPS at 9ms/req GPU time.
    - Cache hit rate: 70% re-requests, 90% passive -> 63% cacheable.

    **Calculations:**
    - Baseline GPU load: 500k * 9ms = 4,500 GPU-seconds/s (4,500 GPUs).
    - Cached GPU load: 500k * (1 - 0.63) = 185k QPS.
    - 185k QPS * 9ms = 1,665 GPU-seconds/s (1,665 GPUs).
    - GPUs saved: 4,500 - 1,665 = 2,835 GPUs.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Caching saves 2,835 GPUs, massively cutting infrastructure costs while preserving recommendation quality.
