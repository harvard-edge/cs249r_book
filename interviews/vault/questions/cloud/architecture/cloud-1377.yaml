title: Cascading Filter Failure in Hierarchical Pipelines
scenario: >
  You manage a 3-tier visual inspection pipeline for a factory. Tier 1: 5,000 ESP32 cameras (10 FPS) running a motion-detection CNN. Tier 2: 50 Jetson Orin Nanos running ResNet-34 (max 150 FPS throughput per node). Tier 3: Cloud GPUs running a Vision Transformer. Tier 1 triggers on 1% of frames, sending them to Tier 2. To prevent dropped frames, Tier 2 is configured to bypass local inference and send frames directly to the cloud if its queue exceeds 500 frames. During shift changes, end-to-end latency spikes from 100ms to 8 seconds, yet cloud GPU utilization drops below 40%.
question: >
  Why does latency spike to 8 seconds during shift changes while cloud GPU utilization drops below 40%?
details:
  realistic_solution: |
    Identify that shift changes cause a massive spike in motion triggers at Tier 1 (e.g., 20%+). This overwhelms the Jetson Tier 2 capacity, triggering the offload bypass. The resulting data flood saturates the factory's internet uplink, causing severe TCP bufferbloat and starvation at the cloud tier. The solution is to drop frames at the edge during peak noise or implement dynamic motion thresholds at Tier 1, rather than failing open over a constrained network.
  common_mistake: |
    **The Pitfall:** Blaming the cloud GPUs or load balancer for the latency spike.
    **The Rationale:** Candidates focus on the destination (the cloud) instead of analyzing the data volume generated by the "fail-open" bypass logic at the edge.
    **The Consequence:** Attempting to scale up cloud GPUs fails to fix the network saturation, leaving the 8-second latency unresolved.
  napkin_math: |
    - Normal load: 5000 cams * 10 FPS * 0.01 = 500 FPS total (10 FPS per Jetson).
    - Shift change load (20% trigger rate): 5000 * 10 FPS * 0.20 = 10,000 FPS total (200 FPS per Jetson).
    - Jetson deficit: 200 input FPS - 150 max FPS capacity = 50 FPS bypassed to cloud per node.
    - Total cloud offload: 50 nodes * 50 FPS = 2,500 FPS.
    - Uplink required: 2,500 frames/s * 1 MB/frame = 2.5 GB/s (20 Gbps).
    - **Result:** **20 Gbps saturates typical factory uplinks, causing severe bufferbloat (8s latency) while cloud GPUs wait for data.**
