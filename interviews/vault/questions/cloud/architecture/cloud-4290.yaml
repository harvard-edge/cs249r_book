title: Mixture of LoRA Experts (MoLoRA) Architecture
scenario: Design a mixture-of-adapters system where each input token is routed to one of 8 specialized LoRA adapters. Analyze the computational overhead and routing mechanism.
question: How would you design token routing to 8 specialized LoRA adapters, and what are the compute and memory overheads?
details:
  realistic_solution: 'MoLoRA uses a 2-layer MLP router with 256 hidden units that maps each token embedding to scores over K=8 adapters. Use top-2 routing with a load-balancing loss, compute the two selected adapter outputs, and combine them by router weight. Memory: 8 rank-16 adapters across 32 layers require about 67.1 MB, and the per-layer router adds about 33.6M parameters total, or 67.2 MB at FP16. Inference overhead is the router forward plus 2 adapter paths per token, so adapter compute is roughly 2× a single LoRA path while stored adapter memory is 8×.'
  common_mistake: |
    **The Pitfall:** Implementing token-level routing with a separate learned router per layer while ignoring the multiplication of routing decisions.
    **The Rationale:** Failing to recognize that 8 adapters per layer × 32 layers means 256 independent routing decisions per forward pass, multiplying the compute.
    **The Consequence:** The routing overhead dominates the inference time, negating the efficiency benefits of using LoRA adapters.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: 32 layers, hidden dim 4096, 8 adapters/layer.
    - Adapter: Rank 16. FP16 (2 bytes).
    - Router: 2-layer MLP (256 hidden dim).

    **Calculations:**
    - 1 Adapter (Rank 16): 2 * 16 * 4096 = 131,072 params. Across 32 layers: ~4.19M params (~8.39 MB).
    - 8 Adapters memory: 8 * 8.39 MB = 67.1 MB.
    - Router Params (per layer): (4096 * 256) + (256 * 8) = 1,050,112. Across 32 layers: 33,603,584 params (~67.2 MB).

    **Conclusion & Interpretation:**
    - **Result: Router Parameter Overhead.** The router consumes about 67.2 MB, roughly equal to the 8 adapters' 67.1 MB rather than negligible. Total added memory is about 134.3 MB, while token compute is dominated by top-2 adapter execution plus router scoring.
