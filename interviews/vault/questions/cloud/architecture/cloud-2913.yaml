title: Choose a MobileNetV3-Large width multiplier for a 2ms batch-128 latency budget
scenario: You have a 2ms latency budget per batch of 128 images for a product search feature. MobileNetV3-Large meets the budget at 1.4ms but you want to close an accuracy gap to EfficientNet-B0 without exceeding 2ms.
question: What MobileNetV3-Large width multiplier best improves accuracy while keeping batch-128 latency under the 2ms budget?
details:
  realistic_solution: 'Width multiplier α scales FLOPs and parameters roughly as α². Current: 0.22G FLOPs at α=1.0 and 1.4ms latency. Target latency headroom is 2.0 - 1.4 = 0.6ms, so the FLOP scale must stay below 2.0 / 1.4 = 1.43, or α ≤ 1.195 under the simple latency model. Choose α=1.1 as the best safe multiplier because 1.4ms × 1.1² = 1.69ms, leaving measurement and kernel-efficiency margin. α=1.2 is slightly over budget at 1.4ms × 1.44 = 2.016ms, and α=1.4 is clearly too slow at about 2.74ms. If profiling later shows extra slack, test the nearest published/checkpointed variant below the measured 2ms limit rather than assuming α=1.2 passes.'
  common_mistake: |
    **The Pitfall:** Assuming FLOPs scale linearly with the width multiplier (α).
    **The Rationale:** Candidates forget that scaling the width (channels) affects both the input and output dimensions of convolutions, causing FLOPs to scale quadratically (α²).
    **The Consequence:** Choosing a multiplier that drastically overshoots the latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current Latency (α=1.0): 1.4ms. Budget: 2.0ms.
    - FLOP scaling: Scales quadratically with α (α²).

    **Calculations:**
    - Allowed FLOP Increase: 2.0ms / 1.4ms ≈ 1.428 (can afford ~42.8% more FLOPs).
    - Width Scaling Constraint: α² ≤ 1.428.
    - Multiplier Calculation: α ≤ √1.428 ≈ 1.195.

    **Conclusion & Interpretation:**
    - **Result: Choose α=1.1.** It improves accuracy while staying under 2ms with margin; α=1.2 is marginally over budget under the stated scaling model and should not be selected without measured slack.
