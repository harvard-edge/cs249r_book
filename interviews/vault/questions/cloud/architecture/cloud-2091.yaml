title: Prefill vs Decode Compute Profile
scenario: During LLM inference, the prefill phase processes the entire prompt and the decode phase generates tokens one at a time.
question: Why is LLM prefill compute-bound while decode is memory-bandwidth-bound when viewed through arithmetic intensity?
details:
  realistic_solution: 'Prefill: processes all $S$ prompt tokens in one batched matrix multiply. For a weight matrix $W$ of size $d \times d$, it computes $X_{S \times d} \cdot W_{d \times d}$. Arithmetic intensity: $\approx 2Sd^2 / 2d^2 = S$ FLOPs/byte for large $d$ — very high for large $S$, compute-bound. Decode: processes 1 token, computing $x_{1 \times d} \cdot W_{d \times d}$ — a matrix-vector product. Each weight is used exactly once. AI: $2d^2$ FLOPs / $2d^2$ bytes (in FP16) = $1$ FLOP/byte — deeply memory-bound.'
  common_mistake: |
    **The Pitfall:** Thinking both phases share the same bottleneck because they execute the same neural network architecture.
    **The Rationale:** Engineers assume that if the weights and operations are identical, the system profiling must be identical.
    **The Consequence:** Applying the wrong optimization strategies (like trying to improve GPU FLOPS for a decoding pipeline that desperately needs memory bandwidth).
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence S=2048, hidden dimension d.
    - Ridge point (e.g., A100) is 156 FLOPs/byte.

    **Calculations:**
    - Prefill FLOPs = 2*S*d^2. Memory Bytes ≈ 2*d^2. AI ≈ S = 2048 FLOPs/byte.
    - Decode FLOPs = 2*1*d^2. Memory Bytes = 2*d^2. AI ≈ 1 FLOP/byte.

    **Conclusion & Interpretation:**
    - **Result: Decode AI (1) < 156 FLOPs/byte (Memory-Bandwidth-Bound)**. Prefill AI (2048) > 156 (Compute-Bound).
