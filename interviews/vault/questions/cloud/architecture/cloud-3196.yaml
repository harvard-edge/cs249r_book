title: MoE Training Throughput vs Dense Model
scenario: A team trains both a dense 13B model and a Mixtral-style 8x7B MoE (47B total, 13B active) on 64 H100 GPUs. The dense model achieves 3200 tokens/sec/GPU. The MoE model only achieves 2100 tokens/sec/GPU despite having the same active FLOPs.
question: Why is the 8x7B MoE 34% slower than a dense 13B on 64 H100s despite similar active FLOPs?
details:
  realistic_solution: 'The 34% throughput gap is not because the MoE loads all 47B parameters on every token. With 13B active FLOPs, the active expert work is roughly comparable to the dense 13B baseline. The gap comes from MoE-specific overheads around that active work: dispatch and combine all-to-all traffic at MoE layers, less regular expert GEMMs with smaller per-expert batches, load imbalance where the slowest expert gates the layer, router/top-k overhead, and extra activation/gradient movement during training. A reasonable decomposition is communication plus synchronization around 10-15%, expert load imbalance around 10%, and reduced kernel efficiency/router overhead around another 5-10%, which can explain the observed 3200 to 2100 tokens/sec/GPU drop without claiming a 3.6x full-weight HBM load per step.'
  common_mistake: |
    **The Pitfall:** Attributing the throughput gap entirely to all-to-all communication overhead.
    **The Rationale:** MoE introduces complex networking requirements, so it's the most obvious scapegoat for performance loss.
    **The Consequence:** Focusing optimization efforts solely on NVLink routing while ignoring the dominant bottleneck: the massive HBM bandwidth penalty of loading 3.6x more parameters per step.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense 13B and MoE 8x7B both have about 13B active FLOPs per token.
    - MoE adds routing, all-to-all dispatch/combine, and expert load imbalance.

    **Calculations:**
    - Throughput ratio = 2100 / 3200 = 0.656, so MoE is about 34% slower.
    - Plausible overhead budget: all-to-all dispatch/combine 10-15%, load imbalance/synchronization about 10%, smaller expert GEMMs plus router/top-k overhead about 5-10%.
    - These overheads apply around the active expert computation; the prompt does not justify charging all 47B parameters as if they are loaded for every token.

    **Conclusion & Interpretation:**
    - **Result: Communication, imbalance, and kernel-efficiency overheads explain the 34% gap.** The comparison should be framed around active experts and MoE dispatch costs, not full-model weight loading.
