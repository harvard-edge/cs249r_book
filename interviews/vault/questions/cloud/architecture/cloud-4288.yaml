title: LoRA Rank Sensitivity Analysis
scenario: You are tuning the LoRA rank for a code generation task on a 34B model to balance adapter size and task performance.
question: How would you select the optimal LoRA rank for the 34B code model, and why do returns diminish beyond rank-64?
details:
  realistic_solution: 'Use spectral analysis: train with a high-rank adapter, then analyze singular values of the learned AB update. The number of singular values above a quality threshold estimates the effective rank. For many NLP tasks the useful rank is much lower than the maximum possible, while LoRA memory and compute scale linearly with rank. Start with rank-16 or rank-32, test rank-64 only if validation quality is still improving, and avoid claiming a universal optimum without task-specific measurements.'
  common_mistake: |
    **The Pitfall:** Setting the LoRA rank as high as GPU memory allows (e.g., rank-256 or higher).
    **The Rationale:** Practitioners intuitively assume that a higher rank captures more information and strictly yields better performance.
    **The Consequence:** Drastically increased memory footprint and training compute with <0.5% marginal performance gain, wasting resources for low-intrinsic-dimension tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 34B model: d_model=8192, 48 layers.
       - LoRA applied to W_q and W_v.
    2. **Calculations:**
       - Per projection LoRA params: A + B = rank * d_model + d_model * rank = 2 * rank * 8192.
       - For W_q and W_v across 48 layers: 2 projections * 48 layers * 2 * rank * 8192 = 1,572,864 * rank params.
       - Rank-4 params: 6.29M params; FP16 size = 12.58 MB.
       - Rank-16 size: 25.17M params * 2 bytes = 50.33 MB.
       - Rank-64 size: 100.66M params * 2 bytes = 201.33 MB.
       - Rank-256 size: 402.65M params * 2 bytes = 805.31 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Linear Adapter Cost.** Every 4x rank increase gives 4x adapter memory and adapter compute. Pick the smallest rank whose validation curve has flattened; rank-64 is a reasonable ceiling to test, not a universal optimum.
