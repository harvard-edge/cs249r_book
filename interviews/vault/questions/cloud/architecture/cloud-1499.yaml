title: Evaluating the Learnability Gap
scenario: Your team is training a foundation model on 5 million high-res (1024x1024x3) satellite images using a cluster of 256 H100 GPUs. A researcher proposes a massive 100-layer flat Multi-Layer Perceptron (MLP) with 50B parameters, citing the Universal Approximation Theorem. They argue it has strictly higher theoretical capacity than a 5B parameter Vision Transformer (ViT) and will yield higher accuracy given your massive compute budget.
question: Why would a 50B flat MLP fail on satellite images despite higher capacity, and why choose the 5B ViT instead?
details:
  realistic_solution: Reject the MLP due to the learnability gap. While the MLP can theoretically represent any function, its lack of inductive biases (like translation invariance or attention over patches) makes its optimization landscape practically intractable with finite data. The ViT intentionally restricts the theoretical hypothesis space to make the model actually optimizable via SGD.
  common_mistake: |
    **The Pitfall:** Assuming theoretical representational capacity guarantees practical convergence.
    **The Rationale:** Believing that given enough parameters and compute, any neural network can efficiently learn any dataset.
    **The Consequence:** Ignoring the massive sample complexity required to learn spatial invariants without structural inductive biases, leading to failed training runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image: 1024x1024x3 = 3,145,728 inputs.
    - First dense MLP layer to 8,192 hidden units.

    **Calculations:**
    - Weights = 3.14M * 8192 ~ 25.7 Billion weights.
    - This is only the first dense layer; it shows the flat MLP immediately spends huge capacity on unstructured pixel-to-hidden connections.
    - ViT with 16x16 patches creates (1024 / 16) * (1024 / 16) = 4096 patches.
    - Patch embeddings and attention encode spatial locality and patch-level relationships, so the model does not have to discover those image structures from scratch.

    **Conclusion & Interpretation:**
    - **Result: 25.7 Billion first-layer weights in the flat MLP (Inductive-Bias-Bound).** The ViT is preferable because its patch structure and attention make the learning problem better conditioned, not because the patch count alone proves an orders-of-magnitude sample-complexity reduction.
