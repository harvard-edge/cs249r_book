title: Full-Stack RecSys Architecture for a New Social Platform
scenario: Design the recommendation system architecture for a new social platform targeting 100M users at launch (500k QPS) and scaling to 1B users (5M QPS) in year 3.
question: What end-to-end recommendation architecture would you build for 100M users at 500k QPS, and how would it evolve to 1B users at 5M QPS?
details:
  realistic_solution: 'Launch (100M users, 500k QPS): use a staged serving stack, not a single monolithic model. Candidate generation combines cached social graph signals, recent-trending candidates, and a two-tower ANN index; keep per-region ANN shards close to serving and refresh them from the feature pipeline. Pre-ranking trims thousands of candidates to hundreds using cheap dense and sparse features. Ranking uses a DLRM-style model with an online feature store, hot embedding cache, and batched GPU inference; re-ranking applies diversity, freshness, policy, and exploration constraints. Training runs from streaming logs plus batch backfills, with delayed labels, counterfactual logging, A/B experiments, shadow launches, canaries, drift monitors, feature freshness checks, and fallback caches for ANN or feature-store outages. 500k QPS at 9 ms means about 4,500 concurrent request slots, not 4,500 GPUs; actual serving replicas depend on measured batched throughput per ranker. Scale to 1B users
    and 5M QPS by partitioning by region/user/item, adding more ANN shards and feature-store capacity, separating retrieval/ranking autoscaling, moving larger embeddings to sharded GPU/CPU tiers with hot-row replication, and tightening model refresh from hourly to near-real-time where labels support it.'
  common_mistake: |
    **The Pitfall:** Designing for year-3 scale at launch (over-engineering).
    **The Rationale:** Engineers want to build a "future-proof" system immediately.
    **The Consequence:** Deploying massively complex, expensive infrastructure (like 5TB MI300X embedding clusters) for a user base that doesn't exist yet, burning runway unnecessarily.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Launch QPS: 500k.
       - Ranking service time budget: 9ms/request.
       - Peak Headroom: 2x.
       - Measured batched ranker throughput assumption: 1,000 requests/s per GPU worker at the target P99.
    2. **Calculations:**
       - Concurrency required by Little's Law: 500,000 req/s * 0.009 s = 4,500 concurrent in-flight ranking requests.
       - GPU workers for ranking at 1,000 req/s each: 500,000 / 1,000 = 500 active workers.
       - Provisioned ranking workers with 2x headroom: ~1,000 GPU workers, before regional redundancy and canaries.
       - Year-3 QPS is 10x higher, so the same per-worker throughput implies ~10,000 provisioned ranking workers unless model compression, retrieval pruning, or batching improves.
       - Retrieval and feature-store capacity scale separately: ANN shards, cache nodes, and streaming feature pipelines should autoscale on candidate fanout and feature QPS, not ranking latency alone.
    3. **Conclusion & Interpretation:** **500k QPS implies ~4,500 concurrent ranker slots, not 4,500 GPUs; GPU count must come from measured batched throughput, while the architecture scales by independently partitioning retrieval, features, ranking, training, and feedback loops.**
