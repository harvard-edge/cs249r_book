title: The Router Bottleneck in MoE Serving
scenario: 'You deploy a Mixtral 8x7B model on a single GPU. Because it only uses ~13B active parameters per token, the math should be fast. However, your profiling shows that generating a token takes 2x longer than a standard dense 13B model.'
question: 'What architectural component of the MoE model is destroying your memory bandwidth?'
details:
  realistic_solution: 'The MoE router network introduces extreme memory fragmentation. A dense model fetches weights sequentially, maximizing HBM burst bandwidth. MoE dynamically selects experts per token, forcing sparse, random memory accesses. HBM throughput drops precipitously for non-sequential reads, bottlenecking the system on memory fetch rather than FLOPs. Mitigation requires Expert-Parallel Batching to group tokens by expert, transforming random reads back into sequential bursts.'
  common_mistake: |
    **The Pitfall:** Blaming the router network math.
    **The Rationale:** Candidates assume that because MoE introduces a new routing layer, the computational overhead of this routing mechanism must be the bottleneck.
    **The Consequence:** They ignore the memory hierarchy and fail to identify that sparse, random memory access is the true culprit, leading to misguided optimization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM sequential read: ~2000 GB/s.
    - HBM random access: ~400 GB/s.
    - Active model size (13B FP16) = 26 GB.

    **Calculations:**
    - Dense 13B (Sequential): 26 GB / 2000 GB/s = 13 ms.
    - MoE 13B active (Random Access): 26 GB / 400 GB/s = 65 ms.

    **Conclusion & Interpretation:**
    - **Result: 65 ms latency (Memory-Bandwidth-Bound)**. The MoE model's random memory reads are 5x slower than sequential, entirely explaining the latency regression.
