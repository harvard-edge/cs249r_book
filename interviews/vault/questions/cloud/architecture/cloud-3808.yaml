title: 'Megablocks: Variable-Length Expert Computation'
scenario: Standard MoE implementations pad each expert's input to the capacity factor limit, wasting compute on zero-padded slots. Megablocks proposes using block-sparse matrix operations instead.
question: "How does block-sparse GEMM eliminate the capacity factor entirely, and what GPU hardware features does it exploit? With batch size 512, 8 experts, and capacity factor 1.5, what are the per-expert capacity and total padded token count?"
details:
  realistic_solution: 'Base capacity = 512/8 = 64. With C=1.5: limit = 64 * 1.5 = 96 tokens/expert. Padded = 8 * 96 = 768. Block-sparse GEMM avoids computing padded zeros by leveraging Tensor Cores for hardware-aligned block sparsity.'
  common_mistake: |
    **The Pitfall:** Thinking block-sparse operations are inherently slower than dense operations.
    **The Rationale:** Candidates assume irregular memory access ruins GPU efficiency, forgetting Tensor Cores support hardware-aligned block sparsity.
    **The Consequence:** Unnecessarily padding MoE workloads, wasting compute FLOPs on zero-tokens.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size = 512 tokens.
       - Number of experts = 8.
       - Capacity factor (C) = 1.5.
    2. **Calculations:**
       - Base capacity per expert = 512 / 8 = 64 tokens.
       - Capacity limit per expert = 64 * 1.5 = 96 tokens.
       - Total padded tensor size = 8 experts * 96 tokens = 768 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: 96 tokens limit, 768 padded tokens.** The bottleneck is **Compute-Bound**.
