title: Attention GPU Utilization Drop at Long Sequences
scenario: Your LLM serving system shows 55% GPU compute utilization during prefill for short prompts (256 tokens) but drops to 25% for long prompts (16K tokens), even though long prompts have MORE total FLOPs. The batch size is the same in both cases.
question: Why does prefill GPU utilization drop from 55% on 256-token prompts to 25% on 16K-token prompts despite more FLOPs?
details:
  realistic_solution: At short sequences, the FFN layers (large GEMMs) dominate the FLOP mix, and these are compute-bound with high utilization. At 16K tokens, the per-head attention score tensors grow quadratically ($16K^2 / 256^2 = 4096\times$) while FFN work only grows linearly. A naive attention implementation would stream or materialize large score/probability tensors through HBM, making the workload memory-bandwidth-bound. The practical fix is FlashAttention or another tiled/streaming attention kernel that keeps small tiles on chip and avoids materializing the full score matrix.
  common_mistake: |
    **The Pitfall:** Thinking that more FLOPs should always linearly correlate with higher compute utilization.
    **The Rationale:** Candidates ignore that attention grows quadratically while FFN grows linearly, shifting the system bottleneck from compute-bound (FFN dominating) to memory-bound (Attention dominating) at long contexts.
    **The Consequence:** Failing to diagnose memory-bound workloads, or trying to tune compute kernels when I/O tiling (like FlashAttention) is required.
  napkin_math: |
    **Assumptions & Constraints:**
    - Attention scores are per head and scale as S^2.
    - 32 heads, 2 bytes per score element.

    **Calculations:**
    - 256-token score tensors: 256^2 * 32 heads * 2 bytes = 4,194,304 bytes = 4 MiB, already too large to treat as one resident on-chip tensor on typical GPUs.
    - 16K-token score tensors: 16,384^2 * 32 heads * 2 bytes = 17,179,869,184 bytes = 16 GiB (17.18 GB decimal).
    - Memory growth: quadratic, because 16,384^2 / 256^2 = 4,096x.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound (Memory-Bound)**. Naively storing or rereading the full long-context attention scores forces HBM traffic; tiled attention improves utilization by streaming tiles through on-chip memory instead.
