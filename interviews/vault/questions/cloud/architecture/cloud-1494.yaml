title: Root-Causing Throughput Collapse via Exposed Trace APIs
scenario: "You are debugging a sudden drop in throughput (from 4,000 req/sec to 150 req/sec) on a cluster of GPUs serving a 70B LLM. The system uses a unified Triton Inference Server deployment. CPU utilization has spiked to 100%, but GPU SM utilization has plummeted to 5%. Network bandwidth is minimal at under 2 Gbps. Upon inspecting the ingress controller, you discover the public-facing load balancer routes all URI paths, inadvertently exposing Triton's internal trace and metrics APIs."
question: "What is causing throughput to collapse from 4,000 req/sec to 150 req/sec, and how should the Triton ingress be secured?"
details:
  realistic_solution: "Implement strict path-based routing at the ingress controller, exposing only '/v2/models/*/infer' to the public. Bind management and trace APIs to a dedicated internal port (e.g., 8002) accessible only via internal VPC routing, restoring throughput to 4,000 req/sec."
  common_mistake: |
    **The Pitfall:** Scaling up GPU nodes or pruning model weights to 'fix' the low throughput.
    **The Rationale:** Misdiagnosing low GPU utilization as a compute bottleneck instead of a host-side CPU starvation issue.
    **The Consequence:** Wasting expensive GPU resources while the underlying security and API misconfiguration remains unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Trace Payload: ~1MB of JSON state per inference.
       - Throughput: 4,000 QPS.
    2. **Calculations:**
       - Data Serialization: 4,000 * 1MB = 4,000 MB/sec = 4 GB/sec of JSON generation on the CPU.
    3. **Conclusion & Interpretation:**
       **Synchronous JSON serialization instantly saturates the single-threaded CPU event loop, starving the GPU. Result: CPU-Bound via misconfiguration.**
