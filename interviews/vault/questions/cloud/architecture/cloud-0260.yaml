title: The Chinchilla Compute Budget
scenario: 'You''re scoping the training budget for a new 100-billion parameter dense transformer model. Your team plans to follow the Chinchilla scaling laws for an optimally-trained model.'
question: 'For a Chinchilla-optimal 100B dense transformer, how many training tokens and FLOPs should you budget?'
details:
  realistic_solution: 'The correct approach uses two key formulas from scaling laws. First, the Chinchilla-optimal number of training tokens (`D`) is roughly 20 times the number of non-embedding parameters (`P`). Second, the total training compute (`C`) is approximately `6PD` FLOPs. This factor of 6 accounts for the forward pass (2PD) and the more computationally expensive backward pass (4PD). For a 100B parameter model: D = 20 × 100B = 2 Trillion tokens. C = 6 × 100B × 2T = 1.2 × 10^24 FLOPs. This compute budget determines the training cost and timeline, which are the key inputs for the team''s resource planning.'
  common_mistake: |
    **The Pitfall:** Underestimating the compute cost of the backward pass.
    **The Rationale:** Many engineers intuitively assume training FLOPs are simply `2PD` (a forward pass and an equally expensive backward pass).
    **The Consequence:** Budgeting strictly for the forward pass, which drastically underestimates compute requirements, leading to severe timeline overruns and budget shortfalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters (P): 100 Billion (1e11).
    - Single H100 effective MFU = ~494.5 TFLOPS.

    **Calculations:**
    - Optimal tokens (D): 20 * P = 2 Trillion tokens.
    - Training compute (C): 6 * P * D = 6 * 1e11 * 2e12 = 1.2 * 10^24 FLOPs.
    - Time on 1 GPU = 1.2e24 / 494.5e12 = 2.43 * 10^9 seconds ≈ 77 GPU-years.

    **Conclusion & Interpretation:**
    - **Result: 1.2 x 10^24 FLOPs (Compute Budget)**. Training on 4,000 H100s takes ~7 days and costs ~$1.34M in cloud compute.
  options:
  - '4.0 x 10^23 FLOPs'
  - '1.2 x 10^23 FLOPs'
  - '1.2 x 10^24 FLOPs'
  - '6.0 x 10^22 FLOPs'
