title: Embedding Table Update Consistency in Distributed Training
scenario: In a DLRM training cluster, 64 GPUs perform data-parallel training. Each GPU processes a different mini-batch and computes gradients for sparse embedding rows, which are aggregated by parameter servers. After a week of training, high-frequency item embeddings (accessed >10k times/hour) exhibit 3x higher loss than medium-frequency items.
question: Why do high-frequency item embeddings have 3x higher loss, and what optimizer and update-protocol changes would you make?
details:
  realistic_solution: 'High-frequency items are accessed by many of the 64 workers simultaneously. Each worker computes a gradient based on a stale copy. Fix: Use Adagrad or Adam for embedding updates to adapt the learning rate per-row based on accumulated squared gradients, and employ gradient accumulation with synchronous updates for hot embedding rows.'
  common_mistake: |
    **The Pitfall:** Attributing the issue solely to the learning rate being uniformly too high.
    **The Rationale:** Engineers see divergence or high loss and instinctively lower the global learning rate.
    **The Consequence:** Lowering the global learning rate harms the convergence of medium and low-frequency items, while failing to address the root cause of stale, overlapping gradient accumulation for hot items.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64 workers updating parameter servers asynchronously.
       - Hot item accessed by ~20 workers per step.
       - Base SGD update: Δw = -η * g.
    2. **Calculations:**
       - Effective update for hot item in one step ≈ -20 * η * E[g].
       - Effective Learning Rate = 20 * η. If η=0.01, effective LR=0.2 (causes divergence).
       - With Adagrad, effective LR = η / √(Σ g²).
       - After T steps, hot items Σ g² ≈ 20T * E[g²] vs medium items T * E[g²].
       - Effective LR ratio for hot vs medium = 1 / √20 ≈ 0.22x (4.5x lower).
    3. **Conclusion & Interpretation:**
       - **Result: Optimizer-Bound.** Using Adagrad or Adam normalizes the discrepancy by automatically scaling down the learning rate for frequently updated embedding rows.
