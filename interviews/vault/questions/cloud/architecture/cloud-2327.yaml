title: Large Vocabulary Cross-Entropy Overflow
scenario: You are pre-training a multilingual LLM with a massive vocabulary size of 256,000 tokens and a global batch size of 4096. To optimize memory, you configure the final language modeling head and the cross-entropy loss calculation to run entirely in FP16. Training collapses to NaN loss within the first 10 steps.
question: Why does FP16 language-model head and cross-entropy cause NaN loss with a 256,000-token vocabulary?
details:
  realistic_solution: The collapse is due to numeric instability in the final softmax and cross-entropy path. With a vocabulary of 256,000, the loss kernel must reduce a very large row of logits. A naive FP16 implementation can overflow exponentials, overflow or lose precision in the log-sum-exp accumulator, or create invalid values during normalization. Production loss kernels avoid this by upcasting logits or at least the max, exp/sum, and log-sum-exp reductions to FP32. The architecture must enforce that the final logits and cross-entropy intermediates are computed in FP32, even if the model head stores weights or activations in FP16.
  common_mistake: |
    **The Pitfall:** Believing that the final linear layer weights are diverging, requiring gradient clipping to stabilize the outputs.
    **The Rationale:** Exploding loss or NaNs early in training are often incorrectly attributed to learning rate or gradient scale issues.
    **The Consequence:** Time is wasted tuning hyperparameters while the fundamental numeric overflow in the Softmax calculation persists.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vocabulary size = 256,000 tokens.
       - FP16 maximum representable value = 65,504.
       - Naive FP16 softmax/log-sum-exp is used.
    2. **Calculations:**
       - If logits are centered near 0, exp(0) = 1, so a naive denominator can be on the order of 256,000.
       - 256,000 is larger than the FP16 max of 65,504, so an FP16 accumulator can overflow even before considering larger positive logits.
       - A stable FP32 path computes max(logits), then log(sum(exp(logits - max))) with FP32 accumulation, avoiding FP16 range and precision failures.
    3. **Conclusion & Interpretation:**
       - **Result: FP16 Loss-Kernel Instability.** Large-vocabulary cross-entropy needs FP32 logits/reduction intermediates; otherwise overflow or invalid arithmetic can quickly produce NaN loss.
