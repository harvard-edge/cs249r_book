title: Online Learning Embedding Staleness and Cache Invalidation
scenario: 'A recommendation system updates item embeddings every 5 minutes via online learning. The serving system caches embeddings in L2 cache (128MB per serving replica). After an update cycle, 15% of requests use stale embeddings for 3-8 minutes. You need to diagnose the cause of this staleness and propose a cache invalidation fix.'
question: Why do 15% of requests use stale embeddings after updates, and how would you fix the cache invalidation mechanism?
details:
  realistic_solution: 'Selective cache invalidation: (1) Track which embedding rows were updated in each training cycle. Online learning typically updates <1% of rows per cycle (sparse gradient updates). Tag updated rows with a version number. (2) Lazy invalidation: serving replicas check embedding version on cache hit. If cached version < current_version, re-fetch from parameter server. Version check: O(1) hash lookup in a ''dirty set'' (bloom filter of updated row IDs). Bloom filter for 1% of 2B rows = 20M updated rows: ~20MB at 1% false positive rate. (3) Version broadcast: parameter server broadcasts a compact dirty-set (bloom filter) to all serving replicas after each update cycle. Serving replicas load the bloom filter (20MB) atomically: <1ms to apply. (4) Eviction-aware update: prioritize updating cache entries for rows in the dirty set. Background thread checks dirty set and evicts stale entries asynchronously.'
  common_mistake: |
    **The Pitfall:** Flushing the entire embedding cache on every update cycle.
    **The Rationale:** It guarantees no stale data is served and is conceptually simple to implement.
    **The Consequence:** With a 128MB L2 cache and updates every 5 minutes, a full cache flush eliminates the cache hit rate benefit entirely, causing a 100% cache miss rate after each update and spiking embedding lookup latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total embeddings: 2 Billion rows.
    - Cache capacity: 128MB L2 cache (fits ~500K FP32 64-dim rows, or 0.025% of total).
    - Update rate: 1% of total rows updated per cycle (20M rows).
    - 500K top rows serve ~15% of all traffic due to Zipfian distribution.

    **Calculations:**
    - Flushing the entire 128MB cache drops the hit rate to 0% every 5 minutes.
    - A Bloom filter tracking 20M dirty rows takes ~20MB of memory (at 1% false positive rate).
    - Downloading a 20MB Bloom filter takes <1ms and allows lazy, surgical invalidation.

    **Conclusion & Interpretation:**
    - **Result: ~20MB Bloom Filter (Latency-Bound)**. Indiscriminate cache flushing destroys L2 hit rates and spikes backend load. Broadcasting a compact Bloom filter enables O(1) version checking and preserves the hot cache.
