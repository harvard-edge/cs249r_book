title: Datacenter Liquid Cooling TCO
scenario: You are building a new 20MW AI datacenter. Standard air cooling achieves a PUE of 1.35 and costs
  $10M in cooling infrastructure CapEx. Direct-to-Chip (D2C) liquid cooling achieves a PUE of 1.10 but
  costs $30M in cooling CapEx. Power costs $0.12/kWh. The facility has a hard 20MW total power feed from
  the utility. An HGX H100 node draws 10kW. Analyze the TCO and compute capacity tradeoff over a 3-year
  lifespan.
question: "For the 20MW datacenter, should you choose air or direct-to-chip liquid cooling over 3 years, and why?"
details:
  realistic_solution: In a power-constrained datacenter, PUE is not just an efficiency metric; it dictates
    your compute ceiling. The total facility power is fixed at 20MW. With air cooling (PUE 1.35), only
    ~14.8MW is available for IT compute. With liquid cooling (PUE 1.10), ~18.1MW is available. This unlocks
    3.3MW of additional compute power, allowing you to deploy 330 more HGX nodes. While the liquid cooling
    CapEx is $20M higher, the energy cost to the facility is identical (you are drawing the full 20MW
    in both cases, costing ~$21M/year). The true tradeoff is whether the revenue generated by 330 additional
    HGX nodes over 3 years justifies the extra $20M upfront CapEx. Given typical LLM serving or training
    revenue, 330 nodes (2,640 H100s) will pay off the $20M difference in a matter of months, making liquid
    cooling the overwhelmingly superior choice.
  common_mistake: Calculating ROI solely based on the energy cost savings from a lower PUE, while failing
    to realize that a fixed facility power limit means lower PUE actually unlocks massive additional compute
    capacity.
  napkin_math: "Total Power = IT Power * PUE. \nAir: IT Power = 20MW / 1.35 = 14.81MW. Nodes = 14,810kW\
    \ / 10kW = 1,481 nodes.\nLiquid: IT Power = 20MW / 1.10 = 18.18MW. Nodes = 18,180kW / 10kW = 1,818\
    \ nodes.\nDifference = 337 additional nodes. \nEnergy cost is fixed: 20,000kW * 8760 hrs * $0.12 =\
    \ $21.02M/year for both. The CapEx delta is $20M. Value of 337 nodes far exceeds $20M."
