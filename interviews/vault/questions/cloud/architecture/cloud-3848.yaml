title: MoE Capacity Factor Communication Overhead
scenario: You are training an 8-expert MoE model on an 8x GPU node, with 1 expert per GPU using expert parallelism. The global batch size is 16 and sequence length is 2048. To reduce token dropping, the team increases the capacity factor from 1.0 to 1.5. Profiling shows that the latency of the All-To-All communication step increases by exactly 50%, even though the total number of valid tokens routed remains exactly the same.
question: Why does raising the MoE capacity factor from 1.0 to 1.5 increase All-To-All latency by 50% even though valid routed tokens are unchanged?
details:
  realistic_solution: 'In this implementation, the All-To-All uses statically sized padded buffers whose capacity is set by the MoE capacity factor: Capacity = (Total Tokens / Num Experts) * Capacity Factor. Raising the capacity factor from 1.0 to 1.5 increases the reserved send/receive buffer size by 50%. If the collective transmits the full padded buffer and communication time is bandwidth-dominated, the observed All-To-All latency can rise by about the same 50% even though the number of valid routed tokens is unchanged. This is an implementation-dependent communication-volume effect, not a universal latency law.'
  common_mistake: |
    **The Pitfall:** Assuming only valid, routed tokens are transmitted over the network.
    **The Rationale:** Candidates incorrectly attribute the slowdown to computation load imbalance or NVLink congestion, failing to realize collective operations require statically sized buffers.
    **The Consequence:** Misdiagnosing network bottlenecks in MoE models and failing to properly tune capacity factors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total tokens: 16 * 2048 = 32,768.
    - Base Capacity Factor (CF): 1.0.
    - New Capacity Factor (CF): 1.5.
    - Token Size: 8192 Bytes.
    - Simplifying assumption: the All-To-All sends the full padded capacity buffer and latency is proportional to bytes transferred.

    **Calculations:**
    - Base buffer size per expert: (32,768 / 8) * 1.0 = 4,096 tokens.
    - Total sent (CF 1.0): 8 experts * 4,096 tokens * 8192 B = 268.4 MB.
    - New buffer size per expert: (32,768 / 8) * 1.5 = 6,144 tokens.
    - Total sent (CF 1.5): 8 experts * 6,144 tokens * 8192 B = 402.6 MB.
    - Padded communication-volume increase = 402.6 / 268.4 = 1.5x (50%).

    **Conclusion & Interpretation:**
    - **Result: 1.5x larger padded buffers**. A 50% latency increase follows only when the implementation sends the full padded buffer and the collective is bandwidth-dominated; real latency can differ with packing, imbalance, and collective efficiency.
