title: Async FL for Intermittent Solar Devices
scenario: You manage 100,000 solar-powered agricultural sensors (100uW harvest rate). The cloud orchestrates FedAvg for a microclimate model. Devices only wake up for 5 seconds every hour. Synchronous FedAvg fails entirely because less than 1% of devices have overlapping wake windows, causing aggregation timeouts.
question: How would you redesign FedAvg for 100,000 solar sensors that wake for only 5 seconds per hour?
details:
  realistic_solution: Shift the cloud architecture to Buffered Asynchronous Federated Learning (FedBuff). The cloud maintains a concurrency buffer. When a device wakes up intermittently, it pulls the latest global model, computes its local update, pushes it to the cloud, and goes back to sleep. Once the cloud buffer collects K updates, it asynchronously applies them to the global model.
  common_mistake: |
    **The Pitfall:** Increasing the timeout window for synchronous rounds to catch more devices.
    **The Rationale:** Schedulers assume devices are "just slow" rather than systematically and disjointly unavailable.
    **The Consequence:** This leads to massive staleness, completely blocked training pipelines, and zero convergence because the aggregator waits hours just to finish a single round.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100k devices waking up 1 time/hour.
    - Each wake window can contribute at most one update after pulling the current model.
    - FedBuff buffer size K = 1000.

    **Calculations:**
    - Expected update arrival rate = 100,000 updates/hour / 3600 sec/hour = 27.8 updates/sec.
    - Expected time to fill a K=1000 buffer = 1000 / 27.8 = 36 seconds.
    - Updates applied in a given buffer may be up to about one wake cycle old if a device trained from the model it fetched during its previous 5-second availability window; the server should bound or down-weight stale deltas.

    **Conclusion & Interpretation:**
    - **Result: Buffered asynchronous aggregation avoids waiting for overlapping wake windows.** The cloud can make progress every ~36 seconds in expectation, while managing staleness explicitly instead of treating the system as a synchronized hourly round.
