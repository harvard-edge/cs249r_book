title: Implement INT8 quantization for MobileNetV3 on TensorRT with calibration
scenario: You need to deploy MobileNetV3-Large in production on A100 using TensorRT INT8 quantization. The model has H-swish activations. Your calibration dataset has 5,000 representative images.
question: How would you calibrate and convert MobileNetV3-Large to TensorRT INT8 on A100 and verify the accuracy drop stays below 1%?
details:
  realistic_solution: Use a standard TensorRT INT8 PTQ workflow rather than hand-setting H-swish scales. Export MobileNetV3-Large to ONNX with TensorRT-compatible ops and either explicit Q/DQ nodes from quantization-aware export or an INT8 calibrator with the 5,000 representative images and a calibration cache. Build the engine with INT8 enabled, inspect unsupported or fused H-swish paths, then validate top-1 accuracy on a held-out dataset against the FP32/FP16 baseline. Use trtexec or the TensorRT API for latency/throughput measurement, but do not use latency runs as an accuracy check. If the held-out accuracy drop exceeds 1%, compare entropy/min-max calibration, improve calibration coverage, or selectively constrain sensitive H-swish-adjacent layers to FP16/FP32.
  common_mistake: |
    **The Pitfall:** Treating INT8 conversion as a one-command TensorRT build and checking only that the engine runs.
    **The Rationale:** MobileNetV3 includes H-swish and other activation patterns whose quantization error depends on representative calibration data, ONNX export compatibility, and TensorRT layer fusion choices.
    **The Consequence:** The engine may be fast but silently lose more than 1% top-1 accuracy unless accuracy is measured after conversion and sensitive layers are kept in higher precision when needed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MobileNetV3-Large params: 5.4M. FP32 memory footprint: 21.6 MB.
       - A100 memory bandwidth: 2 TB/s.
       - INT8 affects weights and eligible activations, but end-to-end inference also includes activation traffic, kernel overhead, memory reuse, and compute limits.
    2. **Calculations:**
       - INT8 footprint: 5.4 MB (4× compression).
       - Weight footprint reduction: 21.6 MB - 5.4 MB = 16.2 MB.
       - Theoretical one-pass weight read savings at 2 TB/s: 16.2 MB / 2 TB/s = 8.1 μs.
       - This is only a lower-bound component; real latency depends on activation movement, layer fusion, tensor core eligibility, batch size, and calibration choices.
    3. **Conclusion & Interpretation:**
       - **Result: Accuracy-Gated INT8 Deployment.** The math supports a smaller model footprint, not a guaranteed throughput multiplier. The release criterion is measured TensorRT latency plus held-out accuracy drop below 1%, with mixed-precision fallback for sensitive layers.
