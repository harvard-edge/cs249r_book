title: 'Red Team LLM: Adversarial Payload Architecture'
scenario: 'Your red team is designing an ML pipeline to stress-test a WAF using a 7B parameter LLM deployed on an 8-GPU cluster. There are two strategies to achieve a target throughput of 5,000 evasive payloads per second: Strategy A uses a local white-box surrogate model (requiring ~50 TFLOPs per payload). Strategy B uses a black-box Reinforcement Learning approach querying the live WAF API (rate limited to 10,000 req/sec).'
question: Which strategy can meet 5,000 evasive payloads/sec on the cluster, white-box surrogate or black-box RL, and why?
details:
  realistic_solution: Strategy B cannot meet the target because 10 live WAF queries per payload under a 10,000 req/sec limit caps it at 1,000 payloads/sec. Strategy A can meet 5,000 payloads/sec only if the cluster sustains roughly 250,000 TFLOPs/sec on the surrogate workload; the stated 2,496 TFLOPS cluster would support only about 50 payloads/sec at 50 TFLOPs per payload.
  common_mistake: |
    **The Pitfall:** Selecting the black-box RL approach based on training accuracy vs throughput limitations.
    **The Rationale:** Candidates see that black-box directly targets the true distribution and assume accuracy overrides all hardware considerations.
    **The Consequence:** Completely failing to hit the mandated 5,000 payloads/sec target because the hard networking rate limits render it mathematically impossible.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target = 5,000 payloads/sec.
    - Cluster compute ≈ 2,496 TFLOPS = 2,496 TFLOPs/sec.
    - Strategy A = 50 TFLOPs/payload.
    - Strategy B Network Max = 10,000 req/sec.
    - Assume 10 RL queries per successful payload.

    **Calculations:**
    - Strategy A Throughput = 2,496 TFLOPs/sec / 50 TFLOPs/payload = 49.92 payloads/sec.
    - Compute needed for 5,000/sec = 5,000 payloads/sec * 50 TFLOPs/payload = 250,000 TFLOPs/sec.
    - Strategy B Throughput = 10,000 req/sec / 10 req/payload = 1,000 payloads/sec.

    **Conclusion & Interpretation:**
    - **Result: neither strategy meets 5,000/sec under the stated limits.** Strategy A is compute-bound at ~50/sec, while Strategy B is API-rate-bound at 1,000/sec.
