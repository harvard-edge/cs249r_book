title: Defensive WAF Stress-Test Throughput Architecture
scenario: 'Your security team is designing a defensive ML pipeline to load-test a WAF using a 7B parameter LLM deployed on an 8-GPU cluster. There are two strategies to achieve a target throughput of 5,000 synthetic WAF test cases per second: Strategy A uses a local white-box surrogate model (requiring ~50 TFLOPs per test case). Strategy B uses a black-box RL approach querying the staging WAF API, which is rate limited to 10,000 req/sec.'
question: Which strategy can meet 5,000 synthetic WAF test cases/sec on the cluster, white-box surrogate or black-box RL, and why?
details:
  realistic_solution: Neither strategy meets the target under the stated throughput limits. Strategy B cannot meet the target because 10 staging WAF queries per test case under a 10,000 req/sec limit caps it at 1,000 test cases/sec. Strategy A would need roughly 250,000 TFLOPs/sec for 5,000 test cases/sec; the stated 2,496 TFLOPS cluster supports only about 50 test cases/sec at 50 TFLOPs per test case.
  common_mistake: |
    **The Pitfall:** Selecting the black-box RL approach based on training accuracy vs throughput limitations.
    **The Rationale:** Candidates see that black-box directly targets the true distribution and assume accuracy overrides all hardware considerations.
    **The Consequence:** Completely failing to hit the mandated 5,000 payloads/sec target because the hard networking rate limits render it mathematically impossible.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target = 5,000 synthetic WAF test cases/sec.
    - Cluster compute ≈ 2,496 TFLOPS = 2,496 TFLOPs/sec.
    - Strategy A = 50 TFLOPs/test case.
    - Strategy B Network Max = 10,000 req/sec.
    - Assume 10 RL queries per accepted test case.

    **Calculations:**
    - Strategy A Throughput = 2,496 TFLOPs/sec / 50 TFLOPs/test case = 49.92 test cases/sec.
    - Compute needed for 5,000/sec = 5,000 test cases/sec * 50 TFLOPs/test case = 250,000 TFLOPs/sec.
    - Strategy B Throughput = 10,000 req/sec / 10 req/test case = 1,000 test cases/sec.

    **Conclusion & Interpretation:**
    - **Result: neither strategy meets 5,000/sec under the stated limits.** Strategy A is compute-bound at ~50/sec, while Strategy B is staging-API-rate-bound at 1,000/sec.
