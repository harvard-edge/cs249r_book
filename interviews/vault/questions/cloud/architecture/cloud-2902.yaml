title: Recall depthwise separable convolution FLOP formula
scenario: A new ML engineer asks you to explain the FLOP calculation for a standard 3x3 convolution versus a depthwise separable convolution for a layer with Cin=128 input channels, Cout=128 output channels, and 28x28 spatial resolution.
question: How do you compute the FLOPs for a standard 3x3 convolution versus a depthwise separable convolution with Cin=Cout=128 at 28x28, and what is the reduction ratio?
details:
  realistic_solution: 'Standard 3x3 conv: 2 * Cin * Cout * k² * H * W. Depthwise sep: depthwise (2 * Cin * k² * H * W) + pointwise (2 * Cin * Cout * H * W). Reduction: 231.2M / 27.5M = 8.4x. General formula: reduction = 1/(1/k² + 1/Cout) ≈ 1/(1/9 + 1/128) ≈ 8.4x.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor-of-2 for multiply-accumulate or applying the spatial kernel size incorrectly to the pointwise layer.
    **The Rationale:** Candidates memorize high-level complexity concepts but slip on the exact MAC accounting (1 multiply + 1 add = 2 FLOPs).
    **The Consequence:** Miscalculating FLOP counts and misrepresenting the true computational savings of efficient architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer: Cin=128, Cout=128, H=28, W=28, kernel k=3.
    - FLOP count assumes MAC = 2 FLOPs (1 multiply, 1 add).

    **Calculations:**
    - Standard 3x3 conv: 2 * Cin * Cout * k² * H * W = 2 * 128 * 128 * 9 * 28 * 28.
      - 2 * 16,384 * 9 * 784 = 231,211,008 ≈ 231.2M FLOPs.
    - Depthwise separable conv = Depthwise + Pointwise:
      - Depthwise: 2 * Cin * k² * H * W = 2 * 128 * 9 * 784 = 1,806,336 ≈ 1.8M FLOPs.
      - Pointwise: 2 * Cin * Cout * 1² * H * W = 2 * 128 * 128 * 784 = 25,690,112 ≈ 25.7M FLOPs.
      - Total depthwise separable = 1.8M + 25.7M = 27.5M FLOPs.
    - Reduction ratio: 231.2M / 27.5M = 8.40x.

    **Conclusion & Interpretation:**
    - **Result: 8.4x Reduction (Compute-Bound)**. The depthwise separable convolution provides an ~8.4x reduction in computational FLOPs compared to the standard convolution.
