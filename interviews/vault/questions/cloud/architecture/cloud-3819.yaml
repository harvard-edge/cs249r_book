title: MoE Expert Pruning for Inference Optimization
scenario: After training your 16-expert MoE model, you analyze routing statistics and find that 4 specific experts receive less than 2% of tokens each (totaling 7% of all routing assignments). These 4 experts account for 25% of the expert parameters.
question: Can you prune the 4 low-traffic experts for inference, and what memory savings and quality impact should you expect?
details:
  realistic_solution: Yes, expert pruning can be effective, but the safe expectation is parameter-memory savings, not guaranteed speed or quality gains. These 4 experts account for 25% of expert parameters, so pruning them removes 25% of expert-weight VRAM. Because they receive 7% of routing assignments, quality impact depends on how specialized those assignments are and whether you reroute or fine-tune. Validate with held-out traffic before assuming the degradation is small.
  common_mistake: |
    **The Pitfall:** Simply deleting the experts and redistributing their routing probability uniformly.
    **The Rationale:** Engineers assume that since the traffic is low, random reassignment of the remaining 7% won't matter.
    **The Consequence:** Randomly reassigning tokens destroys the semantic routing space, degrading generation quality far more than careful cosine-similarity remapping or router fine-tuning.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16 experts to 12 experts.
    - The removed experts account for 25% of expert parameters.
    - Pruned experts handle <7% of token assignments.

    **Calculations:**
    - Expert-weight VRAM saved = 4 / 16 = 25% of the expert-parameter memory.
    - Remaining expert-weight VRAM = 75% of the original expert-weight memory.
    - Throughput change is workload-dependent: pruning reduces resident expert weights, but token routing, batching, non-expert layers, and HBM reuse determine realized latency.
    - Quality impact is validation-dependent: 7% of assignments need rerouting or router fine-tuning, and rare-specialized experts can matter more than their traffic share.

    **Conclusion & Interpretation:**
    - **Result: 25% expert-weight memory savings**. Careful pruning can lower VRAM requirements, but speedup and quality loss should be reported from workload benchmarks after rerouting or fine-tuning.
