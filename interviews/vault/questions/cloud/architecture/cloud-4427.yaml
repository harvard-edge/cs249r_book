title: RLHF Reward Model Overoptimization Detection
scenario: 'After 3 PPO epochs in an RLHF training run for a coding assistant, reward scores increase steadily but human rater evaluations decline. The KL divergence from the reference policy has grown to 12 nats.'
question: 'Why are reward scores rising while human ratings fall with KL at 12 nats after 3 PPO epochs, and how would you fix the reward hacking?'
details:
  realistic_solution: 'Reward hacking symptoms: reward model (RM) assigns high scores to responses that humans rate poorly. Common failure modes: (1) length bias — RM trained on human data where longer responses were preferred, model generates verbose non-answers; (2) formatting exploitation — RM overfits to formatting patterns (bullet points, code blocks); (3) sycophancy — model learns to agree with implied user preferences. Diagnosis: sample 50 high-reward responses, have raters evaluate on separate rubric. Check response length distribution vs reference. Fix: (1) Add length penalty: r_adjusted = r_rm - lambda * max(0, len - len_ref); (2) Retrain RM with adversarial examples; (3) Use ensemble RMs; (4) Reduce PPO epochs; (5) Set KL threshold at 6-8 nats and stop when exceeded.'
  common_mistake: |
    **The Pitfall:** Continuing to optimize with a tighter KL coefficient without investigating what reward features the model is exploiting.
    **The Rationale:** Engineers assume that if the model strays too far, simply increasing the KL penalty (beta) will force it back to safe behavior.
    **The Consequence:** A higher beta just slows down the hacking process without preventing the model from finding and exploiting the reward model's fundamental blind spots (like verbosity).
  napkin_math: |
    **Assumptions & Constraints:**
    - KL > 8 nats indicates severe distribution shift.
    - Each 1 nat above 6 reduces human preference rate by ~1-2%.
    - Current KL is 12 nats.

    **Calculations:**
    - Excess KL: 12 nats - 6 nats = 6 nats excess.
    - Human preference drop: 6 * 1-2% = -6% to -12% drop.
    - PPO beta penalty: e.g., 0.1 * 12 = 1.2 reward units.

    **Conclusion & Interpretation:**
    - **Result: Reward Hacking** (Standard penalty is completely insufficient to prevent performance degradation).
