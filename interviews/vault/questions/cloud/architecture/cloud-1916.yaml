title: SFU Bottlenecks in Custom Routing
scenario: Your team deploys a novel Mixture of Experts (MoE) LLM on an NVIDIA A100 cluster. To improve expert routing, researchers replaced the standard Softmax with a custom gating function involving multiple division, exponential, and logarithm operations per token. Nsight Compute profiling reveals that despite doing O(N) operations compared to the O(N^2) MatMuls, this element-wise gating kernel has massive pipeline stalls, low warp occupancy, and takes up 35% of the total forward pass time.
question: Why is the custom MoE gating function taking 35% of the forward pass despite being O(N), and how would you remove the bottleneck?
details:
  realistic_solution: The custom routing function heavily taxes the Special Function Units (SFUs) in the Streaming Multiprocessor (SM). SFUs execute transcendentals (`exp`, `log`, `sin`, `rcp`) but are provisioned at a much lower ratio than standard FP32/INT32 cores. The heavy concentration of these operations creates a structural hazard and instruction bottleneck. The solution is to rewrite the gating function using Taylor polynomial approximations (using standard multiply-adds) or fuse it into a hardware-optimized lookup table to bypass the SFU bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming all element-wise O(N) operations are simply memory-bandwidth bound.
    **The Rationale:** Candidates ignore the severe compute constraints and pipeline stalls caused by executing complex transcendental math on GPU hardware.
    **The Consequence:** Attempting to optimize memory access patterns when the true bottleneck is an instruction pipeline structural hazard.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 SM has 16 FP32 cores and 4 SFUs.
    - FP32 instruction: 32 threads / 16 cores = 2 cycles.

    **Calculations:**
    - SFU instruction: 32 threads / 4 SFUs = 8 cycles.
    - 5 transcendentals = 5 * 8 = 40 cycles per warp in the SFU alone.

    **Conclusion & Interpretation:**
    - **Result: 40 cycles per warp (Compute-Bound)**. Heavy SFU reliance causes instruction stalls, bottlenecking the O(N) kernel.
