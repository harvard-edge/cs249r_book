title: Diagnosing Custom ASIC Underutilization with Dynamic Shapes
scenario: Your team migrated a latency-sensitive NLP inference service from general-purpose GPUs to a custom cloud ASIC specialized for dense matrix multiplication. The ASIC provides 300 TFLOPS of peak compute, matching the GPU on paper. However, in production, the P99 latency spiked by 3x and the ASIC utilization hovers around 25%. Metrics show that incoming request sequence lengths vary wildly from 16 to 1024 tokens.
question: Why did the custom ASIC show 3x higher P99 latency at 25% utilization, and how would you fix it?
details:
  realistic_solution: Custom ASICs achieve high energy efficiency by sacrificing programmability, relying on rigid spatial compute structures and ahead-of-time static compilation (e.g., XLA). With sequence lengths ranging from 16 to 1024, the service is likely losing efficiency from a combination of padding waste, fragmented batches or weak bucketing, and static-shape compilation or dispatch overhead. Padding average 128-token requests to 1024 tokens is one major contributor, but it does not by itself prove a linear 3x latency increase. Fix it by bucketing requests by length, compiling a small set of shapes, improving batch formation within latency SLOs, and measuring compile/cache misses and dispatch overhead.
  common_mistake: |
    **The Pitfall:** Assuming peak TOPS translates directly to throughput.
    **The Rationale:** Candidates do not consider the rigid architectural constraints of custom ASICs (like systolic arrays) and the severe efficiency penalty of static graph compilation when input shapes vary dynamically.
    **The Consequence:** Unpredictable and massive latency spikes due to zero-padding waste when processing dynamic sequence lengths.
  napkin_math: |
    **Assumptions & Constraints:**
    - Average sequence length: 128 tokens.
    - Maximum supported length: 1024 tokens.
    - Custom ASIC relies on ahead-of-time static compilation (e.g., XLA).

    **Calculations:**
    - Token padding multiplier: 1024 / 128 = 8x as many token positions.
    - Padding waste relative to useful token positions: (1024 - 128) / 1024 = 87.5% padded positions.
    - This ratio bounds the padding inefficiency under the simplified average-length assumption; it does not directly derive the observed 3x P99 latency because batching, compiler shape handling, and dispatch overhead also affect latency.

    **Conclusion & Interpretation:**
    - **Result: Shape-efficiency bound.** Dynamic sequence lengths can waste most token slots on a statically compiled ASIC, and the observed 25% utilization/3x P99 points to padding plus batching and compilation overhead rather than padding alone.
