title: Diagnosing Custom ASIC Underutilization with Dynamic Shapes
scenario: Your team migrated a latency-sensitive NLP inference service from general-purpose GPUs to a custom cloud ASIC specialized for dense matrix multiplication. The ASIC provides 300 TFLOPS of peak compute, matching the GPU on paper. However, in production, the P99 latency spiked by 3x and the ASIC utilization hovers around 25%. Metrics show that incoming request sequence lengths vary wildly from 16 to 1024 tokens.
question: Why did the custom ASIC show 3x higher P99 latency at 25% utilization, and how would you fix it?
details:
  realistic_solution: 'Custom ASICs achieve high energy efficiency by sacrificing programmability, relying on rigid spatial compute structures and ahead-of-time static compilation (e.g., XLA). Dynamic sequence lengths force zero-padding to the maximum supported length (1024 tokens), causing the ASIC to compute 8x more operations than necessary when the average input is 128 tokens. The 3x latency spike comes from this wasted compute. The fix is to implement input bucketing (e.g., padding to nearest power of 2) to reduce average padding waste.'
  common_mistake: 'Assuming peak TOPS translates directly to throughput without considering the rigid architectural constraints of custom ASICs (like systolic arrays) and the severe efficiency penalty of static graph compilation when input shapes vary dynamically.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Average sequence length: 128 tokens.
    - Maximum supported length: 1024 tokens.
    - Custom ASIC relies on ahead-of-time static compilation (e.g., XLA).

    **Calculations:**
    - Padding multiplier: 1024 / 128 = 8x more operations per request.
    - 800% of required FLOPs are computed due to zero-padding.

    **Conclusion & Interpretation:**
    - **Result: 8x wasted compute leading to 3x latency spike (Compute-Bound)**. Dynamic sequence lengths incur severe efficiency penalties on statically compiled execution graphs.
