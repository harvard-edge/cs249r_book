title: Federated LoRA Training for Privacy-Preserving Adaptation
scenario: A healthcare company wants to fine-tune a medical LLM across 50 hospitals without sharing patient data.
question: How would you design federated LoRA training across 50 hospitals with differential privacy guarantees?
details:
  realistic_solution: 'Use DP-LoRA: each hospital trains a local rank-4 adapter with Gaussian noise added to gradients before transmission (ε=1.0, δ=10⁻⁵). Central server aggregates noisy adapter updates via FedAvg. Noise scale: σ = C√(2ln(1.25/δ))/ε × √T where T=rounds, C=gradient clip norm. Key insight: LoRA''s small parameter count (vs full fine-tune) dramatically reduces noise needed for the same DP guarantee — rank-4 has 6667x fewer parameters than a 7B full fine-tune, requiring ~82x less noise for the same ε.'
  common_mistake: |
    **The Pitfall:** Averaging LoRA adapter gradients directly without noise.
    **The Rationale:** Candidates assume Federated Learning alone provides sufficient privacy.
    **The Consequence:** Leaking sensitive patient data through gradient inversion attacks, violating HIPAA compliance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 hospitals.
    - Model: 7B parameters.
    - DP guarantee: ε=1.0, δ=10⁻⁵.

    **Calculations:**
    - Rank-4 adapter parameters: 2 * 4 * 4096 * 32 = 1.05M params.
    - DP noise budget scales with sqrt(parameters).
    - Noise reduction: sqrt(7B / 1.05M) = sqrt(6667) = ~81.6x.
    - Communication payload: 1.05M * 4 bytes = 4.2 MB per round.

    **Conclusion & Interpretation:**
    - **Result: 4.2 MB per round (Communication-Bound)**. DP-LoRA requires ~82x less noise than a full fine-tune for the same privacy budget, drastically improving utility while reducing communication overhead to just 4.2 MB per round.
