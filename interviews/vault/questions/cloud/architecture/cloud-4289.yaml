title: Federated LoRA Training for Privacy-Preserving Adaptation
scenario: A healthcare company wants to fine-tune a medical LLM across 50 hospitals without sharing patient data.
question: How would you design federated LoRA training across 50 hospitals with differential privacy guarantees?
details:
  realistic_solution: 'Use federated LoRA with client-level DP: each hospital trains local adapters, clips each client update to norm C, and sends the clipped update through secure aggregation. The server adds or accounts for Gaussian noise using a privacy accountant over sampling rate, rounds, clipping norm, and target ε/δ, then performs FedAvg on the adapter updates. LoRA reduces communication and local compute because only adapter weights move, but it does not by itself make the DP noise scale down in proportion to parameter count. Track utility with validation by site and stop when the accountant reaches the privacy budget.'
  common_mistake: |
    **The Pitfall:** Averaging LoRA adapter gradients directly without noise.
    **The Rationale:** Candidates assume Federated Learning alone provides sufficient privacy.
    **The Consequence:** Leaking sensitive patient data through gradient inversion attacks, violating HIPAA compliance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 hospitals.
    - Model: 7B parameters.
    - DP guarantee: ε=1.0, δ=10⁻⁵.
    - Use client-level DP with per-round client sampling and clipped adapter updates.

    **Calculations:**
    - Rank-4 adapter parameters for one projection per layer: 2 * 4 * 4096 * 32 = 1.05M params.
    - Communication payload at FP32: 1.05M * 4 bytes = 4.2 MB per client update before compression.
    - DP noise is calibrated by the accountant from clipping norm C, sampling probability q, number of rounds T, noise multiplier, and target δ.
    - Smaller adapters reduce the vector communicated and optimized, but there is no valid 82x DP-noise reduction from sqrt(7B / 1.05M).

    **Conclusion & Interpretation:**
    - **Result: Communication-Bound.** LoRA can cut each client payload to about 4.2 MB under these adapter assumptions, while the DP guarantee must be established by clipping, secure aggregation, sampling, noise calibration, and privacy accounting rather than parameter-count scaling.
