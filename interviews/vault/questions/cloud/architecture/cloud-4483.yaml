title: Real-Time Feature Freshness vs Training Distribution Shift
scenario: A recommendation model was trained with features computed at batch time (hourly aggregates). The serving system now uses real-time features (second-level aggregates). Model performance drops 8% (lower CTR) compared to holdout with batch features.
question: How would you diagnose and fix the train-serve skew from training on hourly batch features but serving second-level aggregates?
details:
  realistic_solution: 'Train-serve skew diagnosis: (1) Feature distribution comparison: for each feature, compute KL divergence between training distribution and serving distribution. Features with KL > 0.1 are candidates. (2) Real-time vs hourly aggregates differ in: raw count features (real-time = more noisy at low traffic times), normalization (hourly data includes full-day traffic; real-time has intra-day variance), and smoothing (hourly features naturally smooth out spikes). (3) Identify highest-KL features: likely culprits are popularity counts (item_click_count_1h: training used hourly batch, serving uses real-time rolling window — different semantics) and session features (session_length_minutes: hourly batch may have rounded differently). (4) Fix options: (a) Align feature computation: train with real-time features; (b) Align serving: use batch features at serving time (acceptable if 1-hour staleness is OK); (c) Feature normalization: normalize real-time features to match training distribution using running statistics. Option (a) is correct long-term; option (c) is a quick fix.'
  common_mistake: |
    **The Pitfall:** Retraining the model with real-time features without first diagnosing which specific features are causing the distribution shift.
    **The Rationale:** Engineers assume newer data formats are inherently better and simply need a retraining cycle to catch up.
    **The Consequence:** Blind retraining is extremely expensive and fails to fix the issue if the root cause is a fundamental feature computation difference (not just temporal staleness).
  napkin_math: |
    - 8% CTR drop on 100K QPS serving.
    - If baseline CTR = 3%: 100K * 0.03 = 3000 clicks/sec.
    - 8% of 3000 = 240 clicks/sec lost.
    - At $0.50 CPC: $120/sec = $10.4M/day revenue impact (High urgency).
    - KL divergence computation for skew detection: 100 features * 1M ops = 100M ops.
    - **100M ops is negligible on CPU, allowing the root cause to be identified computationally within hours.**
