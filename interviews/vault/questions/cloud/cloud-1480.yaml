title: Real-Time Fraud Label Shift Adaptation
scenario: 'A cloud-based fraud detection API processes 100,000 transactions per second. During a holiday weekend, the true fraud rate P(Y) spikes, while the underlying transaction patterns for both fraudulent and legitimate transactions P(X|Y) remain unchanged (Label Shift). You cannot retrain the heavy XGBoost ensemble in real-time. On the training/validation set, the model has a True Positive Rate (TPR) of 0.80 and a False Positive Rate (FPR) of 0.05. In the current production batch, the model flags 27.5% of all transactions as fraud.'
question: 'What is the estimated true fraud rate when 27.5% of transactions are flagged, and how should you adjust the model outputs?'
details:
  realistic_solution: 'Apply Black Box Shift Estimation (BBSE) to estimate the target label distribution by solving a linear system using the validation confusion matrix and the observed prediction frequencies. Then, apply importance weights P_target(Y) / P_train(Y) to adjust the output probabilities via Bayes'' theorem.'
  common_mistake: |
    **The Pitfall:** Assuming the 27.5% predicted fraud rate is the true actual fraud rate.
    **The Rationale:** Candidates ignore the model's confusion matrix (TPR and FPR) and the mathematics of Label Shift, or they attempt to trigger an expensive full retraining pipeline.
    **The Consequence:** Grossly misestimating the severity of the fraud spike and failing to provide a fast, mathematically sound post-hoc correction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model flagged positive rate P(Y_hat=1) = 27.5%.
    - TPR = 0.80, FPR = 0.05.

    **Calculations:**
    - P(Y_hat=1) = TPR * p + FPR * (1 - p)
    - 0.275 = 0.80p + 0.05(1 - p)
    - 0.275 = 0.75p + 0.05
    - 0.225 = 0.75p -> p = 0.30

    **Conclusion & Interpretation:**
    - **Result: Label Shift Correction**. The true fraud rate is actually 30%, even though the model only flagged 27.5%.
