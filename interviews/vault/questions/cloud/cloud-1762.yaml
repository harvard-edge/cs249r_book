title: RoCEv2 Traffic Class Allocation with DWRR
scenario: A 400 Gbps RoCEv2 spine link is shared between large-message AllReduce training traffic and latency-sensitive cluster storage traffic. During parallel checkpointing bursts, storage traffic attempts to push 200 Gbps, while training traffic concurrently demands 350 Gbps, causing severe congestion. You configure two Traffic Classes (TCs) using Deficit Weighted Round Robin (DWRR). TC0 (Storage) is assigned a weight of 1, and TC1 (Training) is assigned a weight of 3.
question: With DWRR weights 1 for storage and 3 for training on a 400 Gbps link, what bandwidth does each class get and does training meet its 250 Gbps SLO?
details:
  realistic_solution: Utilize DWRR to assign strictly proportional bandwidth guarantees during switch congestion. By applying a 3:1 weight ratio at the switch level, training traffic is mathematically guaranteed 75% of the link bandwidth under full saturation, satisfying its SLO while preventing latency-sensitive storage starvation.
  common_mistake: |
    **The Pitfall:** Using strict priority queuing (SPQ) for the storage traffic to minimize latency.
    **The Rationale:** Storage and latency-sensitive control traffic are often granted absolute priority in traditional web networks.
    **The Consequence:** The bursty storage traffic consumes 200 Gbps off the top, starving the AI training traffic (leaving only 200 Gbps), and catastrophically failing the 250 Gbps AllReduce SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link Bandwidth: 400 Gbps.
       - DWRR Setup: Storage Weight = 1, Training Weight = 3. Total = 4.
       - Training SLO: Minimum 250 Gbps.
    2. **Calculations:**
       - Training Allocation: (3 / 4) * 400 Gbps = 300 Gbps.
       - Storage Allocation: (1 / 4) * 400 Gbps = 100 Gbps.
    3. **Conclusion & Interpretation:**
       - **Training receives 300 Gbps under full congestion, safely exceeding the 250 Gbps SLO. Result: Network-QoS Governed.**
