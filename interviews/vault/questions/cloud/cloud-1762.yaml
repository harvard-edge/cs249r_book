title: RoCEv2 Traffic Class Allocation with DWRR
scenario: A 400 Gbps RoCEv2 spine link is shared between large-message AllReduce training traffic and
  latency-sensitive cluster storage traffic. During parallel checkpointing bursts, storage traffic attempts
  to push 200 Gbps, while training traffic concurrently demands 350 Gbps, causing severe congestion. You
  configure two Traffic Classes (TCs) using Deficit Weighted Round Robin (DWRR). TC0 (Storage) is assigned
  a weight of 1, and TC1 (Training) is assigned a weight of 3. Calculate the guaranteed bandwidth for
  each class during this congestion event and determine if the training traffic meets its strict minimum
  Service Level Objective (SLO) of 250 Gbps.
question: "With DWRR weights 1 for storage and 3 for training on a 400 Gbps link, what bandwidth does each class get and does training meet 250 Gbps?"
details:
  realistic_solution: Use DWRR to assign proportional bandwidth during congestion. By applying a 3:1 weight
    ratio, training traffic is guaranteed 75% of the link bandwidth while preventing storage starvation.
  common_mistake: Using strict priority queuing for the storage traffic to minimize latency, which allows
    it to consume 200 Gbps and starves the training traffic (leaving only 200 Gbps, failing the 250 Gbps
    SLO).
  napkin_math: 'Total Bandwidth = 400 Gbps.

    Total Weight = 3 (TC1) + 1 (TC0) = 4.

    TC1 (Training) Allocation = (3/4) * 400 = 300 Gbps.

    TC0 (Storage) Allocation = (1/4) * 400 = 100 Gbps.

    Result: Training receives 300 Gbps, successfully meeting the 250 Gbps minimum SLO.'
