title: 'Optimizing Data Efficiency on Google TPU v5e: Addressing Model Collapse in Large-Scale Foundation Models'
scenario: 'Your team is training a massive foundation model on a cluster of Google TPU v5e devices. You''ve observed that despite scaling up training data, model performance gains are diminishing, and the model exhibits early signs of model collapse due to low-quality or redundant data. The vast dataset (hundreds of terabytes) makes full manual data curation impractical, hindering further progress and wasting valuable compute cycles.'
question: What quantifiable data-efficiency plan would you use to improve the Information-Compute Ratio (ICR) and reduce model-collapse risk at hundreds-of-TB scale?
details:
  realistic_solution: 'Implement a two-pronged data efficiency strategy: First, leverage coreset selection techniques (e.g., based on gradients, influence functions, or representativeness sampling) to identify and prioritize the most informative data subsets for each training epoch, reducing the effective dataset size. Second, incorporate curriculum learning by progressively introducing more complex or novel data samples, ensuring the model learns from high-value information first. This can be combined with synthetic data generation for specific hard-to-acquire examples, carefully monitoring for potential risks of distribution shift or amplifying biases. The goal is to maximize the ICR by feeding the TPUs the most impactful data.'
  common_mistake: |
    **The Pitfall:** Blindly increasing the volume of training data without considering its quality, diversity, or relevance.
    **The Rationale:** Believing the "scaling laws" imply that simply feeding more data will inevitably improve model performance, ignoring the data quality frontier.
    **The Consequence:** Inflated compute costs per unit of information, slower training convergence, and potentially model collapse from corrupted or excessively redundant samples.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 1000 TPU v5e chips.
    - Baseline training: 48 hours/epoch * 50 epochs.
    - Coreset selection reduces epoch time by 30%.
    - Proxy model overhead for scoring: 100 chips * 24 hours.

    **Calculations:**
    - Baseline compute: 1000 * 48 * 50 = 2,400,000 chip-hours.
    - Coreset proxy compute: 100 * 24 = 2,400 chip-hours.
    - Pruned training compute: 1000 * (48 * 0.70) * 50 = 1,680,000 chip-hours.
    - Total optimized compute: 1,680,000 + 2,400 = 1,682,400 chip-hours.
    - Savings ratio: (2,400,000 - 1,682,400) / 2,400,000 = 29.9%.

    **Conclusion & Interpretation:**
    - **Result: ~30% Compute Savings (Compute-Bound)**. The immense fixed cost of scoring/pruning data via proxy models is vastly eclipsed by the raw compute savings generated by preventing thousands of TPUs from iterating over redundant or toxic data.
