title: The Graph Break Recompilation Storm
scenario: After enabling `torch.compile()` on your training loop, you observe that the first epoch takes 45 minutes instead of the expected 5 minutes. Subsequent epochs run at the expected speed. The profiler shows thousands of compilation events in the first epoch.
question: "What is causing the recompilation storm, and how do you diagnose which operations are triggering graph breaks?"
details:
  realistic_solution: 'Graph breaks occur when TorchDynamo encounters Python operations it cannot trace into the computation graph — data-dependent control flow (if tensor.item() > threshold), in-place operations on tensors with aliasing, calls to non-compilable external libraries, or dynamic shapes that change every iteration. Each graph break creates a separate subgraph that must be independently compiled by the backend (TorchInductor). With thousands of graph breaks, you get thousands of tiny compiled kernels instead of a few large fused kernels. Diagnosis: set `torch._dynamo.config.verbose = True` and `torch._dynamo.config.log_level = logging.DEBUG` to see exactly which Python line triggers each break. Common fixes: replace `tensor.item()` with `torch.where()`, replace data-dependent branches with masking operations, use `torch.compiler.allow_in_graph` for safe custom ops, and set `dynamic=True` for varying shapes. After fixing graph breaks, you should see 5-10 compiled graphs instead of thousands.'
  common_mistake: |
    **The Pitfall:** Believing the compiler is inherently slow and trying to solve it by buying more CPU cores for compilation.
    **The Rationale:** Engineers mistake compilation speed for the root cause.
    **The Consequence:** The underlying issue of excessive graph fragmentation from unsupported operations remains unresolved.
  napkin_math: |
    - 1,000 graph breaks × ~2s compilation each = 2,000s = 33 minutes of compilation overhead.
    - After fixing: 8 large graphs × ~15s each = 120s = 2 minutes.
    - The compiled kernels are also faster because larger fused graphs enable more cross-operator optimizations.
    - **Conclusion:** **Net first-epoch improvement is 45 min → 7 min.**
