title: Evaluating Stream Overlap for H2D Transfers
scenario: You are optimizing a computer vision training pipeline on an NVIDIA A100 GPU. The forward and
  backward pass computation takes 40ms per batch. The data loader reads images, decodes them on the CPU,
  and transfers the 256MB batch to the GPU, taking 10ms over PCIe Gen4 (effectively ~25 GB/s). Currently,
  the GPU stalls waiting for the next batch, resulting in a 50ms total step time. You propose using a
  separate execution stream to overlap the host-to-device (H2D) transfer of batch N+1 with the computation
  of batch N. Evaluate the architectural trade-offs of this approach, specifically regarding host memory
  requirements and synchronization overhead.
details:
  realistic_solution: Allocate pinned memory on the host for the data loader outputs and use double buffering
    with a dedicated CUDA stream for the H2D transfer. Use CUDA events to synchronize the compute and
    transfer streams safely. This hides the 10ms transfer entirely behind the 40ms compute, but requires
    allocating additional pinned host memory for the prefetch buffer.
  common_mistake: Assuming that placing the transfer in a separate stream automatically overlaps it with
    compute, without realizing that asynchronous DMA transfers require pinned (page-locked) host memory,
    or failing to account for the memory overhead of double-buffering.
  napkin_math: 'Sequential step time: 40ms compute + 10ms H2D = 50ms. Overlapped step time: max(40ms,
    10ms) = 40ms. Throughput increase: 50ms / 40ms = 1.25x (25% speedup). Pinned memory footprint: 2 buffers
    * 256 MB = 512 MB.'
