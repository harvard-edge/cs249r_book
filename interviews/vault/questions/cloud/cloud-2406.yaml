title: Activation Outliers in Large Models
scenario: You deploy a 13B parameter LLM for a cloud-based summarization API. To meet the <40ms Time-Between-Tokens
  (TBT) SLA on L4 GPUs (24GB VRAM, 300 GB/s), you apply INT8 weight and activation quantization (W8A8).
  However, perplexity degrades severely and the model generates gibberish. Testing shows W8A16 (INT8 weights,
  FP16 activations) maintains perfect accuracy but misses the latency SLA, clocking in at 55ms TBT. What
  is the root cause of the W8A8 degradation, and how do you resolve it?
question: "What is the root cause of the W8A8 degradation, and how do you resolve it?"
details:
  realistic_solution: The symptom indicates systematic activation outliers. In LLMs larger than ~6B parameters,
    massive outliers emerge in specific activation channels (often 100x larger than the median). Standard
    per-tensor or per-token activation quantization squashes the dynamic range of the non-outlier channels
    into a single quantization bin, destroying the signal. The solution is to use an algorithm like SmoothQuant,
    which mathematically migrates the quantization difficulty from the activations to the weights. By
    scaling down the outlier activation channels and scaling up the corresponding weight channels before
    quantization, both can be safely quantized to INT8, restoring W8A8 performance and meeting the latency
    SLA.
  common_mistake: Assuming the weights were quantized incorrectly and switching to QAT, which is expensive
    and doesn't solve the fundamental activation issue.
  napkin_math: W8A16 TBT = 55ms. L4 Bandwidth = 300 GB/s. 13B INT8 weights = 13GB. Reading 13GB at 300
    GB/s takes ~43ms. The remaining 12ms is compute/overhead. W8A8 uses INT8 Tensor Cores, doubling compute
    throughput and halving KV cache bandwidth, dropping TBT below the 40ms threshold.
