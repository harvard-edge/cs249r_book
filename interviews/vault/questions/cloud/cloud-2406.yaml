title: Activation Outliers in Large Models
scenario: You deploy a 7B parameter LLM for a cloud-based summarization API. To meet the <40ms Time-Between-Tokens (TBT) SLA on L4 GPUs, you apply INT8 weight and activation quantization (W8A8). However, perplexity degrades severely and the model generates gibberish. Testing shows W8A16 maintains perfect accuracy but misses the latency SLA, clocking in at 55ms TBT.
question: What is the root cause of the W8A8 degradation, and how do you resolve it?
details:
  realistic_solution: The symptom indicates systematic activation outliers. In LLMs larger than ~6B parameters, massive outliers emerge in specific activation channels (often 100x larger than the median). Standard per-tensor or per-token activation quantization squashes the dynamic range of the non-outlier channels into a single quantization bin, destroying the signal. The solution is to use an algorithm like SmoothQuant, which mathematically migrates the quantization difficulty from the activations to the weights. By scaling down the outlier activation channels and scaling up the corresponding weight channels before quantization, both can be safely quantized to INT8, restoring W8A8 performance and meeting the latency SLA.
  common_mistake: |
    **The Pitfall:** Assuming the weights were quantized incorrectly and switching to expensive Quantization-Aware Training (QAT).
    **The Rationale:** Candidates unfamiliar with the phenomenon of massive activation outliers in large LLMs default to standard model training fixes.
    **The Consequence:** Wasting weeks on QAT when the fundamental issue is a dynamic range collapse caused by activation outliers, which requires techniques like SmoothQuant to resolve.
  napkin_math: |
    - **W8A16 TBT:** 55 ms on L4 (300 GB/s bandwidth).
    - **Memory Fetch:** 7B INT8 weights = 7 GB. Reading 7 GB at 300 GB/s takes ~23 ms.
    - **Compute/Overhead:** 55 ms - 23 ms = 32 ms.
    - **W8A8 Impact:** W8A8 uses INT8 Tensor Cores, doubling compute throughput and halving KV cache bandwidth. This mathematically drops the 32 ms overhead significantly, crossing the **<40 ms SLA**.
