title: Cloud Torchdynamo L3 0
scenario: 'You profile a Transformer model with torch.compile(). TorchDynamo reports 3 graph breaks. The compiled regions take 12 ms total, and the eager fallback regions take 8 ms. Without compilation, the full model takes 35 ms.'
question: 'Calculate the speedup achieved, and estimate the potential speedup if graph breaks were eliminated so the entire model could be compiled.'
details:
  realistic_solution: 'Current total: 12 ms (compiled) + 8 ms (eager) = 20 ms. Speedup vs. baseline: 35 / 20 = 1.75x. The uncompiled time of the compiled regions was 35 - 8 = 27 ms. Thus, the compiled speedup is 27 / 12 = 2.25x. Applying similar optimization to the 8 ms eager portion: 8 / 2.25 ≈ 3.56 ms. Potential total: 12 + 3.56 = 15.56 ms → 35 / 15.56 = 2.25x. Eliminating graph breaks could yield an additional 28% speedup (from 20ms to 15.56ms).'
  common_mistake: |
    **The Pitfall:** Assuming graph breaks have zero overhead or only affect a small portion of the code.
    **The Rationale:** Candidates focus solely on the successfully compiled regions.
    **The Consequence:** Missing that each break incurs Python interpreter re-entry, guard checks, and prevents cross-region fusion optimizations, leaving substantial speedups on the table.
  napkin_math: |
    - **Current Total Time:** 12 ms (compiled) + 8 ms (eager) = 20 ms.
    - **Current Speedup vs. Baseline:** 35 ms / 20 ms = 1.75x.
    - **Compiled Region Baseline:** 35 ms (total) - 8 ms (eager) = 27 ms.
    - **Compiled Speedup Ratio:** 27 ms / 12 ms = 2.25x (includes break overhead, so this is conservative).
    - **Potential with Zero Breaks:** If the 8 ms eager portion is also compiled at the 2.25x ratio: 8 ms / 2.25 = ~3.56 ms.
    - **Potential Best Case Time:** 12 ms + 3.56 ms = 15.56 ms.
    - **Potential Speedup:** 35 ms / 15.56 ms = 2.25x.
