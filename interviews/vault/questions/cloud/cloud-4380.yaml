title: 'MI300X HBM3 Bandwidth as a Power Efficiency Lever'
scenario: 'A new ML infrastructure engineer is onboarding and asks you to compare the memory bandwidth of the MI300X versus the H100 SXM5.'
question: 'What are the MI300X and H100 SXM5 peak HBM bandwidths, and how does higher bandwidth affect accelerator count and rack power for inference?'
details:
  realistic_solution: 'MI300X delivers 5.3 TB/s vs H100 at 3.35 TB/s. For a memory-bandwidth-bound LLM decode workload, MI300X yields roughly 1.58x more tokens/s per chip. This reduces the number of chips required to meet a fixed SLA, fundamentally lowering aggregate TDP and cooling load.'
  common_mistake: |
    **The Pitfall:** Conflating compute FLOPS with memory bandwidth.
    **The Rationale:** Candidates intuitively assume the accelerator with higher peak FLOPS always yields higher throughput for any task.
    **The Consequence:** They fail to realize that for memory-bandwidth-bound workloads like LLM decoding, throughput is strictly governed by bandwidth, leading to incorrect capacity planning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: Decode (1 token/s requires ~1.5 GB/s bandwidth).
       - H100 bandwidth: 3.35 TB/s, 700W TDP.
       - MI300X bandwidth: 5.30 TB/s, 750W TDP.
       - Target SLA: 100,000 tokens/s.
    2. **Calculations:**
       - H100 throughput: 3350 GB/s / 1.5 = 2,233 tokens/s. Needs 45 chips (31.5 kW).
       - MI300X throughput: 5300 GB/s / 1.5 = 3,533 tokens/s. Needs 29 chips (21.75 kW).
    3. **Conclusion & Interpretation:**
       - **Result: MI300X saves ~9.75 kW (31% power reduction) for the same workload. The decoding process is Memory-Bandwidth-Bound.**
