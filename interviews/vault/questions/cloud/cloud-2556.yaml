title: Cloud Zero Optimizations L3 0
scenario: You want to train a 30B parameter model using AdamW on 8 A100 80GB GPUs. Calculate the per-GPU
  memory for ZeRO Stage 1, 2, and 3 and determine which stage is the minimum needed to fit.
question: "For a 30B AdamW model on 8 A100 80GB GPUs, what is per-GPU memory under ZeRO Stages 1, 2, and 3, and which stage fits?"
details:
  realistic_solution: '30B params. Per-param memory: FP16 params = 2B, FP16 gradients = 2B, AdamW optimizer
    states (FP32 copy + momentum + variance) = 12B. Total = 16 bytes/param × 30B = 480 GB. No ZeRO: 480
    GB per GPU — impossible. ZeRO-1 (partition OS): params 60 GB + grads 60 GB + OS 360/8 = 45 GB → 165
    GB per GPU. Still too large. ZeRO-2 (partition OS+G): params 60 GB + (grads+OS)/8 = 420/8 = 52.5 GB
    → 112.5 GB. Still too large. ZeRO-3 (partition all): 480/8 = 60 GB per GPU. Fits in 80 GB with 20
    GB for activations. Need ZeRO-3 minimum.'
  common_mistake: Forgetting optimizer states dominate memory. For AdamW, optimizer states are 12B/param
    vs. 2B/param for weights — 6x more. ZeRO-1 (partitioning only OS) often provides the biggest single-stage
    memory reduction.
  napkin_math: '30B × 16 bytes = 480 GB total. 8 GPUs × 80 GB = 640 GB cluster memory. ZeRO-1: 165 GB/GPU
    — no. ZeRO-2: 112.5 GB/GPU — no. ZeRO-3: 60 GB/GPU — fits with 20 GB headroom for activations.'
