title: Cloud Zero Optimizations L3 0
scenario: You want to train a 30B parameter model using AdamW on 8 A100 80GB GPUs.
question: "For a 30B AdamW model on 8 A100 80GB GPUs, what is per-GPU memory under ZeRO Stages 1, 2, and 3, and which stage is the minimum needed to fit?"
details:
  realistic_solution: '30B params. Per-param memory: FP16 params = 2B, FP16 gradients = 2B, AdamW optimizer states (FP32 copy + momentum + variance) = 12B. Total = 16 bytes/param × 30B = 480 GB. No ZeRO: 480 GB per GPU — impossible. ZeRO-1 (partition OS): params 60 GB + grads 60 GB + OS 360/8 = 45 GB → 165 GB per GPU. Still too large. ZeRO-2 (partition OS+G): params 60 GB + (grads+OS)/8 = 420/8 = 52.5 GB → 112.5 GB. Still too large. ZeRO-3 (partition all): 480/8 = 60 GB per GPU. Fits in 80 GB with 20 GB for activations. Need ZeRO-3 minimum.'
  common_mistake: |
    **The Pitfall:** Forgetting that optimizer states dominate memory consumption during training.
    **The Rationale:** Candidates calculate memory purely based on model weights (2 bytes/param for FP16), missing the massive overhead of AdamW momentum and variance.
    **The Consequence:** The training job OOMs instantly because the cluster is drastically under-provisioned for the required 12 bytes/param optimizer footprint.
  napkin_math: |
    1. Memory per parameter: FP16 Weight (2B) + FP16 Gradient (2B) + AdamW FP32 Copy/Mom/Var (12B) = 16 bytes/param.
    2. Total memory needed: 30B params * 16 bytes/param = 480 GB.
    3. ZeRO-1 (Partitions Optimizer States): Weights (60) + Grads (60) + OS (360 / 8) = 165 GB/GPU (OOM on 80GB).
    4. ZeRO-2 (Partitions OS + Gradients): Weights (60) + Grads (60 / 8) + OS (360 / 8) = 112.5 GB/GPU (OOM on 80GB).
    5. ZeRO-3 (Partitions All): Total (480 / 8) = 60 GB/GPU.
    **ZeRO-3 requires 60 GB per GPU, easily fitting into the 80 GB A100 limit with 20 GB remaining for activations.**
