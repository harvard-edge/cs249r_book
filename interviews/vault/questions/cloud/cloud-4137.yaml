title: MIG Partitioning in Kubernetes
scenario: You have a Kubernetes node with 4 GPUs (80GB each) and want to expose MIG partitions as schedulable resources. Each GPU should be split into 3g.40gb instances.
question: How would you configure MIG on the node and have pods request the specific 3g.40gb partitions?
details:
  realistic_solution: 'Setup: (1) Enable MIG on each GPU: nvidia-smi -i 0,1,2,3 -mig 1 (requires GPU reset). (2) Create MIG instances: nvidia-smi mig -i 0 -cgi 9,9 -C (creates 2× 3g.40gb GPU instances per GPU). Repeat for GPUs 1-3. Total: 8 MIG instances. (3) Configure the NVIDIA device plugin with MIG strategy: ''single'' strategy (all MIG instances on a node must be the same profile) or ''mixed'' strategy (different profiles per GPU). For this case, use ''single'' with MIG_STRATEGY=single in the device plugin DaemonSet. (4) The device plugin discovers MIG instances and registers them as nvidia.com/gpu resources (in single strategy) or nvidia.com/mig-3g.40gb (in mixed strategy). (5) Pod spec: resources.limits: nvidia.com/mig-3g.40gb: 1 requests one MIG partition. The container sees a single GPU device with 40 GB memory and 3/7 compute capacity. Kubernetes RBAC can enforce which namespaces can request which MIG profiles. Operational consideration: changing MIG profiles requires draining the node, resetting GPUs, and reconfiguring — not dynamic. Plan MIG profiles based on workload mix.'
  common_mistake: |
    **The Pitfall:** Assuming standard `nvidia.com/gpu` resource requests work dynamically with MIG without configuring device plugins.
    **The Rationale:** Engineers accustomed to simple GPU pass-through assume Kubernetes naturally understands sub-GPU partitioning.
    **The Consequence:** Pods fail to schedule because MIG instances are exposed as different resource types (e.g., `nvidia.com/mig-3g.40gb`), requiring specific device plugin configurations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 GPUs, 80GB each.
       - Partition target: 3g.40gb (40GB memory, 3/7 compute).
    2. **Calculations:**
       - Slices per GPU: 80GB / 40GB = 2 partitions per GPU.
       - Total Instances: 4 GPUs * 2 = 8 instances.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Allocation. Node capacity doubles to 8 pods with strict hardware isolation.**
