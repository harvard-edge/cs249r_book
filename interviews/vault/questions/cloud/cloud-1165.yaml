title: Dynamic Batching Delay Calculation
scenario: You are configuring a dynamic batcher (e.g., Triton) for a BERT-based text classifier on an
  NVIDIA T4 GPU. The strict server-side latency SLA is 50ms. Profiling shows the model's forward pass
  execution time scales linearly with batch size 'b' as T(b) = 15ms + (1.5ms * b). You require a minimum
  'max_batch_delay' window of 10ms to effectively absorb traffic micro-bursts before forcing the batch
  to execute. Calculate the theoretical maximum 'max_batch_size' that safely guarantees the 50ms SLA for
  the oldest request in the queue.
details:
  realistic_solution: The worst-case latency for a request is the maximum queue wait time plus the execution
    time of the full batch. Subtracting the 10ms delay from the 50ms SLA leaves a 40ms budget for execution.
    Solving 15 + 1.5b <= 40 yields a maximum integer batch size of 16.
  common_mistake: Ignoring the dynamic batching wait time in the SLA budget. Candidates often calculate
    the batch size that takes 50ms to execute, forgetting the first request in the batch has already waited
    10ms in the queue.
  napkin_math: 'Worst_Case_Latency = max_batch_delay + T(max_batch_size)

    50ms >= 10ms + (15ms + 1.5ms * b)

    40ms >= 15ms + 1.5ms * b

    25ms >= 1.5ms * b

    b <= 25 / 1.5

    b <= 16.66...

    Floor to nearest integer: b = 16.

    Verification: 10ms (wait) + 15ms (fixed) + 24ms (variable) = 49ms <= 50ms SLA.'
