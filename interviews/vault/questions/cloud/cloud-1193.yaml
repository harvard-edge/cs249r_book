title: Diagnosing ECMP Hash Collisions
scenario: You are debugging a distributed training job for a 175B parameter LLM across 1024 A100 GPUs
  using a non-blocking fat-tree (Clos) network with 400Gbps links. Monitoring shows overall network utilization
  is only around 30-40%, but NCCL AllReduce operations frequently timeout or experience severe tail latency
  (P99 > 5x P50). Standard flow-based ECMP (Equal-Cost Multi-Path) routing is enabled on all switches.
  What is the root cause of this bottleneck?
question: "What is the root cause of this bottleneck?"
details:
  realistic_solution: Identify that 5-tuple ECMP hashing maps multiple 400Gbps elephant flows onto the
    same physical spine links, causing hash collisions and congestion while other links sit completely
    idle. The solution is to replace standard flow-based ECMP with Adaptive Routing, packet-level spraying,
    or deploy a rail-optimized network topology to ensure deterministic load balancing.
  common_mistake: Assuming the network is structurally oversubscribed or blaming endpoint CPU overhead,
    while failing to recognize that ML traffic generates massive, persistent 'elephant flows' that defeat
    standard ECMP hashing.
  napkin_math: If 2 massive elephant flows are hashed across a 4-way ECMP group, the probability they
    collide on the same link is 1/4 (25%). When they collide, a 400Gbps link is split, granting each flow
    200Gbps. Because AllReduce is perfectly synchronous, the entire cluster's communication step slows
    down to the 200Gbps bottleneck. The 3 remaining links (1200Gbps capacity) sit idle, resulting in a
    massive utilization drop despite having strictly non-blocking capacity.
