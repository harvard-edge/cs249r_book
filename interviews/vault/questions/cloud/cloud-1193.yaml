title: Diagnosing ECMP Hash Collisions
scenario: You debug a distributed training job for a 175B LLM across 1024 GPUs on a non-blocking fat-tree network. Overall network utilization is 30-40%, but NCCL AllReduce operations frequently timeout or experience severe tail latency (P99 > 5x P50). Standard flow-based ECMP routing is enabled.
question: What is the root cause of this bottleneck?
details:
  realistic_solution: 'Standard flow-based ECMP hashing maps multiple massive ML ''elephant flows'' onto the same physical links, causing hash collisions and local congestion while other links sit idle. Fix: Use Adaptive Routing or packet-level spraying.'
  common_mistake: |
    **The Pitfall:** Assuming the network is structurally oversubscribed or blaming endpoint CPUs.
    **The Rationale:** Engineers fail to recognize that ML traffic generates massive, persistent elephant flows that defeat standard ECMP load balancing.
    **The Consequence:** Endless debugging of node performance while the network drops packets due to hash collisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4-way ECMP routing group on 400 Gbps links.
       - Synchronous AllReduce creates massive flows.
    2. **Calculations:**
       - Probability of 2 elephant flows colliding = 1/4 (25%).
       - Collided link splits bandwidth: 400 Gbps / 2 = 200 Gbps per flow.
       - Synchronous step stalls to match the 200 Gbps bottleneck, while 1200 Gbps sits idle.
    3. **Conclusion & Interpretation:**
       - **Result: Topology-Bound (ECMP hash collisions cause severe tail latency in synchronous workloads).**
