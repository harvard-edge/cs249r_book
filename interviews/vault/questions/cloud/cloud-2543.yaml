title: Cloud Warp Divergence L2 0
scenario: A GPU kernel for a mixture-of-experts model routes different tokens to different expert networks within the same warp. Performance is 3x worse than expected.
question: What is warp divergence, and why would routing tokens to different MoE experts within one warp cause a 3x slowdown?
details:
  realistic_solution: 'In NVIDIA''s SIMT model, 32 threads execute in lockstep as a warp. When an if-else branch occurs, all threads that take the ''if'' path execute first while the ''else'' threads are masked (idle), then the ''else'' threads execute while the ''if'' threads are masked. If a warp has threads routed to 3 different experts, all 3 code paths execute sequentially — the warp takes 3x as long as a non-divergent warp. Effective utilization drops to 1/3.'
  common_mistake: |
    **The Pitfall:** Assuming the GPU can parallelize or skip untaken branches like a CPU branch predictor.
    **The Rationale:** Candidates apply CPU-centric instruction-level parallelism logic to GPU SIMT execution models.
    **The Consequence:** Writing poorly optimized kernels that suffer massive performance degradation due to serialized warp execution on divergent paths.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Warp Size: 32 threads.
       - Tokens are routed to 3 distinct experts within the same warp.
    2. **Calculations:**
       - Divergent Paths: 3 distinct branches are taken by the threads.
       - Sequential Execution: The SIMT model forces the GPU to execute each branch sequentially while masking inactive threads.
       - Utilization Drop: The warp takes 3x longer to complete.
       - Effective Occupancy: Only 32 / 3 ≈ 11 threads are active at any given time.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Divergence).** Divergent routing causes sequential execution within the warp, plummeting utilization to ~33% and causing the 3x slowdown.
