title: Cloud Warp Divergence L2 0
scenario: A GPU kernel for a mixture-of-experts model routes different tokens to different expert networks
  within the same warp. Performance is 3x worse than expected. Explain warp divergence and why it causes
  this slowdown.
details:
  realistic_solution: 'In NVIDIA''s SIMT model, 32 threads execute in lockstep as a warp. When an if-else
    branch occurs, all threads that take the ''if'' path execute first while the ''else'' threads are
    masked (idle), then the ''else'' threads execute while the ''if'' threads are masked. If a warp has
    threads routed to 3 different experts, all 3 code paths execute sequentially — the warp takes 3x as
    long as a non-divergent warp. Effective utilization drops to 1/3. This is warp divergence: serial
    execution of divergent paths within a SIMD group.'
  common_mistake: Thinking the GPU skips the branch not taken. Both (or all) branches execute — threads
    on the 'wrong' branch are masked but still consume a cycle. The warp completes in time proportional
    to the sum of all branch execution times.
  napkin_math: '32 threads per warp. If 3 branches taken: each branch runs sequentially. Worst case: 32
    unique branches → 32x slowdown (all serial). MoE with 3 experts per warp: 3x slowdown. Effective occupancy:
    32 threads but only ~11 active at any time.'
