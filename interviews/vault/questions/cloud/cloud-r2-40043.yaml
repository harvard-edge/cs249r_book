title: Gradient Synchronization for FSDP with Activation Checkpointing
scenario: You are specifying the gradient synchronization strategy for FSDP (Fully Sharded Data Parallelism)
  training a 65B LLM on 256 H100s with activation checkpointing. FSDP shards parameters across GPUs and
  requires all-gather before each layer's forward/backward and reduce-scatter after each layer's backward.
  Activation checkpointing means the forward pass runs twice (once for forward, once to recompute activations
  during backward). Specify the total communication volume and scheduling constraints.
details:
  realistic_solution: 'With activation checkpointing: 4L = 4×80 = 320 collectives total (1L forward all-gathers
    + 1L recompute + 1L backward all-gathers + 1L reduce-scatters). 400 collectives = 5L is incorrect.'
  common_mistake: 'Forgetting that activation checkpointing doubles the forward-pass all-gather operations.
    Without checkpointing, FSDP does L all-gathers in forward + L all-gathers and L reduce-scatters in
    backward = 3L collectives. With checkpointing: 2L all-gathers in forward + L all-gathers and L reduce-scatters
    in backward = 4L collectives.'
  napkin_math: 'Without checkpointing: 3L = 240 collectives (L=80), 388.5GB total, 0.97s. With checkpointing:
    forward (L=80 all-gathers) + backward (L=80 all-gathers for recompute + L=80 all-gathers for backward
    + L=80 reduce-scatters) = 1L + 3L = 4L = 320 collectives (not 400 — 4×80=320, not 5×80=400). Total
    volume: 320 × 1.619GB = 518GB. Time: 518/400GB/s = 1.295s. Note: 400 collectives would be 5L, not
    4L with activation checkpointing.'
