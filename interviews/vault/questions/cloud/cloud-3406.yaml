title: H100 Memory Optimization for IO-Aware Attention
scenario: 'You are tasked with optimizing the attention mechanism for a large language
  model on an NVIDIA H100 GPU (80 GB HBM3, 3.35 TB/s memory bandwidth, 989 TFLOPS
  FP16 dense). The model uses a head dimension `d_k = 128` and float16 precision.


  1.  **Memory Limit for Standard Attention**: Calculate the maximum sequence length
  `N` that can be processed by a standard (non-tiled) attention mechanism, assuming
  Q, K, V, and the full N x N attention matrix must all reside in HBM. Show your calculation.

  2.  **FlashAttention Memory Footprint Formula**: Explain how FlashAttention''s tiling
  strategy and online softmax enable processing significantly longer sequences. Derive
  a formula for the HBM memory footprint of FlashAttention, assuming Q, K, V, and
  the output `O` (all `N x d_k`) are stored in HBM, and all intermediate attention
  calculations (like the `N x N` attention matrix) are handled in SRAM without being
  written to HBM. Your formula should be in terms of `N`, `d_k`, and data type size
  (`S_type`).

  3.  **Bandwidth Impact**: Briefly explain how this memory efficiency translates
  to improved throughput on the H100, considering its HBM3 bandwidth.'
question: How would you compute the H100 standard-attention sequence limit, derive
  FlashAttention's HBM footprint, and explain the bandwidth gain?
details:
  realistic_solution: Implement FlashAttention-style tiling where queries and keys
    are loaded in blocks (tiles) into fast on-chip SRAM. The attention scores for
    these blocks are computed, scaled, and then accumulated. The online softmax algorithm
    processes the softmax row by row, avoiding the need to materialize the full N
    x N attention matrix in HBM, thereby reducing memory bandwidth usage and HBM capacity
    requirements significantly. This involves recomputing certain terms (like the
    maximum and sum) during the pass to avoid storing intermediate values in HBM.
  common_mistake: A common mistake is assuming the entire attention matrix (N x N)
    can reside in SRAM or that standard attention can scale to very long sequences
    without hitting HBM capacity or bandwidth limits, ignoring the need for on-chip
    memory management and recomputation. Overlooking the quadratic memory scaling
    of the attention matrix and the linear scaling of Q, K, V.
  napkin_math: "1.  **Max N for Standard Attention**:\n    -   Memory for Q, K, V:\
    \ `3 * N * d_k * S_type`\n    -   Memory for Attention Matrix: `N * N * S_type`\n\
    \    -   Total HBM memory: `(3 * N * d_k + N * N) * S_type`\n    -   Given `S_type\
    \ = 2` bytes (float16) and HBM capacity = `80 * 1024^3` bytes (`85,899,345,920`\
    \ bytes):\n        `(3 * N * 128 + N^2) * 2 <= 85,899,345,920`\n        `2N^2\
    \ + 768N <= 85,899,345,920`\n        `N^2 + 384N - 42,949,672,960 <= 0`\n    -\
    \   Solving for `N` (positive root): `N ≈ 207,051`.\n\n2.  **FlashAttention HBM\
    \ Memory Footprint Formula**:\n    -   With tiling and online softmax, the full\
    \ attention matrix is not materialized in HBM. Intermediate attention calculations\
    \ are performed in SRAM.\n    -   HBM primarily stores the input Q, K, V, and\
    \ the final output `O`.\n    -   HBM Memory Footprint: `4 * N * d_k * S_type`\
    \ (for Q, K, V, O).\n    -   For `d_k = 128` and `S_type = 2` bytes: `4 * N *\
    \ 128 * 2 = 1024N` bytes. This is `O(N)` memory usage.\n\n3.  **Bandwidth Impact**:\n\
    \    -   Standard attention's `O(N^2)` memory access pattern for the attention\
    \ matrix leads to high HBM bandwidth consumption, potentially bottlenecking the\
    \ 3.35 TB/s HBM3. Data movement can become the limiting factor.\n    -   FlashAttention\
    \ significantly reduces HBM traffic from `O(N^2)` to `O(N * d_k)` by performing\
    \ the attention matrix operations in high-bandwidth, low-latency SRAM. This frees\
    \ up HBM3 bandwidth, allowing the H100's computational units to be better utilized,\
    \ leading to higher throughput and reduced training times."
