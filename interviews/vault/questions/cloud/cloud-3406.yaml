title: H100 Memory Optimization for IO-Aware Attention
scenario: You are tasked with optimizing the attention mechanism for a large language model on an NVIDIA H100 GPU. The model uses a head dimension `d_k = 128` and float16 precision.
question: How would you compute the H100 standard-attention sequence limit, derive FlashAttention's HBM footprint, and explain the bandwidth gain?
details:
  realistic_solution: Implement FlashAttention-style tiling where queries and keys are loaded in blocks into SRAM, and compute online softmax to avoid materializing the full N x N attention matrix in HBM.
  common_mistake: |
    **The Pitfall:** Assuming standard attention can scale to very long sequences without hitting HBM capacity or bandwidth limits.
    **The Rationale:** Overlooking the O(N^2) quadratic memory scaling of the attention matrix compared to the linear scaling of Q, K, V.
    **The Consequence:** Severe memory bottlenecks and OOM errors when processing long context windows.
  napkin_math: |
    1. **Calculate Max N for Standard Attention:** Total HBM memory = $(3 × N × 128 + N^2) × 2 ≤ 85,899,345,920$. Solving $2N^2 + 768N ≤ 85.9$B gives $N ≈ 207,051$.
    2. **Derive FlashAttention Footprint:** Memory Footprint = $4 × N × d_k × S_{type}$ = $4 × N × 128 × 2 = 1024N$ bytes (O(N) usage).
    3. **Calculate Bandwidth Impact:** Standard attention consumes O(N^2) bandwidth. FlashAttention reduces this to O(N × d_k) by keeping intermediate matrices in SRAM.
    **Final Result: Standard attention is limited to N ≈ 207K, while FlashAttention achieves O(N) memory footprint and alleviates the O(N^2) bandwidth bottleneck.**
