title: JSON Serialization Overhead in Batch APIs
scenario: A cloud-based real-time recommendation API built on FastAPI receives batch scoring requests. Each request contains user features and 500 candidate item embeddings (each a 512-dimensional float32 vector). The payloads are sent as JSON over HTTP/1.1. The model inference on an NVIDIA T4 GPU takes only 3ms. However, monitoring shows the API container's CPU is pegged at 100% and P50 latency is over 30ms.
question: What serialization overhead does JSON add versus Protobuf for 500 candidate 512-dim float32 embeddings, and how would latency change?
details:
  realistic_solution: Switch the API from JSON over HTTP to a binary protocol like gRPC with Protobuf, or use a zero-copy format like FlatBuffers. This avoids expensive string-to-float conversions and significantly reduces CPU parsing time.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is network bandwidth or GPU utilization.
    **The Rationale:** Candidates often overlook the CPU time required to parse large text-based JSON arrays into machine-native float arrays.
    **The Consequence:** Proposing hardware upgrades instead of fixing the inefficient serialization protocol.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 items * 512 floats = 256,000 floats.
    2. **Calculations:**
       - JSON: ~2.5MB, parse at 100MB/s = 25ms.
       - Protobuf: ~1MB, parse at 500MB/s = 2ms.
       - Expected latency drops from ~28ms to ~5ms.
    3. **Conclusion & Interpretation:**
       - **Result: 82% latency reduction. CPU parse time is the bottleneck.**
