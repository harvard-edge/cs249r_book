title: JSON Serialization Overhead in Batch APIs
scenario: A cloud-based real-time recommendation API built on FastAPI receives batch scoring requests.
  Each request contains user features and 500 candidate item embeddings (each a 512-dimensional float32
  vector). The payloads are sent as JSON over HTTP/1.1. The model inference on an NVIDIA T4 GPU takes
  only 3ms. However, monitoring shows the API container's CPU is pegged at 100% and P50 latency is over
  30ms. Calculate the serialization overhead for JSON versus a binary protocol like gRPC/Protobuf, and
  determine the expected latency improvement.
details:
  realistic_solution: Switch the API from JSON over HTTP to a binary protocol like gRPC with Protobuf,
    or use a zero-copy format like FlatBuffers. This avoids expensive string-to-float conversions and
    significantly reduces CPU parsing time.
  common_mistake: Assuming the bottleneck is network bandwidth or GPU utilization without calculating
    the CPU time required to parse large text-based JSON arrays into machine-native float arrays.
  napkin_math: 'Payload: 500 items * 512 floats = 256,000 floats. JSON size: ~2.5MB (~10 bytes/float).
    Python JSON parse at ~100MB/s = 25ms overhead. Protobuf size: ~1MB (4 bytes/float). Protobuf parse
    at ~500MB/s = 2ms overhead. Expected end-to-end latency drops from ~28ms (25ms parse + 3ms infer)
    to ~5ms (2ms parse + 3ms infer), an 82% reduction.'
