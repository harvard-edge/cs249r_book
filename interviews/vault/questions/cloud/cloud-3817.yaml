title: MoE Serving with Expert Caching
scenario: You serve a large MoE model (64 experts, top-2) where most conversations activate only 12-15 unique experts across all tokens.
question: How would you design a GPU expert cache for a 64-expert top-2 MoE when most conversations activate only 12-15 experts?
details:
  realistic_solution: 'Implement an LFU (Least Frequently Used) expert cache with asynchronous PCIe prefetching. Partition the MI300X VRAM to dedicate ~80 GB for an INT8 expert cache. Track per-expert activation frequency. Maintain a shadow predictor running 2-3 layers ahead of the current MoE layer to trigger PCIe transfers for missing experts, masking the 98ms PCIe Gen5 latency. If a cache miss occurs and prefetch is incomplete, fallback to the nearest cached expert via cosine similarity on router logits.'
  common_mistake: |
    **The Pitfall:** Using a simple LRU (Least Recently Used) cache for experts.
    **The Rationale:** LRU is the default caching strategy in standard software engineering.
    **The Consequence:** Expert popularity follows a power-law distribution. LRU thrashes under this distribution, driving massive PCIe bandwidth saturation and latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 64 experts * 12.5 GB = 800 GB total (FP16).
       - VRAM Allocation: 80 GB dedicated for expert cache.
       - Precision: INT8 cache (6.25 GB/expert).
    2. **Calculations:**
       - Cache Capacity: 80 GB / 6.25 GB = ~12 experts.
       - PCIe Miss Penalty: 6.25 GB / 64 GB/s (PCIe 5.0) = ~98ms.
       - Average Penalty (90% hit rate): 0.1 * 98ms = 9.8ms/token.
    3. **Conclusion & Interpretation:**
       - **The 9.8ms average penalty keeps latency well within an interactive 50ms/token target. Result: PCIe-Bandwidth Bound.**
