title: Bottleneck Analysis in Python REST/JSON Serving
scenario: 'A deep learning recommendation model is deployed on an AWS instance using a Python FastAPI server receiving REST/JSON requests. Each request contains a batch of 1024 dense feature vectors. The raw ONNX model inference time is benchmarked at 5ms per batch. However, profiling reveals the end-to-end P99 latency is consistently exceeding 35ms under moderate load, and the inference engine accounts for less than 15% of total CPU cycles.'
question: 'Why is P99 latency over 35ms when ONNX inference is 5ms, and what mitigation would you propose?'
details:
  realistic_solution: 'The root cause is the serialization overhead of parsing a 2.5MB JSON string and converting nested Python lists into a contiguous NumPy array. The Python Global Interpreter Lock (GIL) and strict string parsing dominate the CPU time. Migrate to gRPC using Protobuf or FlatBuffers, or use a dedicated high-performance model server (like Triton or TF Serving) passing raw tensor bytes to bypass string parsing completely.'
  common_mistake: |
    **The Pitfall:** Blaming network latency or the ONNX inference engine configuration.
    **The Rationale:** Engineers assume that if the ML model is fast, any slowdowns must be external network issues or multi-threading bugs within the engine.
    **The Consequence:** They waste time tweaking inference parameters without realizing the massive time sink is Python's inherently slow string parsing and data structure conversion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 1024 vectors * 256 floats = 262,144 floats.
       * JSON string representation ≈ 10 bytes per float.
       * ONNX inference time = 5ms.
    2. **Calculations:**
       * Payload size: 262,144 * 10 ≈ 2.6 MB.
       * Python JSON parsing + list-to-NumPy conversion takes ~25ms-30ms.
       * Total latency: 5ms (inference) + 30ms (parsing) = 35ms.
    3. **Conclusion & Interpretation:**
       * **Result: CPU-Bound by serialization; parsing overhead dominates actual ML inference by 5x.**
