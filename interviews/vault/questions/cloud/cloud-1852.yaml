title: Bottleneck Analysis in Python REST/JSON Serving
scenario: 'A deep learning recommendation model is deployed on an AWS instance using a Python FastAPI server receiving REST/JSON requests. Each request contains a batch of 1024 dense feature vectors (float32, dimension 256). The raw ONNX model inference time is benchmarked at 5ms per batch. However, profiling reveals the end-to-end P99 latency is consistently exceeding 35ms under moderate load, and the inference engine accounts for less than 15% of total CPU cycles.'
question: 'Why is P99 latency over 35ms when ONNX inference is 5ms, and what mitigation would you propose?'
details:
  realistic_solution: 'The root cause is the serialization overhead of parsing a 2.5MB JSON string and converting nested Python lists into a contiguous NumPy array. Migrate to gRPC using Protobuf or FlatBuffers, or use a dedicated model server passing raw tensor bytes.'
  common_mistake: |
    **The Pitfall:** Blaming network latency or the ONNX inference engine configuration.
    **The Rationale:** Engineers assume that if the ML model is fast, any slowdowns must be external network issues or multi-threading bugs within the engine.
    **The Consequence:** They waste time tweaking inference parameters without realizing the massive time sink is Python's inherently slow string parsing and data structure conversion.
  napkin_math: |
    * **Payload size:** 1024 vectors * 256 floats = 262,144 floats.
    * **JSON footprint:** At ~10 bytes per float, the JSON payload is ~2.5MB.
    * **Parsing time:** Python JSON parsing + list-to-NumPy conversion for 262k elements takes ~25ms.
    * **Inference time:** 5ms.
    * **Conclusion:** Parsing overhead dominates actual ML inference by **5x**.
