title: Cloud-Edge Cascade for Retail Analytics
scenario: You manage 50,000 retail security cameras (10 cameras/store, 5,000 stores). Currently, all video streams to the cloud for ViT model inference. Cloud compute is $0.02/hour per stream. The store ISP uplink costs $50/month per store. You have a $300 capital budget per store for edge hardware.
question: How would you architect a cloud-edge cascade to minimize 3-year TCO while maintaining >95% recall?
details:
  realistic_solution: Implement a Cloud-Edge Cascade architecture. Install a cheap edge device (e.g., RK3588 or Jetson Nano) within the $300 budget. Deploy a highly quantized (INT8) lightweight CNN (e.g., YOLOv8n) on the edge NPU strictly for motion and person detection. The edge device only crops bounding boxes of people and sends these low-resolution, low-framerate (e.g., 2 FPS) crops to the cloud ViT model for complex behavioral analysis. This drastically reduces the ISP uplink requirement to a basic tier and cuts cloud compute by >90% because the cloud model only processes active human crops rather than continuous empty 1080p frames.
  common_mistake: |
    **The Pitfall:** Deploying the full ViT model to the edge device.
    **The Rationale:** Attempting to eliminate cloud costs entirely without considering hardware constraints.
    **The Consequence:** Requiring expensive edge GPUs ($1000+) that drastically exceed the $300 per-store budget.
  napkin_math: |
    - Current Cloud Compute: 50,000 streams × 24 hrs × $0.02 = $24,000/day = $8.76M/year.
    - Current ISP Cost: 5,000 stores × $50/month × 12 = $3.0M/year.
    - Current Total 1-year TCO: $11.76M.
    - Cascade Architecture: Edge filters 90% of frames. Cloud compute drops to $876k/year.
    - Cascade ISP: Bandwidth drops to a $20/month tier = $1.2M/year.
    - Cascade Hardware Cost: 5,000 stores × $300 = $1.5M (one-time).
    - **Cascade Year 1 TCO drops to $3.57M, saving millions over 3 years.**
