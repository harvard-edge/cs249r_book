title: The Offline-Online Metric Gap
scenario: Your recommendation model achieves a 15% improvement in AUC on your offline evaluation set. After deploying to 5% of production traffic via A/B test, click-through rate (CTR) actually drops by 2%. The model is clearly 'better' offline but 'worse' online.
question: "What are the three most likely causes of this offline-online metric gap?"
details:
  realistic_solution: 'Three primary causes: (1) Distribution shift between offline eval data (historical, static) and online traffic (current, evolving). User behavior changes, and the offline set may not reflect recent trends. (2) Feedback loops: the current production model influences which items users see, biasing the training data. The new model makes different recommendations, encountering regions of the feature space where training data is sparse. (3) Serving-time feature skew: features computed at training time (batch, exact) differ from features at serving time (real-time, approximate). A feature that is highly predictive offline may have stale values online.'
  common_mistake: |
    **The Pitfall:** Assuming the A/B test infrastructure is flawed or that AUC is the wrong metric.
    **The Rationale:** Trusting static offline metrics unconditionally.
    **The Consequence:** Chasing phantom bugs in the serving stack instead of recognizing the structural data distribution shift between offline history and live traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Offline dataset age: 30 days.
       - User preference half-life: 14 days.
    2. **Calculations:**
       - Signal Decay = 1 - (0.5)^(30/14) = 1 - 0.226 = 77.4% decayed.
    3. **Conclusion & Interpretation:**
       - **Result: 77.4% Signal Decay (Distribution-Shift-Bound).** The +15% AUC was optimizing for a completely stale distribution; online users have moved on, degrading live CTR.
