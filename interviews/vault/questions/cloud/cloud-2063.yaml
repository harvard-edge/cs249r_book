title: The Offline-Online Metric Gap
scenario: Your recommendation model achieves a 15% improvement in AUC on your offline evaluation set.
  After deploying to 5% of production traffic via A/B test, click-through rate (CTR) actually drops by
  2%. The model is clearly 'better' offline but 'worse' online. What are the three most likely causes
  of this offline-online metric gap?
details:
  realistic_solution: 'Three primary causes: (1) Distribution shift between offline eval data (historical,
    static) and online traffic (current, evolving). User behavior changes, and the offline set may not
    reflect recent trends. (2) Feedback loops: the current production model influences which items users
    see, biasing the training data. The new model makes different recommendations, encountering regions
    of the feature space where training data is sparse. (3) Serving-time feature skew: features computed
    at training time (batch, exact) differ from features at serving time (real-time, approximate). A feature
    that is highly predictive offline may have stale values online.'
  common_mistake: 'Assuming the A/B test is flawed or that AUC is the wrong metric. The deeper issue is
    structural: offline evaluation cannot capture the full dynamics of a production system.'
  napkin_math: If the offline evaluation dataset is 30 days old and user preference half-life is 14 days,
    the signal decay is 1 - (0.5)^(30/14) = 1 - 0.226 = 77.4% decayed. The +15% AUC was optimizing for
    a stale distribution. Online, users have moved on, meaning the model's 'improvements' actively degrade
    current CTR.
