title: KV-Cache Optimization on AMD MI300X for Varying Context Lengths
scenario: You are tasked with optimizing an LLM serving system on an AMD MI300X accelerator (192 GB HBM3, 5.3 TB/s memory bandwidth) for a 70B parameter model. The system currently allocates a fixed-size KV-cache per request. With varying context lengths, including frequent 64k token inputs, you observe erratic latency, decreased throughput, and occasional out-of-memory (OOM) errors, despite stable compute utilization.
question: What KV-cache management change would you make on MI300X to avoid OOMs and erratic latency with frequent 64k-token requests?
details:
  realistic_solution: Implement a paged attention scheme to manage the KV cache, dynamically allocating fixed-size blocks of the MI300X's 192 GB HBM3 memory as needed. This reduces fragmentation and allows efficient sharing of KV-cache blocks between requests. Also, employ a suitable cache eviction policy (e.g., LRU) for memory pressure handling and pre-allocate a portion of HBM3 for the block manager.
  common_mistake: |
    **The Pitfall:** Continuing with static memory allocation.
    **The Rationale:** Candidates fail to understand the sheer size of KV caches at long context lengths, assuming standard memory management suffices.
    **The Consequence:** Heavy memory fragmentation and catastrophic OOM crashes under production loads.
  napkin_math: |
    *   **KV Cache per token:** 2 (K+V) × 80 layers × 64 heads × 128 dim × 2 bytes = ~2.62 MB/token.
    *   **64k token context:** 64,000 × 2.62 MB = ~168 GB.
    *   **MI300X Capacity:** 192 GB HBM3.
    *   **Result:** A single 64k request consumes nearly the entire memory (168 GB). Static allocation wastes massive space for shorter contexts, leading immediately to **OOMs**.
