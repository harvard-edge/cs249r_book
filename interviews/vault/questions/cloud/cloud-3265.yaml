title: KV-Cache Optimization on AMD MI300X for Varying Context Lengths
scenario: You are tasked with optimizing an LLM serving system on an AMD MI300X accelerator
  (192 GB HBM3, 5.3 TB/s memory bandwidth) for a 70B parameter model. The system currently
  allocates a fixed-size KV-cache per request. With varying context lengths, including
  frequent 64k token inputs, you observe erratic latency, decreased throughput, and
  occasional out-of-memory (OOM) errors, despite stable compute utilization. Analyze
  and explain *why* these specific performance bottlenecks and OOM errors occur, considering
  the MI300X's memory characteristics and the limitations of the current KV-cache
  strategy.
question: What KV-cache management change would you make on MI300X to avoid OOMs and
  erratic latency with frequent 64k-token requests?
details:
  realistic_solution: Implement a paged attention scheme to manage the KV cache, dynamically
    allocating fixed-size blocks of the MI300X's 192 GB HBM3 memory as needed. This
    reduces fragmentation and allows efficient sharing of KV-cache blocks between
    requests. Also, employ a suitable cache eviction policy (e.g., LRU) for memory
    pressure handling and pre-allocate a portion of HBM3 for the block manager.
  common_mistake: Using static, fixed-size KV-cache allocation without considering
    the dynamic nature of context lengths, leading to HBM3 fragmentation, wasted memory
    for short contexts, and OOMs for very long ones. Not implementing paged attention
    to efficiently utilize the MI300X's 192 GB HBM3.
  napkin_math: A 70B parameter model's KV cache (FP16) can consume approximately 2.62
    MB/token for a model with 80 layers, 64 heads, and head_dim 128 (e.g., 2 * 80
    * 64 * 128 * 2 bytes = 2.62 MB/token). For a 64k token context, this is roughly
    168 GB. The AMD MI300X's 192 GB HBM3 can barely fit one such context fully if
    fixed. Paged attention allows multiple concurrent requests by efficiently sharing
    and packing these fixed-size blocks, significantly increasing effective capacity
    compared to naive allocation.
