title: KV-Cache Optimization on AMD MI300X for Varying Context Lengths
scenario: You are tasked with optimizing an LLM serving system on an AMD accelerator for a 70B parameter model. The system currently allocates a fixed-size KV-cache per request. With varying context lengths, including frequent 64k token inputs, you observe erratic latency, decreased throughput, and occasional out-of-memory (OOM) errors, despite stable compute utilization.
question: What KV-cache management change would you make to avoid OOMs and erratic latency with frequent 64k-token requests?
details:
  realistic_solution: 'Implement a paged attention scheme to manage the KV cache, dynamically allocating fixed-size blocks of HBM memory as needed. This reduces fragmentation and allows efficient sharing of KV-cache blocks between requests.'
  common_mistake: |
    **The Pitfall:** Continuing with static memory allocation.
    **The Rationale:** Candidates fail to understand the sheer size of KV caches at long context lengths, assuming standard memory management suffices.
    **The Consequence:** Heavy memory fragmentation and catastrophic OOM crashes under production loads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache per token: 2.62 MB/token.
       - Context length: 64k tokens.
       - Memory Capacity: 192 GB HBM3.
    2. **Calculations:**
       - 64k token context KV size: 64,000 x 2.62 MB = ~168 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. A single 64k request consumes nearly the entire memory (168 GB), causing immediate OOMs under static allocation.**
