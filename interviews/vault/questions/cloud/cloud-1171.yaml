title: Dynamic Batching Timeout Trade-offs
scenario: You are designing a dynamic inference service for a vision API on a GPU. The customer SLA mandates a strict 100ms P99 latency limit. Pre/post-processing and network I/O take a fixed 20ms per request. Model execution takes 10ms for batch size 1, 30ms for batch size 8, and 50ms for batch size 16. To maximize throughput under bursty traffic, a platform engineer proposes a dynamic batching configuration with a max_batch_size of 16 and a batch_timeout of 60ms.
question: Does max_batch_size 16 with a 60ms batch_timeout satisfy the 100ms P99 SLA, and what timeout would be safe?
details:
  realistic_solution: 'The proposal will predictably violate the P99 SLA. The first request in a partially filled batch waits the full timeout, then incurs the longest possible compute time. The correct design sets the timeout to strictly satisfy the worst-case boundary: Timeout = Target SLA - Overhead - Compute(Max Batch).'
  common_mistake: |
    **The Pitfall:** Using average queue wait times instead of worst-case boundaries.
    **The Rationale:** Candidates assume the timeout only affects edge cases or look only at the execution time, ignoring the request that waits the full timeout and then pays the max-batch compute penalty.
    **The Consequence:** The proposed dynamic batching configuration violates the P99 SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max SLA: 100ms.
    - Overhead: 20ms.
    - Max compute (batch 16): 50ms.

    **Calculations:**
    - Proposed worst-case: 60ms (wait) + 50ms (compute) + 20ms (overhead) = 130ms (>100ms SLA).
    - Correct Formula: Timeout = SLA - Overhead - Compute(Max Batch) = 100 - 20 - 50 = 30ms.

    **Conclusion & Interpretation:**
    - **Result: 30ms (Latency-Bound)**. The proposed 60ms timeout fails the SLA. The maximum safe timeout is 30ms.
