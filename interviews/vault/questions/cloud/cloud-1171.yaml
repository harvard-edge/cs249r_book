title: Dynamic Batching Timeout Trade-offs
scenario: You are designing a dynamic inference service for a vision API on an NVIDIA T4 GPU. The customer
  SLA mandates a strict 100ms P99 latency limit. Pre/post-processing and network I/O take a fixed 20ms
  per request. Model execution takes 10ms for batch size 1, 30ms for batch size 8, and 50ms for batch
  size 16. To maximize throughput under bursty traffic, a platform engineer proposes a dynamic batching
  configuration with a max_batch_size of 16 and a batch_timeout of 60ms. Evaluate this proposal and determine
  if it satisfies the production SLA constraints.
question: "Does max_batch_size 16 with a 60ms batch_timeout satisfy the 100ms P99 SLA, and what timeout would be safe?"
details:
  realistic_solution: 'The proposal will predictably violate the P99 SLA. The first request in a partially
    filled batch waits the full timeout, then incurs the longest possible compute time. The correct design
    sets the timeout to strictly satisfy the worst-case boundary: Timeout = Target SLA - Overhead - Compute(Max
    Batch). For a max batch size of 16, the timeout must not exceed 30ms.'
  common_mistake: Candidates often assume the average queue wait time or only look at compute execution
    time, failing to calculate the worst-case request lifecycle where the first request in the queue waits
    the entire timeout period and then experiences the maximum batch execution time.
  napkin_math: Proposed worst-case latency = 60ms (timeout wait) + 50ms (batch 16 compute) + 20ms (I/O
    overhead) = 130ms (> 100ms SLA). Correct Max Timeout = 100ms (SLA) - 20ms (overhead) - 50ms (compute)
    = 30ms.
