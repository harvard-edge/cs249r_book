title: Diagnosing Stragglers in Multi-Node TP Fabrics
scenario: You are scaling a 175B parameter model training job across 32 DGX A100 nodes (256 GPUs). You
  use a Tensor Parallelism (TP) degree of 8. Your network team recently re-cabled the InfiniBand fabric,
  replacing a strict rail-optimized topology with a generic spine-leaf fat-tree utilizing standard ECMP
  routing to save on switch ports. Suddenly, your TP=8 all-reduce latencies spike by 300% during training,
  even though the theoretical bisection bandwidth of the cluster remained exactly the same. Analyze the
  root cause of this performance degradation.
details:
  realistic_solution: The degradation is caused by ECMP hash collisions. In a rail-optimized topology,
    GPU N on every node is physically wired to a dedicated leaf switch (Rail N), ensuring contention-free
    paths. Without it, synchronous flows hash to the same spine links, causing microbursts, queue buildup,
    and severe head-of-line blocking.
  common_mistake: Assuming that theoretical non-blocking bisection bandwidth guarantees collision-free
    routing for synchronous collective operations like NCCL all-reduce.
  napkin_math: In an N-path ECMP network, the probability of flows avoiding collisions is fundamentally
    limited by the 'balls into bins' problem. For large flows, random hashing yields an expected maximum
    link utilization of roughly 63% (1 - 1/e), causing a ~1.5x throughput drop. However, because collectives
    like all-reduce are bottlenecked by the slowest link (straggler), the tail latency penalty amplifies
    this to the observed 300% spike.
