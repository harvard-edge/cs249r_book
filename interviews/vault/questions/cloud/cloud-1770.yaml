title: Diagnosing Stragglers in Multi-Node TP Fabrics
scenario: You are scaling a 175B parameter model training job across 32 nodes (256 GPUs) using a Tensor Parallelism (TP) degree of 8. Your network team re-cabled the InfiniBand fabric, replacing a strict rail-optimized topology with a generic spine-leaf fat-tree utilizing standard ECMP routing to save on switch ports. Suddenly, your TP=8 all-reduce latencies spike by 300%, even though the theoretical bisection bandwidth remained exactly the same.
question: "Why did TP=8 AllReduce latency jump 300% after replacing the rail-optimized InfiniBand fabric with a generic ECMP leaf-spine?"
details:
  realistic_solution: The degradation is caused by ECMP hash collisions. In a rail-optimized topology, GPU N on every node is physically wired to a dedicated leaf switch (Rail N), ensuring contention-free paths. Without it, synchronous flows hash to the same spine links, causing microbursts, queue buildup, and severe head-of-line blocking.
  common_mistake: |
    **The Pitfall:** Assuming that theoretical non-blocking bisection bandwidth guarantees collision-free routing.
    **The Rationale:** Network engineers accustomed to general web traffic assume random hashing will perfectly balance flows, ignoring the synchronized nature of ML collectives.
    **The Consequence:** Deploying an ECMP topology that causes massive hash collisions for synchronized elephant flows, leading to severe head-of-line blocking and stragglers.
  napkin_math: |
    **Assumptions & Constraints:**
    - TP=8 creates synchronized elephant flows.
    - ECMP hashing behaves as a 'balls into bins' problem.

    **Calculations:**
    - For large flows, random hashing yields an expected maximum link utilization of roughly 63% (1 - 1/e), causing a ~1.5x throughput drop.
    - Collectives like all-reduce are strictly bottlenecked by the slowest link.

    **Conclusion & Interpretation:**
    - **Result: Hash-Collision-Bound**. Because all GPUs must wait for the worst-case hash collision to resolve, the tail latency penalty amplifies into a 300% spike.
