validation_issues:
- The Napkin Math for 'Data sent per GPU' uses 4096 batch tokens, 2 experts, 63/64 for remote. This implies
  `4096 * 2 * (63/64) = 8064` tokens. However, in MoE, if each token goes to 2 experts, and if the expert
  is local or remote, then total tokens sent should be `batch_size * num_experts_per_token * fraction_remote`.
  Clarification on the '63/64' term would be beneficial.
- The Napkin Math is truncated at the end.
validation_status_pro: WARN
validation_issues_pro:
