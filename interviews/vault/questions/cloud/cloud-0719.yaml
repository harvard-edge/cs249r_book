title: The Expert Parallelism Communication
scenario: 'You are training a Mixture-of-Experts model with 64 experts, placing one expert per GPU across 64 GPUs connected via 400 Gbps InfiniBand. Each token is routed to 2 experts. During training, you notice the all-to-all communication takes longer than the expert computation itself.'
question: "At what point does the network become the bottleneck in this MoE training setup, and how do you fix it?"
details:
  realistic_solution: In expert parallelism, every GPU must send a fraction of its tokens to every other GPU (the tokens routed to remote experts) and receive tokens back. This is an all-to-all communication pattern where the total data volume scales as $O(N)$ with the number of GPUs, but each GPU's network port bandwidth is fixed. With 64 GPUs, each GPU sends tokens to 63 other GPUs simultaneously, creating massive incast at the network switches. Unlike all-reduce (which can use ring or tree topologies to limit per-link traffic), all-to-all requires full bisection bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming all-to-all communication scales identically to all-reduce.
    **The Rationale:** Engineers familiar with data parallelism treat all collectives equally, missing that all-to-all requires full bisection bandwidth and cannot be optimized into rings or trees.
    **The Consequence:** Deploying MoE models across massively oversubscribed network topologies, resulting in severe network incast and stalled training.
  napkin_math: |
    1. **Token Size:** Hidden dim=4096 in FP16 -> 4096 * 2 = 8 KB per token.
    2. **Tokens Sent:** Batch of 4096 tokens per GPU, routed to 2 experts. Expected tokens sent to remote GPUs = 4096 * 2 * (63/64) ≈ 8064 tokens.
    3. **Data Volume:** 8064 tokens * 8 KB = 63 MB per GPU.
    4. **Network Time:** At 400 Gbps (50 GB/s), ideal time = 63 MB / 50 GB/s = 1.26 ms. With a 2:1 oversubscribed fat-tree, effective bandwidth is 25 GB/s, taking **2.52 ms**.
    5. **Compute Time:** One FFN layer compute takes **≈ 0.5 ms**. Since 2.52 ms > 0.5 ms, it is **network-bound**.
    6. **Fix: Confine expert-parallel groups to 8 GPUs within high-bandwidth NVLink domains, and use data parallelism across nodes.**
