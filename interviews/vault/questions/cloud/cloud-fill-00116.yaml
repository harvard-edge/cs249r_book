title: H100 Training Cost for Large Language Model
scenario: You are tasked with estimating the cost of training a large language model with 100 billion
  parameters. The training requires 300 billion FLOPs per parameter for a single forward-backward pass.
  You plan to use NVIDIA H100 GPUs, each with 80 GB HBM3 memory, capable of 989 TFLOPS (FP16 dense) peak
  performance, and consuming 700W. Assume an average GPU utilization of 60% during training and an electricity
  cost of $0.15 per kWh. The H100 instance cost is $3.50/hour.
details:
  realistic_solution: A realistic solution would involve calculating the total FLOPs needed for the entire
    training run (total parameters * FLOPs per parameter per pass * number of passes/epochs), then dividing
    by the effective FLOPs/sec of a single H100 GPU (peak TFLOPS * utilization). This yields the total
    GPU-seconds, which can be converted to GPU-hours. Multiply GPU-hours by the instance cost for compute
    cost, and calculate power consumption (kW * hours * cost/kWh) for electricity cost. Summing these
    gives the total estimated cost. The H100's 3.35 TB/s HBM3 memory bandwidth is critical for understanding
    whether the training workload is compute-bound or memory-bound; large model layers that don't reuse
    weights effectively may be bandwidth-limited, making actual utilization lower than 60%. Memory constraints
    for model fit (80 GB HBM3) should also be considered, but the primary focus here is compute cost.
  common_mistake: Candidates often forget to account for GPU utilization (not peak performance), the difference
    between TFLOPS and PFLOPS, or omit electricity costs, focusing only on instance hourly rates. Another
    common error is miscalculating FLOPs for training (e.g., forgetting the 2x for forward/backward pass
    if not given, or not multiplying by number of parameters).
  napkin_math: Total FLOPs = 100B params * 300B FLOPs/param = 3e22 FLOPs. H100 Effective TFLOPS = 989
    TFLOPS * 0.6 = 593.4 TFLOPS = 5.934e14 FLOPs/sec. GPU-seconds = 3e22 FLOPs / (5.934e14 FLOPs/sec)
    ≈ 5.054e7 seconds. GPU-hours = 5.054e7 sec / 3600 sec/hour ≈ 14,039 GPU-hours. Compute cost = 14,039
    GPU-hours * $3.50/hour = $49,137. Electricity cost = 14,039 GPU-hours * 0.7 kW/GPU * $0.15/kWh = $1,474.
    Total estimated cost ≈ $50,611.
