title: Diagnosing Network Saturation in Sharded Embedding Lookups
scenario: A deep learning recommendation model (DLRM) is deployed with its massive sparse embedding tables sharded by feature type across 8 backend servers. The frontend ranking service uses request-parallel batching: it gathers 500 incoming user requests, packages all 100 sparse feature IDs (8 bytes each) per request into a single batch, and broadcasts this full batch to all 8 embedding servers. The frontend network interface (100 Gbps) is saturating, causing P99 latency spikes, even though the embedding servers have low memory bandwidth utilization.
question: Why is the frontend 100 Gbps NIC saturating, and how should DLRM batching change across the 8 embedding servers?
details:
  realistic_solution: Switch to feature-parallel batching. The frontend should transpose the batch of requests, grouping the sparse feature IDs by their target embedding table, and send each backend server only the IDs it hosts. This eliminates redundant data transfer.
  common_mistake: |
    **The Pitfall:** Recommending larger batch sizes, compressing the payloads, or upgrading to 400 Gbps networking.
    **The Rationale:** When faced with network saturation, standard scaling techniques like payload compression or hardware upgrades seem like the most direct fixes.
    **The Consequence:** The fundamental architectural inefficiency of broadcasting unneeded features to all shards remains, merely pushing the bottleneck slightly further down the line.
  napkin_math: |
    1. Calculate request-parallel broadcast payload: 500 reqs * 100 features * 8 bytes = 400 KB per batch.
    2. Calculate total broadcast transfer: 400 KB broadcast to 8 servers = 3.2 MB total transfer out of the frontend.
    3. Calculate feature-parallel payload: Frontend groups IDs by target table and sends only relevant features to each server (500 * 100 / 8 = 6250 IDs per server).
    4. Calculate new transfer per server: 6250 * 8 bytes = 50 KB.
    5. Calculate total feature-parallel transfer: 50 KB * 8 servers = 400 KB.
    6. Conclude: Feature-parallel batching achieves an **exactly 8x reduction** in bandwidth, clearing the bottleneck.
