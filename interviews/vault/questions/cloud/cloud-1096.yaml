title: Lustre Parallel File Striping Bottleneck
scenario: A training job runs on 64 A100 GPUs (8 compute nodes) reading a single 2 TB HDF5 dataset from
  a Lustre parallel file system. The storage cluster has 16 Object Storage Servers (OSS), each with a
  100 Gbps NIC (12.5 GB/s) and NVMe SSDs capable of 6.0 GB/s sustained reads. During training, GPU utilization
  crashes to near 0% during data loading phases. Monitoring shows aggregate compute node read bandwidth
  is capped at exactly 6.0 GB/s total (across all 64 GPUs), while one specific OSS node shows 100% disk
  I/O utilization. The other 15 OSS nodes show 0% utilization. What is the root cause of this severe data
  loading bottleneck, and how do you diagnose it?
details:
  realistic_solution: The 2 TB file was written with the default stripe count of 1, meaning all file chunks
    reside on a single Object Storage Target (OST). Diagnose this using `lfs getstripe <file>`. Fix it
    by recreating the file with a higher stripe count (e.g., `lfs setstripe -c 16`) to distribute the
    file segments across all 16 OSS nodes, enabling parallel reads.
  common_mistake: Blaming network switch congestion, PyTorch DataLoader thread counts, or hardware failure
    without checking the parallel file system metadata and layout properties.
  napkin_math: 'Stripe count 1: Max bandwidth = min(12.5 GB/s NIC, 6.0 GB/s NVMe) = 6.0 GB/s. Per-GPU
    bandwidth = 6000 MB/s / 64 = 93.75 MB/s (starves A100s). Stripe count 16: Max bandwidth = 16 * 6.0
    GB/s = 96.0 GB/s. Per-GPU bandwidth = 96000 MB/s / 64 = 1.5 GB/s (saturates DataLoader).'
