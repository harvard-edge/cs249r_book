title: Lustre Parallel File Striping Bottleneck
scenario: A training job runs on 64 GPUs reading a single 2 TB HDF5 dataset from a Lustre parallel file system. The storage cluster has 16 Object Storage Servers (OSS). During training, GPU utilization crashes to near 0% during data loading phases. Monitoring shows aggregate compute node read bandwidth is capped at exactly 6.0 GB/s total, while one specific OSS node shows 100% disk I/O utilization. The other 15 OSS nodes show 0% utilization.
question: "What is the root cause of this severe data loading bottleneck, and how do you diagnose it?"
details:
  realistic_solution: |
    The 2 TB file was written with the default stripe count of 1, meaning all file chunks reside on a single Object Storage Target (OST). Diagnose this using `lfs getstripe <file>`. Fix it by recreating the file with a higher stripe count (e.g., `lfs setstripe -c 16`) to distribute the file segments across all 16 OSS nodes, enabling parallel reads.
  common_mistake: |
    **The Pitfall:** Blaming network switch congestion or PyTorch DataLoader thread counts.
    **The Rationale:** Candidates fail to understand parallel file system metadata and layout properties, assuming disk performance scales magically without explicit configuration.
    **The Consequence:** Wasting time tuning DataLoaders while the cluster remains starved for data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64 GPUs reading a single 2TB file.
       - 16 OSS nodes, NVMe limits: 6.0 GB/s per OSS.
       - NIC limits: 12.5 GB/s per OSS.
    2. **Calculations:**
       - Stripe count 1: Max bandwidth = min(12.5, 6.0) = 6.0 GB/s total.
       - Per-GPU bandwidth at Stripe 1: 6000 MB/s / 64 = 93.75 MB/s.
       - Stripe count 16: Max bandwidth = 16 * 6.0 GB/s = 96.0 GB/s total.
       - Per-GPU bandwidth at Stripe 16: 96000 MB/s / 64 = 1.5 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Storage I/O-Bound.** A stripe count of 1 caps the entire cluster to 93.75 MB/s per GPU, starving them. Striping across 16 nodes saturates the DataLoaders.
