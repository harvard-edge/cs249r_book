title: Optimizing LLM Deployment via Knowledge Distillation
scenario: Your team is deploying a distilled large language model (LLM) on an accelerator. The goal is to distill a 70B parameter teacher LLM into a 7B parameter student model, aiming for low inference latency and high throughput while preserving accuracy.
question: How would you distill a 70B teacher into a 7B student while balancing logit or feature distillation, HBM use, and throughput?
details:
  realistic_solution: 'Implement a mixed-precision feature distillation pipeline. Both the 70B teacher and 7B student fit concurrently within the 192 GB HBM. Leverage the massive 5.3 TB/s HBM bandwidth to perform deep intermediate activation distillation rather than just surface-level logit matching. Further, map the feature transfer operations to the hardware''s 2:1 sparse tensor cores to extract a 2x raw compute throughput acceleration during the distillation forward passes.'
  common_mistake: |
    **The Pitfall:** Defaulting to standard logit-matching distillation without analyzing hardware-specific bandwidth capabilities.
    **The Rationale:** Logit matching is the most common, textbook form of distillation and is simplest to implement in PyTorch.
    **The Consequence:** Failing to leverage the massive 5.3 TB/s bandwidth for deep feature distillation yields an inferior student model, leaving premium hardware underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher: 70B (FP16, 140 GB). Student: 7B (FP16, 14 GB).
    - Hardware: 192 GB HBM, 5.3 TB/s Bandwidth.
    - Compute: 2,614 TFLOPS sparse capability.

    **Calculations:**
    - Concurrent Model Footprint: 140 GB + 14 GB = 154 GB (fits in 192 GB).
    - Feature Transfer Cost (100 GB activation dump): 100 GB / 5.3 TB/s = ~18 ms.
    - Sparse Speedup: 2:1 sparsity matrix logic yields ~2x FLOP throughput.

    **Conclusion & Interpretation:**
    - **Result: ~18 ms transfer (Compute/Memory-Bandwidth Optimized)**. Deep feature distillation takes mere milliseconds over HBM, providing superior accuracy at minimal time cost.
