title: Optimizing LLM Deployment via Knowledge Distillation on AMD MI300X
scenario: Your team is deploying a distilled large language model (LLM) on an AMD MI300X accelerator. The goal is to distill a 70B parameter teacher LLM into a 7B parameter student model, aiming for low inference latency and high throughput while preserving accuracy. Analyze how different knowledge distillation techniques can best leverage the hardware for model and intermediate feature storage, and sparse capabilities for efficient computation.
question: How would you distill a 70B teacher into a 7B student on MI300X while balancing logit or feature distillation, HBM use, and throughput?
details:
  realistic_solution: Implement a mixed-precision feature distillation pipeline, utilizing FP16 sparse operations for both the teacher and student forward passes where applicable, directly leveraging the MI300X's 2,614 TFLOPS sparse capabilities. For feature transfer, optimize the data path to maximize the 5.3 TB/s HBM3 bandwidth, potentially using asynchronous transfers and compression techniques for intermediate activations. Strategically choose feature layers that provide high knowledge transfer efficiency without prohibitive memory access patterns. Consider attention-based distillation, ensuring the attention matrices can benefit from sparse computations.
  common_mistake: |
    **The Pitfall:** Defaulting to standard logit-matching distillation without leveraging hardware specifics.
    **The Rationale:** Logit matching is the most common and simplest form of distillation.
    **The Consequence:** Failing to leverage the massive 5.3 TB/s bandwidth for deep feature distillation, or missing the 2x sparse throughput advantage, resulting in an inferior student model and sub-optimal hardware utilization.
  napkin_math: |
    - **Model Memory Footprint:** 70B teacher (FP16) requires ~140 GB, 7B student requires ~14 GB. Both fit easily in the MI300X's 192 GB HBM3 alongside activations.
    - **Feature Transfer Bandwidth:** Transferring 100 GB of intermediate features per iteration over 5.3 TB/s HBM3 bandwidth takes ~18 ms, making feature distillation highly efficient.
    - **Sparse Computation:** Leveraging 2,614 TFLOPS FP16 sparse capability (2:1 sparsity) yields a ~2x raw computational speedup over dense FP16, significantly accelerating training and inference.
