title: Multi-Metric Fairness Dashboard for Production LLM
scenario: 'You are instrumenting a production text generation API serving 500K daily requests. A legal team requires you to monitor for four fairness metrics: gendered pronoun usage parity, salary recommendation gap, leadership language disparity, and intersectional toxicity score disparity.'
question: How would you build a fairness monitoring pipeline for 500K daily job-description requests, and what compute cost would you expect?
details:
  realistic_solution: "Async sampling pipeline: route 2% of traffic (10K req/day) to a Kafka topic for offline fairness evaluation. Batch process nightly with four lightweight classifiers: (1) pronoun classifier: regex + 3M BERT, ~0.5ms/req, (2) salary NER + regression: 20M model, ~2ms/req, (3) leadership language: sentence embedding + cosine similarity against curated lexicon, ~1ms/req, (4) toxicity: Perspective API or 100M classifier, ~5ms/req. Total: 10K \times 8.5ms = 85 GPU-seconds/day \approx 0.024 GPU-hours/day (\approx 0.71 GPU-hours/month). Statistical significance: at 10K samples/day, detect a 2pp disparity gap (from 5% to 7% baseline) with >80% power after ~3 days of data accumulation (30K samples)."
  common_mistake: |
    **The Pitfall:** Running all four fairness classifiers synchronously in the critical path.
    **The Rationale:** Attempting to monitor every single request in real-time for maximum coverage.
    **The Consequence:** A classifier for each metric at 500K QPS would add $4 \times 15\text{ms} = 60\text{ms}$ latency, directly violating typical SLAs and exploding API costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Traffic: 500K requests/day. Sample rate: 2% = 10,000 samples/day.
       * Classifiers: Pronoun (0.5ms), Salary (2ms), Leadership (1ms), Toxicity (5ms).
    2. **Calculations:**
       * Compute per request: 0.5 + 2 + 1 + 5 = 8.5ms.
       * Daily Compute: 10,000 samples \times 8.5ms = 85 seconds of GPU time.
       * Monthly Compute: 85s \times 30 = 2,550 seconds \approx 0.71 GPU-hours/month.
    3. **Conclusion & Interpretation:**
       * Asynchronous sampling requires merely **~0.71 GPU-hours/month**, completely decoupling fairness from the critical latency path. **Result: Offline-Compute-Bound (Negligible Cost)**.
