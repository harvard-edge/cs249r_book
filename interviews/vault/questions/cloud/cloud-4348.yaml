title: Multi-Metric Fairness Dashboard for Production LLM
scenario: You are instrumenting a production text generation API serving 500K daily requests. A legal team requires you to monitor for four fairness metrics: gendered pronoun usage parity, salary recommendation gap by implied applicant gender, leadership language disparity by race, and intersectional toxicity score disparity.
question: How would you build a fairness monitoring pipeline for 500K daily job-description requests, and what compute cost would you expect?
details:
  realistic_solution: "Async sampling pipeline: route 2% of traffic (10K req/day) to a Kafka topic for offline fairness evaluation. Batch process nightly with four lightweight classifiers: (1) pronoun classifier: regex + 3M BERT, ~0.5ms/req, (2) salary NER + regression: 20M model, ~2ms/req, (3) leadership language: sentence embedding + cosine similarity against curated lexicon, ~1ms/req, (4) toxicity: Perspective API or 100M classifier, ~5ms/req. Total: 10K × 8.5ms = 85 GPU-seconds/day ≈ 0.024 GPU-hours/day (≈0.71 GPU-hours/month). Statistical significance: at 10K samples/day, detect a 2pp disparity gap (from 5% to 7% baseline) with >80% power after ~3 days of data accumulation (30K samples)."
  common_mistake: |
    **The Pitfall:** Running all four fairness classifiers synchronously in the critical path.
    **The Rationale:** Attempting to monitor every single request in real-time for maximum coverage.
    **The Consequence:** A classifier for each metric at 500K QPS would add $4 \times 15\text{ms} = 60\text{ms}$ latency, directly violating typical SLAs and exploding API costs.
  napkin_math: |
    *   **Sampling:** 2% of 500K daily requests = 10,000 requests/day.
    *   **Daily Compute:** 4 classifiers at 8.5ms avg per request = $10,000 \times 8.5\text{ms}$ = 85 seconds GPU time.
    *   **Monthly GPU Hours:** 85s/day $\times$ 30 days = 2,550 seconds/month = **~0.71 GPU-hours/month**.
    *   **Wall-time:** Batched at BS=64 on A100, the offline processing takes $\approx$ **5.3 seconds/day**.
    *   **Statistical Power:** A 30-day accumulation (300K samples) easily detects a 1pp salary gap with >99% power.
