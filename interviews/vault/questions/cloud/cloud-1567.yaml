title: Managing High Metric Cardinality in Global Model Serving
scenario: You are designing the observability stack for a recommendation model served across 5 global
  regions, processing 100K QPS. The team wants to track latency percentiles (P50, P90, P99) sliced by
  model_version (10 active), user_segment (1000 categories), device_type (50 types), and response_code
  (10 codes). The Prometheus-based TSDB is struggling with OOM crashes and high query latency. How do
  you evaluate the current metric design and what tradeoffs must you make to stabilize the observability
  platform while maintaining critical business visibility?
details:
  realistic_solution: Shift high-cardinality dimensions (like user_segment) from metrics to structured
    logs or distributed tracing. Pre-aggregate critical dimensions at the collector level and limit TSDB
    labels to bounded global dimensions to keep active series manageable.
  common_mistake: Suggesting simply scaling up the TSDB instances or adding more RAM without addressing
    the fundamental combinatorial explosion, or blindly dropping all high-cardinality labels without consulting
    product requirements.
  napkin_math: Cardinality = 5 regions * 10 versions * 1000 segments * 50 devices * 10 response codes
    = 25,000,000 active time series. In Prometheus, each active series consumes ~3KB of RAM. Total RAM
    = 25M * 3KB = 75 GB for just one metric. Removing the high-cardinality `user_segment` dimension reduces
    series to 25,000. New RAM = 25,000 * 3KB = 75 MB, a 1000x reduction preventing OOMs.
