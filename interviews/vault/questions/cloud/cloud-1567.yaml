title: Managing High Metric Cardinality in Global Model Serving
scenario: You are designing metrics for a model served across 5 global regions. The team wants latency percentiles sliced by model_version (10 active), user_segment (1000 categories), device_type (50 types), and response_code (10 codes). The TSDB is struggling with OOM crashes.
question: How do you evaluate the metric design and what tradeoffs must you make to stabilize the TSDB without losing visibility?
details:
  realistic_solution: Shift high-cardinality dimensions (like user_segment) from metrics to structured logs or distributed tracing. Pre-aggregate critical dimensions at the collector level and limit TSDB labels to bounded global dimensions to keep active series manageable.
  common_mistake: |
    **The Pitfall:** Blindly dropping all high-cardinality labels or simply scaling up the TSDB RAM.
    **The Rationale:** Treating a combinatorial explosion of cardinality as a mere infrastructure sizing problem.
    **The Consequence:** Continued OOMs as cardinality grows, or total loss of business-critical metric granularity.
  napkin_math: |
    *   Cardinality = 5 regions × 10 versions × 1000 segments × 50 devices × 10 response codes.
    *   Total active time series = 25,000,000.
    *   In Prometheus, each active series consumes ~3KB of RAM.
    *   Total RAM = 25,000,000 × 3KB = 75 GB for just one metric.
    *   Removing the high-cardinality `user_segment` dimension reduces series to 25,000.
    *   New RAM = 25,000 × 3KB = 75 MB.
    *   **Result: Dropping the user_segment label reduces memory consumption by 1000x (from 75 GB to 75 MB), eliminating OOM crashes.**
