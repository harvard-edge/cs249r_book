title: Diagnosing Influence Function OOM
scenario: Your team is deploying a toxicity classifier based on RoBERTa-base (125M parameters) on an AWS
  p4d.24xlarge instance (8x A100 40GB GPUs). To debug a high-profile false positive, an engineer implements
  classical influence functions to find the training data most responsible. The job instantly crashes
  with a CUDA Out of Memory (OOM) error before completing even one training data evaluation step. You
  need to analyze the memory profile of this implementation and identify the root cause of the crash.
details:
  realistic_solution: Identify that computing the full Hessian matrix for 125M parameters fundamentally
    exceeds hardware capacity. Resolve the issue by restricting the influence function computation to
    the final projection layer (e.g., computing the Hessian only for the 768x2 classification head) or
    by using implicit Inverse Hessian-Vector Product (IHVP) approximations like LiSSA.
  common_mistake: Assuming the OOM is caused by large batch sizes or activation memory, and attempting
    to fix it via gradient checkpointing or micro-batching without addressing the quadratic memory complexity
    of the Hessian.
  napkin_math: Hessian matrix elements = P^2 = (125 * 10^6)^2 = 1.56 * 10^16. At FP32 (4 bytes per element),
    memory required = 1.56 * 10^16 * 4 = 62.5 * 10^15 bytes = 62.5 Petabytes. 62.5 PB is exponentially
    larger than the node's 320GB total GPU memory, making full Hessian storage impossible.
