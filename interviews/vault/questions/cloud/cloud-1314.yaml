title: Degrading DLRM Ranking Under Capacity Loss
scenario: A real-time recommendation API has a strict <200ms P99 SLA. The pipeline uses candidate generation (CPU, 30ms) and a heavy DLRM ranking model (T4 GPUs, 120ms). During a zone failure, your T4 GPU capacity suddenly drops by 60%. The remaining GPUs hit 250% utilization, and queuing delays spike to 500ms.
question: How would you gracefully degrade the recommendation API after losing 60% of T4 capacity while keeping P99 under 200ms?
details:
  realistic_solution: Implement a dynamic, latency-aware fallback routing mechanism. When GPU queue depth exceeds a critical threshold, automatically bypass the heavy DLRM ranker for a calculated percentage of traffic, serving them directly using the CPU candidate generator's scores.
  common_mistake: |
    **The Pitfall:** Relying on GPU auto-scaling or applying uniform random load shedding.
    **The Rationale:** Candidates often default to standard cloud infrastructure responses without considering the specific latency requirements and the ability to serve lower-fidelity results.
    **The Consequence:** Auto-scaling is too slow (minutes) to prevent SLA violations, and random load shedding drops 60% of revenue completely.
  napkin_math: |
    1. **Baseline:** 1000 QPS.
    2. **Post-failure GPU capacity:** 400 QPS. Deficit: 600 QPS.
    3. **Option A (Load Shedding):** Serve 400 QPS at 100% conversion = 40% total revenue.
    4. **Option B (Graceful Degradation):** Serve 400 QPS via DLRM (100% conv.) + 600 QPS via CPU Retrieval (assumed 85% conv.).
    5. **Calculation:** (400 × 1.0) + (600 × 0.85) / 1000 = 91% retained revenue.
    **Conclusion:** Graceful degradation retains 91% revenue while keeping all request latencies well under the 200ms SLA.
