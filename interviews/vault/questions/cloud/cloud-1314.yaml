title: Degrading DLRM Ranking Under Capacity Loss
scenario: A real-time recommendation API has a strict <200ms P99 SLA. The pipeline uses candidate generation
  (CPU, 30ms) and a heavy DLRM ranking model (T4 GPUs, 120ms). During a zone failure, your T4 GPU capacity
  suddenly drops by 60%. The remaining GPUs hit 250% utilization, and queuing delays spike to 500ms, violating
  the SLA. Evaluate the architectural trade-offs to gracefully degrade the system, maintain the 200ms
  latency bound, and maximize the overall conversion rate.
question: "How would you gracefully degrade the recommendation API after losing 60% of T4 capacity while keeping P99 under 200ms?"
details:
  realistic_solution: Implement a dynamic, latency-aware fallback routing mechanism. When GPU queue depth
    exceeds a critical threshold, automatically bypass the heavy DLRM ranker for a calculated percentage
    of traffic, serving them directly using the CPU candidate generator's scores.
  common_mistake: Relying on GPU auto-scaling (which takes minutes to provision and boot) or applying
    uniform random load shedding, which completely drops requests that could have been served with lower-fidelity
    but acceptable results.
  napkin_math: 'Baseline: 1000 QPS. Post-failure GPU capacity: 400 QPS. Deficit: 600 QPS. Option A (Load
    Shedding): serve 400 QPS at 100% conversion = 40% total revenue. Option B (Graceful Degradation):
    serve 400 QPS via DLRM (100% conv.) + 600 QPS via CPU Retrieval (assumed 85% conv.) = (400 * 1.0)
    + (600 * 0.85) / 1000 = 91% retained revenue, while keeping all request latencies under 40ms.'
