title: The Silent ECC Degradation
scenario: Your 128-GPU cluster has been running for 14 months. You notice that one specific node consistently produces slightly different AllReduce results than other nodes. The gradient checksums diverge by 1-2 ULP every ~100 steps. Training still converges, but reproducibility tests fail. nvidia-smi shows no uncorrectable errors.
question: What hardware component is silently degrading, and when does this 'slightly different' behavior become dangerously wrong?
details:
  realistic_solution: 'The HBM on the GPUs is experiencing an elevated rate of correctable ECC errors. The correction process stalls the memory controller for ~100 ns per event, subtly changing the timing of memory accesses. This affects the order of floating-point reductions in parallel operations, producing the 1-2 ULP divergence. Correctable ECC errors are precursors to uncorrectable errors (double-bit flips). Check nvidia-smi -q -d ECC for the Volatile ECC Errors: Single Bit counter.'
  common_mistake: |
    **The Pitfall:** Dismissing ULP differences as normal floating-point non-determinism.
    **The Rationale:** Candidates know FP math is non-deterministic across different topologies and falsely assume it's normal for the exact same code/hardware to diverge over time.
    **The Consequence:** The degrading HBM is ignored until it triggers a double-bit flip, permanently corrupting an expensive training run.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal correctable ECC Error Rate: <1 per GPU per day.
       - Correction Stall: ~100 ns per event.
    2. **Calculations:**
       - Degraded rate: 100+ errors/day on an affected page.
       - Total daily stall: ~10 us/day (negligible for performance, highly impactful for timing non-determinism).
    3. **Conclusion & Interpretation:**
       - **Result: Hardware-Failure-Bound. The 100 ns stall randomly delays threads, altering execution order and producing ULP errors. Uncorrectable errors will follow.**
