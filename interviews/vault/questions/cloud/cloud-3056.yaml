title: Implement Pipeline Parallelism Bubble Fraction Formula
scenario: Your team is running a 64B parameter model on 8 H100s using pipeline parallelism with p=8 stages and m micro-batches. The target is to keep bubble overhead below 5%.
question: For p=8 pipeline stages, how many micro-batches keep bubble overhead below 5%, and what GPipe activation memory does that create per H100?
details:
  realistic_solution: Solve the bubble fraction formula to find the minimum micro-batches, then compute the activation footprint considering GPipe stores all forward activations until the backward pass.
  common_mistake: |
    **The Pitfall:** Using the wrong bubble formula or forgetting to account for activation memory scaling.
    **The Rationale:** Engineers often overlook how activation memory scales linearly with micro-batch count in GPipe versus 1F1B scheduling.
    **The Consequence:** OOM errors during training due to massive activation storage requirements.
  napkin_math: |
    1. **Calculate Min Micro-Batches:** Bubble fraction = $(p-1)/(m+p-1) < 0.05$. $(8-1)/(m+7) < 0.05 → m > 133$. So $m ≥ 134$.
    2. **Calculate Weights Per Stage:** 64B / 8 stages × 2 bytes = 16GB.
    3. **Calculate GPipe Activations:** 134 × 10 layers × 8192 × 2048 × 2 bytes = 44.9GB.
    4. **Calculate Total Memory:** 16GB + 44.9GB = 60.9GB.
    **Final Result: At least 134 micro-batches are needed, resulting in 60.9GB of memory pressure per H100.**
