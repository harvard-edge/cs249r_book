title: The 700W Question
scenario: "You are planning a new AI cluster and need to specify the power budget per server for the datacenter facilities team."
question: "What is the approximate Thermal Design Power (TDP) you should state for a single modern datacenter GPU, like the NVIDIA H100, to correctly inform the datacenter facilities team?"
details:
  realistic_solution: The correct answer is approximately 700 W. This high power consumption is a critical parameter for datacenter design. It dictates rack power density and is a primary reason why modern AI clusters require specialized high-density racks and often direct liquid cooling, as traditional air cooling becomes ineffective and inefficient at this wattage.
  common_mistake: |
    **The Pitfall:** Anchoring on consumer or desktop GPU power figures (~300W) or older server generation specs.
    **The Rationale:** Engineers often fail to internalize that modern datacenter accelerators operate closer to a kilowatt per chip.
    **The Consequence:** Datacenters are severely under-provisioned for power and cooling, making it physically impossible to turn on the racks without tripping breakers.
  napkin_math: |
    - **Identify single GPU power:** A single H100 draws ~700W (similar to a microwave oven).
    - **Calculate rack power load:** An 8-GPU server draws 8 * 700W = 5.6 kW just for the accelerators.
    - **Calculate total rack power:** Including CPUs and networking, total power exceeds **7-8 kW per server**, necessitating high-density cooling.
  options:
  - 150 W
  - 350 W
  - 700 W
  - 2000 W
  correct_index: 2
