title: RAG Pipeline Latency Budget on H100
scenario: 'A RAG pipeline on H100 runs: FAISS retrieval (50ms), cross-encoder reranking of top-50 docs (120ms), and LLM Time-To-First-Token (TTFT) with a 3072-token context (210ms). End-to-end P95 TTFT is 380ms but the SLA is 300ms. The team proposes adding a query cache.'
question: Where is the 380 ms RAG TTFT being spent, which stage is the bottleneck, and what changes get P95 under 300 ms?
details:
  realistic_solution: |
    Profile each stage independently. Reranking 50 docs with a cross-encoder at 120ms is disproportionate. Reduce reranker candidates from 50 to 20 (cuts to ~48ms). Also, the LLM TTFT of 210ms for 3072 tokens is high; reducing the context to 2048 tokens by passing fewer documents cuts the prefill compute linearly. Cache miss impact renders a query cache useless for strict P95 SLAs.
  common_mistake: |
    **The Pitfall:** Assuming the LLM generation step is always the bottleneck and spending effort on speculative decoding or quantization before profiling the other stages.
    **The Rationale:** Many engineers naturally associate LLM inference exclusively with token generation bottlenecks, missing that retrieval and cross-encoder reranking steps often dominate the time-to-first-token in a RAG pipeline.
    **The Consequence:** The team wastes months implementing complex generative optimizations that yield minimal speedup, while ignoring the 120ms reranking stage that actually prevents the system from comfortably meeting its SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline Pipeline: FAISS (50ms), Reranker for 50 docs (120ms), LLM prefill for 3072 tokens (210ms). Total = 380ms.
       - SLA: 300ms.
       - Proposed Optimization: Reduce docs to 20, shrinking LLM context to 2048 tokens.
    2. **Calculations:**
       - New Reranker Time: 120ms * (20/50) = 48ms.
       - New LLM Prefill Time: 210ms * (2048/3072) = 140ms.
       - Optimized Total: 50ms + 48ms + 140ms = 238ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Context Length).** Reranking and large context prefilling dominate the Time-To-First-Token. Scaling down the candidate pool linearly reduces both reranker and prefill latency, safely hitting 238ms, well under the 300ms SLA without relying on unhelpful caching.
