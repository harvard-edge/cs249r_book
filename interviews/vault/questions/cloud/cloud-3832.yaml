title: LLM Inference Utilization at Batch Size 1
scenario: A team estimated the cloud compute cost of serving an LLM by assuming their GPUs would operate near 100% compute utilization. However, during live inference at batch size 1, the cost per token is drastically higher because the GPUs are achieving less than 1% of peak TFLOPS.
question: Why does compute utilization collapse at batch size 1, and why is peak-TFLOPS cost estimation flawed for this workload?
details:
  realistic_solution: At batch size 1, generating a single token requires loading the entire model's weight matrices from HBM into SRAM to perform matrix-vector multiplications. The arithmetic intensity (FLOPs performed per byte of memory read) is extremely low. Because this intensity is far below the ridge point, the workload operates in the memory-bound regime. The execution time is strictly bottlenecked by memory bandwidth, leaving the massive compute engines severely underutilized.
  common_mistake: |
    **The Pitfall:** Incorrectly attributing low utilization to CPU overhead, framework inefficiencies, or PCIe data transfer latency.
    **The Rationale:** Engineers assume that if a GPU isn't doing math, the CPU must be failing to feed it fast enough.
    **The Consequence:** Massive engineering effort is wasted optimizing Python code or PCIe links while failing to recognize the fundamental arithmetic intensity and memory bandwidth bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory Bandwidth = 2.0 TB/s.
       - Peak Compute = 312 TFLOPS.
       - Data format = FP16 (2 bytes).
    2. **Calculations:**
       - Matrix size (N x N) memory = 2 * N^2 bytes.
       - MVM Math operations = 2 * N^2 FLOPs.
       - Arithmetic Intensity = (2 * N^2) / (2 * N^2) = 1 FLOP/byte.
       - Max Achievable Performance = 1 FLOP/byte * 2.0 TB/s = 2.0 TFLOPS.
       - Compute Utilization = 2.0 TFLOPS / 312 TFLOPS ≈ 0.64%.
    3. **Conclusion & Interpretation:**
       - **Result: 0.64% maximum utilization at batch size 1.** The workload is completely memory-bound, making TFLOPS-based cost estimation invalid.
