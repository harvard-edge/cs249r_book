title: Batched Test-Time Scaling Latency
scenario: You are implementing Best-of-16 test-time compute scaling for a 70B reasoning model deployed on an 8xA100 node. A request has a 1,000-token prompt and requires generating 16 distinct reasoning paths, each exactly 200 tokens long. You leverage KV prefix caching so the prompt is prefilled only once. Your system's prefill speed is 4,000 tokens/sec. During decode, a batch size of 1 yields a Time Per Output Token (TPOT) of 10ms. However, running all 16 paths concurrently in a single batch increases TPOT to 15ms due to memory bandwidth contention.
question: What is the end-to-end latency for the Best-of-16 request with prefix caching, and how does it compare to Best-of-1?
details:
  realistic_solution: Process the 1000-token prompt once via prefix caching (250ms). Then, batch the 16 concurrent decode generations together. The decode latency becomes 200 tokens * 15ms = 3,000ms. Total latency is 3.25 seconds.
  common_mistake: |
    **The Pitfall:** Multiplying the single-pass total latency by 16.
    **The Rationale:** Candidates fail to account for the amortized prefill cost via prefix caching and the latency hiding achieved by batched decode.
    **The Consequence:** They dramatically overestimate the latency of test-time scaling, leading to incorrect architectural decisions.
  napkin_math: |
    *   **Prefill Time (both cases):** 1000 tokens / 4000 tokens/sec = 0.25s.
    *   **Best-of-1 Decode:** 200 tokens × 0.010s/token = 2.0s.
    *   **Best-of-1 Total:** 0.25s + 2.0s = 2.25s.
    *   **Best-of-16 Decode (batched):** 200 tokens × 0.015s/token = 3.0s.
    *   **Best-of-16 Total:** 0.25s + 3.0s = **3.25s.**
