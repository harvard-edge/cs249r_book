title: Diagnosing High Inference Latency on A100
scenario: A cloud-based classification model is deployed on a single A100 GPU. Hardware profiling shows the average inference execution time is exactly 40ms per request. The API gateway routes an average of 20 requests per second to this GPU node. The team is investigating a symptom where the observed average end-to-end latency is consistently around 200ms, which is 5x higher than the raw execution time, despite the GPU not being fully saturated.
question: Why is average end-to-end latency 200 ms when the A100 execution time is 40 ms and arrival rate is 20 requests per second?
details:
  realistic_solution: The root cause of the symptom is purely mathematical queueing delay driven by high utilization (80%). In stochastic systems modeled as an M/M/1 queue, as utilization gets closer to 100%, the wait time in the queue increases non-linearly. The 'unexplained' 160ms is actually the expected time requests spend waiting in the queue before the A100 can process them. To reduce latency, the system must scale out to reduce arrival rate per GPU, or optimize the model to reduce the 40ms service time.
  common_mistake: |
    **The Pitfall:** Ignoring queueing theory and blaming external overheads.
    **The Rationale:** Candidates calculate 80% utilization and assume the remaining 20% headroom means there should be no queueing delay.
    **The Consequence:** They incorrectly attribute the 160ms of extra latency to network overhead, CPU bottlenecks, or PCIe transfers, leading to misguided optimizations.
  napkin_math: |
    1. **Service Rate (μ):** 1 / 0.040 seconds = 25 requests/sec.
    2. **Arrival Rate (λ):** 20 requests/sec.
    3. **Utilization (ρ):** λ / μ = 20 / 25 = 0.8 (80%).
    4. **Average Time in System (W):** Using the M/M/1 formula, W = 1 / (μ - λ) = 1 / (25 - 20) = 1 / 5 = 0.200 seconds (200ms).
    5. **Conclusion:** **The expected total latency is exactly 200ms**, perfectly matching the observed symptom due to standard queueing behavior.
