title: The Container Bloat
scenario: 'A team is deploying a new image classification model as a microservice. The initial container image size is 5GB, and they are seeing unacceptable cold start latencies, especially when scaling up.'
question: 'What are the primary culprits for such a large image, and how would you systematically reduce it to fix cold starts?'
details:
  realistic_solution: "A large container image typically stems from including unnecessary dependencies, development tools, or a large base image. To systematically reduce it:\n1.  **Multi-stage Builds:** Use a build stage with compilers and dev dependencies, and a leaner runtime stage that only copies the compiled artifacts and necessary runtime libraries.\n2.  **Smaller Base Images:** Switch from large distributions (e.g., `ubuntu`) to minimal images like `alpine` or `distroless`.\n3.  **Dependency Pruning:** Only install production dependencies. Remove development headers, testing frameworks, and unused packages (e.g., `apt-get clean`, `pip cache purge`).\n4.  **Model Artifact Management:** Ensure the model weights are compressed or downloaded at runtime, rather than being baked into the initial image, if cold start latency is acceptable for the first request.\n5.  **Layer Optimization:** Order Dockerfile instructions to leverage caching, placing less frequently changing layers (base image, system dependencies) earlier."
  common_mistake: |
    **The Pitfall:** Suggesting faster network connections ("We need faster internet for image pulls").
    **The Rationale:** Candidates focus on the network transmission time rather than addressing the root architectural issue of a bloated container image.
    **The Consequence:** The system continues to suffer poor horizontal scaling and slow cold starts because large images also take longer to extract and load.
  napkin_math: |
    * A 5GB image over a 1 Gbps network (125 MB/s) = 40 seconds transfer + 20s extraction = 60s+ cold start.
    * Pruning the image to 500MB (removing dev libs/caches) reduces transfer to 4s and extraction to 2s.
    * **Container optimization reduces cold start latency by 10x.**
