title: Compute Equal Opportunity Difference and Memory Read Latency
scenario: You are evaluating a cloud-based content moderation model on a single A100 GPU (80 GB HBM2e, 2.0 TB/s bandwidth). You must implement an evaluation script to calculate the Equal Opportunity Difference (True Positive Rate difference) between two user groups to ensure fairness. In your 10 GB evaluation dataset, Group A has 4,000 actual violations with 2,400 correctly flagged by the model. Group B has 10,000 actual violations with 8,500 correctly flagged.
question: "What is the Equal Opportunity Difference for Groups A and B, and what is the minimum HBM read time for the 10 GB dataset?"
details:
  realistic_solution: The implementation requires calculating the True Positive Rate (TPR) for each group, which is the number of correctly flagged violations (True Positives) divided by the total actual violations (Condition Positives). The Equal Opportunity Difference is then TPR_A - TPR_B. The minimum read time is derived by dividing the dataset size by the A100's peak memory bandwidth.
  common_mistake: |
    **The Pitfall:** Confusing Equal Opportunity with Demographic Parity, and miscalculating memory bandwidth.
    **The Rationale:** Candidates use positive prediction rate regardless of true label, and fail to recognize that 2.0 TB/s is 2,000 GB/s.
    **The Consequence:** Fairness metrics are evaluated incorrectly, and the hardware memory read times are misjudged by orders of magnitude.
  napkin_math: |
    - TPR_A = 2,400 / 4,000 = 0.60
    - TPR_B = 8,500 / 10,000 = 0.85
    - **Equal Opportunity Difference = 0.60 - 0.85 = -0.25**
    - **Dataset Read Time = 10 GB / 2,000 GB/s = 0.005 seconds (5 ms)**
