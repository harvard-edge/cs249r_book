title: Compute Equal Opportunity Difference and Memory Read Latency
scenario: You are evaluating a cloud-based content moderation model on a single A100
  GPU (80 GB HBM2e, 2.0 TB/s bandwidth). You must implement an evaluation script to
  calculate the Equal Opportunity Difference (True Positive Rate difference) between
  two user groups to ensure fairness. In your 10 GB evaluation dataset, Group A has
  4,000 actual violations with 2,400 correctly flagged by the model. Group B has 10,000
  actual violations with 8,500 correctly flagged. Write the formula for Equal Opportunity
  Difference, compute the exact metric, and calculate the minimum time required to
  read the 10 GB dataset from HBM2e into the GPU compute cores.
question: What is the Equal Opportunity Difference for Groups A and B, and what is
  the minimum HBM read time for the 10 GB dataset?
details:
  realistic_solution: The implementation requires calculating the True Positive Rate
    (TPR) for each group, which is the number of correctly flagged violations (True
    Positives) divided by the total actual violations (Condition Positives). The Equal
    Opportunity Difference is then TPR_A - TPR_B. The minimum read time is derived
    by dividing the dataset size by the A100's peak memory bandwidth.
  common_mistake: Candidates often confuse Equal Opportunity (based on True Positive
    Rate) with Demographic Parity (based on positive prediction rate regardless of
    true label). They may also miscalculate the memory read time by using incorrect
    units or failing to recognize that 2.0 TB/s is 2,000 GB/s.
  napkin_math: 'TPR_A = True Positives A / Actual Positives A = 2,400 / 4,000 = 0.60

    TPR_B = True Positives B / Actual Positives B = 8,500 / 10,000 = 0.85

    Equal Opportunity Difference = TPR_A - TPR_B = 0.60 - 0.85 = -0.25

    Dataset Read Time = 10 GB / 2,000 GB/s (2.0 TB/s) = 0.005 seconds (5 ms)'
