title: Why Time-to-Train Uses Target Accuracy Not Epochs
scenario: MLPerf Training uses 'time to reach target accuracy' rather than 'time per epoch' or 'time for N steps' as its primary benchmark metric.
question: Why does MLPerf Training use time to reach target accuracy rather than time per epoch or time for N steps?
details:
  realistic_solution: |
    Time-to-target-accuracy captures the full optimization loop: hardware throughput, software efficiency, numerical stability, and hyperparameter tuning. A team might use larger batch sizes (higher throughput per step but worse convergence) or aggressive mixed precision (faster compute but requiring more steps). Time-to-accuracy is the only metric that holistically measures system value, preventing participants from gaming the benchmark by processing garbage data at ultra-high speeds without statistical convergence.
  common_mistake: |
    **The Pitfall:** Equating higher hardware throughput (samples/sec) directly with faster model training.
    **The Rationale:** Candidates focus on system utilization and floating-point operations per second, ignoring the statistical efficiency of the optimization algorithm itself.
    **The Consequence:** Teams might adopt massive batch sizes or aggressive quantization that look great on a hardware dashboard but dramatically increase the total time required for the model to actually learn anything useful.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System A (High Throughput): 100 steps/sec, 10,000 steps to converge.
       - System B (High Efficiency): 80 steps/sec, 7,000 steps to converge.
    2. **Calculations:**
       - System A Time-to-Train: 10,000 steps / 100 steps/sec = 100 seconds.
       - System B Time-to-Train: 7,000 steps / 80 steps/sec = 87.5 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Algorithmically-Bound.** System B is 12.5% faster to target accuracy despite having 20% lower raw hardware throughput, demonstrating why time-to-accuracy is the definitive metric for training efficiency.
