title: Why Time-to-Train Uses Target Accuracy Not Epochs
scenario: MLPerf Training uses 'time to reach target accuracy' rather than 'time per epoch' or 'time for N steps' as its primary benchmark metric.
question: Why does MLPerf Training use time to reach target accuracy rather than time per epoch or time for N steps?
details:
  realistic_solution: 'Time-per-epoch measures raw throughput but ignores statistical efficiency — a system that processes data faster but converges slower could win on throughput yet lose on time-to-solution. Target accuracy captures the full optimization: hardware throughput, software efficiency, numerical stability, and hyperparameter tuning all contribute. A team might use larger batch sizes (higher throughput per step but worse convergence), or mixed precision (faster compute but potentially more steps needed). Time-to-target-accuracy is the only metric that captures these trade-offs holistically. It also prevents gaming — you cannot claim a fast system if it never reaches the quality threshold. The target is statistically verified across multiple runs to account for training variance.'
  common_mistake: |
    **The Pitfall:** Equating higher hardware throughput (samples/sec) directly with faster model training.
    **The Rationale:** Candidates focus on system utilization and floating-point operations per second, ignoring the statistical efficiency of the optimization algorithm itself.
    **The Consequence:** Teams might adopt massive batch sizes or aggressive quantization that look great on a hardware dashboard but dramatically increase the total time required for the model to actually learn anything useful.
  napkin_math: |
    - **System A (High Throughput):** 100 steps/sec. Requires 10,000 steps to converge. Total Time = **100s**.
    - **System B (High Efficiency):** 80 steps/sec. Requires only 7,000 steps to converge. Total Time = **87.5s**.
    - **Conclusion: System B is 12.5% faster to target accuracy despite having 20% lower raw throughput.**
