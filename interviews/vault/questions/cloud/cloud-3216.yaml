title: PagedAttention Block Size Selection
scenario: 'You are configuring vLLM''s PagedAttention for serving Llama 3 70B on 2xH100 GPUs. The system offers block sizes of 8, 16, and 32 tokens. Your workload has highly variable sequence lengths (50th percentile: 256 tokens, 99th percentile: 8192 tokens).'
question: "Which PagedAttention block size—8, 16, or 32 tokens—should you choose for this variable-length workload, and why?"
details:
  realistic_solution: Block size 16 is the optimal choice. It balances internal fragmentation waste versus kernel efficiency. Larger blocks (32) suffer from high internal fragmentation for variable sequences, wasting VRAM. Smaller blocks (8) minimize fragmentation but underutilize Tensor Cores due to poor memory coalescing. Page table overhead is negligible for all sizes.
  common_mistake: |
    **The Pitfall:** Choosing the largest block size (32) to minimize page table pointer overhead.
    **The Rationale:** Candidates incorrectly assume page tables consume significant VRAM, similar to OS-level page tables for terabytes of RAM.
    **The Consequence:** The system wastes hundreds of megabytes on internal fragmentation (partially filled last blocks), drastically reducing the max concurrent requests.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Block candidates: 8, 16, 32 tokens.
       - Token size: ~320 KB KV size (Llama 3 70B, GQA, FP16).
       - Max context: 8192 tokens.
    2. **Calculations:**
       - Average internal waste per request = (B / 2) tokens.
       - Waste at Block=16: 8 tokens * 320 KB = 2.56 MB.
       - Waste at Block=32: 16 tokens * 320 KB = 5.12 MB.
       - Page table overhead for 8192 tokens at Block=16: 8192 / 16 = 512 entries * 8 bytes = 4 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound. Block size 16 minimizes internal fragmentation (saving 2.56 MB per request) while keeping pointer overhead negligible.**
