title: INT4 KV Cache Group Size Architecture
scenario: To serve a 70B model with a massive batch size, you implement INT4 KV cache, shrinking the cache from 80GB to 20GB. Per-channel quantization (quantizing across the sequence dimension for each head) yields terrible perplexity. Changing to 'group size 128' quantization fixes the perplexity but increases memory overhead by 5%.
question: Why does per-channel quantization fail for KV caches, and how does grouped quantization fix it?
details:
  realistic_solution: |
    In KV caching, the sequence dimension grows dynamically, and attention involves comparing tokens across time. Outliers do not just occur in specific feature channels; they also occur at specific token positions (e.g., punctuation or start-of-sequence tokens). If you quantize an entire channel across a long sequence length (e.g., 4096 tokens) using a single scale factor, one temporal outlier in that channel will force a massive scale factor, crushing the precision of the other 4095 tokens in that channel into the tiny 16-value INT4 space. Grouped quantization (e.g., group size 128) breaks the sequence into smaller chunks, calculating a new scale factor every 128 tokens, localizing the destructive impact of temporal outliers.
  common_mistake: |
    **The Pitfall:** Treating KV cache quantization exactly like weight quantization.
    **The Rationale:** Engineers assume that because per-channel quantization works well for static weights, it will work for activations, ignoring the dynamic, temporal nature of outliers in sequences.
    **The Consequence:** A single temporal outlier (e.g., a punctuation token) forces a massive scale factor for the entire sequence channel, crushing the precision of all other tokens and ruining model generation quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT4 Range: 16 bins, typically [-8, 7].
       - Group size: 128.
    2. **Calculations:**
       - Per-Channel Outlier: Max value 40.0 -> Scale = 40/7 = 5.7. Normal token 2.0 -> round(2.0/5.7) = 0.
       - Grouped Quantization: Outlier isolated. Normal group max 3.5 -> Scale = 3.5/7 = 0.5. Token 2.0 -> round(2.0/0.5) = 4.
    3. **Conclusion & Interpretation:**
       - **Result: Signal Preserved. Grouped quantization localizes outlier destruction.**
