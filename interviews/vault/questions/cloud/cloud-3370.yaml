title: 'H100-Optimized LLM: Encoder vs. Decoder Architecture Tradeoffs for Cost-Effective Deployment'
scenario: Your team is deploying a new large language model for a critical enterprise application on a cluster of NVIDIA H100 GPUs. The application involves both complex understanding and generation.
question: How would you evaluate encoder-only, decoder-only, and encoder-decoder options on H100s against 50 ms latency, throughput, and cost?
details:
  realistic_solution: 'A realistic solution involves a comprehensive evaluation process: 1. Workload Characterization: Precisely define application requirements (latency P99, QPS, lengths). 2. Architectural Fit Assessment. 3. Model Selection & Profiling: Profile memory footprint (weights, activations, KV cache) and compute utilization. 4. Optimization Exploration: Evaluate quantization and FlashAttention. 5. Cost Model Development. 6. Benchmarking & Simulation: Build a clear tradeoff matrix for leadership.'
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPs or parameter count.
    **The Rationale:** Candidates overlook the real-world impact of memory bandwidth limitations, especially for KV cache access during decoding.
    **The Consequence:** Deploying an architecture that hits a memory wall, violating the 50ms latency SLA and inflating infrastructure costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: H100 (80GB HBM3, 3.35 TB/s).
       - Decoder-only model: 70B parameters (140 GB FP16).
       - Sequence: 4096 tokens.
    2. **Calculations:**
       - Weights: 140 GB requires minimum 2x H100s.
       - Memory bandwidth generation limit: 3.35 TB/s / 140 GB = ~24 tokens/second/GPU (if perfectly memory-bound).
       - Generation latency: 1000 ms / 24 = 41 ms/token (dangerously close to 50ms SLA).
       - KV Cache (Batch=8): ~80 GB, requiring even more GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. For large decoder-only models, HBM3 bandwidth strictly bottlenecks token generation, driving up the cost-per-token and forcing multi-GPU distribution just to meet latency SLAs.
