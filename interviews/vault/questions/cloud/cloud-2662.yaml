title: How Request Pipelining Hides Latency
scenario: 'An inference server processes requests in three stages: CPU preprocessing (5ms), GPU inference (10ms), and postprocessing (3ms).'
question: 'For the 5ms/10ms/3ms stages, what throughput, latency, and GPU utilization do you get without pipelining versus with 3-stage pipelining?'
details:
  realistic_solution: 'Without pipelining: each request completes all three stages sequentially before the next begins. Latency per request = 5 + 10 + 3 = 18ms. Throughput = 1/18ms = 55.6 requests/second. GPU utilization: 10/18 = 55.6%. With 3-stage pipelining: while request N is on the GPU, request N+1 is being preprocessed on CPU, and request N-1 is being postprocessed. The throughput bottleneck is the slowest stage (GPU at 10ms). Throughput = 1/10ms = 100 requests/second (1.8x improvement). GPU utilization rises to ~100%. Latency for a single request remains 18ms (pipeline doesn''t reduce individual request latency), but throughput nearly doubles because stages execute concurrently across different requests. This is the same principle as CPU instruction pipelining — overlap different stages of different requests to maximize hardware utilization.'
  common_mistake: |
    **The Pitfall:** Believing that request pipelining reduces the end-to-end latency for individual requests.
    **The Rationale:** The term "pipelining" sounds like an acceleration technique, so people assume it makes a single request finish faster.
    **The Consequence:** Developers might apply pipelining expecting a latency win, only to see per-request latency stay the same (or slightly increase due to queueing), completely misunderstanding that the benefit is strictly in throughput and utilization.
  napkin_math: |
    - **Without Pipelining:** Latency = 5 + 10 + 3 = 18ms. Throughput = 1 / 0.018s = 55.6 req/s. GPU Util = 10 / 18 = 55.6%.
    - **With 3-Stage Pipelining:** The bottleneck stage dictates throughput. Max stage = 10ms.
    - **Pipelined Performance:** Latency = 18ms. Throughput = 1 / 0.010s = **100 req/s**. GPU Util = 10 / 10 = **100%**.
    - **Improvement:** 1.8x throughput gain with unchanged per-request latency.
