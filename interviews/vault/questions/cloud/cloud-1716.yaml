title: Data Center PUE vs Grid Carbon Intensity
scenario: You are planning to deploy a continuous 10 MW AI training cluster and must choose between two colocation facilities. Facility A has a PUE of 1.5 but uses cheap, highly renewable energy ($0.05/kWh, 50 gCO2/kWh). Facility B uses advanced free-air cooling to achieve a PUE of 1.1, but relies on a standard mixed grid ($0.10/kWh, 300 gCO2/kWh).
question: "Which colocation site should you choose, and what are the annual cost and carbon emissions for each facility?"
details:
  realistic_solution: Calculate the total facility power (Compute * PUE) to find the total annual energy consumption. Apply the local cost and carbon intensity rates. Facility A, despite worse PUE (higher energy waste on cooling), is significantly cheaper to run and emits a fraction of the carbon due to its extremely clean and cheap grid.
  common_mistake: |
    **The Pitfall:** Assuming a lower PUE automatically makes a data center more sustainable or cost-effective.
    **The Rationale:** Candidates hyper-focus on data center efficiency metrics while ignoring the carbon intensity and unit cost of the local power grid.
    **The Consequence:** Selecting a supposedly greener facility that actually emits ~4x more carbon and costs ~$3M more annually.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 10 MW continuous compute load.
       * 8760 hours/year.
    2. **Calculations:**
       * Fac A Power: 10 * 1.5 = 15 MW.
       * Fac A Energy: 15 * 8760 = 131.4 GWh.
       * Fac A Cost: 131.4 * 10^6 * 0.05 = $6.57M.
       * Fac A Carbon: 131.4 * 10^6 * 50g = 6,570 tCO2.
       * Fac B Power: 10 * 1.1 = 11 MW.
       * Fac B Energy: 11 * 8760 = 96.36 GWh.
       * Fac B Cost: 96.36 * 10^6 * 0.10 = $9.63M.
       * Fac B Carbon: 96.36 * 10^6 * 300g = 28,908 tCO2.
    3. **Conclusion & Interpretation:** **Result: 22,338 tCO2 Saved (Efficiency-Bound)**. Facility A saves ~$3.06M and massively cuts emissions.
