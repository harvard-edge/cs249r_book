title: Diagnosing Block Storage IOPS Bottlenecks
scenario: A multi-node PyTorch training job on AWS EC2 p4d.24xlarge instances (8x A100) is stalling. The
  dataset comprises 100 million 100KB images stored on a shared EBS gp3 volume that is provisioned for
  1,000 MB/s throughput and 4,000 IOPS. Despite the 1,000 MB/s throughput rating, system profiling shows
  the data loading pipeline peaking at exactly 400 MB/s, causing GPU utilization to plummet to 25%. Analyze
  the metrics to identify the root cause of this storage bottleneck and explain how to restructure the
  data loading pipeline to fully utilize the provisioned disk throughput.
details:
  realistic_solution: The root cause is hitting the provisioned 4,000 IOPS limit because reading individual
    small files triggers random I/O operations. The solution is to serialize and pack the 100KB images
    into larger contiguous chunk files (e.g., 100MB to 1GB shards using WebDataset or TFRecord). This
    converts the workload from random IO-bound to sequential bandwidth-bound.
  common_mistake: Focusing solely on the volume's sequential throughput rating and attempting to resolve
    the issue by provisioning a more expensive, higher-bandwidth volume without recognizing the fundamental
    limit imposed by the random access pattern.
  napkin_math: 'With individual files: 4,000 IOPS * 100 KB/file = 400,000 KB/s ≈ 400 MB/s (bottlenecked).
    To reach the 1,000 MB/s limit with 100KB files would require 10,000 IOPS. By packing into 100MB shards:
    1,000 MB/s / 100 MB/shard = 10 IOPS, operating safely below the IOPS ceiling.'
