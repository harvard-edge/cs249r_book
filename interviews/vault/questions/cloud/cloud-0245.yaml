title: The Optimizer's Tax
scenario: You need to train a 70 billion parameter LLM using the standard Adam optimizer. State the approximate VRAM required just for the optimizer states and gradients, excluding the model weights themselves.
question: How much VRAM is needed just for Adam optimizer states and gradients for a 70B-parameter LLM, excluding model weights?
details:
  realistic_solution: 'For Adam optimizer states and gradients (excluding the model weights themselves): each parameter requires 2 bytes for the FP16 gradient, 4 bytes for the FP32 first moment (momentum), and 4 bytes for the FP32 second moment (variance) — totaling 10 bytes per parameter. For a 70B model: 70B × 10 = 700 GB just for optimizer states and gradients. This is 5× the FP16 model weight size (140 GB), which is why simply fitting the model for inference tells you nothing about training memory requirements.'
  common_mistake: |
    **The Pitfall:** Underestimating training memory by only calculating model weight size.
    **The Rationale:** Engineers often memorize the FP16 inference size (2 bytes/param) and assume training is roughly equivalent.
    **The Consequence:** They fail to account for the FP32 momentum and variance estimates required by Adam, severely under-provisioning hardware and causing instant OOMs.
  napkin_math: |
    - **Gradients:** 2 bytes (FP16).
    - **Adam First Moment (Momentum):** 4 bytes (FP32).
    - **Adam Second Moment (Variance):** 4 bytes (FP32).
    - **Total per parameter:** 2 + 4 + 4 = 10 bytes/param.
    - **Optimizer states + gradients for 70B model:** 70B × 10 bytes = **700 GB.**
    - *(Note: Full training memory also requires FP16 weights (140 GB) and FP32 master weights (280 GB) for mixed precision, totaling ~1.1 TB).*
  options:
  - 140 GB
  - 280 GB
  - ~700 GB
  - 80 GB
  correct_index: 2
