title: 'KV-Cache: Optimize KV Cache Eviction Policy for LLM Serving'
scenario: 'Your H100 (80GB HBM3) LLM serving system (7B model) serves requests with
  bimodal length distribution: 20% of requests are 4096 tokens (long), 80% are 256
  tokens (short). KV cache fills up within 100ms under peak load. Design an eviction
  policy that maximizes throughput while minimizing recomputation.'
question: What KV-cache memory per token should you use when designing the eviction
  policy for this 7B GQA-8 workload?
details:
  realistic_solution: 'KV cache per token = 2 × num_layers × num_kv_heads × head_dim
    × bytes_per_element. For Llama-class models with GQA-8: 2 × 32 × 8 × 128 × 2B
    = 131KB per token.'
  common_mistake: Using LRU eviction — this evicts in-progress long requests (being
    actively generated) to make room for new short requests, causing expensive recomputation.
  napkin_math: 'KV cache per token: num_layers × 2(K+V) × num_kv_heads × head_dim
    × bytes. For 32 layers, 8 KV heads (GQA), head_dim=128, fp16: 32 × 2 × 8 × 128
    × 2B = 131,072 bytes ≈ 131KB per token (not 32KB — 32KB would require head_dim=32
    or 4× fewer layers).'
