title: The Cross-Rack Divide
scenario: You're designing a new multi-rack AI cluster for training large models. To connect the different
  server nodes together, which of the following technologies is the standard choice for the high-bandwidth,
  low-latency fabric?
details:
  realistic_solution: The correct answer is InfiniBand NDR. It is a specialized networking standard designed
    for high-performance computing (HPC) and AI clusters, providing much lower latency and higher bandwidth
    than traditional Ethernet. While NVLink connects GPUs within a server at up to 900 GB/s, InfiniBand
    NDR connects the servers themselves at 400 Gbps (50 GB/s) per link, enabling the massive cross-node
    communication required for distributed training.
  common_mistake: Engineers often confuse the hierarchy of interconnects. They might incorrectly choose
    NVLink, which is a very high-speed interconnect, but it only works for GPUs *within* a single server
    node. They might also choose PCIe, which is the general-purpose bus on the motherboard, not the specialized
    network fabric that connects different machines.
  napkin_math: The latency difference tells the story. A data transfer over NVLink takes about 500 ns,
    while a cross-rack hop using InfiniBand takes about 5,000 ns (5 µs).
  options:
  - NVLink 4.0
  - PCIe Gen5
  - InfiniBand NDR
  - HBM3
