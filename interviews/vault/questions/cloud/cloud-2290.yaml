title: The Intersectional Subgroup Explosion
scenario: 'A regulatory audit requires your loan model to demonstrate fairness across intersectional subgroups — not just gender or race independently, but combinations like ''Black women over 55'' or ''Hispanic men under 25.'' Your model has 4 protected attributes (gender: 2, race: 6, age-bracket: 5, disability: 2). The auditor wants equalized odds computed for every intersectional combination. Analyze the computational and statistical challenges this creates, and diagnose why naive subgroup enumeration fails.'
question: "Why does naive intersectional subgroup enumeration fail, and what computational and statistical challenges must the audit handle?"
details:
  realistic_solution: '120 subgroups create two compounding problems. (1) Statistical: with a 100K test set, average subgroup size is 833 samples, but distribution is highly skewed. ''Disabled Hispanic women 55+'' might have 12 samples — far below the ~780 needed for a 5pp gap test. You cannot make fairness claims about subgroups with insufficient samples. (2) Multiple comparisons: testing equalized odds across 120 subgroups at α=0.05 yields ~6 false positives by chance alone. Without Bonferroni or FDR correction, you will ''discover'' disparities that don''t exist. The systems solution: (a) Use Gerrymandering-aware fairness (Kearns et al., 2018) or multicalibration, which audit over exponentially many subgroups implicitly without enumerating them. (b) Implement hierarchical testing: first test marginal groups (gender alone, race alone), then test 2-way intersections where marginal tests flag issues, then drill into 3+ way intersections only where signal is strong. (c) Report confidence intervals, not point estimates, and flag subgroups with insufficient power. This requires your evaluation infrastructure to maintain sample-size metadata and automatically suppress results below the power threshold.'
  common_mistake: Computing fairness metrics for all 2 × 6 × 5 × 2 = 120 subgroups and reporting the results. This produces a table that looks thorough but is statistically meaningless for most cells.
  napkin_math: '4 attributes → 2×6×5×2 = 120 subgroups. 100K test set → 833 avg samples/subgroup. But top-10% subgroups hold ~60% of data; bottom-30% have <100 samples each (~36 subgroups statistically underpowered). Bonferroni correction: α_adjusted = 0.05/120 = 0.00042 → requires ~2,400 samples per subgroup for same power. Total needed: 120 × 2,400 = 288K samples — nearly 3× the test set.'
  options:
  - Naive enumeration is perfectly fine because 100K samples guarantee at least 800 samples per subgroup, providing sufficient statistical power across all 120 intersections.
  - The 120 subgroups can be evaluated efficiently using Bonferroni correction without any loss of statistical power or need for more data.
  - It fails because enumerating 120 subgroups creates severe statistical underpowering for minority intersections and guarantees false positives due to multiple comparisons without correction.
  - The computational overhead of calculating equalized odds 120 times will cause the evaluation pipeline to exceed the maximum runtime of standard CI/CD runners.
  correct_index: 2
