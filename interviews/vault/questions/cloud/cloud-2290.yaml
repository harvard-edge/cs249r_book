title: The Intersectional Subgroup Explosion
scenario: 'A regulatory audit requires your loan model to demonstrate fairness across 120 intersectional subgroups (gender: 2, race: 6, age-bracket: 5, disability: 2). The auditor wants equalized odds computed for every combination. You have a 100K test set.'
question: Why does naive intersectional subgroup enumeration fail, and what computational and statistical challenges must the audit handle?
details:
  realistic_solution: |
    120 subgroups create two compounding problems. (1) Statistical: with a 100K test set, average subgroup size is 833 samples, but distribution is highly skewed. 'Disabled Hispanic women 55+' might have 12 samples — far below the ~780 needed for a 5pp gap test. You cannot make fairness claims about subgroups with insufficient samples. (2) Multiple comparisons: testing equalized odds across 120 subgroups at α=0.05 yields ~6 false positives by chance alone. Without Bonferroni or FDR correction, you will 'discover' disparities that don't exist. The systems solution: (a) Use Gerrymandering-aware fairness (Kearns et al., 2018) or multicalibration, which audit over exponentially many subgroups implicitly without enumerating them. (b) Implement hierarchical testing: first test marginal groups (gender alone, race alone), then test 2-way intersections where marginal tests flag issues, then drill into 3+ way intersections only where signal is strong. (c) Report confidence intervals, not point estimates, and flag subgroups with insufficient power. This requires your evaluation infrastructure to maintain sample-size metadata and automatically suppress results below the power threshold.
  common_mistake: |
    **The Pitfall:** Computing fairness metrics for all possible intersectional subgroups and reporting the raw results.
    **The Rationale:** Teams treat fairness as a pure software engineering task, ignoring the severe statistical underpowering and multiple comparison fallacies of slicing data too thin.
    **The Consequence:** The audit produces statistically meaningless noise, flagging false-positive bias in groups too small to reliably measure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 120 subgroups (2 * 6 * 5 * 2).
       - Test set = 100,000 samples.
       - ~780 samples needed for a 5pp gap test.
    2. **Calculations:**
       - Average Samples = 100,000 / 120 = 833 samples/subgroup.
       - Multiple Comparisons: Testing 120 groups at α=0.05 yields ~6 false positives.
       - Bonferroni correction requires α=0.00042, raising the required sample size to ~2,400 samples/subgroup.
       - Total Required Samples = 120 * 2,400 = 288,000 samples.
    3. **Conclusion & Interpretation:**
       - Naive testing requires nearly 3x the available data and guarantees false positives.
       - **Result: Statistically Underpowered (Multiple Comparisons)**
  options:
  - Naive enumeration is perfectly fine because 100K samples guarantee at least 800 samples per subgroup, providing sufficient statistical power across all 120 intersections.
  - The 120 subgroups can be evaluated efficiently using Bonferroni correction without any loss of statistical power or need for more data.
  - It fails because enumerating 120 subgroups creates severe statistical underpowering for minority intersections and guarantees false positives due to multiple comparisons without correction.
  - The computational overhead of calculating equalized odds 120 times will cause the evaluation pipeline to exceed the maximum runtime of standard CI/CD runners.
  correct_index: 2
