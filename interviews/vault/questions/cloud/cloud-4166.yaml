title: Continuous Batching and Tail Latency Reduction
scenario: 'You are implementing PagedAttention for continuous batching on an inference server.'
question: 'Using PagedAttention, what is the size of a single 16-token KV-cache page for a model with 80 layers, 16 KV heads, 128 head dimension, and FP16 precision?'
details:
  realistic_solution: 'Using exact dimensions, calculate the byte requirement for both Keys and Values. With FP16, each element is 2 bytes. Page size = tokens * layers * KV_heads * head_dim * bytes * 2(K+V) = 10,485,760 bytes = 10 MiB.'
  common_mistake: |
    **The Pitfall:** Implementing continuous batching without PagedAttention, or miscalculating the required block size for the memory manager.
    **The Rationale:** Naive continuous batching fragments GPU memory because KV caches have variable lengths. Miscalculating block sizes leads to OOM or inefficient allocator performance.
    **The Consequence:** Hard-capping concurrency at low levels despite having enough total memory, or designing block tables that waste VRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 80 layers, 16 KV heads, 128 head dimension.
       - Precision: FP16 (2 bytes).
       - Page size: 16 tokens.
    2. **Calculations:**
       - Page Size Formula = Tokens * Layers * KV Heads * Head Dim * Bytes/Element * 2 (for K and V).
       - Calculation = 16 * 80 * 16 * 128 * 2 * 2 = 10,485,760 bytes.
       - Conversion = 10,485,760 / (1024 * 1024) = 10 MiB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Exactly 10 MiB per page.**
