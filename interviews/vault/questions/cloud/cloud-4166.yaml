title: Continuous Batching and Tail Latency Reduction
scenario: Compare static batching vs continuous batching (Orca-style iteration-level
  scheduling) for an MI300X serving a 70B model. With static batching of 32 requests,
  a short 50-token generation must wait for a 500-token generation to complete before
  the batch releases. Quantify the latency waste and design the continuous batching
  scheduler, including memory management for variable-length KV caches using Infinity
  Fabric-connected HBM3.
question: Using PagedAttention, what is the KV-cache page size for a 16-token page
  with 80 layers, 16 KV heads, 128-d heads, and FP16 K/V?
details:
  realistic_solution: 'Page size = tokens × layers × KV_heads × head_dim × bytes ×
    2(K+V). With 16 KV heads: 16 × 80 × 16 × 128 × 2B × 2 = 10,485,760 bytes = 10 MiB (not 5 MiB which
    uses 8 KV heads or misses ×2 for K+V).'
  common_mistake: Implementing continuous batching without PagedAttention. Naive continuous
    batching still fragments GPU memory because KV caches have variable lengths, leading
    to OOM at high concurrency despite having enough total memory.
  napkin_math: 'PagedAttention page size: 16 tokens × 80 layers × 16 KV heads × 128 dim
    × 2 bytes (FP16) × 2 (K and V) = 10,485,760 bytes = 10 MiB.
    If there were only 8 KV heads, it would be 5 MiB, but the scenario specifies 16 KV heads.'
