title: Incast-Driven PFC Congestion Spreading Time
scenario: You are managing a lossless RoCEv2 AI fabric using 400Gbps links and ToR switches with a 32MB shared buffer. During an All-to-All collective operation, a microburst causes a 4:1 incast scenario on a ToR switch. The switch issues a Priority Flow Control (PFC) PAUSE frame to upstream Spine switches when an ingress port's buffer hits a 4MB threshold.
question: How long does the 4:1 incast take to trigger PFC at the 4MB threshold, and how does that affect unrelated Spine traffic?
details:
  realistic_solution: The net buffer accumulation rate is 1.2 Tbps (150 GB/s). It takes just 26.6 microseconds to hit the 4MB threshold. The ToR switch then transmits a PFC PAUSE upstream to the Spine. The Spine stops transmitting all packets for that priority class down to the ToR, meaning any unrelated workloads routed through that same Spine-ToR link will be stalled (Congestion Spreading).
  common_mistake: |
    **The Pitfall:** Assuming network buffers can absorb microbursts for milliseconds.
    **The Rationale:** 32MB sounds like a large buffer capacity to software engineers.
    **The Consequence:** Failing to recognize that a PFC PAUSE acts as a hop-by-hop hard stop, creating head-of-line blocking that cascades congestion and stalls completely unrelated tenant traffic on the Spine.
  napkin_math: |
    - **Ingress vs Egress**: 4 × 400 Gbps (Ingress) - 400 Gbps (Egress) = 1200 Gbps accumulation rate.
    - **Bytes Conversion**: 1200 Gbps / 8 = 150 GB/s = 150,000 MB/s.
    - **Time to Threshold**: 4 MB / 150,000 MB/s = 0.0000266 seconds.
    - **Conclusion**: It takes just **26.6 microseconds** to trigger the PAUSE frame.
