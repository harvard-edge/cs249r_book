title: The TCO Iceberg (cloud-0399)
scenario: For a successful, large-scale model like a flagship LLM that is deployed in the cloud over a
  three-year lifecycle, which of the following factors typically contributes the most to its Total Cost
  of Ownership (TCO)?
question: "For a flagship LLM deployed in the cloud for three years, which factor typically contributes the most to TCO?"
details:
  realistic_solution: The ongoing, cumulative cost of inference is the dominant factor in a model's TCO
    over its lifetime. While training is a massive one-time expense, the operational cost of reserving
    and running thousands of GPUs to serve billions of user requests over several years accumulates to
    a much larger number.
  common_mistake: Engineers often focus on the large, visible upfront cost of training, which can run
    into the tens of millions of dollars for a major model. They underestimate that a successful product
    runs 24/7 for years. The accumulated operational expense (OpEx) of inference hardware, power, and
    cooling steadily overtakes the one-time training 'CapEx' bill.
  napkin_math: 'Let''s model a hypothetical large model''s lifecycle:

    1. **Training CapEx:** 10,000 H100s for 3 months.

    10k × 24h × 90 days × $4/hr = ~$86 Million.

    2. **Inference OpEx:** 5,000 H100s to serve global traffic for 3 years.

    5k × 24h × 365 days × 3 yrs × $4/hr = ~$525 Million.

    Inference accounts for over 85% of the total hardware lifecycle cost ($525M vs $86M), dominating the
    TCO.'
  options:
  - The one-time cost of the initial model training run.
  - The ongoing cost of running the inference fleet (hardware, power, cooling).
  - The cost of acquiring and labeling the training data.
  - The salaries of the R&D and Ops teams maintaining the model.
  correct_index: 1
