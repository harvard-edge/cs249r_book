title: The TCO Iceberg (cloud-0399)
scenario: 'A flagship LLM is deployed in the cloud for a three-year lifecycle.'
question: 'Which factor typically contributes the most to its Total Cost of Ownership (TCO)?'
details:
  realistic_solution: The ongoing, cumulative cost of inference is the dominant factor in a model's TCO over its lifetime. While training is a massive one-time expense, the operational cost of reserving and running thousands of GPUs to serve billions of user requests over several years accumulates to a much larger number.
  common_mistake: |
    **The Pitfall:** Focusing solely on the visible upfront CapEx of model training.
    **The Rationale:** Underestimating the long-term 24/7 OpEx of reserving thousands of GPUs for a successful product.
    **The Consequence:** Severely under-budgeting the multi-year lifecycle cost of deploying a flagship LLM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training: 10,000 H100s for 3 months at $4/hr.
    - Inference: 5,000 H100s for 3 years at $4/hr.

    **Calculations:**
    - Training CapEx: 10k * 24h * 90 days * $4/hr = ~$86.4 Million.
    - Inference OpEx: 5k * 24h * 365 days * 3 yrs * $4/hr = ~$525.6 Million.

    **Conclusion & Interpretation:**
    - **Result: TCO-Bound (Inference OpEx).** Inference accounts for over 85% of the total hardware lifecycle cost.
  options:
  - The one-time cost of the initial model training run. (CapEx Trap)
  - The ongoing cost of running the inference fleet (hardware, power, cooling).
  - The cost of acquiring and labeling the training data. (Data Trap)
  - The salaries of the R&D and Ops teams maintaining the model. (Opex Trap)
