title: The Datacenter Cooling Tax
scenario: You are managing a datacenter rack containing 8 H100 GPUs, each operating at its full Thermal
  Design Power (TDP). Your datacenter's Power Usage Effectiveness (PUE) is 1.15. Explain how PUE contributes
  to the total power draw and calculate the total power consumed by the rack, including the overhead for
  cooling.
details:
  realistic_solution: The correct approach is to first calculate the raw power consumed by the IT equipment
    (the GPUs) and then multiply that by the PUE factor. PUE represents the ratio of total facility power
    to IT equipment power. A PUE of 1.15 means that for every 1 watt consumed by the GPUs, an additional
    0.15 watts are consumed by cooling and other infrastructure.
  common_mistake: Engineers often calculate power consumption based only on the IT equipment's nameplate
    TDP, completely forgetting the significant overhead from the cooling systems, power distribution,
    and lighting required to keep that IT equipment running. This leads to underestimating both operational
    costs and thermal load.
  napkin_math: 1. **Calculate IT Power:** 8 H100 GPUs × 700 W/GPU = 5,600 W = 5.6 kW
  options:
  - 5.60 kW - This answer incorrectly ignores the PUE, accounting only for the raw power of the GPUs.
  - 4.87 kW - This answer incorrectly divides by the PUE, showing a misunderstanding of the ratio.
  - 6.44 kW - This correctly calculates the GPU power and applies the PUE multiplier.
  - 7.55 kW - This answer makes a calculation error, perhaps by adding the PUE as a percentage incorrectly
    (5.6 * 1.15 != 7.55) or confusing the number of GPUs.
  correct_index: 2
