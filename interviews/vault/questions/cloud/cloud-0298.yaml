title: The Datacenter Cooling Tax
scenario: You are managing a datacenter rack containing 8 GPUs, each operating at a 700 W Thermal Design Power (TDP). Your datacenter's Power Usage Effectiveness (PUE) is 1.15.
question: With 8 GPUs at 700 W each and PUE 1.15, what total rack power is consumed including cooling overhead?
details:
  realistic_solution: The correct approach is to first calculate the raw power consumed by the IT equipment (the GPUs) and then multiply that by the PUE factor. PUE represents the ratio of total facility power to IT equipment power. A PUE of 1.15 means that for every 1 watt consumed by the GPUs, an additional 0.15 watts are consumed by cooling and other infrastructure.
  common_mistake: |
    **The Pitfall:** Calculating power based exclusively on IT equipment nameplate ratings.
    **The Rationale:** Hardware spec sheets emphasize TDP, leaving cooling and facility overhead hidden from naive calculations.
    **The Consequence:** Significantly underestimating operational costs, thermal load, and facility constraints, leading to breaker trips or budget overruns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 GPUs at 700 W each.
       - PUE = 1.15.
    2. **Calculations:**
       - Raw IT Power = 8 × 700 W = 5,600 W (5.6 kW).
       - Total Facility Power = IT Power × PUE = 5.6 kW × 1.15 = 6.44 kW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The cooling and distribution overhead add 0.84 kW, bringing total rack consumption to 6.44 kW.
  options:
  - 5.60 kW
  - 4.87 kW
  - 6.44 kW
  - 7.55 kW
  correct_index: 2
