title: The Library vs Custom Kernel Decision
scenario: Your inference serving team runs a 70B MoE model. Profiling shows that the top-K expert routing + scatter/gather operations account for 22% of per-token latency. These operations use PyTorch's native indexing and scatter_ operators, which dispatch to generic cuBLAS/cuDNN routines. A kernel engineer proposes writing a custom Triton kernel. The library vendor (NVIDIA) says their next cuDNN release will include optimized MoE primitives in 6 months.
question: "How do you evaluate the build-vs-wait decision for writing a custom Triton kernel versus waiting for vendor library support?"
details:
  realistic_solution: "Evaluate across four axes: (1) Performance gap: 22% of latency in routing means a custom kernel could save 3.5ms per token on a 23ms budget — significant for SLA and fleet cost (saving 35 GPUs). (2) Maintenance cost: Triton kernels are ~10× easier to maintain than raw CUDA, but still require updates per GPU generation. (3) Correctness risk: MoE routing has complex data-dependent control flow; bugs cause silent accuracy loss. (4) Time value: 6 months of serving at 22% overhead costs real money. Decision framework: if the operation is on the critical path AND vendor coverage is >3 months away AND the operation's data access pattern is non-standard (irregular scatter/gather, not dense GEMM), write the custom kernel. Dense matmul → always use cuBLAS. Custom attention variants → use FlashAttention or Triton. Non-standard data movement patterns (MoE routing, speculative decoding verification) → custom kernel territory."
  common_mistake: |
    **The Pitfall:** Defaulting strictly to "always use vendor libraries" or "always write custom kernels."
    **The Rationale:** Relying on dogma rather than evaluating the specific economic and performance tradeoff of the current bottleneck.
    **The Consequence:** Leaving massive amounts of performance and money on the table by waiting 6 months for a vendor library that could have been solved with a 2-week Triton kernel.
  napkin_math: |
    - **Current Latency:** 23ms per token, routing = 5ms.
    - **Custom Kernel Improvement:** Routing drops to ~1.5ms. Savings = 3.5ms per token.
    - **New Total:** 19.5ms (15% end-to-end speedup).
    - **Fleet Savings:** At 10,000 QPS, saving 3.5ms per request = 35 GPU-seconds/second = exactly 35 fewer GPUs needed.
    - **Financial Impact:** 35 GPUs at $2/hr = ~$613K/year savings.
    - **Conclusion:** **With a ~2 engineer-week cost for Triton development, the ROI is <1 week. Build the kernel.**
