title: 'Systolic Array Evaluation: TPU v5e vs H100 for Training Transformers'
scenario: Compare TPU v5e vs H100 for training a GPT-2-large model (774M params, 36 layers, hidden=1280). Calculate arithmetic intensity, memory vs compute bottleneck, and time per training step at batch=64, seq=1024.
question: What H100 FP16 ridge point should you use, and when are decode and prefill compute- versus memory-bound?
details:
  realistic_solution: The H100 ridge point is 295 FLOPs/byte. Decode is deeply memory-bound because arithmetic intensity is low (approx 1 FLOPs/byte). Prefill becomes compute-bound when the product of batch and sequence length exceeds 295.
  common_mistake: |
    **The Pitfall:** Using the wrong TFLOPS numbers (e.g., FP8 sparse instead of FP16 dense) and ignoring activation memory footprint.
    **The Rationale:** Candidates often pull the highest marketing number from spec sheets without verifying the precision mode used for standard training.
    **The Consequence:** Calculating a severely skewed arithmetic intensity ridge point, leading to completely incorrect conclusions about whether the system is compute or memory bound.
  napkin_math: |
    1. **H100 specs:** 989 TFLOPS FP16, 3.35 TB/s HBM3 bandwidth.
    2. **H100 ridge point:** $989 \times 10^{12} / 3.35 \times 10^{12} = \mathbf{295 \text{ FLOPs/byte}}$.
    3. **Decode (batch=1):** Arithmetic Intensity $AI = 2N / (2N \text{ bytes}) = \mathbf{1 \text{ FLOPs/byte}}$. Since $1 \ll 295$, it is heavily memory-bound.
    4. **Prefill (batch=B, seq=S):** $AI = 2 \times B \times S \times N / (2N) = B \times S$. It becomes compute-bound when $B \times S > 295$.
