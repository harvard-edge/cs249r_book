title: 'Systolic Array Evaluation: TPU v5e vs H100 for Training Transformers'
scenario: Compare TPU v5e (16GB HBM, 197 TFLOPS BF16, 819 GB/s) vs H100 (80GB HBM3,
  1979 TFLOPS BF16, 3350 GB/s) for training a GPT-2-large model (774M params, 36 layers,
  hidden=1280). Calculate arithmetic intensity, memory vs compute bottleneck, and
  time per training step at batch=64, seq=1024.
question: What H100 FP16 ridge point should you use, and when are decode and prefill
  compute- versus memory-bound?
details:
  realistic_solution: 'H100 ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte (not
    591 which uses 1979 TFLOPS). Decode is memory-bound (AI≈1), prefill is compute-bound
    when batch×seq > 295.'
  common_mistake: Not adjusting for training (backward pass = 2x FLOPs of forward)
    and not accounting for activation memory, which may cause the H100 to spill to
    slower memory tiers.
  napkin_math: 'H100 FP16: 989 TFLOPS (not 1979). H100 ridge point: 989 TFLOPS / 3.35
    TB/s = 295 FLOPs/byte. Arithmetic intensity must exceed 295 to be compute-bound.
    Decode (batch=1): AI = 2N / (2N bytes) = 1 FLOPs/byte << 295 → memory-bound. Prefill
    (batch=B, seq=S): AI = 2×B×S×N / (2N) = B×S → compute-bound when B×S > 295.'
