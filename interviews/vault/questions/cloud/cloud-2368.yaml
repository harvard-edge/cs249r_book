title: RoCEv2 vs InfiniBand Congestion Control
scenario: You are architecting the network for an 8,192 GPU multi-tenant cluster. You must choose between
  InfiniBand (NDR 400G) and Ethernet with RoCEv2 (400G). During multi-tenant training, incast traffic
  (64 senders transmitting to 1 receiver simultaneously) is common. InfiniBand uses credit-based flow
  control, while RoCEv2 uses Priority Flow Control (PFC) combined with DCQCN. Analyze the tradeoff between
  these two technologies specifically regarding incast congestion and network deadlocks.
details:
  realistic_solution: "InfiniBand (IB) uses a native credit-based flow control mechanism. A sender only\
    \ transmits if it knows the receiver has buffer space. Under incast (64:1), IB smoothly throttles\
    \ the senders at the source, preventing switch buffer overflow without dropping packets or spreading\
    \ congestion. \n\nRoCEv2 relies on Ethernet, which is natively lossy. To make it lossless for RDMA,\
    \ it uses Priority Flow Control (PFC). When a switch buffer fills during an incast, it sends a PFC\
    \ 'pause' frame upstream. This causes 'congestion spreading'—a single congested port can pause an\
    \ entire spine switch, cascading down to unrelated tenants (victim flows). Furthermore, cyclic buffer\
    \ dependencies can cause PFC deadlocks, requiring complex watchdog timers to drop packets and break\
    \ the lock, triggering expensive Go-Back-N retransmissions. \n\nTo mitigate this, RoCEv2 uses DCQCN\
    \ (Data Center Quantized Congestion Notification) to rate-limit senders before PFC is triggered. However,\
    \ DCQCN requires careful tuning of ECN (Explicit Congestion Notification) thresholds and relies on\
    \ a control loop that takes multiple RTTs to react. The tradeoff: InfiniBand provides predictable,\
    \ highly isolated performance under heavy incast via hardware credit loops, but at a premium cost\
    \ and vendor lock-in. RoCEv2 leverages cheaper, multi-vendor Ethernet but requires complex, fragile\
    \ tuning of PFC/DCQCN parameters, risking multi-tenant interference (victim flows) during microbursts."
  common_mistake: Claiming RoCEv2 is strictly inferior because it drops packets, ignoring that PFC makes
    RoCEv2 lossless but introduces congestion spreading and deadlocks.
  napkin_math: Incast 64 senders at 400 Gbps = 25.6 Tbps destined for a 400 Gbps port. Switch buffer =
    64 MB. Time to fill buffer = 64 MB / (25.6 Tbps - 400 Gbps) = 64 MB / 3.15 TB/s ≈ 20 microseconds.
    DCQCN reaction time (several RTTs) might be 10-15us, leaving a very narrow margin before PFC pause
    is triggered.
