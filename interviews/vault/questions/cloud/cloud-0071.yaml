title: The Interconnect Latency Ladder (cloud-0071)
scenario: You're diagnosing a training job slowdown. To start, you want to sanity check your understanding
  of the system's latency characteristics. Which of these three operations has the highest latency (is
  the slowest)?
question: "Which of these three operations has the highest latency (is the slowest)?"
details:
  realistic_solution: The InfiniBand NDR hop has the highest latency. Communication that leaves the server
    and traverses the network (inter-node) is always significantly slower than communication within the
    server (intra-node).
  common_mistake: Engineers often confuse bandwidth with latency. InfiniBand has enormous bandwidth (400
    Gbps), so it's easy to assume it's the 'fastest'. However, latency is dominated by the physical distance
    and number of hops. A network trip, even over fast fiber, is vastly slower than on-board communication.
  napkin_math: 'Comparing intra-node and inter-node latencies: NVLink (GPU-to-GPU) is ~500ns. PCIe (GPU-to-CPU)
    is ~1,000ns. InfiniBand (Node-to-Node) is ~5,000ns. InfiniBand has the highest latency because the
    data must be packed, routed through a NIC, sent over physical cables to a Top-of-Rack switch, and
    unpacked on the destination server.'
  options:
  - NVLink 4.0 Transfer
  - PCIe Gen5 Transfer
  - InfiniBand NDR Hop
  - They are all roughly the same latency
  correct_index: 2
