title: The Arithmetic Intensity Test
scenario: An engineer is profiling a kernel that performs a large, element-wise vector addition (`C[i]
  = A[i] + B[i]`) on an H100 GPU using FP16 precision. Will this operation's performance be primarily
  limited by the GPU's compute power or its memory bandwidth?
details:
  realistic_solution: The operation will be **memory-bound**. To determine this, we calculate the arithmetic
    intensity (AI) of the operation—the ratio of floating-point operations (FLOPs) to bytes moved from
    memory.
  common_mistake: Engineers often assume that any mathematical operation on a GPU is compute-bound. They
    see the massive TFLOPS number (989 TFLOPS for an H100) and incorrectly believe the GPU can always
    run at that speed, forgetting that the data must first be fetched from memory. This overlooks the
    concept of arithmetic intensity.
  napkin_math: 1. **Identify FLOPs per element:** One addition is 1 FLOP.
  options:
  - Compute-bound, because it's a mathematical operation on a powerful GPU.
  - Memory-bound, because the ratio of compute to data movement is very low.
  - Neither, it's bound by NVLink bandwidth.
  - It depends entirely on the size of the vector.
  correct_index: 1
