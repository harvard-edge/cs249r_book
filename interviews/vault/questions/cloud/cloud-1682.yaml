title: Identifying Dominated Models on the Pareto Frontier
scenario: 'Your ML infrastructure team is benchmarking a family of LLMs for a cloud translation service
  on AWS Inf2 instances ($0.76/hour). The minimum SLA is 45 BLEU. They profile three candidates: Model
  X (45 BLEU, 2000 tokens/sec), Model Y (46 BLEU, 1500 tokens/sec), and Model Z (45 BLEU, 1800 tokens/sec).
  A junior engineer pushes to deploy Model Z because it ''comfortably meets the accuracy SLA with stable
  throughput.'' Using Pareto frontier analysis, diagnose the fundamental flaw in deploying Model Z.'
details:
  realistic_solution: Model Z is strictly dominated by Model X, which achieves the identical accuracy
    (45 BLEU) but higher throughput (2000 vs 1800 tokens/sec). The Pareto frontier only contains Model
    X and Model Y. Deploying Z wastes compute without any corresponding benefit.
  common_mistake: Evaluating models strictly against SLA thresholds rather than assessing whether they
    lie on the Pareto frontier of the optimal trade-off space.
  napkin_math: 'Model X throughput = 7.2M tok/hr (Cost: $0.105 per 1M tokens). Model Z throughput = 6.48M
    tok/hr (Cost: $0.117 per 1M tokens). At 1 billion tokens per day, Model Z costs $117/day vs $105/day
    for Model X, wasting ~$4,380 annually for zero accuracy gain.'
