title: Optimizing Data Pruning for Large Language Model Training on AMD MI300X
scenario: Your team is training a colossal Large Language Model (LLM) on a cluster powered by AMD MI300X accelerators. You've identified that the vast, noisy training dataset (currently 100TB) is causing significant training bottlenecks and potentially leading to model collapse risks.
question: How would you approach identifying and implementing an effective data pruning strategy, considering the unique characteristics of the hardware?
details:
  realistic_solution: Implement an active learning-based coreset selection or curriculum learning approach. This involves iteratively evaluating data points based on their novelty, uncertainty, or contribution to model convergence. For instance, using methods like GLUE (Gradient-based Least Uncertainty Estimation) or a simple diversity-based sampling (e.g., k-means clustering on feature embeddings) to select a representative subset. Crucially, the pruning mechanism should operate efficiently enough not to become the new bottleneck, potentially leveraging high HBM3 bandwidth for fast data access during evaluation steps, and be flexible enough to dynamically adjust the pruned set as the model learns. Pre-processing and embedding generation for selection should be carefully optimized.
  common_mistake: |
    **The Pitfall:** Applying naive data sampling or simple deduplication.
    **The Rationale:** Engineers try to quickly reduce dataset size using traditional Big Data techniques.
    **The Consequence:** This leads to the loss of rare but critical information, introduces biases, and ignores the severe I/O bottlenecks involved in processing 100TB of raw text.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100TB raw data = ~10^11 records (assuming 1KB average).
    - 10ms CPU time per record for embedding generation.

    **Calculations:**
    - Compute Challenge: 10^11 records * 10ms = 10^9 seconds = ~31.7 compute-years.
    - Parallelization via sparse compute is strictly required.
    - Pruning to 10% yields 10TB. At 192GB HBM3 per card, 10240GB / 192GB = ~53.3 cards needed to hold the pruned dataset in memory.

    **Conclusion & Interpretation:**
    - **Result: Exceeds memory capacity (Embedding-Compute-Bound)**. Even a 10% pruned dataset won't fit entirely in memory, necessitating streaming active learning.
