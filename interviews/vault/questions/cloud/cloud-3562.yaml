title: Optimizing Data Pruning for Large Language Model Training on AMD MI300X
scenario: Your team is training a colossal Large Language Model (LLM) on a cluster powered by AMD MI300X accelerators (192 GB HBM3, 1,307 TFLOPS FP16, 5.3 TB/s bandwidth). You've identified that the vast, noisy training dataset (currently 100TB) is causing significant training bottlenecks and potentially leading to model collapse risks.
question: How would you approach identifying and implementing an effective data pruning strategy, considering the unique characteristics of the MI300X?
details:
  realistic_solution: Implement an active learning-based coreset selection or curriculum learning approach. This involves iteratively evaluating data points based on their novelty, uncertainty, or contribution to model convergence. For instance, using methods like GLUE (Gradient-based Least Uncertainty Estimation) or a simple diversity-based sampling (e.g., k-means clustering on feature embeddings) to select a representative subset. Crucially, the pruning mechanism should operate efficiently enough not to become the new bottleneck, potentially leveraging the MI300X's high HBM3 bandwidth for fast data access during evaluation steps, and be flexible enough to dynamically adjust the pruned set as the model learns. Pre-processing and embedding generation for selection should be carefully optimized, possibly leveraging the MI300X's FP16 sparse compute for these tasks.
  common_mistake: |
    **The Pitfall:** Applying naive data sampling or simple deduplication.
    **The Rationale:** Engineers try to quickly reduce dataset size using traditional Big Data techniques.
    **The Consequence:** This leads to the loss of rare but critical information, introduces biases, and ignores the severe I/O bottlenecks involved in processing 100TB of raw text.
  napkin_math: |
    1. **Compute Challenge:** 100TB raw data ≈ 10^11 records (assuming 1KB average). At 10ms CPU time per record for embedding generation, it takes ~31.7 compute-years.
    2. **Parallelization:** Highly parallelized strategies using the MI300X's 1,307 TFLOPS FP16 are strictly required for rapid embedding generation.
    3. **Memory Bottleneck:** Pruning to 10% yields 10TB. At 192GB HBM3 per MI300X, 10240GB / 192GB ≈ 53.3 cards are needed to hold the pruned dataset in memory.
    4. **Conclusion:** **Even a 10% pruned dataset won't fit entirely in HBM3 across a modest cluster**, necessitating efficient data streaming and caching strategies alongside active learning.
