title: The Reproducibility Paradox
scenario: Your research team trains a model that achieves state-of-the-art results. When the production team retrains with the 'same' code and data, accuracy is 3% lower. They try 5 more times — each run produces a different result, varying by up to 2%. The research team insists their code is deterministic.
question: "Where are the hidden sources of non-determinism, and what does it cost to eliminate them on a modern GPU cluster?"
details:
  realistic_solution: 'There are at least five layers of non-determinism in GPU training: (1) **cuDNN autotuning** — cuDNN benchmarks multiple kernel implementations at startup and picks the fastest; different runs may select different kernels with different numerical properties. Fix: `torch.backends.cudnn.deterministic = True` (5-15% slower). (2) **Atomic floating-point reductions** — operations like `scatter_add`, batch norm, and attention use atomic adds on GPU, which are non-associative in floating point; the order depends on thread scheduling. Fix: use deterministic algorithms (`torch.use_deterministic_algorithms(True)`), which disables some fast kernels. (3) **Multi-GPU gradient reduction** — NCCL AllReduce order varies with network timing; FP16 gradient summation in different orders produces different results. Fix: enforce a fixed reduction tree (slower). (4) **Data loading order** — multi-worker DataLoader with `shuffle=True` produces different orderings even with the same seed if worker count or prefetch factor changes. Fix: use a deterministic sampler with explicit seed. (5) **Hardware variation** — different GPU silicon (even same model) has slightly different FP rounding behavior. Fix: impossible without emulation.'
  common_mistake: |
    **The Pitfall:** Assuming that setting the random seed guarantees perfect reproducibility.
    **The Rationale:** Software engineers are accustomed to pseudo-random number generators where a fixed seed dictates a precise sequence of events.
    **The Consequence:** Wasting days debugging "flawed" code when the variation is actually driven by hardware-level non-determinism like atomic floating-point reductions and dynamic cuDNN autotuning.
  napkin_math: |
    - Performance cost of full determinism: cuDNN (-10%), deterministic algorithms (-15%), fixed NCCL reduction (-5%) = ~30% slower training.
    - For a 72-hour training run: 72 / 0.70 = 103 hours deterministic.
    - Extra cost: 31 hrs * 8 GPUs * $2/hr = $496 per run.
    - **Five reproducible runs cost an extra $2,480 in determinism tax, which is why most teams accept ±1% variance and just run 3 seeds for confidence intervals.**
