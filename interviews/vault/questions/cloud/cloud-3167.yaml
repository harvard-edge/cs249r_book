title: Tree-Structured Speculation vs Linear Speculation
scenario: Compare linear speculation (K=5 sequential draft tokens) with tree-structured
  speculation (branching factor 2, depth 3, total 7 draft tokens) for a 70B target
  on 4x H100. Draft acceptance rate alpha=0.75. Which produces more accepted tokens per
  verification round, and what is the verification cost difference?
question: Which produces more accepted tokens per verification round, and what is
  the verification cost difference?
details:
  realistic_solution: 'Linear (K=5, alpha=0.75): E[accepted] = (1-0.75^6)/0.25 = 3.29
    tokens. For a 70B model (140GB) on 4x H100 (13.4 TB/s aggregate), batch=1 verification is memory-bandwidth bound, taking ~10.5ms (140GB / 13.4 TB/s) regardless of whether K=5 or K=7. Tree (depth=3, branch=2, 7 nodes): explores 2 branches at each level, empirically yielding E~3.8 tokens vs linear 3.29, a 16% improvement. However, tree attention requires a sparse causal mask with a tree structure. FlashAttention must handle this non-contiguous mask, reducing memory read efficiency and adding ~10% overhead (~11.6ms total verify time). Net throughput ignoring draft time: Tree yields 3.8 tokens / 11.6ms = 327.6 tok/s. Linear yields 3.29 tokens / 10.5ms = 313.3 tok/s. Tree speculation wins by amortizing the massive memory-bound verification cost over more accepted tokens, despite the mask overhead.'
  common_mistake: Assuming tree speculation always wins. Trees explore more paths
    but require more compute for verification (processing 7 vs 5 tokens) and the tree
    attention mask is more complex, reducing FlashAttention efficiency.
  napkin_math: 'Linear: 3.29 tokens, ~10.5ms verify. Tree(7): 3.8 tokens, ~11.6ms verify (+10% mask overhead). Tree throughput: 327.6 tok/s. Linear: 313.3 tok/s. Memory bandwidth is the true bottleneck, not FLOPs, making the marginal cost of verifying 7 vs 5 tokens negligible compared to the 140GB weight read.'
