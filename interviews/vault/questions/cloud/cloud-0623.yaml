title: The Memory Dilemma
scenario: Your team is designing a custom ML accelerator optimized for large Transformer models with exceptionally long context windows. You need to choose between integrating HBM (High Bandwidth Memory) or GDDR6 for the on-board memory.
question: For a long-context Transformer accelerator, would you choose HBM or GDDR6, and what trade-offs justify that choice?
details:
  realistic_solution: "For large Transformer models with long context windows, the primary performance bottleneck often shifts from pure compute to **memory bandwidth** and **memory capacity**.\n  1.  **HBM (High Bandwidth Memory - e.g., HBM2e, HBM3):**\n      *   **Pros:** Extremely high bandwidth (e.g., 2-4 TB/s for HBM3), lower power consumption per bit, smaller footprint due to 3D stacking. This is critical for memory-bound operations like large embedding table lookups, attention mechanisms (which involve frequent, large data movements), and loading massive model weights and activations for long sequences.\n      *   **Cons:** Lower total capacity per stack (e.g., 16-128GB), higher cost per GB, more complex integration (requires interposer).\n  2.  **GDDR6 (e.g., GDDR6X):**\n      *   **Pros:** Higher total capacity (e.g., 24-48GB per chip, multiple chips can be used), lower cost per GB, simpler integration into PCBs.\n      *   **Cons:** Lower bandwidth compared to HBM (e.g., 1 TB/s for GDDR6X), higher power consumption per bit, larger physical footprint."
  common_mistake: |
    **The Pitfall:** Claiming "HBM is always superior due to higher bandwidth" or "GDDR6 is cheaper, so it's the practical choice."
    **The Rationale:** Candidates default to extreme rules-of-thumb instead of calculating the exact arithmetic intensity of long-context attention to prove the system is memory-bound.
    **The Consequence:** Designing custom silicon that is severely misaligned with the intended workload, wasting millions in fabrication costs.
  napkin_math: |
    - A 175B parameter FP16 model requires $\approx 350\text{ GB}$ of memory for weights.
    - Long context activations add another $\approx 100\text{ GB}$. Total memory = $450\text{ GB}$.
    - If the accelerator has 100 TFLOPS compute and an arithmetic intensity of 10 FLOP/Byte:
    - Required bandwidth = $100\text{ TFLOP/s} / 10\text{ FLOP/Byte} = \mathbf{10\text{ TB/s}}$.
    - **Result:** HBM (e.g., 4 TB/s) gets far closer to this ideal than GDDR6 (e.g., 1 TB/s).
