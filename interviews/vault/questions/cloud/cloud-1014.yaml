title: Diagnosing Static Preprocessing Latency
scenario: You are profiling a PyTorch vision pipeline deployed on an NVIDIA T4 GPU via TorchScript. The
  model graph includes an extensive preprocessing block containing normalization operations (mean and
  variance scaling) using static parameters loaded from a configuration file, followed by deterministic
  affine transformations. The profiler shows these preprocessing operations consume 2.5ms out of the 15ms
  total inference latency. Why are these operations burning GPU cycles at runtime, and how do you eliminate
  this overhead without altering the numerical output?
details:
  realistic_solution: Diagnose the issue as missing constant folding. Because the model parameters weren't
    explicitly frozen, the JIT compiler treats the static configuration tensors as dynamic variables.
    By applying `torch.jit.freeze()` to the scripted model, the compiler aggressively constant-folds the
    static normalization and affine parameters into pre-computed constants at compile time, eliminating
    the runtime overhead.
  common_mistake: Candidates often suggest writing custom fused CUDA kernels to accelerate the preprocessing,
    or they assume the standard TorchScript tracer automatically optimizes out all static configuration
    tensors.
  napkin_math: Original latency = 2.5ms. The pipeline performs 5 sequential operations with static tensors.
    Freezing pre-computes these into the graph, saving 5 separate CUDA kernel launches and global memory
    reads for the constants. Post-folding latency drops to ~0.1ms, saving 2.4ms (a 16% reduction in the
    total 15ms latency).
