title: Evaluating GPU Energy Metrics under Diurnal Load
scenario: Your team benchmarks an INT8 quantized model against an FP16 baseline on an A100 (400W TDP, 100W idle). The script runs continuous inference for 60s and reads `nvidia-smi` power. The report concludes INT8 draws 300W while FP16 draws 350W, yielding a 14% energy savings. Evaluate the fundamental flaws in this methodology before approving a fleet-wide rollout for a service with highly diurnal traffic (peak 10k QPS, trough 1k QPS).
question: What is flawed about comparing INT8 and FP16 by 60s nvidia-smi power alone, and what energy metric should guide rollout?
details:
  realistic_solution: Benchmarking must measure Energy per Query (Joules/query) across the full utilization curve, not just continuous peak power. Because INT8 increases throughput, it completes batches faster and drops to idle. The metric must integrate active power over the shortened execution time, plus the static idle power during the remainder of the observation window.
  common_mistake: |
    **The Pitfall:** Conflating power (Watts) with energy (Joules) and ignoring throughput speedup.
    **The Rationale:** Candidates often accept the continuous power delta as the energy savings, failing to account for task completion time and static idle power during diurnal traffic troughs.
    **The Consequence:** Flawed ROI calculations that severely underestimate the actual cost savings and efficiency of quantized models.
  napkin_math: |
    1. **Calculate Baseline FP16 Energy:** Assume FP16 maxes out at 1000 QPS: 350W / 1000 = 0.35 J/query.
    2. **Calculate INT8 Energy:** Assume INT8 doubles throughput to 2000 QPS: 300W / 2000 = 0.15 J/query.
    3. **Calculate Peak Energy Savings:** True peak energy savings is (0.35 - 0.15) / 0.35 = 57%, not 14%.
    4. **Calculate Trough Energy (1k QPS):** INT8 takes 0.5s active (150J) + 0.5s idle (50J) = 200J.
    5. **Calculate Trough Savings:** True energy savings at trough drops to (350 - 200) / 350 = 42% due to static power dominance.
    **Final Result: True energy savings is 57% at peak and 42% at trough, not 14%.**
