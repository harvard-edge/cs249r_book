title: Evaluating GPU Energy Metrics under Diurnal Load
scenario: 'Your team benchmarks an INT8 quantized model against an FP16 baseline on an A100 (400W TDP,
  100W idle). The script runs continuous inference for 60s and reads `nvidia-smi` power. The report concludes:
  ''INT8 draws 300W while FP16 draws 350W, yielding a 14% energy savings.'' Evaluate the fundamental flaws
  in this methodology before approving a fleet-wide rollout for a service with highly diurnal traffic
  (peak 10k QPS, trough 1k QPS).'
question: "What is flawed about comparing INT8 and FP16 by 60s nvidia-smi power alone, and what energy metric should guide rollout?"
details:
  realistic_solution: Benchmarking must measure Energy per Query (Joules/query) across the full utilization
    curve, not just continuous peak power. Because INT8 increases throughput, it completes batches faster
    and drops to idle. The metric must integrate active power over the shortened execution time, plus
    the static idle power during the remainder of the observation window.
  common_mistake: Conflating power (Watts) with energy (Joules) and ignoring throughput speedup. Candidates
    often accept the continuous power delta as the energy savings, failing to account for task completion
    time and static idle power during diurnal traffic troughs.
  napkin_math: 'Assume FP16 maxes out at 1000 QPS: 350W / 1000 = 0.35 J/query. Assume INT8 doubles throughput
    to 2000 QPS: 300W / 2000 = 0.15 J/query. True peak energy savings is 57% ((0.35-0.15)/0.35), not 14%.
    At 1k QPS trough: INT8 takes 0.5s active (150J) + 0.5s idle (50J) = 200J. True energy savings at trough
    drops to 42% ((350-200)/350) due to static power dominance.'
