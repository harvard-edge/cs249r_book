title: Tensor Parallelism Scaling Efficiency Measurement
scenario: 'You''re evaluating whether to scale from TP=4 to TP=8 for a 13B model on H100. At TP=4, throughput is 450 tokens/sec/GPU. At TP=8, total throughput is 2100 tokens/sec.'
question: 'What is the scaling efficiency from TP=4 to TP=8, and what bottleneck explains the 2100 tokens/sec result?'
details:
  realistic_solution: 'Calculate scaling efficiency correctly. The bottleneck is all-reduce communication overhead: at TP=8, there are more synchronization points and the all-reduce ring involves more participants.'
  common_mistake: |
    **The Pitfall:** Calculating scaling efficiency as absolute throughput growth (new / old).
    **The Rationale:** Candidates divide 2100 by 1800 to get 116%, confusing the total system throughput increase with the marginal efficiency of the newly added hardware.
    **The Consequence:** The team significantly overestimates the cost-effectiveness of scaling up TP, leading to poor resource allocation and unexpected training costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TP=4 Throughput: 450 tok/s/GPU (1800 total).
       - TP=8 Throughput: 2100 tok/s total.
    2. **Calculations:**
       - Perfect TP=8 Throughput = 450 * 8 = 3600 tok/s.
       - Scaling Efficiency = 2100 / 3600 = 58.3%.
       - Comm Volume TP=8: 2*(8-1)/8 = 1.75x.
       - Comm Volume TP=4: 2*(4-1)/4 = 1.5x.
       - Volume Increase = (1.75 - 1.5) / 1.5 = 16.7%.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound. A 16.7% increase in communication volume causes a 41.7% drop in efficiency, highlighting that NCCL latency dominates at higher TP.**
