title: Tensor Parallelism Scaling Efficiency Measurement
scenario: You're evaluating whether to scale from TP=4 to TP=8 for a 13B model on H100 (NVLink 900GB/s). At TP=4, throughput is 450 tokens/sec/GPU (4 GPUs = 1800 total). At TP=8 (8 GPUs), total throughput is 2100 tokens/sec.
question: What is the scaling efficiency from TP=4 to TP=8, and what bottleneck explains the 2100 tokens/sec result?
details:
  realistic_solution: 'Scaling efficiency = (throughput_TP8 / throughput_TP4) / (GPUs_TP8 / GPUs_TP4) = (2100/1800) / (8/4) = 1.167 / 2 = 58.3%. Each additional GPU contributes only 58.3% of the value of the original 4 GPUs. The bottleneck is all-reduce communication overhead: at TP=8, 7 synchronization points vs 3 at TP=4, and the all-reduce ring involves more participants.'
  common_mistake: |
    **The Pitfall:** Calculating scaling efficiency as absolute throughput growth (new / old).
    **The Rationale:** Candidates divide 2100 by 1800 to get 116%, confusing the total system throughput increase with the marginal efficiency of the newly added hardware.
    **The Consequence:** The team significantly overestimates the cost-effectiveness of scaling up TP, leading to poor resource allocation and unexpected training costs.
  napkin_math: |
    - **Theoretical Perfect TP=8 Throughput:** 450 tok/s/GPU × 8 GPUs = 3600 tok/s.
    - **Actual TP=8 Throughput:** 2100 tok/s.
    - **Scaling Efficiency:** 2100 / 3600 = **58.3%**.
    - **Communication Overhead Analysis:** All-reduce data transfer at TP=8 is 2×(8-1)/8 = 1.75× activation size. At TP=4, it's 2×(4-1)/4 = 1.5×. 
    - **Volume Increase:** (1.75 - 1.5) / 1.5 = 16.7% more communication volume, yet efficiency dropped by 41.7%, highlighting that NCCL latency and synchronization barriers dominate at higher TP degrees.
