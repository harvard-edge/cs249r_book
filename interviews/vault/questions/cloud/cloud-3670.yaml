title: Tensor Parallelism Scaling Efficiency Measurement
scenario: You're evaluating whether to scale from TP=4 to TP=8 for a 13B model on
  H100 (80GB HBM3, NVLink 900GB/s). At TP=4, throughput is 450 tokens/sec/GPU (4 GPUs
  = 1800 total). At TP=8 (8 GPUs), total throughput is 2100 tokens/sec. Calculate
  scaling efficiency and explain the bottleneck.
question: What is the scaling efficiency from TP=4 to TP=8, and what bottleneck explains
  the 2100 tokens/sec result?
details:
  realistic_solution: 'Scaling efficiency = (throughput_TP8 / throughput_TP4) / (GPUs_TP8
    / GPUs_TP4) = (2100/1800) / (8/4) = 1.167 / 2 = 58.3%. Each additional GPU contributes
    only 58.3% of the value of the original 4 GPUs. The bottleneck is all-reduce communication
    overhead: at TP=8, 7 synchronization points vs 3 at TP=4, and the all-reduce ring
    involves more participants.'
  common_mistake: Calculating scaling efficiency as (new throughput / old throughput)
    = 2100/1800 = 116% — this is absolute throughput growth, not efficiency. Scaling
    efficiency measures how well additional GPUs are utilized relative to perfect
    linear scaling.
  napkin_math: 'TP=4: 450 tok/s/GPU, 4 GPUs. Perfect TP=8 would give 450*8=3600 tok/s. Actual: 2100. Efficiency = 2100/3600 = 58.3%. Lost throughput = 1500 tok/s = 42% wasted on communication. All-reduce at TP=8: data transferred is 2*(8-1)/8 = 1.75x of activation size vs 2*(4-1)/4 = 1.5x at TP=4. Communication volume increase: (1.75-1.5)/1.5 = 16.7% more comm overhead. Actual efficiency loss is 41.7% — higher than predicted, suggesting other bottlenecks (NCCL latency, synchronization barriers).'
