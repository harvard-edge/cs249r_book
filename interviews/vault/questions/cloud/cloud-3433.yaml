title: Optimizing 3D Parallelism for Frontier LLM Training on AMD MI300X
scenario: You are tasked with training a 1 trillion parameter LLM on a cluster of AMD MI300X accelerators (192 GB HBM3, 1,307 TFLOPS FP16). The model requires a total memory footprint of approximately 2 PB for activations and weights during training.
question: "How would you combine data, tensor, and pipeline parallelism on MI300X for a 1T-parameter LLM with a 2 PB training footprint?"
details:
  realistic_solution: 'Implement a hybrid approach: ZeRO-3 for data parallelism to offload optimizer states and gradients to host memory/NVMe where possible, significantly reducing memory footprint per MI300X. Tensor parallelism (e.g., Megatron-LM style) would be applied within tightly-coupled MI300X nodes (e.g., within a single server chassis) to exploit high intra-node bandwidth. Pipeline parallelism would then distribute model layers across these tensor-parallel groups, forming a larger distributed system. Quantization (e.g., FP8) should be explored to further reduce memory requirements.'
  common_mistake: |
    **The Pitfall:** Applying naive tensor parallelism across nodes without sufficient inter-node bandwidth.
    **The Rationale:** Candidates focus entirely on memory capacity (192GB per chip) and forget that TP is extremely communication-heavy.
    **The Consequence:** The training process becomes entirely communication-bound over the slower inter-node network, wasting the massive 1,307 TFLOPS compute capacity.
  napkin_math: |
    - Weights (FP16): 1 trillion params × 2 bytes = 2 TB.
    - Activations/Optimizer States: Typically require 2-4x the weight memory. Total footprint ≈ 6-8 TB minimum (ignoring the 2 PB extreme peak).
    - Raw storage capacity: 6000 GB / 192 GB per MI300X ≈ 32 accelerators just to hold the static memory.
    - **Advanced parallelism (TP within a node, PP across nodes, and ZeRO-3 for memory offloading) is absolutely mandatory to fit the model and prevent bandwidth bottlenecks.**
