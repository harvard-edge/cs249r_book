title: The Batch Size Sweet Spot
scenario: You're serving a 7B LLM on a single H100. At batch=1, you measure 35 tokens/sec. At batch=64,
  you measure 1,800 tokens/sec. Why does throughput increase 51× with only 64× more work? At what batch
  size do you expect diminishing returns?
details:
  realistic_solution: 'At batch=1, LLM decode is deeply memory-bound (arithmetic intensity ≈ 1 Op/Byte).
    The GPU reads all 14 GB of weights from HBM for each token but does minimal compute per byte moved.
    Throughput is limited by HBM bandwidth: 3.35 TB/s / 14 GB = 239 tokens/sec theoretical (35 actual
    due to kernel launch overhead and memory access patterns). Increasing batch size reuses the same weight
    reads across multiple requests, increasing arithmetic intensity linearly (at BS=B, intensity ≈ B Ops/Byte).
    Once intensity exceeds the ridge point (295 Ops/Byte on H100), the workload becomes compute-bound
    and throughput saturates. Diminishing returns start around BS≈295, but you hit the VRAM capacity wall
    first: KV cache per request at 2K context ≈ 0.5 GB. At BS=128: 64 GB KV cache + 14 GB weights = 78
    GB — barely fits in 80 GB. Practical max batch ≈ 128, yielding ~3,400 tokens/sec.'
  common_mistake: '"Throughput should scale linearly with batch size." It does initially (when memory-bound),
    but saturates when the workload becomes compute-bound.'
  napkin_math: '7B model, FP16 = 14 GB weights. H100: 3.35 TB/s bandwidth, 989 TFLOPS. Batch=1: intensity
    = $2 \times 7\text{B} / 14\text{GB} = 1$ Op/Byte. Throughput = 3.35T × 1 / (2 × 7B) = 239 tokens/sec
    theoretical (35 actual due to overhead). Batch=$B$: intensity = $B$ Ops/Byte. Ridge point = 295 Ops/Byte.
    **Diminishing returns start at $B \approx 295$** — but you''ll hit VRAM limits first. KV-cache per
    request at 2k context: ~0.5 GB. At batch=64: 32 GB KV-cache + 14 GB weights = 46 GB → fits in 80 GB.
    At batch=295: 147 GB KV-cache → **OOM**. Practical maximum batch: $(80 - 14 - 2) / 0.5 \approx 128$.
    Throughput at batch=128: ~3,400 tokens/sec. The 51× scaling at batch=64 reflects moving from 1/295
    = 0.34% compute utilization to 64/295 = 21.7%.'
