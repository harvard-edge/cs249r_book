title: Zero-Copy RDMA for Gradient Transfer
scenario: In traditional TCP networking, gradient data follows the path from GPU VRAM to PCIe to CPU memory to kernel network stack to NIC DMA to wire. RDMA eliminates most of these copies.
question: What zero-copy GPUDirect RDMA data path would you use for gradient AllReduce between two GPUs in different nodes?
details:
  realistic_solution: "Zero-copy RDMA path with GPUDirect RDMA: (1) Memory registration: GPU allocates gradient buffer in HBM. The RDMA driver maps a region of GPU VRAM into the HCA's address space via PCIe BAR1 mapping. This creates an MR (Memory Region) with lkey/rkey for RDMA access. (2) Sender posts RDMA Write Work Request (WR) to the Send Queue. (3) HCA DMA engine reads gradient data directly from GPU VRAM via PCIe. (4) HCA segments data into IB packets, adds headers, sends over link. (5) Remote HCA receives packets, DMAs directly into remote GPU VRAM via PCIe. (6) Remote GPU can immediately use the data. Total CPU-memory copies: 0."
  common_mistake: |
    **The Pitfall:** Assuming standard RDMA directly accesses GPU VRAM across the network.
    **The Rationale:** Engineers familiar with host-based RDMA (IB verbs) overlook the GPUDirect requirement which maps GPU VRAM BAR space into the RDMA subsystem's address space.
    **The Consequence:** An additional registration step is missed, causing the system to fallback to staging data in host memory and destroying zero-copy benefits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Traditional TCP Path: GPU \rightarrow CPU (32 GB/s PCIe) + 2 Kernel copies + CPU \rightarrow NIC.
       * Zero-copy RDMA Path (GPUDirect): GPU \rightarrow NIC direct DMA mapping.
    2. **Calculations:**
       * TCP Path bottleneck: Effective throughput collapses to ~10 GB/s due to 4 memory copies and CPU intervention.
       * GPUDirect RDMA bottleneck: Limited only by PCIe/Network speeds (e.g., 64 GB/s PCIe Gen5).
    3. **Conclusion & Interpretation:**
       * Bypassing host memory yields a **~5x throughput increase (~50 GB/s)** while saving CPU cycles. **Result: Memory-Copy-Bound (GPUDirect Resolution)**.
