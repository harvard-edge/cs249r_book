title: 'KV Cache Footprint: Decoder vs Encoder-Decoder'
scenario: You are evaluating models for a summarization service on a single GPU. You must choose between a 24-layer Decoder-only model and an Encoder-Decoder model with 12 encoder layers and 12 decoder layers. Both models use a hidden dimension of 4096 and FP16 precision (2 bytes).
question: What is the exact KV-cache memory footprint after a 1024-token prompt (batch 32) for the decoder-only and encoder-decoder models?
details:
  realistic_solution: 'The Decoder-only model must cache keys and values for all prompt tokens across all 24 layers to avoid recomputing them during generation. The Encoder-Decoder model processes the prompt in the encoder without caching, and only stores the final encoder hidden states in the cross-attention KV cache of its 12 decoder layers. The general formula is: 2 (for K and V) * 2 bytes * layers * hidden_dim * seq_len * batch_size.'
  common_mistake: |
    **The Pitfall:** Assuming the encoder-decoder model caches keys and values across all 24 layers.
    **The Rationale:** Candidates forget that encoder layers do not maintain an autoregressive KV cache and only the 12 decoder layers store the cross-attention cache.
    **The Consequence:** Overestimating the memory requirements for Encoder-Decoder architectures by 2x.
  napkin_math: |
    **Assumptions & Constraints:**
    - Decoder-only: 24 layers, h=4096, seq=1024, B=32, FP16 (2 bytes).
    - Encoder-Decoder: 12 encoder, 12 decoder. Only decoders cache cross-attention.

    **Calculations:**
    - Formula: 2 (K,V) * 2 bytes * layers * h * seq * B.
    - Decoder-only KV Cache = 4 * 24 * 4096 * 1024 * 32 = 12.88 GB.
    - Encoder-Decoder KV Cache = 4 * 12 * 4096 * 1024 * 32 = 6.44 GB.

    **Conclusion & Interpretation:**
    - **Result: Encoder-Decoder uses 50% less KV cache (Memory-Bound)**. Prompts process through the encoder without building an autoregressive cache.
