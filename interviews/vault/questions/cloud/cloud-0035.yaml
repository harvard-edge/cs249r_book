title: The RAG Index Rollout
scenario: You're an ML Systems Engineer managing a fleet-wide assistant for an autonomous vehicle company. The assistant uses a RAG model served from a Kubernetes cluster to answer passenger questions. The knowledge base is a 10 GB vector index file that is updated daily. Your serving cluster has 100 pods, and you perform a rolling update to deploy the new index. Assume the pods fully saturate a shared 400 Gbps InfiniBand network link to the storage.
question: "If all 100 pods attempt to download the 10 GB file simultaneously from your artifact storage, how long would the download phase take?"
details:
  realistic_solution: The correct approach is to first calculate the total amount of data that needs to be transferred for all pods. Then, convert this total data size from Gigabytes (GB) to Gigabits (Gb) to match the units of the network bandwidth. Finally, divide the total data in bits by the network bandwidth in bits per second to find the total time.
  common_mistake: |
    **The Pitfall:** Confusing bits (b) and bytes (B), or calculating the download time for only a single pod.
    **The Rationale:** Engineers often see a 'Gbps' network figure and forget to perform the 8x conversion from bytes to bits, leading to an answer that is 8x too fast.
    **The Consequence:** Grossly underestimating the time required for a fleet-wide rollout, leading to deployment timeouts.
  napkin_math: |
    1. Total data transfer = 100 pods * 10 GB/pod = 1,000 GB.
    2. Network link is 400 Gbps.
    3. Convert to bytes: 400 Gbps / 8 bits/byte = 50 GB/s.
    4. **Download time: 1,000 GB / 50 GB/s = 20 seconds.**
  options:
  - 2.5 seconds
  - 0.2 seconds
  - 20 seconds
  - 0.025 seconds
  correct_index: 2
