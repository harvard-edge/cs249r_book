title: The Node vs. The Network Latency Gap
scenario: 'Your training job is bottlenecked on communication. You''re analyzing a profile and see two
  primary data transfer operations: one between GPUs within the same server node, and another between
  GPUs in different server racks. Roughly how much slower is the cross-rack InfiniBand transfer compared
  to the on-node NVLink transfer, in terms of pure latency?'
details:
  realistic_solution: A cross-rack InfiniBand transfer is approximately 10 times slower than an on-node
    NVLink transfer. NVLink is a specialized, extremely low-latency bus for GPU-to-GPU communication on
    the same physical server. InfiniBand is a high-performance network protocol that has to traverse network
    interface cards (NICs), switches, and meters of optical cable, adding significant latency.
  common_mistake: Engineers often lump all 'fast' interconnects into the same mental bucket, assuming
    they are within 2-3x of each other. They underestimate the massive physical and protocol overhead
    of going 'off-node' (across the network) compared to staying on the same server motherboard.
  napkin_math: 'From the ML Latency Hierarchy:'
  options:
  - Roughly the same speed (within 2x)
  - About 10x slower
  - About 100x slower
  - InfiniBand is faster than NVLink
  correct_index: 1
