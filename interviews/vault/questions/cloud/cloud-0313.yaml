title: The Node vs. The Network Latency Gap
scenario: Your training job is bottlenecked on communication. You're analyzing a profile and see two primary data transfer operations: one between GPUs within the same server node, and another between GPUs in different server racks.
question: Roughly how much slower is a cross-rack InfiniBand transfer compared to an on-node NVLink transfer in terms of pure latency?
details:
  realistic_solution: A cross-rack InfiniBand transfer is approximately 10 times slower than an on-node NVLink transfer. NVLink is a specialized, extremely low-latency bus for GPU-to-GPU communication on the same physical server. InfiniBand is a high-performance network protocol that has to traverse network interface cards (NICs), switches, and meters of optical cable, adding significant latency.
  common_mistake: |
    **The Pitfall:** Lumping all 'fast' interconnects into the same mental bucket.
    **The Rationale:** Engineers assume intra-node and inter-node interconnects are within 2-3x of each other in speed.
    **The Consequence:** They underestimate the massive physical and protocol overhead of going across the network, leading to poor communication topology design.
  napkin_math: |
    - 1. **On-node NVLink latency:** ~1-2 microseconds.
    - 2. **Cross-rack InfiniBand latency:** ~10-20 microseconds (includes NIC, switch, and cable overhead).
    - 3. **Ratio:** 20 / 2 = **~10x slower**.
  options:
  - Roughly the same speed (within 2x)
  - About 10x slower
  - About 100x slower
  - InfiniBand is faster than NVLink
  correct_index: 1
