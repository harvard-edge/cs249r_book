title: Diagnosing ViT Data Pipeline Stalls
scenario: Your team is training a Vision Transformer (ViT) on a node with 8x H100 GPUs. Nsight Systems profiling reveals the average training step time is 120ms, but the pure GPU compute kernel execution time is only 90ms. The training job uses PyTorch's DataLoader with 4 CPU workers per GPU, streaming 1MB high-resolution images over a 200 Gbps networked storage backend. During the 30ms stall gap, CPU utilization is pegged at 100% while network I/O only hits 20% of its available capacity.
question: What is the data stall ratio, and is the 30 ms gap caused by network I/O or CPU preprocessing?
details:
  realistic_solution: The data stall ratio is 25% (30ms of 120ms). Since network I/O (40ms for 1GB at 25 GB/s) can be fully overlapped with 90ms of compute, the stall is not from the network. CPU utilization at 100% confirms the bottleneck is CPU-bound image decompression and augmentation. Offload JPEG decoding and augmentations to the GPU using NVIDIA DALI, eliminating the CPU bottleneck and recovering the 30ms stall.
  common_mistake: |
    **The Pitfall:** Assuming the networked storage bandwidth (I/O) is the bottleneck simply because data is fetched remotely.
    **The Rationale:** Candidates often see remote storage and immediately assume network I/O is the culprit, overlooking CPU preprocessing overhead.
    **The Consequence:** Recommending an expensive upgrade to higher-tier NAS or SSDs when the actual bottleneck is CPU preprocessing throughput, resulting in wasted budget and no performance gain.
  napkin_math: |
    1. **Stall Time:** Total Step (120ms) - Compute (90ms) = 30ms.
    2. **Stall Ratio:** 30ms / 120ms = 25%.
    3. **Network capacity:** 200 Gbps (25 GB/s).
    4. **Image Data:** Fetching 1024 images (1MB each) per step = ~1GB.
    5. **Network transfer time:** 1GB / 25GB/s = 40ms.
    6. **Overlap Analysis:** Since compute (90ms) > network (40ms), I/O can be perfectly overlapped.
    7. **Conclusion:** **The 30ms delay is entirely due to the CPU failing to decode and augment images fast enough.**
