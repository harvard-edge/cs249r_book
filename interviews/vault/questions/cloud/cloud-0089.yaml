title: 'The RAG Latency Trap: Compound AI Systems'
scenario: A user query to a chatbot triggers a Retrieval-Augmented Generation (RAG) pipeline. The first step is a lookup in a vector database index stored on a local NVMe SSD. The second step is feeding the retrieved context to an LLM for response generation.
question: Which of these two stages is the dominant source of latency in the RAG pipeline?
details:
  realistic_solution: The LLM generation stage is, by far, the dominant source of latency. A lookup from a local NVMe SSD is an extremely fast operation, typically taking around 100 microseconds. In contrast, generating a response from a multi-billion parameter LLM is a memory-bandwidth-bound process that takes hundreds of milliseconds, even on a top-tier GPU. The generation phase is several orders of magnitude slower than the retrieval phase.
  common_mistake: |
    **The Pitfall:** Assuming that disk I/O (the database lookup) is always the slowest part of any operation.
    **The Rationale:** Engineers anchor on the outdated intuition that disk I/O is the primary bottleneck, developed during the era of spinning HDDs and simple web servers.
    **The Consequence:** Teams over-optimize the vector database layer (e.g., spending heavily on in-memory caching) while ignoring the massive latency wall introduced by LLM inference.
  napkin_math: |
    1. **Retrieval (NVMe SSD):** A typical local NVMe SSD read takes ~100 \u00b5s (100,000 ns).
    2. **Generation (LLM):** Generating a ~50 token response from a 7B model takes ~100 ms (100,000,000 ns).
    3. **Ratio:** 100,000,000 ns / 100,000 ns = 1,000x.
    4. **Conclusion:** **The LLM generation phase is three orders of magnitude slower than the local vector database lookup.**
  options:
  - The vector database lookup, because disk I/O is fundamentally slower than on-chip computation.
  - The LLM generation, because it is an intensely memory-bandwidth-bound operation.
  - They are roughly equal, with compute and I/O taking about the same amount of time.
  - The network transfer between the database and the LLM server.
  correct_index: 1
