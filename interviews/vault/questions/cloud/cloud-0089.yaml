title: 'The RAG Latency Trap: Compound AI Systems'
scenario: A user query to a chatbot triggers a Retrieval-Augmented Generation (RAG) pipeline. The first
  step is a lookup in a vector database index stored on a local NVMe SSD. The second step is feeding the
  retrieved context to an LLM for response generation. Which of these two stages is the dominant source
  of latency?
question: "Which of these two stages is the dominant source of latency?"
details:
  realistic_solution: The LLM generation stage is, by far, the dominant source of latency. A lookup from
    a local NVMe SSD is an extremely fast operation, typically taking around 100 microseconds. In contrast,
    generating a response from a multi-billion parameter LLM is a memory-bandwidth-bound process that
    takes hundreds of milliseconds, even on a top-tier GPU. The generation phase is several orders of
    magnitude slower than the retrieval phase.
  common_mistake: Engineers often anchor on the outdated intuition that I/O (like a database lookup) is
    always the slowest part of any operation. This was true for spinning disks, but the immense speed
    of modern NVMe SSDs combined with the massive memory-bandwidth requirements of LLM inference has completely
    flipped this dynamic.
  napkin_math: From the ML Latency Hierarchy, an NVMe SSD read is ~100,000 ns (100 µs). A conservative
    estimate for generating a ~50 token response from a 7B model on an H100 is ~100ms, or 100,000,000
    ns. The ratio is 100,000,000 ns / 100,000 ns = 1,000x. If the SSD lookup took 1 second, the LLM generation
    would take over 16 minutes.
  options:
  - The vector database lookup, because disk I/O is fundamentally slower than on-chip computation.
  - The LLM generation, because it is an intensely memory-bandwidth-bound operation.
  - They are roughly equal, with compute and I/O taking about the same amount of time.
  - The network transfer between the database and the LLM server.
  correct_index: 1
