title: 'TCO Evaluation: Cost of Quantization for Inference'
scenario: You are evaluating the cost impact of FP16 vs INT8 vs INT4 quantization for serving LLaMA-13B on H100 (80GB HBM3, $2.50/hr). FP16 needs 2 H100s, INT8 needs 1 H100, INT4 needs 1 H100. Throughputs are: FP16=50 req/s, INT8=75 req/s, INT4=60 req/s (due to dequantization overhead). Assume an average of 250 tokens per request.
question: What is the cost per 1M tokens for FP16, INT8, and INT4 LLaMA-13B on H100, and which quantization is the best cost-quality tradeoff?
details:
  realistic_solution: 'FP16: 2 H100 * $2.50 = $5/hr. 50 req/s * 3600 = 180K req/hr. Avg 250 tokens: 45M tokens/hr. Cost = $5/45M = $0.111/1M tokens. INT8: 1 H100 * $2.50 = $2.50/hr. 75 req/s * 3600 * 250 = 67.5M tokens/hr. Cost = $2.50/67.5M = $0.037/1M tokens. INT4: 1 H100 * $2.50. 60 req/s * 3600 * 250 = 54M tokens/hr. Cost = $2.50/54M = $0.046/1M tokens. Ranking: INT8 is cheapest at 3x less than FP16. INT4 slightly worse than INT8 due to lower throughput. INT8 is the sweet spot (1-2% accuracy loss, 3x cost reduction).'
  common_mistake: |
    **The Pitfall:** Focusing only on model memory fit (how many GPUs needed) without accounting for the throughput change from quantization.
    **The Rationale:** Quantization affects both memory footprint and compute throughput. If INT4 has high dequantization overhead, its throughput can be lower than INT8, making it less cost-efficient per token despite fitting in the same memory.
    **The Consequence:** Selecting a quantization strategy that is more expensive to run and delivers lower model accuracy.
  napkin_math: |
    - FP16: 2 H100 * $2.50/hr = $5/hr. 50 req/s * 3600 = 180K req/hr. 180K * 250 tokens = 45M tokens/hr. Cost = $5/45M = $0.111 / 1M tokens.
    - INT8: 1 H100 * $2.50/hr = $2.50/hr. 75 req/s * 3600 = 270K req/hr. 270K * 250 tokens = 67.5M tokens/hr. Cost = $2.50/67.5M = $0.037 / 1M tokens.
    - INT4: 1 H100 * $2.50/hr = $2.50/hr. 60 req/s * 3600 = 216K req/hr. 216K * 250 tokens = 54M tokens/hr. Cost = $2.50/54M = $0.046 / 1M tokens.
    - **INT8 dominates: it is 67% cheaper than FP16 and cheaper than INT4, while retaining better accuracy.**
