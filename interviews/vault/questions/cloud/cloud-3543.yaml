title: Scaling Data Annotation for a Large-Scale Vision Model on A100s
scenario: Your team is developing a new large-scale computer vision model requiring 10 million images. Each image needs 5 bounding box annotations (5 seconds each) and 2 semantic segmentation masks (15 seconds each). You have access to a cluster of NVIDIA A100 GPUs for accelerating pre-processing and quality checks.
question: How would you design the 10M-image annotation workflow, using A100s for preprocessing, while managing IAA and dataset bias?
details:
  realistic_solution: Utilize active learning accelerated by A100s to prioritize ambiguous samples for human review. Implement statistical methods (e.g., Fleiss' Kappa) for inter-annotator agreement (IAA) and actively monitor demographic/environmental subgroups for bias mitigation.
  common_mistake: |
    **The Pitfall:** Underestimating the time and cost of high-quality annotation.
    **The Rationale:** Engineers often fail to implement robust inter-annotator agreement (IAA) metrics and feedback loops, assuming raw volume equals quality.
    **The Consequence:** Rushed, low-quality labels that degrade model performance and introduce uncontrolled biases.
  napkin_math: |
    1. **Calculate Time Per Image:** (5 boxes × 5s) + (2 masks × 15s) = 25 + 30 = 55 seconds/image.
    2. **Calculate Total Human Time:** 10M images × 55s = 550,000,000 seconds ≈ 955 annotator-months.
    3. **Calculate Pre-processing Speedup:** An A100 processing 1000 images/s handles 10M images in 10,000 seconds (~2.7 hours).
    **Final Result: Manual annotation will take ~955 annotator-months, demonstrating the critical need for A100-accelerated active learning and pre-processing.**
