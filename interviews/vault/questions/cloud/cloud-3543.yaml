title: Scaling Data Annotation for a Large-Scale Vision Model on A100s
scenario: Your team is developing a new large-scale computer vision model requiring 10 million images. Each image needs 5 bounding box annotations (5 seconds each) and 2 semantic segmentation masks (15 seconds each). You have access to a cluster of GPUs for accelerating pre-processing and quality checks.
question: How would you design the 10M-image annotation workflow, using GPUs for preprocessing, while managing IAA and dataset bias?
details:
  realistic_solution: Utilize active learning accelerated by GPUs to prioritize ambiguous samples for human review. Implement statistical methods (e.g., Fleiss' Kappa) for inter-annotator agreement (IAA) and actively monitor demographic/environmental subgroups for bias mitigation.
  common_mistake: |
    **The Pitfall:** Underestimating the time and cost of high-quality annotation.
    **The Rationale:** Engineers often fail to implement robust inter-annotator agreement (IAA) metrics and feedback loops, assuming raw volume equals quality.
    **The Consequence:** Rushed, low-quality labels that degrade model performance and introduce uncontrolled biases.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M images.
    - 5 boxes (5s each), 2 semantic masks (15s each).
    - Preprocessing speed: 1000 images/s.

    **Calculations:**
    - Time per image: (5 × 5s) + (2 × 15s) = 55 seconds.
    - Total human time: 10M × 55s = 550,000,000 seconds ≈ 152,777 hours ≈ 955 annotator-months.
    - Preprocessing time: 10M / 1000 = 10,000 seconds ≈ 2.7 hours.

    **Conclusion & Interpretation:**
    - **Result: Human-Compute-Bound**. Manual annotation is unscalable without active learning and accelerated pre-processing.
