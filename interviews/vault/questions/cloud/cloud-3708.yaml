title: HBM3 vs L2 Cache Access Patterns for Transformer Weights on H100
scenario: A GPU has 80MB L2 cache and 3.35 TB/s HBM3 memory bandwidth. During LLM inference at batch_size=1, the attention QKV projection for a layer with d_model=8192 requires loading weights of shape [8192, 3x8192] = 3x8192²x2 bytes = 402MB.
question: Will the 402MB QKV weight matrix fit in L2 cache during batch-1 decode, and what per-token latency does HBM streaming imply?
details:
  realistic_solution: 'QKV weight matrix: 402MB >> 80MB L2. Cache miss rate near 100% for weight access. Each token decode must stream 402MB from HBM. Full layer (add MLP) ≈ 1.47GB per layer. For 80-layer model: 118GB per token decode. Key insight: model weights must be kept in HBM for large models; increasing batch size amortizes weight loading cost.'
  common_mistake: |
    **The Pitfall:** Assuming model weights stay warm in the L2 cache between consecutive token generation steps.
    **The Rationale:** In standard CPU programming, frequently accessed variables stay in L1/L2 cache.
    **The Consequence:** Engineers underestimate memory traffic by orders of magnitude, failing to realize the entire model must be re-streamed from HBM for every single token generated.
  napkin_math: |
    1. Evaluate L2 cache constraint: 402MB QKV weight matrix > 80MB L2 cache. It must stream from HBM.
    2. Calculate QKV stream time: 402MB / 3.35 TB/s = 0.12ms.
    3. Calculate full layer weights: QKV (402MB) + MLP (2 * 8192 * 32768 * 2B = 1.07GB) ≈ 1.47GB per layer.
    4. Calculate full model transfer: For an 80-layer model, 80 * 1.47GB = 118GB streamed per token.
    5. Calculate token latency: 118GB / 3.35 TB/s = ~35ms/token.
    6. Conclude: The system is heavily memory-bound, achieving a max of **~28 tokens/second**.
