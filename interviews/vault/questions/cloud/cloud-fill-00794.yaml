title: Encoder-Decoder Tradeoffs on AMD MI300X for Deployment
scenario: 'Your team is deploying a large language model (LLM) on an AMD MI300X accelerator, which offers
  192 GB HBM3, 1,307 TFLOPS FP16 sparse, and 5.3 TB/s memory bandwidth. The model needs to serve both
  high-throughput batch inference (e.g., summarization, text generation) and low-latency interactive tasks
  (e.g., chatbot). You are evaluating three architectural options: an encoder-only model (e.g., BERT-like
  for classification), a decoder-only model (e.g., GPT-like for generation), and an encoder-decoder model
  (e.g., T5-like for translation). Given the specific MI300X hardware constraints and the dual requirements
  of throughput and latency, analyze the system costs (compute, memory, bandwidth) for each architecture
  during inference.'
details:
  realistic_solution: For high-throughput batch tasks, an encoder-only model might be preferable due to
    its parallelizable nature, making efficient use of the MI300X's 1,307 TFLOPS FP16 sparse compute.
    For low-latency interactive tasks requiring generation, a highly optimized decoder-only model, potentially
    quantized to INT8 or FP8 to leverage the HBM3 (192 GB memory, 5.3 TB/s bandwidth) more efficiently
    for token generation, would be a strong candidate. An encoder-decoder model offers flexibility but
    comes with the highest overhead, requiring careful partitioning and optimization to fit both encoder
    and decoder components within the MI300X's resources while meeting both latency and throughput goals.
  common_mistake: A common mistake is to pick an architecture based solely on model performance metrics
    (e.g., BLEU, ROUGE) without deeply considering the inference time, memory footprint, and bandwidth
    utilization implications for the specific hardware (AMD MI300X) and deployment requirements (batch
    vs. interactive). For instance, a decoder-only model might achieve high generation quality, but its
    auto-regressive nature could significantly bottleneck latency on an MI300X if not optimized, despite
    its high TFLOPS.
  napkin_math: 'Consider the memory footprint (e.g., Llama 7B FP16 requires ~14GB, Llama 70B FP16 requires
    ~140GB). The MI300X''s 192GB HBM3 can comfortably hold larger models. Calculate the required memory
    bandwidth for activations and weights given the 5.3 TB/s. Estimate computational cost: Decoder-only
    models have O(N^2) attention over generated tokens, while encoder-only models are O(N^2) over input.
    Auto-regressive generation involves sequential token predictions, impacting latency despite high TFLOPS.
    Calculate average FLOPs per token and how many tokens can be processed per second given 1,307 TFLOPS
    (FP16 sparse). For example, 1,307 TFLOPS = 1.307e15 FP16 ops/sec. If a token costs 1e12 FP16 ops (hypothetical),
    that''s 1,307 tokens/sec max compute, not accounting for memory or sparsity benefits.'
