title: Mitigating Tail Latency Jitter in Real-time LLM Serving
scenario: 'Your team is serving a real-time conversational voice AI model using a cluster of NVIDIA H100s. The strict latency SLA requires P99 response times under 250ms. Profiling shows that while median latency is a stable 120ms, the P99 latency frequently spikes to over 400ms. These spikes are not correlated with sudden bursts in request volume or garbage collection pauses. System-level tracing indicates that CPU context switching, NUMA boundary crossings, and OS interrupt handling are contributing to unpredictable variations in request processing times on the CPU before they even reach the GPU queue. You must evaluate two different strategies to mitigate this operating system-induced latency jitter: (1) Implementing strict CPU core pinning with thread affinity and NUMA-aware memory allocation, versus (2) Adopting an OS-bypass network stack (like DPDK/RDMA) to handle incoming requests directly.'
question: 'Which is more cost-effective for cutting OS-induced P99 jitter below 250ms: CPU pinning and NUMA isolation or DPDK/RDMA, and how would you justify this quantitatively?'
details:
  realistic_solution: Implementing strict CPU pinning, thread affinity, and NUMA-aware allocations. While OS-bypass (DPDK) offers lower absolute jitter, CPU isolation is far easier to deploy in standard Kubernetes without custom networking plugins. Pinning the inference server's network I/O and GPU launch threads to specific dedicated cores on the same NUMA node as the GPU prevents the Linux scheduler from migrating them, eliminating the costly context switch and remote memory access overhead.
  common_mistake: |
    **The Pitfall:** Assuming the GPU is the bottleneck for tail latency and trying to optimize the model inference speed.
    **The Rationale:** Relying solely on model-centric optimizations (e.g., lower precision, smaller batch size) when facing latency issues.
    **The Consequence:** Wasting effort on model optimization while completely ignoring the host-side OS resource contention that is actually causing the jitter.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target P99 SLA: < 250ms. Baseline inference + network = ~150ms.
       - NUMA cross-node memory access penalty: ~10-20 µs per access.
       - Request pipeline: ~10,000 CPU memory accesses before GPU launch.
    2. **Calculations:**
       - NUMA jitter: 10,000 accesses × 20 µs = 200,000 µs = 200 ms delay.
       - Cache invalidation after context switch: ~100 µs (happens multiple times).
       - Total unpinned P99 latency = 150 ms + 200 ms + overheads = ~400 ms.
    3. **Conclusion & Interpretation:** **Result: Latency-Bound.** Thread pinning and NUMA isolation removes the intermittent 200ms CPU penalty, dropping the P99 back down to the ~150ms baseline.
