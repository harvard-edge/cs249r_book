title: GPU Voltage Scaling Dynamic Power Reduction
scenario: Your fleet of 10,000 H100 GPUs is hitting the datacenter's strict power cap of 7 MW during peak LLM training runs. The operations team proposes underclocking the GPUs to stay within the power budget by reducing the supply voltage (V) by 15% and the clock frequency (f) by 10% via NVML.
question: What percentage reduction in dynamic power results from lowering voltage by 15% and frequency by 10%?
details:
  realistic_solution: 'Apply the CMOS dynamic power formula: P = α * C * V^2 * f. Since voltage (V) is squared, a small reduction in voltage yields a disproportionately large reduction in power. Calculate the new power ratio: (0.85)^2 * 0.90 = 1.80. This results in a 35% reduction in dynamic power.'
  common_mistake: |
    **The Pitfall:** Assuming dynamic power scales linearly with voltage.
    **The Rationale:** Engineers often calculate 0.85 * 0.90 = 76.5% (a 23.5% reduction), forgetting the CMOS power equation.
    **The Consequence:** The team massively underestimates the power savings of undervolting and may resort to unnecessary cluster downsizing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Voltage reduced by 15% (V = 0.85).
    - Frequency reduced by 10% (f = 0.90).
    - CMOS Dynamic Power Formula: P = α * C * V² * f.

    **Calculations:**
    - Voltage Ratio: (0.85)² = 0.7225.
    - Frequency Ratio: 0.90.
    - New Power Ratio: 0.7225 * 0.90 = 0.65025.
    - Power Reduction: 1.0 - 0.65025 = 0.34975.

    **Conclusion & Interpretation:**
    - **Result: ~35% reduction (Power-Bound)**. The reduction in dynamic power is disproportionately large due to the voltage squared term.
