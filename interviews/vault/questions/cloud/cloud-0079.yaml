title: The On-Node vs. Off-Node Latency Chasm
scenario: You must choose the physical interconnect for GPU-to-GPU data transfers.
question: How much slower is a cross-rack InfiniBand NDR transfer compared to an on-node NVLink 4.0 transfer?
details:
  realistic_solution: An InfiniBand transfer is roughly 10 times slower (higher latency) than an NVLink transfer. NVLink is a direct, on-board connection between GPUs with a latency of ~500 ns, while InfiniBand is a switched network fabric that must traverse NICs, cables, and switches to reach another node, resulting in a latency of ~5,000 ns.
  common_mistake: |
    **The Pitfall:** Assuming high-bandwidth networks like InfiniBand have latencies comparable to on-node interconnects.
    **The Rationale:** Engineers confuse massive bandwidth capacity (Gbps) with low latency (ns), ignoring the "physics tax" of leaving the server chassis.
    **The Consequence:** Distributed architectures are designed with excessive cross-node communication, severely degrading application performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVLink Latency: ~500 ns (on-node).
       - InfiniBand Latency: ~5,000 ns (cross-rack).
    2. **Calculations:**
       - Latency Ratio: 5,000 ns / 500 ns = 10x.
    3. **Conclusion & Interpretation:**
       - InfiniBand is an order of magnitude slower for small message latency.
       - **Result: InfiniBand is 10x Slower (Latency Bound)**
  options:
  - InfiniBand is about the same latency as NVLink.
  - InfiniBand is about 100x slower than NVLink.
  - InfiniBand is about 10x slower than NVLink.
  - InfiniBand is about 2x faster than NVLink.
  correct_index: 2
