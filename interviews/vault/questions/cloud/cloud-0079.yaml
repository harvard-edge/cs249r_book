title: The On-Node vs. Off-Node Latency Chasm
scenario: State the approximate latency difference between a GPU-to-GPU data transfer using on-node NVLink
  4.0 versus a cross-rack InfiniBand NDR transfer.
details:
  realistic_solution: An InfiniBand transfer is roughly 10 times slower (higher latency) than an NVLink
    transfer. NVLink is a direct, on-board connection between GPUs with a latency of ~500 ns, while InfiniBand
    is a switched network fabric that must traverse NICs, cables, and switches to reach another node,
    resulting in a latency of ~5,000 ns.
  common_mistake: Engineers often underestimate the 'physics tax' of leaving the server chassis. They
    might assume high-performance networks like InfiniBand have latencies comparable to on-node interconnects,
    confusing high bandwidth with low latency. In reality, the physical distance and protocol overhead
    create a significant latency gap.
  napkin_math: 'NVLink 4.0 transfers data locally between GPUs at roughly 500 ns latency. InfiniBand NDR
    transfers cross-rack at roughly 5,000 ns latency. Difference = 5,000 ns - 500 ns = 4,500 ns absolute
    difference. Relative difference: InfiniBand is 5,000 / 500 = 10x slower for small message latency
    compared to on-node NVLink.'
  options:
  - InfiniBand is about the same latency as NVLink.
  - InfiniBand is about 100x slower than NVLink.
  - InfiniBand is about 10x slower than NVLink.
  - InfiniBand is about 2x faster than NVLink.
  correct_index: 2
