title: 'Diagnosing Low MFU in LLM Training: Pruning & Sparsity'
scenario: 'You are profiling a 7B parameter LLM training job on an 8x NVIDIA node. The global batch size is 32, and sequence length is 2048. Your iteration time is 3.5 seconds per step. Your infrastructure monitoring shows 100% GPU utilization, but you suspect the actual mathematical efficiency is poor.'
question: 'What is the training run''s MFU, and why can nvidia-smi show 100% GPU utilization while useful math efficiency remains poor?'
details:
  realistic_solution: 'Calculate the true Model FLOPs Utilization (MFU) by isolating the theoretical minimum FLOPs required for the forward and backward passes, independent of the actual execution graph. `nvidia-smi` simply measures the percentage of time a kernel is executing on the GPU. It registers 100% even if the GPU is stalled executing memory-bound un-fused kernels or recomputing activations (which artificially inflates Hardware FLOPs Utilization without contributing to progress). Optimization requires kernel fusion (e.g., FlashAttention-2) to translate raw utilization into useful MFU.'
  common_mistake: |
    **The Pitfall:** Conflating GPU utilization (`nvidia-smi`) with mathematical efficiency (MFU).
    **The Rationale:** Engineers trust infrastructure monitoring metrics to gauge workload health, assuming that active GPUs are computing efficiently.
    **The Consequence:** They fail to realize that activation checkpointing or memory-bound overheads inflate Hardware FLOPs without improving MFU, leaving massive performance gains un-optimized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 7B parameters. Batch: 32. Seq: 2048.
       * Node peak FLOPs: 8 * 312 TFLOPS = 2496 TFLOPS.
       * Iteration time: 3.5s.
       * FLOPs/token ≈ 6 * 7B = 42 GFLOPs.
    2. **Calculations:**
       * Tokens/step: 32 * 2048 = 65,536 tokens.
       * Total useful FLOPs/step: 65,536 * 42e9 ≈ 2.75e15 FLOPs.
       * Useful throughput: 2.75e15 / 3.5s ≈ 786 TFLOPS.
       * MFU: 786 / 2496 = 31.5%.
    3. **Conclusion & Interpretation:**
       * **Result: Compute-Bound by inefficient kernels; true MFU is only 31.5% despite 100% nvidia-smi utilization.**
