title: High-Frequency Failures
scenario: A 175B model is training on 128 nodes. A node fails on average once every 24 hours. Synchronous checkpointing of the 2.8TB model state to an NFS takes 10 minutes.
question: Determine the system's Mean Time Between Failures (MTBF) and explain why standard synchronous checkpointing is unviable here.
visual:
  kind: svg
  path: cloud-2862.svg
  alt: A horizontal bar chart timeline illustrating the extreme overlap of checkpointing, compute, and recovery times when system MTBF is nearly equal to checkpoint duration.
  caption: Synchronous Checkpointing Overhead Profile
details:
  realistic_solution: With 128 independent nodes each failing once every 24 hours (1440 minutes), the system MTBF is 1440 / 128 = 11.25 minutes. Since the time to write a checkpoint (10 minutes) is almost equal to the system MTBF, the training job will spend the vast majority of its time either writing checkpoints or recovering from crashes, making forward progress impossible. An asynchronous or hierarchical in-memory checkpointing strategy is strictly required.
  common_mistake: |
    **The Pitfall:** Blindly applying the Daly formula.
    **The Rationale:** Candidates plug numbers into T = sqrt(2 * C * M) without realizing the formula breaks down when checkpoint time (C) approaches system MTBF (M).
    **The Consequence:** The candidate recommends a mathematically impossible optimal checkpoint interval.
  napkin_math: |
    1. Node MTBF: 24 hours = 1,440 minutes.
    2. System MTBF: 1,440 minutes / 128 nodes = 11.25 minutes.
    3. Checkpoint Time: 10 minutes.
    4. **Result: Since a node fails every 11.25 minutes and a checkpoint takes 10 minutes, the training job spends ~90% of its time checkpointing or recovering, making forward progress impossible.**
