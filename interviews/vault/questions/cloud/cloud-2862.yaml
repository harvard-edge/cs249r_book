title: High-Frequency Failures
scenario: A 175B model is training on 128 H100 nodes. A node fails on average once
  every 24 hours. Synchronous checkpointing of the 2.8TB model state to an NFS takes
  10 minutes.
question: Determine the system's Mean Time Between Failures (MTBF) and explain why
  standard synchronous checkpointing is unviable here.
visual:
  kind: svg
  path: cloud-2862.svg
  alt: A horizontal bar chart timeline illustrating the extreme overlap of checkpointing,
    compute, and recovery times when system MTBF is nearly equal to checkpoint duration.
  caption: Synchronous Checkpointing Overhead Profile
details:
  realistic_solution: With 128 independent nodes each failing once every 24 hours
    (1440 minutes), the system MTBF is 1440 / 128 = 11.25 minutes. Since the time
    to write a checkpoint (10 minutes) is almost equal to the system MTBF, the training
    job will spend the vast majority of its time either writing checkpoints or recovering
    from crashes, making forward progress impossible. An asynchronous or hierarchical
    in-memory checkpointing strategy is strictly required.
  common_mistake: Attempting to blindly apply the Daly formula (T = sqrt(2 * C * M))
    to calculate an 'optimal' interval without recognizing that C almost equals M
    yields an impossible system state.
  napkin_math: System MTBF = 1440 mins / 128 nodes = 11.25 mins. Checkpoint time =
    10 mins. Overhead approaches 100%.
