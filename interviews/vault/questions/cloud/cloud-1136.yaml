title: 400G DAC Link Degradation in Dense Racks
scenario: You are bringing up a new dense AI rack containing 8-GPU H100 nodes. To minimize latency and
  cost, you use 3-meter 400G passive Direct Attach Copper (DAC) cables to connect the ConnectX-7 NICs
  to the Top-of-Rack (ToR) switch at the top of the 42U rack. During a 24-hour NCCL bandwidth burn-in
  test, you observe intermittent port flapping and high Forward Error Correction (FEC) uncorrectable symbol
  errors specifically on the nodes located at the very bottom of the rack. What is the most likely physical
  root cause, and how do you systematically diagnose and mitigate it?
question: "What is the most likely physical root cause, and how do you systematically diagnose and mitigate it?"
details:
  realistic_solution: Identify that 3-meter 400G passive DACs are at the absolute limit of the insertion
    loss budget (~17.16 dB). Nodes at the bottom of the rack require tight cable routing; violating the
    minimum bend radius degrades signal integrity by 2-4 dB, pushing total loss to ~17.5 dB — exceeding
    the budget and driving pre-FEC BER above the KP4 FEC threshold of 2.4e-4. The fix is to use Active
    Electrical Cables (AECs) with built-in signal retiming for bottom-of-rack nodes, or switch to shorter
    DAC runs with proper cable management.
  common_mistake: Assuming the DAC cables are simply defective or suspecting switch firmware bugs, leading
    to unnecessary RMAs without considering the strict physical insertion loss budget and the impact of
    cable bend radius on high-speed PAM4 signaling.
  napkin_math: '400G passive DAC utilizes 50G PAM4 signaling with a strict max insertion loss budget of
    ~17.16 dB at Nyquist (13.28 GHz). A typical AWG26 3m DAC has ~14 dB loss. Tight bends (< 5x cable
    diameter) cause impedance mismatches that add 2-4 dB of loss. Total loss: 14 dB + 3.5 dB = 17.5 dB.
    This exceeds the 17.16 dB budget, driving the pre-FEC Bit Error Rate (BER) above the KP4 FEC threshold
    of 2.4e-4, resulting in uncorrectable errors and dropped packets.'
