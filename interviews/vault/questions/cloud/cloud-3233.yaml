title: Disaggregated KV-Cache Storage Architecture
scenario: You are architecting a next-generation LLM serving system where KV-cache is stored in a shared distributed memory pool (RDMA-accessible) via CXL-attached memory providing 100 GB/s per GPU link, instead of solely on HBM.
question: How would you architect a 100 GB/s CXL-backed distributed KV-cache for Llama 3 70B, and when does it outperform local HBM-only KV-cache?
details:
  realistic_solution: 'Architect a Disaggregated KV-cache (DKV) pool with CXL memory as a backing store, not a replacement. GPU HBM holds the "hot" working set, while the CXL pool holds "warm" KV-cache (prefix caches, paused conversations). Access pattern: Prefill writes to both; Decode reads locally. Benefits emerge during request migration (pulling KV from the pool is faster than recomputing prefill), prefix deduplication for shared prompts, and elastic scaling.'
  common_mistake: |
    **The Pitfall:** Assuming CXL memory bandwidth is sufficient for real-time KV-cache access during the autoregressive decode step.
    **The Rationale:** 100 GB/s sounds fast enough for general memory access.
    **The Consequence:** At 100 GB/s (vs 3.35 TB/s HBM), remote KV access is 33x slower, completely destroying token generation latency if placed on the critical path.
  napkin_math: |
    1. **HBM vs CXL Bandwidth:** 3.35 TB/s vs 100 GB/s (33x slower).
    2. **KV load for 8K context (Llama 3 70B):** $\sim 2.62\text{ GB}$.
    3. Reading via HBM: $2.62\text{ GB} / 3.35\text{ TB/s} = 0.78\text{ ms}$.
    4. Reading via CXL: $2.62\text{ GB} / 100\text{ GB/s} = 26\text{ ms}$ (unacceptable per-token decode overhead).
    5. **Migration use-case:** Moving 2.62 GB takes 26 ms via CXL, whereas recomputing the prefill takes $\sim 200\text{ ms}$.
    6. **Conclusion: DKV is roughly 7.7x faster for request migration, but strictly limited to asynchronous or block transfers.**
