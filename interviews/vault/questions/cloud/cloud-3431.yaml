title: 3D Parallelism Sizing — Adam State + Activations on A100s
scenario: A 70B-parameter transformer is trained on A100 80 GB GPUs (NVLink intra-node, IB inter-node).
  Each parameter under mixed-precision Adam costs 16 bytes of model state (FP16 weight + FP16 grad +
  FP32 master + FP32 m + FP32 v). Reserve 16 GB per GPU for activations + workspace. The team must choose
  TP, PP, and DP sizes that respect the per-GPU HBM budget. Decompose how each parallelism axis (DP,
  TP, PP) reduces (or fails to reduce) the per-GPU memory footprint.
question: "Decompose how DP, TP, and PP each affect the per-GPU memory footprint for a 70B Adam-trained model on 80 GB A100s, and choose minimum (TP, PP) to fit."
details:
  realistic_solution: 'DP replicates model state across ranks — it does *not* reduce per-GPU memory at
    all. TP shards weights, gradients, and (with ZeRO-1) part of the optimizer state along a tensor
    dimension; the full model state divides by TP. PP shards layers across stages; the full model state
    divides by PP. For 70B params * 16 bytes = 1120 GB of model state; per-GPU budget is 80 - 16 = 64
    GB; minimum (TP * PP) ≥ 1120 / 64 = 17.5 → 18, rounded up to a topology-friendly TP=8 (within a node,
    on NVLink) and PP=4 (across nodes), giving TP*PP = 32, per-GPU model state = 35 GB, leaving 29 GB
    for activations and workspace. DP can then be added freely for throughput without affecting fit.'
  common_mistake: 'Assuming DP alone reduces per-GPU memory. DP only divides the *batch*, not the model
    state — 64 DP ranks each still hold the full 1120 GB of state without TP/PP/ZeRO. Conversely, naive
    TP across nodes pays InfiniBand''s ~25 GB/s unidirectional bandwidth on every layer''s AllReduce
    and stalls; TP belongs inside the NVLink island.'
  napkin_math: '70B params * 16 bytes (mixed-precision Adam) = 1120 GB total state. Per-GPU model budget:
    80 - 16 (activations) = 64 GB. Required min(TP * PP) = ceil(1120 / 64) = 18. Choose TP=8 (NVLink-bound)
    + PP=4 (cross-node) → 32-way model split, per-GPU model = 35 GB, activation budget = 29 GB. DP=N
    multiplies global batch by N with zero per-GPU memory cost.'
