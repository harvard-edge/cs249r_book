title: Understanding 3D Parallelism with NVIDIA A100s for Frontier Models
scenario: You are leading a team training a frontier language model on a cluster equipped
  with NVIDIA A100 GPUs, each featuring 80 GB HBM2e memory, 312 TFLOPS of FP16 performance,
  and 2.0 TB/s of memory bandwidth. To achieve unprecedented scale and efficiently
  utilize these powerful accelerators, your architecture leverages 3D parallelism.
  Describe the distinct roles of data parallelism, tensor parallelism, and pipeline
  parallelism in this setup, specifically explaining how each component contributes
  to training a model that would otherwise be intractable on a single A100 GPU.
question: What roles do data, tensor, and pipeline parallelism play in training a
  frontier model across A100 GPUs?
details:
  realistic_solution: 'A realistic solution involves a strategic combination where:
    (1) Tensor parallelism horizontally partitions very large tensors (e.g., large
    weight matrices or activation tensors) across multiple A100 GPUs, effectively
    making a single ''logical'' GPU with a combined 160 GB, 240 GB, etc., of HBM2e
    memory. (2) Pipeline parallelism vertically partitions the model''s layers across
    A100 GPUs, allowing different layers to compute concurrently on different devices
    and hiding communication latency. (3) Data parallelism then replicates these tensor/pipeline-parallel
    instances and distributes mini-batches of data, scaling the overall throughput.
    The high 2.0 TB/s memory bandwidth of the A100s is crucial for efficient intra-node
    communication in both tensor and pipeline parallelism.'
  common_mistake: A common mistake is to conflate the purposes of the different parallelism
    strategies, assuming they all address the same bottleneck. For example, relying
    solely on data parallelism when a model's weights or activations exceed the 80
    GB HBM2e memory capacity of a single NVIDIA A100, instead of employing tensor
    or pipeline parallelism, will inevitably lead to out-of-memory errors.
  napkin_math: If a single model layer's activation memory footprint is 180 GB, and
    an NVIDIA A100 GPU has 80 GB HBM2e, what is the minimum number of A100 GPUs required
    for just this layer using only tensor parallelism, assuming perfect partitioning?
