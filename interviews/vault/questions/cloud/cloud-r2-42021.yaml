title: Cross-Region Tail Latency in Geo-Distributed Serving
scenario: You serve a 70B model from 3 regions (US-East, EU-West, Asia-Pacific) with MI300X clusters.
  Local P99 is 80ms, but 15% of requests require cross-region model sharding (the full model doesn't fit
  in smaller regional clusters). Cross-region P99 is 350ms due to 60-120ms network RTT. Design a system
  that meets a global P99 SLA of 150ms.
details:
  realistic_solution: 'Three-tier strategy: (1) Capacity planning — ensure each region has enough MI300X
    capacity to serve 100% of regional traffic with the full model. Use 8-way tensor parallelism within
    each region. Cost: 3× more GPUs but eliminates cross-region inference. (2) For overflow: use a smaller
    distilled model (13B) that fits on a single MI300X per region as a fallback. Quality drops 5% but
    latency stays at 40ms. (3) Smart routing — classify requests by latency sensitivity. Chat/interactive
    → always local (full model or fallback). Batch/async → route to cheapest region, no SLA. (4) Prefetch
    popular prompts'' KV caches across regions via Infinity Fabric within each cluster. Result: 0% cross-region
    for interactive, P99 = 85ms global.'
  common_mistake: Trying to make cross-region inference fast. The physics of light in fiber imposes a
    floor of 60ms RTT US-to-EU. Instead, design the system to avoid cross-region inference entirely for
    latency-sensitive requests.
  napkin_math: 'Cross-region RTT: US-EU = 80ms, US-Asia = 120ms. Min cross-region inference: 80ms + 80ms
    local = 160ms > 150ms SLA (impossible for EU). Full regional deployment: 3 regions × 8 MI300X = 24
    GPUs. Cost: 24 × $3.50/hr = $84/hr. Cross-region: 16 GPUs + network = $56/hr + SLA violations. SLA
    violation cost at $0.01/violation, 15% of 10K req/s: $5,400/hr. Full regional saves $5,316/hr net.'
