title: 'Kernel Fusion: Evaluate Flash Attention vs Standard Attention on H100'
scenario: Compare FlashAttention-2 vs standard unfused attention on H100 (80GB HBM3, 3.35 TB/s, 989 TFLOPS
  BF16) for a 7B LLM with 32 heads, head dim 128, sequence lengths 1K, 4K, and 16K. Evaluate memory usage,
  throughput, and latency for each configuration.
details:
  realistic_solution: Q,K,V activation memory at seq=1K is 8MB each for standard 32-head, 128-dim configurations.
    The real memory problem is the O(seq²) attention score matrix at long contexts.
  common_mistake: Assuming FlashAttention is faster at all sequence lengths — at very short sequences
    (< 512), the tiling overhead may reduce gains. Flash attention primarily helps at longer sequences.
  napkin_math: 'Q,K,V at Seq=1K: 1024 × 32 heads × 128 head_dim × 2B = 1024 × 4096 × 2B = 8MB each (not
    48MB). Attention scores: 1024 × 32 × 1024 × 2B = 67MB. Context expansion 8K: Q,K,V = 8192 × 4096 ×
    2B = 67MB each. Attention scores: 8192² × 32 × 2B = 4.3GB — the memory wall.'
