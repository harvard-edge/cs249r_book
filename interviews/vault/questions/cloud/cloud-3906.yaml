title: ROCm Library Parity Gap for Production ML Workloads
scenario: You are evaluating MI300X for a production LLM serving stack that currently uses FlashAttention-2, cuDNN fused LSTM, and NCCL for multi-GPU communication.
question: Which components have ROCm equivalents at performance parity, and which do not?
details:
  realistic_solution: |
    Assessment: (1) FlashAttention-2: AMD has flash-attention for ROCm, achieving ~85-90% of the NVIDIA version's performance. (2) cuDNN fused LSTM: MIOpen's LSTM is ~80% of cuDNN's fused performance; the fusion is less aggressive. (3) NCCL: RCCL achieves near-parity on AllReduce for large messages (>1MB) but is 15-20% slower for small messages. Overall readiness: LLM serving is viable; LSTM-heavy workloads need benchmarking.
  common_mistake: |
    **The Pitfall:** Assuming ROCm has full performance parity across the entire CUDA ecosystem.
    **The Rationale:** Candidates believe hardware compute advantages directly overcome software stack maturity gaps.
    **The Consequence:** Unexpected performance regressions when migrating highly specialized fused kernels (like LSTMs) to AMD platforms.
  napkin_math: |
    - MI300X (5.3 TB/s) vs H100 (3.35 TB/s).
    - Even if ROCm flash-attention is only 85% as efficient as the NVIDIA implementation:
    - Effective bandwidth: 5.3 TB/s * 0.85 = 4.5 TB/s.
    - **Despite a 15% software inefficiency, MI300X still delivers ~34% more effective bandwidth for memory-bound workloads.**
