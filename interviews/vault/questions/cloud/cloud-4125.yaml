title: Fragmentation-Aware Scheduling Policy
scenario: 'Your 10-node cluster currently has the following allocation: 6 nodes have 2-4 GPUs free each, totaling 22 free GPUs. A 16-GPU training job arrives but cannot be scheduled because no contiguous block of 16 GPUs exists (the job needs 2 full nodes). This is the ''GPU fragmentation problem.'''
question: What scheduling policy would prevent the 16-GPU job from being blocked by fragmented free GPUs?
details:
  realistic_solution: 'Prevention strategies (cannot cure fragmentation, must prevent it): (1) Reservation-based scheduling: when a large job is queued, the scheduler begins draining target nodes by not scheduling new small jobs on them. As existing jobs complete, GPUs free up contiguously. The large job starts when 2 nodes are fully free. Drain time = max remaining wall time of small jobs on the 2 least-loaded nodes. (2) Defrag-aware placement: always pack small jobs onto the fewest possible nodes (best-fit bin packing). When 6 \times 1-GPU jobs arrive, place all 6 on one node instead of spreading across 6 nodes. This keeps other nodes fully free for large jobs. (3) Tiered node pools: designate 3 nodes for small jobs (≤4 GPUs) and 7 nodes for large jobs (>4 GPUs). Small jobs never fragment the large-job pool. Tradeoff: may have idle GPUs in the large-job pool when no large jobs are queued — mitigate with borrowing. (4) Compaction jobs: when fragmentation exceeds a threshold, checkpoint and restart small jobs, repacking them onto fewer nodes. Cost: ~2-5 minutes of downtime per affected job.'
  common_mistake: |
    **The Pitfall:** Proposing live migration of the running GPU workloads to defragment the cluster.
    **The Rationale:** Candidates apply standard virtualization or CPU orchestrator concepts (like vMotion) directly to GPU systems.
    **The Consequence:** The proposal is physically impossible because live GPU memory cannot be migrated; the CUDA context is physically bound to the hardware memory, revealing a lack of hardware-level systems understanding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 22 free GPUs spread across 6 nodes.
       - 16-GPU job needs 2 fully free nodes.
    2. **Calculations:**
       - Naive scheduler places 6 single-GPU jobs on 6 different nodes.
       - Defrag-aware scheduler packs all 6 jobs onto 1 node.
       - 22 free GPUs coalesce onto 3 nodes (2 fully free + 1 with 6 free).
    3. **Conclusion & Interpretation:**
       - **Result: Defragmented cluster allows the 16-GPU job to claim 2 contiguous nodes, preventing blocking.**
