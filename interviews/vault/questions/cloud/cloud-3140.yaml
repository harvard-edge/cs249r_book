title: Evaluating Ring Attention vs FlashAttention for 128K Context
scenario: Your team is deploying a 70B model with 128K context on 8x H100s. Option A is FlashAttention-2 on each GPU with sequence parallelism (Ulysses). Option B is Ring Attention across 8 GPUs.
question: For 128K context on 8 H100s, how do FlashAttention-2 with Ulysses and Ring Attention compare in communication, memory, and latency?
details:
  realistic_solution: |
    KV cache for 128K context per head: 128K x 128 x 2B = 32MB. With 64 KV heads, full KV = 2 x 32MB x 64 = 4GB per layer. Ring Attention: each GPU holds 128K/8 = 16K tokens. In each ring step, a GPU sends its K,V block to the neighbor: 4GB/8 = 512MB per step x 7 steps = 3.5GB per layer communicated. With NVLink at 900 GB/s, ring step transfer: 512MB / 900 = 0.57ms. Compute per step (FlashAttention on 16K x 16K): ~0.8ms. Communication is overlapped with compute. Ulysses (all-to-all): same 3.5GB volume but requires all-to-all, harder to overlap. Ring Attention wins for long context due to natural overlap.
  common_mistake: |
    **The Pitfall:** Thinking Ring Attention fundamentally eliminates communication volume.
    **The Rationale:** Candidates misunderstand that Ring Attention merely shifts communication to perfectly overlap with compute.
    **The Consequence:** Failing to accurately model the required NVLink bandwidth, leading to unexpected communication stalls.
  napkin_math: |
    - KV cache for 128K context (per head): 128K * 128 * 2 Bytes = 32MB.
    - Full KV per layer (64 heads): 2 * 32MB * 64 = 4GB.
    - Ring Attention (8 GPUs): each sends 4GB/8 = 512MB per step.
    - NVLink transfer: 512MB / 900 GB/s = 0.57ms.
    - Compute per step (FlashAttention 16K x 16K): ~0.8ms.
    - **Because compute (0.8ms) hides communication (0.57ms), Ring Attention adds ~0ms effective latency overhead.**
