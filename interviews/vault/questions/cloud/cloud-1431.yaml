title: Interrupt Shielding vs NIC Coalescing for P99 Latency
scenario: You are deploying a high-throughput inference service on nodes equipped with 8x GPUs, a 128-core CPU, and dual 200GbE NICs. While the average latency is 5ms, the P99 latency frequently spikes to 35ms, breaching the strict 20ms SLO. Profiling shows that CPU threads launching CUDA kernels are being unpredictably preempted by NIC hardware interrupts (SoftIRQs) distributed evenly across all cores by the OS.
question: Should you use strict CPU core isolation or NIC interrupt coalescing to stabilize P99 latency under the 20ms SLO, and why?
details:
  realistic_solution: 'Implement interrupt shielding by pinning CUDA launch threads to specific cores using `taskset` or `cgroups`, and restricting NIC/NVMe interrupts to a disjoint set of dedicated non-inference cores.'
  common_mistake: |
    **The Pitfall:** Suggesting an increase in NIC interrupt coalescing to reduce CPU load.
    **The Rationale:** Batching packets before interrupting the CPU seems like a logical way to reduce context switching overhead.
    **The Consequence:** This directly increases the baseline average latency for all requests and fails to solve the unpredictable preemption of CUDA launch threads, missing the P99 SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Packet rate: 200,000 packets/sec across 16 NIC queues.
       - Interrupts per core: ~12,500 interrupts/sec.
       - Interrupt handling time: ~3 µs each.
    2. **Calculations:**
       - CPU time spent on interrupts per core: 12,500 * 3 µs = 37.5 ms per second.
       - When a CUDA launch thread is preempted by an interrupt just as the GPU idles, the GPU stalls for the full context switch duration.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound Preemption. Unisolated interrupts cause cascading queue build-ups and massive 10ms+ P99 spikes, solvable only via isolation.**
