title: CNN vs MLP Parameter Scaling
scenario: A team is designing a classifier for 256x256 RGB satellite images to detect cloud cover. A junior
  engineer proposes a 3-layer fully connected MLP with 1024 hidden units per layer to 'capture global
  context unconditionally.' You argue for a standard CNN with 3x3 convolutions (starting with 32 filters)
  to leverage spatial inductive bias. Calculate the parameter footprint of the first hidden layer for
  both architectures and explain how the inductive bias affects the memory requirements on a single A100
  GPU.
question: "How do the first-layer parameter counts of the MLP and CNN compare, and why does the CNN's inductive bias help on an A100?"
details:
  realistic_solution: Implement the CNN. By enforcing local connectivity and weight sharing (the inductive
    bias of translation invariance), the CNN radically restricts the hypothesis space, dropping Layer
    1 parameters from over 200 million down to under a thousand, drastically reducing memory footprint
    and learning complexity.
  common_mistake: Focusing only on the theoretical capacity of the MLP without calculating the actual
    parameter count, failing to realize that the MLP will consume ~805MB of memory just for the first
    layer's weights, leading to massive data inefficiency and overfitting.
  napkin_math: Input size = 256 * 256 * 3 = 196,608 features. MLP Layer 1 = 196,608 * 1024 = 201,326,592
    weights (~805MB in FP32). CNN Layer 1 (3x3, 32 filters) = 3 * 3 * 3 * 32 = 96 weights (+32 biases)
    = 896 parameters (<4KB). The structural assumption provides a ~224,000x reduction in Layer 1 parameters.
