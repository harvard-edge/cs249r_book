title: CNN vs MLP Parameter Scaling
scenario: >
  A team is designing a classifier for 256x256 RGB satellite images to detect cloud cover. A junior engineer proposes a 3-layer fully connected MLP with 1024 hidden units per layer to 'capture global context unconditionally.' You argue for a standard CNN with 3x3 convolutions (starting with 32 filters) to leverage spatial inductive bias.
question: >
  How do the first-layer parameter counts of the MLP and CNN compare, and why does the CNN's inductive bias help on an A100?
details:
  realistic_solution: |
    Implement the CNN. By enforcing local connectivity and weight sharing (the inductive bias of translation invariance), the CNN radically restricts the hypothesis space, dropping Layer 1 parameters from over 200 million down to under a thousand, drastically reducing memory footprint and learning complexity.
  common_mistake: |
    **The Pitfall:** Focusing entirely on the theoretical capacity of the MLP without verifying the actual parameter math.
    **The Rationale:** Candidates trust that 'global context' is a noble goal and fail to calculate that 256x256x3 pixels connected to 1024 hidden units creates an explosively large weight matrix.
    **The Consequence:** Deploying an MLP that consumes ~805MB of memory just for the first layer's weights, leading to massive data inefficiency, overfitting, and terrible training times.
  napkin_math: |
    1. **Input Size:** 256 × 256 × 3 = 196,608 features.
    2. **MLP Layer 1:** 196,608 × 1,024 = 201,326,592 weights.
    3. **MLP Memory:** 201M parameters × 4 bytes = ~805 MB.
    4. **CNN Layer 1:** 3 × 3 × 3 × 32 filters = 864 weights + 32 biases = 896 parameters.
    5. **Result:** **The translation invariance inductive bias yields a ~224,000× parameter reduction, requiring <4 KB of memory.**
