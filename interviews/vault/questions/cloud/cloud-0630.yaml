title: The Bandwidth Wall
scenario: 'You''re running two models concurrently on one H100 80 GB using MPS (Multi-Process Service):
  a 7B LLM for chat and a 3B vision encoder for image understanding. Each model alone achieves its expected
  throughput. But when both run simultaneously, the LLM''s decode throughput drops by 60% and the vision
  model''s latency doubles. GPU compute utilization shows only 45%. What shared resource are they fighting
  over?'
details:
  realistic_solution: 'They''re saturating HBM bandwidth. LLM decode is memory-bandwidth-bound: it reads
    the entire 14 GB of weights to produce each token, consuming $14\text{ GB} \times \text{tokens/s}$
    of bandwidth. The vision encoder''s convolutional layers are also bandwidth-hungry (low arithmetic
    intensity for depthwise convolutions). The H100 has 3.35 TB/s of HBM bandwidth — a single shared resource
    that both models must share. When the LLM reads 14 GB of weights (consuming 3.35 TB/s for ~4.2 ms),
    the vision model''s memory requests are queued. When the vision model reads its weights, the LLM''s
    next token is delayed. They''re time-multiplexing the memory bus, and neither can achieve full bandwidth.
    This is the memory bandwidth wall — the most common bottleneck when co-locating models on a single
    GPU. Fix: (1) quantize the LLM to INT4 (3.5 GB weights → 4× less bandwidth per token, leaving more
    for the vision model); (2) time-slice rather than co-locate: run the LLM for 10 ms, then the vision
    model for 10 ms, avoiding contention; (3) use separate GPUs — the bandwidth isolation is worth the
    extra hardware cost.'
  common_mistake: '"They''re competing for Tensor Cores — use MPS to partition the SMs" or "80 GB isn''t
    enough for both models." The models total only 20 GB (14 + 6), leaving 60 GB free. And SM partitioning
    via MPS doesn''t help because the bottleneck isn''t compute.'
  napkin_math: 'H100 HBM bandwidth: **3.35 TB/s** (shared). **LLM alone:** 14 GB weights × 128 tokens/s
    = **1.79 TB/s** bandwidth demand. **Both concurrent:** memory requests are interleaved, breaking sequential
    access patterns. Effective bandwidth drops to ~**2.2 TB/s** (65% of peak). LLM gets $2.2 \times (1.79/1.97)
    = $ **2.0 TB/s** → $2.0 / 14 = $ **143 tokens/s** ideal... but the interleaving adds ~40% latency
    overhead per access, so actual throughput drops to $143 / 1.4 = $ ~**102 tokens/s** (a 20% drop from
    128). Quantizing LLM to INT4 leaves more than enough bandwidth for both.'
