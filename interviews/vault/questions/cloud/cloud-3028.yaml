title: 'Model Size Estimation: Design Sharding Strategy for 405B Model on H100 Cluster'
scenario: Design the GPU sharding strategy for serving a 405B-parameter LLaMA model (FP8 precision) on H100 nodes (80GB HBM3 per GPU, NVLink 600GB/s intra-node, InfiniBand 200Gb/s inter-node). Minimize end-to-end latency for interactive generation while maximizing throughput. Specify tensor parallelism degree, pipeline parallelism degree, and number of nodes.
question: What H100 NVLink bandwidth should the 405B sharding analysis use, and why is 600GB/s the wrong value?
details:
  realistic_solution: H100 NVLink bandwidth is 900 GB/s total bidirectional. Using 600 GB/s underestimates H100 by 33% (that is A100 spec).
  common_mistake: |
    **The Pitfall:** Choosing maximum parallelism blindly without evaluating cross-node communication.
    **The Rationale:** Candidates default to TP-64 without realizing that all-reduce communication across 64 GPUs over InfiniBand becomes the dominant latency term, much worse than pipeline bubbles.
    **The Consequence:** An architecture with devastatingly slow decoding speeds.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 NVLink 4.0 bandwidth is 900 GB/s (A100 is 600 GB/s).
    - AllReduce shard size ~ (seq * hidden / 8) * 2B.

    **Calculations:**
    - True communication latency = (2 * 7/8 * shard_size) / 900 GB/s.
    - Using 600 GB/s underestimates bandwidth by 33%.

    **Conclusion & Interpretation:**
    - **Result: 33% faster intra-node communication (Network-Bound)**. Utilizing 900 GB/s strictly favors larger Tensor Parallel groups within a single node.
