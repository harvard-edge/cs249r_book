title: Cloud Wafer Scale Engine L5 0
scenario: Your startup must choose between 16 H100 GPUs ($400K, 16×80 GB HBM) and 1 Cerebras CS-2 ($2M,
  40 GB SRAM, 850K cores) for serving a 13B model. Daily traffic is 10M requests at 200 tokens each. Evaluate
  both options.
question: "For 10M daily 200-token requests on a 13B model, should the startup choose 16 H100s or one Cerebras CS-2, and why?"
details:
  realistic_solution: 'H100 cluster: 13B FP16 = 26 GB, fits on 1 GPU. Decode at batch=1: 26 GB / 3.35
    TB/s = 7.76 ms/tok. At batch=32: amortized ~0.5 ms/tok. 16 GPUs, batch=32 each: 16 × 32 / 0.5ms =
    1.024M tok/s. 10M requests × 200 tok = 2B tok/day ÷ 86400s = 23,148 tok/s — easily handled. CS-2:
    26 GB in SRAM, decode effectively instant at μs-level latency. Throughput exceeds H100s for small
    batches. But: $2M vs $400K, 5x cost. H100 cluster handles the load with room to spare. CS-2 wins only
    if ultra-low latency (<1 ms per token) is the SLA, not throughput.'
  common_mistake: Choosing the WSE for throughput workloads where batching on GPUs is sufficient. WSE
    excels at latency-sensitive, small-batch inference, not bulk throughput where GPU batching amortizes
    memory access cost.
  napkin_math: 'Load: 2B tok/day = 23K tok/s. H100 ×16 capacity at batch=32: ~1M tok/s. Utilization: 2.3%.
    Cost/tok: $400K / (2B × 365) = $0.0000005. CS-2 cost/tok: $2M / (2B × 365) = $0.0000027 — 5x more
    expensive for this workload.'
