title: Cloud Wafer Scale Engine L5 0
scenario: Your startup must choose between 16 H100 GPUs ($400K) and 1 Cerebras CS-2 ($2M) for serving a 13B model. Daily traffic is 10M requests at 200 tokens each.
question: "For 10M daily 200-token requests on a 13B model, should the startup choose 16 H100s or one Cerebras CS-2, and why?"
details:
  realistic_solution: |
    H100 cluster: 13B FP16 = 26 GB, fits on 1 GPU. Decode at batch=1: 26 GB / 3.35 TB/s = 7.76 ms/tok. At batch=32: amortized ~0.5 ms/tok. 16 GPUs, throughput: 16 / 0.5ms = 32,000 tok/s. 10M requests x 200 tok = 2B tok/day / 86400s = 23,148 tok/s — easily handled. CS-2: 26 GB in SRAM, decode effectively instant at us-level latency. Throughput exceeds H100s for small batches. But: $2M vs $400K, 5x cost. H100 cluster handles the load with room to spare. CS-2 wins only if ultra-low latency (<1 ms per token) is the SLA, not throughput.
  common_mistake: |
    **The Pitfall:** Choosing the WSE for throughput workloads where batching on GPUs is sufficient.
    **The Rationale:** The WSE excels at latency-sensitive, small-batch inference. Bulk throughput amortizes memory access cost on GPUs.
    **The Consequence:** The startup spends 5x more capital without realizing proportional benefits.
  napkin_math: |
    - **Load:** 10M * 200 = 2B tok/day = 23,148 tok/s.
    - **H100 x16 Capacity:** At batch=32, amortized 0.5ms/tok -> 32,000 tok/s.
    - **Utilization:** ~72% (handles the load easily).
    - **H100 Cost/tok:** $400K / (2B * 365) = **$0.0000005**.
    - **CS-2 Cost/tok:** $2M / (2B * 365) = **$0.0000027** (5x more expensive).
