title: The RAG Model Upgrade
scenario: Your team wants to improve document retrieval by rolling out a 7 billion parameter embedding model to replace a 3 billion parameter model. Both models are served in FP16 precision.
question: "How many Gigabytes of memory will the new 7B parameter model require?"
details:
  realistic_solution: 'For inference with FP16 precision, each parameter requires 2 bytes of memory. Therefore, a 7 billion parameter model will require 14 GB of memory just for the weights.'
  common_mistake: |
    **The Pitfall:** Confusing precision memory requirements or mixing up inference and training footprints.
    **The Rationale:** Candidates often use the byte-per-parameter count for INT8 (1 byte) or FP32 (4 bytes), or apply the larger multiplier for optimizer states (e.g., 16 bytes for Adam).
    **The Consequence:** Over-provisioning hardware or encountering unexpected OOMs during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters = 7,000,000,000 (7B).
       - Precision = FP16 (16-bit floating point).
    2. **Calculations:**
       - FP16 requires 16 bits / 8 bits/Byte = 2 Bytes/parameter.
       - Total VRAM for Weights = 7,000,000,000 * 2 Bytes = 14,000,000,000 Bytes.
       - Convert to Gigabytes: 14,000,000,000 / 10^9 = 14 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 14 GB.** The bottleneck is **VRAM Capacity-Bound**.
  options:
  - 7 GB
  - 28 GB
  - 14 GB
  - 112 GB
  correct_index: 2
