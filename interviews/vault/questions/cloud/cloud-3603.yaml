title: Work-Conserving Scheduler Analysis for Mixed Priority on MI300X
scenario: 'An MI300X (192GB HBM3) serves two priority classes: premium (SLA p99<100ms, λ=200/s) and standard (no SLA, λ=800/s). Total service rate µ=1200/s.'
question: How would you design a preemptive priority queue for premium and standard traffic, and can premium meet p99<100 ms?
details:
  realistic_solution: 'Preemptive priority M/M/1/priority: premium queue is served first always. Premium: ρ1=200/1200=0.167. Mean premium wait = 1/(µ(1-ρ1)) = 1/(1200×0.833) = 1ms! p99≈6ms. Standard: ρ2=800/1200=0.667. Mean standard wait = 1/(µ(1-ρ1)(1-ρ_total)) = 1/(1200×0.833×0.167)=6ms, p99≈40ms. Total system ρ=0.833 → stable. Premium SLA of p99<100ms is easily met at 6ms.'
  common_mistake: 'Using weighted fair queueing with weights 1:4 and assuming premium gets proportional latency improvement; WFQ doesn''t isolate premium from standard load at high utilization.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Premium traffic (λ1): 200 req/s. SLA: p99 < 100ms.
    - Standard traffic (λ2): 800 req/s.
    - Service rate (µ): 1200 req/s.
    - Scheduler: Preemptive M/M/1 priority queue.
    
    **Calculations:**
    - Premium utilization (ρ1): 200 / 1200 = 0.167.
    - Total utilization (ρ_total): 1000 / 1200 = 0.833.
    - Premium mean wait time: 1 / (1200 * (1 - 0.167)) = 1 / (1200 * 0.833) = 1ms.
    - Premium p99 wait time: roughly 6ms.
    - Standard mean wait time: 1 / (1200 * (1 - 0.167) * (1 - 0.833)) = 6ms (p99 ≈ 40ms).
    
    **Conclusion & Interpretation:**
    - **Result: 6ms p99 Premium Latency (Queue-Latency Bound)**. The preemptive priority queue mathematically isolates premium traffic from standard bursts, easily crushing the 100ms SLA.
