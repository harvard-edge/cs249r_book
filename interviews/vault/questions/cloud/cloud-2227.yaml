title: The NVMe Warm Cache Miss
scenario: Your training cluster uses a two-tier storage architecture. A local NVMe SSD cache (3.84 TB per node, 6 GB/s read) and a shared Lustre parallel filesystem (500 GB/s aggregate). The training dataset is 50 TB. Each node processes a random shard of the data each epoch. During the first epoch, training throughput drops by 40% compared to subsequent epochs.
question: "Why does the training throughput drop by 40% during the first epoch?"
details:
  realistic_solution: 'During the first epoch, none of the training data is cached on local NVMe. Every data access must be served from the remote Lustre filesystem at network speed. Even at 500 GB/s aggregate, each node''s share of that bandwidth is limited by its network link (typically 100-200 Gbps = 12.5-25 GB/s). After the first epoch, the most recently accessed shards are cached on local NVMe, and subsequent reads hit the 6 GB/s local SSD instead of the remote filesystem. The 40% throughput drop in epoch 1 reflects the latency difference between NVMe (~50us) and Lustre over network (~3ms), which stalls the data pipeline and starves the GPU. The fix: pre-populate the NVMe cache before training starts (''warm the cache''), or use a caching layer like Alluxio that prefetches data based on the training schedule.'
  common_mistake: |
    **The Pitfall:** Blaming the GPU or the data loading library for the throughput drop.
    **The Rationale:** The throughput drop is not a compute problem — it is a cold cache problem in the storage hierarchy during the first epoch.
    **The Consequence:** Wasting time profiling GPU kernels when the bottleneck is remote file I/O.
  napkin_math: |
    - Local NVMe read = 6 GB/s at ~50us latency. Remote Lustre = ~3ms latency per access.
    - If the data loader issues 1,000 random reads/sec:
    - NVMe wait: 1,000 * 50μs = 50ms of total I/O wait.
    - Lustre wait: 1,000 * 3ms = 3s of I/O wait per second.
    - **Conclusion:** **The pipeline is I/O-bound 100% of the time during epoch 1, explaining the 40% throughput loss.**
