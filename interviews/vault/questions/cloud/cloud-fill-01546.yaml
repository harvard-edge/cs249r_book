title: Real-time Sensor Data Ingestion & ML Inference on AMD MI300X
scenario: You are designing a real-time anomaly detection system for industrial IoT sensors. The system
  needs to ingest data from 100,000 sensors, each emitting 1KB of data every 100ms. This raw data stream
  must be processed, features extracted, and then fed into a deep learning model for real-time inference.
  The inference engine will run on an AMD MI300X accelerator, which offers 192 GB HBM3, 1,307 TFLOPS FP16
  sparse compute, and a staggering 5.3 TB/s memory bandwidth. Detail the concrete architecture for the
  data ingestion, stream processing, feature computation, and the integration points with the MI300X,
  ensuring it can sustain the input data rate while minimizing end-to-end latency.
details:
  realistic_solution: Implement a distributed stream processing framework (e.g., Flink or Spark Streaming
    with Kafka) for ingestion and initial feature engineering. Utilize high-throughput connectors and
    optimized serialization to push processed mini-batches directly to the MI300X's host memory. Leverage
    asynchronous data transfer mechanisms (e.g., ROCm's asynchronous memory copies) and potentially specialized
    data structures on the GPU to maximize memory bandwidth utilization and keep the MI300X busy. Consider
    kernel fusion or on-device preprocessing for computationally intensive feature computation steps that
    can benefit from GPU parallelism, minimizing CPU-GPU synchronization overhead.
  common_mistake: Underestimating the data movement overhead and I/O bottlenecks when dealing with high-bandwidth
    HBM3 and high-throughput data streams, especially when data pre-processing is not efficiently offloaded
    or parallelized with GPU compute. Another common mistake is poor batching strategies that don't fully
    utilize the MI300X's parallel processing capabilities.
  napkin_math: 'Total ingress data rate: 100,000 sensors * 1 KB/sensor / 0.1 s = 1 GB/s. This translates
    to 8 Gbps, which is manageable over high-speed networks. The MI300X''s 5.3 TB/s (5300 GB/s) memory
    bandwidth is orders of magnitude higher than the ingress rate, indicating that data transfer to and
    from the GPU itself, if done efficiently, will not be the primary bottleneck. However, the throughput
    of the stream processing framework, latency of feature extraction, and the computational complexity/latency
    of the ML model on the MI300X, along with batching strategy and synchronization overheads, will determine
    the overall system latency and throughput. For example, if each inference requires 100MB of data (batch
    + model weights), the MI300X could theoretically move this in ~19 microseconds, showcasing the importance
    of keeping the compute pipeline saturated.'
