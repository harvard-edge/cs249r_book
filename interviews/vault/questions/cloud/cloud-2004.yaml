title: LLM Inference Trace Saturation
scenario: 'A distributed LLM inference cluster with 500 nodes processes 2,000 requests per second per node. To debug P99 latencies, the team enables high-resolution tracing, generating a 10KB JSON trace payload per request. All nodes send these traces directly to a centralized observability cluster over a shared 100 Gbps inter-cluster uplink. Shortly after deployment, the uplink saturates, dropping critical control-plane traffic.'
question: 'What is saturating the 100 Gbps observability uplink, and what node-level aggregation strategy would you deploy?'
details:
  realistic_solution: 'The sheer volume of uncompressed, raw JSON traces is completely overwhelming the network link. Implement local edge aggregation and Tail-Based Sampling. Convert raw traces to local latency histograms, sample 100% of P99 tail errors, and apply a 1% sample rate for normal requests. Compress the payload (e.g., using zstd) before transmission.'
  common_mistake: |
    **The Pitfall:** Scaling up the centralized collector or upgrading the network link.
    **The Rationale:** Treating the symptom (network saturation) instead of the root cause (unbounded telemetry generation at the source).
    **The Consequence:** Wasting money on expensive network upgrades or implementing simple random sampling which drops the rare tail-latency events actually needed for debugging.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 500 nodes * 2,000 req/sec = 1,000,000 requests/sec.
       * Trace size: 10 KB per request.
       * Network capacity: 100 Gbps.
    2. **Calculations:**
       * Raw telemetry: 1,000,000 req/sec * 10 KB = 10,000,000 KB/sec ≈ 10 GB/s.
       * Bandwidth conversion: 10 GB/s * 8 = 80 Gbps.
       * Tail-based sampling (1% normal, 5% tail): Volume drops by ~94%.
       * New bandwidth: 80 Gbps * 0.06 = 4.8 Gbps.
    3. **Conclusion & Interpretation:**
       * **Result: Network-Bound. Raw traces consume 80% of the link; tail-based sampling mitigates this by reducing load to 4.8 Gbps.**
