title: LLM Inference Trace Saturation
scenario: A distributed LLM inference cluster with 500 nodes processes 2,000 requests per second per node. To debug P99 latencies, the team enables high-resolution tracing, generating a 10KB JSON trace payload per request. All nodes send these traces directly to a centralized observability cluster over a shared 100 Gbps inter-cluster uplink. Shortly after deployment, the uplink saturates, dropping critical control-plane traffic and causing cascading timeouts.
question: What is saturating the 100 Gbps observability uplink, and what node-level aggregation strategy would you deploy?
details:
  realistic_solution: Implement local aggregation and tail-based sampling on each node. Calculate metrics (e.g., latency histograms) locally instead of sending raw traces. Sample 100% of traces exceeding the P95 latency threshold and only 1% of normal requests. Batch and compress (e.g., zstd) the sampled traces every 5 seconds before transmission.
  common_mistake: |
    **The Pitfall:** Scaling up the centralized collector or upgrading the network link.
    **The Rationale:** Treating the symptom (network saturation) instead of the root cause (unbounded telemetry generation at the source).
    **The Consequence:** Wasting money on expensive network upgrades or implementing simple random sampling which drops the rare tail-latency events actually needed for debugging.
  napkin_math: |
    *   **Raw Telemetry Generation:** 500 nodes $\times$ 2,000 req/sec $\times$ 10 KB = 10,000,000 KB/sec.
    *   **Bandwidth Conversion:** 10 GB/sec = 80 Gbps.
    *   **Link Saturation:** This consumes **80%** of the 100 Gbps link, leaving little room for micro-bursts or control plane traffic.
    *   **Tail-Based Sampling:** With 1% sampling for normal traffic and assuming 5% tail/error requests, the volume drops by ~94%.
    *   **New Bandwidth:** 80 Gbps $\times$ 0.06 = **~4.8 Gbps**.
