title: GPU Operator vs Manual Driver Management in K8s
scenario: 'Compare two approaches for managing NVIDIA drivers and tooling in a Kubernetes GPU cluster:
  (A) pre-installing drivers on the host OS of each node, or (B) using the NVIDIA GPU Operator. What does
  the GPU Operator manage that manual installation does not?'
details:
  realistic_solution: 'Manual installation (A): install NVIDIA driver on host OS, install nvidia-container-toolkit,
    deploy device plugin DaemonSet, deploy DCGM exporter separately, manually configure MIG, manually
    update drivers (requires node drain and reboot). Works but is fragile: driver version mismatches between
    nodes, manual update process, no self-healing. GPU Operator (B): deploys as a single Helm chart and
    manages: (1) NVIDIA driver (as a container or pre-installed detection), (2) nvidia-container-toolkit,
    (3) NVIDIA device plugin, (4) DCGM exporter (GPU metrics for Prometheus), (5) GPU Feature Discovery
    (labels nodes with GPU model, driver version, CUDA version, MIG capability), (6) MIG Manager (reconfigures
    MIG profiles via CRD without manual SSH), (7) Node Feature Discovery integration, (8) Validator (runs
    GPU health checks on node startup). Key advantage: when adding a new bare-metal node to the cluster,
    the GPU Operator automatically installs drivers and configures everything. No manual SSH needed. The
    Operator also handles driver upgrades by draining nodes, updating the driver pod, and uncordoning
    — fully automated. For production: always use GPU Operator. Manual installation only for air-gapped
    or highly customized environments.'
  common_mistake: Thinking the GPU Operator only installs drivers. It manages the entire NVIDIA software
    stack as Kubernetes-native resources, including device plugin, container runtime, DCGM monitoring,
    MIG manager, and GFD (GPU Feature Discovery).
  napkin_math: 'GPU Operator deployment: 1 Helm install, ~5 min. Manual setup per node: driver install
    (10 min) + toolkit (5 min) + config (10 min) = 25 min. For 100 nodes: 42 hrs manual vs 5 min automated.'
