title: High-Throughput Speculative Decoding on AMD MI300X for Low-Latency LLM Inference
scenario: You are tasked with designing a high-performance ML inference system for large language models,
  specifically focusing on low-latency text generation. The system will run on an AMD MI300X accelerator,
  featuring 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth. To meet the
  aggressive real-time latency targets for autoregressive generation, you've opted for a speculative decoding
  approach, utilizing a draft-verify decoding mechanism. Outline the architectural considerations for
  implementing this system. How would you effectively utilize the MI300X's impressive HBM3 capacity and
  bandwidth for storing and rapidly switching between multiple draft models and the larger verify model?
  Detail your strategy for dynamically selecting the optimal draft model based on the input context and
  for maximizing the acceptance rate of drafted tokens to achieve significant latency reduction. Discuss
  how the sparse FP16 TFLOPS compute capability would influence your choice of model architectures or
  quantization strategies for both the draft and verify models.
question: "How would you architect speculative decoding on MI300X to co-locate draft and verify models, select drafts dynamically, and maximize acceptance?"
details:
  realistic_solution: Leverage the 192 GB HBM3 to co-locate the large verify model and several specialized
    smaller draft models. The 5.3 TB/s bandwidth enables extremely fast loading/unloading of draft models
    or even concurrent inference on multiple draft models. Implement a hierarchical or contextual draft
    model selection mechanism, potentially using a small, fast classifier running on the MI300X itself
    to decide which draft model (e.g., domain-specific, general-purpose) is most likely to generate high-quality
    proposals for the current input, thereby maximizing acceptance rates. Optimize both draft and verify
    models to exploit sparse FP16 TFLOPS, perhaps through structured sparsity or specialized quantization
    schemes, ensuring high compute utilization. Develop custom kernels or use libraries that effectively
    utilize the MI300X's specific hardware features for parallel processing of verification steps.
  common_mistake: Failing to account for the interplay between memory bandwidth, HBM3 capacity, and sparse
    compute capabilities, leading to suboptimal draft model selection or inefficient data movement during
    the verification process, which negates the benefits of speculative decoding.
  napkin_math: If a verify model takes 5ms per token to generate. With a speculative decoding draft proposing
    4 tokens and an acceptance rate of 80%, we effectively generate 4 tokens in approximately the time
    it takes to process the first token, plus any re-generation. If the verification step takes 1ms, and
    20% of tokens need full regeneration (5ms), the average time to yield 4 tokens could be approximated
    as 1ms (verification) + 0.2 * 5ms (regeneration of one token) = 2ms. This equates to 0.5ms per token,
    a 10x speedup. The 5.3 TB/s HBM3 bandwidth is essential to ensure that the verification step is not
    bottlenecked by memory access, allowing the rapid comparison of draft and verify model outputs.
