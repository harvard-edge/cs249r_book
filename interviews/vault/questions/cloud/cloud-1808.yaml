title: Roofline Model Analysis on A100
scenario: 'You are deploying a custom Transformer model on a GPU that provides 312 TFLOPs of compute and 2.0 TB/s of memory bandwidth. Profiling shows your workload has an arithmetic intensity of 150 FLOPs/byte.'
question: 'What is the model''s theoretical maximum throughput on the GPU, and is it compute-bound or memory-bound?'
details:
  realistic_solution: 'First, calculate the hardware ridge point: 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte. Because the workload''s arithmetic intensity of 150 FLOPs/byte is less than the ridge point (150 < 156), the workload is memory-bound. The theoretical maximum throughput is limited by memory bandwidth: 150 FLOPs/byte * 2.0 TB/s = 300 TFLOPs.'
  common_mistake: |
    **The Pitfall:** Assuming the workload is compute-bound simply because 150 FLOPs/byte seems like a "high" number.
    **The Rationale:** Candidates may not calculate the hardware ridge point and instead intuitively guess that complex models are compute-bound, estimating performance at the peak 312 TFLOPs.
    **The Consequence:** This leads to inaccurate performance projections and misdirected optimization efforts (e.g., trying to optimize compute instead of memory access patterns).
  napkin_math: |
    - **Hardware Ridge Point:** 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte.
    - **Bound Determination:** Workload AI (150 FLOPs/byte) < Ridge Point (156 FLOPs/byte), so the workload is **Memory-Bound**.
    - **Maximum Throughput:** 150 FLOPs/byte * 2.0 TB/s = **300 TFLOPs.**
