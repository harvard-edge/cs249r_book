title: Adversarial Robustness on AMD MI300X in Cloud Deployments
scenario: Your team is deploying a critical, real-time image recognition model to a cloud environment
  utilizing AMD MI300X accelerators (192 GB HBM3, 1,307 TFLOPS FP16 sparse, 5.3 TB/s memory bandwidth)
  for high-throughput inference. This model is susceptible to adversarial attacks. Design a system to
  detect and mitigate adversarial perturbations on incoming inference requests at the edge, before they
  reach the MI300X, while maintaining strict latency requirements. How would you leverage the MI300X's
  capabilities for robustness, and what defense strategies would you implement to ensure the reliability
  and security of the deployed model against sophisticated attacks like prompt injection or side-channel
  attacks targeting the hardware itself?
question: "How would you design edge detection and MI300X-side defenses against adversarial perturbations, prompt injection, and side-channel attacks?"
details:
  realistic_solution: 'Implement a multi-layered defense: (1) Pre-processing filters at the ingress (e.g.,
    input sanitization, adversarial perturbation detection using lightweight models) on CPU/smaller GPU
    nodes. (2) On-device robustness techniques on the MI300X itself, such as adversarial training, certified
    robustness methods (if feasible given performance), or randomized smoothing. (3) Continuous monitoring
    for anomaly detection, both on inference outputs and hardware telemetry, to identify potential side-channel
    attacks or unusual resource consumption patterns. Leverage MI300X''s high memory bandwidth (5.3 TB/s)
    for efficient loading of diverse adversarial samples during robustness validation and for parallel
    execution of defense mechanisms.'
  common_mistake: Over-relying on software-only defenses post-inference, or neglecting the unique vulnerabilities
    and mitigation strategies specific to high-performance accelerators like the AMD MI300X, such as data
    corruption or timing attacks possible due to shared memory/compute resources.
  napkin_math: If an adversarial detection model adds 10ms latency per inference and your target is 50ms
    total inference time including the main model, you have 40ms budget for the primary inference and
    data transfer. With 5.3 TB/s memory bandwidth, moving 192GB of HBM3 data takes approx. 36ms in theory
    (192e9 / 5.3e12), but actual transfer is much less for a single inference. Focus on minimizing data
    copies and exploiting the MI300X's 1,307 TFLOPS FP16 sparse performance for rapid defense model execution
    or multi-model ensembles if the detection model is also on the MI300X. Compute cost of detection should
    be < (total_latency_budget - main_model_latency - data_transfer_latency).
