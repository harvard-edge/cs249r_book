title: Rail-Optimized Network for GPU Clusters
scenario: You are designing a 512-GPU MI300X cluster's network. Each node has 8 MI300X
  GPUs connected via Infinity Fabric internally. You must choose between a traditional
  fat-tree connecting all 64 nodes and a rail-optimized topology where GPU 0 of every
  node connects to switch rail 0, GPU 1 to rail 1, etc. Specify the topology, calculate
  the switch count, and explain which AllReduce algorithm maps best to each.
question: How would you design the rail-optimized topology, how many switches does
  it need versus a full fat-tree, and which AllReduce maps best?
details:
  realistic_solution: 'Rail-optimized: 8 independent networks (rails), each connecting
    64 GPUs (one per rank). Each rail requires only a single 64-port switch = 8 switches
    total. A non-blocking fat-tree for all 512 GPUs using 64-port switches requires
    a 2-tier topology: 16 leaf switches + 8 spine switches = 24 switches total.
    Rail-optimized saves 66% on switches. AllReduce mapping: (1) Intra-node reduce-scatter
    across 8 GPUs via Infinity Fabric (896 GB/s) — reduces to 1/8 of gradient. (2)
    Inter-node AllReduce on each rail independently — 64 GPUs per rail, ring or tree
    AllReduce over the rail''s single switch. Each rail carries only 1/8 of the total
    gradient, so bandwidth per rail = 1/8 of total. (3) Intra-node all-gather via
    Infinity Fabric. This hierarchical AllReduce uses Infinity Fabric for the high-bandwidth
    step and Ethernet/IB for the long-haul step, matching bandwidth to distance.'
  common_mistake: Assuming rail-optimized is simply a wiring convenience. It fundamentally
    changes the AllReduce algorithm — each rail carries only GPU-rank-matched traffic,
    eliminating cross-rail contention that plagues flat topologies during AllReduce.
  napkin_math: 'Rail-optimized: 8 rails × 1 switch = 8 switches. Fat-tree: 24 switches.
    Savings: 16 switches × $15K = $240K. AllReduce for 1 GB gradient: intra-node
    reduce-scatter on Infinity Fabric (896 GB/s): 1 GB × 7/8 / 896 GB/s = 0.98ms. Inter-node ring
    AllReduce on rail (400 Gbps per link): 2 × 125 MB × 63/64 / 50 GB/s = 4.92ms. Intra-node all-gather
    on Infinity Fabric: 1 GB × 7/8 / 896 GB/s = 0.98ms. Total: 6.88ms. Flat ring AllReduce: 2 × 1 GB × 511/512
    / 50 GB/s = 39.9ms. Rail-optimized is ~5.8× faster.'
