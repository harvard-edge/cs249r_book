title: 'KV-Cache: Implement KV Cache Size Calculation for LLM Serving'
scenario: 'Implement the KV cache sizing calculation for a 70B LLM (GQA: 64 Q heads, 8 KV heads, head_dim=128,
  80 layers, bf16) deployed on 8 H100s with tensor parallelism. Compute the per-GPU HBM allocation for:
  model weights, KV cache, and activations. How many tokens can be cached simultaneously?'
question: "How many tokens can be cached simultaneously?"
details:
  realistic_solution: 'With tensor parallelism TP=8: each GPU holds 1/8 of model weights. KV heads: 8
    KV heads / 8 GPUs = 1 KV head per GPU. Each GPU caches KV for its KV head only.'
  common_mistake: Not accounting for tensor parallelism splitting KV heads across GPUs; forgetting that
    with TP=8 and 8 KV heads, each GPU gets 1 KV head.
  napkin_math: '70B model, TP=8. Per-GPU model weights: 70B × 2B bf16 / 8 = 17.5GB. KV per token per layer
    per GPU: 2 × (8 KV heads / 8 GPUs) × 128 × 2B = 2 × 1 × 128 × 2B = 512B per token per layer. 80 layers:
    80 × 512B = 40KB per token total (across all layers) on one GPU. Available HBM per GPU: 80GB - 17.5GB
    model - 1GB activations = 61.5GB. Tokens cached per GPU: 61.5GB / 40KB = 1,537,500 tokens. 8 GPUs
    all cache same tokens (each stores its KV head''s data): total concurrent token capacity = 1.54M tokens.
    At avg 2048 tokens/request: 1.54M / 2048 = 750 concurrent requests max. Impressive capacity due to
    GQA reducing KV heads 8×.'
