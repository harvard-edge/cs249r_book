title: Diagnosing Silent Data Corruption in Distributed LLM Training
scenario: You are orchestrating the pre-training of a 175B parameter model on a cluster of 2,048 H100 GPUs using 3D parallelism. Around iteration 45,000, you begin observing intermittent, non-reproducible loss spikes. The training process does not crash, and standard hardware telemetry (DCGM) and NCCL health checks report 100% health. However, the model's validation perplexity is steadily degrading.
question: How do you diagnose and isolate the root cause of this failure without halting the entire cluster for days?
details:
  realistic_solution: Implement anomalous gradient norm detection at the rank level prior to the DP AllReduce step to catch poisoned gradients. Once a spike is detected, isolate the suspect PP/TP group and run a deterministic MATMUL diagnostic (comparing results against a known good CPU baseline) to identify the specific GPU suffering from Silent Data Corruption (SDC) in its Tensor Cores or SRAM.
  common_mistake: |
    **The Pitfall:** Attributing loss spikes to algorithm instability (e.g., learning rate or bad data batches).
    **The Rationale:** Because hardware telemetry reports healthy, candidates incorrectly assume the model state or hyperparameters are flawed.
    **The Consequence:** Attempting to tune optimizer state or simply restarting from the last checkpoint without isolating the faulty hardware guarantees recurrence of poisoned gradients due to Silent Data Corruption (SDC).
  napkin_math: |
    1. Analyze SDC frequency: If the Mean Time Between Failures (MTBF) for a transient SDC on a single GPU is 10,000 hours.
    2. Calculate cluster SDC rate: A cluster of 2,048 GPUs will experience an SDC approximately every 10,000 / 2,048 ≈ 4.88 hours.
    3. **Project over training run: Over a 30-day training run, the system must proactively mitigate (24 / 4.88) * 30 ≈ 148 Byzantine failures.**
