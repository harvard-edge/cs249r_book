title: Evaluating Global vs. Shard-Level Shuffling for 10TB LLM Training
scenario: >-
  You are architecting the data pipeline for a 175B LLM trained on a 10TB dataset stored in S3.
  The cluster has 1024 A100 GPUs. You must evaluate the trade-offs between implementing true global shuffling
  via a central metadata service versus shard-level shuffling with 2GB shards and a 20GB local worker
  buffer.
question: >-
  Which shuffling design would you choose for the 10TB S3 dataset on 1024 GPUs, and why?
details:
  realistic_solution: 'Adopt shard-level shuffling. Pre-chunk the dataset into 2GB shards for sequential S3 reads (maximizing bandwidth), and use a 20GB local buffer per worker to shuffle samples across 10 cached shards, providing sufficient pseudo-randomness without I/O bottlenecks.'
  common_mistake: |
    **The Pitfall:** Prioritizing perfect statistical randomness over I/O throughput.
    **The Rationale:** Candidates assume true global shuffling is strictly required for SGD convergence and accept the massive I/O latency penalty of random object storage reads.
    **The Consequence:** Severe GPU starvation and vastly inflated training times and costs.
  napkin_math: |
    1. **S3 sequential read throughput:** ~80-100MB/s per stream.
    2. **Random read latency:** ~50ms TTFB per sample.
    3. **Batch overhead:** For a batch of 4096 (100KB) samples, random reads take 4096 × 50ms = ~200 seconds of latency.
    4. **Sequential overhead:** Fetching the same volume takes ~4 seconds.
    5. **Conclusion:** Shard-level shuffling avoids the **50x latency penalty**, keeping GPUs fed.
