title: Evaluating Global vs. Shard-Level Shuffling for 10TB LLM Training
scenario: You are architecting the data pipeline for a 175B LLM trained on a 10TB dataset stored in S3.
  The cluster has 1024 A100 GPUs. You must evaluate the trade-offs between implementing true global shuffling
  via a central metadata service versus shard-level shuffling with 2GB shards and a 20GB local worker
  buffer. Justify your design choice focusing on storage I/O throughput, GPU utilization, and the statistical
  impact on convergence.
details:
  realistic_solution: Adopt shard-level shuffling. Pre-chunk the dataset into 2GB shards for sequential
    S3 reads (maximizing bandwidth), and use a 20GB local buffer per worker to shuffle samples across
    10 cached shards, providing sufficient pseudo-randomness without I/O bottlenecks.
  common_mistake: Assuming true global shuffling is strictly required for SGD convergence and accepting
    the massive I/O latency penalty of random object storage reads, leading to severe GPU starvation.
  napkin_math: S3 sequential read throughput per stream is ~80-100MB/s. Random reads incur ~50ms TTFB
    latency per sample. For a batch of 4096 (100KB) samples, random reads take 4096 * 50ms = ~200 seconds
    of latency overhead. Sequential reads fetch the same volume in ~4 seconds. Shard-level shuffling avoids
    the 50x latency penalty, keeping GPUs fed.
