title: Evaluate AllReduce Overlap Time
scenario: You are training a 100B parameter model on a cluster of 8 GPUs. NVLink bandwidth is 900 GB/s and effective backward compute throughput is 500 TFLOP/s.
question: Evaluate whether the Ring AllReduce communication time for a 1B parameter layer's FP16 gradients exceeds its backward pass compute time, assuming a batch size of 4096 and sequence length of 2048.
details:
  realistic_solution: A 1B parameter layer requires 2GB for FP16 gradients. For Ring AllReduce on 8 GPUs, the data transferred is 2 * (8-1)/8 * 2GB = 3.5GB. At 900 GB/s, communication takes 3.5 / 900 = 3.89 ms. The backward pass compute is roughly 4 * batch * seq_len * parameters = 4 * 4096 * 2048 * 1e9 = 33.5 TFLOPs. At 500 TFLOP/s, compute takes 33.5 / 500 = 67 ms. Since 3.89 ms < 67 ms, communication is fully hidden.
  common_mistake: |
    **The Pitfall:** Forgetting the 2(N-1)/N multiplier for Ring AllReduce transferred data, or underestimating the backward pass FLOPs.
    **The Rationale:** Candidates often use simpler point-to-point bandwidth calculations or assume backward pass compute matches forward pass.
    **The Consequence:** Overestimating communication overhead and misunderstanding where the pipeline bottlenecks actually lie.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B parameter layer gradients in FP16 = 2GB.
       - 8 GPUs, Ring AllReduce.
       - NVLink bandwidth: 900 GB/s.
       - Workload: Batch 4096, Sequence length 2048.
       - Backward compute throughput: 500 TFLOP/s.
    2. **Calculations:**
       - Ring AllReduce transfer = 2 * (7/8) * 2GB = 3.5GB.
       - Communication time = 3.5GB / 900GB/s = 3.89 ms.
       - Backward pass compute = 4 * 4096 * 2048 * 1e9 = 33.5 TFLOPs.
       - Compute time = 33.5 TFLOPs / 500 TFLOP/s = 67 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** 3.89 ms communication is fully hidden by 67 ms compute.
