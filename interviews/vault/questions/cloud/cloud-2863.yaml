title: Evaluate AllReduce Overlap Time
scenario: You are training a 100B parameter model on a cluster of 8 H100 SXM GPUs.
  You need to determine if the gradient synchronization for a 1B parameter layer can
  be completely hidden behind the computation of the next layer's backward pass, assuming
  NVLink bandwidth of 900 GB/s and effective backward compute throughput of 500 TFLOP/s.
question: Evaluate whether the Ring AllReduce communication time for the 1B parameter
  layer's FP16 gradients exceeds its backward pass compute time, assuming a batch
  size of 4096 and sequence length of 2048.
details:
  realistic_solution: A 1B parameter layer requires 2GB for FP16 gradients. For Ring
    AllReduce on 8 GPUs, the data transferred is 2 * (8-1)/8 * 2GB = 3.5GB. At 900
    GB/s, communication takes 3.5 / 900 = 3.89 ms. The backward pass compute is roughly
    4 * batch * seq_len * parameters = 4 * 4096 * 2048 * 1e9 = 33.5 TFLOPs. At 500
    TFLOP/s, compute takes 33.5 / 500 = 67 ms. Since 3.89 ms < 67 ms, communication
    is fully hidden.
  common_mistake: Forgetting the 2(N-1)/N multiplier for Ring AllReduce transferred
    data, or underestimating the FLOPs required for the backward pass compared to
    the forward pass.
  napkin_math: Comm = 3.5GB / 900GB/s = 3.89ms. Comp = 33.5TFLOPs / 500TFLOP/s = 67ms.
    3.89ms < 67ms.
