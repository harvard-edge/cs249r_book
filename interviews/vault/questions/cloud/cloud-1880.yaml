title: Mitigating Silent Data Corruption in LLM Training
scenario: 'You are training a 500B parameter LLM on a massive GPU cluster. On day 12, the training loss inexplicably spikes to NaN. Restoring from the last checkpoint results in the same divergence after 20 minutes, despite zero uncorrectable ECC errors reported. The checkpoint is poisoned.'
question: 'Evaluate the trade-offs and select an SDC mitigation strategy to avoid poisoned checkpoints without drastically reducing Goodput.'
details:
  realistic_solution: 'The root cause is Silent Data Corruption (SDC). Implement low-overhead software-level invariant checks (e.g., asserting gradient norms are within historical bounds) at the optimizer step. Combine this with periodic fast diagnostic matrix multiplication payloads injected during checkpointing to proactively identify and cordon the silent-failing GPU. This preserves >95% Goodput while protecting the checkpoint integrity.'
  common_mistake: |
    **The Pitfall:** Assuming standard hardware ECC catches all errors, or blindly suggesting full Dual Modular Redundancy (DMR).
    **The Rationale:** Candidates overlook logical SDCs or propose sweeping redundancy solutions that halve effective compute.
    **The Consequence:** Either poisoned checkpoints silently ruin multi-week runs, or DMR reduces total Goodput by >50%.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU SDC MTBF: 5 years (43,800 hrs). Cluster: 16,384 GPUs.
    - Checkpoint interval: 2 hours.

    **Calculations:**
    - Cluster MTBF = 43,800 / 16,384 = ~2.67 hours.
    - Probability of SDC within 2 hours = 1 - exp(-2 / 2.67) = ~52.7%.

    **Conclusion & Interpretation:**
    - **Result: A poisoned checkpoint is mathematically probable over a multi-week run without software mitigations (Reliability-Bound).**
