title: Mitigating Silent Data Corruption in LLM Training
scenario: You are training a 500B parameter LLM on a cluster of 16,384 H100 GPUs. On day 12, the training
  loss inexplicably spikes to NaN. Restoring from the last 2-hour checkpoint results in the same divergence
  after 20 minutes, despite zero ECC uncorrectable errors reported by the BMCs. The checkpoint is poisoned.
  Evaluate the trade-offs between software-level invariant checks (e.g., gradient norm checksums), node-level
  diagnostic jobs, and Dual Modular Redundancy (DMR) to mitigate Silent Data Corruption (SDC) without
  drastically reducing Goodput.
question: "Which SDC mitigation strategy would you deploy to avoid poisoned checkpoints on 16,384 H100s without drastically reducing Goodput?"
details:
  realistic_solution: Implement low-overhead software-level invariant checks (e.g., asserting gradient
    norms are within historical bounds) at the optimizer step, combined with periodic fast diagnostic
    matrix multiplication payloads injected during checkpointing to identify and cordon the specific silent-failing
    GPU.
  common_mistake: Assuming standard hardware ECC catches all memory or logic errors, or suggesting full
    Dual Modular Redundancy (DMR) which halves the effective compute capacity (reducing Goodput by >50%).
  napkin_math: If GPU SDC MTBF is 5 years (43,800 hrs), a 16,384 GPU cluster experiences an SDC every
    43,800 / 16,384 = ~2.67 hours. A 2-hour checkpoint interval means there is a ~53% chance (1 - exp(-2/2.67))
    of experiencing a silent error within a single checkpoint window, virtually guaranteeing poisoned
    checkpoints over a multi-week run.
