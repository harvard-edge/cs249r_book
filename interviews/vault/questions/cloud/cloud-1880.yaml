title: Mitigating Silent Data Corruption in LLM Training
scenario: 'You are training a 500B parameter LLM on a cluster of 16,384 H100 GPUs. On day 12, the training loss inexplicably spikes to NaN. Restoring from the last 2-hour checkpoint results in the same divergence after 20 minutes, despite zero ECC uncorrectable errors reported by the BMCs. The checkpoint is poisoned.'
question: "Evaluate the trade-offs and select an SDC mitigation strategy to avoid poisoned checkpoints on 16,384 H100s without drastically reducing Goodput."
details:
  realistic_solution: 'Implement low-overhead software-level invariant checks (e.g., asserting gradient norms are within historical bounds) at the optimizer step, combined with periodic fast diagnostic matrix multiplication payloads injected during checkpointing to identify and cordon the specific silent-failing GPU.'
  common_mistake: |
    **The Pitfall:** Assuming standard hardware ECC catches all errors, or suggesting full Dual Modular Redundancy (DMR).
    **The Rationale:** Candidates often overlook silent data corruption (logic errors) or propose solutions that halve effective compute.
    **The Consequence:** Either poisoned checkpoints ruin multi-week runs, or DMR reduces Goodput by >50%.
  napkin_math: |
    1. If GPU SDC MTBF is 5 years (43,800 hrs).
    2. A 16,384 GPU cluster experiences an SDC every `43,800 / 16,384 = ~2.67 hours`.
    3. A 2-hour checkpoint interval means there is a `1 - exp(-2/2.67) = ~52.7%` chance of experiencing a silent error within a single checkpoint window.
    4. **Result:** A poisoned checkpoint is virtually guaranteed over a multi-week run without software mitigations.
