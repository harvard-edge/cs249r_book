title: Diagnosing Activation Outliers in INT8 Quantized LLMs
scenario: Your team quantized an 8B parameter LLM from FP16 to INT8 (W8A8) for serving on Nvidia L4 GPUs, aiming for a 2x throughput gain. Automated benchmarking shows only a 0.5% drop in aggregate MMLU score (from 68.4% to 67.9%). However, after canary deployment, production monitoring reveals that 4% of customer support queries involving context longer than 2,048 tokens result in complete gibberish or severe hallucination.
question: Why did W8A8 quantization look fine on MMLU but fail on long-context support queries, and what is the root cause?
details:
  realistic_solution: Diagnose that standard W8A8 quantization clips emergent activation outliers specific to long sequences. Implement sequence-length stratified benchmarking to catch this, and switch to techniques like SmoothQuant to mathematically migrate quantization difficulty from activations to weights.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate short-context benchmarks like MMLU.
    **The Rationale:** Candidates assume standard benchmarks adequately cover the full input distribution.
    **The Consequence:** They fail to recognize that large activation outliers emerge primarily in long-context sequences, causing destructive clipping in naive INT8 quantization.
  napkin_math: |
    - Typical activations: [-5, 5]. INT8 scale factor: 5/127 = 0.039.
    - Long-context outlier of magnitude 150 gets clipped to 5 (absolute error of 145).
    - Across just 10 outlier channels in a 4096-dim hidden state, this introduces massive distortion into the downstream attention softmax.
    - **Result: Generation quality collapses.**
