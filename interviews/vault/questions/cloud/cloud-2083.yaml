title: CNN vs Transformer Arithmetic Intensity
scenario: A 3×3 convolution layer and a self-attention layer both process the same feature map. Which
  layer typically has higher arithmetic intensity (FLOPs per byte), and what does that imply about their
  hardware bottleneck?
question: "Which layer typically has higher arithmetic intensity (FLOPs per byte), and what does that imply about their hardware bottleneck?"
details:
  realistic_solution: Convolutions have much higher arithmetic intensity. A 3×3 conv reuses each weight
    across every spatial position (high data reuse), making it compute-bound. Self-attention generates
    an $S \times S$ score matrix that must be materialized in memory with limited reuse, making it memory-bandwidth-bound
    for long sequences.
  common_mistake: Assuming both layers have similar compute profiles because they both involve matrix
    operations.
  napkin_math: '3×3 conv on 56×56×256: each of the 9 weights is reused 56×56=3136 times → AI ≈ hundreds
    of FLOPs/byte. | Attention on 4K tokens: each score is used once → AI ≈ 2–10 FLOPs/byte (memory-bound).'
  options:
  - Attention has higher arithmetic intensity because it involves more matrix multiplies.
  - Convolutions have higher arithmetic intensity due to massive weight reuse across spatial positions.
  - They have identical arithmetic intensity since both perform dot products.
  - Neither is meaningful to compare because arithmetic intensity only applies to fully-connected layers.
  correct_index: 1
