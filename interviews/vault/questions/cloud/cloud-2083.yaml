title: CNN vs Transformer Arithmetic Intensity
scenario: "A 3x3 convolution layer and a self-attention layer both process the same feature map."
question: "Which layer typically has higher arithmetic intensity (FLOPs per byte), and what does that imply about their hardware bottleneck?"
details:
  realistic_solution: "Convolutions have much higher arithmetic intensity. A 3x3 conv reuses each weight across every spatial position (high data reuse), making it compute-bound. Self-attention generates an $S \times S$ score matrix that must be materialized in memory with limited reuse, making it memory-bandwidth-bound for long sequences."
  common_mistake: |
    **The Pitfall:** Assuming both layers have similar compute profiles because they both involve matrix operations.
    **The Rationale:** Engineers focus on the high FLOP count of attention without analyzing the memory traffic required to materialize the attention scores.
    **The Consequence:** Deploying attention-heavy models on hardware with high compute but low memory bandwidth, leading to terrible utilization.
  napkin_math: |
    *   **3x3 Conv (e.g., 56x56x256):** Each of the 9 weights is reused 56x56=3136 times.
    *   **Conv AI:** **Hundreds of FLOPs/byte** (Compute-bound).
    *   **Attention (4K tokens):** Each score in the NxN matrix is used once to weight the values.
    *   **Attention AI:** **2-10 FLOPs/byte** (Memory-bound).
  options:
  - Attention has higher arithmetic intensity because it involves more matrix multiplies.
  - Convolutions have higher arithmetic intensity due to massive weight reuse across spatial positions.
  - They have identical arithmetic intensity since both perform dot products.
  - Neither is meaningful to compare because arithmetic intensity only applies to fully-connected layers.
  correct_index: 1
