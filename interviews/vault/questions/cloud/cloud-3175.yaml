title: Speculative Decoding Token Probability Calibration
scenario: 'In speculative decoding, the draft model q(x) and target model p(x) must be compared token by token.'
question: "Why must speculative decoding use the full vocabulary probability distributions rather than just comparing top-1 tokens, and what property does the rejection sampling procedure guarantee?"
details:
  realistic_solution: 'The rejection sampling procedure guarantees that the combined output distribution is exactly p(x) — the target model''s distribution. This is the lossless property. It works by: (1) sampling x ~ q(x) from draft, (2) accepting with prob min(1, p(x)/q(x)), (3) on rejection, sampling from the residual distribution max(0, p(x)-q(x))/Z. This ensures: P(output=x) = q(x) x min(1, p(x)/q(x)) + P(rejected) x max(0, p(x)-q(x))/Z = p(x). Top-1 comparison would be lossy: if draft and target agree on top-1 but the target wants to sample a tail token 5% of the time, top-1 matching would suppress that 5% — changing the effective temperature and diversity of the target model. This matters for creative writing, diverse code generation, and any temperature > 0 use case.'
  common_mistake: |
    **The Pitfall:** Assuming that top-1 token matching is equivalent to full distribution comparison for speculative acceptance.
    **The Rationale:** Engineers often conflate argmax greedy decoding with stochastic sampling, thinking that if both models agree on the most likely token, the target distribution is perfectly preserved.
    **The Consequence:** The output distribution diverges from the target model p(x), effectively altering the sampling temperature, destroying output diversity, and invalidating the theoretical correctness of speculative decoding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Draft model distribution: q(x).
       - Target model distribution: p(x).
       - Temperature > 0 (sampling is active).
    2. **Calculations:**
       - Top-1 acceptance rate for high-quality draft = ~90%, but P(output) ≠ p(x).
       - Full rejection sampling acceptance rate: α = 1 - TotalVariation(p, q) ≈ 80%.
       - Rejection sampling formula ensures: P(x) = q(x) × min(1, p(x)/q(x)) + P(rejected) × max(0, p(x)-q(x))/Z = p(x).
    3. **Conclusion & Interpretation:**
       - **Result: Lossless Distribution**. Rejection sampling guarantees mathematically exact preservation of the target distribution at the cost of a slightly lower acceptance rate compared to lossy top-1 matching.
