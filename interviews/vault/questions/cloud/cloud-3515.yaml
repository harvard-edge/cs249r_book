title: Graceful Degradation for Real-time Anomaly Detection on Google TPU v5e
scenario: You are leading the architecture of a high-throughput, real-time financial
  transaction anomaly detection system. The core inference engine runs a complex deep
  learning model on a fleet of Google TPU v5e instances, each equipped with 16 GB
  HBM, delivering 197 TFLOPS BF16 performance and 819 GB/s memory bandwidth. Due to
  sudden, unpredictable spikes in transaction volume or transient network issues,
  the system frequently encounters scenarios where it cannot sustain the full inference
  load with the primary, highest-accuracy model without introducing unacceptable latency
  or dropping transactions. Design a comprehensive graceful degradation strategy for
  this system. Your solution must articulate the specific 'degradation ladders', define
  how 'model fallbacks' would be managed given the TPU's memory and computational
  constraints, differentiate between 'fail-safe' and 'fail-operational' states, and
  detail 'quality-of-service shedding' mechanisms to ensure critical transactions
  are always processed, albeit potentially with reduced fidelity for others.
question: How would you design a graceful degradation strategy for TPU v5e anomaly
  detection with ladders, fallbacks, fail-safe/operational modes, and QoS shedding?
details:
  realistic_solution: "Implement a multi-tier degradation ladder that dynamically\
    \ adapts to load and resource availability. \n1.  **QoS Shedding (Tier 1):** Prioritize\
    \ critical financial transactions (e.g., large-value transfers) for the primary,\
    \ high-accuracy model. For less critical transactions, dynamically adjust batch\
    \ sizes for the TPU within its 16 GB HBM limits to maximize throughput (leveraging\
    \ 197 TFLOPS BF16 for large batches), introduce micro-batching with slightly increased\
    \ latency, or queue non-critical requests for delayed processing. \n2.  **Model\
    \ Fallback (Tier 2):** If resource pressure persists, trigger a switch to a pre-trained,\
    \ smaller, and less accurate 'shadow model' that occupies significantly less HBM\
    \ (e.g., 2-4 GB). This fallback model would be either pre-warmed or rapidly loaded\
    \ into HBM, leveraging the 819 GB/s bandwidth for quick swaps to minimize disruption.\
    \ \n3.  **Fail-Operational (Tier 3):** During extreme overload, the system transitions\
    \ to a fail-operational mode where it guarantees processing of only critical transactions\
    \ using the simplest possible model or heuristics, potentially offloading to CPU\
    \ instances if TPU resources are completely saturated. All non-critical transactions\
    \ are logged, retried, or routed to a human review queue. \n4.  **Fail-Safe (Tier\
    \ 4):** In catastrophic scenarios (e.g., TPU hardware failure, data corruption),\
    \ the system enters a fail-safe state, halting automated processing and defaulting\
    \ to manual review or a barebones, highly-available external service, ensuring\
    \ data integrity and compliance, even at the cost of significant latency."
  common_mistake: A common mistake is designing a degradation strategy that doesn't
    explicitly account for the Google TPU v5e's hardware characteristics. This often
    manifests as an unrealistic fallback model size (exceeding 16 GB HBM), a model
    swapping mechanism that ignores the 819 GB/s bandwidth limitations for loading/unloading,
    or an over-reliance on a single, moderately-sized fallback that still strains
    resources during severe overload, leading to cascading failures instead of a smooth
    transition through a degradation ladder. Another pitfall is a poorly defined 'fail-operational'
    state, where critical transactions are inadvertently impacted due to insufficient
    prioritization or lack of dedicated resources.
  napkin_math: "Given a primary model requiring 12 GB of HBM and a fallback model requiring 3 GB. If we can achieve 80% of the TPU's peak 819 GB/s memory bandwidth for model swapping:\n- Time to unload primary model: 12 GB / (0.8 * 819 GB/s) = 12 / 655.2 s ≈ 18.3 ms.\n- Time to load fallback model: 3 GB / (0.8 * 819 GB/s) = 3 / 655.2 s ≈ 4.6 ms.\n- Total model swap overhead (excluding other latencies): ≈ 22.9 ms. This overhead is critical to consider when defining acceptable latency during degradation events."
