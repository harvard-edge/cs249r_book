title: Graceful Degradation for Real-time Anomaly Detection on Google TPU v5e
scenario: 'You are leading the architecture of a high-throughput, real-time financial transaction anomaly detection system. The core inference engine runs a complex deep learning model on a fleet of Google TPU v5e instances, each equipped with 16 GB HBM, delivering 197 TFLOPS BF16 performance and 819 GB/s memory bandwidth. Due to sudden, unpredictable spikes in transaction volume or transient network issues, the system frequently encounters scenarios where it cannot sustain the full inference load with the primary, highest-accuracy model without introducing unacceptable latency or dropping transactions.'
question: 'How would you design a graceful degradation strategy for TPU v5e anomaly detection with ladders, fallbacks, fail-safe/operational modes, and QoS shedding?'
details:
  realistic_solution: 'Implement a multi-tier degradation ladder that dynamically adapts to load and resource availability. 1. QoS Shedding (Tier 1): Prioritize critical financial transactions for the primary model. For less critical transactions, dynamically adjust batch sizes within 16 GB HBM limits to maximize throughput. 2. Model Fallback (Tier 2): If pressure persists, trigger a switch to a pre-trained, smaller, less accurate shadow model occupying significantly less HBM (e.g., 2-4 GB), leveraging the 819 GB/s bandwidth for quick swaps. 3. Fail-Operational (Tier 3): During extreme overload, transition to fail-operational mode, guaranteeing processing of only critical transactions using the simplest possible model or heuristics. 4. Fail-Safe (Tier 4): In catastrophic scenarios, halt automated processing and default to manual review or a barebones external service.'
  common_mistake: |
    **The Pitfall:** Designing a fallback strategy that ignores hardware characteristics.
    **The Rationale:** Candidates propose an unrealistic fallback model size (exceeding 16 GB HBM) or a model swapping mechanism that ignores the 819 GB/s bandwidth limitations.
    **The Consequence:** The fallback strategy induces cascading failures instead of a smooth transition, exacerbating system collapse during severe overload.
  napkin_math: |
    - **Swap Overhead Calculation:** Assuming we achieve 80% of the TPU's peak 819 GB/s memory bandwidth (655.2 GB/s).
    - **Time to Unload Primary Model (12 GB):** 12 GB / 655.2 GB/s = 0.0183 s = 18.3 ms.
    - **Time to Load Fallback Model (3 GB):** 3 GB / 655.2 GB/s = 0.0046 s = 4.6 ms.
    - **Result:** Total model swap overhead is **~22.9 ms**, which is critical to factor into the degradation latency budget.
