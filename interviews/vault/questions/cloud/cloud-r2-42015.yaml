title: Goodput vs Throughput Under Tail Constraints
scenario: Your H100 serving cluster achieves 10,000 tokens/s throughput but only 7,200 tokens/s goodput
  (tokens delivered within the 500ms SLA). Increasing batch size from 32 to 64 raises throughput to 14,000
  tokens/s but goodput drops to 6,100 tokens/s. Explain the throughput-goodput divergence and find the
  optimal batch size.
details:
  realistic_solution: 'At batch=32: throughput=10K tok/s, 72% within SLA → goodput=7.2K. At batch=64:
    throughput=14K tok/s, 43.6% within SLA → goodput=6.1K. The problem: doubling batch size increases
    per-token decode latency from ~15ms to ~28ms (memory bandwidth shared across more KV caches), pushing
    more requests past the 500ms SLA. Optimal batch size maximizes goodput, not throughput. Binary search:
    batch=48 → throughput=12.5K, 68% within SLA → goodput=8.5K. Batch=40 → throughput=11.2K, 78% within
    SLA → goodput=8.7K. Optimal is ~batch=40, achieving 8.7K goodput — 21% higher than batch=32 despite
    lower raw throughput than batch=64.'
  common_mistake: Optimizing for throughput (total tokens/s) rather than goodput (tokens delivered within
    SLA). Larger batches improve GPU utilization but increase per-request latency, causing more SLA violations.
  napkin_math: 'Batch 32: 10K × 0.72 = 7.2K goodput. Batch 64: 14K × 0.436 = 6.1K goodput. Batch 40: 11.2K
    × 0.78 = 8.7K goodput (optimal). Batch 48: 12.5K × 0.68 = 8.5K. Revenue impact at $0.001/token: batch=32
    → $7.20/s, batch=40 → $8.70/s, batch=64 → $6.10/s. Optimal batch saves $5,400/hr vs naive max-throughput.'
