title: The Heterogeneous Workload Placement Matrix
scenario: You manage a fleet with 3 GPU types: 500 H100s (80GB, 3.35 TB/s), 300 A100s (80GB, 2 TB/s), and 200 L4s (24GB, 300 GB/s). Three workload classes compete for resources: LLM pre-training, 7B model inference serving, and batch embedding generation.
question: Which workload goes on which GPU type to maximize fleet-wide cost-efficiency, and why?
details:
  realistic_solution: 'Match workload characteristics to GPU capabilities based on the binding resource: (1) **LLM pre-training → H100s**: Pre-training is compute-bound with massive matmuls that exploit Tensor Cores and needs multi-GPU NVLink for AllReduce. Only H100s have the FLOPS and NVLink connectivity. (2) **7B inference serving → A100s**: 7B model decode is memory-bandwidth-bound (low arithmetic intensity). A100 provides 2 TB/s at lower cost-per-bandwidth than H100 (H100''s extra FLOPS go unused). The 80GB VRAM fits the model with room for large KV caches. (3) **Batch embedding generation → L4s**: Embedding generation (forward pass only, no gradient) is throughput-oriented and can tolerate higher latency. L4s at 24GB GDDR6 cost ~$0.50/hr vs H100 at ~$3/hr. A 1B embedding model fits in 24GB. Throughput per dollar is highest on L4s. This is the *workload-aware heterogeneous scheduling* principle: the optimal GPU is the cheapest one whose binding resource meets the workload''s requirement.'
  common_mistake: |
    **The Pitfall:** Putting every workload on the newest, fastest hardware (H100s).
    **The Rationale:** Engineers equate raw FLOPS with universal superiority, ignoring the concept of the "binding resource" (what actually bottlenecks the workload).
    **The Consequence:** Massive financial waste. Using a $3/hr H100 for memory-bound tasks or batch embeddings destroys cost-efficiency when a 50-cent/hr L4 would suffice.
  napkin_math: |
    - **LLM Pre-training $\rightarrow$ H100s:** Compute-bound. Needs the highest FLOPS and NVLink.
    - **7B Inference Serving $\rightarrow$ A100s:** Memory-bandwidth bound. A100 provides $2\text{ TB/s}$ at a lower cost-per-bandwidth than H100.
    - **Batch Embeddings $\rightarrow$ L4s:** Throughput-oriented, fits in 24GB. L4 provides the highest throughput per dollar.
    - **Cost Comparison (Tokens):** H100 at $3/hr (200 tok/s) = $0.0042/1K tok. A100 at $1.50/hr (150 tok/s) = $0.0028/1K tok (33% cheaper).
    - **Cost Comparison (Embeddings):** H100 (5000 emb/s) = $0.00017/1K emb. L4 (1500 emb/s, $0.50/hr) = $0.000093/1K emb (45% cheaper).
    - **Conclusion:** **Match the binding resource to the cheapest GPU that satisfies it.**
