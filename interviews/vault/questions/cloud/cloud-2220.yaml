title: The Heterogeneous Workload Placement Matrix
scenario: 'You manage a fleet with 3 GPU types: 500 H100s (80GB HBM3, 3.35 TB/s), 300 A100s (80GB HBM2e,
  2 TB/s), and 200 L4s (24GB GDDR6, 300 GB/s). Three workload classes compete for resources: (1) LLM pre-training
  (massive compute, needs NVLink), (2) 7B model inference serving (memory-bandwidth-bound, latency-sensitive),
  (3) batch embedding generation (throughput-oriented, not latency-sensitive). Design the placement policy
  that maximizes fleet-wide cost-efficiency. Which workload goes on which GPU type, and why?'
question: "Which workload goes on which GPU type, and why?"
details:
  realistic_solution: 'Match workload characteristics to GPU capabilities based on the binding resource:
    (1) **LLM pre-training → H100s**: Pre-training is compute-bound with massive matmuls that exploit
    Tensor Cores and needs multi-GPU NVLink for AllReduce. Only H100s have the FLOPS and NVLink connectivity.
    (2) **7B inference serving → A100s**: 7B model decode is memory-bandwidth-bound (low arithmetic intensity).
    A100 provides 2 TB/s at lower cost-per-bandwidth than H100 (H100''s extra FLOPS go unused). The 80GB
    VRAM fits the model with room for large KV caches. (3) **Batch embedding generation → L4s**: Embedding
    generation (forward pass only, no gradient) is throughput-oriented and can tolerate higher latency.
    L4s at 24GB GDDR6 cost ~$0.50/hr vs H100 at ~$3/hr. A 1B embedding model fits in 24GB. Throughput
    per dollar is highest on L4s. This is the *workload-aware heterogeneous scheduling* principle: the
    optimal GPU is the cheapest one whose binding resource meets the workload''s requirement.'
  common_mistake: Putting everything on H100s because they're the fastest. This maximizes per-job speed
    but destroys cost-efficiency — H100s cost 3-4× more than L4s. Using H100s for embedding generation
    is like using a Ferrari for grocery delivery.
  napkin_math: 'Cost per 1K tokens: H100 at $3/hr, 200 tok/s (720K tok/hr) = $0.0042/1K tok. A100 at $1.50/hr,
    150 tok/s (540K tok/hr) = $0.0028/1K tok. A100 is 33% cheaper per token. Cost per 1K embeddings: H100
    at $3/hr, 5000 emb/s (18M emb/hr) = $0.00017/1K emb. L4 at $0.50/hr, 1500 emb/s (5.4M emb/hr) = $0.000093/1K
    emb. L4 is 45% cheaper per embedding. Annual savings vs all-H100: assume we need 270M inference tokens
    and 1.08B embeddings daily. On H100, this requires 375 hours ($1,125) and 60 hours ($180). On A100/L4,
    it requires 500 A100-hours ($750) and 200 L4-hours ($100). Daily savings: ($1,125 - $750) + ($180
    - $100) = $455. Annual savings: $455 × 365 = ~$166K/year.'
  options:
  - INT4 quantization reduces FLOPS by 4x because 4-bit multiply-accumulate is 4x faster than FP16; the
    throughput gain comes from compute speedup, not memory bandwidth savings
  - INT4 quantization requires specialized INT4 Tensor Cores that are only available on H100; A100 GPUs
    cannot benefit from INT4 quantization and must use FP16 or INT8
  - 'GPTQ/AWQ-style INT4 weight-only quantization reduces model size by ~4x (70B: 140 GB FP16 → ~35 GB
    INT4) and increases inference throughput proportionally for memory-bandwidth-bound decode (since less
    data is read from HBM per step). Quality loss is typically <1% perplexity for well-calibrated quantization.
    INT4 decode throughput on a single A100: ~140 tokens/sec vs ~35 tokens/sec at FP16.'
  - INT4 quantization always causes >5% accuracy degradation and is only suitable for non-critical applications;
    production LLM serving universally uses FP16 to maintain quality
  correct_index: 2
