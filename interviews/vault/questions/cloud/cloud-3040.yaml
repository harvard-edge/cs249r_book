title: Model Size Estimation: Specify Memory-Efficient Serving for 70B on 2-H100 Budget
scenario: A colleague claims that a 70B model can prefill a 512-token prompt in 37 ms on a single H100 GPU. You need to verify this estimate using a compute-bound calculation.
question: Can a 70B model prefill a 512-token prompt in 37 ms on an H100, and what is the correct compute-based estimate?
details:
  realistic_solution: '70B model prefill at seq=512: 2x512x70B FLOPs / 989 TFLOPS ≈ 72ms. 37ms would require either 2x higher TFLOPS or half the parameters.'
  common_mistake: |
    **The Pitfall:** Overestimating the prefill speed or misapplying the FLOPs formula.
    **The Rationale:** Candidates often fail to account for both the forward and backward passes correctly, or use effective TFLOPS improperly for prefill estimates.
    **The Consequence:** Incorrect latency estimates lead to missed SLAs and poorly sized serving clusters.
  napkin_math: |
    - 70B model prefill FLOPs per token: 2 * 70 * 10^9 = 140 GFLOPs
    - For a 512-token prompt: 140 GFLOPs * 512 = 71.68 TFLOPs
    - H100 FP16 peak compute: 989 TFLOPS
    - Compute-bound time: 71.68 TFLOPs / 989 TFLOPS = 0.07248 seconds = 72.48 ms
    - **The correct estimate is ~72.5ms, making the 37ms claim invalid without double the TFLOPS or half the parameters.**
