title: 'Model Size Estimation: Specify Memory-Efficient Serving for 70B on 2-H100
  Budget'
scenario: 'Specify the memory layout and serving configuration for running a 70B LLaMA
  model on exactly 2 H100 nodes (160GB total HBM3) to maximize throughput while keeping
  P99 TTFT < 200ms and P99 TPOT < 50ms. Define: precision, tensor parallelism, batch
  size, max sequence length, KV-cache size, and expected tokens-per-second.'
question: Can a 70B model prefill a 512-token prompt in 37 ms on an H100, and what
  is the correct compute-based estimate?
details:
  realistic_solution: '70B model prefill at seq=512: 2×512×70B FLOPs / 989 TFLOPS
    ≈ 72ms. 37ms would require either 2× higher TFLOPS or half the parameters.'
  common_mistake: Not accounting for TP-2 all-reduce overhead in the TPOT calculation,
    and not reserving memory for the PagedAttention block allocator metadata.
  napkin_math: '70B model prefill, seq=512 tokens, H100: FLOPs = 2 × 512 × 70B = 71.68
    TFLOPs. H100 at 989 TFLOPS FP16 × 0.4 MFU = 395.6 TFLOPS effective. Time = 71.68T
    / 395.6T = 0.181s = 181ms? No — using 2×S×N formula: 2 × 512 × 70×10^9 = 71.68×10^12
    FLOPs. At 989 TFLOPS × 0.5 MFU: 71.68T/(989T×0.5) = 0.145s = 145ms. At 989 TFLOPS
    effective (no MFU factor in calculation since 2× already accounts for fwd+bwd):
    71.68T / (2 × 989T) = 36ms... Standard prefill formula: 2 × seq × N / FLOPS =
    2 × 512 × 70B / 989T = 72ms. Corrected estimate: ~72.4ms (not 37ms which would
    require higher TFLOPS or lower param count).'
