title: MLPerf Time-to-Train Cost Estimation
scenario: You are evaluating cloud instances for training a BERT-Large style model on a proprietary 300GB corpus, which is exactly 10x the size of the standard MLPerf reference dataset. Vendor A offers an 8x A100 node at $32/hour with a published MLPerf Training time-to-train (TTT) of 18 minutes. Vendor B offers an 8x H100 node at $90/hour with an MLPerf TTT of 5.5 minutes.
question: Assuming linear scaling, what are the estimated training time and cost for each vendor, and which instance is more cost-effective?
details:
  realistic_solution: Scale the baseline MLPerf TTT by the 10x dataset multiplier to find the total expected training time, then multiply by the hourly rate. The H100 completes the workload fast enough to offset its premium hourly price, making it cheaper overall.
  common_mistake: |
    **The Pitfall:** Looking solely at the 2.8x higher hourly rate of the H100 node and rejecting it as too expensive.
    **The Rationale:** Candidates fail to factor in the absolute Time-to-Train (TTT) reduction which offsets the higher hourly cost.
    **The Consequence:** Selecting an inferior, more expensive instance overall.
  napkin_math: |
    - A100 Node: 18 min * 10 = 180 mins (3.0 hours). Total Cost = 3.0 hrs * $32/hr = $96.00.
    - H100 Node: 5.5 min * 10 = 55 mins (~0.916 hours). Total Cost = 0.916 hrs * $90/hr = $82.50.
    - **Result: The H100 node is cheaper by $13.50 per training run.**
