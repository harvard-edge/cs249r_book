title: 'PagedAttention: Virtual Memory for KV Cache'
scenario: You serve a 13B model. Each request's KV cache for a 4096-token context consumes 2 GB. With contiguous memory allocation, you can serve 20 concurrent requests. Many requests use less than 4096 tokens, wasting allocated but unused memory.
question: "How does PagedAttention improve KV-cache utilization, and what throughput gain should you expect?"
details:
  realistic_solution: 'Without PagedAttention, each request pre-allocates a contiguous 2 GB buffer for max context length (4096 tokens), even if the actual context is 500 tokens. Fragmentation and over-allocation waste ~60-80% of KV cache memory. PagedAttention divides KV cache into fixed-size blocks (e.g., 16 tokens per block). Blocks are allocated on demand as the sequence grows, stored non-contiguously in GPU memory (like OS page tables). A block table maps logical positions to physical blocks. Benefits: (1) No internal fragmentation — only the last block has waste (≤15 tokens). (2) No external fragmentation — any free block can be used by any request. (3) Memory sharing — common prefixes between requests can share the same physical blocks (copy-on-write). Typical utilization improves from 20-40% to >95%.'
  common_mistake: |
    **The Pitfall:** Thinking PagedAttention changes the underlying attention computation algorithm.
    **The Rationale:** The name sounds like an algorithmic change (like FlashAttention), but it is actually a memory management technique applying OS virtual memory paging to tensors.
    **The Consequence:** Failing to recognize that PagedAttention's primary benefit is allowing drastically larger batch sizes by eliminating memory fragmentation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max concurrent requests (contiguous): 20.
       - KV cache per max request: 2 GB (4096 tokens).
       - Total KV pool: 40 GB.
       - Average actual context use per request: 0.5 GB.
    2. **Calculations:**
       - Contiguous allocated waste: 20 requests * 0.5 GB actual use = 10 GB used out of 40 GB (75% waste).
       - PagedAttention capacity: 40 GB pool / 0.5 GB actual average use = 80+ concurrent requests.
       - Throughput gain: 80 / 20 = 4x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** PagedAttention eliminates memory fragmentation, yielding a 4x improvement in concurrent requests for the exact same memory footprint.
