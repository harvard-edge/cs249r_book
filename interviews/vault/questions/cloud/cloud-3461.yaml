title: Optimizing Inter-GPU Communication for Distributed LLM Training
scenario: You are tasked with designing a distributed training infrastructure for a large language model (LLM) that will utilize a multi-node cluster of GPUs. The LLM requires frequent, large-volume gradient synchronization and model updates across the cluster. Your primary challenge is to design the network and communication strategy to ensure inter-GPU communication overhead does not become the bottleneck.
question: What network and data-movement architecture would you use so multi-node LLM training avoids inter-GPU communication bottlenecks?
details:
  realistic_solution: |
    The optimal solution involves implementing a high-performance interconnect utilizing RDMA (Remote Direct Memory Access), such as RoCE or InfiniBand, coupled with kernel bypass techniques. This allows GPUs to directly read from or write to the memory of other GPUs or network adapters without any CPU intervention (zero-copy networking). Libraries like NVIDIA NCCL or OpenMPI with UCX should be employed. This architecture significantly reduces communication latency, increases effective bandwidth, and frees up CPU cycles.
  common_mistake: |
    **The Pitfall:** Relying on standard TCP/IP sockets for inter-GPU communication.
    **The Rationale:** This approach involves the CPU in data movement, protocol processing, and memory copies, creating significant overhead and adding latency.
    **The Consequence:** Severely limits effective bandwidth, leading to massive underutilization of computational capabilities.
  napkin_math: |
    - LLM with 100 billion FP16 parameters.
    - Full gradient update for synchronization is approximately 200 GB (100B params * 2 bytes/param).
    - If synchronization must complete within 500 ms (0.5 seconds), required effective network bandwidth is 200 GB / 0.5 s = 400 GB/s.
    - 100Gbps Ethernet offers a theoretical max of 12.5 GB/s, drastically reduced by CPU overhead without RDMA.
    - 400Gbps InfiniBand (50 GB/s) with RDMA and kernel bypass is needed to reach the **400 GB/s aggregated bandwidth** across multiple links.
