title: Two-Tower Model vs Cross-Attention Ranker for Serving Cost
scenario: A retrieval stage must rank 1M candidate items per user request. Evaluate
  a two-tower model (pre-computed item embeddings + online user tower) vs a cross-encoder
  (both user and item processed jointly) for serving at 5K QPS.
question: For ranking 1M candidates at 5K QPS, would you serve retrieval with a two-tower
  model or a cross-encoder, and why?
details:
  realistic_solution: 'Two-tower analysis: user tower runs once per request (online). Item embeddings pre-computed offline and stored in FAISS index. User tower (2-layer MLP, 5M params): 10M FLOPs. At 5K QPS, this is 50 GFLOPs/sec (negligible compute). GPU FAISS IVF-PQ on 1M items handles ~10K batched queries per second per H100. Total Two-Tower requirement: 1 H100. Cross-encoder analysis: 1M forward passes per request. Each pass: (user+item features) through 5M-param MLP = 10M FLOP. 1M * 10M = 10 TFLOP per request. At 5K QPS: 50,000 TFLOPS required. H100 delivers 989 TFLOPS (dense): 50,000 / 989 = 50.5 H100s required for compute alone. At $3/hr: ~$150/hr for GPU cost. Not feasible. Use two-tower for retrieval. Cross-encoder is only viable for final-stage re-ranking of top 500 candidates.'
  common_mistake: Comparing only model quality (cross-encoder is always more accurate)
    without accounting for the serving infeasibility of cross-encoders at 1M candidates
    per request. A cross-encoder at 1M candidates requires 1M forward passes, each
    taking the (user, item) pair as input.
  napkin_math: 'Two-tower for 1M candidates: user tower + GPU FAISS handles 5K QPS on 1 H100. Cross-encoder for 1M: 5K * 10 TFLOPs = 50,000 TFLOPS / 989 = 50 H100s. Cost ratio: 50:1. Two-tower wins by 50x on cost. Quality: cross-encoder at top-K recall is ~2-5% better than two-tower. The 2-5% quality improvement costs 50x GPU resources. Compromise: use two-tower to retrieve top 1000, cross-encoder to re-rank to top 500 for final ranking. Cross-encoder on 1000 items: 1000 * 10M FLOP = 10 GFLOPs per request. 5K QPS = 50,000 GFLOPs (50 TFLOPS). Cost: 50 / 989 = 0.05 H100s. Affordable.'
