title: Two-Tower Model vs Cross-Attention Ranker for Serving Cost
scenario: A retrieval stage must rank 1M candidate items per user request.
question: For ranking 1M candidates at 5K QPS, would you serve retrieval with a two-tower model or a cross-encoder, and why?
details:
  realistic_solution: 'Two-tower analysis: user tower runs once per request (online). Item embeddings pre-computed offline and stored in FAISS index. User tower (2-layer MLP, 5M params): 10M FLOPs. At 5K QPS, this is 50 GFLOPs/sec (negligible compute). GPU FAISS IVF-PQ on 1M items handles ~10K batched queries per second per H100. Total Two-Tower requirement: 1 H100. Cross-encoder analysis: 1M forward passes per request. Each pass: (user+item features) through 5M-param MLP = 10M FLOP. 1M * 10M = 10 TFLOP per request. At 5K QPS: 50,000 TFLOPS required. H100 delivers 989 TFLOPS (dense): 50,000 / 989 = 50.5 H100s required for compute alone. At $3/hr: ~$150/hr for GPU cost. Not feasible. Use two-tower for retrieval. Cross-encoder is only viable for final-stage re-ranking of top 500 candidates.'
  common_mistake: |
    **The Pitfall:** Comparing models based solely on quality while ignoring serving feasibility.
    **The Rationale:** Engineers know cross-encoders provide higher accuracy (top-K recall is ~2-5% better).
    **The Consequence:** They propose an architecture that requires an impossible amount of compute, as a cross-encoder must run 1M forward passes per request, crashing the infrastructure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ranking 1M candidates at 5K QPS.
       - Two-Tower: FAISS index handles 10K queries/sec on 1 GPU.
       - Cross-Encoder: 10M FLOPs per item, running 1M times per request.
    2. **Calculations:**
       - Cross-Encoder Compute: 1M * 10M FLOPs = 10 TFLOPs per request. At 5K QPS = 50,000 TFLOPS.
       - Hardware Cost: 50,000 TFLOPS / 989 TFLOPS/GPU ~ 50 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Two-Tower model requires 1 GPU, saving 50x compute cost. Compute-Bound**
