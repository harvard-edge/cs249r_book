title: Prefill-Decode Latency Decomposition
scenario: 'A 70B model on an 8x MI300X node processes a 4096-token prompt followed by 256-token generation. The prefill takes 180ms and each decode step takes 12ms.'
question: 'For the 4096-token prompt and 256-token generation, what are total latency and TTFT, and how do prefill and decode optimizations differ?'
details:
  realistic_solution: |
    TTFT = prefill = 180ms. Total latency = 180ms + 256 * 12ms = 180 + 3072 = 3252ms. Prefill optimization: increase compute utilization — use FlashAttention, fuse operations, maximize Tensor Core occupancy. An 8x MI300X node has 10,456 TFLOPS FP16; prefill of 4096 tokens at 70B params ≈ 2 * 70B * 4096 = 574 TFLOPs needed, achievable at ~30% MFU (180ms). Decode optimization: maximize memory bandwidth utilization — 8x MI300X has 42.4 TB/s; loading 70B * 2 bytes = 140 GB per step at 42.4 TB/s = 3.3ms theoretical minimum per step. Actual 12ms per step accounts for network communication and memory latency. These are fundamentally different optimization axes.
  common_mistake: |
    Treating prefill and decode as the same workload. Prefill is compute-bound (large matrix multiplications over all input tokens), while decode is memory-bandwidth-bound (loading full model weights for a single token output).
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, 8x MI300X (10,456 TFLOPS, 42.4 TB/s).
    - Prefill: 4096 tokens (180ms).
    - Decode: 256 tokens (12ms/step).

    **Calculations:**
    - TTFT = 180ms.
    - Total = 180 + 256 * 12 = 3252ms.
    - Prefill FLOPs: 2 * 70B * 4096 = 574 TFLOPs.
    - Compute time: 574/10456 = 55ms theoretical (~30% MFU at 180ms).
    - Decode time: 140 GB / 42.4 TB/s = 3.3ms theoretical minimum.

    **Conclusion & Interpretation:**
    - **Result: 3252ms Total (Compute/Memory-Bound)**. Prefill is compute-bound while decode is memory-bandwidth-bound.
