title: Schema Validation CPU Budget
scenario: 'A data validation job checks 400 million records/day.'
question: "Can 16 CPU cores validate 400M records in one hour if each record costs 0.04 ms?"
details:
  realistic_solution: 'Total CPU time is 400M x 0.00004 s = 16,000 CPU-seconds. Sixteen cores provide 57,600 CPU-seconds in one hour, so the job fits with about 3.6x headroom.'
  common_mistake: |
    **The Pitfall:** Comparing record count directly to cores without converting.
    **The Rationale:** Candidates often forget to translate per-record latency into total CPU-seconds.
    **The Consequence:** Incorrectly assessing compute requirements and potentially over-provisioning or misjudging feasibility.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 400M records/day.
       - 0.04 ms/record. 16 CPU cores available. Timeframe: 1 hour.
    2. **Calculations:**
       - Total compute needed: 400,000,000 × 0.04 ms = 16,000 CPU-seconds.
       - Compute available: 16 cores × 3600 s/hr = 57,600 CPU-seconds.
    3. **Conclusion & Interpretation:**
       **Result: Compute Bound. The job easily fits with ~3.6x headroom.**
