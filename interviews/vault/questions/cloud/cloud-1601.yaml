title: TensorRT Format Optimization Latency Calculation
scenario: 'You have a BERT-base PyTorch model deployed on an NVIDIA A10G GPU in AWS. Native PyTorch FP32 inference takes 18ms per request (batch size 1). You need to optimize the format using TensorRT with FP16 precision. Assume FP16 provides a 2x compute speedup due to Tensor Cores, and TensorRT layer fusion reduces memory bandwidth overhead by 30%. The original 18ms latency was split into 10ms for compute and 8ms for memory overhead.'
question: 'What inference latency should you expect after converting the 18ms PyTorch model to FP16 TensorRT with 2x compute speedup and 30% memory reduction?'
details:
  realistic_solution: 'Apply the speedup factors independently to the compute and memory portions of the latency before summing them for the final result.'
  common_mistake: |
    **The Pitfall:** Applying a single flat speedup multiplier to the total latency.
    **The Rationale:** Candidates combine all optimizations into one generalized factor (like 2x for FP16), rather than separating compute-bound time from memory-bound time.
    **The Consequence:** An inaccurate performance projection that fundamentally misunderstands how GPU roofline bounds apply to different parts of execution.
  napkin_math: |
    - **Compute Latency:** 10 ms / 2x speedup = 5.0 ms.
    - **Memory Latency:** 8 ms × (1 - 0.30) = 5.6 ms.
    - **Result:** Total expected latency = 5.0 ms + 5.6 ms = **10.6 ms**.
