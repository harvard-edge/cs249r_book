title: 'Network Bandwidth Bottlenecks: Master Full Communication Analysis for 3D-Parallel LLM Training'
scenario: 'Analyze all communication bottlenecks in a 3D-parallel training setup (TP-4, PP-4, DP-8) for
  a 70B model on 128 H100 GPUs (8-GPU DGX nodes, NVLink 900GB/s intra-node, 200Gb/s InfiniBand inter-node).
  Quantify: TP all-reduce time, PP bubble overhead, DP gradient AllReduce time, and identify the dominant
  bottleneck.'
question: "In a TP-4, PP-4, DP-8 setup for a 70B model on 128 H100s, how large are the TP, PP, and DP communication costs and which dominates?"
details:
  realistic_solution: 'TP-4 (within node, NVLink): per layer, 2 all-reduces of shape [batch/4, seq, hidden]
    = 2×[1, 2048, 8192]×2B = 67MB per step × 80 layers = 5.4GB total. NVLink 900GB/s/4: each TP all-reduce:
    67MB/225GB/s × 2 steps = 0.6ms/layer × 80 = 48ms. PP bubble: 4 pipeline stages, 1 micro-batch (Gpipe).
    Bubble fraction: (PP-1)/PP=75%. Fix: interleaved 1F1B with 8 micro-batches: bubble = (PP-1)/(PP×M)
    = 3/32 = 9.4%. DP AllReduce: 70B/32 params × 2B × 2×7/8 / (200Gb/s/8=25GB/s per node''s IB) = 9.63GB/25=385ms.
    PP bubble: 200ms×9.4%=18.8ms. Dominant: DP AllReduce (385ms) >> PP bubble (18ms) >> TP comm (48ms).'
  common_mistake: Analyzing each parallelism dimension independently without noting that TP and PP run
    synchronously within a micro-batch while DP is overlapped with backward computation.
  napkin_math: 'TP all-reduce: 2×80layers×(1×2048×8192×2B)/225GB/s = 2×80×33.6MB/225GB/s=2×80×0.15ms=23.9ms/fwd,
    ×2 for bwd=47.8ms. PP bubble (1F1B, M=8): (4-1)/(4×8)=3/32=9.4%×200ms step=18.8ms. DP AllReduce: 70B×2B/(4TP×4PP)=70B/(16)=4.375B
    per shard×2B=8.75GB gradient per shard. Ring-AllReduce over 8 DP: 2×7/8×(8.75/8)=7×8.75/8/8=0.956GB
    per GPU. 0.956/25GB/s(IB)=38.3ms × ... wait: data per GPU = 8.75GB/8=1.09GB moved per ring step. 2×7/8×1.09=1.91GB
    over IB 25GB/s=76.5ms. DP is dominant.'
