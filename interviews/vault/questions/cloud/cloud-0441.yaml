title: The GPU-Bound Inference Stall
scenario: You are tasked with optimizing a small but critical DLRM-style recommendation model for production inference. The model has hundreds of tiny, sequential layers. When you profile it on an H100 GPU, `nvidia-smi` shows less than 15% Tensor Core utilization, yet latency is much higher than expected for the model's low FLOP count. A deep profiler reveals thousands of tiny CUDA kernel launches, each taking only a few microseconds.
question: What is the most likely cause of this poor performance?
details:
  realistic_solution: The model is dispatch-bound or launch-bound. The GPU spends more time launching the thousands of tiny kernels than it spends on actual computation. Operator fusion is required to compile sequences of small layers into a single kernel.
  common_mistake: |
    **The Pitfall:** Blaming the model size or data transfer speeds directly.
    **The Rationale:** Engineers see low FLOPs and assume the model is too small to saturate the GPU, ignoring the massive overhead of individual kernel dispatches.
    **The Consequence:** Attempting to solve the issue by upgrading hardware rather than applying software-level kernel fusion.
  napkin_math: |
    1. **Analyze Unfused Time:** Assume 100 small layers, each taking 2µs of compute. Launch overhead is ~5µs per kernel. Total time = 100 × (5µs + 2µs) = 700µs. Actual compute is 200µs (28% util).
    2. **Analyze Fused Time:** Fusing into a single kernel pays launch overhead once: 5µs + 200µs = 205µs.
    **Final Result: Fusing kernels provides a 3.4x speedup solely by eliminating dispatch overhead.**
  options:
  - The model is too small to saturate the GPU's arithmetic units.
  - The PCIe Gen5 bus is a bottleneck, preventing data from reaching the GPU quickly enough.
  - The system is dispatch-bound due to high kernel launch overhead from numerous small operations.
  - The model is memory-bandwidth bound because it needs to read large embedding tables from HBM.
  correct_index: 2
