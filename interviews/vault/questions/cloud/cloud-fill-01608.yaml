title: Diagnosing Data Efficiency and Model Collapse on NVIDIA H100
scenario: Your team is training a large language model on a cluster of NVIDIA H100 GPUs (each with 80
  GB HBM3, 989 TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth) for a critical deployment.
  Despite leveraging these powerful accelerators, you observe escalating training times, diminishing returns
  on model quality with increased data, and unexpectedly high GPU utilization without corresponding performance
  gains. The model occasionally exhibits signs of catastrophic forgetting or sudden performance drops.
  Your goal is to diagnose the root cause of these symptoms related to data efficiency and selection,
  considering the computational constraints and capabilities of the H100.
details:
  realistic_solution: To diagnose and address these issues, one should first implement the Information-Compute
    Ratio (ICR) framework to quantify the value of new data relative to compute cost. Next, analyze data
    for redundancy and informational content using techniques like coreset selection or advanced data
    pruning, offloading this analysis from the H100s. Explore curriculum learning strategies to introduce
    data in an optimal order, and consider targeted synthetic data generation only for specific, identified
    data gaps, rather than general scaling. Implement robust monitoring for data distribution shifts and
    model collapse indicators during training to preemptively intervene.
  common_mistake: A common mistake is to blindly scale data quantity without assessing its quality, redundancy,
    or informational value, leading to the 'data wall problem'. This results in inefficient use of the
    NVIDIA H100's 989 TFLOPS and 80 GB HBM3, as redundant data consumes valuable compute and memory bandwidth
    (3.35 TB/s) without contributing proportionally to model learning, and can exacerbate model collapse
    risks due to noisy or poorly curated samples.
  napkin_math: If your current training process involves loading 1 PB of data over 100 epochs, and you
    identify that 30% of this data is redundant and can be pruned without performance loss. Given the
    H100's 3.35 TB/s memory bandwidth, and assuming data loading is a significant bottleneck, calculate
    the theoretical reduction in total data transferred and approximate training time savings from this
    pruning. What impact would this have on the effective utilization of the H100's 989 TFLOPS FP16 dense
    compute if the bottleneck shifts?
