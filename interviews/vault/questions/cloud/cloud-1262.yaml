title: MMD Penalty Overhead in Fairness Training
scenario: You are training a credit scoring model on an A100 GPU and want to enforce demographic parity
  using an in-processing Maximum Mean Discrepancy (MMD) fairness penalty. The MMD calculation requires
  computing the pairwise squared Euclidean distance matrix between all sample embeddings in a mini-batch.
  Your mini-batch size is N=8192 and the embedding dimension is D=512. Calculate the extra memory needed
  to store the N x N distance matrix in FP32, and the approximate extra FLOPs required to compute these
  pairwise distances per batch.
question: "How much FP32 memory and how many FLOPs does the 8192x8192 MMD distance matrix add per batch?"
details:
  realistic_solution: Using the algebraic expansion ||x_i - x_j||^2 = ||x_i||^2 + ||x_j||^2 - 2(x_i)(x_j)^T,
    the computation is dominated by the matrix multiplication XX^T, requiring 2*N^2*D FLOPs. The memory
    for the N x N FP32 matrix scales quadratically. This O(N^2) complexity bottlenecks large-batch training,
    often requiring kernel approximations or sub-sampling for the fairness penalty.
  common_mistake: Assuming the fairness penalty only adds a negligible O(N) computation similar to BCE
    loss, failing to account for the O(N^2) pairwise operations required by kernel-based fairness metrics.
  napkin_math: 'Memory = N^2 * 4 bytes = 8192^2 * 4 bytes ≈ 268 MB.

    Compute (via XX^T) = 2 * N^2 * D = 2 * (8192^2) * 512 = 68,719,476,736 FLOPs ≈ 68.7 GFLOPs per batch.'
