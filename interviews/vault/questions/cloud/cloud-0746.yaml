title: The Bisection Bandwidth Requirement
scenario: "You're designing the network fabric for a 1,024-GPU training cluster to train a 70B parameter model. The target step time is 500ms with a sequence length of 2048, hidden size of 8192, micro-batch size of 4, and 16 micro-batches per step. The workload uses 3D parallelism: TP=8 (within node), PP=4 (across nodes), DP=32 (across nodes). Calculate the minimum bisection bandwidth needed to avoid communication bottlenecks, and explain why a fat-tree topology might not be sufficient."
question: "What minimum bisection bandwidth is needed, and is a fat-tree sufficient or optimal for this 1,024-GPU 3D-parallel workload?"
details:
  realistic_solution: "The minimum bisection bandwidth is ~1,497 GB/s, driven primarily by DP AllReduce traffic (1,085 GB/s) and PP activation/gradient communication (412 GB/s). TP is handled by intra-node NVLink and does not use the network fabric. A standard non-blocking fat-tree topology with 400 Gbps links (8 per node) provides well over this capacity (up to 25,600 GB/s) and IS sufficient. However, fat-tree may not be the most cost-effective choice because it treats all traffic identically. PP needs low-latency point-to-point paths (pipeline bubbles grow with hop count), while DP needs high bandwidth but tolerates latency. A rail-optimized or hybrid topology can reduce cost by ~30% while better matching these distinct traffic patterns."
  common_mistake: '"Just add up the per-GPU bandwidth requirements and buy enough switches." This ignores that different parallelism dimensions have vastly different communication patterns and bandwidth needs.'
  napkin_math: "1024 GPUs, TP=8 (intra-node NVLink), PP=4, DP=32. Nodes = 128.\n\n**PP traffic:** Activation per microbatch: 4 \times 2048 \times 8192 \times 2 = 134 MB. 3 stage boundaries \times 32 pipelines = 96 boundaries. ~48 cross bisection. With 16 microbatches, step=500ms, and bidirectional communication (forward activations + backward gradients): each boundary = 16 \times 134 \times 2 / 0.5 = 8.58 GB/s. PP bisection \approx 48 \times 8.58 = 412 GB/s.\n\n**DP traffic:** Per PP stage: 17.5B params = 35 GB FP16. With TP=8, each GPU holds 35 GB / 8 = 4.375 GB. Ring AllReduce volume per GPU = 2 \times 31/32 \times 4.375 = 8.48 GB in 500ms = 16.95 GB/s. 32 DP rings (8 from TP \times 4 from PP), each crossing the bisection with ~2 links. Each link carries 16.95 GB/s. DP bisection \approx 32 \times 2 \times 16.95 = 1,085 GB/s.\n\n**Total bisection: ~1,497 GB/s.**\n\nFor 128 nodes with 8x 400 Gbps (50 GB/s) NICs each, a full fat-tree provides up to 25,600 GB/s bisection bandwidth — sufficient in aggregate.\n\n**Why fat-tree may not be optimal (but IS sufficient):** Fat-tree provides equal-cost multipath, treating all traffic identically. PP traffic is latency-sensitive (pipeline bubbles grow with hops) while DP is bandwidth-hungry but latency-tolerant. A rail-optimized topology with dedicated low-latency paths for PP and ECMP for DP can reduce cost ~30% while better matching traffic patterns."
