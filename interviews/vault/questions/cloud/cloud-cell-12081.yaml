title: 'Model Size Estimation: Fluency — Estimate 7B Model Memory From Scratch'
scenario: 'In a live interview, you''re asked without any reference material: ''How much GPU memory does
  a 7B parameter model need at FP16 for inference with a batch of 8, generating up to 512 tokens?'' Walk
  through the napkin math in under 60 seconds.'
details:
  realistic_solution: 'Weights: 7B × 2B (FP16) = 14GB. KV-cache: 8 requests × 512 tokens × 2 (K+V) × hidden_dim
    × 2B × n_layers. For 7B LLaMA (hidden=4096, 32 layers): 8×512×2×4096×2×32 = 4.3GB. Activations (peak,
    1 layer): 8×512×4096×2B = 32MB (negligible). Total: ~18.3GB. Fits in single H100 (80GB) or A100 (40/80GB).
    Answer in 30 seconds with rounding.'
  common_mistake: Forgetting that inference requires memory for weights, KV-cache, AND activations; candidates
    often compute only weights × dtype.
  napkin_math: 'Weights: 7B × 2B = 14GB. KV: 8×512×2×4096×2×32 = 8×512×524288 = 2,147,483,648 bytes ≈
    2GB. Wait: 8×512×2×4096×2B×32 = 8×512×32×16,384B = 8×512×32×16KB = 2,147MB ≈ 2.1GB. Total: 14+2.1
    = 16.1GB. Answer: ~16-18GB, fits easily in H100.'
