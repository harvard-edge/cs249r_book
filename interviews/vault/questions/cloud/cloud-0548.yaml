title: The Power Efficiency Paradox
scenario: Your team is tasked with optimizing a 70B LLM for inference on a mixed fleet of A100 and new H100 GPUs. An engineer presents a benchmark showing their custom, heavily fused attention kernel achieves 20% higher TOPS/W than the standard library implementation at a small, latency-sensitive batch size of 8. They advocate for deploying this custom kernel across the entire fleet for all workloads.
question: "Why might deploying this 20% more power-efficient kernel be a catastrophic decision for your H100 fleet's throughput-oriented workloads?"
details:
  realistic_solution: The recommendation is dangerous because it generalizes from a benchmark taken in a memory-bound regime to a workload that should be compute-bound. At a small batch size of 8, the workload's Arithmetic Intensity (FLOPs per byte of data moved) is low. The system is bottlenecked by HBM bandwidth, so the custom fused kernel's primary advantage is reducing memory traffic, hence the 20% efficiency gain. However, the H100 has a very high Ridge Point; to operate it efficiently and amortize its 700W power draw, you must push it into the compute-bound regime with large batch sizes. This dramatically increases the Arithmetic Intensity. The standard library implementation is designed to scale to these high-AI workloads and will saturate the H100's 989 TFLOPS of compute. The custom kernel, hyper-optimized for memory-bound execution, likely cannot scale to saturate the H100's compute units. Deploying it would mean running the entire H100 fleet in an inefficient, memory-bound state, achieving a fraction of its potential TOPS and thus a much lower overall TOPS/W than the standard kernel at large batches.
  common_mistake: |
    **The Pitfall:** Accepting the benchmark at face value and assuming efficiency universally scales.
    **The Rationale:** Engineers generalize performance wins from a memory-bound regime (small batch) to compute-bound workloads (large batch).
    **The Consequence:** Deploying the kernel locks the H100 fleet in an inefficient, memory-bound state, crippling overall throughput and actual TOPS/W at scale.
  napkin_math: |
    *   **Memory Wall:** At batch size 8, generating a token requires loading 140GB of weights.
    *   **Max Throughput:** H100 bandwidth (3.35 TB/s) / 140 GB = 24 steps/s.
    *   **Result:** **Since the workload is strictly memory-bound, increasing compute efficiency (TOPS/W) by 20% yields 0% end-to-end performance improvement.**
