title: End-to-End Congestion Budget for Training Iteration
scenario: 'You are writing the SLA for a 1024-H100 training cluster that guarantees <5% communication
  overhead relative to ideal (zero-latency AllReduce). Break down the congestion budget across all components:
  ECMP imbalance, ECN-induced rate reduction, PFC pauses, retransmissions, and software overhead. Specify
  the maximum allowable contribution from each.'
details:
  realistic_solution: 'Total communication overhead budget: 5% of iteration time. For a 100ms training
    iteration with 15ms ideal AllReduce time (2GB gradient, 1024 GPUs, tree AllReduce): 5% overhead =
    0.75ms additional latency. Budget allocation: (1) ECMP imbalance: 0.15ms (20% of budget) — achievable
    with adaptive routing keeping path utilization variance < 5%. (2) ECN-induced rate reduction (DCQCN):
    0.20ms (27%) — allows 2 rate-reduction events per iteration recovering within 100μs each. (3) PFC
    pauses: 0.10ms (13%) — maximum 1 PFC event of 100μs per iteration; requires PFC watchdog timer set
    to 50μs. (4) Retransmissions: 0.15ms (20%) — allows at most 1 retransmission per 100 iterations (amortized
    to 0.15ms average). (5) Software overhead (NCCL kernel launch, memory copy, synchronization): 0.15ms
    (20%) — bounded by GPU kernel launch latency and PCIe DMA setup. Monitoring: instrument each component
    with per-iteration counters. Alert if any component exceeds 150% of its budget for 10 consecutive
    iterations. Capacity planning: at 2048 GPUs, double the ECMP and PFC budgets since path diversity
    and failure probability scale with node count.'
  common_mistake: Setting an aggregate 5% target without allocating sub-budgets. Without per-component
    budgets, you cannot diagnose which mechanism is consuming the overhead or set appropriate thresholds
    to stay within SLA.
  napkin_math: 'Ideal AllReduce for 2GB on 1024 GPUs (tree): 2GB / (400Gbps/8) × log2(1024) / 10 ≈ 2GB
    / 50GB/s × 1 = 40ms (simplified). 5% overhead = 2ms total budget. Per component: ~0.3-0.5ms each for
    5 components. Reality check: NCCL benchmarks show 8-12% overhead on 1024 GPUs, so 5% is aggressive
    and requires careful tuning of all parameters.'
