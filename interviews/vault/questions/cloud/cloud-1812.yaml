title: Mitigating Sponge Attacks via Runtime Input Validation
scenario: 'You are designing the runtime input validation layer for a cloud-based LLM deployment serving
  20,000 requests per second using a fleet of 8xH100 instances. The system is vulnerable to ''sponge examples''—adversarial
  inputs specifically crafted to maximize energy consumption and latency by forcing worst-case computation
  paths in the attention layers. You must evaluate the trade-offs between three validation strategies:
  1) simple O(1) heuristic bounds checking at the API gateway, 2) deploying a lightweight sequence classifier
  inline on the main GPU fleet, and 3) deploying a quantized CPU-based validator on the host node. Justify
  your architectural choice quantitatively to meet a strict 20ms P99 validation overhead budget while
  effectively protecting the expensive GPU fleet from resource exhaustion.'
details:
  realistic_solution: 'Implement a tiered approach: O(1) heuristics at the API gateway to drop obvious
    anomalies, followed by a lightweight INT8 quantized CPU model deployed as a sidecar on the host instance
    to perform semantic validation without touching the H100s.'
  common_mistake: Implementing complex validation models inline on the main GPU fleet, which increases
    the attack surface, causes context-switching overhead, and consumes the exact compute resources the
    validation layer is meant to protect.
  napkin_math: A 100M parameter validation model at INT8 requires ~100MB of memory and takes ~15ms on
    a modern CPU for a 512-token sequence. With 20k RPS distributed across 500 host instances, each node
    sees 40 RPS. 40 RPS * 15ms = 600ms of CPU compute time per second. This overhead is easily absorbed
    by 1-2 dedicated cores of a 64-core host CPU, meeting the 20ms P99 budget and completely shielding
    the GPUs.
