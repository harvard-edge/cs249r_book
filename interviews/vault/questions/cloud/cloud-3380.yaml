title: H100 Memory Optimization for Knowledge Distillation Logit Matching
scenario: You are tasked with distilling a 175B parameter teacher LLM into a 7B parameter student LLM for deployment on NVIDIA H100 GPUs. During logit matching, you need to capture teacher logits (vocabulary size 50,000, sequence length 2048) and store them for each training step. The student model's parameters, optimizer states, and activations consume 60GB of the HBM3.
question: What maximum batch size fits for logit matching with 20 GB free HBM3, sequence length 2048, vocab 50,000, and what logit precision would you use?
details:
  realistic_solution: To maximize the effective batch size for logit matching on the H100, the primary strategy involves aggressive quantization of the teacher's logits. Given the 20GB remaining HBM3 after allocating 60GB for the student model, we would convert the teacher's FP32 logits to INT8. This is feasible for logit matching as the relative magnitudes are often more critical than absolute precision. The distillation loss function would then operate on these INT8 logits. Additionally, employing techniques like gradient accumulation would allow for processing larger logical batches while keeping the physical batch size manageable within the HBM3, ensuring compute units remain saturated without exceeding memory limits. Selective distillation where only critical layers' outputs are matched can further save memory.
  common_mistake: |
    **The Pitfall:** Attempting to store full-precision (FP32) logits for matching.
    **The Rationale:** Assuming distillation requires perfect floating-point representations of the teacher's distribution.
    **The Consequence:** Quickly exhausting the remaining 20GB of HBM3, forcing tiny batch sizes or catastrophic CPU-GPU memory thrashing that cripples the H100.
  napkin_math: |
    - **Total HBM3**: 80 GB.
    - **Student memory**: 60 GB.
    - **Remaining HBM3**: 20 GB (20,480 MB).
    - **Teacher logit dims**: 50,000 vocab × 2048 seq length.
    - **Logit size per sequence**:
      - FP32 (4 bytes): 2048 × 50,000 × 4 = ~390.6 MB.
      - FP16 (2 bytes): 2048 × 50,000 × 2 = ~195.3 MB.
      - INT8 (1 byte): 2048 × 50,000 × 1 = ~97.66 MB.
    - **Result**: Quantizing to INT8 allows a max effective batch size of 20,480 MB / 97.66 MB ≈ **209 sequences** per GPU.
