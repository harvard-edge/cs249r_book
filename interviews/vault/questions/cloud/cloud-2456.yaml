title: Multi-LoRA Continuous Batching
scenario: A multi-tenant SaaS serves 100 distinct fine-tuned LoRA adapters over a single 13B base model.
  Traffic per tenant is 2 QPS. Deploying dedicated GPUs per tenant is cost-prohibitive. You multiplex
  them on a single GPU using continuous batching, but grouping requests by LoRA adapter results in tiny
  batch sizes (average 1.5) and 20% GPU utilization.
question: "How can you batch requests across 100 different LoRA adapters on one 13B base model without destroying GPU utilization?"
details:
  realistic_solution: The tradeoff is between batching efficiency (GPU compute utilization) and kernel
    dispatch overhead. Standard batching requires all requests to use the same weights. To batch requests
    across *different* LoRAs, you must use grouped GEMM (e.g., Punica kernels). The base model weights
    are applied to the entire batch in one highly efficient large matrix multiplication. The LoRA-specific
    computations are handled by a custom CUDA kernel that applies different low-rank matrices to different
    rows of the batch simultaneously. This maximizes base-model throughput at the cost of slightly slower,
    custom attention/linear kernels for the LoRA adapters and increased complexity in managing a fragmented
    LoRA weight cache in VRAM.
  common_mistake: Dynamically swapping base model weights with LoRA weights in GPU memory per request,
    which destroys memory bandwidth.
  napkin_math: 'Base model (13B, FP16) = 26GB. 100 LoRAs (rank 16) = 100 * 50MB = 5GB. Total 31GB fits
    in 40GB VRAM. Unbatched sequential execution: 15ms per request * 16 requests = 240ms. With grouped
    GEMM (batch size 16): Base model GEMM takes 20ms. The grouped LoRA GEMM (16 small parallel GEMMs)
    takes 5ms. Total time = 25ms. Throughput increases nearly 10x.'
