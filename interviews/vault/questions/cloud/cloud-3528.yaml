title: NVIDIA H100 and Feature Freshness in Online Feature Stores
scenario: A financial institution is deploying a real-time fraud detection model on a cluster utilizing NVIDIA H100 GPUs. The model requires features with sub-millisecond latency and high freshness, typically sourced from an online feature store.
question: What is point-in-time correctness, and how would you ensure it in the online feature store for this high-performance fraud model?
details:
  realistic_solution: To ensure point-in-time correctness, a robust online feature store design involves versioning features, using atomic writes for updates, and leveraging a transactional layer or event-driven architecture (e.g., Change Data Capture) to propagate feature changes in a guaranteed order. The inference service queries the feature store with a specific timestamp or version to ensure it retrieves the feature values as they were known at that precise moment.
  common_mistake: |
    **The Pitfall:** Assuming online feature stores automatically provide point-in-time correctness.
    **The Rationale:** Candidates believe simply storing the "latest" value is sufficient, ignoring race conditions between feature updates and inference requests.
    **The Consequence:** The model makes decisions based on inconsistent or forward-leaking feature sets.
  napkin_math: |
    1. **Memory Capacity:** H100 has 80 GB of HBM3 memory.
    2. **Feature Size:** Assume each feature vector is 1 KB.
    3. **Calculation:** $80\text{ GB} = 80 * 1024 * 1024\text{ KB} = 83,886,080\text{ KB}$.
    4. **Conclusion:** **The GPU can theoretically cache ~83.8 million unique 1 KB feature vectors for immediate access.**
