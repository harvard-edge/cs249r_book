title: The Transformer Weight Footprint
scenario: 'You are asked in a phone screen: a 7-billion-parameter Transformer is loaded onto an H100 GPU
  in FP16 precision. How much VRAM do the weights alone consume, and does the model fit?'
question: "How much VRAM do the weights alone consume, and does the model fit?"
details:
  realistic_solution: 14 GB. Each of the 7B parameters occupies 2 bytes in FP16, so 7B * 2 = 14 GB. The
    H100 has 80 GB HBM3, so the weights alone fit comfortably. However, training requires ~4x more for
    Adam optimizer states.
  common_mistake: Forgetting that FP16 means 2 bytes per parameter, not 1, or confusing weight memory
    with total training memory (which includes optimizer states and activations).
  napkin_math: 7B parameters * 2 bytes/param (FP16) = 14 GB. The H100 provides 80 GB of HBM3 memory. The
    weights consume 14 GB / 80 GB = 17.5% of the VRAM. The model easily fits in memory, leaving 66 GB
    (82.5%) available for KV cache, activations, and context window requirements during inference.
  options:
  - A) 7 GB
  - B) 14 GB
  - C) 28 GB
  - D) 56 GB
  correct_index: 1
