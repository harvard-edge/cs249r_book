title: The Transformer Weight Footprint
scenario: A 7-billion parameter Transformer is loaded onto an 80GB GPU in FP16 precision.
question: How much VRAM do the weights alone consume, and does the model fit?
details:
  realistic_solution: 14 GB. Each of the 7B parameters occupies 2 bytes in FP16, so 7B * 2 = 14 GB. The H100 has 80 GB HBM3, so the weights alone fit comfortably. However, training requires ~4x more for Adam optimizer states.
  common_mistake: |
    **The Pitfall:** Confusing precision byte sizes or mixing up inference memory with training memory.
    **The Rationale:** Forgetting that FP16 requires 2 bytes per parameter, not 1.
    **The Consequence:** Incorrectly answering basic hardware sizing questions during technical screens.
  napkin_math: |
    - 7B parameters × 2 bytes/param (FP16) = 14 GB.
    - The GPU provides 80 GB of VRAM.
    - 14 GB / 80 GB = 17.5% of VRAM.
    - **The 14 GB weights fit easily, leaving ~66 GB for the KV cache and activations.**
  options:
  - A) 7 GB
  - B) 14 GB
  - C) 28 GB
  - D) 56 GB
  correct_index: 1
