title: Evaluating Upgrades for Memory-Bound Inference
scenario: 'You use nsys to profile a latency-critical inference service. The trace shows the GPU is executing FP16 kernels at 10% of its 312 TFLOPS peak, but device memory bandwidth utilization is at 95% of its peak. The current P99 latency is 90ms on a single GPU, which misses the strict 50ms SLA.'
question: 'Which optimization meets the 50ms SLA: upgrading to an H100 or applying INT8 weight-only quantization on the A100?'
details:
  realistic_solution: 'The profiler trace indicates the workload is heavily memory bandwidth bound. For memory-bound workloads, performance scales linearly with memory bandwidth, not compute. Option B halves the memory traffic by casting weights from FP16 to INT8, yielding a ~2x speedup.'
  common_mistake: |
    **The Pitfall:** Automatically upgrading hardware based on massive peak TFLOPS improvements.
    **The Rationale:** Candidates see the 3x jump in theoretical compute and incorrectly assume it will solve the latency issue, ignoring the profiler's clear evidence of a memory bandwidth bottleneck.
    **The Consequence:** The team spends significant budget on H100 upgrades only to find the SLA still fails because bandwidth only improved by 1.67x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: A100 (2.0 TB/s), 90ms latency. Target: 50ms SLA.
       - Upgrade H100: 3.35 TB/s.
    2. **Calculations:**
       - Option A (H100 Upgrade): Speedup = 3.35 / 2.0 = 1.675x. Latency = 90ms / 1.675 = 53.7ms (Fails).
       - Option B (INT8 on A100): Speedup = 2 bytes / 1 byte = 2.0x. Latency = 90ms / 2.0 = 45ms (Meets).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Upgrading hardware based on TFLOPS fails the SLA; INT8 quantization directly addresses the bandwidth limit and meets the 50ms requirement.**
