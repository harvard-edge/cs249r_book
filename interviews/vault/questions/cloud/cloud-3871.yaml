title: Evaluating Upgrades for Memory-Bound Inference
scenario: You use Nsight Systems to profile a latency-critical inference service. The trace shows the GPU is executing FP16 kernels at 10% of its 312 TFLOPS peak, but device memory bandwidth utilization is at 95% of its 2.0 TB/s peak. The current P99 latency is 90ms on a single A100, which misses the strict 50ms SLA.
question: Which optimization meets the 50ms SLA: upgrading to an H100 (3.35 TB/s, 989 TFLOPS) or applying INT8 weight-only quantization on the A100?
details:
  realistic_solution: The profiler trace indicates the workload is heavily memory bandwidth bound. For memory-bound workloads, performance scales linearly with memory bandwidth, not compute. Upgrading to an H100 increases bandwidth by 1.675x, reducing latency to 53.7ms, which still fails the SLA. Option B halves the memory traffic by casting weights from FP16 (2 bytes) to INT8 (1 byte). Since weight loading dominates memory traffic at low batch sizes, this yields a ~2x speedup, dropping latency to 45ms. Option B is the only choice that meets the SLA and is also cheaper.
  common_mistake: |
    **The Pitfall:** Automatically upgrading hardware based on massive peak TFLOPS improvements.
    **The Rationale:** Candidates see the 3× jump in theoretical compute (312 to 989 TFLOPS) and incorrectly assume it will solve the latency issue, ignoring the profiler's clear evidence of a memory bandwidth bottleneck.
    **The Consequence:** The team spends significant budget on H100 upgrades only to find the SLA still fails because bandwidth only improved by 1.67×.
  napkin_math: |
    - **Option A (H100 Upgrade):** Speedup = H100 Bandwidth / A100 Bandwidth = 3.35 TB/s / 2.0 TB/s = 1.675×. Latency = 90ms / 1.675 = **53.7ms** (Fails 50ms SLA).
    - **Option B (INT8 on A100):** Speedup = FP16 size / INT8 size = 2 bytes / 1 byte = 2.0×. Latency = 90ms / 2.0 = **45ms** (Meets 50ms SLA).
