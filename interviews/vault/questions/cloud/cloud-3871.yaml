title: Evaluating Upgrades for Memory-Bound Inference
scenario: 'You use Nsight Systems to profile a latency-critical inference service.
  The trace shows the GPU is executing FP16 kernels at 10% of its 312 TFLOPS peak,
  but device memory bandwidth utilization is at 95% of its 2.0 TB/s peak. The current
  P99 latency is 90ms on a single A100, which misses the strict 50ms SLA. You must
  choose between two optimization paths to meet the SLA: Option A is upgrading to
  an H100 GPU (3.35 TB/s bandwidth, 989 TFLOPS FP16); Option B is implementing INT8
  weight-only quantization on the existing A100. Evaluate both alternatives and make
  a design decision based on your latency projections.'
question: 'Which optimization meets the 50ms SLA: upgrading to H100 or INT8 weight-only
  quantization on the A100?'
details:
  realistic_solution: The profiler trace indicates the workload is heavily memory
    bandwidth bound. For memory-bound workloads, performance scales linearly with
    memory bandwidth, not compute. Upgrading to an H100 increases bandwidth by 1.675x,
    reducing latency to 53.7ms, which still fails the SLA. Option B halves the memory
    traffic by casting weights from FP16 (2 bytes) to INT8 (1 byte). Since weight
    loading dominates memory traffic at low batch sizes, this yields a ~2x speedup,
    dropping latency to 45ms. Option B is the only choice that meets the SLA and is
    also cheaper.
  common_mistake: Candidates often see the massive 3x compute jump from A100 (312
    TFLOPS) to H100 (989 TFLOPS) and incorrectly assume Option A will easily hit the
    target. They fail to apply the profiler's finding that the workload is strictly
    memory bandwidth bound, meaning compute upgrades offer zero benefit.
  napkin_math: Option A (H100) Speedup = H100 Bandwidth / A100 Bandwidth = 3.35 TB/s
    / 2.0 TB/s = 1.675x. Option A Latency = 90ms / 1.675 = 53.7ms (Fails 50ms SLA).
    Option B (INT8) Speedup = FP16 size / INT8 size = 2 bytes / 1 byte = 2.0x. Option
    B Latency = 90ms / 2.0 = 45ms (Meets 50ms SLA).
