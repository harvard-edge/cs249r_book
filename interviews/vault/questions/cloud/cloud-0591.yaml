title: The B200 Fleet Upgrade Dilemma
scenario: You are the Principal Engineer for a major AI cloud provider with a large fleet of H100 GPUs.
  The new B200 GPU has been announced, and your VP of Engineering asks for your recommendation.
details:
  realistic_solution: A strategic proposal involves creating a heterogeneous fleet, recognizing that H100s
    and B200s are optimized for different points in the performance spectrum.
  common_mistake: A common but incorrect answer is to recommend a full B200 upgrade because it has higher
    peak TFLOPS. This thinking ignores that not all workloads are compute-bound. It fixates on a single
    metric (peak TFLOPS) and misses the bigger picture of system balance (Arithmetic Intensity) and Total
    Cost of Ownership (power, cooling, and cost-per-delivered-flop).
  napkin_math: Let's analyze a memory-bound inference task (e.g., generating one token for a 7B model).
