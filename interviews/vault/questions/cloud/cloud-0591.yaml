title: The B200 Fleet Upgrade Dilemma
scenario: You are the Principal Engineer for a major AI cloud provider with a large fleet of H100 GPUs. The new B200 GPU has been announced, and your VP of Engineering asks for your recommendation.
question: Would you recommend a full B200 upgrade for the H100 fleet, or a heterogeneous fleet, and why?
details:
  realistic_solution: A strategic proposal involves creating a heterogeneous fleet, recognizing that H100s and B200s are optimized for different points in the performance spectrum.
  common_mistake: |
    **The Pitfall:** Recommending a full fleet upgrade based strictly on peak TFLOPS.
    **The Rationale:** Engineers often fixate on headline compute numbers without profiling the fleet's actual mix of memory-bound vs. compute-bound workloads.
    **The Consequence:** Wasting massive capital expenditures on compute-dense hardware that will sit idle because the workloads are entirely memory-bandwidth bottlenecked.
  napkin_math: |
    - **Memory-Bound Inference:** Generating one token for a 7B model is memory bound.
    - **Bandwidth Comparison:** H100 offers 3.35 TB/s; B200 offers 8.0 TB/s.
    - **Speedup Bound:** The inference speedup is hard-capped by the bandwidth ratio: `8.0 / 3.35` = **2.38x** (not the TFLOPS ratio).
    - **Conclusion:** B200 shines for highly compute-bound tasks, but older nodes might offer better TCO/FLOP for purely memory-bound workloads.
