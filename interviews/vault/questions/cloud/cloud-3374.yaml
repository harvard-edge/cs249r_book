title: H100 Performance Bottlenecks with Structured vs. Unstructured Pruning
scenario: You are deploying a large language model on an NVIDIA H100 GPU. You've applied aggressive pruning to the model to reduce its size and improve inference speed. However, you observe that despite a high sparsity level, the actual inference speedup on the H100 is significantly less than theoretically expected based on the reduced FLOPs. You have explored both unstructured (fine-grained) and structured (block-wise) pruning techniques.
question: Why does high pruning sparsity fail to speed up inference on H100, and how do structured and unstructured pruning differ?
details:
  realistic_solution: A realistic solution involves favoring structured pruning techniques that produce sparsity patterns (e.g., 2:4 sparsity, block sparsity) that are explicitly supported and optimized by the NVIDIA H100's Tensor Cores and its accompanying software stack (e.g., cuBLAS, cuSPARSE). This allows the hardware to skip zeros efficiently, leading to better utilization of the 989 TFLOPS FP16 dense compute capability and effective use of the 3.35 TB/s HBM3 memory bandwidth. Furthermore, compilers and runtimes should be used to fuse operations and minimize kernel launch overheads for sparse computations.
  common_mistake: |
    **The Pitfall:** Assuming a reduction in FLOPs directly translates to a proportional speedup.
    **The Rationale:** Candidates look at raw arithmetic reduction but ignore the memory access patterns, data locality, and hardware-specific sparse tensor capabilities.
    **The Consequence:** Teams deploy unstructured pruned models that actually run slower than dense models due to massive memory latency and cache missing.
  napkin_math: |
    *   **Unstructured Sparsity (90%):** FLOPs reduced by 10x, but irregular memory accesses cause memory bandwidth bottlenecks. Speedup is limited to ~2x.
    *   **Structured Sparsity (2:4):** FLOPs reduced by 2x (50%), but memory access remains perfectly contiguous.
    *   **Hardware Optimization:** H100 Tensor Cores natively skip the exact zeros in 2:4 sparsity.
    *   **Result:** **Structured 2:4 sparsity achieves a predictable ~1.8x speedup, while theoretically higher unstructured sparsity underperforms due to memory thrashing.**
