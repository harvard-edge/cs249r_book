title: Optimizing LLM Pipeline Parallelism on NVIDIA H100 Cluster
scenario: Your team is deploying a terabyte-scale Mixture-of-Experts (MoE) Large Language Model for real-time
  inference. Due to its size, you must use pipeline parallelism across a cluster of NVIDIA H100 GPUs,
  each boasting 80 GB HBM3 memory, 989 TFLOPS FP16 dense compute, and 3.35 TB/s memory bandwidth, with
  a 700W TDP. You've partitioned the model into 8 stages across 8 H100s. Describe how you would design
  the pipeline schedule to minimize bubble overhead and maximize throughput, specifically considering
  the H100's capabilities. What challenges arise from its high compute and bandwidth, and how do you leverage
  them effectively?
question: "How would you schedule an 8-stage H100 pipeline for a terabyte-scale MoE model to minimize bubbles and exploit compute and bandwidth?"
details:
  realistic_solution: The most realistic solution involves implementing an interleaved pipeline schedule
    with aggressive micro-batching. This includes techniques like gradient accumulation for training or
    micro-batch pipelining for inference (e.g., PipeDream or similar approaches). The key is to select
    a micro-batch size where computation time per micro-batch is roughly balanced with communication time
    between stages, exploiting the H100's high bandwidth. Overlapping communication and computation (e.g.,
    using asynchronous transfers with NVLink/PCIe) is crucial to mask latency. Dynamic scheduling or adaptive
    micro-batch sizing could further optimize the pipeline based on real-time load and stage execution
    times, ensuring the 989 TFLOPS FP16 dense compute is consistently fed with work and the 80 GB HBM3
    memory is efficiently utilized by each stage.
  common_mistake: A common mistake is using a naive pipeline schedule (e.g., standard GPipe without micro-batching
    or with an overly large micro-batch size) that leads to significant 'bubble' overhead where GPUs are
    idle waiting for data, underutilizing the H100's massive 989 TFLOPS FP16 compute and 3.35 TB/s bandwidth.
    This often happens by not finely tuning micro-batch sizes relative to the H100's processing speed
    and the inter-stage communication latency.
  napkin_math: Given an intermediate tensor size of 10GB between stages and H100's 3.35 TB/s bandwidth,
    communication time per transfer is ~3ms (10GB / 3.35 TB/s). If a micro-batch computes for 100ms, then
    the ratio of communication to computation is small, suggesting micro-batches can be larger. However,
    if micro-batch compute time drops to, say, 5ms, then communication becomes a bottleneck. Candidate
    should calculate optimal micro-batch size by balancing the compute time (relative to 989 TFLOPS) and
    communication time to keep GPUs saturated and minimize bubble overhead. For instance, if an H100 can
    process `X` TFLOPS per second for a given operation, and a stage requires `Y` FLOPs, then compute
    time is `Y/X`. This must be considered against the `3.35 TB/s` bandwidth for intermediate data transfers.
