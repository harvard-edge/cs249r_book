title: Debugging SSA Compiler OOM
scenario: You deploy an autoregressive Transformer model using `torch.compile`. In eager mode, it uses 32GB of HBM. However, during AOT compilation, host CPU memory spikes from 16GB to over 128GB, causing an OOM kill. Logs show the failure occurs during Single Static Assignment (SSA) intermediate representation generation for an unrolled generation loop.
question: Why does SSA generation for the unrolled generation loop blow up CPU memory, and what structural fix avoids it?
details:
  realistic_solution: The tracer unrolled the loop, meaning every variable reassignment in the loop created a unique SSA variable (e.g., x_1, x_2, x_3), exploding the IR size. The solution is to prevent tracing of the autoregressive loop by extracting the loop control flow outside the `torch.compile` region, or by using explicit dynamic control flow constructs that the compiler can natively represent as a single loop block rather than a fully flattened IR graph.
  common_mistake: |
    **The Pitfall:** Focusing on runtime GPU memory optimizations (like KV caching).
    **The Rationale:** 99% of memory bugs in ML are GPU-side Out-Of-Memory errors.
    **The Consequence:** Wasting time debugging device-side memory allocations when the actual crash is a host-side compile-time issue caused by IR graph explosion.
  napkin_math: |
    - **Variable Count**: An unrolled loop of seq_len=8192 with 100 ops/iteration generates 819,200 unique SSA variables.
    - **Graph Explosion**: Liveness analysis structures scale O(V²) in the worst case.
    - **Memory Impact**: (8.19e5)² ≈ 6.7e11 relationships, instantly **exceeding a 128GB CPU RAM limit** during graph compilation passes.
