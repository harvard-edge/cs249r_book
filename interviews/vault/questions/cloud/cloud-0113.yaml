title: The Static Batching TTFT Penalty
scenario: You are building a chatbot running a 7B parameter LLM on H100 GPUs. The server uses static batching with a fixed context length of 4096 tokens, though most users send short (~100 token) prompts. Users complain of high Time-To-First-Token (TTFT).
question: Why is TTFT so high for ~100-token prompts when statically batched to 4096 tokens on an H100?
details:
  realistic_solution: The primary cause of high TTFT is the use of static batching with a fixed, large sequence length. Every short prompt is padded to 4096 tokens, forcing the GPU to perform a massive prefill calculation on thousands of useless padding tokens. The time taken for this padded prefill directly translates to TTFT for every single request, regardless of its actual length. The system is wasting most of its computational power.
  common_mistake: |
    **The Pitfall:** Blaming the model size, network latency, or batch size.
    **The Rationale:** Assuming general performance bottlenecks rather than identifying the massive compute waste inherent to fixed-length static padding.
    **The Consequence:** Increasing the batch size or paying for a faster network, which completely fails to fix the underlying O(N^2) padding waste problem.
  napkin_math: |
    - **Waste Calculation**: Padding a 96-token prompt to 4,096 means computing 4,000 useless tokens.
    - **Compute Cost**: A 7B model takes roughly 14 GFLOPs per token per request.
    - **Prefill Cost**: 4096 tokens × 14 GFLOPs = 57.3 TFLOPs per request.
    - **Batch Cost**: With a batch size of 16, that's 917 TFLOPs.
    - **Result:** **On an H100 (989 TFLOPS), computing the useless padding tokens wastes nearly a full second (0.93s) of compute time, devastating TTFT.**
  options:
  - The network latency between the web server and the H100 is too high.
  - The 7B parameter model is too large, causing slow weight loading from VRAM.
  - Static batching forces every short prompt to pay the full computational cost of the 4096-token context window.
  - The batch size is too small, which underutilizes the H100's Tensor Cores.
  correct_index: 2
