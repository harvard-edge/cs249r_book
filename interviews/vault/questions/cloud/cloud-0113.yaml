title: The Static Batching TTFT Penalty
scenario: You are an ML Systems Engineer at a startup building a chatbot. The service runs a 7B parameter
  LLM on H100 GPUs. To handle a few users who submit long articles, your team configured the inference
  server for static batching with a fixed context length of 4096 tokens. However, the vast majority of
  users send short prompts (e.g., ~100 tokens). Users are complaining that the chatbot takes seconds to
  start typing its first word. Your PM argues the H100 is overkill if it's this slow. Using napkin math,
  diagnose the most likely cause of the high Time-To-First-Token (TTFT).
question: "Why is TTFT so high for ~100-token prompts when the 7B model is statically batched with a 4096-token fixed context on an H100?"
details:
  realistic_solution: The primary cause of high TTFT is the use of static batching with a fixed, large
    sequence length. Every short prompt is padded to 4096 tokens, forcing the GPU to perform a massive
    prefill calculation on thousands of useless padding tokens. The time taken for this padded prefill
    directly translates to TTFT for every single request, regardless of its actual length. The system
    is wasting most of its computational power.
  common_mistake: Blaming the model size (7B is relatively small for an H100), the network latency, or
    suggesting a bigger batch size. These mistakes fail to identify that the core problem is a massive
    amount of wasted computation caused by the batching strategy itself. Increasing the batch size would
    only worsen the latency for individual requests.
  napkin_math: If an average prompt is 96 tokens, padding it to 4,096 tokens means computing 4,000 useless
    tokens. A 7B model takes roughly 14 GFLOPs per token per request. Prefilling 4096 tokens takes 4096
    * 14 GFLOPs = 57.3 TFLOPs per request! With a batch size of 16, that's 917 TFLOPs. On an H100 (989
    TFLOPS), this useless padding wastes nearly a full second.
  options:
  - The network latency between the web server and the H100 is too high.
  - The 7B parameter model is too large, causing slow weight loading from VRAM.
  - Static batching forces every short prompt to pay the full computational cost of the 4096-token context
    window.
  - The batch size is too small, which underutilizes the H100's Tensor Cores.
  correct_index: 2
