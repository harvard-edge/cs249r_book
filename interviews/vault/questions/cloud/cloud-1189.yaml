title: Spot Instance Preemption and Batch Scaling
scenario: You are training a vision model on a spot-instance cluster. The job starts with 64 GPUs with a global batch size of 2048 and a base learning rate of 0.1. A preemption event reduces your cluster to 48 GPUs. GPU memory is maximized at a local batch size of 32.
question: After preemption to 48 GPUs, what are the new global batch size, learning rate, and steps per 1,228,800-image epoch?
details:
  realistic_solution: Cap the local batch size at 32 to avoid OOM, resulting in a proportionally reduced global batch size of 1536. Scale the learning rate down linearly to 0.075 to preserve the variance of the gradient updates and maintain training stability.
  common_mistake: |
    **The Pitfall:** Leaving the learning rate at 0.1, or attempting to maintain the global batch size by increasing the local batch size.
    **The Rationale:** Candidates fail to apply the linear scaling rule for learning rates or ignore hard physical memory constraints when adapting to node loss.
    **The Consequence:** The model experiences degraded convergence due to mismatched gradient noise, or the job immediately crashes with an Out Of Memory (OOM) error.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original GPUs: 64. New GPUs: 48.
       - Local batch size: 32 (maximized).
       - Original LR: 0.1. Original steps: 600.
    2. **Calculations:**
       - New global batch size: 48 * 32 = 1536.
       - Linear LR scaling: 0.1 * (1536 / 2048) = 0.075.
       - New steps/epoch: 1,228,800 / 1536 = 800 steps.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** The new configuration requires a batch size of 1536, an LR of 0.075, and 800 steps per epoch.
