title: Multi-Tenant H100 GPU Scheduling for Cloud ML
scenario: "You are designing the core scheduling and resource management system for a new multi-tenant ML cloud platform using NVIDIA H100 GPUs. Your users range from research teams running large-scale distributed training jobs to inference services with strict latency requirements."
question: "How would you schedule and partition H100 GPUs for mixed distributed training and latency-critical inference while ensuring utilization, fairness, and SLOs?"
details:
  realistic_solution: "A robust solution would involve a hierarchical scheduling approach. At the lowest level, utilize NVIDIA MIG to partition H100 GPUs into smaller, isolated instances (e.g., 7x 1g.10gb partitions) for smaller inference or single-node training jobs, maximizing parallelism and isolation. For larger training jobs, MPS can be used to share a full H100 more efficiently. Integrate this with a cluster-level scheduler (e.g., Kubernetes with a custom scheduler extender or Slurm) that understands GPU topology and workload requirements. Implement gang scheduling for distributed training jobs to ensure all required GPUs are allocated simultaneously. For mixed workloads, design preemption policies: lower-priority, long-running training jobs could be preempted or paused to accommodate higher-priority, latency-critical inference requests, with checkpointing mechanisms for seamless resumption. Resource accounting should consider not just SM utilization but also HBM3 memory (80 GB), memory bandwidth (3.35 TB/s), and power draw (700W) to prevent oversubscription. Dynamic scaling and autoscaling based on utilization metrics and workload queues are crucial for cost-efficiency. Performance isolation can be further enhanced using cgroups and namespaces, along with monitoring tools to track per-tenant resource usage and enforce quotas."
  common_mistake: |
    **The Pitfall:** Proposing a basic queueing system without considering GPU architecture and workload types.
    **The Rationale:** Neglecting fine-grained partitioning capabilities (MIG/MPS) or advanced scheduling concepts (gang scheduling, preemption).
    **The Consequence:** Inefficient resource allocation, massive GPU underutilization, and missed SLOs for latency-critical inference.
  napkin_math: |
    *   **MIG Partitioning:** An H100 can be partitioned into 7x 1g.10gb MIG slices.
    *   **Inference Capacity:** If a model needs 5GB HBM3 and 50 TFLOPS, 14 services can theoreticall run per H100 (2 per slice).
    *   **Bandwidth Limit:** At 100MB per request and 3.35 TB/s, theoretical max QPS is 33,500.
    *   **Result:** **Memory bandwidth or network I/O often bottlenecks concurrent inference before compute or memory capacity limits are reached.**
