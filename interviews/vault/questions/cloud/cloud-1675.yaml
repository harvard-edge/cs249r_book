title: Evaluating Block Sizes in Paged Memory Management
scenario: You are optimizing an LLM serving cluster running a 70B parameter model on 4x A100 (80GB) GPUs.
  Your current serving engine pre-allocates contiguous KV cache memory for the maximum context window
  of 4,096 tokens per request. The KV cache consumes 320 KB per token. Given an average total sequence
  length of 512 tokens, your system is bottlenecked by severe memory fragmentation and a tiny maximum
  batch size. You are migrating to a paged memory management system (like vLLM) and must evaluate the
  optimal block size (tokens per page). Compare the architectural trade-offs of using block sizes of 1
  token, 16 tokens, and 256 tokens, and justify the optimal choice quantitatively.
question: "Which PagedAttention block size—1, 16, or 256 tokens—would you choose, and why?"
details:
  realistic_solution: Select a moderate block size (e.g., 16 tokens). This bounds internal fragmentation
    to a maximum of 15 tokens per sequence (less than 5 MB wasted), keeps the centralized page table compact,
    and allows the attention kernel to perform efficient, vectorized memory reads over contiguous blocks.
  common_mistake: Assuming that a block size of 1 is optimal because it eliminates 100% of internal memory
    fragmentation, while ignoring the catastrophic degradation in GPU attention kernel throughput due
    to non-contiguous memory accesses and page table lookup overhead.
  napkin_math: 'Pre-allocation max batch: 160GB total KV cache / (4096 tokens * 320KB) = ~122 requests.
    With a 16-token page and avg 512 tokens, we use exactly 32 pages per request. Cache used per request
    = 32 * 16 * 320KB = 163.8MB. Paged max batch: 160GB / 163.8MB = 976 requests. This yields an 8x throughput
    increase with internal fragmentation bounded to < 5MB per sequence.'
