title: Evaluating Block Sizes in Paged Memory Management
scenario: You are optimizing an LLM serving cluster running a 70B parameter model on 4x A100 (80GB) GPUs. Your current serving engine pre-allocates contiguous KV cache memory for the maximum context window of 4,096 tokens per request. The KV cache consumes 320 KB per token. Given an average total sequence length of 512 tokens, your system is bottlenecked by severe memory fragmentation and a tiny maximum batch size. You are migrating to a paged memory management system (like vLLM) and must evaluate the optimal block size (tokens per page).
question: Which PagedAttention block size (1, 16, or 256 tokens) would you choose, and why?
details:
  realistic_solution: Select a moderate block size (e.g., 16 tokens). This bounds internal fragmentation to a maximum of 15 tokens per sequence (less than 5 MB wasted), keeps the centralized page table compact, and allows the attention kernel to perform efficient, vectorized memory reads over contiguous blocks.
  common_mistake: |
    **The Pitfall:** Assuming that a block size of 1 is optimal.
    **The Rationale:** A block size of 1 eliminates 100% of internal memory fragmentation.
    **The Consequence:** This ignores the catastrophic degradation in GPU attention kernel throughput due to non-contiguous memory accesses and severe page table lookup overhead.
  napkin_math: |
    - **Max Context Memory:** 4,096 tokens &times; 320 KB = 1,310,720 KB (1,280 MB or 1.25 GB).
    - **Pre-allocation Max Batch:** 160 GB total available KV cache / 1.25 GB per request = 128 requests.
    - **Paged (16-token) Usage:** For an avg 512-token sequence, we use 32 pages (32 &times; 16 = 512 tokens).
    - **Paged Memory per Request:** 512 tokens &times; 320 KB = 163,840 KB (160 MB).
    - **Paged Max Batch:** 160 GB (163,840 MB) / 160 MB = 1,024 requests.
    - **Result:** This yields an **8&times; throughput increase** (1,024 vs 128) with internal fragmentation bounded to < 5MB per sequence.
