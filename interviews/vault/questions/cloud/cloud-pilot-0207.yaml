title: Evaluate Pipeline Versus Tensor Parallel Fix
scenario: A 24-layer model is split across 8 pipeline stages and suffers 50% bubble overhead at small microbatch count. A teammate proposes replacing pipeline parallelism with tensor parallelism across 8 GPUs. Activations are 40 MB per layer, tensor all-reduce would happen twice per layer over a 50 GB/s interconnect, and the latency budget per step is tight. Evaluate the tradeoff.
question: Should you replace an underfilled 8-stage pipeline with tensor parallelism over a 50 GB/s interconnect?
details:
  realistic_solution: Not automatically. Pipeline parallelism has a bubble problem, but tensor parallelism introduces frequent all-reduces. Two all-reduces per layer across 24 layers means 48 synchronization points. At 40 MB over 50 GB/s, each transfer has a lower bound near 0.8 ms before latency and ring factors, which can dominate. First try increasing microbatches or reducing bubbles; use tensor parallelism only if communication can be hidden or the model cannot fit otherwise.
  common_mistake: Switching parallelism strategies based only on memory fit and ignoring communication frequency.
  napkin_math: Per all-reduce payload lower bound = 40 MB / 50 GB/s = 0.8 ms. 48 such events gives 38.4 ms lower-bound communication before overhead.
