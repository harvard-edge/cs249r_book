title: Direct S3 Streaming Bandwidth for A100 Clusters
scenario: Your distributed training cluster with 64 A100 GPUs needs to process a 10TB dataset of 1MB image
  TFRecords. The data is currently sitting in S3 Standard. Each A100 processes 2,000 images per second.
  You need to stream the data directly to the compute nodes without an intermediate parallel filesystem
  like Lustre. Calculate the required network bandwidth per node (assuming 8 GPUs per node) and the minimum
  number of concurrent HTTP byte-range requests needed per node to avoid starving the GPUs, assuming each
  HTTP connection can sustain a maximum of 50MB/s.
question: "What network bandwidth and how many concurrent HTTP byte-range requests are required per 8-GPU node to stream the 1MB TFRecords?"
details:
  realistic_solution: Use a highly concurrent data loader issuing parallel byte-range requests. A node
    with 8 GPUs needs 16 GB/s (128 Gbps) of bandwidth, requiring at least a 200 Gbps network interface
    (or dual 100 Gbps) and 320 concurrent HTTP connections.
  common_mistake: Assuming a single HTTP connection or a small connection pool per node can saturate the
    training throughput, or failing to realize that the per-node bandwidth requirement far exceeds standard
    10Gbps or 25Gbps network interfaces.
  napkin_math: '64 A100 GPUs = 8 nodes (8 GPUs/node). Each node processes: 8 * 2,000 imgs/sec = 16,000
    imgs/sec. With 1MB images, node ingestion rate = 16,000 MB/s = 16 GB/s. This requires a 200 Gbps network
    adapter (since 100 Gbps caps at 12.5 GB/s). Streaming from S3 via standard HTTP connections (~50 MB/s
    each) requires: 16,000 MB/s / 50 MB/s = 320 concurrent HTTP connections per node.'
