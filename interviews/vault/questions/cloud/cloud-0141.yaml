title: The P99 Latency Anomaly
scenario: You're analyzing the performance of a new LLM serving system for a 70B parameter
  model on H100s. The team is using a basic static batching strategy. Your dashboards
  show that as request volume increases, the average latency per output token (TPOT)
  remains stable, but the P99 time-to-first-token (TTFT) has exploded, violating your
  SLO. Differentiate the system dynamics causing the stable TPOT from those causing
  the high P99 TTFT. Analyze the root cause of the TTFT explosion, referencing the
  interaction between your batching strategy and queueing dynamics.
question: Why can TPOT stay stable while P99 TTFT explodes under static batching,
  and what is the root cause of the TTFT explosion?
details:
  realistic_solution: The root cause is head-of-line blocking inherent to static batching.
    TPOT is stable because once a batch starts generating, it's an efficient, parallel
    operation limited by the H100's memory bandwidth, and this throughput is consistent
    batch-over-batch. However, P99 TTFT represents the worst-case user experience.
    This user likely arrives just after a large batch has begun processing. They must
    first wait in the queue for that *entire* batch (prefill and all subsequent token
    generation) to complete. Then, they must wait for their *own* batch to fill and
    for its expensive, compute-heavy prefill operation to finish. This double-waiting
    period (waiting for the previous batch + waiting for your own prefill) is what
    causes the P99 TTFT to explode, even while the per-token generation speed (TPOT)
    of a running batch looks good. The system isn't necessarily overloaded; its scheduling
    is just inefficient for latency-sensitive users.
  common_mistake: Attributing the high P99 TTFT to a simple hardware bottleneck like
    being 'compute-bound' or 'memory-bound'. While the system is using hardware, the
    problem is a logical one introduced by the scheduling strategy. Another common
    mistake is confusing TTFT and TPOT, assuming that if one is good, the other must
    be.
  napkin_math: "Let's model the P99 TTFT. Assume a batch size of 8 and a batch processing time T_batch of 800ms (e.g., 200ms prefill + 600ms for token generation). A user arriving right after a batch starts must wait 800ms for the current batch to finish, plus 200ms for their own prefill. Their TTFT is 1000ms. In contrast, TPOT remains 600ms/100 tokens = 6ms per token. Thus, P99 TTFT spikes to 1000ms while TPOT stays stable."
