title: The P99 Latency Anomaly
scenario: 'You are analyzing a new LLM serving system for a 70B parameter model using a static batching strategy. As request volume increases, average latency per output token (TPOT) remains stable, but P99 time-to-first-token (TTFT) explodes, violating SLOs.'
question: 'Why can TPOT stay stable while P99 TTFT explodes under static batching, and what is the root cause of the TTFT explosion?'
details:
  realistic_solution: 'The root cause is head-of-line blocking inherent to static batching. TPOT is stable because generation is an efficient, parallel operation limited by memory bandwidth. However, P99 TTFT reflects the worst-case user waiting in queue for the entire preceding batch to complete, followed by their own prefill phase. This queueing delay causes TTFT to explode. Migrating to continuous batching with paged attention resolves this.'
  common_mistake: |
    **The Pitfall:** Attributing high P99 TTFT to a hardware bottleneck like being compute-bound or memory-bound.
    **The Rationale:** Candidates assume high latency implies saturated hardware, missing the head-of-line blocking inherent to the static batching scheduler.
    **The Consequence:** Wasting capital on hardware upgrades instead of migrating to continuous batching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch processing time: 200ms prefill + 600ms generation = 800ms.
    - User generation request: 100 tokens.

    **Calculations:**
    - User arriving after a batch starts waits 800ms + 200ms prefill = 1000ms TTFT.
    - TPOT remains 600ms / 100 tokens = 6ms per token.

    **Conclusion & Interpretation:**
    - **Result: P99 TTFT spikes to 1000ms due to queueing delays, while TPOT is perfectly stable at 6ms (Scheduling-Bound).**
