title: Evaluating Graph Scripting vs Tracing for Dynamic Control Flow
scenario: Your team is deploying an Adaptive Compute Transformer for a high-throughput text processing
  service on a fleet of NVIDIA A100 (80GB) GPUs. The model features highly data-dependent control flow,
  where the number of refinement iterations per token varies dynamically based on intermediate confidence
  scores. A junior engineer prototyped the deployment using a trace-based JIT compiler (like `torch.jit.trace`
  or JAX `jit`), achieving 15,000 tokens/sec on the benchmark set. However, in staging, the service experiences
  severe latency spikes (dropping to <500 tokens/sec) and occasional silent correctness errors when processing
  out-of-distribution sequence lengths. Evaluate the architectural trade-offs between trace-based JIT
  and graph scripting (like `torch.jit.script`) for this deployment.
details:
  realistic_solution: Justify the switch to graph scripting. Unlike tracing, scripting parses the Python
    Abstract Syntax Tree (AST) to preserve actual `while`/`if` branches within the compiled Intermediate
    Representation (IR). While a fully unrolled traced graph might execute marginally faster for a static
    input, scripting guarantees logical correctness for data-dependent loops and completely eliminates
    the $O(N)$ recompilation penalty for varying sequence lengths.
  common_mistake: Candidates often assume trace-based JIT captures all dynamic control flow correctly,
    failing to realize that tracing merely unrolls the loop based on the specific dummy input used during
    compilation. This leads to silent logic errors on new data or catastrophic recompilation cascades
    for every unique sequence length.
  napkin_math: 'If tracing encounters 100 unique sequence lengths in a 1-minute window, and each cache
    miss triggers a 500ms recompilation: Total Trace Overhead = 100 * 0.5s = 50 seconds of stall time
    per minute. Scripting compiles the control flow once (500ms total overhead), operating dynamically
    with $O(1)$ compilation cost regardless of input length variance.'
