title: MLIR as a Universal Compiler IR for ML Portability
scenario: Google's MLIR framework is used by both XLA (for TPU) and IREE (for GPU/CPU). Your colleague
  claims MLIR will solve the portability problem because it is vendor-neutral. Evaluate this claim critically.
question: "With 2 shared infrastructure engineers and 3 target-specific engineers, what total staffing is required for MLIR portability?"
details:
  realistic_solution: Total engineers = 2 shared + 3 target-specific = 5 (not 3 which omits shared infrastructure
    roles).
  common_mistake: Treating MLIR as a portable binary format like JVM bytecode. MLIR is a compiler infrastructure,
    not a portable runtime. Code still needs to be compiled to target-specific machine code.
  napkin_math: 'Engineering staffing: 2 shared infrastructure engineers + 3 target-specific engineers
    (one each for three deployment targets) = 5 total engineers (not 3 — 3 only counts target-specific
    and misses shared infra).'
