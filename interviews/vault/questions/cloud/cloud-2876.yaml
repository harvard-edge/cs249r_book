title: RDMA Transfer Time
scenario: A parameter server transfers a 3 GB shard over an RDMA path sustaining 75 GB/s aggregate throughput.
question: "How long does a 3 GB RDMA transfer take at 75 GB/s achieved aggregate bandwidth?"
details:
  realistic_solution: The transfer takes roughly 40ms, providing a lower bound before software overhead.
  common_mistake: |
    **The Pitfall:** Using NIC line rate without converting payload size to time.
    **The Rationale:** Focusing on the bandwidth number but failing to calculate the actual latency impact.
    **The Consequence:** Underestimating the synchronization time required for large parameter shards.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload size: 3 GB.
    - Throughput: 75 GB/s.

    **Calculations:**
    - Time = 3 GB / 75 GB/s = 0.04s.

    **Conclusion & Interpretation:**
    - **Result: Transfer takes 40 ms (Network-Bound)**.
