title: RDMA Transfer Time
scenario: A parameter server transfers a 3 GB shard over an RDMA path sustaining 75 GB/s aggregate end-to-end throughput for this run.
question: How long does a 3 GB RDMA transfer take at 75 GB/s achieved aggregate bandwidth?
details:
  realistic_solution: The transfer takes 3 / 75 = 0.04 seconds, or 40 ms, before software overhead and synchronization. This is a bandwidth lower bound, not full step time.
  common_mistake: |
    **The Pitfall:** Using NIC line rate without converting payload size to time.
    **The Rationale:** Candidates focus on the bandwidth number but fail to calculate the actual latency impact of the transfer.
    **The Consequence:** They underestimate the synchronization time required for large parameter shards.
  napkin_math: |
    1. Payload size: 3 GB.
    2. Throughput: 75 GB/s.
    3. Transfer time: 3 GB / 75 GB/s = 0.04 seconds.
    4. **Result: 40 ms.**
