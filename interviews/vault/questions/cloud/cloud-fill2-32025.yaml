title: 'mmap and NUMA: The Hidden Latency Trap'
scenario: You have a dual-socket server with 2 CPUs, each with its own memory controller and PCIe root
  complex. GPU 0 is on NUMA node 0, GPU 1 on NUMA node 1. You mmap a 14 GB model file and notice that
  cudaMemcpy to GPU 1 is 40% slower than to GPU 0. Diagnose the NUMA issue and architect a solution for
  multi-GPU mmap-based model loading.
question: "Why is cudaMemcpy to GPU 1 40% slower after mmap, and how would you design NUMA-aware multi-GPU model loading?"
details:
  realistic_solution: 'The 40% slowdown is because mmap''d pages reside on NUMA node 0 (first-touch policy).
    cudaMemcpy to GPU 1 must: (1) read pages from NUMA 0''s DRAM, (2) traverse the UPI link (~40 GB/s
    vs ~200 GB/s local), (3) cross PCIe to GPU 1. The UPI hop adds ~2.5× latency per page. Solutions:
    (1) Use mbind() or numactl to explicitly bind mmap pages to the target NUMA node before accessing
    them: one mmap for GPU 0''s weights on node 0, another for GPU 1 on node 1. Cost: 2× host memory (28
    GB total). (2) Use NUMA-interleaved allocation (MPOL_INTERLEAVE) for balanced average performance.
    (3) Use CUDA unified memory with cudaMemAdvise(cudaMemAdviseSetPreferredLocation) to let the GPU driver
    handle NUMA-aware placement. (4) For pinned memory: cudaMallocHost with NUMA-aware allocation via
    numa_alloc_onnode(). Best practice: always set NUMA affinity for GPU-bound processes with numactl
    --cpunodebind=N --membind=N.'
  common_mistake: Ignoring NUMA topology entirely. Default mmap uses first-touch policy — pages are allocated
    on the NUMA node of the first thread that faults them in. If thread 0 (on NUMA node 0) faults all
    pages, then GPU 1's cudaMemcpy must cross the inter-socket QPI/UPI link.
  napkin_math: 'Local NUMA DMA to GPU: 200 GB/s effective → 14 GB in 70ms. Cross-NUMA: UPI bottleneck
    at 40 GB/s → 14 GB in 350ms. Slowdown: 5× for DMA path. Total with PCIe 5.0: local = 14 GB / min(200,
    64) = 0.22s. Cross-NUMA = 14 GB / min(40, 64) = 0.35s. 59% slower.'
