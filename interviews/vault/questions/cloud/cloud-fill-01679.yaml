title: Fairness Metric Definitions on NVIDIA A100
scenario: A machine learning team is deploying a critical model on an NVIDIA A100 GPU (80 GB HBM2e memory,
  312 TFLOPS FP16 performance, 2.0 TB/s memory bandwidth, and 400W TDP) to perform predictions for a sensitive
  application. To ensure the model adheres to ethical guidelines, they need to evaluate its fairness.
  Can you define and differentiate between 'demographic parity' and 'equalized odds' in this context?
details:
  realistic_solution: 'A realistic solution involves: 1) Clearly defining relevant protected groups and
    sensitive attributes. 2) Selecting appropriate fairness metrics (like demographic parity, equalized
    odds, or intersectional fairness) based on the application''s goals and potential harms. 3) Implementing
    a continuous evaluation pipeline to monitor these metrics in production. 4) Using fairness-aware algorithms
    (e.g., re-weighing, adversarial debiasing) or post-processing techniques (e.g., equalizing thresholds)
    if significant biases are detected.'
  common_mistake: A common mistake is assuming that achieving one fairness metric (e.g., demographic parity)
    automatically satisfies other metrics or guarantees overall algorithmic fairness. Another is not considering
    the specific societal context and potential downstream impacts of the model when choosing which fairness
    metrics to prioritize.
  napkin_math: 'Demographic Parity: Calculate the positive prediction rate (P(Y_hat=1)) for each protected
    subgroup (e.g., P(Y_hat=1|A=a) vs. P(Y_hat=1|A=b)) and compare them. Equalized Odds: Calculate the
    true positive rates (P(Y_hat=1|Y=1)) and false positive rates (P(Y_hat=1|Y=0)) for each protected
    subgroup, ensuring they are equal across groups for both outcomes. For example, P(Y_hat=1|Y=1, A=a)
    vs. P(Y_hat=1|Y=1, A=b) and P(Y_hat=1|Y=0, A=a) vs. P(Y_hat=1|Y=0, A=b). The computational overhead
    for these calculations scales with the number of predictions and subgroups, but is generally negligible
    compared to model inference on the A100.'
