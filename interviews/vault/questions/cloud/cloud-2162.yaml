title: The 10K-GPU Training Instability
scenario: You are leading pre-training of a 405B model on 16,384 H100 GPUs. At step 80K (out of 300K total), the training loss suddenly diverges. You roll back to the step-79K checkpoint and resume, but the divergence happens again at approximately the same step. This is not a hardware failure (the cluster is healthy).
question: How would you systematically diagnose and recover from this reproducible loss divergence around step 80K?
details:
  realistic_solution: 'This is a loss landscape instability. Systematically diagnose by logging per-layer gradient norms and activation norms around step 78K-82K. Implement targeted interventions: apply z-loss regularization to attention logits to prevent exponential blowup, or increase gradient clipping threshold monitoring. Shrink batch size temporarily to increase gradient noise to escape sharp minima.'
  common_mistake: |
    **The Pitfall:** Simply reducing the learning rate globally or skipping the offending data batch.
    **The Rationale:** Engineers treat the symptom (the spike) with a band-aid rather than diagnosing the underlying gradient explosion or representation collapse.
    **The Consequence:** The instability likely masks deeper representation issues and will recur later, costing millions of dollars in wasted compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16,384 GPUs costing $3/hr.
       - Rollback from 80K to 79K loses 1,000 steps.
       - Training speed: ~12s/step.
    2. **Calculations:**
       - Cluster cost rate: 16,384 * $3/hr = $49,152/hr.
       - Time lost per rollback: 1,000 steps * 12s/step = 12,000s = 3.33 hours.
       - Financial waste per rollback: 3.33 hours * $49,152/hr = $163,674.
       - Total waste for 3 diagnostic rollbacks: 3 * $163,674 = $491,022.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound. Trial-and-error diagnosis via rollback wastes ~$500K, necessitating automated spike detection, z-loss regularization, or gradient clipping.**
