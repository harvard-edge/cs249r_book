title: Diagnose accuracy degradation after replacing standard convs with depthwise
  separable
scenario: After replacing all 3×3 convolutions in a custom ResNet-34 with depthwise
  separable convolutions (maintaining same channel counts), top-1 accuracy drops from
  73.8% to 68.2% on ImageNet after full retraining on 8× A100s. The training loss
  curves look normal. Diagnose why accuracy degraded and what architectural changes
  could recover it.
question: Why did replacing ResNet-34 3×3 convolutions with depthwise separable convolutions
  hurt ImageNet accuracy, and how can it be recovered?
details:
  realistic_solution: 'Depthwise separable convolutions separate channel mixing (pointwise)
    from spatial filtering (depthwise), reducing cross-channel interaction. With identical
    channel counts, the pointwise 1×1 layers are the only cross-channel communication.
    Diagnosis steps: (1) check if batch norm statistics diverged (depthwise layers
    have C groups, not C² interactions); (2) add width multiplier α=1.4 to compensate;
    (3) use inverted residuals with expansion t=4–6 to restore representational capacity.
    The MobileNetV2 design explicitly addresses this with expansion before depthwise.'
  common_mistake: Blaming the depthwise separable operation itself and reverting all
    changes, rather than diagnosing that the representational capacity drop comes
    from channel mixing being decoupled and that expansion ratios need to increase.
  napkin_math: 'ResNet-34 standard: 3×3 conv C→C. Joint spatial-channel connections: 9×C². Depthwise sep: depthwise (9×C) + pointwise (C×C). With C=256: standard has 589,824 joint paths; depthwise+pointwise has only 65,536 cross-channel paths. To restore capacity with expansion t=4: pointwise becomes C→4C (1024 channels), depthwise at 4C, project 4C→C. Parameters: 256×1024 + 1024×9 + 1024×256 = 533K vs 256×256×9 = 589K — still fewer params but better capacity.'
