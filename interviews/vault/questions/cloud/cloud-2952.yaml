title: 'Specification: Designing Rack Power Distribution for MI300X Dense Cluster'
scenario: You are specifying the rack power distribution architecture for a new 64-node
  MI300X cluster. Each MI300X node has 8 GPUs at peak 750 W/GPU (6 kW GPU TDP) plus
  3 kW system overhead = 9 kW/node. The facility supports 40 kW per rack. Specify
  the rack layout, PDU configuration, power circuit requirements, and breaker sizing
  with N+1 redundancy.
question: What rack layout, PDU configuration, circuits, and breaker sizing would
  you specify for the 64-node MI300X cluster with N+1 redundancy?
details:
  realistic_solution: 'Specification: (1) Nodes per rack: 40 kW / 9 kW = 4.4 → 4 nodes/rack
    = 36 kW load, leaving 4 kW for networking (2 × 100GbE switches = 600 W each) and
    rack PDU losses (2%). (2) Power circuits: 4 nodes × 9 kW = 36 kW + 1.2 kW networking
    = 37.2 kW. NEC 80% rule: circuit capacity = 37.2 / 0.80 = 46.5 kW minimum. Use
    3-phase 208V, 130A per PDU (sqrt(3) × 208V × 130A = 46.8 kVA). (3) Redundant
    PDUs: 2× PDU per rack (A+B feed), each sized to carry full 37.2 kW load (N+1 active-standby).
    (4) Upstream breaker: 150A 3-phase per PDU feed. (5) For 64 nodes: 16 racks ×
    2 feeds = 32 × 150A 3-phase circuits from primary switchgear.'
  common_mistake: Sizing PDUs to exactly 40 kW without accounting for power factor
    (PF < 1.0 for switching power supplies), N+1 redundancy requirements, and NEC
    80% continuous load rule for branch circuits.
  napkin_math: '64 MI300X nodes × 9 kW = 576 kW IT load. 16 racks × 37.2 kW/rack =
    595.2 kW (includes networking). At PUE 1.25 (DLC): total facility = 595.2 × 1.25
    = 744 kW. Transformer sizing: 744 kW / 0.95 PF = 783.15 kVA → specify 1 MVA transformer
    with 25% headroom for future expansion. MI300X aggregate: 64 nodes × 8 GPUs ×
    192 GB HBM3 = 98,304 GB total HBM capacity; 64 × 8 × 5.3 TB/s = 2.7 PB/s aggregate
    memory bandwidth.'
