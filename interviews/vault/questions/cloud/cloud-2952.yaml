title: 'Specification: Designing Rack Power Distribution for MI300X Dense Cluster'
scenario: You are specifying the rack power distribution architecture for a new 64-node MI300X cluster. Each MI300X node has 8 GPUs at peak 750 W/GPU (6 kW GPU TDP) plus 3 kW system overhead = 9 kW/node. The facility supports 40 kW per rack.
question: What rack layout, PDU configuration, circuits, and breaker sizing would you specify for the 64-node MI300X cluster with N+1 redundancy?
details:
  realistic_solution: 'Specification: (1) Nodes per rack: 40 kW / 9 kW = 4.4 -> 4 nodes/rack = 36 kW load, leaving 4 kW for networking and rack PDU losses. (2) Power circuits: 4 nodes x 9 kW = 36 kW + 1.2 kW networking = 37.2 kW. NEC 80% rule: capacity = 37.2 / 0.80 = 46.5 kW minimum. Use 3-phase 208V, 130A per PDU. (3) Redundant PDUs: 2x PDU per rack. (4) Upstream breaker: 150A 3-phase per PDU feed. (5) For 64 nodes: 16 racks x 2 feeds = 32 x 150A 3-phase circuits.'
  common_mistake: |
    **The Pitfall:** Sizing PDUs to exactly 40 kW.
    **The Rationale:** Candidates often assume raw capacity equals usable capacity without accounting for power factor and redundancy.
    **The Consequence:** The design ignores the PF < 1.0 for switching power supplies, N+1 redundancy requirements, and the NEC 80% continuous load rule, leading to tripped breakers and safety violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64 MI300X nodes. 9 kW/node. 4 nodes/rack.
       - Rack load: 37.2 kW. PUE 1.25.
    2. **Calculations:**
       - IT Load: 16 racks * 37.2 kW = 595.2 kW.
       - Total Facility Power: 595.2 kW * 1.25 = 744 kW.
       - Transformer Sizing: 744 kW / 0.95 PF = 783.15 kVA.
    3. **Conclusion & Interpretation:**
       - **Specify 1 MVA transformer with 25% headroom to safely power the 783 kVA load. Result: Power-Bound.**
