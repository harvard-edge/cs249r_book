title: The Batching Window Dilemma
scenario: You are managing an LLM inference service that uses continuous batching on H100 GPUs. Your team
  has a strict P99 Time-To-First-Token (TTFT) SLO of 200ms. Based on production metrics, you know that
  the round-trip network latency adds a fixed 30ms, and the GPU inference time to generate the first token
  for any batch is a constant 50ms. To maximize throughput, you want to wait as long as possible to batch
  incoming requests. Explain the tradeoff here and calculate the absolute maximum time a request can wait
  in the queue before being processed, without violating the SLO.
question: "With a 200ms P99 TTFT SLO, 30ms network latency, and 50ms GPU time, what is the maximum queue wait for batching?"
details:
  realistic_solution: The core tradeoff is between throughput and latency. Longer batching windows allow
    for larger batches, which increases GPU utilization and overall throughput. However, this added queue
    time directly increases the latency perceived by the end-user. To solve this, we must sum all latency
    components and ensure they are less than or equal to the SLO.
  common_mistake: 'A common mistake is to focus only on one part of the latency equation, such as the
    inference time or the queue time, while forgetting to account for other fixed costs like network latency.
    This leads to an overestimation of the available budget for batching, causing SLO violations in production.
    The total latency experienced by the user is the sum of all parts: `Network + Queue + Compute`.'
  napkin_math: 1. **Total Latency Budget (SLO):** 200 ms
  options:
  - 150 ms
  - 170 ms
  - 120 ms
  - 200 ms
  correct_index: 2
