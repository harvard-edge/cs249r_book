title: Cloud GPU Duty Cycling
scenario: You manage a cloud inference pool of 100x H100 SXM GPUs. A daily traffic
  cycle requires 20 GPUs for 20 hours, and 100 GPUs for a 4-hour peak. Idle H100s
  consume 100W; active ones consume 700W.
question: Design a duty-cycling schedule with a 1-hour buffer around the peak, and
  compute the daily kWh saved compared to keeping all 100 GPUs fully active 24/7.
visual:
  kind: svg
  path: cloud-2860.svg
  alt: A step plot showing the number of active GPUs increasing before a traffic peak
    and dropping immediately after, overlaid on a smooth traffic demand curve.
  caption: Proactive Duty Cycling Over 24 Hours
details:
  realistic_solution: The optimal schedule leaves 20 GPUs active 24/7, costing 20
    * 700W * 24h = 336 kWh. The remaining 80 GPUs are powered up for the 4-hour peak
    plus a 1-hour buffer (5 hours total), costing 80 * 700W * 5h = 280 kWh. The other
    19 hours they are completely shut down (0W). A fully active 24/7 cluster costs
    100 * 700W * 24h = 1680 kWh. Total daily usage is 616 kWh, saving 1064 kWh daily.
  common_mistake: Using the idle power draw (100W) during the 19 offline hours instead
    of realizing cloud instances can be completely de-provisioned (0W).
  napkin_math: 24/7 cost = 1680 kWh. Scaled cost = (20 * 0.7 * 24) + (80 * 0.7 * 5)
    = 336 + 280 = 616 kWh. Savings = 1064 kWh.
