title: The Cross-Datacenter Training
scenario: Your company has 512 H100 GPUs in Virginia and 512 in Oregon, connected by a 100 Gbps dedicated
  WAN link with 60 ms RTT. Management wants to train a single 70B model across all 1,024 GPUs. Is this
  feasible with synchronous training, and if not, what's your architecture?
question: "Is this feasible with synchronous training, and if not, what's your architecture?"
details:
  realistic_solution: 'Synchronous AllReduce across the WAN is infeasible. Even with a topology-aware ring that minimizes WAN crossings to just 2 hops, the total data traversing the 100 Gbps link is 2 * 140 GB = 280 GB, taking over 22 seconds per step. An unoptimized ring would add dozens of seconds of latency. Instead, use **hierarchical parallelism**: run fully synchronous training *within* each datacenter (512 GPUs, InfiniBand, <5 µs latency), then synchronize *between* datacenters asynchronously or with a relaxed consistency model. Options: (1) **Local SGD / DiLoCo** — each site runs independent synchronous SGD for $H$ steps, then averages parameters across sites every $H$ steps. (2) **Async gradient averaging** — each site pushes compressed gradient deltas over the WAN without blocking.'
  common_mistake: '"100 Gbps is plenty of bandwidth — just run standard DDP across both sites." This ignores
    that WAN latency (60 ms RTT) makes synchronous AllReduce across sites catastrophically slow, even
    if bandwidth is sufficient.'
  napkin_math: '70B model, DDP AllReduce volume: 70B × 2B = 140 GB. At 100 Gbps WAN (12.5 GB/s): in a ring all-reduce, the WAN link must transfer 2 × (N-1)/N × 140 GB ≈ 280 GB of data per step. Transfer time = 280 / 12.5 = 22.4 seconds. A training step that takes 2 seconds of compute would take 24+ seconds, dropping utilization to <10%. **Local SGD alternative:** sync within each DC in ~1 second, exchange compressed deltas (1% of 140 GB = 1.4 GB) every 10 steps over WAN: 1.4 GB / 12.5 GB/s = 112 ms every 10 steps = 11.2 ms amortized overhead per step.'
