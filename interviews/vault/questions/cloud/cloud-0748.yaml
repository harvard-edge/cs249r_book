title: The Cross-Datacenter Training
scenario: Your company has 512 GPUs in Virginia and 512 in Oregon, connected by a 100 Gbps dedicated WAN link with 60 ms RTT. Management wants to train a single 70B model across all 1,024 GPUs.
question: Is synchronous training feasible across this WAN link, and if not, what is your alternative architecture?
details:
  realistic_solution: 'Synchronous AllReduce across the WAN is infeasible. Even with a topology-aware ring that minimizes WAN crossings to just 2 hops, the total data traversing the 100 Gbps link is 2 * 140 GB = 280 GB, taking over 22 seconds per step. An unoptimized ring would add dozens of seconds of latency. Instead, use **hierarchical parallelism**: run fully synchronous training *within* each datacenter (512 GPUs, InfiniBand, <5 µs latency), then synchronize *between* datacenters asynchronously or with a relaxed consistency model. Options: (1) **Local SGD / DiLoCo** — each site runs independent synchronous SGD for $H$ steps, then averages parameters across sites every $H$ steps. (2) **Async gradient averaging** — each site pushes compressed gradient deltas over the WAN without blocking.'
  common_mistake: |
    **The Pitfall:** Sizing the cluster solely based on total GPU count while ignoring WAN latency and bandwidth constraints.
    **The Rationale:** Engineers assume standard Distributed Data Parallel (DDP) scales infinitely as long as a network pipe exists, ignoring the synchrony barrier.
    **The Consequence:** The massive 1024-GPU cluster spends >90% of its time idle, waiting for gradients to cross the country, resulting in astronomical wasted costs.
  napkin_math: |
    1. **AllReduce Volume:** 70B parameters * 2 bytes = 140 GB. A ring AllReduce transfers ~2x volume = 280 GB per step.
    2. **WAN Bandwidth:** 100 Gbps = 12.5 GB/s.
    3. **Transfer Time:** 280 GB / 12.5 GB/s = 22.4 seconds per step.
    4. **Utilization Collapse:** A compute step takes ~2s, but waits 22s for the WAN.
    5. **Alternative: Local SGD exchanges compressed deltas (e.g., 1%) every 10 steps. 1.4 GB / 12.5 GB/s = 112 ms every 10 steps, dropping overhead to ~11 ms per step.**
