title: Continuous Adaptation for DLRM under Drift
scenario: You are designing an online learning system for an e-commerce CTR prediction DLRM (100GB sparse embedding tables, 1GB dense MLP). The system processes 50,000 queries per second. User preference drift causes a 2% revenue drop if the model is >1 hour stale.
question: Should online learning update the full 101GB DLRM or only the 1GB dense MLP while embeddings update daily, and why?
details:
  realistic_solution: 'Implement a hybrid architecture: freeze the 100GB embedding tables for online updates and continuously fine-tune only the 1GB dense MLP layer using a delayed feedback stream. While the sparse memory bandwidth (~64 MB/s) isn''t a strict hardware bottleneck, isolating updates to the fast-adapting dense layers prevents catastrophic forgetting of historical long-tail items and vastly simplifies the distributed training architecture.'
  common_mistake: |
    **The Pitfall:** Proposing to continuously train the entire 100GB model on streaming data.
    **The Rationale:** Candidates strive for theoretical perfection, ignoring the distributed systems complexity of synchronizing massive sparse tables online.
    **The Consequence:** Inducing catastrophic forgetting of historical long-tail interactions and massive network synchronization overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Embeddings: 100 GB. Dense MLP: 1 GB.
       - Throughput: 50,000 QPS.
       - Positive clicks: 5,000/sec.
    2. **Calculations:**
       - Updates: 100 features/event * 5,000 clicks/sec = 500,000 sparse accesses/sec.
       - Bandwidth: 500,000 * 128 bytes = 64 MB/s.
       - 64 MB/s easily fits inside PCIe (64 GB/s).
    3. **Conclusion & Interpretation:**
       - **Result: Architecture-Bound**. While sparse updates are not hardware-limited (only 64 MB/s), isolating online updates to the 1GB dense MLP prevents catastrophic forgetting and removes immense distributed synchronization complexity.
