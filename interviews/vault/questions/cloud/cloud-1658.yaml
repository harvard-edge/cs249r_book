title: Continuous Adaptation for DLRM under Drift
scenario: You are designing an online learning system for an e-commerce CTR prediction DLRM (100GB sparse
  embedding tables, 1GB dense MLP). The system processes 50,000 queries per second. User preference drift
  causes a 2% revenue drop if the model is >1 hour stale. Daily batch retraining takes 8 hours on 32 A100
  GPUs. Evaluate the architectural trade-offs of implementing continuous online learning on the full model
  versus isolating the continuous updates strictly to the dense MLP layers while continuing to update
  embeddings daily. Justify your design based on system synchronization overhead and the risk of catastrophic
  forgetting.
question: "Should online learning update the full 101GB DLRM or only the 1GB dense MLP while embeddings update daily, and why?"
details:
  realistic_solution: 'Implement a hybrid architecture: freeze the 100GB embedding tables for online updates
    and continuously fine-tune only the 1GB dense MLP layer using a delayed feedback stream. While the
    sparse memory bandwidth (~64 MB/s) isn''t a strict hardware bottleneck, isolating updates to the fast-adapting
    dense layers prevents catastrophic forgetting of historical long-tail items and vastly simplifies
    the distributed training architecture.'
  common_mistake: Proposing to continuously train the entire 100GB model on streaming data, which adds
    immense distributed system complexity and risks catastrophic forgetting of historical long-tail item
    interactions.
  napkin_math: Updating 100 sparse features per event at 5,000 positive clicks/sec = 500,000 random sparse
    memory accesses/sec. At 128 bytes per fetch, this is only ~64 MB/s, which easily fits within PCIe
    (64 GB/s) and HBM bandwidth. However, continuously updating the massive 100GB sparse embedding table
    online introduces immense system complexity (synchronizing distributed tables) and risks catastrophic
    forgetting of historical long-tail item interactions. Updating the 1GB dense MLP is a purely sequential
    matrix operation easily handled locally on a single GPU while capturing real-time trend shifts without
    touching the sparse embeddings.
