title: Calibration Overfitting in GPTQ
scenario: A 7B coding assistant is quantized to INT4 using GPTQ to fit on a single 16GB T4 GPU. The resulting
  model achieves 99% of the FP16 model's accuracy on the Python evaluation suite. However, users report
  it generates constant syntax errors when writing Java code, despite the FP16 model handling Java perfectly.
  The GPTQ algorithm used 128 samples from the C4 (Colossal Clean Crawled Corpus) dataset for calibration.
  Why did Java performance specifically degrade?
question: "Why did Java performance specifically degrade?"
details:
  realistic_solution: The cause is calibration data overfitting during the GPTQ process. GPTQ uses second-order
    information (the inverse Hessian matrix of the activations) to determine which weights are most important
    to preserve and how to compensate for quantization errors in neighboring weights. Because the calibration
    dataset (C4) was general English text (and likely heavily skewed toward Python in its code subsets,
    or simply lacked Java), the Hessian matrix told the algorithm that weights critical for Java syntax
    were 'unimportant'. Consequently, the quantization error was pushed into those Java-specific weights
    to perfectly preserve the English/Python representations. The fix is to construct a balanced calibration
    dataset that strictly mirrors the target deployment distribution, including equal representations
    of Java, Python, and other required languages.
  common_mistake: Believing INT4 fundamentally lacks the capacity to represent multi-language syntax and
    switching to a larger bit-width like INT8.
  napkin_math: GPTQ updates weights W based on argmin || WX - W_q X ||^2. The Hessian H = X X^T. For a
    4096 hidden dim, H is 4096x4096. If Java tokens represent 0% of X, the corresponding dimensions in
    H are 0, meaning error in those dimensions incurs 0 penalty during the argmin optimization.
