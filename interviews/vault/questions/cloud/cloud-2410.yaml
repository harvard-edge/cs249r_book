title: Calibration Overfitting in GPTQ
scenario: A 7B coding assistant is quantized to INT4 using GPTQ. The model achieves 99% of the FP16 accuracy on Python but generates constant syntax errors on Java (which the FP16 model handled perfectly). The GPTQ calibration used 128 samples from the C4 (Colossal Clean Crawled Corpus) dataset.
question: Why did Java performance specifically degrade?
details:
  realistic_solution: The cause is calibration data overfitting during the GPTQ process. GPTQ uses second-order information (the inverse Hessian matrix of the activations) to determine which weights are most important to preserve and how to compensate for quantization errors in neighboring weights. Because the calibration dataset (C4) was general English text (and likely heavily skewed toward Python in its code subsets, or simply lacked Java), the Hessian matrix told the algorithm that weights critical for Java syntax were 'unimportant'. Consequently, the quantization error was pushed into those Java-specific weights to perfectly preserve the English/Python representations. The fix is to construct a balanced calibration dataset that strictly mirrors the target deployment distribution, including equal representations of Java, Python, and other required languages.
  common_mistake: |
    **The Pitfall:** Believing INT4 fundamentally lacks the capacity to represent multi-language syntax.
    **The Rationale:** It's natural to assume a massive drop in precision (FP16 to INT4) inherently destroys complex nuanced capabilities.
    **The Consequence:** Engineers abandon INT4 entirely and revert to expensive FP16 or INT8 serving, instead of fixing the skewed calibration dataset.
  napkin_math: |
    - **GPTQ Optimization**: GPTQ updates weights `W` based on `argmin || WX - W_q X ||^2`.
    - **Hessian Matrix**: `H = X X^T`. For a 4096 hidden dim, `H` is 4096×4096.
    - **Missing Data Impact**: If Java tokens represent 0% of `X` (calibration data), the corresponding dimensions in `H` are 0.
    - **Result**: Error in those dimensions incurs 0 penalty during the argmin optimization, meaning **Java-critical weights are destroyed**.
