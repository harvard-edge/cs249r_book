title: Interposer Bandwidth Scaling Laws
scenario: You are benchmarking a 4-XCD chiplet system and notice that aggregate bandwidth scales sublinearly
  with XCD count. Explain the physical mechanism and quantify the expected scaling.
question: "Why does aggregate bandwidth scale sublinearly with XCD count in a 4-XCD chiplet system, and what scaling should you expect?"
details:
  realistic_solution: 'Interposer bandwidth scales sublinearly due to: (1) shared crossbar arbitration
    latency increasing with N², (2) physical wire density limits on the silicon interposer, (3) coherency
    traffic consuming a fraction of aggregate bandwidth. Empirically, 8-XCD systems like MI300X achieve
    ~70-80% of theoretical peak aggregate bandwidth on uniform workloads.'
  common_mistake: 'Assuming bandwidth scales linearly: 4 XCDs = 4x single-XCD bandwidth. This ignores
    interposer congestion, shared bus arbitration, and the fact that cross-XCD traffic competes for the
    same physical wires.'
  napkin_math: 'Theoretical: 8 XCDs × 662 GB/s = 5.3 TB/s. Measured peak on stream benchmark: ~4.2 TB/s
    ≈ 79% efficiency. Coherency overhead at 8-way: ~8% of fabric bandwidth. Crossbar arbitration: ~13%
    overhead. Net: 5.3 × 0.79 ≈ 4.2 TB/s matches observed.'
