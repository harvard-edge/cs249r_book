title: 'Mastery: Deriving the Optimal Checkpoint Interval to Minimize Total Training Time'
scenario: 'You are training a 100B Transformer (128 layers, H=12288) on a cluster of H100 nodes. The forward
  pass takes T_f seconds per layer. Activation memory per layer is M bytes. You have budget B bytes of
  HBM. You must derive the mathematically optimal checkpoint interval k (checkpoint every k layers) that
  minimizes total training time subject to peak activation memory fitting in B bytes, and apply the result
  to H100 hardware constants: T_f = 8 ms/layer, M = 3 GB/layer (at batch=4, S=4096), B = 80 GB.'
question: "What checkpoint interval k minimizes training time under the 80 GB HBM budget, and what is k for T_f=8 ms and M=3 GB per layer?"
details:
  realistic_solution: 'With k-interval checkpointing, peak activation memory is k × M (the window between
    checkpoints). Constraint: k × M ≤ B → k ≤ B/M. Recompute cost per backward pass: (N/k) checkpoint
    segments × one forward pass each × T_f × k layers = N × T_f additional time. This is independent of
    k! The recompute overhead is constant for full-layer checkpointing regardless of k. Therefore, maximize
    k (fewest checkpoints) subject to k ≤ B/M. Optimal k = floor(B/M) = floor(80/3) = 26 layers. Overhead
    = N × T_f = 128 × 8 ms = 1.024 s additional per backward pass.'
  common_mistake: Choosing k based solely on memory without modeling the recompute cost. A common heuristic
    of 'checkpoint every sqrt(N) layers' is derived for the memory-minimization problem without a time
    constraint, but the actual optimal k under a time-plus-memory objective is different.
  napkin_math: k_opt = floor(80 GB / 3 GB) = 26. Peak activation memory = 26 × 3 GB = 78 GB ≤ 80 GB. Number
    of checkpoint boundaries = ceil(128/26) = 5. Recompute overhead = 5 × 26 layers × 8 ms/layer = 1.04
    s. Without checkpointing, backward ≈ 128 × 2 × 8 ms = 2.048 s. Overhead fraction = 1.04 / (2.048 +
    1.04) = 33.7% as expected.
