title: Go-Back-N Congestion Penalty During AllReduce
scenario: In a 256-GPU distributed training cluster utilizing a 400 Gbps RoCEv2 fabric, the network implements
  a Go-Back-N retransmission policy to handle packet loss. During a 100 MB AllReduce gradient synchronization
  step, a switch buffer overflows, dropping a single 4 KB MTU packet exactly when there are 2,000 unacknowledged
  packets in the sender's flight window. Calculate the total data volume that must be retransmitted due
  to this single packet drop.
details:
  realistic_solution: In a Go-Back-N protocol, the receiver discards all out-of-order packets following
    the dropped one. The sender must retransmit the dropped packet and all 1,999 subsequent packets that
    were already in flight, resulting in a massive amplification of the network penalty.
  common_mistake: Candidates often assume a Selective Repeat protocol and calculate the retransmission
    penalty as just the single 4 KB dropped packet, ignoring the cascading discard behavior of Go-Back-N.
  napkin_math: Flight window = 2,000 packets. Packet size = 4 KB. Retransmitted data = 2,000 packets *
    4 KB/packet = 8,000 KB = 8 MB. Penalty amplification = 8 MB / 4 KB = 2,000x overhead compared to Selective
    Repeat.
