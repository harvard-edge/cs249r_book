title: Go-Back-N Congestion Penalty During AllReduce
scenario: "In a 256-GPU distributed training cluster utilizing a 400 Gbps RoCEv2 fabric, the network implements a Go-Back-N retransmission policy to handle packet loss. During a 100 MB AllReduce gradient synchronization step, a switch buffer overflows, dropping a single 4 KB MTU packet exactly when there are 2,000 unacknowledged packets in the sender's flight window."
question: "With Go-Back-N and 2,000 unacknowledged 4KB packets, how much data is retransmitted after the single dropped packet?"
details:
  realistic_solution: "In a Go-Back-N protocol, the receiver discards all out-of-order packets following the dropped one. The sender must retransmit the dropped packet and all 1,999 subsequent packets that were already in flight, resulting in a massive amplification of the network penalty."
  common_mistake: |
    **The Pitfall:** Assuming a Selective Repeat protocol.
    **The Rationale:** Engineers calculate the penalty as just the single 4 KB dropped packet, ignoring the cascading discard behavior of Go-Back-N.
    **The Consequence:** Completely underestimating the catastrophic impact of even minor packet loss (0.1%) on network throughput during synchronized AllReduce operations.
  napkin_math: |
    *   **Flight Window:** 2,000 unacknowledged packets.
    *   **Packet Size:** 4 KB.
    *   **Retransmission Logic:** Go-Back-N resends the dropped packet and ALL subsequent packets in flight.
    *   **Retransmitted Volume:** 2,000 packets × 4 KB/packet = 8,000 KB = 8 MB.
    *   **Result:** **8 MB of data is resent for a single 4 KB drop, a 2,000x penalty amplification.**
