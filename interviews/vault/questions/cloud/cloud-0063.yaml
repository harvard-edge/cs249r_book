title: 'The Blue-Green Memory Tax: Model Serving Infrastructure'
scenario: 'Your team is updating an LLM via a blue-green Kubernetes deployment. You are moving from a 7B parameter model to a 13B parameter model. During a short time during the rollout, both the old (blue) and new (green) models must be loaded in memory on the same nodes before traffic is switched.'
question: 'How much total FP16 HBM is consumed just by the 7B and 13B model weights during the blue-green transition?'
details:
  realistic_solution: 'The correct approach is to calculate the memory required for each model individually and then sum them up. In a blue-green deployment, both models co-exist in the cluster''s memory to allow for instant traffic switching and rollback. An FP16 parameter requires 2 bytes of storage.'
  common_mistake: |
    **The Pitfall:** Only planning memory for the final state (the new, larger model).
    **The Rationale:** Engineers focus on the target requirement and forget that during a blue-green transition, resources must accommodate both versions simultaneously to allow instant traffic switching and rollback.
    **The Consequence:** This leads to insufficient memory provisioning, causing the nodes to trigger Out-Of-Memory (OOM) crashes mid-deployment and bringing the service down.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old Model (Blue): 7B parameters.
    - New Model (Green): 13B parameters.
    - FP16 precision (2 bytes per parameter).
    
    **Calculations:**
    - Old Model Size: 7B * 2 bytes = 14 GB.
    - New Model Size: 13B * 2 bytes = 26 GB.
    - Total Memory: 14 GB + 26 GB = 40 GB.
    
    **Conclusion & Interpretation:**
    - **Result: 40 GB (Memory-Bound)**. The serving node must have enough available VRAM to host both models concurrently to ensure zero-downtime cutover.
  options:
  - '26 GB'
  - '20 GB'
  - '40 GB'
  - '80 GB'
  correct_index: 2
