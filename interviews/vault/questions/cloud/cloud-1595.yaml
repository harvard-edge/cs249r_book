title: Dynamic Ensemble Compute vs Memory
scenario: A cloud fraud detection service uses an ensemble of 4 specialized models to handle distribution
  shifts in transaction patterns across different geographical regions. Each specialized expert model
  requires 20 TFLOPS per inference and 2GB of VRAM. A gating network determines the routing and requires
  1 TFLOP and 0.5GB of VRAM. Calculate the per-request compute (TFLOPS) and total active GPU memory (VRAM)
  footprint required for 'soft routing' (computing and weighting all 4 outputs) versus 'hard routing'
  (dynamically selecting and executing only the top-1 expert).
details:
  realistic_solution: Hard routing reduces the compute requirement by 74% (down to 21 TFLOPS) but requires
    the exact same 8.5GB of VRAM as soft routing, as dynamically loading models from host memory per-request
    would violate real-time latency constraints.
  common_mistake: Assuming that hard routing reduces the memory footprint proportionally to the compute
    reduction, forgetting that all specialized models must remain permanently loaded in VRAM to meet strict
    latency SLAs and avoid PCIe transfer bottlenecks.
  napkin_math: 'Soft Routing Compute: 1 TFLOP (gating) + (4 * 20 TFLOPS) = 81 TFLOPS. Soft Routing VRAM:
    0.5GB + (4 * 2GB) = 8.5GB. Hard Routing Compute: 1 TFLOP (gating) + (1 * 20 TFLOPS) = 21 TFLOPS. Hard
    Routing VRAM: 0.5GB + (4 * 2GB) = 8.5GB (all models must be loaded to avoid PCIe transfer penalties).
    Compute saved = (81-21)/81 = ~74%, Memory saved = 0%.'
