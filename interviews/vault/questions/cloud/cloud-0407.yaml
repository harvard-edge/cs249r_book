title: The CapEx Foundation of TCO
scenario: You're building the first-year Total Cost of Ownership (TCO) model for a new LLM service. The first and largest line item is often the hardware Capital Expenditure (CapEx).
question: What is the approximate unit cost for a single NVIDIA H100 GPU that you would use as the baseline for this calculation?
details:
  realistic_solution: The correct baseline cost for an H100 GPU is approximately $30,000. This is the foundational number for any CapEx calculation before factoring in the full server, networking, and datacenter overhead (PUE, cooling, etc.).
  common_mistake: |
    **The Pitfall:** Anchoring on consumer GPU or generic server prices.
    **The Rationale:** Engineers unfamiliar with datacenter hardware underestimate the premium for specialized AI accelerators.
    **The Consequence:** Creating a vastly understated TCO model that falls apart during procurement.
  napkin_math: |
    1. **Single GPU:** One H100 costs ~$30,000.
    2. **8-GPU Node:** 8 × $30k = $240,000.
    3. **Fleet (64 GPUs):** 64 × $30k = $1.92M.
    4. **Result:** Factoring in networking and storage, total CapEx hits **~$2.5M**.
  options:
  - ~$3,000
  - ~$300,000
  - ~$30,000
  - ~$3/hour
  correct_index: 2
