title: The Resource Contention Stutter
scenario: Users of your LLM service complain that generation intermittently freezes for several seconds. You notice this happens whenever a new user submits a very long prompt.
question: Based on the diagram, why can't your GPUs handle both tasks simultaneously?
details:
  realistic_solution: 'The single GPU pool is the problem. **Prefill** is compute-bound and monopolizes the ALUs, while **Decode** is memory-bandwidth bound. When a long prompt arrives, prefill seizes the compute units, causing concurrent decode requests to stall. The fix is **Disaggregated Serving**: split Prefill and Decode onto separate GPU clusters to isolate these different workload profiles.'
  common_mistake: |
    **The Pitfall:** Suggesting to "add more GPUs to the pool" or "rate-limit long prompts."
    **The Rationale:** Throwing hardware at a problem is a common crutch, but it doesn't solve architectural resource contention between compute-bound and memory-bound operations.
    **The Consequence:** Wasting hardware budgets while continuing to punish users with severe latency spikes.
  napkin_math: |
    1. **Prefill Compute:** Scales with $O(N^2)$.
    2. **Decode Compute:** Scales with $O(N)$.
    3. **Execution Time:** A 4k token prefill can take 200ms.
    4. **Missed Work:** During this 200ms lock, 10 decode tokens should have been generated.
    5. **Result:** **The multi-second freeze is the direct cost of ALU compute-lock.**
