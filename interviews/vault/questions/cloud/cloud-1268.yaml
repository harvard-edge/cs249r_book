title: Diagnosing Bisection Bandwidth Drops in a GPU Cluster
scenario: You are debugging a performance regression in a 4,096-GPU training cluster connected via a 3-tier fat-tree topology using 64-port 400Gbps switches. The network is physically designed for 1:1 non-blocking bisection bandwidth. During the all-to-all communication phase of a large Mixture-of-Experts (MoE) model training run, the effective bisection bandwidth across the core switches drops to roughly 50-60% of the theoretical maximum, whereas within-pod communication (leaf to spine) maintains near 100% bandwidth. Hardware diagnostics confirm there are zero dead links or failed core switches.
question: What routing-level architectural issue in the fat-tree network is causing this specific bottleneck?
details:
  realistic_solution: The root cause is ECMP (Equal-Cost Multi-Path) hash polarization causing flow collisions. ML all-to-all operations generate a small number of massive, long-lived 'elephant flows'. Standard static 5-tuple ECMP routing maps multiple heavy flows onto the same uplinks, causing queue congestion while other valid uplinks remain completely idle. The solution is to enable Adaptive Routing (AR) or packet-level spraying (e.g., in InfiniBand or modern RoCEv2 fabrics) to dynamically distribute the load across all available paths in the fat-tree.
  common_mistake: |
    **The Pitfall:** Assuming a hardware failure, optical degradation, or structural oversubscription.
    **The Rationale:** If a network doesn't hit line rate, engineers instinctively blame faulty hardware or assume the topology was designed cheaply.
    **The Consequence:** Time is wasted running layer-1 diagnostics while the actual routing protocol silently drops performance by half.
  napkin_math: |
    - **Static ECMP Routing:** Behaves like a 'balls into bins' probability problem for massive flows.
    - **Maximum loaded link:** Receives roughly O(log N / log log N) flows.
    - **Load Imbalance:** Some links carry 2-3x average load while others sit idle at 0.
    - **Conclusion:** Statistical collisions limit effective aggregate throughput to **~50-60% of capacity** (200-240 Gbps out of theoretical 400 Gbps).
