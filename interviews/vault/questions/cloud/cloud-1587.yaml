title: Model Card Disaggregated Performance SLA
scenario: 'You are creating a Model Card for a cloud-based clinical triage NLP model deployed on AWS Inferentia2
  instances. The model reports an impressive 92% overall accuracy on a 100,000-patient test set. The hospital''s
  SLA mandates a minimum 85% accuracy across all demographic subgroups to ensure equitable care. The test
  set comprises three demographics: Group A (80,000 patients, 94% accuracy), Group B (15,000 patients,
  86% accuracy), and Group C (5,000 patients). Calculate the disaggregated accuracy for Group C to complete
  the model card''s quantitative analysis section and determine if the deployment meets the SLA.'
question: "What is Group C's disaggregated accuracy, and does the clinical triage model meet the 85% subgroup SLA?"
details:
  realistic_solution: Calculate the exact accuracy for Group C, which reveals a hidden performance degradation
    (78%). This violates the SLA, meaning the model card must document this limitation and deployment
    must be blocked pending targeted retraining.
  common_mistake: Reporting only the aggregate 92% accuracy in the model card and approving the deployment,
    falsely assuming the high overall score guarantees all minority subgroups meet the 85% SLA threshold.
  napkin_math: 'Total correct predictions = 0.92 * 100,000 = 92,000

    Group A correct = 0.94 * 80,000 = 75,200

    Group B correct = 0.86 * 15,000 = 12,900

    Group C correct = 92,000 - (75,200 + 12,900) = 3,900

    Group C Accuracy = 3,900 / 5,000 = 78%

    78% < 85% SLA threshold (Deployment fails)'
