title: 'The Throughput Trap: Batching Strategies'
scenario: You are leading the ML inference team for a new generative AI chatbot. Your dashboard shows 50% GPU utilization. You double the static batch size from 32 to 64 to reach 100%. Shortly after deploying this change, P99 Time-To-First-Token (TTFT) violates its 100ms SLA.
question: Why did doubling the static batch size from 32 to 64 cause the P99 TTFT to violate the 100ms SLA?
details:
  realistic_solution: The increased batch size directly increases the time a new request has to wait before it can even begin processing. This is due to head-of-line blocking. With static batching, all requests in a batch must wait for the *entire batch* to be assembled before computation starts. Doubling the batch size likely doubled the average time requests spend waiting in the queue, pushing the P99 latency beyond the SLA.
  common_mistake: |
    **The Pitfall:** Believing that maximizing hardware throughput (tokens/sec) always improves service metrics.
    **The Rationale:** Engineers look exclusively at GPU utilization without considering the 'queuing delay' cost imposed on individual user requests.
    **The Consequence:** Completely breaking latency SLAs (like TTFT) in the pursuit of 100% GPU utilization.
  napkin_math: |
    1. Assumptions & Constraints: Arrival rate = 100 req/sec (1 request every 10ms).
    2. Calculations: Time to gather static batch of 32 = 320ms. Time to gather static batch of 64 = 640ms.
    3. Conclusion & Interpretation: **Result: The first request waits 640ms before prefill even starts. Bottleneck: Head-of-line Queuing Delay.**
