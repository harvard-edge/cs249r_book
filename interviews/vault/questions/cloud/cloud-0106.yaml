title: 'The Throughput Trap: Batching Strategies'
scenario: You are leading the ML inference team for a new generative AI chatbot. Your dashboard shows
  that your H100 GPUs are only at 50% utilization. Your manager wants to increase throughput by doubling
  the static batch size from 32 to 64 to get utilization to 100%. However, shortly after deploying this
  change, you receive alerts that the P99 Time-To-First-Token (TTFT) has violated its 100ms SLA. Diagnose
  the most likely cause for this regression.
question: "Why did doubling the static batch size from 32 to 64 cause the P99 TTFT to violate the 100ms SLA?"
details:
  realistic_solution: The increased batch size directly increases the time a new request has to wait before
    it can even begin processing. This is due to head-of-line blocking. With static batching, all requests
    in a batch must wait for the *entire batch* to be assembled before computation starts. Doubling the
    batch size likely doubled the average time requests spend waiting in the queue, pushing the P99 latency
    beyond the SLA.
  common_mistake: Believing that higher GPU utilization is always better. Engineers often focus on maximizing
    hardware throughput (tokens/sec) without considering the 'queuing delay' cost that large static batches
    impose on individual requests.
  napkin_math: At an arrival rate of 100 req/sec (1 req every 10ms), gathering a static batch of 32 takes
    320ms. Gathering a batch of 64 takes 640ms. By doubling the batch size, the average queue wait time
    directly doubles. The first request in the batch now waits 640ms before prefill even begins! TTFT
    = Queue Wait (640ms) + Prefill Time, ruining responsiveness.
  options:
  - The model's architecture is inefficient, causing kernel launch overhead to dominate at larger batch
    sizes.
  - The GPU's memory bandwidth (HBM) is saturated, as the larger batch requires moving more data for activations
    and weights.
  - Increasing the static batch size introduced significant queuing delay (head-of-line blocking), causing
    new requests to wait much longer before processing begins.
  - The network is the bottleneck; doubling the batch size saturated the NIC's ability to receive requests
    and transmit tokens.
  correct_index: 2
