title: Evaluating LLM Inference Benchmarks
scenario: A team evaluates replacing a cluster of 8x servers with 4x servers for serving a 70B parameter LLM. The workload consists of latency-sensitive chat applications with very low concurrent requests (batch size = 1). The vendor benchmark highlights a 3x increase in peak FP16 TFLOPS, claiming a proportional 3x reduction in generation latency.
question: Is the vendor's 3x latency reduction claim valid for batch-1 70B LLM serving, and how should you benchmark the real speedup?
details:
  realistic_solution: Reject the 3x latency reduction claim. Low-batch LLM inference is heavily memory-bandwidth bound, not compute-bound. The benchmarking strategy must focus on achievable memory bandwidth and interconnect latency. The newer architecture provides 3.35 TB/s of memory bandwidth compared to 2.0 TB/s, yielding a realistic theoretical speedup closer to 1.6x for token generation.
  common_mistake: |
    **The Pitfall:** Accepting the vendor's peak TFLOPS benchmark as the primary metric for low-batch inference.
    **The Rationale:** Candidates assume inference speed scales linearly with compute capability, failing to realize batch=1 token generation is heavily memory-bandwidth bound.
    **The Consequence:** Over-provisioning expensive compute nodes based on false expectations of 3x lower latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model in FP16 weights: ~140 GB.
       - Batch=1 generation requires loading the entire 140 GB of weights from HBM to SRAM for every token.
       - Legacy peak memory bandwidth: ~2,000 GB/s.
       - New peak memory bandwidth: ~3,350 GB/s.
    2. **Calculations:**
       - Legacy max tokens/sec = 2,000 / 140 = ~14.2 tokens/sec.
       - New max tokens/sec = 3,350 / 140 = ~23.9 tokens/sec.
       - Expected speedup = 3,350 / 2,000 = 1.675x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** The expected speedup is 1.675x, significantly lower than the vendor's 3x compute improvement claim.
