title: Evaluating LLM Inference Benchmarks
scenario: A team evaluates replacing a cluster of 8x A100 (80GB, SXM4) servers with 4x H100 (80GB, SXM5)
  servers for serving a 70B parameter LLM. The workload consists of latency-sensitive chat applications
  with very low concurrent requests (batch size = 1). The vendor benchmark highlights a 3x increase in
  peak FP16 TFLOPS on the H100, claiming a proportional 3x reduction in generation latency. Evaluate this
  vendor claim and design a benchmarking strategy that correctly measures the expected performance improvement
  for this specific workload.
details:
  realistic_solution: Reject the 3x latency reduction claim. Low-batch LLM inference is heavily memory-bandwidth
    bound, not compute-bound. The benchmarking strategy must focus on achievable memory bandwidth and
    interconnect latency. The H100 provides 3.35 TB/s of memory bandwidth compared to the A100's 2.0 TB/s,
    yielding a realistic theoretical speedup closer to 1.6x for token generation.
  common_mistake: Accepting the vendor's peak TFLOPS benchmark as the primary metric for low-batch inference,
    failing to realize the workload operates entirely in the memory-bound regime of the Roofline model.
  napkin_math: For a 70B model in FP16 (140GB weights), generating 1 token at batch size 1 requires loading
    the entire 140GB of weights from HBM to SRAM. A100 max tokens/sec = 2000 GB/s / 140 GB = ~14.2 tokens/sec.
    H100 max tokens/sec = 3350 GB/s / 140 GB = ~23.9 tokens/sec. Expected speedup is 3350 / 2000 = 1.675x,
    significantly lower than the 3x compute improvement.
