title: The Training Cost Estimate
scenario: Your startup wants to pre-train a 70B-parameter LLM on 2 trillion tokens. You're budgeting for H100 GPU hours on a cloud provider at $3.50/GPU-hour.
question: What is the estimated H100 training cost for a 70B model on 2T tokens at $3.50/GPU-hour, and what is the biggest budget risk?
details:
  realistic_solution: The standard approximation for transformer training FLOPS is $6 \times N \times D$ where $N$ = parameters and $D$ = tokens. The key variable is MFU — what fraction of the GPU's peak FLOPS you actually sustain. State-of-the-art distributed training achieves 30–50% MFU; poorly optimized setups hit 15–25%.
  common_mistake: |
    **The Pitfall:** Using the Chinchilla scaling law to get total FLOPS, dividing by H100 peak FLOPS, and multiplying by cost.
    **The Rationale:** This uses peak FLOPS and ignores Model FLOP Utilization (MFU).
    **The Consequence:** Drastically underestimating the cost since real-world training rarely exceeds 50% MFU.
  napkin_math: |
    1. Total FLOPS = $6 \times 70\text{B} \times 2\text{T} = 8.4 \times 10^{23}$ FLOPS.
    2. H100 BF16 peak = 989 TFLOPS. At 40% MFU: effective = 396 TFLOPS/GPU.
    3. GPU-seconds needed = $8.4 \times 10^{23} / (3.96 \times 10^{14}) = 2.12 \times 10^9$ sec.
    4. GPU-hours = 589,000 hours.
    5. Cost = 589,000 $\times$ $3.50 = $2.06M.
    6. **Result:** **At a realistic 40% MFU, the cost is ~$2.06M. Dropping to 25% MFU inflates the cost to $3.3M.**
