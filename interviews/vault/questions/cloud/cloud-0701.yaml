title: The Training Cost Estimate
scenario: Your startup wants to pre-train a 70B-parameter LLM on 2 trillion tokens. You're budgeting for
  H100 GPU hours on a cloud provider at \$3.50/GPU-hour. Estimate the total training cost. What's the
  biggest risk to your budget?
details:
  realistic_solution: The standard approximation for transformer training FLOPS is $6 \times N \times
    D$ where $N$ = parameters and $D$ = tokens. The key variable is MFU — what fraction of the GPU's peak
    FLOPS you actually sustain. State-of-the-art distributed training achieves 30–50% MFU; poorly optimized
    setups hit 15–25%.
  common_mistake: '"Use the Chinchilla scaling law to get total FLOPS, divide by H100 peak FLOPS, multiply
    by cost." This uses peak FLOPS and ignores Model FLOP Utilization (MFU), which is the single biggest
    variable in the cost estimate.'
  napkin_math: 'Total FLOPS = $6 \times 70\text{B} \times 2\text{T} = 8.4 \times 10^{23}$ FLOPS. H100
    BF16 peak = 989 TFLOPS. At 40% MFU: effective = 396 TFLOPS/GPU. GPU-seconds needed = $8.4 \times 10^{23}
    / (3.96 \times 10^{14}) = 2.12 \times 10^{9}$ sec. GPU-hours = 589,000. With 512 GPUs: 1,151 hours
    ≈ **48 days**. Cost = 589,000 × \$3.50 = **\$2.06M**. At 25% MFU (poor optimization): \$3.3M — a 60%
    budget overrun. The biggest risk: MFU dropping due to communication overhead, data pipeline stalls,
    or checkpointing pauses. Every 5% MFU drop costs ~\$250k.'
