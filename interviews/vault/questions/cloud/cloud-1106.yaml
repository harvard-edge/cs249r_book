title: 'Demographic Data Scaling Shortfall'
scenario: 'You are filling out the ''Composition'' section of a Datasheet for Datasets for a cloud facial recognition API''s training corpus (100M images). The datasheet reveals a severe skew: Demographic A comprises 0.1% of the dataset (100k images). To meet your strict 99.9% accuracy SLA across all subgroups, empirical scaling laws dictate you need at least 500,000 images per demographic.'
question: 'If you rely on naive random data collection from a pipeline where Demographic A has a 1% true occurrence rate, how many raw images must you ingest to close the gap?'
details:
  realistic_solution: 'Calculate the shortfall (400,000 images) and divide by the pipeline occurrence rate (0.01) to find the total ingestion requirement (40M images). Document this in the Datasheet to justify shifting from random sampling to targeted collection.'
  common_mistake: |
    **The Pitfall:** Calculating the requirement based solely on the raw shortfall.
    **The Rationale:** Candidates forget to divide by the new pipeline's occurrence rate, or they incorrectly use the old dataset's 0.1% skew rate.
    **The Consequence:** Drastically underestimating data collection costs and failing to close the demographic representation gap, violating the SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current Total Dataset: 100,000,000 images.
    - Demographic A Ratio (Old): 0.1% (0.001).
    - Target Inventory: 500,000 images per demographic.
    - New Pipeline Occurrence Rate: 1% (0.01).

    **Calculations:**
    - Current Inventory: 100,000,000 * 0.001 = 100,000 images.
    - Shortfall: 500,000 - 100,000 = 400,000 images.
    - Required Raw Ingestion: 400,000 / 0.01 = 40,000,000 images.

    **Conclusion & Interpretation:**
    - **Result: 40M images (Data-Bound)**. Relying on random collection requires ingesting 40M raw images to close the demographic gap.
