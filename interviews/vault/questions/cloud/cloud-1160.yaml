title: Diagnosing the Interpolation Threshold Error Spike
scenario: You are debugging a training run for a transformer-based fraud detection model on a cluster
  of 8x A100 80GB GPUs. The training dataset consists of exactly 1.2 million labeled transaction records.
  The team initially deployed a 250K parameter model with a 12% validation error. They recently scaled
  the architecture to 1.2M parameters to capture more complex fraud patterns, but the validation error
  paradoxically spiked to 28%, while training error hit exactly zero. The ML engineering lead halts the
  run, diagnosing terminal overfitting, and orders the team to revert to the 250K parameter model and
  double the dropout rate. Analyze the root cause of this error spike and evaluate the lead's proposed
  mitigation.
details:
  realistic_solution: Identify that the 1.2M parameter model is stuck exactly at the interpolation threshold
    (P ≈ N), causing the double descent peak. Instruct the team to significantly overparameterize the
    model (e.g., scale to 12M+ parameters) to enter the modern interpolating regime where test error drops
    again.
  common_mistake: Applying classical bias-variance tradeoff logic to conclude the model is irrevocably
    overfitted, leading to the counterproductive decision of shrinking the model or applying aggressive
    early stopping just as it hits the critical threshold.
  napkin_math: 'Critical peak occurs at interpolation threshold: P ≈ N (Parameters ≈ Samples). Here, P
    = 1.2M and N = 1.2M, giving a ratio P/N = 1.0 (maximum risk zone). To reach the second descent phase,
    scale to P >> N. Targeting P/N = 10 yields a new model size of ~12M parameters.'
