title: Diagnosing the Interpolation Threshold Error Spike
scenario: >-
  You are debugging a training run for a transformer-based fraud detection model on a cluster
  of 8x A100 80GB GPUs. The training dataset consists of exactly 1.2 million labeled transaction records.
  The team initially deployed a 250K parameter model with a 12% validation error. They recently scaled
  the architecture to 1.2M parameters to capture more complex fraud patterns, but the validation error
  paradoxically spiked to 28%, while training error hit exactly zero. The ML engineering lead halts the
  run, diagnosing terminal overfitting, and orders the team to revert to the 250K parameter model and
  double the dropout rate.
question: >-
  What caused validation error to spike at 1.2M parameters, and should the team revert and add dropout?
details:
  realistic_solution: 'Identify that the 1.2M parameter model is stuck exactly at the interpolation threshold (P ≈ N), causing the double descent peak. Instruct the team to significantly overparameterize the model (e.g., scale to 12M+ parameters) to enter the modern interpolating regime where test error drops again.'
  common_mistake: |
    **The Pitfall:** Applying classical bias-variance tradeoff logic to modern deep learning.
    **The Rationale:** Candidates conclude the model is irrevocably overfitted due to zero training error and spike in validation error, missing the "double descent" phenomenon.
    **The Consequence:** Counterproductively shrinking the model or applying aggressive early stopping just as it hits the critical threshold for better performance.
  napkin_math: |
    1. **Interpolation threshold:** The peak risk occurs when Parameters (P) ≈ Samples (N).
    2. **Current state:** P = 1.2M, N = 1.2M. Ratio P/N = 1.0 (the critical peak of double descent).
    3. **Modern regime:** To reach the second descent phase, scale to P >> N.
    4. **Recommendation:** Targeting P/N = 10 yields a new model size of **~12M parameters.**
