title: Guardrail Latency Budget
scenario: Your LLM chatbot has a 2-second total latency budget. The LLM inference takes 1.2 seconds. You need to add an input classifier (150ms), output classifier (200ms), and regex filter (5ms).
question: Do the input/output classifiers and regex filter fit within the 2-second chatbot latency budget, and how can you optimize them?
details:
  realistic_solution: 'Sequential pipeline: input classifier (150ms) + LLM (1200ms) + output classifier (200ms) + regex (5ms) = 1555ms. This fits within the 2000ms budget with 445ms margin. However, if we need to add more guardrails later, consider optimizations: (1) The regex filter (5ms) can run in parallel with the output classifier — saves 5ms. (2) With streaming output, the output classifier can process tokens as they are generated, overlapping with LLM inference. If the output classifier processes each chunk in 20ms and there are 10 chunks: the classifier finishes ~20ms after the last token, not 200ms after. Total with streaming: 150ms + 1200ms + 20ms = 1370ms. (3) Input classifier can be a distilled model running on CPU to free GPU for the LLM. Final optimized pipeline: 1370ms, leaving 630ms budget for future guardrails.'
  common_mistake: |
    **The Pitfall:** Assuming all safety guardrails must execute strictly sequentially after generation completes.
    **The Rationale:** Candidates mentally separate "generation" and "moderation" into rigid phases, forgetting that token streaming allows for powerful temporal overlap.
    **The Consequence:** The system incurs massive, unnecessary latency, leading to degraded user experience or failure to accommodate future safety models.
  napkin_math: |
    - **Sequential Pipeline:** 150ms (input) + 1200ms (LLM) + 200ms (output) + 5ms (regex) = **1555ms** (Fits in 2000ms budget).
    - **Optimized (Streaming):** Output classifier processes token chunks as they arrive. If chunks process in 20ms, it finishes ~20ms after the final token.
    - **Optimized Time:** 150ms + 1200ms + 20ms = **1370ms**.
    - **Result:** Saves **185ms**, leaving a 630ms buffer for future features.
