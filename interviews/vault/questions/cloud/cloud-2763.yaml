title: Guardrail Latency Budget
scenario: 'Your LLM chatbot has a 2-second total latency budget. The LLM inference takes 1.2 seconds. You need to add an input classifier (150ms), output classifier (200ms), and regex filter (5ms).'
question: 'Do the input/output classifiers and regex filter fit within the 2-second chatbot latency budget, and how can you optimize them?'
details:
  realistic_solution: 'A sequential pipeline fits, but with streaming output, the output classifier can process tokens as they are generated, overlapping with LLM inference. This heavily optimizes the pipeline.'
  common_mistake: |
    **The Pitfall:** Assuming all safety guardrails must execute strictly sequentially after generation completes.
    **The Rationale:** Candidates mentally separate "generation" and "moderation" into rigid phases, forgetting that token streaming allows for powerful temporal overlap.
    **The Consequence:** The system incurs massive, unnecessary latency, leading to degraded user experience or failure to accommodate future safety models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 2000ms.
       - Current Inference: 1200ms.
       - Guardrails: Input (150ms), Output (200ms), Regex (5ms).
    2. **Calculations:**
       - Sequential Pipeline = 150ms + 1200ms + 200ms + 5ms = 1555ms.
       - Optimized (Streaming) = Output classifier processes asynchronously. Finishes ~20ms after final token.
       - Optimized Time = 150ms + 1200ms + 20ms = 1370ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound. Streaming architecture saves 185ms by overlapping moderation with generation, leaving a 630ms buffer for future features.**
