title: Designing Low-Latency, High-Throughput LLM Inference with Dynamic Batching on NVIDIA A100
scenario: Your team is deploying a critical real-time inference service for a large language model (LLM) on a cluster of NVIDIA A100 GPUs. The service has stringent latency requirements (e.g., p99 < 50ms) but also needs to maximize overall throughput to handle millions of queries per second.
question: How would you architect the system, including scheduling policies, to leverage the A100's capabilities effectively while meeting both latency and throughput KPIs?
details:
  realistic_solution: A realistic solution would involve a dynamic or continuous batching strategy, potentially augmented with a smart request scheduler. For instance, a continuous batching approach (like vLLM's PagedAttention) on the A100 can maximize GPU utilization by grouping requests with varying sequence lengths and progress, ensuring the GPU is always processing active tokens. A hybrid approach might also involve a small, fixed-size 'express lane' static batch for ultra-low-latency critical requests, while the majority of traffic goes through a dynamic or continuous batching system that accumulates requests for a short window (e.g., 5-10ms) or until a certain batch size is met, ensuring the A100's FP16 TFLOPS and HBM2e bandwidth are heavily utilized. The scheduler would prioritize requests based on their individual deadlines and available GPU resources, potentially using techniques like speculative decoding for further latency reduction.
  common_mistake: |
    **The Pitfall:** Exclusively focusing on static batching with a fixed, small batch size.
    **The Rationale:** Candidates prioritize hitting the strict 50ms latency SLA without considering hardware utilization.
    **The Consequence:** The A100's compute capabilities are severely underutilized, destroying total system throughput and dramatically inflating serving costs.
  napkin_math: |
    - FP16 Weights size (30B model): 60 GB.
    - Time to load weights at 2.0 TB/s (Memory Bandwidth limit): 60 GB / 2000 GB/s = 30 ms per token.
    - Batch Size 1: 1 token / 30 ms = 33 tokens/s (Underutilizes 312 TFLOPS).
    - Continuous Batching (Batch 128): Dot products increase compute time to ~40 ms.
    - **Throughput Gain:** 128 tokens / 40 ms = 3,200 tokens/s, maintaining the < 50ms latency SLA while achieving ~100x higher throughput.
