title: Designing Low-Latency, High-Throughput LLM Inference with Dynamic Batching on NVIDIA A100
scenario: Your team is deploying a critical real-time inference service for a large language model (LLM) on a cluster of GPUs. The service has stringent latency requirements (e.g., p99 < 50ms) but also needs to maximize overall throughput to handle millions of queries per second.
question: How would you architect the system, including scheduling policies, to leverage the hardware's capabilities effectively while meeting both latency and throughput KPIs?
details:
  realistic_solution: 'A realistic solution employs continuous batching (e.g., using vLLM''s PagedAttention) to maximize GPU utilization by grouping requests with varying sequence lengths, ensuring the GPU processes active tokens continuously without padding waste. A smart request scheduler should prioritize based on individual deadlines and available GPU resources. For ultra-low latency, speculative decoding could be integrated, trading compute for lower latency.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on static batching with a fixed, small batch size.
    **The Rationale:** Candidates prioritize hitting the strict 50ms latency SLA without considering hardware utilization.
    **The Consequence:** The compute capabilities are severely underutilized, destroying total system throughput and dramatically inflating serving costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B model, FP16 Weights size: 60 GB.
       - Memory Bandwidth limit: 2.0 TB/s (2000 GB/s).
       - Latency SLA: p99 < 50ms.
    2. **Calculations:**
       - Time to load weights at Memory Bandwidth limit: 60 GB / 2000 GB/s = 30 ms per token.
       - Batch Size 1: 1 token / 30 ms = 33 tokens/s (Severe underutilization of TFLOPS).
       - Continuous Batching (Batch 128): Dot products increase compute time to ~40 ms per token.
       - Throughput Gain: 128 tokens / 40 ms = 3,200 tokens/s.
    3. **Conclusion & Interpretation:**
       - **Result: 3,200 tokens/s throughput while maintaining < 50ms latency.** (Memory-Bandwidth Bound at low batch sizes, transitioning to Compute-Bound at high batch sizes)
