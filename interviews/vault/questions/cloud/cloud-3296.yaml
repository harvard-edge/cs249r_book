title: Designing Low-Latency, High-Throughput LLM Inference with Dynamic Batching
  on NVIDIA A100
scenario: Your team is deploying a critical real-time inference service for a large
  language model (LLM) on a cluster of NVIDIA A100 GPUs. Each A100 offers 80 GB HBM2e
  memory, 312 TFLOPS FP16 performance, and 2.0 TB/s memory bandwidth, with a 400W
  TDP. The service has stringent latency requirements (e.g., p99 < 50ms) but also
  needs to maximize overall throughput to handle millions of queries per second. You
  are tasked with designing the inference pipeline's batching strategy. Specifically,
  you need to evaluate and propose a solution that balances throughput and latency,
  considering static, dynamic, and continuous batching approaches. How would you architect
  the system, including scheduling policies, to leverage the A100's capabilities effectively
  while meeting both latency and throughput KPIs?
question: How would you architect the system, including scheduling policies, to leverage
  the A100's capabilities effectively while meeting both latency and throughput KPIs?
details:
  realistic_solution: A realistic solution would involve a dynamic or continuous batching
    strategy, potentially augmented with a smart request scheduler. For instance,
    a continuous batching approach (like vLLM's PagedAttention) on the A100 can maximize
    GPU utilization by grouping requests with varying sequence lengths and progress,
    ensuring the GPU is always processing active tokens. A hybrid approach might also
    involve a small, fixed-size 'express lane' static batch for ultra-low-latency
    critical requests, while the majority of traffic goes through a dynamic or continuous
    batching system that accumulates requests for a short window (e.g., 5-10ms) or
    until a certain batch size is met, ensuring the A100's FP16 TFLOPS and HBM2e bandwidth
    are heavily utilized. The scheduler would prioritize requests based on their individual
    deadlines and available GPU resources, potentially using techniques like speculative
    decoding for further latency reduction.
  common_mistake: A common mistake is to exclusively focus on static batching with
    a fixed, small batch size to meet latency targets, leading to underutilization
    of the A100's compute capabilities and significantly reduced throughput. Conversely,
    using very large static batch sizes for throughput can severely violate latency
    SLAs, especially for variable input lengths, without intelligent scheduling, as
    requests might wait too long to fill a batch.
  napkin_math: 'Consider an LLM inference scenario where auto-regressive decoding is memory-bandwidth bound. To generate 1 token at batch size 1 for a 30B parameter model in FP16 (60GB), we must read all 60GB from HBM. At 2.0 TB/s, this takes 60GB / 2000GB/s = 30ms per token. For a 50ms latency SLA, static batching can only handle batch size 1 (since 30ms < 50ms, but 2 steps take 60ms). However, with continuous batching, if we batch N requests, we still load the 60GB weights once per step, but perform N dot products. A batch size of 128 might increase the compute time such that the step takes 40ms. In this case, throughput is 128 tokens / 40ms = 3200 tokens/s. This drastically improves throughput while maintaining latency SLAs, avoiding the severe underutilization of the 312 TFLOPS peak compute that occurs at small batch sizes.'
