title: Realize automated NAS-style width and depth search for EfficientNet-style backbone
scenario: Your team needs a custom EfficientNet-style backbone for a proprietary dataset with hard constraints. Using 8× H100s and a 5-day search budget, you plan to run a 300-epoch supernet schedule.
question: How would you realize a once-for-all NAS pipeline under the budget, and what is the maximum per-epoch time constraint if 22,500 seconds is allocated to training?
details:
  realistic_solution: Utilize a once-for-all weight-sharing supernet approach where the largest network is trained and sub-networks are sampled and evaluated without retraining from scratch. 
  common_mistake: |
    **The Pitfall:** Running full DARTS on the full dataset or using random search without a supernet.
    **The Rationale:** Candidates fail to understand the difference between weight-sharing supernet training and training individual candidates from scratch.
    **The Consequence:** The search takes weeks or months, vastly exceeding the 5-day budget.
  napkin_math: |
    - **Training Schedule:** Total allocated time for supernet training = 22,500 seconds.
    - **Per Epoch Time:** 22,500 seconds / 300 epochs = 75 seconds.
    - **Result:** The required per-epoch time is **75 seconds (1.25 minutes)**.
