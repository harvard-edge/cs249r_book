title: Evaluating Synchronous Checkpointing Overheads
scenario: You are training a 300B parameter model on a 4096-GPU cluster. The total checkpoint state is 4.8 TB. Checkpoints are synchronously written every 1 hour to a parallel file system with 40 GB/s peak ingest, blocking all GPUs.
question: What is the synchronous checkpointing overhead for the 4.8TB state, and is a two-tier local-NVMe asynchronous strategy justified?
details:
  realistic_solution: Adopt a two-tier checkpointing architecture. First, synchronously write the checkpoint shards to the node-local NVMe drives, which unblocks the GPUs almost immediately. Then, use a background process to asynchronously drain the local NVMes to the centralized parallel file system before the next checkpoint interval.
  common_mistake: |
    **The Pitfall:** Calculating only theoretical transfer time and ignoring the opportunity cost of idling GPUs, or prematurely suggesting fully asynchronous checkpointing.
    **The Rationale:** Candidates focus solely on storage metrics without accounting for cluster-wide idle time or state consistency challenges.
    **The Consequence:** Millions of dollars in GPU compute are wasted waiting on centralized storage IO.
  napkin_math: |
    - **Direct to PFS (Synchronous):** 4,800 GB / 40 GB/s = 120s pause.
    - **Overhead:** 120s per hour = 120 / 3600 = 3.3% idle time.
    - **Two-tier sync (Local NVMe):** 4,800 GB / (512 nodes * 3 GB/s) = 3.1s pause.
    - **Result:** **Asynchronous draining to PFS reduces the synchronous GPU stall by ~97% (from 120s to 3.1s).**
