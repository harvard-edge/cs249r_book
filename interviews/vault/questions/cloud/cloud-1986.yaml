title: Evaluating Synchronous Checkpointing Overheads
scenario: You are orchestrating the training of a 300B parameter model on a 4096-GPU cluster (A100 80GB).
  The total optimizer and model state size per checkpoint is 4.8 TB. The cluster experiences a hardware
  failure on average every 3 hours. Your team currently uses synchronous checkpointing every 1 hour to
  a centralized parallel file system with a peak ingest bandwidth of 40 GB/s. During checkpointing, all
  GPUs are blocked. Evaluate the training time overhead of this synchronous approach and justify whether
  adopting a two-tier strategy (synchronous to local NVMe, then asynchronous to the file system) is required.
question: "What is the synchronous checkpointing overhead for the 4.8TB state, and is two-tier local-NVMe then async file-system checkpointing required?"
details:
  realistic_solution: Adopt a two-tier checkpointing architecture. First, synchronously write the checkpoint
    shards to the node-local NVMe drives, which unblocks the GPUs almost immediately. Then, use a background
    process to asynchronously drain the local NVMes to the centralized parallel file system before the
    next checkpoint interval.
  common_mistake: Candidates often only calculate the theoretical transfer time and ignore the massive
    opportunity cost of idling 4096 GPUs, or they prematurely suggest fully asynchronous checkpointing
    without considering the complexities of state consistency.
  napkin_math: 'Direct to PFS via IB NDR (50 GB/s link, bottlenecked by storage): 4,800 GB / 40 GB/s =
    120s pause. Over 3h, 120/10800 = 1.1% idle. Two-tier sync: local NVMe write = 4,800 GB / (512 nodes
    * 3 GB/s) = 3.1s pause. Async drain to PFS in background reduces synchronous GPU stall by ~97%.'
