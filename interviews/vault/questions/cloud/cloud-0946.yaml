title: Queueing Delay in Provisioning
scenario: Your team deployed a Whisper model on AWS A10G instances for an audio transcription service.
  A single A10G processes a standard 30-second audio clip in exactly 1.5 seconds. Your Service Level Objective
  (SLO) guarantees a P99 latency of 5.0 seconds. The traffic pattern is bursty, with a peak arrival rate
  of 50 requests per second. The infrastructure team provisioned 75 instances, calculating that 75 instances
  * (1 request / 1.5 sec) = 50 QPS capacity. However, during peak hours, P99 latency spikes to over 15
  seconds. Analyze why the current capacity planning failed and determine the correct provisioning strategy
  to meet the SLO.
details:
  realistic_solution: The root cause is queueing delay. Because real-world traffic is bursty, operating
    at 100% utilization causes requests to pile up in the queue, waiting significantly longer than the
    actual inference time. To maintain a 5.0s latency SLO, the maximum allowable wait time in the queue
    is 3.5s (5.0s SLO - 1.5s processing). Applying Kingman's formula or queueing theory, the system must
    be provisioned for a lower target utilization (e.g., 80%) to absorb traffic bursts without violating
    the latency budget.
  common_mistake: Assuming deterministic traffic and targeting 100% hardware utilization. Candidates often
    incorrectly calculate Capacity = Peak QPS * Service Time, failing to account for the exponential growth
    of queueing delays as system utilization approaches 1.0 with bursty (Poisson) arrivals.
  napkin_math: To avoid infinite wait times, target 80% utilization (U=0.8) for the 5.0s P99 SLA. Service
    time per clip is 1.5s. Capacity per instance = 1 / 1.5s = 0.66 requests/sec. Total demand = 50 requests/sec.
    Required capacity = 50 / 0.8 = 62.5 requests/sec. Instances needed = Total Capacity / Capacity per
    instance = 62.5 / 0.66 = 93.75. Round up to 94 instances to safely meet the P99 latency SLA.
