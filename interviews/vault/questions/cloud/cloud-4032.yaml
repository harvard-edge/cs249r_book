title: End-to-End Congestion Budget for Training Iteration
scenario: 'You are writing the SLA for a 1024-H100 training cluster that guarantees
  <5% communication overhead relative to ideal (zero-latency AllReduce). Break down
  the congestion budget across all components: ECMP imbalance, ECN-induced rate reduction,
  PFC pauses, retransmissions, and software overhead. Specify the maximum allowable
  contribution from each.'
question: How would you allocate the <5% communication-overhead SLA budget across
  ECMP imbalance, ECN/DCQCN, PFC, retransmissions, and software?
details:
  realistic_solution: 'Total communication overhead budget: 5% of iteration time.
    For a 400ms training iteration with 80ms ideal AllReduce time (2GB gradient, 1024
    GPUs, ring AllReduce): 5% overhead = 20ms additional latency. Budget allocation:
    (1) ECMP imbalance: 4ms (20% of budget) — achievable with adaptive routing
    keeping path utilization variance < 5%. (2) ECN-induced rate reduction (DCQCN):
    5ms (25%) — allows rate-reduction events to recover quickly. (3) PFC pauses:
    3ms (15%) — requires tight PFC watchdog timers. (4) Retransmissions: 4ms
    (20%) — allows at most 1 retransmission per 100 iterations. (5)
    Software overhead (NCCL kernel launch, memory copy, synchronization): 4ms (20%)
    — bounded by GPU kernel launch latency and PCIe DMA setup. Monitoring: instrument
    each component with per-iteration counters. Alert if any component exceeds 150%
    of its budget for 10 consecutive iterations. Capacity planning: at 2048 GPUs,
    double the ECMP and PFC budgets since path diversity and failure probability scale
    with node count.'
  common_mistake: Setting an aggregate 5% target without allocating sub-budgets. Without
    per-component budgets, you cannot diagnose which mechanism is consuming the overhead
    or set appropriate thresholds to stay within SLA.
  napkin_math: 'Ideal Ring AllReduce for 2GB on 1024 GPUs: 2 × 2GB / 50GB/s = 80ms.
    5% overhead of a 400ms iteration = 20ms total budget. Per
    component: ~3-5ms each for 5 components. Reality check: NCCL benchmarks show
    8-12% overhead on 1024 GPUs, so 5% is aggressive and requires careful tuning of
    all parameters.'
