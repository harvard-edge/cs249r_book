title: The 100K-GPU Storage Architecture
scenario: You are the Principal Storage Architect for a new 100,000-GPU training cluster that will train frontier models (1T+ parameters). The cluster will run continuous pre-training jobs lasting 3-6 months. Your requirements are (1) feed 100K GPUs at 200 MB/s each = 20 TB/s aggregate read bandwidth for training data, (2) checkpoint 20 TB every 10 minutes with <5 seconds of GPU idle time, (3) survive up to 50 simultaneous node failures without losing more than 30 seconds of training progress, (4) total storage budget is $15M for 3 years.
question: "What storage hierarchy meets the 100K-GPU cluster's 20 TB/s reads, 20 TB checkpoints, failure tolerance, and $15M budget?"
details:
  realistic_solution: 'The architecture requires four tiers, each optimized for a different access pattern: Tier 0 — Host DRAM (synchronous checkpoint staging): Each of the 12,500 nodes has 1-2 TB of DRAM. Checkpoint path: GPU→DRAM memcpy takes <1s (200 MB/shard at 32 GB/s). This is the only synchronous operation. Total DRAM capacity: ~15 PB across the cluster. Tier 1 — Local NVMe (async checkpoint + data cache): 4× 3.84 TB NVMe per node = 15.36 TB/node, 192 PB aggregate. Serves two roles: async checkpoint staging (DRAM→NVMe flush in background) and warm cache for training data. NVMe read: 25 GB/s per node → 312 TB/s aggregate — exceeds the 20 TB/s requirement by 15×, ensuring data loading never bottlenecks even with cache misses. Tier 2 — Parallel filesystem (Lustre/GPFS): 10 PB capacity, 4 TB/s aggregate bandwidth. Purpose: checkpoint durability (NVMe→PFS flush) and cold data serving. 4 TB/s is sufficient because checkpoint flushes are asynchronous and staggered. Recovery read: 20 TB checkpoint at 4 TB/s = 5 seconds — fast enough for sub-30-second recovery. Tier 3 — Object storage (S3/MinIO): 50 PB capacity, 200 GB/s. Purpose: long-term checkpoint archival, dataset versioning, training logs. Cost: ~$0.02/GB/month. Budget allocation: NVMe drives (192 PB at ~$50/TB): $9.6M. Lustre (10 PB at ~$200/TB for high-BW tier): $2M. Object storage (50 PB at ~$20/TB): $1M. Networking (storage fabric): $2M. Total: $14.6M — under budget.'
  common_mistake: |
    **The Pitfall:** Designing a single, monolithic, ultra-fast storage tier (like a massive Lustre cluster) hoping to hit all numbers with brute force.
    **The Rationale:** Engineers who lack distributed systems scale intuition forget that maintaining a single massive 20 TB/s filesystem capable of handling instantaneous synchronized 20 TB writes is technologically nearly impossible, and certainly shatters the $15M limit.
    **The Consequence:** The $15M budget is violently depleted trying to scale an enterprise NAS to petabyte capacities at 20 TB/s, forcing GPU downtime every 10 minutes because the system stalls waiting on synchronous POSIX writes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100K GPUs, 12,500 nodes.
       - 20 TB/s read requirement, 20 TB checkpoint <5s idle. $15M budget.
    2. **Calculations:**
       - NVMe Aggregate BW: 12,500 nodes * 25 GB/s = 312.5 TB/s.
       - Checkpoint Phase 1 (Sync GPU->DRAM): 200 MB at 32 GB/s = 6ms.
       - Checkpoint Phase 3 (Async NVMe->Lustre): 20 TB at 4 TB/s = 5 seconds.
       - Failure Recovery (Lustre read): 20 TB at 4 TB/s = 5 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: GPU idle time is strictly capped at <2 seconds, avoiding a Synchronous-I/O-Bound stall while preserving the $15M budget.**
