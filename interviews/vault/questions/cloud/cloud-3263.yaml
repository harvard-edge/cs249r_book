title: LLM Training Cost Estimation on NVIDIA H100
scenario: Your team is planning to train a large language model with 70 billion parameters on a dataset of 2 trillion tokens. You need to estimate the computational resources and cost. The target hardware for this training is an NVIDIA GPU cluster (80 GB HBM3, 989 TFLOPS FP16 dense). Outline your approach to estimate the total FLOPs required for training, the total GPU-hours needed assuming a realistic average sustained utilization, and the approximate dollar cost for this training run.
question: "How would you estimate total FLOPs, GPU-hours, and dollar cost to train a 70B model on 2T tokens, and how would you refine it?"
details:
  realistic_solution: "A robust solution involves: \n1. **FLOPs Estimation:** Using the formula 6 * P * D for LLM training FLOPs (P = parameters, D = tokens). \n2. **GPU-hours:** Dividing total FLOPs by the estimated *sustained* FLOPS per GPU (peak FLOPs * realistic utilization factor, e.g., 30-50%). Consideration of batch size, gradient accumulation, and optimizer choice (e.g., Adam vs. SGD) influencing the overall efficiency. \n3. **Cost Estimation:** Multiplying total GPU-hours by the cloud provider's hourly rate. \n4. **Refinement Factors:** Accounting for communication overhead (e.g., using NCCL bandwidth for inter-GPU communication), memory constraints, distributed training frameworks efficiency, and elasticity/spot instance pricing strategies."
  common_mistake: |
    **The Pitfall:** Using theoretical peak FLOPs without accounting for real-world sustained utilization.
    **The Rationale:** Candidates multiply hardware specs directly without understanding that communication overhead and memory bottlenecks drop realistic Model FLOPs Utilization (MFU) to 30-50%.
    **The Consequence:** Underestimating the training time and budget by a factor of 2x or 3x, leading to disastrous project shortfalls.
  napkin_math: |
    - $P = 70 \times 10^9$ parameters, $D = 2 \times 10^{12}$ tokens.
    - **Total FLOPs:** $6 \times P \times D = 6 \times 70\text{e}9 \times 2\text{e}12 = 840 \times 10^{21}$ FLOPs.
    - **Sustained Performance:** Assuming 40% utilization, $0.40 \times 989\text{ TFLOPS} = 395.6\text{ TFLOPS}$.
    - **Total GPU-Hours:** $840\text{e}21 / 395.6\text{e}12 \approx 2.124 \times 10^9\text{ GPU-seconds} \approx 590,000\text{ GPU-hours}$.
    - **Estimated Cost:** At $\$3.80/\text{hr}$, **$590,000 \times 3.80 \approx \mathbf{\$2.24\text{ million}}$.**
