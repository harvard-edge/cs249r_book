title: H100 Deployment Strategy: Encoder-Decoder Tradeoffs for LLM Cost Optimization
scenario: Your team must deploy an LLM for a high-throughput, low-latency API endpoint processing queries for a recommendation system. You have H100 GPUs (80 GB HBM3, 989 TFLOPS FP16, 3.35 TB/s bandwidth). You must minimize inference costs while maintaining <500ms P99 latency and high QPS.
question: Which architecture (encoder-only, decoder-only, or encoder-decoder) would you choose for query understanding and generation, and how would you quantify bottlenecks?
details:
  realistic_solution: Separate the tasks: use an encoder-only model for high-quality embedding/retrieval, followed by a smaller, specialized decoder-only model for generation. This avoids the massive memory and compute footprint of a large, monolithic decoder.
  common_mistake: |
    **The Pitfall:** Blindly choosing a massive decoder-only model for the entire pipeline.
    **The Rationale:** Candidates default to popular monolithic generative architectures without separating the semantic understanding workload from the generation workload.
    **The Consequence:** Vastly over-provisioning compute and memory bandwidth, resulting in poor QPS and bloated inference costs.
  napkin_math: |
    - **Compute Peak**: 989 TFLOPS FP16. If 1 token requires 100 GFLOPs (10^11), peak compute is 9,890 tokens/sec.
    - **Memory limits**: An 80B FP16 model = 160 GB, exceeding a single H100's 80 GB limit. Tensor parallelism is mandatory.
    - **Bandwidth check (7B Decoder)**: Weights = 14 GB. To hit a 100 ms generation step, bandwidth needed = 14 GB / 0.1s = 140 GB/s.
    - **Conclusion**: **140 GB/s is well within the 3.35 TB/s limit, but context-heavy KV caches will rapidly consume the remaining bandwidth.**
