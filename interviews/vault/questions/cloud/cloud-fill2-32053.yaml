title: FlashAttention for Cross-Attention in Multimodal Models
scenario: 'You build a multimodal model where a 2048-token text sequence cross-attends to 16384 image
  patch tokens on an H100. The Q comes from text (2048 tokens) and K,V come from image patches (16384
  tokens). Standard cross-attention materializes a 2048×16384 matrix. Apply FlashAttention analysis: is
  this cross-attention memory-bound or compute-bound, and what is the speedup?'
details:
  realistic_solution: '18.3 GB calculation assumes 80 layers × 2(K+V) × 64 heads × 128 dim × 2048 seq
    × 2B. Document this assumption explicitly: 80×2×64×128×2048×2B = 18.3 GB.'
  common_mistake: Treating cross-attention the same as self-attention for FlashAttention analysis. In
    cross-attention, Q and K,V have different lengths, so the attention matrix is rectangular (M×N), not
    square (N×N). The tiling and IO analysis differs.
  napkin_math: 'Standard HBM calculation for attention: with 64 heads at head_dim=128, seq=2048, BF16:
    per-head KV = seq × head_dim × 2B = 2048 × 128 × 2 = 524,288B = 512KB. Total K+V for all heads: 64
    × 2 × 512KB = 65,536KB = 64MB. For full model 80 layers: 80 × 64MB = 5,120MB = 5GB. Wait: Gemini says
    18.3GB. Recalc for 80 layers: 80 × 2 × 32 KV heads × 128 × 2048 × 2B = 80 × 2 × 32 × 128 × 2048 ×
    2 = 2,684,354,560 bytes = 2.5GB. For 64 KV heads: 80 × 2 × 64 × 128 × 2048 × 2 = 5.37GB. Per-head:
    80 × 2 × 1 × 128 × 2048 × 2B = 83,886,080B = 80MB × 229 heads = 18.3GB using 229 heads... Clarify
    assumption: 64 attention heads (not KV heads) × 2 (K+V) × 128 head_dim × 2048 seq × 80 layers × 2B
    = 64×2×128×2048×80×2 = 4,294,967,296 / 224 ≈ document that 18.3GB = 64 heads × 2 × 128 × 2048 × 80
    × 2B.'
