title: 'Datacenter Efficiency Mastery: Full-Stack TCO Optimization for H100 Training Facility'
scenario: You are designing a greenfield 10MW IT load GPU datacenter optimized for LLM training on H100
  clusters. You must minimize 5-year TCO while meeting PUE<1.15, carbon intensity <100gCO2/kWh, and p99
  cooling headroom of 20% for burst workloads. Develop the full efficiency architecture covering cooling,
  power distribution, and location selection.
question: "What cooling, power, and location architecture would minimize 5-year TCO for a 10 MW H100 training datacenter under the efficiency constraints?"
details:
  realistic_solution: 'Location: Nordic region (Iceland/Norway) — geothermal/hydro power at <20gCO2/kWh,
    0-10°C ambient enables free-air cooling 95% of year. Cooling: direct liquid cooling (rear-door heat
    exchangers + cold plates on H100s) enables PUE=1.06. Power: 480V three-phase direct to rack PDUs (skip
    transformer tier), 99.9% efficient lithium UPS (vs 94% lead-acid). Facility: 10MW IT load, PUE=1.06
    → 10.6MW total. H100 at 700W: 10MW/700W=14,286 H100s. 20% burst headroom: size cooling for 12MW. 5yr
    TCO: CapEx~$500M (H100s dominate), OpEx~$10.6MW×8760hr×$0.04/kWh(Iceland)=$3.7M/yr electricity.'
  common_mistake: Optimizing each subsystem independently (cooling, power, network) without co-designing
    them; selecting location based only on land/power cost without considering cooling climate suitability.
  napkin_math: 'PUE=1.06 target: overhead=0.6MW on 10MW IT. vs PUE=1.2 baseline: saves 1.4MW × 8760hr
    × $0.04=$490k/yr. Carbon: 10.6MW × 8760hr × 20gCO2/kWh = 1,857 tCO2/yr vs US grid (300g): 27,854 tCO2/yr.
    15× carbon reduction. 5yr OpEx savings on electricity vs US location: (300-40)g/kWh×10.6MW×8760hr/1000
    = 24.1 million kg CO2 saved per year (carbon reduction, not financial savings). Financial savings
    require the electricity cost differential: 10.6MW×8760hr×($0.09-$0.04)/kWh=$46.4k/yr. CapEx premium
    for Iceland: +$20M site vs +$24M OpEx savings → ROI positive in 4-5 years.'
