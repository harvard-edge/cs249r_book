title: Diagnosing DIR Degradation in Loan API
scenario: A cloud-based automated loan approval API running on a fleet of AWS m6g.4xlarge instances processes 500,000 applications daily. Assume the applicant pool is evenly split between the two demographic groups (50/50). The operations team alerts you that the Disparate Impact Ratio (DIR) for a protected demographic group has suddenly dropped from 0.85 to 0.62 after a recent model update. The global approval rate remains stable at ~28%.
question: How would you diagnose the DIR drop from 0.85 to 0.62 despite a stable global approval rate?
details:
  realistic_solution: Analyze the conditional acceptance rates. A DIR of 0.62 means the unprivileged group is receiving favorable outcomes at 62% the rate of the privileged group. By inspecting feature importance for the degraded slice, you identify a new NLP embedding feature that inadvertently acted as a proxy for the protected attribute, skewing the model's score distribution.
  common_mistake: |
    **The Pitfall:** Assuming that a stable global approval rate or overall model accuracy implies stable fairness metrics across individual demographic slices.
    **The Rationale:** Top-line metrics are the primary focus of standard CI/CD model monitoring.
    **The Consequence:** Approving a model update that severely penalizes a protected demographic, leading to legal and compliance violations in regulated industries like lending.
  napkin_math: |
    - **Prior DIR:** P(Y=1|Unpriv) / P(Y=1|Priv) = 0.255 / 0.30 = 0.85.
    - **New DIR:** 0.62.
    - **Global Stability:** Global approval rate remained stable at ~28%.
    - **Divergence:** To maintain 28% globally with a 0.62 DIR on a 50/50 split, rates diverged to roughly P(Y=1|Priv) = 34.2% and P(Y=1|Unpriv) = 21.2%.
    - **Result: The unprivileged approval rate fell severely while the privileged rate erroneously increased, masking the degradation in the global metric.**
