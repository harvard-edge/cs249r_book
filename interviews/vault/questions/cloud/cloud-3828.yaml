title: Mixed Precision Acceptance Spec
scenario: A team wants to move training from BF16 to FP8. Specify the acceptance criteria
  before allowing the change in a production training run.
question: What acceptance criteria should gate moving a production training run from
  BF16 to FP8?
details:
  realistic_solution: Require loss-curve parity, gradient overflow/underflow telemetry,
    accuracy regression bounds, per-layer fallback rules, checkpoint compatibility,
    kernel coverage, and recovery plan. FP8 is not just a memory optimization; it
    changes numerical behavior.
  common_mistake: Approving FP8 because it saves memory without checking convergence
    and fallback behavior.
  napkin_math: If FP8 saves 10 GB but causes a 2% quality drop, the trade may fail
    even when memory pressure disappears.
