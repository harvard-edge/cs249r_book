title: Mixed Precision Acceptance Spec
scenario: A team wants to move training from BF16 to FP8.
question: What acceptance criteria should gate moving a production training run from BF16 to FP8?
details:
  realistic_solution: Require loss-curve parity, gradient overflow/underflow telemetry, accuracy regression bounds, per-layer fallback rules, checkpoint compatibility, kernel coverage, and recovery plan. FP8 is not just a memory optimization; it changes numerical behavior.
  common_mistake: |
    **The Pitfall:** Approving the FP8 migration purely because it cuts memory usage in half.
    **The Rationale:** Engineers view precision reduction as a simple systems optimization, ignoring that FP8 fundamentally alters numerical stability and model convergence behavior.
    **The Consequence:** The model trains faster but suffers a silent quality regression, ultimately wasting massive compute budgets on a degraded final checkpoint.
  napkin_math: |
    1. FP8 cuts weight/activation memory requirements by ~50% compared to BF16 (e.g., saving 10 GB per GPU).
    2. However, if the numerical instability causes a 2% drop in final model quality (e.g., higher perplexity).
    **The compute cost required to recover that 2% quality gap typically dwarfs the savings from the 10 GB memory reduction.**
