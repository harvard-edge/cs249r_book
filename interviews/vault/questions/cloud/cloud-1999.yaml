title: Fan-out Tail Latency Probability
scenario: Your e-commerce recommendation system fans out each user request to 50 independent ML ranking microservices running on NVIDIA T4 GPUs. Each service evaluates a subset of the catalog. The median latency of a single service is 20ms, but the 99th percentile (p99) latency is 200ms due to occasional garbage collection and varying batch sizes.
question: What percentage of scatter-gather requests will see 200ms or higher latency across all 50 services?
details:
  realistic_solution: Calculate the probability that at least one of the 50 services hits the p99 latency. The correct approach yields ~39.5%. Mitigate this by implementing hedged requests (sending a duplicate request if the first takes too long) or enforcing a strict 50ms timeout and returning partial results.
  common_mistake: |
    **The Pitfall:** Assuming overall system latency remains close to the median or linearly scaling the probability.
    **The Rationale:** Candidates incorrectly multiply the 1% probability by 50 (yielding 50%), rather than calculating the joint probability of independent events.
    **The Consequence:** Vastly underestimating tail latency in microservice architectures, leading to broken SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 independent services, median 20ms, p99 200ms.
    2. **Calculations:**
       - Fast probability (< 200ms): 0.99.
       - All fast probability: 0.99^{50} \approx 0.605.
       - Slow probability (\geq 200ms): 1 - 0.605 = 0.395.
    3. **Conclusion & Interpretation:**
       - **Result: 39.5% of requests hit the 200ms tail latency.**
