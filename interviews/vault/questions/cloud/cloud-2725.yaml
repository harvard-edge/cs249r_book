title: Intermittent Fault Policy Design
scenario: 'Your 2,000-GPU cluster has ~20 GPUs showing intermittent faults (1-3 crashes/week each). Replacing
  all 20 costs $500K and takes a week. Options: (A) replace all 20, (B) implement a ''three strikes in
  48 hours'' auto-quarantine policy, (C) add redundant hot-spare GPUs that auto-substitute on failure.
  Evaluate.'
question: "For 20 GPUs with intermittent faults in a 2,000-GPU cluster, should you replace all, auto-quarantine after three strikes, or add hot spares?"
details:
  realistic_solution: 'Option A (replace all) is expensive ($500K) and may be overkill — some of the 20
    may have rare transient faults that do not warrant replacement. You also lose a week of capacity for
    the replacement operation. Option B (three-strikes auto-quarantine) is the most practical: if a GPU
    crashes 3 times in 48 hours, it is automatically removed from the scheduling pool and flagged for
    hardware inspection. This catches true intermittent faults while avoiding false positives from rare
    transient events. Zero human intervention needed for quarantine. Cost: software development + minor
    capacity loss. Option C (hot-spares) is complementary but expensive: keeping 20 idle spare GPUs costs
    ~$500K in capital sitting unused. Best approach: implement B as the primary policy, keep 5 hot-spares
    (not 20) for immediate substitution of quarantined GPUs, and batch-replace confirmed bad hardware
    monthly.'
  common_mistake: Choosing option A (replace all) without considering that some of the 20 may be experiencing
    rare transient faults, not true intermittent hardware issues. Replacing healthy GPUs wastes money.
  napkin_math: 'A: $500K + 1 week downtime. B: ~$0 + auto-quarantine reduces disruption by ~90%. C: 20
    spares × $25K = $500K idle capital. B+5 spares is optimal.'
