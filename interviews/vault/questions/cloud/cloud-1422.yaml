title: Diagnosing Input Stationary Bottlenecks in MLP Workloads
scenario: You are porting a DLRM model with $4096 \times 4096$ MLP layers to a legacy accelerator with a 64x64 MAC array and 2MB SRAM using a strict Input Stationary (IS) dataflow. At batch size 256, DRAM bandwidth (800 GB/s) is saturated but MAC utilization is 4%.
question: Why does the Input Stationary dataflow bottleneck MLP layers, and how do you quantify the architectural mismatch?
details:
  realistic_solution: The Input Stationary architecture pins input activations in the MACs and streams weights. Since the 64x64 array only holds a tile of 64 inputs at once, a batch of 256 requires 4 passes. This means the massive 32MB weight matrix is redundantly loaded from DRAM 4 times per layer, thrashing bandwidth. The fix is to transpose the matrix formulation in software (switching inputs and weights) to trick the compiler into treating the massive weights as the 'stationary inputs'.
  common_mistake: |
    **The Pitfall:** Assuming the problem is simply a 'memory-bound' matrix-vector multiplication.
    **The Rationale:** Failing to realize that at Batch=256, the layer should be compute-bound, but the hardware dataflow is forcing redundant memory reads.
    **The Consequence:** Attempting to prune or quantize the model when a simple software transpose (treating weights as inputs) would fix the dataflow mismatch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Weights: $4096 \times 4096$ FP16 = 33.55 MB.
       - Hardware: Input Stationary, 64x64 MAC array, 800 GB/s DRAM.
    2. **Calculations:**
       - Input tiles for Batch 256: 256 / 64 = 4 passes.
       - Weight data loaded: 4 passes * 33.55 MB = 134.2 MB per layer.
       - Total compute: $2 \times 256 \times 4096 \times 4096 = 8.59\text{ GFLOPs}$.
       - Arithmetic Intensity: 8.59 GFLOPs / 134.2 MB = 64 FLOPs/Byte.
       - Max throughput: 800 GB/s * 64 = 51.2 TFLOPs/s.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Bound (Dataflow Mismatch).** The Input Stationary architecture forces redundant memory reads, tanking arithmetic intensity and MAC utilization.
