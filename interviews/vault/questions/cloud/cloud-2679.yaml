title: How Recommendation Systems Create Feedback Loops
scenario: A content recommendation model is retrained monthly on user engagement data. Explain how this
  creates a runaway feedback loop and why it is difficult to detect.
details:
  realistic_solution: 'The feedback loop: (1) The model recommends content it predicts users will engage
    with. (2) Users can only engage with content they are shown (selection bias). (3) Engagement data
    from shown content is collected as ''positive signal.'' (4) The model retrains on this biased data,
    reinforcing its existing predictions. Over iterations, the model increasingly recommends a narrowing
    set of content, creating a ''filter bubble.'' Content that was never shown appears to have zero engagement
    — not because users dislike it, but because they never saw it. This is difficult to detect because
    all standard metrics improve: click-through rate goes up (the model gets better at predicting engagement
    on the content IT chose), user session time may increase (engaging content is addictive), and training
    loss decreases. Only diversity metrics and long-term user satisfaction reveal the problem — users
    eventually churn because their feed becomes monotonous.'
  common_mistake: Using model accuracy on collected data as a health metric. The model trained on its
    own biased outputs will always look accurate on that data — it is circular self-validation.
  napkin_math: 'Month 1: 10K content items recommended. Month 6: top 500 items get 90% of recommendations.
    Month 12: top 100 items dominate. Standard metrics (CTR) improve while diversity collapses.'
