title: Stateful LLM Serving Fault Tolerance
scenario: 'You are designing the serving architecture for a multi-turn LLM agent using an 8x H100 GPU
  cluster. The application supports context windows up to 128k tokens, leading to KV caches of up to 4GB
  per active session. To handle node failures, you must evaluate three fault-tolerance strategies: 1)
  Stateless fallback (recomputing the entire prompt upon failover), 2) Local stateful serving with synchronous
  KV cache checkpointing to NVMe, and 3) Asynchronous replication to a dedicated CPU-memory tier over
  400Gbps InfiniBand. Compare these approaches in terms of P99 recovery latency and operational overhead.
  Justify your final architectural decision.'
question: "Which fault-tolerance strategy should you use for 4GB KV caches and 128k-token sessions, and how does it affect P99 recovery latency?"
details:
  realistic_solution: Implement asynchronous replication to a dedicated CPU-memory tier. A 4GB KV cache
    can be fetched over 400Gbps IB in milliseconds, whereas recomputing 128k tokens on an H100 takes seconds.
    This decouples compute from state while strictly minimizing recovery time.
  common_mistake: Candidates often choose stateless fallback to simplify the architecture, ignoring that
    recomputing a 128k token context causes massive P99 latency spikes during failover, severely degrading
    the interactive user experience.
  napkin_math: 'Compute recovery: 128k tokens / 50k tokens/sec (prefill rate) = ~2.56s TTFT. Network fetch
    recovery: 4GB / (400Gbps / 8) = 4GB / 50GB/s = 0.08s (80ms). Network fetch is 32x faster than recomputing
    the context.'
