title: FlashAttention-2 vs Standard Attention: Wall-Clock Speedup
scenario: You benchmark standard PyTorch attention vs FlashAttention-2 on an MI300X for a 7B model with seq_len=8192, batch_size=4, 32 heads, head_dim=128. Standard attention takes 85ms for the forward pass.
question: Using IO-complexity reduction, what FlashAttention-2 speedup should you expect over the 85 ms standard attention forward pass?
details:
  realistic_solution: Standard attention is memory-bandwidth bound: it must write and read the N×N attention matrix from HBM. FlashAttention-2 reduces HBM traffic to O(N×d), making the kernel compute-bound rather than memory-bound. Empirical speedup on MI300X is 3-5× for seq_len=8192 in the forward pass.
  common_mistake: |
    **The Pitfall:** Expecting the speedup to equal the theoretical IO reduction ratio exactly.
    **The Rationale:** Candidates often overlook that while IO drops dramatically, the kernel becomes compute-bound and is still subject to SM utilization limits.
    **The Consequence:** Overestimating the wall-clock speedup and miscalculating total inference or training latency.
  napkin_math: |
    - **Standard HBM traffic**: ~2 * N² * num_heads * batch * 2 bytes = 2 * 8192² * 32 * 4 * 2 = 34.4 GB.
    - **FlashAttention traffic**: ~4 * N * d * num_heads * batch * 2 = 4 * 8192 * 128 * 32 * 4 * 2 = 1.07 GB.
    - **IO reduction ratio**: 34.4 GB / 1.07 GB = ~32x.
    - **Minimum IO time (Standard)**: 34.4 GB / 5.3 TB/s = 6.5 ms.
    - **Actual standard time**: 85 ms (7.6% IO efficiency due to overheads).
    - **FlashAttention Expected**: Achieves ~70% compute utilization, expected time 17-25 ms.
    - **Conclusion**: **Expect a 3.4x to 5x speedup over standard attention.**
