title: 'FlashAttention-2 vs Standard Attention: Wall-Clock Speedup'
scenario: You benchmark standard PyTorch attention (torch.nn.functional.scaled_dot_product_attention
  without flash backend) vs FlashAttention-2 on an MI300X for a 7B model with seq_len=8192,
  batch_size=4, 32 heads, head_dim=128. Standard attention takes 85ms for the forward
  pass. Estimate the FlashAttention-2 speedup using the IO-complexity reduction.
question: Using IO-complexity reduction, what FlashAttention-2 speedup should you
  expect over the 85 ms standard attention forward pass?
details:
  realistic_solution: 'Standard attention is memory-bandwidth bound: it must write
    and read the N×N attention matrix from HBM. HBM traffic ≈ 2×N² × num_heads × batch
    × 2 bytes = 2 × 8192² × 32 × 4 × 2 = 34.4 GB. At MI300X''s 5.3 TB/s: minimum time
    = 34.4 GB / 5.3 TB/s = 6.5ms just for the attention matrix IO. But standard attention
    also materializes intermediate tensors, has kernel launch overhead, and poor cache
    behavior, explaining the 85ms total. FlashAttention-2 reduces HBM traffic to O(N×d):
    ~4 × N × d × num_heads × batch × 2 = 4 × 8192 × 128 × 32 × 4 × 2 = 1.07 GB. This
    makes the kernel compute-bound rather than memory-bound. Empirical speedup on
    MI300X: 3-5× for seq_len=8192 in forward pass. Expected time: 85ms / 4 ≈ 21ms.
    Published benchmarks show FlashAttention-2 achieves ~70% of peak TFLOPS on MI300X
    for these dimensions.'
  common_mistake: Expecting the speedup to equal the theoretical IO reduction ratio.
    In practice, FlashAttention-2 also benefits from better SM utilization (reduced
    thread divergence, warp-level parallelism) but is partially offset by the extra
    recomputation in the backward pass.
  napkin_math: 'Standard HBM traffic: ~34.4 GB for attention matrices. FlashAttention:
    ~1.07 GB. IO reduction: 32×. But not purely IO-bound: standard at 85ms vs min
    IO time of 6.5ms → 7.6% IO efficiency. FlashAttention achieves ~70% compute utilization.
    Expected: 17-25ms. Speedup: 3.4-5×.'
