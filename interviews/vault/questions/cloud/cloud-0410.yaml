title: The Interconnect Latency Ladder (cloud-0410)
scenario: You are designing the networking topology for a machine learning server.
question: For two H100 GPUs within the same physical server, which communication bus provides the lowest latency for a direct peer-to-peer data transfer?
details:
  realistic_solution: NVLink 4.0 is the correct answer. It is a specialized, high-bandwidth, low-latency interconnect designed specifically for linking GPUs within a single server node. At ~500 ns, its latency is roughly 2x lower than PCIe Gen5 (~1,000 ns) and 10x lower than InfiniBand NDR for cross-rack communication (~5,000 ns).
  common_mistake: |
    **The Pitfall:** Confusing the roles of inter-node versus intra-node interconnects.
    **The Rationale:** Engineers default to InfiniBand for everything because it's heavily marketed for clusters, or PCIe because it's ubiquitous.
    **The Consequence:** They fail to utilize dedicated high-speed, low-latency GPU-to-GPU links, leading to sub-optimal training topologies.
  napkin_math: |
    - **1. NVLink 4.0 (intra-node):** ~500 ns latency.
    - **2. PCIe Gen5 (intra-node):** ~1,000 ns latency.
    - **3. InfiniBand NDR (cross-rack):** ~5,000 ns latency.
    - **Conclusion:** NVLink provides the lowest latency, establishing a direct hardware path roughly 2x faster than PCIe and 10x faster than InfiniBand.
  options:
  - PCIe Gen5
  - InfiniBand NDR
  - NVLink 4.0
  - HBM3
  correct_index: 2
