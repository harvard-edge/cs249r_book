title: The Interconnect Latency Ladder (cloud-0410)
scenario: For two H100 GPUs within the same physical server, which communication bus provides the lowest
  latency for a direct peer-to-peer data transfer?
question: "For two H100 GPUs within the same physical server, which communication bus provides the lowest latency for a direct peer-to-peer data transfer?"
details:
  realistic_solution: NVLink 4.0 is the correct answer. It is a specialized, high-bandwidth, low-latency
    interconnect designed specifically for linking GPUs within a single server node. At ~500 ns, its latency
    is roughly 2x lower than PCIe Gen5 (~1,000 ns) and 10x lower than InfiniBand NDR for cross-rack communication
    (~5,000 ns).
  common_mistake: Engineers often confuse the roles of different interconnects. They might incorrectly
    choose InfiniBand, which is designed for *inter-server* (rack-scale) communication, not *intra-server*
    communication. Others might default to PCIe, not realizing that specialized buses like NVLink exist
    for direct, high-speed GPU-to-GPU links.
  napkin_math: 'Using the ''human time'' analogy where 1 ns is 1 second:

    1. **NVLink 4.0 (intra-node):** ~500 ns = 500 seconds (~8 mins).

    2. **PCIe Gen5 (intra-node):** ~1,000 ns = 1,000 seconds (~16 mins).

    3. **InfiniBand (cross-rack):** ~5,000 ns = 5,000 seconds (~1.4 hrs).

    NVLink provides the lowest latency (~500 ns) because it establishes a direct hardware path between
    GPUs on the baseboard.'
  options:
  - PCIe Gen5
  - InfiniBand NDR
  - NVLink 4.0
  - HBM3
  correct_index: 2
