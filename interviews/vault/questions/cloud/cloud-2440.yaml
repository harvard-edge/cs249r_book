title: Continuous Batching Arithmetic Shift
scenario: An API serves a 15B parameter LLM (FP16, 30GB weights) on an L40S GPU (864 GB/s HBM, 362 TFLOPS).
  With a static batch size of 2, decoding latency is 35ms per token. They upgrade to continuous batching,
  increasing average batch size to 16. A PM is concerned that processing 16 tokens simultaneously will
  increase the per-token generation latency to roughly 280ms (8x longer), violating SLA.
question: "Will continuous batching from batch size 2 to 16 raise per-token latency to 280ms, and why?"
details:
  realistic_solution: At batch size 2, the arithmetic intensity is extremely low, and the L40S is entirely
    bottlenecked by the time it takes to read the 30GB of weights from HBM. The massive 362 TFLOPS ALUs
    are mostly idle. By increasing the batch size to 16, the arithmetic intensity increases 8x. Because
    the workload remains in the memory-bound region of the roofline (below the ridge point), the time
    to read the weights stays exactly the same, but the ALUs process 16 tokens in that same window. Per-token
    latency remains nearly identical (~35ms), while system throughput increases 8x.
  common_mistake: Assuming latency scales linearly with batch size, fundamentally misunderstanding that
    low-batch LLM decoding is memory-bound.
  napkin_math: 'L40S Ridge Point = 362 TFLOPS / 864 GB/s = 418 FLOPs/Byte. BS=2 AI = (2 tokens * 30 GFLOPs)
    / 30 GB = 2 FLOPs/Byte. BS=16 AI = (16 * 30) / 30 = 16 FLOPs/Byte. Both AI values are ≪ 418, so attainable
    time is purely bounded by memory read: 30 GB / 864 GB/s = 34.7 ms. Latency remains ~35ms.'
