title: Continuous Batching Arithmetic Shift
scenario: An API serves a 15B parameter LLM. With a static batch size of 2, decoding latency is 35ms per token. They upgrade to continuous batching, increasing average batch size to 16. A PM is concerned that processing 16 tokens simultaneously will increase the per-token generation latency to roughly 280ms, violating SLA.
question: Will continuous batching from batch size 2 to 16 raise per-token latency to 280ms, and why?
details:
  realistic_solution: At batch size 2, the arithmetic intensity is extremely low, and the GPU is entirely bottlenecked by the time it takes to read the 30GB of weights from HBM. The massive ALUs are mostly idle. By increasing the batch size to 16, the arithmetic intensity increases 8x. Because the workload remains in the memory-bound region of the roofline (below the ridge point), the time to read the weights stays exactly the same, but the ALUs process 16 tokens in that same window. Per-token latency remains nearly identical (~35ms), while system throughput increases 8x.
  common_mistake: |
    **The Pitfall:** Assuming decode latency scales linearly with batch size.
    **The Rationale:** Candidates misunderstand that auto-regressive decoding at low batch sizes is entirely memory-bound, not compute-bound.
    **The Consequence:** Incorrectly rejecting a throughput optimization under the false assumption that it will degrade latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 15B parameter LLM (FP16, 30GB weights).
       - Hardware: 864 GB/s HBM, 362 TFLOPS compute.
    2. **Calculations:**
       - GPU Ridge Point: 362 TFLOPS / 864 GB/s = 418 FLOPs/Byte.
       - Arithmetic Intensity (BS=2): (2 tokens × 30 GFLOPs) / 30 GB = 2 FLOPs/Byte.
       - Arithmetic Intensity (BS=16): (16 tokens × 30 GFLOPs) / 30 GB = 16 FLOPs/Byte.
       - Memory Bound Check: Both 2 ≪ 418 and 16 ≪ 418.
       - Time to Read Weights: 30 GB / 864 GB/s = 34.7 ms.
    3. **Conclusion & Interpretation:** **Since both batch sizes are deeply memory-bound, latency remains ~35ms while throughput increases 8x. Result: Memory-Bandwidth-Bound.**
