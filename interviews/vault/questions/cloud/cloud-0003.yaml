title: The KV-Cache Memory Bomb
scenario: You are planning the deployment for a 70-billion parameter LLM. A product requirement is to support very long context windows up to 128,000 tokens.
question: For a single user request with a full context window, what is the approximate VRAM required just to store the KV-cache?
details:
  realistic_solution: |
    The KV-cache for a single 128k-token request on Llama-70B (GQA with 8 KV heads) requires approximately ~42 GB of VRAM. This is a substantial fraction of a single 80 GB GPU — and that's before accounting for model weights (~140 GB in FP16).
  common_mistake: |
    **The Pitfall:** Considering only the model's weight memory.
    **The Rationale:** Candidates forget that the KV-cache's memory footprint scales linearly with sequence length and can easily surpass the weights.
    **The Consequence:** Massive under-provisioning of VRAM, leading to immediate OOM errors at runtime.
  napkin_math: |
    - Llama-70B specs: 80 layers, 8 KV heads (GQA), 128 head_dim, FP16 (2 bytes).
    - KV Cache = 2 * 80 layers * 8 heads * 128 dim * 128,000 tokens * 2 bytes.
    - 160 * 8 = 1,280.
    - 1,280 * 128 = 163,840.
    - 163,840 * 128,000 = 20,971,520,000.
    - 20,971,520,000 * 2 bytes = 41,943,040,000 bytes.
    - **The KV-cache requires ~42 GB of VRAM per request.**
  options:
  - ~42 GB
  - ~2.6 MB
  - ~335 GB
  - ~1.1 TB
  correct_index: 0
