title: Online Learning Staleness and Embedding Drift
scenario: 'Your recommendation model does online learning: embedding tables are updated every 10 minutes. The product team reports CTR dropping 15% during major events that last 30-60 minutes. The model updates within 10 minutes, but the degradation persists.'
question: 'Why is a 10-minute online embedding update cadence insufficient during 30-60 minute viral events despite the model updating on time?'
details:
  realistic_solution: 'New items appear with no historical embeddings (random/zero initialization). The model has no signal for new item IDs and systematically under-ranks them. Cold-start fallback: use content-based features (text/image embeddings) instead of learned ID embeddings. For viral items: trigger immediate retraining of that item''s embedding row when impression velocity exceeds a threshold.'
  common_mistake: |
    **The Pitfall:** Blaming network latency or feature pipeline delays for the CTR drop.
    **The Rationale:** Engineers assume that if the pipeline is running on time, the staleness must be an infrastructure bottleneck rather than an algorithmic cold-start problem.
    **The Consequence:** Investigating logging and streaming pipelines instead of implementing a necessary content-based embedding fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 new items created with 0 training examples.
    - 10-minute online update batch only includes items with ≥1 interaction.

    **Calculations:**
    - Cold items receive 0 impressions (0% recall).
    - Zero impressions -> 0 data -> 0 gradient updates.
    - CTR impact: 10k items * 0% recall * 15% impression share = 1.5% absolute CTR drop.

    **Conclusion & Interpretation:**
    - **Result: 1.5% absolute CTR drop (Exploration-Bound)**. The dead loop prevents cold items from entering the training data regardless of model update frequency.
