title: 'TCO Specification: Design Multi-Region Inference Cost Model'
scenario: 'Specify a multi-region inference deployment for a global LLM API (US-East: 40% traffic, EU-West:
  35%, Asia-Pac: 25%). Total demand: 500 req/s. H100 pricing: US $2.50/hr, EU $2.80/hr, APAC $3.00/hr.
  Latency SLO: P99 < 500ms from any region. Design the fleet allocation, calculate annual cost, and compare
  vs centralized US-East deployment with cross-region CDN caching.'
question: "How should you allocate H100 pods across US, EU, and APAC for 500 req/s, what is the annual cost, and why not centralize in US-East?"
details:
  realistic_solution: 'Multi-region fleet per region: US: 500*0.4=200 req/s. EU: 175 req/s. APAC: 125
    req/s. Per H100 pod: 10 req/s (LLaMA-13B). US pods: 20 pods = 160 H100s. EU: 18 pods = 144 H100s.
    APAC: 13 pods = 104 H100s. Annual cost: US: 160*$2.50*8760=$3.504M. EU: 144*$2.80*8760=$3.53M. APAC:
    104*$3.00*8760=$2.73M. Total: $9.76M. Centralized US-East: 500 req/s, 50 pods, 400 H100s. Cost: $8.76M.
    Savings: $1M/yr from centralization, BUT APAC latency: cross-Pacific RTT ≈ 150ms + 500ms SLO inference
    = 650ms > SLO. Multi-region required. GDPR mandates EU region.'
  common_mistake: Not accounting for data residency requirements (GDPR in EU) that may mandate EU-based
    inference regardless of cost, treating this as a pure optimization problem.
  napkin_math: 'Multi-region: (160*$2.50 + 144*$2.80 + 104*$3.00)*8760 = ($400+$403.2+$312)*8760 = $1115.2*8760
    = $9.77M/yr. US-only: 50 pods * 8 GPUs * $2.50 * 8760 = $8.76M/yr. Difference: $1.01M/yr for compliance
    + APAC SLO. Break-even if ''premium'' APAC customers pay 15% more: 500*0.25=125 APAC users, $3.00
    vs $2.50 rate → $0.50 surplus * 8760 * 104 H100s = $455K. Not enough to offset $1.01M premium. Multi-region
    is a compliance + SLO cost, not profit center. Accept $1M/yr for regulatory compliance.'
