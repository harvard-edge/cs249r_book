title: LoRA Rank Selection and Memory Budget
scenario: You need to fine-tune a 7B parameter base model using LoRA on a single H100 (80 GB).
question: What is the H100 memory budget for rank-16 LoRA fine-tuning of a 7B model versus full fine-tuning?
details:
  realistic_solution: 'Full fine-tune 7B (FP32): 7B × 4 bytes = 28 GB weights + 56 GB optimizer (Adam: 2 moments × 28 GB) + activations = ~120 GB — exceeds H100. LoRA rank-16: trainable params = 2 × rank × d_model × num_layers = 2 × 16 × 4096 × 32 = 4.19M params. Adapter memory: 4.19M × 4B = 16.8 MB weights + 33.6 MB optimizer. Frozen base (BF16): 7B × 2B = 14 GB. Total: ~14.05 GB — easily fits.'
  common_mistake: |
    **The Pitfall:** Calculating LoRA memory as just the adapter parameters.
    **The Rationale:** Engineers forget that the massive frozen base model weights must still reside in GPU memory alongside the optimizer states for the adapters.
    **The Consequence:** Severely underestimating memory requirements, leading to unexpected OOMs when the base model is loaded.
  napkin_math: |
    - LoRA trainable params: 2 matrices * rank 16 * 4096 dim * 32 layers = 4,194,304 (~4.19M params).
    - Adapter memory (FP32): 4.19M * 4 bytes = 16.8 MB.
    - Adapter optimizer states (Adam): 16.8 MB * 2 = 33.6 MB.
    - Base model memory (BF16 frozen): 7B * 2 bytes = 14 GB.
    - Activations (batch=4, seq=2048): ~2 GB.
    - **Conclusion: Total memory is 14 GB + 0.016 GB + 0.033 GB + 2 GB = ~16.1 GB, comfortably fitting on an 80 GB GPU.**
