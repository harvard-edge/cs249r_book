title: The Tensor Parallelism Scaling Trap
scenario: You are an ML Systems Engineer at a major cloud provider diagnosing a customer's scaling issue. They are training a large language model using 8-way tensor parallelism. Their job runs efficiently on a single DGX H100 server with 8 GPUs connected with an all-to-all NVLink fabric. To scale further, they try running the same job on two servers, each with 4 H100 GPUs connected via PCIe, linked together with InfiniBand NDR. They report that the two-node (8 GPU) performance is significantly worse than the single-node (8 GPU) performance.
question: Why is the two-server PCIe/InfiniBand setup slower than a single DGX H100 for 8-way tensor parallelism?
details:
  realistic_solution: The single DGX H100 server uses an NVLink 4.0 fabric to connect all 8 GPUs, providing 900 GB/s of all-to-all bandwidth. Tensor parallelism relies on this extremely high-speed link for collective communication primitives (like All-Reduce). In the two-node setup, any communication between GPUs on different servers must traverse the PCIe bus (~64 GB/s), the CPU, and the InfiniBand network (50 GB/s). The bottleneck becomes the ~50 GB/s InfiniBand link, which is over 18x slower than the 900 GB/s NVLink fabric. This massive communication overhead stalls the GPUs, leading to worse performance despite using the same total number of GPUs.
  common_mistake: |
    **The Pitfall:** Underestimating the massive bandwidth hierarchy gap between intra-node and inter-node networks.
    **The Rationale:** Engineers see "InfiniBand" and assume it's a perfectly fast network comparable to on-server interconnects, ignoring that for tightly coupled TP operations, the interconnect IS the computer.
    **The Consequence:** Customers incorrectly provision multi-node clusters for Tensor Parallelism, suffering catastrophic performance collapse and wasting millions in cloud compute spend.
  napkin_math: |
    - **Single Node (NVLink 4.0):** Provides 900 GB/s of all-to-all bandwidth.
    - **Two Node (InfiniBand NDR):** Provides 50 GB/s bandwidth.
    - **Bandwidth Gap:** 900 GB/s / 50 GB/s = **18× slower**.
    - **Result:** TP demands massive layer-wise synchronization. Forcing this over a link 18× slower completely bottlenecks the GPUs.
  options:
  - The software overhead from the distributed training framework is likely misconfigured, causing synchronization delays.
  - The PCIe bus within each 4-GPU server is saturated, as it cannot handle the traffic from 4 H100s simultaneously.
  - The all-to-all communication required by tensor parallelism is now bottlenecked by the 50 GB/s InfiniBand network, which is over 18x slower than the 900 GB/s NVLink fabric in the single node.
  - InfiniBand uses RDMA, which has higher latency than on-server PCIe, introducing a critical delay.
  correct_index: 2
