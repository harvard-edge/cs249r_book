title: The Tensor Parallelism Scaling Trap
scenario: You are an ML Systems Engineer at a major cloud provider diagnosing a customer's scaling issue. They are training a large language model using 8-way tensor parallelism. Their job runs efficiently on a single DGX server with 8 GPUs connected with an all-to-all NVLink fabric. To scale further, they try running the same job on two servers, each with 4 GPUs connected via PCIe, linked together with InfiniBand NDR. They report that the two-node performance is significantly worse than the single-node performance.
question: Why is the two-server PCIe/InfiniBand setup slower than a single DGX for 8-way tensor parallelism?
details:
  realistic_solution: |
    The single DGX server uses an NVLink 4.0 fabric connecting all 8 GPUs at 900 GB/s. Tensor parallelism relies on this extremely high-speed link for frequent collective communication (All-Reduce) per layer. In the two-node setup, any communication between GPUs on different servers must traverse the InfiniBand network (50 GB/s). The bottleneck becomes the 50 GB/s InfiniBand link, drastically starving the GPUs.
  common_mistake: |
    **The Pitfall:** Underestimating the massive bandwidth hierarchy gap between intra-node and inter-node networks.
    **The Rationale:** Engineers see "InfiniBand" and assume it's a perfectly fast network comparable to on-server interconnects, ignoring that for tightly coupled TP operations, the interconnect IS the computer.
    **The Consequence:** Customers incorrectly provision multi-node clusters for Tensor Parallelism, suffering catastrophic performance collapse and wasting millions in cloud compute spend.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Single Node (NVLink 4.0): 900 GB/s all-to-all bandwidth.
       - Two Node (InfiniBand NDR): 50 GB/s bandwidth.
    2. **Calculations:**
       - Bandwidth Gap: 900 GB/s / 50 GB/s = 18x slower.
    3. **Conclusion & Interpretation:**
       - **Result: Network Bandwidth-Bound.** TP demands massive layer-wise synchronization. Forcing this over a link 18x slower completely bottlenecks the GPUs.
  options:
  - "The 64 GB/s PCIe bus is saturated, creating a 14x bottleneck compared to NVLink."
  - "The RDMA latency overhead of ~5 microseconds per hop exceeds the 100ms timeout."
  - "InfiniBand caps at 50 GB/s, creating an 18x bandwidth bottleneck compared to the 900 GB/s NVLink fabric."
  - "The 400 Gbps InfiniBand link provides 400 GB/s, leaving a 2.25x performance gap versus NVLink."
  correct_index: 2
