title: The Tensor Parallelism Scaling Trap
scenario: You are an ML Systems Engineer at a major cloud provider diagnosing a customer's scaling issue.
  They are training a large language model using 8-way tensor parallelism. Their job runs efficiently
  on a single DGX H100 server with 8 GPUs connected with an all-to-all NVLink fabric. To scale further,
  they try running the same job on two servers, each with 4 H100 GPUs connected via PCIe, linked together
  with InfiniBand NDR. They report that the two-node (8 GPU) performance is significantly *worse* than
  the single-node (8 GPU) performance. Using the provided hardware constants, diagnose the most likely
  cause of this performance degradation.
question: "Why is the two-server PCIe/InfiniBand setup slower than a single DGX H100 for 8-way tensor parallelism?"
details:
  realistic_solution: The single DGX H100 server uses an NVLink 4.0 fabric to connect all 8 GPUs, providing
    900 GB/s of all-to-all bandwidth. Tensor parallelism relies on this extremely high-speed link for
    collective communication primitives (like All-Reduce). In the two-node setup, any communication between
    GPUs on different servers must traverse the PCIe bus (~64 GB/s), the CPU, and the InfiniBand network
    (50 GB/s). The bottleneck becomes the ~50 GB/s InfiniBand link, which is over 18x slower than the
    900 GB/s NVLink fabric. This massive communication overhead stalls the GPUs, leading to worse performance
    despite using the same total number of GPUs.
  common_mistake: Engineers often underestimate the bandwidth hierarchy. They see 'InfiniBand' and think
    'fast network,' assuming it's comparable to on-server interconnects. They fail to quantify the >10x
    bandwidth gap between NVLink and even the best datacenter networks, not realizing that for tightly
    coupled operations like tensor parallelism, the interconnect *is* the computer.
  napkin_math: A single DGX H100 node provides 900 GB/s of all-to-all NVLink bandwidth. Tensor parallelism
    demands massive activation synchronizations per layer. Spanning TP across two nodes forces this traffic
    over InfiniBand (50 GB/s), slashing available bandwidth by 18x and creating a bottleneck.
  options:
  - The software overhead from the distributed training framework is likely misconfigured, causing synchronization
    delays.
  - The PCIe bus within each 4-GPU server is saturated, as it cannot handle the traffic from 4 H100s simultaneously.
  - The all-to-all communication required by tensor parallelism is now bottlenecked by the 50 GB/s InfiniBand
    network, which is over 18x slower than the 900 GB/s NVLink fabric in the single node.
  - InfiniBand uses RDMA, which has higher latency than on-server PCIe, introducing a critical delay.
  correct_index: 2
