title: A100 2:4 Structured Sparsity Memory Overhead
scenario: You are optimizing a Transformer model's linear layers for inference. A specific FP16 weight matrix has dimensions 8192 x 8192. To double the theoretical compute throughput using Sparse Tensor Cores, you apply 2:4 structured sparsity.
question: What is the compressed memory footprint of the 8192x8192 FP16 matrix under 2:4 sparsity, including metadata, and what are the exact memory savings?
details:
  realistic_solution: "Calculate the memory of the 50% non-zero FP16 elements, then add the 2-bit index metadata required per non-zero element to find the true compressed hardware size."
  common_mistake: |
    **The Pitfall:** Assuming 2:4 sparsity perfectly halves the memory footprint (a 50% reduction).
    **The Rationale:** Forgetting the hardware requirement for metadata indices.
    **The Consequence:** Underestimating the total VRAM required, potentially leading to OOMs when packing tight memory budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Matrix size: 8192 \times 8192 FP16.
       * 2:4 structured sparsity retains exactly 50% of the elements.
       * Hardware requirement: 2 bits of metadata required per non-zero element.
    2. **Calculations:**
       * Dense Matrix: 8192 \times 8192 = 67,108,864 elements (~67M).
       * Dense Size: 67,108,864 \times 2 Bytes = 134.2 MB.
       * Sparsity Elements: 50% = 33,554,432 elements = 67.1 MB.
       * Metadata Overhead: 33,554,432 \times 2 bits = 67,108,864 bits = 8.38 MB.
       * Total Compressed Memory: 67.1 MB + 8.38 MB = 75.48 MB.
       * True Savings: 134.2 MB - 75.48 MB = 58.72 MB.
    3. **Conclusion & Interpretation:**
       * Memory savings are ~43.7% (**75.48 MB footprint**), not the 50% often assumed, due to metadata overhead. **Result: Memory-Capacity-Bound (Metadata Overhead)**.
