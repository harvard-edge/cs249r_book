title: A100 2:4 Structured Sparsity Memory Overhead
scenario: You are optimizing a Transformer model's linear layers for inference on an NVIDIA A100 GPU.
  A specific FP16 weight matrix has dimensions 8192 x 8192. To double the theoretical compute throughput
  using Ampere's Sparse Tensor Cores, you apply 2:4 structured sparsity. Calculate the total memory footprint
  of the compressed weight matrix, accounting for the required metadata, and determine the exact memory
  savings compared to the dense FP16 baseline.
details:
  realistic_solution: Calculate the memory of the 50% non-zero FP16 elements, then add the 2-bit index
    metadata required per non-zero element to find the true compressed hardware size.
  common_mistake: Assuming 2:4 sparsity perfectly halves the memory footprint (50% reduction) by forgetting
    the 2-bit metadata index required for each preserved non-zero element.
  napkin_math: 'Dense matrix: 8192 × 8192 = 67,108,864 elements (~67M). Dense size: 67M * 2B (FP16) =
    134 MB. 2:4 Sparsity keeps 50%: ~33.5M elements = 67 MB. Metadata required: 2 bits per non-zero element
    = 33.5M * 2 bits = 67M bits ≈ 8 MB. Total compressed memory: 67 MB + 8 MB = 75 MB. True memory savings:
    134 MB - 75 MB = 59 MB (a ~44% reduction, not 50%).'
