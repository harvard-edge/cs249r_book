title: A100 2:4 Structured Sparsity Memory Overhead
scenario: You are optimizing a Transformer model's linear layers for inference on an NVIDIA A100 GPU. A specific FP16 weight matrix has dimensions 8192 x 8192. To double the theoretical compute throughput using Ampere's Sparse Tensor Cores, you apply 2:4 structured sparsity.
question: What is the compressed memory footprint of the 8192x8192 FP16 matrix under 2:4 sparsity, including metadata, and what are the exact memory savings?
details:
  realistic_solution: "Calculate the memory of the 50% non-zero FP16 elements, then add the 2-bit index metadata required per non-zero element to find the true compressed hardware size."
  common_mistake: |
    **The Pitfall:** Assuming 2:4 sparsity perfectly halves the memory footprint (a 50% reduction).
    **The Rationale:** Forgetting the hardware requirement for metadata indices.
    **The Consequence:** Underestimating the total VRAM required, potentially leading to OOMs when packing tight memory budgets.
  napkin_math: |
    *   **Dense Matrix:** 8192 × 8192 = 67,108,864 elements (~67M).
    *   **Dense Size:** 67M × 2 Bytes = 134.2 MB.
    *   **Sparsity Elements:** 2:4 sparsity keeps exactly 50% = 33.55M elements = 67.1 MB.
    *   **Metadata Overhead:** 2 bits required per non-zero element. 33.55M × 2 bits = 67.1M bits = 8.38 MB.
    *   **Total Compressed Memory:** 67.1 MB + 8.38 MB = **75.48 MB**.
    *   **True Savings:** 134.2 MB - 75.48 MB = 58.72 MB (a **~43.7% reduction**, not 50%).
