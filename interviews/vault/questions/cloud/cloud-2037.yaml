title: The Cascading Retry Storm
scenario: Your user-facing app calls an API gateway, which calls an orchestrator that sequentially queries
  an embedding service, a vector DB, and an LLM. Each layer (client, gateway, orchestrator) has a 30-second
  timeout and 3 retries. During a brief LLM latency spike (P99 goes from 2s to 15s), your entire system
  goes down for 20 minutes even though the LLM recovers after 3 minutes. What happened?
question: "What happened?"
details:
  realistic_solution: 'Cascading retry amplification. When the LLM slows down, the orchestrator retries
    the LLM call 3×. However, the client application and API gateway also have 30s timeouts and 3 retries.
    When the orchestrator blocks on the LLM, the API gateway times out and retries the *entire pipeline*,
    causing new requests to the embedding service, vector DB, and eventually the LLM. With 1000 QPS incoming,
    the nested retries generate up to 27× amplification (3 client × 3 gateway × 3 orchestrator) = 27,000
    QPS to the LLM. When the LLM recovers, it''s buried under the retry backlog. The fix: (1) implement
    circuit breakers, (2) use exponential backoff, (3) pass a distributed timeout budget (e.g., if client
    allows 5s, the orchestrator gives retrieval 500ms and LLM whatever time is left), (4) only retry at
    a single layer of the stack.'
  common_mistake: Assuming the system should recover as soon as the LLM recovers. 'If the downstream service
    is healthy, everything should be fine.'
  napkin_math: '1000 QPS × 3 client retries × 3 gateway retries × 3 orchestrator retries = 27,000 QPS
    worst case. LLM at 15s latency with 27K QPS: queue depth = 27,000 × 15 = 405,000 requests. At normal
    2000 QPS throughput, draining the backlog takes 405K / 2K = 202 seconds ≈ 3.4 minutes after recovery
    — if no new retries arrive.'
