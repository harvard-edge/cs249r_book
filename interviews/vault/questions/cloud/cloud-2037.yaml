title: The Cascading Retry Storm
scenario: Your user-facing app calls an API gateway, which calls an orchestrator that sequentially queries an embedding service, a vector DB, and an LLM. Each layer (client, gateway, orchestrator) has a 30-second timeout and 3 retries. During a brief LLM latency spike (P99 goes from 2s to 15s), your entire system goes down for 20 minutes even though the LLM recovers after 3 minutes. The system normally processes 1000 QPS and has a max throughput of 2000 QPS.
question: "Why did the system go down for 20 minutes when the LLM only spiked for 3 minutes?"
details:
  realistic_solution: 'Cascading retry amplification. When the LLM slows down, the orchestrator retries the LLM call 3×. However, the client application and API gateway also have 30s timeouts and 3 retries. When the orchestrator blocks on the LLM, the API gateway times out and retries the entire pipeline, causing new requests to the embedding service, vector DB, and eventually the LLM. With 1000 QPS incoming, the nested retries generate up to 27× amplification. When the LLM recovers, it''s buried under the retry backlog. The fix: (1) implement circuit breakers, (2) use exponential backoff, (3) pass a distributed timeout budget, (4) only retry at a single layer of the stack.'
  common_mistake: |
    **The Pitfall:** Assuming system recovery maps linearly to downstream component recovery.
    **The Rationale:** "If the downstream service is healthy, everything should be fine."
    **The Consequence:** Ignoring the massive queuing effect of amplified retries, leaving the system effectively down long after the root cause is resolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 QPS incoming, 2000 QPS max throughput, 15s spike, 3x3x3 retries.

    **Calculations:**
    - Amplification = 3 * 3 * 3 = 27x. Spike QPS = 27,000.
    - Queue buildup in 15s = 27,000 * 15 = 405,000 requests.
    - Recovery drain time = 405,000 / 2000 = 202.5s (~3.4 mins).

    **Conclusion & Interpretation:**
    - **Result: Queue-Bound.** Nested retries create a massive backlog that extends the outage long after the LLM recovers.
