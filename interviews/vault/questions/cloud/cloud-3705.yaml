title: Multi-Query vs Multi-Head Attention KV Cache Trade-off
scenario: A production LLM service runs a 70B model with 64 attention heads (head_dim=128) serving batch_size=32 at 4096 context. Standard MHA KV cache consumes 64 x 2 x 4096 x 128 x 2 bytes per layer x 80 layers.
question: How do MHA, MQA, and 8-group GQA compare in KV-cache memory and decode throughput for batch 32 at 4096 context on H100 80GB?
details:
  realistic_solution: 'MHA KV per layer = 2x64x4096x128x2 = 134MB. Total 80 layers = 10.7GB per sequence. Batch 32 = 343GB - far exceeds 80GB. MQA (1 KV head) = 2x1x4096x128x2x80 = 167MB per sequence, 5.3GB for batch 32. GQA-8 = 2x8x4096x128x2x80 = 1.3GB per sequence, 42GB for batch 32 - fits in 80GB. Decode bandwidth: MHA = 134MB/layer load; GQA-8 = 16.8MB/layer. GQA-8 achieves ~8x better decode bandwidth utilization vs MHA.'
  common_mistake: |
    **The Pitfall:** Forgetting that reducing KV heads also reduces memory bandwidth requirements.
    **The Rationale:** Candidates focus only on VRAM capacity savings and ignore the bandwidth bottleneck during decoding.
    **The Consequence:** They underestimate the decode throughput improvements of MQA and GQA architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model, 64 heads, dim=128, 80 layers, context=4096, batch=32.
       - H100 capacity: 80GB.
    2. **Calculations:**
       - MHA KV per Sequence: 2 * 64 * 4096 * 128 * 2B * 80 = 10.7 GB.
       - MHA Batch 32: 10.7 GB * 32 = 343 GB (exceeds 80GB).
       - GQA-8 KV per Sequence: 10.7 GB / 8 = 1.34 GB.
       - GQA-8 Batch 32: 1.34 GB * 32 = 42.9 GB.
    3. **Conclusion & Interpretation:**
       - **GQA-8 fits in VRAM and requires 8x fewer bytes loaded per token. Result: Memory-Bound mitigated.**
