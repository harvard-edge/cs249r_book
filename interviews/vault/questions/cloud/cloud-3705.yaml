title: Multi-Query vs Multi-Head Attention KV Cache Trade-off
scenario: A production LLM service runs a 70B model with 64 attention heads (head_dim=128) serving batch_size=32 at 4096 context. Standard MHA KV cache consumes 64 × 2 × 4096 × 128 × 2 bytes per layer × 80 layers.
question: How do MHA, MQA, and 8-group GQA compare in KV-cache memory and decode throughput for batch 32 at 4096 context on H100 80GB?
details:
  realistic_solution: 'MHA KV per layer = 2×64×4096×128×2 = 134MB. Total 80 layers = 10.7GB per sequence. Batch 32 = 341GB — far exceeds 80GB. MQA (1 KV head) = 2×1×4096×128×2×80 = 167MB per sequence, 5.3GB for batch 32. GQA-8 = 2×8×4096×128×2×80 = 1.3GB per sequence, 42GB for batch 32 — fits in 80GB. Decode bandwidth: MHA = 134MB/layer load; GQA-8 = 16.8MB/layer. GQA-8 achieves ~8× better decode bandwidth utilization vs MHA.'
  common_mistake: |
    **The Pitfall:** Forgetting that reducing KV heads also reduces memory bandwidth requirements.
    **The Rationale:** Candidates focus only on VRAM capacity savings and ignore the bandwidth bottleneck during decoding.
    **The Consequence:** They underestimate the decode throughput improvements of MQA and GQA architectures.
  napkin_math: |
    - **MHA KV per Sequence:** 2 * 64 * 4096 * 128 * 2B * 80 = 10.7 GB.
    - **MHA Batch 32:** 10.7 GB * 32 = 341 GB (exceeds 80GB VRAM).
    - **GQA-8 KV per Sequence:** Divide by 8 = 1.34 GB.
    - **GQA-8 Batch 32:** 1.34 GB * 32 = 42.9 GB (fits H100).
    - **Final Result:** **GQA-8 fits in VRAM and requires 8x fewer bytes loaded per token, heavily increasing decode throughput.**
