math_issues:
- Throughput calculation incorrectly assumes batch=16 per GPU across all 128 GPUs. With Tensor Parallelism
  (e.g., 8 GPUs per replica), throughput should be (128/8) * 16 * 3.5 / 0.084 = 10.6K tok/s, not 85K tok/s.
