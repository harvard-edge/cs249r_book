title: RDMA Latency Breakdown for a Single Write
scenario: Trace the end-to-end latency of a single 64-byte RDMA Write from GPU A's VRAM to GPU B's VRAM across two H100 nodes connected by a single 400Gbps InfiniBand switch.
question: What is the end-to-end latency breakdown for a 64-byte GPUDirect RDMA Write between two H100 nodes through one IB switch?
details:
  realistic_solution: 'End-to-end breakdown for 64-byte RDMA Write via GPUDirect RDMA: (1) Work Request posting: CPU writes WQE to send queue via MMIO doorbell -> 200ns. (2) HCA fetches WQE from host memory via DMA -> 100ns. (3) HCA initiates PCIe read from GPU VRAM: PCIe Gen5 read request -> 300ns (round-trip for 64B read with TLP). (4) HCA packetizes: adds IB headers (42 bytes for IB, ~80 for RoCE) -> 50ns. (5) Link serialization: 106 bytes (64 payload + 42 header) / 50 GB/s = 2.12ns. (6) Switch forwarding: cut-through latency = ~90ns (Quantum-2 IB switch port-to-port). (7) Link serialization (switch to remote HCA): 2.12ns. (8) Remote HCA receives and processes: strips headers, validates ICRC -> 100ns. (9) Remote HCA writes to remote GPU VRAM via PCIe: 300ns (PCIe write). (10) Remote HCA generates CQE on local CQ -> 50ns (optional, for signaled completions). Total: 200 + 100 + 300 + 50 + 2 + 90 + 2 + 100 + 300 + 50 = 1,194ns \u2248 1.2\u03bcs. Measured InfiniBand Write latency for 64 bytes: ~1.3\u03bcs (close to our estimate). The wire itself (items 5-7) accounts for only 94ns = 7.9% of total latency. PCIe operations (items 3, 9) account for 600ns = 50%.'
  common_mistake: |
    **The Pitfall:** Lumping everything into a generic "network latency" bucket (e.g., ~5\u03bcs).
    **The Rationale:** Engineers assume the wire and switch are the primary contributors to latency.
    **The Consequence:** The breakdown reveals that PCIe and DMA setup dominate for small messages, which explains why RDMA latency doesn't improve linearly with faster link speeds.
  napkin_math: |
    - **1. CPU Work Request:** CPU writes WQE to send queue via MMIO = 200 ns.
    - **2. HCA DMA:** HCA fetches WQE from host memory = 100 ns.
    - **3. PCIe Read:** HCA initiates PCIe Gen5 read from GPU VRAM = 300 ns.
    - **4. Packetization:** HCA adds IB headers = 50 ns.
    - **5. Link Serialization (Send):** 106 bytes / 50 GB/s = 2.12 ns.
    - **6. Switch Forwarding:** Cut-through latency = ~90 ns.
    - **7. Link Serialization (Recv):** = 2.12 ns.
    - **8. Remote HCA Processing:** Strips headers, validates ICRC = 100 ns.
    - **9. Remote PCIe Write:** Remote HCA writes to remote GPU VRAM = 300 ns.
    - **10. Remote CQE:** Generates completion = 50 ns.
    - **Total:** 200 + 100 + 300 + 50 + 2 + 90 + 2 + 100 + 300 + 50 = **1,194 ns (~1.2 \u03bcs)**.
    - **Conclusion:** PCIe operations (600ns) account for **50%** of the latency, while the wire/switch accounts for only **~8%**.
