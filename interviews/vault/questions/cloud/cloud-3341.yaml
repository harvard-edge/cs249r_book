title: Energy-Aware MoE Inference on AMD MI300X
scenario: You are tasked with deploying a large, sparse Mixture-of-Experts (MoE) model for real-time inference on an AMD MI300X GPU. The model has 192 GB of parameters. Your objective is to maximize inference throughput while staying within a critical power envelope.
question: How would you design an MI300X MoE inference pipeline to maximize throughput within a power envelope using energy-aware operator selection?
details:
  realistic_solution: 'A realistic solution would involve a detailed analysis of the MoE model''s operations, mapping them to the MI300X''s architecture with an emphasis on energy. This includes: (1) Profiling and Characterization: Identifying memory-bound versus compute-bound kernels using AMD rocprof. (2) Applying Horowitz Energy Table Principles: Recognizing that off-chip memory access (HBM3) is orders of magnitude more energy-intensive than on-chip compute. (3) Energy-Aware Operator Selection: Leveraging specialized sparse operators. (4) Batching and Pipelining: Strategically batching inference requests to amortize memory access costs. (5) Data Movement Optimization: Optimizing data packing for inference to further reduce the volume of HBM3 traffic.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on FLOPs optimization while ignoring the disproportionately higher energy cost of HBM3 memory access.
    **The Rationale:** Candidates often assume compute is always the bottleneck and fail to articulate how different operators (e.g., dense matrix multiply vs. sparse expert routing) have varying energy profiles.
    **The Consequence:** Designing pipelines that are highly inefficient from a power perspective, leading to power throttling and reduced throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Peak FP16 compute = 1,307 TFLOPS. HBM3 memory bandwidth = 5.3 TB/s.
       - Energy Costs: On-chip FP16 FMA = ~1.5 pJ/FLOP. HBM3 transfer = ~15 pJ/byte.
    2. **Calculations:**
       - Example Operation: 100 TFLOPs compute, 100 TB transfer.
       - Compute Energy: 100e12 FLOPs * 1.5 pJ/FLOP = 150 Joules.
       - Memory Energy: 100e12 bytes * 15 pJ/byte = 1,500 Joules.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Energy Bound.** Memory access is an order of magnitude more energy-intensive than computation, requiring strict operator selection to minimize HBM3 traffic.
