title: Energy-Aware MoE Inference on AMD MI300X
scenario: You are tasked with deploying a large, sparse Mixture-of-Experts (MoE) model for real-time inference on an AMD MI300X GPU. The model has 192 GB of parameters (fitting entirely within the HBM3). Your objective is to maximize inference throughput while staying within a critical power envelope. Explain how you would design the inference pipeline, specifically considering the energy cost of memory access versus compute operations.
question: How would you design an MI300X MoE inference pipeline to maximize throughput within a power envelope using energy-aware operator selection?
details:
  realistic_solution: 'A realistic solution would involve a detailed analysis of the MoE model''s operations, mapping them to the MI300X''s architecture with an emphasis on energy. This includes: (1) Profiling and Characterization: Identifying memory-bound versus compute-bound kernels within the MoE layers. (2) Applying Horowitz Energy Table Principles: Recognizing that off-chip memory access (HBM3) is orders of magnitude more energy-intensive than on-chip compute. (3) Energy-Aware Operator Selection: Leveraging specialized sparse operators provided by the MI300X when appropriate. (4) Batching and Pipelining: Strategically batching inference requests to amortize memory access costs. (5) Data Movement Optimization: Optimizing data packing for inference to further reduce the volume of HBM3 traffic.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on FLOPs optimization while ignoring the disproportionately higher energy cost of HBM3 memory access.
    **The Rationale:** Candidates often assume compute is always the bottleneck and fail to articulate how different operators (e.g., dense matrix multiply vs. sparse expert routing) have varying energy profiles.
    **The Consequence:** Designing pipelines that are highly inefficient from a power perspective, leading to power throttling and reduced throughput.
  napkin_math: |
    - **Hardware Specs:** Peak FP16 dense compute = 1,307 TFLOPS. HBM3 memory bandwidth = 5.3 TB/s.
    - **Energy Costs:** Energy per FP16 FMA (on-chip compute) = **~1.5 pJ**. Energy per byte transferred from HBM3 = **~15 pJ**.
    - **Example Operation:** An MoE layer requiring 100 TFLOPs and 100 TB of data transfer.
    - **Compute Energy:** 100 × 10^12 FLOPs × 1.5 pJ/FLOP = **150 Joules**.
    - **Memory Energy:** 100 × 10^12 bytes × 15 pJ/byte = **1,500 Joules**.
    - **Conclusion:** Memory access is an order of magnitude more energy-intensive than computation on the MI300X.
