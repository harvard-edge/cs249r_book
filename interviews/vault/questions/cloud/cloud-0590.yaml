title: The Catastrophic Quantization Failure
scenario: You are the tech lead for the team that serves your company's flagship recommendation model,
  a 20-billion parameter Deep Learning Recommendation Model (DLRM). Offline, it achieves a stellar 0.85
  AUC. The business is pushing for a fleet-wide rollout, but the cost is prohibitive. Running on H100s
  in FP16, the model requires a massive fleet to meet the 1,000,000 QPS SLA. A junior engineer, tasked
  with cutting costs, used a standard post-training quantization (PTQ) toolkit to convert the entire model
  to INT8. The model's size halved as expected, but during the A/B test, its AUC collapsed to 0.50—equivalent
  to random guessing—and serving logs are filled with garbage outputs. The junior engineer insists the
  calibration dataset was perfect and representative. As the architect, you are brought in to save the
  rollout. Propose a new quantization strategy to meet the aggressive cost-reduction targets without catastrophic
  accuracy loss. What is the most likely root cause of the failure, and how would you design the experiment
  to prove it?
details:
  realistic_solution: The catastrophic failure to 0.5 AUC points to a numerical overflow in a critical
    part of the network. INT8 can only represent values from -128 to 127. Many neural networks, especially
    those with wide MLPs or certain activation functions (GeLU, Swish), can produce activation values
    with a very large dynamic range. A few extreme outliers (e.g., values in the thousands) will force
    the quantization scale factor to be tiny, crushing the entire useful range of 'normal' activations
    into just a few integer values, effectively zeroing them out and destroying all information flow.
  common_mistake: The most common suggestion is 'We need better calibration data' or 'We must retrain
    with Quantization-Aware Training (QAT)'. While QAT is a powerful tool, it's a heavyweight solution
    that requires a full training pipeline and immense compute. A senior engineer first diagnoses *why*
    Post-Training Quantization (PTQ) failed. The calibration data is rarely the sole culprit when failure
    is this total; the problem is more fundamental to the model's architecture and the physics of INT8.
  napkin_math: Assume the 20B DLRM is memory-bound on H100s. The primary bottleneck is loading the 40GB
    of FP16 weights from HBM.
