title: The Earnings Call Meltdown
scenario: You are the Staff ML Systems Engineer at a fintech company that provides real-time transcription for Wall Street earnings calls. The product promise is a live, streaming transcript with a P99 Time-To-First-Token (TTFT) under 500ms.
question: Why does processing one transcription request at a time miss the 500ms P99 TTFT SLO, and what batching architecture fixes it?
details:
  realistic_solution: The current architecture of processing one request at a time is a classic Head-of-Line Blocking problem. The system's service rate is fixed by the time it takes to process one full request. When the arrival rate of requests exceeds this service rate, a queue builds up infinitely (in theory). A new request might have to wait for 19 other requests to complete their *entire* generation sequence, which can take many seconds each.
  common_mistake: |
    **The Pitfall:** Blaming the model or the GPU speed and suggesting faster hardware or smaller models.
    **The Rationale:** The system isn't slow because the GPU is slow; it's slow because it's idle, waiting for a serialized, request-level lock to be released. This is a systems and queueing failure.
    **The Consequence:** Scaling up to more expensive GPUs without fixing the underlying Head-of-Line Blocking issue, continuing to miss SLAs.
  napkin_math: |
    - Assume a 70B model on H100 (140 GB weights, 3.35 TB/s bandwidth).
    - Decode latency per token = 140 GB / 3.35 TB/s = 41.8 ms/token.
    - Prefill time for 100-token prompt: 14 TFLOPs / 989 TFLOPS = 14.2 ms.
    - Sequential processing time for 100 output tokens: 14.2 ms + (100 * 41.8 ms) ≈ 4.2 seconds.
    - Worst-case wait with 19 queued requests = 19 * 4.2s = 79.8 seconds (>> 500 ms SLO).
    - Continuous batching (batch size 20): all requests decode in parallel.
    - Wait time = 1 decode step + prefill = 41.8 ms + 14.2 ms ≈ 56 ms.
    - **Continuous batching reduces TTFT from 79.8 seconds to ~56 ms by eliminating head-of-line blocking.**
