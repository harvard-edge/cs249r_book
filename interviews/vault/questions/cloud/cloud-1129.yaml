title: Diagnosing Low Tensor Core Utilization in Cloud MLPs
scenario: You are profiling a multi-layer perceptron (MLP) recommendation model on an NVIDIA A100 GPU (40GB SXM). The MLP consists of dense linear layers where the hidden dimensions are heavily customized for specific feature embeddings, resulting in matrix sizes like 1037 x 511. Despite using FP16 and having sufficient batch sizes, the profiler reports that Tensor Core utilization is below 20%, and the workload is completely compute-bound on standard CUDA cores.
question: Why is this happening and how do you resolve it?
details:
  realistic_solution: Pad the matrix dimensions to be multiples of 8 or 16. For A100 FP16, pad 1037 to 1040 and 511 to 512. This structural alignment allows cuBLAS to dispatch the dense matrix multiplications to the highly efficient Tensor Cores instead of falling back to slower CUDA cores.
  common_mistake: |
    **The Pitfall:** Assuming that just casting to FP16 automatically enables Tensor Cores.
    **The Rationale:** Frameworks like PyTorch use automatic mixed precision (AMP) which hides the underlying hardware requirements.
    **The Consequence:** Ignoring the strict structural hardware requirements for matrix dimensions (multiples of 8/16) leaves massive Tensor Core performance on the table.
  napkin_math: |
    - **Padding Size:** Padding an odd matrix dimension from (1037 × 511) to a multiple of 8 (1040 × 512).
    - **Original Elements:** 1037 × 511 = 529,907.
    - **Padded Elements:** 1040 × 512 = 532,480.
    - **Compute Overhead:** (532,480 / 529,907) - 1 = **0.49%** more FLOPs.
    - **Throughput Gain:** Utilizing A100's Tensor Cores unlocks 312 TFLOPS compared to ~78 TFLOPS for standard FP16 CUDA cores.
    - **Conclusion:** A 4x throughput gain easily justifies the trivial 0.49% padding waste.
