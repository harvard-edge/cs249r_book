title: Diagnosing Low Tensor Core Utilization in Cloud MLPs
scenario: You are profiling a multi-layer perceptron (MLP) recommendation model on a GPU. The MLP consists of dense linear layers where the hidden dimensions are heavily customized for specific feature embeddings, resulting in matrix sizes like 1037 x 511. Despite using FP16 and having sufficient batch sizes, the profiler reports that Tensor Core utilization is below 20%, and the workload is completely compute-bound on standard CUDA cores.
question: Why is this happening and how do you resolve it?
details:
  realistic_solution: Pad the matrix dimensions to be multiples of 8 or 16. This structural alignment allows cuBLAS to dispatch the dense matrix multiplications to the highly efficient Tensor Cores instead of falling back to slower standard CUDA cores.
  common_mistake: |
    **The Pitfall:** Assuming that casting to FP16 automatically enables Tensor Cores.
    **The Rationale:** Frameworks hide hardware requirements through automatic mixed precision (AMP).
    **The Consequence:** Ignoring strict matrix dimension constraints leaves massive Tensor Core performance unutilized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Matrix size: 1037 x 511.
       - Padding target: Multiples of 8.
    2. **Calculations:**
       - Padded size: 1040 x 512.
       - Elements diff: (532,480 / 529,907) - 1 = 0.49% more FLOPs.
       - Throughput diff: Tensor Cores (312 TFLOPS) vs CUDA Cores (78 TFLOPS).
    3. **Conclusion & Interpretation:**
       - **Result: A 4x throughput gain completely eclipses the trivial 0.49% padding overhead.**
