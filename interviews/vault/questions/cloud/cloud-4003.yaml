title: Multi-Tenant Scheduling Wall
scenario: A shared cluster runs training jobs and latency-sensitive inference. Cluster utilization is 92%. Training jobs use gang scheduling and reserve GPUs for hours. Inference P99 latency spikes during training job launches even though total GPU capacity looks sufficient.
question: Why does inference P99 spike in a 92% utilized shared GPU cluster when gang-scheduled training jobs launch?
details:
  realistic_solution: The binding wall is multi-tenant scheduling. At 92% utilization, small bursts and placement constraints can starve inference even if aggregate GPU count looks sufficient. Gang-scheduled training reserves blocks of GPUs and fragments capacity, so inference replicas cannot scale or be placed quickly enough.
  common_mistake: |
    **The Pitfall:** Reasoning only from total GPU count while ignoring scheduling dynamics.
    **The Rationale:** Candidates look at aggregate available capacity and assume requests can be served instantly.
    **The Consequence:** They fail to account for queueing, placement fragmentation, and priority isolation, leaving latency spikes undiagnosed.
  napkin_math: |
    - **Calculate total headroom:** At 92% utilization in a 1,000-GPU cluster, there are 80 GPUs available.
    - **Identify fragmentation:** Gang-scheduled training requires blocks of contiguous GPUs. This fragments the remaining capacity.
    - **Analyze queuing impact:** Because capacity is fragmented and locked for hours, inference replicas cannot scale or be placed quickly enough to handle bursts, causing latency to spike drastically as the queue grows.
