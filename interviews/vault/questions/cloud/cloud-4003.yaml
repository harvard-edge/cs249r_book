title: Multi-Tenant Scheduling Wall
scenario: A shared cluster runs training jobs and latency-sensitive inference. Cluster
  utilization is 92%. Training jobs use gang scheduling and reserve GPUs for hours.
  Inference P99 latency spikes during training job launches even though total GPU
  capacity looks sufficient. Diagnose the wall.
question: Why does inference P99 spike in a 92% utilized shared GPU cluster when gang-scheduled
  training jobs launch?
details:
  realistic_solution: The binding wall is multi-tenant scheduling. At 92% utilization,
    small bursts and placement constraints can starve inference even if aggregate
    GPU count looks sufficient. Gang-scheduled training reserves blocks of GPUs and
    fragments capacity, so inference replicas cannot scale or be placed quickly enough.
  common_mistake: Reasoning only from total GPU count and ignoring queueing, placement
    fragmentation, and priority isolation.
  napkin_math: At 92% utilization only 8% headroom remains. In a 1,000-GPU cluster
    that is 80 GPUs, but gang reservations and topology constraints can make that
    headroom unusable for inference.
