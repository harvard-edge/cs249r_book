title: Explaining Compound AI Pipeline Behavior to Non-Technical Stakeholders
scenario: 'Your H100 cluster runs a 5-stage compound AI pipeline: query rewrite → embedding → FAISS retrieval
  → reranker → LLM generation. A product manager asks why the system sometimes gives wrong answers even
  though each individual stage looks fine in isolation. The reranker scores show high-confidence results
  and the LLM produces fluent text, but factual errors slip through. Explain the compound failure mode
  clearly.'
question: "Why can the 5-stage agentic RAG pipeline give factual errors even when each stage’s metrics look healthy in isolation?"
details:
  realistic_solution: 'Use a concrete analogy: each stage has an accuracy rate. If retrieval recall is
    85% (misses 15% of relevant docs), reranker precision is 90%, and LLM grounding is 95%, the end-to-end
    accuracy is 0.85*0.90*0.95 = 72.7%. Even with each stage appearing healthy, the system fails on nearly
    1 in 4 queries. The fix requires either improving the weakest stage (retrieval at 85%) or adding a
    verification stage.'
  common_mistake: Explaining each stage's metrics independently without explaining how errors compose
    across stages. Stakeholders conclude 'everything is green so the system should work,' missing the
    multiplicative error compounding phenomenon.
  napkin_math: 'Stage accuracies: retrieval=0.85, reranker=0.90, LLM grounding=0.95. Compound: 0.85*0.90*0.95=0.727.
    To reach 90% end-to-end: need geometric mean per stage of 0.9^(1/3)=0.965. Improving retrieval from
    0.85 to 0.97 alone: 0.97*0.90*0.95=0.829. Need all three stages above 0.965 to hit 90% system accuracy.'
