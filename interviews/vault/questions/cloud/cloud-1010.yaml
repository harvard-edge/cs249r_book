title: RoCEv2 Fabric-Wide PFC Congestion Spreading
scenario: You are training a 175B parameter LLM on a 4,096-GPU cluster using A100s and ConnectX-6 200Gbps NICs connected over a 3-tier RoCEv2 fabric with 400Gbps spine links. To support lossless RDMA, Priority Flow Control (PFC) is enabled. During a large NCCL AllReduce phase, a transient many-to-one incast microburst occurs at a single Leaf switch. Within milliseconds, training throughput across the entire cluster drops to nearly zero. Telemetry shows a cascade of PFC pause frames propagating upstream to the Spine, freezing links that are completely uninvolved in the incast traffic.
question: What mechanisms drove the PFC pause storm, and how would DCQCN with lower ECN thresholds contain it?
details:
  realistic_solution: Implement DCQCN (Datacenter Quantized Congestion Notification). Tune the ECN marking threshold significantly lower than the PFC generation threshold. This ensures end-hosts throttle injection rates before switch buffers trigger PFC pause frames, containing congestion at the edge.
  common_mistake: |
    **The Pitfall:** Suggesting to increase switch buffer sizes or disable PFC outright.
    **The Rationale:** Candidates think larger buffers absorb the incast, or disabling PFC fixes the pause storm, without realizing it leads to catastrophic packet loss.
    **The Consequence:** Go-Back-N retransmissions that destroy RDMA performance, or delayed but inevitable pause storms.
  napkin_math: |
    - **Switch Buffer:** 32MB. Link: 400Gbps (50GB/s).
    - **Thresholds:** ECN threshold = 15MB. PFC threshold = 25MB. Delta = 10MB.
    - **Time between ECN mark and PFC trigger:** 10MB / 50GB/s = 200 us.
    - **Network RTT:** 2 us.
    - **Conclusion:** **Sender receives the Congestion Notification Packet (CNP) and has 100 RTTs to throttle before the switch triggers a PFC pause.**
