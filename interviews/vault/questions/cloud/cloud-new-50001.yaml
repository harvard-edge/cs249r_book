title: ONNX Runtime Execution Provider Selection for Multi-Accelerator Inference
scenario: You serve a vision model via ONNX Runtime in a heterogeneous cluster with H100s, MI300Xs, and
  TPU v5e pods. Each node type has a different ONNX RT execution provider (CUDA EP, MIGraphX EP, and a
  custom XLA bridge). Latency SLA is p99 < 25ms for a ResNet-50 batch of 32.
details:
  realistic_solution: ResNet-50 at 4.1 GFLOPs/image × 32 batch = 131.2 GFLOPs = 0.131 TFLOPs ≈ 0.256 TFLOPs
    accounting for the backward overhead in training context. Not 2.1 TFLOPs.
  common_mistake: Using a single ONNX graph export and expecting identical performance across all three
    providers. Graph optimizations (operator fusion, layout selection) differ per EP, and some ops may
    fall back to CPU silently.
  napkin_math: 'ResNet-50 inference batch=32: model FLOPs = 4.1 GFLOPs/image × 32 images = 131.2 GFLOPs
    = 0.131 TFLOPs (not 2.1 TFLOPs which is 16× too high). ResNet-50 is 4.1 GFLOPs per image at standard
    224×224.'
