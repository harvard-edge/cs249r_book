title: Arithmetic Intensity on the Energy Roofline
scenario: >-
  The energy roofline model uses arithmetic intensity (FLOPs/byte) on its x-axis to determine whether a workload's energy cost is dominated by computation or data movement.
question: >-
  Why does arithmetic intensity determine whether a workload's energy is dominated by FLOPs or data movement?
details:
  realistic_solution: 'Arithmetic intensity measures how many operations you perform per byte transferred from memory. On the energy roofline, low arithmetic intensity (left side) means most energy goes to data movement — each byte fetched from DRAM costs ~200x more energy than a single FLOP. High arithmetic intensity (right side) means the workload reuses data extensively, and energy is dominated by compute. The ''ridge point'' where these two regimes meet is hardware-specific: for an A100, DRAM access costs ~20 pJ/byte while an FP16 FLOP costs ~0.4 pJ, giving a ridge at ~50 FLOPs/byte. Below this, optimizing memory access patterns yields the biggest energy savings.'
  common_mistake: |
    **The Pitfall:** Confusing the performance roofline ridge point with the energy roofline ridge point.
    **The Rationale:** Candidates forget that energy costs per FLOP and per byte are fundamentally different from hardware throughput ratios.
    **The Consequence:** Optimizing for the wrong bottleneck when trying to minimize power consumption.
  napkin_math: |
    **Assumptions & Constraints:**
    - DRAM energy cost is ~20 pJ/byte.
    - FP16 FLOP energy cost is ~0.4 pJ.

    **Calculations:**
    - Ridge point = 20 pJ/byte / 0.4 pJ/FLOP = 50 FLOPs/byte.

    **Conclusion & Interpretation:**
    - **Result: 50 FLOPs/byte (Energy-Bound)**. Below this arithmetic intensity, the workload is overwhelmingly memory-energy-bound, making data locality the primary optimization target.
