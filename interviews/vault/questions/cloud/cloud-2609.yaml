title: Arithmetic Intensity on the Energy Roofline
scenario: Explain why arithmetic intensity (FLOPs/byte) is the x-axis of the energy roofline model and
  how it determines whether a workload's energy cost is dominated by computation or data movement.
details:
  realistic_solution: 'Arithmetic intensity measures how many operations you perform per byte transferred
    from memory. On the energy roofline, low arithmetic intensity (left side) means most energy goes to
    data movement — each byte fetched from DRAM costs ~200x more energy than a single FLOP. High arithmetic
    intensity (right side) means the workload reuses data extensively, and energy is dominated by compute.
    The ''ridge point'' where these two regimes meet is hardware-specific: for an A100, DRAM access costs
    ~20 pJ/byte while an FP16 FLOP costs ~0.4 pJ, giving a ridge at ~50 FLOPs/byte. Below this, optimizing
    memory access patterns yields the biggest energy savings.'
  common_mistake: Confusing the performance roofline ridge point with the energy roofline ridge point
    — they differ because energy costs per FLOP and per byte are different from throughput ratios.
  napkin_math: 'DRAM energy ~20 pJ/byte, FP16 FLOP ~0.4 pJ. Ridge point = 20/0.4 = 50 FLOPs/byte. Below
    50: memory-energy-bound.'
