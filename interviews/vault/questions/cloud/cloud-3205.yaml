title: MoE vs Dense Scaling Law Crossover
scenario: Your organization is evaluating whether to train a Dense or MoE model. Since
  MoE communication overhead can outweigh parameter scaling benefits below a certain
  scale, you need to model the baseline dense scaling curve up to GPT-4 scale. Using
  the empirical scaling law where loss is proportional to C^(-0.076), calculate the
  compute budget for a GPT-4 scale model and the expected loss reduction if you scale
  compute by 8×.
question: What is the estimated GPT-4-scale FLOP budget, and what is the exact loss
  reduction from scaling compute by 8×?
details:
  realistic_solution: 'GPT-4 compute ≈ 1.8×10^25 FLOPs (not 10^22). Loss reduction
    from 8× compute: 8^(-0.076) = 0.854 → 14.6% reduction (not 17%).'
  common_mistake: Assuming MoE is always better because it has more parameters. Below
    a certain scale, the communication overhead of MoE training outweighs the parameter
    scaling benefit.
  napkin_math: 'GPT-4 scale compute: ~1.8×10^25 FLOPs (not 1.8×10^22 which is GPT-3
    scale — off by 1000×). Loss reduction: scaling by 8× compute: loss ∝ C^(-0.076).
    8^(-0.076) = e^(-0.076×ln8) = e^(-0.076×2.079) = e^(-0.158) = 0.854. Reduction
    = 1 - 0.854 = 14.6% (not 17%).'
