title: Pure Functions Enable Composable Transforms
scenario: 'JAX imposes a functional programming paradigm requiring pure functions (no side effects, no in-place mutation) for its operations.'
question: Why does JAX require pure functions, and how does that enable transformations like vmap, jit, and grad?
details:
  realistic_solution: 'Pure functions guarantee that output depends only on input — no hidden state, no randomness, no mutation. This mathematical property enables: (1) jit — the compiler can safely cache and reuse compiled kernels because the function always produces the same output for the same input. (2) grad — automatic differentiation can trace through the function knowing there are no side effects that could invalidate the gradient tape. (3) vmap — the compiler can automatically vectorize a function over a batch dimension because each element is independent (no cross-element mutation). In PyTorch, nn.Module maintains mutable state (parameters, buffers, training flag), making these transforms harder — you cannot naively JIT compile a stateful module without handling its state carefully. JAX trades ergonomic mutability for composable, mathematically sound transformations.'
  common_mistake: |
    **The Pitfall:** Thinking pure functions are just a stylistic coding preference.
    **The Rationale:** PyTorch users are accustomed to stateful `nn.Module` classes and view pure functions as an unnecessary syntactic burden.
    **The Consequence:** They fail to understand that strict purity is the mathematical prerequisite enabling JAX's powerful, composable compiler transformations.
  napkin_math: |
    - **JAX composition:** `jit(grad(vmap(f)))`
    - **PyTorch equivalent:** Requires `torch.compile` + `torch.func.grad` + `torch.vmap` with highly manual and error-prone state management.
    - **Result: Because `f` is pure, JAX's 3 massive transformations compose perfectly without breaking state.**
