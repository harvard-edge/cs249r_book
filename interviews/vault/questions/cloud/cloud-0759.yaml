title: The NFS Checkpoint Corruption
scenario: 'You are training a 70B model on 256 GPUs. At step 80,000, a node fails. You restart from the step-79,000 checkpoint on NFS. The model loads without errors, but training loss immediately jumps to 11.0 and never recovers. The step-78,000 checkpoint works fine.'
question: 'What happened to the step-79,000 checkpoint?'
details:
  realistic_solution: |
    NFS has weak consistency guarantees under concurrent writes. During checkpointing, all 256 GPUs write their shards to NFS simultaneously. If two nodes' writes target overlapping NFS blocks, NFS's close-to-open consistency model means a reader may see a partially written file — some blocks from the new checkpoint, some from the previous one. The step-79,000 checkpoint is a Frankenstein: the first 60% of the optimizer state is from step 79,000, but the rest is stale data from step 78,000. The model loads because tensor shapes are correct, but Adam's momentum and variance estimates are mismatched, causing catastrophically wrong steps. Fix: (1) write checkpoints to a temporary path, then atomically rename; (2) compute and verify SHA-256 checksums of each shard; (3) use a two-phase commit with a `.complete` sentinel file.
  common_mistake: |
    **The Pitfall:** Dismissing the failure simply as a corrupted disk file and switching to a different backend without addressing the write semantics.
    **The Rationale:** Engineers assume standard POSIX file writes provide strong multi-writer consistency across distributed nodes, completely missing NFS's close-to-open consistency model vulnerabilities.
    **The Consequence:** Distributed checkpointing remains fundamentally unsafe; future failures will continue to silently corrupt optimizer states, wasting millions of dollars in compute on ruined training runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B params. Optimizer: ZeRO-3 (16 bytes/param).
    - Total Checkpoint Size: 1.12 TB.
    - NFS Aggregate Write Speed: ~64 GB/s (across 32 nodes).

    **Calculations:**
    - Total write time = 1,120 GB / 64 GB/s \u2248 17.5 seconds.
    - If a crash occurs at 14 seconds (80% complete), 20% of the state retains stale step-78,000 data.
    - Adam optimizer state mismatched: m_t from step 79,000, v_t from step 78,000.
    - Denominator in parameter update is wrong by 1,000 steps of variance.

    **Conclusion & Interpretation:**
    - **Result: Silent State Corruption (I/O-Bound)**. The non-atomic write allowed partial state overwrites. Implementing a two-phase commit with SHA-256 verification (which adds only ~17.5s overhead) is mandatory for distributed reliability.
