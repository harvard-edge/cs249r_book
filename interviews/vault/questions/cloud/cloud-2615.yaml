title: Federated Learning Break-Even Analysis
scenario: 'Centralized training costs $8K/month in GPU rental + $5K/month data ingestion (200TB). Federated
  approach: $2K/month aggregation server + $0.50/device/month for 500 devices + $1K/month WAN. At what
  data volume does federated become cheaper?'
details:
  realistic_solution: 'Centralized monthly cost: $8K GPU + $5K data ingestion = $13K (at 200TB). Federated
    monthly cost: $2K server + $250 devices (500 × $0.50) + $1K WAN = $3.25K. At 200TB, federated saves
    $9.75K/month. But centralized data ingestion scales linearly: at lower volumes, say 50TB, ingestion
    = $1.25K, total = $9.25K. Federated cost is fixed at $3.25K. Break-even: $8K + $0.025/GB × X = $3.25K.
    Since GPU cost ($8K) alone exceeds federated total ($3.25K), federated is cheaper at ALL data volumes
    in this scenario — the break-even is at negative data volume, meaning the cost advantage comes from
    eliminating GPU rental, not data transfer savings.'
  common_mistake: Assuming federated is always cheaper. If edge devices lack compute (requiring upgrades)
    or WAN costs are metered per-byte at scale, federated can be more expensive.
  napkin_math: 'Centralized: $8K + $5K = $13K. Federated: $2K + $0.25K + $1K = $3.25K. Federated is 4x
    cheaper because edge compute is free.'
