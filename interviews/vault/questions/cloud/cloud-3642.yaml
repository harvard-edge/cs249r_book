title: 'Load Balancing Strategy to Minimize P999 on TPU v5e'
scenario: 'You''re designing a load balancer for a TPU v5e (16GB HBM, 197 TFLOPS BF16) inference service running BERT-large at 50K RPS. Round-robin distribution gives P999=800ms. Analysis shows 0.1% of requests contain sequences >400 tokens (BERT max 512), causing disproportionate compute time.'
question: 'How should the BERT-large service route requests so the 0.1% long sequences stop driving P999 to 800ms?'
details:
  realistic_solution: |
    Implement cost-aware routing: classify requests into short (<=128 tokens), medium (129-256), long (257-512) at the load balancer using a lightweight tokenizer. Route to separate replica pools sized to their frequency (95% short, 4% medium, 1% long). Long-request pool has headroom for P999.
  common_mistake: |
    **The Pitfall:** Using least-connections load balancing without accounting for request cost heterogeneity.
    **The Rationale:** Candidates assume all requests cost the same, but a single long-sequence request consumes 16x the TPU cycles of a short one.
    **The Consequence:** The load balancer still routes massive jobs to arbitrarily "free" replicas, completely blocking the queue for subsequent short requests and ruining tail latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: BERT-large, Attention is O(n^2).
    - Traffic: 50K RPS, 0.1% are 512-token requests.
    - Hardware: TPU v5e (197 TFLOPS).

    **Calculations:**
    - Compute Scaling: A 512-token request takes (512/128)^2 = 16x the compute of a 128-token request.
    - Long Request Volume: 50,000 * 0.001 = 50 requests/sec.
    - Utilization Skew: 50 requests * 680 GFLOPS / 197 TFLOPS = ~17% TPU utilization.

    **Conclusion & Interpretation:**
    - **Result: 17% utilization skew (Compute-Bound)**. Just 0.1% of traffic consumes nearly 20% of compute capacity, causing extreme tail latency under round-robin.
