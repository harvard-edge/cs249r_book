title: The Roofline Across Precisions
scenario: 'Draw the roofline model for an H100 GPU at four precisions: FP32, FP16/BF16, FP8, and INT8.
  For each precision, calculate the ridge point. Then explain why a workload that is compute-bound at
  FP16 can become memory-bound at INT8 — even though INT8 is ''faster.'''
question: "Can you draw the H100 roofline at FP32, FP16/BF16, FP8, and INT8, compute each ridge point, and explain the FP16-to-INT8 bound shift?"
details:
  realistic_solution: Each precision has a different peak FLOPS (compute ceiling) and the same memory
    bandwidth (3.35 TB/s on H100). The ridge point — where a workload transitions from memory-bound to
    compute-bound — shifts right as precision drops because compute scales faster than bandwidth. A workload
    with fixed arithmetic intensity can cross from above the ridge point (compute-bound) to below it (memory-bound)
    when you switch to a lower precision with a higher ridge point.
  common_mistake: '"Lower precision always makes things faster because you do more operations per second."
    This ignores that quantization changes both the compute ceiling AND the arithmetic intensity of the
    workload.'
  napkin_math: 'H100 specs — FP32: 67 TFLOPS, BF16: 989 TFLOPS, FP8: 1,979 TFLOPS, INT8: 1,979 TOPS. Bandwidth:
    3.35 TB/s (constant). Ridge points: FP32 = 67T / 3.35T = **20 Ops/Byte**. BF16 = 989 / 3.35 = **295
    Ops/Byte**. FP8 = 1979 / 3.35 = **591 Ops/Byte**. INT8 = 1979 / 3.35 = **591 Ops/Byte**. Consider
    a large-batch GEMM with arithmetic intensity = 400 Ops/Byte. At BF16: 400 > 295 → **compute-bound**,
    attains 989 TFLOPS. At INT8: 400 < 591 → **memory-bound**, attains only 3.35T × 400 = 1,340 TOPS (not
    the 1,979 peak). The INT8 version is still faster (1,340 vs 989), but it''s now leaving 32% of INT8
    compute on the table. To fully utilize INT8, you need intensity > 591 — meaning larger batch sizes
    or fused operations.'
