title: LLM Data Ingestion with Sequential Streaming Formats
scenario: You are designing the data ingestion pipeline for training a 70B parameter LLM on a 1024-GPU
  H100 cluster. Your current pipeline uses 100 million individually compressed JSON files stored in Amazon
  S3, totaling 10TB of text data. During a test run, your GPU utilization hovers at 20% because the data
  loading workers are bottlenecked. Calculate the metadata overhead and throughput difference between
  fetching individual 100KB JSON files versus streaming 1GB sequential binary shards (like WebDataset
  or TFRecord).
details:
  realistic_solution: Repackaging the 100 million JSON files into 10,000 1GB sequentially readable shards
    to eliminate per-file GET request latency and maximize streaming bandwidth.
  common_mistake: Assuming network bandwidth is the bottleneck and trying to upgrade networking instead
    of fixing the small-file metadata and seek overhead.
  napkin_math: 'Individual files: 100M GETs * 50ms TTFB = 5,000,000 sec of latency penalty. Sharded 1GB
    files: 10,000 GETs * 50ms TTFB = 500 sec. Sequential reads saturate a 100Gbps NIC (~10GB/s), while
    100KB GETs bottleneck at ~20MB/s per thread.'
