title: Continuous Batching vs Static Batching Throughput on H100 for LLM Serving
scenario: An H100 serves Llama-2-70B with static batching (batch_size=8, max_tokens=2048). GPU utilization averages 40% because shorter requests (avg 500 tokens) leave slots idle waiting for the batch to complete.
question: How much throughput improvement should continuous batching provide over static batching for 2048-token slots with 500-token average requests?
details:
  realistic_solution: |
    Static batching: worst case is 2048 tokens for a batch where 7/8 requests finish at 500 tokens but wait for the longest. Wasted compute: 7 x (2048-500) x per_token_cost = 7 x 1548 x cost. Efficiency = 500/2048 = 24% for short requests. Continuous batching: as each request completes, a new request fills that slot immediately. Expected batch occupancy improves from 40% to ~85-95%. Throughput improvement: 2.1-2.4x. Additional benefit: P50 latency drops significantly (short requests no longer wait for long ones). Implementation cost: more complex scheduler, ~2-5% overhead.
  common_mistake: |
    **The Pitfall:** Assuming continuous batching guarantees a massive throughput boost for all workloads.
    **The Rationale:** Engineers deploy complex schedulers without profiling their request distribution. If sequence lengths are highly uniform, the batching efficiency is already high.
    **The Consequence:** Adding continuous batching to a uniform-length workload adds 5% scheduling overhead for absolutely zero throughput gain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Static batch size = 8, max_tokens = 2048.
    - Avg request length = 500 tokens.
    - Baseline GPU utilization = 40%.

    **Calculations:**
    - Static Efficiency: 500 tokens / 2048 max = 24% slot utilization.
    - Continuous Efficiency: Iteration-level scheduling achieves ~90% slot occupancy.
    - Theoretical Gain: (0.90 / 0.24) * (1 - 0.03 scheduling overhead) = 3.64x potential.

    **Conclusion & Interpretation:**
    - **Result: 2.0x to 2.4x throughput improvement (Utilization-Bound)**. Continuous batching natively resolves the stark underutilization of static slots during mixed-length inference.
