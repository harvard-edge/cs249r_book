title: The On-Node vs. Cross-Node Latency Jump
scenario: You're debugging a distributed training job and notice high communication overhead. To start, you want to sanity check your understanding of the network latencies.
question: Roughly how much slower is a cross-rack InfiniBand NDR transfer compared to a transfer between two GPUs on the same server using NVLink 4.0?
details:
  realistic_solution: A cross-rack InfiniBand transfer is about 10 times slower than an on-node NVLink transfer. NVLink is a highly optimized, short-distance electrical link between GPUs on the same physical board (~500 ns). InfiniBand has to send the signal out of the server, often over optical cables to a rack switch (and potentially another switch for cross-rack communication), which introduces significant latency from signal conversion and distance, resulting in a latency of ~5,000 ns (5 \u03bcs).
  common_mistake: |
    **The Pitfall:** Underestimating the "datacenter tax."
    **The Rationale:** Engineers assume that high-performance networks like InfiniBand are nearly as fast as on-server interconnects (e.g., only 2-3x slower).
    **The Consequence:** They fail to account for the discrete latency penalty of leaving the server motherboard, traversing optical cables, and hitting a switch, leading to poorly optimized distributed topologies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intra-node NVLink latency is ~500 ns.
    - Cross-rack InfiniBand NDR latency is ~5,000 ns.

    **Calculations:**
    - 5,000 ns / 500 ns = 10x slower.

    **Conclusion & Interpretation:**
    - **Result: 10x slower (Network-Bound)**. InfiniBand NDR is 10x slower than NVLink.
  options:
  - ~2x slower
  - ~10x slower
  - ~100x slower
  - ~1000x slower
  correct_index: 1
