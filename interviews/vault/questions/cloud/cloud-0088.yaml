title: The On-Node vs. Cross-Node Latency Jump
scenario: You're debugging a distributed training job and notice high communication overhead. To start,
  you want to sanity check your understanding of the network latencies. Roughly how much slower is a cross-rack
  InfiniBand NDR transfer compared to a transfer between two GPUs on the same H100 server using NVLink
  4.0?
question: "Roughly how much slower is a cross-rack InfiniBand NDR transfer compared to a transfer between two GPUs on the same H100 server using NVLink 4.0?"
details:
  realistic_solution: A cross-rack InfiniBand transfer is about 10 times slower than an on-node NVLink
    transfer. NVLink is a highly optimized, short-distance electrical link between GPUs on the same physical
    board (~500 ns). InfiniBand has to send the signal out of the server, often over optical cables to
    a rack switch (and potentially another switch for cross-rack communication), which introduces significant
    latency from signal conversion and distance, resulting in a latency of ~5,000 ns (5 µs).
  common_mistake: Engineers often underestimate the 'datacenter tax.' They assume that high-performance
    networks like InfiniBand are nearly as fast as on-server interconnects like NVLink, perhaps only 2-3x
    slower. They forget that leaving the server motherboard, traversing optical cables, and hitting a
    switch adds a significant and discrete latency penalty, even with RDMA.
  napkin_math: 'NVLink latency (intra-node) is approximately 0.5 µs. InfiniBand NDR latency (cross-rack, traversing NICs, fiber, and switch hops) is approximately 5 µs. 5 µs / 0.5 µs = 10x slower.'
  options:
  - Roughly the same, the main difference is bandwidth
  - ~2x slower
  - ~10x slower
  - ~100x slower
  correct_index: 2
