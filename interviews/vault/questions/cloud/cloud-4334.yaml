title: Embedding Dimension Selection and Capacity
scenario: You have a catalog of 100M items and must choose an embedding dimension for the item embedding table. The table must fit in 512 GB of GPU HBM across a cluster.
question: "What maximum item embedding dimension fits in 512 GB for 100M FP32 items, and what dimension would you choose using intrinsic dimensionality?"
details:
  realistic_solution: 'Storage: 100M items × dim × 4 bytes (FP32) = dim × 400 MB. At 512 GB: max dim = 512 GB / 400 MB = 1280. But in practice, use 20% headroom: 512 × 0.8 = 409.6 GB / 400 MB = 1024-dim would be the absolute max. Practical recommendation: 256-dim uses 100 GB (20% of cluster HBM). Capacity argument: for a catalog of N items, the minimum dimension needed to represent all pairwise relationships is O(log N) — the intrinsic dimensionality. For 100M items: log₂(100M) ≈ 27 dimensions would theoretically suffice for perfect orthogonal separation. In practice, embedding dimensions of 64-128 are sufficient for most recommendation tasks; going beyond 256 shows diminishing returns unless interaction features are extremely high-dimensional. Choice: 64-dim (uses 25 GB) is often optimal by the information-theoretic argument, leaving 487 GB for other model components.'
  common_mistake: |
    **The Pitfall:** Choosing the largest dimension that fits the hardware budget (e.g., 1024).
    **The Rationale:** Assuming embedding quality scales linearly with vector size.
    **The Consequence:** Wasting hundreds of gigabytes of HBM for literally zero performance gain, starving other model components.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Catalog: 100M items. Precision: FP32 (4 bytes).
       - Memory Budget: 512 GB HBM.
    2. **Calculations:**
       - Storage per dimension = 100M * 4 bytes = 400 MB.
       - Max Dimension (Hard Limit) = 512 GB / 400 MB = 1280.
       - Intrinsic Dimensionality = log2(100,000,000) ≈ 27 dimensions.
    3. **Conclusion & Interpretation:**
       - **Result: 64-128 Dimensions Optimal (Capacity-Bound).** While 1280 fits, anything beyond 64-128 provides zero representational capacity gain for 100M items while squandering expensive HBM.
