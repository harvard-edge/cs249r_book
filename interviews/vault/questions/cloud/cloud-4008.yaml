title: Incomplete Build Versus Rent Decision
scenario: A startup asks whether to buy 128 GPUs or rent cloud instances over a three-year
  planning horizon. They provide a purchase quote of $4 million and a cloud price
  of $3/GPU-hour, but omit utilization, financing, power, cooling, staffing, network/storage,
  depreciation period details, and expected demand volatility.
question: What missing information determines buy-versus-rent, and what break-even
  utilization formula can you derive from $4M and $3/GPU-hour?
details:
  realistic_solution: The break-even depends on utilization and all-in ownership cost.
    The simple lower-bound cloud-equivalent hours are $4M / $3 = 1.33M GPU-hours.
    Over 128 GPUs and three years, maximum available hours are 128 x 24 x 365 x 3
    = 3.36M GPU-hours, so raw hardware breaks even around 40% utilization before OpEx.
    Real break-even is higher once power, cooling, staffing, and demand risk are included.
  common_mistake: Comparing purchase price to cloud hourly rate without utilization
    and OpEx.
  napkin_math: Break-even raw hours = 4,000,000 / 3 = 1,333,333 GPU-h. Three-year
    capacity = 128 x 26,280 = 3,363,840 GPU-h. Utilization = 39.6% before OpEx.
