title: 'Dataset Curation: Optimize Deduplication Pipeline Scalability'
scenario: 'Your MinHash deduplication pipeline takes 72 hours for 5T tokens on a 32-node CPU cluster. Training starts in 48 hours.'
question: "What is the bottleneck in the MinHash dedup pipeline, and how would you complete the 5T-token run in under 24 hours?"
details:
  realistic_solution: 'Profile: MinHash signature generation is CPU-bound (parallelizable). LSH bucketing is memory-bound. Candidate pair comparison is the bottleneck: O(n²) worst case. Fix: use banding with b=20 bands, r=5 rows. Reduce false negative rate analysis. Shard by domain to avoid cross-shard comparison. Use Spark with hash partitioning.'
  common_mistake: |
    **The Pitfall:** Blindly scaling up the CPU cluster horizontally without profiling the pipeline stages.
    **The Rationale:** Engineers assume data processing is purely compute-bound, entirely missing the O(N²) all-to-all communication overhead inherent in the Jaccard similarity comparison stage.
    **The Consequence:** Adding nodes provides zero speedup (or even slows the job down) because the bottleneck is the cross-node network shuffle, guaranteeing the training deadline is missed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset: 5TB (1.25T tokens at 4 bytes/token). Docs: ~12.5B.
       - Pipeline: MinHash generation -> LSH bucketing -> Candidate comparison.
       - Network: 100 Gbps cross-node shuffle.
    2. **Calculations:**
       - MinHash generation (CPU-bound) on 32 nodes: ~122 seconds.
       - LSH comparison (Memory/Network bound): 12.5B docs × 200 bytes/signature = 2.5TB shuffle.
       - Baseline shuffle time over 100 Gbps = ~200 seconds (theoretical, but actual O(N²) pair comparison is failing).
       - Optimization: Sharding by domain (e.g., 10 domains) reduces cross-shard comparisons and limits the network shuffle by 10x.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Shuffle Bound**. The brute-force comparison stage overwhelms the network. Implementing LSH banding and domain-sharding immediately breaks the O(N²) scaling, rescuing the 24-hour SLA.
