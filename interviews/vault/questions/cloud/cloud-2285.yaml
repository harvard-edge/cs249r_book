title: The Full-Stack Compression Audit
scenario: 'You inherit a production serving system for a 30B parameter LLM. The previous team applied the following compression techniques in this order: (1) LoRA fine-tuning on domain data, (2) unstructured magnitude pruning to 40% sparsity, (3) GPTQ 4-bit quantization, (4) knowledge distillation from the original 30B into the compressed model. The system works but quality is significantly below expectations. You are asked to audit the compression pipeline and redesign it from first principles.'
question: "What is wrong with the current compression pipeline, and how would you redesign it from first principles?"
details:
  realistic_solution: |
    There are at least 5 critical errors in the existing pipeline:

    **Error 1: LoRA before pruning.** LoRA adapters modify the weight matrices by adding low-rank updates ($W + BA$). Pruning after LoRA means you're pruning the merged weights, which may remove the exact dimensions that LoRA learned to update. The LoRA adaptation is partially destroyed. Fix: prune first, then apply LoRA to the pruned model.

    **Error 2: Unstructured pruning.** 40% unstructured sparsity provides zero acceleration on H100 Tensor Cores (only 2:4 structured sparsity is hardware-accelerated). The weights are still stored and processed as dense matrices. You got accuracy loss with no latency benefit. Fix: use structured pruning (remove entire heads/FFN dimensions) or 2:4 semi-structured sparsity.

    **Error 3: Quantization after unstructured pruning.** GPTQ calibration computes quantization ranges from the weight distribution. Unstructured pruning creates a bimodal distribution (zeros + non-zeros) that GPTQ calibration handles poorly — the zero-valued weights waste quantization bins. Fix: if using structured pruning, the pruned dimensions are gone entirely and quantization operates on clean dense submatrices.

    **Error 4: Distillation last.** Distilling from the original 30B into the already-compressed model means the student (the compressed model) has fixed architecture and fixed quantized weights — there's almost nothing the distillation loss can update (LoRA adapters are already merged, weights are quantized to INT4). This step is nearly a no-op. Fix: distillation should happen during fine-tuning, before quantization, when the model has full-precision gradients to learn from.

    **Error 5: No intermediate accuracy checkpoints.** Without measuring accuracy after each step, you can't tell which technique caused the 12% degradation.

    **Correct pipeline:**
    1. Structured pruning (remove 30-40% of attention heads + FFN dimensions based on importance scoring)
    2. Knowledge distillation fine-tuning (use original 30B as teacher, train pruned model on domain data with soft labels, full precision)
    3. LoRA adaptation (rank 64, if additional domain specialization needed)
    4. Merge LoRA weights into base
    5. GPTQ/AWQ 4-bit quantization (calibrate on representative domain data)
    6. Validate accuracy at each step with rollback criteria
  common_mistake: |
    **The Pitfall:** Fixing one isolated issue, like changing unstructured to structured pruning.
    **The Rationale:** Candidates fail to realize the entire pipeline ordering and technique selection is fundamentally broken.
    **The Consequence:** The pipeline remains flawed, and the compressed model suffers severe accuracy degradation with little to no performance gain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B parameter LLM.
       - Original size: ~60 GB.
       - Current accuracy loss: -12% net.
    2. **Calculations:**
       - Current pipeline: LoRA (+2%), Unstructured (-8%), GPTQ (-6%), Distill (~0%) = -12% net accuracy loss.
       - Redesigned pipeline: Structured (-4%), Distill (+3%), LoRA (+2%), GPTQ clean (-2%) = -1% net accuracy loss.
    3. **Conclusion & Interpretation:**
       - **Result: Pipeline-Architecture-Bound. Model size drops from 60 GB to 10.5 GB, yielding a 6x decode throughput improvement with minimal accuracy loss.**
