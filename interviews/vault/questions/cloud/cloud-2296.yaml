title: High-Fanout Item Feature Retrieval
scenario: Your recommendation serving system scores 1,000 candidate items per request. End-to-end P99 latency is 320ms against a 150ms SLA. The 250ms item fetch bottleneck is caused by 10 concurrent threads making 100 sequential gRPC calls each to a Redis-backed feature store with a 0.5ms network RTT.
question: How would you fix the 250ms item feature fetch and bring end-to-end P99 under the 150ms SLA?
details:
  realistic_solution: |
    The 250ms bottleneck is an N+1 query anti-pattern. Optimization 1: Implement batched retrievals (MGET), grouping the 1,000 items into 5 parallel batches. Optimization 2: Introduce an in-memory L1 cache (e.g., Caffeine) on the serving nodes. With an 80% hit rate, you fetch drastically fewer items over the network.
  common_mistake: |
    **The Pitfall:** Reducing the candidate pool from 1,000 to 200 items to cut down fetch times.
    **The Rationale:** Candidates try to solve the N+1 network fetch problem by arbitrarily throwing away valid data.
    **The Consequence:** Severely degrading recommendation quality and business metrics to hit an engineering SLA.
  napkin_math: |
    - **Current Fetch:** 100 sequential calls × 2.5ms = 250ms.
    - **Optimized Fetch (MGET + Cache):** 1,000 items grouped into 5 parallel batches.
    - **Cache Impact:** 80% L1 cache hit rate means only 200 keys are fetched over the network. Network RTT (0.5ms) + Redis MGET (~1.5ms) = 2ms total latency.
    - **New Latency Stack:** 20ms (Gen) + 10ms (User) + 2ms (Item Fetch) + 10ms (Cross) + 30ms (Model) = 72ms.
    - **Result:** **P99 latency drops to 72ms, well below the 150ms SLA, achieving a 77.5% reduction.**
  options:
  - Reduce the candidate pool from 1,000 to 200 items to cut down fetch times by 80%, reducing item fetch to 50ms and total latency to 120ms.
  - Implement batched retrievals (MGET) to group the 1,000 item IDs into 5 parallel batches, and add an in-memory L1 cache to achieve an 80% hit rate, dropping fetch latency to ~2ms.
  - Upgrade the Redis-backed feature store to faster NVMe SSDs to reduce the 2.0ms database processing time per item down to 0.1ms.
  - Increase the number of concurrent threads from 10 to 100 so each thread only makes 10 sequential calls, reducing fetch latency to 25ms.
