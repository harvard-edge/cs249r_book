title: Diagnosing Autograd Memory Leaks in Training Loops
scenario: A machine learning team is training a massive Transformer model on a cloud node with 8x A100 (80GB) GPUs. While GPU memory utilization starts at 45GB per device, it steadily increases by about 8GB per validation step, eventually crashing with a CUDA Out of Memory (OOM) error. The validation loop accumulates the total loss for logging using the code `epoch_loss += loss`.
question: Why does GPU memory grow by 8 GB per validation step when the loop does epoch_loss += loss, and how should it be fixed?
details:
  realistic_solution: The `loss` tensor retains a pointer (e.g., `grad_fn` in PyTorch) to the entire reverse-linked computational graph built during the forward pass to maintain state for backpropagation. By accumulating `epoch_loss += loss`, the engineer unintentionally keeps the intermediate activations for every batch alive in VRAM. The fix is to decouple the scalar value using `epoch_loss += loss.item()`.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the OOM as a dataset loader memory leak or GPU memory fragmentation.
    **The Rationale:** Candidates fail to understand that framework tensors implicitly retain the full reverse computational graph when not detached.
    **The Consequence:** Applying complex infrastructure fixes to what is essentially a one-line code bug.
  napkin_math: |
    - **Baseline Memory:** 45 GB per device.
    - **Activations per step:** 8 GB.
    - **Accumulation:** Over 5 validation steps, 5 distinct reverse-linked graphs are retained.
    - **Total Memory:** 45 GB + (5 × 8 GB) = 85 GB.
    - **Result:** **85 GB > 80 GB limit** on the A100, resulting in an immediate OOM crash.
