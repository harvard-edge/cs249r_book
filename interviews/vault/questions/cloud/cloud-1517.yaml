title: Local NVMe Caching for Multi-Epoch Training
scenario: Your team is training a computer vision model on a 15TB dataset stored in S3 across a cluster
  of 8 compute nodes. Each node has 4x A100 GPUs that collectively require 4 GB/s of sustained read throughput
  to prevent starvation. The nodes have a 100 Gbps network interface and 4x 4TB local NVMe drives. During
  the 100-epoch training run, direct S3 streaming causes frequent GPU idle time due to network jitter
  and incurs high GET API costs. Evaluate the trade-offs of implementing a node-local NVMe warm cache
  versus deploying a dedicated in-memory distributed cache cluster (e.g., Redis) or a parallel file system
  like Lustre.
details:
  realistic_solution: Utilize the 16TB of local NVMe storage on each node as a warm cache. Implement a
    cache-on-first-read policy during epoch 1 (reading from S3). Epochs 2-100 will read entirely from
    local NVMe, which delivers >10 GB/s aggregate read throughput — easily exceeding the 4 GB/s GPU consumption
    rate. This eliminates S3 API costs ($60/epoch * 99 saved epochs = $5,940 saved), removes network jitter
    as a GPU stall source, and requires zero additional infrastructure.
  common_mistake: Recommending an expensive in-memory distributed cache cluster or Lustre deployment,
    ignoring that local NVMe read bandwidth (>10 GB/s) already far exceeds the GPU consumption rate (4
    GB/s) and the dataset fits within the available 16TB local storage.
  napkin_math: 15TB dataset fits within the 16TB local NVMe capacity. PCIe Gen4 NVMes easily deliver >10
    GB/s aggregate read throughput, surpassing the 4 GB/s need. S3 GET cost for 15TB (~150M 100KB files)
    is ~$60/epoch. For 100 epochs, S3 costs $6,000. Caching reduces API costs to $60 and isolates training
    from network jitter.
