title: AllReduce Step Time Regression
scenario: A 512-GPU training job used to spend 180 ms/step, with 40 ms exposed communication. After moving from 8-GPU nodes to 4-GPU nodes, step time rises to 245 ms even though per-GPU compute is unchanged. Gradients are 12 GB per step, intra-node bandwidth is 900 GB/s, and inter-node bandwidth is 50 GB/s.
question: Why did step time increase after moving from 8-GPU nodes to 4-GPU nodes if per-GPU compute is unchanged?
details:
  realistic_solution: The likely regression is more gradient traffic crossing the slower inter-node fabric. With fewer GPUs per node, the hierarchical all-reduce has less intra-node aggregation and more participants at the inter-node stage. The exposed communication grows because the bottleneck moved from fast NVLink aggregation to slower network bandwidth. The byte/bandwidth numbers are an order-of-magnitude warning, not a full all-reduce performance model.
  common_mistake: |
    **The Pitfall:** Blaming GPU kernels or optimizer changes.
    **The Rationale:** Compute time is unchanged but the node topology changed.
    **The Consequence:** Wasting time profiling the wrong part of the system instead of the network hierarchy.
  napkin_math: |
    - 12 GB payload over 50 GB/s tier has a serial movement scale of 12 / 50 = 0.24 s (240 ms).
    - 12 GB payload over 900 GB/s tier has a 13 ms scale.
    - Shifting work from the 900 GB/s tier to the 50 GB/s tier adds tens of milliseconds.
    - Result: **The bottleneck moved from fast NVLink aggregation to slower network bandwidth.**
