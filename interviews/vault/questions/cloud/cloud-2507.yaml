title: Model Compression Carbon ROI
scenario: 'Your team serves a 175B parameter FP16 model, processing 5 million requests daily. An engineer
  proposes distilling and quantizing the model to INT8 to save inference power. The retraining/distillation
  process will require 512 A100 GPUs running continuously for 14 days. Evaluate the carbon footprint tradeoff:
  when do we break even on the carbon emitted during retraining?'
question: "When does the INT8 distillation project break even on carbon versus continuing FP16 inference for 5M daily requests?"
details:
  realistic_solution: Evaluating the carbon ROI requires comparing the one-time carbon cost of retraining
    against the recurring carbon savings during inference. Distillation and Quantization-Aware Training
    (QAT) are highly compute-intensive. While INT8 reduces memory bandwidth requirements and utilizes
    efficient tensor cores, lowering the per-token inference energy, the upfront training emissions are
    massive. If the model is updated frequently (e.g., retrained monthly) or has low inference traffic,
    the project will be carbon-negative overall. The tradeoff balances model accuracy, upfront compute
    cost (CapEx/Carbon), and long-term serving efficiency (OpEx/Carbon). A proper decision requires calculating
    the break-even point in days to see if it fits within the model's deployment lifespan.
  common_mistake: Assuming quantization always yields an immediate carbon benefit without quantifying
    the massive upfront emission cost of the retraining and distillation process.
  napkin_math: 'Retraining: 512 GPUs * 400W * 1.5 PUE = ~307 kW. For 14 days (336h): 307 * 336 = 103,152
    kWh. Inference savings: INT8 saves ~200W per 8-GPU node. Processing 5M requests takes ~10,000 node-hours/day.
    Savings = 10,000 * 200W = 2,000 kWh/day. Break-even = 103,152 kWh / 2,000 kWh/day = ~51.5 days. If
    the model lifespan > 2 months, it is carbon-positive.'
