title: LLM Training Cost Estimation on Google TPU v5e
scenario: You are tasked with estimating the training cost for a large language model. This model has 70 billion parameters and is expected to be trained on 1 trillion tokens. Your infrastructure uses Google TPU v5e devices. Assuming a typical training efficiency of 40% of peak FLOPs and an approximate cost of $3.00 per TPU v5e device-hour.
question: How would you estimate TPU v5e device-hours and dollar cost to train a 70B model on 1T tokens at 40% efficiency, and what else matters beyond FLOPs?
details:
  realistic_solution: 'A robust solution involves: 1. Calculating total theoretical FLOPs for the entire training run (e.g., 6 * parameters * tokens). 2. Determining effective FLOPs per device (peak * efficiency). 3. Calculating total device-seconds/hours required (total FLOPs / total effective cluster FLOPs). 4. Multiplying total device-hours by the cost per device-hour. 5. Accounting for memory constraints (fitting model/batch into HBM), I/O bandwidth, interconnect speed (for multi-device training), and software overhead. Mentioning the need for profiling and iterative refinement of estimates based on early training runs is also valuable.'
  common_mistake: |
    **The Pitfall:** Estimating training time based solely on peak theoretical FLOPs.
    **The Rationale:** Overlooking real-world inefficiencies like communication overhead, data loading bottlenecks, and compiler limitations.
    **The Consequence:** Generating overly optimistic cost and timeline estimates that fail disastrously in practice.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B params, 1T tokens.
       - Hardware: TPU v5e (197 TFLOPS peak), $3.00/hour.
       - Efficiency: 40%.
    2. **Calculations:**
       - Total FLOPs: 6 * 70e9 * 1e12 = 4.2e23 FLOPs.
       - Effective TFLOPS/TPU: 197 * 0.40 = 78.8 TFLOPS.
       - Total TPU-seconds: 4.2e23 / (78.8e12) = 5.33e9 TPU-seconds.
       - Total TPU-Hours: 5.33e9 / 3600 = ~1.48 million TPU-hours.
       - Total Cost: 1.48M * $3.00 = $4.44 million.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound Estimation.** Total estimated cost is $4.44 million, heavily dependent on sustained 40% efficiency.
