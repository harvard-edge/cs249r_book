title: Accelerator Selection for Large Language Model Inference on AMD MI300X
scenario: Your team is deploying a 70 billion parameter FP16 LLM for real-time inference with a batch size of 1 for low latency. You are evaluating an AMD MI300X accelerator with 192 GB HBM3, 1,300 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth.
question: How suitable is the MI300X for batch-1 FP16 inference of a 70B LLM compared with CPUs or previous-generation GPUs?
details:
  realistic_solution: A candidate should break down the problem into memory, compute, and bandwidth requirements. For memory, 70B parameters * 2 bytes/param (FP16) = 140 GB, which fits on the MI300X's 192 GB HBM3. For bandwidth, they should consider the memory access patterns (loading weights) and compare against 5.3 TB/s. Emphasize that LLM inference is often memory-bound, especially with smaller batch sizes, making HBM bandwidth crucial.
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TFLOPS without considering memory bandwidth limits.
    **The Rationale:** Candidates underestimate the memory footprint and the bandwidth demands of batch-1 generation.
    **The Consequence:** Incorrectly selecting hardware that starves the compute units during autoregressive decoding.
  napkin_math: |
    1. **Memory Footprint:** 70B parameters × 2 bytes/param = 140 GB. This fits within the 192 GB HBM3.
    2. **Bandwidth Boundness:** Batch-1 inference is entirely memory-bound by weight loading.
    3. **Max Throughput:** 5.3 TB/s / 140 GB = **~37.8 tokens/second**.
    4. **Conclusion:** The massive 5.3 TB/s memory bandwidth drastically outperforms CPUs or older GPUs for low-latency batch-1 workloads.
