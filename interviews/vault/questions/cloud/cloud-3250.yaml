title: Accelerator Selection for Large Language Model Inference on AMD MI300X
scenario: Your team is deploying a large language model (LLM) for real-time inference.
  The model has 70 billion parameters, uses FP16 precision, and requires a batch size
  of 1 for low latency. You are considering deploying this on an AMD MI300X accelerator
  with 192 GB HBM3, 1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth.
  Compare the suitability of the MI300X against a hypothetical server-grade CPU setup
  or a previous generation GPU, considering memory capacity, computational throughput,
  and memory bandwidth requirements for LLM inference.
question: How suitable is the MI300X for batch-1 FP16 inference of a 70B LLM compared
  with CPUs or previous-generation GPUs?
details:
  realistic_solution: A candidate should break down the problem into memory, compute,
    and bandwidth requirements. For memory, 70B parameters * 2 bytes/param (FP16)
    = 140 GB, which fits on the MI300X's 192 GB HBM3. For compute, they should estimate
    FLOPs per token and compare against 1,307 TFLOPS. For bandwidth, they should consider
    the memory access patterns (e.g., loading weights, activations) and compare against
    5.3 TB/s. Emphasize that LLM inference is often memory-bound, especially with
    smaller batch sizes, making HBM bandwidth crucial.
  common_mistake: Focusing solely on peak TFLOPS without considering memory bandwidth
    limits, or underestimating the memory footprint of a large model. Ignoring the
    sparse performance numbers for real-world scenarios or not converting model size
    to bytes correctly.
  napkin_math: 'For a 70 billion parameter FP16 model, the memory footprint is 70
    * 10^9 * 2 bytes = 140 GB. This fits within the 192 GB HBM3 of the AMD MI300X.
    If each token generation requires approximately 2 * Parameters * FLOPs (for matmul),
    and considering memory boundness: data movement for weights (140 GB) per token.
    At 5.3 TB/s, this implies roughly 5.3 * 10^12 bytes/s / (140 * 10^9 bytes) = ~37
    tokens/second if purely memory bound by weight loading, which is a significant
    factor.'
