title: Diagnosing MFU Collapse in Cross-Node Tensor Parallelism
scenario: 'You are training a 70B parameter LLM on a cluster of 8-GPU nodes. To increase memory headroom, the infrastructure team expands the Tensor Parallelism (TP) degree from TP=8 (single node) to TP=16 (across two nodes). Immediately, Model FLOPs Utilization (MFU) plummets from 48% to 11%.'
question: Why did increasing Tensor Parallelism from TP=8 to TP=16 collapse MFU, and how should parallelism cross node boundaries instead?
details:
  realistic_solution: Diagnose the issue as an interconnect bandwidth cliff. Restrict Tensor Parallelism strictly to the intra-node boundary (TP <= 8) to leverage NVLink. Use Pipeline Parallelism (PP) or Data Parallelism (DP/FSDP) for cross-node scaling.
  common_mistake: |
    **The Pitfall:** Suggesting minor optimizations like increasing batch size or tweaking network routing.
    **The Rationale:** Candidates miss that TP's communication frequency fundamentally violates cross-node bandwidth constraints.
    **The Consequence:** Wasting time on minor tuning when the parallelism topology is fundamentally architecturally flawed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intra-node (NVLink): 600 GB/s bidirectional.
    - Inter-node (InfiniBand HDR): 200 Gbps (25 GB/s).

    **Calculations:**
    - Bandwidth Drop: 600 GB/s / 25 GB/s = 24x reduction.

    **Conclusion & Interpretation:**
    - **Result: 24x bandwidth reduction causes synchronous blocking (Interconnect-Bandwidth-Bound).**
