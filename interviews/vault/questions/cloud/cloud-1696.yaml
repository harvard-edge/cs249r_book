title: Diagnosing High Pipeline Bubble Overhead
scenario: You are training a 65B parameter language model across 64 A100 GPUs using 8-way Pipeline Parallelism (PP=8) and 8-way Tensor Parallelism (TP=8). Your global batch size is fixed at 1024 sequences to maintain convergence stability. Currently, you are splitting the global batch into 8 microbatches (microbatch size = 128). Profiling reveals poor GPU utilization (~53%), heavily dominated by pipeline bubbles (idle time at the start and end of batches).
question: "How should you change the microbatching to reduce PP bubble overhead and exceed 85% utilization without changing global batch size?"
details:
  realistic_solution: Decrease the microbatch size to significantly increase the number of microbatches ($m$) per pipeline flush. By reducing the microbatch size from 128 to 16, the number of microbatches increases from 8 to 64, shrinking the bubble fraction dramatically while preserving the global batch size.
  common_mistake: |
    **The Pitfall:** Suggesting an increase in the global batch size, complex interleaved scheduling, or overlapping communication.
    **The Rationale:** Candidates apply standard GPU utilization fixes without recognizing that pipeline parallelism has structural idle time dictated by the ratio of pipeline stages to microbatches.
    **The Consequence:** Changing global batch size alters model convergence, while other techniques fail to resolve the fundamental pipeline bubble math.
  napkin_math: |
    1. Calculate current Pipeline Bubble Fraction: (p - 1) / (m + p - 1).
    2. For p=8 and m=8 (microbatch size 128), bubble = 7 / 15 ≈ 46.7% idle time (53.3% utilization).
    3. Decrease microbatch size to 16, which increases the number of microbatches (m) to 64.
    4. New Pipeline Bubble Fraction: 7 / (64 + 8 - 1) = 7 / 71 ≈ 9.9% idle time.
    5. **Result:** **Compute utilization increases to ~90.1%, easily exceeding the 85% goal.**
