title: Activation Outlier Quantization Failure
scenario: A W8A8 INT8 LLM quantization run works on average prompts but fails on code-generation prompts. Traces show a few MLP activation channels with magnitudes 8x higher on code prompts than calibration prompts. Analyze the likely failure mode.
question: Why would W8A8 INT8 quantization fail on code-generation prompts when a few activation channels are 8x larger than calibration data?
details:
  realistic_solution: The calibration range underestimates outlier activation channels for code prompts, so INT8 activation scales either clip those values or waste most quantization levels on rare extremes. The failure is distribution-dependent activation quantization, not just insufficient weight precision. Fixes include better calibration data, per-channel or dynamic activation scaling, SmoothQuant-style rescaling, or leaving sensitive layers at higher precision.
  common_mistake: Blaming model architecture or prompt difficulty without checking calibration coverage and activation ranges.
  napkin_math: If calibration max is 1.0 and field max is 8.0, values above the calibrated range saturate or force a scale that wastes most INT8 levels on rare extremes.
