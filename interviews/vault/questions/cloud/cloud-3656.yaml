title: Multi-GPU Pod Affinity for NVLink-Dependent Workloads
scenario: You're deploying a 70B model training job on a Kubernetes cluster with GPU nodes (8 GPUs/node, NVLink 900GB/s intra-node). Some pods get scheduled across 2 nodes (cross-node via InfiniBand at 400Gbps = 50GB/s). All-reduce throughput drops 18x when split across nodes.
question: How would you schedule the 70B training pods so 8-GPU jobs stay within one node and avoid the 18x all-reduce slowdown?
details:
  realistic_solution: 'Use NVIDIA''s GPU Topology Manager with topology policy ''best-effort'' or ''required''. Set pod nodeSelector to require 8 GPUs on one node. Use gang scheduling (Volcano or Koordinator) to ensure all pods in a job start simultaneously on co-located nodes. Add node affinity rules requiring nvidia.com/gpu.count: ''8'' on a single node.'
  common_mistake: |
    **The Pitfall:** Using standard resource requests (nvidia.com/gpu: 8) per pod.
    **The Rationale:** Kubernetes does not understand GPU topology by default and may split an 8-GPU request across 2 nodes.
    **The Consequence:** This mis-scheduling wastes 18x communication time, reducing GPU utilization from 70% to ~30%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intra-node NVLink: 900GB/s.
       - Cross-node InfiniBand: 50GB/s.
    2. **Calculations:**
       - Intra-node All-reduce Time: 2 * 7/8 * 140GB / 900GB/s = 0.27s.
       - Cross-node All-reduce Time: 2 * 7/8 * 140GB / 50GB/s = 4.9s.
    3. **Conclusion & Interpretation:** **Result: Communication-Bound.** 18x slower communication reduces GPU utilization from 70% to 30%.
