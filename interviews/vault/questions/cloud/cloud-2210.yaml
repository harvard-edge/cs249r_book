title: The MIG Partitioning Tradeoff
scenario: Your cluster has 8 NVIDIA A100 80GB GPUs. A mix of workloads arrives: some large training jobs need a full GPU, but many small inference jobs only need 10GB of VRAM and a fraction of compute. An engineer proposes using Multi-Instance GPU (MIG) to partition each A100 into 7 slices.
question: What is the fundamental tradeoff MIG introduces, and why can you not simply get '7x the jobs' from each GPU?
details:
  realistic_solution: MIG trades peak single-job performance for multi-tenant isolation. A 1g.10gb MIG slice on an A100-80GB gets ~1/7th of the active SMs (14 vs 98), ~1/7th of the HBM bandwidth (~286 GB/s vs 2 TB/s), and only 10GB VRAM. Jobs that are memory-bandwidth-bound (most LLM inference) see throughput drop by nearly 7x per slice. The benefit is QoS isolation: slices have hard memory and compute partitioning, preventing noisy-neighbor effects. The scheduling decision is whether the workload mix benefits more from isolation and packing efficiency than from raw per-job throughput.
  common_mistake: |
    **The Pitfall:** Assuming MIG partitions are free (i.e., that 7 slices of an A100 give you 7 independent A100-equivalent GPUs).
    **The Rationale:** Engineers often equate a slice to a full virtualized instance without considering hardware partitioning.
    **The Consequence:** Expectations for throughput are wildly overestimated because each MIG slice has proportionally less memory bandwidth, fewer SMs, and reduced L2 cache.
  napkin_math: |
    - **Full A100:** 2 TB/s bandwidth, 98 active SMs, 80GB VRAM.
    - **MIG 1g.10gb Slice:** ~286 GB/s, 14 SMs, 10GB.
    - **Performance Drop:** A memory-bound inference job (e.g., INT8 7B model decode) on full GPU: ~40 tokens/sec. On 1g.10gb slice: ~6 tokens/sec.
    - **Aggregate Throughput:** You can serve 7 such jobs simultaneously -> aggregate = ~42 tokens/sec.
    - **Conclusion:** **~42 tokens/sec** is approximately the same total throughput, but with hard isolation.
