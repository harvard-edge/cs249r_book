title: The MIG Partitioning Tradeoff
scenario: 'Your cluster has 8 NVIDIA A100 80GB GPUs. A mix of workloads arrives: some large training jobs
  need a full GPU, but many small inference jobs only need 10GB of VRAM and a fraction of compute. An
  engineer proposes using Multi-Instance GPU (MIG) to partition each A100 into 7 slices. What is the fundamental
  tradeoff MIG introduces, and why can you not simply get ''7x the jobs'' from each GPU?'
details:
  realistic_solution: 'MIG trades peak single-job performance for multi-tenant isolation. A 1g.10gb MIG
    slice on an A100-80GB gets ~1/7th of the SMs (~16 vs 108), ~1/7th of the HBM bandwidth (~286 GB/s
    vs 2 TB/s), and only 10GB VRAM. Jobs that are memory-bandwidth-bound (most LLM inference) see throughput
    drop by nearly 7x per slice. The benefit is QoS isolation: slices have hard memory and compute partitioning,
    preventing noisy-neighbor effects. The scheduling decision is whether the workload mix benefits more
    from isolation and packing efficiency than from raw per-job throughput.'
  common_mistake: Assuming MIG partitions are free — that 7 slices of an A100 give you 7 independent A100-equivalent
    GPUs. In reality, each MIG slice has proportionally less memory bandwidth, fewer SMs, and reduced
    L2 cache.
  napkin_math: 'Full A100: 2 TB/s bandwidth, 108 SMs, 80GB VRAM. MIG 1g.10gb slice: ~286 GB/s, ~16 SMs,
    10GB. A memory-bound inference job (e.g., 7B model decode) on full GPU: ~40 tokens/sec. On 1g.10gb
    slice: ~6 tokens/sec. But you can serve 7 such jobs simultaneously → aggregate = ~42 tokens/sec ≈
    same total throughput, but with hard isolation.'
