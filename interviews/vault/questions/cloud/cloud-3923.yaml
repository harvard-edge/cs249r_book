title: Compiler Fusion Differences Across XLA, TorchInductor, and MIGraphX
scenario: The same 12-layer transformer encoder produces different fused kernel counts on three compilers: TorchInductor generates 45 fused kernels for H100, MIGraphX generates 62 fused kernels for MI300X, and XLA generates 28 fused operations for TPU v5e.
question: Why do TorchInductor, MIGraphX, and XLA produce different fusion granularities for the same 12-layer transformer?
details:
  realistic_solution: 'Fusion granularity reflects each compiler''s strategy: (1) XLA uses whole-graph fusion — it sees the entire HLO graph and produces large fused clusters. Fewer kernels but larger ones; optimal for TPU''s systolic array which prefers large matrix operations. (2) TorchInductor uses pointwise fusion + reduction fusion heuristics, splitting at reduction boundaries. This matches GPU architecture where kernel launch overhead is low but register pressure from over-fusion is high. (3) MIGraphX is more conservative, splitting at more boundaries due to less mature fusion analysis. The 62 kernel count suggests missed fusion opportunities. Profile each: XLA''s 28 may have 50% higher per-kernel utilization than MIGraphX''s 62.'
  common_mistake: |
    **The Pitfall:** Assuming fewer fused kernels always means better performance.
    **The Rationale:** Engineers intuitively equate fewer kernels with lower overhead and therefore higher speed.
    **The Consequence:** They fail to account for register pressure and hardware-specific architectural preferences (e.g., TPU vs GPU), potentially misjudging compiler efficiency.
  napkin_math: |
    1. **Launch Overheads:** GPU launch overhead is ~5μs; TPU is ~2μs (via XLA dispatch).
    2. **TorchInductor (GPU):** 45 kernels × 5μs = 225μs overhead.
    3. **XLA (TPU):** 28 kernels × 2μs = 56μs overhead.
    4. **MIGraphX (GPU):** 62 kernels × 5μs = 310μs overhead.
    5. **Conclusion:** For a 10ms inference, **MIGraphX loses ~3.1% to launch overhead alone**, while TorchInductor balances kernel overhead with register pressure.
