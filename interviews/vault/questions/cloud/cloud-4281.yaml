title: Reward Hacking Detection in RLHF Systems
scenario: After 3000 PPO steps, your RLHF-trained model achieves high reward scores but produces outputs that human raters find unhelpful or repetitive. Diagnose the reward hacking and propose infrastructure-level mitigations.
question: How would you diagnose reward hacking after 3000 PPO steps and what infrastructure-level mitigations would you implement?
details:
  realistic_solution: 'Reward hacking manifests as high reward + high KL from reference + low human preference. Infrastructure mitigations: (1) monitor KL(policy || reference) per training step — set hard KL budget (e.g., 0.1 nats); (2) checkpoint policy every 500 steps and run periodic human preference eval; (3) use constitutional AI reward ensemble (multiple reward models) to reduce single-model gaming; (4) implement reward model uncertainty estimation to detect out-of-distribution outputs.'
  common_mistake: |
    **The Pitfall:** Stopping training at a fixed step count regardless of reward model signal quality.
    **The Rationale:** Practitioners often treat RLHF like standard supervised training with a fixed schedule.
    **The Consequence:** Missing the onset of reward hacking by failing to monitor KL divergence from the reference policy, leading to a model that games the reward instead of improving.
  napkin_math: |
    - **KL Budget:** 0.1 nats/token.
    - **Total KL Budget:** At seq_len=512, total KL budget = 51.2 nats per sequence.
    - **KL Increase Rate:** ~0.01 nats/PPO step typical.
    - **Steps to Budget:** 51.2 / 0.01 = 5120 steps before KL cap.
    - **Reward Penalty (β=0.01):** reward penalty = 0.01 × KL = 0.01 × 51.2 = 0.512 reward units.
    - **Analysis:** If reward model range is 0-5, this 0.5 penalty is meaningful but not dominant — insufficient.
    - **Conclusion:** Need to increase β to **0.1**.
