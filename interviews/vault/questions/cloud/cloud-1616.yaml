title: LLM Inference Sharding Strategy
scenario: You are tasked with deploying a 175B parameter language model (FP16) for real-time inference on a single 8x A100 (80GB) node with NVLink. You must decide whether to use Tensor Parallelism (TP=8), Pipeline Parallelism (PP=8), or a combination. The primary SLA is a Time To First Token (TTFT) of under 200ms with maximal throughput.
question: "Should you use TP=8, PP=8, or a hybrid to shard the 175B FP16 model on one 8x A100 node for <200ms TTFT, and why?"
details:
  realistic_solution: |
    Use Tensor Parallelism (TP=8). TP distributes the matrix multiplications across all 8 GPUs, processing each layer collaboratively. This slashes the compute latency per layer. The frequent All-Reduce operations are easily absorbed by the 600GB/s intra-node NVLink, satisfying the strict 200ms TTFT SLA.
  common_mistake: |
    **The Pitfall:** Suggesting Pipeline Parallelism (PP=8) to avoid frequent cross-GPU communication.
    **The Rationale:** Candidates fail to realize that PP processes requests sequentially across stages, drastically increasing single-batch latency (TTFT) and introducing pipeline bubbles.
    **The Consequence:** The 200ms TTFT SLA is fundamentally violated by the pipeline latency.
  napkin_math: |
    - **Model Size:** 175B params @ FP16 = 350GB. TP=8 gives each GPU ~44GB of weights.
    - **Communication:** An All-Reduce sends ~24KB per token per layer. Across 96 layers, total is ~2.3MB per token.
    - **NVLink Speed:** At 600GB/s, 2.3MB transfers in **microseconds**.
    - **Result:** TP is compute-bound rather than communication-bound, easily satisfying the **<200ms TTFT SLA**.
