title: Sizing Prefetch Buffers for GPU Starvation
scenario: You are training a Vision Transformer on a node with 1x NVIDIA A100 GPU and a 32-core CPU. Profiling
  shows the GPU forward/backward pass takes 80ms per batch of 64 images. Data loading and heavy augmentation
  take 5ms per image on a single CPU thread. Storage occasionally experiences 500ms disk latency spikes.
  Calculate the minimum number of CPU dataloader workers required to match GPU throughput, and the minimum
  prefetch buffer size (in batches) needed to completely hide the disk latency spikes.
details:
  realistic_solution: Allocate exactly 4 CPU workers to balance the GPU step time, and configure a prefetch
    buffer depth of at least 7 batches to ensure the GPU always has data during maximum I/O stalls.
  common_mistake: Setting `num_workers` to the maximum available CPU cores (32) which causes unnecessary
    context switching overhead, and leaving `prefetch_factor` at default (usually 2), failing to hide
    the 500ms I/O spikes.
  napkin_math: 1. CPU time per batch = 64 images * 5ms = 320ms. 2. Min workers = CPU batch time / GPU
    batch time = 320ms / 80ms = 4 workers. 3. Batches consumed during 500ms stall = 500ms / 80ms = 6.25.
    4. Min prefetch buffer = ceil(6.25) = 7 batches.
