title: When Level 2 MLOps Is Premature
scenario: A startup with 2 ML engineers and 3 models in production wants to jump straight to Level 2 MLOps
  (full CI/CD for ML pipelines). Their competitor ships 10 models at Level 0. Should the startup invest
  6 months building Level 2 infrastructure?
details:
  realistic_solution: 'No — jumping to Level 2 is premature. With 2 engineers and 3 models, the bottleneck
    is feature development, not pipeline automation. Six months building CI/CD for ML pipelines means
    6 months NOT shipping models, while the competitor ships 10. Level 2 pays off when you have: (1) enough
    models that manual management doesn''t scale (>10-15), (2) enough engineers to staff both platform
    and product ML (>5), (3) frequent retraining where automation saves significant time. The startup
    should implement Level 1 first — a simple orchestrated pipeline (even cron + scripts) that automates
    retraining. This takes 2-4 weeks, not 6 months, and eliminates 80% of manual toil. Level 2 should
    be a goal for Year 2 when model count and team size justify the investment. Premature infrastructure
    is a form of technical debt — it adds complexity before it adds value.'
  common_mistake: Over-engineering MLOps infrastructure for a small team. The Google ML maturity model
    was designed for Google-scale (thousands of models). Startups should optimize for iteration speed,
    not automation maturity.
  napkin_math: '2 engineers × 6 months = 12 engineer-months (240 working days) on infra vs shipping. At
    3 models, Level 2 saves ~2 days/month. Payback: 240 days / 2 days/month = 120 months (10 years). Not
    worth it.'
