title: Evaluating Elastic Training for Carbon Minimization
scenario: You are evaluating deployment strategies for a 14-day continuous LLM pre-training job using 1,024 GPUs (500W node power per GPU). Option A: Deploy in Region 1 with a PUE of 1.1 and a stable grid carbon intensity of 400 gCO2eq/kWh. Option B: Deploy in Region 2 with a PUE of 1.2 and a volatile grid where carbon intensity is 100 gCO2eq/kWh for 8 hours of daylight (solar) and 600 gCO2eq/kWh for the remaining 16 hours. Your orchestration allows pausing the job, but daily checkpointing and resuming introduces a 15% throughput penalty on active hours.
question: How do Region 1 continuous training and Region 2 solar-only intermittent training compare on CO2 and time-to-market?
details:
  realistic_solution: Compare Continuous Region 1 vs. Intermittent Region 2 (running only during the 8 solar hours). Region 1 takes 14 days and emits ~75 tons of CO2eq. Intermittent scheduling in Region 2 reduces total emissions to ~24 tons (a 68% reduction) but extends time-to-market from 14 days to ~50 days due to reduced daily active hours and the 15% checkpointing penalty.
  common_mistake: |
    **The Pitfall:** Assuming time-weighted average carbon intensity means continuous training is cleaner.
    **The Rationale:** Candidates fail to calculate total carbon over the extended duration and high PUE of the alternative.
    **The Consequence:** Choosing a deployment strategy that results in far higher total emissions.
  napkin_math: |
    1. **Continuous Region 1:** 512 kW × 1.1 PUE × 24h = 13,517 kWh/day × 0.4 kg/kWh = 5.4 tons/day. Total = **75.6 tons**.
    2. **Intermittent Region 2:** 512 kW × 1.2 PUE × 8h = 4,915 kWh/day × 0.1 kg/kWh = 0.49 tons/day.
    3. **Duration Penalty:** 14 days × 24h = 336 active hours needed. With 15% penalty, 6.8 active hours/day. Total = 49.4 days.
    4. **Total Carbon:** 49.4 days × 0.49 tons/day = **24.2 tons**.
