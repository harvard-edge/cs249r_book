title: Evaluating Elastic Training for Carbon Minimization
scenario: 'You are evaluating deployment strategies for a 14-day continuous LLM pre-training job using
  1,024 A100 GPUs (400W TDP, estimated 500W node power per GPU). Option A: Deploy in Region 1 with a PUE
  of 1.1 and a stable grid carbon intensity of 400 gCO2eq/kWh. Option B: Deploy in Region 2 with a PUE
  of 1.2 and a volatile grid where carbon intensity is 100 gCO2eq/kWh for 8 hours of daylight (solar)
  and 600 gCO2eq/kWh for the remaining 16 hours. Your orchestration allows pausing the job, but daily
  checkpointing and resuming introduces a 15% throughput penalty on active hours. Evaluate the carbon
  and time-to-market trade-offs between continuous training in Region 1 versus carbon-aware intermittent
  training in Region 2.'
question: "How do Region 1 continuous training and Region 2 solar-only intermittent training compare on CO2 and time-to-market?"
details:
  realistic_solution: Compare Continuous Region 1 vs. Intermittent Region 2 (running only during the 8
    solar hours). Region 1 takes 14 days and emits ~75 tons of CO2eq. Intermittent scheduling in Region
    2 reduces total emissions to ~24 tons (a 68% reduction) but extends time-to-market from 14 days to
    ~50 days due to reduced daily active hours and the 15% checkpointing penalty.
  common_mistake: Calculating the time-weighted average carbon intensity of Region 2 (266 gCO2eq/kWh)
    and assuming continuous training there is cleaner, ignoring that the higher PUE and 16 hours of fossil
    power make it worse than Region 1 overall.
  napkin_math: 'IT Power = 1024 * 0.5 kW = 512 kW.

    Region 1 (Continuous): 512 * 1.1 (PUE) = 563.2 kW. Daily energy = 13,517 kWh. Carbon = 13,517 * 0.4
    kg = 5.4 tons/day. Total (14 days) = 75.6 tons.

    Region 2 (Continuous): 512 * 1.2 (PUE) = 614.4 kW. Daily carbon = (614.4 * 8h * 0.1 kg) + (614.4 *
    16h * 0.6 kg) = 0.49 + 5.9 = 6.39 tons/day (Worse than R1).

    Region 2 (Intermittent, 8h/day): Effective hours = 8h * 0.85 (penalty) = 6.8h/day. Total required
    = 14 * 24 = 336h. Days required = 336 / 6.8 = 49.4 days. Total Carbon = 49.4 days * 0.49 tons/day
    = 24.2 tons.'
