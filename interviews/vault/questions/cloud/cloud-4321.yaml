title: Feature Interaction Layer Arithmetic Intensity
scenario: DLRM's feature interaction layer computes dot products between all pairs
  of n=27 feature vectors (each 64-dimensional). This produces an n×n interaction
  matrix, of which the upper triangle (n*(n-1)/2 = 351 values) is used. For a batch
  of 2048 samples, compute the FLOPs for the interaction layer and determine whether
  this layer is compute-bound or memory-bandwidth-bound on an A100.
question: For batch size 2048, what are the interaction-layer FLOPs and is it compute-bound
  or memory-bandwidth-bound on an A100?
details:
  realistic_solution: 'FLOPs per sample: n×n dot products each of size d=64: n² ×
    2d = 27² × 128 = 93,312 FLOPs. For batch=2048: 2048 × 93,312 = 191 MFLOPs. Memory:
    input is 2048 × 27 × 64 × 4 bytes (FP32) = 14.2 MB. Output (upper triangle, 2048
    × 351 × 4 bytes) = 2.9 MB. Total memory: ~17 MB. Arithmetic intensity: 191 MFLOPs
    / 17 MB = 11.2 FLOP/byte. A100 ridge point: 312 TFLOPS / 2 TB/s = 156 FLOP/byte.
    Since 11.2 << 156, the interaction layer is strongly memory-bandwidth-bound. Optimization:
    fuse the dot product computation with the embedding output to avoid re-reading
    the embedding vectors from HBM, increasing effective arithmetic intensity.'
  common_mistake: Computing FLOPs per feature pair without accounting for the batch
    dimension, then comparing to peak TFLOPS without checking memory access to determine
    the actual bottleneck.
  napkin_math: 'Interaction FLOPs: 2048 × 27 × 27 × 64 × 2 = 191.1 MFLOPs. Memory
    access: read 27 vecs × 64 dim × 4 bytes × 2048 = 14.2 MB input; write 351 × 4
    × 2048 = 2.88 MB output. AI = 191e6 / 17e6 = 11.2 FLOP/byte. A100: 312 TFLOPS
    / 2 TB/s = 156 FLOP/byte ridge. Memory-bound (11.2 << 156). Expected throughput:
    A100 memory bandwidth 2 TB/s × (191 MFLOPs / 17 MB) limited by memory: time =
    17 MB / 2 TB/s = 8.5 μs per batch. Compare to compute peak: 191 MFLOPs / 312 TFLOPS
    = 0.6 μs. Memory dominates: 14× memory-bound.'
