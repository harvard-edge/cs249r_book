title: Feature Interaction Layer Arithmetic Intensity
scenario: DLRM's feature interaction layer computes dot products between all pairs of n=27 feature vectors (each 64-dimensional). This produces an n×n interaction matrix, of which the upper triangle (n*(n-1)/2 = 351 values) is used. A batch of 2048 samples is processed on an A100.
question: For batch size 2048, what are the interaction-layer FLOPs and is it compute-bound or memory-bandwidth-bound on an A100?
details:
  realistic_solution: 'FLOPs per sample: n×n dot products each of size d=64: n² × 2d = 27² × 128 = 93,312 FLOPs. For batch=2048: 2048 × 93,312 = 191 MFLOPs. Memory: input is 2048 × 27 × 64 × 4 bytes (FP32) = 14.2 MB. Output (upper triangle, 2048 × 351 × 4 bytes) = 2.9 MB. Total memory: ~17 MB. Arithmetic intensity: 191 MFLOPs / 17 MB = 11.2 FLOP/byte. A100 ridge point: 312 TFLOPS / 2 TB/s = 156 FLOP/byte. Since 11.2 << 156, the interaction layer is strongly memory-bandwidth-bound. Optimization: fuse the dot product computation with the embedding output to avoid re-reading the embedding vectors from HBM, increasing effective arithmetic intensity.'
  common_mistake: |
    **The Pitfall:** Computing FLOPs per feature pair without accounting for the batch dimension.
    **The Rationale:** Candidates focus on the complexity of a single dot product and forget to scale it, or they compare to peak TFLOPS without checking memory access.
    **The Consequence:** Incorrectly identifying the actual bottleneck of the operation, leading to misguided optimization efforts.
  napkin_math: |
    1. Interaction FLOPs per sample: 27 × 27 × 64 × 2 = 93,312 FLOPs.
    2. Total FLOPs for batch size 2048: 2048 × 93,312 ≈ 191.1 MFLOPs.
    3. Memory read (input): 27 vectors × 64 dim × 4 bytes × 2048 = 14.16 MB.
    4. Memory write (output): 351 values × 4 bytes × 2048 = 2.88 MB.
    5. Total memory access: 14.16 MB + 2.88 MB ≈ 17.04 MB.
    6. Arithmetic Intensity (AI): 191.1 MFLOPs / 17.04 MB ≈ 11.2 FLOP/byte.
    7. A100 ridge point: 312 TFLOPS / 2.0 TB/s = 156 FLOP/byte.
    8. **Since 11.2 FLOP/byte << 156 FLOP/byte, the layer is strongly memory-bandwidth-bound.**
