title: The Warp Divergence Tax
scenario: 'You profile a sparse attention kernel that uses an `if-else` branch to skip zero-valued elements. The kernel''s arithmetic intensity should place it in the compute-bound region of the roofline, yet the profiler shows it achieves only 15% of peak FLOPS. The profiler also reports ''branch divergence'' at 65%.'
question: 'Why does 65% branch divergence leave the sparse attention kernel at only 15% of peak FLOPS, and what is the estimated throughput loss?'
details:
  realistic_solution: 'In SIMT execution, all 32 threads in a warp must execute the same instruction at the same time. When threads within a warp take different branches (diverge), the GPU serializes execution: first all threads taking the `if` path execute while the others are masked, then the `else` path executes. With 65% divergence, most warps execute both paths, reducing the warp execution efficiency to ~45%. Furthermore, only 35% of the total threads actually perform the useful compute. The compound effect of only 35% of threads doing useful work multiplied by the ~45% instruction efficiency of the divergent warps results in the observed ~15% of peak FLOPS.'
  common_mistake: |
    **The Pitfall:** Thinking branch divergence causes random thread stalls like on a CPU.
    **The Rationale:** Candidates apply CPU mental models to GPUs, failing to understand SIMT architecture constraints.
    **The Consequence:** Misjudging the severity of the performance penalty, which is not random delays but full serialized execution of both paths within the warp.
  napkin_math: |
    - **Useful Work:** Only 35% of threads perform the compute.
    - **Branch Divergence Penalty:** 65% divergence forces serial execution of both paths in a warp, dropping instruction efficiency to ~45%.
    - **Compound Efficiency:** 35% useful threads × 45% execution efficiency = **15.7% (roughly 15%) of peak FLOPS observed**.
