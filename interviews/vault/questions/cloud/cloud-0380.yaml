title: The Datacenter Heat Wave
scenario: Your datacenter is experiencing a major heat wave, and the cooling system is struggling to keep up. The system, which normally provides enough cooling for your H100 GPUs to run at their full Thermal Design Power (TDP), is now only able to dissipate 80% of its rated capacity. To prevent thermal failure, the power management system must throttle each GPU's power consumption.
question: If cooling can dissipate only 80% of an H100's 700W TDP, what sustained FP16 throughput should you expect and why?
details:
  realistic_solution: The GPU must throttle its power consumption to match the reduced cooling capacity. Performance scales roughly linearly with power, leading to a proportional reduction in TFLOPS.
  common_mistake: |
    **The Pitfall:** Ignoring the direct correlation between thermal dissipation limits and sustained computational throughput.
    **The Rationale:** Engineers often focus on advertised peak TFLOPS and forget that performance scales linearly with power limits under thermal throttling.
    **The Consequence:** Overestimating available compute capacity during adverse facility conditions.
  napkin_math: |
    - **Identify Max Performance:** Full-power H100 provides 989 TFLOPS (FP16) at a 700W TDP.
    - **Calculate Reduced Cooling Capacity:** 700 W * 0.80 = 560 W.
    - **Estimate Throttled Performance:** Assuming performance scales linearly with power: 989 TFLOPS * 0.80 = 791.2 TFLOPS.
    - **Result: The GPU must throttle to ~791 TFLOPS to maintain a safe operating temperature.**
  options:
  - ~198 TFLOPS
  - 989 TFLOPS
  - ~791 TFLOPS
  - 560 TFLOPS
  correct_index: 2
