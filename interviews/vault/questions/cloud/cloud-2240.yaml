title: The Shuffle Data Volume Calculation
scenario: You are running a distributed Spark job to join a 10 TB user-activity table with a 500 GB user-profile
  table, both partitioned by user_id across 200 nodes. The join key is user_id. How much data moves across
  the network during the shuffle phase, and what determines whether this is a broadcast join or a shuffle
  join?
question: "How much data moves across the network during the shuffle phase, and what determines whether this is a broadcast join or a shuffle join?"
details:
  realistic_solution: 'If both tables are already partitioned by user_id with the same partition function
    and same number of partitions, zero shuffle is needed — this is a co-partitioned join. If partitioned
    differently, the optimizer must choose: (1) Shuffle both sides: ~10.5 TB network I/O, or (2) Broadcast
    the 500 GB table to all 200 nodes: 500 GB × 200 = 100 TB total network I/O — worse. (3) Re-partition
    only the 500 GB table to match the 10 TB table''s partitioning: 500 GB network I/O. Option 3 is optimal.
    The rule: shuffle the smaller table to match the larger table''s existing partitioning.'
  common_mistake: '"Both tables are shuffled, so 10.5 TB moves across the network." This ignores the broadcast
    join optimization — when one table is small enough to fit in each executor''s memory, it can be broadcast
    to avoid shuffling the large table entirely.'
  napkin_math: A standard Sort-Merge Join shuffles both tables based on user_id, moving 10 TB + 500 GB
    = 10.5 TB over the network. At 25 Gbps (3.125 GB/s) per node * 200 nodes = 625 GB/s cluster bandwidth,
    this takes 10.5 TB / 625 GB/s = ~17 seconds. A Broadcast Hash Join sends only the 500 GB table to
    all nodes. Broadcasting 500 GB over 625 GB/s = 0.8s. Broadcasting is ~21x faster and avoids large
    shuffles.
