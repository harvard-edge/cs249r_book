title: The Shuffle Data Volume Calculation
scenario: You are running a distributed Spark job to join a 10 TB user-activity table with a 500 GB user-profile table, both partitioned by user_id across 200 nodes. The join key is user_id.
question: How much data moves across the network during the shuffle phase, and what determines whether this is a broadcast join or a shuffle join?
details:
  realistic_solution: |
    If both tables are already partitioned by user_id with the same partition function and same number of partitions, zero shuffle is needed — this is a co-partitioned join. If partitioned differently, the optimizer must choose: (1) Shuffle both sides: ~10.5 TB network I/O, or (2) Broadcast the 500 GB table to all 200 nodes: 500 GB × 200 = 100 TB total network I/O — worse. (3) Re-partition only the 500 GB table to match the 10 TB table's partitioning: 500 GB network I/O. Option 3 is optimal. The rule: shuffle the smaller table to match the larger table's existing partitioning.
  common_mistake: |
    **The Pitfall:** Assuming both tables must be shuffled, moving 10.5 TB across the network.
    **The Rationale:** Candidates ignore the broadcast join optimization for cases where one table is small enough to fit in memory.
    **The Consequence:** Severe network congestion and slow job execution times due to unnecessary large shuffles.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 TB and 500 GB tables.
       - 200 nodes, 625 GB/s cluster bandwidth.
    2. **Calculations:**
       - Shuffle Join: 10 TB + 0.5 TB = 10.5 TB. Takes ~17s.
       - Broadcast Join: 500 GB sent to 200 nodes = 100 TB. Takes ~160s.
       - Re-partition small table: 500 GB shuffle. Takes ~0.8s.
    3. **Conclusion & Interpretation:** **Re-partitioning the small table avoids massive data movement and is 21x faster. Result: Network-Bound.**
