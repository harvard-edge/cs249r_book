title: DLRM Tiered Memory Architecture
scenario: You are architecting the serving infrastructure for a Deep Learning Recommendation Model (DLRM)
  with 800 billion FP16 parameters, 99% of which reside in sparse embedding tables. The target hardware
  is 8x NVIDIA H100 (80GB HBM3) nodes equipped with 2TB of Host DDR5 RAM and PCIe Gen5. The service must
  handle 10,000 QPS with a strict P99 latency of 100ms. Evaluate the architectural trade-offs between
  utilizing pure GPU-HBM sharding across multiple nodes versus a tiered memory architecture (HBM + Host
  DDR5) for embedding lookups. Justify your design choice focusing on TCO and latency.
details:
  realistic_solution: Leverage the Zipfian access distribution by deploying a tiered memory architecture.
    Cache the hottest 10% of embeddings in GPU HBM and store the remaining 90% in Host DDR5. This allows
    a single node to serve the model instead of three, massively reducing TCO while relying on PCIe Gen5
    bandwidth to meet the 100ms SLA for cold lookups.
  common_mistake: Treating the workload as compute-bound and blindly over-provisioning GPUs to fit the
    entire model in HBM, ignoring the highly skewed (Zipfian) distribution of embedding lookups that makes
    host RAM caching viable.
  napkin_math: 'Total model size: 800B params * 2 bytes = 1.6 TB. Pure HBM approach: 1.6 TB / 80 GB/GPU
    = 20 GPUs (requires 3 nodes of 8 GPUs). Tiered approach: Hot 10% = 160 GB (fits in 2 GPUs). Tail 90%
    = 1.44 TB (easily fits in 1 node''s 2TB DDR5). GPUs per replica reduced from 24 to 2.'
