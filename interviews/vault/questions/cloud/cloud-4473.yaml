title: Embedding Gradient Sparsity and Optimizer Choice
scenario: 'A DLRM training system uses the Adam optimizer for all parameters including embedding tables. Training throughput is 25% slower than a comparable system using SGD.'
question: "Why is Adam slowing DLRM training on embedding tables, and which optimizer would you use for embeddings versus dense layers?"
details:
  realistic_solution: 'Optimizer selection by parameter type: (1) Embedding tables: use Adagrad or sparse Adam. These only update and store second moments for rows that received gradients in the current batch. Memory savings: if 1% of rows active per batch, dense Adam stores 3x memory for 100% of rows; sparse Adam stores for 1% of rows = 300x memory reduction for moment estimates. Speed: sparse update only touches active rows, reducing memory bandwidth. (2) Dense MLP layers: use Adam — fully dense gradients, moment estimates justified. (3) Implementation: PyTorch SparseAdam (torch.optim.SparseAdam) handles sparse gradients correctly. FBGEMM (Meta''s library) has optimized sparse embedding updates. (4) Learning rate schedule: Adagrad for embeddings has adaptive learning rate per row — rows with few updates get higher effective lr, good for tail items. Combined: Adagrad for embeddings + Adam for MLP. Training throughput improvement: expected 20-30% speedup from reduced optimizer memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Using Adam uniformly for all parameters, including sparse embedding tables.
    **The Rationale:** Adam is the default "best" optimizer in deep learning, and frameworks make it easy to apply to the entire model.
    **The Consequence:** Adam maintains two moment estimates (m, v) per parameter. For embedding tables where 99% of rows have zero gradients per batch, Adam stores 3x the memory and performs unnecessary memory-bandwidth-heavy updates on unused rows.
  napkin_math: |
    1. **Adam Memory Overhead:** A 10M row * 64 dim embedding table takes 2.56GB. Adam moment estimates (FP32) add 5.12GB.
    2. **Sparsity:** A batch of 4K samples with 10 lookups touches at most 40K unique rows (0.4% of 10M).
    3. **Sparse Adam:** Updating only the 0.4% of rows that have gradients reduces optimizer update time by ~75x.
    4. **Speedup:** If the optimizer step took 30% of total training time, reducing it by 75x gives a net **~42% speedup** on the optimizer step, yielding **~25% total training speedup**.
