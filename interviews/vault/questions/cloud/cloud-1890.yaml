title: SIMT Latency Hiding via Little's Law
scenario: You are writing a custom CUDA kernel for an NVIDIA A100 GPU to perform a massive element-wise
  transformation. The A100 has an HBM2e memory bandwidth of 2.0 TB/s, a memory access latency of 400 ns,
  and 108 Streaming Multiprocessors (SMs). Each thread loads a single 4-byte FP32 float before stalling.
  Calculate the minimum number of active threads required per SM to fully saturate the memory bandwidth
  and hide the memory latency via the SIMT execution model.
details:
  realistic_solution: 'Apply Little''s Law for SIMT memory latency hiding: Concurrency = Bandwidth × Latency.
    The GPU needs 800 KB of in-flight data. At 4 bytes per thread, 200,000 global active threads are required.
    Divided by 108 SMs, you need approximately 1,852 threads (or 58 warps of 32 threads) per SM.'
  common_mistake: Calculating thread requirements based solely on SM compute throughput (FLOPs) or assuming
    100% occupancy (2048 threads) is automatically required, rather than applying Little's Law to find
    the exact in-flight concurrency needed.
  napkin_math: Required Data In-Flight = 2.0 TB/s * 400 ns = (2.0 * 10^12 bytes/s) * (400 * 10^-9 s) =
    800,000 bytes. Global Threads = 800,000 bytes / 4 bytes_per_thread = 200,000 threads. Threads per
    SM = 200,000 / 108 SMs = 1,852 (approx 1,852 threads / SM).
