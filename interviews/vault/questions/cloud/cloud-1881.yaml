title: Evaluating Sharded Checkpointing for 70B LLMs
scenario: You are training a 70B parameter model on a 1024-GPU H100 cluster. Global checkpointing every 500 steps (gathering state to rank 0) takes over 45 minutes and frequently causes CPU RAM out-of-memory errors on the head node. You must evaluate migrating to distributed sharded checkpointing.
question: Should you migrate from global to distributed sharded checkpointing, and what trade-offs arise when resuming on a different cluster size?
details:
  realistic_solution: Implement PyTorch DCP (Distributed Checkpoint) or FSDP sharded state dicts. This distributes the 1.1TB total state (params, grads, optimizer) across 1024 workers, turning a single-node write bottleneck into 1024 parallel writes of ~1.1GB each directly to distributed storage.
  common_mistake: |
    **The Pitfall:** Focusing only on the head node's memory limits while failing to evaluate parallel I/O bandwidth benefits or cluster resiliency.
    **The Rationale:** Candidates recognize the OOM error but miss the broader implications of bottlenecking a 1024-GPU cluster's network on a single node.
    **The Consequence:** They propose partial fixes (like bigger head nodes) instead of fundamental architectural shifts, and ignore that pure sharded checkpoints cannot trivially resume on different cluster sizes.
  napkin_math: |
    - **Calculate total state:** 70B params * 16 bytes (FP32 Adam + FP16/BF16 weights) = ~1.12TB.
    - **Analyze Global write:** Rank 0 writes 1.12TB at max 5GB/s = 224 seconds theoretical minimum (often much slower due to network bounds).
    - **Analyze Sharded write:** 1024 GPUs write ~1.1GB each in parallel.
    - **Calculate total Sharded time:** At a conservative 200MB/s per GPU, total I/O time drops to **~5.5 seconds**.
