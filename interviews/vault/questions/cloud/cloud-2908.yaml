title: 'Mastery: explain why inverted residuals outperform standard bottlenecks on memory-bandwidth-limited hardware'
scenario: A senior engineer claims that inverted residuals in MobileNetV2 are faster than ResNet bottlenecks on an A100 purely because of fewer FLOPs. You disagree and believe the memory access pattern is equally important.
question: How would a roofline model argument using arithmetic intensity explain why inverted residuals outperform standard bottlenecks on bandwidth-limited hardware?
details:
  realistic_solution: 'A standard ResNet bottleneck uses a 3x3 convolution which, while compute-heavy, has high arithmetic intensity and is often compute-bound on A100. An inverted residual replaces this with a 1x1 expansion, a 3x3 depthwise convolution, and a 1x1 projection. Depthwise convolutions have extremely low arithmetic intensity (FLOPs scale linearly with channels, while memory also scales linearly), making them severely memory-bandwidth bound. The speedup of inverted residuals is therefore not proportional to the FLOP reduction because the depthwise layer bottleneck shifts from compute to memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Accepting the FLOP-only explanation for the speedup.
    **The Rationale:** It is mathematically true that depthwise convolutions have 10x fewer FLOPs, leading to a superficial conclusion.
    **The Consequence:** Engineers fail to realize that the bottleneck shifts from compute to memory bandwidth, leading to suboptimal hardware utilization and mispredicted performance scaling.
  napkin_math: |
    1. Calculate standard 3x3 conv intensity: FLOPs = H*W*C*C*9*2. Weights = 9*C*C*2 bytes (FP16). Intensity ≈ FLOPs/Weights = H*W. High intensity.
    2. Calculate depthwise 3x3 conv FLOPs: FLOPs = H*W*C*9*2.
    3. Calculate depthwise memory traffic: Weights = 9*C*2 bytes. Activations (input+output) = 4*H*W*C bytes.
    4. Calculate depthwise intensity: FLOPs/(Weights+Acts) ≈ 18*H*W*C / (18*C + 4*H*W*C) = 4.5 / (4.5/(H*W) + 1) ≈ 4.5 FLOPs/byte.
    5. Evaluate against Roofline: A100 FP16 tensor core ridge point is ~160 FLOPs/byte. Since 4.5 << 160, the depthwise layer is **purely bandwidth-bound**.
