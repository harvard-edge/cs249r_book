title: 'Mastery: explain why inverted residuals outperform standard bottlenecks on memory-bandwidth-limited hardware'
scenario: A senior engineer claims that inverted residuals in MobileNetV2 are faster than ResNet bottlenecks purely because of fewer FLOPs. You disagree and believe the memory access pattern is equally important.
question: How would a roofline model argument using arithmetic intensity explain why inverted residuals outperform standard bottlenecks on bandwidth-limited hardware?
details:
  realistic_solution: 'A standard ResNet bottleneck uses a 3x3 dense convolution which possesses high arithmetic intensity and resides in the compute-bound regime. An inverted residual replaces this with a depthwise separable convolution. While depthwise layers radically reduce FLOPs, they pull the operation below the hardware ridge point, rendering it severely memory-bandwidth bound. The end-to-end speedup is dictated by HBM throughput, not the 10x raw mathematical FLOP reduction.'
  common_mistake: |
    **The Pitfall:** Blindly accepting the FLOP-only explanation for the speedup.
    **The Rationale:** It is mathematically factual that depthwise convolutions require an order of magnitude fewer FLOPs, creating a seductive surface-level conclusion.
    **The Consequence:** Engineers fail to realize the bottleneck has shifted domains; they attempt to optimize compute on a layer that is starving for memory bandwidth, yielding zero gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard 3x3 Conv FLOPs ≈ H*W*C*C*18. Weights ≈ 18*C*C.
    - Depthwise 3x3 Conv FLOPs ≈ H*W*C*18. Weights ≈ 18*C. Acts ≈ 4*H*W*C.
    - Hardware Ridge Point: ~160 FLOPs/byte.

    **Calculations:**
    - Standard AI: FLOPs / Weights ≈ H*W. (High, Compute-Bound).
    - Depthwise AI: FLOPs / (Weights + Acts) ≈ 18*H*W*C / (18*C + 4*H*W*C) ≈ 4.5 FLOPs/byte.

    **Conclusion & Interpretation:**
    - **Result: 4.5 FLOPs/byte (Memory-Bandwidth Bound)**. At 4.5 FLOPs/byte, depthwise convolutions sit far below the 160 FLOPs/byte ridge point.
