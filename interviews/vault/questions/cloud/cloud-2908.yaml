title: 'Mastery: explain why inverted residuals outperform standard bottlenecks on
  memory-bandwidth-limited hardware'
scenario: A senior engineer claims that inverted residuals in MobileNetV2 are faster
  than ResNet bottlenecks on A100 purely because of fewer FLOPs. You disagree and
  believe the memory access pattern is equally important. Construct a roofline model
  argument using the A100's arithmetic intensity threshold to explain the performance
  difference.
question: How would a roofline model on A100 show that MobileNetV2 inverted residual
  speedups are not explained by FLOPs alone?
details:
  realistic_solution: 'A standard ResNet bottleneck uses a 3x3 convolution which, while compute-heavy, has high arithmetic intensity and is often compute-bound on A100. An inverted residual replaces this with a 1x1 expansion, a 3x3 depthwise convolution, and a 1x1 projection. Depthwise convolutions have extremely low arithmetic intensity (FLOPs scale linearly with channels, while memory also scales linearly), making them severely memory-bandwidth bound. The speedup of inverted residuals on A100 is therefore not proportional to the FLOP reduction (often 10x fewer FLOPs) because the depthwise layer bottleneck shifts from compute to memory bandwidth. A roofline model shows the depthwise layer operating far to the left of the ridge point.'
  common_mistake: 'Accepting the FLOP-only explanation without analyzing that the depthwise layer in inverted residuals has much lower arithmetic intensity than standard convolutions, meaning it hits the memory bandwidth ceiling.'
  napkin_math: 'For a 3x3 standard conv with C channels: FLOPs = H*W*C*C*9*2, Weights = 9*C*C*2 bytes (FP16). Intensity \approx FLOPs/Weights = H*W. For a 3x3 depthwise conv: FLOPs = H*W*C*9*2, Weights = 9*C*2 bytes. Activations = 4*H*W*C bytes (input+output). Intensity \approx FLOPs/(Weights+Acts) \approx 18*H*W*C / (18*C + 4*H*W*C) = 4.5 / (4.5/(H*W) + 1) \approx 4.5 FLOPs/byte. A100 FP16 tensor core ridge point is ~160 FLOPs/byte. Depthwise is purely bandwidth-bound (4.5 << 160).'
