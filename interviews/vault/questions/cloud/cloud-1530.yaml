title: Analyzing FFN Layer Bottlenecks on A100 GPUs
scenario: You are optimizing a large language model's feed-forward network (FFN) layer for deployment
  on an NVIDIA A100 GPU (1555 GB/s memory bandwidth, 312 TFLOPS FP16 compute). The FFN consists of two
  linear layers with an input/output dimension of 8192 and a hidden dimension of 32768. During autoregressive
  generation (batch size = 1, sequence length = 1), calculate the arithmetic intensity of this workload
  and determine the expected execution time assuming theoretical peak hardware utilization.
question: "What is the FFN's arithmetic intensity during batch-1 autoregressive generation, and what execution time should the A100 achieve?"
details:
  realistic_solution: First, calculate the memory footprint of the weights and the required FLOPs. Then,
    compute the arithmetic intensity (FLOPs/Byte) and compare it to the hardware's ridge point to determine
    if the workload is compute-bound or memory-bound. Finally, use the limiting factor (in this case,
    memory bandwidth) to calculate the execution time.
  common_mistake: Candidates often compare total FLOPs directly against the 312 TFLOPS peak compute, assuming
    the GPU will operate at maximum compute efficiency without calculating arithmetic intensity or considering
    the memory bandwidth limit.
  napkin_math: '1. Parameters: 2 layers * (8192 * 32768) = 536.8M params.

    2. Memory (FP16): 536.8M * 2 bytes = 1.07 GB.

    3. Compute (FLOPs): 2 * (2 * M * N * K) where M=1 (batch*seq) -> 2 * 2 * 1 * 8192 * 32768 = 1.07 GFLOPs.

    4. Arithmetic Intensity: 1.07 GFLOPs / 1.07 GB = 1 FLOP/Byte.

    5. A100 Ridge Point: 312 TFLOPS / 1.555 TB/s = 200 FLOPs/Byte.

    6. Bottleneck: 1 FLOP/Byte << 200 FLOPs/Byte, so it is extremely memory-bound.

    7. Execution Time: 1.07 GB / 1555 GB/s ≈ 0.69 milliseconds.'
