title: The Micro-Benchmark Mirage
scenario: Your team micro-benchmarks a new attention kernel and measures a 2.5x speedup over the baseline. You integrate it into your Llama-70B serving pipeline. End-to-end throughput improves by only 8%. The PM is disappointed. You need to explain the gap between the micro-benchmark result and the end-to-end improvement.
question: Why did a 2.5x attention kernel micro-benchmark speedup yield only an 8% end-to-end Llama-70B throughput gain?
details:
  realistic_solution: 'The attention kernel is only one component of the forward pass. In a 70B model, the forward pass includes embedding lookups, ~80 transformer blocks (each with attention + FFN), layer norms, and the output projection. If the attention computation accounts for ~30% of total inference time, Amdahl''s Law gives: Speedup = 1 / ((1 - 0.30) + 0.30/2.5) = 1 / (0.70 + 0.12) = 1.22x, or a 22% improvement — closer to the observed 8% when you account for additional overheads (memory allocation, kernel launch latency, reduced batching efficiency due to changed memory access patterns). The micro-benchmark isolated the kernel from these system-level effects. A 2.5x kernel speedup corresponds to a 150% improvement, while the 8% end-to-end gain is an 18.75x smaller benefit — exactly why MLPerf requires E2E benchmarks rather than kernel-level benchmarks for submission.'
  common_mistake: |
    **The Pitfall:** Assuming a 2.5x kernel speedup translates directly to a proportional end-to-end speedup.
    **The Rationale:** Failing to account for Amdahl's Law and the non-accelerated portions of the workload.
    **The Consequence:** Overpromising performance gains to stakeholders and violating MLPerf E2E benchmark principles.
  napkin_math: |
    - Attention fraction of total time: ~30%.
    - Amdahl's Law theoretical max: S = 1 / (0.70 + 0.30 / 2.5) = 1 / 0.82 = 1.22x.
    - Real-world overhead (kernel launch, memory fragmentation) reduces this to ~1.08x.
    - A 2.5x micro-benchmark speedup is a 150% improvement.
    - A 1.08x end-to-end speedup is an 8% improvement.
    - **The 2.5x micro-benchmark overstates the impact by 18.75x (150% / 8%).**
