title: The Chinchilla Compute Budget
scenario: You're scoping the training budget for a new 100-billion parameter dense transformer model.
  Your team plans to follow the Chinchilla scaling laws for an optimally-trained model.
details:
  realistic_solution: 'The correct approach uses two key formulas from scaling laws. First, the Chinchilla-optimal
    number of training tokens (`D`) is roughly 20 times the number of non-embedding parameters (`P`).
    Second, the total training compute (`C`) is approximately `6PD` FLOPs. This factor of 6 accounts for
    the forward pass (2PD) and the more computationally expensive backward pass (4PD). For a 100B parameter
    model: D = 20 × 100B = 2 Trillion tokens. C = 6 × 100B × 2T = 1.2 × 10^24 FLOPs. This compute budget
    determines the training cost and timeline, which are the key inputs for the team''s resource planning.'
  common_mistake: The most common mistake is to underestimate the cost of the backward pass. Many engineers
    incorrectly assume training FLOPs are simply `2PD` (a forward pass and an equally expensive backward
    pass). In reality, the backward pass requires re-computation and gradient calculations that make it
    approximately twice as expensive as the forward pass, leading to the `6PD` approximation (`2PD` for
    forward, `4PD` for backward).
  napkin_math: '1. **Parameters (P):** 100 Billion (`1e11`). 2. **Optimal tokens (D):** D = 20 × P = 20
    × 1e11 = 2 × 10^12 = **2 Trillion tokens**. 3. **Training compute (C):** C = 6 × P × D = 6 × 1e11
    × 2e12 = **1.2 × 10^24 FLOPs** (1.2 YottaFLOPs). 4. **Estimate training time on H100 cluster:** Single
    H100 at 989 TFLOPS, assume 50% MFU: effective = 494.5 TFLOPS. Time on 1 GPU = 1.2e24 / 494.5e12 =
    2.43 × 10^9 seconds ≈ 77 GPU-years. With 1,000 H100s: 77 years / 1,000 = ~28 days. With 4,000 H100s:
    ~7 days. 5. **Cost estimate:** 4,000 H100s at $2/GPU-hr for 7 days: 4,000 × $2 × 168 = **$1.34M**
    in cloud compute. 6. **Key insight:** The 6PD formula shows training compute scales linearly with
    both model size and data size — doubling either doubles the budget.'
  options:
  - 4.0 x 10^23 FLOPs
  - 1.2 x 10^23 FLOPs
  - 1.2 x 10^24 FLOPs
  - 6.0 x 10^22 FLOPs
  correct_index: 2
