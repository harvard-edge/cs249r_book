title: Consistent Hashing for Model-Aware Request Routing
scenario: Your inference platform serves 20 fine-tuned model variants across 32 H100 GPUs. Loading a model
  cold takes 3 seconds. You use consistent hashing to route requests for the same model variant to the
  same GPU, keeping models warm. When a GPU fails and is replaced, how does consistent hashing minimize
  disruption compared to modular hashing, and how do you handle the cold-start penalty?
question: "How does consistent hashing reduce model remapping when a GPU fails, and how would you mitigate the 3-second cold-start penalty?"
details:
  realistic_solution: 'With modular hashing (model_id % 32), removing one GPU changes the mapping for
    ~31 of 32 GPUs (97% disruption). With consistent hashing, each GPU occupies points on a hash ring.
    Removing one GPU only remaps its models to the next GPU on the ring — affecting only 1/32 ≈ 3% of
    mappings. Using virtual nodes (150-200 per physical GPU), the load stays balanced. Cold-start mitigation:
    (1) when a GPU is flagged for replacement, pre-warm the replacement by proactively loading the models
    that will hash to it, (2) maintain a shadow copy of each model on a secondary GPU (replica ring),
    so failover is instant, (3) use the mmap approach — models stay in host page cache, and remapped models
    load in <0.5s instead of 3s if pages are warm. Trade-off: shadow copies cost 2× GPU memory but eliminate
    cold starts entirely.'
  common_mistake: Using modular hashing (model_id % num_gpus). When a GPU is removed or added, nearly
    all model-to-GPU mappings change, causing a storm of cold starts across the cluster.
  napkin_math: 'Modular hash: 1 GPU failure → 97% remapping → 19 cold starts × 3s = 57s of degraded service.
    Consistent hash: 1 GPU failure → 3% remapping → 1 cold start × 3s. With mmap warm cache: 0.5s. With
    shadow replicas: 0s failover.'
