title: The Multi-Model Feature Platform
scenario: You are the tech lead for a platform team at a company with 50 ML models across various domains. Each team has built its own feature computation and storage, resulting in duplicated pipelines and a total infrastructure cost of $5M/year.
question: How would you design a centralized feature platform for 50 models that shares computation while preserving team independence?
details:
  realistic_solution: '**Architecture: Federated feature platform with shared infrastructure, decentralized ownership.** **(1) Shared layer (platform team owns):** Feature store infrastructure (Redis cluster for online, BigQuery/Hive for offline), stream processing framework (managed Flink), feature registry (metadata, lineage, schema validation), and monitoring/alerting. **(2) Team-owned layer:** Feature definitions (written in a shared DSL), feature-specific SLOs, A/B testing of new features, and per-model feature selection. **(3) Computation sharing:** The registry identifies when multiple teams compute semantically identical features (e.g., ''user_last_login'' computed by 4 teams). These are promoted to ''shared features'' — computed once, served to all. Analysis typically shows 30-40% of features are duplicates. **(4) Isolation guarantees:** Per-team resource quotas (CPU, memory, Flink slots), per-team namespaces in the feature store, per-team deployment pipelines. A broken feature pipeline in the Ads team cannot affect Search team features. **(5) Migration strategy:** Don''t big-bang migrate. Start with the shared features layer (highest ROI: eliminate 30-40% duplication). Let teams migrate voluntarily by making the platform easier than DIY. **(6) Governance:** Feature deprecation policy (features unused for 90 days are flagged), cost attribution (each team sees their feature platform bill), and compliance audit trail (which features feed which models, for regulatory requirements).'
  common_mistake: |
    **The Pitfall:** Designing a rigid, monolithic feature platform.
    **The Rationale:** Architects try to mandate that all teams adopt the exact same tools, timelines, and release cadences in the name of efficiency.
    **The Consequence:** Creating a massive coordination bottleneck that slows down iteration speed, leading teams to build shadow IT platforms to bypass the centralized system.
  napkin_math: |
    1. Current infrastructure cost: $5M/yr across 50 models.
    2. Assume ~35% of features are duplicates. Deduplication savings = $5M × 0.35 = $1.75M/yr.
    3. Platform operational efficiency (shared infra, auto-scaling) saves an additional 15% = $750K/yr.
    4. Total gross savings = $2.5M/yr.
    5. Platform team cost: 6 engineers × $300K/yr = $1.8M/yr.
    6. **Net savings of $700K/yr while massively improving velocity by eliminating duplicate work.**
