title: The Multi-Model Feature Platform
scenario: You are the tech lead for a platform team at a company with 50 ML models across search, recommendations,
  ads, and trust & safety. Each team has built its own feature computation and storage. Total infrastructure
  cost is $5M/year across duplicated pipelines. Design a centralized feature platform that serves all
  50 models with shared computation, while allowing individual teams to iterate independently on their
  own features. Address the organizational and technical tradeoffs.
question: "How would you design a centralized feature platform for 50 models that shares computation while preserving team independence?"
details:
  realistic_solution: '**Architecture: Federated feature platform with shared infrastructure, decentralized
    ownership.** **(1) Shared layer (platform team owns):** Feature store infrastructure (Redis cluster
    for online, BigQuery/Hive for offline), stream processing framework (managed Flink), feature registry
    (metadata, lineage, schema validation), and monitoring/alerting. **(2) Team-owned layer:** Feature
    definitions (written in a shared DSL), feature-specific SLOs, A/B testing of new features, and per-model
    feature selection. **(3) Computation sharing:** The registry identifies when multiple teams compute
    semantically identical features (e.g., ''user_last_login'' computed by 4 teams). These are promoted
    to ''shared features'' — computed once, served to all. Analysis typically shows 30-40% of features
    are duplicates. **(4) Isolation guarantees:** Per-team resource quotas (CPU, memory, Flink slots),
    per-team namespaces in the feature store, per-team deployment pipelines. A broken feature pipeline
    in the Ads team cannot affect Search team features. **(5) Migration strategy:** Don''t big-bang migrate.
    Start with the shared features layer (highest ROI: eliminate 30-40% duplication). Let teams migrate
    voluntarily by making the platform easier than DIY. **(6) Governance:** Feature deprecation policy
    (features unused for 90 days are flagged), cost attribution (each team sees their feature platform
    bill), and compliance audit trail (which features feed which models, for regulatory requirements).'
  common_mistake: Designing a monolithic feature platform that requires all teams to adopt the same tools,
    timelines, and release cadences. This creates a coordination bottleneck that slows everyone down —
    the cure is worse than the disease.
  napkin_math: 'Current: $5M/yr across 50 models. Duplicate features: ~35% of 300 total unique features
    are computed 2-4 times. Deduplication saves: $5M × 0.35 = $1.75M/yr. Platform operational efficiency
    (shared infra, auto-scaling): additional 15% savings = $750K. Total savings: ~$2.5M/yr (50% reduction).
    Platform team cost: 6 engineers × $300K fully loaded = $1.8M/yr. Net savings: $700K/yr + massive velocity
    improvement (teams ship features in hours, not weeks).'
