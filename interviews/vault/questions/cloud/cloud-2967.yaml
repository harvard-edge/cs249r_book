title: 'Dataset Curation: Realize Multi-Modal Dataset Storage and Access Architecture'
scenario: 'You are building the data infrastructure for training a 20B vision-language model on a 128 GPU cluster. The dataset contains 1B image-text pairs: images average 200KB (JPEG), text average 500 bytes.'
question: What storage, indexing, and DataLoader architecture would sustain training on 1B image-text pairs for the 20B vision-language model?
details:
  realistic_solution: "Pre-process: resize images to 224\\times224, store as uint8 tensors in WebDataset tar shards. Each shard = 10K samples. Pre-compute image features if using frozen vision encoder. Use DALI for GPU-accelerated decoding if needed."
  common_mistake: |
    **The Pitfall:** Storing raw JPEGs and decoding on-the-fly without pre-resizing.
    **The Rationale:** Assuming that the DataLoader pipeline can effortlessly handle raw JPEGs over the network.
    **The Consequence:** CPU decoding overhead eats into DataLoader capacity, leaving GPUs starved for data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Raw Data: 1B images \times 200KB = 200 TB.
       * Throughput Requirement: 128 GPUs, batch=512, time/batch=0.5sec \rightarrow 1024 samples/sec.
       * WebDataset pre-processed shards: 224x224x3 uint8 = 150KB/image.
    2. **Calculations:**
       * Pre-processed Storage: 1B \times 150KB = 150 TB.
       * Data Rate: 1024 samples/sec \times 150.5KB = ~154.1 MB/sec.
       * DataLoader CPU Cost: 1024 samples/sec decoded across 128 workers = 8 samples/worker/sec. CPU decode at 50 img/sec/core = 0.16 cores/worker.
    3. **Conclusion & Interpretation:**
       * Sequential shard reads easily sustain **154.1 MB/sec** with negligible CPU overhead. **Result: I/O-Bound (Sequential Read Optimized)**.
