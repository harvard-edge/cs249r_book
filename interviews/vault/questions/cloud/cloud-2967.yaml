title: 'Dataset Curation: Realize Multi-Modal Dataset Storage and Access Architecture'
scenario: You are building the data infrastructure for training a 20B vision-language model on 128 H100s. The dataset contains 1B image-text pairs: images average 200KB (JPEG), text average 500 bytes.
question: What storage, indexing, and DataLoader architecture would sustain training on 1B image-text pairs for the 20B vision-language model?
details:
  realistic_solution: "Pre-process: resize images to 224×224, store as uint8 tensors in WebDataset tar shards. Each shard = 10K samples. Pre-compute image features if using frozen vision encoder. Use DALI for GPU-accelerated decoding if needed."
  common_mistake: |
    **The Pitfall:** Storing raw JPEGs and decoding on-the-fly without pre-resizing.
    **The Rationale:** Assuming that the DataLoader pipeline can effortlessly handle raw JPEGs over the network.
    **The Consequence:** CPU decoding overhead eats into DataLoader capacity, leaving GPUs starved for data.
  napkin_math: |
    *   **Raw Data:** 1B images × 200KB = 200TB raw.
    *   **Pre-processed Data:** Resize to 224x224x3 uint8 = 150KB/image. 1B × 150KB = 150TB.
    *   **Throughput Required:** 128 H100s, batch=512, time/batch=0.5sec $\rightarrow$ 1024 samples/sec.
    *   **Data Rate:** 1024 × (150KB + 0.5KB) = 154,112 KB/sec = **~154.1 MB/sec**.
    *   **Storage Need:** S3/GCS can easily deliver 154 MB/s sequential read for WebDataset shards.
    *   **DataLoader CPU Cost:** 1024 samples/sec decoded across 128 workers = 8 samples/worker/sec. CPU decode at 50 img/sec/core $\rightarrow$ **0.16 cores/worker** (very manageable).
