title: Feature Store Monitoring and Drift Detection
scenario: Your feature store serves 800 features to 30 models. You need to detect
  feature drift but computing full distribution statistics for all 800 features on
  every batch pipeline run (hourly) is too expensive — it adds 45 minutes to a 15-minute
  pipeline. Design a cost-effective monitoring strategy that catches meaningful drift
  without doubling pipeline cost.
question: How would you monitor drift across 800 hourly features without adding 45
  minutes to the 15-minute pipeline?
details:
  realistic_solution: 'Tiered monitoring strategy: (1) Tier 1 (every run): compute
    lightweight statistics (mean, stddev, null rate, min, max) for all 800 features
    — these are single-pass aggregations that add <1 minute to the pipeline. Alert
    on deviations >3σ from trailing 7-day statistics. (2) Tier 2 (daily): compute
    full distribution metrics (KL divergence, KS test, quantile comparison) only for
    features flagged by Tier 1 or features with high model importance scores (top
    20%). ~160 features × full stats = 10 minutes. (3) Tier 3 (weekly): complete population
    stability index (PSI) across all 800 features as a batch audit job, running outside
    the critical pipeline path. This catches slow drift that Tier 1 misses.'
  common_mistake: Computing KL divergence or KS tests for all 800 features every hour.
    Full distribution comparison requires sorting and binning, which is expensive
    at scale and wasteful — most features are stable most of the time.
  napkin_math: 'Tier 1: 800 features × 5 statistics × single-pass = ~45 seconds added
    to pipeline. Tier 2: 160 features × KL divergence (requires histogram binning)
    = ~10 minutes daily. Tier 3: 800 features × PSI = ~45 minutes weekly (off-path).
    Total monitoring cost: 45s/hr + 10min/day + 45min/week ≈ $15/month compute. vs.
    full monitoring every hour: 45min × 24 × 30 ≈ $2,400/month. 160× cheaper.'
