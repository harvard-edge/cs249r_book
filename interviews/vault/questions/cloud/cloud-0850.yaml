title: AOC Power and Latency Overhead Calculation
scenario: You are provisioning a distributed training cluster. Intra-rack connections use Direct Attach Copper (DAC), but inter-rack spine connections require 45-meter runs, mandating 400G Active Optical Cables (AOCs). You are deploying 128 inter-rack AOC links. Each 400G AOC transceiver consumes 12W per end for electro-optical conversion, and the onboard DSP/FEC adds 100ns of latency per end.
question: Calculate the total continuous power overhead of the AOC fabric and the one-way latency penalty for a cross-rack GPU-to-GPU message compared to a local DAC-only route.
details:
  realistic_solution: Account for both ends of every cable. For 128 links, there are 256 transceivers drawing power. For a cross-rack traversal (Leaf to Spine, Spine to Leaf), the signal undergoes 4 electro-optical conversions (2 per cable).
  common_mistake: |
    **The Pitfall:** Forgetting that AOCs have active transceivers on both ends that draw power.
    **The Rationale:** Engineers often treat AOCs like passive DAC cables in power budgeting.
    **The Consequence:** Under-provisioning the rack power budget and failing to multiply FEC latency across multi-hop paths.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128 inter-rack links (2 ends each).
       - 12W per end, 100ns latency per end.
       - Cross-rack path = 2 links (4 ends).
    2. **Calculations:**
       - Total power: 256 * 12W = 3,072W (3.1 kW).
       - Latency penalty: 4 ends * 100ns = 400ns.
    3. **Conclusion & Interpretation:**
       - **Result: 3.1 kW overhead and 400ns one-way latency penalty.**
