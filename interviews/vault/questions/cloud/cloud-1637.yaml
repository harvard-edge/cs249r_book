title: NPU Thermal Constraints and Edge Compute Limits
scenario: You are migrating a cloud-based video analytics pipeline to a fleet of edge cameras to reduce
  cloud ingress costs. The MobileNet-based object detector requires 2 GOPs per frame, with a target of
  30 FPS (60 GOPs/sec). The camera's SoC features an embedded CPU with an efficiency of 2 GOPs/Watt and
  an NPU accelerator with 20 GOPs/Watt. The device has a strict thermal envelope allowing a maximum of
  4 Watts for ML compute. Calculate the maximum sustainable frame rate on both the CPU and NPU before
  throttling.
details:
  realistic_solution: Calculate the power-constrained operations per second by multiplying the architectural
    efficiency (GOPs/W) by the thermal envelope (W), then divide by the model's inference cost to find
    the thermally-sustained FPS.
  common_mistake: Calculating frame rates based on the peak theoretical INT8/FP16 throughput of the chip
    while ignoring the device's thermal design power (TDP) ceiling.
  napkin_math: 'Power Budget = 4W. Model Cost = 2 GOPs/frame.

    CPU Sustained: 2 GOPs/W * 4W = 8 GOPs/sec max -> 8 / 2 = 4 FPS (Fails 30 FPS requirement).

    NPU Sustained: 20 GOPs/W * 4W = 80 GOPs/sec max -> 80 / 2 = 40 FPS (Passes 30 FPS requirement natively).'
