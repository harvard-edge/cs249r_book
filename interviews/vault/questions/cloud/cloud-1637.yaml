title: NPU Thermal Constraints and Edge Compute Limits
scenario: You are migrating a cloud-based video analytics pipeline to a fleet of edge cameras to reduce cloud ingress costs. The MobileNet-based object detector requires 2 GOPs per frame, with a target of 30 FPS (60 GOPs/sec). The camera's SoC features an embedded CPU with an efficiency of 2 GOPs/Watt and an NPU accelerator with 20 GOPs/Watt. The device has a strict thermal envelope allowing a maximum of 4 Watts for ML compute.
question: "What maximum sustainable frame rate can the CPU and NPU each achieve within the 4W ML thermal envelope?"
details:
  realistic_solution: Calculate the power-constrained operations per second by multiplying the architectural efficiency (GOPs/W) by the thermal envelope (W), then divide by the model's inference cost to find the thermally-sustained FPS.
  common_mistake: |
    **The Pitfall:** Calculating frame rates based on peak theoretical throughput while ignoring thermal limits.
    **The Rationale:** Engineers rely on marketing numbers for INT8/FP16 performance rather than power-constrained operational limits.
    **The Consequence:** The device suffers from thermal throttling, failing to sustain the required 30 FPS in production.
  napkin_math: |
    *   **CPU Sustained:** $2 \text{ GOPs/W} \times 4\text{W} = 8 \text{ GOPs/sec}$. $8 / 2 \text{ GOPs/frame} = 4 \text{ FPS}$.
    *   **NPU Sustained:** $20 \text{ GOPs/W} \times 4\text{W} = 80 \text{ GOPs/sec}$. $80 / 2 \text{ GOPs/frame} = 40 \text{ FPS}$.
    *   **Result:** **The CPU manages only 4 FPS, while the NPU achieves 40 FPS, successfully meeting the 30 FPS requirement.**
