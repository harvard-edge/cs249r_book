title: Mitigating Checkpoint Storms in LLM Training
scenario: You are architecting the checkpointing mechanism for a 175B parameter model training on 256 compute nodes (2,048 GPUs). A full checkpoint totals approximately 2.45 TB. Writing directly to a centralized NFS cluster capable of 10 GB/s stalls training for over 4 minutes per checkpoint.
question: Should you buy 500GB/s Lustre or use two-tier local-NVMe checkpointing for the 2.45TB checkpoints, and why?
details:
  realistic_solution: Adopt a two-tier asynchronous checkpointing strategy. GPUs dump their sharded state locally to node-attached NVMe SSDs in ~1 second (each node writes only ~9.6 GB at ~10 GB/s), allowing compute to resume immediately. A background daemon then asynchronously replicates the checkpoint to durable object storage at ~1.4 GB/s continuous load before the next checkpoint interval. This cuts GPU idle time from 245s (NFS) to ~1s while avoiding the $500K-$1M cost of a dedicated Lustre deployment.
  common_mistake: |
    **The Pitfall:** Defaulting to expensive parallel file systems like Lustre or GPFS.
    **The Rationale:** Engineers look at the aggregate bandwidth required and overprovision centralized storage.
    **The Consequence:** The massive shared storage bandwidth sits idle 99% of the time between infrequent checkpoint events, resulting in severe cost-inefficiency.
  napkin_math: |
    - **NFS stall time:** 2.45 TB / 10 GB/s = ~245s (~4 minutes).
    - **Lustre stall time:** 2.45 TB / 500 GB/s = ~5s.
    - **Local NVMe tiering:** Each node holds ~2.45 TB / 256 nodes = ~9.6 GB of state.
    - **Local write time:** ~9.6 GB / 10 GB/s (NVMe speed) = **~1s**.
    - **Async transfer:** 2.45 TB / 1800s (30-min interval) = ~1.4 GB/s continuous network load.
    - **Conclusion:** Two-tier cuts GPU idle time to ~1s without the $500K+ cost of Lustre.
