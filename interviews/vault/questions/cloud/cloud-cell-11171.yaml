title: 'Dataset Curation: Realize Data Versioning Infrastructure for Continuous LLM Training'
scenario: 'Realize the data versioning infrastructure for a continuous LLM training system on 256 H100s
  (80GB HBM3). New data arrives weekly (100M tokens per week). The system must support: reproducible training
  runs, rollback to previous data versions, A/B testing of dataset compositions, and audit trails for
  all data decisions.'
question: "How would you design the data versioning system to support weekly data arrivals, reproducible runs, rollback, A/B mixes, and audit trails?"
details:
  realistic_solution: Use DVC (Data Version Control) or a custom manifest system. Store data in immutable
    content-addressed chunks (SHA256). Manifests are small (version-controlled), actual data in object
    storage. Rollback = switch manifest.
  common_mistake: Using git for large binary dataset files (impractical for TB-scale data); not tracking
    data provenance for individual examples; not designing for compute-efficient rollback.
  napkin_math: 'Weekly ingestion: 100M tokens × 4B = 400MB/week. After 1 year: 52 × 400MB = 20.8GB new
    data/year. Total dataset: ~10TB. Content-addressed chunks: split data into 64MB chunks. SHA256 per
    chunk: 64MB × 10TB/64MB = 156,250 chunks. Manifest: 156,250 × 32B SHA256 = 5MB manifest file. Version
    manifest in git: trivial. Rollback: switch manifest pointer, re-mount data via content-addressed storage
    = instantaneous (< 1 second). A/B dataset testing: create two manifest files with different mixing
    ratios. Training job reads manifest at start. No data copying needed. Audit trail: manifest includes:
    dataset_version, creation_date, filtering_params, dedup_params, mixing_weights, annotated by (human/automated).
    Storage: git history of 52 weekly manifests × 5MB = 260MB git history/year = trivial. Actual data:
    10TB in S3 (immutable, content-addressed). Cost: 10TB × $0.023/GB = $235/month.'
