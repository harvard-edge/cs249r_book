title: Scaling Checkpoints for ZeRO-3
scenario: You are training a 175B parameter LLM using ZeRO-3 on 128 compute nodes, each with 8x A100 80GB GPUs. The full model state requires 2.1 TB of storage. Your cloud provider limits single-node network egress to 400 Gbps, and shared object storage limits throughput to 100 Gbps per prefix.
question: How should you checkpoint the 2.1TB ZeRO-3 state to minimize pause time and avoid object-storage prefix throttling?
details:
  realistic_solution: Implement distributed checkpointing where each of the 128 nodes writes its local partitions in parallel. To bypass the 100 Gbps per-prefix object storage bottleneck, prepend a hash of the node ID to the storage path, distributing the 2.1 TB write across 128 distinct prefixes for massive aggregate throughput.
  common_mistake: |
    **The Pitfall:** Relying on Rank 0 to gather and write the entire checkpoint.
    **The Rationale:** Candidates default to standard PyTorch checkpointing paradigms, ignoring the single-node egress limit and storage API prefix bottlenecks at scale.
    **The Consequence:** Checkpointing takes several minutes, wasting thousands of dollars of idle GPU compute per save and risking API throttling.
  napkin_math: |
    1. Centralized checkpointing: 2,100 GB written to one prefix at 12.5 GB/s (100 Gbps limit) = 168 seconds.
    2. Distributed checkpointing with hashed prefixes: 128 nodes use 128 unique prefixes.
    3. Aggregate throughput limit: 128 × 12.5 GB/s = 1,600 GB/s.
    4. New checkpoint time: 2,100 GB / 1,600 GB/s = 1.31 seconds.
    5. **Distributed hashed prefixes reduce checkpoint pause time from 168s to 1.3s, saving nearly 3 minutes of idle compute across 1,024 GPUs.**
