title: Evaluating Gradient Bucketing for Overlap
scenario: You are optimizing the distributed training of a 30B parameter LLM across 64 H100 GPUs (8 nodes,
  400 GB/s InfiniBand inter-node, NVLink intra-node) using PyTorch FSDP. Profiling reveals that GPU SMs
  stall frequently during the backward pass waiting for gradient reductions, and network utilization is
  bursty rather than sustained. You must evaluate the optimal gradient bucket size for AllGather/ReduceScatter
  operations and the associated CUDA stream configuration. Compare the trade-offs of using 10MB, 100MB,
  and 1GB buckets, and justify your design decision to maximize communication-computation overlap.
details:
  realistic_solution: The optimal bucket size balances kernel launch/network latency overhead with the
    ability to overlap communication with computation. A medium bucket size (~25MB to 100MB) is usually
    optimal. Using separate CUDA streams for AllReduce and compute, a 100MB bucket transfers in 0.25ms
    — fully hidden behind the 1.0ms backward compute per block. A 1GB bucket takes 2.5ms, stalling the
    next block by 1.5ms.
  common_mistake: Assuming that the largest possible bucket size (e.g., 1GB) is always optimal because
    it maximizes network bandwidth utilization per transfer. Candidates forget that large buckets delay
    the start of communication, preventing overlap with the backward pass and exposing the full transfer
    latency.
  napkin_math: 'At 400 GB/s IB bandwidth, transferring a 100MB bucket takes: 100 MB / 400 GB/s = 0.25
    ms. If a transformer block''s backward pass takes 1.0 ms to compute, the 0.25 ms communication is
    completely hidden. However, a 1GB bucket takes 2.5 ms to transfer. Since 2.5 ms > 1.0 ms compute time,
    the network transfer will stall the next block''s computation by at least 1.5 ms, exposing the communication
    overhead.'
