title: Power Capping Strategy for MI300X Training Under Budget Constraints
scenario: You manage a 512-accelerator MI300X training cluster. Each MI300X has a maximum TDP of 750W. The datacenter power contract caps your cluster at 300 kW total IT load. During peak matrix-multiply-heavy phases of training a 70B parameter model, power meters show the cluster drawing 380 kW, causing PDU overcurrent alarms. You must evaluate each option's effect on training throughput and energy efficiency.
question: How do static 590W caps, 25% batch-size reduction, and dynamic power capping affect throughput and energy efficiency under the 300 kW cap?
details:
  realistic_solution: 'Option A (static 590W cap): 512 × 590W = 302 kW, just under budget. Throughput loss is ~10-15%, not the expected 21.3%, because memory bandwidth is the bottleneck and HBM power consumption is less affected by compute power caps than CUDA core frequency. Option B (batch size -25%): Similar throughput reduction but also reduces gradient noise, potentially requiring more steps—net effect may be worse WCT. Option C (dynamic capping): Best option if the cluster has fine-grained power telemetry; cap during GEMM phases, release during all-reduce. In practice, Option A is simplest to implement reliably and within 5% of Option C''s performance.'
  common_mistake: |
    **The Pitfall:** Assuming power capping linearly reduces throughput (e.g., 78.7% power -> 78.7% throughput).
    **The Rationale:** Ignoring the fact that LLM training is predominantly memory-bandwidth-bound rather than pure compute-bound.
    **The Consequence:** Misjudging the impact of static power caps, which disproportionately reduce power draw from the HBM and idle logic without severely bottlenecking the actual memory-bound computation.
  napkin_math: |
    - Baseline: 512 × 750W = 384 kW (exceeds 300 kW by 28%).
    - Option A cap at 590W: 512 × 590W = 302 kW.
    - Reduction factor: 590/750 = 78.7%.
    - MI300X at 590W retains ~85-90% compute throughput due to memory-bandwidth saturation.
    - **Throughput loss is only ~12-15%, meaning Energy per token (EPI) actually improves by ~5-8% with static capping.**
    - Option B: 25% smaller batches = ~22% throughput reduction (compute underutilization).
    - Option C: Dynamic capping achieves ~5% better throughput than A with same power compliance.
