title: ONNX Graph Partitioning Across Mixed Execution Providers
scenario: 'Your ONNX model has 340 operators. When running on the TensorRT EP, 290 operators are assigned to TensorRT and 50 fall back to the CUDA EP. Each EP boundary incurs a device-to-device memory copy. You observe that inference latency is 40% higher than expected from pure GPU execution.'
question: "How would you reduce the 40% ONNX Runtime latency hit from 50 CUDA EP fallback ops among 340 operators?"
details:
  realistic_solution: 'Use ORT''s graph partitioning visualization to identify the 50 fallback ops. Common culprits: custom ops, unsupported dynamic shapes, or rare activations (like GELU exact mode). Options: (1) replace unsupported ops with TensorRT-compatible equivalents at export time, (2) write TensorRT plugins for the custom ops, (3) use ORT''s CUDA EP for the entire graph with operator-level TRT acceleration. Reducing EP boundaries from 20+ to 3-4 typically recovers 25-30% of the latency gap.'
  common_mistake: |
    **The Pitfall:** Ignoring the massive hidden cost of Execution Provider (EP) boundary transitions and assuming fallback operators merely run slightly slower.
    **The Rationale:** Engineers assume that since CUDA and TensorRT both execute on the GPU, transitioning between them is a zero-copy, seamless abstraction handled by ONNX Runtime.
    **The Consequence:** The model suffers severe latency degradation due to synchronous device-to-device memory copies and kernel launch overheads at every EP boundary, destroying the entire performance benefit of TensorRT.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 fallback operators scattered throughout the 340-operator graph.
       - This scatter results in ~20 Execution Provider (EP) boundary transitions.
       - EP boundary penalty (D2D copy + sync): ~0.2ms per boundary.
    2. **Calculations:**
       - Total boundary overhead = 20 boundaries × 0.2ms = 4.0ms latency penalty.
       - Expected latency target: 10.0ms.
       - Observed latency: 14.0ms (40% higher).
       - Consolidating fallbacks to reduce boundaries from 20 to 4: 4 × 0.2ms = 0.8ms penalty.
    3. **Conclusion & Interpretation:**
       - **Result: Sync-Overhead Bound**. The EP boundary fragmentation is the dominant bottleneck. Consolidating the graph or writing custom TensorRT plugins recovers over 25% of total end-to-end latency.
