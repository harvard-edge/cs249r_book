title: Implementing Rejection Sampling for Lossless Speculation
scenario: In speculative decoding, the verification step must produce exactly the same distribution as
  the target model alone. Given draft distribution q(x) and target distribution p(x), describe the rejection
  sampling procedure that guarantees this, and compute the expected cost when p and q diverge significantly
  (KL divergence = 0.5 nats).
details:
  realistic_solution: 'For each speculated token x_i sampled from q(x_i): accept with probability min(1,
    p(x_i)/q(x_i)). If rejected: sample a correction token from the adjusted distribution: p''(x) = max(0,
    p(x) - q(x)) / sum(max(0, p(x) - q(x))). This guarantees the output follows exactly p(x). Expected
    acceptance rate alpha = sum_x min(p(x), q(x)) = 1 - 0.5 * ||p - q||_1 (total variation distance).
    For KL(p||q) = 0.5 nats, by Pinsker''s inequality: TV <= sqrt(KL/2) = sqrt(0.25) = 0.5. So alpha >=
    1 - 0.5 x 0.5 = 0.75 (lower bound). Empirically, alpha ~ 0.78 for KL=0.5. The correction sampling
    adds overhead: computing max(0, p-q) requires the full vocabulary distribution (~128K entries), costing
    128K x 4B = 512KB per position, computed on GPU in <0.1ms.'
  common_mistake: Using simple argmax comparison instead of proper rejection sampling. Argmax matching
    is not distribution-preserving — it changes the sampling distribution of the target model, which can
    alter generation quality.
  napkin_math: 'Pinsker: TV <= sqrt(0.5/2) = 0.5. Alpha >= 1 - TV/2 = 0.75 (lower bound). Correction sampling:
    128K vocab x 4B = 512KB, ~0.1ms on H100. Negligible vs 25ms decode.'
