title: 'Network Bandwidth Bottlenecks: Realize AllReduce Data Volume for 70B Model Training'
scenario: You need to size the AllReduce data volume for training a 70B model (FP16 gradients) across 64 H100 GPUs with 8-way Data Parallelism (DP-8) and 8-way Tensor Parallelism (TP-8).
question: With 70B training on 64 H100s using TP-8 and DP-8, how much gradient data does each GPU AllReduce and how long does it take over 200Gb/s InfiniBand?
details:
  realistic_solution: 'TP-8: each GPU holds 70B/8=8.75B params × 2B = 17.5GB model. Gradient per GPU: 17.5GB. DP-8 AllReduce: ring-AllReduce data per GPU = 2×(8-1)/8 × 17.5GB = 30.6GB moved per GPU. Time over IB 25GB/s: 30.6/25=1.224s per step. That''s extremely slow! Fix: use ZeRO stage 3 to shard gradients: instead of AllReduce, use ReduceScatter+AllGather = same data but pipelined. ReduceScatter: (8-1)/8 × 17.5 = 15.3GB. Time: 15.3/25=0.61s. Still slow. Increase IB to 400Gb/s (50GB/s) or reduce DP degree.'
  common_mistake: |
    **The Pitfall:** AllReducing the full 70B gradient from every GPU.
    **The Rationale:** Candidates forget that under Tensor Parallelism, each DP rank only holds its specific TP shard of the model (70B / 8).
    **The Consequence:** Massively overestimating the required network bandwidth by a factor of 8.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B params (FP16).
       - Parallelism: DP-8, TP-8.
       - Network: InfiniBand 200Gb/s (25 GB/s).
       - Compute step time: ~500ms.
    2. **Calculations:**
       - Per GPU gradient size (TP-8): 70B / 8 = 8.75B params.
       - Per GPU gradient memory (FP16): 8.75B * 2 bytes = 17.5 GB.
       - Ring-AllReduce data moved: 2 * ((8-1)/8) * 17.5 GB = ~30.6 GB per GPU.
       - AllReduce time: 30.6 GB / 25 GB/s = 1.224 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. The 1.22s AllReduce adds massive overhead to a 500ms compute step, requiring ZeRO-3 or faster 400Gb/s networking.**
