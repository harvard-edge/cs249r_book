title: Failure Domain Concept
scenario: A Top-of-Rack (ToR) switch fails, taking down 16 GPU nodes.
question: What is a failure domain, and why does a ToR switch taking down 16 GPU nodes matter for ML job placement?
details:
  realistic_solution: 'A failure domain is the set of resources that share a single point of failure. When a ToR switch fails, all 16 nodes behind it lose network connectivity simultaneously — they form one failure domain. Failure domains exist at multiple levels: individual GPU (smallest), node (GPU + CPU + memory), rack (ToR switch + PDU), row (aggregation switch), and datacenter (power feed, cooling). For ML training, job placement must be failure-domain-aware: if all 16 nodes of a training job are behind one ToR switch, a single switch failure kills the entire job. Spreading the job across multiple racks means a single ToR failure only loses a fraction of workers, allowing the job to potentially continue with elastic training or recover faster from a partial checkpoint.'
  common_mistake: |
    **The Pitfall:** Thinking of infrastructure failures strictly as independent node-level events.
    **The Rationale:** Developers used to single-server environments assume failure probabilities are uniform across nodes, completely ignoring physical datacenter topology.
    **The Consequence:** A single switch or power unit failure wipes out an entire distributed training job because all workers were placed inside the same failure domain.
  napkin_math: |
    - **Failure Domain Size:** 16 nodes behind 1 ToR = 1 failure domain.
    - **Dense Placement:** Job on 16 nodes in 1 rack $\rightarrow$ 1 ToR failure loses 100% of workers (Job dies).
    - **Distributed Placement:** Job on 64 nodes across 4 racks $\rightarrow$ 1 ToR failure loses 25% of workers.
    - **Conclusion:** **Spreading placement across failure domains enables elastic recovery.**
