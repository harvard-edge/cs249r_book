title: Failure Domain Concept
scenario: A Top-of-Rack (ToR) switch fails, taking down 16 GPU nodes. Explain the concept of a failure
  domain and why understanding failure domains is critical for job placement in ML training clusters.
details:
  realistic_solution: 'A failure domain is the set of resources that share a single point of failure.
    When a ToR switch fails, all 16 nodes behind it lose network connectivity simultaneously — they form
    one failure domain. Failure domains exist at multiple levels: individual GPU (smallest), node (GPU
    + CPU + memory), rack (ToR switch + PDU), row (aggregation switch), and datacenter (power feed, cooling).
    For ML training, job placement must be failure-domain-aware: if all 16 nodes of a training job are
    behind one ToR switch, a single switch failure kills the entire job. Spreading the job across multiple
    racks means a single ToR failure only loses a fraction of workers, allowing the job to potentially
    continue with elastic training or recover faster from a partial checkpoint.'
  common_mistake: Thinking of failures as individual node events. A single switch or power distribution
    unit can take down dozens of nodes simultaneously — the failure domain is much larger than a single
    server.
  napkin_math: '16 nodes behind 1 ToR = 1 failure domain. Job on 64 nodes across 4 racks: 1 ToR failure
    loses 25% of workers, not 100%.'
