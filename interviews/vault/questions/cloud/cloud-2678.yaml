title: Depth vs Width for Limited Compute Budget
scenario: 'You have a fixed compute budget of 1 GFLOP per inference. Option A: deep narrow network (20
  layers, 64 filters each, ~0.9 GFLOP). Option B: shallow wide network (5 layers, 256 filters each, ~1.0
  GFLOP). Both train on CIFAR-10. Which likely achieves better accuracy?'
details:
  realistic_solution: 'Option A (deep narrow) likely wins for image classification. Empirical and theoretical
    evidence: (1) Depth provides compositional hierarchies — 20 layers can learn 20 levels of abstraction
    (edges → textures → parts → objects → scenes). Width at a fixed layer provides more features at the
    same abstraction level but cannot compose them further. (2) For CIFAR-10 (32×32 images, 10 classes),
    ResNet-20 (narrow, deep) outperforms wide shallow alternatives at similar FLOP budgets. (3) The depth
    efficiency theorem: deep networks can approximate certain functions exponentially more efficiently
    than shallow ones. However, caveat: 20 layers with 64 filters requires skip connections (ResNet-style)
    to train successfully. Without them, vanishing gradients make training 20 layers with 64 filters nearly
    impossible. If skip connections aren''t used, Option B (5 layers) wins because it actually trains.
    The answer depends on the architectural details, not just depth/width.'
  common_mistake: Ignoring that very deep narrow networks cannot be trained without skip connections.
    Theoretical depth advantage only materializes with proper gradient flow mechanisms (residual connections,
    normalization).
  napkin_math: 'ResNet-20 (64 filters): ~94% on CIFAR-10. Wide-5 (256 filters): ~91% on CIFAR-10. Deep
    wins by ~3% at similar FLOP budget. But only with skip connections.'
