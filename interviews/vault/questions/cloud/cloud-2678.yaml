title: Depth vs Width for Limited Compute Budget
scenario: 'You have a fixed compute budget of 1 GFLOP per inference. Option A: deep narrow network (20 layers, 64 filters each, ~0.9 GFLOP). Option B: shallow wide network (5 layers, 256 filters each, ~1.0 GFLOP). Both train on CIFAR-10.'
question: Which likely achieves better accuracy?
details:
  realistic_solution: 'Option A (deep narrow) likely wins for image classification. Empirical and theoretical evidence: (1) Depth provides compositional hierarchies — 20 layers can learn 20 levels of abstraction (edges → textures → parts → objects → scenes). Width at a fixed layer provides more features at the same abstraction level but cannot compose them further. (2) For CIFAR-10 (32×32 images, 10 classes), ResNet-20 (narrow, deep) outperforms wide shallow alternatives at similar FLOP budgets. (3) The depth efficiency theorem: deep networks can approximate certain functions exponentially more efficiently than shallow ones. However, caveat: 20 layers with 64 filters requires skip connections (ResNet-style) to train successfully. Without them, vanishing gradients make training 20 layers with 64 filters nearly impossible. If skip connections aren''t used, Option B (5 layers) wins because it actually trains. The answer depends on the architectural details, not just depth/width.'
  common_mistake: |
    **The Pitfall:** Ignoring that very deep narrow networks cannot be trained without skip connections.
    **The Rationale:** Engineers assume depth automatically equals better performance based on theoretical efficiency, forgetting the practical issue of vanishing gradients.
    **The Consequence:** The 20-layer network fails to train entirely, making the theoretically superior architecture practically useless compared to the shallow network.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1 GFLOP budget. CIFAR-10 task.
       - Option A: 20 layers, 64 filters. Option B: 5 layers, 256 filters.
    2. **Calculations:**
       - Option A (ResNet-20 style with skip connections): reaches ~94% accuracy.
       - Option B (Wide-5): reaches ~91% accuracy.
    3. **Conclusion & Interpretation:**
       - **Result: The deeper network wins by ~3% at a similar FLOP budget, provided skip connections are used to enable training convergence. Performance is Architecture-Bound.**
