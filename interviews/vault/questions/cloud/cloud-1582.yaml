title: Multi-Tier Pre-fetch Sizing for 3D ViT
scenario: You are training a 3D Vision Transformer on a node with 8x H100 GPUs. Each GPU processes 10
  batches per second, with each batch containing 32 high-resolution medical images totaling 200MB per
  batch. Your 50TB dataset resides in S3, which has a 5 GB/s throughput limit to your compute node. The
  node has a local NVMe RAID array capable of 25 GB/s read throughput. Calculate the total data ingestion
  rate of the node, determine if direct S3 streaming is viable, and calculate how long it takes to pre-fetch
  a 2TB epoch partition from S3 to the local NVMe cache.
details:
  realistic_solution: First calculate the node ingestion rate (16 GB/s). Recognize this exceeds the 5
    GB/s S3 network limit, meaning direct streaming will starve GPUs. The solution is to use the local
    NVMe as an intermediate caching tier, pre-fetching the 2TB epoch which takes 400 seconds over the
    network.
  common_mistake: Candidates often assume cloud object storage throughput is sufficient for direct streaming
    without calculating the aggregate multi-GPU ingestion rate, leading to severe I/O starvation.
  napkin_math: Compute node ingestion rate = 8 H100 GPUs * 10 batches/s * 200 MB/batch = 16,000 MB/s (16
    GB/s). AWS S3 standard single-client throughput caps at ~5 GB/s. Since 16 GB/s > 5 GB/s, training
    will be severely IO-bound by network storage. Caching the dataset onto local NVMe drives is mandatory.
    Fetching a 2TB subset locally at 5 GB/s takes 2,000 GB / 5 GB/s = 400s pre-fetch time.
