title: GQA-Aware FlashAttention Kernel Design
scenario: "Llama-3 70B uses Grouped-Query Attention (GQA) with 64 query heads and 8 KV heads. A naive FlashAttention implementation loads K/V tiles 64 times (once per query head). The model is running on an H100 with seq_len=4096, head_dim=128, and FP16 precision."
question: How much KV bandwidth does a naive GQA FlashAttention implementation waste, and how would you tile to reuse each KV head across 8 query heads?
details:
  realistic_solution: 'Naive approach: KV loaded 64 times total. IO = 64 x 2 x 4096 x 128 x 2B = 128MB per layer. GQA-aware: load each KV head once, process all 8 sharing query heads against it before moving to the next KV tile. IO = 8 x 2 x 4096 x 128 x 2B = 16MB. Savings: 112MB per layer x 80 layers = 8.96GB total. At 3.35 TB/s: 2.67ms saved. Implementation: for each KV tile in SRAM, iterate over the 8 query groups that share it. Each Q group has its own accumulator O_i and softmax stats (l_i, m_i). SRAM usage: K+V tiles = 2 x B_c x 128 x 2B, plus 8 sets of Q tiles and accumulators. This fits because Q tiles rotate while K/V stay pinned.'
  common_mistake: |
    **The Pitfall:** Failing to exploit the sharing of KV heads across multiple query heads.
    **The Rationale:** Candidates often implement standard attention algorithms without modifying them for GQA's specific memory access patterns.
    **The Consequence:** Loading the same KV tile multiple times wastes massive amounts of memory bandwidth and increases latency.
  napkin_math: |
    - **Calculate naive KV I/O:** 64 loads × 2MB per tile = 128MB/layer.
    - **Calculate GQA-aware KV I/O:** 8 loads × 2MB per tile = 16MB/layer.
    - **Calculate I/O reduction:** Bandwidth is reduced by **8x**.
    - **Calculate total savings:** 112MB saved × 80 layers = 8.96GB.
    - **Calculate latency impact:** At 3.35TB/s HBM bandwidth, saving 8.96GB removes **2.67ms** of latency.
