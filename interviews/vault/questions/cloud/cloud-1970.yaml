title: Federated Learning Over-selection for Stragglers
scenario: A cloud parameter server orchestrates a synchronous federated learning round for a 50MB model, requiring 1,000 successful updates per round. Client compute time is 2 seconds. 80% of the fleet has 50 Mbps upload speeds, while 20% are stragglers with 5 Mbps upload speeds.
question: "How many clients should be selected to get 1,000 fast updates without stragglers, and what round latency reduction results?"
details:
  realistic_solution: 'Implement an over-selection strategy by sampling 1,250 clients per round and aggregating only the first 1,000 responses, effectively pruning the slow-network tail.'
  common_mistake: |
    **The Pitfall:** Selecting exactly 1,000 clients and waiting for 100% completion.
    **The Rationale:** Candidates fail to account for the long tail of network stragglers in heterogeneous environments.
    **The Consequence:** The slowest 20% bottleneck the entire global training round, increasing latency by 8x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size = 50MB = 400Mb.
       - Fast upload = 50 Mbps (80%).
       - Slow upload = 5 Mbps (20%).
       - Client compute = 2s.
    2. **Calculations:**
       - Fast round time = (400Mb / 50Mbps) + 2s = 8s + 2s = 10s.
       - Slow round time = (400Mb / 5Mbps) + 2s = 80s + 2s = 82s.
       - To guarantee 1000 fast clients (from 80% fast population): 1000 / 0.8 = 1250 clients.
    3. **Conclusion & Interpretation:**
       - **Result: Sample 1250 clients, latency reduced from 82s to 10s.** The bottleneck is **Network Bandwidth-Bound**.
