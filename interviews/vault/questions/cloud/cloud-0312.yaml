title: The Datacenter Power Budget (cloud-0312)
scenario: You are a cloud systems engineer planning a new high-density compute rack. The plan is to install 50 NVIDIA GPUs. A modern, liquid-cooled AI datacenter has a Power Usage Effectiveness (PUE) of 1.1.
question: What is the total power draw for 50 700 W GPUs with PUE 1.1, and is a 30 kW air-cooling limit sufficient?
details:
  realistic_solution: The total power draw for the rack is 38.5 kW. This figure exceeds the ~30 kW practical limit for air-cooling systems. Therefore, this high-density rack requires a direct-to-chip or rear-door heat exchanger liquid cooling solution to prevent thermal throttling and hardware failure.
  common_mistake: |
    **The Pitfall:** Calculating only the raw power of the GPUs and concluding it's "close enough" for air cooling.
    **The Rationale:** Engineers forget to account for the Power Usage Effectiveness (PUE), which adds the overhead power consumed by the cooling systems themselves.
    **The Consequence:** The total power draw is underestimated, leading to thermal throttling and hardware failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 GPUs at 700 W/GPU.
       - Datacenter PUE: 1.1.
       - Air cooling limit: ~30 kW.
    2. **Calculations:**
       - Raw GPU power: 50 × 700 W = 35,000 W (35 kW).
       - Total power with PUE: 35 kW × 1.1 = 38.5 kW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Cooling-Bound. 38.5 kW exceeds the 30 kW limit for standard air cooling, requiring liquid cooling.**
  options:
  - 35.0 kW. This is just over the limit, but can be managed with a high-end air cooling system.
  - 3.85 kW. This is well within standard air cooling limits.
  - 38.5 kW. This exceeds the ~30 kW limit for air cooling, so liquid cooling is required.
  - 73.5 kW. This level of power density is too high for any current cooling technology.
  correct_index: 2
