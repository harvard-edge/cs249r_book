title: The Datacenter Power Budget (cloud-0312)
scenario: You are a cloud systems engineer planning a new high-density compute rack. The plan is to install
  50 NVIDIA H100 GPUs. Given that a modern, liquid-cooled AI datacenter has a Power Usage Effectiveness
  (PUE) of 1.1, calculate the total power draw for this single rack. Based on your calculation, explain
  if a standard air-cooling system, which typically maxes out at around 30 kW per rack, is sufficient.
details:
  realistic_solution: The total power draw for the rack is 38.5 kW. This figure exceeds the ~30 kW practical
    limit for air-cooling systems. Therefore, this high-density rack requires a direct-to-chip or rear-door
    heat exchanger liquid cooling solution to prevent thermal throttling and hardware failure.
  common_mistake: Engineers often calculate only the raw power of the GPUs (35 kW) and incorrectly conclude
    it's 'close enough' for high-end air cooling. They forget to account for the Power Usage Effectiveness
    (PUE), which adds the overhead power consumed by the cooling systems themselves. This overhead is
    what pushes the total power draw firmly into liquid-cooling territory.
  napkin_math: 1. **Calculate raw GPU power:** 50 GPUs × 700 W/GPU = 35,000 W, or 35 kW.
  options:
  - 35.0 kW. This is just over the limit, but can be managed with a high-end air cooling system.
  - 3.85 kW. This is well within standard air cooling limits.
  - 38.5 kW. This exceeds the ~30 kW limit for air cooling, so liquid cooling is required.
  - 73.5 kW. This level of power density is too high for any current cooling technology.
  correct_index: 2
