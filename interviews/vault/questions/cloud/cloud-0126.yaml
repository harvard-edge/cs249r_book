title: The Chatbot SLO Catastrophe
scenario: 'You are an ML Systems Engineer for a new LLM chat service. Your P99 TTFT (Time To First Token) SLO is 500ms. Users are reporting slow initial responses, and your SLO is being breached despite high GPU utilization.'
question: 'What is the core problem causing the 500ms P99 TTFT SLO breach in this LLM chat service?'
details:
  realistic_solution: 'The core problem is head-of-line blocking caused by the static batching strategy. While the GPU is busy, it''s working on a batch that may contain a single, very long generation request. This forces dozens of other short, quick requests to wait in the queue until the *entire* batch completes. This unnecessarily inflates the TTFT for the queued requests, causing the SLO breach.'
  common_mistake: |
    **The Pitfall:** Assuming high GPU utilization means the system is efficient and running optimally.
    **The Rationale:** Engineers are trained to maximize hardware usage, so they assume high utilization is good and blame raw hardware performance for latency misses.
    **The Consequence:** Teams misdiagnose the issue and try to buy faster GPUs rather than fixing the static batching logic that forces short requests to wait behind long ones.
  napkin_math: |
    - **Parameters:** Arrival rate λ = 20 req/s. Service rate μ = 25 req/s (e.g., batch of 10 every 0.4s).
    - **Utilization (ρ):** 20 / 25 = 80%.
    - **M/M/1 Average Wait (Wq):** ρ / (μ - λ) = 0.8 / 5 = 160ms average.
    - **P99 Wait Time:** W_avg * ln(100) = 160ms * 4.6 = 736ms.
    - **Total P99 TTFT:** 736ms wait + 100ms service time = **>830ms (breaching 500ms SLO).**
  options:
  - 'The H100s are underpowered for this workload; the high utilization proves they can''t keep up with the request volume.'
  - 'The InfiniBand network latency is adding too much overhead, causing requests to miss their deadline.'
  - 'Head-of-line blocking from static batching is causing massive queueing delays, and the average request wait time is 10x the SLO.'
  - 'GPU utilization is too high, leading to thermal throttling. We should reduce the batch size to give the GPU recovery time.'
  correct_index: 2
