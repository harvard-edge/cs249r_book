title: SUTVA Violations in Dispatch A/B Testing
scenario: You are testing a new ML dispatch model for a ride-sharing cloud service processing 10,000 requests/hour.
  A naive 50/50 user-level A/B test is deployed. The new model reduces treatment rider wait times from
  a historical 5.0 minutes down to 4.0 minutes. However, because treatment riders occupy drivers for less
  time, overall driver availability increases across the shared pool, causing the control group's wait
  times to also drop to 4.5 minutes. Calculate the measured A/B test delta versus the true global rollout
  impact, and identify the required testing methodology to resolve this SUTVA (Stable Unit Treatment Value
  Assumption) violation.
details:
  realistic_solution: Calculate the true global impact as the full 1.0-minute reduction from the historical
    baseline. To prevent this resource spillover (SUTVA violation) in future tests, implement switchback
    testing (time-based randomization) or geo-spatial cluster randomization to isolate the shared driver
    pool.
  common_mistake: Relying on the measured 0.5 minute difference between treatment and control as the true
    effect, leading to a 50% underestimation of the model's ROI and potentially rejecting a profitable
    rollout.
  napkin_math: 'Historical Baseline = 5.0 min.

    Treatment Avg = 4.0 min.

    Control Avg (during test) = 4.5 min (spillover benefit).

    Measured A/B Delta = 4.5 min - 4.0 min = 0.5 min improvement.

    True Global Delta = 5.0 min - 4.0 min = 1.0 min improvement.

    Error = (1.0 - 0.5) / 1.0 = 50% underestimation of the true model impact.'
