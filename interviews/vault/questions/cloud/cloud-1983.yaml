title: SUTVA Violations in Dispatch A/B Testing
scenario: You are testing a new ML dispatch model for a ride-sharing cloud service
  processing 10,000 requests/hour. A naive 50/50 user-level A/B test is deployed.
  The new model reduces treatment rider wait times from a historical 5.0 minutes down
  to 4.0 minutes. However, because treatment riders occupy drivers for less time,
  overall driver availability increases across the shared pool, causing the control
  group's wait times to also drop to 4.5 minutes.
question: What are the measured A/B delta and true rollout impact on rider wait time,
  and what test design fixes the SUTVA violation?
details:
  realistic_solution: Calculate the true global impact as the full 1.0-minute reduction
    from the historical baseline. To prevent this resource spillover (SUTVA violation)
    in future tests, implement switchback testing (time-based randomization) or geo-spatial
    cluster randomization to isolate the shared driver pool.
  common_mistake: '**The Pitfall:** Relying on the measured difference between treatment
    and control as the true effect.

    **The Rationale:** Engineers trust naive A/B testing frameworks blindly, failing
    to recognize when a shared resource (like driver pools) creates a dependency between
    the treatment and control groups.

    **The Consequence:** Underestimating the model''s ROI by 50% and potentially rejecting
    a highly profitable global rollout.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   * Historical Baseline: 5.0 min.\n\
    \   * Treatment Avg: 4.0 min.\n   * Control Avg (during test): 4.5 min (spillover\
    \ benefit).\n2. **Calculations:**\n   * Measured A/B Delta: 4.5 min - 4.0 min\
    \ = 0.5 min improvement.\n   * True Global Delta: 5.0 min - 4.0 min = 1.0 min\
    \ improvement.\n3. **Conclusion & Interpretation:** **Result: 50% Underestimation\
    \ (Methodology-Bound)**. The naive A/B test massively underreports the model's\
    \ true impact.\n"
