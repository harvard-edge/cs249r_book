title: NVIDIA H100 Latency Diagnosis
scenario: You are deploying a large transformer model for real-time inference on an
  NVIDIA H100 GPU (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth).
  Your initial benchmarks show an average inference latency of 150ms, which is significantly
  higher than the target of 50ms. You've confirmed the model is correctly loaded,
  and batch size is optimized for the H100. CPU utilization is low, and GPU utilization
  reported by `nvidia-smi` appears high (90%+). Describe your diagnostic approach
  to pinpoint the exact bottleneck causing this latency.
question: How would you pinpoint the bottleneck causing 150 ms H100 inference latency
  when batch size is tuned, CPU is idle, and nvidia-smi shows 90% GPU utilization?
details:
  realistic_solution: A systematic approach involves using NVIDIA Nsight Systems to
    get a comprehensive timeline view of GPU kernels, memory transfers (host-to-device,
    device-to-host, device-to-device), and CPU activities. This would reveal if the
    GPU is spending significant time waiting for data, if memory-bound kernels are
    dominant, or if there are long-latency operations. Analyzing the flame graph generated
    by Nsight Systems can quickly highlight hot spots. Specifically, checking for
    long `cudaMemcpy` operations, small fragmented memory accesses, kernel launch
    overheads, or underutilized streaming multiprocessors (SMs) for compute-bound
    kernels. The high memory bandwidth of HBM3 (3.35 TB/s) suggests that if memory
    transfers are still a bottleneck, it might be due to inefficient data access patterns
    or frequent small transfers rather than raw bandwidth limitation.
  common_mistake: Solely relying on coarse-grained metrics like `nvidia-smi` utilization,
    which can be misleading. High GPU utilization often indicates the GPU is busy,
    but not necessarily compute-bound; it could be busy waiting for data, performing
    memory transfers, or executing many small, inefficient kernels, leading to misdiagnosis.
  napkin_math: An H100 has 3.35 TB/s memory bandwidth. If an inference pass requires,
    say, 20GB of data movement (weights + activations), the theoretical minimum time
    for memory transfer alone would be 20 GB / 3.35 TB/s = 20e9 bytes / (3.35e12 bytes/s)
    ≈ 0.00597 seconds or ~6ms. If the model has 989 TFLOPS FP16 dense, and say, 100
    TFLOPs are needed for inference, theoretical compute time is 100e12 FLOPs / 495e12
    FLOPs/s ≈ 0.2 seconds or 200ms. This initial calculation suggests compute might
    be the primary theoretical bottleneck, but the observed 150ms falls within this
    range, implying the issue isn't a trivial setup error but requires deeper profiling
    to identify where the 50ms target is being lost (e.g., inefficient kernel scheduling,
    memory stalls, or I/O waits).
