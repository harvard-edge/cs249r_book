title: MoE Capacity Factor and Token Dropping
scenario: Your MoE training run uses top-2 routing with 64 experts and a capacity
  factor of 1.25. You observe that 8% of tokens are being dropped during training,
  yet validation loss has plateaued. Your colleague suggests raising the capacity
  factor to 2.0. Analyze whether this is the right fix.
question: Should you raise the MoE capacity factor from 1.25 to 2.0 to fix 8% token
  drops, or address routing collapse another way?
details:
  realistic_solution: With 64 experts and top-2, each expert ideally receives 2/64
    = 3.125% of tokens. CF=1.25 means each expert buffer holds 1.25 × (batch/64 ×
    2) tokens. The 8% drop rate suggests a few experts are heavily overloaded (routing
    collapse). Raising CF to 2.0 wastes 60% more memory on padding while only partially
    fixing drops. The better fix is to strengthen the auxiliary load-balancing loss
    coefficient (from e.g. 0.01 to 0.1) or switch to expert-choice routing where experts
    select their top-k tokens, guaranteeing perfect balance. Only raise CF modestly
    (to 1.5) as a stopgap while fixing the routing.
  common_mistake: Blindly raising capacity factor without understanding the cost.
    CF=2.0 doubles the buffer size per expert, wasting memory and compute on padding
    for experts that receive few tokens.
  napkin_math: 'Ideal tokens/expert: B×2/64. CF=1.25 buffer: 1.25×B×2/64 per expert.
    CF=2.0 buffer: 2.0×B×2/64, a 60% memory increase over CF=1.25. Expert-choice routing
    achieves CF=1.0 by construction.'
