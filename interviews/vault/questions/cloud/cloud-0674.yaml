title: The Prefill-Decode Disaggregation
scenario: You serve a 70B model on a fleet of 64 GPUs. During peak traffic, P99 latency spikes to 5x the P50 because long-prompt requests block short-prompt requests in the same batch. An architect proposes splitting the fleet into separate 'prefill GPUs' and 'decode GPUs'.
question: Why would dedicating GPUs to different phases actually improve both throughput and latency?
details:
  realistic_solution: 'Prefill and decode have opposite computational profiles, and mixing them on the same GPU creates destructive interference. Prefill is deeply compute-bound, processing all prompt tokens in parallel through matrix multiplications. Decode is deeply memory-bandwidth-bound, reading entire model weights to produce one token per request. Disaggregation lets each pool run at its optimal operating point.'
  common_mistake: |
    **The Pitfall:** Assuming that splitting the fleet inherently reduces throughput due to fragmentation.
    **The Rationale:** Engineers apply static capacity thinking, assuming fewer GPUs per pool means both pools will be slower.
    **The Consequence:** Mixing compute-heavy and memory-heavy workloads on the same hardware causes destructive interference, crippling P99 latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model, H100 (989 TFLOPS, 3.35 TB/s).
       - Prefill: 2048 tokens. Decode: 1 token.
    2. **Calculations:**
       - Prefill FLOPs = 2 * 70e9 * 2048 = 287 TFLOPS. Time at 60% MFU = 287 / (989 * 0.6) = 0.48s.
       - Prefill Arithmetic Intensity = 287e12 / 140e9 = 2050 Ops/Byte.
       - Decode Time (Memory Bound) = 140 GB / 3350 GB/s = 41.8 ms.
       - Decode Arithmetic Intensity = 140e9 / 140e9 = 1 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware Disaggregation.** Prefill is deeply compute-bound, while decode is deeply memory-bound. Disaggregating them allows optimal batch sizing for each phase, preventing prefill from stalling decode.
