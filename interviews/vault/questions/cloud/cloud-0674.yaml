title: The Prefill-Decode Disaggregation
scenario: We serve a 70B model on a fleet of 64 H100 GPUs. During peak traffic, our P99 latency spikes
  to 5× the P50 because long-prompt requests (8k+ tokens) block short-prompt requests in the same batch.
  An architect proposes splitting the fleet into separate 'prefill GPUs' and 'decode GPUs.' This sounds
  like it wastes resources. Why would dedicating GPUs to different phases actually improve both throughput
  and latency?
question: "Why would dedicating GPUs to different phases actually improve both throughput and latency?"
details:
  realistic_solution: 'Prefill and decode have opposite computational profiles, and mixing them on the
    same GPU creates destructive interference. **Prefill** (processing the input prompt) is **compute-bound**:
    it processes all prompt tokens in parallel through matrix multiplications. Optimal batch size is small
    (1-4 requests) because each request consumes massive FLOPs. **Decode** (generating output tokens)
    is **memory-bandwidth-bound**: it reads the entire model weights to produce one token per request.
    Optimal batch size is large (64-256 requests) to amortize the weight-reading cost. When both phases
    share a GPU, you can''t optimize for either: large decode batches starve prefill of compute, while
    prefill''s heavy compute blocks decode tokens from being emitted, causing latency spikes. Disaggregation
    lets each pool run at its optimal operating point. Prefill GPUs run small batches at high compute
    utilization; decode GPUs run large batches at high bandwidth utilization. A lightweight scheduler
    routes requests: new requests go to prefill GPUs, and once the KV-cache is computed, it''s transferred
    to a decode GPU (KV-cache transfer is a one-time cost per request).'
  common_mistake: '"Splitting the fleet means each pool has fewer GPUs, so both pools will be slower."
    This applies static capacity thinking to a problem that''s fundamentally about workload heterogeneity.'
  napkin_math: '**70B model, H100 (989 TFLOPS, 3.35 TB/s).** **Prefill (2048-token prompt):** FLOPs =
    $2 \times 70\text{B} \times 2048 = 287$ TFLOPS. Time at 60% MFU: $287 / (989 \times 0.6) = $ **0.48
    s**. Arithmetic intensity = $287 \times 10^{12} / (140 \times 10^9) = 2050$ Ops/Byte — deeply compute-bound.
    Optimal batch: 1-2 requests. **Decode (1 token):** FLOPs = $2 \times 70\text{B} = 140$ GFLOPs. Weight
    read = 140 GB. Time (bandwidth-bound): $140 / 3350 = $ **41.8 ms**. Arithmetic intensity = $140 \times
    10^9 / (140 \times 10^9) = 1$ Ops/Byte — deeply memory-bound. Optimal batch: at batch=128, you do
    128× more compute with the same weight read, pushing utilization from 0.34% to ~43%. **Mixed fleet
    (64 GPUs):** Prefill requests with 8k tokens take ~1.9 s, blocking decode for all co-located requests
    → P99 spikes. **Disaggregated (20 prefill + 44 decode):** Prefill GPUs: 20 GPUs handle ~42 prefill
    requests/s. Decode GPUs: 44 GPUs at batch=128 each handle ~3,072 tokens/s decode. KV-cache transfer
    (2048 tokens, 8 KV-heads GQA ≈ 0.67 GB): ~0.7 ms over NVLink — negligible. P99 decode latency drops
    from ~200 ms to ~50 ms because decode GPUs never stall on prefill compute.'
