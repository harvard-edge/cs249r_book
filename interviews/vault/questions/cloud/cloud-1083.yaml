title: Cross-Environment Batch Bottleneck
scenario: A healthcare provider is attempting to run a batch anomaly detection model over 5 PB of historical on-premise genomic data. They provisioned a cloud cluster of 16x GPUs and connected their on-prem datacenter to the cloud via a dedicated 10 Gbps Direct Connect link. The engineering team reports that the job will take months to complete, despite the massive GPU cluster, and the GPUs are sitting at ~2.5% utilization.
question: Why are the GPUs at only 2.5% utilization on the 5 PB genomic job, and what architecture should replace it?
details:
  realistic_solution: Recognize that the system violates the Data Locality Invariant. Because transmission time over the WAN vastly exceeds actual compute time, the architectural solution is to move the compute to the data (deploying on-premise GPUs).
  common_mistake: |
    **The Pitfall:** Suggesting software optimizations like advanced compression or increased batch size.
    **The Rationale:** Engineers typically look to software configurations to improve GPU utilization.
    **The Consequence:** Completely ignoring the fundamental physical limits of network bandwidth, which no software optimization can overcome.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 PB data = 40,000,000 Gb.
       - Link: 10 Gbps (1.25 GB/s throughput).
    2. **Calculations:**
       - Transfer Time: 40,000,000 / 10 = 4,000,000 sec (~46 days).
       - Compute Time (at 50 GB/s): 100,000 sec (~27 hours).
       - GPU Utilization: 1.25 / 50 = 2.5%.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. 46 days transfer dwarfs 27 hours compute; move compute to the data.**
