title: Cross-Environment Batch Bottleneck
scenario: A healthcare provider is attempting to run a batch anomaly detection model over 5 PB of historical
  on-premise genomic data. They provisioned a cloud cluster of 16x H100 GPUs (capable of processing 50
  GB/s combined) and connected their on-prem datacenter to the cloud via a dedicated 10 Gbps Direct Connect
  link. The engineering team reports that the job will take months to complete, despite the massive GPU
  cluster, and the GPUs are sitting at ~2.5% utilization. Diagnose the root cause of the failure and identify
  the necessary architectural shift.
details:
  realistic_solution: Recognize that the system violates the Data Locality Invariant. Because transmission
    time over the WAN vastly exceeds the actual compute time, the architectural solution is to move the
    compute to the data (e.g., deploying on-premise GPUs or using a managed edge appliance) rather than
    moving the data to the cloud.
  common_mistake: Candidates often suggest optimizing the data pipeline, using advanced compression, or
    increasing the batch size to improve GPU utilization, ignoring the fundamental physical limits of
    the network bandwidth.
  napkin_math: 'Network transfer: 5 PB = 5,000,000 GB = 40,000,000 Gb. At 10 Gbps, transfer time = 4,000,000
    seconds (~46 days). Compute time: 5,000,000 GB / 50 GB/s = 100,000 seconds (~27 hours). Network limits
    throughput to 1.25 GB/s (yielding 1.25 / 50 = 2.5% GPU utilization). Since 46 days >> 27 hours, data
    locality must be preserved.'
