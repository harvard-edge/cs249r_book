title: Evaluating Online Softmax for Long-Context Kernels
scenario: You are optimizing a custom attention kernel for an A100 GPU (192KB SRAM per SM, 2 TB/s HBM
  bandwidth) to support 65,536 sequence lengths. A standard softmax materializes the N x N logits matrix
  in HBM. Evaluate the memory bandwidth trade-offs and numerical stability between HBM-materialized 3-pass
  softmax, naive 1-pass softmax without max-shifting, and the block-based online softmax algorithm. Justify
  why online softmax is strictly required to avoid the memory wall.
question: "Why is block-based online softmax required for 65,536-token attention on A100 instead of HBM-materialized or naive 1-pass softmax?"
details:
  realistic_solution: Online softmax maintains running maximums and normalization sums incrementally in
    SRAM. When a new block introduces a larger maximum, previous block sums are rescaled by exp(old_max
    - new_max). This exact formulation allows fusing the entire attention pass, bypassing intermediate
    N x N HBM materialization entirely.
  common_mistake: Assuming online softmax is an approximation rather than mathematically exact, or attempting
    a naive single-pass sum without max-shifting which quickly overflows FP16/BF16 dynamic ranges.
  napkin_math: Sequence length N = 65,536. Standard softmax materializes an N x N attention matrix. Memory
    per head = 65,536^2 * 2 bytes (FP16) = 8.59 GB. Standard 3-pass softmax (max, sum, div) reads/writes
    this matrix, consuming >25 GB HBM bandwidth (2TB/s A100). Online softmax (FlashAttention) avoids N^2
    materialization, streaming only Q,K,V blocks (16.7MB for dim=128), saving ~1500x bandwidth.
