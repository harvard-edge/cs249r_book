title: Feedback Loop Formation
scenario: A content recommendation model is retrained on user engagement data (clicks, watch time). Over 6 months, the content mix becomes increasingly homogeneous.
question: "How did the recommender's training feedback loop form, and why does it produce filter bubbles?"
details:
  realistic_solution: 'A feedback loop forms when: (1) the model recommends content based on predicted engagement, (2) users can only engage with content they are shown (selection bias), (3) the model is retrained on this engagement data, which overrepresents the types of content the model already promotes. Each retraining cycle amplifies the bias: popular content types get more exposure → more engagement data → higher predicted engagement → even more exposure. This creates a positive feedback loop that converges toward a narrow content distribution (filter bubble). Content that was never shown has zero engagement data, so the model never learns to recommend it — even if users would have liked it. The fundamental issue is that the training distribution is not independent of the model — it is endogenous, violating the standard ML assumption of i.i.d. training data.'
  common_mistake: |
    **The Pitfall:** Blaming the model for intentionally being biased.
    **The Rationale:** Candidates assume the model architecture is flawed, rather than realizing the model is correctly optimizing for the metric based on causally constrained data.
    **The Consequence:** Attempting to tweak model hyperparameters rather than fixing the endogenous training data distribution.
  napkin_math: |
    - **Cycle 1:** Recommend 60% type-A content.
    - **Cycle 2:** 60% of engagement data is type-A → predict type-A higher → recommend 70%.
    - **Cycle N:** **Converges to ~95% type-A (Filter Bubble).**
