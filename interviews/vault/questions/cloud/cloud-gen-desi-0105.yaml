title: Rack-Level Thermal Architecture for Dense H100 Clusters
scenario: Architect a thermal management and workload scheduling system for an AI training cluster using
  H100 GPUs (700W TDP). The datacenter supports up to 40 kW of power delivery per rack, but the legacy
  air-cooling infrastructure can only dissipate 30 kW of heat per rack before ambient temperatures cause
  thermal throttling. Design a system that maximizes training throughput across 5-node racks (8x H100
  per node, ~7 kW total per node) without triggering hardware-enforced thermal throttling.
details:
  realistic_solution: Design a software-defined thermal management system that integrates with the cluster
    scheduler. Deploy 5 nodes per rack (35 kW peak) to maximize power utilization, but implement a dynamic
    power-capping daemon based on rack-level thermal telemetry. During compute-heavy LLM training phases,
    cap GPU power limits to 575W to stay within the 30 kW cooling limit. During communication or memory-bound
    phases where actual power draw drops, lift the cap to allow transient bursts up to 700W, relying on
    the thermal mass of the heat sinks to absorb short-term heat spikes.
  common_mistake: Candidates often propose upgrading to liquid cooling, ignoring the constraint, or suggest
    static power capping across all nodes, which sacrifices burst performance during less compute-intensive
    phases of the workload.
  napkin_math: 'Node power: 8 * 700W (H100) + 1.4 kW (System) = 7.0 kW. Rack peak power (5 nodes): 5 *
    7.0 kW = 35.0 kW. Excess heat over cooling limit: 35.0 kW - 30.0 kW = 5.0 kW. Safe continuous power
    per node: 30.0 kW / 5 = 6.0 kW. Safe continuous GPU power: (6.0 kW - 1.4 kW) / 8 = 575W per H100.'
