title: Evaluating DVFS Power Capping for LLM Inference
scenario: You are managing a dense rack of 8x H100 GPU nodes (8 GPUs per node, 4 nodes total) for a large-scale LLM inference service. The rack has a strict physical power limit of 35kW, but the peak theoretical draw of the fully active cluster is over 40kW. You must evaluate two power capping strategies: (A) aggressive uniform DVFS downclocking across all GPUs to stay under the limit, or (B) selectively idling a portion of the GPUs while running the rest at maximum frequency.
question: Which power-capping strategy should the 35kW H100 rack use, uniform DVFS downclocking or selectively idling GPUs, and why?
details:
  realistic_solution: Uniformly downclocking all GPUs (Strategy A) is vastly superior for overall throughput per watt. Because dynamic power scales cubically with frequency (P ∝ V²f, and V scales linearly with f), a 20% frequency reduction cuts power by ~48% per chip while sacrificing only 20% of per-chip performance. This keeps all chips active and the total rack under the 35kW limit. Idling chips entirely (Strategy B) wastes their fixed power overhead and silicon investment.
  common_mistake: |
    **The Pitfall:** Recommending running fewer GPUs at maximum frequency and selectively idling the rest.
    **The Rationale:** Candidates optimize for latency-sensitive single-chip performance instead of aggregate cluster efficiency.
    **The Consequence:** They ignore the cubic power-frequency relationship, missing out on massive aggregate power savings achievable with minimal downclocking.
  napkin_math: |
    - Dynamic power equation: P ∝ V²f.
    - Voltage (V) roughly scales linearly with frequency (f).
    - If frequency is reduced by 20% (0.8x), new power P = (0.8)² × (0.8) = 0.512x of original power.
    - **Conclusion:** A 20% performance sacrifice per chip cuts power consumption by nearly 50%, easily fitting the 40 kW peak demand under the 35 kW physical limit while keeping all chips active.
