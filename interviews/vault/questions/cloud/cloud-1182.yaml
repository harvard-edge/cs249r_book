title: Evaluating DVFS Power Capping for LLM Inference
scenario: 'You are managing a dense rack of 8x H100 GPU nodes (8 GPUs per node, 4 nodes total) for a large-scale
  LLM inference service. The rack has a strict physical power limit of 35kW, but the peak theoretical
  draw of the fully active cluster is over 40kW. You must evaluate two power capping strategies: (A) aggressive
  uniform DVFS downclocking across all GPUs to stay under the limit, or (B) selectively idling a portion
  of the GPUs while running the rest at maximum frequency. Evaluate the throughput, latency, and power
  efficiency trade-offs of these two approaches.'
details:
  realistic_solution: Uniformly downclocking all GPUs (Strategy A) is vastly superior for overall throughput
    per watt. Because dynamic power scales cubically with frequency (P ∝ V²f, and V scales linearly with
    f), a 20% frequency reduction cuts power by ~48% per chip while sacrificing only 20% of per-chip performance.
    This keeps all chips active and the total rack under the 35kW limit. Idling chips entirely (Strategy
    B) wastes their fixed power overhead and silicon investment.
  common_mistake: Candidates often assume that running fewer GPUs at maximum frequency and idling the
    rest is more efficient for latency-sensitive workloads, ignoring that the cubic power-frequency relationship
    means slight downclocking yields disproportionate power savings with minimal performance loss.
  napkin_math: Dynamic power P ∝ V²f. If we reduce frequency f by 20% (0.8x), the required voltage V roughly
    drops by 20% (0.8x). New Power P = (0.8)² * (0.8) = 0.512x of original power. We sacrifice 20% performance
    (speed) per chip but cut power consumption by almost 50%, easily keeping the 40kW peak demand under
    the 35kW limit while keeping all chips active.
