title: The Datacenter Power Budget (cloud-0363)
scenario: You are provisioning a server with 8 H100 GPUs for a liquid-cooled datacenter rack. Each H100 has a Thermal Design Power (TDP) of 700 Watts. The datacenter's cooling system is very efficient, with a Power Usage Effectiveness (PUE) of 1.1.
question: "What total grid power does an 8-H100 server draw with 700W GPUs and PUE 1.1, ignoring CPUs?"
details:
  realistic_solution: The correct way to solve this is a two-step process. First, calculate the total power consumed directly by the IT equipment (the GPUs). Second, multiply that by the PUE to find the total power drawn from the grid.
  common_mistake: |
    **The Pitfall:** Calculating only the power of the components (GPUs) and forgetting datacenter overhead.
    **The Rationale:** The Power Usage Effectiveness (PUE) is a critical multiplier that represents the cost of cooling and power distribution required to run the hardware, which is often overlooked in pure server-level calculations.
    **The Consequence:** Underestimating power draw by 10-50%, leading to blown power budgets.
  napkin_math: |
    - **Base GPU power:** 8 GPUs * 700 W/GPU = 5,600 W (5.6 kW).
    - **Total Power (with PUE):** 5.6 kW * 1.1 (PUE) = 6.16 kW.
    - **Result: 6.16 kW**
  options:
  - 5.60 kW
  - 5.09 kW
  - 6.16 kW
  - 7.70 kW
  correct_index: 2
