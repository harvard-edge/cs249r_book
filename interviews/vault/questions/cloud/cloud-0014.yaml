title: The RAG Retrieval Step-Cost
scenario: You're debugging a slow Retrieval-Augmented Generation (RAG) pipeline. The system takes a user query, retrieves relevant documents from a vector index, and then feeds them to an LLM. The vector index is too large for memory and is stored on a datacenter-grade NVMe SSD.
question: "What is the approximate latency you should expect for a single, random read from this SSD to retrieve a document chunk?"
details:
  realistic_solution: The expected latency is around 100,000 nanoseconds (100 µs). This is a fundamental physical limitation of current flash storage technology in datacenters. While a full RAG pipeline has many components (embedding, LLM inference), isolating the retrieval step shows that I/O can be a significant bottleneck compared to on-chip operations.
  common_mistake: |
    **The Pitfall:** Underestimating I/O latency.
    **The Rationale:** Engineers confuse storage I/O speeds with network or memory access, thinking in single-digit microseconds instead of hundreds.
    **The Consequence:** Designing pipelines with massive I/O bottlenecks and missing latency SLAs.
  napkin_math: |
    1. Recall L1 cache access latency: ~1 ns.
    2. Recall NVMe SSD read latency: ~100,000 ns (100 µs).
    3. Scale for intuition: If 1 ns = 1 second, L1 access is 1 second, and SSD read is 1.1 days.
    4. **Final Result: ~100,000 ns (100 µs).**
  options:
  - ~300 ns
  - ~5,000 ns (5 µs)
  - ~100,000 ns (100 µs)
  - ~40,000,000 ns (40 ms)
