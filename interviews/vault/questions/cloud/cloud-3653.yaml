title: Diagnosing Flash Attention Regression After Library Upgrade
scenario: After upgrading flash-attn from 2.3 to 2.6 on an A100 (80GB HBM2e, 2TB/s) training cluster, training throughput drops from 95 TFLOPS to 71 TFLOPS for a seq_len=4096 model. No code changes were made. The upgrade notes mention improved support for dropout in attention.
question: How would you investigate and fix the 25% throughput regression after upgrading flash-attn from 2.3 to 2.6?
details:
  realistic_solution: Profile with Nsight to compare kernel execution between versions. Check if dropout_p=0.0 is being passed to the attention function — in newer versions, explicitly passing dropout_p=0.0 may trigger a different kernel path than not passing it. Set dropout_p=0.0 and deterministic=False to use the fastest kernel path. Verify with flash_attn.utils.benchmark.
  common_mistake: |
    **The Pitfall:** Assuming the library regression is a core bug and rolling back immediately.
    **The Rationale:** Engineers often overlook default behavior changes in minor library updates.
    **The Consequence:** The team misses out on bug fixes in the newer version and fails to realize that passing dropout_p=0.0 now inadvertently triggers mask materialization.
  napkin_math: |
    - 95 TFLOPS vs 71 TFLOPS = 25% regression. A100 peak is 312 TFLOPS BF16.
    - At seq=4096, d=128: attention FLOPs per layer = 2 * 4096² * 128 = 4.3 GFLOP (per head).
    - At 95T: 0.045ms/layer. At 71T: 0.06ms/layer.
    - For a 40-layer model: regression = 40 * (0.06 - 0.045) = 0.6ms per forward pass.
    - Mask materialization for dropout at seq=4096: 4096² * 1 byte = 16MB per head.
    - **This materialization overhead saturates memory bandwidth, pulling compute down from 95 TFLOPS to 71 TFLOPS.**
