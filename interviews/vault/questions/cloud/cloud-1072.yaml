title: Calculating Transfer Time for a 20PB Dataset
scenario: Your team has collected a 20 PB dataset of high-resolution autonomous driving video stored in
  a local on-premise datacenter. Your ML training cluster is in AWS (us-east-1), and you have a dedicated
  100 Gbps Direct Connect link. You need to calculate the theoretical minimum time required to move this
  data to the cloud for training and propose an architecture to circumvent this network bottleneck.
question: "How long would transferring 20 PB over 100 Gbps Direct Connect take, and what architecture avoids this bottleneck?"
details:
  realistic_solution: Calculate the transfer time recognizing the 100 Gbps bandwidth limit (12.5 GB/s
    theoretical, ~10 GB/s realistic). Given the multi-week transfer time, the correct architectural decision
    is to leverage physical data transfer appliances (e.g., AWS Snowball) or to provision compute locally
    where the data resides.
  common_mistake: Ignoring TCP/IP overhead by assuming the full 100 Gbps is usable for payload, and failing
    to recognize that network transfer is the wrong approach for this volume of data.
  napkin_math: Volume = 20 PB = 20,000,000 GB. Theoretical Bandwidth = 100 Gbps = 12.5 GB/s. Realistic
    Bandwidth (80% efficiency) = 10 GB/s. Transfer Time = 20,000,000 GB / 10 GB/s = 2,000,000 seconds
    ≈ 555 hours ≈ 23.1 days.
