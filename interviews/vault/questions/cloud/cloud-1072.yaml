title: Calculating Transfer Time for a 20PB Dataset
scenario: You have a 20 PB dataset stored on-premise. Your ML cluster is in the cloud, connected via a dedicated 100 Gbps link.
question: What is the theoretical minimum transfer time, and what architecture circumvents this bottleneck?
details:
  realistic_solution: Calculate the transfer time recognizing the 100 Gbps bandwidth limit (12.5 GB/s theoretical, ~10 GB/s realistic). Given the multi-week transfer time, the correct architectural decision is to leverage physical data transfer appliances (e.g., AWS Snowball) or to provision compute locally where the data resides.
  common_mistake: |
    **The Pitfall:** Ignoring TCP/IP overhead and assuming network transfer is viable.
    **The Rationale:** Blindly trusting the "100 Gbps" label without considering payload efficiency or the sheer scale of Petabyte transfers.
    **The Consequence:** Planning data pipelines that will take months to complete, stalling model training completely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Volume: 20 PB = 20,000,000 GB.
    - Link: 100 Gbps (12.5 GB/s theoretical).

    **Calculations:**
    - Realistic Bandwidth (TCP overhead): ~10 GB/s.
    - Transfer Time: 20,000,000 GB / 10 GB/s = 2,000,000 seconds.
    - 2,000,000 seconds / 3600 = ~555 hours = ~23.1 days.

    **Conclusion & Interpretation:**
    - **Result: Network-Bandwidth Bound.** Moving 20 PB takes nearly a month over a 100 Gbps link; physical transfer appliances are strictly required.
