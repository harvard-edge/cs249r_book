title: Evaluating MFU for LLM Training on A100 Cluster
scenario: 'Your team is training a 70B parameter LLM on a cluster of 1024 NVIDIA A100 (80GB) GPUs. The theoretical peak BF16 throughput of each A100 is 312 TFLOPS. Your current pipeline processes 400,000 tokens per second globally. You need to evaluate whether to invest 3 months of engineering effort into custom FlashAttention kernels and better communication overlap to increase Model FLOPS Utilization (MFU).'
question: How do you evaluate the current MFU to justify this decision?
details:
  realistic_solution: 'Calculate the MFU using the theoretical minimum FLOPs per token (approx 6 * P for forward and backward passes). At 70B parameters and 400k tokens/sec, the useful throughput is 168 PFLOPS. Given the cluster peak of 319.5 PFLOPS, the MFU is 52.6%. Since highly optimized frameworks can achieve 60-65% MFU on A100s, the investment is justified: an absolute increase to 60% MFU would reduce training time by about 12%, saving millions in compute costs over a typical run.'
  common_mistake: |
    **The Pitfall:** Confusing Hardware FLOPS Utilization (HFU) with Model FLOPS Utilization (MFU).
    
    **The Rationale:** Candidates incorrectly include the FLOPs from activation recomputation or padding in the numerator, which artificially inflates the utilization metric.
    
    **The Consequence:** Overestimating the efficiency of the training pipeline, leading to bad strategic decisions about investing in optimization.
  napkin_math: |
    * **Theoretical FLOPs/Token:** 6 × 70B = 420 GFLOPs/token
    * **Total Achieved Throughput:** 420 GFLOPs/token × 400,000 tokens/sec = 168 PFLOPS
    * **Cluster Peak Compute:** 1024 GPUs × 312 TFLOPS = 319.5 PFLOPS
    * **Model FLOPS Utilization (MFU):** 168 PFLOPS / 319.5 PFLOPS = 52.6%
    * **Result:** **The cluster is operating at 52.6% MFU, justifying the optimization effort.**
