title: 'DP-SGD Model Evaluation on Google TPU v5e: Optimizing Privacy-Utility Tradeoffs for Federated Learning'
scenario: Your team is deploying a federated learning system for a highly sensitive medical imaging application. The goal is to train a large transformer model using DP-SGD while adhering to strict privacy regulations, targeting an epsilon budget of 8 over 100 epochs. You need to compare two candidate architectures for the DP-SGD training pipeline, both leveraging Google TPU v5e devices (16 GB HBM, 197 TFLOPS BF16, 1.6 TB/s memory bandwidth) in a distributed setup. Architecture A proposes a client-side DP-SGD implementation where noise is added at the client, and gradients are aggregated centrally. Architecture B suggests a server-side DP-SGD approach where a trusted aggregator adds noise to the combined gradients.
question: How would you evaluate client-side versus server-side DP-SGD on TPU v5e for privacy budget, utility, noise calibration, and throughput?
details:
  realistic_solution: |
    A realistic solution involves:
    1. **Rigorous Epsilon Tracking**: Implement robust privacy accounting mechanisms (e.g., moments accountant) to precisely track cumulative epsilon for both architectures, considering different clipping strategies and noise scales.
    2. **Benchmark Datasets & Metrics**: Use established medical imaging datasets and evaluate model utility with relevant metrics (e.g., AUC, Dice score) against a non-private baseline.
    3. **System-Level Profiling**: Employ TPU profiling tools to measure training throughput, memory utilization, and communication overhead for both architectures. Analyze how BF16 precision affects gradient updates and noise application on the TPU.
    4. **Noise Calibration Study**: Conduct experiments to find optimal noise parameters for target epsilon values, considering the sensitivity of the gradients and the model's convergence behavior on TPUs.
    5. **Security & Robustness Analysis**: Evaluate potential side-channel attacks for each architecture and ensure the chosen DP implementation is robust against adversarial examples or data reconstruction attacks, especially when gradients are exchanged.
  common_mistake: |
    **The Pitfall:** Overlooking the cumulative nature of privacy loss in DP-SGD or miscalibrating the noise magnitude.
    
    **The Rationale:** Engineers often fail to account for how epsilon degrades across multiple epochs or rounds of communication in federated learning. Furthermore, they may ignore how the TPU's precision capabilities (BF16) impact gradient clipping and noise addition.
    
    **The Consequence:** The model is deployed with an unintentionally high effective epsilon (violating privacy regulations) or excessive noise that destroys model utility.
  napkin_math: |
    - **Memory Transfer**: For 1.6 TB/s HBM bandwidth on Google TPU v5e, loading model weights and gradients for a 1B parameter model in BF16 (~2GB).
    - **Read Latency**: 2 GB / (1.6 TB/s) = **1.25 ms** per batch memory access.
    - **Noise Scaling**: Given batch size B, sensitivity L, and target epsilon E over T epochs. Standard deviation σ is roughly proportional to `(L * sqrt(T)) / (B * E)`.
    - **Result**: The 1.25 ms read time indicates that gradient I/O is very fast; the bottleneck will heavily favor network transfer of gradients between clients/server, especially penalizing Architecture A due to client-side bandwidth constraints.
