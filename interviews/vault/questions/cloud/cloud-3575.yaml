title: 'DP-SGD Model Evaluation on Google TPU v5e: Optimizing Privacy-Utility Tradeoffs for Federated Learning'
scenario: Your team is deploying a federated learning system for a highly sensitive medical imaging application. The goal is to train a large transformer model using DP-SGD while adhering to strict privacy regulations, targeting an epsilon budget of 8 over 100 epochs. You need to compare two candidate architectures for the DP-SGD training pipeline, both leveraging Google TPU v5e devices in a distributed setup. Architecture A proposes a client-side DP-SGD implementation where noise is added at the client, and gradients are aggregated centrally. Architecture B suggests a server-side DP-SGD approach where a trusted aggregator adds noise to the combined gradients.
question: How would you evaluate client-side versus server-side DP-SGD on TPU v5e for privacy budget, utility, noise calibration, and throughput?
details:
  realistic_solution: |
    Evaluate privacy accounting mathematically using the moments accountant to track cumulative epsilon. Benchmark utility using AUC/Dice scores against a non-private baseline. From a systems perspective, recognize that HBM read/write is virtually instantaneous on a TPU v5e. The dominant latency is networking: Architecture A (Client-Side) suffers extreme bandwidth starvation because raw gradients must be transmitted over constrained client networks, while Architecture B relies on high-speed server aggregation.
  common_mistake: |
    **The Pitfall:** Overlooking the cumulative nature of privacy loss in DP-SGD or miscalibrating the noise magnitude.
    **The Rationale:** Engineers often fail to account for how epsilon degrades across multiple epochs or rounds of communication in federated learning. Furthermore, they ignore how precision capabilities (BF16) impact gradient clipping.
    **The Consequence:** The model is deployed with an unintentionally high effective epsilon (violating privacy regulations) or excessive noise that destroys model utility.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 1B parameters in BF16 (~2 GB weights/gradients).
       - TPU v5e HBM bandwidth: 1.6 TB/s.
       - Client-side constraint: Slow network uplink.
    2. **Calculations:**
       - HBM Read Latency for 2 GB: 2 GB / 1.6 TB/s = 1.25 ms.
       - DP Noise Scaling: std_dev ~ (Sensitivity * sqrt(Epochs)) / (Batch_Size * Epsilon).
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** The 1.25 ms local memory access time proves gradient operations are trivially fast. The system will be severely bottlenecked by the network transfer of 2 GB gradients, heavily penalizing the Client-Side DP-SGD architecture.
