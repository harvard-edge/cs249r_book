title: Balancing W8A8 Outliers with SmoothQuant
scenario: You are deploying a 70B parameter LLM on an A100 GPU cluster using W8A8 (INT8) quantization
  to double inference throughput. During evaluation, naive activation quantization causes severe accuracy
  drops due to massive activation outliers. You inspect a specific linear layer where the maximum absolute
  activation value in channel j is 121.0, while the maximum absolute weight value for that same input
  channel is 1.0. Using the SmoothQuant technique to perfectly balance the dynamic range between activations
  and weights for this channel (alpha=0.5), calculate the required scaling factor s_j and the resulting
  maximum values for both the scaled activations and scaled weights.
details:
  realistic_solution: Calculate the per-channel smoothing factor using the square root of the ratio of
    activation max to weight max. The activations are divided by this factor and the weights are multiplied
    by it, mathematically preserving the linear operation while migrating the quantization difficulty
    from dynamic activations to static weights.
  common_mistake: Candidates often suggest simply clipping the activation outliers (which destroys information
    and accuracy) or they invert the scaling factor, dividing the weights and multiplying the activations,
    which exacerbates the outlier problem.
  napkin_math: Scale s_j = sqrt(max(|X_j|) / max(|W_j|)) = sqrt(121.0 / 1.0) = 11.0. Scaled activation
    max = 121.0 / 11.0 = 11.0. Scaled weight max = 1.0 * 11.0 = 11.0. Both now share the same max magnitude
    of 11.0.
