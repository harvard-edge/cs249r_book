title: Evaluating SHAP vs LIME for Real-Time Fraud
scenario: A payment gateway processes 5,000 transactions per second (TPS) using a 50M parameter XGBoost
  ensemble. Compliance requires every declined transaction to include an explanation (feature importance).
  You are evaluating whether to integrate KernelSHAP, TreeSHAP, or LIME. Currently, 2% of transactions
  are declined. The gateway has a strict P99 latency budget of 150ms for the entire pipeline, with 50ms
  allocated to inference and explainability combined.
question: "Which explainer—KernelSHAP, TreeSHAP, or LIME—should you use to meet the 50ms inference-plus-explainability budget?"
details:
  realistic_solution: Implementing TreeSHAP, which calculates exact SHAP values for tree-based models
    in polynomial time (O(TLD^2)) directly from the tree structure, bypassing repeated inferences.
  common_mistake: Choosing model-agnostic KernelSHAP or LIME without realizing the latency overhead of
    thousands of background dataset evaluations per explanation, completely blowing the 50ms budget.
  napkin_math: 'Model baseline latency = 1ms. KernelSHAP requires generating ~1000 perturbed samples per
    explanation: 1000 inferences * 1ms = 1000ms latency, vastly violating the 50ms P99 SLA. TreeSHAP leverages
    XGBoost''s internal tree structure for exact feature importance in O(TLD^2), running in ~5ms on CPUs.
    Total latency = 1ms inference + 5ms TreeSHAP = 6ms, safely meeting the 50ms budget constraint.'
