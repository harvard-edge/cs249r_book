title: Specifying Gradient Checkpointing Requirements in a Model Training SLA
scenario: You are writing the training infrastructure specification for a new 30B production model to be trained on A100 GPUs. The training SLA requires (1) memory utilization <= 90% of 80GB HBM capacity, (2) training throughput >= 350 tokens/sec/GPU, and (3) training must complete 500B tokens within 60 days on 256 GPUs.
question: What checkpointing and sharding configuration satisfies the 90% HBM, 350 tokens/sec/GPU, and 500B-token-in-60-days constraints?
details:
  realistic_solution: 'Memory constraint: 30B model fp16 = 60 GB; Adam fp32 = 360 GB / dp_degree. With dp=8 (ZeRO-2), optimizer states \approx 45 GB/GPU. HBM budget for activations = 0.9\times80 - 60 - 45 = -33 GB — infeasible without ZeRO-3. Use ZeRO-3: param memory = 60/256 \approx 0.23 GB/GPU; optimizer \approx 360/256 = 1.4 GB/GPU. Activation budget = 0.9\times80 - 0.23 - 1.4 = 70.37 GB. At S=2048, B=8, H=5120: checkpoint boundaries are \approx 168 MB. With 96 total layers, checkpoint every 2 layers \rightarrow stored boundaries = 48 layers. Peak activation = 48 \times 168 MB = 8.1 GB, plus active window of 3.4 GB. Total \approx 11.5 GB, well under 70.37 GB budget. Overhead \approx 33%. Throughput: baseline ~520 tok/s \times (1 - 0.25) = 390 tok/s > 350. Check 60-day: 256 GPUs \times 390 tok/s \times 60\times86400 s = 518B tokens > 500B. All constraints satisfied.'
  common_mistake: |
    **The Pitfall:** Specifying checkpointing granularity without verifying the resulting recompute overhead.
    **The Rationale:** Candidates over-checkpoint (e.g., every layer) to maximize memory headroom, failing to check the math against the throughput SLA.
    **The Consequence:** The memory constraint is passed, but throughput drops below 350 tokens/sec, causing the 60-day deadline to be missed.
  napkin_math: |
    1. 90% of 80GB HBM = 72 GB budget.
    2. ZeRO-3 param memory: 60 GB / 256 = 0.23 GB. Optimizer: 360 GB / 256 = 1.4 GB. Activation budget = 70.37 GB.
    3. Checkpoint every 2 layers: 48 stored layers * 168 MB = 8.1 GB + 3.4 GB active window = 11.5 GB < 70.37 GB.
    4. Baseline throughput ~520 tok/s * (1 - 0.25 overhead) = 390 tok/s.
    5. Token completion: 256 GPUs * 390 tok/s * 60 days * 86400 s = 518 Billion tokens.
    6. **Result: 518B > 500B. All constraints satisfied.**
