title: The Feature Version Mismatch
scenario: Your feature engineering team deploys a new version of the 'user_engagement_score' feature that changes the normalization from min-max to z-score. The model serving system immediately starts using the new feature values, but the model was trained on min-max normalized values. The ranking model's click-through rate drops 15% before anyone notices.
question: How would you design feature versioning so models trained on min-max values cannot silently receive z-score values?
details:
  realistic_solution: 'Implement a **feature contract system**: (1) **Versioned feature schemas**: every feature has a version tag (e.g., `user_engagement_score_v2`). The feature store serves both v1 and v2 simultaneously. (2) **Model-feature binding**: each model artifact declares the exact feature versions it was trained on (e.g., `requires: user_engagement_score_v1`). The serving system resolves feature lookups based on the model''s declared dependencies. (3) **Compatibility checks**: before a new feature version is promoted to default, a CI job validates that no active model depends on the old version without a retrained replacement. (4) **Gradual rollout**: new feature versions are rolled out to shadow traffic first, with automated comparison of model output distributions. (5) **Rollback capability**: the feature store maintains at least 2 versions of every feature, enabling instant rollback.'
  common_mistake: |
    **The Pitfall:** Relying on manual coordination ("just tell the model team when features change").
    **The Rationale:** For small teams, communication feels faster and easier than building strict contracts.
    **The Consequence:** At scale, manual coordination always fails, leading to silent model degradation (like the 15% CTR drop) that is extremely hard to debug.
  napkin_math: |
    - **Scenario:** With 300 features and 20 models, a single uncoordinated feature change can break multiple models.
    - **Risk:** If feature changes happen 5×/week and each has a 10% chance of causing a mismatch, expected time to incident is ~2 weeks.
    - **Impact:** Feature versioning catches mismatches at deploy time, reducing MTTD (Mean Time To Detect) to 0.
