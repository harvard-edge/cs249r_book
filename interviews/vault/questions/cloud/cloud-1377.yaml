title: Cascading Filter Failure in Hierarchical Pipelines
scenario: 'You manage a 3-tier hierarchical visual inspection pipeline for a factory. Tier 1: 5,000 ESP32
  cameras (10 FPS) running a motion-detection CNN. Tier 2: 50 Jetson Orin Nanos running ResNet-34 (max
  150 FPS throughput per node). Tier 3: Cloud GPUs running a Vision Transformer. Normally, Tier 1 triggers
  on 1% of frames, sending them to Tier 2. To prevent dropped frames, Tier 2 is configured to bypass local
  inference and send frames directly to the cloud if its processing queue exceeds 500 frames. During employee
  shift changes, end-to-end latency spikes from 100ms to 8 seconds, yet cloud GPU utilization drops below
  40%. Diagnose the root cause of the bottleneck.'
details:
  realistic_solution: Identify that shift changes cause a massive spike in motion triggers at Tier 1 (e.g.,
    20%+). This overwhelms the Jetson Tier 2 capacity, triggering the offload bypass. The resulting data
    flood saturates the factory's internet uplink, causing severe TCP bufferbloat and starvation at the
    cloud tier. The solution is to drop frames at the edge during peak noise or implement dynamic motion
    thresholds at Tier 1, rather than failing open over a constrained network.
  common_mistake: Candidates often assume the cloud GPUs are failing to auto-scale or the cloud load balancer
    is misconfigured, overlooking the network saturation caused by the 'fail-open' bypass logic at the
    edge.
  napkin_math: 'Normal load: 5000 cams * 10 FPS * 0.01 = 500 FPS total (10 FPS per Jetson). Shift change
    load: 5000 * 10 FPS * 0.20 = 10,000 FPS total (200 FPS per Jetson). Jetson deficit: 200 - 150 capacity
    = 50 FPS bypassed to cloud per node. Total offload: 50 nodes * 50 FPS = 2,500 FPS. At 1MB per frame,
    this requires 2.5 GB/s (20 Gbps) uplink bandwidth, saturating typical enterprise networks and causing
    the 8-second transmission latency while cloud GPUs sit idle.'
