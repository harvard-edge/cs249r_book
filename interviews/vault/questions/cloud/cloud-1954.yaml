title: Diagnosing High Idle Power in GPU Clusters
scenario: You are investigating a power usage anomaly in a dense cluster of 8-GPU H100 nodes. During a
  period of low workload utilization (around 20% compute), the cluster's total power draw remains stubbornly
  high, consuming nearly 60% of peak power. The facility cooling system recently underwent maintenance,
  causing ambient inlet temperatures to rise from 22°C to 28°C. Diagnose the root cause of this disproportionately
  high power draw during low utilization.
details:
  realistic_solution: Analyze the static versus dynamic power breakdown. At low utilization, dynamic power
    drops, making static power the dominant factor. The 6°C ambient temperature rise significantly increases
    the silicon die temperature, which causes subthreshold leakage current to grow exponentially. The
    solution requires deeper sleep states (power gating) rather than just clock gating, or restoring the
    CRAC cooling capacity to lower the leakage.
  common_mistake: Assuming power consumption scales linearly with compute utilization (dynamic power only)
    and ignoring the exponential relationship between static power (leakage current) and operating temperature.
  napkin_math: Let P_total = P_dyn + P_static. At peak (100% util), P_dyn = 500W, P_stat = 200W (700W
    total). At 20% util, P_dyn = 100W. Due to the temperature rise, leakage increases exponentially, pushing
    P_stat from 200W to ~320W. Total power = 100W + 320W = 420W, which is 60% of the 700W peak despite
    only 20% compute utilization.
