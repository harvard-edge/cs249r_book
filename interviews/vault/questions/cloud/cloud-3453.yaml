title: Designing High-Performance Interconnects for Large-Scale A100 Clusters
scenario: You are designing the interconnect strategy for a distributed training system powering a large language model. The system requires 128 NVIDIA A100 GPUs. The training workload is highly communication-intensive, with frequent all-reduce and all-gather operations.
question: What interconnect architecture would you choose for 128 A100 GPUs with communication-heavy training, and how would NVLink, NVSwitch, InfiniBand, and topology factor in?
details:
  realistic_solution: An optimal solution typically employs a hierarchical approach. Within each node (e.g., 8 A100 GPUs), NVLink and NVSwitch are crucial for maximizing GPU-to-GPU communication, leveraging NVLink's 600 GB/s bidirectional per GPU pair and NVSwitch's ability to create a full-mesh topology with 6.4 TB/s aggregate bandwidth per A100 SXM4 board. For inter-node communication, a high-radix, non-blocking Fat-tree topology built with InfiniBand (e.g., HDR 200 Gb/s or NDR 400 Gb/s) is highly effective. This ensures high bisection bandwidth and low latency across the cluster, critical for global collective operations. While Dragonfly could offer cost savings for very large clusters by using fewer global switches, Fat-tree is generally preferred for its predictable performance and easier scaling up to hundreds of nodes for HPC/AI workloads.
  common_mistake: |
    **The Pitfall:** Underestimating the bisection bandwidth requirements for inter-node communication.
    **The Rationale:** Candidates focus too heavily on the fast intra-node NVLink speeds and treat the inter-node network as an afterthought.
    **The Consequence:** The design becomes severely imbalanced, with the inter-node InfiniBand network becoming a massive bottleneck for global all-reduce operations.
  napkin_math: |
    - Intra-node (NVSwitch): 12 NVLink connections per A100 × 50 GB/s = 600 GB/s bidirectional per GPU.
    - Inter-node (InfiniBand HDR): 8 links × 200 Gb/s = 1.6 Tb/s (200 GB/s) per node.
    - Target per-GPU bandwidth for All-Reduce: ~50 GB/s.
    - **Cluster Bisection Bandwidth Target:** 128 GPUs × 50 GB/s = **6.4 TB/s**.
    - This validates the need for a non-blocking Fat-tree topology at the spine to sustain collective operations.
