title: The CXL Memory Tier
scenario: Your inference server has 80 GB of HBM (GPU VRAM) and 512 GB of CXL-attached memory at ~200
  ns latency and ~64 GB/s bandwidth. You're serving a 70B model (140 GB FP16). Can you use CXL memory
  to avoid tensor parallelism? Calculate the performance impact.
question: "Can CXL memory avoid tensor parallelism for the 140 GB FP16 70B model, and what performance impact would it have?"
details:
  realistic_solution: 'CXL memory has ~3× the latency of DDR5 and ~50× less bandwidth than HBM3. You can
    store the model across both tiers, but the layers served from CXL will be dramatically slower. The
    key insight: not all layers are accessed equally during decode. The embedding table and output projection
    are accessed once per token, while each transformer layer is accessed once per layer per token. Offloading
    the right layers minimizes impact.'
  common_mistake: '"CXL memory is just slower DRAM — put the overflow weights there and it''ll work fine
    with maybe 2× slowdown." The actual impact depends on which layers you offload and the access pattern.'
  napkin_math: '140 GB model: 80 GB in HBM, 60 GB in CXL. HBM bandwidth: 3.35 TB/s. CXL bandwidth: 64
    GB/s. If layers are split proportionally (57% HBM, 43% CXL): per-token time = 80/3,350 + 60/64 = 0.024
    + 0.938 = **0.96 sec/token** — the CXL portion is 39× slower and dominates. Smarter approach: put
    attention layers (which access KV-cache frequently) in HBM and MLP layers (which are pure GEMMs) in
    CXL. MLP is ~67% of weights = 94 GB. Put 80 GB of MLP + attention in HBM, 60 GB of MLP in CXL. With
    prefetching (overlap CXL reads with HBM compute): effective overhead = max(HBM time, CXL time) per
    layer group. Max(0.024, 0.938) = 0.938 sec/token. Still limited to ~1 token/sec. **Verdict: CXL helps
    for batch inference (high arithmetic intensity hides latency) but not for low-batch decode.**'
