title: Evaluating Two Clusters for Training Competition
scenario: 'For an MLPerf submission: Cluster A has 256 A100s at 50% MFU, known to converge in 8,000 steps
  at batch size 2048. Cluster B has 512 H100s at 40% MFU, but larger batches (4096) may need 12,000 steps.
  Which wins on time-to-train?'
details:
  realistic_solution: 'Cluster A throughput: 256 × 312 TFLOPS × 0.50 = 39,936 TFLOPS. Per-step FLOPs (batch
    2048): let F be FLOPs per sample. Step time = 2048F / 39.936e15. Total time = 8000 × 2048F / 39.936e15
    = 16.384e6 × F / 39.936e15 = 4.10e-10 × F. Cluster B throughput: 512 × 989 TFLOPS × 0.40 = 202,547.2
    TFLOPS. Per-step FLOPs (batch 4096): Step time = 4096F / 202.5e15. Total time = 12000 × 4096F / 202.5472e15
    = 49.152e6 × F / 202.5472e15 = 2.43e-10 × F. Cluster B is 1.7x faster despite lower MFU and more steps,
    because 512 H100s at 989 TFLOPS each provide 5x more raw throughput. However, Cluster B''s 40% MFU
    suggests communication or software issues — improving MFU to 50% would make it 2.1x faster.'
  common_mistake: Comparing only step throughput without accounting for the total number of steps needed.
    Larger batches process more data per step but often need more total computation to converge.
  napkin_math: 'A: total FLOPs = 8K×2048×F, throughput 39.9 PFLOPS → T_A = 4.10e-10 × F. B: 12K×4096×F,
    throughput 202.5 PFLOPS → T_B = 2.43e-10 × F. B wins by 1.7x.'
