title: Evaluating Two Clusters for Training Competition
scenario: For an MLPerf submission: Cluster A has 256 A100s (312 TFLOPS each) at 50% MFU, known to converge in 8,000 steps at batch size 2048. Cluster B has 512 H100s (989 TFLOPS each) at 40% MFU, but the larger batch size (4096) means it needs 12,000 steps to converge.
question: Which cluster wins on time-to-train, and by what factor?
details:
  realistic_solution: 'Cluster A throughput: 256 × 312 TFLOPS × 0.50 = 39,936 TFLOPS. Per-step FLOPs (batch 2048): let F be FLOPs per sample. Step time = 2048F / 39.936e15. Total time = 8000 × 2048F / 39.936e15 = 16.384e6 × F / 39.936e15 = 4.10e-10 × F. Cluster B throughput: 512 × 989 TFLOPS × 0.40 = 202,547.2 TFLOPS. Per-step FLOPs (batch 4096): Step time = 4096F / 202.5e15. Total time = 12000 × 4096F / 202.5472e15 = 49.152e6 × F / 202.5472e15 = 2.43e-10 × F. Cluster B is 1.7x faster despite lower MFU and more steps, because 512 H100s at 989 TFLOPS each provide 5x more raw throughput. However, Cluster B''s 40% MFU suggests communication or software issues — improving MFU to 50% would make it 2.1x faster.'
  common_mistake: |
    **The Pitfall:** Comparing only step throughput without accounting for the total number of steps.
    **The Rationale:** Candidates easily calculate FLOPS/sec but forget that larger batches often degrade sample efficiency.
    **The Consequence:** They overestimate the speedup of the larger cluster by ignoring the 50% increase in total steps required to converge.
  napkin_math: |
    - **Cluster A Raw Throughput:** 256 × 312 TFLOPS × 0.50 = 39,936 TFLOPS.
    - **Cluster A Total Compute:** 8,000 steps × 2048 batch × F FLOPs = 16.384e6 × F FLOPs.
    - **Cluster A Time (T_A):** 16.384e6 × F / 39.936e15 = 4.10e-10 × F seconds.
    - **Cluster B Raw Throughput:** 512 × 989 TFLOPS × 0.40 = 202,547.2 TFLOPS.
    - **Cluster B Total Compute:** 12,000 steps × 4096 batch × F FLOPs = 49.152e6 × F FLOPs.
    - **Cluster B Time (T_B):** 49.152e6 × F / 202.5472e15 = 2.43e-10 × F seconds.
    - **Speedup:** T_A / T_B = 4.10 / 2.43 = **1.69x.**
    - **Conclusion:** **Cluster B wins by ~1.7x.**
