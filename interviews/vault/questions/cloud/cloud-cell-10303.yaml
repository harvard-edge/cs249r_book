title: Specifying Resource Limits to Prevent GPU Memory OOM Eviction
scenario: An inference service runs vLLM on A100 80 GB HBM2e nodes inside Kubernetes. Ops notices pods
  are occasionally OOMKilled and restarted, causing 30-second cold-start latency spikes. The pod spec
  currently sets CPU/RAM limits but no GPU memory limits. Specify a resource configuration that reduces
  evictions without over-provisioning.
details:
  realistic_solution: 'Set `resources.requests.memory` and `resources.limits.memory` to at least 2× the
    model''s CPU-resident data: for a 7B parameter model in BF16 (14 GB) with a ~34 GB KV cache (32 layers,
    32 heads, 128 dim), set RAM limit to 64 Gi. Set `resources.requests.nvidia.com/gpu: 1` and `limits.nvidia.com/gpu:
    1`. Use `LimitRange` at the namespace level to enforce a floor. Add a readiness probe on the vLLM
    health endpoint so Kubernetes withholds traffic during KV cache warmup.'
  common_mistake: 'Setting `nvidia.com/gpu: 1` as both request and limit is correct for device allocation,
    but teams often forget to tune the container''s CPU memory limit. The vLLM process pins large CPU
    RAM buffers for KV cache paging; if the RAM limit is hit, the Linux OOM killer terminates the process,
    not just the GPU allocation.'
  napkin_math: '7B params × 2 bytes/param (BF16) = 14 GB model weights. KV cache for batch=32, seq=2048,
    32 layers, 32 heads, 128-dim: 32 × 2048 × 32 layers × 32 heads × 128 dim × 2 (K+V) × 2 bytes ≈ 34
    GB. (Alternatively with 16 heads: ≈17 GB.) Total GPU: 14 + 34 = 48 GB < 80 GB HBM2e (with 32 KV heads);
    still fits within A100 capacity. CPU RAM: page table + activation buffers ≈ 8–12 GB; limit at 24 Gi
    avoids OOM with headroom.'
