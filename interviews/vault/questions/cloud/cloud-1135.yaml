title: Multi-Stage Embedding Model Migration
scenario: You are upgrading a core user embedding model (v1, ResNet-50, 2048-d) to a new architecture (v2, ViT-B/16, 768-d). The embeddings are consumed in real-time by 3 downstream microservices at a rate of 10,000 images/sec. v1 takes 2ms/image, while v2 takes 8ms/image.
question: "How would you safely migrate from the 2048-d v1 embedding model to the 768-d v2 model while managing the temporary GPU cost surge?"
details:
  realistic_solution: 'Implement dependency-aware routing via a model registry. Deploy v2 as a parallel endpoint (dual-serving). Deploy v2-compatible downstream models alongside their v1 counterparts. Use traffic shadowing to validate the v2 graph before cutting over client traffic, then deprecate v1.'
  common_mistake: |
    **The Pitfall:** Updating the upstream embedding model in-place.
    **The Rationale:** Engineers assume microservices are decoupled and can handle upstream changes seamlessly.
    **The Consequence:** Downstream models crash from dimension mismatch (2048-d to 768-d) or fail silently due to latent space semantic shifts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 images/sec, v1=2ms, v2=8ms, $0.75/hr/GPU, 1-week migration.

    **Calculations:**
    - v1 Compute: 10,000 * 0.002s = 20 GPUs.
    - v2 Compute: 10,000 * 0.008s = 80 GPUs.
    - Concurrent serving requires 100 GPUs.
    - Cost: 100 GPUs * 168h * $0.75 = $12,600.

    **Conclusion & Interpretation:**
    - **Result: Concurrent Buffer Cost.** Dual-serving requires 100 GPUs simultaneously during the 1-week transition.
