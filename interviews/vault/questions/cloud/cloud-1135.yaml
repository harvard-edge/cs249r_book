title: Multi-Stage Embedding Model Migration
scenario: You are upgrading a core user embedding model (v1, ResNet-50, 2048-d) to a new architecture
  (v2, ViT-B/16, 768-d) deployed on L4 GPUs. The embeddings are consumed in real-time by 3 downstream
  microservices (Ads Ranker, Feed Ranker, Safety Classifier) at a rate of 10,000 images/sec. v1 takes
  2ms/image, while v2 takes 8ms/image. Evaluate the deployment strategy to migrate all downstream models
  safely while managing the temporary surge in GPU operational costs.
details:
  realistic_solution: Implement dependency-aware routing via a model registry. Deploy v2 as a parallel
    endpoint (dual-serving). Deploy v2-compatible downstream models alongside their v1 counterparts. Use
    traffic shadowing to validate the v2 graph before cutting over client traffic, then deprecate v1.
  common_mistake: Updating the upstream embedding model in-place without coordinating with downstream
    consumers, causing dependent models to crash from dimension mismatch or fail silently due to latent
    space shifts.
  napkin_math: Peak API load is 10,000 requests/sec. The v1 model requires 0.002s/req, needing 10,000
    * 0.002 = 20 GPUs. The new v2 model takes 0.008s/req, needing 10,000 * 0.008 = 80 GPUs. To execute
    a zero-downtime blue/green deployment, both versions must serve traffic concurrently, requiring 100
    GPUs total. Over a 168-hour (1 week) transition at $0.75/hr/GPU, the overlap buffer costs 100 * 168
    * $0.75 = $12,600.
