title: Container Image Optimization for GPU ML Workloads
scenario: Your ML training container image is 25 GB (includes CUDA toolkit, PyTorch, datasets, and model
  checkpoints). Pod startup takes 8 minutes because each node must pull the full image. How do you reduce
  this to under 1 minute?
details:
  realistic_solution: 'Multi-pronged approach: (1) Layer caching with base images: split into base image
    (NVIDIA CUDA base + PyTorch = ~15 GB, changes rarely) and application layer (code + configs = ~500
    MB, changes frequently). Use a private registry with layer-level caching. After first pull, only the
    small application layer needs pulling on updates. (2) Pre-pull DaemonSet: create a DaemonSet that
    pulls the large base image to all GPU nodes proactively. When a training pod starts, the 15 GB base
    layer is already cached. Only the ~500 MB app layer pulls = ~5 seconds at 100 MB/s. (3) Separate data
    from images: mount datasets and checkpoints as PersistentVolumes (NFS, CephFS, or cloud storage).
    This removes 10+ GB from the image. (4) Lazy image pulling with Stargz/SOCI: use eStargz format or
    AWS SOCI (Seekable OCI) to allow containers to start before the full image is pulled. Only needed
    layers are pulled on-demand. Startup drops to <30 seconds. (5) Registry placement: use a cluster-local
    registry (Harbor) or cloud registry in the same region. Cross-region pulls add 2-5× latency. Result:
    25 GB image → 500 MB effective pull + pre-cached base → <30 second startup.'
  common_mistake: Trying to reduce image size by removing CUDA libraries — these are essential and incompressible.
    The real issue is image pull time and caching strategy.
  napkin_math: '25 GB at 100 MB/s = 250 s (4.2 min) network + decompression. With pre-cached base (15
    GB) + external data (10 GB): only 500 MB to pull = 5 s. 50× improvement.'
