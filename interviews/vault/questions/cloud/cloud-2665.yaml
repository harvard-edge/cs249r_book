title: Why Tail Latency Matters at Scale
scenario: A service has p50=5ms and p99=50ms latency. A user request fans out to 100 backend shards in parallel, waiting for ALL to respond.
question: What is the effective p99 latency the user experiences?
details:
  realistic_solution: 'When a request fans out to N services in parallel, the response time is the MAX of all N response times. The probability that all N services respond within time T is P(max < T) = P(single < T)^N. For p99=50ms: P(single < 50ms) = 0.99. P(all 100 < 50ms) = 0.99^100 = 0.366. So only 36.6% of user requests complete within 50ms — meaning p99 at the user level is much worse than 50ms. To find user-facing p99: we need P(max < T) = 0.99, so P(single < T) = 0.99^(1/100) = 0.9999. This means the per-shard latency at the 99.99th percentile becomes the user''s p99 latency. Tail latency that is negligible for a single service becomes dominant when you fan out to many services. This is ''tail at scale'' — Dean & Barroso''s key insight motivating tail-tolerant design.'
  common_mistake: |
    **The Pitfall:** Monitoring only p50 or p99 of individual services.
    **The Rationale:** Engineers assume that if individual services meet their SLOs, the overall system will too.
    **The Consequence:** With large fan-out, the user experience is determined by the extreme tail percentiles, leading to a much slower user experience than dashboard metrics suggest.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Individual p99 = 50ms.
       - Fan-out (N) = 100 parallel shards.
    2. **Calculations:**
       - Probability of single fast response: P(single < 50ms) = 0.99.
       - Probability of all 100 fast responses: P(all < 50ms) = 0.99^100 ≈ 0.366 (36.6%).
       - Target user p99: To achieve P(max < T) = 0.99, we need P(single < T) = 0.99^(1/100) ≈ 0.9999.
    3. **Conclusion & Interpretation:**
       - **Result: Tail Latency Amplification.** The user's p99 is dictated by the system's p99.99, meaning 63.4% of users experience latency > 50ms.
