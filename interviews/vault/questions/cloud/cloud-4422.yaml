title: Chiplet Die-to-Die Latency Impact on Pipeline Bubble Rate
scenario: A pipelined inference system on a multi-chiplet accelerator shows 7% throughput degradation compared to simulation. The pipeline crosses XCD boundaries 3 times per forward pass. Each boundary crossing adds 180ns of latency.
question: If a forward pass crosses boundaries 3 times at 180 ns each, what causes the 7% throughput drop, and how would you fix it?
details:
  realistic_solution: 'Pipeline efficiency = compute_time / (compute_time + stall_time). The raw latency of 3 × 180ns = 540ns (0.00054ms) is negligible vs a 10ms forward pass. The 7% observed degradation must come from pipeline bubbles, not raw latency: if each XCD boundary crossing stalls a pipeline stage while waiting for data, the stall time = crossing latency / stage_granularity. If pipeline stage = 10ms/N_stages, stalls of 180ns per crossing can still bubble up to ~7% at fine granularity. Fix: (1) Use double-buffering at XCD boundaries — prefetch next layer''s weights while current layer computes; (2) Remap layers to minimize XCD crossings — keep attention heads on same XCD as their FFN; (3) Overlap die-to-die transfer with independent computation using HIP streams.'
  common_mistake: |
    **The Pitfall:** Treating inter-chiplet latency as a fixed mathematical overhead to simply add to the end-to-end time.
    **The Rationale:** Engineers assume latency behaves additively, forgetting how pipelined systems magnify synchronous stalls.
    **The Consequence:** A 180ns stall in a stage with 100ns of compute effectively doubles that stage's wall time. Unmanaged die-to-die crossings crater pipeline efficiency.
  napkin_math: |
    1. **Raw Latency Added:** 3 crossings × 180ns = 540ns = 0.00054ms.
    2. **Direct Impact:** If forward compute is ~10ms, adding 0.00054ms is a 0.0054% slowdown, which is negligible.
    3. **Pipeline Bubble Impact:** The observed 7% degradation implies the 180ns latency is stalling a critical pipeline stage, creating a bubble that compounds throughout the system.
    4. **Fix:** Double-buffering overlaps the 180ns transfer with next-stage compute, eliminating the stall and reducing overhead to **<1%**.
