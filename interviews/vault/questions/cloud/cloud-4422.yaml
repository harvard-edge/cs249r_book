title: Chiplet Die-to-Die Latency Impact on Pipeline Bubble Rate
scenario: A pipelined inference system on a multi-chiplet accelerator shows 7% throughput
  degradation compared to simulation. The pipeline crosses XCD boundaries 3 times
  per forward pass. Each XCD boundary crossing adds 180ns latency. Compute the pipeline
  bubble rate and propose fixes.
question: If a forward pass crosses XCD boundaries 3 times at 180 ns each but throughput
  drops 7%, what is the pipeline bubble rate and how would you fix it?
details:
  realistic_solution: 'Pipeline efficiency = compute_time / (compute_time + stall_time).
    The raw latency of 3 × 180ns = 540ns (0.00054ms) is negligible vs a 10ms forward
    pass. The 7% observed degradation must come from pipeline bubbles, not raw latency:
    if each XCD boundary crossing stalls a pipeline stage while waiting for data,
    the stall time = crossing latency / stage_granularity. If pipeline stage = 10ms/N_stages,
    stalls of 180ns per crossing can still bubble up to ~7% at fine granularity. Fix:
    (1) Use double-buffering at XCD boundaries — prefetch next layer''s weights while
    current layer computes; (2) Remap layers to minimize XCD crossings — keep attention
    heads on same XCD as their FFN; (3) Overlap die-to-die transfer with independent
    computation using HIP streams.'
  common_mistake: Treating inter-XCD latency as a fixed overhead to subtract from
    throughput. In a pipelined system, die-to-die latency causes bubbles that compound
    — a 180ns stall in a stage with 100ns compute time effectively doubles that stage's
    wall time and reduces pipeline efficiency.
  napkin_math: 'Without die crossings: throughput = 1/T_compute. With 3 crossings
    at 180ns each: added latency = 540ns = 0.00054ms. If forward pass compute = 10ms:
    new time = 10ms + 0.00054ms = 10.00054ms → 0.0054% slowdown. Observed 7% degradation
    implies other factors (e.g., pipeline stalls, cache misses, synchronization bubbles
    at XCD boundaries) dominate, not raw latency. Double-buffering: overlap 180ns
    transfer with next-stage compute → eliminates most stall → reduces to <1% overhead.'
