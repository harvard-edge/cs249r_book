title: 'Model Size Estimation: Design Quantization Strategy for Fitting 70B on Single
  H100'
scenario: 'Design a quantization strategy to fit a 70B LLaMA model on a single H100
  (80GB HBM3) for low-latency single-request inference (no batching). Consider: weight-only
  quantization (INT4, INT8), activation quantization (FP8), mixed precision (INT4
  weights + FP16 activations), and their accuracy/latency tradeoffs. Specify exact
  memory layout.'
question: What quantization and memory layout would fit a 70B LLaMA model on one 80GB
  H100 for low-latency single-request inference?
details:
  realistic_solution: 'Strategy: INT4 weights + FP16 activations (W4A16). Memory:
    70B x 0.5B = 35GB weights. Embeddings (vocab 32K x 8192 hidden x FP16): 32Kx8192x2=512MB.
    LM head: same 512MB. KV cache (batch=1, seq=4096, 80 layers, 8 GQA heads x 128 dim): 1x4096x2x1024x2x80=1.34GB.
    Total: 35+0.5+0.5+1.34=37.34GB \checkmark (fits with 42GB headroom). Inference: weight dequantize
    INT4->FP16 on-the-fly: 35GB reads at 3.35TB/s = 10.4ms/token. 4x faster than FP16
    (41.8ms). Accuracy: GPTQ INT4 on LLaMA-70B: <1% perplexity increase.'
  common_mistake: Applying uniform INT4 quantization to all layers including embedding
    and LM head, which causes catastrophic accuracy degradation vs. keeping embeddings
    in FP16, or forgetting that LLaMA 70B uses Grouped Query Attention (GQA) which drastically reduces KV cache size.
  napkin_math: 'W4A16: 70B x 4 bits / 8 = 35GB. Embeddings FP16: 32Kx8192x2B = 512MB.
    LM head: 512MB. KV (GQA): 4096x2x1024x2x80=1.34GB. Total: 35+0.5+0.5+1.34=37.34GB <
    80GB \checkmark. Decode: read 35GB per step at 3.35TB/s = 10.4ms/token. FP16 baseline:
    140GB/3.35TB/s = 41.8ms/token. Speedup: 4x. Accuracy: GPTQ INT4 perplexity delta
    on Wikitext-2: ~0.3 points.'
