title: 'Model Size Estimation: Design Quantization Strategy for Fitting 70B on Single H100'
scenario: 'You need to fit a 70B LLaMA model on a single GPU for low-latency single-request inference. Potential options include weight-only quantization, activation quantization, and mixed precision.'
question: 'What quantization and memory layout would fit a 70B LLaMA model on one 80GB GPU for low-latency inference?'
details:
  realistic_solution: 'Implement Weight-Only Quantization (W4A16). Compress the massive dense linear layers to INT4 weights to fit within the 80GB HBM capacity, but keep activations and sensitive layers (like the vocabulary embedding table and LM head) in FP16 to preserve precision. During inference, on-the-fly dequantization (INT4 to FP16) inside the SM registers ensures fast execution since single-batch generation is entirely memory-bandwidth bound and the INT4 reduction speeds up memory fetch by 4x.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 quantization to all layers.
    **The Rationale:** Candidates often blindly apply a single quantization scheme across the entire model for simplicity.
    **The Consequence:** Quantizing highly sensitive layers like the embedding table and LM head causes catastrophic accuracy degradation compared to a mixed-precision approach.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Single 80GB GPU. Batch = 1, Seq = 4096.
       * 70B parameters.
    2. **Calculations:**
       * Weights (INT4): 70B * 0.5 bytes = 35 GB.
       * Embeddings/LM Head (FP16): 32K vocab * 8192 hidden * 2 bytes * 2 = ~1.0 GB.
       * KV cache (GQA): 1 batch * 4096 seq * 2 * 1024 * 2 bytes * 80 layers = 1.34 GB.
       * Total Memory: 35 + 1.0 + 1.34 = 37.34 GB.
    3. **Conclusion & Interpretation:**
       * **Result: W4A16 fits perfectly at 37.34 GB, and the 4x reduction in weight fetch perfectly addresses the Memory-Bound bottleneck.**
