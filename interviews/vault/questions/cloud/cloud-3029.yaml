title: 'Model Size Estimation: Design Quantization Strategy for Fitting 70B on Single H100'
scenario: 'You need to fit a 70B LLaMA model on a single H100 (80GB HBM3) for low-latency single-request inference (no batching). Potential options include weight-only quantization (INT4, INT8), activation quantization (FP8), and mixed precision (INT4 weights + FP16 activations).'
question: 'What quantization and memory layout would fit a 70B LLaMA model on one 80GB H100 for low-latency single-request inference?'
details:
  realistic_solution: 'Strategy: INT4 weights + FP16 activations (W4A16). Memory: 70B x 0.5B = 35GB weights. Embeddings (vocab 32K x 8192 hidden x FP16): 32Kx8192x2=512MB. LM head: same 512MB. KV cache (batch=1, seq=4096, 80 layers, 8 GQA heads x 128 dim): 1x4096x2x1024x2x80=1.34GB. Total: 35+0.5+0.5+1.34=37.34GB ✓ (fits with 42GB headroom). Inference: weight dequantize INT4->FP16 on-the-fly: 35GB reads at 3.35TB/s = 10.4ms/token. 4x faster than FP16 (41.8ms). Accuracy: GPTQ INT4 on LLaMA-70B: <1% perplexity increase.'
  common_mistake: |
    **The Pitfall:** Applying uniform INT4 quantization to all layers.
    **The Rationale:** Candidates often blindly apply a single quantization scheme across the entire model for simplicity.
    **The Consequence:** Quantizing highly sensitive layers like the embedding table and LM head causes catastrophic accuracy degradation compared to a mixed-precision approach.
  napkin_math: |
    * **Weights (INT4):** 70B * 0.5 bytes = 35 GB.
    * **Embeddings (FP16):** 32K vocab * 8192 hidden * 2 bytes = 0.5 GB.
    * **LM Head (FP16):** 0.5 GB.
    * **KV cache (GQA):** 1 batch * 4096 seq * 2 (K+V) * 1024 * 2 bytes * 80 layers = 1.34 GB.
    * **Total Memory:** 35 + 0.5 + 0.5 + 1.34 = **37.34 GB** (Fits easily in 80GB).
    * **Latency speedup:** Reading 35GB vs 140GB provides a **4x speedup** at batch 1.
