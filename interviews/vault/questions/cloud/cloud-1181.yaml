title: Eager vs Static Execution in Dynamic GNNs
scenario: A research team is developing a dynamic Graph Neural Network (GNN) for real-time fraud detection
  on a cluster of 8x A100 GPUs. The graph structure changes per batch, with sequence lengths varying wildly
  from 10 to 10,000 nodes. They are currently using PyTorch in eager mode to handle the complex, data-dependent
  control flow, achieving 450 samples/second. As they transition to production, the ML platform team demands
  switching to a static graph execution model (like torch.compile or XLA) to reduce host-side Python overhead
  and improve throughput. The research team pushes back, arguing the dynamic nature of the model will
  break static compilers. Evaluate the trade-offs between eager and static execution for this architecture
  and justify a production deployment strategy.
details:
  realistic_solution: 'Adopt a hybrid compilation strategy. Use a compiler that supports symbolic shapes
    (e.g., torch.compile with dynamic=True) to handle variable inputs without recompilation, or manually
    partition the model: keep dynamic graph traversals in eager mode while statically compiling the compute-heavy,
    static-shaped MLP layers.'
  common_mistake: Blindly advocating for static graphs in production without realizing that highly dynamic
    control flow and variable shapes can trigger constant graph recompilations, making static execution
    significantly slower than eager mode.
  napkin_math: 'Eager mode Python overhead per kernel launch: ~15µs. For a GNN with 50 message-passing
    steps and 10 ops/step, overhead = 500 * 15µs = 7.5ms/batch. If actual GPU compute is only 2ms, host
    overhead dominates (79%). Static graphs eliminate this 7.5ms. However, if unconstrained dynamic shapes
    force a 150ms recompilation every 5 batches, average static time = (5 * 2ms + 150ms) / 5 = 32ms/batch,
    which is over 3x worse than the 9.5ms eager mode time.'
