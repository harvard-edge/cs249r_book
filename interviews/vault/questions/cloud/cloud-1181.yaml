title: Eager vs Static Execution in Dynamic GNNs
scenario: "A research team is developing a dynamic Graph Neural Network (GNN) for real-time fraud detection on a cluster of 8x A100 GPUs. The graph structure changes per batch, with sequence lengths varying wildly from 10 to 10,000 nodes. They are currently using PyTorch in eager mode to handle the complex, data-dependent control flow, achieving 450 samples/second. As they transition to production, the ML platform team demands switching to a static graph execution model (like torch.compile or XLA) to reduce host-side Python overhead and improve throughput."
question: "How would you evaluate eager versus static execution for this dynamic GNN, and what production deployment strategy would you choose?"
details:
  realistic_solution: "Adopt a hybrid compilation strategy. Use a compiler that supports symbolic shapes (e.g., torch.compile with dynamic=True) to handle variable inputs without recompilation, or manually partition the model: keep dynamic graph traversals in eager mode while statically compiling the compute-heavy, static-shaped MLP layers."
  common_mistake: |
    **The Pitfall:** Blindly advocating for static graphs in production without analyzing the workload.
    **The Rationale:** Assuming compilers always make things faster by removing Python overhead.
    **The Consequence:** Highly dynamic control flow and variable shapes trigger constant graph recompilations, destroying throughput.
  napkin_math: |
    *   **Eager Mode Overhead:** ~15µs per kernel launch. 50 steps × 10 ops/step = 500 ops = 7.5ms/batch overhead.
    *   **Eager Total Time:** 2ms compute + 7.5ms overhead = 9.5ms/batch.
    *   **Static Graph (Recompile penalty):** Eliminates 7.5ms overhead, but dynamic shapes force 150ms recompiles.
    *   **Static Avg Time:** If compiling every 5 batches: (5 × 2ms + 150ms) / 5 = 32ms/batch.
    *   **Result:** **For highly dynamic inputs, static compilation (32ms) is 3x slower than eager mode (9.5ms) due to JIT thrashing.**
