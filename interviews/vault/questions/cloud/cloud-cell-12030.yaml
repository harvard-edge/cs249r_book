title: 'MLOps Lifecycle: End-to-End MLOps System Design for Production LLM on H100'
scenario: 'Design the complete MLOps system for a production LLM API (13B model, H100 cluster, 10M requests/day).
  Include: training pipeline, experiment tracking, model registry, A/B testing framework, monitoring,
  alerting, and auto-rollback. Quantify throughput, storage, and cost at each layer. Identify the top
  3 failure modes and their mitigations.'
details:
  realistic_solution: '57.9 represents average concurrent requests in service (Little''s Law: L = λ ×
    W = 1000 req/s × 57.9ms = 57.9 in service), not the arrival rate.'
  common_mistake: Designing each component independently without specifying the integration contracts
    (schema for model cards, evaluation thresholds for promotion, alert thresholds tied to SLA).
  napkin_math: 'Erlang-C at ρ=0.95, target P(wait) < 5%. Server count needed. At 1000 req/s, 57.9ms mean
    service time: λ=1000, μ=1/0.0579=17.27. ρ_per_server=1000/(s×17.27). For ρ=0.95: s = 1000/(0.95×17.27)
    = 61 servers. λ/μ = 57.9 represents average concurrent requests in system (Little''s Law: L = λW =
    1000×0.0579 = 57.9 concurrent requests in service), not requests per second arriving.'
