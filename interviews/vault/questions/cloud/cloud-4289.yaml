title: Federated LoRA Training for Privacy-Preserving Adaptation
scenario: A healthcare company wants to fine-tune a medical LLM across 50 hospitals
  without sharing patient data. Design a federated LoRA training system with differential
  privacy guarantees.
question: How would you design federated LoRA training across 50 hospitals with differential
  privacy guarantees?
details:
  realistic_solution: 'Use DP-LoRA: each hospital trains a local rank-4 adapter with
    Gaussian noise added to gradients before transmission (ε=1.0, δ=10⁻⁵). Central
    server aggregates noisy adapter updates via FedAvg. Noise scale: σ = C√(2ln(1.25/δ))/ε
    × √T where T=rounds, C=gradient clip norm. Key insight: LoRA''s small parameter
    count (vs full fine-tune) dramatically reduces noise needed for the same DP guarantee
    — rank-4 has 4000x fewer parameters than 7B full fine-tune, requiring 4000x less
    noise for same ε.'
  common_mistake: Averaging LoRA adapter gradients directly (FedAvg on adapter parameters).
    Without differential privacy, gradient averaging can leak training data through
    gradient inversion attacks, violating HIPAA.
  napkin_math: 'Rank-4 adapter params: 2×4×4096×32 = 1.05M. Full fine-tune 7B: 7B
    params. DP noise budget: for same ε=1 guarantee, noise ∝ √(params). √(7B/1.05M)
    = √6667 ≈ 82x. DP-LoRA requires 82x less noise than DP full fine-tune for same
    privacy budget → 82x better utility at identical privacy level. Communication:
    1.05M × 4B = 4.2 MB per round vs 7B × 4B = 28 GB for full gradients.'
