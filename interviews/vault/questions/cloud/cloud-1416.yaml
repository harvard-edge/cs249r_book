title: Calculating Influence Functions for Model Debugging
scenario: You are debugging a confidently incorrect prediction from a 50-million parameter ResNet model trained on a 1-million image dataset. To identify which training samples most heavily caused this prediction, you plan to use influence functions. You have a cluster of 100 A100 GPUs.
question: Is exact inverse Hessian computation feasible for the 50M-parameter ResNet, and what approximation should you use instead?
details:
  realistic_solution: Instead of forming the Hessian, apply the Linear time Stochastic Second-Order Algorithm (LiSSA) or Conjugate Gradient to compute an implicit Inverse Hessian-Vector Product (IHVP), reducing both time and memory complexity to O(p).
  common_mistake: |
    **The Pitfall:** Attempting to explicitly materialize the full Hessian matrix or compute its exact inverse.
    **The Rationale:** Candidates rely on the theoretical mathematical definition of influence functions without evaluating hardware feasibility.
    **The Consequence:** Proposing a computationally impossible solution that requires petabytes of memory and years of compute on modern clusters.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters (p): 50 million.
       - Hardware: 100 A100 GPUs (~19.5 TFLOPS FP32 each).
    2. **Calculations:**
       - Full Hessian Memory: (50 * 10^6)² * 4 bytes = 10 PB.
       - Exact Inverse Compute (O(p³)): (50 * 10^6)³ = 1.25 * 10^23 FLOPs.
       - Total Cluster Compute: 100 * 19.5 TFLOPS = 1.95 * 10^15 FLOPs/sec.
       - Time to Compute: 1.25 * 10^23 / 1.95 * 10^15 = 6.4 * 10^7 seconds.
       - 6.4 * 10^7 seconds / 86400 ≈ 740 days.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Infeasible).** Exact Hessian inversion requires 10 PB of RAM and over 2 years of cluster compute, necessitating an O(p) implicit Inverse Hessian-Vector Product approximation.
