title: Multi-Turn Gemini LLM Serving with PagedAttention
scenario: We are scaling the backend for Gemini Advanced, specifically focusing on multi-turn, long-context conversations. Our current inference clusters are bottlenecked by HBM capacity, not compute, due to severe KV cache fragmentation. You must design an inference serving architecture that optimizes KV cache allocation and request routing across a TPU v5p pod to maximize batch size and throughput without violating our 2-second time-to-first-token (TTFT) SLA.
question: How would you design TPU v5p serving for 1M-token chats to reduce KV-cache fragmentation while meeting a 2-second TTFT SLA?
details:
  realistic_solution: Implement a centralized Block Manager utilizing PagedAttention. The KV cache is divided into fixed-size physical blocks (e.g., 16 tokens per block) allocated non-contiguously in HBM, eliminating internal fragmentation. Additionally, requests must be routed intelligently to nodes where previous conversation turns are already cached.
  common_mistake: |
    **The Pitfall:** Relying on static, contiguous memory allocation based on the maximum possible sequence length per request.
    **The Rationale:** Simplifying memory management while ignoring the reality of multi-turn chat dynamics.
    **The Consequence:** Severe KV cache fragmentation and hard-capped concurrency, causing massive system underutilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Size per Token: 128 layers × 16 KV heads × 128 dim × 2 bytes × 2 (K+V) = ~1 MB per token.
    - Max Context: 1M tokens = 1 TB of KV Cache per request.
    - Hardware: TPU v5p Pod (256 chips, 95 GB HBM per chip) = ~24 TB total HBM.

    **Calculations:**
    - Static allocation concurrency: 24 TB / 1 TB per request = 24 concurrent users.
    - PagedAttention (dynamic) concurrency: Average active context is 100k tokens (100 GB). 24 TB / 100 GB = 240 concurrent users.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. Dynamic block allocation via PagedAttention yields a 10x throughput increase by eliminating fragmentation and static over-provisioning.
