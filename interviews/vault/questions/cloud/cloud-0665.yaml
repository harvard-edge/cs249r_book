title: The Attention Cost Explosion
scenario: We're deploying a model that supports 128k context. Users love it, but our serving costs are 10× higher than the 4k-context version, and P99 latency is through the roof. The model has the same number of parameters.
question: Why does 32× more context cost 10× more to serve, and what are our architectural options?
details:
  realistic_solution: "Standard self-attention is $O(n^2)$ in both compute and memory with respect to sequence length. Going from 4k to 128k tokens is a 32× increase in $n$, which means a $32^2 = 1024\times$ increase in attention FLOPs and memory. The attention matrix alone at 128k is enormous. Three architectural mitigations exist, each with different trade-offs: (1) **FlashAttention** — eliminates the $O(n^2)$ memory by tiling to SRAM, but compute is still $O(n^2)$; it buys you memory headroom, not compute savings. (2) **Sliding window / local attention** — reduces to $O(n \times w)$ where $w$ is the window size, but sacrifices global context; tokens beyond the window are invisible. (3) **Sparse attention with global sentinel tokens** — most tokens attend locally, but a small set of global tokens attend to everything, preserving long-range dependencies at sub-quadratic cost."
  common_mistake: |
    **The Pitfall:** Believing that "Context length only affects KV-cache memory, so we just need more VRAM."
    **The Rationale:** Focusing purely on the memory footprint of the sequence without considering the quadratic scaling of the attention computation itself.
    **The Consequence:** Adding VRAM solves the OOM but completely fails to fix the P99 latency explosion caused by the $O(n^2)$ FLOPs.
  napkin_math: |
    1. **4k Tokens FLOPs:** Attention FLOPs per layer per head = $2 \times 4096^2 \times 128 = 4.3 \text{ GFLOPs}$.
    2. **128k Tokens FLOPs:** $2 \times 131072^2 \times 128 = \mathbf{4.4 \text{ TFLOPs}}$ (a 1024x increase).
    3. **128k Memory:** Attention matrix memory at 128k in FP16 = $131072^2 \times 2$ Bytes = 34.36 GB (exactly 32 GiB) per head per layer.
    4. **Total Memory:** 32 heads $\times$ 80 layers $\times$ 32 GiB = 81,920 GiB = **80 TiB** (impossible without FlashAttention's tiling).
    5. **Result:** **With a sliding window of $w = 4096$, attention FLOPs drop back to $2 \times 131072 \times 4096 \times 128 = 137 \text{ GFLOPs}$ per layer per head (a 32x reduction from full attention).**
