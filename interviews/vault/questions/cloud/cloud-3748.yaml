title: 'The Cooling Cliff: Air vs Liquid at GPU Density'
scenario: An accelerator GPU has a TDP of 750W. A server with 8 GPUs draws ~6 kW for GPUs alone, plus ~2 kW for CPUs, networking, and fans, totaling ~8 kW. Your datacenter uses traditional CRAH (Computer Room Air Handler) cooling rated for 15 kW per rack. You need 4 of these servers (32 GPUs) per rack for cluster density.
question: What is the thermal challenge, and how do you solve it?
details:
  realistic_solution: '4 servers × 8 kW = 32 kW per rack, more than double the 15 kW CRAH rating. Air cooling physically cannot remove 32 kW from a standard rack — you would need ~2700 CFM of airflow, creating deafening noise and hot-spot recirculation. Solutions: (1) Direct liquid cooling (DLC) with cold plates on each MI300X, handling ~90% of heat via liquid loop at 40-45°C supply temperature. Remaining 10% (DIMMs, SSDs) handled by reduced-capacity air. (2) Rear-door heat exchangers as an intermediate step (handles ~30 kW but adds complexity). (3) Immersion cooling (single-phase or two-phase) eliminates air entirely. DLC is the industry consensus for >700W GPUs.'
  common_mistake: |
    **The Pitfall:** Thinking you can just add more CRAH units.
    **The Rationale:** Air has inherently low heat capacity (~1 kJ/kg·K vs water at 4.18 kJ/kg·K), so beyond ~25 kW/rack, air cooling requires impractical airflow volumes.
    **The Consequence:** Creating deafening noise, hot-spot recirculation, and turbulence issues without sufficiently cooling the servers.
  napkin_math: |
    - 8 GPUs at 750W = 6 kW GPU + 2 kW ancillary = 8 kW/server.
    - 4 servers/rack = 32 kW total.
    - Air cooling limit = ~15 kW (max ~25 kW pushed).
    - DLC (Direct Liquid Cooling) can handle >100 kW/rack.
    - PUE improvement: air at 1.3-1.4 vs **DLC at 1.03-1.10**.
