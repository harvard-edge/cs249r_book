title: H100 Cluster Power and Cooling Architecture
scenario: You are designing a new large-scale training cluster using 8x H100 nodes within a strict total
  facility power budget of 25 MW. Each H100 GPU has a 700W TDP, and the host system plus networking adds
  2.4 kW, totaling 8.0 kW per node. Your standard air-cooled racks support 15 kW maximum, yielding a facility
  PUE of 1.3. Alternatively, you can deploy direct-to-chip (D2C) liquid-cooled racks supporting 60 kW
  each, which lowers the facility PUE to 1.15. Design the optimal datacenter architecture to maximize
  total compute throughput, size the maximum cluster for both cooling strategies, and evaluate the trade-offs
  regarding physical footprint and networking.
question: "Which cooling architecture maximizes compute under the 25 MW facility cap, and how many nodes and racks can air vs D2C liquid support?"
details:
  realistic_solution: 'The correct approach is to calculate the IT power budget for both scenarios and
    translate that into node counts and rack footprints. The liquid-cooled architecture is heavily favored:
    the lower PUE frees up ~2.5 MW for IT load, yielding over 300 additional nodes. Furthermore, the 60
    kW rack density condenses the cluster from over 2,400 racks down to under 400 racks, drastically reducing
    optical transceiver count, cabling length, and switch tiers.'
  common_mistake: Candidates often forget to divide the total facility budget by the PUE to find the IT
    power budget. They may also miss that a 15 kW air-cooled rack can only host a single 8.0 kW node,
    leading to extreme stranding of physical space and exploding the radix requirements for the backend
    network.
  napkin_math: 'Total Budget: 25,000 kW. Air-cooled IT Power: 25,000 / 1.3 = 19,230 kW. Max air nodes:
    19,230 / 8 = 2,403 nodes. Air nodes per rack: floor(15 / 8) = 1 node. Total air racks: 2,403 racks.
    Liquid-cooled IT Power: 25,000 / 1.15 = 21,739 kW. Max liquid nodes: 21,739 / 8 = 2,717 nodes. Liquid
    nodes per rack: floor(60 / 8) = 7 nodes. Total liquid racks: ceil(2,717 / 7) = 389 racks. Liquid cooling
    yields 314 more nodes (+13% compute) and reduces the physical footprint by 84%.'
