math_issues:
- The unfused time calculation (0.139 + 0.0095 + 0.019 = 0.167ms) incorrectly uses 0.0095ms (the one-way
  memory time) instead of 0.0025ms (the GELU compute time) in the sum.
- Adding both 0.0095ms and 0.019ms double-counts the memory latency, as 0.019ms already represents the
  full HBM round-trip (read + write).
