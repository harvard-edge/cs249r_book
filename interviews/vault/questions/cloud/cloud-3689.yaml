title: Spot Instance Preemption Handling in Training Clusters
scenario: You run a 32-GPU A100 training job on AWS spot instances to save 70% on
  costs. Spot interruption notices arrive with a 2-minute warning. Your training step
  takes 15 seconds and checkpoints take 8 minutes (full model save). You need to handle
  preemptions without losing more than 10 minutes of training. Implement a fault-tolerant
  checkpointing strategy.
question: How would you design checkpointing for 32 A100 spot training so a 2-minute
  interruption notice loses under 10 minutes of work?
details:
  realistic_solution: 'Implement incremental/delta checkpointing: save only changed
    optimizer state tensors (typically 20-30% of full state per step). Use PyTorch''s
    FSDP with save_on_each_rank=True and write to local NVMe first, then async-copy
    to S3. On receiving SIGTERM (2-min warning), trigger an emergency lightweight
    checkpoint: save only model weights (not optimizer state), accepting a slight
    training regression. Full checkpoint every 30 steps (7.5 min).'
  common_mistake: Using a 'save checkpoint every N steps' policy with a fixed interval
    of 60 steps (15 min). When a 2-minute preemption notice arrives, the job cannot
    complete a full checkpoint before termination, losing up to 15 minutes of work
    — exceeding the 10-minute tolerance.
  napkin_math: 'Full checkpoint: 32 GPUs × 5 GB model shard = 160 GB. At S3 write
    speed 2 GB/s per instance × 32 = 64 GB/s aggregate: 160 GB / 64 GB/s = 2.5 seconds.
    Wait — actual NFS or EFS bottleneck often limits to 10-20 GB/s total: 160 GB /
    10 GB/s = 16 seconds. Emergency lightweight checkpoint (weights only, no optimizer):
    160 GB / 2 = 80 GB → 8 seconds. Fits in 2-minute window.'
