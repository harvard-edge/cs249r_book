title: Diagnosing SRAM Spills in Tiled Attention
scenario: A team is optimizing a custom Transformer for 16K sequence lengths on A100 GPUs (164 KB usable
  shared SRAM per SM). They implement a tiled, IO-aware attention kernel inspired by FlashAttention using
  FP16 with a head dimension d=128 and tiling blocks Br=256 and Bc=256. Profiling reveals intermediate
  matrix blocks are silently spilling to HBM, bottlenecking memory bandwidth and yielding only a 1.2x
  speedup over standard attention instead of the expected >3x. Diagnose the root cause of the HBM spilling.
details:
  realistic_solution: The chosen block sizes require more shared memory than the A100 SM provides. Reduce
    the tile sizes (e.g., Br=64, Bc=128) so the loaded Q, K, V, O blocks and intermediate accumulators
    strictly fit within the 164 KB SRAM limit, entirely preventing HBM roundtrips.
  common_mistake: Assuming the bottleneck is poor Tensor Core arithmetic intensity or suggesting to increase
    the tile size for better compute utilization, ignoring hard hardware SRAM limits per SM.
  napkin_math: 'With Br=256, Bc=256, d=128, FP16 (2 Bytes): Q block = 256 * 128 * 2B = 64 KB. K block
    = 64 KB. V block = 64 KB. Output block = 64 KB. Total = 256 KB. 256 KB > 164 KB A100 SRAM limit. Reducing
    to Br=64, Bc=128 uses: 16KB (Q) + 32KB (K) + 32KB (V) + 16KB (O) = 96 KB, safely below the 164 KB
    limit.'
