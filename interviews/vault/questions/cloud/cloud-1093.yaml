title: Calculating Data Stall Ratio for Vision Transformers
scenario: You are training a 3D Vision Transformer on an 8xA100 node using high-resolution medical images. Each training step processes a global batch of 12 GB. The storage backend provides a maximum sustained throughput of 60 GB/s to the compute node. The forward and backward pass computation combined takes exactly 150 ms per step.
question: Assuming perfect asynchronous data prefetching where computation and I/O overlap entirely, what is the Data Stall Ratio for the accelerators?
details:
  realistic_solution: 'With perfect asynchronous prefetching, the total step time is dictated by the slower of the two operations: max(t_compute, t_io). First, calculate the I/O time: 12 GB / 60 GB/s = 200 ms. Since I/O (200ms) is slower than compute (150ms), the system is I/O bound and the total step time is 200 ms. The accelerator spends 150 ms computing and stalls for the remaining 50 ms. The data stall ratio is the stall time divided by the total step time.'
  common_mistake: |
    **The Pitfall:** Summing the I/O and compute times or calculating the wrong ratio.
    **The Rationale:** Candidates ignore prefetch overlap, assuming operations are sequential, or they misinterpret the definition of Data Stall Ratio.
    **The Consequence:** They incorrectly estimate a 350ms total step time or calculate the compute-to-I/O ratio instead of the percentage of step time spent stalled.
  napkin_math: |
    - t_io = 12 GB / 60 GB/s = 0.2 seconds = 200 ms.
    - t_compute = 150 ms.
    - Step Time = max(t_io, t_compute) = max(200, 150) = 200 ms.
    - Stall Time = Step Time - t_compute = 200 - 150 = 50 ms.
    - Data Stall Ratio = Stall Time / Step Time = 50 / 200 = **25%**.
