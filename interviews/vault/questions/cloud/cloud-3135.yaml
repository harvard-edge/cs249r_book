title: PagedAttention Memory Fragmentation
scenario: You serve a 70B model on 8x A100-80GB with tensor parallelism. Without PagedAttention,
  KV cache is pre-allocated for max_seq_len=4096, but average actual length is 512.
  With 256 concurrent requests, calculate the wasted VRAM from internal fragmentation
  and explain how PagedAttention's block table eliminates it.
question: How much KV-cache VRAM is wasted by preallocating 4096 tokens when average
  length is 512, and how does PagedAttention eliminate it?
details:
  realistic_solution: 'KV cache per request at max length: 80 layers x 2 (K+V) x 8
    heads/GPU x 128 dim x 4096 tokens x 2B = 1.28GB per request per GPU. For 256 requests:
    328GB — exceeds 8x80GB = 640GB, so you cap at ~50 concurrent requests. At avg
    length 512, actual usage is 1/8th = 160MB/request. Wasted: 1.12GB/request x 50
    = 56GB across the system. PagedAttention uses 16-token blocks allocated on demand
    via a block table (like OS virtual memory pages), achieving ~96% utilization.
    This allows 400+ concurrent requests.'
  common_mistake: Assuming pre-allocation waste is modest. In practice, allocating
    for max length when average is 8x shorter wastes 87.5% of KV cache memory.
  napkin_math: 'Pre-alloc per request: 80 x 2 x 8 x 128 x 4096 x 2B / 8 GPUs = 1.28GB.
    At avg 512 tokens: 160MB actual. Waste: 87.5%. PagedAttention: 160MB x 256 = 40GB,
    fits easily.'
