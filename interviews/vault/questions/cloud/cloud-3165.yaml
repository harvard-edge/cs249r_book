title: Specifying Speculation Length K vs Draft Model Size
scenario: 'You are writing the serving configuration spec for a 405B target model
  on 8x H100. Draft model: 8B (alpha=0.78). Target decode latency: 80ms. Draft latency:
  3ms/token. Derive the optimal K that maximizes tokens per second and specify the
  dynamic K adjustment policy.'
question: At 80 ms target decode, 3 ms/token draft cost, and alpha=0.78, does K=5
  or K=15 give higher throughput?
details:
  realistic_solution: 'K=5: E=(1-0.78^6)/0.22=3.52, tp=3.52/95ms=37.1 tok/s. K=15: E=(1-0.78^16)/0.22=4.46, tp=4.46/125ms=35.7 tok/s. K=5 gives higher throughput due to lower draft overhead despite fewer expected tokens per step.'
  common_mistake: Fixing K statically. The optimal K depends on the current acceptance
    rate, which varies by prompt, domain, and even position within a generation. Static
    K leaves performance on the table.
  napkin_math: 'Speculative decoding throughput at different K:

    K=5: E = (1 - 0.78^6) / (1 - 0.78) = (1 - 0.2252) / 0.22 = 0.7748 / 0.22 = 3.52 tokens/step. Time = 80ms + (5 * 3ms) = 95ms. tp = 3.52/0.095 = 37.1 tok/s.

    K=15: E = (1 - 0.78^16) / 0.22. 0.78^16 ≈ 0.0188. E = (1 - 0.0188) / 0.22 = 0.9812 / 0.22 = 4.46 tokens/step. Time = 80ms + (15 * 3ms) = 125ms. tp = 4.46/0.125 = 35.7 tok/s.'
