title: ECMP Hash Polarization in Fat-Tree Topologies
scenario: Your 256-GPU H100 cluster uses a 3-tier fat-tree with ECMP load balancing. During AllReduce,
  you notice that some spine switches hit 95% link utilization while adjacent spines sit at 20%. A tcpdump
  shows most flows share the same 5-tuple hash bucket. What is the root cause and what distinguishes ECMP
  hash polarization from simple oversubscription?
details:
  realistic_solution: ECMP selects paths by hashing the 5-tuple (src IP, dst IP, src port, dst port, protocol).
    In AllReduce, each GPU opens a small number of long-lived TCP/RDMA connections. With 256 GPUs on a
    32-port switch fabric, the hash function can map multiple flows to the same uplink, creating polarization.
    The fix involves flowlet-based load balancing (switching paths at flowlet gaps), adding entropy via
    UDP source port randomization in RoCE, or using adaptive routing (e.g., NVIDIA Adaptive Routing on
    Quantum switches). Unlike oversubscription, the total bandwidth exists but is unevenly utilized.
  common_mistake: Blaming the congestion on insufficient bisection bandwidth or assuming all ECMP implementations
    randomize perfectly. ECMP hashes on the 5-tuple, so many-to-one communication patterns (like AllReduce
    rings) produce few distinct flows that hash to the same path.
  napkin_math: With 32 uplinks and 64 flows, by the pigeonhole principle there is a 100% chance of at
    least one collision (64 flows into 32 bins guarantees at least one bin has ≥2 flows). With 128 flows
    on 32 uplinks, expect ~4 flows per link on average, but hash variance means some links get 8+ flows
    while others get 1-2.
