title: 'Inference Serving Cost Optimization: Batching Strategy on H100 for RAG'
scenario: A RAG (Retrieval Augmented Generation) pipeline on H100 embeds documents
  using BGE-M3 (570M params, 2.1 GFLOP per 512-token doc) and then generates answers
  with Llama-3-8B. The embedding phase processes 10,000 docs/day, answer generation
  handles 1,000 queries/day. The team wants to minimize H100 hour cost. Design the
  batching strategy.
question: How should you batch the 10,000 daily BGE-M3 embeddings versus 1,000 daily
  Llama-3-8B generations to minimize H100-hour cost?
details:
  realistic_solution: 'Embedding phase: 10K docs × 2.1 GFLOP = 21 TFLOP/day. H100
    at 312 TFLOPS sustained: 21T/312T = 0.067 seconds. Batch all embeddings: at batch=512,
    fully saturates H100 tensor cores. Total embedding time: 21T at 312 TFLOPS = 0.067s
    GPU-hours. Cost: 0.067s × ($3/hr) = $0.00006. Generation: 1000 queries × avg 500
    tokens output / 30 tok/s = 1000×500/30 = 16,667 seconds = 4.6 GPU-hours. Cost:
    4.6 × $3 = $13.8. Optimization: batch embeddings offline in 5-minute windows on
    a spot instance. Use continuous batching for generation. Total: $0.001 embedding
    + $13.8 generation per day. Generation dominates 99.99% of cost — optimize it,
    not embedding.'
  common_mistake: 'Running embedding and generation on the same GPU instance simultaneously;
    they have completely different compute patterns (embedding: high-throughput batch,
    generation: low-latency streaming).'
  napkin_math: 'Embedding: 10K × 2.1G = 21T FLOPs / 312T = 0.067s GPU time = $0.00006.
    Generation: 1000 × 500 tok / 30 tok/s = 16,667s = 4.63 h × $3/h = $13.9/day. Generation
    is 99.99% of cost. Embed offline in micro-batches; invest in generation optimization
    (speculative decode, better batching).'
