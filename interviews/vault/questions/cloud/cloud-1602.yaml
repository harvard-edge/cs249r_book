title: Black-Box Model Inversion Query Cost
scenario: You deploy a cloud-based medical pathology model (taking 256x256 grayscale images) behind a
  public API that returns exact float32 probability scores for 10 disease classes. The API charges $0.0001
  per inference and rate-limits to 5,000 queries per minute. An attacker attempts a zero-th order (finite
  difference) black-box model inversion attack to reconstruct the prototypical image of a sensitive disease
  class. They use a standard 2-point finite difference estimation for the gradient of each pixel. Calculate
  the time and cost required to perform 100 optimization steps.
question: "How many queries, how much time and cost would 100 steps require, and what API output mitigation would disrupt the attack?"
details:
  realistic_solution: To estimate the gradient for a 256x256 image (65,536 pixels) using 2-point finite
    differences, each optimization step requires 131,072 queries. 100 steps require 13.1 million queries,
    costing $1,310.72 and taking ~43.7 hours at the rate limit. Defend by truncating output probabilities
    to low precision (e.g., 2 decimal places) or returning only the top-1 class, which neutralizes the
    attacker's numerical gradient signal.
  common_mistake: Assuming model inversion requires white-box weight access, or failing to multiply the
    input dimensionality (pixels) by the finite difference evaluations per pixel per step, drastically
    underestimating the attack's API cost.
  napkin_math: 'Pixels = 256 * 256 = 65,536.

    Queries per step = 65,536 * 2 = 131,072.

    Total queries (100 steps) = 131,072 * 100 = 13,107,200.

    Cost = 13,107,200 * $0.0001 = $1,310.72.

    Time = 13,107,200 / 5,000 qpm = 2,621.44 mins = 43.69 hours.'
