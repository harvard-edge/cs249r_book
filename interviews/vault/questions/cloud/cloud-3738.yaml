title: Kernel Fusion Impact on Memory Bandwidth for Layer Norm + GELU on H100
scenario: "An H100 runs LayerNorm (read+write 2x activation) followed immediately by GELU (read+write 2x activation) as separate kernels. For activation shape [batch=64, seq=2048, d=8192] (BF16 = 2GB), unfused throughput is 650 GFLOPS. Fusing both kernels into one pass reduces HBM traffic from 4x to 2x."
question: "What speedup should fusing LayerNorm and GELU deliver by reducing HBM traffic from 8GB to 4GB for the 2GB activation?"
details:
  realistic_solution: "Activation size: 64×2048×8192×2B = 2GB. Unfused: LayerNorm reads 2GB + writes 2GB = 4GB; GELU reads 2GB + writes 2GB = 4GB. Total HBM: 8GB. At H100 3.35 TB/s: time = 8GB/3.35TB/s = 2.39ms. Fused: single pass reads 2GB + writes 2GB = 4GB total. Time = 4GB/3.35TB/s = 1.19ms. Speedup: 2.39/1.19 = 2x. FLOPs: LayerNorm ≈ 8x activation elements = 8×64×2048×8192 = 8.6B. GELU: ~2x activation = 2.1B. Total ≈ 10.7B FLOPs. At 650 GFLOPS: 16.5ms. Wait — discrepancy: these kernels are so memory-bound that FLOPs don't matter; the 650 GFLOPS is the effective 'throughput' in GFLOPS given memory bound, not compute bound. Fused kernel achieves 1.19ms = 2x speedup, matches 2x HBM reduction."
  common_mistake: |
    **The Pitfall:** Measuring speedup only in FLOPS rather than in actual memory latency.
    **The Rationale:** Engineers default to FLOPs-based mental models, forgetting that element-wise operations have extremely low arithmetic intensity.
    **The Consequence:** Over-optimizing compute instructions inside the kernel instead of focusing entirely on minimizing HBM round-trips.
  napkin_math: |
    *   **Activation Size:** 64 × 2048 × 8192 × 2B = 2GB
    *   **Unfused HBM Traffic:** LayerNorm (read 2GB, write 2GB) + GELU (read 2GB, write 2GB) = 8GB
    *   **Unfused Latency:** 8GB / 3.35 TB/s = 2.39ms
    *   **Fused HBM Traffic:** Single pass (read 2GB, write 2GB) = 4GB
    *   **Fused Latency:** 4GB / 3.35 TB/s = 1.19ms
    *   **Speedup:** 2.39ms / 1.19ms = 2x
    *   **Result:** **2x speedup (FLOPs are negligible for these memory-bound ops).**
