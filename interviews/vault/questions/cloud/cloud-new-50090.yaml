title: Backward-Triggered Gradient Accumulation with Deferred AllReduce
scenario: With gradient accumulation over K=4 micro-steps, PyTorch DDP by default performs AllReduce after
  every backward pass (4 AllReduces per global step). A colleague says you can defer AllReduce to only
  the last micro-step, doing one AllReduce instead of four. Explain the overlap implications.
details:
  realistic_solution: 'Tradeoff analysis: (1) Default (AllReduce every step): 4 AllReduces of M bytes,
    each overlapped with backward. Overlap efficiency: high if each AllReduce < backward time. (2) Deferred
    (AllReduce on last step only): 1 AllReduce of M bytes (gradients accumulated locally). No communication
    during micro-steps 1-3 (wasted network bandwidth). The single AllReduce is the same size M (accumulated
    gradients) but cannot start until the last backward finishes — no overlap possible for the AllReduce
    itself. (3) PyTorch''s no_sync() context manager: use model.no_sync() for micro-steps 1-3 (skips AllReduce,
    saves communication hooks overhead), then normal backward on micro-step 4 with AllReduce. This is
    correct approach — saves hook overhead on 3/4 of micro-steps while maintaining overlap on the final
    AllReduce.'
  common_mistake: Always deferring AllReduce to the last micro-step because it reduces total communication.
    While it does reduce AllReduce count from K to 1, it makes the single AllReduce K times larger and
    removes overlap opportunity from the first K-1 micro-steps.
  napkin_math: 'Per AllReduce: 5ms. Default: 4 x 5ms = 20ms AllReduce, all overlapped with 4 x 50ms backward
    = effectively 0ms exposed. Deferred: 1 x 5ms AllReduce after last backward, not overlapped = 5ms exposed.
    Default is better for overlap if AllReduce < backward.'
