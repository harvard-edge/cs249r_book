title: Optimizing Active Learning for Large-Scale Model Training on Google TPU v5e
scenario: Your team is developing a foundational vision model requiring a massive, high-quality labeled
  dataset. You've identified that manual annotation is a significant bottleneck, and initial sampling
  shows considerable class imbalance. To accelerate development and improve data efficiency, you decide
  to implement an active learning pipeline. The training infrastructure is built on Google TPU v5e, each
  with 16 GB HBM, 197 TFLOPS BF16 compute, and 1.6 TB/s memory bandwidth. Design an active learning strategy
  that efficiently leverages these TPU capabilities for data selection and annotation, considering data
  transfer bottlenecks, maintaining inter-annotator agreement, and mitigating dataset bias. How would
  you prioritize samples for annotation to maximize model performance gains while minimizing labeling
  costs?
question: "How would you prioritize samples for annotation to maximize model performance gains while minimizing labeling costs?"
details:
  realistic_solution: 'A realistic solution would involve: 1) **Efficient Data Encoding & Storage**: Store
    unlabeled data in highly optimized, compressed formats (e.g., TFRecords with quantization) and leverage
    Google Cloud Storage''s high throughput. 2) **Batch Querying**: Implement active learning strategies
    that query for large batches of samples (e.g., uncertainty sampling, diversity sampling, or a combination)
    rather than individual samples, to amortize communication overhead. 3) **On-TPU Uncertainty Inference**:
    Perform the uncertainty estimation (e.g., entropy, least confidence, margin sampling) directly on
    the TPU for large pools of unlabeled data, leveraging its 197 TFLOPS BF16 compute and 1.6 TB/s memory
    bandwidth, to quickly identify the most informative samples. 4) **Distributed Annotation Workflows**:
    Integrate with human-in-the-loop annotation platforms, routing ambiguous samples to multiple annotators
    for inter-annotator agreement calculations (e.g., Fleiss'' Kappa) and consensus building (e.g., Dawid-Skene
    algorithm). 5) **Bias-Aware Selection**: Incorporate fairness metrics or demographic balancing strategies
    into the active learning selection criteria to prevent the active learner from exacerbating existing
    dataset biases, ensuring diverse representation.'
  common_mistake: A common mistake is designing an active learning loop that becomes I/O bound or fails
    to account for the HBM capacity and bandwidth limitations of the TPU. For instance, repeatedly sending
    full, uncompressed, high-resolution raw data back and forth between host and device for every active
    learning query, or not optimizing inference for uncertainty scoring to fully utilize the 197 TFLOPS
    BF16 compute, leading to underutilization of the powerful hardware.
  napkin_math: Given a Google TPU v5e with 16 GB HBM and 1.6 TB/s memory bandwidth. If you have 10 million
    unlabeled images, each pre-processed to 500 KB, and your uncertainty scoring model requires loading
    these into HBM for inference. Approximately how many images can fit in the HBM at once for batch processing?
    What is the theoretical maximum number of images (each 500 KB) that can be read from HBM per second,
    ignoring compute time, assuming full utilization of the 1.6 TB/s bandwidth? How does this throughput
    compare to the time taken if data had to be repeatedly fetched from external storage over a 100 Gbps
    network link?
