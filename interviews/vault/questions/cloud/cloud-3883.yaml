title: SRAM Calculation for FlashAttention Tiling
scenario: You are implementing a FlashAttention kernel for an A100 GPU. To bypass HBM bandwidth limits, you must tile the attention computation so the active blocks fit entirely within the A100's 192 KB of shared memory (SRAM) per Streaming Multiprocessor (SM). Given a head dimension d=128, a query block size B_r=64, and key/value block sizes B_c=128, calculate the exact amount of SRAM in bytes required to store the Q, K, V, and O (output) tiles in FP16 format.
question: How much SRAM is needed for the FP16 Q, K, V, and O tiles, and does the tile fit within the A100’s 192 KB shared-memory limit?
details:
  realistic_solution: To find the SRAM footprint, we calculate the number of elements in each required block and multiply by 2 bytes (since FP16 is 16 bits). The essential blocks held in SRAM during the inner loop are the Query block, the Key block, the Value block, and the Output accumulator block. We then compare this total to the 192,000 bytes (or 196,608 bytes depending on KiB vs KB definitions, but strictly 192 KB) available on the A100 SM.
  common_mistake: |
    **The Pitfall:** Forgetting to account for the output block or the byte size of the data type.
    **The Rationale:** Candidates often calculate the number of elements correctly but forget to multiply by 2 for FP16, or they omit the Output accumulator block `O` from the active SRAM allocation.
    **The Consequence:** This results in an underestimation of memory requirements and runtime OOMs in shared memory.
  napkin_math: |
    - 1. **Elements in Q block:** B_r × d = 64 × 128 = 8,192 elements.
    - 2. **Elements in K block:** B_c × d = 128 × 128 = 16,384 elements.
    - 3. **Elements in V block:** B_c × d = 128 × 128 = 16,384 elements.
    - 4. **Elements in O block:** B_r × d = 64 × 128 = 8,192 elements.
    - 5. **Total elements:** 8,192 + 16,384 + 16,384 + 8,192 = 49,152 elements.
    - 6. **Total bytes:** 49,152 elements × 2 bytes/element (FP16) = **98,304 bytes (96 KiB), which easily fits within 192 KB**.
