title: Evaluating Disparate Impact in Cloud-Based Credit Scoring
scenario: You are deploying an XGBoost credit scoring model on an AWS EKS cluster, processing 50,000 loan applications per day. During validation, the model approves loans for Group A (privileged) at a rate of 60%, and Group B (unprivileged) at a rate of 45%. A new compliance mandate requires a Disparate Impact Ratio of at least 0.80. The inference endpoints have a strict 50ms P99 latency SLA.
question: Should you use threshold post-processing or adversarial debiasing to raise DIR to 0.80 under the 50ms P99 SLA?
details:
  realistic_solution: Implement post-processing threshold adjustments per demographic group. Group A's threshold can be maintained while Group B's is lowered to achieve a Disparate Impact Ratio of 0.80, keeping inference latency well within the SLA at the cost of a slight, localized accuracy degradation.
  common_mistake: |
    **The Pitfall:** Assuming adversarial in-processing debiasing is universally superior.
    **The Rationale:** Candidates prefer the elegance of in-processing algorithms without evaluating the 3-5x inference latency overhead they introduce.
    **The Consequence:** Violating the strict 50ms P99 SLA in production.
  napkin_math: |
    - **Current DIR:** 45% / 60% = 0.75.
    - **Target DIR:** 0.80.
    - **Required Group B Approval:** To reach 0.80 with Group A at 60%, Group B needs 60% * 0.80 = 48% approval.
    - **Latency Cost:** Post-processing threshold adjustment adds < 1ms to the critical path. Adversarial models can add > 100ms on CPU instances.
    - **Result: Use post-processing threshold adjustments to satisfy both DIR and the 50ms SLA.**
