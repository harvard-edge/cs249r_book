title: Optimizing Active Learning for Large-Scale Model Training on Google TPU v5e
scenario: Your team is developing a foundational vision model requiring a massive, high-quality labeled dataset. You've identified that manual annotation is a significant bottleneck, and initial sampling shows considerable class imbalance. To accelerate development and improve data efficiency, you decide to implement an active learning pipeline. The training infrastructure is built on Google TPU v5e, each with 16 GB HBM, 197 TFLOPS BF16 compute, and 819 GB/s memory bandwidth.
question: "How would you prioritize samples for annotation to maximize model performance gains while minimizing labeling costs?"
details:
  realistic_solution: 'A realistic solution would involve: 1) **Efficient Data Encoding & Storage**: Store unlabeled data in highly optimized, compressed formats (e.g., TFRecords with quantization) and leverage Google Cloud Storage''s high throughput. 2) **Batch Querying**: Implement active learning strategies that query for large batches of samples (e.g., uncertainty sampling, diversity sampling, or a combination) rather than individual samples, to amortize communication overhead. 3) **On-TPU Uncertainty Inference**: Perform the uncertainty estimation (e.g., entropy, least confidence, margin sampling) directly on the TPU for large pools of unlabeled data, leveraging its 197 TFLOPS BF16 compute and 819 GB/s memory bandwidth, to quickly identify the most informative samples. 4) **Distributed Annotation Workflows**: Integrate with human-in-the-loop annotation platforms, routing ambiguous samples to multiple annotators for inter-annotator agreement calculations (e.g., Fleiss'' Kappa) and consensus building (e.g., Dawid-Skene algorithm). 5) **Bias-Aware Selection**: Incorporate fairness metrics or demographic balancing strategies into the active learning selection criteria to prevent the active learner from exacerbating existing dataset biases, ensuring diverse representation.'
  common_mistake: |
    **The Pitfall:** Designing an active learning loop that becomes I/O bound.
    **The Rationale:** Treating the TPU just as a compute engine and ignoring the host-device bottleneck.
    **The Consequence:** Sending full, uncompressed data continuously, massively underutilizing the TPU's 197 TFLOPS.
  napkin_math: |
    1. TPU v5e HBM: 16 GB. Image size: 500 KB. 16 GB / 500 KB = 32,000 images fit in HBM.
    2. Theoretical read throughput: 819 GB/s / 500 KB = 1.638 million images/second.
    3. Network link (100 Gbps = 12.5 GB/s): 12.5 GB/s / 500 KB = 25,000 images/second.
    4. HBM is **~65x faster** than the network, making batch querying from local memory essential.
