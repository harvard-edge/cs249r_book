title: Diagnosing Low Batch Size in Paged KV Cache
scenario: 'A cloud serving team is deploying an 8B parameter LLM on 80GB GPUs using a custom Paged KV cache implementation. They configure the KV cache block size to 1024 tokens. When serving a mix of short chat interactions (150 tokens) and long document summarizations (2000 tokens), they observe frequent Out-Of-Memory (OOM) errors and degraded max batch size.'
question: 'What is causing OOMs in the Paged KV cache with 1024-token blocks on a mixed 150-token and 2000-token workload?'
details:
  realistic_solution: 'The 1024-token block size creates massive internal fragmentation for the 150-token chat requests, wasting over 85% of the allocated block memory. The team must reduce the block size to 16 or 32 tokens, which drastically reduces internal fragmentation to under 5% while keeping kernel and page table overhead negligible.'
  common_mistake: |
    **The Pitfall:** Assuming memory bottlenecks are due to external fragmentation or page table overhead.
    **The Rationale:** It is intuitive to use large block sizes to minimize the tracking overhead of the page table, ignoring how large blocks allocate memory for short sequences.
    **The Consequence:** This creates massive internal fragmentation for short requests, wasting the vast majority of the allocated block memory and triggering premature OOMs.
  napkin_math: |
    - **KV Cache per token:** 2 (K,V) * 2 bytes (FP16) * 32 layers * 32 heads * 128 dim = 512 KB/token.
    - **Block Size Memory:** 1024 tokens * 512 KB = 512 MB per block.
    - **150-token Request (Large Block):** Uses 1 block (512 MB), actual usage is 150 * 512 KB = 75 MB. Wasted = 437 MB (**85.3% internal fragmentation**).
    - **150-token Request (Small Block, 16 tokens = 8 MB):** Allocates 10 blocks (160 tokens = 80 MB). Wasted = 10 tokens * 512 KB = 5 MB (**6.2% internal fragmentation**).
