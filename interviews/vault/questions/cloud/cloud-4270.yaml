title: Tensor Parallelism Partitioning for XCD Locality
scenario: You are deploying a 70B parameter model on a single MI300X (192 GB). Design
  the tensor parallelism partitioning strategy that maximizes XCD-local memory access.
question: How would you partition a 70B model across MI300X's 8 XCDs to maximize local
  memory access?
details:
  realistic_solution: 'Partition by layer groups: assign consecutive transformer layers
    (e.g., layers 0-9) to XCDs 0-1, layers 10-19 to XCDs 2-3, etc. Within each layer
    group, keep both weight matrices and activation buffers on the same XCD pair.
    Use pipeline parallelism between XCD groups rather than tensor parallelism across
    all 8. Cross-XCD traffic is then only activation tensors at pipeline stage boundaries
    (much smaller than weights).'
  common_mistake: Round-robin distributing weight shards across all XCDs. This maximizes
    memory utilization but ensures every matrix multiplication requires cross-XCD
    fabric reads during the partial sum accumulation phase.
  napkin_math: '70B params FP16 = 140 GB. 8 XCDs × 24 GB = 192 GB. Per XCD: 140/8
    = 17.5 GB weights + activations. Layer-local strategy: ~2 GB activations cross-XCD
    per pipeline boundary vs weight all-gather of 17.5 GB per layer in tensor-parallel.
    Pipeline boundary traffic: 2 GB × 7 boundaries = 14 GB vs tensor-parallel: 17.5
    GB × 80 layers = 1.4 TB fabric traffic per forward pass.'
