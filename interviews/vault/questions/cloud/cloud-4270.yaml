title: Model Parallelism Partitioning for XCD Locality
scenario: You are deploying a 70B parameter model on a single MI300X containing 8 independent XCD dies (192 GB total).
question: How would you partition the 70B model across the 8 XCDs to maximize local memory access?
details:
  realistic_solution: 'Partition by layer groups: assign consecutive transformer layers (e.g., layers 0-9) to XCDs 0-1, layers 10-19 to XCDs 2-3, etc. Within each layer group, keep both weight matrices and activation buffers on the same XCD pair. Use pipeline parallelism between XCD groups rather than FSDP/ZeRO-3 across all 8. Cross-XCD traffic is then only activation tensors at pipeline stage boundaries (much smaller than weights).'
  common_mistake: |
    **The Pitfall:** Round-robin distributing weight shards across all XCDs (e.g., using FSDP indiscriminately).
    **The Rationale:** Maximizing memory capacity utilization without considering the severe penalty of cross-XCD fabric bandwidth.
    **The Consequence:** Every forward pass requires massive cross-XCD data movement, bottlenecking the unified package.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B params FP16: 140 GB.
       - Hardware: 8 XCD dies (24 GB each, 192 GB total).
    2. **Calculations:**
       - Per XCD requirement: 140 GB / 8 = 17.5 GB.
       - FSDP traffic per layer: Gather the remaining 122.5 GB across the internal fabric.
       - Pipeline traffic: Only the activation tensor (~2 GB) at pipeline boundaries.
    3. **Conclusion & Interpretation:**
       **Result: Fabric-Bandwidth Bound.** FSDP bottlenecks the chiplet fabric; pipeline parallelism isolates weights locally and cuts cross-die traffic by orders of magnitude.
