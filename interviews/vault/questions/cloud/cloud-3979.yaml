title: Datacenter PUE Savings Calculation
scenario: A training cluster has an average IT draw of 5 MW after accounting for 70% average utilization. It runs in a datacenter with PUE 1.4. A cooling retrofit reduces PUE to 1.15 and costs $3 million. Electricity is $0.08/kWh.
question: "What annual energy savings and payback time result from reducing PUE from 1.4 to 1.15 for a 5 MW IT load?"
details:
  realistic_solution: Facility power drops from 7.0 MW to 5.75 MW, saving 1.25 MW continuously. Annual energy savings are calculated over 8,760 hours. At $0.08/kWh, annual savings are about $876K. A $3M retrofit pays back in about 3.4 years.
  common_mistake: |
    **The Pitfall:** Applying the 70% utilization factor twice, or multiplying PUE against peak nameplate rather than average IT load.
    **The Rationale:** Candidates fail to read that the 5 MW figure already accounts for average utilization.
    **The Consequence:** Savings estimates are wildly inaccurate, resulting in either a rejected retrofit proposal or unmet ROI promises.
  napkin_math: |
    1. **Before retrofit:** 5 MW * 1.4 PUE = 7.0 MW.
    2. **After retrofit:** 5 MW * 1.15 PUE = 5.75 MW.
    3. **Continuous savings:** 7.0 - 5.75 = 1.25 MW (1250 kW).
    4. **Annual savings:** 1250 kW * 8,760 hours * $0.08/kWh = **$876,000/year**.
    5. **Payback time:** $3,000,000 / $876,000 = **3.42 years**.
