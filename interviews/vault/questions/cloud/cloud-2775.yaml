title: 'Adversarial Training Compute Overhead: Adversarial Robustness & Security'
scenario: You add PGD adversarial training (10-step PGD) to your image classifier. Standard training takes 24 hours on 8 GPUs. PGD requires 10 additional forward+backward passes per training step for adversarial example generation (each pass takes approximately 30% of a standard training step's time, as it only computes gradients w.r.t the input).
question: How much longer and more expensive will 10-step PGD adversarial training be than the 24-hour standard run?
details:
  realistic_solution: 'Standard training step breakdown (approximate): data loading: 10%, forward pass: 25%, backward pass: 35%, optimizer update: 10%, other: 20%. Forward + backward = 60% of step time. PGD adds 10 additional forward+backward passes for input perturbation (no optimizer update needed). Additional compute per step: 10 × 60% = 600% of step time for adversarial generation. But PGD forward/backward is only with respect to the input (not weights), so it is slightly cheaper — roughly 50% of a full forward+backward. Adjusted: 10 × 30% = 300% additional. New step time: 100% + 300% = 400% of original = 4x. New training time: 24h × 4 = 96 hours. Cost: 8 A100s × 96h × $3 = $2,304 (vs $576 for standard). 4x cost is the price of robustness.'
  common_mistake: |
    **The Pitfall:** Assuming 10 PGD steps implies exactly 10x total overhead.
    **The Rationale:** Candidates multiply the total step time by 10, forgetting that adversarial generation only involves a partial forward/backward pass for the input, skipping optimizer updates and data loading.
    **The Consequence:** Cost estimates for robust model training are drastically overestimated, potentially killing the security initiative.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard training: 24 hours.
    - PGD-10 requires 10 extra passes.
    - Overhead: each pass is 30% of a standard step.

    **Calculations:**
    - Total Overhead: 10 * 30% = 300% additional time per step.
    - New Step Time: 100% (original) + 300% (overhead) = 400% (4x).
    - New Training Time: 24h * 4 = 96 hours.

    **Conclusion & Interpretation:**
    - **Result: 4x cost (Compute-Bound)**. Training time and cost scale by exactly 4x.
