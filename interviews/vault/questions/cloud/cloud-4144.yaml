title: Persistent Volume Strategy for Training Checkpoints
scenario: Your 32-GPU Kubernetes training job produces 26 GB checkpoints every 30
  minutes. The job runs for 3 days. Design the PersistentVolume configuration, considering
  performance, capacity, and cost.
question: How would you configure PersistentVolumes for 26 GB checkpoints every 30
  minutes over a 3-day, 32-GPU job?
details:
  realistic_solution: 'Storage architecture: (1) Checkpoint volume: use ReadWriteMany
    (RWX) PersistentVolume backed by a parallel filesystem (CephFS, GlusterFS, or
    cloud equivalent like AWS EFS/FSx for Lustre). All 32 pods mount the same PVC
    and write their shards concurrently. Required throughput: 26 GB in <60 seconds
    = 433 MB/s aggregate. CephFS with 3 MDS nodes provides ~500 MB/s — sufficient.
    (2) Alternative — local NVMe + async sync: each pod writes its checkpoint shard
    to local NVMe (ephemeral storage, ~3 GB/s per node). A sidecar container async-copies
    checkpoints to S3/GCS in the background. Pros: near-zero training interruption.
    Cons: if node dies before sync, checkpoint is lost. (3) Capacity planning: 26
    GB × (3 days × 24h × 2/hr) = 26 × 144 = 3.74 TB total. Keep only last 3 checkpoints
    (78 GB) and archive older ones to object storage. PVC size: 200 GB (3 checkpoints
    + headroom). (4) StorageClass: set reclaimPolicy=Retain (not Delete) so checkpoints
    survive pod deletion. Set volumeBindingMode=WaitForFirstConsumer to ensure the
    PV is provisioned in the same zone as the GPU nodes.'
  common_mistake: Using a ReadWriteOnce PVC (only one pod can write). In distributed
    training, all 32 pods need to write their shard of the checkpoint simultaneously.
    Also using slow storage (standard HDD) for checkpoints, causing training to block
    during writes.
  napkin_math: '26 GB checkpoint at NVMe speed (3 GB/s): 8.7 s. At CephFS (500 MB/s):
    52 s. At EFS (100 MB/s): 260 s = 4.3 min — blocks training for 14% of checkpoint
    interval.'
