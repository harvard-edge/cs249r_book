title: H100 TDP Management Under Sustained Training Load
scenario: An H100 SXM5 has 700W TDP. During distributed training of a 70B model, GPU power monitors show
  sustained 680W draw. The data center cooling system is rated for 40kW per rack (8 GPUs). Calculate the
  rack-level thermal headroom and determine if you can add a 9th GPU.
details:
  realistic_solution: '8 H100s: 8 × 680W = 5,440W. NVSwitch: ~300W for 4-switch config. 2× CPU servers:
    ~600W each = 1,200W. DRAM: 12 DIMMs × 15W = 180W. NIC (400GbE): ~100W. Storage NVMe: ~50W. Total rack:
    5,440 + 300 + 1,200 + 180 + 100 + 50 = 7,270W. Rack budget: 40,000W. Current: 7,270W. Available: 32,730W.
    Can add 9th GPU (700W). Actually, standard DGX H100 is 1 server with 8 GPUs at ~10.2kW — entire server
    fits easily. But: additional GPU in separate 1U server adds ~1kW overhead → 8,270W total. Well within
    40kW rack budget.'
  common_mistake: Summing only GPU power without including NVLink switches, CPU/DRAM, networking, and
    storage power consumption in the rack total.
  napkin_math: '8 H100s: 5.44kW. Supporting HW: ~1.83kW. Total: 7.27kW / 40kW = 18% rack utilization.
    Adding 9th GPU (1.7kW server): 8.97kW / 40kW = 22.4%. Plenty of headroom — cooling not the constraint.'
