title: Evaluate Pipelining vs Batch Scaling
scenario: 'You are optimizing a vision model inference service on an NVIDIA A100 (40GB). At batch size
  64, the memory footprint is 25GB, compute takes 15ms, PCIe Host-to-Device (H2D) transfer takes 10ms,
  and Device-to-Host (D2H) takes 5ms. To increase throughput, the team proposes two designs. Option A:
  Implement a 3-stage execution pipeline overlapping H2D, compute, and D2H using CUDA streams (requires
  2GB extra memory for double buffering). Option B: Increase batch size to 128 to maximize GPU SM utilization.
  This consumes 39GB memory (preventing double buffering), scales compute to 28ms, H2D to 20ms, and D2H
  to 10ms, forcing sequential execution. Evaluate both designs and determine which maximizes throughput.'
question: "Which design maximizes throughput: CUDA-stream pipelining at batch 64 or sequential batch 128, and what throughput it achieve?"
details:
  realistic_solution: Option A is superior. Pipelining overlaps the stages, making the steady-state latency
    equal to the slowest stage (compute at 15ms). Option A safely fits in memory and achieves ~4,266 images/sec,
    while Option B achieves only ~2,206 images/sec because it must execute transfers sequentially.
  common_mistake: Assuming that maximizing batch size automatically yields the highest throughput by improving
    SM utilization, while ignoring the massive cost of unhidden, sequential PCIe data transfers.
  napkin_math: 'A100 VRAM=40GB. Option A (BS=64, double-buffered) requires 25GB + 2GB = 27GB (Fits). Pipelined throughput = 64 / max(10, 15, 5)ms = 64 / 15ms = 4,266 imgs/sec. Option B (Sequential BS=128) requires 39GB (Fits, but blocks double-buffering). Throughput = 128 / (20 + 28 + 10)ms = 128 / 58ms = 2,206 imgs/sec. Pipelining at a lower batch size via CUDA streams yields nearly 2x higher throughput than maximizing batch size sequentially.'
