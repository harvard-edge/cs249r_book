title: Evaluate Pipelining vs Batch Scaling
scenario: 'You are optimizing a vision model inference service. At batch size 64, the memory footprint is 25GB, compute takes 15ms, PCIe Host-to-Device (H2D) transfer takes 10ms, and Device-to-Host (D2H) takes 5ms. To increase throughput, the team proposes two designs. Option A: Implement a 3-stage execution pipeline overlapping H2D, compute, and D2H using CUDA streams (requires 2GB extra memory for double buffering). Option B: Increase batch size to 128. This consumes 39GB memory (preventing double buffering), scales compute to 28ms, H2D to 20ms, and D2H to 10ms, forcing sequential execution.'
question: 'Which design maximizes throughput: CUDA-stream pipelining at batch 64 or sequential batch 128, and what throughput does it achieve?'
details:
  realistic_solution: Option A is superior. Pipelining overlaps the stages, making the steady-state latency equal to the slowest stage (compute at 15ms). Option A safely fits in memory and achieves ~4,266 images/sec, while Option B achieves only ~2,206 images/sec because it must execute transfers sequentially.
  common_mistake: |
    **The Pitfall:** Assuming maximizing batch size always yields the highest throughput.
    **The Rationale:** Engineers focus heavily on maximizing SM utilization as the primary driver of performance.
    **The Consequence:** They ignore the massive cost of unhidden, sequential PCIe data transfers, ultimately degrading end-to-end throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Option A (Pipelined BS=64): 27GB memory required. H2D=10ms, Compute=15ms, D2H=5ms.
       - Option B (Sequential BS=128): 39GB memory required. H2D=20ms, Compute=28ms, D2H=10ms.
    2. **Calculations:**
       - Option A Latency = max(10, 15, 5)ms = 15ms. Throughput = 64 / 0.015s = 4,266 imgs/sec.
       - Option B Latency = 20 + 28 + 10 = 58ms. Throughput = 128 / 0.058s = 2,206 imgs/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Option A achieves nearly 2x higher throughput (~4,266 vs ~2,206) because pipelining hides the I/O transfer times. IO-Bound**
