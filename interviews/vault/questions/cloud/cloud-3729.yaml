title: Benchmark MFU vs Achieved FLOPS for Attention vs MLP on H100
scenario: 'Profile a GPT-3 style model (175B) on H100 during training at batch=8, seq=2048. Separate profiling shows: MLP GEMMs at 67% MFU, attention at 31% MFU, layer norm/dropout at 5% MFU. The overall MFU is 48%.'
question: Why does attention achieve only 31% MFU versus 67% for MLP GEMMs, and what changes would improve overall MFU?
details:
  realistic_solution: 'MLP GEMMs have large square-ish shapes -> high tensor core utilization. Attention QK^T are small GEMMs (especially K=128) -> tensor cores less efficient. Plus, softmax is element-wise. Fix: FlashAttention-2 + increase seq_len per device (longer seqs improve QK^T GEMM shape).'
  common_mistake: |
    **The Pitfall:** Assuming attention achieves similar MFU to MLP simply because both involve large matrix multiplications.
    **The Rationale:** Candidates fail to break down the specific dimensions of the GEMMs or the non-matmul overhead in attention.
    **The Consequence:** They misdiagnose optimization opportunities, applying generic optimizations instead of targeting the softmax and small GEMM dimensions unique to attention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 175B GPT-3.
       - Setup: batch=8, seq=2048.
       - MFU by layer: MLP=67%, Attention=31%, Other=5%.
    2. **Calculations:**
       - MLP GEMMs: M=16384 (batch*seq), K=12288, N=49152. Large shapes drive high Tensor Core utilization (67%).
       - Attention GEMMs (QK^T): M=2048, K=128 (head_dim), N=2048. Small inner dimension heavily throttles Tensor Cores (31%).
       - Weighted total MFU: (0.5 * 67%) + (0.4 * 31%) + (0.1 * 5%) = 33.5% + 12.4% + 0.5% = 46.4% (~48% observed).
    3. **Conclusion & Interpretation:** **Small attention GEMMs fail to saturate Tensor Cores, creating a Compute-Utilization Bottleneck correctable via longer sequences.**
