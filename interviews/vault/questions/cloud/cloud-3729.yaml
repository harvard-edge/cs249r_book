title: Benchmark MFU vs Achieved FLOPS for Attention vs MLP on H100
scenario: Profile a GPT-3 style model (175B) on H100 during training at batch=8, seq=2048. Separate profiling shows: MLP GEMMs at 67% MFU, attention at 31% MFU, layer norm/dropout at 5% MFU. The overall MFU is 48%.
question: Why does attention achieve only 31% MFU versus 67% for MLP GEMMs, and what changes would improve overall MFU?
details:
  realistic_solution: 'MLP GEMMs at seq=2048, batch=8: M=16384 (batch*seq), K=12288, N=49152 (4*d_model). These are large square-ish GEMMs -> high tensor core utilization, 67% MFU reasonable. Attention QK^T: M=2048, K=128 (head_dim), N=2048 per head. These are small GEMMs (especially K=128) -> tensor cores less efficient, lower MFU. Plus: softmax is element-wise, no tensor cores -> near 0% MFU contribution. Weighted average: MLP ~50% of FLOPs at 67%, attention ~40% at 31%, others at 5%: 0.5*67 + 0.4*31 + 0.1*5 = 33.5+12.4+0.5 = 46.4% \u2248 48% observed. Fix: FlashAttention-2 + increase seq_len per device (longer seqs improve QK^T GEMM shape).'
  common_mistake: |
    **The Pitfall:** Assuming attention achieves similar MFU to MLP simply because both involve large matrix multiplications.
    **The Rationale:** Candidates fail to break down the specific dimensions of the GEMMs or the non-matmul overhead in attention.
    **The Consequence:** They misdiagnose optimization opportunities, applying generic optimizations instead of targeting the softmax and small GEMM dimensions unique to attention.
  napkin_math: |
    - **Analyze MLP GEMMs:** M=16384 (batch\u00d7seq), K=12288, N=49152. Large, square-ish GEMMs hit **67% MFU**.
    - **Analyze Attention GEMMs:** QK^T is M=2048, K=128, N=2048 per head. These are small GEMMs, keeping MFU low (**31% MFU**).
    - **Calculate Weighted Average:** MLP (~50% weight) = 33.5%. Attention (~40% weight) = 12.4%. Others (~10% weight) = 0.5%. Total = **46.4% (~48% observed)**.
    - **Conclusion:** Using FlashAttention-2 and increasing sequence length per device will improve the QK^T GEMM shape and push overall MFU to 55-60%.
