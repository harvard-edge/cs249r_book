title: Chunked Prefill Optimal Chunk Size Selection
scenario: A disaggregated serving system uses chunked prefill to interleave prefill and decode work on prefill GPUs. The chunk size is currently 256 tokens. Requests with 2048-token prompts show poor TTFT due to 8 chunks.
question: What chunk size would you choose for 2048-token prompts, and how does it trade TTFT against decode TPOT?
details:
  realistic_solution: 'Chunked prefill tradeoff: small chunks (64-256 tokens) interleave decode work frequently, keeping TPOT low but adding scheduling overhead per chunk. Large chunks (512-2048) reduce overhead but block decode tokens for longer. Optimal chunk size formula: chunk_size = sqrt(decode_batch_size * decode_time_per_token / scheduling_overhead). In practice, chunk_size 512-1024 is optimal for most workloads. For 2048-token prompt: at chunk=256: 8 chunks * (256-token prefill time + scheduling_overhead). At chunk=512: 4 chunks * 512-token prefill time. With H100, 512-token chunk prefill time on 70B: 2*512*70B/989T = 72.5ms. 4 chunks: 4*72.5 = 290ms TTFT. At chunk=256: 2*256*70B/989T = 36.3ms. 8 chunks: 8*36.3 = 290ms. Same! But scheduling overhead favors larger chunks. Optimal: 512-1024 for 70B. For smaller models: chunk=256-512.'
  common_mistake: |
    **The Pitfall:** Maximizing chunk size purely to minimize TTFT.
    **The Rationale:** Candidates don't consider that large chunks starve decode tokens from being processed.
    **The Consequence:** Spiking token generation latency (TPOT) for already-running requests, violating SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:** 70B model, H100 (989 TFLOPS), 2048-token prompt. Chunked prefill formula: 2 * tokens * params / TFLOPS.
    2. **Calculations:** Chunk=512 Time = 2 * 512 * 70e9 / 989e12 = 72.5 ms. Total TTFT (4 chunks) = 290 ms. Chunk=256 Time = 2 * 256 * 70e9 / 989e12 = 36.3 ms. Total TTFT (8 chunks) = 290 ms.
    3. **Conclusion & Interpretation:** **Result: Scheduling-Bound. TTFT is mathematically similar, but scheduling overhead makes chunk=512 to 1024 optimal to prevent decode starvation.**
