title: LLM Checkpoint Storage Sizing
scenario: A 100B parameter model is being trained using BF16 mixed precision and the
  Adam optimizer on an H100 cluster.
question: Specify the exact total gigabytes required to save a single full training
  checkpoint containing all necessary parameters and optimizer states.
details:
  realistic_solution: A BF16 model uses 2 bytes/param (200 GB). Mixed-precision Adam
    requires FP32 master weights (400 GB), an FP32 momentum state (400 GB), and an
    FP32 variance state (400 GB). The total checkpoint size is 200 + 400 + 400 + 400
    = 1400 GB (1.4 TB).
  common_mistake: Forgetting that Adam stores its first and second moments in FP32,
    or omitting the FP32 master weights.
  napkin_math: 100 * (2 + 4 + 4 + 4) = 1400 GB
