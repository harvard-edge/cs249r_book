title: LLM Checkpoint Storage Sizing
scenario: A 100B parameter model is being trained using BF16 mixed precision and the Adam optimizer on an H100 cluster.
question: Specify the exact total gigabytes required to save a single full training checkpoint containing all necessary parameters and optimizer states.
details:
  realistic_solution: 'A BF16 model uses 2 bytes/param (200 GB). Mixed-precision Adam requires FP32 master weights (400 GB), an FP32 momentum state (400 GB), and an FP32 variance state (400 GB).'
  common_mistake: |
    **The Pitfall:** Forgetting that Adam stores its first and second moments in FP32, or omitting the FP32 master weights.
    **The Rationale:** Engineers often calculate size purely based on the BF16 model parameters.
    **The Consequence:** Under-provisioning storage bandwidth and capacity, leading to failed checkpoints or massive delays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 100B parameters.
       - BF16 weights: 2 bytes/param.
       - Optimizer: Mixed-precision Adam.
    2. **Calculations:**
       - BF16 Weights: 2 bytes.
       - FP32 Master Weights: 4 bytes.
       - FP32 Adam Momentum (m): 4 bytes.
       - FP32 Adam Variance (v): 4 bytes.
       - Total state per parameter: 2 + 4 + 4 + 4 = 14 bytes.
       - Total Checkpoint Size: 100B * 14 bytes = 1,400 GB.
    3. **Conclusion & Interpretation:**
       **Result: 1,400 GB Storage (Memory-Bound).** A single mixed-precision checkpoint requires 1.4 TB due to the heavy FP32 optimizer states.
