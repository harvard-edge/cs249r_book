title: The Conservation of Bottlenecks
scenario: You profile a training step and find the GEMM kernels in the FFN layers are the bottleneck,
  consuming 45% of step time. You apply operator fusion to the FFN, reducing GEMM time by 40%. After re-profiling,
  total step time decreased by only 12%, and now the AllReduce communication takes 25% of step time (up
  from 22% before). Your manager asks why the optimization 'didn't work.' Explain what happened using
  the principle of Conservation of Complexity.
question: "How does Conservation of Complexity explain the FFN fusion's 12% step-time reduction and AllReduce becoming the bottleneck?"
details:
  realistic_solution: 'This is Conservation of Complexity (or Liebig''s Law applied to systems). Before
    optimization: GEMM = 45%, AllReduce = 22%, other = 33% of a 500ms step. After fusing FFN GEMMs (40%
    reduction in time): GEMM''s theoretical time drops to 135ms (27% of the original step time), but AllReduce time didn''t change — its absolute time is
    the same (~110ms), but it''s now a larger fraction because the denominator shrank. The step went from
    500ms to 440ms (a 12% reduction in time), which is exactly what Amdahl''s Law predicts: S = 1 / (0.55 + 0.45/1.67)
    = 1 / (0.55 + 0.27) = 1.22x throughput. The remaining gap from 1.22x theoretical throughput to 1.136x actual is the added
    overhead of the fused kernel (launch cost, register pressure). The optimization did work — it just
    shifted the binding constraint from compute to communication. The next optimization should target
    AllReduce: gradient compression, communication-computation overlap, or topology-aware placement.'
  common_mistake: Expecting a 40% reduction in the bottleneck to yield a proportional E2E improvement.
    This ignores that fixing one bottleneck reveals the next one.
  napkin_math: 'Before: 500ms total = 225ms GEMM + 110ms AllReduce + 165ms other. After fusion: GEMM =
    225ms x 0.6 = 135ms. New total = 135 + 110 + 165 = 410ms (18% reduction theoretical). Actual = 440ms
    (12% reduction) due to fusion overhead. AllReduce share: 110/440 = 25% -> next bottleneck. To reduce step time by 20%
    (reducing step from 440ms to 352ms), we must remove 88ms. Targeting AllReduce means we must cut it by 88ms => requires gradient compression or async overlap.'
