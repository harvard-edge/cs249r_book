title: The Continuous Batching Throughput Limit
scenario: You are tasked with estimating the peak capacity of an LLM inference service. The service runs a 70B parameter model and uses continuous batching. At steady state, telemetry shows that there are, on average, 32 requests being actively processed concurrently. The average request requires a 20ms prefill/prompt processing phase and then generates 128 new tokens at an average decode speed of 15ms per token.
question: Using Little's Law, how would you estimate peak requests/sec and tokens/sec?
details:
  realistic_solution: 'The correct approach is to use Little''s Law, which states that the average number of items in a system (L) is equal to their average arrival rate (λ) multiplied by the average time they spend in the system (W). Rearranging: λ = L / W. Here, L = 32 (average concurrent requests), and W is the total time a request spends being processed (prefill + decode). W = 20ms + (128 * 15ms) = 20ms + 1920ms = 1940ms ≈ 1.94s. Applying Little''s Law: λ = 32 / 1.94 ≈ 16.5 requests/second. The token throughput would be 16.5 * 128 = 2,112 tokens/second. This demonstrates why continuous batching is powerful: even though each request takes nearly 2 seconds, overlapping 32 requests yields high aggregate throughput.'
  common_mistake: |
    **The Pitfall:** Inverting the per-token generation time or applying static batching logic.
    **The Rationale:** Candidates calculate 1 / 15ms and get token throughput, missing request throughput. Or they calculate throughput for an isolated request, ignoring concurrency.
    **The Consequence:** Grossly miscalculating the system's capacity and failing to grasp why continuous batching achieves near-linear throughput scaling.
  napkin_math: |
    * Total time per request (W): T_prefill + T_decode = 20 ms + (128 tokens * 15 ms/token) = 1,940 ms ≈ 1.94 seconds.
    * Concurrent requests (L) = 32.
    * Little's Law (λ = L / W): 32 / 1.94s ≈ **16.5 requests/second**.
    * Token throughput: 16.5 req/s * 128 tokens/req = **2,112 tokens/second**.
  options:
  - ~220 QPS
  - ~1.7 QPS
  - ~16.5 QPS
  - ~56 QPS
  correct_index: 2
