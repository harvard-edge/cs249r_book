title: The Continuous Batching Throughput Limit
scenario: You are tasked with estimating the peak capacity of an LLM inference service running on a single
  H100 GPU. The service runs a 70B parameter model and uses continuous batching. At steady state, telemetry
  shows that there are, on average, 32 requests being actively processed concurrently. The average request
  requires a 20ms prefill/prompt processing phase and then generates 128 new tokens at an average decode speed of 15ms per token.
question: "Using Little's Law, how would you estimate peak requests/sec and tokens/sec?"
details:
  realistic_solution: 'The correct approach is to use Little''s Law, which states that the average number
    of items in a system (L) is equal to their average arrival rate (λ) multiplied by the average time
    they spend in the system (W). Rearranging: λ = L / W. Here, L = 32 (average concurrent requests),
    and W is the total time a request spends being processed (prefill + decode). W = 20ms + (128 * 15ms) = 20ms + 1920ms = 1940ms ≈ 1.94s. Applying Little''s Law: λ = 32 / 1.94
    ≈ 16.5 requests/second. The token throughput would be 16.5 * 128 = 2,112 tokens/second. This demonstrates
    why continuous batching is powerful: even though each request takes nearly 2 seconds, overlapping
    32 requests yields high aggregate throughput.'
  common_mistake: Engineers often misapply throughput formulas. A common mistake is to simply invert the
    per-token generation time, which calculates the *token* throughput, not the *request* throughput.
    Another is to calculate the throughput for a single, isolated request, ignoring the massive parallelism
    gains from batching. A third mistake is to apply static batching logic, where the throughput is the
    batch size divided by the time it takes for the slowest member of the batch to complete, which underestimates
    the efficiency of continuous batching.
  napkin_math: '1. **Find total time per request (W):** W = T_prefill + T_decode = 20ms + (128 tokens
    * 15ms/token) = 1,940ms ≈ 1.94 seconds. 2. **Apply Little''s Law:** λ = L / W = 32 / 1.94s ≈ 16.5 requests/second. 3. **Token throughput:** 16.5 req/s * 128 tokens/req
    = 2,112 tokens/second. 4. **Key insight:** Continuous batching decouples individual request latency
    from system throughput. The GPU processes decode tokens for all 32 requests in each step, achieving
    near-linear throughput scaling with concurrency.'
  options:
  - ~220 QPS
  - ~1.7 QPS
  - ~16.5 QPS
  - ~56 QPS
  correct_index: 2
