title: The InfiniBand Subnet Saturation
scenario: You are building a 4,000 GPU cluster. You use a standard Fat-Tree InfiniBand topology. The cluster
  is divided into 4 pods of 1,000 GPUs each. Jobs running entirely within Pod A achieve 98% network scaling
  efficiency. However, when you launch a 2,000 GPU job spanning Pod A and Pod B, the network efficiency
  plummets to 40%. The cables are all 400 Gbps. What architectural constraint in the Fat-Tree is causing
  the bottleneck?
details:
  realistic_solution: 'The Fat-Tree topology has oversubscribed uplinks between pods. Within Pod A, the
    leaf-to-spine bandwidth is 1:1 (non-blocking), so intra-pod traffic achieves 98% efficiency. But the
    spine-to-core uplinks connecting pods are typically oversubscribed 3:1 to save cost. When a 2000-GPU
    job spans Pods A and B, half the AllReduce traffic must cross the core, but only 1/3 of the needed
    bandwidth exists. The 267 Tbps deficit causes massive queuing and drops. The fix: build a full-bisection-bandwidth
    core (1:1 oversubscription at ~3x the cost) or use topology-aware job placement to keep training jobs
    within a single pod.'
  common_mistake: '"The distance between the pods adds latency." Fiber optic latency over 100 meters is
    microseconds. It doesn''t drop efficiency by 60%.'
  napkin_math: 1,000 GPUs * 400 Gbps = 400 Tbps of traffic trying to leave the Pod. At a 3:1 oversubscription
    ratio, you only have 133 Tbps of uplink capacity. 267 Tbps of data is physically blocked at the Spine
    switch every second.
