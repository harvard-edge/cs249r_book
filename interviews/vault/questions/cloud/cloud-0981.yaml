title: Data Parallelism on 10 Gbps Ethernet
scenario: 'You are fine-tuning a 5B parameter language model using standard Data Parallelism across 16 cloud instances, each equipped with a single GPU. To save on infrastructure costs, the instances are provisioned with standard 10 Gbps Ethernet instead of high-speed interconnects. Gradient synchronization uses FP16 precision and Ring All-Reduce. With a batch size of 8 and sequence length of 2048, you observe abysmal GPU utilization (around 15-20%).'
question: What are the per-step Ring All-Reduce communication and compute times, and is the 16-instance fine-tuning job communication-bound?
details:
  realistic_solution: 'Convert 10 Gbps to 1.25 GB/s. Calculate the Ring AllReduce data volume for 10GB of FP16 gradients: 2 * (15/16) * 10GB = 18.75GB. Communication time = 18.75GB / 1.25 GB/s = 15 seconds per step, which heavily dominates the ~3.3s compute time. The system is severely communication-bound, requiring gradient compression, gradient accumulation, or a network bandwidth upgrade to achieve reasonable scaling efficiency.'
  common_mistake: |
    **The Pitfall:** Failing to convert Gigabits to Gigabytes, or forgetting the Ring All-Reduce multiplier.
    **The Rationale:** Candidates often divide by 10 GB/s instead of 1.25 GB/s, or they forget the `2*(N-1)/N` data volume multiplier inherent to the algorithm.
    **The Consequence:** Incorrectly calculating that communication takes only ~1 second and failing to diagnose the network bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5B params in FP16 = 10 GB.
    - Bandwidth: 10 Gbps Ethernet = 1.25 GB/s.
    - Ring All-Reduce Volume: 2 * ((N - 1) / N) * Size.

    **Calculations:**
    - Gradient Size: 5B * 2 bytes = 10 GB.
    - Data Volume: 2 * (15 / 16) * 10 GB = 18.75 GB.
    - Communication Time: 18.75 GB / 1.25 GB/s = 15 seconds per step.
    - Compute Time: ~491 TFLOPs at ~150 TFLOPS throughput ≈ 3.3 seconds.

    **Conclusion & Interpretation:**
    - **Result: Network-Bandwidth Bound.** 15s (Comm) > 3.3s (Compute).
