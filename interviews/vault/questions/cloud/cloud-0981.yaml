title: Data Parallelism on 10 Gbps Ethernet
scenario: You are fine-tuning a 5B parameter language model using standard Data Parallelism across 16
  cloud instances, each equipped with a single A100 GPU. To save on infrastructure costs, the instances
  are provisioned with standard 10 Gbps Ethernet instead of high-speed interconnects. Gradient synchronization
  uses FP16 precision and Ring All-Reduce. With a batch size of 8 and sequence length of 2048, you observe
  abysmal GPU utilization (around 15-20%). Calculate the communication time per step versus compute time
  to prove whether this setup is communication-bound.
question: "What are the per-step Ring All-Reduce communication and compute times, and is the 16-instance fine-tuning job communication-bound?"
details:
  realistic_solution: 'Convert 10 Gbps to 1.25 GB/s. Calculate the Ring AllReduce data volume for 10GB
    of FP16 gradients: 2 * (15/16) * 10GB = 18.75GB. Communication time = 18.75GB / 1.25 GB/s = 15 seconds
    per step, which heavily dominates the ~3.3s compute time. The system is severely communication-bound,
    requiring gradient compression, gradient accumulation, or a network bandwidth upgrade to achieve reasonable
    scaling efficiency.'
  common_mistake: Failing to convert gigabits to gigabytes for network bandwidth (10 Gbps = 1.25 GB/s,
    not 10 GB/s), or forgetting the 2*(N-1)/N data volume multiplier inherent to the Ring AllReduce algorithm.
  napkin_math: 'Gradient Size: 5B params * 2 bytes = 10 GB

    Ring All-Reduce Volume: 2 * ((16-1)/16) * 10 GB = 18.75 GB

    Bandwidth: 10 Gbps / 8 = 1.25 GB/s

    Communication Time = 18.75 GB / 1.25 GB/s = 15 seconds

    Compute FLOPs: 6 * 5e9 * 2048 * 8 ≈ 491 TFLOPs. At ~150 TFLOPs throughput, Compute Time ≈ 3.3s.

    15s (Comm) > 3.3s (Compute) -> Heavily communication-bound.'
