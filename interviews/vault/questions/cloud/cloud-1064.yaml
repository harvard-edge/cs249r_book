title: Real-World Distribution Shift Impact
scenario: Your team is deploying a fraud detection model to a cloud pipeline processing 10 million transactions
  per day. On the static, highly-curated benchmark dataset, the model achieves a 95% True Positive Rate
  (TPR) and a 99.9% True Negative Rate (TNR). However, your data benchmarking study indicates that in
  the real-world production stream, 5% of transactions suffer from a distribution shift (e.g., missing
  metadata). On this 5% noisy slice, the model's TNR degrades to 98.0%. Assuming a constant baseline fraud
  prevalence of 0.1%, calculate the expected total daily False Positives (FPs) in production compared
  to what the static benchmark predicts.
details:
  realistic_solution: Segment the incoming data stream into clean and noisy cohorts based on the expected
    real-world distribution (95% clean, 5% noisy), apply the specific fall-out rates to each, and sum
    the expected errors to benchmark true operational load.
  common_mistake: Candidates often rely solely on aggregate static benchmark metrics and fail to stratify
    the expected errors by the proportion of out-of-distribution or noisy data expected in production.
  napkin_math: 'Total = 10M txn, 0.1% fraud = 10k fraud, 9.99M legit.

    Static prediction: 9.99M * (1 - 0.999) FPR = ~9,990 FPs.

    Real-world Clean (95%): 9.49M legit * 0.1% FPR = ~9,490 FPs.

    Real-world Noisy (5%): 499.5k legit * 2.0% FPR = 9,990 FPs.

    Total real-world FPs = 9,490 + 9,990 = 19,480 FPs (~1.95x the static benchmark prediction).'
