title: Multi-Tenant GPU Cluster Quota Design
scenario: You are designing the quota system for a new 500-GPU cluster serving 8 ML teams. Some teams do large-scale training (100+ GPUs), others do small-scale experimentation (1-4 GPUs).
question: How would you design quotas, scheduling policies, and safeguards for a 500-GPU cluster shared by 8 ML teams?
details:
  realistic_solution: |
    Hierarchical quota design: Level 1 — Organization pool: 500 GPUs total with 10% (50 GPUs) reserved for burst capacity. Level 2 — Team quotas (soft limits): Large training teams (3 teams x 100 GPUs), Medium teams (3 teams x 50 GPUs), Small teams (2 teams x 25 GPUs). Total committed: 450 GPUs + 50 burst = 500. Scheduling policies: (1) Job classes with limits: interactive (max 8 GPUs, 4h wall time, highest priority), development (max 16 GPUs, 24h, medium priority), production (no GPU limit, 7d wall time, low priority but not preemptible), preemptible (any size, no time limit, lowest priority, uses idle GPUs). (2) Per-team sub-quotas: max 50% of team quota in production jobs (prevents one team from hogging their entire allocation with a single training run). (3) Anti-starvation: minimum 1 GPU guaranteed per team at all times. (4) Burst borrowing: when cluster utilization <70%, teams can exceed their quota by 50%. Safeguards: per-user daily GPU-hour caps, automatic job termination at wall time, GPU health checks before allocation.
  common_mistake: |
    **The Pitfall:** Designing flat quotas per team without considering job-size diversity.
    **The Rationale:** A team running a single 100-GPU job has different scheduling and preemption needs than a team running 50 independent 2-GPU experiments.
    **The Consequence:** Severe fragmentation and poor cluster utilization, leading to wasted expensive compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 GPUs.
       - Cost: $3/hr per GPU.
       - 730 hours/month.
    2. **Calculations:**
       - Monthly Cost: 500 × $3 × 730 = $1,095,000/month.
       - Value at 80% Utilization: $1,095,000 × 0.80 = $876,000.
       - Value at 50% Utilization: $1,095,000 × 0.50 = $547,500.
       - Recovered Value: $876,000 - $547,500 = $328,500/month.
    3. **Conclusion & Interpretation:** **Proper scheduling design recovers ~$329K/month in compute value. Result: Utilization-Bound.**
