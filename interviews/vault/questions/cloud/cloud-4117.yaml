title: Multi-Tenant GPU Cluster Quota Design
scenario: You are designing the quota system for a new 500-GPU H100 cluster serving
  8 ML teams. Some teams do large-scale training (100+ GPUs), others do small-scale
  experimentation (1-4 GPUs). Design the resource quota hierarchy, scheduling policies,
  and safeguards.
question: How would you design quotas, scheduling policies, and safeguards for a 500-GPU
  H100 cluster shared by 8 ML teams?
details:
  realistic_solution: 'Hierarchical quota design: Level 1 — Organization pool: 500
    GPUs total with 10% (50 GPUs) reserved for burst capacity. Level 2 — Team quotas
    (soft limits): Large training teams (3 teams × 100 GPUs), Medium teams (3 teams
    × 50 GPUs), Small teams (2 teams × 25 GPUs). Total committed: 450 GPUs + 50 burst
    = 500. Scheduling policies: (1) Job classes with limits: interactive (max 8 GPUs,
    4h wall time, highest priority), development (max 16 GPUs, 24h, medium priority),
    production (no GPU limit, 7d wall time, low priority but not preemptible), preemptible
    (any size, no time limit, lowest priority, uses idle GPUs). (2) Per-team sub-quotas:
    max 50% of team quota in production jobs (prevents one team from hogging their
    entire allocation with a single training run). (3) Anti-starvation: minimum 1
    GPU guaranteed per team at all times. (4) Burst borrowing: when cluster utilization
    <70%, teams can exceed their quota by 50%. Safeguards: per-user daily GPU-hour
    caps, automatic job termination at wall time, GPU health checks before allocation.'
  common_mistake: Flat quotas per team without considering job-size diversity. A team
    with a 100-GPU quota running one training job has very different needs than a
    team running 50 × 2-GPU experiments.
  napkin_math: '500 H100s at $3/hr = 500 × $3 × 730 hrs/month = $1,095,000/month (~$1.1M/month).
    At 80% utilization (with fair-share): ~$876K productive compute. At 50% (poor
    scheduling): ~$547K productive. Good scheduling = ~$329K/month more value.'
