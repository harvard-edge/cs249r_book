title: Real-time Sensor Data Ingestion & ML Inference on AMD MI300X
scenario: You are designing a real-time anomaly detection system for industrial IoT sensors. The system needs to ingest data from 100,000 sensors, each emitting 1KB of data every 100ms. This raw data stream must be processed, features extracted, and then fed into a deep learning model for real-time inference on an accelerator.
question: How would you build the ingestion, feature-computation, and integration pipeline for 100,000 sensors emitting 1 KB every 100 ms?
details:
  realistic_solution: 'Implement a distributed stream processing framework (e.g., Flink or Spark Streaming with Kafka). Utilize high-throughput connectors to push processed mini-batches directly to host memory. Leverage asynchronous data transfer mechanisms to keep the accelerator busy.'
  common_mistake: |
    **The Pitfall:** Underestimating data movement overhead and I/O bottlenecks.
    **The Rationale:** Engineers see high HBM bandwidth and assume data transfer will be instantaneous.
    **The Consequence:** Poor batching strategies and failure to efficiently offload preprocessing to the GPU result in CPU-GPU synchronization bottlenecks that fail to meet latency targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ingress data rate: 100,000 sensors * 1 KB / 0.1 s = 1 GB/s.
       - Accelerator memory bandwidth: 5.3 TB/s (5,300 GB/s).
       - Inference batch size required: 100 MB.
    2. **Calculations:**
       - Ingress requirement translates to 8 Gbps, manageable over standard networks.
       - Accelerator transfer time for 100 MB: 100 MB / 5,300 GB/s ≈ 19 µs.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Synchronization-Bound. The accelerator moves this batch in ~19 µs, proving that host-to-device batching efficiency dictates latency, not raw bandwidth.**
