title: Real-time Sensor Data Ingestion & ML Inference on AMD MI300X
scenario: You are designing a real-time anomaly detection system for industrial IoT sensors. The system needs to ingest data from 100,000 sensors, each emitting 1KB of data every 100ms. This raw data stream must be processed, features extracted, and then fed into a deep learning model for real-time inference. The inference engine will run on an AMD MI300X accelerator, which offers 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute, and a staggering 5.3 TB/s memory bandwidth.
question: How would you build the ingestion, feature-computation, and MI300X integration pipeline for 100,000 sensors emitting 1 KB every 100 ms?
details:
  realistic_solution: Implement a distributed stream processing framework (e.g., Flink or Spark Streaming with Kafka) for ingestion and initial feature engineering. Utilize high-throughput connectors and optimized serialization to push processed mini-batches directly to the MI300X's host memory. Leverage asynchronous data transfer mechanisms (e.g., ROCm's asynchronous memory copies) and potentially specialized data structures on the GPU to maximize memory bandwidth utilization and keep the MI300X busy. Consider kernel fusion or on-device preprocessing for computationally intensive feature computation steps that can benefit from GPU parallelism, minimizing CPU-GPU synchronization overhead.
  common_mistake: |
    **The Pitfall:** Underestimating data movement overhead and I/O bottlenecks.
    **The Rationale:** Engineers see high HBM bandwidth and assume data transfer will be instantaneous.
    **The Consequence:** Poor batching strategies and failure to efficiently offload preprocessing to the GPU result in CPU-GPU synchronization bottlenecks that fail to meet latency targets.
  napkin_math: |
    * Ingress data rate: 100,000 sensors × 1 KB/sensor / 0.1 s = 1 GB/s.
    * Network requirement: 1 GB/s translates to 8 Gbps, which is easily manageable over standard 10 Gbps or higher networks.
    * MI300X memory bandwidth: 5.3 TB/s (5,300 GB/s), which is vastly higher than the 1 GB/s ingress.
    * **If an inference batch requires 100 MB of data, the MI300X moves this in ~19 µs, proving that host-to-device batching efficiency—not raw bandwidth—will dictate end-to-end latency.**
