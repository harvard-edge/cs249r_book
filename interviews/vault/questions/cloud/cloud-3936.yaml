title: Overlapping AllReduce with Optimizer Step via Gradient Sharding
scenario: In standard DDP, the optimizer step waits for AllReduce to complete on all gradients. With ZeRO-1, each GPU owns a shard of optimizer states.
question: Can we overlap the optimizer step with ongoing AllReduce by processing shards as their gradients are reduced?
details:
  realistic_solution: 'Yes — ReduceScatter + local optimizer step + AllGather pattern: (1) Replace AllReduce with ReduceScatter (each GPU gets its shard of reduced gradients). (2) As soon as a GPU receives its gradient shard from ReduceScatter, it can run the optimizer step for that shard immediately, even while other ReduceScatter operations are in progress. (3) After the optimizer updates the parameter shard, AllGather distributes the updated parameters. This pipeline: ReduceScatter(shard_i) -> Optimizer(shard_i) -> AllGather(shard_i) can run concurrently for different shards. DeepSpeed and FSDP implement this pattern, overlapping optimizer compute with communication.'
  common_mistake: |
    **The Pitfall:** Running the optimizer step sequentially after all communication completes.
    **The Rationale:** Treating the backward pass and optimizer step as monolithic blocks rather than divisible pipelines.
    **The Consequence:** Wasting compute cycles by idling the GPU during the network transfer of later gradient buckets.
  napkin_math: |
    * **Parameters:** 100 shards. ReduceScatter = 1ms, Optimizer = 0.5ms, AllGather = 1ms.
    * **Serial Execution:** 100 * (1 + 0.5 + 1) = 250ms.
    * **Pipelined Execution:** Shards overlap. 100ms (ReduceScatter pipeline) + 0.5ms (final optimizer) + 1ms (final AllGather) = 101.5ms.
    * **Conclusion:** **Overlapping compute with communication provides a ~2.5x speedup over strict serialization.**
