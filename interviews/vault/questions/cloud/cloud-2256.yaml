title: The Tiling Factor Search Space
scenario: 'You are auto-tuning a matrix multiply kernel for an H100 GPU. The kernel has 4 tunable tiling parameters (M_tile, N_tile, K_tile, and number of pipeline stages), each with 8 possible values.'
question: 'How large is the search space for a full model with 80 unique kernels, and why does this make exhaustive search impractical?'
details:
  realistic_solution: "The search space is 8^4 = 4,096 configurations per kernel. But a transformer model typically has 50-100 distinct kernel shapes (different attention heads, FFN layers, varying sequence lengths). The total search space for the full model is 4,096 * 80 ≈ 327,680 kernel configurations. Each configuration requires a benchmark run (~5ms for a single kernel trial), making exhaustive search for one kernel feasible (4,096 * 5ms ≈ 20s) but exhaustive search for the whole model expensive (327,680 * 5ms ≈ 27 minutes). This is why ML compilers use cost models and guided search (genetic algorithms, simulated annealing, or learned cost models) to prune the space to ~100 trials per kernel, cutting total tuning from 27 minutes to ~40 seconds."
  common_mistake: |
    **The Pitfall:** Calculating the search space as additive (4 * 8 = 32 configurations).
    **The Rationale:** Engineers confuse additive and multiplicative combinatorics. Each parameter is independent, so the configurations multiply.
    **The Consequence:** Drastically underestimating the time required for auto-tuning, leading to CI/CD pipeline timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Configurations per kernel: 8^4 = 4,096 configs.
    - Full model: 80 unique kernels.
    - Time per trial: 5ms.

    **Calculations:**
    - Total model search space: 4,096 * 80 = 327,680 configurations.
    - Exhaustive search time: 327,680 * 0.005s = 1,638s ≈ 27 minutes.
    - Guided search time: 100 trials/kernel * 80 * 0.005s = 40 seconds.

    **Conclusion & Interpretation:**
    - **Result: 41x speedup (Compute-Bound)**. Guided search radically cuts auto-tuning time from 27 minutes to 40 seconds with a minimal performance gap.
