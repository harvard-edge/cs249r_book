title: Diagnosing Spot Preemption Hangs in Distributed Training
scenario: You migrated a 64-GPU A100 distributed training job (PyTorch DDP) to AWS Spot Instances to reduce
  costs by 70%. However, the job's effective training progression has dropped to near zero. Monitoring
  shows GPU utilization sporadically dropping to 0% across all surviving nodes for exactly 30 minutes
  at a time, followed by a sudden cluster restart and checkpoint reload. What is the root cause of this
  specific failure pattern, and how do you diagnose it?
question: "What is the root cause of this specific failure pattern, and how do you diagnose it?"
details:
  realistic_solution: The exact 30-minute hang is the default NCCL network communication timeout (`NCCL_BLOCKING_WAIT`).
    When a spot instance is preempted abruptly, the surviving nodes hang infinitely waiting for an `AllReduce`
    token from the dead node until the timeout is hit. The solution is to run a daemon that polls the
    cloud provider's metadata service for the 2-minute spot preemption warning, intercept it to trigger
    a synchronous checkpoint, gracefully tear down the NCCL process group, and exit immediately so the
    orchestrator (e.g., TorchElastic) can restart the job without waiting for the timeout.
  common_mistake: Candidates often assume the 30-minute 0% utilization period is simply the time spent
    waiting for the cloud provider to provision replacement spot instances and downloading large weights
    from S3.
  napkin_math: 'Without signal handling: 1 preemption/hr = 30m (NCCL timeout) + 5m (restart/load) = 35m
    downtime/hr (41% uptime). With 2-min warning handling: 1 preemption/hr = 2m (sync checkpoint) + 5m
    (restart/load) = 7m downtime/hr (88% uptime). Effective throughput doubles.'
