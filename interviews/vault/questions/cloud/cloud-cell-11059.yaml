title: 'Fault Tolerance: Specification — Define Recovery Time Objective for LLM Training'
scenario: Write the fault tolerance specification for a $5M, 90-day training run of a 100B model on 512
  H100s. Define RTO (Recovery Time Objective), RPO (Recovery Point Objective), checkpoint frequency, storage
  requirements, and automated recovery SLAs. The run costs $3/GPU-hr.
details:
  realistic_solution: 'Cost model: 512 × $3 × 90 × 24 = $3.32M compute. RTO target: < 30 minutes recovery
    after failure (< 1% of daily compute time). RPO target: < 1 hour of work lost (< 1% of daily training).
    Checkpoint: every 45 minutes.'
  common_mistake: Setting RTO and RPO without accounting for the cost of lost compute time; not quantifying
    the acceptable loss in training tokens.
  napkin_math: 'Training throughput: 512 H100s × 40% MFU × 989 TFLOPS / (6 × 100B FLOPs/token) = 337K
    tokens/sec. 1 hour = 3600 × 337K = 1.21B tokens. 1.21B tokens = 0.06% of 2T total training — acceptable
    RPO. Checkpoint size: 100B model ZeRO-3/512: 400GB total / 512 = 781MB/rank. Write time: 781MB at
    2 GB/s NVMe = 0.39 seconds/rank (parallel). Total checkpoint overhead: 0.39s / 45min = 0.014% — negligible.
    Storage: checkpoints retained 3 generations × 400GB = 1.2TB + daily full = 14 × 400GB = 5.6TB. Total:
    6.8TB × $0.023/GB-month × 3 months = $470. RTO: restore 781MB from NVMe (0.39s) + rejoin collective
    (5min) + warmup (5min) = 11 minutes << 30 minute SLA.'
