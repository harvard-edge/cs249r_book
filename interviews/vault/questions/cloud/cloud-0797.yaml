title: The Model Deprecation Cliff
scenario: Your platform has 23 models in production, some dating back 3 years. You discover that 8 older models collectively serve only 2% of total traffic but consume 30% of your GPU fleet. Your PM asks why these old models can't just be co-located on the same GPUs as the newer models to save money.
question: Why does maintaining multiple model generations simultaneously fragment your serving cluster and destroy GPU utilization?
details:
  realistic_solution: Co-locating multiple model generations on a single GPU creates severe memory fragmentation and scheduling bottlenecks. Old models often use different precision formats (e.g., FP32 vs FP16), different CUDA graph compilations, and different batch sizes. When you load multiple distinct models onto one GPU, each model statically reserves its own CUDA context, workspace memory, and KV-cache blocks. Because the models don't share weights or attention architectures, the serving framework (like vLLM or Triton) cannot easily batch requests across them. The GPU ends up context-switching between different kernels, destroying arithmetic intensity, while the VRAM is partitioned into small, inflexible silos that prevent any single model from achieving a large enough batch size to be compute-bound.
  common_mistake: |
    **The Pitfall:** "Just put them all in the same Docker container."
    **The Rationale:** Treating GPU VRAM and scheduling like system RAM and CPU processes.
    **The Consequence:** This ignores how GPUs statically allocate CUDA context, workspace memory, and KV-cache blocks, destroying arithmetic intensity and rendering the GPU inefficient.
  napkin_math: |
    - An 80GB H100 running one 13B model (26GB weights) has 54GB available for a massive, unified KV-cache, allowing continuous batching of 100+ concurrent requests.
    - If you co-locate three different 7B models (14GB weights each = 42GB total), you only have 38GB left.
    - That 38GB is fragmented across three separate KV-cache pools (12.6GB each).
    - Each model can now only batch ~20 requests.
    - **The GPU context-switches between the three models' kernels at low batch sizes, dropping effective throughput by 3-4× compared to serving a single model.**
