title: 'Feature Store: Evaluate Online vs Offline Feature Store Architectures'
scenario: You are choosing between (A) unified online/offline feature store (Feast with Redis + Parquet) vs (B) separate online store (Redis) and offline store (Hive). Your H100 training jobs run batch feature computation nightly, and inference on H100s requires real-time features.
question: What is the daily revenue impact of a 2% metric degradation due to training-serving skew if the system processes 100K RPS with an average value of $0.01 per prediction?
details:
  realistic_solution: "Building separate online and offline stores without a unified computation framework often leads to training-serving skew. If the logic for feature computation differs between Hive (offline) and Redis (online), the model receives out-of-distribution features at inference. For a high-throughput system, even a minor 2% drop in predictive accuracy can result in massive revenue loss, far outweighing the operational savings of separate systems. A unified feature store like Feast prevents this by ensuring consistent feature materialization across both environments."
  common_mistake: |
    **The Pitfall:** Building separate stores without a synchronization mechanism.
    **The Rationale:** Teams optimize for short-term operational simplicity by using existing disparate systems (Hive and Redis).
    **The Consequence:** Catastrophic training-serving skew where the feature computation logic silently diverges between systems, destroying model ROI.
  napkin_math: |
    * **Base Revenue:** 100,000 RPS × $0.01/inference = $1,000/second.
    * **Degradation Impact:** $1,000/second × 2% = $20/second lost.
    * **Daily Loss:** $20/second × 86,400 seconds/day = $1,728,000/day.
    * **Result:** **A massive $1.7M daily revenue loss.**
