title: The Memory-Bound Vision Model
scenario: An engineer is evaluating a new vision model for deployment on an NVIDIA H100. Profiling shows
  that a single forward pass performs 50 Trillion Floating Point Operations (TFLOPs) and requires reading
  200 Gigabytes (GB) of data (weights and activations) from HBM. Based on the H100's specifications, explain
  whether this workload is compute-bound or memory-bound.
details:
  realistic_solution: The workload is memory-bound. To determine this, we calculate the model's Arithmetic
    Intensity (AI) and compare it to the H100's ridge point. The H100's ridge point is approximately 295
    Operations per Byte. The model's AI is significantly lower than this, meaning the GPU's memory system
    cannot supply data fast enough to keep the compute units fully saturated. The execution cores will
    spend time waiting for data.
  common_mistake: A common mistake is to either miscalculate the Arithmetic Intensity by inverting the
    ratio (Bytes/FLOP instead of FLOPs/Byte) or to correctly calculate the intensity but misinterpret
    the result. For example, an engineer might see a high absolute FLOP count and assume the model must
    be compute-bound without considering the massive amount of data being moved relative to that compute.
  napkin_math: '1. Total Compute: 50 Trillion FLOPs (50,000 GigaFLOPs).

    2. Total Data Movement: 200 Gigabytes (GB).

    3. Arithmetic Intensity (AI) = 50,000 GFLOPs / 200 GB = 250 FLOPs/Byte.

    4. H100 Ridge Point = 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/Byte.

    Because the AI (250) is less than the Ridge Point (295), the H100 will process the 200 GB of data
    faster than HBM can supply it. It is memory-bound.'
  options:
  - Compute-bound, because 50 TFLOPs is a very high operational count that will saturate the execution
    units.
  - Compute-bound, because its Arithmetic Intensity (250 Ops/Byte) is a high number, close to the hardware's
    peak.
  - Memory-bound, because its Arithmetic Intensity (250 Ops/Byte) is less than the H100's ridge point
    (~295 Ops/Byte).
  - Memory-bound, because it requires 4 Bytes per FLOP, which is too much data for the memory system.
  correct_index: 2
