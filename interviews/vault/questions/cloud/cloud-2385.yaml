title: High-Throughput Streaming Drift Detection
scenario: Your fraud detection pipeline processes 20,000 requests per second. The model uses 256-dimensional
  dense embeddings as features. The MLOps team deployed a Kolmogorov-Smirnov (KS) test to calculate feature
  drift over a 1-hour sliding window, but it consumes 64 CPU cores per node and causes the drift-detection
  sidecar to OOM (out-of-memory) crash, delaying alerts by hours.
question: "How would you redesign drift monitoring for 20,000 QPS of 256-dimensional embeddings without OOMing the sidecar?"
details:
  realistic_solution: Redesign the observability architecture to decouple inference from heavy statistical
    testing. First, implement reservoir sampling in the sidecar to capture a statistically significant
    subset (e.g., 1%) of the traffic. Second, instead of computing high-dimensional drift on the raw 256-dim
    embeddings, track the distribution of the final output logits or apply a lightweight dimensionality
    reduction (like random projection) before calculating the KS-test. Finally, offload the actual KS
    computation to an asynchronous batch job running on an OLAP database (like ClickHouse) rather than
    inline sidecars.
  common_mistake: Scaling up the sidecar container memory and CPU limits to handle the full throughput
    of the KS tests.
  napkin_math: Throughput = 20,000 QPS. Data rate = 20k * 256 floats * 4 bytes = 20.48 MB/s. 1 hour window
    = 73.7 GB of data. Running O(N log N) KS-tests on 73.7 GB requires massive memory. Sampling at 1%
    reduces data to 737 MB/hr. A 1% sample of 72 million requests/hr is 720k samples, which provides high
    statistical significance (margin of error < 0.2%) while easily fitting in a 2GB memory footprint.
