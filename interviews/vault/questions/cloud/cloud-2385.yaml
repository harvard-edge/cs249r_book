title: High-Throughput Streaming Drift Detection
scenario: Your fraud detection pipeline processes 20,000 requests per second. The model uses 256-dimensional dense embeddings as features. The MLOps team deployed a Kolmogorov-Smirnov (KS) test to calculate feature drift over a 1-hour sliding window, but it consumes 64 CPU cores per node and causes the drift-detection sidecar to OOM (out-of-memory) crash, delaying alerts by hours.
question: "How would you redesign drift monitoring for 20,000 QPS of 256-dimensional embeddings without OOMing the sidecar?"
details:
  realistic_solution: Redesign the observability architecture to decouple inference from heavy statistical testing. First, implement reservoir sampling in the sidecar to capture a statistically significant subset (e.g., 1%) of the traffic. Second, instead of computing high-dimensional drift on the raw 256-dim embeddings, track the distribution of the final output logits or apply a lightweight dimensionality reduction (like random projection) before calculating the KS-test. Finally, offload the actual KS computation to an asynchronous batch job running on an OLAP database (like ClickHouse) rather than inline sidecars.
  common_mistake: |
    **The Pitfall:** Attempting to vertically scale the sidecar by allocating massive memory and CPU limits to process the full throughput.
    **The Rationale:** Engineers treat observability as an inline processing requirement rather than a statistical sampling problem.
    **The Consequence:** The sidecar continues to crash as traffic scales, wasting massive amounts of expensive compute on diagnostics rather than inference.
  napkin_math: |
    1. Full Throughput Data Rate: 20,000 QPS * 256 floats * 4 bytes = ~20.5 MB/s.
    2. 1-Hour Window Data Volume: 20.5 MB/s * 3600 seconds = ~73.7 GB.
    3. Running an O(N log N) KS-test on 73.7 GB inline requires an impractical amount of memory for a sidecar.
    4. Reservoir sampling at 1% reduces the data footprint to ~737 MB/hr (720k samples).
    **A 1% sample easily fits in a 2GB memory footprint while providing high statistical significance (margin of error < 0.2%).**
