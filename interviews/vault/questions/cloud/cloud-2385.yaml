title: High-Throughput Streaming Drift Detection
scenario: 'Your fraud detection pipeline processes 20,000 requests per second. The model uses 256-dimensional dense embeddings as features. The MLOps team deployed a Kolmogorov-Smirnov (KS) test to calculate feature drift over a 1-hour sliding window, but it consumes 64 CPU cores per node and causes the drift-detection sidecar to OOM crash, delaying alerts by hours.'
question: 'How would you redesign drift monitoring for 20,000 QPS of 256-dimensional embeddings without OOMing the sidecar?'
details:
  realistic_solution: 'Redesign the observability architecture to decouple inference from heavy statistical testing. First, implement reservoir sampling in the sidecar to capture a statistically significant subset (e.g., 1%) of the traffic. Offload the actual KS computation to an asynchronous batch job running on an OLAP database (like ClickHouse) rather than inline sidecars.'
  common_mistake: |
    **The Pitfall:** Attempting to vertically scale the sidecar by allocating massive memory and CPU limits to process the full throughput inline.
    **The Rationale:** Engineers treat observability as a mandatory synchronous processing requirement rather than a statistical sampling problem.
    **The Consequence:** The sidecar continues to crash as traffic scales, wasting massive amounts of expensive compute on diagnostics rather than inference serving.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Throughput: 20,000 QPS.
       - Embeddings: 256 dimensions, FP32 (4 bytes).
       - Window: 1 hour.
    2. **Calculations:**
       - Data Rate: 20,000 × 256 × 4 bytes = ~20.5 MB/s.
       - 1-Hour Volume: 20.5 MB/s × 3600 seconds = ~73.7 GB.
       - Running O(N log N) KS-test on 73.7 GB inline causes guaranteed OOM.
       - 1% Reservoir Sample: 73.7 GB × 0.01 = ~737 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. Processing 73.7 GB inline causes OOM. A 1% reservoir sample requires only 737 MB, fitting safely in the sidecar while providing high statistical significance.**
