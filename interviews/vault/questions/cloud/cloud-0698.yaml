title: The Pipeline Bubble Tax
scenario: You are training a large language model using 4-way pipeline parallelism (P=4). A global batch is split into 16 microbatches (M=16). The execution time for one complete microbatch step (forward + backward combined) through a single stage is 50 ms (T_stage).
question: With P=4, M=16, and T_stage=50 ms, how do you calculate the total global-batch time, and what is it?
details:
  realistic_solution: The total time is the time it would take if all stages were always busy, plus the overhead of the pipeline bubble. The pipeline is only fully utilized after the first microbatch has propagated through all `P` stages. The bubble consists of `P-1` stages that are idle at the beginning and `P-1` stages that are idle at the end. The total time can be calculated as the time to process all `M` microbatches through one stage, plus the time to fill/drain the other `P-1` stages.
  common_mistake: |
    **The Pitfall:** Assuming perfect parallelization and calculating the total time as M × T_stage.
    **The Rationale:** Candidates completely ignore the pipeline bubble—the initial latency to fill the pipeline stages and the final latency to drain it.
    **The Consequence:** Severely underestimating the execution time and overestimating the efficiency of pipeline parallelism.
  options:
  - 800 ms
  - 3200 ms
  - 1000 ms
  - 950 ms
  correct_index: 3
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4-way pipeline parallelism (P=4).
       - Global batch split into 16 microbatches (M=16).
       - T_stage = 50 ms.
    2. **Calculations:**
       - The formula for pipeline execution time is: Total_time = (M + P - 1) × T_stage.
       - Steady-state (ideal) time: 16 × 50 ms = 800 ms.
       - Pipeline bubble overhead: (4 - 1) × 50 ms = 150 ms.
       - Bubble fraction: 3 / 19 ≈ 15.8%.
       - Total global-batch time is 800 + 150 = 950 ms.
       - Calculated Distractor (800 ms): M × T_stage.
    3. **Conclusion & Interpretation:**
       - **The total global-batch time is 950 ms.**
       - **Result: Compute-Bound**
