title: Diagnosing Dispatch Overhead in Narrow Models
scenario: Your team is running a deep, narrow multi-layer perceptron (MLP) with thousands of sequential
  small layers on an NVIDIA A100 GPU using standard eager-mode PyTorch. Monitoring tools show GPU SM utilization
  at roughly 16%, while a single CPU core is pegged at 100%. Profiling reveals that each layer takes about
  2µs to execute on the GPU, but the model throughput falls drastically short of the A100's theoretical
  TFLOPS. The team proposes aggressively rewriting the CUDA kernels to run faster, but performance remains
  unchanged. Diagnose the root cause of this bottleneck.
details:
  realistic_solution: Diagnose that the workload is CPU-bound due to the Dispatch Overhead Law. Use torch.compile
    or CUDA Graphs to fuse operations, paying the Python dispatch tax once per graph rather than once
    per micro-operation.
  common_mistake: Assuming the model is memory-bandwidth bound due to low arithmetic intensity, or focusing
    entirely on optimizing the GPU kernels without measuring CPU-side launch times.
  napkin_math: 'Let Python dispatch overhead = 10µs per op. Let GPU kernel execution = 2µs per op. Time
    per op = max(10, 2) = 10µs (CPU bound). GPU active time = 2µs / 10µs = 20% utilization. If we fuse
    100 ops into a single CUDA Graph: Dispatch = 10µs, Execution = 100 * 2 = 200µs. Time per 100 ops =
    max(10, 200) = 200µs. GPU utilization jumps to 200/200 = 100%, yielding an effective 5x throughput
    speedup.'
