title: GPU Time-Slicing vs MIG vs MPS
scenario: 'Compare three GPU sharing mechanisms: CUDA time-slicing, MIG, and MPS. For each, explain the
  isolation guarantees, overhead, and best use case.'
question: "How do CUDA time-slicing, MIG, and MPS differ in isolation, overhead, and best use case?"
details:
  realistic_solution: 'CUDA Time-Slicing: GPU context-switches between workloads. No memory isolation
    — all workloads share the full GPU memory space. Overhead: context switch takes 10-25 μs. Best for:
    development environments where isolation does not matter and workloads are bursty. MIG (Multi-Instance
    GPU): Hardware partitioning of SMs and memory. Full isolation — each partition has its own memory
    controllers, L2 cache, and SM sets. No context switching overhead. Only available on A100/H100. Best
    for: production inference serving multiple independent models with strict SLA requirements. MPS (Multi-Process
    Service): CUDA contexts share GPU simultaneously via a daemon process. Partial isolation — separate
    address spaces but shared SMs and memory bandwidth. Low overhead (~5%). Best for: running multiple
    small training jobs or MPI ranks that collectively use the full GPU. Can over-subscribe SMs, causing
    unpredictable latency. Key distinction: MIG gives guaranteed resources (cannot be taken away), MPS
    shares resources (contention possible), time-slicing alternates resources (latency spikes during context
    switches).'
  common_mistake: Treating MIG and time-slicing as equivalent. Time-slicing provides no memory isolation
    (one workload can OOM and crash all others), while MIG provides hardware-level memory and compute
    partitioning.
  napkin_math: 'A100 MIG max partitions: 7 × 1g.10gb. MPS: unlimited processes but shared 80 GB. Time-slicing:
    unlimited processes but 10-25 μs context switch per swap. For inference at 10 ms latency: time-slicing
    adds 0.1-0.25% overhead; MIG adds 0%.'
