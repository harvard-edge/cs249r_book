title: The TCO Maintenance Tax
scenario: When calculating the Total Cost of Ownership (TCO) for a large GPU cluster, what is the industry-standard
  rule of thumb to estimate annual hardware maintenance costs as a percentage of the initial capital expenditure
  (CapEx)?
question: "What rule of thumb estimates annual hardware maintenance as a percentage of initial CapEx for a large GPU cluster?"
details:
  realistic_solution: The correct rule of thumb is approximately 5% of CapEx per year. This figure is
    a standard baseline for budgeting the ongoing cost of keeping a large hardware fleet operational.
  common_mistake: Engineers often underestimate this cost, assuming it's near zero ('hardware is reliable'),
    or overestimate it by confusing it with larger operational expenses like power and cooling. The 5%
    rule of thumb specifically accounts for hardware failure rates (MTTF), spare parts inventory, and
    vendor support contracts.
  napkin_math: |
    1. **Identify rule of thumb:** Annual hardware maintenance is typically 5% of CapEx.
    2. **Example calculation:** For a single H100 GPU with a CapEx of $30,000.
    3. **Maintenance cost:** $30,000 * 0.05 = $1,500 per year just to cover component replacements and vendor support contracts.
  options:
  - 0.5%
  - 20%
  - 5%
  - 33%
  correct_index: 2
