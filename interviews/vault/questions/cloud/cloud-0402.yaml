title: The TCO Maintenance Tax
scenario: "When calculating the Total Cost of Ownership (TCO) for a large GPU cluster, you must estimate the annual hardware maintenance costs."
question: "What rule of thumb estimates annual hardware maintenance as a percentage of initial CapEx for a large GPU cluster?"
details:
  realistic_solution: The correct rule of thumb is approximately 5% of CapEx per year. This figure is a standard baseline for budgeting the ongoing cost of keeping a large hardware fleet operational.
  common_mistake: |
    **The Pitfall:** Underestimating maintenance costs or confusing them with operational expenses like power and cooling.
    **The Rationale:** Engineers often assume that hardware is highly reliable and has zero ongoing cost, ignoring the realities of hardware failure rates (MTTF) and expensive vendor support contracts.
    **The Consequence:** The cluster's TCO budget is severely underestimated, leading to financial shortfalls when components inevitably fail.
  napkin_math: |
    - **Identify rule of thumb:** Annual hardware maintenance is typically 5% of CapEx.
    - **Example calculation:** For a single H100 GPU with a CapEx of $30,000.
    - **Calculate maintenance cost:** $30,000 * 0.05 = **$1,500 per year** to cover replacements and support.
  options:
  - 0.5%
  - 20%
  - 5%
  - 33%
  correct_index: 2
