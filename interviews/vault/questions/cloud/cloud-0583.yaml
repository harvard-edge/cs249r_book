title: The Hypersensitive Hyperscaler
scenario: You are the principal architect for a cloud provider. A client wants to deploy a 105B parameter foundation model on H100 GPUs. They demand the lowest cost-per-token (requiring quantization) but strictly require zero accuracy degradation compared to FP16.
question: How do you formulate a quantization strategy and hardware configuration that guarantees zero accuracy loss while minimizing cost?
details:
  realistic_solution: 'The correct approach is to design a dynamic, multi-layered defense system (like SmoothQuant or AWQ) that acknowledges quantization is a statistical process vulnerable to distribution shifts. Keep the highly sensitive outlier activation channels in FP16, while quantizing the rest of the weights and activations to INT8. This mixed-precision serving strategy maintains the exact FP16 accuracy profile while reducing the memory footprint enough to fit on 2x H100s instead of 3x H100s, satisfying both cost and accuracy constraints.'
  common_mistake: |
    **The Pitfall:** Applying a purely static quantization fix (e.g., just quantizing all layers to INT8 or hardcoding specific layers to FP16).
    **The Rationale:** Candidates lack a systems perspective, ignoring that quantization is statistical and vulnerable to data drift or new usage patterns.
    **The Consequence:** As input distributions shift in production, the static quantization breaks the strict accuracy SLO, breaching the client contract.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 105B parameters.
       - FP16: 2 bytes/param. INT8: 1 byte/param.
       - H100 capacity: 80 GB.
    2. **Calculations:**
       - FP16 Baseline: 105B * 2 bytes = 210 GB. Requires 3x H100s (240 GB total), leaving 30 GB for KV cache.
       - INT8 Quantization: 105B * 1 byte = 105 GB. Fits on 2x H100s (160 GB total), leaving 55 GB for KV cache.
       - Cost Reduction: Dropping from 3 to 2 GPUs = 33% hardware cost reduction.
    3. **Conclusion & Interpretation:**
       - Mixed-precision fits within 2 GPUs while protecting the accuracy SLO.
       - **Result: 33% Cost Reduction (Mixed Precision)**
