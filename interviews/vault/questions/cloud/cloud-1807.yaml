title: RBAC API Rate Limiting Bottleneck in Distributed Training
scenario: An ML infrastructure team is training a multimodal model on 256 A100 GPUs. The dataset consists
  of 5 billion 2MB image-text pairs stored in an S3-compatible object store. To comply with data governance
  policies, they implemented fine-grained Role-Based Access Control (RBAC) where an external IAM microservice
  evaluates access tokens for every single object GET request. Despite the storage cluster having 800
  Gbps of dedicated bandwidth, GPU utilization has plummeted to 15% and dataloaders are constantly blocked
  on I/O. Analyze the root cause of this performance collapse.
details:
  realistic_solution: Replace per-object IAM checks with compute-scoped IAM roles (e.g., Instance Profiles)
    or short-lived session tokens that grant read access to an entire bucket or prefix, shifting authorization
    to the infrastructure layer.
  common_mistake: Assuming the storage network bandwidth is saturated or the CPUs are bottlenecked by
    data preprocessing, rather than identifying the IAM control plane as the rate-limiting factor.
  napkin_math: 'Target throughput: 256 GPUs * 150 MB/s = 38.4 GB/s. With 2MB objects, this requires 19,200
    GET req/s. If the IAM microservice rate-limits at 1,000 req/s, the effective throughput is capped
    at 1,000 * 2MB = 2 GB/s, starving the GPUs (2 GB/s / 38.4 GB/s ≈ 5% maximum utilization without caching).'
