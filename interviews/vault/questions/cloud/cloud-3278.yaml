title: 'H100 Memory Optimization for Large Language Models: Checkpointing vs. Parallelism'
scenario: 'Your team is training a Mixture-of-Experts (MoE) LLM with 1 trillion parameters. Initial profiling indicates forward-pass activation storage alone exceeds the available HBM3. You must evaluate aggressive gradient checkpointing on a single accelerator versus pipeline parallelism across multiple devices.'
question: 'How would you choose between aggressive checkpointing on one accelerator and pipeline parallelism across accelerators for a 1T-parameter MoE model?'
details:
  realistic_solution: 'The optimal choice depends on the hardware compute-to-memory-bandwidth ratio. Gradient checkpointing saves memory but introduces quadratic recomputation cost. Pipeline parallelism avoids recomputation but introduces pipeline bubble overhead and relies heavily on inter-device bandwidth. Given the extreme TFLOPS-to-bandwidth ratio of modern accelerators, targeted gradient checkpointing is typically favored as recomputing activations is faster than communicating them across devices, provided the recomputation fits within the FLOP budget.'
  common_mistake: |
    **The Pitfall:** Overlooking the quadratic increase in recomputation cost or underestimating communication overhead.
    **The Rationale:** Candidates fail to weigh the accelerator's compute-to-memory ratio (FLOPs/Byte) to dictate whether recomputing or communicating is cheaper.
    **The Consequence:** Selecting a strategy that either cripples training speed due to recomputation bottlenecks or pipeline stall bubbles.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory required: >100GB (exceeds HBM limits).
       - Checkpointing vs. Pipeline Parallelism (PP).
    2. **Calculations:**
       - Checkpointing: Reduces memory by 4x but adds 33% recomputation FLOPs.
       - PP (2 stages): Introduces ~10% bubble overhead, dropping effective utilization to 90%.
    3. **Conclusion & Interpretation:**
       - **Result: The massive TFLOPS of modern accelerators favors recomputation over the network bottlenecks of PP (Compute-Bound).**
