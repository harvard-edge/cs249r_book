title: 'H100 Memory Optimization for Large Language Models: Checkpointing vs. Parallelism'
scenario: 'Your team is training a Mixture-of-Experts (MoE) LLM with 1 trillion parameters. Initial profiling indicates forward-pass activation storage alone exceeds the 80 GB HBM3 available on a single NVIDIA H100 GPU. You must evaluate two strategies to handle this: aggressive gradient checkpointing on a single H100 versus pipeline parallelism across multiple H100s.'
question: 'How would you choose between aggressive checkpointing on one H100 and pipeline parallelism across H100s for a 1T-parameter MoE model?'
details:
  realistic_solution: 'A realistic solution often involves a hybrid approach. For gradient checkpointing, strategically select which layers to checkpoint to balance memory savings with recomputation overhead. For pipeline parallelism, carefully choose the number of pipeline stages, batch size, and ensure high-bandwidth interconnects (like NVLink or Infiniband) are utilized to minimize idle time and communication bottlenecks. Evaluate the specific memory profile of the model''s layers; if only a few layers are memory-intensive, targeted checkpointing might be more efficient than full pipeline parallelism. Consider techniques like CPU offloading for less critical activations if latency can be tolerated.'
  common_mistake: |
    **The Pitfall:** Overlooking the quadratic increase in recomputation cost or underestimating communication overhead.
    **The Rationale:** Candidates fail to weigh the H100's compute-to-memory ratio (FLOPs/Byte) to dictate whether recomputing or communicating is cheaper.
    **The Consequence:** Selecting a strategy that either cripples training speed due to recomputation bottlenecks or pipeline stall bubbles.
  napkin_math: |
    * Memory required: >100GB (exceeds 80GB H100 limit).
    * Checkpointing: Reduces memory by 4x but adds 2x recomputation. Time cost relates to FP16 FLOPs needed for recomputation.
    * Pipeline Parallelism (2 stages): Introduces ~10% bubble overhead, dropping effective utilization to 90%.
    * **The optimal choice depends on the compute-to-memory ratio; H100's 989 TFLOPS vs 3.35 TB/s often heavily favors recomputation.**
