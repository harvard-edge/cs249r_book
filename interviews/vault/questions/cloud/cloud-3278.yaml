title: 'H100 Memory Optimization for Large Language Models: Checkpointing vs. Parallelism'
scenario: 'Your team is training a massive Mixture-of-Experts (MoE) Large Language
  Model with 1 trillion parameters, and initial profiling indicates that forward-pass
  activation storage alone exceeds the 80 GB HBM3 memory available on a single NVIDIA
  H100 GPU. You have access to a cluster of NVIDIA H100s, each featuring 80 GB HBM3,
  989 TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth. The model requires
  significant compute, and training efficiency is critical. You are tasked with evaluating
  two primary strategies to handle this memory constraint: aggressive gradient checkpointing
  on a single H100 versus distributing the model across multiple H100s using pipeline
  parallelism. Analyze the trade-offs in terms of compute efficiency, memory usage,
  training speed, and communication overhead for each approach given the H100''s specifications.'
question: How would you choose between aggressive checkpointing on one H100 and pipeline
  parallelism across H100s for the 1T-parameter MoE model?
details:
  realistic_solution: A realistic solution often involves a hybrid approach. For gradient
    checkpointing, strategically select which layers to checkpoint to balance memory
    savings with recomputation overhead. For pipeline parallelism, carefully choose
    the number of pipeline stages, batch size, and ensure high-bandwidth interconnects
    (like NVLink or Infiniband) are utilized to minimize idle time and communication
    bottlenecks. Evaluate the specific memory profile of the model's layers; if only
    a few layers are memory-intensive, targeted checkpointing might be more efficient
    than full pipeline parallelism. Consider techniques like CPU offloading for less
    critical activations if latency can be tolerated.
  common_mistake: Overlooking the quadratic increase in recomputation cost with the
    number of checkpointed layers, or underestimating the communication overhead and
    latency costs associated with pipeline parallelism, especially when using low-bandwidth
    interconnects or many stages. Another common mistake is not considering the effective
    memory bandwidth for recomputation vs. communication bandwidth.
  napkin_math: Let's consider a simplified case for gradient checkpointing. If checkpointing
    reduces activation memory usage by 4x but requires 2x recomputation, the effective
    training time might increase by a factor related to this recomputation. For a
    model that requires 100GB of activation memory (without checkpointing) on an 80GB
    H100, checkpointing is necessary. If it saves 50% memory, it's still 50GB. The
    cost of recomputation, in terms of FP16 operations, must be weighed against the
    original forward pass (e.g., if recomputing 50% of the forward pass, that's roughly
    50% extra FLOPs). For pipeline parallelism, if a model requires 2 H100s, and each
    stage has a 10% bubble overhead due to communication/synchronization, the effective
    utilization drops to 90% per device. The memory bandwidth of 3.35 TB/s and FP16
    dense performance of 989 TFLOPS are key. If recomputing an activation requires
    100 FLOPs and storing it requires 10 Bytes, the ratio of compute (TFLOPS) to bandwidth
    (TB/s) dictates which strategy is 'cheaper' in terms of time. A typical H100 has
    a compute to memory ratio (FLOPs/Byte) that favors recomputation for certain activation
    patterns.
