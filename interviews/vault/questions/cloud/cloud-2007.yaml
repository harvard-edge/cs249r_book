title: Evaluating Tensor Memory Layouts for Tensor Cores
scenario: You are optimizing a ResNet-based vision pipeline on an NVIDIA A100 GPU using FP16. Tensors currently use the legacy NCHW memory layout. A proposal suggests migrating the tensor abstraction to the NHWC ('channels_last') layout to maximize Tensor Core utilization for Conv2D operations. However, three custom CUDA kernels in the pipeline strictly require contiguous NCHW tensors. A critical bottleneck tensor is shape [N=256, C=1024, H=14, W=14].
question: Should you switch the ResNet pipeline to NHWC despite three NCHW-only custom kernels, and when is the conversion cost justified?
details:
  realistic_solution: Adopt the NHWC layout to unlock 2-3x Tensor Core speedups for convolutions. The overhead of dynamically converting to NCHW for the custom kernels is bandwidth-bound but justified if the convolution time savings exceed the memory copy penalty.
  common_mistake: |
    **The Pitfall:** Ignoring the memory bandwidth cost of implicit `.contiguous()` calls.
    **The Rationale:** Assuming the global optimal layout (NHWC) is universally faster.
    **The Consequence:** Dynamic memory transpositions before legacy custom kernels destroy the performance gains of the Tensor Cores.
  napkin_math: |
    - 1. **Tensor Size:** 256 × 1024 × 14 × 14 × 2 bytes (FP16) = 102.7 MB.
    - 2. **Transposition Cost:** Read + Write = 205.4 MB. At 2 TB/s bandwidth, the copy takes 102.7 microseconds.
    - 3. **Result:** **The layout change is only a net positive if NHWC Conv2D saves more than 102.7 µs per layer compared to NCHW.**
