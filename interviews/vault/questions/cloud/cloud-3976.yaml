title: GPU Pod Rollout Budget For LLM Serving
scenario: An LLM service runs 24 H100 pods, each handling 30 requests/s at the target
  latency. A canary deployment drains 2 pods at a time for 6 minutes while they reload
  a new 14 GB model image. Peak demand is 650 requests/s. Size the safe batch size
  for rolling update without violating capacity.
question: Is it safe to drain 2 of 24 H100 pods during rollout while serving 650 requests/s,
  or should the rollout be smaller?
details:
  realistic_solution: With all pods, capacity is 24 x 30 = 720 requests/s. Draining
    2 pods leaves 22 x 30 = 660 requests/s, only 10 requests/s above peak demand,
    which is 98.5% utilization. That is arithmetically possible but not safe for tail
    latency. A safer rollout drains 1 pod at a time or temporarily adds pods before
    rollout.
  common_mistake: Checking only that capacity is barely above average peak and ignoring
    queueing/tail-latency headroom during rollout.
  napkin_math: Full capacity = 720 rps. With 2 drained = 660 rps. Peak = 650 rps.
    Utilization = 650/660 = 98.5%, unsafe for latency.
