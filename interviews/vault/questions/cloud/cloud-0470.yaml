title: The Tensor Parallel Scaling Trap
scenario: 'You are scaling a large language model using tensor parallelism on multi-node servers, each with 8 GPUs. Training on a single server shows excellent performance. When you expand the job to two servers (16 GPUs), overall throughput only increases by 20%. A profiler shows that the `all-reduce` collective operation, exchanging a 4GB tensor among all GPUs, dominates the step time.'
question: "What bottleneck is causing the 4GB tensor all-reduce to dominate when scaling from 8 to 16 GPUs?"
details:
  realistic_solution: 'The bottleneck is the inter-node InfiniBand network. Within a single server, the 8 GPUs communicate via the ultra-fast NVLink fabric. When the job scales to a second server, the `all-reduce` collective must now send data across the nodes. This traffic travels over the InfiniBand network, which is an order of magnitude slower than NVLink. This dramatic drop in communication bandwidth means the GPUs spend most of their time waiting for data from the other node to arrive, causing the poor scaling efficiency.'
  common_mistake: |
    **The Pitfall:** Blaming the software all-reduce implementation or a local hardware bus (like PCIe) for the slowdown.
    **The Rationale:** Engineers often underestimate the drastic performance gap between the intra-node GPU fabric and the inter-node network fabric.
    **The Consequence:** Significant time is wasted tuning software kernels or single-node configs, rather than addressing the structural inter-node communication bottleneck through optimized parallel strategies or network upgrades.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 4GB.
       - Intra-node fabric: NVLink (900 GB/s).
       - Inter-node fabric: InfiniBand (50 GB/s).
    2. **Calculations:**
       - NVLink transfer time = 4GB / 900 GB/s ≈ 4.4 ms.
       - InfiniBand transfer time = 4GB / 50 GB/s = 80 ms.
       - Transfer latency penalty = 80 ms / 4.4 ms ≈ 18x longer.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound**. The inter-node transfer over InfiniBand takes ~18x longer than intra-node NVLink, causing the severe scaling drop when transitioning from 1 to 2 nodes.
  options:
  - The PCIe Gen5 bus connecting the GPUs to the motherboard is saturated by the increased traffic.
  - The `all-reduce` algorithm in the framework's code is inefficient and doesn't scale beyond 8 GPUs.
  - The inter-node InfiniBand network has much lower bandwidth than the intra-node NVLink fabric, creating a communication bottleneck.
  - The GPUs are compute-bound and cannot keep up with the data from 16 parallel processes.
  correct_index: 2
