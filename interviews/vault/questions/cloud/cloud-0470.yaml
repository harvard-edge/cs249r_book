title: The Tensor Parallel Scaling Trap
scenario: You are an ML Systems Engineer scaling a large language model using tensor parallelism. Your
  setup uses multi-node servers, each with 8 H100 GPUs. Training on a single server (8 GPUs) shows excellent
  performance. However, when you expand the job to two servers (16 GPUs), you observe that overall throughput
  only increases by 20%, a severe drop in scaling efficiency. A profiler shows that the `all-reduce` collective
  operation, which needs to exchange a 4GB tensor among all GPUs, is dominating the step time. Given the
  hardware specifications, diagnose the most likely bottleneck that is causing this scaling problem.
question: "What bottleneck is causing the 4GB tensor all-reduce to dominate when scaling from 8 to 16 H100s?"
details:
  realistic_solution: The bottleneck is the inter-node InfiniBand network. Within a single server, the
    8 H100 GPUs communicate via the ultra-fast 900 GB/s NVLink fabric. When the job scales to a second
    server, the `all-reduce` collective must now send data across the nodes. This traffic travels over
    the InfiniBand network, which at 400 Gbps (50 GB/s), is an order of magnitude slower than NVLink.
    This dramatic drop in communication bandwidth means the GPUs spend most of their time waiting for
    data from the other node to arrive, causing the poor scaling efficiency.
  common_mistake: Engineers often underestimate the performance gap between different interconnects. They
    might blame the software (e.g., 'inefficient all-reduce kernel') or the wrong hardware bus (like PCIe),
    failing to recognize that crossing the server boundary introduces a fundamentally different, and much
    slower, communication physics via the network fabric compared to the on-server GPU-to-GPU fabric.
  napkin_math: Let's calculate the ideal transfer time for the 4GB tensor across the two different interconnects.
  options:
  - The PCIe Gen5 bus connecting the GPUs to the motherboard is saturated by the increased traffic.
  - The `all-reduce` algorithm in the framework's code is inefficient and doesn't scale beyond 8 GPUs.
  - The inter-node InfiniBand network has much lower bandwidth than the intra-node NVLink fabric, creating
    a communication bottleneck.
  - The H100 GPUs are compute-bound and cannot keep up with the data from 16 parallel processes.
  correct_index: 2
