title: Evaluating Imperative vs Declarative Scheduling for Mixed Workloads
scenario: Your ML infrastructure team manages a cluster of 1,024 A100 (80GB) nodes. You currently use
  an imperative scheduler (e.g., Slurm) where researchers request exact resources (e.g., `--nodes=64 --gpus-per-node=8`).
  The workload mix is 20% massive training jobs (64-128 nodes) requiring strict gang scheduling, and 80%
  hyperparameter sweeps (1-2 nodes). Cluster utilization has plateaued at 65% due to fragmentation. Evaluate
  the trade-offs of keeping the imperative scheduler versus migrating to a declarative, intent-based system
  (e.g., Kubernetes) to improve utilization.
details:
  realistic_solution: Adopt a hybrid or declarative-with-extensions approach (like Kubernetes with Volcano/Kueue).
    Use declarative bin-packing to aggressively consolidate the 1-2 node jobs, freeing up contiguous blocks
    for the large jobs. Implement strict gang-scheduling APIs to ensure the 64-node jobs are allocated
    all-or-nothing, preventing deadlocks.
  common_mistake: Candidates often propose a full migration to a declarative scheduler without addressing
    the throughput limits of default pod-by-pod schedulers or the necessity of strict gang scheduling
    for the large MPI-based training jobs, leading to partial allocation deadlocks.
  napkin_math: At 65% utilization, 358 of 1024 nodes are idle due to fragmentation. At $30/hour per node,
    this wastes ~$10,740/hour ($7.7M/month). If a declarative scheduler with automated preemption and
    bin-packing increases utilization to 85%, you reclaim 204 active nodes, saving $4.4M/month. The engineering
    cost of deploying a custom declarative gang scheduler is easily justified by the reclaimed compute.
