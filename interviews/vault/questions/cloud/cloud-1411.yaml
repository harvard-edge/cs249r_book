title: Evaluating Imperative vs Declarative Scheduling for Mixed Workloads
scenario: Your ML infrastructure team manages a cluster of 1,024 A100 nodes. You currently use an imperative scheduler where researchers request exact resources. The workload mix is 20% massive training jobs requiring strict gang scheduling, and 80% hyperparameter sweeps. Cluster utilization has plateaued at 65% due to fragmentation.
question: "How would you choose between Slurm-style imperative scheduling and declarative gang scheduling to improve 65% utilization?"
details:
  realistic_solution: Adopt a hybrid or declarative-with-extensions approach (like Kubernetes with Volcano/Kueue). Use declarative bin-packing to aggressively consolidate the 1-2 node jobs, freeing up contiguous blocks for the large jobs. Implement strict gang-scheduling APIs to ensure the 64-node jobs are allocated all-or-nothing, preventing deadlocks.
  common_mistake: |
    **The Pitfall:** Proposing a full migration to a declarative scheduler without handling gang scheduling.
    **The Rationale:** Kubernetes handles bin-packing beautifully, making it an attractive replacement for Slurm.
    **The Consequence:** Default pod-by-pod scheduling leads to partial allocation deadlocks for large MPI-based training jobs, crashing the 20% of workloads that require strict gang scheduling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Node count: 1,024 nodes.
       - Current utilization: 65% (358 idle nodes).
       - Node cost: $30/hour.
    2. **Calculations:**
       - Wasted cost: 358 nodes × $30/hour = $10,740/hour ($7.7M/month).
       - Target declarative utilization: 85% (reclaims 204 nodes).
       - Reclaimed value: 204 nodes × $30/hour = $6,120/hour.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduling-Overhead-Bound. This efficiency increase saves $4.4M/month, easily justifying the engineering cost of a custom scheduler.**
