title: 'Auxiliary Load Balancing Loss: Mechanism and Coefficient'
scenario: You train an MoE model and notice that after 10K steps, 3 of your 8 experts
  receive 80% of all tokens while 5 experts are nearly dormant. Implement the standard
  auxiliary load-balancing loss from Switch Transformer. What coefficient should you
  use, and what happens if it is too high or too low?
question: What fraction f_i does each of the 5 nearly dormant experts receive if they
  uniformly share the remaining 20% of routed tokens?
details:
  realistic_solution: 'With 5 experts each receiving uniform share of 20% routed tokens:
    f_i = 0.20/5 = 0.04 per expert (not 0.027 which divides differently). Each expert
    processes 4% of total tokens.'
  common_mistake: Setting the load-balancing loss coefficient too high, which forces
    perfectly uniform routing and prevents the model from learning meaningful expert
    specialization. The goal is approximate balance, not perfect uniformity.
  napkin_math: 'MoE routing load balance: each token routed to top-2 of 5 experts.
    Fraction per expert: top-2 out of 5 experts. Tokens per expert per batch = batch
    × 2 / 5. For uniform routing: each expert gets 2/5 = 40% of tokens... but the
    question has 5 experts with load fractions. If top-2 of 8 experts: each expert
    gets on average 2/8 = 25% = 0.25 of tokens. If 5 experts visible and uniform routing
    to top-2: f_i = 2/8 = 0.25 or 2/5 = 0.40? With 5 active experts from 8 total,
    top-2 routing: fraction = 2/8 = 0.25... The Gemini correction says f_i = 0.04
    (5 experts × 20% routing = each gets 4%, meaning 5% × 80% = 4%? No: 20% routing
    to 5 experts evenly = 4% each = 0.04). So 5 × 20% of tokens route to this group,
    20%/5 = 4% per expert.'
