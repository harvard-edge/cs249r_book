title: 'Auxiliary Load Balancing Loss: Mechanism and Coefficient'
scenario: You train an MoE model and notice that after 10K steps, 3 of your 8 experts receive 80% of all tokens while 5 experts are nearly dormant. You implement the standard auxiliary load-balancing loss.
question: What fraction f_i does each of the 5 nearly dormant experts receive if they uniformly share the remaining 20% of routed tokens?
details:
  realistic_solution: |
    With 5 experts each receiving a uniform share of the remaining 20% of routed tokens, each expert processes exactly 4% of the total tokens.
  common_mistake: |
    **The Pitfall:** Setting the load-balancing loss coefficient too high.
    **The Rationale:** Candidates strive for perfect uniformity, preventing the model from learning meaningful expert specialization.
    **The Consequence:** Reduced model quality and degraded predictive performance because experts cannot specialize.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 total experts, Top-2 routing.
       - 3 experts receive 80% of tokens.
       - 5 experts uniformly share 20% of tokens.
    2. **Calculations:**
       - Fraction per dormant expert (f_i): 0.20 / 5 = 0.04.
    3. **Conclusion & Interpretation:**
       - **Result: Imbalance-Bound.** Each dormant expert receives 4% of the tokens.
