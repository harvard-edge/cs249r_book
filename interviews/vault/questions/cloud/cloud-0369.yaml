title: The H100 Ridge Point (cloud-0369)
scenario: You're evaluating a new NVIDIA H100 GPU for your training cluster. To make a first-pass assessment
  of its capabilities, you need to understand the fundamental balance between its compute power and memory
  bandwidth. Calculate the 'ridge point' for an H100 GPU in FP16 precision. Explain what this number tells
  you about a workload's performance characteristics.
question: "What is the FP16 ridge point for an H100 GPU, and what does that number say about workload performance?"
details:
  realistic_solution: The ridge point separates compute-bound workloads from memory-bound ones. It's the
    minimum arithmetic intensity (Ops/Byte) a workload must have to begin to saturate the GPU's compute
    units. For an H100, we divide its peak FP16 compute by its peak HBM3 memory bandwidth. A workload
    with an arithmetic intensity greater than this value is 'compute-bound'; a workload below it is 'memory-bound'.
  common_mistake: 'A common mistake is to invert the ratio, calculating Bytes/Op instead of Ops/Byte,
    which leads to a tiny, meaningless number. Another is to fail to normalize the units (e.g., using
    TFLOPS for compute but GB/s for memory), resulting in an answer that is off by orders of magnitude.
    Finally, engineers often forget that this single number is a critical threshold: if a model''s arithmetic
    intensity is below the ridge point, it''s memory-bound, no matter how many TFLOPS the chip has.'
  napkin_math: 1. **Get Peak Compute (Ops/s):** The H100 provides 989 TFLOPS in FP16. (989 × 10¹² Ops/s)
  options:
  - ~0.003 Ops/Byte. This implies almost any workload is compute-bound.
  - ~37 Ops/Byte. This results from incorrectly using bits instead of bytes for memory bandwidth.
  - ~295 Ops/Byte. A workload's arithmetic intensity must exceed this to be compute-bound.
  - ~1,342 Ops/Byte. This is the ridge point for an edge device (Jetson AGX Orin), not a datacenter GPU.
  correct_index: 2
