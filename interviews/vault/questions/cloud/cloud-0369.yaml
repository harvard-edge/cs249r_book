title: The H100 Ridge Point (cloud-0369)
scenario: You're evaluating a new datacenter GPU for your training cluster. To make a first-pass assessment of its capabilities, you need to understand the fundamental balance between its compute power and memory bandwidth in FP16 precision.
question: "What is the FP16 ridge point for an H100 GPU, and what does that number say about workload performance?"
details:
  realistic_solution: 'The ridge point separates compute-bound workloads from memory-bound ones. It''s the minimum arithmetic intensity (Ops/Byte) a workload must have to begin to saturate the GPU''s compute units. For an H100, we divide its peak FP16 compute by its peak HBM3 memory bandwidth. A workload with an arithmetic intensity greater than this value is ''compute-bound''; a workload below it is ''memory-bound''.'
  common_mistake: |
    **The Pitfall:** Inverting the ratio (Bytes/Op) or failing to normalize units (TFLOPS vs GB/s).
    **The Rationale:** Mixing up numerator and denominator is common when working with rates.
    **The Consequence:** Generating a useless metric that causes misclassification of the workload as compute-bound when it is memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:** Peak Compute = 989 TFLOPS. Memory Bandwidth = 3.35 TB/s.
    2. **Calculations:** Peak Compute = 989,000 GFLOPS. Memory Bandwidth = 3,350 GB/s. Ridge Point = 989,000 GFLOPS / 3,350 GB/s = 295.22 Ops/Byte.
    3. **Conclusion & Interpretation:** **Result: 295.22 Ops/Byte.** Workloads need significant arithmetic intensity to avoid memory bottlenecks on this architecture.
  options:
  - ~0.003 Ops/Byte. This implies almost any workload is compute-bound.
  - ~37 Ops/Byte. This results from incorrectly using bits instead of bytes for memory bandwidth.
  - ~295 Ops/Byte. A workload's arithmetic intensity must exceed this to be compute-bound.
  - ~1,342 Ops/Byte. This is the ridge point for an edge device (Jetson AGX Orin), not a datacenter GPU.
  correct_index: 2
