title: Dynamic Edge-Cloud Serving Threshold
scenario: 'A visual search app uses a 5MB local edge model (20ms latency, 96% accuracy) and a 2GB cloud ViT-L model (250ms latency, 99% accuracy). System throughput is 1000 QPS. You need to achieve an overall P95 latency of <100ms and >95% accuracy while minimizing cloud spend.'
question: 'How would you set up a local-cloud cascade to meet the SLA while minimizing cost?'
details:
  realistic_solution: 'Implement a dynamic cascading confidence threshold. The edge runs the lightweight model first. If confidence is below a threshold, route to the cloud. To meet P95 < 100ms, max 5% of requests can go to the cloud. Set the threshold to reject only the bottom 5%.'
  common_mistake: |
    **The Pitfall:** Running both models concurrently (shadowing) and waiting for the cloud.
    **The Rationale:** Candidates assume ensembling requires both outputs simultaneously.
    **The Consequence:** Completely violates the latency SLA (all requests take 250ms) and maximizes cloud costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 QPS total.
    - Cloud API costs $0.01 per 10 requests.
    - P95 latency < 100ms requirement limits cloud usage to 5%.
    
    **Calculations:**
    - Average Latency: (0.95 * 20 ms) + (0.05 * 250 ms) = 31.5 ms.
    - Accuracy: (0.95 * 96%) + (0.05 * 99%) = 96.15% (>95% constraint met).
    - Cloud-only cost: 1000 QPS * 86,400s / 10 * $0.01 = $86,400/day.
    - Cascaded cost: 50 QPS * 86,400s / 10 * $0.01 = $4,320/day.
    
    **Conclusion & Interpretation:**
    - **Result: $82,080/day savings while hitting 31.5ms avg latency (Latency-Bound)**. Thresholding directly optimizes financial cost.
