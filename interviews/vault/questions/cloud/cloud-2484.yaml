title: Dynamic Edge-Cloud Serving Threshold
scenario: 'A visual search app uses a 5MB local edge model (20ms latency, 85% accuracy) and a 2GB cloud-based ViT-L model (250ms latency including network, 99% accuracy). System throughput is 1000 QPS. Cloud API costs $0.01 per 10 requests. You need to achieve an overall P95 latency of <100ms and >95% accuracy while minimizing cloud spend.'
question: 'How would you set up a local-cloud cascade to meet P95 latency under 100ms and over 95% accuracy while minimizing cloud spend?'
details:
  realistic_solution: 'Implement a dynamic cascading confidence threshold. The edge device runs the lightweight model first and extracts a confidence score. If it falls below the threshold, the query is routed to the cloud. The critical constraint: to meet the P95 < 100ms SLA, the cloud routing rate must stay at or below 5%, since any cloud-routed request exceeds 100ms (250ms). This means the confidence threshold must be set to reject only the bottom ~5% of predictions.'
  common_mistake: |
    **The Pitfall:** Running both models concurrently (shadowing) and waiting for the cloud response.
    **The Rationale:** Candidates assume ensembling requires both outputs simultaneously to make a routing decision.
    **The Consequence:** This completely violates the latency SLA (all requests take 250ms) and maximizes cloud costs.
  napkin_math: |
    - **Latency Constraint:** To meet P95 < 100ms, max 5% of requests can go to the cloud (since 250ms > 100ms).
    - **Traffic Distribution:** Edge = 95%, Cloud = 5%.
    - **Average Latency:** (0.95 × 20 ms) + (0.05 × 250 ms) = 19 + 12.5 = 31.5 ms.
    - **Accuracy Check:** (0.95 × 96%) + (0.05 × 99%) = 91.2% + 4.95% = 96.15% (meets >95%).
    - **Cost Savings:** Cloud-only cost = 1000 QPS × 86,400 s/day / 10 × $0.01 = $86,400/day. Cascaded cost = 50 QPS × 86,400 s/day / 10 × $0.01 = $4,320/day. **Savings = $82,080/day**.
