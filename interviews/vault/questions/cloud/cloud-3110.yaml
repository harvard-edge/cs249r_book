title: 'Transformer Cost Evaluation: GPT-2 vs LLaMA-7B Inference Cost'
scenario: Compare inference cost per 1M tokens for GPT-2 large (774M params, BF16)
  vs LLaMA-7B (7B params, INT4) on H100 (80GB HBM3, 3.35TB/s, $2.50/hr). Both generate
  100-token responses, batch=1. Calculate decode throughput, time per request, and
  cost per 1M tokens for each model.
question: What are decode throughput, request latency, and cost per 1M tokens for
  GPT-2 large BF16 versus LLaMA-7B INT4 on one H100?
details:
  realistic_solution: 'GPT-2 large BF16: 1548MB. Decode: 1548/3350=0.462ms/token.
    100 tokens: 46.2ms/req. Throughput: 1/0.0462=21.6 req/s. Cost: $2.50/(21.6*3600)=$0.0000321/req.
    Per 1M tokens: $0.0000321/req * (1M/100 tokens/req) = $321/1M tok. LLaMA-7B INT4:
    3.5GB (4 bits/param). Decode: 3.5GB/3350 + 10% dequant = 1.045ms + 0.105ms = 1.15ms/token.
    100 tokens: 115ms. Throughput: 8.7 req/s. Cost: $2.50/(8.7*3600)=$0.0000799/req.
    Per 1M: $799/1M tok. GPT-2 large is 2.49x cheaper per token despite being 9x smaller
    model — INT4 dequantization overhead matters.'
  common_mistake: Comparing FP16 model bandwidth cost vs INT4 without accounting for
    dequantization overhead (INT4 requires conversion to BF16 before MatMul), which
    typically adds 10-20% latency vs theoretical BW reduction.
  napkin_math: 'GPT-2L: BW=1548MB/3350GB/s=0.462ms/tok. 21.6 req/s. Cost/1M tok=$2.50/(21.6*3600*100)*1M=$321.
    LLaMA-7B INT4: BW=3500MB/3350GB/s=1.045ms/tok. +10% dequant: 1.15ms/tok. 8.7 req/s.
    Cost/1M tok=$2.50/(8.7*3600*100)*1M=$799. LLaMA wins on quality (7B vs 774M params):
    ~3x more parameters → better quality. Cost tradeoff: 2.49x more expensive for
    much better model. Market: GPT-3.5-Turbo at $0.50/1M tok suggests massive scale
    optimization or different model architecture reduces this cost.'
