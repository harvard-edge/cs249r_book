title: 'Transformer Cost Evaluation: GPT-2 vs LLaMA-7B Inference Cost'
scenario: Compare inference cost per 1M tokens for GPT-2 large (774M params, BF16) vs LLaMA-7B (7B params, INT4) on a standard GPU instance ($2.50/hr). Both generate 100-token responses at batch=1.
question: What are the decode throughput, request latency, and cost per 1M tokens for GPT-2 large BF16 versus LLaMA-7B INT4?
details:
  realistic_solution: 'GPT-2 large BF16: 1.548 GB. Decode latency: 1.548 GB / 3.35 TB/s = 0.462 ms/token. 100 tokens: 46.2 ms/req. Throughput: 21.6 req/s. Cost: $0.32 per 1M tokens. LLaMA-7B INT4: 3.5 GB (4 bits/param). Decode: 3.5 GB / 3.35 TB/s + 10% dequantization overhead = 1.045 ms + 0.105 ms = 1.15 ms/token. 100 tokens: 115 ms. Throughput: 8.7 req/s. Cost: $0.80 per 1M tokens. GPT-2 large is 2.5x cheaper per token, but LLaMA-7B delivers vastly superior quality. INT4 dequantization overhead heavily impacts the theoretical bandwidth savings.'
  common_mistake: |
    **The Pitfall:** Comparing FP16 model bandwidth cost vs INT4 without accounting for dequantization overhead.
    **The Rationale:** Engineers assume INT4 strictly scales linearly with bandwidth reduction.
    **The Consequence:** Failing to factor in the on-the-fly conversion to BF16 (required before MatMul) causes severe underestimation of actual latency, typically missing a 10-20% compute penalty.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * GPT-2L (BF16) BW: 1.548 GB / 3350 GB/s = 0.462 ms/tok.
       * LLaMA-7B (INT4) BW: 3.5 GB / 3350 GB/s = 1.045 ms/tok.
       * Dequantization overhead: +10% penalty for INT4.
    2. **Calculations:**
       * GPT-2L Throughput: 1 / 0.0462s = 21.6 req/s.
       * GPT-2L Cost/1M tok: $2.50 / (21.6 * 3600 * 100) * 1M = $0.32.
       * LLaMA-7B +10% dequant overhead: 1.15 ms/tok.
       * LLaMA-7B Throughput: 1 / 0.115s = 8.7 req/s.
       * LLaMA-7B Cost/1M tok: $2.50 / (8.7 * 3600 * 100) * 1M = $0.80.
    3. **Conclusion & Interpretation:**
       * **Result: Compute/Bandwidth Trade-off.** LLaMA is 2.5x more expensive but delivers a 9x larger parameter model.
