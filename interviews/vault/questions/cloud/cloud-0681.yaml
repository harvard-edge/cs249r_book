title: The Training Time Estimate
scenario: You have a 500 GB dataset of image-text pairs (100M samples). You're training a CLIP-style model on 8x A100 GPUs. Each GPU processes 256 samples/sec. The data pipeline can only deliver 1,500 samples/sec.
question: How long will one epoch take, and how does the data pipeline bottleneck impact cost?
details:
  realistic_solution: The compute math gives a lower bound, but the actual throughput is $\min(\text{GPU throughput}, \text{data pipeline throughput})$. If your data loading, decoding, and preprocessing pipeline is bottlenecked at 1,500 samples/sec, the 8 GPUs are starved 27% of the time. The effective throughput is 1,500, not 2,048.
  common_mistake: |
    **The Pitfall:** Calculating training time purely based on GPU compute capacity.
    **The Rationale:** Engineers focus on the raw TFLOPS of their accelerators, assuming data loading is instantaneous or perfectly overlapping.
    **The Consequence:** They blindly compute "8 GPUs × 256 = 2048 samples/sec," severely underestimating actual wall-clock time because the GPUs are starved for data.
  napkin_math: |
    - **Compute-limited time:** 100M / (8 × 256) = 100M / 2,048 = 48,828 seconds ≈ 13.6 hours.
    - **Data-pipeline-limited time:** 100M / 1,500 = 66,667 seconds ≈ 18.5 hours.
    - **Wasted Time:** 18.5 - 13.6 = 4.9 extra hours per epoch.
    - **Cost implication:** For a 10-epoch run, ~50 wasted hours × 8 GPUs × $2/hr = **$800 wasted** on idling GPUs.
