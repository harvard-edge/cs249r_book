title: im2col Memory Expansion
scenario: Your CNN training job on a 224×224 input with 64 channels and 3×3 convolutions runs out of GPU
  memory unexpectedly. A colleague mentions that the framework uses im2col under the hood. How does im2col
  transform convolution into matrix multiplication, and what is the memory overhead?
details:
  realistic_solution: 'im2col unrolls each convolution receptive field into a column vector, creating
    a matrix of shape ($k^2 \cdot C_{in}$) × ($H_{out} \cdot W_{out}$). For a 3×3 conv: the unrolled matrix
    replicates each input element up to 9× (the pixel appears in 9 overlapping patches). Memory expansion:
    original activation = 224×224×64×4B = 12.25 MB. im2col matrix = (9×64) × (222×222) × 4B ≈ 110 MB —
    a 9× blowup.'
  common_mistake: Not realizing that im2col duplicates input data. Each input pixel appears in multiple
    columns of the unrolled matrix, corresponding to each filter position it participates in.
  napkin_math: 'Original: 224×224×64×4B = 12.25 MB. | im2col: 576 × 49,284 × 4B ≈ 110 MB. | Expansion
    factor ≈ $k^2 = 9\times$. | For 128 channels: 220 MB just for one layer''s im2col buffer.'
  options:
  - im2col compresses the convolution into a 1D vector, saving memory.
  - im2col creates a Toeplitz matrix that has the same size as the original input.
  - im2col unrolls overlapping receptive fields into columns, duplicating data up to $k^2$ times and expanding
    memory by ~9× for 3×3 filters.
  - im2col only affects compute time, not memory — it reindexes data in-place.
  correct_index: 2
