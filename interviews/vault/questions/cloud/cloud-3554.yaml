title: 'H100 Data Ingestion: Optimizing Storage for Large-Scale ML'
scenario: You're responsible for optimizing the data pipeline for a massive deep learning model training on an NVIDIA H100 GPU cluster. Your dataset, comprising billions of high-resolution image feature vectors, totals 10 PB and is currently stored in a generic row-oriented format on a shared network file system. You've observed significant GPU idle time, indicating an I/O bottleneck.
question: How would you redesign storage and ingestion for the 10 PB image-feature dataset to maximize H100 utilization?
details:
  realistic_solution: 'Re-encode the data into a columnar format like Apache Parquet or TFRecord. Implement high-performance compression (e.g., ZSTD, LZ4). Relocate critical hot data to local NVMe SSDs, and employ GPUDirect Storage to enable direct data transfer from NVMe to HBM3, bypassing the host CPU completely.'
  common_mistake: |
    **The Pitfall:** Focusing solely on raw GPU compute power and neglecting the I/O subsystem.
    **The Rationale:** Candidates assume standard storage solutions can keep up with modern accelerators.
    **The Consequence:** They propose solutions that shift the bottleneck to CPU-intensive compression or fail to address the data delivery bottleneck to HBM3, causing severe GPU underutilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 PB dataset. H100 needs 200 GB/s throughput to prevent starvation.
       - NVMe drives yield 5 GB/s each.
       - Compression ratio: 5x.
    2. **Calculations:**
       - Compressed dataset size: 10 PB / 5 = 2 PB.
       - Compressed throughput needed: 200 GB/s / 5 = 40 GB/s.
       - NVMe drives required to hit 40 GB/s: 40 / 5 = 8 drives.
       - Daily throughput for weekly epoch: 2 PB / 7 days = 285 TB/day = 3.3 GB/s avg (but peak bursts require 40 GB/s).
    3. **Conclusion & Interpretation:**
       - **Result: 8 NVMe drives required with 5x compression. The system transitions from I/O-Bound to Compute-Bound by leveraging GPUDirect Storage and columnar compression.**
