title: 'H100 Data Ingestion: Optimizing Storage for Large-Scale ML'
scenario: You're responsible for optimizing the data pipeline for a massive deep learning model training on an NVIDIA H100 GPU cluster. Each H100 GPU features 80 GB HBM3 memory and 3.35 TB/s memory bandwidth. Your dataset, comprising billions of high-resolution image feature vectors, totals 10 PB and is currently stored in a generic row-oriented format on a shared network file system. You've observed significant GPU idle time, indicating an I/O bottleneck.
question: How would you redesign storage and ingestion for the 10 PB image-feature dataset to maximize H100 utilization?
details:
  realistic_solution: The ideal solution involves several coordinated steps. First, re-encode the data into a columnar format like Apache Parquet or a specialized ML format like TFRecord (using `SequenceExample` for complex structures), which allows for efficient column pruning and predicate pushdown, reducing the amount of data read. Implement high-performance compression (e.g., ZSTD, LZ4) that balances compression ratio with decompression speed, potentially leveraging GPU-accelerated decompression if available (e.g., via NVIDIA RAPIDS). For storage, critical hot data should be moved to high-throughput, low-latency NVMe SSDs, ideally local to the H100 servers. Employ GPUDirect Storage to enable direct data transfer from NVMe to HBM3, bypassing CPU and host memory, thus fully utilizing the 3.35 TB/s HBM3 bandwidth. Less frequently accessed data can reside on a cheaper, high-capacity object storage tier (e.g., S3-compatible storage), with intelligent caching layers for frequently accessed subsets. Finally, implement smart pre-fetching and batching strategies to keep the H100's compute units continuously fed.
  common_mistake: |
    **The Pitfall:** Focusing solely on raw GPU compute power and neglecting the I/O subsystem.
    **The Rationale:** Candidates assume standard storage solutions can keep up with modern accelerators.
    **The Consequence:** They propose solutions that shift the bottleneck to CPU-intensive compression or fail to address the data delivery bottleneck to HBM3, causing severe GPU underutilization.
  napkin_math: |
    - Current pipeline delivers 5 GB/s. H100 needs 20 GB per 100ms batch (200 GB/s throughput).
    - A 5x compression ratio reduces required throughput to 40 GB/s.
    - To achieve 40 GB/s, roughly 8 NVMe drives (5 GB/s read each) are needed.
    - 10 PB dataset with 5x compression = 2 PB 'effective' data.
    - Iterating once per week = 2 PB / 7 days ≈ 285 TB/day ≈ 3.3 GB/s average sustained read.
    - Peak demands for random access require bursting to tens/hundreds of GB/s to prevent GPU starvation.
