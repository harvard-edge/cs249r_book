title: LLM Inference Queue Management on AMD MI300X
scenario: Your team is deploying a new large language model (LLM) inference service
  in the cloud, powered by a cluster of AMD MI300X accelerators. Each MI300X card
  boasts 192 GB HBM3 with 5.3 TB/s bandwidth and can achieve up to 2.614 PFLOPS FP16
  sparse performance. The service receives a variable workload of user queries. You've
  observed that, on average, each MI300X can process an LLM inference request in approximately
  200 milliseconds, given the model size and complexity. However, peak traffic can
  lead to request spikes. You need to design a system that maintains a target average
  end-to-end latency of 500ms for user requests, considering both the processing time
  and time spent in the queue. How would you determine the optimal queue depth for
  each MI300X to minimize latency while maximizing throughput during peak loads, and
  what capacity planning considerations would you present to your leadership?
question: How would you set per-MI300X queue depth and capacity plans for 200 ms service
  time while keeping average end-to-end latency at 500 ms under spikes?
details:
  realistic_solution: Implement dynamic queue management with adaptive batching and
    load balancing across MI300X instances. Monitor real-time arrival rates and service
    times. Use Little's Law (L = λW) to estimate current average queue length (L)
    based on arrival rate (λ) and observed average latency (W). Set a maximum acceptable
    queue depth or a target latency, and dynamically adjust batch sizes or spin up
    additional MI300X instances (auto-scaling) when queue thresholds are breached.
    Pre-provisioning based on peak load forecasts is also crucial. Utilizing AMD ROCm's
    capabilities for optimized kernel execution can also improve service rates.
  common_mistake: Overlooking the impact of queue length variability on latency or
    assuming a constant service rate. Candidates might also forget to factor in Little's
    Law's applicability to the average case and not consider worst-case scenarios,
    or fail to differentiate between average processing time and the effective service
    rate, which might be higher due to concurrent processing capabilities of the GPU.
  napkin_math: 'Given a target average end-to-end latency (W) of 500ms (0.5s) and
    an average service time (Ts) of 200ms (0.2s) per request per MI300X. The average
    time a request can spend in the queue (Wq) is W - Ts = 0.5s - 0.2s = 0.3s. The
    service rate (μ) for one MI300X is 1 request / 0.2s = 5 requests/second. To maintain
    the target average latency, the average arrival rate (λ) should ideally not exceed
    the service rate. By Little''s Law for queue length (Lq = λWq), if λ ≈ 5 requests/second
    (near saturation), then the average queue depth (Lq) would be Lq = 5 * 0.3 = 1.5
    requests. This implies that to maintain the target latency, the average queue
    should ideally hold no more than 1-2 requests. During peak loads, if the arrival
    rate significantly exceeds the service rate, the queue will grow indefinitely,
    and latency will spike. For capacity planning: if the expected peak arrival rate
    is 100 requests/second and each MI300X effectively serves 5 requests/second, you
    would need 100/5 = 20 MI300X cards to handle the load without excessive queueing,
    assuming optimal distribution and minimal overheads.'
