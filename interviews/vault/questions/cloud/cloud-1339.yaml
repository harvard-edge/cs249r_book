title: Group DRO Weight Update Calculation
scenario: You are training a ResNet-50 model to classify wildlife images. The dataset suffers from severe spurious correlations, so you partition it into 4 disjoint groups and implement Group Distributionally Robust Optimization (Group DRO). At iteration t, the group weights are uniformly initialized at q = [0.25, 0.25, 0.25, 0.25]. The current average losses for the 4 groups evaluated on the current batch are L1=0.1, L2=0.2, L3=1.5, and L4=1.2.
question: "Using exponentiated Group DRO weights with eta_q=1.0, what is the new normalized weight for Group 3?"
details:
  realistic_solution: Calculate the unnormalized weight for each group using w_g = q_g * exp(eta_q * L_g), then divide by the sum of all unnormalized weights to find the new normalized q_g. The worst-performing group's weight will sharply increase to force the optimizer to prioritize it.
  common_mistake: |
    **The Pitfall:** Updating weights linearly (q + eta_q * L) instead of multiplicatively.
    **The Rationale:** Candidates default to standard gradient descent additive updates, ignoring the exponentiated aspect of the Group DRO algorithm.
    **The Consequence:** The overall loss magnitude explodes and destabilizes the learning rate, failing to robustly penalize the worst-performing group.
  napkin_math: |
    1. **Initial weights:** q = [0.25, 0.25, 0.25, 0.25]
    2. **Unnormalized w1:** 0.25 * e^(1.0 * 0.1) ≈ 0.25 * 1.105 = 0.276
    3. **Unnormalized w2:** 0.25 * e^(1.0 * 0.2) ≈ 0.25 * 1.221 = 0.305
    4. **Unnormalized w3:** 0.25 * e^(1.0 * 1.5) ≈ 0.25 * 4.481 = 1.120
    5. **Unnormalized w4:** 0.25 * e^(1.0 * 1.2) ≈ 0.25 * 3.320 = 0.830
    6. **Sum of w:** 0.276 + 0.305 + 1.120 + 0.830 = 2.531
    7. **New q3:** 1.120 / 2.531 = **0.442** (weight increases from 25% to 44.2%).
