title: AllReduce Algorithm Selection in NCCL
scenario: NCCL auto-selects between ring, tree, and recursive halving-doubling algorithms based on message size and GPU count. You need to manually specify the optimal algorithm on a 2048-MI300X cluster with 8-rail 400Gbps networking for (a) 64KB control parameters, (b) 256MB per-layer gradient, (c) 4GB full-model gradient.
question: "Which AllReduce algorithm should you choose for 64KB, 256MB, and 4GB gradients on 2048 MI300X GPUs, and why under LogP?"
details:
  realistic_solution: 'LogP model: T = L + o + (steps ֳ— g ֳ— D/B), where L = network latency (5־¼s for RoCE), o = software overhead (2־¼s for NCCL kernel), g = gap between messages. (a) 64KB: Recursive halving-doubling. Steps = 2logג‚‚(2048) = 22. T = 22 ֳ— (5+2)־¼s + 22/2048 ֳ— 64KB/50GB/s = 154־¼s + 0.014־¼s = 154־¼s. Ring would be: 2ֳ—2047ֳ—7־¼s + 2ֳ—2047/2048 ֳ— 64KB/50GB/s = 28.7ms. Halving-doubling is 186ֳ— faster. (b) 256MB: Tree (double binary tree). Steps = 2logג‚‚(2048) = 22 for tree. T = 22ֳ—7־¼s + 2ֳ—11/2048 ֳ— 256MB ֳ— 2/50GB/s = 154־¼s + 55־¼s = 209־¼s per tree level (simplified). Ring: 2ֳ—2047ֳ—7־¼s + 2ֳ—2047/2048 ֳ— 256MB/50GB/s = 28.7ms + 10.2ms = 38.9ms. Tree with multi-rail (8 rails): effective bandwidth 400GB/s. T_tree ג‰ˆ 22 ֳ— 7־¼s + 22/2048 ֳ— 256MB/400GB/s = 154־¼s + 6.9־¼s ג‰ˆ 161־¼s. Tree wins. (c) 4GB: Ring with chunking. At 4GB, bandwidth term dominates. Ring: 2ֳ—2047/2048 ֳ— 4GB / 400GB/s = 20ms. Tree: bandwidth penalty (~2ֳ—) = 40ms. Ring wins for large messages. NCCL crossover point: typically ~1MB for ring-to-tree transition at N>256.'
  common_mistake: |
    **The Pitfall:** Always choosing the Ring algorithm because it is bandwidth-optimal.
    **The Rationale:** Neglecting the O(N) latency term that dominates for small messages at large scale.
    **The Consequence:** Massive performance degradation for small control parameters across thousands of GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2048 GPUs.
    - At 2048 GPUs, Ring latency overhead = 2 * 2047 * 7־¼s = 28.7 ms.
    - Tree latency overhead = 2 * 11 * 7־¼s = 154 ־¼s.

    **Calculations:**
    - Latency advantage = 28.7 ms / 154 ־¼s = 186x.

    **Conclusion & Interpretation:**
    - **Result: 186x latency advantage (Network Topologies)**. Tree has a significant latency advantage, meaning Ring only wins when the bandwidth term exceeds 28.5 ms (messages > ~5.7 GB).
