title: AllReduce Algorithm Selection in NCCL
scenario: 'NCCL auto-selects between ring, tree, and recursive halving-doubling algorithms
  based on message size and GPU count. For a 2048-MI300X cluster with 8-rail 400Gbps
  networking, manually specify the optimal algorithm for each of these gradient sizes:
  (a) 64KB control parameters, (b) 256MB per-layer gradient, (c) 4GB full-model gradient.
  Justify each choice with the LogP model.'
question: Which AllReduce algorithm should you choose for 64KB, 256MB, and 4GB gradients
  on 2048 MI300X GPUs, and why under LogP?
details:
  realistic_solution: 'LogP model: T = L + o + (steps × g × D/B), where L = network
    latency (5μs for RoCE), o = software overhead (2μs for NCCL kernel), g = gap between
    messages. (a) 64KB: Recursive halving-doubling. Steps = 2log₂(2048) = 22. T =
    22 × (5+2)μs + 22/2048 × 64KB/50GB/s = 154μs + 0.014μs = 154μs. Ring would be:
    2×2047×7μs + 2×2047/2048 × 64KB/50GB/s = 28.7ms. Halving-doubling is 186× faster.
    (b) 256MB: Tree (double binary tree). Steps = 2log₂(2048) = 22 for tree. T = 22×7μs
    + 2×11/2048 × 256MB × 2/50GB/s = 154μs + 55μs = 209μs per tree level (simplified).
    Ring: 2×2047×7μs + 2×2047/2048 × 256MB/50GB/s = 28.7ms + 10.2ms = 38.9ms. Tree
    with multi-rail (8 rails): effective bandwidth 400GB/s. T_tree ≈ 22 × 7μs + 22/2048
    × 256MB/400GB/s = 154μs + 6.9μs ≈ 161μs. Tree wins. (c) 4GB: Ring with chunking.
    At 4GB, bandwidth term dominates. Ring: 2×2047/2048 × 4GB / 400GB/s = 20ms. Tree:
    bandwidth penalty (~2×) = 40ms. Ring wins for large messages. NCCL crossover point:
    typically ~1MB for ring-to-tree transition at N>256.'
  common_mistake: Always choosing ring because it has optimal bandwidth. At 2048 GPUs,
    ring's O(N) latency term (2×2047 steps × α per step) dominates for small messages.
    The LogP model makes this explicit by separating latency (L), overhead (o), gap
    (g), and number of processors (P).
  napkin_math: 'At 2048 GPUs, ring latency overhead = 2 × 2047 × 7μs = 28.7ms (fixed
    cost regardless of message size). Tree latency = 2 × 11 × 7μs = 154μs. The 186×
    latency advantage of tree means ring only wins when bandwidth term exceeds 28.5ms,
    i.e., message > 28.5ms × 400GB/s / 2 = 5.7GB. Below 5.7GB: tree. Above: ring.'
