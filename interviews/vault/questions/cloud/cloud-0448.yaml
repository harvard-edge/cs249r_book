title: The Satellite Imagery Scaling Trap
scenario: 'You are a Staff ML Engineer designing a new flagship multi-modal model that must process high-resolution
  satellite imagery (4096x4096 pixels). For the vision backbone, your team is debating between two architectures
  with similar parameter counts: a state-of-the-art ConvNet (like ConvNeXt) and a standard Vision Transformer
  (ViT). Based on their computational scaling properties, you must apply your knowledge to diagnose which
  architecture is fundamentally better suited for this high-resolution inference task and solve for the
  scaling difference.'
details:
  realistic_solution: The Vision Transformer (ViT) is a fundamentally poor choice for this task. Its core
    self-attention mechanism has a computational complexity that scales quadratically with the number
    of input patches (the sequence length). In contrast, a ConvNet's compute scales roughly linearly with
    the number of pixels. As resolution increases, the number of patches explodes, leading to a catastrophic
    increase in FLOPs for the ViT that the ConvNet completely avoids due to its local inductive bias.
  common_mistake: Engineers often extrapolate performance from standard, low-resolution benchmarks like
    ImageNet (224x224), where ViTs are competitive. They fail to account for how the architectural scaling
    laws diverge dramatically at high resolutions, leading them to choose a model that is computationally
    infeasible in production.
  napkin_math: With 4096x4096 resolution and 16x16 patches, sequence length N = (4096/16)^2 = 256^2 =
    65,536. ViT self-attention scales O(N^2), so compute is proportional to 65,536^2 = 4.29 billion interactions
    per head per layer. ConvNets scale O(H*W) linearly with pixels (16.7 million).
  options:
  - The ViT, as it is a more modern architecture that generally outperforms ConvNets, indicating superior
    feature learning capabilities.
  - Both are comparable; since they have a similar number of parameters, their inference FLOPs and serving
    cost will be roughly the same.
  - The ConvNet, because the ViT's attention mechanism scales quadratically with the number of patches,
    leading to an intractable explosion in compute at high resolutions.
  - The ConvNet, because it will have higher arithmetic intensity and better saturate the GPU's memory
    bandwidth compared to the ViT.
  correct_index: 2
