title: The Satellite Imagery Scaling Trap
scenario: You are designing a new flagship multi-modal model that must process high-resolution satellite imagery (4096x4096 pixels). Your team is debating between a state-of-the-art ConvNet and a standard Vision Transformer (ViT) with similar parameter counts.
question: For 4096x4096 satellite imagery, should you choose a ConvNet or a standard ViT, and how large is the scaling gap?
details:
  realistic_solution: The Vision Transformer (ViT) is a fundamentally poor choice for this task. Its core self-attention mechanism has a computational complexity that scales quadratically with the number of input patches (the sequence length). In contrast, a ConvNet's compute scales roughly linearly with the number of pixels. As resolution increases, the number of patches explodes, leading to a catastrophic increase in FLOPs for the ViT that the ConvNet completely avoids due to its local inductive bias.
  common_mistake: |
    **The Pitfall:** Extrapolating performance directly from standard, low-resolution benchmarks like ImageNet (224x224).
    **The Rationale:** Candidates see ViTs performing well at low resolutions and fail to account for their divergent, quadratic architectural scaling laws at extreme resolutions.
    **The Consequence:** Selecting a model architecture that leads to an intractable explosion in compute, rendering it infeasible in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution: 4096x4096 pixels.
       - ViT patch size: 16x16.
    2. **Calculations:**
       - Sequence length N = (4096/16)^2 = 65,536.
       - ViT self-attention scales O(N^2), proportional to 65,536^2 = 4.29 billion interactions per head per layer.
       - ConvNets scale linearly with pixels = 16.7 million.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Explosion.** ViTs suffer a massive, intractable compute explosion at this resolution compared to ConvNets.
  options:
  - The ViT, as it is a more modern architecture that generally outperforms ConvNets, indicating superior feature learning capabilities.
  - Both are comparable; since they have a similar number of parameters, their inference FLOPs and serving cost will be roughly the same.
  - The ConvNet, because the ViT's attention mechanism scales quadratically with the number of patches, leading to an intractable explosion in compute at high resolutions.
  - The ConvNet, because it will have higher arithmetic intensity and better saturate the GPU's memory bandwidth compared to the ViT.
  correct_index: 2
