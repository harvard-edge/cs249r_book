title: Evaluating SDC Mitigations in ZeRO-3 Training
scenario: 'You are managing the training of a 70B parameter LLM on 1,024 A100 (80GB) GPUs using ZeRO-3.
  You notice occasional irrecoverable loss spikes that corrupt the model state, forcing frequent rollbacks.
  You''ve isolated this to Silent Data Corruptions (SDCs) from a few Byzantine GPUs producing incorrect
  math without crashing. You must evaluate three mitigation designs: 1) Software-level cryptographic gradient
  checksumming, 2) Statistical anomaly detection on gradient norms (thresholding), and 3) N-Modular Redundancy
  (NMR) for the forward pass. Justify the most viable approach considering the A100''s 2TB/s HBM bandwidth
  and a strict step iteration time budget of 250ms.'
question: "Which SDC mitigation—cryptographic checksums, gradient-norm anomaly detection, or NMR—best fits the 250ms ZeRO-3 step budget, and why?"
details:
  realistic_solution: Implement statistical anomaly detection (e.g., L2 norm tracking of gradients) immediately
    before the Reduce-Scatter phase in ZeRO-3. Computing the L2 norm of 500MB of gradients at 2 TB/s memory
    bandwidth takes only 0.25ms — negligible (0.1%) compared to the 250ms iteration budget. This catches
    Byzantine GPU output before it pollutes the global gradient shard, with minimal overhead.
  common_mistake: Assuming cryptographic checksums on gradients will catch ALU computation errors (SDCs)
    rather than just transmission errors, or suggesting redundant execution which cuts throughput by 50%
    (wasting 512 of 1024 A100s).
  napkin_math: Redundant execution cuts throughput by 50% (effectively wasting 512 A100s). Checksumming
    500MB of gradients via CPU takes ~100ms, blowing up the 250ms iteration budget. In contrast, GPU L2
    norm calculation on 500MB at 2TB/s takes 500MB / 2TB/s = 0.25ms (negligible overhead, exactly 0.1%
    of the 250ms iteration time).
