title: The Checkpoint Tiering Strategy
scenario: You are designing the checkpoint system for a 100K-GPU training run of a 1 trillion parameter model. A full checkpoint is ~18 TB. The cluster has three storage tiers. Local NVMe (6 GB/s per node, 3.84 TB each), a Lustre parallel filesystem (2 TB/s aggregate), and S3-compatible object storage (100 GB/s aggregate). Using Young-Daly, your optimal checkpoint interval is 12 minutes.
question: "How would you design a tiered checkpoint strategy for the 100K-GPU run with 18 TB checkpoints that keeps GPU idle time under 10 seconds?"
details:
  realistic_solution: 'Use a three-phase tiered checkpoint pipeline: Phase 1 (synchronous, <2 seconds): Each GPU writes its local shard to host DRAM (memcpy). With FSDP, each GPU''s shard is ~180 MB (18 TB / 100K GPUs). A GPU-to-host memcpy at 32 GB/s takes ~6ms. This is the only phase that blocks training. Phase 2 (asynchronous, ~30 seconds): A background thread on each node flushes the DRAM buffer to local NVMe. 180 MB at 6 GB/s = 30ms per GPU, but multiple GPUs per node share the NVMe, so ~240ms per 8-GPU node. Phase 3 (asynchronous, ~3 minutes): A background daemon aggregates per-node NVMe checkpoints and streams them to Lustre, then to S3 for durability. This runs entirely in the background while training continues. GPU idle time is only Phase 1: ~2 seconds (including synchronization barriers). The key insight: only the DRAM copy must be synchronous. Everything else is pipelined behind the next training step.'
  common_mistake: |
    **The Pitfall:** Trying to write the full 18 TB synchronously to Lustre every 12 minutes.
    **The Rationale:** Lustre is the standard shared filesystem, and synchronous writes are conceptually simpler to implement.
    **The Consequence:** Writing to Lustre at 2 TB/s takes 9 seconds (barely under budget with no margin for jitter) and saturates the filesystem, blocking data loading for other jobs and causing cluster-wide stalls.
  napkin_math: |
    - **Per-GPU Shard:** 18 TB / 100,000 GPUs = 180 MB per GPU.
    - **Phase 1 (Sync GPU -> DRAM):** 180 MB / 32 GB/s (PCIe/memcpy) = 5.6ms + barrier sync ≈ 2 seconds. (Training is blocked).
    - **Phase 2 (Async DRAM -> NVMe):** 180 MB * 8 GPUs/node / 6 GB/s ≈ 240ms.
    - **Phase 3 (Async NVMe -> Lustre):** 18 TB / 2 TB/s = 9 seconds (runs in background).
    - **Conclusion:** **Training is only blocked for the ~2 seconds of Phase 1.**
