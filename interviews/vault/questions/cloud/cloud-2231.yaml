title: The Checkpoint Tiering Strategy
scenario: 'You are designing the checkpoint system for a 100K-GPU training run of a 1 trillion parameter
  model. A full checkpoint is ~18 TB. The cluster has three storage tiers: local NVMe (6 GB/s per node,
  3.84 TB each), a Lustre parallel filesystem (2 TB/s aggregate), and S3-compatible object storage (effectively
  unlimited capacity, 100 GB/s aggregate). Using Young-Daly, your optimal checkpoint interval is 12 minutes.
  Design a tiered checkpoint strategy that keeps GPU idle time under 10 seconds per checkpoint.'
details:
  realistic_solution: 'Use a three-phase tiered checkpoint pipeline: Phase 1 (synchronous, <2 seconds):
    Each GPU writes its local shard to host DRAM (memcpy). With FSDP, each GPU''s shard is ~180 MB (18
    TB / 100K GPUs). A GPU-to-host memcpy at 32 GB/s takes ~6ms. This is the only phase that blocks training.
    Phase 2 (asynchronous, ~30 seconds): A background thread on each node flushes the DRAM buffer to local
    NVMe. 180 MB at 6 GB/s = 30ms per GPU, but multiple GPUs per node share the NVMe, so ~240ms per 8-GPU
    node. Phase 3 (asynchronous, ~3 minutes): A background daemon aggregates per-node NVMe checkpoints
    and streams them to Lustre, then to S3 for durability. This runs entirely in the background while
    training continues. GPU idle time is only Phase 1: ~2 seconds (including synchronization barriers).
    The key insight: only the DRAM copy must be synchronous. Everything else is pipelined behind the next
    training step.'
  common_mistake: Trying to write the full 18 TB synchronously to Lustre every 12 minutes. At 2 TB/s,
    that is 9 seconds of synchronous I/O — barely under budget, with no margin for jitter. And it saturates
    the filesystem for the entire cluster, blocking data loading for other jobs.
  napkin_math: 'Per-GPU shard: $18\text{ TB} / 100{,}000 = 180\text{ MB}$. Phase 1 (GPU→DRAM): $180\text{
    MB} / 32\text{ GB/s} = 5.6\text{ms}$ + barrier sync $\approx 2\text{s}$. Phase 2 (DRAM→NVMe, async):
    $180\text{ MB} \times 8\text{ GPUs/node} / 6\text{ GB/s} = 240\text{ms}$. Phase 3 (NVMe→Lustre, async):
    $18\text{ TB} / 2\text{ TB/s} = 9\text{s}$ — fits within the 12-min interval. Training blocked: $\approx
    2$s. Overhead: $2/720 = 0.28\%$.'
