title: Sequence Parallelism in Megatron-LM
scenario: Megatron-LM introduced sequence parallelism alongside tensor parallelism. LayerNorm and Dropout
  are not parallelized by standard TP and their activations are replicated across all TP ranks. For a
  70B model with seq_len=8192, batch=4, hidden=8192, TP=8 on H100 GPUs, quantify the activation memory
  waste from replication and explain how sequence parallelism fixes it.
details:
  realistic_solution: 'Without sequence parallelism, LayerNorm and Dropout activations of shape [batch,
    seq, hidden] = [4, 8192, 8192] are replicated on all 8 GPUs. Each copy is 4 × 8192 × 8192 × 2B = 512
    MB per layer. With 80 layers, that is 80 × 512 MB = 40 GB of replicated activations per GPU — wasted
    because each GPU holds identical copies. Sequence parallelism splits the sequence dimension across
    TP ranks for these operations. Each GPU processes seq_len/TP = 1024 tokens for LayerNorm/Dropout,
    reducing activation memory to 512/8 = 64 MB per layer, saving 87.5%. The key insight: between the
    column-parallel and row-parallel layers, activations are already partitioned. Sequence parallelism
    replaces the AllGather/ReduceScatter with communication that serves double duty — redistributing for
    TP while partitioning for LayerNorm.'
  common_mistake: Thinking sequence parallelism splits the model weights along the sequence dimension.
    It only splits the activations for non-TP operations (LayerNorm, Dropout), keeping TP for the GEMM
    operations unchanged.
  napkin_math: 'Replicated activation per layer: 4 × 8192 × 8192 × 2B = 512 MB. With SP: 512/8 = 64 MB.
    Savings over 80 layers: (512-64) × 80 = 35.8 GB per GPU.'
