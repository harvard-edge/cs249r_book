title: H100 Throughput Drop at Constant Power Limit
scenario: "A cloud instance features an H100 GPU. When running a sustained compute-bound GEMM kernel, telemetry shows the GPU initially achieving ~950 TFLOPS. After 2 minutes, the throughput drops to ~800 TFLOPS, and the GPU clock speed decreases. However, the power draw remains pegged at the 700W limit the entire time."
question: "Why do the clock speed and GEMM throughput drop after 2 minutes even though power draw remains at the 700W limit?"
details:
  realistic_solution: "As the GPU heats up under sustained load, the silicon temperature rises, which significantly increases static power dissipation (leakage current). Because the total power is strictly capped at 700W, the increased leakage power leaves less power available for dynamic switching. To remain within the 700W envelope while dissipating more power as leakage, the GPU's control loop must lower the voltage and clock frequency, directly reducing the FP16 throughput."
  common_mistake: |
    **The Pitfall:** Assuming the GPU is reducing its total power draw (power throttling).
    **The Rationale:** The prompt explicitly states it remains at the 700W limit, but engineers conflate frequency throttling with total power reduction.
    **The Consequence:** Failing to understand the interplay between silicon temperature, leakage current, and fixed power envelopes.
  napkin_math: |
    *   **Initial State (40°C):** 700W Total = 650W Dynamic + 50W Leakage (Yields 950 TFLOPS).
    *   **Hot State (80°C):** Leakage current non-linearly increases to 150W.
    *   **Available Dynamic Power:** 700W - 150W = 550W.
    *   **Throughput Scaling:** 950 TFLOPS × (550W / 650W) ≈ 803.8 TFLOPS.
    *   **Result:** **Increased leakage at higher temps steals the power budget from dynamic switching, matching the drop to ~800 TFLOPS.**
