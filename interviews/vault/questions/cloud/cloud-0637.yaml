title: 'The GGUF Quantization Ladder'
scenario: 'You are deploying Llama-3 70B on a single RTX 4090 (24 GB VRAM) using llama.cpp.'
question: 'For Llama-3 70B on a 24 GB RTX 4090, how do Q4_K_M, Q5_K_M, and Q8_0 trade off size, throughput, quality, and fit?'
details:
  realistic_solution: 'GGUF quantization uses mixed-precision: important layers (attention) get higher precision, less important layers (FFN) get lower. The "K" variants use k-quant methods that minimize perplexity loss. You must check: (1) does it fit in VRAM (model + KV-cache + overhead), (2) what''s the tokens/sec at your target context length, and (3) is the perplexity acceptable for your task.'
  common_mistake: |
    **The Pitfall:** Assuming Q4 is always the best choice because it's the smallest and fastest.
    **The Rationale:** Believing that 4-bit quantization has no meaningful quality degradation for production use cases.
    **The Consequence:** Deploying a model that technically fits but has measurable quality degradation on reasoning tasks, while ignoring that Q8_0 doesn't fit at all.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3 70B (FP16) = 140 GB.
    - RTX 4090 VRAM = 24 GB.

    **Calculations:**
    - Q4_K_M (~4.5 bits/param): 70B * 4.5/8 = 39.4 GB. Requires ~15 GB CPU offloading.
    - Q5_K_M (~5.5 bits/param): 70B * 5.5/8 = 48.1 GB. Heavier CPU offloading required.
    - Q8_0 (~8 bits/param): 70B * 8/8 = 70 GB. Impossible on consumer hardware.

    **Conclusion & Interpretation:**
    - **Result: 39.4 GB footprint (Memory-Capacity-Bound)**. Q4_K_M is the only viable option for interactive use on a single 4090, though it still requires significant system RAM.
