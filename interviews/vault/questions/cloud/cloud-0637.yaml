title: The GGUF Quantization Ladder
scenario: You're deploying Llama-3 70B on a single RTX 4090 (24 GB VRAM) using llama.cpp. You need to
  choose between Q4_K_M, Q5_K_M, and Q8_0 quantization. Walk me through the model size, throughput, and
  quality trade-offs for each — and tell me which ones actually fit.
details:
  realistic_solution: 'GGUF quantization uses mixed-precision: important layers (attention) get higher
    precision, less important layers (FFN) get lower. The "K" variants use k-quant methods that minimize
    perplexity loss. You must check: (1) does it fit in VRAM (model + KV-cache + overhead), (2) what''s
    the tokens/sec at your target context length, and (3) is the perplexity acceptable for your task.'
  common_mistake: '"Q4 is always the best choice because it''s the smallest and fastest." Q4_K_M fits
    in 24 GB but has measurable quality degradation on reasoning tasks. Q8_0 doesn''t fit at all. The
    right choice depends on the use case.'
  napkin_math: 'Llama-3 70B (FP16 = 140 GB): | **Q4_K_M (~4.5 bits/param):** 70B × 4.5/8 = **39.4 GB**.
    Doesn''t fit in 24 GB VRAM alone, but with GPU offloading (24 GB GPU + 16 GB in RAM): ~20 tokens/sec
    decode. Perplexity: +0.25 vs FP16 (5.2 → 5.45). Usable for chat, weak on math. | **Q5_K_M (~5.5 bits/param):**
    70B × 5.5/8 = **48.1 GB**. Requires heavy CPU offloading. ~12 tokens/sec with partial offload. Perplexity:
    +0.12 vs FP16 (5.2 → 5.32). Better quality, slower. | **Q8_0 (~8 bits/param):** 70B × 8/8 = **70 GB**.
    Doesn''t fit even with offloading on a consumer machine. Need 2× 4090 or a single A100-80GB. ~15 tokens/sec
    on A100. Perplexity: +0.02 vs FP16 (near-lossless). | **For a single 4090:** Q4_K_M is the only viable
    option for interactive use. Q5_K_M works if you accept ~12 tok/s. Q8_0 is physically impossible. |
    **Reality check:** Even Q4_K_M at 39.4 GB needs ~15 GB offloaded to CPU RAM, and KV-cache at 2K context
    adds ~2 GB. You''re running at the edge of what''s possible.'
