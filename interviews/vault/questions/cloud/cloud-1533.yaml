title: 'MMD Drift Detection Compute Constraint'
scenario: 'You manage a real-time recommendation system where item embeddings (D=512) are monitored for distribution shift. You use the unbiased Maximum Mean Discrepancy (MMD) with an RBF kernel between a golden reference set (N=20,000) and an hourly live batch (M=20,000). Your MMD monitoring job runs on a CPU sidecar limited to a compute budget of 100 GFLOPs per run. Each RBF kernel evaluation requires approximately 1,500 FLOPs.'
question: 'How much compute does naive quadratic MMD need for N=M=20,000, does it fit 100 GFLOPs, and what N=M stays within budget?'
details:
  realistic_solution: 'Calculate the naive cost at 2.4 TFLOPs, which vastly exceeds the 100 GFLOPs budget. To respect the limit, aggressively subsample the reference and live sets to N=M=4,000, or switch to the O(N) linear-time MMD estimator.'
  common_mistake: |
    **The Pitfall:** Forgetting the O((N+M)²) quadratic complexity of the standard MMD estimator.
    **The Rationale:** Incorrectly assuming linear scaling for drift detection metrics.
    **The Consequence:** Deploying drift detection jobs that heavily throttle or crash the monitoring sidecar due to extreme compute requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total samples = N + M = 40,000.
    - RBF cost = 1,500 FLOPs.
    - Budget = 100 GFLOPs.

    **Calculations:**
    - Naive quadratic kernel evaluations = (40,000)^2 = 1.6 * 10^9 pairs.
    - Total FLOPs = 1.6 * 10^9 * 1,500 = 2.4 * 10^12 FLOPs = 2.4 TFLOPs.
    - Budget check: 2.4 TFLOPs is 24x over the 100 GFLOPs budget.
    - Max sample size: (2 * N_max)^2 * 1,500 = 100 * 10^9. 4 * N_max^2 = 66.6 million -> N_max^2 = 16.66 million. N_max = 4082.

    **Conclusion & Interpretation:**
    - **Result: 2.4 TFLOPs (Compute-Bound)**. Naive MMD exceeds the 100 GFLOPs budget; subsampling to N=M=4,082 fits the constraint.
