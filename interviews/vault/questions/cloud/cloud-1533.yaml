title: MMD Drift Detection Compute Constraint
scenario: You manage a real-time recommendation system where item embeddings (D=512) are monitored for
  distribution shift. You use the unbiased Maximum Mean Discrepancy (MMD) with an RBF kernel between a
  golden reference set (N=20,000) and an hourly live batch (M=20,000). Your MMD monitoring job runs on
  a CPU sidecar limited to a compute budget of 100 GFLOPs per run. Each RBF kernel evaluation requires
  approximately 1,500 FLOPs. Calculate the total compute required for the naive quadratic MMD estimator,
  determine if it fits the budget, and calculate the maximum sample size (N=M) that strictly satisfies
  the constraint.
details:
  realistic_solution: Calculate the naive cost at 2.4 TFLOPs, which vastly exceeds the 100 GFLOPs budget.
    To respect the limit, aggressively subsample the reference and live sets to N=M=4,000, or switch to
    the O(N) linear-time MMD estimator.
  common_mistake: Forgetting the O((N+M)²) quadratic complexity of the standard MMD estimator, incorrectly
    assuming linear scaling, and deploying drift detection jobs that heavily throttle or crash the monitoring
    sidecar.
  napkin_math: '1. Total samples = N + M = 40,000.

    2. Naive quadratic kernel evaluations = (40,000)^2 = 1.6 x 10^9 pairs.

    3. Total FLOPs = 1.6 x 10^9 * 1,500 = 2.4 x 10^12 FLOPs = 2.4 TFLOPs.

    4. Budget check: 2.4 TFLOPs is 24x over the 100 GFLOPs budget.

    5. Max sample size: (2 * N_max)^2 * 1,500 = 100 x 10^9.

    6. 4 * N_max^2 = 66.6 million -> N_max^2 = 16.66 million -> N_max ≈ 4,082.'
