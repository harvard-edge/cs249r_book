title: H100 Inference Service P99 Latency with Stragglers
scenario: You are designing a real-time ML inference service for a critical application using a cluster of NVIDIA H100 GPUs. Your service has a strict P99 latency SLA of 100ms. Due to factors like transient network issues, OS scheduler contention, or garbage collection, individual H100s occasionally experience tail latency spikes, causing 1% of requests to take 500ms+ instead of the typical 50ms.
question: "How would you design your system to effectively monitor, mitigate, and predictably meet the P99 latency SLA?"
details:
  realistic_solution: A robust solution involves implementing client-side hedged requests. A request is sent to a primary GPU, and a 'backup' request is sent to a second GPU if the primary doesn't respond within a specific timeout (e.g., P90 latency). Smart load balancing that considers per-GPU latency and granular monitoring of P99 per instance is also required.
  common_mistake: |
    **The Pitfall:** Focusing only on average latency (P50) or suggesting general scaling.
    **The Rationale:** Candidates misinterpret tail latency as a capacity issue rather than an inherent distributed systems probability issue.
    **The Consequence:** Adding more capacity does nothing to prevent transient stragglers, and the P99 SLA continues to be violated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal latency: 50 ms. SLA: < 100 ms P99.
       - Straggler probability: 1% (0.01) takes > 500 ms.
       - Mitigation: Hedged requests (send to 2 independent GPUs).
    2. **Calculations:**
       - Probability GPU A is a straggler: 0.01.
       - Probability GPU B is a straggler: 0.01.
       - Joint probability both fail simultaneously: 0.01 * 0.01 = 0.0001 (0.01%).
       - Success probability (under 50 ms): 99.99%.
    3. **Conclusion & Interpretation:**
       - **Result: Tail-Latency Bound. Hedged requests geometrically reduce straggler probability, ensuring 99.99% of requests complete within 50 ms.**
