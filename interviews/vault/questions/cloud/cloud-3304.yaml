title: H100 Inference Service P99 Latency with Stragglers
scenario: You are designing a real-time ML inference service for a critical application
  using a cluster of NVIDIA H100 GPUs (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s
  memory bandwidth, 700W TDP). Your service has a strict P99 latency SLA of 100ms.
  Due to factors like transient network issues, OS scheduler contention, or garbage
  collection, individual H100s occasionally experience tail latency spikes, causing
  1% of requests to take 500ms+ instead of the typical 50ms. How would you design
  your system to effectively monitor, mitigate, and predictably meet the P99 latency
  SLA, specifically leveraging techniques like straggler mitigation and hedged requests?
question: How would you design your system to effectively monitor, mitigate, and predictably
  meet the P99 latency SLA, specifically leveraging techniques like straggler mitigation
  and hedged requests?
details:
  realistic_solution: 'A robust solution would involve: 1. Granular monitoring of
    latency metrics (P99, P999) per GPU/instance. 2. Implementing client-side hedged
    requests, where a request is sent to a primary H100 and a ''backup'' request is
    sent to a second H100 if the primary doesn''t respond within a specific timeout
    (e.g., P90 latency). 3. Smart load balancing that considers per-GPU latency. 4.
    Potentially using dedicated ''fast lane'' H100 instances or smaller batch sizes
    for requests exceeding a certain threshold. 5. Aggressive request timeouts at
    various layers of the stack.'
  common_mistake: Candidates might focus only on average latency (P50) rather than
    tail latencies (P99/P999), or suggest general scaling without concrete mitigation
    strategies for the specific straggler problem. They might also overlook the practical
    implications of hedged requests, such as increased resource utilization or the
    need for careful timeout management.
  napkin_math: If your service has a typical latency of 50ms and 1% of requests are
    stragglers taking 500ms on a single H100, what is the theoretical maximum P99
    latency if you implement hedged requests, sending to two independent H100s simultaneously?
    (Assume straggler events on different H100s are independent. The probability of
    both requests being stragglers is 0.01 * 0.01 = 0.0001 or 0.01%, meaning 99.99%
    of requests will avoid the 500ms latency, effectively bringing your P99 closer
    to the 50ms baseline, significantly below the 100ms SLA).
