title: Spot Preemption Batch Adjustment
scenario: You are training a 5B parameter LLM on AWS using EC2 P4d instances (A100 40GB GPUs). Your global
  batch size is strictly fixed at 2048 to maintain the current learning rate schedule and convergence
  behavior. You are initially training on 64 GPUs with a per-GPU micro-batch size of 32, which exactly
  maximizes the 40GB VRAM limit. A spot interruption suddenly reclaims 32 GPUs, leaving you with 32 active
  GPUs. How do you adjust your data loading and training loop parameters to resume training without altering
  the mathematical optimization dynamics?
question: "How do you adjust your data loading and training loop parameters to resume training without altering the mathematical optimization dynamics?"
details:
  realistic_solution: Keep the per-GPU micro-batch size at 32 to respect the memory limit, but configure
    the training loop to use 2 gradient accumulation steps. The 32 remaining GPUs will process two micro-batches
    sequentially, accumulating gradients before performing the all-reduce synchronization and optimizer
    step.
  common_mistake: Candidates often suggest increasing the per-GPU batch size to 64 to compensate, which
    instantly causes a CUDA Out Of Memory (OOM) error. Alternatively, they suggest halving the global
    batch size to 1024 and scaling the learning rate, which violates the requirement to preserve the exact
    optimization dynamics.
  napkin_math: "Initial State: 64 GPUs * 32 micro-batch * 1 accum_step = 2048 global batch size. \nInterrupted\
    \ State: 32 GPUs * 32 micro-batch * X accum_steps = 2048. \nSolving for X: X = 2048 / 1024 = 2 gradient\
    \ accumulation steps."
