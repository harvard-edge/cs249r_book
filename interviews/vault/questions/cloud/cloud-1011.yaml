title: Spot Preemption Batch Adjustment
scenario: You are training a 5B parameter LLM on 64 GPUs. Your global batch size is strictly fixed at 2048. You use a per-GPU micro-batch size of 32, which exactly maximizes the 40GB VRAM limit. A spot interruption suddenly reclaims 32 GPUs, leaving you with 32 active GPUs.
question: How do you adjust your data loading and training loop parameters to resume training without altering the mathematical optimization dynamics?
details:
  realistic_solution: Keep the per-GPU micro-batch size at 32 to respect the memory limit, but configure the training loop to use 2 gradient accumulation steps. The 32 remaining GPUs will process two micro-batches sequentially, accumulating gradients before performing the all-reduce synchronization and optimizer step.
  common_mistake: |
    **The Pitfall:** Increasing the per-GPU batch size or halving the global batch size.
    **The Rationale:** Candidates try to maintain total throughput by doubling the local batch size (causing an immediate Out-Of-Memory error) or change the global batch size (which alters convergence dynamics).
    **The Consequence:** The training job either crashes immediately or requires recalibrating the learning rate schedule, invalidating previous training progress.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64 GPUs initially, 32 micro-batch, global batch 2048.
       - Interrupted state: 32 active GPUs.
    2. **Calculations:**
       - Initial State: 64 GPUs * 32 micro-batch * 1 accum_step = 2048 global batch size.
       - Interrupted State: 32 GPUs * 32 micro-batch (max VRAM) * X accum_steps = 2048.
       - Solve for X: 32 * 32 * X = 2048.
       - Result: X = 2048 / 1024 = 2.
    3. **Conclusion & Interpretation:**
       - **By setting gradient accumulation steps to 2, the global batch size remains exactly 2048 without exceeding VRAM limits.**
       - **Result: Memory-Bound**
