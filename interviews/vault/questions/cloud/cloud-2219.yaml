title: The Power Density Ceiling
scenario: Your datacenter has 10 MW total power capacity. You have 2,000 H100 GPUs (700W TDP each) plus
  associated CPUs, networking, and cooling. During a large training run, the GPUs hit sustained peak power.
  The datacenter trips a breaker, shutting down an entire power distribution unit (PDU) and killing 25%
  of your cluster. The facilities team says you can never run all 2,000 GPUs at max TDP simultaneously.
  How does the scheduler need to account for power as a schedulable resource, and what is the maximum
  number of GPUs you can realistically schedule at peak?
details:
  realistic_solution: 'Power must become a first-class schedulable resource, like GPUs and memory. The
    scheduler needs a power budget per rack, per PDU, and per datacenter. Step 1: Calculate true power
    budget. 10 MW total, with PUE (Power Usage Effectiveness) of 1.3 = 10/1.3 = 7.7 MW for IT equipment.
    Networking, storage, CPUs consume ~1.5 MW. Remaining for GPUs: ~6.2 MW. Step 2: Power-aware scheduling.
    Each job declares or the scheduler estimates its GPU power draw profile. Training at peak: ~700W/GPU.
    Inference at average: ~300W/GPU. Mixed workloads can pack more GPUs under the same power envelope.
    Step 3: Implement DVFS-based power capping — cap GPUs to 500W when the power budget is tight, trading
    10-15% throughput for 30% power reduction. This is the ''power oversubscription'' strategy used by
    hyperscalers.'
  common_mistake: Treating power as infinite or assuming GPUs always draw TDP. In reality, power is a
    hard physical constraint that the scheduler must manage alongside GPU count, memory, and network.
  napkin_math: 'Available GPU power: 6.2 MW. At 700W TDP per H100: 6.2 MW / 700W = 8,857 — but you only
    have 2,000 GPUs. Headroom: 6.2MW / 2000 = 3.1 kW/GPU? No — the 10 MW is total with PUE. Real GPU power
    budget: 6.2 MW. 2000 × 700W = 1.4 MW for GPUs at peak. That fits! But the PDU trip suggests the power
    is distributed: each PDU might serve 500 GPUs = 350 kW, while the PDU breaker is rated at 300 kW.
    500 × 700W = 350 kW > 300 kW breaker. Solution: cap at 428 GPUs per PDU at peak (300kW / 700W), or
    power-cap to 600W (500 × 600W = 300 kW). Total schedulable at peak without capping: 4 PDUs × 428 =
    1,712 GPUs (86% of fleet).'
