title: The Power Density Ceiling
scenario: Your datacenter has 10 MW total power capacity. You have 2,000 H100 GPUs (700W TDP each) plus associated CPUs, networking, and cooling. During a large training run, the GPUs hit sustained peak power. The datacenter trips a breaker, shutting down an entire power distribution unit (PDU) and killing 25% of your cluster. The facilities team says you can never run all 2,000 GPUs at max TDP simultaneously.
question: "How does the scheduler need to account for power as a schedulable resource, and what is the maximum number of GPUs you can realistically schedule at peak?"
details:
  realistic_solution: 'Power must become a first-class schedulable resource, like GPUs and memory. The scheduler needs a power budget per rack, per PDU, and per datacenter. Step 1: Calculate true power budget. 10 MW total, with PUE (Power Usage Effectiveness) of 1.3 = 10/1.3 = 7.7 MW for IT equipment. Networking, storage, CPUs consume ~1.5 MW. Remaining for GPUs: ~6.2 MW. Step 2: Power-aware scheduling. Each job declares or the scheduler estimates its GPU power draw profile. Training at peak: ~700W/GPU. Inference at average: ~300W/GPU. Mixed workloads can pack more GPUs under the same power envelope. Step 3: Implement DVFS-based power capping — cap GPUs to 500W when the power budget is tight, trading 10-15% throughput for 30% power reduction. This is the ''power oversubscription'' strategy used by hyperscalers.'
  common_mistake: |
    **The Pitfall:** Treating power as infinite or assuming GPUs always draw TDP.
    **The Rationale:** Software engineers often abstract away physical infrastructure constraints.
    **The Consequence:** Unpredictable datacenter outages and tripped breakers when multiple peak workloads align.
  napkin_math: |
    - Total power = 10 MW. PUE = 1.3. IT power = 10 / 1.3 = 7.7 MW.
    - Networking/CPU = 1.5 MW. Available GPU power = 6.2 MW.
    - Max GPUs at 700W: 6.2 MW / 700W = **8,857 GPUs** (plenty of room for 2,000 GPUs cluster-wide).
    - Total draw of 2000 GPUs = 1.4 MW.
    - **However, PDU constraints apply:** Each PDU breaker is rated at 300 kW.
    - If 500 GPUs are on one PDU: 500 * 700W = 350 kW, which trips the 300 kW breaker.
    - Solution: cap at 428 GPUs per PDU at peak (300kW / 700W), or power-cap to 600W (500 * 600W = 300 kW).
    - Total schedulable at peak without capping: 4 PDUs * 428 = **1,712 GPUs** (86% of fleet).
