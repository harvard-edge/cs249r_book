title: Diagnosing P99 Spikes in LLM Fleets
scenario: You are managing a fleet of 64 H100 (80GB) GPUs serving a Llama-3-70B model using continuous batching. The fleet uses a standard round-robin Layer 7 load balancer. During peak load of 1,000 requests/sec, the average GPU SM utilization sits at only 60%, but P99 time-to-first-token (TTFT) spikes drastically from 200ms to over 3 seconds. Network bandwidth is under 30% capacity and there are no thermal throttling events.
question: Why does P99 TTFT exceed 3s at only 60% GPU utilization under round-robin, and what routing signal should the load balancer use?
details:
  realistic_solution: Analyze the queue depth and active context lengths per replica. The root cause is load imbalance and head-of-line blocking caused by routing heavy (long-context) requests to the same nodes. Replace round-robin with a token-aware load balancer (e.g., Least Outstanding Tokens or Least KV Cache Usage) that routes based on the active compute and memory pressure of each worker.
  common_mistake: |
    **The Pitfall:** Blaming transient network congestion or suggesting cluster scale-out to lower average utilization.
    **The Rationale:** Round-robin load balancing is entirely agnostic to the highly variable compute cost (e.g., input context length) of individual LLM requests.
    **The Consequence:** Scaling out wastes massive capital on new GPUs without fixing the underlying head-of-line blocking that causes the P99 spikes.
  napkin_math: |
    - Fleet Load: 1000 RPS / 64 GPUs = ~15.6 RPS per GPU.
    - Request Variance: 95% light (128 tokens = 10ms TTFT), 5% heavy (8K tokens = 200ms TTFT).
    - Worst-case queueing: If one GPU randomly receives three 8K requests consecutively, the 3rd request waits 400ms in queue + 200ms compute = 600ms TTFT.
    - **The massive variance in token compute times directly causes head-of-line blocking under round-robin. Replacing it with a Token-Aware load balancer resolves this despite 60% average utilization.**
