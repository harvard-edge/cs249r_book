title: Diagnosing P99 Spikes in LLM Fleets
scenario: You are managing a fleet of 64 H100 (80GB) GPUs serving a Llama-3-70B model using continuous
  batching. The fleet uses a standard round-robin Layer 7 load balancer. During peak load of 1,000 requests/sec,
  the average GPU SM utilization sits at only 60%, but P99 time-to-first-token (TTFT) spikes drastically
  from 200ms to over 3 seconds. Network bandwidth is under 30% capacity and there are no thermal throttling
  events. Diagnose the root cause of this tail latency degradation.
question: "Why does P99 TTFT exceed 3s at only 60% GPU utilization under round-robin, and what routing signal should the load balancer use?"
details:
  realistic_solution: Analyze the queue depth and active context lengths per replica. The root cause is
    load imbalance and head-of-line blocking caused by routing heavy (long-context) requests to the same
    nodes. Replace round-robin with a token-aware load balancer (e.g., Least Outstanding Tokens or Least
    KV Cache Usage) that routes based on the active compute and memory pressure of each worker.
  common_mistake: Candidates often blame transient network congestion or suggest scaling out the cluster
    to lower overall utilization, failing to recognize that round-robin load balancing is agnostic to
    the highly variable compute cost (e.g., input context length) of LLM requests.
  napkin_math: Under round-robin at 1000 RPS across 64 GPUs, each gets ~15.6 RPS. If 5% of traffic is
    heavy (e.g., 8K tokens taking 200ms TTFT) and 95% is light (128 tokens taking 10ms), the expected
    queue time varies wildly. If one GPU randomly receives three 8K requests consecutively, the 3rd request
    waits 400ms in queue plus 200ms compute (600ms TTFT), while another GPU processes light requests in
    10ms and idles. This variance directly causes P99 spikes despite 60% average utilization.
