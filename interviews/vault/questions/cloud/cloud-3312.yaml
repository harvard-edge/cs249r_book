title: NVIDIA H100 Inference Queue Depth and Little's Law
scenario: An ML inference service is deployed on a single NVIDIA H100 GPU experiencing variable request arrival rates. You are tasked with determining the optimal queue depth and capacity to maintain an average inference latency of 50ms.
question: How would you use Little's Law to choose queue depth and capacity for a single H100 while keeping average inference latency at 50 ms?
details:
  realistic_solution: The solution involves using Little's Law (L = λW) where L is the average number of items in the system (queue + service), λ is the average arrival rate, and W is the average time an item spends in the system (latency). For a target latency of 50ms, one would need to estimate the average service time of an inference request on the H100 (W_service). Then, by controlling the queue depth, we can manage W_queue. Capacity planning involves ensuring that the H100's effective service rate (μ) is greater than or equal to the peak arrival rate (λ). The optimal queue depth is then determined to balance throughput and latency, typically aiming for W_queue to be a small fraction of W_service. For example, if W_service is 30ms, we have 20ms budgeted for queuing. The 'napkin math' below can be applied to derive L (average queue length) from λ and W_queue.
  common_mistake: |
    **The Pitfall:** Focusing only on raw TFLOPS or memory bandwidth while ignoring software/hardware queueing delays.
    **The Rationale:** Candidates fail to apply Little's Law to account for the variability of arrival rates and time spent in the queue.
    **The Consequence:** Under-provisioning (high latency due to long queues) or over-provisioning (low utilization, wasted resources).
  napkin_math: |
    - Little's Law: L = λ * W (Average Items in System = Average Arrival Rate * Average Time in System).
    - Assume average service time (W_service) for a single inference on H100 = 30 ms.
    - Target end-to-end latency (W) = 50 ms.
    - Maximum allowable queuing time (W_queue) = 50 ms - 30 ms = 20 ms (0.020 s).
    - Assume peak arrival rate (λ) = 100 requests/s.
    - Average queue length (L_queue) = 100 requests/s * 0.020 s = 2 requests.
    - **To maintain the 50ms latency target at 100 RPS, the queue depth should be bounded to average 2 requests.**
