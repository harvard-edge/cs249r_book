title: Constant Folding Dense Normalization
scenario: 'You are deploying a DLRM-style recommendation model to Triton Inference Server on an NVIDIA
  L4 GPU (300 GB/s bandwidth). The ONNX graph contains a dense feature normalization subgraph processing
  1 million FP32 features per request: `out = (x - mean) / sqrt(var + eps)`. The `mean`, `var`, and `eps`
  are static dataset statistics. Evaluate the quantitative impact of applying a Constant Folding compiler
  pass to this subgraph.'
details:
  realistic_solution: Constant folding pre-computes `scale = 1/sqrt(var+eps)` and `shift = -mean*scale`
    at compile time, transforming the graph into a single Fused Multiply-Add (FMA) operation (`x * scale
    + shift`). On memory-bound GPUs, this eliminates multiple HBM roundtrips for intermediate tensors.
  common_mistake: Assuming the primary benefit is saving ALU compute cycles (FLOPs) for the square root
    and division, rather than recognizing the critical reduction in HBM memory bandwidth and intermediate
    tensor materialization.
  napkin_math: '1M FP32 features = 4MB. Unoptimized (assuming unfused sequential ops): 4 operations (add,
    sqrt, div, sub) dictate 4 HBM read/write roundtrips = 4 * (4MB read + 4MB write) = 32MB of traffic.
    Constant folded (FMA): 1 read (X), 1 write (Out) = 8MB traffic. Savings = 24MB per inference. On an
    L4 GPU (300 GB/s), saving 24MB cuts ~80 microseconds of purely memory-bound latency per request.'
