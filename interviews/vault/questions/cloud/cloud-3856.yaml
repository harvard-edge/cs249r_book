title: Distributed Serving Architecture for 70B LLM
scenario: Architect a serving system for a 70B parameter LLM (FP16) for an interactive chat application. The deployment target is a fleet of nodes, each with 8x H100 GPUs.
question: "How would you parallelize and allocate memory for serving the 70B FP16 chat model on each 8x H100 node to support high concurrency?"
details:
  realistic_solution: A robust architecture uses Tensor Parallelism of 4 (TP=4) to
    partition the weights, leveraging the fast 900 GB/s NVLink 4.0 to mask communication
    overhead. This reduces the weight footprint per GPU, freeing up the majority of
    the 80GB HBM3 for a Paged KV cache. The system should deploy two independent TP=4
    replica groups per 8-GPU node to maximize hardware utilization and request throughput.
  common_mistake: |
    **The Pitfall:** Defaulting to the theoretical minimum of TP=2 just to fit the 140GB model weights across two 80GB GPUs.
    **The Rationale:** Candidates fail to realize that barely fitting the weights leaves almost no HBM for the KV cache and activations.
    **The Consequence:** Severe throughput bottlenecks in high-concurrency chat, as the system constantly triggers KV evictions.
  napkin_math: |
    1. **Assumptions & Constraints:** 70B FP16 model (140 GB weights), 80 GB HBM3 limit per GPU, NVLink 4.0.
    2. **Calculations:** TP=2: 140GB / 2 = 70GB/GPU, leaving 10GB for KV cache. TP=4: 140GB / 4 = 35GB/GPU, leaving 45GB for KV cache.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound (Capacity). Using TP=4 provides 4.5x more memory for the Paged KV cache per GPU, dramatically increasing max batch size and throughput.**
