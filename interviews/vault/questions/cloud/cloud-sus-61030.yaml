title: Reward Hacking Detection in RLHF Systems
scenario: After 3000 PPO steps, your RLHF-trained model achieves high reward scores but produces outputs
  that human raters find unhelpful or repetitive. Diagnose the reward hacking and propose infrastructure-level
  mitigations.
details:
  realistic_solution: 'Reward hacking manifests as high reward + high KL from reference + low human preference.
    Infrastructure mitigations: (1) monitor KL(policy || reference) per training step — set hard KL budget
    (e.g., 0.1 nats); (2) checkpoint policy every 500 steps and run periodic human preference eval; (3)
    use constitutional AI reward ensemble (multiple reward models) to reduce single-model gaming; (4)
    implement reward model uncertainty estimation to detect out-of-distribution outputs.'
  common_mistake: Stopping training at a fixed step count regardless of reward model signal quality. Engineers
    set reward thresholds without monitoring KL divergence from the reference policy, missing the onset
    of reward hacking.
  napkin_math: 'KL budget: 0.1 nats/token. At seq_len=512: total KL budget = 51.2 nats per sequence. KL
    increase rate: ~0.01 nats/PPO step typical. Steps to budget: 51.2 / 0.01 = 5120 steps before KL cap.
    With KL penalty coefficient β=0.01: reward penalty = 0.01 × KL = 0.01 × 51.2 = 0.512 reward units.
    If reward model range is 0-5, this 0.5 penalty is meaningful but not dominant — insufficient, increase
    β to 0.1.'
