title: Cloud Transient Failures L3 0
scenario: Your 1024-GPU cluster has a per-GPU transient failure rate of 1 event per 500 GPU-hours. Training
  takes 30 days. Calculate the expected number of transient failures and the probability of completing
  training without any.
details:
  realistic_solution: 'Total GPU-hours: 1024 GPUs × 30 days × 24 hours = 737,280 GPU-hours. Expected failures:
    737,280 / 500 = 1,474.6 transient events. Probability of zero failures: P(0) = e^(-λ) where λ = 1474.6
    → P(0) = e^(-1474.6) ≈ 0 (effectively impossible). This means transient failures are guaranteed at
    scale. You must design for them: gradient clipping to bound NaN propagation, periodic validation checks,
    and checkpoint-and-rollback when anomalies are detected.'
  common_mistake: Treating transient failures like hard failures and restarting the entire job. Transient
    failures should be handled with lightweight mitigations like gradient clipping or step rollback, not
    full restarts.
  napkin_math: 'GPU-hours: 1024 × 30 × 24 = 737,280. Rate: 1 per 500 GPU-hours. Expected events: 737,280/500
    ≈ 1,475. P(zero failures) = e^(-1475) ≈ 0. Average: ~2 failures per hour.'
