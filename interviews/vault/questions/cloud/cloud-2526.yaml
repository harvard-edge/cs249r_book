title: Cloud Transient Failures L3 0
scenario: Your 1024-GPU cluster has a per-GPU transient failure rate of 1 event per 500 GPU-hours. Training takes 30 days.
question: How many transient failures should you expect over 30 days on 1024 GPUs, and what is the chance of zero failures?
details:
  realistic_solution: 'Total GPU-hours: 1024 GPUs * 30 days * 24 hours = 737,280 GPU-hours. Expected failures: 737,280 / 500 = 1,474.6 transient events. Probability of zero failures: P(0) = e^(-\lambda) where \lambda = 1474.6 -> P(0) = e^(-1474.6) ~ 0 (effectively impossible). This means transient failures are guaranteed at scale. You must design for them: gradient clipping to bound NaN propagation, periodic validation checks, and checkpoint-and-rollback when anomalies are detected.'
  common_mistake: |
    **The Pitfall:** Treating transient failures like hard hardware failures and triggering a full restart of the job.
    **The Rationale:** Candidates carry over assumptions from small-scale training and fail to grasp the inevitability of transient errors at the datacenter scale.
    **The Consequence:** The training job enters an infinite crash-loop and never finishes, instead of recovering via lightweight mitigations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 1024 GPUs. Duration: 30 days.
    - Failure rate: 1 per 500 GPU-hours.

    **Calculations:**
    - Total GPU-hours: 1024 * 30 * 24 = 737,280.
    - Expected failures (\lambda) = 737,280 / 500 = 1,474.6.
    - P(0 failures) = e^(-1474.6) ~ 0.

    **Conclusion & Interpretation:**
    - **Result: ~1,475 failures (Reliability-Bound)**. You will face ~1,475 failures; a zero-failure run is statistically impossible.
