title: MoE Expert Pruning for Inference Optimization
scenario: After training your 16-expert MoE model, you analyze routing statistics and find that 4 specific experts receive less than 2% of tokens each (totaling 7% of all routing assignments). These 4 experts account for 25% of the expert parameters.
question: Can you prune the 4 low-traffic experts for inference, and what memory savings and quality impact should you expect?
details:
  realistic_solution: 'Yes, expert pruning is highly effective. Since they handle only 7% of assignments (mostly as secondary experts), pruning them affects a tiny fraction of the computation. Affected tokens simply fall back to remaining experts. Reroute tokens by assigning each pruned expert''s tokens to the most similar remaining expert or by fine-tuning the router. This structured pruning drops VRAM requirements significantly with <1% quality degradation on benchmarks.'
  common_mistake: |
    **The Pitfall:** Simply deleting the experts and redistributing their routing probability uniformly.
    **The Rationale:** Engineers assume that since the traffic is low, random reassignment of the remaining 7% won't matter.
    **The Consequence:** Randomly reassigning tokens destroys the semantic routing space, degrading generation quality far more than careful cosine-similarity remapping or router fine-tuning.
  napkin_math: |
    1. 16 experts $\rightarrow$ 12 experts.
    2. Total MLP memory: $160\text{ GB} \rightarrow 120\text{ GB}$ (25% savings).
    3. Affected tokens: 7% lose their secondary expert, but retain their primary.
    4. Quality drop: ~0.5-1% on held-out benchmarks.
    5. At large batch sizes (BS=64), reading 25% fewer expert weights from HBM yields a $\sim 33\%$ throughput speedup.
    6. **Saves 40 GB of VRAM (allowing deployment on fewer GPUs) with minimal quality loss.**
