title: GPipe Bubble Overhead: The Pipeline Efficiency Tax
scenario: 'You partition a 40-layer transformer across 4 GPUs (10 layers each) using GPipe-style pipeline parallelism with 8 micro-batches.'
question: 'What pipeline bubble fraction results from partitioning 40 layers across 4 GPUs with 8 micro-batches under GPipe?'
details:
  realistic_solution: 'In GPipe, the pipeline bubble fraction = (P - 1) / (P - 1 + M) where P is the number of pipeline stages and M is the number of micro-batches. With P=4 and M=8: bubble = (4-1) / (4-1+8) = 3/11 = 27.3%. This means 27.3% of aggregate GPU-time is wasted in pipeline bubbles. Each GPU sits idle for 3 micro-batch durations during the forward pass fill and drain, and similarly during the backward pass. To reduce this, increase M or decrease P. The 1F1B schedule improves memory but does not reduce the bubble fraction itself.'
  common_mistake: |
    **The Pitfall:** Forgetting that the bubble exists in both the forward and backward passes.
    **The Rationale:** Visualizing only the forward pipeline startup and ignoring the drain/backward phases.
    **The Consequence:** Drastically underestimating the pipeline efficiency tax, leading to suboptimal micro-batch sizing.
  napkin_math: |
    - **Parameters:** Pipeline stages (P) = 4, Micro-batches (M) = 8.
    - **Bubble Fraction Formula:** (P - 1) / (M + P - 1).
    - **Calculation:** (4 - 1) / (8 + 4 - 1) = 3 / 11 = 27.3%.
    - **Interpretation:** 27.3% of aggregate GPU-time is wasted in pipeline bubbles.
    - **Optimization:** To get the bubble < 10%, we need M > 9(P-1) = 27 micro-batches. With M=32, bubble = 3/35 = 8.6%.
