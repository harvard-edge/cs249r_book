title: Evaluating Accelerator Efficiency Overheads
scenario: You are designing a datacenter inference fleet for a massive-scale uniform dense matrix multiplication
  workload. A hardware vendor pitches a fleet of dual-socket 64-core x86 CPUs with AVX-512, citing a peak
  theoretical throughput of 10 TFLOPs per node at a 500W TDP. Alternatively, an ML accelerator node offers
  200 TFLOPs at a 400W TDP. Evaluate the power efficiency of both architectures. Specifically, justify
  why the CPU's realized performance per watt is structurally constrained to be orders of magnitude lower
  for this workload, detailing the architectural overheads that dominate its energy consumption.
details:
  realistic_solution: CPUs incur a massive 'generality tax'—spending up to 80-90% of their energy budget
    on instruction fetching, complex decoding, branch prediction, out-of-order execution windows, and
    maintaining cache coherence to support arbitrary, unpredictable code. For uniform, predictable neural
    network workloads, specialized accelerators use spatial architectures (like systolic arrays) and software-managed
    memory to eliminate this overhead, dedicating the vast majority of their power and silicon area directly
    to ALUs.
  common_mistake: Candidates often assume that AVX-512 vectorization allows CPUs to match accelerator
    efficiency for math-heavy workloads, ignoring that the majority of a CPU's energy budget is spent
    on control logic rather than ALUs.
  napkin_math: 'CPU Efficiency: 10 TFLOPs / 500W = 20 GFLOPs/W (peak). Accelerator Efficiency: 200 TFLOPs
    / 400W = 500 GFLOPs/W (peak). If the CPU spends 85% of its power on control logic and data movement,
    its effective compute power is only 75W, severely bottlenecking true throughput per watt compared
    to an accelerator that spends 80% of its power directly on math operations.'
