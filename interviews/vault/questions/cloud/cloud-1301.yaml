title: 'Evaluating Accelerator Efficiency Overheads'
scenario: 'You are designing a datacenter inference fleet for a uniform dense matrix multiplication workload. A vendor pitches dual-socket 64-core x86 CPUs with AVX-512 at 10 TFLOPs (500W TDP). An ML accelerator node offers 200 TFLOPs (400W TDP).'
question: 'Why is the 10 TFLOP/500W AVX-512 CPU fleet far less power-efficient than the 200 TFLOP/400W accelerator for dense inference?'
details:
  realistic_solution: 'CPUs incur a generality tax—spending 80-90% of energy on instruction fetching, branch prediction, and cache coherence. Specialized accelerators use spatial architectures (systolic arrays) dedicating power directly to ALUs.'
  common_mistake: |
    **The Pitfall:** Assuming AVX-512 vectorization enables CPUs to match ML accelerator efficiency.
    **The Rationale:** Candidates focus on peak TFLOP numbers without understanding the power allocation within the silicon itself.
    **The Consequence:** They deploy a massive, power-hungry CPU fleet for dense matmuls, wasting up to 90% of the energy budget on control logic rather than ALUs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU: 10 TFLOPs / 500W.
       - Accelerator: 200 TFLOPs / 400W.
       - CPU overhead tax: ~85%.
    2. **Calculations:**
       - CPU Efficiency: 10,000 GFLOPs / 500W = 20 GFLOPs/W.
       - Accelerator Efficiency: 200,000 GFLOPs / 400W = 500 GFLOPs/W.
       - Effective CPU Compute Power: 500W × 15% = 75W actually powering ALUs.
    3. **Conclusion & Interpretation:**
       - **Result: Accelerators are 25x more efficient. CPUs are Generality-Tax-Bound.**
