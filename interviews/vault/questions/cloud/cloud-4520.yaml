title: 1F1B vs GPipe Memory Footprint Analysis
scenario: A 65B parameter model is trained on 8 H100 GPUs using pipeline parallelism.
  The team is deciding between GPipe and 1F1B (One-Forward-One-Backward) schedules.
question: Analyze the peak active memory footprint difference between GPipe and 1F1B
  scheduling.
visual:
  kind: svg
  path: cloud-4520.svg
  alt: Graph showing GPipe memory rising continuously, while 1F1B plateaus early.
  caption: 'Peak Memory: GPipe vs 1F1B active microbatches.'
details:
  realistic_solution: GPipe executes all M forward passes before starting backward
    passes, meaning it must store the intermediate activations for all M microbatches
    in GPU memory simultaneously. 1F1B interleaves forward and backward passes, actively
    freeing activations as soon as their gradient is computed. This bounds the peak
    memory footprint strictly to the number of pipeline stages (P) rather than microbatches
    (M).
  common_mistake: Believing 1F1B eliminates pipeline bubbles; it primarily targets
    activation memory reduction, not bubble fraction.
  napkin_math: If M=16 and P=8, GPipe stores 16 activations; 1F1B stores at most 8.
