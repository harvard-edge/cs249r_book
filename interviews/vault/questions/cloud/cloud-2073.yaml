title: The GPU Cluster Utilization Mystery
scenario: 'Your team has a dedicated 64-GPU cluster. The cluster monitoring dashboard shows average GPU utilization of 35% over the past month. Engineers complain about long job queue times (average 12-hour wait).'
question: 'How can GPUs be 65% idle while engineers wait 12 hours, and what scheduling changes would fix the cluster?'
details:
  realistic_solution: 'This is the classic fragmentation + allocation granularity problem. Root causes: (1) Allocation granularity: engineers request full 8-GPU nodes even when experiments need 1-2 GPUs, leaving 6 GPUs idle per allocation. (2) Temporal fragmentation: jobs are submitted in bursts (morning) and the cluster is idle at night, but average utilization counts both. (3) Checkpointing gaps: training jobs spend 10-15% of time on checkpointing and evaluation where GPUs are idle. (4) Preemption policy: non-preemptible jobs hold GPUs during I/O-bound phases. Fix: implement fine-grained GPU scheduling (fractional GPU allocation), gang scheduling for multi-GPU jobs, preemption with checkpointing for low-priority jobs, and backfill scheduling to slot small jobs into gaps.'
  common_mistake: |
    **The Pitfall:** Assuming low utilization means GPUs are sitting completely empty.
    **The Rationale:** Candidates assume that 35% utilization implies no jobs are running, failing to distinguish between allocated GPUs and effectively utilized GPUs.
    **The Consequence:** They might recommend buying fewer GPUs or blame engineers for not submitting jobs, entirely missing the scheduling fragmentation and allocation granularity issues.
  napkin_math: |
    * **Total capacity:** 64 GPUs.
    * **Effective utilization:** 35% = 22.4 GPU-equivalents of useful work.
    * **Allocation efficiency:** If an 8-GPU node is requested but only 3 are used, efficiency = 3/8 = 37.5%.
    * **Wasted cost:** 64 * 0.65 idle * $3/hr * 720 hrs/month = **~$89,856/month in wasted idle GPU time**.
