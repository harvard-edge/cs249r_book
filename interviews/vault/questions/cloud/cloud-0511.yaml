title: The FSDP vs DDP Memory Trade-off
scenario: 'Your team wants to fine-tune LLaMA-2 7B on 8 A100 80GB GPUs in a single node. An engineer proposes standard DDP (DistributedDataParallel). Another says "use FSDP, it saves memory." The first engineer argues FSDP adds communication overhead for a model that already fits in memory.'
question: 'Which engineer is correct regarding the use of DDP versus FSDP for a 7B model on 8x 80GB A100s, and what are the exact memory numbers?'
details:
  realistic_solution: 'Both engineers are partially right. DDP replicates the entire model + optimizer on every GPU, so each A100 must hold the full memory footprint. FSDP shards parameters, gradients, and optimizer states across GPUs, dramatically reducing per-GPU memory — but adds AllGather (before forward) and ReduceScatter (after backward) communication. For a 7B model on 8 GPUs within a single NVLink-connected node, the communication overhead is small (~600 GB/s bisection bandwidth). FSDP wins here because the memory savings let you use larger batch sizes or longer sequences, improving GPU utilization.'
  common_mistake: |
    **The Pitfall:** Assuming that if the parameter weights fit in memory, DDP is sufficient.
    **The Rationale:** Candidates calculate 7B parameters × 2 bytes = 14 GB, falsely concluding it easily fits in 80GB, forgetting that DDP replicates the full optimizer state on every GPU.
    **The Consequence:** The training script immediately crashes with an Out-Of-Memory (OOM) error upon initialization.
  napkin_math: |
    * DDP per GPU: 14 GB (weights) + 28 GB (FP32 master) + 28 GB (momentum) + 28 GB (variance) + 14 GB (gradients) = 112 GB.
    * **DDP requires 112 GB and will instantly OOM on an 80 GB A100.**
    * FSDP per GPU: 112 GB / 8 GPUs = 14 GB for model state.
    * **FSDP leaves 66 GB for activations and batch data, making it required, not optional.**
