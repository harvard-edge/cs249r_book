title: The FSDP vs DDP Memory Trade-off
scenario: Your team wants to fine-tune LLaMA-2 7B on 8 A100 80GB GPUs in a single node. An engineer proposes
  standard DDP (DistributedDataParallel). Another says 'use FSDP, it saves memory.' The first engineer
  argues FSDP adds communication overhead for a model that already fits in memory. Who is right, and what
  are the exact memory numbers?
details:
  realistic_solution: Both engineers are partially right. DDP replicates the entire model + optimizer
    on every GPU, so each A100 must hold the full memory footprint. FSDP shards parameters, gradients,
    and optimizer states across GPUs, dramatically reducing per-GPU memory — but adds AllGather (before
    forward) and ReduceScatter (after backward) communication. For a 7B model on 8 GPUs within a single
    NVLink-connected node, the communication overhead is small (~600 GB/s bisection bandwidth). FSDP wins
    here because the memory savings let you use larger batch sizes or longer sequences, improving GPU
    utilization.
  common_mistake: '"7B parameters × 2 bytes = 14 GB, which fits in 80 GB, so DDP is fine and FSDP is unnecessary
    overhead." This forgets that DDP replicates the full optimizer state on every GPU.'
  napkin_math: '**DDP per GPU:** 7B × 2B (FP16 weights) = 14 GB + 7B × 4B (FP32 master) = 28 GB + 7B ×
    4B (momentum) = 28 GB + 7B × 4B (variance) = 28 GB + 7B × 2B (gradients) = 14 GB = **112 GB — OOM
    on 80 GB A100!** DDP actually fails here. **FSDP per GPU:** 112 GB / 8 GPUs = **14 GB** for model
    state, leaving 66 GB for activations and batch data. FSDP isn''t optional — it''s required.'
