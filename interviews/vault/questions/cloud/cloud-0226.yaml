title: The Multi-Model Serving Platform
scenario: Your company runs 12 different LLMs in production (ranging from 1B to 70B parameters) serving
  50,000 QPS total across all models. Currently each model has its own dedicated GPU pool. The CFO says
  GPU costs are \$2M/month. Design a multi-model serving platform that cuts costs by at least 40% without
  violating per-model latency SLAs.
details:
  realistic_solution: 'A multi-model platform needs three architectural layers: (1) **Model tiering**
    — group models by size and latency SLA. Tier 1 (1B–7B, <100ms): always resident in VRAM, share GPUs
    via MPS or time-slicing. Tier 2 (13B–30B, <500ms): resident on dedicated GPUs with overflow to CPU
    offload. Tier 3 (70B, <2s): tensor-parallel across multi-GPU, dedicated but right-sized. (2) **Predictive
    autoscaling** — use traffic forecasting (not reactive scaling) to pre-warm models 10 minutes before
    demand spikes. (3) **KV-cache sharing** — for models serving similar prompts (e.g., system prompts),
    cache the KV-state of common prefixes across requests.'
  common_mistake: '"Just put all models on the same GPUs and multiplex." Naive co-location causes memory
    fragmentation and SLA violations because large models evict small ones from VRAM.'
  napkin_math: 'Current: 12 models × dedicated pools. Typical utilization: 30% (peak-provisioned). Monthly
    cost: \$2M across ~700 GPUs at ~\$4/hr average (mix of A100 and H100 instances). Optimized: Tier 1
    (8 small models, 1B–7B): consolidate from 200 GPUs to 75 (shared via MPS, 80% util). Savings: 125
    GPUs × \$4/hr × 720 = \$360k/mo. Tier 2 (3 mid models, 13B–30B): right-size from 200 GPUs to 120 with
    predictive autoscaling. Savings: 80 GPUs × \$4/hr × 720 = \$230k/mo. Tier 3 (1 large model, 70B):
    reduce from 300 GPUs to 200 with continuous batching + PagedAttention. Savings: 100 GPUs × \$4/hr
    × 720 = \$288k/mo. **Total savings: \$878k/mo (43.9%)** — exceeds the 40% target. The additional levers
    (spot instances for stateless Tier 1, INT8 quantization for Tier 2, prefix caching across all tiers)
    provide further headroom and redundancy against traffic spikes.'
