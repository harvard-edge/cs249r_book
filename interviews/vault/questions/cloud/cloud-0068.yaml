title: The On-Node Interconnect Ladder
scenario: When analyzing a performance trace on a modern multi-GPU server, you notice two distinct latency buckets for data transfers between components: one taking approximately 500 nanoseconds and another taking approximately 1,000 nanoseconds (1 microsecond).
question: Which interconnects most likely correspond to these two latencies?
details:
  realistic_solution: 'The ~500 ns latency corresponds to an NVLink 4.0 transfer. This is the specialized, high-bandwidth, low-latency interconnect for direct GPU-to-GPU communication within a server, like on an NVIDIA HGX baseboard. The ~1,000 ns (1 \u00b5s) latency corresponds to a transfer over the PCIe Gen5 bus, which connects GPUs to the CPU or to other peripherals. The 2x latency penalty for using PCIe is a critical factor in system topology design.'
  common_mistake: |
    **The Pitfall:** Assuming all on-server interconnects are equivalent or that PCIe is faster.
    **The Rationale:** Confusing general-purpose buses (PCIe) with specialized GPU-to-GPU fabric (NVLink).
    **The Consequence:** Designing sub-optimal topologies that cross the PCIe bus unnecessarily, destroying performance.
  napkin_math: |
    1. **NVLink 4.0 Latency:** ~500 ns.
    2. **PCIe Gen5 Latency:** ~1,000 ns.
    3. **Conclusion:** **PCIe incurs a ~2x latency penalty over NVLink.**
  options:
  - The ~500ns transfer is via PCIe Gen5; the ~1,000ns transfer is via NVLink 4.0.
  - The ~500ns transfer is via L2 Cache; the ~1,000ns transfer is via HBM3 memory access.
  - The ~500ns transfer is via NVLink 4.0; the ~1,000ns transfer is via PCIe Gen5.
  - The ~500ns transfer is via InfiniBand NDR; the ~1,000ns transfer is via NVMe SSD read.
  correct_index: 2
