title: 'RDMA Transport Mastery: End-to-End Network Design for 4096-H100 Training'
scenario: 'Design the complete network fabric for a 4096-GPU cluster optimized for LLM training. Budget: $50M for networking. Requirements: >90% all-reduce efficiency, <5µs intra-pod latency, fault tolerance for single switch failure.'
question: How would you design the network fabric to meet the 4096-GPU cluster's latency, all-reduce, fault-tolerance, and $50M budget requirements?
details:
  realistic_solution: 'Architecture: Rail-optimized 2-tier fat-tree with InfiniBand NDR 400Gbps. The 4096 GPUs are in 512 nodes (8 GPUs/node). Form 8 independent rails. Each rail connects 512 GPUs using a 2-tier non-blocking fat-tree of 64-port switches: 16 leaf switches (32 down, 32 up) and 8 spine switches per rail. Total: 192 switches. Intra-node: 8 GPUs via NVLink (900GB/s). Inter-node (tensor/pipeline parallel): single rail, 3 hops, <2µs. Cross-cluster (data parallel): striped across rails, 3 hops, <2µs. Fault tolerance: adaptive routing and SHARP handle switch failures, avoiding traffic collapse. Cost estimate: 4096 NICs (NDR CX7) × $3k = $12.3M. 192 switches × $100k = $19.2M. 8,192 cables/optics × $800 = $6.55M. Total $38.05M, fitting the $50M budget.'
  common_mistake: |
    **The Pitfall:** Proposing generic multi-tier datacenter networks rather than rail-optimized fabrics.
    **The Rationale:** Scaling generic 3-tier architectures works for standard cloud workloads but adds hops unnecessarily.
    **The Consequence:** Switch count inflation that completely blows the $50M budget and introduces excess cross-pod latency that ruins synchronous AllReduce phases.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4096 GPUs. Budget: $50M.
       - Switch cost: $100k. NIC cost: $3k.
    2. **Calculations:**
       - Rail-optimized 2-tier fat-tree: 8 independent rails.
       - 16 leaf + 8 spine = 24 switches per rail × 8 rails = 192 switches.
       - Cost: 4096 NICs × $3k ($12.3M) + 192 switches × $100k ($19.2M) + cables ($6.55M) = $38.05M.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** A rail-optimized 2-tier network successfully limits hop count to <2µs, achieves high AllReduce bandwidth via NVLink striping, and stays well under the $50M budget.
