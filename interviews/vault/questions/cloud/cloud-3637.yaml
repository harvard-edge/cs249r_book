title: 'RDMA Transport Mastery: End-to-End Network Design for 4096-H100 Training'
scenario: 'Design the complete network fabric for a 4096-H100 cluster optimized for
  LLM training. Budget: $50M for networking. Requirements: >90% all-reduce efficiency,
  <5μs intra-pod latency, fault tolerance for single switch failure with <1% throughput
  impact, support for both data-parallel and tensor-parallel communication patterns.'
question: How would you design the network fabric to meet the 4096-H100 cluster’s
  latency, all-reduce, fault-tolerance, and $50M budget requirements?
details:
  realistic_solution: 'Architecture: Rail-optimized 2-tier fat-tree with InfiniBand NDR 400Gbps. The 4096 GPUs are in 512 nodes (8 GPUs/node). Form 8 independent rails. Each rail connects 512 GPUs using a 2-tier non-blocking fat-tree of 64-port switches: 16 leaf switches (32 down, 32 up) and 8 spine switches per rail. Total: 192 switches. Intra-node: 8 H100s via NVLink (900GB/s). Inter-node (tensor/pipeline parallel): single rail, 3 hops, <2µs. Cross-cluster (data parallel): striped across rails, 3 hops, <2µs. Fault tolerance: adaptive routing and SHARP handle switch failures, avoiding traffic collapse. Cost estimate: 4096 NICs (NDR CX7) × $3k = $12.3M. 192 switches × $100k = $19.2M. 8,192 cables/optics × $800 = $6.55M. Total $38.05M, fitting the $50M budget.'
  common_mistake: 'Assuming 4096 GPUs require a 3-tier fat-tree without using a rail-optimized design, leading to massive switch count inflation that blows the budget. A rail-optimized 2-tier network per rail avoids this.'
  napkin_math: '4096 H100s. NVLink intra-node: 8 GPUs at 900GB/s. IB NDR 400Gbps=50GB/s per port. Fat-tree bisection BW: 4096 GPUs × 50GB/s / 2 (bisection) = 102TB/s. AllReduce for 175B params (350GB BF16 gradients): per GPU: 2×(4095/4096)×350GB/50GB/s=14s (!). Need multiple NICs per node: 8×400Gbps/node → 50GB/s×8=400GB/s → 2×(4095/4096)×350GB/400GB/s=1.75s AllReduce. Gradient compression to 35GB: 0.175s. Target: <1s with full NDR and compression.'
