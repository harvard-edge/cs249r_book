title: Speculative Decoding for Fill-in-the-Middle Tasks
scenario: Your code completion system uses fill-in-the-middle (FIM) where the model generates tokens conditioned on both prefix and suffix. Standard speculative decoding assumes left-to-right generation.
question: How does fill-in-the-middle generation affect 7B draft acceptance for a 70B target, and how should speculation be modified?
details:
  realistic_solution: 'In FIM, the model sees [PREFIX] [SUFFIX] [MIDDLE_to_generate]. The target 70B has strong bidirectional understanding: it can predict MIDDLE tokens that are coherent with both prefix and suffix. The 7B draft model, while FIM-capable, has weaker suffix conditioning — its predictions often ignore subtle suffix constraints. Empirically: alpha drops from 0.82 (standard) to 0.55 (FIM) for the 7B draft. At alpha=0.55, K=5: E[tokens] = (1-0.55^6)/0.45 = 2.16. Time: 10ms + 21ms = 31ms for 2.16 tokens = 14.4ms/tok vs 21ms auto. Only 1.46x speedup — marginal. Optimization: Use suffix-aware draft decoding: run a separate suffix-encoding pass on the draft, creating a ''suffix KV cache'' that biases draft generation. This adds 5ms overhead but increases alpha to ~0.70. At alpha=0.70: E[tok]=2.94, time=36ms, effective=12.2ms/tok, 1.72x speedup. Alternative: for FIM, use n-gram matching against the suffix as a zero-cost draft signal.'
  common_mistake: |
    **The Pitfall:** Assuming the draft model can leverage the suffix context equally as well as the target model.
    **The Rationale:** Speculative decoding usually works transparently, leading engineers to apply it identically to FIM tasks.
    **The Consequence:** The 7B draft ignores subtle suffix constraints, causing acceptance rates (alpha) to plummet and eroding the latency benefits of speculative decoding.
  napkin_math: |
    - **Standard Auto-Regressive (Left-to-Right):** alpha = 0.82. $E[tokens] = 3.86$. Time per token = 31ms / 3.86 = **8.0ms/tok (2.6x speedup)**.
    - **FIM Baseline:** alpha = 0.55. $E[tokens] = 2.16$. Time per token = 31ms / 2.16 = **14.4ms/tok (1.46x speedup)**.
    - **FIM with Suffix-Aware Draft:** Adds 5ms overhead. alpha = 0.70. $E[tokens] = 2.94$. Time per token = 36ms / 2.94 = **12.2ms/tok (1.72x speedup)**.
    - **Conclusion:** FIM significantly degrades standard draft acceptance. Suffix-aware decoding is required to restore meaningful speedups.
