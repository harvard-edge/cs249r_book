title: The Quantized Serving Accuracy Trade-off
scenario: We're serving a 70B parameter model in FP16 across two A100-80GB GPUs. The team proposes switching to INT8 to fit on a single GPU and cut costs in half. The PM assumes quantization offers free performance with no downsides.
question: Walk me through the real trade-offs — when does the accuracy drop actually matter?
details:
  realistic_solution: 'INT8 quantization halves the weight memory (140 GB → 70 GB), fitting on a single A100-80GB and eliminating tensor-parallelism communication overhead. But the throughput gain is ~1.5× because: (1) KV-cache is still in FP16, (2) activations require dequantization overhead, and (3) decode is bandwidth-bound — halving weight size only helps if weights dominate the memory traffic. The accuracy trade-off is non-uniform: perplexity increases ~0.1–0.3 points on average, but tail tasks (multi-step math, code generation, structured reasoning) degrade 3–8% on benchmarks like HumanEval and GSM8K.'
  common_mistake: |
    **The Pitfall:** Assuming INT8 quantization always doubles throughput with negligible accuracy loss.
    **The Rationale:** Halving the precision halves the weight size, leading to the naive assumption of a 2x speedup.
    **The Consequence:** Overpromising throughput gains while ignoring the devastating accuracy degradation on tail tasks (math/code), potentially ruining the product experience.
  napkin_math: |
    - **FP16 on 2× A100**: 140 GB weights. Aggregate bandwidth = 4.0 TB/s. Decode latency = 140 GB / 4.0 TB/s = 35 ms/token.
    - **INT8 on 1× A100**: 70 GB weights. Bandwidth = 2.0 TB/s. Decode latency = 70 GB / 2.0 TB/s = 35 ms/token. (Same latency, half the cost).
    - **KV-Cache Impact**: At 4K context, KV-cache ≈ 4 GB (FP16 in both cases). Total memory traffic per token: FP16 = 144 GB; INT8 = 74 GB.
    - **Effective Speedup**: 144/74 = 1.95× in bandwidth, but dequant overhead eats ~20%, netting **~1.5× real throughput**.
