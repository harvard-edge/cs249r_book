title: A/B Rollout Capacity For A New Ranker
scenario: A search team wants to A/B test a new neural ranker on 10% of traffic. The service receives 40,000 queries/s at peak. The old ranker costs 4 ms CPU time per query, while the new ranker costs 18 ms on one CPU core. Each serving pod has 16 usable cores and should run below 60% CPU. Size the extra serving capacity needed for the experiment.
question: How many additional 16-core pods are needed to run a 10% A/B test of an 18 ms/query ranker at 40,000 queries/s?
details:
  realistic_solution: Experiment traffic is 4,000 queries/s. The new ranker needs 4,000 x 18 ms = 72 CPU-seconds per second, or 72 fully utilized cores. At 60% target utilization, required cores are 72 / 0.6 = 120 cores. With 16 usable cores per pod, the test needs 7.5 pods, so provision 8 additional pods plus rollout headroom.
  common_mistake: Sizing from average traffic or forgetting the utilization target, which leaves no room for bursts and makes the experiment look worse than it is.
  napkin_math: 10% of 40,000 = 4,000 q/s. CPU demand = 4,000 x 0.018 = 72 cores. Required at 60% = 120 cores. Pods = 120/16 = 7.5 -> 8.
