title: The Maintenance Tax
scenario: You're building a Total Cost of Ownership (TCO) model for a new AI training cluster. What is
  the industry-standard rule of thumb you should use to estimate the annual hardware maintenance costs,
  as a percentage of the initial capital expenditure (CapEx)?
question: "What is the industry-standard rule of thumb you should use to estimate the annual hardware maintenance costs, as a percentage of the initial capital expenditure (CapEx)?"
details:
  realistic_solution: The correct rule of thumb is ~5% of CapEx per year. This figure covers service contracts
    (like NVIDIA AI Enterprise), a buffer for component failures (MTTF), and the operational overhead
    of keeping the hardware running.
  common_mistake: Engineers, especially those from a software background, often dramatically underestimate
    hardware maintenance. They may forget that physical components (GPUs, NICs, PSUs, fans) fail and require
    service contracts, spare parts, and technician time. Ignoring this 'maintenance tax' leads to wildly
    optimistic TCO models and budget shortfalls.
  napkin_math: '1. Industry standard for annual maintenance is ~5% of initial CapEx.

    2. Assume a single H100 GPU costs approximately $30,000.

    3. Annual maintenance per GPU = $30,000 * 0.05 = $1,500.

    4. For a 1,000 GPU cluster ($30M CapEx), the maintenance budget would be $1.5M per year, covering
    support contracts, part replacements (MTTF buffer), and service logistics.'
  options:
  - 0.5%
  - 5%
  - 25%
  - 50%
  correct_index: 1
