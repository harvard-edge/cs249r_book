title: Evaluating Cloud Enclave Fault Injection Mitigations
scenario: 'Your cloud platform uses secure enclaves (e.g., Intel SGX) to protect proprietary ML model
  weights during inference. A vulnerability report shows an attacker on a co-located VM can use privileged
  software interfaces to induce precise voltage droops (e.g., a Plundervolt attack), causing a fault during
  AES-GCM decryption to leak the model key. You must evaluate three mitigations: 1) Disabling dynamic
  voltage and frequency scaling (DVFS) across the fleet, 2) Software-based redundant execution for crypto
  ops, or 3) Offloading key decryption to a physically isolated, network-attached HSM. Evaluate the performance,
  security, and TCO trade-offs for a high-throughput ML serving cluster.'
details:
  realistic_solution: Offloading key management to a physically isolated HSM is the optimal architectural
    choice. Disabling DVFS eliminates the undervolting vector but destroys power efficiency and peak performance,
    which is catastrophic for cloud ML ROI. Redundant execution effectively halves throughput and increases
    latency.
  common_mistake: Assuming that disabling DVFS is a simple, zero-cost configuration change, failing to
    account for the massive 20-30% drop in overall datacenter compute efficiency and power scaling.
  napkin_math: Disabling DVFS reduces peak throughput by ~20%. For a 10,000 node cluster ($10k/node),
    that equals $20M in lost compute capacity. A centralized HSM cluster costs ~$500k and handles 100k
    ops/sec. Physical isolation is 40x more cost-effective than sacrificing cluster-wide DVFS efficiency.
