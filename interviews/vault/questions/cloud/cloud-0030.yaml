title: The Continuous Batching Trade-off
scenario: You're running an LLM inference service on a single H100 GPU. Your system uses a static batching policy with a batch size of 8. The GPU takes 200ms to process one generation step for a full batch. New user requests are arriving at a steady rate of 30 per second.
question: From a user's perspective, what is the approximate Time to First Token (TTFT) if their request arrives right after a batch has been dispatched for processing?
details:
  realistic_solution: 'The total Time to First Token is the sum of the time spent waiting in the queue and the actual processing time.

    1. **Wait Time:** Since the user''s request arrives just after a batch has started, it must wait for that in-flight batch to complete its first generation step. This wait is 200ms.

    2. **Processing Time:** After waiting, the request is included in the *next* batch. The processing time for this new batch to generate its first token is also 200ms.

    Therefore, the total TTFT is the sum of these two periods.'
  common_mistake: |
    **The Pitfall:** Neglecting the queueing delay and only calculating processing time.
    **The Rationale:** Engineers often focus solely on the model's processing time for the batch.
    **The Consequence:** This leads to underestimating user-perceived latency by at least 2x.
  napkin_math: |
    1. **Wait Time:** The user's request arrives just after a batch starts, so it must wait for the current 200ms batch to complete.
    2. **Processing Time:** The new request is included in the next batch, which also takes 200ms to process.
    3. **Total TTFT:** 200ms (wait) + 200ms (process) = **400ms**.
  options:
  - 200 ms
  - 10 ms
  - 400 ms
  - 33 ms
  correct_index: 2
