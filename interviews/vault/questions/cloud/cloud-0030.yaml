title: The Continuous Batching Trade-off
scenario: An LLM inference service uses a static batching policy with a batch size of 8. The GPU takes 200ms to process one generation step for a full batch. New user requests arrive at a steady rate of 30 per second.
question: From a user's perspective, what is the approximate Time to First Token (TTFT) if their request arrives right after a batch has been dispatched for processing?
details:
  realistic_solution: 'The total Time to First Token is the sum of the time spent waiting in the queue and the actual processing time. Since the user''s request arrives just after a batch has started, it must wait for that in-flight batch to complete (200ms). The processing time for the new batch is also 200ms.'
  common_mistake: |
    **The Pitfall:** Neglecting the queueing delay and calculating only the compute processing time.
    **The Rationale:** Engineers focus purely on the GPU's execution time for a batch once it starts running.
    **The Consequence:** Underestimating the true user-perceived Time to First Token (TTFT) by at least 2x, violating latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU batch processing time: 200ms.
       - Request arrival: Immediately after a new batch begins.
    2. **Calculations:**
       - Wait time (queueing): The request must wait for the current 200ms batch to complete.
       - Processing time: The request is included in the next batch, taking 200ms to generate the first token.
       - Total TTFT = 200ms (wait) + 200ms (process) = 400ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queueing-Bound.** Total latency is dominated by static batch head-of-line blocking, resulting in a 400ms TTFT.
  options:
  - 200 ms
  - 10 ms
  - 400 ms
  - 33 ms
  correct_index: 2
