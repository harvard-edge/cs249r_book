title: 'TCO Analyze: Why Cloud GPUs May Be Cheaper Than On-Prem for Startups'
scenario: Analyze the TCO break-even point between renting H100 GPUs at $2.50/hr on AWS and purchasing
  an on-premises H100 cluster (8-GPU DGX H100 system, $400,000). Assume 3-year amortization, 40% average
  utilization, power at $0.10/kWh, and 1 FTE for maintenance at $150K/year. At what utilization does cloud
  become cheaper?
details:
  realistic_solution: Hardware purchase break-even requires ~697% of cloud-equivalent hours (meaning continuous
    operation for multiple years to amortize), not 70% utilization threshold.
  common_mistake: Comparing only hardware cost vs rental cost without including power, cooling (typically
    1.1-1.4x PUE overhead), real estate, networking, and staff costs in the on-prem TCO.
  napkin_math: 'Break-even analysis: owned hardware vs cloud. If owned cost = $X and cloud cost per unit
    = $Y, break-even utilization = X/(X + operational overhead). If cloud at $3/hr H100 and owned at $2/hr
    amortized, break-even = when owned_cost/cloud_cost ≈ 1. Actual break-even: 697% cloud hours equivalent
    to justify purchase (not 70% — 70% would be a utilization threshold, but 697% means you need to run
    the hardware >6.97× equivalent of what you''d pay in cloud to justify purchase, implying you''d need
    to run it nearly continuously for 7 years).'
