title: Diagnosing Data Efficiency and Model Collapse on NVIDIA H100
scenario: Your team is training a large language model on a cluster of H100 GPUs for a critical deployment. Despite the powerful accelerators, you observe escalating training times, diminishing returns on model quality with increased data, and unexpectedly high GPU utilization without corresponding performance gains. The model occasionally exhibits signs of catastrophic forgetting.
question: How would you diagnose and address the H100 data-efficiency issues causing diminishing returns, forgetting, and poor ICR?
details:
  realistic_solution: To diagnose and address these issues, one should first implement the Information-Compute Ratio (ICR) framework to quantify the value of new data relative to compute cost. Next, analyze data for redundancy and informational content using techniques like coreset selection or advanced data pruning, offloading this analysis from the H100s. Explore curriculum learning strategies to introduce data in an optimal order, and consider targeted synthetic data generation only for specific, identified data gaps, rather than general scaling. Implement robust monitoring for data distribution shifts and model collapse indicators during training to preemptively intervene.
  common_mistake: |
    **The Pitfall:** Blindly scaling data quantity without assessing informational value.
    **The Rationale:** Teams fall into the "data wall" trap, believing that simply feeding more data into powerful GPUs will automatically improve the model.
    **The Consequence:** Redundant data consumes valuable compute and memory bandwidth while exacerbating model collapse risks, wasting expensive H100 hours.
  napkin_math: |
    - Original dataset: 1 PB * 100 epochs = 100 PB total processed.
    - Coreset pruning (30% removal): Saves 30 PB of data processing.
    - At 100 GB/s I/O throughput, 30 PB saves ~3.5 days of compute.
    - **Result: Removing redundant data shifts the bottleneck from I/O wait to active compute, raising the effective Model FLOPs Utilization (MFU).**
