title: Diagnosing Data Efficiency and Model Collapse on NVIDIA H100
scenario: Your team is training a large language model on a cluster of NVIDIA H100
  GPUs (each with 80 GB HBM3, 989 TFLOPS FP16 dense performance, and 3.35 TB/s memory
  bandwidth) for a critical deployment. Despite leveraging these powerful accelerators,
  you observe escalating training times, diminishing returns on model quality with
  increased data, and unexpectedly high GPU utilization without corresponding performance
  gains. The model occasionally exhibits signs of catastrophic forgetting or sudden
  performance drops. Your goal is to diagnose the root cause of these symptoms related
  to data efficiency and selection, considering the computational constraints and
  capabilities of the H100.
question: How would you diagnose and address the H100 data-efficiency issues causing
  diminishing returns, forgetting, and poor ICR?
details:
  realistic_solution: To diagnose and address these issues, one should first implement
    the Information-Compute Ratio (ICR) framework to quantify the value of new data
    relative to compute cost. Next, analyze data for redundancy and informational
    content using techniques like coreset selection or advanced data pruning, offloading
    this analysis from the H100s. Explore curriculum learning strategies to introduce
    data in an optimal order, and consider targeted synthetic data generation only
    for specific, identified data gaps, rather than general scaling. Implement robust
    monitoring for data distribution shifts and model collapse indicators during training
    to preemptively intervene.
  common_mistake: A common mistake is to blindly scale data quantity without assessing
    its quality, redundancy, or informational value, leading to the 'data wall problem'.
    This results in inefficient use of the NVIDIA H100's 989 TFLOPS and 80 GB HBM3,
    as redundant data consumes valuable compute and memory bandwidth (3.35 TB/s) without
    contributing proportionally to model learning, and can exacerbate model collapse
    risks due to noisy or poorly curated samples.
  napkin_math: 'Original data: 1 PB * 100 epochs = 100 PB total data processed. Pruning 30% removes 30 PB of data processing. At an effective pipeline throughput of 100 GB/s (I/O bounded), 30 PB takes 300,000 seconds (~3.5 days) of pure compute time saved. More importantly, removing the 30% redundant data shifts the bottleneck. If the GPUs were previously stalled waiting for data (I/O bound), dropping the data volume allows the H100s to spend a higher percentage of time actively computing on the high-value 70% data, significantly raising the effective MFU (Model FLOPs Utilization) closer to the 989 TFLOPS theoretical peak.'
