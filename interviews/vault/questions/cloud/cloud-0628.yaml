title: The Embedding Table Sharding Problem
scenario: We run a recommendation model with a 1 TB embedding table sharded across 64 GPUs. Training throughput is terrible (GPUs 80% idle) but the network isn't saturated.
question: Why are the 64 GPUs 80% idle when training a 1 TB sharded embedding table if the network is not saturated?
details:
  realistic_solution: 'Embedding lookups follow a Zipf distribution. Naive hash-based sharding creates load imbalance, forming hot spots on GPUs holding popular entries. Fix: Popularity-aware sharding (replicate top 1% hot entries on all GPUs, shard the 99% cold entries).'
  common_mistake: |
    **The Pitfall:** Adding more GPUs to reduce per-GPU memory load.
    **The Rationale:** Engineers assume the table is simply too large, missing the statistical skew of real-world access patterns.
    **The Consequence:** Adding GPUs makes AllToAll communication slower without solving the underlying Zipfian hot spots.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Zipf Law: Top 1% entries = 10 GB, serve 50% of lookups.
       - AllToAll latency dominates.
    2. **Calculations:**
       - Naive AllToAll: ~5ms synchronization stall. Compute = 1ms. Total = 6ms (83% idle).
       - Popularity-aware: 50% lookups are local (0ms). Cold lookups shrink AllToAll to ~2.5ms. Total = 3.5ms.
    3. **Conclusion & Interpretation:**
       - **Result: Synchronization-Bound (Hot spots cause 83% idle time; replication reduces step time by ~40%).**
