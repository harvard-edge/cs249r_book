title: Evaluating Silent Degradation in Embedding Fleets
scenario: "Your fleet of 100 p4d.24xlarge instances serves a 768-D embedding model at 50K QPS. An upstream preprocessing bug silently strips punctuation, degrading downstream search relevance by 15% without triggering HTTP 5xx errors or latency spikes (P99 remains 45ms)."
question: "How would you evaluate the trade-offs to catch this silent degradation within 5 minutes and <2% latency overhead?"
details:
  realistic_solution: "Deploy ultra-low latency input invariants (e.g., token length distribution, character vocabulary assertions) costing <0.1ms per request, combined with offline asynchronous evaluation on a 1% stratified sample of the output stream."
  common_mistake: |
    **The Pitfall:** Proposing real-time multivariate drift detection (like MMD) on 768-D embeddings at 50K QPS.
    **The Rationale:** Assuming advanced statistical distribution tests are necessary for any ML monitoring.
    **The Consequence:** Blowing past the 0.9ms latency budget and crashing the serving fleet with monitoring overhead, while missing sparse semantic corruptions.
  napkin_math: |
    *   **Latency Budget:** 2% of 45ms = 0.9ms.
    *   **Data Scale:** 50K QPS × 768 dims × 4 bytes ≈ 153 MB/s.
    *   **Detection Cost:** O(N log N) statistical tests (MMD) on 768-D vectors easily exceed 0.9ms.
    *   **Result:** **O(1) or O(L) input token length invariant checks require < 0.1ms, easily fitting the budget.**
