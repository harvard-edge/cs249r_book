title: Evaluating Silent Degradation in Embedding Fleets
scenario: Your fleet of 100 p4d.24xlarge instances (8x A100 40GB) serves a 768-D embedding model at 50K
  QPS. An upstream preprocessing bug silently strips punctuation, degrading downstream search relevance
  by 15% without triggering HTTP 5xx errors or latency spikes (P99 remains 45ms). Evaluate the architectural
  trade-offs between implementing real-time statistical drift detection (e.g., MMD/KS tests) on the high-dimensional
  outputs, logging 100% of inputs for async evaluation, or deploying lightweight input invariant assertions
  to catch silent degradation within a 5-minute SLA and <2% latency overhead budget.
question: "How would you catch the punctuation-stripping bug within 5 minutes while staying under 2% latency overhead?"
details:
  realistic_solution: Deploy ultra-low latency input invariants (e.g., token length distribution, character
    vocabulary assertions) costing <0.1ms per request, combined with offline asynchronous evaluation on
    a 1% stratified sample of the output stream.
  common_mistake: Proposing real-time multivariate drift detection (like MMD) on 768-D embeddings at 50K
    QPS, which far exceeds the 0.9ms latency budget and is often insensitive to sparse semantic corruption.
  napkin_math: 'Latency budget: 2% of 45ms = 0.9ms. Data scale: 50K QPS * 768 dims * 4 bytes ≈ 153 MB/s
    total (1.53 MB/s per node). O(N log N) statistical tests on 768-D vectors easily exceed the 0.9ms
    budget, whereas O(1) or O(L) input token length invariant checks require < 0.1ms.'
