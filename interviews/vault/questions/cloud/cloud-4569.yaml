title: Power Capping A100 for Offline Batch
scenario: A batch processing cluster using A100s (400W peak) processes terabytes of offline video processing jobs overnight.
question: Devise a power-capping policy to maximize TOPS/Watt assuming the GPUs run memory-bound workloads.
details:
  realistic_solution: Memory-bound workloads scale poorly with core clock speed but rely heavily on HBM bandwidth. Cap the GPU power limit to roughly 60-70% (e.g., 250W) using `nvidia-smi`. This gracefully underclocks the compute cores but leaves memory bandwidth relatively unaffected, drastically improving energy efficiency.
  common_mistake: |
    **The Pitfall:** Running GPUs at 100% power for memory-bound workloads.
    **The Rationale:** Wrongly assuming that max power limit uniformly equates to max system performance.
    **The Consequence:** The GPU SMs burn massive amounts of energy waiting for memory access, ruining power efficiency with zero functional throughput gain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Peak Power: 400W.
       - Workload: Memory-bound video processing.
    2. **Calculations:**
       - Capped Power Target: 250W.
       - Power Reduction: 250W / 400W = 62.5% of peak power.
    3. **Conclusion & Interpretation:**
       - **Result: High Efficiency.** Applying a strict 250W power cap radically improves TOPS/Watt because memory bandwidth remains saturated while non-utilized core clocks are throttled.
