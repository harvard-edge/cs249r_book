title: Power Capping A100 for Offline Batch
scenario: 'A batch processing cluster using A100s (400W peak) processes terabytes of offline video processing jobs overnight.'
question: 'Devise a power-capping policy to maximize TOPS/Watt assuming the GPUs run memory-bound workloads.'
details:
  realistic_solution: 'Memory-bound workloads scale poorly with core clock speed but rely heavily on HBM bandwidth. Cap the GPU power limit to roughly 60-70% (e.g., 250W). This underclocks the compute cores but leaves memory bandwidth relatively unaffected, drastically improving energy efficiency.'
  common_mistake: |
    **The Pitfall:** Running GPUs at 100% power for memory-bound workloads.
    **The Rationale:** Assuming max power always equals max performance.
    **The Consequence:** The SMs burn massive amounts of energy waiting for memory access, ruining power efficiency with zero throughput gain.
  napkin_math: |
    - **Peak Power:** 400W.
    - **Capped Power Target:** 250W.
    - **Power Reduction:** 250W / 400W = 62.5% power.
    - **Effect:** Memory bandwidth is sustained while core clocks are reduced, vastly improving TOPS/Watt.
