title: Evaluating Declarative API Sidecar Overheads
scenario: Your team is evaluating a Declarative Deployment API to manage 500 low-traffic classification models on L4 GPUs. The API abstracts orchestration but automatically injects a networking sidecar into every pod to manage scale-to-zero and traffic splitting.
question: Does declarative scale-to-zero justify the per-pod sidecar overhead for 500 low-traffic L4 models, and what trade-off gates adoption?
details:
  realistic_solution: Quantify the sidecar overhead against the GPU savings. For 500 models with 80% idle time, declarative scale-to-zero saves 400 GPUs. The CPU RAM overhead for the remaining 100 active sidecars is trivial. The true design trade-off is whether upstream clients can tolerate the ~10-15s VRAM weight-loading cold start latency when scaling from zero.
  common_mistake: |
    **The Pitfall:** Focusing entirely on the sidecar's memory tax while ignoring cold-start latency.
    **The Rationale:** Engineers often evaluate physical resource overheads (CPU/RAM) as the primary trade-off for sidecars.
    **The Consequence:** Adopting the architecture without verifying if upstream clients can tolerate the ~10-15s VRAM weight-loading cold starts, leading to SLA violations.
  napkin_math: |
    - **Baseline Cost**: 500 static pods = 500 L4 GPUs @ ~$0.75/hr = $375/hr.
    - **Scale-to-Zero Cost**: Assuming 80% idle, 100 active pods = 100 L4 GPUs = $75/hr.
    - **Sidecar Overhead**: 100 active pods × 100MB RAM = 10GB CPU RAM (<$0.10/hr).
    - **Savings**: $375/hr - $75.10/hr ≈ **$300/hr**.
