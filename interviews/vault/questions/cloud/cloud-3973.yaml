title: Asynchronous Local SGD as an Alternative to Overlapped AllReduce
scenario: 'Instead of overlapping AllReduce with backward computation, your team proposes Local SGD: each GPU trains independently for H steps, then synchronizes with an AllReduce every H-th step. This eliminates the need for per-step AllReduce overlap entirely.'
question: "How do Local SGD at H=4 and H=16 trade communication savings against convergence penalties compared to overlapped AllReduce?"
details:
  realistic_solution: 'Local SGD analysis: (1) H=4: communicate every 4th step. Communication overhead: 1/4 of standard DDP. Each GPU uses slightly stale parameters for 3/4 of steps. Convergence impact: minimal for most models (<2% more steps needed). Total time savings: if AllReduce is 15% of step time, savings = 0.75 x 15% = 11.25%. Net with convergence penalty: 11.25% - 2% = 9.25% faster. (2) H=16: communicate every 16th step. Communication overhead: 1/16 of DDP. But replica divergence is significant — each GPU explores a different loss surface region. Convergence impact: 5-15% more steps needed. Total time savings: 0.9375 x 15% = 14%. Net: 14% - 10% = 4% faster (marginal). (3) Comparison to overlapped AllReduce: perfect overlap achieves 15% savings with 0% convergence impact. Local SGD is only better when overlap is infeasible (communication >> compute).'
  common_mistake: |
    **The Pitfall:** Treating Local SGD as a "free lunch" that eliminates communication overhead without consequences.
    **The Rationale:** Engineers focus purely on step time (throughput) and ignore the statistical efficiency (goodput) of the optimization algorithm.
    **The Consequence:** Model replicas diverge significantly between sync points, hurting convergence and requiring more total steps to reach the target loss, ultimately increasing total training time.
  napkin_math: |
    1. **Overlapped DDP Baseline:** 200ms compute + 0ms exposed comm = 200ms/step. 1000 steps = 200s.
    2. **Local SGD H=4:** 200ms compute + 30ms comm every 4th step = avg 207.5ms/step. Requires 2% more steps (1020). Total time = 207.5ms * 1020 = 211.65s.
    3. **Local SGD H=16:** Avg step is faster, but convergence penalty is 10% (1100 steps).
    4. **Conclusion:** Overlapped DDP wins by **~5.5%** because perfect overlap achieves savings with 0% convergence penalty.
