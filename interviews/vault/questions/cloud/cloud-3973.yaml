title: Asynchronous Local SGD as an Alternative to Overlapped AllReduce
scenario: 'Instead of overlapping AllReduce with backward computation, your team proposes Local SGD: each GPU trains independently for H steps, then synchronizes with an AllReduce every H-th step. This eliminates the need for per-step AllReduce overlap entirely.'
question: 'How do Local SGD at H=4 and H=16 trade communication savings against convergence penalties compared to overlapped AllReduce?'
details:
  realistic_solution: 'Perfect overlap achieves communication savings with 0% convergence impact. Local SGD H=4 saves communication overhead but requires ~2% more steps. H=16 suffers a 10% convergence penalty due to replica divergence. Overlapped AllReduce is structurally superior; Local SGD is only better when overlap is infeasible (i.e., communication vastly exceeds compute).'
  common_mistake: |
    **The Pitfall:** Treating Local SGD as a "free lunch" that eliminates communication overhead without consequences.
    **The Rationale:** Engineers focus purely on step time (throughput) and ignore the statistical efficiency (goodput) of the optimization algorithm.
    **The Consequence:** Model replicas diverge significantly between sync points, hurting convergence and requiring more total steps to reach the target loss, ultimately increasing total training time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Overlapped DDP Baseline: 200ms compute + 0ms exposed comm = 200ms/step.
       - Local SGD comm: 30ms AllReduce every H steps.
       - Convergence penalty: H=4 requires 2% more steps, H=16 requires 10% more steps.
       - Target steps: 1000.
    2. **Calculations:**
       - Overlapped DDP: 1000 steps * 200ms = 200.0s total.
       - Local SGD H=4: 200ms + (30ms/4) = 207.5ms avg/step. 1020 steps * 207.5ms = 211.65s total.
       - Local SGD H=16: 200ms + (30ms/16) = 201.875ms avg/step. 1100 steps * 201.875ms = 222.06s total.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Overlapped DDP wins by ~5.5% because perfect overlap achieves savings with 0% convergence penalty.**
