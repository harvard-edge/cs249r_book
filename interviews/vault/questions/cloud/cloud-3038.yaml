title: 'Model Size Estimation: Realize FP8 vs. FP16 Memory Comparison for 70B on H100'
scenario: 'Concretely compute and compare the H100 memory layout for a 70B LLaMA model
  in FP16 vs. FP8 (E4M3) format. Determine for each: whether it fits on a single H100
  (80GB HBM3), on 2 H100s with NVLink, on 4 H100s, and the KV-cache budget remaining
  in each configuration.'
question: How much H100 memory does a 70B LLaMA model need in FP16 vs FP8, and what
  KV-cache budget remains on 1, 2, and 4 H100s?
details:
  realistic_solution: 'FP16: 70B × 2B = 140GB. Single H100: NO. 2 H100s (160GB): fits
    with 20GB for KV. 4 H100s: 35GB per GPU, 45GB KV budget per GPU = 180GB total
    KV. FP8: 70B × 1B = 70GB + 1% scaling overhead = 70.7GB. Single H100: BARELY (70.7GB
    < 80GB). KV budget: 9.3GB (KV in FP16). At 800KB/token: 11,625 tokens (e.g., batch=11,
    seq=1024). 2 H100s FP8: 35.35GB per GPU, 44.65GB KV per GPU = 89.3GB total → 111K
    tokens.'
  common_mistake: Assuming FP8 activation quantization is as simple as FP16 without
    noting that FP8 requires scaling factors per tensor (adding ~1-2% memory overhead)
    and that KV-cache is typically kept in FP16 for stability.
  napkin_math: 'FP16 70B: 140GB. 2 H100s: 70GB/GPU ✓. KV budget: (80-70)×2=20GB. 20GB/800KB=25,000
    tokens. 4 H100s: 35GB/GPU. KV: 45GB/GPU, total 180GB → 225K tokens. FP8 70B: 70GB.
    Single H100: 10GB KV = 12,500 tokens (batch=12 seq=1024). 2 H100s: 35GB/GPU, 45GB
    KV each = 90GB → 112K tokens.'
