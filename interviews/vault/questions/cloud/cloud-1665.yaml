title: Diagnosing Carbon Footprint Spikes in Hardware Upgrades
scenario: Your team migrated a 10-day LLM training job from an older 512x A100 (400W TDP) cluster in a
  Pacific Northwest datacenter (hydro-powered, 100 gCO2/kWh, PUE 1.1) to an available 256x H100 (700W
  TDP) cluster in a Midwest region (coal-heavy, 500 gCO2/kWh, PUE 1.25). The new setup completes the training
  3x faster (3.33 days). Despite a massive reduction in total energy consumption (kWh), the automated
  environmental audit flagged a severe increase in total operational carbon. Diagnose why the emissions
  spiked and calculate the magnitude of the increase.
question: "Why did operational carbon increase after moving the 10-day A100 job to the faster H100 Midwest cluster, and by how much?"
details:
  realistic_solution: Total operational carbon is calculated as Energy * PUE * Carbon Intensity. Even
    though the H100 cluster uses significantly less base energy (14,336 kWh vs 49,152 kWh) due to faster
    execution, the 5x worse carbon intensity and slightly worse PUE in the new geographical region completely
    overwhelm the hardware efficiency gains.
  common_mistake: Focusing solely on hardware energy efficiency (FLOPs/Watt) or total energy consumption,
    failing to account for the multiplicative impact of regional carbon intensity (gCO2/kWh) and datacenter
    PUE.
  napkin_math: 'Old A100 Setup: 512 GPUs * 0.4 kW * 240 hrs = 49,152 kWh.

    Old CO2 = 49,152 kWh * 1.1 (PUE) * 0.1 kg CO2/kWh = 5,406 kg CO2.

    New H100 Setup: 256 GPUs * 0.7 kW * 80 hrs = 14,336 kWh.

    New CO2 = 14,336 kWh * 1.25 (PUE) * 0.5 kg CO2/kWh = 8,960 kg CO2.

    Result: 8,960 / 5,406 = 1.65x higher total operational carbon footprint.'
