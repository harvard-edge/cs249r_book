title: The NPU Fallback Latency Trap
scenario: You deploy an INT8 quantized MobileViT via your cloud pipeline to edge devices. Theoretical NPU latency is 10ms. Actual P99 latency is ~330ms. Profiling reveals the GeLU activation isn't supported in INT8 on the target NPU, causing a memory-copy back to the CPU for FP32 execution, then a copy back to the NPU.
question: How would you fix the ~330ms P99 latency caused by unsupported INT8 GeLU on the target NPU?
details:
  realistic_solution: This requires algorithm-hardware co-design. You must replace the GeLU activations with hardware-friendly approximations (like ReLU6 or HardSwish) that the NPU's INT8 compiler natively supports. Retrain or finetune the model in the cloud to recover the 1-2% accuracy drop. The tradeoff is a slight decrease in model capacity versus a massive, deterministic improvement in latency and power consumption by keeping the entire execution graph on the NPU.
  common_mistake: |
    **The Pitfall:** Accepting the hybrid CPU/NPU execution graph.
    **The Rationale:** Assuming that delegating unsupported ops to the CPU is an acceptable fallback without measuring PCIe transfer latency.
    **The Consequence:** The memory copy overhead across the system bus destroys real-time latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU execution time: 8 ms.
    - CPU fallback execution time (GeLU): 20 ms.
    - PCIe memory copy overhead (NPU->CPU->NPU): 300 ms.

    **Calculations:**
    - Hybrid Latency: 8 ms + 20 ms + 300 ms = 328 ms.
    - Native NPU Latency (replacing GeLU): ~10 ms.
    - Speedup: 328 ms / 10 ms = ~32.8x.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound (I/O)**. The cross-processor memory copy overhead entirely negates the NPU acceleration; keeping the graph wholly on the NPU yields a ~32x speedup.
