title: NAS vs Manual Design
scenario: Your team has 2 weeks and 1000 GPU-hours to find the best model for an edge device with a 200ms latency constraint. Options: (A) hardware-aware NAS, (B) manually adapt existing architectures, (C) use a pretrained model zoo and fine-tune.
question: With 2 weeks, 1000 GPU-hours, and a 200ms edge latency limit, which model-selection option would you choose and why?
details:
  realistic_solution: Option B (adapt existing architectures) is optimal. Proven architecture families get you 90% of NAS quality at 20% of the engineering effort. NAS setup takes too long, and pretrained models may not meet strict latency.
  common_mistake: |
    **The Pitfall:** Automatically selecting NAS because it sounds mathematically rigorous and state-of-the-art.
    **The Rationale:** Candidates ignore the massive engineering setup time and risk associated with running a custom NAS search.
    **The Consequence:** Wasting the entire 2-week budget on infrastructure setup and failing to deliver a working model.
  napkin_math: |
    - **Option A (NAS)**: 5 days setup + 200 GPU-hours search + 800 GPU-hours training. High ceiling, high risk of failure within 14 days.
    - **Option B (Adapt)**: 2 days setup + 1000 GPU-hours training/validation.
    - **Option C (Zoo)**: 1 day setup, but unlikely to meet strict latency without compression.
    - **Conclusion**: **Option B provides 90% of NAS quality with 20% of the risk, making it the only safe choice for a 2-week deadline.**
