title: A/B Test Duration Calculation
scenario: Your current model has a 3.2% click-through rate (CTR). The new model is expected to improve
  CTR by 5% relative (to 3.36%). Your site gets 100K daily impressions. At 95% confidence and 80% power,
  estimate the minimum A/B test duration.
question: "At 95% confidence and 80% power, what is the minimum A/B test duration to detect CTR improving from 3.2% to 3.36%?"
details:
  realistic_solution: 'Minimum sample size per group for a proportion test: n = (Z_α/2 + Z_β)² × (p1(1-p1)
    + p2(1-p2)) / (p2-p1)². Where p1=0.032, p2=0.0336, Z_0.025=1.96, Z_0.20=0.84. n = (1.96+0.84)² × (0.032×0.968
    + 0.0336×0.9664) / (0.0336-0.032)². n = 7.84 × (0.03098 + 0.03247) / (0.0016)² = 7.84 × 0.06345 /
    0.00000256. n = 0.4974 / 0.00000256 = 194,297 per group. Total needed: 2 × 194,297 = 388,594 impressions.
    At 100K/day: 388,594 / 100,000 = 3.89 days ≈ 4 days minimum. In practice, run for 1-2 full weeks to
    account for day-of-week effects and reduce novelty bias.'
  common_mistake: Running the A/B test for a fixed time rather than a fixed sample size. Peeking at results
    before reaching statistical significance inflates false positive rates.
  napkin_math: 'Detecting 5% relative improvement in 3.2% CTR needs ~200K samples per group. At 100K/day:
    ~4 days minimum, 7-14 days recommended.'
