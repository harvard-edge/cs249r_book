title: 'Recall: What PUE Measures and Why 1.0 Is Physically Impossible'
scenario: A new ML infrastructure engineer asks why the team targets a PUE of 1.3 rather than 1.0 for
  the H100 cluster datacenter, and whether lower is always better. They have seen hyperscaler marketing
  claiming PUE of 1.1 and wonder if that is achievable for on-premise GPU deployments.
details:
  realistic_solution: PUE = Total Facility Power / IT Equipment Power. IT equipment is the denominator,
    so PUE ≥ 1.0 always, with 1.0 meaning zero overhead — physically impossible. A PUE of 1.3 means for
    every 1 W of GPU compute, 0.3 W goes to cooling, PDUs, lighting, and UPS. Hyperscaler PUEs of 1.1–1.2
    require direct liquid cooling (cold plates on H100s), free-air economizers in cold climates, and fully
    optimized power distribution. On-premise air-cooled deployments typically achieve 1.4–1.6. Each 0.1
    improvement in PUE on a 1 MW GPU cluster saves 100 kW of overhead power — significant at scale.
  common_mistake: Believing PUE = 1.0 is achievable (it would mean zero overhead power for cooling, lighting,
    networking, and UPS); confusing PUE with energy efficiency of the compute hardware itself.
  napkin_math: '64 H100 nodes × 8 GPUs × 700 W = 358.4 kW IT load. At PUE 1.3: total facility = 358.4
    × 1.3 = 465.9 kW. At PUE 1.1: 358.4 × 1.1 = 394.2 kW. Savings: 71.7 kW × 8,760 hr/yr × $0.08/kWh =
    $50,200/yr by moving from 1.3 to 1.1 PUE on this single cluster.'
