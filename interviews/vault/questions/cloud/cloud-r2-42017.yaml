title: Tail Latency Impact of Garbage Collection
scenario: Your Python-based inference service on TPU v5e shows periodic P99 spikes every ~30 seconds,
  each lasting 50-200ms. The spikes correlate with Python garbage collection cycles. Why does GC disproportionately
  affect tail latency in ML serving, and what are your mitigation options?
question: "Why does GC disproportionately affect tail latency in ML serving, and what are your mitigation options?"
details:
  realistic_solution: 'Python''s cyclic GC (generation 2) triggers every ~700 allocations by default and
    runs stop-the-world, pausing all threads including the ones feeding data to the TPU. During a GC pause,
    the TPU starves for input and the response is delayed by the full GC duration. Mitigations: (1) Disable
    automatic GC and trigger it manually between request batches: `gc.disable()` then `gc.collect()` during
    idle periods. (2) Use `gc.set_threshold(50000, 50, 10)` to reduce GC frequency at the cost of higher
    peak memory. (3) Minimize Python object churn — use numpy/jax arrays (not Python lists) for data staging,
    pre-allocate buffers. (4) In production, use a sidecar process for GC-heavy preprocessing, keeping
    the inference process lean. Result: P99 spikes eliminated, steady-state memory increases 10-15%.'
  common_mistake: Disabling GC entirely. This causes memory leaks that eventually OOM the process. The
    right approach is to control when GC runs, not eliminate it.
  napkin_math: 'Default GC gen2: runs every ~30s, takes 50-200ms depending on object count. At 1000 req/s:
    each GC pause delays 50-200 requests. P99 without GC spikes: 25ms. P99 with: 150ms. After manual GC
    scheduling: P99 = 28ms (3ms overhead from deferred collection). Memory cost: 10-15% higher baseline
    from deferred collection.'
