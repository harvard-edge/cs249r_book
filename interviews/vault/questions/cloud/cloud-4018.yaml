title: Tail Latency Impact of PFC Storms
scenario: Your 256-A100 cluster experiences PFC storms lasting 2ms on average, occurring
  once per minute per ToR on average. Each storm pauses all 8 GPU ports on the
  affected ToR. Training uses synchronous data-parallel SGD with AllReduce. Quantify
  the impact on training throughput, considering that AllReduce is a barrier operation.
question: What is the throughput impact of 2ms PFC storms once per minute per ToR
  in this 256-A100 synchronous AllReduce job?
details:
  realistic_solution: 'With 32 ToR switches (256 GPUs / 8 per ToR), each experiencing 1 storm per minute (rate = 1/60 per sec), the probability that at least one ToR experiences a PFC storm in any given second is: 1 - (1 - 1/60)^32 ≈ 42%. Expected number of storms per minute across the cluster: 32. Each 2ms storm creates a bubble in the AllReduce barrier. If a training iteration takes 100ms, a 2ms stall is a 2% slowdown per affected iteration. With 32 storms per minute, and each storm potentially aligning with an AllReduce: 32 × 2ms = 64ms of stall per minute = 0.107% throughput loss. However, if storms are correlated (congestion cascade), multiple ToRs stall simultaneously, and impact compounds to 1-5% throughput loss.'
  common_mistake: Only accounting for the direct 2ms pause and ignoring the barrier
    effect. In synchronous training, the slowest GPU determines the iteration time,
    so a PFC storm on any one of 32 ToR switches stalls all 256 GPUs.
  napkin_math: 'P(at least one storm in a 1-second window across 32 ToRs, each with
    rate 1/60 per second) = 1 - (1 - 1/60)^32 ≈ 42%. The formula 1 - (59/60)^32 gives
    the per-second probability, not per-minute. Each storm: 2ms stall. If training
    iteration = 100ms: 2ms/100ms = 2% overhead per affected iteration. 32 storms/min
    × 2ms = 64ms wasted/min out of 60,000ms = 0.1% direct loss, but barrier amplification
    can push this to 1-5% in practice.'
