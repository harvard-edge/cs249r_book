title: 'Queueing Theory Design: Multi-Server M/M/c for Inference Cluster'
scenario: Design a multi-server inference system using M/M/c queuing (c servers in parallel) for serving
  Mistral-7B on H100s. Arrival rate λ=100 req/s, mean service time per server = 50ms. Determine the minimum
  c to achieve P99 < 200ms, and compare to the throughput and latency of a naive single-server design.
question: "In the M/M/c calculation, what is the correct value of 0.714^8 and the corrected queueing wait time?"
details:
  realistic_solution: 0.714^8 = 0.068 (not 0.044). The queueing wait time Wq should be recalculated as
    ~5.9ms with the corrected probability.
  common_mistake: 'Not recognizing that M/M/c fundamentally changes the utilization-latency curve: at
    the same total load, c servers each at ρ/c utilization have dramatically better tail latency than
    1 server at ρ.'
  napkin_math: 'M/M/c queue with c=8 servers, arrival λ=100/s, service μ=140/s (7ms each), ρ=100/(8×140)=0.0893
    per server... correction: ρ total = λ/(c×μ). For retry probability: P(retry) = 0.714 per attempt.
    P(need >8 retries) = 0.714^8 ≈ 0.068 (not 0.044 — 0.044 would be 0.714^9). Wq ≈ 5.9ms (not 3.8ms).'
