title: Evaluating Defenses for LLM Continuous Pre-training Poisoning
scenario: You are designing a defense against backdoor data poisoning for an LLM trained continuously on 50B tokens/day across 1,024 H100 GPUs. An attacker potentially controls 0.01% of the daily ingested domains. Available defenses include influence-function-based data filtering (adds 40% CPU overhead to ingestion), Differentially Private SGD (DP-SGD) during training (reduces GPU throughput by 30%), and post-training activation clustering using a trusted holdout dataset of 1B tokens.
question: Which backdoor defense should you choose considering security guarantees and compute economics?
details:
  realistic_solution: Implement post-training activation clustering using a trusted clean dataset combined with lightweight ingestion heuristics. This avoids the debilitating 30% training throughput hit of DP-SGD while successfully isolating latent backdoor representations via spectral analysis.
  common_mistake: |
    **The Pitfall:** Defaulting to DP-SGD for theoretical guarantees without calculating the massive throughput penalty at scale.
    **The Rationale:** Candidates prioritize mathematical privacy bounds over the realities of compute economics and assume standard regex filtering catches advanced semantic triggers.
    **The Consequence:** Proposing an architecture that wastes millions of dollars in compute or fails to catch sophisticated attacks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,024 GPUs at $30/hr.
       - DP-SGD reduces throughput by 30%.
       - Post-training activation clustering uses 500 GPU hours per checkpoint.
    2. **Calculations:**
       - DP-SGD compute penalty: 1,024 GPUs * $30/hr * 24 hrs * 30% penalty = $221,184/day in wasted compute.
       - Cost of activation clustering: 500 hours * $30/hr = $15,000/day.
    3. **Conclusion & Interpretation:**
       - **The post-training defense saves >$200,000/day while maintaining high mitigation efficacy against targeted poisoning.**
       - **Result: Compute-Bound**
