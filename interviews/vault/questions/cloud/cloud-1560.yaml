title: LLM Decoding on A100 Roofline
scenario: Your team is deploying a Transformer-based LLM on an NVIDIA A100 GPU. During the autoregressive decoding phase with a batch size of 1, profiling reveals that the GPU compute utilization is well under 1%.
question: What arithmetic intensity does the A100 need, how does batch-1 decoding compare, and what serving change fixes the gap?
details:
  realistic_solution: Implement continuous or dynamic batching to increase the batch size. By serving multiple requests concurrently (e.g., batch size 128), you reuse the loaded weights across multiple tokens, dramatically increasing arithmetic intensity and overcoming the memory bandwidth bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming the low utilization is due to unoptimized CUDA kernels, CPU launch overhead, or PyTorch inefficiencies.
    **The Rationale:** Candidates often default to software profiling rather than recognizing the fundamental mathematical limits of memory bandwidth vs compute on modern hardware.
    **The Consequence:** Wasting time rewriting perfectly fine kernels instead of implementing batching to solve the memory-bound nature of the workload.
  napkin_math: |
    - A100 Compute: 312 TFLOPS FP16.
    - A100 Bandwidth: 2.0 TB/s.
    - A100 Ridge Point (required intensity): 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
    - Batch-1 decode intensity: Loading a 2-byte FP16 weight produces 1 MAC (2 FLOPs) = 1 FLOP/Byte.
    - Max batch-1 performance: 1 FLOP/Byte * 2.0 TB/s = 2 TFLOPS.
    - **Conclusion: At batch 1, the GPU maxes out at 2 TFLOPS, which is only 0.64% of its 312 TFLOPS peak. Batching is strictly required.**
