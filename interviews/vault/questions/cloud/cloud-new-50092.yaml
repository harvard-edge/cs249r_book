title: 'Stragglers and Overlap: Why the Slowest GPU Determines Step Time'
scenario: In a 32-GPU DDP job, 31 GPUs complete their backward pass in 200ms, but one GPU consistently
  takes 260ms due to a thermal throttling issue. Even with perfect communication overlap, the step time
  is 260ms, not 200ms. Why does one slow GPU destroy overall performance?
question: "Why does one slow GPU destroy overall performance?"
details:
  realistic_solution: 'AllReduce is a collective: it requires participation from all ranks. If GPU 31
    produces its last gradient bucket at t=260ms, the AllReduce for that bucket completes at t=260+5ms
    = 265ms. All 32 GPUs wait. The 31 fast GPUs have 60ms of idle time each. Mitigation: (1) Detect stragglers:
    log per-GPU backward pass time and alert on >10% deviation. (2) Fix the root cause (thermal throttle:
    improve cooling, reduce power limit). (3) If the straggler is a persistent hardware issue, redistribute
    its workload or replace it. (4) Async SGD (local SGD with periodic sync) can tolerate stragglers but
    changes convergence dynamics. Total waste: 31 GPUs x 60ms = 1.86 GPU-seconds per step.'
  common_mistake: Thinking AllReduce is the only synchronization point. Even with overlapped AllReduce,
    the AllReduce cannot complete until ALL GPUs have produced their gradients. The slowest GPU delays
    the AllReduce completion, which blocks the optimizer step on all GPUs.
  napkin_math: '32 GPUs at $3/GPU-hour = $96/hour. 60ms waste per step, 3.85 steps/sec = 231ms wasted
    per second across 31 GPUs = 7.16 GPU-seconds/second wasted = 22.4% compute waste. At $96/hr: $21.5/hr
    wasted by one throttling GPU.'
