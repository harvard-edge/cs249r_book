title: Cloud Young Daly Formula L5 0
scenario: You can invest in faster checkpoint storage (reducing δ from 5 min to 1 min for $50K) or better
  hardware reliability (increasing MTBF from 4 hours to 8 hours for $100K). Training runs 30 days on 256
  GPUs at $2/GPU-hr. Which investment recovers more training efficiency?
question: "Which investment recovers more efficiency: reducing checkpoint time from 5 to 1 minute for $50K or doubling MTBF to 8 hours for $100K?"
details:
  realistic_solution: 'Baseline: δ=5 min, M=240 min. τ_opt = √(2×5×240) - 5 = √2400 - 5 = 49 - 5 = 44
    min. Efficiency: 1 - 5/49 - 22/240 = 1 - 10.2% - 9.2% = 80.6%. Option A (faster storage): δ=1 min,
    M=240 min. τ_opt = √(480) - 1 = 21.9 - 1 = 20.9 min. Efficiency: 1 - 1/21.9 - 10.5/240 = 1 - 4.6%
    - 4.4% = 91.0%. Gain: 10.4%. Option B (better reliability): δ=5 min, M=480 min. τ_opt = √(4800) -
    5 = 69.3 - 5 = 64.3 min. Efficiency: 1 - 5/69.3 - 32.2/480 = 1 - 7.2% - 6.7% = 86.1%. Gain: 5.5%.
    Option A gives 10.4% vs 5.5% efficiency gain. GPU cost: 256 × 30 × 24 × $2 = $368K. 10.4% savings
    = $38K. 5.5% = $20K. Option A ($50K) nearly pays for itself in one run; Option B ($100K) does not.'
  common_mistake: Assuming better hardware reliability always helps more than faster checkpointing. The
    Young-Daly formula shows that reducing δ has a superlinear effect because it both reduces overhead
    and enables more frequent checkpoints with less rework.
  napkin_math: 'Baseline efficiency: 80.6%. Option A (fast ckpt): 91.0% (+10.4%). Option B (reliable HW):
    86.1% (+5.5%). GPU cost: $368K. A saves $38K/run, costs $50K — ROI in 1.3 runs. B saves $20K/run,
    costs $100K — ROI in 5 runs.'
