title: Young-Daly Formula Optimization for Checkpointing
scenario: A 30-day training run on 256 GPUs ($2/GPU-hr) has baseline parameters of checkpoint save time (δ) 5 min and MTBF (M) 240 min (4 hrs). Option A invests $50K to reduce δ to 1 min. Option B invests $100K to double M to 480 min (8 hrs).
question: Which investment recovers more training efficiency, reducing checkpoint time to 1 minute for $50K, or doubling MTBF to 8 hours for $100K?
details:
  realistic_solution: |
    Baseline: δ=5 min, M=240 min. Optimal interval τ = √(2δM) - δ = √(2400) - 5 = 44 min. Efficiency = 1 - δ/(τ+δ) - (τ+δ)/(2M) = 1 - 5/49 - 49/480 = 1 - 10.2% - 10.2% = 79.6%.
    Option A (faster storage): δ=1 min, M=240 min. τ = √(480) - 1 = 20.9 min. Efficiency = 1 - 1/21.9 - 21.9/480 = 1 - 4.6% - 4.6% = 90.8%. Gain: +11.2%.
    Option B (better reliability): δ=5 min, M=480 min. τ = √(4800) - 5 = 64.3 min. Efficiency = 1 - 5/69.3 - 69.3/960 = 1 - 7.2% - 7.2% = 85.6%. Gain: +6.0%.
    Option A gives nearly double the efficiency gain of Option B. Training run cost: 256 GPUs x 720 hours x $2 = $368,640. Savings from A: 11.2% = ~$41K. Savings from B: 6.0% = ~$22K. Option A ($50K) almost pays for itself in a single run, while Option B ($100K) has a much worse ROI.
  common_mistake: |
    **The Pitfall:** Assuming that improving hardware reliability (MTBF) is always the most effective way to increase cluster uptime.
    **The Rationale:** Engineers intuitively feel that preventing failures is better than recovering from them, missing the math of the Young-Daly formula.
    **The Consequence:** The team spends a fortune ($100K) on premium hardware components but yields a significantly lower ROI than a simple $50K storage upgrade.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs, $2/GPU-hr, 30 days (720h). Compute bill = $368.6K.
    - Baseline Efficiency: δ=5, M=240. τ = √(2400)-5 = 44 min. Efficiency = 79.6%.

    **Calculations:**
    - Option A (Fast Ckpt): δ=1, M=240. τ = √(480)-1 = 20.9 min. Efficiency = 90.8% (+11.2%). Savings: ~$41K.
    - Option B (Reliable HW): δ=5, M=480. τ = √(4800)-5 = 64.3 min. Efficiency = 85.6% (+6.0%). Savings: ~$22K.

    **Conclusion & Interpretation:**
    - **Result: Option A provides +11.2% efficiency (Checkpoint-IO-Bound)**. Faster storage offers nearly double the efficiency gain at half the upfront cost.
