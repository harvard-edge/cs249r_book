title: Cloud Young Daly Formula L5 0
scenario: You can invest in faster checkpoint storage (reducing δ from 5 min to 1 min for $50K) or better
  hardware reliability (increasing MTBF from 4 hours to 8 hours for $100K). Training runs 30 days on 256
  GPUs at $2/GPU-hr. Which investment recovers more training efficiency?
question: "Which investment recovers more efficiency: reducing checkpoint time from 5 to 1 minute for $50K or doubling MTBF to 8 hours for $100K?"
details:
  realistic_solution: "Baseline: δ=5 min, M=240 min. Optimal interval τ = √(2δM) - δ = √(2400) - 5 = 44 min. Efficiency = 1 - δ/(τ+δ) - (τ+δ)/(2M) = 1 - 5/49 - 49/480 = 1 - 10.2% - 10.2% = 79.6%. Option A (faster storage): δ=1 min, M=240 min. τ = √(480) - 1 = 20.9 min. Efficiency = 1 - 1/21.9 - 21.9/480 = 1 - 4.6% - 4.6% = 90.8%. Gain: +11.2%. Option B (better reliability): δ=5 min, M=480 min. τ = √(4800) - 5 = 64.3 min. Efficiency = 1 - 5/69.3 - 69.3/960 = 1 - 7.2% - 7.2% = 85.6%. Gain: +6.0%. Option A gives nearly double the efficiency gain of Option B. Training run cost: 256 GPUs × 720 hours × $2 = $368,640. Savings from A: 11.2% = ~$41K. Savings from B: 6.0% = ~$22K. Option A ($50K) almost pays for itself in a single run, while Option B ($100K) has a much worse ROI."
  common_mistake: Assuming better hardware reliability always helps more than faster checkpointing. The
    Young-Daly formula shows that reducing δ has a superlinear effect because it both reduces overhead
    and enables more frequent checkpoints with less rework.
  napkin_math: "Baseline efficiency: 79.6%. Option A (fast ckpt): 90.8% (+11.2%). Option B (reliable HW): 85.6% (+6.0%). Total GPU compute cost: $368.6K. Option A saves ~$41K per run and costs $50K — pays for itself in 1.2 runs. Option B saves ~$22K per run and costs $100K — pays for itself in 4.5 runs. Faster storage is the better investment."
