title: 'Causal Masking in FlashAttention: Skipping Unnecessary Tiles'
scenario: In causal (autoregressive) attention, the attention matrix is lower-triangular — tokens can only attend to previous tokens. FlashAttention-2 tiles the computation into blocks.
question: How does FlashAttention-2 exploit the causal lower-triangular mask when tiling, and what FLOP savings does it get?
details:
  realistic_solution: |
    For an N x N attention matrix tiled into blocks, tiles fully above the diagonal are skipped entirely (no computation). Tiles on the diagonal require partial masking. Tiles fully below the diagonal compute normally. FlashAttention-2 skips entire tiles that are fully above the diagonal, saving both compute and memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming FlashAttention computes all tiles and applies the causal mask afterward.
    **The Rationale:** Candidates don't understand the block-level optimization that avoids computation entirely for upper-triangular blocks.
    **The Consequence:** Overestimating the required FLOPS and memory bandwidth by roughly 2x for causal models.
  napkin_math: |
    - N=8192, B=128.
    - Total tiles: (8192/128)^2 = 64^2 = 4096 tiles.
    - Diagonal tiles: 64.
    - Above diagonal (skipped): (4096 - 64) / 2 = 2016 tiles.
    - FLOP savings from skipped tiles: 2016 / 4096 = 49.2%.
    - Additional diagonal tile savings (masking during softmax): ~0.4%.
    - **Skipping upper-triangular tiles reduces total FLOPS by approximately 50%.**
