title: Sizing Cloud Shadow Deployments
scenario: Your team is setting up a shadow deployment for a new PyTorch fraud model. Production traffic is 12,000 RPS. Each instance maxes out at 400 RPS before violating latency SLAs. The shadow cluster must operate at a maximum of 75% utilization.
question: How many instances are needed to shadow 12,000 RPS at no more than 75% utilization?
details:
  realistic_solution: Provision 40 instances. First, calculate the safe operational throughput per instance by applying the 75% utilization target (400 RPS * 0.75 = 300 RPS per instance). Then divide the total production traffic by this safe throughput to find the required instances.
  common_mistake: |
    **The Pitfall:** Sizing instances based purely on peak theoretical throughput.
    **The Rationale:** Naively dividing total load by the absolute maximum capacity (12,000 / 400 = 30 instances).
    **The Consequence:** The shadow model drops requests or lags severely behind production during micro-bursts, invalidating the shadow evaluation and wasting resources.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Production traffic = 12,000 RPS.
       - Max RPS per instance = 400 RPS.
       - Target utilization = 75%.
    2. **Calculations:**
       - Safe RPS per instance = 400 × 0.75 = 300 RPS.
       - Total instances required = 12,000 / 300 = 40 instances.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** 40 instances are required to safely shadow 100% of traffic while absorbing natural micro-bursts without SLA breaches.
