title: PE Array Utilization and Roofline Analysis
scenario: You are evaluating a custom cloud AI accelerator that features a 256x256 systolic array of Processing
  Elements (PEs) clocked at 1.0 GHz. Each PE is capable of performing one BF16 Multiply-Accumulate (MAC)
  operation per clock cycle. During a matrix multiplication pass, the profiling tool reports a sustained
  throughput of 65.5 TFLOPS. The operation has an arithmetic intensity of 128 FLOPs/Byte, and the accelerator's
  High Bandwidth Memory (HBM) provides a maximum theoretical bandwidth of 512 GB/s. Calculate the array's
  theoretical peak compute (in TFLOPS), the actual PE utilization percentage, and diagnose the primary
  hardware bottleneck limiting further performance scaling.
details:
  realistic_solution: Properly account for 2 FLOPs per MAC to determine the true peak compute of 131.1
    TFLOPS, revealing the PE array is only at 50% utilization. Then, multiply the HBM bandwidth (512 GB/s)
    by the arithmetic intensity (128 FLOPs/B) to find the memory limit is exactly 65.5 TFLOPS. The workload
    is strictly memory-bound.
  common_mistake: Candidates frequently forget that a single MAC operation counts as two FLOPs (one multiply,
    one add). This leads them to incorrectly calculate the peak compute as 65.5 TFLOPS, falsely concluding
    that the PE array is running at 100% utilization and is compute-bound.
  napkin_math: '1. Peak Compute = 256 * 256 PEs * 2 FLOPs/MAC * 1.0e9 Hz = 131,072 GFLOPS = 131.07 TFLOPS

    2. PE Utilization = 65.5 TFLOPS (Measured) / 131.07 TFLOPS (Peak) = ~50%

    3. Roofline Limit = 512 GB/s (HBM) * 128 FLOPs/Byte = 65,536 GFLOPS = 65.5 TFLOPS

    Insight: 50% of the PE array''s compute capacity is stranded because the workload hits the memory
    bandwidth ceiling.'
