title: Estimating ONNX Runtime INT8 Latency
scenario: You deploy a 150M parameter BERT model on a cloud CPU instance with 50 GB/s memory bandwidth using ONNX Runtime. The FP32 model requires 600MB of memory. At batch size 1, the workload is memory-bound, taking 20ms total per request (12ms for weight loading, 8ms for compute). You enable the DNNL Execution Provider and apply ONNX Runtime's dynamic INT8 quantization.
question: What inference latency should you expect after enabling DNNL and dynamic INT8 quantization?
details:
  realistic_solution: 'Calculate the separate reductions: memory transfer time drops by 4x due to 8-bit weights, and compute time drops by roughly 2x depending on VNNI instruction efficiency. The new expected latency is 7ms.'
  common_mistake: |
    **The Pitfall:** Applying a flat 4x speedup assuming compute and memory scale perfectly together.
    **The Rationale:** It's tempting to see "8-bit vs 32-bit" and divide the total latency by 4, ignoring the separate scaling factors for memory bandwidth versus VNNI vector instructions.
    **The Consequence:** Performance projections are overly optimistic, leading to underprovisioning of CPU nodes in production.
  napkin_math: |
    - **FP32 Baseline:** $T_{mem} (12\text{ms}) + T_{comp} (8\text{ms}) = 20\text{ms}$.
    - **INT8 Memory Time:** $600\text{MB} / 4\text{ bytes} = 150\text{MB}$. $150\text{MB} / 50\text{ GB/s} = 3\text{ms}$.
    - **INT8 Compute Time:** Assuming roughly 2x VNNI speedup over FP32 FMA, $8\text{ms} / 2 = 4\text{ms}$.
    - **Total INT8 Latency:** $3\text{ms} + 4\text{ms} = 7\text{ms}$.
    - **Conclusion:** **The new latency is 7ms.**
