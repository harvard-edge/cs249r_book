title: The Static Batching Timeout Trap
scenario: You are optimizing an LLM chatbot service running on a single H100 GPU. The service uses a static batching strategy: it waits for up to 8 requests or a 200ms timeout before processing a batch. The model's prefill stage takes 50ms, and each decoding step (TPOT) takes 5ms. A user sends a request when the server is completely idle.
question: What are the TTFT components for this idle static-batching case, and what best-case TTFT will the user see?
details:
  realistic_solution: The total Time-To-First-Token is the sum of the time the request waits in the queue plus the time it takes to process the prompt (prefill). In this static batching scenario, even though the server is idle, the new request must wait for the 200ms timeout to expire. Only then will the batch of size 1 be sent to the GPU for processing. Therefore, the TTFT is the queuing delay (timeout) plus the prefill time.
  common_mistake: |
    **The Pitfall:** Ignoring the queuing delay imposed by the batching timeout window.
    **The Rationale:** Candidates focus solely on the raw GPU compute capabilities (50ms prefill) and assume a request is processed immediately.
    **The Consequence:** Grossly underestimating the Time-To-First-Token in low-traffic scenarios, leading to poor user experience despite having powerful hardware.
  napkin_math: |
    1. **Batching Strategy:** Server uses static batching and waits for the full timeout if the batch is incomplete.
    2. **Queue Wait Time:** Because the server is idle and only 1 request arrives, it must wait for the full timeout: 200 ms.
    3. **Prefill Compute Time:** Once dispatched, prefill takes 50 ms.
    4. **Conclusion:** **Total TTFT = 200 ms (queue) + 50 ms (prefill) = 250 ms.**
  options:
  - 5ms
  - 50ms
  - 250ms
  - 255ms
  correct_index: 2
