title: The Static Batching Timeout Trap
scenario: 'You are optimizing an LLM chatbot service running on a single H100 GPU. The service uses a
  **static batching** strategy: it waits for up to 8 requests or a **200ms timeout** before processing
  a batch. The model''s prefill stage takes **50ms**, and each decoding step (TPOT) takes **5ms**. A user
  sends a request when the server is completely idle. Explain the components of the Time-To-First-Token
  (TTFT) and calculate the best-case TTFT this user will experience.'
details:
  realistic_solution: The total Time-To-First-Token is the sum of the time the request waits in the queue
    plus the time it takes to process the prompt (prefill). In this static batching scenario, even though
    the server is idle, the new request must wait for the 200ms timeout to expire. Only then will the
    batch of size 1 be sent to the GPU for processing. Therefore, the TTFT is the queuing delay (timeout)
    plus the prefill time.
  common_mistake: The common mistake is to only consider the raw computation time (50ms for prefill) and
    ignore the queuing delay imposed by the batching strategy. In a static batching system, especially
    when traffic is low or bursty, the timeout window often dominates the end-to-end latency, leading
    to poor user experience despite having a powerful GPU.
  napkin_math: Since only one request arrives and the server uses static batching, it must wait for the
    full 200ms timeout window to expire before processing. Queue Wait Time = 200ms. Once the batch is
    dispatched, the prefill compute phase takes 50ms to generate the first token. Total TTFT = 200ms (queue)
    + 50ms (prefill compute) = 250ms.
  options:
  - 5ms
  - 50ms
  - 250ms
  - 255ms
  correct_index: 2
