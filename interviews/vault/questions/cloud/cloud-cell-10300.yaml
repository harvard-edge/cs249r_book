title: 'K8s GPU Device Plugin: Why Pod Requests Whole GPUs'
scenario: 'A junior engineer asks why a pod spec requesting `nvidia.com/gpu: 1` always gets an entire
  physical GPU even when the workload only uses 4 GB of the H100''s 80 GB HBM3. They want to know how
  the NVIDIA device plugin communicates available GPUs to the kubelet and why fractional allocation isn''t
  the default behavior.'
question: "Why does nvidia.com/gpu: 1 allocate an entire H100, how does the device plugin expose GPUs, and why aren’t fractions default?"
details:
  realistic_solution: 'The NVIDIA device plugin registers each physical GPU as a single discrete resource
    via the Kubernetes Device Plugin API (ListAndWatch). Kubelet tracks integer counts; fractional GPU
    sharing requires separate mechanisms like MIG partitioning on H100 or time-slicing via the NVIDIA
    GPU Operator''s `deviceConfig`. Without those, every pod claiming `nvidia.com/gpu: 1` monopolizes
    one full device.'
  common_mistake: 'Assuming the device plugin exposes GPUs as a divisible resource like CPU millicores;
    believing `nvidia.com/gpu: 0.5` is valid syntax in a standard NVIDIA plugin deployment.'
  napkin_math: H100 80 GB divided into 7 MIG 1g.10gb instances = 7 independent 10 GB / ~155 TFLOPS BF16
    slices per card. A cluster with 8 H100s can expose 56 MIG slices, up from 8 allocatable GPU units,
    increasing pod density 7×.
