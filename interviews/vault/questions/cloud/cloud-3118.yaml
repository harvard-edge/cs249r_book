title: Analyze GPipe Bubble Overhead in Pipeline Parallelism
scenario: A GPipe pipeline splits a 96-layer transformer across 8 H100 GPUs (12 layers/stage)
  with micro-batch count m=16. Training a 70B parameter model with global batch 1024,
  the pipeline bubble ratio is (p-1)/(m+p-1). A colleague proposes reducing to m=8
  micro-batches to cut memory, arguing it won't affect throughput. Analyze the throughput
  impact and calculate the bubble ratio change.
question: How does reducing from 16 to 8 micro-batches affect the pipeline bubble
  ratio and throughput?
details:
  realistic_solution: 'Bubble ratio with m=16: (8-1)/(16+8-1) = 7/23 = 30.4%. With
    m=8: (8-1)/(8+8-1) = 7/15 = 46.7%. Throughput decreases by (1-0.467)/(1-0.304)
    = 0.533/0.696 = 76.6% — a 23% throughput loss. Memory per GPU: activation memory
    ∝ m. At m=8, peak activation memory per micro-batch doubles (recomputation cost
    per micro-batch increases). The trade-off only makes sense if memory was the critical
    bottleneck.'
  common_mistake: Confusing bubble ratio with throughput degradation; the bubble ratio
    measures idle fraction, not absolute throughput, and memory savings from fewer
    micro-batches may force smaller batch sizes.
  napkin_math: 'Bubble ratio = (p-1)/(m+p-1). m=16: 7/23=30.4%. m=8: 7/15=46.7%. Throughput
    ratio: (1-0.467)/(1-0.304)=0.766. 23% throughput loss. Useful throughput at 312
    TFLOP/s H100: 0.766×0.696×312=167 TFLOP/s effective vs 217 TFLOP/s at m=16.'
