title: Analyze GPipe Bubble Overhead in Pipeline Parallelism
scenario: A GPipe pipeline splits a 96-layer transformer across 8 H100 GPUs (12 layers/stage) with micro-batch count m=16. Training a 70B parameter model with global batch 1024, the pipeline bubble ratio is (p-1)/(m+p-1). A colleague proposes reducing to m=8 micro-batches to cut memory, arguing it won't affect throughput.
question: How does reducing from 16 to 8 micro-batches affect the pipeline bubble ratio and throughput?
details:
  realistic_solution: 'Bubble ratio with m=16: (8-1)/(16+8-1) = 7/23 = 30.4%. With m=8: (8-1)/(8+8-1) = 7/15 = 46.7%. Throughput decreases by (1-0.467)/(1-0.304) = 0.533/0.696 = 76.6% — a 23% throughput loss. Memory per GPU: activation memory ∝ m. At m=8, peak activation memory per micro-batch doubles (recomputation cost per micro-batch increases). The trade-off only makes sense if memory was the critical bottleneck.'
  common_mistake: |
    **The Pitfall:** Confusing bubble ratio with throughput degradation.
    **The Rationale:** Engineers may assume that reducing micro-batches primarily saves memory without proportionally scaling down throughput, misunderstanding the bubble ratio formula.
    **The Consequence:** Making architectural changes that severely degrade throughput (23% loss) for unnecessary memory savings.
  napkin_math: |
    * Pipeline stages (p) = 8.
    * Bubble ratio at m=16: (8-1) / (16+8-1) = 7 / 23 ≈ 30.4%.
    * Bubble ratio at m=8: (8-1) / (8+8-1) = 7 / 15 ≈ 46.7%.
    * Throughput is proportional to 1 - bubble ratio.
    * Throughput ratio: (1 - 0.467) / (1 - 0.304) = 0.533 / 0.696 ≈ 76.6%.
    * **Reducing from 16 to 8 micro-batches results in a 23.4% throughput loss.**
