title: The Silent Regression
scenario: We've deployed a new version of our recommendation model using a rolling update, and while all technical metrics (latency, error rate) look good, our key business metrics (e.g., click-through rate, user engagement) have silently dropped by 5%.
question: How would you have prevented this silent regression and what deployment strategy would you advocate for future model updates?
details:
  realistic_solution: "A silent regression indicates a failure to validate model quality in a production environment before full rollout. The key is to use a **canary deployment** strategy combined with robust A/B testing and comprehensive business metric monitoring.\n    1.  **Canary Deployment:** Instead of a full rolling update, gradually shift a small percentage of live traffic (e.g., 1-5%) to the new model version.\n    2.  **Shadow Mode (Dark Launch):** For critical services, run the new model in parallel with the old one, processing real-time requests but not returning its predictions to users. This allows for comparing predictions and logging potential issues without impacting users.\n    3.  **A/B Testing Framework:** Integrate the canary deployment with an A/B testing framework to statistically compare the performance of the new model (treatment group) against the old model (control group) on key business metrics (CTR, conversion, engagement, revenue).\n    4.  **Automated Rollback:** Define clear thresholds for business metric degradation. If the new model's performance falls below these thresholds, automatically roll back to the previous stable version.\n    5.  **Observability:** Ensure dashboards and alerts are configured to monitor both technical and business-level metrics in real-time for the canary group."
  common_mistake: |
    **The Pitfall:** Assuming comprehensive system monitoring is sufficient for ML deployments.
    **The Rationale:** Candidates rely heavily on DevOps metrics (CPU, memory, latency) and ignore ML-specific business metric validations.
    **The Consequence:** Silent regressions impact user behavior and revenue without triggering any technical alerts.
  napkin_math: |
    - 1. Analyze 5% global drop: A 5% drop across all users easily hides within normal daily variance.
    - 2. Analyze Canary deployment math: If 5% of traffic is routed to the new model (Canary) and 95% to the old (Control).
    - 3. Calculate impact: Overall CTR change = (0.95 * 0%) + (0.05 * -5%) = -0.25% globally.
    - 4. Conclusion: By isolating the metrics by cohort (Canary vs Control), the **5% degradation becomes instantly obvious** despite the global impact being nearly invisible.
