title: The Silent Regression
scenario: We've deployed a new version of our recommendation model using a rolling update, and while all
  technical metrics (latency, error rate) look good, our key business metrics (e.g., click-through rate,
  user engagement) have silently dropped by 5%. How would you have prevented this 'silent regression'
  and what deployment strategy would you advocate for future model updates?
details:
  realistic_solution: "A silent regression indicates a failure to validate model quality in a production\
    \ environment before full rollout. The key is to use a **canary deployment** strategy combined with\
    \ robust A/B testing and comprehensive business metric monitoring.\n    1.  **Canary Deployment:**\
    \ Instead of a full rolling update, gradually shift a small percentage of live traffic (e.g., 1-5%)\
    \ to the new model version.\n    2.  **Shadow Mode (Dark Launch):** For critical services, run the\
    \ new model in parallel with the old one, processing real-time requests but not returning its predictions\
    \ to users. This allows for comparing predictions and logging potential issues without impacting users.\n\
    \    3.  **A/B Testing Framework:** Integrate the canary deployment with an A/B testing framework\
    \ to statistically compare the performance of the new model (treatment group) against the old model\
    \ (control group) on key business metrics (CTR, conversion, engagement, revenue).\n    4.  **Automated\
    \ Rollback:** Define clear thresholds for business metric degradation. If the new model's performance\
    \ falls below these thresholds, automatically roll back to the previous stable version.\n    5.  **Observability:**\
    \ Ensure dashboards and alerts are configured to monitor both technical and business-level metrics\
    \ in real-time for the canary group."
  common_mistake: '"We need more comprehensive monitoring for system metrics." While important, system
    metrics (CPU, memory, network) wouldn''t catch a subtle degradation in model quality that impacts
    user behavior without increasing technical errors.'
  napkin_math: When running a 5% canary deployment, a severe 5% drop in the canary's CTR translates to
    a deeply hidden global drop. Overall CTR change = (0.95 * 0%) + (0.05 * -5%) = -0.25%. A 0.25% global
    drop hides within normal daily variance, masking the regression. By splitting metrics exactly by cohort
    (Canary vs Control) instead of globally, the 5% degradation becomes instantly obvious.
