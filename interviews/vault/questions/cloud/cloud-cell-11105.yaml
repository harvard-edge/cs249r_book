title: 'Kernel Fusion: Optimize CUDA Kernel Fusion for Transformer LayerNorm'
scenario: Your profiler shows LayerNorm is taking 8% of total H100 (80GB HBM3, 3.35 TB/s) training time
  for a 30B model. The unfused LayerNorm requires 3 passes over the data (compute mean, compute variance,
  normalize). A fused single-pass LayerNorm is possible using Welford's online algorithm. Quantify the
  memory bandwidth improvement.
question: "How much HBM bandwidth does a fused single-pass LayerNorm save versus a naive three-pass LayerNorm for the 30B model?"
details:
  realistic_solution: 'Naive LayerNorm: Pass 1: read X, compute mean → write mean. Pass 2: read X + mean,
    compute variance → write variance. Pass 3: read X + mean + variance, compute normalized output → write
    output. 3 reads of X. Welford''s single pass: compute mean AND variance simultaneously → 1 read of
    X.'
  common_mistake: Not knowing that LayerNorm is multi-pass in naive implementations; claiming fusion reduces
    FLOPs (it doesn't materially change FLOPs, only HBM accesses).
  napkin_math: '30B model, training batch = 256 × 2048 tokens. Hidden = 6144. LayerNorm input tensor per
    call: 256 × 2048 × 6144 × 2B = 6.44GB. Naive: 3 reads + 1 write = 4 × 6.44GB = 25.8GB HBM per LayerNorm
    call. There are 96 layers × 2 LayerNorms = 192 LayerNorm calls per forward pass. Total: 192 × 25.8GB
    = 4,954GB = 4.95TB HBM per forward pass just for LayerNorm. Fused: 1 read + 1 write = 2 × 6.44GB =
    12.88GB per call. Total: 192 × 12.88GB = 2.47TB. Savings: 2.48TB per forward pass. At H100 3.35 TB/s:
    unfused 4.95TB = 1.48s, fused 2.47TB = 0.74s. 740ms saved per forward pass. Training step time: if
    LayerNorm was 8% → total step time = 1.48s / 0.08 = 18.5s. After fusion: 18.5s - 0.74s = 17.76s. New
    LayerNorm fraction: 0.74/17.76 = 4.2%.'
