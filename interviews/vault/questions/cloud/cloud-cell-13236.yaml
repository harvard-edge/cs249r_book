title: Design 1F1B Pipeline Schedule for LLM Training on H100 Cluster
scenario: You are designing a 1F1B (one-forward-one-backward) pipeline schedule for training a 175B GPT
  model across 16 H100 GPUs with pipeline parallelism degree p=16. Each forward pass per micro-batch takes
  8ms per stage; backward takes 16ms. Global batch = 2048, micro-batch size = 128, giving m=16 micro-batches.
  Design the schedule and compute steady-state throughput and bubble ratio vs GPipe.
details:
  realistic_solution: '1F1B bubble ratio: same (p-1)/(m+p-1) = 15/31 = 48.4% as GPipe with same m and
    p. But memory advantage: GPipe holds all m micro-batch activations simultaneously → 16×activation.
    1F1B holds only p=16 at peak but in steady state only 1 per stage → p activations max. Memory reduction:
    16× vs GPipe if m>p. Throughput: steady-state = m/(m+p-1) per pipeline cycle. With m=16, p=16: 16/31
    = 51.6% efficiency. Each pipeline cycle = max(F,B) = 16ms. Tokens/s: 2048×(seq_len)/0.016 = 2048×2048/0.016...
    need seq_len. With seq=2048: 2048×2048 / (16ms × 31 cycles) = 4M / 496ms = 8.06M tokens/s.'
  common_mistake: Applying GPipe bubble formula to 1F1B; 1F1B has the same bubble ratio formula but limits
    in-flight micro-batches to p (not m), reducing peak activation memory from O(mp) to O(p).
  napkin_math: 'Bubble ratio: (16-1)/(16+16-1) = 15/31 = 48.4%. Steady-state efficiency: 51.6%. Cycle
    time: 16ms (backward). Total pipeline time: 31×16ms=496ms per global batch. Throughput: 2048 samples
    × 2048 tokens / 496ms = 8.46M tokens/s across 16 GPUs = 528K tokens/s/GPU.'
