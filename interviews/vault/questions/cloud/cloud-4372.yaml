title: TPU v5e vs H100 for Fine-Tuning LoRA at Scale
scenario: A team runs LoRA fine-tuning (rank=16) on a 7B base model using 1M samples, batch size 64, for 3 epochs. The LoRA adapter has 40M trainable parameters. TPU v5e (16 chips) achieves 197 TFLOPS BF16 per chip at MFU 55%; H100 (8 GPUs) achieves 989 TFLOPS FP16 per GPU at MFU 50%.
question: Which configuration finishes faster, and what is the per-dollar cost comparison assuming $1.2/chip-hr for TPU v5e and $3.5/GPU-hr for H100?
details:
  realistic_solution: 'Calculate effective FLOPs. LoRA computation is uniquely lightweight: the frozen backbone runs purely in inference mode, meaning backprop only computes gradients for the tiny 40M adapter matrices. The total required FLOPs are vastly lower than full fine-tuning. H100 achieves the workload faster and cheaper due to raw performance dominance at this specific, smaller hardware scale.'
  common_mistake: |
    **The Pitfall:** Using theoretical TFLOPS multipliers without adjusting for LoRA's unique computation profile.
    **The Rationale:** Engineers default to the standard formula for full fine-tuning (forward + full backward), overestimating total FLOPs.
    **The Consequence:** Mismodeling training durations and potentially making incorrect hardware purchasing decisions.
  napkin_math: |
    1. **LoRA backward:** Only $40\text{M}/7\text{B} = 0.57\%$ of parameters require gradient computation.
    2. **Total step FLOPs:** Forward (7B) + backward (7B + 40M) $\approx 4 \times 7\text{B} \times 64 \times 512 = 9.17 \times 10^{14}$.
    3. **Total steps:** $1\text{M} \times 3 / 64 = 46,875$.
    4. **Total Training FLOPs:** $46,875 \times 9.17 \times 10^{14} = 4.3 \times 10^{19}$.
    5. **TPU v5e (16 chips):** $16 \times 197\text{e}12 \times 0.55 = 1.73 \times 10^{15}\text{ FLOPS/sec}$. Time: $\approx 6.9\text{ hours}$. Cost: $6.9 \times 16 \times \$1.20 = \$132$.
    6. **H100 (8 GPUs):** $8 \times 989\text{e}12 \times 0.50 = 3.95 \times 10^{15}\text{ FLOPS/sec}$. Time: $\approx 3.0\text{ hours}$. Cost: $3.0 \times 8 \times \$3.50 = \$84$.
    7. **H100 wins on time (2.3x faster) and cost (36% cheaper).**
