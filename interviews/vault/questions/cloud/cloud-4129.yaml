title: MIG vs Full GPU for Inference Cost Optimization
scenario: You serve a 7B model at 50 QPS. On a full A100-80GB, the model achieves
  200 tokens/s decode throughput. A 3g.40gb MIG partition achieves 85 tokens/s. Compare
  the cost-per-token for full-GPU vs MIG deployment, assuming an A100 costs $3/hour.
question: How does the cost per token compare between a full A100 and 3g.40gb MIG
  partitions for the 7B service?
details:
  realistic_solution: 'Full GPU: 200 tokens/s at $3/hr = 200 × 3600 = 720K tokens
    per $3 = 240K tokens per dollar. MIG 3g.40gb: 85 tokens/s. An A100 can run 2×
    3g.40gb partitions (using 6 of 7 SM partitions). If both serve the same model:
    170 tokens/s total at $3/hr = 170 × 3600 = 612K tokens per $3 = 204K tokens per
    dollar. So full GPU is ~18% more cost-efficient for throughput. But MIG wins if:
    (1) you need isolation between different models (each partition is independent),
    (2) your traffic is bursty — 50 QPS × 20 tokens average = 1000 tokens/s needed.
    One A100 (200 tok/s) is insufficient, you need 5 full A100s = $15/hr. With MIG,
    you still need 12 MIG partitions (85 tok/s each) = 6 A100s = $18/hr. Full GPU
    wins on cost. MIG wins when workloads are heterogeneous (different models), need
    isolation, or individual models are small enough to waste most of a full GPU''s
    memory.'
  common_mistake: Comparing raw throughput without considering that MIG lets you serve
    multiple models (or multiple instances) on one GPU. The cost metric should be
    tokens per dollar, not tokens per second.
  napkin_math: 'Full A100: 240K tokens/$. MIG 3g.40gb: 204K tokens/$. Full GPU is
    18% cheaper per token. MIG advantage: 2 independent models, hardware isolation.'
