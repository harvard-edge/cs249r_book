title: MIG vs Full GPU for Inference Cost Optimization
scenario: You serve a 7B model at 50 QPS. On a full GPU, the model achieves 200 tokens/s decode throughput. A 3g.40gb MIG partition achieves 85 tokens/s.
question: How does the cost per token compare between a full GPU and 3g.40gb MIG partitions for the 7B service?
details:
  realistic_solution: |
    Calculate tokens per dollar to accurately compare cost. Full GPU is more cost-efficient for pure throughput. However, MIG is advantageous when workloads are heterogeneous, require hardware isolation, or when traffic is bursty and individual models do not fully saturate a full GPU's memory.
  common_mistake: |
    **The Pitfall:** Comparing raw throughput without considering model multiplexing.
    **The Rationale:** Candidates fail to realize that MIG allows serving multiple independent models or instances on a single GPU.
    **The Consequence:** Suboptimal hardware utilization and inflated inference costs for smaller models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Full GPU throughput: 200 tokens/s at $3/hr.
       - MIG 3g.40gb throughput: 85 tokens/s (can fit 2 partitions per GPU).
    2. **Calculations:**
       - Full GPU: 200 * 3600 = 720K tokens / $3 = 240K tokens/$.
       - MIG (2 partitions): 170 tokens/s total.
       - MIG: 170 * 3600 = 612K tokens / $3 = 204K tokens/$.
       - Cost difference: 240K / 204K = ~1.18x (Full GPU yields 18% more tokens per dollar).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Full GPU is ~18% more cost-efficient per token. MIG should only be used if hardware isolation or model packing is required.
