title: 'Model Size Estimation: Realize Memory Budget for Multi-Modal LLM on H100'
scenario: 'Concretely size the memory requirements for a multi-modal LLM (LLaVA-13B
  architecture) on H100 (80GB HBM3). Components: (1) CLIP ViT-L/14 vision encoder
  (307M params FP16), (2) MLP projection layer (20M params FP16), (3) LLaMA-2-13B
  language model (13B params FP16), (4) KV-cache for 4096-token context at batch 8.
  Verify fit and compute maximum batch size.'
question: Does LLaVA-13B fit on one 80GB H100 at batch 8 and 4096 context, and what
  is the maximum batch size?
details:
  realistic_solution: 'Vision encoder: 307M \times 2B = 614MB \approx 0.6GB. MLP projection:
    20M \times 2B = 40MB. LLaMA-2-13B: 13B \times 2B = 26GB. KV-cache (batch=8, seq=4096, 40
    layers, MHA 40 heads): 8\times4096\times2\times40\times128\times2B\times40 = 8\times4096\times819.2KB = 26.8GB. Total: 0.6+0.04+26+26.8
    = 53.44GB < 80GB \checkmark. Maximum batch: (80-26.65)GB / (819.2KB\times4096) = 53.35GB / 3.355GB per request
    = 15.9 \rightarrow batch=15. Check: 15\times4096\times819.2KB=50.33GB. Total: 26.65+50.33=76.98GB \checkmark.'
  common_mistake: Sizing only the language model and ignoring the vision encoder,
    which adds 614MB (307M \times 2B) — significant but not the binding constraint here.
  napkin_math: 'Vision: 614MB. LM: 26GB. KV at batch=8, seq=4096: 8\times4096 tokens \times
    819.2KB/token = 26.8GB. Total: 53.4GB < 80GB. Max batch for full 4096 ctx: (80-26.65)GB
    / (4096 tokens \times 819.2KB/token per request) = 53.35GB / 3.355GB = 15.9 \rightarrow batch=15.
    Total: 26.65+15\times3.355=76.98GB \checkmark.'
