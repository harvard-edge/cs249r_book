title: 'Model Size Estimation: Realize Memory Budget for Multi-Modal LLM on H100'
scenario: Concretely size the memory requirements for a multi-modal LLM (LLaVA-13B architecture) on an H100 GPU. Components include a CLIP ViT-L/14 vision encoder (307M params FP16), an MLP projection layer (20M params FP16), a LLaMA-2-13B language model (13B params FP16), and a KV-cache for a 4096-token context.
question: Does LLaVA-13B fit on one 80GB H100 at batch 8 and 4096 context, and what is the maximum batch size?
details:
  realistic_solution: 'Vision encoder: 307M × 2B = 614MB ≈ 0.6GB. MLP projection: 20M × 2B = 40MB. LLaMA-2-13B: 13B × 2B = 26GB. KV-cache (batch=8, seq=4096, 40 layers, MHA 40 heads): 8×4096×2×40×128×2B×40 = 8×4096×819.2KB = 26.8GB. Total: 0.6+0.04+26+26.8 = 53.44GB < 80GB \checkmark. Maximum batch: (80-26.65)GB / (819.2KB×4096) = 53.35GB / 3.355GB per request = 15.9 \rightarrow batch=15. Check: 15×4096×819.2KB=50.33GB. Total: 26.65+50.33=76.98GB \checkmark.'
  common_mistake: |
    **The Pitfall:** Sizing only the language model and ignoring the vision encoder and projection layers.
    **The Rationale:** Candidates often focus solely on the massive LLM component when estimating memory for multi-modal models.
    **The Consequence:** While the vision encoder only adds ~614MB, ignoring it leads to an imprecise sizing estimate that could cause unexpected OOM errors at maximum batch size.
  napkin_math: |
    - **Vision encoder + MLP projection:** (307M + 20M) × 2 bytes = 654 MB ≈ 0.65 GB.
    - **Language Model:** 13B × 2 bytes = 26 GB.
    - **Base model size:** 26 GB + 0.65 GB = 26.65 GB.
    - **KV-cache per token:** 2 (K, V) × 40 layers × 40 heads × 128 dim × 2 bytes = 819.2 KB/token.
    - **KV-cache per request:** 4096 tokens × 819.2 KB/token ≈ 3.355 GB.
    - **KV-cache at batch 8:** 8 × 3.355 GB = 26.84 GB.
    - **Total memory at batch 8:** 26.65 GB + 26.84 GB = 53.49 GB.
    - **Available for KV-cache:** 80 GB - 26.65 GB = 53.35 GB.
    - **Maximum batch size:** 53.35 GB / 3.355 GB/request = 15.9.
    - **Max batch size is 15.** Total memory: 26.65 + (15 × 3.355) = **76.98 GB.**
