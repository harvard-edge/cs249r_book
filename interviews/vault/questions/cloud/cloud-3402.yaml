title: Optimizing LLM Inference Scheduling on Google TPU v5e
scenario: 'You are tasked with optimizing the execution of a large language model (LLM) inference workload on a Google TPU v5e. This specific TPU instance is equipped with 16 GB of HBM, capable of 197 TFLOPS (BF16 peak performance), and boasts a memory bandwidth of 1.6 TB/s. The LLM comprises numerous layers, each involving a sequence of operations like matrix multiplications, activations, and normalizations. Given the model''s significant size, it''s not feasible for all intermediate activations to reside entirely within the HBM concurrently.'
question: How would you schedule LLM operators on a TPU v5e to minimize execution time under the 16 GB HBM and 1.6 TB/s bandwidth limits?
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach: 1. **Memory-aware graph partitioning:** Analyze the computation graph to identify subgraphs or layers that can be executed sequentially to maximize HBM reuse for intermediate activations. Techniques like rematerialization (recomputing small tensors instead of storing large ones) can be strategically applied. 2. **Operator fusion:** Systematically group compatible operations (e.g., matrix multiplication followed by bias addition and activation) into a single kernel to reduce memory traffic, minimize kernel launch overheads, and improve data locality. 3. **Dynamic parallelism:** Identify independent operations within and across layers that can run concurrently on different TPU cores, while carefully managing potential communication overheads for shared data. 4. **Profiling and iterative refinement:** Utilize hardware profiling tools to pinpoint bottlenecks (HBM pressure, compute stalls, memory bandwidth saturation) and iteratively refine the scheduling strategy based on empirical performance data.'
  common_mistake: |
    **The Pitfall:** Overly prioritizing compute utilization over memory bandwidth limits.
    
    **The Rationale:** Focusing solely on maximizing TFLOPS without designing for data locality and HBM capacity.
    
    **The Consequence:** Inefficient scheduling that incurs excessive data movement penalties between memory tiers, crippling real-world throughput.
  napkin_math: |
    * **Full HBM Scan:** 16 GB / 1.6 TB/s = 0.01 seconds
    * **Compute Bandwidth Demand:** 197 TFLOPS (BF16) requires ~394 TB/s effective data access
    * **Hardware Imbalance:** 394 TB/s (Required) >> 1.6 TB/s (Available)
    * **Result:** **The TPU is massively bandwidth-limited. Every FLOP must reuse data ~246 times (394/1.6) to hit peak compute, demanding aggressive kernel fusion.**
