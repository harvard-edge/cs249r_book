title: Optimize MobileNetV3 width multiplier selection for a fixed A100 latency budget
scenario: You have a 2ms latency budget per batch of 128 images on A100 for a product
  search feature. MobileNetV3-Large (0.22 GFLOPs, 75.2% top-1) meets the budget at
  1.4ms but you want to close an accuracy gap to EfficientNet-B0 (77.1%) without exceeding
  2ms. Optimize by finding the best width multiplier for MobileNetV3 that fits the
  budget.
question: What MobileNetV3-Large width multiplier best improves accuracy while keeping
  batch-128 A100 latency under the 2 ms budget?
details:
  realistic_solution: 'Width multiplier α scales FLOPs as α² and params as α². Current:
    0.22G FLOPs at α=1.0. Target latency headroom: 2.0 - 1.4 = 0.6ms → can afford
    0.6/1.4 = 43% more FLOPs → α² ≤ 1.43 → α ≤ 1.2. MobileNetV3-Large at α=1.2 (sometimes
    denoted 1.25): ~0.22 × 1.44 = 0.32 GFLOPs, ~76.6% top-1 (published results). Check
    1.4ms × 1.43 = 2.0ms — just fits. For α=1.4: 0.22 × 1.96 = 0.43 GFLOPs, ~1.4×1.96ms
    = 2.74ms — exceeds budget.'
  common_mistake: Assuming FLOPs scale linearly with the width multiplier α, when
    they actually scale as α² (both input and output channels scale by α), so a width
    multiplier of 1.4× costs 1.96× more FLOPs.
  napkin_math: 'MobileNetV3-Large α=1.0: 0.22G FLOPs, 1.4ms at batch=128 on A100.
    FLOPs ∝ α². Budget: 2ms → 2.0/1.4 × 0.22G = 0.314G FLOPs max. α = sqrt(0.314/0.22)
    = sqrt(1.43) = 1.20. MobileNetV3-Large 1.25×: reported 0.356 GFLOPs, ~77.0% top-1
    (timm library). Expected latency: 1.4 × (0.356/0.22) = 2.27ms — slightly over!
    Use α=1.1: 0.22 × 1.21 = 0.266 GFLOPs, estimated ~76.0% top-1, latency ~1.4 ×
    1.21 = 1.69ms — fits budget.'
