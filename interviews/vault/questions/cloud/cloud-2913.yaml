title: Optimize MobileNetV3 width multiplier selection for a fixed A100 latency budget
scenario: You have a 2ms latency budget per batch of 128 images on A100 for a product search feature. MobileNetV3-Large (0.22 GFLOPs, 75.2% top-1) meets the budget at 1.4ms but you want to close an accuracy gap to EfficientNet-B0 (77.1%) without exceeding 2ms.
question: What MobileNetV3-Large width multiplier best improves accuracy while keeping batch-128 latency under the 2ms budget?
details:
  realistic_solution: 'Width multiplier α scales FLOPs as α² and params as α². Current: 0.22G FLOPs at α=1.0. Target latency headroom: 2.0 - 1.4 = 0.6ms → can afford 0.6/1.4 = 43% more FLOPs → α² ≤ 1.43 → α ≤ 1.2. MobileNetV3-Large at α=1.2 (sometimes denoted 1.25): ~0.22 × 1.44 = 0.32 GFLOPs, ~76.6% top-1 (published results). Check 1.4ms × 1.43 = 2.0ms — just fits. For α=1.4: 0.22 × 1.96 = 0.43 GFLOPs, ~1.4×1.96ms = 2.74ms — exceeds budget.'
  common_mistake: |
    **The Pitfall:** Assuming FLOPs scale linearly with the width multiplier $\alpha$.
    **The Rationale:** Candidates forget that scaling the width (channels) affects both the input and output dimensions of convolutions, causing FLOPs to scale quadratically ($\alpha^2$).
    **The Consequence:** Choosing a multiplier that drastically overshoots the latency budget.
  napkin_math: |
    1. **Current Latency:** $\alpha=1.0$ takes 1.4ms. Budget is 2.0ms.
    2. **Allowed FLOP Increase:** $2.0\text{ms} / 1.4\text{ms} = 1.428$ (can afford ~42.8% more FLOPs).
    3. **Width Scaling:** FLOPs scale as $\alpha^2$. We need $\alpha^2 \le 1.428$.
    4. **Calculate Multiplier:** $\alpha \le \sqrt{1.428} \approx 1.195$.
    5. **Conclusion:** **Use a width multiplier of $\alpha=1.1$ or $\alpha=1.2$ to maximize accuracy within the 2ms budget.**
