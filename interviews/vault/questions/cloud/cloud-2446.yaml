title: The Activation Checkpointing Paradox
scenario: You are fine-tuning a 30B model on 8x A100 GPUs. To fit a larger batch size, you enable full
  activation (gradient) checkpointing. You calculate that recomputing the forward pass should add exactly
  33% overhead to the total compute time (1 FWD + 2 BWD -> 2 FWD + 2 BWD = 4/3). However, the measured
  step latency increases by 75%, severely degrading training throughput.
question: "Why does full activation checkpointing increase 30B fine-tuning step latency by 75% instead of the expected 33%?"
details:
  realistic_solution: The 33% overhead rule of thumb assumes the entire forward pass is compute-bound.
    While the large matrix multiplications (QKV projections, FFNs) are compute-bound and scale directly
    with FLOPs, operations like LayerNorm, GeLU, RoPE, and Dropout are heavily memory-bandwidth bound.
    They contribute negligibly to the total FLOP count but take up a significant fraction of the execution
    time because they operate on the steep slope of the roofline model. When you enable full activation
    checkpointing, you force the GPU to re-fetch all the high-dimensional activations from HBM for these
    memory-bound operations. The time spent recomputing these memory-bound ops does not scale with their
    tiny FLOP count, drastically lowering the overall arithmetic intensity of the recompute phase and
    causing the disproportionate 75% latency increase.
  common_mistake: Assuming that step time scales perfectly linearly with FLOP count, ignoring the varying
    arithmetic intensities of different neural network layers.
  napkin_math: 'Consider a layer with compute-bound MatMul (0.32 ms) and memory-bound ops like LayerNorm/GeLU/Dropout
    (0.50 ms). Forward time = 0.82 ms. Backward time ≈ 1.0 ms (MatMul backward ≈ 0.64 ms + memory-bound
    ops backward ≈ 0.36 ms — backward of memory ops is cheaper since gradients flow through without re-reading
    full activations). No checkpoint: total = 0.82 + 1.0 = 1.82 ms per layer. With checkpoint: recompute
    forward adds 0.82 ms, BUT the recomputed activations must be written to HBM then immediately re-read
    for backward, adding ~0.55 ms of extra memory traffic that the non-checkpointed path avoids (activations
    were already resident). New total = 0.82 + 0.82 + 0.55 + 1.0 = 3.19 ms. Overhead: 3.19/1.82 = 1.75×
    — a 75% increase, exactly matching the observed overhead.'
