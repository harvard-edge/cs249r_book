title: GPU Capacity Planning with Batching Constraints
scenario: You need to provision hardware for a text classification service handling 4,000 requests per second (RPS) at peak. The latency SLO is P99 < 150ms. Profiling an L4 GPU reveals batch execution times: Batch 1 is 10ms, Batch 32 is 40ms, Batch 64 is 70ms, and Batch 128 is 130ms. Network and framework overhead add a constant 30ms per request.
question: Assuming negligible batch accumulation time, how many L4 GPUs are required to handle 4,000 RPS under the 150ms P99 SLO while minimizing cost?
details:
  realistic_solution: Subtract the fixed network overhead from the SLO to find the maximum allowable model execution time (150ms - 30ms = 120ms). Select the highest batch size that completes under this limit, then divide peak traffic by the per-GPU throughput.
  common_mistake: |
    **The Pitfall:** Choosing Batch 128 (130ms) because it's technically under the 150ms limit, while ignoring the 30ms network overhead.
    **The Rationale:** Candidates forget to subtract fixed system overheads from the total latency budget.
    **The Consequence:** Deploying an architecture that inherently violates the 150ms SLO in production.
  napkin_math: |
    1. SLO Budget: 150 ms - 30 ms overhead = 120 ms max inference time.
    2. Optimal Batch: Batch 64 takes 70 ms (< 120 ms). Batch 128 takes 130 ms (> 120 ms).
    3. GPU Throughput: 64 requests / 0.070 seconds = 914 RPS per GPU.
    4. GPUs Needed: 4,000 RPS / 914 RPS/GPU = 4.37.
    5. **Conclusion: Rounding up, 5 L4 GPUs are required.**
