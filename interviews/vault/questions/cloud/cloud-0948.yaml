title: GPU Capacity Planning with Batching Constraints
scenario: 'You need to provision hardware for a text classification service handling 4,000 requests per
  second (RPS) at peak. Your latency SLO is P99 < 150ms. Profiling an NVIDIA L4 GPU reveals the following
  inference execution times: Batch 1 takes 10ms, Batch 32 takes 40ms, Batch 64 takes 70ms, and Batch 128
  takes 130ms. The gRPC network and serving framework overhead add a constant 30ms per request. Assuming
  batch accumulation time is negligible due to the high traffic volume, how many L4 GPUs are required
  to handle peak load while minimizing cost?'
question: "How many L4 GPUs are required to handle 4,000 RPS under the 150ms P99 SLO while minimizing cost?"
details:
  realistic_solution: Subtract the fixed network overhead from the SLO to find the maximum allowable model
    execution time (150ms - 30ms = 120ms). Select the highest batch size that completes under this limit
    (Batch 64 at 70ms). Calculate the per-GPU throughput at this batch size (64 requests / 0.070 seconds
    = 914 RPS). Finally, divide peak traffic by the per-GPU throughput (4000 / 914 = 4.37) and round up
    to 5 GPUs.
  common_mistake: Calculating capacity based on Batch 1 throughput (which would require 40 GPUs), or ignoring
    the 30ms network overhead and choosing Batch 128, which would violate the 150ms SLO.
  napkin_math: 'SLO Budget = 150ms - 30ms = 120ms max inference time.

    Optimal Batch = 64 (70ms < 120ms). Batch 128 fails (130ms > 120ms).

    GPU Throughput = 64 req / 0.070 sec = ~914 RPS.

    GPUs Needed = 4000 RPS / 914 RPS/GPU = 4.37 -> 5 GPUs.'
