title: 'Systolic Array Padding Underutilization: Transformer Systems Cost'
scenario: A team is running a custom deep learning model on Cloud TPU v4, which features 128x128 Matrix Multiply Units (MXUs). Profiling reveals that a specific dense layer with input shape `[Batch=64, Features=100]` and weight matrix `[100, 64]` is achieving less than 20% compute utilization. The layer is fully resident in on-chip SRAM, so memory bandwidth is not the bottleneck.
question: What is causing the <20% TPU utilization for the [64,100] x [100,64] dense layer, and how would you fix it?
details:
  realistic_solution: "Because the TPU's systolic array is a physical 128x128 grid, any matrix dimension that isn't a multiple of 128 is hardware-padded with zeros. The system evaluates a `[128, 128] x [128, 128]` matrix multiply under the hood. The solution is to redesign the network dimensions (Batch, Features, Output) to be multiples of 128, which will dramatically increase useful throughput without taking any additional execution time."
  common_mistake: |
    **The Pitfall:** Diagnosing this as an SRAM bandwidth limitation, CPU-to-accelerator transfer bottleneck, or framework overhead.
    **The Rationale:** Failing to understand how physical fixed-grid MAC arrays handle misaligned tensor dimensions.
    **The Consequence:** Attempting to optimize data loading or caching, which provides zero benefit because the utilization loss is purely due to hardware padding.
  napkin_math: |
    *   **Theoretical Useful MACs:** 64 (Batch) × 100 (Features) × 64 (Output) = 409,600 MACs.
    *   **Padded Hardware MACs:** TPU v4 pads dimensions to multiples of 128. The operation becomes 128 × 128 × 128 = 2,097,152 MACs.
    *   **Hardware Compute Utilization:** 409,600 / 2,097,152 = 19.53%.
    *   **Conclusion:** **Over 80% of the systolic array's cycles are wasted multiplying zeros.**
