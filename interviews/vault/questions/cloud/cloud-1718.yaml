title: Rack-Level Power Wall Calculation for AI Clusters
scenario: You are architecting a new AI training cluster using NVIDIA H100 GPUs (700W TDP). The proposed design packs 8 GPUs into a 4U server node, and attempts to physically fill a standard 42U rack with 10 of these nodes. The colocation facility guarantees a maximum power delivery and cooling capacity of 40kW per rack.
question: "What is the proposed 10-node rack’s peak power draw, and how many 8-GPU H100 nodes fit under the 40 kW rack limit?"
details:
  realistic_solution: Account for total system-level power. A modern 8x H100 node typically draws between 10kW and 11.5kW under full load. Dividing the 40kW rack limit by the true node power reveals a severe power density bottleneck, allowing far fewer nodes than the physical space permits.
  common_mistake: |
    **The Pitfall:** Calculating only the GPU power while ignoring the rest of the system components.
    **The Rationale:** GPUs are the primary workload engines, so their TDP is the most prominent spec.
    **The Consequence:** Massive power oversubscription, leading to tripped breakers, rack shutdowns, and hardware damage during peak training loads.
  napkin_math: |
    * GPU Power: 8 GPUs × 700W = 5,600W.
    * System Power: Dual CPUs, vast DRAM, InfiniBand NICs, NVSwitches, and high-RPM fans draw ~4,400W.
    * Total Node Power: 5,600W + 4,400W ≈ 10 kW per node.
    * Proposed Rack Draw: 10 nodes × 10 kW = 100 kW (exceeds 40 kW limit by 2.5×).
    * **Max Safe Nodes:** **40 kW / 10 kW = 4 nodes maximum (often strictly 3 to preserve a 20% safety margin).**
