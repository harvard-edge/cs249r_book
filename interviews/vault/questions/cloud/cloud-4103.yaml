title: 'Debugging TP Numerical Divergence'
scenario: 'After switching from TP=1 to TP=4 on MI300X, your 30B model''s training loss diverges after 500 steps. Loss curves match perfectly for the first 200 steps, then gradually separate.'
question: 'After switching from TP=1 to TP=4, what are the most likely causes of loss divergence after 500 steps, and how would you systematically debug it?'
details:
  realistic_solution: 'Root causes: (1) AllReduce non-determinism: FP32/BF16 addition is not associative. Different reduction trees accumulate different errors. Fix: deterministic NCCL. (2) Dropout seed mismatch: replicated regions need identical seeds, partitioned need independent. (3) Gradient scaler mismatch.'
  common_mistake: |
    **The Pitfall:** Blaming NCCL bugs or hardware errors.
    **The Rationale:** It's a natural inclination to assume a system issue when changing parallelism changes the outcome.
    **The Consequence:** The most common cause, non-deterministic floating-point reduction order in AllReduce which accumulates different rounding errors, is ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - BF16 mantissa: 7 bits (relative precision ~1/128 ≈ 0.8%).
    - TP=4 reduction over 500 steps.

    **Calculations:**
    - Random walk accumulated error over N steps = sqrt(N) × base_error.
    - Error at 500 steps = sqrt(500) × 0.8% = 22.3 × 0.8% = ~17.8%.

    **Conclusion & Interpretation:**
    - **Result: 17.8% relative error (FP-Non-Associativity-Bound)**. Accumulated error severely perturbs gradients.
