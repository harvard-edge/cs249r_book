title: Cloud New 0007
scenario: Architect a cost-optimal heterogeneous serving platform for a 30B LLM. You have access to A100
  80GB nodes for prefill and cheap T4 16GB nodes for decoding. Design the disaggregated serving architecture.
question: "How would you design disaggregated serving for a 30B LLM using A100s for prefill and T4s for decoding?"
details:
  realistic_solution: Architect a KV-cache transfer mechanism over the network. Route incoming user prompts
    to the A100 instances, which execute the prefill phase utilizing their 312 TFLOPS. Once the prompt
    is processed, transmit the generated KV-cache to a pool of T4 GPUs. The T4s, using their 320GB/s bandwidth,
    handle the auto-regressive decoding phase token-by-token. Use a lightweight router to track T4 memory
    availability and handle the handoff seamlessly before starting decoding.
  common_mistake: Placing both prefill and decode on T4s, severely bottlenecking time-to-first-token due
    to their low 65 TFLOPS compute capability.
  napkin_math: 30B = 60GB FP16. T4 has 16GB, so TP=4 minimum for decoding. Prefill on A100 (2.0TB/s) is
    ~6x faster than T4 pool. Transferring 1GB KV cache over 50GB/s IB takes 20ms, easily hidden by pipeline
    parallel scheduling.
