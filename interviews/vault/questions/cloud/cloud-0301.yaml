title: The Lifecycle TCO Inversion
scenario: You are evaluating the Total Cost of Ownership (TCO) for a large-scale model, such as a production recommender system, over its entire multi-year lifecycle.
question: Over a multi-year lifecycle, how does the one-time training cost typically compare with the cumulative inference cost?
details:
  realistic_solution: The cumulative cost of inference overwhelmingly dominates the one-time training cost. Training is a large but infrequent cost, while inference is a continuous, high-volume cost.
  common_mistake: |
    **The Pitfall:** Fixating on the large, visible capital expenditure (CapEx) of training a model.
    **The Rationale:** Engineers underestimate that inference is an operational expenditure (OpEx) that runs continuously 24/7 for years.
    **The Consequence:** Severely under-budgeting the product lifecycle and over-optimizing for training speed at the expense of serving efficiency.
  napkin_math: |
    - **Training Phase:** A one-time localized CapEx burst.
    - **Inference Phase:** A continuous OpEx drain serving billions of queries.
    - **Result:** The cumulative inference cost overwhelmingly dominates, often by **5x to 10x**.
  options:
  - Training cost is dominant, typically 5-10x greater than cumulative inference cost.
  - The costs are roughly equal (a 1:1 ratio).
  - Cumulative inference cost is dominant, typically 5-10x greater than training cost.
  - The costs are unrelated (CapEx vs. OpEx) and not directly comparable.
  correct_index: 2
