title: The Lifecycle TCO Inversion
scenario: When evaluating the Total Cost of Ownership (TCO) for a large-scale model, such as a production
  recommender system, over its entire multi-year lifecycle, what is the typical relationship between the
  one-time training cost and the cumulative inference cost?
details:
  realistic_solution: The cumulative cost of inference overwhelmingly dominates the one-time training
    cost, typically by a factor of 5x to 10x or even more over a product's lifecycle. Training is a large
    but infrequent cost, while inference is a continuous, high-volume cost. For every dollar spent on
    training, you should expect to spend many more on serving predictions to users.
  common_mistake: Engineers often fixate on the large, visible capital expenditure (CapEx) of training
    a model, which can be millions of dollars. They incorrectly assume this is the biggest part of the
    budget, underestimating that inference is an operational expenditure (OpEx) that runs 24/7 for years,
    making its cumulative cost far larger.
  napkin_math: The core insight is the 'stock vs. flow' nature of cost.
  options:
  - Training cost is dominant, typically 5-10x greater than cumulative inference cost.
  - The costs are roughly equal (a 1:1 ratio).
  - Cumulative inference cost is dominant, typically 5-10x greater than training cost.
  - The costs are unrelated (CapEx vs. OpEx) and not directly comparable.
  correct_index: 2
