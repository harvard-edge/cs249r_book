title: Global Gateway Rollback Impact Calculation
scenario: An active-active multi-region inference gateway routing 20,000 global requests/sec deploys a
  flawed model version that increases P99 latency by 500ms. An automated rollback is triggered. Global
  load balancer routing updates take 45 seconds to fully propagate to edge points of presence (PoPs).
  Once propagated, the regional API gateways take 60 seconds to linearly drain existing connections from
  the bad model instances to the restored baseline instances. Calculate the total number of user requests
  subjected to the degraded latency.
question: "How many requests experience degraded latency during the 45-second routing propagation and 60-second linear drain rollback?"
details:
  realistic_solution: Account for both the static delay period (100% traffic) and the linear drain period
    (average 50% traffic) to find the total sum of impacted requests.
  common_mistake: Only calculating the drain period and forgetting the static routing propagation delay,
    or calculating the drain period at 100% traffic instead of a 50% integral average.
  napkin_math: 'Phase 1 (Propagation): 45s * 20,000 req/s = 900,000 requests. Phase 2 (Linear Drain):
    60s * (20,000 / 2) req/s average = 600,000 requests. Total Degraded = 900,000 + 600,000 = 1,500,000
    requests.'
