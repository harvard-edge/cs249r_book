title: 'Queueing Theory Mastery: SLA-Driven Capacity Planning for H100 Fleet'
scenario: 'You must design a globally distributed H100 inference fleet. Requirements: p99<200ms, p999<1s,
  availability 99.9%, peak λ=50,000 req/s globally, mean service time 8ms, service time CV=2.0 (high variance).
  Standard M/M/1 assumptions break down. Design a capacity plan using G/G/c queuing bounds and explain
  how to achieve the p999 SLA.'
question: "What G/G/c capacity plan would meet p99<200 ms and p999<1 s for 50,000 req/s with service-time CV=2.0?"
details:
  realistic_solution: 'For G/G/c (Kingman''s approximation): Wq ≈ (C_a²+C_s²)/2 × M/M/c_wait. With C_a=1
    (Poisson), C_s=2 (high variance), multiplier=(1+4)/2=2.5× versus M/M/c. Target utilization ρ=0.6 for
    p999<1s given CV=2. Load per region: 50000/3 regions ≈ 16667/s. Per-region servers: c = ceil(λ/(μ×ρ))
    = ceil(16667/(125×0.6)) = ceil(222) = 222 H100s per region. p999 estimate: 5-6× mean system time =
    5×(8+Wq_adjusted)ms. With Kingman correction, Wq≈2.5×M/M/c_Wq. Set c=250/region for safety.'
  common_mistake: Using M/M/1 or even M/M/c formulas for high-variance workloads; underestimating tail
    latency when CV>1.
  napkin_math: 'μ=125/s, λ_region=16667/s, target ρ=0.6 → c=222 H100s/region. Kingman factor 2.5 → effective
    Wq=2.5× M/M/c value. M/M/c at ρ=0.6, c=222: Wq≈1ms → adjusted 2.5ms. W_total=10.5ms mean. p999≈6×10.5=63ms
    well under 1s SLA.'
