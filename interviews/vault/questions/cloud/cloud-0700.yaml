title: The FSDP Memory Calculation
scenario: You need to fine-tune a 70-billion parameter LLM on a pod of 16 H100s. Using the Adam optimizer,
  calculate the approximate memory required per GPU for model parameters, gradients, and optimizer states,
  assuming you are using a Fully Sharded Data Parallelism (FSDP) strategy like ZeRO-3.
question: "Using FSDP/ZeRO-3 on 16 H100s, how much memory per GPU is needed for parameters, gradients, and Adam states for a 70B LLM?"
details:
  realistic_solution: FSDP shards all the training components (parameters, gradients, and optimizer states)
    across the GPUs. The rule of thumb for training with the Adam optimizer is a memory requirement of
    16 bytes per parameter. For a 70B model, this is 1120 GB in total. When sharded across 16 H100 GPUs,
    each GPU is responsible for just a fraction of that state, making the training feasible within the
    80 GB of HBM available on each accelerator.
  common_mistake: The most common mistake is to confuse FSDP with standard Data Parallelism (DP). In DP,
    each GPU holds a full replica of the model, gradients, and optimizer states, leading to enormous memory
    requirements that would not fit. FSDP, by contrast, shards these states across the available devices.
    Another frequent error is to only account for the model parameters (at 2 bytes/param for FP16) and
    forget the much larger memory footprint of the gradients (2 bytes/param) and Adam optimizer states
    (12 bytes/param).
  napkin_math: "1. **Total Parameters:** 70 billion.\n2. **Memory per parameter (Adam optimizer, mixed\
    \ precision):**\n   - FP16 parameters: 2 bytes/param.\n   - FP16 gradients: 2 bytes/param.\n   - FP32\
    \ master weights: 4 bytes/param.\n   - FP32 first moment (m): 4 bytes/param.\n   - FP32 second moment\
    \ (v): 4 bytes/param.\n   - **Total: 16 bytes/param.**\n3. **Total memory without sharding:**\n  \
    \ 70B × 16 bytes = **1,120 GB** (1.09 TB).\n4. **With FSDP (ZeRO-3) across 16 GPUs:**\n   All three\
    \ components (params, gradients, optimizer states) are sharded equally.\n   Per-GPU memory = 1,120\
    \ GB / 16 = **70 GB**.\n5. **Does it fit on an 80 GB H100?**\n   70 GB for sharded training state\
    \ leaves **10 GB** for activations.\n   This is tight — activation checkpointing (recomputation) is\
    \ almost certainly required to fit within the remaining 10 GB headroom.\n6. **Comparison with no sharding\
    \ (standard DDP):**\n   Each GPU would need the full 1,120 GB — impossible on any single GPU. Even\
    \ ZeRO-1 (optimizer-only sharding) requires 70B × 4 bytes (params+grads) + 70B × 12 bytes / 16 (optimizer)\
    \ = 280 + 52.5 = 332.5 GB per GPU — still far exceeds 80 GB.\n   **FSDP/ZeRO-3 is the only viable\
    \ option for 70B on 16 GPUs.**"
  options:
  - 1120 GB
  - 8.75 GB
  - 70 GB
  - 140 GB
  correct_index: 2
