title: The FSDP Memory Calculation
scenario: You are fine-tuning a 70-billion parameter LLM on a pod of 16 H100s using
  the Adam optimizer and a Fully Sharded Data Parallelism (FSDP) strategy like ZeRO-3.
question: Using FSDP/ZeRO-3 on 16 H100s, how much memory per GPU is needed for parameters,
  gradients, and Adam states for a 70B LLM?
details:
  realistic_solution: 'FSDP shards all the training components (parameters, gradients,
    and optimizer states) across the GPUs. The rule of thumb for training with the
    Adam optimizer is a memory requirement of 16 bytes per parameter. For a 70B model,
    this is 1120 GB in total. When sharded across 16 GPUs, each GPU is responsible
    for just a fraction of that state.

    '
  common_mistake: '**The Pitfall:** Confusing FSDP with standard Data Parallelism
    (DP) and calculating memory based on full replication.

    **The Rationale:** Candidates frequently only account for the model parameters
    (2 bytes/param) and forget the much larger memory footprint of the gradients and
    optimizer states.

    **The Consequence:** The resulting calculation incorrectly suggests the model
    will not fit, leading to poor hardware procurement choices.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 70B parameter model.

    - 16 H100 GPUs (80 GB each).

    - Adam optimizer, mixed precision (16 bytes/param total).


    **Calculations:**

    - Total memory w/o sharding: 70B * 16 bytes = 1,120 GB.

    - Sharded across 16 GPUs (ZeRO-3): 1,120 GB / 16 = 70 GB per GPU.


    **Conclusion & Interpretation:**

    - **Result: 70 GB per GPU (VRAM-Capacity-Bound)**. This safely fits within the
    80 GB limit, leaving 10 GB to spare for activations.

    '
  options:
  - 1120 GB
  - 8.75 GB
  - 70 GB
  - 140 GB
  correct_index: 2
