title: The FSDP Memory Calculation
scenario: You need to fine-tune a 70-billion parameter LLM on a pod of 16 H100s. Using the Adam optimizer, you must calculate the approximate memory required per GPU for model parameters, gradients, and optimizer states, assuming you are using a Fully Sharded Data Parallelism (FSDP) strategy like ZeRO-3.
question: Using FSDP/ZeRO-3 on 16 H100s, how much memory per GPU is needed for parameters, gradients, and Adam states for a 70B LLM?
details:
  realistic_solution: FSDP shards all the training components (parameters, gradients, and optimizer states) across the GPUs. The rule of thumb for training with the Adam optimizer is a memory requirement of 16 bytes per parameter. For a 70B model, this is 1120 GB in total. When sharded across 16 GPUs, each GPU is responsible for just a fraction of that state.
  common_mistake: |
    **The Pitfall:** Confusing FSDP with standard Data Parallelism (DP) and calculating memory based on full replication.
    **The Rationale:** Candidates frequently only account for the model parameters (2 bytes/param) and forget the much larger memory footprint of the gradients and optimizer states.
    **The Consequence:** The resulting calculation incorrectly suggests the model will not fit, leading to poor hardware procurement choices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model.
       - 16 H100 GPUs (80 GB each).
       - Adam optimizer, mixed precision (16 bytes/param total).
    2. **Calculations:**
       - Total memory w/o sharding: 70B * 16 bytes = 1,120 GB.
       - Sharded across 16 GPUs (ZeRO-3): 1,120 GB / 16 = 70 GB per GPU.
    3. **Conclusion & Interpretation:**
       - **Result: This requires 70 GB per GPU, safely fitting within the 80 GB limit with 10 GB to spare for activations. System is VRAM-Capacity-Bound.**
  options:
  - 1120 GB
  - 8.75 GB
  - 70 GB
  - 140 GB
  correct_index: 2
