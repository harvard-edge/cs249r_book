title: Validation Gate Latency Budget
scenario: 'Your validation pipeline has 5 gates: accuracy check (10 min), fairness audit (20 min), latency
  benchmark (15 min), data quality scan (5 min), and regression suite (30 min). Gates run sequentially.
  You deploy 3x/week. Calculate total validation time per week and design a parallel execution plan to
  cut it in half.'
question: "What is the weekly validation time sequentially, and how would you parallelize the 5 gates to cut wall time by at least half?"
details:
  realistic_solution: 'Sequential total: 10+20+15+5+30 = 80 minutes per deployment. 3x/week: 240 minutes/week
    (4 hours). Dependency analysis: data quality scan should run FIRST (validates inputs to other gates).
    The remaining 4 gates are independent of each other — they all operate on the trained model artifact.
    Parallel plan: Phase 1 (data quality scan): 5 minutes. Phase 2 (parallel): accuracy (10 min), fairness
    (20 min), latency (15 min), regression (30 min) — all run simultaneously. Phase 2 wall time: max(10,20,15,30)
    = 30 minutes. Total: 5 + 30 = 35 minutes per deployment. 3x/week: 105 minutes (1.75 hours). Speedup:
    80/35 = 2.3x. This exceeds the 2x target. Cost: need 4 parallel evaluation environments during Phase
    2 (4 × 30 = 120 GPU-minutes vs 1 × 80 = 80 GPU-minutes — 50% more GPU-minutes for 2.3× faster turnaround).'
  common_mistake: Running all gates sequentially when many are independent. Only gates with data dependencies
    must be sequential; independent gates can run in parallel.
  napkin_math: 'Sequential: 10+20+15+5+30 = 80 min. Parallel (after dependency analysis): 5 min data quality
    + max(10,20,15,30) = 35 min. 2.3x speedup. Cost: 4 GPUs × 30 min = 120 GPU-minutes vs 1 GPU × 80 min
    = 80 GPU-minutes. Parallel execution uses 1.5× more GPU-minutes (50% higher resource cost) in exchange
    for 2.3× faster wall time.'
