title: Validation Gate Latency Budget
scenario: 'Your validation pipeline has 5 gates: accuracy check (10 min), fairness audit (20 min), latency benchmark (15 min), data quality scan (5 min), and regression suite (30 min). Gates run sequentially. You deploy 3x/week.'
question: 'What is the weekly validation time sequentially, and how would you parallelize the 5 gates to cut wall time by at least half?'
details:
  realistic_solution: 'Sequential total: 10+20+15+5+30 = 80 minutes per deployment. 3x/week: 240 minutes/week (4 hours). Dependency analysis: data quality scan should run FIRST (validates inputs to other gates). The remaining 4 gates are independent of each other — they all operate on the trained model artifact. Parallel plan: Phase 1 (data quality scan): 5 minutes. Phase 2 (parallel): accuracy (10 min), fairness (20 min), latency (15 min), regression (30 min) — all run simultaneously. Phase 2 wall time: max(10,20,15,30) = 30 minutes. Total: 5 + 30 = 35 minutes per deployment. 3x/week: 105 minutes (1.75 hours). Speedup: 80/35 = 2.3x. This exceeds the 2x target. Cost: If using serverless/cloud runners, total GPU-minutes remain exactly the same (80 GPU-minutes), as each task releases its GPU upon completion. If using a static 4-GPU allocation for Phase 2, cost increases to 125 GPU-minutes (1 × 5 + 4 × 30), a ~56% overhead.'
  common_mistake: |
    **The Pitfall:** Running all validation gates sequentially when many are completely independent.
    **The Rationale:** Build pipelines are often created linearly by default, with engineers assuming each step must finish before the next begins.
    **The Consequence:** Tripling the wall-clock time required for deployment validation, severely degrading developer velocity and time-to-production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential total: 10 + 20 + 15 + 5 + 30 = 80 min.
    - Data Quality runs first (5 min).

    **Calculations:**
    - Parallel Phase 2 (Accuracy, Fairness, Latency, Regression): max(10, 20, 15, 30) = 30 min.
    - Parallel total: 5 min + 30 min = 35 min (2.3x speedup).

    **Conclusion & Interpretation:**
    - **Result: 35 minutes (Parallelization Speedup)**. Cost remains 80 GPU-minutes if GPUs are released immediately upon completion, but using a static 4-GPU cluster for Phase 2 wastes idle cycles, costing 125 GPU-minutes.
