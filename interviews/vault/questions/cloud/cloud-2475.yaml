title: The Edge LLM Memory Wall
scenario: You deploy an 8B parameter LLM (4-bit quantized) to a new Edge AI PC featuring a 45 TOPS NPU. A cloud T4 GPU (65 TFLOPS) achieves 30 tokens/sec. The Edge NPU only achieves 8 tokens/sec, despite 45 TOPS being highly competitive with 65 TFLOPS for low-precision math. The NPU utilization is under 5%.
question: What is the limiting factor preventing the Edge NPU from achieving higher tokens/sec?
details:
  realistic_solution: Autoregressive LLM generation at batch size 1 is strictly memory-bandwidth bound, not compute bound. The TOPS rating is irrelevant for token generation because every parameter must be loaded from RAM exactly once per token. The Edge PC uses standard LPDDR5 memory shared with the CPU, which has vastly lower bandwidth than the dedicated GDDR6 memory on a cloud GPU. The NPU is starved for data and spends 95% of its time waiting for memory fetches.
  common_mistake: |
    **The Pitfall:** Assuming the NPU driver has high overhead or dequantization kernels are unoptimized.
    **The Rationale:** Candidates often focus on compute optimization (TOPS) and ignore the fundamental memory bandwidth requirements of autoregressive generation.
    **The Consequence:** Wasting engineering effort on compute optimizations that cannot overcome the physical memory bandwidth bottleneck.
  napkin_math: |
    1. Model size: 8 billion parameters * 4 bits (0.5 bytes) = 4 GB.
    2. Cloud T4 GPU memory bandwidth: 320 GB/s. Theoretical max = 320 / 4 = 80 tok/s.
    3. Edge PC LPDDR5 bandwidth: 32 GB/s. Theoretical max = 32 / 4 = 8 tok/s.
    **The hardware is mathematically memory-capped at 8 tok/s regardless of compute TOPS.**
