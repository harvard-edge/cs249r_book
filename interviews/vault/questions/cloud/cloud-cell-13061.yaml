title: 'Systolic Array Evaluation: Batched vs Streaming Inference on TPU'
scenario: Compare batched inference (batch=128, static shapes) vs streaming inference (batch=1, dynamic
  shapes) on TPU v5e (16GB HBM, 197 TFLOPS BF16) for ResNet-50 (4.1 GOPS, 25M params BF16). Calculate
  arithmetic intensity, throughput, and latency for each mode. Which is preferred for interactive vs batch
  serving?
question: "For ResNet-50 on TPU v5e, what are throughput and latency for batch=128 versus batch=1, and which mode fits interactive vs batch serving?"
details:
  realistic_solution: 'Batch=128: FLOPs = 4.1G * 128 = 525G. Weight bytes = 25M * 2 = 50MB. AI = 525G
    / 50M = 10,500 FLOPs/byte — massively compute bound. Throughput: 525G / 197T = 2.66ms for 128 images
    = 48,120 img/s. Batch=1: FLOPs = 4.1G. AI = 4.1G/50M = 82 FLOPs/byte < ridge (240). Memory bound:
    50MB / 819GB/s = 0.061ms per image. Latency: 0.061ms. Throughput: 1/0.061ms = 16,393 img/s. Batch=128
    wins 3x on throughput; batch=1 wins on latency (0.061ms vs 2.66ms/128 = 0.021ms per image — batch=128
    also wins on per-image latency at steady state).'
  common_mistake: Not recognizing that TPU systolic arrays require XLA compilation to fixed shapes, and
    dynamic batch sizes require recompilation or padding (wasted compute) — unlike GPU CUDA kernels that
    handle variable shapes.
  napkin_math: 'Batch=128: FLOPs=4.1G*128=525G. BW need: 50MB weights. AI=10,500. Compute bound: 525G/197T=2.66ms/batch,
    20.8μs/image. Throughput: 1000/2.66ms*128=48,120 img/s. Batch=1: BW bound: 50MB/819GB/s=61μs. Latency=61μs.
    Throughput=16,393 img/s. Batch=128 wins throughput 2.94x. Per-image latency: 61μs (batch=1) vs 20.8μs
    (batch=128) — batch=128 actually lower latency per image but 128x higher queuing delay to form batch.
    Interactive: use batch=1 (low queuing delay). Batch serving: use batch=128.'
