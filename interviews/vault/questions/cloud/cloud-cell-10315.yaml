title: Realizing How Liquid Cooling Changes PUE for H100 Deployments
scenario: A datacenter team air-cools a 512-GPU H100 cluster and measures PUE = 1.55. They are evaluating
  direct liquid cooling (DLC) with cold plates on H100 SXM5 modules to reduce PUE. A vendor claims DLC
  will bring PUE to 1.15. Walk through where the power savings come from and what infrastructure changes
  are required.
question: "Where would direct liquid cooling save power versus the current PUE 1.55 air-cooled H100 cluster, and what infrastructure changes are required?"
details:
  realistic_solution: 'In air cooling, CRAC units and associated compressors consume 30–50% of IT load.
    With DLC: cold plates on H100 SXM5 capture 70–80% of GPU heat directly into water loop (inlet temp
    35–45°C), bypassing room-level air handling. Remaining heat (CPUs, memory, storage) still uses air
    cooling or rear-door heat exchangers. The warm water loop uses dry coolers or cooling towers — no
    compressor-based refrigeration needed if ambient temp allows free cooling. Infrastructure changes:
    chilled water CDU (Coolant Distribution Unit) per row, manifolds to each server, leak detection, secondary
    loop isolation valves, and deionized water treatment systems.'
  common_mistake: Assuming liquid cooling only reduces GPU temperature without understanding the system-level
    cooling chain; not realizing that CRAC/CRAH units (chillers, fans, compressors) account for the majority
    of the 0.55 PUE overhead in air-cooled facilities.
  napkin_math: '512 H100 × 700 W = 358.4 kW IT load. Air cooling at PUE 1.55: total facility = 555.5 kW,
    overhead = 197.1 kW. DLC at PUE 1.15: total = 412.2 kW, overhead = 53.8 kW. Savings: 143.3 kW. Annual:
    143.3 kW × 8,760 hr × $0.10/kWh = $125,530/yr electricity savings. DLC infrastructure cost: ~$500–800K
    for a 500 kW deployment. Payback: 4–6 years on electricity alone, faster with carbon credits.'
