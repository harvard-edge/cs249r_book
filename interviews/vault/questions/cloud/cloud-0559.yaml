title: The Privacy Throughput Cliff
scenario: 'A security audit reveals our medical LLM is vulnerable to membership inference attacks — an
  attacker can determine if a specific patient''s records were in the training set. The privacy team mandates
  Differentially Private SGD (DP-SGD) with ε=1. Your training infrastructure team comes back and says:
  ''DP-SGD will increase training time by 10× and require 3× more GPU memory.'' Why does adding privacy
  guarantees have such a devastating systems cost, and how do you bring it down to something feasible?'
details:
  realistic_solution: 'Standard SGD computes one gradient for the entire batch (efficient — one backward
    pass). DP-SGD requires *per-example* gradients because you must clip each example''s gradient independently
    before aggregating. On an H100 with batch size 64, this means 64 separate backward passes instead
    of 1 — a 64× compute increase for the backward pass. The memory cost comes from storing 64 separate
    gradient tensors simultaneously. For a 7B model: standard gradient = 14 GB (FP16). Per-example gradients
    for batch 64 = 14 GB × 64 = 896 GB — doesn''t fit on any single GPU. Fixes: (1) use JAX''s `vmap`
    for efficient per-example gradients (2-3× overhead instead of 64×), (2) gradient accumulation with
    micro-batches of 1, (3) DP-LoRA (apply DP only to low-rank adapter weights, reducing the gradient
    tensor from 7B to ~10M parameters).'
  common_mistake: '"DP-SGD just adds noise to gradients — that should be nearly free." This ignores the
    per-example gradient requirement.'
  napkin_math: '7B model, batch 64, FP16. Standard backward: 1 pass × 14 GB gradients = 14 GB. DP-SGD
    naive: 64 passes × 14 GB = 896 GB (impossible). DP-SGD with `vmap`: 1 pass × 14 GB × ~3× overhead
    = 42 GB (fits on H100 80 GB). DP-LoRA (rank 16): 64 × 20 MB = 1.3 GB per-example gradients — trivial.
    Training time: standard = 1,000 GPU-hours. DP-SGD naive = 10,000 GPU-hours. DP-LoRA = 1,500 GPU-hours.'
