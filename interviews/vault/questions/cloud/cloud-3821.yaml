title: 'MoE Quantization: Expert-Level vs Layer-Level Calibration'
scenario: You quantize Mixtral 8×7B from FP16 to INT4 using GPTQ calibration. When
  you apply the same calibration dataset (1024 sequences) uniformly, experts that
  handle rare token types (code, math) show much worse quality than experts handling
  common text. Per-expert perplexity varies from 3.1 to 8.7. What went wrong and how
  do you fix it?
question: What went wrong and how do you fix it?
details:
  realistic_solution: 'GPTQ calibrates quantization by analyzing activation distributions
    on calibration data. If expert 5 specializes in code but the calibration set has
    minimal code, the quantizer sees an unrepresentative activation distribution for
    expert 5 and chooses poor scaling factors. Result: expert 5''s weights are badly
    quantized, producing 8.7 perplexity. Fix: Expert-level calibration. (1) Run the
    router on a diverse calibration dataset. (2) For each expert, collect only the
    tokens that are actually routed to it. (3) Calibrate each expert''s quantization
    independently using its own token distribution. (4) This ensures each expert''s
    weight quantization matches its actual activation distribution. Additionally:
    use mixed precision per expert. High-traffic experts (common text) can be INT4
    with minimal quality loss. Low-traffic experts (specialized: code, math) should
    be INT8 or even stay FP16 — they use little memory relative to total since they
    are rarely activated, but their quality matters more per token. This ''mixed-precision
    MoE'' approach can save 50% memory while preserving specialized expert quality.'
  common_mistake: Using the same calibration data for all experts. In MoE, each expert
    processes a different subset of tokens — a calibration dataset dominated by English
    text provides poor calibration for the code or math expert.
  napkin_math: '8 experts uniform INT4: 46.7B × 0.5B = 23.4 GB. Mixed precision (4
    experts INT4 + 4 experts INT8): 4×5.8B×0.5 + 4×5.8B×1.0 = 11.6 + 23.2 = 34.8 GB.
    Still fits MI300X (192 GB). Quality: uniform INT4 perplexity 3.1-8.7 (avg 4.2).
    Per-expert calibrated: 3.1-4.0 (avg 3.3). Mixed precision: 3.0-3.5 (avg 3.1).'
