title: GPUDirect Storage and RDMA for Checkpoint Loading on H100
scenario: Checkpointing a 70B parameter model (280GB BF16) to NFS takes 8 minutes. Restoring after failure takes 12 minutes, causing 20-minute recovery windows during 14-day training. Evaluate GPUDirect Storage (GDS) as a solution and calculate the expected improvement.
question: "Would GPUDirect Storage meaningfully reduce 70B checkpoint save and restore times to NFS, and what improvement should you expect?"
details:
  realistic_solution: 'Current path: GPU HBM -> CPU DRAM (PCIe, 64GB/s) -> CPU copy -> NFS write. CPU copy overhead = 280GB / 64GB/s = 4.4s (CPU copy). NFS bandwidth: 280GB / 480s = 0.58GB/s -> NFS is the bottleneck, not the CPU copy! GDS path: GPU HBM -> P2P RDMA to storage NIC -> NFS server. Eliminates CPU copy but NFS throughput is still 0.58GB/s. GDS speedup limited. Real fix: NFS server RDMA bandwidth upgrade (25GbE -> 100GbE), or use distributed checkpointing with multiple NFS servers in parallel.'
  common_mistake: |
    **The Pitfall:** Assuming GPUDirect Storage always provides a massive speedup.
    **The Rationale:** Candidates fail to quantify the bottlenecks; they apply a "fast" technology without calculating that the network-attached storage throughput is orders of magnitude slower than the PCIe bus.
    **The Consequence:** Spending weeks engineering a complex RDMA/GDS implementation for a sub-1% performance improvement.
  napkin_math: |
    - **NFS throughput:** $280\text{GB} / 480\text{s} = 583\text{ MB/s}$.
    - **PCIe 4.0 x16 bandwidth:** $64\text{ GB/s}$.
    - **CPU copy time:** $280\text{GB} / 64\text{ GB/s} = 4.4\text{s}$.
    - **Comparison:** NFS time ($480\text{s}$) >> CPU copy time ($4.4\text{s}$).
    - **GDS impact:** GDS eliminates the 4.4s copy, saving $<1\%$ of total time.
    - **Fix:** 8 parallel NFS mounts at 10GbE each = $10\text{ GB/s}$. **Time drops to 28s.**
