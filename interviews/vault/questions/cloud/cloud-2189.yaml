title: The NCCL Collective Deadlock
scenario: >-
  Your distributed training job hangs at step 4,217. All GPUs show 0% utilization and NCCL logs
  show 'Timeout waiting for ring message.' You add NCCL_DEBUG=INFO and see that GPU 0 is executing AllReduce
  for the 'layer_42.weight' gradient, while GPU 3 is executing AllReduce for the 'layer_41.weight' gradient.
  GPU 3's profiler shows that layer 42's backward pass was skipped due to a conditional branch in the
  model.
question: >-
  Why did this cause a deadlock, and what invariant did the model code violate?
details:
  realistic_solution: 'The deadlock occurs because NCCL collectives are **matched by call order, not by name**. When all GPUs call AllReduce, NCCL matches the N-th call on GPU 0 with the N-th call on GPU 3 — it has no concept of ''which gradient'' is being reduced. If GPU 3 skipped layer 42''s backward pass (due to a conditional branch like `if random() > 0.5: skip`), it never calls AllReduce for that gradient. GPU 3''s N-th AllReduce call corresponds to layer 41, while GPU 0''s N-th call corresponds to layer 42. They are now executing different operations, and Ring AllReduce requires every GPU to participate — so both block forever. The violated invariant: **all GPUs must execute the same sequence of collective operations in the same order.** This means conditional computation paths (stochastic depth, dynamic routing, early exit) must ensure that collectives are called unconditionally. The fix: always call AllReduce even for skipped layers (with zero tensors), or use `torch.distributed.barrier()` to realign before collectives.'
  common_mistake: |
    **The Pitfall:** Blaming NCCL bugs or network failures for hangs.
    **The Rationale:** Candidates fail to realize that NCCL collectives are matched by call order, not by name. Conditional branches that skip gradients cause GPUs to desynchronize their collective calls.
    **The Consequence:** Wasting hours debugging network hardware when the root cause is a user-level model logic bug.
  napkin_math: |
    1. **Probability of deadlock:** With stochastic depth (p=0.1 per layer, 100 layers, 8 GPUs), P(at least one GPU skips) ≈ 1 - (0.9^8 + 0.1^8)^100 ≈ near certainty.
    2. **Timeout impact:** NCCL default timeout is 300 seconds → job hangs for 5 minutes before crashing.
    3. **Fix overhead:** A zero-tensor AllReduce costs only latency (~5 µs), which is negligible.
