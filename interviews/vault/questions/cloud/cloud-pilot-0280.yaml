title: Network Locality Bottleneck In Distributed Inference
scenario: A sharded inference service uses 8 GPUs per request. Within a node, NVLink provides 900 GB/s. Cross-node traffic uses 100 GB/s InfiniBand. After a placement change, half of requests span two nodes and P99 latency doubles, while GPU utilization remains low. Diagnose the bottleneck.
question: Why does P99 double when half of 8-GPU inference requests span two nodes instead of staying inside one NVLink domain?
details:
  realistic_solution: The bottleneck is network locality. Requests that used to communicate over 900 GB/s NVLink now cross a 100 GB/s inter-node link, a 9x bandwidth drop plus additional latency. Low GPU utilization is consistent with GPUs waiting on cross-node synchronization.
  common_mistake: Blaming insufficient GPU compute because utilization is low, when low utilization is a symptom of waiting on the network.
  napkin_math: Bandwidth ratio = 900/100 = 9x. Any synchronization-heavy shard exchange can become much slower when it leaves the node.
