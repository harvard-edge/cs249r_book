title: Advantages of Continuous Batching
scenario: In traditional static batching, the inference engine waits for all sequences in a batch to finish
  generating before starting a new batch. How does continuous batching (also known as in-flight batching)
  improve throughput compared to static batching?
details:
  realistic_solution: Continuous batching inserts new requests into the batch as soon as a sequence finishes,
    instead of waiting for the longest sequence in the batch to complete. In static batching, if a batch
    contains sequences generating 50 to 500 tokens, all sequences must wait for the 500-token sequence
    to finish — wasting GPU cycles on already-completed sequences. Continuous batching evicts completed
    sequences immediately and fills their slots with waiting requests, keeping the GPU fully utilized.
    This typically delivers 2-3x throughput improvement over static batching, while also reducing average
    latency since short requests no longer wait for long ones.
  common_mistake: Assuming continuous batching increases the generation speed of individual tokens rather
    than the overall system throughput.
  napkin_math: '- Static batch of 8 requests: lengths [50, 100, 200, 500, 50, 80, 120, 500] tokens. All
    wait for longest (500 tokens). | - GPU idle time for shortest request: (500−50)/500 = 90% wasted.
    Average waste across batch: ~60%. | - => Continuous batching fills vacated slots immediately. Throughput
    improvement: typically 2-3× over static batching.'
  options:
  - It increases the clock speed of the GPU dynamically to generate tokens faster for shorter sequences.
  - It allows new requests to join the active batch as soon as other sequences complete, preventing GPU
    underutilization caused by waiting for the longest sequence.
  - It batches all requests that have the exact same prompt length together, ensuring synchronized generation
    steps.
  - It caches the output tokens of the continuous stream to reuse them across different users in real-time.
  correct_index: 1
