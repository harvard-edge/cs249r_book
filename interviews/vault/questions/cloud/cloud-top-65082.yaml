title: ANN Index Rebuild Latency for Embedding Table Updates
scenario: A retrieval system uses an HNSW index over 10M item embeddings (128-dim). Embeddings are retrained
  daily and require a full index rebuild. The rebuild currently takes 4 hours, causing a 4-hour window
  where the retrieval index is stale. Reduce this to under 30 minutes.
question: "How would you cut the daily 10M-item HNSW index rebuild from 4 hours to under 30 minutes?"
details:
  realistic_solution: 'Parallel index construction: (1) HNSW GPU construction: use FAISS GPU with HNSW-like
    graph. GPU HNSW build on 10M items, 128-dim: using GPU IVF-PQ as a two-step approach — IVF clustering
    (fast on GPU) + PQ quantization. Build time on A100: ~5 minutes. (2) Hierarchical index: build a coarse
    IVF index (10K centroids, 1M items per batch). Each batch runs independently. 10 batches in parallel
    on 10 GPUs: 3 minutes. Merge indices. (3) Delta index: only rebuild the index for items whose embeddings
    changed significantly (L2 distance > threshold vs old embedding). If 10% of embeddings change daily:
    rebuild index for 1M items. Full HNSW rebuild for 1M: 10x faster = 25 minutes. Incremental HNSW add/update
    for changed nodes: even faster. (4) Background rebuild with hot-swap: maintain old index until new
    index is fully built and validated. Hot-swap is atomic (pointer swap to new index object). Zero serving
    downtime.'
  common_mistake: Running the HNSW build on a single CPU server. HNSW index construction is O(n * log(n)
    * M) where M is the graph connectivity parameter. For 10M items this is inherently sequential in the
    standard implementation, and single-server build takes hours due to memory bandwidth limits of the
    CPU.
  napkin_math: 'HNSW build complexity: O(n * M * log(n)) where M=32 (connectivity). For 10M items: 10M
    * 32 * 23 = 7.36B operations. CPU at 10B ops/sec: 0.74 seconds compute time. But memory access pattern
    is random (graph neighbor lookups) — memory-bound on CPU at 50GB/s: 10M * 32 neighbors * 128dim *
    4B = 163GB random accesses. At 50 GB/s (effective random access on DRAM): 3.3 seconds IO time. Why
    does it take 4 hours? Construction involves many cache-unfriendly operations. FAISS GPU: uses batched
    k-NN search on GPU (coalesced memory access). 10M * 128-dim, build 32 neighbors per node: GPU k-NN
    at 1M queries/sec: 10M / 1M = 10 seconds. Plus sorting and edge selection: ~5 minutes total on A100.'
