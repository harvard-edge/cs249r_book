title: Foundation Model Data Gravity Trade-offs
scenario: You are the lead architect for a foundation model training run utilizing a reserved cluster of 4,096 H100 GPUs in an AWS region. Your 20 PB multimodal training dataset currently resides in an on-premise datacenter connected to AWS via dual 100 Gbps Direct Connect links. The ML team proposes streaming the data directly into the cloud training pipeline over the WAN to avoid a $400,000/month S3 storage bill and bypass the migration phase. The data engineering team proposes keeping the GPUs idle for two weeks to completely migrate the data to S3 before starting.
question: Should you stream the 20 PB dataset over dual 100 Gbps links or migrate it to S3 before training on 4,096 H100s, and why?
details:
  realistic_solution: The data must be migrated to cloud object storage (S3) before training begins. At the petabyte scale, data possesses immense 'gravity' and dictates that compute must be co-located. While migrating the data takes significant time and incurs storage costs, streaming over the WAN will bottleneck the 4,096 GPUs, resulting in catastrophic utilization drops. The financial cost of idling the GPU cluster drastically outweighs the S3 storage costs.
  common_mistake: |
    **The Pitfall:** Focusing solely on avoiding the $400k storage bill and assuming 200 Gbps WAN is sufficient for streaming.
    **The Rationale:** Candidates calculate network capability without cross-referencing the immense burn rate of an idle supercomputing cluster.
    **The Consequence:** Starving the GPUs and wasting millions of dollars in compute time to save a fraction of that in storage costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset: 20 PB (160,000 Terabits).
       - WAN Bandwidth: 200 Gbps (0.2 Tbps).
       - Cluster: 4,096 H100s.
       - H100 cost: ~$3/hr.
       - S3 storage bill: $400,000/month.
    2. **Calculations:**
       - Minimum transfer time: 160,000 Tb / 0.2 Tbps = 800,000 seconds = ~9.25 days.
       - Cluster burn rate: 4,096 * $3/hr = $12,288/hr = ~$295,000/day.
       - Idle penalty for 9.25 days: 9.25 * $295,000 = ~$2.7 million.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound. The $2.7M compute waste vastly eclipses the $400k/month S3 storage bill. Migrate data fully before training.**
