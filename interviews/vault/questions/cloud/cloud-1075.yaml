title: Foundation Model Data Gravity Trade-offs
scenario: You are the lead architect for a foundation model training run utilizing a reserved cluster
  of 4,096 H100 GPUs in an AWS region. Your 20 PB multimodal training dataset currently resides in an
  on-premise datacenter connected to AWS via dual 100 Gbps Direct Connect links. The ML team proposes
  streaming the data directly into the cloud training pipeline over the WAN to avoid a $400,000/month
  S3 storage bill and bypass the migration phase. The data engineering team proposes keeping the GPUs
  idle for two weeks to completely migrate the data to S3 before starting. Evaluate both proposals. Which
  approach is structurally sound, and what is the quantitative justification for your decision?
question: "Should you stream the 20 PB dataset over dual 100 Gbps links or migrate it to S3 before training on 4,096 H100s, and why?"
details:
  realistic_solution: The data must be migrated to cloud object storage (S3) before training begins. At
    the petabyte scale, data possesses immense 'gravity' and dictates that compute must be co-located.
    While migrating the data takes significant time and incurs storage costs, streaming over the WAN will
    bottleneck the 4,096 GPUs, resulting in catastrophic utilization drops. The financial cost of idling
    the GPU cluster drastically outweighs the S3 storage costs.
  common_mistake: Focusing solely on the high storage cost savings and assuming that 200 Gbps of dedicated
    WAN bandwidth is sufficient, while failing to calculate the massive opportunity cost of idling a 4,096
    H100 GPU cluster due to network starvation.
  napkin_math: 'Dataset = 20 PB = 160,000 Terabits (Tb).

    WAN Bandwidth = 200 Gbps = 0.2 Tbps.

    Minimum Transfer Time for 1 Epoch = 160,000 / 0.2 = 800,000 seconds ≈ 9.25 days.

    Cluster Cost = 4,096 H100s @ ~$3/hr = ~$12,288/hr = ~$295,000/day.

    Idling the cluster for 9.25 days due to WAN bottlenecks wastes ~$2.7 million per epoch, which completely
    eclipses the $400,000/month cloud storage bill.'
