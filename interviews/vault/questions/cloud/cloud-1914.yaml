title: Diagnosing I/O Bottlenecks in Stochastic Data Loading
scenario: You are training a large vision model on an 8xA100 node with a 128-core AMD EPYC CPU. The training
  data consists of 50 million high-resolution images stored on a local NVMe RAID array. Despite the storage
  array being capable of 25 GB/s sequential reads, your data loading pipeline is only achieving 2 GB/s,
  starving the GPUs (utilization at 45%). System profiling shows high CPU I/O wait times and near-zero
  page cache hit rates. You are using standard PyTorch Datasets reading individual files with `shuffle=True`.
  Diagnose the root cause of this severe storage bottleneck.
details:
  realistic_solution: The bottleneck is the fundamental violation of spatial locality caused by stochastic
    data sampling, which renders OS readahead and page caching completely ineffective. The solution is
    to pre-shuffle data into contiguous coarse-grained chunks (e.g., using WebDataset or TFRecords format)
    to convert highly random, small I/O requests into massive sequential reads.
  common_mistake: Assuming the storage hardware is failing or that arbitrarily adding more data loader
    workers will scale read throughput without addressing the underlying disk access pattern.
  napkin_math: An NVMe array doing random 4KB reads might hit a wall at ~1M IOPS (4GB/s theoretical, ~2GB/s
    practical due to OS overhead and page faults). By chunking 1000 images (avg 100KB) into 100MB shards,
    we change the access pattern. Sequential reading of 100MB chunks allows the NVMe array to hit its
    25GB/s sequential limit, easily satisfying the ~10GB/s total consumption rate required by the 8xA100s.
