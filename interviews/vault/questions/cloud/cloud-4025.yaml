title: NCCL NET_PLUGIN Congestion Tuning
scenario: Your 256-GPU cluster's AllReduce throughput dropped 30% after a NCCL version upgrade. Profiling shows excessive retransmissions on the RoCE fabric. The new NCCL version changed default congestion parameters from NCCL_IB_TIMEOUT=18 to 14, and NCCL_IB_RETRY_CNT=7 to 3.
question: How did lowering NCCL_IB_TIMEOUT to 14 and NCCL_IB_RETRY_CNT to 3 cause retransmissions, and what values should you use?
details:
  realistic_solution: 'NCCL_IB_TIMEOUT specifies the local ACK timeout as 4.096µs × 2^timeout_value. Value 18 = 4.096µs × 2^18 = 1.07 seconds. Value 14 = 4.096µs × 2^14 = 67ms. In a congested 256-GPU cluster, AllReduce tail latencies can reach 100-200ms due to PFC pauses and DCQCN rate reduction. With a 67ms timeout, these legitimate delays trigger false retransmission timeouts, flooding the fabric with duplicate packets and worsening congestion — a positive feedback loop. Optimal settings: NCCL_IB_TIMEOUT=22 (17.2 seconds — generous, since real failures are detected by the subnet manager), NCCL_IB_RETRY_CNT=7 (maximum retries before error). Also set NCCL_IB_QPS_PER_CONNECTION=4 to spread traffic across multiple QPs, reducing per-QP congestion. And NCCL_ALGO=Ring for this cluster size since tree AllReduce at 256 GPUs creates more incast than ring.'
  common_mistake: |
    **The Pitfall:** Misunderstanding the exponential nature of IB timeout values and setting them too low to "fail fast."
    **The Rationale:** Engineers assume timeout values are linear or in milliseconds, not realizing that dropping the value by 4 (from 18 to 14) actually reduces the timeout by 16x.
    **The Consequence:** Legitimate network congestion delays are misinterpreted as packet loss, flooding the fabric with duplicate packets and creating a catastrophic positive feedback loop of congestion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 256-GPU cluster with RoCE fabric.
       - Old Timeout (18), New Timeout (14).
    2. **Calculations:**
       - Timeout Formula: 4.096 µs * 2^timeout_value.
       - Old Timeout (18): 4.096 µs * 2^18 = 1,073 ms.
       - New Timeout (14): 4.096 µs * 2^14 = 67 ms.
       - Wasted Traffic: Legitimate p99 delays hit ~150ms, triggering false timeouts and retransmitting ~800 MB/min.
    3. **Conclusion & Interpretation:**
       - **Result: The 67ms timeout causes a False-Positive-Bound congestion collapse by misinterpreting normal IB pauses as drops.**
