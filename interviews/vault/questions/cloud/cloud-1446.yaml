title: Analyzing True MFU vs GPU Utilization
scenario: You are training a 10B parameter transformer model on 1 Trillion tokens using a cluster of 256
  NVIDIA A100 GPUs (each with 312 TFLOPs peak BF16). The infrastructure team reports that the training
  run will take 35 days and notes that `nvidia-smi` consistently shows 95% GPU utilization, concluding
  that the cluster is highly optimized. Use the Iron Law of Training to analyze the true efficiency. What
  is the actual bottleneck?
details:
  realistic_solution: Calculate the true MFU using the Iron Law of Training. The MFU is only 25%. A high
    SM utilization alongside low MFU indicates GPUs are active but stalled on memory bandwidth, un-fused
    kernels, or fine-grained communication.
  common_mistake: Conflating `nvidia-smi` GPU utilization with Model FLOPs Utilization (MFU). Candidates
    often fail to realize that `nvidia-smi` only measures whether the SM is active, not whether it is
    doing useful math.
  napkin_math: Total Ops ≈ 6ND = 6 * 10B params * 1T tokens = 60 ZFLOPs. Peak Compute = 256 * 312 TFLOPs
    ≈ 80 PFLOPs. Time = 35 days ≈ 3,000,000 seconds. Actual Throughput = 60 ZFLOPs / 3M sec = 20 PFLOPs.
    True MFU = 20 PFLOPs / 80 PFLOPs = 25%.
