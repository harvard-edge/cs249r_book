title: Adaptive Speculation Depth Based on Token Entropy
scenario: 'You observe that your 7B draft model''s acceptance rate varies wildly within a single generation: alpha=0.95 for function headers, alpha=0.40 for complex logic. The current system uses a static speculation depth of K=5.'
question: "Design an entropy-based adaptive K system that monitors draft model confidence and adjusts speculation depth token-by-token."
details:
  realistic_solution: 'Monitor draft model''s output entropy H = -sum(p log p) at each speculated position. Entropy thresholds: H < 0.5 nats (confident, ~85% on top-1): continue speculating, likely alpha > 0.85. 0.5 < H < 2.0 nats (moderate): continue but mark as risky. H > 2.0 nats (high uncertainty): stop speculation at this position. Implementation: during draft generation, compute H at each token. If H exceeds threshold at position i, set K=i and proceed to verification. Example sequence: positions 1-3 have H=[0.2, 0.3, 0.1], position 4 has H=2.5. Adaptive K=3. Verification: 4 tokens (3 draft + 1 correction). Savings: avoided 2 tokens of draft computation (4ms) and 2 wasted verification tokens. Average K across workload: 3.2 (was 5 static). Throughput improvement: fewer wasted draft tokens = lower overhead = higher effective alpha.'
  common_mistake: |
    **The Pitfall:** Using only the top-1 probability as the confidence signal.
    **The Rationale:** Engineers assume the highest probability token fully captures the model's certainty.
    **The Consequence:** The system fails to distinguish between high-entropy uncertain positions (uniform distribution) and low-entropy bimodal positions (two competing tokens), leading to suboptimal speculation depths.
  napkin_math: |
    *   **Static K=5:** With effective $\alpha=0.70$, expected tokens $E = 2.94$. Overhead is $5 \times 2\text{ms} = 10\text{ms}$.
    *   **Adaptive K:** Average $K=3.2$, effective $\alpha=0.82$, expected tokens $E = 3.14$. Overhead is $3.2 \times 2\text{ms} = 6.4\text{ms}$.
    *   **Throughput (Static):** $2.94 / (10+25) = 84.0 \text{ tok/s}$.
    *   **Throughput (Adaptive):** $3.14 / (6.4+25) = 100.0 \text{ tok/s}$.
    *   **Result:** **Adaptive K improves throughput by ~19% by minimizing wasted draft computations.**
