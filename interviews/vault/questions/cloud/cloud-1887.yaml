title: Silicon Interposer Edge Density Calculation
scenario: You are designing the packaging for a new AI accelerator that uses a silicon interposer to connect a central compute die to 6 HBM3 memory stacks. Each HBM3 stack requires 1024 data channels running at 6.4 Gbps per channel. To maintain signal integrity, the silicon interposer routes these data signals along with power, ground, and control signals, which adds a 50% overhead to the total wire count per stack. The interposer's routing technology supports a maximum density of 400 wires per millimeter along the compute die's edge.
question: What are the total memory bandwidth and minimum compute-die edge length needed to interface with all 6 HBM3 stacks?
details:
  realistic_solution: |
    First, calculate the total bandwidth by converting Gbps to GB/s. Next, calculate the total number of wires needed by including the 50% overhead for non-data pins. Finally, divide the total wire count by the interposer's wire density limit to find the minimum compute die edge length.
  common_mistake: |
    **The Pitfall:** Failing to account for non-data pins or incorrectly converting Gbps to GB/s.
    **The Rationale:** Candidates focus only on the data channels and simple bandwidth math, missing the physical packaging constraints.
    **The Consequence:** Severely underestimating the required die area, leading to an physically unroutable interposer design.
  napkin_math: |
    - Bandwidth = 6 stacks * 1024 pins * 6.4 Gbps = 39,321.6 Gbps.
    - 39,321.6 Gbps / 8 = 4,915.2 GB/s.
    - Total Wires = 6 stacks * 1024 data pins * 1.5 (overhead factor) = 9,216 wires.
    - Edge Length = 9,216 wires / 400 wires/mm = 23.04 mm.
    - **Total bandwidth is 4,915.2 GB/s and minimum edge length is 23.04 mm.**
