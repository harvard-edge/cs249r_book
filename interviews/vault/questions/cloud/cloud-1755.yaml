title: Debugging Progressive Deployment Failures Across Tiers
scenario: You are implementing a Progressive Deployment architecture for a visual language model. The Cloud tier uses a 70B model, Mobile uses a 7B distilled version, and Edge uses a 1B distilled version (INT8, 1GB on smart cameras with 2GB total RAM). In production, edge cameras frequently suffer Out-Of-Memory (OOM) crashes during multi-object detection sequences, while the mobile tier experiences a 40% accuracy drop specifically when handling complex reasoning queries routed from the edge.
question: What is causing the edge-camera OOM crashes and the mobile tier’s 40% accuracy drop, and how would you fix them?
details:
  realistic_solution: 'The edge OOMs are caused by KV cache explosion. While the model is 1GB, the OS uses ~500MB. Processing multiple concurrent object streams linearly increases the KV cache, exceeding the remaining memory. Fix this by capping concurrent streams and quantizing the KV cache to INT8. The mobile accuracy collapse is a cascade routing failure: complex queries from the edge are overflowing to the mobile 7B model instead of the 70B cloud model, exceeding its reasoning capacity. Implement an uncertainty-based routing threshold to send high-complexity queries directly to the cloud.'
  common_mistake: |
    **The Pitfall:** Assuming the 1GB edge model safely fits in 2GB RAM.
    **The Rationale:** Failing to account for dynamic KV cache scaling during concurrent multi-object detection.
    **The Consequence:** Unpredictable OOM crashes on the edge, coupled with routing logic failures that overload the mid-tier mobile models with high-complexity queries.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Edge device: 2048 MB RAM total. OS uses 500 MB. 1B INT8 Model uses 1000 MB.
       - KV Cache (FP16): 96 KB per token. Context: 4096 tokens.
    2. **Calculations:**
       - Fixed overhead: 1000 MB + 500 MB = 1500 MB (548 MB free).
       - Single stream KV cache: 4096 tokens × 96 KB = 384 MB.
       - Dual stream KV cache (2 concurrent objects): 384 MB × 2 = 768 MB.
       - Total memory needed: 1500 MB + 768 MB = 2268 MB.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound.** The dynamic KV cache for multiple concurrent streams (768 MB) exceeds the remaining 548 MB of RAM, immediately causing an OOM crash.
