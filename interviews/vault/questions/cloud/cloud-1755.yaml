title: Debugging Progressive Deployment Failures Across Tiers
scenario: You are implementing a Progressive Deployment architecture for a visual language model. The
  Cloud tier uses a 70B parameter model (FP16, 140GB on 4x A100 80GB GPUs). The Mobile tier uses a 7B
  distilled version (INT4, 3.5GB on 8GB RAM phones). The Edge tier runs a 1B distilled version (INT8,
  1GB on smart cameras with 2GB total RAM). In production, edge cameras frequently suffer Out-Of-Memory
  (OOM) crashes during multi-object detection sequences, while the mobile tier experiences a 40% accuracy
  drop specifically when handling complex reasoning queries routed from the edge. The cloud model functions
  perfectly. Analyze and root-cause the edge OOMs and the mobile accuracy collapse.
details:
  realistic_solution: 'The edge OOMs are caused by KV cache explosion. While the model is 1GB, the OS
    uses ~500MB. Processing multiple concurrent object streams linearly increases the KV cache, exceeding
    the remaining memory. Fix this by capping concurrent streams and quantizing the KV cache to INT8.
    The mobile accuracy collapse is a cascade routing failure: complex queries from the edge are overflowing
    to the mobile 7B model instead of the 70B cloud model, exceeding its reasoning capacity. Implement
    an uncertainty-based routing threshold to send high-complexity queries directly to the cloud.'
  common_mistake: Assuming the 1GB edge model safely fits in 2GB RAM without accounting for dynamic KV
    cache scaling during multi-object detection, and mistakenly blaming the mobile accuracy drop on INT4
    quantization rather than a routing logic failure.
  napkin_math: 'Edge Total RAM = 2048 MB.

    Fixed Costs: Model (1B INT8) = 1000 MB, OS = 500 MB. Available = 548 MB.

    KV Cache per token (FP16): 2(K,V) * 2 bytes * 24 layers * 16 heads * 64 dim = 96 KB.

    For a 4K context sequence: 4096 * 96 KB = 384 MB.

    For 2 concurrent detection streams: 384 MB * 2 = 768 MB.

    Total Memory Required = 1500 MB + 768 MB = 2268 MB > 2048 MB (OOM crash).'
