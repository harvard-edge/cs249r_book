title: Alert Fatigue in ML Systems
scenario: Your ML platform generates 200+ alerts per day across 50 models. The on-call team acknowledges
  but ignores most of them. Last week, a critical model degradation was missed for 12 hours despite being
  alerted. Explain what alert fatigue is and why it is especially dangerous for ML systems.
question: "What is alert fatigue, and why did 200+ daily alerts make the 12-hour missed ML degradation likely?"
details:
  realistic_solution: 'Alert fatigue occurs when operators receive so many alerts that they become desensitized
    and stop responding — even to critical ones. ML systems are especially vulnerable because: (1) ML
    metrics are inherently noisy — accuracy fluctuates batch-to-batch, latency spikes with traffic patterns,
    and data quality varies daily. Static thresholds on noisy metrics generate excessive false alarms.
    (2) ML systems have more failure modes than traditional software — data drift, feature staleness,
    model degradation, concept drift — each with its own metrics and thresholds. (3) Multi-model platforms
    multiply the problem: 50 models × 4 alert rules each = 200 potential alerts. When operators ignore
    95% of alerts (because they are false positives), they inevitably miss the 5% that matter. The 12-hour
    missed incident is the classic consequence — the critical alert was buried in noise.'
  common_mistake: Thinking the solution is simply more alerts or stricter thresholds. More alerts worsens
    the problem. The issue is signal-to-noise ratio, not alert coverage.
  napkin_math: '200 alerts/day, 95% false positive rate = 190 noise + 10 real. Operator bandwidth: ~20
    alerts investigated/day. 10 real alerts compete with 190 noise → critical alerts missed.'
