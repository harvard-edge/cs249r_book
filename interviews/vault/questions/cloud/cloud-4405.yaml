title: Disaggregated Prefill-Decode Architecture for Tail Latency Control
scenario: Your LLM serving team observes that long-prompt requests (input > 4K tokens) are causing p99 TTFT to spike to 3.2 seconds, even when the median prompt is 256 tokens with p50 TTFT of 80ms. GPU utilization is 72%. Your current monolithic architecture runs prefill and decode on the same GPU pool.
question: How would you design a disaggregated prefill/decode architecture that achieves p99 TTFT < 500ms while maintaining end-to-end p99 generation latency < 4 seconds for a 500-token output, including the KV cache transfer cost?
details:
  realistic_solution: 'Design a separate prefill fleet (compute-optimized) from decode fleet (memory-bandwidth-optimized). Use Tensor Parallelism (TP=2) for prefill to meet TTFT SLA, then transfer the KV cache via fast network links, and use TP=4 for decode to meet the generation latency SLA.'
  common_mistake: |
    **The Pitfall:** Ignoring the KV cache transfer overhead in disaggregated architectures.
    **The Rationale:** Engineers focus on compute decoupling but forget the data movement latency between prefill and decode fleets.
    **The Consequence:** The system misses TTFT SLAs because the KV cache transfer latency dominates for long contexts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B params, 4K tokens.
       - H100 compute (989 TFLOPS), MI300X decode (5.3 TB/s).
    2. **Calculations:**
       - Prefill compute: 2 * 70B * 4096 = 573 TFLOPs. Single H100 = 579ms. TP=2 H100 ≈ 322ms.
       - KV cache transfer: 1.34 GB over 50 GB/s Ethernet = 26.8ms. TTFT ≈ 349ms.
       - Decode (MI300X): 140GB / 5.3 TB/s = 26.4ms/step. TP=4 decode = 6.6ms/step. 500 tokens = 3.3s.
    3. **Conclusion & Interpretation:**
       - **Result: Disaggregated architecture with TP=2 for prefill and TP=4 for decode meets SLAs.**
