title: Disaggregated Prefill-Decode Architecture for Tail Latency Control
scenario: Your LLM serving team observes that long-prompt requests (input > 4K tokens)
  are causing p99 TTFT (time to first token) to spike to 3.2 seconds, even when the
  median prompt is 256 tokens with p50 TTFT of 80ms. GPU utilization is 72%. Your
  current monolithic architecture runs prefill and decode on the same H100 pool. Design
  a disaggregated prefill/decode architecture that achieves p99 TTFT < 500ms while
  maintaining end-to-end p99 generation latency < 4 seconds for a 500-token output.
  Include the KV cache transfer cost in your analysis.
question: How would you design a disaggregated prefill/decode architecture to get
  p99 TTFT below 500 ms and p99 500-token latency below 4 s, including KV transfer?
details:
  realistic_solution: 'Disaggregation design: separate prefill fleet (compute-optimized:
    H100 @ 312 TFLOPS) from decode fleet (memory-bandwidth-optimized: MI300X @ 5.3
    TB/s). Prefill H100: 4K-token prefill takes 4,096 × 4 FLOPs × 70B params / 312
    TFLOPS = 4,096 × 280B / 312T = 3.7ms (compute-bound). KV cache size for 4K tokens,
    70B model (80 layers, GQA): 4,096 × 80 × 8 × 128 × 2 bytes = 536MB. Transfer at
    100 Gbps: 536MB / 12.5 GB/s = 43ms. This dominates! Use NVLink-C2C at 900 GB/s:
    536MB / 900 GB/s = 0.6ms. Within-cluster NVLink: must co-locate prefill and decode
    within same NVSwitch domain. With 43ms transfer on Ethernet: total TTFT = 3.7
    + 43 = 46.7ms for 4K. With NVLink: 4.3ms. Target p99 < 500ms met. End-to-end for
    500 tokens on MI300X: 500 steps × 1ms/step = 500ms. Meets <4s.'
  common_mistake: Ignoring the KV cache transfer overhead in disaggregated architectures.
    After prefill finishes on a prefill GPU, the KV cache (often 10-100MB for long
    contexts) must be transferred to the decode GPU before generation begins. At 400
    Gbps NVLink or 100 Gbps Ethernet, this transfer takes non-trivial time and can
    dominate TTFT for long sequences.
  napkin_math: 'Prefill compute: 2 × 70B params × 4,096 tokens FLOPs / 312 TFLOPS
    = 573,440B / 312,000B/ms = 1.84ms compute. Memory-bound check: 70B × 2 bytes =
    140GB weights, bandwidth-bound at: 140GB / 3,350 GB/s = 41.8ms. So prefill is
    compute-bound for 4K tokens (good). KV cache: 4,096 × 2 × 80 layers × (8 KV heads)
    × 128 dim × 2 bytes = 4,096×2×80×8×128×2 = 1,073,741,824 bytes? Recheck: 80 layers
    × 2 (K,V) × 8 heads × 128 head_dim × 4,096 tokens × 2 bytes = 80×2×8×128×4096×2
    = 671,088,640 bytes = 640MB. At 100 Gbps (12.5 GB/s): 640/12,500 = 51ms. At 900
    GB/s: 0.71ms. TTFT at 100 Gbps: 2ms prefill + 51ms transfer = 53ms (well under
    500ms p99 even with 5-10× tail factor). Decode: 500 tokens × (280GB / 5,300 GB/s
    per token) = 500 × 52.8ms? No: per-token decode = 2×70B × 2 bytes / 5,300 GB/s
    = 280GB / 5,300 = 52.8ms/token × 500 = 26.4s. Too slow! Need batch decode: batch
    10 = 5.28s per 500 tokens. Need MI300X batch ≥ 6 to meet 4s.'
