title: Module Design for Serialization Robustness
scenario: Team A stores model architecture in code and only serializes state_dict. Team B uses torch.save(model) to serialize the entire module including class definition. Six months later, Team B refactors their module class.
question: "What breaks after Team B refactors the module class, and what serialization pattern should they use instead?"
details:
  realistic_solution: 'Team B''s approach breaks because torch.save(model) uses Python''s pickle, which stores a reference to the class''s module path. When they refactor (rename class, move file, change __init__ signature), unpickling fails with ImportError or AttributeError. Team A''s state_dict approach is robust: the state_dict is a plain {name: tensor} dictionary that is architecture-agnostic. Loading requires reconstructing the model in code first (model = MyModel()), then loading weights (model.load_state_dict(dict)). This decouples architecture evolution from weight storage. The trade-off: Team A must maintain code to reconstruct every historical architecture version, but this is version-controllable. Team A''s pattern is the industry standard for production deployment.'
  common_mistake: |
    **The Pitfall:** Using `torch.save(model)` for production checkpoints.
    **The Rationale:** It seems like a convenient shortcut to save the entire model object rather than just the state dictionary.
    **The Consequence:** Pickle serializes the class reference, creating a fragile coupling that causes `ImportError` or `AttributeError` when code structure inevitably evolves.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Team B serializes via `torch.save(model)`.
       - Team A serializes via `state_dict`.
    2. **Calculations:**
       - Team B: 1 pickle file, breaks on any refactor.
       - Team A: state_dict + versioned code, survives arbitrary refactoring.
    3. **Conclusion & Interpretation:** **Result: System-Bound**. Decoupling architecture evolution from weight storage is the industry standard for production.
