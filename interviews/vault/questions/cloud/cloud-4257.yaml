title: Selective gradient computation using requires_grad and no_grad for fine-tuning
scenario: You are fine-tuning only the last 4 transformer blocks of a 24-layer BERT-large
  on A100 (80GB). The backbone (first 20 layers) should be frozen. Current training
  uses 72GB, close to the 80GB limit, and you need to reduce memory usage.
question: How would you freeze the first 20 BERT-large layers to reduce memory while
  fine-tuning only the last 4?
details:
  realistic_solution: 'Wrap frozen layers in with torch.no_grad(): within forward(),
    or use model.backbone.requires_grad_(False) which correctly sets requires_grad=False
    on all parameters AND prevents gradient tracking during forward. The latter is
    preferred as it also disables autograd graph construction for those layers. Verify
    with any(p.requires_grad for p in model.backbone.parameters()) == False.'
  common_mistake: Using model.parameters() with requires_grad=False on frozen layers
    but still running frozen layers inside the normal forward pass without torch.no_grad(),
    causing PyTorch to build the computational graph for frozen layers anyway and
    store their activations for a backward pass that never uses them.
  napkin_math: 'BERT-large: 24 layers. Frozen 20 layers'' activations: 20/24 × total
    activation memory. At batch=32, seq=512: total activations ≈ 8GB. Frozen layer
    activations that can be freed: 20/24 × 8GB ≈ 6.7GB. New total: 72GB - 6.7GB ≈
    65GB. Fits comfortably within 80GB with headroom for optimizer states of trainable
    params only.'
