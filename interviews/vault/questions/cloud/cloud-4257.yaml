title: Selective gradient computation using requires_grad and no_grad for fine-tuning
scenario: You are fine-tuning only the last 4 transformer blocks of a 24-layer BERT-large. The backbone (first 20 layers) should be frozen. Current training uses 72GB, close to the 80GB limit, and you need to reduce memory usage.
question: How would you freeze the first 20 BERT-large layers to reduce memory while fine-tuning only the last 4?
details:
  realistic_solution: 'Wrap frozen layers in with torch.no_grad(): within forward(), or use model.backbone.requires_grad_(False) which correctly sets requires_grad=False on all parameters AND prevents gradient tracking during forward. The latter is preferred as it also disables autograd graph construction for those layers. Verify with any(p.requires_grad for p in model.backbone.parameters()) == False.'
  common_mistake: |
    **The Pitfall:** Using model.parameters() with requires_grad=False on frozen layers but still running frozen layers inside the normal forward pass without torch.no_grad().
    **The Rationale:** PyTorch will build the computational graph for frozen layers anyway.
    **The Consequence:** Stores their activations for a backward pass that never uses them, wasting memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 24-layer BERT-large, 20 layers frozen
       - Batch=32, Seq=512, total activations ≈ 8GB
       - Current memory usage: 72GB
    2. **Calculations:**
       - Frozen activations share = 20 / 24 * 8 GB ≈ 6.7 GB
       - Freed memory = 6.7 GB
       - New total = 72 GB - 6.7 GB = 65.3 GB
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (65.3 GB leaves ample headroom).**
