title: Autograd graph capture for CUDA graphs on A100 for inference acceleration
scenario: You are deploying a GPT-2 XL inference service on A100 (312 TFLOPS, 2TB/s). At batch=1, the model achieves only 40% GPU utilization because kernel launch overhead dominates. CUDA graphs can replay a pre-captured sequence of kernels without Python overhead.
question: How would you capture CUDA graphs for GPT-2 XL batch-1 autoregressive decoding with a growing KV cache?
details:
  realistic_solution: 'Pre-allocate a fixed-size KV cache tensor (max_seq_len × n_heads × d_head × 2 bytes × n_layers) and use in-place writes via slice assignment: kv_cache[:, :, :, :cur_len] = new_kv. This keeps tensor addresses static. Capture the single-step decode function (not the full generation loop) using torch.cuda.graph.capture(). The Python loop over positions remains outside the graph. Validate with torch.cuda.check_error() after warmup.'
  common_mistake: |
    **The Pitfall:** Attempting to capture CUDA graphs for the full autoregressive loop, including the KV cache update.
    **The Rationale:** Candidates know CUDA graphs capture operations but forget they require static tensor shapes and memory addresses.
    **The Consequence:** The KV cache grows with each token, changing tensor shapes, making the naive approach fail with CUDA_ERROR_ILLEGAL_ADDRESS or incorrect results.
  napkin_math: |
    - **Single-Token Decode (Without CUDA Graphs):** ~15ms (kernel launch overhead dominates at batch=1).
    - **Single-Token Decode (With CUDA Graphs):** ~3ms.
    - **Speedup:** 15ms / 3ms = **5x speedup**.
    - **KV Cache Size (max_len=2048):** 2048 tokens * 48 layers * 25 heads * 64 dim * 2 (K+V) * 2 bytes = **~600 MB**.
    - **Conclusion:** Static allocation of 600 MB is trivial on an A100.
