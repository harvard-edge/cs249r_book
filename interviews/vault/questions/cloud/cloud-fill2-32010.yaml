title: 'Thermal Throttling: When GPUs Self-Protect'
scenario: 'Your 8× MI300X training node shows inconsistent step times: most steps complete in 2.1 seconds,
  but every few minutes a step takes 3.5 seconds. nvidia-smi shows GPU temperatures cycling between 78°C
  and 91°C, with clock speeds dropping from 2100 MHz to 1500 MHz when temperatures spike. What is happening
  and how do you fix it?'
details:
  realistic_solution: 'The MI300X is thermal throttling. When junction temperature exceeds ~90°C, the
    GPU firmware reduces clock speed to prevent damage, dropping from 2100 MHz to 1500 MHz (a 29% reduction).
    This causes the periodic 67% slowdown in step time (2.1s → 3.5s). Root causes: (1) insufficient airflow
    — check for blocked vents, failed fans, or hot aisle containment breaches, (2) dried/insufficient
    thermal interface material (TIM) between GPU die and heatsink, (3) ambient temperature too high (intake
    > 35°C), (4) neighboring GPUs creating thermal cross-talk. Fixes: clean air filters, verify fan speeds,
    check coolant flow rates if using DLC, reduce GPU power limit to 700W (nvidia-smi -pl 700) as a temporary
    measure. Long-term: upgrade to direct liquid cooling which maintains junction temps at 60-70°C with
    zero throttling.'
  common_mistake: Blaming software (NCCL, data loader) without checking thermal metrics first. Thermal
    throttling is a silent performance killer that doesn't throw errors — GPUs simply run slower.
  napkin_math: 'Clock drop: 2100 → 1500 MHz = 28.6% reduction. Expected slowdown: 2.1s / 0.714 = 2.94s
    (pure compute). Actual 3.5s suggests memory throttling too. Power at throttle: ~600W vs 750W TDP.
    Lost compute: 28.6% × fraction of throttled time.'
