title: LLM Concurrency and KV Cache Thrashing
scenario: You are mapping the efficiency frontier (throughput vs. latency) for a Llama-3 70B model served
  on an 8x80GB H100 node. To maximize throughput and lower cost-per-token, the infrastructure team increases
  the max concurrent requests from 64 to 256. They expect a sub-linear latency increase while moving along
  the Pareto curve. Instead, p99 Time-To-First-Token (TTFT) spikes from 0.8s to over 12s, and total system
  throughput decreases by 20% compared to the 64-request baseline. Diagnose the system bottleneck that
  caused this inversion on the efficiency frontier.
question: "Why did raising max concurrency from 64 to 256 spike p99 TTFT and reduce throughput on the 8xH100 70B service?"
details:
  realistic_solution: The regression is caused by KV cache thrashing. At 256 concurrent requests, the
    required KV cache exceeds the available GPU HBM. Instead of crashing, modern inference engines (like
    vLLM) preempt active decode requests, swapping their KV caches to CPU RAM to make room. The solution
    is to strictly profile memory usage and cap max concurrency below the HBM threshold, keeping the system
    on the true efficiency frontier without falling into swapping degradation.
  common_mistake: Assuming the performance drop is due to an Out-Of-Memory (OOM) crash or hitting pure
    compute FLOP limits, failing to identify the hidden penalties of memory paging, request preemption,
    and PCIe bottlenecking.
  napkin_math: 'Llama-3 70B KV cache per token: 2 bytes * 2 (K,V) * 80 layers * 8 heads * 128 dim = 320
    KB/token. 256 concurrent requests at an 8K context window = 2M tokens. 2M * 320 KB = ~640 GB for KV
    cache alone. Added to 140GB for FP16 weights, the total memory requirement is ~780 GB. This vastly
    exceeds the 640GB capacity of the 8x H100 node. The engine swaps the excess 140GB+ over the PCIe bus
    (max 64GB/s), causing massive IO stalls that destroy overall throughput.'
