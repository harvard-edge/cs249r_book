title: ONNX Operator Coverage Gap Analysis for Transformer Models
scenario: 'You export a GPT-2 model (124M parameters) to ONNX opset 17. The export
  succeeds, but at runtime on the DirectML execution provider (Windows GPU inference),
  three operations fail: ScaledDotProductAttention, a custom GELU variant, and einsum
  with >2 inputs.'
question: How would you fix the three GPT-2 ONNX runtime failures on DirectML?
details:
  realistic_solution: 'Fix each failure: (1) ScaledDotProductAttention: not a standard
    ONNX op — decompose into MatMul + Softmax + MatMul manually in the export using
    a custom symbolic function. (2) Custom GELU: replace with torch.nn.functional.gelu(x,
    approximate=''tanh'') which maps to the standard ONNX Tanh-based GELU approximation.
    (3) Multi-input einsum: decompose into sequential 2-input einsums. Then validate
    with ORT''s model checker per EP. Lesson: always test with your target EP before
    declaring an ONNX model portable.'
  common_mistake: Expecting all PyTorch operations to have direct ONNX equivalents
    on all execution providers. ONNX standard defines ops, but EPs may not implement
    them all — DirectML is notably behind CUDA EP in op coverage.
  napkin_math: 'GPT-2 124M has ~150 unique operator instances. If 3 fail on DirectML:
    2% failure rate. But those 3 ops (attention, GELU, einsum) account for ~60% of
    compute time — so 2% op failure blocks 60% of computation.'
