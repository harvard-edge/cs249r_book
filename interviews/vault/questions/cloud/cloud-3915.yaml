title: ONNX Operator Coverage Gap Analysis for Transformer Models
scenario: "You export a GPT-2 model (124M parameters) to ONNX opset 17. The export succeeds, but at runtime on the DirectML execution provider (Windows GPU inference), three operations fail: ScaledDotProductAttention, a custom GELU variant, and einsum with >2 inputs."
question: "How would you fix the three GPT-2 ONNX runtime failures on DirectML?"
details:
  realistic_solution: "Fix each failure: (1) ScaledDotProductAttention: not a standard ONNX op — decompose into MatMul + Softmax + MatMul manually in the export using a custom symbolic function. (2) Custom GELU: replace with torch.nn.functional.gelu(x, approximate='tanh') which maps to the standard ONNX Tanh-based GELU approximation. (3) Multi-input einsum: decompose into sequential 2-input einsums. Then validate with ORT's model checker per EP. Lesson: always test with your target EP before declaring an ONNX model portable."
  common_mistake: |
    **The Pitfall:** Expecting all PyTorch operations to have direct ONNX equivalents on all execution providers.
    **The Rationale:** Believing ONNX export success guarantees universal portability.
    **The Consequence:** Discovering in production that specific Execution Providers (like DirectML) lack coverage for complex ops, leading to runtime crashes.
  napkin_math: |
    *   **Operator Mix:** GPT-2 has ~150 unique operator instances.
    *   **Failure Rate:** 3 failed ops / 150 = 2% failure rate.
    *   **Compute Profile:** Attention, GELU, and einsum account for ~60% of total FLOPs.
    *   **Result:** **A tiny 2% operator support gap blocks 60% of the model's compute execution.**
