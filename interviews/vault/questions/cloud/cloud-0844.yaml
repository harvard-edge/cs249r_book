title: Diagnosing Latency Spikes after GELU Replacement
scenario: A production CPU inference fleet serves a 7B parameter LLM using an engine optimized for dynamic activation sparsity. By using ReLU, the engine dynamically skips loading weights for downstream neurons when the input activation is zero. A recent model update replaces ReLU with GELU. While downstream accuracy improves, inference latency spikes from 75ms to 140ms per token, and server power draw increases by 40%.
question: Why did replacing ReLU with GELU spike token latency from 75ms to 140ms and increase server power by 40%?
details:
  realistic_solution: Identify that GELU rarely outputs exact zeros, entirely destroying activation sparsity. The inference engine can no longer dynamically skip weight memory loads for inactive neurons, forcing dense execution. This massive increase in DRAM reads bottlenecks the memory bandwidth and drives up energy usage.
  common_mistake: |
    **The Pitfall:** Attributing the latency and power spike to the increased arithmetic complexity of GELU.
    **The Rationale:** Candidates see a more complex function (error function vs. max(0,x)) and assume compute is the bottleneck, forgetting that LLM inference is heavily memory-bandwidth bound.
    **The Consequence:** Misdiagnosing the bottleneck leads to useless optimization efforts on compute rather than addressing memory loads.
  napkin_math: |
    1. Calculate total FP16 weight memory: 7B parameters * 2 bytes = 14 GB.
    2. Calculate FFN and attention breakdown: ~9.5 GB (FFN) and ~4.5 GB (Attention).
    3. Calculate memory reads with ReLU (70% sparsity): 4.5 GB + (9.5 GB * 0.3) = 7.35 GB.
    4. Calculate expected latency with ReLU at 100 GB/s: 7.35 GB / 100 GB/s = 73.5 ms.
    5. Calculate expected latency with GELU (0% sparsity): **14 GB / 100 GB/s = 140 ms.**
