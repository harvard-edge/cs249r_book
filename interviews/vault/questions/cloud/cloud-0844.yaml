title: Diagnosing Latency Spikes after GELU Replacement
scenario: A production CPU inference fleet serves a 7B parameter LLM using an engine optimized for dynamic
  activation sparsity. By using ReLU, the engine dynamically skips loading weights for downstream neurons
  when the input activation is zero. A recent model update replaces ReLU with GELU. While downstream accuracy
  improves, inference latency spikes from 50ms to 140ms per token, and server power draw increases by
  40%. Diagnose the root cause of the regression.
question: "Why did replacing ReLU with GELU spike token latency from 50ms to 140ms and increase server power by 40%?"
details:
  realistic_solution: Identify that GELU rarely outputs exact zeros, entirely destroying activation sparsity.
    The inference engine can no longer dynamically skip weight memory loads for inactive neurons, forcing
    dense execution. This massive increase in DRAM reads bottlenecks the memory bandwidth and drives up
    energy usage.
  common_mistake: Attributing the latency and power spike to the increased arithmetic complexity (e.g.,
    computing the error function) of GELU compared to the simpler max(0, x) of ReLU.
  napkin_math: Assume an FFN layer has 20MB of weights (FP16). With ReLU's ~70% activation sparsity, only
    30% of weights (6MB) are fetched per token. With GELU (0% sparsity), the full 20MB is fetched. Over
    32 layers, memory reads jump from 192MB to 640MB per token. At 100 GB/s bandwidth, memory latency
    alone increases from ~1.9ms to 6.4ms, explaining the systemic slowdown.
