title: The Embedding Sharding Strategy
scenario: Your production DLRM has 50 embedding tables totaling 400 GB. Table sizes range from 200 MB to 80 GB. You have 8 GPUs with 80 GB HBM each. A naive row-parallel sharding splits every table equally across all 8 GPUs. The system runs, but GPU utilization is only 25% and All-to-All communication dominates the profile.
question: Why does row-parallel sharding cause massive communication bottlenecks here, and how do you fix it?
details:
  realistic_solution: 'Row-parallel sharding of all 50 tables across 8 GPUs means every forward pass requires an All-to-All collective to redistribute embeddings — regardless of table size. For a 200 MB table, each GPU holds only 25 MB, but the All-to-All overhead of exchanging lookups across 8 GPUs far exceeds the compute. The fix is a **mixed sharding strategy**: (1) **Table-wise placement** for small tables (< 10 GB): place entire table on a single GPU. With 35 small tables averaging 2 GB each = 70 GB, distribute across GPUs as whole tables. (2) **Column-wise sharding** for medium tables (10-40 GB): split embedding dimension across 2-4 GPUs, requiring only AllReduce (cheaper than All-to-All). (3) **Row-wise sharding** for the largest tables (> 40 GB): split rows across all 8 GPUs. This eliminates All-to-All for ~80% of tables, cutting communication overhead by 3-5×.'
  common_mistake: |
    **The Pitfall:** Assuming uniform sharding is universally optimal.
    **The Rationale:** Candidates blindly apply "split everything evenly" data/tensor parallel rules, forgetting that small embeddings have near-zero memory footprint but still incur massive communication penalties if sharded.
    **The Consequence:** The network interface saturates with tiny lookup exchanges, crippling GPU utilization.
  napkin_math: |
    *   **Naive Sharding:** 50 tables × 8 GPUs = 400 fragments. Every forward pass requires massive All-to-All communication across all GPUs.
    *   **Small Tables (200MB):** Sharding gives each GPU 25MB but incurs identical All-to-All overhead as an 80GB table.
    *   **Mixed Strategy:** Place 35 small tables fully on single GPUs (zero communication), column-shard 10 medium tables (AllReduce), row-shard 5 large tables (All-to-All).
    *   **Result:** Communication volume drops ~75%, and GPU utilization leaps from **25% to 60-70%**.
