title: 'KV-Cache: Implement KV Cache Size Calculation for LLM Serving'
scenario: A 70B LLM (GQA: 64 Q heads, 8 KV heads, head_dim=128, 80 layers, bf16) is deployed on 8 H100s with tensor parallelism.
question: Compute the per-GPU HBM allocation for model weights, KV cache, and activations. How many tokens can be cached simultaneously?
details:
  realistic_solution: 'With tensor parallelism TP=8: each GPU holds 1/8 of model weights. KV heads: 8 KV heads / 8 GPUs = 1 KV head per GPU. Each GPU caches KV for its KV head only.'
  common_mistake: |
    **The Pitfall:** Forgetting that Tensor Parallelism splits KV heads across GPUs.
    **The Rationale:** Candidates calculate KV cache per GPU as if the GPU stores all 8 heads, failing to realize the shards are distributed.
    **The Consequence:** They massively underestimate the total cluster capacity and deploy unnecessarily large and expensive hardware footprints.
  napkin_math: |
    - Per-GPU Weights: 70B × 2 bytes / 8 GPUs = 17.5 GB.
    - KV Heads per GPU: 8 KV heads / 8 GPUs = 1 KV head per GPU.
    - KV size per token per layer per GPU: 2 (K,V) × 1 (head) × 128 (dim) × 2 bytes = 512 bytes.
    - Total KV per token per GPU: 80 layers × 512 bytes = 40 KB.
    - Available HBM per GPU: 80 GB - 17.5 GB (weights) - 1.0 GB (activations) = 61.5 GB.
    - Token Capacity: 61.5 GB / 40 KB = 1,537,500 tokens.
    - **Concurrent Requests:** 1.54M tokens / 2048 (avg seq len) = **~750 concurrent requests.**
