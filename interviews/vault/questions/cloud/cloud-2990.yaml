title: 'Kernel Fusion: Evaluate Fused vs Unfused MLP Blocks on H100'
scenario: For a 13B LLM on H100 (80GB HBM3, 3.35 TB/s, 989 TFLOPS BF16), compare fused
  vs unfused MLP block (Linear \rightarrow GELU \rightarrow Linear). Batch size 64, sequence length 2048,
  hidden size 5120, intermediate size 20480. Evaluate roofline position, memory bandwidth
  savings, and latency.
question: Which parts of the 13B MLP block are compute-bound versus memory-bound on
  H100, and how much does fusion help?
details:
  realistic_solution: 'Check arithmetic intensity: compute FLOPs / bytes accessed.
    If AI > ridge point (H100 ridge \approx 295 FLOPS/B for bf16), it''s compute-bound.
    For large matrix multiplications, AI is high \rightarrow compute-bound, fusion has less
    impact. Elementwise ops (GELU, bias) are memory-bound \rightarrow benefit from fusion.'
  common_mistake: Not checking if the operation is compute-bound or memory-bound before
    claiming fusion helps — if compute-bound, fusion has minimal benefit.
  napkin_math: 'Batch=64, seq=2048, hidden=5120, intermediate=20480. Sequence len
    \times batch = 64 \times 2048 = 131,072 tokens. Linear 1 (5120\rightarrow20480): FLOPs = 2 \times 131K
    \times 5120 \times 20480 = 27.5T FLOPs. Bytes: weights 5120\times20480\times2B = 209MB, input 131K\times5120\times2B
    = 1.34GB. AI = 27.5T / (209MB + 1.34GB) = 17,741 FLOPs/B >> 295 ridge. Compute-bound.
    GELU: FLOPs \approx 6 \times 131K \times 20480 = 16B. Bytes: 2 \times 131K\times20480\times2B = 10.74GB in + out.
    AI = 16B / 10.74GB = 1.5 FLOPs/B << 295. Memory-bound. Fusion impact: Linear1 is
    compute-bound — fusion doesn''t help. GELU is memory-bound — fusing GELU with
    Linear2 saves 10.74GB HBM traffic. Latency savings: 10.74GB / 3.35TB/s = 3.2ms.
    At batch=1 (decode), Linear becomes memory-bound too \rightarrow fusion helps much more.'
