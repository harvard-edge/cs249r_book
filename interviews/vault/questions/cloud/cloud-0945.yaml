title: Canary Traffic Sizing and Resource Allocation
scenario: You are deploying a new two-tower recommendation model serving 10,000 requests per second globally. The new model requires 4 NVIDIA A100 GPUs per replica to meet a strict 50ms P99 latency SLA, with each replica capable of handling 250 RPS. Your total available provisioned capacity is 100 A100 GPUs.
question: How should you choose between a 1% and 10% canary split given the 100-GPU limit and CTR significance needs?
details:
  realistic_solution: Implement a 5% to 10% canary split. A 10% split (1,000 RPS) requires 4 replicas (16 A100 GPUs), which fits comfortably within the 100 GPU cluster while leaving 84 GPUs for the baseline model. This accelerates the collection of statistically significant CTR data, allowing confidence in the new model within an hour.
  common_mistake: |
    **The Pitfall:** Selecting an arbitrarily small canary percentage (e.g., 1%) to minimize blast radius.
    **The Rationale:** Engineers often ignore the time required to reach statistical significance for business metrics like CTR.
    **The Consequence:** Prolonging the release cycle unnecessarily and delaying time-to-confidence for new model deployments.
  napkin_math: |
    1. Analyze Traffic Splits: Total Traffic = 10k RPS. 1% split = 100 RPS. 10% split = 1,000 RPS.
    2. Determine Impressions for Significance: To detect a 1% relative drop in a 5% baseline CTR, ~3.6M impressions are needed.
    3. Calculate Time to Significance: Time at 1% = 3,600,000 / 100 = 36,000s (10 hours). Time at 10% = 3,600,000 / 1,000 = 3,600s (1 hour).
    4. Calculate GPU Cost at 10%: (1000 RPS / 250 RPS/replica) × 4 GPUs/replica = 16 GPUs.
    5. **Final Result: A 10% split provides significance in 1 hour while comfortably fitting within the 100 GPU limit (requiring only 16 GPUs).**
