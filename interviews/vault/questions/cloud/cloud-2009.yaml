title: Diagnosing Non-Contiguous Tensor Memory Bottlenecks
scenario: You are profiling a PyTorch transformer training loop on a single NVIDIA H100 GPU. After introducing a novel multi-head attention mechanism that heavily relies on tensor reshaping, slicing, and `.transpose()`, the GPU SM (compute) utilization drops from 75% to 20%, while memory bandwidth utilization spikes to 95%. Profiling shows that time spent in `aten::clone` and uncoalesced element-wise kernels has increased by 10x, severely bottlenecking the iteration.
question: "What is the root cause of this degradation at the tensor abstraction level, and how do you resolve it?"
details:
  realistic_solution: The `transpose()` and slicing operations only alter the tensor's metadata (shape and strides), creating a non-contiguous memory view. Subsequent operations (like cuBLAS GEMMs or layer norms) require contiguous memory, forcing PyTorch to implicitly trigger synchronous `aten::clone` operations. The fix is to explicitly call `.contiguous()` immediately after the reshape to amortize the cost, or utilize `einops` / custom Triton kernels to fuse the operations and avoid materializing the intermediate non-contiguous tensor.
  common_mistake: |
    **The Pitfall:** Assuming the new attention math is computationally heavier or blaming Python interpreter overhead.
    **The Rationale:** Candidates often overlook how logical tensor metadata (strides) impacts physical memory layouts and implicit data movement.
    **The Consequence:** Missing the fact that non-contiguous memory views trigger synchronous `aten::clone` operations, severely bottlenecking memory bandwidth.
  napkin_math: |
    1. Tensor size: B=32, H=16, S=4096, D=128 in FP16 = 512 MB.
    2. An implicit clone forces a 512 MB read + 512 MB write = 1 GB of memory traffic.
    3. On an H100 (3 TB/s HBM3), each implicit clone adds ~0.33 ms of pure memory overhead.
    4. 10 non-contiguous operations per layer across 32 layers adds ~106 ms of pure memory transfer delay per forward pass.
    5. **This massive memory overhead completely starves the compute units, driving utilization down.**
