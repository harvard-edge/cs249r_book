title: Forward vs Reverse Mode Autodiff
scenario: A researcher proposes using forward-mode automatic differentiation instead of reverse-mode (backpropagation) for training a transformer with 1 billion parameters and a scalar loss.
question: Why would forward-mode AD be catastrophically expensive for a 1B-parameter scalar-loss transformer, and when is it preferable?
details:
  realistic_solution: 'Reverse-mode (backprop) computes gradients for ALL 1B parameters in one backward pass (cost: ~2x forward). Forward-mode would require one forward-sensitivity pass per parameter, meaning 1B passes to get the full gradient. Forward-mode is preferable when: (1) computing Jacobian-vector products for few inputs (e.g., neural ODE sensitivity), (2) the function has many outputs but few inputs, or (3) computing per-sample gradients without materializing the full Jacobian.'
  common_mistake: |
    **The Pitfall:** Treating forward-mode and reverse-mode AD as having equivalent computational cost.
    **The Rationale:** Candidates know both methods compute accurate derivatives but lack the intuition for how Jacobian shape dictates efficiency.
    **The Consequence:** Proposing an architecture that is millions of times too slow for standard scalar-loss training tasks.
  napkin_math: |
    - **Reverse-Mode (Backprop) Cost:** 1 backward pass = 2x forward cost = 2F.
    - **Forward-Mode Cost:** 1 pass per parameter. For 1B parameters: `1B * 1F` = 1B * F.
    - **Cost Ratio:** `(1B * F) / 2F` = **500 million times slower**.
    - **Conclusion:** Forward-mode computes one column of the Jacobian per pass. It only wins when the number of outputs vastly exceeds the number of inputs.
