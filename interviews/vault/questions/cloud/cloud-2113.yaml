title: Forward vs Reverse Mode Autodiff
scenario: A researcher proposes using forward-mode automatic differentiation instead of reverse-mode (backpropagation) for training a transformer with 1 billion parameters and a scalar loss.
question: Why would forward-mode AD be catastrophically expensive for a 1B-parameter scalar-loss transformer, and when is it preferable?
details:
  realistic_solution: 'Reverse-mode (backprop) computes gradients for ALL 1B parameters in one backward pass. Forward-mode would require one forward-sensitivity pass per parameter, meaning 1B passes to get the full gradient. Forward-mode is preferable when: (1) computing Jacobian-vector products for few inputs, (2) the function has many outputs but few inputs, or (3) computing per-sample gradients without materializing the full Jacobian.'
  common_mistake: |
    **The Pitfall:** Treating forward-mode and reverse-mode AD as having equivalent computational cost.
    **The Rationale:** Candidates know both methods compute accurate derivatives but lack the intuition for how Jacobian shape dictates efficiency.
    **The Consequence:** Proposing an architecture that is millions of times too slow for standard scalar-loss training tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 1 billion parameters (inputs), 1 scalar loss (output).
       - Forward pass cost = F.
       - Reverse-mode (backprop) cost = 2F.
    2. **Calculations:**
       - Reverse-Mode computes all 1B gradients in 1 backward pass: Total cost = 2F.
       - Forward-Mode computes 1 parameter gradient per pass: Total passes = 1B.
       - Total Forward-Mode cost = 1B * F.
       - Cost Ratio: (1B * F) / 2F = 500,000,000x slower.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Forward-mode AD is 500 million times slower for a scalar-loss model because it computes the Jacobian column-by-column instead of row-by-row.
