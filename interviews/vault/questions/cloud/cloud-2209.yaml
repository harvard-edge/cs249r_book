title: The Dominant Resource Fairness Intuition
scenario: A shared GPU cluster has 100 GPUs and 1,000 CPU cores. Team A submits jobs that each require
  1 GPU and 50 CPUs. Team B submits jobs that each require 4 GPUs and 10 CPUs. Under naive equal-share
  scheduling, each team gets 50 GPUs and 500 CPUs. Why does this naive split waste cluster resources,
  and what is the core idea behind Dominant Resource Fairness (DRF)?
question: "Why does this naive split waste cluster resources, and what is the core idea behind Dominant Resource Fairness (DRF)?"
details:
  realistic_solution: DRF equalizes each team's share of their *dominant* (most-demanded) resource. Team
    A's dominant resource is CPU (each job uses 5% of CPUs but only 1% of GPUs). Team B's dominant resource
    is GPU (each job uses 4% of GPUs but only 1% of CPUs). DRF ensures both teams get the same fraction
    of their respective dominant resource, maximizing overall utilization by avoiding stranded resources.
  common_mistake: Assuming fair scheduling means splitting every resource 50/50 between teams. This ignores
    that teams have different resource profiles and a flat split leaves resources stranded.
  napkin_math: 'Naive 50/50 split: Team A can run min(50/1, 500/50) = 10 jobs, using 10 GPUs and 500 CPUs.
    40 GPUs sit idle. Team B can run min(50/4, 500/10) = 12 jobs, using 48 GPUs and 120 CPUs. 380 CPUs
    sit idle. Total utilization: 58 GPUs (58%), 620 CPUs (62%). DRF allocation: Team A''s dominant resource
    is CPU (5% per job). Team B''s dominant resource is GPU (4% per job). Equalize dominant shares: let
    A run x jobs, B run y jobs. x/20 = y/25 → y = 5x/4. Constraints: x + 4y ≤ 100 and 50x + 10y ≤ 1000.
    Substituting: 6x ≤ 100 and 62.5x ≤ 1000 → x = 16, y = 20. Team A: 16 jobs (16 GPUs, 800 CPUs). Team
    B: 20 jobs (80 GPUs, 200 CPUs). Total: 96 GPUs (96%), 1000 CPUs (100%). DRF nearly saturates the cluster
    vs. the naive split''s ~60% utilization.'
  options:
  - "Naive scheduling equally divides all resources, leaving 40 GPUs and 380 CPUs stranded because each team hits their other resource limit first. DRF equalizes the allocated fraction of each team's bottleneck resource (CPU for A, GPU for B), allocating 16 jobs to A and 20 to B for ~100% cluster utilization."
  - "Naive scheduling over-allocates GPUs to Team A. DRF ensures that both teams receive an equal number of GPUs, regardless of their CPU requests, ensuring strict GPU fairness."
  - "Naive scheduling leads to CPU starvation for Team B. DRF resolves this by statically splitting the cluster into CPU-heavy and GPU-heavy partitions, achieving 50% utilization."
  - "Naive scheduling works well but requires manual tuning. DRF dynamically scales the CPU frequency based on GPU utilization, eliminating stranded resources."
