title: Transformer Inference Memory Bandwidth Saturation and Power Envelope
scenario: You are profiling energy efficiency for a Llama-2 13B inference workload
  on MI300X. At batch size 1 (single-request decode), the MI300X draws 320W and achieves
  140 tokens/sec. At batch size 64, it draws 680W and achieves 8,320 tokens/sec.
  Analyze why energy-per-token (J/token) differs dramatically between batch sizes,
  connect this to the roofline model, and determine the optimal batch size for a data
  center that wants to minimize total energy cost while meeting a 200ms TTFT (time
  to first token) SLA.
question: Why is MI300X energy per token lower at batch 64 than batch 1, and what
  batch size minimizes energy while meeting a 200 ms TTFT SLA?
details:
  realistic_solution: 'Batch 1: E/token = 320W / 140 tok/s = 2.28 J/token. Batch
    64: E/token = 680W / 8,320 tok/s = 0.0817 J/token. Batch 64 is 96% more energy-efficient.
    Roofline: batch 1 arithmetic intensity ≈ (13B × 2 FLOPs) / (13B × 2 bytes)
    = 1 FLOP/byte < MI300X ridge point (~300 FLOP/byte). As batch size grows, weight
    reuse increases arithmetic intensity. SLA constraint: TTFT at batch 64 ≈ 64 ×
    average prefill time. If prefill = 2ms per request, TTFT = 128ms < 200ms SLA.
    Maximum batch size before SLA violation: 200ms / 2ms = 100 requests. Optimal:
    batch 96-100 (further power reduction possible).'
  common_mistake: Treating energy/token as constant across batch sizes. At batch size
    1, the MI300X is deeply memory-bandwidth-bound (arithmetic intensity < 1 FLOP/byte),
    so most transistors are idle while HBM streams weights. Power is low but so is
    compute utilization. Energy/token is high because idle power is amortized over
    very few tokens.
  napkin_math: 'B=1: E/tok = 320/140 = 2.28 J/tok. B=64: E/tok = 680/8320 = 0.0817
    J/tok. Efficiency gain: (2.28-0.0817)/2.28 = 96.4%. Power increase B1→B64:
    680/320 = 2.125×. Throughput increase: 8320/140 = 59.4×. Extrapolating to B=100: pass rate
    drops slightly as compute increases, assume ~125 passes/s. Throughput = 125 × 100 = 12,500 tok/s. Power
    ≈ 720W. E/tok = 720/12500 = 0.057 J/tok (97.5% better than B=1).'
