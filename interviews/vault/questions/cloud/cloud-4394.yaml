title: Transformer Inference Memory Bandwidth Saturation and Power Envelope
scenario: You are profiling energy efficiency for a Llama-2 13B inference workload on MI300X. At batch size 1, the MI300X draws 320W and achieves 140 tokens/sec. At batch size 64, it draws 680W and achieves 8,320 tokens/sec.
question: Why is MI300X energy per token lower at batch 64 than batch 1, and what batch size minimizes energy while meeting a 200 ms TTFT SLA?
details:
  realistic_solution: |
    Batch 1: E/token = 320W / 140 tok/s = 2.28 J/token. Batch 64: E/token = 680W / 8,320 tok/s = 0.0817 J/token. Batch 64 is 96% more energy-efficient. Roofline: batch 1 arithmetic intensity ≈ (13B × 2 FLOPs) / (13B × 2 bytes) = 1 FLOP/byte < MI300X ridge point (~300 FLOP/byte). As batch size grows, weight reuse increases arithmetic intensity. SLA constraint: TTFT at batch 64 ≈ 64 × average prefill time. If prefill = 2ms per request, TTFT = 128ms < 200ms SLA. Maximum batch size before SLA violation: 200ms / 2ms = 100 requests. Optimal: batch 96-100 (further power reduction possible).
  common_mistake: |
    **The Pitfall:** Treating energy/token as constant across batch sizes.
    **The Rationale:** At batch 1, the GPU is deeply memory-bandwidth-bound, so most compute transistors sit idle while HBM streams weights. Idle power is amortized over very few tokens.
    **The Consequence:** Datacenters run at sub-optimal batch sizes, massively inflating energy costs per token.
  napkin_math: |
    - **Batch 1:** E/tok = 320W / 140 tok/s = **2.28 J/tok**.
    - **Batch 64:** E/tok = 680W / 8320 tok/s = **0.0817 J/tok** (96.4% more efficient).
    - **SLA Constraint:** TTFT at batch N ≈ N * average prefill time. If prefill = 2ms, batch 64 TTFT = 128ms.
    - **Max Batch Size:** 200ms SLA / 2ms = 100 requests.
    - **Optimal Choice:** Batch 96-100 maximizes efficiency without violating the SLA.
