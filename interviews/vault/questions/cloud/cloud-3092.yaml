title: 'Systolic Array Optimization: Fix Low MFU on TPU v5e'
scenario: 'A TPU v5e (197 TFLOPS BF16) runs BERT-large inference at 15 TFLOPS (7.6%
  MFU). Profiling shows 85% of time in two operations: GeLU activation (memory-bound)
  and layer normalization (memory-bound). The remaining 15% is GEMM compute. Diagnose
  the systolic array underutilization and quantify the improvement from fusing GeLU+LayerNorm+Linear
  into a single kernel.'
question: Why is BERT-large at only 7.6% MFU on TPU v5e, and how much speedup should
  fusing GeLU, LayerNorm, and Linear deliver?
details:
  realistic_solution: 'GeLU+LN are element-wise: AI ≈ 1 FLOP/byte vs TPU ridge
    240 → systolic array unutilized. Fusing GeLU+LN into GEMM prologue/epilogue eliminates
    separate memory round-trips. GeLU bandwidth: BERT FFN intermediate=4096, seq=128, batch=64:
    64*128*4096*2=64MB. Reading and writing takes 128MB. At 819 GB/s, pure memory transfer is ~0.16ms. However, un-fused
    element-wise operations on accelerators often suffer from severe kernel launch
    overheads and sub-optimal memory access patterns. Fusion eliminates this overhead
    and the memory round trips, shifting the bottleneck back to the GEMMs.'
  common_mistake: Optimizing the GEMM portion (15% of time) via algorithmic changes
    when Amdahl's Law shows the bottleneck is GeLU+LN (85% of time). The systolic
    array is idle during memory-bound operations.
  napkin_math: 'BERT-large (24 layers, hidden=1024) at batch=64, seq=128 (8192 tokens):
    Total GEMM FLOPs ≈ 12 * 2 * 8192 * 1024^2 * 24 = 4.95 TFLOPs. At 15 TFLOPS, total
    time = 4.95T / 15T = 330ms. If GEMM runs at 65% MFU (128 TFLOPS), GEMM time = 4.95T
    / 128T = 38.6ms. The remaining ~291ms (88% of time) is spent in memory-bound
    operations and overhead (GeLU+LN). Fusion eliminates the majority of this 291ms
    overhead, reducing total time to ~38.6ms. Speedup: 330ms / 38.6ms = 8.5x. MFU
    improves from 7.6% to 65%.'
