title: Cloud New 0006
scenario: You need to architect a distributed training network topology for a 300B Mixture of Experts (MoE) model across 128 nodes (1024 GPUs).
question: How would you map expert parallelism for a 300B MoE model across 128 nodes to avoid all-to-all congestion?
details:
  realistic_solution: Constrain Expert Parallelism (EP) exclusively within the boundaries of a single node to utilize the high-speed 900GB/s NVLink. Place 8 experts per node (1 per GPU). Use Data Parallelism (DP) and Pipeline Parallelism (PP) across the 400Gbps IB NDR interconnect. By doing this, the massive all-to-all token routing required by MoE routing is strictly localized to the intra-node NVLink fabric, heavily mitigating network congestion on the slower IB fabric.
  common_mistake: |
    **The Pitfall:** Distributing experts blindly across nodes.
    **The Rationale:** Candidates prioritize load balancing without considering interconnect boundaries.
    **The Consequence:** Forcing every MoE layer to perform an expensive all-to-all token exchange over the limited IB NDR, paralyzing the cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVLink: 900 GB/s. InfiniBand NDR: 50 GB/s.
       - All-to-all routing per layer: 4K seq * 8192 hidden * 2 bytes = 64 MB.
    2. **Calculations:**
       - NVLink routing time = 64 MB / 900 GB/s < 0.1 ms.
       - InfiniBand routing time = 64 MB / 50 GB/s = ~1.3 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 13x latency penalty over InfiniBand.** Expert parallelism must stay strictly intra-node to leverage NVLink.
