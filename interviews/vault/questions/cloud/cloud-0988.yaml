title: Evaluating Operator Fusion in Computational Graphs
scenario: You are optimizing a 15B parameter LLM for inference on a node with 8x A100 (80GB, 2.0 TB/s memory bandwidth) GPUs. Profiling shows GPU compute utilization is only 40%, and execution is heavily bound by memory bandwidth due to fragmented element-wise operations (LayerNorm, GeLU, and residual adds).
question: Should you compile the graph to fuse LayerNorm, GeLU, and residual adds, and how much HBM traffic does fusion save for a 16MB activation?
details:
  realistic_solution: Evaluate the graph for operator fusion of memory-bound operations. By compiling the computational graph, LayerNorm, GeLU, and Add can be fused into a single kernel. The intermediate activations are kept in on-chip SRAM instead of making round-trips to HBM, reducing memory traffic by a factor of 3 for those layers while sacrificing some dynamic shape flexibility.
  common_mistake: |
    **The Pitfall:** Assuming that computational graph compilation primarily accelerates compute (FLOPs) by reducing Python overhead.
    **The Rationale:** Many engineers associate compilation with CPU overhead reduction rather than GPU memory optimization.
    **The Consequence:** Teams under-prioritize graph compilation for models that don't seem Python-bound, missing massive memory bandwidth optimizations.
  napkin_math: |
    - **Unfused (3 separate ops):** 3 &times; (16MB read + 16MB write) = 96MB total HBM traffic.
    - **Fused (1 compiled kernel):** 16MB read (initial input) + 16MB write (final output) = 32MB total HBM traffic.
    - **Savings:** 96MB - 32MB = **64MB per block per pass**.
    - **Latency Reduction:** At 2.0 TB/s HBM bandwidth, saving 64MB reduces memory-bound latency by 32 microseconds per operation.
