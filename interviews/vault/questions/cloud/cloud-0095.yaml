title: The Throughput Trap
scenario: Your team has optimized an LLM inference server for maximum throughput, achieving 5,000 tokens/sec aggregate. The deployment uses large static batches to maximize GPU utilization. However, users complain that the chatbot feels 'laggy' on the first response. You profile the system and find that while the per-user Time Per Output Token (TPOT) is reasonable (~12ms at batch=64), the Time To First Token (TTFT) is very high due to queuing.
question: Why can a high-throughput static-batched server still feel laggy when TPOT is ~12ms but TTFT is high?
details:
  realistic_solution: This is a classic trade-off between throughput and latency. Large static batches are excellent for throughput because they maximize the arithmetic intensity of the computation, keeping the GPU cores busy. However, this comes at the cost of high TTFT. A request arriving at the server may have to wait a significant amount of time for the batch to fill before it is even processed. While the subsequent tokens (TPOT) are generated quickly as part of the efficient batch, the initial wait time dominates the user's perception of latency. The system is optimized for batch processing, not for single-user responsiveness.
  common_mistake: |
    **The Pitfall:** Focusing only on throughput as the primary success metric.
    **The Rationale:** Engineers equate high tokens/second with a good user experience, failing to distinguish between overall processing rate (TPOT) and individual responsiveness (TTFT).
    **The Consequence:** Releasing a system that looks great on infrastructure dashboards but provides an unusable, laggy product to end users.
  napkin_math: |
    1. **Queueing Delay:** A request waits up to 80ms for a batch window to fill.
    2. **Prefill Delay:** A large batch of 64 prompts takes ~150ms to process.
    3. **Total TTFT:** Wait (80ms) + Big Prefill (150ms) = **230ms TTFT**.
    4. **Conclusion:** **The user perceives a 230ms lag before the first character appears, despite the fast 12ms TPOT.**
  options:
  - The server has high TTFT because the H100 has low clock speed, making the first forward pass slow.
  - The high TTFT is due to the latency of loading the model from NVMe SSD into HBM for every new user.
  - The system's large static batching policy creates high queueing delays, leading to high TTFT, even though the per-token generation speed (TPOT) is fast.
  - The Python Global Interpreter Lock (GIL) is preventing true parallelism, causing the first token to be delayed.
  correct_index: 2
