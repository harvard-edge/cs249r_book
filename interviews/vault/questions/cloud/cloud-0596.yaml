title: The Prefetch Buffer Sizing
scenario: You're training a vision model on ImageNet. Your GPU processes each batch in 50ms, but utilization drops to 0% every few seconds. You're using PyTorch DataLoader with num_workers=2 and prefetch_factor=2. A colleague suggests setting num_workers=32.
question: Why might setting num_workers=32 make things worse, and what's the right way to size the prefetch pipeline?
details:
  realistic_solution: Each DataLoader worker maintains its own prefetch buffer in CPU pinned memory. With `prefetch_factor=2`, each worker holds 2 batches ready. The total pinned memory consumed is `num_workers x prefetch_factor x batch_memory`. Setting `num_workers=32` with large image batches can exhaust CPU RAM, causing the OS to swap to disk - which is catastrophically slower than the original bottleneck. The right approach is to calculate the minimum workers needed to keep the GPU fed.
  common_mistake: |
    **The Pitfall:** Believing "more workers is always better" or setting workers to match CPU cores.
    **The Rationale:** This ignores the memory cost of prefetch buffers and the diminishing returns of over-provisioning.
    **The Consequence:** CPU RAM gets exhausted, causing disk swapping which destroys training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU time: 50ms. Load time: 200ms.
       - Batch size: 256 images (224x224x3x4 bytes) = 154 MB.
    2. **Calculations:**
       - Worker Demand: 200ms / 50ms = 4 workers minimum.
       - 4 Workers Memory: 4 * 2 prefetched = 8 batches = 1.23 GB pinned.
       - 32 Workers Memory: 32 * 2 prefetched = 64 batches = 9.86 GB pinned.
    3. **Conclusion & Interpretation:**
       - **32 workers waste ~10 GB of RAM causing swap, while 4 workers optimally feed the GPU. Result: Memory-Bound.**
