title: The Prefetch Buffer Sizing
scenario: You're training a vision model on ImageNet. Your GPU processes each batch in 50ms, but utilization drops to 0% every few seconds. You're using PyTorch DataLoader with num_workers=2 and prefetch_factor=2. A colleague suggests setting num_workers=32.
question: Why might setting num_workers=32 make things worse, and what's the right way to size the prefetch pipeline?
details:
  realistic_solution: Each DataLoader worker maintains its own prefetch buffer in CPU pinned memory. With `prefetch_factor=2`, each worker holds 2 batches ready. The total pinned memory consumed is $\text{num\_workers} \times \text{prefetch\_factor} \times \text{batch\_memory}$. Setting `num_workers=32` with large image batches can exhaust CPU RAM, causing the OS to swap to disk — which is catastrophically slower than the original bottleneck. The right approach is to calculate the minimum workers needed to keep the GPU fed.
  common_mistake: |
    **The Pitfall:** Believing "more workers is always better" or setting workers to match CPU cores.
    **The Rationale:** This ignores the memory cost of prefetch buffers and the diminishing returns of over-provisioning.
    **The Consequence:** CPU RAM gets exhausted, causing disk swapping which destroys training throughput.
  napkin_math: |
    - **Worker Demand:** 200ms load time / 50ms GPU time = 4 workers minimum.
    - **Batch Memory:** 256 * 224 * 224 * 3 * 4 bytes = 154 MB.
    - **Reasonable Setup:** 4 workers * 2 prefetched = 8 batches = 1.23 GB pinned memory.
    - **Colleague's Setup:** 32 workers * 2 prefetched = 64 batches = 9.9 GB pinned memory.
    - **Final Result:** **32 workers waste nearly 10 GB of RAM while 28 workers sit idle; 4 workers optimally feed the GPU.**
