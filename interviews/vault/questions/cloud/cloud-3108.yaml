title: 'TCO Specification: Design Multi-Region Inference Cost Model'
scenario: 'You must specify a multi-region inference deployment for a global LLM API (US-East: 40% traffic, EU-West: 35%, Asia-Pac: 25%). Total demand is 500 req/s. Accelerator pricing varies by region (US $2.50/hr, EU $2.80/hr, APAC $3.00/hr). The Latency SLO is P99 < 500ms from any region.'
question: "How should you allocate pods across US, EU, and APAC for 500 req/s, what is the annual cost, and why not centralize in US-East?"
details:
  realistic_solution: 'Multi-region fleet per region: US: 500*0.4=200 req/s. EU: 175 req/s. APAC: 125 req/s. Assuming 10 req/s per pod: US pods: 20 pods (160 GPUs). EU: 18 pods (144 GPUs). APAC: 13 pods (104 GPUs). Annual cost: US: 160*$2.50*8760=$3.504M. EU: 144*$2.80*8760=$3.53M. APAC: 104*$3.00*8760=$2.73M. Total: $9.76M. Centralized US-East: 500 req/s, 50 pods, 400 GPUs. Cost: $8.76M. Savings: $1M/yr from centralization, BUT APAC latency: cross-Pacific RTT ≈ 150ms + 500ms SLO inference = 650ms > SLO. Multi-region required. Additionally, GDPR mandates EU data residency.'
  common_mistake: |
    **The Pitfall:** Treating this strictly as an infrastructure cost-optimization problem.
    **The Rationale:** Engineers gravitate toward centralizing all compute in the cheapest region (US-East) to save $1M/year.
    **The Consequence:** Catastrophic failure to meet user Latency SLOs in APAC (due to network RTT) and legal violations of GDPR data residency requirements in the EU.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 req/s total.
    - 10 req/s per pod, 8 GPUs/pod.
    - Cross-Pacific RTT ~150ms.

    **Calculations:**
    - US (200 req/s): 20 pods = 160 GPUs. EU (175 req/s): 18 pods = 144 GPUs. APAC (125 req/s): 13 pods = 104 GPUs.
    - Multi-region cost: (160*$2.50 + 144*$2.80 + 104*$3.00) * 8760 = $9.77M/yr.
    - Centralized US: 400 GPUs * $2.50 * 8760 = $8.76M/yr.

    **Conclusion & Interpretation:**
    - **Result: SLO Compliance.** Multi-region costs a $1.01M premium but is mandatory to meet latency SLOs.
