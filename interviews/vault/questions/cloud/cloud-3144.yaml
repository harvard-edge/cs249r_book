title: Sliding Window Attention Memory Savings
scenario: Mistral 7B uses sliding window attention with window_size=4096 on some layers while keeping full attention on others. On an A100-80GB, for a 32K context request with 32 layers (16 sliding, 16 full), head_dim=128, 8 KV heads.
question: How much KV cache does 32K context use with 16 sliding-window and 16 full-attention layers versus full attention on all 32 layers?
details:
  realistic_solution: |
    Full attention KV per layer: 32K x 2 x 8 x 128 x 2B = 128MB. Full model (32 layers): 32 x 128MB = 4GB. With sliding window: 16 full layers x 128MB = 2GB. 16 sliding layers x (4096/32768) x 128MB = 16 x 16MB = 256MB. Total: 2.256GB. Savings: 4GB - 2.256GB = 1.744GB per request = 43.6% reduction. This allows ~1.77x more concurrent requests: (80GB - 14GB weights) / 2.256GB = 29 vs (80GB - 14GB) / 4GB = 16.5.
  common_mistake: |
    **The Pitfall:** Assuming sliding window attention computes over the full context and just masks the attention matrix.
    **The Rationale:** The real memory benefit is that you only store the last W tokens in the physical KV cache for sliding layers, fully freeing older memory.
    **The Consequence:** Overestimating memory requirements and serving fewer concurrent requests than the hardware can actually support.
  napkin_math: |
    - **Full Attention Layer:** 32K tokens * 2 (K,V) * 8 heads * 128 dim * 2 bytes = 128 MB/layer.
    - **Full Model (32 layers):** 32 * 128 MB = **4 GB**.
    - **Sliding Model:** 16 full layers * 128 MB = 2 GB.
    - **Sliding Layers:** 16 layers * (4096 / 32768) * 128 MB = 16 * 16 MB = 256 MB.
    - **Total Sliding:** 2 GB + 256 MB = **2.256 GB** (43.6% reduction).
