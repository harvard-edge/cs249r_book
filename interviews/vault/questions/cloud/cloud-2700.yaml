title: SSP Throughput vs BSP
scenario: You run BSP training on 32 GPUs. The median step time is 100ms but 2 straggler GPUs take 180ms
  per step. You switch to SSP with staleness bound S=5. Estimate the throughput improvement assuming stragglers
  delay only when the bound is hit.
details:
  realistic_solution: The throughput improvement is 0%. A common trap with Stale Synchronous Parallel
    (SSP) is assuming it averages out speeds for *persistent* stragglers. While SSP allows fast workers
    to run ahead initially up to the staleness bound S=5, once that bound is reached, they cannot proceed
    until the slowest worker completes its oldest step. If the stragglers are persistently taking 180ms,
    the system enters a steady state where fast workers compute for 100ms and stall for 80ms every step.
    SSP only improves throughput for *transient* stragglers (random jitter), not persistent hardware imbalances.
  common_mistake: Assuming SSP averages the step times or that stragglers only cause stalls occasionally.
    For persistent stragglers, SSP throughput asymptotically matches the slowest worker, identical to
    BSP.
  napkin_math: 'BSP throughput: 1/180ms = 5.6 steps/sec. SSP steady-state: Fast workers get S=5 steps
    ahead, but then must wait for the persistent straggler to complete step N before they can start N+S.
    Every subsequent step takes 180ms. Long-term throughput: 1/180ms = 5.6 steps/sec. Speedup: 1.0x.'
