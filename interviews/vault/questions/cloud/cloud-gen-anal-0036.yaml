title: Offline Distillation PCIe Bandwidth Bottleneck
scenario: A team is performing offline knowledge distillation to train a 100M parameter student model
  on a single A100 GPU (312 TFLOPS FP16). The teacher's full vocabulary logits (FP16) are pre-computed
  and loaded from CPU RAM over a PCIe Gen5 x16 bus (32 GB/s unidirectional). The training uses a batch
  size of 16, a sequence length of 2048, and a vocabulary size of 128,000. Despite the student model usually
  achieving high GPU utilization in standard training, the A100 utilization collapses significantly during
  this distillation process. Given these specifications, explain why this performance collapse occurs.
details:
  realistic_solution: The utilization collapse occurs because the system becomes completely IO-bound by
    the PCIe Gen5 bandwidth. Transferring the dense teacher logits for the full vocabulary from the CPU
    takes substantially longer than the actual forward and backward pass computations on the A100. To
    resolve this, teams typically use online distillation (running the teacher on the same GPU/node) or
    distill only the top-K logits to compress the data transfer.
  common_mistake: Candidates often assume the bottleneck lies in the GPU's HBM2e memory bandwidth or the
    KL divergence loss calculation overhead. They frequently overlook the massive data movement requirement
    of transferring full-vocabulary dense logits across the PCIe bus.
  napkin_math: 'Tokens per batch: 16 * 2048 = 32,768. Logits data size: 128,000 vocab * 2 bytes (FP16)
    * 32,768 tokens = 8.39 GB. PCIe Gen5 transfer time: 8.39 GB / 32 GB/s = ~262 ms per batch. Student
    compute required: 6 * 100M params * 32,768 tokens = ~19.6 TFLOPs. Compute time on A100: 19.6 TFLOPs
    / 312 TFLOPS = ~63 ms. The GPU requires 262 ms to receive the data for only 63 ms of computation,
    meaning the GPU spends the majority of its time idle waiting for PCIe transfers.'
