title: The RAG Context Window Overflow
scenario: Your RAG system retrieves top-20 documents (avg 800 tokens each) and stuffs them into a 32K-context
  LLM. Users report degraded answer quality on complex queries despite high retrieval recall. The LLM
  context window isn't technically overflowing — you're at ~16K tokens. What is the real problem?
details:
  realistic_solution: 'The ''lost in the middle'' problem: LLMs attend most strongly to tokens at the
    beginning and end of the context, with significantly degraded attention to information in the middle.
    At 16K tokens with 20 documents, the most relevant documents (ranked #5-#15) land in the attention
    dead zone. Additionally, more retrieved context increases prefill compute quadratically with attention.
    The fix: (1) rerank and keep only top-5 documents, (2) place the most relevant document at the beginning
    of the context, (3) use a map-reduce pattern — summarize each document individually, then synthesize.
    This reduces context to ~2K tokens while preserving information from all 20 sources.'
  common_mistake: Assuming that 'within context window = fine.' The model technically accepts 32K tokens,
    so 16K should be well within limits.
  napkin_math: '20 docs × 800 tokens = 16K context tokens. Prefill FLOPs ∝ seq_len² for attention: 16K²
    = 256M attention FLOPs vs 4K² = 16M for top-5 only — 16× more compute for potentially worse quality.
    TTFT at 16K context ≈ 400ms vs 120ms at 4K.'
