title: 'Latency Decomposition: Compare Batched vs. Streaming Inference on H100'
scenario: You are comparing two serving strategies for a 13B-parameter LLaMA model on a single H100 (80GB
  HBM3, 3.35TB/s bandwidth). Strategy A batches 32 requests and processes them together; Strategy B streams
  each request individually with continuous batching. Prefill is 512 tokens, decode is 256 tokens per
  request. Evaluate the end-to-end latency profile of each strategy.
details:
  realistic_solution: 'Strategy A: prefill time ≈ (32×512×2×13B params×2 bytes)/3.35TB/s ≈ compute-bound.
    Decode: 256 steps × (13B×2 bytes per token)/3.35TB/s × 1/32 batch ≈ 2.3ms/token for batch. Strategy
    B: per-request decode ≈ 7.8ms/token (bandwidth-bound). Batching lowers per-token memory bandwidth
    pressure; Strategy A gives lower throughput latency but higher per-request tail latency.'
  common_mistake: Candidates assume batching always reduces latency; they ignore that decode is memory-bandwidth-bound
    and batching increases decode time per request.
  napkin_math: 'Model weight read per decode step: 13B × 2 bytes = 26GB. H100 BW = 3.35TB/s. Single-request:
    26GB/3.35TB/s ≈ 7.8ms/token. Batch-32: same 26GB read, amortized over 32 requests → 7.8ms/token still
    (memory-bound), but 32 tokens generated per step → effective throughput 32× higher. TTFT (prefill)
    at batch=32: compute-bound at H100 989 TFLOPS BF16.'
