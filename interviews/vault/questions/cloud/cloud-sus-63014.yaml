title: Red-Teaming Throughput vs Coverage Tradeoff
scenario: 'Before deploying a public-facing LLM, your red-team budget allows 500 person-hours of manual
  adversarial testing. A red-team lead proposes three strategies: (A) free-form probing by 10 experts,
  (B) structured taxonomy-guided probing covering 15 harm categories, (C) automated adversarial generation
  using an attacker LLM with human review of flagged outputs. Analyze the failure mode coverage tradeoff
  and recommend a hybrid allocation.'
question: "How should the 500 person-hour red-team budget be allocated across free-form, taxonomy-guided, and automated adversarial testing?"
details:
  realistic_solution: 'Strategy A (free-form expert probing): High novelty, low coverage — experts find
    unknown unknowns but cluster around their domain expertise. 500 hours × 10 prompts/hr = 5,000 prompts.
    Strategy B (taxonomy-guided): Systematic coverage of known harm categories, but misses novel jailbreaks.
    15 categories × 33 hrs = 500 hrs. Strategy C (automated attacker LLM): High volume (10K-100K prompts),
    low novelty — attacks known jailbreak patterns. Human review at 100 prompts/hr requires 100-1,000
    review hours for 100K outputs. Recommended hybrid: 20% A (100 hrs, novel discovery), 40% B (200 hrs,
    systematic coverage), 40% C with human review on top-5% flagged outputs (200 hrs generates 200K prompts,
    reviews 10K). Total: ~215K adversarial prompts tested. The automated attacker should be a different
    model family from the target (e.g., use GPT-4 to red-team Gemini) to exploit distribution differences.'
  common_mistake: Maximizing the number of adversarial prompts (quantity) rather than coverage of the
    failure mode taxonomy. Automated methods generate volume but cluster around known attack patterns
    — novel failure modes require human creativity.
  napkin_math: 'Strategy C: attacker LLM at 50 prompts/min = 3,000/hr. 200 hrs budget (unreviewed generation):
    600K prompts. With automated filter (perplexity + semantic dedup): 10% pass-through = 60K unique adversarial
    prompts. Human review at 100/hr: 600 review hours needed — over budget. Reduce to 100K generated,
    10K reviewed = 100 review hours. 10K human-reviewed adversarial prompts from automated pipeline plus
    5K from strategies A+B = 15K high-quality red-team cases.'
