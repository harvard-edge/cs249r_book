title: 'A100 Deployment Strategy: Encoder-Decoder Tradeoffs for LLM Inference'
scenario: Your team is tasked with deploying a large language model for real-time inference on a fleet
  of NVIDIA A100 GPUs (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth, 400W TDP). You need to
  decide between an encoder-only, decoder-only, or a full encoder-decoder architecture. The primary constraints
  are minimizing inference latency and maximizing throughput, while also being highly cost-efficient at
  scale. How would you analyze the system costs and architectural tradeoffs, specifically leveraging the
  A100's capabilities, to make a recommendation for a low-latency, high-throughput service?
question: "How would you analyze the system costs and architectural tradeoffs, specifically leveraging the A100's capabilities, to make a recommendation for a low-latency, high-throughput service?"
details:
  realistic_solution: A candidate should propose a methodical evaluation. First, define key metrics (e.g.,
    latency percentiles, throughput/GPU, total cost of ownership, cost-per-inference). Then, analyze memory
    requirements for each architecture type, considering model size (parameters * bytes/param) against
    the 80 GB HBM2e. Next, estimate FLOPs for inference for each architecture, mapping against the A100's
    312 TFLOPS FP16 to predict theoretical compute-bound throughput. Crucially, factor in memory bandwidth
    (2.0 TB/s) for data transfer-bound operations, especially for token generation in decoder-only models
    where the KV cache can dominate memory access patterns. Discuss how strategies like quantization (e.g.,
    FP8, INT8) could further exploit A100 capabilities by reducing memory footprint and potentially increasing
    effective throughput. Finally, present a cost-per-inference projection based on resource utilization,
    power consumption (400W TDP), and model performance trade-offs, justifying the choice of architecture
    for the given constraints.
  common_mistake: Overlooking the critical impact of memory bandwidth (2.0 TB/s) on effective sequence
    length and batch size for different architectures, especially the KV cache growth in decoder-only
    models. Another common mistake is not properly quantifying the computational advantage of 312 TFLOPS
    FP16 for specific operations (e.g., attention vs. feed-forward layers), leading to suboptimal model
    partitioning or a naive assumption that more parameters always mean a full encoder-decoder is superior
    without considering the full system cost implications per inference request.
  napkin_math: "1.  **Memory Capacity Check**: A 70B parameter model in FP16 (2 bytes/param) requires\
    \ ~140 GB. This immediately implies a single A100 (80GB) cannot hold the full model without techniques\
    \ like tensor parallelism or quantization. If quantized to INT8 (1 byte/param), it would require ~70\
    \ GB, potentially fitting on a single A100 (80GB HBM2e). This affects model choice. \n2.  **Memory\
    \ Bandwidth Impact**: With 2.0 TB/s bandwidth, loading 70 GB of weights once takes 70 GB / 2.0 TB/s\
    \ = 0.035 seconds. The real bottleneck often becomes KV cache access and growth (e.g., for 4096 sequence\
    \ length, a 70B model's KV cache in FP16 can be many GBs). \n3.  **FP16 Throughput**: 312 TFLOPS FP16.\
    \ If an inference request (e.g., for a specific token generation) requires 'X' TFLOPS, then theoretical\
    \ max throughput = 312 TFLOPS / X TFLOPS/request. This sets an upper bound on compute. \n4.  **Cost\
    \ Efficiency**: (Latency_ms * Throughput_req/s) / (GPU_hourly_cost + (Power_watts * Time_hours / 1000\
    \ * Energy_cost_per_kWh)). Compare this across architecture types and optimizations to select the\
    \ most cost-efficient option per unit of useful work."
