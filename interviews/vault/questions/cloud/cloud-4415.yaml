title: Chiplet-Based GPU Multi-Instance Partitioning
scenario: "A cloud provider wants to offer MI300X as a multi-tenant service with strong isolation guarantees, analogous to H100 MIG."
question: "How would you design strong multi-tenant isolation for MI300X by mapping tenant slices onto its XCD topology?"
details:
  realistic_solution: "MI300X's 8 XCDs each have independent CUs, L2 caches, and HBM partitions through MCDs. Define isolation zones as 1-XCD, 2-XCD, or 4-XCD slices: assign one tenant per XCD partition. Use ROCm's CRIU-based context isolation and set HSA memory pools to restrict allocation to assigned XCD's HBM region. Infinity Fabric QoS registers can throttle cross-XCD bandwidth to enforce SLA. Limitation: no hardware memory encryption boundary between XCDs (unlike H100 Confidential Computing), so must add software memory scrubbing on XCD release."
  common_mistake: |
    **The Pitfall:** Assuming MIG-style isolation is directly portable from H100 to MI300X.
    **The Rationale:** MI300X lacks built-in hardware MIG support for arbitrary fractional slices.
    **The Consequence:** Designing an isolation scheme that maps poorly to the physical chiplet boundaries, failing to provide true memory bandwidth isolation or hardware security.
  napkin_math: |
    *   **MI300X Hardware:** 8 XCDs, 192GB HBM total.
    *   **1-XCD Slice:** 24GB HBM, ~660 GB/s local BW, ~228 TFLOPS BF16.
    *   **Comparison:** Roughly comparable to a single A100 40GB, but with higher capacity and lower bandwidth per TFLOP.
    *   **Result:** **Slicing by exact XCD boundaries provides the cleanest physical hardware isolation.**
