title: Evaluating RoCEv2 vs TCP for LLM Clusters
scenario: You are designing the network fabric for a new GPU cluster consisting of 2,048 NVIDIA H100 GPUs for training large language models. The networking team proposes using standard 400Gbps Ethernet with a highly tuned TCP/IP stack instead of deploying RoCEv2, arguing that 400Gbps provides enough raw bandwidth for AllReduce collectives.
question: Should the 2,048-H100 cluster use tuned TCP/IP over 400 Gbps Ethernet or RoCEv2 for AllReduce, and why?
details:
  realistic_solution: Reject the TCP/IP proposal for ML training. RDMA provides zero-copy memory transfers and kernel bypass, reducing per-hop latency from ~20µs down to ~2µs. Furthermore, driving 400Gbps via TCP would consume excessive CPU cores on the host, stealing resources from data loading and orchestration.
  common_mistake: |
    **The Pitfall:** Focusing solely on the raw 400Gbps bandwidth capability.
    **The Rationale:** Assuming TCP/IP can saturate the link without causing severe CPU bottlenecks.
    **The Consequence:** Ignoring the compounding latency of kernel-space context switching in collectives, crippling cluster performance.
  napkin_math: |
    - 1. **Latency per hop:** TCP = ~20µs, RDMA = ~2µs.
    - 2. **Ring AllReduce (510 hops):** TCP = 510 × 20µs = 10.2ms. RDMA = 510 × 2µs = 1.02ms.
    - 3. **Total Latency (10,000 steps):** TCP adds 102s of pure latency vs 10.2s for RDMA.
    - 4. **CPU Overhead:** **400Gbps requires ~20 CPU cores just for TCP network processing, degrading host performance.**
