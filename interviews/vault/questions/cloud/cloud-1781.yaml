title: Evaluating RoCEv2 vs TCP for LLM Clusters
scenario: You are designing the network fabric for a new GPU cluster consisting of 2,048 NVIDIA H100 GPUs
  for training large language models. The networking team proposes using standard 400Gbps Ethernet with
  a highly tuned TCP/IP stack instead of deploying RoCEv2 (RDMA over Converged Ethernet), arguing that
  400Gbps provides enough raw bandwidth for AllReduce collectives and simplifies the network architecture.
  Evaluate this proposal, focusing on the CPU overhead, kernel bypass mechanisms, and end-to-end latency
  characteristics of both approaches during synchronous training.
details:
  realistic_solution: Reject the TCP/IP proposal for ML training. RDMA provides zero-copy memory transfers
    and kernel bypass, reducing per-hop latency from ~20µs down to ~2µs. Furthermore, driving 400Gbps
    via TCP would consume excessive CPU cores on the host, stealing resources from data loading and orchestration.
  common_mistake: Focusing solely on the raw 400Gbps bandwidth capability and assuming TCP/IP can saturate
    the link without causing severe CPU bottlenecks or considering the compounding latency of kernel-space
    context switching in collectives.
  napkin_math: 'TCP Latency per hop: ~20µs. RDMA Latency per hop: ~2µs. Ring AllReduce over 128 nodes
    (127 hops) overhead: TCP = 127 * 20µs = 2.54ms per step. RDMA = 127 * 2µs = 0.25ms per step. At 10,000
    collective steps, TCP adds 25.4s of pure latency overhead vs 2.5s for RDMA. Additionally, TCP requires
    ~1 CPU core per 20Gbps throughput, meaning 400Gbps would saturate 20 CPU cores just for network processing.'
