title: PagedAttention Block Size Selection
scenario: 'You are configuring vLLM''s PagedAttention for serving Llama 3 70B on 2×H100 GPUs. The system
  offers block sizes of 8, 16, and 32 tokens. Your workload has highly variable sequence lengths (50th
  percentile: 256 tokens, 99th percentile: 8192 tokens). Select the optimal block size and justify.'
question: "Which PagedAttention block size—8, 16, or 32 tokens—should you choose for this variable-length Llama 3 70B workload, and why?"
details:
  realistic_solution: 'Block size 16 is the optimal choice for this workload. Analysis: (1) Internal fragmentation:
    average wasted tokens per sequence = block_size/2. At block=8: 4 tokens wasted × 320 KB/token = 1.28
    MB/request. At block=16: 8 × 320 KB = 2.56 MB/request. At block=32: 16 × 320 KB = 5.12 MB/request.
    For 100 concurrent requests: 128 MB vs 256 MB vs 512 MB waste. (2) Page table overhead: each block
    needs a pointer entry. At block=8, a 8192-token sequence needs 1024 entries. At block=16: 512 entries.
    At block=32: 256 entries. Page table memory is negligible (<1 MB even at block=8). (3) Kernel efficiency:
    CUDA attention kernels operate on blocks — larger blocks have better compute utilization due to coalesced
    memory access. Block=8 leaves Tensor Cores underutilized. Block=16 achieves ~90% of block=32 efficiency
    while halving fragmentation. (4) Allocation flexibility: block=16 allows finer-grained memory reclamation
    when sequences finish. Block=16 balances fragmentation waste vs kernel efficiency.'
  common_mistake: Choosing the largest block size (32) to minimize page table overhead. Large blocks waste
    memory when sequences don't fill the last block (internal fragmentation), especially harmful for short
    sequences.
  napkin_math: 'Fragmentation waste per request: block/2 × 320 KB. Block=16: 2.56 MB/req × 100 req = 256
    MB. Block=32: 5.12 MB/req × 100 req = 512 MB. Page table: 8K tokens / 16 = 512 entries × 8B = 4 KB/req.
    Kernel efficiency: block=16 achieves ~90% of block=32 throughput.'
