title: Pipelining vs Batching Trade-off
scenario: 'An inference server handles 200 req/s. Option A: request pipelining (overlap CPU/GPU stages)
  achieving 250 req/s max at 18ms p50 latency. Option B: dynamic batching (batch requests for GPU, batch
  size up to 32) achieving 400 req/s max at 35ms p50 latency. Your SLA is p99 < 50ms. Which approach?'
question: "Which approach?"
details:
  realistic_solution: 'The decision depends on the traffic pattern and SLA strictness. Option A (pipelining):
    250 req/s with 18ms p50 latency. Pipelining has predictable latency — p99 is typically 1.5-2x p50
    = 27-36ms, well within SLA. But at 200 req/s load, utilization is 80% — close to the throughput ceiling
    with little headroom for traffic spikes. Option B (batching): 400 req/s with 35ms p50. Batching latency
    is more variable — p99 depends on batch filling time. With dynamic batching, worst case is waiting
    for the batch timeout. If timeout=10ms: p99 ≈ 35ms + 10ms = 45ms, barely under SLA. But throughput
    headroom is 2x (400 vs 200 req/s). Best approach: combine both — pipeline the CPU/GPU overlap AND
    batch requests at the GPU stage. This achieves ~350 req/s at ~25ms p50 and ~40ms p99. Both SLA and
    throughput requirements are met with headroom.'
  common_mistake: Treating pipelining and batching as mutually exclusive. They are complementary — pipelining
    overlaps stages while batching amortizes per-request GPU overhead within a stage.
  napkin_math: 'A: 250 req/s, p99 ~30ms (safe SLA). B: 400 req/s, p99 ~45ms (risky SLA). Combined A+B:
    ~350 req/s, p99 ~40ms (best balance).'
