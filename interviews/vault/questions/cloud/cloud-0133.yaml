title: The Chatbot Lag Catastrophe
scenario: You are the tech lead for an LLM-powered chatbot service running a 70B parameter model on H100
  GPUs. The service has a strict P99 Time-To-First-Token (TTFT) SLO of 250ms. Your current system uses
  static batching with a timeout of 150ms to form batches. During peak load, you observe that while average
  TTFT is acceptable, P99 TTFT is spiking to over 800ms, and `nvidia-smi` shows GPU utilization is only
  40%. Your PM is asking why users are complaining about lag when the expensive GPUs seem idle. Based
  on this data, diagnose the most likely cause of the P99 latency violation.
question: "What is the most likely cause of the P99 TTFT violation with a 150ms static batching timeout and only 40% GPU utilization?"
details:
  realistic_solution: 'The primary cause is head-of-line blocking, a classic problem with static batching.
    The 40% GPU utilization isn''t a sign of a slow data pipe, but rather the GPU being starved for work.
    A new, short user request gets stuck waiting for two things: 1) the current, long-running batch to
    completely finish generating all its tokens, and 2) its own batch to fill up or hit the 150ms timeout.
    This combination creates a massive P99 latency tail. Switching to a continuous batching scheduler
    (like those in vLLM or TGI) would solve this. It decouples prefill from decode, allowing new requests
    to be processed and added to the KV cache while older requests are decoding. This eliminates head-of-line
    blocking, dramatically improves GPU utilization, and shrinks the P99 TTFT.'
  common_mistake: Engineers often misdiagnose the symptom of low GPU utilization. They assume the bottleneck
    is data input (e.g., network, PCIe) or that the hardware is simply too slow, leading them to propose
    expensive hardware changes. The real issue is often the scheduling algorithm causing the GPU to sit
    idle, waiting for a poorly constructed batch.
  napkin_math: Let's model the P99 worst-case TTFT under static batching. A request arrives right after
    a batch is dispatched. The active batch generates 100 tokens. For a 70B model on H100 (3.35 TB/s),
    memory bound decode is 140GB / 3.35TB/s = 41.8ms/token. 100 * 41.8ms = 4.18s wait. Then it waits the
    150ms batching timeout. TTFT = 4180ms + 150ms + T_prefill >> 250ms SLO.
  options:
  - The H100's memory bandwidth is insufficient, causing a bottleneck when loading model weights for each
    batch. We should use tensor parallelism to split the model across multiple GPUs.
  - The static batching timeout is too short. We should increase it to 300ms to create larger, more efficient
    batches, which will increase the 40% GPU utilization.
  - The system is experiencing head-of-line blocking due to static batching, where new requests are stuck
    waiting for long-running batches to complete. Switching to continuous batching would solve this.
  - The PCIe bus is saturated, preventing the CPU from feeding data to the H100 fast enough, which explains
    the low 40% utilization.
  correct_index: 2
