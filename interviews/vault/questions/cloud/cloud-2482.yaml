title: Fleet-Wide Heterogeneous Deployment
scenario: A cloud deployment pipeline serves a 20M parameter BERT model to 5M mobile users for on-device
  NLP. The fleet spans 15 different Android SoCs. Using a generic TFLite model with NNAPI delegate yields
  80ms latency on average, but high variance (P99 800ms) and severe battery drain because NNAPI falls
  back to CPU for unsupported LayerNorm operations on certain chipsets.
details:
  realistic_solution: Implement a hardware-compiler-algorithm co-design strategy. First, algorithmically
    replace or fuse the unsupported LayerNorm operations into standard operations that mobile NPUs support.
    Second, build a heterogeneous cloud deployment pipeline that uses Ahead-of-Time (AOT) compilation
    (e.g., via TVM or MLIR) to pre-compile hardware-specific binaries for the top 5 SoCs (covering 80%
    of the fleet), avoiding on-device JIT compilation overhead. Fall back to the generic TFLite model
    only for the long-tail of devices.
  common_mistake: Forcing the entire model to run on the CPU to achieve consistent latency, which destroys
    battery life and thermal budgets on mobile devices.
  napkin_math: 'Top 5 SoCs = 80% of 5M = 4M users. CPU fallback consumes 2.0W vs NPU 0.5W. Battery savings
    per query: 1.5W * 0.8s = 1.2 Joules. Over 100 queries/day * 4M users = 480 Megajoules/day saved fleet-wide,
    dramatically reducing negative app store reviews for battery drain.'
