title: 'The Privacy vs. Profit A/B Test: Differential Privacy'
scenario: You are the ML Systems Lead for a keyboard app with 10 million daily active users (DAU). Your team has A/B tested two new next-word prediction models. The Cloud model yields a 15% engagement lift but runs on 25 GPUs ($4/hr). The Federated model runs on-device (zero infrastructure cost) but causes a 0.1% user churn due to battery drain, assuming $100 LTV per user.
question: How should you decide between the A/B-tested cloud and federated keyboard models when accounting for cost, privacy risk, and churn?
details:
  realistic_solution: The correct decision involves calculating the tangible and intangible costs of both options. The cloud option has a high operational cost and a massive, unquantifiable privacy risk. The federated option has a high indirect cost due to user churn.
  common_mistake: |
    **The Pitfall:** Focusing solely on the top-line engagement metric (15% lift).
    **The Rationale:** Candidates ignore second-order effects like unquantifiable central privacy risks and indirect costs (churn).
    **The Consequence:** Making a locally optimal decision that results in catastrophic brand damage or massive user loss.
  napkin_math: |
    - **Cloud Model Cost:** 25 GPUs × $4/hr × 24h × 365 = $876k/year.
    - **Federated Model Cost (Churn):** 10M DAU × 0.1% churn × $100 LTV = $1M/year.
    - **Result:** While the Cloud model is $124k cheaper ($876k vs $1M), this is a small premium to avoid the **unquantifiable catastrophic risk of a data scandal**.
  options:
  - Ship the Cloud model. The annual cost is only $876k, which is cheaper than the $1M lost to churn from the Federated model, and the 15% engagement lift is a huge business win.
  - Ship the Federated model. It has a TCO of $0 since it runs on user devices, making it infinitely cheaper than the Cloud model which costs $876k per year.
  - Reject the Cloud model on privacy grounds despite its lower TCO ($876k vs $1M). The risk of a data scandal is too high. The team must optimize the Federated model's power usage before launch.
  - Reject both. The Cloud model's TCO is over $8M (25 GPUs * $30,000 CapEx * 10 for infrastructure) and the Federated model loses $1M. Neither is financially viable.
  correct_index: 2
