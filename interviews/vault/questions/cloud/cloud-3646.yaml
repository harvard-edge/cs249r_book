title: Flash Attention Tiling Strategy for H100 SRAM Constraints
scenario: You're implementing Flash Attention v2 for a 4096-token context Llama-2
  model on H100 (80GB HBM3, 3.35TB/s, 232KB L2 cache per SM). The attention matrix
  (Q, K, V in BF16) for a single head at seq_len=4096 would be 512MB in standard attention.
  You need to select optimal tile sizes to maximize SRAM utilization.
question: What Flash Attention tile sizes would you choose for seq_len=4096 and d_head=128
  on H100, and why?
details:
  realistic_solution: 'H100 SM has 256KB shared memory per SM. For Flash Attention,
    tile size B_r × B_c × d_head in BF16: B_r=64, B_c=64, d=128 → (64*128 + 64*128
    + 64*128) * 2 bytes = 48KB per tile set. Fits in 256KB with headroom for multiple
    tiles. Use block size 64×64 for the attention scores tile. Profile with Nsight
    to verify shared memory bank conflicts.'
  common_mistake: Setting tile size to maximize SRAM occupancy without accounting
    for the register file pressure from multiple warps. Oversubscribing registers
    causes register spilling to local memory, which is as slow as global memory.
  napkin_math: 'Standard attention: Q@K^T for seq=4096, d=128, BF16: 4096*4096*2 =
    32MB per layer per head. With 32 heads: 1GB just for attention maps. With Flash
    Attention tiling (64×64 blocks): working set per tile = 64*128*2*3 = 48KB (Q,K,V
    tiles) + 64*64*2 = 8KB (scores) = 56KB per tile. Reads total: 2 * seq^2 * d *
    2 bytes = 8GB reads vs standard 32MB mat — Flash Attention reduces HBM reads by
    ~8x.'
