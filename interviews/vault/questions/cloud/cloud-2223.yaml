title: The Liquid-Cooled Scheduling Frontier
scenario: Your company is deploying next-generation B200 GPUs (1,000W TDP) alongside the existing H100 fleet (700W TDP). The B200s require direct-to-chip liquid cooling. 30% of your datacenter has liquid cooling (500 B200s); the rest is air-cooled (2,000 H100s). A critical 1,000-GPU LLM pre-training job needs the fastest possible time-to-completion. B200s are 2x faster per GPU for training.
question: How would you schedule the job to maximize speed, and can both GPU types be used synchronously?
details:
  realistic_solution: 'You cannot naively mix GPU types in synchronous training. Three strategies, evaluated by time-to-completion: **Option 1 — B200-only (500 GPUs)**: Use all 500 B200s. Each B200 is 2x faster than H100, so effective throughput = 500 × 2 = 1,000 H100-equivalent. Time = T_base. **Option 2 — H100-only (1,000 GPUs)**: Use 1,000 H100s. More GPUs but slower each. Throughput = 1,000 H100-equivalent, but communication overhead increases with more nodes. Time ≈ T_base × 1.15 (15% communication overhead from 2x nodes). **Option 3 — Heterogeneous with async**: Use B200s for the primary training job (fast iterations). Run H100s on a separate replica with asynchronous gradient exchange (DiLoCo-style). B200s do 500 inner steps, H100s do 500 inner steps, then exchange outer gradients every N steps. This requires algorithmic changes but utilizes both fleets. **Best option**: Option 1 (500 B200s) is simplest and fastest. The 500 B200s match 1,000 H100-equivalent throughput with half the communication overhead (fewer nodes). The cooling constraint is a hard physical boundary — schedule all B200 jobs in the liquid-cooled zone, use H100 fleet for inference/evaluation. Consider: the scheduler must track cooling zone as a resource dimension alongside GPU type, count, and network topology.'
  common_mistake: |
    **The Pitfall:** Mixing B200 and H100 GPUs in a single synchronous data-parallel training job.
    **The Rationale:** Assuming that adding more GPUs automatically increases total throughput, regardless of individual GPU speeds.
    **The Consequence:** Creating a severe straggler problem where the 2x faster B200s idle for 50% of the time waiting for the H100s at every AllReduce synchronization point.
  napkin_math: |
    * **B200 Fleet (500 GPUs):** 500 * 2x speed = 1,000 H100-equivalent compute.
    * **H100 Fleet (1,000 GPUs):** 1,000 H100-equivalent compute.
    * **Communication Overhead (B200):** 500 GPUs = 63 nodes. AllReduce takes ~5.5s. Compute ~3.5s. Total step = 9.0s.
    * **Communication Overhead (H100):** 1,000 GPUs = 125 nodes. AllReduce takes ~5.5s + ~1.5s sync overhead from more nodes. Compute ~3.5s. Total step = 10.5s.
    * **Conclusion:** **The 500 B200 fleet is ~15% faster per step than 1,000 H100s due to lower node count and communication overhead.**
