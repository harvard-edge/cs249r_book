title: Optimizing Active Learning Dataset Curation on NVIDIA H100s
scenario: Your team is tasked with rapidly curating a large-scale dataset for an autonomous driving perception model using active learning. The active learning model running on a single H100 can process 500 images per second to determine uncertainty scores. You have a pool of 100 annotators, each working 8 hours a day. An average image annotation takes 30 seconds. Inter-annotator agreement (IAA) targets result in 20% of all annotated samples requiring a re-annotation, consuming an additional 15 seconds per re-annotated image. You have allocated a maximum of 10 H100 GPUs for the inference component.
question: "With 10 H100s, 100 annotators, and a 20% re-annotation rate, where is the bottleneck and how would you maximize labeled-image throughput?"
details:
  realistic_solution: 'A realistic solution would involve optimizing the annotation workflow, establishing clear guidelines, continuous annotator training, and a robust arbitration system to reduce the re-annotation rate. Human annotation is the obvious primary bottleneck.'
  common_mistake: |
    **The Pitfall:** Neglecting the cumulative cost of re-annotation/arbitration on overall throughput.
    **The Rationale:** Candidates focus only on base annotation times and GPU specs, overlooking real-world human operational bottlenecks.
    **The Consequence:** The throughput projections are overly optimistic and misaligned with actual delivery schedules.
  napkin_math: |
    1. Total Annotator Workload Capacity: 100 annotators * 8 hours/day * 3600 seconds/hour = 2,880,000 seconds/day.
    2. Average Time per Labeled Image: 30 seconds + (0.20 * 15 seconds) = 33 seconds/image.
    3. Effective Daily Annotation Throughput: 2,880,000 seconds/day / 33 seconds/image ≈ 87,272 images/day.
    4. GPU Inference Capacity: 10 H100 GPUs * 500 images/second * 8 hours/day * 3600 seconds = 144,000,000 images/day.
    5. **The human annotation process (~87K images/day) is the primary bottleneck compared to GPU capacity (144M images/day).**
