title: Calculating Maximum Static Batch Size for Strict SLA
scenario: You are deploying a BERT-base text classification model on an NVIDIA GPU. Incoming requests arrive at a steady, deterministic rate of 200 requests per second. The execution time for a batch of size N is modeled as 8ms + (N-1) * 1ms. You use strict static batching, meaning the system waits until exactly N requests are accumulated in the queue before dispatching the batch to the GPU.
question: If your strict P99 latency SLA is 50ms, what is the maximum static batch size you can configure to ensure the first request in any batch meets the SLA limit?
details:
  realistic_solution: 'The maximum static batch size is 8. The first request in the batch waits the longest: it must wait for the remaining N-1 requests to arrive before the batch is dispatched, taking (N-1) * 5ms. Then, the entire batch executes in 8 + (N-1) * 1ms. Setting N=8 yields a total latency of 35ms wait time plus 15ms execution time, perfectly hitting the 50ms SLA.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for the queueing delay of the first request in the batch.
    **The Rationale:** Candidates often focus purely on the GPU execution time equation and ignore the accumulation phase of strict static batching.
    **The Consequence:** Calculating a much larger, incorrect batch size that will consistently violate the 50ms SLA for the earliest requests in the batch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival Rate: 1 request every 5ms.
       - Execution Time: 8 + (N-1) * 1ms.
       - Strict static batching: wait for N requests.
       - SLA Constraint: P99 Latency <= 50ms.
    2. **Calculations:**
       - Queue Wait Time for First Request: waits for remaining N-1 requests = (N-1) * 5ms.
       - Total Latency (First Request) = Wait + Exec = (N-1)*5 + 8 + (N-1)*1 = 8 + 6*(N-1) ms.
       - 8 + 6*(N-1) <= 50
       - 6*(N-1) <= 42
       - N-1 <= 7 => N <= 8.
    3. **Conclusion & Interpretation:**
       - **Result: Queueing-Bound.** To satisfy the SLA for the earliest accumulated request, the maximum static batch size cannot exceed 8.
