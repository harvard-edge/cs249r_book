title: The Silent Model Decay
scenario: Your ML team maintains a critical production model that predicts user engagement. For the past
  two months, the model's business impact has been steadily declining, but no alarms have fired from your
  standard model monitoring dashboards (e.g., accuracy, precision, recall). What are the common reasons
  for this 'silent decay,' and what additional monitoring would you implement to detect it proactively?
details:
  realistic_solution: "The 'silent decay' is typically due to **data drift or concept drift** that isn't\
    \ immediately reflected in traditional performance metrics.\n  1.  **Data Drift:** The statistical\
    \ properties of the input features to the model change over time.\n    *   **Reason:** New user behaviors,\
    \ changes in data collection systems, seasonality, external events (e.g., a pandemic, a new competitor).\n\
    \    *   **Example:** A feature like `user_device_type` suddenly sees a spike in a new device category\
    \ not present during training.\n  2.  **Concept Drift:** The relationship between the input features\
    \ and the target variable changes over time. The \"concept\" the model is trying to learn has shifted.\n\
    \    *   **Reason:** Fundamental shifts in user preferences, market conditions, product changes, or\
    \ evolving definitions of \"engagement.\"\n    *   **Example:** Users who previously engaged with\
    \ short videos now prefer long-form content, but the model still weights short video interaction highly."
  common_mistake: '"The model needs retraining." While often true, the question focuses on *detection*
    when standard metrics don''t alert. The problem is that standard metrics often compare predictions
    to *ground truth*, which might be delayed or unavailable, or they don''t capture shifts in the *input
    data* or *underlying relationships*.'
  napkin_math: Running continuous drift detection on 100 features is computationally cheap. If a K-S test
    takes 50ms per feature, checking 100 features takes 5 seconds. Doing this hourly over a 30-day month
    consumes 5s * 24 * 30 = 3600s (1 hour of CPU time). At $0.05/hr for a CPU instance, it costs a nickel.
    Compared to a 5% drop in business revenue from model decay, the compute is free.
