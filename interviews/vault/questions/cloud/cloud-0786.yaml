title: The Silent Model Decay
scenario: 'Your ML team maintains a critical production model that predicts user engagement. For the past two months, the model''s business impact has been steadily declining, but no alarms have fired from your standard model monitoring dashboards (e.g., accuracy, precision, recall).'
question: 'What are the common reasons for this silent decay, and what additional monitoring would you implement to detect it proactively?'
details:
  realistic_solution: 'The silent decay is typically due to data drift or concept drift that isn''t immediately reflected in traditional performance metrics. 1. Data Drift: The statistical properties of the input features to the model change over time (e.g., a new device category spikes). 2. Concept Drift: The relationship between the input features and the target variable changes over time (e.g., shifts in user preferences).'
  common_mistake: |
    **The Pitfall:** Suggesting "The model needs retraining" as a complete answer.
    **The Rationale:** Candidates focus on the remediation rather than identifying why standard metrics failed to alert in the first place.
    **The Consequence:** Missing the fact that traditional metrics rely on delayed or unavailable ground truth, failing to address the fundamental observability gap.
  napkin_math: |
    - **Compute Time per Run:** 100 features × 50 ms/feature = 5 seconds.
    - **Compute per Month:** 5 seconds/hour × 24 hours × 30 days = 3,600 seconds (1 hour).
    - **Cost:** 1 hour of CPU instance = **$0.05/month**.
    - **ROI:** A nickel a month is negligible compared to a **5% revenue drop**, making continuous drift detection nearly free.
