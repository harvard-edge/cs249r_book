title: The Real-Time Ad Bidding SLA
scenario: You are designing a cloud service for real-time ad bidding which must respond to 99.9% of requests within a 50ms SLA. Your inference model, running on a dedicated H100, has an average processing time of 30ms. However, due to feature variability, you observe that 5% of requests are 'complex' and take 80ms to process.
question: Can the current single-H100 ad bidding system meet the 99.9% under 50ms SLA with 5% of requests taking 80ms, and why?
details:
  realistic_solution: No, the system cannot meet the SLA. While the average time is acceptable, the P95 latency of 80ms guarantees failure. Any request that takes 80ms will immediately miss its own 50ms deadline. More importantly, it occupies the server for an extra 30ms, forcing the next request to wait in a queue. This initial wait time is then added to the next request's processing time, likely causing it to miss its deadline as well. This creates a cascade of failures. Since 5% of requests trigger this failure mode, it's impossible to achieve a 99.9% success rate.
  common_mistake: |
    **The Pitfall:** Looking only at the average processing time (30ms).
    **The Rationale:** 30ms is well under the 50ms SLA deadline, so the system superficially appears healthy.
    **The Consequence:** Completely ignoring the cascading failure effect of tail latency in any system with queues and strict deadlines.
  napkin_math: |
    - **Deadline:** 50ms SLA.
    - **Slow Request:** An 80ms request arrives, immediately missing the deadline by 30ms.
    - **Queue Forms:** A 'fast' 30ms request arrives just after the slow one started. It must wait 80ms for the server to become free.
    - **Cascading Failure:** The total time for the 'fast' request becomes 80ms (wait) + 30ms (process) = 110ms. It also catastrophically misses the 50ms deadline.
    - **Conclusion:** With a 5% chance of this state occurring, it triggers cascading misses, making a 99.9% success rate mathematically impossible.
  options:
  - Yes. The average processing time of 30ms leaves a 20ms buffer, which is more than enough to absorb occasional slow requests.
  - No. The 80ms P95 latency exceeds the 50ms SLA, which will cause a request queue to form and trigger cascading deadline misses, making the 99.9% SLA impossible.
  - Yes, but only if you upgrade to a B200 GPU to reduce the average processing time.
  - It's impossible to say without knowing the network RTT from the ad exchange.
  correct_index: 1
