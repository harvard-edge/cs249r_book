title: KV Cache Memory Per Token
scenario: A 70B parameter transformer LLM has 80 layers, 64 attention heads, and a head dimension of 128.
question: What is the BF16 KV cache memory per token with 8 KV heads, and the total cache for a 4096-token context?
details:
  realistic_solution: 'Per token per layer: 2 (K+V) × 8 KV heads × 128 dims × 2 bytes = 4,096 bytes = 4 KB. Across 80 layers: 4 KB × 80 = 320 KB per token. For 4096 tokens: 320 KB × 4096 = 1,310,720 KB = 1280 MB = 1.25 GB.'
  common_mistake: |
    **The Pitfall:** Using the full 64 attention heads in the calculation instead of the 8 GQA KV heads.
    **The Rationale:** Candidates forget that Grouped-Query Attention (GQA) specifically reduces KV cache size by sharing KV heads across multiple query groups.
    **The Consequence:** Overestimating the KV cache size by a factor of 8, leading to inefficient resource allocation.
  napkin_math: |
    - 1. Calculate per-token, per-layer memory: 2 (K+V) * 8 KV heads * 128 dimensions * 2 bytes (BF16) = 4,096 bytes = 4 KB.
    - 2. Calculate memory across all 80 layers: 4 KB * 80 layers = 320 KB per token.
    - 3. Calculate total KV cache for 4096 tokens: 320 KB * 4096 = 1,310,720 KB.
    - 4. Convert to GB: 1,310,720 KB / 1024 = 1280 MB = **1.25 GB per sequence**. (Standard MHA would be 10 GB).
  options:
  - ~40 KB per token, ~160 MB for 4K context.
  - ~320 KB per token, ~1.25 GB for 4K context.
  - ~2.5 MB per token, ~10 GB for 4K context.
  - ~5 MB per token, ~20 GB for 4K context.
  correct_index: 1
