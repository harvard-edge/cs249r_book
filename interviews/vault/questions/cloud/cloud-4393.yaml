title: Workload Consolidation to Improve GPU Utilization and Power Efficiency
scenario: A cloud ML platform has 1,000 GPUs allocated to batch inference jobs that average 35% GPU utilization. Power metering shows each GPU drawing 280W. The platform team proposes consolidating workloads to run 350 GPUs at 100% utilization (drawing 700W) and powering off the remaining 650 GPUs (5W standby).
question: "How much power would consolidating 1,000 underutilized GPUs save, what risks does it create, and how would MIG or time-slicing improve it?"
details:
  realistic_solution: Consolidating via Multi-Process Service (MPS) to 100% utilization yields ~11.3% power savings (from 280kW down to 248kW). The non-linear power curve of GPUs means running three at 35% draws more power than one at 100%. The risks are severe OOMs if collocated jobs spike in memory, and the 30-60 second latency to wake sleeping nodes during traffic spikes. A hybrid approach using Multi-Instance GPU (MIG) hardware partitioning provides strict memory/compute isolation at a slightly lower power efficiency compared to full MPS, acting as a safer middle ground.
  common_mistake: |
    **The Pitfall:** Assuming linear power scaling and overestimating savings from "powering off" nodes.
    **The Rationale:** Engineers linearly extrapolate that 65% idle time means 65% power waste, forgetting that base PCIe, memory, and board components consume substantial static power.
    **The Consequence:** Initiating a massive, complex orchestration rewrite that yields negligible power savings while introducing catastrophic OOMs and cold-start latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1000 GPUs at 35% utilization (280W each).
       - Max power (100% load): 700W. Standby: 5W.
       - Consolidation: 350 GPUs at 100%.
       - MIG: 500 GPUs at 70% load (~500W).
    2. **Calculations:**
       - Baseline Power: 1,000 * 280W = 280,000 W (280 kW).
       - Full MPS Consolidation: (350 * 700W) + (650 * 5W) = 245,000 + 3,250 = 248.25 kW.
       - MPS Savings: 280 - 248.25 = 31.75 kW (11.3%).
       - MIG Consolidation: (500 * 500W) + (500 * 5W) = 250,000 + 2,500 = 252.5 kW.
       - MIG Savings: 280 - 252.5 = 27.5 kW (9.8%).
    3. **Conclusion & Interpretation:**
       - **Result: ~11% Power Savings.** The GPU power curve is **Non-Linear**. The static overhead limits consolidation savings, making strict isolation via MIG the safer choice.
