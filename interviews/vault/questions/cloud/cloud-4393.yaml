title: Workload Consolidation to Improve GPU Utilization and Power Efficiency
scenario: 'A cloud ML platform has 1,000 H100 GPUs allocated to batch inference jobs that average 35% GPU utilization. Power metering shows each GPU drawing 280W (idle + partial load). The platform team proposes consolidating workloads to run 350 GPUs at 100% utilization and powering off the remaining 650 GPUs. Evaluate this proposal: calculate the power savings, identify the risks of this strategy, and propose a hybrid approach using MIG (Multi-Instance GPU) or time-slicing.'
question: How much power would consolidating 1,000 underutilized H100s save, what risks does it create, and how would MIG or time-slicing improve it?
details:
  realistic_solution: 'Current: 1,000 GPUs × 280W = 280 kW. Consolidation: Packing jobs using Multi-Process Service (MPS) or time-slicing requires 350 GPUs at 100% utilization (700W). 350 × 700W = 245 kW. Powering off 650 GPUs (5W standby) adds 3.25 kW. Total = 248.25 kW (11.3% savings). Risk: Colocating batch jobs can cause OOMs if memory spikes, and waking GPUs from sleep takes 30-60s during sudden demand. MIG alternative: Use 3g.40gb MIG profiles (2 per H100) to strictly isolate jobs. 1000 jobs / 2 = 500 GPUs at ~70% load (~500W). 500 × 500W + 500 × 5W = 252.5 kW. This provides strict hardware isolation but slightly worse power efficiency than full MPS packing.'
  common_mistake: Assuming that powering off GPUs saves 100% of their power. GPUs in deep sleep or powered off still draw ~30-50W for keep-alive, NVLink heartbeat, and PCIe power. Also, candidates ignore the wake latency cost when demand spikes.
  napkin_math: 'Baseline: 1000 × 280W = 280 kW. Full consolidation (MPS): 350 × 700W + 650 × 5W = 248.25 kW. Savings: 31.75 kW (11.3%). MIG isolation (2 jobs/GPU): 500 × 500W + 500 × 5W = 252.5 kW. Savings: 27.5 kW (9.8%). Conclusion: Powering off idle GPUs saves much less than expected because GPUs draw only ~45W idle, whereas a 100% loaded GPU draws up to 700W. The non-linear power curve means running 3 GPUs at 35% (3 × 280W = 840W) actually consumes MORE power than 1 GPU at 100% (700W).'
