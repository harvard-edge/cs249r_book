title: LLM Batch Size Memory Limit on A100
scenario: You are deploying a 7B parameter LLM on an NVIDIA A100 (40GB) GPU for inference using FP16 precision.
  The static model weights consume 14GB of VRAM. Profiling shows that the KV cache and intermediate activation
  memory for your target sequence length of 1024 requires exactly 1GB per request. To maximize hardware
  utilization and throughput, an engineer proposes configuring the inference server with a maximum concurrent
  batch size of 32. Calculate the peak VRAM required under maximum load and determine the actual maximum
  feasible batch size.
details:
  realistic_solution: Calculate the total memory as Weights + (Batch Size × Activation Memory per Request).
    For a batch size of 32, the required memory is 14GB + 32GB = 46GB, which exceeds the 40GB A100 limit.
    To avoid OOM errors, the server must be capped at a maximum batch size of 26.
  common_mistake: Focusing primarily on the 14GB static model weight footprint and neglecting the linear
    O(N) scaling of activation and KV cache memory with respect to batch size, leading to unexpected out-of-memory
    (OOM) crashes in production.
  napkin_math: Peak VRAM Proposal = 14GB (weights) + (32 requests × 1GB/request) = 46GB. 46GB > 40GB VRAM
    capacity (OOM). Max feasible batch size = floor((40GB - 14GB) / 1GB) = 26.
