title: LLM Batch Size Memory Limit on A100
scenario: 'You are deploying a 7B parameter LLM on a 40GB GPU for inference using FP16 precision. The static model weights consume 14GB of VRAM. Profiling shows that the KV cache and intermediate activation memory for your target sequence length requires exactly 1GB per request. To maximize hardware utilization, an engineer proposes configuring the server with a maximum concurrent batch size of 32.'
question: "What peak VRAM is required for batch size 32 on the 40GB GPU, and what maximum feasible batch size should be configured?"
details:
  realistic_solution: 'Calculate the total memory as Weights + (Batch Size × Activation Memory per Request). For a batch size of 32, the required memory is 14GB + 32GB = 46GB, which exceeds the 40GB limit. To avoid OOM errors, the server must be capped at a maximum batch size of 26.'
  common_mistake: |
    **The Pitfall:** Focusing primarily on the static model weight footprint.
    **The Rationale:** Engineers accustomed to CNNs or stateless models assume that if the weights fit, inference will easily fit.
    **The Consequence:** Neglecting the linear O(N) scaling of activation and KV cache memory leads to unexpected out-of-memory (OOM) crashes under production load.
  napkin_math: |
    1. **Proposed Peak VRAM:**
       - Weights = 14 GB
       - KV Cache & Activations = 32 requests × 1 GB/request = 32 GB
       - Total = 14 GB + 32 GB = 46 GB.
    2. **OOM Check:** 46 GB > 40 GB capacity.
    3. **Max Feasible Batch Size:**
       - Available for requests = 40 GB - 14 GB = 26 GB
       - Max batch = floor(26 GB / 1 GB) = 26.
       
    **Final Result: A batch size of 32 requires 46GB (causing an OOM). The maximum feasible batch size is 26.**
