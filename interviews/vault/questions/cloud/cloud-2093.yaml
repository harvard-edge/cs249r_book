title: SSM vs Transformer Hardware Tradeoff
scenario: State-space models (SSMs) like Mamba replace attention with a recurrent scan operation. From a systems perspective, compare the training and inference hardware profiles of SSMs vs Transformers.
question: When does each architecture have a systems advantage?
details:
  realistic_solution: 'Training: Transformers are compute-bound with excellent GPU utilization (large GEMMs on Tensor Cores). SSMs use parallel scans that are less GEMM-friendly, often achieving lower hardware utilization. Transformers win on training throughput per FLOP. Inference: Transformers have $O(S)$ KV cache memory and must read it every token (bandwidth-bound). SSMs maintain a fixed-size hidden state ($O(d)$) regardless of sequence length — no KV cache, constant memory per token. For long contexts (32K+ tokens), SSMs have a massive serving advantage: constant memory vs linear growth.'
  common_mistake: |
    **The Pitfall:** Assuming SSMs are universally faster across all phases.
    **The Rationale:** SSMs avoid the $O(N^2)$ attention bottleneck, so they must be faster overall.
    **The Consequence:** Overlooking that during training, the parallel scan in SSMs lacks the highly optimized GEMM utilization of transformer attention, making them slower to train per FLOP.
  napkin_math: |
    - **70B Transformer (32K context):** KV cache ≈ 10+ GB per request -> severely limits batch size.
    - **70B SSM:** Fixed state ≈ 10 MB per request -> 1000× less per-request memory.
    - **Training Efficiency:** Transformer MFU is 40-50% (highly optimized dense GEMMs).
    - **SSM Efficiency:** SSM MFU is 25-35% (parallel scan ops are less hardware-friendly).
    - **Conclusion:** Transformers win on training throughput, but SSMs have a massive inference advantage for long sequences.
