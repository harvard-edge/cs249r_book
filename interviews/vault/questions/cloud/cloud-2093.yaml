title: SSM vs Transformer Hardware Tradeoff
scenario: State-space models (SSMs) like Mamba replace attention with a recurrent scan operation. From a systems perspective, compare the training and inference hardware profiles of SSMs vs Transformers.
question: When does each architecture have a systems advantage?
details:
  realistic_solution: 'During training, Transformers leverage large dense GEMMs that perfectly saturate Tensor Cores, yielding high Model FLOPs Utilization (MFU). SSMs rely on parallel associative scans which are less hardware-friendly, resulting in lower MFU. During inference, Transformers suffer from an $O(S)$ scaling KV cache that destroys memory bandwidth and limits batch size. SSMs maintain a constant $O(d)$ hidden state footprint, entirely bypassing the KV cache memory wall for infinite context generation.'
  common_mistake: |
    **The Pitfall:** Assuming SSMs are universally faster across both training and inference.
    **The Rationale:** SSMs avoid the notorious $O(N^2)$ compute bottleneck of self-attention, suggesting dominance everywhere.
    **The Consequence:** Overlooking the reality that modern GPUs are purpose-built for dense matrix multiplications; SSM parallel scans lack this mechanical sympathy, training slower per FLOP.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Context: 32K tokens.
       - Transformer state: $O(S)$ KV cache footprint.
       - SSM state: $O(d)$ fixed footprint.
    2. **Calculations:**
       - 70B Transformer at 32K context: KV cache ≈ 10+ GB per request (restricts batch size).
       - 70B SSM at 32K context: Fixed hidden state ≈ 10 MB per request (1000x smaller).
       - Training Efficiency (MFU): Transformers (GEMM) = 40-50%, SSMs (Scan) = 25-35%.
    3. **Conclusion & Interpretation:**
       - **Transformers win on training throughput (Compute-Bound), but SSMs hold a massive inference advantage for long sequences (Memory-Capacity Bound).**
