title: SSM vs Transformer Hardware Tradeoff
scenario: State-space models (SSMs) like Mamba replace attention with a recurrent scan operation. From
  a systems perspective, compare the training and inference hardware profiles of SSMs vs Transformers.
  When does each architecture have a systems advantage?
details:
  realistic_solution: 'Training: Transformers are compute-bound with excellent GPU utilization (large
    GEMMs on Tensor Cores). SSMs use parallel scans that are less GEMM-friendly, often achieving lower
    hardware utilization. Transformers win on training throughput per FLOP. Inference: Transformers have
    $O(S)$ KV cache memory and must read it every token (bandwidth-bound). SSMs maintain a fixed-size
    hidden state ($O(d)$) regardless of sequence length — no KV cache, constant memory per token. For
    long contexts (32K+ tokens), SSMs have a massive serving advantage: constant memory vs linear growth.'
  common_mistake: Assuming SSMs are universally faster. During training, the parallel scan in SSMs maps
    well to GPUs but lacks the highly optimized GEMM utilization of transformer attention. During inference,
    SSMs have clear advantages for long sequences because they avoid the KV cache entirely.
  napkin_math: '70B Transformer at 32K context: KV cache ≈ 10+ GB per request → limits batch size. | 70B
    SSM: fixed state ≈ 10 MB per request → 1000× less per-request memory. | Training: Transformer MFU
    40-50% (optimized GEMMs). SSM MFU 25-35% (scan ops).'
