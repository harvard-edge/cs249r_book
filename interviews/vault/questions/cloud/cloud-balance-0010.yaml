title: Pipeline Split Spec
scenario: A team wants to pipeline a 48-layer model across 6 GPUs. Specify what must be known before assigning layers to stages.
question: What information is needed before splitting a 48-layer model across 6 pipeline stages?
details:
  realistic_solution: You need per-layer compute time, activation size, parameter size, memory per stage, microbatch count, inter-stage bandwidth, and bubble tolerance. Equal layer count is not enough because layers can have different costs and activation sizes.
  common_mistake: Splitting 48 layers into 6 groups of 8 and assuming the pipeline is balanced.
  napkin_math: If one stage takes 40 ms and others take 25 ms, pipeline throughput is limited by the 40 ms stage.
