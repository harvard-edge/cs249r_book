title: 'TCO Mastery: Carbon Cost and Sustainable AI Infrastructure'
scenario: 'Calculate the total carbon footprint and carbon cost for training GPT-3
  (175B params, 3.14 * 10^23 FLOPs) on H100s (700W, 80% MFU). Compare: (1) coal-powered
  datacenter (0.82 kgCO2/kWh), (2) renewable-powered datacenter (0.05 kgCO2/kWh),
  (3) cost of carbon offsets at $50/ton CO2. Include both operational (training power)
  and embodied carbon (GPU manufacturing: ~50 kg CO2 per H100).'
question: What operational carbon and offset cost should be estimated for GPT-3 training
  on 8 H100s at 45% MFU, and why does the energy source matter?
details:
  realistic_solution: 'Use sustained throughput first: one H100 at FP16 is about 989
    TFLOP/s peak, so 8 GPUs at 45% MFU deliver about 3,560 TFLOP/s. Training 3.14e23
    FLOPs would take about 88.2 million seconds, or 24,500 hours, on only 8 H100s.
    GPU IT energy is 8 × 0.7 kW × 24,500h = 137 MWh before PUE. Coal at 0.82 kgCO2/kWh
    gives roughly 112 tCO2 before PUE; renewable at 0.05 gives about 6.9 tCO2. At
    $50/t, offsets are about $5.6K for coal energy versus $345 for renewable energy,
    before embodied carbon and facility overhead.'
  common_mistake: Only counting operational energy during training without including
    the embodied carbon from GPU manufacturing and the power consumption of cooling
    infrastructure (PUE factor).
  napkin_math: Throughput = 8 × 989 TFLOP/s × 0.45 = 3,560 TFLOP/s = 3.56e15 FLOP/s.
    Time = 3.14e23 / 3.56e15 = 8.82e7 s = 24,500 h. Energy = 8 × 0.7 kW × 24,500h
    = 137,200 kWh. Coal CO2 = 137,200 × 0.82 = 112,504 kg = 112.5 t. Renewable CO2
    = 6.86 t. Offset cost at $50/t ≈ $5,625 vs $343.
