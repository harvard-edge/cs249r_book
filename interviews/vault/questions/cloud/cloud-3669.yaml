title: Tensor Parallelism Embedding Layer Split and Vocabulary Parallelism
scenario: A 7B model with 128K vocabulary size is being trained with TP=4. The embedding layer (128K * 4096 * 2 bytes = 1GB) and the output LM head (same 1GB) together consume 2GB. A team member suggests these can also be tensor-parallelized.
question: How would you tensor-parallelize the 128K-token embedding and LM head with TP=4, and what communication does it add?
details:
  realistic_solution: 'Split vocabulary dimension: each GPU holds [32K, 4096] of the embedding matrix (128K/4 = 32K per GPU). During forward: each GPU gathers embeddings only for tokens in its vocabulary shard, then all-reduce across TP ranks to get the full embedding vector. This requires one all-reduce per embedding lookup. For the LM head: each GPU computes logits for its vocabulary shard, then all-gather for top-k sampling.'
  common_mistake: |
    **The Pitfall:** Splitting the vocabulary embedding along the embedding dimension (4096/4 = 1024 per GPU).
    **The Rationale:** Slicing the hidden dimension requires gathering partial embeddings before any downstream computation can proceed, creating a severe bottleneck.
    **The Consequence:** Memory is not saved along the massive vocabulary dimension, and the resulting communication overhead stalls the forward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 128K vocab, TP=4: 32K tokens/GPU * 4096 * 2 bytes = 256 MB/GPU.
       * Full embedding is 1024 MB.
    2. **Calculations:**
       * Memory savings: 1024 - 256 = 768 MB/GPU.
       * All-reduce for embedding: batch * seq * hidden_dim * 2 bytes = 8 * 2048 * 4096 * 2 = 134 MB.
       * At 600 GB/s NVLink bandwidth: 134 MB / 600 GB/s = 0.22 ms per step.
       * 50K training steps: 0.22 ms * 2 (fwd+bwd) * 50K = 22 seconds of communication.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound Optimization.** Embedding parallelization yields significant memory savings with entirely negligible communication overhead.
