title: H100 Batch Size 1 Compute Collapse
scenario: Your team is deploying a generative model on an H100 GPU (989 TFLOPS FP16, 3.35 TB/s HBM3 bandwidth, ridge point ~295 FLOPs/Byte). Profiling reveals that during batch size 1 inference, the GPU compute pipeline reports less than 1% utilization despite memory bandwidth being completely saturated. The core matrix-vector multiplications for batch size 1 have an arithmetic intensity of exactly 1 FLOP per Byte in FP16.
question: Why does H100 compute utilization collapse below 1% for batch-1 inference with an arithmetic intensity of 1 FLOP/Byte?
details:
  realistic_solution: The candidate should apply the roofline model and identify that the workload is severely memory-bandwidth bound. Because the arithmetic intensity is vastly lower than the H100's ridge point, the compute units spend almost all their time stalled, waiting for model weights to stream in from HBM3.
  common_mistake: |
    **The Pitfall:** Assuming low utilization stems from poorly optimized CUDA kernels, CPU dispatch overhead, or PCIe transfer bottlenecks.
    
    **The Rationale:** Software engineers default to blaming the code (e.g., "we need to write a custom Triton kernel") instead of evaluating the fundamental hardware bounds mathematically exposed by the Roofline Model.
    
    **The Consequence:** The team burns massive engineering hours attempting to optimize host-level dispatch or arithmetic instructions, entirely failing to improve speed because the physics of the HBM bandwidth literally cannot feed the cores faster.
  napkin_math: |
    - **Attainable Performance**: Memory Bandwidth * Arithmetic Intensity = 3.35 TB/s * 1 FLOP/Byte = 3.35 TFLOPS.
    - **Compute Utilization**: Attainable Performance / Peak Compute = 3.35 TFLOPS / 989 TFLOPS = 0.00338.
    - **Result**: The utilization is brutally capped at **~0.34%**, physically mandated by memory limits regardless of code quality.
