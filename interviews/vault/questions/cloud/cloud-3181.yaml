title: Parallel Draft and Target Execution Scheduling
scenario: In standard speculative decoding, draft generation and target verification are serial. On a 4-GPU system with the target using TP=4 and a 1B draft, you need to design a pipelining scheme to optimize throughput.
question: How would you overlap draft generation of round N+1 with target verification of round N, and what rollback issue arises?
details:
  realistic_solution: Use GPU-0 for both draft (when target is verifying) since during target verification with TP=4, each GPU runs 1/4 of the work leaving spare SM capacity on GPU-0. The rollback issue is that draft generation for round N+1 must use SPECULATIVE tokens from round N. If round N rejects a token, draft N+1's tokens are invalid requiring an optimistic execution model.
  common_mistake: |
    **The Pitfall:** Running draft and target kernels concurrently on the same GPUs without resource partitioning.
    **The Rationale:** Candidates assume CUDA streams on the same GPU will perfectly parallelize without contention.
    **The Consequence:** The concurrent kernels compete for SMs and memory bandwidth, slowing down both processes and increasing total latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target verification time: 10.5ms.
       - Draft generation time (K=5): 5ms.
       - Rejection probability per sequence: ~67%.
    2. **Calculations:**
       - Serial time = 10.5ms + 5ms = 15.5ms.
       - Wasted draft time on optimistic rollback = 67% chance of rejection * 5ms = 3.35ms.
       - Net pipelined time = 10.5ms + 3.35ms = 13.85ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Pipelining improves latency by ~10.6% (15.5ms vs 13.85ms) even accounting for the optimistic rollback penalty.
