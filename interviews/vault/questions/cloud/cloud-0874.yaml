title: Diagnosing H100 Pipeline Bottlenecks
scenario: Your team migrates a PyTorch vision model training pipeline from an 8x A100 node to an 8x H100
  node. The H100 hardware provides a 3.2x theoretical speedup in dense FP16 TFLOPS over the A100. However,
  after the migration, you observe only a 1.4x end-to-end training speedup per epoch. Profiling the original
  A100 pipeline revealed that 25% of the epoch time was spent on CPU-bound data augmentation and dataloading,
  while 75% was spent on GPU compute. Diagnose why the observed speedup falls so drastically short of
  the hardware's theoretical capabilities.
details:
  realistic_solution: Apply Amdahl's Law to diagnose the structural bottleneck. The theoretical maximum
    speedup is bottlenecked by the 25% serial (unaccelerated) CPU time. Even with an infinitely fast GPU,
    the pipeline could never exceed a 4x speedup. With the 3.2x GPU acceleration, the expected speedup
    is only ~2.06x. The further drop to 1.4x suggests that the CPU dataloader became a hard sequential
    bottleneck (likely hitting thermal limits, thread contention, or memory bandwidth walls) when trying
    to feed the faster H100s. The solution is to offload augmentation to the GPU using tools like NVIDIA
    DALI or scale up the CPU thread count.
  common_mistake: Assuming that end-to-end pipeline speedup will scale linearly with the GPU's theoretical
    TFLOPS increase, completely ignoring the unaccelerated CPU data loading fraction which caps the maximum
    possible throughput.
  napkin_math: 'Amdahl''s Law Formula: S_overall = 1 / ((1 - P) + P / S_gpu)

    Unaccelerated fraction (1 - P) = 0.25 (CPU dataloading)

    Accelerated fraction (P) = 0.75 (GPU compute)

    Hardware Speedup (S_gpu) = 3.2

    S_overall = 1 / (0.25 + 0.75 / 3.2)

    S_overall = 1 / (0.25 + 0.234) = 1 / 0.484 = 2.06x max theoretical speedup. The actual 1.4x indicates
    the unaccelerated portion''s absolute time increased under heavier parallel pressure.'
