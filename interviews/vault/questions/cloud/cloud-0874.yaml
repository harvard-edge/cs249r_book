title: Diagnosing H100 Pipeline Bottlenecks
scenario: Your team migrates a PyTorch vision model training pipeline from an 8x A100 node to an 8x H100 node. The hardware provides a 3.2x theoretical speedup in dense FP16 TFLOPS. However, after migration, you observe only a 1.4x end-to-end training speedup per epoch. Profiling the original pipeline revealed 25% of the epoch time was spent on CPU-bound data augmentation and 75% on GPU compute.
question: Why does the hardware migration deliver only 1.4x end-to-end speedup instead of the 3.2x FP16 TFLOPS gain?
details:
  realistic_solution: Apply Amdahl's Law to diagnose the structural bottleneck. The theoretical maximum speedup is bottlenecked by the 25% serial (unaccelerated) CPU time. Even with an infinitely fast GPU, the pipeline could never exceed a 4x speedup. With the 3.2x GPU acceleration, the expected speedup is only ~2.06x. The further drop to 1.4x suggests that the CPU dataloader became a hard sequential bottleneck (likely hitting thermal limits, thread contention, or memory bandwidth walls) when trying to feed the faster H100s. The solution is to offload augmentation to the GPU using tools like NVIDIA DALI or scale up the CPU thread count.
  common_mistake: |
    **The Pitfall:** Assuming end-to-end pipeline speedup scales linearly with theoretical TFLOPS.
    **The Rationale:** Candidates ignore the unaccelerated CPU data loading fraction, violating Amdahl's Law.
    **The Consequence:** Wasting capital budget on faster GPUs without upgrading the CPU or memory bandwidth to feed them, leaving the expensive GPUs perpetually starved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unaccelerated Fraction (1 - P): 0.25 (CPU dataloading).
    - Accelerated Fraction (P): 0.75 (GPU compute).
    - Hardware Speedup (S_gpu): 3.2x.

    **Calculations:**
    - Amdahl's Law Formula: S_overall = 1 / ((1 - P) + P / S_gpu).
    - Maximum Theoretical Speedup: 1 / (0.25 + (0.75 / 3.2)) = 1 / (0.25 + 0.234) ≈ 2.06x.

    **Conclusion & Interpretation:**
    - **Result: 2.06x Max Speedup (Amdahl's Law Bottleneck).** The maximum possible speedup is limited to 2.06x; the drop to 1.4x indicates the CPU became a hard sequential bottleneck.
