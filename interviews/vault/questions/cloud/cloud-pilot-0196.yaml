title: Checkpoint Interval Collapse At Scale
scenario: A 2,048-GPU training run has node MTBF of 90 days and writes a checkpoint in 12 minutes. The team checkpoints every 4 hours. During a 10-day run, failures repeatedly waste hours of progress. Diagnose whether the checkpoint interval is too long.
question: Is a 4-hour checkpoint interval too long for a 2,048-GPU job with 90-day node MTBF and 12-minute checkpoint writes?
details:
  realistic_solution: Cluster MTBF is 90 days / 2,048, about 63 minutes. A 4-hour interval is much longer than the expected time between failures, so many failures occur before the next checkpoint. Young-Daly suggests an interval around sqrt(2 x checkpoint_time x cluster_MTBF), roughly 39 minutes using 12 and 63 minutes. The current interval is far too long.
  common_mistake: Using single-node MTBF and forgetting cluster MTBF shrinks linearly with node count.
  napkin_math: Cluster MTBF = 90 x 24 x 60 / 2048 = 63 min. Young-Daly = sqrt(2 x 12 x 63) = sqrt(1512) = 39 min for idealized checkpoint cost; in any case far below 4 hours.
