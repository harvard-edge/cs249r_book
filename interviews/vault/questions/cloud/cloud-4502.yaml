title: Paged Attention for OOM Mitigation
scenario: Serving Llama-2-70B on 4x H100 SXM GPUs. Memory is heavily fragmented due
  to multi-turn conversations of varying lengths, causing Out-Of-Memory (OOM) crashes.
question: Explain how Paged Attention translates continuous logical token queries
  into fragmented physical memory accesses.
visual:
  kind: svg
  path: cloud-4502.svg
  alt: Diagram comparing contiguous memory slots vs disjoint physical blocks connected
    by a mapping table.
  caption: Logical to Physical Page Mapping
details:
  realistic_solution: Paged Attention divides the KV cache into fixed-size blocks
    (e.g., 16 tokens). It maintains a block table mapping logical sequence positions
    to non-contiguous physical blocks in HBM. During the attention computation, the
    GPU kernels use this block table to gather keys and values on-the-fly, completely
    eliminating external fragmentation and allowing 100% utilization of available
    memory.
  common_mistake: Confusing Paged Attention with standard OS virtual memory swapping
    (paging to disk), which would be far too slow for attention computation.
  napkin_math: Internal fragmentation < 1 block (e.g., 16 tokens)
