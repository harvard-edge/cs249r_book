title: RoCE v2 Packet Format and GRH Overhead
scenario: RoCE v2 encapsulates RDMA operations in UDP/IP packets, adding Ethernet,
  IP, UDP, and IB Transport headers to each packet. For a 4KB RDMA Write payload,
  calculate the total header overhead and the effective payload efficiency. Compare
  this to native InfiniBand's header overhead.
question: For a 4KB RDMA Write payload, what are the RoCE v2 header overhead and payload
  efficiency compared with native InfiniBand?
details:
  realistic_solution: 'RoCE v2 packet structure: Ethernet header (14 bytes) + optional
    VLAN tag (4 bytes) + IPv4/IPv6 header (20/40 bytes) + UDP header (8 bytes) + IB
    BTH (Base Transport Header, 12 bytes) + RETH (RDMA Extended Transport Header,
    16 bytes for RDMA Write) + Payload (4096 bytes) + ICRC (4 bytes) + FCS (4 bytes).
    Total headers (IPv4, with VLAN): 14 + 4 + 20 + 8 + 12 + 16 + 4 + 4 = 82 bytes.
    Total packet: 82 + 4096 = 4178 bytes. Payload efficiency: 4096 / 4178 = 98.0%.
    Native InfiniBand: LRH (Local Route Header, 8 bytes) + GRH (Global Route Header,
    40 bytes, optional) + BTH (12 bytes) + RETH (16 bytes) + Payload + ICRC (4 bytes)
    + VCRC (2 bytes). Without GRH: 8 + 12 + 16 + 4 + 2 = 42 bytes overhead. Efficiency:
    4096 / 4138 = 99.0%. IB has ~1% better efficiency due to fewer protocol layers.
    At 400Gbps: RoCE overhead = 82 bytes × 12.2M packets/sec = 7.95 Gbps wasted. IB:
    42 bytes × 12.2M = 4.07 Gbps. Difference: 3.88 Gbps = ~1% of line rate.'
  common_mistake: Ignoring the cumulative header overhead across all layers. Each
    protocol layer adds its own header, and for small packets the overhead fraction
    can be significant. Also confusing RoCE v1 (no IP routing, Ethernet-only) with
    RoCE v2 (routable via UDP/IP).
  napkin_math: 'RoCE v2 4KB payload: 98.0% efficient. 1KB payload: 1024/(1024+82)
    = 92.6%. 64B payload (small RDMA write): 64/(64+82) = 43.8% — headers are larger
    than payload! For gradient AllReduce with 4KB MTU: 2% overhead. At 400Gbps: 2%
    = 8 Gbps wasted on headers = 1 GB/s throughput loss.'
