title: Diagnosing Low Host-to-Device Bandwidth
scenario: Your team is training a model on an H100 GPU connected via PCIe Gen5 x16. The dataloader transfers a 4 GB batch of float32 features from host RAM to the GPU at the start of each step. Profiling logs show this host-to-device transfer reliably takes 250 ms per batch, and the GPU is frequently idle waiting for data.
question: Why does the 4 GB host-to-device batch transfer take 250 ms over PCIe Gen5 instead of the theoretical minimum, and how can it be fixed?
details:
  realistic_solution: 'The root cause is transferring data from pageable (non-pinned) host memory. Because the DMA controller cannot safely access pageable memory, the PCIe driver must first perform a synchronous host-to-host CPU copy from the pageable buffer into a pre-allocated pinned (page-locked) staging buffer. The solution is to use pinned memory (e.g., `pin_memory=True` in PyTorch) so the DMA engine can pull directly from the user buffer, eliminating the extra host copy overhead.'
  common_mistake: |
    **The Pitfall:** Assuming the PCIe bus is congested or blaming Python overhead without calculating the theoretical hardware limits.
    **The Rationale:** Candidates frequently fail to recall that standard OS memory allocations are pageable, preventing direct DMA and requiring a slow synchronous host-to-host copy first.
    **The Consequence:** Leaving massive amounts of data transfer latency on the table, resulting in starved GPUs and slow training.
  napkin_math: |
    *   **Theoretical Bandwidth:** PCIe Gen5 x16 unidirectional is 64 GB/s.
    *   **Theoretical Time:** 4 GB / 64 GB/s = 62.5 ms.
    *   **Observed Time:** 250 ms (Effective bandwidth = 4 GB / 0.250 s = 16 GB/s).
    *   **Discrepancy:** 250 ms - 62.5 ms = 187.5 ms overhead.
    *   **Final Result:** **The ~187.5 ms overhead is exactly the time taken for a CPU copy from pageable to pinned memory over typical DDR memory (4 GB / ~21.3 GB/s).**
