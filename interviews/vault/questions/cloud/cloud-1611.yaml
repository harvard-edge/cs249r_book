title: Evaluating TP and PP Placement for 175B LLMs
scenario: Your team is architecting the training cluster for a 175B parameter language model using FP16.
  The model states require over 2TB of memory, far exceeding a single A100 80GB GPU. You have a cluster
  of DGX A100 nodes (8 GPUs per node, 600 GB/s NVLink intra-node, 200 Gbps InfiniBand inter-node). You
  must evaluate and justify the optimal combination and placement of Tensor Parallelism (TP) and Pipeline
  Parallelism (PP) across this hardware topology to maximize MFU (Model Flops Utilization).
details:
  realistic_solution: Restrict Tensor Parallelism strictly to intra-node GPUs (e.g., TP=8) to utilize
    the 600 GB/s NVLink for intensive all-reduce operations. Use Pipeline Parallelism (PP) across nodes,
    as PP only requires passing activation boundaries, which easily fits within the 25 GB/s InfiniBand
    capacity.
  common_mistake: Placing Tensor Parallelism across node boundaries, failing to recognize that TP requires
    synchronous all-reduce operations on every layer, which will be severely bottlenecked by the slower
    inter-node InfiniBand.
  napkin_math: 'TP communication needs ~100 GB/s per layer for typical LLM batches. NVLink provides 600
    GB/s (sufficient), but IB at 200 Gbps provides only 25 GB/s (a 24x bottleneck vs NVLink). PP only
    transmits boundary activations per micro-batch (e.g., micro-batch=1, seq=2048, hidden=12288, BF16:
    1 * 2048 * 12288 * 2 = ~50 MB), which can be efficiently pipelined over the 25 GB/s IB link (transfer
    time ~2ms) without stalling compute that takes 10s of ms per stage.'
