title: INT8 Quantization Calibration Strategy for LLM Inference on H100
scenario: You're quantizing a 13B parameter LLaMA model to INT8 for deployment. Using post-training quantization (PTQ) with per-tensor scaling, you observe 3.2% perplexity degradation on WikiText-2. The team proposes per-channel weight quantization.
question: "What are the accuracy and hardware-efficiency tradeoffs of per-tensor versus per-channel INT8 quantization for the 13B LLaMA model?"
details:
  realistic_solution: 'Per-tensor INT8: single scale per tensor, fully hardware-efficient, but suffers from outlier channels in LLM activations. Per-channel weights: one scale per output channel (13B model has ~32K channels across all layers), adds 32K x 4B = 128KB overhead — negligible. Expected perplexity improvement: per-channel weight quantization typically reduces error by 1-2 PPL points. For activations, use SmoothQuant to migrate quantization difficulty from activations to weights via per-channel scaling of the weight matrix, maintaining hardware INT8 throughput.'
  common_mistake: |
    **The Pitfall:** Applying per-channel quantization to activations as well as weights.
    **The Rationale:** Activation per-channel scaling is not hardware-friendly because scale factors must be applied dynamically.
    **The Consequence:** Severe degradation of hardware INT8 compute throughput.
  napkin_math: |
    1. **Assumptions & Constraints:** 13B model (26GB FP16), ~32K channels, INT8 quantization, 4B (FP32) scale factors.
    2. **Calculations:** Per-channel weight overhead = 32K scales x 4B = 128KB. Overhead percentage = 128KB / 26GB = ~0.0005%.
    3. **Conclusion & Interpretation:** **Result: Negligible Memory Overhead.** Yields 1-2 points PPL gain while maintaining hardware throughput.
