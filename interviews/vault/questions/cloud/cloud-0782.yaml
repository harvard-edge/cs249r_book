title: Trillion-Parameter MoE Training on TPU Torus Topology
scenario: We are training a 2-Trillion parameter MoE model on a TPU v5p multi-slice cluster (10,000+ chips). Communication overhead over the Optical Circuit Switches (OCS) between slices is severely bottlenecking Model Flops Utilization (MFU).
question: How would you map 3D plus expert parallelism for a 2T MoE on 10,000+ TPU v5p chips to avoid OCS bottlenecks and reach 45% MFU?
details:
  realistic_solution: 'Constrain Expert Parallelism (EP) strictly to the ultra-fast intra-slice Inter-Chip Interconnect (ICI). Shuffling tokens across the much slower DCN/OCS network destroys performance.'
  common_mistake: |
    **The Pitfall:** Applying standard 3D parallelism + EP agnostically to physical topology.
    **The Rationale:** Engineers assume logical software parallelism maps cleanly to arbitrary hardware boundaries.
    **The Consequence:** Expert routing over slow OCS causes massive network stalls, dropping MFU below 5%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EP shuffle payload = 65 GB per layer.
       - Slow OCS DCN = 100 Gbps (12.5 GB/s).
       - Fast Torus ICI = 4800 Gbps (600 GB/s).
    2. **Calculations:**
       - Time over OCS = 65 GB / 12.5 GB/s = 5.2s per layer.
       - Time over ICI = 65 GB / 600 GB/s = 0.1s per layer.
    3. **Conclusion & Interpretation:**
       - **Result: Topology-Bound (Restricting EP to ICI yields a 50x speedup in All-to-All).**
