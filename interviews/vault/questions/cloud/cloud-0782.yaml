title: Trillion-Parameter MoE Training on TPU Torus Topology
scenario: We are training a 2-Trillion parameter Mixture-of-Experts (MoE) foundational model from scratch
  on a massive TPU v5p multi-slice cluster (10,000+ chips). Communication overhead over the Optical Circuit
  Switches (OCS) between slices is severely bottlenecking our Model Flops Utilization (MFU). Design a
  3D + Expert parallelism strategy that maps optimally to the physical TPU 3D torus topology to hit at
  least 45% MFU.
details:
  realistic_solution: The parallelism strategy must strictly map to the physical boundaries of the cluster.
    A TPU v5p pod (slice) contains 8,960 chips connected via ultra-fast 4,800 Gbps 3D Torus ICI. Slices
    are connected via much slower ~100 Gbps DCN via OCS.
  common_mistake: Applying standard 3D parallelism (Data + Tensor + Pipeline) and Expert Parallelism (EP)
    agnostically to the network topology. Distributing the All-to-All communication required for routing
    tokens to Experts across the slower OCS (Data Center Network) instead of the fast Inter-Chip Interconnect
    (ICI).
  napkin_math: '- **Model State:** 2T params * 2 bytes (BF16) = 4 TB weights. Adam optimizer = 16 TB.
    Total = 20 TB per replica. | - **TPU v5p:** 95GB HBM/chip. Minimum chips per replica = `20 TB / 95
    GB = ~210 chips`. | - **Expert All-to-All:** If batch size is 4M tokens, dim=8192, BF16 -> 65 GB of
    data to shuffle per layer. | - **Network Cliff:** If EP spans across OCS (100 Gbps = 12.5 GB/s), All-to-All
    takes `65 GB / 12.5 GB/s = 5.2 seconds` *per layer*. Over 100 layers, that''s 520s of pure network
    stall per step (MFU drops to <5%). | - **Optimized Mapping:** Constraining EP to intra-slice ICI (4800
    Gbps = 600 GB/s) reduces All-to-All time to `65 GB / 600 GB/s = 0.1 seconds` per layer. Overlapping
    FSDP over OCS hides the DCN latency, bringing MFU back above 45%.'
