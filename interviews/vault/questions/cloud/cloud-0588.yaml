title: The AI Startup's Cost of Goods Sold Crisis
scenario: You are the new Tech Lead for the 'LLM Efficiency' team at a major AI startup. Your flagship product, a 70B parameter coding assistant, is hemorrhaging money due to inference costs on a large fleet of H100 GPUs serving the vanilla FP16 model. The CFO's mandate is stark: "Reduce inference cost-per-user by 50% within 6 months without a noticeable drop in code-generation quality."
question: What phased plan would you use to cut the 70B coding assistant's inference cost per user by 50% without noticeable quality loss?
details:
  realistic_solution: A strategic, phased approach demonstrates senior-level thinking. The optimal plan prioritizes the highest-impact, lowest-effort changes first, stacking their benefits before committing to high-risk, high-cost options like distillation.
  common_mistake: |
    **The Pitfall:** Proposing only one "silver bullet" solution, like massive model distillation.
    **The Rationale:** Engineers often want to tackle the most intellectually complex or academically impressive optimization first.
    **The Consequence:** This approach ignores low-hanging fruit, underestimates the risk and time cost of retraining, and fails to recognize the powerful multiplicative effects of stacking compatible software optimizations.
  napkin_math: |
    - **Baseline FP16:** 70B model = 140GB. Needs 2&times; 80GB H100s (160GB total). Leaves 20GB for KV cache. Severe memory fragmentation limits batch size, yielding &approx;24 tokens/s on 2 GPUs.
    - **Phase 1 (PagedAttention):** Eliminates memory fragmentation, doubling batch size in the same 20GB space. Throughput doubles to &approx;48 tokens/s on 2 GPUs.
    - **Phase 2 (INT8 Quantization):** Reduces weights to 70GB, fitting on a single 80GB H100 (halving hardware footprint) while leaving 10GB for KV cache.
    - **Synergy:** With PagedAttention, the 10GB KV space fits the original baseline batch size, yielding &approx;24 tokens/s on 1 GPU.
    - **Conclusion:** 24 tokens/s on 1 GPU vs 24 tokens/s on 2 GPUs cuts the hardware cost per user by **exactly 50%**.
