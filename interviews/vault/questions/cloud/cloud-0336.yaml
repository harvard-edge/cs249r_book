title: The PUE Tax
scenario: You are installing a new AI server with 8 GPUs into a modern, liquid-cooled datacenter. Each GPU has a Thermal Design Power (TDP) of 700 Watts. The facility has a Power Usage Effectiveness (PUE) of 1.1.
question: What does PUE represent, and what total grid power does the 8-GPU server draw with a PUE of 1.1?
details:
  realistic_solution: PUE stands for Power Usage Effectiveness and is the ratio of a datacenter's total power consumption to the power used by the IT equipment inside it. A PUE of 1.1 means that for every 1.0W the server uses for computation, the facility uses an additional 0.1W for cooling, power distribution, and lighting.
  common_mistake: |
    **The Pitfall:** Ignoring the PUE entirely and summing only the TDP (5.60 kW).
    **The Rationale:** Candidates focus solely on the compute hardware, neglecting the significant power required for cooling, power distribution, and facility infrastructure.
    **The Consequence:** Under-provisioning datacenter power capacity, leading to blown breakers and catastrophic downtime.
  napkin_math: |
    - **Calculate IT Equipment Power:** 8 GPUs * 700 W/GPU = 5,600 W or 5.6 kW.
    - **Calculate Total Facility Power:** 5.6 kW * 1.1 PUE = 6.16 kW.
    - **Cooling & Infrastructure Overhead:** 6.16 kW - 5.6 kW = 0.56 kW.
    - **Result:** **For every 5.6 kW of useful AI compute, the facility uses 560 Watts just to keep the servers cool and running.**
  options:
  - 5.60 kW
  - 0.77 kW
  - 6.16 kW
  - 6.72 kW
  correct_index: 2
