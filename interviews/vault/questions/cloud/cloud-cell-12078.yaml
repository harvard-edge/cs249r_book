title: 'Model Size Estimation: Design Quantization Strategy for Fitting 70B on Single H100'
scenario: 'Design a quantization strategy to fit a 70B LLaMA model on a single H100 (80GB HBM3) for low-latency
  single-request inference (no batching). Consider: weight-only quantization (INT4, INT8), activation
  quantization (FP8), mixed precision (INT4 weights + FP16 activations), and their accuracy/latency tradeoffs.
  Specify exact memory layout.'
details:
  realistic_solution: 'Strategy: INT4 weights + FP16 activations (W4A16). Memory: 70B × 0.5B = 35GB weights.
    Embeddings (vocab 32K × 8192 hidden × FP16): 32K×8192×2=512MB. LM head: same 512MB. KV cache (batch=1,
    seq=4096, 80 layers, 8192 hidden): 1×4096×2×8192×2×80=8.6GB. Total: 35+0.5+0.5+8.6=44.6GB ✓ (fits
    with 35GB headroom). Inference: weight dequantize INT4→FP16 on-the-fly: 35GB reads at 3.35TB/s = 10.4ms/token.
    6× faster than FP16 (62.5ms). Accuracy: GPTQ INT4 on LLaMA-70B: <1% perplexity increase.'
  common_mistake: Applying uniform INT4 quantization to all layers including embedding and LM head, which
    causes catastrophic accuracy degradation vs. keeping embeddings in FP16.
  napkin_math: 'W4A16: 70B × 4 bits / 8 = 35GB. Embeddings FP16: 32K×8192×2B = 512MB. LM head: 512MB.
    KV: 4096×2×8192×2×80=8.59GB. Total: 35+0.5+0.5+8.59=44.59GB < 80GB ✓. Decode: read 35GB per step at
    3.35TB/s = 10.4ms/token. FP16 baseline: 140GB/3.35TB/s = 41.8ms/token. Speedup: 4×. Accuracy: GPTQ
    INT4 perplexity delta on Wikitext-2: ~0.3 points.'
