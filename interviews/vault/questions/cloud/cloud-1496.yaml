title: Triton Debug Port Exposure Risks
scenario: 'You are deploying a 70B parameter LLM via Triton Inference Server. To aid in production debugging, the team proposes exposing the gRPC metrics endpoint and the model analyzer profiler port to the internal developer network, which is accessible to 10,000+ engineers.'
question: 'What are the security risks of exposing Triton metrics and profiler ports to 10,000 engineers, and how should observability be secured?'
details:
  realistic_solution: 'Exposing Triton profiler ports permits arbitrary memory reads. An internal attacker or SSRF vulnerability could dump the raw model weights or reconstruct sensitive user prompts from GPU memory. Disable profiling endpoints in production builds entirely. Route required metrics through an Envoy sidecar proxy with strict mTLS and RBAC, whitelisting only the IPs of the Prometheus scrapers.'
  common_mistake: |
    **The Pitfall:** Relying purely on VPC perimeters for security.
    **The Rationale:** Candidates assume internal corporate networks are inherently secure, failing to realize that internal SSRF or compromised machines can trivially exploit unauthenticated profiling ports.
    **The Consequence:** An attacker exfiltrates proprietary model weights or sensitive user data in minutes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model in FP16 = 140GB weights.
       - Internal network: 10 Gbps Ethernet (~1.2 GB/s).
    2. **Calculations:**
       - Exfiltration time: 140 GB / 1.2 GB/s = 116 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: The entire proprietary model is stolen in under 2 minutes, bypassing standard 5-minute SIEM anomaly detection (Security-Bound).**
