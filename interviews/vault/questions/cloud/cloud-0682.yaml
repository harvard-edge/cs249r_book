title: The Distributed Training Data Bottleneck
scenario: Your team is training a large vision model on 32 A100 GPUs distributed across 8 instances, using
  PyTorch DDP. You notice that while GPU utilization is high during the initial epochs, it frequently
  drops to 40-50% during later epochs, despite sufficient CPU and memory on each instance. `nvidia-smi`
  shows GPUs are often idle for short bursts. The data is stored in a shared S3 bucket and loaded via
  `torch.utils.data.DataLoader` with multiple worker processes. What is the most likely bottleneck, and
  how would you systematically diagnose and resolve it?
details:
  realistic_solution: The most likely bottleneck is **data loading and I/O from S3**. As training progresses,
    the data access patterns might become less cache-friendly, or network contention for S3 access becomes
    an issue, especially with multiple workers across many instances simultaneously fetching data. The
    short bursts of GPU idle time indicate the GPUs are "waiting" for data from the CPU/I/O subsystem.
  common_mistake: '"Increase batch size" or "Optimize model architecture." While these can help GPU utilization,
    the observation of drops *later* in training and short idle bursts points away from model-internal
    issues and towards data I/O.'
  napkin_math: A single A100 GPU can process ~1000 images/sec (batch size 128, typical ResNet). With 32
    GPUs, this is 32,000 images/sec. If each image is 1MB, total data throughput needed is 32 GB/sec.
    A single `c5n.18xlarge` instance has up to 100 Gbps (12.5 GB/s) network bandwidth. 8 instances could
    theoretically provide 100 GB/s. However, S3 throughput per object can be limited, and network bottlenecks
    often arise from shared paths or single-threaded data loaders. Local NVMe SSDs can deliver 5-10 GB/s
    *per instance*. Caching 1TB of data on local SSDs would take ~2 minutes at 8 GB/s.
