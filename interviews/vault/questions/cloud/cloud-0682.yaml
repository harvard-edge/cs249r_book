title: The Distributed Training Data Bottleneck
scenario: Your team is training a large vision model on 32 A100 GPUs distributed across 8 instances, using PyTorch DDP. You notice that while GPU utilization is high during the initial epochs, it frequently drops to 40-50% during later epochs, despite sufficient CPU and memory on each instance. `nvidia-smi` shows GPUs are often idle for short bursts. The data is stored in a shared S3 bucket and loaded via `torch.utils.data.DataLoader` with multiple worker processes.
question: What is the most likely bottleneck, and how would you systematically diagnose and resolve it?
details:
  realistic_solution: The most likely bottleneck is **data loading and I/O from S3**. As training progresses, the data access patterns might become less cache-friendly, or network contention for S3 access becomes an issue, especially with multiple workers across many instances simultaneously fetching data. The short bursts of GPU idle time indicate the GPUs are "waiting" for data from the CPU/I/O subsystem.
  common_mistake: |
    **The Pitfall:** Suggesting to "increase batch size" or "optimize model architecture."
    **The Rationale:** Candidates see low GPU utilization and assume the model isn't doing enough compute per step.
    **The Consequence:** They ignore that utilization drops happen *later* in training and feature short idle bursts, failing to identify the data I/O bottleneck.
  napkin_math: |
    1. An A100 GPU processes ~1000 images/sec (batch size 128).
    2. 32 GPUs = 32,000 images/sec.
    3. At 1 MB/image, throughput needed is 32 GB/sec.
    4. S3 throughput per object can be limited, causing network bottlenecks.
    5. Local NVMe SSDs deliver 5-10 GB/s per instance. Caching 1 TB of data on local SSDs would take ~2 minutes at 8 GB/s.
    6. **Result:** **The network link to S3 chokes under the 32 GB/s demand, starving the GPUs and dropping utilization.**
