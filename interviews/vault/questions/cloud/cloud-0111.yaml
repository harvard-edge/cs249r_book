title: The Chatbot Throughput Collapse
scenario: You run a popular AI chatbot service using a 13B model on H100 GPUs. During peak hours, the
  arrival rate (λ) of new conversations hits 15 requests/second per server. Your server uses a simple
  FIFO queue and static batching with a batch size of 16. The measured service time for one full static
  batch (including prefill and generating an average of 100 tokens for all 16 users) is 1.2 seconds. Users
  are complaining of extreme delays, with some waiting over 10 seconds for a response. Using queueing
  theory, what is the fundamental state of this system?
question: "Using queueing theory, what is the fundamental state of this system?"
details:
  realistic_solution: The system is unstable because the arrival rate exceeds the service rate (λ > μ),
    leading to a utilization greater than 100%. In this state, the queue of waiting requests will grow
    infinitely over time, causing latency to skyrocket. This is known as throughput collapse. No amount
    of waiting will fix this; the system cannot keep up with the demand. The only solutions are to decrease
    the arrival rate per server (e.g., by adding more servers) or, more effectively, increase the service
    rate with optimizations like continuous batching.
  common_mistake: A common mistake is to think about system load linearly, assuming that a 10% overload
    might cause a 10% increase in latency. Engineers often forget that once arrival rate exceeds service
    rate, the system becomes unstable and queue length (and thus latency) will grow without bound.
  napkin_math: 1. **Define Arrival Rate (λ):** The problem states λ = 15 requests/sec.
  options:
  - The system is memory-bound due to the KV cache size for 16 users.
  - The system is operating in a stable but highly-loaded state (ρ ≈ 99%).
  - The network is saturated from streaming back responses for 16 users simultaneously.
  - The system is unstable (ρ > 1) because the arrival rate is higher than the service rate.
  correct_index: 3
