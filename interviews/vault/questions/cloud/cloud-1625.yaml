title: Artifact Sync Race Condition in Multi-Region Canary
scenario: You are rolling out a new 3B parameter conversational model (6GB FP16) across 4 global regions. A central control plane in us-east updates the global model registry and immediately signals all regional traffic routers to shift 5% of traffic to the new canary version. Shortly after, the eu-central region begins failing health checks with `ModelNotFound` errors on A10G inference instances, triggering cross-region failover and spiking global P99 latency to 2.5s. The control plane logs show the registry update was successful.
question: What caused eu-central ModelNotFound errors during the 5% canary rollout, and how would you redesign the deployment protocol?
details:
  realistic_solution: 'Implement a two-phase deployment process. Phase 1: Replicate the 6GB model artifact to all regional object stores and wait for successful checksum verification. Phase 2: Update the regional traffic routers to the canary version only after local readiness probes confirm the artifact is locally available.'
  common_mistake: |
    **The Pitfall:** Focusing on GPU initialization times, cross-region failover network latency, or OOM errors.
    **The Rationale:** Candidates often look for complex hardware or network latency issues rather than simple race conditions in distributed systems.
    **The Consequence:** Proposing complex infrastructure changes instead of identifying the fundamental flaw in the deployment protocol (updating routing before artifact replication completes).
  napkin_math: |
    1. Cross-region sync time for a 6GB artifact over a 1 Gbps WAN link: (6 GB * 8 bits/byte) / 1 Gbps = 48 seconds.
    2. Traffic routing propagation time: ~5 seconds.
    3. **This creates a ~43-second race condition window where eu-central receives canary traffic before the artifact actually arrives.**
