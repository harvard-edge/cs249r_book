title: Diagnosing Low Host-to-Device Bandwidth
scenario: Your team is training a model on an H100 GPU connected via PCIe Gen5 x16. Profiling logs show
  the GPU is frequently idle waiting for data. The dataloader transfers a 4 GB batch of float32 features
  from host RAM to the GPU at the start of each step. The profile shows this host-to-device transfer reliably
  takes 250 ms per batch. Diagnose why this transfer is so slow compared to theoretical hardware limits
  and identify the most likely software root cause.
question: "Why does the 4 GB host-to-device batch transfer take 250 ms over PCIe Gen5 instead of the theoretical minimum?"
details:
  realistic_solution: The root cause is transferring data from pageable (non-pinned) host memory. Because
    the DMA controller cannot safely access pageable memory, the PCIe driver must first perform a synchronous
    host-to-host CPU copy from the pageable buffer into a pre-allocated pinned (page-locked) staging buffer.
    The solution is to use pinned memory (e.g., `pin_memory=True` in PyTorch) so the DMA engine can pull
    directly from the user buffer, eliminating the extra host copy overhead.
  common_mistake: Candidates often assume the PCIe bus is congested by other devices or blame Python overhead
    without calculating the theoretical limits. They frequently fail to recall that standard OS memory
    allocations are pageable, preventing direct DMA transfers.
  napkin_math: 'Theoretical PCIe Gen5 x16 unidirectional bandwidth: 32 GB/s. Expected transfer time =
    4 GB / 32 GB/s = 0.125 seconds (125 ms). Actual observed time = 250 ms. Actual effective bandwidth
    = 4 GB / 0.250 s = 16 GB/s. The 125 ms discrepancy represents the overhead of the hidden host CPU
    copy from pageable to pinned memory (effectively bottlenecked by typical DDR memory bandwidth: 4 GB
    / 32 GB/s = 125 ms overhead).'
