title: Cloud Token Budget L2 0
scenario: 'A product manager wants to increase the token budget from 4K to 32K tokens for your LLM API.'
question: "What are the memory, compute, and cost implications of increasing the LLM API token budget from 4K to 32K tokens?"
details:
  realistic_solution: 'Token budget = input + output tokens, which directly controls three resources: (1) KV cache memory grows linearly with sequence length — 8x longer context = 8x more KV cache per request, reducing concurrent batch size. (2) Attention FLOPs grow quadratically — 8x more tokens = 64x more attention compute. (3) Cost per request: both memory (fewer concurrent users) and compute (more FLOPs) increase, roughly 8-10x cost per request. A server handling 32 concurrent 4K requests might only handle 4 concurrent 32K requests with the same memory. The 64x attention increase can be partially mitigated with FlashAttention, but KV cache memory is the hard constraint.'
  common_mistake: |
    **The Pitfall:** Only accounting for the quadratic growth in attention compute (FLOPs) while entirely ignoring the linear growth in KV cache memory footprint.
    **The Rationale:** System designs are improperly biased by O(N²) Big-O notation, masking the reality that hardware limits at serving time are almost always dictated by memory capacity, not ALU cycles.
    **The Consequence:** The deployment crashes instantly with Out-Of-Memory errors because the drastically inflated KV cache evicts all concurrent requests, crashing throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Context scaling: 4K → 32K (8x increase).
       - Model: 32 layers, 4096 dim, FP16 (2 bytes).
       - Hardware: 80 GB GPU (leaving ~64 GB for KV cache).
    2. **Calculations:**
       - 4K KV Cache: 2 × 32 × 4096 × 4096 × 2 bytes ≈ 2.1 GB per request.
       - 32K KV Cache: 2 × 32 × 4096 × 32768 × 2 bytes ≈ 17.1 GB per request.
       - Concurrency at 4K: 64 GB / 2.1 GB = ~30 concurrent requests.
       - Concurrency at 32K: 64 GB / 17.1 GB = ~3 concurrent requests.
    3. **Conclusion & Interpretation:**
       - **Result: KV Cache Capacity Bound**. While compute grows quadratically, the hard wall is memory. An 8x increase in context length triggers a brutal 10x destruction of concurrent batch capacity, exploding the cost per request.
