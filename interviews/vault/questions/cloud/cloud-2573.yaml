title: Cloud Token Budget L2 0
scenario: A product manager wants to increase the token budget from 4K to 32K tokens for your LLM API.
  Explain the systems implications of this 8x increase in terms of memory, compute, and cost.
question: "What are the memory, compute, and cost implications of increasing the LLM API token budget from 4K to 32K tokens?"
details:
  realistic_solution: 'Token budget = input + output tokens, which directly controls three resources:
    (1) KV cache memory grows linearly with sequence length — 8x longer context = 8x more KV cache per
    request, reducing concurrent batch size. (2) Attention FLOPs grow quadratically — 8x more tokens =
    64x more attention compute. (3) Cost per request: both memory (fewer concurrent users) and compute
    (more FLOPs) increase, roughly 8-10x cost per request. A server handling 32 concurrent 4K requests
    might only handle 4 concurrent 32K requests with the same memory. The 64x attention increase can be
    partially mitigated with FlashAttention, but KV cache memory is the hard constraint.'
  common_mistake: Only accounting for attention compute (quadratic) and ignoring KV cache memory (linear
    but dominant). At serving time, KV cache memory is usually the binding constraint that limits throughput,
    not FLOPs.
  napkin_math: 'KV cache per request: 2 × 32 layers × 4096 dim × seq_len × 2B. At 4K: 2 × 32 × 4096 ×
    4096 × 2 = 2 GB. At 32K: 2 × 32 × 4096 × 32768 × 2 = 16 GB. On 80 GB GPU: 4K fits 40 concurrent, 32K
    fits 5 concurrent. 8x capacity reduction.'
