title: Intersectional Fairness Under Distribution Shift
scenario: A loan approval model achieves demographic parity (DP gap < 2%) and equalized odds (TPR parity
  gap < 3%) on the training distribution. Six months post-deployment, a fairness audit reveals that approval
  rates for Black women aged 18-25 dropped from 41% to 28% while the overall model metrics remain within
  SLA. The model was not retrained. What caused this and how do you detect and fix it?
details:
  realistic_solution: 'The root cause is distribution shift at the intersectional level. The model''s
    fairness guarantees were validated on a training-time joint distribution P(X, race, gender, age).
    If the input feature distribution for Black women aged 18-25 shifted (e.g., economic conditions, application
    patterns), the model''s decision boundary is now misaligned for this subgroup even if overall group
    metrics hold. Detection requires: (1) continuous per-intersectional-cell monitoring with statistical
    process control charts (CUSUM or EWMA on approval rate), (2) covariate drift detection on intersectional
    subgroups using maximum mean discrepancy (MMD) between training and live feature distributions. Fix:
    targeted retraining on augmented data for the drifted subgroup, or threshold recalibration per intersectional
    cell using Platt scaling on recent deployment data.'
  common_mistake: Assuming that demographic parity and equalized odds compliance on aggregate subgroups
    (race, gender) implies intersectional subgroup fairness. Aggregate metrics can mask severe disparities
    in intersectional cells while remaining statistically compliant at the marginal level.
  napkin_math: 'Approval rate drop: 41% → 28% = 13pp drop. Z-test for 13pp shift with N=500 monthly applicants
    in this cell: z = 0.13/√(0.34·0.66/500) = 0.13/0.0211 ≈ 6.2 → p < 1e-9, highly significant. MMD drift
    detection threshold: with 200 reference samples and 200 live samples per feature, MMD > 2/√200 ≈ 0.14
    indicates drift. Monitoring cost: 20 intersectional cells × 15 features × daily computation = 300
    MMD tests/day — trivially cheap on CPU.'
