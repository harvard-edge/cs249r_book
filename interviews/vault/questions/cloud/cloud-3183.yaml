title: Speculative Decoding for Batched Multi-Turn Chat
scenario: 'A multi-turn chat system requires 100 concurrent sessions. Requests arrive with conversation history averaging 8K tokens. The draft model''s KV cache for the history adds memory overhead.'
question: 'Does the 7B draft KV cache for 8K-token histories limit capacity for 100 concurrent chat sessions?'
details:
  realistic_solution: 'Speculative decoding requires maintaining parallel KV caches for both the target and draft models. Because the draft model relies heavily on Multi-Head Attention (MHA) rather than Grouped-Query Attention (GQA), its KV cache footprint per token is disproportionately large. This strictly limits batch size and concurrency. To achieve high concurrency, the serving system must aggressively evict draft KV caches for inactive sessions or deploy FP8 quantization specifically for the KV tensors.'
  common_mistake: |
    **The Pitfall:** Multiplying per-GPU batch capacity by the Tensor Parallel (TP) degree.
    **The Rationale:** Candidates correctly calculate the memory footprint per request but mistakenly think Tensor Parallelism multiplies the total batch size across GPUs.
    **The Consequence:** They overestimate the system's concurrency capacity by a factor of the TP degree, leading to out-of-memory errors in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 4x 80GB H100. Weights take 38.5GB/GPU. Budget = 41.5GB/GPU for KV.
       * Target KV (70B): 0.67 GB per request.
       * Draft KV (7B): 1.07 GB per request.
    2. **Calculations:**
       * Total memory per request (FP16): 0.67 + 1.07 = 1.74 GB.
       * Max concurrent: 41.5 GB / 1.74 GB = 23 concurrent requests.
       * Fallback (FP8 Quantization): Target (0.33 GB) + Draft (0.53 GB) = 0.86 GB.
       * Max concurrent (FP8): 41.5 GB / 0.86 GB = 48 requests.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound. The system maxes at 48 concurrent sessions even with FP8, failing the 100-session SLA without draft cache eviction.**
