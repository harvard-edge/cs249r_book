title: Optimizing Gradient Synchronization for LLM Training on H100 Clusters
scenario: 'You are tasked with training a large language model with 175 billion parameters using synchronous data-parallel training. You have access to NVIDIA H100 GPUs. Consider two proposed infrastructure architectures for gradient synchronization: Architecture A (single server with 8x H100s via NVLink) and Architecture B (two servers, 4x H100s each, via 200 Gb/s Ethernet).'
question: Which gradient synchronization strategy would you use for 175B-parameter training on 8 H100s in one NVLink server versus two 4-GPU servers over 200 Gb/s Ethernet?
details:
  realistic_solution: 'A realistic solution would involve a detailed analysis of the communication-to-computation ratio. For Architecture A, NVLink provides extremely high bandwidth, making standard FP16/BF16 AllReduce very efficient, leveraging optimized libraries like NCCL. For Architecture B, the 200 Gb/s inter-node link will likely be a bottleneck. Here, strategies like gradient compression (e.g., quantizing gradients to 8-bit, Top-k sparsification, or using communication-avoiding algorithms) become critical to reduce the data volume transferred between nodes. Overlapping communication with computation (e.g., using CUDA streams) is essential in both architectures. Asynchronous SGD could be considered for Architecture B if latency is extremely high and some staleness can be tolerated, but its convergence properties require careful tuning. For optimal performance, a hybrid approach might be best: highly efficient AllReduce within each node via NVLink, and optimized, potentially compressed, AllReduce or other strategies for inter-node communication.'
  common_mistake: |
    **The Pitfall:** Underestimating the communication overhead and focusing purely on compute TFLOPS.
    **The Rationale:** Candidates assume standard networking (200 Gbps) is "fast enough" for distributed deep learning without calculating the raw gradient transfer time.
    **The Consequence:** Training throughput is completely destroyed by synchronization wait times, leaving the powerful H100s idle 95% of the time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 175B params in FP16 (2 bytes/param) = 350 GB gradient size.
       - Arch A: NVLink ~1.2 TB/s effective across 8 GPUs.
       - Arch B: 200 Gb/s Ethernet = 25 GB/s.
    2. **Calculations:**
       - Arch A Sync Time: 350 GB / 1200 GB/s = ~0.29 seconds.
       - Arch B Sync Time: 350 GB / 25 GB/s = 14 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Inter-node communication is clearly the dominant bottleneck in Architecture B, making Architecture A the only viable option for synchronous uncompressed training. System B is Network-Bandwidth-Bound.**
