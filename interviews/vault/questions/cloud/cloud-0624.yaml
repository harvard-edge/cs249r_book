title: The GPU Memory Fragmentation
scenario: Our custom LLM inference server has been serving requests for 6 hours. `nvidia-smi` shows 16 GB used, 64 GB free. But the server rejects new requests with 'Cannot allocate KV-cache'.
question: We have 80% free memory — where did it go?
details:
  realistic_solution: This is classic external fragmentation in GPU memory. Without PagedAttention, KV-cache is allocated as contiguous blocks sized for the maximum sequence length. As requests of varying lengths complete and free their blocks, the free memory becomes a patchwork of small non-contiguous holes. A new request needing a 2 GB contiguous block fails even though 64 GB is free — because no single contiguous 2 GB region exists. PagedAttention (used by vLLM) solves this by managing KV-cache as fixed-size pages (like OS virtual memory), mapping logical KV blocks to arbitrary physical memory locations. This eliminates external fragmentation entirely.
  common_mistake: |
    **The Pitfall:** Assuming a memory leak and simply restarting the server.
    **The Rationale:** Candidates often see large free memory and assume the allocator is broken or leaking, missing the distinction between total free memory and contiguous free memory.
    **The Consequence:** The system continues to crash under load, and the root cause (fragmentation) is never addressed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV cache size: ~1MB per token.
       - Pre-allocated block for max sequence length (8,192 tokens): ~8.19 GB per request.
       - Actual sequence length: 100 tokens (100MB used).
       - Free memory: 64 GB.
    2. **Calculations:**
       - Wasted memory per request = 8.19 GB - 100 MB = ~8.09 GB trapped.
       - 64GB free memory is fragmented into hundreds of small gaps (100MB to 8GB).
       - A new 8.19 GB contiguous allocation fails because no single gap is large enough.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Fragmented.** A new request fails despite 64GB total free memory due to extreme external fragmentation.
