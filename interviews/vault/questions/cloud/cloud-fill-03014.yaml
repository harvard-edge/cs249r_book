title: Flash Attention IO Complexity vs Standard Attention
scenario: A team is deciding whether to adopt Flash Attention for training a 7B model on A100 (80GB HBM2e,
  2TB/s) with sequence length 8192. They want to understand the theoretical IO reduction before implementation.
  Standard attention stores the full N×N attention matrix.
details:
  realistic_solution: 'Flash Attention IO complexity is O(N^2 d / M) where M is SRAM size, vs O(N^2) for
    standard attention. For N=8192, d=128, and M=200KB: Flash Attention HBM reads = O(N^2 * d / M) = O(8192^2
    * 128 / 200K) ≈ 43M elements vs standard O(N^2) = 67M for just the attention map. Measure with nvprof
    memory throughput metric.'
  common_mistake: Claiming Flash Attention is faster because it does fewer FLOPs. Flash Attention performs
    the same number of FLOPs as standard attention. The speedup is entirely from reduced HBM memory reads/writes
    (IO complexity), not from reduced arithmetic.
  napkin_math: 'Standard attention, seq=8192, d=128, BF16: QK^T write = 8192^2 * 2 = 128MB; softmax in-place;
    PV read = 128MB + 8192*128*2 = 130MB. Total HBM: ~256MB per layer per head. Flash Attention: Q/K/V
    each = 8192*128*2 = 2MB; O = 2MB. Total HBM: ~8MB per layer per head. 32x reduction in HBM traffic.
    At A100 2TB/s: 256MB/2TB/s = 128μs vs 8MB/2TB/s = 4μs per head.'
