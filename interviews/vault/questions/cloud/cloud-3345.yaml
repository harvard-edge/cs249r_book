title: Diagnosing Unexpected Power Overages in an AMD MI300X Cluster
scenario: 'Your team is deploying a new AI inference cluster consisting of AMD MI300X accelerators. The datacenter utilizes a hybrid cooling approach. Recently, you''ve noticed an alarming trend: despite deploying fewer units than initially planned for the current rack''s power budget, the overall rack power consumption is consistently higher than expected, triggering localized thermal alerts. While individual units appear to be operating within their thermal envelopes, the aggregate effect at the rack level is problematic.'
question: What could be the root cause of these symptoms, and how would you methodically diagnose it?
details:
  realistic_solution: 'To diagnose, you would: 1) Conduct a detailed power audit using external power monitoring units (PMUs) at the rack PDU level and per-server level to capture actual power draw under idle, typical load, and peak inference scenarios. 2) Analyze the temporal power profiles to identify spikes or sustained overages. 3) Cross-reference power data with environmental sensor data (temperatures, airflow, coolant flow rates) within the rack and cooling zones. 4) Review the cluster''s workload scheduling logs to determine if specific high-intensity jobs are being co-located on problematic racks or if carbon-aware scheduling is leading to unexpected power concentrations. 5) Assess the liquid cooling system''s capacity and distribution, checking for bottlenecks or inefficiencies in heat exchange relative to the high heat flux (up to 750W TDP). 6) Evaluate the rack''s power distribution unit (PDU) capacity and phase balancing, as imbalanced loads can lead to premature tripping or localized heating.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the individual component's average power consumption (TDP).
    **The Rationale:** Neglecting ancillary components (CPUs, networking, PSUs) and transient peak power draws.
    **The Consequence:** Under-provisioning rack power capacity and triggering localized thermal alerts.
  napkin_math: |
    - **Nominal rack budget**: 15 kW.
    - **System power**: 750W (GPU) + 250W (CPU/net) = 1000W.
    - **Expected draw for 12 systems**: 12 kW.
    - **Observed draw**: 14 kW.
    - **Average per system**: 14,000W / 12 = 1167W.
    - **Result**: **Discrepancy of 167W per system points to ancillary components or unmeasured loads.**
