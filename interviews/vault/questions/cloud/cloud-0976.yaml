title: Diagnosing DDP All-Reduce Bottlenecks
scenario: A team is training a 5B parameter transformer using PyTorch DDP across 64 A100 (80GB) GPUs on
  8 nodes. The inter-node networking is 4x 200 Gbps HDR InfiniBand (800 Gbps total per node). GPU utilization
  is struggling at 45%, and the profiler reveals significant idle time spent waiting on `ncclAllReduce`.
  An engineer proposes upgrading to H100 GPUs or shrinking the local batch size from 16 to 8 per GPU to
  speed up iterations. How do you analyze the root cause of this performance drop, and why are both proposed
  solutions counterproductive?
question: "How do you analyze the root cause of this performance drop, and why are both proposed solutions counterproductive?"
details:
  realistic_solution: The system is heavily communication-bound. The correct fix is to increase the local
    batch size (or use gradient accumulation) to increase the compute time per step, allowing better communication
    overlap. Alternatively, reduce the payload size using FP16/BF16 gradient communication hooks.
  common_mistake: Assuming faster GPUs or smaller batch sizes will improve overall throughput. Smaller
    batches reduce compute density and worsen the communication-computation ratio, while faster GPUs merely
    finish compute faster and increase idle time waiting for the network.
  napkin_math: 5B parameters in FP32 = 20GB gradients. Ring All-Reduce volume per node is roughly 2 *
    (N-1)/N * 20GB ≈ 40GB. Total node bandwidth = 800 Gbps = 100 GB/s. Communication time ≈ 40GB / 100
    GB/s = 400ms. If local FWD+BWD compute takes only 300ms, the GPU will idle for at least 100ms per
    step, capping utilization well below 100%.
