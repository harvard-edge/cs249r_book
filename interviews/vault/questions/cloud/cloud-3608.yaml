title: Power Distribution Unit Redundancy for H100 Training Cluster
scenario: A 512-H100 training cluster runs jobs lasting 14 days. Each HGX node (8×H100)
  draws 12kW peak. You are designing the power distribution architecture. Compare
  2N redundancy vs N+1 redundancy for PDUs, considering cost, stranded capacity, and
  failure impact on long-running jobs.
question: For the 512-H100 14-day training cluster, should the PDU architecture use
  2N or N+1 redundancy, and why?
details:
  realistic_solution: 'N = 64 nodes × 12kW = 768kW. N+1: one extra PDU handles any
    single failure, 6.25% stranded capacity. 2N: full standby, 50% stranded capacity.
    PDU MTBF ≈ 500,000 hours; P(failure in 14d) ≈ 14×24/500000 = 0.07%. 2N costs 2×
    PDU hardware for 0.07% risk reduction over 14 days. Recommendation: N+1 with fast
    transfer switch (<10ms). For training, 10ms PDU failover is acceptable; job continues.
    Reserve 2N for racks with no fast transfer switch.'
  common_mistake: Recommending 2N because 'training jobs are critical' without quantifying
    stranded capacity cost and the actual failure probability over 14 days.
  napkin_math: 'N=768kW. N+1: 768+12%=860kW provisioned, 11% overhead. 2N: 1536kW
    provisioned, 50% stranded. P(PDU fail in 14d)=0.07%. Expected cost of N+1 failure:
    768kW × 14d × $0.10/kWh = $25.8k re-run cost × 0.07% = $18 expected loss. 2N hardware
    premium >> $18.'
