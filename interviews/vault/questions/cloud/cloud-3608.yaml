title: Power Distribution Unit Redundancy for H100 Training Cluster
scenario: A 512-GPU training cluster runs jobs lasting 14 days. Each node (8x GPUs) draws 12kW peak. You are designing the power distribution architecture. You need to choose between 2N redundancy vs N+1 redundancy for PDUs, considering cost, stranded capacity, and failure impact.
question: "For a 512-GPU 14-day training cluster, should the PDU architecture use 2N or N+1 redundancy, and why?"
details:
  realistic_solution: 'N = 64 nodes × 12kW = 768kW. N+1: assuming 17 PDUs (48kW each), one extra PDU handles any single failure, giving 6.25% stranded capacity. 2N: full standby, 50% stranded capacity. PDU MTBF ≈ 500,000 hours; P(failure in 14d) ≈ 14×24/500000 = 0.07%. 2N costs 2× PDU hardware for 0.07% risk reduction over 14 days. Recommendation: N+1 with fast transfer switch (<10ms). For training, 10ms PDU failover is acceptable; job continues. Reserve 2N for racks with no fast transfer switch.'
  common_mistake: |
    **The Pitfall:** Recommending 2N redundancy simply because "training jobs are critical and expensive."
    **The Rationale:** Datacenter engineers carry over strict 2N habits from web serving without calculating the actual risk probability vs. the massive cost of stranded power in ML clusters.
    **The Consequence:** Wasting 50% of the datacenter's power capacity on standby hardware for an event that has less than a 0.1% chance of occurring during the job.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base load N = 64 nodes * 12kW = 768kW.
       - PDU MTBF ≈ 500,000 hours.
       - Cost of job re-run = $0.10/kWh.
    2. **Calculations:**
       - N+1 provisioned capacity gives 6.25% stranded capacity.
       - 2N provisioned capacity gives 50% stranded capacity.
       - Probability of PDU failure in 14 days: 14 * 24 / 500,000 = 0.067%.
       - Cost of failure: 768kW * 14d * 24h * $0.10/kWh = $25,804 job re-run cost.
       - Expected loss = $25,804 * 0.00067 = $17.28.
    3. **Conclusion & Interpretation:** **Result: Cost-Bound**. The massive hardware and power cost of 2N redundancy vastly outweighs the $17 expected loss from a failure.
