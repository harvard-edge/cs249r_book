title: The FP8 Speedup Illusion in LLM Decoding
scenario: Your team migrates a 70B parameter LLM from BF16 to FP8 on an 80GB H100 SXM instance. The H100 boasts 1.98 PFLOPS of FP8 compute (2x the 989 TFLOPS FP16). However, during autoregressive decoding at batch size 1, the generation speed only increases from 22 tokens/sec to 24 tokens/sec (a 1.09x speedup), despite the model fitting entirely in HBM.
question: "Why does FP8 only improve batch-1 decoding from 22 to 24 tokens/sec on the H100, and what would increase throughput?"
details:
  realistic_solution: |
    The symptom (lack of speedup despite 2x compute capacity) points to a fundamental memory bandwidth bottleneck in the autoregressive decoding phase. Decoding at batch size 1 has an arithmetic intensity of ~1 FLOP/byte. The H100's massive 1.98 PFLOPS FP8 compute engine is completely starved because the limiting factor is fetching weights from HBM to SRAM. While moving from BF16 to FP8 halves the weight memory footprint (from 140GB to 70GB, fitting on a single 80GB GPU instead of two), if the KV cache remains in BF16, the memory bandwidth savings are partially offset. Furthermore, a single token generation requires loading all 70B parameters. The hardware is memory-bound, not compute-bound. The solution requires increasing arithmetic intensity by batching requests (continuous batching), using speculative decoding to generate multiple tokens per weight fetch, or utilizing FP8 for the KV cache to further reduce memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming decoding throughput scales with theoretical compute capacity (FLOPS).
    **The Rationale:** Engineers focus on the doubled FP8 compute specification without realizing that batch-size 1 decoding is strictly memory-bandwidth bound.
    **The Consequence:** Teams invest heavily in precision scaling but see minimal latency improvements because the memory fetch overhead remains the dominant bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 SXM HBM bandwidth: 3.35 TB/s.
       - Model: 70B FP8 weights (70 GB).
       - Compute: 1.98 PFLOPS.
    2. **Calculations:**
       - Weight Load Time: 70 GB / 3350 GB/s ≈ 20.9ms per token. Max throughput = 1 / 0.0209 ≈ 47.8 tokens/sec.
       - Compute Time: 140B FLOPs / 1.98 PFLOPS = 0.07ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound. Halving weight size saves ~21ms per token, but unquantized KV cache traffic and fixed kernel overheads consume much of that, explaining the small speedup to 24 tokens/sec.**
