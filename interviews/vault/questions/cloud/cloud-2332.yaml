title: The FP8 Speedup Illusion in LLM Decoding
scenario: Your team migrates a 70B parameter LLM from BF16 to FP8 on an 80GB H100 SXM instance. The H100 boasts 1.98 PFLOPS of FP8 compute (2x the 989 TFLOPS FP16). However, during autoregressive decoding at batch size 1, the generation speed only increases from 22 tokens/sec to 24 tokens/sec (a 1.09x speedup), despite the model fitting entirely in HBM.
question: "Why does FP8 only improve batch-1 decoding from 22 to 24 tokens/sec on the H100, and what would increase throughput?"
details:
  realistic_solution: The symptom (lack of speedup despite 2x compute capacity) points to a fundamental memory bandwidth bottleneck in the autoregressive decoding phase. Decoding at batch size 1 has an arithmetic intensity of ~1 FLOP/byte. The H100's massive 1.98 PFLOPS FP8 compute engine is completely starved because the limiting factor is fetching weights from HBM to SRAM. While moving from BF16 to FP8 halves the weight memory footprint (from 140GB to 70GB, fitting on a single 80GB GPU instead of two), if the KV cache remains in BF16, the memory bandwidth savings are partially offset. Furthermore, a single token generation requires loading all 70B parameters. The hardware is memory-bound, not compute-bound. The solution requires increasing arithmetic intensity by batching requests (continuous batching), using speculative decoding to generate multiple tokens per weight fetch, or utilizing FP8 for the KV cache to further reduce memory traffic.
  common_mistake: Assuming the Tensor Cores are bottlenecked by FP8 scaling factor conversions and proposing a complex kernel fusion strategy for the dynamic quantizer.
  napkin_math: 'H100 SXM HBM bandwidth is 3.35 TB/s. To generate 1 token, 70B weights in FP8 (70GB) must be loaded. Time to load weights = 70 GB / 3350 GB/s = 20.9 ms per token. Theoretical max tokens/sec from weights = 1 / 0.0209 \u2248 47.8 tokens/sec. The compute time for 140B FLOPs at 1.98 PFLOPS is 140e9 / 1.98e15 = 0.07 ms. Compute is ~300x faster than memory fetch. Halving weight size from BF16 (140 GB) to FP8 (70 GB) reduces weight load time from ~41.8ms to ~20.9ms. However, unquantized KV cache traffic and fixed kernel launch overheads consume the saved time, explaining why throughput only edges up to ~24 tokens/sec instead of doubling.'
