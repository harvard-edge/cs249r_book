title: Evaluate EfficientNet compound scaling coefficient impact on H100 memory bandwidth
scenario: 'EfficientNet compound scaling uses \u03c6 to jointly scale width (\u03b1^\u03c6), depth (\u03b2^\u03c6), and resolution (\u03b3^\u03c6) with constraint \u03b1\u00b7\u03b2\u00b2\u00b7\u03b3\u00b2\u22482. You are evaluating whether increasing \u03c6 from 1 (B1) to 4 (B4) provides proportional accuracy gains on H100 with HBM3 bandwidth of 3.35 TB/s.'
question: 'What is the memory bandwidth utilization at each scaling level, where is the saturation point, and where do accuracy gains saturate?'
details:
  realistic_solution: 'B1\u2192B4 accuracy gains: B1 79.1%, B2 80.1%, B3 81.6%, B4 82.9% \u2014 diminishing returns. Resolution scaling dominates memory: B1 240\u00d7240, B4 380\u00d7380. Feature map sizes scale as (380/240)\u00b2 = 2.5\u00d7 larger. At batch=32: B4 activation memory ~3.2GB vs B1 ~1.3GB. H100 HBM3 bandwidth: depthwise layers at B4 (380\u00d7380) become increasingly memory-bound. Saturation around B5/B6 where accuracy gain per FLOP drops below 0.1pp.'
  common_mistake: |
    **The Pitfall:** Assuming accuracy scales linearly with \u03c6 and that H100 HBM3 bandwidth eliminates memory bottlenecks.
    **The Rationale:** Candidates see high bandwidth and assume memory bottlenecks disappear, ignoring the quadratic increase in activation memory from resolution scaling.
    **The Consequence:** Misidentifying the bottleneck as bandwidth capacity rather than low arithmetic intensity and kernel launch overhead.
  napkin_math: |
    - **B4 Input:** 380x380. Stage 7 feature map: 12x12x320.
    - **Depthwise 3x3:** Reads 12x12x320x2B = 92KB.
    - **Compute:** 2x320x9x144 = 829K FLOPs.
    - **Intensity:** 829K / 92K = 9 FLOP/byte.
    - **H100 Roofline:** 3.35TB/s * 9 = 30 TFLOPS (far below 989 TFLOPS peak).
    - **B4 Bandwidth Needed:** ~800MB/s per image. At batch=32: 32 * 800MB/s = 25.6 GB/s.
    - **Conclusion: Bandwidth is not the bottleneck; it is kernel launch overhead and low arithmetic intensity.**
