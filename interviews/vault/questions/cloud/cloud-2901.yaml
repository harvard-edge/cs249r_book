title: Evaluate EfficientNet compound scaling coefficient impact on H100 memory bandwidth
scenario: EfficientNet compound scaling uses φ to jointly scale width, depth, and resolution. You are evaluating whether increasing φ from 1 (B1) to 4 (B4) provides proportional accuracy gains on an H100.
question: What is the memory bandwidth utilization at each scaling level, where is the saturation point, and where do accuracy gains saturate?
details:
  realistic_solution: 'B1 to B4 accuracy gains show diminishing returns. Resolution scaling completely dominates memory: feature map sizes scale quadratically. At batch=32, B4 activation memory is ~3.2GB vs B1 ~1.3GB. However, even with the H100''s HBM3 bandwidth, depthwise layers at B4 (380x380) become increasingly memory-bound due to low arithmetic intensity, not bandwidth exhaustion. Saturation occurs around B5/B6 where the accuracy gain per FLOP completely flatlines.'
  common_mistake: |
    **The Pitfall:** Assuming H100's high HBM3 bandwidth eliminates all memory bottlenecks.
    **The Rationale:** Observing high peak bandwidth and ignoring the quadratic increase in activation memory and kernel launch overhead.
    **The Consequence:** Misidentifying the bottleneck as bandwidth capacity rather than low arithmetic intensity and kernel launch overhead, leading to poor scaling efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - B4 Input: 380x380. Stage 7 feature map: 12x12x320.
       - H100 HBM3 Bandwidth: 3.35 TB/s. Peak Compute: 989 TFLOPS.
       - Batch Size: 32.
    2. **Calculations:**
       - Depthwise 3x3 Memory Read: 12 * 12 * 320 * 2 Bytes = 92 KB.
       - Compute: 2 * 320 * 9 * 144 = 829K FLOPs.
       - Arithmetic Intensity: 829K / 92K = 9 FLOP/byte.
       - Roofline Limit: 3.35 TB/s * 9 FLOP/byte = 30 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Intensity/Overhead).** The workload operates at 30 TFLOPS (far below the 989 TFLOPS peak) not because it exhausts the 3.35 TB/s capacity, but due to kernel launch overhead and inherently low arithmetic intensity.
