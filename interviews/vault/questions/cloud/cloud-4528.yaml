title: H100 JSONL Decompression Bound
scenario: An H100 80GB SXM system preprocesses a dataset. The host CPU decompresses GZIP data at 1 GB/s and sends it over PCIe Gen5 (64 GB/s) to the GPU, which can tokenize at 15 GB/s.
question: Identify the throughput bottleneck and state the maximum processing rate of the pipeline.
visual:
  kind: svg
  path: cloud-4528.svg
  alt: Throughput stages showing a tiny 1 GB/s CPU bar next to large PCIe and GPU bars.
  caption: Pipeline bottlenecked by CPU decompression.
details:
  realistic_solution: 'The stages run sequentially: CPU (1 GB/s), PCIe (64 GB/s), and GPU (15 GB/s). In a pipeline, the maximum overall throughput is bounded by the slowest stage. Therefore, the CPU decompression bottlenecks the entire pipeline to 1 GB/s.'
  common_mistake: |
    **The Pitfall:** Averaging the throughputs or simply citing the massive GPU processing speed.
    **The Rationale:** Candidates look at the blazing fast PCIe (64 GB/s) and GPU (15 GB/s) and fail to realize that sequential pipelines are bound by their slowest link.
    **The Consequence:** Expensive GPU resources sit idle at 6% utilization waiting for data, drastically inflating processing costs.
  napkin_math: |
    1. Identify the throughput of each sequential stage: CPU (1 GB/s), PCIe (64 GB/s), GPU (15 GB/s).
    2. Apply the bottleneck formula: Max Throughput = min(1, 64, 15).
    **The entire pipeline is severely bottlenecked by CPU decompression at 1 GB/s.**
