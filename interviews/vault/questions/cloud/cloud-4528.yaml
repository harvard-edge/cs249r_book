title: H100 JSONL Decompression Bound
scenario: An H100 80GB SXM system preprocesses a dataset. The host CPU decompresses
  GZIP data at 1 GB/s and sends it over PCIe Gen5 (64 GB/s) to the GPU, which can
  tokenize at 15 GB/s.
question: Identify the throughput bottleneck and state the maximum processing rate
  of the pipeline.
visual:
  kind: svg
  path: cloud-4528.svg
  alt: Throughput stages showing a tiny 1 GB/s CPU bar next to large PCIe and GPU
    bars.
  caption: Pipeline bottlenecked by CPU decompression.
details:
  realistic_solution: 'The stages run sequentially: CPU (1 GB/s), PCIe (64 GB/s),
    and GPU (15 GB/s). In a pipeline, the maximum overall throughput is bounded by
    the slowest stage. Therefore, the CPU decompression bottlenecks the entire pipeline
    to 1 GB/s.'
  common_mistake: Averaging the throughputs or picking the GPU processing speed, ignoring
    that the CPU feeds the data.
  napkin_math: min(1, 64, 15) = 1 GB/s (CPU bound)
