title: Diagnosing Early-Layer Credit Assignment Failure
scenario: You are pre-training a 20B parameter Transformer on a 128-GPU A100 cluster using FP16 mixed
  precision and Post-LayerNorm. After 5,000 steps, training stalls. Telemetry shows the gradient norm
  in layer 48 is ~1.2, but in layer 2, it has collapsed to ~1e-6. The early layers are not receiving meaningful
  error signals to update their weights.
question: "Why have gradients collapsed in early layers of the 20B Post-LayerNorm Transformer, and what architecture change fixes it?"
details:
  realistic_solution: Diagnose the vanishing gradient as an architectural credit assignment failure. Refactor
    the model from Post-LayerNorm to Pre-LayerNorm. Pre-LN ensures the residual connection is purely additive,
    allowing the error signal to flow backwards uninterrupted.
  common_mistake: Increasing the global learning rate or adjusting the FP16 loss scaling factor, which
    only exacerbates instability in the later layers while failing to fix the structural barrier preventing
    error signal propagation.
  napkin_math: 'In Post-LN, the gradient passes through normalizations recursively. With 48 layers, even
    a 0.8 scaling factor per layer yields 0.8^48 ≈ 2e-5 gradient decay. Pre-LN changes the forward pass
    to x_{l+1} = x_l + F(LN(x_l)). By the chain rule for credit assignment: \frac{\partial x_{l+1}}{\partial
    x_l} = I + \frac{\partial F}{\partial x_l}. The identity matrix I acts as a direct gradient highway,
    ensuring \nabla x_1 \approx \nabla x_L.'
