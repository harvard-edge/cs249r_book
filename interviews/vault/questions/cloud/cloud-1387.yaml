title: 'Evaluating HPCC vs DCQCN in 400GbE AI Fabrics'
scenario: You are architecting the congestion control strategy for a new 4096-GPU cluster utilizing a 400GbE RoCEv2 network fabric. The cluster will host highly synchronized AllReduce training workloads alongside latency-sensitive model serving. Your network lead proposes replacing the legacy DCQCN protocol with HPCC (High Precision Congestion Control) utilizing In-Network Telemetry (INT), claiming it will eliminate micro-burst incast drops.
question: Should you deploy HPCC with INT or tune DCQCN for the 4096-GPU RoCEv2 cluster, and what are the main trade-offs?
details:
  realistic_solution: |
    HPCC utilizes exact queue depth and tx-rate telemetry to deterministically calculate the fair-share rate, resolving incast in a single RTT and maintaining near-zero queues. DCQCN relies on probabilistic ECN marking, requiring multiple RTTs to iteratively converge, which risks buffer overflow during high-degree incast. The primary trade-off is hardware capability: HPCC strictly requires INT-capable switches, whereas DCQCN uses standard ECN available on all commodity switches. The INT bandwidth overhead is mathematically negligible for large MTUs.
  common_mistake: |
    **The Pitfall:** Focusing solely on the bandwidth overhead of telemetry headers.
    **The Rationale:** Candidates often assume that adding telemetry data to every packet will consume significant network capacity.
    **The Consequence:** They ignore the strict hardware requirement for INT-capable programmable switch ASICs, and fail to quantify the convergence time difference during incast events which is the actual bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400GbE (50 GB/s) RoCEv2. INT Header: 60 bytes. MTU: 4096 bytes.
    - HPCC converge: 1 RTT (2μs). DCQCN converge: 10 RTT (20μs).
    
    **Calculations:**
    - INT Overhead: 60 / 4096 \u2248 1.46%.
    - In-Flight Data (DCQCN): 50 GB/s * 20μs = 1 MB.
    
    **Conclusion & Interpretation:**
    - **Result: 1MB in-flight (Memory-Bound)**. Exceeds shallow port buffers, causing PFC storms. INT overhead is negligible.
