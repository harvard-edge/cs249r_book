title: Compute Cost Estimation for a Large Language Model on NVIDIA H100s
scenario: You are tasked with designing the infrastructure for training a new 70-billion parameter large language model (LLM). This model is expected to be trained for 1 trillion tokens. You have access to H100 GPUs (989 TFLOPS FP16 dense). Assume an average utilization of 60% for the FP16 compute capacity and a per-GPU cost of $3.50/hour.
question: "How would you estimate H100 GPU-hours and cost to train a 70B LLM on 1T tokens at 60% utilization and $3.50 per GPU-hour?"
details:
  realistic_solution: 'A realistic solution would involve breaking down the problem: 1. Calculate the total FLOPs required for training (6 * num_parameters * num_tokens for forward and backward passes combined). 2. Determine the effective FLOPs per H100 GPU given the FP16 dense TFLOPS and utilization. 3. Estimate the total GPU-hours by dividing total FLOPs by effective FLOPs/GPU/hour. 4. Calculate the total dollar cost based on GPU-hours and hourly rate. Acknowledge that the 80GB HBM3 is critical for fitting large models or large batch sizes, and the 3.35 TB/s memory bandwidth helps prevent memory-bound operations. Discuss the need for distributed training techniques (data, pipeline, and tensor parallelism) to fit the model and accelerate training across multiple H100s.'
  common_mistake: |
    **The Pitfall:** Using `2 * P * T` instead of `6 * P * T` for the training FLOPs calculation.
    **The Rationale:** Candidates often conflate inference FLOPs (which only require a forward pass) with training FLOPs (which require forward, backward, and activation gradient passes).
    **The Consequence:** Grossly underestimating the total compute time and cost by a factor of 3, leading to severe budget overruns.
  napkin_math: |
    - Total FLOPs for training: 6 × 70e9 (parameters) × 1e12 (tokens) = 4.2e23 FLOPs.
    - Effective H100 FLOPs/sec: 989e12 FLOPs/sec × 0.60 utilization = 5.934e14 FLOPs/sec.
    - Total GPU-seconds: 4.2e23 FLOPs / 5.934e14 FLOPs/sec ≈ 7.078e8 GPU-seconds.
    - Total GPU-hours: 7.078e8 / 3600 ≈ 196,607 GPU-hours.
    - **Total cost: 196,607 hours × $3.50/hour = $688,124.50.**
