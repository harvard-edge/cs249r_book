title: Compute Cost Estimation for a Large Language Model on NVIDIA H100s
scenario: You are tasked with designing the infrastructure for training a new 70-billion parameter large language model (LLM). This model is expected to be trained for 1 trillion tokens. Assume an average utilization of 60% for the FP16 compute capacity (989 TFLOPS dense) and a per-GPU cost of $3.50/hour.
question: "How would you estimate GPU-hours and cost to train a 70B LLM on 1T tokens at 60% utilization and $3.50 per GPU-hour?"
details:
  realistic_solution: 'A realistic solution would involve breaking down the problem: 1. Calculate the total FLOPs required for training (6 * num_parameters * num_tokens for forward and backward passes combined). 2. Determine the effective FLOPs per GPU given the FP16 dense TFLOPS and utilization. 3. Estimate the total GPU-hours by dividing total FLOPs by effective FLOPs/GPU/hour. 4. Calculate the total dollar cost based on GPU-hours and hourly rate. Acknowledge that the 80GB HBM3 is critical for fitting large models or large batch sizes, and the 3.35 TB/s memory bandwidth helps prevent memory-bound operations. Discuss the need for distributed training techniques (data, pipeline, and tensor parallelism) to fit the model and accelerate training across multiple nodes.'
  common_mistake: |
    **The Pitfall:** Using `2 * P * T` instead of `6 * P * T` for the training FLOPs calculation.
    **The Rationale:** Candidates often conflate inference FLOPs (which only require a forward pass) with training FLOPs (which require forward, backward, and activation gradient passes).
    **The Consequence:** Grossly underestimating the total compute time and cost by a factor of 3, leading to severe budget overruns.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter model, 1T tokens.
    - GPU FLOPs/sec: 989e12 FLOPs/sec. Utilization: 60%.
    - Cost: $3.50/hour.

    **Calculations:**
    - Total FLOPs for training: 6 * 70e9 * 1e12 = 4.2e23 FLOPs.
    - Effective FLOPs/sec: 989e12 * 0.60 = 5.934e14 FLOPs/sec.
    - Total GPU-seconds: 4.2e23 / 5.934e14 ≈ 7.078e8 GPU-seconds.
    - Total GPU-hours: 7.078e8 / 3600 ≈ 196,607 GPU-hours.
    - Total cost: 196,607 * $3.50 = $688,124.50.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. The total cost comes out to ~$688K based on the effective throughput and utilization constraint.
