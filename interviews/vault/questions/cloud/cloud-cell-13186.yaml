title: 'Transformer Cost Optimization: Reduce Inference Cost 5x via Speculative Decoding'
scenario: A 70B LLM serving on H100 (80GB HBM3, 3.35TB/s) in INT4 (35GB) generates 100 tokens/request
  at 6ms/token (memory-bound). Deploy speculative decoding with a 7B draft model. Draft generates 4 tokens
  speculatively (acceptance rate α=0.8). Quantify the speedup, cost reduction, and memory overhead of
  adding the 7B draft model.
question: "What speedup, cost reduction, and memory overhead does speculative decoding with a 7B draft model provide for the 70B INT4 service?"
details:
  realistic_solution: 'Baseline: 100 tokens at 6ms/token = 600ms/request. Speculative: draft 7B INT4 generates
    4 tokens at cost = 7GB/3350GB/s=2.09ms per draft token. 4 draft tokens: 8.36ms. Verify with 70B: parallel
    verification = 1 full 70B step = 35GB/3350GB/s=10.45ms + 4*compute≈10.5ms. Expected accepted tokens
    per verify step: 4*0.8 = 3.2 tokens. Time per token: (8.36+10.5)/3.2 = 5.9ms/token (barely better).
    Actually speedup = (draft+verify)/(tokens_per_step) vs (verify_only): speedup = (1+k*α)/(1+k/μ_ratio).
    More accurately: at α=0.8, k=4 draft: avg accepted = k*α/(1-α^(k+1)) ≈ 3.2 tokens per verify step.
    Speedup ≈ 3.2x vs 1 token baseline. Cost: 3.2x fewer 70B invocations. But 7B adds overhead: memory
    for 7B INT4 = 3.5GB. 70B INT4 = 35GB. Both fit in 80GB H100.'
  common_mistake: Calculating speedup incorrectly by dividing tokens_per_step by acceptance_rate without
    accounting for the verification step that runs the full 70B model to check all 4 draft tokens simultaneously.
  napkin_math: 'Baseline: 6ms/tok. 7B draft: 3.5GB/3350=1.045ms/tok. Verify (70B): 35GB/3350=10.45ms per
    verify step + draft 4*1.045=4.18ms = 14.63ms total per speculation round. Accepted: ~3.2 tokens (α=0.8,
    k=4). Effective ms/token: 14.63/3.2=4.57ms. Speedup: 6.0/4.57=1.31x. Cost reduction: 1.31x fewer GPU
    seconds. Revenue/cost: if current $0.001/req at 600ms, new: $0.001/1.31=$0.00076/req. Disappointing
    1.31x — draft model overhead limits gains. Better: α=0.9 with specialized draft. At α=0.9, k=4: accepted=4*0.9/(1-0.9^5)=3.6/0.41=3.6/0.41=3.6*...
    actual: sum=3.6+0.36*0.1=~3.6. Speedup: (4.18+10.45)/3.6=4.06ms/tok. Speedup=6/4.06=1.48x.'
