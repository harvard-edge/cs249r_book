title: H100 Migration for LLM Decoding
scenario: Your team is serving a 70B parameter LLM (FP16) on A100 GPUs. The product manager proposes migrating the real-time decoding service to H100 instances to reduce latency, noting that H100 offers over 3x the FP16 Tensor Core TFLOPS while costing only 2x more per hour.
question: Should you migrate the low-batch 70B decoding service from A100 to H100, given 2 FLOPs/byte arithmetic intensity and 2x cost?
details:
  realistic_solution: Reject the migration for this specific workload configuration. Using the Roofline Model, at an arithmetic intensity of 2 FLOPs/byte, the workload is firmly in the memory-bound regime for both GPUs. The H100's memory bandwidth (3.35 TB/s) is only 1.68x higher than the A100's (2.0 TB/s). Since performance scales with bandwidth in this regime, you only get a ~1.68x speedup but pay 2x the cost, degrading overall price-performance.
  common_mistake: |
    **The Pitfall:** Assuming performance scales linearly with peak TFLOPS.
    **The Rationale:** Auto-regressive decoding is heavily memory-bandwidth bound at low batch sizes, not compute-bound.
    **The Consequence:** Migrating to a 2x more expensive GPU only yields a 1.68x speedup, degrading price-performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload Intensity: 2 FLOPs/byte.
       - A100 Bandwidth: 2.0 TB/s. H100 Bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - A100 Ridge Point: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte.
       - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.
       - A100 Performance: 2 FLOPs/byte * 2.0 TB/s = 4.0 TFLOPS.
       - H100 Performance: 2 FLOPs/byte * 3.35 TB/s = 6.7 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Speedup is 1.68x, which is less than the 2.0x cost increase, making ROI negative. Result: Memory-Bound.**
