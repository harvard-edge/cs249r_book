title: Software Pipelining in Triton Kernels for Memory-Compute Overlap
scenario: Your custom Triton GEMM kernel for H100 achieves 65% of peak TFLOPS. Profiling
  shows the kernel is neither fully compute-bound nor fully memory-bound — it alternates
  between waiting for memory and executing FFMA instructions. The num_stages parameter
  in Triton controls software pipelining. Explain and optimize.
question: How does Triton's num_stages software pipelining improve your H100 GEMM,
  and what value would you choose?
details:
  realistic_solution: 'Software pipelining (double/triple buffering at the kernel
    level): (1) num_stages=2: while computing on tile N (from shared memory), asynchronously
    load tile N+1 from HBM to shared memory. When compute finishes, tile N+1 is ready.
    (2) num_stages=3: while computing tile N, loading tile N+1, and the DMA engine
    is fetching tile N+2 from HBM. This hides more latency but uses more shared memory
    (3 tile buffers). (3) H100 has hardware TMA (Tensor Memory Accelerator) that makes
    async loads even cheaper. Set num_stages=3 or 4 for H100. (4) Tradeoff: each stage
    requires BLOCK_M x BLOCK_K x dtype_size of shared memory. For BLOCK_M=128, BLOCK_K=64,
    BF16: 128x64x2 = 16KB per stage. At 4 stages: 64KB for A matrix + 64KB for B matrix
    = 128KB, within H100''s 228KB shared memory budget.'
  common_mistake: Setting num_stages=1 (no pipelining), causing the kernel to load
    a tile, compute on it, then load the next tile — serializing memory and compute.
  napkin_math: 'num_stages=1: 65% peak. num_stages=2: typically 78-82% (hiding one
    load latency). num_stages=3: 85-90% (hiding two). num_stages=4: 88-92% (diminishing
    returns). At H100 989 TFLOPS FP16: going from 65% (643) to 88% (870 TFLOPS) =
    35% throughput increase from pipelining alone.'
