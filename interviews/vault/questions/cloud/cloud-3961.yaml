title: Software Pipelining in Triton Kernels for Memory-Compute Overlap
scenario: Your custom Triton GEMM kernel for H100 achieves 65% of peak TFLOPS. Profiling shows the kernel is neither fully compute-bound nor fully memory-bound — it alternates between waiting for memory and executing FFMA instructions. The num_stages parameter in Triton controls software pipelining.
question: How does Triton's num_stages software pipelining improve your H100 GEMM, and what value would you choose?
details:
  realistic_solution: 'Software pipelining (double/triple buffering at the kernel level): (1) num_stages=2: while computing on tile N (from shared memory), asynchronously load tile N+1 from HBM to shared memory. When compute finishes, tile N+1 is ready. (2) num_stages=3: while computing tile N, loading tile N+1, and the DMA engine is fetching tile N+2 from HBM. This hides more latency but uses more shared memory (3 tile buffers). (3) H100 has hardware TMA (Tensor Memory Accelerator) that makes async loads even cheaper. Set num_stages=3 or 4 for H100. (4) Tradeoff: each stage requires BLOCK_M x BLOCK_K x dtype_size of shared memory. For BLOCK_M=128, BLOCK_K=64, BF16: 128x64x2 = 16KB per stage. At 4 stages: 64KB for A matrix + 64KB for B matrix = 128KB, within H100''s 228KB shared memory budget.'
  common_mistake: |
    **The Pitfall:** Setting num_stages=1 (no pipelining) in the Triton kernel.
    **The Rationale:** Defaulting to the simplest implementation where memory loads and compute instructions execute strictly sequentially.
    **The Consequence:** The kernel serializes memory fetches and compute, failing to hide HBM latency and drastically underutilizing the H100's Tensor Cores.
  napkin_math: |
    * **No Pipelining (num_stages=1):** Achieves 65% of peak TFLOPS.
    * **Double Buffering (num_stages=2):** Achieves 78-82% (hides one load latency).
    * **Triple/Quad Buffering (num_stages=3 or 4):** Achieves 88-92% (hides multiple loads, utilizes TMA).
    * **H100 Peak:** 989 TFLOPS FP16.
    * **Throughput Increase:** Moving from 65% (643 TFLOPS) to 88% (870 TFLOPS) yields a 35% throughput gain.
    * **Conclusion:** **Increasing num_stages boosts throughput by 35% simply by overlapping memory loads with compute.**
