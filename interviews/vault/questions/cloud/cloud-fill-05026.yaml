title: Power vs Performance Trade-off with GPU Frequency Scaling on A100
scenario: An A100 runs at 1.41GHz base clock consuming 400W. A cloud operator proposes power-capping at
  300W (75%) to fit denser server configurations. Using the cubic relationship between frequency and power
  (P ∝ f³), estimate the frequency reduction and throughput impact.
details:
  realistic_solution: 'Dynamic power ≈ 80% of total = 320W. Static power = 80W. Target: 300W total. Remaining
    dynamic: 300-80 = 220W. Dynamic power reduction: 220/320 = 0.688. P_dyn ∝ f³ → f_new/f_old = (0.688)^(1/3)
    = 0.883. New frequency: 1.41 × 0.883 = 1.245 GHz. Throughput reduction: ~11.7% (approximately linear
    with frequency for compute-bound tasks). H100 equivalent: 312 TFLOPS × 0.883 = 275 TFLOPS. Power:
    300W vs 400W = 25% power reduction for 11.7% throughput loss. Performance-per-watt improves: (275/300)
    / (312/400) = 0.917 / 0.78 = 17.5% better.'
  common_mistake: Applying the cubic power-frequency relationship directly without accounting for static
    power (leakage), which doesn't scale with frequency and represents ~15-20% of total GPU power.
  napkin_math: 'Static power: 80W. Dynamic: 320W → target 220W. Frequency ratio: (220/320)^(1/3) = 0.883.
    Throughput: 312 × 0.883 = 275 TFLOPS. Trade-off: -25% power, -11.7% throughput, +17.5% perf/watt.'
