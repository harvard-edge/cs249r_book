title: 'Optimization: Reducing Stranded Power Through Dynamic GPU Power Capping'
scenario: A 128-GPU A100 cluster (400 W TDP each) is constrained to 45 kW total IT power by the datacenter PDU. At full load (128 x 400 W = 51.2 kW), it exceeds budget. Currently, only 112 GPUs are powered on, leaving 16 GPUs stranded.
question: How would you dynamically power-cap the 128-GPU A100 cluster so all GPUs stay powered while total IT power remains under 45 kW?
details:
  realistic_solution: Implement heterogeneous power caps using GPU workload classification. Profile each job's compute vs memory boundedness using NVML. Assign deeper caps (e.g., 320 W) to memory-bound inference pods and lighter caps (e.g., 380 W) to compute-bound training pods to maintain the total under 45 kW.
  common_mistake: |
    **The Pitfall:** Applying a uniform power cap to all GPUs (e.g., 351.6 W per GPU).
    **The Rationale:** Uniform capping is simple to script, but it ignores that different ML workloads have completely different power sensitivities.
    **The Consequence:** Compute-bound workloads suffer severe performance degradation, reducing overall cluster throughput unnecessarily.
  napkin_math: |
    1. **Original State:** 112 GPUs $\times$ 400 W = 44,800 W. Training throughput: $112 \times 312 \text{ TFLOPS} = 34,944 \text{ TFLOPS}$.
    2. **New Strategy:** 64 training GPUs at 380 W (24,320 W) + 64 inference GPUs at 320 W (20,480 W) = 44,800 W.
    3. **Throughput Impact:** $64 \times 312 \text{ TFLOPS} \times (380/400) = \mathbf{18,969.6 \text{ TFLOPS}}$ for the training subset.
    4. **Conclusion:** While individual training FLOPS decrease, enabling 16 extra GPUs maximizes aggregate system throughput and utilization.
