title: Optimizing All-Reduce for LLM Training on AMD MI300X Cluster with Congestion Control
scenario: You are designing the network for an LLM training cluster of AMD MI300X accelerators connected via lossless Ethernet. During training, you observe massive performance degradation due to incast congestion during all-reduce operations. Standard ECN and PFC are failing to mitigate the issue.
question: How would you identify and resolve MI300X all-reduce incast congestion when standard ECN and PFC are insufficient?
details:
  realistic_solution: Implement a multi-layered congestion control strategy. At the transport layer, deploy Data Center Quantized Congestion Notification (DCQCN) or a similar RoCE-optimized protocol, specifically tuned for the MI300X's high-speed network interfaces. This provides rapid, explicit congestion feedback to endpoints. At the switch level, enable advanced flow scheduling and quality of service (QoS) mechanisms to prioritize critical all-reduce traffic. Dynamically adjust ECN marking thresholds and PFC pause frame configurations based on real-time network telemetry (e.g., buffer utilization, link saturation). Consider using adaptive routing or explicit path selection for large, persistent flows to distribute load and mitigate hot spots. Furthermore, explore collective communication libraries (like RCCL for ROCm) that can optimize all-reduce algorithms to be more network-aware, potentially by overlapping computation and communication or using tree-based communication patterns to reduce incast concentration.
  common_mistake: |
    **The Pitfall:** Solely relying on hardware-level lossless features (like PFC) without end-to-end transport tuning.
    **The Rationale:** Engineers assume standard Ethernet flow control handles all traffic gracefully, missing that collective communication creates massive, synchronous microbursts.
    **The Consequence:** Unmanaged PFC causes cascading head-of-line blocking, leading to unpredictable network stalls and halved training throughput.
  napkin_math: |
    * **Transfer Size:** 100B parameter model (200GB). All-reduce across 256 GPUs requires sending/receiving ~400GB per GPU.
    * **Theoretical Minimum:** At 400Gbps (50GB/s) per link, 400GB / 50GB/s = 8 seconds per step.
    * **Congestion Penalty:** Incast drops effective throughput by 50% (to 25GB/s).
    * **Conclusion:** Step time doubles to **16 seconds**, representing an 8-second penalty purely from network congestion.
