title: Feature Serving Latency Budget for Two-Tower Models
scenario: You serve a two-tower retrieval model on H100 with an end-to-end SLO of 50ms p99. The latency budget breaks down as: feature retrieval from store (target: 5ms p99), embedding lookup (target: 10ms), ANN search over 100M items (target: 25ms), ranking (target: 5ms), and response serialization (target: 5ms). Your feature store is currently at p99=18ms.
question: How would you redesign feature retrieval to bring p99 latency from 18ms under the 5ms budget for the 50ms two-tower SLO?
details:
  realistic_solution: 'Implement a feature fan-out architecture: issue all feature store reads in parallel using async I/O (e.g., asyncio in Python, or gRPC streaming). Colocate the most-accessed item features in the same Redis cluster as user features to avoid cross-store fetches. Cache the top-10K item features in process memory (LRU cache, ~100 MB for 10K items × 10KB each). This drops p99 from 18ms to under 4ms.'
  common_mistake: |
    **The Pitfall:** Fetching all features in a sequential waterfall pattern.
    **The Rationale:** Candidates request user features, wait for the response, then request item features, accumulating sequential round-trip times.
    **The Consequence:** Three sequential fetches easily add 10-15ms of baseline latency, guaranteeing an SLO violation.
  napkin_math: |
    - 1. Analyze sequential fetches: User (2ms) + Item (3ms) + Context (2ms) + RTTs (3ms) = 10ms p50. P99 tail latency ≈ 30ms (over budget).
    - 2. Apply parallel fan-out async I/O: max(2, 3, 2) = 3ms base + 1ms RTT = 4ms p50. P99 tail ≈ 10ms.
    - 3. Apply in-process L3 cache for top 10K items: 0.05ms fetch time.
    - 4. Calculate blended P99 latency (80% cache hit rate): (0.80 * 0.05ms) + (0.20 * 10ms) = **2.04 ms**.
    - 5. Conclusion: Parallel fan-out + in-memory caching drops feature retrieval P99 well below the **5ms budget**.
