title: Data Loader Bottlenecks on GPU Clusters
scenario: 'Training a ResNet-50 variant on 8x A100 80GB SXM. The GPUs process 2500 images/sec total. Each image is 2MB on disk, requiring JPEG decoding and augmentations.'
question: 'Analyze the CPU and PCIe bandwidth requirements for the data loader to prevent starving the GPUs.'
details:
  realistic_solution: 'Reading 2500 images at 2MB each demands 5 GB/s of disk read bandwidth, which modern NVMe drives can handle. Expanding to uncompressed FP32 tensors (e.g., 600KB) requires ~1.5 GB/s of PCIe bandwidth, well within Gen4 limits. The true bottleneck is CPU compute: decoding 2500 JPEGs per second typically exhausts dozens of CPU cores.'
  common_mistake: |
    **The Pitfall:** Focusing solely on PCIe bandwidth and neglecting the massive CPU cost of image decoding.
    **The Rationale:** Engineers often obsess over GPU specifications and interconnects while treating the CPU as a simple passthrough device.
    **The Consequence:** Deploying a multi-GPU system that sits idle because the host CPU cannot decompress JPEGs fast enough to feed the data loader.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2500 images/sec total processing rate.
    - Each image is 2MB on disk.
    - Uncompressed FP32 tensor size is ~600KB.

    **Calculations:**
    - Disk I/O: 2500 images/sec * 2 MB/image = 5000 MB/s (5 GB/s) disk read bandwidth.
    - PCIe transfer: 2500 images/sec * 600 KB/image ≈ 1.5 GB/s.
    - PCIe Gen4 capacity is vastly higher than 1.5 GB/s.

    **Conclusion & Interpretation:**
    - **Result: CPU-Bound** (The true bottleneck is CPU compute: decoding 2500 JPEGs per second typically exhausts dozens of CPU cores).
