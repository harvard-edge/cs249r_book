title: SyncBatchNorm Communication Overhead
scenario: 'You are training a 3D ResNet for video action recognition on a single node with 8 GPUs. Due to activation memory, micro-batch size is limited to 2. You replace standard Batch Normalization with Synchronized Batch Normalization (SyncBN).'
question: 'How much data does one GPU transmit during the SyncBN forward-pass Ring AllReduce for 1024 FP32 channels on 8 GPUs?'
details:
  realistic_solution: 'SyncBN does not require transmitting the massive N x C x D x H x W activation tensor. Each GPU only communicates the local sum and sum of squares per channel. For 1024 FP32 channels, this creates a tiny 8 KB payload per GPU. During an 8-GPU Ring All-Reduce, each GPU transmits exactly 14 KB of data. Thus, SyncBN is extremely latency-bound, requiring kernel fusion and optimized interconnects.'
  common_mistake: |
    **The Pitfall:** Believing the full activation tensor must be gathered across all GPUs.
    **The Rationale:** Candidates forget that calculating global variance only requires reducing the sum and sum of squares, not the entire volumetric tensor.
    **The Consequence:** Estimating gigabytes of bandwidth instead of kilobytes, fundamentally misunderstanding the latency-bound nature of the operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 channels, FP32 (4 bytes).
    - 8 GPUs, Ring All-Reduce topology.

    **Calculations:**
    - Stats needed per channel: sum and sum of squares (2 values).
    - Payload size: 2 stats * 1024 channels * 4 bytes = 8,192 bytes (8 KB).
    - Ring All-Reduce formula per GPU: 2 * ((N-1)/N) * Payload.
    - 2 * (7/8) * 8 KB = 14 KB.

    **Conclusion & Interpretation:**
    - **Result: Each GPU transmits exactly 14 KB of data (Latency-Bound).**
