title: Analyze EfficientNet compound scaling vs. naive width/depth scaling on throughput
scenario: 'Your team needs a cloud image classifier at 84% ImageNet top-1 accuracy. You have three candidates:
  EfficientNet-B4 (19M params, 4.2 GFLOPs), a naively widened ResNet-50 (35M params, 8.2 GFLOPs), and
  a naively deepened ResNet-101 (44M params, 7.8 GFLOPs). All run on A100 SXM4 80GB. Analyze which achieves
  best accuracy-per-FLOP and best throughput at batch=64.'
details:
  realistic_solution: EfficientNet-B4 achieves ~82.6% top-1 with 4.2 GFLOPs — best FLOP efficiency. Naive
    width/depth scaling adds FLOPs non-uniformly and doesn't balance resolution, width, and depth. On
    A100, however, EfficientNet's compound of SE blocks and MBConv can suffer from kernel launch overhead
    and low occupancy on small spatial resolutions. Profile with Nsight to verify whether EfficientNet-B4
    actually achieves higher images/sec than ResNet-50 despite fewer FLOPs.
  common_mistake: Comparing models only by parameter count without considering memory bandwidth constraints
    and FLOP efficiency; assuming EfficientNet is always faster due to fewer FLOPs without measuring actual
    A100 throughput.
  napkin_math: 'EfficientNet-B4: 4.2G FLOPs/image, batch=64 → 268.8 GFLOPs. A100 BF16 peak 312 TFLOPS,
    50% util → 156 TFLOPS. 268.8G/156T ≈ 1.7 ms/batch. ResNet-50: 8.2G×64 = 524.8 GFLOPs → 524.8G/156T
    ≈ 3.4 ms/batch. EfficientNet-B4 throughput ~2× better at matched batch size assuming similar utilization
    — verify empirically.'
