title: Diagnosing and Mitigating Equal Opportunity Violations
scenario: 'A cloud-based fraud detection API processes 5,000 transactions/sec using a global confidence threshold of 0.85 to block transactions. Production monitoring alerts show an Equal Opportunity violation: the True Positive Rate (TPR) for the majority demographic is 92%, while the minority demographic (20% of total traffic) sits at only 70%. Retraining the model is blocked because the pipeline takes 18 hours on a 64-node A100 cluster.'
question: "How would you equalize the minority group’s TPR to 92% without retraining, and what happens to the review queue?"
details:
  realistic_solution: Perform a post-hoc Threshold Adjustment by analyzing group-specific ROC curves. Keep the majority threshold at 0.85 and independently lower the minority group's threshold (e.g., to 0.72) to intersect the 92% TPR target. This achieves Equal Opportunity instantly at serving time via a fast routing layer update.
  common_mistake: |
    **The Pitfall:** Attempting to fix the disparity by immediately resampling the training data.
    
    **The Rationale:** Engineers often default to retraining to fix model fairness, forgetting that a full training run takes 18 hours, leaving the production bias active in the meantime.
    
    **The Consequence:** Prolonged bias in production and unnecessary compute expenditure, when a post-hoc threshold shift could mitigate the issue instantly.
  napkin_math: |
    * **Minority Volume:** 5,000 TPS × 20% = 1,000 TPS
    * **False Positive Rate Change:** Lowering threshold increases FPR from 5% to 15%
    * **Extra False Positives:** 1,000 TPS × (0.15 - 0.05) = 100 TPS
    * **Result:** **The manual review queue must instantly scale capacity to handle an additional 100 flagged transactions per second.**
