title: Diagnosing and Mitigating Equal Opportunity Violations
scenario: 'A cloud-based fraud detection API processes 5,000 transactions/sec using a global confidence
  threshold of 0.85 to block transactions. Production monitoring alerts show an Equal Opportunity violation:
  the True Positive Rate (TPR) for the majority demographic is 92%, while the minority demographic (20%
  of total traffic) sits at only 70%. Retraining the model is blocked because the pipeline takes 18 hours
  on a 64-node A100 cluster. As the Staff ML Engineer, analyze the root cause of this disparity and design
  an immediate post-hoc intervention to equalize the TPR to 92% across all groups without retraining.
  What are the operational side effects on the downstream review queue?'
question: "How would you equalize the minority group’s TPR to 92% without retraining, and what happens to the review queue?"
details:
  realistic_solution: Perform a post-hoc Threshold Adjustment by analyzing group-specific ROC curves.
    Keep the majority threshold at 0.85 and independently lower the minority group's threshold (e.g.,
    to 0.72) to intersect the 92% TPR target. This achieves Equal Opportunity instantly at serving time
    via a fast routing layer update.
  common_mistake: Attempting to fix the disparity by immediately resampling the training data and waiting
    18 hours for retraining, or applying a blind global threshold shift that degrades the majority group's
    performance.
  napkin_math: Traffic = 5,000 tps. Minority volume = 1,000 tps. Lowering the threshold to hit 92% TPR
    increases the minority False Positive Rate from 5% to 15%. Extra false positives = 1,000 tps * (0.15
    - 0.05) = 100 extra falsely flagged transactions per second. The downstream manual review queue must
    instantly scale capacity by 100 TPS.
