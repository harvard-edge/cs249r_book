title: Diagnosing and Mitigating Equal Opportunity Violations
scenario: 'A cloud-based fraud detection API processes 5,000 transactions/sec using
  a global confidence threshold of 0.85 to block transactions. Production monitoring
  alerts show an Equal Opportunity violation: the True Positive Rate (TPR) for the
  majority demographic is 92%, while the minority demographic (20% of total traffic)
  sits at only 70%. Retraining the model is blocked because the pipeline takes 18
  hours. Lowering the minority threshold to match the 92% TPR will increase its False
  Positive Rate (FPR) from 5% to 15%.'
question: How would you equalize the minority group’s TPR to 92% without retraining,
  and what happens to the review queue?
details:
  realistic_solution: Perform a post-hoc Threshold Adjustment by analyzing group-specific
    ROC curves. Keep the majority threshold at 0.85 and independently lower the minority
    group's threshold (e.g., to 0.72) to intersect the 92% TPR target. This achieves
    Equal Opportunity instantly at serving time via a fast routing layer update.
  common_mistake: '**The Pitfall:** Attempting to fix the disparity by immediately
    resampling the training data.

    **The Rationale:** Engineers often default to retraining to fix model fairness,
    forgetting that a full training run takes 18 hours, leaving the production bias
    active in the meantime.

    **The Consequence:** Prolonged bias in production and unnecessary compute expenditure,
    when a post-hoc threshold shift could mitigate the issue instantly.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   * Global throughput: 5,000 TPS.\n\
    \   * Minority demographic: 20% of total traffic.\n   * FPR increase for minority\
    \ demographic: from 5% to 15%.\n2. **Calculations:**\n   * Minority Volume: 5,000\
    \ TPS * 0.20 = 1,000 TPS.\n   * Marginal FPR Increase: 15% - 5% = 10%.\n   * Additional\
    \ False Positives: 1,000 TPS * 0.10 = 100 TPS.\n3. **Conclusion & Interpretation:**\
    \ **Result: 100 extra flagged TPS (Queue-Bound)**. The manual review queue must\
    \ scale instantly to handle the load.\n"
