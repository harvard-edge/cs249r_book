title: 'Vendor Lock-in TCO Analysis: CUDA Moat vs Multi-Backend Investment'
scenario: 'Your ML platform team has $2M/year in GPU cloud spend, 100% on NVIDIA A100s. MI300X instances
  are 35% cheaper per TFLOP-hour. The CFO asks: should we invest $400K in porting our stack to be multi-vendor,
  or accept the CUDA lock-in? Quantify the break-even.'
details:
  realistic_solution: 'Model the TCO. Current: $2M/yr. With 50% workload on MI300X at 35% savings: $1M
    NVIDIA + $0.65M AMD = $1.65M, saving $350K/yr. Porting cost: $400K one-time + ~$100K/yr ongoing dual-CI
    maintenance. Break-even: $400K / ($350K - $100K) = 1.6 years. If AMD share grows to 70%, savings increase
    to $490K/yr, break-even drops to 10 months. Decision: invest, but only if the 2-year commitment is
    realistic.'
  common_mistake: 'Only comparing $/TFLOP and ignoring the ongoing maintenance cost of a multi-backend
    stack: CI/CD for two targets, dual kernel libraries, and the risk of performance regressions on one
    backend when optimizing the other.'
  napkin_math: 'Savings per year at 50/50 split: $2M - $1.65M = $350K. Ongoing multi-backend cost: ~$100K/yr.
    Net annual savings: $250K. Break-even on $400K investment: 1.6 years.'
