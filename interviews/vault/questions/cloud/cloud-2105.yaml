validation_issues:
- The Napkin Math for AllToAll per step (batch_size × 12 tables × 128 dim × 2B = batch_size × 3 KB) is
  a calculation for *one token* per batch, not the full batch, and if batch_size=64K, it would be 64K
  x 3KB = 192MB. The phrasing implies 3KB is the total AllToAll volume, which is small for a batch.
- The calculation for total data for AllToAll per step (192 MB at batch 64K) is correct, but the intermediate
  step 'batch_size x 3 KB' is misleadingly written as if '3KB' is constant per batch.
