title: PCIe Gen5 Transfer Time and Pinned Memory
scenario: You are optimizing a training loop on a node with a GPU connected via a PCIe Gen5 x16 link. Your CPU data loader produces batches that are exactly 16 GB in size.
question: How long should a 16 GB host-to-GPU transfer take over PCIe Gen5 x16, and why does pinned memory matter?
details:
  realistic_solution: To approach the theoretical minimum transfer time, the batch tensor must be allocated in pinned (page-locked) memory. This guarantees the memory pages will not be swapped out by the OS, allowing the GPU's DMA engine to directly fetch the data over the PCIe bus without CPU involvement. If standard pageable memory is used, the system must first copy the 16 GB data into a pinned staging area on the host, which bottlenecks the transfer and consumes CPU cycles.
  common_mistake: |
    **The Pitfall:** Using bidirectional bandwidth (64 GB/s) and ignoring pageable memory overhead.
    **The Rationale:** Candidates use the headline spec sheet numbers and assume host memory is uniformly accessible to the GPU.
    **The Consequence:** They underestimate transfer time by 2x, and miss that pageable memory requires a hidden, synchronous CPU copy to a staging buffer before DMA can begin.
  napkin_math: |
    - **Unidirectional bandwidth:** PCIe Gen5 x16 = 32 GB/s.
    - **Payload size:** 16 GB.
    - **Transfer Time:** 16 GB / 32 GB/s = 0.5 seconds = **500 milliseconds per batch**.
