title: RDMA and Host Networking for ML Training Pods
scenario: Your Kubernetes training pods use standard pod networking (Calico CNI) and achieve only 15 GB/s between nodes for NCCL AllReduce, despite having 400 Gbps InfiniBand NICs. The theoretical maximum is 50 GB/s.
question: "What is the Kubernetes networking bottleneck limiting NCCL to 15 GB/s, and how would you configure K8s for full InfiniBand bandwidth?"
details:
  realistic_solution: 'The bottleneck: NCCL over TCP/IP adds kernel network stack overhead. Data goes: GPU → PCIe → CPU memory → kernel TCP/IP stack → Ethernet NIC → switch → Ethernet NIC → kernel → CPU memory → PCIe → GPU. Each copy adds latency and CPU overhead. Fix: enable GPUDirect RDMA (GDR) + RDMA-capable CNI. Configuration: (1) Install Multus CNI. (2) Install RDMA/IB CNI. (3) Create NetworkAttachmentDefinition. (4) Pod spec: annotations for Multus. (5) Enable hostNetwork: true as a simpler alternative. (6) Set NCCL environment variables: NCCL_IB_HCA=mlx5, NCCL_IB_DISABLE=0, NCCL_NET_GDR_LEVEL=5. With GPUDirect RDMA: data flows GPU → NVLink → IB NIC → switch → IB NIC → GPU. No CPU memory copies. Throughput: ~45 GB/s (90% of 50 GB/s theoretical).'
  common_mistake: |
    **The Pitfall:** Assuming Kubernetes pod networking automatically uses InfiniBand hardware efficiently.
    **The Rationale:** Candidates do not realize that standard CNIs only support TCP/IP over Ethernet and bypass RDMA entirely.
    **The Consequence:** NCCL traffic is forced through the kernel TCP stack, capping throughput and burning CPU cycles.
  napkin_math: |
    1. TCP/IP throughput = 15 GB/s (30% of wire speed). RDMA = 45 GB/s (90% of wire speed).
    2. For 128-GPU training with 2 GB AllReduce, Ring AllReduce transfers ~4 GB per node.
    3. TCP time = 4 GB / 15 GB/s = 266 ms.
    4. RDMA time = 4 GB / 45 GB/s = 89 ms.
    5. **Enabling GPUDirect RDMA saves 177 ms per step by bypassing the CPU kernel stack.**
