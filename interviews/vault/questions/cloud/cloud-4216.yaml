title: Columnar vs Row Format for Feature Tables
scenario: 'A tabular dataset has 500 columns and 100M rows (200 GB uncompressed). Your training pipeline only uses 20 columns.'
question: 'How much I/O does a columnar format (Parquet) save versus a row format (CSV/TFRecord), and what enables this savings?'
details:
  realistic_solution: 'Columnar formats store each column contiguously, enabling column pruning — reading only the 20 needed columns skips 96% of the data. For 200 GB uncompressed: Parquet reads ~8 GB of raw column data (200 GB × 20/500). But Parquet also compresses far better than row formats because adjacent values in a column are the same type and often have low entropy (e.g., a ''country'' column with 200 unique values compresses to near-zero with dictionary encoding). Typical Parquet compression: 3-10× for tabular data. So 8 GB raw → ~1.5 GB compressed. CSV/TFRecord would read all 200 GB, compressed to ~60 GB. Effective I/O savings: 1.5 GB vs 60 GB = 40×, not just 25×.'
  common_mistake: |
    **The Pitfall:** Assuming the savings is exactly the ratio of columns used (20/500 = 96%).
    **The Rationale:** Candidates accurately understand column pruning but completely ignore the drastic differences in compression ratios between columnar and row formats.
    **The Consequence:** They underestimate the true I/O savings, missing the multiplicative effect of highly efficient dictionary encoding on adjacent columnar data.
  napkin_math: |
    * **Row format (CSV):** Read all 200 GB. Compressed ~3x -> 67 GB I/O.
    * **Column format (Parquet):** Read 20/500 columns = 8 GB raw. Compressed ~5x -> 1.6 GB I/O.
    * **Speedup multiplier:** 67 GB / 1.6 GB = **42x speedup**.
    * **Time impact (at 2 GB/s):** 33 seconds (CSV) vs 0.8 seconds (Parquet).
