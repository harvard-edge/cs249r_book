title: The I/O Jitter Amplification
scenario: A 16,000-GPU training job uses synchronous data parallelism. Each training step takes 2 seconds (1.5s compute, 0.5s AllReduce). The data pipeline prefetches 3 batches ahead on each worker. Occasionally, one or two workers experience an I/O hiccup where a Lustre read takes 500ms instead of the usual 50ms.
question: Why does a 500 ms Lustre hiccup on one or two workers slow all 16,000 GPUs by 450 ms, and how would you fix it?
details:
  realistic_solution: 'In synchronous data parallelism, every GPU must complete its forward + backward pass before the AllReduce can begin (or the next step can start, depending on the overlap strategy). When one worker''s data pipeline stalls for 500ms, its compute start is delayed by 500ms - 50ms = 450ms (above normal). The prefetch buffer absorbs typical jitter — with 3 batches at 2s each, the buffer covers 6 seconds of I/O delay. But the buffer only helps if the stall is *isolated*. If the Lustre hiccup affects a busy OST that serves data to dozens of workers, multiple workers stall simultaneously, draining the prefetch buffer across all of them. Once any worker''s buffer empties, that worker''s compute start delays, and the synchronization barrier forces all 15,999 other GPUs to wait. The amplification is: one storage hiccup on one OST → multiple workers stall → barrier delays all GPUs → 16,000 × 450ms of wasted GPU-time per incident. Fix: increase prefetch depth to 5-8 batches, shard data across more OSTs to reduce per-OST hotspots, use local NVMe as an async staging tier so the data pipeline never reads from Lustre synchronously, and implement straggler detection that skips the slow worker''s gradient contribution rather than stalling the entire collective.'
  common_mistake: |
    **The Pitfall:** Thinking the I/O delay only affects the slow worker.
    **The Rationale:** It is easy to assume that one worker out of 16,000 has a negligible impact, ignoring the strict synchronization barriers inherent in synchronous data-parallel training.
    **The Consequence:** The team ignores the root cause, leading to massive fleet-wide idle time and hundreds of thousands of dollars in wasted compute.
  napkin_math: |
    - **Single I/O Stall Cost:** $450\text{ ms} \times 16,000\text{ GPUs} = 7,200\text{ GPU-seconds} = 2\text{ GPU-hours}$ wasted per incident.
    - **Financial Cost:** At $\$2$/GPU-hour, that is $\$4$ per stall. If stalls occur 10 times per hour, it's $\$40$/hour, $\$960$/day, or $\sim \$350\text{K}$/year.
    - **Fix Cost:** Increasing prefetch from 3 to 8 batches costs $5 \times 2\text{ s} \times 100\text{ MB/s} = 1\text{ GB}$ additional DRAM per worker.
    - **Conclusion:** **1 GB of DRAM completely eliminates a $350K/year bottleneck.**
  options:
  - "The hiccup only affects the local GPU; the overall 450ms slowdown is an illusion. Fix by ignoring it."
  - "Synchronous AllReduce forces all GPUs to wait for the slowest worker; fix by using asynchronous parameter servers."
  - "The Lustre hiccup causes an interrupt storm across the InfiniBand fabric. Fix by disabling RoCE."
  - "Synchronous data parallelism forces a barrier where all GPUs wait for the straggler's delayed compute. Fix by increasing prefetch depth and sharding data across more OSTs."
