title: Strategic Platform Risk Assessment for ML Infrastructure
scenario: Your company's entire ML stack is built on CUDA 12.x, cuDNN 8.x, NCCL 2.x,
  and TensorRT 8.x. A new CTO asks you to quantify the vendor lock-in risk and propose
  a portability roadmap. What framework do you use to assess and mitigate the risk?
question: What framework do you use to assess and mitigate the risk?
details:
  realistic_solution: 'Layer-by-layer assessment: (1) PyTorch model code: 95% portable
    (uses standard ops). Cost to port: low. (2) Custom CUDA kernels: 0% portable.
    Cost: high ($50K-200K per kernel to port). (3) cuDNN: replaced by MIOpen (AMD)
    or XLA (TPU) at framework level. Cost: medium (framework handles it). (4) NCCL:
    replaced by RCCL or Gloo. Cost: medium (API-compatible). (5) TensorRT: no equivalent
    on AMD/TPU. Cost: high (re-engineer inference pipeline). Roadmap: isolate non-portable
    layers behind abstraction interfaces, invest in Triton for custom kernels (portable
    by design), and move inference to ONNX Runtime (multi-EP). 18-month timeline,
    $600K investment.'
  common_mistake: Treating portability as a binary decision (lock-in vs fully portable).
    In practice, it is a spectrum, and different layers of the stack have different
    portability costs.
  napkin_math: '100-person ML org, 5 custom CUDA kernels, 3 TensorRT-dependent services.
    Porting cost: 5 kernels x $100K + 3 services x $50K + CI/CD overhead $100K = $750K.
    Annual NVIDIA spend: $5M. If multi-vendor saves 20%: $1M/yr. ROI: $750K / $1M
    = 9-month payback.'
