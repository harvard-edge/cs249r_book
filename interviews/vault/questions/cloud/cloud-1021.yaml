title: Canary Rollout Time Estimation
scenario: 'You implement continuous deployment for a dynamic pricing model on a 40-node Kubernetes cluster.
  Each update is rolled out via a progressive canary: 1%, 10%, 50%, then 100% traffic. To automatically
  promote to the next stage, the system must observe at least 5,000 inference requests without a latency
  SLO violation, OR bake for a minimum of 10 minutes (600 seconds), whichever is LONGER. If the global
  traffic is exactly 400 requests per second (RPS), calculate the total time required to reach 100% traffic
  shift.'
details:
  realistic_solution: Calculate the duration for each stage individually. The 1% stage is bounded by the
    request count (1250 seconds), while the 10% and 50% stages are bounded by the minimum bake time (600
    seconds each), resulting in roughly 41 minutes total.
  common_mistake: Candidates simply multiply the number of stages by the minimum bake time (3 stages *
    10 mins = 30 mins) without calculating if low-traffic stages satisfy the minimum request threshold.
  napkin_math: 'Stage 1 (1%): 4 RPS. Time = 5,000 / 4 = 1,250s. Stage 2 (10%): 40 RPS. Time = 5,000 /
    40 = 125s. Bounded by 10 min minimum (600s). Stage 3 (50%): 200 RPS. Time = 5,000 / 200 = 25s. Bounded
    by 10 min minimum (600s). Total = 1,250s + 600s + 600s = 2,450 seconds (~40.8 minutes).'
