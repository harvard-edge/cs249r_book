title: 'The Maintenance Tax: TCO & Cost Modeling'
scenario: You're building a financial model for a new GPU cluster. When accounting for Total Cost of Ownership
  (TCO), what is the standard industry rule of thumb to estimate the annual hardware maintenance cost
  as a percentage of the initial capital expenditure (CapEx)?
details:
  realistic_solution: The standard rule of thumb is that annual hardware maintenance costs are approximately
    5% of the initial CapEx. This budget accounts for component failures (like fans, PSUs, or even the
    GPU itself), replacement parts, and the technician labor required for repairs over the system's lifetime.
  common_mistake: Engineers often focus solely on the initial purchase price (CapEx) and dramatically
    underestimate the ongoing operational expenses (OpEx) required to maintain hardware. They might assume
    maintenance is negligible (e.g., <1%) or confuse it with software subscription models which have much
    higher annual rates (e.g., >20%).
  napkin_math: 'For a single H100 GPU with a CapEx of ~$30,000, the annual maintenance budget would be:

    1. **Identify Rule of Thumb:** Annual maintenance is typically 5% of initial hardware CapEx.

    2. **Calculate Per GPU:** $30,000 × 0.05 = $1,500 per year.

    3. **Scale to a Cluster (e.g., 1000 GPUs):** 1,000 × $1,500 = $1,500,000 per year.

    This covers failed fans, optical transceivers, or dead GPUs.'
  options:
  - ~0.5% (Hardware is highly reliable and rarely fails)
  - ~20% (Similar to a software subscription)
  - ~5% (Standard for OpEx planning)
  - A flat rate of ~$500 (It doesn't scale with hardware cost)
  correct_index: 2
