title: The Maintenance Tax TCO
scenario: 'You are building a financial model for a new GPU cluster.'
question: 'What is the standard rule of thumb for estimating annual hardware maintenance cost as a percentage of initial CapEx?'
details:
  realistic_solution: 'Annual maintenance is approximately 5% of initial CapEx. This covers component failures and technician labor.'
  common_mistake: |
    **The Pitfall:** Underestimating ongoing operational expenses (OpEx) for hardware.
    **The Rationale:** Engineers focus solely on initial purchase price or confuse hardware maintenance with software subscriptions.
    **The Consequence:** Financial models break down over multi-year lifecycles when components inevitably fail.
  napkin_math: |
    **Assumptions & Constraints:**
    - CapEx per GPU: $30,000.
    - Maintenance: 5% of CapEx.
    
    **Calculations:**
    - Per GPU Cost: $30,000 * 0.05 = $1,500/year.
    - Cluster (1,000 GPUs): 1,000 * $1,500 = $1,500,000/year.
    
    **Conclusion & Interpretation:**
    - **Result: $1.5M annual OpEx (OpEx-Bound)**. Hardware maintenance is a massive, predictable ongoing cost.
