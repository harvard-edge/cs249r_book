title: 'The Maintenance Tax: TCO & Cost Modeling'
scenario: 'You''re building a financial model for a new GPU cluster.'
question: 'When accounting for Total Cost of Ownership (TCO), what is the standard industry rule of thumb to estimate the annual hardware maintenance cost as a percentage of the initial capital expenditure (CapEx)?'
details:
  realistic_solution: 'The standard rule of thumb is that annual hardware maintenance costs are approximately 5% of the initial CapEx. This budget accounts for component failures (like fans, PSUs, or even the GPU itself), replacement parts, and the technician labor required for repairs over the system''s lifetime.'
  common_mistake: |
    **The Pitfall:** Drastically underestimating ongoing operational expenses (OpEx) for hardware.
    **The Rationale:** Engineers often focus solely on the initial purchase price (CapEx) and assume maintenance is negligible (e.g., <1%) or confuse it with high software subscription rates (>20%).
    **The Consequence:** The financial model breaks down over multi-year cluster lifecycles when components inevitably fail.
  napkin_math: |
    - **Identify Rule of Thumb:** Annual maintenance is typically 5% of initial hardware CapEx.
    - **Per GPU Cost:** $30,000 CapEx × 0.05 = $1,500 per year.
    - **Cluster Cost:** 1,000 GPUs × $1,500 = **$1,500,000 per year**.
  options:
  - ~0.5% (Hardware is highly reliable and rarely fails)
  - ~20% (Similar to a software subscription)
  - ~5% (Standard for OpEx planning)
  - A flat rate of ~$500 (It doesn't scale with hardware cost)
  correct_index: 2
