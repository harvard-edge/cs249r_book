title: Cloud Red Teaming L5 0
scenario: 'Your team debates red teaming approaches: (A) hire expert human red teamers ($200K/year), (B)
  use automated LLM-based red teaming (another model generates attacks), (C) combine both. The model receives
  5M requests/day. Evaluate coverage and cost.'
details:
  realistic_solution: 'Option A (human only): experts find subtle, creative attacks that automated systems
    miss (social engineering, cultural context, multi-turn manipulation). But throughput is low: ~100
    creative attacks/day per expert × 3 experts = 300/day. Coverage: 300 / 5M = 0.006%. Option B (automated):
    generates 100K+ adversarial prompts/day at <$10/day compute. High coverage of known attack patterns,
    but formulaic — misses novel creative attacks. Coverage: 100K / 5M = 2%. Option C (hybrid): humans
    design attack categories and seed templates; automated system generates variations at scale. 300 human
    templates × 1000 variations = 300K attacks/day. Coverage: 6%. Cost: $200K + $3.6K/year compute = $204K.
    Best ROI: human creativity guides automated scale.'
  common_mistake: Relying solely on automated red teaming. Automated systems excel at known attack patterns
    but miss emergent risks — like a multi-turn conversation that gradually manipulates the model. Human
    creativity is irreplaceable for discovering novel attack vectors.
  napkin_math: 'Human: 300 attacks/day (109,500/yr). Cost per attack: $200K / 109,500 = $1.83. Automated:
    100K attacks/day (36.5M/yr). Cost per attack: $3.6K / 36.5M = $0.0001. Hybrid: humans design 300 attack
    templates; automated generates 1,000 variations each → 300K attacks/day (109.5M/yr) — additive only
    if the automated variations are truly novel, not merely a repeat of the 100K baseline attacks. Treating
    the hybrid as 300K distinct attacks/day: cost = ($200K + $3.6K) / 109.5M = $0.0019/attack. Cost per
    vulnerability found (assuming 1% hit rate for humans/hybrid, 0.1% for automated): Human $183, Automated
    $0.10, Hybrid $0.19.'
