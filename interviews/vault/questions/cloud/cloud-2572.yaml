title: Cloud Red Teaming L5 0
scenario: Your team debates red teaming approaches for a model serving 5M requests/day: (A) human red teamers ($200K/year), (B) automated LLM-based red teaming (>$10/day), or (C) a hybrid of both. You need to evaluate the coverage and cost of each.
question: For a model serving 5M requests/day, how do human, automated LLM-based, and hybrid red teaming compare in coverage and cost?
details:
  realistic_solution: 'Option A (human only): experts find subtle, creative attacks that automated systems miss (social engineering, cultural context, multi-turn manipulation). But throughput is low: ~100 creative attacks/day per expert × 3 experts = 300/day. Coverage: 300 / 5M = 0.006%. Option B (automated): generates 100K+ adversarial prompts/day at <$10/day compute. High coverage of known attack patterns, but formulaic — misses novel creative attacks. Coverage: 100K / 5M = 2%. Option C (hybrid): humans design attack categories and seed templates; automated system generates variations at scale. 300 human templates × 1000 variations = 300K attacks/day. Coverage: 6%. Cost: $200K + $3.6K/year compute = $204K. Best ROI: human creativity guides automated scale.'
  common_mistake: |
    **The Pitfall:** Relying solely on automated red teaming.
    **The Rationale:** Teams see the incredibly low cost-per-attack and assume scale equals security.
    **The Consequence:** They miss novel, emergent risks like multi-turn manipulation, because automated systems excel at known patterns but lack human creativity.
  napkin_math: |
    - **Human:** 300 attacks/day (109,500/yr). Cost per attack: $200K / 109,500 = **$1.83**.
    - **Automated:** 100K attacks/day (36.5M/yr). Cost per attack: $3.6K / 36.5M = **$0.0001**.
    - **Hybrid:** 300 templates * 1,000 variations = 300K attacks/day (109.5M/yr).
    - **Hybrid Cost:** ($200K human + $3.6K compute) / 109.5M = **$0.0019 per attack**.
