title: Cross-Region Training vs Data Locality
scenario: A global financial institution generates 100 TB of trading logs daily in their Frankfurt data center. A central ML training cluster in New York can process this entire batch in 1 hour. The local Frankfurt cluster takes 15 hours to process the same batch. The dedicated transatlantic link provides a guaranteed 10 Gbps bandwidth.
question: Should the 100 TB daily trading logs be trained locally in Frankfurt or transferred to New York, and what is the end-to-end time?
details:
  realistic_solution: Implement local training in Frankfurt. According to the Data Locality Invariant, the massive network transfer penalty outweighs the compute speedup.
  common_mistake: |
    **The Pitfall:** Focusing solely on the 15x compute acceleration of the remote cluster.
    **The Rationale:** Engineers often ignore the massive network transfer penalty imposed by moving large datasets across WAN links.
    **The Consequence:** Choosing the remote training approach, resulting in an end-to-end time that is significantly slower than local processing.
  napkin_math: |
    1. **Calculate Transfer Time:** 100 TB = 800,000 Gigabits. 800,000 Gb / 10 Gbps = 80,000 seconds ≈ 22.2 hours.
    2. **Calculate Remote Time:** 22.2h (transfer) + 1h (compute) = 23.2 hours.
    3. **Compare with Local Time:** Local Time = 15 hours.
    **Final Result: Local training in Frankfurt saves 8.2 hours per batch by avoiding the 22.2-hour transfer penalty.**
