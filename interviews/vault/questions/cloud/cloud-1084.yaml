title: Cross-Region Training vs Data Locality
scenario: A global financial institution generates 100 TB of trading logs daily in their Frankfurt data
  center. A central ML training cluster (equipped with H100s) in New York can process this entire batch
  in 1 hour. The local Frankfurt cluster (equipped with older T4s) takes 15 hours to process the same
  batch. The dedicated transatlantic link provides a guaranteed 10 Gbps bandwidth. Evaluate whether the
  system should train locally in Frankfurt or transfer the data to New York for faster training.
question: "Should the 100 TB daily trading logs be trained locally in Frankfurt or transferred to New York, and what is the end-to-end time?"
details:
  realistic_solution: Implement local training in Frankfurt. According to the Data Locality Invariant,
    the massive network transfer penalty outweighs the compute speedup. Transferring the data takes over
    22 hours, making the slower local compute significantly faster end-to-end.
  common_mistake: Focusing solely on the 15x compute acceleration of the NY H100 cluster without calculating
    the network transfer time, thereby incorrectly choosing the remote training approach.
  napkin_math: Transfer Time = (100 TB * 8 bits/byte) / 10 Gbps = 800,000 Gigabits / 10 Gbps = 80,000
    seconds ≈ 22.2 hours. Total Remote Time = 22.2h (transfer) + 1h (compute) = 23.2 hours. Local Time
    = 15 hours. Local training saves 8.2 hours per batch.
