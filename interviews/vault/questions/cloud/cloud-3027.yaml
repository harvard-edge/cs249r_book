title: 'H100 NVLink Bandwidth for Tensor Parallel Inference'
scenario: 'You are designing a tensor parallel inference system on an H100 node and need to estimate the all-reduce communication overhead.'
question: 'For H100 tensor parallel inference, what NVLink bandwidth should you use when estimating all-reduce communication overhead?'
details:
  realistic_solution: 'H100 uses NVLink 4.0 at 900 GB/s total bidirectional. Always use 900 GB/s for H100 NVLink calculations to accurately model the communication overhead.'
  common_mistake: |
    **The Pitfall:** Assuming models can be evenly split without considering communication overhead, or using the wrong NVLink bandwidth.
    **The Rationale:** Candidates often confuse A100 NVLink 3.0 bandwidth (600 GB/s) with H100 NVLink 4.0 bandwidth (900 GB/s), or forget that tensor parallelism introduces all-reduce overhead.
    **The Consequence:** This leads to inaccurate latency estimations and incorrect performance models for inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: NVIDIA H100 (NVLink 4.0).
       - Topology: 8-way tensor parallel.
       - Activation Size: 1GB.
    2. **Calculations:**
       - Bandwidth: NVLink 4.0 provides 900 GB/s bidirectional.
       - All-reduce data volume: 2 * (8 - 1) / 8 * 1GB = 1.75 GB.
       - Communication latency: 1.75 GB / 900 GB/s = 1.94 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound. The all-reduce overhead is 1.94 ms per layer using the correct 900 GB/s bandwidth.**
