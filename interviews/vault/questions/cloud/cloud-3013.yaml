title: 'Dataset Curation: Realize Data Versioning Infrastructure for Continuous LLM Training'
scenario: 'Realize the data versioning infrastructure for a continuous LLM training system on 256 H100s. New data arrives weekly (100M tokens per week). The system must support: reproducible training runs, rollback to previous data versions, A/B testing of dataset compositions, and audit trails for all data decisions.'
question: How would you design the data versioning system to support weekly data arrivals, reproducible runs, rollback, A/B mixes, and audit trails?
details:
  realistic_solution: |
    Use DVC (Data Version Control) or a custom manifest system. Store data in immutable content-addressed chunks (SHA256). Manifests are small (version-controlled), actual data in object storage. Rollback = switch manifest.
  common_mistake: |
    **The Pitfall:** Using git for large binary dataset files or failing to track data provenance.
    **The Rationale:** Candidates treat dataset versioning like code versioning, not accounting for TB-scale data and compute efficiency.
    **The Consequence:** Impractical storage requirements, slow rollbacks, and inability to track individual example provenance.
  napkin_math: |
    - Weekly ingestion: 100M tokens * 4B = 400MB/week.
    - After 1 year: 52 * 400MB = 20.8GB new data/year.
    - Total dataset: ~10TB. Content-addressed chunks: split data into 64MB chunks.
    - SHA256 per chunk: 10TB / 64MB = 156,250 chunks.
    - Manifest: 156,250 * 32B SHA256 = 5MB manifest file.
    - Storage: git history of 52 weekly manifests * 5MB = 260MB git history/year.
    - **Actual data: 10TB in S3 costs $235/month.**
