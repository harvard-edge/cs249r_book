title: 'Cost-Performance Diagnosis: LLM Training on Google TPU v5e'
scenario: Your team is training a large language model (LLM) on a cluster of Google TPU v5e chips. While initial cost estimates were based on high utilization, monthly cloud bills are significantly exceeding projections, and training epochs are taking longer than anticipated, directly impacting the Total Cost of Ownership (TCO). You've observed that the TPUs are often not saturated, even during active training phases. The data pipeline is designed to feed data efficiently, but profiling seems to indicate periods of starvation.
question: How would you diagnose TPU v5e underutilization and reduce LLM training TCO without sacrificing throughput?
details:
  realistic_solution: Use Google Cloud Monitoring and `ctpu top` to thoroughly investigate TPU core utilization, HBM usage, and network I/O. Employ `tf.data` profiling tools to pinpoint bottlenecks in data pre-processing, loading, and batching. Experiment with varying batch sizes, parallelism strategies, and data pre-fetching mechanisms. Evaluate if the workload justifies Reserved Instances for consistent savings.
  common_mistake: |
    **The Pitfall:** Focusing solely on the raw compute cost per hour of a TPU instance.
    **The Rationale:** Candidates often ignore utilization patterns, data pipeline efficiency, and associated costs like data transfer or storage.
    **The Consequence:** Underestimating the impact of I/O bottlenecks leads to significantly lower effective TFLOPS, longer training times, and massively inflated TCO.
  napkin_math: |
    1. **Effective TFLOPS Calculation:** If observed training throughput is 100 samples/second and each sample requires 0.5 TFLOPs BF16 operations, effective TFLOPS = 50. Compare to the theoretical 197 TFLOPS BF16 (25% utilization).
    2. **Data Starvation Impact:** Given a 1.6 TB/s HBM bandwidth, if the data pipeline delivers data at 0.8 TB/s, the TPU is only 50% saturated.
    3. **TCO Impact Calculation:** If a TPU v5e pod costs $100/hour and is idle 75% of the time, the effective cost per useful compute hour is $400. Over a 720-hour month, this wastes $216,000 in stranded compute. Fixing the pipeline to achieve 80% utilization reduces the true cost per compute hour to $125.
