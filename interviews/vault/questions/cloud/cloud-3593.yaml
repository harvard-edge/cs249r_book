title: 'Cost-Performance Diagnosis: LLM Training on Google TPU v5e'
scenario: Your team is training a large language model (LLM) on a cluster of Google TPU v5e chips. Monthly cloud bills are significantly exceeding projections, and training epochs are taking longer than anticipated. You've observed that the TPUs are often not saturated.
question: How would you diagnose TPU v5e underutilization and reduce LLM training TCO without sacrificing throughput?
details:
  realistic_solution: Use Google Cloud Monitoring and `ctpu top` to thoroughly investigate TPU core utilization, HBM usage, and network I/O. Employ `tf.data` profiling tools to pinpoint bottlenecks in data pre-processing, loading, and batching. Experiment with varying batch sizes, parallelism strategies, and data pre-fetching mechanisms. Evaluate if the workload justifies Reserved Instances for consistent savings.
  common_mistake: |
    **The Pitfall:** Focusing solely on the raw compute cost per hour of a TPU instance.
    **The Rationale:** Candidates often ignore utilization patterns, data pipeline efficiency, and associated costs like stranded compute.
    **The Consequence:** Underestimating the impact of I/O bottlenecks leads to significantly lower effective TFLOPS, longer training times, and massively inflated TCO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Observed throughput: 100 samples/sec at 0.5 TFLOPs/sample = 50 effective TFLOPS.
       - TPU v5e peak: 197 TFLOPS BF16.
       - TPU cost: $100/hour per pod.
    2. **Calculations:**
       - Utilization: 50 / 197 = 25% utilization.
       - Wasted compute cost: 75% of $100 = $75/hour wasted.
       - Over a 720-hour month, stranded compute = $54,000/month per pod.
    3. **Conclusion & Interpretation:**
       - **Result: Fixing the data pipeline I/O bottleneck recovers 75% of the stranded compute, massively reducing the effective TCO. The system is Data-I/O-Bound.**
