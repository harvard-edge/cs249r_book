title: The GPU Fragmentation Death Spiral
scenario: Your 1,000-GPU cluster shows 85% allocation but only 55% actual compute utilization. Investigation
  reveals that many jobs requested 8 GPUs but only use 4 at any given time (the other 4 idle during data
  loading or preprocessing). Meanwhile, a queue of 4-GPU jobs is growing because the scheduler cannot
  find 4 contiguous free GPUs — they are scattered as single idle GPUs across half-allocated nodes. Utilization
  is low, allocation is high, and everyone is waiting. Diagnose this 'fragmentation death spiral' and
  propose a multi-level fix.
question: "What is causing the GPU fragmentation death spiral, and what multi-level fixes would you apply?"
details:
  realistic_solution: 'This is resource fragmentation — the GPU equivalent of memory fragmentation. Three-level
    fix: (1) **Admission control with right-sizing**: monitor actual GPU utilization per job and provide
    feedback (''Your job used 4.2 of 8 GPUs on average — consider requesting 5''). Reject grossly over-provisioned
    requests. (2) **Compaction/defragmentation**: periodically migrate (checkpoint → reschedule) jobs
    to consolidate free GPUs onto whole nodes. This is expensive (~5-10 min per migration) but creates
    large contiguous blocks. (3) **Topology-aware packing**: modify the scheduler to prefer filling nodes
    completely before starting new ones (bin-packing). Use a scoring function: score = (GPUs_used_after
    / GPUs_total_on_node) — prefer nodes that would become full or near-full. This prevents the scattered
    allocation pattern from developing. Google''s Borg and Meta''s scheduling systems both implement these
    strategies.'
  common_mistake: Blaming users for over-requesting resources. While this is partially true, the real
    problem is systemic — the scheduler has no mechanism to detect, defragment, or prevent this pattern.
  napkin_math: '1,000 GPUs at 85% allocation = 850 allocated, 150 free. But 150 free GPUs are spread as
    1-2 per node across 100 nodes. A 4-GPU job needs 4 contiguous GPUs on one node — there are 0 such
    blocks available despite 150 free GPUs. After defragmentation: consolidate to 37 fully-free 4-GPU
    blocks (150/4 = 37). Queue clears. Fragmentation cost: 150 idle GPUs × $2/hr = $300/hr = $7,200/day
    = $2.6M/year wasted.'
