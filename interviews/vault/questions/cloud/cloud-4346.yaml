title: Calibration Fairness vs Accuracy Fairness Tradeoff
scenario: A recidivism prediction model is calibrated (predicted risk scores match
  observed recidivism rates) for both Black and White defendants separately. A journalist
  publishes that the model is unfair because its false positive rate (FPR) for Black
  defendants is 2× higher than for White defendants. The vendor responds that the
  model is calibrated and therefore fair. Explain the mathematical impossibility at
  the heart of this dispute and its implications for deployment.
question: Why can a calibrated recidivism model still have a 2× higher FPR for Black
  defendants, and what does that imply for deployment?
details:
  realistic_solution: 'This is the Chouldechova impossibility theorem in practice.
    When base rates differ (e.g., observed recidivism rate r_B ≠ r_W), you cannot
    simultaneously satisfy: (1) calibration (PPV equal across groups given same score),
    (2) equal FPR, and (3) equal FNR. Formally: FPR = ((1-PPV)/PPV) × TPR × r/(1-r). If calibration
    and equal FNR (and thus equal TPR) hold, but base rates differ, FPR must differ. The vendor is technically correct:
    calibration is a valid fairness criterion for scoring models. The journalist is
    also correct: equal FPR is a valid fairness criterion for classification decisions.
    Deployment implication: the organization must choose which fairness criterion
    aligns with the legal and ethical context. For bail decisions, COMPAS-style tools
    use calibration. For hiring, equal opportunity (equal TPR) is typically required
    by disparate impact law. There is no algorithm that resolves the impossibility
    — it requires a values judgment.'
  common_mistake: Assuming calibration and equal FPR are jointly achievable when base
    rates differ between groups. The Chouldechova impossibility theorem proves these
    fairness criteria are mutually exclusive when group base rates are unequal.
  napkin_math: 'Base rates: r_B = 0.51, r_W = 0.39 (COMPAS dataset). Calibrated model
    at threshold 0.5: PPV_B = PPV_W = 0.65. Assume equal TPR = 0.65. FPR_B = ((1-PPV)/PPV) × TPR × r_B/(1-r_B) = (0.35/0.65) × 0.65 × 0.51/0.49 = 0.35 × 0.51/0.49 = 0.364. FPR_W = 0.35 × 0.39/0.61 = 0.224. Ratio: 0.364/0.224 = 1.62× — even a perfectly calibrated model has 62% higher FPR for the higher-base-rate group. Equal FPR would require deliberately miscalibrating one group.'
