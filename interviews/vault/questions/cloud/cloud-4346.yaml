title: Calibration Fairness vs Accuracy Fairness Tradeoff
scenario: A recidivism prediction model is calibrated (predicted risk scores match observed recidivism rates) for both Black and White defendants separately. A journalist publishes that the model is unfair because its false positive rate (FPR) for Black defendants is 2× higher than for White defendants. The vendor responds that the model is calibrated and therefore fair.
question: Why can a calibrated recidivism model still have a 2× higher FPR for Black defendants, and what does that imply for deployment?
details:
  realistic_solution: 'This is the Chouldechova impossibility theorem in practice. When base rates differ (e.g., observed recidivism rate r_B ≠ r_W), you cannot simultaneously satisfy: (1) calibration (PPV equal across groups given same score), (2) equal FPR, and (3) equal FNR. Formally: FPR = ((1-PPV)/PPV) × TPR × r/(1-r). If calibration and equal FNR (and thus equal TPR) hold, but base rates differ, FPR must differ. The vendor is technically correct: calibration is a valid fairness criterion for scoring models. The journalist is also correct: equal FPR is a valid fairness criterion for classification decisions. Deployment implication: the organization must choose which fairness criterion aligns with the legal and ethical context. For bail decisions, COMPAS-style tools use calibration. For hiring, equal opportunity (equal TPR) is typically required by disparate impact law. There is no algorithm that resolves the impossibility — it requires a values judgment.'
  common_mistake: |
    **The Pitfall:** Assuming calibration and equal FPR are jointly achievable when base rates differ between groups.
    **The Rationale:** It feels intuitive that a "fair" model should have equal error rates across all metrics simultaneously.
    **The Consequence:** Endless loops of model retraining trying to satisfy mutually exclusive fairness constraints, delaying deployment and confusing stakeholders.
  napkin_math: |
    - **Base Rates:** Black (r_B) = 0.51, White (r_W) = 0.39.
    - **Calibrated PPV & Equal TPR:** Assume threshold 0.5 gives PPV_B = PPV_W = 0.65, and equal TPR = 0.65.
    - **FPR Formula:** FPR = ((1-PPV)/PPV) * TPR * r/(1-r).
    - **FPR for Black Defendants:** (0.35/0.65) * 0.65 * (0.51/0.49) = 0.35 * 1.04 = **0.364**.
    - **FPR for White Defendants:** (0.35/0.65) * 0.65 * (0.39/0.61) = 0.35 * 0.64 = **0.224**.
    - **Ratio:** 0.364 / 0.224 = **1.62x higher FPR**.
    - **Conclusion:** A perfectly calibrated model with equal TPR inherently yields a ~62% higher FPR for the group with the higher base rate.
