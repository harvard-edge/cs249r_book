title: HBM3 vs HBM2e for LLM Serving Infrastructure
scenario: You are architecting the serving tier for a 70B parameter LLM (FP16). You must evaluate two cluster node configurations with identical total memory capacity: Node A with 8x GPUs (40GB memory, 2.0 TB/s per GPU) and Node B with 4x GPUs (80GB memory, 3.35 TB/s per GPU).
question: How do the two nodes trade off TTFT, decode throughput, and synchronization for low-latency 70B serving?
details:
  realistic_solution: Node A provides higher aggregate memory bandwidth (16.0 TB/s vs 13.4 TB/s), yielding faster per-token generation (8.75ms vs 10.4ms). However, Node B has lower synchronization overhead due to 4-way tensor parallelism versus 8-way, and each GPU's larger per-GPU memory (80GB) eases KV-cache management. The optimal choice depends on whether per-token latency or synchronization overhead dominates the serving workload.
  common_mistake: |
    **The Pitfall:** Assuming both configurations perform identically because they have the same total HBM capacity.
    **The Rationale:** Candidates fail to calculate aggregate memory bandwidth and ignore the communication overhead differences between 4-way and 8-way tensor parallelism.
    **The Consequence:** Selecting a sub-optimal architecture that either bottlenecks on memory bandwidth or suffers from excessive multi-GPU communication latency.
  napkin_math: |
    * 70B model in FP16 = 140 GB.
    * Node A aggregate BW: 8 * 2.0 TB/s = 16.0 TB/s.
    * Node B aggregate BW: 4 * 3.35 TB/s = 13.4 TB/s.
    * Node A Decode Read Time: 140 GB / 16.0 TB/s = **8.75 ms/token**.
    * Node B Decode Read Time: 140 GB / 13.4 TB/s = **10.4 ms/token**.
    * **Result:** Node A provides higher pure memory bandwidth (faster token generation), but Node B requires fewer All-Reduce operations (4-way vs 8-way TP), reducing synchronization overhead.
