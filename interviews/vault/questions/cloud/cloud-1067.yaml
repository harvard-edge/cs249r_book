title: Evaluating Local vs Managed Data Anonymization Layers at Scale
scenario: 'You are designing an inference pipeline for a clinical LLM (Llama-3-70B) running on an 8x H100
  node ($80/hr) serving 100 requests per second (avg 2,048 input tokens). Compliance requires a Data Anonymization
  Layer (DAL) to redact PII before the prompt hits the LLM. You must evaluate two options: A managed cloud
  DLP API (P99 latency: 200ms, rate limit: 50 RPS, cost: $0.001/request) or deploying a local BERT-Large
  NER model (340M params) on dedicated L4 GPUs ($0.75/hr per GPU, throughput 60 RPS/GPU for 2k tokens,
  15ms latency). Evaluate the trade-offs in end-to-end latency, system utilization, and cost, and justify
  the optimal architecture.'
details:
  realistic_solution: Deploy the local BERT-Large NER model on 2x L4 GPUs. This satisfies the 100 RPS
    requirement (2 * 60 = 120 RPS capacity), reduces PII redaction latency from 200ms to 15ms, ensures
    the 8x H100 node is fully utilized, and drastically reduces OPEX.
  common_mistake: Choosing the managed DLP API to minimize operational overhead, failing to realize it
    severely bottlenecks the expensive H100 cluster (capping it at 50% utilization) and incurs massive
    API costs at 100 RPS.
  napkin_math: 'Managed API OPEX: 100 req/s * 3600s/hr * $0.001 = $360/hr. Plus, API caps at 50 RPS, wasting
    50% of the $80/hr H100 node ($40/hr waste). Local 2x L4 OPEX: 2 * $0.75 = $1.50/hr. Savings: $358.50/hr
    ($258k/month) + $40/hr recovered utilization. TTFT improves by 185ms.'
