title: Evaluating Local vs Managed Data Anonymization Layers at Scale
scenario: You are designing an inference pipeline for a clinical LLM (Llama-3-70B) running on an 8x H100 node ($80/hr) serving 100 requests per second (avg 2,048 input tokens). Compliance requires a Data Anonymization Layer (DAL) to redact PII before the prompt hits the LLM. You must evaluate two options: A managed cloud DLP API (P99 latency: 200ms, rate limit: 50 RPS, cost: $0.001/request) or deploying a local BERT-Large NER model (340M params) on dedicated L4 GPUs ($0.75/hr per GPU, throughput 60 RPS/GPU for 2k tokens, 15ms latency).
question: Should you use the managed DLP API or local BERT-Large DAL for 100 RPS, and what are the latency, utilization, and cost impacts?
details:
  realistic_solution: Deploy the local BERT-Large NER model on 2x L4 GPUs. This satisfies the 100 RPS requirement (2 * 60 = 120 RPS capacity), reduces PII redaction latency from 200ms to 15ms, ensures the 8x H100 node is fully utilized, and drastically reduces OPEX.
  common_mistake: |
    **The Pitfall:** Choosing the managed DLP API to minimize operational overhead.
    **The Rationale:** Architects default to managed services to avoid the complexity of hosting and scaling a secondary model.
    **The Consequence:** Severely bottlenecking the expensive H100 cluster (capping it at 50% utilization) and incurring massive API costs.
  napkin_math: |
    * Managed API OPEX: 100 req/s × 3600 s/hr × $0.001 = $360/hr.
    * H100 waste: API caps at 50 RPS, wasting 50% of the $80/hr H100 node ($40/hr).
    * Local 2x L4 OPEX: 2 GPUs × $0.75/hr = $1.50/hr.
    * Savings: $360 - $1.50 = $358.50/hr.
    * TTFT improvement: 200ms - 15ms = 185ms.
    * **Conclusion: The local L4 cluster saves $358.50/hr and recovers $40/hr of wasted H100 utilization while slashing latency.**
