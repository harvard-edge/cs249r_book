title: Cloud Vector Operations L2 0
scenario: A junior engineer asks why GPUs are so much faster than CPUs for neural network inference despite
  having lower clock speeds. Explain the role of vector (SIMD) operations in ML workloads.
question: "Why are GPUs faster than CPUs for neural network inference despite lower clock speeds, and what role do SIMD vector operations play?"
details:
  realistic_solution: Vector operations apply a single instruction to multiple data elements simultaneously
    (SIMD — Single Instruction, Multiple Data). A CPU processes one addition at a time (scalar), while
    a GPU tensor core processes a 4×4 matrix multiply (256 multiply-adds) in one cycle. Neural networks
    are dominated by matrix multiplications and element-wise operations on large tensors — perfectly suited
    for SIMD. A GPU has thousands of simple cores, each executing vector operations in lockstep, achieving
    massive data parallelism. The lower clock speed is compensated by orders of magnitude more parallel
    operations per cycle.
  common_mistake: Confusing clock speed with throughput. A 1.8 GHz GPU vastly outperforms a 5 GHz CPU
    for ML because throughput = operations per cycle × cores × clock speed, and GPUs have thousands more
    parallel units.
  napkin_math: 'CPU (AVX-512): 512-bit SIMD = 16 FP32 ops per cycle × 3 GHz = 48 GFLOPS. H100 GPU: 16896
    CUDA cores × 2 ops × 1.83 GHz = 61.8 TFLOPS. GPU is ~1300x more throughput through massive vector
    parallelism.'
