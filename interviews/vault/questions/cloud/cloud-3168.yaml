title: Designing Medusa Heads for Self-Speculation
scenario: Instead of a separate draft model, Medusa adds K lightweight prediction heads to the target 70B model's last hidden layer. Each head i predicts token at position t+i. You need to deploy this on 4x H100 with tensor parallelism. The hidden_dim of the target is 8192.
question: How would you design the Medusa heads for a 70B target with hidden_dim=8192 on 4x H100, and what is their overhead?
details:
  realistic_solution: 'Target last hidden dim: 8192. Vocab size: 128K. Each Medusa head: single linear layer 8192 -> 128K = 1.05B parameters x 2B = 2.1GB per head. 5 heads = 10.5GB total across 4 GPUs = 2.6GB/GPU. Forward cost per head: 2 x 8192 x 128K = 2.1 GFLOP at batch=1 = 2.1us on H100 (negligible). All 5 heads run in parallel (independent). Total Medusa overhead: 2.1us + kernel launch = ~10us vs 25ms target decode = 0.04% overhead. Training: freeze target model, train heads on same dataset for 1-2 epochs. Loss: cross-entropy for each head with position-specific target. Head accuracy degrades with distance: head 1 alpha~0.85, head 5 alpha~0.55. Expected tokens: 1+0.85+0.72+0.61+0.52+0.29 = 3.99 per round. Effective speedup: 3.99/1.0004 = 3.99x at batch=1.'
  common_mistake: |
    **The Pitfall:** Making Medusa heads too large by matching the target model's full FFN dimensions.
    **The Rationale:** Engineers intuitively mirror the base model's architectural complexity for the prediction heads to maintain accuracy.
    **The Consequence:** Eliminating the latency advantage entirely, as the complex heads take as long to execute as a full transformer layer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hidden dim: 8192. Vocab size: 128K.
       - 5 Medusa heads.
    2. **Calculations:**
       - Head params: 8192 * 128K = 1.05B parameters = 2.1 GB per head.
       - 5 heads total size: 10.5 GB (spread across 4 GPUs).
       - Forward FLOPs per head: 2 * 8192 * 128K = 2.1 GFLOP.
       - Expected tokens per round: 1 + 0.85 + 0.72 + 0.61 + 0.52 + 0.29 = 3.99 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: ~4x Speedup. Medusa achieves ~4x speedup at batch=1 with negligible compute overhead.**
