title: Optimizing Inference Latency on AMD MI300X with Queueing Theory
scenario: You are designing a real-time inference serving system for a large language
  model (LLM) using an AMD MI300X accelerator. This specific MI300X unit boasts 192
  GB HBM3, 1,307 TFLOPS FP16 sparse computation, and 5.3 TB/s memory bandwidth. Your
  service must maintain a p99 inference latency of under 50ms. Incoming requests exhibit
  a Poisson arrival process. Each inference request on the MI300X takes, on average,
  25ms to complete (service time). Due to varying model sizes and input complexities,
  the service time has a certain variance. How would you apply queueing theory, specifically
  Little's Law and M/M/1 or M/G/1 concepts, to determine the maximum sustainable arrival
  rate, design an appropriate queue depth, and ensure your capacity planning meets
  the latency requirements, considering the MI300X's immense but finite processing
  capability and memory bandwidth?
question: How would you use Little’s Law and M/G/1 queueing to set arrival-rate limits
  and queue depth for 25 ms MI300X inference under a 50 ms p99 SLA?
details:
  realistic_solution: Model the inference system as an M/G/1 queue (Poisson arrivals,
    General service time distribution, 1 server - the MI300X). Use Little's Law (L
    = λW) to relate average number of requests in the system (L), arrival rate (λ),
    and average time in system (W). To meet p99 latency, calculate the required mean
    service time and queueing delay. Incorporate system monitoring to track actual
    arrival rates, service times, and queue lengths. Implement adaptive batching and
    dynamic load balancing. For capacity planning, use the Pollaczek-Khinchine formula
    for M/G/1 to estimate average queue length and waiting times, and simulate the
    system under various load conditions to validate p99 latency guarantees, adjusting
    the number of MI300X units or request throttling mechanisms as needed. Consideration
    of the MI300X's HBM3 bandwidth (5.3 TB/s) is crucial for data loading phases,
    which contribute to service time variance.
  common_mistake: Ignoring the variance in service times, assuming a deterministic
    service rate, or not accounting for the overhead of queuing itself, leading to
    underestimated latency at higher utilization or insufficient queue sizing. Another
    mistake is over-optimizing for mean latency while neglecting tail latencies (e.g.,
    p99).
  napkin_math: If average service time (Ts) is 25ms, and we aim for a p99 latency
    (W) of 50ms, then the average time a request can spend waiting in the queue (Wq)
    is W - Ts = 25ms. For a simplified M/M/1 queue (assuming exponential service times),
    utilization (ρ) = λ * Ts. To achieve low latency, ρ must be significantly less
    than 1. If we target Wq = 25ms, then Wq = Ts * (ρ / (1-ρ)) => 25 = 25 * (ρ / (1-ρ))
    => 1 = ρ / (1-ρ) => 1 - ρ = ρ => 2ρ = 1 => ρ = 0.5. This implies a maximum arrival
    rate (λ) of 0.5 / 25ms = 20 requests/second per MI300X. The P-K formula for M/G/1
    would refine this with service time variance (σ^2) as Wq = ρ^2 * (1 + (σ/Ts)^2)
    / (2 * λ * (1-ρ)). The MI300X's 1,307 TFLOPS FP16 sparse and 5.3 TB/s bandwidth
    determine the service time distribution.
