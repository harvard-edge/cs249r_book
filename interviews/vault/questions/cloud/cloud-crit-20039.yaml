title: Speculative Decoding KV Cache Management
scenario: 'During speculative decoding with K=5 draft tokens, the target model verifies by running a forward
  pass on all 5 tokens. If tokens 1-3 are accepted but token 4 is rejected, explain the KV cache management:
  which KV entries are kept, which are discarded, and how the corrected token''s KV is handled.'
details:
  realistic_solution: 'Before verification: target KV cache has entries for tokens 1..t (previous context).
    Verification forward pass processes draft tokens d1..d5 in one pass, generating KV entries for positions
    t+1..t+5 in the target model. Result: d1, d2, d3 accepted, d4 rejected. KV cache actions: (1) Keep
    target KV entries for positions t+1, t+2, t+3 (corresponding to accepted d1, d2, d3). (2) Discard
    target KV entries for positions t+4, t+5 (rejected tokens). (3) The correction token c4 (sampled from
    adjusted distribution at position t+4) was already computed during verification — its KV entry is
    at position t+4 in the verification output. Keep it. (4) Final KV cache: t+1..t+4 valid, with t+4
    being the corrected token. With PagedAttention, this means freeing blocks for positions t+5 if they
    were allocated. Total KV mutation: truncate at t+4, which is O(1) pointer update in PagedAttention''s
    block table.'
  common_mistake: Keeping the draft model's KV cache entries for accepted tokens. The target model must
    use its own KV cache entries from the verification pass, not the draft's, because the internal representations
    differ.
  napkin_math: 'KV entries: keep t+1 to t+3 (accepted) + t+4 (corrected). Discard: t+5. With block_size=16:
    if all in same block, just update valid_length from 5 to 4. Cost: ~0us.'
