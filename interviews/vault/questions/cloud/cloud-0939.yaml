title: Evaluating IO-Aware Attention Tiling on A100 Caches
scenario: Your team is deploying a custom LLM on NVIDIA A100 GPUs (40MB L2 cache, 192KB Shared Memory/L1
  per SM). You are designing an IO-aware fused attention kernel for 8K sequence lengths. Engineer A proposes
  sizing the Q, K, and V matrix tiles to fit optimally within the shared 40MB L2 cache to minimize expensive
  HBM reads. Engineer B argues for sizing the tiles strictly to fit within the 192KB Shared Memory of
  a single SM, accepting that blocks must be streamed from HBM directly to SRAM more frequently. Evaluate
  both approaches. Which tiling strategy provides better utilization of the Tensor Cores, and why?
question: "Which tiling strategy provides better utilization of the Tensor Cores, and why?"
details:
  realistic_solution: Engineer B is correct. Tiling must target the 192KB Shared Memory (SRAM) per SM.
    While L2 is larger (40MB), its bandwidth (~4.1 TB/s) is shared across all 108 SMs. Shared Memory provides
    ~19 TB/s aggregate bandwidth, enough to sustain the 312 TFLOPS FP16 peak. By keeping attention tiles
    entirely in SRAM, the kernel achieves the roofline-predicted compute throughput.
  common_mistake: Focusing solely on minimizing HBM reads by maximizing L2 hit rates, failing to realize
    that L2 bandwidth is shared across all SMs and is insufficient to saturate the compute units even
    when hit rates are perfect.
  napkin_math: 'A100 FP16 Peak: 312 TFLOPs. Aggregate SRAM Bandwidth: ~19 TB/s. L2 Bandwidth: ~4.1 TB/s.
    HBM Bandwidth: ~2.0 TB/s. If data is tiled for L2, max throughput is limited by L2 bandwidth. At a
    typical 50 FLOPs/Byte for attention, L2 can only sustain 4.1 TB/s * 50 = 205 TFLOPs (theoretical maximum
    before overheads), meaning the compute units are starved. SRAM provides ~19 TB/s, which can easily
    sustain the 312 TFLOPs peak.'
