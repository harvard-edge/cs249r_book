title: GradScaler Synchronization as a Hidden Overlap Barrier
scenario: Your DDP training with mixed-precision (FP16) and GradScaler runs 20% slower than expected despite good overlap. Profiling shows a synchronization point between the backward pass and optimizer step where all GPUs wait. This sync does not appear in FP32 training.
question: "What causes it?"
details:
  realistic_solution: 'GradScaler workflow: (1) After backward: unscale_() divides all gradients by the loss scale. (2) Check for inf/nan in any gradient on any GPU — this requires an AllReduce of a single float (found_inf). (3) If any GPU has inf/nan, skip the optimizer step and reduce the scale. (4) This AllReduce is BLOCKING because the optimizer step cannot proceed until all GPUs agree on whether to skip. Fix: (a) Use BF16 instead of FP16 to eliminate GradScaler entirely (BF16 has FP32''s range, no overflow). (b) If FP16 is required, batch the inf check with the gradient norm AllReduce — one AllReduce instead of two. (c) Use NVIDIA Transformer Engine''s FP8 which has built-in scale management without per-step AllReduce.'
  common_mistake: |
    **The Pitfall:** Not realizing that `GradScaler.step()` enforces an all-GPU synchronization barrier.
    **The Rationale:** Developers treat FP16 mixed precision as a "free" speedup, ignoring the hidden collective communications required to safely manage scale factors.
    **The Consequence:** Unexplained 20% latency overheads per step as fast GPUs idle waiting for stragglers to confirm they didn't encounter NaNs.
  napkin_math: |
    - GradScaler inf/nan check requires an AllReduce of a tiny boolean flag (takes ~0.05ms).
    - However, it acts as a blocking synchronization barrier.
    - If GPUs finish the backward pass at different times (straggler effect), the barrier forces everyone to wait.
    - **A 5ms straggler delay on a 25ms compute step creates a pure 20% synchronization overhead.**
