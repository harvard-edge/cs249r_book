title: The DAG Critical Path Optimization
scenario: 'Your compound AI system executes a DAG with 6 nodes: (A) query embedding → (B) vector search
  and (C) BM25 search in parallel → (D) result fusion → (E) reranker → (F) LLM generation. Measured latencies:
  A=15ms, B=8ms, C=12ms, D=5ms, E=45ms, F=2000ms. Your SLA is 2.5 seconds. A team member proposes optimizing
  the reranker (E) from 45ms to 15ms by distilling the model. Another proposes optimizing LLM TTFT (part
  of F) by 200ms through prompt compression. Which investment has higher ROI?'
details:
  realistic_solution: 'Critical path: A → B → D → E → F (B is longer parallel branch at 8ms, but C at
    12ms is on the other branch — wait for max(B,C)=12ms). Critical path latency: 15 + 12 + 5 + 45 + 2000
    = 2077ms. With reranker optimization: 15 + 12 + 5 + 15 + 2000 = 2047ms (30ms saved). With LLM TTFT
    optimization: 15 + 12 + 5 + 45 + 1800 = 1877ms (200ms saved). The LLM optimization saves 6.7× more
    latency. But the deeper insight: at 2077ms current, you''re well within 2.5s SLA. Neither optimization
    is needed for SLA compliance. The reranker team''s effort would be better spent on improving retrieval
    quality (higher recall) rather than speed. The LLM optimization gives meaningful headroom for adding
    future pipeline stages (guardrails, fact-checking) without SLA violation.'
  common_mistake: Optimizing the largest absolute latency component without analyzing the critical path.
    The reranker optimization 'saves 30ms' but is on the critical path that's dominated by F.
  napkin_math: 'Critical path = A(15) + max(B(8), C(12)) + D(5) + E(45) + F(2000) = 2077ms. Reranker opt:
    2077 - 30 = 2047ms. LLM opt: 2077 - 200 = 1877ms. SLA headroom: 2500 - 2077 = 423ms current, 623ms
    with LLM opt. ROI: LLM opt yields 200ms / engineering-month vs reranker 30ms / engineering-month.'
