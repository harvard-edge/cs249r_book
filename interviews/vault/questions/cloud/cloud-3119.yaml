title: Design 1F1B Pipeline Schedule for LLM Training on H100 Cluster
scenario: You are designing a 1F1B (one-forward-one-backward) pipeline schedule for training a 175B GPT model across 16 H100 GPUs with pipeline parallelism degree p=16. Each forward pass per micro-batch takes 8ms per stage; backward takes 16ms. Global batch = 2048, micro-batch size = 128, giving m=16 micro-batches.
question: What 1F1B schedule would you use, and what are its steady-state throughput and bubble ratio versus GPipe?
details:
  realistic_solution: '1F1B bubble ratio: same (p-1)/(m+p-1) = 15/31 = 48.4% as GPipe with same m and p. But memory advantage: GPipe holds all m micro-batch activations simultaneously at the first stage → m activations. 1F1B holds up to p activations max. Memory reduction: m/p× vs GPipe. Here m=16, p=16, so memory is equal; but if m was much larger, 1F1B saves memory. Throughput: steady-state = m/(m+p-1) per pipeline cycle. With m=16, p=16: 16/31 = 51.6% efficiency. Each pipeline cycle step takes F+B = 24ms. Tokens/s: 2048×2048 / (24ms × 31 cycles) = 4,194,304 / 744ms = 5.64M tokens/s.'
  common_mistake: |
    **The Pitfall:** Applying the GPipe bubble formula to 1F1B while assuming it holds the same memory overhead.
    **The Rationale:** 1F1B has the same bubble ratio formula but limits in-flight micro-batches to `p` (not `m`).
    **The Consequence:** Failing to realize that 1F1B reduces peak activation memory from O(m) to O(p), which is its primary advantage over GPipe.
  napkin_math: |
    * Pipeline stages (p) = 16, Micro-batches (m) = 16.
    * Bubble ratio: (p-1) / (m+p-1) = (16-1) / (16+16-1) = 15 / 31 ≈ 48.4%.
    * Steady-state efficiency: 1 - 0.484 = 51.6%.
    * Cycle time: Forward (8 ms) + Backward (16 ms) = 24 ms.
    * Total pipeline time: 31 cycles × 24 ms = 744 ms per global batch.
    * Throughput: 2048 samples × 2048 tokens / 744 ms ≈ 5.64M tokens/s.
    * **At 16 GPUs, this yields ~352K tokens/s per GPU with identical bubble ratio to GPipe but strictly bounded memory.**
