title: The ANN Recall-Latency Tradeoff
scenario: Your vector search returns results in 2ms with recall@10 of 0.85. The product
  team wants recall@10 above 0.95. You increase the HNSW ef_search parameter from
  64 to 256. Latency jumps to 12ms. Why does improving recall have such a steep latency
  cost, and what is the fundamental tradeoff?
question: Why does improving recall have such a steep latency cost, and what is the
  fundamental tradeoff?
details:
  realistic_solution: 'HNSW search works by greedily traversing the proximity graph.
    ef_search controls how many candidate nodes the algorithm evaluates before returning
    results. Increasing ef_search from 64 to 256 means 4× more graph hops, each requiring
    a random memory read of a 1536-dim FP32 vector (6 KB). At ~100ns per cache-miss
    DRAM access, 256 hops × 6 KB per hop strains memory bandwidth. The fundamental
    tradeoff: exact search (recall=1.0) requires brute-force O(N) comparison — at
    50M vectors that''s seconds, not milliseconds. ANN trades recall for speed by
    searching a subgraph. The Pareto frontier is: recall × 1/latency. Product quantization
    (PQ) or dimensionality reduction can shift this frontier.'
  common_mistake: Assuming recall improvement is cheap — 'just search more neighbors.'
    In reality, HNSW recall depends on the number of nodes visited during search,
    which scales roughly linearly with ef_search, and each hop incurs random memory
    access latency.
  napkin_math: 'ef_search=64: requires ~64 vector comparisons. Compute = 64 * 1536
    dims * 2 FLOPs = 196K FLOPs. Memory reads = 64 random 6KB reads. ef_search=256:
    ~256 comparisons = 786K FLOPs + 256 random reads. The 4x increase in random memory
    access dominates the latency jump to 12ms, as RAM latency outweighs the trivial
    FLOPs.'
