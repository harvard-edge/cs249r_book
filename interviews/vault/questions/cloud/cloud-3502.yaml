title: Optimizing Multi-Model RAG Latency on NVIDIA A100
scenario: 'Your team is tasked with deploying a real-time conversational AI system. The core architecture uses a multi-model RAG pipeline: an embedding model for semantic search followed by a large language model (LLM) for response generation. The critical business requirement is an end-to-end user-perceived latency of under 500ms. The deployment target is a cluster of NVIDIA A100 GPUs (80 GB HBM2e, 312 TFLOPS FP16 compute, 2.0 TB/s memory bandwidth). Given the need to orchestrate routing between these models, manage concurrent user requests, and minimize inter-model communication overhead, how would you architect the deployment on these A100s to concretely meet the latency and throughput requirements?'
question: How would you architect the A100 RAG deployment to keep end-to-end latency under 500 ms while routing, batching, and minimizing inter-model transfer overhead?
details:
  realistic_solution: 'A realistic solution involves co-locating both the embedding and LLM on the same NVIDIA A100 GPU(s) where memory allows. Utilize an efficient inference serving framework like NVIDIA Triton Inference Server, which supports model chaining and dynamic batching. Optimize data transfer by passing intermediate tensors directly between models on the GPU (GPU-to-GPU memory transfer) to exploit the 2.0 TB/s HBM2e bandwidth. Implement aggressive FP16 precision for all possible operations to leverage the 312 TFLOPS compute. Tailor dynamic batching strategies: smaller batch sizes for the LLM to minimize first-token latency, and potentially larger batches for the embedding model to maximize throughput. Use model parallelism (e.g., tensor parallelism) if the LLM exceeds a single A100''s 80 GB HBM2e capacity, ensuring efficient inter-GPU communication.'
  common_mistake: A common mistake is treating each model as a separate, independently deployed service (e.g., using separate Docker containers/pods for each model) without optimizing for local data transfer. This often leads to unnecessary CPU-GPU memory transfers, serialization/deserialization overheads between services, and suboptimal batching strategies across the entire pipeline, failing to fully leverage the A100's high memory bandwidth and FP16 capabilities for the chained inference.
  napkin_math: 'If an embedding model processes a query in 20ms and an LLM generates 50 tokens at 15ms/token, the LLM takes 750ms. Total naive latency is 770ms, failing the 500ms SLA. To meet 500ms, the LLM must generate 50 tokens in <480ms (9.6ms/token max). For an A100, transferring a 1GB intermediate tensor takes ~0.5ms (1GB / 2.0TB/s). If a 70B parameter model is used, it requires ~140GB in FP16, necessitating at least two A100 80GB GPUs. Tensor parallelism across 2 GPUs incurs communication overhead per layer, requiring careful partitioning (e.g., maximizing computation-communication overlap) to stay within the strict 9.6ms/token decode budget.'
