title: Optimizing Multi-Model RAG Latency on NVIDIA A100
scenario: 'Your team is deploying a real-time conversational AI system using a multi-model RAG pipeline: an embedding model for semantic search followed by an LLM for response generation. The critical requirement is end-to-end latency under 500ms on a cluster of NVIDIA A100 GPUs.'
question: How would you architect the A100 RAG deployment to keep end-to-end latency under 500 ms while routing, batching, and minimizing inter-model transfer overhead?
details:
  realistic_solution: 'A realistic solution involves co-locating both the embedding and LLM on the same NVIDIA A100 GPU(s) where memory allows. Utilize an efficient inference serving framework like NVIDIA Triton Inference Server, which supports model chaining and dynamic batching. Optimize data transfer by passing intermediate tensors directly between models on the GPU (GPU-to-GPU memory transfer) to exploit the 2.0 TB/s HBM2e bandwidth. Implement aggressive FP16 precision for all possible operations to leverage the 312 TFLOPS compute. Tailor dynamic batching strategies: smaller batch sizes for the LLM to minimize first-token latency, and potentially larger batches for the embedding model to maximize throughput. Use model parallelism (e.g., tensor parallelism) if the LLM exceeds a single A100''s 80 GB HBM2e capacity, ensuring efficient inter-GPU communication.'
  common_mistake: |
    **The Pitfall:** Treating each model as a separate, independently deployed service over the network.
    **The Rationale:** Microservice isolation introduces unnecessary CPU-GPU memory transfers and serialization/deserialization overheads between the embedding and LLM models.
    **The Consequence:** High inter-model communication latency causes the pipeline to easily breach the strict 500ms SLA.
  napkin_math: |
    - **Naive Latency**: Embedding (20ms) + LLM (50 tokens * 15ms = 750ms) = 770ms (Fails SLA).
    - **Target Decode Budget**: To meet 500ms, LLM must generate 50 tokens in `< 480ms`, meaning max `9.6ms/token`.
    - **Transfer Overhead**: Transferring a 1GB intermediate tensor via HBM takes `~0.5ms` (`1GB / 2.0TB/s`), but network transfer takes tens of milliseconds.
    - **Final Result**: Co-locating models and leveraging **GPU-to-GPU memory transfer** is strictly required to stay within the **9.6ms/token** decode budget.
