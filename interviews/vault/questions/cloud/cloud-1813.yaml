title: Diagnosing Image Decompression Bombs
scenario: A cloud-based image classification service runs on NVIDIA T4 GPUs (16GB VRAM) and accepts image
  uploads with a strict 5MB payload size limit at the API gateway. The service suddenly experiences severe
  latency spikes and frequent GPU Out-Of-Memory (OOM) crashes. Monitoring reveals that while all failing
  requests are under the 5MB limit, the memory footprint of the data preprocessing pipeline spikes to
  over 14GB per request before crashing.
question: "Why can requests under the 5MB limit cause 14GB preprocessing spikes, and what validation should be added before decoding?"
details:
  realistic_solution: Implement a lightweight metadata parser to read the image header and validate spatial
    dimensions (width and height) before fully decoding the image into memory.
  common_mistake: Relying solely on HTTP payload size limits for validation, assuming a small file size
    guarantees a correspondingly small decoded tensor footprint.
  napkin_math: A highly compressed 'bomb' PNG could be 2MB on disk but represent a 30,000 x 30,000 image.
    When decoded into a 3-channel FP32 tensor, it requires 30,000 * 30,000 * 3 * 4 bytes = 10.8 GB of
    memory. A standard 1080p image only takes 1920 * 1080 * 3 * 4 bytes = 24.8 MB.
