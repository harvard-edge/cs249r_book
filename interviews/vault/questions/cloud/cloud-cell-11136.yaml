title: 'KV-Cache: Evaluate KV Cache Quantization Tradeoffs on H100'
scenario: 'For a 13B LLM on H100 (80GB HBM3, 3.35 TB/s) serving 50 concurrent users with max 4096-token
  sequences, compare three KV cache strategies: (A) FP16, (B) INT8, (C) INT4. Evaluate HBM usage, decode
  throughput, and quality impact.'
details:
  realistic_solution: 'KV quantization reduces memory and bandwidth, enabling more concurrent requests.
    Quality impact: INT8 typically < 0.5% perplexity increase, INT4 < 2%. Scale factors add overhead:
    1 scale per group of 128 values.'
  common_mistake: Assuming INT4 KV cache has 4× less memory than FP16 without accounting for quantization
    overhead (scale factors). Not measuring the actual quality impact of quantized KV.
  napkin_math: '13B model: 40 layers, GQA 8 KV heads, head_dim=128. KV per token per layer: 2 × 8 × 128
    × {2B, 1B, 0.5B} = {4096B, 2048B, 1024B}. 40 layers: {160KB, 80KB, 40KB} per token. 50 users × 4096
    tokens = 204,800 token slots. (A) FP16: 204,800 × 160KB = 32.77GB. 13B weights: 26GB. Total: 58.77GB
    > 80GB? Wait: 26GB weights + 32.77GB KV = 58.77GB < 80GB. Fits! But barely. (B) INT8: 16.38GB KV +
    26GB = 42.38GB. Saves 16.4GB → allows 16.4GB/80KB per token = 205K more tokens = 50 more users. (C)
    INT4: 8.19GB KV + 26GB = 34.19GB. Decode bandwidth: KV read per step = 50 users × attended_tokens
    × 160/80/40KB per token. At seq=2048 avg: 50 × 2048 × {160KB, 80KB, 40KB}/40layers × 40/3.35TB/s =
    {0.98, 0.49, 0.245ms}. INT4 decode 4× faster than FP16. Throughput: 50 users × 1/(0.98ms) → vs 1/(0.245ms).
    Quality: INT8 acceptable (< 0.5% perplexity), INT4 needs evaluation.'
