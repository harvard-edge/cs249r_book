title: JSON to Tensor Parsing Bottleneck
scenario: You are optimizing a cloud inference service for a Vision Transformer (ViT) on an NVIDIA A10G.
  Clients submit inference requests via a REST API, sending batches of 32 images (3x224x224) as flat JSON
  arrays of floats. The Python backend parses this JSON, transposes it from NHWC to NCHW layout, and copies
  it to the GPU. The model's GPU execution time is only 8ms per batch, but end-to-end latency exceeds
  200ms. Assuming a CPU JSON parsing speed of 250 MB/s and an average of 10 bytes per float string in
  the JSON payload, calculate the network payload transformation overhead and propose an architectural
  fix.
details:
  realistic_solution: Switch the transport layer from REST/JSON to gRPC with binary Protobufs (or Triton's
    binary data extension) to eliminate character parsing. Additionally, send raw NHWC byte arrays and
    offload the NHWC->NCHW transposition and float conversion to a fused GPU kernel.
  common_mistake: Candidates often suggest optimizing the ViT model with quantization, TensorRT, or kernel
    fusion, entirely missing that the CPU string-to-float parsing and layout transposition is the dominant
    latency bottleneck.
  napkin_math: 'Elements per batch: 32 imgs * 3 * 224 × 224 = 4,816,896 floats. JSON payload size: 4.81M
    * 10 bytes ≈ 48.1 MB. JSON parsing time at 250 MB/s = 48.1 MB / 250 MB/s = 0.192 seconds (192 ms).
    The CPU string-to-float transformation alone (192ms) takes 24x longer than the actual GPU inference
    (8ms).'
