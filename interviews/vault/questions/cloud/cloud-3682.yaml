title: DCQCN Tuning for Large-Scale All-Reduce
scenario: 'You are configuring DCQCN (Data Center Quantized Congestion Notification) for a 1024-GPU cluster running NCCL all-reduce over RoCEv2. The cluster uses 400 GbE with switches acting as Ethernet. Default DCQCN parameters cause oscillation: throughput swings between 90% and 40% of link capacity every 50 ms.'
question: How would you tune DCQCN for the 400 GbE RoCEv2 cluster to stop the 90% to 40% throughput oscillation?
details:
  realistic_solution: 'Scale DCQCN parameters proportionally to match the massive 400 GbE link speed. The default 10 KB Byte_Reset threshold is far too small for the Bandwidth-Delay Product (BDP) at 400 GbE, causing hyper-aggressive rate reduction. Scale Byte_Reset up to 400 KB. Simultaneously, scale the Rate Increase (Rai) from 40 Mbps to 1.6 Gbps so recovery takes a reasonable number of steps (~250) instead of an agonizing 10,000 steps.'
  common_mistake: |
    **The Pitfall:** Utilizing default factory DCQCN parameters designed for 10 GbE on a modern 400 GbE fabric.
    **The Rationale:** Network engineers often trust the default Mellanox/vendor NIC configurations without mathematically recalculating for higher link speeds.
    **The Consequence:** At 40x higher link speeds, rate increases are proportionally microscopic and decreases are overly sensitive, causing massive saw-tooth throughput oscillation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link Speed: 400 Gbps.
       - Round Trip Time (RTT): 4 μs.
       - Default DCQCN designed for 10 Gbps networks.
    2. **Calculations:**
       - Network BDP: 400 Gbps * 4 μs / 8 = 200 KB.
       - Default Byte_Reset (10 KB): 20x smaller than BDP -> constant rate drops.
       - Default Rai (40 Mbps): Takes 10,000 increments to recover to 400 Gbps.
       - Scaled Rai: 40 Mbps * (400/10) = 1.6 Gbps (250 steps to recover).
    3. **Conclusion & Interpretation:**
       - **Scaling DCQCN parameters to match the 400 Gbps BDP neutralizes the oscillation. Result: Network-Congestion Bound.**
