title: DCQCN Tuning for Large-Scale All-Reduce
scenario: 'You are configuring DCQCN (Data Center Quantized Congestion Notification) for a 1024-GPU H100 cluster running NCCL all-reduce over RoCEv2. The cluster uses 400 GbE with Quantum-2 InfiniBand switches acting as Ethernet. Default DCQCN parameters cause oscillation: throughput swings between 90% and 40% of link capacity every 50 ms.'
question: How would you tune DCQCN for the 400 GbE 1024-GPU RoCEv2 cluster to stop the 90%↔40% throughput oscillation?
details:
  realistic_solution: 'Scale DCQCN parameters proportionally to link speed: Rai = 40 Mbps × (400/10) = 1.6 Gbps. Reduce timer to 15 µs to match lower RTT of high-bandwidth fabric. Set target_rate = 95% of link capacity. Increase byte counter threshold (Byte_Reset) from 10 KB to 400 KB to match larger BDP (Bandwidth-Delay Product) at 400 GbE.'
  common_mistake: |
    **The Pitfall:** Using default DCQCN parameters designed for 10 GbE on a modern 400 GbE fabric.
    **The Rationale:** Trusting the default switch or NIC configurations without recalculating for higher link speeds.
    **The Consequence:** At 40× higher link speeds, rate increases are proportionally tiny and decreases are overly aggressive, causing massive saw-tooth throughput oscillation.
  napkin_math: |
    - **BDP Calculation:** BDP at 400 GbE with 4 µs RTT = 400 Gbps × 4 µs / 8 = 200 KB.
    - **Byte_Reset Threshold:** Default is 10 KB, which is 20× too small, triggering rate reductions constantly. Fix: Set to 400 KB.
    - **Rate Increase (Rai):** Default 40 Mbps requires 10,000 steps to recover 400 Gbps, which is far too slow.
    - **Rai Fix:** At 1.6 Gbps, recovery takes 250 steps, which is reasonable.
