title: KV-Cache Sharing for Parallel Sampling
scenario: Your code generation service runs best-of-N sampling (N=16) for each request, generating 16 completions from the same 2048-token prompt.
question: How can best-of-16 sampling share KV-cache for the common 2048-token prompt, and how much memory does it save?
details:
  realistic_solution: 'Use copy-on-write (CoW) KV-cache sharing (PagedAttention). Compute KV-cache for the prompt once. Create 16 logical references pointing to the same physical blocks. Allocate new blocks only for the diverging suffixes.'
  common_mistake: |
    **The Pitfall:** Allocating 16 independent full KV-caches.
    **The Rationale:** Candidates treat each sample as a completely independent request, ignoring the identical prompt prefix.
    **The Consequence:** Memory usage explodes by a factor of 16, severely limiting maximum concurrent requests.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Prompt length: 2048 tokens. N=16.
       - Token KV size: 320 KB.
       - Suffix length: 512 tokens.
    2. **Calculations:**
       - Prompt KV (shared): 2048 x 320 KB = 655 MB.
       - Suffix KV: 512 x 320 KB = 164 MB.
       - Naive memory: 16 x (655 + 164) = 13.1 GB.
       - CoW memory: 655 + (16 x 164) = 3.28 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound. CoW yields a 75% memory reduction (~9.8 GB saved).**
