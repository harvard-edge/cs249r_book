title: KV-Cache Sharing for Parallel Sampling
scenario: 'Your code generation service runs best-of-N sampling (N=16) for each request: generate 16 completions from the same 2048-token prompt and return the best. Naively, this requires 16x KV-cache.'
question: 'How can best-of-16 sampling share KV-cache for the common 2048-token prompt, and how much memory does it save?'
details:
  realistic_solution: 'Use copy-on-write (CoW) KV-cache sharing, analogous to OS fork(): (1) Compute KV-cache for the 2048-token prompt once: 2048 × 320 KB = 655 MB. (2) Create 16 logical KV-cache references pointing to the same physical blocks (prefix sharing). (3) As each sample generates different tokens, allocate new blocks only for the diverging suffix. Average completion: 512 tokens × 320 KB = 164 MB per sample. Memory: Naive: 16 × (655 + 164) MB = 13.1 GB. CoW: 655 MB (shared) + 16 × 164 MB = 3.28 GB. Savings: 9.82 GB (75% reduction). Implementation with PagedAttention: the prompt''s KV blocks have refcount=16. When all 16 samples finish, refcount drops to 0 and blocks are freed. During generation, each sample''s new blocks are appended to its own page table while sharing the prompt blocks. This is exactly how vLLM implements parallel sampling. At N=64 (used for code generation benchmarks), savings are even more dramatic: 655 MB shared vs 64 × 655 MB = 41 GB duplicated.'
  common_mistake: |
    **The Pitfall:** Allocating 16 independent full KV-caches.
    **The Rationale:** Candidates treat each sample as a completely independent request from the start, ignoring that the prompt prefix is identical for all 16 generations.
    **The Consequence:** Memory usage explodes by a factor of 16, severely limiting the maximum concurrent requests the GPU can handle.
  napkin_math: |
    * **Prompt KV (shared):** 2048 tokens * 320 KB = 655 MB.
    * **Per-sample suffix KV:** 512 tokens * 320 KB = 164 MB.
    * **Total CoW memory:** 655 MB + (16 * 164 MB) = 3.28 GB.
    * **Total naive memory:** 16 * (655 MB + 164 MB) = 13.1 GB.
    * **Savings:** **75% memory reduction** (9.82 GB saved).
