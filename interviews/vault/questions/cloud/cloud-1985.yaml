title: Diagnosing Synchronous Checkpoint Bottlenecks
scenario: You are training a 175B parameter LLM on 128 nodes. The training framework uses synchronous checkpointing to save the global model and optimizer state (totaling 2.8 TB) every hour. Each node is equipped with a 100 Gbps network interface. However, checkpointing pauses training for a full 5 minutes each time, reducing your effective training throughput by over 8%. Network monitoring reveals that peak interconnect utilization is under 1% during the checkpoint phase.
question: "What is the primary bottleneck causing 5-minute synchronous checkpoints when interconnect utilization is under 1%?"
details:
  realistic_solution: 'The bottleneck is the centralized storage system''s write throughput (e.g., a shared NFS drive). To resolve this, implement two-stage checkpointing: workers synchronously write shards to their local NVMe SSDs, and a background thread asynchronously uploads the files to persistent object storage.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the cross-node network bandwidth limits.
    **The Rationale:** Candidates see large file sizes and multiple nodes and assume network is always the limiting factor for distributed systems.
    **The Consequence:** Time is wasted tuning NCCL or upgrading network switches when the storage backend is the actual chokepoint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total checkpoint size = 2.8 TB.
       - Cluster network capacity: 128 nodes × 12.5 GB/s = 1.6 TB/s.
       - Observed save time = 5 minutes (300 seconds).
    2. **Calculations:**
       - Theoretical network transfer time = 2.8 TB / 1.6 TB/s = 1.75 seconds.
       - Effective storage bandwidth = 2.8 TB / 300 s ≈ 9.33 GB/s.
    3. **Conclusion & Interpretation:** **The shared storage backend is writing at only ~9.3 GB/s, ignoring the 1.6 TB/s network capacity. Result: I/O-Bound.**
