title: Quantifying Element-wise Kernel Fusion Speedup
scenario: You are profiling a custom activation layer `y = x * torch.sigmoid(x) + bias` applied to 1GB
  FP16 tensors (`x` and `bias`) on an NVIDIA A100 GPU (2 TB/s memory bandwidth). The layer is currently
  running in PyTorch eager mode without `torch.compile`. Calculate the theoretical performance speedup
  you would achieve by writing a custom CUDA kernel that fuses these three operations into a single pass.
details:
  realistic_solution: Count total memory traffic for both approaches. Element-wise ops are deeply memory-bound,
    so execution time is proportional to HBM bytes transferred. Eager mode materializes two intermediate
    tensors, resulting in 8GB of traffic. Fusing the operations keeps intermediates in registers, dropping
    traffic to 3GB.
  common_mistake: Focusing on FLOP reductions or assuming speedup is directly proportional to the number
    of fused operations (e.g., 3 ops = 3x speedup). Candidates often forget to tally the exact HBM reads
    and writes for intermediate tensors.
  napkin_math: 'Unfused traffic: t1=sigmoid(x) [Read 1GB, Write 1GB = 2GB] -> t2=x*t1 [Read 2GB, Write
    1GB = 3GB] -> y=t2+bias [Read 2GB, Write 1GB = 3GB]. Total = 8GB.

    Fused traffic: Read x (1GB), Read bias (1GB), Write y (1GB). Total = 3GB.

    Speedup = Unfused Traffic / Fused Traffic = 8GB / 3GB = ~2.67x.'
