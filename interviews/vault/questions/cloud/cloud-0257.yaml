title: The Energy Cost of Precision
scenario: When optimizing a model for energy efficiency on a cloud GPU, you're considering quantizing parts of your network from 32-bit floating point to 8-bit integer.
question: "Roughly how much more energy does a single FP32 compute operation consume compared to a single INT8 operation?"
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation. This non-linear relationship is a fundamental principle of digital logic design, where the energy cost of arithmetic units like multipliers grows quadratically, not linearly, with the number of bits.
  common_mistake: |
    **The Pitfall:** Assuming that energy scales linearly with bit width.
    **The Rationale:** Engineers divide 32 by 8 and believe the energy cost is exactly 4x.
    **The Consequence:** They vastly underestimate the power savings of INT8 quantization, missing out on massive efficiency gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy cost grows quadratically with multiplier circuit complexity, not linearly.
    2. **Calculations:**
       - INT8 operation: ~0.1 pJ.
       - FP32 operation: ~1.8 pJ.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Energy-Bound. A single FP32 compute operation consumes ~18x more energy than INT8.**
  options:
  - ~4× more energy
  - ~50× more energy
  - ~18× more energy
  - The energy is roughly the same
  correct_index: 2
