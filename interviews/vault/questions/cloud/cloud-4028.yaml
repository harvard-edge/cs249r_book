title: Congestion Control at 800G and Beyond
scenario: Next-generation ML clusters will use 800Gbps links (2 × 400G PAM4 lanes). At 800Gbps with 4KB packets, the inter-packet gap shrinks to ~41ns.
question: Can PFC, DCQCN, and ECN scale to 800Gbps links with 4KB packets, or is a fundamental redesign needed?
details:
  realistic_solution: 'The bandwidth-delay product doubles at 800G while switch buffers grow slowly (~2× per 2-3 generations). At 800Gbps: BDP = 800 Gbps × 5μs RTT = 500 KB per flow. Switch buffers: current Tomahawk-5 has 132MB, next-gen may have 200MB. The ratio is manageable for now. Key challenges: (1) PFC reaction time: PFC pause propagation takes 2-3μs; at 800G, 200-300 KB drains during this time — PFC headroom must double. (2) ECN marking: 800G with 4KB packets = 24.4M packets/sec per port, requiring faster ASIC pipelines (already at physical limits). (3) DCQCN: CNP generation rate may need to increase since flows fill buffers faster. Verdict: current mechanisms can scale to 800G with parameter tuning (double PFC headroom, halve ECN thresholds), but 1.6T links will likely require credit-based flow control (like InfiniBand) or in-network congestion signaling (programmable switches with P4). Ultra Ethernet Consortium is already defining these next-gen protocols.'
  common_mistake: |
    **The Pitfall:** Assuming linear hardware scaling solves networking physics.
    **The Rationale:** Candidates assume that simply doubling buffer sizes will automatically accommodate doubled link speeds.
    **The Consequence:** Ignoring that protocol reaction times (like PFC propagation or RTT) remain constant in absolute time, meaning buffers drain twice as fast relatively, leading to severe packet drops.
  napkin_math: |
    - **Bandwidth-Delay Product (BDP):** At 800 Gbps * 5μs RTT = 500 KB per flow.
    - **Buffer Fill Time:** 200MB switch buffer at 100 GB/s (800Gbps) fills in just 2 ms.
    - **PFC Propagation Drain:** PFC takes 2-3μs to propagate. At 800Gbps, 300 KB drains during this time (double the 400G rate).
    - **Packet Rate:** 800G with 4KB MTU = **24.4M packets/sec**, stressing switch ECN marking pipelines.
