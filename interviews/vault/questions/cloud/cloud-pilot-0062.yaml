title: Attention Resolution Budget For ViT Serving
scenario: A cloud vision API serves a ViT with 256 image patches at 20 ms per request on an H100. A customer asks for 2x higher image width and height, which creates 4x as many patches. Assume the attention portion is 40% of latency and scales quadratically with patch count, while the rest scales linearly with patch count. Estimate the new latency and decide whether it meets a 200 ms SLO.
question: What latency should you expect when a 256-patch ViT doubles image width and height under a 200 ms SLO?
details:
  realistic_solution: Doubling width and height creates 4x patches. The attention part scales by 4^2 = 16, so its 8 ms share becomes 128 ms. The non-attention part is 12 ms and scales linearly by 4, becoming 48 ms. Total estimated latency is 176 ms, which fits a 200 ms SLO but with only 24 ms headroom.
  common_mistake: Scaling the whole model linearly with pixels and estimating only 80 ms, or scaling the whole model quadratically and overestimating 320 ms.
  napkin_math: Base attention = 0.4 x 20 = 8 ms. Base other = 12 ms. New attention = 8 x 16 = 128 ms. New other = 12 x 4 = 48 ms. Total = 176 ms.
