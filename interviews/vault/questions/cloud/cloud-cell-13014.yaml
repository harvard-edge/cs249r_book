title: 'Queueing Theory Design: Autoscaling Policy for P99 SLO'
scenario: Design an autoscaling policy for an H100 inference fleet serving GPT-4-scale requests (mean
  service time 2.5s, P99 SLO = 8s). Using M/M/c queueing theory, determine the maximum safe utilization
  per server, the scaling trigger threshold, and the minimum fleet size to handle 1000 req/s with the
  SLO met.
details:
  realistic_solution: 'P99 SLO = 8s. For M/M/1 with mean service 2.5s: P99 tail ≈ -ln(0.01) * mean_system_time
    = 4.6 * W_total. Need W_total < 8/4.6 = 1.74s. Since mean service = 2.5s > 1.74s target, single M/M/1
    can''t meet SLO even at zero load (service time alone exceeds). This means we need batching to reduce
    per-request service time OR set trigger at very low utilization. With batching (batch=8, service=2.5s
    for 8 requests): effective W per request = 0.31s. Then M/M/1 max ρ: 4.6 * 0.31/(1-ρ) < 8 → ρ < 1 -
    4.6*0.31/8 = 0.82. Scale trigger: 75% utilization.'
  common_mistake: Setting autoscale trigger at 80% CPU/GPU utilization without deriving from the actual
    P99 SLO constraint — the safe utilization depends on service time variance.
  napkin_math: 'Service time per request = 2.5s. P99 SLO = 8s. M/M/1 P99 ≈ 4.6/μ/(1-ρ). Set 4.6*2.5/(1-ρ)
    < 8 → 11.5/(1-ρ) < 8 → impossible (11.5 > 8). With batching B=8: effective service = 2.5/8 = 0.3125s.
    P99: 4.6*0.3125/(1-ρ) < 8 → 1.4375/(1-ρ) < 8 → 1-ρ > 0.18 → ρ < 0.82. Fleet for 1000 req/s: each server
    at ρ=0.75 handles λ=0.75/0.3125 = 2.4 req/s per server. Servers needed: 1000/2.4 = 417 H100s.'
