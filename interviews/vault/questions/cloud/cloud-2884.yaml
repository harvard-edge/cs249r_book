title: 'Mastery: Deriving the Optimal Checkpoint Interval to Minimize Total Training Time'
scenario: 'You are training a 100B Transformer (128 layers, H=12288) on a cluster of H100 nodes. The forward pass takes T_f seconds per layer. Activation memory per layer is M bytes. You have budget B bytes of HBM.'
question: 'What checkpoint interval k minimizes training time under the 80 GB HBM budget, and what is k for T_f=8 ms and M=3 GB per layer?'
details:
  realistic_solution: 'With k-interval checkpointing, peak activation memory is k × M (the window between checkpoints). Constraint: k × M ≤ B -> k ≤ B/M. Recompute cost per backward pass: (N/k) checkpoint segments × one forward pass each × T_f × k layers = N × T_f additional time. While this FLOP overhead is independent of k, each checkpoint boundary incurs memory bandwidth and framework overhead. Therefore, to minimize total time, maximize k (fewest checkpoints) subject to k ≤ B/M. Optimal k = floor(B/M) = floor(80/3) = 26 layers. Overhead = N × T_f = 128 × 8 ms = 1.024 s additional per backward pass.'
  common_mistake: |
    **The Pitfall:** Choosing k based solely on a generalized memory heuristic like sqrt(N).
    **The Rationale:** Candidates recall the sqrt(N) heuristic derived for memory-minimization alone, failing to model the exact recompute overhead and memory bandwidth costs.
    **The Consequence:** Selecting an interval that either violates the hard memory budget or introduces massive, unnecessary recompute overhead.
  napkin_math: |
    - **Constraint Check:** k × M ≤ B -> k ≤ B/M. For B=80 GB, M=3 GB, k_opt = floor(80 / 3) = **26 layers**.
    - **Peak Activation Memory:** 26 layers × 3 GB = 78 GB (≤ 80 GB).
    - **Recompute Overhead:** 128 layers × 8 ms/layer = **1.024 seconds**.
    - **Result:** The optimal interval is **k=26**, yielding 1.024s overhead per backward pass.
