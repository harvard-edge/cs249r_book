title: The Chatbot Latency Crisis (cloud-0131)
scenario: You are an ML Systems Engineer at a chatbot startup, tasked with optimizing your LLM serving
  stack. Your service runs on an H100 GPU (989 TFLOPS FP16) and you estimate your model achieves 50% MFU.
  The model requires 14 GFLOPs per token generated.
details:
  realistic_solution: The correct answer is that the P99 TTFT will drop dramatically to the low single-digit
    milliseconds. The original 105ms TTFT is almost entirely composed of the 100ms static batching timeout
    (`T_queue`), which is incurred by any request that doesn't arrive in a full batch. The low GPU utilization
    confirms the GPU is sitting idle waiting for batches to fill.
  common_mistake: Mistaking the GPU hardware or model architecture as the bottleneck when the serving
    *policy* is the root cause. Engineers often focus on per-iteration compute time (`T_service`) and
    forget that for interactive applications, the time spent waiting in a queue (`T_queue`) due to inefficient
    batching is usually the dominant factor in user-perceived latency.
  napkin_math: 1.  **Diagnose Original State:** The observed P99 TTFT is ~105ms and the static batching
    timeout is 100ms. This structure (`TTFT ≈ Timeout + T_compute`) strongly implies `T_queue ≈ 100ms`
    is the bottleneck.
  options:
  - Slightly worse, ~110ms. The smaller batch size has lower arithmetic intensity, reducing MFU and making
    each step slower, which dominates any queueing gains.
  - ~53ms. The average batch size is halved (32 → 16), so the system's throughput is halved, and thus
    latency must also be halved.
  - ~105ms. The GPU is the fundamental bottleneck. Serving policy doesn't change the time it takes to
    compute a token, so the TTFT will remain the same.
  - ~1-3ms. The 100ms static batching timeout (T_queue) is eliminated. The new latency is simply the compute
    time of one or two generation steps, which is on the order of milliseconds.
  correct_index: 3
