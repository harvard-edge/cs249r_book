title: 'The Chatbot Latency Crisis (cloud-0131)'
scenario: 'You are an ML Systems Engineer at a chatbot startup, tasked with optimizing your LLM serving stack for a 7B parameter model. Your service runs on an H100 GPU (989 TFLOPS FP16) and you estimate your model achieves 50% MFU. The model requires 14 GFLOPs per token generated. The current P99 TTFT is 105ms, with a 100ms static batching timeout.'
question: 'If the 100ms static batching timeout is removed with continuous batching, what should happen to P99 TTFT and why?'
details:
  realistic_solution: 'The correct answer is that the P99 TTFT will drop dramatically to the low single-digit milliseconds. The original 105ms TTFT is almost entirely composed of the 100ms static batching timeout (`T_queue`), which is incurred by any request that doesn''t arrive in a full batch. The low GPU utilization confirms the GPU is sitting idle waiting for batches to fill.'
  common_mistake: 'Mistaking the GPU hardware or model architecture as the bottleneck when the serving *policy* is the root cause. Engineers often focus on per-iteration compute time (`T_service`) and forget that for interactive applications, the time spent waiting in a queue (`T_queue`) due to inefficient batching is usually the dominant factor in user-perceived latency.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model requiring 14 GFLOPs/token
    - H100 GPU (989 TFLOPS FP16, 494.5 effective TFLOPS at 50% MFU)
    - P99 TTFT: ~105ms
    - Static batching timeout: 100ms

    **Calculations:**
    - T_queue = ~100ms
    - 150-token prompt compute = ~2.1 TFLOPs
    - T_compute = 2.1 / 494.5 \approx 4.2ms
    - Current TTFT \approx 100ms + 4.2ms = 104.2ms

    **Conclusion & Interpretation:**
    - **Result: 1-5ms (Latency-Bound)**. By eliminating the fixed timeout, T_queue drops to near zero, and the new TTFT becomes just the T_compute.
  options:
  - 'Slightly worse, ~110ms. The smaller batch size has lower arithmetic intensity, reducing MFU and making each step slower, which dominates any queueing gains.'
  - '~53ms. The average batch size is halved (32 -> 16), so the system''s throughput is halved, and thus latency must also be halved.'
  - '~105ms. The GPU is the fundamental bottleneck. Serving policy doesn''t change the time it takes to compute a token, so the TTFT will remain the same.'
  - '~1-5ms. The 100ms static batching timeout (T_queue) is eliminated. The new latency is simply the compute time of the prefill step, which is on the order of milliseconds.'
  correct_index: 3
