title: Evaluating Horizontal Pod Autoscaler for GPU Inference Scaling
scenario: An ML platform team is debating whether to use Kubernetes HPA (Horizontal Pod Autoscaler) based
  on GPU utilization metrics from DCGM Exporter to auto-scale a vLLM inference deployment on A100 nodes.
  The service receives bursty traffic with 10× spikes lasting 2–3 minutes. Evaluate whether HPA with GPU
  utilization is the right scaling signal for this workload.
question: "Is HPA on DCGM GPU utilization the right autoscaling signal for bursty 2–3 minute vLLM traffic spikes, and what should you use instead?"
details:
  realistic_solution: 'Use queue depth or pending request count as the HPA metric via a custom metrics
    adapter (e.g., Prometheus Adapter + KEDA). Set scale-up trigger at queue_depth > 10 with a 15-second
    polling interval. Pre-provision warm standby pods using KEDA''s `ScaledObject` with `minReplicaCount:
    1` to eliminate cold-start latency. GPU utilization works as a scale-down signal (utilization < 20%
    for 5 min → scale down), but not scale-up. For 2–3 minute spikes, proactive scaling based on request
    rate is more effective.'
  common_mistake: 'Using GPU utilization as the HPA metric: GPU utilization is a lagging indicator. A100
    at 95% utilization means the queue is already full and latency is degrading; by the time HPA fires,
    scales up, the new pod cold-starts (30–90 s for large models), and warms up, the traffic spike is
    over.'
  napkin_math: 'A100 inference throughput for 7B model: ~2000 tokens/s at batch=16. At 10× traffic spike
    = 20,000 tokens/s needed = 10 pods. HPA scale-up latency: 15 s metric lag + 30 s pod schedule + 60
    s model load = 105 s. Traffic spike duration: 120–180 s. HPA barely responds before the spike ends.
    KEDA queue-based scaling with warm pods: 15 s metric lag + ~5 s pod ready = 20 s response — capturing
    85%+ of the spike duration.'
