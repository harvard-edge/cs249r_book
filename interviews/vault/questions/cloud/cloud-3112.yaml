title: 'Transformer Cost Fluency: FLOPs Estimation from Memory'
scenario: You need to quickly estimate training and inference compute requirements without a calculator.
question: What are the 6ND GPT-3 training FLOPs, 70B inference FLOPs per token, and H100-days to train GPT-3 at 40% MFU?
details:
  realistic_solution: '(1) GPT-3 training: 6 * 175B * 300B = 6 * 1.75e11 * 3e11 = 3.15e23 FLOPs. (2) 70B inference per token, batch=1: 2 * 70B = 140B FLOPs = 1.4e11 FLOPs/token. At 100 tokens: 1.4e13 FLOPs. (3) GPT-3 H100-days at 40% MFU: effective TFLOPS = 1979e12*0.4=791.6e12 FLOPs/s. Total time (1 H100): 3.15e23/791.6e12=3.979e8 seconds. H100-days: 3.979e8/86400=4,606 days. Cost: 4606 H100-days * $2.50/hr * 24 = $276.3K. At 1000 H100s: 4.606 days. Cost: 1000*$2.50*24*4.606=$276,360.'
  common_mistake: |
    **The Pitfall:** Not knowing the standard 6ND approximation for training or 2N for inference.
    **The Rationale:** Practitioners often rely on profiling tools instead of internalizing the fundamental scaling laws of transformer arithmetic.
    **The Consequence:** Inability to quickly sanity-check compute budgets or perform back-of-the-envelope capacity planning during system design.
  napkin_math: |
    1. **Training FLOPs:** 6 × 175e9 (params) × 300e9 (tokens) = 3.15e23 FLOPs.
    2. **Inference FLOPs/token:** 2 × 70e9 = 1.4e11 FLOPs/token.
    3. **H100 Throughput (40% MFU):** 1979e12 × 0.4 ≈ 7.916e14 FLOPs/s.
    4. **Time in seconds:** 3.15e23 / 7.916e14 ≈ 3.979e8 seconds.
    5. **H100-days:** 3.979e8 / 86400 ≈ 4,606 H100-days.
    **Conclusion:** A 1000-GPU cluster would finish in ~4.6 days at a compute cost of ~$276K.
