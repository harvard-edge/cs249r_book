title: Precision vs Recall Tradeoff in Multi-Stage Retrieval Pipeline
scenario: A 3-stage recommendation pipeline (retrieval → light rank → heavy rank)
  outputs 20 final items from 1M candidates. An SRE notices that 30% of the 20 final
  items were not in the top 10K retrieved by the retrieval stage. This means the retrieval
  stage has 70% recall@10K. Is this acceptable?
question: Is this acceptable?
details:
  realistic_solution: 'Interpreting retrieval recall: if 70% recall@10K means 30%
    of the optimal final-20 items are missed by retrieval, the question is whether
    those missed items would have changed the final ranking. If the missed items are
    marginally relevant (rank 21-50 in the oracle ranking), the impact on final quality
    is small. If missed items include the top-1 item in 10% of queries, that is a
    severe quality failure. Analysis approach: (1) Compute recall@K for different
    K values (100, 1K, 10K). If recall@100 = 50% and recall@10K = 70%, the recall
    curve is shallow — need a better retrieval model. (2) Quality impact: run offline
    experiment with oracle retrieval (send top-50K to ranker). Compare final NDCG
    vs 10K retrieval NDCG. If delta < 1%: 70% recall is acceptable. (3) In practice:
    70% recall@10K is considered low for production systems. Target: >90% recall@1K
    for a well-tuned two-tower model.'
  common_mistake: Treating retrieval recall as a system-level metric equal in importance
    to final ranking quality. Retrieval recall@K is only meaningful in the context
    of the full pipeline's final quality metric (NDCG, CTR uplift). High retrieval
    recall does not guarantee high final ranking quality, and improving retrieval
    recall may have diminishing returns at the final stage.
  napkin_math: 'Oracle experiment: if perfect retrieval improves final NDCG by 2%:
    at 100K QPS * CTR * revenue_per_click, 2% NDCG improvement correlates with ~0.5%
    CTR improvement = 500 extra clicks/sec. At $0.50 CPC: $250/sec = $21.6M/day. High
    impact. Improving recall from 70% to 90%: requires better two-tower model (larger,
    more training data) or ANN index quality improvements. Training cost: 1 GPU-week
    for two-tower improvement = ~$500. ROI: $21.6M/day impact. Trivially justified.'
