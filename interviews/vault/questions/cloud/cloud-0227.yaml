title: The Speculative Decoding Speedup
scenario: Our 70B model serves chat completions with a P50 time-to-first-token of 200 ms and inter-token latency of 45 ms. Product wants 2x faster decoding without changing the model. Someone suggests speculative decoding with a 1B draft model.
question: Walk me through the systems math for speculative decoding — when does it help, and when does it backfire?
details:
  realistic_solution: |
    Speculative decoding works in three steps: (1) the draft model generates K candidate tokens autoregressively (cheap, ~1 ms/token); (2) the target 70B model verifies all K tokens in a single forward pass; (3) the target accepts matching tokens and resamples the next. The speedup depends on the acceptance rate α. If α is high, you gain massive throughput. However, the draft model's memory displaces KV-cache space, potentially reducing maximum batch sizes.
  common_mistake: |
    **The Pitfall:** Assuming the speedup scales linearly with the draft model's generation speed.
    **The Rationale:** Candidates ignore the probabilistic acceptance rate and the memory overhead of holding two models simultaneously.
    **The Consequence:** Grossly overestimating the speedup and causing OOM errors in production by reducing available KV-cache.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B baseline latency = 45 ms/token.
       - Speculative decoding with K=5, Draft = 5 ms.
    2. **Calculations:**
       - With Speculation (K=5, α=0.8): Verify = 45 ms. Expected tokens = 3.69.
       - Effective Latency: (5 + 45) / 3.69 = 13.6 ms/token (3.3x speedup).
       - When it backfires (α=0.4): Expected tokens = 1.66. Latency = (5 + 45) / 1.66 = 30 ms/token.
    3. **Conclusion & Interpretation:**
       - **With low acceptance rates, you only gain a 1.5x speedup while simultaneously losing ~25% of your batch capacity to memory overhead.**
       - **Result: Memory-Bound**
