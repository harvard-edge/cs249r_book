title: Why Intermittent Faults Are Hardest
scenario: Your training run crashes sporadically on GPU #12 — sometimes after 2 hours, sometimes after 20 hours, and the GPU passes all diagnostic tests when checked.
question: Why are sporadic crashes on GPU #12 that pass diagnostics harder to handle than permanent faults?
details:
  realistic_solution: 'Intermittent faults are the hardest class because they combine the worst properties of permanent and transient faults: (1) They recur, unlike transient faults, so they will keep disrupting training. (2) They are not reproducible on demand, unlike permanent faults, so standard diagnostics pass — the GPU looks healthy. (3) They are often condition-dependent: triggered by specific thermal states, power loads, or memory access patterns that only occur during real training, not synthetic benchmarks. (4) They create a diagnosis dilemma: you cannot confidently condemn the hardware (expensive replacement) or clear it (risk more failures). Common causes include marginal solder joints, thermal throttling at specific hotspots, and degrading capacitors. The typical resolution is a ''three strikes'' policy: after 3 intermittent failures, retire the component.'
  common_mistake: |
    **The Pitfall:** Treating intermittent faults as transient (one-time) events.
    **The Rationale:** Because the hardware passes diagnostics, engineers assume it was a rare cosmic ray strike or a one-off software glitch.
    **The Consequence:** The faulty hardware remains in the cluster, continuing to sporadically crash expensive multi-node training runs over days or weeks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Faults are sporadic and condition-dependent.
    - Hardware passes standard idle diagnostics.

    **Calculations:**
    - Permanent Fault = Always fails -> detected immediately.
    - Transient Fault = Fails exactly once -> transparent recovery from checkpoint.
    - Intermittent Fault = Fails unpredictably under load -> passes idle diagnostics.

    **Conclusion & Interpretation:**
    - **Result: Evades diagnostics (Diagnostics-Bound)**. Intermittent faults evade diagnostics and repeatedly crash production runs.
