title: Scheduling Multi-Node Training with Network Constraints
scenario: Your cluster has 20 nodes with 8 H100s each, but only 10 nodes have 400 Gbps InfiniBand (IB)
  while the other 10 have 100 Gbps Ethernet. A 128-GPU training job with DP=16 arrives. How should the
  scheduler consider network topology?
details:
  realistic_solution: 'Network-aware scheduling policy: (1) Classify the job: 128 GPUs with DP=16 means
    16 data-parallel groups. Each step, gradient AllReduce sends ~model_size bytes across DP groups. For
    a model with 1B params: AllReduce volume ≈ 2 × (15/16) × 2 GB = 3.75 GB per step. (2) Calculate communication
    time: On IB (400 Gbps = 50 GB/s effective): 3.75/50 = 75 ms. On Ethernet (100 Gbps = 10 GB/s effective):
    3.75/10 = 375 ms — 5× slower. (3) Scheduling rule: the job MUST run entirely on IB nodes. It needs
    128/8 = 16 nodes, but only 10 IB nodes exist (80 GPUs). Options: (a) Queue until 16 IB nodes are available
    (never — only 10 exist). (b) Reduce job to 80 GPUs (10 IB nodes), adjust DP=10. (c) Use 10 IB nodes
    + 6 Ethernet nodes, but pin TP/PP communication to IB and only use Ethernet for DP AllReduce (which
    can overlap with backward compute). The scheduler should expose network topology as a schedulable
    resource (Slurm features: ib=true/false) so users can specify constraints.'
  common_mistake: Treating all nodes equally and spreading the job across IB and Ethernet nodes. The 4×
    bandwidth difference means Ethernet nodes become severe bottlenecks for gradient AllReduce.
  napkin_math: 'IB AllReduce: 75 ms. Ethernet: 375 ms. Mixed (assuming slowest link dominates ring): 375
    ms. Backward compute: ~500 ms. Ethernet overlap: 375/500 = 75% — some leaks into forward pass.'
