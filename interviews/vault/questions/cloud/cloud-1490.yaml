title: Diagnosing LLM Data Exfiltration Across Layers
scenario: A healthcare provider deploys a clinical LLM on 8x A100 80GB GPUs. The system is protected by TLS 1.3, strict IAM roles, and a Web Application Firewall (WAF) blocking OWASP Top 10 payloads at 10k QPS. Despite these defenses, red teamers successfully extract verbatim patient records using repeated prompt perturbations.
question: Why did TLS, IAM, and a WAF fail to stop patient-record extraction, and what ML-specific defenses are missing?
details:
  realistic_solution: 'Diagnose that the architecture lacks ML-specific defense layers. TLS/IAM/WAF protect the transport and application layers but are blind to semantic ML attacks (prompt injection, training data extraction, model inversion). A true layered defense requires: (1) DP-SGD during training to provide mathematical memorization bounds (epsilon=3.0), (2) an ML-aware AI Gateway with secondary safety models for runtime prompt/output filtering, and (3) output perturbation to prevent exact weight extraction through repeated queries.'
  common_mistake: |
    **The Pitfall:** Assuming traditional IT infrastructure security extends to the semantic layer of ML models.
    **The Rationale:** Candidates rely on standard network perimeter defenses, ignoring that ML extraction attacks are completely valid application-layer requests.
    **The Consequence:** Deploying a system that is secure against SQL injection but completely vulnerable to training data extraction.
  napkin_math: |
    - 1. Evaluate WAF latency vs effectiveness: Adds ~1-2ms latency but blocks **0%** of semantic ML extraction attacks.
    - 2. Evaluate AI Gateway latency vs effectiveness: Adds ~50-100ms latency but actively filters malicious semantic prompts.
    - 3. Evaluate DP-SGD training throughput vs effectiveness: Reduces training throughput by ~20-30% but provides a mathematical bound (e.g., ε=3.0) on memorization risk.
    - 4. Conclusion: **Traditional security has 0% efficacy against semantic attacks**; ML-specific defenses must be deployed despite the latency/throughput costs.
