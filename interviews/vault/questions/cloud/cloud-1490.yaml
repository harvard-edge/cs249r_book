title: Diagnosing LLM Data Exfiltration Across Layers
scenario: A healthcare provider deploys a clinical LLM on 8x A100 80GB GPUs. The system is protected by
  TLS 1.3, strict IAM roles, and a Web Application Firewall (WAF) blocking OWASP Top 10 payloads at 10k
  QPS. Despite these robust infrastructure and application-layer defenses, red teamers successfully extract
  verbatim patient records using repeated prompt perturbations and membership inference attacks. Diagnose
  the structural failure in this defense-in-depth strategy.
details:
  realistic_solution: 'Diagnose that the architecture lacks ML-specific defense layers. TLS/IAM/WAF protect
    the transport and application layers but are blind to semantic ML attacks (prompt injection, training
    data extraction, model inversion). A true layered defense requires: (1) DP-SGD during training to
    provide mathematical memorization bounds (epsilon=3.0), (2) an ML-aware AI Gateway with secondary
    safety models for runtime prompt/output filtering, and (3) output perturbation to prevent exact weight
    extraction through repeated queries.'
  common_mistake: Assuming traditional IT infrastructure security (WAF, TLS, IAM) extends protection to
    the semantic layer of ML models, or attempting to patch the vulnerability at the network perimeter
    when the threat model is fundamentally at the model inference layer.
  napkin_math: A standard WAF adds ~1-2ms latency but blocks 0% of semantic ML extraction attacks. Adding
    an ML-aware AI Gateway adds ~50-100ms inference latency to run secondary safety models. Implementing
    DP-SGD training on A100s reduces training throughput by ~20-30% due to per-sample gradient clipping,
    but provides a mathematical bound (e.g., ε=3.0) on memorization risk.
