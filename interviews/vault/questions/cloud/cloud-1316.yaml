title: Mitigating Gradient Inversion in Medical Federated Learning
scenario: In a federated learning setup for a medical imaging model (ResNet-50, 25M parameters), clients (hospitals) train locally on 8x NVIDIA A100 nodes and send FP32 gradient updates to the central cloud aggregator. A security audit reveals that a malicious aggregator can perfectly reconstruct the raw 256x256 patient X-ray images from these updates when the local batch size is set to 1.
question: Why do batch-size-1 federated gradients allow exact X-ray reconstruction, and what mitigation prevents it with under 1% accuracy loss?
details:
  realistic_solution: Increase the minimum local batch size to at least 16 to average gradients across multiple images (breaking the 1:1 mapping), and implement DP-SGD by clipping gradients to a maximum L2 norm (e.g., C=1.0) and adding Gaussian noise (e.g., σ=0.01) before transmission.
  common_mistake: |
    **The Pitfall:** Assuming TLS/encryption in transit solves the privacy problem.
    **The Rationale:** Engineers treat the aggregator as inherently trusted because it sits inside the company's cloud VPC.
    **The Consequence:** The aggregator decrypts the packets to do the math, and the mathematical mapping from gradients to input data remains perfectly intact, allowing a compromised aggregator to reconstruct raw PHI data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Image size: 256x256 (65,536 pixels).
       - B=1 allows analytic recovery.
    2. **Calculations:**
       - If B=16, the gradient is ∑(x_i * δ_i^T).
       - Number of unknowns: 16 * 256 * 256 = 1,048,576 pixels.
    3. **Conclusion & Interpretation:**
       - **Result: Optimization Search Space Bound.** Batch size > 1 exponentially increases the search space (over 1M unknowns), thwarting reconstruction attacks.
