title: Mitigating Gradient Inversion in Medical Federated Learning
scenario: In a federated learning setup for a medical imaging model (ResNet-50, 25M parameters), clients
  (hospitals) train locally on 8x NVIDIA A100 nodes and send FP32 gradient updates to the central cloud
  aggregator. A security audit reveals that a malicious aggregator can perfectly reconstruct the raw 256x256
  patient X-ray images from these updates when the local batch size is set to 1. Analyze the mathematical
  vulnerability causing this leakage and determine the most effective mitigation strategy that prevents
  exact image reconstruction while keeping the global model's accuracy drop below 1%.
details:
  realistic_solution: Increase the minimum local batch size to at least 16 to average gradients across
    multiple images (breaking the 1:1 mapping), and implement DP-SGD by clipping gradients to a maximum
    L2 norm (e.g., C=1.0) and adding Gaussian noise (e.g., σ=0.01) before transmission.
  common_mistake: Candidates often suggest simply encrypting the gradients in transit (e.g., using TLS),
    failing to realize that the aggregator itself needs the raw gradients to compute the global update,
    and the mathematical mapping from gradients to input data remains intact.
  napkin_math: For a single image, the gradient of the first convolution layer with weights W is g_W =
    x * δ^T. If batch size B=1, the input x can be recovered analytically. If B=16, the gradient is ∑(x_i
    * δ_i^T). The number of unknowns (16 * 256 * 256 = 1,048,576 pixels) far exceeds the constraint equations
    provided by the gradient size, exponentially increasing the search space for optimization-based reconstruction
    attacks.
