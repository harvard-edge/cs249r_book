title: Cloud Fallback Minimization via AOT Compilation
scenario: Your mobile app uses a super-resolution model for images. You use a cloud fallback API when on-device inference fails. Currently, 40% of Android inferences fall back to the cloud API (costing $8,000/day in AWS GPU instances). Investigation reveals that while the model is converted to TFLite INT8, many ops are not supported by older Android NNAPI drivers, causing the runtime to fall back to the phone's CPU. CPU inference takes 3 seconds (exceeding the 1s timeout), which triggers the cloud fallback.
question: "How do you architect the deployment pipeline to cut cloud costs?"
details:
  realistic_solution: Integrate an Ahead-of-Time (AOT) compiler (like Apache TVM or XLA) into the cloud deployment pipeline, shifting from generic TFLite/NNAPI to device-specific backend generation. The cloud CI/CD pipeline cross-compiles the model directly into optimized OpenCL/Vulkan binaries for common Android GPUs (Mali, Adreno) and Hexagon DSPs, bypassing the buggy NNAPI driver layer entirely. The app downloads the specific binary for its SoC at runtime. For ops that truly cannot run on the NPU/GPU, the AOT compiler fuses them optimally for the ARM CPU, bringing CPU fallback latency under the 1s timeout.
  common_mistake: |
    **The Pitfall:** Just increasing the timeout to 3 seconds.
    **The Rationale:** Candidates prioritize lowering cloud costs without considering the client-side implications of a blocking, 3-second UI freeze.
    **The Consequence:** Drastically reduced cloud costs achieved at the expense of user experience, leading to massive app abandonment.
  napkin_math: |
    1. **Current cloud cost:** 40% fallback rate = $8,000/day.
    2. AOT Compilation enables GPU acceleration on 75% of the devices that previously failed NNAPI.
    3. **New fallback rate:** 40% × 0.25 = 10%.
    4. CPU optimizations reduce the remaining CPU latency to 0.8s (under 1s timeout).
    5. **Final fallback rate drops to ~2%.**
    6. **New cloud cost: $8,000 × (2/40) = $400/day (95% savings).**
