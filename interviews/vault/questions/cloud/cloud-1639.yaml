title: Diagnosing Low MAC Throughput in Custom Kernels
scenario: A team is running a custom ML workload on an NVIDIA T4 GPU (65 TFLOPS FP16 Tensor Core, 8.1
  TFLOPS FP32). They implemented a custom fused CUDA kernel using FP16 data types for a specialized dense
  layer performing massive multiply-accumulate (MAC) operations. Despite very high arithmetic intensity
  and large matrix dimensions (N=4096), the Nsight profiler shows the kernel maxes out at roughly 8 TFLOPS.
  The memory bandwidth utilization is under 20%. Diagnose the architectural bottleneck limiting the MAC
  throughput.
details:
  realistic_solution: The root cause is that the custom CUDA kernel uses standard scalar floating-point
    arithmetic instead of matrix arithmetic instructions (HMMA/WMMA). The compiler maps these scalar operations
    to standard CUDA cores rather than Tensor Cores. To fix this, the team must rewrite the kernel using
    the `wmma` API (Warp-Level Matrix Multiply Accumulate) or leverage CUTLASS to explicitly target the
    Tensor Core MAC units.
  common_mistake: Candidates often assume the kernel is hitting a memory bandwidth wall (Memory Wall)
    or suffering from extreme register spilling, failing to analyze the instruction mix and compare observed
    performance to the hardware peak limits of different functional units.
  napkin_math: T4 Peak FP32 CUDA Core Throughput = 8.1 TFLOPS. T4 Peak FP16 Tensor Core Throughput = 65
    TFLOPS. Observed Throughput = ~8 TFLOPS. The observed performance (8 TFLOPS) perfectly aligns with
    the standard CUDA core theoretical limit (8.1 TFLOPS), proving the much faster Tensor Cores (65 TFLOPS)
    are entirely unutilized during the MAC operations.
