title: Diagnosing Low MAC Throughput in Custom Kernels
scenario: A team is running a custom ML workload on an NVIDIA T4 GPU (65 TFLOPS FP16 Tensor Core, 8.1 TFLOPS FP32). They implemented a custom fused CUDA kernel using FP16 data types for a specialized dense layer. Despite high arithmetic intensity, the Nsight profiler shows the kernel maxes out at roughly 8 TFLOPS with memory bandwidth utilization under 20%.
question: Why does the FP16 custom CUDA kernel top out at about 8 TFLOPS instead of using the T4's 65 TFLOPS Tensor Cores?
details:
  realistic_solution: The root cause is that the custom CUDA kernel uses standard scalar floating-point arithmetic instead of matrix arithmetic instructions (HMMA/WMMA). The compiler maps these scalar operations to standard CUDA cores rather than Tensor Cores. To fix this, the team must rewrite the kernel using the `wmma` API or CUTLASS to explicitly target Tensor Cores.
  common_mistake: |
    **The Pitfall:** Assuming the kernel is hitting a memory bandwidth wall or suffering from register spilling.
    **The Rationale:** Candidates fail to analyze the instruction mix and compare observed performance to theoretical limits of specific functional units.
    **The Consequence:** Wasting effort on memory optimizations instead of fixing the instruction mapping.
  napkin_math: |
    - **T4 FP32 CUDA Core Peak:** 8.1 TFLOPS.
    - **T4 FP16 Tensor Core Peak:** 65 TFLOPS.
    - **Observed Throughput:** ~8 TFLOPS.
    - **Result:** The 8 TFLOPS observation aligns perfectly with the FP32 CUDA core limit, proving the **65 TFLOPS Tensor Cores are entirely unutilized**.
