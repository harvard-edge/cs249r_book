title: 'Queueing Theory Mastery: Inference System Capacity Planning End-to-End'
scenario: "Design an inference capacity plan for a GPT-4-scale service (1.8T parameter MoE model, routed to ~200B active params) on GPUs with 80GB VRAM. Requirements: λ=5000 req/s peak, P99 < 3s, mean output 500 tokens. The model requires 200GB VRAM for active params across 4 GPUs per pod. Use Little's Law and M/M/c queueing theory to size the fleet at a ρ=0.7 utilization target."
question: "How many 4-GPU pods are required to support the 5000 req/s workload, and what is the estimated hourly cluster cost at $2/hr per GPU?"
details:
  realistic_solution: 'Each pod = 4 H100s (fits 200GB model). Mean service time per pod: prefill 2048 tokens + decode 500 tokens at ~20ms/tok = 10s. μ_pod = 0.1 req/s. For P99<3s with M/M/c: need many pods. Set ρ=0.7 (safe operating point for P99 constraint). μ_cluster = λ/ρ = 5000/0.7 = 7143 req/s cluster capacity. Pods needed: 7143/0.1 = 71,430 pods. Each pod = 4 H100s: 285,720 H100s. Cost: at $2/hr/H100 = $571,440/hr. Revenue at 5000 req/s * 500 tok/req * $0.01/1K tok = $25/s = $90,000/hr. Note: real GPT-4 uses MoE to reduce compute per request.'
  common_mistake: |
    **The Pitfall:** Treating each GPU independently in the M/M/c analysis.
    **The Rationale:** Candidates forget that large models require tensor parallelism (sharding) across multiple GPUs, meaning the "server unit" (c) in the queueing model is a multi-GPU pod, not a single GPU.
    **The Consequence:** The capacity plan underestimates the required hardware by 4x, guaranteeing massive P99 SLA violations.
  napkin_math: |
    - Service time: 500 output tokens * 20ms/tok = 10s per request.
    - Pod service rate (μ): 1 / 10s = 0.1 req/s per pod.
    - Target utilization (ρ): 0.7.
    - Required pods (c) = λ / (ρ * μ) = 5000 / (0.7 * 0.1) = 71,428.5 ≈ 71,429 pods.
    - Total GPUs: 71,429 pods * 4 GPUs/pod = 285,716 GPUs.
    - Cost per hour: 285,716 GPUs * $2 = $571,432/hr.
    - **Result: 71,429 pods are needed, costing ~$571k/hr.**
