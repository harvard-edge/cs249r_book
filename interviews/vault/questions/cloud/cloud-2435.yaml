title: The Over-Batched T4 Throughput Plateau
scenario: A cloud service generates embeddings using a BERT-base model on T4 GPUs (320 GB/s bandwidth,
  65 TFLOPS FP16). To maximize throughput, the team increases the dynamic batch size from 32 to 256. Throughput
  (requests/sec) scales linearly up to batch 32. However, from batch 32 to 256, throughput flatlines completely
  at ~4,000 req/sec, while P99 latency spikes drastically from 10ms to 80ms.
details:
  realistic_solution: The workload has crossed the roofline inflection point (the ridge point). At small
    batch sizes, the workload is memory-bandwidth bound. Increasing batch size increases Arithmetic Intensity
    (reusing the same loaded weights across multiple inputs), moving the workload up the sloped roofline
    and increasing throughput. Around batch size 32, the Arithmetic Intensity hits the ridge point of
    the T4 GPU, and the workload becomes strictly compute-bound. Further increasing the batch size to
    256 provides no additional throughput because the GPU is already operating at its maximum 65 TFLOPS
    ceiling. It merely queues up computation, proportionately increasing latency without gaining throughput.
  common_mistake: Assuming that increasing batch size will always increase hardware utilization and throughput
    by hiding memory latency.
  napkin_math: T4 Compute Ceiling = 65 TFLOPS. At 4,000 req/sec, FLOPs per request = 65 TFLOPS / 4000
    = 16.25 GFLOPs. At BS=32, total compute = 32 x 16.25 GFLOPs = 520 GFLOPs. Compute time = 520 GFLOPs
    / 65 TFLOPS = 8ms. Memory load (220MB weights) = 220MB / 320 GB/s = 0.69ms. Since 8ms > 0.69ms, BS=32
    is compute-bound. At BS=256, compute time = 256 x 16.25 / 65T = 64ms. Throughput remains (256 req
    / 0.064 sec) = 4,000 req/sec, but latency degrades from 8ms to 64ms.
