title: The Over-Batched T4 Throughput Plateau
scenario: A cloud service generates embeddings using a BERT-base model on T4 GPUs. To maximize throughput, the team increases the dynamic batch size from 32 to 256. Throughput (requests/sec) scales linearly up to batch 32. However, from batch 32 to 256, throughput flatlines completely at ~4,000 req/sec, while P99 latency spikes drastically from 10ms to 80ms.
question: Why does increasing BERT-base batch size from 32 to 256 flatline throughput while P99 latency spikes on T4?
details:
  realistic_solution: The workload has crossed the roofline inflection point (the ridge point). At small batch sizes, the workload is memory-bandwidth bound. Increasing batch size increases Arithmetic Intensity (reusing the same loaded weights across multiple inputs), moving the workload up the sloped roofline and increasing throughput. Around batch size 32, the Arithmetic Intensity hits the ridge point of the T4 GPU, and the workload becomes strictly compute-bound. Further increasing the batch size to 256 provides no additional throughput because the GPU is already operating at its maximum 65 TFLOPS ceiling. It merely queues up computation, proportionately increasing latency without gaining throughput.
  common_mistake: |
    **The Pitfall:** Assuming that increasing batch size will always increase hardware utilization and throughput.
    **The Rationale:** Candidates conflate memory-bound scaling with compute-bound scaling, forgetting about the hardware's compute ceiling.
    **The Consequence:** Inducing severe latency regressions without gaining any additional throughput by artificially queueing requests.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - T4 Compute Ceiling: 65 TFLOPS.
    2. **Calculations:**
       - Workload per request: 65 TFLOPS / 4000 req/sec = 16.25 GFLOPs.
       - Batch 32 Compute Time: (32 * 16.25 GFLOPs) / 65 TFLOPS = 8ms.
       - Batch 256 Compute Time: (256 * 16.25 GFLOPs) / 65 TFLOPS = 64ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Throughput capped at 4,000 req/sec, but latency degrades to 64ms due to queuing.**
