math_issues:
- The global link traffic calculation (4 GB / 240 = 16.7 MB) mistakenly computes the traffic of a single
  GPU. With 1024 GPUs sending 4 GB each, total network traffic is 4096 GB, making traffic per link roughly
  17 GB, not 16.7 MB.
