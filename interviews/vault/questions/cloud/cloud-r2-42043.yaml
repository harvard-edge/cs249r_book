title: Adaptive Routing in Dragonfly Under Adversarial Traffic
scenario: Your 2048-GPU dragonfly cluster runs a mixture of training jobs. A large 1024-GPU AllReduce
  creates adversarial traffic that saturates global links, degrading a separate 256-GPU job sharing the
  same dragonfly groups. Design the adaptive routing strategy and job placement policy to prevent cross-job
  interference.
details:
  realistic_solution: Total traffic = 1024 GPUs × 4GB = 4,096 GB. Per global link = 4,096GB / 240 links
    = 17 GB (not 16.7 MB — MB vs GB unit error by 1000×).
  common_mistake: Relying on minimal routing (direct path) in dragonfly. Under adversarial traffic patterns
    like AllReduce, minimal routing concentrates all traffic on a few global links, causing severe congestion.
    Non-minimal (Valiant) routing spreads load but doubles latency.
  napkin_math: 'Total gradient traffic in 1024-GPU cluster: each GPU sends 4GB gradient. Total traffic
    = 1024 × 4GB = 4096 GB. Global rail links in fat-tree: ~240 uplinks at the spine layer. Per global
    link: 4096GB / 240 = 17.1 GB ≈ 17 GB (not 16.7 MB — that would require only 4MB total traffic across
    all 1024 GPUs, which is impossible for 4GB per GPU).'
