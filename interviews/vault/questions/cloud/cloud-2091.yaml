title: Prefill vs Decode Compute Profile
scenario: During LLM inference, the prefill phase processes the entire prompt and the decode phase generates
  tokens one at a time. Explain why prefill is compute-bound while decode is memory-bandwidth-bound, using
  arithmetic intensity as the framework.
question: "Why is LLM prefill compute-bound while decode is memory-bandwidth-bound when viewed through arithmetic intensity?"
details:
  realistic_solution: 'Prefill: processes all $S$ prompt tokens in one batched matrix multiply. For a
    weight matrix $W$ of size $d \times d$, it computes $X_{S \times d} \cdot W_{d \times d}$ — each weight
    is reused $S$ times. Arithmetic intensity: $2Sd^2 / (S \cdot d + d^2) \cdot$ bytes $\approx 2d / (1
    + d/S)$ FLOPs/byte — very high for large $S$, compute-bound. Decode: processes 1 token, computing
    $x_{1 \times d} \cdot W_{d \times d}$ — a matrix-vector product. Each weight is used exactly once.
    AI: $2d^2$ FLOPs / $2d^2$ bytes (in FP16) = $1$ FLOP/byte — deeply memory-bound.'
  common_mistake: 'Thinking both phases have the same bottleneck because they run the same model architecture.
    The key difference is the effective batch dimension: prefill processes S tokens simultaneously while
    decode processes 1 token at a time.'
  napkin_math: 'Prefill (S=2048): Arithmetic Intensity (AI) ≈ 2*S*d^2 / (d^2*2 bytes) ≈ S = 2048 FLOPs/byte.
    Since 2048 > A100 ridge point (156 FLOPs/byte), prefill is compute-bound. Decode (S=1): AI ≈ 2*1*d^2
    / (d^2*2 bytes) = 1 FLOP/byte. 1 < 156 FLOPs/byte, so decode is bottlenecked by HBM bandwidth (2.0
    TB/s limit).'
