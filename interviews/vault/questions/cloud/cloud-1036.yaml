title: Quantifying Covariate Shift with PSI
scenario: A cloud recommendation system trained on US data is deployed to Europe. The US age distribution is [20% <25, 50% 25-45, 30% >45]. European sampled requests show an age distribution of [10% <25, 40% 25-45, 50% >45].
question: What is the PSI for the European age distribution versus the US baseline, and how severe is the shift?
details:
  realistic_solution: 'Calculate PSI to quantify the input drift. A PSI between 0.1 and 0.2 indicates a moderate shift. Instead of a full scratch retrain, apply importance weighting (Target/Reference density ratio) to existing data during fine-tuning.'
  common_mistake: |
    **The Pitfall:** Confusing covariate shift with concept drift.
    **The Rationale:** A drop in performance often triggers the instinct to fully retrain the model.
    **The Consequence:** Proceeding with unnecessary and expensive full-model retraining from scratch, instead of correctly applying data importance re-weighting for the new population.
  napkin_math: |
    **Assumptions & Constraints:**
    - Reference (US) = [0.20, 0.50, 0.30].
    - Target (EU) = [0.10, 0.40, 0.50].
    - PSI = Σ (Target_i - Reference_i) × ln(Target_i / Reference_i).

    **Calculations:**
    - Bin 1 (<25): (0.10 - 0.20) × ln(0.1 / 0.2) ≈ -0.10 × -0.693 = 0.069.
    - Bin 2 (25-45): (0.40 - 0.50) × ln(0.4 / 0.5) ≈ -0.10 × -0.223 = 0.022.
    - Bin 3 (>45): (0.50 - 0.30) × ln(0.5 / 0.3) ≈ 0.20 × 0.511 = 0.102.

    **Conclusion & Interpretation:**
    - **Result: Covariate Shift.** Total PSI = 0.069 + 0.022 + 0.102 = 0.193. A PSI near 0.20 indicates a moderate covariate shift requiring importance re-weighting.
