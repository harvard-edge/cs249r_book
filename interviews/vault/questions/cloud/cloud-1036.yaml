title: Quantifying Covariate Shift with PSI
scenario: A cloud-based recommendation system trained on 100M US user interactions is deployed to a new
  European market. While the underlying purchase behavior P(Y|X) remains constant, the user age distribution
  P(X) has changed significantly. The US training data (Reference) age distribution is [20% <25, 50% 25-45,
  30% >45]. In the European market (Target), 10,000 sampled requests show an age distribution of [10%
  <25, 40% 25-45, 50% >45]. Calculate the Population Stability Index (PSI) to determine the severity of
  the shift.
question: "What is the PSI for the European age distribution [10%, 40%, 50%] versus the US baseline [20%, 50%, 30%], and how severe is the shift?"
details:
  realistic_solution: Calculate PSI to quantify the input drift. A PSI between 0.1 and 0.2 indicates a
    moderate shift. Instead of a full scratch retrain, apply importance weighting (Target/Reference density
    ratio) to existing data during fine-tuning.
  common_mistake: Confusing covariate shift with concept drift, leading to unnecessary and expensive full-model
    retraining instead of data re-weighting or collecting more specific data for underrepresented segments.
  napkin_math: 'PSI = Σ (Target_i - Reference_i) * ln(Target_i / Reference_i)

    Bin 1 (<25): (0.10 - 0.20) * ln(0.1/0.2) ≈ -0.10 * -0.693 = 0.069

    Bin 2 (25-45): (0.40 - 0.50) * ln(0.4/0.5) ≈ -0.10 * -0.223 = 0.022

    Bin 3 (>45): (0.50 - 0.30) * ln(0.5/0.3) ≈ 0.20 * 0.511 = 0.102

    Total PSI = 0.069 + 0.022 + 0.102 = 0.193 (Approaching 0.2, moderate shift)'
