title: Optimizing 7B LLM Inference on Google TPU v5e via AOT Compilation
scenario: You are tasked with optimizing the inference latency of a 7 billion parameter large language model (LLM) on a single Google TPU v5e. You need to achieve a target latency of 50ms per token generation. Describe in detail how you would leverage ahead-of-time (AOT) compilation and specific techniques like operator lowering and constant folding within a framework compiler (e.g., XLA, TVM) to meet the latency target.
question: How would you use AOT compilation, operator lowering, and constant folding to hit 50 ms per token for a 7B LLM on one TPU v5e?
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach orchestrated by the AOT compiler: 1. **Model Quantization & Pruning**: Apply quantization (e.g., to BF16 or INT8 if accuracy permits) to reduce the model''s memory footprint. This shrinks the amount of data transferred, effectively increasing arithmetic intensity and memory bandwidth utilization. Structured pruning could also be applied to reduce model size further. 2. **Operator Fusion and Lowering**: The AOT compiler (like XLA) would aggressively fuse multiple small operations (e.g., `matmul`, `add`, `relu`) into larger, monolithic kernels. This reduces memory accesses for intermediate values and improves cache locality, mapping directly to TPU''s systolic array efficiently. Lowering would translate these high-level fused operations into TPU-specific instructions that leverage hardware features like custom instructions or specialized memory access patterns. 3. **Constant Folding and Dead Code Elimination**: During compilation, static parts of the computational graph (e.g., pre-calculated attention masks or fixed scaling factors) are computed once and embedded as constants, eliminating runtime overhead. Unreachable or unused parts of the graph are identified and removed, reducing the overall computational load. 4. **Static Memory Allocation & Layout Optimization**: The compiler would pre-allocate memory for activations and intermediate results, optimizing data placement in HBM to minimize contention and maximize sequential access. This includes tensor layout transformations (e.g., tiling) to match TPU''s memory access patterns. 5. **Pipelining**: For multi-layer models, the compiler could pipeline different layers or stages of inference, ensuring the TPU''s compute and memory units are continuously busy.'
  common_mistake: |
    **The Pitfall:** Primarily focusing on maximizing floating-point operations per second (FLOPs) utilization.
    **The Rationale:** Engineers often assume that large models are naturally compute-bound because they require billions of operations.
    **The Consequence:** Optimizing compute kernels while ignoring that memory bandwidth (data movement of weights and activations) is the true limiting factor for low-batch inference.
  napkin_math: |
    - **Model Size (7B BF16):** 7 * 10^9 params * 2 bytes/param = 14 GB.
    - **Data Movement (Single Token):** Rough estimate for total data movement = weights + activations = 3x model size = 3 * 14 GB = 42 GB.
    - **Memory Bandwidth Time:** 42 GB / 1.6 TB/s = (42 * 10^9) / (1.6 * 10^12) = 0.02625 seconds = 26.25 ms.
    - **Compute Requirement:** 7B transformer ≈ 2 FLOPs per parameter per token = 14 GFLOPs.
    - **Compute Time:** 14 GFLOPs / 197 TFLOPS = (14 * 10^9) / (197 * 10^12) = 0.000071 seconds = 0.071 ms.
    - **Conclusion:** The memory bandwidth time (26.25 ms) massively dwarfs compute time (0.071 ms), proving that single-token inference on TPU v5e is severely **memory-bound**.
