title: Optimizing 7B LLM Inference on Google TPU v5e via AOT Compilation
scenario: You are tasked with optimizing the inference latency of a 7 billion parameter large language model (LLM) on a single TPU. You need to achieve a target latency of 50ms per token generation.
question: How would you use AOT compilation, operator lowering, and constant folding to hit 50 ms per token for a 7B LLM on one TPU?
details:
  realistic_solution: 'Employ an AOT compiler (e.g., XLA) to fundamentally alter the memory access patterns. 1. **Operator Fusion**: Fuse elementwise ops (Add, ReLU) with preceding MatMuls into single XLA HLO instructions to keep activations entirely in SRAM, eliminating round-trips to HBM. 2. **Constant Folding & Lowering**: Statically pre-compute attention masks during compilation and lower high-level ops to TPU-specific systolic array instructions (MXUs). 3. **Quantization**: Apply INT8 or INT4 weight-only quantization (W8A16 or W4A16) to physically shrink the memory footprint, drastically increasing arithmetic intensity and mitigating the HBM bandwidth wall.'
  common_mistake: |
    **The Pitfall:** Primarily focusing on maximizing floating-point operations per second (FLOPs) utilization and tuning math kernels.
    **The Rationale:** Engineers often assume that large models are compute-bound because they require billions of matrix operations.
    **The Consequence:** Optimizing compute kernels while ignoring that HBM memory bandwidth (data movement of weights and activations) is the true physical limit for low-batch autoregressive decode.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 7B parameters.
       - Precision: BF16 (2 bytes/param).
       - Hardware: TPU v5e (197 TFLOPS, 1.6 TB/s HBM bandwidth).
    2. **Calculations:**
       - Weight Payload: 7B * 2 Bytes = 14 GB.
       - Total Data Movement (Single Token): Weights + Activations = ~3x Model Size = 42 GB.
       - Memory Bandwidth Time: 42 GB / 1.6 TB/s = 26.25 ms.
       - Compute Requirement: ~2 FLOPs/param/token = 14 GFLOPs.
       - Compute Time: 14 GFLOPs / 197 TFLOPS = 0.071 ms.
    3. **Conclusion & Interpretation:**
       - **The memory bandwidth time (26.25 ms) massively dwarfs the compute time (0.071 ms). Result: Memory-Bandwidth Bound.**
