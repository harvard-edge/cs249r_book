title: Chunked Prefill Optimal Chunk Size Selection
scenario: A disaggregated serving system uses chunked prefill to interleave prefill and decode work on
  prefill GPUs. The chunk size is currently 256 tokens. Requests with 2048-token prompts show poor TTFT
  due to 8 chunks. Analyze the chunk size tradeoff and find the optimal value.
question: "What chunk size would you choose for 2048-token prompts, and how does it trade TTFT against decode TPOT?"
details:
  realistic_solution: 'Chunked prefill tradeoff: small chunks (64-256 tokens) interleave decode work frequently,
    keeping TPOT low but adding scheduling overhead per chunk. Large chunks (512-2048) reduce overhead
    but block decode tokens for longer. Optimal chunk size formula: chunk_size = sqrt(decode_batch_size
    * decode_time_per_token / scheduling_overhead). In practice, chunk_size 512-1024 is optimal for most
    workloads. For 2048-token prompt: at chunk=256: 8 chunks * (256-token prefill time + scheduling_overhead).
    At chunk=512: 4 chunks * 512-token prefill time. With H100, 512-token chunk prefill time on 70B: 2*512*70B/989T
    = 72.5ms. 4 chunks: 4*72.5 = 290ms TTFT. At chunk=256: 2*256*70B/989T = 36.3ms. 8 chunks: 8*36.3 =
    290ms. Same! But scheduling overhead favors larger chunks. Optimal: 512-1024 for 70B. For smaller
    models: chunk=256-512.'
  common_mistake: Maximizing chunk size to minimize TTFT, not considering that large chunks starve decode
    tokens from being processed, increasing token generation latency (TPOT) for already-running requests.
    The tradeoff between TTFT and TPOT depends on the SLO priorities.
  napkin_math: 'H100 prefill throughput at different chunk sizes: chunk_size * 2 * model_params FLOP /
    H100 TFLOPS. 70B model: chunk=128: 2*128*70B = 17.9T FLOP / 989T = 18.1ms. chunk=256: 36.1ms. chunk=512:
    72.2ms. chunk=1024: 144.4ms. Scheduling overhead per chunk (kernel launch, memory allocation): ~0.5ms.
    For 2048-token prompt: total TTFT = (2048/chunk) * (compute + overhead). At chunk=512: 4 * 72.7 =
    290.8ms. At chunk=1024: 2 * 144.9 = 289.8ms — nearly same. At chunk=2048 (single): 288.8ms — minimal
    benefit over 1024. Use chunk=512 for best interleaving with decode.'
