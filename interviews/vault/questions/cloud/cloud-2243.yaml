title: Actor Model vs BSP for Data Processing Pipelines
scenario: 'Your team preprocesses training data using a Spark (BSP) pipeline: read raw text, tokenize,
  filter by quality score, write shards. The pipeline processes 2 TB/hour on a 100-node cluster. A colleague
  proposes rewriting it in Ray (actor model) because ''actors are more flexible.'' Under what conditions
  would the actor-model approach outperform BSP for data processing, and when would it be strictly worse?'
question: "Under what conditions would the actor-model approach outperform BSP for data processing, and when would it be strictly worse?"
details:
  realistic_solution: 'BSP (Spark) excels at homogeneous, shuffle-heavy workloads: joins, aggregations,
    sort-based deduplication. The barrier synchronization enables the query optimizer to plan globally
    optimal data movement. The actor model (Ray) excels at heterogeneous, stateful, and irregular workloads:
    when different documents need different processing (e.g., some need OCR, some need language detection,
    some need decompression), when processing time varies 100× across documents, or when the pipeline
    has complex branching logic. BSP handles stragglers poorly — every stage waits for the slowest task.
    Actor model handles stragglers naturally — fast actors pull more work from a shared queue. For the
    described pipeline (read → tokenize → filter → write), BSP is superior: the operations are uniform,
    embarrassingly parallel, and benefit from Spark''s optimized I/O and shuffle. Switch to actors only
    when processing is heterogeneous or stateful.'
  common_mistake: '"Actors are always faster because they avoid the synchronization barriers of BSP."
    This ignores that BSP''s synchronization barriers enable global optimizations (sort-merge joins, optimal
    shuffle planning) that actors cannot do without explicit coordination.'
  napkin_math: 'Uniform pipeline (tokenize + filter): BSP overhead per stage = ~2s barrier sync × 4 stages
    = 8s overhead per batch. Actor overhead per task = ~0.5ms scheduling × 2B tasks = ~280 hours cumulative
    — but amortized across 100 nodes = 2.8 hours wall time. BSP wins on uniform work. Heterogeneous pipeline
    (some docs need 10ms, others 10s): BSP straggler in a 100-task stage (1 task per node) = max(100 draws
    from [10ms, 10s]) ≈ 10s. 99 nodes idle for 9.99s. Actor model: no idle time, each actor pulls next
    task immediately.'
  options:
  - SyncBN is unnecessary because batch normalization statistics only depend on the current sample, not
    the batch; each GPU can compute BN independently with identical results
  - 'Batch normalization (BN) computes mean and variance across the batch dimension. In distributed training,
    each GPU sees a local mini-batch. SyncBN performs an AllReduce to compute global mean/variance across
    all GPUs every forward pass, ensuring BN statistics are identical. Cost: 2 AllReduce ops (mean, variance)
    per BN layer per step. Without SyncBN, each GPU uses local stats → different effective models → training
    divergence.'
  - SyncBN sends the full activation tensors to a master GPU for centralized mean/variance computation;
    this requires O(batch × features) communication per BN layer
  - SyncBN is only needed during the first epoch when the running statistics are being initialized; after
    sufficient running average accumulation, local BN produces identical results to SyncBN
  correct_index: 1
