title: 'Fault Tolerance: Mastery — Design Full Fault Tolerance Architecture for 1000-GPU Training'
scenario: 'You are responsible for reliability engineering for a 3-month training run of a 500B parameter
  model on 2,048 H100s (80GB HBM3, 700W). Expected GPU failure rate: 1 per 150 days. Design the complete
  fault tolerance architecture: checkpointing, failure detection, recovery automation, and spare capacity
  management. The run must complete with > 95% uptime.'
question: "What fault-tolerance architecture for checkpointing, detection, recovery, and spares will keep the 500B, 2,048-H100 run above 95% uptime?"
details:
  realistic_solution: 'Full FT architecture: (1) Async sharded checkpoint every 60 min. (2) Health monitoring:
    heartbeat every 30s, GPU telemetry (temp, ECC errors as precursor). (3) Hot standby: 64 spare GPUs
    (3% reserve). (4) Automatic replacement: failed node → spare → rejoin from checkpoint in < 15 min.
    (5) Proactive replacement: ECC error rate > threshold → swap before failure.'
  common_mistake: Treating fault tolerance as only a checkpointing problem; not designing automatic recovery
    and spare GPU provisioning.
  napkin_math: '2,048 GPUs. MTBF per GPU: 150 days. Expected failures in 90 days: 2,048 × (90/150) = 1,229
    GPU failures. With proactive replacement catching 70%: 369 surprise failures. Without spares: each
    failure halts training for recovery. Recovery time: checkpoint restore (checkpoint size: 500B × 4B/4
    [ZeRO-3 shard] = 500GB total, each of 2048 nodes writes 244MB → 0.12 seconds), rejoin collective ops:
    5 minutes. 369 × 5min = 1,845 minutes = 1.28 days lost. With 64 hot spares: failed node → hot spare
    preloaded with model shard → 2 minutes. 369 × 2min = 738 minutes = 0.51 days. Uptime: (90 days - 0.51
    days) / 90 = 99.4% > 95% target. Spare cost: 64 × $3/hr × 2,160hr = $414,720 for 3 months.'
