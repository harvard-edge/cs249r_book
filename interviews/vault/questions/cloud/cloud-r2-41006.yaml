title: AllReduce vs AllGather Cost in TP
scenario: On an 8×MI300X node with Infinity Fabric interconnect, compare the communication volume of AllReduce
  and AllGather for a tensor of size M bytes across P GPUs using a ring algorithm. Which one does Megatron's
  row-parallel layer use, and which does the column-parallel layer use?
question: "For M bytes across P GPUs on 8×MI300X, what are ring AllReduce vs AllGather volumes, and which does Megatron use for row vs column layers?"
details:
  realistic_solution: 'Ring AllGather: each GPU sends its local shard (M/P bytes) around the ring in P-1
    steps. Total bytes per GPU = (P-1) × M/P ≈ M for large P. Ring AllReduce: equivalent to ReduceScatter
    + AllGather. Total bytes per GPU = 2 × (P-1)/P × M ≈ 2M for large P. So AllReduce costs roughly 2×
    AllGather. In Megatron: column-parallel forward uses AllGather (concatenate partial outputs), row-parallel
    forward uses AllReduce (sum partial results). In the backward pass, the collectives swap: column-parallel
    backward uses ReduceScatter, row-parallel backward uses AllReduce. The fused column→row design means
    you pay 1 AllReduce per MLP/Attention block in forward, and 1 AllReduce in backward = 2 AllReduces
    total per block per training step.'
  common_mistake: Thinking AllReduce and AllGather have very different costs. In a ring implementation,
    both transfer approximately 2(P-1)/P × M bytes total across the ring, making them nearly equal for
    large P.
  napkin_math: 'M = 32 MB, P = 8. AllGather per GPU: 7/8 × 32 = 28 MB. AllReduce per GPU: 2 × 7/8 × 32
    = 56 MB. AllReduce is 2× the traffic of AllGather.'
