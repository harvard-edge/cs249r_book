title: 'Pipeline Parallelism Specification: Inter-Stage Communication Budget'
scenario: Design the inter-stage communication schedule for a 16-stage H100 pipeline (80GB HBM3, 400Gb/s
  InfiniBand between nodes) training a 1T parameter model. Each stage boundary must transfer activations
  and gradients. Specify the communication volume per step, required bandwidth, and whether 400Gb/s IB
  is sufficient. Assume sequence length 4096, global batch size 512, micro-batch size 4.
details:
  realistic_solution: 'Hidden dim for 1T model: ~16384. Activation tensor per micro-batch: 16384 * 4096
    * 4 (micro-batch) * 2 bytes = 537MB. Gradient tensor (same shape): 537MB. Each stage boundary transfers
    537MB forward + 537MB backward = 1.07GB per micro-batch. With m = 512/4 = 128 micro-batches: 128 *
    1.07GB = 137GB per stage boundary per step. Step time target: ~1 second. Required bandwidth: 137GB/s
    per boundary. 400Gb/s IB = 50GB/s. Massively insufficient — need NVLink topology or split communication
    across multiple IB links.'
  common_mistake: Confusing one-way activation transfer with the bidirectional requirement (forward activation
    sent downstream, backward gradient sent upstream), and not accounting for all m/DP micro-batches in
    flight.
  napkin_math: 'Hidden dim (1T model estimate): 16384. Activation per micro-batch: 16384 * 4096 * 4 *
    2 = 537MB. Bidirectional per boundary: 537*2 = 1074MB. m = 512/4 = 128 micro-batches. Total per boundary
    per step: 128 * 1074MB = 134GB. At 400Gb/s = 50GB/s: time to transfer = 134/50 = 2.68 seconds. If
    step time = 1s, communication is 268% of step time — completely infeasible. Require NVLink (600GB/s)
    or hierarchical comm strategy.'
