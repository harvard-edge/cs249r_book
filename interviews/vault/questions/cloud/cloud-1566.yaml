title: Diagnosing Observability OOM Cascades
scenario: A Kubernetes cluster serving a transformer ranking model (10k QPS per pod) is experiencing cascade failures. The API pods are frequently evicted due to OOM errors, but GPU memory is stable at 14GB/16GB. The team recently updated the Prometheus `inference_latency_seconds` histogram to include labels for `model_version` (3 variants), `client_platform` (4 types), `country_code` (195), and `tenant_id` (10,000 unique B2B clients).
question: "Why are the pods running out of memory, and how do you fix it?"
details:
  realistic_solution: Identify that the high cardinality of the `tenant_id` label is causing Prometheus to create millions of unique time series in memory. Fix this by dropping `tenant_id` from the metric labels and moving high-cardinality tracking to structured logs or distributed trace exemplars.
  common_mistake: |
    **The Pitfall:** Focusing entirely on the model's memory footprint or batch size.
    **The Rationale:** Assuming OOMs in ML services are always caused by PyTorch/CUDA tensors.
    **The Consequence:** Wasting time tuning model parameters while the observability sidecar silently consumes hundreds of gigabytes of host RAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Labels: 3 versions, 4 platforms, 195 countries, 10,000 tenants.
       - Prometheus Memory Cost: ~10KB per active time series.
    2. **Calculations:**
       - Unique Time Series = 3 * 4 * 195 * 10,000 = 23,400,000.
       - Memory Required = 23.4M * 10KB = 234 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 234 GB RAM (High-Cardinality-Bound).** The multiplicative explosion of metric labels instantly blows past the CPU memory limits of standard API pods, causing the OOM evictions.
