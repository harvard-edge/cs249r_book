title: Fat-Tree Oversubscription Tradeoff
scenario: You are designing a 16,384 GPU cluster using 400 Gbps RoCEv2. A fully non-blocking (1:1) 3-tier
  fat-tree requires 768 spine switches and 24,576 optical transceivers. A 2:1 oversubscribed fat-tree
  reduces spine switch and transceiver count by 50%, saving $15M. However, your workloads heavily rely
  on Ring All-Reduce for 2 GB gradient synchronizations. Evaluate the tradeoff between the $15M CAPEX
  saving and the impact on All-Reduce latency.
details:
  realistic_solution: A 2:1 oversubscription halves the cluster's bisection bandwidth. However, Ring All-Reduce
    does not utilize full bisection bandwidth simultaneously across the entire cluster if scheduled properly.
    In a ring topology mapped to a fat-tree, each node only needs 1 send and 1 receive connection. If
    the ring is localized within pods (which are 1:1 internally) and only crosses the oversubscribed spine
    minimally, the impact is mitigated. However, for a 16k GPU cluster, a single ring is highly inefficient
    due to latency (16k hops). Workloads will use Hierarchical All-Reduce (e.g., intra-node NVLink, intra-pod
    RoCE, inter-pod RoCE). If the inter-pod step spans the 2:1 spine, the bandwidth drops from 400 Gbps
    (50 GB/s) to 200 Gbps (25 GB/s) per GPU. Transferring 2 GB at 25 GB/s vs 50 GB/s adds 40ms per step.
    For a 100k iteration LLM training run, this adds ~4000 seconds (~1.1 hours). The tradeoff strongly
    favors the 2:1 oversubscription, as saving $15M for only a 1.1-hour training time penalty on a multi-month
    run is highly cost-effective, provided traffic engineering ensures optimal routing to avoid hotspot
    congestion.
  common_mistake: Assuming 2:1 oversubscription doubles the All-Reduce latency because bisection bandwidth
    is halved, leading to a linear increase in training time.
  napkin_math: 400 Gbps RoCEv2 = 50 GB/s per link. A 1:1 non-blocking fat-tree provides 50 GB/s inter-rack.
    A 2:1 oversubscribed tree halves spine bandwidth to 25 GB/s. Transferring a 2GB gradient tensor takes
    2GB / 50GB/s = 40ms on 1:1, but 80ms on 2:1. This adds a 40ms penalty per training step. Over a standard
    100,000 step run, 40ms * 100,000 = 4,000s = 1.1 hours added. 50% switch savings justify a 1hr delay.
