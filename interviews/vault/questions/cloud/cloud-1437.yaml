title: Intersectional Bias Mitigation in Identity APIs
scenario: A cloud identity verification API processes 5M requests/day using a ResNet-101 model on NVIDIA T4 GPUs. The model achieves 99.2% overall accuracy and satisfies demographic parity across gender (99.0% vs 99.3%) and skin tone (98.9% vs 99.4%) independently. An audit reveals the false rejection rate (FRR) for darker-skinned females is 12.5%, compared to 0.5% for lighter-skinned males.
question: What remediation would you choose for the 12.5% FRR intersectional gap given a 3-month data delay and 280ms MoE latency?
details:
  realistic_solution: Implement a Minimax optimization objective during fine-tuning to explicitly minimize the loss of the worst-performing intersectional subgroup, accepting a slight degradation in overall accuracy (e.g., to 98.7%) to reduce the worst-case FRR below 2%, which avoids architecture changes that violate the 200ms serving SLO.
  common_mistake: |
    **The Pitfall:** Assuming that achieving demographic parity on individual marginal distributions guarantees fairness across their intersections.
    **The Rationale:** Engineers rely on high-level aggregate metrics and fail to disaggregate performance across overlapping identity groups.
    **The Consequence:** Deploying a model that systematically discriminates against a specific intersectional subgroup, leading to compliance violations and severe reputational damage.
  napkin_math: |
    - Assume 1M training images with marginals P(Female) = 0.5 and P(Dark) = 0.5.
    - Independent probability: P(Female ∩ Dark) = 0.25.
    - If actual joint distribution is skewed: P(Female ∩ Dark) = 0.04 (40k images).
    - In a batch size of 256: only ~10 samples/batch for this subgroup.
    - **Conclusion: Achieving stable gradients for this subgroup requires 5x oversampling, risking severe overfitting unless addressed via Group DRO.**
