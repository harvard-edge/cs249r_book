title: Memory Overhead of Teacher Logits in LLM Distillation
scenario: You are setting up a knowledge distillation pipeline to train a 7B parameter student LLM from
  a frozen 70B parameter teacher LLM. Both models share a vocabulary size of 100,000 tokens. The training
  configuration uses a micro-batch size of 16 and a sequence length of 2048. Calculate the GPU memory
  required purely to materialize the teacher's output logits for the KL-divergence loss calculation, assuming
  FP32 precision is required for numerical stability during temperature scaling.
question: "How much GPU memory is needed to materialize the teacher's FP32 logits for one 16×2048 micro-batch over a 100,000-token vocabulary?"
details:
  realistic_solution: 'Calculate the dense logit tensor shape: [Batch, SeqLen, VocabSize]. Multiply by
    4 bytes for FP32. This isolated memory requirement must be added to the teacher''s weight memory (140GB
    in FP16) and the student''s training state when provisioning the GPU nodes.'
  common_mistake: Candidates often calculate memory based solely on model weights, forgetting that the
    teacher's full vocabulary logit tensor must be materialized for every token in the batch, or they
    incorrectly assume FP16 is sufficient for the temperature-scaled Softmax.
  napkin_math: 'Teacher logits shape: [batch, seq, vocab] = [16, 2048, 100,000]. Total elements = 16 *
    2048 * 100,000 = 3,276,800,000. Assuming FP32 for numerically stable KL-divergence loss, size = 3.2768B
    * 4 bytes = 13.1 GB per micro-batch. Storing these raw logits for a 70B teacher significantly pressures
    VRAM, taking 13.1 GB strictly for teacher targets before student activations.'
