title: The TCO of Privacy
scenario: 'You are on a team building a new smart keyboard app for 10 million daily users. To improve autocorrect, you estimate each user generates about 1MB of training data per day. The team is debating two architectures: centralized cloud training versus federated learning. Assume cloud data transfer costs $0.02/GB.'
question: 'What annual data-transfer cost would centralizing 10M users'' 1MB/day create, and how much would FL avoid?'
details:
  realistic_solution: 'The correct approach is to calculate the total data volume per day, convert it to GB, determine the daily cost, and then scale it to an annual figure. The key insight is that while the federated approach adds engineering complexity, it can drastically reduce operational costs related to data movement. This $70,000+ annual saving for the FL approach is a significant part of the TCO and can justify the additional engineering investment in a privacy-preserving system.'
  common_mistake: |
    **The Pitfall:** Focusing only on compute costs and forgetting data movement.
    **The Rationale:** Engineers often tunnel-vision on training cluster pricing, viewing data ingestion as a free or trivial prerequisite.
    **The Consequence:** They drastically underestimate the Total Cost of Ownership (TCO), missing the massive daily egress/ingress fees that federated learning fundamentally avoids.
  napkin_math: |
    * **Total daily data:** 10,000,000 users * 1 MB/user = 10,000,000 MB/day.
    * **Convert to TB:** 10,000,000 MB = 10,000 GB = 10 TB/day.
    * **Annualize Data:** 10 TB/day * 365 days = 3,650 TB/year.
    * **Cost calculation:** 3,650,000 GB * $0.02/GB = **$73,000 per year.**
  options:
  - $7,300 per year
  - $200 per year
  - $73,000 per year
  - $730 per year
  correct_index: 2
