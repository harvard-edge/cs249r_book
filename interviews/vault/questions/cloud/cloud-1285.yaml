title: Evaluating Storage Architecture to Eliminate CV Training Feeding Tax
scenario: You are designing the storage architecture for a distributed computer vision training cluster. A single node with 8x A100 GPUs trains a Vision Transformer on a 50TB dataset of high-resolution images. Profiling shows GPU utilization is stuck at 35% with dataloader workers spending most of their time in I/O wait. The current pipeline fetches raw JPEGs (average 300KB) from a centralized NFS cluster over a shared 25 Gbps network link, decoding them on the CPU.
question: Would you upgrade to 100 Gbps with WekaFS or add local NVMe caching with WebDataset, and why?
details:
  realistic_solution: Implement local NVMe caching with WebDataset. The 25 Gbps link provides at most ~3 GB/s theoretical bandwidth, but random reads of 300KB files over NFS yield much less (~0.5 GB/s effective). Packing images into 100MB+ tarballs (WebDataset format) maximizes sequential read throughput. Local NVMe caching sustains >3 GB/s, fully eliminating the 1.5 GB/s feeding requirement without expensive networking upgrades.
  common_mistake: |
    **The Pitfall:** Relying on adding more dataloader CPU workers to mask latency, or upgrading the network pipe without addressing the file access pattern.
    **The Rationale:** Ignoring the massive IOPS overhead of millions of small-file random reads over NFS.
    **The Consequence:** Spending heavily on 100 Gbps networking while still failing to saturate the GPUs because the random IOPS bottleneck remains.
  napkin_math: |
    - GPU demand: 8x A100 processing 5,000 imgs/sec total * 300 KB/img = 1.5 GB/s required bandwidth.
    - 25 Gbps link theoretical max: 3.125 GB/s.
    - NFS random read overhead drops effective throughput to ~0.5 GB/s, causing the 35% GPU utilization (0.5 / 1.5 = 33%).
    - Local NVMe + WebDataset sequential reads sustain >3.0 GB/s.
    - **Local NVMe caching with WebDataset fully eliminates the 1.5 GB/s feeding tax without expensive networking upgrades.**
