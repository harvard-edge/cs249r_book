title: TCO Design: Spot vs On-Demand vs Reserved Instance Strategy
scenario: 'Design a cost-optimal GPU procurement strategy for a company training LLMs 24/7. Requirements: 90% availability, 1000 H100-hours/day, fault-tolerant training. Spot H100: $0.75/hr (30% interruption rate per hour), On-Demand: $2.50/hr, 1-year Reserved: $1.50/hr, 3-year Reserved: $1.00/hr.'
question: 'What fleet mix of Spot, On-Demand, and Reserved H100s meets 90% availability for 1000 H100-hours/day, and what is the effective cost per H100-hour?'
details:
  realistic_solution: 'Spot availability: P(not interrupted in 1hr) = 0.7. For training, each interruption incurs a checkpoint rollback and restart overhead (e.g., 45 minutes lost per interruption). With a 30% hourly interruption rate, effective yield = 1 hr - (0.3 interruptions * 0.75 hrs lost) = 0.775 effective hours per billed Spot-hour. Cost per effective H100-hour: $0.75 / 0.775 = $0.968/effective-hr. Reserve + Spot mix: 70% Reserved (guaranteed base load), 30% Spot (burst). 700 H100-hr/day reserved at $1.00/hr = $700/day. 300 H100-hr/day spot at $0.968 effective = $290.40/day. Total: $990.40/day for 1000 effective H100-hours. Effective cost: ~$0.99/hr — beats on-demand by 60%.'
  common_mistake: |
    **The Pitfall:** Using all Spot instances without modeling the checkpoint recovery overhead.
    **The Rationale:** Naively multiplying $0.75 by 1000 without accounting for the fact that a 30% interruption rate severely degrades throughput.
    **The Consequence:** Missing deadlines due to constant rollbacks and underestimating the true cost of spot instances for training.
  napkin_math: |
    - **Spot Effective Yield:** 1 hr - (0.3 interruptions × 0.75 hrs lost per interrupt) = 0.775 effective hours per billed Spot-hour.
    - **Effective Spot Cost:** $0.75 / 0.775 = $0.968/effective-hr.
    - **Reserve + Spot Mix:** 70% Reserved ($1.00/hr) + 30% Spot ($0.968/hr) = 90% guaranteed baseline.
    - **Daily Cost:** 700 Reserved hrs × $1.00 + (300 effective / 0.775) actual spot hrs × $0.75 = $700 + $290.32 = $990.32/day.
    - **Effective Blended Cost:** ~$0.99/hr (beats on-demand by 60%).
