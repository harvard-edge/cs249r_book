title: The Inference Compiler Optimization
scenario: You compile your 7B LLM with TensorRT before deploying on an H100. The model has 1,200 individual
  operations in eager PyTorch. After TensorRT compilation, it's reduced to 80 fused kernels. Inference
  latency drops from 21ms to 6ms. Your colleague says 'operator fusion just reduces Python overhead.'
  What is the real hardware-level reason fusion is so effective?
details:
  realistic_solution: 'Each CUDA kernel launch requires: (1) writing the input tensor to HBM, (2) launching
    the kernel (5-10μs overhead), (3) reading the input from HBM, computing, (4) writing the output to
    HBM. When two sequential operations are separate kernels, the intermediate tensor makes a round-trip
    to HBM between them. Fusion eliminates these intermediate HBM round-trips by keeping data in registers
    and shared memory (SRAM). For a chain of 15 elementwise operations (LayerNorm → GELU → Dropout → Add),
    unfused execution writes and reads the full activation tensor 15 times from HBM. Fused execution reads
    once, computes everything in SRAM, and writes once.'
  common_mistake: '"Fusion eliminates Python interpreter overhead" or "It reduces function call overhead."
    Python overhead is real but small (~microseconds). The dominant savings come from the memory hierarchy.'
  napkin_math: '7B model, sequence=2048, hidden=4096, FP16. Activation tensor per layer: $2048 \times
    4096 \times 2 = 16\text{ MB}$. Unfused: 1,200 kernels, assume ~800 intermediate HBM round-trips. Data
    moved: $800 \times 16\text{ MB} \times 2 \text{ (read+write)} = 25.6\text{ GB}$. At 3.35 TB/s: $25.6
    / 3350 = 7.6\text{ ms}$ just for intermediate data movement. Fused: 80 kernels, ~60 intermediate round-trips.
    Data moved: $60 \times 16 \times 2 = 1.92\text{ GB}$. Time: $1.92 / 3350 = 0.57\text{ ms}$. Savings
    from reduced data movement alone: $7.6 - 0.57 = 7.0\text{ ms}$. Kernel launch overhead savings: $(1200
    - 80) \times 7\mu s = 7.8\text{ ms}$. Total savings = 14.8ms. Total latency drops: ~21ms → ~6ms, which
    perfectly matches the observed speedup.'
