title: The Inference Compiler Optimization
scenario: You compile your 7B LLM with TensorRT before deploying on an H100. The model has 1,200 individual operations in eager PyTorch. After TensorRT compilation, it's reduced to 80 fused kernels. Inference latency drops from 21ms to 6ms. Your colleague says 'operator fusion just reduces Python overhead.'
question: What is the real hardware-level reason fusion is so effective?
details:
  realistic_solution: 'Each CUDA kernel launch requires: (1) writing the input tensor to HBM, (2) launching the kernel (5-10μs overhead), (3) reading the input from HBM, computing, (4) writing the output to HBM. When two sequential operations are separate kernels, the intermediate tensor makes a round-trip to HBM between them. Fusion eliminates these intermediate HBM round-trips by keeping data in registers and shared memory (SRAM). For a chain of 15 elementwise operations (LayerNorm → GELU → Dropout → Add), unfused execution writes and reads the full activation tensor 15 times from HBM. Fused execution reads once, computes everything in SRAM, and writes once.'
  common_mistake: |
    **The Pitfall:** Assuming operator fusion primarily reduces Python interpreter or function call overhead.
    **The Rationale:** Developers used to standard software optimization think in terms of CPU execution paths rather than GPU memory hierarchies.
    **The Consequence:** Misunderstanding the performance bottlenecks of modern AI models, leading to poor architectural decisions.
  napkin_math: |
    * 7B model, sequence=2048, hidden=4096, FP16.
    * Activation tensor per layer: 2048 × 4096 × 2 = 16 MB.
    * Unfused (800 intermediate HBM round-trips): Data moved = 800 × 16 MB × 2 (read+write) = 25.6 GB.
    * Unfused memory time: 25.6 GB / 3.35 TB/s = 7.6 ms.
    * Fused (60 intermediate round-trips): Data moved = 60 × 16 MB × 2 = 1.92 GB.
    * Fused memory time: 1.92 GB / 3.35 TB/s = 0.57 ms.
    * Data movement savings: 7.6 ms - 0.57 ms = 7.0 ms.
    * Kernel launch savings: (1200 - 80) × 7μs = 7.8 ms.
    * **Conclusion: Total savings ≈ 14.8 ms (21ms → 6ms latency drop), dominated by reduced memory movement and kernel launches.**
