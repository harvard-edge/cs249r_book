title: Hedged Request Latency Improvement
scenario: A service has p50=5ms, p95=20ms, p99=80ms. You implement hedged requests, sending a duplicate request to a different server after 15ms with no response.
question: Assuming independent latency distributions, what is the approximate new p99 latency and extra backend load?
details:
  realistic_solution: 'Without hedging: p99 = 80ms. With hedging at 15ms threshold: a request is slow (>15ms) with probability ~8% (between p90 and p95). When hedged, the user gets min(original_latency, hedge_latency + 15ms). For a request that would have been slow (say 80ms for p99): the hedge fires at 15ms and independently has a p50 of 5ms completion time. So hedge completes at 15 + 5 = 20ms. P(both exceed 80ms) = P(original > 80ms) × P(hedge > 65ms). P(original > 80ms) = 0.01. P(hedge > 65ms) ≈ 0.02 (well past p95=20ms for the hedge). New p99: P(slow) = 0.01 × 0.02 = 0.0002 = p99.98 equivalent. Effective new p99 ≈ 20-25ms (the hedge''s p95 + 15ms offset). Hedging cut p99 from 80ms to ~25ms at the cost of ~8% extra backend load.'
  common_mistake: |
    **The Pitfall:** Setting the hedge threshold too low, such as at the p50 mark.
    **The Rationale:** Engineers often aggressively hedge to minimize latency without modeling the mathematical probability of a slow request or the resulting backend strain.
    **The Consequence:** Hedging at p50 doubles the total backend load for minimal latency improvement, potentially causing cascading system failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: p50=5ms, p95=20ms, p99=80ms.
       - Hedging threshold = 15ms.
    2. **Calculations:**
       - Hedge Trigger Rate: 15ms is between p90 and p95, firing ~8% of the time.
       - Backend Load: Original 100% + 8% hedged = 1.08x total load.
       - Combined Probability: P(original > 80ms) = 0.01. P(hedge > 65ms) ~ 0.02. 0.01 * 0.02 = 0.0002 (p99.98).
    3. **Conclusion & Interpretation:**
       - **Result: New p99 drops from 80ms to ~20-25ms with only 8% extra backend load. Tail-Latency-Bound**
