title: MI300X KV Pool Sizing vs H100
scenario: You are choosing the GPU for your decode pool in a disaggregated serving deployment for a 70B FP16 model. You must compare H100 SXM5 (80 GB, 3.35 TB/s) against MI300X (192 GB, 5.3 TB/s).
question: For a 70B FP16 decode pool, how do H100 SXM5 and MI300X compare on concurrency and token throughput, and which is better?
details:
  realistic_solution: 'Model weights for 70B FP16 = 140 GB. H100: 140 GB exceeds 80 GB → needs tensor parallelism (TP=2, two H100s), leaving each GPU with 80-70=10 GB for KV. MI300X: 192 GB fits entire model on one GPU with 52 GB free for KV. Total KV per sequence at 4096 tokens (96 layers, 8 KV heads GQA, head_dim 128, FP16) = 1.5 GB. H100 TP=2 (sharded KV, 0.75 GB/GPU): 10 GB / 0.75 GB ≈ 13 sequences. MI300X (unsharded KV, 1.5 GB/GPU): 52 GB / 1.5 GB ≈ 34 sequences. Token throughput (bandwidth-limited): H100 pair at 2×3.35 TB/s = 6.7 TB/s / 140 GB = 47.8 tokens/s per sequence × 13 = 621 tok/s aggregate. MI300X at 5.3 TB/s / 140 GB = 37.8 tokens/s single sequence × 34 = 1285 tok/s aggregate. MI300X wins on aggregate throughput per GPU-unit for decode, especially when eliminating TP communication overhead.'
  common_mistake: |
    **The Pitfall:** Choosing MI300X purely for memory capacity without calculating bandwidth.
    **The Rationale:** Knowing that decode is memory-bound, but forgetting that token generation throughput scales directly with memory *bandwidth*, not just capacity.
    **The Consequence:** Failing to realize that higher capacity only provides higher aggregate throughput if the application has enough concurrent requests to utilize the deeper queues.
  napkin_math: |
    - **Model Memory**: 70B FP16 = 140 GB.
    - **H100 (80GB)**: Requires TP=2. Two GPUs have `(160 - 140) = 20 GB` free for KV cache (10 GB/GPU).
    - **MI300X (192GB)**: Fits on 1 GPU. `192 - 140 = 52 GB` free for KV cache.
    - **KV Cache per Seq**: At 4096 tokens (96 layers, 8 heads, 128 dim) = 1.5 GB.
    - **Concurrency**: H100 pair fits `20 / 1.5` ≈ 13 seqs. MI300X fits `52 / 1.5` ≈ **34 seqs**.
    - **Throughput**: H100 pair (6.7 TB/s) yields 47.8 tok/s × 13 = 621 aggregate tok/s. MI300X (5.3 TB/s) yields 37.8 tok/s × 34 = **1285 aggregate tok/s**.
    - **Result**: MI300X wins heavily on aggregate throughput and concurrency per node.
