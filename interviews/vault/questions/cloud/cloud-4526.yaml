title: Llama-3 70B KV Cache Sizing
scenario: An H100 (80 GiB) serves a 70B model with 80 layers, 8 KV heads, and 128 head dimension in FP16. Batch size is 128, sequence length is 2048.
question: Compute the total memory allocated for the KV cache.
visual:
  kind: svg
  path: cloud-4526.svg
  alt: Bar chart showing KV cache size exceeding total H100 memory.
  caption: KV cache memory demand vs single GPU capacity.
details:
  realistic_solution: 'KV memory = 2 (Key, Value) * layers * KV heads * head dim * seq_len * batch * bytes_per_param. For FP16, bytes=2. Memory = 2 * 80 * 8 * 128 * 2048 * 128 * 2 = 85,899,345,920 bytes, or roughly 80 GiB. (Note: this exceeds the memory limit of a single H100 when combined with weights, requiring tensor parallelism).'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by 2 for separate Key and Value tensors, or utilizing the number of attention heads instead of KV heads.
    
    **The Rationale:** Engineers often mix up standard Multi-Head Attention equations with Grouped Query Attention (GQA) architectures, accidentally vastly overstating KV footprint by using the query head count instead of the much smaller KV head count.
    
    **The Consequence:** Wildly inaccurate memory forecasts lead to vast over-provisioning of GPU infrastructure or incorrect assumptions about batch capacity limits.
  napkin_math: |
    - **Formula**: 2 (K+V) * layers * heads * dim * seq_len * batch * bytes
    - **Calculation**: 2 * 80 * 8 * 128 * 2048 * 128 * 2 bytes
    - **Bytes**: 85,899,345,920 bytes
    - **Result**: **~85.9 GB** (or exactly 80 GiB).
