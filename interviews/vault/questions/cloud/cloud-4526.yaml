title: Llama-3 70B KV Cache Sizing
scenario: An H100 (80 GB) serves a 70B model with 80 layers, 8 KV heads, and 128 head
  dimension in FP16. Batch size is 128, sequence length is 2048.
question: Compute the total memory allocated for the KV cache.
visual:
  kind: svg
  path: cloud-4526.svg
  alt: Bar chart showing KV cache size exceeding total H100 memory.
  caption: KV cache memory demand vs single GPU capacity.
details:
  realistic_solution: 'KV memory = 2 (Key, Value) * layers * KV heads * head dim *
    seq_len * batch * bytes_per_param. For FP16, bytes=2. Memory = 2 * 80 * 8 * 128
    * 2048 * 128 * 2 = 85,899,345,920 bytes, or roughly 85.9 GB. (Note: this exceeds
    the 80 GB limit of a single H100, requiring tensor parallelism).'
  common_mistake: Forgetting to multiply by 2 for the separate Key and Value tensors,
    or using the number of attention heads instead of KV heads (Grouped Query Attention).
  napkin_math: 2 * 80 * 8 * 128 * 2048 * 128 * 2 = ~85.9 GB
