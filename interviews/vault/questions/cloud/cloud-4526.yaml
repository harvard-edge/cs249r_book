title: Llama-3 70B KV Cache Sizing
scenario: An H100 serves a 70B model with 80 layers, 8 KV heads, and 128 head dimension in FP16. Batch size is 128, sequence length is 2048.
question: Compute the total memory allocated for the KV cache.
visual:
  kind: svg
  path: cloud-4526.svg
  alt: Bar chart showing KV cache size exceeding total H100 memory.
  caption: KV cache memory demand vs single GPU capacity.
details:
  realistic_solution: |
    KV memory footprint requires accounting for both Key and Value tensors. Formula: 2 * layers * KV_heads * head_dim * seq_len * batch_size * bytes_per_param.
    For FP16 (2 bytes): 2 * 80 * 8 * 128 * 2048 * 128 * 2 = 85,899,345,920 bytes.
    Converted to GiB: 85,899,345,920 / (1024^3) = 80 GiB.
    (Note: This entirely consumes the H100 memory capacity, leaving zero room for weights. Tensor Parallelism across multiple GPUs is architecturally mandatory).
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by 2 for separate Key and Value tensors, or utilizing the number of attention heads instead of KV heads.
    **The Rationale:** Engineers often mix up standard Multi-Head Attention equations with Grouped Query Attention (GQA) architectures, accidentally vastly overstating KV footprint by using the query head count instead of the much smaller KV head count.
    **The Consequence:** Wildly inaccurate memory forecasts lead to vast over-provisioning of GPU infrastructure or incorrect assumptions about batch capacity limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU: H100 (80 GiB).
       - Model config: 80 layers, 8 KV heads, 128 head dim, FP16 (2 bytes).
       - Inference config: Batch size 128, sequence length 2048.
    2. **Calculations:**
       - Total Elements: 2 (K+V) * 80 layers * 8 heads * 128 dim * 2048 seq_len * 128 batch.
       - Memory Calculation: 2 * 80 * 8 * 128 * 2048 * 128 * 2 bytes = 85,899,345,920 bytes.
       - Conversion: 85,899,345,920 bytes / (1024^3) = ~80.0 GiB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** The KV cache alone demands precisely 80 GiB, exceeding the safe capacity of a single H100 when combined with the model weights. Tensor parallelism across multiple GPUs is mandatory.
