title: The A/B Test TCO Trap
scenario: You are a Staff ML Systems Engineer. A product team wants to run an A/B test by fine-tuning
  two variants of a 70B parameter LLM on a 1.4 Trillion token dataset. They have access to a 256-node
  cluster of either H100s or the newer B200s. They tell you, 'The B200s seem expensive at ~$6.00/hr compared
  to the H100s at ~$3.50/hr. Can you demonstrate which option has the lower Total Cost of Ownership (TCO)
  for this two-model training run?' You can assume a scaling efficiency of 45% for this cluster size.
details:
  realistic_solution: The correct answer is to calculate the total training time for each hardware option
    and then multiply by the cluster size and hourly cost. The B200, despite its higher hourly rate, is
    significantly faster, which reduces the total training time to the point where it becomes the cheaper
    option overall.
  common_mistake: The most common mistake is focusing only on the hourly instance price (OpEx) while ignoring
    the 'time' component of the TCO calculation. An engineer might see the B200's higher hourly cost and
    incorrectly conclude it's the more expensive option, forgetting that its superior performance drastically
    reduces the total training duration, which is the dominant factor in the final bill.
  napkin_math: Compute = 6 * 70e9 * 1.4e12 = 5.88e23 FLOPs. 256 H100s at 400 TFLOPS takes 5.88e23 / (256
    * 400e12) = 1,595 hours. At $3/hr, cost is $1.22M. If B200 provides 2.5x the TFLOPS, time is 638 hours.
    At $6/hr, B200 cost is 638 * 256 * $6 = $980k. B200 is cheaper overall.
  options:
  - The H100 cluster is cheaper by over $1M because its hourly rate is significantly lower.
  - The costs are roughly equivalent, as the B200's performance increase is canceled out by its higher
    price.
  - The B200 cluster is cheaper by over $600k because it finishes the job in less than half the time.
  - The cost is impossible to determine without knowing the network interconnect speeds, which will be
    the real bottleneck.
  correct_index: 2
