title: H100 GPipe Efficiency
scenario: Training a 50B parameter LLM across an 8-GPU server using GPipe pipeline parallelism with 4 stages and 8 microbatches. Stage 0 (embedding + early layers) takes 12ms per microbatch, stages 1-2 each take 10ms, and stage 3 (final layers + loss head) takes 14ms because of the LM head's large vocabulary projection.
question: Analyze the pipeline bubble fraction under this heterogeneous stage timing and explain why the bubble overhead diverges from the textbook (p-1)/(m+p-1) formula.
visual:
  kind: svg
  path: cloud-4491.svg
  alt: Bubble Gantt chart illustrating empty compute cycles at the start and end of a pipeline batch.
  caption: Pipeline Bubble Stalls
details:
  realistic_solution: With heterogeneous stages, the steady-state cycle time is gated by the slowest stage (14ms), so each microbatch advances at the slow stage's rate. The candidate computes total time as sum(t_i) + (m-1)*t_max. Pure (p-1)/(m+p-1) assumes homogeneous stages and underestimates the bubble because the fast stages idle waiting for the slow stage.
  common_mistake: |
    **The Pitfall:** Blindly applying the textbook `(p-1)/(m+p-1)` formula.
    **The Rationale:** Candidates forget that the classic formula assumes perfectly load-balanced (homogeneous) stages, which is rarely true due to embeddings and LM heads.
    **The Consequence:** Underestimating pipeline stalls by nearly 10%, leading to inaccurate cluster provisioning and missed throughput targets.
  napkin_math: |
    * Total time = sum(t_i) + (m - 1) * t_max = (12 + 10 + 10 + 14) + 7 * 14 = 46 + 98 = 144 ms.
    * Total available GPU time: 4 stages * 144 ms = 576 GPU-ms.
    * Useful work: 8 microbatches * (12 + 10 + 10 + 14) = 368 GPU-ms.
    * Bubble fraction: 1 - (368 / 576) = **36.1% bubble**.
    * **Result:** The standard formula assumes homogeneous stages and gives 3 / (8 + 4 - 1) = 27.2%, severely underestimating the true bubble.
