title: H100 GPipe Efficiency
scenario: Training a 50B parameter LLM across an 8-GPU H100 server using GPipe pipeline
  parallelism. The microbatch size is 4 and there are 4 pipeline stages.
question: Analyze the pipeline bubble fraction and determine the efficiency loss caused
  by pipeline stalls.
