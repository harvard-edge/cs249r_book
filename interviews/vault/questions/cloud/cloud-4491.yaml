details:
  realistic_solution: 'The candidate uses the GPipe bubble formula: (p-1) / (m + p
    - 1) where p is stages and m is microbatches. This reveals a very high bubble
    fraction, indicating poor efficiency.'
  common_mistake: Mixing up microbatch count with stage count, or not recognizing
    that m=4 is too small for p=4.
  napkin_math: (4 - 1) / (4 + 4 - 1) = 3 / 7 = 42.8% bubble
