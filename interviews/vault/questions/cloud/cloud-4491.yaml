title: H100 GPipe Efficiency
scenario: Training a 50B parameter LLM across an 8-GPU H100 server using GPipe pipeline
  parallelism with 4 stages and 8 microbatches. Stage 0 (embedding + early layers)
  takes 12ms per microbatch, stages 1-2 each take 10ms, and stage 3 (final layers
  + loss head) takes 14ms because of the LM head's large vocabulary projection.
question: Analyze the pipeline bubble fraction under this heterogeneous stage timing
  and explain why the bubble overhead diverges from the textbook (p-1)/(m+p-1) formula.
visual:
  kind: svg
  path: cloud-4491.svg
  alt: Bubble Gantt chart illustrating empty compute cycles at the start and end of
    a pipeline batch.
  caption: Pipeline Bubble Stalls
details:
  realistic_solution: With heterogeneous stages, the steady-state cycle time is gated
    by the slowest stage (14ms), so each microbatch advances at the slow stage's rate.
    The candidate computes total time as (p-1)*t_max for fill + m*t_max for steady
    state + (p-1)*t_max for drain, then subtracts useful work sum(m*t_i). Pure (p-1)/(m+p-1)
    underestimates the bubble because the fast stages idle waiting for the slow stage.
  common_mistake: Plugging into (p-1)/(m+p-1) directly and ignoring that fast stages
    sit idle on every microbatch they finish before stage 3 is ready, which inflates
    the effective bubble.
  napkin_math: 'Fill+drain = 2*(p-1)*t_max = 2*3*14 = 84ms; steady = m*t_max = 8*14
    = 112ms; total = 196ms. Useful work = 8*(12+10+10+14) = 368 GPU-ms. Bubble fraction
    = 1 - 368/(4*196) = 1 - 0.469 = 53% bubble.'
