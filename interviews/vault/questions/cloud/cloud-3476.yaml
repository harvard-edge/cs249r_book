title: Congestion Control in AMD MI300X GPU Clusters
scenario: You are managing a large-scale ML training cluster utilizing MI300X accelerators. During intensive distributed training jobs involving all-reduce operations across many nodes, you observe intermittent training stalls. Network monitoring reveals transient periods of high switch port queue depths and packet drops at aggregation points where multiple GPUs converge their communication.
question: Why do incast congestion and weak flow control stall all-reduce jobs, and how do ECN, PFC, and DCQCN mitigate this in RoCEv2?
details:
  realistic_solution: A realistic solution involves deploying a network fabric optimized for RDMA over Converged Ethernet (RoCEv2) and implementing DCQCN. DCQCN provides a rate-based, end-to-end congestion control mechanism that effectively prevents incast congestion by giving timely feedback to senders before switch buffers overflow.
  common_mistake: |
    **The Pitfall:** Assuming increasing switch buffer sizes or relying solely on standard TCP congestion control will resolve the issue.
    **The Rationale:** Standard network troubleshooting often leans on deeper buffers to absorb traffic bursts.
    **The Consequence:** TCP congestion control reacts too slowly for microsecond-scale RDMA bursts, leading to packet drops, severe retransmission penalties, and drastically reduced cluster throughput.
  napkin_math: |
    1. Calculate aggregate burst: 8 GPUs transmitting simultaneously at 400 Gbps = 3.2 Tbps aggregate burst.
    2. Evaluate switch buffer overflow: Targeting 1 egress port (400 Gbps), the net fill rate is 3.2 Tbps - 0.4 Tbps = 2.8 Tbps (350 GB/s).
    3. Calculate time to drop: A typical 32MB switch buffer overflows in 32MB / 350 GB/s = 91 microseconds.
    4. Conclude: DCQCN reacts in **<50μs**, successfully throttling senders before the buffer drops packets.
