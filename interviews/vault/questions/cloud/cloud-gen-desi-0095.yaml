title: Distributed Serving Architecture for 70B LLM
scenario: Architect a serving system for a 70B parameter LLM (FP16) for an interactive chat application.
  The deployment target is a fleet of nodes, each with 8x H100 GPUs (80 GB HBM3, NVLink 4.0 at 900 GB/s).
  You must define the parallelization strategy across the GPUs, the memory allocation for model weights
  versus KV cache, and the caching mechanism to support high concurrency. Specify how you would structure
  the deployment to maximize throughput while strictly adhering to the 80 GB per GPU memory limit.
question: "How would you parallelize and allocate memory for serving the 70B FP16 chat model on each 8x H100 node?"
details:
  realistic_solution: A robust architecture uses Tensor Parallelism of 4 (TP=4) to partition the weights,
    leveraging the fast 900 GB/s NVLink 4.0 to mask communication overhead. This reduces the weight footprint
    per GPU, freeing up the majority of the 80GB HBM3 for a Paged KV cache. The system should deploy two
    independent TP=4 replica groups per 8-GPU node to maximize hardware utilization and request throughput.
  common_mistake: Candidates often default to the theoretical minimum of 2 GPUs (Tensor Parallelism =
    2) just to fit the 140GB model weights. They fail to realize this leaves almost no memory for the
    KV cache and activations, which severely bottlenecks batch size and throughput in a high-concurrency
    chat application.
  napkin_math: '70B parameters * 2 bytes (FP16) = 140 GB total weight footprint. H100 capacity = 80 GB.
    With TP=2: 140 GB / 2 = 70 GB/GPU for weights, leaving only 10 GB (80 - 70) for KV cache and activations.
    With TP=4: 140 GB / 4 = 35 GB/GPU for weights, leaving 45 GB (80 - 35) for KV cache. TP=4 provides
    4.5x more memory for the KV cache per GPU, allowing for dramatically larger batch sizes.'
