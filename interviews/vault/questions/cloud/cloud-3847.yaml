title: Analyzing FP16 Speedup on A100
scenario: You are profiling a linear layer kernel on an A100 GPU. The layer performs a matrix multiplication between an activation matrix of shape [16, 4096] and a weight matrix of shape [4096, 4096]. When you switch all tensors from FP32 to FP16, you observe that the execution time exactly halves, resulting in a 2.0x speedup.
question: Why does switching this [16, 4096] x [4096, 4096] layer from FP32 to FP16 produce exactly a 2x speedup on the A100?
details:
  realistic_solution: |
    The system exhibits exactly a 2x speedup because the matrix multiplication for this specific shape is heavily memory-bandwidth bound. In a memory-bound regime, execution time is strictly dictated by the time required to transfer data from HBM to the multiprocessors. Switching from FP32 (4 bytes per element) to FP16 (2 bytes per element) halves the total memory footprint. Since the total data transferred is halved over the fixed memory bus, the overall latency is reduced by exactly half.
  common_mistake: |
    **The Pitfall:** Assuming switching to FP16 automatically shifts the bottleneck to the compute units.
    **The Rationale:** Candidates attempt to explain the speedup using peak TFLOPS ratios rather than calculating arithmetic intensity.
    **The Consequence:** Failure to understand memory-bound regimes, leading to incorrect architectural optimization choices.
  napkin_math: |
    - **FLOPs:** 2 * 16 * 4096 * 4096 = 536.8 MFLOPs.
    - **Total Elements:** Activations + Weights + Output = 16.9M elements.
    - **FP32 Intensity:** 536.8 MFLOPs / 67.6 MB = 7.94 FLOPs/Byte.
    - **FP16 Intensity:** 536.8 MFLOPs / 33.8 MB = 15.88 FLOPs/Byte.
    - **A100 Ridge Point:** 156 FLOPs/Byte. Both are severely memory-bound.
    - **Execution Time:** Strictly dictated by memory bus. FP32 (33.8 μs) vs FP16 (16.9 μs) yields exactly a **2.0x speedup**.
