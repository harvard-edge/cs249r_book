title: Monitoring Hierarchy Layers
scenario: Revenue from your ML-powered product dropped 15% overnight. The on-call engineer sees no system alerts (CPU, memory, latency all green).
question: How would hierarchical monitoring help triage the 15% revenue drop when system metrics are green?
details:
  realistic_solution: 'Hierarchical monitoring structures observability top-down: Business (Revenue) -> Model (Accuracy/Drift) -> Data Quality -> System Telemetry. When systems are green, walking down the hierarchy isolates whether the issue is model degradation, upstream data corruption, or external market shifts.'
  common_mistake: |
    **The Pitfall:** Only monitoring infrastructure metrics.
    **The Rationale:** Engineers assume infrastructure health equates to service health.
    **The Consequence:** Models can serve fast, incorrect predictions silently, costing the business without detection.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Triage paths: 4 layers (Business, Model, Data, System).
    2. **Calculations:**
       - Unstructured triage = O(N) exhaustive search of all components.
       - Hierarchical triage = O(1) sequential layer elimination.
    3. **Conclusion & Interpretation:**
       - **Result: Hierarchical isolation reduces MTTR from hours to minutes.**
