title: Monitoring Hierarchy Layers
scenario: Revenue from your ML-powered product dropped 15% overnight. The on-call engineer sees no system
  alerts (CPU, memory, latency all green). Explain how hierarchical monitoring would help isolate whether
  this is a model issue, data issue, or business-external factor.
question: "How would hierarchical monitoring help triage the 15% revenue drop when system metrics are green?"
details:
  realistic_solution: 'Hierarchical monitoring structures observability into layers, from business down
    to infrastructure: Level 1 (Business metrics): revenue, CTR, conversion rate. This is where the 15%
    drop appears. Level 2 (Model performance): prediction accuracy, confidence distribution, feature importance
    shifts. If model accuracy dropped, this is a model issue. Level 3 (Data quality): input feature distributions,
    missing value rates, schema violations. If upstream data changed, features may be stale or corrupt.
    Level 4 (System telemetry): CPU, GPU, memory, latency, error rates. All green in this case, ruling
    out infrastructure issues. By walking down the hierarchy: Business metrics dropped (Level 1) → check
    model performance (Level 2). If model metrics are stable, check data quality (Level 3). If data is
    fine, the cause is external (market shift, competitor action). If model performance degraded, check
    if data quality caused it. Each level narrows the diagnosis, enabling fast root-cause identification.'
  common_mistake: Only monitoring infrastructure metrics (CPU, memory, latency). These are necessary but
    insufficient — a model can serve fast, incorrect predictions without triggering any system alerts.
  napkin_math: 'Without hierarchy: hours to diagnose (check everything). With hierarchy: minutes to isolate
    layer. Business → Model → Data → System = systematic top-down triage.'
