title: The Deadline-Aware Scheduling Inversion
scenario: Your cluster scheduler uses Shortest Job First (SJF) to minimize average job completion time. Two jobs arrive simultaneously: Job A is a 2-hour fine-tuning job with a hard 3-hour deadline, and Job B is a 30-minute evaluation job with no deadline. SJF picks Job B first. Job A starts 30 minutes late and finishes in 2.5 hours — still within deadline. Then next week, 50 evaluation jobs arrive at once. Job A misses its deadline.
question: What scheduling principle did SJF violate when handling the 50 evaluation jobs, and how should the scheduler be redesigned?
details:
  realistic_solution: 'SJF optimizes average completion time but ignores *slack* — the difference between a job''s deadline and its estimated completion time. The fix is Earliest Deadline First (EDF) or a slack-aware scheduler. EDF schedules the job whose deadline is nearest, regardless of job size. A more sophisticated approach uses *laxity* = (deadline - current_time - remaining_runtime): jobs with low laxity get priority because they have no room for delay. In practice, ML clusters combine deadline-awareness with fair-share: deadline-critical jobs get a reserved quota, while best-effort jobs backfill remaining capacity.'
  common_mistake: |
    **The Pitfall:** Thinking SJF is strictly optimal because it mathematically minimizes average completion time.
    **The Rationale:** Engineers follow standard operating system textbooks without accounting for heterogeneous SLA constraints.
    **The Consequence:** The cluster achieves great aggregate metrics while systematically failing the most business-critical workloads.
  napkin_math: |
    * Job A: runtime=2hr, deadline=3hr, slack=1hr.
    * Job B (50 units): runtime=0.5hr each, deadline=none, slack=infinite.
    * With SJF: total delay for Job A = 50 * 0.5hr = 25hr. Job A starts at t=25hr, finishes at t=27hr (misses deadline by 24 hours).
    * With EDF: Job A runs first (3hr deadline beats infinite). Finishes at t=2hr. 50 eval jobs complete by t=27hr.
    * **EDF guarantees the critical SLA is met, even if average completion time rises slightly.**
  options:
  - SJF optimizes for maximum cluster utilization, which inherently delays short jobs. The scheduler should use First-In-First-Out (FIFO) to guarantee fairness.
  - SJF optimizes for average completion time but ignores job deadlines and slack. The scheduler should be redesigned to use Earliest Deadline First (EDF) or a slack-aware policy so urgent jobs are prioritized.
  - SJF failed because it was unaware of the GPUs' memory capacity, scheduling too many evaluation jobs on the same node. The scheduler should be redesigned to be memory-aware.
  - SJF correctly optimized the workload, and the deadline miss is an unavoidable consequence of bursty traffic. No scheduler redesign is needed; the cluster just needs more GPUs.
  correct_index: 1
