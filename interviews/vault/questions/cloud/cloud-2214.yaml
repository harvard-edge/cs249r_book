title: The Deadline-Aware Scheduling Inversion
scenario: 'Your cluster scheduler uses Shortest Job First (SJF) to minimize average job completion time.
  Two jobs arrive simultaneously: Job A is a 2-hour fine-tuning job with a hard 3-hour deadline (model
  must deploy by morning), and Job B is a 30-minute evaluation job with no deadline. SJF picks Job B first.
  Job A starts 30 minutes late and finishes in 2.5 hours — still within deadline. Then next week, 50 evaluation
  jobs arrive at once. Job A misses its deadline. What scheduling principle did SJF violate, and how should
  the scheduler be redesigned?'
question: "What scheduling principle did SJF violate, and how should the scheduler be redesigned?"
details:
  realistic_solution: 'SJF optimizes average completion time but ignores *slack* — the difference between
    a job''s deadline and its estimated completion time. The fix is Earliest Deadline First (EDF) or a
    slack-aware scheduler. EDF schedules the job whose deadline is nearest, regardless of job size. A
    more sophisticated approach uses *laxity* = (deadline - current_time - remaining_runtime): jobs with
    low laxity get priority because they have no room for delay. In practice, ML clusters combine deadline-awareness
    with fair-share: deadline-critical jobs get a reserved quota, while best-effort jobs backfill remaining
    capacity.'
  common_mistake: Thinking SJF is always optimal because it minimizes average completion time. SJF is
    oblivious to deadlines — it optimizes for the wrong objective when jobs have heterogeneous urgency
    constraints.
  napkin_math: 'Job A: runtime=2hr, deadline=3hr, slack=1hr. Job B: runtime=0.5hr, deadline=none, slack=infinite.
    With 50 evaluation jobs arriving: SJF queues all 50 ahead of Job A. Total delay = 50 × 0.5hr = 25hr
    (assuming 1 GPU). Job A starts at t=25hr, finishes at t=27hr — misses 3hr deadline by 24 hours. EDF:
    Job A runs first (finite deadline beats infinite slack), finishes at t=2hr. 50 eval jobs complete
    by t=27hr. Average completion only rises by 2hr/51 ≈ 2.4 minutes per job.'
  options:
  - InfiniBand uses RDMA (Remote Direct Memory Access) to bypass the CPU and OS kernel for network transfers.
    GPU Direct RDMA extends this to allow direct transfers between GPU HBM and the network adapter, eliminating
    two CPU-mediated copies (GPU→CPU and CPU→NIC). This reduces AllReduce latency from ~50 μs (with CPU
    staging) to ~5 μs per hop, critical for synchronous distributed training.
  - InfiniBand is faster than Ethernet solely because of higher clock frequencies in the cables; RDMA
    is a software protocol that runs equally well on both InfiniBand and standard Ethernet NICs
  - InfiniBand benefits only apply to inference serving where low latency matters; for training, TCP/IP
    over 100 Gbps Ethernet provides equivalent throughput because training is bandwidth-bound not latency-bound
  - GPU Direct RDMA requires special GPU models with built-in network adapters; standard A100/H100 GPUs
    cannot use RDMA and must stage all transfers through CPU memory
