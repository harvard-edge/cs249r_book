title: Benchmarking Methodology for Cross-Platform Performance Claims
scenario: 'A vendor publishes a benchmark showing their accelerator is 2.3x faster than H100 for LLM inference. You need to evaluate whether this claim is valid for your workload.'
question: "What methodology do you apply to evaluate the vendor's cross-platform performance claims?"
details:
  realistic_solution: 'Apply the MLPerf methodology: (1) Fix the model architecture and weights identically. (2) Match precision: both FP16 or both INT8. (3) Report both throughput (tokens/sec) AND latency (p50, p99 at your target batch size). (4) Use the same SLA constraint (e.g., first-token latency < 200ms). (5) Include the full software stack version. (6) Run multiple iterations (>100) and report confidence intervals. (7) Test at YOUR batch size and sequence length, not the vendor''s optimal point. Often the 2.3x shrinks to 1.1-1.4x under realistic conditions.'
  common_mistake: |
    **The Pitfall:** Taking vendor benchmarks at face value.
    **The Rationale:** Believing that "throughput is throughput" without standardizing constraints.
    **The Consequence:** Falling for cherry-picked batch sizes, different precision modes, or unconstrained latency, resulting in poor production performance.
  napkin_math: |
    1. Vendor claim: 2.3x at batch=512, seq=128 (throughput-optimal).
    2. Your workload: batch=8, seq=2048 (latency-sensitive).
    3. High launch overhead on the vendor chip means performance drops at lower batch sizes.
    4. **Result:** The 2.3x advantage at batch=512 can become **0.9x at batch=8**, highlighting the need to benchmark at your operating point.
