title: Benchmarking Methodology for Cross-Platform Performance Claims
scenario: 'A vendor publishes a benchmark showing their accelerator is 2.3x faster than H100 for LLM inference. You need to evaluate whether this claim is valid for your workload.'
question: 'What methodology do you apply to evaluate the vendor''s cross-platform performance claims?'
details:
  realistic_solution: 'Apply the rigorous MLPerf Inference methodology. Ensure identical model weights and precision (e.g., both FP16). Mandate reporting of both throughput (tokens/sec) AND latency (P99) under a strict SLA constraint (e.g., TTFT < 200ms). Crucially, benchmark at your specific target batch size and sequence length. High launch overheads on unproven architectures often artificially inflate throughput at massive batch sizes, meaning the 2.3x advantage evaporates under realistic latency constraints.'
  common_mistake: |
    **The Pitfall:** Taking vendor benchmarks at face value.
    **The Rationale:** Candidates believe that "throughput is throughput" without standardizing constraints or accounting for latency SLAs.
    **The Consequence:** Procuring inferior hardware based on cherry-picked batch sizes, resulting in poor production performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vendor claim: 2.3x at batch=512, seq=128 (throughput-optimal).
    - Your workload: batch=8, seq=2048 (latency-sensitive).

    **Calculations:**
    - High kernel launch overhead degrades low-batch performance.
    - 2.3x advantage at batch=512 drops non-linearly.

    **Conclusion & Interpretation:**
    - **Result: Benchmarking at the operational SLA reveals the 2.3x throughput advantage shrinks to ~0.9x at batch=8 (Methodology-Bound).**
