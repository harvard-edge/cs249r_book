title: M/M/1 Accelerator Queuing
scenario: A text embedding microservice runs on a Hailo-8 edge accelerator, processing
  requests sequentially. At a steady load of 50 requests per second, profiling shows
  the average response time is 10 ms. The request arrivals and service times fit an
  M/M/1 queue model.
question: At what arrival rate will the average response time spike to exactly 40
  ms?
visual:
  kind: svg
  path: cloud-2857.svg
  alt: A hockey-stick line graph of an M/M/1 queue showing average latency exponentially
    rising as arrival rate approaches 150 requests per second.
  caption: Queueing theory hockey-stick curve for M/M/1 latency.
details:
  realistic_solution: 'For an M/M/1 queue, the average response time T is given by
    1 / (μ - λ), where μ is the service rate and λ is the arrival rate. At λ = 50
    req/s, T = 0.010 s. So, 0.010 = 1 / (μ - 50), meaning μ - 50 = 100, which yields
    a service rate μ = 150 req/s. We want to find the new arrival rate λ'' where T
    = 0.040 s. Setting up the equation: 0.040 = 1 / (150 - λ''). This means 150 -
    λ'' = 25, which gives λ'' = 125 requests per second.'
  common_mistake: Assuming latency scales linearly with throughput (e.g. concluding
    that 4x latency means 4x throughput, λ = 200) instead of following the queueing
    theory hockey-stick curve.
  napkin_math: 1/(u - 50) = 0.01 => u=150. 1/(150 - L) = 0.04 => 150 - L = 25 => L=125
