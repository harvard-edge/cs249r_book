title: M/M/1 Accelerator Queuing
scenario: A text embedding microservice runs on an edge accelerator, processing requests sequentially. At a steady load of 50 requests per second, profiling shows the average response time is 10 ms. The request arrivals and service times fit an M/M/1 queue model.
question: At what arrival rate will the average response time spike to exactly 40 ms?
visual:
  kind: svg
  path: cloud-2857.svg
  alt: A hockey-stick line graph of an M/M/1 queue showing average latency exponentially rising as arrival rate approaches 150 requests per second.
  caption: Queueing theory hockey-stick curve for M/M/1 latency.
details:
  realistic_solution: 'For an M/M/1 queue, the average response time T is given by 1 / (µ - λ), where µ is the service rate and λ is the arrival rate. At λ = 50 req/s, T = 0.010 s. So, 0.010 = 1 / (µ - 50), meaning µ - 50 = 100, which yields a service rate µ = 150 req/s. We want to find the new arrival rate λ'' where T = 0.040 s. Setting up the equation: 0.040 = 1 / (150 - λ''). This means 150 - λ'' = 25, which gives λ'' = 125 requests per second.'
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with throughput.
    **The Rationale:** Candidates intuitively apply linear scaling rules (e.g., 4x latency means 4x throughput, thus 200 req/s) rather than using queueing theory equations.
    **The Consequence:** Drastically overestimating the system's capacity before it hits unacceptable latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - M/M/1 queue model.
    - Current load (λ1): 50 req/s, Response time (T1): 0.010 s.
    - Target response time (T2): 0.040 s.

    **Calculations:**
    - Service Rate (µ): 1/(µ - 50) = 0.01 -> µ = 150 req/s.
    - Target Arrival Rate (λ2): 1/(150 - λ2) = 0.04.
    - Solve for λ2: 150 - λ2 = 25 -> λ2 = 125 req/s.

    **Conclusion & Interpretation:**
    - **Result: 125 req/s (Queueing-Delay-Bound)**. At 125 req/s, the average response time exponentially spikes to 40ms.
