title: The Speculative Decoding Trap
scenario: 'To meet an aggressive 80ms TTFT for an interactive code assistant, your team implements speculative decoding. They use a 70B parameter model as the main model and a 1.5B parameter distilled model as the draft model, running on a single H100. Under light load, TTFT is excellent. However, during peak traffic, you observe that the total system throughput (tokens/sec) collapses, falling below what you had before implementing speculative decoding.'
question: "Why does this optimization, designed to make things faster, cause a catastrophic throughput collapse under load?"
details:
  realistic_solution: 'The optimization backfires because it ignores the opportunity cost of compute on a saturated GPU. Speculative decoding reduces latency for a *single user* by replacing one slow, memory-bound operation (a single token from the large model) with several fast, compute-bound operations (multiple tokens from the draft model). This is a win only when the GPU has idle capacity.'
  common_mistake: |
    **The Pitfall:** Assuming the draft model is too slow or acceptance rate is too low.
    **The Rationale:** Focusing on the algorithm's single-user efficiency instead of its impact on a concurrent, multi-tenant system.
    **The Consequence:** Misdiagnosing the root cause and abandoning a useful optimization rather than disabling it dynamically under load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Low load (batch=1): 70B decode is memory bound (~41ms).
       - Peak load (batch=128): Compute demand = 2 * 70e9 * 128 = ~18 TFLOPs per step.
    2. **Calculations:**
       - At batch 128, H100 is fully compute-bound.
       - Draft models require additional FLOPs, stealing compute from the saturated GPU.
    3. **Conclusion & Interpretation:**
       - **Result: Throughput collapse under load (Compute-Bound).**
