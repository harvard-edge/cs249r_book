title: 'MI300X 192GB vs H100 80GB: Multi-Model Serving Density'
scenario: A serving team needs to host 8 concurrent model replicas of a 13B LLM (FP16
  weights) alongside KV cache for 512 concurrent requests at sequence length 10.
  Each KV cache entry requires 2 × num_layers × num_heads × head_dim × sequence_length × 2 bytes = for
  a Llama-2 13B (40 layers, 40 heads, 128 dim) = 8.2MB per request. Calculate whether
  a single MI300X (192GB) or H100 (80GB) can host this workload, and compute the replica
  density advantage.
question: Can a single MI300X or H100 host 8 concurrent 13B FP16 replicas plus KV
  cache for 512 requests, and what is the replica density advantage?
details:
  realistic_solution: 'Weight memory per 13B model (FP16): 13B × 2 bytes = 26GB. For
    8 replicas: 8 × 26GB = 208GB — does not fit on either accelerator alone. However,
    the question is about serving density per card, not 8 replicas per card. Per replica
    analysis: 1 replica = 26GB weights. KV cache for 512 concurrent requests: 512
    × 8.2MB = 4,198 MB ≈ 4.2GB. Overhead (activations, framework): ~2GB. Total per
    replica: 26 + 4.2 + 2 = 32.2GB. MI300X (192GB): floor(192/32.2) = 5 replicas per
    card. H100 (80GB): floor(80/32.2) = 2 replicas per card. MI300X hosts 2.5× more
    replicas per card. In a 8-card server: MI300X = 40 replicas; H100 = 16 replicas.
    MI300X serves 2.5× more concurrent model instances, reducing server count by 60%
    for the same total capacity.'
  common_mistake: Calculating only weight memory and ignoring KV cache memory. For
    multi-request serving, KV cache often exceeds weight memory and is the binding
    constraint. Also forgetting that 8 replicas × weight memory must all fit simultaneously.
  napkin_math: 'KV cache per request: 2 × 40 layers × 40 heads × 128 dim × 10 tokens
    × 2 bytes = 8,192,000 bytes ≈ 8.2MB per request. 512 requests: 512×8.2MB = 4.2GB.'
