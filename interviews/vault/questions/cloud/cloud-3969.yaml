title: Bucket Fusion Order and Its Effect on First-Bucket Overlap Latency
scenario: In DDP, gradient buckets are filled in reverse model order. The first bucket to fill contains the output layer's gradients (~1MB), finishing its AllReduce quickly but starting late. Meanwhile, huge intermediate layer buckets (25MB each) could benefit from earlier AllReduce starts.
question: How would you form DDP gradient buckets to improve AllReduce overlap for the 1MB output layer and 25MB intermediate layers?
details:
  realistic_solution: 'Custom bucket assignment: (1) Group the output layer''s small gradients into the same bucket as the last few intermediate layers. This makes the first bucket larger (25MB) and delays its readiness by only a few ms, but the AllReduce is more bandwidth-efficient. (2) Use DDP''s bucket_cap_mb and find_unused_parameters to control bucketing. (3) Alternative: use gradient_as_bucket_view=True to eliminate buffer copies, and set bucket_cap_mb based on profiling: try 10MB, 25MB, 50MB, 100MB and measure step time. (4) Advanced: NVIDIA''s Apex DDP allows custom bucket assignments via register_grad_hook_per_bucket. Assign layers to buckets based on profiled backward timing, not just parameter count.'
  common_mistake: |
    **The Pitfall:** Using the same bucket size for all layers.
    **The Rationale:** The output layer's small gradients create a tiny first bucket that underutilizes AllReduce bandwidth.
    **The Consequence:** Large intermediate layers are delayed, increasing overall communication latency and reducing training throughput.
  napkin_math: |
    - **First Bucket (1MB):** 1MB at 900 GB/s = 0.001ms (wastes bandwidth setup).
    - **Optimal First Bucket (25MB):** 25MB at 900 GB/s = 0.028ms (25x more useful data).
    - **Savings Per Step:** 50 microseconds (by reducing AllReduce calls).
    - **Final Result:** **Over 200 steps, this saves 10ms of pure communication overhead.**
