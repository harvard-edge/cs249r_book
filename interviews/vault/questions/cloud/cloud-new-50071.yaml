title: Overlapping Embedding Table AllReduce in Hybrid Parallelism
scenario: Your recommendation model has a 50GB embedding table (table-parallel across 8 GPUs) and a 2B-parameter
  MLP (data-parallel across the same 8 GPUs). The embedding lookup produces sparse gradients, while the
  MLP produces dense gradients. Both need AllReduce. Can they overlap?
question: "Can they overlap?"
details:
  realistic_solution: 'Overlap strategy: (1) MLP backward finishes before embedding backward (MLP is on
    top of the network). Start dense AllReduce for MLP gradients immediately on NCCL stream 1. (2) Embedding
    backward produces sparse gradients (only ~1% of the table is accessed per batch). Use AlltoAll (not
    AllReduce) to route sparse gradients to the owning GPU on NCCL stream 2. (3) Both communications overlap
    with each other AND with any remaining embedding backward computation. (4) Key: sparse gradient communication
    is much smaller than dense. 50GB table with 1% sparsity: only 500MB of sparse gradients vs 8GB dense
    MLP gradients. The sparse AlltoAll finishes first, allowing the embedding optimizer to start while
    MLP AllReduce is still in progress.'
  common_mistake: Using the same AllReduce strategy for both sparse embedding gradients and dense MLP
    gradients. Sparse AllReduce (AllGather of indices + values) has very different performance characteristics
    than dense AllReduce.
  napkin_math: 'MLP dense AllReduce: 8GB at 900 GB/s NVLink = 8.9ms. Embedding sparse AlltoAll: 500MB
    at 900 GB/s = 0.56ms. If overlapped: total = max(8.9, 0.56) = 8.9ms vs serial 9.46ms. Small savings,
    but the embedding optimizer starts 8.9ms earlier — pipeline win.'
