title: Data-Parallel Process Group Misalignment in 3D Training
scenario: You are debugging a 175B parameter model training job on a 1024-GPU A100 cluster (128 nodes,
  8 GPUs/node) using 3D parallelism (TP=8, PP=16, DP=8). The DP gradient AllReduce at the end of each
  backward pass should run only over the 8 ranks that share the same TP/PP coordinates (a logical 8-way
  ring on InfiniBand HDR at ~25 GB/s unidirectional). Instead, profiling shows the DP AllReduce time is
  10x higher than expected and that *every* rank in the world (1024 GPUs) participates in the collective.
  Throughput has degraded by 60%. Root-cause the bottleneck and propose the process-group fix.
question: "Why is the DP AllReduce running over all 1024 ranks instead of the 8-rank DP group, and what process-group fix is needed?"
details:
  realistic_solution: Diagnose that the DP AllReduce call is missing its `group=` argument and defaulting
    to `dist.group.WORLD`. Fix it by explicitly passing the initialized Data Parallel process group (e.g.,
    `group=dp_group`) so NCCL restricts the gradient sync to the 8 ranks that share the same (TP coord,
    PP coord). After the fix, the AllReduce runs over the intended 8-way DP ring at ~25 GB/s unidirectional
    IB, and AllReduce volume drops by the ratio of world ranks to DP ranks (1024/8 = 128x reduction in
    bus traffic for the same gradient shard).
  common_mistake: Assuming `torch.distributed.all_reduce` automatically infers the right subgroup from
    the tensor's parallelism dimension. NCCL has no notion of TP/PP/DP coordinates — group membership
    is fully explicit, and a missing `group=` argument silently routes the collective to the world group.
  napkin_math: 'DP gradient shard for a 175B model with TP=8, PP=16 = 175B / (TP*PP) ≈ 1.37B params
    * 2 bytes (BF16) = 2.74 GB per DP rank. Correct DP AllReduce on the 8-rank group over IB HDR (~25
    GB/s unidirectional) — 2*(7/8) * 2.74 GB / 25 GB/s ≈ 192 ms. Wrong AllReduce on the full 1024-rank
    world over the same IB fabric — 2*(1023/1024) * 2.74 GB / 25 GB/s ≈ 219 ms *per ring hop*, but
    the 1024-rank ring traverses many more inter-node hops and contends with TP/PP traffic, blowing
    the 192 ms target by ~12x.'
