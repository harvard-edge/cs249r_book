title: InfiniBand vs Ethernet Cost-Performance Analysis for H100 Scale-Out
scenario: You must choose between HDR InfiniBand (200Gbps, $3000/port, deterministic latency) and 400GbE RoCEv2 ($800/port, lossless Ethernet with DCQCN) for a new 1024-H100 training cluster. The cluster will run 7-14 day jobs.
question: Which network should a 1024-H100 training cluster choose, HDR InfiniBand or 400GbE RoCEv2, given cost and performance trade-offs?
details:
  realistic_solution: 'IB cost: 1024 ports × $3000 + 128-port switches (16 leaf + 8 spine = 24 switches) × $150k = $3.07M + $3.6M = $6.67M. Ethernet cost: 1024 ports × $800 + switch ports = $820k + $800k = $1.62M. IB premium: $5.05M. Performance: IB AllReduce P99 = 1.1× mean. RoCEv2 P99 = 1.3-1.5× mean during congestion. For 14-day job: if RoCEv2 adds 15% AllReduce overhead → step time increases 5% (if AllReduce is 33% of step) → job takes 14.7 days. Annual cluster utilization loss: 5% × $4/GPU-hr × 1024 GPUs × 8760hr = $1.79M/yr. IB premium ROI: $5.05M / $1.79M/yr = 2.8-year payback. Decision: IB justified for large-scale long-running training; RoCEv2 acceptable for <256 GPU or inference workloads.'
  common_mistake: |
    **The Pitfall:** Comparing only per-port costs without including network equipment or modeling the throughput impact.
    **The Rationale:** System architects often isolate the hardware line-item cost from the operational timeline.
    **The Consequence:** Choosing the cheaper Ethernet option without realizing that a 3-5% slowdown on a massive 1024-GPU cluster will cost millions of dollars in lost compute time over the cluster's lifespan.
  napkin_math: |
    - IB vs RoCEv2 cost premium: $5.05M.
    - Revenue impact of 5% slower training: 1024 GPUs * $4/hr * 5% = $204.80/hr lost utilization.
    - If real-world utilization is 50%, and actual training slowdown is 3%: $1.79M * (3/5) * 0.5 = $537k/yr impact.
    - **IB ROI: $5.05M / $537k/yr ≈ 9.4 years, making the economic decision highly dependent on exact slowdown and utilization.**
