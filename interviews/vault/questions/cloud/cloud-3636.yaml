title: InfiniBand vs Ethernet Cost-Performance Analysis for H100 Scale-Out
scenario: You must choose between HDR InfiniBand (deterministic latency) and 400GbE RoCEv2 (lossless Ethernet with DCQCN) for a new 1024-node training cluster. The cluster will run 7-14 day jobs.
question: Which network should a 1024-H100 training cluster choose, HDR InfiniBand or 400GbE RoCEv2, given cost and performance trade-offs?
details:
  realistic_solution: 'Model the total cost of ownership (TCO) including the hardware premium and the operational utilization penalty. While RoCEv2 is significantly cheaper upfront, at the 1024-GPU scale, the network congestion leads to P99 tail latencies that degrade AllReduce synchronization. This causes an expected 3-5% job slowdown. Over the cluster lifecycle, the lost GPU hours from this slowdown mathematically justify the InfiniBand premium.'
  common_mistake: |
    **The Pitfall:** Comparing only per-port costs without including network equipment or modeling the throughput impact.
    **The Rationale:** System architects often isolate the hardware line-item cost from the operational timeline.
    **The Consequence:** Choosing the cheaper Ethernet option without realizing that a 3-5% slowdown on a massive 1024-GPU cluster will cost millions of dollars in lost compute time over the cluster's lifespan.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1024-GPU cluster running 14-day jobs, ~50% utilization.
       - IB premium: ~$5.05M total cost difference.
       - GPU cost: $4/hour.
       - RoCEv2 slowdown: 3% training throughput reduction.
    2. **Calculations:**
       - Lost utilization revenue per hour: 1024 GPUs * $4/hr * 50% utilization = $2,048/hr.
       - Annualized cost of 3% slowdown: $2,048/hr * 8760 hrs/yr * 0.03 = $538,214/yr.
       - ROI payback period: $5,050,000 / $538,214/yr = ~9.38 years.
    3. **Conclusion & Interpretation:**
       - **Result: Economics-Bound. IB ROI takes ~9.4 years, making the cheaper Ethernet option economically superior unless utilization or slowdown penalties are much higher.**
