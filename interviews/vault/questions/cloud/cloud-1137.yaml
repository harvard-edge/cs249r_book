title: Diagnosing Hidden Disparities in API Performance
scenario: A facial authentication API processes 10 million requests/day with 99.2% aggregate accuracy, but customer support reports a massive spike in lockouts from a specific demographic subset.
question: How do you analyze the inference logs to diagnose the root cause of these targeted failures despite healthy aggregate metrics?
details:
  realistic_solution: Implement disaggregated evaluation by slicing the validation dataset and inference logs across demographic subgroups (e.g., using intersectional attributes). Calculate metrics like False Rejection Rate (FRR) for each specific slice to isolate the degraded performance and identify the underrepresented cohorts.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate top-line metrics like overall accuracy or AUC.
    **The Rationale:** Assuming that the 0.8% error budget is uniformly distributed across the entire user population.
    **The Consequence:** Masking severe bias and systemic failures affecting minority or specific user cohorts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M requests/day at 99.2% accuracy (80,000 total failures).
    - Minority subgroup: 5% of traffic (500K requests).

    **Calculations:**
    - Subgroup accounts for 50,000 failures.
    - Subgroup error rate: 50,000 / 500,000 = 10% (90% accuracy).
    - Majority failures: 30,000.
    - Majority error rate: 30,000 / 9,500,000 = ~0.3%.

    **Conclusion & Interpretation:**
    - **Result: Data-Distribution Bound (Bias).** The 99.2% aggregate accuracy masks a >30x disparity in error rates, indicating severe demographic bias.
