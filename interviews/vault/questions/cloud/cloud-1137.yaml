title: Diagnosing Hidden Disparities in API Performance
scenario: You are debugging a facial authentication API running on a cloud cluster of 32 NVIDIA T4 GPUs
  processing 10 million inference requests per day. The aggregate system accuracy is 99.2%, comfortably
  above the 99.0% SLA. However, customer support is reporting a massive spike in lockout tickets from
  a specific subset of users. How do you analyze the inference logs to diagnose the root cause of these
  targeted failures despite the healthy aggregate metrics?
question: "How do you analyze the inference logs to diagnose the root cause of these targeted failures despite the healthy aggregate metrics?"
details:
  realistic_solution: Implement disaggregated evaluation by slicing the validation dataset and inference
    logs across demographic subgroups (e.g., using intersectional attributes). Calculate metrics like
    False Rejection Rate (FRR) for each specific slice to isolate the degraded performance and identify
    the underrepresented cohorts.
  common_mistake: Relying solely on aggregate top-line metrics like overall accuracy or AUC, and assuming
    that the 0.8% error budget is uniformly distributed across the entire user population.
  napkin_math: With 10M total requests at 99.2% accuracy, there are 80,000 total failures. If a minority
    subgroup comprises 5% of the traffic (500K requests) but accounts for 50,000 of those failures, their
    subgroup error rate is 10% (90% accuracy). The majority group (9.5M requests) has 30,000 failures,
    an error rate of ~0.3%. The aggregate 99.2% accuracy completely masks a >30x disparity in error rates.
