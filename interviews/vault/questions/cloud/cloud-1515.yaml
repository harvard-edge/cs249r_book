title: Training Time Estimation with Local NVMe Caching
scenario: Your 8-node cluster (each processing 16 GB/s of training data) is training a model for 10 epochs
  on a 64TB dataset stored in cloud object storage (S3). Each node has a 50 Gbps (6.25 GB/s) network link
  to S3 and a local 10TB NVMe SSD with 20 GB/s read bandwidth. If the dataset is perfectly sharded and
  you implement a local NVMe warm cache, calculate the total training time compared to reading from S3
  every epoch.
details:
  realistic_solution: Calculate Epoch 1 at the network-limited speed (6.25 GB/s) and Epochs 2-10 at the
    GPU compute-limited speed (16 GB/s), as the 8TB data shard fits entirely within the 10TB NVMe cache.
  common_mistake: Assuming the cache accelerates the first epoch, or using the NVMe maximum bandwidth
    (20 GB/s) instead of the GPU compute limit (16 GB/s) to calculate the duration of cached epochs.
  napkin_math: 'Node shard = 64TB / 8 = 8TB (8000 GB). Without cache: S3 bottleneck (6.25 GB/s). 8000
    GB / 6.25 GB/s = 1280s per epoch. 10 epochs = 12,800s. With cache: Epoch 1 is S3 bottlenecked = 1280s.
    Epochs 2-10 read from NVMe but are bottlenecked by GPU compute (16 GB/s). 8000 GB / 16 GB/s = 500s
    per epoch. Total time with cache = 1280s + (9 * 500s) = 5780s. Total time saved = 12,800s - 5780s
    = 7020s.'
