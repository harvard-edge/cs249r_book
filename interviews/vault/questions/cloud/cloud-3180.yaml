title: Speculative Decoding Impact on Time-to-First-Token
scenario: After enabling speculative decoding for a 70B model on H100, users report that Time-To-First-Token (TTFT) increased from 200ms to 350ms. Tokens per second after the first token improved 2.5x.
question: Why did speculative decoding increase TTFT from 200 ms to 350 ms, and how would you fix the first-token delay?
details:
  realistic_solution: 'Without speculation, TTFT = target prefill time for prompt. With speculation: draft must also prefill the prompt to generate its first draft tokens. But draft and target run sequentially on same GPU. The first token is emitted after target verification, not after target prefill alone. Fix: skip speculation for the first decode step — emit first token immediately after target prefill, then start speculation from token 2 onwards.'
  common_mistake: |
    **The Pitfall:** Thinking TTFT degradation is solely caused by draft model memory initialization overhead.
    **The Rationale:** Engineers assume loading a second model causes the delay and try to optimize weights.
    **The Consequence:** They miss that the draft model sequentially processes the prompt, inherently adding its own prefill latency to the critical path.
  napkin_math: |
    1. **Assumptions & Constraints:** Target prefill = 200ms. Draft prefill = 29ms. Draft generate (K tokens) = 10ms. Target verify = 42ms.
    2. **Calculations:** Sequential TTFT = 200ms (target) + 29ms (draft) + 10ms (draft gen) + 42ms (verify) = 281ms (overhead brings it to ~350ms). Fix: Skip speculation for the first decode step. Optimized TTFT = 200ms (target) + 42ms (verify) = 242ms.
    3. **Conclusion & Interpretation:** **Result: 242ms optimized TTFT. Latency-Bound by sequential prefill.**
