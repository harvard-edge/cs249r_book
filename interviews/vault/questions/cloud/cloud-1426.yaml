title: Quantifying the Integration Bottleneck
scenario: 'You are deploying a 7-billion parameter auto-regressive language model (FP16) on an accelerator with 1.5 TB/s memory bandwidth and 300 TFLOPS of compute capacity. For single-token generation (batch size = 1), assume HBM memory access costs 40 pJ/byte and compute costs 0.1 pJ/FLOP.'
question: "For batch-1 decoding of the 7B FP16 model, what are the time and energy ratios of weight movement versus compute?"
details:
  realistic_solution: 'Calculate the exact data transfer time and energy versus compute time and energy to prove the workload is massively memory-bound. Then, propose solutions like increasing batch size to amortize weight loading, or using weight quantization (e.g., INT4) to reduce the integration bottleneck.'
  common_mistake: |
    **The Pitfall:** Focusing purely on the theoretical TFLOPS and compute energy to estimate latency and power draw, entirely ignoring the physical cost of streaming the model.
    **The Rationale:** Engineers optimize the arithmetic loops, unaware that at batch size 1, the GPU operates essentially as a highly inefficient memory-copy machine.
    **The Consequence:** The deployment vastly under-provisions power and thermal cooling, and misses the mandatory requirement to implement INT8/INT4 weight quantization to survive production limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B params (FP16 = 14 GB weight size). Batch Size: 1.
       - Accelerator: 1.5 TB/s bandwidth, 300 TFLOPS.
       - Energy parameters: 40 pJ/Byte for transfer, 0.1 pJ/FLOP for compute.
    2. **Calculations:**
       - Transfer Time = 14 GB / 1.5 TB/s ≈ 9.33 ms.
       - Compute Time = (2 FLOPs × 7B) / 300 TFLOPS ≈ 0.046 ms.
       - Latency Ratio = 9.33 ms / 0.046 ms ≈ 200x slower.
       - Transfer Energy = 14 GB × 40 pJ/Byte = 560 mJ.
       - Compute Energy = 14 GFLOPs × 0.1 pJ/FLOP = 1.4 mJ.
       - Energy Ratio = 560 mJ / 1.4 mJ = 400x more expensive.
    3. **Conclusion & Interpretation:**
       - **Result: Massively Memory-Bound (Time & Energy)**. Data movement accounts for >99% of both the latency and power budget. Advanced quantization techniques are non-negotiable to shift the workload closer to the compute ridge point.
