title: Quantifying the Integration Bottleneck
scenario: You are deploying a 7-billion parameter auto-regressive language model (FP16) on an accelerator
  with 1.5 TB/s memory bandwidth and 300 TFLOPS of compute capacity. For single-token generation (batch
  size = 1), assume HBM memory access costs 40 pJ/byte and compute costs 0.1 pJ/FLOP. Calculate the time
  and energy ratios between moving the model weights and executing the computation to determine the primary
  bottleneck.
details:
  realistic_solution: Calculate the exact data transfer time and energy versus compute time and energy
    to prove the workload is massively memory-bound. Then, propose solutions like increasing batch size
    to amortize weight loading, or using weight quantization (e.g., INT4) to reduce the integration bottleneck.
  common_mistake: Focusing purely on the theoretical TFLOPS to estimate latency, entirely ignoring that
    auto-regressive decoding at low batch sizes is bounded by memory bandwidth and data movement energy,
    not arithmetic throughput.
  napkin_math: 'Weights = 7B * 2 Bytes = 14 GB.

    Transfer Time = 14 GB / 1.5 TB/s ≈ 9.33 ms.

    Compute Time = (2 * 7B FLOPs) / 300 TFLOPS ≈ 0.046 ms.

    Time Ratio: 9.33 / 0.046 ≈ 200x slower for data movement.

    Transfer Energy = 14 GB * 40 pJ/Byte = 560 mJ.

    Compute Energy = 14 GFLOPs * 0.1 pJ/FLOP = 1.4 mJ.

    Energy Ratio: 560 / 1.4 = 400x more energy for data movement.'
