title: Evaluating BSP Mitigation Strategies for Stragglers
scenario: You are training a 175B parameter language model on a cluster of 2048 H100 GPUs using 3D parallelism.
  Under the current Bulk Synchronous Parallel (BSP) execution model, the cluster utilization (MFU) is
  hovering around 35%. Profiling shows that 10% of the nodes consistently exhibit a 20% compute slowdown
  (stragglers due to thermal throttling). You must evaluate whether to implement pipeline asynchronous
  execution, switch to an Asynchronous Parallel (ASP) approach, or maintain BSP while mitigating stragglers
  at the infrastructure level. Justify your architectural choice quantitatively.
details:
  realistic_solution: Maintain BSP to preserve strict mathematical equivalence and convergence guarantees,
    but mitigate the straggler penalty by over-provisioning nodes (e.g., maintaining a warm pool of spares)
    to dynamically swap out thermally degraded nodes, minimizing the bottleneck at the synchronization
    barrier.
  common_mistake: Candidates often immediately suggest switching to Asynchronous Parallel (ASP) to eliminate
    the synchronization barrier and improve MFU, failing to account for the severe degradation in statistical
    efficiency and convergence stability at the 100B+ parameter scale.
  napkin_math: Let base compute be T_c = 500ms and T_comm = 100ms. Normal iteration = 600ms. With 20%
    slower stragglers, max(T_c) = 600ms, making BSP iteration = 700ms. ASP iteration = avg(T_c) + T_comm
    ≈ 510 + 100 = 610ms (13% faster per step). However, ASP stale gradients increase required steps to
    converge by ~30%. Total ASP time = 1.3 * N * 610 = 793 * N. Total straggler BSP time = 700 * N. Total
    mitigated BSP time (swapping bad nodes) = 600 * N. Mitigated BSP is 32% faster overall than ASP.
