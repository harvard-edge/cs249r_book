title: Applying the Iron Law of ML Systems
scenario: 'Your ML serving platform handles a dense retrieval model. Profiling shows each request processes
  10 GFLOPs of compute and reads 200 MB of data. Your current cloud GPU provides 20 TFLOPS of compute
  and 1 TB/s of memory bandwidth. The serving framework adds a fixed 300 µs of overhead per request. Using
  the Iron Law of ML Systems, evaluate which of the following three architectural investments will provide
  the largest absolute reduction in end-to-end latency: (A) Upgrading to a GPU with 2 TB/s memory bandwidth,
  (B) Applying model pruning to reduce compute to 5 GFLOPs, or (C) Rewriting the serving framework in
  C++ to reduce overhead to 20 µs.'
details:
  realistic_solution: 'Decompose the latency using the Iron Law: T_total = T_data + T_compute + T_overhead.
    Calculate current times: T_data = 200 MB / 1 TB/s = 200 µs. T_compute = 10 GFLOPs / 20 TFLOPS = 500
    µs. T_overhead = 300 µs. Option C (framework rewrite) saves 280 µs, outperforming Option B (250 µs
    savings) and Option A (100 µs savings).'
  common_mistake: Candidates often intuitively assume hardware upgrades (bandwidth or compute) are always
    the best optimization path without calculating the exact theoretical time spent in each phase of the
    Iron Law.
  napkin_math: 'Base Latency = (200e6 / 1e12) + (10e9 / 20e12) + 300µs = 200µs + 500µs + 300µs = 1000µs.

    (A) BW to 2 TB/s: T_data drops to 100µs (saves 100µs).

    (B) Prune to 5 GFLOPs: T_comp drops to 250µs (saves 250µs).

    (C) Overhead to 20µs: T_over drops to 20µs (saves 280µs).

    Conclusion: Option C provides the maximum latency reduction.'
