title: TB-Scale Embedding Table Sharding
scenario: You have 50 embedding tables with sizes ranging from 1 GB to 2 TB (total 20 TB). You must shard them across a cluster of 128 A100 GPUs, with 10 TB fitting in GPU HBM. The remaining 10 TB must live in CPU DRAM.
question: How would you design the sharding strategy to minimize P99 lookup latency, and what determines which tables go to GPU vs CPU?
details:
  realistic_solution: 'Partition tables by access frequency × embedding dimension (i.e., bandwidth demand per second). Hot tables — those accessed in every request or with high lookup frequency — belong on GPU HBM for low-latency access (A100 HBM: 2 TB/s). Cold tables (accessed in <10% of requests) go to CPU DRAM (DDR5: ~50 GB/s aggregate across CPUs). For tables that exceed single-GPU capacity: row-wise sharding (each GPU holds a contiguous range of rows) minimizes cross-GPU communication for any single lookup. For small hot tables that fit in GPU HBM: replicate on all GPUs to eliminate all-to-all communication for those lookups. Final strategy: (1) Sort tables by QPS × row_size_bytes. (2) Place top tables on GPU until 80% of cluster HBM is used (10 TB × 0.8 = 8 TB). (3) Remaining on CPU DRAM with prefetch pipeline. (4) Replicate tables < 100 MB on all 128 GPUs if they appear in every request.'
  common_mistake: |
    **The Pitfall:** Sharding by table size alone (large tables on CPU, small tables on GPU).
    **The Rationale:** Candidates intuitively assume large tables won't fit well on GPUs and small tables are easier to replicate.
    **The Consequence:** Hot large tables on the CPU will destroy P99 latency due to high lookup frequency over slower PCIe/DRAM paths, while cold small tables waste expensive HBM.
  napkin_math: |
    - **Cluster Capacity**: 128 GPUs × 80 GB = 10.24 TB HBM. Reserve 20% for activations/gradients: 8.2 TB usable for embeddings.
    - **Hot Tables**: If top-10 hot tables sum to 8 TB, fit them entirely on GPU.
    - **CPU Capacity**: 128 nodes × 512 GB = 65 TB capacity (ample for remaining 12 TB).
    - **Latency Comparison**: CPU lookup latency ~100 μs (DRAM + memory bus); GPU lookup latency ~5 μs.
    - **Pipelining**: For **P99 < 10 ms** serving, CPU lookups must be pipelined to hide latency by starting them asynchronously while the GPU handles the dense pathway.
