title: TB-Scale Embedding Table Sharding
scenario: You have 50 embedding tables with sizes ranging from 1 GB to 2 TB (total 20 TB). You must shard them across a cluster of 128 GPUs, with 10 TB fitting in GPU HBM. The remaining 10 TB must live in CPU DRAM.
question: How would you design the sharding strategy to minimize P99 lookup latency, and what determines which tables go to GPU vs CPU?
details:
  realistic_solution: 'Partition tables by access frequency x embedding dimension (i.e., bandwidth demand per second). Hot tables — those accessed in every request or with high lookup frequency — belong on GPU HBM for low-latency access (A100 HBM: 2 TB/s). Cold tables (accessed in <10% of requests) go to CPU DRAM (DDR5: ~50 GB/s aggregate across CPUs). For tables that exceed single-GPU capacity: row-wise sharding (each GPU holds a contiguous range of rows) minimizes cross-GPU communication for any single lookup. For small hot tables that fit in GPU HBM: replicate on all GPUs to eliminate all-to-all communication for those lookups. Final strategy: (1) Sort tables by QPS x row_size_bytes. (2) Place top tables on GPU until 80% of cluster HBM is used (10 TB x 0.8 = 8 TB). (3) Remaining on CPU DRAM with prefetch pipeline. (4) Replicate tables < 100 MB on all 128 GPUs if they appear in every request.'
  common_mistake: |
    **The Pitfall:** Sharding by table size alone (large tables on CPU, small tables on GPU).
    **The Rationale:** Candidates intuitively assume large tables won't fit well on GPUs and small tables are easier to replicate.
    **The Consequence:** Hot large tables on the CPU will destroy P99 latency due to high lookup frequency over slower PCIe/DRAM paths, while cold small tables waste expensive HBM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPUs: 128 (80GB each) = 10.24 TB HBM (8.2 TB usable).
       - CPU Lookups: ~100 µs. GPU Lookups: ~5 µs.
    2. **Calculations:**
       - Top hot tables filling up to 8 TB are pinned to HBM.
       - Remaining cold tables pipelined via CPU DRAM.
       - Sub-100 MB tables fully replicated 128x.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Placement.** Bandwidth-demand sharding guarantees sub-10ms P99, effectively hiding CPU latency via asynchronous prefetching.
