title: Optimizing LLM Checkpoint Intervals at Scale
scenario: You are training a 175B parameter LLM on a cluster of 1,024 A100 (80GB) GPUs organized into
  128 nodes. The cluster experiences hardware or network failures with a Mean Time Between Failures (MTBF)
  of 12 hours. A full checkpoint (FP16 weights, FP32 master weights, and Adam optimizer states) totals
  approximately 2.45 TB. Writing synchronously to a shared Lustre file system blocks the training loop
  for exactly 120 seconds. Evaluate the trade-offs of checkpoint frequency, calculate the mathematically
  optimal interval to minimize total training time, and justify whether implementing asynchronous node-local
  NVMe checkpointing is worth the architectural complexity.
question: "With a 12h MTBF and 120s Lustre writes, what checkpoint interval is optimal and is async node-local NVMe worth it?"
details:
  realistic_solution: Use Daly's formula (T_opt = sqrt(2 * t_c * MTBF)) to balance overhead and failure
    cost. For synchronous Lustre writes, T_opt is ~53 minutes. Transitioning to an asynchronous local
    checkpointing architecture allows nodes to write their 19.1GB shard directly to local NVMe SSDs in
    ~4.78 seconds, unblocking the training loop immediately while a background thread uploads to Lustre.
    This reduces the critical-path t_c to 4.78s, shifting T_opt to ~10.7 minutes and drastically cutting
    both blocking overhead and wasted recompute time.
  common_mistake: Candidates often propose arbitrary checkpoint intervals (e.g., 'end of every epoch'
    or 'every 2 hours') without statistically balancing the synchronous write overhead against the expected
    wasted recompute time when a failure inevitably occurs.
  napkin_math: 'Synchronous t_c = 120s, MTBF = 43,200s (12h).

    T_opt = sqrt(2 * 120 * 43,200) = sqrt(10,368,000) = ~3,219s (~53.6 mins).

    Total downtime per MTBF = write_overhead + failure_recompute = 120s * (43200/3219) + 3219/2 = 1,610s
    + 1,609s = 3,219s (~7.4% cluster waste).

    With local NVMe: 2.45TB / 128 nodes = 19.1GB/node. NVMe write at 4GB/s = ~4.78s.

    Async T_opt = sqrt(2 * 4.78 * 43200) = ~643s (~10.7 mins).

    New total waste = 4.78s * (43200/643) + 643/2 = 321s + 321s = 642s (~1.5% cluster waste).

    Savings: 5.9% of cluster time, worth millions of dollars.'
