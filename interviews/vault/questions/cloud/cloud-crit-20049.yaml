title: EAGLE-2 Self-Speculative Architecture
scenario: 'EAGLE uses the target model''s hidden states (not just token embeddings) as input to a lightweight
  draft head, achieving higher acceptance rates than token-level draft models. For a 70B target on 4x
  H100 with hidden_dim=8192, design an EAGLE-style draft head: input features, head architecture, training
  data requirements, and memory budget.'
question: "How would you design an EAGLE-style draft head for a 70B target with hidden_dim=8192, and what memory and training costs follow?"
details:
  realistic_solution: 'EAGLE draft head input: concat(last_hidden_state[t], embedding[t+1_predicted])
    = 8192 + 8192 = 16384 dim. Head architecture: 1 transformer layer (self-attention + FFN) with hidden_dim=8192,
    then linear to vocab (128K). Parameters: attention: 4 x 8192^2 = 268M. FFN: 3 x 8192 x 8192 = 201M
    (using 1x expansion instead of 4x). Projection: 16384->8192 = 134M. Vocab head: 8192 x 128K = 1.05B.
    Total: ~1.65B params = 3.3GB FP16 = 0.83GB/GPU. Memory overhead: 0.83GB/GPU (1% of 80GB). Forward
    cost: 3.3 GFLOP at 989 TFLOPS = 3.3us per token — negligible. Training: requires target model''s hidden
    states, so generate offline by running target on training data and saving hidden states. ~100K examples
    sufficient. EAGLE achieves alpha=0.85-0.90 vs regular draft model alpha=0.78, because the hidden state
    carries ''what the target model is thinking'' not just ''what tokens were generated.'''
  common_mistake: Using only the last layer's hidden state. EAGLE concatenates the hidden state with the
    token embedding to provide both semantic (hidden state) and surface-level (embedding) information,
    which is crucial for predicting the next token's identity.
  napkin_math: 'EAGLE head: 1.65B params = 3.3GB. Per GPU (TP=4): 0.83GB. Forward: 3.3us. Alpha improvement:
    0.78 -> 0.87. E[tokens]: 3.38 -> 4.45. Speedup: 2.75x -> 3.5x. Extra memory: 1% of VRAM.'
