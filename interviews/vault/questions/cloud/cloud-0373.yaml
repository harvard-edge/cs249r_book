title: The Economics of Production A/B Testing
scenario: Your team is considering deploying a new, more accurate recommendation model. To validate its
  real-world performance, you decide to run a one-week A/B test, diverting 10% of production traffic to
  the new model. Your service currently requires a fleet of 100 H100 GPUs to serve 100% of traffic, and
  the new model also requires one H100 per instance. Using the standard hardware constants, explain how
  you would calculate the incremental operational cost (OpEx) of running this test for the full week.
  Assume a datacenter PUE of 1.1 and an electricity cost of $0.15 per kWh.
details:
  realistic_solution: The correct approach is to calculate the total energy consumed by the *additional*
    hardware required for the A/B test over the test's duration, including the PUE overhead. The fleet
    for the 10% test slice requires 10 GPUs. Each GPU consumes 700W, but the datacenter uses an additional
    10% for cooling (PUE of 1.1), bringing the total power per GPU to 770W. The total cost is then this
    power multiplied by the duration and the price of electricity.
  common_mistake: The most common mistake is to only calculate the cost of the GPU's direct power draw
    (the TDP), completely forgetting the datacenter overhead for cooling and power conversion, which is
    what the PUE (Power Usage Effectiveness) factor represents. A second common error is miscalculating
    the number of GPUs needed for the test slice, for example by calculating the cost for the whole fleet
    instead of the incremental 10%.
  napkin_math: '1. **GPUs for test:** 100 total GPUs × 10% = 10 GPUs.

    2. **Power per GPU with PUE:** 700W × 1.1 PUE = 770W.

    3. **Total Power for test fleet:** 10 GPUs × 770W = 7,700W = 7.7 kW.

    4. **Energy over 1 week (168 hours):** 7.7 kW × 168 hrs = 1,293.6 kWh.

    The A/B test consumes ~1,294 kWh of extra energy, which directly translates to additional electricity
    costs to validate the model.'
