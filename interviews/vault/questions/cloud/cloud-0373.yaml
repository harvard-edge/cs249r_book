title: The Economics of Production A/B Testing
scenario: Your team is deploying a new recommendation model. To validate it, you run a one-week A/B test, diverting 10% of production traffic. Your service currently requires 100 GPUs. The new model requires one GPU per instance. Assume a datacenter PUE of 1.1 and an electricity cost of $0.15 per kWh. Each GPU consumes 700W.
question: What incremental OpEx does the one-week 10% A/B test add, including PUE 1.1 and $0.15/kWh electricity?
details:
  realistic_solution: The correct approach is to calculate the total energy consumed by the *additional* hardware required for the A/B test over the test's duration, including the PUE overhead. The fleet for the 10% test slice requires 10 GPUs. Each GPU consumes 700W, but the datacenter uses an additional 10% for cooling (PUE of 1.1), bringing the total power per GPU to 770W. The total cost is then this power multiplied by the duration and the price of electricity.
  common_mistake: |
    **The Pitfall:** Calculating only the direct power draw (TDP) of the GPU.
    **The Rationale:** Candidates completely forget the datacenter overhead for cooling and power conversion represented by PUE.
    **The Consequence:** They underestimate the actual electricity cost of the test.
  napkin_math: |
    - **GPUs for test:** 100 total GPUs * 10% = 10 GPUs.
    - **Power per GPU with PUE:** 700W * 1.1 PUE = 770W.
    - **Total Power for test fleet:** 10 GPUs * 770W = 7,700W = 7.7 kW.
    - **Energy over 1 week (168 hours):** 7.7 kW * 168 hrs = 1,293.6 kWh.
    - **Total Cost:** 1,293.6 kWh * $0.15/kWh = **$194.04**.
  options:
  - ~$176
  - ~$1940
  - ~$194
  - ~$19
  correct_index: 2
