title: The Economics of Production A/B Testing
scenario: You provision a one-week A/B test fleet to handle 10% of production traffic, requiring 10 additional GPUs. Assume a PUE of 1.1, electricity cost of $0.15/kWh, and 700W per GPU.
question: What incremental OpEx does the one-week 10% A/B test add, including PUE 1.1 and $0.15/kWh electricity?
details:
  realistic_solution: Calculate energy consumed by the additional hardware, strictly including the datacenter PUE overhead to find the true power footprint.
  common_mistake: |
    **The Pitfall:** Calculating only the direct power draw (TDP) of the GPU.
    **The Rationale:** Forgetting the datacenter overhead for cooling and power conversion.
    **The Consequence:** Underestimating the actual operational electricity cost of ML test fleets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 GPUs, 700W each. PUE=1.1, $0.15/kWh, 168 hours.
    2. **Calculations:**
       - True Power = 700W * 1.1 = 770W per GPU.
       - Total Energy = 10 * 0.77kW * 168h = 1293.6 kWh.
    3. **Conclusion & Interpretation:**
       - **Result: Incremental OpEx is $194.04.**
  options:
  - ~$176
  - ~$1940
  - ~$194
  - ~$19
  correct_index: 2
