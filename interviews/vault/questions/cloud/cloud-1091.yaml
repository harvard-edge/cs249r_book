title: S3 Small File GPU Starvation Diagnosis
scenario: 'A computer vision team training a distributed model on 10 million individual JPEG images (averaging 150KB each) stored in AWS S3 is experiencing severe GPU starvation. Their 8x A100 GPU cluster is only reaching 15% utilization. The PyTorch dataloader reads each image directly from S3 using 64 worker processes per node. Network bandwidth is 100 Gbps, and CPU utilization is low.'
question: "What is bottlenecking the S3 dataloader, and how should the image dataset be laid out to restore GPU utilization?"
details:
  realistic_solution: 'The bottleneck is the per-request latency (Time-To-First-Byte) of S3 for small objects. The solution is to shard the dataset into large (100MB - 1GB) contiguous files (e.g., TFRecords or WebDataset tarballs) to convert millions of random read operations into high-throughput sequential reads.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is network bandwidth or CPU decoding speed.
    **The Rationale:** Focusing on throughput rather than the massive per-request latency overhead of small file retrieval.
    **The Consequence:** Wasting time increasing dataloader workers or network interfaces without addressing the underlying storage layout.
  napkin_math: |
    1. S3 GET Time-To-First-Byte (TTFB) is ~20ms.
    2. Reading 10M files individually = 10M GETs. `10,000,000 * 20ms` = **200,000 seconds** of cumulative latency.
    3. Distributed across 64 workers, it still takes **~3,125 seconds** purely in TTFB latency per epoch.
    4. **Result:** Sharding 150KB images into 150MB shards reduces GET requests by 1,000x, allowing the system to fully saturate the 100 Gbps sequential bandwidth (downloading 1.5TB in ~120 seconds).
