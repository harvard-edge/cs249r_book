title: S3 Small File GPU Starvation Diagnosis
scenario: 'A computer vision team training a distributed model on 10 million individual JPEG images (averaging 150KB each) stored in AWS S3 is experiencing severe GPU starvation. Their 8x GPU cluster is only reaching 15% utilization. The PyTorch dataloader reads each image directly from S3 using 64 worker processes per node. Network bandwidth is 100 Gbps, and CPU utilization is low.'
question: What is bottlenecking the S3 dataloader, and how should the image dataset be laid out to restore GPU utilization?
details:
  realistic_solution: 'The bottleneck is the per-request latency (Time-To-First-Byte) of S3 for small objects. The solution is to shard the dataset into large (100MB - 1GB) contiguous files (e.g., TFRecords or WebDataset tarballs) to convert millions of random read operations into high-throughput sequential reads.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is network bandwidth or CPU decoding speed.
    **The Rationale:** Focusing on throughput rather than the massive per-request latency overhead of small file retrieval.
    **The Consequence:** Wasting time increasing dataloader workers or network interfaces without addressing the underlying storage layout.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10M files, 150KB each.
       - S3 GET Time-To-First-Byte (TTFB) ≈ 20ms.
       - 64 concurrent workers.
    2. **Calculations:**
       - Cumulative Latency: 10,000,000 * 20ms = 200,000 seconds.
       - Distributed Latency: 200,000s / 64 workers ≈ 3,125 seconds per epoch.
       - Sequential Bandwidth for 1.5TB at 100 Gbps ≈ 120 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Sharding 150KB to 150MB reduces GETs by 1000x (Latency-Bound).**
