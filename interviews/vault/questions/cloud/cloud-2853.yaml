title: Pre-training Cost Estimation
scenario: A team is planning to pre-train a 1 billion parameter dense transformer
  on 300 billion tokens. They will use a single node of 8x A100 80GB SXM GPUs, which
  costs $32 per hour. Historical runs suggest an average Model FLOPs Utilization (MFU)
  of 40%.
question: Calculate the total expected compute cost in dollars to complete this pre-training
  run.
details:
  realistic_solution: 'First, calculate the total compute required: 6 FLOPs/parameter/token
    * 1B parameters * 300B tokens = 1.8e21 total FLOPs. Next, find the effective throughput
    of the 8x A100 node: 8 GPUs * 312 TFLOP/s (FP16 peak) = 2.5 PFLOP/s peak. At 40%
    MFU, this is 1.0 PFLOP/s (1.0e15 FLOP/s). The training time is 1.8e21 / 1.0e15
    = 1.8e6 seconds, which is 500 hours. Finally, multiply by the hourly rate: 500
    hours * $32/hour = $16,000.'
  common_mistake: Forgetting the factor of 6 for FLOPs per parameter per token, or
    assuming 100% hardware utilization instead of applying the 40% MFU.
  napkin_math: (6 * 1e9 * 300e9) / (8 * 312e12 * 0.4) / 3600 * 32 = 16000
