title: Pre-training Cost Estimation
scenario: A team is planning to pre-train a 1 billion parameter dense transformer on 300 billion tokens. They will use a single node of 8x A100 80GB SXM GPUs (312 TFLOP/s FP16 peak), which costs $32 per hour. Historical runs suggest an average Model FLOPs Utilization (MFU) of 40%.
question: What is the expected compute cost in dollars to complete this pre-training run?
details:
  realistic_solution: Calculate total compute required using the 6ND formula, find the effective hardware throughput at 40% MFU, divide to get total time, and multiply by the hourly rate.
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 6 for FLOPs per parameter per token, or assuming 100% hardware utilization.
    **The Rationale:** Candidates often use standard inference FLOPs (2x) instead of training (6x) or fail to apply the empirical MFU.
    **The Consequence:** Drastically underestimating the required compute time and budget.
  napkin_math: |
    - **Total Compute:** 6 FLOPs × 1B params × 300B tokens = 1.8e21 FLOPs.
    - **Hardware Throughput:** 8 GPUs × 312 TFLOPS = 2.5 PFLOPS peak.
    - **Effective Throughput:** 2.5 PFLOPS × 40% MFU = 1.0 PFLOPS.
    - **Training Time:** 1.8e21 / 1.0e15 = 1.8e6 seconds = 500 hours.
    - **Result:** 500 hours × $32/hour = **$16,000 total cost**.
