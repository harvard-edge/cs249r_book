title: Pre-training Cost Estimation
scenario: A team is planning to pre-train a 1 billion parameter dense transformer on 300 billion tokens. They will use a single node of 8x A100 SXM GPUs, which costs $32 per hour. Historical runs suggest an average Model FLOPs Utilization (MFU) of 40%.
question: What is the expected compute cost in dollars to complete this pre-training run?
details:
  realistic_solution: Calculate total compute required using the 6ND formula, find the effective hardware throughput at 40% MFU, divide to get total time, and multiply by the hourly rate.
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 6 for FLOPs per parameter per token, or assuming 100% hardware utilization.
    **The Rationale:** Candidates often use standard inference FLOPs (2x) instead of training (6x) or fail to apply the empirical MFU.
    **The Consequence:** Drastically underestimating the required compute time and budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 1B parameters, 300B tokens.
       - Hardware: 8x A100 SXM GPUs (312 TFLOPS dense FP16 peak per GPU).
       - Cost: $32 per hour.
       - MFU: 40%.
    2. **Calculations:**
       - Total Compute = 6 * 1e9 params * 300e9 tokens = 1.8e21 FLOPs.
       - Hardware Peak Throughput = 8 * 312e12 FLOPs/s = 2.496 PFLOPS.
       - Effective Throughput = 2.496 PFLOPS * 0.40 = 998.4 TFLOPS.
       - Training Time = 1.8e21 FLOPs / 998.4e12 FLOPs/s = 1,802,884 seconds ≈ 500.8 hours.
       - Total Cost = 500.8 hours * $32/hour = $16,025.60.
    3. **Conclusion & Interpretation:** **The expected pre-training compute cost is exactly $16,025.60 based on empirical MFU.**
