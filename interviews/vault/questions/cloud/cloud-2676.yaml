title: From Edges to Objects in Deep Networks
scenario: Deep CNNs progressively build complex visual concepts from simple primitives across their layer hierarchy.
question: "How does a deep CNN build complex visual concepts from simple primitives across layers, and why does that justify the computational cost of depth?"
details:
  realistic_solution: 'Deep CNNs learn hierarchical representations through composition: Layer 1-2 detect edges and textures — oriented lines, color gradients, simple patterns. These are universal (same features for faces, cars, or animals). Layer 3-5 compose edges into parts — eyes, wheels, fur patches. These are mid-level features that combine simple detectors. Layer 6-10 compose parts into objects — faces, cars, animals. Each layer multiplies representational capacity by combining features from the previous layer. A single layer can only detect features within its receptive field using linear combinations followed by a non-linearity. But by stacking layers, the network achieves exponentially more complex functions with polynomially more parameters. Without depth, a shallow network would need exponentially many neurons to represent the same function. This is the theoretical justification: depth provides exponential expressiveness gains, justifying its linear computational cost increase.'
  common_mistake: |
    **The Pitfall:** Believing each layer learns completely independent features from the raw image.
    **The Rationale:** Candidates fundamentally misunderstand hierarchical representation, failing to realize that deeper layers take the output of previous layers as their literal input primitives.
    **The Consequence:** Misjudging the impact of architectural changes (like layer removal), falsely assuming it just "removes some features" rather than shattering all downstream composition.
  napkin_math: |
    - 3-layer CNN: edges → textures → simple shapes.
    - 10-layer CNN: edges → textures → parts → objects → scenes.
    - Each layer squares the compositional complexity.
    - **Depth provides exponential expressiveness (2^10 > 2^3) for a linear increase in parameter cost.**
