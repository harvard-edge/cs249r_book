title: From Edges to Objects in Deep Networks
scenario: Explain how a deep CNN progressively builds complex visual concepts from simple primitives across
  its layer hierarchy, and why this justifies the computational cost of depth.
question: "How does a deep CNN build complex visual concepts from simple primitives across layers, and why does that justify the cost of depth?"
details:
  realistic_solution: 'Deep CNNs learn hierarchical representations through composition: Layer 1-2 detect
    edges and textures — oriented lines, color gradients, simple patterns. These are universal (same features
    for faces, cars, or animals). Layer 3-5 compose edges into parts — eyes, wheels, fur patches. These
    are mid-level features that combine simple detectors. Layer 6-10 compose parts into objects — faces,
    cars, animals. Each layer multiplies representational capacity by combining features from the previous
    layer. A single layer can only detect features within its receptive field using linear combinations
    followed by a non-linearity. But by stacking layers, the network achieves exponentially more complex
    functions with polynomially more parameters. Without depth, a shallow network would need exponentially
    many neurons to represent the same function. This is the theoretical justification: depth provides
    exponential expressiveness gains, justifying its linear computational cost increase.'
  common_mistake: Thinking each layer learns independent features. Layers are compositional — each builds
    ON the previous layer's output. Removing a middle layer doesn't just lose those features; it breaks
    all downstream compositions.
  napkin_math: '3-layer CNN: edges → textures → simple shapes. 10-layer: edges → textures → parts → objects
    → scenes. Each layer squares the compositional complexity. 2^10 > 2^3.'
