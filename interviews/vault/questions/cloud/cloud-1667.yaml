title: Output Stationary SRAM Savings
scenario: You are mapping a linear layer matrix multiplication onto a spatial accelerator featuring a
  256x256 MAC array. The input activation matrix is 256 tokens by 1024 channels (M=256, K=1024), and the
  weight matrix is 1024 input channels by 256 output channels (K=1024, N=256). To minimize energy consumption,
  the hardware team suggests using an 'Output Stationary' dataflow to handle the partial sums (psums).
  Calculate the exact reduction in SRAM memory accesses (reads + writes) for psums achieved by this dataflow
  compared to a naive approach that reads and writes the psum from SRAM for every single MAC operation.
question: "What reduction in psum SRAM accesses does Output Stationary achieve for this 256x1024 by 1024x256 matmul?"
details:
  realistic_solution: In an Output Stationary dataflow, the intermediate partial sums accumulate in the
    local registers of the MAC units until the entire K dimension is reduced. The psum is written to SRAM
    only once after all K operations are complete, completely eliminating intermediate psum reads and
    writes.
  common_mistake: Candidates often misidentify the dimension that dictates the reduction factor, incorrectly
    calculating savings based on the M or N dimensions instead of the K dimension (the reduction dimension),
    or they confuse output stationary with weight stationary dataflows.
  napkin_math: 'Naive approach: For every MAC operation, 1 psum read and 1 psum write occurs. Total accesses
    = 2 * (M * N * K) = 2 * (256 * 256 * 1024) = 134,217,728 accesses. Output Stationary: Psums stay fixed
    in MAC registers. 0 intermediate reads/writes, and exactly 1 final write per output element. Total
    accesses = M * N = 256 * 256 = 65,536. Reduction factor = (2 * K) = 2048x fewer SRAM accesses for
    partial sums.'
