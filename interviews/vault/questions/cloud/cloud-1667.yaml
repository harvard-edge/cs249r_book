title: Output Stationary SRAM Savings
scenario: You are mapping a linear layer matrix multiplication onto a spatial accelerator featuring a 256x256 MAC array. The input activation matrix is 256 tokens by 1024 channels (M=256, K=1024), and the weight matrix is 1024 input channels by 256 output channels (K=1024, N=256). To minimize energy consumption, the hardware team suggests using an Output Stationary dataflow to handle the partial sums (psums).
question: What is the exact reduction in psum SRAM accesses achieved by an Output Stationary dataflow compared to reading and writing the psum for every MAC operation?
details:
  realistic_solution: In an Output Stationary dataflow, the intermediate partial sums accumulate in the local registers of the MAC units until the entire K dimension is reduced. The psum is written to SRAM only once after all K operations are complete, completely eliminating intermediate psum reads and writes.
  common_mistake: |
    **The Pitfall:** Calculating the reduction factor based on the M or N dimensions instead of the K dimension.
    **The Rationale:** Candidates often confuse output stationary with weight stationary dataflows, or simply misidentify which loop dimension is being reduced within the PE.
    **The Consequence:** Incorrectly estimating energy savings and potentially choosing the wrong dataflow architecture for a given layer shape.
  napkin_math: |
    1. **Naive Approach:** For every MAC operation (M x N x K), there is 1 psum read and 1 psum write. Total accesses = 2 * (256 * 256 * 1024) = 134,217,728 accesses.
    2. **Output Stationary:** Psums stay fixed in MAC registers until the K dimension is fully reduced. There are 0 intermediate reads/writes, and exactly 1 final write per output element (M x N). Total accesses = 256 * 256 = 65,536 accesses.
    3. **Reduction Factor:** 134,217,728 / 65,536 = **2048x fewer accesses** (which exactly equals 2 * K).
