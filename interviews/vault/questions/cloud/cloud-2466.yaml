title: Cost-Aware Hybrid LLM Routing
scenario: A mobile email client with 5M DAU introduces a 'Summarize Thread' feature. Usage averages 4
  requests/day per user. The cloud LLM (Llama-3-70B) API costs $0.50 per 1M tokens (avg 1000 tokens/request).
  Total cloud cost is reaching $10,000/day. You want to shift to an on-device Llama-3-8B (INT4) on mobile
  NPUs. However, only 30% of the user base has devices capable of running it (RAM > 8GB, modern NPU).
  Architect a deployment strategy to minimize cloud costs while ensuring <2s latency for all users.
question: "How would you route summarization between on-device Llama-3-8B and cloud models to cut cost while keeping latency under 2s for all users?"
details:
  realistic_solution: Design a capability-aware dynamic routing architecture. On app initialization, run
    a device profiling script to check RAM, SoC tier, and OS version. Capable devices download the INT4
    Llama-3-8B model (approx 4.5GB) over Wi-Fi. For these 30% of users, inference runs locally via NNAPI/CoreML,
    bringing cloud costs down instantly. For the remaining 70%, route requests to the cloud API. Further
    optimize cloud costs by implementing a semantic cache in the cloud for viral/company-wide email threads,
    and use a smaller, cheaper cloud model (e.g., 8B) for simple threads, reserving the 70B model only
    as a fallback for complex/long contexts.
  common_mistake: Forcing the model onto all phones resulting in OOM crashes for 70% of users, or keeping
    it entirely in the cloud due to fragmentation.
  napkin_math: "Original cost: 5M DAU * 4 req * 1000 tokens = 20B tokens/day. 20B / 1M * $0.50 = $10,000/day.\
    \ \nEdge routing saves 30%: $3,000/day saved. \nCloud traffic remaining: 14B tokens/day. \nSemantic\
    \ cache (20% hit rate): handles 2.8B tokens, saves $1,400/day. \nRemaining traffic to route: 11.2B\
    \ tokens. \nRouting 80% to cheaper 8B cloud model ($0.10/1M): (8.96B * $0.10/1M) = $896. \nRemaining\
    \ 20% to 70B: (2.24B * $0.50/1M) = $1,120. \nNew Daily Cost: $2,016 (80% reduction)."
