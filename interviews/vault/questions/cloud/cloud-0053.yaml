title: The Static Batching Waiting Game
scenario: 'You are managing an LLM inference service on a single H100 GPU. New requests arrive at a steady rate, one every 150ms. To optimize throughput, you''ve configured a static batching policy with a batch size of 8. Once a batch of 8 is full, it takes the H100 800ms to process it.'
question: "What is the average queue wait before processing for batch size 8 when requests arrive every 150ms?"
details:
  realistic_solution: 'The correct answer is 525ms. The core insight is that the waiting time is determined by how long it takes for a batch to assemble, not the GPU processing time. The first request waits for 7 more to arrive, the second for 6, and so on, until the last request waits for 0. The average of these waiting times is the answer.'
  common_mistake: |
    **The Pitfall:** Confusing the average wait time with the maximum wait time, or focusing on GPU processing time.
    **The Rationale:** Misunderstanding that the queueing delay is purely a function of arrival rate and batch size, independent of the 800ms processing time.
    **The Consequence:** Incorrectly modeling latency SLAs and over-provisioning compute to "fix" a queueing problem.
  napkin_math: |
    1. Arrival Rate: 1 request every 150ms.
    2. Wait times for 8 requests: The first waits `7 * 150ms = 1050ms`. The second waits 900ms, then 750ms, 600ms, 450ms, 300ms, 150ms, and 0ms.
    3. Average Wait Time = `(1050 + 900 + 750 + 600 + 450 + 300 + 150 + 0) / 8` = `4200 / 8` = **525ms**.
  options:
  - 100ms
  - 1050ms
  - 525ms
  - 800ms
  correct_index: 2
