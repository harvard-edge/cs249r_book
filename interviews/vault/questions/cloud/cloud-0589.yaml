title: The Mixture-of-Experts Quantization Collapse
scenario: You are responsible for a fleet of Mixtral-class 8x22B Mixture-of-Experts (MoE) models. The total model has ~141B parameters. To reduce serving cost, your team applied standard post-training INT8 quantization to the entire model. While this successfully reduced the memory footprint from ~282GB to ~141GB, allowing it to fit on fewer GPUs, downstream quality metrics plummeted by over 50%.
question: "How do you design a quantization strategy that works, and what specific architectural failure explains the initial collapse?"
details:
  realistic_solution: 'The core insight is that not all parameters are created equal, especially in an MoE architecture. The catastrophic failure is caused by quantizing the **gating network''s logits**. This tiny part of the model determines which experts are routed to for each token. Quantizing them to INT8 collapses their expressive power, leading to poor routing decisions. The total model has ~141B parameters. In FP16 this requires ~282 GB for weights alone — needing 5 H100s to serve with KV cache. The initial INT8 quantization reduced this to ~141 GB, fitting on 2-3 H100s, but destroyed routing quality. The fix is a mixed-precision strategy: keep the gating network and attention layers in FP16 while quantizing only the expert FFN weights to INT8. This results in ~146 GB for weights, fitting comfortably on 3 H100s (a 40% cost reduction from 5 GPUs) without degrading quality.'
  common_mistake: |
    **The Pitfall:** Suggesting Quantization-Aware Training (QAT) to fix the issue.
    **The Rationale:** Engineers default to QAT as a universal fix for quantization degradation, ignoring the underlying architectural sensitivity of MoE routers.
    **The Consequence:** Wasting hundreds of thousands of dollars on expensive QAT training runs without addressing the fundamental dynamic range collapse in the gating network.
  napkin_math: |
    - Total Model (141B params): FP16 = 282 GB (requires 5x 80GB H100s).
    - Naive INT8 Quantization: 141 GB (fits on 2-3 GPUs, but destroys gating precision).
    - Mixed-Precision Fix:
      1. Gating Networks + Attention: Keep in FP16 (~10 GB).
      2. Expert FFN Weights (~136B params): Quantize to INT8 (~136 GB).
    - **Total Mixed Memory: ~146 GB. Fits on 3 GPUs (40% cost reduction) while perfectly preserving routing quality.**
