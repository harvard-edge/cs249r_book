title: Yield Calculation at the Reticle Limit
scenario: You are designing a next-generation AI accelerator to maximize compute density. The team proposes
  a monolithic die design that pushes the absolute reticle limit of modern ASML EUV lithography tools
  (approximately 858 mm²). Assuming a defect density of 0.1 defects per cm², use the Poisson yield model
  (Y = e^(-AD)) to calculate the expected yield of this monolithic design. Compare this to a chiplet-based
  architecture using four 215 mm² dies to achieve the same total silicon area.
question: "Using Y = e^(-AD), what are the expected yields for the 858 mm² monolithic die and each 215 mm² chiplet at 0.1 defects/cm²?"
details:
  realistic_solution: Calculate the yield for both approaches using the Poisson model. The monolithic
    reticle-limit die has a substantially lower yield due to the exponential relationship between area
    and defects. This necessitates shifting to a chiplet architecture where smaller dies yield much higher,
    outweighing the advanced packaging costs.
  common_mistake: Failing to convert mm² to cm² for the defect density calculation, or incorrectly assuming
    that yield scales linearly rather than exponentially with die area.
  napkin_math: Monolithic Area = 858 mm² = 8.58 cm². Y_mono = e^(-8.58 * 0.1) = e^(-0.858) ≈ 42.4% yield.
    Chiplet Area = 215 mm² = 2.15 cm². Y_chiplet = e^(-2.15 * 0.1) = e^(-0.215) ≈ 80.6% yield. Cost per
    usable silicon area is drastically reduced with chiplets despite packaging overhead.
