title: Gang Scheduling Capacity Arithmetic
scenario: A distributed training job requires 64 GPUs at once. A cluster has 80 free GPUs total, but they are split as 40 in rack A and 40 in rack B. The job requires all GPUs in one rack for topology reasons.
question: Can a 64-GPU gang-scheduled job start if 80 GPUs are free but only 40 are free in each rack?
details:
  realistic_solution: No. Aggregate free GPUs are sufficient, but topology-local free GPUs are not. The job needs 64 co-located GPUs in one rack, and the largest available rack has only 40. The scheduler must wait, relax topology, or repartition the job.
  common_mistake: |
    **The Pitfall:** Checking only total free GPUs and ignoring placement constraints.
    **The Rationale:** Aggregating free capacity without considering physical topology requirements for the job.
    **The Consequence:** Job scheduling failures or severely degraded performance due to cross-rack communication bottlenecks.
  napkin_math: |
    1. Total free GPUs = 80.
    2. Maximum co-located free GPUs in a single rack = 40.
    3. Required co-located GPUs = 64.
    4. **Result: 40 < 64 required, so the job cannot start.**
