title: Identifying Model Extraction Risks on NVIDIA A100 Deployments
scenario: Imagine you are deploying a critical ML model for a financial institution
  on a cloud platform utilizing NVIDIA A100 GPUs (80 GB HBM2e memory, 312 TFLOPS FP16
  performance). This model is exposed via an API. Describe the concept of a 'model
  extraction attack' in this context and explain why it poses a significant reliability
  and security risk, specifically considering the A100's high computational power
  and memory capacity.
question: How would you protect the A100-hosted financial model API from model extraction
  attacks?
details:
  realistic_solution: A realistic solution involves a multi-layered defense. This
    includes implementing robust query monitoring to detect suspicious query patterns
    (e.g., unusually high query rates from a single source, systematic exploration
    of the input space), rate limiting, watermarking techniques for model outputs,
    and exploring differential privacy mechanisms during training or inference. For
    A100 deployments, leveraging secure enclaves or hardware-level security features,
    if available and compatible with the cloud provider, could also be explored to
    protect the model weights during inference and prevent side-channel attacks.
  common_mistake: A common mistake is to assume that obfuscating model architecture
    or input/output transformations provides sufficient protection against extraction,
    or to focus solely on data privacy without considering model intellectual property.
    Another is underestimating the speed at which an attacker can query a high-throughput
    system like one leveraging A100s.
  napkin_math: If an attacker can make 1,000 queries per second (QPS) against a model
    hosted on an A100 (which is feasible given its 312 TFLOPS FP16 performance), an
    extraction attack could potentially gather 1,000 * 60 * 60 = 3,600,000 data points
    (query-response pairs) in an hour. This rapid data collection, facilitated by
    the A100's high throughput, significantly reduces the time and cost for an adversary
    to reconstruct a surrogate model, especially if the original model is complex
    and occupies a substantial portion of the 80GB HBM2e memory.
