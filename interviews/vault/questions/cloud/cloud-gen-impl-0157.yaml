title: SRAM Calculation for FlashAttention Tiling
scenario: You are implementing a FlashAttention kernel for an A100 GPU (80 GB HBM2e, 2.0 TB/s bandwidth).
  To bypass HBM bandwidth limits, you must tile the attention computation so the active blocks fit entirely
  within the A100's 192 KB of shared memory (SRAM) per Streaming Multiprocessor (SM). Given a head dimension
  d=128, a query block size B_r=64, and key/value block sizes B_c=128, calculate the exact amount of SRAM
  in bytes required to store the Q, K, V, and O (output) tiles in FP16 format. Determine if this tiling
  configuration fits within the 192 KB limit. Ignore the negligible memory for intermediate FP32 statistics
  for this calculation.
details:
  realistic_solution: To find the SRAM footprint, we calculate the number of elements in each required
    block and multiply by 2 bytes (since FP16 is 16 bits). The essential blocks held in SRAM during the
    inner loop are the Query block, the Key block, the Value block, and the Output accumulator block.
    We then compare this total to the 192,000 bytes (or 196,608 bytes depending on KiB vs KB definitions,
    but strictly 192 KB) available on the A100 SM.
  common_mistake: Candidates often forget to multiply the total element count by the byte size of the
    data type (2 bytes for FP16), or they forget to include the output block O in the active SRAM allocation,
    resulting in an underestimation of memory requirements.
  napkin_math: 'Elements in Q block: B_r * d = 64 * 128 = 8,192 elements.

    Elements in K block: B_c * d = 128 * 128 = 16,384 elements.

    Elements in V block: B_c * d = 128 * 128 = 16,384 elements.

    Elements in O block: B_r * d = 64 * 128 = 8,192 elements.

    Total elements = 8,192 + 16,384 + 16,384 + 8,192 = 49,152 elements.

    Total bytes = 49,152 elements * 2 bytes/element (FP16) = 98,304 bytes.

    98,304 bytes is exactly 96 KiB (or ~98.3 KB). Since 96 KiB < 192 KB, this configuration easily fits
    within the A100''s shared memory limit.'
