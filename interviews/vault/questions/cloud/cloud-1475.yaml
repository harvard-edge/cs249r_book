title: Evaluating KV Cache Quantization for Long-Context RAG
scenario: >-
  Your team is serving Llama-3 70B (80 layers, 8 KV heads, 128 head dim) on an 8x H100 80GB node
  for a RAG application with up to 32K token contexts. At peak load, you need to support a batch size
  of 64 concurrent requests. With an FP16 KV cache, you are encountering OOM errors during the decode
  phase. You propose quantizing the KV cache to INT8 to increase maximum concurrency. However, the NLP
  team is concerned about severe accuracy degradation in 'needle-in-a-haystack' retrieval tasks.
question: >-
  How much KV-cache memory does FP16 vs INT8 require at batch 64 and 32K context, and what strategy preserves long-context retrieval accuracy?
details:
  realistic_solution: 'Implement asymmetric quantization for the KV cache: use per-channel or per-group quantization for the Key cache (to preserve outlier features critical for attention) and per-token quantization for the Value cache. INT8 KV cache reduces the footprint from 687GB (FP16) to 343GB, fitting within the 500GB available memory. This enables the required BS=64 at 32K context without quality degradation, which FP16 cannot achieve due to OOM.'
  common_mistake: |
    **The Pitfall:** Using naive per-tensor linear quantization uniformly for Keys and Values.
    **The Rationale:** Candidates fail to recognize that Key caches contain extreme outlier channels that require finer-grained (per-channel or per-group) quantization to preserve attention pattern accuracy.
    **The Consequence:** Severe accuracy degradation in 'needle-in-a-haystack' retrieval tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3 70B: 80 layers, 8 KV heads, 128 head dim.
    - Batch size 64, 32K tokens.
    - FP16 uses 2 bytes/element; INT8 uses 1 byte/element.
    - Node memory is 8x 80GB = 640GB, with 140GB for weights (500GB available).

    **Calculations:**
    - Elements per token = 2 (K,V) × 80 (layers) × 8 (KV heads) × 128 (head dim) = 163,840.
    - FP16 KV Cache = 64 × 32,768 × 163,840 × 2 bytes = 687 GB (OOMs).
    - INT8 KV Cache = 64 × 32,768 × 163,840 × 1 byte = 343 GB.

    **Conclusion & Interpretation:**
    - **Result: 343 GB (Memory-Bound)**. Utilizing INT8 KV cache with per-channel quantization for Keys resolves the OOM error while preserving critical outlier features for accurate attention.
