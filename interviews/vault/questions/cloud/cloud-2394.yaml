title: Eliminating Non-Determinism in ML CI/CD
scenario: Your ML engineering team added an automated integration test in the CI/CD pipeline that runs a forward pass of a new Transformer model against a 'golden' dataset on a T4 GPU. The test asserts that the output logits match the golden logits with a strict `1e-6` tolerance. The pipeline randomly fails 15% of the time, blocking critical deployments.
question: Why is the golden-logit GPU integration test flaky at 1e-6 tolerance, and how would you stabilize it?
details:
  realistic_solution: Architect the CI/CD pipeline to handle the inherent non-determinism of GPU parallel processing. GPU operations utilizing atomic additions (like `scatter_add` or certain cuDNN convolution algorithms) return slightly different floating-point results depending on thread scheduling. Relax the numerical tolerance to a realistic bound for FP16/FP32 operations (e.g., `1e-3` or `1e-4`). Alternatively, force deterministic algorithms during the CI test suite by setting environment variables, accepting the slight performance hit in CI for guaranteed test stability.
  common_mistake: |
    **The Pitfall:** Assuming the model weights are corrupted and adding retry loops to the CI/CD pipeline.
    **The Rationale:** Engineers accustomed to traditional deterministic software testing fail to recognize the non-associativity of floating-point math in highly parallel GPU execution.
    **The Consequence:** The team wastes expensive GPU hours on retries and ignores a fundamental characteristic of numeric computing at scale.
  napkin_math: |
    1. **Precision limits:** Standard FP32 has ~7 decimal digits of precision ($\sim 1\text{e-}7$).
    2. **Error accumulation:** Summing 10,000 values in a dot product accumulates rounding errors. The error bound grows roughly by $\sqrt{N} \times \text{precision}$.
    3. **Calculation:** $\sqrt{10000} \times 1\text{e-}7 = 100 \times 1\text{e-}7 = \mathbf{1\text{e-}5}$.
    4. **Conclusion:** A tolerance of $1\text{e-}6$ is mathematically guaranteed to fail randomly. Setting `atol=1e-4` provides a safe, mathematically sound threshold.
