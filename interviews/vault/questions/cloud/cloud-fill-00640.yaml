title: Datacenter Architecture for H100-based AI Cluster with Carbon Efficiency Goals
scenario: Your company is designing a new AI research datacenter focused on large-scale model training.
  You are tasked with architecting the power and cooling infrastructure for a specific cluster dedicated
  to training next-generation foundation models. This cluster will exclusively utilize NVIDIA H100 GPUs
  (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s, 700W TDP per GPU). Given the extremely high power density
  of these accelerators, and a stringent target Power Usage Effectiveness (PUE) of 1.1, describe your
  comprehensive architectural choices for power distribution, cooling (considering both air and liquid
  options), and how you would integrate carbon-aware scheduling strategies. Furthermore, discuss the critical
  trade-offs between embodied carbon (from manufacturing and construction) and operational carbon (from
  energy consumption) for your proposed design over a projected 5-year lifecycle, aiming for the lowest
  total carbon footprint.
question: "How would you design power, cooling, and carbon-aware scheduling for an H100 training cluster targeting PUE 1.1 over a 5-year lifecycle?"
details:
  realistic_solution: A robust solution would involve high-voltage DC power distribution to maximize efficiency,
    potentially employing a multi-level power architecture. For cooling, direct-to-chip liquid cooling
    (e.g., cold plates) for the H100s is essential, integrated with a warm-water cooling loop and potentially
    dry coolers or cooling towers for heat rejection. Air cooling would be reserved for lower-density
    components, utilizing hot/cold aisle containment and rear-door heat exchangers. Carbon-aware scheduling
    would leverage real-time grid carbon intensity data, dynamically shifting workloads or adjusting training
    schedules to align with periods of high renewable energy availability or lower grid emissions, potentially
    across geographically dispersed datacenters. The embodied vs. operational carbon discussion would
    include a detailed lifecycle assessment (LCA) considering the energy required to manufacture and transport
    cooling infrastructure, servers, and building materials against the operational savings from high
    PUE and carbon-aware strategies, perhaps justifying a higher initial embodied carbon investment for
    significant operational carbon reduction.
  common_mistake: Candidates often focus solely on the GPU's power draw, neglecting the cumulative impact
    of other components (CPUs, memory, networking) on rack power budgets. Another common pitfall is proposing
    general cooling solutions without specifically addressing the extreme heat flux of H100s, or failing
    to detail how PUE targets influence *all* design choices, not just cooling efficiency. Overlooking
    the embodied carbon of infrastructure (e.g., materials for liquid cooling systems vs. air) or making
    only qualitative statements about carbon-aware scheduling without concrete implementation ideas are
    also frequent errors.
  napkin_math: "Consider a standard rack with 4 servers, each housing 8 NVIDIA H100 GPUs. \n- GPU power\
    \ per rack: 32 GPUs * 700W/GPU = 22,400W (22.4 kW). \n- Assuming server overhead (CPUs, memory, networking,\
    \ storage) adds 25% of GPU power: 22.4 kW * 1.25 = 28 kW total IT power per rack. \n- With a target\
    \ PUE of 1.1, the total facility power draw per rack including cooling and other losses would be:\
    \ 28 kW * 1.1 = 30.8 kW. This high power density (e.g., over 30 kW per rack) necessitates advanced\
    \ cooling solutions like liquid cooling to manage heat effectively within the physical constraints\
    \ of a datacenter rack."
