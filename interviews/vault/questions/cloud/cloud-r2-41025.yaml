title: 'GPU Scheduling: FIFO vs Shortest-Job-First'
scenario: Your ML platform uses FIFO scheduling for GPU jobs. A 64-GPU training job arrives and waits
  for resources while three 1-GPU inference jobs queue behind it. Average queue wait time is 4 hours.
  What scheduling policy would reduce this, and what tradeoff does it introduce?
details:
  realistic_solution: 'Switch to a priority-based scheduler with backfill. Backfill scheduling (used by
    Slurm): the large 64-GPU job retains its priority, but while waiting for 64 GPUs to free up, the scheduler
    checks if any smaller jobs can complete before the large job''s expected start time. If so, the small
    inference jobs (1 GPU, short runtime) run in the ''holes'' without delaying the large job. This reduces
    average wait time for small jobs from hours to minutes while preserving FIFO ordering for large jobs.
    Key tradeoff: backfill requires runtime estimates. If a backfilled job exceeds its estimate, it gets
    preempted (killed), wasting its compute. Alternative: multi-level feedback queue — separate queues
    for interactive (inference, <1h), development (<8h), and production (>8h) with different priorities
    and GPU limits per queue.'
  common_mistake: Blindly switching to shortest-job-first (SJF) without recognizing that SJF can cause
    starvation of large training jobs — they may never run if small jobs keep arriving.
  napkin_math: 'Without backfill: 3 inference jobs wait 4h each = 12 GPU-hours wasted waiting. With backfill:
    inference jobs start in <5 min, run for 10 min. Saved: 11.5 GPU-hours of wait time.'
