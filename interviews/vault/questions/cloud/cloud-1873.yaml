title: Diagnosing Object Storage Stalls in Global Shuffling
scenario: A distributed training job reading a 10TB dataset from cloud object storage is experiencing
  severe data loading bottlenecks, resulting in 5% GPU utilization. The dataset contains 100 million 100KB
  samples. The team implemented perfect global shuffling by randomly sampling indices across the entire
  dataset to ensure optimal statistical properties for convergence, but the data loading pipeline is perpetually
  stalled. Diagnose the root cause of the I/O bottleneck.
question: "Why does perfect global shuffling over 100M 100KB samples from object storage stall the pipeline, and what shuffling strategy should replace it?"
details:
  realistic_solution: 'Identify the bottleneck as object storage random read latency. The architectural
    fix is shard-level shuffling: pack the 100KB samples into larger contiguous blocks (e.g., 1GB shards),
    shuffle the order of the shards globally, stream shards sequentially into memory, and use a local
    shuffle buffer to randomize samples before feeding them to the model.'
  common_mistake: Assuming perfect global shuffling is a strict requirement for convergence and ignoring
    the massive latency penalties and read amplification caused by random access on cloud object storage.
  napkin_math: Cloud object storage random read latency ≈ 50ms. 100M random reads = 100M * 50ms = 5 million
    seconds of serialized latency overhead. By grouping into 10,000 1GB shards, the random access penalty
    drops to 10,000 * 50ms = 500 seconds, while the data is streamed at the storage layer's sequential
    bandwidth limit.
