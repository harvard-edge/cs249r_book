title: 'TPU v5e vs H100: Systolic Array Efficiency for Transformer Training'
scenario: TPU v5e delivers 197 TFLOPS BF16 with 819 GB/s HBM bandwidth. H100 SXM5 delivers 989 TFLOPS
  FP16 with 3,350 GB/s HBM bandwidth. For a 7B transformer training workload (attention + FFN layers,
  arithmetic intensity ≈ 100 FLOP/byte on full forward+backward pass), analyze which accelerator achieves
  higher MFU (Model FLOP Utilization) and identify the architectural reasons for the difference.
details:
  realistic_solution: 'At AI=100 FLOP/byte: Ridge points: TPU v5e: 197T/819G = 240.5 FLOP/byte. H100:
    989T/3350G = 295.2 FLOP/byte. Both above AI=100, so both are memory-bound at this intensity — but
    only marginally. Effective throughput in memory-bound regime: TPU v5e: 819 GB/s × 100 = 81.9 TFLOPS.
    H100: 3,350 × 100 = 335 TFLOPS. H100 wins 4.1× on throughput. However, for the compute-bound portion
    of transformer training (large matmuls where AI >> ridge point, e.g., GEMM in FFN layers with AI=200+):
    TPU v5e MFU ≈ 55% → 108 TFLOPS actual. H100 MFU ≈ 45% → 445 TFLOPS actual. H100 still wins. TPU v5e
    advantage: per-dollar cost (v5e is significantly cheaper per TFLOPS than H100), ICI interconnect enables
    multi-TPU pods with 1,600 Gbps bidirectional bandwidth vs NVLink''s 900 GB/s, better for pipeline-parallel
    training of very large models across many chips.'
  common_mistake: Directly comparing peak TFLOPS without accounting for MFU differences. TPU v5e achieves
    45-60% MFU for standard transformer training due to systolic array design optimized for matmuls with
    fixed data flows. H100 achieves 35-55% MFU in practice despite higher peak TFLOPS due to warp scheduling
    overhead and SRAM management for irregular workloads.
  napkin_math: 'H100 vs TPU v5e TFLOPS ratio: 989/197 = 5.02×. BW ratio: 3350/819 = 4.09×. At AI=100 (memory-bound):
    effective throughput ratio follows BW = 4.09×. At AI=300 (compute-bound): follows TFLOPS = 5.02×.
    TPU v5e ICI: 1,600 Gbps × 4 links = 6,400 Gbps per chip in a pod. NVLink 4.0: 900 GB/s = 7,200 Gbps
    — H100 wins on per-chip interconnect. But TPU pod scaling: 256 chips at 6.4 Tbps each vs NVLink limited
    to 8-GPU NVLink domains. TPU v5e wins for 256+ chip all-to-all communications.'
