title: Implement INT8 quantization for MobileNetV3 on TensorRT with calibration
scenario: You need to deploy MobileNetV3-Large in production on A100 using TensorRT INT8 quantization. The model has H-swish activations (piecewise linear approximation of Swish). Your calibration dataset has 5,000 representative images.
question: How would you calibrate and convert MobileNetV3-Large to TensorRT INT8 on A100 and verify the accuracy drop stays below 1%?
details:
  realistic_solution: 'Use IInt8MinMaxCalibrator for H-swish layers to capture the full activation range. Steps: (1) export model to ONNX with opset 17; (2) build TRT engine with INT8 flag + calibrator; (3) provide 5K calibration images through custom IInt8Calibrator; (4) for H-swish layers specifically, register per-tensor scale factors from MinMax calibrator. Verify with trtexec --iterations=100. If accuracy drop >1%, try layer-by-layer mixed precision keeping H-swish in FP16.'
  common_mistake: |
    **The Pitfall:** Using the default entropy calibration (IInt8EntropyCalibrator2).
    **The Rationale:** It is the standard and widely recommended calibrator for most CNNs in TensorRT.
    **The Consequence:** The piecewise linear nature of H-swish causes entropy calibration to underfit the activation range, leading to severe clipping and unacceptable accuracy degradation beyond 1%.
  napkin_math: |
    - MobileNetV3-Large: 5.4M params. FP32: 21.6MB. INT8: 5.4MB (4× compression).
    - MobileNetV3 is memory-bound (0.22 GFLOPs, 5.4M params × 4B = 21.6MB read per inference).
    - Memory bandwidth bound: 21.6MB / 2TB/s = 10.8 μs minimum. INT8: 5.4MB / 2TB/s = 2.7 μs minimum.
    - **Real throughput improvement is ~1.5–1.8×, not a full 2× due to activation quantization overhead.**
