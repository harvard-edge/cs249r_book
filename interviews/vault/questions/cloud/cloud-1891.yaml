title: Analyzing SIMT Register Pressure and Memory Stalls
scenario: You wrote a custom CUDA kernel for a specialized LLM attention mechanism on an NVIDIA A100 GPU
  (80GB HBM2e). The kernel launches blocks of 256 threads. Nsight Compute shows severe memory stalls (latency
  bound) despite utilizing only 30% of the theoretical 2 TB/s HBM bandwidth. The profiling report also
  reveals that the kernel allocates 255 registers per thread. Analyze why the SIMT execution model is
  failing to hide the memory latency in this scenario.
details:
  realistic_solution: The SIMT model hides memory latency by seamlessly context-switching to other active
    warps when one stalls. The solution is to reduce the register footprint per thread (e.g., via `__launch_bounds__`
    or algorithmic refactoring) to allow more blocks to reside concurrently on the SM, increasing warp
    occupancy.
  common_mistake: Candidates often assume memory stalls strictly indicate saturated memory bandwidth or
    uncoalesced memory accesses, suggesting fixes like shared memory caching without diagnosing the underlying
    lack of resident warps to context switch.
  napkin_math: An A100 SM has 65,536 registers. With 256 threads using 255 registers each (256 × 255 =
    65,280), the SM can only host exactly 1 block (8 warps). If an HBM fetch takes ~400 cycles, and each
    of the 7 other warps can execute one 4-cycle instruction before also stalling, the SM only hides ~28
    cycles of latency and sits idle for the remaining ~372 cycles.
