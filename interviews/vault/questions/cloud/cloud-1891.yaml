title: Analyzing SIMT Register Pressure and Memory Stalls
scenario: You wrote a custom CUDA kernel for a specialized LLM attention mechanism on an NVIDIA A100 GPU. The kernel launches blocks of 256 threads. Nsight Compute shows severe memory stalls (latency bound) despite utilizing only 30% of the theoretical HBM bandwidth. The profiling report also reveals that the kernel allocates 255 registers per thread.
question: Why is this A100 kernel latency-bound at only 30% HBM bandwidth, and what would you change?
details:
  realistic_solution: |
    The SIMT model hides memory latency by seamlessly context-switching to other active warps when one stalls. The solution is to reduce the register footprint per thread (e.g., via `__launch_bounds__` or algorithmic refactoring) to allow more blocks to reside concurrently on the SM, increasing warp occupancy.
  common_mistake: |
    **The Pitfall:** Assuming memory stalls strictly indicate saturated memory bandwidth.
    **The Rationale:** Candidates overlook SIMT occupancy and suggest caching when the real issue is a lack of resident warps to context switch.
    **The Consequence:** Applying complex shared memory optimizations that fail to resolve the core latency hiding problem.
  napkin_math: |
    - SM Register capacity: 65,536 registers.
    - Threads per block: 256. Registers per thread: 255. Registers per block: 256 * 255 = 65,280.
    - The SM can host exactly 1 block (8 warps).
    - **With only 8 active warps, the SM cannot context-switch enough times to hide the ~400-cycle memory latency, idling the compute cores.**
