title: H100 Burst Duty Cycling
scenario: A cloud environment runs intermittent batched inference workloads on H100
  SXM nodes, receiving bursts of traffic every 5 minutes.
question: Analyze the trade-offs between deep sleep states and idle power overhead
  when managing these intermittent traffic bursts.
details:
  realistic_solution: Transitioning to a deep sleep state saves significant energy,
    dropping from a high idle power to near zero, but incurs a steep wake-up latency
    and state-restore penalty. With a 700W TDP, the energy saved during the 4-minute
    idle windows must be weighed against the latency SLA penalty of waking up the
    GPU when the 1-minute burst arrives.
  common_mistake: Ignoring the wake-up latency and PCIe initialization time, which
    causes SLA violations on burst arrival.
  napkin_math: 700W peak vs ~100W idle over a 5-minute cycle.
