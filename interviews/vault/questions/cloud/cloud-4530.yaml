title: H100 Burst Duty Cycling
scenario: A cloud environment runs intermittent batched inference workloads on SXM nodes, receiving bursts of traffic every 5 minutes.
question: Analyze the trade-offs between deep sleep states and idle power overhead when managing these intermittent traffic bursts.
details:
  realistic_solution: Transitioning to a deep sleep state saves significant energy, dropping from a high idle power to near zero, but incurs a steep wake-up latency and state-restore penalty. With a 700W TDP, the energy saved during the 4-minute idle windows must be weighed against the latency SLA penalty of waking up the GPU when the 1-minute burst arrives.
  common_mistake: |
    **The Pitfall:** Ignoring the wake-up latency and PCIe initialization time when calculating power states.
    **The Rationale:** Engineers focus purely on energy savings (kW/h) without modeling the time-domain cost of transitioning out of low-power states.
    **The Consequence:** The system saves power during idle periods but causes severe SLA violations and dropped requests immediately upon burst arrival.
  napkin_math: |
    1. **Idle Power:** GPU idle power is ~100W. Over a 4-minute idle window, energy = 100W * 240s = 24,000 Joules.
    2. **Deep Sleep Savings:** Dropping to near zero saves ~24 kJ per cycle.
    3. **Wake-up Penalty:** Deep sleep incurs a wake-up latency (PCIe re-initialization, state restore) which directly adds to the Time-To-First-Token (TTFT) for the burst.
    4. **Trade-off:** Saving **24 kJ** per 5-minute cycle must be weighed against missing strict latency SLAs due to multi-second wake-up penalties.
