title: Rack Cooling Limits for 8-GPU H100 vs A100 Nodes
scenario: You are helping the data center team provision a new cloud rack with a strict thermal cooling limit of 15 kW. The team wants to deploy standard 8-GPU server nodes and needs to understand the generational differences in thermal management. From memory, compare the total maximum thermal output (TDP) of the GPUs in an 8x H100 server versus an 8x A100 server. If the base system components add a constant 2 kW of heat per server, calculate exactly how many full 8x H100 servers this rack can cool.
question: What is the thermal output of 8x H100 versus 8x A100 GPUs, and how many full 8x H100 servers can a 15 kW rack cool?
details:
  realistic_solution: To ensure stable sustained performance without thermal throttling, the cooling infrastructure must be able to handle the peak combined heat dissipation of the node. The higher thermal density of the H100 severely limits rack density, allowing only one 8x H100 server in a 15 kW envelope.
  common_mistake: |
    **The Pitfall:** Failing to recall the significant TDP jump between A100 and H100 generations.
    **The Rationale:** Candidates often assume they can fit the same number of nodes per rack as previous generations, or they forget to add the baseline 2 kW system power to the GPU power before calculating the rack fit.
    **The Consequence:** Over-provisioning racks, which leads to immediate thermal throttling, hardware shutdown, or localized data center hot spots.
  napkin_math: |
    - **Recall TDPs:** A100 = **400W**, H100 = **700W**.
    - **8x GPU thermal output:** A100 = 8 * 400W = **3.2 kW**; H100 = 8 * 700W = **5.6 kW**.
    - **Total server heat:** H100 server = 5.6 kW + 2.0 kW = **7.6 kW**. A100 server = 3.2 kW + 2.0 kW = **5.2 kW**.
    - **Rack capacity (15 kW limit):** 15 kW / 7.6 kW = **~1.97**.
    - **Conclusion:** Since we need whole servers, the rack can only cool **1 full 8x H100 server**.
