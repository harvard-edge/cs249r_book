title: Vanishing Gradients and Depth Limits
scenario: You are training a 50-layer MLP with sigmoid activations (no skip connections). The gradient
  at layer 1 is 1e-15 while the gradient at layer 50 is 0.1. Explain the root cause quantitatively using
  the chain rule, and identify the specific systems consequence of this numerical phenomenon.
details:
  realistic_solution: 'Sigmoid''s max derivative is 0.25 (at x=0). By the chain rule, the gradient at
    layer 1 is the product of ~50 Jacobian terms, each bounded by 0.25. Upper bound: 0.25^50 = 7.9e-31.
    In practice, gradients decay as ~(0.25)^L per layer. From layer 50 to layer 1: 0.1 * 0.25^49 ~ 1e-31,
    which matches the observation (actual is 1e-15, meaning average per-layer factor is ~(1e-15/0.1)^(1/49)
    ~ 0.54). Systems consequence: FP16 has minimum subnormal of ~5.96e-8. Any gradient below this rounds
    to zero, creating dead layers. FP16 cannot represent 1e-15, so layers 1-30 receive exactly zero gradient
    in mixed precision. This is why skip connections (ResNets, transformers) are not just an ML trick
    but a numerical necessity for deep networks in reduced precision.'
  common_mistake: 'Saying ''gradients vanish'' without quantifying the exponential decay rate per layer.
    Also missing the systems consequence: underflowed gradients round to zero in FP16, making the problem
    qualitatively worse on modern accelerators that use mixed precision.'
  napkin_math: 'Sigmoid max derivative: 0.25. Product over 50 layers: 0.25^50 = 7.9e-31. FP16 min subnormal:
    5.96e-8. Gradient vanishes to exactly zero in FP16 after ~12 layers. Skip connections: gradient =
    1 + f''(x), lower bound 1.0 per layer.'
