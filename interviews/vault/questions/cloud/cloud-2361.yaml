title: Root Causing RDMA DCQCN Slow Start
scenario: Inference latency for a 70B model split across 2 nodes (Tensor Parallelism over RDMA) averages 45ms per token. The 400Gbps RoCEv2 link shows less than 10% utilization. Network diagnostics confirm zero packet drops and zero PFC pause frames. Synthetic microbenchmarks easily hit 380Gbps.
question: Why is 70B TP-over-RDMA inference stuck at 45ms/token with <10% link utilization and no drops, and how would you tune the network?
details:
  realistic_solution: 'The root cause is the misconfiguration of the DCQCN congestion control algorithm, specifically the slow start and recovery parameters. Tensor Parallelism generates very short, bursty AllReduce traffic (e.g., 10MB per layer). If minor microbursts cause the switch to mark packets with ECN (Explicit Congestion Notification), DCQCN throttles the transmission rate. Because the default recovery timer and `rate_increase` parameters are tuned for long-lived bulk flows, the rate ramps back up too slowly. The short TP burst finishes before the flow can recover to 400Gbps, leading to chronic under-utilization. The solution is to aggressively tune DCQCN parameters for bursty workloads (decrease the recovery timer, increase the step size) or switch to a latency-optimized protocol like Swift.'
  common_mistake: 'Assuming the network switch is faulty and requesting a hardware replacement, or increasing MTU without diagnosing the algorithm.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Activation tensor size: 10MB.
    - 400Gbps RoCEv2 link (50 GB/s).
    - Throttled rate by ECN and slow recovery: 1 Gbps (125 MB/s).

    **Calculations:**
    - Transfer time at full bandwidth: 10MB / 50 GB/s = 0.2ms.
    - Transfer time at throttled bandwidth: 10MB / 125 MB/s = 80ms.

    **Conclusion & Interpretation:**
    - **Result: 80ms throttled transfer time per layer (Network-Congestion-Control-Bound)**. DCQCN slow start parameters throttle short bursty TP traffic excessively upon minor ECN markings.
