title: 'Infinity Fabric Coherency Cost in Multi-Die MI300X'
scenario: 'Profiling an MI300X memory-bound kernel reveals that memory accesses are split sequentially: 60% of accesses hit local HBM at 5.3 TB/s, and 40% of accesses fall back to slower memory at 0.8 TB/s.'
question: 'What is the effective bandwidth for memory accesses that hit HBM (5.3 TB/s) 60% of the time and DRAM (0.8 TB/s) 40% of the time, and why?'
details:
  realistic_solution: 'For series memory accesses, use harmonic mean: 1/(0.6/5.3 + 0.4/0.8) = 1.63 TB/s (not arithmetic mean 3.5 TB/s which assumes independent parallel access).'
  common_mistake: |
    **The Pitfall:** Calculating effective bandwidth using the arithmetic mean instead of the harmonic mean.
    **The Rationale:** Candidates intuitively use a weighted average (arithmetic mean), assuming accesses happen in parallel or independently, rather than accounting for the time spent on each access type in a sequential workload.
    **The Consequence:** This overestimates the effective bandwidth (yielding 3.5 TB/s instead of 1.63 TB/s), leading to overly optimistic performance models and misidentifying bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential memory access pattern.
    - HBM bandwidth is 5.3 TB/s for 60% of accesses.
    - DRAM bandwidth is 0.8 TB/s for 40% of accesses.
    
    **Calculations:**
    - Identify access type: Memory accesses happen in series, requiring the harmonic mean.
    - Time spent in HBM: 60% / 5.3 TB/s = 0.1132.
    - Time spent in DRAM: 40% / 0.8 TB/s = 0.5000.
    - Effective bandwidth: 1 / (0.1132 + 0.5000) = 1.63 TB/s.
    
    **Conclusion & Interpretation:**
    - **Result: 1.63 TB/s (Memory-Bound)**. Effective bandwidth must be calculated using harmonic mean for sequential accesses, resulting in significantly lower throughput than arithmetic mean.
