title: The 5% Maintenance Tax
scenario: You're building a financial model for a new 1,000-GPU H100 cluster. You've calculated the initial hardware cost (CapEx). To estimate the Total Cost of Ownership (TCO), you now need to budget for ongoing operational costs.
question: "Based on industry standards, what is the approximate annual cost for hardware maintenance, expressed as a percentage of the initial CapEx?"
details:
  realistic_solution: The standard rule of thumb is that annual maintenance costs are approximately 5% of the initial hardware CapEx. This covers support contracts, replacement parts for failures (like the GPUs that fail every ~5 hours in a 10k cluster), and technician time.
  common_mistake: |
    **The Pitfall:** Completely forgetting to budget for maintenance or drastically underestimating it.
    **The Rationale:** Engineers assume enterprise hardware has warranties similar to consumer electronics (<1%).
    **The Consequence:** The operational budget blows up in year 2 as hardware failure rates hit standard distribution curves at scale.
  napkin_math: |
    1. Assuming an H100 GPU costs $30,000, a 1,000-GPU cluster has a base CapEx of $30M.
    2. Industry standard annual maintenance is ~5% of CapEx.
    3. $30M * 0.05 = $1.5M per year in maintenance OpEx.
    4. **Over a 3-year lifespan, maintenance adds $4.5M, making it a massive financial line item.**
  options:
  - 1%
  - 5%
  - 20%
  - 33%
  correct_index: 1
