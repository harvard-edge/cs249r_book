title: Data Pipeline Throughput Matching
scenario: A GPU processes batches of 256 images. The forward-backward pass takes exactly 50ms. Images are loaded from NVMe and require CPU augmentation.
question: Determine the minimum CPU throughput in images/second required to prevent the GPU from stalling on data loading.
visual:
  kind: svg
  path: cloud-4498.svg
  alt: 'Bar chart comparing throughput stages: Disk IO, CPU Augmentation, PCIe Transfer, and GPU Compute.'
  caption: Throughput Bottleneck Stages
details:
  realistic_solution: The GPU processes one batch of 256 images every 50ms (0.05 seconds). Therefore, the GPU consumes data at a rate of 256 / 0.05 = 5120 images per second. The CPU pipeline must yield at least 5120 images/second to keep the GPU fully utilized without starvation.
  common_mistake: |
    **The Pitfall:** Dividing 50ms by the batch size and inverting improperly.
    **The Rationale:** Calculating per-image latency instead of throughput can lead to inverted logic and incorrect rate requirements.
    **The Consequence:** The CPU pipeline is incorrectly sized, resulting in heavily skewed rates that either over-provision the CPU or starve the GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size = 256 images.
       - GPU step time = 50ms (0.05 seconds).
    2. **Calculations:**
       - Required Throughput = Batch size / Step time.
       - Required Throughput = 256 images / 0.05s = 5,120 images/second.
    3. **Conclusion & Interpretation:**
       - **Result: 5,120 images/second CPU throughput required.** The pipeline must match the GPU consumption rate to avoid starvation.
