title: Data Pipeline Throughput Matching
scenario: An H100 (989 TFLOP/s) processes batches of 256 images. The forward-backward
  pass takes exactly 50ms. Images are loaded from NVMe and require CPU augmentation.
question: Determine the minimum CPU throughput in images/second required to prevent
  the GPU from stalling on data loading.
visual:
  kind: svg
  path: cloud-4498.svg
  alt: 'Bar chart comparing throughput stages: Disk IO, CPU Augmentation, PCIe Transfer,
    and GPU Compute.'
  caption: Throughput Bottleneck Stages
details:
  realistic_solution: The GPU processes one batch of 256 images every 50ms (0.05 seconds).
    Therefore, the GPU consumes data at a rate of 256 / 0.05 = 5120 images per second.
    The CPU pipeline must yield at least 5120 images/second to keep the GPU fully
    utilized without starvation.
  common_mistake: Dividing 50ms by the batch size and inverting improperly, resulting
    in heavily skewed required CPU rates.
  napkin_math: 256 / 0.05 = 5120 img/s
