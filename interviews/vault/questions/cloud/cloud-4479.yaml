title: Exposure Bias and Position Debiasing in Ranking Models
scenario: A ranking model trained on click data shows that items ranked position 1-3 have CTR 5x higher than position 10-15 even after controlling for relevance. The model perpetuates this by ranking historically top-positioned items higher.
question: "How would you diagnose and correct position bias when positions 1-3 have 5x higher CTR than positions 10-15?"
details:
  realistic_solution: Use Inverse Propensity Scoring (IPS) or Position-Aware Learning (PAL). For IPS, weight each training example by the inverse probability of it being clicked at its position (estimated via random exploration). For PAL, train a two-tower model where one tower predicts the position-free relevance and the position bias is modeled separately. At serving, set position bias to a constant (e.g., position 1) for all items.
  common_mistake: |
    **The Pitfall:** Adding position as a direct feature to the model to "control" for it.
    **The Rationale:** Candidates think the model will learn to ignore position if it's provided explicitly as a feature.
    **The Consequence:** The model simply learns to rely on position as the strongest signal for relevance. At serving time, since all items start at position 0, a massive distribution shift occurs and ranking quality collapses.
  napkin_math: |
    1. **Bias observation:** CTR at position 1 = 10%, position 10 = 2% (5x ratio).
    2. **Click propensity (p_k):** From randomization, p_1 = 0.8, p_10 = 0.2.
    3. **IPS weight:** Weight = 1 / p_k. Pos 1 weight = 1 / 0.8 = 1.25. Pos 10 weight = 1 / 0.2 = 5.
    4. **Reweighting:** Pos 10 examples contribute 4x more to the loss.
    5. **Debiased estimate:** 2% / 0.2 = **10% debiased CTR**, correctly eliminating the positional disadvantage.
