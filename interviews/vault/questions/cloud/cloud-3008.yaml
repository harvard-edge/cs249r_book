title: 'KV-Cache: Realize Cross-Request KV Cache Sharing for RAG Applications'
scenario: Realize a KV cache sharing architecture for a RAG application where 1000 documents (avg 512 tokens each) are frequently retrieved and included in prompts. 60% of requests use one of the top-50 most popular documents. You are deploying a 32-layer GQA-8 model.
question: What KV-cache memory per token should the shared RAG document cache budget for the 32-layer GQA-8 model?
details:
  realistic_solution: 'Calculate the total size required to store the Keys and Values for a single token across all layers. The shared KV cache pages must be set to read-only (copy-on-write) to prevent concurrent requests from corrupting the shared prompt state.'
  common_mistake: |
    **The Pitfall:** Forgetting that attention is autoregressive and failing to account for all dimensions.
    **The Rationale:** Engineers often forget the 2x multiplier for Keys and Values, or use the incorrect precision multiplier.
    **The Consequence:** Under-provisioning the shared cache pool, leading to cache evictions and forcing costly recomputation of popular RAG documents.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layers: 32.
       - Components per layer: 2 (Keys and Values).
       - KV Heads: 8.
       - Head Dimension: 128.
       - Precision: 2 bytes (FP16/BF16).
    2. **Calculations:**
       - Total KV memory per token = 32 * 2 * 8 * 128 * 2 = 131,072 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Calculated.** Exactly 128 KiB (131,072 bytes) per token.
