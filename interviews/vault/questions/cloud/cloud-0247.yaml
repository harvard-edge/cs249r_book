title: The Activation Memory Bubble
scenario: Identify the scenario where the memory used for model activations is most likely to be larger
  than the memory used for the model's weights.
details:
  realistic_solution: During training, every layer's output (its activation) must be saved in memory to
    compute gradients during backpropagation. For a CNN processing high-resolution images (e.g., 1024x1024)
    with a large batch size, the size of these activation tensors (`Batch x Channels x Height x Width`)
    can easily exceed the memory required for the model's parameters. This is especially true in the early
    layers of a CNN where the spatial dimensions (Height, Width) are still large.
  common_mistake: It's a common misconception that model weights are always the largest consumer of VRAM.
    While true for many large language models, it's false for architectures that process high-dimensional
    inputs, like Convolutional Neural Networks (CNNs) on high-resolution images. In these cases, the intermediate
    activation maps that must be stored during training for the backward pass can be massive.
  napkin_math: 'Consider a CNN training on 1024x1024 images with a batch size of 32. A single intermediate
    layer with 256 channels in FP16 (2 bytes) requires:

    Activations = 32 (batch) * 256 (channels) * 1024 (H) * 1024 (W) * 2 bytes = 17,179,869,184 bytes (~17.1
    GB).

    A typical 50M parameter vision model''s weights only take 50M * 2 bytes = 100 MB. Activations are
    170x larger!'
  options:
  - Serving a 13B LLM with a short context length.
  - Training a large CNN on high-resolution images with a large batch size.
  - Fine-tuning a 1B parameter model with a small batch size.
  - Running inference with a quantized MobileNet on a single image.
  correct_index: 1
