title: 'FP16 Dual A100 vs FP8 Single H100'
scenario: 'Your team is deploying a 70-billion parameter LLM for a low-latency chat application. You are evaluating two serving architectures for the decoding phase at a batch size of 1. Option A uses FP16 weights distributed across 2x A100 GPUs (80GB, 2.0 TB/s bandwidth each) via Tensor Parallelism. Option B uses FP8 weight-only quantization running on a single H100 GPU (80GB, 3.35 TB/s bandwidth).'
question: 'Which architecture yields higher generation throughput, and what precision-accuracy tradeoffs must be managed?'
details:
  realistic_solution: 'Option B (Single H100 with FP8) is the better choice for throughput. Since decoding at batch size 1 is strictly memory-bandwidth bound, the bottleneck is loading the weights from HBM to SRAM. FP8 halves the weight size, drastically reducing the bytes read per generated token and overcoming the lower total bandwidth. However, deploying FP8 introduces precision tradeoffs: the reduced dynamic range means weight-only quantization requires fine-grained scaling factors (e.g., block-wise or group-wise quantization) to preserve accuracy and manage outliers, which are highly prevalent in 70B scale models.'
  common_mistake: |
    **The Pitfall:** Assuming 2x A100s will be faster because their combined memory bandwidth (4.0 TB/s) exceeds a single H100 (3.35 TB/s).
    **The Rationale:** Engineers compare aggregate hardware bandwidths without accounting for the amount of data that needs to be moved.
    **The Consequence:** The system is deployed with lower throughput because FP16 requires loading twice as much data per parameter as FP8.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A: 2x A100, FP16, Total bandwidth = 4.0 TB/s.
    - Option B: 1x H100, FP8, Total bandwidth = 3.35 TB/s.
    
    **Calculations:**
    - Option A Data per token: 70e9 $\times$ 2 bytes = 140 GB. Max throughput = $4000 \text{ GB/s} / 140 \text{ GB} = 28.5 \text{ tokens/sec}$.
    - Option B Data per token: 70e9 $\times$ 1 byte = 70 GB. Max throughput = $3350 \text{ GB/s} / 70 \text{ GB} = 47.8 \text{ tokens/sec}$.
    
    **Conclusion & Interpretation:**
    - **Result: 47.8 tokens/sec (Memory-Bandwidth-Bound)**. Option B (single H100 FP8) generates tokens ~67% faster because it halves the memory movement requirement.
