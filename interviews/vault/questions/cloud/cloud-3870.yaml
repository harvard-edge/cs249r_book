title: FP16 Dual A100 vs FP8 Single H100
scenario: Your team is deploying a 70-billion parameter LLM for a low-latency chat
  application. You are evaluating two serving architectures for the decoding phase
  at a batch size of 1. Option A uses FP16 weights distributed across 2x A100 GPUs
  (80GB, 2.0 TB/s bandwidth each) via Tensor Parallelism. Option B uses FP8 weight-only
  quantization running on a single H100 GPU (80GB, 3.35 TB/s bandwidth). Which architecture
  yields higher generation throughput, and what precision-accuracy tradeoffs must
  be managed?
question: Which architecture yields higher generation throughput, and what precision-accuracy
  tradeoffs must be managed?
details:
  realistic_solution: 'Option B (Single H100 with FP8) is the better choice for throughput.
    Since decoding at batch size 1 is strictly memory-bandwidth bound, the bottleneck
    is loading the weights from HBM to SRAM. FP8 halves the weight size, drastically
    reducing the bytes read per generated token and overcoming the lower total bandwidth.
    However, deploying FP8 introduces precision tradeoffs: the reduced dynamic range
    means weight-only quantization requires fine-grained scaling factors (e.g., block-wise
    or group-wise quantization) to preserve accuracy and manage outliers, which are
    highly prevalent in 70B scale models.'
  common_mistake: Candidates often assume that Option A will have higher throughput
    because the combined memory bandwidth of two A100s (4.0 TB/s) exceeds a single
    H100 (3.35 TB/s). They forget that FP16 requires loading twice as much data per
    parameter as FP8, fundamentally changing the memory-bound throughput limits.
  napkin_math: 'Option A (2x A100, FP16): Total memory bandwidth = 2 * 2.0 TB/s =
    4.0 TB/s (4000 GB/s). Data loaded per token = 70e9 parameters * 2 bytes/param
    = 140 GB. Max decode throughput = 4000 GB/s / 140 GB = 28.5 tokens/sec. Option
    B (1x H100, FP8): Total memory bandwidth = 3.35 TB/s (3350 GB/s). Data loaded
    per token = 70e9 parameters * 1 byte/param = 70 GB. Max decode throughput = 3350
    GB/s / 70 GB = 47.8 tokens/sec. Option B generates tokens ~67% faster.'
