title: Randomized Thresholds for Equalized Odds
scenario: A cloud-based loan approval system processing 10,000 requests/sec must satisfy Equalized Odds across two demographic groups. Group A has two known operating points on its ROC curve: P_A1(FPR=0.10, TPR=0.70) and P_A2(FPR=0.20, TPR=0.80). Group B has two operating points: P_B1(FPR=0.05, TPR=0.65) and P_B2(FPR=0.30, TPR=0.90).
question: What randomization probabilities over the two ROC operating points achieve Equalized Odds at exactly FPR=0.15 and TPR=0.75 for Groups A and B?
details:
  realistic_solution: 'Use a convex combination of the operating points for both groups. For Group A, solve for probability q of choosing P_A2: q*(0.20) + (1-q)*(0.10) = 0.15 -> q = 0.5. For Group B, solve for probability p of choosing P_B2: p*(0.30) + (1-p)*(0.05) = 0.15 -> p = 0.4. The system must randomly apply the second threshold to 50% of Group A applicants and 40% of Group B applicants.'
  common_mistake: |
    **The Pitfall:** Confusing Equalized Odds with Demographic Parity, or attempting to use a single static threshold.
    **The Rationale:** Candidates often assume fairness constraints can be met simply by shifting a single decision boundary.
    **The Consequence:** They fail to realize that reaching an exact arbitrary (TPR, FPR) point mathematically requires interpolating between two thresholds via a randomized classifier.
  napkin_math: |
    1. **Group A Interpolation:** 0.10 + q(0.20 - 0.10) = 0.15 → q = 0.5. (50% probability for P_A2). Check TPR: 0.5(0.80) + 0.5(0.70) = 0.75.
    2. **Group B Interpolation:** 0.05 + p(0.30 - 0.05) = 0.15 → p = 0.4. (40% probability for P_B2). Check TPR: 0.4(0.90) + 0.6(0.65) = 0.36 + 0.39 = 0.75.
    3. **Conclusion:** **Randomly apply the second threshold to 50% of Group A applicants and 40% of Group B applicants** to meet the fairness constraint.
