title: Randomized Thresholds for Equalized Odds
scenario: 'A cloud-based loan approval system, deployed on an EKS cluster with AWS Inferentia (Inf2) instances
  processing 10,000 requests/sec, must satisfy Equalized Odds across two demographic groups. Group A has
  two known operating points on its ROC curve: P_A1(FPR=0.10, TPR=0.70) and P_A2(FPR=0.20, TPR=0.80).
  Group B has two operating points: P_B1(FPR=0.05, TPR=0.65) and P_B2(FPR=0.30, TPR=0.90). You need to
  implement a randomized threshold classifier to achieve Equalized Odds (equal TPR and equal FPR) for
  both groups at exactly FPR=0.15 and TPR=0.75. Calculate the exact probabilities used to randomize the
  thresholds for both Group A and Group B.'
details:
  realistic_solution: 'Use a convex combination of the operating points for both groups. For Group A,
    solve for probability q of choosing P_A2: q*(0.20) + (1-q)*(0.10) = 0.15 -> q = 0.5. For Group B,
    solve for probability p of choosing P_B2: p*(0.30) + (1-p)*(0.05) = 0.15 -> p = 0.4. The system must
    randomly apply the second threshold to 50% of Group A applicants and 40% of Group B applicants.'
  common_mistake: Confusing Equalized Odds with Demographic Parity, or attempting to shift a single static
    threshold without realizing that reaching an exact arbitrary (TPR, FPR) point requires interpolating
    between two thresholds via a randomized classifier.
  napkin_math: 'To achieve Equalized Odds (FPR=0.15, TPR=0.75), we interpolate Group A and Group B''s
    ROC points via randomization. Group A FPR interpolation: 0.10 + q*(0.20 - 0.10) = 0.15. Solving gives
    q = 0.5 (flip a coin). Group B FPR interpolation: 0.05 + p*(0.30 - 0.05) = 0.15. Solving gives p =
    0.4. Checking Group B TPR: 0.4*0.90 + 0.6*0.65 = 0.36 + 0.39 = 0.75. By mixing predictions, fairness
    constraints are met.'
