title: Calculating GPU Cluster Resource Fragmentation
scenario: You manage a dedicated compute cluster of 20 nodes. The cluster scheduler first places 15 separate distributed training jobs. Each training job requires exactly 6 GPUs and is placed on a distinct node due to CPU-affinity rules. Shortly after, a queue of 12 evaluation jobs arrives. Each evaluation job requires exactly 4 GPUs residing on a single node to leverage NVLink.
question: "How many 4-GPU evaluation jobs can start immediately after 15 distinct 6-GPU training jobs, and how many GPUs are stranded?"
details:
  realistic_solution: Only 10 evaluation jobs can be scheduled. They will be placed on the 5 completely free nodes (2 jobs per node). The 15 partially utilized nodes cannot host any evaluation jobs, leaving 30 GPUs permanently stranded until the training jobs complete.
  common_mistake: |
    **The Pitfall:** Summing total available GPUs across the entire cluster.
    **The Rationale:** It's intuitive to treat cluster capacity as a single monolithic pool.
    **The Consequence:** Dividing total free GPUs by the job requirement ignores strict node boundaries and intra-node communication constraints, leading to mathematically impossible scheduling assumptions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 20 nodes × 8 GPUs = 160 GPUs.
       - 15 training jobs require 6 GPUs each on distinct nodes.
       - Evaluation jobs require 4 GPUs on a single node.
    2. **Calculations:**
       - 15 nodes allocate 6 GPUs, leaving 15 nodes with 2 GPUs free.
       - 5 nodes remain completely empty (8 GPUs free).
       - Eval jobs fit on free nodes: 5 free nodes × (8 // 4) = 10 jobs.
       - Eval jobs on active nodes: 15 nodes × (2 // 4) = 0 jobs.
       - Stranded GPUs: 15 nodes × 2 GPUs = 30 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Fragmentation-Bound. Strict node boundaries and intra-node communication constraints permanently strand 30 GPUs until training finishes.**
