title: Byzantine Failures in Distributed GPU Training
scenario: You are orchestrating the training of a 175B parameter language model on a cluster of 8,192 A100 GPUs. Hardware profiling indicates that one in every 500 GPUs experiences a silent data corruption (SDC) or Byzantine failure per week of continuous training, which silently corrupts gradients without crashing the process. The training run is scheduled to last exactly 4 weeks.
question: Over 4 weeks on 8,192 GPUs, how many Byzantine failures are expected, and what is the chance of at least one?
details:
  realistic_solution: The expected number of failures is strictly proportional to the number of GPUs and time. With 65 expected failures, the probability of avoiding them is virtually zero. The correct system architecture requires continuous anomaly detection, such as computing checksums or gradient norms, to catch SDCs before they are merged into the global model via AllReduce.
  common_mistake: |
    **The Pitfall:** Calculating standard fail-stop crash probabilities and focusing on checkpoint recovery times.
    **The Rationale:** Candidates ignore that Byzantine SDCs do not crash the process; they silently poison the global model state unless explicit, continuous invariant checks (like gradient norms) are implemented.
    **The Consequence:** Completing a month-long, multi-million dollar training run only to discover the model has diverged or collapsed due to silent gradient poisoning.
  napkin_math: |
    1. Weekly SDC Rate: 1 / 500 = 0.002 failures/week/GPU.
    2. Total Expected Failures: 8,192 GPUs * 0.002 failures/week * 4 weeks = 65.536 expected failures.
    3. Probability of 0 Failures: (1 - 0.002)^(8192 * 4) = (0.998)^32768 ≈ 0.
    4. Probability of ≥1 Failure: 1 - P(0 failures).
    5. **Final Result: ~65 Byzantine failures are expected, with a ~100% chance of at least one occurring.**
