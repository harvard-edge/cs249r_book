title: Byzantine Failures in Distributed GPU Training
scenario: You are orchestrating the training of a 175B parameter language model on a cluster of 8,192
  A100 GPUs. Hardware profiling indicates that one in every 500 GPUs experiences a silent data corruption
  (SDC) or Byzantine failure per week of continuous training, which silently corrupts gradients without
  crashing the process. If the training run is scheduled to last exactly 4 weeks, what is the expected
  total number of Byzantine failures across the cluster, and what is the probability of encountering at
  least one such failure during the entire run?
question: "Over 4 weeks on 8,192 GPUs, how many Byzantine failures are expected, and what is the chance of at least one?"
details:
  realistic_solution: The expected number of failures is strictly proportional to the number of GPUs and
    time. With 65 expected failures, the probability of avoiding them is virtually zero. The correct system
    architecture requires continuous anomaly detection, such as computing checksums or gradient norms,
    to catch SDCs before they are merged into the global model via AllReduce.
  common_mistake: Candidates often calculate standard fail-stop crash probabilities and focus on checkpoint
    recovery times, ignoring that Byzantine SDCs will silently poison the global model state unless strict
    invariant checks are implemented.
  napkin_math: 'Weekly SDC rate per GPU = 1 / 500 = 0.002 failures/week.

    Total expected failures = 8,192 GPUs * 0.002 failures/week/GPU * 4 weeks = 65.536 expected failures.

    P(0 failures) = (1 - 0.002)^(8192 * 4) = (0.998)^32768 ≈ 0.

    P(≥1 failure) = 1 - P(0 failures) ≈ 100%.'
