title: Scheduling Deadline-Aware Training Jobs
scenario: A research team needs their 70B model trained to 1T tokens before a conference deadline in 14 days. They estimate needing 128 GPUs continuously. Your cluster has 200 GPUs available.
question: "Can 128 GPUs train the 70B model on 1T tokens within 14 days, and how would you schedule around the deadline?"
details:
  realistic_solution: 'Phase 1: Capacity planning. 70B model at 1T tokens: FLOPs = 6 × 70B × 1T = 4.2 × 10^23 FLOPs. 128 GPUs at 989 TFLOPS BF16, 50% MFU: 128 × 989e12 × 0.5 = 6.33 × 10^16 FLOPs/sec (63.3 PFLOPS). Time required: 4.2e23 / 6.33e16 = 6,635,000 seconds = 1,843 hours = 76.8 days. Even with perfect efficiency, 128 GPUs cannot finish in 14 days. With all 200 GPUs: 4.2e23 / (200 × 989e12 × 0.5) = 4,246,000 seconds = 1,179 hours = 49 days. The 14-day deadline is physically impossible with 200 GPUs. Resolution: the team must drastically reduce scope (e.g., to 200B tokens) or procure more GPUs (need ~700 GPUs for 14 days). As the scheduler, inform the team the job cannot meet the deadline and negotiate a smaller dataset or longer timeline.'
  common_mistake: |
    **The Pitfall:** Dedicating GPUs exclusively for a job without verifying if the compute required physically fits within the time window.
    **The Rationale:** Trusting user estimates without performing basic floating-point math validation on model scale and dataset size.
    **The Consequence:** Wasting cluster resources on an impossible job, guaranteeing a missed deadline and angry stakeholders.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B parameters, Dataset: 1T tokens.
       - Deadline: 14 days (1.2e6 seconds).
       - Hardware Performance @ 50% MFU: 63.3 PFLOPS (6.33e16 FLOPs/sec) for 128 GPUs.
    2. **Calculations:**
       - Total Compute = 6 * 70B * 1T = 4.2e23 FLOPs.
       - Time (128 GPUs) = 4.2e23 / 6.33e16 = 6.63e6 seconds (~77 days).
       - Required Compute for 14 Days = 4.2e23 / 1.2e6 = 350 PFLOPS.
       - Required GPUs = 350 PFLOPS / (989 TFLOPS * 0.5) = ~708 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Impossible with 200 GPUs (Compute-Bound).** The 14-day deadline mathematically requires at least 708 GPUs.
