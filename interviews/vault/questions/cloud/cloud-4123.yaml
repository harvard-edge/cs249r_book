title: Scheduling Deadline-Aware Training Jobs
scenario: A research team needs their 70B model trained to 1T tokens before a conference
  deadline in 14 days. They estimate needing 128 H100 GPUs continuously. Your cluster
  has 200 H100 GPUs with other workloads. Design a scheduling plan that guarantees
  the deadline while maximizing cluster utilization for other users.
question: Can 128 H100s train the 70B model on 1T tokens within 14 days, and how would
  you schedule around the deadline?
details:
  realistic_solution: 'Phase 1: Capacity planning. 70B model at 1T tokens: FLOPs = 6 × 70B × 1T = 4.2 × 10^23 FLOPs. 128 H100s at 989 TFLOPS BF16, 50% MFU: 128 × 989e12 × 0.5 = 6.33 × 10^16 FLOPs/sec (63.3 PFLOPS). Time required: 4.2e23 / 6.33e16 = 6,635,000 seconds = 1,843 hours = 76.8 days. Even with perfect efficiency, 128 GPUs cannot finish in 14 days. With all 200 GPUs: 4.2e23 / (200 × 989e12 × 0.5) = 4,246,000 seconds = 1,179 hours = 49 days. The 14-day deadline is physically impossible with 200 GPUs. Resolution: the team must drastically reduce scope (e.g., to 200B tokens) or procure more GPUs (need ~700 H100s for 14 days). As the scheduler, inform the team the job cannot meet the deadline and negotiate a smaller dataset or longer timeline.'
  common_mistake: Dedicating 128 GPUs exclusively for 14 days — this wastes GPUs during
    the team's inevitable downtime (debugging, job failures, re-queuing).
  napkin_math: 'Compute needed: 6 × 70B × 1T = 4.2e23 FLOPs. 128 H100s @ 50% MFU = 63.3 PFLOPS. 4.2e23 / 6.33e16 = ~77 days. 200 H100s = ~49 days. To finish in 14 days (1.2e6 seconds), you need 4.2e23 / 1.2e6 = 350 PFLOPS of effective compute. At 494 TFLOPS effective per H100, you need 350e15 / 494e12 ≈ 708 H100 GPUs.'
