title: Invariance Testing Compute Cost
scenario: 'You are deploying an automated loan approval model (latency: 100ms per request) processing 50,000 applications daily. To ensure fairness, you implement an invariance testing pipeline by substituting applicant names with 10 different demographic equivalents. You observe that 2,500 applications change their final approval decision across any of their 10 permutations.'
question: What daily compute time does the 10-permutation invariance suite add, and what is the application-level violation rate?
details:
  realistic_solution: 'The pipeline adds 500,000 additional inferences, requiring ~14 hours of sequential compute time (which should be batched). The invariance violation rate is calculated at the application level: 5%.'
  common_mistake: |
    **The Pitfall:** Calculating the violation rate based on the total number of permutations instead of original applications.
    **The Rationale:** Engineers divide the number of flipped decisions by the total number of perturbed inferences.
    **The Consequence:** Artificially diluting the reported bias metric, hiding severe fairness violations at the application level.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline load: 50,000 applications/day.
       - Permutations per application: 10.
       - Latency: 100ms/inference.
       - Applications with flipped decisions: 2,500.
    2. **Calculations:**
       - Additional inferences = 50,000 * 10 = 500,000.
       - Added compute time = 500,000 * 0.1s = 50,000 seconds = 13.89 hours.
       - Application-level violation rate = 2,500 / 50,000 = 5%.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The invariance suite adds ~14 hours of sequential compute (requiring parallel batching) and reveals a 5% fairness violation rate.
