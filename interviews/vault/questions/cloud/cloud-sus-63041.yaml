title: TPU v5e vs H100 for Fine-Tuning LoRA at Scale
scenario: A team runs LoRA fine-tuning (rank=16) on a 7B base model using a dataset of 1M samples, batch
  size 64, 3 epochs on both TPU v5e (16 chips) and H100 (8 GPUs, NVLink). The LoRA adapter has 40M trainable
  parameters. TPU v5e achieves 197 TFLOPS BF16 per chip; H100 achieves 989 TFLOPS FP16 per GPU. Which
  configuration finishes faster, and what is the per-dollar cost comparison assuming $1.2/chip-hr TPU
  v5e and $3.5/GPU-hr H100?
details:
  realistic_solution: 'LoRA training FLOPs: forward pass (full 7B model): 2 × 7B × batch × seq ≈ 2 × 7B
    × 64 × 512 = 4.6×10¹⁴ FLOPs/step. Backward pass through LoRA adapters only: 2 × 40M × 64 × 512 = 2.6×10¹²
    FLOPs/step. Total: ≈ 4.6×10¹⁴ FLOPs/step. Steps: 1M × 3 / 64 = 46,875 steps. Total FLOPs: 46,875 ×
    4.6×10¹⁴ = 2.16×10¹⁹ FLOPs. TPU v5e 16 chips at MFU=55%: 16 × 197 TFLOPS × 0.55 = 1,732 GFLOPS effective
    = 1.73×10¹⁵ FLOPS/sec. Time: 2.16×10¹⁹ / 1.73×10¹⁵ = 12,486 sec = 3.47 hours. H100 8 GPUs at MFU=50%:
    8 × 989 × 0.50 = 3,956 GFLOPS = 3.96×10¹⁵ FLOPS/sec. Time: 2.16×10¹⁹ / 3.96×10¹⁵ = 5,455 sec = 1.52
    hours. Cost: TPU v5e: 3.47 × 16 × $1.20 = $66.6. H100: 1.52 × 8 × $3.50 = $42.6. H100 wins on time
    (2.3× faster) and cost (36% cheaper) for this LoRA workload. TPU advantage emerges at much larger
    scales (thousands of chips).'
  common_mistake: Using theoretical TFLOPS × chip count without accounting for LoRA's unique computation
    profile. LoRA fine-tuning is not purely matmul-dominated — the frozen backbone runs in inference mode
    (no gradient accumulation through most layers), and only the small adapter matrices require gradient
    computation. The effective FLOP count is much lower than full fine-tuning.
  napkin_math: 'LoRA backward: only 40M/7B = 0.57% of parameters require gradient. Effective backward
    FLOPs: 0.57% of full backward. Full step FLOPs: forward (7B) + backward (7B + 40M) ≈ 4×7B×64×512 =
    9.2×10¹⁴. Total training: 46875 × 9.2×10¹⁴ = 4.3×10¹⁹. TPU 16: 16×197×10¹²×0.55 = 1.73×10¹⁵/s → 4.3×10¹⁹/1.73×10¹⁵
    = 24,855s = 6.9h. H100 8: 8×989×10¹²×0.50 = 3.96×10¹⁵/s → 10,859s = 3.0h. Cost: TPU = 6.9×16×$1.20
    = $132. H100 = 3.0×8×$3.50 = $84. H100 still 36% cheaper. Note: TPU wins when using 128+ chips on
    100B+ models.'
