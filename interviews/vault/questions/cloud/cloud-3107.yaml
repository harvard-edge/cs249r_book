title: 'TCO Specification: Design Cost-Optimal Inference for SLO'
scenario: 'Specify the minimum-cost H100 inference configuration for LLaMA-65B (FP16: 4 H100s/pod, INT4: 1 H100/pod) with SLO: P99 < 2s, P50 < 500ms, throughput >= 1000 tokens/s. Each FP16 pod delivers 500 tok/s at $10/hr (4 GPUs). Each INT4 pod delivers 800 tok/s at $2.50/hr.'
question: What is the minimum-cost fleet mix of FP16 and INT4 pods to meet the throughput and latency SLOs, and what is its cost?
details:
  realistic_solution: 'To achieve 1000 tok/s at minimum cost, one might naively choose 2 INT4 pods (1600 tok/s for $5/hr). However, INT4 dequantization overhead often causes tail latency spikes that violate a strict P99 < 2s SLO during peak load. To guarantee the SLO while minimizing cost, a hybrid fleet mix is required: 1 FP16 pod (500 tok/s) to absorb latency-sensitive and tail requests, and 1 INT4 pod (800 tok/s) to process the bulk throughput. This fleet delivers 1300 tok/s total, satisfying the throughput and latency SLOs at a cost of $12.50/hr.'
  common_mistake: |
    **The Pitfall:** Choosing purely on throughput-per-dollar without verifying that INT4 quantization meets the latency SLO.
    **The Rationale:** Candidates often assume that because INT4 pods are cheaper per token, a homogeneous INT4 fleet is optimal, ignoring that quantization adds dequantization overhead.
    **The Consequence:** The resulting fleet fails the P99 latency SLO during peak load.
  napkin_math: |
    - **Analyze pure INT4:** 2 INT4 pods cost $5/hr and provide 1600 tok/s. However, this fails the P99 < 2s SLO.
    - **Analyze hybrid mix:** 1 FP16 pod ($10/hr, 500 tok/s) + 1 INT4 pod ($2.50/hr, 800 tok/s).
    - **Calculate total throughput:** 500 + 800 = 1300 tok/s (meets >= 1000 tok/s SLO).
    - **Calculate total cost:** $10 + $2.50 = **$12.50/hr**.
