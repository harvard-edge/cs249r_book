title: Pipeline Parallelism Activation Checkpointing Interaction
scenario: 'You are training a 70B model with PP=8, TP=8, and 32 micro-batches on 64 H100 GPUs using 1F1B scheduling. Each pipeline stage holds ~8.75B parameters. Without activation checkpointing, peak activation memory per stage is 24 GB (8 stored micro-batches × 3 GB each).'
question: 'With selective activation checkpointing, how much activation memory do you save per stage and what recomputation cost should you expect?'
details:
  realistic_solution: 'In a transformer layer, attention activations (Q, K, V projections, attention scores if not using FlashAttention) dominate: ~60-70% of activation memory. MLP activations (up-projection, activation, down-projection intermediates) are ~30-40%. With selective checkpointing — recompute attention, store MLP — per micro-batch activation drops from 3 GB to ~1.2 GB (store only MLP intermediates). Peak with 1F1B = 8 × 1.2 GB = 9.6 GB, saving 14.4 GB (60% reduction). Recomputation cost: attention is ~40% of layer FLOPS but is fast to recompute with FlashAttention (fused kernel, no HBM reads for intermediates). Effective training slowdown: ~8-12% from recomputation. With FlashAttention-2, the recomputation is nearly free because it was already IO-optimized.'
  common_mistake: |
    **The Pitfall:** Applying full activation checkpointing uniformly.
    **The Rationale:** Treating all activations as equally expensive to compute and memory-intensive to store.
    **The Consequence:** Recomputing expensive MLP layers when only attention activations (which are cheap to recompute) needed to be checkpointed.
  napkin_math: |
    * Without checkpointing: 8 × 3 GB = 24 GB activations.
    * Selective (recompute attention, store MLP): 8 × 1.2 GB = 9.6 GB.
    * Savings: 24 GB - 9.6 GB = 14.4 GB.
    * Recompute overhead: ~10% training time.
    * Full checkpoint: 8 × 0.5 GB = 4 GB but ~33% slower.
    * **Result: 60% memory reduction (14.4 GB saved) with only ~10% compute overhead.**
