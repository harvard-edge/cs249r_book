title: Pipeline Parallelism Activation Checkpointing Interaction
scenario: 'You are training a 70B model with PP=8, TP=8, and 32 micro-batches using 1F1B scheduling. Each pipeline stage holds ~8.75B parameters.'
question: 'With selective activation checkpointing, how much activation memory do you save per stage and what recomputation cost should you expect?'
details:
  realistic_solution: 'Attention activations (Q, K, V projections) dominate ~60-70% of activation memory. MLP activations are ~30-40%. With selective checkpointing — recomputing attention via FlashAttention-2, storing MLP — per micro-batch activation drops from 3 GB to ~1.2 GB. Effective training slowdown: ~8-12% from recomputation.'
  common_mistake: |
    **The Pitfall:** Applying full activation checkpointing uniformly.
    **The Rationale:** Treating all activations as equally expensive to compute and memory-intensive to store.
    **The Consequence:** Recomputing expensive MLP layers when only attention activations (which are cheap to recompute) needed to be checkpointed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 stored micro-batches per pipeline stage.
       - Without checkpointing: 3 GB per micro-batch.
    2. **Calculations:**
       - Without checkpointing: 8 * 3 GB = 24 GB activations.
       - Selective (recompute attention, store MLP): 8 * 1.2 GB = 9.6 GB.
       - Savings: 24 GB - 9.6 GB = 14.4 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Recomputation. 60% memory reduction (14.4 GB saved) with only ~10% compute overhead.**
