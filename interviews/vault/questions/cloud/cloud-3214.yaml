title: MoE Model Parallelism Topology for Training
scenario: 'Design the full parallelism strategy for training a DeepSeek-V3-scale model (671B total, 256 experts, top-8 routing, 37B active) on 2048 H100 GPUs across 256 nodes.'
question: 'What EP, TP, PP, and DP dimensions would you use to train this 671B, 256-expert MoE on 2048 H100s, and why?'
details:
  realistic_solution: 'Architecture: 61 layers. Strategy per layer type: (1) Attention layers: TP=8 within a node. (2) MoE layers: EP=32 (32 GPUs, 8 experts per GPU). Place EP groups across 4 nodes. (3) Pipeline parallelism: PP=8 (8 stages). (4) Data parallelism: DP = 2048 / (TP×PP) = 32. Each DP replica: 64 GPUs across 8 nodes. Communication: EP all-to-all within 4 nodes uses mix of NVLink + IB.'
  common_mistake: |
    **The Pitfall:** Applying standard 3D parallelism globally across the entire model.
    **The Rationale:** Treating MoE layers identically to dense attention layers.
    **The Consequence:** Massive network bottlenecks, because MoE requires specialized all-to-all communication (EP) which must be routed differently than dense TP all-reduces.
  napkin_math: |
    - **Parallelism Sizing:** 2048 GPUs = TP(8) × PP(8) × DP(32).
    - **Expert Parallelism (EP):** EP=32 (32 GPUs handle 8 experts each = 256 experts).
    - **Memory per GPU:**
      - Attention Shard: ~37B / 8 / 8 = 578M params ≈ 1.2 GB.
      - Experts: 8 × 2.5B × 2B = 40 GB.
      - Optimizer State (ZeRO-1 over DP=32): 240 GB / 32 = 7.5 GB.
      - Activations: ~10 GB.
      - Total: ~59 GB (Fits safely in 80 GB HBM).
    - **Pipeline Bubble:** 1/PP = 12.5% (drops to ~6% with interleaved scheduling).
