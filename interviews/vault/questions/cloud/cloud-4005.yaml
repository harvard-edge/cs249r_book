title: Incomplete Memory Budget For Multi-Tenant Serving
scenario: A team says a 70B FP16 model fits on two 80 GB H100s because weights are
  140 GB. They want approval for production multi-tenant serving, but they have not
  provided context length, batch size, KV-cache policy, fragmentation overhead, or
  co-located workload memory.
question: What missing information is required to approve the two-H100 memory plan,
  and what lower bound can you compute from the 140 GB weights?
details:
  realistic_solution: The lower bound is 140 GB of weights across 160 GB of HBM, leaving
    only 20 GB before runtime overhead. You need context length, batch size, KV-cache
    bytes/token, activation buffers, allocator fragmentation, model-parallel overhead,
    and co-tenant reservations. Without those, the plan is not production-safe even
    if static weights fit.
  common_mistake: Approving based only on model weights and discovering at runtime
    that KV cache and fragmentation exceed remaining HBM.
  napkin_math: Available headroom = 2 x 80 - 140 = 20 GB. KV cache scales as 2 x layers
    x KV_heads x head_dim x sequence x batch x bytes. If a long-context workload needs
    even 10-20 GB of aggregate KV plus allocator overhead, the apparent 20 GB weight
    headroom disappears.
