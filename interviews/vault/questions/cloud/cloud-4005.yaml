title: Incomplete Memory Budget For Multi-Tenant Serving
scenario: A team says a 70B FP16 model fits on two H100s because weights are 140 GB. They want approval for production multi-tenant serving, but they have not provided context length, batch size, KV-cache policy, fragmentation overhead, or co-located workload memory.
question: What missing information is required to approve the two-H100 memory plan, and what lower bound can you compute from the 140 GB weights?
details:
  realistic_solution: The lower bound is 140 GB of weights across 160 GB of HBM, leaving only 20 GB before runtime overhead. You need context length, batch size, KV-cache bytes/token, activation buffers, allocator fragmentation, model-parallel overhead, and co-tenant reservations. Without those, the plan is not production-safe even if static weights fit.
  common_mistake: |
    **The Pitfall:** Approving based only on model weights and discovering at runtime that KV cache and fragmentation exceed remaining HBM.
    **The Rationale:** Candidates often focus purely on the static weight footprint (140 GB) and ignore the dynamic memory allocations required during inference.
    **The Consequence:** The model will crash with Out-Of-Memory (OOM) errors as soon as requests are served.
  napkin_math: |
    1. **Calculate Available Headroom:** Available headroom = 2 × 80 GB - 140 GB = 20 GB.
    2. **Identify Missing Variables:** KV cache scales as 2 × layers × KV_heads × head_dim × sequence × batch × bytes.
    3. **Compute Real-World Impact:** If a long-context workload needs even 10-20 GB of aggregate KV plus allocator overhead, the apparent 20 GB weight headroom disappears.
    **Final Result: The 20 GB headroom is insufficient without knowing KV cache and fragmentation overheads.**
