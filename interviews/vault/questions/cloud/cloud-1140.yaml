title: eKYC Disaggregated Evaluation Strategy
scenario: You are evaluating a cloud-based eKYC (identity verification) vision model deployed on AWS Inf2
  instances for a global FinTech app. The model achieves a 99.2% aggregate accuracy and a global False
  Rejection Rate (FRR) of just 0.8% on a random holdout set of 100,000 users. The product team wants to
  launch immediately to cut manual review costs by $2M/month. However, users from a specific minority
  demographic constitute only 2% of the overall user base. Evaluate the statistical risks of the current
  validation strategy and justify the operational cost of collecting a targeted evaluation set for this
  subgroup before launch.
question: "Why is the 100,000-user random holdout insufficient for the 2% subgroup, and how large a targeted evaluation set is needed?"
details:
  realistic_solution: Mandate a disaggregated evaluation using stratified data collection. Calculate the
    required sample size to bound the minority group's FRR variance, and commission targeted data collection
    to hit that threshold to prevent severe hidden bias before approving the rollout.
  common_mistake: Accepting the global 0.8% FRR, or simply splitting the existing 100k random holdout
    set by demographic, failing to realize the minority group's sample size is too small to provide tight
    statistical confidence bounds.
  napkin_math: In a random 100k sample, a 2% demographic yields 2,000 samples. If their true FRR is 5%,
    margin of error (95% CI) = 1.96 * sqrt(0.05 * 0.95 / 2000) ≈ 0.96%. To evaluate their FRR to within
    a strict +/- 0.2% tolerance for compliance, required sample n = (1.96 / 0.002)^2 * (0.05 * 0.95) ≈
    45,619 samples for THAT subgroup. Random sampling would require ~2.28M total labeled users to hit
    this naturally. Targeted collection is mathematically mandatory.
