title: eKYC Disaggregated Evaluation Strategy
scenario: An eKYC vision model achieves a global False Rejection Rate (FRR) of 0.8% on a random holdout set of 100,000 users. However, users from a specific minority demographic constitute only 2% of the overall user base. Assume the minority group's true FRR is 5%, and a new compliance rule requires you to bound its Margin of Error (95% CI) to +/- 0.2%.
question: Why is the 100,000-user random holdout insufficient to validate the 2% subgroup, and what sample size is mathematically required to bound their FRR variance?
details:
  realistic_solution: Mandate a disaggregated evaluation using stratified data collection. Calculate the required sample size to bound the minority group's FRR variance, and commission targeted data collection to hit that threshold to prevent severe hidden bias before approving the rollout.
  common_mistake: |
    **The Pitfall:** Accepting the global 0.8% False Rejection Rate without subgroup analysis.
    **The Rationale:** Candidates fail to realize that the minority group's sample size in a random holdout is too small to provide tight statistical confidence bounds.
    **The Consequence:** Deploying a biased model that severely underperforms for a specific demographic, risking compliance failures.
  napkin_math: |
    - **Random Holdout Yield:** In 100k samples, a 2% demographic yields 2,000 samples.
    - **Margin of Error:** If true FRR is 5%, MoE (95% CI) = `1.96 * sqrt(0.05 * 0.95 / 2000)` ≈ 0.96%.
    - **Targeted Requirement:** To bound FRR to a strict +/- 0.2% tolerance: `n = (1.96 / 0.002)^2 * (0.05 * 0.95)` ≈ 45,619 samples.
    - **Result: Random sampling would require ~2.28M total labeled users to hit this naturally, proving targeted collection is mathematically mandatory.**
