title: 'Quantifying Label Quality Drift in Moderation Pipelines'
scenario: 'A cloud-based content moderation pipeline processes 5 million images daily. The ML model routes low-confidence predictions (500,000 images/day) to a pool of 200 human annotators for ground truth labeling and continuous retraining. Over 6 months, the model''s production precision degrades from 92% to 80%. Statistical tests confirm the input data distribution (covariate shift) and user behavior (concept drift) are completely unchanged. However, annotator turnover has doubled, and the average review time dropped from 4.5s to 2.1s per image. The business incurs a $0.50 penalty for every false positive.'
question: 'Calculate the additional monthly cost caused by label drift, and what should you implement to detect and prevent noisy labels from poisoning retraining?'
details:
  realistic_solution: 'Implement a Golden Set injection strategy where pre-verified expert labels are seamlessly mixed into annotator queues to continuously measure inter-annotator agreement (IAA), automatically quarantine annotators with high error rates, and prevent poisoned data from reaching the training pipeline.'
  common_mistake: |
    **The Pitfall:** Assuming the performance degradation is caused by concept drift.
    **The Rationale:** Engineers default to solving accuracy drops by increasing continuous retraining frequency.
    **The Consequence:** Aggressively fitting to the newly degraded labels actually accelerates model collapse.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original daily FPs: 500,000 * (1.00 - 0.92) = 40,000 FPs.
    - Degraded daily FPs: 500,000 * (1.00 - 0.80) = 100,000 FPs.
    - Penalty per FP = $0.50.

    **Calculations:**
    - Additional daily FPs: 100,000 - 40,000 = 60,000 FPs.
    - Monthly cost increase: 60,000 FPs/day * 30 days/month * $0.50/FP.

    **Conclusion & Interpretation:**
    - **Result: $900,000 per month (Cost-Bound)**. Label drift significantly impacts business revenue, necessitating golden set injections.
