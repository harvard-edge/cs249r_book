title: Designing a Draft Model Selection Strategy
scenario: 'You must choose a draft model for speculative decoding with a 70B target on 2x H100. Options:
  (A) 1B model (alpha=0.65, 0.5ms/token), (B) 7B model (alpha=0.82, 2ms/token), (C) 2-layer early-exit
  of the target (alpha=0.70, 1ms/token). Target decode: 25ms/token. Design the optimal choice with K optimization.'
details:
  realistic_solution: 'E[tokens] = (1-alpha^(K+1))/(1-alpha). A: (1-0.65^8)/0.35 = 2.77. C: (1-0.70^7)/0.30
    = 3.06. These match Gemini''s corrections.'
  common_mistake: Always picking the highest acceptance rate draft. The draft's own latency cost must
    be amortized — a slow but accurate draft can be worse than a fast but less accurate one.
  napkin_math: 'Speculative decoding expected tokens per step:

    A (alpha=0.65, K=7): E = (1 - 0.65^8) / (1 - 0.65) = (1 - 0.0319) / 0.35 = 0.9681 / 0.35 = 2.766...
    Let me recalc: 0.65^8 = 0.65^4 × 0.65^4. 0.65^2=0.4225; 0.65^4=0.1785; 0.65^8=0.0319. E_A = (1-0.0319)/0.35
    = 2.77.

    C (alpha=0.70, K=6): E = (1 - 0.70^7) / (1 - 0.70). 0.70^7: 0.70^2=0.49; 0.70^4=0.2401; 0.70^6=0.1176;
    0.70^7=0.0824. E_C = (1-0.0824)/0.30 = 0.9176/0.30 = 3.06 ≈ 3.06.

    Note: formula is (1-alpha^(K+1))/(1-alpha).'
