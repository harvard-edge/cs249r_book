title: The Strided Memory Fetch
scenario: You are writing a custom CUDA kernel to perform an element-wise addition of two 1GB tensors. Version A reads the tensors sequentially (`A[i] + B[i]`). Version B reads the tensors with a stride of 1024 (`A[i*1024] + B[i*1024]`). Both perform the exact same number of floating-point operations.
question: Why does Version B run 30x slower?
details:
  realistic_solution: You destroyed memory coalescing. GPUs do not fetch individual bytes from HBM; they fetch massive contiguous blocks called cache lines (typically 32 or 128 bytes at a time). In Version A, when thread 0 requests `A[0]`, the GPU pulls a 128-byte block into SRAM, meaning the next 31 threads get their data for 'free' from the ultra-fast cache. In Version B, thread 0 requests `A[0]`, pulling 128 bytes. But thread 1 requests `A[1024]`, which is in a completely different cache line. The GPU must issue a brand new fetch to HBM for every single thread. You are forcing the memory bus to transfer 128 bytes to utilize only 4 bytes, wasting 97% of your bandwidth.
  common_mistake: |
    **The Pitfall:** Thinking of memory as an array of independent bytes.
    **The Rationale:** Ignoring the physical hardware of the memory bus and the existence of cache lines.
    **The Consequence:** Destroying memory coalescing, leading to 30x slower performance due to massive bandwidth waste.
  napkin_math: |
    * **HBM Cache Line:** 128 bytes fetched per memory transaction.
    * **Version A (Sequential):** Uses all 128 bytes (32 floats). Effective bandwidth = 100%.
    * **Version B (Strided):** Fetches 128 bytes to use exactly one 4-byte float.
    * **Bandwidth Utilization:** 4 / 128 = 0.031 (3.1%).
    * **Peak HBM Bandwidth:** 2,000 GB/s * 0.031 = 62 GB/s effective.
    * **Conclusion:** **The stride-1024 kernel wastes 97% of memory bandwidth fetching unused data, making it disastrously memory-bound.**
