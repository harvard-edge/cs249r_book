title: The OTA Update Budget
scenario: You are an ML systems engineer on an autonomous vehicle team. You need to deploy a 7-billion
  parameter model for a real-time guardrail system. The update is delivered over-the-air (OTA) and must
  fit within the vehicle's storage partition. To minimize data transmission costs and storage footprint,
  your team is debating between deploying the model in FP16 or INT8 precision. Calculate the required
  storage for the FP16 model's weights.
question: "How much storage is required for the 7B model's FP16 weights?"
details:
  realistic_solution: For inference, an FP16 model requires 2 bytes of storage for each parameter. An
    INT8 model would require 1 byte per parameter. Therefore, for a 7-billion parameter model, the FP16
    version will require 14 GB of storage for its weights, whereas the INT8 version would only require
    7 GB.
  common_mistake: The most common mistake is to confuse the memory requirements for inference with the
    much larger requirements for training. Engineers often mistakenly use the 16 bytes/parameter rule
    of thumb (for Adam optimizer states) instead of the 2 bytes/parameter for FP16 inference. Another
    frequent error is to use the size for INT8 (1 byte/parameter) instead of FP16, or to confuse bits
    and bytes.
  napkin_math: 1. **Identify Parameters:** The model has 7 billion (7B) parameters.
  options:
  - 7 GB
  - 112 GB
  - 14 GB
  - 1.75 GB
  correct_index: 2
