title: The OTA Update Budget
scenario: You are an ML systems engineer on an autonomous vehicle team. You need to deploy a 7-billion parameter model for a real-time guardrail system. The update is delivered over-the-air (OTA) and must fit within the vehicle's storage partition. To minimize data transmission costs and storage footprint, your team is debating between deploying the model in FP16 or INT8 precision.
question: How much storage is required for the 7B model's FP16 weights?
details:
  realistic_solution: For inference, an FP16 model requires 2 bytes of storage for each parameter. An INT8 model would require 1 byte per parameter. Therefore, for a 7-billion parameter model, the FP16 version will require 14 GB of storage for its weights, whereas the INT8 version would only require 7 GB.
  common_mistake: |
    **The Pitfall:** Confusing memory requirements for inference with training requirements.
    **The Rationale:** Engineers mistakenly use the 16 bytes/parameter rule of thumb (for Adam optimizer states) or confuse bits with bytes (using 1 byte for FP16).
    **The Consequence:** Incorrectly sizing the vehicle's storage partition, leading to OTA update failures or unnecessary hardware costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7 billion parameters.
       - FP16 uses 16 bits (2 bytes per parameter).
    2. **Calculations:**
       - Storage: 7,000,000,000 parameters * 2 bytes/parameter = 14,000,000,000 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound.** The model requires exactly 14 GB of storage.
  options:
  - 7 GB
  - 112 GB
  - 14 GB
  - 1.75 GB
  correct_index: 2
