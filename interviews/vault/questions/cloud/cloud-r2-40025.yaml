title: Ring AllReduce Bandwidth Formula
scenario: Ring AllReduce is the foundational collective communication algorithm for distributed training.
  In a ring of N GPUs, each with a bidirectional link of bandwidth B, state the formula for the total
  AllReduce time to synchronize a gradient buffer of size D. Explain why ring AllReduce achieves near-optimal
  bandwidth utilization.
question: "What is the ring AllReduce time formula for N GPUs, bandwidth B, and gradient size D, and why is it near bandwidth-optimal?"
details:
  realistic_solution: 'Ring AllReduce time = 2 × (N-1)/N × D/B. The algorithm has two phases: reduce-scatter
    and all-gather, each requiring (N-1) steps. In each step, every GPU sends D/N data to its neighbor.
    Total data sent per GPU per phase: (N-1) × D/N = (N-1)/N × D. Over both phases: 2 × (N-1)/N × D. At
    bandwidth B per direction: time = 2(N-1)D/(NB). As N grows large, (N-1)/N → 1, so time → 2D/B, independent
    of N. This is bandwidth-optimal because each link is fully utilized in every step — every GPU simultaneously
    sends and receives D/N bytes. No link is ever idle (unlike naive broadcast where N-1 GPUs wait). The
    2× factor comes from needing two complete passes: one to reduce (sum gradients) and one to gather
    (distribute the result).'
  common_mistake: Stating that AllReduce time is D/B, ignoring the (N-1)/N correction factor and the two-phase
    structure (reduce-scatter + all-gather). Another common mistake is confusing unidirectional and bidirectional
    bandwidth.
  napkin_math: '64 H100 GPUs, 400Gbps NIC each, 2GB gradient: T = 2 × 63/64 × 2GB / (400Gbps/8) = 2 ×
    0.984 × 2GB / 50GB/s = 78.8ms. Ideal (N→∞): 2 × 2GB / 50GB/s = 80ms. Ring achieves 98.4% of ideal
    bandwidth at N=64.'
