title: 'The Two-Node Scaling Cliff: Data Parallelism'
scenario: You are an ML engineer at a large AI lab, tasked with scaling the training of a 70-billion parameter Large Language Model using data parallelism. Your setup uses multi-node servers, each containing 8 H100 GPUs connected by NVLink. The nodes themselves are connected with a 400 Gbps InfiniBand network.
question: What bottleneck limits data-parallel scaling for the 70B model across 8×H100 nodes connected by 400 Gbps InfiniBand?
details:
  realistic_solution: The primary bottleneck is the dramatic difference in bandwidth between the intra-node NVLink fabric and the inter-node InfiniBand network. Data parallelism requires an all-reduce collective operation to synchronize gradients across all GPUs after each backward pass. Within a single node, this communication is ultra-fast over the all-to-all NVLink fabric. When scaling to two nodes, the all-reduce must send gradients across the significantly slower InfiniBand link, and the entire collective operation is only as fast as its slowest link. The calculation time per GPU is halved by using twice as many GPUs, but the communication time explodes, dominating the total time per step and yielding minimal end-to-end speedup.
  common_mistake: |
    **The Pitfall:** Blaming the PCIe bus or the CPU for the communication slowdown.
    **The Rationale:** Engineers assume data must travel through host memory before hitting the network.
    **The Consequence:** They mistakenly optimize host architecture instead of acknowledging the fundamental chasm between NVLink speeds and InfiniBand bandwidth.
  napkin_math: |
    - Gradient volume (70B model, FP16) = 70B * 2 bytes = 140GB.
    - A Ring All-Reduce transfers ~2x data: 280GB.
    - InfiniBand NDR link bandwidth: 50GB/s.
    - **Communication time = 280GB / 50GB/s = 5.6 seconds per step, completely bottlenecking the 2-second compute time.**
  options:
  - The PCIe Gen5 bus is saturated from copying gradients from GPU memory to system RAM for networking.
  - The HBM3 memory bandwidth on each GPU is insufficient to read out the 140GB of gradients quickly enough.
  - The InfiniBand network connecting the two nodes has far less bandwidth (50 GB/s) than the intra-node NVLink fabric (900 GB/s).
  - The CPU is overloaded coordinating the NCCL all-reduce operation across 16 GPUs instead of 8, causing a scheduling bottleneck.
  correct_index: 2
