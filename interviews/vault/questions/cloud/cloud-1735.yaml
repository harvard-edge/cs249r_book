title: Evaluating Split-Pool vs Chunked Prefill
scenario: 'Your team is serving a 70B parameter LLM on 8x A100 (80GB) instances. When long-context prompts
  (8k tokens) arrive concurrently with decode requests, the compute-heavy prefill phase starves the memory-bound
  decode phase, causing decode latencies to spike and violate the 50ms/token P99 SLO. One engineer proposes
  ''Split-Pool'' serving: routing all prefills to a dedicated compute-optimized GPU pool and transferring
  the KV cache over the datacenter network to a separate memory-optimized decode pool. Evaluate this design
  decision against using ''Chunked Prefill'' on a unified hardware pool.'
question: "Should the 70B service use split-pool serving or chunked prefill to protect 50ms/token decode latency, and why?"
details:
  realistic_solution: Chunked Prefill on a unified pool is usually preferable for moderate contexts. It
    splits the long prefill into smaller chunks (e.g., 512 tokens) and batches them with decode requests.
    This maintains high arithmetic intensity during the hybrid batch without the severe penalty of sending
    gigabytes of KV cache over ethernet.
  common_mistake: Candidates correctly identify that prefill is compute-bound (high arithmetic intensity)
    and decode is memory-bound (low arithmetic intensity), but fail to quantify the massive KV cache transfer
    overhead between pools, which can saturate network bandwidth and regress Time-To-First-Token (TTFT).
  napkin_math: For a 70B model (80 layers, 8 KV heads, 128 dim, FP16), the KV cache per token is 2(K,V)
    * 2B * 80 * 8 × 128 = 327.68 KB. An 8K token prompt generates ~2.6GB of KV cache. Transferring this
    over a standard 100 Gbps (12.5 GB/s) datacenter network takes ~215ms per request. At just 10 req/sec,
    this demands 26GB/s, instantly bottlenecking the NIC and degrading throughput.
