title: Fat-Tree Bisection Bandwidth for AllReduce
scenario: A 256-GPU cluster uses a 3-tier fat-tree topology with 400 Gbps InfiniBand links.
question: What is the ring AllReduce time for a 1 GB gradient on 256 GPUs over 400 Gbps links?
details:
  realistic_solution: Use the Ring AllReduce time formula: 2 * (N-1)/N * Data / Bandwidth. The calculation yields exactly 39.8ms.
  common_mistake: |
    **The Pitfall:** Assuming oversubscription uniformly degrades all traffic patterns linearly.
    **The Rationale:** Engineers calculate point-to-point degradation and apply it directly to collective operations.
    **The Consequence:** The team underestimates how severely AllReduce, an all-to-all pattern that saturates every link simultaneously, degrades under bisection bandwidth reductions.
  napkin_math: |
    1. Set constants: N = 256 GPUs, Data (D) = 1 GB, Bandwidth (BW) = 50 GB/s (400 Gbps).
    2. Apply Ring AllReduce formula: Time = 2 * (N-1)/N * D / BW.
    3. Substitute values: 2 * (255/256) * 1 GB / 50 GB/s.
    4. Calculate fraction: 255/256 ≈ 0.996.
    5. Calculate time: 2 * 0.996 / 50 = 1.992 / 50 = 0.03984 seconds.
    6. Conclude: The AllReduce time is **39.8 ms**.
