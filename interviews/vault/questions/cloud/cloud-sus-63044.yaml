title: 'TPU v5e vs MI300X: Serving Cost Per Token at Scale'
scenario: 'You are choosing infrastructure for serving a 7B LLM at 100B tokens/day. TPU v5e: $1.2/chip-hr,
  197 TFLOPS BF16, 819 GB/s, 16GB HBM. MI300X: $5.5/GPU-hr (cloud estimate), 1,307 TFLOPS FP16, 5,300
  GB/s, 192GB HBM. The 7B model (FP16, 14GB) requires memory bandwidth for decode. Calculate chips/GPUs
  needed, total cost per 1M tokens, and identify which platform wins on cost at this scale.'
details:
  realistic_solution: 'TPU v5e: 16GB per chip, 14GB model → only 2GB KV cache per chip → TP=2 minimum
    (8GB KV cache per pair). With TP=2: 2 chips share 14GB weights + 2×(16-7)GB = 18GB KV cache. Bandwidth
    for decode (TP=2): each chip loads half of weights: 7GB per forward pass. Per-chip BW: 819 GB/s →
    tokens per chip per second: 819/7 = 117 tok/sec → 2 chips: 234 tok/sec per TP=2 pair. For 100B tok/day:
    100B/86400 = 1,157,407 tok/sec needed. Pairs needed: 1,157,407/234 = 4,946 pairs = 9,892 chips. Cost:
    9,892 × ($1.2/hr) × (24 hr/day) = $284,889/day. Per 1M tokens: $284,889/(100,000) = $2.85/1M tokens.
    MI300X: 14GB model in 192GB, 178GB KV cache. Single card: 5,300/14 = 379 tok/sec. GPUs needed: 1,157,407/379
    = 3,054. Cost: 3,054 × $5.5 × 24 = $403,128/day. Per 1M tokens: $4.03/1M tokens. TPU v5e wins on cost
    by 29% despite needing 3.2× more chips. MI300X wins if you can negotiate better GPU pricing (<$4.5/GPU-hr)
    or if serving latency requires lower TP fan-out.'
  common_mistake: Ignoring that TPU v5e has only 16GB HBM — the 14GB model leaves only 2GB for KV cache.
    A single v5e cannot realistically serve the 7B model without tensor parallelism across multiple chips,
    fundamentally changing the compute topology.
  napkin_math: 'TPU v5e decode BW: 819 GB/s. Model: 14GB. Single chip: 819/14 = 58.5 tok/sec. KV constraint:
    2GB remaining → ~240 concurrent tokens at 8MB/req. With TP=2: 117 tok/sec per pair (halved per chip,
    doubled chips). MI300X: 5300/14 = 379 tok/sec, 178GB KV headroom. Scale: 1.157M tok/sec ÷ 379 = 3,054
    MI300X cards. Cost/day: 3,054×$5.5×24 = $403K. TPU: 9,892 chips ÷ 2 per pair = 4,946 pairs, 9,892
    chips × $1.2 × 24 = $284K/day. TPU is $2.85/1M vs MI300X $4.03/1M = 29% cheaper despite lower per-chip
    performance.'
