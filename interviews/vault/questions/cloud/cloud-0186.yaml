title: The 8 Petabyte Skew Problem
scenario: You are hired as the founding Principal Engineer for the ML Platform team at a self-driving car company that is scaling its fleet from 100 to 1,000 vehicles. Each vehicle generates ~8 TB of raw sensor data daily. The current 'log-file-to-training' pipeline is brittle, and worse, models retrained on new data are underperforming in the field, indicating significant training-serving skew between the C++ in-vehicle stack and the Python cloud training stack.
question: How would you redesign the log-to-training pipeline to handle 8 TB/day per vehicle and eliminate C++/Python training-serving skew?
details:
  realistic_solution: 'The correct approach involves tackling the root causes: the dual-codebase problem and the unmanageable data volume. A robust architecture would involve deploying edge compute to extract features directly on the vehicle using the C++ stack, writing only the intermediate features (not raw data) back to the cloud. This solves both the 8 PB/day physics problem and guarantees feature parity by unifying the code paths.'
  common_mistake: |
    **The Pitfall:** Throwing generic tools like feature stores or bigger network pipes at the problem.
    **The Rationale:** Engineers rely on standard enterprise ML patterns without calculating the physical bounds of 8 PB of data.
    **The Consequence:** Building an impossible-to-scale pipeline that fails to fix the underlying C++/Python logic divergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 vehicles.
    - 8 TB/day per vehicle.

    **Calculations:**
    - Total Data Volume: 1000 * 8 TB/day = 8 PB/day.

    **Conclusion & Interpretation:**
    - **Result: 8 PB/day (I/O-Bound)**. Moving 8 PB/day over standard networks is physically impractical, mandating edge compute and localized feature extraction.
