title: 'MoE FLOP Efficiency: Why Sparse Models Train Faster'
scenario: A dense 175B model requires 3.5 × 10^23 FLOP to train (Chinchilla scaling). An MoE model with 1.6T total parameters but 175B active per token achieves similar quality.
question: How many training FLOP does the 1.6T MoE use relative to the dense 175B model, and what FLOP savings should you expect?
details:
  realistic_solution: 'The key MoE insight: FLOP per token ∝ active parameters, not total parameters. Dense 175B: FLOP per token (forward + backward) = 6 × 175B = 1.05 TFLOP. MoE with 175B active: FLOP per token ≈ 6 × 175B = 1.05 TFLOP (same active FLOPS). Training FLOP for same number of tokens: identical! But the MoE model achieves better quality for the same FLOP because it has 1.6T total parameters — more knowledge capacity (more experts store more specialized patterns) while paying the same compute cost per token. Equivalently: to match the dense 175B model''s quality, the MoE model needs fewer tokens/FLOP because the extra parameters provide more capacity. Empirically, MoE achieves the same quality with 2-4× fewer training FLOP. So the MoE uses ~0.87-1.75 × 10^23 FLOP for the same quality. The tradeoff: more memory (all parameters stored) and more communication (All-to-All) for fewer FLOP.'
  common_mistake: |
    **The Pitfall:** Computing FLOP requirements based on total parameters (1.6T) instead of active parameters (175B).
    **The Rationale:** In standard dense models, FLOPs scale with total parameters. Candidates forget that MoE only routes tokens to top-k experts.
    **The Consequence:** Overestimating the compute budget for MoE training by an order of magnitude.
  napkin_math: |
    - Dense 175B FLOP per token (forward + backward): 6 * 175B = 1.05 TFLOP.
    - MoE 1.6T (175B active) FLOP per token: 6 * 175B = 1.05 TFLOP (identical active compute).
    - Dense 175B total training FLOPs: 3.5 × 10^23 FLOP.
    - MoE reaches the same quality in 2-4x fewer tokens due to higher total parameter capacity.
    - **Total MoE FLOPs: (3.5 × 10^23) / 2 to 4 = 0.875 × 10^23 to 1.75 × 10^23 FLOP, yielding 2x-4x compute savings.**
