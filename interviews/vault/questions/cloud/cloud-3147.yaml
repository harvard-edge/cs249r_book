title: FlashDecoding for Long-Context Decode
scenario: During autoregressive decoding of a 70B model on H100, each step attends
  to the full KV cache. At context length 32K with 80 layers, 8 GQA KV heads, head_dim=128,
  standard FlashAttention processes KV sequentially within one thread block per head.
  FlashDecoding parallelizes across the KV sequence. Analyze the speedup.
question: How much speedup should FlashDecoding provide at 32K context, and why does
  splitting the KV sequence across blocks help?
details:
  realistic_solution: 'Decode attention: Q is 1 token, K/V are 32K tokens. FLOPs per
    head: 4 x 1 x 32K x 128 = 16.8M FLOPs. IO: read K (32K x 128 x 2B = 8.4MB) + V (8.4MB)
    + Q (256B) = 16.8MB. AI = 16.8M / 16.8M = 1.0 FLOP/byte — deeply memory-bound (ridge
    = 295). Standard FA: 1 block per head = 8 blocks for 132 SMs. Only 6% occupancy.
    FlashDecoding: split 32K KV into 256-token chunks, each processed by a separate
    block: 32K/256 = 128 blocks per head x 8 heads = 1024 blocks. 100% occupancy.
    Need a reduction to combine partial softmax results. Reduction cost: 128 x 128
    x 2B x 8 = 256KB at 3.35TB/s = 0.1us. Speedup: ~8-16x from parallelism, bringing
    decode attention from ~500us to ~40us.'
  common_mistake: Not recognizing that decode attention is memory-bound (1 query token
    against 32K KV tokens), so FlashAttention's compute-bound optimization provides
    less benefit. FlashDecoding addresses this by splitting the KV dimension across
    multiple thread blocks.
  napkin_math: 'Standard: 8 blocks / 132 SMs = 6% occupancy. Standard FA achieves poor memory bandwidth utilization, taking ~500us. FlashDecoding: 1024 blocks
    = 100% occupancy. IO-bound: 16MB x 8 heads / 3.35 TB/s = 38us. With 128x parallelism
    within each head, it saturates bandwidth and approaches ~40us.'
