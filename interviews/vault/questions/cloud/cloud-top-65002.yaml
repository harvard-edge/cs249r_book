title: Chiplet Yield Model and Cost per Compute Die
scenario: A fab offers N5 (5nm) compute dies at $0.10/mm² defect density. Your monolithic design is 600mm²
  (H100-class). A chiplet alternative uses 6x100mm² dies. Calculate the yield difference and cost crossover.
question: "For the 600 mm² monolithic die versus six 100 mm² chiplets, what are the yield and cost differences, and where is the crossover?"
details:
  realistic_solution: 'Use Murphy''s yield model: Y = (1 - e^(-D0*A) / (D0*A))^2. At D0=0.1 defects/cm²,
    600mm²=6cm²: Y_mono ≈ (1-e^(-0.6)/0.6)^2 ≈ 0.49. For 100mm²=1cm²: Y_small = (1-e^(-0.1)/0.1)^2 ≈ 0.90.
    Effective chiplet yield = 0.90^6 = 0.53 (needing all 6), plus assembly yield ~0.99 per die = 0.99^6
    = 0.94 → net 0.50. But chiplet approach allows binning: one bad die scraps only 1/6 vs whole chip.
    With bin selling, chiplet cost advantage grows.'
  common_mistake: Using a linear yield model. Engineers divide the defect density by area and assume yield
    scales proportionally. The Poisson/Murphy yield model shows yield degrades super-linearly with die
    area because a single defect anywhere on the die causes full die loss.
  napkin_math: 'Monolithic: 600mm² at $0.10/mm² = $60 wafer cost, yield 49% → $122 per good die. Chiplet
    (6x100mm²): $10 each, yield 90% → $11.11 per good die, $66.67 for 6. Assembly overhead $5–15 per package
    → total $72–82. Chiplet saves ~33–40% at scale.'
