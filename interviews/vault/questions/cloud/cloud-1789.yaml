title: Monolithic vs. Chiplet Accelerator Evaluation
scenario: A new monolithic AI accelerator design requires 840 mm² of silicon. Defect density models estimate a yield of 25%. An alternative design splits the architecture into four 220 mm² chiplets, each with an 85% yield, connected via a silicon interposer. The interposer introduces a 20ns latency penalty for cross-chiplet memory accesses and requires an additional 40W of power per package.
question: Considering 25% monolithic yield, 85% chiplet yield, 20 ns interposer latency, and 40 W overhead, which design should go to mass production for training a 500B LLM?
details:
  realistic_solution: Recommend the chiplet approach. Known Good Dies (KGD) can be tested before packaging, decoupling the yield of individual chiplets from the final package yield. Even ignoring KGD, the probability of 4 good chiplets (0.85^4 = 52%) is double the monolithic yield (25%). Furthermore, 40W is a minor overhead in a typical 500W+ TDP envelope, and 20ns latency is easily hidden by the massive parallelism and pipelining of bulk matrix multiplications in LLM training.
  common_mistake: |
    **The Pitfall:** Overestimating the impact of the 20ns interconnect latency on highly pipelined training workloads.
    **The Rationale:** Candidates focus on raw clock latency and fail to understand that bulk matrix multiplications in LLM training can easily hide this latency, nor do they comprehend how exponentially worse defect density affects dies near the reticle limit.
    **The Consequence:** Rejecting a highly manufacturable architecture in pursuit of theoretical single-die perfection that is economically unviable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Monolithic Yield: 25%.
    - Chiplet Yield: 85% per chiplet (4 chiplets total).
    - Overheads: 40W power, 20ns latency per package.

    **Calculations:**
    - Chiplet Array Yield (KGD ignored): 0.85^4 ≈ 52.2%.
    - Yield Ratio: 52.2% / 25% > 2x improvement.

    **Conclusion & Interpretation:**
    - **Result: 52.2% Yield (Architectural Yield Optimization).** The chiplet design more than doubles the effective yield, offsetting the minor power and latency overheads (which are hidden by bulk pipelining).
