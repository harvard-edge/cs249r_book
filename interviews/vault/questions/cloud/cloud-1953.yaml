title: Scaling DLRM Static Inference Caching
scenario: You are designing an ad-ranking system for 50 million daily active users (DAUs). Dynamic inference using an advanced DLRM model takes 120ms per user request, violating the strict 30ms SLA. A single A10G GPU can process 5,000 users/sec in offline batch mode. You decide to pre-compute recommendations and store them in Redis.
question: How long will 8 A10G GPUs take to refresh recommendations for 50M users, and how much raw Redis memory stores top-50 64-bit IDs per user?
details:
  realistic_solution: Execute a scheduled batch job over the 8-GPU cluster to generate recommendations offline, and push the results to Redis. This transforms a 120ms ML inference bottleneck into a <5ms O(1) database lookup, easily satisfying the 30ms SLA while utilizing ~20GB of cache memory.
  common_mistake: |
    **The Pitfall:** Attempting to heavily optimize the dynamic inference path (e.g., pruning, quantization).
    **The Rationale:** Engineers often default to making the ML model faster rather than fundamentally changing the serving architecture.
    **The Consequence:** Wasting months of engineering effort trying to squeeze 120ms down to 30ms, when offline batching solves the problem perfectly with minimal cache overhead.
  napkin_math: |
    - **Cluster Throughput**: 8 GPUs × 5,000 users/sec/GPU = 40,000 users/sec.
    - **Compute Time**: 50,000,000 DAU / 40,000 users/sec = 1,250 seconds.
    - **Time in Minutes**: 1,250 / 60 ≈ **20.8 minutes**.
    - **Storage per User**: 50 items/user × 8 bytes/item = 400 bytes/user.
    - **Total Raw Memory**: 50,000,000 users × 400 bytes/user = 20,000,000,000 bytes = **20 GB**.
