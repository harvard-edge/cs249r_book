title: The Structured Pruning Recovery Budget
scenario: You structurally prune 30% of attention heads and 25% of FFN intermediate dimensions from a 13B LLM, reducing it to ~9B effective parameters. Perplexity increases from 6.2 to 8.1. You fine-tune on 10B tokens and recover to 6.8 — but your target is 6.4 or better. Your manager asks whether more fine-tuning data will close the gap, or whether you pruned too aggressively.
question: How do you determine if more data will close the gap or if you pruned too much, and how do you systematically set the ratio?
details:
  realistic_solution: 'Use a scaling-law-guided approach. Plot the fine-tuning recovery curve: perplexity vs. fine-tuning tokens at the current pruning ratio (30% heads, 25% FFN). If the curve is still decreasing meaningfully at 10B tokens, more data will help — the model has capacity to recover but hasn''t converged. If the curve has plateaued (perplexity flat from 8B to 10B tokens), you''ve hit the capacity floor of the pruned architecture and no amount of data will reach 6.4. To set the pruning ratio systematically: (1) Prune at multiple ratios (10%, 20%, 30%, 40%) and measure immediate perplexity degradation. (2) Fine-tune each for a fixed budget (e.g., 2B tokens) and measure recovery. (3) Plot the Pareto frontier of pruning ratio vs. recovered perplexity. (4) Interpolate to find the maximum pruning ratio that achieves your 6.4 target. Critical insight: the relationship between pruning ratio and recoverable accuracy is NOT linear — there''s typically a ''cliff'' beyond which recovery is impossible regardless of data. For LLMs, this cliff is usually around 40-50% structured pruning for attention heads and 30-40% for FFN dimensions.'
  common_mistake: |
    **The Pitfall:** Throwing more data at the problem without diagnostic analysis.
    **The Rationale:** Engineers often assume that more fine-tuning will always help, or conversely guess that they pruned too much, without a principled framework.
    **The Consequence:** Wasting hundreds of GPU-hours on blind fine-tuning runs that fail to recover accuracy because the model's structural capacity has been fundamentally broken.
  napkin_math: |
    * Fine-tuning cost per data point: 6 × 9B parameters × D tokens.
    * At 10B tokens: 6 × 9 × 10^9 × 10 × 10^9 = 5.4 × 10^{20} FLOPs.
    * On H100 at 40% MFU (396 TFLOPS): 5.4 × 10^{20} / 3.96 × 10^{14} ≈ 1.36 × 10^6 s ≈ 378 GPU-hours.
    * Cost of one blind 10B token run: ~$756.
    * Running a 4-point Pareto sweep (10%, 20%, 30%, 40%) at 2B tokens each: 4 × 75 GPU-hours = 300 GPU-hours.
    * **Conclusion: The 4-point diagnostic sweep ($600) is cheaper than one blind fine-tuning run ($756) and provides a definitive answer.**
