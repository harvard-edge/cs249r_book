title: The Structured Pruning Recovery Budget
scenario: You structurally prune 30% of attention heads and 25% of FFN intermediate dimensions from a
  13B LLM, reducing it to ~9B effective parameters. Perplexity increases from 6.2 to 8.1. You fine-tune
  on 10B tokens and recover to 6.8 — but your target is 6.4 or better. Your manager asks whether more
  fine-tuning data will close the gap, or whether you pruned too aggressively. How do you determine which
  is the case, and what is the systematic way to set the pruning ratio for a given accuracy target?
details:
  realistic_solution: 'Use a scaling-law-guided approach. Plot the fine-tuning recovery curve: perplexity
    vs. fine-tuning tokens at the current pruning ratio (30% heads, 25% FFN). If the curve is still decreasing
    meaningfully at 10B tokens, more data will help — the model has capacity to recover but hasn''t converged.
    If the curve has plateaued (perplexity flat from 8B to 10B tokens), you''ve hit the capacity floor
    of the pruned architecture and no amount of data will reach 6.4. To set the pruning ratio systematically:
    (1) Prune at multiple ratios (10%, 20%, 30%, 40%) and measure immediate perplexity degradation. (2)
    Fine-tune each for a fixed budget (e.g., 2B tokens) and measure recovery. (3) Plot the Pareto frontier
    of pruning ratio vs. recovered perplexity. (4) Interpolate to find the maximum pruning ratio that
    achieves your 6.4 target. Critical insight: the relationship between pruning ratio and recoverable
    accuracy is NOT linear — there''s typically a ''cliff'' beyond which recovery is impossible regardless
    of data. For LLMs, this cliff is usually around 40-50% structured pruning for attention heads and
    30-40% for FFN dimensions.'
  common_mistake: 'Throwing more data at the problem without diagnostic analysis. ''We just need to fine-tune
    longer.'' Or conversely: ''We pruned too much — try 15% instead.'' Both are guessing without a principled
    framework.'
  napkin_math: 'Fine-tuning cost per data point: $6 \times 9\text{B} \times D$ FLOPs for the pruned model.
    At 10B tokens: $6 \times 9 \times 10^9 \times 10 \times 10^9 = 5.4 \times 10^{20}$ FLOPs. On H100
    at 40% MFU (396 TFLOPS): $5.4 \times 10^{20} / (3.96 \times 10^{14}) \approx 1.36 \times 10^6$s $\approx$
    378 GPU-hours $\approx$ $756. Running the 4-point Pareto sweep (10%, 20%, 30%, 40%) at 2B tokens each:
    4 × 75 GPU-hours = 300 GPU-hours = $600. The diagnostic sweep ($600) costs less than one more blind
    fine-tuning run ($756) and gives you the answer definitively.'
