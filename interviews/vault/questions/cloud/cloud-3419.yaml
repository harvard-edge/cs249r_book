title: Scaling a 500B Parameter LLM on AMD MI300X with Hybrid Parallelism
scenario: You are leading the deployment of a 500B parameter LLM for production inference on a cluster of AMD MI300X accelerators. Each MI300X unit features 192 GB HBM3 memory, 1,307 TFLOPS of FP16 sparse compute, and 5.3 TB/s HBM3 bandwidth.
question: How would you combine tensor and pipeline parallelism across MI300X GPUs for a 500B LLM to balance memory, communication, and latency?
details:
  realistic_solution: "A hybrid parallelism strategy, combining tensor parallelism (e.g., Megatron-LM style column and row parallelism) for individual layers that exceed single-GPU memory, with pipeline parallelism for distributing multiple layers across different GPUs. Techniques like activation checkpointing or recomputation would be crucial to manage activation memory. Efficient communication would involve using asynchronous non-blocking collectives (e.g., `all_reduce`, `all_gather`) and strategically overlapping communication with computation cycles to fully utilize the 5.3 TB/s HBM3 bandwidth. The MI300X's 1,307 TFLOPS FP16 sparse ensures compute is not the bottleneck when communication is well-optimized."
  common_mistake: |
    **The Pitfall:** Neglecting the substantial memory footprint of activations and optimizer states or sequentializing communication.
    **The Rationale:** Focusing purely on fitting the static model weights into memory and ignoring dynamic memory or the critical need to overlap communication with computation.
    **The Consequence:** Out-of-memory errors during execution, or massive underutilization of the GPU's 1,307 TFLOPS compute capability due to idle waiting.
  napkin_math: |
    *   **Model Weights (FP16):** 500B parameters × 2 bytes/parameter = 1 TB.
    *   **GPU Memory:** 192 GB per MI300X.
    *   **Minimum GPUs for Weights:** 1 TB / 192 GB $\approx$ 5.2 GPUs. At least 6 GPUs are needed just for parameters, and more when including the KV cache and activations.
    *   **Communication Bottleneck:** Transferring a 10 GB tensor at 5.3 TB/s (theoretical max) = 10 GB / 5300 GB/s $\approx$ 1.9 ms. Inter-GPU links (e.g., Infinity Fabric) are often slower (hundreds of GB/s), meaning large sequential transfers become a major bottleneck if not overlapped.
