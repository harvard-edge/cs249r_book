title: Backward Pass Communication in TP
scenario: In the forward pass of Megatron's fused column→row design, an AllReduce follows the row-parallel
  layer. What communication operations occur in the backward pass through the same two layers? Derive
  the total communication volume per block for a full training step.
details:
  realistic_solution: 'Forward: Identity (replicate input) → Column-parallel GEMM → Row-parallel GEMM
    → AllReduce (sum partials). Backward (reverse order): AllReduce backward = Identity (gradients pass
    through unchanged). Row-parallel backward: local gradient GEMM, but need AllReduce on input gradient
    to get ∂L/∂x_row. Column-parallel backward: local gradient GEMM, but the gradient of the Identity
    (input replication) is AllReduce (sum gradients from all ranks). So the backward pass has: 1 AllReduce
    for gradient through the row-parallel input, and 1 AllReduce for gradient through the column-parallel
    input. Total per block per training step: Forward: 1 AllReduce (after row-parallel). Backward: 1 AllReduce
    (through column-parallel input). For a block with both Attention and MLP: 4 AllReduces total (2 forward
    + 2 backward). Communication volume per AllReduce = 2 × (P-1)/P × batch × seq × hidden × 2B.'
  common_mistake: Assuming backward communication mirrors forward exactly. The backward pass through an
    AllReduce in the forward becomes a no-op (identity) in backward, while the forward identity (input
    replication) becomes an AllReduce in backward.
  napkin_math: '70B model, hidden=8192, TP=8, batch×seq=8192: per AllReduce = 2 × 7/8 × 8192 × 8192 ×
    2B = 230 MB. 4 per block × 80 blocks = 320 AllReduces × 230 MB = 72 GB per step.'
