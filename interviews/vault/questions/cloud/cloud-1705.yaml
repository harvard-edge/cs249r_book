title: 4-Bit PTQ Memory Footprint for LLMs
scenario: You are tasked with deploying a 30 billion parameter LLM for an internal summarization API on
  cloud instances equipped with single 24GB VRAM GPUs (e.g., NVIDIA L4). The model is currently in FP16
  and requires ~60GB of memory just for weights, making it impossible to serve on a single GPU. You decide
  to apply 4-bit Post-Training Quantization (PTQ) via AWQ with a group size of 128. Calculate the expected
  memory footprint of the quantized weights (including metadata) and determine if the 24GB GPU will have
  enough VRAM left over to handle a batch size of 8 with a context window of 2048 tokens, assuming the
  KV cache requires 2.5GB and the CUDA context takes 1.5GB.
details:
  realistic_solution: Quantizing a 30B parameter model to 4-bit reduces the core weight memory to roughly
    15GB. The group-wise quantization metadata (typically FP16 scales and 4-bit zero points per group
    of 128) adds ~600MB. This brings total weight memory to ~15.6GB. Adding the KV cache (2.5GB) and CUDA
    context (1.5GB) yields a total VRAM usage of 19.6GB, comfortably fitting on a single 24GB GPU.
  common_mistake: Candidates often simply divide the FP16 memory by 4 without accounting for the memory
    overhead of quantization metadata (scales and zero-points) per group, or they forget to subtract the
    KV cache and CUDA context from the total VRAM when verifying feasibility.
  napkin_math: 'FP16 weight memory: 30B * 2 bytes = 60GB. 4-bit base memory: 30B * 0.5 bytes = 15GB. Metadata
    overhead (group size 128, 16-bit scale + 4-bit zero = 20 bits or 2.5 bytes per group): (30B / 128)
    * 2.5 bytes ≈ 0.585GB. Total weights = 15.6GB. Total used VRAM = 15.6GB (weights) + 2.5GB (KV cache)
    + 1.5GB (Context) = 19.6GB. Available VRAM = 24GB. 19.6GB < 24GB (Fits!).'
