title: 4-Bit PTQ Memory Footprint for LLMs
scenario: "You are tasked with deploying a 30 billion parameter LLM for an internal summarization API on cloud instances equipped with single 24GB VRAM GPUs. The model is currently in FP16 and requires ~60GB of memory just for weights. You decide to apply 4-bit Post-Training Quantization (PTQ) via AWQ with a group size of 128. Assume the KV cache requires 2.5GB and the CUDA context takes 1.5GB."
question: "What is the 4-bit AWQ weight footprint including metadata, and will the 30B model fit on a 24GB GPU?"
details:
  realistic_solution: "Quantizing a 30B parameter model to 4-bit reduces the core weight memory to roughly 15GB. The group-wise quantization metadata (typically FP16 scales and 4-bit zero points per group of 128) adds ~600MB. This brings total weight memory to ~15.6GB. Adding the KV cache (2.5GB) and CUDA context (1.5GB) yields a total VRAM usage of 19.6GB, comfortably fitting on a single 24GB GPU."
  common_mistake: |
    **The Pitfall:** Simply dividing the FP16 memory by 4 without accounting for quantization metadata.
    **The Rationale:** Group-wise quantization requires storing scales and zero-points for every group, which adds non-trivial memory overhead.
    **The Consequence:** Inaccurate capacity planning; forgetting the metadata, KV cache, or CUDA context leads to unexpected Out-Of-Memory (OOM) errors in production.
  napkin_math: |
    *   **4-bit Base Weights:** 30B parameters × 0.5 bytes = 15 GB
    *   **Metadata Overhead:** Group size 128. Scale (FP16 = 16 bits) + Zero (4 bits) = 20 bits = 2.5 bytes per group.
    *   **Total Metadata:** (30B / 128) × 2.5 bytes ≈ 0.585 GB
    *   **Total Weights:** 15 GB + 0.585 GB = 15.585 GB
    *   **Total VRAM Usage:** 15.585 GB (weights) + 2.5 GB (KV cache) + 1.5 GB (Context) = 19.585 GB
    *   **Result:** **19.585 GB < 24 GB, so it comfortably fits.**
