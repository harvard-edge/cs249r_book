title: The Silent Training Regression
scenario: Your weekly retraining pipeline has been running smoothly for 6 months. This week's model passes
  all unit tests and achieves normal validation accuracy. However, after deployment, customer support
  tickets spike 40%. Investigation reveals the model is giving nonsensical recommendations for a specific
  user segment (premium tier). No code changed. Walk through your root-cause analysis methodology.
question: "How would you diagnose the 40% support-ticket spike after a weekly retrain when aggregate validation accuracy looked normal?"
details:
  realistic_solution: 'Step-by-step diagnosis: (1) Segment the validation metrics by user tier — discover
    that premium-tier accuracy dropped 30% while free-tier improved 2%, masking the regression in aggregate.
    (2) Check training data: premium-tier training examples dropped 80% this week due to a data pipeline
    filter change. (3) Root cause: an upstream team added a GDPR compliance filter that over-aggressively
    filtered premium users'' interaction history. (4) The structural fix: implement disaggregated evaluation
    — evaluation must report per-segment metrics, not just aggregate. Add minimum sample count thresholds
    per segment. This is the ML equivalent of testing not just ''average latency'' but also P99.'
  common_mistake: Looking at aggregate metrics and concluding 'the model is fine.' Aggregate validation
    accuracy can hide catastrophic failures in specific segments — this is the 'accuracy paradox.'
  napkin_math: '1M users: 50K premium (5%), 950K free (95%). If premium accuracy drops 30% but free improves
    2%: aggregate change = 0.05 × (-30%) + 0.95 × (+2%) = -1.5% + 1.9% = +0.4%. The aggregate metric improved,
    hiding a 30% regression for 5% of users.'
