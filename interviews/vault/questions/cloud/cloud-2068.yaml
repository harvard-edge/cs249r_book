title: The Silent Training Regression
scenario: Your weekly retraining pipeline has been running smoothly for 6 months. This week's model passes all unit tests and achieves normal validation accuracy. However, after deployment, customer support tickets spike 40%. Investigation reveals the model is giving nonsensical recommendations for a specific user segment (premium tier). No code changed.
question: How would you diagnose the 40% support-ticket spike after a weekly retrain when aggregate validation accuracy looked normal?
details:
  realistic_solution: 'Step-by-step diagnosis: (1) Segment the validation metrics by user tier — discover that premium-tier accuracy dropped 30% while free-tier improved 2%, masking the regression in aggregate. (2) Check training data: premium-tier training examples dropped 80% this week due to a data pipeline filter change. (3) Root cause: an upstream team added a GDPR compliance filter that over-aggressively filtered premium users'' interaction history. (4) The structural fix: implement disaggregated evaluation — evaluation must report per-segment metrics, not just aggregate. Add minimum sample count thresholds per segment. This is the ML equivalent of testing not just ''average latency'' but also P99.'
  common_mistake: |
    **The Pitfall:** Looking at aggregate metrics and concluding 'the model is fine.'
    **The Rationale:** Aggregate validation accuracy can hide catastrophic failures in specific minority segments — this is the 'accuracy paradox.'
    **The Consequence:** Shipping broken models to high-value users, leading to churn and reputational damage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total users: 1M. Premium tier: 50K (5%). Free tier: 950K (95%).
       - Premium segment accuracy drops 30%.
       - Free segment accuracy improves 2%.
    2. **Calculations:**
       - Premium accuracy impact on aggregate: 0.05 × -30% = -1.5%.
       - Free accuracy impact on aggregate: 0.95 × +2% = +1.9%.
       - Net aggregate change: -1.5% + 1.9% = +0.4%.
    3. **Conclusion & Interpretation:** **Aggregate metric improved by 0.4%, hiding a catastrophic 30% drop for a critical 5% subpopulation. Data-Representation-Bound.**
