title: The Collapsed Dynamic Range
scenario: 'You are the lead ML Systems Engineer at a company launching a new product powered by a 70B
  parameter LLM. The business mandate is aggressive: cut inference costs by 50% to make the unit economics
  viable. A junior engineer on your team takes the initiative and applies standard post-training quantization
  (PTQ), converting the entire model from FP16 to INT8. The good news: they hit the cost target by fitting
  the model onto a single H100 instead of two. The bad news: the model''s accuracy on its summarization
  benchmark (ROUGE) plummets by 30 points, rendering it useless. The team believes INT8 is a lost cause
  for LLMs. Your director asks you to formulate the recovery plan. Design a principled, multi-step strategy
  to successfully deploy this model with INT8 while preserving accuracy. What are your first three architectural
  proposals, and how do you justify them quantitatively?'
details:
  realistic_solution: The catastrophic accuracy drop isn't due to the inherent lossiness of INT8, but
    from 'dynamic range collapse' caused by outlier activation values. Transformer architectures, particularly
    in attention and normalization layers, can produce a few massive activation values in a sea of small
    ones. Naive per-tensor quantization scales the entire tensor to accommodate these outliers, effectively
    zeroing out all the smaller, information-rich values. The solution is not to abandon INT8, but to
    apply it surgically.
  common_mistake: The most common mistake is a lack of precision, either in diagnosis or solution. Junior
    engineers might suggest 'use a better calibration dataset,' which is necessary but insufficient. A
    senior engineer might say 'some layers are more sensitive,' but fail to propose a systematic way to
    identify and treat them. The biggest error is treating the model as a monolith and quantization as
    an all-or-nothing toggle, rather than a targeted architectural tool.
  napkin_math: First, let's prove the business case is real. A 70B model in FP16 requires 70B × 2 bytes
    = 140 GB of memory for weights alone. An NVIDIA H100 has 80 GB of HBM3. Therefore, you need at least
    two H100s and tensor parallelism to serve it. A 70B model in INT8 is 70B × 1 byte = 70 GB. This fits
    on a *single* H100. This immediately cuts the primary GPU cost per replica by 50%, validating the
    initial goal.
