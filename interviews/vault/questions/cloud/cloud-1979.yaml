title: Unstructured vs Structured Sparsity Slowdown on A100
scenario: Your team compresses a large language model using unstructured magnitude pruning to 75% sparsity, expecting roughly a 4x speedup on NVIDIA A100 GPUs. However, after deploying the pruned model using standard PyTorch, profiling reveals a 15% slowdown in inference latency compared to the original dense model.
question: Why did 75% unstructured pruning slow inference on A100s, and what sparsity mechanism is needed for acceleration?
details:
  realistic_solution: The A100 Tensor Cores require '2:4 structured sparsity' to accelerate operations. In this format, exactly 2 out of every 4 elements in a contiguous block must be zero. The model must be pruned to fit this 2:4 pattern and represented in a compressed format, allowing the A100 to skip the zeros predictably and achieve up to a 2x throughput increase for math operations.
  common_mistake: |
    **The Pitfall:** Assuming any zero values automatically skip compute and save time on GPUs.
    **The Rationale:** Candidates ignore that irregular sparsity causes poor memory coalescing, cache misses, and branch divergence.
    **The Consequence:** Deploying pruned models that are actually slower than their dense counterparts.
  napkin_math: |
    1. **Unstructured (75%):** Irregular memory reads + branch divergence > compute savings = **Slowdown**.
    2. **Structured 2:4 (50%):** Load 50% compressed weights, Tensor Cores naturally skip zeros = **~2x speedup**.
