title: Kernel Bypass Networking Overhead Analysis for ML Training
scenario: 'A training engineer compares TCP sockets vs RDMA (kernel bypass) for gradient synchronization
  on an H100 cluster. TCP path: 40μs latency, 25GB/s bandwidth (kernel copies). RDMA path: 3μs latency,
  25GB/s bandwidth (zero-copy). For 100MB gradient chunks, analyze when the latency advantage of RDMA
  matters and when it doesn''t.'
question: "For 100 MB gradient chunks over 25 GB/s links, when does RDMA’s 3 μs latency matter versus TCP’s 40 μs latency?"
details:
  realistic_solution: 'Transfer time = latency + size/bandwidth. For 100MB gradients: TCP: 40μs + 100MB/25GB/s
    = 40μs + 4000μs = 4040μs. RDMA: 3μs + 100MB/25GB/s = 3μs + 4000μs = 4003μs. RDMA wins by only 0.9%
    for 100MB! RDMA latency advantage matters when: message size << bandwidth×latency crossover. Crossover
    = BW×(latency_TCP - latency_RDMA) = 25GB/s × 37μs = 925KB. For messages <925KB, RDMA latency advantage
    is >1% of total transfer. For LLM collective operations: small control messages (ACKs, completions,
    <1KB) benefit enormously (13×). Large gradient tensors (>10MB): bandwidth dominates, RDMA saves <1%.'
  common_mistake: Concluding RDMA always wins because of lower latency; not recognizing that for large
    transfers, bandwidth-dominated time dwarfs the latency difference.
  napkin_math: 'Crossover size: BW×Δlatency = 25GB/s × (40-3)μs = 25×10^9 × 37×10^-6 = 925KB. For 100MB:
    bandwidth term = 4000μs >> 37μs latency diff. RDMA savings = 37/4040 = 0.9%. For 1KB messages: TCP=40μs,
    RDMA=3μs → 13× faster. RDMA matters for high-message-rate, small-message workloads like parameter
    server fine-grained updates.'
