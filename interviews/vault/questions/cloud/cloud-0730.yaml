validation_issues:
- The Napkin Math implies that '1% PFC-induced pause adds 27 ms'. The derivation of this 27ms is not shown,
  making it difficult to verify its accuracy or understand the context (e.g., what amount of data transfer
  is affected by this 1% pause?).
- The calculation '137 GB / 50 GB/s ≈ 2.74s at line rate' for AllGather is correct but the overall communication
  time of AllGather is typically also affected by latency and the number of steps, which are not explicitly
  included in this 'line rate' calculation.
