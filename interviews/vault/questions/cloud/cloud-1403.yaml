title: Imperative Scheduling Topology Constraints
scenario: >
  An LLM training team submits an imperative scheduling request for 64 GPUs, strictly specifying an exact topology of 8 physical nodes with 8 GPUs each to maximize intra-node NVLink bandwidth. The cluster telemetry reports 100 idle GPUs currently distributed evenly across 25 nodes (4 idle GPUs per node).
question: >
  Why does the 64-GPU job stay Pending even though 100 GPUs are idle?
details:
  realistic_solution: |
    Imperative schedulers directly allocate exactly what is requested without altering the workload's specified shape. Because the user explicitly required 8 GPUs per node, and the maximum available on any single node is 4, zero nodes qualify. The job is blocked by cluster fragmentation. To resolve this, the team must analyze cluster fragmentation and either drain nodes to free up full 8-GPU blocks, or refactor the job to use an elastic/declarative approach (e.g., PyTorch Elastic) capable of dynamically running on 4-GPU topologies.
  common_mistake: |
    **The Pitfall:** Assuming the scheduler will automatically partition the 64-GPU request across 16 partially idle nodes (4 GPUs each).
    **The Rationale:** Candidates conflate elastic/declarative workloads with imperative scheduling, failing to realize imperative managers rigidly enforce exact topology constraints.
    **The Consequence:** The job remains permanently blocked, and the cluster wastes 100 idle GPUs due to severe fragmentation.
  napkin_math: |
    1. Job Request: 8 nodes, strictly requiring 8 GPUs per node (64 total).
    2. Cluster Availability: 25 nodes, each with exactly 4 idle GPUs (100 total).
    3. Scheduler Check: Does any node have ≥ 8 idle GPUs? No (4 < 8).
    4. **Result:** **Because 0 nodes meet the 8-GPU constraint, the allocation fails despite the cluster having 100 > 64 total idle GPUs.**
