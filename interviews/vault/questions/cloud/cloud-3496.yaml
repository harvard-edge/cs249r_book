title: Optimizing Distributed ML Training on Kubernetes with NVIDIA A100s
scenario: 'Your team is deploying a large-scale, distributed machine learning model for training on a Kubernetes cluster with NVIDIA GPUs. You consistently observe suboptimal GPU utilization across the cluster, leading to extended training cycles and increased operational costs. The model requires specific GPU topology awareness and substantial memory per replica.'
question: 'How would you diagnose low GPU utilization and implement Kubernetes/NVIDIA scheduling strategies for topology-aware distributed training?'
details:
  realistic_solution: 'A robust solution requires implementing Topology-Aware Scheduling via the NVIDIA Device Plugin and specialized batch schedulers like Volcano. Ensure `TopologyManager` is configured on worker nodes to co-locate CPU, NUMA, and PCIe/NVLink boundaries. Apply `podTopologySpreadConstraints` to ensure pods map accurately to NVLink domains. Replace default K8s schedulers with Volcano to enable strict Gang Scheduling, ensuring multi-node jobs start simultaneously and avoid partial-allocation starvation.'
  common_mistake: |
    **The Pitfall:** Overlooking the intricacies of Kubernetes GPU scheduling and relying on generic resource requests.
    **The Rationale:** Developers often simply request `nvidia.com/gpu` without considering node affinity, pod topology spread constraints, or the underlying device plugin configuration.
    **The Consequence:** This leads to fragmented allocations across suboptimal nodes, resulting in severe network bottlenecks and GPUs idling during distributed All-Reduce phases.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40 GB of model parameters between 8 GPUs every 10 seconds.
    - NVLink intra-node bandwidth: ~600 GB/s. Network inter-node bandwidth: ~50 GB/s.

    **Calculations:**
    - Required Bandwidth: 40 GB / 10 seconds = 4 GB/s per GPU.
    - 4 GB/s is trivially handled by NVLink (600 GB/s) but can overwhelm standard network links if pods are fragmented across nodes.

    **Conclusion & Interpretation:**
    - **Result: Fragmented Network Allocation (Network-Bandwidth-Bound)**. Network-Bound due to scheduling. The interconnect bandwidth is completely wasted by fragmented Kubernetes pod topologies.
