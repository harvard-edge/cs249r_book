title: Optimizing Distributed ML Training on Kubernetes with NVIDIA A100s
scenario: Your team is deploying a large-scale, distributed machine learning model for training on a Kubernetes cluster with NVIDIA A100 GPUs. You consistently observe suboptimal GPU utilization across the cluster, leading to extended training cycles and increased operational costs. The model requires specific GPU topology awareness and substantial memory per replica.
question: How would you diagnose low A100 utilization and implement Kubernetes/NVIDIA scheduling strategies for topology-aware distributed training?
details:
  realistic_solution: 'A realistic solution involves a comprehensive approach: 1. **Validate NVIDIA Device Plugin:** Ensure the official NVIDIA device plugin for Kubernetes is correctly installed and functioning on all worker nodes, exposing the full `nvidia.com/gpu` resource and optionally enabling features like `TopologyManager` for optimal placement. 2. **Refined Resource Requests/Limits:** Define precise GPU resource requests and limits (e.g., `nvidia.com/gpu: 1`) along with adequate CPU and memory requests/limits that correspond to the model''s needs. For memory-intensive models, explicitly consider the 80 GB HBM2e per A100. 3. **Node Affinity and Topology Spreading:** Implement `nodeSelector` or `nodeAffinity` to target nodes with A100 GPUs. Utilize `podTopologySpreadConstraints` to ensure even distribution of pods or co-location of multi-GPU components on nodes with optimal NVLink/PCIe configurations. 4. **Job Schedulers for ML:** Employ advanced schedulers like Volcano or `kube-batch` that support gang scheduling, queueing, and preemption, which are critical for distributed ML jobs to ensure all necessary resources are available before a job starts. 5. **GPU Monitoring:** Integrate GPU-specific monitoring (e.g., Prometheus with `DCGM Exporter`) to collect real-time metrics on GPU utilization, memory consumption, temperature, and power, allowing for data-driven optimization and bottleneck identification.'
  common_mistake: |
    **The Pitfall:** Overlooking the intricacies of Kubernetes GPU scheduling and relying on generic resource requests.
    **The Rationale:** Developers often simply request `nvidia.com/gpu` without considering node affinity, pod topology spread constraints, or the underlying device plugin configuration.
    **The Consequence:** This leads to fragmented allocations, pods spread across suboptimal nodes, or insufficient memory/compute being exposed, resulting in GPUs being idle despite being "allocated".
  napkin_math: |
    *   **Data Transfer:** 40 GB of model parameters and gradients between 8 A100 GPUs every 10 seconds.
    *   **Per-GPU Transfer (Ring/Tree):** Total data movement is roughly $\frac{N-1}{N} \times 40 \text{ GB}$ or simply ~40 GB per GPU in parallel.
    *   **Required Bandwidth:** $40 \text{ GB} / 10 \text{ seconds} =$ **$4 \text{ GB/s}$**.
    *   **Comparison:** This is significantly less than the 2.0 TB/s HBM2e bandwidth or 600 GB/s NVLink bandwidth.
    *   **Conclusion:** The memory bandwidth or intra-node interconnect is **unlikely to be the bottleneck**, pointing instead to scheduling, topology, or inter-node network issues.
