title: KV Cache Pre-allocation OOM on A100 GPU
scenario: An inference service runs a 13B parameter model (26 GB FP16 weights) on
  a single A100 GPU (80 GB HBM2e, 2.0 TB/s bandwidth, 312 TFLOPS FP16). The system
  is configured for a maximum sequence length of 4096 tokens and uses standard contiguous
  KV cache allocation. The service receives 24 concurrent requests, where each request
  processes a 50-token prompt and generates exactly 50 tokens. The system rejects
  a 25th request due to an Out-Of-Memory (OOM) error. Given that the maximum KV cache
  footprint for 4096 tokens is exactly 2 GB per request, explain why the system OOMs
  when the active context is only 100 tokens per request.
question: Why does the service OOM on the 25th request when each active request uses
  only 100 tokens of context?
details:
  realistic_solution: Because standard contiguous KV cache allocation requires memory
    to be laid out sequentially to ensure efficient memory access during attention
    computations, the system must pre-allocate the maximum possible context length
    (4096 tokens) for every incoming request. This prevents the need to continuously
    move or reallocate memory blocks as the sequence grows. Therefore, each of the
    24 requests reserves 2 GB immediately. This pre-allocation consumes 48 GB of the
    80 GB HBM2e capacity, which, alongside the 26 GB model weights, exhausts the GPU
    memory and blocks the 25th request.
  common_mistake: Candidates often assume that KV cache memory is allocated dynamically
    token-by-token as text is generated, leading them to incorrectly attribute the
    OOM to memory fragmentation, context switching, or activation memory spikes instead
    of the pre-allocation requirements.
  napkin_math: Max KV cache per request = 2 GB. Pre-allocated for 24 requests = 24
    * 2 GB = 48 GB. Total memory committed = 48 GB (KV cache) + 26 GB (weights) =
    74 GB. The remaining 6 GB is consumed by PyTorch context and workspaces, leaving
    no 2 GB block for a 25th request. Actual KV memory used per request = 2 GB * (100
    / 4096) = 0.0488 GB. Total utilized KV cache = 24 * 0.0488 GB = 1.17 GB. Total
    wasted memory = 48 GB - 1.17 GB = 46.83 GB.
