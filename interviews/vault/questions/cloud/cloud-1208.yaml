title: Evaluating Edge vs Centralized Processing for Telemetry Data
scenario: Your team needs to train a model on 5 PB of raw telemetry data generated across 50 regional data centers. The current proposal is to transfer all 5 PB to a central cloud region (us-east-1) to leverage an H100 cluster, taking advantage of the centralized data center's low Power Usage Effectiveness (PUE = 1.1).
question: Should you centralize 5 PB in us-east-1 for H100 training or use federated regional training, and why?
details:
  realistic_solution: 'Justify the federated approach using the Energy-Movement Invariant. The energy required to move 5 PB over the internet drastically outweighs any PUE efficiency gains from centralized compute. Recommend moving the compute to the data (federated training) and only transferring the relatively tiny gradient updates.'
  common_mistake: |
    **The Pitfall:** Assuming centralized cloud PUE efficiency guarantees lower overall energy consumption.
    **The Rationale:** Candidates focus entirely on datacenter economies of scale, ignoring the massive energy overhead of moving petabytes of data across the Wide Area Network (WAN).
    **The Consequence:** Proposing an architecture that is significantly more expensive and carbon-intensive.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data volume: 5 PB (5,000,000 GB).
       - WAN transfer energy cost: ~0.01 kWh/GB.
       - Compute budget: 10,000 GPU hours.
       - Hardware TDP: 700W (0.7 kW).
    2. **Calculations:**
       - WAN Energy: 5,000,000 GB * 0.01 kWh/GB = 50,000 kWh.
       - Compute Energy: 10,000 hrs * 0.7 kW = 7,000 kWh.
       - Ratio: 50,000 / 7,000 = ~7.1x.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound**. Moving the data consumes 7x more energy than the actual training compute. The Energy-Movement Invariant dictates that federated training (moving compute to data) is drastically more efficient.
