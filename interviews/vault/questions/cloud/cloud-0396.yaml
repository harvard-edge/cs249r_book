title: The A/B Test Bill
scenario: 'Your team has developed a new, larger recommendation model. To serve 50% of production traffic at the required P99 latency, your existing baseline model requires a fleet of 2 H100 GPUs. The new challenger model is more complex and requires 3 H100 GPUs to serve the other 50% of traffic at the same SLO.'
question: What is the total infrastructure cost for a one-week 50/50 experiment, assuming an H100 cloud instance costs $4.50/hour?
details:
  realistic_solution: "The total cost of the experiment is the sum of the costs for running both the baseline and challenger fleets for the entire duration of the test. The baseline fleet requires 2 H100s and the challenger fleet requires 3 H100s."
  common_mistake: |
    **The Pitfall:** Miscalculating experiment costs by only counting the incremental cost of the challenger fleet.
    **The Rationale:** Engineers ignore that the baseline fleet must also continue running to serve the other 50% of production traffic during the A/B test.
    **The Consequence:** The team drastically underestimates the total cloud infrastructure bill for the experiment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline: 2 H100 GPUs.
       - Challenger: 3 H100 GPUs.
       - Cost: $4.50/hour/GPU. Duration: 1 week (168 hours).
    2. **Calculations:**
       - Total concurrent GPUs = 2 (Baseline) + 3 (Challenger) = 5 GPUs.
       - Total compute hours = 5 GPUs * 168 hours = 840 GPU-hours.
       - Total Cost = 840 hours * $4.50 = $3,780.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound Experimentation.** The true cost is $3,780 because 50/50 routing requires running *both* fleets simultaneously.
  options:
  - '$540 (Trap: 5 GPUs * 24 hours * $4.50 = 1 day only)'
  - '$2,268 (Trap: 3 GPUs * 168 hours * $4.50 = Challenger only)'
  - '$3,024 (Trap: 4 GPUs * 168 hours * $4.50 = Assumes same size fleets)'
  - $3,780 (Correct)
  correct_index: 3
status: published
