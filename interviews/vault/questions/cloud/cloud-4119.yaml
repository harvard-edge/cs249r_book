title: GPU Memory Oversubscription Dangers
scenario: A scheduler places two inference models on the same GPU: Model A (30 GB) and Model B (35 GB). The GPU has 80 GB HBM3. Both models fit individually, but during peak traffic both receive concurrent requests.
question: "If two 30 GB and 35 GB models share one 80 GB GPU and see concurrent peak traffic, what happens and why?"
details:
  realistic_solution: 'Model weights: 30 + 35 = 65 GB. But each model also needs CUDA context overhead (~500 MB per context), KV cache (~1 GB per model at modest sequence lengths), and activation memory (~500 MB per model). Combined: 65 + 4 = 69 GB — still fits in 80 GB, but with only 11 GB headroom. During peak traffic, batch sizes increase and KV cache grows. Model A at batch_size=64 with 4096-token sequences pushes KV cache to 4 GB. Total peak: 65 (weights) + 8 (KV cache) + 3 (contexts + activations) = 76 GB. Approaching 80 GB, CUDA''s memory allocator starts failing. Result: OOM error crashes both models, as there is no isolation between CUDA contexts sharing a GPU. Fix: use MIG to partition the GPU.'
  common_mistake: |
    **The Pitfall:** Assuming that if weights sum to less than total VRAM ($65\text{GB} < 80\text{GB}$), everything is fine.
    **The Rationale:** Candidates forget that inference requires significant dynamic memory for activations, KV caching, and CUDA context overhead.
    **The Consequence:** Both models violently crash with an OOM error during peak traffic because there is no hardware memory isolation between standard CUDA contexts.
  napkin_math: |
    - **Weights:** $30 + 35 = 65\text{ GB}$.
    - **Peak KV cache (both models combined):** $\approx 8\text{ GB}$ (at batch=64, seq=4096).
    - **Contexts + Activations:** $\approx 3\text{ GB}$.
    - **Total Peak:** $65 + 8 + 3 = 76\text{ GB}$.
    - **Result:** $76\text{ GB} / 80\text{ GB} = 95\%$ utilization. **The GPU is one burst away from an OOM crash that takes down both models.**
