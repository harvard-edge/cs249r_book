title: Single-Batch Token Latency
scenario: A 30B parameter LLM is served in FP16 on a single H100 SXM (3.35 TB/s memory
  bandwidth) at batch size 1.
question: Calculate the absolute minimum, memory-bandwidth-bound latency to generate
  a single token.
details:
  realistic_solution: At FP16, a 30B parameter model requires 60 GB of memory. To
    generate one token at batch size 1, the entire model weight matrix must be streamed
    from HBM once. The latency is 60 GB / 3.35 TB/s = 17.9 ms.
  common_mistake: Calculating FLOP latency instead of memory bandwidth latency, missing
    that batch size 1 is strictly memory bound.
  napkin_math: 60 GB / 3350 GB/s = 0.0179 s
