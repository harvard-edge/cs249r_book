title: Evaluating Multi-Stream Overlap for Inference Pipelines
scenario: You are architecting a computer vision inference service on an NVIDIA A100 (PCIe Gen4 x16, 32
  GB/s). For a given batch size, Host-to-Device (H2D) transfer takes 8ms, kernel execution takes 12ms,
  and Device-to-Host (D2H) transfer takes 2ms. A colleague proposes using a 3-stream overlapping architecture
  instead of a single default stream to maximize throughput. Evaluate the theoretical throughput improvement
  of the multi-stream approach and identify the critical hardware or software constraints that might prevent
  reaching this theoretical maximum in production.
details:
  realistic_solution: The multi-stream approach overlaps H2D, compute, and D2H. In steady state, the pipeline
    throughput is bottlenecked by the longest stage (12ms compute) rather than the sum (22ms). This increases
    theoretical throughput from ~45 to ~83 batches/sec. However, to evaluate trade-offs, you must justify
    the 3x VRAM overhead for buffering, ensure pinned memory (page-locked) is used for async transfers,
    and verify the GPU has independent H2D/D2H copy engines (which A100 does) to prevent bus contention.
  common_mistake: Assuming linear speedups without accounting for PCIe duplex limits, hardware copy engines,
    or the increased VRAM overhead required to hold multiple batches simultaneously in memory.
  napkin_math: 'Single stream: 8ms + 12ms + 2ms = 22ms per batch. Throughput = 1000 / 22 = 45.45 iter/sec.
    Overlapped streams: bottlenecked by max(8, 12, 2) = 12ms. Throughput = 1000 / 12 = 83.33 iter/sec.
    Speedup = 83.33 / 45.45 = ~1.83x.'
