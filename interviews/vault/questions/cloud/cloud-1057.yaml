title: Evaluating Multi-Stream Overlap for Inference Pipelines
scenario: You are architecting a computer vision inference service on an NVIDIA A100 (PCIe Gen4 x16, 32 GB/s). For a given batch size, Host-to-Device (H2D) transfer takes 8ms, kernel execution takes 12ms, and Device-to-Host (D2H) transfer takes 2ms. A colleague proposes using a 3-stream overlapping architecture.
question: What throughput speedup can a 3-stream H2D/compute/D2H pipeline deliver, and what constraints could prevent reaching it?
details:
  realistic_solution: The multi-stream approach overlaps H2D, compute, and D2H. In steady state, the pipeline throughput is bottlenecked by the longest stage (12ms compute) rather than the sum (22ms). This increases theoretical throughput from ~45 to ~83 batches/sec. However, to evaluate trade-offs, you must justify the 3x VRAM overhead for buffering, ensure pinned memory (page-locked) is used for async transfers, and verify the GPU has independent H2D/D2H copy engines (which A100 does) to prevent bus contention.
  common_mistake: |
    **The Pitfall:** Assuming linear speedups without accounting for hardware constraints.
    **The Rationale:** Candidates sum the times or fail to account for PCIe duplex limits and the need for multiple buffers in memory.
    **The Consequence:** Expected throughput gains fail to materialize in production due to bus contention or VRAM exhaustion.
  napkin_math: |
    - **Single Stream Time:** 8ms + 12ms + 2ms = 22ms per batch.
    - **Single Stream Throughput:** 1000 / 22 = 45.45 batches/sec.
    - **Overlapped Pipeline Bottleneck:** max(8, 12, 2) = 12ms per batch.
    - **Overlapped Throughput:** 1000 / 12 = 83.33 batches/sec.
    - **Final Result:** **Speedup = 83.33 / 45.45 = ~1.83x.**
