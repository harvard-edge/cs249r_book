title: 'Real-time LLM Inference: Accelerator Selection for Performance and Cost'
scenario: 'Your team is tasked with deploying a new, large transformer-based language model for real-time inference, which requires high throughput and low latency. The model has a significant memory footprint and benefits from mixed-precision (BF16) computation. Specifically, you need to assess the suitability of a Google TPU v5e instance compared to a cluster of high-end GPUs or a fleet of general-purpose CPUs to meet a target inference latency of 100ms per query and handle 10,000 QPS at peak load.'
question: 'What serving architecture and accelerator choice would meet 100 ms latency and 10,000 QPS for the BF16 transformer on Google Cloud?'
details:
  realistic_solution: 'A realistic solution would involve a phased approach. Initially, the candidate would estimate the computational (BF16 operations) and memory (model parameters, activations) requirements per inference. They would then evaluate the Google TPU v5e''s 197 TFLOPS BF16 and 1.6 TB/s HBM bandwidth against these requirements, considering optimal batching strategies to maximize utilization while staying within the 100ms latency budget. They should compare this to a GPU-based solution, highlighting the TPU''s BF16 efficiency for specific tensor operations and potential cost advantages for continuous, high-volume inference. The system architecture should include a load balancer, queues for asynchronous inference, and a strategy for dynamic scaling based on QPS, potentially using a combination of accelerators or optimized model serving frameworks (e.g., Triton Inference Server).'
  common_mistake: |
    **The Pitfall:** Overemphasizing peak FLOPS without adequately considering memory bandwidth and its impact on model loading and intermediate activations.
    **The Rationale:** Candidates often fixate on raw compute metrics rather than the memory wall that typically bottlenecks LLM inference.
    **The Consequence:** Recommending an accelerator that theoretically has enough FLOPS but will stall waiting for memory accesses, failing to meet the latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required Throughput: 10,000 QPS.
    - Per-query Latency SLA: 100ms.
    - TPU v5e HBM bandwidth: 1.6 TB/s.

    **Calculations:**
    - If a single TPU v5e achieves 500 QPS at 100ms latency: 10,000 QPS / 500 QPS/TPU = 20 TPU v5e units needed.
    - Assuming total data moved is 10 GB per inference and latency is 100ms, the required bandwidth is 10 GB / 0.1s = 100 GB/s.
    - 100 GB/s < 1.6 TB/s.

    **Conclusion & Interpretation:**
    - **Result: Compute/Scale Bound** (This is well within the 1.6 TB/s HBM bandwidth of the TPU v5e, suggesting memory bandwidth won't be the primary bottleneck).
