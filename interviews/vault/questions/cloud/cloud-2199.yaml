title: The Right Profiler for the Job
scenario: Your training job on 8 H100s is 40% slower than expected. You need to diagnose the bottleneck.
  You have access to PyTorch Profiler, NVIDIA Nsight Systems (nsys), and NVIDIA Nsight Compute (ncu).
  In what order do you use these tools, and what does each one tell you that the others cannot?
details:
  realistic_solution: 'Use a top-down profiling methodology: (1) PyTorch Profiler first — it gives you
    the application-level view: which Python operations dominate wall-clock time, where data loading stalls
    exist, and how much time is spent in backward vs forward vs optimizer steps. Cost: seconds to set
    up, minimal overhead. (2) Nsight Systems (nsys) second — once you know which phase is slow, nsys gives
    you the GPU timeline: kernel launch gaps, NCCL communication bubbles, host-device synchronization
    stalls, and CPU-GPU overlap. This is where you discover that 35% of time is spent in AllReduce waiting,
    or that kernel launches are serialized due to missing CUDA stream overlap. (3) Nsight Compute (ncu)
    last and only on the specific kernels identified by nsys — ncu gives you per-kernel roofline position,
    occupancy, memory throughput, and warp stall reasons. It has 10-100x overhead so you profile individual
    kernels, not entire training steps.'
  common_mistake: Jumping straight to Nsight Compute to profile individual kernels. This is like using
    a microscope before a map — you'll see exquisite detail of the wrong thing.
  napkin_math: 'Profiling overhead: PyTorch Profiler ~2-5% overhead (run on full training). nsys ~5-10%
    overhead (run for 10-50 iterations). ncu ~10-100x slowdown (run on 1 iteration, 1-3 target kernels).
    If your training step takes 500ms, ncu on one kernel takes 5-50 seconds per step — profiling 1000
    steps would take hours.'
