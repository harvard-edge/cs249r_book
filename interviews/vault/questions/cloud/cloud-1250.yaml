title: Diagnosing NCCL Timeout in Fail-Stop Node Crashes
scenario: During a 1,024-GPU (128x 8-H100 nodes) distributed training run, training suddenly hangs without
  completing the iteration. Node 42 experienced a catastrophic kernel panic and powered off (a classic
  fail-stop failure). However, the NCCL communication ring took 30 minutes to time out and trigger a cluster-wide
  restart, wasting nearly $2,000 of compute. Diagnose why the fail-stop failure wasn't immediately detected
  by the collective communication backend and how to configure the fabric to minimize the detection latency.
details:
  realistic_solution: Enable PyTorch's `TORCH_NCCL_ASYNC_ERROR_HANDLING=1` and reduce the `NCCL_TIMEOUT`
    environment variable to an aggressive value (e.g., 60 seconds). Additionally, leverage out-of-band
    InfiniBand link-down signals for immediate fabric-level fail-stop detection.
  common_mistake: Assuming default TCP keepalives or orchestrator (e.g., Kubernetes) node-level heartbeats
    are fast enough, leaving stranded PyTorch processes waiting indefinitely for an unresponsive NCCL
    rank.
  napkin_math: 'Cluster cost: 128 nodes * $30/hr = $3,840/hr ($1.06/sec). 30-min timeout = $1,920 wasted
    compute per failure. 60-second timeout = $64 wasted compute. If MTBF is 24 hours, this configuration
    alone saves ~$670,000 annually in avoided idle time.'
