title: 'MLOps Lifecycle: Implement Model Registry Versioning Strategy for Multi-Region
  LLM'
scenario: 'Design and quantify the model registry architecture for a production LLM
  API serving 3 regions (US, EU, APAC) from H100 clusters. Each region runs 8 H100
  nodes with a 13B model (14GB FP16). Requirements: artifact deduplication across
  regions, version rollback < 5 minutes, and storage cost minimization. Specify the
  registry schema and replication strategy.'
question: How would you design the model registry schema and cross-region replication
  strategy to deduplicate 13B artifacts and allow <5-minute rollback?
details:
  realistic_solution: 'Registry: central S3 bucket (us-east-1) with model artifacts.
    Artifact hash-addressed (SHA256 of weights file). Regions pull on deploy → pre-warm
    regional caches. 14GB model at S3: $0.023/GB = $0.32/month per copy. Cross-region
    replication: 14GB × 2 replicas × $0.02/GB transfer = $0.56 per deploy. Total:
    $0.32 + $0.56 = $0.88/deploy vs. $0.96 for 3 copies. Rollback: update ''current''
    pointer in registry → serving pods reload → <5min with pre-warm. Schema: {model_id,
    version, sha256, s3_uri, deploy_time, region_status}.'
  common_mistake: Storing full 14GB model checkpoints per region without deduplication,
    paying 3× storage costs when regions can share the same artifact via CDN or shared
    S3.
  napkin_math: '14GB model × 3 regions: 42GB storage at $0.023/GB = $0.97/month. With
    central + replication: 14GB × 1 = $0.32/month storage + replication cost $0.56
    one-time. Monthly savings: $0.65. At 30 deploys/month: $0.56×30 = $16.80 transfer
    vs. $0.32 storage. Transfer dominates. Better: regional S3 replicas, no transfer
    per-deploy. Cost: $0.97/month storage. Rollback: serving pods watch registry,
    pull new pointer → model reload 3-5min.'
