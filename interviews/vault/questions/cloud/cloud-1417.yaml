title: Continuous vs Dynamic Batching Trade-offs
scenario: 'You are evaluating the architecture of an LLM inference server for an 8B parameter model deployed
  on NVIDIA A100 (80GB) GPUs. The service has a strict Service Level Objective (SLO): Time-to-First-Token
  (TTFT) < 200ms and Time-Between-Tokens (TBT) < 50ms at a concurrency of 100 requests/sec. The current
  implementation uses traditional dynamic batching (request-level scheduling) but experiences severe TTFT
  degradation (up to 3 seconds) during peak traffic due to highly variable input and output sequence lengths.
  Evaluate the architectural trade-offs between Request-Level Scheduling (Dynamic Batching) and Iteration-Level
  Scheduling (Continuous Batching) to solve this bottleneck and justify your selection.'
details:
  realistic_solution: Implement Iteration-Level Scheduling (Continuous Batching). This architecture allows
    the inference server to evict finished requests and schedule new requests at each token generation
    step (iteration), rather than waiting for all requests in a batch to complete. This resolves head-of-line
    blocking, decoupling the TTFT of new requests from the maximum generation length of currently executing
    requests.
  common_mistake: Recommending a drastic reduction in the maximum batch size to minimize latency, which
    destroys hardware utilization and leads to cascading queue buildup at high concurrency, or suggesting
    sequence padding which wastes memory and compute without solving the fundamental head-of-line blocking
    issue.
  napkin_math: 'Under dynamic batching, if a new request arrives right after a batch starts and the longest
    sequence in that batch is 100 tokens, it waits: 100 tokens * 40ms/token = 4,000ms (violating the 200ms
    TTFT SLO). With continuous batching, the scheduler admits the new request at the next token boundary,
    reducing the queue wait time to just 1 token step (40ms) + prefill execution time.'
