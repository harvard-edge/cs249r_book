title: VRAM Budgeting for 70B LLM on AMD MI300X
scenario: You are tasked with designing and deploying a 70-billion parameter Large
  Language Model (LLM) on an AMD MI300X accelerator, which features 192 GB of HBM3
  memory, 1,307 TFLOPS FP16 dense performance, and 5.3 TB/s memory bandwidth. Your
  goal is to understand the VRAM requirements for both potential fine-tuning (using
  AdamW optimizer) and high-throughput inference. For inference, you anticipate a
  maximum sequence length of 4096 tokens and a batch size of 8. The model weights
  are stored in FP16. Detail how you would account for the VRAM consumed by model
  weights, optimizer state, activations, and the KV-cache. Explain the challenges
  and considerations for fitting such a model within the MI300X's memory constraints
  for each component.
question: How would you account for MI300X VRAM used by FP16 weights, AdamW state,
  activations, and KV-cache for 70B training and batch-8 inference?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1)
    **Model Quantization:** Employing FP16 or even INT8/FP8 for weights where possible,
    especially for inference. 2) **Optimizer State Sharding/Offloading:** Utilizing
    techniques like ZeRO (Zero Redundancy Optimizer) or other distributed training
    strategies to shard optimizer states across multiple devices or offload them to
    CPU memory, as a 70B model with AdamW FP32 state will exceed 192GB. 3) **Gradient
    Checkpointing:** During training, recomputing activations on demand to reduce
    their memory footprint at the cost of increased computation. 4) **KV-Cache Optimization:**
    Implementing techniques like PagedAttention or optimizing attention mechanisms
    to manage KV-cache more efficiently. 5) **Profiling:** Rigorously profiling memory
    usage using AMD''s `rocprof` or similar tools to identify bottlenecks and validate
    calculations.'
  common_mistake: A common mistake is underestimating the VRAM impact of optimizer
    states (especially for complex optimizers like Adam which require per-parameter
    state, often in FP32) and the KV-cache, which grows significantly with longer
    sequence lengths and larger batch sizes. Additionally, overlooking the dynamic
    VRAM usage of activations, particularly during training or for models with very
    deep architectures, can lead to out-of-memory errors. Developers might also forget
    to factor in system overheads and temporary buffers used by frameworks.
  napkin_math: "Let's calculate the VRAM for a 70B LLM with FP16 weights on an AMD\
    \ MI300X:\n\n1.  **Model Weights (FP16):**\n    *   70 billion parameters * 2\
    \ bytes/parameter (FP16) = 140 GB\n\n2.  **Optimizer State (AdamW, FP32):**\n\
    \    *   AdamW typically requires 2 additional FP32 values per parameter (momentum\
    \ and variance).\n    *   70 billion parameters * 2 (states) * 4 bytes/parameter\
    \ (FP32) = 560 GB\n    *   *Observation:* This far exceeds the MI300X's 192 GB,\
    \ necessitating sharding or offloading for training.\n\n3.  **KV-Cache (Inference,\
    \ FP16, example for 80 transformer layers, 32 attention heads, 128 embedding dimension\
    \ per head, seq_len=4096, batch_size=8):**\n    *   KV-cache size per layer (for\
    \ K and V tensors): 2 * (batch_size * num_heads * seq_len * head_dim) * sizeof(FP16)\n\
    \    *   2 * (8 * 32 * 4096 * 128) * 2 bytes \approx 0.53 GB per layer\n    *   For\
    \ 80 layers: 80 * 0.53 GB \approx 42.4 GB\n\n4.  **Activations (Forward Pass, Example\
    \ with 80 layers, hidden_size=8192, seq_len=4096, batch_size=8, FP16):**\n   \
    \ *   Activations can be highly variable, but a simplified peak estimate might\
    \ be `batch_size * seq_len * hidden_size * num_layers * sizeof(FP16)`.\n    *\
    \   8 * 4096 * 8192 * 80 * 2 bytes \approx 40 GB (This is a very rough estimate and\
    \ can vary based on specific layer structures like feed-forward network sizes,\
    \ attention outputs, etc.)\n\n**Total Considerations:** Even for pure inference,\
    \ 140 GB (weights) + 42.4 GB (KV-cache) + ~40 GB (activations) can quickly push\
    \ beyond the 192 GB limit for larger batch sizes or sequence lengths if not carefully\
    \ managed."
