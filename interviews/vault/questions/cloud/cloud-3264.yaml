title: VRAM Budgeting for 70B LLM on AMD MI300X
scenario: You are deploying a 70-billion parameter LLM on an accelerator. Inference anticipates a max sequence length of 4096 tokens and a batch size of 8. Model weights are stored in FP16.
question: How would you account for VRAM used by FP16 weights, AdamW state, activations, and KV-cache for 70B training and batch-8 inference?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1) Employing FP16 or even INT8/FP8 for weights where possible. 2) Utilizing techniques like ZeRO to shard optimizer states across multiple devices or offload them to CPU memory, as a 70B model with AdamW FP32 state will exceed limits. 3) During training, recomputing activations on demand. 4) Implementing techniques like PagedAttention to manage KV-cache more efficiently. 5) Rigorously profiling memory usage using specialized tools.'
  common_mistake: |
    **The Pitfall:** Underestimating the VRAM impact of optimizer states and the dynamic KV-cache.
    **The Rationale:** Developers often focus solely on the size of the model weights and ignore the fact that complex optimizers like Adam require per-parameter FP32 states, and that KV-cache scales dynamically.
    **The Consequence:** Severe out-of-memory errors during training or inference, requiring painful architectural overhauls mid-project.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Weights (FP16): 70B * 2 bytes = 140 GB.
       - Optimizer State (AdamW, FP32): 70B * 2 states * 4 bytes = 560 GB.
       - KV-Cache shape: 80 layers, 32 heads, 128 dim, seq=4096, batch=8, FP16 (2 bytes).
    2. **Calculations:**
       - KV-Cache = 80 * 2 * (8 * 32 * 4096 * 128) * 2 bytes = 42.4 GB.
       - Activations (Forward Pass): Peak estimate roughly 40 GB.
       - Total memory = 140 GB + 560 GB + 42.4 GB + 40 GB = ~782.4 GB.
    3. **Conclusion & Interpretation:**
       - **Result: OOM Bound.** Total memory exceeds 192 GB without aggressive state management and optimization.
