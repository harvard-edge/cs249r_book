title: Optimizing Network-Bound LLM Training on AMD MI300X Cluster
scenario: You are deploying a 70B parameter LLM (FP16) on an AMD MI300X cluster (192 GB HBM3, 5.3 TB/s memory bandwidth, 1,307 TFLOPS sparse). Training throughput is hampered, and profiling indicates all-reduce gradient synchronization is the bottleneck. The effective inter-node network bandwidth is 100 GB/s per MI300X.
question: How would you diagnose and address all-reduce bottlenecks for a 70B FP16 LLM on MI300X with 100 GB/s effective inter-node bandwidth?
details:
  realistic_solution: 'Analyze the communication-computation ratio. Since the network transfer time massively exceeds the compute time, the workload is firmly network-bound. Address this through gradient compression (FP8 quantization), overlapping communication with computation, and parameter sharding (FSDP/ZeRO) to reduce the data volume transmitted per collective operation.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the theoretical peak local memory bandwidth (like HBM3) or raw FLOPS.
    **The Rationale:** The MI300X's immense compute and memory specs dominate the spec sheet, drawing attention away from the slower inter-node fabric.
    **The Consequence:** Attempting to optimize local compute kernels while the accelerator spends the majority of its time idling, starved for network data.
  napkin_math: |
    1. **Gradient Size:** $70 \times 10^9\text{ parameters} \times 2\text{ bytes/parameter (FP16)} = 140\text{ GB}$.
    2. **Minimum All-reduce Time ($T_{comm}$):** $140\text{ GB} / 100\text{ GB/s} = 1.4\text{ seconds}$.
    3. **Compute Time ($T_{compute}$):** Estimated at $500\text{ milliseconds} = 0.5\text{ seconds}$.
    4. **Communication-Computation Ratio:** $T_{comm} / T_{compute} = 1.4\text{s} / 0.5\text{s} = 2.8$.
    5. **Conclusion:** Because the ratio is significantly greater than 1, the system is severely **network-bound**. Communication optimization is strictly required.
