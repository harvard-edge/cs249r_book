title: Evaluating Sequential Storage Patterns for Distributed Training
scenario: Your team is training a ViT-L model on an 8-node H100 cluster (64 GPUs total) using a shared
  parallel file system (Lustre) backed by NVMe SSDs capable of 200 GB/s aggregate bandwidth. The training
  pipeline currently reads individual 500KB JPEG images from a flat directory of 500 million files. The
  GPUs are consistently starved for data (utilization < 40%), despite network metrics (NDR 400G InfiniBand)
  showing low utilization. Evaluate the storage access pattern and justify a systemic data layout change
  to resolve the pipeline stall.
details:
  realistic_solution: Repack the individual JPEGs into large, contiguous 1GB-2GB shard files (e.g., using
    WebDataset tar archives or TFRecords). This shifts the storage workload from metadata-heavy random
    IOPS to pure sequential IO, allowing the file system to operate at its peak sequential throughput
    and easily saturate the required GPU ingestion rate.
  common_mistake: Assuming the bottleneck is raw network bandwidth or CPU decoding speed, and attempting
    to add more data loading workers or compress the images further, without addressing the metadata/IOPS
    penalty of small random file reads.
  napkin_math: 'Demand: 64 GPUs * 500 imgs/sec/GPU = 32,000 imgs/sec. At 500KB/img, required bandwidth
    is ~16 GB/s. Reading individual files requires 32,000 file opens (metadata operations) per second.
    If the shared file system metadata server caps at 10,000 IOPS, max throughput hits a wall at 5 GB/s
    (10k * 500KB), starving the GPUs. Packing into 1GB shards (2,000 imgs/shard) reduces IOPS to just
    16 file opens/sec, easily unlocking the required 16 GB/s sequential throughput.'
