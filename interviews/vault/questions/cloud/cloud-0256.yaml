title: The 16x VRAM Multiplier for Training
scenario: You are planning the training run for a 70B parameter LLM using the Adam optimizer with full FP32 precision.
question: How much VRAM is required just to store the FP32 weights, gradients, and Adam optimizer states for a 70B-parameter LLM?
details:
  realistic_solution: 'For each parameter in the model, the training process needs to store four separate FP32 values: 1. The parameter (weight) itself (4 bytes). 2. The gradient for that parameter (4 bytes). 3. The Adam optimizer''s first moment estimate (momentum) (4 bytes). 4. The Adam optimizer''s second moment estimate (variance) (4 bytes).'
  common_mistake: |
    **The Pitfall:** Forgetting that the Adam optimizer stores two state variables per parameter.
    **The Rationale:** A candidate might only account for the parameters (4 bytes/param) or parameters plus gradients (8 bytes/param) based on inference experience.
    **The Consequence:** This leads to a significant underestimation of VRAM requirements, causing massive OOM errors and forcing unexpected cluster resizing.
  napkin_math: |
    1. **Assumptions & Constraints:** 70B parameters. FP32 precision (4 bytes/parameter). Adam optimizer stores master weights, momentum, and variance.
    2. **Calculations:** Weights = 70B × 4 bytes = 280 GB. Gradients = 70B × 4 bytes = 280 GB. Adam States (Momentum + Variance) = 70B × 4 bytes × 2 = 560 GB. Total = 280 + 280 + 560 = 1120 GB.
    3. **Conclusion & Interpretation:** **Result: 1120 GB total VRAM required. VRAM-Capacity-Bound.**
  options:
  - ~280 GB
  - ~560 GB
  - ~1120 GB
  - ~140 GB
  correct_index: 2
