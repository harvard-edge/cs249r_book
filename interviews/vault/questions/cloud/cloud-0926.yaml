title: Evaluating Topologies for MoE All-to-All
scenario: You are designing the network fabric for a 4096-GPU cluster (using 400Gbps NDR InfiniBand NICs) dedicated to training massive Mixture of Experts (MoE) models. You must choose between a non-blocking 2-tier Fat-Tree (Clos) and a standard 3D Torus topology.
question: "For 4096 GPUs running MoE All-to-All, should you choose a non-blocking Fat-Tree or a 3D Torus, and what bisection bandwidth drives the choice?"
details:
  realistic_solution: Calculate the exact bisection bandwidth for both topologies. Select the Fat-Tree because MoE's All-to-All collective requires massive global throughput, and the Fat-Tree provides significantly higher bisection bandwidth, avoiding the severe multi-hop congestion inherent in a Torus under global traffic patterns.
  common_mistake: |
    **The Pitfall:** Assuming high local link speeds in a 3D Torus automatically equate to high global performance.
    **The Rationale:** Failing to calculate bisection bandwidth and ignoring the multi-hop congestion inherent in Torus topologies.
    **The Consequence:** Severe network bottlenecks during MoE's critical global All-to-All communication phase.
  napkin_math: |
    * **Cluster Size (N):** 4096 GPUs. Links = 400 Gbps.
    * **Fat-Tree Bisection Bandwidth:** (N/2) * 400 Gbps = 2048 * 400 Gbps = 819.2 Tbps.
    * **3D Torus (16x16x16):** Bisection cuts 16x16 links in 2 directions. 2 * 16 * 16 = 512 links.
    * **Torus Bisection Bandwidth:** 512 * 400 Gbps = 204.8 Tbps.
    * **Conclusion:** **The Fat-Tree provides exactly 4x the bisection bandwidth of the 3D Torus, making it strictly superior for MoE All-to-All.**
