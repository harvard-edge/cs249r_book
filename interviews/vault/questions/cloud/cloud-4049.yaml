title: AllReduce Bandwidth Efficiency on NVLink vs RoCE
scenario: An 8-GPU H100 node uses NVLink at 900 GB/s bisection bandwidth for intra-node
  AllReduce and 400Gbps (50 GB/s) RoCE for inter-node. Calculate the AllReduce time
  for a 2GB gradient at each level and determine the crossover message size where
  NVLink's advantage diminishes relative to the \u03b1 (latency) overhead.
question: For a 2GB gradient, what are the intra-node NVLink and inter-node RoCE AllReduce
  times, and where is the latency crossover?
details:
  realistic_solution: 'Intra-node (8 GPUs, NVLink 900 GB/s): T_nvlink = 2 \u00d7 7/8 \u00d7
    2GB / 900GB/s = 3.89ms. Per-step overhead: 2\u00d77 steps \u00d7 1\u00b5s = 14\u00b5s. Total: 3.9ms.
    Inter-node (8 nodes, RoCE 50 GB/s): T_roce = 2 \u00d7 7/8 \u00d7 2GB / 50GB/s = 70ms. Per-step
    overhead: 2\u00d77 steps \u00d7 5\u00b5s = 70\u00b5s. Total: 70.07ms. NVLink is 18\u00d7 faster for 2GB
    messages (dominated by bandwidth ratio: 900/50 = 18\u00d7). Crossover where \u03b1 matters:
    when message size D satisfies 2(N-1)/N \u00d7 D/B \u2248 2(N-1) \u00d7 \u03b1. Solving for D: D \u2248
    N \u00d7 B \u00d7 \u03b1. NVLink: D = 8 \u00d7 900GB/s \u00d7 1\u00b5s = 7.2MB. RoCE: D = 8 \u00d7 50GB/s \u00d7 5\u00b5s =
    2MB. For messages < 7.2MB, NVLink AllReduce is latency-bound. For messages < 2MB,
    RoCE AllReduce is latency-bound. For small parameter server updates (<1MB), NVLink
    is ~5\u00d7 faster (latency ratio) rather than 18\u00d7 (bandwidth ratio).'
  common_mistake: Comparing only bandwidth and ignoring that NVLink and RoCE have
    different latency characteristics. NVLink \u03b1 \u2248 1\u00b5s (direct GPU-to-GPU), RoCE \u03b1
    \u2248 5\u00b5s (NIC + switch + NIC). For small messages, this 5\u00d7 latency difference dominates.
  napkin_math: 'NVLink \u03b1-dominated region: < 7.2MB. RoCE \u03b1-dominated region: < 2MB.
    For a 64KB gradient tensor: NVLink = 2\u00d77\u00d71\u00b5s + 2\u00d77/8\u00d764KB/900GB/s = 14\u00b5s + 0.12\u00b5s
    = 14.12\u00b5s. RoCE = 2\u00d77\u00d75\u00b5s + 2\u00d77/8\u00d764KB/50GB/s = 70\u00b5s + 2.24\u00b5s = 72.24\u00b5s. Ratio:
    72/14 \u2248 5\u00d7 (closer to latency ratio than bandwidth ratio).'
