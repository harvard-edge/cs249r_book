title: AllReduce Bandwidth Efficiency on NVLink vs RoCE
scenario: An 8-GPU node uses NVLink at 900 GB/s bisection bandwidth for intra-node AllReduce and 50 GB/s RoCE for inter-node.
question: "For a 64KB gradient, what are the intra-node NVLink and inter-node RoCE AllReduce times, and where is the latency crossover?"
details:
  realistic_solution: 'Ring AllReduce on N=8 GPUs requires 2*(N-1)=14 steps. Intra-node (NVLink 900 GB/s, latency α ≈ 1µs): Time = 14×1µs + 1.75×2GB/900GB/s = 14µs + 3.89ms = 3.90ms. Inter-node (RoCE 50 GB/s, latency α ≈ 5µs): Time = 14×5µs + 1.75×2GB/50GB/s = 70µs + 70ms = 70.07ms. NVLink is ~18× faster for 2GB messages (dominated by bandwidth ratio). Crossover where latency matters: when message size S satisfies the condition that the bandwidth advantage equals the latency disadvantage. S = 14 × (5µs - 1µs) / (1.75 × (1/50 - 1/900)) ≈ 1.69 MB. For messages < 1.69MB, the latency difference dictates performance. For small parameter server updates, NVLink is ~5× faster (latency ratio) rather than 18× (bandwidth ratio).'
  common_mistake: |
    **The Pitfall:** Comparing only bandwidth and ignoring network latency characteristics.
    **The Rationale:** Engineers look at the 900 GB/s vs 50 GB/s spec and assume an 18x speedup universally.
    **The Consequence:** Overestimating performance for small tensor synchronizations, where the 5x latency difference (5µs vs 1µs) completely dominates.
  napkin_math: |
    1. **Assumptions & Constraints:** N=8 ring AllReduce (14 steps, 1.75x bandwidth multiplier), NVLink latency=1μs, RoCE latency=5μs.
    2. **Calculations:** NVLink 64KB time: (14 * 1μs) + (1.75 * 64KB / 900GB/s) = 14.12μs. RoCE 64KB time: (14 * 5μs) + (1.75 * 64KB / 50GB/s) = 72.24μs. Crossover S: 14 * 4μs = 1.75 * S * (1/50 - 1/900). S ≈ 1.69 MB.
    3. **Conclusion & Interpretation:** **Result: Latency-Bound for Small Tensors.** NVLink is ~5x faster due to latency, dominating below 1.69 MB.
