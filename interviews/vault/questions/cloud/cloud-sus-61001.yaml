title: Chiplet Die-to-Die Bandwidth vs HBM Bandwidth
scenario: You are profiling a transformer inference kernel on MI300X and see unexpectedly high latency
  on attention heads. What chiplet-level bottleneck should you investigate first?
question: "What chiplet-level bottleneck should you investigate first?"
details:
  realistic_solution: The attention pattern may be causing KV-cache accesses that span multiple XCDs.
    If the KV cache for a single sequence is striped across XCDs, each token generation requires cross-fabric
    reads. Pin KV cache allocation to a single XCD's local HBM region using ROCm's NUMA-aware allocator.
  common_mistake: Blaming HBM bandwidth immediately. Engineers add more parallelism across XCDs hoping
    to spread load, but this actually increases cross-die traffic on Infinity Fabric.
  napkin_math: Local HBM3 ~660 GB/s per XCD. Cross-XCD via Infinity Fabric adds ~1.5-2x latency penalty.
    For a 128 GB KV cache striped across 8 XCDs, each decode step fetches ~16 GB/XCD locally vs ~112 GB
    crossing the fabric — a 7x cross-fabric pressure multiplier.
