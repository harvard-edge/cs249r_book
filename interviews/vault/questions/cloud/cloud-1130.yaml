title: Versioned Embedding Cache Sizing
scenario: You are upgrading a core embedding model from V1 (768-dim) to V2 (1024-dim). Five downstream ranking models consume these embeddings. To avoid breaking downstream dependencies, you implement a versioned dual-serving transition where an intermediate Redis cache stores both V1 and V2 embeddings for a 100M item working set.
question: What peak Redis memory is required to dual-serve 100M V1 768-d and V2 1024-d FP16 embeddings with 20% overhead?
details:
  realistic_solution: Adopt a dependency-aware deployment strategy using versioned feature endpoints. Calculate the 430 GB concurrent memory requirement for dual-serving, scale the Redis cluster accordingly, and allow downstream consumers to independently migrate from the V1 to V2 namespace.
  common_mistake: |
    **The Pitfall:** Forgetting to account for the simultaneous caching of BOTH model versions, or neglecting metadata overhead.
    **The Rationale:** Candidates calculate memory for just the new V2 model, forgetting that a zero-downtime migration requires both versions to coexist in memory.
    **The Consequence:** Undersizing the Redis cluster, resulting in OOM evictions that severely degrade latency for downstream V1 consumers.
  napkin_math: |
    - V1 embedding size: 768 dims * 2 bytes (FP16) = 1.536 KB.
    - V2 embedding size: 1024 dims * 2 bytes (FP16) = 2.048 KB.
    - Dual-serve size per item: 1.536 KB + 2.048 KB = 3.584 KB.
    - Total raw memory for 100M items: 100,000,000 * 3.584 KB = 358.4 GB.
    - Metadata overhead: 358.4 GB * 1.20 = 430.08 GB.
    - **Conclusion: Peak Redis memory required is 430.08 GB.**
