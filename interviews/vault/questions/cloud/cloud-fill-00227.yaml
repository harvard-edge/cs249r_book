title: Optimizing Large Model Training on NVIDIA A100 with Gradient Checkpointing
scenario: You are tasked with training a large Transformer model with 50 billion parameters on a single
  NVIDIA A100 GPU (80 GB HBM2e memory, 312 TFLOPS FP16 peak performance, 2.0 TB/s memory bandwidth). Due
  to the model's size, standard training methods lead to out-of-memory errors during the backward pass.
  Design a strategy leveraging gradient checkpointing to enable training this model. Specify the expected
  memory savings, potential compute overhead, and how you would balance the compute-memory trade-off given
  the A100's specifications.
question: "How would you apply gradient checkpointing to train the 50B Transformer on one 80 GB A100, and what compute-memory trade-off would you expect?"
details:
  realistic_solution: Implement a selective gradient checkpointing strategy. Profile the model to identify
    layers that consume the most activation memory and apply checkpointing only to those layers. For other
    layers, consider techniques like mixed-precision training (FP16/BF16) and optimizing batch size. Leverage
    the A100's high memory bandwidth (2.0 TB/s) to quickly recompute activations for checkpointed layers,
    minimizing the performance impact. Monitor GPU utilization and memory usage to dynamically adjust
    checkpointing granularity.
  common_mistake: 'Ignoring the recomputation cost: A common mistake is to apply gradient checkpointing
    naively without considering the increased forward-pass recomputation overhead during the backward
    pass, potentially negating memory savings with excessive training time, especially for layers with
    high FLOPs and low activation memory.'
  napkin_math: A 50B parameter model in FP16 requires approximately 100 GB for parameters (2 bytes/param
    * 50B). This already exceeds the A100's 80 GB HBM2e. Gradient checkpointing primarily saves activation
    memory, not parameter memory. If a layer's activations consume X GB without checkpointing, checkpointing
    reduces this to a small fraction (e.g., 0.1X GB for intermediate states). The recomputation cost for
    a layer with F FLOPs is roughly F/TFLOPS_FP16. For example, a layer taking 10 TFLOPS to recompute
    on an A100 (312 TFLOPS FP16) adds about 30ms of delay per recomputed layer per iteration. Memory bandwidth
    (2.0 TB/s) is critical for loading data for recomputation.
