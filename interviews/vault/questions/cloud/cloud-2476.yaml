title: The Asymmetric Quantization Penalty
scenario: An OTA update changes an edge NPU's quantization from symmetric to asymmetric INT8 to improve accuracy. Inference latency jumps from 15ms to 60ms, overflowing real-time tracking queues.
question: Why did switching from symmetric to asymmetric INT8 quantization raise edge latency from 15ms to 60ms?
details:
  realistic_solution: 'The edge NPU hardware only has Multiply-Accumulate (MAC) units designed for symmetric INT8 math (where Z=0). When the compiler receives an asymmetric model, it must mathematically emulate the asymmetric operation using symmetric hardware. An asymmetric dot product expands to four terms: (W - Zw)*(X - Zx) = W*X - W*Zx - Zw*X + Zw*Zx. This quadruples the number of MAC operations required and adds bias accumulation overhead, slashing the effective TOPS of the accelerator by more than 4x.'
  common_mistake: |
    **The Pitfall:** Assuming asymmetric quantization is natively supported by all NPU hardware without penalty.
    **The Rationale:** The precision (INT8) is unchanged, so the compute cost is assumed to be identical.
    **The Consequence:** The compiler quietly falls back to mathematical emulation using four times the MAC operations, destroying latency and power budgets on edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model: 10 Giga-MACs. NPU: 1 TOPS (symmetric INT8).
    - Asymmetric math equation: (W - Zw)*(X - Zx) = W*X - W*Zx - Zw*X + Zw*Zx.

    **Calculations:**
    - Symmetric latency: 10 GMACs / 1000 GMACs/sec = 10ms + 5ms overhead = 15ms.
    - Asymmetric expansion: 4 operations per MAC = 40 Giga-MACs.
    - Asymmetric latency: 40 GMACs / 1000 = 40ms + 20ms overhead = 60ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** The hardware lacks native asymmetric MAC units, forcing the compiler to emulate it, quadrupling the required operations and drastically reducing effective TOPS.
