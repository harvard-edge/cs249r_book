title: The Asymmetric Quantization Penalty
scenario: A cloud pipeline exports models to edge IoT devices. An update changes the INT8 quantization
  scheme from symmetric (zero-point=0) to asymmetric (per-tensor zero-point) to improve model accuracy
  from 91% to 94%. After OTA deployment to 100,000 devices, inference latency jumps from 15ms to 60ms,
  causing real-time tracking queues to overflow.
question: "Why did switching from symmetric to asymmetric INT8 quantization raise edge latency from 15ms to 60ms?"
details:
  realistic_solution: 'The edge NPU hardware only has Multiply-Accumulate (MAC) units designed for symmetric
    INT8 math (where Z=0). When the compiler receives an asymmetric model, it must mathematically emulate
    the asymmetric operation using symmetric hardware. An asymmetric dot product expands to four terms:
    (W - Zw)*(X - Zx) = W*X - W*Zx - Zw*X + Zw*Zx. This quadruples the number of MAC operations required
    and adds bias accumulation overhead, slashing the effective TOPS of the accelerator by more than 4x.'
  common_mistake: Assuming asymmetric quantization requires floating-point math on the edge device, forcing
    CPU fallback.
  napkin_math: 'Base model requires 10 Giga-MACs. Symmetric INT8 on 1 TOPS NPU: 10 GMACs / 1000 GMACs/sec
    = 10ms compute + 5ms memory overhead = 15ms. Asymmetric INT8 expansion: requires 4 operations per
    original MAC = 40 Giga-MACs. 40 GMACs / 1000 GMACs/sec = 40ms compute + 20ms memory/bias overhead
    = 60ms. Throughput drops by 4x.'
