title: Diagnosing PagedAttention Block Size Bottlenecks
scenario: 'You are operating a Llama-2-70B model on an 8x 80GB A100 cluster for a high-traffic API. Users
  are generating sequences up to 4096 tokens. Using a standard contiguous KV cache, you observe severe
  memory fragmentation: OOM errors occur even when metrics show 40% of GPU memory is unused. After migrating
  to vLLM with PagedAttention, the OOMs stop, but you face a new bottleneck: with a block size of 256
  tokens, you still see significant memory waste on short requests (e.g., 50 tokens). Conversely, a block
  size of 8 tokens causes memory bandwidth saturation during attention computation. Analyze the root cause
  of the initial OOMs, and diagnose how the PagedAttention block size dictates the trade-off between internal
  fragmentation and memory access overhead.'
details:
  realistic_solution: The initial OOMs were caused by external fragmentation and pre-allocation based
    on maximum sequence length. PagedAttention solves this by dynamically allocating non-contiguous memory
    blocks. However, a 256-token block size causes high internal fragmentation for short sequences (e.g.,
    50 tokens wastes 206 tokens of capacity in the allocated block). A block size of 8 minimizes this
    waste but requires a massive block table, increasing memory fetch overhead during attention kernels.
    An optimal block size (typically 16 or 32) balances acceptable internal fragmentation with manageable
    block table traversal overhead.
  common_mistake: Candidates often fail to distinguish between the external fragmentation of contiguous
    allocation (the original OOM cause) and the internal fragmentation introduced by large PagedAttention
    blocks, or miss the memory bandwidth cost of traversing large block tables with very small blocks.
  napkin_math: 'For 4096 max seq len, contiguous allocation pre-reserves 100%. If avg seq is 512, 87.5%
    is wasted (external). With PagedAttention (block size 16): a 500-token sequence uses ceil(500/16)
    = 32 blocks (512 token capacity). Wasted tokens = 12. Internal fragmentation = 12 / 512 = 2.3% waste,
    nearly eliminating the original 87.5% waste while keeping the block table to just 32 entries per sequence.'
