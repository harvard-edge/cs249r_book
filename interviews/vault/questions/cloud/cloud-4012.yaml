title: Designing ECN Thresholds for ML Traffic
scenario: You are designing the DCQCN parameters for a new 1024-MI300X training cluster
  with 400G RoCE v2 links. The fabric uses a 3-tier Clos with 12MB shared buffer per
  switch ASIC. Training workloads include both large AllReduce (up to 2GB) and small
  control-plane RPCs (<1KB). Specify your ECN marking thresholds, PFC thresholds,
  and DCQCN rate reduction parameters.
question: What ECN thresholds, PFC thresholds, and DCQCN rate-reduction parameters
  would you set for the 1024-MI300X 400G RoCE cluster?
details:
  realistic_solution: 'Use two traffic classes: TC0 for bulk AllReduce (DSCP 0) and
    TC3 for control RPCs (DSCP 24). For TC0 with 12MB buffer: set ECN Kmin = 1.2MB
    (10% of buffer), Kmax = 4.8MB (40%), Pmax = 10%. Set PFC threshold at 7.2MB (60%)
    as a safety net. For TC3: allocate 2MB reserved buffer with strict priority scheduling.
    DCQCN parameters: initial rate = line rate, rate reduction factor = 0.5 on first
    CNP, timer = 55μs, byte counter = 150KB, alpha increase = 1/16. This ensures ECN
    triggers rate reduction well before PFC fires, keeping the fabric lossless without
    pause-frame storms. With MI300X generating up to 5.3 TB/s per GPU from HBM, the
    NIC (400Gbps = 50 GB/s) is already a 106:1 bottleneck relative to memory bandwidth.'
  common_mistake: Setting ECN thresholds too high (close to PFC threshold), which
    means ECN marking starts too late and PFC fires anyway, defeating the purpose.
    Another mistake is using the same thresholds for all traffic classes, causing
    head-of-line blocking between bulk and latency-sensitive flows.
  napkin_math: 12MB buffer, PFC at 60% = 7.2MB. ECN Kmin at 10% = 1.2MB. At 400Gbps
    (50 GB/s), filling 1.2MB takes 24μs. Filling to PFC threshold (7.2MB) takes 144μs.
    This gives DCQCN ~120μs to react before PFC fires — roughly 2 round-trip times
    in a data center, enough for rate adjustment.
