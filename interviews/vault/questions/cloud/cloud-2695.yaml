title: Compression Strategy for Bandwidth-Constrained Training
scenario: Training a 3B model across 2 datacenters connected by 10 Gbps WAN (vs 200 Gbps InfiniBand within DC). Option A: 1-bit Adam (16x compression). Option B: top-0.1% sparsification (1000x compression) with error feedback. Option C: local SGD (communicate every 100 steps instead of every step).
question: Which approach best balances convergence and throughput?
details:
  realistic_solution: 'WAN bandwidth: 10 Gbps = 1.25 GB/s. Full gradient: 3B × 2B = 6 GB. Uncompressed AllReduce: 6GB / 1.25GB/s = 4.8s per step (catastrophic). Option A (1-bit Adam, 16x): 375 MB, 0.3s AllReduce. Good speedup but 300ms is still significant if compute is 100ms. Convergence: well-validated, ~10% more steps. Option B (top-0.1%, 1000x): 6 MB, 4.8ms AllReduce. Near-zero communication overhead. But top-0.1% sparsification is aggressive — error feedback helps but empirically causes 20-30% more training steps for large models, and may not converge at all for some architectures. Option C (local SGD, communicate every 100 steps): Full gradient every 100 steps: 4.8s / 100 = 48ms amortized per step. Each node trains independently for 100 steps then synchronizes. Convergence: 10-50% more total steps, significant divergence risk for non-IID data splits across DCs. Best choice: Option A. It provides the best convergence guarantee with sufficient compression to make WAN training feasible. The 300ms overhead can be overlapped with computation.'
  common_mistake: |
    **The Pitfall:** Choosing the highest compression ratio (Option B) to minimize communication.
    **The Rationale:** Candidates hyper-focus on network latency and ignore the statistical reality of optimization.
    **The Consequence:** Extreme sparsification degrades convergence more than it saves in communication time, potentially causing the 3B model to never converge.
  napkin_math: |
    * WAN bandwidth: 10 Gbps = 1.25 GB/s. Full gradient: 3B * 2 bytes = 6 GB.
    * Uncompressed AllReduce: 6 GB / 1.25 GB/s = 4.8s per step.
    * Option A (1-bit Adam, 16x): 375 MB, **0.3s** AllReduce (Good speedup, ~10% more steps).
    * Option B (top-0.1%, 1000x): 6 MB, **4.8ms** AllReduce (Massive divergence risk).
    * Option C (local SGD): 4.8s / 100 = **48ms** amortized (Non-IID divergence risk).
    * **Result:** **Option A (1-bit Adam) provides the best convergence guarantee with sufficient compression to overlap the 300ms overhead with compute.**
