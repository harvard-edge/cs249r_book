title: The Head-of-Line Blocking Problem
scenario: Your team is serving a large language model. You observe that overall throughput is low and,
  more importantly, users with short, quick queries are experiencing high latency. You suspect this is
  because their requests get stuck in batches with users who are generating very long sequences. What
  is the primary latency-related problem that continuous batching (also known as in-flight batching) is
  designed to solve compared to traditional static batching?
details:
  realistic_solution: The correct answer is that continuous batching solves the "head-of-line blocking"
    problem. In static batching, the entire batch of requests is processed as a single unit; it is not
    finished until the longest sequence in the batch has generated its final token. This means a request
    that only needs one token can be stuck waiting for another request that needs a thousand tokens. Continuous
    batching decouples the requests, allowing the server to evict finished sequences from the batch and
    add new ones in a continuous, iterative process. This dramatically reduces the average latency for
    all requests and improves overall GPU utilization by not wasting compute on padded, completed sequences.
  common_mistake: The common mistake is to think that batching is only about maximizing throughput. Engineers
    often fail to recognize that with static batching, all requests in a batch are tied to the completion
    time of the single longest request. This creates a "head-of-line blocking" scenario where short, fast
    requests are unnecessarily delayed, leading to high average and tail latency, even if the GPU itself
    is busy.
  napkin_math: 'Assume TPOT is 10ms. Request A needs 10 tokens; Request B needs 100. In static batching,
    both finish when the longest finishes: Latency A = 100 tokens * 10ms = 1,000ms. In continuous batching,
    A is evicted early and finishes in 10 tokens * 10ms = 100ms. This prevents the 900ms head-of-line
    blocking delay for Request A.'
  options:
  - It primarily increases the maximum theoretical throughput (tokens/sec) of the GPU.
  - It solves head-of-line blocking, where short requests are stuck waiting for the longest request in
    a batch to complete.
  - It reduces the VRAM required for the KV cache by using a different compression algorithm.
  - It strictly processes requests in a first-in, first-out (FIFO) order to ensure fairness.
  correct_index: 1
