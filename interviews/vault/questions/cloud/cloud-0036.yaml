title: The Head-of-Line Blocking Problem
scenario: Your team is serving a large language model. You observe that overall throughput is low and users with short, quick queries are experiencing high latency. You suspect this is because their requests get stuck in batches with users who are generating very long sequences.
question: What is the primary latency-related problem that continuous batching is designed to solve compared to static batching?
details:
  realistic_solution: Continuous batching solves the 'head-of-line blocking' problem. In static batching, the entire batch of requests is processed as a single unit; it is not finished until the longest sequence in the batch has generated its final token. Continuous batching decouples the requests, allowing the server to evict finished sequences from the batch and add new ones continuously.
  common_mistake: |
    **The Pitfall:** Thinking that batching is only about maximizing throughput (tokens/sec).
    **The Rationale:** Engineers often focus on GPU utilization and throughput, forgetting that static batching ties all requests to the longest sequence.
    **The Consequence:** The system suffers from head-of-line blocking, causing short, fast requests to be unnecessarily delayed and resulting in high average and tail latency.
  napkin_math: |
    1. Set assumptions: TPOT is 10ms. Request A needs 10 tokens; Request B needs 100 tokens.
    2. Calculate static batching latency: Both finish when the longest finishes. Latency A = 100 tokens * 10ms = 1,000ms.
    3. Calculate continuous batching latency: Request A is evicted early and finishes in 10 tokens * 10ms = 100ms.
    4. Evaluate benefit: Continuous batching prevents the **900ms head-of-line blocking delay** for Request A.
  options:
  - It primarily increases the maximum theoretical throughput (tokens/sec) of the GPU.
  - It solves head-of-line blocking, where short requests are stuck waiting for the longest request in a batch to complete.
  - It reduces the VRAM required for the KV cache by using a different compression algorithm.
  - It strictly processes requests in a first-in, first-out (FIFO) order to ensure fairness.
