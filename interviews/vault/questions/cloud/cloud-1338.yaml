title: Silent Failures in Traced Dynamic Control Flow
scenario: An ML engineer deploys a PyTorch NLP router model. The forward() method contains data-dependent control flow: if x.size(1) <= 128: x = fast_path(x) else: x = deep_path(x). To minimize Python overhead, the model is compiled using torch.jit.trace with a dummy input tensor of shape [16, 64]. In production, requests with sequence length 256 unexpectedly run in ~3ms (instead of >25ms) and yield garbage outputs. No errors are thrown.
question: Why do sequence length 256 requests silently fail and execute rapidly after tracing with a [16, 64] dummy input, and how is it fixed?
details:
  realistic_solution: Diagnose that `torch.jit.trace` only records the operations executed by the specific tracing input. Since the dummy input (seq=64) took the `fast_path`, the `if` condition was baked in as a constant `True`. All production inputs, regardless of sequence length, now execute `fast_path`, producing garbage outputs for long sequences that should have taken `deep_path`. The fix is to use `torch.jit.script` (which performs static analysis of all branches) or `torch.cond` for data-dependent control flow.
  common_mistake: |
    **The Pitfall:** Assuming torch.jit.trace performs static analysis of the Python AST to capture all branches.
    **The Rationale:** Candidates believe the framework automatically handles dynamic control flow or will re-trace when input shapes change at runtime.
    **The Consequence:** Deploying silently broken models that execute the wrong computation graph for out-of-distribution input shapes.
  napkin_math: |
    1. Tracing with input shape [16, 64] evaluates `64 <= 128` as `True`.
    2. The tracer records ONLY the `fast_path` execution (~2 GFLOPs). The conditional statement is discarded.
    3. A production input of [16, 256] enters the compiled graph, bypasses the missing `if` condition, and blindly executes the `fast_path`.
    4. The `fast_path` scales linearly to the new length: ~4x compute = 8 GFLOPs.
    5. 8 GFLOPs on a GPU takes ~3ms, matching the observed latency drop.
    6. **Using `torch.jit.script` or `torch.cond` instead of `trace` ensures all control flow branches are compiled correctly.**
