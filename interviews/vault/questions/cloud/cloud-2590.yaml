title: Cloud Inference Accelerator Selection L5 0
scenario: 'Your inference platform serves 5 different model architectures (Transformer, Mamba, MoE, vision
  Transformer, multimodal). Evaluate deploying on: (A) all NVIDIA GPUs, (B) a mix of GPUs + TPUs + Inferentia,
  (C) primarily custom ASICs with GPU fallback.'
question: "How would you evaluate all-GPU, heterogeneous, and ASIC-first deployments for five diverse model architectures?"
details:
  realistic_solution: 'Option A (all GPU): maximum flexibility — CUDA/PyTorch supports all 5 architectures.
    Single toolchain, single ops team. Premium cost but zero porting risk. Best when model diversity is
    high and architectures evolve quickly. Option B (heterogeneous mix): optimize each model for cheapest
    viable hardware. TPUs for Transformer/vision (well-supported), Inferentia for stable Transformer inference,
    GPUs for MoE and multimodal (need flexibility). 30-50% cost savings but 3x operational complexity
    — separate deployments, monitoring, oncall for each platform. Option C (ASIC-first): maximum cost
    efficiency for stable workloads but highest risk. MoE and multimodal may not be supported. Architecture
    changes (Mamba replacing Transformer) could strand hardware. Best only for single high-volume model.
    Recommendation: A for R&D-heavy orgs, B for mature inference at scale, C only for single-model high-volume
    (e.g., one flagship LLM).'
  common_mistake: Chasing maximum cost-per-token efficiency without accounting for operational complexity.
    Managing 3 different accelerator platforms requires 3x the tooling, expertise, and oncall burden —
    these hidden costs often erode the hardware savings.
  napkin_math: '5 models, 1000 GPUs equivalent. A: 1000 × $2/hr = $2K/hr. B: 400 GPU ($800) + 300 TPU
    ($450) + 300 Inf2 ($228) = $1,478/hr → 26% savings. C: 800 ASIC ($480) + 200 GPU ($400) = $880/hr
    → 56% savings but limited to supported models.'
