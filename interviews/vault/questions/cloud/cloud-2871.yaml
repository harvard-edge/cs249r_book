title: Precision Fallback Design
scenario: A serving model uses INT4 weights for memory, but certain layers lose accuracy unless kept at INT8.
question: "How would you design a mixed INT4/INT8 fallback policy for layers that lose accuracy under INT4?"
details:
  realistic_solution: 'Use per-layer sensitivity analysis to keep fragile layers at INT8 and compress robust layers to INT4. The policy should include accuracy thresholds, memory budget, kernel support, and rollback to a safer precision if online metrics regress.'
  common_mistake: |
    **The Pitfall:** Uniformly quantizing every layer.
    **The Rationale:** It simplifies implementation and kernel selection.
    **The Consequence:** Treating average accuracy as proof that all layers are safe leads to subtle degradation in edge-case generative quality.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20% of layers remain INT8, 80% are compressed to INT4.

    **Calculations:**
    - INT8 = 1 byte/param. INT4 = 0.5 bytes/param.
    - Effective size = (0.2 * 1) + (0.8 * 0.5) = 0.6 bytes/parameter.

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound.** A 20/80 fallback split yields an effective weight size of 0.6 bytes per parameter, retaining accuracy.
