title: Precision Fallback Design
scenario: A serving model uses INT4 weights for memory, but certain layers lose accuracy
  unless kept at INT8. Design a mixed-precision fallback policy.
question: How would you design a mixed INT4/INT8 fallback policy for layers that lose
  accuracy under INT4?
details:
  realistic_solution: Use per-layer sensitivity analysis to keep fragile layers at
    INT8 and compress robust layers to INT4. The policy should include accuracy thresholds,
    memory budget, kernel support, and rollback to a safer precision if online metrics
    regress.
  common_mistake: Quantizing every layer uniformly and treating average accuracy as
    proof that all layers are safe.
  napkin_math: If 20% of layers remain INT8 and 80% are INT4, weight memory is 0.2
    x 1 byte + 0.8 x 0.5 byte = 0.6 bytes/parameter on average.
