title: The Tokenizer Overhead Spikes
scenario: Your LLM inference server is utilizing a 70B model on an H100. P99 latency suddenly spikes. You look at the GPU utilization metrics, and the GPU is sitting at 0% for 50 milliseconds before every generation request.
question: What CPU-bound process is blocking the GPU from doing its job?
details:
  realistic_solution: 'You are hitting the **Tokenizer CPU Bottleneck**. A slow Python BPE tokenizer might process 100,000 tokens per second. A 5,000-token prompt takes 50ms to tokenize. However, the H100 prefilling that same prompt for a 70B model takes ~1.4 seconds (700 TFLOPs at ~50% GPU utilization), so the 50ms tokenizer overhead is small relative to prefill. The real issue is that tokenization is **synchronous and blocking**: the GPU sits completely idle (0% utilization) while the CPU tokenizes. The fix is to use a fast Rust-based tokenizer and run tokenization asynchronously in a thread pool, overlapping CPU tokenization of the next request with GPU inference of the current one.'
  common_mistake: |
    **The Pitfall:** Blaming the delay on PCIe bus transfer times.
    **The Rationale:** Candidates know that moving data between CPU and GPU takes time and often overestimate the latency of small transfers.
    **The Consequence:** Focusing on optimizing PCIe transfers (which only take microseconds for a few kilobytes of text) while ignoring the massive synchronous blocking caused by the CPU tokenizer.
  napkin_math: |
    - **Tokenizer Latency:** A slow Python BPE tokenizer processing 100,000 tokens/sec takes 50ms to tokenize a 5,000-token prompt on the CPU.
    - **Prefill Compute Required:** 2 * 70B * 5,000 = 700 TFLOPs.
    - **Prefill Time:** At ~50% utilization of 989 TFLOPS FP16: 700 / 495 ≈ 1.4 seconds (1,400 ms).
    - **Tokenizer Overhead:** 50ms is only ~3.5% of the 1.4s prefill time, but it completely blocks the GPU.
    - **Idle Cost:** At $3.50/hr, 50ms idle time wastes $0.000049 per request.
    - **Throughput Impact:** At 1,000 req/min back-to-back, the GPU spends 50s idle per minute—meaning the GPU is stalled **83% of the time**.
