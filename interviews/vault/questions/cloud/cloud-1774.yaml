title: Evaluating Storage Upgrades vs Data Serialization
scenario: Your team is training a large vision model on 8x H100 GPUs using a distributed dataset of 1 billion 50KB images stored as individual files. You provisioned a cloud parallel file system with 50 GB/s peak throughput, but GPU utilization is plateauing at 30%. Storage throughput is bottlenecked at 2 GB/s, hitting a hard limit of 40,000 IOPS. The infrastructure team proposes upgrading to an 'Extreme NVMe' tier that provides 500,000 IOPS for 4x the hourly cost.
question: "Should you buy the 500,000-IOPS Extreme NVMe tier or migrate 1B 50KB images to WebDataset/TFRecord, and why quantitatively?"
details:
  realistic_solution: Reject the hardware upgrade and migrate to a serialized data format like WebDataset. By packing 50KB images into large 100MB tarballs, you convert hundreds of thousands of random IOPS into a few sequential reads per second. This trivially saturates the required training bandwidth using the existing storage volume while completely bypassing its 40,000 IOPS limit.
  common_mistake: |
    **The Pitfall:** Accepting the costly hardware upgrade to solve the IOPS bottleneck.
    **The Rationale:** Candidates view hardware limitations as immutable infrastructure problems, forgetting that data layout software changes can drastically alter the access pattern.
    **The Consequence:** Wasting huge amounts of cloud budget on extreme-tier storage to brute-force a fundamentally inefficient read pattern.
  napkin_math: |
    - Target throughput for 8x H100s = 100,000 images/sec * 50KB = 5.0 GB/s.
    - Current setup: 40,000 IOPS * 50KB = 2.0 GB/s max (Bottlenecked).
    - Proposed upgrade: 500,000 IOPS * 50KB = 25 GB/s (Sufficient, but expensive).
    - Serialized approach (WebDataset with 100MB shards): To achieve 5.0 GB/s, the system only needs (5000 MB/s / 100 MB) = **50 IOPS**.
    - **50 IOPS is >99% below the current 40k IOPS limit, unlocking the 50 GB/s volume at no extra cost.**
