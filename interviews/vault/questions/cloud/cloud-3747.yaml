title: 'Carbon-Aware Scheduling: Shifting Training to Low-Carbon Hours'
scenario: Your organization trains large models on an MI300X cluster in a region where the grid carbon intensity varies from 100 gCO2/kWh (midday solar peak) to 300 gCO2/kWh (evening natural gas). A 70B model training run consumes 500 MWh over 14 days.
question: How much CO2 can you realistically save by shifting 30% of the workload to low-carbon hours, and what are the engineering tradeoffs?
details:
  realistic_solution: 'Carbon savings = shift_fraction × carbon_intensity_delta × energy = 0.30 × 200g/kWh × 500,000 kWh = 30 tonnes (not 45 tonnes which uses 300g/kWh delta instead of 200g/kWh).'
  common_mistake: |
    **The Pitfall:** Assuming you can simply pause training during high-carbon hours to achieve theoretical maximum savings.
    **The Rationale:** Candidates forget that checkpointing, restarting, and GPU idle power all consume energy and eat into the net carbon savings.
    **The Consequence:** Carbon reduction estimates are overstated, and shifting large contiguous jobs proves much harder than anticipated.
  napkin_math: |
    * **Carbon Intensity Delta:** 300 gCO2/kWh - 100 gCO2/kWh = 200 gCO2/kWh.
    * **Shifted Workload Energy:** 30% of 500 MWh = 150 MWh = 150,000 kWh.
    * **Total Carbon Savings:** 150,000 kWh × 200 gCO2/kWh = 30,000,000 grams.
    * **Conclusion:** The realistic CO2 savings is **30 tonnes**.
