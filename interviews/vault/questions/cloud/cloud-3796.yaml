title: FlashAttention Training Throughput
scenario: 'You benchmark a 7B model inference at 2100 tokens/second, which requires 84 GFLOPs per token.'
question: 'What MFU does 2100 tok/s imply on an MI300X (1307 TFLOPS) and an H100 (989 TFLOPS)?'
details:
  realistic_solution: 'MFU = actual throughput / peak throughput. Actual compute = 2100 * 84 = 176.4 TFLOPS.'
  common_mistake: |
    **The Pitfall:** Computing MFU using raw peak FLOPS without isolating actual model FLOPs.
    **The Rationale:** Candidates fail to understand that MFU excludes framework overheads.
    **The Consequence:** Incorrectly assessing optimization headroom on specific hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Throughput: 2100 tok/s at 84 GFLOP/tok.
       - MI300X = 1307 TFLOPS, H100 = 989 TFLOPS.
    2. **Calculations:**
       - Compute Volume: 2100 * 84 GFLOP = 176.4 TFLOPS.
       - MI300X MFU: 176.4 / 1307 = 13.5%.
       - H100 MFU: 176.4 / 989 = 17.8%.
    3. **Conclusion & Interpretation:**
       - **Result: 13.5% (MI300X) and 17.8% (H100) MFU.**
       - **Conclusion: Compute-Bound benchmarking strictly requires Model FLOPs, not hardware theoreticals.**