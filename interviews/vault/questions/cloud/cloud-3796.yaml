title: 'FlashAttention Training Throughput: Tokens per Second per GPU'
scenario: 'You benchmark a 7B model inference with a batch of requests. At 2100 tokens/second, the model requires ~84 GFLOP per token.'
question: 'Using 84 GFLOP per token, what MFU does 2100 tok/s imply on an MI300X (1307 TFLOPS), and what would it be on an H100 (989 TFLOPS)?'
details:
  realistic_solution: 'MFU = actual throughput / peak throughput. Actual compute = 2100 tok/s * 84 GFLOP/token = 176.4 TFLOPS. On MI300X (1307 TFLOPS): 176.4 / 1307 = 13.5% MFU. On H100 (989 TFLOPS): 176.4 / 989 = 17.8% MFU.'
  common_mistake: |
    **The Pitfall:** Computing MFU using raw peak FLOPS without isolating actual useful model FLOPs.
    **The Rationale:** Candidates fail to understand that MFU (Model FLOPs Utilization) measures actual useful computation as a fraction of hardware peak, thereby strictly excluding framework and scheduling overheads.
    **The Consequence:** Incorrectly assessing how much room is left for optimization on the specific hardware.
  napkin_math: |
    - **Compute Volume:** 2,100 tok/s × 84 GFLOP/tok = 176,400 GFLOPS = 176.4 TFLOPS.
    - **MI300X MFU:** 176.4 / 1307 TFLOPS = **13.5%**.
    - **H100 MFU:** 176.4 / 989 TFLOPS = **17.8%**.
