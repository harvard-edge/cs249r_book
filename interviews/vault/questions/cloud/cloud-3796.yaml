title: 'FlashAttention Training Throughput: Tokens per Second per GPU'
scenario: 'You benchmark a 7B model inference with a batch of requests. At 2100 tokens/second, the model requires ~84 GFLOP per token. Calculate the MFU for this throughput on an AMD MI300X (1307 TFLOPS) and an NVIDIA H100 (989 TFLOPS).'
question: Using 84 GFLOP per token, what MFU does 2100 tok/s imply on an MI300X, and what would it be on an H100?
details:
  realistic_solution: 'MFU = actual throughput / peak throughput. Actual compute = 2100 tok/s * 84 GFLOP/token = 176.4 TFLOPS. On MI300X (1307 TFLOPS): 176.4 / 1307 = 13.5% MFU. On H100 (989 TFLOPS): 176.4 / 989 = 17.8% MFU.'
  common_mistake: Computing MFU using peak FLOPS without accounting for the fact that
    MFU measures actual useful FLOPS (model FLOPS) as a fraction of hardware peak,
    including all overheads.
  napkin_math: 'Compute = 2100 tok/s × 84 GFLOP/tok = 176.4 TFLOPS.
    MI300X MFU = 176.4 / 1307 = 13.5%.
    H100 MFU = 176.4 / 989 = 17.8%.'
