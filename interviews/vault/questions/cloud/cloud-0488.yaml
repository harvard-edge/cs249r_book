title: The Cross-Node All-Reduce Stall
scenario: You are a Staff ML Engineer training a 175-billion parameter model on a 16-GPU cluster. The
  cluster consists of two physical nodes, each containing 8 H100 GPUs connected internally with NVLink
  4.0. The two nodes are connected via an InfiniBand NDR switch. You observe that scaling from 8 GPUs
  (one node) to 16 GPUs (two nodes) gives you only a 1.5x speedup, not the near-linear 2x you expected.
  Profiling shows the `All-Reduce` operation for gradient synchronization is now the dominant part of
  your training step. Using the hardware specs provided, diagnose the primary communication bottleneck
  causing this poor scaling.
details:
  realistic_solution: The primary bottleneck is the InfiniBand NDR network that connects the two physical
    nodes. While NVLink provides an extremely fast 900 GB/s of bandwidth for All-Reduce communication
    *within* a node, any communication that has to cross the node boundary is limited to InfiniBand's
    50 GB/s. For a distributed operation like All-Reduce that must synchronize gradients across all 16
    GPUs, the data transfer between the two nodes is throttled by this weakest link, which is ~18x slower
    than the internal interconnect.
  common_mistake: Engineers often focus only on the impressive GPU-to-GPU interconnect bandwidth (NVLink)
    and forget that as soon as you scale beyond a single physical server, the much slower node-to-node
    network (InfiniBand) becomes the dominant bottleneck. They underestimate the massive bandwidth gap
    between the on-chassis fabric and the cross-rack network, misattributing the scaling problem to other
    components.
  napkin_math: 1. **Calculate Gradient Data:** A 175B parameter model using FP16 for gradients requires
    175 billion * 2 bytes/param = 350 GB of data to be synchronized for each gradient update.
  options:
  - The PCIe Gen5 bus is saturated from loading data for the next step.
  - The NVLink 4.0 bandwidth within each node is insufficient for 8 H100s during the All-Reduce.
  - The InfiniBand NDR network connecting the two nodes is the bottleneck.
  - The model is simply too large, and the total gradient size exceeds what modern interconnects can handle
    efficiently.
  correct_index: 2
