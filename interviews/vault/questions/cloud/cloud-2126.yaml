title: 'Optimal Recompute-vs-Save Scheduling'
scenario: You are building a memory optimizer for a training framework. Given a computational graph with N operations, each with known compute cost c_i and activation memory size m_i, you must decide which activations to save and which to recompute during the backward pass, minimizing peak memory while staying within a compute budget of at most 33% overhead.
question: "How would you formulate activation checkpoint selection with a 33% recompute budget, and what practical algorithm would you use?"
details:
  realistic_solution: 'Problem formulation: This is an instance of the time-memory tradeoff on DAGs, which is NP-hard in general but admits good heuristics. For a chain of N operations: the optimal solution (Griewank & Walther, 2000) uses binomial checkpointing with O(N/log(N)) memory and O(N*log(N)) compute. For DAGs (real transformers): (1) Model: binary decision variable s_i in {0,1} for each operation (save=1, recompute=0). Objective: minimize max_{t} sum of alive activations at each backward step t. Constraint: total recompute FLOPs <= 0.33 * forward FLOPs. (2) Practical algorithm (used by PyTorch''s activation checkpointing): segment the model into contiguous blocks. For each block boundary, save the activation (checkpoint). During backward, recompute within each block. Block size selection: dynamic programming over the chain, with cost = recompute time and benefit = memory saved. (3) Systems considerations: recompute must use the same random state (dropout seeds) for correctness. The framework must save and restore RNG states at each checkpoint boundary, adding ~100 bytes of metadata per checkpoint. Memory planning must account for the transient peak during recomputation.'
  common_mistake: |
    **The Pitfall:** Treating this as a simple 'checkpoint every sqrt(N) layers' heuristic.
    **The Rationale:** Sqrt(N) is a well-known theoretical approximation for uniform sequential chains.
    **The Consequence:** Real computational graphs are DAGs with heterogeneous operation costs and branching, making the rigid heuristic suboptimal or completely invalid.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Recompute Budget: 33% overhead.
       - Model: 96-layer transformer.
    2. **Calculations:**
       - Uniform Sqrt(N) Heuristic: Memory drops to ~2 * Sqrt(96) ≈ 20 units.
       - Optimal Binomial Scheduling: Memory drops to O(N/log(N)) = 96/6.5 ≈ 15 units.
    3. **Conclusion & Interpretation:**
       - **Result: ~15 Memory Units (Compute-Bound Optimization).** Dynamic programming yields near-optimal checkpoints, vastly outperforming naïve uniform spacing for complex DAGs.
