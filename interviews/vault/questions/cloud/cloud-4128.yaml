title: GPU Health Monitoring for Scheduler Integration
scenario: List the five most important GPU health metrics a scheduler should monitor
  to proactively prevent job failures, and the threshold that should trigger removing
  a GPU from the schedulable pool.
question: Which five GPU health metrics should the scheduler monitor, and what thresholds
  should drain a GPU from the schedulable pool?
details:
  realistic_solution: '(1) ECC errors (DCGM_FI_DEV_ECC_DBE_VOL): double-bit errors
    are uncorrectable and cause silent data corruption. Threshold: any DBE → immediately
    drain GPU. Single-bit errors >100/hour → schedule maintenance. (2) GPU temperature
    (DCGM_FI_DEV_GPU_TEMP): sustained temperatures above throttle point cause clock
    reduction. Threshold: >83°C sustained for >5 minutes on H100 → drain and check
    cooling. (3) PCIe/NVLink link errors: retransmissions indicate failing interconnect.
    Threshold: >10 retransmissions/second → drain for hardware inspection. (4) Memory
    utilization vs allocation: if a GPU shows 0% memory utilization but the scheduler
    thinks it is allocated, a job has crashed silently. Threshold: allocated GPU at
    0% memory for >2 minutes → mark job as failed, reclaim GPU. (5) XID errors (nvidia-smi
    -q -d PAGE_RETIREMENT): GPU driver errors logged to dmesg. XID 48 (DBE) and XID
    74 (NVLink error) are critical. Threshold: any XID 48/74 → drain immediately.
    Monitoring stack: DCGM exporter → Prometheus → AlertManager → Slurm health check
    script. Check frequency: every 30 seconds for temperature/utilization, every 5
    minutes for ECC/XID.'
  common_mistake: Only monitoring GPU utilization. A GPU at 100% utilization can still
    be unhealthy (ECC errors, thermal throttling, driver issues).
  napkin_math: 'A single undetected DBE corrupts model weights. If the corrupted model
    trains for 2 hours before detection: 2h × 128 GPUs = 256 GPU-hours wasted. Proactive
    monitoring: 0 waste.'
