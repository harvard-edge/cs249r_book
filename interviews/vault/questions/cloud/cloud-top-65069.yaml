title: Decode Pool Tensor Parallelism Degree Selection
scenario: A 70B model decode pool can use TP=1 (192GB MI300X single GPU), TP=2 (2xH100 NVLink), or TP=4
  (4xH100 NVLink). Analyze how TP degree affects decode throughput and latency per token.
details:
  realistic_solution: 'Decode throughput analysis per TP degree: TP=1 on MI300X: memory-bound decode at
    5.3 TB/s / 140GB (70B BF16) = 37.9 tok/sec per stream. KV cache: 192-140 = 52GB available. TP=2 on
    2xH100: each GPU holds 70GB model shard. Effective BW = 2 * 3.35 = 6.7 TB/s for model weights. tok/sec
    = 6.7TB/140GB = 47.9 tok/sec. But all-reduce latency per step: 2 * (N-1)/N * message_size / NVLink_BW
    = 2 * 0.5 * small_message / 900GB/s. For TP=2 attention reduce: message = 2 * seq_len * hidden * 2B
    = 2 * 1 * 8192 * 2 = 32KB. All-reduce: 32KB / 900GB/s = 0.036us — negligible. TP=2 wins over MI300X
    single in throughput. TP=4 on 4xH100: BW = 4 * 3.35 = 13.4 TB/s effective. tok/sec = 13.4TB/140GB
    = 95.7 tok/sec. All-reduce for TP=4: 3 * 32KB / 900GB/s = 0.107us — still negligible. TP=4 wins on
    throughput. But cost: TP=4 requires 4 GPUs at $12/hr vs MI300X at $4/hr. Cost per token: TP=4: $12/hr
    / (95.7 * 3600) = $0.000035/token. MI300X: $4/(37.9*3600) = $0.0000293/token. MI300X is cheaper per
    token.'
  common_mistake: Assuming higher TP always improves decode performance. TP reduces per-GPU memory bandwidth
    requirement but adds all-reduce communication overhead per decode step. At small batch sizes, the
    all-reduce latency can exceed the compute time, making higher TP counterproductive.
  napkin_math: 'Summary: TP=1 MI300X: 37.9 tok/sec, $0.0000293/token. TP=2 H100: 47.9 tok/sec, $6/hr =
    $0.0000348/token. TP=4 H100: 95.7 tok/sec, $12/hr = $0.0000348/token. MI300X single is most cost-efficient.
    TP=4 doubles throughput vs MI300X but costs 3x more. Use case: if low latency (not throughput) is
    needed, TP=4 H100 provides lowest TPOT via higher parallel bandwidth. If cost efficiency matters most,
    MI300X wins.'
