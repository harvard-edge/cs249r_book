title: 'Disaggregated Serving Cost Model: Build vs Buy'
scenario: 'A startup expects 1B output tokens/month using a Llama-3 70B model. They are deciding between building a disaggregated serving system or using a managed API like Together AI.'
question: 'Should the startup build a disaggregated Llama-3 70B system or buy a managed API, and what is the break-even volume?'
details:
  realistic_solution: 'Build cost analysis: Assume an 8xH100 node with vLLM continuous batching achieves 8,000 tok/sec. Monthly capacity per node: 8000 × 3600 × 24 × 30 = 20.7B tokens. Using reserved GPUs at $2/hr, node cost is 8 × $2 × 720 = $11,520/month. Compute cost is $0.55 per million tokens. Fixed costs: $41.7K/month engineering (2 FTEs) + base infrastructure overhead (~$18K). Buy cost: Together AI is $0.90 per million tokens. For 1B tokens: Buy is $900/month. Build is >$60K/month. Managed API wins massively. Break-even occurs when volume savings ($0.90 - $0.55 = $0.35/M) exceed fixed costs (~$60K). Break-even: 60,000 / 0.35 = ~171 Billion tokens/month. Conclusion: below 100B tokens/month, use managed API; above 200B tokens/month, build is cost-effective.'
  common_mistake: |
    **The Pitfall:** Comparing only raw GPU compute costs without including engineering and infrastructure overhead.
    **The Rationale:** Engineers often underestimate the fixed costs of maintaining high-availability distributed systems.
    **The Consequence:** A "build" decision that looks cheaper on paper ends up costing tens of thousands of dollars more per month in hidden operational expenses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 1 Billion tokens/month.
       - Buy Cost: $0.90 per 1M tokens.
       - Build Compute: 8xH100 node ($11,520/month) yields 20.7B tokens/mo ($0.55/1M tokens).
       - Build Fixed Cost: ~$60,000/month (Engineering + Infra).
    2. **Calculations:**
       - Buy Total = 1,000 * $0.90 = $900/month.
       - Break-even = Fixed Cost / (Buy Price - Build Variable Price) = $60,000 / ($0.90 - $0.55) = ~171 Billion tokens.
    3. **Conclusion & Interpretation:** **Result: Cost-Bound**. At 1B tokens, buying ($900) massively beats building (>$60K). Building only makes sense above ~171B tokens/month.
