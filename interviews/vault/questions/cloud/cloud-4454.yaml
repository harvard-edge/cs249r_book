title: 'Disaggregated Serving Cost Model: Build vs Buy'
scenario: 'A startup is considering building a disaggregated LLM serving system vs
  using a managed inference API (e.g., Bedrock, Together AI). Monthly traffic: 1B
  output tokens. Model: Llama-3 70B. Perform a build vs buy cost analysis.'
question: Should the startup build a disaggregated Llama-3 70B serving system or buy
  a managed API for 1B output tokens/month?
details:
  realistic_solution: 'Build cost analysis: Assume an 8xH100 node with vLLM continuous
    batching achieves 8,000 tok/sec. Monthly capacity per node: 8000 × 3600 × 24 × 30 = 20.7B tokens.
    Using reserved GPUs at $2/hr, node cost is 8 × $2 × 720 = $11,520/month. Compute cost is
    $0.55 per million tokens. Fixed costs: $41.7K/month engineering (2 FTEs) + base infrastructure overhead (~$18K).
    Buy cost: Together AI is $0.90 per million tokens. For 1B tokens: Buy is $900/month. Build is >$60K/month.
    Managed API wins massively. Break-even occurs when volume savings ($0.90 - $0.55 = $0.35/M) exceed
    fixed costs (~$60K). Break-even: 60,000 / 0.35 = ~171 Billion tokens/month. Conclusion: below 100B tokens/month,
    use managed API; above 200B tokens/month, build is cost-effective.'
  common_mistake: 'Comparing only raw GPU compute costs without including: engineering
    time to build and maintain the disaggregated system, redundancy costs for high
    availability, bandwidth costs for KV cache transfer, and the opportunity cost
    of not using that engineering time for product development.'
  napkin_math: 'Buy cost for 1B tokens: 1000M × $0.90 = $900. Build compute capacity:
    8xH100 at 8000 tok/sec = 20.7B tokens/mo for $11,520 (reserved $2/hr). Variable cost = $0.55/M.
    Build fixed costs ≈ $60K/mo. Break-even volume = Fixed Cost / (Buy Price - Build Variable Price)
    = $60,000 / ($0.90 - $0.55) ≈ 171 Billion tokens/month.'
