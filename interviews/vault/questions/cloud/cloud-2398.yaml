title: Federated Learning Edge-Cloud Energy
scenario: 'You are deploying a 20MB Federated Learning (FL) model for mobile devices (100,000 daily participants).
  Transmitting the 20MB payload (Tx/Rx) costs 40 Joules of edge battery. Executing one local training
  epoch costs 10 Joules. To reach target convergence, you can choose Configuration A: 100 global rounds,
  1 local epoch per round. Or Configuration B: 20 global rounds, 10 local epochs per round. Cloud aggregation
  costs $2.00 per global round. Edge devices have strict battery limits (max 2% drain on a 36,000 Joule
  battery). Evaluate the tradeoffs.'
question: "How do Configurations A and B compare on edge energy and cloud cost, and can either meet the 2% battery limit?"
details:
  realistic_solution: 'In Federated Learning systems, communication is vastly more energy-intensive than
    computation. By analyzing the energy cost per round, we see that transmitting the model takes 4x more
    energy than running a local epoch. Configuration A minimizes local compute but requires 100 communication
    rounds, heavily penalizing the edge device''s radio and draining 13.8% of the battery—far exceeding
    the 2% user-acceptable limit. Configuration B shifts the burden to local compute (10 epochs per round)
    but drastically reduces communication to 20 rounds. This drops battery drain to 7.7%—still above the
    2% limit, but 1.8× better than Config A and vastly cheaper on the cloud side ($40 vs $200).


    Critically, neither configuration meets the 2% battery constraint as stated. This reveals that the
    real architectural solution requires a third lever: **model compression**. To hit the 2% target (720J
    budget):


    - With Config B''s structure (20 rounds), the per-round budget is 720J / 20 = 36J per round.

    - Communication alone costs 40J/round at 20MB model size — already over budget.

    - Solution: Compress the model payload. Using top-k sparsification (send only top 10% of gradient
    values) or quantization reduces the 20MB payload to ~2MB, cutting communication energy to 4J/round.

    - New Config B with compression: 20 rounds × (4J comm + 100J compute) = 2,080J. Still over 720J.

    - Further reduce to 7 rounds with 30 local epochs: 7 × (4J + 300J) = 2,128J. Still over.

    - The math shows we need aggressive compression + fewer rounds: 7 rounds × (4J comm + 100J compute)
    = 728J ≈ 2% ✓.


    The key architectural insight is three-fold: (1) communication dominates edge energy, not compute,
    (2) increasing local epochs trades cheap compute for expensive communication, and (3) at strict battery
    limits, model compression is not optional — it is the enabling technology for federated learning on
    battery-constrained devices.'
  common_mistake: Minimizing local epochs to save edge compute power, failing to realize that radio transmission
    (Tx/Rx) completely dominates edge energy consumption.
  napkin_math: '**Config A (100 rounds, 1 local epoch):**

    - Per round: 40J (comm) + 10J (1 epoch) = 50J

    - Total edge energy: 100 × 50J = 5,000J

    - Battery drain: 5,000 / 36,000 = **13.8%** — FAILS 2% limit

    - Cloud cost: 100 × $2 = **$200**


    **Config B (20 rounds, 10 local epochs):**

    - Per round: 40J (comm) + 10 × 10J (10 epochs) = 140J

    - Total edge energy: 20 × 140J = 2,800J

    - Battery drain: 2,800 / 36,000 = **7.7%** — FAILS 2% limit

    - Cloud cost: 20 × $2 = **$40**


    **2% battery budget:** 36,000J × 0.02 = **720J**


    **Config C (Config B + 10× compression):**

    - Compressed payload: 20MB → 2MB. Comm energy: 40J → 4J per round

    - Per round: 4J (comm) + 100J (10 epochs) = 104J

    - Rounds affordable: 720J / 104J = 6.9 → **7 rounds**

    - Battery drain: 7 × 104J = 728J → 2.0% ✓

    - Cloud cost: 7 × $2 = **$14**


    | Config | Rounds | Edge Energy | Battery % | Cloud Cost | Feasible? |

    |--------|--------|------------|-----------|------------|----------|

    | A | 100 | 5,000 J | 13.8% | $200 | No |

    | B | 20 | 2,800 J | 7.7% | $40 | No |

    | C (compressed) | 7 | 728 J | 2.0% | $14 | **Yes** |


    **Key ratios:** Communication is 4× more expensive than compute per unit time. Model compression unlocks
    FL feasibility on battery-constrained devices. The winning formula: maximize local epochs + minimize
    rounds + compress aggressively.'
  options:
  - 'Config A drains 13.8% battery and costs $200; Config B drains 7.7% and costs $40. Neither meets the 2% battery limit without model compression.'
  - 'Config A meets the 2% battery limit because it only runs 1 local epoch, whereas Config B drains 7.7% battery due to the high compute cost of 10 epochs.'
  - 'Config B meets the 2% battery limit because it reduces communication rounds from 100 to 20, saving massive amounts of Tx/Rx energy.'
  - 'Both configurations meet the 2% battery limit, but Config B is preferred because it reduces cloud costs from $200 to $40.'
