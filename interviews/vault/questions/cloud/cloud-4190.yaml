title: Memory Coalescing in Attention Kernels
scenario: Your attention kernel on MI300X reads Q, K, V matrices. Q is stored in row-major
  order (batch × heads × seq × dim) but your kernel accesses it column-wise for the
  dot product with K^T. Profiling shows 4× lower HBM bandwidth utilization than expected.
  Explain the coalescing problem and the fix.
question: Why does column-wise access to row-major Q/K data destroy coalescing on
  MI300X, and how would you fix the layout or tiling?
details:
  realistic_solution: 'Row-major Q[batch][head][seq][dim=128]: consecutive elements
    in dim are contiguous. Thread i in a wavefront reads Q[b][h][s][i] — these are
    contiguous, so reading a row of Q is coalesced. But K^T requires reading K[b][h][:][d]
    — all sequence positions for a single dim value. These are 128 × 2 = 256 bytes
    apart. A 64-thread wavefront accesses 64 addresses each 256 bytes apart — spanning
    16 KB, requiring 64 cache lines instead of 1. Fix: (1) Transpose K to K^T layout
    before the kernel. Cost: one-time transpose via shared memory (fast). (2) Use
    shared memory tiling: load a BK×D tile of K into shared memory (coalesced read),
    then access from shared memory (bank-conflict-free with padding). (3) Use the
    BHSD → BSHD layout for K so sequence-dimension access is contiguous. FlashAttention
    does (2) — loads tiles of Q, K, V into shared memory with coalesced reads, then
    computes from SRAM.'
  common_mistake: Ignoring memory layout when writing CUDA/HIP kernels. GPUs coalesce
    memory accesses — adjacent threads must access adjacent memory addresses. Column-wise
    access of a row-major matrix causes each thread to read from addresses 4096 ×
    2 = 8192 bytes apart, generating 64 separate memory transactions instead of 1.
  napkin_math: 'Coalesced read: 64 threads × 2 bytes = 128 bytes = 1 cache line. Achieves
    100% bandwidth. Uncoalesced column access: 64 threads × 256-byte stride = 64 cache
    lines × 128 bytes = 8192 bytes loaded, 128 bytes used. Efficiency: 128/8192 =
    1.56%. Bandwidth: MI300X HBM 5.3 TB/s × 1.56% = 82.7 GB/s effective. After tiling
    to shared memory: read K tile coalesced, compute from SRAM at 32 TB/s. Effective
    bandwidth: >90% of 5.3 TB/s = 4.77 TB/s. Speedup: 57×.'
