title: Graceful Degradation Under Replica Failures
scenario: A cloud image moderation service runs 20 GPU replicas. Each replica handles 80 requests/s at target latency. Traffic is 1,300 requests/s. A zone incident removes 5 replicas. The team can either queue all requests, drop low-priority requests, or fall back to a smaller CPU model for low-risk traffic. Diagnose the binding wall and choose a degradation strategy.
question: What degradation strategy should you use when 5 of 20 GPU replicas fail under 1,300 requests/s of traffic?
details:
  realistic_solution: 'Capacity falls from 1,600 to 1,200 requests/s, below demand. The binding wall is fragility/capacity loss, not model accuracy. Queueing all requests will violate latency. The right strategy is graceful degradation: reserve GPU capacity for high-risk traffic and route low-risk traffic to a smaller CPU model or shed it.'
  common_mistake: Trying to preserve identical quality for every request and letting queues explode for all users.
  napkin_math: After failure capacity = 15 x 80 = 1,200 rps. Demand = 1,300 rps, deficit = 100 rps. At minimum, 7.7% of traffic needs fallback or shedding.
