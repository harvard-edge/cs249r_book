title: 'Diagnosing Failed Overlap: NCCL Blocking on Compute Stream'
scenario: 'You set up DDP with gradient bucketing and NCCL on a separate CUDA stream. Nsight Systems profiling shows that the AllReduce kernels run sequentially with backward computation. Both the compute and NCCL kernels appear on the same stream in the timeline.'
question: Why are the NCCL AllReduce kernels failing to overlap with the backward computation, running sequentially instead?
details:
  realistic_solution: 'Check NCCL_LAUNCH_MODE environment variable. Before NCCL 2.19: default is PARALLEL, which uses separate streams. In some configurations, it can be GROUP, which serializes NCCL calls. Set NCCL_LAUNCH_MODE=PARALLEL explicitly. Also verify backward hooks and whether an implicit cudaStreamSynchronize() exists.'
  common_mistake: |
    **The Pitfall:** Assuming PyTorch DDP always creates a separate NCCL stream by default.
    **The Rationale:** Depending on the NCCL version and environment, `NCCL_LAUNCH_MODE` may serialize calls if not explicitly set to `PARALLEL`.
    **The Consequence:** Missing communication-computation overlap, leading to a significant drop in training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200ms backward compute.
    - 50ms AllReduce.

    **Calculations:**
    - Serialized Execution: 200ms + 50ms = 250ms per step.
    - Overlapped Execution: max(200, 50) = 200ms per step.
    - Throughput Loss: 50ms / 250ms = 20%.

    **Conclusion & Interpretation:**
    - **Result: 20% throughput loss from missing overlap (Concurrency-Bound).**
