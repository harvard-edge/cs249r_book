title: Checkpoint Efficiency and SLA Targets
scenario: You are training a 500B-parameter LLM (assume 16 bytes per parameter for weights and optimizer state) on a large cluster. The cluster MTBF is exactly 250 minutes. Your current distributed storage writes at 40 GB/s, and checkpointing blocks training. Management has specified a strict SLA of >= 90% overall training efficiency (i.e., <= 10% time wasted on checkpointing and failure recovery).
question: Evaluate whether the current storage backend can meet the 90% efficiency SLA using optimal checkpointing, and if not, specify the minimum write bandwidth required.
visual:
  kind: svg
  path: cloud-2852.svg
  alt: Timeline diagram illustrating normal operation with checkpoints, a crash failure,
    the lost work interval (RPO), and the recovery time (RTO).
  caption: Checkpointing timeline showing the tradeoff between interval frequency
    (T) and the lost work upon failure.
details:
  realistic_solution: The 500B parameter model produces an 8 TB checkpoint (500e9 * 16 bytes). At 40 GB/s, the checkpoint write time C is 200 seconds (3.33 minutes). By minimizing the overhead function O(T) = C/T + T/(2M), the optimal overhead bound is sqrt(2C/M). With current hardware, min overhead is sqrt(2 * 3.33 / 250) = 16.3%, failing the 10% SLA. To achieve <= 10% overhead, we need sqrt(2C/250) <= 0.1, meaning C <= 1.25 minutes (75 seconds), which requires a minimum storage bandwidth of 8 TB / 75 s = 106.7 GB/s.
  common_mistake: |
    **The Pitfall:** Only accounting for checkpoint write time and ignoring expected recovery overhead.
    **The Rationale:** Candidates intuitively understand the direct cost of taking a checkpoint but forget the probabilistic cost of lost work when a failure occurs.
    **The Consequence:** They fail to minimize the full overhead function and cannot mathematically prove whether the SLA is achievable.
  napkin_math: |
    1. Checkpoint Size: 500B params * 16 bytes = 8,000 GB (8 TB).
    2. Write Time (C): 8,000 GB / 40 GB/s = 200 seconds = 3.33 minutes.
    3. Minimum Overhead Bound: sqrt(2 * C / M) = sqrt(2 * 3.33 / 250) = sqrt(0.02664) = 16.3%.
    4. Status: 16.3% > 10% SLA (Fails).
    5. Target Overhead: sqrt(2 * C / 250) <= 0.1 -> 2C / 250 = 0.01 -> 2C = 2.5 -> C = 1.25 minutes (75 seconds).
    6. Minimum Bandwidth: 8,000 GB / 75 seconds = 106.7 GB/s.
    7. **Result: Fails SLA; minimum bandwidth required is 106.7 GB/s.**
