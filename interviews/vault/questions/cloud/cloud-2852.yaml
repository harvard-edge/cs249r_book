title: Checkpoint Efficiency and SLA Targets
scenario: You are training a 500B-parameter LLM (assume 16 bytes per parameter for
  weights and optimizer state) on a large H100 cluster. The cluster MTBF is exactly
  250 minutes. Your current distributed storage writes at 40 GB/s, and checkpointing
  blocks training. Management has specified a strict SLA of >= 90% overall training
  efficiency (i.e., <= 10% time wasted on checkpointing and failure recovery).
question: Evaluate whether the current storage backend can meet the 90% efficiency
  SLA using the mathematically optimal checkpoint interval, and if not, specify the
  minimum checkpoint write bandwidth required.
visual:
  kind: svg
  path: cloud-2852.svg
  alt: Timeline diagram illustrating normal operation with checkpoints, a crash failure,
    the lost work interval (RPO), and the recovery time (RTO).
  caption: Checkpointing timeline showing the tradeoff between interval frequency
    (T) and the lost work upon failure.
details:
  realistic_solution: The 500B parameter model produces an 8 TB checkpoint (500e9
    * 16 bytes). At 40 GB/s, the checkpoint write time C is 200 seconds (3.33 minutes).
    By minimizing the overhead function O(T) = C/T + T/(2M), the optimal overhead
    bound is sqrt(2C/M). With current hardware, min overhead is sqrt(2 * 3.33 / 250)
    = 16.3%, failing the 10% SLA. To achieve <= 10% overhead, we need sqrt(2C/250)
    <= 0.1, meaning C <= 1.25 minutes (75 seconds), which requires a minimum storage
    bandwidth of 8 TB / 75 s = 106.7 GB/s.
  common_mistake: Only accounting for the checkpoint write time overhead (C/T) and
    ignoring the expected recovery overhead (T/2M), or failing to minimize the overhead
    function to find the mathematical lower bound.
  napkin_math: Size = 8TB; C = 8000/40 = 200s = 3.33m. Min_Overhead = sqrt(2 * 3.33
    / 250) = 16.3% > 10%. Target_C = (0.1^2 * 250) / 2 = 1.25m = 75s. Min_BW = 8000
    GB / 75 s = 106.7 GB/s.
