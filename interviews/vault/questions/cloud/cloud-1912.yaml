title: Diagnosing Low Utilization in DLRM Lookups
scenario: You are profiling a large-scale DLRM on a node with 8x NVIDIA A100 (80GB) GPUs. The multi-hot
  embedding lookup layer consumes 70% of the total step time. Nsight Systems shows GPU SM utilization
  at 8% and achieved memory bandwidth at only 150 GB/s (out of the 2039 GB/s theoretical peak). The embedding
  vectors are 16-dimensional FP32. Why is the pipeline stalling, and what specific architectural constraint
  is causing this severe underutilization?
question: "Why is the pipeline stalling, and what specific architectural constraint is causing this severe underutilization?"
details:
  realistic_solution: Diagnose the issue as a 'sparse scatter/gather' bottleneck caused by uncoalesced,
    random memory accesses. The hardware is bottlenecked by transaction latency and cache line granularity,
    not theoretical bulk bandwidth. Mitigate by sorting queries by embedding ID to improve L2 cache locality,
    using frequency-aware placement (hot embeddings in HBM, cold in host memory), and leveraging optimized
    frameworks like NVIDIA HugeCTR.
  common_mistake: Candidates often blame the low utilization on CPU-GPU PCIe transfer bottlenecks or lack
    of computational intensity, proposing unhelpful solutions like INT8 quantization or kernel fusion
    without addressing the irregular memory access pattern.
  napkin_math: An A100 fetches memory in 128-byte cache lines. A 16-dim FP32 embedding is 64 bytes. If
    accesses are completely random (sparse scatter), every 64-byte read forces a 128-byte transaction.
    50% of the bandwidth is instantly wasted fetching unused data. Moreover, random accesses incur ~200-300ns
    of latency per uncoalesced read, saturating the memory controllers' transaction queues long before
    the 2039 GB/s bulk bandwidth limit is reached.
