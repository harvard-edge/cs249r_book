title: The Two-Node Scaling Cliff
scenario: You are an ML Systems Engineer at a startup scaling up the training of a new 175B parameter
  LLM. On a single DGX H100 server with 8 GPUs connected by NVLink, you achieve a stable training throughput.
  To accelerate training, you are given a second, identical server connected via an InfiniBand NDR switch
  (400 Gbps). When you scale the job from 8 GPUs to 16 GPUs across the two nodes, you observe that your
  training throughput only increases by 20%, far short of the near-linear scaling you expected. Your profiler
  shows that the time spent in the `all_reduce` communication step has increased dramatically. Diagnose
  the most likely hardware bottleneck responsible for this poor scaling performance.
details:
  realistic_solution: The bottleneck is the InfiniBand network connecting the two servers. While extremely
    fast for a traditional HPC network, its bandwidth is an order of magnitude lower than the NVLink fabric
    connecting the GPUs within a single server. The `all_reduce` operation for synchronizing gradients,
    which was previously contained within the ultra-high-bandwidth NVLink domain, must now traverse the
    significantly slower inter-node link. This creates a communication bottleneck that dominates the total
    step time, leading to poor scaling efficiency.
  common_mistake: Engineers often underestimate the massive bandwidth gap between on-node and off-node
    interconnects. They might blame software (NCCL, drivers) or a different hardware component like PCIe,
    without calculating the data volume versus the available bandwidth of the different communication
    fabrics.
  napkin_math: Let's calculate the time to transfer the gradients for a 175B model during the all-reduce
    phase.
  options:
  - The PCIe Gen5 bus connecting the GPUs to the CPU is saturated by the increased data load from 16 GPUs.
  - The InfiniBand network connecting the two servers has insufficient bandwidth for the gradient exchange
    of a 175B model.
  - The NCCL collective communication library is misconfigured, causing it to use a slow, non-RDMA protocol
    over the network.
  - The CPU on the head node is unable to orchestrate the `all_reduce` operation across 16 GPUs, causing
    a control plane bottleneck.
  correct_index: 1
