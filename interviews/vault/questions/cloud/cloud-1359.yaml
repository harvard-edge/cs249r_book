title: Evaluating GPU Redundancy Trade-offs
scenario: Your team is building a high-reliability cloud inference service for a medical diagnostics application running on 500 H100 GPUs. The base silent data corruption (SDC) rate is 400 FIT per GPU. A recent SDC resulted in a misdiagnosis. You must evaluate between Double Modular Redundancy (DMR), which detects faults and halts/recomputes, and Triple Modular Redundancy (TMR), which masks faults via majority voting. The P99 latency SLA is 100ms, and a single inference takes 40ms.
question: "Should you use DMR or TMR for the 500-GPU medical inference service, given a 100ms SLA and 40ms inference time?"
details:
  realistic_solution: Select DMR. TMR requires 1500 GPUs (3x baseline cost), whereas DMR requires 1000 GPUs (2x cost). Since inference takes 40ms, a DMR mismatch triggers a recompute taking another 40ms. The total 80ms execution time remains safely under the 100ms SLA, providing equivalent functional reliability at significantly lower cost.
  common_mistake: |
    **The Pitfall:** Automatically choosing TMR for maximum reliability without analyzing the cost overhead or SLA buffer.
    **The Rationale:** Engineers working on life-critical systems often default to the highest redundancy level without calculating if a cheaper solution meets the SLA.
    **The Consequence:** The company spends 3x on GPU hardware when a 2x solution would have provided identical functional reliability within SLA.
  napkin_math: |
    *   **Fleet FIT:** 500 GPUs $\times$ 400 FIT = 200,000 faults / 10^9 hours = 0.0002 faults/hr.
    *   **MTBF:** 1 / 0.0002 = 5,000 hours ($\approx 208$ days).
    *   **DMR Latency Impact:** A mismatch triggers a recompute (40ms + 40ms = 80ms total), which stays safely under the 100ms SLA.
    *   **Result:** **DMR provides the required reliability and meets latency constraints while saving 500 H100 GPUs compared to TMR.**
