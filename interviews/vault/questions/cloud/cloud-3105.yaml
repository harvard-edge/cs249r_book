title: 'TCO Realization: Concretely Size H100 Cluster Budget for Startup'
scenario: 'A startup has a $500K/year ML infrastructure budget. They need to train a 13B model (2T tokens, 1.56e23 FLOPs) twice a year and run inference at 10 req/s steady state. Concretely allocate the budget across training compute, inference compute, and storage. Use H100 on-demand pricing ($2.50/hr) and specify GPU counts.'
question: 'What H100 FP16 throughput and 8-GPU aggregate FLOPs should you use when allocating the $500K ML infrastructure budget?'
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS per GPU. 8-GPU system aggregate: 7.9 PFLOPs/s at 100% utilization.'
  common_mistake: |
    **The Pitfall:** Allocating the entire budget to training without reserving sufficient capacity for inference, or vice versa.
    **The Rationale:** Candidates often fail to balance the distinct resource and time profile requirements of episodic training versus continuous inference.
    **The Consequence:** The startup runs out of budget to serve the model they just trained, or lacks the burst compute needed to finish training within a reasonable timeframe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: $500K/year.
    - Model: 13B params, 1.56e23 FLOPs training requirement.
    - H100 Pricing: $2.50/hr. Peak FP16: 989 TFLOPS.

    **Calculations:**
    - 8-GPU Peak: 8 * 989 TFLOPS = 7.91 PFLOPs/s.
    - Effective Compute (50% MFU): 3.95 PFLOPs/s.
    - Total FLOPs for 2 runs: 1.56e23 * 2 = 3.12e23.
    - Training time: 3.12e23 / 3.95e15 = 78,987 seconds (~22 hours).
    - Training Cost: 22 hrs * 8 GPUs * $2.50 = $440.

    **Conclusion & Interpretation:**
    - **Result: Inference-Dominant TCO.** Training only consumes $440 of the $500K budget; >99% must be allocated to inference and storage.
