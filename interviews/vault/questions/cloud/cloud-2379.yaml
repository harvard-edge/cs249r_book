title: OTA Delta Updates for Wearables
scenario: 1M wearables (256KB SRAM, 1MB Flash) need a daily 200KB TFLite Micro model update via a phone
  gateway. BLE throughput is 50 kbps, drawing 10mA. The device has a 300mAh battery. Pushing the full
  model daily consumes too much power and flash wear. Architect the cloud-to-edge update pipeline.
question: "How would you design the cloud-to-wearable update pipeline for daily 200KB model updates over 50 kbps BLE?"
details:
  realistic_solution: Implement cloud-computed delta updates. The cloud calculates the binary diff between
    the old and new model versions. The wearable receives the diff in small chunks over BLE and writes
    directly to a secondary flash slot, reconstructing the new model in-place. This saves BLE active time,
    battery life, and bypasses the 256KB SRAM bottleneck.
  common_mistake: Downloading the entire 200KB model into SRAM over BLE before writing to flash, which
    OOMs the 256KB SRAM.
  napkin_math: 'Full model: 200KB = 1600 kbits. At 50 kbps = 32s BLE active * 10mA = 320 mAs. Delta update
    (e.g., 10KB diff): 80 kbits / 50 kbps = 1.6s BLE active * 10mA = 16 mAs. Power reduction of 20x per
    daily update.'
