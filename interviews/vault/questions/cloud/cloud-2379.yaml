title: OTA Delta Updates for Wearables
scenario: 1M wearables (256KB SRAM, 1MB Flash) need a daily 200KB TFLite Micro model update via a phone gateway. BLE throughput is 50 kbps, drawing 10mA. The device has a 300mAh battery. Pushing the full model daily consumes too much power and flash wear.
question: How would you architect the cloud-to-wearable update pipeline for a 200KB model over 50 kbps BLE to minimize power and SRAM usage?
details:
  realistic_solution: |
    Implement cloud-computed delta updates. The cloud calculates the binary diff between the old and new model versions. The wearable receives the diff in small chunks over BLE and writes directly to a secondary flash slot, reconstructing the new model in-place. This saves BLE active time, battery life, and bypasses the 256KB SRAM bottleneck.
  common_mistake: |
    **The Pitfall:** Downloading the entire 200KB model into SRAM over BLE before writing to flash.
    **The Rationale:** It's the standard way to download files.
    **The Consequence:** This OOMs the 256KB SRAM and drains the battery rapidly.
  napkin_math: |
    - **Full Model Update:** 200KB = 1600 kbits. At 50 kbps = 32s BLE active * 10mA = 320 mAs.
    - **Delta Update (Cloud-computed diff):** Assume a 10KB diff. 80 kbits / 50 kbps = 1.6s BLE active * 10mA = 16 mAs.
    - **Conclusion: The delta update yields a power reduction of 20x per daily update.**
