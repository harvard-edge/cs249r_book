title: The RAG Update Memory Footprint
scenario: You're operating a critical safety service for an autonomous fleet that uses Retrieval-Augmented
  Generation (RAG) to answer questions about traffic regulations. An urgent update to a regional law requires
  you to re-index 1,000,000 documents in your vector database. Your system generates 4096-dimensional
  embeddings for each document, storing them in FP16 precision. Your rollout strategy is blue-green, requiring
  you to build the new index on a separate, identical infrastructure before switching over. Explain the
  memory implications of this update and calculate the additional storage required just for the new embeddings.
details:
  realistic_solution: The problem requires calculating the storage size for the new vector index. A blue-green
    deployment means we need to allocate this much *additional* memory to build the new index before tearing
    down the old one. The calculation is a direct multiplication of the number of documents, the dimensions
    per document, and the bytes required for the specified precision (FP16). FP16 requires 2 bytes per
    value.
  common_mistake: Engineers often confuse the memory requirements for different parts of the system. They
    might calculate the memory for the LLM itself instead of the RAG database. Another common mistake
    is using the wrong number of bytes for a given precision, for example, using 4 bytes (FP32) for an
    FP16 value, doubling the final estimate.
  napkin_math: A single vector is 4,096 dimensions. In FP16 (2 bytes per dimension), one vector = 8,192
    bytes. For 1,000,000 documents, total size = 1,000,000 * 8,192 = 8,192,000,000 bytes ≈ 8.19 GB. During
    a blue-green deployment, both the old and new indices must be kept in memory simultaneously, so you
    need an additional 8.19 GB of RAM to perform the update seamlessly.
  options:
  - ~4.1 GB
  - ~16.4 GB
  - ~8.2 GB
  - ~14 GB
  correct_index: 2
