title: 'Optimizing Real-time LLM Inference on Google TPU v5e via Knowledge Distillation'
scenario: 'You are optimizing a 15 billion parameter LLM (BF16) deployed on Google TPU v5e devices. The model struggles to meet a 50ms latency target under peak load (batch size 1) because its size requires multi-device partitioning.'
question: 'What is the TPU v5e bottleneck for the 15B BF16 teacher, and how would you distill a student to hit 50 ms while retaining 98% accuracy?'
details:
  realistic_solution: 'The primary bottleneck is the teacher model''s memory footprint (~30GB) exceeding the single TPU v5e''s 16 GB HBM. Distill a 5-7B parameter student using logit matching and feature distillation to fit within 16GB HBM, eliminating inter-chip communication latency.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to pruning instead of knowledge distillation, or ignoring hardware memory constraints.
    **The Rationale:** Candidates often view pruning as the default compression method, forgetting that it requires extensive retraining and may not effectively utilize the TPU's specific HBM limits.
    **The Consequence:** The resulting model either fails to recover accuracy or continues to suffer from poor memory access patterns, failing the 50ms SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e has 16 GB HBM.
    - 15B model in BF16 (2 bytes/param).
    - Latency target: 50ms (batch size 1).

    **Calculations:**
    - Teacher footprint: 15B × 2 bytes = 30 GB (requires 2 TPUs, inter-chip latency overhead).
    - Student target: 6-7B × 2 bytes = ~12-14 GB (fits entirely in 1 TPU v5e).

    **Conclusion & Interpretation:**
    - **Result: 14GB student fits 16GB HBM (Inter-Chip-Latency-Bound)**. Distillation avoids multi-device partitioning.
