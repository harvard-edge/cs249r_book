title: The Streaming Feature Consistency Trap
scenario: Your fraud detection model uses a streaming feature 'rolling_30min_transaction_count'. During a Kafka consumer rebalance, the Flink job restarts from a checkpoint. After recovery, some users are temporarily double-counted as events between the last checkpoint and the failure are replayed, flagging legitimate users as fraudsters.
question: How do you ensure exactly-once semantics for streaming features to prevent double-counting during rebalances?
details:
  realistic_solution: 'The double-counting happens because Flink checkpoints capture Kafka offsets, but the feature store write is not atomically coupled. On recovery, replayed events are applied twice. The practical fix is idempotent writes: include a sequence number or `event_id` with each feature update so the feature store deduplicates on write using upsert semantics.'
  common_mistake: |
    **The Pitfall:** Assuming Kafka and Flink's internal exactly-once guarantees automatically extend end-to-end.
    **The Rationale:** The framework promises "exactly-once", but engineers forget this only covers internal state and compatible sinks.
    **The Consequence:** Corrupted feature stores during routine operational turbulence, leading to massive spikes in false positives.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rebalance frequency: ~1-2 per day in a healthy cluster.
       - Checkpoint interval: 1 minute.
       - Throughput: 10,000 events/sec.
    2. **Calculations:**
       - Events replayed per rebalance = 60s * 10,000 events/sec = 600,000 events.
       - Affected users (assuming 1% hit): ~6,000 users with inflated transaction counts.
    3. **Conclusion & Interpretation:**
       - **Result: False Positives Spike.** At a strict 0.1% fraud threshold, these doubled velocities flag hundreds of false positives instantly.
