title: Evaluating Pipeline Correction Cascades
scenario: A cloud ad-serving pipeline runs three sequential models: Candidate Generation (CG), Click-Through Rate (CTR) prediction, and Conversion Rate (CVR) prediction. After a data drift event, the CG model's recall drops. An engineer proposes a hotfix: blindly appending 100 historical 'fallback' ads to the CG output to maintain the 1000-ad downstream quota. This shifts the CTR model's input distribution, dropping its calibration. A second engineer proposes adding a temperature scaling calibration step to the CTR model's output to fix the metrics, which in turn shifts the CVR model's inputs.
question: Should you accept the fallback-ad and CTR temperature-scaling hotfixes, or fix the CG model directly, and why?
details:
  realistic_solution: Reject the cascading patches. Appending fallback ads broke the implicit statistical contract between CG and CTR. Each subsequent patch masks the root cause and tightly couples the pipeline. The correct decision is to fix the CG model's recall directly (via retraining or feature updates) rather than patching downstream models.
  common_mistake: |
    **The Pitfall:** Accepting local patches as valid fixes.
    **The Rationale:** Candidates praise the use of temperature scaling as a smart tactical fix without recognizing the catastrophic architectural anti-pattern it enables.
    **The Consequence:** Severe boundary erosion between pipeline stages, permanently degrading the maintainability of the ad-serving system.
  napkin_math: |
    *   **Critical Path Latency:** Adding 2 calibration layers adds new compute steps. If each takes 5ms, 10ms is burned on a strict latency budget.
    *   **State Space Complexity:** Tuning 1 model becomes tuning 3 tightly coupled models. The probability of an aligned rollback approaches zero.
    *   **Result:** The patches induce a **Correction Cascade**, multiplying technical debt and making the system mathematically intractable to debug.
