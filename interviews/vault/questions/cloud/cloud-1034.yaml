title: Evaluating Pipeline Correction Cascades
scenario: 'A cloud ad-serving pipeline runs three sequential models: Candidate Generation (CG), Click-Through
  Rate (CTR) prediction, and Conversion Rate (CVR) prediction. After a data drift event, the CG model''s
  recall drops. An engineer proposes a hotfix: blindly appending 100 historical ''fallback'' ads to the
  CG output to maintain the 1000-ad downstream quota. This shifts the CTR model''s input distribution,
  dropping its calibration. A second engineer proposes adding a temperature scaling calibration step to
  the CTR model''s output to fix the metrics, which in turn shifts the CVR model''s inputs. Evaluate this
  series of proposed architectural changes.'
question: "Should you accept the fallback-ad and CTR temperature-scaling hotfixes, or fix the CG model directly, and why?"
details:
  realistic_solution: Reject the cascading patches. Appending fallback ads broke the implicit statistical
    contract between CG and CTR. Each subsequent patch masks the root cause and tightly couples the pipeline.
    The correct decision is to fix the CG model's recall directly (via retraining or feature updates)
    rather than patching downstream models.
  common_mistake: Accepting the local patches as valid fixes (e.g., praising temperature scaling) without
    recognizing the 'Correction Cascade' anti-pattern and the severe boundary erosion it causes between
    pipeline stages.
  napkin_math: 'Adding 2 calibration layers adds new compute steps in the critical path. If each takes
    5ms, we add 10ms to a strict 100ms budget. More importantly, state space complexity grows multiplicatively:
    tuning 1 model becomes tuning 3 coupled models, making future rollbacks mathematically intractable.'
