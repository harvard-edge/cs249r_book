title: Analyze Chinchilla Compute-Optimal Training Budget on H100
scenario: 'Your team has a compute budget of $5M and access to H100 GPUs at $2.50/GPU/h.
  H100 achieves 45% MFU on transformer training (peak 989 TFLOP/s FP16). Chinchilla
  scaling law: compute-optimal training requires N* ≈ sqrt(C/6) parameters and D*
  = 6N* tokens (where C is total training FLOPs). Analyze: what is the compute-optimal
  model size and token count for your budget, and how do they compare to GPT-3''s
  training?'
question: What compute-optimal model size and token count does a $5M H100 training
  budget buy, and how does it compare to GPT-3?
details:
  realistic_solution: 'Effective throughput per H100: 989 × 0.45 = 445 TFLOP/s. Budget
    = $5M. GPU-hours: $5M / $2.50 = 2M GPU-hours. Total FLOP: 2M × 3600s × 445 × 10¹²
    = 3.2 × 10²⁴ FLOPs. Chinchilla: N* = sqrt(C/6) = sqrt(3.2×10²⁴/6) = sqrt(5.33×10²³)
    = 7.3×10¹¹ = 730B parameters. D* = 6 × 730B = 4.38T tokens. Comparison: GPT-3
    used 300B tokens to train 175B params (under-trained by Chinchilla). GPT-4 estimated
    ~13T tokens for ~1.8T params.'
  common_mistake: Forgetting to convert dollar budget to FLOP budget before applying
    Chinchilla; also using peak TFLOP/s instead of MFU-adjusted effective throughput.
  napkin_math: 'C = 2M GPU-h × 3600s × 445 TFLOP/s = 3.2×10²⁴ FLOPs. N* = √(C/6) =
    √(5.33×10²³) = 7.3×10¹¹ ≈ 730B. D* = 6N* = 4.38T tokens. Chinchilla ratio: D*/N*
    = 6. GPT-3 actual: 300B/175B = 1.7 tokens/param (7× undertrained vs Chinchilla).
    $5M budget → Chinchilla-optimal 730B model.'
