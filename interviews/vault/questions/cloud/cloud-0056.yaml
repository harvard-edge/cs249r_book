title: 'The On-Node Interconnect Tax: NVLink vs. PCIe'
scenario: You're profiling a model training job on a multi-GPU server and notice significant data transfer
  overhead. To build a mental model of the costs, you compare the latencies of the main on-node interconnects.
  Roughly how much slower is a data transfer over a standard PCIe Gen5 bus compared to a direct GPU-to-GPU
  transfer using NVLink 4.0?
question: "Roughly how much slower is a data transfer over a standard PCIe Gen5 bus compared to a direct GPU-to-GPU transfer using NVLink 4.0?"
details:
  realistic_solution: A PCIe Gen5 transfer is approximately 2x slower than an NVLink 4.0 transfer. The
    latency for a direct GPU-to-GPU transfer over NVLink is ~500 ns, while traversing the PCIe bus to
    another device takes around 1,000 ns (1 µs). While both are extremely fast, this 2x difference is
    critical for high-frequency communication patterns like those in model-parallel or data-parallel training.
  common_mistake: Engineers often confuse latency with bandwidth. While NVLink's *bandwidth* can be an
    order of magnitude higher than PCIe, its *latency* advantage for a single transfer is much smaller.
    It's also common to lump all 'fast' on-board interconnects together, forgetting that the physical
    path (direct GPU-to-GPU vs. via CPU/motherboard) has a real, measurable latency cost.
  napkin_math: 'Using the ''human time'' analogy where 1 ns is 1 second:'
  options:
  - About the same latency
  - ~10x slower
  - ~2x slower
  - ~18x slower
  correct_index: 2
