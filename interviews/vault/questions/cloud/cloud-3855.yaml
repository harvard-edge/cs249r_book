title: Architecting Mixed-Precision Training for a 100B LLM
scenario: Architect a mixed-precision training pipeline for a 100B parameter LLM on a cluster of H100 GPUs. You must specify the numerical formats (FP32, BF16, FP16) for model weights, activations, gradients, and optimizer states across the forward pass, backward pass, and weight update. Justify your architectural choices regarding numerical stability, memory footprint, and compute utilization.
question: "What mixed-precision formats would you use for weights, activations, gradients, and optimizer states when training the 100B LLM, and why?"
details:
  realistic_solution: 'The optimal architecture uses BF16 for weights, activations, and gradients during the forward and backward passes. This leverages the H100''s peak Tensor Core throughput while avoiding the complex dynamic loss scaling required by FP16, thanks to BF16''s larger 8-bit exponent. Crucially, master weights and Adam optimizer states (momentum and variance) must be maintained in FP32 to ensure precise accumulation of weight updates and convergence. The primary architectural benefit is halving activation memory and maximizing compute bandwidth, rather than shrinking the model state.'
  common_mistake: |
    **The Pitfall:** Assuming mixed-precision inherently halves the model's total memory footprint, or applying FP16/BF16 uniformly across all states.
    **The Rationale:** Candidates neglect the strict requirement for FP32 master weights and optimizer states to prevent catastrophic underflow during small gradient updates.
    **The Consequence:** The model will fail to converge due to gradient underflow, or the training will collapse from numerical instability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100B parameter model.
       - FP32 Adam optimizer.
    2. **Calculations:**
       - Pure FP32: 4B (Weights) + 4B (Gradients) + 8B (Adam Optimizer) = 16 Bytes/param.
       - Mixed-Precision: 2B (BF16 Weights) + 2B (BF16 Gradients) + 4B (FP32 Master Weights) + 8B (FP32 Adam) = 16 Bytes/param.
       - 100B * 16B = 1.6 TB total model state in both paradigms.
    3. **Conclusion & Interpretation:**
       - **Result: Model state memory remains 1.6 TB; the benefit is unlocked compute bandwidth and halved activation memory.** (Compute-Bound Optimization).
