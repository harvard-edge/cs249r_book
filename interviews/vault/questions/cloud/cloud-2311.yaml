title: Distributed Storage Metadata Thrashing
scenario: You are scaling a distributed ResNet-50 training job from 16 to 128 GPUs on a shared Network File System (NFS) storing 14 million individual 150KB JPEG files. At 16 GPUs, throughput is 10,000 imgs/sec. At 128 GPUs, total throughput collapses to 2,000 imgs/sec.
question: "Why does ResNet-50 throughput collapse when scaling from 16 to 128 GPUs on NFS, and how would you redesign storage?"
details:
  realistic_solution: |
    The symptom of throughput violently collapsing (not just diminishing returns, but actual degradation) as node count increases against a shared file system indicates metadata server thrashing. 128 GPUs concurrently opening random small files overwhelms the NFS metadata server's IOPS limit. The file system spends all its time locking and resolving inodes rather than serving data. The solution is twofold: First, at the application layer, convert the dataset from millions of small files into large sequential shards (e.g., TFRecord, WebDataset) to drastically reduce file OPEN operations. Second, at the infrastructure layer, migrate from standard NFS to a parallel file system (like Lustre) where metadata servers are decoupled from object storage targets, and utilize local NVMe SSDs on the GPU nodes for caching the shards.
  common_mistake: |
    **The Pitfall:** Assuming the network bandwidth is saturated or blaming PyTorch DDP synchronization.
    **The Rationale:** Candidates often focus on network throughput instead of analyzing the underlying storage I/O limits of millions of small files.
    **The Consequence:** Upgrading NICs to 400Gbps provides zero benefit because the system remains bottlenecked by metadata server IOPS.
  napkin_math: |
    - **Calculate target throughput:** Linear scaling for 128 GPUs is 128 * (10,000 / 16) = 80,000 imgs/sec.
    - **Calculate required IOPS:** This requires 80,000 file OPEN ops/sec.
    - **Analyze NFS limit:** A standard cloud NFS metadata server maxes out around 30,000 IOPS.
    - **Analyze bandwidth:** 80,000 imgs * 150KB = 12GB/s bandwidth, easily within network limits.
    - **Conclusion:** **At 80k concurrent requests, the metadata server queue overflows, confirming the bottleneck is metadata IOPS, not bandwidth.**
