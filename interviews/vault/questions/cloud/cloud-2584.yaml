title: Cloud Qlora L5 0
scenario: For fine-tuning a 70B model, evaluate: (A) QLoRA on 1 × 48 GB GPU ($2/hr, 3 days), (B) full fine-tuning on 16 × A100 80 GB with FSDP ($32/hr, 1 day), (C) LoRA without quantization on 4 × A100 80 GB ($8/hr, 2 days).
question: Which 70B fine-tuning option is best across quality, cost, and speed: QLoRA, full fine-tuning, or unquantized LoRA?
details:
  realistic_solution: 'Option A (QLoRA, 1 GPU): cost = 3 × 24 × $2 = $144. Quality: ~95-97% of full fine-tuning on most benchmarks. Slowest due to dequantization overhead and single GPU. Good for prototyping. Option B (full fine-tune, 16 GPUs): cost = 1 × 24 × $32 = $768. Quality: 100% (gold standard). Fastest wall-clock. But 5.3x more expensive than A. Only justified if the 3-5% quality gap matters (e.g., specialized domain). Option C (LoRA, 4 GPUs): cost = 2 × 24 × $8 = $384. Quality: 97-99% of full fine-tuning. Middle ground. No quantization noise. Best balance of cost, quality, and speed. Recommendation: start with A for experimentation, graduate to C for production fine-tuning, use B only if quality gap is measurable and business-critical.'
  common_mistake: |
    **The Pitfall:** Blindly choosing full fine-tuning simply because it delivers the absolute maximum quality.
    **The Rationale:** Engineers optimize for raw model performance without factoring in the massive infrastructure cost required.
    **The Consequence:** Spending 5.3x the budget for a marginal 3-5% performance improvement that is statistically indistinguishable in many downstream tasks.
  napkin_math: |
    1. Option A (QLoRA): $2/hr × 72 hrs = $144. (~96% quality).
    2. Option B (Full): $32/hr × 24 hrs = $768. (100% quality).
    3. Option C (LoRA): $8/hr × 48 hrs = $384. (~98% quality).
    4. Cost per quality point: A=$1.5, B=$7.68, C=$3.92.
    5. **Result: QLoRA (A) is 5x more cost-efficient per quality point, while LoRA (C) is a robust middle ground.**
