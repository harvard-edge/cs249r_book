title: Cloud Qlora L5 0
scenario: 'For fine-tuning a 70B model, evaluate: (A) QLoRA on 1 × 48 GB GPU ($2/hr, 3 days), (B) full
  fine-tuning on 16 × A100 80 GB with FSDP ($32/hr, 1 day), (C) LoRA without quantization on 4 × A100
  80 GB ($8/hr, 2 days). Consider quality, cost, and speed.'
details:
  realistic_solution: 'Option A (QLoRA, 1 GPU): cost = 3 × 24 × $2 = $144. Quality: ~95-97% of full fine-tuning
    on most benchmarks. Slowest due to dequantization overhead and single GPU. Good for prototyping. Option
    B (full fine-tune, 16 GPUs): cost = 1 × 24 × $32 = $768. Quality: 100% (gold standard). Fastest wall-clock.
    But 5.3x more expensive than A. Only justified if the 3-5% quality gap matters (e.g., specialized
    domain). Option C (LoRA, 4 GPUs): cost = 2 × 24 × $8 = $384. Quality: 97-99% of full fine-tuning.
    Middle ground. No quantization noise. Best balance of cost, quality, and speed. Recommendation: start
    with A for experimentation, graduate to C for production fine-tuning, use B only if quality gap is
    measurable and business-critical.'
  common_mistake: Always choosing full fine-tuning for maximum quality without measuring the actual quality
    gap. For many downstream tasks, QLoRA achieves statistically indistinguishable results at 5x lower
    cost.
  napkin_math: 'A: $144, 3 days, ~96% quality. B: $768, 1 day, 100% quality. C: $384, 2 days, ~98% quality.
    Cost per quality point: A=$144/96=1.5, B=$768/100=7.68, C=$384/98=3.92. QLoRA is 5x more cost-efficient
    per quality point.'
