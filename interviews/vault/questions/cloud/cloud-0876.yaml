title: Diagnosing GPU Starvation in Vision Pipelines
scenario: You are training a Vision Transformer (ViT-H) on an 8-GPU node. Each GPU processes a micro-batch of 64 high-resolution images. Profiling reveals GPU compute time is 150ms per step, but step time is 450ms (yielding ~33% utilization). CPU utilization is pinned at 100% due to heavy data augmentations.
question: What is bottlenecking the ViT-H training loop, and how would you size the prefetching pipeline to eliminate GPU bubbles?
details:
  realistic_solution: Implement asynchronous prefetching with pinned memory (page-locked) and scale CPU worker processes. Calculate the required number of background workers to hide the CPU processing latency behind the GPU compute latency, and overlap the host-to-device transfer via a dedicated CUDA stream.
  common_mistake: |
    **The Pitfall:** Suggesting faster storage or custom CUDA kernels before establishing basic prefetching.
    **The Rationale:** Engineers assume the bottleneck must be I/O bandwidth or that CPU computation is inherently too slow.
    **The Consequence:** Over-complicating the system with custom C++ extensions while ignoring the low-hanging fruit of asynchronous, overlapping data pipelines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU compute time: 150ms. Step time: 450ms.
       - CPU data prep time: 450ms - 150ms = 300ms.
       - Hardware: 8 GPUs, 64 CPU cores (8 cores/GPU).
    2. **Calculations:**
       - To mask 300ms data prep behind 150ms compute, we need buffer size: ceil(300 / 150) = 2.
       - Assigning 4 background workers per GPU ensures they produce a batch every 300ms / 4 = 75ms.
       - 75ms < 150ms compute time, meaning data is ready before the GPU needs it.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound (Data Pipeline).** Sizing the prefetch pipeline to 4 workers with a prefetch factor of 2 fully masks the CPU augmentation latency, saturating the GPUs.
