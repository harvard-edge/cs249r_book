title: Diagnosing GPU Starvation in Vision Pipelines
scenario: You are training a Vision Transformer (ViT-H) on an 8x A100 (80GB) node. Each GPU processes
  a micro-batch of 64 high-resolution (512x512) images per step. Profiling reveals that the GPU compute
  time (forward+backward) is 150ms per step, but the step time is 450ms, yielding only ~33% SM utilization.
  The data pipeline reads from a local NVMe array (10 GB/s), decodes JPEGs, applies heavy augmentations
  on the CPU, and copies to VRAM. CPU utilization is pinned at 100% across all 64 cores. Analyze the bottleneck
  and design a prefetching strategy to eliminate the accelerator bubbles.
details:
  realistic_solution: Implement asynchronous prefetching with pinned memory (page-locked) and scale CPU
    worker processes. Calculate the required number of background workers to hide the CPU processing latency
    behind the GPU compute latency, and overlap the host-to-device transfer via a dedicated CUDA stream.
  common_mistake: Candidates often suggest simply buying faster storage (ignoring the CPU bottleneck)
    or writing custom CUDA kernels for augmentation without first establishing basic asynchronous overlapping
    and multiprocessing.
  napkin_math: Compute latency = 150ms. Current data latency = 450ms - 150ms = 300ms. To mask the 300ms
    data prep time behind the 150ms compute time, each GPU needs ceil(300 / 150) = 2 active batches buffered.
    Since there are 8 GPUs and 64 CPU cores (8 cores/GPU), assigning 4 background workers per GPU (num_workers=4)
    with a prefetch_factor of 2 ensures the CPU can produce a batch every 300ms/4 = 75ms < 150ms, fully
    saturating the GPUs.
