title: A100 Large Model Deployment Throughput
scenario: Your team is deploying a large language model (LLM) for real-time inference. The model consumes 60 GB of GPU memory when loaded. You're using NVIDIA GPUs with a peak memory bandwidth of 2.0 TB/s. Due to the model's size and inference patterns, each forward pass requires approximately 15 GB of data to be moved from HBM to streaming multiprocessors.
question: What is the theoretical maximum inferences per second on one GPU if each inference moves 15 GB through a 2.0 TB/s HBM link?
details:
  realistic_solution: A realistic solution involves optimizing model serving using frameworks like NVIDIA Triton Inference Server, which can manage batching and concurrent model execution efficiently. Techniques such as model quantization (e.g., to FP8 or INT8) would significantly reduce the model's memory footprint and data movement per inference. Leveraging A100's Multi-Instance GPU (MIG) could also be considered for smaller, multiple models or concurrent tasks if appropriate. Continuous monitoring of GPU metrics within the MLOps CI/CD pipeline is crucial to identify and address bottlenecks, ensuring consistent performance from training to deployment.
  common_mistake: |
    **The Pitfall:** Ignoring memory bandwidth constraints and focusing solely on FLOPs.
    **The Rationale:** Candidates often equate AI performance strictly with compute capability, overlooking the I/O reality of large models.
    **The Consequence:** They calculate unattainable throughputs, resulting in heavily under-provisioned serving infrastructure.
  napkin_math: |
    - **Memory Bandwidth (BW):** 2.0 TB/s = 2000 GB/s.
    - **Data Movement per inference (DM):** 15 GB.
    - **Time per memory-bound inference:** DM / BW = 15 GB / 2000 GB/s = 0.0075 seconds.
    - **Maximum throughput:** 1 / 0.0075 s = **~133.3 inferences/second.**
