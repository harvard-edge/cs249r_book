title: The Iceberg of Inference Cost
scenario: You are deploying a new RAG-based customer support chatbot that uses a 7B parameter model for generation. The service must be available 24/7.
question: From a Total Cost of Ownership (TCO) perspective, what is the dominant, long-term cost for this 24/7 RAG system?
details:
  realistic_solution: The dominant long-term cost is running the GPU for inference 24/7. While training is a significant one-time cost and vector database storage is relatively cheap, the operational expense of keeping a GPU active for inference accumulates to become the largest part of the TCO over the system's lifecycle.
  common_mistake: |
    **The Pitfall:** Focusing heavily on the one-time, upfront cost of model training.
    **The Rationale:** Training jobs require massive upfront capital and are mentally cataloged as the "big expense."
    **The Consequence:** Organizations fail to budget for the continuous operational OpEx of 24/7 inference, leading to unsustainable run rates.
  napkin_math: |
    * 7B parameter model requires ~14 GB VRAM in FP16 (7B × 2 bytes).
    * Fits on a single cloud GPU costing ~$2/hour.
    * Annual inference OpEx: $2/hr × 24 hr/day × 365 days/year = $17,520/year.
    * **This recurring cost quickly surpasses the one-time training expenditure and dominates system TCO.**
  options:
  - The one-time cost of training the 7B model.
  - The annual cost of storing the vector database embeddings.
  - The annual cost of running the GPU for 24/7 inference.
  - The network bandwidth costs for handling user queries.
  correct_index: 2
