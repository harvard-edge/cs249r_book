title: The ZeRO-3 Communication Overhead
scenario: You're training a 175B parameter model using ZeRO Stage 3 (DeepSpeed) across 64 A100-80GB GPUs.
  ZeRO-3 shards weights, gradients, AND optimizer states across all GPUs, so each GPU only stores 1/64th
  of the model. But your training throughput is 40% lower than ZeRO Stage 1 (which only shards optimizer
  states). Where is the time going?
question: "Where is the time going?"
details:
  realistic_solution: "ZeRO-3 must perform an all-gather to reconstruct the full weight tensor before every forward and backward layer computation, then a reduce-scatter to redistribute gradients after each layer's backward pass. This means roughly 1.5x the communication volume per step compared to ZeRO-1 (which communicates gradients once at the end). For a 175B model, this communication happens for every single layer, every single step."
  common_mistake: '"ZeRO-3 just uses less memory per GPU — communication should be the same." This confuses
    memory savings with communication cost. ZeRO-3 trades memory for bandwidth.'
  napkin_math: '175B model in FP16 = 350 GB. Optimizer states = 2100 GB. Total footprint = 2800 GB. ZeRO-1 memory per GPU: full weights (350 GB) + full gradients (350 GB) + 1/64th optimizer (32.8 GB) = 732.8 GB (OOM on 80 GB). ZeRO-3 stores 1/64th of everything: 2800 GB / 64 = 43.75 GB (fits easily). ZeRO-1 communication: one All-Reduce of gradients transfers 2*(63/64)*350 ≈ 689 GB per GPU. ZeRO-3 communication: All-Gather forward (344 GB) + All-Gather backward (344 GB) + Reduce-Scatter gradients (344 GB) ≈ 1,032 GB per GPU. Assuming 50 GB/s effective inter-node bandwidth per GPU, ZeRO-1 network time per step is ~689 / 50 ≈ 13.8 s. ZeRO-3 network time is ~1,032 / 50 ≈ 20.6 s. ZeRO-3 increases communication volume by 1.5x, directly inflating step time since All-Gathers block forward/backward compute.'
