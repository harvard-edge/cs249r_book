validation_issues:
- The memory calculation for ZeRO-1 (350 GB weights + 350 GB gradients + 32.8 GB optimizer) totals 732.8
  GB. The conclusion 'doesn't fit on 80 GB' is correct, but '350GB gradients' might be an oversight if
  gradients are normally sharded as well in ZeRO-1 (though ZeRO-1 typically means no gradient sharding,
  just optimizer state sharding).
- The communication volume for ZeRO-1 is stated as 'one all-reduce of gradients = 700 GB'. However, if
  gradients are 350 GB, then one all-reduce of gradients should be around 350 GB, not 700 GB, unless it's
  a specific communication pattern. (e.g., 2*(N-1)/N * 350GB).
- The communication volume for ZeRO-3 is stated as '3 × 350 GB'. This simplification might hide the fact
  that AllGather and ReduceScatter involve different volumes and patterns than a simple AllReduce.
validation_status_pro: WARN
validation_issues_pro:
- The napkin math for communication time is methodologically flawed, incorrectly modeling collective time
  as Total_Volume / Single_Link_Bandwidth.
