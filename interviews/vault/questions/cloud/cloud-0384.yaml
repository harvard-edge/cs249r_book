title: The H100's Memory Wall
scenario: 'A new engineer is profiling a large-scale data preprocessing kernel on an NVIDIA H100. The kernel performs a simple element-wise addition on two large FP16 vectors and writes the result back to memory. They are surprised the GPU utilization is low.'
question: "Using the H100's specs (989 TFLOPS FP16 compute, 3.35 TB/s memory bandwidth), why is the kernel memory-bound, and what is its arithmetic intensity?"
details:
  realistic_solution: The operation is severely memory-bound. To determine this, we first find the machine's 'ridge point'—the arithmetic intensity required to be compute-bound. Then we calculate the kernel's arithmetic intensity and compare. If the kernel's AI is less than the ridge point, it's memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming that high TFLOPS guarantees a compute-bound operation.
    
    **The Rationale:** Engineers see "989 TFLOPS" and assume any simple math kernel will execute instantly, ignoring memory movement.
    
    **The Consequence:** Failing to optimize data locality and writing kernels that severely underutilize the GPU.
  napkin_math: |
    - **Hardware Ridge Point:** 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/Byte.
    - **Operation Cost:** Read 2 elements (4 bytes), Write 1 element (2 bytes) = 6 Bytes.
    - **Compute Executed:** 1 FLOP (addition).
    - **Kernel Arithmetic Intensity:** 1 FLOP / 6 Bytes = 0.167 FLOPs/Byte.
    - **Result:** **0.167 FLOPs/Byte is 1,700x lower than the 295 FLOPs/Byte ridge point, making the operation severely memory-bound.**
  options:
  - Compute-bound; the H100 has nearly a PetaFLOP of compute, so it's always limited by calculation speed.
  - Memory-bound; its Arithmetic Intensity (~0.167 Ops/Byte) is far below the H100's ridge point (~295 Ops/Byte).
  - Compute-bound; its Arithmetic Intensity (~295 Ops/Byte) is very high, matching the GPU's capability.
  - Memory-bound; its Arithmetic Intensity is ~0.5 Ops/Byte because you only read two vectors.
  correct_index: 1
