title: The H100's Memory Wall
scenario: A new engineer is profiling a large-scale data preprocessing kernel on a high-end GPU. The kernel performs a simple element-wise addition on two large FP16 vectors and writes the result back to memory. They are surprised the GPU utilization is low.
question: "Using the 989 TFLOPS FP16 compute and 3.35 TB/s memory bandwidth, why is the kernel memory-bound, and what is its arithmetic intensity?"
details:
  realistic_solution: The operation is severely memory-bound. To determine this, we first find the machine's 'ridge point'—the arithmetic intensity required to be compute-bound. Then we calculate the kernel's arithmetic intensity and compare. If the kernel's AI is less than the ridge point, it's memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming that high TFLOPS guarantees a compute-bound operation.
    **The Rationale:** Engineers see "989 TFLOPS" and assume any simple math kernel will execute instantly, ignoring memory movement.
    **The Consequence:** Failing to optimize data locality and writing kernels that severely underutilize the GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Hardware: 989 TFLOPS, 3.35 TB/s.
       * Operation: Read 2 elements (4 bytes), Write 1 element (2 bytes).
       * Compute: 1 FLOP (addition).
    2. **Calculations:**
       * Hardware Ridge Point: 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/Byte.
       * Kernel Arithmetic Intensity: 1 FLOP / 6 Bytes = 0.167 FLOPs/Byte.
    3. **Conclusion & Interpretation:** **Result: 0.167 FLOPs/Byte (Memory-Bound)**. The AI is 1,700x lower than the 295 FLOPs/Byte ridge point.
  options:
  - 'Compute-bound; it has nearly a PetaFLOP of compute. (Calculated trap: Ignores Arithmetic Intensity)'
  - 'Memory-bound; its Arithmetic Intensity (~0.167 Ops/Byte) is far below the ridge point (~295 Ops/Byte). (Correct)'
  - 'Compute-bound; its Arithmetic Intensity (~295 Ops/Byte) is very high. (Calculated trap: Uses ridge point as Arithmetic Intensity)'
  - 'Memory-bound; its Arithmetic Intensity is ~0.5 Ops/Byte. (Calculated trap: Ignores write byte cost)'
  correct_index: 1
