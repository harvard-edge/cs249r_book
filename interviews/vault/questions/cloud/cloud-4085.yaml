title: TP Communication Volume for Transformer Block
scenario: A Llama-70B transformer block has hidden_dim=8192 and runs with TP=8 on MI300X GPUs (5.3 TB/s HBM3). Each transformer block requires 2 AllReduce operations in the forward pass (one for attention, one for MLP).
question: For hidden=8192, TP=8, and batch=2048 on MI300X, what is the per-block AllReduce volume and time for the two forward collectives?
details:
  realistic_solution: Each AllReduce sends a tensor of shape [2048, 8192] in BF16 = 2048 × 8192 × 2 = 33.6 MB. Two AllReduces per block = 67.2 MB message volume. Using ring AllReduce, actual bytes per GPU = 2 × (7/8) × 33.6 MB = 58.8 MB per AllReduce. With 8×MI300X connected via Infinity Fabric at ~400 GB/s bisection bandwidth, each AllReduce takes ~58.8 MB / 400 GB/s ≈ 0.15 ms. Two AllReduces ≈ 0.3 ms per block. With 80 layers, total TP communication ≈ 24 ms per forward pass. This is small relative to compute, confirming TP is communication-efficient within a node.
  common_mistake: |
    **The Pitfall:** Forgetting that AllReduce = ReduceScatter + AllGather.
    **The Rationale:** Candidates often assume the data sent over the wire is exactly equal to the message size.
    **The Consequence:** They underestimate network traffic by ~2x, and sometimes erroneously use HBM bandwidth instead of interconnect bandwidth (NVLink/Infinity Fabric) for calculations.
  napkin_math: |
    - **Tensor Size:** 2048 (batch) × 8192 (hidden) × 2 bytes (BF16) = 33.55 MB ≈ 33.6 MB.
    - **Ring AllReduce Cost:** 2 × ((N - 1) / N) × Message Size.
    - **Volume per GPU:** 2 × (7 / 8) × 33.6 MB = 58.8 MB per AllReduce.
    - **Time per AllReduce:** 58.8 MB / 400 GB/s (Infinity Fabric) ≈ 0.15 ms.
    - **Total time per block:** 2 AllReduces × 0.15 ms = **0.30 ms.**
    - *(Note: With 80 layers, total TP communication is ~24 ms, very small relative to compute).*
