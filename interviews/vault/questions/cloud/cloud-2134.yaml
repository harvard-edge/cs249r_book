title: The Point-in-Time Join Correctness
scenario: 'Your model training pipeline joins the label table (user clicked ad at time T) with the feature table (user features computed daily at midnight). A newly trained model shows 2% higher offline AUC than the production model, but after deployment, online metrics show no improvement. The data scientist is confused: ''The offline eval used a held-out test set — it should be unbiased.'' What went wrong?'
question: "What went wrong?"
details:
  realistic_solution: 'The feature join uses ''as-of-now'' features, not ''as-of-event-time'' features. When you join user features at time $T_{now}$ with a label event from time $T_{event}$ (where $T_{event} < T_{now}$), the features contain information from after the event — future leakage. For example, if a user''s ''total_purchases'' was 5 at event time but is 12 now, the model trains on leaked future information. This inflates offline metrics because both train and test suffer the same leakage. Online, the model sees only current features with no future information, so the inflated performance vanishes. The fix: point-in-time joins that retrieve the feature value as-of the event timestamp, using a time-travel-capable feature store or temporal joins in the batch pipeline.'
  common_mistake: Assuming that a held-out test set prevents all forms of data leakage. Temporal leakage through feature joins is invisible to random train/test splits.
  napkin_math: "Joining at midnight instead of event time T introduces up to 24 hours of future data leakage. If a user clicks an ad at 10 AM, and features are computed at midnight, the model trains on 14 hours of post-click activity. This future information acts as a proxy for the label. Even a small correlation (e.g., a feature changing because of the click) allows the model to 'cheat', artificially inflating offline AUC by 2%. Online, this future data doesn't exist, so performance regresses."
