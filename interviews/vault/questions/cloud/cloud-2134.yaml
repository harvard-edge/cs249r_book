title: The Point-in-Time Join Correctness
scenario: Your model training pipeline joins the label table (user clicked ad at time T) with the feature table (user features computed daily at midnight). A newly trained model shows 2% higher offline AUC, but online metrics show no improvement despite using a held-out test set.
question: What went wrong with the feature join, and how do you fix it?
details:
  realistic_solution: 'The feature join uses ''as-of-now'' features, not ''as-of-event-time'' features. When you join user features at time $T_{now}$ with a label event from time $T_{event}$ (where $T_{event} < T_{now}$), the features contain information from after the event — future leakage. For example, if a user''s ''total_purchases'' was 5 at event time but is 12 now, the model trains on leaked future information. This inflates offline metrics because both train and test suffer the same leakage. Online, the model sees only current features with no future information, so the inflated performance vanishes. The fix: point-in-time joins that retrieve the feature value as-of the event timestamp, using a time-travel-capable feature store or temporal joins in the batch pipeline.'
  common_mistake: |
    **The Pitfall:** Assuming that a held-out test set prevents all forms of data leakage.
    **The Rationale:** Standard ML pedagogy emphasizes train/test splits as the gold standard for preventing overfitting.
    **The Consequence:** Temporal leakage through feature joins inflates both train and test metrics equally, blinding the team to the problem until deployment fails.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Features computed at midnight.
       - Label event at time T (e.g., 10 AM).
    2. **Calculations:**
       - Joining at midnight instead of event time T introduces up to 24 hours of future data leakage.
       - Model trains on 14 hours of post-click activity (future information).
    3. **Conclusion & Interpretation:**
       - **Result: Data Leakage.** Future information acts as a proxy for the label, artificially inflating offline AUC by 2%. Online, this future data doesn't exist, so performance regresses.
