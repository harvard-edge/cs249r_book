title: Chiplet Architecture and Multi-Tenant Isolation
scenario: A cloud provider wants to offer 1/8 MI300X slices (one XCD per tenant) for smaller inference
  workloads. What architectural challenges arise from XCD-level multi-tenancy?
question: "What architectural challenges arise from XCD-level multi-tenancy?"
details:
  realistic_solution: 'XCD isolation requires: (1) page table separation enforced by IOMMU per XCD, (2)
    bandwidth QoS on Infinity Fabric to prevent one tenant''s XCD from starving others, (3) HBM partition
    tables in MCDs to enforce memory isolation. AMD''s CDX (Compute Die eXtension) spec provides hardware
    isolation primitives but full tenant isolation requires hypervisor support that is not yet standardized
    in ROCm.'
  common_mistake: Assuming XCDs are fully independent and isolated like separate GPUs. XCDs share the
    coherency fabric, HBM controller arbitration, and the L3 cache domain, creating side-channel and performance
    interference risks.
  napkin_math: '8 tenants × 24 GB = 192 GB, memory isolation is straightforward. Fabric bandwidth isolation:
    896 GB/s total fabric / 8 tenants = 112 GB/s guaranteed per tenant, but cross-tenant coherency traffic
    can consume an additional 10-15% overhead from snoops even with isolation.'
