title: Optimizing Large Language Model Inference Latency on AMD MI300X
scenario: You are deploying an LLM for real-time inference on AMD MI300X accelerators (192 GB HBM3, 1,307 TFLOPS FP16 sparse, 5.3 TB/s). Initial deployment shows 500ms average latency against a 100ms target.
question: How would you profile MI300X LLM inference to reduce 500 ms average latency toward 100 ms across compute, memory, and I/O bottlenecks?
details:
  realistic_solution: Use a multi-pronged strategy. (1) Host-level tools (perf, htop) for CPU/network. (2) ROCm profiling (rocprof) for detailed kernel times, HBM3 bandwidth, and host-device transfers. Look for low HBM utilization despite high compute (memory bound) or vice-versa. (3) Framework profiler (PyTorch) to pinpoint layer-specific contributions. (4) Trace tools/flame graphs for hot spots.
  common_mistake: |
    **The Pitfall:** Jumping to micro-optimizations in the model architecture without profiling.
    **The Rationale:** Candidates skip rigorous system-level profiling and assume the bottleneck is compute rather than memory or I/O.
    **The Consequence:** Wasting effort optimizing non-bottleneck components and failing to reduce end-to-end latency.
  napkin_math: |
    - **Memory Bandwidth Check:** 70B FP16 model = 140 GB. Lower bound memory time = 140 GB / 5.3 TB/s ≈ 26ms.
    - **Compute Throughput Check:** Assume 100 TFLOPS per inference. Minimum compute time = 100 TFLOPS / 1307 TFLOPS ≈ 77ms.
    - **Utilization Impact:** If compute utilization is only 20%, effective TFLOPS = 261. Compute time becomes 100 / 261 ≈ 380ms.
    - **Result:** Comparing the 26ms memory bound to the 380ms compute bound pinpoints the exact **underutilization bottleneck**.
