title: SLO-Aware Autoscaling for Inference Under Bursty Load
scenario: 'You serve a 70B LLaMA model on H100 80GB instances. SLO: p99 TTFT (time to first token) < 200ms.
  You experience 3× traffic spikes lasting 2-5 minutes every day. Cold start for a new H100 instance (model
  load from S3 + warmup) takes 4 minutes. Design an autoscaling strategy that maintains the SLO through
  spikes without excessive idle capacity.'
details:
  realistic_solution: Implement predictive scaling based on historical traffic patterns (daily spikes
    at 9am, 12pm, 5pm). Pre-warm instances 5 minutes before predicted spikes. Use spot instance pools
    with pre-loaded model weights on NVMe to cut cold start to 45 seconds. Maintain a 'warm spare pool'
    of 2-3 idle instances at all times as a buffer. Use KEDA (Kubernetes Event-Driven Autoscaling) with
    custom metrics from queue depth.
  common_mistake: Triggering scale-out only after p95 latency breaches the SLO threshold. By the time
    latency degrades, the 4-minute cold start means 6+ minutes of SLO violation. Reactive scaling is too
    slow for sub-5-minute spikes.
  napkin_math: '70B model BF16: 70B × 2 bytes = 140 GB. Loading from S3 at 10 GB/s: 14 seconds. Model
    loading to GPU HBM: 140 GB / 3.35 TB/s (H100) = 42 ms. Total cold start: 14s (S3) + ~4min (framework
    init, CUDA context) = 4.2 min. With NVMe pre-staging: 140 GB / 6.5 GB/s NVMe = 21.5s + 42ms GPU load
    = ~22s. 11× faster cold start.'
