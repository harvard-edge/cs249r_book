title: Asynchronous Local SGD as an Alternative to Overlapped AllReduce
scenario: 'Instead of overlapping AllReduce with backward computation, your team proposes Local SGD: each
  GPU trains independently for H steps, then synchronizes with an AllReduce every H-th step. This eliminates
  the need for per-step AllReduce overlap entirely. Evaluate the tradeoffs at H=4 and H=16.'
details:
  realistic_solution: 'Local SGD analysis: (1) H=4: communicate every 4th step. Communication overhead:
    1/4 of standard DDP. Each GPU uses slightly stale parameters for 3/4 of steps. Convergence impact:
    minimal for most models (<2% more steps needed). Total time savings: if AllReduce is 15% of step time,
    savings = 0.75 x 15% = 11.25%. Net with convergence penalty: 11.25% - 2% = 9.25% faster. (2) H=16:
    communicate every 16th step. Communication overhead: 1/16 of DDP. But replica divergence is significant
    — each GPU explores a different loss surface region. Convergence impact: 5-15% more steps needed.
    Total time savings: 0.9375 x 15% = 14%. Net: 14% - 10% = 4% faster (marginal). (3) Comparison to overlapped
    AllReduce: perfect overlap achieves 15% savings with 0% convergence impact. Local SGD is only better
    when overlap is infeasible (communication >> compute).'
  common_mistake: Treating Local SGD as a free lunch that eliminates communication overhead. While it
    reduces communication frequency, model replicas diverge between sync points, potentially hurting convergence
    and requiring more total steps.
  napkin_math: 'DDP with overlap: 200ms compute + 0ms exposed comm = 200ms/step, 1000 steps = 200s. Local
    SGD H=4: 200ms compute + 30ms comm every 4th step = avg 207.5ms/step, 1020 steps (2% penalty) = 211.6s.
    DDP with overlap wins by 5.5%.'
