title: Infinity Fabric Topology and All-Reduce Efficiency
scenario: Design an optimal ring-allreduce topology for MI300X's 8 XCDs given the physical Infinity Fabric
  layout. How does the physical topology constrain the logical ring order?
question: "How does the physical topology constrain the logical ring order?"
details:
  realistic_solution: 'Map the physical XCD layout (2×4 grid on interposer) to a ring that only traverses
    adjacent edges. Optimal ring follows a Hamiltonian path on the 2×4 grid: XCD0→XCD1→XCD2→XCD3→XCD7→XCD6→XCD5→XCD4→XCD0.
    This ensures every ring step is a single fabric hop. RCCL auto-detects this topology via the Infinity
    Fabric topology discovery API.'
  common_mistake: Arbitrarily ordering XCDs 0-7 in the logical ring. This can place non-adjacent XCDs
    as ring neighbors, maximizing cross-interposer fabric hops and degrading allreduce bandwidth.
  napkin_math: '8-XCD ring all-reduce: 2×(N-1)/N × BW per link. With optimal ring (all single-hop, 896
    GB/s fabric): 2×7/8 × 896 = 1,568 GB/s effective. With random ring (avg 1.8 hops): 2×7/8 × (896/1.8)
    ≈ 871 GB/s — 44% degradation from non-topology-aware ring ordering.'
