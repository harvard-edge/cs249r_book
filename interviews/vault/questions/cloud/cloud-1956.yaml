title: 'Datacenter Cooling Trade-off: Static Power vs CapEx'
scenario: Your team is deploying a large cluster of 8,000 H100 GPUs for a multi-month LLM training run. The facility offers a standard air-cooled setup maintaining the silicon junction temperature at 85°C, and an advanced liquid cooling system maintaining it at 55°C. The liquid cooling system has an upfront cost of $4M and requires 500 kW of additional facility power. Static power accounts for roughly 30% of total GPU power at 85°C (700W TDP).
question: Is the $4M liquid cooling system justified on energy savings alone over 1 year for the 8,000 H100 training cluster?
details:
  realistic_solution: Calculate the static power savings at the lower temperature. At 85°C, static power is ~210W (30% of 700W). A 30°C drop typically reduces leakage current by half, meaning static power drops to ~105W per GPU. Across 8,000 GPUs, saving 105W per GPU saves 840 kW in IT load. Over a year, this saves 7.35 GWh, or ~$735,000. However, the pumps add 500 kW of overhead, costing ~$438,000 annually. The net savings is ~$297,000/year. Against a $4M CapEx, the payback period is >13 years, making it economically unjustified purely on direct energy costs (though performance/reliability gains might justify it).
  common_mistake: |
    **The Pitfall:** Focusing only on dynamic power and ignoring static power leakage.
    **The Rationale:** Failing to account for the exponential dependence of static power on junction temperature.
    **The Consequence:** Incorrectly concluding that cooling only affects reliability rather than operational energy costs.
  napkin_math: |
    - Static power @ 85°C = 700W * 0.30 = 210W.
    - Assuming 50% reduction at 55°C = 105W savings/GPU.
    - Total GPU savings = 105W * 8000 = 840 kW.
    - Yearly GPU energy savings = 840 kW * 8760 h * $0.10/kWh = $735,840.
    - Pump overhead = 500 kW * 8760 h * $0.10/kWh = $438,000.
    - Net yearly savings = $735,840 - $438,000 = $297,840.
    - Result: **Payback = $4,000,000 / $297,840 = 13.4 years.**
