title: Bathtub Curve Phases
scenario: Your datacenter just received 1,000 new GPUs. You are evaluating hardware reliability over the next 5 years.
question: When should you expect the highest failure rates, and what are the three phases of the bathtub curve?
details:
  realistic_solution: 'The bathtub curve has three phases: (1) Infant mortality (first weeks-months): high failure rate from manufacturing defects, solder issues, and marginal components. For GPUs, this means running burn-in tests before deploying to production. (2) Useful life (months to years): low, roughly constant random failure rate. This is the steady-state where MTBF calculations are valid. Most of your 5-year operational window falls here. (3) Wear-out (end of life): increasing failure rate from physical degradation — electromigration, capacitor aging, thermal cycling fatigue. For a 1,000-GPU cluster, expect ~5-10% failures in the first month, <1% annual during useful life, then accelerating failures after year 3-4.'
  common_mistake: |
    **The Pitfall:** Assuming the failure rate is a constant, average value over the entire 5-year lifecycle.
    **The Rationale:** Over-relying on a single MTBF number and ignoring the physical realities of manufacturing defects and hardware aging.
    **The Consequence:** Failing to provision enough spare parts during the initial rollout (infant mortality) or at the end of life (wear-out).
  napkin_math: |
    - **Phase 1 (Infant Mortality):** First weeks/months. High failure rate (e.g., 5-10% or 50-100 GPUs) due to manufacturing defects.
    - **Phase 2 (Useful Life):** Months to years. Low, constant random failure rate (e.g., <1% or <10 GPUs per year).
    - **Phase 3 (Wear-Out):** End of life (Years 3-5+). Accelerating failure rate due to physical degradation (thermal cycling, electromigration).
    - **Plan for ~50-100 failures in month 1, ~5-10/year steady state, and a sharp increase after year 3-4.**
