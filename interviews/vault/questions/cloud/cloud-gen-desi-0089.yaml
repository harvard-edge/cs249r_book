title: Architecting an Online Distillation Pipeline for a 70B Model
scenario: 'You are tasked with designing a knowledge distillation pipeline to compress a 70B parameter
  teacher model into a 7B parameter student model. Both use FP16 precision. You have a cloud cluster of
  8-GPU A100 (80GB) nodes connected via InfiniBand NDR (400 Gb/s per port), and intra-node NVLink 4.0
  (900 GB/s). The vocabulary size is 128,000. Architect the distributed training system: decide between
  offline logit caching versus online distillation, determine the GPU placement strategy for the teacher
  and student models, and design the communication flow to minimize idle time for the student''s training
  loop.'
details:
  realistic_solution: Design an online distillation system with dedicated 'Teacher Nodes' and 'Student
    Nodes'. The 70B teacher requires 140GB just for weights (FP16) and can be sharded across 2-4 GPUs
    using Tensor Parallelism for fast forward passes. The student runs Data Parallelism across separate
    nodes. Teacher nodes stream logits to student nodes asynchronously over InfiniBand. To reduce network
    bandwidth, send only the top-K logits or apply temperature scaling and FP8 quantization before transmission.
  common_mistake: Candidates often propose offline distillation (saving teacher logits to disk) without
    calculating the massive storage and I/O requirements for full vocabulary logits. Alternatively, they
    might co-locate the teacher and student on the same GPUs using tensor parallelism for both, leading
    to severe memory constraints and pipeline bubbles.
  napkin_math: 'For online distillation: A micro-batch of 2,048 tokens with a 128,000 vocab requires 2,048
    * 128,000 * 2 bytes (FP16) = 524 MB of logits. InfiniBand NDR provides 50 GB/s per port. Transferring
    this micro-batch takes 524 MB / 50 GB/s ≈ 10.5 ms, easily hidden behind the student''s backward pass.
    In contrast, offline storage for a 300B token dataset would require 300e9 * 128,000 * 2 bytes ≈ 76.8
    Petabytes, making offline caching of full logits architecturally infeasible.'
