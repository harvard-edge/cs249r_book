title: Implementing Power-Aware Bin Packing for Heterogeneous GPU Racks
scenario: 'A shared datacenter hosts a heterogeneous cluster: 20 racks with H100 nodes (700 W/GPU) and 15 racks with A100 nodes (400 W/GPU). Each rack has a 20 kW power budget. Current GPU utilization averages 60%.'
question: How would you design a power-aware placement algorithm that maximizes H100 and A100 GPU density per rack without exceeding 20 kW at P95 load?
details:
  realistic_solution: |
    Use P95 power draw from DCGM historical metrics per GPU model and workload type as the placement unit, then run a heterogeneous bin-packing policy per rack. For H100 jobs, use the scenario's 700 W/GPU budget unless measured P95 is lower; an 8-GPU H100 node with about 2,600 W of system overhead is 700 * 8 + 2,600 = 8,200 W, so a 20 kW rack fits 2 such nodes with 3,600 W headroom. For A100 jobs, use the scenario's 400 W/GPU budget; an 8-GPU A100 node with about 2,000 W overhead is 400 * 8 + 2,000 = 5,200 W, so a rack fits 3 such nodes with 4,400 W headroom. Implement this as a scheduler extender or plugin that scores candidate nodes by `rack_power_headroom`, GPU type, workload P95, and fragmentation. Reject placements where `current_rack_power + pod_p95_power > rack_budget * safety_factor`, and prefer the rack that leaves the least unusable headroom while preserving room for mixed inference/training skew.
  common_mistake: |
    **The Pitfall:** Using average power draw or max TDP for placement decisions in heterogeneous clusters.
    **The Rationale:** TDP is safe but conservative, while average power seems economically optimal.
    **The Consequence:** Placing jobs based on TDP guarantees headroom but wastes massive capacity. Placing on average power risks physical breaker trips at peak load. P95 metrics are required.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 Rack Density: Node power = (700W * 8) + 2600W = 8,200W. Max nodes per 20kW rack = 20,000 / 8,200 = 2 nodes (16 H100s).
    - A100 Rack Density: Node power = (400W * 8) + 2000W = 5,200W. Max nodes per 20kW rack = 20,000 / 5,200 = 3 nodes (24 A100s).

    **Calculations:**
    - H100 FLOPS/Rack: 16 * 989 TF = 15.8 PFLOPS.
    - A100 FLOPS/Rack: 24 * 312 TF = 7.5 PFLOPS.

    **Conclusion & Interpretation:**
    - **Result: 15.8 PFLOPS vs 7.5 PFLOPS (Power-Bound)**. H100 delivers 2.1x more FLOPS per rack, despite lower GPU density, optimizing datacenter real estate.
