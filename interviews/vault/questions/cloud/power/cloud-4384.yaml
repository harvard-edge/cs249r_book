title: Power Capping Strategy for MI300X Training Under Budget Constraints
scenario: You manage a 512-accelerator MI300X training cluster. Each MI300X has a maximum TDP of 750W. The datacenter power contract caps your cluster at 300 kW total IT load. During peak matrix-multiply-heavy phases of training a 70B parameter model, power meters show the cluster drawing 380 kW, causing PDU overcurrent alarms. You must evaluate each option's effect on training throughput and energy efficiency.
question: How do static 590W caps, 25% batch-size reduction, and dynamic power capping affect throughput and energy efficiency under the 300 kW cap?
details:
  realistic_solution: |
    Option A as stated is slightly over the cap: 512 * 590W = 302.08 kW, so it must be lowered to about 585W per accelerator to meet a 300 kW IT limit. A static cap near 585W is simple and predictable; for a memory-heavy training phase it may retain roughly 85-88% of baseline throughput, improving tokens per joule because power falls from about 380 kW observed to 300 kW. Option B, reducing batch size by 25%, directly reduces delivered tokens per step and may require more steps or worse utilization; it can reduce power, but its throughput and energy efficiency are usually worse than a targeted cap. Option C, dynamic capping, is best if telemetry and controls are reliable: cap during power-heavy GEMM phases and relax during lower-power communication phases, preserving more throughput at the same 300 kW envelope. The direct answer is that 590W static capping misses the cap unless adjusted, batch reduction is a blunt throughput cut, and dynamic capping gives the best throughput/energy tradeoff when operationally feasible.
  common_mistake: |
    **The Pitfall:** Assuming power capping linearly reduces throughput (e.g., 78.7% power -> 78.7% throughput).
    **The Rationale:** Ignoring the fact that LLM training is predominantly memory-bandwidth-bound rather than pure compute-bound.
    **The Consequence:** Misjudging the impact of static power caps, which disproportionately reduce power draw from the HBM and idle logic without severely bottlenecking the actual memory-bound computation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 MI300X accelerators, 750W max TDP.
    - 300 kW total IT load cap.
    - Peak observed training draw: 380 kW. Nameplate maximum: 512 * 750W = 384 kW.

    **Calculations:**
    - Option A at 590W: 512 * 590W = 302,080W = 302.08 kW, which exceeds the 300 kW cap.
    - Static cap required for 300 kW: 300,000W / 512 = 585.9W, so use about 585W per accelerator.
    - If static capping retains 85-88% throughput at 300 kW, energy efficiency versus the 380 kW baseline is (0.85 to 0.88) / (300 / 380) = 1.08 to 1.11x baseline.
    - Option B: 25% smaller batches gives about 75% tokens/step before any extra-step penalty; if it merely brings power to 300 kW, energy efficiency is about 0.75 / (300 / 380) = 0.95x baseline.
    - Option C: dynamic capping can retain roughly 90-93% throughput at the same 300 kW cap, giving about 1.14 to 1.18x baseline energy efficiency.

    **Conclusion & Interpretation:**
    - **Result: dynamic capping is best if available; otherwise use a static cap near 585W, not 590W.** Static capping is simple and improves energy efficiency, batch-size reduction is the weakest throughput tradeoff, and dynamic capping preserves the most throughput under the 300 kW limit.
