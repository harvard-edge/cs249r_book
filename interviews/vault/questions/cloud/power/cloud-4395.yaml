title: Rack-Level UPS Sizing and Power Factor Correction
scenario: 'You are specifying a UPS system for a rack containing three 8xGPU nodes. Each node has a nameplate rating of 10.5 kVA despite drawing only 8 kW. The rack includes a top-of-rack switch (0.5 kVA) and two management servers (1.0 kVA each).'
question: 'What UPS capacity is needed, why does kVA exceed kW, and what does power factor correction save?'
details:
  realistic_solution: 'GPU node kVA: 3 * 10.5 = 31.5 kVA. Total with switch/mgmt: 34 kVA. Gap is due to reactive current. Active Power Factor Correction (APFC) brings PF to 0.99, reducing kVA. With APFC: Node kVA = 8 kW / 0.99 = 8.08 kVA. Total = 26.74 kVA. With 20% headroom: 32.1 kVA (specify 35 kVA UPS).'
  common_mistake: |
    **The Pitfall:** Specifying UPS capacity based solely on kW (active power) and ignoring apparent power (kVA).
    **The Rationale:** Candidates fail to realize UPS units are rated in kVA, and GPU PSUs have power factors of 0.92-0.96.
    **The Consequence:** Undersizing the UPS unit, leading to UPS overload and failures during power events.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 nodes at 8 kW each, plus 1.2 kW switch/mgmt = 25.2 kW active power.
    - UPS needs 20% headroom buffer.
    
    **Calculations:**
    - Without APFC (PF=0.76): 31.5 kVA + 2.5 kVA = 34 kVA. With buffer = 40.8 kVA (50 kVA UPS).
    - With APFC (PF=0.99): 24.24 kVA + 2.5 kVA = 26.74 kVA. With buffer = 32.1 kVA (35 kVA UPS).
    
    **Conclusion & Interpretation:**
    - **Result: APFC reduces requirement by 15 kVA (Power-Bound)**. APFC allows significantly denser packing and smaller UPS units.
