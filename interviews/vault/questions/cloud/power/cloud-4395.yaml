title: Rack-Level UPS Sizing and Power Factor Correction
scenario: You are specifying a UPS system for a rack containing three 8xGPU nodes. Each node has a nameplate rating of 10.5 kVA despite drawing only 8 kW. The rack includes a top-of-rack switch (0.5 kVA) and two management servers (1.0 kVA each).
question: What UPS capacity is needed, why does kVA exceed kW, and what does power factor correction save?
details:
  realistic_solution: Size the UPS from the applicable apparent-power rating, not only kW. Using the provided nameplates, the rack is 3 * 10.5 kVA + 0.5 kVA switch + 2 * 1.0 kVA management servers = 34.0 kVA. With 20% headroom, specify at least 40.8 kVA, so a standard 45 or 50 kVA UPS is appropriate if the nameplate rating must be honored. If the vendor certifies APFC operation at PF 0.99 for the 8 kW nodes, the node load becomes 8 / 0.99 = 8.08 kVA each; total corrected load is 24.24 + 0.5 + 2.0 = 26.74 kVA, or 32.1 kVA with headroom, so a 35 kVA UPS may be acceptable. APFC saves 7.26 kVA before headroom, or 8.71 kVA after 20% headroom, relative to the stated nameplate case.
  common_mistake: |
    **The Pitfall:** Specifying UPS capacity based solely on kW (active power) and ignoring apparent power (kVA).
    **The Rationale:** Candidates fail to realize UPS units are rated in kVA, and GPU PSUs have power factors of 0.92-0.96.
    **The Consequence:** Undersizing the UPS unit, leading to UPS overload and failures during power events.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 nodes at 10.5 kVA nameplate each.
    - Switch is 0.5 kVA; two management servers are 1.0 kVA each.
    - Each GPU node draws 8 kW; APFC case assumes PF = 0.99.
    - UPS needs 20% headroom buffer.

    **Calculations:**
    - Nameplate load: 3 * 10.5 + 0.5 + 2 * 1.0 = 34.0 kVA.
    - Nameplate load with headroom: 34.0 * 1.20 = 40.8 kVA.
    - APFC node apparent power: 8 kW / 0.99 = 8.08 kVA.
    - APFC total: 3 * 8.08 + 0.5 + 2.0 = 26.74 kVA.
    - APFC total with headroom: 26.74 * 1.20 = 32.1 kVA.
    - Savings: 34.0 - 26.74 = 7.26 kVA before headroom, or 40.8 - 32.1 = 8.7 kVA after headroom.

    **Conclusion & Interpretation:**
    - **Result: 45-50 kVA by Nameplate, 35 kVA with Certified APFC (Power-Bound)**. APFC can reduce apparent power, but only if the corrected PF rating is valid for UPS sizing.
