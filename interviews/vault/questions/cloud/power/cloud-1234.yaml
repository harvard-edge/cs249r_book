title: Energy Savings with Event-Driven Activation
scenario: Your cloud platform processes 5,000 continuous security camera streams (30 FPS) for anomaly detection. Currently, a dense Vision Transformer (ViT) processes every frame, requiring 50 GFLOPs per frame. To meet strict sustainability targets, you propose an event-driven activation architecture. The new system uses a lightweight frame-differencing filter (0.5 GFLOPs per frame) that only triggers the ViT when significant motion is detected. Historical data shows cameras capture significant motion only 5% of the time. Assume cloud GPUs deliver 100 GFLOPS per Watt and energy costs $0.15 per kWh.
question: What daily energy and dollar savings does the event-driven camera pipeline achieve after accounting for the always-on filter?
details:
  realistic_solution: 'Calculate the original dense compute power (7.5 PFLOPS at 75kW consuming 1,800 kWh/day = $270/day), then calculate the event-driven compute power with the lightweight motion filter (75 TFLOPS always-on) plus the ViT processing only the 5% of frames with detected motion (375 TFLOPS). Total new compute is 450 TFLOPS at 4.5kW consuming 108 kWh/day ($16.20/day). Net savings: 1,692 kWh/day or $253.80/day — a 16.7x energy reduction.'
  common_mistake: 'Calculating savings based only on the 95% reduction in ViT executions, failing to account for the continuous always-on compute cost of the lightweight motion filter that runs on every frame from all 5,000 streams.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 5,000 streams at 30 FPS.
    - GPU efficiency: 100 GFLOPS/W.
    - Energy cost: $0.15 per kWh.

    **Calculations:**
    - Original Compute: 5,000 * 30 * 50 GFLOPs = 7,500,000 GFLOPS = 75 kW.
    - Original Daily Energy: 75 kW * 24h = 1,800 kWh/day ($270/day).
    - New Filter Compute: 5,000 * 30 * 0.5 GFLOPs = 75,000 GFLOPS.
    - New ViT Compute: 5,000 * 1.5 FPS * 50 GFLOPs = 375,000 GFLOPS.
    - Total New Compute: 450,000 GFLOPS = 4.5 kW.
    - New Daily Energy: 4.5 kW * 24h = 108 kWh/day ($16.20/day).

    **Conclusion & Interpretation:**
    - **Result: 1,692 kWh/day or $253.80/day savings (Power-Bound)**. The always-on filter's compute cost is trivial compared to the 16.7x energy reduction.
