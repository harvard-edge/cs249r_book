title: Operational vs Embodied Carbon in a 1,000-GPU Training Cluster
scenario: Your team is deciding whether to train a 70B model on a 1,000-GPU H100 cluster in a region with 50gCO2e/kWh grid intensity (30 days) or a 500-GPU A100 cluster in a region with 450gCO2e/kWh (90 days). Assume a datacenter PUE of 1.2.
question: What are the operational and embodied carbon emissions for the H100 and A100 training options, and which is more carbon-efficient over a 3-year hardware lifecycle?
details:
  realistic_solution: Using the stated runtimes, the H100 option uses 1,000 * 0.7kW * 720h * 1.2 = 604,800 kWh, or 30,240 kgCO2e at 50g/kWh. With an assumed 150 kgCO2e embodied per H100, embodied carbon is 150,000 kgCO2e and the lifecycle total is 180,240 kgCO2e. The A100 option uses 500 * 0.4kW * 2,160h * 1.2 = 518,400 kWh, or 233,280 kgCO2e at 450g/kWh. With an assumed 80 kgCO2e embodied per A100, embodied carbon is 40,000 kgCO2e and the lifecycle total is 273,280 kgCO2e. Under these assumptions, H100 is lower lifecycle carbon despite higher embodied carbon because the cleaner grid dominates.
  common_mistake: |
    **The Pitfall:** Ignoring embodied carbon entirely and only comparing operational emissions.
    **The Rationale:** Cloud provider dashboards heavily feature operational usage, obscuring the massive carbon cost of manufacturing the hardware itself.
    **The Consequence:** Selecting hardware or upgrade cycles that appear "green" operationally but have a catastrophic lifetime carbon footprint due to intense manufacturing costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - One training run over the stated durations. PUE = 1.2.
    - H100: 1000 GPUs, 0.7kW, 720h, 50gCO2e/kWh, 150kg embodied/GPU.
    - A100: 500 GPUs, 0.4kW, 2160h, 450gCO2e/kWh, 80kg embodied/GPU.

    **Calculations:**
    - H100 Operational = 1000 * 0.7 * 720 * 1.2 * 0.050 = 30,240 kgCO2e.
    - H100 Embodied = 1000 * 150 = 150,000 kgCO2e.
    - H100 Lifecycle Total = 150,000 + 30,240 = 180,240 kgCO2e.
    - A100 Operational = 500 * 0.4 * 2160 * 1.2 * 0.450 = 233,280 kgCO2e.
    - A100 Embodied = 500 * 80 = 40,000 kgCO2e.
    - A100 Lifecycle Total = 40,000 + 233,280 = 273,280 kgCO2e.

    **Conclusion & Interpretation:**
    - **Result: H100 cluster is lower lifecycle carbon (Carbon-Intensity-Bound)**. H100 totals about 180 tCO2e versus 273 tCO2e for A100, so the clean-grid H100 option is about 34% lower lifecycle carbon for this run.
