title: Mitigating Power Analysis in Multi-Tenant GPU Inference
scenario: You are architecting a multi-tenant cloud ML inference platform using NVIDIA A100 GPUs. A security audit reveals that a malicious tenant can use fine-grained power telemetry to conduct a differential power analysis attack against a co-located VM, successfully leaking the proprietary Transformer model's architectural hyperparameters.
question: How would you mitigate 1ms GPU power-telemetry leakage, and how do dummy work, power caps, and SEV-SNP compare?
details:
  realistic_solution: |
    The primary mitigation is to prevent untrusted tenants from reading fine-grained GPU power telemetry: restrict NVML/DCGM access at the host or hypervisor layer, export only coarse aggregate readings, and avoid co-locating mutually untrusted workloads on the same physical GPU when leakage risk is unacceptable. Dummy work or power smoothing can reduce signal quality but wastes throughput and is a fallback, not the control plane boundary. Power caps bound maximum draw but do not remove timing leakage. SEV-SNP protects CPU VM memory and does not mitigate GPU power side-channels on A100-class systems.
  common_mistake: |
    **The Pitfall:** Assuming memory encryption (like AMD SEV-SNP) protects against power side-channels.
    **The Rationale:** Engineers rely heavily on marketing terms for Confidential Computing, equating "encryption" with total security.
    **The Consequence:** Memory encryption secures data at rest and transit, but fails to mask the physical power drawn by the GPU during computation, leaving the system completely vulnerable to telemetry side-channels.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fine-grained telemetry is sampled every 1ms.
    - A victim layer sequence may contain millisecond-scale attention and FFN phases with different power draw.
    - The platform uses NVIDIA A100 GPUs, so do not assume a GPU confidential-computing mode removes power telemetry leakage.

    **Calculations:**
    - A 1ms export gives one power reading per millisecond-scale phase, which can reveal the timing pattern of attention and FFN work.
    - Coarsening to a 1-second aggregate combines about 1000 individual 1ms samples into one average, removing the layer-boundary trace from tenant-visible telemetry.
    - Disabling untrusted telemetry access removes the measurement channel; SEV-SNP changes CPU memory confidentiality but leaves this physical GPU telemetry channel unaffected.

    **Conclusion & Interpretation:**
    - **Result: restrict or aggregate telemetry (Side-Channel Mitigation)**. The defensible A100 mitigation is host-level telemetry control and workload isolation; dummy work and power caps are weaker signal-reduction measures, and SEV-SNP is not a fix for GPU power leakage.
