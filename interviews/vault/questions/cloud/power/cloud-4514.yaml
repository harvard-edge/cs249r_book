title: Diurnal Workload Power Scaling
scenario: A cluster of GPUs handles LLM inference with a 10x variation between daily peak and trough traffic, with a strict 100ms P99 SLA.
question: "How would you formulate a dynamic power-management strategy that minimizes energy waste during off-peak hours?"
details:
  realistic_solution: Implement an aggressive workload consolidation and Dynamic Voltage/Frequency Scaling (DVFS) policy. During low traffic, route all requests to a dense subset of GPUs, powering off the rest entirely. On active nodes, scale GPU clocks to the lowest power state that still mathematically meets the 100ms SLA.
  common_mistake: |
    **The Pitfall:** Leaving all GPUs on at idle power.
    **The Rationale:** Candidates assume idle GPUs consume negligible power, ignoring that datacenter GPUs draw significant baseline power even when doing nothing.
    **The Consequence:** Wasting up to 100W per node continuously during low-traffic periods, failing to realize the massive power down savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 10x variation in daily traffic.
       * Strict 100ms SLA prevents shutting everything down completely.
    2. **Calculations:**
       * Baseline Active at Trough: 100% / 10 = 10% capacity required.
       * Potential Shutdown: 100% - 10% = 90%.
    3. **Conclusion & Interpretation:** **Result: 90% Power Savings (Utilization-Bound)**. Consolidating the workloads yields huge energy reductions.
