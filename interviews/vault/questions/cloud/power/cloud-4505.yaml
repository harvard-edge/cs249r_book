title: Dynamic MIG Autoscaling on A100
scenario: You manage a cluster of A100 GPUs for an intermittent batched inference API with high burst traffic.
question: Design a scaling strategy using Multi-Instance GPU (MIG) to effectively duty-cycle compute during low-traffic periods without node power-downs?
details:
  realistic_solution: Implement a time- and queue-depth-aware autoscaler that reconfigures MIG profiles around predictable traffic windows. During low traffic, drain large inference partitions, keep only a 1g.10gb slice for heartbeat or low-rate requests, and either leave the remaining slices idle or assign them to preemptible batch work. Before expected bursts, recreate 7g.80gb or multiple appropriately sized MIG instances and warm the model before admitting traffic. This duty-cycles active GPU slice capacity without relying on full node power-downs.
  common_mistake: |
    **The Pitfall:** Proposing full server ACPI sleep states.
    **The Rationale:** Applying traditional CPU node power management strategies to GPU accelerators.
    **The Consequence:** Incurring massive boot latency during traffic bursts, violating API SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermittent batched inference API with burst traffic.
    - A100 80GB exposes 7 MIG slice units.
    - A 1g.10gb profile consumes 1 of 7 slice units.
    - A 7g.80gb profile consumes all 7 slice units.

    **Calculations:**
    - Low-traffic footprint: 1g.10gb = 1/7 of MIG slice capacity = ~14%.
    - Burst footprint: 7g.80gb = 7/7 of MIG slice capacity = 100%.
    - Reconfiguration policy: drain and shrink after sustained low queue depth; expand and warm before predicted burst windows.

    **Conclusion & Interpretation:**
    - **Result: Time-Based Duty Cycling.** MIG does not power off the node, but it lets the scheduler concentrate or release active slice capacity across low-traffic and burst periods.
