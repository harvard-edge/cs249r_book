title: Dynamic MIG Autoscaling on A100
scenario: 'You manage a cluster of A100 GPUs for an intermittent batched inference API with high burst traffic.'
question: "Design a scaling strategy using Multi-Instance GPU (MIG) to effectively duty-cycle compute during low-traffic periods without node power-downs."
details:
  realistic_solution: 'Implement an autoscaler that reconfigures MIG partitions based on queue depth. During low traffic, tear down large partitions and provision a 1g.10gb instance for heartbeat traffic, leaving the rest of the die idle or for batch tasks. Under burst load, dynamically recreate 7g.80gb partitions to maximize throughput.'
  common_mistake: |
    **The Pitfall:** Proposing full server ACPI sleep states.
    **The Rationale:** Applying traditional CPU node power management strategies to GPU accelerators.
    **The Consequence:** Incurring massive boot latency during traffic bursts, violating API SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermittent batched inference API with burst traffic.
    - A100 supports up to 7 MIG partitions.

    **Calculations:**
    - Idle state footprint: 1g.10gb partition uses ~14% of resources.
    - Burst state footprint: 7g.80gb utilizes 100% of the die.

    **Conclusion & Interpretation:**
    - **Result: Balances power savings with rapid burst readiness (Compute-Bound during bursts).**
