title: The Mid-Afternoon Throttling
scenario: You are training a large model on a cluster of GPUs. The job starts with full performance, but you notice that every afternoon, around 2 PM, the training throughput drops by ~15-20%. Using `nvidia-smi`, you observe that the GPU power draw is consistently capped at ~560W, well below the 700W TDP limit, during these slowdowns.
question: What is the most likely cause of the daily 15-20% throughput drop when GPU power is capped around 560W at 2 PM?
details:
  realistic_solution: The most likely cause is thermal throttling due to an increase in the datacenter's ambient temperature. The afternoon is often the hottest part of the day, which can strain the facility's cooling infrastructure, raising the temperature of the 'cold aisle' air supplied to the servers. A GPU's ability to dissipate heat is relative to this ambient temperature. If the incoming air is hotter, the GPU must reduce its power consumption to keep its internal silicon temperature below the safety limit (e.g., 95°C), causing the observed throttling and performance drop.
  common_mistake: |
    **The Pitfall:** Blaming complex software bugs or hardware failures.
    **The Rationale:** Engineers often jump to explanations like a failing PSU, a bad training script, or a noisy neighbor before considering basic physical constraints.
    **The Consequence:** Time is wasted debugging code and profiling workloads when the root cause is environmental thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Maximum TDP = 700W.
       - Observed Power Cap = 560W.
    2. **Calculations:**
       - Power Draw Percentage = 560W / 700W = 80%.
       - Performance Drop = 100% - 80% = 20%.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Throttling causing a 20% throughput drop.** The GPU dynamically lowers its power limit to stay below critical temperatures.
  options:
  - The server's Power Supply Unit (PSU) is failing and cannot provide the full 700W to the GPU.
  - The training script has a software bug that reduces computational intensity after a few hours of running.
  - A 'noisy neighbor' is running on the same server, stealing CPU cycles and starving the GPU of data.
  - The datacenter's ambient temperature is rising in the afternoon, reducing the GPU's thermal headroom and forcing it to throttle power.
