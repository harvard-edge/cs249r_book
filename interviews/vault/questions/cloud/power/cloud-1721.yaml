title: Evaluating H100 Cluster Power and Cooling Topologies
scenario: 'Your existing data center supports a maximum of 15 kW per rack with traditional air cooling. You are architecting the physical deployment of a 1,024-GPU H100 cluster for LLM pre-training. Each 8-GPU HGX H100 node consumes 10.2 kW and occupies 4U. You must evaluate two options: 1) A ''sparse'' air-cooled deployment placing exactly one node per 42U rack. 2) A ''dense'' Direct-to-Chip Liquid Cooling (DLC) upgrade supporting 50 kW per rack, allowing four nodes per rack, but carrying a 25% OpEx facility premium and a 3-month retrofit delay.'
question: Should you choose sparse air cooling or dense liquid cooling for the 1,024-GPU H100 cluster, and how do power limits affect networking, TCO, and throughput?
details:
  realistic_solution: 'The dense liquid-cooled setup is superior for large-scale synchronous training. While air-cooling avoids the 3-month facility delay, spreading 128 nodes across 128 racks to respect the 15kW power wall forces almost all inter-node GPU connections to use expensive Active Optical Cables (AOCs). The dense 32-rack DLC setup keeps the core GPU fabric localized, heavily utilizing copper DACs. The networking capital savings and the improved distributed scaling efficiency (due to localized spine-leaf hops) offset the facility premium and the 3-month delay over the multi-year lifecycle of the cluster.'
  common_mistake: 'Focusing purely on the 3-month delay or physical rack U-space, while failing to analyze how a sparse 128-rack layout destroys the feasibility of using cheap, low-latency copper DAC cables, thereby drastically inflating optical networking costs and tail latency.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Sparse setup: 1 node/rack (128 racks total).
    - Dense setup: 4 nodes/rack (32 racks total).
    - AOC optics cost: ~$1,000 per link.
    - DAC copper cost: ~$100 per link.

    **Calculations:**
    - Sparse networking: ~512 optical links required for first tier -> $512k+ optics premium.
    - Dense networking: ~75% of first-tier connections stay intra-rack via $100 copper DACs.
    - DAC savings easily exceed the 25% facility power/cooling premium.

    **Conclusion & Interpretation:**
    - **Result: Dense liquid cooling is vastly superior (Network-Latency-Bound)**. Spreading nodes across 128 racks destroys scaling efficiency and mandates expensive optical cables.
