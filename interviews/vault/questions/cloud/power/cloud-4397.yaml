title: MI300X OAM Module Thermal Interface and Cooling Validation
scenario: You are qualifying a new MI300X OAM (Open Accelerator Module) server for production. The vendor spec states a maximum junction temperature of 110°C and a thermal design current (TDC) of 750W at 25°C ambient. Your datacenter runs at 30°C ambient supply air. During burn-in tests, the HBM stack temperature (visible via AMD SMI) reaches 95°C at 90% GPU utilization, but the die temperature is 82°C.
question: Using HBM as the limiting sensor, what monitoring policy prevents throttling and what safe utilization follows from the burn-in data?
details:
  realistic_solution: 'Monitor die and HBM separately, but HBM is limiting here. Die junction margin is 110°C - 82°C = 28°C. HBM is already 95°C at 90% utilization, which is 10°C above an 85°C soft throttle threshold, so the workload should be throttled or the cooling profile changed immediately. Do not use die-to-ambient thermal resistance to size the HBM reduction. Using the burn-in data as an empirical HBM model, assume HBM temperature rise over 30°C ambient scales roughly with utilization: at 90% utilization the rise is 95 - 30 = 65°C. To keep HBM at 85°C, allowable rise is 55°C, so safe utilization is about 90% * 55/65 = 76%. Policy: warn at HBM 80°C, throttle/admission-limit at 85°C, page at 95°C, and reserve emergency shutdown for the platform critical limit rather than treating the current 95°C reading as normal.'
  common_mistake: |
    **The Pitfall:** Using junction temperature (die temp) as the only throttle indicator while ignoring HBM stack temperature.
    **The Rationale:** Candidates assume the compute die is the most thermally sensitive component, forgetting that HBM memory has strict thermal limits (~85-90°C) and throttles earlier.
    **The Consequence:** The workload suffers silent memory bandwidth throttling by 10-20% because the HBM is overheating while the die appears safe.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ambient supply air is 30°C.
    - HBM is 95°C at 90% utilization.
    - Use HBM as the limiting sensor and approximate HBM temperature rise over ambient as linear with utilization.
    - HBM soft limit is 85°C.

    **Calculations:**
    - Die margin = 110°C - 82°C = 28°C.
    - Current HBM reading is 95°C, which is 10°C above the 85°C soft limit.
    - Current HBM rise over ambient = 95°C - 30°C = 65°C at 90% utilization.
    - Allowed HBM rise = 85°C - 30°C = 55°C.
    - Empirical safe utilization from this linearized burn-in model ≈ 90% * (55 / 65) = 76%.

    **Conclusion & Interpretation:**
    - **Result: HBM-Thermal Bound**. Without better airflow or contact quality, cap utilization near the empirical 76% estimate to keep HBM below the 85°C soft limit; alert thresholds are policy controls around that limit.
