title: Cooling Strategy for Water-Scarce Region
scenario: You are building an AI training datacenter in a water-scarce desert region with cheap solar power at $0.05/kWh. Options (A) evaporative cooling (WUE=1.8, PUE=1.2, cheapest), (B) closed-loop liquid cooling (WUE=0.1, PUE=1.1, 2x capex), (C) air cooling with heat exchangers (WUE=0, PUE=1.5, moderate cost).
question: "For a 10 MW IT-load datacenter in a water-scarce desert, which cooling option provides the best TCO and sustainability balance, and why?"
details:
  realistic_solution: Option B (closed-loop liquid) is the optimal strategy. It eliminates water consumption controversy, prevents existential permit denial risks in a desert environment, and provides maximum power efficiency.
  common_mistake: |
    **The Pitfall:** Choosing evaporative cooling (Option A) purely because it has the lowest upfront cost.
    **The Rationale:** Standard datacenter economics often heavily weight initial Capex and assume resources like water are cheap and plentiful.
    **The Consequence:** In a water-scarce region, consuming millions of liters of water can trigger severe community backlash and permit denial, shutting down the project entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - IT load: 10 MW.
       - Energy cost: $0.05/kWh.
       - Hours per year: 8,760.
       - Annual IT energy: 10 MW * 8,760 h = 87,600,000 kWh.
    2. **Calculations:**
       - Option A (Evaporative): Water: 87.6M * 1.8 = 157.7M liters/yr. Energy: 10 MW * 1.2 PUE * 8760 * $0.05 = $5.26M/yr.
       - Option B (Liquid): Water: 87.6M * 0.1 = 8.76M liters/yr. Energy: 10 MW * 1.1 PUE * 8760 * $0.05 = $4.82M/yr.
       - Option C (Air): Water: 0 liters. Energy: 10 MW * 1.5 PUE * 8760 * $0.05 = $6.57M/yr.
       - Savings B vs A: Water = 149M liters/yr. Energy = $440K/yr.
    3. **Conclusion & Interpretation:**
       - **Result: Resource-Bound Economics.** Option B saves 149M liters of water and $440K/yr in energy compared to A, quickly recovering the 2x Capex and eliminating permit denial risk.
