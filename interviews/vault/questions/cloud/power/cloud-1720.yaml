title: 'Diagnosing Sustained Training Throughput Drops on H100 Nodes'
scenario: 'You are training a dense LLM across a cluster of 8-GPU NVIDIA H100 nodes. Each GPU has a 700W TDP. After 20 minutes of sustained training, the overall cluster throughput mysteriously drops by 15-20%. Network bandwidth, CPU utilization, and data loading remain perfectly stable. Telemetry indicates the ambient data center temperature is normal, but node-level telemetry shows the GPU clock speeds fluctuating erratically on specific nodes.'
question: 'What causes the 15-20% throughput drop after 20 minutes of stable training, and how can it be mitigated?'
details:
  realistic_solution: 'The throughput drop is caused by thermal throttling due to hitting the Power Wall. The dense 8-GPU nodes (5.6kW just for GPUs) are generating heat faster than the local cooling infrastructure can dissipate it in sustained workloads. The GPUs automatically downclock to prevent damage, creating stragglers that slow down the entire synchronous training job. Diagnosis involves using NVML or `nvidia-smi` to correlate `clocks.current.sm` drops with `temperature.gpu` approaching the slowdown threshold (e.g., 85°C+). Mitigation includes lowering the GPU power limit (e.g., 700W to 600W) to sacrifice peak theoretical performance for stable, sustained throughput, or improving rack-level liquid cooling.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing hardware thermal throttling as a software-level straggler issue.
    **The Rationale:** Candidates immediately assume a data pipeline bottleneck or a network synchronization overhead without checking thermodynamic limits.
    **The Consequence:** Engineering weeks are wasted profiling software while the hardware physically prevents the required throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Node Power: 8 GPUs * 700W = 5.6 kW per node
    - Rack Power: 4 nodes per rack > 22.4 kW
    - Datacenter rack cooling limit: 20 kW

    **Calculations:**
    - Cooling Deficit = 22.4 kW - 20 kW = 2.4 kW of residual heat
    - Time to throttle: Heat accumulates over 20 minutes until GPUs hit ~85°C

    **Conclusion & Interpretation:**
    - **Result: 15-20% Drop (Thermal-Bound)**. Heat accumulates over 20 minutes until GPUs hit ~85°C and downclock by 15-20% to reduce heat output.
