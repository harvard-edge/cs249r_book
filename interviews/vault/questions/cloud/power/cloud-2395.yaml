title: Power-Capped Rack Density Tradeoff
scenario: 'You are designing a high-density LLM serving pod. The datacenter has a strict power limit of 40kW per rack. You are evaluating two configurations for HGX H100 nodes (8 GPUs). Option A: 4 nodes per rack, running at max TDP (700W per GPU, 10kW per node including CPU/Mem), yielding 3000 tokens/sec per node. Option B: 6 nodes per rack, power-capped to 400W per GPU (6.5kW per node). Under a 400W cap, H100s retain 80% of their max throughput.'
question: Which rack configuration maximizes total tokens/sec under the 40kW limit, and what tradeoff does it introduce?
details:
  realistic_solution: Option A exactly fills the rack power budget with 4 nodes * 10kW = 40kW and produces 4 * 3000 = 12,000 tokens/sec. Option B fits 6 power-capped nodes in the same rack because 6 * 6.5kW = 39kW. Each capped node retains 80% of the max-throughput node rate, so it produces 0.8 * 3000 = 2400 tokens/sec, or 6 * 2400 = 14,400 tokens/sec per rack. Option B therefore maximizes rack throughput under the 40kW limit, winning by 20%. The tradeoff is that the rack uses 50% more nodes, which raises hardware CapEx, operational complexity, failure surface, networking, and scheduling overhead even though total rack throughput is higher.
  common_mistake: |
    **The Pitfall:** Assuming that running GPUs at max TDP always yields the best performance-per-rack.
    **The Rationale:** Ignoring the non-linear relationship between frequency, voltage, and power ($P \propto C V^2 f$).
    **The Consequence:** Deploying power-inefficient racks that hit datacenter power ceilings prematurely, limiting total possible throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Limit: 40kW per rack.
    - Option A: 4 nodes * 10kW = 40kW. 3000 tokens/sec per node.
    - Option B: 6 nodes * 6.5kW = 39kW. 2400 tokens/sec per node (80% of max).

    **Calculations:**
    - Option A Throughput: 4 * 3000 = 12,000 tokens/sec.
    - Option B Throughput: 6 * 2400 = 14,400 tokens/sec.
    - Difference: 14,400 / 12,000 = 1.2x (20% increase).

    **Conclusion & Interpretation:**
    - **Result: 14,400 tokens/sec (Power-Bound)**. Option B yields 20% higher throughput within the identical power footprint.
