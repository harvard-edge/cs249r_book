title: 'Diagnosing High Idle Power in GPU Clusters'
scenario: You are investigating a power usage anomaly in a dense cluster of 8-GPU H100 nodes. During a period of low workload utilization (20%), the cluster's total power draw remains near 60% of peak power. The facility cooling system recently underwent maintenance, causing ambient inlet temperatures to rise from 22°C to 28°C.
question: Why does the H100 cluster still draw 60% of peak power at 20% utilization after inlet temperatures rise to 28°C?
details:
  realistic_solution: 'Analyze the static versus dynamic power breakdown. At low utilization, dynamic power drops, making static power the dominant factor. The 6°C ambient temperature rise significantly increases the silicon die temperature, which causes subthreshold leakage current to grow exponentially. The solution requires deeper sleep states (power gating) rather than just clock gating, or restoring the CRAC cooling capacity to lower the leakage.'
  common_mistake: |
    **The Pitfall:** Assuming power consumption scales linearly with compute utilization.
    **The Rationale:** This ignores the exponential relationship between static power (leakage current) and operating temperature.
    **The Consequence:** Misdiagnosing the power anomaly as a software issue rather than a physical thermal leakage problem.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Power: 700W (500W dynamic, 200W static).
    - Utilization drops to 20%, reducing dynamic power to 100W.
    - Ambient rises 6°C.
    
    **Calculations:**
    - Temperature Effect: 6°C rise pushes static leakage from 200W to ~320W.
    - Total Power: 100W (dynamic) + 320W (static) = 420W.
    - Ratio: 420W / 700W = 60%.
    
    **Conclusion & Interpretation:**
    - **Result: 420W total (Power-Bound)**. 420W is 60% of the 700W peak, driven entirely by thermal leakage.
