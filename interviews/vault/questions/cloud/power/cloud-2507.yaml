title: Model Compression Carbon ROI
scenario: 'Your team serves a 175B parameter FP16 model, processing 5 million requests daily. An engineer proposes distilling and quantizing the model to INT8 to save inference power. The retraining/distillation process will require 512 A100 GPUs running continuously for 14 days.'
question: When does the INT8 distillation project break even on carbon versus continuing FP16 inference for 5M daily requests?
details:
  realistic_solution: 'Evaluating the carbon ROI requires comparing the one-time carbon cost of retraining against the recurring carbon savings during inference. Distillation and Quantization-Aware Training (QAT) are highly compute-intensive. While INT8 reduces memory bandwidth requirements and utilizes efficient tensor cores, lowering the per-token inference energy, the upfront training emissions are massive. If the model is updated frequently (e.g., retrained monthly) or has low inference traffic, the project will be carbon-negative overall. The tradeoff balances model accuracy, upfront compute cost (CapEx/Carbon), and long-term serving efficiency (OpEx/Carbon). A proper decision requires calculating the break-even point in days to see if it fits within the model''s deployment lifespan.'
  common_mistake: 'Assuming quantization always yields an immediate carbon benefit without quantifying the massive upfront emission cost of the retraining and distillation process.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Retraining nodes: 512 A100 GPUs (400W/GPU). PUE = 1.5. Duration = 14 days.
    - Inference volume: 10,000 node-hours/day.
    - Quantization savings: 200W per node.
    
    **Calculations:**
    - Retraining power: 512 GPUs * 0.4 kW * 1.5 PUE = 307.2 kW.
    - Total retraining energy: 307.2 kW * 336 hours = 103,219 kWh.
    - Daily inference energy saved: 10,000 hours * 0.2 kW = 2,000 kWh/day.
    - Break-even time: 103,219 kWh / 2,000 kWh/day ≈ 51.6 days.
    
    **Conclusion & Interpretation:**
    - **Result: ~52 Days Break-Even (Carbon-Emission Bound)**. The massive upfront energy cost of INT8 distillation requires the model to remain in production for over 2 months without updates to achieve a net-positive carbon return.
