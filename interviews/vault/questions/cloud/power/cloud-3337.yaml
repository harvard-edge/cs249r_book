title: Diagnosing Performance Variability on Google TPU v5e due to Thermal Constraints
scenario: You are observing a critical training job on a TPU exhibiting significant performance degradation. The model uses close to the full 16 GB HBM. Sustained training throughput drops by 30-40% after the first hour, occasionally worsening with hotter ambient datacenter temperatures.
question: How would you diagnose whether TPU training slowdowns after an hour are caused by thermal throttling and ambient temperature effects?
details:
  realistic_solution: 'A systematic diagnosis would involve: 1. Monitoring available TPU/runtime metrics such as step time, sustained throughput, power-limit or throttle indicators, and any exposed temperature or clock telemetry. 2. Correlating performance drops with hotter ambient datacenter periods, rack inlet temperature, airflow, and cooling events. 3. Checking host and runtime logs for thermal or power-limit messages. 4. Ruling out software causes such as input stalls, recompilation, or communication imbalance. 5. Mitigating by improving facility cooling and airflow, moving the job to healthier capacity, scheduling long runs during cooler periods when practical, or escalating to the cloud/vendor if hardware telemetry indicates throttling.'
  common_mistake: |
    **The Pitfall:** Immediately blaming software or code inefficiencies without ruling out environmental factors.
    **The Rationale:** Software engineers often overlook the physical realities of accelerator hardware, assuming peak TFLOPS are continuously sustainable.
    **The Consequence:** Wasting weeks trying to optimize perfectly good matrix math while the hardware continues to automatically throttle itself to prevent melting.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak BF16 compute: 197 TFLOPS.
    - Throughput drops by 30-40% after 1 hour.

    **Calculations:**
    - A 30% throughput drop means sustained throughput is 70% of baseline.
    - Step time scales inversely with throughput, so step time multiplier = 1 / 0.70 = 1.43, or a 43% increase.
    - A 40% throughput drop means sustained throughput is 60% of baseline, so step time multiplier = 1 / 0.60 = 1.67, or a 67% increase.

    **Conclusion & Interpretation:**
    - **Result: 30-40% throughput loss implies about 43-67% longer step times (Thermal-Bound)**. Diagnose by correlating this throughput loss with rising temperature, lower clocks, power-limit events, and hotter ambient periods.
