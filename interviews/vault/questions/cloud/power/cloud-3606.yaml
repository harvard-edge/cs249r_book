title: Cooling Bottleneck Analysis for Dense H100 GPU Rack
scenario: A standard 42U rack contains 8 HGX H100 nodes (8×H100 each = 64 GPUs total). Each GPU draws 700W; each node draws ~10.5kW including CPUs and networking. The rack's PDU supports 30kW and CRAC cooling supports 25kW per rack.
question: What is the rack power or cooling bottleneck for 8 HGX H100 nodes, and what rack density is actually usable?
details:
  realistic_solution: '8 nodes × 10.5kW = 84kW peak per rack. Both PDU (30kW) and cooling (25kW) are far below peak. Maximum utilizable: cooling-limited at 25kW → 25/10.5=2.4 nodes at 100%, or 8 nodes at 25/84=30% GPU utilization. For training (sustained 100% GPU), use at most 2-3 HGX nodes per rack with in-row liquid cooling. Modern liquid-cooled racks handle 100kW+ enabling full density.'
  common_mistake: |
    **The Pitfall:** Planning for peak GPU TDP without including system overhead.
    **The Rationale:** Candidates focus only on the GPU power specs (700W) and ignore CPU, memory, networking, and PSU inefficiencies.
    **The Consequence:** They overestimate the number of nodes a rack can support and hit cooling/power limits in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 HGX nodes per rack.
       - Power per node: 10.5 kW.
       - Rack Cooling Capacity: 25 kW.
       - Rack PDU Capacity: 30 kW.
    2. **Calculations:**
       - Total Peak Power Demand: 8 nodes * 10.5 kW/node = 84 kW.
       - PDU Bottleneck: 84 kW > 30 kW.
       - Cooling Bottleneck: 84 kW > 25 kW (Strictest limit).
       - Max Rack Density (nodes): 25 kW / 10.5 kW/node = 2.38 nodes.
       - Max Rack Utilization (with 8 nodes): 25 kW / 84 kW ≈ 29.8%.
    3. **Conclusion & Interpretation:** **~29.8% usable density (Cooling Capacity-Bound).**
