title: Transformer Inference Memory Bandwidth Saturation and Power Envelope
scenario: You are profiling energy efficiency for a Llama-2 13B inference workload. At batch size 1, the GPU draws 320W and achieves 140 tokens/sec. At batch size 64, it draws 680W and achieves 8,320 tokens/sec.
question: Why is energy per token lower at batch 64, and how should batching be chosen under a 200 ms TTFT SLA?
details:
  realistic_solution: |
    Batch 1: E/token = 320W / 140 tok/s = 2.28 J/token. Batch 64: E/token = 680W / 8,320 tok/s = 0.0817 J/token, so batch 64 is about 96% lower energy per token. The reason is weight reuse: batch 1 streams model weights for very few tokens and is memory-bandwidth-bound, while larger batches amortize weight reads and fixed GPU power across more tokens. The 200 ms TTFT SLA cannot be converted into an exact maximum batch size from the given throughput numbers alone. Choose the largest microbatch/admission window whose measured p99 TTFT stays below 200 ms, and back off when queueing plus prefill latency approaches the SLA.
  common_mistake: |
    **The Pitfall:** Treating energy/token as constant across batch sizes.
    **The Rationale:** At batch 1, the GPU is deeply memory-bandwidth-bound, so most compute transistors sit idle while HBM streams weights. Idle power is amortized over very few tokens.
    **The Consequence:** Datacenters run at sub-optimal batch sizes, massively inflating energy costs per token.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch 1: 320W, 140 tok/s.
    - Batch 64: 680W, 8320 tok/s.
    - SLA: 200ms TTFT.
    - Exact TTFT versus batch size must be measured because it includes queueing, scheduling, and prefill latency.

    **Calculations:**
    - Batch 1: 320W / 140 = 2.28 J/tok.
    - Batch 64: 680W / 8320 = 0.0817 J/tok.
    - Reduction: 1 - (0.0817 / 2.28) = 96.4%.
    - Valid batch choices must satisfy: p99(queue wait + prefill time) <= 200ms.

    **Conclusion & Interpretation:**
    - **Result: SLA-Constrained Batching**. Batch 64 is far more energy efficient than batch 1, but the energy-minimizing batch is the largest measured batch that still meets the 200ms p99 TTFT target.
