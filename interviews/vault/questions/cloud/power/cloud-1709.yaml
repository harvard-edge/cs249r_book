title: Cloud RAPL Power Side-Channel Analysis
scenario: A multi-tenant cloud host with Intel CPUs runs a confidential proprietary LLM inference service on an NVIDIA H100 GPU alongside an attacker-controlled VM. The attacker monitors shared server power consumption via CPU-side Intel RAPL and GPU-side NVML at 1ms resolution. By observing the power fluctuating between a 300W memory-bound baseline and 650W compute-bound spikes, the attacker aims to reverse-engineer the victim's model architecture (layer sizes) and input sequence lengths.
question: How should you mitigate software power side-channel attacks against the co-hosted LLM service?
details:
  realistic_solution: First restrict or virtualize hardware power telemetry so unprivileged tenants cannot read high-resolution RAPL or NVML counters, and throttle/coarsen any tenant-visible exports. For higher-assurance isolation, add optional power obfuscation such as padding or dummy GEMM work, but treat constant-power execution as expensive hardening rather than the primary mitigation.
  common_mistake: |
    **The Pitfall:** Assuming power analysis attacks strictly require physical access with an oscilloscope.
    **The Rationale:** Security engineers underestimate the granularity of software-exposed power metrics like RAPL.
    **The Consequence:** Cloud environments inadvertently leak high-resolution execution traces, allowing attackers to map proprietary model architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Timing: Decoding 1 token takes approximately 15 ms. Sampling RAPL/NVML at 1 kHz yields 15 samples/token.
    - Telemetry: RAPL exposes Intel CPU/package power; NVML exposes NVIDIA GPU power.
    - Power: Memory ops draw 350 W (5 ms) and FP8 GEMMs draw 650 W (10 ms).

    **Calculations:**
    - Samples per token: 15 ms / 1 ms = 15 samples.
    - Energy signature: E = (350 W * 0.005 s) + (650 W * 0.010 s) = 8.25 J.

    **Conclusion & Interpretation:**
    - **Result: 8.25 J per token-pattern example (Telemetry Side-Channel)**. The 1 ms sampling gives enough points across a 15 ms token to correlate power phases with execution behavior; mitigation should primarily restrict or coarsen telemetry, with workload padding as optional hardening.
