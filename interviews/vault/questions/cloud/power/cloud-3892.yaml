title: H100 Cluster Power and Cooling Architecture
scenario: You are designing a new large-scale training cluster using 8x H100 nodes within a strict total facility power budget of 25 MW. Each node requires 8.0 kW. Your standard air-cooled racks support 15 kW maximum, yielding a facility PUE of 1.3. Alternatively, you can deploy direct-to-chip (D2C) liquid-cooled racks supporting 60 kW each, which lowers the facility PUE to 1.15.
question: Which cooling architecture maximizes compute under the 25 MW facility cap, and how many nodes and racks can air vs D2C liquid support?
details:
  realistic_solution: 'The correct approach is to calculate the IT power budget for both scenarios and translate that into node counts and rack counts. The liquid-cooled architecture is favored: the lower PUE frees up about 2.5 MW for IT load, yielding 314 additional nodes. The higher rack density also reduces the required rack count from 2,403 air-cooled racks to 389 liquid-cooled racks.'
  common_mistake: |
    **The Pitfall:** Forgetting to divide the total facility budget by the PUE to find the IT power budget.
    **The Rationale:** Candidates often equate facility power with IT power, neglecting cooling overheads entirely.
    **The Consequence:** They overestimate the deployable IT load, overcommit facility capacity, and produce node counts that cannot be powered or cooled within the 25 MW cap.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Budget: 25,000 kW.
    - Air PUE: 1.3, Liquid PUE: 1.15.
    - Node power: 8 kW.

    **Calculations:**
    - Air-cooled IT Power: 25,000 / 1.3 = 19,230 kW. Max air nodes: 19,230 / 8 = 2,403 nodes.
    - Air racks: floor(15 / 8) = 1 node/rack. Total racks: 2,403.
    - Liquid-cooled IT Power: 25,000 / 1.15 = 21,739 kW. Max liquid nodes: 21,739 / 8 = 2,717 nodes.
    - Liquid racks: floor(60 / 8) = 7 nodes/rack. Total racks: ceil(2,717 / 7) = 389.

    **Conclusion & Interpretation:**
    - **Result:** **Liquid cooling yields 314 more nodes and reduces rack count by (2,403 - 389) / 2,403 = 83.8%, assuming comparable rack floor area.**
