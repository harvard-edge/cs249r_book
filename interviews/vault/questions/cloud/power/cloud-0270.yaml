title: The Datacenter Rack Power Budget
scenario: 'You are designing a new AI cluster. Your datacenter provider allocated a single liquid-cooled rack with a 70 kW power limit. You plan to populate it with servers containing one H100 GPU (700W) and non-GPU components (300W). The datacenter has a PUE of 1.1.'
question: "How many one-H100 servers can fit in a 70 kW rack when each uses a 700W GPU, 300W non-GPU, and the PUE is 1.1?"
details:
  realistic_solution: 'Calculate total power per server at the facility level, including PUE overhead, then divide the rack''s total power budget by that number. 700W + 300W = 1kW. With PUE of 1.1, facility power is 1.1kW per server. 70kW / 1.1kW = 63.63 servers.'
  common_mistake: |
    **The Pitfall:** Dividing the rack budget solely by the GPU TDP (70,000W / 700W = 100 GPUs).
    **The Rationale:** Candidates often ignore non-GPU server components and datacenter cooling overhead (PUE).
    **The Consequence:** Designing a rack that will immediately overdraw power and trip the circuit breakers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack power limit: 70 kW.
       - Power per server: 700W (GPU) + 300W (non-GPU).
       - PUE: 1.1.
    2. **Calculations:**
       - Power per server: 700W + 300W = 1,000W (1 kW).
       - Facility power per server: 1 kW × 1.1 = 1.1 kW.
       - Max servers per rack: 70 kW / 1.1 kW = 63.63 servers.
    3. **Conclusion & Interpretation:**
       **Result: Power Bound. You can safely install 63 servers.**
  options:
  - '100 GPUs. (Calculation: 70,000W / 700W)'
  - '70 GPUs. (Calculation: 70,000W / 1,000W)'
  - '63 GPUs. (Calculation: 70,000W / 1,100W)'
  - '90 GPUs. (Calculation: 70,000W / 770W)'
