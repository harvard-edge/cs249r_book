title: Rack Cooling Limits for 8-GPU H100 vs A100 Nodes
scenario: 'You are helping the data center team provision a new cloud rack with a strict thermal cooling limit of 15 kW. The team wants to deploy standard 8-GPU server nodes and needs to understand the generational differences in thermal management. You must evaluate the total maximum thermal output (TDP) of the GPUs in an 8x H100 server versus an 8x A100 server, assuming the base system components add a constant 2 kW of heat per server.'
question: What is the thermal output of 8x H100 versus 8x A100 GPUs, and how many full 8x H100 servers can a 15 kW rack cool?
details:
  realistic_solution: 'To ensure stable sustained performance without thermal throttling, the cooling infrastructure must be able to handle the peak combined heat dissipation of the node. The higher thermal density of the H100 severely limits rack density, allowing only one 8x H100 server in a 15 kW envelope.'
  common_mistake: |
    **The Pitfall:** Failing to recall the significant TDP jump between A100 and H100 generations.
    **The Rationale:** Candidates often assume they can fit the same number of nodes per rack as previous generations, or they forget to add the baseline 2 kW system power to the GPU power before calculating the rack fit.
    **The Consequence:** Over-provisioning racks, which leads to immediate thermal throttling, hardware shutdown, or localized data center hot spots.
  napkin_math: |
    **Assumptions & Constraints:**
    - Rack cooling limit: 15 kW.
    - Base server chassis power: 2.0 kW.
    - A100 TDP: 400W per GPU.
    - H100 TDP: 700W per GPU.
    
    **Calculations:**
    - 8x A100 server thermal output: (8 * 400W) + 2,000W = 5.2 kW.
    - 8x H100 server thermal output: (8 * 700W) + 2,000W = 7.6 kW.
    - Rack capacity (H100 nodes): 15 kW / 7.6 kW = 1.97 servers.
    
    **Conclusion & Interpretation:**
    - **Result: 1 H100 Server (Thermal-Bound)**. Despite space, the rack can only cool a single fully-loaded 8x H100 server, highlighting the massive generational thermal density jump.
