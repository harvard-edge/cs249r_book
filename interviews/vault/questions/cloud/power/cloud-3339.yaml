title: NVIDIA A100 Thermal Throttling in Cloud Inference at Scale
scenario: You are leading the infrastructure team for a hyperscale cloud provider optimizing an A100 inference service. The data center operates at 25°C ambient, but localized rack hotspots reach 35°C during peak compute. You observe up to 30% reduction in effective TFLOPS due to thermal throttling.
question: "What thermal-aware orchestration, power, and cooling strategy would you use to prevent A100 throttling under 35°C rack hotspots?"
details:
  realistic_solution: 'Deploy a holistic hardware-software strategy. 1) Workload Orchestration: Use a thermal-aware Kubernetes scheduler to migrate heavy batch jobs away from 35°C hotspots to cooler racks. 2) Adaptive Power Management: Dynamically cap the GPU TDP (e.g., lower to 350W) in hotspots to prevent severe threshold throttling, prioritizing stable throughput over burst speeds. 3) Facility integration: Adjust CRAC setpoints and ensure cold aisle containment. 4) Application fallback: Dynamically reduce batch sizes or lower precision (FP16 to INT8) when a node signals thermal stress.'
  common_mistake: |
    **The Pitfall:** Proposing unrealistic physical hardware changes or focusing solely on code optimization.
    **The Rationale:** Software engineers default to rewriting kernels, while hardware engineers suggest retrofitting custom liquid cooling—both ignore the operational reality and cost constraints of a live hyperscale datacenter.
    **The Consequence:** Millions spent on retrofits, or zero resolution because software optimization cannot overcome fundamental physical heat limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU TDP: 400W.
       - Thermal Junction (Tj) Limit: 90°C.
       - Ambient Hotspot (Ta): 35°C.
    2. **Calculations:**
       - Max allowable thermal resistance (Rth): (Tj_max - Ta_max) / Power
       - Rth = (90°C - 35°C) / 400W = 55°C / 400W = 0.1375 °C/W.
       - If current air cooling provides Rth = 0.2 °C/W:
       - Tj = 35°C + (0.2 °C/W * 400W) = 35°C + 80°C = 115°C.
    3. **Conclusion & Interpretation:**
       - **Result: 115°C Junction Temp (Throttles).** The environment is strictly **Thermal-Bound**. The cooling system cannot dissipate 400W at 35°C ambient, mandating TDP capping or workload migration.
