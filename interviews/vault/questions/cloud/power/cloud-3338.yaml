title: Cloud LLM Thermal Design with AMD MI300X
scenario: A major cloud provider is designing a new high-performance computing instance type optimized for large language model workloads, utilizing the AMD MI300X accelerator. You need to propose a comprehensive thermal management strategy for a server node containing two MI300X accelerators and discuss how you would predict and mitigate thermal throttling to maintain SLA-compliant performance.
question: How would you design cooling and throttling mitigation for a two-MI300X server node to maximize sustained training performance and meet SLAs?
details:
  realistic_solution: Implement a hybrid cooling solution, likely involving direct-to-chip liquid cooling for the AMD MI300X accelerators (with a TDP of up to 750W per card) due to their high power density, combined with traditional air cooling for other server components. Design a robust monitoring system to track real-time GPU junction temperatures, HBM3 temperatures, and power consumption. Use this data to implement dynamic power capping mechanisms and intelligent workload scheduling that can shift tasks or reduce frequency to prevent throttling, thus ensuring sustained performance within thermal envelopes. The MI300X delivers 1,307 TFLOPS FP16 sparse at peak; thermal management ensures this peak is achievable. Optimize rack and data center layout for efficient heat extraction and minimize hot spots.
  common_mistake: |
    **The Pitfall:** Underestimating the thermal design power (TDP) under sustained high-utilization workloads.
    **The Rationale:** Failing to account for the cumulative heat load in densely packed racks and variability of ambient temperatures.
    **The Consequence:** Relying purely on traditional air-cooling leads to premature thermal throttling and severe SLA violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X TDP: 750W. Total node GPU heat load: 1500W.
    - PUE: 1.5. Electricity cost: $0.10/kWh.

    **Calculations:**
    - Suboptimal cooling (1200W capacity) forces throttling: (1500W - 1200W) / 1500W = 20% performance drop.
    - Full power draw per chip (with PUE): 750W × 1.5 = 1,125W.
    - Annual power cost: 1.125 kW × 24h × 365d = 9,855 kWh.
    - Total OPEX: 9,855 kWh × $0.10 = $985.50 per GPU.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound**. Under-provisioning cooling capacity directly caps compute TFLOPS by 20%, breaking SLA commitments and rendering the accelerators inefficient.
