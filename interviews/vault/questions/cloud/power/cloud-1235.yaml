title: Evaluating Event-Driven Activation for Cloud Video Analytics
scenario: You are designing a cloud-based video analytics pipeline processing 10,000 live 1080p traffic camera streams. The baseline architecture uses continuous dense ResNet-50 inference at 30 FPS on NVIDIA T4 GPUs, resulting in massive power consumption (70W per GPU) even though the camera scenes are completely static 90% of the time. A proposal suggests implementing an event-driven activation paradigm using a lightweight spatial-temporal differencing filter to trigger the full dense matrix multiplications only on frames with active motion.
question: 'Evaluate the energy vs. latency trade-offs of this design: under what hardware and data conditions does the overhead of the event-generation logic negate the overall power savings?'
details:
  realistic_solution: The design is net-positive only when the continuously running trigger consumes less power than the dense inference it allows the system to skip. For a GPU serving N streams, the trigger budget is roughly the skipped dense-inference power, N * s * P_dense_per_stream, minus any idle, batching, wake-up, and host overhead. It works best when motion is sparse and uncorrelated, the trigger runs on very low-power CPU/ISP/edge logic, and GPUs can sleep, clock-gate, or consolidate active streams. It loses when motion is bursty across many cameras, trigger power is close to dense inference power, wake-up and batching overheads dominate, or P99 latency requires keeping enough GPUs hot that little dense-inference power is actually avoided.
  common_mistake: |
    **The Pitfall:** Assuming the event-triggering filter has zero compute or power overhead.
    **The Rationale:** Candidates focus solely on the power saved by shutting down the main DNN.
    **The Consequence:** They fail to account for the P99 tail latency spikes caused by sudden bursts of concurrent frame activations across multiple streams during peak traffic events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model one T4 GPU at 70W serving N streams under continuous dense inference.
    - Static fraction s = 90%, so dense inference can be skipped for 90% of frames if GPUs can actually idle or consolidate work.
    - Trigger power is P_trigger per stream and runs continuously.

    **Calculations:**
    - Dense power share per stream: 70W / N.
    - Event-driven power per GPU: N * P_trigger + 10% * 70W + overheads.
    - Net savings require N * P_trigger + 7W + overheads < 70W.
    - Break-even trigger budget: P_trigger < (63W - overheads) / N per stream.
    - Example: if N = 10 streams/GPU and overheads are 5W, P_trigger must be < 5.8W per stream; a 2W trigger saves power, while a high-power trigger or always-hot GPU reserve can erase the gain.

    **Conclusion & Interpretation:**
    - **Result: Net savings require trigger power below the skipped dense-inference power.** With 90% static streams, the break-even trigger budget is (63W - overheads) / N per stream for each 70W GPU; bursty activations or always-hot GPUs can erase those savings through latency and capacity overhead.
