title: Thermal Throttling During Long-Context Training on H100
scenario: During a 72-hour training run on GPUs, ambient temperature in the datacenter rises 5°C due to a partial HVAC failure that lasts 2 hours. The GPU begins thermal throttling, dropping from 1.41GHz to 1.19GHz until ambient temperature is restored.
question: What throughput loss and recovery-time impact should you expect from throttling from 1.41GHz to 1.19GHz after the 5°C ambient rise?
details:
  realistic_solution: 'Frequency drop: 1.41GHz to 1.19GHz is a 15.6% clock reduction. For compute-bound training, throughput is approximately proportional to clock, so the throttled window runs at 84.4% of normal throughput. If the HVAC event lasts 2 hours, the lost work is 2h × 15.6% = 0.312 GPU-hours of progress, which adds about 0.37 hours of wall-clock completion delay after accounting for the slower rate during the event. Recovery impact should be defined separately: the operational incident lasts the 2-hour HVAC repair window, then junction temperature needs about 2.5 to 3 minutes to cool after ambient is restored. Full clocks return about 2h 3m after the failure begins, or about 3 minutes after repair completes.'
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling is binary (full speed or shutdown).
    **The Rationale:** Candidates fail to understand that modern GPUs dynamically scale voltage and frequency (DVFS) in proportion to thermal limits.
    **The Consequence:** Overreacting to minor thermal events or miscalculating the actual throughput penalty of a throttling state.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base clock: 1.41 GHz.
    - Throttled clock: 1.19 GHz.
    - Ambient anomaly duration: 2 hours within the 72-hour run.
    - GPU cooling rate: ~2°C/minute.

    **Calculations:**
    - Clock reduction: (1.41 - 1.19) / 1.41 = 0.156 (15.6%).
    - Effective throughput while throttled: 1.19 / 1.41 = 84.4% of nominal.
    - Nominal work completed during event: 2.0 nominal hours.
    - Work actually completed: 2.0 hrs * 84.4% = 1.688 nominal hours.
    - Lost progress: 2.0 - 1.688 = 0.312 nominal hours.
    - Additional wall-clock time to finish that lost work at normal speed: 0.312 hours = 18.7 minutes.
    - Cooldown after ambient restoration: 5°C / 2°C/min = 2.5 minutes.
    - Full-clock recovery from event start: 2 hours repair + ~2.5 minutes cooldown.

    **Conclusion & Interpretation:**
    - **Result: 15.6% Throughput Loss During the Event.** A 2-hour throttling window adds about 18.7 minutes to the training completion time. Including incident recovery, full clocks return about 2 hours and 3 minutes after the failure begins, but only about 3 minutes after ambient is restored.
