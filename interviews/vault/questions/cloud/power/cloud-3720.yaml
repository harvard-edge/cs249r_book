title: Thermal Throttling During Long-Context Training on H100
scenario: During a 72-hour training run on GPUs, ambient temperature in the datacenter rises 5°C due to HVAC partial failure. The GPU begins thermal throttling, dropping from 1.41GHz to 1.19GHz.
question: What throughput loss and recovery-time impact should you expect from throttling from 1.41GHz to 1.19GHz after the 5°C ambient rise?
details:
  realistic_solution: 'Frequency drop: 1.41GHz → 1.19GHz = 15.6% reduction. For compute-bound training (large GEMM): throughput ≈ proportional to frequency. Throughput loss: 15.6%. Training slows by 15.6% for the remaining 24 hours. Additional cost: 24h × 15.6% = 3.74 extra hours to complete same work. Recovery: HVAC repair estimated 2 hours. After repair, GPU cools at ~2°C/minute → 5°C drop takes ~2.5 minutes for junction. Full clock restored after ~3 minutes.'
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling is binary (full speed or shutdown).
    **The Rationale:** Candidates fail to understand that modern GPUs dynamically scale voltage and frequency (DVFS) in proportion to thermal limits.
    **The Consequence:** Overreacting to minor thermal events or miscalculating the actual throughput penalty of a throttling state.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base clock: 1.41 GHz.
    - Throttled clock: 1.19 GHz.
    - Ambient anomaly duration: 2 hours.
    - GPU cooling rate: ~2°C/minute.

    **Calculations:**
    - Clock reduction: (1.41 - 1.19) / 1.41 = 0.156 (15.6%).
    - Lost throughput during 2 hours: 2 hrs * 15.6% = 0.312 hours of lost work.
    - Recovery time: 5°C / 2°C/min = 2.5 minutes.
    - Total impact: 0.312 hrs (18.7 mins) + 2.5 mins = ~21.2 minutes.

    **Conclusion & Interpretation:**
    - **Result: ~21-minute Delay (Thermal-Bound)**. The 15.6% frequency drop translates linearly to compute throughput loss, resulting in a negligible ~21-minute delay on a 72-hour training run.
