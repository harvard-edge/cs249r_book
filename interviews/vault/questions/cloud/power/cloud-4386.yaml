title: GPU Power State Transitions and Idle Power Optimization
scenario: Your inference serving cluster runs H100 GPUs that sit idle between request bursts, averaging 40% utilization over a 24-hour period. During idle periods, nvidia-smi shows each GPU drawing 200W in P0 state (full clock). You are tasked with implementing power state management to reduce idle power consumption.
question: Which H100 power-management mechanisms reduce idle power, and what savings are possible for 200 GPUs at 40% utilization?
details:
  realistic_solution: |
    Persistence mode keeps the driver context initialized; it is a latency feature, not an idle-power policy, and it does not deliberately hold the GPU in P0. Do not promise direct P-state selection on H100 as the control surface. Instead, verify that no application clocks or profiling tools are pinning high clocks, enable persistence only if cold-start latency matters, set an appropriate power limit for the service, and use workload-level controls such as batching, request coalescing, MIG partitioning where isolation helps utilization, and scale-to-zero for idle replicas. The savings must be measured on the target driver/firmware: if remediation lowers idle board power from 200W to 120W while preserving wake latency, 200 GPUs that are idle 60% of the day save 9.6 kW on average.
  common_mistake: |
    **The Pitfall:** Treating persistence mode as an idle-power optimization knob.
    **The Rationale:** Persistence mode reduces driver setup overhead but does not provide a supported policy for forcing a lower idle P-state on H100.
    **The Consequence:** The fleet keeps burning idle power because the real causes, such as pinned clocks, loose power limits, low batching, or overprovisioned replicas, are not addressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 GPUs at 40% utilization, so each GPU is idle 60% of the time.
    - Baseline observed idle draw: 200W per GPU.
    - Post-remediation measured idle target: 120W per GPU.

    **Calculations:**
    - Baseline idle: 200 GPUs * 200W * 0.60 = 24 kW continuous idle load.
    - Improved idle: 200 GPUs * 120W * 0.60 = 14.4 kW.
    - Savings: 24.0 kW - 14.4 kW = 9.6 kW.
    - Annual energy saved: 9.6 kW * 8,760h = 84,096 kWh/year.

    **Conclusion & Interpretation:**
    - **Result: $8,410/year saved at $0.10/kWh (Power-Bound Optimization)**. H100 idle savings come from measured power-limit, clock, batching, partitioning, and replica policies, not from persistence mode alone.
