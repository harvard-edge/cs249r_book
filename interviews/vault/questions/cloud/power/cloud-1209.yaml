title: LLM Inference Energy Bottleneck
scenario: For a 70B parameter model in 16-bit precision (140 GB), you are profiling power consumption during batch size 1 inference. For each generated token, the entire model is read from HBM. Assume compute requires 140 GFLOPs per token and an FP16 FLOP costs 1 pJ while HBM data movement costs 10 pJ per byte.
question: For the 70B batch-1 inference token, how much energy goes to HBM reads versus FP16 compute, and which dominates?
details:
  realistic_solution: 'Calculate both energy components. Memory Energy is 140 GB * 10 pJ/byte = 1.4 Joules. Compute Energy is 140 GFLOPs * 1 pJ/FLOP = 0.14 Joules. Memory movement consumes 10x more energy than computation, meaning optimizations must focus on reducing memory traffic (e.g., Top-K Sparsification, KV cache optimization).'
  common_mistake: |
    **The Pitfall:** Assuming that the massive number of arithmetic operations (FLOPs) dominates the power budget.
    **The Rationale:** Candidates often focus on the computationally intensive nature of LLMs, ignoring the energy cost of moving data.
    **The Consequence:** Optimizations are misdirected toward compute efficiency rather than crucial memory traffic reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 140 GB (140e9 bytes).
       - Compute per token: 140 GFLOPs (140e9 FLOPs).
       - Memory energy cost: 10 pJ/byte (10e-12 J/byte).
       - Compute energy cost: 1 pJ/FLOP (1e-12 J/FLOP).
    2. **Calculations:**
       - Memory Energy = 140e9 bytes * 10e-12 J/byte = 1.4 Joules.
       - Compute Energy = 140e9 FLOPs * 1e-12 J/FLOP = 0.14 Joules.
       - Memory/Compute Ratio = 1.4 J / 0.14 J = 10x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Energy).** Memory movement consumes 10x more energy than computation.
