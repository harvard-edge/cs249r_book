title: 'Realizing Carbon-Aware Scheduling: When to Shift GPU Workloads'
scenario: 'An ML Ops team runs large batch training jobs on H100 clusters in two regions: US-West (grid intensity ~200 gCO₂/kWh) and US-East (~350 gCO₂/kWh). A 70B model pre-training run requires 7 days on 512 GPUs.'
question: How should carbon-aware scheduling route the 7-day, 512-GPU H100 training job between US-West and US-East, and what grid-signal infrastructure is needed?
details:
  realistic_solution: |
    Route the 7-day job to US-West if data locality, GPU availability, and transfer cost do not erase the carbon benefit. The prompt gives US-West at about 200 gCO2/kWh versus US-East at about 350 gCO2/kWh, so the regional choice dominates the answer; time-shifting within a region is secondary for a continuous 7-day run. The scheduler should use a region-aware carbon-intensity API such as WattTime, Electricity Maps, or Carbon Aware SDK, cache forecasts and current marginal intensity per region, and combine that signal with queue time, data location, egress cost, and capacity constraints. In Kubernetes, implement this as a scheduler plugin, admission controller, or batch orchestrator policy that scores eligible regions and records the chosen region and carbon estimate on the job.
  common_mistake: |
    **The Pitfall:** Treating carbon-aware scheduling strictly as a time-shifting problem within a single region.
    **The Rationale:** It's simpler to delay a job locally than to handle cross-region orchestration.
    **The Consequence:** Missing massive carbon reduction opportunities (spatial shifting) and ignoring the "data gravity" carbon cost of moving datasets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 512 H100 GPUs at 700W each.
       - Duration: 7 days (168 hours).
       - US-East Intensity: 350 gCO₂/kWh.
       - US-West Intensity: 200 gCO₂/kWh.
    2. **Calculations:**
       - Total Energy: 512 * 0.7 kW * 168 hr = 60,211.2 kWh.
       - US-East Emissions: 60,211.2 kWh * 0.350 kgCO₂/kWh = 21,073.9 kg CO₂.
       - US-West Emissions: 60,211.2 kWh * 0.200 kgCO₂/kWh = 12,042.2 kg CO₂.
       - Carbon Savings: 21,073.9 - 12,042.2 = 9,031.7 kg CO₂.
    3. **Conclusion & Interpretation:** **Route to US-West for about 9.0 tonnes CO₂ saved, assuming data gravity and capacity constraints permit it. Result: Grid Intensity-Bound.**
