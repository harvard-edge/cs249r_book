title: DCiE and Total Facility Efficiency for Multi-Tenant GPU Cloud
scenario: A multi-tenant GPU cloud reports PUE=1.2 and DCiE (Datacenter infrastructure Efficiency) of 83%. The CTO wants to understand what the '83%' means and whether it's competitive.
question: What does DCiE=83% mean at PUE=1.2, how is it related to PUE, and is it competitive for a GPU cloud?
details:
  realistic_solution: DCiE is simply the inverse of PUE (1/PUE * 100%). At PUE=1.2, DCiE=83.3%, meaning 83% of facility power does useful compute and 17% is wasted overhead. Industry hyperscale benchmarks (Google, AWS) achieve PUE 1.05-1.12 (DCiE 89-95%). While PUE=1.2 is decent for legacy colocation, it is not hyperscale-competitive. To improve, the cloud provider should implement liquid cooling to drive PUE down toward 1.05.
  common_mistake: |
    **The Pitfall:** Confusing PUE and DCiE or assuming PUE=1.2 is hyperscale-competitive.
    **The Rationale:** Lacking familiarity with the inverse relationship of the metrics and hyperscale industry standards.
    **The Consequence:** Accepting suboptimal datacenter efficiency, leaving millions of dollars in wasted cooling and overhead power on the table.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Metric: PUE = 1.2.
       - IT Load: 10 MW.
       - Energy Cost: $0.10/kWh.
    2. **Calculations:**
       - DCiE = 1 / PUE = 1 / 1.2 = 0.833 (83.3%).
       - Power Overhead (PUE=1.2) = 1.2 * 10 MW - 10 MW = 2 MW wasted.
       - Target Overhead (PUE=1.1) = 1.1 * 10 MW - 10 MW = 1 MW wasted.
       - Annual Savings = 1 MW * 8760 hr * $0.10/kWh = $876,000/year.
    3. **Conclusion & Interpretation:**
       - **Result: Cooling-Bound Inefficiency.** DCiE of 83% means 17% of power is overhead. Improving to hyperscale standards (PUE=1.1) saves nearly $1M annually per 10MW IT load.
