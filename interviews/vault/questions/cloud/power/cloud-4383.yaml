title: Thermal Throttling Cascade in a Dense H100 Pod
scenario: "You are on-call for a production training cluster. At 14:00, the ops dashboard shows all GPUs in Pods 7-12 dropping from 700W TDP to ~500W sustained power draw. MFU (Model FLOP Utilization) falls from 68% to 48%. The ambient temperature sensors in the hot aisle for those racks read 38°C, compared to 24°C in Pods 1-6. NVIDIA SMI shows GPU junction temperatures of 88°C on all affected devices. No hardware faults are reported."
question: "What is causing Pods 7-12 to drop from 700W to 500W with 38°C hot aisles, and what immediate and long-term remediation should you take?"
details:
  realistic_solution: "Root cause: A cooling unit (CRAC/CRAH or CDU) serving Pods 7-12 has likely failed or reduced capacity (clogged filter, refrigerant leak, pump failure). The elevated ambient forces GPUs to throttle frequency to keep junction temp below the 90°C threshold (~88°C is the warning knee for H100). Immediate: reroute workloads from Pods 7-12 to spare capacity; dispatch datacenter ops to inspect cooling units. Long-term: implement redundant cooling (N+1 CRAC units), add automated thermal alerting at 32°C ambient, and deploy pre-throttle migration hooks in the job scheduler."
  common_mistake: |
    **The Pitfall:** Jumping straight to GPU firmware, driver bugs, or code regressions.
    **The Rationale:** Software engineers often ignore physical datacenter infrastructure metrics.
    **The Consequence:** Wasting hours debugging PyTorch code while a broken CRAC unit literally bakes the expensive GPU cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 700W TDP dropping to 500W.
       - Junction temperature at 88°C (near 90°C hard limit).
    2. **Calculations:**
       - Power Drop: 700W -> 500W = 28.6% power reduction.
       - MFU Drop: 68% -> 48% = 29.4% drop (matches the power reduction).
       - Hot Aisle Delta: 38°C vs 24°C = +14°C (ASHRAE A2 ambient limit is 35°C).
    3. **Conclusion & Interpretation:**
       **The GPU firmware is aggressively thermal-throttling due to elevated ambient temperatures. Result: Thermal-Bound.**
