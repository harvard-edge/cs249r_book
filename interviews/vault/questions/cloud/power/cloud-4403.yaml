title: Carbon Intensity Time-Shifting for Large-Scale Pretraining
scenario: 'A 4,096-GPU cluster (700W/GPU) faces grid carbon of 80 gCO2/kWh at night (10h) and 420 gCO2/kWh during the day (14h). To compute only at night, you can pause (draws 0W but requires a 2-hour full-power warmup penalty) or warm-idle at 70W during the day.'
question: 'Which night-only computing strategy minimizes daily carbon footprint?'
details:
  realistic_solution: 'Warm-idle is the most carbon-efficient strategy. Avoiding the massive 2-hour full-power warmup penalty at peak daytime carbon intensity uses less overall energy than the 14-hour 70W trickle draw.'
  common_mistake: |
    **The Pitfall:** Assuming pausing training entirely is always the most carbon-efficient method.
    **The Rationale:** Candidates forget the massive overhead required to restart and warmup a large cluster.
    **The Consequence:** Creating a massive carbon penalty by shifting warmup loads directly into peak daytime grid intensity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4,096 GPUs at 0.7 kW (1.2 PUE) = 3,440.64 kW.
    - Night: 10h at 80g. Day: 14h at 420g.
    
    **Calculations:**
    - Baseline 24/7: (800 + 5880) * 3440.64 = 22,983 kg.
    - Pause Strategy: Night (10*80*3440) + Warmup (2*420*3440) = 5,642 kg.
    - Warm-Idle: Night (2752) + Idle (14*420 * 4096*0.07*1.2) = 4,775 kg.
    
    **Conclusion & Interpretation:**
    - **Result: Warm-idle saves 18,208 kgCO2/day over baseline (Carbon-Bound)**. Idle trickle draw is far cleaner than peak-hour warmup spikes.
