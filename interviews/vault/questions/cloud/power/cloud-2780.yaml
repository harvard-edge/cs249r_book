title: WUE Metric Explained
scenario: A sustainability officer asks how much water your AI training cluster consumes.
question: What is Water Usage Effectiveness (WUE), and why is cooling AI training clusters a growing water sustainability concern?
details:
  realistic_solution: 'Water Usage Effectiveness (WUE) measures the ratio of total water consumed (liters) to IT equipment energy (kWh): WUE = Annual Water Use / Annual IT Energy. A WUE of 1.8 L/kWh means the datacenter uses 1.8 liters of water for every kWh of IT energy consumed. Why AI clusters are worse: (1) AI accelerators produce extreme heat density. (2) High-density racks require aggressive cooling, often evaporative cooling towers that consume water. (3) Training runs are sustained 24/7 at maximum power for weeks. (4) Clusters are often built in regions with cheap solar power, where water is scarce.'
  common_mistake: |
    **The Pitfall:** Thinking datacenters only use electricity.
    **The Rationale:** People forget that many large-scale cooling systems consume enormous amounts of water via evaporative cooling towers.
    **The Consequence:** Underestimating the environmental impact and community relations issue of AI clusters in arid regions.
  napkin_math: |
    - **Energy for training**: ~50 GWh.
    - **Water usage**: 50 GWh * 1.5 L/kWh = 75M liters.
    - **Result**: **~30 Olympic swimming pools of water for one training run.**
