title: 'Datacenter Efficiency: A100 Rack Design for Carbon-Aware ML in Cloud'
scenario: You are tasked with designing the compute and cooling strategy for a new high-density ML rack within a cloud datacenter. This rack will house 16 NVIDIA A100 (80 GB HBM2e) GPUs, each capable of 312 TFLOPS FP16 and consuming 400W under load. The facility has an average PUE of 1.4. Your rack has a strict power budget of 10 kW.
question: How would you fit 16 A100s into a 10 kW rack budget with cooling, layout, carbon-aware scheduling, and 5-year carbon tradeoffs?
details:
  realistic_solution: |
    Treat the 10 kW rack budget as the IT-side rack limit unless the facility explicitly defines it otherwise. A feasible layout is two 8-GPU A100 servers: GPUs consume 16 * 400W = 6.4 kW, leaving 3.6 kW for CPUs, DRAM, NICs, storage, fans or pumps, and PSU losses. Keep each server near 4.5-5.0 kW with high-efficiency PSUs, redundant power feeds sized for the rack limit, and power caps if host overhead exceeds the reserve. Cooling should be chosen from the actual heat density: well-designed rear-door or high-airflow containment may be enough for about 10 kW, while direct-to-chip liquid cooling is justified if rack density, inlet temperature, noise, or sustained load leaves insufficient thermal margin. For carbon accounting, apply PUE to IT energy to estimate facility energy, then shift interruptible jobs to lower-carbon hours and compare operational savings against embodied carbon over the 5-year life.
  common_mistake: |
    **The Pitfall:** Underestimating the total power draw per server (including CPU, memory, networking, and PSU inefficiencies) and thermal density challenges.
    **The Rationale:** Engineers often fixate purely on the GPU TDP, ignoring system-level overheads.
    **The Consequence:** Designing an unrealistic rack configuration that exceeds the power budget or cooling capacity when operating at peak utilization, completely failing the deployment constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
    - 10 kW rack budget is interpreted as IT-side power.
    - PUE = 1.4 for facility energy accounting.

    2. **Calculations:**
    - GPU Power: 16 A100 GPUs × 400W/GPU = 6.4 kW.
    - Remaining IT budget: 10 kW - 6.4 kW = 3.6 kW for CPUs, memory, NICs, storage, cooling auxiliaries, and PSU losses.
    - Facility-side power at full IT load: 10 kW * 1.4 PUE = 14 kW. Do not multiply by PUE again if the 10 kW budget is already facility-side.
    - Five-year facility energy at full load = 14 kW * 8760 h/year * 5 years = 613,200 kWh.
    - Shifting 20% of energy from 500 to 100 gCO2/kWh saves 0.20 * (500 - 100) = 80 gCO2/kWh averaged across the total workload, which is a 16% reduction versus running all work at 500 gCO2/kWh.

    3. **Conclusion & Interpretation:**
    - **Result: feasible only with a tight IT power budget and explicit cooling design.** Liquid cooling may be warranted at this density, but the necessity depends on rack airflow, inlet temperature, server overhead, and sustained operating caps; PUE is used for facility energy and carbon accounting, not for double-counting the rack power limit.
