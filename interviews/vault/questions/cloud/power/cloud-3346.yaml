title: 'Datacenter Efficiency: A100 Rack Design for Carbon-Aware ML in Cloud'
scenario: You are tasked with designing the compute and cooling strategy for a new high-density ML rack within a cloud datacenter. This rack will house 16 NVIDIA A100 (80 GB HBM2e) GPUs, each capable of 312 TFLOPS FP16 and consuming 400W under load. The facility has an average PUE of 1.4. Your rack has a strict power budget of 10 kW.
question: How would you fit 16 A100s into a 10 kW rack budget with cooling, layout, carbon-aware scheduling, and 5-year carbon tradeoffs?
details:
  realistic_solution: Propose a liquid-cooled rack solution (e.g., direct-to-chip or immersion) for the 16 A100 GPUs, allowing for higher density and more efficient heat removal than air cooling, which is critical for staying within the 10 kW budget (approx. 6.4 kW for GPUs alone, leaving 3.6 kW for CPUs, memory, networking, and PSU overheads). Integrate a carbon-aware scheduling mechanism that leverages real-time carbon intensity data of the regional grid to schedule interruptible ML workloads during periods of lower carbon emissions. Calculate estimated operational carbon over 5 years using the PUE and regional grid carbon intensity, and compare it against the embodied carbon of the new server infrastructure, advocating for hardware longevity and efficient utilization to minimize the total carbon footprint.
  common_mistake: |
    **The Pitfall:** Underestimating the total power draw per server (including CPU, memory, networking, and PSU inefficiencies) and thermal density challenges.
    **The Rationale:** Engineers often fixate purely on the GPU TDP, ignoring system-level overheads.
    **The Consequence:** Designing an unrealistic rack configuration that exceeds the power budget or cooling capacity when operating at peak utilization, completely failing the deployment constraints.
  napkin_math: |
    - GPU Power: 16 A100 GPUs × 400W/GPU = 6.4 kW.
    - IT Overhead: 10 kW (rack budget) - 6.4 kW (GPUs) = 3.6 kW remaining for CPUs, memory, networking, and PSU inefficiencies. This necessitates high-efficiency components or careful power capping.
    - Total Facility Power: 10 kW (IT Load) × 1.4 (PUE) = 14 kW total power drawn at the facility level for this rack.
    - **Carbon-aware Scheduling: If shifting 20% of workload from a 500 gCO2/kWh period to a 100 gCO2/kWh period, it reduces the carbon footprint for that portion of the workload by 80%.**
