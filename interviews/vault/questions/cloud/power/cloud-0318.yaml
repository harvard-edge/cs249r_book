title: 'The Datacenter Cooling Tax: Power Budgeting'
scenario: You're speccing out a new AI training rack for your datacenter. The rack will hold 8 GPUs, each with a Thermal Design Power (TDP) of 700W. The datacenter has an excellent Power Usage Effectiveness (PUE) of 1.1.
question: With 8 GPUs at 700 W and PUE 1.1, what steady-state grid power will the rack draw and how much is just cooling overhead?
details:
  realistic_solution: The correct approach is to first calculate the power consumed by the IT equipment and then multiply it by the PUE to find the total power draw. The difference between the total power and the IT power is the 'cooling tax'.
  common_mistake: |
    **The Pitfall:** Calculating power draw strictly based on IT equipment and ignoring PUE overhead.
    **The Rationale:** Hardware engineers focus on component TDPs but forget that the facility itself requires power to remove that heat.
    **The Consequence:** Racks exceed circuit breaker limits, causing datacenter-level power trips and prolonged outages.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs at 700W each.
    - Datacenter PUE: 1.1.

    **Calculations:**
    - IT Power: 8 * 700 W = 5.6 kW.
    - Total Power: 5.6 kW * 1.1 = 6.16 kW.
    - Cooling Overhead: 6.16 kW - 5.6 kW = 560 W.

    **Conclusion & Interpretation:**
    - **Result: 6.16 kW (Power-Bound)**. Total power is 6.16 kW with a 560 W cooling tax.
  options:
  - 'Total: 5.6 kW, Cooling: 0 W'
  - 'Total: 6.16 kW, Cooling: 616 W'
  - 'Total: 6.16 kW, Cooling: 560 W'
  - 'Total: 11.76 kW, Cooling: 6.16 kW'
