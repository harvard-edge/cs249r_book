title: Lifecycle Carbon Analysis of Hardware Refresh
scenario: Your company operates a cluster of 1,024 GPUs for ML training, powered by a grid with a carbon intensity of 400 gCO2/kWh. You are evaluating a proposal to replace the entire cluster with 512 new GPUs, which provides equivalent training throughput while cutting operational power consumption by 50 kW overall. However, each of the 64 new servers has an embodied carbon footprint of roughly 3,500 kg CO2e.
question: How do you evaluate the true carbon impact of this hardware refresh over a 3-year depreciation cycle?
details:
  realistic_solution: Perform a full Life Cycle Assessment (LCA). Treat the embodied carbon of the existing cluster as sunk if the alternative is to keep operating it, then compare the incremental embodied carbon of the 64 new servers against the 3-year operational carbon savings. You should also check replacement timing and reuse/resale assumptions; approve the refresh only if the incremental operational savings exceed the new manufacturing emissions under that baseline.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the reduction in operational carbon emissions.
    **The Rationale:** Engineers often look only at PUE and grid intensity while completely ignoring the massive embodied carbon required to manufacture new servers.
    **The Consequence:** Approving hardware refreshes that inadvertently increase the overall carbon footprint of the organization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 50 kW saved, 400 gCO2/kWh grid.
       * 3-year cycle (26,280 hours).
       * 64 servers with 3,500 kg CO2e each.
    2. **Calculations:**
       * Operational energy saved: 50 kW * 24h * 365d * 3 = 1,314,000 kWh.
       * Operational carbon saved: 1,314,000 kWh * 0.400 kgCO2/kWh = 525,600 kg CO2.
       * Incremental embodied carbon of new hardware: 64 * 3,500 = 224,000 kg CO2e.
       * Simplified net impact versus keeping the existing cluster: 525,600 - 224,000 = 301,600 kg CO2e saved.
       * Existing hardware embodied carbon is excluded here because it is already incurred; include resale, early retirement, or disposal effects in a full LCA.
    3. **Conclusion & Interpretation:** **Result: simplified 301,600 kg CO2e net savings versus a no-refresh baseline.** The refresh looks beneficial on operational savings minus new embodied carbon, but this is an incremental replacement analysis, not a complete cradle-to-grave comparison.
