title: NAS Compute Budget
scenario: You run a weight-sharing NAS for an edge vision model. The supernet trains for 200 epochs on 8 GPUs (takes 24 hours). Training a single derived architecture from scratch takes 24 GPU-hours. The evolutionary search evaluates 500 sub-networks (each evaluation takes 2 minutes on 1 GPU).
question: What are the total GPU-hours and dollar cost of this weight-sharing NAS run at $3 per GPU-hour?
details:
  realistic_solution: 'Supernet training: 8 GPUs × 24 hours = 192 GPU-hours. Architecture search: 500 evaluations × 2 min = 1000 min ≈ 16.7 hours on 1 GPU = 16.7 GPU-hours. If parallelized across 8 GPUs: 16.7/8 ≈ 2.1 hours wall time. Total GPU-hours: 192 + 16.7 = 208.7 GPU-hours. Cost: 208.7 × $3 = $626. For comparison, training a single architecture manually: ~24 GPU-hours ($72). NAS costs ~8.7x more than a single training run but explores 500 architectures. If the NAS-found architecture is even 10% more efficient at inference, it saves far more than $626 over the model''s deployment lifetime. The 192 GPU-hours for supernet training dominates (92% of total cost).'
  common_mistake: |
    **The Pitfall:** Forgetting that supernet training is the dominant cost of the entire procedure.
    **The Rationale:** Candidates focus intensely on the evolutionary search phase because "evaluating 500 networks" sounds incredibly expensive.
    **The Consequence:** They fail to realize the architecture search itself is extremely cheap, leading to incorrect capacity/cost estimation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Supernet training: 8 GPUs × 24 hours.
    - NAS Evaluation: 500 sub-networks at 2 min/eval.
    - Cost: $3 / GPU-hour.

    **Calculations:**
    - Supernet GPU-hours: 8 × 24 = 192 GPU-hours.
    - Eval GPU-hours: 500 × 2 min = 1000 min = 16.67 GPU-hours.
    - Total GPU-hours: 192 + 16.67 = 208.67 GPU-hours.
    - Total Cost: 208.67 × $3/hour = $626.

    **Conclusion & Interpretation:**
    - **Result: 208.7 GPU-hours costing $626. Supernet training dominates (92% of budget) (Compute-Bound)**.
