title: 'Stranded Power: When GPU Utilization Tanks PUE'
scenario: Your 1000-GPU cluster draws 1.4 MW at full load (PUE 1.15). Profiling shows average GPU utilization is only 35% because training jobs have I/O stalls, checkpoint writes, and data pipeline bottlenecks. Cooling infrastructure is sized for peak load.
question: What is the effective PUE when utilization is factored in, and how do you improve energy proportionality?
details:
  realistic_solution: At full load, total facility power is 1.4 MW and PUE is 1.15, so IT load is 1.4/1.15 = 1.22 MW and non-IT overhead is about 0.18 MW. If useful IT load scales to 35% but cooling remains roughly fixed because the plant is sized for peak, useful IT work is about 1.22*0.35 = 0.43 MW and total facility power is about 0.43+0.18 = 0.61 MW. Effective PUE for useful work is therefore 0.61/0.43 = 1.42. Improve energy proportionality by raising GPU utilization, consolidating jobs onto fewer active nodes, power-capping or power-gating idle GPUs, fixing I/O and checkpoint stalls, and using variable-speed cooling that tracks actual heat load.
  common_mistake: |
    **The Pitfall:** Reporting PUE at peak load only.
    **The Rationale:** Candidates assume PUE is a static hardware rating, forgetting that cooling overhead is semi-fixed (fans, pumps run even when GPUs are partially idle).
    **The Consequence:** Drastically underestimating the effective PUE and actual power costs when the cluster runs at lower utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full load: IT=1.22 MW, total=1.4 MW, PUE=1.15.
    - 35% utilization.

    **Calculations:**
    - Full-load non-IT overhead = 1.4 MW - 1.22 MW = 0.18 MW.
    - Useful IT load at 35% utilization = 1.22 MW * 0.35 = 0.43 MW.
    - If cooling overhead stays roughly fixed, total facility power = 0.43 MW + 0.18 MW = 0.61 MW.
    - Effective PUE = 0.61 MW / 0.43 MW = 1.42.

    **Conclusion & Interpretation:**
    - **Result: Effective PUE is about 1.42 under the fixed-overhead assumption**. Improve energy proportionality by increasing utilization, consolidating load, power-capping idle capacity, and making cooling track actual heat output.
