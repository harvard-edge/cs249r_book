title: Root-Causing Memory Power in LLM Inference
scenario: 'Your team is profiling an auto-regressive decoding microservice serving a 20-billion parameter LLM (FP16, 40GB memory footprint) on a single GPU (2.0 TB/s HBM bandwidth). At a batch size of 1, generating 50 tokens per second, the chip''s arithmetic logic units (ALUs) consume merely ~0.1W, but overall chip power draw unexpectedly hits ~180W.'
question: "Why does the 20B batch-1 decoding service draw 180W with only ~0.1W of ALU work, and how would you reduce it?"
details:
  realistic_solution: 'Diagnose the issue as extreme energy-per-byte disparity. At batch size 1, every parameter must be loaded from HBM to SRAM for a single multiply-accumulate. Off-chip HBM access costs ~80 pJ/byte, whereas an FP16 MAC operation costs ~0.1 pJ. On an A100 with 2 TB/s bandwidth, a 40 GB model at batch=1 can generate at most ~50 tokens/sec (2 TB/s / 40 GB). At this rate, memory reads alone consume ~160W while compute (at 0.1 pJ/MAC) uses only ~0.1W. To resolve the power bottleneck, increase the batch size (to amortize weight reads over multiple tokens) or quantize weights to INT4/FP8 to significantly reduce the raw bytes fetched.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the power draw as an inefficient matrix multiplication kernel or static leakage.
    **The Rationale:** Failing to realize that data movement (fetching weights from HBM) inherently costs orders of magnitude more energy than ALUs.
    **The Consequence:** Wasting time optimizing compute kernels instead of increasing batch size or quantizing weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40 GB footprint per token at batch 1.
    - 50 tokens/sec.
    - HBM Energy = 80 pJ/byte.
    - Compute = 40 GFLOPs/token, 0.05 pJ/FLOP (0.1 pJ/MAC).

    **Calculations:**
    - HBM Read Volume: 40 GB * 50 = 2.0 TB/sec.
    - Memory Power: 2e12 bytes/sec * 80e-12 J/byte = 160 Watts.
    - Compute Power: 40 GFLOPs * 50 = 2 TFLOPs/sec. 2e12 FLOPs/sec * 0.05e-12 J/FLOP = 0.1 Watts.
    - Total Power: ~160W + ~0.1W + ~20W overhead = ~180W.

    **Conclusion & Interpretation:**
    - **Result: Memory data movement consumes ~1600x more power than compute (Memory-Bandwidth-Bound).**
