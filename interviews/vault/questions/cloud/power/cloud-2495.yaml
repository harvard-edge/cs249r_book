title: Federated Learning Power and Comm Budget
scenario: A cloud orchestrator manages federated learning across 100,000 smartwatches (Cortex-M4, 256KB SRAM). Each watch has a 300mAh battery (3.8V). An FL round requires downloading a 200KB global model, computing 5 epochs (1000 samples), and uploading 200KB weights. Wi-Fi Tx/Rx consumes 250mW at 1Mbps. Compute draws 30mW. Product requires that FL consumes no more than 1% of the total battery capacity per day.
question: How many FL rounds per day can each watch afford, and how should the cloud orchestrate participation under the 1% battery limit?
details:
  realistic_solution: To meet the strict 1% daily battery degradation constraint, the cloud must treat one FL round as the full 200KB download, 5 local epochs, and 200KB upload. With the stated radio and compute costs, each watch can afford at most 17 complete rounds per day before crossing the 1% budget. The orchestrator should enforce a per-device daily energy ledger, prefer charging/idle devices, select participants asynchronously, and skip devices once their round budget is exhausted; quantization or sparsification can raise the cap only if the ledger uses the reduced payload size.
  common_mistake: |
    **The Pitfall:** Ignoring communication power cost.
    **The Rationale:** Assuming radio transmission is negligible compared to model compute.
    **The Consequence:** Draining device batteries rapidly and causing massive user uninstalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 300mAh × 3.8V = 1140 mWh = 4104 Joules.
    - 1% daily budget = 41.04 J.
    - One full FL round includes 200KB download + 200KB upload = 400KB total radio transfer.
    - Comm time: 400KB * 8 bits/byte / 1Mbps = 3.2s. Wi-Fi Tx/Rx consumes 250mW.
    - Compute energy: 5000 inferences × 10ms = 50s. Compute draws 30mW.

    **Calculations:**
    - Comm energy = 3.2s × 0.25W = 0.8 J.
    - Compute energy = 50s × 0.03W = 1.5 J.
    - Total per round = 2.3 J.
    - Max complete rounds = floor(41.04 / 2.3) = 17 rounds/day per watch.

    **Conclusion & Interpretation:**
    - **Result: 17 complete rounds/day per watch (Power-Bound)**. The cloud should cap each device at 17 full download-compute-upload rounds, then use asynchronous selection of charging or idle watches rather than requiring every watch in every round.
