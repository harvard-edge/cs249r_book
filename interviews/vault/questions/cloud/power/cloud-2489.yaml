title: Power-Aware Cloud-Edge Fallback
scenario: A wearable health monitor (50mAh battery at 3.7V) runs a 50KB TFLite Micro model for AFib detection at 10Hz. If confidence is <0.8, it triggers a BLE transmission to the cloud for a 20MB model check. BLE transmission costs 15mW for 100ms. Local compute costs 5mW for 10ms.
question: What maximum BLE fallback rate should the cloud enforce when adapting the confidence threshold so the wearable can meet 14-day battery life?
details:
  realistic_solution: Design a dynamic cloud-controlled thresholding architecture around an explicit energy budget. The local model runs every sample, but BLE fallback is rate-limited to about one transmission every 27 seconds after local compute energy is reserved. The cloud monitors each device's fallback rate and battery state, then raises or lowers the confidence threshold only within that rate cap; if noisy data would exceed the cap, the device queues, samples, or suppresses low-value cloud checks until the budget recovers.
  common_mistake: |
    **The Pitfall:** Setting a static confidence threshold.
    **The Rationale:** Assuming the local model's confidence distribution remains stable over time and across different noise environments.
    **The Consequence:** Rapid battery drain if the local model degrades due to noisy sensor data, triggering constant BLE transmissions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity = 50mAh * 3.7V = 185mWh = 666 Joules.
    - 14 days = 1.2M seconds.
    - Local compute at 10Hz = 5mW * 10ms * 10 = 0.5mW = 500uW.
    - BLE cost per transmission = 15mW * 100ms = 1.5mJ.

    **Calculations:**
    - Total Power budget = 666J / 1.2M s = 555uW.
    - Remaining budget for BLE = 555uW - 500uW = 55uW.
    - Max BLE fallback rate = 55uJ/sec / 1.5mJ per transmission = 0.0367 transmissions/sec.
    - Equivalent interval = 1 / 0.0367 = 27.3 seconds per transmission.

    **Conclusion & Interpretation:**
    - **Result: 0.036 Hz fallback cap (Power-Bound)**. The threshold policy is only safe if its observed low-confidence rate stays at or below approximately 1 BLE transmission every 27 seconds, including local compute energy in the 14-day budget.
