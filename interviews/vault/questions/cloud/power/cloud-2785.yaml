title: Upgrade vs Extend Hardware Lifecycle
scenario: 'Your 3-year-old A100 fleet can be: (A) replaced with H100s (2x energy efficient per FLOP, 200 kg CO2e embodied each), (B) extended 2 more years with current A100s, or (C) partially replaced (50% H100, 50% A100 extended). The grid is 50% renewable (0.2 kg CO2e/kWh).'
question: For a 1,000-GPU fleet, which replacement option minimizes the 5-year total carbon footprint, and why?
details:
  realistic_solution: 'Option A (full H100 replacement at year 3): New embodied: 1,000 × 200 kg = 200 tonnes. H100 capped at 350W (to maintain similar power draw): operational per year: 1,000 × 350W × 8,760h × 0.2 kg/kWh = 613 tonnes/yr. Years 4-5 operational: 613 × 2 = 1,226 tonnes. Years 1-3 (A100): 1,000 × 400W × 8,760h × 0.2 × 3 = 2,102 tonnes. A100 embodied (amortized fully): 175 tonnes. Total 5yr: 175 + 2,102 + 200 + 1,226 = 3,703 tonnes. Option B (extend A100 5 years): Embodied: 175 tonnes (already manufactured). Operational 5yr: 1,000 × 400W × 8,760h × 0.2 × 5 = 3,504 tonnes. Total: 175 + 3,504 = 3,679 tonnes. Option C (50/50 at year 3): 500 new H100 embodied: 100 tonnes. Years 4-5: 500 A100 (701t) + 500 H100 (613t) = 1,314t. Years 1-3: 2,102t. Old A100 embodied: 175t. Total: 175 + 2,102 + 100 + 1,314 = 3,691 tonnes. Option B wins — avoiding the embodied carbon of manufacturing new hardware yields the lowest total emissions, even on a green grid.'
  common_mistake: |
    **The Pitfall:** Assuming upgrading to more energy-efficient hardware always reduces total carbon emissions.
    **The Rationale:** Candidates focus solely on operational energy savings per FLOP and ignore the massive embodied carbon cost of manufacturing new GPUs.
    **The Consequence:** The organization increases its overall carbon footprint while incorrectly claiming a sustainability win.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Grid carbon intensity: 0.2 kg CO2e/kWh.
       - A100: 400W, 175t embodied (already amortized if kept, but 175t total for 5yr calc).
       - H100: 350W, 200 kg CO2e embodied per GPU.
       - Fleet size: 1,000 GPUs.
    2. **Calculations:**
       - Option A (Full H100): Embodied: 1,000 * 200 kg = 200t. Years 4-5 Ops: 1,000 * 350W * 8,760h * 0.2 kg/kWh * 2 = 1,226t. Years 1-3 Ops (A100): 1,000 * 400W * 8,760h * 0.2 * 3 = 2,102t. Old A100 embodied: 175t. Total = 175 + 2,102 + 200 + 1,226 = 3,703t.
       - Option B (Extend A100): Embodied: 175t. Years 1-5 Ops: 1,000 * 400W * 8,760h * 0.2 * 5 = 3,504t. Total = 175 + 3,504 = 3,679t.
       - Option C (50/50 Split): Embodied: 175t (old) + 100t (new). Years 1-3 Ops: 2,102t. Years 4-5 Ops: 500 A100 (701t) + 500 H100 (613t) = 1,314t. Total = 175 + 2,102 + 100 + 1,314 = 3,691t.
    3. **Conclusion & Interpretation:**
       - Avoiding new embodied carbon outweighs operational efficiency gains on a green grid.
       - **Result: Option B Minimizes Carbon (3,679 tonnes)**
