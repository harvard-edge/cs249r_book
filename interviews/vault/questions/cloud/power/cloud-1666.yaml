title: Estimating LLM Training Operational Carbon
scenario: You are planning the training of a 70B parameter LLM on a cluster of 128 nodes. The measured total power draw per node under sustained training load is 10 kW. The training job will run continuously for 30 days. The data center operates with a Power Usage Effectiveness (PUE) of 1.2, and the local regional grid has an average carbon intensity of 0.4 kgCO2eq/kWh.
question: "What total operational carbon emissions will the 128-node training run produce over 30 days?"
details:
  realistic_solution: 'First calculate the total IT energy consumption by multiplying total cluster power by hours. Multiply this by the PUE to get total facility energy, then multiply by the carbon intensity to get the final carbon footprint in metric tons.'
  common_mistake: |
    **The Pitfall:** Calculating only the GPU TDP while ignoring system-level power overhead, or forgetting to multiply by the data center PUE.
    **The Rationale:** Candidates focus solely on the accelerator specs and neglect the massive energy required to cool the datacenter and run the host CPUs/networking.
    **The Consequence:** Drastically underestimating the environmental impact and actual electricity costs of large-scale AI training runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 nodes at 10 kW/node.
    - 30 days (720 hours).
    - PUE = 1.2.
    - Carbon intensity = 0.4 kgCO2/kWh.

    **Calculations:**
    - Cluster Power = 128 * 10 = 1,280 kW.
    - IT Energy = 1,280 kW * 720 h = 921,600 kWh.
    - Total Facility Energy = 921,600 * 1.2 = 1,105,920 kWh.
    - Emissions = 1,105,920 kWh * 0.4 kgCO2/kWh = 442,368 kg CO2eq.

    **Conclusion & Interpretation:**
    - **Result: 442 metric tons (Energy-Bound)**. Total Operational Carbon is ~442 metric tons.
