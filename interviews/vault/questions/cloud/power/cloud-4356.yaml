title: 'Spatial Carbon Arbitrage: Multi-Region Training Routing'
scenario: 'Your organization has GPU clusters in three regions: US-West (30 gCO2e/kWh, 500 H100s), EU-North (15 gCO2e/kWh, 300 H100s), and US-East (380 gCO2e/kWh, 800 H100s). A 1,000 GPU-day training job needs to be scheduled. You must analyze the carbon and performance tradeoffs of three strategies: (A) all US-East, (B) all EU-North, (C) split across US-West and EU-North using data parallelism.'
question: How do the carbon and performance tradeoffs compare for all US-East, all EU-North, and split US-West/EU-North routing?
details:
  realistic_solution: 'Treat 1,000 GPU-days as total work. Strategy A uses the 800 available US-East H100s, so it finishes in 1,000/800 = 1.25 days and emits 1,000 * 0.7kW * 24hr * PUE 1.2 * 0.380 kgCO2e/kWh = 7,661 kgCO2e. Strategy B uses 300 EU-North H100s, so it takes 1,000/300 = 3.33 days. Total energy is still 20,160 kWh, so carbon is 20,160 * 0.015 = 302 kgCO2e, a 96% reduction versus US-East. Strategy C uses 500 US-West plus 300 EU-North GPUs, so the no-communication lower bound is also 1.25 days and its energy-weighted carbon is 500/800 * 604.8 + 300/800 * 302.4 = about 492 kgCO2e. However, synchronous cross-region data parallelism is usually impractical: a 140 GB gradient over a 10 Gbps WAN takes about 112 seconds per one-way payload before collective protocol and RTT effects. Recommendation: all EU-North minimizes carbon if 3.33 days is acceptable; use split regions only with asynchronous training, infrequent synchronization, or strong gradient compression.'
  common_mistake: |
    **The Pitfall:** Assuming cross-region data parallelism has zero communication overhead.
    **The Rationale:** Candidates focus purely on the carbon intensity metrics and ignore the massive latency penalty of WAN AllReduce operations.
    **The Consequence:** Recommending a split-region topology that severely bottlenecks training speed, potentially increasing total energy usage and erasing carbon savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Job work is 1,000 GPU-days total.
       - H100 draws 0.7 kW, runs 24h, PUE of 1.2 = 20.16 kWh per GPU-day.
       - WAN RTT is ~100ms. Link is 10 Gbps. Gradient size is 140GB.
    2. **Calculations:**
       - Strategy A (US-East, 800 GPUs): wall time = 1,000/800 = 1.25 days; carbon = 1,000 GPU-days × 20.16 × 0.380 = 7,661 kgCO2e.
       - Strategy B (EU-North, 300 GPUs, 3.33 days): 1,000 GPU-days × 20.16 × 0.015 kgCO2e/kWh = 302 kgCO2e (96% reduction).
       - Strategy C (Split 500 West + 300 EU-North): no-communication wall time = 1,000/800 = 1.25 days.
       - Split carbon lower bound = (500/800 × 1,000 × 20.16 × 0.030) + (300/800 × 1,000 × 20.16 × 0.015) ≈ 492 kgCO2e.
       - WAN sync payload time = 140 GB * 8 / 10 Gbps ≈ 112 seconds one way, before all-reduce protocol overhead and RTT.
    3. **Conclusion & Interpretation:**
       - **Strategy B minimizes carbon by 96% with longer wall time. Strategy C has attractive carbon and raw GPU capacity, but synchronous data parallelism is network-bound unless synchronization is redesigned.**
       - **Result: Network-Bound**
