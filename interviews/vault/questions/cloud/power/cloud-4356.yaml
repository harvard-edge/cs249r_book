title: 'Spatial Carbon Arbitrage: Multi-Region Training Routing'
scenario: 'Your organization has GPU clusters in three regions: US-West (30 gCO2e/kWh, 500 H100s), EU-North (15 gCO2e/kWh, 300 H100s), and US-East (380 gCO2e/kWh, 800 H100s). A 1,000 GPU-day training job needs to be scheduled. You must analyze the carbon and performance tradeoffs of three strategies: (A) all US-East, (B) all EU-North, (C) split across US-West and EU-North using data parallelism.'
question: How do the carbon and performance tradeoffs compare for all US-East, all EU-North, and split US-West/EU-North routing?
details:
  realistic_solution: 'Strategy A (US-East, 1,000 GPUs): carbon = 1,000 × 700W × 24hr × PUE 1.2 × 380gCO2e/kWh = 1000 × 0.7 × 24 × 1.2 × 0.38 = 7,661 kgCO2e/day × days. Strategy B (EU-North, 300 GPUs): same job takes 1000/300 = 3.33× longer. Carbon = 300 × 0.7 × 24 × 1.2 × 0.015 × 3.33 = 301.7 × 3.33 = 1,005 kgCO2e total (87% reduction). Strategy C (500 US-West + 300 EU-North = 800 GPUs): cross-region AllReduce over Atlantic WAN: RTT ≈ 100ms, gradient sync every step. For a 70B model: 140GB gradients per AllReduce. At 10 Gbps cross-region: 140GB/10Gbps = 112 seconds per AllReduce. Step time (compute) ≈ 0.5s → communication overhead = 224×. Data parallelism across regions is impractical without gradient compression (1000× via 1-bit Adam) or asynchronous SGD. Recommendation: all EU-North with longer wall time minimizes carbon by 87%.'
  common_mistake: |
    **The Pitfall:** Assuming cross-region data parallelism has zero communication overhead.
    **The Rationale:** Candidates focus purely on the carbon intensity metrics and ignore the massive latency penalty of WAN AllReduce operations.
    **The Consequence:** Recommending a split-region topology that severely bottlenecks training speed, potentially increasing total energy usage and erasing carbon savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 draws 0.7 kW, runs 24h, PUE of 1.2 = 20.16 kWh/day.
       - WAN RTT is ~100ms. Link is 10 Gbps. Gradient size is 140GB.
    2. **Calculations:**
       - Strategy A (US-East, 1,000 GPUs, 1 day): 1,000 × 20.16 × 0.380 kgCO2e/kWh = 7,661 kgCO2e.
       - Strategy B (EU-North, 300 GPUs, 3.33 days): 1,000 GPU-days × 20.16 × 0.015 kgCO2e/kWh = 302 kgCO2e (96% reduction).
       - Strategy C (Split 500 West + 300 EU-North): 140GB gradient sync over a 10 Gbps WAN link takes ~112 seconds per step, compared to ~0.5s compute time.
    3. **Conclusion & Interpretation:**
       - **Strategy B minimizes carbon by 96% with longer wall-time, while Strategy C is impractically slow due to a 224x communication overhead.**
       - **Result: Network-Bound**
