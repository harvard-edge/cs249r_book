title: The Rack Density Limit
scenario: You're a cloud infrastructure engineer designing a new AI cluster. Your data center provider allocates a standard rack with a liquid cooling system rated for a maximum power density of 70 kW. Your goal is to install as many NVIDIA H100 GPUs as possible into this rack.
question: If the 70 kW rack limit is the total rack power budget, how many H100s fit before exceeding cooling capacity, and how does reserving 20% for non-GPU system overhead change that number?
details:
  realistic_solution: |
    The raw GPU-only limit is 70,000 W / 700 W = 100 H100 GPUs. That number ignores the rest of the rack: CPUs, networking, storage, power conversion losses, and fans also consume power and cooling budget. If 20% of the 70 kW total rack budget is reserved for that system overhead, only 80% remains for GPUs: 56,000 W / 700 W = 80 H100 GPUs. The intended safe answer is 80 GPUs with overhead included; 100 GPUs only fits in a GPU-only budget.
  common_mistake: |
    **The Pitfall:** Dividing the rack's total power limit by the GPU's TDP directly without accounting for system-level component overhead.
    **The Rationale:** Engineers treat the GPU as the only power consumer, forgetting that high-performance networking, CPUs, and fans often consume 20% of the total rack budget.
    **The Consequence:** The rack trips its PDU breaker or thermally throttles under full load because it was over-provisioned by 20 GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Rack budget = 70 kW = 70,000 W.
    - H100 TDP = 700 W.
    - System overhead (CPUs, networking) ≈ 20%.

    **Calculations:**
    - Raw GPU limit: 70,000 W / 700 W = 100 GPUs.
    - Effective budget for GPUs: 70,000 W * 0.80 = 56,000 W.
    - Realistic limit: 56,000 W / 700 W = 80 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 80 H100 GPUs safely supported (Power-Cooling-Bound)**. Ignoring overhead gives a raw GPU-only count of 100, but reserving 20% of the total 70 kW rack budget for non-GPU components leaves room for 80 GPUs.
  options:
    - 80 GPUs
    - 100 GPUs
    - 700 GPUs
    - 10 GPUs
