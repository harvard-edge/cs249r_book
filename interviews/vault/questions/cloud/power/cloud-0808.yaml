title: The Thermal Throttling Mystery
scenario: We have two identical 1,000-GPU clusters running the exact same hardware, software, and model. Cluster A in Phoenix consistently trains 30% slower than Cluster B in Oregon. The ops team has verified that drivers, firmware, and network configurations are identical.
question: Why is the identical Phoenix cluster training 30% slower than the Oregon cluster?
details:
  realistic_solution: 'Thermal throttling. Phoenix ambient temperature reaches 45 C, while Oregon averages 20 C. Data center cooling capacity limits heat rejection, causing GPUs to exceed junction thresholds and throttle clock speeds.'
  common_mistake: |
    **The Pitfall:** Blaming software misconfiguration or networking.
    **The Rationale:** Engineers often tunnel-vision on software and hardware specs, ignoring the physical environment.
    **The Consequence:** They miss thermal throttling, leading to wild goose chases in debugging.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU TDP: 700W.
    - Throttle junction temp: ~83 C.

    **Calculations:**
    - Phoenix: hits 83 C, throttles to 500W.
    - Throttled throughput: 500W / 700W = 71%.

    **Conclusion & Interpretation:**
    - **Result: 71% (Thermal-Bound)**. The 29% power drop perfectly matches the 30% observed slowdown.
