title: The Thermal Throttling Mystery
scenario: We have two identical 1,000-GPU clusters running the exact same hardware, software, and model. Cluster A in Phoenix consistently trains 30% slower than Cluster B in Oregon. The ops team has verified that drivers, firmware, and network configurations are identical. Phoenix runs at 45 C ambient, GPUs report 83 C junction temperatures, throttle-reason flags, and sustained power near 500W instead of the 700W seen in Oregon at 20 C.
question: Why is the identical Phoenix cluster training 30% slower than the Oregon cluster?
details:
  realistic_solution: Thermal throttling. Phoenix ambient temperature reaches 45 C, while Oregon averages 20 C. Data center cooling capacity limits heat rejection, causing GPUs to exceed junction thresholds and throttle clock speeds.
  common_mistake: |
    **The Pitfall:** Blaming software misconfiguration or networking.
    **The Rationale:** Engineers often tunnel-vision on software and hardware specs, ignoring the physical environment.
    **The Consequence:** They miss thermal throttling, leading to wild goose chases in debugging.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU TDP: 700W.
    - Throttle junction temp: ~83 C.
    - Once thermal throttling starts, clocks and voltage are reduced; throughput generally tracks sustained clock rate more closely than nameplate TDP.

    **Calculations:**
    - Oregon can sustain near boost clocks because cooling keeps GPUs below the throttle threshold.
    - Phoenix reaches the thermal threshold, so firmware reduces clocks until heat output fits the cooling envelope.
    - A drop from 700W to roughly 500W indicates a severe throttle state, but it should be treated as evidence of throttling, not as a linear proof that throughput must be exactly 500/700.
    - The observed 30% slowdown is consistent with a sustained clock reduction of about 30% during thermal throttling.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound.** The power reduction and hot ambient conditions support thermal throttling as the cause; the 30% slowdown should be confirmed with GPU clock, temperature, and throttle-reason telemetry rather than inferred from a linear watts-to-throughput calculation.
