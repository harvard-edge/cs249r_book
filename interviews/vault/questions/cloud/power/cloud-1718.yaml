title: Rack-Level Power Wall Calculation for AI Clusters
scenario: You are architecting a new AI training cluster using GPUs (700W TDP). The proposed design packs 8 GPUs into a 4U server node, and attempts to physically fill a standard 42U rack with 10 of these nodes. The colocation facility guarantees a maximum power delivery and cooling capacity of 40kW per rack.
question: What is the proposed 10-node rack’s peak power draw, and how many 8-GPU nodes fit under the 40 kW rack limit?
details:
  realistic_solution: 'Account for total system-level power. A modern 8x GPU node typically draws between 10kW and 11.5kW under full load. Dividing the 40kW rack limit by the true node power reveals a severe power density bottleneck, allowing far fewer nodes than the physical space permits.'
  common_mistake: |
    **The Pitfall:** Calculating only the GPU power while ignoring the rest of the system components.
    **The Rationale:** GPUs are the primary workload engines, so their TDP is the most prominent spec.
    **The Consequence:** Massive power oversubscription, leading to tripped breakers, rack shutdowns, and hardware damage during peak training loads.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Power: 8 GPUs * 700W = 5,600W.
    - System Power (CPUs, DRAM, NICs, fans): ~4,400W.
    - Facility limit: 40 kW per rack.

    **Calculations:**
    - Total Node Power: 5,600W + 4,400W = 10 kW per node.
    - Proposed 10-node Rack Draw: 10 * 10 kW = 100 kW.
    - Over-provisioning factor: 100 kW / 40 kW = 2.5x limit.
    - Max Safe Nodes: 40 kW / 10 kW = 4 nodes.

    **Conclusion & Interpretation:**
    - **Result: 4 Nodes Max (Power-Bound)**. A modern 8x GPU node draws 10kW; the rack can safely host a maximum of 4 nodes, strictly bound by facility power density.
