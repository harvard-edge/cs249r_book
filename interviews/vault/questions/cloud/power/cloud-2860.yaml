title: Cloud GPU Duty Cycling
scenario: You manage a cloud pool of 100 GPUs. A daily cycle requires 20 GPUs for 20 hours, and 100 GPUs for a 4-hour peak. Idle GPUs consume 100W; active ones consume 700W.
question: Design a duty-cycling schedule with a 1-hour buffer around the peak, and compute the daily kWh saved compared to keeping all 100 GPUs fully active 24/7.
visual:
  kind: svg
  path: cloud-2860.svg
  alt: 'A step plot showing the number of active GPUs increasing before a traffic peak and dropping immediately after, overlaid on a smooth traffic demand curve.'
  caption: Proactive Duty Cycling Over 24 Hours
details:
  realistic_solution: 'The optimal schedule leaves 20 GPUs active 24/7, costing 20 * 700W * 24h = 336 kWh. The remaining 80 GPUs are powered up for the 4-hour peak plus a 1-hour buffer (5 hours total), costing 80 * 700W * 5h = 280 kWh. The other 19 hours they are completely shut down (0W). A fully active 24/7 cluster costs 100 * 700W * 24h = 1680 kWh. Total daily usage is 616 kWh, saving 1064 kWh daily.'
  common_mistake: |
    **The Pitfall:** Using the idle power draw (100W) during the offline hours instead of completely de-provisioning.
    **The Rationale:** Idle instances are intuitively still "on" and drawing baseline power.
    **The Consequence:** Falsely calculating a massive power penalty during downtime, missing the real-world operational savings of scale-to-zero infrastructure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 GPUs active 24/7. 80 GPUs active for 5 hours (peak + buffer).
    - Active power: 700W (0.7 kW). Offline power: 0W.

    **Calculations:**
    - 24/7 unoptimized cost = 100 × 0.7 kW × 24h = 1680 kWh.
    - Optimized cost = (20 × 0.7 kW × 24h) + (80 × 0.7 kW × 5h) = 336 + 280 = 616 kWh.
    - Savings = 1680 - 616 = 1064 kWh.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound.** Completely de-provisioning instances to 0W during the 19 idle hours saves 1064 kWh daily over a static always-on deployment.
