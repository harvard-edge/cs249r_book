title: Cloud GPU Duty Cycling
scenario: You manage a cloud pool of 100 GPUs. A daily cycle requires 20 GPUs for 20 hours, and 100 GPUs for a 4-hour peak. Idle GPUs consume 100W; active ones consume 700W.
question: Design a duty-cycling schedule with a 1-hour buffer around the peak, and compute the daily kWh saved compared to keeping all 100 GPUs fully active 24/7?
visual:
  kind: svg
  path: cloud-2860.svg
  alt: A step plot showing the number of active GPUs increasing before a traffic peak and dropping immediately after, overlaid on a smooth traffic demand curve.
  caption: Proactive Duty Cycling Over 24 Hours
details:
  realistic_solution: The schedule leaves 20 GPUs active 24/7. The remaining 80 GPUs are active for the 4-hour peak plus a 1-hour buffer (5 hours total) and idle for the other 19 hours at 100W. Baseline active usage is 20 * 700W * 24h = 336 kWh. Burst active usage is 80 * 700W * 5h = 280 kWh. Idle usage for the burst pool is 80 * 100W * 19h = 152 kWh. A fully active 24/7 cluster costs 100 * 700W * 24h = 1680 kWh. Total daily usage is 768 kWh, saving 912 kWh daily.
  common_mistake: |
    **The Pitfall:** Treating idle GPUs as if they draw 0W during the 19 non-peak hours.
    **The Rationale:** Candidates often conflate duty cycling with complete de-provisioning, even though the scenario states idle GPUs still consume 100W.
    **The Consequence:** Overstating the daily savings by ignoring 152 kWh of idle draw from the burst pool.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 GPUs active 24/7. 80 GPUs active for 5 hours (peak + buffer).
    - Active power: 700W (0.7 kW). Idle power: 100W (0.1 kW).

    **Calculations:**
    - 24/7 unoptimized cost = 100 × 0.7 kW × 24h = 1680 kWh.
    - Always-active baseline pool = 20 × 0.7 kW × 24h = 336 kWh.
    - Burst pool during peak plus buffer = 80 × 0.7 kW × 5h = 280 kWh.
    - Burst pool while idle = 80 × 0.1 kW × 19h = 152 kWh.
    - Optimized cost = 336 + 280 + 152 = 768 kWh.
    - Savings = 1680 - 768 = 912 kWh.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound.** Duty cycling with the stated 100W idle draw saves 912 kWh daily over a static always-active deployment.
