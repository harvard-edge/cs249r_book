title: 'Diagnosing Carbon Footprint Spikes in Hardware Upgrades'
scenario: 'Your team migrated a 10-day LLM training job from an older 512x A100 (400W TDP) cluster in a Pacific Northwest datacenter (hydro-powered, 100 gCO2/kWh, PUE 1.1) to an available 256x H100 (700W TDP) cluster in a Midwest region (coal-heavy, 500 gCO2/kWh, PUE 1.25). The new setup completes the training 3x faster (3.33 days). Despite a massive reduction in total energy consumption (kWh), the automated environmental audit flagged a severe increase in total operational carbon.'
question: 'Why did operational carbon increase after moving the 10-day A100 job to the faster H100 Midwest cluster, and by how much?'
details:
  realistic_solution: 'Total operational carbon is calculated as Energy * PUE * Carbon Intensity. Even though the H100 cluster uses significantly less base energy (14,336 kWh vs 49,152 kWh) due to faster execution, the 5x worse carbon intensity and slightly worse PUE in the new geographical region completely overwhelm the hardware efficiency gains.'
  common_mistake: |
    **The Pitfall:** Equating hardware energy efficiency (FLOPs/Watt) directly with operational carbon footprint.
    **The Rationale:** Candidates focus entirely on the reduced job runtime and lower total kWh, ignoring the multiplicative impact of regional grid carbon intensity and facility PUE.
    **The Consequence:** Severe misreporting in environmental audits and failure to meet corporate sustainability goals despite using more efficient hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 setup: 512 GPUs, 400W TDP, 240 hours, PUE 1.1, 100 gCO2/kWh
    - H100 setup: 256 GPUs, 700W TDP, 80 hours, PUE 1.25, 500 gCO2/kWh

    **Calculations:**
    - Old Energy = 512 * 0.4 kW * 240 hrs = 49,152 kWh
    - Old CO2 = 49,152 kWh * 1.1 * 0.1 kg/kWh = 5,406.72 kg CO2
    - New Energy = 256 * 0.7 kW * 80 hrs = 14,336 kWh
    - New CO2 = 14,336 kWh * 1.25 * 0.5 kg/kWh = 8,960.00 kg CO2

    **Conclusion & Interpretation:**
    - **Result: 1.66x Increase (Carbon-Intensity-Bound)**. Despite saving ~35 MWh of energy, moving to a grid with 5x worse carbon intensity increased total emissions by ~1.66x.
