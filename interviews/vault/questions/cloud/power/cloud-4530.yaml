title: H100 Burst Duty Cycling
scenario: A cloud environment runs intermittent batched inference workloads on SXM nodes, receiving bursts of traffic every 5 minutes.
question: Analyze the trade-offs between deep sleep states and idle power overhead when managing these intermittent traffic bursts?
details:
  realistic_solution: Treat the decision as an energy-versus-readiness trade-off, not a TDP comparison. If the GPU idles at about 100W for the 4-minute quiet window, deep sleep can save at most about 24 kJ per cycle before transition overhead. That saving is only useful if wake-up and state restore finish before the next 1-minute burst and do not violate the latency SLA. If wake-up takes a meaningful fraction of the burst or drops early requests, a warm idle or shallow sleep state with pre-wake scheduling is preferable even though it spends more idle energy.
  common_mistake: |
    **The Pitfall:** Ignoring the wake-up latency and PCIe initialization time when calculating power states.
    **The Rationale:** Engineers focus purely on energy savings (kW/h) without modeling the time-domain cost of transitioning out of low-power states.
    **The Consequence:** The system saves power during idle periods but causes severe SLA violations and dropped requests immediately upon burst arrival.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5-minute cycle: 1 minute active burst and 4 minutes idle.
    - Warm idle power: ~100W.
    - Deep sleep power: approximated as 0W for an upper-bound savings estimate.
    - Wake-up and state-restore latency must fit inside the SLA budget before the next burst.

    **Calculations:**
    - Maximum idle energy saved: (100W - 0W) x 240s = 24,000 J = 24 kJ per cycle.
    - Active burst duration: 60s, so a 10s wake-up delay would consume 10/60 = 16.7% of the burst window before useful service starts.
    - Any wake-up energy or repeated state-restore work reduces the 24 kJ upper bound.

    **Conclusion & Interpretation:**
    - **Result: up to 24 kJ saved per cycle, bounded by wake-up latency and SLA impact.** Deep sleep is justified only when the restore path is hidden before traffic arrives; otherwise shallow sleep or warm idle is safer.
