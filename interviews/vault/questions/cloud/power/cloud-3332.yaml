title: Power-Efficient LLM Inference on Google TPU v5e
scenario: You are tasked with deploying a large language model (LLM) for real-time inference on Google TPU v5e. The model exhibits compute-bound characteristics for smaller batches and memory-bound behavior for larger batches.
question: How would you use TPU v5e power caps, DVFS P-states, and the CMOS power equation to minimize energy per token while meeting a 50 ms latency?
details:
  realistic_solution: Profile token latency, board power, and energy per token across the TPU v5e power caps and DVFS P-states available to the runtime. Use the CMOS relationship P ~ C * V^2 * f to explain why reducing voltage and frequency can lower power nonlinearly, then sweep downward from peak until latency approaches but does not exceed the 50 ms SLA. Select the operating point with the lowest measured joules/token that still meets p95 latency, and validate it under representative batch sizes because the compute-bound and memory-bound regimes may have different knees. Re-check XLA compilation, input stalls, and memory bandwidth so the chosen cap is based on steady-state inference rather than warmup artifacts.
  common_mistake: |
    **The Pitfall:** Exclusively focusing on achieving maximum throughput.
    **The Rationale:** Neglecting the non-linear relationship between clock frequency (and thus voltage) and power consumption.
    **The Consequence:** Operating the TPU at peak frequencies that are far from the optimal energy-per-inference point, wasting power for negligible latency gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline token latency at peak P-state: 40ms at 200W average.
    - Target SLA: 50ms.
    - Lower P-state reduces voltage by 10% and frequency by 5%.

    **Calculations:**
    - Baseline energy/token = 200W * 0.040s = 8.0 J/token.
    - CMOS power factor = 0.9^2 * 0.95 = 0.7695, so new power is about 154W.
    - If latency rises inversely with frequency, new latency = 40ms / 0.95 = 42.1ms, still under the 50ms SLA.
    - New energy/token = 154W * 0.0421s = 6.5 J/token.

    **Conclusion & Interpretation:**
    - **Result: about 19% lower energy/token while meeting SLA.** The selected cap/P-state should be the measured lowest-energy point below 50ms p95 latency, not simply the maximum frequency setting.
