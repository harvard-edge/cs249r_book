title: The Thermal Throttling Ticking Clock
scenario: A cloud-managed edge drone runs a continuous real-time tracking model. In the lab (22°C), inference runs at a stable 30 fps drawing 12W, under the SoC's 15W TDP limit. Deployed in the field (35°C ambient), the drone tracks perfectly for exactly 90 seconds, then framerate drops to 12 fps.
question: Why does the framerate drop to 12 fps after exactly 90 seconds of tracking?
details:
  realistic_solution: 'The issue is temperature-induced DVFS thermal throttling. At 35°C ambient, the temperature delta decreases, preventing the heatsink from dissipating 12W of heat. After 90 seconds, the chip hits its critical threshold (e.g., 90°C) and the OS aggressively downclocks the NPU/GPU.'
  common_mistake: |
    **The Pitfall:** Assuming a battery voltage drop causes the slowdown.
    **The Rationale:** Engineers blame power supply issues instead of calculating heat dissipation limits in a higher ambient temperature.
    **The Consequence:** Adding bigger batteries instead of improving thermal management.
  napkin_math: |
    **Assumptions & Constraints:**
    - 22°C lab handles 15W TDP. Max die temp = 85°C. Delta = 63°C.
    - Field ambient = 35°C.

    **Calculations:**
    - Heatsink thermal conductance = 15W / 63°C = 0.238 W/°C.
    - Field max dissipation = 0.238 * (85 - 35) = 11.9W.
    - Model draws 12W (>11.9W limit), heat accumulates over 90s until throttling.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound (Insufficient dissipation triggers DVFS downclocking).**
