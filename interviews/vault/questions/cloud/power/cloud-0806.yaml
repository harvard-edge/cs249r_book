title: The PUE Dollar Cost
scenario: 'Our CFO asks: ''We''re spending $86M a year on electricity for our 10,000-GPU training cluster. The facilities team says they can reduce PUE from 1.4 to 1.1 by switching to liquid cooling, but the retrofit costs $5M.'''
question: Is the $5M liquid-cooling retrofit worth it for reducing PUE from 1.4 to 1.1, and what is the payback period?
details:
  realistic_solution: 'PUE (Power Usage Effectiveness) is the ratio of total facility power to IT equipment power. A PUE of 1.4 means for every 1W of compute, you pay for 1.4W total - the extra 0.4W goes to cooling. The ROI is calculated by converting the PUE reduction directly into kW savings per year.'
  common_mistake: |
    **The Pitfall:** Dismissing PUE as a purely facilities-level concern.
    **The Rationale:** ML engineers assume power delivery infrastructure doesn't affect training cluster ROI or system design.
    **The Consequence:** Organizations bleed millions in unnecessary operational costs and miscalculate the long-term TCO of their compute investments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 10,000 H100s at 700W each.
    - Electricity cost: $0.10/kWh.
    - Old PUE: 1.4, New PUE: 1.1.
    - Retrofit Cost: $5M.

    **Calculations:**
    - Base IT load: 10,000 * 700W = 7 MW.
    - Old Total Power: 7 MW * 1.4 = 9.8 MW.
    - New Total Power: 7 MW * 1.1 = 7.7 MW.
    - Power savings: 9.8 MW - 7.7 MW = 2.1 MW (2,100 kW).
    - Annual dollar savings: 2,100 kW * 8,760 hours * $0.10/kWh = $1,839,600/year.
    - Payback period: $5,000,000 / $1,839,600 \u2248 2.7 years.

    **Conclusion & Interpretation:**
    - **Result: ~2.7 years payback (Operating Expenses Bottleneck)**. The $5M liquid-cooling retrofit pays for itself in ~2.7 years, heavily optimizing Operating Expenses.
