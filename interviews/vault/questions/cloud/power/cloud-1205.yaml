title: Non-Linear Power Scaling in LLM Inference
scenario: A team benchmarks Llama-2-70B inference. At batch size 1, throughput is 15 tokens/s per GPU, and GPU power draw averages 250W. When the batch size is increased to 64, throughput jumps to 120 tokens/s per GPU, but power draw only increases to 320W. The operations team suspects the power sensors are broken because an 8x increase in throughput only caused a 28% increase in power.
question: How do you analyze this non-linear scaling of power vs. throughput?
details:
  realistic_solution: |
    At batch size 1, the workload is strictly memory-bandwidth bound. The compute cores spend most of their time idle, but the GPU still consumes ~250W due to static leakage and active memory interfaces. At batch size 64, arithmetic intensity increases, utilizing the SMs efficiently and raising total power to 320W. The sensors are correct; energy efficiency simply improved because the high static power baseline is amortized over more tokens.
  common_mistake: |
    **The Pitfall:** Assuming power consumption scales linearly with throughput or FLOPs.
    **The Rationale:** Engineers ignore the massive static power overhead (leakage and HBM refresh) consumed even when compute cores are stalled.
    **The Consequence:** Incorrect power provisioning and false alarms regarding sensor integrity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - BS1: 15 tok/s, 250W.
       - BS64: 120 tok/s, 320W.
    2. **Calculations:**
       - BS1 Energy = 250W / 15 tok/s = 16.6 Joules/token.
       - BS64 Energy = 320W / 120 tok/s = 2.66 Joules/token.
       - Marginal power cost = 320W - 250W = 70W.
       - Marginal throughput = 120 - 15 = 105 tokens/s.
       - Marginal energy = 70W / 105 tok/s = 0.66 Joules/token.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (BS1) to Compute-Bound (BS64)**. The marginal power cost of the extra 105 tokens/s is only 70W (0.66 J/token), amortizing the static leakage.
