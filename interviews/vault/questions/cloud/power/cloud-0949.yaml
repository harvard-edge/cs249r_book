title: WAN Overhead in Carbon Scheduling
scenario: 'A workload scheduler migrated a distributed LLM training job running on 1,024 GPUs from a US-East data center (400 gCO2/kWh) to an EU-North facility (150 gCO2/kWh) for a 10-hour training phase. The migration required transferring 100 TB of dataset and checkpoint state across a trans-Atlantic WAN link. Post-mortem telemetry reveals the total operational carbon footprint for this phase actually increased.'
question: 'Why did moving the 10-hour 1,024-GPU job to EU-North increase carbon despite the cleaner grid?'
details:
  realistic_solution: 'The scheduling cost function must incorporate network data transfer emissions and idle GPU power. Transferring 100TB over WAN consumes massive energy, negating local grid savings. Furthermore, 1024 idle GPUs during the transfer consume additional power. The net result is a CO2 increase, making the migration counterproductive.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the data center PUE or local grid carbon intensity.
    **The Rationale:** Candidates completely ignore the massive energy cost of transmitting large datasets over WAN and the idle GPU power during the transfer window.
    **The Consequence:** Implementing a "carbon-aware" scheduling policy that ironically increases the total operational carbon footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,024 GPUs (800W active, 150W idle).
    - US grid: 400 gCO2/kWh. EU grid: 150 gCO2/kWh.
    - WAN link: 100 Gbps, 450 gCO2/kWh. Transfer size: 100 TB.

    **Calculations:**
    - Saved emissions: 1024 * 0.8 kW * 10h * (400 - 150) = 2,048 kg CO2.
    - Transfer energy: 100,000 GB * 0.05 kWh/GB = 5,000 kWh. Transfer emissions = 5,000 * 450 = 2,250 kg CO2.
    - Transfer time: ~2.2 hours. Idle emissions = 1024 * 0.15 kW * 2.2h * 150 = 51 kg CO2.
    - Net change: 2,250 + 51 - 2,048 = +253 kg CO2.

    **Conclusion & Interpretation:**
    - **Result: +253 kg CO2 net change (WAN Data Gravity-Bound)**. The massive data transfer emissions outpace the savings of the cleaner grid.
