title: Power Anomaly Detection for H100 Training Clusters
scenario: 'The ops team gets a page: the rack PDU attributes 820W per GPU to h100-rack07-node04, while the H100 TDP is 700W. No thermal throttling flags are set, training loss is progressing normally, and SMI shows no errors.'
question: Why might h100-rack07-node04 sustain 820W per GPU without errors, is it a fault, and what power thresholds should trigger escalation?
details:
  realistic_solution: First separate GPU device power from PDU-allocated rack power. TDP and nvidia-smi power limits apply to GPU board/device power; a PDU allocation can include the node share of CPUs, DIMMs, NICs, fans, PSU losses, and measurement apportionment. Check nvidia-smi -q -d POWER for the enforced limit and current device power. If the device limit is 700W and SMI device power is near 700W, an 820W PDU allocation is not necessarily a GPU fault; it is rack accounting plus overhead. If SMI reports sustained device power above the enforced 700W limit, escalate as a telemetry, firmware, or power-limit enforcement issue. If the limit was intentionally raised, restore the approved cap. Use thresholds such as PDU allocation >800W per GPU for investigation, SMI device power >700W for >60s under a 700W cap for escalation, and any device power above the configured hard limit for immediate on-call review.
  common_mistake: |
    **The Pitfall:** Comparing a rack PDU allocation directly to the GPU TDP.
    **The Rationale:** Candidates mix device power with node-level overhead and assume every watt reported by the PDU is GPU board power.
    **The Consequence:** They either replace healthy GPUs or miss the real issue: an unset power cap, bad telemetry, or excess non-GPU node power.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 device TDP or configured cap: 700W.
    - PDU allocation includes non-GPU node overhead and PSU losses.
    - Observed PDU allocation: 820W per GPU equivalent.

    **Calculations:**
    - PDU overhead above TDP-equivalent = 820W - 700W = 120W per GPU equivalent.
    - Overhead fraction = 120W / 700W = 17%.
    - For an 8-GPU node, equivalent overhead = 8 * 120W = 960W for CPUs, memory, NICs, fans, PSU losses, and allocation error.
    - If SMI device power is <= 700W, the GPU cap is being respected; if SMI device power is > 700W under a 700W cap, escalate.

    **Conclusion & Interpretation:**
    - **Result: Measurement-Bound Diagnosis**. 820W at the PDU is not automatically a GPU fault; escalation depends on the SMI device-power reading relative to the configured limit.
