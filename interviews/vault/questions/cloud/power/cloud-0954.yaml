title: Evaluating Elastic Training for Carbon Minimization
scenario: 'You are evaluating deployment strategies for a 14-day continuous LLM pre-training job using 1,024 GPUs. Option A: Deploy in Region 1 with a PUE of 1.1 and a stable grid carbon intensity of 400 gCO2eq/kWh. Option B: Deploy in Region 2 with a PUE of 1.2 and a volatile grid where carbon intensity is 100 gCO2eq/kWh for 8 hours of daylight and 600 gCO2eq/kWh for 16 hours. Your orchestration allows pausing the job, but daily checkpointing introduces a 15% throughput penalty.'
question: How do Region 1 continuous training and Region 2 solar-only intermittent training compare on CO2 and time-to-market?
details:
  realistic_solution: Compare continuous Region 1 against Region 2 run only during the 8 daylight hours and paused during the 600 gCO2eq/kWh nighttime period. Region 1 takes 14 days and emits 75.6 tons of CO2eq. Region 2 needs the same 336 active-equivalent training hours, but with only 8 × 0.85 = 6.8 effective hours per calendar day it finishes in about 49.4 days. Because it consumes power only during the 100 gCO2eq/kWh daylight window, it emits about 24.3 tons of CO2eq, a 68% reduction at the cost of much slower time-to-market.
  common_mistake: |
    **The Pitfall:** Assuming time-weighted average carbon intensity means continuous training is cleaner.
    **The Rationale:** Candidates fail to calculate total carbon over the extended duration and high PUE of the alternative.
    **The Consequence:** Choosing a deployment strategy that results in far higher total emissions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs * 500W = 512 kW
    - Region 1: PUE 1.1, 400 gCO2/kWh, continuous
    - Region 2: PUE 1.2, run only during the 8h/day 100 gCO2/kWh solar window; pause during the 16h/day 600 gCO2/kWh period
    - Daily checkpointing reduces useful training progress during solar hours by 15%

    **Calculations:**
    - Cont. Region 1 = 512 kW * 1.1 * 24h = 13,517 kWh/day * 0.4 kg/kWh = 5.41 tons/day -> Total (14 days) = 75.6 tons
    - Required active-equivalent work = 14 days * 24h/day = 336 active hours
    - Region 2 useful progress per calendar day = 8h * 0.85 = 6.8 active-equivalent hours/day
    - Duration = 336 active-equivalent hours / 6.8 = 49.4 days
    - Region 2 energy per solar day = 512 kW * 1.2 * 8h = 4,915 kWh/day
    - Region 2 emissions = 49.4 * 4,915 kWh/day * 0.1 kg/kWh = 24,300 kg = 24.3 tons

    **Conclusion & Interpretation:**
    - **Result: 24.3 tons (Emissions-Bound)**. Solar-only intermittent scheduling avoids the 600 gCO2/kWh nighttime window, reducing emissions by about 68% but extending time-to-market from 14 to ~49.4 days.
