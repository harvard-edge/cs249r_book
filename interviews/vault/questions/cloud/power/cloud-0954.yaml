title: Evaluating Elastic Training for Carbon Minimization
scenario: 'You are evaluating deployment strategies for a 14-day continuous LLM pre-training
  job using 1,024 GPUs. Option A: Deploy in Region 1 with a PUE of 1.1 and a stable
  grid carbon intensity of 400 gCO2eq/kWh. Option B: Deploy in Region 2 with a PUE
  of 1.2 and a volatile grid where carbon intensity is 100 gCO2eq/kWh for 8 hours
  of daylight and 600 gCO2eq/kWh for 16 hours. Your orchestration allows pausing the
  job, but daily checkpointing introduces a 15% throughput penalty.'
question: How do Region 1 continuous training and Region 2 solar-only intermittent
  training compare on CO2 and time-to-market?
details:
  realistic_solution: Compare Continuous Region 1 vs. Intermittent Region 2 (running
    only during the 8 solar hours). Region 1 takes 14 days and emits ~75 tons of CO2eq.
    Intermittent scheduling in Region 2 reduces total emissions to ~24 tons (a 68%
    reduction) but extends time-to-market from 14 days to ~50 days due to reduced
    daily active hours and the 15% checkpointing penalty.
  common_mistake: '**The Pitfall:** Assuming time-weighted average carbon intensity
    means continuous training is cleaner.

    **The Rationale:** Candidates fail to calculate total carbon over the extended
    duration and high PUE of the alternative.

    **The Consequence:** Choosing a deployment strategy that results in far higher
    total emissions.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 1024 GPUs * 500W = 512 kW

    - Region 1: PUE 1.1, 400 gCO2/kWh, continuous

    - Region 2: PUE 1.2, 100 gCO2/kWh (8h), intermittent with 15% penalty


    **Calculations:**

    - Cont. Region 1 = 512 kW * 1.1 * 24h = 13,517 kWh/day * 0.4 kg/kWh = 5.4 tons/day
    -> Total (14 days) = 75.6 tons

    - Inter. Region 2 = 512 kW * 1.2 * 8h = 4,915 kWh/day * 0.1 kg/kWh = 0.49 tons/day

    - Duration = 336 active hours / (8h * 0.85) = 49.4 days. Total = 49.4 * 0.49 =
    24.2 tons


    **Conclusion & Interpretation:**

    - **Result: 24.2 tons (Emissions-Bound)**. Tradeoff. Intermittent scheduling reduces
    emissions by 68% but extends time-to-market from 14 to ~50 days.

    '
