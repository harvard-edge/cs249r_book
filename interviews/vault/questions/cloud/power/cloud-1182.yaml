title: 'Evaluating DVFS Power Capping for LLM Inference'
scenario: 'You manage a dense rack of 8x H100 GPU nodes (32 GPUs total) with a strict physical power limit of 35kW. Peak theoretical draw is over 40kW.'
question: 'Which power-capping strategy should the 35kW H100 rack use, uniform DVFS downclocking or selectively idling GPUs, and why?'
details:
  realistic_solution: 'Uniformly downclocking all GPUs is vastly superior for overall throughput per watt. Dynamic power scales cubically with frequency (P ∝ f^3), meaning a slight frequency reduction yields massive power savings, keeping all chips active.'
  common_mistake: |
    **The Pitfall:** Recommending running fewer GPUs at maximum frequency and selectively idling the rest.
    **The Rationale:** Candidates optimize for latency-sensitive single-chip performance instead of aggregate cluster efficiency.
    **The Consequence:** They ignore the cubic power-frequency relationship, missing out on massive aggregate power savings achievable with minimal downclocking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak rack draw: 40 kW. Rack limit: 35 kW.
    - Dynamic Power scaling: P ∝ V²f, and V ∝ f. Thus, P ∝ f³.

    **Calculations:**
    - Required power reduction: 35 kW / 40 kW = 0.875x of peak.
    - Assume 20% frequency reduction (f = 0.8x).
    - New power: (0.8)³ = 0.512x of original power.
    - 40 kW × 0.512 = 20.48 kW (well below the 35 kW limit).

    **Conclusion & Interpretation:**
    - **Result: 20.48 kW power draw (Thermal-Power-Bound)**. A 20% downclock halves power draw, keeping 32 GPUs active.
