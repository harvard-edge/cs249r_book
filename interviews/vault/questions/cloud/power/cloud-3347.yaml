title: NVIDIA H100 Rack Power and PUE Analysis
scenario: Your team is planning to deploy a new AI training cluster for large language models. The existing datacenter has a Power Usage Effectiveness (PUE) of 1.6, and its infrastructure has a strict power limit of 15 kW per rack. You intend to populate each rack with 16 GPUs, each consuming a peak of 700W.
question: "How would you calculate whether 16 GPUs fit in a 15 kW rack and estimate grid power at PUE 1.6?"
details:
  realistic_solution: Calculate the total IT load per rack (16 GPUs * 700W/GPU). Compare this against the 15 kW rack budget. Multiply the IT load by the facility PUE (1.6) to estimate utility grid draw. If rack density exceeds budget, deploy direct-to-chip liquid cooling to lower facility PUE and safely increase rack kW capacity.
  common_mistake: |
    **The Pitfall:** Neglecting the datacenter PUE factor when calculating the power draw, or ignoring per-rack limits.
    **The Rationale:** Infrastructure engineers focus purely on the IT load (GPU + CPU wattage) and forget the massive cooling and distribution overhead required by the building.
    **The Consequence:** The deployment causes catastrophic breaker trips, or the team faces massive hidden operational costs from the utility grid.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPUs per rack: 16.
       - Power per GPU: 700 W.
       - Rack budget: 15 kW.
       - Datacenter PUE: 1.6.
    2. **Calculations:**
       - IT load per rack: 16 * 700 W = 11,200 W = 11.2 kW.
       - Rack limit check: 11.2 kW < 15 kW.
       - Total utility grid power per rack: 11.2 kW * 1.6 = 17.92 kW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Facility.** While the 11.2 kW IT load fits the 15 kW physical rack limit, each rack will pull 17.92 kW from the utility grid, resulting in high cooling costs.
