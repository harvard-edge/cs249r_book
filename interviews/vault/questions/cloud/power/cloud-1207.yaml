title: Evaluating GPU Energy Metrics under Diurnal Load
scenario: Your team benchmarks an INT8 quantized model against an FP16 baseline on an A100. The script runs continuous inference for 60s and reads `nvidia-smi` power. The report concludes INT8 draws 300W while FP16 draws 350W, yielding a 14% energy savings.
question: Evaluate the fundamental flaws in this methodology before approving a fleet-wide rollout for a service with highly diurnal traffic (peak 10k QPS, trough 1k QPS). What is flawed about comparing INT8 and FP16 by 60s nvidia-smi power alone, and what energy metric should guide rollout?
details:
  realistic_solution: 'Benchmarking must measure Energy per Query (Joules/query) across the full utilization curve, not just continuous peak power. Because INT8 increases throughput, it completes batches faster and drops to idle. The metric must integrate active power over the shortened execution time, plus the static idle power during the remainder of the observation window.'
  common_mistake: |
    **The Pitfall:** Conflating power (Watts) with energy (Joules) and ignoring throughput speedup.
    **The Rationale:** Candidates often accept the continuous power delta as the energy savings, failing to account for task completion time and static idle power during diurnal traffic troughs.
    **The Consequence:** Flawed ROI calculations that severely underestimate the actual cost savings and efficiency of quantized models.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline FP16: 350W continuous, ~1000 QPS.
    - INT8: 300W continuous, ~2000 QPS (2x throughput).
    - Idle power: 100W.
    - Trough traffic: 1k QPS.

    **Calculations:**
    - FP16 Energy per Query: 350W / 1000 = 0.35 J/query.
    - INT8 Energy per Query: 300W / 2000 = 0.15 J/query.
    - Peak energy savings: (0.35 - 0.15) / 0.35 = 57%.
    - Trough Energy (INT8 at 1k QPS): 0.5s active (150J) + 0.5s idle (50J) = 200J.
    - Trough energy savings: (350 - 200) / 350 = 42%.

    **Conclusion & Interpretation:**
    - **Result: 57% Peak Savings (Power-Bound)**. True energy efficiency requires integrating over time (Joules/query); INT8 saves 42-57% energy, not 14%.
