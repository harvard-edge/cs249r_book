title: 'Carbon-Aware Workload Shifting'
scenario: 'You are scheduling a 50-hour offline data preprocessing job on a cluster of 250 nodes, where each node draws 4 kW. The data center has a Power Usage Effectiveness (PUE) of 1.2. The local grid''s carbon intensity will average 400 gCO2/kWh if started immediately, but will drop to 100 gCO2/kWh if delayed by 12 hours.'
question: 'How many metric tons of CO2 are saved by delaying the 250-node, 50-hour preprocessing job by 12 hours?'
details:
  realistic_solution: 'First, calculate total facility power including PUE: 250 nodes × 4 kW/node × 1.2 = 1.2 MW. Then find total energy consumed: 1.2 MW × 50 hours = 60 MWh. Multiply the energy by the difference in carbon intensity to get the savings.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply the IT equipment power by the PUE when calculating total energy consumption.
    **The Rationale:** Candidates often focus solely on the server power draw, ignoring the significant energy overhead of datacenter cooling and power delivery systems.
    **The Consequence:** The total energy consumption and the resulting carbon emissions savings are systematically underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - 250 nodes, 4 kW/node, PUE = 1.2, duration = 50 hours.
    - Carbon delta: 400 gCO2/kWh - 100 gCO2/kWh = 300 gCO2/kWh.

    **Calculations:**
    - Facility power: 250 × 4 kW × 1.2 = 1.2 MW.
    - Total energy: 1.2 MW × 50 h = 60 MWh (60,000 kWh).
    - Carbon saved: 60,000 kWh × 300 gCO2/kWh = 18,000,000 gCO2.

    **Conclusion & Interpretation:**
    - **Result: 18 metric tons of CO2 saved (Grid-Intensity-Bound)**. Workload footprint is inherently PUE-Bound and Grid-Intensity-Bound.
