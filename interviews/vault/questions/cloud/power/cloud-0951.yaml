title: Carbon-Aware Workload Shifting
scenario: You are scheduling a 50-hour offline data preprocessing job on a cluster of 250 nodes, where each node draws 4 kW. The data center has a Power Usage Effectiveness (PUE) of 1.2. If started immediately, the 50-hour run would average 400 gCO2/kWh. If delayed by 12 hours, the entire 50-hour run falls inside a forecast low-carbon window averaging 100 gCO2/kWh.
question: How many metric tons of CO2 are saved by delaying the 250-node, 50-hour preprocessing job by 12 hours?
details:
  realistic_solution: 'Because the delayed start places the full 50-hour job in the 100 gCO2/kWh window, the savings can be computed from the average intensity delta against the immediate-run baseline of 400 gCO2/kWh. First, calculate total facility power including PUE: 250 nodes × 4 kW/node × 1.2 = 1.2 MW. Then find total energy consumed: 1.2 MW × 50 hours = 60 MWh. Multiply the same 60 MWh energy use by the 300 gCO2/kWh difference in carbon intensity to get 18,000 kg, or 18 metric tons, of CO2 saved.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply the IT equipment power by the PUE when calculating total energy consumption.
    **The Rationale:** Candidates often focus solely on the server power draw, ignoring the significant energy overhead of datacenter cooling and power delivery systems.
    **The Consequence:** The total energy consumption and the resulting carbon emissions savings are systematically underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - 250 nodes, 4 kW/node, PUE = 1.2, duration = 50 hours.
    - The delayed job's entire 50-hour execution window averages 100 gCO2/kWh.
    - Carbon delta: 400 gCO2/kWh - 100 gCO2/kWh = 300 gCO2/kWh.

    **Calculations:**
    - Facility power: 250 × 4 kW × 1.2 = 1.2 MW.
    - Total energy: 1.2 MW × 50 h = 60 MWh (60,000 kWh).
    - Baseline emissions: 60,000 kWh × 400 gCO2/kWh = 24,000,000 gCO2.
    - Delayed-run emissions: 60,000 kWh × 100 gCO2/kWh = 6,000,000 gCO2.
    - Carbon saved: 18,000,000 gCO2 = 18,000 kgCO2 = 18 metric tons CO2.

    **Conclusion & Interpretation:**
    - **Result: 18 metric tons of CO2 saved (Grid-Intensity-Bound)**. This depends on the delayed 50-hour execution staying entirely within the low-carbon window.
