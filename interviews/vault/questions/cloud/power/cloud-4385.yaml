title: Waste Heat Recovery Feasibility for H100 Liquid-Cooled Racks
scenario: A hyperscaler is evaluating whether to recover waste heat from direct-to-chip (D2C) liquid-cooled H100 racks for district heating. Each 8xH100 node draws 8 kW. The D2C system delivers coolant at 40°C supply and returns it at 55°C. The district heating network requires a minimum delivery temperature of 60°C.
question: Can 55°C D2C return coolant from 500 H100 nodes be used for 60°C district heating, what options bridge the gap, and how much heat is recoverable?
details:
  realistic_solution: 'Temperature gap: district heating needs 60°C, D2C return is 55°C—a 5°C deficit. Options: (1) heat pump to boost from 55°C to 65°C at COP ~6-8 (electrical cost adds ~12-16% overhead); (2) operate coolant at higher flow resistance to raise return temperature to 62°C (increases pump work, risks GPU thermal margin); (3) use D2C heat as pre-heat for a gas boiler (most common practical approach—reduces boiler fuel by ~60%). Recoverable power: 500 nodes * 8 kW * 0.72 liquid fraction = 2.88 MW thermal. At 8,000 hours/year = 23,040 MWh/year. At $0.05/kWh heat equivalent, that''s $1.15M/year in recovered energy value.'
  common_mistake: |
    **The Pitfall:** Assuming all 8 kW per node is recoverable as useful liquid heat.
    **The Rationale:** Candidates fail to understand that D2C systems only capture 70-75% of IT load (conduction), leaving the rest to room air convection.
    **The Consequence:** Overestimating waste heat recovery capacity, leading to incorrectly sized district heating exchangers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 nodes at 8 kW IT load (4 MW total)
    - D2C captures 72% of heat. 55°C return, 60°C required
    - Heat pump COP ~7. Heat value $0.05/kWh

    **Calculations:**
    - Recoverable Thermal = 4 MW * 0.72 = 2.88 MW
    - Heat pump electrical penalty = 2.88 MW / 7 = 0.41 MW
    - Annual value = 2.88 MW * 8,000h * $0.05 = $1.15M

    **Conclusion & Interpretation:**
    - **Result: $1.15M/year (Thermal-Bound)**. ~7x energy leverage is achievable, recovering $1.15M/year in useful heat despite the heat pump penalty.
