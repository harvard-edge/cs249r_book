title: Waste Heat Recovery Feasibility for H100 Liquid-Cooled Racks
scenario: A hyperscaler is evaluating whether to recover waste heat from direct-to-chip (D2C) liquid-cooled H100 racks for district heating. Each 8xH100 node draws 8 kW. The D2C system delivers coolant at 40°C supply and returns it at 55°C. The district heating network requires a minimum delivery temperature of 60°C.
question: Can 55°C D2C return coolant from 500 H100 nodes be used for 60°C district heating, what options bridge the gap, and how much heat is recoverable?
details:
  realistic_solution: 'Temperature gap: district heating needs 60°C, while D2C return coolant is 55°C, so direct injection is not enough without mixing constraints or a lower-temperature district loop. The practical options are: (1) use a heat pump to lift 55°C return water to 60-65°C; (2) operate a warmer liquid loop if GPU thermal margin and vendor limits allow it; or (3) use the D2C loop as boiler preheat. Recoverable thermal power is close to the IT load captured by the liquid loop: 500 nodes * 8 kW = 4.0 MW before small distribution losses. With a COP 7 heat pump, lifting 4.0 MW of heat requires about 0.57 MW of electrical input, so the useful heat delivered is about 4.57 MW and the temperature uplift, not heat availability, is the main design constraint.'
  common_mistake: |
    **The Pitfall:** Assuming 55°C return water can be fed directly into a 60°C district heating network.
    **The Rationale:** Candidates focus on the large waste-heat quantity and miss the temperature grade requirement.
    **The Consequence:** The heat exchanger is sized for enough megawatts but cannot meet the delivery temperature without a warmer loop, preheat use, or heat-pump lift.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 nodes at 8 kW IT load = 4.0 MW thermal before distribution losses.
    - D2C return is 55°C; district heating delivery requires at least 60°C.
    - Heat pump COP for a small 5-10°C lift is about 7.

    **Calculations:**
    - Recoverable heat from IT load ≈ 500 * 8 kW = 4.0 MW thermal.
    - Direct-use temperature gap = 60°C - 55°C = 5°C, so direct delivery is not sufficient.
    - Heat-pump electrical input ≈ 4.0 MW / 7 = 0.57 MW.
    - Useful heat delivered after lift ≈ 4.0 MW + 0.57 MW = 4.57 MW.

    **Conclusion & Interpretation:**
    - **Result: Temperature-Lift Bound**. The rack fleet provides roughly 4 MW of recoverable heat, but 55°C return water needs a heat pump, warmer loop, or preheat-only use to serve a 60°C network.
