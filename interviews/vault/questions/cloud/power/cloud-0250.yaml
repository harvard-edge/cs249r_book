title: The Datacenter Power Wall
scenario: You are designing a new server rack for training large language models. The facilities team needs to know the power budget for a standard 8-GPU server.
question: What is the approximate Thermal Design Power (TDP) of a single modern datacenter GPU?
details:
  realistic_solution: A single NVIDIA H100 GPU has a TDP of approximately 700W. This is a critical number for datacenter design, as it dictates power delivery, cooling infrastructure, and ultimately, operational cost.
  common_mistake: |
    **The Pitfall:** Underestimating the power draw by confusing datacenter GPUs with consumer cards.
    **The Rationale:** Candidates familiar with consumer gaming rigs might guess a number in the 200-300W range.
    **The Consequence:** Radically under-provisioning the datacenter power and cooling infrastructure, making the racks completely unusable.
  options:
  - "~150 W"
  - "~350 W"
  - "~700 W"
  - "~1200 W"
  correct_index: 2
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Single H100 GPU TDP.
       - 8-GPU Server configuration.
    2. **Calculations:**
       - A single modern GPU has a TDP of ~700W.
       - An 8-GPU server will draw: 8 GPUs × 700W/GPU = 5,600W (5.6 kW).
       - Factoring in dual CPUs (~350W each), total server power reaches 7 to 8 kW.
       - Calculated Distractor (150W): Confusing consumer GPU with datacenter GPU.
       - Calculated Distractor (350W): Confusing CPU TDP with GPU TDP.
       - Calculated Distractor (1200W): Confusing system total or dual-GPU with single GPU.
    3. **Conclusion & Interpretation:**
       - **The TDP of a single H100 is 700W.**
       - **Result: Power-Bound**
