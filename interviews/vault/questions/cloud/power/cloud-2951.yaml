title: 'Optimization: Reducing Stranded Power Through Dynamic GPU Power Capping'
scenario: A 128-GPU A100 cluster (400 W TDP each) is constrained to 45 kW total IT power by the datacenter PDU. At full load, it exceeds budget. Currently, only 112 GPUs are powered on, leaving 16 GPUs stranded.
question: How would you dynamically power-cap the 128-GPU A100 cluster so all GPUs stay powered while total IT power remains under 45 kW?
details:
  realistic_solution: |
    Implement heterogeneous power caps using GPU workload classification. Profile each job's compute vs memory boundedness using NVML/DCGM and solve for caps whose total across all 128 GPUs stays below 45 kW. A uniform cap would be 45,000 / 128 = 351.6 W/GPU. A better schedule gives deeper caps to memory-bound inference pods and lighter caps to compute-bound training pods, for example 64 GPUs at 320 W and 64 GPUs at 380 W, totaling 44.8 kW. Apply caps with `nvidia-smi -pl` or the GPU Operator, monitor actual board power, and lower caps or shed jobs if measured IT power approaches the PDU limit.
  common_mistake: |
    **The Pitfall:** Applying a uniform power cap to all GPUs (e.g., 351.6 W per GPU).
    **The Rationale:** Uniform capping is simple to script, but it ignores that different ML workloads have completely different power sensitivities.
    **The Consequence:** Compute-bound workloads suffer severe performance degradation, reducing overall cluster throughput unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - PDU Budget: 45 kW (45,000 W).
    - Full uncapped cluster: 128 GPUs * 400 W = 51,200 W, which exceeds the budget.
    - Current workaround: 112 GPUs * 400 W = 44,800 W, leaving 16 GPUs stranded.

    **Calculations:**
    - Required average cap for all GPUs: 45,000 W / 128 = 351.6 W/GPU.
    - Assign 64 inference GPUs a 320 W cap (memory bound): 20,480 W.
    - Assign 64 training GPUs a 380 W cap (compute bound): 24,320 W.
    - Total: 44,800 W (Fits budget).
    - Approximate training throughput for the 64 compute-bound GPUs, if performance scaled linearly with cap: 64 * 312 TFLOPS * (380/400) = 18,969.6 TFLOPS. Actual throughput must be validated because power/performance is not perfectly linear.

    **Conclusion & Interpretation:**
    - **Result: 128 GPUs active at 44.8 kW, under the 45 kW budget.** Heterogeneous capping removes the 16-GPU stranded-capacity problem while protecting compute-bound jobs better than a flat 351.6 W cap.
