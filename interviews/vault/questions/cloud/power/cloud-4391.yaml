title: Cooling Fluid Routing for Hot-Aisle Containment in H100 Deployments
scenario: A datacenter houses 8xGPU nodes generating 8 kW IT load each, deployed in rows with hot-aisle containment (HAC).
question: How does hot-aisle containment improve PUE for 8 kW nodes, what thermodynamic mechanism matters, and what PUE gain is typical?
details:
  realistic_solution: 'HAC prevents hot exhaust air from mixing with cold supply air. By providing the CRAC units with pure, unmixed high-temperature return air (e.g., 50°C), chiller efficiency is maximized.'
  common_mistake: |
    **The Pitfall:** Confusing hot-aisle with cold-aisle containment.
    **The Rationale:** Engineers treat the two as interchangeable without understanding that HAC prevents recirculation and allows the cooling system to leverage optimal high return temperatures.
    **The Consequence:** Suboptimal cooling designs missing major thermodynamic efficiency gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1°C chiller inlet rise = 2.5% more power.
    - Mixed air vs HAC = 5°C penalty.

    **Calculations:**
    - Power penalty = 5 * 2.5% = 12.5% wasted chiller power.
    - On a 10 MW facility with 1.5 PUE (5 MW cooling): 12.5% * 5 MW = 625 kW saved.
    - PUE drop = 625 kW / 10 MW = 0.0625 points.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Efficiency Bound (HAC achieves ~0.06 PUE reduction via delta-T optimization).**
