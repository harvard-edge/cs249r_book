title: Evaluating Edge vs Centralized Processing for Telemetry Data
scenario: Your team needs to train a model on 5 PB of raw telemetry data generated across 50 regional data centers. The current proposal is to transfer all 5 PB to a central cloud region (us-east-1) to leverage an H100 cluster, taking advantage of the centralized data center's low Power Usage Effectiveness (PUE = 1.1).
question: Centralize 5 PB in us-east-1 for H100 training or keep telemetry regional (preprocess, aggregate, or federate)? Assume WAN energy 0.01 kWh/GB and 10,000 H100-hours at 700W per GPU.
details:
  realistic_solution: Do not centralize the raw 5 PB by default. Keep raw telemetry in the regional data centers, perform local preprocessing/filtering or aggregation, and move only compact derived datasets, feature summaries, or model updates to the central region. Federated or edge training is appropriate if the learning objective truly requires training across regional data without moving raw records, but the broader principle is to move less data and compute near the source when raw-data transfer dominates.
  common_mistake: |
    **The Pitfall:** Assuming centralized cloud PUE efficiency guarantees lower overall energy consumption.
    **The Rationale:** Candidates focus entirely on datacenter economies of scale, ignoring the massive energy overhead of moving petabytes of data across the Wide Area Network (WAN).
    **The Consequence:** Proposing an architecture that is significantly more expensive and carbon-intensive.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data volume: 5 PB (5,000,000 GB).
    - WAN transfer energy cost supplied by the prompt: ~0.01 kWh/GB.
    - Centralized compute budget supplied by the prompt: 10,000 H100 GPU-hours at 700 W/GPU before cluster overhead.
    - This is a first-order comparison; storage, networking equipment, preprocessing, and utilization can change the exact totals.

    **Calculations:**
    - WAN transfer energy for raw data: 5,000,000 GB * 0.01 kWh/GB = 50,000 kWh.
    - GPU compute energy lower bound: 10,000 GPU-hr * 0.7 kW = 7,000 kWh before PUE and system overhead.
    - Ratio under these assumptions: 50,000 / 7,000 = ~7.1x.

    **Conclusion & Interpretation:**
    - **Result: raw transfer dominates under the stated model.** Moving 5 PB consumes about 7x the GPU energy lower bound, so the better architecture is regional preprocessing/aggregation and selective movement of compact outputs. Federated training is one possible implementation when gradients or model updates are the right compact output, not a universal substitute for all centralized training.
