title: Lifecycle Carbon Analysis of a 3B Model Serving System
scenario: 'Conduct a full lifecycle carbon analysis for a 3B LLM deployed for 2 years. Training: 200 A100-hours on a 400 gCO2e/kWh grid. Serving: 4 A100 GPUs running continuously at 60% utilization, PUE=1.3, same grid. Hardware: embodied carbon of 80 kgCO2e per A100, amortized over 3 years. Expected traffic: 10M queries/day at 500 output tokens/query. Calculate carbon per inference and identify the dominant carbon contributor.'
question: What is the lifecycle carbon per inference for the 3B LLM over 2 years, and which component dominates emissions?
details:
  realistic_solution: 'Training carbon: 200 A100-hours × 400W × 1.3 PUE × 400 gCO2e/kWh = 200 × 0.4 kW × 1.3 × 0.4 = 41.6 kgCO2e. Serving carbon (2 years): 4 GPUs × 400W × 0.60 × 8,760 × 2 × 1.3 PUE × 0.4 kg/kWh = 4 × 0.4 × 0.60 × 17,520 × 1.3 × 0.4 = 8,746 kgCO2e. Embodied: 4 GPUs × 80 kg × (2yr/3yr amortization) = 213 kgCO2e. Total: 41.6 + 8,746 + 213 = 9,001 kgCO2e. Total inferences: 10M × 365 × 2 = 7.3B. Carbon per inference: 9,001 kg / 7.3B = 1.23 mgCO2e per query. Dominant contributor: serving operational (~97%).'
  common_mistake: Omitting embodied hardware carbon entirely or treating training carbon as the dominant cost for long-running deployed models. For a model serving 10M queries/day over 2 years, serving operational carbon dwarfs training carbon after approximately 3-4 weeks.
  napkin_math: 'Training: 200 A100-hr × 0.4kW × 1.3 × 0.4 kgCO2e/kWh = 41.6 kgCO2e (0.46%). Serving: 4×0.4kW×0.6×17,520hr×1.3×0.4 = 8,746 kgCO2e (97.17%). Embodied: 213 kgCO2e (2.36%). Carbon/query: 9,001,000g / 7,300,000,000 = 0.00123 gCO2e (1.23 mgCO2e). Comparison: streaming 1 minute of HD video ≈ 0.36 gCO2e. One LLM query ≈ 0.0034× a minute of HD streaming (or ~290 queries per minute of HD video). Reducing required utilization from 60% to 40% (via better batching): serving carbon drops by 33% to 5,831 kgCO2e, reducing total by ~32%.'
