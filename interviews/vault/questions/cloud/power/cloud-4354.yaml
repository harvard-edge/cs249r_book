title: Lifecycle Carbon Analysis of a 3B Model Serving System
scenario: 'Conduct a full lifecycle carbon analysis for a 3B LLM deployed for 2 years. Training: 200 A100-hours
  on a 400 gCO2e/kWh grid. Serving: 4 A100 GPUs running continuously at 60% utilization, PUE=1.3, same
  grid. Hardware: embodied carbon of 80 kgCO2e per A100, amortized over 3 years. Expected traffic: 10M
  queries/day at 500 output tokens/query. Calculate carbon per inference and identify the dominant carbon
  contributor.'
question: What is the lifecycle carbon per inference for the 3B LLM over 2 years, and which component
  dominates emissions?
details:
  realistic_solution: 'Training carbon: 200 A100-hours × 400W × 1.3 PUE × 400 gCO2e/kWh = 200 × 0.4 kW
    × 1.3 × 0.4 = 41.6 kgCO2e. Serving carbon (2 years): 4 GPUs × 400W × 0.60 × 8,760 × 2 × 1.3 PUE ×
    0.4 kg/kWh = 4 × 0.4 × 0.60 × 17,520 × 1.3 × 0.4 = 8,746 kgCO2e. Embodied: 4 GPUs × 80 kg × (2yr/3yr
    amortization) = 213 kgCO2e. Total: 41.6 + 8,746 + 213 = 9,001 kgCO2e. Total inferences: 10M × 365
    × 2 = 7.3B. Carbon per inference: 9,001 kg / 7.3B = 1.23 mgCO2e per query. Dominant contributor: serving
    operational (~97%).'
  common_mistake: '**The Pitfall:** Omitting embodied hardware carbon entirely or treating training carbon
    as the dominant cost for long-running deployed models.

    **The Rationale:** Engineers often focus on the highly publicized carbon cost of training large models,
    neglecting the cumulative emissions of 24/7 inference over a multi-year lifespan.

    **The Consequence:** Misidentifying the dominant carbon contributor, as serving operational carbon
    dwarfs training carbon after approximately 3-4 weeks for a model serving 10M queries/day.'
  napkin_math: '**Assumptions & Constraints:**

    - Training: 200 A100-hr, 400W/GPU, PUE 1.3, Grid 400 gCO2e/kWh.

    - Serving: 4 GPUs, 400W, 60% utilization, 2 years (17,520 hours), PUE 1.3.

    - Embodied: 80 kgCO2e per GPU amortized over 3 years (using 2/3 for 2 years).

    - Traffic: 10M queries/day * 730 days = 7.3B queries.


    **Calculations:**

    - Training: 200 * 0.4kW * 1.3 * 0.4 kgCO2e/kWh = 41.6 kgCO2e (0.46%).

    - Serving: 4 * 0.4kW * 0.6 * 17,520hr * 1.3 * 0.4 = 8,746 kgCO2e (97.17%).

    - Embodied: 4 * 80kg * (2/3) = 213 kgCO2e (2.36%).

    - Total Carbon: 41.6 + 8746 + 213 = 9,001 kgCO2e.

    - Carbon/query: 9,001,000g / 7,300,000,000 = 0.00123 gCO2e (1.23 mgCO2e).


    **Conclusion & Interpretation:**

    - **Result:** 1.23 mgCO2e per query. Serving operational carbon (~97%) completely dominates emissions
    compared to training or embodied hardware.'
