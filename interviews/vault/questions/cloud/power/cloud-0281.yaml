title: The Datacenter Power Budget
scenario: 'You are designing a new AI cluster and your datacenter provides racks with a maximum power and cooling capacity of 70 kW. You plan to populate these racks with GPUs.'
question: 'With a 70 kW rack limit, 700 W per GPU, and PUE 1.1, how many GPUs can you install and what grid power will it draw?'
details:
  realistic_solution: 'The 70 kW limit applies to the total power drawn from the grid, which includes both the GPUs and the energy needed to cool them (the PUE overhead). Therefore, you must first calculate the power budget available to the components themselves. You then divide this component budget by the TDP of a single GPU to find the maximum number you can install.'
  common_mistake: |
    **The Pitfall:** Ignoring the Power Usage Effectiveness (PUE) overhead.
    **The Rationale:** Candidates calculate the GPU count based only on their Thermal Design Power (TDP).
    **The Consequence:** Provisioning too many GPUs, which will exceed the rack's grid limit and cause thermal throttling or tripped breakers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Rack power limit: 70 kW.
    - PUE: 1.1.
    - GPU TDP: 700 W.

    **Calculations:**
    - Available component power: 70 kW / 1.1 = 63.63 kW.
    - Maximum GPUs: 63,636 W / 700 W/GPU = 90.9 GPUs (round down to 90).
    - Actual component draw: 90 GPUs * 700 W = 63.0 kW.
    - Total grid power draw: 63.0 kW * 1.1 = 69.3 kW.

    **Conclusion & Interpretation:**
    - **Result: 90 GPUs can be installed, drawing 69.3 kW (Power-Bound)**.
  options:
  - '100 GPUs, drawing 70.0 kW'
  - '90 GPUs, drawing 63.0 kW'
  - '90 GPUs, drawing 69.3 kW'
  - '100 GPUs, drawing 77.0 kW'
