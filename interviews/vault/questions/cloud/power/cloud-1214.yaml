title: LLM Inference Energy Movement Bottleneck
scenario: You are designing the hardware strategy for a 70B parameter LLM cloud inference
  fleet. The primary workload is real-time chat (autoregressive decoding at batch
  size 1). Your hardware team proposes a custom inference ASIC that reduces INT8 MAC
  energy from 1.5 pJ to 0.1 pJ (a 15x improvement). Both chips use identical HBM subsystems,
  which cost approximately 150 pJ to access 1 byte of DRAM. The team projects massive
  fleet-wide power savings from the ALU optimization.
question: Will a 15x INT8 MAC energy reduction meaningfully cut fleet power for batch-1
  70B decoding with the same HBM, and why?
details:
  realistic_solution: Reject the claim. In autoregressive decoding at batch size 1,
    every model weight must be loaded from DRAM to perform exactly one MAC operation.
    Thus, the total energy per operation is dominated by the 150 pJ DRAM access, not
    the compute. Reducing MAC energy from 1.5 pJ to 0.1 pJ only yields roughly a 1%
    overall energy reduction. The investment should instead focus on increasing batch
    sizes (to amortize the DRAM read over multiple MACs) or heavily optimizing the
    memory hierarchy.
  common_mistake: '**The Pitfall:** Focusing solely on the 15x reduction in compute
    energy and concluding it will drastically reduce overall power.

    **The Rationale:** Batch size 1 LLM decoding is heavily memory-bound, meaning
    data movement energy dominates the total energy footprint.

    **The Consequence:** Wasting millions of dollars designing and deploying an ASIC
    that yields less than a 1% power reduction in production.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Batch Size: 1 (autoregressive\
    \ decoding).\n   - Precision: INT8 (1 byte per weight).\n   - Standard MAC Energy:\
    \ 1.5 pJ.\n   - Custom MAC Energy: 0.1 pJ.\n   - DRAM Read Energy: 150 pJ per\
    \ byte.\n2. **Calculations:**\n   - Standard Energy/MAC = 150 pJ (DRAM) + 1.5\
    \ pJ (MAC) = 151.5 pJ.\n   - Custom Energy/MAC = 150 pJ (DRAM) + 0.1 pJ (MAC)\
    \ = 150.1 pJ.\n   - Power Savings = (151.5 - 150.1) / 151.5 ≈ 0.0092 (0.92%).\n\
    3. **Conclusion & Interpretation:** **Total system power reduction is <1%. Memory-Energy-Bound.**\n"
