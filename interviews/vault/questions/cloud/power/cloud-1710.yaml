title: Diagnosing Multi-Tenant GPU Power Side-Channel Leaks
scenario: You are investigating a data leak in a multi-tenant cloud environment using NVIDIA GPUs partitioned via MIG. A tenant claims their proprietary LLM layer architecture was inferred by a co-tenant who has no logical access to the host OS, network, or the victim's memory space. The host allows all tenants to query NVML telemetry at 1kHz. You notice that dense 4096x4096 matrix multiplications draw 300W, while smaller 4096x1024 operations draw 210W.
question: What caused the MIG tenant's architecture leak through NVML telemetry, and how would you mitigate it?
details:
  realistic_solution: |
    The attacker used high-resolution NVML power readings to fingerprint the victim's sequence of operations by correlating power spikes with specific tensor shapes. Mitigate this by heavily downsampling NVML metrics (e.g., to 1Hz) for unprivileged tenants or adding artificial noise to power readings.
  common_mistake: |
    **The Pitfall:** Assuming MIG or containerization provides complete physical isolation.
    **The Rationale:** Engineers ignore that aggregate GPU power telemetry is a shared physical resource that leaks state.
    **The Consequence:** The environment remains vulnerable to side-channel architecture extraction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Layer A takes 2ms at 300W.
    - Layer B takes 1ms at 210W.
    - Tenant-visible telemetry is sampled at 1kHz (1ms resolution) or downsampled to 1Hz.

    **Calculations:**
    - At 1kHz, a 3ms A/B pattern can appear as three 1ms samples: [300W, 300W, 210W], exposing operation order at millisecond granularity.
    - Over a 1-second reporting interval with this 3ms pattern repeated, average power is approximately (2ms * 300W + 1ms * 210W) / 3ms = 270W.
    - A 1Hz export reports only the 1-second average, not the individual 2ms and 1ms layer transitions.

    **Conclusion & Interpretation:**
    - **Result: 1Hz aggregation hides the millisecond signature (Telemetry Side-Channel)**. Coarse aggregation removes the per-layer timing pattern that made the architecture fingerprint visible.
