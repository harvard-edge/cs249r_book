title: Stranded Power in Mixed H100/A100 Rack Deployments
scenario: A cloud operator is retrofitting an existing datacenter that has 30 kW/rack PDUs and mixed cooling supporting up to 25 kW IT load per rack. They have whole 8-GPU H100 nodes at 8 kW each and whole 8-GPU A100 nodes at 5.2 kW each, with enough inventory of each SKU for one rack.
question: Which whole H100 and A100 nodes should fill one 25 kW rack to maximize GPUs, and how much power is stranded?
details:
  realistic_solution: |
    The objective is maximum GPU count under the 25 kW IT-load limit, not lowest stranded-power percentage for a pure SKU rack. Each node contains 8 GPUs. Pure H100 fits 3 nodes, using 24.0 kW for 24 GPUs with 1.0 kW stranded. Pure A100 fits 4 nodes, using 20.8 kW for 32 GPUs with 4.2 kW stranded. The best mixed fill is 1 H100 node plus 3 A100 nodes: 8.0 + 15.6 = 23.6 kW, also 4 nodes or 32 GPUs, with only 1.4 kW stranded. No 5-node combination fits under 25 kW because 5 A100 nodes alone require 26.0 kW. Choose 1xH100 + 3xA100 if you want maximum GPUs with less stranded power than pure A100.
  common_mistake: |
    **The Pitfall:** Assuming nodes can be mixed freely in one rack without considering per-circuit limits.
    **The Rationale:** In practice, power distribution units (PDUs) at the rack level have per-circuit limits constraining placement. Also, engineers often forget to quantify stranded power.
    **The Consequence:** The deployment might violate physical electrical constraints or result in poor capacity planning by ignoring efficiency metrics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Maximum Rack IT Load: 25 kW.
    - H100 Node: 8 GPUs and 8 kW.
    - A100 Node: 8 GPUs and 5.2 kW.
    - Choose whole nodes for one rack.

    **Calculations:**
    - Pure H100: floor(25 / 8) = 3 nodes = 24 GPUs, 24.0 kW used, 1.0 kW stranded.
    - Pure A100: floor(25 / 5.2) = 4 nodes = 32 GPUs, 20.8 kW used, 4.2 kW stranded.
    - Mixed 1xH100 + 3xA100: 4 nodes = 32 GPUs, 8.0 + 15.6 = 23.6 kW used, 1.4 kW stranded.
    - Any 5-node rack is impossible because 5 * 5.2 kW = 26.0 kW even with all A100 nodes.

    **Conclusion & Interpretation:**
    - **Result: 1xH100 + 3xA100 maximizes GPU count at 32 GPUs with 1.4 kW stranded.** The 3xH100 rack strands slightly less power, but it only provides 24 GPUs and does not optimize the asked objective.
