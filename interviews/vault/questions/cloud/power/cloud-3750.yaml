title: TPU Pod Power Budgeting vs GPU Clusters
scenario: You are comparing the power efficiency of a TPU v5e pod (256 chips, ~200W each) versus a cluster of 32 MI300X GPUs (750W TDP each) for a large-scale training job. Both configurations deliver comparable aggregate TFLOPS for your BF16 workload.
question: Which cluster is more power-efficient, and what architectural decisions drive the difference?
details:
  realistic_solution: |
    On raw peak TFLOPS per kW, the MI300X cluster is more power-efficient with the stated numbers. TPU v5e pod: 256 × 200W = 51.2 kW for compute, plus modest integrated ICI overhead for about 55 kW total. Aggregate BF16 peak is 256 × 197 TFLOPS = 50.4 PFLOPS, so peak efficiency is 50.4 PFLOPS / 55 kW = 916 TFLOPS/kW. MI300X cluster: 32 × 750W = 24 kW GPU, plus about 6 kW for InfiniBand and hosts, for about 30 kW total. Aggregate peak is 32 × 1307 TFLOPS = 41.8 PFLOPS, so peak efficiency is 41.8 PFLOPS / 30 kW = 1393 TFLOPS/kW. If using utilization-adjusted efficiency, the assumed MFU matters: at 55% TPU MFU and 40% MI300X MFU, TPU delivers about 504 useful TFLOPS/kW and MI300X about 557 useful TFLOPS/kW, so MI300X still slightly leads under those assumptions. TPU architecture may still win operationally for workloads where XLA, ICI, and pod topology produce materially higher MFU than the GPU cluster.'
  common_mistake: |
    **The Pitfall:** Comparing raw TDP without normalizing to useful TFLOPS delivered.
    **The Rationale:** Engineers often ignore Model FLOPs Utilization (MFU) and forget that GPU clusters require separate, power-hungry InfiniBand switches, while TPUs have integrated ICI networking.
    **The Consequence:** Miscalculating actual datacenter power requirements and drawing incorrect conclusions about workload efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e Pod: 256 chips * 200W plus overhead, 50.4 PFLOPS peak, 55% MFU.
    - MI300X Cluster: 32 GPUs * 750W plus 6 kW overhead, 41.8 PFLOPS peak, 40% MFU.

    **Calculations:**
    - TPU v5e Power: ~55 kW. Peak Efficiency: 50.4 PFLOPS / 55 kW = 916 TFLOPS/kW.
    - MI300X Power: 30 kW. Peak Efficiency: 41.8 PFLOPS / 30 kW = 1393 TFLOPS/kW.
    - Effective TPU Efficiency: 916 * 0.55 = 504 TFLOPS/kW.
    - Effective MI300X Efficiency: 1393 * 0.40 = 557 TFLOPS/kW.

    **Conclusion & Interpretation:**
    - **Result: MI300X is more power-efficient on both raw peak and the stated MFU-adjusted assumptions**. TPU v5e can become more efficient only if its realized MFU advantage is large enough to overcome the lower peak TFLOPS/kW.
