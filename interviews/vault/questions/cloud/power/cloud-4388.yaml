title: Cluster-Level H100 DVFS Power Capping During AllReduce
scenario: A 4,096-node H100 training cluster has 8 GPUs per node and operates under a 25 MW IT power budget, including 2 MW of non-GPU load. GPUs draw 700W during GEMMs and can be capped to 450W during all-reduce with minimal throughput loss. You are designing a cluster-level DVFS policy using scheduler phase hints and NCCL collective telemetry.
question: What cluster-level DVFS policy keeps the 4,096-node cluster under 25 MW while exploiting GEMM and all-reduce phase differences?
details:
  realistic_solution: 'Design a two-level policy: (1) the cluster scheduler annotates jobs with topology metadata such as TP degree, PP stages, and expected collective cadence; (2) a rack or cluster power controller uses those hints plus NCCL collective telemetry to set caps ahead of communication-heavy windows. During all-reduce, cap GPUs near 450W because GEMM throughput is not the bottleneck; during GEMM-heavy windows allow up to 700W only when the forecast cluster total remains below 25 MW. The 4,096-node cluster contains 32,768 GPUs, so a fully synchronized GEMM-heavy peak would draw 22.94 MW of GPU power; adding 2 MW non-GPU load leaves only about 0.06 MW of headroom. The policy is therefore meaningful: it prevents budget excursions from phase alignment and measurement lag while preserving high clocks for compute-bound intervals.'
  common_mistake: |
    **The Pitfall:** Treating DVFS as a per-GPU reactive control loop rather than a cluster-level preemptive policy.
    **The Rationale:** GPU driver tools automatically step down clocks when idle.
    **The Consequence:** Individual GPU DVFS reacts too slowly (10-100ms) to catch AllReduce windows (5-50ms), missing the overlap completely and failing to stabilize peak draw.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4,096 nodes * 8 = 32,768 GPUs. IT power budget: 25 MW.
    - Non-GPU load: 2 MW.
    - Compute: 700W (60% time). Comm: 450W (40% time).

    **Calculations:**
    - Per-GPU average power = (0.6 * 700W) + (0.4 * 450W) = 600W.
    - Cluster GPU peak power under a fully synchronized compute-heavy phase = 32,768 * 700W = 22.94 MW.
    - Cluster GPU average power = 32,768 * 600W = 19.66 MW.
    - Facility total at synchronized GPU peak = 22.94 MW + 2.0 MW = 24.94 MW, leaving only 0.06 MW headroom.
    - Facility total in all-reduce cap = (32,768 * 450W) + 2.0 MW = 16.75 MW, which creates room for communication-heavy windows without losing much throughput.

    **Conclusion & Interpretation:**
    - **Result: Facility-Power-Bound DVFS Policy**. Use scheduler phase hints and collective telemetry to pre-cap communication phases near 450W and admit 700W GEMM phases only when the forecast aggregate stays under 25 MW.
