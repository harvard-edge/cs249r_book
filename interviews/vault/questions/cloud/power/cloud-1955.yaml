title: Datacenter Idle GPU Static Power Scaling
scenario: A cloud provider operates a cluster of 1,000 modern GPUs. During off-peak hours, 800 GPUs sit idle but remain powered on. To save facility cooling costs, the datacenter allows the ambient temperature to rise, increasing the idle chip temperature from 40°C to 70°C. Given a base static power (leakage) of 75W per GPU at 40°C, and knowing that static power doubles for every 15°C increase in temperature.
question: What is the total facility-level power wasted by the 800 idle GPUs at 70°C with a datacenter PUE of 1.2?
details:
  realistic_solution: Apply the exponential scaling factor based on the temperature delta to the base static power. Then, multiply the resulting static power by the number of idle GPUs and the PUE to find the true facility-level power waste.
  common_mistake: |
    **The Pitfall:** Assuming idle GPUs consume zero power or that static power scales linearly.
    **The Rationale:** Candidates focus solely on dynamic power (when the GPU is computing) and forget that leakage current scales exponentially with temperature.
    **The Consequence:** Severely underestimating datacenter power footprints, leading to blown power budgets when ambient cooling is reduced.
  napkin_math: |
    **Assumptions & Constraints:**
    - 800 idle GPUs. Base static power = 75W at 40°C.
    - Temperature rises to 70°C (delta = 30°C).
    - Power doubles every 15°C. Datacenter PUE = 1.2.

    **Calculations:**
    - Leakage scaling factor: 2^(30 / 15) = 4x.
    - Static power per GPU at 70°C: 75W * 4 = 300W.
    - Total IT power waste: 800 * 300W = 240 kW.
    - Total facility waste: 240 kW * 1.2 = 288 kW.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Leakage Bound.** 288 kW of facility power is wasted due to exponential static leakage scaling.
