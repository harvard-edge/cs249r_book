title: Google TPU v5e Thermal Limits and Sustained Performance Recall
scenario: A Google TPU v5e executes long-duration, high-intensity workloads that reveal a gap between its peak burst performance and sustained performance.
question: What thermal mechanisms limit TPU v5e burst vs sustained BF16 performance, and how would higher ambient temperature affect them?
details:
  realistic_solution: TPU v5e burst BF16 performance can exceed sustained performance because sustained high utilization raises die and package temperature until firmware enforces thermal and power limits. The control loop may reduce voltage/frequency, lower effective clocks, or limit boost behavior to keep the accelerator within safe operating temperature. Higher ambient datacenter temperature reduces the cooling headroom, so throttling starts sooner, lasts longer, or settles at a lower sustained clock. The key telemetry is temperature, power draw, clock frequency, throttling events, and throughput over time.
  common_mistake: |
    **The Pitfall:** Assuming published peak TFLOPS represents achievable indefinite performance.
    **The Rationale:** Engineers overlook thermal constraints and the difference between burst and sustained execution.
    **The Consequence:** Missed performance targets and potential instability due to thermal throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak BF16 TFLOPS is a burst or ideal-condition figure.
    - Sustained throughput depends on cooling capacity, inlet air temperature, power limits, and workload intensity.

    **Calculations:**
    - If temperature rises toward the thermal limit, DVFS lowers voltage/frequency to reduce heat generation.
    - Higher ambient temperature reduces the temperature delta available for heat removal, so the same workload reaches the thermal limit faster.
    - Without a stated throttle percentage or measured clocks, no numeric sustained TFLOPS value can be derived from the prompt.

    **Conclusion & Interpretation:**
    - **Result: thermal-bound sustained performance.** The expected recall is the mechanism: heat buildup triggers power/thermal control and DVFS; warmer ambient conditions reduce cooling margin and worsen sustained performance.
