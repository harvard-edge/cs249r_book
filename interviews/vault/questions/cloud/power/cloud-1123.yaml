title: Multi-Core Power Trade-offs Post-Dennard Scaling
scenario: 'You are evaluating next-generation cloud compute infrastructure for massive ML workloads. The CPU vendor offers two options for the same TDP (300W): Option A features 32 cores running at 4.0 GHz, while Option B features 128 cores running at 2.0 GHz. Power roughly scales with the cube of frequency (P \u221d f\u00b3) in this voltage regime.'
question: Which 300W CPU option provides better theoretical throughput for parallel ML workloads like embedding lookups, and why?
details:
  realistic_solution: 'Option B is vastly superior for parallelizable workloads. Because power scales as the cube of frequency (P \u221d f\u00b3), halving the frequency reduces power per core by a factor of 8. This massive power savings allows packing 4x as many cores into the same 300W TDP, yielding 2x the theoretical aggregate throughput (128 \u00d7 2.0 GHz vs 32 \u00d7 4.0 GHz) for parallel tasks.'
  common_mistake: |
    **The Pitfall:** Favoring Option A for overall throughput based on single-core performance.
    **The Rationale:** Candidates often assume performance scales linearly with power, failing to recognize the cubic relationship between power and frequency.
    **The Consequence:** Selecting an architecture that delivers significantly lower aggregate throughput for highly parallel tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total TDP = 300W.
       - Power to Frequency Relationship: P \u221d f\u00b3.
       - Option A: 32 cores at 4.0 GHz. Option B: 128 cores at 2.0 GHz.
    2. **Calculations:**
       - Option A Power: Core frequency f = 4.0, power \u221d 4\u00b3 = 64.
       - Option B Power: Core frequency f = 2.0, power \u221d 2\u00b3 = 8.
       - Power Ratio: 64 / 8 = 8x. Option B uses 1/8th the power per core.
       - Total Power: Option B has 4x the cores at 1/8th the power per core, using only half the total power of Option A's cores.
       - Aggregate Throughput: Option A: 32 * 4.0 = 128 GHz-cores. Option B: 128 * 2.0 = 256 GHz-cores.
    3. **Conclusion & Interpretation:**
       - **Option B yields 2x the aggregate throughput for parallel tasks well within the same 300W TDP.**
       - **Result: Power-Bound**
