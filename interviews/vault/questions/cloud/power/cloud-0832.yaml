title: 'The Datacenter PUE Cooling Budget'
scenario: 'You are designing the power budget for a new AI training cluster with 10,000 H100 GPUs (700W TDP each). The facility targets a PUE of 1.10. Wholesale electricity is $0.05/kWh.'
question: 'What are the total facility power, annual electricity cost, and non-GPU overhead for the 10,000-H100 cluster?'
details:
  realistic_solution: 'GPU power = 10,000 * 700W = 7 MW. Total facility power at PUE 1.10 = 7.7 MW. The 700 kW overhead covers cooling (CRAC units, chilled water), networking switches, storage, and lighting. Annual energy = 7,700 kW * 8,760 hours = 67.5 GWh. Annual cost = 67.5M kWh * $0.05 = $3.37M. The cooling overhead alone costs $306K/year. At higher PUE (1.4 for average datacenter), overhead would be 2.8 MW and $1.2M/year.'
  common_mistake: |
    **The Pitfall:** Only counting GPU power and ignoring PUE overhead.
    **The Rationale:** Candidates often assume that because H100s draw the most power, the supporting facility infrastructure is negligible.
    **The Consequence:** Missing a 10% overhead means under-provisioning the power budget by 700 kW, leading to catastrophic facility trips and a $300K+ forecasting error.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 H100 GPUs at 700W TDP each
    - Facility PUE: 1.10
    - Electricity cost: $0.05/kWh

    **Calculations:**
    - GPU Power = 10,000 * 700W = 7,000 kW = 7 MW
    - Facility Power = 7 MW * 1.10 = 7.7 MW
    - Cooling Overhead = 7.7 MW - 7.0 MW = 700 kW
    - Annual Energy = 7,700 kW * 8,760 hours = 67.45 GWh
    - Annual Cost = 67.45M kWh * $0.05 = $3.37M/year

    **Conclusion & Interpretation:**
    - **Result: $3.37M/year (Power-Bound)**. Missing a 10% overhead means under-provisioning the power budget by 700 kW.
