title: 'Compute Density vs Power: Planning a 100 MW AI Campus'
scenario: You are architecting a 100 MW AI training campus that will house next-generation GPUs with 1000W TDP each. The campus must achieve PUE ≤ 1.08 and support 100 kW per rack. Compare three cooling architectures — rear-door heat exchangers, direct liquid cooling (cold plates), and single-phase immersion.
question: Which cooling architecture would you recommend for a 100 MW campus with PUE ≤ 1.08 and 100 kW/rack density, and why?
details:
  realistic_solution: 'At 1000W/GPU and 100 kW/rack, rear-door heat exchangers are eliminated. DLC (cold plates): PUE 1.03-1.06, handles 100+ kW/rack, GPU serviceable without system drain. Immersion: PUE 1.02-1.04, handles unlimited density, but GPU replacement requires fluid management. Recommendation: DLC cold plates. The 0.02 PUE gap vs immersion is ~$1M/year energy cost, but DLC''s serviceability advantage outweighs this.'
  common_mistake: |
    **The Pitfall:** Choosing immersion cooling strictly for the absolute lowest PUE without considering lifecycle serviceability.
    **The Rationale:** Immersion definitively achieves the lowest PUE (~1.03), making it look superior on spreadsheets.
    **The Consequence:** Maintenance windows for replacing failed GPUs expand from 5 minutes (DLC) to 30-60 minutes, drastically reducing overall cluster uptime and erasing energy savings.
  napkin_math: |
    1. **Assumptions & Constraints:** 100 MW IT load. PUE ≤ 1.08 limit. 100 kW/rack density.
    2. **Calculations:** Baseline overhead = 100 MW × 1.08 = 108 MW total. DLC (Cold Plates) at PUE 1.05 = 105 MW (Saves 3 MW = ~$1.6M/year over baseline). Immersion at PUE 1.03 = 103 MW (Saves 5 MW = ~$2.6M/year). Net energy difference between DLC and Immersion = 2 MW = ~$1M/year.
    3. **Conclusion & Interpretation:** **Result: DLC is optimal. Immersion's $1M/yr savings is negated by massive CapEx and severe downtime costs. Thermal-Bound.**
