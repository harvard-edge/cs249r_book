title: H100 TDP Management Under Sustained Training Load
scenario: An H100 SXM5 has 700W TDP. During distributed training of a 70B model, GPU power monitors show sustained 680W draw. The data center cooling system is rated for 40kW per rack (8 GPUs).
question: With 8 H100s drawing 680W each in a 40kW rack, how much thermal headroom remains and can you add a 9th GPU?
details:
  realistic_solution: '8 H100s: 8 × 680W = 5,440W. Supporting hardware: NVSwitch ~300W, CPUs ~1,200W, DRAM ~180W, NIC ~100W, NVMe ~50W, for 1,830W non-GPU power. Current rack draw is 5,440W + 1,830W = 7,270W. With a 40,000W rack cooling budget, remaining thermal headroom is 40,000W - 7,270W = 32,730W, or 32.73 kW. Adding a 9th H100 at 700W would bring the rack to about 7,970W under the same overhead assumptions, so it fits under the stated 40 kW limit.'
  common_mistake: |
    **The Pitfall:** Summing only GPU power when calculating rack thermal limits.
    **The Rationale:** The GPU is the most power-hungry component, so it's easy to forget the rest of the system.
    **The Consequence:** Failing to include NVLink switches, CPU/DRAM, networking, and storage power consumption leads to blown rack power budgets and tripped breakers in dense deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 H100 GPUs at 680W = 5,440W.
    - Supporting Hardware: NVSwitch (~300W) + CPUs (1200W) + DRAM (180W) + NIC (100W) + NVMe (50W) = 1,830W.

    **Calculations:**
    - Total Rack Power: 5,440W + 1,830W = 7,270W.
    - Rack Budget Utilization: 7,270W / 40,000W = 18.2%.
    - Remaining headroom: 40,000W - 7,270W = 32,730W = 32.73 kW.
    - Adding 9th GPU under the stated GPU-only increment: 7,270W + 700W = 7,970W.
    - Headroom after 9th GPU: 40,000W - 7,970W = 32,030W.

    **Conclusion & Interpretation:**
    - **Result: 32.73 kW headroom (Power-Bound)**. Yes, a 9th GPU fits within the 40kW rack limit under the given assumptions.
