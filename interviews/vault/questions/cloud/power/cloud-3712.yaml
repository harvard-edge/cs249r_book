title: H100 SXM Rack Power Budget for Training
scenario: An 8-GPU H100 SXM training server is placed in a rack with a simplified 40kW cooling budget. GPU monitors show sustained 680W per GPU during a 70B training run. Treat this as a rack-level budgeting exercise, not a physical slotting plan.
question: With 8 H100 SXM GPUs drawing 680W each in a 40kW budget, how much headroom remains for a hypothetical 9th GPU?
details:
  realistic_solution: 'For this simplified power-budget check, 8 H100 SXM GPUs draw 8 × 680W = 5,440W. Supporting hardware in the server or pod adds about 1,830W: NVSwitch ~300W, CPUs ~1,200W, DRAM ~180W, NIC ~100W, and NVMe ~50W. Current draw is 5,440W + 1,830W = 7,270W. Against a 40,000W rack cooling budget, remaining thermal headroom is 40,000W - 7,270W = 32,730W, or 32.73 kW. A hypothetical 9th H100 at 700W would bring the budgeted draw to about 7,970W, so it fits thermally under these assumptions. In a real rack, physical server configuration, power feeds, and slotting decide whether that GPU is deployable.'
  common_mistake: |
    **The Pitfall:** Summing only GPU power when calculating rack thermal limits.
    **The Rationale:** The GPU is the most power-hungry component, so it's easy to forget the rest of the system.
    **The Consequence:** Failing to include NVLink switches, CPU/DRAM, networking, and storage power consumption leads to blown rack power budgets and tripped breakers in dense deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Simplified rack-level budget, not a physical server slotting plan.
    - 8 H100 SXM GPUs at 680W = 5,440W.
    - Supporting Hardware: NVSwitch (~300W) + CPUs (1200W) + DRAM (180W) + NIC (100W) + NVMe (50W) = 1,830W.

    **Calculations:**
    - Total Rack Power: 5,440W + 1,830W = 7,270W.
    - Rack Budget Utilization: 7,270W / 40,000W = 18.2%.
    - Remaining headroom: 40,000W - 7,270W = 32,730W = 32.73 kW.
    - Adding a hypothetical 9th GPU under the stated GPU-only increment: 7,270W + 700W = 7,970W.
    - Headroom after 9th GPU: 40,000W - 7,970W = 32,030W.

    **Conclusion & Interpretation:**
    - **Result: 32.73 kW headroom (Power-Bound)**. A hypothetical 9th GPU fits within the simplified 40kW thermal budget, though real deployment also depends on full-server layout and rack power distribution.
