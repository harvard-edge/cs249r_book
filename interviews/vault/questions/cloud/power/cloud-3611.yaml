title: Power Capping Impact on Training Throughput for MI300X
scenario: A datacenter operator power-caps each MI300X at 600W to stay within cooling limits. A training team reports 20% throughput degradation. The operator claims only 20% power reduction (750→600W) so throughput loss should be equal.
question: Why can a 750 W to 600 W MI300X power cap cause a non-linear throughput loss, and what trade-off does it imply?
details:
  realistic_solution: At peak 750W, MI300X can hold higher core, memory, and fabric clocks. A 600W cap is an 0.8 power ratio; with a cube-law clock approximation, f≈0.8^(1/3)=0.928. Memory-bound phases may lose about 7% bandwidth, while compute/power-bound phases can lose closer to the full 20% because sustained boost headroom is removed. With a 50/50 memory-bound and compute-bound mix, throughput ≈0.5×0.928 + 0.5×0.80 = 0.864, or about a 14% loss. A measured 20% loss means the workload is more compute/power-limited than the simple 50/50 model, or the cap also lowers memory/fabric clocks enough to move the bottleneck. The trade-off is lower power and cooling load at the cost of non-linear performance loss.
  common_mistake: |
    **The Pitfall:** Assuming linear throughput-power scaling.
    **The Rationale:** Candidates often ignore that memory-bandwidth (not compute) is often the bottleneck, and clock frequencies scale sublinearly with power.
    **The Consequence:** Underestimating the performance impact of power capping on memory-bound ML workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power ratio: P = 600W / 750W = 0.8.
       - Workload mix for the estimate: 50% memory-bound and 50% compute/power-bound.
    2. **Calculations:**
       - Clock frequency f scales roughly with P^(1/3): f_ratio = 0.8^0.333 ≈ 0.928.
       - Bandwidth ratio ≈ f_ratio = 0.928.
       - Compute/power-bound throughput ratio is approximated by the available power ratio: 0.80.
       - Throughput = 0.5 * 0.928 + 0.5 * 0.80 = 0.864.
       - Expected drop under this mix is 1 - 0.864 = 13.6%.
    3. **Conclusion & Interpretation:**
       - **Result: Non-linear power-performance trade-off.** A 20% power cap can cause more than a simple bandwidth loss because compute headroom, memory bandwidth, and thermal limits interact; the observed 20% throughput drop implies the workload is closer to compute/power-bound than the 50/50 estimate or that the cap also reduces memory/fabric clocks.
