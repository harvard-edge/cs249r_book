title: 'Specification: Designing Rack Power Distribution for MI300X Dense Cluster'
scenario: You are specifying the rack power distribution architecture for a new 64-node MI300X cluster. Each MI300X node has 8 GPUs at peak 750 W/GPU (6 kW GPU TDP) plus 3 kW system overhead = 9 kW/node. The facility supports 40 kW per rack.
question: What rack layout, PDU configuration, circuits, and breaker sizing would you specify for the 64-node MI300X cluster with N+1 redundancy?
details:
  realistic_solution: |
    Use 16 racks with 4 MI300X nodes per rack. Each rack carries 4 * 9 kW = 36 kW for servers plus about 1.2 kW for top-of-rack networking and PDU/controller overhead, so the design load is 37.2 kW, under the 40 kW rack target. Feed every node with dual-cord A/B power and install two rack PDUs per rack. For N+1 at the rack power path, each A or B feed must be able to carry the full 37.2 kW if the other side fails; in normal operation each side carries about 18.6 kW. At 208 V three-phase, a 150 A feed provides about 54 kVA nameplate and about 43 kW usable at the 80% continuous-load limit, so specify one 150 A 3-phase breaker/feed for PDU A and one for PDU B per rack. Across 16 racks, that is 32 independent 150 A 3-phase circuits, with upstream distribution sized so a single feed/PDU failure does not drop the rack.
  common_mistake: |
    **The Pitfall:** Splitting 40 kW across two 20 kW A/B feeds and calling it redundant.
    **The Rationale:** In an N+1 rack power design, either side must be able to carry the rack's full critical load after a PDU, breaker, or upstream feed failure.
    **The Consequence:** A single feed failure overloads the surviving side and drops multiple MI300X nodes even though the design looked balanced during normal operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 MI300X nodes. 9 kW/node. 4 nodes/rack.
    - Add 1.2 kW per rack for networking and rack overhead.
    - Use 208 V three-phase, 150 A feeds, derated to 80% for continuous load.

    **Calculations:**
    - Racks required: 64 nodes / 4 nodes per rack = 16 racks.
    - Per-rack load: 4 * 9 kW + 1.2 kW = 37.2 kW.
    - Current per feed at full rack load: 37.2 kW / (sqrt(3) * 208 V) = about 103 A at unity power factor.
    - Usable continuous capacity of a 150 A 208 V 3-phase feed: sqrt(3) * 208 V * 150 A * 0.80 = about 43.2 kW.
    - Circuit count: 16 racks * 2 redundant feeds = 32 feeds.

    **Conclusion & Interpretation:**
    - **Result: 16 racks, each with dual 150 A 208 V 3-phase A/B feeds.** Each feed can carry the full 37.2 kW rack load under the 80% continuous-load rule, satisfying rack-level N+1 power-path redundancy.
