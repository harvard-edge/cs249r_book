title: Rack Power Density Limits with GPU-Dense Nodes
scenario: You are designing a new GPU training cluster using DGX nodes. Traditional datacenter racks support 10-15 kW per rack. Your facilities team says they can deliver 40 kW per rack with rear-door heat exchangers.
question: How many DGX nodes can you fit per rack, and what infrastructure changes are needed to reach 80 kW/rack density?
details:
  realistic_solution: |
    At 40 kW per rack and ~10.2 kW per DGX node, you can fit 3 nodes per rack (30.6 kW), leaving headroom for networking, PDUs, and cable management. Four nodes would be 40.8 kW before any overhead, so it is not a safe 40 kW design. Reaching 80 kW/rack supports about 7 DGX nodes once networking and power overhead are included; 8 nodes would be 81.6 kW before overhead and would require either lower per-node power, less overhead, or a higher rack power budget. The infrastructure change is Direct Liquid Cooling (DLC) with cold plates on GPUs and CPUs, upgraded PDUs or busbar distribution, higher-amperage circuits, facility water loops, and structural reinforcement.
  common_mistake: |
    **The Pitfall:** Ignoring networking switches, PDU losses, and cable management overhead per rack.
    **The Rationale:** Candidates often assume all rack power goes to compute, forgetting that high-speed NVLink switches and InfiniBand HCAs consume significant power.
    **The Consequence:** Tripping rack breakers in production and failing to provision adequate facility power.
  napkin_math: |
    **Assumptions & Constraints:**
    - DGX Node power: ~10.2 kW.
    - Target density: 40 kW/rack vs 80 kW/rack with DLC.
    - Cluster size: 1000 GPUs (125 nodes).

    **Calculations:**
    - 40 kW rack: 3 nodes (30.6 kW) + networking (~4.4 kW) = ~35 kW.
    - 80 kW rack: 7 nodes (71.4 kW) + networking/PDU overhead (~8.6 kW) = ~80 kW.
    - 8 nodes would be 8 * 10.2 kW = 81.6 kW before networking, so it does not fit inside an 80 kW rack under these assumptions.
    - If sizing the example 125-node cluster: 125 / 3 ≈ 42 racks at 40 kW vs 125 / 7 ≈ 18 racks at 80 kW.

    **Conclusion & Interpretation:**
    - **Result: 3 DGX nodes per 40 kW rack; about 7 per 80 kW rack with overhead**. Reaching 80 kW requires Direct Liquid Cooling (DLC), high-capacity power distribution, and facility upgrades.
