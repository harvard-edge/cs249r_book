title: 'Water Usage Effectiveness: The Hidden Cost of Evaporative Cooling'
scenario: A hyperscaler reports their datacenter has PUE of 1.1 and WUE (Water Usage Effectiveness) of 1.8 L/kWh. The facility draws 50 MW for its GPU training clusters.
question: How much water does this datacenter consume daily, and why is WUE becoming a critical metric for AI infrastructure?
details:
  realistic_solution: 'Daily water consumption = WUE × Total Power × Hours = 1.8 L/kWh × 50,000 kW × 24 h = 2.16 million liters/day (~571,000 gallons). This is equivalent to the daily water needs of ~18,000 average households. WUE matters because: (1) AI training is driving explosive growth in datacenter power, (2) many datacenters are in water-stressed regions (Arizona, Texas), (3) regulatory pressure is increasing, and (4) evaporative cooling is the cheapest way to achieve low PUE but creates water dependency. Alternatives: dry coolers (higher PUE ~1.2 but zero water), DLC (minimal evaporative needs), or locating in cold climates with free air cooling.'
  common_mistake: |
    **The Pitfall:** Thinking water use is negligible or only relevant for older systems.
    **The Rationale:** Candidates assume that low PUE implies overall efficiency, forgetting that many low PUE scores are achieved by literally boiling away millions of gallons of water in cooling towers.
    **The Consequence:** Ignoring the physical resource limits and political realities of building AI infrastructure in water-stressed regions.
  napkin_math: |
    **Assumptions & Constraints:**
    - WUE = 1.8 L/kWh.
    - Total Power = 50 MW (50,000 kW) running 24h.

    **Calculations:**
    - Daily water = 1.8 L/kWh * 50,000 kW * 24h = 2.16M liters/day.
    - Yearly water = 2.16M * 365 = 788M liters/year.

    **Conclusion & Interpretation:**
    - **Result: 2.16M liters/day consumed (Resource-Bound)**. Evaporative cooling incurs a massive hidden resource cost.
