title: Datacenter Architecture for H100-based AI Cluster with Carbon Efficiency Goals
scenario: Your company is designing a datacenter for a cluster exclusively utilizing H100 GPUs (700W TDP per GPU). You are tasked with architecting the infrastructure to meet a stringent Power Usage Effectiveness (PUE) of 1.1.
question: How would you design power, cooling, and carbon-aware scheduling for an H100 training cluster targeting PUE 1.1 over a 5-year lifecycle?
details:
  realistic_solution: A robust solution would involve high-voltage DC power distribution to maximize efficiency, potentially employing a multi-level power architecture. For cooling, direct-to-chip liquid cooling (e.g., cold plates) for the H100s is essential, integrated with a warm-water cooling loop and potentially dry coolers or cooling towers for heat rejection. Air cooling would be reserved for lower-density components, utilizing hot/cold aisle containment and rear-door heat exchangers. Carbon-aware scheduling would leverage real-time grid carbon intensity data, dynamically shifting workloads or adjusting training schedules to align with periods of high renewable energy availability or lower grid emissions, potentially across geographically dispersed datacenters. The embodied vs. operational carbon discussion would include a detailed lifecycle assessment (LCA) considering the energy required to manufacture and transport cooling infrastructure, servers, and building materials against the operational savings from high PUE and carbon-aware strategies, perhaps justifying a higher initial embodied carbon investment for significant operational carbon reduction.
  common_mistake: |
    **The Pitfall:** Focusing solely on the GPU's power draw and proposing generic air cooling.
    **The Rationale:** Neglecting the cumulative impact of other components (CPUs, networking) on rack power budgets.
    **The Consequence:** Designing an infrastructure that fails to meet the PUE 1.1 target and cannot physically dissipate the >30 kW per rack heat flux, leading to severe thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPUs: 32 per rack at 700W TDP.
       - Target PUE: 1.1.
    2. **Calculations:**
       - GPU Power: 32 * 700W = 22.4 kW.
       - CPU/Network Overhead: 22.4 kW * 1.25 = 28 kW IT power.
       - Facility Limit: 28 kW * 1.1 = 30.8 kW per rack.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Density-Bound.** Such extreme volumetric heat flux strictly necessitates direct-to-chip liquid cooling to obey the 1.1 PUE efficiency cap.
