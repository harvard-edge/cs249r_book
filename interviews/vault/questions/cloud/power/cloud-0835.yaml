title: The Carbon-Aware Scheduling Tradeoff
scenario: Your organization has committed to reducing the carbon footprint of ML training. A 1,000 GPU-hour training job at 700W per node-GPU slice consumes 700 kWh. Your two datacenter regions have grid carbon intensities of 400 gCO2/kWh (coal-heavy) and 50 gCO2/kWh (renewable-heavy). The renewable region has 20% less GPU capacity and 15% higher latency to your data lake.
question: Is carbon-aware scheduling to the renewable region worth the 20% capacity and 15% data-latency tradeoff for a 1,000 GPU-hour training job?
details:
  realistic_solution: 'Coal region: 700 kWh * 400 g/kWh = 280 kg CO2. Renewable region: 700 kWh * 50 g/kWh = 35 kg CO2. Carbon reduction = 87.5% (245 kg saved). The 20% capacity reduction means the job takes ~20% longer (1,200 GPU-hours effective), and data loading is 15% slower. For batch training, this adds a few hours to a multi-day job — negligible. For latency-sensitive inference, the tradeoff is harder to justify. The optimal strategy: route training and batch jobs to low-carbon regions, keep inference in the region closest to users.'
  common_mistake: |
    **The Pitfall:** Treating carbon reduction as a binary choice that always ruins performance.
    **The Rationale:** Candidates conflate the stringent latency requirements of real-time inference with the flexible, asynchronous nature of batch training jobs.
    **The Consequence:** Organizations miss out on 80-90% carbon emission reductions for batch workloads that could easily tolerate minor capacity/latency hits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy consumed: 1,000 GPU-hours * 700W = 700 kWh.
       - Coal region emissions: 400 gCO2/kWh.
       - Renewable region emissions: 50 gCO2/kWh.
    2. **Calculations:**
       - Coal region emissions: 700 kWh * 400 gCO2/kWh = 280,000 g (280 kg) CO2.
       - Renewable region emissions: 700 kWh * 50 gCO2/kWh = 35,000 g (35 kg) CO2.
       - Carbon reduction: 280 - 35 = 245 kg CO2 (87.5% reduction).
    3. **Conclusion & Interpretation:** **Result: Environment-Optimized.** An 87.5% CO2 reduction vastly outweighs a negligible 20% batch training runtime delay.
