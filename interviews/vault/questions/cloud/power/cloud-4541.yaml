title: MI300X DVFS Latency Penalty
scenario: A fleet of MI300X GPUs performs offline batch inference. To save power, the scheduler dynamically scales down the GPU core clocks during periods of low queue depth.
question: "Explain how reducing the GPU clock frequency via DVFS affects both the dynamic power consumption and the latency of individual inference requests."
details:
  realistic_solution: 'Dynamic power is proportional to voltage squared times frequency, so reducing the frequency quadratically reduces power consumption. However, lower frequency directly increases the execution time of compute-bound kernels, leading to higher latency for inference requests.'
  common_mistake: |
    **The Pitfall:** Assuming lowering frequency proportionally lowers power without affecting latency.
    **The Rationale:** Treating DVFS as a pure power-saving mechanism on memory-bound workloads.
    **The Consequence:** Missing SLAs because compute-bound kernels take significantly longer to execute at lower clocks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dynamic power is proportional to voltage squared times frequency: P ∝ V²f.
    - Lowering frequency quadratically reduces power.

    **Calculations:**
    - Lowering frequency linearly increases execution time for compute-bound operations.

    **Conclusion & Interpretation:**
    - **Result: Latency Increase (Compute-Bound)**. DVFS is effective for memory-bound ops but severely penalizes compute-bound latencies.
