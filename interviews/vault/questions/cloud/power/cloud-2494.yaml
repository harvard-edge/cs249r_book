title: Wildlife Collar FL Under a 36 J/day Budget
scenario: You are designing an FL system for wildlife tracking collars (2000mAh battery, 3.7V, 2-year lifespan). The cloud orchestrates FL to adapt behavior classification models. Satellite radio transmission costs 2W and takes 30s to send weights. Local Cortex-M4 compute costs 10mW. You have a strict 36 Joules/day energy budget.
question: How would you design the collar FL update policy to stay within the strict 36 Joules/day energy budget?
details:
  realistic_solution: Implement an energy-aware FL policy with a per-collar daily energy ledger. The cloud budgets local training and satellite upload separately, schedules local training only when the collar has enough reserved energy, and allows a satellite upload only when both the novelty signal is high and the amortized radio cost stays under the 36 J/day limit. Because one upload costs 60 J, the cloud must make uploads sparse, such as no more than one every 14 days per collar, while aggregating opportunistically from collars with high loss or unusual behavior.
  common_mistake: |
    **The Pitfall:** Running FL rounds on a strict daily calendar schedule.
    **The Rationale:** It is the standard way federated learning is scheduled in mobile environments with plentiful power.
    **The Consequence:** Blindly incurs massive radio energy costs even if the local model hasn't learned anything new, blowing past the energy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 36 Joules/day.
    - Transmission: 2W * 30s = 60 Joules.
    - Local training compute: 10mW * 60s = 0.6 Joules per training day.
    - Energy-ledger policy: reserve 0.6 J/day for local training and allow at most one 60 J satellite upload per 14-day window unless surplus harvested/battery energy is explicitly budgeted.

    **Calculations:**
    - Daily blind FL upload: 60 J radio + 0.6 J compute = 60.6 J/day, which exceeds the 36 J/day ledger.
    - Ledgered sparse upload: 0.6 J/day compute + (60 J / 14 days) amortized radio = 0.6 + 4.29 = 4.89 J/day.
    - Remaining daily budget for sensing and base operation: 36 - 4.89 = 31.11 J/day.

    **Conclusion & Interpretation:**
    - **Result: 4.89 Joules/day for the FL update ledger (Power-Bound).** The policy is to train locally only when the daily ledger has energy and upload only on high novelty with no more than one satellite transmission per 14 days under this budget.
