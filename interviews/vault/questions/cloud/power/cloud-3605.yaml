title: PUE Calculation for H100 Datacenter Power Budget
scenario: A datacenter runs 1000 H100 GPUs at 700W each. The facility draws 1.4MW of total power including cooling and infrastructure.
question: What is the PUE for 1000 H100s drawing 700 W each in a 1.4 MW facility, and what does it mean for useful compute cost?
details:
  realistic_solution: 'IT load = 1000 × 700W = 700kW. PUE = total facility power / IT power = 1400kW / 700kW = 2.0. This means for every watt of compute, 1 additional watt is spent on cooling/overhead. Hyperscale datacenters target PUE 1.1-1.2; PUE=2.0 is legacy/poor. Effective GPU compute cost: if electricity is $0.10/kWh, useful compute at PUE=2.0 costs twice as much per useful watt versus PUE=1.0.'
  common_mistake: |
    **The Pitfall:** Confusing the PUE formula (Total/IT) with IT/Total, or reporting a PUE < 1.0.
    **The Rationale:** Candidates often flip the ratio accidentally, misunderstanding that PUE represents overhead multiplier.
    **The Consequence:** They report physically impossible metrics, displaying a lack of familiarity with basic datacenter economics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1000 GPUs at 700 W each.
       - Facility total power: 1.4 MW.
       - Electricity cost: $0.10/kWh.
    2. **Calculations:**
       - IT Load: 1000 GPUs × 700 W = 700,000 W = 700 kW.
       - Total Facility Power: 1.4 MW = 1400 kW.
       - PUE Calculation: Total Power / IT Power = 1400 kW / 700 kW = 2.0.
       - Cost implication: At $0.10/kWh, the facility costs $140/hr total versus $70/hr for useful compute. Improving PUE to 1.2 would save $56/hr ($490k/year).
    3. **Conclusion & Interpretation:**
       - **Result: Overhead-Bound. The PUE is 2.0, meaning 50% of power is wasted on overhead.**
