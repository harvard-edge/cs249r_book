title: NVIDIA A100 LLM Inference Throughput Under Power Constraints
scenario: A research team is running an LLM inference workload on a fleet of GPUs. They report consistently high GPU utilization (~95-98%), but actual inference throughput is significantly lower than theoretical estimates and varies unexpectedly. The team suspects a software-level bottleneck.
question: How would you diagnose this issue and explain the behavior despite high utilization, considering power management concepts?
details:
  realistic_solution: The candidate should explain the importance of monitoring power consumption, GPU clock frequencies (SM and memory), and temperature using tools like `nvidia-smi`. They should discuss how the GPU's TDP is a hard power cap, and workloads exceeding this can trigger DVFS to lower clock speeds, thus reducing performance despite high utilization. Analysis would involve correlating power draw with clock frequencies and throughput. Solutions might include optimizing kernels for power efficiency, adjusting batch sizes to stay within power envelopes, or investigating if the power cap is set lower than the maximum TDP. The CMOS power equation (P ∝ CV²f) can be referenced to explain the relationship between voltage, frequency, and power, and how DVFS dynamically adjusts these.
  common_mistake: |
    **The Pitfall:** Exclusively focusing on GPU utilization metrics as the sole indicator of performance.
    **The Rationale:** Neglecting other critical hardware factors like power limits (TDP, power caps) and Dynamic Voltage and Frequency Scaling (DVFS) P-states.
    **The Consequence:** Misdiagnosing hardware power throttling as a software or kernel bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU is operating at high utilization (95-98%).
    - Observed power is near the configured cap while clocks are below nominal boost.
    - Throughput is proportional to effective sustained clock for the dominant kernels.

    **Calculations:**
    - Energy per inference = average board power * latency, so 300W * 10ms = 3 J/inference for an observed 10ms inference.
    - If telemetry shows power pinned at the cap and SM clocks reduced to 75% of expected boost, a compute-bound kernel can deliver roughly 75% of expected throughput despite high utilization.
    - Compare time-aligned power, SM/memory clocks, temperature, and tokens/sec; a throughput drop that follows downclocking indicates power or thermal throttling rather than idle hardware.

    **Conclusion & Interpretation:**
    - **Result: power or thermal throttling diagnosis, not a standalone theoretical QPS limit.** High utilization does not guarantee high performance if DVFS downclocks the GPU under a power cap or thermal limit.
