title: Minimizing Serving Cost per Token
scenario: You are migrating a high-throughput Mixtral inference service. To hit an SLA of 10,000 tokens/sec globally, you are choosing between instances with 8x A100s and 8x H100s. The datacenter charges a flat rate of $0.15/kWh for power, which is billed directly to your team.
question: Which instance strategy minimizes TCO per million Mixtral tokens for the 10,000 tok/sec SLA, A100 or H100?
details:
  realistic_solution: TCO per token should be compared using whole 8-GPU instances, because either instance type can satisfy the 10,000 tok/sec SLA by itself. One 8x A100 instance provides 12,000 tok/sec at $24/hr plus power, while one 8x H100 instance provides 30,000 tok/sec at $48/hr plus power. Including PUE-adjusted power, the A100 instance costs $24.576/hr and produces 43.2M tokens/hr, or $0.569 per million tokens. The H100 instance costs $49.008/hr and produces 108M tokens/hr, or $0.454 per million tokens. H100 therefore minimizes TCO per million tokens despite the higher hourly rental and power draw, as long as the service can keep the larger instance utilized with batching or colocated traffic.
  common_mistake: |
    **The Pitfall:** Looking only at the hourly compute rental cost.
    **The Rationale:** Comparing $24/hr to $48/hr makes the A100 seem like the obvious economical choice.
    **The Consequence:** The calculation completely neglects the cost of power and the massive throughput disparity, leading to a much higher cost per generated token.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 instance: $24/hr, 3.2kW IT power, 12,000 tok/sec.
       - H100 instance: $48/hr, 5.6kW IT power, 30,000 tok/sec.
       - Datacenter PUE: 1.2. Power cost: $0.15/kWh.
    2. **Calculations:**
       - Provisioning: both choices require one whole 8-GPU instance to satisfy the 10,000 tok/sec SLA.
       - A100 total cost: $24 + (3.2kW * 1.2 * $0.15) = $24.576/hr.
       - A100 throughput: 12,000 * 3600 = 43.2M tok/hr. Cost/1M: $24.576 / 43.2 = $0.569.
       - H100 total cost: $48 + (5.6kW * 1.2 * $0.15) = $49.008/hr.
       - H100 throughput: 30,000 * 3600 = 108M tok/hr. Cost/1M: $49.008 / 108 = $0.454.
    3. **Conclusion & Interpretation:**
       - **Result: TCO-Bound. H100 reduces serving cost per token by ~20%.**
