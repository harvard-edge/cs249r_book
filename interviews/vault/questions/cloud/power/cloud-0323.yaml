title: The Datacenter Cooling Tax (PUE)
scenario: 'Your team is deploying a new cluster in a state-of-the-art, liquid-cooled datacenter.'
question: "What is a realistic PUE value for such a facility, and what does it physically represent?"
details:
  realistic_solution: 'A realistic PUE for a modern, liquid-cooled AI datacenter is between 1.06 and 1.2. A value of ~1.1 is a good rule of thumb. This number represents the ratio of total facility power to the power delivered to the IT equipment. A PUE of 1.1 means that for every 1 Watt consumed by a GPU, an additional 0.1 Watts is consumed by the cooling infrastructure (pumps, chillers) and other overhead like power distribution losses.'
  common_mistake: |
    **The Pitfall:** Assuming PUE is 1.0 (no overhead) or clinging to legacy air-cooled values (1.5-2.0).
    **The Rationale:** Ignorance of the thermodynamic costs of moving heat, or relying on decade-old datacenter benchmarks.
    **The Consequence:** Radically miscalculating the grid draw, either under-provisioning substation power or over-budgeting electricity costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 GPUs at 700W each.
       - Target PUE of 1.1.
    2. **Calculations:**
       - IT Load: 10,000 GPUs × 700W = 7 MW.
       - Total Draw: 7 MW × 1.1 = 7.7 MW.
    3. **Conclusion & Interpretation:**
       **Result: Cooling Overhead. The additional 0.7 MW represents the "cooling tax" required to keep the cluster operational.**
  options:
  - PUE ≈ 2.0, meaning you need 1W of cooling for every 1W of compute.
  - PUE ≈ 1.1, meaning you need 0.1W of cooling for every 1W of compute.
  - PUE ≈ 1.0, meaning cooling is nearly free and consumes no extra power.
  - PUE ≈ 0.9, meaning the cooling system generates its own power.
