title: 'Thermal Throttling: When GPUs Self-Protect'
scenario: 'Your 8x MI300X training node shows inconsistent step times: most steps complete in 2.1 seconds, but every few minutes a step takes 3.5 seconds. nvidia-smi shows GPU temperatures cycling between 78°C and 91°C, with clock speeds dropping from 2100 MHz to 1500 MHz when temperatures spike.'
question: What causes the periodic step time increase to 3.5 seconds, and how do you resolve it?
details:
  realistic_solution: 'The MI300X is thermal throttling. When junction temperature exceeds ~90°C, the GPU firmware reduces clock speed to prevent damage, dropping from 2100 MHz to 1500 MHz. Root causes: insufficient airflow, dried TIM, high ambient temperature. Fixes: clean air filters, verify fan speeds, check coolant flow rates, reduce GPU power limit to 700W as a temporary measure.'
  common_mistake: |
    **The Pitfall:** Blaming the software stack (NCCL, dataloader) for intermittent slowdowns.
    **The Rationale:** Candidates often look for complex distributed system bugs without checking baseline hardware telemetry like temperature and clock frequencies.
    **The Consequence:** Wasting engineering time profiling code while the GPUs silently self-throttle to prevent physical damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal step time is 2.1s at 2100 MHz.
    - Throttled step time is 3.5s at 1500 MHz.
    - Temperature spikes to 91°C trigger the throttle.

    **Calculations:**
    - Compute clock reduction: (2100 - 1500) / 2100 = 28.6% reduction.
    - Expected compute slowdown time: 2.1s / (1500 / 2100) = 2.94s.
    - The actual 3.5s duration suggests high-bandwidth memory (HBM) is also being thermally throttled.

    **Conclusion & Interpretation:**
    - **Result: 3.5s (Thermal Throttling)**. The GPUs are thermal throttling; fixing airflow, repasting TIM, or limiting power will stabilize step times.
