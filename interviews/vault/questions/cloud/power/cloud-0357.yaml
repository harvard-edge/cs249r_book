title: The Over-provisioned AI Rack
scenario: 'You''ve been asked to review a new rack configuration. A junior engineer has installed 90 H100 GPUs into a single AI rack. The datacenter provider specifies that this rack has a maximum power and cooling capacity of 60 kW for the components. Assume performance scales linearly with power consumption.'
question: 'What happens to 90 H100s in a 60 kW rack, and what sustained performance fraction can they reach versus theoretical peak?'
details:
  realistic_solution: 'The configuration is severely over-provisioned. The GPUs will be automatically power-capped (throttled) by the PDUs to stay within the rack''s 60 kW limit. Calculate the achievable performance as the ratio of the rack''s physical power limit to the GPUs'' total theoretical demand.'
  common_mistake: |
    **The Pitfall:** Assuming you can run maximum theoretical workloads just because the GPUs physically fit in the rack.
    **The Rationale:** Engineers focus only on peak GPU TFLOPS and forget that datacenter racks have hard physical caps on power delivery and thermal dissipation.
    **The Consequence:** The cluster experiences automatic thermal throttling by PDUs, meaning the system never hits its expected peak ROI and jobs constantly underperform.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPUs: 90 H100s. Assumed TDP: ~700W/GPU.
       - Max Rack Power Capacity: 60 kW.
    2. **Calculations:**
       - Total Theoretical Demand: 90 × 700 W = 63,000 W = 63 kW.
       - The 63 kW demand exceeds the 60 kW rack limit.
       - Achievable Performance Fraction: 60 kW / 63 kW = 0.952.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound. The entire fleet of 90 GPUs will be automatically power-capped, forcing them to run at ~95% of their advertised performance.**
  options:
  - The rack will run at 100% performance because each individual GPU's 700W TDP is well below the 60 kW rack limit.
  - 85 of the GPUs will run at 100% and the remaining 5 will be cleanly shut down to exactly meet the 60 kW budget.
  - The rack is over-provisioned and will be throttled to ~95% of its peak performance.
  - The rack is severely over-provisioned and will only run at about 80% of its peak performance.
  correct_index: 2
