title: 'MI300X vs H100: Energy-per-Token at Scale for LLM Inference'
scenario: You are selecting the accelerator platform for a 100B-token-per-day LLM inference service comparing the MI300X and H100 SXM5. The service runs Llama-3 70B in FP16 (140 GiB model weight).
question: How should you compare MI300X and H100 energy per token for 100B tokens/day of Llama-3 70B FP16 inference?
details:
  realistic_solution: 'Do not estimate LLM serving throughput by dividing HBM bandwidth by model size. The defensible comparison is measured tokens/sec at the target sequence lengths, batch sizes, precision, KV-cache policy, and SLA, then energy/token = board power / delivered tokens/sec. MI300X has a structural advantage because the 140 GiB FP16 weights fit on one 192 GiB GPU, avoiding mandatory tensor parallelism for weights. H100 80 GiB requires at least TP2, which adds NVLink traffic for collectives and synchronization, plus duplicated or partitioned KV/activation state depending on the engine. With 750W for one MI300X and 1,400W for a TP2 H100 pair, MI300X is lower energy/token whenever its measured throughput is more than 750/1400 = 54% of the H100 pair. The 100B tokens/day requirement is a capacity-planning constraint: provision enough replicas using measured throughput, but do not let it replace the per-token energy measurement.'
  common_mistake: |
    **The Pitfall:** Evaluating only theoretical FLOPS/Watt and ignoring model sharding overhead.
    **The Rationale:** Candidates overlook that the 140 GiB model fits on a single MI300X but requires Tensor Parallelism across two H100s.
    **The Consequence:** Underestimating the power cost and communication overhead of multi-GPU sharding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: Llama-3 70B FP16 (140 GiB weights).
    - MI300X: 1 chip, 192 GiB HBM, about 750W board power.
    - H100: minimum TP2 for 140 GiB FP16 weights on 80 GiB GPUs, about 2 * 700W = 1,400W.
    - Compare measured serving throughput at the same SLA, batch, context length, and precision.

    **Calculations:**
    - Energy/token(MI300X) = 750W / measured_MI300X_tok_s.
    - Energy/token(H100 TP2) = 1,400W / measured_H100_pair_tok_s.
    - MI300X wins when 750 / T_MI < 1,400 / T_H100_pair.
    - Break-even: T_MI > (750 / 1,400) * T_H100_pair = 0.54 * T_H100_pair.
    - Required average throughput for the service: 100B tokens/day / 86,400s/day ≈ 1.16M tok/s across the fleet.

    **Conclusion & Interpretation:**
    - **Result: Measurement-Bound**. MI300X is likely favored if its single-GPU measured throughput is at least 54% of an H100 TP2 pair; the exact energy/token must come from benchmarked throughput, not model-size divided by HBM bandwidth.
