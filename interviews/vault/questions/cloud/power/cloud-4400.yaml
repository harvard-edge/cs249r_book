title: MI300X Unified Memory Architecture and Its Thermal Implications
scenario: The MI300X uses a unified memory architecture where CPU and GPU share the same 192GB HBM3 pool across 8 compute dies on a single package. During a production incident, a model serving process on MI300X unexpectedly causes memory bandwidth saturation at 5.1 TB/s—despite the workload previously running at 3.8 TB/s. The system power jumps from 680W to 740W.
question: Why did the MI300X serving process jump to 5.1 TB/s bandwidth and 740W, what are the thermal consequences, and what workload change caused it?
details:
  realistic_solution: 'Power delta: 740W - 680W = 60W additional. At an effective 1 pJ/bit for HBM transfers, the bandwidth increase from 3.8 TB/s to 5.1 TB/s accounts for about 10.4W of direct HBM transfer energy, so the full 60W system increase also reflects memory-controller activity, fabric activity, and less efficient execution while the workload becomes memory-bound. Workload change: likely a sequence length increase, such as from 2K to 16K context, triggering much larger KV-cache reads per token.'
  common_mistake: |
    **The Pitfall:** Assuming HBM bandwidth is free in terms of power.
    **The Rationale:** Engineers focus on compute TFLOPS as the primary power draw and ignore that pushing 5+ TB/s across a package requires immense energy.
    **The Consequence:** Near-peak memory bandwidth dramatically increases thermal load, which can throttle compute and cause unpredictable latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X HBM3 bandwidth: 5.3 TB/s max.
    - Effective HBM transfer energy: ~1 pJ/bit for a coarse direct-transfer estimate.
    - Base power 680W, jumped to 740W (delta: 60W).

    **Calculations:**
    - HBM transfer power at 5.1 TB/s: 5.1e12 bytes/s * 8 bits/byte * 1e-12 J/bit = 40.8W.
    - HBM transfer power at 3.8 TB/s: 3.8e12 bytes/s * 8 bits/byte * 1e-12 J/bit = 30.4W.
    - Direct HBM transfer delta: 40.8W - 30.4W = 10.4W.
    - System power delta: 740W - 680W = 60W, so the rest is memory-controller, fabric, and workload-efficiency overhead.
    - Workload inference: moving from 2K to 16K context makes KV-cache reads roughly 8x longer per decoded token, plausibly driving the observed jump toward the 5.3 TB/s bandwidth ceiling.

    **Conclusion & Interpretation:** Longer contexts likely triggered much larger KV-cache reads, pushing bandwidth to 5.1 TB/s. The incident is memory-bound, and the coarse pJ/bit calculation explains only part of the 60W system increase.
