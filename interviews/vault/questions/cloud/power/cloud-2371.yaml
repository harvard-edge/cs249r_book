title: AEC vs AOC for 800G Leaf Links
scenario: You are designing the physical layer for a 24,000 GPU cluster. The links from the GPU NICs to the Leaf switches operate at 800 Gbps (PAM4 modulation). The physical distance is between 1.5 and 2.5 meters. You must choose between Active Electrical Cables (AECs) and Active Optical Cables (AOCs) for these 24,000 links.
question: For 24,000 800Gbps 1.5-2.5m NIC-to-leaf links, should you use AECs or AOCs, and what are the power tradeoffs?
details:
  realistic_solution: |
    At 800 Gbps using PAM4 modulation, signal integrity degrades rapidly over copper. Passive Direct Attach Copper (DAC) cannot reliably span the 2.5m needed to reach the Top-of-Rack switch without unacceptable Bit Error Rates (BER).

    The choices are Active Electrical Cables (AEC) or Active Optical Cables (AOC). AECs use retimers (DSP chips) inside the cable heads to clean and amplify the electrical signal, extending copper reach to ~3 meters. AOCs convert the electrical signal to optical via transceivers.

    The Tradeoff: Power vs. Reach/Bulk. An 800G AOC consumes ~15W per end (30W per link). An 800G AEC consumes ~7W per end (14W per link). For 24,000 links, AOCs consume 720 kW of power, while AECs consume 336 kW. Saving ~380 kW is massive for data center power budgets (allowing more power for GPUs). Additionally, optical transceivers are more prone to thermal failure if rack temperatures spike. However, AECs are physically much thicker and heavier than fiber, creating cable routing and airflow blockage issues in dense racks. The optimal tradeoff for 2.5m is AEC to save power and thermal budget, provided the rack design can accommodate the cable bulk.
  common_mistake: |
    **The Pitfall:** Assuming passive copper (DAC) is always best for short ranges.
    **The Rationale:** Candidates rely on older networking heuristics, ignoring that at 800G PAM4, passive copper signal degradation limits reach to <1 meter.
    **The Consequence:** The specified cabling architecture physically cannot maintain the required Bit Error Rate (BER) to reach the Top-of-Rack switches.
  napkin_math: |
    - **Active Optical Cables (AOC):** ~30W per link (15W per end).
    - **Active Electrical Cables (AEC):** ~14W per link (7W per end).
    - **Power savings per link:** 30W - 14W = 16W.
    - **Total power savings:** 16W * 24,000 links = 384 kW.
    - **Conclusion: AECs save 384 kW, which provides enough reclaimed power to run hundreds of additional GPUs in a power-constrained datacenter.**
