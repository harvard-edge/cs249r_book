title: Flowlet Switching for AllReduce Load Balancing
scenario: A flowlet-based load balancing scheme reroutes traffic to less-congested
  paths during inter-packet gaps. Your MI300X cluster uses 400Gbps RoCE links with
  a typical AllReduce message size of 256MB. If the NIC sends at line rate, calculate
  the inter-packet gap for 4KB MTU packets and determine an appropriate flowlet timeout.
question: What is the inter-packet gap for 4KB packets at 400Gbps, and what flowlet
  timeout should you use for 256MB AllReduce messages?
details:
  realistic_solution: 'At 400Gbps line rate with 4KB MTU: packet serialization time
    = 4096 bytes × 8 bits / 400 Gbps = 81.92 ns per packet. With back-to-back transmission,
    inter-packet gap (IPG) is the minimum Ethernet gap of 12 bytes = 0.24 ns at 400G
    — effectively zero. So during a 256MB burst, there are no natural flowlet gaps.
    Flowlet switching works for AllReduce only at message boundaries: 256MB / 50 GB/s
    = 5.12 ms between AllReduce iterations. Set the flowlet timeout to ~200-500 µs,
    which is long enough to avoid reordering within a message but short enough to
    rebalance between AllReduce iterations. The switch detects the 5.12ms gap between
    messages and can choose a new path for the next message.'
  common_mistake: Confusing flowlet timeout with flow timeout. Flowlets are bursts
    within a flow separated by idle gaps. Setting the timeout too short causes packet
    reordering (different packets take different paths and arrive out of order); too
    long defeats the purpose of load balancing.
  napkin_math: '256MB at 400Gbps = 256 × 10^6 × 8 / 400 × 10^9 = 5.12ms per AllReduce
    message. Number of packets per message: 256MB / 4KB = 65,536 packets. Inter-packet
    gap at line rate: 4096 bytes × 8 / 400 Gbps = 81.9 ns — much smaller than the
    400 µs flowlet timeout. No flowlet switching occurs within the burst. Flowlet
    rebalancing happens at message boundaries (5.12ms gaps between AllReduce iterations).
    Set flowlet timeout to ~200-500 µs — shorter than the inter-message gap but longer
    than any intra-burst gap.'
