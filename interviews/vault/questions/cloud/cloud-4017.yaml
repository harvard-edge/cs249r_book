title: Flowlet Switching for AllReduce Load Balancing
scenario: 'A flowlet-based load balancing scheme reroutes traffic to less-congested paths during inter-packet gaps. Your MI300X cluster uses 400Gbps RoCE links with a typical AllReduce message size of 256MB.'
question: 'What is the inter-packet gap for 4KB packets at 400Gbps, and what flowlet timeout should you use for 256MB AllReduce messages?'
details:
  realistic_solution: |
    At 400Gbps line rate with 4KB MTU: packet serialization time = 4096 bytes × 8 bits / 400 Gbps = 81.92 ns per packet. With back-to-back transmission, inter-packet gap (IPG) is the minimum Ethernet gap of 12 bytes = 0.24 ns at 400G — effectively zero. So during a 256MB burst, there are no natural flowlet gaps. Flowlet switching works for AllReduce only at message boundaries: 256MB / 50 GB/s = 5.12 ms between AllReduce iterations. Set the flowlet timeout to ~200-500 µs, which is long enough to avoid reordering within a message but short enough to rebalance between AllReduce iterations. The switch detects the 5.12ms gap between messages and can choose a new path for the next message.
  common_mistake: |
    Confusing flowlet timeout with flow timeout. Flowlets are bursts within a flow separated by idle gaps. Setting the timeout too short causes packet reordering (different packets take different paths and arrive out of order); too long defeats the purpose of load balancing.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256MB AllReduce message size.
    - 400Gbps line rate.
    - 4KB MTU packets.

    **Calculations:**
    - Serialization time: 4096 bytes * 8 / 400 Gbps = 81.9 ns.
    - Message duration: 256MB * 8 / 400Gbps = 5.12 ms.
    - No inter-packet gaps > 81.9 ns within burst.
    - Inter-message gaps: 5.12 ms.

    **Conclusion & Interpretation:**
    - **Result: 81.9 ns (Bandwidth-Bound)**. Set flowlet timeout to ~200-500 µs (shorter than inter-message gap but longer than intra-burst gap).
