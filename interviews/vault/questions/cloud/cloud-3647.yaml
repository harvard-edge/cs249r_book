title: Flash Attention IO Complexity vs Standard Attention
scenario: A team is deciding whether to adopt Flash Attention for training a 7B model on A100 (80GB HBM2e, 2TB/s) with sequence length 8192. They want to understand the theoretical IO reduction before implementation. Standard attention stores the full N×N attention matrix.
question: What theoretical IO reduction should the team expect from Flash Attention versus standard attention at seq_len=8192 on A100?
details:
  realistic_solution: 'Flash Attention IO complexity is O(N^2 d / M) where M is SRAM size, vs O(N^2) for standard attention. For N=8192, d=128, and M=200KB: Flash Attention HBM reads = O(N^2 * d / M) = O(8192^2 * 128 / 200K) ≈ 43M elements vs standard O(N^2) = 67M for just the attention map. Measure with nvprof memory throughput metric.'
  common_mistake: |
    **The Pitfall:** Claiming Flash Attention is faster because it performs fewer FLOPs.
    **The Rationale:** Candidates equate "faster compute" with "less math," completely misunderstanding the memory-bound nature of standard attention.
    **The Consequence:** Failing to correctly identify memory IO (reads/writes to HBM) as the core bottleneck that tiling resolves, leading to fundamentally flawed performance tuning later.
  napkin_math: |
    - **Standard Attention HBM Usage:** `Q * K^T` write = `8192^2 * 2` bytes = 134 MB. Softmax read/write adds more. Total HBM traffic: ~256 MB per layer per head.
    - **Flash Attention HBM Usage:** Only reads Q, K, V (each `8192 * 128 * 2` = 2 MB) and writes output O (2 MB). Total HBM traffic: ~8 MB per layer per head.
    - **IO Reduction:** `256 MB / 8 MB` = **32x reduction in HBM traffic**.
    - **Time Comparison (per head):** At 2 TB/s bandwidth, Standard takes `256 MB / 2 TB/s` = 128 μs. Flash takes `8 MB / 2 TB/s` = **4 μs**.
