title: The Optimizer State Explosion
scenario: 'A junior engineer is fine-tuning a 7B model on a single A100 80 GB. They report: ''The model
  is only 14 GB in FP16, but training OOMs at batch_size=1. How can a 14 GB model not fit on an 80 GB
  GPU?'' Walk them through where the other 66 GB went.'
details:
  realistic_solution: 'The Adam optimizer stores *two additional copies* of every parameter: the first
    moment (mean of gradients, $m_t$) and the second moment (variance of gradients, $v_t$), both in FP32.
    Combined with the FP32 master copy of weights (needed for mixed-precision training), the optimizer
    state is the dominant memory consumer. The full breakdown: (1) FP16 model weights: 7B × 2 = **14 GB**;
    (2) FP32 master weights (for optimizer update): 7B × 4 = **28 GB**; (3) FP32 gradients: 7B × 4 = **28
    GB**; (4) FP32 Adam $m$: 7B × 4 = **28 GB**; (5) FP32 Adam $v$: 7B × 4 = **28 GB**. Total: **126 GB**
    — 1.6× the GPU''s memory, and we haven''t even counted activations. The 14 GB model "expands" to 126
    GB during training because the optimizer needs 16 bytes per parameter (FP16 weight + FP32 master +
    FP32 grad + FP32 m + FP32 v = 2 + 4 + 4 + 4 + 4 = 18 bytes, but the FP16 weight is a view of the FP32
    master, so effectively 16 bytes of *additional* state). Fix: use LoRA (only optimize ~0.1% of parameters),
    8-bit Adam (halves optimizer state), or gradient checkpointing + CPU offloading.'
  common_mistake: '"The model must be loading in FP32 — that''s 28 GB" or "The batch size is too large."
    Even FP32 weights are only 28 GB, and they said batch_size=1. The real memory consumer is invisible
    in `model.parameters()`.'
  napkin_math: '**Full fine-tuning memory:** FP16 weights: **14 GB**. FP32 master weights: **28 GB**.
    FP32 gradients: **28 GB**. Adam $m_t$ (FP32): **28 GB**. Adam $v_t$ (FP32): **28 GB**. Activations
    (batch=1, seq=2048, 32 layers): ~**4 GB**. CUDA workspace + fragmentation: ~**2 GB**. **Total: ~132
    GB** on an 80 GB GPU → **OOM**. **LoRA (rank=16) memory:** Trainable params: $2 \times 32 \times 2
    \times 4096 \times 16 = $ 8.4M (0.12% of 7B). LoRA optimizer state: 8.4M × 12 bytes = **101 MB**.
    Frozen FP16 weights: **14 GB**. Activations: **4 GB**. **Total: ~18.1 GB** — fits on 80 GB with room
    for batch_size=16. The optimizer state went from 84 GB to 101 MB — a **830× reduction**.'
