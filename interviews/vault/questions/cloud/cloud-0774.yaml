title: 3D Parallelism Sizing — Where the Adam OOM Lives
scenario: A 70B-parameter LLM is being fine-tuned with mixed-precision Adam on H100
  80 GB GPUs connected by NVLink intra-node and IB NDR inter-node. The team plans
  a 3D parallel layout but cannot agree on TP/PP sizing. Compute the per-GPU memory
  footprint and identify the minimum (TP * PP) that fits on 80 GB H100s, accounting
  for FP16 weights, FP16 gradients, FP32 master weights, FP32 Adam m, FP32 Adam v,
  and a 16 GB activation+workspace reservation. Then explain which dimension of the
  3D parallel layout shrinks each component.
question: For a 70B Adam-trained model on 80 GB H100s, what is the minimum (TP*PP)
  that fits, and which 3D-parallel axis shrinks each Adam memory component?
details:
  realistic_solution: 'Mixed-precision Adam stores 16 bytes per parameter total (FP16
    weight 2 + FP16 grad 2 + FP32 master 4 + FP32 m 4 + FP32 v 4). For 70B params
    that is 1120 GB of model state. With a 16 GB activation+workspace reservation
    per GPU, the per-GPU model-state budget is 64 GB. Minimum (TP * PP) = ceil(1120
    / 64) = 18 → choose TP=8 inside the NVLink island and PP=4 across nodes (TP*PP
    = 32, per-GPU model state = 35 GB). Each axis shrinks a *different* part of the
    state: PP shrinks every component proportionally by partitioning *layers* across
    stages; TP shrinks weights, grads, and (with ZeRO-1) optimizer state along the
    tensor dimension; DP alone does not shrink any of these — it only divides the
    global batch.'
  common_mistake: 'Sizing only by the FP16 weight count ("14 GB → 70B fits in 6 GPUs").
    Mixed-precision Adam costs 16 bytes per param, not 2. Other common errors: assuming
    DP shrinks per-GPU memory (it does not), or pushing TP across the IB boundary
    (every layer''s AllReduce stalls on the 25 GB/s inter-node link).'
  napkin_math: '**Per-parameter Adam state (mixed precision):** 2 (FP16 W) + 2 (FP16
    G) + 4 (FP32 W master) + 4 (FP32 m) + 4 (FP32 v) = 16 bytes. **70B model state:**
    70B * 16 = 1120 GB. **Per-GPU budget:** 80 - 16 (activations) = 64 GB. **Min (TP*PP):**
    ceil(1120 / 64) = 18 → choose 32 (TP=8, PP=4). **Per-GPU model state at TP=8,
    PP=4:** 1120 / 32 = 35 GB. **Activation budget remaining:** 80 - 35 = 45 GB. **DP:**
    can be added freely for throughput; per-GPU memory unchanged.'
