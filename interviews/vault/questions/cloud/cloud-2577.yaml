title: Cloud Deepspeed Zero L3 0
scenario: You want to train a 65B model with AdamW on 32 A100 80 GB GPUs. Calculate per-GPU memory for
  ZeRO Stages 1, 2, and 3, and determine which stage fits with 15 GB reserved for activations.
details:
  realistic_solution: '65B params. FP16 params: 130 GB. FP16 gradients: 130 GB. AdamW optimizer states
    (FP32 copy + m + v): 65B × 12B = 780 GB. Total: 1,040 GB. Budget per GPU: 80 - 15 = 65 GB. ZeRO-1
    (shard OS): 130 + 130 + 780/32 = 284.4 GB per GPU. No. ZeRO-2 (shard OS+G): 130 + (130+780)/32 = 130
    + 28.4 = 158.4 GB. No. ZeRO-3 (shard all): 1040/32 = 32.5 GB per GPU. Fits with 32.5 GB headroom!
    Alternative: ZeRO-2 + tensor parallelism (TP=4 within node): params/4 = 32.5 GB + 28.4 = 60.9 GB.
    Barely fits. ZeRO-3 is simpler and has more headroom.'
  common_mistake: Forgetting that ZeRO-2 still replicates full parameters on every GPU. For very large
    models, parameters alone (130 GB for 65B) exceed single-GPU memory, making ZeRO-3 or tensor parallelism
    mandatory.
  napkin_math: '65B: P=130 GB, G=130 GB, OS=780 GB. Total=1040 GB. ZeRO-1: 130+130+780/32=284 GB — no.
    ZeRO-2: 130+910/32=158 GB — no. ZeRO-3: 1040/32=32.5 GB — fits in 65 GB budget.'
