title: Will This Model Fit in GPU Memory?
scenario: 'You need to fine-tune a 13B parameter model with Adam optimizer in mixed precision on A100 GPUs. Weights in FP16, optimizer in FP32.'
question: "How much parameter-related memory is needed, and what is the minimum number of A100-80GB GPUs required ignoring activations?"
details:
  realistic_solution: 'Per-parameter memory in mixed-precision Adam: FP16 weights = 2B, FP16 gradients = 2B, FP32 master weights = 4B, FP32 momentum = 4B, FP32 variance = 4B. Total = 16 bytes/param. 13B × 16 = 208 GB for parameters alone. Each A100 has 80 GB. Minimum GPUs = ⌈208/80⌉ = 3 GPUs. But in practice, activations for a 13B model with reasonable batch size add 20-40 GB, and framework overhead takes 2-5 GB. So realistically you need 4 GPUs minimum with model parallelism (ZeRO Stage 3 or tensor parallelism) to shard optimizer states across devices.'
  common_mistake: |
    **The Pitfall:** Counting only the model weights in FP16 and concluding the model fits comfortably on a single GPU.
    **The Rationale:** Candidates forget that mixed-precision training requires massive auxiliary states: full-precision master weights, gradients, and the momentum/variance states of the Adam optimizer.
    **The Consequence:** Immediate Out-Of-Memory (OOM) errors during the first training step, forcing a complete halt and a frantic redesign of the parallelism strategy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 13 Billion parameters.
       - Hardware: NVIDIA A100 with 80GB HBM.
       - Mixed-precision Adam components: FP16 Weights (2B), FP16 Gradients (2B), FP32 Master Weights (4B), FP32 Momentum (4B), FP32 Variance (4B).
    2. **Calculations:**
       - Per-parameter memory = 2 + 2 + 4 + 4 + 4 = 16 bytes/param.
       - Total parameter state = 13 Billion × 16 bytes = 208 GB.
       - Minimum GPUs required (ignoring activations) = ceil(208 GB / 80 GB) = 3 GPUs.
       - Practical reality (adding activations and overhead) = 4 GPUs minimum.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound**. The optimizer state alone dwarves the weights. ZeRO Stage 3 or tensor parallelism across at least 4 GPUs is strictly required to accommodate the 208+ GB memory footprint.
