title: The TCO of an H100
scenario: Your manager is evaluating the cost of a new GPU cluster and asks for the 3-year Total Cost of Ownership (TCO) for a single NVIDIA H100 GPU. They see the upfront hardware cost is about $30,000 and assume that's the main expense. Assume the GPU runs 24/7 at its full 700W TDP, resides in a modern datacenter with a Power Usage Effectiveness (PUE) of 1.2, that electricity costs $0.10 per kWh, and annual maintenance is 5% of CapEx.
question: What is the approximate 3-year TCO for one H100, including $30k CapEx, 700W at PUE 1.2, $0.10/kWh power, and 5% maintenance?
details:
  realistic_solution: The TCO is the sum of the initial hardware cost (CapEx) plus all operational costs (OpEx) over its life. Here, OpEx includes annual maintenance and the total cost of electricity for both the GPU and the required cooling overhead, which is captured by the PUE metric.
  common_mistake: |
    **The Pitfall:** Underestimating operational expenditures (OpEx) and focusing only on the capital expenditure (CapEx).
    **The Rationale:** Engineers often treat hardware as a one-time purchase without factoring in the continuous power, cooling, and maintenance costs.
    **The Consequence:** Providing a misleading financial picture that significantly under-budgets the true cost of running a GPU cluster.
  napkin_math: |
    - CapEx: $30,000.
    - Power consumption: 700W * 1.2 PUE = 840W = 0.84kW.
    - Operational hours in 3 years: 24 * 365 * 3 = 26,280 hours.
    - Electricity cost: 0.84kW * 26,280h * $0.10/kWh = $2,207.52.
    - Maintenance: 5% of $30k = $1,500/yr * 3 = $4,500.
    - **Total TCO: $30,000 + $2,207.52 + $4,500 = $36,707.52.**
  options:
  - ~$32,200
  - ~$36,340
  - ~$36,700
  - ~$2,242,000
  correct_index: 2
