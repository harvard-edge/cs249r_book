title: TPU v5e Inference Load Balancing Basics
scenario: You are designing an inference serving system utilizing Google TPU v5e devices, each configured
  with 16 GB HBM, 197 TFLOPS BF16 compute, and 1.6 TB/s memory bandwidth. The system needs to efficiently
  handle a stream of incoming inference requests that may vary significantly in their computational demands.
details:
  realistic_solution: For basic distribution of inference traffic across a fleet of Google TPU v5e instances,
    two fundamental load balancing algorithms are Round Robin (for even distribution over time assuming
    uniform request weights) and Least Connections (to direct new requests to the TPU with the fewest
    active connections or outstanding requests, which can help balance instantaneous load).
  common_mistake: A common mistake in distributing inference traffic across homogeneous accelerators like
    Google TPU v5e is to solely rely on simple algorithms such as basic round-robin, without accounting
    for potential variations in request processing times or the instantaneous load on each accelerator,
    leading to suboptimal utilization and increased tail latencies.
  napkin_math: Consider a fleet of 10 Google TPU v5e devices. If each TPU can handle a baseline of 100
    inferences per second, a perfectly balanced system should process 1000 inferences/second. If a naive
    round-robin distributes requests and one request takes 10x longer than average, that single TPU will
    become a bottleneck, reducing the overall fleet's effective throughput far below 1000 inferences/second
    until the long-running request completes.
