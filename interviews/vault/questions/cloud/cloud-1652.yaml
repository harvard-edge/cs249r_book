title: 'Red Team LLM: Adversarial Payload Architecture'
scenario: 'Your red team is designing an ML pipeline to stress-test a WAF. You are using a 7B parameter LLM deployed on an 8-GPU cluster. You must evaluate two strategies to achieve a target throughput of 5,000 evasive payloads per second: Strategy A uses a local white-box surrogate model (requiring ~50 TFLOPs per payload). Strategy B uses a black-box Reinforcement Learning approach querying the live WAF API (rate limited to 10,000 req/sec).'
question: Which strategy can meet 5,000 evasive payloads/sec on the cluster, white-box surrogate or black-box RL, and why?
details:
  realistic_solution: Strategy A (White-box surrogate) is the only viable option. While a surrogate may have lower transferability to the live WAF, the compute-bound cluster can brute-force generation at massive scale, easily exceeding the 5k/sec target, whereas Strategy B is bottlenecked by the API rate limit.
  common_mistake: |
    **The Pitfall:** Selecting the black-box RL approach based on training accuracy vs throughput limitations.
    **The Rationale:** Candidates see that black-box directly targets the true distribution and assume accuracy overrides all hardware considerations.
    **The Consequence:** Completely failing to hit the mandated 5,000 payloads/sec target because the hard networking rate limits render it mathematically impossible.
  napkin_math: |
    1. Assumptions & Constraints: Target = 5,000 payloads/sec. Cluster compute ≈ 2,496 TFLOPS. Strategy A = 50 TFLOPs/payload. Strategy B Network Max = 10,000 req/sec. Assume 10 RL queries per successful payload.
    2. Calculations: Strategy A Throughput = 2,496 TFLOPS / 50 TFLOPs = 49,920 payloads/sec. Strategy B Throughput = 10,000 / 10 = 1,000 payloads/sec.
    3. Conclusion & Interpretation: **Result: Strategy B fails the 5,000/sec goal; only Strategy A succeeds. Bottleneck: Network Rate Limits.**
