title: 'Red Team LLM: Adversarial Payload Architecture'
scenario: Your red team is designing an offensive ML pipeline to stress-test a cloud-based ML Web Application Firewall (WAF). You are using a 7B parameter LLM deployed on an 8x A100 80GB cluster to generate evasive SQL injection payloads. You must evaluate two strategies to achieve a target throughput of 5,000 evasive payloads per second: Strategy A uses a local white-box surrogate model with gradient-based token substitution (requiring ~50 TFLOPs per generated payload). Strategy B uses a black-box Reinforcement Learning approach querying the live WAF API (average API latency is 50ms per query, rate limited to 10,000 req/sec).
question: Which strategy can meet 5,000 evasive payloads/sec on the 8x A100 cluster, white-box surrogate or black-box RL, and why?
details:
  realistic_solution: Strategy A (White-box surrogate) is the only viable option. While a surrogate may have lower transferability to the live WAF, the compute-bound cluster can brute-force generation at massive scale, easily exceeding the 5k/sec target, whereas Strategy B is bottlenecked by the API rate limit.
  common_mistake: |
    **The Pitfall:** Selecting the black-box RL approach based on training accuracy vs throughput limitations.
    **The Rationale:** Candidates see that black-box directly targets the true distribution and assume accuracy overrides all hardware considerations.
    **The Consequence:** Completely failing to hit the mandated 5,000 payloads/sec target because the hard networking rate limits render it mathematically impossible.
  napkin_math: |
    1. Strategy A Compute Max: 8 A100s * 312 TFLOPS (FP16) = ~2,496 TFLOPS.
    2. Strategy A Throughput: 2,496 TFLOPS / 50 TFLOPs/payload ≈ 50,000 payloads/sec (Passes goal).
    3. Strategy B Network Max: Rate limited to 10,000 req/sec.
    4. Strategy B Throughput: Assuming 10 iterations per successful payload, 10,000 / 10 = 1,000 payloads/sec.
    5. **Result: Strategy B fails the 5,000/sec goal; only Strategy A succeeds.**
