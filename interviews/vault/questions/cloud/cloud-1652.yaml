title: 'Red Team LLM: Adversarial Payload Architecture'
scenario: 'Your red team is designing an offensive ML pipeline to stress-test a cloud-based ML Web Application
  Firewall (WAF). You are using a 7B parameter LLM deployed on an 8x A100 80GB cluster to generate evasive
  SQL injection payloads. You must evaluate two strategies to achieve a target throughput of 5,000 evasive
  payloads per second: Strategy A uses a local white-box surrogate model with gradient-based token substitution
  (requiring ~50 TFLOPs per generated payload). Strategy B uses a black-box Reinforcement Learning approach
  querying the live WAF API (average API latency is 50ms per query, rate limited to 10,000 req/sec). Evaluate
  the architectural trade-offs and determine which strategy can meet the throughput requirement.'
details:
  realistic_solution: Strategy A (White-box surrogate) is the only viable option. While a surrogate may
    have lower transferability to the live WAF, the compute-bound cluster can brute-force generation at
    massive scale, easily exceeding the 5k/sec target, whereas Strategy B is bottlenecked by the API rate
    limit.
  common_mistake: Selecting the black-box RL approach because it trains directly against the target distribution,
    failing to calculate that network latency and strict API rate limits create a hard ceiling on generation
    throughput.
  napkin_math: 'Strategy A Compute Max: 8 A100s * 312 TFLOPS (FP16) = ~2,500 TFLOPS. 2,500 TFLOPS / 50
    TFLOPs/payload = 50,000 payloads/sec. Strategy B Network Max: 10,000 req/sec limit. If RL requires
    10 iterations per successful payload, maximum throughput is only 1,000 payloads/sec (failing the 5,000/sec
    goal).'
