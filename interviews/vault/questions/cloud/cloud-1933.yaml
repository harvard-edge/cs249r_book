title: VRAM Constraint Validation for Model Promotion
scenario: 'An NLP team is promoting a 7-billion parameter transformer model from the Evaluation stage to the Staging environment on AWS g4dn.xlarge instances equipped with NVIDIA T4 GPUs (16GB VRAM). The staging interface contract enforces a strict invariant: the model''s static memory footprint must leave exactly 4GB of VRAM available for runtime KV caching and dynamic batching overhead. The candidate model is currently in FP16 precision.'
question: "Does the FP16 7B model satisfy the T4 staging memory contract, and if not what minimal quantization bit-width passes?"
details:
  realistic_solution: 'Calculate the FP16 footprint: 7B params * 2 bytes = 14GB. The contract''s maximum allowed model size is 16GB - 4GB = 12GB. Since 14GB > 12GB, the model fails the invariant. Applying 8-bit weight quantization reduces the static footprint to 7B * 1 byte = 7GB, successfully passing the <12GB requirement without needing more aggressive 4-bit degradation.'
  common_mistake: |
    **The Pitfall:** Ignoring the explicit 4GB overhead invariant.
    **The Rationale:** Candidates quickly check if 14GB < 16GB VRAM and incorrectly approve the FP16 model without reserving the required 4GB for KV caching and dynamic batching.
    **The Consequence:** The model promotes successfully but OOMs in production when handling real user traffic.
  napkin_math: |
    - **Contract Maximum:** 16 GB - 4 GB = 12 GB.
    - **FP16 Size:** 7B params * 2 bytes = 14 GB.
    - **Check FP16:** 14 GB > 12 GB (Fails Contract).
    - **INT8 Size:** 7B params * 1 byte = 7 GB.
    - **Result:** **7 GB <= 12 GB. 8-bit quantization is the minimal degradation that passes the contract.**
