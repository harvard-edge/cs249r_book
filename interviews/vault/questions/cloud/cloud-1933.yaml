title: VRAM Constraint Validation for Model Promotion
scenario: 'An NLP team is promoting a 7-billion parameter transformer model from the Evaluation stage
  to the Staging environment on AWS g4dn.xlarge instances equipped with NVIDIA T4 GPUs (16GB VRAM). The
  staging interface contract enforces a strict invariant: the model''s static memory footprint must leave
  exactly 4GB of VRAM available for runtime KV caching and dynamic batching overhead. The candidate model
  is currently in FP16 precision. Calculate if the model satisfies the interface contract, and if not,
  apply the minimal quantization bit-width (from 8-bit or 4-bit options) needed to pass this invariant.'
question: "Does the FP16 7B model satisfy the T4 staging memory contract, and if not what minimal quantization bit-width passes?"
details:
  realistic_solution: 'Calculate the FP16 footprint: 7B params * 2 bytes = 14GB. The contract''s maximum
    allowed model size is 16GB - 4GB = 12GB. Since 14GB > 12GB, the model fails the invariant. Applying
    8-bit weight quantization reduces the static footprint to 7B * 1 byte = 7GB, successfully passing
    the <12GB requirement without needing more aggressive 4-bit degradation.'
  common_mistake: Candidates often ignore the explicitly stated 4GB overhead invariant and only verify
    if the raw model fits within the total 16GB VRAM limit, incorrectly approving the promotion since
    14GB < 16GB.
  napkin_math: FP16 Size = 7B * 2B = 14 GB. Allowed Memory = 16 GB - 4 GB = 12 GB. 14 GB > 12 GB (Fails
    Contract). INT8 Size = 7B * 1B = 7 GB <= 12 GB (Passes Contract).
