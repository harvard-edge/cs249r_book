title: 'MoE Inference Latency: The Expert Loading Problem'
scenario: You deploy Mixtral 8×7B on a single H100 (80 GB). In INT4 quantization, the model fits (46.7B
  × 0.5B = 23.4 GB). At batch size 1, each token activates 2 experts. Profiling shows decode latency is
  12ms/token vs 8ms/token for a dense 13B model at the same quantization. Both are memory-bandwidth bound.
  Explain the 50% latency gap.
question: "Using H100 HBM3 bandwidth, what is the dense 13B INT4 weight-read lower bound for batch-1 decode latency?"
details:
  realistic_solution: 'H100 HBM3 bandwidth: 3.35 TB/s (not A100''s 2.0 TB/s). Dense 13B INT4 base time:
    6.5GB/3.35TB/s = 1.94ms (not 3.25ms).'
  common_mistake: Thinking the MoE router computation adds significant latency. The router is a tiny linear
    layer (hidden_dim → num_experts) that takes microseconds. The issue is purely memory bandwidth.
  napkin_math: 'Dense 13B INT4 model weight load: 13B × 0.5B/param = 6.5GB. H100 HBM3 bandwidth: 3.35
    TB/s. Base decode time: 6.5GB / 3.35TB/s = 6.5 / 3350 = 0.00194s = 1.94ms (not 3.25ms which uses 2.0
    TB/s A100 bandwidth: 6.5/2000 = 3.25ms). The question uses H100 (3.35 TB/s) not A100 (2.0 TB/s).'
