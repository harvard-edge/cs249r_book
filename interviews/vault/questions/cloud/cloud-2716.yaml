title: Fleet Refresh Timing
scenario: Your 2,000-GPU cluster is 3 years old. Failure rate has doubled in the last quarter, suggesting entry into the wear-out phase. Options: (A) replace the full fleet now at $50M, (B) replace only failed units reactively, (C) replace in rolling batches of 500 over 12 months.
question: For a 3-year-old 2,000-GPU cluster entering wear-out, should you replace the fleet now, replace failures reactively, or roll replacements?
details:
  realistic_solution: 'The doubled failure rate signals wear-out onset; it will only accelerate. (A) Full replacement ($50M upfront) gives a clean fleet but requires massive capital and a significant migration period where capacity drops. (B) Reactive replacement seems cheap but is the worst option: wear-out failures accelerate exponentially, each failure disrupts training (lost GPU-hours worth $3-10K each), and you end up replacing the same number of GPUs anyway — just with maximum disruption. (C) Rolling replacement is the best trade-off: replace the oldest/most-failing 500 first, keeping 75% capacity online. The new GPUs go through burn-in while old ones still run. Over 12 months, you spread the $50M capex and maintain continuous training capacity. This also lets you adopt newer GPU generations in later batches.'
  common_mistake: |
    **The Pitfall:** Waiting too long and replacing reactively.
    **The Rationale:** "If it ain't completely broke, don't fix it" seems like the most cost-effective capital allocation strategy.
    **The Consequence:** Wear-out failures accelerate exponentially, meaning reactive replacement causes constant, escalating disruption and cascading training failures.
  napkin_math: |
    - **Failure Acceleration:** Assuming 5% → 10% → 20% quarterly failure rates as wear-out begins.
    - **Reactive Cost:** At 20%, 400 GPUs fail per quarter. Each failure disrupts training and loses $3K-$10K in GPU-hours.
    - **Conclusion:** **Rolling 500 GPUs/quarter (Option C)** maintains 75% uptime, spreads the $50M Capex, and allows safe burn-in of new hardware while mitigating catastrophic multi-node failures.
