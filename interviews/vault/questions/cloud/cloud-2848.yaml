title: Pipeline Bubble Fraction with M=4 Micro-batches
scenario: >-
  A 4-stage GPipe-style pipeline trains a large model with M = 4 micro-batches.
  Each stage runs forward then backward in unit time. The Gantt shows two
  bubble regions on each GPU: a warm-up region at the start (idle while the
  upstream stages prime the pipeline) and a cool-down region at the end
  (idle while downstream stages drain). The bubble fraction is annotated.
question: "Using the diagram, compute the bubble fraction for this pipeline configuration, and explain how doubling the micro-batch count to M = 8 changes it without changing the number of stages."
visual:
  kind: matplotlib
  source: cloud-2848.py
  rendered: cloud-2848.svg
  alt: >-
    Pipeline Gantt chart showing 4 GPUs across the y-axis and time along the
    x-axis. Each GPU has 4 forward (blue) and 4 backward (green) cells. A
    warm-up bubble (red shading) sits at the start of GPU 1, GPU 2, GPU 3
    and grows in length down the pipeline; a cool-down bubble mirrors it at
    the end. Annotation reads bubble fraction equals (P minus 1) over (P
    minus 1 plus M) for P equals 4 and M equals 4.
  caption: GPipe-style pipeline schedule, P = 4 stages × M = 4 micro-batches.
details:
  realistic_solution: >-
    GPipe bubble fraction = (P − 1) / (P − 1 + M). For P = 4, M = 4: (3) /
    (3 + 4) = 3/7 ≈ 0.43 (43% of each GPU's wall-clock is bubble). Doubling
    micro-batches to M = 8 without changing P gives (3) / (3 + 8) = 3/11 ≈
    0.27 — bubble drops from 43% to 27% with no extra hardware. The
    intuition: warm-up and cool-down each consume P − 1 stage-time slots,
    independent of M; steady-state takes M stage-time slots. Adding more
    micro-batches grows the steady-state denominator while leaving the
    bubble numerator fixed. Practical limits: M is bounded by per-stage
    activation memory (each in-flight micro-batch holds its activations
    until backward), so M cannot grow without also growing memory.
  common_mistake: >-
    Treating the bubble as a fraction of total stages (P) instead of total
    pipeline depth (P − 1 + M). Or: assuming 1F1B (one-forward-one-backward)
    eliminates the bubble entirely — it does not. 1F1B reduces *peak
    activation memory* but the bubble fraction is the same as GPipe for the
    same (P, M).
  napkin_math: >-
    Bubble fraction = (P − 1)/(P − 1 + M).
    P = 4, M = 4 → 3/7 ≈ 0.43.
    P = 4, M = 8 → 3/11 ≈ 0.27.
    P = 4, M = 32 → 3/35 ≈ 0.09.
