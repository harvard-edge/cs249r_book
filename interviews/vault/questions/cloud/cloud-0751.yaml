title: The Straggler Problem
scenario: In a distributed training cluster, 99 of our 100 nodes finish their backward pass in 500ms. Node 42 takes 800ms.
question: What is the total step time for the cluster, and what percentage of cluster compute is wasted due to this single node?
details:
  realistic_solution: 800ms. Synchronous SGD requires a global barrier (AllReduce) to synchronize gradients before the optimizer step. The entire cluster moves at the speed of the slowest node. You must implement observability to detect if Node 42 is thermal throttling or experiencing unbalanced data loads.
  common_mistake: |
    **The Pitfall:** Calculating the average step time (505ms) instead of identifying the bottleneck.
    **The Rationale:** Candidates forget that synchronous SGD requires a global barrier (AllReduce) where all nodes must wait.
    **The Consequence:** Masking massive cluster inefficiency by incorrectly reporting a healthy average speed.
  napkin_math: |
    - **Useful Compute:** 100 nodes × 500ms = 50 seconds of compute per step.
    - **Actual Wall Time:** 800ms (dictated entirely by the slowest straggler).
    - **Efficiency:** 500ms / 800ms = 62.5%.
    - **Result:** That single straggler wastes **37.5% of the entire fleet's compute budget** every step.
