title: The Straggler Problem
scenario: 99 of our 100 nodes finish their backward pass in 500ms. Node 42 takes 800ms. What is the total
  step time for the cluster?
question: "What is the total step time for the cluster?"
details:
  realistic_solution: 800ms. Synchronous SGD requires a global barrier (AllReduce) to synchronize gradients
    before the optimizer step. The entire cluster moves at the speed of the slowest node (the straggler).
    You must implement robust observability to detect if Node 42 is thermal throttling, experiencing a
    slow PCIe lane, or if the data shard lengths are unbalanced.
  common_mistake: '"About 500ms on average" or "505ms accounting for the outlier." Averaging is wrong
    here.'
  napkin_math: 100 nodes × 500ms = 50 seconds of useful compute per step. Actual wall time = 800ms. Cluster
    efficiency = $500/800 = 62.5\%$. That one straggler is wasting 37.5% of your entire fleet's compute
    budget every single step.
