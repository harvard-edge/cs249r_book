title: MoE Tiered Caching
scenario: You are designing a custom MoE serving engine for a massive cluster of H100
  SXM GPUs. The model's weights vastly exceed a single node's 80GB HBM3 capacity.
question: Propose a tiered caching strategy that minimizes tail latency for expert
  retrieval while adhering to the 3.35 TB/s HBM bandwidth and PCIe Gen5 limits.
details:
  realistic_solution: 'Design a two-level scheme: cache the most frequently accessed
    experts in local HBM3 at 3.35 TB/s and stream cold experts from CPU RAM over PCIe.
    Use token routing to group requests by expert, prefetching weights dynamically
    to mask the host-to-device transfer latency.'
  common_mistake: Focusing only on static partitioning without accounting for dynamic
    token routing and expert popularity skew.
  napkin_math: T_transfer = Size / 128 GB/s
