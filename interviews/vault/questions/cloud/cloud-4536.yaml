title: MoE Tiered Caching
scenario: 'You are designing a custom MoE serving engine for a massive cluster of H100 SXM GPUs. The model''s weights vastly exceed a single node''s 80GB HBM3 capacity.'
question: "Propose a tiered caching strategy that minimizes tail latency for expert retrieval while adhering to the 3.35 TB/s HBM bandwidth and PCIe Gen5 limits."
details:
  realistic_solution: 'Design a two-level scheme: cache the most frequently accessed experts in local HBM3 at 3.35 TB/s and stream cold experts from CPU RAM over PCIe. Use token routing to group requests by expert, prefetching weights dynamically to mask the host-to-device transfer latency.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on static partitioning of experts across GPUs.
    **The Rationale:** It's the simplest way to fit the model in memory.
    **The Consequence:** Ignoring dynamic token routing and expert popularity skew leads to massive network congestion for hot experts while cold experts sit idle in VRAM.
  napkin_math: |
    1. **PCIe Gen5 Bandwidth:** PCIe Gen5 x16 provides ~128 GB/s bidirectional.
    2. **Transfer Time:** Streaming a 5 GB cold expert from CPU RAM takes 5 GB / 128 GB/s ≈ **39 ms**.
    3. **HBM3 Bandwidth:** Local HBM3 provides 3.35 TB/s, taking only 5 GB / 3.35 TB/s ≈ **1.5 ms**.
