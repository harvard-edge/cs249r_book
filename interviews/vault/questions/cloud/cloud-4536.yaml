title: MoE Tiered Caching
scenario: 'You are designing a custom MoE serving engine for a massive cluster of GPUs. The model''s weights vastly exceed a single node''s VRAM capacity.'
question: 'Propose a tiered caching strategy that minimizes tail latency for expert retrieval while adhering to HBM bandwidth and PCIe Gen5 limits.'
details:
  realistic_solution: 'Design a two-level scheme: cache the most frequently accessed experts in local HBM3 and stream cold experts from CPU RAM over PCIe. Use token routing to group requests by expert, prefetching weights dynamically to mask the host-to-device transfer latency.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on static partitioning of experts across GPUs.
    **The Rationale:** It is the simplest way to fit the model in memory.
    **The Consequence:** Ignoring dynamic token routing and expert popularity skew leads to massive network congestion for hot experts while cold experts sit idle in VRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - PCIe Gen5 x16 Bandwidth: ~128 GB/s bidirectional.
       - HBM3 Bandwidth: 3.35 TB/s.
       - Cold Expert Size: 5 GB.
    2. **Calculations:**
       - PCIe Transfer Time: Streaming a 5 GB cold expert from CPU RAM takes 5 GB / 128 GB/s ≈ 39 ms.
       - HBM3 Transfer Time: Local HBM3 takes 5 GB / 3.35 TB/s ≈ 1.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound. PCIe transfers add ~39 ms of tail latency per token for cold experts.**
