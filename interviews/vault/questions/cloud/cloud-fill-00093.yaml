title: Optimizing Large Language Model Inference on Google TPU v5e with Systolic Arrays
scenario: Your team is tasked with deploying a large Transformer-based language model (e.g., 20 billion
  parameters, BF16 precision for weights and activations) for real-time inference on a Google TPU v5e.
  The model's primary bottleneck is the matrix multiplication operations in the self-attention and feed-forward
  layers. Given the TPU v5e's specifications (16 GB HBM, 197 TFLOPS BF16 peak compute, 1.6 TB/s HBM bandwidth),
  describe how you would design the dataflow and tiling strategy for the dominant matrix multiplication
  operations to maximize throughput while minimizing HBM access. Specifically, discuss the trade-offs
  between weight-stationary and output-stationary dataflows for this scenario, and propose a tiling scheme
  to effectively utilize the systolic array and memory hierarchy.
details:
  realistic_solution: 'A realistic solution would involve analyzing the dimensions of the matrix multiplications,
    the model''s memory footprint, and the TPU''s HBM capacity. For a large language model, weight-stationary
    dataflow is often preferred due to the reusability of weights across multiple activations, especially
    for batch inference or sequence processing where the same weights are applied to different input elements.
    The solution should detail a tiling strategy:

    1.  **Spatial Tiling:** Partitioning the large matrices into smaller blocks that fit within the systolic
    array''s dimensions and on-chip memory.

    2.  **Temporal Tiling:** Iteratively processing these blocks, ensuring data (activations, partial
    sums) are reused in on-chip buffers as much as possible before going back to HBM.

    3.  **Data Placement:** Strategically placing weights and activations in HBM and on-chip caches to
    minimize external memory transfers, utilizing the 1.6 TB/s bandwidth efficiently but not exhaustively.

    The solution should articulate how these choices lead to high utilization of the 197 TFLOPS BF16 compute
    and minimize stalls due to HBM bandwidth limitations.'
  common_mistake: A common mistake is a superficial understanding of TPU memory hierarchy and dataflow.
    Candidates might suggest a simple partitioning without considering the actual data reuse patterns
    on a systolic array, leading to suboptimal HBM access. Another mistake is not quantifying the impact
    of data movement vs. computation, or failing to choose the dataflow (weight-stationary vs. output-stationary)
    that best aligns with the model's characteristics and TPU's design, assuming one is universally superior.
  napkin_math: '1.  **Model Size:** 20B parameters (BF16 = 2 bytes/param) = 40 GB. This immediately highlights
    that the full model cannot reside in the TPU v5e''s 16 GB HBM, necessitating careful memory management
    and potentially offloading or layer-wise loading.

    2.  **Peak Compute:** 197 TFLOPS BF16. One multiply-accumulate (MAC) operation is typically 2 FLOPs
    (multiply + add). So, ~98.5 trillion MACs/second.

    3.  **HBM Bandwidth:** 1.6 TB/s = 1600 GB/s.

    4.  **Compute to Bandwidth Ratio (Operational Intensity):** To sustain 197 TFLOPS (BF16), if each
    MAC needs 2 input operands, and each operand is 2 bytes (BF16), then 197e12 FLOPs / (2 FLOPs/MAC *
    2 bytes/operand) = 49.25 TB/s of data movement *if data is fetched from HBM for every operation*.
    This vastly exceeds 1.6 TB/s, indicating the critical importance of data reuse on-chip via systolic
    arrays and stationary dataflows to achieve high compute utilization. The goal is to maximize the effective
    MACs/byte transferred from HBM.'
