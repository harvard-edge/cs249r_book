title: Optimizing Large Language Model Training with Mixed Precision on AMD MI300X
scenario: Your team is tasked with training a large language model (LLM) with billions of parameters, targeting high throughput and efficiency on a cluster of AMD MI300X accelerators. Each MI300X features 192 GB HBM3 memory, 1,307 TFLOPS FP16 dense compute, and 5.3 TB/s memory bandwidth. The model's initial training uses FP32, but you observe memory bottlenecks and suboptimal training speed.
question: What mixed-precision training strategy would you use on MI300X for this FP32 LLM, and how would you manage stability and accuracy tradeoffs?
details:
  realistic_solution: Implement a multi-stage mixed-precision training recipe. Initially, use BF16 for its wider dynamic range, which offers better stability than FP16 during early training, particularly for activations and gradients. Transition to FP16 with dynamic loss scaling for compute-intensive operations (like large matrix multiplications in transformer layers) to fully leverage the MI300X's 1,307 TFLOPS FP16 dense compute and memory bandwidth. Carefully consider FP8 for specific, less sensitive layers or during fine-tuning, with rigorous validation of accuracy. Utilize framework features (e.g., PyTorch's `autocast` and `GradScaler` or TensorFlow's `MixedPrecision` policy) and AMD's ROCm libraries for optimized mixed-precision kernels. Profile memory usage, compute utilization, and I/O bandwidth to identify bottlenecks and fine-tune the strategy.
  common_mistake: |
    **The Pitfall:** Neglecting dynamic loss scaling when switching to FP16.
    **The Rationale:** Candidates assume standard precision downcasting just works, failing to realize that small gradients will underflow to zero in FP16.
    **The Consequence:** Early training instability and model divergence.
  napkin_math: |
    - **FP32 Memory:** 100B params * 4 bytes = 400 GB (Exceeds 192 GB HBM3 of single MI300X).
    - **FP16 Memory:** 100B params * 2 bytes = 200 GB.
    - **Result:** **Switching to FP16/BF16 immediately halves the memory footprint, enabling larger batch sizes and maximizing the 1,307 TFLOPS FP16 compute.**
