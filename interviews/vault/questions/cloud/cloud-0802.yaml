title: The Silent Schema Shift
scenario: You oversee a critical ML pipeline processing petabytes of data daily, feeding hundreds of downstream models. Last quarter, an upstream team made a minor, uncommunicated schema change in their raw data source (e.g., made a non-nullable column nullable). It silently propagated through your pipeline, causing widespread model degradation for weeks before detection.
question: How would you prevent silent schema shifts in a petabyte-scale ML pipeline from degrading downstream models?
details:
  realistic_solution: |
    Establish formal, machine-readable data contracts for all critical assets. Implement automated schema validation checks at every major data ingress point using tools like Great Expectations. Define explicit schema evolution strategies, integrate with a data lineage system to identify affected downstream models, and set up automated alerting and rollback mechanisms for contract-breaking changes.
  common_mistake: |
    **The Pitfall:** Relying solely on unit tests in the data processing code.
    **The Rationale:** Unit tests catch issues within transformation logic but miss changes to the source data's inherent properties.
    **The Consequence:** Silent data corruption propagates to downstream models causing significant performance drops.
  napkin_math: |
    - Validating schema metadata takes milliseconds.
    - Sampling 10,000 rows (e.g., 10MB) takes seconds.
    - Processing partitions independently on a 100-node cluster scales the validation.
    - **Validating 100,000 partitions (100GB each) completes in minutes.**
