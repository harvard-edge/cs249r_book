title: Load Balancing Algorithms and Tail Latency
scenario: Your MI300X inference cluster uses round-robin load balancing across 16 replicas. P50 latency is 60ms but P99 spikes to 900ms. You discover that some requests are 10× longer than others due to variable output sequence lengths.
question: Why does round-robin fail here, and what load-balancing strategy would you use instead?
details:
  realistic_solution: 'Round-robin assigns by count, not by load. When request durations vary 10×, a replica may receive 3 long-generation requests back-to-back, each occupying 500ms, while other replicas finish short requests in 50ms. Switch to least-loaded or join-shortest-queue (JSQ) balancing: route each new request to the replica with the fewest in-flight tokens. Better still, use a token-aware scheduler like Orca''s iteration-level scheduling, which preempts long requests to interleave short ones. With JSQ on MI300X: P99 drops from 900ms to ~200ms because no replica accumulates disproportionate load.'
  common_mistake: |
    **The Pitfall:** Sticking with round-robin because it seems "fair."
    **The Rationale:** Treating all ML inference requests as having uniform cost, typical of traditional microservices.
    **The Consequence:** Round-robin stacks multiple long-generation requests on the same replica while others sit idle, causing severe head-of-line blocking and massive P99 latency spikes.
  napkin_math: |
    - **Round-Robin Worst Case**: 3 long requests (500ms each) get queued on a single replica.
    - **Queue Delay**: The third request waits 1000ms just to start, resulting in >1500ms total latency.
    - **JSQ (Join-Shortest-Queue)**: Distributes load based on in-flight tokens. Max queue depth is ~1.
    - **Iteration-Level Scheduling**: Chunks long requests into 50ms iterations.
    - **Result**: With JSQ or iteration preemption, P99 drops from 900ms down to **~120-200ms**, as no replica accumulates disproportionate load.
