title: The H100 Ridge Point
scenario: You are analyzing a roofline plot for an NVIDIA GPU to determine the boundary between memory-bound and compute-bound workloads.
question: "On a roofline plot for an NVIDIA H100 GPU, what does the 'ridge point' represent, and what is its approximate value for FP16 operations?"
details:
  realistic_solution: The ridge point is the minimum arithmetic intensity required to achieve peak computational performance. Below it, workloads are memory-bound. For an H100 in FP16, it is approximately 295 FLOPs/Byte.
  common_mistake: |
    **The Pitfall:** Confusing the ridge point with peak computational performance or memory bandwidth.
    **The Rationale:** Treating it as just another standalone performance metric rather than the critical ratio governing bottlenecks.
    **The Consequence:** Misidentifying whether a model is bottlenecked by memory or compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak FP16 Tensor Core throughput: 989 TFLOPS.
       - HBM3 memory bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Ridge Point = 989e12 FLOPs / 3.35e12 Bytes = 295.2 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: A workload needs > 295.2 operations per byte to be compute-bound.**
  options:
  - ~989 TFLOPS. It's the maximum theoretical compute performance.
  - ~3.35 TB/s. It's the maximum speed of the HBM3 memory.
  - ~295 Ops/Byte. It's the arithmetic intensity needed to become compute-bound.
  - ~700 W. It's the thermal design power of the card.
  correct_index: 2
