title: Evaluating SSL Pre-training for Edge Resilience
scenario: You are architecting a cloud pre-training pipeline for a visual foundation model using 10PB
  of unlabelled camera data. The model will later be fine-tuned on-device to handle severe distribution
  shifts (e.g., lighting, weather). You must choose between a Contrastive approach (like SimCLR) and Masked
  Image Modeling (like MAE) to train a 630M-parameter ViT-Huge on a cluster of 256 A100 (40GB) GPUs connected
  via 400Gbps InfiniBand. Evaluate the architectural trade-offs to justify your choice.
details:
  realistic_solution: Select Masked Image Modeling (MAE). By masking 75% of image patches at the encoder
    level, sequence length is reduced by 4x. This slashes self-attention memory by 16x, allowing the ViT-Huge
    to comfortably fit in 40GB VRAM without excessive checkpointing while building robust representations
    for edge adaptation.
  common_mistake: Defaulting to contrastive learning for representation robustness without accounting
    for its massive global batch size requirements (e.g., 8192+), which causes OOM on 40GB GPUs and extreme
    All-Gather communication bottlenecks across 32 nodes.
  napkin_math: 'ViT-H sequence length N=256. Attention memory is proportional to N^2. Masking 75% patches
    reduces visible tokens to N=64. Attention memory drops to: 64^2 / 256^2 = 1/16 of the original footprint.
    FFN compute scales with N, dropping by $4\times$. SimCLR requires B=8192, meaning 32 images/GPU. Without
    masking, ViT-H activations for 32 images easily exceed 35GB, risking OOM on 40GB cards.'
