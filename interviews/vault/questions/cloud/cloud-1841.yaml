title: Evaluating SSL Pre-training for Edge Resilience
scenario: You are architecting a cloud pre-training pipeline for a visual foundation model using 10PB of unlabelled data. The 630M-parameter ViT-Huge model will be trained on 256 A100 (40GB) GPUs. You must choose between a Contrastive approach (SimCLR) and Masked Image Modeling (MAE).
question: Would you choose SimCLR or MAE to pre-train the 630M-parameter ViT-Huge on 256 A100 40GB GPUs, and why?
details:
  realistic_solution: Select Masked Image Modeling (MAE). By masking 75% of image patches at the encoder level, sequence length is reduced by 4x. This slashes self-attention memory by 16x, allowing the ViT-Huge to comfortably fit in 40GB VRAM without excessive checkpointing while building robust representations for edge adaptation.
  common_mistake: |
    **The Pitfall:** Defaulting to contrastive learning for representation robustness without checking VRAM limits.
    **The Rationale:** SimCLR is famous for learning robust, invariant features.
    **The Consequence:** The massive global batch size (8192+) required for contrastive learning causes immediate Out-Of-Memory (OOM) errors on 40GB GPUs and creates extreme All-Gather bottlenecks.
  napkin_math: |
    - **ViT-H Sequence Length**: `N=256`. Attention memory scales with `N^2`.
    - **Masking Reduction**: Masking 75% of patches reduces visible tokens to `N=64`.
    - **Memory Footprint**: 64² / 256² = **1/16 of the original attention footprint**.
    - **SimCLR Bottleneck**: Requires Batch=8192 (32 images/GPU). Activations for 32 unmasked images easily exceed 35GB, causing OOM on 40GB cards.
