title: The Full-Stack Performance Mystery
scenario: 'A 64-GPU distributed training job achieves only 35% MFU on H100s (expected: ~55% for this model
  size). You profile with nsys and find that individual GEMM kernels achieve 85% of peak FLOPS, NCCL AllReduce
  bandwidth is 92% of theoretical, and the data pipeline is not stalling. Each component looks healthy
  in isolation, yet end-to-end efficiency is poor. Walk through your full-stack debugging methodology
  to find the hidden bottleneck.'
details:
  realistic_solution: 'The hidden bottleneck is almost certainly in the gaps between components — the
    ''white space'' on the timeline. Your debugging methodology: (1) Generate a multi-GPU nsys timeline
    with NCCL tracing enabled. Don''t look at kernel throughput — look at the timeline gaps. (2) Check
    for serialization: Are forward GEMM kernels and NCCL AllReduce running sequentially instead of overlapping?
    If backward pass computation and gradient AllReduce aren''t overlapped, you lose the opportunity to
    hide communication behind compute. (3) Check for micro-bubbles: Are there 1-5ms gaps between consecutive
    kernels? These accumulate — 200 kernel launches with 2ms gaps = 400ms of dead time per step. Common
    causes: CPU-side Python overhead between operations, CUDA stream synchronization points, dynamic shape
    changes triggering recompilation. (4) Check for stragglers: With 64 GPUs, the AllReduce completes
    at the speed of the slowest GPU. If one GPU is 10% slower (thermal throttling, PCIe contention), all
    GPUs wait. nsys shows this as idle time on 63 GPUs before the AllReduce barrier. (5) Compute the theoretical:
    at 55% MFU target and 35% achieved, the gap is 20 percentage points. That''s 0.20 x step_time of wasted
    cycles. Locate them on the timeline.'
  common_mistake: Profiling each component in isolation and concluding 'everything looks fine.' The fallacy
    is that system-level emergent behavior — the interaction between components — is invisible to component-level
    profiling.
  napkin_math: 'Expected step time at 55% MFU: T_expected. Actual at 35% MFU: T_actual = T_expected x
    (55/35) = 1.57x slower. The ''missing'' 0.57x is hiding in: pipeline bubbles (~15%), AllReduce non-overlap
    (~25%), micro-gaps between kernels (~10%), straggler wait (~7%). Example: 200 kernel launches x 2ms
    gap = 400ms. If step = 2000ms, that''s 20% — found the main culprit. Fix: use CUDA graphs to eliminate
    launch overhead, or torch.compile() to fuse small operations.'
  options:
  - Strong scaling efficiency is determined solely by the AllReduce algorithm choice (Ring vs Tree); with
    the optimal algorithm, efficiency is always >90% regardless of batch size or model size
  - The critical factor is GPU memory bandwidth, not network bandwidth; training is always compute-bound,
    so communication overhead is negligible compared to HBM access latency
  - Scaling efficiency is constant as long as the total batch size stays the same; splitting a batch across
    more GPUs does not change the compute-to-communication ratio because AllReduce volume is fixed
  - 'The compute-to-communication ratio determines efficiency: per step, each GPU computes ~6NB/P FLOPS
    (N=params, B=batch/GPU, P=GPUs) and communicates ~4N bytes for gradient AllReduce. The ratio = 6NB/(P
    × 4N/BW) = 1.5B×BW/P. To maintain >80% efficiency, this ratio must exceed ~4:1. This sets a minimum
    micro-batch size per GPU that grows with GPU count.'
  correct_index: 3
