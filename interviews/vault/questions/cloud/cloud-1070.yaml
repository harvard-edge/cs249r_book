title: Compounding Costs of Data Cascades
scenario: A cloud ML platform ingests 10TB of telemetry data daily. A silent type-casting error at ingestion causes 5% of features to become NaN. This error cascade through 4 subsequent pipeline stages: ETL, Feature Store, Model Training (which consumes 64 A100 GPUs for 72 hours), and Production Deployment. The baseline cost to fix the error at ingestion is $100, and the cost of mitigation increases exponentially by a factor of 10 at each subsequent stage.
question: "What is the production-stage data cascade cost versus the wasted 64-A100 training compute cost?"
details:
  realistic_solution: Calculate both the cascading technical debt using the exponential multiplier and the raw compute waste. The engineering cost of the data cascade is 10^4 times higher than catching it at ingestion, which completely dwarfs the raw infrastructure waste.
  common_mistake: |
    **The Pitfall:** Focusing solely on the wasted GPU compute infrastructure cost.
    **The Rationale:** Compute costs are highly visible on AWS/GCP dashboards, whereas engineering and backfill hours are hidden.
    **The Consequence:** Organizations underinvest in robust data ingestion validation, resulting in massive compounding technical debt downstream.
  napkin_math: |
    * **Stages:** 1(Ingestion) -> 2(ETL) -> 3(Feature Store) -> 4(Training) -> 5(Production).
    * **Data Cascade Debt:** $100 * 10^(5-1) = $100 * 10,000 = $1,000,000.
    * **Wasted Compute:** 64 GPUs * 72 hours * $4/hour = $18,432.
    * **Result:** **The cascading data debt ($1M) is over 50x larger than the wasted compute cost ($18K).**
