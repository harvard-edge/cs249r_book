title: Compounding Costs of Data Cascades
scenario: 'A cloud ML platform ingests 10TB of telemetry data daily. A silent type-casting error at ingestion
  causes 5% of features to become NaN. This error cascades through 4 subsequent pipeline stages: ETL,
  Feature Store, Model Training (which consumes 64 A100 GPUs for 72 hours), and Production Deployment.
  If the baseline cost to fix the error at ingestion is $100 and the cost of mitigation increases exponentially
  by a factor of 10 at each subsequent stage due to compounding technical debt (the ''Data Cascade'' multiplier),
  calculate the financial cost to fix the issue in production versus the direct wasted compute cost (assuming
  A100s cost $4/hour).'
details:
  realistic_solution: Calculate both the cascading technical debt using the exponential multiplier and
    the raw compute waste. The engineering cost of the data cascade is 10^4 times higher than catching
    it at ingestion, which completely dwarfs the raw infrastructure waste.
  common_mistake: Candidates often focus solely on the wasted GPU compute cost and fail to account for
    the exponentially compounding cost of engineering time, data backfilling, and downstream system failures
    across multiple pipeline stages.
  napkin_math: 'Pipeline Stages: 1(Ingestion) -> 2(ETL) -> 3(Feature Store) -> 4(Training) -> 5(Production).

    Data Cascade Debt = $100 * 10^(5-1) = $100 * 10,000 = $1,000,000.

    Wasted Compute = 64 GPUs * 72 hours * $4/hour = 4,608 * $4 = $18,432.

    The cascading data debt is over 50x larger than the wasted compute cost.'
