title: Injection Detection Accuracy
scenario: You deploy a prompt injection classifier with 95% true positive rate and 2% false positive rate.
  Your LLM receives 100,000 queries/day, of which 0.1% are injection attempts. Calculate the daily false
  positives, true positives, and the precision (positive predictive value) of the classifier.
details:
  realistic_solution: 'Daily queries: 100,000. Actual injection attempts: 100,000 × 0.1% = 100. Legitimate
    queries: 99,900. True positives (correctly detected injections): 100 × 95% = 95. False negatives (missed
    injections): 100 × 5% = 5. False positives (legitimate queries flagged as injections): 99,900 × 2%
    = 1,998. True negatives: 99,900 × 98% = 97,902. Precision (PPV) = TP / (TP + FP) = 95 / (95 + 1,998)
    = 95 / 2,093 = 4.5%. This means only 4.5% of flagged queries are actual attacks — 95.5% are false
    alarms! This is the base rate fallacy: with a 0.1% attack rate, even a 2% FP rate overwhelms the true
    positives. To achieve 50% precision, you need FP rate < 0.1% (matching the base rate), which requires
    a 20x improvement in specificity.'
  common_mistake: Assuming 95% detection rate means 95% of flagged queries are actual attacks. With a
    low base rate (0.1%), most flagged queries are false positives — the base rate fallacy.
  napkin_math: '100 real attacks × 95% TPR = 95 caught. 99,900 legitimate × 2% FPR = 1,998 false alarms.
    Precision: 95/2093 = 4.5%. Base rate fallacy in action.'
