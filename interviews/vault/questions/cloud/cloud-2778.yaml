title: Injection Detection Accuracy
scenario: You deploy a prompt injection classifier with 95% true positive rate and 2% false positive rate. Your LLM receives 100,000 queries/day, of which 0.1% are injection attempts.
question: At 100,000 queries/day with a 0.1% attack rate, what are the classifier's daily true positives, false positives, and precision?
details:
  realistic_solution: 'Daily queries: 100,000. Actual injection attempts: 100,000 × 0.1% = 100. Legitimate queries: 99,900. True positives (correctly detected injections): 100 × 95% = 95. False negatives (missed injections): 100 × 5% = 5. False positives (legitimate queries flagged as injections): 99,900 × 2% = 1,998. True negatives: 99,900 × 98% = 97,902. Precision (PPV) = TP / (TP + FP) = 95 / (95 + 1,998) = 95 / 2,093 = 4.5%. This means only 4.5% of flagged queries are actual attacks — 95.5% are false alarms! This is the base rate fallacy: with a 0.1% attack rate, even a 2% FP rate overwhelms the true positives. To achieve 50% precision, you need FP rate < 0.1% (matching the base rate), which requires a 20x improvement in specificity.'
  common_mistake: |
    **The Pitfall:** Assuming a 95% detection rate means 95% of flagged queries are actual attacks.
    **The Rationale:** Candidates fall for the base rate fallacy, ignoring that with a very low base rate, false positives from the large negative class will overwhelm the true positives.
    **The Consequence:** Deploying a system that generates an unmanageable number of false alarms, rendering the classifier practically useless.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily queries = 100,000. Base attack rate = 0.1%.
       - TPR = 95%. FPR = 2%.
    2. **Calculations:**
       - Actual injection attempts = 100,000 × 0.1% = 100.
       - Legitimate queries = 100,000 - 100 = 99,900.
       - True positives (injections caught) = 100 × 95% = 95.
       - False positives (false alarms) = 99,900 × 2% = 1,998.
       - Precision = TP / (TP + FP) = 95 / (95 + 1,998) = 95 / 2,093 ≈ 4.5%.
    3. **Conclusion & Interpretation:**
       - **The precision is roughly 4.5%, meaning 95.5% of flagged queries are false alarms.**
       - **Result: Quality-Bound**
