title: Cloud Learning Rate Scheduling L2 0
scenario: A junior ML engineer sets a fixed learning rate of 1e-3 for the entire training run of a large
  language model and observes that loss plateaus after 20% of training. Explain why learning rate scheduling
  is necessary.
details:
  realistic_solution: 'A fixed learning rate creates a fundamental tension: too high and training oscillates
    around the optimum without converging; too low and training converges slowly or gets trapped in suboptimal
    minima early. LR scheduling resolves this by adapting the rate over time. Warmup (first 1-5% of steps)
    gradually increases LR from near-zero to peak, preventing early gradient instability when weights
    are randomly initialized. Cosine decay then reduces LR smoothly toward zero, allowing fine-grained
    convergence in later stages. The plateau at 20% likely indicates the fixed LR is too high for the
    loss landscape at that stage — the optimizer overshoots the narrowing loss valley.'
  common_mistake: Using a high constant LR and relying on gradient clipping to prevent divergence. Clipping
    prevents NaN but doesn't solve the fundamental problem — the optimizer needs smaller steps to navigate
    the loss landscape as training progresses.
  napkin_math: 'Typical LLM schedule: warmup from 0 to 3e-4 over 2000 steps. Cosine decay from 3e-4 to
    3e-5 over remaining 98K steps. Peak LR is 10x the final LR. A fixed 1e-3 is 3.3x higher than typical
    peak, explaining the plateau.'
