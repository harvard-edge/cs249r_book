title: Root-Causing HPCC Incast Drops in 400G Networks
scenario: During an All-to-All communication phase in a 256-node GPU cluster (each with 8x 400Gbps NICs),
  you observe transient packet drops at the spine switches despite enabling High Precision Congestion
  Control (HPCC) over RoCEv2. The switches have 32MB of shared buffer. HPCC uses In-Network Telemetry
  (INT) to proactively adjust transmission rates and avoid PFC pauses. However, telemetry shows spine
  buffers overflowing before the sender's rate limiters adjust. Analyze the INT feedback loop to determine
  why HPCC is failing to prevent drops during this incast event.
details:
  realistic_solution: Analyze INT packet timestamps to measure the hardware feedback delay. If the telemetry
    RTT is greater than the buffer fill time, HPCC reacts too late. Lower the HPCC target utilization
    parameter (U) from 95% to 80% to reserve more buffer headroom for in-flight packets during the RTT
    window.
  common_mistake: Blaming the switch buffer size and attempting to increase it, or falling back to standard
    DCQCN instead of diagnosing the feedback delay and INT packet sampling frequency.
  napkin_math: Incast from 32 senders at 400Gbps = 12.8 Tbps (1.6 TB/s). Egress drain rate = 400Gbps (50
    GB/s). Net fill rate = 1.55 TB/s. Time to fill 32MB buffer = 32MB / 1.55 TB/s ≈ 20.6 microseconds.
    If end-to-end INT feedback RTT > 20us, the buffer overflows before senders can reduce their rates.
