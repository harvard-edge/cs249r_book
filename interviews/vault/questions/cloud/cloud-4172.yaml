title: NVSwitch Full-Mesh vs PCIe Hierarchy
scenario: An 8-GPU H100 DGX system uses NVSwitch to create a full-mesh NVLink topology.
  A cheaper alternative uses PCIe Gen5 x16 with a PCIe switch. Calculate the bandwidth
  ratio between NVSwitch (900 GB/s per GPU) and PCIe (128 GB/s per GPU bidirectional)
  and explain which workloads justify the NVSwitch premium.
question: What is the bandwidth ratio between NVSwitch and PCIe in the 8-GPU H100
  system, and which workloads justify the NVSwitch premium?
details:
  realistic_solution: 'Bandwidth ratio: 900 / 128 = 7.03× more bandwidth with NVSwitch.
    But the topology difference amplifies this for AllReduce: NVSwitch full mesh allows
    any GPU to talk to any other at full 900 GB/s simultaneously. PCIe tree: all 8
    GPUs share the PCIe switch''s internal bandwidth (~512 GB/s total), so per-GPU
    AllReduce bandwidth = 512/8 = 64 GB/s — a 14× disadvantage. Workloads that justify
    NVSwitch: (1) Tensor parallelism — AllReduce after every layer, bandwidth-critical.
    (2) Expert parallelism in MoE — AllToAll routing. (3) Large-batch data parallelism
    with gradient AllReduce. Workloads that don''t need NVSwitch: (1) Pipeline parallelism
    — only adjacent stages communicate, low bandwidth. (2) Independent inference on
    separate GPUs — no inter-GPU communication. (3) Multi-tenant serving — each GPU
    serves different models.'
  common_mistake: Comparing only peak bandwidth. PCIe is a tree topology (root complex
    → switch → device) while NVSwitch is a full mesh. For all-to-all patterns like
    tensor parallelism, the topology difference matters more than raw bandwidth per
    link.
  napkin_math: 'NVSwitch: 900 GB/s per GPU, full mesh. 70B model 8-way TP AllReduce
    per layer: 17.5 MB / 900 GB/s = 19.4μs. PCIe: 64 GB/s effective per GPU. Same
    AllReduce: 17.5 MB / 64 GB/s = 273μs. Ratio: 14× slower. Over 80 layers: NVSwitch
    = 1.55ms, PCIe = 21.9ms. Per-step overhead: PCIe adds 20ms — at 100ms/step, that''s
    20% overhead. DGX H100 cost: $300K. PCIe server: $150K. TCO breakeven: if TP training
    runs >40% of the time.'
