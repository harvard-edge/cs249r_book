title: Ultra Ethernet Consortium for ML Training
scenario: The Ultra Ethernet Consortium (UEC) is designing a new RDMA transport specifically for AI/ML workloads, addressing RoCE v2's PFC dependency and InfiniBand's vendor lock-in. UEC proposes packet spraying (per-packet load balancing), hardware-based selective retransmission, and multi-path transport.
question: How would UEC's packet spraying, selective retransmission, and multipath transport compare with RoCE v2 and InfiniBand at 8192 MI300X GPUs?
details:
  realistic_solution: 'UEC key innovations and evaluation: (1) Packet spraying: distributes individual packets across all available paths, achieving perfect load balancing without ECMP hash collisions. Benefit: eliminates the hash polarization problem that causes 10-20% throughput loss with ECMP at >1024 GPUs. Concern: requires hardware reordering buffers at every receiver — each 400G port needs ~4MB of reorder buffer, adding to switch silicon cost. (2) Selective retransmission: retransmits only lost packets (vs RDMA RC''s go-back-N which retransmits entire windows). Benefit: reduces retransmission overhead from O(window) to O(1). For AllReduce with 0.01% loss rate: RC retransmits ~655 extra packets per 256MB, selective retransmits ~65. 10× reduction. (3) Multi-path transport: single connection uses multiple physical paths natively. Eliminates the need for NCCL to manage per-rail QPs manually. Benefit: automatic failover and load balancing without application changes. Overall: UEC addresses real pain points, especially PFC elimination and vendor independence. For 8192 MI300X: UEC''s packet spraying alone would improve AllReduce throughput by 15-25% vs ECMP-based RoCE v2. But timeline risk: UEC silicon expected 2026-2027, first production deployments 2028+. IB and RoCE will advance 2 generations by then.'
  common_mistake: |
    **The Pitfall:** Evaluating UEC purely on paper specifications.
    **The Rationale:** UEC's proposed packet spraying and selective retransmissions directly solve known issues in existing networks.
    **The Consequence:** Candidates fail to account for the massive maturity gap; InfiniBand has 15+ years of production hardening, while early silicon often suffers from real-world reliability issues.
  napkin_math: |
    - 8192 MI300X cluster: AllReduce with ECMP (RoCE) loses ~15% throughput from hash collisions at scale.
    - AllReduce with packet spray (UEC) has ~2% overhead from reordering. Net improvement: 13% throughput gain.
    - Training cost for 70B model: $10M (estimate). 13% faster training saves $1.3M.
    - **With UEC's incremental NIC/switch cost around ~$2M for 8192 GPUs, payback requires roughly 1.5 training runs.**
