title: The CUDA Streams Overlap Failure
scenario: 'You design a 3-stage pipeline for LLM inference using CUDA streams: Stream 1 copies the next
  batch of token embeddings from CPU to GPU (H2D), Stream 2 runs the transformer forward pass (compute),
  and Stream 3 copies output logits from GPU to CPU (D2H). You expect perfect overlap: while Stream 2
  computes batch $N$, Stream 1 uploads batch $N+1$ and Stream 3 downloads results from batch $N-1$. But
  profiling with Nsight Systems shows the three streams execute sequentially with no overlap. Diagnose
  why the overlap failed, and design the correct synchronization that enables it.'
details:
  realistic_solution: 'There are three common causes for stream overlap failure: (1) Default stream contamination:
    If any operation (even an innocent `cudaMemset` or a PyTorch operation not explicitly assigned to
    a stream) runs on the default stream, it acts as a global barrier. The default stream synchronizes
    with ALL other streams before and after execution. Fix: use per-thread default streams (`CUDA_LAUNCH_BLOCKING=0`,
    `cudaStreamPerThread`) or explicitly create non-blocking streams with `cudaStreamCreateWithFlags(cudaStreamNonBlocking)`.
    (2) Implicit synchronization from memory allocation: `cudaMalloc` or `cudaFree` during the pipeline
    forces a device-wide synchronization. If output tensors are being allocated on-the-fly rather than
    pre-allocated in a buffer pool, every allocation serializes the streams. Fix: pre-allocate a ring
    buffer of output tensors. (3) Missing events for inter-stream dependencies: Without explicit `cudaEvent`
    signals, streams have no ordering guarantees — but the driver may serialize them for correctness if
    it detects potential data hazards on the same memory. The correct design uses a double-buffered (or
    triple-buffered) scheme: pre-allocate two sets of input/output buffers, use `cudaEventRecord` after
    each operation and `cudaStreamWaitEvent` at the start of dependent operations across streams.'
  common_mistake: Assuming that placing operations on different CUDA streams automatically guarantees
    concurrent execution. The most common bug is using the default stream (stream 0) for any operation,
    which implicitly synchronizes with all other streams, serializing everything.
  napkin_math: 'Sequential execution: H2D (0.5ms) + Compute (5ms) + D2H (0.3ms) = 5.8ms per batch. Overlapped
    execution (steady state): max(H2D, Compute, D2H) = max(0.5, 5, 0.3) = 5.0ms per batch. Speedup: 5.8/5.0
    = 1.16x. Pipeline startup cost: 2 extra batches of latency. For compute-dominated workloads, the overlap
    benefit is modest (16%). But if H2D involves large embedding tables (10ms) and compute is light (2ms):
    sequential = 12.3ms, overlapped = 10ms, speedup = 1.23x. The real benefit compounds with more pipeline
    stages and more balanced stage times.'
