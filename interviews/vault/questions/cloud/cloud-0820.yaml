title: The Tokenizer Throughput Ceiling
scenario: You are profiling an LLM inference pipeline. The GPU utilization is only 40%, and a colleague suggests the tokenizer running on the CPU might be the bottleneck.
question: Roughly how many tokens per second must the CPU tokenizer produce to keep an H100 (989 TFLOPS FP16) busy on a 7B model?
details:
  realistic_solution: Approximately 70,000 tokens/sec. A 7B model requires ~14 GFLOPS per token (2 * 7B FLOPs). The H100 delivers 989 TFLOPS FP16, so it can theoretically process 989e12 / 14e9 ~ 70,000 tokens/sec. The CPU tokenizer must match this rate.
  common_mistake: |
    **The Pitfall:** Assuming the tokenizer is always fast enough because it is "just string processing."
    **The Rationale:** Engineers underestimate the sheer computational throughput of modern GPUs compared to single-threaded CPU Python code.
    **The Consequence:** The GPU sits idle waiting for data, leading to poor utilization and wasted hardware costs.
  napkin_math: |
    1. **Compute per Token:** LLM inference requires ~2 FLOPs per parameter per token. 2 * 7 billion = 14 GFLOPS/token.
    2. **Hardware Peak:** The H100 delivers approximately 989 TFLOPS (FP16).
    3. **Maximum Throughput:** 989,000 GFLOPS / 14 GFLOPS/token ≈ **70,600 tokens/sec**.
  options:
  - A) ~700 tokens/sec
  - B) ~7,000 tokens/sec
  - C) ~70,000 tokens/sec
  - D) ~700,000 tokens/sec
  correct_index: 2
