title: Portable Mixed-Precision Training Across GPU Architectures
scenario: Your mixed-precision training code uses torch.cuda.amp.GradScaler and autocast(dtype=torch.float16).
  It works on A100 and H100. On MI300X, gradients occasionally overflow to inf. On TPU v5e, you want to
  use BF16 instead of FP16. How do you make training portable?
question: "How do you make training portable?"
details:
  realistic_solution: 'Make precision a runtime configuration: (1) Use torch.amp.autocast(device_type=device,
    dtype=precision) with device and precision as config params. (2) For MI300X overflow: switch to BF16
    (range of FP32, less precision than FP16 but no overflow issues) — eliminates the need for GradScaler
    entirely. (3) For TPU: BF16 is the only option; GradScaler is not needed since BF16 has FP32''s exponent
    range. (4) For H100: consider FP8 via NVIDIA''s Transformer Engine for another 2x throughput boost.
    A portable config: {A100: FP16+scaler, H100: FP8+TE, MI300X: BF16, TPU: BF16}.'
  common_mistake: 'Hardcoding FP16 as the mixed-precision dtype. Different accelerators have different
    optimal precision: H100 excels at FP8 (via Transformer Engine), MI300X supports both FP16 and BF16
    via MFMA, and TPUs only efficiently support BF16.'
  napkin_math: 'FP16 range: +-65504, overflow likely for large gradients. BF16 range: +-3.4e38 (same as
    FP32). Switching MI300X from FP16 to BF16: zero loss scaling overhead, and MFMA BF16 throughput equals
    FP16 throughput on CDNA3.'
