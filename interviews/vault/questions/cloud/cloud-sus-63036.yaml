title: MI300X Power Budget and Thermal Throttling Under Full Load
scenario: 'An MI300X GPU (TDP 750W) is running a training workload. Under sustained FP16 GEMM at 90% GPU
  utilization, measured throughput is 1,050 TFLOPS against the 1,307 TFLOPS peak. The cooling system is
  rated for 750W steady-state. An engineer notices the GPU''s thermal sensor reads 92°C (throttle threshold:
  95°C) and power draw is 742W. An H100 SXM5 (TDP 700W) running the same relative workload measures 1.5°C
  below its 83°C throttle threshold. Analyze whether the MI300X is thermals-limited in this configuration
  and compare thermal headroom.'
question: "Is the MI300X thermally limited at 92°C and 742W under sustained GEMM, and how does its thermal headroom compare with H100?"
details:
  realistic_solution: 'Thermal analysis: MI300X at 92°C with 95°C threshold = 3°C headroom. At 742W out
    of 750W TDP: 98.9% power draw. The GPU is operating at near-maximum power without throttling, but
    with minimal thermal margin. Any workload spike (batch size increase, longer sequences) will push
    it over 95°C and trigger throttling. H100 at 1.5°C below 83°C threshold = at 81.5°C, with TDP 700W
    — operating with more proportional headroom. Performance gap analysis: 1,050/1,307 = 80.3% efficiency.
    At 742W of 750W (98.9% power utilization), compute efficiency is 80.3% — the gap is not thermal (would
    be lower if throttling). It is kernel efficiency (GEMM wave quantization, occupancy). Thermal recommendation:
    MI300X requires better cooling (liquid cooling, higher airflow) to maintain the 3°C margin. With standard
    air cooling, sustained 750W in a dense cluster risks thermal throttling. H100''s 700W TDP in the same
    enclosure has 7% lower heat density per GPU.'
  common_mistake: Assuming the performance gap (1,307 - 1,050 = 257 TFLOPS, 80.3% efficiency) is entirely
    due to thermal throttling. Memory bandwidth saturation, kernel efficiency (wave quantization, register
    spilling), and software overhead all contribute to sub-peak utilization even without thermal constraints.
  napkin_math: 'MI300X heat density: 750W/192GB = 3.9W/GB. H100: 700W/80GB = 8.75W/GB (higher per-memory,
    lower per-FLOP). Thermal resistance to ambient (data center inlet): assume θ_ja = 0.05°C/W. MI300X:
    ΔT = 0.05 × 742W = 37.1°C above coolant. At 55°C coolant: junction = 92.1°C. 3°C from throttle. H100:
    0.05 × 700×0.985 = 34.5°C above coolant. At 46.5°C coolant: 81°C junction = 2°C below stated 83°C.
    Both operating near thermal limits. In a 8-GPU HGX system: MI300X total = 8×750W = 6,000W. H100: 8×700W
    = 5,600W. Cooling capacity delta: 400W = additional cooling requirement for MI300X 8-card system.'
