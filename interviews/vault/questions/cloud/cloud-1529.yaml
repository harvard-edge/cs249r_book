title: Diagnosing Attention vs FFN Bottlenecks
scenario: Your team is profiling a 1B parameter Transformer model on an NVIDIA A100 (80GB, 312 TFLOPS
  FP16, 2.0 TB/s memory bandwidth). You observe that the Multi-Head Attention (MHA) projections have significantly
  lower streaming multiprocessor (SM) utilization than the Feed-Forward Network (FFN) layers, despite
  both consisting of matrix multiplication workloads. Diagnose the root cause of the utilization disparity
  between these two linear algebra workloads for a sequence length of 1024.
question: "Why do the MHA projections show lower SM utilization than FFN layers at sequence length 1024 on the A100?"
details:
  realistic_solution: Analyze the arithmetic intensity of the two operations against the hardware roofline.
    The FFN layer consists of two large GEMMs (d_model→d_ff and d_ff→d_model) that have high arithmetic
    intensity and are heavily compute-bound. MHA involves batched GEMMs with smaller matrices (seq_len
    x head_dim), resulting in lower arithmetic intensity that hits the memory bandwidth wall earlier,
    starving the SMs and lowering overall utilization.
  common_mistake: Assuming both layers are compute-bound because they are dense matrix multiplications,
    or incorrectly attributing the bottleneck entirely to the Softmax operation without calculating the
    arithmetic intensity of the GEMMs.
  napkin_math: 'A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte. FFN (d_model=2048, d_ff=8192,
    two projections): FLOPs = 2 * 2 * seq * d_model * d_ff ≈ 68.7G. Memory (FP16) = (seq*d_model + d_model*d_ff
    + d_ff*d_model + seq*d_ff + seq*d_model) * 2 Bytes ≈ 92MB. Intensity = 68.7G / 92MB ≈ 747 FLOPs/Byte.
    MHA QK^T (seq=1024, head_dim=128): FLOPs = 2 * seq^2 * head_dim ≈ 268M. Memory = (2*seq*head_dim +
    seq^2) * 2 Bytes ≈ 2.5MB. Intensity = 268M / 2.5MB ≈ 107 FLOPs/Byte. FFN (747 > 156) is compute-bound;
    MHA (107 < 156) is memory-bound.'
