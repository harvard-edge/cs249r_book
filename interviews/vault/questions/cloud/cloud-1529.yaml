title: Diagnosing Attention vs FFN Bottlenecks
scenario: Your team is profiling a 1B parameter Transformer model on an NVIDIA A100. You observe that the Multi-Head Attention (MHA) batched GEMMs have significantly lower streaming multiprocessor (SM) utilization than the Feed-Forward Network (FFN) layers, despite both consisting of matrix multiplication workloads.
question: "Why do the MHA batched GEMMs show lower SM utilization than FFN layers at sequence length 1024 on the A100?"
details:
  realistic_solution: |
    Analyze the arithmetic intensity of the two operations against the hardware roofline. The FFN layer consists of two large GEMMs (d_model->d_ff and d_ff->d_model) that have high arithmetic intensity and are heavily compute-bound. MHA involves batched GEMMs with smaller matrices (seq_len x head_dim), resulting in lower arithmetic intensity that hits the memory bandwidth wall earlier, starving the SMs and lowering overall utilization.
  common_mistake: |
    **The Pitfall:** Assuming both layers are compute-bound just because they are dense matrix multiplications.
    **The Rationale:** Candidates don't calculate the arithmetic intensity and fail to realize that MHA hits the memory bandwidth wall earlier than FFN.
    **The Consequence:** Optimization efforts are misdirected towards compute tuning for MHA instead of memory/IO optimization (like FlashAttention).
  napkin_math: |
    - **A100 Ridge Point:** 312 TFLOPS / 2.0 TB/s = **156 FLOPs/Byte**.
    - **FFN Layer:** FLOPs ≈ 68.7G, Memory ≈ 92MB. Intensity = 68.7G / 92MB ≈ **747 FLOPs/Byte**.
    - **MHA QK^T Layer:** FLOPs ≈ 268M, Memory ≈ 2.6MB. Intensity = 268M / 2.6MB ≈ **103 FLOPs/Byte**.
    - **Result:** FFN (747 > 156) is highly compute-bound; MHA (103 < 156) is memory-bound, starving the SMs.
