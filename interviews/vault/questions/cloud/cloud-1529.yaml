title: Diagnosing Attention vs FFN Bottlenecks
scenario: Your team is profiling a 1B parameter Transformer model on a GPU. You observe that the Multi-Head Attention (MHA) batched GEMMs have significantly lower streaming multiprocessor (SM) utilization than the Feed-Forward Network (FFN) layers, despite both consisting of matrix multiplication workloads.
question: Why do the MHA batched GEMMs show lower SM utilization than FFN layers at sequence length 1024?
details:
  realistic_solution: |
    Analyze the arithmetic intensity of the two operations against the hardware roofline. The FFN layer consists of two large GEMMs (d_model->d_ff and d_ff->d_model) that have high arithmetic intensity and are heavily compute-bound. MHA involves batched GEMMs with smaller matrices (seq_len x head_dim), resulting in lower arithmetic intensity that hits the memory bandwidth wall earlier, starving the SMs and lowering overall utilization.
  common_mistake: |
    **The Pitfall:** Assuming both layers are compute-bound just because they are dense matrix multiplications.
    **The Rationale:** Candidates don't calculate the arithmetic intensity and fail to realize that MHA hits the memory bandwidth wall earlier than FFN.
    **The Consequence:** Optimization efforts are misdirected towards compute tuning for MHA instead of memory/IO optimization (like FlashAttention-2).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Ridge Point: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.
    2. **Calculations:**
       - FFN Layer: 68.7G FLOPs / 92MB = 747 FLOPs/Byte.
       - MHA Layer: 268M FLOPs / 2.6MB = 103 FLOPs/Byte.
    3. **Conclusion & Interpretation:** **FFN is compute-bound (747 > 156), while MHA is memory-bound (103 < 156), starving SMs. Result: Memory-Bandwidth-Bound.**
