title: Designing a Draft Model Selection Strategy
scenario: 'You must choose a draft model for speculative decoding with a 70B target. Options: (A) 1B model (α=0.65, 0.5ms/token), (B) 7B model (α=0.82, 2ms/token), (C) 2-layer early-exit of the target (α=0.70, 1ms/token). Target decode: 25ms/token.'
question: 'Using E = (1-α^(K+1))/(1-α), what are the expected tokens generated per step for option A at K=7 and option C at K=6?'
details:
  realistic_solution: 'For Option A (K=7), E = 2.77 tokens. For Option C (K=6), E = 3.06 tokens. Option C provides better expectation while keeping draft latency manageable.'
  common_mistake: |
    **The Pitfall:** Always picking the highest acceptance rate (α) draft model without factoring in its latency.
    **The Rationale:** A high acceptance rate feels like better "accuracy", and engineers assume any draft is vastly faster than the target.
    **The Consequence:** The draft's own latency cost ruins the speculation speedup. A slow but accurate draft (Option B) can result in worse wall-clock time than a fast but less accurate one (Option A).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Formula: E[tokens] = (1 - α^(K+1)) / (1 - α).
       - Option A: α=0.65, K=7.
       - Option C: α=0.70, K=6.
    2. **Calculations:**
       - Option A (K=7): E = (1 - 0.65^8) / (1 - 0.65) = (1 - 0.0318) / 0.35 ≈ 2.77 tokens.
       - Option C (K=6): E = (1 - 0.70^7) / (1 - 0.70) = (1 - 0.0823) / 0.30 ≈ 3.06 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Option C yields more expected tokens per speculation step despite a lower K.**
