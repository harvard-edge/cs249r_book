title: Stranded Capacity Identification in Mixed GPU Datacenter
scenario: A datacenter has 200 racks. 150 racks hold A100 nodes (5kW/rack average) and 50 racks hold H100
  nodes (20kW/rack average). Total facility power is 2MW with uniform cooling designed for 10kW/rack average.
  Identify where stranded capacity exists and quantify it.
details:
  realistic_solution: 'A100 racks: 150×5kW=750kW. H100 racks: 50×20kW=1000kW. Total=1750kW, under 2MW
    power budget. Cooling: uniform 10kW/rack → H100 racks get 10kW cooling for 20kW load → thermally stranded.
    H100 racks must run at 50% utilization max. Stranded GPU capacity: 50 racks × (20-10)kW = 500kW of
    H100 compute is unusable. Fix: upgrade H100 rows to liquid cooling or in-row cooling to 25kW/rack
    capacity.'
  common_mistake: Averaging power across all racks and concluding the facility is balanced; missing that
    H100 racks are thermally stranded by uniform cooling design.
  napkin_math: 'H100 thermal stranding: 50 racks × (20kW load - 10kW cooling) = 500kW stranded. At $0.10/kWh:
    $50/hr unusable. H100 at 50% utilization: 50×8 H100s×0.5=200 H100-equivalents wasted. Liquid cooling
    upgrade cost: ~$50k/row → ROI in weeks.'
