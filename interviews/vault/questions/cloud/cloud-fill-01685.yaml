title: Fairness Evaluation of Large-Scale Models on Google TPU v5e
scenario: Your team has deployed a large language model on a cluster of Google TPU v5e instances, each
  with 16 GB HBM and 197 TFLOPS BF16 peak performance. This model is used for content moderation, and
  preliminary analysis suggests potential demographic bias. You're tasked with evaluating the model for
  'equalized odds' with respect to a protected attribute (e.g., gender) across different subgroups. You
  need to rapidly assess the resource implications of this evaluation on your existing TPU cluster. Specifically,
  how would you approach sampling and processing the data given the TPU's memory and computational constraints
  to calculate true positive rates (TPR) and false positive rates (FPR) for each subgroup effectively,
  without significantly impacting the inference latency of the production model?
question: "How would you sample and process data on TPU v5e to compute subgroup TPR/FPR for equalized odds without hurting production latency?"
details:
  realistic_solution: A realistic solution involves using a stratified sampling approach to create a representative,
    yet smaller, evaluation dataset that covers all critical subgroups. This dataset should be optimized
    for batch processing on the TPU. Instead of re-inferring, one could store model logits or embeddings
    for the sampled data. Then, perform post-processing on a CPU or a smaller, dedicated TPU pod to calculate
    TPR/FPR for each subgroup. For 'napkin math' considerations, estimate the memory footprint of logits
    for the sampled dataset (e.g., 256 dimensions * 4 bytes/float * 1M samples) and compare it against
    the 16 GB HBM of a single TPU v5e.
  common_mistake: A common mistake is to attempt a full re-evaluation of the entire dataset on every subgroup,
    leading to excessive computational cost and time. Another mistake is to ignore the memory constraints
    of the TPU, assuming the entire dataset for evaluation can be loaded at once, or not considering the
    overhead of loading and processing subgroup-specific data on the device.
  napkin_math: If we sample 1 million data points for fairness evaluation, and for each data point, we
    store 256-dimensional BF16 logits (2 bytes per value), the total memory required would be 1M * 256
    * 2 bytes = 512 MB. This easily fits within the 16 GB HBM of a single TPU v5e. If the evaluation requires
    re-inference, and each inference takes 10ms, then 1M inferences would take 1M * 10ms = 10,000 seconds,
    or roughly 2.8 hours, on a single TPU. This estimation helps decide if a dedicated TPU slice or parallel
    processing is needed for evaluation.
