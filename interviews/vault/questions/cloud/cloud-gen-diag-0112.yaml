title: Diagnosing Low Decoder MFU on A100
scenario: You deploy an FP16 encoder-decoder translation model on a single A100 (80 GB HBM2e, 2.0 TB/s
  bandwidth, 312 TFLOPS FP16). Monitoring shows the encoder phase achieves a healthy 45% Model FLOPs Utilization
  (MFU), but the decoder phase plummets to roughly 0.6% MFU when running with a batch size of 1. Diagnose
  the root cause of this massive performance drop in the decoder phase using the hardware specifications.
details:
  realistic_solution: The root cause is that autoregressive decoding at batch size 1 is severely memory-bandwidth
    bound. The encoder processes all input tokens simultaneously (matrix-matrix multiplication) yielding
    high arithmetic intensity. The decoder processes one token at a time, loading the entire weight matrix
    for just one set of computations (matrix-vector multiplication). Because the arithmetic intensity
    is drastically lower than the A100's ridge point, the GPU is starved for data and most compute units
    sit idle waiting for memory transfers.
  common_mistake: Candidates often incorrectly attribute the drop to Python loop overheads or kernel launch
    latencies without analyzing the fundamental hardware limits. They may fail to recognize the difference
    between matrix-matrix operations in the encoder versus matrix-vector operations in the decoder.
  napkin_math: A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte. For a decoder linear layer at
    batch size 1, reading an NxN FP16 weight matrix takes 2*N^2 bytes to perform 2*N^2 FLOPs. Arithmetic
    Intensity = (2*N^2 FLOPs) / (2*N^2 Bytes) = 1 FLOP/Byte. Max Theoretical Performance = Bandwidth *
    Intensity = 2.0 TB/s * 1 FLOP/Byte = 2 TFLOPS. Max MFU = 2 TFLOPS / 312 TFLOPS = 0.0064, or 0.64%.
