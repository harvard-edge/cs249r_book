title: 'Network Bandwidth Bottlenecks: Realize PCIe Bandwidth Impact on Model Checkpointing'
scenario: Concretely size the PCIe bandwidth impact on checkpointing a 70B FP16 model
  from 8×H100 GPUs to NVMe SSDs via CPU. Each H100 connects to CPU via PCIe 5.0 ×16
  (64GB/s). Compute checkpoint time and determine if it can be hidden within training.
question: How long does checkpointing a 70B FP16 model from 8 H100s through PCIe 5.0
  to NVMe take, and can it be hidden during training?
details:
  realistic_solution: '70B FP16: 140GB total across 8 GPUs (17.5GB each). PCIe 5.0
    per GPU: 32GB/s (one direction). Time for 17.5GB: 0.55s per GPU. With 8 GPUs parallel:
    CPU must absorb 8×32=256GB/s → CPU DDR5 BW: 100GB/s (bottleneck). Time: 140GB/100GB/s=1.4s
    to CPU. Then to NVMe (3.5 GB/s): 140/3.5=40s. Checkpoint every 1000 steps (100ms
    each): 100s of training. Checkpoint overhead: 40s/100s=40%. Solution: async checkpoint
    — write to /dev/shm first, then background NVMe write overlapped with next training
    steps.'
  common_mistake: Assuming checkpointing is embarrassingly parallel (8 GPUs × 64GB/s
    = 512GB/s); in practice, CPU memory is the bottleneck (DDR5 at 100GB/s), not PCIe.
  napkin_math: '140GB model. CPU DDR5: 100GB/s. GPU→CPU: 140/100=1.4s. CPU→NVMe (3.5GB/s):
    140/3.5=40s. Training 1000 steps: 1000×100ms=100s. Checkpoint overhead: 40/100=40%.
    Async write: 140GB to /dev/shm (requires 140GB+ CPU RAM). 32GB CPU RAM: overflow.
    Solution: write 8 shards in parallel to 8 NVMe SSDs: 8×3.5=28GB/s. 140/28=5s total
    checkpoint. 5/100=5% overhead. Acceptable.'
