title: 'Network Bandwidth Bottlenecks: Realize PCIe Bandwidth Impact on Model Checkpointing'
scenario: You need to concretely size the PCIe bandwidth impact on checkpointing a 70B FP16 model from 8xH100 GPUs to NVMe SSDs via CPU. Each H100 connects to the CPU via PCIe 5.0 x16 (64GB/s).
question: How long does checkpointing a 70B FP16 model from 8 H100s through PCIe 5.0 to NVMe take, and can it be hidden during training?
details:
  realistic_solution: "70B FP16: 140GB total across 8 GPUs (17.5GB each). PCIe 5.0 per GPU: 32GB/s (one direction). Time for 17.5GB: 0.55s per GPU. With 8 GPUs parallel: CPU must absorb 8×32=256GB/s → CPU DDR5 BW: 100GB/s (bottleneck). Time: 140GB/100GB/s=1.4s to CPU. Then to NVMe (3.5 GB/s): 140/3.5=40s. Checkpoint every 1000 steps (100ms each): 100s of training. Checkpoint overhead: 40s/100s=40%. Solution: async checkpoint — write to /dev/shm first, then background NVMe write overlapped with next training steps."
  common_mistake: |
    **The Pitfall:** Assuming checkpointing is embarrassingly parallel across the PCIe links.
    **The Rationale:** Multiplying 8 GPUs by 64GB/s and assuming a massive 512GB/s transfer rate, completely forgetting the CPU memory bandwidth bottleneck.
    **The Consequence:** Vastly underestimating checkpoint latency and failing to implement asynchronous checkpointing, leading to massive training stalls.
  napkin_math: |
    *   **Model Size:** 70B FP16 = 140GB total (17.5GB per GPU across 8 GPUs).
    *   **GPU to CPU:** 8 GPUs simultaneously push data to CPU DDR5 RAM. CPU DDR5 bandwidth is the bottleneck at 100GB/s.
    *   **Transfer Time to CPU:** 140GB / 100GB/s = 1.4s.
    *   **CPU to NVMe:** NVMe write speed is ~3.5GB/s. 140GB / 3.5GB/s = 40s.
    *   **Overhead:** If checkpointing every 1000 steps (100ms each = 100s of training), a 40s checkpoint represents a **40% overhead**.
    *   **Solution:** Write asynchronously. 8 shards to 8 NVMe SSDs in parallel = 8 × 3.5 = 28GB/s. Checkpoint time drops to 140/28 = **5s** (5% overhead).
