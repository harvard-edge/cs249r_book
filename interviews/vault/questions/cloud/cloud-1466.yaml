title: Evaluating Distillation Trade-offs for Cloud LLM Deployment
scenario: You need to deploy a real-time summarization model in the cloud. You currently have a highly
  accurate 70B parameter teacher model that requires at least 2xA100 (80GB) GPUs to serve due to memory
  constraints (approx 140GB in FP16). To reduce serving costs and fit the model on a single, cheaper GPU,
  you propose distilling it into a 7B student model. Evaluate the architectural trade-offs between standard
  logit-based distillation and intermediate-state distillation, specifically considering the 'capacity
  gap' and the impact of the temperature hyperparameter on the resulting student's ability to capture
  the teacher's long-tail knowledge.
question: "Should the 70B-to-7B summarizer use logit distillation, intermediate-state distillation, or both, given the capacity gap and temperature trade-offs?"
details:
  realistic_solution: Evaluate the 10x capacity gap between teacher (70B) and student (7B). Standard logit
    distillation might force the 7B student to mimic noise in the teacher's distribution. Recommend combining
    task-specific hard labels with teacher soft labels at a moderate temperature (T=3-5), using layer-wise
    intermediate feature matching to transfer structural knowledge. The distillation cost (~3,240 GPU-hours)
    is a one-time offline expense justified by >4x ongoing serving cost reduction.
  common_mistake: Assuming higher temperature always transfers more knowledge, or ignoring the capacity
    mismatch where a 7B student lacks the representational power to faithfully reproduce a 70B teacher's
    full output distribution across all tasks.
  napkin_math: 'Serving 70B in FP16 requires ~140GB memory (2x 80GB A100). A 7B model in FP16 needs ~14GB
    memory, easily fitting on a single A100 or L4. Distillation overhead: running 70B forward pass over
    10B tokens takes 70B * 2 * 10B = 1.4e21 FLOPs. At 120 TFLOP/s (A100), this takes ~3,240 hours of GPU
    time (e.g., ~17 days on an 8-GPU node), a substantial offline cost but justifiable for >4x online
    cost reduction.'
