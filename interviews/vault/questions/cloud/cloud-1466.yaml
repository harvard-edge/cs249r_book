title: Evaluating Distillation Trade-offs for Cloud LLM Deployment
scenario: You need to deploy a real-time summarization model in the cloud. You currently have a highly accurate 70B parameter teacher model that requires at least 2xA100 (80GB) GPUs to serve due to memory constraints (approx 140GB in FP16). To reduce serving costs and fit the model on a single, cheaper GPU, you propose distilling it into a 7B student model.
question: "Should the 70B-to-7B summarizer use logit distillation, intermediate-state distillation, or both, given the capacity gap and temperature trade-offs?"
details:
  realistic_solution: Evaluate the 10x capacity gap between teacher (70B) and student (7B). Standard logit distillation might force the 7B student to mimic noise in the teacher's distribution. Recommend combining task-specific hard labels with teacher soft labels at a moderate temperature (T=3-5), using layer-wise intermediate feature matching to transfer structural knowledge. The distillation cost (~3,240 GPU-hours) is a one-time offline expense justified by >4x ongoing serving cost reduction.
  common_mistake: |
    **The Pitfall:** Assuming higher temperature always transfers more knowledge without acknowledging the capacity gap.
    **The Rationale:** High temperature softens the logits, supposedly revealing the rich "dark knowledge" of the teacher across all classes.
    **The Consequence:** Forcing a 7B student to mimic the full noise/tail distribution of a 70B teacher exceeds its representational power, degrading performance on core tasks.
  napkin_math: |
    * Serving 70B in FP16 requires ~140 GB memory (2× 80GB A100).
    * A 7B model in FP16 needs ~14 GB memory (Fits on 1× L4 or A10G).
    * Distillation overhead: 70B forward pass over 10B tokens = 70B × 2 × 10B = 1.4e21 FLOPs.
    * A100 throughput ≈ 120 TFLOP/s.
    * Time = 1.4e21 / 120e12 = 1.16e7 seconds ≈ 3,240 GPU-hours.
    * **While costing ~17 days on an 8-GPU node offline, it justifies a massive >4× ongoing online serving cost reduction.**
