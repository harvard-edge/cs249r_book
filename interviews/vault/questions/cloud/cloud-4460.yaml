title: Continuous Batching Micro-Batch Scheduling for TPOT Fairness
scenario: In a continuous batching decode pool, 10 requests complete their generation
  while 90 ongoing requests are mid-decode. The scheduler adds 15 new requests to
  the next step. Explain the fairness implications and identify when new request additions
  cause TPOT inflation for existing requests.
question: What fairness and TPOT impact does adding 15 new requests to a 90-request
  continuous decode batch have?
details:
  realistic_solution: 'TPOT impact of batch size increase: decode is memory-bandwidth
    bound. Per-step time = (total KV bytes + model bytes) / HBM bandwidth. Model bytes
    are fixed per step. KV bytes per step = sum of all requests'' context lengths
    * kv_size_per_token. Adding 15 new requests (avg 512 tokens context): delta_KV
    = 15 * 512 * kv_per_token. For 8B model: 15 * 512 * (2*32*32*128*2B) = 15 * 512
    * 524KB = 4GB extra KV per step. At 3.35 TB/s: +1.19ms per step. If baseline step
    is 40ms: +3% TPOT inflation for all 90 existing requests. Fairness policy: to
    maintain SLA for existing requests, limit batch expansion rate. Add at most N
    new requests where N satisfies: (N * avg_context * kv_per_token) / HBM_BW < TPOT_slack_ms.
    This is the TPOT budget constraint for admission control.'
  common_mistake: Assuming adding new requests to a continuous batch is free. Each
    new request added to the batch increases the per-step memory bandwidth consumption
    (more KV pages to load), which slows the decode step for all requests already
    in the batch, increasing their TPOT.
  napkin_math: 'Per-step KV bandwidth: 90 requests avg 1K context * 524KB/token =
    47.2GB. Model load: 16GB (8B BF16). Total: 63.2GB / 3.35TB/s = 18.9ms/step. Adding
    15 requests avg 512 context: +15*512*524KB = +4GB. New total: 67.2GB / 3.35TB
    = 20.1ms/step. TPOT inflation: +1.2ms = +6.3% for existing requests. To keep TPOT
    inflation <5%: add at most 11 requests (11*512*524KB = 2.9GB, +8.7% of 47.2GB
    KV: 63.2+2.9=66.1GB, 19.7ms, +4.2% inflation).'
