title: Evaluating Cold Restart vs Warm Recovery
scenario: You are architecting the fault tolerance strategy for a 2,048 A100 GPU cluster training a 100B parameter model. The cluster experiences roughly one node failure per day. Currently, the orchestrator handles this via a full 'Cold Restart': killing all distributed processes, provisioning a replacement node, and reloading the 1.2TB global checkpoint from S3 in 15 minutes. A senior engineer proposes a complex 'Warm Restart' system to reduce recovery time to 2 minutes by keeping surviving processes alive and synchronously replicating state in CPU RAM.
question: Should you approve the 2-minute warm restart system or keep the 15-minute cold restart architecture, and why?
details:
  realistic_solution: Reject the warm restart proposal. The quantitative gain in daily Goodput is less than 1%. Instead, maintain the cold restart architecture but optimize its pipeline (e.g., using PyTorch Distributed Checkpointing to read directly from S3 in parallel or caching to node-local NVMe) to ensure architectural simplicity and avoid risking OOM errors.
  common_mistake: |
    **The Pitfall:** Blindly optimizing for Recovery Time Objective (RTO) without calculating the cluster-level ROI.
    **The Rationale:** Candidates automatically approve the warm restart proposal because "2 minutes is better than 15 minutes," ignoring distributed systems complexity and failure frequency.
    **The Consequence:** Wasting months of engineering effort building a fragile, memory-heavy replication system that delivers virtually zero measurable improvement to training throughput.
  napkin_math: |
    - **Cluster MTBF:** 24 hours (1,440 mins).
    - **Current Cold Restart:** Penalty = 15 mins. Uptime = 1,425 / 1,440 = 98.96%.
    - **Proposed Warm Restart:** Penalty = 2 mins. Uptime = 1,438 / 1,440 = 99.86%.
    - **Net Goodput improvement:** Only ~0.9% (13 mins/day).
    - **Conclusion:** **The massive engineering cost and RAM overhead far outweigh a <1% efficiency gain.**
