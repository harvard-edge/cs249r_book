title: The Multi-Agent Consistency Problem
scenario: You're building a financial analysis system where 3 specialized agents (market data agent, SEC filing agent, news sentiment agent) independently gather information, then a synthesis agent combines their outputs. The market data agent takes 2s, SEC filing agent takes 8s (slow API), and news agent takes 1s. The synthesis agent needs all 3 inputs. Users currently see 'thinking...' for 8 seconds waiting for the slowest agent.
question: How would you redesign the 3-agent financial analysis system to show progressive results while preserving factual consistency?
details:
  realistic_solution: 'Three-pronged approach: (1) Staggered synthesis with confidence markers: When market data arrives at 2s, generate a ''preliminary analysis'' (explicitly labeled ''based on market data only — SEC filings pending''). When news arrives at 1s, update the synthesis. When SEC data arrives at 8s, generate the ''final analysis.'' Each intermediate result carries a completeness score (33%, 66%, 100%). (2) Optimistic concurrency with reconciliation: The synthesis agent maintains a ''fact ledger.'' When SEC data conflicts with the preliminary market analysis (e.g., revenue expectations differ), the synthesis agent highlights the conflict and explains the discrepancy rather than silently overwriting. (3) Pipeline optimization: Cache SEC filing retrievals aggressively (filings change quarterly, not per-request). Pre-fetch common filings during off-peak hours. This could reduce SEC agent from 8s to 500ms for cached filings (90% of requests). (4) Deadline-aware degradation: If 8s timeout is unacceptable, set a 3s deadline. If SEC agent hasn''t responded, proceed with 2/3 agents and note the gap.'
  common_mistake: |
    **The Pitfall:** Simply streaming partial results as each agent completes its task.
    **The Rationale:** Candidates prioritize fast initial render times but ignore the semantic impact on the final output.
    **The Consequence:** Creating a jarring UX where the synthesis text changes dramatically and contradicts itself when the slow SEC data arrives at 8s.
  napkin_math: |
    *   **Current Latency:** User waits $\max(2\text{s}, 8\text{s}, 1\text{s}) + 2\text{s synthesis} =$ **10s total**.
    *   **Staggered Synthesis:** First result renders at $\max(2\text{s}, 1\text{s}) + 1\text{s partial synthesis} =$ **3s**. Final result at 10s.
    *   **With SEC Caching:** Filings change rarely. If cache hit rate is 90%, P90 latency drops to $\max(2\text{s}, 0.5\text{s}, 1\text{s}) + 2\text{s} =$ **4s**. P99 remains 10s.
