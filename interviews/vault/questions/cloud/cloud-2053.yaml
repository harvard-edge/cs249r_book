title: The Multi-Agent Consistency Problem
scenario: You're building a financial analysis system where 3 specialized agents (market data agent, SEC
  filing agent, news sentiment agent) independently gather information, then a synthesis agent combines
  their outputs. The market data agent takes 2s, SEC filing agent takes 8s (slow API), and news agent
  takes 1s. The synthesis agent needs all 3 inputs. Users see 'thinking...' for 8 seconds waiting for
  the slowest agent. Redesign the system to provide progressive results while maintaining factual consistency
  when agents return conflicting information.
details:
  realistic_solution: 'Three-pronged approach: (1) Staggered synthesis with confidence markers: When market
    data arrives at 2s, generate a ''preliminary analysis'' (explicitly labeled ''based on market data
    only — SEC filings pending''). When news arrives at 1s, update the synthesis. When SEC data arrives
    at 8s, generate the ''final analysis.'' Each intermediate result carries a completeness score (33%,
    66%, 100%). (2) Optimistic concurrency with reconciliation: The synthesis agent maintains a ''fact
    ledger.'' When SEC data conflicts with the preliminary market analysis (e.g., revenue expectations
    differ), the synthesis agent highlights the conflict and explains the discrepancy rather than silently
    overwriting. (3) Pipeline optimization: Cache SEC filing retrievals aggressively (filings change quarterly,
    not per-request). Pre-fetch common filings during off-peak hours. This could reduce SEC agent from
    8s to 500ms for cached filings (90% of requests). (4) Deadline-aware degradation: If 8s timeout is
    unacceptable, set a 3s deadline. If SEC agent hasn''t responded, proceed with 2/3 agents and note
    the gap.'
  common_mistake: Simply streaming partial results as each agent completes. This creates a jarring UX
    where the synthesis changes dramatically when the SEC data arrives at 8s — potentially contradicting
    what was shown at 2s based on market data alone.
  napkin_math: 'Without streaming: user waits max(2s, 8s, 1s) + 2s synthesis = 10s. With staggered synthesis:
    first result at max(2s, 1s) + 1s partial synthesis = 3s. Final result still at 10s but perceived latency
    is 3s. With SEC caching (90% hit): P90 latency = max(2s, 0.5s, 1s) + 2s = 4s. P99 (cache miss): 10s.
    Daily SEC API calls: 100K queries × 10% miss = 10K API calls vs 100K without cache.'
