title: Training Time Estimation for Large Language Models
scenario: You must train a 10B parameter model on 1 Trillion tokens using a cluster of 256 H100 GPUs (989 TFLOP/s FP16 tensor).
question: Formulate an equation for the total compute required in FLOPs, and estimate the training time assuming 40% Model Flops Utilization (MFU).
details:
  realistic_solution: |
    Total FLOPs = 6 * Parameters * Tokens = 6 * 10e9 * 1e12 = 6e22 FLOPs. Cluster throughput = 256 GPUs * 989e12 FLOPs/s * 0.40 MFU = ~1.01e17 FLOPs/s. Training time = 6e22 FLOPs / 1.01e17 FLOPs/s = ~5.94e5 seconds, or roughly 6.8 days.
  common_mistake: |
    **The Pitfall:** Using 2 * P * T instead of 6 * P * T.
    **The Rationale:** Candidates forget the factor of 3x for the backward pass gradients and activations compared to the forward pass.
    **The Consequence:** The training time is underestimated by a factor of 3, leading to severe project misplanning.
  napkin_math: |
    - **Total FLOPs:** 6 * Parameters * Tokens = 6 * 10e9 * 1e12 = **6e22 FLOPs** (60 ZFLOPs).
    - **Cluster Throughput:** 256 GPUs * 989e12 FLOPs/s * 0.40 MFU = **~1.01e17 FLOPs/s**.
    - **Training Time:** 6e22 FLOPs / 1.01e17 FLOPs/s = ~5.92e5 seconds.
    - **Final Time:** 5.92e5 seconds / 86400 = **~6.8 days**.
