title: Optimizing IO-Aware Attention on AMD MI300X for Large Sequence Models
scenario: You are tasked with deploying a large language model with extremely long sequence lengths on an AMD MI300X GPU. Standard attention mechanisms are quickly bottlenecked by memory I/O and on-chip SRAM capacity.
question: How would you adapt FlashAttention-style tiling and online softmax to MI300X for long-sequence LLM inference?
details:
  realistic_solution: 'The solution involves a multi-pronged approach: (1) **IO-Aware Tiling:** Break the attention computation into smaller blocks (tiles) that fit within the fast on-chip SRAM. This minimizes costly transfers between HBM3 and SRAM. (2) **Online Softmax:** Instead of computing the entire attention matrix and then applying softmax, the softmax normalization factors are updated incrementally ''online''. This avoids materializing the full attention matrix in HBM3. (3) **Hardware-Specific Optimization:** The tiling strategy must be tuned to the SRAM size and HBM3 bandwidth to ensure that data fetches are efficiently pipelined and that the compute units are continuously fed, maximizing the use of the 5.3 TB/s link.'
  common_mistake: |
    **The Pitfall:** Focusing primarily on the FP16 compute capacity without adequately addressing memory bandwidth and on-chip memory constraints.
    **The Rationale:** Naive attention implementations become memory-bound long before they become compute-bound, especially with large sequence lengths.
    **The Consequence:** Significant underutilization of the GPU's potential and out-of-memory errors due to materialized intermediate attention scores.
  napkin_math: |
    * Intermediate attention scores size: N x N matrix.
    * For FP16, this is 2 * N^2 bytes.
    * Sequence length N=65536, full attention matrix is 2 * (65536)^2 = 8.58 GB.
    * Moving 8.58 GB to SRAM purely for softmax is prohibitive.
    * With FlashAttention, processing K/V-tiles of size C=256 and D=2048: 256 * 2048 * 2 bytes = 1 MB.
    * Streaming 1 MB at 5.3 TB/s bandwidth takes ~0.18 microseconds.
    * **Result: IO-aware tiling keeps the compute pipeline completely busy without OOMing.**
