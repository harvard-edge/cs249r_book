title: The Chinchilla Time Tax
scenario: According to Chinchilla scaling laws, training a 70B parameter model optimally requires approximately 5.8 x 10^23 FLOPs.
question: Assuming 100% hardware utilization, how long would it take to complete this 5.8x10^23 FLOP training run on a single NVIDIA H100 GPU?
details:
  realistic_solution: Divide the total number of FLOPs required for the training run by the per-second performance of the hardware, then convert the seconds into years. This illustrates why large-scale distributed training is absolutely necessary.
  common_mistake: |
    **The Pitfall:** Mismatching the orders of magnitude for compute or treating the GPU's performance as PFLOPS/s instead of TFLOPS/s.
    **The Rationale:** Candidates rush the mental math and drop crucial zeroes from scientific notation.
    **The Consequence:** Submitting a wildly incorrect training time estimate that makes an infeasible project seem possible.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Compute: 5.8e23 FLOPs.
       - Hardware: Single NVIDIA H100 GPU (989 TFLOPS FP16 peak = 9.89e14 FLOPs/s).
       - Utilization: 100%.
    2. **Calculations:**
       - Time (seconds) = 5.8e23 / 9.89e14 = 5.86e8 seconds.
       - Time (years) = 586,450,960 / (3600 * 24 * 365) ≈ 18.59 years.
    3. **Conclusion & Interpretation:** **It would take ~6,800 days (18.6 years), proving large-scale distributed training is mandatory.**
  options:
  - ~6.8 days.
  - ~6,800 days.
  - ~1,130 days.
  - ~2,980 days.
  correct_index: 1
