title: The Chinchilla Time Tax
scenario: According to Chinchilla scaling laws, training a 70B parameter model optimally requires approximately
  5.8 x 10²³ FLOPs. Explain how you would estimate the time it would take to complete this training run
  on a single NVIDIA H100 GPU, assuming 100% hardware utilization.
question: "How long would 5.8×10²³ FLOPs take on one H100 at 989 TFLOPS with 100% utilization?"
details:
  realistic_solution: To estimate the training time, you divide the total number of FLOPs required for
    the training run by the per-second performance of the hardware. First, you get the H100's FP16 performance,
    which is 989 TFLOPS (989 × 10¹² FLOPs/sec). Then, you divide the total 5.8 × 10²³ FLOPs by this value.
    Finally, you convert the resulting time in seconds to a more human-readable unit like days to understand
    the feasibility. The calculation demonstrates that training a model of this scale on a single GPU
    would take thousands of years, illustrating why large-scale distributed training is necessary.
  common_mistake: The most common mistake is mismatching the orders of magnitude for compute, for example,
    confusing the total FLOPs (in the 10²³ range) with PetaFLOPs (10¹⁵), or treating the GPU's performance
    in TFLOPS/s (10¹²) as PFLOPS/s (10¹⁵). This can lead to an answer that is off by a factor of 1,000
    or more, making an infeasible project seem possible.
  napkin_math: 'Total FLOPs = 5.8 * 10^23. An H100 provides 989 TFLOPS (9.89 * 10^14 FLOPs/sec). Assuming
    100% hardware utilization, the time T = (5.8 * 10^23) / (9.89 * 10^14) = 5.86 * 10^8 seconds. Converting
    to years: 586,450,960s / (3600s * 24h * 365d) = 18.59 years. This proves why large-scale distributed
    training on massive clusters is mandatory.'
  options:
  - ~6.8 days.
  - ~6,800 days.
  - ~1,130 days.
  - ~2,980 days.
  correct_index: 1
