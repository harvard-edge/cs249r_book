title: 'Fault Tolerance: Optimize Checkpoint Write Throughput on Lustre Filesystem'
scenario: Your 256 H100 training job writes checkpoints to a Lustre filesystem at only 15 GB/s (measured) vs the theoretic 200 GB/s peak. Each checkpoint is 140GB and takes 9.3 seconds.
question: "Diagnose the Lustre bottleneck and explain how to tune it to reach at least 120 GB/s?"
details:
  realistic_solution: 'Common Lustre bottlenecks: (1) Default stripe count = 1 (single OSS) → fix: stripe across all OSSs. (2) All ranks writing at the same time with lock contention on MDT. (3) Small I/O requests (4KB vs optimal 64MB). Profile with lfs and iostat.'
  common_mistake: |
    **The Pitfall:** Blaming network bandwidth automatically.
    **The Rationale:** Engineers assume slow storage writes are purely a network constraint.
    **The Consequence:** Wasting time debugging network fabrics without profiling whether the bottleneck is metadata ops, stripe misconfiguration, or node-level I/O serialization.
  napkin_math: |
    - Observed: 15 GB/s. 140GB checkpoint takes 140GB / 15GB/s = **9.3 seconds**.
    - If stripe count = 1: the workload is bottlenecked by a single OSS performance and contention.
    - Fix: stripe count = 32 OSSs (`lfs setstripe -c 32`).
    - 32 OSSs provide ~200 GB/s aggregate bandwidth.
    - Expected checkpoint time: 140GB / 200 GB/s = **0.7 seconds**.
    - With 64MB stripe size: 256 nodes writing 547MB each = 8.5 large I/O ops per node → minimal lock contention.
    - Realistic target 120 GB/s = 1.17 seconds. Speedup: 9.3 / 1.17 = **7.9x**.
