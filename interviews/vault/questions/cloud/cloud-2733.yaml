title: Copper vs Optical Cost Break-even
scenario: You need 200 links at 400G. Within a rack (1m), passive copper DAC costs $50/cable. Between racks (10m), you need optical transceivers at $400/pair + $20/fiber.
question: "What is the total cabling cost for 150 intra-rack 400G copper links and 50 inter-rack optical links?"
details:
  realistic_solution: 'Intra-rack (150 links, 1m passive copper): 150 × $50 = $7,500. Inter-rack (50 links, 10m optical): 50 × ($400 + $20) = 50 × $420 = $21,000. Total mixed: $28,500. If all optical: 200 × $420 = $84,000. Savings from mixed approach: $84,000 - $28,500 = $55,500 (66% savings). If you tried passive copper for inter-rack (10m): link budget would fail at 400G — the signal cannot survive 10m of copper attenuation at PAM4 frequencies. You would get link errors and retransmissions, effectively reducing bandwidth. The link budget forces the technology choice: copper within rack, optical between racks.'
  common_mistake: |
    **The Pitfall:** Specifying optical fiber for everything to 'simplify' the architecture, or conversely, attempting to use passive copper between racks.
    **The Rationale:** Candidates fail to understand physical layer constraints; passive copper is vastly cheaper but cannot survive 10m of attenuation at 400G PAM4 frequencies.
    **The Consequence:** Either burning tens of thousands of dollars on unnecessary optical transceivers, or designing a network with severe link errors and packet drops due to copper attenuation.
  napkin_math: |
    - Intra-rack copper: 150 × $50 = $7,500.
    - Inter-rack optical: 50 × ($400 + $20) = 50 × $420 = $21,000.
    - Total mixed cost = **$28,500**.
    - All-optical cost = 200 × $420 = $84,000.
    - **Mixed approach saves $55,500 (66% savings).**
