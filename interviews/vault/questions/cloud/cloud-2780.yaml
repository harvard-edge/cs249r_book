title: WUE Metric Explained
scenario: A sustainability officer asks how much water your AI training cluster consumes. Explain the
  Water Usage Effectiveness (WUE) metric and why cooling AI clusters is a growing water sustainability
  concern.
question: "What is Water Usage Effectiveness, and why is cooling AI training clusters a growing water sustainability concern?"
details:
  realistic_solution: 'Water Usage Effectiveness (WUE) measures the ratio of total water consumed (liters)
    to IT equipment energy (kWh): WUE = Annual Water Use / Annual IT Energy. A WUE of 1.8 L/kWh means
    the datacenter uses 1.8 liters of water for every kWh of IT energy consumed. Why AI clusters are worse:
    (1) AI accelerators (H100: 700W TDP) produce extreme heat density — a single rack can exceed 100kW.
    (2) High-density racks require aggressive cooling, often evaporative cooling towers that consume water.
    (3) Training runs are sustained 24/7 at maximum power for weeks, unlike bursty web workloads. (4)
    Clusters are often built in regions with cheap power (often arid regions with solar), where water
    is scarce. Industry benchmarks: Google reports WUE ~1.1 L/kWh. Microsoft ~1.8 L/kWh. Training GPT-3
    reportedly consumed ~700,000 liters of water. As AI compute scales 10x every 2 years, water consumption
    becomes a material sustainability and community relations issue.'
  common_mistake: Thinking datacenters only use electricity. Many cooling systems consume enormous amounts
    of water through evaporative cooling towers, especially in hot climates.
  napkin_math: 'GPT-4 training: ~50 GWh energy × WUE 1.5 L/kWh ≈ 75M liters. That is ~30 Olympic swimming
    pools of water for one training run.'
