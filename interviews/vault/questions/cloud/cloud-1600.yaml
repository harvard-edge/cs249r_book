title: Diagnosing TensorRT Dynamic Shape Spikes
scenario: You are optimizing a PyTorch-based Transformer model for inference on NVIDIA A10G GPUs. You
  export the model to ONNX and compile it to a TensorRT engine using `trtexec` with dynamic axes enabled
  for sequence length. While P99 latency improves from 45ms to 12ms for a fixed sequence length of 128,
  production traffic with varying sequence lengths (32 to 512) causes the TensorRT engine to exhibit massive
  latency spikes up to 200ms and occasional OOM errors, whereas the original PyTorch model handled these
  variations predictably. Analyze the root cause of this severe performance degradation in the compiled
  format.
question: "Why does the TensorRT engine spike to 200ms and OOM on sequence lengths 32–512, and how should the dynamic shapes be configured?"
details:
  realistic_solution: TensorRT requires explicit Optimization Profiles (Min, Opt, Max shapes) at compile
    time to handle dynamic axes efficiently. If requests fall outside the specified profile or if profiles
    are missing, TensorRT triggers expensive runtime memory reallocations and falls back to unoptimized
    kernels. The fix is compiling the engine with explicit bounds (e.g., `--minShapes=input:1x32`, `--optShapes=input:1x128`,
    `--maxShapes=input:1x512`) to ensure proper ahead-of-time kernel selection and memory pre-allocation.
  common_mistake: Assuming TensorRT handles dynamic shapes natively at runtime exactly like PyTorch. Candidates
    often wrongly diagnose this as a batching configuration issue or a memory leak in the serving layer.
  napkin_math: 'PyTorch at seq=512: ~150ms. TensorRT without max profile: triggers reallocation overhead
    (>100ms) + suboptimal kernel -> ~200ms. TensorRT with max=512 profile: statically allocates activation
    workspace for seq=512 at load time, runs optimal kernel -> ~40ms. Pre-allocation eliminates the 100ms+
    allocation spikes and OOMs.'
