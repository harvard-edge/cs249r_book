title: NCCL AllReduce vs Backward Compute Overlap on a 4-GPU T4 Box
scenario: You are training a small classification model on 4x T4 GPUs (PCIe Gen3 x16, ~12 GB/s per link, no NVLink, NCCL over PCIe). Per-step backward compute = 90 ms; the gradient AllReduce moves a 2 GB FP32 gradient over a logical PCIe ring. You can either run AllReduce in a separate NCCL stream with bucketed overlap (bucket size 64 MB, AllReduce kicked off as each bucket completes during backward) or run a single AllReduce after backward finishes. Compute total step time under each approach and identify the point at which doubling the bucket size stops helping.
question: "On 4x T4s with no NVLink and a 2 GB FP32 gradient over PCIe, what does bucketed AllReduce overlap save versus a post-backward single AllReduce, and where do bucket-size returns diminish?"
details:
  realistic_solution: 'Single post-backward AllReduce: bus traffic = 2*(3/4) * 2 GB = 3 GB on a logical PCIe ring at ~12 GB/s -> 250 ms. Step time = 90 ms backward + 250 ms comm = 340 ms (no overlap). Bucketed AllReduce (64 MB buckets): backward completes one bucket every ~2.8 ms, AllReduce of one 64 MB bucket = 2*(3/4) * 64 MB / 12 GB/s \approx 8 ms. Because communication (8 ms per bucket) is slower than compute (~2.8 ms per bucket), the step is communication-bound. The GPU finishes backward in 90 ms, but the PCIe bus is fully saturated and continues transmitting the remaining buckets. The total time is the time to compute the first bucket plus the total communication time: ~3 ms + 250 ms = 253 ms (a ~1.34x speedup over no-overlap). Doubling bucket size beyond 256 MB stops helping because it increases the wait time for the first bucket (e.g., a 1 GB bucket takes 45 ms to compute before its 125 ms AllReduce starts), pushing the total step time up again.'
  common_mistake: 'Computing AllReduce time as `payload / bandwidth = 2 GB / 12 GB/s = 167 ms` and forgetting the 2*(N-1)/N ring factor (under-counts bus traffic by ~50% for N=4). Another massive mistake is assuming communication perfectly hides inside compute without checking which one is the bottleneck; here, communication (250 ms) is much longer than compute (90 ms), so the step is comm-bound, not compute-bound.'
  napkin_math: 'Gradient = 2 GB FP32. Ring AllReduce traffic = 2*(3/4) * 2 GB = 3 GB. PCIe ring effective bandwidth \approx 12 GB/s. Single AllReduce = 3 / 12 = 250 ms. Step without overlap = 90 + 250 = 340 ms. Bucketed (64 MB): backward fills one bucket every ~2.8 ms. AllReduce takes 8 ms per bucket. Since 8 ms > 2.8 ms, communication dominates. Total time = compute_first_bucket + total_comm = 2.8 ms + 250 ms = 252.8 ms. Speedup = 340 / 253 \approx 1.34x.'
