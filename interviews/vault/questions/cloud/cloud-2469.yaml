title: Edge-Triggered Cloud Telemetry
scenario: 'A fleet of 10,000 autonomous delivery robots collects 1TB of multi-camera video per day per robot. You need to train a cloud-based pedestrian intent model. Uploading all data via 5G costs $1/GB ($10M/day). You only need rare edge-case interactions constituting <0.1% of the data.'
question: 'How would you selectively ingest rare pedestrian edge cases from 10,000 robots within a $500/day 5G budget?'
details:
  realistic_solution: 'Deploy a lightweight "shadow" model or uncertainty-estimation module on the edge NPU alongside the main navigation stack. Apply Active Learning on the edge: compute the entropy of the shadow model softmax outputs. When entropy exceeds a calibrated threshold (indicating high uncertainty), it triggers a 5-second video buffer upload. This converts the edge device into an intelligent data filter, uploading only high-signal samples.'
  common_mistake: |
    **The Pitfall:** Relying on simple heuristic triggers (e.g., hard braking).
    **The Rationale:** Candidates assume physical rules are sufficient, missing that they fail to capture subtle predictive intent failures and create heavily biased datasets.
    **The Consequence:** The model trains on a skewed dataset of emergency events, failing to generalize to everyday navigation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: $500/day at $1/GB = 500 GB/day limit.
       - 10,000 robots.
    2. **Calculations:**
       - Per robot allowance: 500 GB / 10,000 = 50 MB/day.
       - 5 seconds of compressed 1080p video = ~10 MB.
    3. **Conclusion & Interpretation:**
       - **Result: An active learning threshold triggers ~5 uploads per day per robot, perfectly matching the $500 budget (Bandwidth-Bound).**
