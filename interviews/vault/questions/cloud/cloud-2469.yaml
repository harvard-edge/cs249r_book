title: Edge-Triggered Cloud Telemetry
scenario: 'A fleet of 10,000 autonomous delivery robots collects 1TB of multi-camera video per day per robot. You need to train a new cloud-based pedestrian intent model. Uploading all data via 5G costs $1/GB, which is mathematically impossible ($10M/day). However, you only need rare ''edge case'' interactions which constitute <0.1% of the data.'
question: 'How would you selectively ingest rare pedestrian edge cases from 10,000 robots within a $500/day 5G budget?'
details:
  realistic_solution: 'Deploy a lightweight ''shadow'' model or an uncertainty-estimation module on the edge robot''s NPU. This model runs parallel to the main navigation stack. Use active learning techniques on the edge: compute the entropy of the model''s softmax outputs, or use a small ensemble to measure variance. When the model exhibits high uncertainty (entropy > threshold) or when the shadow model predicts a different trajectory than the main stack, it triggers a 5-second video buffer upload to the cloud. This converts the edge device into an intelligent data filter, ensuring only informative samples consume 5G bandwidth.'
  common_mistake: |
    **The Pitfall:** Relying on simple heuristic triggers (e.g., 'upload when the robot brakes hard').
    **The Rationale:** Candidates assume simple rules are sufficient, missing that they fail to capture subtle pedestrian intent failures and create a heavily biased dataset.
    **The Consequence:** The model trains on a skewed dataset of only emergency events, failing to generalize to everyday navigation.
  napkin_math: |
    1. Budget: $500/day at $1/GB = 500 GB/day allowed upload.
    2. Per robot allowance: 500 GB / 10,000 robots = 50 MB/day per robot.
    3. 5 seconds of compressed 1080p video = ~10 MB.
    4. **Conclusion: An active learning threshold triggers ~5 uploads per day per robot (50MB), perfectly matching the budget.**
