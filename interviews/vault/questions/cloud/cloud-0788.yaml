title: The Thermal Memory Wall
scenario: >-
  Your H200 cluster is processing a massive batch inference job. `nvidia-smi` shows the GPU core
  temperature is a very safe 68°C. However, your memory bandwidth benchmark shows you are only achieving
  2.8 TB/s instead of the rated 4.8 TB/s.
question: >-
  What thermal component are you failing to monitor?
details:
  realistic_solution: 'You are monitoring the GPU Core temperature, but ignoring the **HBM Junction Temperature**. HBM3e is stacked 8 to 12 layers high directly adjacent to the GPU die. Because it is a dense 3D stack, it is incredibly difficult to cool. HBM modules have a strict maximum operating temperature (~95°C). While the GPU die is at 68°C, a heavy memory-bound workload generates massive heat within the memory stacks. If the HBM hits its limit, the memory controller downclocks the frequency, silently tanking your bandwidth.'
  common_mistake: |
    **The Pitfall:** Assuming GPU Core temperature reflects the entire package's thermal state.
    **The Rationale:** Candidates often ignore HBM Junction Temperature, falsely believing memory bandwidth is bottlenecked by the PCIe bus or other factors when the core is cool.
    **The Consequence:** Silently losing 40% of memory bandwidth and throughput without any error messages.
  napkin_math: |
    1. **Theoretical HBM3e bandwidth:** 4.8 TB/s at 6 GHz.
    2. **Thermal throttling:** If HBM hits 95°C, the controller may drop the clock to 3.5 GHz.
    3. **Effective bandwidth:** 4.8 × (3.5 / 6.0) = **~2.8 TB/s.**
