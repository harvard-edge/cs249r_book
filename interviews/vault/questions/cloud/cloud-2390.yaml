title: Preventing Thread Starvation in Ensembles
scenario: A primary prediction service aggregates outputs from 4 different ML microservices (Models A,
  B, C, D) using a thread pool of 500 threads. The strict SLA is 200ms. Model C suddenly experiences garbage
  collection pauses, causing its response time to hit the 200ms timeout limit. Within seconds, the entire
  aggregation service crashes, failing requests for all models.
question: "How would you keep Model C's 200ms pauses from exhausting the 500-thread aggregation service?"
details:
  realistic_solution: 'Implement the Bulkhead and Circuit Breaker patterns. The crash is caused by thread
    exhaustion: requests waiting on Model C tie up all 500 threads, leaving none for incoming requests.
    Architecture fix: 1) Partition the thread pool (Bulkhead) so Model C can use a maximum of 100 concurrent
    threads. 2) Implement a Circuit Breaker for Model C that trips when the P99 latency exceeds 150ms
    or error rate > 5%. 3) When the circuit is open, the aggregator instantly returns a default/fallback
    value for Model C (or drops its contribution) without blocking, allowing Models A, B, and D to continue
    serving successfully.'
  common_mistake: Increasing the thread pool size to 2000 to handle the blocked threads.
  napkin_math: Total throughput = 3,000 QPS. Model C latency jumps to 200ms (0.2s). By Little's Law, required
    threads for Model C = L = λW = 3,000 * 0.2 = 600 threads. Since the pool only has 500 threads, it
    exhausts in < 200ms. With a bulkhead of 100 threads for C, 400 threads remain for A, B, and D (which
    take 20ms -> λW = 3000 * 0.02 = 60 threads needed). The system remains highly available.
