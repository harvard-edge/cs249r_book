title: LLM Autoscaling and KV Cache Bottlenecks
scenario: You manage an LLM inference service using vLLM serving Llama-3-8B on single L4 GPUs (24GB VRAM). The Kubernetes HPA scales out when average GPU compute utilization exceeds 75%. During traffic bursts, P99 Time-To-First-Token (TTFT) degrades from 200ms to over 4 seconds, but GPU compute utilization peaks at 55%.
question: Why does TTFT exceed 4 seconds when GPU compute utilization stays below 75%, and what metric should autoscaling use instead?
details:
  realistic_solution: Reconfigure the autoscaler to trigger based on KV cache memory utilization (e.g., scaling at 75% KV cache usage) or the scheduler queue length (e.g., average waiting requests > 0) to provision capacity before requests queue.
  common_mistake: |
    **The Pitfall:** Relying on GPU compute utilization as the primary scaling metric for LLMs.
    **The Rationale:** Many engineers port standard microservice scaling logic to LLMs, forgetting that autoregressive generation is overwhelmingly memory-bound by KV cache capacity, not compute-bound.
    **The Consequence:** The autoscaler fails to trigger during high concurrency, causing catastrophic queueing delays and SLA breaches.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU: L4 with 24GB VRAM.
       - Model weights: 16GB. Overhead: ~2GB. Remaining for KV cache: ~6GB.
       - KV Cache per Token: 2 bytes * 32 layers * 1024 dim * 2 (K+V) = 128 KB.
       - Average response length: 1,500 tokens.
    2. **Calculations:**
       - Max Concurrent Tokens: 6GB / 128KB = 49,152 tokens.
       - Max Concurrent Requests: 49,152 tokens / 1,500 tokens ≈ 32 requests.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** At ~30 concurrent requests, the KV cache fills and requests queue up, causing severe TTFT degradation long before compute utilization hits 75%.
