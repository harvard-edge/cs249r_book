title: The Privacy vs. Churn Dilemma
scenario: 'You are the Staff ML Engineer at a company developing a new ''Smart Reply''
  feature for its mobile keyboard, which has 10 million users. The executive team
  wants to A/B test two approaches before a full rollout:'
question: Which Smart Reply approach—centralized or federated—should you choose for
  10 million users, and why?
details:
  realistic_solution: The correct answer is to choose the Centralized approach. While
    Federated Learning offers superior privacy, the economic impact of user churn
    is the dominant factor in its TCO. The small, negative user experience impact
    of battery drain, when scaled to millions of users, creates a massive financial
    loss that far exceeds the privacy risk cost of the centralized model. A Staff-level
    engineer must identify and quantify these second-order business metrics, not just
    the immediate technical costs.
  common_mistake: Engineers often fixate on the direct costs (compute, servers, headcount)
    and the primary benefit (privacy), completely ignoring the second-order, indirect
    costs hidden in user behavior metrics like churn. They see 'Federated Learning'
    and think 'privacy win' without quantifying the UX tax of on-device computation.
  napkin_math: We must calculate the annual TCO for both options.
  options:
  - Option A (Centralized), because the $350k compute cost is much lower than the
    $900k engineering headcount for Option B.
  - Option B (Federated), because the $1M data breach risk of the centralized model
    is an unacceptable business liability.
  - Option A (Centralized), because the annual cost from user churn in the federated
    model (~$3M) is the single largest expense and far outweighs its privacy benefits.
  - Option B (Federated), because it avoids centralizing PII, and the $5 LTV is too
    small to worry about a minor churn increase.
  correct_index: 2
