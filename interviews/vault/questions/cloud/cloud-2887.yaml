title: Realizing Activation Checkpointing in a ZeRO-3 + Tensor-Parallel Hybrid Configuration
scenario: You are deploying a 65B model training job on 32x H100 using DeepSpeed ZeRO-3 with tensor parallelism degree 4. Activation memory profiling shows 22 GB per GPU before checkpointing. ZeRO-3 shards parameters and gradients across all 32 GPUs but does NOT shard activations (each tensor-parallel group of 4 GPUs holds a full copy of the activation tensors for its pipeline stage).
question: What happens to the 22 GB/GPU activation memory when DeepSpeed activation checkpointing is enabled, and how does it interact with TP=4?
details:
  realistic_solution: 'With TP=4, activations for each layer are already split: Q/K/V projections are column-parallel (activation split across TP group), MLP is row-parallel. When `checkpoint_activations=True`, DeepSpeed discards all intermediate activations between checkpoints and recomputes them during backward. The TP communication (AllReduce for row-parallel layers) is re-executed during recompute. This is correct but adds collective communication overhead.'
  common_mistake: |
    **The Pitfall:** Assuming ZeRO-3 activation checkpointing will shard activation tensors across the data-parallel dimension.
    **The Rationale:** Candidates wrongly assume ZeRO-3 shards all memory structures, including activations.
    **The Consequence:** They miscalculate memory requirements, leading to unexpected OOMs when activations remain fully local to each GPU.
  napkin_math: |
    1. Pre-checkpointing memory is 22 GB per GPU for 80 layers.
    2. Checkpointing into 4 segments (20 layers each) maintains 1 active segment during backward pass.
    3. Active segment memory: 22 GB / 4 = 5.5 GB/GPU.
    4. TP AllReduce recompute overhead: 2 * 4 * T_allreduce * 20 segments = 40 ms per backward.
    5. **Result: This creates an ~8% compute overhead at 500 ms/step, but safely reduces memory to 5.5 GB.**
