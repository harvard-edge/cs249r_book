title: Real-Time Feature Pipeline Latency
scenario: Your recommendation model uses 200 features, 150 of which are pre-computed (served from a feature store with 5 ms P99) and 50 are real-time (computed on-the-fly from the last 5 minutes of user activity). The real-time features require reading from a streaming event bus and running a 10-node aggregation DAG. P99 feature assembly time is 45 ms. You need to reduce it to under 15 ms to meet the end-to-end SLO. Design the architecture change.
question: What architecture change would cut P99 feature assembly from 45 ms to under 15 ms for the 50 real-time features?
details:
  realistic_solution: 'The streaming event bus adds ~40 ms of P99 latency (Kafka consumer group lag + deserialization). Fix: move real-time feature aggregation to a push-based architecture. (1) Pre-aggregate: run the 10-node DAG continuously as events arrive, maintaining a stateful user feature cache (e.g., Redis Streams or RocksDB). When a user triggers a recommendation request, the aggregated features are already computed and cached — lookup latency = O(1) cache read, ~1 ms P99. (2) Incremental update: on each user event (click, view, search), push an update to the user feature cache with the new aggregated values. The cache serves as a low-latency snapshot of the aggregation DAG output. (3) Fallback: for new users with no cache entry, use batch pre-computed features from the feature store (5 ms). P99 after change: 5 ms (feature store) + 1 ms (real-time cache) + 9 ms (model inference) = 15 ms — meets SLO.'
  common_mistake: Trying to optimize the DAG computation speed. The bottleneck is not compute but the streaming event bus read latency — pulling from Kafka/Kinesis at P99 adds 30+ ms of tail latency from consumer lag.
  napkin_math: 'Current P99: 5 ms (batch features) + 45 ms (real-time) = 50 ms total feature assembly. Real-time DAG: 10 nodes, Kafka consumer P99 = 30 ms, computation = 5 ms, serialization = 10 ms. After pre-aggregation: Redis GET P99 = 1 ms. New P99: 5 + 1 = 6 ms for feature assembly. Model inference: 9 ms (ranking 1k candidates). Total: 6 + 9 = 15 ms. Cache write throughput needed: DAU 50M users × 10 events/user/day = 500M events/day ≈ 5,787 events/s cache writes. At 1 KB per user state: ~5.8 MB/s writes to Redis — trivial.'
