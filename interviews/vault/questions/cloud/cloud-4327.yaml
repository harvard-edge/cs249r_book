title: Real-Time Feature Pipeline Latency
scenario: Your recommendation model uses 200 features, 150 of which are pre-computed (served from a feature store with 5 ms P99) and 50 are real-time (computed on-the-fly from the last 5 minutes of user activity). The real-time features require reading from a streaming event bus and running a 10-node aggregation DAG. P99 feature assembly time is 45 ms.
question: What architecture change would cut P99 feature assembly from 45 ms to under 15 ms for the 50 real-time features?
details:
  realistic_solution: 'The streaming event bus adds ~40 ms of P99 latency (Kafka consumer group lag + deserialization). Fix: move real-time feature aggregation to a push-based architecture. (1) Pre-aggregate: run the 10-node DAG continuously as events arrive, maintaining a stateful user feature cache (e.g., Redis Streams or RocksDB). When a user triggers a recommendation request, the aggregated features are already computed and cached — lookup latency = O(1) cache read, ~1 ms P99. (2) Incremental update: on each user event (click, view, search), push an update to the user feature cache with the new aggregated values. The cache serves as a low-latency snapshot of the aggregation DAG output. (3) Fallback: for new users with no cache entry, use batch pre-computed features from the feature store (5 ms). P99 after change: 5 ms (feature store) + 1 ms (real-time cache) + 9 ms (model inference) = 15 ms — meets SLO.'
  common_mistake: |
    **The Pitfall:** Trying to optimize the DAG computation speed.
    **The Rationale:** Engineers often assume computation is the bottleneck.
    **The Consequence:** Wasting effort on compute optimization when the bottleneck is actually the streaming event bus read latency (pulling from Kafka/Kinesis at P99 adds 30+ ms of tail latency from consumer lag).
  napkin_math: |
    * Current total feature assembly P99: 50 ms (5 ms for batch + 45 ms for real-time).
    * Real-time DAG breakdown: 30 ms Kafka consumer P99 + 5 ms compute + 10 ms serialization = 45 ms.
    * After pre-aggregation to Redis: Redis GET P99 = 1 ms.
    * New feature assembly P99: 5 ms (feature store) + 1 ms (Redis) = 6 ms.
    * Model inference: 9 ms.
    * Total P99: 6 ms + 9 ms = 15 ms.
    * Write throughput: 50M DAU × 10 events/day = 500M events/day ≈ 5,787 events/s.
    * **At 1 KB per state, this requires ~5.8 MB/s writes to Redis, easily meeting the <15 ms SLO.**
