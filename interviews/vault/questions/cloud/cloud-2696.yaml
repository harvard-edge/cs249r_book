title: Why GPUDirect Storage Eliminates the CPU Bounce Buffer
scenario: 'In traditional data loading, data travels: NVMe SSD → CPU RAM → GPU VRAM. Explain why GPUDirect
  Storage bypasses CPU RAM and why this matters for training data throughput.'
details:
  realistic_solution: 'Traditional path: (1) NVMe SSD → PCIe → CPU RAM (DMA transfer). (2) CPU copies
    data from kernel buffer to user-space buffer (CPU memcpy). (3) User-space buffer → PCIe → GPU VRAM
    (cudaMemcpy). This ''bounce buffer'' through CPU RAM has three costs: (a) Double PCIe traversal —
    data crosses the PCIe bus twice (SSD→CPU, CPU→GPU), halving effective bandwidth. (b) CPU memory bandwidth
    consumed — the CPU memcpy between kernel and user buffers uses CPU DRAM bandwidth, competing with
    data preprocessing. (c) CPU core utilization — the copy operations consume CPU cycles that could be
    used for data augmentation or preprocessing. GPUDirect Storage uses DMA to transfer directly: NVMe
    SSD → PCIe → GPU VRAM in one hop. The GPU''s DMA engine pulls data directly from the NVMe controller.
    Benefits: PCIe bandwidth used once (not twice), CPU RAM freed for other uses, CPU cores freed for
    preprocessing. This matters when training on large datasets (ImageNet, video) where data loading becomes
    the bottleneck.'
  common_mistake: Thinking GPUDirect Storage only helps with bandwidth. The bigger benefit is often freeing
    CPU cores and memory bandwidth for data preprocessing, which is the actual bottleneck in many training
    pipelines.
  napkin_math: 'Traditional: 2× PCIe traversals, ~7 GB/s effective (limited by CPU memcpy). GPUDirect:
    1× PCIe, ~12 GB/s from NVMe directly. ~1.7x throughput improvement.'
