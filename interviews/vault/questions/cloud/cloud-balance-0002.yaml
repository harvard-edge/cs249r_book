title: Schema Validation CPU Budget
scenario: A data validation job checks 400 million records/day. The full schema check costs 0.04 ms per record. Estimate daily CPU-seconds and decide whether 16 CPU cores can run it within one hour.
question: Can 16 CPU cores validate 400M records in one hour if each record costs 0.04 ms?
details:
  realistic_solution: Total CPU time is 400M x 0.00004 s = 16,000 CPU-seconds. Sixteen cores provide 57,600 CPU-seconds in one hour, so the job fits with about 3.6x headroom.
  common_mistake: Comparing record count to cores without converting per-record cost into CPU-seconds.
  napkin_math: CPU = 400,000,000 x 0.00004 = 16,000 s. Capacity = 16 x 3,600 = 57,600 CPU-s.
