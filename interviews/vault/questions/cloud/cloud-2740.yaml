title: Technical Debt Reduction Strategy
scenario: 'Your ML platform has severe technical debt: pipeline jungles, configuration sprawl, and no data lineage tracking. Leadership gives you 6 months and 4 engineers. Options: (A) full rewrite from scratch, (B) incremental strangler pattern migration, (C) focus only on adding observability/lineage without refactoring pipelines.'
question: "Should the 4-engineer team choose a full rewrite, strangler migration, or observability-only for the 6-month debt effort, and why?"
details:
  realistic_solution: 'Option A (full rewrite): High risk. Rewrites of production ML platforms historically take 2-3x longer than planned. During the rewrite, you must maintain the old system. With 4 engineers, you cannot staff both — the old system degrades further while the new one is incomplete. Second-system syndrome is a real threat. Option B (strangler pattern): Incrementally replace components while the old system runs. Start with the highest-debt component (e.g., feature pipeline jungle) and wrap it in a clean interface. Each replaced component immediately reduces maintenance burden. Lower risk: if you run out of time, you have partial improvement instead of nothing. Option C (observability only): Cheapest and fastest, but treats symptoms not causes. You can see the debt but still pay for it. Useful as a first step within option B. Recommendation: B, starting with C as the first milestone. Add data lineage and config management first (month 1-2), then incrementally refactor the worst pipeline jungles (months 3-6).'
  common_mistake: |
    **The Pitfall:** Choosing the full rewrite (A).
    **The Rationale:** Engineers often underestimate the hidden requirements of legacy systems and overestimate their ability to build a perfect new system quickly.
    **The Consequence:** Rewrites of production ML systems almost always take 2-3x longer than estimated, and the old system must be maintained in parallel, doubling operational burden and risking project failure.
  napkin_math: |
    1. **Option A:** 6-month plan -> likely 12-18 months actual, high risk of total failure.
    2. **Option B:** Delivers value monthly, **~60% debt reduction in 6 months**.
    3. **Option C:** ~20% maintenance reduction (visibility), no structural fix.
