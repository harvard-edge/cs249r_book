title: Diagnosing P99 Inference Jitter from NIC Interrupts
scenario: You are running a real-time speech-to-text inference service on an 8-GPU server equipped with dual 100Gbps NICs and NVMe storage. Despite a steady GPU execution time of 8ms, your p99 latency sporadically spikes to 25-30ms during heavy network activity. Profiling shows CPU submission threads feeding the GPUs are occasionally delayed.
question: How do you root-cause and resolve this latency jitter?
details:
  realistic_solution: 'Implement interrupt shielding. Pin GPU inference CPU threads to isolated cores via isolcpus, and configure IRQ affinity (smp_affinity) to route all NIC and NVMe hardware interrupts to dedicated housekeeping cores.'
  common_mistake: |
    **The Pitfall:** Relying solely on CPU thread priorities (`nice` values) to fix latency jitter.
    **The Rationale:** Engineers assume standard OS scheduling controls all preemption.
    **The Consequence:** Hardware interrupts (IRQs) from the NIC bypass standard priorities entirely, meaning `nice` has zero effect and spikes persist.
  napkin_math: |
    **Assumptions & Constraints:**
    - NIC Traffic: 100Gbps NIC handling 8M packets/sec with 50µs coalescing.
    - IRQ Rate: Generates 20,000 IRQs/sec.
    - Context Switch Cost: ~10µs overhead per IRQ.

    **Calculations:**
    - Stolen CPU Time: 20,000 * 10µs = 200ms per second (20% of a core's time).

    **Conclusion & Interpretation:**
    - **Result: 200ms Stolen CPU Time (CPU-Bound Preemption)**. If GPU launch threads run on cores handling IRQs, they are physically preempted, causing the direct 15-20ms latency spikes.
