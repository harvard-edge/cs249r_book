title: Diagnosing Low MFU in LLM Training
scenario: You are training a 175B parameter LLM on a cluster of 1024 A100 GPUs using tensor parallelism (TP=8) and pipeline parallelism (PP=16). The theoretical peak throughput is 312 TFLOPS per GPU, but your run is only achieving 110 TFLOPS per GPU (~35% MFU).
question: What is the primary bottleneck behind the 35% MFU, and how would you change the pipeline schedule or micro-batch size?
details:
  realistic_solution: The low computational intensity is driven by pipeline parallelism bubbles and low arithmetic intensity from a small micro-batch size. By switching to an interleaved 1F1B pipeline schedule and increasing the micro-batch size to fully utilize the A100's SRAM bandwidth, you can increase the arithmetic intensity and push the sustained MFU to over 50%.
  common_mistake: |
    **The Pitfall:** Blaming the InfiniBand network bandwidth for the low MFU.
    **The Rationale:** Network limits are a common scapegoat for poor distributed scaling.
    **The Consequence:** Wasting time trying to optimize collective communications instead of fixing the actual bottleneck: massive pipeline bubbles and low arithmetic intensity from small micro-batch sizes.
  napkin_math: |
    - **Total Peak**: 1024 × 312 TFLOPS = 319 PFLOPS.
    - **Current Sustained**: 1024 × 110 TFLOPS = 112.6 PFLOPS (MFU = 35%).
    - **Pipeline Bubble Fraction**: With PP=16, bubble is `(p-1)/m`.
    - **Micro-batch Impact**: If micro-batches (`m`) is small (e.g., 32), the bubble is (16-1)/32 ≈ **47% idle compute time**.
