title: Buffer Bloat Causing Gradient Staleness
scenario: You are running asynchronous SGD with 64 parameter server workers on A100
  80GB nodes connected via 100 GbE. Workers are updating gradients every 500ms. You
  notice gradient staleness exceeding 5 steps for 20% of updates. Network monitoring
  shows switch buffers frequently reaching 80% capacity. Explain the connection between
  buffer bloat and gradient staleness.
question: How does switch buffer bloat cause >5-step gradient staleness, and what
  would you change to reduce it?
details:
  realistic_solution: Enable Active Queue Management (AQM) with CoDel or FQ-CoDel
    on the switch ports. Set the target queue delay to 5 ms (well under one gradient
    step of 500 ms). This keeps buffers shallow while avoiding drops. Also implement
    gradient compression (PowerSGD or TopK sparsification) to reduce the volume of
    traffic that triggers congestion.
  common_mistake: Treating buffer bloat as purely a throughput problem. Teams increase
    buffer sizes to prevent packet drops, not realizing this increases queuing delay
    from <1 ms to 50-200 ms, which directly causes gradient staleness in async training.
  napkin_math: '100 GbE switch buffer at 80% of 32 MB = 25.6 MB. Drain time: 25.6
    MB / (100 Gbps / 8) = 25.6 MB / 12.5 GB/s = 2.05 ms baseline. But with 64 workers
    bursting simultaneously: effective contention adds 64 × burst_size / bandwidth
    ≈ 50-200 ms. 200 ms / 500 ms step time = 0.4 steps of induced staleness, compounding
    with network variance.'
