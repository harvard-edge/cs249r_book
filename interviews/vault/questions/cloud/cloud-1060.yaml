title: Custom ASIC TCO Break-Even Evaluation
scenario: You are evaluating whether to design a custom ASIC for a stable, high-volume internal LLM inference workload. An off-the-shelf GPU costs $30,000 and delivers 1.6 effective PFLOPS. Developing a custom ASIC requires a $50M Non-Recurring Engineering (NRE) investment, but units cost only $2,000 to manufacture. Due to stripped-down programmability, the ASIC achieves 80% utilization on its 1.0 PFLOPS peak compute, delivering 0.8 effective PFLOPS per chip.
question: At what GPU-equivalent deployment scale does the custom ASIC break even, and what architectural risk must justify it?
details:
  realistic_solution: 'Normalize by effective throughput: 1 GPU (1.6 PFLOPS) requires 2 ASICs (0.8 PFLOPS) to match throughput. Cost equation: $30,000 * G = $50,000,000 + ($2,000 * 2) * G. The break-even is ~1,923 GPUs. Justified only if the model architecture is strictly frozen.'
  common_mistake: |
    **The Pitfall:** Comparing chip-to-chip costs without normalizing for effective throughput.
    **The Rationale:** Candidates compare the $30K GPU directly to the $2K ASIC, failing to realize the GPU does twice the effective work.
    **The Consequence:** The TCO calculation is completely wrong, leading to massive overestimation of the ASIC's ROI.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Effective Throughput: 1.6 PFLOPS.
       - ASIC Effective Throughput: 0.8 PFLOPS.
       - Equivalence: 1 GPU = 2 ASICs.
       - NRE: $50,000,000.
    2. **Calculations:**
       - Cost Equation (G = GPUs): $30,000 * G = $50,000,000 + (2 * $2,000) * G.
       - $26,000 * G = $50,000,000.
       - G = 1,923.07.
    3. **Conclusion & Interpretation:**
       - **Result: Capital-Bound. The project breaks even at roughly 1,923 GPU-equivalents.**
