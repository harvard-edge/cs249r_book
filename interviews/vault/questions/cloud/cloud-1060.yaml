title: Custom ASIC TCO Break-Even Evaluation
scenario: You are evaluating whether to design a custom ASIC for a stable, high-volume internal LLM inference
  workload. An off-the-shelf GPU costs $30,000 and delivers 1.6 effective PFLOPS (4.0 PFLOPS peak at 40%
  utilization). Developing a custom ASIC requires a $50M Non-Recurring Engineering (NRE) investment, but
  units cost only $2,000 to manufacture. Due to stripped-down programmability, the ASIC achieves 80% utilization
  on its 1.0 PFLOPS peak compute, delivering 0.8 effective PFLOPS per chip. Evaluate the deployment scale
  (in GPUs) required to reach the hardware TCO break-even point, and justify the architectural risk of
  committing to a custom ASIC.
details:
  realistic_solution: 'Normalize by effective throughput: 1 GPU (1.6 PFLOPS) requires 2 ASICs (0.8 PFLOPS)
    to match throughput. The cost equation becomes: GPU_Cost = $30,000 * G. ASIC_Cost = $50,000,000 +
    ($2,000 * 2) * G. The break-even is reached at approximately 1,923 GPUs (or ~3,846 ASICs). If the
    deployment requires >2,000 GPUs, the custom ASIC saves capital. However, this is only justified if
    the model architecture is strictly frozen; any reliance on unsupported dynamic control flow or novel
    operators could render the $50M investment useless.'
  common_mistake: Candidates often compare chip-to-chip costs directly without normalizing for effective
    throughput, failing to realize it takes 2 ASICs to replace 1 GPU. They also frequently ignore the
    severe architectural risk of lost programmability.
  napkin_math: 'GPU effective throughput: 4.0 PFLOPS * 40% = 1.6 PFLOPS. ASIC effective throughput: 1.0
    PFLOPS * 80% = 0.8 PFLOPS. It requires 2 ASICs to equal 1 GPU. Cost parity equation for G GPUs: $30,000
    * G = $50,000,000 + (2 * $2,000) * G. Simplifying: $30,000 * G = $50,000,000 + $4,000 * G -> $26,000
    * G = $50,000,000. G = 1,923 GPUs. If the deployment size exceeds 1,923 GPUs, the custom ASIC is cheaper.'
