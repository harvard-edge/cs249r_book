title: Custom ASIC TCO Break-Even Evaluation
scenario: You are evaluating whether to design a custom ASIC for a stable, high-volume internal LLM inference workload. An off-the-shelf GPU costs $30,000 and delivers 1.6 effective PFLOPS (4.0 PFLOPS peak at 40% utilization). Developing a custom ASIC requires a $50M Non-Recurring Engineering (NRE) investment, but units cost only $2,000 to manufacture. Due to stripped-down programmability, the ASIC achieves 80% utilization on its 1.0 PFLOPS peak compute, delivering 0.8 effective PFLOPS per chip.
question: At what GPU-equivalent deployment scale does the custom ASIC break even, and what architectural risk must justify it?
details:
  realistic_solution: 'Normalize by effective throughput: 1 GPU (1.6 PFLOPS) requires 2 ASICs (0.8 PFLOPS) to match throughput. The cost equation becomes: GPU_Cost = $30,000 * G. ASIC_Cost = $50,000,000 + ($2,000 * 2) * G. The break-even is reached at approximately 1,923 GPUs (or ~3,846 ASICs). If the deployment requires >2,000 GPUs, the custom ASIC saves capital. However, this is only justified if the model architecture is strictly frozen; any reliance on unsupported dynamic control flow or novel operators could render the $50M investment useless.'
  common_mistake: |
    **The Pitfall:** Comparing chip-to-chip costs without normalizing for effective throughput.
    **The Rationale:** Candidates compare the $30K GPU directly to the $2K ASIC, failing to realize the GPU does twice the effective work.
    **The Consequence:** The TCO calculation is completely wrong, leading to massive overestimation of the ASIC's ROI.
  napkin_math: |
    *   **GPU Effective Throughput:** 4.0 PFLOPS × 40% = 1.6 PFLOPS.
    *   **ASIC Effective Throughput:** 1.0 PFLOPS × 80% = 0.8 PFLOPS.
    *   **Equivalence:** 1 GPU = 2 ASICs.
    *   **Cost Equation (G = GPUs):** $30,000 × G = $50,000,000 NRE + (2 × $2,000) × G.
    *   **Solving for G:** $30,000 G = $50,000,000 + $4,000 G
    *   **Solving for G:** $26,000 G = $50,000,000
    *   **Result:** **G = 1,923 GPUs. The project breaks even at roughly 1,923 GPU-equivalents.**
