title: Diagnosing Unexpected PUE Spike in H100 Cluster
scenario: A production 512-GPU H100 cluster that normally runs at PUE 1.35 suddenly spikes to PUE 1.72 over a weekend. GPU utilization is stable at 85%. The facilities team sees no alerts from the cooling system. On Monday, a root cause analysis is required.
question: How would you systematically diagnose a weekend PUE spike from 1.35 to 1.72 when H100 GPU utilization stayed at 85% and cooling had no alerts?
details:
  realistic_solution: 'Diagnostic framework: (1) Check IT power (denominator) first. If GPU utilization stayed at 85% but scheduled jobs ran lighter models, IT power may have dropped. Verify via PDU branch circuit monitoring. (2) Check cooling system power (numerator). CRAC/CRAH unit logs for compressor starts, airflow changes, or economizer bypass. Weekend setback schedules sometimes raise chilled water supply temps to save energy — paradoxically causing chiller compressors to work harder when heat loads remain constant. (3) Check for humidity excursions — humidifiers add significant power to maintain 40–60% RH. (4) Inspect for blocked hot aisle containment: missing blanking panels allow hot air recirculation, increasing cooling load. (5) Review UPS load factor — UPS efficiency drops significantly at low load (<30%), adding to overhead.'
  common_mistake: |
    **The Pitfall:** Immediately assuming a cooling system hardware failure.
    **The Rationale:** Candidates forget that PUE is a ratio (Total Power / IT Power).
    **The Consequence:** Wasting time checking chillers when the spike might simply be caused by IT load dropping (denominator shrinkage) or a weekend setback schedule misconfiguration.
  napkin_math: |
    * **Normal State:** Assume IT Load = 358.4 kW. Facility Load = 358.4 × 1.35 = 484 kW. Cooling overhead = **125.6 kW**.
    * **Spike State:** Facility Load = 358.4 × 1.72 = 616.4 kW. New overhead = **258 kW**.
    * **Delta Overhead:** 258 - 125.6 = **+132.4 kW**.
    * **Diagnosis:** A standard large CRAC unit draws 100–150 kW. One unit running its compressor fully (instead of economizer mode) due to a weekend thermostat setback exactly explains the 132 kW surge.
