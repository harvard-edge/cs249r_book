title: Gradient Quantization vs Sparsification
scenario: You are training a 10B parameter model using Data Parallelism across 64 GPUs over a 100 Gbps
  Ethernet network. Gradients are currently in FP16 (20 GB). Dense Ring AllReduce takes ~3.2 seconds,
  severely bottlenecking the training step. The ML research team proposes Top-1% gradient sparsification
  (with local error feedback) to reduce the per-node payload by 100x. The infrastructure team proposes
  INT8 block-quantization, which only reduces the payload by 2x. Evaluate these two approaches and justify
  which to deploy in production.
details:
  realistic_solution: Choose INT8 quantization. Top-1% of 10B parameters requires 1GB per GPU (values
    + INT64 indices). Gathering this across 64 GPUs transfers 63GB per node, which is actually slower
    than doing absolutely nothing (FP16 dense AllReduce transfers 40GB). INT8 maintains O(1) communication
    scaling, perfectly utilizes optimized collective primitives, and avoids the 20GB memory overhead required
    to store the local error feedback buffer.
  common_mistake: Candidates see '100x reduction' and instinctively assume sparsification will be 50x
    faster than INT8. They fail to realize that sparse gradient synchronization relies on AllGather (which
    scales O(N) with node count in total data transferred), whereas dense Ring AllReduce transfers a constant
    ~2x payload size regardless of N.
  napkin_math: 'FP16 Dense AllReduce: 2 * 20GB = 40GB transferred per node (3.2s at 12.5 GB/s bandwidth).
    INT8 AllReduce: 2 * 10GB = 20GB transferred (1.6s). Top-1% Sparse: 100M params. Requiring INT64 indices
    for a 10B model, each element is 10 bytes (2B FP16 value + 8B INT64 index) = 1GB payload per node.
    AllGather at N=64: 63 * 1GB = 63GB transferred per node (5.0s). At N=64, sparsification is 50% slower
    than the FP16 baseline, whereas INT8 is 2x faster.'
