title: The INT8 Throughput Advantage
scenario: Your colleague claims 'INT8 inference is always 2× faster than FP16 because the data is half
  the size.' On an H100 with dedicated INT8 Tensor Cores, is this claim correct? When is it wrong?
details:
  realistic_solution: 'The H100 has 989 TFLOPS for FP16 and 1,979 TOPS for INT8 — a 2× compute advantage.
    It also has 2× memory efficiency (half the bytes per element). But the speedup you actually get depends
    on the bottleneck. If compute-bound: up to 2× from doubled TOPS. If memory-bound: up to 2× from halved
    data size. If balanced: somewhere in between. The claim is approximately right but for the wrong reason
    — and it breaks down for operations that can''t use Tensor Cores (e.g., softmax, layer norm, which
    remain in FP16/FP32).'
  common_mistake: '"2× smaller data = 2× faster" assumes the speedup comes from memory savings alone.
    The actual speedup depends on whether the workload is compute-bound or memory-bound.'
  napkin_math: 'Large-batch GEMM ($I = 500$ Ops/Byte): FP16 → compute-bound at 989 TFLOPS. INT8 → still
    compute-bound (500 < 591 ridge? Actually 500 is close). Speedup ≈ 1,979/989 = **2.0×**. LLM decode
    ($I = 1$ Ops/Byte): FP16 → bandwidth-bound, throughput = 3.35 TB/s × 1 = 3.35 TOPS. INT8 → bandwidth-bound,
    but reads half the bytes, so effective throughput = 3.35 TB/s × 2 = 6.7 TOPS. Speedup = **2.0×**.
    Softmax/LayerNorm (remain in FP32): speedup = **1.0×**. End-to-end transformer inference: ~70% time
    in GEMMs (2× faster), ~30% in non-quantized ops (1× speed). Net speedup: $0.7 \times 2 + 0.3 \times
    1 = 1.7\times$ — not 2×.'
