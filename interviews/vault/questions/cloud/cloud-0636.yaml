title: The INT8 Throughput Advantage
scenario: Your colleague claims INT8 inference is always 2× faster than FP16 because the data is half the size.
question: Is INT8 inference always 2× faster than FP16 because the data is half the size, and when is that wrong?
details:
  realistic_solution: 'The hardware has a 2× compute advantage (INT8 TOPS vs FP16 FLOPS) and 2× memory efficiency. But the speedup depends on the bottleneck. If compute-bound: up to 2× from doubled TOPS. If memory-bound: up to 2× from halved data size. The claim is roughly right but for the wrong reason — and it breaks down for operations that cannot use Tensor Cores (e.g., softmax, layer norm) which remain in FP16/FP32.'
  common_mistake: |
    **The Pitfall:** Assuming data size reduction directly guarantees proportional latency reduction globally.
    **The Rationale:** "2× smaller data = 2× faster" is simple arithmetic.
    **The Consequence:** Completely misunderstanding the Roofline Model, leading to inaccurate latency estimates for non-quantizable operations like Softmax.
  napkin_math: |
    1. **Compute-Bound (Large-batch GEMM):** FP16 hits peak FLOPS. INT8 hits peak TOPS. Speedup ≈ 1,979/989 = 2.0×.
    2. **Memory-Bound (LLM Decode, Batch=1):** FP16 is bandwidth bound. INT8 reads half the bytes from HBM. Speedup = 2.0×.
    3. **Non-Quantized Ops (Softmax/LayerNorm):** Remain in FP32. Speedup = 1.0×.
    4. **End-to-End Net (Amdahl's Law):** ~70% time in GEMMs (2× speedup), ~30% in non-quantized ops (1× speedup).
    5. **New Execution Time:** 0.7 / 2.0 + 0.3 / 1.0 = 0.35 + 0.30 = 0.65.
    6. **Final Result:** **Overall speedup is 1.0 / 0.65 ≈ 1.54×, not 2×, because non-quantizable operations bottleneck the theoretical peak.**
