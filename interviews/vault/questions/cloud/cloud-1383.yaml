title: HPCC Rate Adjustment with INT
scenario: >
  Your training cluster uses a 400Gbps RoCEv2 fabric with a base RTT of 2 microseconds between racks. During a hybrid parallel training job, incast traffic causes congestion at a Top-of-Rack (ToR) switch port. You are implementing HPCC (High Precision Congestion Control) utilizing In-Band Network Telemetry (INT). An INT packet arrives at a sender reporting the bottleneck link capacity is 400Gbps and the current switch queue length is 50KB. The flow's current rate is 200Gbps.
question: >
  Calculate the flow's new transmission rate using HPCC to fully utilize the link while draining the queue in exactly one RTT.
details:
  realistic_solution: |
    Use the INT metadata to calculate the exact total inflight bytes (BDP + Queue Depth), and scale the current sending rate by the ratio of the target inflight bytes (the base BDP) to the actual inflight bytes to drain the queue in precisely one RTT.
  common_mistake: |
    **The Pitfall:** Using reactive heuristics like AIMD (halving the rate on ECN marks) or ignoring the base BDP.
    **The Rationale:** Relying on legacy TCP congestion control logic.
    **The Consequence:** Excessive oscillation in sending rates, leading to underutilized links and persistent buffer bloat.
  napkin_math: |
    - **Link Bandwidth:** 400 Gbps = 50 GB/s.
    - **Base BDP (Target):** 50 GB/s × 2μs = 100 KB.
    - **Total Inflight Bytes (I):** BDP + Queue Depth = 100 KB + 50 KB = 150 KB.
    - **Rate Multiplier:** Target BDP / Inflight = 100 KB / 150 KB = 2/3.
    - **Result:** **New Rate: 200 Gbps × (2/3) = 133.3 Gbps.**
