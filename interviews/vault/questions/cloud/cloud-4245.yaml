title: Differentiating through a sort operation for learning-to-rank on TPU
scenario: You are implementing a differentiable ranking loss for a recommendation system on TPU v4. Standard torch.sort() is not differentiable (the backward pass produces zero gradients). Your loss function needs to rank items by predicted score and compute NDCG, which requires gradients to flow back to the scoring model.
question: "How would you make the NDCG-style ranking loss differentiable so gradients flow back through item scores?"
details:
  realistic_solution: 'Use a soft-sort approximation like NeuralSort (parameterized softmax of pairwise comparisons) or SoftRank. Implement via a custom autograd Function: forward computes the permutation matrix (differentiable), backward uses the chain rule through the soft permutation. Alternatively, use ListNet loss which converts rankings to probability distributions over permutations, which is naturally differentiable.'
  common_mistake: |
    **The Pitfall:** Using torch.argsort() and indexing with it, expecting gradients to flow.
    **The Rationale:** Candidates incorrectly assume PyTorch auto-differentiates through integer array indexing operations.
    **The Consequence:** The model compiles and trains without error, but the ranking loss gradient is silently zero, preventing the model from actually learning to rank.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Items: N = 100. Batch size: 512.
       - Algorithm: Soft-sort (NeuralSort) requiring O(N^2) pairwise operations.
       - Hardware: TPU v4 (275 TFLOPS).
    2. **Calculations:**
       - Pairwise comparisons: 100 * 100 = 10,000 ops per query.
       - Total ops per batch: 10,000 * 512 = 5.12M ops.
       - HBM footprint: 100 * 100 * 512 * 4 bytes = ~20.5 MB.
       - Execution time: 5.12M ops / 275 TFLOPS ≈ effectively instantaneous.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Negligible). An O(N^2) differentiable sort operates strictly in SRAM and utilizes < 25 MB of HBM.**
