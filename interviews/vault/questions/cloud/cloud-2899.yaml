title: Diagnose NaN losses during EfficientNet training with aggressive augmentation
scenario: You are training EfficientNet-B5 with BF16 mixed precision, RandAugment, and Mixup. After 8,000 steps training diverges with NaN losses. The Squeeze-Excitation (SE) blocks are suspected.
question: What failure chain could make EfficientNet-B5 with BF16 and Mixup diverge at SE blocks, and how would you fix it?
details:
  realistic_solution: With aggressive Mixup, input activations can be very large. In BF16, reduced mantissa bits cause sigmoid to saturate exactly to 1.0, leading to zero gradients or instability. Fix by keeping SE blocks in FP32 or clamping pre-activations.
  common_mistake: |
    **The Pitfall:** Immediately switching the entire model to FP32 training.
    **The Rationale:** Treating all NaN losses as requiring global full precision.
    **The Consequence:** Halved training throughput and quadrupled memory usage for an issue isolated to 2% of the FLOPs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - BF16 has 7 mantissa bits. SE blocks use sigmoid.
    2. **Calculations:**
       - If FC pre-activation reaches ~500, sigmoid(500) = 1.0 exactly in BF16.
       - Gradient becomes exactly 0.
    3. **Conclusion & Interpretation:**
       - **Result: The issue is vanishing gradients from saturated sigmoid in BF16. FP32 overhead for SE is negligible.**
