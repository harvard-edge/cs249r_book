title: Reward Model Architecture for RLHF at Scale
scenario: Design a reward model (RM) for an RLHF pipeline fine-tuning a 70B policy model. The RM needs to score completions at 500 QPS during PPO rollouts. You have a budget of 4x GPUs (each with 80GB memory and FP8 capability).
question: What reward model size, architecture, and serving strategy would you use to score PPO completions at 500 QPS on a 4x GPU budget?
details:
  realistic_solution: 'RM sizing: empirical finding is that RM performance plateaus at 10-20% of policy model size for typical RLHF tasks. Use 7B RM on 2x GPUs in TP=2. Architecture: take a pretrained 7B model, replace next-token prediction head with a scalar output head. Serving for 500 QPS: 7B model on 2x GPUs, BF16, sequence length 512. With continuous batching at batch=16: ~120 QPS per GPU pair = 240 QPS for 2 serving instances. For 500 QPS: need 3 pairs = 6x GPUs. With 4x GPU budget: use 2x GPUs for serving and queue the remaining requests, or serve at FP8 for higher throughput.'
  common_mistake: |
    **The Pitfall:** Using the same size model as the policy for the reward model.
    **The Rationale:** Assuming the RM requires identical representational capacity to the 70B policy model.
    **The Consequence:** A 70B RM would require massive compute just to serve, consuming more resources than the policy training itself and missing the latency constraints.
  napkin_math: |
    1. 7B model forward pass at 512 tokens on one GPU takes ~12ms.
    2. Single GPU serial throughput: 1000ms / 12ms $\approx$ 83 QPS.
    3. With continuous batching (batch=8), effective throughput $\approx$ 200 QPS per GPU.
    4. 2x GPUs (TP=2) handle 200 QPS. 4x GPUs in two TP=2 instances handle 400 QPS at BF16.
    5. **To hit 500 QPS, use FP8 on 4x GPUs for a 1.5x throughput boost: 400 * 1.5 = 600 QPS.**
