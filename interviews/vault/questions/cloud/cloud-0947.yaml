title: SLA-Constrained Inference Capacity
scenario: 'A real-time translation service must handle a peak traffic of 5,000 requests per second. The
  Service Level Objective (SLO) mandates a strict P99 latency of 100ms. Benchmarks for your Transformer
  model on an A100 GPU show: Batch 1 takes 20ms, Batch 8 takes 40ms, and Batch 32 takes 120ms. A colleague
  proposes provisioning 19 GPUs operating at Batch 32 to minimize the $3/hour per GPU compute cost, using
  average CPU utilization for autoscaling. Evaluate this capacity plan, identify its critical flaws regarding
  the SLO, and calculate the optimal number of A100 GPUs required.'
question: "Why does the 19-GPU Batch-32 plan violate the 100ms P99 SLO, and how many A100 GPUs are actually required?"
details:
  realistic_solution: 'Reject the proposal. Batch 32 at 120ms fundamentally breaks the 100ms latency budget.
    Evaluate the next optimal point: Batch 8 takes 40ms, leaving a 60ms buffer for queueing and network
    overhead. Cap the inference server''s maximum batch size to 8. Calculate required hardware using peak
    traffic against Batch 8 throughput.'
  common_mistake: Selecting the batch size with the highest absolute throughput (Batch 32) to minimize
    hardware cost, failing to realize the 120ms execution time natively violates the 100ms SLO before
    network or queueing delays are even considered.
  napkin_math: Batch 8 throughput per GPU = 8 requests / 0.040 seconds = 200 req/sec. Minimum GPUs required
    = Peak Traffic (5000 req/sec) / Throughput per GPU (200 req/sec) = 25 GPUs. Expected cost = 25 * $3/hr
    = $75/hour.
