title: SLA-Constrained Inference Capacity
scenario: 'A real-time translation service must handle peak traffic of 5,000 requests per second with a strict P99 latency SLO of 100ms. Benchmarks on an A100 GPU show: Batch 1 takes 20ms, Batch 8 takes 40ms, and Batch 32 takes 120ms. A colleague proposes provisioning 19 GPUs operating at Batch 32 to minimize the compute cost.'
question: Why does the 19-GPU Batch-32 plan violate the 100ms P99 SLO, and how many GPUs are actually required?
details:
  realistic_solution: |
    Reject the proposal. Batch 32 at 120ms natively breaks the 100ms latency budget before networking overhead. Cap the maximum batch size to 8 (40ms execution time, 60ms buffer). Calculate required hardware using peak traffic against Batch 8 throughput.
  common_mistake: |
    **The Pitfall:** Selecting the batch size with highest absolute throughput to minimize hardware cost.
    **The Rationale:** Engineers prioritize compute efficiency over the hard constraint of the latency SLO.
    **The Consequence:** The system consistently violates P99 latency commitments, degrading user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak traffic: 5,000 req/sec.
       - SLO: 100ms P99 latency.
       - Batch 8 throughput: 8 req / 40ms = 200 req/sec.
    2. **Calculations:**
       - Batch 32 execution time (120ms) violates the 100ms SLO natively.
       - Must cap at Batch 8.
       - Minimum GPUs = 5,000 req/sec / 200 req/sec = 25 GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound**. 25 GPUs are required to meet the 100ms SLO, preventing the Batch 32 violation.
