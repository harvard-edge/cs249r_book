title: SLA-Constrained Inference Capacity
scenario: A real-time translation service must handle peak traffic of 5,000 requests per second with a strict P99 latency SLO of 100ms. Benchmarks on an A100 GPU show: Batch 1 takes 20ms, Batch 8 takes 40ms, and Batch 32 takes 120ms. A colleague proposes provisioning 19 GPUs operating at Batch 32 to minimize the $3/hour compute cost.
question: Why does the 19-GPU Batch-32 plan violate the 100ms P99 SLO, and how many A100 GPUs are actually required?
details:
  realistic_solution: |
    Reject the proposal. Batch 32 at 120ms natively breaks the 100ms latency budget before networking overhead. Cap the maximum batch size to 8 (40ms execution time, 60ms buffer). Calculate required hardware using peak traffic against Batch 8 throughput.
  common_mistake: |
    **The Pitfall:** Selecting the batch size with highest absolute throughput to minimize hardware cost.
    **The Rationale:** Engineers prioritize compute efficiency over the hard constraint of the latency SLO.
    **The Consequence:** The system consistently violates P99 latency commitments, degrading user experience.
  napkin_math: |
    - Batch 8 throughput per GPU = 8 requests / 0.040 seconds = 200 req/sec.
    - Minimum GPUs = 5000 req/sec / 200 req/sec = 25 GPUs.
    - **25 GPUs are required, running at an expected cost of 25 * $3/hr = $75/hour.**
