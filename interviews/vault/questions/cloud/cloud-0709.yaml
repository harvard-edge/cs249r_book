title: The Data Parallelism Scaling Efficiency
scenario: You benchmark a 3B model training on A100 GPUs. Going from 1 to 8 GPUs (single node, NVLink) gives a 7.2x speedup — nearly linear. Going from 8 to 64 GPUs (8 nodes, InfiniBand 400 Gbps) gives only 5.2x speedup instead of 8x due to communication overhead.
question: What explains the sub-linear scaling, and at what GPU count does adding more GPUs actually hurt throughput?
details:
  realistic_solution: The communication-to-computation ratio determines scaling efficiency. Compute per GPU stays constant (same per-GPU batch size). But AllReduce communication grows with the number of nodes (more hops, higher latency). At 8 GPUs (intra-node), AllReduce uses NVLink at 600 GB/s with ~1 μs latency — communication is negligible. At 64 GPUs (inter-node), AllReduce crosses InfiniBand at 50 GB/s with ~5 μs per hop — communication becomes significant. The crossover point where adding GPUs hurts is when AllReduce time exceeds the compute time saved by adding one more GPU.
  common_mistake: |
    **The Pitfall:** Assuming sub-linear scaling purely means the network bandwidth needs to be upgraded.
    
    **The Rationale:** Engineers often misdiagnose bandwidth as the sole culprit, forgetting that latency and the shifting communication-to-computation ratio are the fundamental drivers as node counts increase.
    
    **The Consequence:** Millions are spent upgrading InfiniBand tiers when algorithmic changes (like gradient accumulation, hierarchical collectives, or larger batch sizes) are actually required to mask the latency bounds.
  napkin_math: |
    - **Baseline**: 3B model, FP16 gradients = 6 GB. Compute per step per GPU: ~200 ms.
    - **8 GPUs (NVLink)**: Ring AllReduce = 2 * 6 GB * (7/8) / 450 GB/s (unidirectional per link) = 23.3 ms. Scaling efficiency: 200 / (200 + 23.3) = 89.6%. Speedup = 8 * 0.896 = **7.16x** (Matches observed 7.2x).
    - **64 GPUs (IB)**: Ring AllReduce = 2 * 6 GB * (63/64) / 50 GB/s = 236 ms. Efficiency: 200 / (200 + 236) = 45.9%. Speedup over 8 GPUs = 8 * 0.459 = 3.67x (Real system uses hierarchical AllReduce to achieve the observed 5.2x).
    - **Break-even Point: When AllReduce time > Compute time. Without hierarchical AR, this happens well before 64 GPUs, making hierarchical topologies mandatory at scale.**
