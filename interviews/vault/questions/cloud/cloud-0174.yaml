title: The Real-Time Queue Collapse
scenario: You run an LLM-based system that analyzes market news in real time. Each request has a hard 150ms P99 deadline from the moment it's sent; if a response takes longer, it's useless. The service uses continuous batching. During a market volatility event, the request rate triples. The rate of dropped requests skyrockets, and the absolute number of successful requests served within the deadline falls below the pre-surge baseline. The system hasn't crashed.
question: Why did useful throughput fall below baseline during the 3x surge, and what critical deadline-aware feature is missing?
details:
  realistic_solution: 'The system is experiencing a ''death spiral'' caused by processing stale requests. When the arrival rate exceeds the system''s capacity, a queue forms. Without deadline awareness, the server continues to pull from the head of the queue in a FIFO manner. A request might wait 120ms in the queue, then get processed by the GPU for 50ms. The total time is 170ms, which misses the 150ms deadline. The critical failure is that the system spent 50ms of valuable H100 time on a request that was already doomed. This wasted work prevents the GPU from serving a newer request that *could* have met the deadline. As the queue grows, the system spends more and more of its capacity on expired work, causing the useful throughput to plummet. The critical missing feature is **deadline-aware load shedding**. The system must:

    1. **Check at Admission:** When a request arrives, estimate the current wait time. If `estimated_wait + processing_time > deadline`, reject it immediately (e.g., HTTP 503).

    2. **Cancel in Queue:** Actively prune requests from the waiting queue if their time-in-system has already exceeded the deadline. This stops the death spiral by ensuring GPU cycles are only spent on viable work.'
  common_mistake: |
    **The Pitfall:** Prescribing hardware scale-out as the primary fix.
    **The Rationale:** "If throughput is too low, we need more GPUs." Engineers fail to analyze why useful throughput *decreased* rather than plateaued.
    **The Consequence:** A "death spiral" occurs during spikes because the system lacks deadline-aware load shedding, wasting immensely expensive GPU cycles on expired work.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deadline: 150ms.
       - Baseline capacity: 640 req/s. Arrival: 300 req/s.
       - Surge arrival: 900 req/s.
    2. **Calculations:**
       - Backlog growth: 900 - 640 = 260 req/s.
       - Wait time at t=1.0s: 260 queue / 640 capacity = 400ms.
    3. **Conclusion & Interpretation:**
       - **Result: System-Bound (Queueing). 400ms > 150ms deadline plunges useful throughput to zero due to stale request processing.**
