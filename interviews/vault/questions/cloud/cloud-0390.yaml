title: The Hidden Cost of Hardware
scenario: When calculating the Total Cost of Ownership (TCO) for a large GPU cluster, operational costs like maintenance must be included alongside the capital expenditure.
question: Based on industry rules of thumb, what is the approximate annual maintenance cost for a single H100 server GPU?
details:
  realistic_solution: The correct answer is approximately $1,500. A standard rule of thumb for hardware is that annual maintenance costs are around 5% of the initial capital expenditure. Given an H100 GPU's cost of about $30,000, the maintenance is 5% of that.
  common_mistake: |
    **The Pitfall:** Focusing solely on the initial purchase price (CapEx) and neglecting operational costs.
    **The Rationale:** Treating hardware as a one-time sunk cost and assuming software licenses or power are the only ongoing expenses.
    **The Consequence:** Severely underestimating long-term fleet budgets and facing unexpected multi-million dollar support renewal bills.
  napkin_math: |
    - **CapEx**: H100 GPU cost ≈ $30,000.
    - **Maintenance Rule of Thumb**: Annual maintenance ≈ 5% of CapEx.
    - **Annual Cost**: $30,000 × 0.05 = **$1,500**.
  options:
  - $150
  - $1,500
  - $7,500
  - $15,000
  correct_index: 1
