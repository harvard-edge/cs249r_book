title: Strict SLO in Ad Recommendation Systems
scenario: 'A real-time bidding (RTB) ad recommendation system must meet a strict Service Level Objective
  (SLO) of 100ms for the 99th percentile (p99) latency. The system components have the following p99 latencies:
  Network I/O (15ms), Feature Fetching from a Key-Value store (25ms), and Post-processing (10ms). The
  team wants to use dynamic batching for the ML model (running on an NVIDIA A10G) to improve throughput.
  If the model''s base inference latency is 12ms for a single request, and each additional request in
  the batch adds 1ms to the inference time, what is the maximum permissible batch window (wait time) the
  dynamic batcher can use if it targets a maximum batch size of 16?'
question: "What is the maximum dynamic batching wait window that still meets the 100ms p99 SLO with a target batch size of 16?"
details:
  realistic_solution: Calculate the total fixed non-model latencies (50ms). Subtract this from the 100ms
    SLO to find the available budget for model serving (50ms). Calculate the inference time for a batch
    of 16 (12ms + 15 * 1ms = 27ms). The maximum permissible batch window is the remaining budget minus
    the batch inference time (50ms - 27ms = 23ms).
  common_mistake: Failing to account for the increased inference time caused by the larger batch size,
    or simply subtracting the base 12ms latency from the remaining budget without adjusting for the target
    batch size.
  napkin_math: SLO = 100ms. Fixed Latency = 15ms (Network) + 25ms (KV Store) + 10ms (Post-processing)
    = 50ms. Serving Budget = 100ms - 50ms = 50ms. Inference Time (BS=16) = 12ms + (15 * 1ms) = 27ms. Max
    Batch Wait Time = Serving Budget - Inference Time = 50ms - 27ms = 23ms.
