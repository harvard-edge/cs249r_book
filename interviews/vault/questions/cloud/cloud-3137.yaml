title: Diagnosing FlashAttention Regression on Short Sequences
scenario: After enabling FlashAttention-2 on an H100 serving a 7B model, you observe
  that latency for sequence length 64 is 5% slower than standard attention, while
  seq_len=2048 is 2.3x faster. Both use FP16. Diagnose why FlashAttention can regress
  on very short sequences.
question: Why can FlashAttention-2 be slower than standard attention at seq_len=64
  but much faster at seq_len=2048?
details:
  realistic_solution: At N=64, the attention matrix is 64x64x2B = 8KB per head — fits
    entirely in L2 cache (50MB on H100). Standard attention's 'materialization to
    HBM' never actually hits HBM; the hardware cache captures it. FlashAttention's
    overhead — kernel launch, tile loop control, online softmax rescaling, reduced
    parallelism from sequential tile processing — now exceeds the IO savings. At N=2048,
    the matrix is 2048x2048x2B = 8MB per head x 32 heads = 256MB, blowing past L2
    cache, making HBM IO the bottleneck that FlashAttention eliminates.
  common_mistake: Assuming FlashAttention is universally faster. For short sequences,
    the N x N matrix is small enough to fit in L2 cache, so the IO savings disappear
    while the tiling/rescaling overhead remains.
  napkin_math: 'N=64: attn matrix = 64^2 x 2B x 32 heads = 256KB << 50MB L2. N=2048:
    2048^2 x 2B x 32 = 256MB >> 50MB L2. FlashAttention kernel overhead ~5-10us, which
    matters when total compute is ~15us.'
