title: 'The Real-Time Dilemma: TTFT vs. Throughput'
scenario: You are designing the serving infrastructure for a real-time AI code assistant. The absolute strictest user-facing SLO is a P99 Time-To-First-Token (TTFT) of less than 200ms. Your team is debating two strategies for processing the initial user prompts (the 'prefill' stage).
question: With an 80ms batching window and 40ms prefill, what worst-case TTFT should you expect?
details:
  realistic_solution: 'The fundamental trade-off is throughput vs. tail latency. With an 80ms batching window, the worst-case queuing delay is 80ms (a request arriving just after a batch closes). Add 40ms prefill compute and you get 120ms worst-case TTFT \u2014 within the 200ms SLO. But a continuous stream approach with no batching window gives near-zero queuing delay, yielding ~40ms TTFT at the cost of lower GPU utilization. For a P99 SLO, you must design for the worst case: total TTFT = max queue wait (80ms) + compute (40ms) = 120ms.'
  common_mistake: |
    **The Pitfall:** Answering '40ms' by focusing solely on the GPU compute time.
    **The Rationale:** Engineers frequently ignore queueing delays and focus purely on the forward pass execution time, or they calculate an average delay rather than the P99 worst-case.
    **The Consequence:** The system fails strict P99 SLOs because the worst-case queuing time isn't budgeted into the latency calculations.
  napkin_math: |
    1. **Static Batching Wait:** Worst-case queue delay occurs for a request arriving right after a window opens: 80ms.
    2. **Compute Time:** Prefill compute time is given as 40ms.
    3. **Conclusion:** **Worst-Case TTFT = 80ms + 40ms = 120ms.**
  options:
  - 40ms
  - 80ms
  - 120ms
  - 200ms
  correct_index: 2
