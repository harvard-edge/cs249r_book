title: 'The Real-Time Dilemma: TTFT vs. Throughput'
scenario: 'You are designing the serving infrastructure for a real-time AI code assistant. The absolute strictest user-facing SLO is a P99 Time-To-First-Token (TTFT) of less than 200ms. Your team is debating two strategies for processing the initial user prompts (the prefill stage).'
question: 'With an 80ms batching window and 40ms prefill, what worst-case TTFT should you expect?'
details:
  realistic_solution: 'The fundamental trade-off is throughput vs. tail latency. For a P99 SLO, you must design for the worst case: total TTFT = max queue wait (80ms) + compute (40ms) = 120ms. A continuous stream approach gives near-zero queuing delay (~40ms TTFT) at the cost of lower GPU utilization. Both fit within the 200ms SLO, but calculating worst-case queueing is mandatory.'
  common_mistake: |
    **The Pitfall:** Answering '40ms' by focusing solely on the GPU compute execution time.
    **The Rationale:** Engineers frequently ignore queueing delays and focus purely on the forward pass, or calculate an average delay rather than the P99 worst-case.
    **The Consequence:** The system fails strict P99 SLOs because the worst-case queuing time isn't budgeted into the latency calculations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batching window: 80ms.
       - Prefill compute time: 40ms.
       - SLA: P99 TTFT < 200ms.
    2. **Calculations:**
       - Static Batching Wait: Worst-case queue delay occurs for a request arriving right after a window opens (80ms).
       - Compute Time: 40ms.
       - Worst-Case TTFT: 80ms + 40ms = 120ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queuing-Delay-Bound. The worst-case TTFT is 120ms, which safely satisfies the 200ms P99 SLO.**
  options:
  - 40ms
  - 80ms
  - 120ms
  - 200ms
  correct_index: 2
