title: EAGLE-2 Self-Speculative Architecture
scenario: EAGLE uses the target model's hidden states (not just token embeddings) as input to a lightweight draft head, achieving higher acceptance rates than token-level draft models. You are targeting a 70B model on 4x H100 with hidden_dim=8192.
question: How would you design an EAGLE-style draft head for a 70B target with hidden_dim=8192, and what memory and training costs follow?
details:
  realistic_solution: "EAGLE draft head input: concat(last_hidden_state[t], embedding[t+1_predicted]) = 8192 + 8192 = 16384 dim. Head architecture: 1 transformer layer (self-attention + FFN) with hidden_dim=8192, then linear to vocab (128K). Parameters: attention: 4 x 8192^2 = 268M. FFN: 3 x 8192 x 8192 = 201M (using 1x expansion instead of 4x). Projection: 16384->8192 = 134M. Vocab head: 8192 x 128K = 1.05B. Total: ~1.65B params = 3.3GB FP16 = 0.83GB/GPU. Memory overhead: 0.83GB/GPU (1% of 80GB). Forward cost: 3.3 GFLOP at 989 TFLOPS = 3.3us per token — negligible. Training: requires target model's hidden states, so generate offline by running target on training data and saving hidden states. ~100K examples sufficient. EAGLE achieves alpha=0.85-0.90 vs regular draft model alpha=0.78, because the hidden state carries 'what the target model is thinking' not just 'what tokens were generated.'"
  common_mistake: |
    **The Pitfall:** Using only the last layer's hidden state.
    **The Rationale:** Assuming the hidden state alone fully represents the token, similar to standard embeddings.
    **The Consequence:** Failing to provide the surface-level embedding information crucial for predicting the exact next token identity, dropping the acceptance rate.
  napkin_math: |
    *   **EAGLE Head Params:** Attention (268M) + FFN (201M) + Projection (134M) + Vocab Head (1.05B) $\approx$ 1.65B parameters.
    *   **Memory Footprint:** 1.65B parameters $\times$ 2 Bytes = 3.3 GB total.
    *   **Per GPU Memory (TP=4):** 3.3 GB / 4 = **0.83 GB per GPU** (~1% overhead).
    *   **Forward Cost:** 3.3 GFLOP at 989 TFLOPS = 3.3 µs per token (negligible).
    *   **Speedup:** E[tokens] increases from 3.38 to 4.45, lifting speedup from 2.75× to **3.5×**.
