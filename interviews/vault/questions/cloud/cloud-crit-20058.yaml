title: Staged Speculation for Ultra-Long Generation
scenario: 'You are generating a 10K-token response (long-form report) from a 405B model on 8x H100. At
  80ms/token autoregressive, this takes 800 seconds. With K=5 speculation (alpha=0.78), it takes ~310
  seconds. Design a staged speculation system that adapts strategy as the generation progresses through
  three phases: (1) low-entropy opening, (2) high-entropy body, (3) formulaic conclusion.'
question: "How should speculation be staged across a 10K-token 405B generation, and why does tree speculation help most in the body?"
details:
  realistic_solution: 'Phase analysis: (1) Opening (tokens 1-500): template language, high predictability.
    Alpha=0.90, optimal K=12. (2) Body (500-8500): novel content, lower predictability. Alpha=0.72, optimal
    K=6. (3) Conclusion (8500-10000): formulaic summary, refs back to body. Alpha=0.85, optimal K=10.
    Per-phase optimization: Opening: large K=12 with 8B draft. E[tok]=(1-0.90^13)/0.10=6.51. Round=12x3+80=116ms.
    Rate=6.51/116=56 tok/s. Time for 500 tokens: 8.9s. Body: K=6 with draft. E=2.89. Round=6x3+80=98ms.
    Rate=29.5 tok/s. 8000 tokens: 271s. Conclusion: K=10. E=5.16. Round=10x3+80=110ms. Rate=46.9 tok/s.
    1500 tokens: 32s. Total staged: 8.9+271+32 = 312s. Uniform K=5: 310s. Marginal improvement! The key
    insight: most time is spent in the body phase where alpha is lowest. Real optimization: for body phase,
    use tree speculation (branching factor 3, depth 4) to explore multiple continuations. Tree with alpha=0.72:
    E=3.8 tokens at 12-token tree cost. Rate=3.8/(12x3+80)=34 tok/s. Body: 8000/34=235s. Total: 8.9+235+32=276s.
    11% improvement over uniform.'
  common_mistake: 'Using a single speculation strategy for the entire 10K generation. The acceptance rate
    and optimal K vary dramatically across the generation: openings are predictable, body paragraphs are
    creative, and conclusions follow templates.'
  napkin_math: 'Uniform K=5: 310s. Staged linear: 312s (negligible improvement). Staged with tree for
    body: 276s (11% improvement). The body phase dominates at 87% of generation time. Optimizing the body''s
    alpha matters most.'
