title: Root-Causing Deterministic Loss Divergence
scenario: You are training a 175B parameter LLM on a cluster of 2,048 GPUs. Around iteration 50,000, the loss suddenly spikes to NaN. You roll back to a known-good checkpoint at iteration 49,000 and resume, but the loss diverges again at the exact same iteration. System logs show zero ECC uncorrectable errors, zero PCIe AER events, and zero Xid errors from the driver.
question: How do you systematically diagnose the root cause of the deterministic loss divergence?
details:
  realistic_solution: 'Pause training and execute a cluster-wide Known Answer Test (KAT). Isolate the computation by running a deterministic sequence of large matrix multiplications (e.g., cuBLAS operations with fixed seeds) on all 2,048 GPUs simultaneously. Broadcast the resulting checksums. The GPU(s) producing a mismatched checksum without throwing a hardware exception is experiencing SDC and must be cordoned.'
  common_mistake: |
    **The Pitfall:** Blaming software factors like optimizer state, learning rate schedule, or a bad data batch.
    **The Rationale:** Candidates ignore that rolling back and replaying deterministically should yield the same result unless there is a hardware Silent Data Corruption (SDC).
    **The Consequence:** Endless software debugging while the faulty hardware continues to silently corrupt training runs.
  napkin_math: |
    - Cluster scale: 2,048 GPUs executing ~10^15 FLOP/s.
    - A 10-hour training run performs 7.37 x 10^22 FLOPs.
    - Even with a hardware defect rate causing 1 error per 10^19 operations, you will encounter ~7,300 silent compute errors.
    - **Without application-level checksums, you cannot isolate the 1-in-2,048 GPUs causing the SDC.**
