title: Root-Causing Deterministic Loss Divergence
scenario: You are training a 175B parameter LLM on a cluster of 2,048 H100 GPUs. Around iteration 50,000,
  the loss suddenly spikes to NaN. You roll back to a known-good checkpoint at iteration 49,000 and resume,
  but the loss diverges again at the exact same iteration. System logs show zero ECC uncorrectable errors,
  zero PCIe AER events, and zero Xid errors from the Nvidia driver. How do you systematically diagnose
  the root cause?
details:
  realistic_solution: Pause training and execute a cluster-wide Known Answer Test (KAT). Isolate the computation
    by running a deterministic sequence of large matrix multiplications (e.g., cuBLAS operations with
    fixed seeds) on all 2,048 GPUs simultaneously. Broadcast the resulting checksums. The GPU(s) producing
    a mismatched checksum without throwing a hardware exception is experiencing SDC and must be cordoned.
  common_mistake: Candidates often blame the optimizer state, learning rate schedule, or a 'bad data batch',
    ignoring that rolling back and replaying deterministically should yield the same result unless there
    is a hardware Silent Data Corruption (SDC) such as a 'mercurial core' consistently miscalculating
    a specific FP16/BF16 instruction.
  napkin_math: At 2,048 GPUs executing ~10^15 FLOP/s, a 10-hour training run performs 7.37 x 10^22 FLOPs.
    Even with an incredibly low hardware defect rate causing 1 error per 10^19 operations, you will encounter
    ~7,300 silent compute errors. Without application-level checksums or replication, hardware reliability
    limits training stability.
