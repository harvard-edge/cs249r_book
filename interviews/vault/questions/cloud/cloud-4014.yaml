title: DCQCN vs TIMELY Congestion Control
scenario: Your team is choosing between DCQCN (ECN-based) and TIMELY (delay-based) congestion control for a 2048-H100 training cluster. DCQCN uses ECN marks from switch hardware while TIMELY uses NIC-measured RTT. The cluster runs a mix of data-parallel training (large, bursty flows) and pipeline-parallel microbatch transfers (latency-sensitive, small flows).
question: Which congestion-control protocol, DCQCN or TIMELY, better serves this mixed AllReduce and pipeline-parallel workload, and why?
details:
  realistic_solution: 'DCQCN is the better choice for this mixed workload. For bulk AllReduce flows, DCQCN''s ECN-based feedback provides early, per-packet congestion signals directly from switch hardware, reacting within 1-2 RTTs (~10μs). TIMELY, measuring RTT at the NIC, has coarser time resolution (~50μs granularity) and cannot distinguish between queuing delay (congestion) and propagation delay changes (path changes). For the latency-sensitive pipeline-parallel transfers, DCQCN can use separate traffic classes with aggressive ECN thresholds (mark at 10% buffer). TIMELY''s advantage — no switch configuration needed — is less relevant in purpose-built ML clusters where switch configs are standardized. Key limitation of DCQCN: requires switch support for ECN marking, which all modern ML fabric switches (Spectrum-4, Quantum-2, Tomahawk-5) provide.'
  common_mistake: |
    **The Pitfall:** Choosing based on a single metric, assuming one protocol is universally superior.
    **The Rationale:** Candidates fail to recognize that DCQCN excels at throughput for bulk transfers but can be coarse-grained, while TIMELY provides finer granularity for latency-sensitive flows but struggles with incast.
    **The Consequence:** The chosen protocol will severely bottleneck either the bursty all-reduce operations or the latency-sensitive pipeline transfers, degrading overall training MFU.
  napkin_math: |
    1. **DCQCN Reaction Time:** ECN marking at switch (0ns) + 1 RTT for CNP (~5μs) + rate adjustment (~1μs) = ~6μs total.
    2. **TIMELY Reaction Time:** Send probe + measure RTT (~10μs minimum) + smoothed RTT update + rate adjustment = ~50-100μs.
    3. **Difference:** For 400Gbps links, a 44μs faster reaction time.
    **44μs faster reaction = 2.2MB less buffer consumed per flow.**
