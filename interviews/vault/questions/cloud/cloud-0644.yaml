title: The Mixed-Precision Training Instability
scenario: We're pre-training a 30B model. It trains fine in BF16 for 200k steps. Management asks us to switch to FP8 training to get 2× throughput on H100's FP8 Tensor Cores. After switching, we see loss spikes every ~5,000 steps that gradually get worse until training diverges at step 80k.
question: What's happening, and how do we fix it without giving up FP8?
details:
  realistic_solution: 'FP8 has two formats: E4M3 (4 exponent, 3 mantissa bits — range of ±240, ~1.5 decimal digits precision) and E5M2 (5 exponent, 2 mantissa bits — range of ±57344, ~1 decimal digit). The key insight is that not all operations tolerate the same precision. Matrix multiplications (GEMMs) in the forward pass are robust to FP8 E4M3 because the accumulation happens in FP32 inside the Tensor Core — the low precision only affects inputs. But certain operations are precision-critical: (1) **Softmax** — involves exponentiation where small input differences create large output differences; FP8''s coarse mantissa causes attention weights to "snap" to nearby values, creating systematic bias. (2) **LayerNorm** — the variance computation in FP8 loses small deviations, causing normalization to over-correct. (3) **Residual connections** — adding a small update to a large residual in FP8 causes the update to round to zero (catastrophic cancellation). The fix is **mixed FP8/BF16**: run GEMMs in FP8 (where 90%+ of FLOPs live) but keep softmax, LayerNorm, residual additions, and the loss computation in BF16. This captures ~80% of the FP8 throughput gain while maintaining BF16 stability.'
  common_mistake: |
    **The Pitfall:** Believing FP8 is just too low precision for training.
    **The Rationale:** Giving up the 2× throughput gain without understanding which specific operations are precision-sensitive.
    **The Consequence:** Reverting to pure BF16 and losing massive hardware efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP8 E4M3 precision: 3 mantissa bits → values are quantized to 1 of 8 levels between consecutive powers of 2.
    - In a Transformer, GEMMs account for ~85% of FLOPs.

    **Calculations:**
    - Two logits of 1.32 and 1.37 both round to 1.375, losing distinction in softmax.
    - Running GEMMs in FP8 at 1979 TFLOPS vs BF16 at 989 TFLOPS: GEMM speedup = 2×.
    - Amdahl's Law: overall speedup = 1 / (0.15 + 0.85/2) = 1.74×.

    **Conclusion & Interpretation:**
    - **Result: 1.74× speedup (Compute-Bound)**. Mixed precision achieves significant speedup while maintaining stability.
