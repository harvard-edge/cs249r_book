title: Diagnosing Deadlocks During Simulated GPU Fault Injection
scenario: You are validating the fault tolerance of a 175B parameter LLM training pipeline running on
  1024 NVIDIA A100 (80GB) GPUs across 128 nodes. To test recovery, you use a fault injection daemon to
  simulate an uncorrectable ECC memory error (Xid 48) on a single GPU midway through an epoch. The node
  health agent correctly cordons the affected node, but instead of the training job cleanly aborting and
  resuming from the last checkpoint, the entire 1024-GPU cluster hangs indefinitely at 0% utilization.
  Analyze the root cause of this system-wide deadlock and determine the necessary logs and configuration
  changes to correctly test the fault injection scenario.
details:
  realistic_solution: The root cause is a NCCL communicator deadlock. When one rank abruptly dies during
    an All-Reduce, the remaining 1023 ranks wait indefinitely at the synchronization barrier. To properly
    test fault injection, enable asynchronous error handling (e.g., `TORCH_NCCL_ASYNC_ERROR_HANDLING=1`)
    and set an explicit collective timeout. Analyze the `NCCL_DEBUG=WARN` logs on surviving nodes to confirm
    they are stuck in a collective call waiting for the dead rank.
  common_mistake: Candidates often blame the cluster orchestrator (e.g., Kubernetes) or the checkpointing
    storage layer, failing to realize that synchronous collective communication (NCCL) is blocking the
    surviving ranks from gracefully terminating.
  napkin_math: 'If 1 node (8 GPUs) fails in a 1024 GPU cluster, 1016 GPUs hang. At $2/hour per A100, an
    undetected 4-hour deadlock costs: 1016 GPUs * $2/hour * 4 hours = $8,128 of entirely wasted compute
    due to improper fault propagation.'
