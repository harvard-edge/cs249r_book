title: Burn-in Cost vs Failure Cost
scenario: You receive 500 GPUs at $25K each. Historical data shows 5% infant mortality in the first 2 weeks. Each in-production failure costs $10K in lost training time + replacement labor. A 2-week burn-in test costs $200/GPU in power and rack space.
question: Should you burn-in?
details:
  realistic_solution: 'Execute a pre-production burn-in phase. The upfront operational cost is heavily outweighed by mitigating the cascading disruption costs of replacing nodes dynamically during a critical training run.'
  common_mistake: |
    **The Pitfall:** Skipping burn-in to save time.
    **The Rationale:** Candidates prioritize getting GPUs into production immediately to start training.
    **The Consequence:** They incur massive disruption costs from infant mortality failures during production training, far exceeding the cost of burn-in.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 GPUs, 5% infant mortality in first 2 weeks.
    - Production failure cost: $10,000 per disruption.
    - Burn-in test cost: $200 per GPU.

    **Calculations:**
    - Expected infant failures: 500 * 0.05 = 25 GPUs.
    - Cost of NO burn-in: 25 * $10,000 = $250,000.
    - Cost of burn-in: 500 * $200 = $100,000.
    - Net savings: $250,000 - $100,000 = $150,000.

    **Conclusion & Interpretation:**
    - **Result: 1.5x ROI or $150k savings (Reliability-Bound)**. The deployment avoids disruptions during early-stage training.
