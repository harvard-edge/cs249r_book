title: Burn-in Cost vs Failure Cost
scenario: You receive 500 GPUs at $25K each. Historical data shows 5% infant mortality in the first 2
  weeks. Each in-production failure costs $10K in lost training time + replacement labor. A 2-week burn-in
  test costs $200/GPU in power and rack space. Should you burn-in?
question: "Should you burn-in?"
details:
  realistic_solution: 'Without burn-in: 5% of 500 = 25 GPUs fail in production. Cost: 25 × $10K = $250K
    in disruption. With burn-in: Cost: 500 × $200 = $100K. Expected infant failures caught during burn-in:
    25 GPUs (replaced before production at no disruption cost, just warranty swap). Net savings: $250K
    - $100K = $150K. ROI on burn-in: 150K/100K = 1.5x. Additionally, burn-in provides confidence in the
    fleet and avoids unpredictable training interruptions during the critical first weeks. The 2-week
    delay is almost always worth it.'
  common_mistake: Skipping burn-in to save time. The upfront cost of burn-in is much smaller than the
    disruption cost of infant mortality failures during production training.
  napkin_math: 'No burn-in: 25 failures × $10K = $250K loss. Burn-in: 500 × $200 = $100K. Savings: $150K.
    Always burn-in.'
