validation_issues_pro:
- The required memory bandwidth of 4 TB/s exceeds the physical limits of current single accelerators like
  the A100 (~2 TB/s) or H100 (~3.35 TB/s).
- The compute power calculation is dimensionally incorrect and uses inconsistent numbers; it should be
  based on 4 TFLOP/s for a 20B model, not 40 TFLOPs.
