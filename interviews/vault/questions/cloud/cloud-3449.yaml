title: Inference Tail-Latency vs Training Throughput Contention on TPU v5e
scenario: A multi-tenant TPU v5e pod (each chip 16 GB HBM, 197 TFLOPS BF16, 1.6 TB/s HBM, ICI ~25 GB/s
  per axis) co-locates a critical inference service (p99 SLO 80 ms, 4 GB HBM, peak 60 TFLOPS) with a
  long-running data-parallel training job (8-chip slice, 12 GB HBM per chip, peak 130 TFLOPS per chip).
  Under load, training's per-step ICI AllReduce monopolizes the inter-chip ring for ~9 ms windows,
  pushing inference p99 from 60 ms to 145 ms — a 1.8x SLO violation. Choose a single resource-management
  strategy that restores the inference SLO and quantify the cost to training throughput.
question: "How would you eliminate the 9 ms ICI AllReduce tail that blows the inference SLO on a shared TPU v5e pod, and what does it cost the training job?"
details:
  realistic_solution: 'Bind the inference workload to a dedicated 1-chip slice with reserved ICI bandwidth
    (gang-scheduled at job start), and let the 8-chip training slice keep ring-AllReduce on its own
    sub-topology. This costs the training job one chip''s worth of compute (~12.5% throughput drop),
    but eliminates the tail-causing ring contention. As a complement, run training AllReduce in 8-MB
    chunks so that even brief preempting kernels can interleave with no more than ~1 ms of ICI dwell
    — keeps inference p99 under the 80 ms SLO. Avoid TPU-wide context-switch preemption: the SPMD execution
    model means any preempted shard stalls every other shard in the slice, so the 1 ms preemption granularity
    becomes 9 ms in practice.'
  common_mistake: Applying generic CPU/GPU MIG/MPS partitioning logic to TPU v5e. v5e exposes ICI as
    a hard-partitioned mesh, so the fix is *physical* slice isolation, not time-slicing. Time-slicing
    a TPU under SPMD breaks the synchronous ring and produces *worse* tail latency than the contention
    it was meant to fix.
  napkin_math: 'Training 8-chip ring AllReduce per step: 2*(7/8) * 2 GB / 25 GB/s ≈ 140 ms wall clock,
    of which ~9 ms is the longest contiguous ICI window any one chip dominates. Inference path: 60 ms
    compute + 9 ms ICI stall = 69 ms baseline → spikes to 145 ms when stalls cluster. Reserving 1 dedicated
    chip for inference: training compute drops from 8 * 130 = 1040 TFLOPS to 7 * 130 = 910 TFLOPS (-12.5%),
    and inference p99 tail drops back to ~65 ms (no more ICI dwell from training). 8-MB chunked AllReduce:
    each chunk = 8 MB / 25 GB/s ≈ 0.32 ms, so any preempting inference kernel sees ≤ 1 ms ICI hold.'
