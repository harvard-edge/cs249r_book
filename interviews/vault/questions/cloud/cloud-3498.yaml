title: Diagnosing Latency Spikes and OOM During Canary Rollout on NVIDIA H100
scenario: 'Your team is conducting a 5% canary rollout of a new deep learning model for real-time video analytics to an inference service deployed on a Kubernetes cluster. Monitoring dashboards reveal a 300ms increase in p99 inference latency for the canary instances. Simultaneously, GPU utilization on the canary instances fluctuates wildly, often dropping below 20%, yet application logs are intermittently reporting CUDA_OUT_OF_MEMORY errors.'
question: 'How would you systematically diagnose the root cause of these seemingly contradictory symptoms (low utilization and OOM) and stabilize the system?'
details:
  realistic_solution: 'Pause the canary rollout. Use tools like dcgm-exporter and Nsight Systems to trace memory allocations. The contradictory symptoms likely stem from dynamic batching causing a single intermediate tensor to exceed VRAM, forcing the GPU to stall or crash, which tanks overall utilization despite the OOM error.'
  common_mistake: |
    **The Pitfall:** Panicking and attributing the OOM to a general "model size" issue rather than diagnosing the specific dynamic tensor allocations.
    **The Rationale:** OOM errors intuitively suggest the model is too big for the VRAM.
    **The Consequence:** Aborting the rollout entirely instead of finding the specific batching or memory fragmentation issue causing intermediate tensor blowups.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - New Model Intermediate Tensor: `(Batch_Size, 4096, 4096, 32)` in FP16.
       - Precision: FP16 (2 bytes).
    2. **Calculations:**
       - B=1 Cost: 1 * 4096 * 4096 * 32 * 2 bytes ≈ 1.07 GB.
       - B=16 Cost: At batch size 16, this single intermediate tensor consumes ~17.2 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Dynamic spikes in batch size massively inflate intermediate tensors, triggering OOM and causing utilization to crater while the GPU stalls.**
