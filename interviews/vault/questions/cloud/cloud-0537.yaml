title: The Data Quality Pipeline
scenario: You're building a continuous training pipeline that ingests 10 TB of new user interaction data
  daily. Last month, a silent data corruption (a logging schema change) poisoned 3 days of training data
  before anyone noticed, causing a 5% accuracy regression that took 2 weeks to diagnose. Design a data
  quality pipeline that catches this within 1 hour.
details:
  realistic_solution: 'A production data quality pipeline needs four layers: (1) **Schema validation**
    — Great Expectations or TFX Data Validation. Catches: missing columns, type changes, null rates. Latency:
    minutes. (2) **Statistical profiling** — compute per-column distributions (mean, std, quantiles, cardinality)
    on each hourly data shard and compare against a 7-day rolling baseline. Alert on KL-divergence > threshold.
    Catches: distribution shifts, logging bugs that produce valid-but-wrong values. (3) **Embedding drift
    detection** — run a small encoder on a sample of each shard, compare embedding centroids against baseline.
    Catches: semantic shifts that column-level stats miss. (4) **Canary training** — train a small proxy
    model on each day''s data for 100 steps, compare loss curve against expected trajectory. Catches:
    data that''s structurally and statistically valid but produces bad gradients.'
  common_mistake: '"Add data validation checks before training." This is necessary but insufficient —
    schema validation catches structural changes but not statistical drift in valid-looking data.'
  napkin_math: '10 TB/day = 417 GB/hour. Schema validation: trivial compute, <1 min. Statistical profiling
    on 1% sample: 4.17 GB × 100 columns × basic stats = ~5 min on 8 CPU cores. Embedding drift: encode
    10k samples/hour with a small BERT → 30 sec on 1 GPU. Canary training: 100 steps on proxy model →
    2 min on 1 GPU. **Total detection latency: <10 minutes.** Cost: 1 GPU + 8 CPU cores = ~\$3/hour =
    \$2,160/month. The schema change incident cost: 3 days of bad training (\$15k in GPU waste) + 2 weeks
    of engineer time to diagnose (2 engineers × \$100/hr × 80 hrs = \$16k) + accuracy regression impact.
    **Prevention ROI: \$31k saved per incident vs \$2.2k/month monitoring cost.**'
