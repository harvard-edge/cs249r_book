title: FP8 Delayed Scaling Out-of-Bounds in Production
scenario: Your serving infrastructure processes 5,000 QPS using an FP8 E4M3 LLM. To avoid the overhead of dynamically calculating the max of every activation tensor, you implement 'delayed scaling' using the max scale from the previous N batches. During a sudden shift in user prompts, the model outputs NaNs.
question: Why does delayed scaling with FP8 E4M3 produce NaNs when prompts shift abruptly, and how would you mitigate it?
details:
  realistic_solution: |
    Delayed scaling relies on the assumption that activation distributions change smoothly between consecutive batches. When the prompt distribution shifts abruptly, the actual maximum activation value in the new batch can be significantly larger than the historical maximum used to calculate the scaling factor. Because E4M3 has a very low maximum representable value, applying a scaling factor optimized for smaller historical activations to the new, larger activations pushes them past the format's limit, causing an overflow to NaN. The architectural fix is to either use a safe margin in the delayed scale, switch back to dynamic per-token scaling for highly variable workloads, or use a format with higher dynamic range like E5M2 for problematic layers.
  common_mistake: |
    **The Pitfall:** Assuming unexpected NaNs during text generation are caused by out-of-memory errors or context length limits.
    **The Rationale:** Because NaNs often appear during catastrophic system failures or OOMs, engineers blame infrastructure limits rather than examining the numerical stability of their quantization strategy.
    **The Consequence:** Teams ignore the numerical overflow issue, leading to persistent model crashes whenever user traffic patterns shift abruptly.
  napkin_math: |
    - **FP8 E4M3 Limit:** Maximum representable value is 448.
    - **Delayed Scale Calculation:** If historical max activation is 10.0, Scale S = 448 / 10.0 = 44.8.
    - **Distribution Shift:** A new prompt introduces an outlier activation of 15.0.
    - **Overflow:** Quantized value = 15.0 * 44.8 = 672.
    - **Result:** **672 > 448. This overflows E4M3 precision, producing NaNs.**
