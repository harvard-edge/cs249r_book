title: The Real-Time Batching Deadline
scenario: You're architecting an LLM inference service for a 7-billion parameter model running on a single
  NVIDIA H100. The service has a strict P99 latency SLO of 100ms to generate 50 tokens per request. Assuming
  the H100 achieves 50% of its peak FP16 throughput and ignoring all other sources of latency (e.g., network,
  queueing), explain how you would calculate the maximum batch size the system can handle in a single,
  continuous generation without violating the SLO.
details:
  realistic_solution: The correct approach is to determine the total computational budget within the 100ms
    latency window and divide that by the computational cost of a single request. This tells you how many
    requests can be processed in parallel (i.e., the batch size) while meeting the deadline. The problem
    is compute-bound by definition due to the latency SLO.
  common_mistake: Engineers often confuse the compute formulas for training (`~6PD`) and inference (`~2PT`),
    leading to a significant underestimation of capacity. A second common error is forgetting to apply
    a realistic utilization factor; using peak theoretical FLOPS will vastly overestimate the batch size
    the system can actually handle. A third mistake is to incorrectly analyze the bottleneck, calculating
    a memory-bound limit when the question is explicitly about a compute-bound deadline.
  napkin_math: 1. **Calculate Effective H100 Throughput:** The H100's peak FP16 throughput is 989 TFLOPS.
    For napkin math, we can round this to 989 TFLOPS/s. At 50% utilization, the effective throughput is
    `989 TFLOPS/s * 0.5 = 500 TFLOPS/s`.
