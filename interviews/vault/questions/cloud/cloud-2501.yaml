title: Cloud Drift Detection via Edge Proxies
scenario: You deploy 1M industrial vibration sensors running a CMSIS-DSP/TFLite Micro anomaly detection
  model. The cloud must monitor for concept drift to trigger retraining. However, uploading raw 16kHz
  vibration data requires 256kbps continuous bandwidth, which is impossible over the available 10kbps
  LoRa link.
question: "How would you monitor concept drift across 1M vibration sensors over 10kbps LoRa without uploading raw 16kHz data?"
details:
  realistic_solution: Co-design the edge inference graph to compute a lightweight statistical drift proxy
    alongside the main model. Instead of sending raw data, the edge device calculates the autoencoder
    reconstruction error, output softmax entropy, or feature embedding distances over a rolling window.
    It then transmits a tiny summary statistic (e.g., a 4-byte float representing daily average entropy)
    to the cloud. The cloud aggregates these telemetry proxies from the 1M devices to identify fleets
    experiencing drift and selectively triggers targeted data collection or FL rounds only on those specific
    devices.
  common_mistake: Sampling raw data randomly (e.g., 1 second of audio per day) and sending it to the cloud,
    which misses transient anomalies and still consumes high bandwidth.
  napkin_math: 'Raw data: 16,000 samples/sec * 16-bit = 256 kbps. Over 1 day = 2.7 GB per device (impossible
    on LoRa). Drift proxy: Edge computes mean reconstruction MSE every minute. Averages it hourly. Sends
    24 floats (96 bytes) per day. 96 bytes at 10kbps takes < 0.1 seconds to transmit. Cloud processes
    96 bytes * 1M devices = ~96 MB/day of highly actionable drift metadata.'
