title: CUDA-to-HIP Translation Overhead for a Custom GEMM Kernel
scenario: Your team has 15,000 lines of custom CUDA kernels for a recommendation model. Management wants to also deploy on clusters. You propose using hipify-perl for automated translation. A colleague warns that translation is not 1:1.
question: How would you use hipify-perl to port the 15K CUDA lines, and what manual work and timeline should you expect?
details:
  realistic_solution: Run hipify-perl for the mechanical 85-95% translation (cuda* -> hip* renames), then audit the remaining calls. Texture references must become HIP texture objects, cooperative_groups need hipCG equivalents, and any __shfl_sync intrinsics need careful lane-mask verification on CDNA's 64-wide wavefronts vs CUDA's 32-wide warps. Budget 2-4 engineer-weeks for a 15K-line codebase, not 2 days.
  common_mistake: |
    **The Pitfall:** Assuming hipify-perl produces drop-in HIP code with zero manual intervention.
    **The Rationale:** Candidates overlook that complex intrinsics (texture memory, cooperative groups, warp syncs) require manual architectural adaptation between CDNA and CUDA.
    **The Consequence:** Promising unrealistic timelines and failing to deliver a functional port.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Lines of Code: 15,000 lines.
       - Manual Porting Rate: 5-15% of CUDA API calls require manual porting.
    2. **Calculations:**
       - Volume: 15,000 * 0.10 (average) = 1,500 lines.
       - Timeline: At ~50 lines/hour for tricky intrinsics, 1,500 / 50 = 30 engineer-hours minimum.
    3. **Conclusion & Interpretation:** **Result: Human-Time-Bound.** Nearly a full week is required.
