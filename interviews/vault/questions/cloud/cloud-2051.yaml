title: The Embedding Model Drift Crisis
scenario: Your team upgrades the embedding model from v1 to v2 (better benchmarks). The new model produces
  embeddings in a different vector space. You have 200M documents embedded with v1 and new documents arriving
  at 100K/day embedded with v2. You cannot afford to re-embed all 200M documents at once ($20K compute
  cost, 3-day job). How do you manage the transition without degrading retrieval quality?
question: "How do you manage the transition without degrading retrieval quality?"
details:
  realistic_solution: 'Multi-phase migration strategy: (1) Learn a lightweight alignment transform (linear
    projection matrix W that maps v2 embeddings into v1 space, trained on 50K paired documents embedded
    with both models). Apply W to all new documents and queries — they now live in v1 space. Cost: matrix
    multiply adds <1ms per embedding. Quality loss: ~2-3% recall drop vs native v2, but better than mixing
    spaces. (2) Background re-embedding: re-embed 200M documents with v2 in the background at ~1M docs/day
    over 200 days. As batches complete, move them to a v2-native index. (3) Dual-index routing: maintain
    a v1 index (shrinking) and v2 index (growing). Route queries to both, merge results using RRF (rank-based,
    avoids cross-space score comparison). (4) Cutover: when v1 index is empty, retire alignment transform.
    Total migration: ~7 months, zero downtime, gradual quality improvement.'
  common_mistake: Running both embedding models and searching both indexes for every query. This doubles
    query latency and compute cost indefinitely, and relevance scores across different embedding spaces
    are not comparable.
  napkin_math: 'Re-embed all at once: 200M × $0.0001/embedding = $20K, 200M / 3M per hour ≈ 67 hours =
    3 days of GPU cluster time. Background at 1M/day: 200 days, $100/day = $20K total (same cost, spread
    out). Alignment transform training: 50K pairs × 2 embeddings = 100K embeddings ≈ $10. Transform overhead:
    1536×1536 matrix multiply ≈ 4.7M FLOPs per query ≈ 0.01ms on CPU.'
