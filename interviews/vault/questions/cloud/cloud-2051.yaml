title: The Embedding Model Drift Crisis
scenario: Your team upgrades the embedding model from v1 to v2. You have 200M documents embedded with v1 and new documents arriving at 100K/day embedded with v2. Re-embedding all 200M documents at once costs $20K compute and 3 days of downtime.
question: How do you manage the transition to the new embedding model without degrading retrieval quality or causing downtime?
details:
  realistic_solution: 'Multi-phase migration strategy: (1) Learn a lightweight alignment transform (linear projection matrix W that maps v2 embeddings into v1 space, trained on 50K paired documents embedded with both models). Apply W to all new documents and queries. (2) Background re-embedding: re-embed 200M documents with v2 in the background. (3) Dual-index routing: maintain a v1 index and v2 index. Route queries to both, merge results using RRF. (4) Cutover: when v1 index is empty, retire alignment transform.'
  common_mistake: |
    **The Pitfall:** Running both embedding models and searching both indexes for every query.
    **The Rationale:** Relevance scores across different embedding spaces are not comparable, breaking rank logic.
    **The Consequence:** This doubles query latency and compute cost indefinitely, degrading search quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200M documents. $0.0001 per re-embed.
       - Transform: 50K pairs. 1536x1536 matrix.
    2. **Calculations:**
       - Re-embed Cost: 200M * $0.0001 = $20,000.
       - Alignment Transform Overhead: 1536*1536 * 2 ≈ 4.7M FLOPs ≈ 0.01ms CPU.
       - Transform Cost: 100K embeddings ≈ $10.
    3. **Conclusion & Interpretation:**
       - **An alignment transform enables zero downtime with <1ms overhead during a background migration. Result: Compute-Bound mitigated.**
