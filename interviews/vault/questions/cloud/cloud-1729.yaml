title: KV Cache Preemption Swap Latency
scenario: A low-priority batch of 32 requests (2,000 tokens each) is preempted on an A100 node. The system swaps their KV cache (320 KB per token) from GPU HBM to CPU RAM over a PCIe Gen4 bus (25 GB/s effective bandwidth), and will swap it back when resuming.
question: What total PCIe latency penalty does swapping out and back the KV cache for 32 requests at 2,000 tokens incur?
details:
  realistic_solution: Calculate the total KV cache volume for the batch, divide by the effective PCIe bandwidth, and multiply by two to account for both the swap-out and swap-in phases.
  common_mistake: |
    **The Pitfall:** Only calculating the swap-out time and ignoring the swap-in time.
    **The Rationale:** Preemption feels like a single action (eviction), so engineers forget the cost of resumption.
    **The Consequence:** Underestimating the total latency penalty by 50%, severely misjudging the impact of preemptive scheduling on tail latencies.
  napkin_math: |
    - **KV Cache Volume**: 32 requests × 2,000 tokens × 320 KB/token = 20.48 GB.
    - **Single Transfer Time**: 20.48 GB / 25 GB/s = 0.8192 seconds.
    - **Total Swap Penalty**: 0.8192s (out) + 0.8192s (in) = **~1.64 seconds**.
