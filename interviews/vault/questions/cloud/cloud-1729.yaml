title: KV Cache Preemption Swap Latency
scenario: You manage an LLM inference service running a 70B model on an A100 node. A low-priority batch
  of 32 requests, each currently at a sequence length of 2,000 tokens, is preempted to free up KV cache
  for high-priority traffic. The system swaps their KV cache (320 KB per token) from GPU HBM to CPU RAM
  over a PCIe Gen4 x16 bus (effective bandwidth 25 GB/s), and will swap it back when resuming. Calculate
  the total PCIe latency penalty incurred by this preemption.
question: "What total PCIe latency penalty does swapping out and back the KV cache for 32 requests at 2,000 tokens incur?"
details:
  realistic_solution: Calculate the total KV cache volume for the batch, divide by the effective PCIe
    bandwidth, and multiply by two to account for both the swap-out and swap-in phases.
  common_mistake: Ignoring the PCIe bottleneck entirely, or only calculating the swap-out time while forgetting
    that the KV cache must also be swapped back in to resume generation.
  napkin_math: KV size = 32 reqs * 2,000 tokens * 320 KB/token = 20.48 GB. PCIe Gen4 bandwidth = 32 GB/s.
    Single transfer time (GPU to CPU) = 20.48 GB / 32 GB/s = 0.64 seconds. Total swap penalty (out + in)
    = 0.64s * 2 = 1.28 seconds. The PCIe Gen4 bus becomes the primary bottleneck during preemptive KV
    swaps.
