title: The Structured Output Constraint
scenario: Your API must return valid JSON for downstream systems. You are using constrained decoding (grammar-guided generation) to guarantee valid JSON output. The team reports that constrained decoding adds 15ms per token on top of the normal 30ms TPOT. For a 500-token JSON response, that adds 7.5 extra seconds of latency.
question: Is this overhead acceptable, and can we reduce it?
details:
  realistic_solution: 'Constrained decoding works by masking invalid tokens at each step according to a grammar (e.g., JSON CFG). The overhead comes from: (1) computing the valid token mask by traversing the grammar state machine against the full vocabulary (~32K–128K tokens), and (2) applying the mask before sampling. The 15ms/token overhead is typical for naive implementations. Optimizations include: pre-computing grammar state transitions into a lookup table, using a compressed vocabulary trie, or using speculative grammar checking (validate only the top-K tokens instead of the full vocabulary). Alternatively, for simple schemas, use structured output mode with retry: generate unconstrained, parse, retry on failure — cheaper if failure rate is <10%.'
  common_mistake: |
    **The Pitfall:** Assuming constrained decoding is always worth the overhead because it guarantees valid output.
    **The Rationale:** Engineers prioritize functional correctness over latency optimization.
    **The Consequence:** For long structured outputs, the cumulative overhead of constrained decoding can significantly exceed the cost of simply generating unconstrained output and retrying on parse failure.
  napkin_math: |
    1. **Baseline TPOT (no constraint):** 30 ms/token.
    2. **Constrained Overhead:** +15 ms/token (Total: 45 ms/token).
    3. **Constrained Cost (500 tokens):** 500 × 45 ms = 22.5 seconds total generation time.
    4. **Unconstrained Cost (500 tokens):** 500 × 30 ms = 15.0 seconds total generation time.
    5. **Retry Strategy Comparison:** Assume unconstrained generation fails JSON parse 10% of the time. Expected attempts = 1 / (1 - 0.10) ≈ 1.11 attempts.
    6. **Expected Time with Retry:** 1.11 × 15.0s = 16.65 seconds.
    7. **Breakeven: Retry is 5.85s faster on average. If failure rate reaches 30%, retry is 21.4s, which is still faster, but P99 tail risk increases significantly.**
