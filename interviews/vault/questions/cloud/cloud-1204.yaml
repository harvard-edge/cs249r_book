title: GPU Energy Efficiency for Embedding Extraction
scenario: A team is evaluating two GPU architectures for a daily batch pipeline processing 100 million text documents into embeddings. Setup A uses an older generation GPU (400W TDP, 5,000 docs/sec throughput). Setup B uses a newer generation GPU (700W TDP, 12,000 docs/sec throughput). Assume both GPUs run at full TDP during processing and idle power is negligible.
question: How much daily energy does Setup A versus Setup B use to process 100M documents, and which is more energy-efficient?
details:
  realistic_solution: Calculate total energy as Power multiplied by Time (where Time equals Total Workload divided by Throughput). The newer generation completes the workload so much faster that its total energy consumed per batch is significantly lower.
  common_mistake: |
    **The Pitfall:** Looking only at the peak power draw (700W vs 400W) and concluding the newer GPU is less energy-efficient.
    **The Rationale:** Candidates fail to apply the "race to sleep" principle, ignoring that the vastly superior throughput reduces the total execution time.
    **The Consequence:** Selecting older hardware that increases both the daily energy bill and overall carbon emissions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Setup A: 400W, 5,000 docs/sec.
    - Setup B: 700W, 12,000 docs/sec.
    - Workload: 100M documents.

    **Calculations:**
    - Setup A Time: 100M / 5,000 = 20,000 seconds.
    - Setup A Energy: 400W * 20,000s = 8,000,000 Joules = 2.22 kWh.
    - Setup B Time: 100M / 12,000 = 8,333 seconds.
    - Setup B Energy: 700W * 8,333s = 5,833,100 Joules = 1.62 kWh.

    **Conclusion & Interpretation:**
    - **Result: 1.62 kWh vs 2.22 kWh (Power-Bound)**. Setup B uses 1.62 kWh vs Setup A's 2.22 kWh, making it ~27% more energy efficient per batch.
