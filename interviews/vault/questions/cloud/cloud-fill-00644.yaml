title: NVIDIA H100 Rack Power and PUE Analysis
scenario: Your team is planning to deploy a new AI training cluster for large language models. You opt
  for NVIDIA H100 GPUs, each consuming a peak of 700W. The existing datacenter has a Power Usage Effectiveness
  (PUE) of 1.6, and its infrastructure has a strict power limit of 15 kW per rack. You intend to populate
  each rack with 16 NVIDIA H100 GPUs, leveraging their 80 GB HBM3 memory, 989 TFLOPS FP16 dense compute,
  and 3.35 TB/s memory bandwidth.
details:
  realistic_solution: A realistic solution requires calculating the total IT load per rack (16 GPUs *
    700W/GPU plus a reasonable overhead for CPU/memory/networking – let's assume 10% overhead for simplicity).
    This total IT load is then compared against the 15 kW rack budget. The total power drawn from the
    utility grid is estimated by multiplying the IT load by the datacenter's PUE (1.6). If the rack's
    IT load exceeds its power budget, options include reducing the number of GPUs per rack, upgrading
    power infrastructure, or exploring advanced cooling solutions like liquid cooling (which could also
    lower PUE) to increase rack density.
  common_mistake: A common mistake is neglecting the PUE factor when calculating the total power drawn
    from the grid, or failing to account for the 'per rack' power budget early in the design phase, potentially
    leading to an over-provisioned and unsupportable rack configuration. Another oversight can be not
    considering the embodied carbon of new infrastructure versus the operational carbon from the power
    consumption.
  napkin_math: '1. Calculate IT power per rack (GPU only): 16 GPUs * 700W/GPU = 11,200W = 11.2 kW.

    2. Check against rack budget: 11.2 kW (IT load) is within the 15 kW rack budget.

    3. Calculate total grid power per rack: 11.2 kW (IT load) * 1.6 (PUE) = 17.92 kW from the grid.'
