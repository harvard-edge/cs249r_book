title: NVIDIA A100 Data Ingestion Bottleneck for Large Language Models
scenario: Your team is training a large language model. The model requires processing 100 terabytes of preprocessed text data from a distributed file system loaded via a custom Python data loader. During initial training runs, the GPU utilization consistently hovers around 40-50%.
question: Why is GPU utilization only 40-50%, and which ETL/data-loading optimizations would you make?
details:
  realistic_solution: "A realistic solution involves a multi-pronged approach to data pipeline optimization. First, profile the data loading process to pinpoint the exact bottleneck (e.g., disk I/O, network latency, CPU-bound preprocessing, Python GIL issues). Solutions might include: \n1.  **Optimized Data Formats:** Using binary, columnar formats like Apache Parquet or TFRecord/WebDataset instead of plain text, reducing deserialization overhead.\n2.  **Asynchronous Data Loading:** Implementing multi-threaded or multi-process data loading with prefetching to overlap data loading with GPU computation.\n3.  **Distributed Caching/Buffering:** Utilizing local SSDs or in-memory caches on compute nodes to store frequently accessed data.\n4.  **Batching and Sharding:** Ensuring optimal batch sizes for GPU processing and sharding data efficiently across nodes.\n5.  **Kernel Offloading/Acceleration:** Offloading CPU-bound data transformations to specialized hardware or optimized libraries (e.g., NVIDIA DALI, nvjpeg) when available.\n6.  **Network Optimization:** Ensuring high-bandwidth, low-latency network connectivity between data storage and compute nodes."
  common_mistake: |
    **The Pitfall:** Immediately assuming the bottleneck is in the model's computational complexity or the GPU's processing power.
    **The Rationale:** Focusing entirely on the accelerator architecture and ignoring the end-to-end data pipeline equation.
    **The Consequence:** Wasting engineering cycles optimizing CUDA kernels when the GPU is simply sitting idle waiting for data to arrive.
  napkin_math: |
    **Assumptions & Constraints:**
    - Effective GPU Utilization: ~45%.
    - T_compute / T_load \approx 0.45.

    **Calculations:**
    - Pipeline Ratio: T_load \approx 2.2 \times T_compute.
    - Example: 10ms compute vs 22ms data load.
    - Idle Time: GPU sits idle for ~55% of the total step time waiting for I/O.

    **Conclusion & Interpretation:**
    - **Result: Python data loader bottleneck (I/O-Bound)**. The custom Python data loader is the unequivocal bottleneck. Using optimized C++ loaders is mandatory.
