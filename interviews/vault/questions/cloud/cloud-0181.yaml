title: The Phoenix False Positive
scenario: You are the Principal Engineer for a new 'Vigilant Driver' feature that uses in-car cameras to detect driver drowsiness. After a successful offline evaluation, you roll it out to 1% of the fleet. Within hours, alerts spike for drivers in sunny cities like Phoenix. The model is flagging them as drowsy, but dashcam footage shows their eyes are open. The edge device does a simple resize and greyscale conversion, and high-resolution video is only uploaded at the end of a driver's 8-hour shift.
question: How would you triage the Phoenix false drowsiness alerts and redesign the pipeline to prevent environmental skew?
details:
  realistic_solution: 'The root cause is a severe case of training-serving skew driven by an unmodeled environmental variable: ambient brightness. The model, trained on overcast data, has incorrectly learned that ''squinting due to bright sun'' is equivalent to ''eyes closing from drowsiness.'''
  common_mistake: |
    **The Pitfall:** Stating the obvious "We need to retrain the model on data from Phoenix" without investigating the root cause or systemic failure.
    **The Rationale:** Candidates jump to reactive retraining rather than identifying the unmodeled environmental variable (ambient brightness) and fixing the feedback loop.
    **The Consequence:** The model breaks again in the next new environment (e.g., snowy cities), and the engineering team remains blind to edge failures for 8 hours at a time.
  napkin_math: |
    - Driver shift length: 8 hours.
    - If an incident happens at hour 1, data sits in the car for 7 hours.
    - **The end-of-shift policy delay enforces a minimum Mean Time To Resolution (MTTR) of 8 hours, making real-time rollback impossible and necessitating edge-triggered logging.**
