title: The Phoenix False Positive
scenario: 'You are the Principal Engineer for a new ''Vigilant Driver'' feature that uses in-car cameras
  to detect driver drowsiness. After a successful offline evaluation, you roll it out to 1% of the fleet.
  Within hours, alerts spike for drivers in sunny cities like Phoenix. The model is flagging them as drowsy,
  but dashcam footage shows their eyes are open. Your constraints: the model was trained on data from
  the overcast Bay Area; the in-car camera has a fixed auto-exposure; the edge device only does a simple
  resize and greyscale conversion before running inference; and to save on cellular costs, high-resolution
  video is only uploaded at the end of a driver''s 8-hour shift. Propose how you would triage this crisis,
  and then design the long-term architectural changes to the data and training pipeline to prevent this
  class of ''environmental skew'' failure.'
details:
  realistic_solution: 'The root cause is a severe case of training-serving skew driven by an unmodeled
    environmental variable: ambient brightness. The model, trained on overcast data, has incorrectly learned
    that ''squinting due to bright sun'' is equivalent to ''eyes closing from drowsiness.'''
  common_mistake: 'A common reaction is to state the obvious: ''We need to retrain the model on data from
    Phoenix.'' This is reactive, not systemic. It doesn''t explain *how* to identify the root cause without
    waiting a full day for data, nor does it create a system that *anticipates* this problem in the future.
    Another mistake is to assume it''s a model bug without first looking for a data-driven explanation
    for the geographic correlation.'
  napkin_math: Quantify the end-of-shift policy delay. If a driver shift is 8 hours, and an incident happens
    at hour 1, data sits in the car for 7 hours. Even if we use an Orin SoC (275 TOPS, 204.8GB/s) for
    on-device inference, the raw video (e.g. 50MB) isn't uploaded until shift end. The engineering team
    has a minimum MTTR floor of 8 hours, making real-time rollback impossible.
