title: Validation Sampling Budget For Data Drift
scenario: A data platform ingests 2 billion training examples per day. Full validation costs 0.2 ms CPU per example, but the daily validation budget is 20,000 CPU-core seconds. Design a sampling plan size that fits the budget and still gives per-source drift visibility across 100 sources.
question: How many examples can be validated under a 20,000 core-second budget at 0.2 ms/example, and how should they be allocated across 100 sources?
details:
  realistic_solution: The budget supports 20,000 / 0.0002 = 100 million validated examples per day. That is 5% of the 2B daily examples. A reasonable plan reserves a minimum per source and allocates the rest proportional to volume, so every source has visibility while high-volume sources get tighter confidence intervals.
  common_mistake: Either validating everything and exceeding budget, or sampling only globally and missing a small source with severe drift.
  napkin_math: Per example cost = 0.0002 s. Budget = 20,000 core-s. Samples = 100,000,000. Fraction = 100M / 2B = 5%.
