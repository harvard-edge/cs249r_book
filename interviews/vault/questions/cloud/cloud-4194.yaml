math_issues:
- Using 2 H100 GPUs provides 2 * 989 = 1978 TFLOPS of compute, so the computation
  time should be 287 / 1978 = 0.145s, not 287 / 989 = 0.29s. Additionally, '287 TFLOPS
  per step' incorrectly uses TFLOPS (a rate) instead of TFLOPs (total operations).
