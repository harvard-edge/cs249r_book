title: CDNA vs CUDA SM Architecture Comparison
scenario: Compare the compute unit (CU) architecture of MI300X's CDNA3 with H100's
  Hopper SM for training a 70B model. MI300X has 304 CUs with 64-wide SIMD, H100 has
  132 SMs with 32-wide warps. Both claim ~1000+ TFLOPS FP16. What architectural differences
  explain why MI300X excels at large batch training while H100 excels at low-latency
  inference?
question: What architectural differences explain why MI300X's 304 CUs excel at large
  batch training while H100's 132 SMs excel at low-latency inference?
details:
  realistic_solution: 'MI300X uses a wider 64-wide SIMD instruction (wave64) across
    304 CUs, optimizing for massive data parallelism and raw throughput. This makes
    it highly efficient for large batch matrix multiplications in training. H100 uses
    a narrower 32-wide warp across 132 SMs but pairs it with Hopper''s advanced Thread
    Block Clusters and asynchronous execution (TMA). The narrower warp and independent
    thread scheduling make H100 much more agile for irregular, latency-sensitive workloads
    like variable-length continuous batching in inference.'
  common_mistake: Comparing only TFLOPS numbers without understanding the microarchitectural
    tradeoffs. MI300X's wider SIMD (64 threads) is more efficient for regular, data-parallel
    workloads but less flexible for irregular, branch-heavy workloads like variable-length
    serving.
  napkin_math: 'Concurrency: MI300X executes 304 CUs × 64 threads = 19,456 threads
    per cycle. H100 executes 132 SMs × 32 threads = 4,224 threads per cycle (base warp).
    MI300X has ~4.6× the raw SIMD width per clock, favoring large dense payloads (training),
    while H100''s design favors quick turnaround and complex scheduling (inference).'
