title: The MoE Memory Trap
scenario: The team switched from a dense 7B model to a 47B Mixture-of-Experts model with 8 experts, 2 active per token. They try to deploy it on a single A100 40 GB and it immediately OOMs.
question: Why does a 47B MoE with only 2 active experts per token OOM on a 40 GB A100 when a dense 13B model would easily fit?
details:
  realistic_solution: 'MoE saves compute but not memory. During inference, only 2 experts are active per token (~13B active parameters total including shared layers), so the FLOPs per token are comparable to a ~13B dense model. But **all 47B parameters must reside in VRAM** because the router can select *any* expert for *any* token — you don''t know which experts will be needed until runtime. The memory footprint is the full 47B × 2 bytes = 94 GB in FP16, regardless of how many experts are active. This is the MoE Memory Trap: the compute profile of a 13B model with the memory profile of a 47B model.'
  common_mistake: |
    **The Pitfall:** Confusing compute utilization with memory footprint.
    **The Rationale:** Thinking that because only 2 of 8 experts are active, the memory usage should mirror the compute profile of a ~13B dense model.
    **The Consequence:** Attempting to deploy massive MoE architectures on under-provisioned hardware, leading to instant OOM failures.
  napkin_math: |
    1. Dense 7B: FLOPs/token $\approx 2 \times 7\text{B} = 14$ GFLOPs. Memory = $7\text{B} \times 2$ bytes = 14 GB.
    2. MoE 47B (2/8 active): Active params per token $\approx 13\text{B}$. FLOPs/token $\approx 26$ GFLOPs.
    3. Memory required: The router can select any expert, so all 47B params must be in VRAM.
    4. Memory = $47\text{B} \times 2$ bytes = 94 GB.
    5. **Result:** **Compute is cheap, but memory is fixed. The 94 GB footprint mathematically cannot fit on a 40 GB card.**
