title: Scope 3 Embodied Carbon Accounting for MI300X Cluster Procurement
scenario: Your sustainability team is conducting a full lifecycle carbon assessment for a proposed 512-MI300X cluster. Each MI300X chip has an estimated embodied carbon of 800 kgCO2eq. The cluster will operate for 4 years at an average utilization of 70%, drawing 750W per chip, in a datacenter with PUE 1.2 and grid intensity of 200 gCO2/kWh.
question: For the 512-MI300X cluster, how do Scope 2 and Scope 3 lifecycle emissions compare, and when does embodied carbon exceed operational carbon?
details:
  realistic_solution: Operational carbon dominates heavily. Calculate the total fixed Scope 3 emissions, then compute the annual Scope 2 emissions including the PUE multiplier, and equate them to find the breakeven utilization point.
  common_mistake: |
    **The Pitfall:** Calculating Scope 2 using GPU power only.
    **The Rationale:** Sustainability analysts often forget to multiply by the Power Usage Effectiveness (PUE), drastically underestimating facility-level operational carbon.
    **The Consequence:** An inaccurate lifecycle carbon assessment that skews corporate sustainability reporting.
  napkin_math: |
    1. **Calculate Scope 3 (Embodied):** 512 chips × 800 kgCO2 = 409,600 kgCO2 (409.6 tCO2).
    2. **Calculate Scope 2 Annual Energy:** 512 × 0.750 kW × 0.70 util × 1.2 PUE × 8,760 h = 2,825,626 kWh.
    3. **Calculate Scope 2 (Operational):** 2,825,626 kWh × 4 years × 0.200 kgCO2/kWh = 2,260,500 kgCO2 (2,261 tCO2).
    4. **Calculate Ratio:** 2,261 / 409.6 = 5.52x (Operational dominates).
    5. **Calculate Breakeven Utilization:** 409,600 = 512 × 0.750 × U × 1.2 × 35,040 × 0.2 → U ≈ 12.7%.
    **Final Result: Scope 2 is 5.52x larger than Scope 3. Embodied carbon only exceeds operational if utilization falls below 12.7%.**
