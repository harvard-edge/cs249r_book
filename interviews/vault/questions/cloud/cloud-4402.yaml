title: Scope 3 Embodied Carbon Accounting for MI300X Cluster Procurement
scenario: Your sustainability team is conducting a full lifecycle carbon assessment
  for a proposed 512-MI300X cluster. Each MI300X chip has an estimated embodied carbon
  of 800 kgCO2eq (fabrication, packaging, shipping). The cluster will operate for
  4 years at an average utilization of 70%, drawing 750W per chip, in a datacenter
  with PUE 1.2 and grid intensity of 200 gCO2/kWh. Compare Scope 2 (operational) versus
  Scope 3 (embodied) carbon over the 4-year lifecycle, and determine the breakeven
  utilization at which Scope 3 exceeds Scope 2.
question: For the 512-MI300X cluster, how do Scope 2 and Scope 3 lifecycle emissions
  compare, and when does embodied carbon exceed operational carbon?
details:
  realistic_solution: 'Scope 3 (embodied): 512 chips × 800 kgCO2 = 409,600 kgCO2 =
    409.6 tCO2 (fixed). Scope 2 (operational): 512 chips × 750W × 0.70 util × 1.2
    PUE × 4 years × 8,760 h/yr × 0.200 kgCO2/kWh. = 512 × 0.75 kW × 0.70 × 1.2 × 35,040
    h × 0.200 = 512 × 4,415 kgCO2 = 2,260,480 kgCO2 = 2,261 tCO2. Ratio: Scope 2 /
    Scope 3 = 2,261 / 409.6 = 5.52×. Operational carbon dominates. Breakeven utilization:
    Scope 2 = Scope 3 → 512 × 750 × U × 1.2 × 35,040 × 0.200 = 409,600. U = 409,600
    / (512 × 750 × 1.2 × 35,040 × 0.200) = 409,600 / 3,229,286 = 12.7%. Only at utilization
    below 12.7% does embodied carbon exceed operational.'
  common_mistake: Calculating Scope 2 as GPU power only, forgetting PUE multiplier.
    Also, comparing raw carbon values without normalizing per unit of output (e.g.,
    per million tokens) makes the analysis less actionable.
  napkin_math: 'Scope 3: 512 × 800 = 409,600 kgCO2. Scope 2 per year: 512 × 0.750
    kW × 0.70 × 1.2 PUE = 512 × 0.630 kW effective = 322.6 kW IT × 1.2 = 387.1 kW
    facility. Annual energy: 387.1 × 8,760 = 3,391,116 kWh. Annual CO2: 3,391,116
    × 0.200 = 678,223 kgCO2. 4-year Scope 2: 2,712,893 kgCO2 = 2,713 tCO2. Scope 2/Scope
    3: 2,713 / 409.6 = 6.62×. Breakeven utilization: 409,600 = 512 × 0.750 × U × 1.2
    × 35,040 × 0.2. Solve for U: U = 409,600 / (512 × 0.75 × 1.2 × 35,040 × 0.2) =
    409,600 / 3,229,286 = 12.7%.'
