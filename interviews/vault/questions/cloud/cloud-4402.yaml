title: Scope 3 Embodied Carbon Accounting for MI300X Cluster Procurement
scenario: Your sustainability team is conducting a full lifecycle carbon assessment for a proposed 512-GPU cluster. Each chip has an estimated embodied carbon of 800 kgCO2eq. The cluster will operate for 4 years at an average utilization of 70%, drawing 750W per chip, in a datacenter with PUE 1.2 and grid intensity of 200 gCO2/kWh.
question: For the 512-GPU cluster, how do Scope 2 and Scope 3 lifecycle emissions compare, and when does embodied carbon exceed operational carbon?
details:
  realistic_solution: Operational carbon dominates heavily. Calculate the total fixed Scope 3 emissions, then compute the annual Scope 2 emissions including the PUE multiplier, and equate them to find the breakeven utilization point.
  common_mistake: |
    **The Pitfall:** Calculating Scope 2 using GPU power only without facility overhead.
    **The Rationale:** Sustainability analysts often forget to multiply by the Power Usage Effectiveness (PUE), drastically underestimating facility-level operational carbon.
    **The Consequence:** An inaccurate lifecycle carbon assessment that skews corporate sustainability reporting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 512 GPUs, 800 kgCO2eq embodied each.
       - Power: 750W/GPU, 70% utilization, 4 years.
       - Facility: PUE 1.2, 200 gCO2/kWh.
    2. **Calculations:**
       - Scope 3 (Embodied): 512 × 800 kgCO2 = 409,600 kgCO2.
       - Scope 2 Energy: 512 × 0.750 kW × 0.70 × 1.2 × (4 × 8760h) ≈ 11,302,502 kWh.
       - Scope 2 Carbon: 11,302,502 kWh × 0.200 kgCO2/kWh ≈ 2,260,500 kgCO2.
       - Ratio: 2,260,500 / 409,600 ≈ 5.52x.
       - Breakeven Utilization: 409,600 = 512 × 0.750 × U × 1.2 × 35040 × 0.2 → U ≈ 12.7%.
    3. **Conclusion & Interpretation:** **Scope 2 operational carbon is 5.52x larger than Scope 3 embodied carbon. Result: Power-Bound.**
