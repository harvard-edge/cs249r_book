title: REST API Serialization Overhead
scenario: You are deploying a vector embedding service on AWS using a standard FastAPI REST endpoint returning JSON. The service processes a batch of 64 user queries and returns 64 embeddings, each a 1024-dimensional float32 vector. Profiling shows the actual model inference on an NVIDIA T4 GPU takes exactly 12.0 ms. Assume Python's standard `json` module parses and serializes text at roughly 50 MB/s and an average float32 formatted in JSON takes 10 characters (bytes).
question: For 64 embeddings of 1024 float32 values over JSON, what is the payload size, serialization time, and primary latency bottleneck?
details:
  realistic_solution: Calculate the JSON serialization overhead to prove it is the bottleneck (12.5 ms vs 12.0 ms inference). Resolve this by either migrating to a binary protocol like gRPC/Protobuf or replacing the native JSON library with a fast C-extension like `orjson`.
  common_mistake: |
    **The Pitfall:** Focusing purely on optimizing the model weights or upgrading the GPU.
    **The Rationale:** Candidates often fail to realize that text-based JSON serialization of large dense float arrays incurs an O(N) CPU penalty that exceeds the actual inference time.
    **The Consequence:** Upgrading hardware will yield no latency improvements since the bottleneck is entirely CPU-bound text processing.
  napkin_math: |
    1. Total floats per batch = 64 vectors * 1024 dimensions = 65,536 floats.
    2. JSON payload size = 65,536 floats * 10 bytes/float = 655,360 bytes (~0.625 MB).
    3. Serialization time = 0.625 MB / 50 MB/s = 0.0125 seconds = 12.5 ms.
    4. **Conclusion: Because 12.5 ms (Serialization) > 12.0 ms (Compute), the REST protocol overhead is the primary latency bottleneck.**
