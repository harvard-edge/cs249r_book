title: The Multi-Objective Experiment Frontier
scenario: "Your experiment tracking dashboard shows 500 completed experiments for a language model fine-tuning project. Each experiment has three metrics: accuracy, inference latency, and model size. Your production constraints are: accuracy > 85%, latency < 100ms, model size < 2GB. Only 12 experiments meet all three constraints. Of those 12, how do you systematically choose the best model? The PM wants 'the most accurate one' but the SRE team wants 'the fastest one'."
question: "Of those 12, how do you systematically choose the best model?"
details:
  realistic_solution: 'Construct the Pareto frontier across the 3 objectives within the feasible region. A model is Pareto-optimal if no other model is better on all three metrics simultaneously. Typically, 3-5 of the 12 feasible models will be on the Pareto frontier. Then apply a structured selection criterion: (1) Identify the knee point — the model where marginal accuracy gains require disproportionate latency/size costs. (2) Add safety margins: prefer models at 80ms over 99ms latency, because production load spikes can push latency over the SLA. (3) Consider operational metrics: smaller models are cheaper to serve and faster to deploy. The answer is rarely the most accurate or the fastest — it is the model with the best accuracy per unit of operational risk.'
  common_mistake: |
    **The Pitfall:** Picking the model with the highest accuracy among the 12 feasible candidates without considering the Pareto frontier.
    **The Rationale:** Candidates fail to account for the lack of safety margins, prioritizing a single metric over system reliability.
    **The Consequence:** Deploying a model that barely meets SLAs (e.g., 99ms), leading to cascading timeouts during production traffic spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 12 feasible models. Target SLA: 100ms latency.
       - Best accuracy model: 88% acc, 99ms latency, 1.8GB size.
       - Knee-point model: 87% acc, 60ms latency, 1.2GB size.
       - Production Load: 10,000 QPS.
    2. **Calculations:**
       - Latency margin saved = 99ms - 60ms = 39ms.
       - Size reduction = 1.8GB - 1.2GB = 0.6GB.
       - Compute overhead saved = 10,000 QPS * 39ms = 390 GPU-seconds/second.
    3. **Conclusion & Interpretation:**
       - **Result: Trading 1% accuracy saves 390 GPU-seconds/second of compute overhead.** (Compute-Bound Risk Mitigation).
