title: Progressive Rollout of a Large Language Model on AMD MI300X Cluster
scenario: Your team has developed a new, larger version of a proprietary Large Language
  Model (LLM) that is critical for a high-traffic inference service. This new LLM,
  due to its size, demands substantial memory and computational resources. You are
  tasked with deploying this updated model to a production environment running on
  a cluster of AMD MI300X accelerators. Each MI300X boasts 192 GB of HBM3 memory,
  5.3 TB/s of memory bandwidth, and 1.30 PFLOPs of FP16 performance. The goal is to
  roll out this new model with minimal user-facing impact, ensuring high availability,
  and the ability to quickly revert if issues arise. Describe the progressive rollout
  strategy you would implement.
question: What progressive rollout strategy would you use to deploy the larger LLM
  on MI300X with high availability and fast rollback?
details:
  realistic_solution: Implement a canary deployment strategy combined with shadow
    traffic. Initially, deploy the new model to a small subset (e.g., 5%) of the AMD
    MI300X accelerators as a canary. Simultaneously, configure shadow traffic, mirroring
    a small percentage of live user requests to the new model without returning its
    responses to users. Monitor key metrics such as latency, throughput, error rates,
    and resource utilization (especially MI300X HBM3 memory and compute utilization)
    from both the canary and shadow deployments. If metrics are stable and within
    acceptable thresholds for a defined period, gradually increase the traffic to
    the new model in controlled stages (e.g., 10%, 25%, 50%, 100%). Leverage the MI300X's
    substantial memory capacity to host the new LLM completely on a single accelerator
    instance, minimizing the need for model parallelism across devices during the
    rollout and simplifying resource management. If any issues are detected at any
    stage, traffic is immediately rerouted back to the stable, old version, minimizing
    blast radius and enabling rapid recovery.
  common_mistake: A common mistake is performing a 'big bang' deployment, replacing
    all instances of the old model with the new one simultaneously. This risks catastrophic
    service outages if the new model has performance regressions, unseen bugs, or
    higher resource consumption than anticipated, making immediate rollback difficult
    under pressure and potentially leading to significant data loss or user dissatisfaction.
  napkin_math: Given a 70B parameter LLM (like Llama-2/3) typically requires ~140
    GB in FP16 precision (2 bytes per parameter), a single AMD MI300X with 192 GB
    HBM3 memory can comfortably host this model entirely. For a fleet of 100 MI300X
    accelerators, a 5% canary deployment would involve 5 accelerators. If each MI300X
    handles an average throughput of 'X' queries per second (QPS), the canary stage
    would process 5 * X QPS. The 5.3 TB/s bandwidth translates to approximately 5300
    GB/s. If an inference request involves reading 'Y' GB from memory, then the maximum
    QPS due to bandwidth is ~5300/Y. When designing the traffic splitting, ensure
    the canary group's total QPS doesn't exceed 5 * X QPS based on historical traffic
    patterns, leaving ample headroom for the existing service.
