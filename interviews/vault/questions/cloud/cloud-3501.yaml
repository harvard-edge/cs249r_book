title: Progressive Rollout of a Large Language Model on AMD MI300X Cluster
scenario: 'Your team has developed a larger version of a proprietary LLM critical for a high-traffic inference service. You are tasked with deploying this updated model to a production environment running on a cluster of AMD MI300X accelerators. The goal is to roll out this new model with minimal user-facing impact, ensuring high availability, and the ability to quickly revert if issues arise.'
question: 'What progressive rollout strategy would you use to deploy the larger LLM on MI300X with high availability and fast rollback?'
details:
  realistic_solution: 'Implement a canary deployment strategy combined with shadow traffic. Initially, deploy the new model to a small subset (e.g., 5%) of the AMD MI300X accelerators as a canary. Simultaneously, configure shadow traffic, mirroring a small percentage of live user requests to the new model without returning its responses to users. Monitor key metrics such as latency, throughput, error rates, and resource utilization (especially MI300X HBM3 memory and compute utilization) from both the canary and shadow deployments. If metrics are stable and within acceptable thresholds for a defined period, gradually increase the traffic to the new model in controlled stages (e.g., 10%, 25%, 50%, 100%). Leverage the MI300X''s substantial memory capacity to host the new LLM completely on a single accelerator instance, minimizing the need for model parallelism across devices during the rollout and simplifying resource management. If any issues are detected at any stage, traffic is immediately rerouted back to the stable, old version, minimizing blast radius and enabling rapid recovery.'
  common_mistake: |
    **The Pitfall:** Performing a 'big bang' deployment.
    **The Rationale:** Candidates underestimate the risk of performance regressions or resource consumption spikes in production.
    **The Consequence:** Replacing all instances simultaneously risks catastrophic service outages and makes rollback slow and difficult.
  napkin_math: |
    * A 70B parameter LLM requires ~140 GB in FP16.
    * A single MI300X (192 GB HBM3) can host the entire model.
    * For 100 accelerators, a 5% canary deployment uses 5 accelerators.
    * **By monitoring the canary group's throughput (limited by the 5.3 TB/s bandwidth), you ensure safe scaling before wider rollout.**
