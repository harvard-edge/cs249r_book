title: The Mixed Precision Memory Budget
scenario: 'You are training a 7 billion parameter language model using the Adam optimizer. A standard FP32 training run requires approximately 16 bytes of memory per parameter. To reduce the memory footprint, you switch to mixed-precision training. The forward and backward passes use FP16 for weights and gradients, but you still maintain a master copy of the weights and the full optimizer state in FP32 for stable updates.'
question: 'With mixed-precision Adam for a 7B model, what persistent memory is required, and does it fit on an 80GB GPU?'
details:
  realistic_solution: 'In mixed-precision training, only the model weights used during computation and the gradients are downcast to FP16. The high-precision master copy of the weights and the optimizer state remain in FP32. The memory composition per parameter becomes: FP16 weights (2 bytes) + FP16 gradients (2 bytes) + FP32 master weights (4 bytes) + FP32 optimizer state — momentum (4 bytes) + variance (4 bytes) = 16 bytes per parameter total. Surprisingly, the per-parameter memory for mixed precision (16 bytes) is the same as pure FP32 training (16 bytes) when accounting for all components. The real memory savings from mixed precision come from reduced activation memory (activations stored in FP16 use half the space) and faster computation throughput from FP16 tensor cores, not from parameter storage.'
  common_mistake: |
    **The Pitfall:** Assuming mixed precision simply halves the total memory requirement from 16 bytes/param to 8 bytes/param.
    **The Rationale:** The term "mixed precision" leads people to believe everything is downcast, forgetting that Adam requires FP32 master weights, momentum, and variance to prevent precision loss.
    **The Consequence:** Teams underprovision GPU memory, expecting a 7B model to easily fit on a small GPU, leading to immediate OOM errors.
  napkin_math: |
    1. **Pure FP32 Components:** Weights (4B) + Gradients (4B) + Momentum (4B) + Variance (4B) = 16 bytes/param.
    2. **Mixed FP16 Components:** FP16 Weights (2B) + FP16 Gradients (2B) + FP32 Master Weights (4B) + FP32 Momentum (4B) + FP32 Variance (4B) = 16 bytes/param.
    3. **Total for 7B Model:** 7 Billion × 16 bytes = 112 GB.
    4. **Conclusion:** 112 GB > 80 GB. **It does not fit.** The persistent memory footprint is identical to pure FP32; savings come exclusively from halved activation memory and faster computation.
  options:
  - 56 GB
  - 84 GB
  - 98 GB
  - 112 GB
  correct_index: 3
