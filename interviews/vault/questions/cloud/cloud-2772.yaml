title: Threat Model Risk Matrix
scenario: You are building a threat model for an ML-based fraud detection system. The system processes 1M transactions/day with a 0.1% fraud rate.
question: What four ML-specific threats would you include for the fraud detector, and how would you score their likelihood, impact, and risk?
details:
  realistic_solution: 'Threat 1: Adversarial evasion (crafted transactions that bypass fraud detection). Likelihood: 4 (fraudsters are sophisticated). Impact: 4 (missed fraud = direct financial loss). Risk: 16. Threat 2: Data poisoning (inject fake legitimate labels on fraudulent transactions over time). Likelihood: 2 (requires access to labeling pipeline). Impact: 5 (corrupts the model systematically). Risk: 10. Threat 3: Model extraction (competitor queries API to clone the fraud model). Likelihood: 3 (API is externally accessible). Impact: 3. Risk: 9. Threat 4: Training data leakage (model memorizes and leaks PII from transaction data). Likelihood: 3. Impact: 5 (regulatory fines). Risk: 15.'
  common_mistake: |
    **The Pitfall:** Rating all threats equally based on generalized security frameworks.
    **The Rationale:** Security engineers new to ML often fail to differentiate between threats requiring deep insider access (poisoning) versus externally accessible vectors (evasion).
    **The Consequence:** Resources are misallocated to defend against low-likelihood theoretical attacks while critical, externally-facing vulnerabilities remain unmitigated.
  napkin_math: |
    1. Evaluate base fraud exposure: 1M transactions * 0.1% fraud rate = 1,000 fraud cases per day.
    2. Calculate Adversarial Evasion risk: Likelihood(4) * Impact(4) = 16.
    3. Calculate Data Leakage risk: Likelihood(3) * Impact(5) = 15.
    4. Calculate Data Poisoning risk: Likelihood(2) * Impact(5) = 10.
    5. Calculate Model Extraction risk: Likelihood(3) * Impact(3) = 9.
    6. Calculate business impact of evasion: A 1% evasion rate increase equals 10 missed frauds/day. At $500/fraud, this is a **loss of $5,000/day**.
