title: Threat Model Risk Matrix
scenario: You are building a threat model for an ML-based fraud detection system. Identify 4 ML-specific
  threats, rate each on likelihood (1-5) and impact (1-5), and calculate the risk score (likelihood ×
  impact). The system processes 1M transactions/day with a 0.1% fraud rate.
question: "What four ML-specific threats would you include for the fraud detector, and how would you score their likelihood, impact, and risk?"
details:
  realistic_solution: 'Threat 1: Adversarial evasion (crafted transactions that bypass fraud detection).
    Likelihood: 4 (fraudsters are sophisticated). Impact: 4 (missed fraud = direct financial loss). Risk:
    16. Threat 2: Data poisoning (inject fake legitimate labels on fraudulent transactions over time).
    Likelihood: 2 (requires access to labeling pipeline). Impact: 5 (corrupts the model systematically).
    Risk: 10. Threat 3: Model extraction (competitor queries API to clone the fraud model). Likelihood:
    3 (API is externally accessible). Impact: 3 (competitive disadvantage but no direct fraud). Risk:
    9. Threat 4: Training data leakage (model memorizes and leaks PII from transaction data). Likelihood:
    3 (LLM-based systems especially prone). Impact: 5 (regulatory fines, GDPR violations). Risk: 15. Priority
    order by risk: Adversarial evasion (16) > Training data leakage (15) > Data poisoning (10) > Model
    extraction (9). Total daily exposure: 1M × 0.1% = 1000 fraud cases. Even 1% evasion improvement =
    10 more missed frauds/day.'
  common_mistake: Rating all threats equally. Some ML threats (like data poisoning) require insider access
    and are low likelihood but high impact, while others (adversarial evasion) are externally accessible
    and higher likelihood.
  napkin_math: 'Risk scores: Evasion=16, Data leakage=15, Poisoning=10, Extraction=9. At 1000 frauds/day,
    1% evasion rate increase = 10 missed frauds × avg $500 = $5K/day lost.'
