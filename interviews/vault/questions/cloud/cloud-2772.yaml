title: Threat Model Risk Matrix
scenario: You are building a threat model for an ML-based fraud detection system. The system processes 1M transactions/day with a 0.1% fraud rate.
question: What four ML-specific threats would you include for the fraud detector, and how would you score their likelihood, impact, and risk?
details:
  realistic_solution: 'Develop a quantified risk matrix (Risk = Likelihood x Impact). 1) Adversarial Evasion (Risk: 16) - externally facing, high likelihood of sophisticated manipulation. 2) Training Data Leakage (Risk: 15) - regulatory fines for PII memorization. 3) Data Poisoning (Risk: 10) - devastating impact but low likelihood given access requirements. 4) Model Extraction (Risk: 9) - competitor cloning API. Focus mitigation on Evasion and Leakage vectors.'
  common_mistake: |
    **The Pitfall:** Rating all attack vectors equally based on generalized cybersecurity frameworks.
    **The Rationale:** Security engineers adapting to ML often fail to differentiate between threats requiring deep internal access (poisoning) versus highly exploitable, external API vectors (evasion).
    **The Consequence:** Engineering resources are misallocated defending against theoretical data poisoning attacks while critical, externally-facing vulnerabilities remain fully unmitigated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Volume: 1M transactions/day.
       - Base Fraud Rate: 0.1% (1,000 cases/day).
       - Metric: Risk = Likelihood (1-5) * Impact (1-5).
    2. **Calculations:**
       - Adversarial Evasion: Likelihood(4) * Impact(4) = Risk 16.
       - Data Leakage: Likelihood(3) * Impact(5) = Risk 15.
       - Data Poisoning: Likelihood(2) * Impact(5) = Risk 10.
       - Cost of 1% evasion degradation: 10 missed frauds/day * $500/fraud = $5,000/day loss.
    3. **Conclusion & Interpretation:**
       - **Adversarial evasion is the dominant threat; a mere 1% success rate costs the business $5,000 daily. Result: Business-Impact Bound.**
