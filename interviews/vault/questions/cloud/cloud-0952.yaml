title: Evaluating Centralized Checkpointing Bottlenecks
scenario: You are training a 50B parameter MoE model on a cluster of 64 H100 GPUs (8 nodes with 8 GPUs
  each). The model state per GPU is around 150GB. The team initially implemented a centralized checkpointing
  system where all 64 GPUs send their optimizer states and model shards over the network to a single CPU
  head node equipped with dual 100 Gbps Ethernet NICs. The team wants you to evaluate why this approach
  is failing to meet the 2-minute checkpointing SLA and justify an alternative architecture.
question: "Why can't the centralized head-node checkpoint meet the 2-minute SLA, and what architecture should replace it?"
details:
  realistic_solution: Transition to distributed checkpointing where each worker writes its state concurrently
    to a high-throughput parallel file system (like Lustre) or cloud object storage, completely bypassing
    the central head node and avoiding the network incast problem.
  common_mistake: Focusing on the local NVMe storage write speed of the head node rather than recognizing
    the network incast bottleneck created by 64 GPUs concurrently sending data to a single network endpoint.
  napkin_math: Total state = 64 GPUs * 150 GB = 9.6 TB. Head node max network bandwidth = 2 * 100 Gbps
    = 200 Gbps = 25 GB/s. Theoretical minimum transfer time = 9600 GB / 25 GB/s = 384 seconds (6.4 minutes).
    This grossly violates the 120-second SLA before even accounting for TCP overhead or disk write bottlenecks.
