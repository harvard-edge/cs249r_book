title: Designing a High-Throughput Data Quality Gate for AMD MI300X
scenario: Your team is deploying a large-scale ML model on an AMD MI300X accelerator, which offers 192
  GB HBM3 memory and 5.3 TB/s memory bandwidth, for real-time inference. The model's performance is critically
  dependent on the quality of incoming features. You are tasked with designing a data quality gate that
  performs schema validation, checks for basic data type anomalies (e.g., unexpected nulls, out-of-range
  values), and tags data with lineage information. The raw incoming data stream, after initial ingestion
  and light preprocessing, averages 2 TB/hour. Propose a high-level architecture for this data quality
  gate, and derive a formula or calculation to quantify its minimum required sustained throughput to prevent
  it from becoming a bottleneck for the MI300X's data consumption, assuming the MI300X is utilized to
  process the entire incoming stream.
details:
  realistic_solution: A distributed, horizontally scalable streaming data validation service (e.g., using
    Apache Flink, Spark Streaming, or Kafka Streams) deployed on a cloud environment. This service would
    consume data from a message queue, perform validation checks (schema, range, type), potentially sample
    data for more intensive anomaly detection, enrich with lineage metadata, and then publish validated
    data to another message queue for the MI300X consumer. Key strategies include lightweight, compiled
    validation rules for high throughput and a monitoring system to scale validator instances dynamically
    based on backlog and throughput metrics.
  common_mistake: Underestimating the required throughput of the data quality gate, leading to a bottleneck
    that starves the downstream MI300X accelerator. Another common mistake is implementing overly complex
    or latency-intensive validation rules on the critical path, or not having a scalable architecture
    for the validation service itself.
  napkin_math: "To avoid becoming a bottleneck for the MI300X, the data quality gate's sustained processing\
    \ throughput (T_DQG) must be at least equal to the average incoming data stream rate (R_in). \n\n\
    Given R_in = 2 TB/hour.\n\nTo convert this to a more practical unit (GB/s or MB/s):\n1 TB = 1024 GB\n\
    1 hour = 3600 seconds\n\nT_DQG ≥ R_in\nT_DQG ≥ (2 TB) * (1024 GB/TB) / (3600 seconds/hour)\nT_DQG\
    \ ≥ 2048 GB / 3600 s\nT_DQG ≥ 0.5689 GB/s\n\nTherefore, the data quality gate must be capable of sustaining\
    \ a processing throughput of at least approximately 0.57 GB/s (or 570 MB/s) to keep up with the incoming\
    \ data stream and ensure the MI300X is continuously fed with validated data."
