title: Rack Power Density Limits with GPU-Dense Nodes
scenario: 'You are designing a new GPU training cluster using DGX nodes. Traditional datacenter racks support 10-15 kW per rack. Your facilities team says they can deliver 40 kW per rack with rear-door heat exchangers.'
question: 'How many DGX nodes can you fit per rack, and what infrastructure changes are needed to reach 80 kW/rack density?'
details:
  realistic_solution: |
    At 40 kW per rack and ~10.2 kW per DGX node, you can fit 3 nodes per rack (30.6 kW), leaving headroom for networking (leaf switches) and PDU losses. To reach 80 kW/rack (needed for 8 DGX nodes), you must implement Direct Liquid Cooling (DLC) with cold plates on GPUs and CPUs. Air cooling cannot dissipate 80 kW in a standard 42U rack. DLC delivers coolant directly to heat sources, achieving >95% heat capture. This also requires upgraded PDUs (busbar distribution), higher-amperage circuits, and structural reinforcement.
  common_mistake: |
    **The Pitfall:** Ignoring networking switches, PDU losses, and cable management overhead per rack.
    **The Rationale:** Candidates often assume all rack power goes to compute, forgetting that high-speed NVLink switches and InfiniBand HCAs consume significant power.
    **The Consequence:** Tripping rack breakers in production and failing to provision adequate facility power.
  napkin_math: |
    **Assumptions & Constraints:**
    - DGX Node power: ~10.2 kW.
    - Target density: 40 kW/rack vs 80 kW/rack with DLC.
    - Cluster size: 1000 GPUs (125 nodes).

    **Calculations:**
    - 40 kW rack: 3 nodes (30.6 kW) + networking (~4.4 kW) = ~35 kW.
    - 80 kW rack: 7 nodes (71.4 kW) + networking (~8.6 kW) = ~80 kW.
    - Total racks: 125 / 3 ≈ 42 racks at 40 kW vs 125 / 7 ≈ 18 racks at 80 kW.

    **Conclusion & Interpretation:**
    - **Result: 18 racks (Power-Bound)**. Reaching 80 kW requires Direct Liquid Cooling (DLC) and reduces footprint from 42 to 18 racks.
