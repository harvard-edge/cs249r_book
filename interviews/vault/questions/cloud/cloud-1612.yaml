title: LLM Quantization Trade-offs on A100
scenario: You are evaluating the deployment architecture for a 70B parameter LLM for a chatbot service. In FP16, the model weights consume ~140GB, requiring a 2-GPU tensor parallel setup. An alternative proposal is to apply INT4 weight-only quantization to reduce the weight footprint to 35GB, allowing the model and KV cache to fit on a single GPU.
question: Would you deploy the 70B LLM as FP16 across 2 GPUs or INT4 on 1 GPU, and why for decoding throughput and cost?
details:
  realistic_solution: |
    The optimal choice for throughput per dollar is the INT4 single-GPU setup. Because LLM generation is memory-bandwidth bound, reading fewer bytes from HBM increases generation speed. INT4 reduces the memory read per parameter by 4x, overcoming the de-quantization compute overhead, removing inter-GPU communication latency, and cutting hardware costs in half.
  common_mistake: |
    **The Pitfall:** Assuming INT4 quantization slows down inference due to de-quantization overhead.
    **The Rationale:** Candidates treat LLM inference as compute-bound, ignoring that the auto-regressive decoding phase is heavily memory-bandwidth bound.
    **The Consequence:** Over-provisioning hardware (deploying 2 GPUs instead of 1) and achieving lower throughput per dollar.
  napkin_math: |
    - FP16 (2 GPUs): 140GB weights / (2 * 2000 GB/s HBM bandwidth) = 35 ms/token memory read time.
    - INT4 (1 GPU): 35GB weights / (2000 GB/s HBM bandwidth) = 17.5 ms/token memory read time.
    - **INT4 yields ~2x the token generation speed while requiring half the hardware.**
