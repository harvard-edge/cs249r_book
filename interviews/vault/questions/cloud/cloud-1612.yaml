title: LLM Quantization Trade-offs on A100
scenario: You are evaluating the deployment architecture for a 70B parameter LLM for a chatbot service
  using A100 80GB GPUs (2 TB/s memory bandwidth). In FP16, the model weights consume ~140GB, requiring
  a 2-GPU tensor parallel setup. An alternative proposal is to apply INT4 weight-only quantization (e.g.,
  AWQ or GPTQ) to reduce the weight footprint to 35GB, allowing the model and KV cache to fit on a single
  GPU. Evaluate the trade-offs between the FP16 multi-GPU and INT4 single-GPU deployments, justifying
  your decision mathematically based on decoding-phase throughput, hardware utilization, and cost.
question: "Would you deploy the 70B LLM as FP16 across 2 A100s or INT4 on 1 A100, and why for decoding throughput and cost?"
details:
  realistic_solution: The optimal choice for throughput per dollar is the INT4 single-GPU setup. Because
    LLM generation is memory-bandwidth bound, reading fewer bytes from HBM increases generation speed.
    INT4 reduces the memory read per parameter by 4x, overcoming the de-quantization compute overhead,
    removing inter-GPU communication latency, and cutting hardware costs in half.
  common_mistake: Candidates often assume that INT4 quantization will slow down inference due to the computational
    overhead of de-quantizing weights back to FP16/FP32 for matrix multiplications, failing to realize
    that the decoding phase of LLMs is heavily memory-bandwidth bound.
  napkin_math: 'FP16 (2 GPUs): 140GB weights / (2 * 2000 GB/s HBM bandwidth) = 35 ms/token memory read
    time (assuming perfect scaling). INT4 (1 GPU): 35GB weights / (2000 GB/s HBM bandwidth) = 17.5 ms/token.
    INT4 yields ~2x the token generation speed on half the hardware.'
