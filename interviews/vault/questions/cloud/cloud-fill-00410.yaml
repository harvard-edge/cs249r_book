title: Optimizing Large Language Model Inference Latency on AMD MI300X
scenario: You are tasked with deploying a cutting-edge large language model (LLM) for real-time inference
  on a cluster equipped with AMD MI300X accelerators. Each MI300X features 192 GB HBM3, 1,307 TFLOPS FP16
  sparse compute, and 5.3 TB/s memory bandwidth. Your initial deployment shows higher-than-expected inference
  latency, averaging 500ms for a typical query, where the target is 100ms. Describe your systematic approach
  to profiling and bottleneck analysis to identify and mitigate the primary causes of this latency. Consider
  potential bottlenecks at the compute, memory, and I/O levels, specific to this hardware architecture
  and the LLM workload.
details:
  realistic_solution: "A realistic solution involves using a multi-pronged profiling strategy: \n1.  **System-level\
    \ Profiling:** Start with coarse-grained tools (e.g., Linux `perf`, `htop`, `iostat`) to monitor CPU,\
    \ memory, and network utilization on the host. \n2.  **GPU-level Profiling (ROCm Tools):** Utilize\
    \ AMD's ROCm profiling tools like `rocprof` to collect detailed metrics on kernel execution times,\
    \ memory access patterns (HBM3 bandwidth utilization), compute unit occupancy, and data transfers\
    \ between host and device. Look for low HBM3 utilization despite high compute (indicating memory bound),\
    \ or high HBM3 utilization but low compute (indicating I/O or host-side bottleneck feeding the GPU).\
    \ \n3.  **Application-level Profiling:** Integrate profiling into the LLM inference framework (e.g.,\
    \ PyTorch profiler, ONNX Runtime profiler) to pinpoint latency contributions from different layers,\
    \ operations, and pre/post-processing steps. Correlate these with GPU metrics. \n4.  **Flame Graphs/Trace\
    \ Tools:** Generate flame graphs from `rocprof` or custom trace data to visualize the call stack and\
    \ identify hot spots, especially for complex custom kernels or data movement."
  common_mistake: A common mistake is to immediately jump to micro-optimizations in the model architecture
    or kernel code without first rigorously profiling the entire inference pipeline. This often leads
    to optimizing a component that is not the actual bottleneck, wasting effort and potentially introducing
    new issues.
  napkin_math: 'To perform napkin math on the MI300X:


    *   **Memory Bandwidth Check:** An LLM with a 70B parameters model, using FP16, requires 70B * 2 bytes/parameter
    = 140 GB of memory. If a single forward pass requires reading and writing the entire model (simplified),
    the theoretical minimum time for memory access is 140 GB / 5.3 TB/s = 140 GB / 5300 GB/s ≈ 0.026 seconds
    (26ms). This is a lower bound, as weights are reused, but activations also add to memory traffic.
    If `rocprof` shows HBM3 bandwidth utilization close to 5.3 TB/s, memory could be a significant factor,
    especially for smaller batches or complex memory access patterns.


    *   **Compute Throughput Check (FP16 Sparse):** If the model has, say, 100 TFLOPs (FP16 sparse) of
    computation per inference, and the MI300X offers 1,307 TFLOPS, then the theoretical minimum compute
    time is 100 TFLOPS / 1,307 TFLOPS/s ≈ 0.077 seconds (77ms). If compute utilization is low (e.g., 20%),
    the effective TFLOPS would be much lower (1,307 * 0.2 = 261.4 TFLOPS), making the compute time 100/261.4
    ≈ 0.38 seconds (380ms), suggesting a compute bottleneck due to underutilization. This quick calculation
    helps prioritize whether to investigate memory or compute first based on observed utilization.'
