title: Carbon-Aware Training Job Scheduling
scenario: Your organization has a 48-hour flexible training window for a 200-GPU batch training job. The
  cloud region publishes a 24-hour carbon intensity forecast (gCO2e/kWh) that varies between 40 and 320
  gCO2e/kWh depending on solar/wind availability. The job requires a continuous 12-hour GPU reservation.
  Design a carbon-aware scheduler that minimizes carbon emissions while respecting the 48-hour deadline
  and data center SLAs.
details:
  realistic_solution: 'Use a sliding window minimum algorithm over the 48-hour carbon intensity forecast:
    compute the average carbon intensity for every possible 12-hour start time within the [now, now+36h]
    feasibility window (must start by hour 36 to finish by hour 48). Select the 12-hour window with the
    minimum average carbon intensity. Implementation: query the WattTime or ElectricityMaps API for 24-hour
    forecasts, refresh every 4 hours (forecast accuracy degrades beyond 12 hours). Re-optimize the start
    time at each refresh if a better window appears in the new forecast. Edge case: if forecast uncertainty
    is high (±50 gCO2e), add a risk-adjusted objective: minimize E[carbon] + 0.5·Var[carbon] to prefer
    lower-variance windows. SLA constraint: maintain a deadline buffer — do not defer start past hour
    36 regardless of forecast.'
  common_mistake: Greedily starting the job at the first low-carbon window without considering that a
    lower-carbon 12-hour window may appear later in the 48-hour forecast. Greedy scheduling can miss the
    optimal window.
  napkin_math: 'Job power: 200 × 700W × PUE 1.2 = 168 kW. 12 hours: 168 × 12 = 2,016 kWh. At peak carbon
    (320 gCO2e/kWh): 645 kgCO2e. At valley carbon (40 gCO2e/kWh): 80.6 kgCO2e. Scheduling savings: 645
    - 80.6 = 564 kgCO2e = 87% carbon reduction for same computation by waiting for optimal window. In
    dollar terms at $50/tonne CO2e social cost: $28 savings per job — multiplied over 1,000 jobs/year
    = $28,000/year, plus direct marketing value of carbon reporting.'
