title: 'MoE with Tensor Parallelism: Splitting Experts Across GPUs'
scenario: You have a model with 8 experts where each expert is 25B parameters (50 GB FP16). No single
  H100 (80 GB) can hold even one expert with room for activations. You need tensor parallelism within
  each expert and expert parallelism across experts. Design the parallelism scheme for 64 H100 GPUs arranged
  as 8 nodes of 8 GPUs each.
details:
  realistic_solution: 'Each expert = 25B params = 50 GB FP16. With TP=8 within a node: each GPU holds
    50/8 = 6.25 GB of one expert''s weights, leaving ~60 GB for KV cache and activations. Layout: Node
    0: Expert 0 with TP=8 (all 8 GPUs hold shards of expert 0). Node 1: Expert 1 with TP=8. ... Node 7:
    Expert 7 with TP=8. Communication pattern: (1) Token routing (All-to-All): tokens dispatched from
    all nodes to the node hosting the target expert. Cross-node InfiniBand. (2) Within-expert TP (AllReduce):
    every layer of the expert MLP requires AllReduce across 8 GPUs. NVLink within node (900 GB/s). (3)
    No data parallelism (only one copy of each expert). For larger clusters: add DP by replicating the
    entire 64-GPU expert set. 128 GPUs = 2× DP. Shared attention layers use TP=8 within node with all
    8 nodes processing independently (replicated). The key insight: TP=8 for attention (intra-node), EP=8
    for experts (inter-node), TP=8 within each expert (intra-node). A 3D parallelism specifically designed
    for large MoE.'
  common_mistake: Applying TP across nodes. TP requires AllReduce at every layer, which is bandwidth-intensive.
    It must stay within a node (NVLink). Expert parallelism (which only needs point-to-point communication)
    can cross node boundaries.
  napkin_math: 'Expert = 50 GB / TP=8 = 6.25 GB per GPU. Shared attention (assume 10B) / TP=8 = 2.5 GB
    per GPU. Total weights per GPU: 8.75 GB. 80 - 8.75 = 71.25 GB for KV cache + activations. All-to-All
    per MoE layer: 8 nodes × B tokens × 8192d × 2B. TP AllReduce per expert layer: 8 GPUs × ~100 MB at
    NVLink 900 GB/s = ~0.1ms.'
