title: Cloud Warm Restart L5 0
scenario: Warm restart requires keeping a pool of spare standby GPUs (hot spares). A 2048-GPU cluster experiences 1 failure per 1000 GPU-hours.
question: "For the 2048-GPU cluster, is maintaining 16 hot spares (0.8% overhead) worth the cost compared with cold restarts?"
details:
  realistic_solution: Maintaining 16 hot spares is overwhelmingly worth the cost. Cold restarts idle the entire cluster for 8 minutes per failure, wasting massive amounts of compute time. Warm restarts drastically reduce this downtime. The 16 spare GPUs pay for themselves roughly 30x over in avoided downtime.
  common_mistake: |
    **The Pitfall:** Viewing spare GPUs as pure waste.
    **The Rationale:** Candidates focus only on the cost of the unused hardware, ignoring the mathematical reality of cluster-wide idle time.
    **The Consequence:** At high failure rates, refusing to pay for a tiny spare pool results in millions of dollars of wasted cluster time during synchronous cold restarts.
  napkin_math: |
    1. **Failures/hr:** 2048 GPUs / 1000 GPU-hours = 2.05 failures/hr.
    2. **Cold downtime cost:** 2.05 failures * 8 min * 2048 GPUs * $2/hr / 60 min = $1,119/hr.
    3. **Warm downtime cost:** 2.05 failures * 0.75 min * 2048 GPUs * $2/hr / 60 min = $105/hr.
    4. **Avoided downtime value:** $1,119 - $105 = $1,014/hr.
    5. **Spare pool cost:** 16 spares * $2/hr = $32/hr.
    6. **ROI:** $1,014 / $32 = **~31.7x return on investment**.
