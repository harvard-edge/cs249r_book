title: Cloud Warm Restart L5 0
scenario: Warm restart requires keeping a pool of spare standby GPUs (hot spares). For a 2048-GPU cluster
  with 1 failure per 1000 GPU-hours, evaluate whether maintaining 16 hot spares (0.8% overhead) is worth
  the cost vs. cold restarts.
question: "For the 2048-GPU cluster, is maintaining 16 hot spares worth the cost compared with cold restarts?"
details:
  realistic_solution: 'Expected failures per hour: 2048 / 1000 = 2.05 per hour. Cold restart: 2.05 × 8
    min = 16.4 min/hr downtime → 27.3% of training time lost. Warm restart with hot spares: 2.05 × 0.75
    min = 1.54 min/hr → 2.6% lost. Cost of 16 spares: 16 × $2/hr = $32/hr. Cost of cold restart downtime:
    16.4 min/hr × 2048 GPUs / 60 × $2 = $1,117/hr. Net savings: $1,085/hr. The 16 spare GPUs pay for themselves
    35x over. Even accounting for spare GPUs being idle, the ROI is overwhelming at this failure rate.'
  common_mistake: Viewing spare GPUs as pure waste. At high failure rates, the cost of cluster-wide idle
    time during cold restarts dwarfs the cost of maintaining a small spare pool.
  napkin_math: 'Failures/hr: 2048/1000 = 2.05. Cold downtime cost: 2.05 × 8 min × 2048 GPUs × $2/hr /
    60 = $1,117/hr. Spare cost: 16 × $2 = $32/hr. ROI: $1,117/$32 = 35x. Break-even spares: $1,117/hr
    downtime cost / $2/hr per spare = ~559 spares needed to equal downtime cost; 16 spares far exceed
    ROI threshold.'
