title: KV-Cache Radix Tree for Prefix Sharing
scenario: Your serving system uses a radix tree to manage prefix KV-cache sharing. You have 200 active system prompts, each used by ~50 users simultaneously, with 512-token system prompts and 128-token user suffixes. The GPU has a 52 GB KV pool allocated.
question: How much memory does radix-tree prefix sharing save, and how many concurrent requests fit with versus without sharing?
details:
  realistic_solution: 'Without prefix sharing: each request stores full 640-token KV (512 system prompt + 128 user). KV per token (70B, GQA 8 heads, head_dim 128, 96 layers, FP16): 2×8×128×1×96×2 = 393,216 bytes ≈ 0.375 MB/token. Full request KV: 640 × 0.375 MB = 240 MB. 52 GB / 240 MB = 216 concurrent requests. With prefix sharing: prefix KV (512 tokens) stored once per unique system prompt. 200 system prompts × 512 tokens × 0.375 MB = 38.4 GB for all prefix caches. Remaining for user suffix KV: 52 - 38.4 = 13.6 GB. User suffix KV: 128 tokens × 0.375 MB = 48 MB per request. 13.6 GB / 48 MB = 283 concurrent user suffix KV slots. Total concurrent requests: 283 (limited by suffix KV). Improvement: 283 vs 216 = 31% more concurrent requests. Memory saved: 10,000 users × 192 MB = 1,920 GB unshared vs 38.4 GB shared (saves 1,881.6 GB) — but constrained by 52 GB pool anyway.'
  common_mistake: |
    **The Pitfall:** Forgetting how prefix memory constraints scale.
    **The Rationale:** Candidates forget that the radix tree stores the prefix KV once per unique prefix, but total memory is still heavily constrained by the 38.4 GB dedicated to those 200 system prompts.
    **The Consequence:** Grossly overestimating the number of users that can fit in the remaining memory pool.
  napkin_math: |
    * Per-token KV size (70B GQA): 2 * 8 heads * 128 dim * 96 layers * 2 bytes = 393,216 bytes = 384 KB/token.
    * 512-token prefix: 512 * 384 KB = 192 MB.
    * 128-token suffix: 128 * 384 KB = 48 MB.
    * No sharing: 240 MB/request. 52 GB / 240 MB = **216 concurrent requests**.
    * With sharing: 200 prefixes * 192 MB = 38.4 GB prefix store.
    * Suffix pool: 52 GB - 38.4 GB = 13.6 GB. 13.6 GB / 48 MB = **283 concurrent requests**.
    * **Result:** Radix sharing yields a 31% increase in concurrency.
