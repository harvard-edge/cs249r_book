title: 'MoE Routing: Top-K Gating and Load Imbalance'
scenario: >-
  You implement an MoE transformer with 8 experts and top-2 routing. A batch
  of 256 tokens arrives. The router produces softmax scores over 8 experts for each
  token, and each token is sent to its top-2 experts. In practice, you observe expert 3 receives
  95 tokens while expert 7 receives only 12.
question: >-
  With 256 tokens, 8 experts, and top-2 routing, how many tokens should each
  expert process uniformly, and what is the impact of the observed imbalance?
details:
  realistic_solution: 'With 256 tokens × top-2 = 512 expert assignments distributed across 8 experts. Perfectly uniform: 512/8 = 64 tokens per expert. Actual: expert 3 gets 95, expert 7 gets 12. Load imbalance ratio = max_load / avg_load = 95/64 = 1.48×. The capacity factor C is typically set to 1.25, meaning each expert can handle C × (N×k/E) = 1.25 × 64 = 80 tokens. Expert 3 receives 95 > 80, so 15 tokens are dropped (their expert 3 contribution is zeroed out). These tokens only get computation from their second-choice expert, losing quality. Impact on throughput: all experts must process in parallel, and the batch waits for the slowest (expert 3 at 95 tokens). Wall-clock time ∝ max(tokens_per_expert), not average. Expert 3 takes 95/64 = 1.48× longer than the balanced case. Solution: add an auxiliary load-balancing loss that penalizes non-uniform routing distributions.'
  common_mistake: |
    **The Pitfall:** Thinking load imbalance only wastes compute on underloaded experts.
    **The Rationale:** Candidates miss that overloaded experts hit their capacity factor limit and drop tokens entirely.
    **The Consequence:** Severe training instability and model quality degradation, coupled with latency bottlenecks.
  napkin_math: |
    1. **Uniform assignment:** 256 tokens × 2 = 512 total assignments. 512 / 8 = 64 tokens/expert.
    2. **Actual max load:** Expert 3 gets 95 tokens (1.48× overloaded).
    3. **Capacity limit:** With a capacity factor of 1.25, limit = 64 × 1.25 = 80 tokens.
    4. **Dropped tokens:** 95 - 80 = 15 tokens dropped (5.9% of batch).
    5. **Throughput loss:** Wall-clock is bottlenecked by the slowest expert, resulting in a **1.48× slowdown** compared to perfect balance.
