title: Torus vs Fat-Tree for AllToAll Workloads
scenario: A 1024-node cluster of MI300X GPUs must be networked. You are evaluating
  a 3D Torus versus a non-blocking Fat-Tree for an AllToAll collective (e.g., global
  MoE routing).
question: Evaluate which topology inherently supports a higher bisection bandwidth
  for worst-case AllToAll traffic and why.
visual:
  kind: svg
  path: cloud-4499.svg
  alt: Diagram comparing a layered tree network with a grid-like torus network.
  caption: Fat-Tree vs Torus
details:
  realistic_solution: A non-blocking Fat-Tree guarantees full bisection bandwidth,
    meaning any half of the network can communicate with the other half without contention,
    ideal for the dense many-to-many traffic of AllToAll. A 3D Torus has a strict
    bisection bandwidth limit proportional to its cross-section links, causing severe
    congestion and higher hop counts for distant nodes during AllToAll.
  common_mistake: Assuming Torus is better for all workloads because of localized
    neighbor connections, ignoring the global nature of AllToAll.
  napkin_math: Fat-tree bisection = N/2 vs Torus = 2*N^(2/3)
