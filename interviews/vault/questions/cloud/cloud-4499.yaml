title: Torus vs Fat-Tree for AllToAll Workloads
scenario: A 1024-node cluster of GPUs must be networked. You are evaluating a 3D Torus versus a non-blocking Fat-Tree for an AllToAll collective (e.g., global MoE routing).
question: Evaluate which topology inherently supports a higher bisection bandwidth for worst-case AllToAll traffic and why.
visual:
  kind: svg
  path: cloud-4499.svg
  alt: Diagram comparing a layered tree network with a grid-like torus network.
  caption: Fat-Tree vs Torus
details:
  realistic_solution: A non-blocking Fat-Tree guarantees full bisection bandwidth, meaning any half of the network can communicate with the other half without contention, ideal for the dense many-to-many traffic of AllToAll. A 3D Torus has a strict bisection bandwidth limit proportional to its cross-section links, causing severe congestion and higher hop counts for distant nodes during AllToAll.
  common_mistake: |
    **The Pitfall:** Assuming Torus is better for all workloads due to localized neighbor connections.
    **The Rationale:** Candidates optimize for localized rings (like 1D Ring AllReduce) and ignore the dense, global nature of AllToAll MoE traffic.
    **The Consequence:** The network experiences severe congestion and high hop counts during AllToAll, devastating model training speed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster size: N = 1024 nodes.
       - Workload: AllToAll collective (dense many-to-many traffic).
    2. **Calculations:**
       - Fat-Tree bisection bandwidth scaling: Proportional to N / 2 = 512.
       - 3D Torus bisection bandwidth scaling: Proportional to 2 * N^(2/3) = 2 * (1024)^(2/3) ≈ 201.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** A non-blocking Fat-Tree offers substantially higher bisection bandwidth, avoiding the severe cross-section bottlenecks of a 3D Torus.
