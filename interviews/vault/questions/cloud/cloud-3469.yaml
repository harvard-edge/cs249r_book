title: Designing a High-Throughput Inference Load Balancer for NVIDIA A100 Clusters
scenario: You are designing the load balancing system for a multi-datacenter ML inference service running on A100 clusters. Inference requests vary significantly in complexity, leading to fluctuating processing times per model. The system must efficiently distribute traffic, minimize latency, and maximize GPU utilization.
question: How would you design request routing for this service considering consistent hashing, weighted round-robin, and dynamic traffic management to meet a strict P99 latency target?
details:
  realistic_solution: A realistic solution would involve a multi-layered approach. At the entry point, a global load balancer (e.g., DNS-based or a specialized proxy) would route traffic to the nearest healthy data center. Within each data center, a smart routing layer would use a combination of consistent hashing (for session affinity or model version pinning) and a dynamically weighted load balancing algorithm. This algorithm would continuously monitor real-time metrics from each NVIDIA A100 GPU (e.g., GPU utilization, memory usage, queue length, average inference time, available memory bandwidth) and assign weights accordingly. For instance, a GPU with lower utilization or a shorter queue would receive a higher weight. This dynamic adjustment ensures requests are routed to the least loaded and most capable A100 GPU for the specific inference task, potentially using mechanisms like 'power-of-two-choices' coupled with per-GPU readiness signals. Furthermore, request sharding or micro-batching could be employed to optimize throughput per A100.
  common_mistake: |
    **The Pitfall:** Implementing a simple round-robin or least-connection strategy.
    **The Rationale:** These are standard L4/L7 load balancing strategies that candidates default to without considering ML workload heterogeneity.
    **The Consequence:** This leads to hot-spotting, imbalanced GPU utilization, and increased tail latencies, as a slow-processing request blocks subsequent requests on the same GPU.
  napkin_math: |
    - **Theoretical Max Throughput:** N GPUs × R requests/second = N × R RPS.
    - **Memory Bottleneck Throughput:** For a model needing B GB per inference, an A100 can handle 2000 GB/s / B inferences/second.
    - **Queue Latency Constraint:** For an average processing time T ms and a P99 target L ms, queue depth D must satisfy D × T << L.
    - **Model Capacity:** With 80 GB HBM2e and M GB per model, an A100 can host up to 80 / M models concurrently.
    - **Conclusion:** **The load balancer must dynamically weight nodes such that no GPU receives traffic if its estimated D × T approaches L.**
