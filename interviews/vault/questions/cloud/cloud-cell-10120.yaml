title: Optimize depthwise separable convolution throughput via kernel fusion on H100
scenario: A profiling session with Nsight Compute shows that a MobileNetV2 block (expand 1×1 → depthwise
  3×3 → project 1×1) on H100 has 47 kernel launches and 62% of time in memory transactions rather than
  SM compute. Describe the kernel fusion strategy to reduce memory transactions and kernel launch overhead.
details:
  realistic_solution: 'Optimal fusion strategy: (1) Fuse expand 1×1 + BN + ReLU6 into one kernel (tensor
    core matmul + elementwise epilogue using cuBLAS/cuDNN epilogue fusion); (2) Fuse depthwise 3×3 + BN
    + ReLU6 into one kernel (custom CUDA or Triton with shared memory tiling); (3) Fuse project 1×1 +
    BN (no activation for linear bottleneck) into one kernel; (4) Fuse residual addition with project
    output. Result: 47 kernels → 3–4 kernels per MBConv block. torch.compile with Inductor backend performs
    this automatically.'
  common_mistake: Attempting to fuse all three operations into a single kernel, which is impractical because
    the expand and project 1×1 operations are suited for tensor-core matmul while depthwise requires custom
    spatial indexing — different compute patterns cannot share tensor core instructions.
  napkin_math: 'Original: 47 kernel launches × 5μs overhead = 235μs overhead. Fused: 4 kernels × 5μs =
    20μs. Overhead reduction: 215μs saved per block. MobileNetV2 has 17 MBConv blocks: 17×215μs = 3.7ms
    saved per inference. At batch=1, MobileNetV2 total inference ~8ms → 46% speedup from kernel fusion
    alone. Memory traffic: original reads/writes activations between each kernel (HBM). Fused: intermediate
    tensors stay in L2/SRAM. For expand output (4.8MB): fused keeps it in L2 for depthwise, saving 2×
    HBM round-trip.'
