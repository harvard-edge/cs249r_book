title: The Tensor Parallel Scaling Cliff
scenario: You are a Staff ML Engineer scaling out a 175B parameter model using tensor parallelism. On
  a single H100 node (8 GPUs), your step time is 500ms. When you scale to two nodes (16 GPUs), your step
  time only drops to 420ms, a mere 1.2x speedup instead of the near-linear 1.8x+ you expected. Profiling
  reveals that a staggering 90% of your total step time is now spent in `all-reduce` communication primitives.
  Given this data, diagnose the primary performance bottleneck.
details:
  realistic_solution: The root cause is the 'Infiniband Wall'. While the 8 GPUs within a single node communicate
    over the ultra-high-bandwidth 900 GB/s NVLink fabric, the moment the training job spans two nodes,
    the cross-node communication must traverse the much slower 400 Gbps (50 GB/s) InfiniBand network.
    For tensor parallelism, which requires constant, high-volume exchanges of activations and gradients,
    this ~18x drop in bandwidth (`900 GB/s / 50 GB/s`) becomes the dominant bottleneck, completely destroying
    scaling efficiency.
  common_mistake: Engineers often underestimate the orders-of-magnitude performance gap between intra-node
    (NVLink) and inter-node (InfiniBand) interconnects. They might see 'high-speed network' and assume
    InfiniBand is comparable to NVLink, or they might incorrectly blame the PCIe bus for being a bottleneck,
    not understanding that RDMA (Remote Direct Memory Access) allows GPUs to communicate directly over
    the network, bypassing the host CPU and its PCIe lanes.
  napkin_math: 175B model requires massive TP activations. Intra-node NVLink provides 900 GB/s. Splitting
    TP across two nodes forces all-reduces over InfiniBand (50 GB/s). For a 2GB activation tensor, NVLink
    takes 2.2ms, while IB takes 40ms. Across 96 layers, this 3.8s penalty ruins scaling.
  options:
  - The `all-reduce` operation is forced to cross the node boundary, hitting the InfiniBand bandwidth
    limit (50 GB/s), which is ~18x slower than the intra-node NVLink (900 GB/s).
  - Data is being copied from GPU to the host CPU, then sent over the network, bottlenecking on the PCIe
    Gen5 bus.
  - The complexity of a 16-GPU `all-reduce` has saturated the 900 GB/s NVLink fabric, which can't handle
    the increased traffic from doubling the GPUs.
  - The network is experiencing high packet loss, forcing TCP retransmits. The system is not using RDMA,
    which is adding tail latency.
