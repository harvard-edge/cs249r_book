title: The Fine-Tuning Estimate
scenario: The PM just walked over and asked for a cost estimate to fine-tune Llama-2-13B on a 1M-example dataset. They need a number by end of day.
question: How would you estimate the total cost and GPU-hours required to fine-tune Llama-2-13B on a 1M-example dataset?
details:
  realistic_solution: 'The standard approximation for training FLOPs is $6 \times N$ FLOPs per token, where $N$ is the parameter count. The factor of 6 comes from: 2× for the forward pass (multiply-accumulate = 2 ops per parameter per token) and 4× for the backward pass (2× for gradient w.r.t. activations + 2× for gradient w.r.t. weights). Multiply by total tokens, divide by GPU throughput at realistic utilization, convert to hours, multiply by price.'
  common_mistake: |
    **The Pitfall:** Refusing to estimate without running a profiler, or miscalculating the backward pass overhead.
    **The Rationale:** Candidates panic without empirical data, or they forget that the backward pass requires $\sim 2\times$ the FLOPs of the forward pass.
    **The Consequence:** Failing to provide actionable planning numbers to management, or severely underestimating the compute budget required.
  napkin_math: |
    1. **Total Tokens:** 1M examples $\times$ 512 avg tokens = 512M tokens.
    2. **Total FLOPs:** $6 \times N \times \text{tokens} = 6 \times 13 \times 10^9 \times 512 \times 10^6 \approx 3.99 \times 10^{19}$ FLOPs.
    3. **Effective Compute (H100):** 989 TFLOPS $\times$ 50% MFU $\approx$ 495 TFLOPS.
    4. **Training Time:** $(3.99 \times 10^{19}) / (4.95 \times 10^{14}) \approx 80,600 \text{ seconds} \approx 22.4 \text{ GPU-hours}$.
    5. **Result:** **At $2.50/GPU-hr (on-demand), the total cost is ~$56.**
