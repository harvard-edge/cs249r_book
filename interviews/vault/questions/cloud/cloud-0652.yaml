title: The Fine-Tuning Estimate
scenario: 'The PM just walked over and asked: ''How much will it cost to fine-tune Llama-2-13B on our
  1M-example dataset?'' They need a number by end of day. Walk me through how you''d estimate this on
  a napkin.'
question: "How much will it cost to fine-tune Llama-2-13B on our 1M-example dataset?"
details:
  realistic_solution: 'The standard approximation for training FLOPs is $6 \times N$ FLOPs per token,
    where $N$ is the parameter count. The factor of 6 comes from: 2× for the forward pass (multiply-accumulate
    = 2 ops per parameter per token) and 4× for the backward pass (2× for gradient w.r.t. activations
    + 2× for gradient w.r.t. weights). Multiply by total tokens, divide by GPU throughput at realistic
    utilization, convert to hours, multiply by price.'
  common_mistake: '"I''d need to run a benchmark first — I can''t estimate without profiling." In an interview
    (and in real planning), you must be able to estimate from first principles. Another common mistake:
    forgetting to multiply by 3 for the backward pass (it''s ~2× the forward pass cost).'
  napkin_math: 'Params = 13B. Dataset = 1M examples × 512 avg tokens = 512M tokens. Total FLOPs = $6 \times
    13 \times 10^9 \times 512 \times 10^6$ = $3.99 \times 10^{19}$ FLOPs. H100 at ~50% MFU = 989 × 0.5
    = **989 TFLOPS** effective. Time = $3.99 \times 10^{19} / 4.95 \times 10^{14}$ = 80,600 seconds ≈
    **22.4 GPU-hours**. At $2.50/GPU-hr (on-demand H100) = **$56**. On spot instances at $0.90/hr = **$20**.
    The PM''s answer: "Under $60 on-demand, under $25 on spot."'
