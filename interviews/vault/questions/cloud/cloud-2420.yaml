title: Arithmetic Intensity & Cache Thrashing
scenario: 'Serving two models on the same A100 GPU via MPS (Multi-Process Service): a memory-bound sparse
  embedding lookup model (500 QPS) and a compute-bound dense MLP (100 QPS). When run in isolation, MLP
  latency is 15ms. When co-located, MLP latency spikes to 85ms. GPU compute utilization remains low.'
question: "Why does co-locating the embedding model under MPS spike MLP latency, and should you use MPS or MIG?"
details:
  realistic_solution: This is a hardware-system co-design problem driven by arithmetic intensity. MPS
    shares the GPU spatially but leaves the L2 cache (40MB on A100) shared globally. The memory-bound
    embedding model constantly streams massive amounts of data from HBM, completely evicting the L2 cache.
    The compute-bound MLP relies heavily on L2 cache hits for weight reuse. When co-located, the embedding
    model thrashes the cache, forcing the MLP to fetch from slow HBM. The tradeoff is dynamic resource
    sharing (MPS) versus strict isolation (MIG). The solution is to switch to Multi-Instance GPU (MIG),
    which physically partitions the hardware, including the L2 cache and memory bandwidth. Assigning a
    1g.5gb slice to the embedding model and a 3g.20gb slice to the MLP isolates their memory hierarchies,
    restoring MLP latency.
  common_mistake: Using CUDA streams to enforce sequential execution, which destroys the throughput benefits
    of co-location.
  napkin_math: Embedding model streams 40 GB/s. The 40MB L2 cache is entirely overwritten every 1 millisecond
    (40MB / 40GB/s). The MLP execution takes 15ms, meaning its weights are evicted 15 times per inference.
    Fetching from HBM (1.5TB/s) instead of L2 (5TB/s) incurs a 3.3x bandwidth penalty, causing the 5x
    latency spike due to memory stalls.
  options:
  - Always use the smallest possible batch size (1) for best generalization; large batch sizes are known
    to converge to sharp minima that generalize poorly, regardless of learning rate scaling
  - Batch size has no effect on training dynamics when using Adam optimizer because Adam's adaptive learning
    rate automatically compensates for any batch size; only memory matters
  - 'Batch size tuning methodology: (1) Start with the largest batch size that fits in GPU memory. (2)
    Measure training throughput (samples/sec) at increasing batch sizes — throughput plateaus when compute
    is saturated. (3) Track validation loss at different batch sizes with fixed total tokens — identify
    the critical batch size where larger batches waste compute. (4) Adjust learning rate proportionally
    (linear or sqrt scaling rule). (5) Use gradient accumulation if the optimal batch size exceeds GPU
    memory.'
  - The optimal batch size is always equal to the dataset size (full-batch gradient descent); stochastic
    mini-batching only exists because GPUs have limited memory, not for any algorithmic reason
  correct_index: 2
