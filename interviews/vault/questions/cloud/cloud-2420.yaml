title: Arithmetic Intensity & Cache Thrashing
scenario: 'Serving two models on the same A100 GPU via MPS (Multi-Process Service): a memory-bound sparse embedding lookup model (500 QPS) and a compute-bound dense MLP (100 QPS). When run in isolation, MLP latency is 15ms. When co-located, MLP latency spikes to 85ms. GPU compute utilization remains low.'
question: Why does co-locating the embedding model under MPS spike MLP latency, and should you use MPS or MIG?
details:
  realistic_solution: 'This is a hardware-system co-design problem driven by arithmetic intensity. MPS shares the GPU spatially but leaves the L2 cache (40MB on A100) shared globally. The memory-bound embedding model constantly streams massive amounts of data from HBM, completely evicting the L2 cache. The compute-bound MLP relies heavily on L2 cache hits for weight reuse. When co-located, the embedding model thrashes the cache, forcing the MLP to fetch from slow HBM. The tradeoff is dynamic resource sharing (MPS) versus strict isolation (MIG). The solution is to switch to Multi-Instance GPU (MIG), which physically partitions the hardware, including the L2 cache and memory bandwidth. Assigning a 1g.5gb slice to the embedding model and a 3g.20gb slice to the MLP isolates their memory hierarchies, restoring MLP latency.'
  common_mistake: |
    **The Pitfall:** Using CUDA streams to enforce sequential execution.
    **The Rationale:** Engineers try to fix MPS contention by serializing workloads, which destroys the throughput benefits of co-location.
    **The Consequence:** The GPU remains vastly underutilized, and latency SLAs are still missed due to queuing delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - L2 Cache Size (A100): 40 MB.
    - Embedding Model Bandwidth: 40 GB/s.
    - MLP Execution Time: 15ms.

    **Calculations:**
    - L2 Eviction Rate: 40 MB / 40 GB/s = 1 millisecond.
    - Thrashing Impact: MLP weights are evicted from L2 cache 15 times during a single inference pass.
    - Bandwidth Penalty: Fetching from HBM (1.5 TB/s) vs L2 (5 TB/s) is ~3.3x slower.

    **Conclusion & Interpretation:**
    - **Result: 5x latency spike (Memory-Bound)**. The cache thrashing forces HBM fetches, causing the latency spike (15ms -> 85ms).
