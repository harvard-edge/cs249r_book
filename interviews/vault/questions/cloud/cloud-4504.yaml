title: PCIe Bottleneck in High-Res Image Training
scenario: You are training a multi-modal transformer on a cluster of H100 SXM GPUs,
  decoding 4K JPEGs on the host CPUs.
question: Analyze the potential bottleneck in transferring uncompressed FP32 4K image
  tensors over PCIe Gen5 to feed the H100 GPUs.
details:
  realistic_solution: An uncompressed 4K image in FP32 requires roughly 100 MB. To
    keep the 989 TFLOP/s H100 utilized, the required batch rate will easily saturate
    the theoretical ~64 GB/s PCIe Gen5 bus and CPU compute. Decoding directly on the
    GPU using NVJPEG and sending compressed data over PCIe resolves this.
  common_mistake: Focusing only on CPU decoding latency while ignoring the massive
    PCIe bandwidth bottleneck caused by uncompressed FP32 transfer.
  napkin_math: 3840 * 2160 * 3 * 4 / 10^6 = 99.5 MB per image.
