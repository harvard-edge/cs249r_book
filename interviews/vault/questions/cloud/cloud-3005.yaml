title: 'KV-Cache: Mastery — KV Cache Memory Budget Optimization for Long-Context Serving'
scenario: 'Your 13B LLM serving endpoint needs to support 32K-token context windows for code generation. A single 32K-token KV cache requires: 40 layers * 2 * 8 KV heads * 128 head_dim * 32K tokens * 2B = 5.24GB.'
question: How would you budget HBM to support at least 10 concurrent 32K-context requests for the 13B model?
details:
  realistic_solution: |
    Tight budget: 26GB model + 52.4GB KV = 78.4GB. Add: 1GB CUDA overhead + 0.5GB fragmentation buffer. Total: 79.9GB — barely fits. Need optimization: use INT8 KV to halve KV cache footprint while preserving code generation accuracy.
  common_mistake: |
    **The Pitfall:** Allocating exactly the sum of model and KV cache sizes without overhead.
    **The Rationale:** Candidates forget CUDA context overhead, PyTorch memory fragmentation, and activation memory.
    **The Consequence:** The server immediately OOMs when trying to hit its theoretical concurrency limit.
  napkin_math: |
    - 13B model (bf16): 26 GB.
    - 10 * 32K KV at FP16: 10 * 5.24 GB = 52.4 GB. Sum = 78.4 GB.
    - Overhead (CUDA + fragmentation): ~1.8 GB. Total = 80.2 GB (Exceeds 80GB HBM).
    - Fix: INT8 KV Cache halves KV size to 26.2 GB.
    - Total with INT8: 26 GB + 26.2 GB + 1.8 GB = 54 GB.
    - **Using INT8 KV cache drops the footprint to 54 GB, safely allowing 10 concurrent 32K-context requests without OOMing.**
