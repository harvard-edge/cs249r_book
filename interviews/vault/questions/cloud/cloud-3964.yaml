title: Backward-Triggered Gradient Accumulation with Deferred AllReduce
scenario: With gradient accumulation over K=4 micro-steps, PyTorch DDP by default performs AllReduce after every backward pass. A colleague says you can defer AllReduce to only the last micro-step, doing one AllReduce instead of four.
question: "What are the overlap tradeoffs of deferring DDP AllReduce to only the last micro-step for K=4 gradient accumulation?"
details:
  realistic_solution: 'Tradeoff analysis: (1) Default: 4 AllReduces overlapped with backward. (2) Deferred: 1 AllReduce of M bytes. No communication during micro-steps 1-3. The single AllReduce cannot start until the last backward finishes — no overlap possible for the AllReduce itself. (3) PyTorch''s no_sync() context manager skips AllReduce on steps 1-3 while maintaining overlap on the final AllReduce.'
  common_mistake: |
    **The Pitfall:** Always deferring AllReduce to the last micro-step to reduce total communication volume.
    **The Rationale:** Candidates intuitively believe that fewer network calls means better performance, ignoring the mechanics of computation-communication overlap.
    **The Consequence:** Accidentally exposing the entire communication latency at the end of the step instead of hiding it perfectly behind the backward pass compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - AllReduce = 5ms, Backward pass = 50ms.

    **Calculations:**
    - Default: 4 * 5ms AllReduce perfectly overlapped with 4 * 50ms backward. Exposed = 0ms.
    - Deferred: 1 * 5ms AllReduce *after* final backward. Exposed = 5ms.

    **Conclusion & Interpretation:**
    - **Result: 5ms exposed (Overhead-Bound)**. Default is better for overlap if AllReduce < backward time.
