title: Diagnosing TorchElastic Spot Preemption Stalls
scenario: You are training a 30B parameter LLM using 64 A100 (80GB) spot instances. You use PyTorch Elastic (Torchrun) to handle node preemptions. When a node is preempted, the cluster dynamically downscales, but you observe a massive 15-minute stall before training resumes, dropping your effective Goodput below 70%. The model checkpoint size is roughly 120GB.
question: "What causes the 15-minute TorchElastic stall after a node preemption, and how would you reduce it?"
details:
  realistic_solution: 'Identify the dual bottleneck: the default 10-minute Torchrun rendezvous timeout waiting for the expected number of nodes to rejoin, plus 5 minutes of synchronous checkpoint loading from slow object storage. Fix by reducing the `rdzv_timeout` to 60s and utilizing a high-throughput parallel file system to achieve multi-GB/s read speeds.'
  common_mistake: |
    **The Pitfall:** Assuming the stall is solely due to Kubernetes pod provisioning time.
    **The Rationale:** Blaming orchestration infrastructure without profiling the distributed training framework timeouts.
    **The Consequence:** Wasting time debugging K8s instead of tuning TorchElastic rendezvous and checkpoint loading.
  napkin_math: |
    1. Default rendezvous timeout = 600s (10 mins).
    2. Checkpoint (120GB) loaded at 400MB/s from standard object storage = 300s (5 mins).
    3. Total stall = 900s (15 mins).
    4. Optimized: 60s timeout + (120GB / 2GB/s) = **120s (2 mins) stall**.
