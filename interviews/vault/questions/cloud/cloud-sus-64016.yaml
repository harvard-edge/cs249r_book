title: Cooling Power Versus Compute Power Tradeoff in Free-Cooling Regimes
scenario: A cloud operator runs a 200-node H100 cluster in a facility with an economizer (free cooling)
  that activates when outdoor dry-bulb temperature drops below 18°C. The local climate provides free cooling
  for 5,500 hours/year. During mechanical cooling (3,260 hours/year), the chiller draws 400 kW to cool
  the cluster's 1.6 MW IT load. During free cooling, the facility pumps and fans draw only 60 kW. Calculate
  the annual cooling energy savings, the annualized PUE for each mode, and advise on whether to co-locate
  latency-sensitive and batch workloads to take advantage of the free-cooling window.
question: "What are the annual cooling energy savings and PUEs for mechanical versus free cooling, and should workloads be shifted into free-cooling hours?"
details:
  realistic_solution: 'Mechanical cooling: 3,260h × (1,600 + 400) kW = 3,260 × 2,000 = 6,520 MWh. PUE
    mechanical = 2,000 / 1,600 = 1.25. Free cooling: 5,500h × (1,600 + 60) kW = 5,500 × 1,660 = 9,130
    MWh. PUE free = 1,660 / 1,600 = 1.0375. Annual energy: 6,520 + 9,130 = 15,650 MWh. Counterfactual
    (no economizer): 8,760h × 2,000 kW = 17,520 MWh. Savings: 1,870 MWh/year = $187,000/year. Annualized
    PUE: 15,650 / (1,600 × 8,760) = 15,650 / 14,016 = 1.117. Strategy: schedule latency-sensitive workloads
    year-round; shift batch jobs to free-cooling hours to maximize green compute window.'
  common_mistake: Calculating average annual PUE by simple arithmetic mean of hours, forgetting to weight
    by energy (kWh). A 5,500-hour free cooling period at low overhead has much more weight on annual PUE
    than a 3,260-hour mechanical period at high overhead.
  napkin_math: 'Mechanical: 3,260h × 400kW cooling overhead = 1,304 MWh cooling. Free: 5,500h × 60kW =
    330 MWh cooling. Total cooling: 1,634 MWh. Without economizer: 8,760 × 400 = 3,504 MWh. Savings: 1,870
    MWh × $0.10 = $187,000/yr. IT energy: 1,600 kW × 8,760h = 14,016 MWh. Annual PUE: (14,016 + 1,634)
    / 14,016 = 15,650 / 14,016 = 1.117. Compare to no-economizer PUE: (14,016 + 3,504) / 14,016 = 1.25.
    Economizer saves 0.133 PUE points annually.'
