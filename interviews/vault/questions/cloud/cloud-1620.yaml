title: MIG Profile Packing and Resource Fragmentation
scenario: You are configuring a single 40GB GPU for multi-tenant inference using Multi-Instance GPU (MIG). Tenant A is assigned a `4g.20gb` profile. Tenant B is assigned a `2g.10gb` profile.
question: How many `1g.5gb` MIG profiles can Tenant C get after the `4g.20gb` and `2g.10gb` allocations, and what resource limits further allocation?
details:
  realistic_solution: An A100 GPU supports a maximum of 7 compute slices and 8 memory slices (5GB each for the 40GB model). The `4g.20gb` profile consumes 4 compute and 4 memory slices. The `2g.10gb` profile consumes 2 compute and 2 memory slices. This leaves 1 compute slice and 2 memory slices (10GB). Therefore, you can provision exactly ONE `1g.5gb` instance. Compute slices are exhausted first, stranding the final 5GB of memory.
  common_mistake: |
    **The Pitfall:** Assuming VRAM is the only limiting factor for MIG profiles.
    **The Rationale:** Since 30GB is used out of 40GB, candidates intuitively deduce that two 5GB instances can fit in the remaining 10GB.
    **The Consequence:** Operations teams miscalculate cluster packing density because they ignore the strict physical compute-slice boundaries mandated by the hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40GB GPU total: 7 Compute (C), 8 Memory (M) slices.
       - Tenant A: 4C, 4M. Tenant B: 2C, 2M.
    2. **Calculations:**
       - Remaining Slices: (7 - 4 - 2)C, (8 - 4 - 2)M = 1C, 2M remaining.
       - Tenant C (1g.5gb) consumes: 1C, 1M.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Only one 1g.5gb instance fits, permanently stranding 5GB of VRAM.**
