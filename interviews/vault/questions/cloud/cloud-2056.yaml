title: ML vs Software Development Lifecycle
scenario: A software engineer joining an ML team says, "I don't see why ML development needs a different process. We already have CI/CD, unit tests, and version control."
question: What is the fundamental difference between traditional software development and ML development that makes the standard software lifecycle insufficient?
details:
  realistic_solution: 'In traditional software, the program is written by humans and is deterministic — the same input always produces the same output. In ML, the program (model) is learned from data, making the system''s behavior a function of three mutable artifacts: code, data, and model weights. A bug can originate in any of these three, and changes to data alone — with zero code changes — can silently alter system behavior. This ''data dependency'' is what makes traditional CI/CD insufficient: you need to test data distributions, not just code paths.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on tooling differences (e.g., Jenkins vs. MLflow).
    **The Rationale:** Candidates often cite symptoms of the problem (need for tracking experiments) rather than the root cause.
    **The Consequence:** Failing to grasp that the fundamental structural difference in ML is the non-deterministic dependency on data, not just a lack of specific MLOps tools.
  napkin_math: |
    - **Traditional Surface Area:** 1 mutable artifact (code).
    - **ML Surface Area:** 3 mutable artifacts (code + data + model weights).
    - **Failure Expansion:** The failure surface area is structurally **3x larger**, heavily skewed by data which changes continuously without formal deploy events.
