title: Online Softmax Memory Footprint Calculation
scenario: You are developing a custom CUDA attention kernel for an LLM on an A100 GPU. The model uses a sequence length of 65,536 and head dimension of 128 in FP16. A naive softmax computation requires materializing the full N x N attention logits matrix in HBM. Instead, you process queries in blocks of 128.
question: How much HBM is needed for the 65,536 x 65,536 FP16 attention matrix, and how much SRAM for one 128-query block's online-softmax stats?
details:
  realistic_solution: A fully materialized 65,536 x 65,536 matrix in FP16 requires approximately 8.59 GB of HBM per head. Using online softmax with a query block size of 128, we only need to store a running max and a running sum (both in FP32) per query in the block. This consumes exactly 1,024 bytes (1 KB) of SRAM, completely eliminating the 8.59 GB HBM allocation.
  common_mistake: |
    **The Pitfall:** Miscalculating the quadratic HBM footprint or forgetting that online softmax requires FP32.
    **The Rationale:** Engineers often assume FP16 precision applies equally to all steps of the attention mechanism.
    **The Consequence:** Sizing SRAM for FP16 instead of FP32 leads to severe underflow issues during accumulation, breaking the numerical stability of the online softmax algorithm.
  napkin_math: |
    - **Naive Attention HBM:** 65,536 &times; 65,536 &times; 2 bytes (FP16) = 8,589,934,592 bytes = **8.59 GB** per head. This massively bottlenecks the A100's HBM.
    - **Online Softmax Block Stats:** A 128-query block requires tracking a running max and sum per query.
    - **SRAM Calculation:** 128 queries &times; 2 stats (max, sum) &times; 4 bytes (FP32) = 1,024 bytes = **1 KB**.
    - **Conclusion:** Using 1 KB of fast SRAM completely eliminates the 8.59 GB HBM footprint.
