title: Gradient Synchronization for FSDP with Activation Checkpointing
scenario: You are specifying the gradient synchronization strategy for FSDP (Fully Sharded Data Parallelism) training a 65B LLM on 256 H100s with activation checkpointing. FSDP shards parameters across GPUs and requires all-gather before each layer's forward/backward and reduce-scatter after each layer's backward. Activation checkpointing means the forward pass runs twice.
question: With activation checkpointing, what total FSDP communication volume and scheduling constraints apply for the 65B LLM on 256 H100s?
details:
  realistic_solution: With activation checkpointing, the communication includes 1L all-gathers for forward, 1L all-gathers for recompute, 1L all-gathers for backward, and 1L reduce-scatters for backward. Total is 4L operations, not 3L.
  common_mistake: |
    **The Pitfall:** Forgetting that activation checkpointing doubles the forward-pass all-gather operations.
    **The Rationale:** Engineers calculate communication volume based on standard FSDP (3L operations), failing to account for the extra recompute pass induced by activation checkpointing.
    **The Consequence:** Severe underestimation of network bandwidth requirements and stall times during training.
  napkin_math: |
    1. **Baseline (No Checkpointing):** 3L collectives = 240 (L=80), 388.5GB total, 0.97s.
    2. **With Checkpointing Collectives:** forward (L=80 all-gathers) + backward (L=80 all-gathers for recompute + L=80 all-gathers for backward + L=80 reduce-scatters) = 1L + 3L = 4L = 320 collectives.
    3. **Total Volume:** 320 × 1.619GB = 518GB.
    4. **Total Time:** 518GB / 400GB/s = 1.295s.
    **Final Result: 320 collectives total, taking 1.295s, requiring strict scheduling of 4L operations.**
