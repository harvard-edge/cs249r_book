title: Optimize EfficientNet training throughput with gradient checkpointing and mixed precision
scenario: EfficientNet-B6 training on a GPU at batch=128 achieves 420 images/sec/GPU but hits OOM at batch=256 due to activation memory. The target is 1,200 images/sec/GPU to meet a 24-hour training deadline.
question: What speedup and throughput do batch=256, BF16, selective checkpointing, and CUDA graphs provide, and does it meet the 1,200 images/sec/GPU target?
details:
  realistic_solution: Batch 256 doubles images per step relative to batch 128. BF16 and CUDA graph improvements are modeled as a 2× throughput gain, while selective checkpointing imposes a 1.15× recomputation overhead. Net speedup is (256/128) × (2/1.15) = 3.48×. Starting from 420 images/sec/GPU, expected throughput is about 1,460 images/sec/GPU, so the 1,200 target is met if the larger batch fits and the assumed BF16/CUDA graph gains hold.
  common_mistake: |
    **The Pitfall:** Applying gradient checkpointing to all layers universally.
    **The Rationale:** Candidates aggressively target memory reduction without considering the severe compute overhead.
    **The Consequence:** A 30-40% throughput reduction, missing the tight training deadline entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch Size Gain: 256 / 128 = 2x.
       - BF16 & CUDA Graphs Gain: 2x.
       - Selective Checkpointing Penalty: 1.15x overhead.
    2. **Calculations:**
       - Net Speedup: 2 * 2 / 1.15 = 3.478x.
       - Final Throughput: 420 * 3.478 = 1,461 images/sec/GPU.
    3. **Conclusion & Interpretation:** **Result: Target Met.** Throughput exceeds the 1,200 images/sec/GPU requirement by leveraging selective checkpointing properly.
