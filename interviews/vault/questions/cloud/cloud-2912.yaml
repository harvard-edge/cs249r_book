title: Optimize EfficientNet training throughput with gradient checkpointing and mixed
  precision
scenario: EfficientNet-B6 training on H100 at batch=128 achieves 420 images/sec/GPU
  but hits OOM at batch=256 due to activation memory. The target is 1,200 images/sec/GPU
  to meet a 24-hour training deadline. Optimize the pipeline using gradient checkpointing,
  BF16, and CUDA graphs.
question: What speedup and throughput do batch=256, BF16, selective checkpointing,
  and CUDA graphs provide, and does it meet 1,200 images/sec/GPU?
details:
  realistic_solution: Batch 256 doubles images per step relative to batch 128. BF16
    and CUDA graph improvements are modeled as a 2× throughput gain, while selective
    checkpointing imposes a 1.15× recomputation overhead. Net speedup is (256/128)
    × (2/1.15) = 3.48×. Starting from 420 images/sec/GPU, expected throughput is about
    1,460 images/sec/GPU, so the 1,200 target is met if the larger batch fits and
    the assumed BF16/CUDA graph gains hold.
  common_mistake: Applying gradient checkpointing to all layers, which recomputes
    activations for every forward pass in the backward pass, reducing memory but also
    reducing throughput by ~30-40% — too expensive if memory is not the binding constraint.
  napkin_math: Speedup = (256/128) × (2/1.15) = 2 × 1.739 = 3.48×. Throughput = 420
    × 3.48 = 1,462 images/sec/GPU. This exceeds the 1,200 images/sec/GPU target with
    about 22% headroom.
