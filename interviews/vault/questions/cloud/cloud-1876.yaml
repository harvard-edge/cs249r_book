title: 70B LLM FSDP Checkpoint Time Calculation
scenario: You are training a 70B parameter LLM on an 8-node cluster (64x A100 80GB GPUs) using Fully Sharded Data Parallel (FSDP) and AdamW. The total training state (parameters, gradients, and optimizer states) is 16 bytes per parameter. You need to checkpoint to a Lustre parallel file system that has a 50 GB/s aggregate write bandwidth limit. A single GPU rank can write to Lustre at a maximum of 2 GB/s.
question: What are the monolithic and distributed sharded checkpoint write times, and what bottlenecks each?
details:
  realistic_solution: Calculate the total state size (1.12 TB) and divide by the respective bottleneck. Monolithic is bottlenecked by single-node write speed (2 GB/s), while sharded is bottlenecked by the file system's aggregate limit (50 GB/s), taking 22.4 seconds.
  common_mistake: |
    **The Pitfall:** Calculating sharded checkpoint time based purely on the single-rank write speed.
    **The Rationale:** Candidates divide the per-rank state by the 2 GB/s local speed, forgetting that 64 GPUs concurrently writing will bottleneck on the shared Lustre file system's aggregate limit.
    **The Consequence:** Grossly underestimating the checkpoint overhead in large distributed systems.
  napkin_math: |
    - **Total State:** 70B params * 16 bytes/param = 1120 GB.
    - **Monolithic Time:** 1120 GB / 2 GB/s = 560 s.
    - **Sharded Theoretical:** 64 GPUs * 2 GB/s = 128 GB/s (Exceeds Lustre).
    - **Sharded Actual:** 1120 GB / 50 GB/s (Lustre Limit) = **22.4 seconds.**
    - **Result:** **Sharded speedup is 560 / 22.4 = 25x.**
