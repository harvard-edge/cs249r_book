title: Kubernetes Orchestration for High-Performance ML Training with NVIDIA A100
scenario: Your team is tasked with designing a scalable and efficient machine learning training platform on Kubernetes. The platform needs to support multiple research teams running diverse deep learning workloads on nodes equipped with NVIDIA A100 GPUs (80 GB HBM2e, 400W TDP).
question: "How would you design the Kubernetes configuration, including GPU device plugins, node affinity, and job scheduling policies, to maximize utilization and minimize turnaround times?"
details:
  realistic_solution: "The solution involves several components:\n1.  **NVIDIA Device Plugin:** Ensure the official NVIDIA device plugin is installed to expose GPUs as schedulable resources (e.g., `nvidia.com/gpu`).\n2.  **Resource Management:** Enforce strict `resource requests` and `limits` for GPU memory and compute for each ML training pod to prevent oversubscription and ensure fair allocation.\n3.  **Node Affinity/Selectors:** Use `nodeSelector` or `nodeAffinity` to target nodes with A100 GPUs. For more complex scenarios, `taints` and `tolerations` can isolate specific GPU types or prevent non-GPU workloads from running on GPU nodes.\n4.  **Pod Priority and Preemption:** Implement Pod Priority and Preemption to ensure critical training jobs (e.g., production model training) get preference over lower-priority research jobs.\n5.  **Advanced Scheduling (Optional but Recommended):** For maximizing utilization and ensuring fairness, consider:\n    *   **Scheduler Extenders:** Implement a custom scheduler extender to apply specific policies like gang scheduling (all pods of a job start together) or bin-packing (filling GPUs to maximize density).\n    *   **Volcano:** An open-source batch system built on Kubernetes, which provides advanced scheduling features for ML workloads like gang scheduling, job queueing, and more intelligent resource allocation.\n6.  **Monitoring:** Deploy monitoring (e.g., Prometheus and Grafana) to track GPU utilization, memory usage, temperature, and power consumption per GPU and node to identify bottlenecks and optimize resource allocation.\n7.  **Container Runtimes:** Ensure `containerd` is configured to use the `nvidia-container-runtime`."
  common_mistake: |
    **The Pitfall:** Installing the NVIDIA device plugin without configuring proper resource requests, limits, or advanced schedulers.
    **The Rationale:** Engineers assume default Kubernetes scheduling is sufficient for complex, high-demand GPU workloads.
    **The Consequence:** Jobs are poorly distributed, leading to severe GPU underutilization, resource contention, and starvation for critical training tasks.
  napkin_math: |
    *   **Node Density:** A standard server rack power limit restricts the number of 400W A100s. $3000\text{W} / 400\text{W} = 7.5$. Realistically, 6-7 GPUs per server.
    *   **Data Loading:** Transferring 50 GB of data at 2000 GB/s HBM bandwidth takes just 0.025 seconds.
    *   **Result:** **Data loading from slower storage networks becomes the critical bottleneck in Kubernetes, not the intra-GPU HBM bandwidth.**
