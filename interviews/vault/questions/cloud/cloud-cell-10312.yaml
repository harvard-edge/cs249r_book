title: 'Mastery: Designing a Zero-Downtime GPU Cluster Upgrade Strategy'
scenario: You must upgrade the NVIDIA GPU driver from 525 to 550 on a production 512-GPU H100 cluster
  (64 nodes, 8 GPUs each) running 24/7 ML inference and batch training workloads. The cluster cannot tolerate
  more than 5 minutes of total inference downtime and cannot lose training job progress. Design a complete
  rolling upgrade strategy with rollback capability.
details:
  realistic_solution: 'Strategy: (1) Cordon and drain one node at a time using `kubectl drain --grace-period=300
    --ignore-daemonsets`. (2) Inference pods: use PodDisruptionBudget with `minAvailable: 90%` to ensure
    90% of inference capacity remains during drain. With 64 nodes, draining 1 node at a time leaves 63/64
    = 98% capacity. (3) Training pods: configure elastic training (`torchrun` with fault tolerance) or
    checkpoint-and-preempt: save checkpoint, evict, relaunch on upgraded node. (4) Upgrade driver via
    GPU Operator''s `ClusterPolicy` with rolling update strategy — set `maxUnavailable: 1` on the driver
    DaemonSet. (5) Validate each node: run `nvidia-smi` + NCCL bandwidth test before uncordoning. (6)
    Rollback: maintain previous driver image tag in GPU Operator config; redeploy DaemonSet with old tag
    if error rate increases.'
  common_mistake: Cordoning all nodes at once for the upgrade; not accounting for the fact that GPU driver
    upgrades require a node reboot (kernel module), meaning the upgrade is not a hot-swap and all pods
    on the node must be evicted.
  napkin_math: '64 nodes, 10 min per node upgrade (drain 3 min + reboot 5 min + validate 2 min) × 1 node
    at a time = 640 min = 10.7 hr total upgrade window. Inference capacity during upgrade: 63/64 = 98.4%.
    Training: each job loses at most 1 node = at worst 12.5% throughput reduction for 8-node jobs during
    that node''s 10-min window. Total training disruption per job: 10 min at reduced throughput = acceptable
    for week-long runs.'
