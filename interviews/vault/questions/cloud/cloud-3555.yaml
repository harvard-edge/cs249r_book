title: Optimizing Large-Scale ML Data Storage for AMD MI300X
scenario: 'You are designing the data pipeline for training a multi-trillion parameter large language model. The raw dataset, comprising petabytes of diverse modalities, resides in an S3-compatible object store. Training will occur on an AMD MI300X cluster.'
question: What storage formats, compression, indexing, and tiering would you use to feed PB-scale multimodal data to MI300X training efficiently?
details:
  realistic_solution: 'A realistic solution involves a multi-stage data processing pipeline. For the raw PBs of data, a highly compressed, partitioned columnar format like Parquet (with Zstd compression) is suitable for archival and initial processing due to its efficiency for selective reads. For training, a derived, pre-processed dataset would be stored in a format optimized for sequential reads and fast deserialization, potentially a custom binary format or a highly optimized TFRecord/WebDataset structure (e.g., contiguous tensors, minimal parsing overhead). Data should be strategically sharded and potentially pre-fetched to local NVMe SSDs (a faster storage tier) on the training nodes, allowing the MI300X to pull data from HBM3 caches. This setup allows for continuous, high-bandwidth data feeding, ensuring the MI300X''s compute units remain saturated.'
  common_mistake: |
    **The Pitfall:** Applying a 'one-size-fits-all' storage format like generic CSV/JSON or unoptimized TFRecord directly from S3.
    **The Rationale:** Candidates fail to analyze the specific sequential access patterns of training versus the random access needs of data preparation.
    **The Consequence:** Inefficient deserialization and excessive data transfer turn the I/O system into the primary bottleneck, severely underutilizing the MI300X compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X HBM3 Bandwidth: 5.3 TB/s.
       - Batch size: 100 GB.
       - Storage Tiers: NVMe (~10 GB/s), S3 (~2 GB/s).
    2. **Calculations:**
       - HBM3 Load Time: 100 GB / 5,300 GB/s = ~0.019s.
       - NVMe Load Time: 100 GB / 10 GB/s = 10s.
       - S3 Load Time: 100 GB / 2 GB/s = 50s.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Bottleneck Avoidance.** Direct S3 streaming (50s) will critically starve the GPU; data MUST be pre-fetched to NVMe and decompressed aggressively to keep the MI300X saturated.
