title: Diagnosing Train-Eval Performance Gap
scenario: A model achieves 92% accuracy during training but drops to 78% when deployed (with model.eval()
  correctly called). The model uses BatchNorm and Dropout(0.3). Diagnose the most likely cause and the
  fix.
details:
  realistic_solution: 'A 14-point train→eval drop with correct eval() usage points to BatchNorm running
    statistics divergence, not Dropout (which should improve or maintain accuracy in eval). Common cause:
    the training data distribution shifted during training (e.g., curriculum learning, data augmentation
    changes), so the running_mean and running_variance accumulated early in training don''t match the
    data distribution the model converged on. Fix: after training completes, run a calibration pass over
    a representative dataset with model.train() but torch.no_grad() to recompute fresh running statistics
    that match the final data distribution. Alternatively, switch to GroupNorm or LayerNorm which have
    no running statistics. Another possibility: very small training batches (e.g., 4-8) cause high-variance
    batch statistics during training, but running stats are smooth averages — the model learned to exploit
    batch-specific statistics it won''t have at eval time.'
  common_mistake: Blaming Dropout for train-eval gaps. Dropout typically improves eval accuracy (it's
    a regularizer). The culprit is usually BatchNorm running statistics not matching the test distribution.
  napkin_math: 'Training with batch=4: batch stats variance is high. Running stats = smooth average of
    100K batches. If model memorized batch-specific noise, eval drops 10-15%.'
