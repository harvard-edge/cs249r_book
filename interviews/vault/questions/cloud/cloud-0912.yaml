title: Transformer Batch Size and Memory Constraints
scenario: You are deploying a 1.2B parameter Transformer model in FP16 on a 24GB GPU. The model weights consume 2.4GB and the base CUDA context requires 1.6GB. For a fixed sequence length of 1024, the intermediate activations and KV cache consume 250MB per sequence in the batch.
question: What limits batch-size scaling on the 24GB GPU, what is the maximum viable batch size, and what safe cap would you choose?
details:
  realistic_solution: Determine the remaining VRAM available for dynamic allocations, and divide by the per-sequence memory cost. To ensure stability and hardware alignment, cap the batch size at the nearest lower multiple of 8 or 16 rather than the theoretical maximum.
  common_mistake: |
    **The Pitfall:** Assuming that compute limits throughput scaling.
    **The Rationale:** Engineers focus purely on processing power, failing to account for the linear VRAM growth of intermediate activations and KV cache with batch size.
    **The Consequence:** Out-Of-Memory (OOM) errors during execution before compute saturation is ever reached.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total VRAM: 24.0GB.
       - Weights + Context: 2.4GB + 1.6GB = 4.0GB.
       - Memory per sequence: 0.25GB.
    2. **Calculations:**
       - Available VRAM: 24.0GB - 4.0GB = 20.0GB.
       - Theoretical Max Batch Size: 20.0GB / 0.25GB = 80.
       - Safe Cap: Nearest multiple of 8 or 16 below 80 is 64.
    3. **Conclusion & Interpretation:** **The theoretical maximum batch size is 80, but a safe operational cap is 64. Result: Memory-Capacity-Bound.**
