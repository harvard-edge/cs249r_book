title: Stranded Power in Mixed H100/A100 Rack Deployments
scenario: 'A cloud operator is retrofitting an existing datacenter that has 30 kW/rack PDUs and mixed cooling supporting up to 25 kW IT load per rack. They plan to deploy a combination of 8xH100 nodes (8 kW each) and legacy 8xA100 nodes (5.2 kW each).'
question: How should you fill a 25 kW rack with 8 kW H100 and 5.2 kW A100 nodes to maximize GPUs, and how much power is stranded?
details:
  realistic_solution: 'Pure H100 rack: floor(25 / 8) = 3 nodes x 8 kW = 24 kW used, 1 kW stranded (4% waste). Pure A100 rack: floor(25 / 5.2) = 4 nodes x 5.2 kW = 20.8 kW used, 4.2 kW stranded (17% waste). Mixed optimal: 2x H100 (16 kW) + 1x A100 (5.2 kW) = 21.2 kW, 3.8 kW stranded. Or 1x H100 (8 kW) + 3x A100 (15.6 kW) = 23.6 kW, 1.4 kW stranded (5.6% waste) - near-optimal. The 3x H100 pure rack wastes only 4%, making it the most efficient single-SKU configuration.'
  common_mistake: |
    **The Pitfall:** Assuming nodes can be mixed freely in one rack without considering per-circuit limits.
    **The Rationale:** In practice, power distribution units (PDUs) at the rack level have per-circuit limits constraining placement. Also, engineers often forget to quantify stranded power.
    **The Consequence:** The deployment might violate physical electrical constraints or result in poor capacity planning by ignoring efficiency metrics.
  napkin_math: |
    - **Pure H100**: 3 nodes = 24 kW. Stranded = 1 kW (4.0%).
    - **Pure A100**: 4 nodes = 20.8 kW. Stranded = 4.2 kW (16.8%).
    - **Mixed 1**: 1xH100 + 3xA100 = 8 + 15.6 = 23.6 kW. Stranded = 1.4 kW (5.6%).
    - **Mixed 2**: 2xH100 + 1xA100 = 16 + 5.2 = 21.2 kW. Stranded = 3.8 kW (15.2%).
    - **Final Result**: **3xH100 pure rack (4% stranding)** is the most efficient single-SKU configuration, or **1xH100 + 3xA100 (5.6% stranding)** for mixed.
