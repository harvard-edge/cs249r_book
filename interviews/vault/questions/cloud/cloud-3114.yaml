title: 'Transformer Cost Mastery: Full Training and Inference Cost Analysis for LLM Product'
scenario: 'Build a complete financial model for a 30B parameter transformer LLM product: training cost on GPUs, inference cost at 1000 req/s with 500 output tokens, and break-even monthly revenue. Training: 1T tokens, 40% MFU. Inference: INT4 quantization (15GB model), target P99 < 2s.'
question: What are the training cost, inference fleet cost at 1000 req/s, and break-even monthly revenue for the 30B LLM product?
details:
  realistic_solution: Calculate training FLOPs and inference decode latency. Target P99 requires speculative decoding to meet the 2s SLA. Monthly inference costs rapidly dwarf the one-time training costs.
  common_mistake: |
    **The Pitfall:** Calculating training cost once and ignoring ongoing inference costs.
    **The Rationale:** Training involves a massive upfront capital expense, which intuitively feels like the primary cost driver.
    **The Consequence:** The business model fails because monthly inference costs at scale ($1.46M/month) rapidly destroy unit economics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B model, 1T tokens.
       - GPU cost = $2.50/hr.
    2. **Calculations:**
       - Training FLOPs: 6 * 30e9 * 1e12 = 1.8e23.
       - Training Cost: 1000 GPUs * $2.50 * 63.1 hours = $157,750.
       - Inference Time (500 tokens): 2.24s (misses SLA) -> Speculative Decode = 560ms.
       - Fleet Size at 70% util: 800 servers.
       - Monthly Cost: 800 * $2.50 * 730 = $1.46M.
    3. **Conclusion & Interpretation:**
       - **Result: Break-even Revenue is $2.43M/month. Inference dominates long-term expenditure.**
