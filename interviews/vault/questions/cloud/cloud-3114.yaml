title: 'Transformer Cost Mastery: Full Training and Inference Cost Analysis for LLM Product'
scenario: Build a complete financial model for a 30B parameter transformer LLM product: training cost on H100s, inference cost at 1000 req/s with 500 output tokens, and break-even monthly revenue. Training: 1T tokens, 40% MFU on H100 ($2.50/hr). Inference: H100 $2.50/hr, INT4 quantization (15GB model), target P99 < 2s.
question: What are the training cost, inference fleet cost at 1000 req/s, and break-even monthly revenue for the 30B LLM product?
details:
  realistic_solution: 'Training: 6*30B*1T=1.8e23 FLOPs. At 1000 H100 at 40% MFU: time=1.8e23/(1000*792e12)=227,272s=63.1hr=2.63 days. Cost: 1000*$2.50*63.1=$157,750. Inference: INT4 30B=15GB. Decode: 15GB/3350GB/s=4.48ms/token. 500 tokens: 2.24s > 2s target! Need batch or speculative decoding. With speculative (4x speedup): 560ms per request. ρ to handle 1000 req/s: need 1000/(1/0.560s)=560 H100s minimum. At ρ=0.7: 1000/(0.7*(1/0.56))=800 H100s. Monthly inference cost: 800*$2.50*730=$1.46M/month. Revenue to cover: $1.46M/month at 40% gross margin: $2.43M/month. Inference dominates (monthly) vs training ($158K one-time or quarterly).'
  common_mistake: |
    **The Pitfall:** Calculating training cost once and ignoring ongoing inference costs.
    **The Rationale:** Training involves a massive upfront capital expense or compute allocation, which intuitively feels like the primary cost driver.
    **The Consequence:** The business model fails because monthly inference costs at scale ($1.46M/month) rapidly dwarf the one-time training costs ($158K), destroying unit economics.
  napkin_math: |
    - **Training FLOPs:** 6 × 30e9 × 1e12 = 1.8e23 FLOPs.
    - **Training Time:** At 1000 H100s (effectively 792 TFLOPS each): 1.8e23 / 7.92e17 = 227,272s = 63.1 hours.
    - **Training Cost:** 1000 GPUs × $2.50/hr × 63.1 hours = **$157,750**.
    - **Inference Decode:** 15GB (INT4) / 3350 GB/s bandwidth = 4.48 ms/token.
    - **Inference Time (500 tokens):** 500 × 4.48 ms = 2.24s (misses 2s target).
    - **Speculative Decoding:** Assuming 4x speedup -> 560 ms per request.
    - **Inference Fleet Size:** At 1000 req/s, service time = 560ms. Need 560 servers at 100% utilization. At 70% utilization: 560 / 0.7 = 800 H100s.
    - **Monthly Inference Cost:** 800 × $2.50 × 730 hours = **$1.46M**.
    - **Break-even Revenue:** To cover $1.46M/month cost with a 40% gross margin (cost is 60% of revenue), revenue = $1.46M / 0.6 = **$2.43M/month**.
