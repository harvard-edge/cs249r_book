title: FP8 Activation Memory Savings
scenario: A training run stores 24 GB of activation tensors that are eligible for FP8 storage. Moving these listed activations from FP16 to FP8 halves their bytes but adds a 2 GB scaling/metadata overhead. Estimate net memory savings.
question: How much memory is saved by converting 24 GB of FP16 activations to FP8 if metadata adds 2 GB?
details:
  realistic_solution: In this idealized byte model, FP8 halves the listed 24 GB to 12 GB. Adding 2 GB metadata gives 14 GB. Net savings are 10 GB per GPU. The change is useful if numerical stability, kernel support, and framework storage format are acceptable.
  common_mistake: Claiming a full 2x total memory reduction without subtracting metadata and considering only activations.
  napkin_math: New memory = 24/2 + 2 = 14 GB. Savings = 24 - 14 = 10 GB.
