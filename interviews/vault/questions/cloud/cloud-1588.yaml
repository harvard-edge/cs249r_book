title: Large Batch MLPerf Convergence Analysis
scenario: You run MLPerf Training for GPT-3 on 512 GPUs. Doubling the global batch size from 2M to 4M tokens increases cluster throughput (tokens/sec) by 25%. However, the official MLPerf 'Time to Train' metric regresses by 20%.
question: Why did MLPerf Time to Train regress after doubling the batch size despite higher hardware throughput?
details:
  realistic_solution: The regression is caused by exceeding the model's critical batch size. MLPerf measures strictly wall-clock time-to-convergence to a target validation metric, not raw throughput. While the larger batch size processed tokens faster, the statistical efficiency per token plummeted. The model required significantly more total tokens (and thus steps) to converge. The solution is to retune the learning rate schedule (e.g., applying the linear scaling rule with warmup) or revert to the optimal batch size.
  common_mistake: |
    **The Pitfall:** Assuming higher cluster throughput directly translates to a faster 'Time to Train'.
    **The Rationale:** Confusing system-level optimization (tokens processed per second) with statistical optimization (convergence efficiency per token).
    **The Consequence:** Falsely diagnosing non-existent hardware or network bottlenecks when the issue is a degraded learning rate schedule.
  napkin_math: |
    - Baseline (B=2M): 1.0s/step, 1000 steps to target loss -> T_train = 1000s. Throughput = 2M tok/s.
    - New (B=4M): Throughput is 25% higher = 2.5M tok/s. Step time = 4M / 2.5M = 1.6s/step.
    - Due to exceeding critical batch size, statistical efficiency drops. Convergence now requires 750 steps instead of an ideal 500.
    - **New T_train = 750 * 1.6s = 1200s (a 20% regression).**
