title: DLRM Iteration Loop Optimization
scenario: 'Your team develops a 50GB DLRM (Recommendation) model. The current ML workflow takes 48 hours
  per experiment: 12h data preprocessing (CPU), 24h training on 1xA100 (80GB), and 12h offline evaluation
  on 500M historical records. With 10 engineers each running 3 experiments per week, iteration speed is
  cripplingly slow and cloud compute budgets are constantly exceeded. You must architect a new experiment
  tracking and execution pipeline to reduce end-to-end iteration time to under 10 hours without exceeding
  the current 720 A100-hours/week compute budget.'
question: "How would you redesign the experiment pipeline to get iteration time under 10 hours without exceeding 720 A100-hours per week?"
details:
  realistic_solution: 'To hit the <10h target while bounding costs, architect a 3-stage optimized workflow.
    1) Data Preprocessing: Move from on-the-fly CPU processing to a materialized feature store with GPU-accelerated
    ETL (e.g., NVTabular). This caches reusable data and cuts the 12h step to 1h. 2) Training: Scale from
    1xA100 to 4xA100 using hybrid parallelism (data parallel for MLPs, model parallel for massive embedding
    tables). This reduces 24h to ~7h (assuming 85% scaling efficiency). 3) Evaluation: Implement a tiered
    evaluation funnel tied to your experiment tracking system. Instead of evaluating all 500M records,
    create a stratified 50M record ''fast-eval'' set. Early-stop training if validation AUC degrades.
    This reduces eval to 1.5h. Total time drops to 9.5h.'
  common_mistake: Scaling to 8xA100s for training without addressing the 24 hours spent in CPU-bound data
    preprocessing and exhaustive offline evaluation.
  napkin_math: 'Current: 10 eng * 3 exp * 24h = 720 A100-hours/week. New workflow wall-clock: 1h data
    + 7h train + 1.5h eval = 9.5h. Compute per full exp: 4xA100 * 7h = 28 A100-hours. Weekly compute for
    30 runs: 30 * 28 = 840 A100-hours. To stay within the 720h budget, early-stop the bottom 30% of runs
    (9 runs) after 1 hour of training (4 A100-hours each). 21 full runs * 28h = 588h. 9 early-stopped
    runs * 4h = 36h. Total compute: 588 + 36 = 624 A100-hours/week. Budget maintained, wall-clock reduced
    >5x.'
  options:
  - The roofline model only applies to CPU workloads because GPUs always operate at peak FLOPS due to
    their massive parallelism; GPU workloads are never memory-bandwidth bound
  - The ridge point for A100 is 312 TFLOPS / 80 GB = 3.9 TFLOPS/GB, meaning any model larger than 80 GB
    is memory-bound; model size, not operational intensity, determines the bound
  - Roofline analysis is purely theoretical and cannot predict real-world performance because it ignores
    cache effects, scheduling overhead, and memory access patterns
  - 'Roofline model: plot operational intensity (FLOPS/byte) on x-axis vs achievable GFLOPS on y-axis.
    The roof has two regions: (1) memory-bound (left): performance limited by bandwidth = OI × BW. (2)
    compute-bound (right): performance limited by peak FLOPS. The ridge point (knee) = peak_FLOPS / peak_BW.
    For A100: 312 TFLOPS / 2.0 TB/s = 156 OPS/byte. Operations with OI < 156 are memory-bound; above are
    compute-bound. Decode attention (OI ~1) is deeply memory-bound.'
  correct_index: 3
