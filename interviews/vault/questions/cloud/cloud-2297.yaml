title: DLRM Iteration Loop Optimization
scenario: Your team develops a 50GB DLRM (Recommendation) model. The current ML workflow takes 48 hours per experiment: 12h data preprocessing (CPU), 24h training on 1xA100 (80GB), and 12h offline evaluation on 500M historical records. With 10 engineers each running 3 experiments per week, iteration speed is slow and cloud compute budgets are exceeded.
question: How would you redesign the experiment pipeline to get iteration time under 10 hours without exceeding the current 720 A100-hours per week budget?
details:
  realistic_solution: 'To hit the <10h target while bounding costs, architect a 3-stage optimized workflow. 1) Data Preprocessing: Move from on-the-fly CPU processing to a materialized feature store with GPU-accelerated ETL (e.g., NVTabular). This caches reusable data and cuts the 12h step to 1h. 2) Training: Scale from 1xA100 to 4xA100 using hybrid parallelism (data parallel for MLPs, model parallel for massive embedding tables). This reduces 24h to ~7h (assuming 85% scaling efficiency). 3) Evaluation: Implement a tiered evaluation funnel tied to your experiment tracking system. Instead of evaluating all 500M records, create a stratified 50M record ''fast-eval'' set. Early-stop training if validation AUC degrades. This reduces eval to 1.5h. Total time drops to 9.5h.'
  common_mistake: |
    **The Pitfall:** Scaling to 8xA100s for training without addressing data prep and evaluation.
    **The Rationale:** Candidates often throw more GPUs at the training phase to reduce wall-clock time.
    **The Consequence:** The 24 hours spent in CPU-bound data preprocessing and exhaustive offline evaluation remain untouched, meaning the 10-hour target is still missed while costs skyrocket.
  napkin_math: |
    - **Current budget:** 10 eng × 3 exp × 24h = 720 A100-hours/week.
    - **New workflow wall-clock:** 1h data (GPU ETL) + 7h train (4xA100) + 1.5h eval (fast-eval set) = 9.5 hours.
    - **Compute per full exp:** 4xA100 × 7h = 28 A100-hours.
    - **Weekly compute for 30 runs:** 30 × 28 = 840 A100-hours (exceeds budget).
    - **Cost savings via early stopping:** Early-stop bottom 30% of runs (9 runs) after 1 hour (4 A100-hours each).
    - **Final weekly compute:** (21 full runs × 28h) + (9 stopped runs × 4h) = 588 + 36 = **624 A100-hours/week.**
