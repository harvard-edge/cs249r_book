title: Diagnosing Hidden Bias in Cloud KYC Pipelines
scenario: A cloud-based KYC pipeline processes 100,000 onboarding requests daily.
  The global False Rejection Rate (FRR) is 1.2%. Single-attribute monitoring shows
  the FRR for female users is 2.3% and the FRR for users with darker skin is 4.0%.
  Customer support escalations reveal systemic failures for darker-skinned females,
  who make up 5% of the total request volume.
question: How do single-axis FRR metrics mask failures for darker-skinned females,
  and what maximum FRR could that subgroup have?
details:
  realistic_solution: Single-axis fairness metrics inherently suffer from aggregation
    masking. They dilute concentrated failure modes of intersectional minority groups
    by averaging them against larger, majority sub-populations (e.g., lighter-skinned
    females). To diagnose true algorithmic bias, ML monitoring must deploy Min-Max
    Intersectional Fairness evaluation, explicitly calculating metrics across overlapping
    protected attributes.
  common_mistake: '**The Pitfall:** Relying strictly on marginal (single-axis) fairness
    metrics.

    **The Rationale:** Engineers assume that if a model is relatively fair across
    gender independently and race independently, the intersection of those attributes
    will also be fair.

    **The Consequence:** Single-axis metrics mathematically dilute the severe errors
    of minority intersections by averaging them with larger, high-performing subgroups,
    entirely masking critical failures.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 100,000 total requests. Global FRR: 1.2% (1,200 errors).

    - Dark-skinned group: 20,000 users, 4.0% FRR = 800 errors.

    - Dark-skinned females: 5,000 users (5% of total).


    **Calculations:**

    - Maximum overlap scenario: All 800 errors from the dark-skinned group occur exclusively
    within the dark-skinned female subset.

    - Max Subgroup FRR = 800 errors / 5,000 users = 16.0%.


    **Conclusion & Interpretation:**

    - **Result: 16.0% Max Subgroup FRR (Algorithmic-Bias-Bound)**. A catastrophic
    16% error rate for intersectional minorities is completely masked by the global
    1.2% average.

    '
