title: Diagnosing Hidden Bias in Cloud KYC Pipelines
scenario: A cloud-based KYC (Know Your Customer) identity verification pipeline processes 100,000 onboarding
  requests daily. The global False Rejection Rate (FRR) is 1.2%. Single-attribute monitoring shows the
  FRR for female users is 2.3% and the FRR for users with Fitzpatrick skin types IV-VI (darker skin) is
  4.0%. Despite passing the company's 5% single-axis SLA, customer support escalations reveal systemic
  failures for darker-skinned females, who make up 5% of the total request volume. Diagnostically, how
  do single-axis metrics mask this failure, and what is the theoretical maximum FRR for this specific
  subgroup?
question: "How do single-axis FRR metrics mask failures for darker-skinned females, and what maximum FRR could that subgroup have?"
details:
  realistic_solution: Implement intersectional subgroup evaluation (e.g., Min-Max Fairness evaluation
    across overlapping identity groups). Single-axis metrics mathematically dilute the severe errors of
    minority intersections by averaging them with larger, high-performing subgroups (e.g., lighter-skinned
    females or darker-skinned males).
  common_mistake: Relying strictly on marginal (single-axis) metrics like Demographic Parity or overall
    False Positive Rates, falsely assuming that if A and B are fair independently, the intersection of
    A and B is also fair.
  napkin_math: Total requests = 100,000. Overall errors = 1,200 (1.2%). Assume Dark-skinned users = 20,000
    (yielding 4.0% FRR = 800 errors). Assume Female users = 35,000 (yielding 2.3% FRR = 805 errors). Dark-skinned
    females = 5% of 100,000 = 5,000 users. If errors maximally overlap on this intersection, 800 of the
    dark-skinned errors could belong entirely to the 5,000 dark-skinned females. Maximum Subgroup FRR
    = 800 / 5,000 = 16.0%. The critical 16% error rate is completely masked by the larger 'Female' and
    'Dark-skinned' denominator pools.
