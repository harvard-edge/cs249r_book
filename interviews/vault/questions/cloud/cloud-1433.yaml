title: Diagnosing Hidden Bias in Cloud KYC Pipelines
scenario: 'A cloud-based KYC identity verification pipeline processes 100,000 onboarding requests daily. The global False Rejection Rate (FRR) is 1.2%. Single-attribute monitoring shows the FRR for female users is 2.3% and the FRR for users with darker skin (Fitzpatrick IV-VI) is 4.0%. Customer support escalations reveal systemic failures for darker-skinned females, who make up 5% of the total request volume.'
question: 'How do single-axis FRR metrics mask failures for darker-skinned females, and what maximum FRR could that subgroup have?'
details:
  realistic_solution: 'Implement intersectional subgroup evaluation (e.g., Min-Max Fairness evaluation across overlapping identity groups). Single-axis metrics mathematically dilute the severe errors of minority intersections by averaging them with larger, high-performing subgroups (e.g., lighter-skinned females or darker-skinned males).'
  common_mistake: |
    **The Pitfall:** Relying strictly on marginal (single-axis) fairness metrics.
    **The Rationale:** Engineers assume that if a model is relatively fair across gender independently and race independently, the intersection of those attributes will also be fair.
    **The Consequence:** Single-axis metrics mathematically dilute the severe errors of minority intersections by averaging them with larger, high-performing subgroups, entirely masking critical failures.
  napkin_math: |
    - **Total requests:** 100,000. Overall errors: 1,200 (1.2%).
    - **Dark-skinned FRR:** Assume 20,000 users -> 4.0% FRR = 800 errors.
    - **Female FRR:** Assume 35,000 users -> 2.3% FRR = 805 errors.
    - **Intersection (Dark-skinned females):** 5% of 100,000 = 5,000 users.
    - **Maximum overlap scenario:** If 800 dark-skinned errors belong entirely to the 5,000 dark-skinned females.
    - **Maximum Subgroup FRR:** 800 / 5,000 = 16.0%.
    - **Conclusion: The critical 16% error rate is completely masked by the denominators of the single-axis groups.**
