title: SIMT Warp Mapping for Sparse Attention
scenario: You are evaluating two SIMT mapping strategies for a custom Sparse Attention kernel on an NVIDIA
  A100 GPU (108 SMs, 2048 max threads/SM, 192KB shared memory/SM). The workload features power-law distributed
  sequence lengths. Strategy A assigns one thread per sequence, maximizing concurrent sequences but causing
  extreme warp divergence. Strategy B assigns an entire warp (32 threads) per sequence, ensuring coalesced
  reads but leaving threads idle for short sequences. Evaluate these strategies and justify which approach
  better leverages the SIMT execution model to hide the ~300 cycle global memory latency.
details:
  realistic_solution: Strategy B is the correct architectural choice. In SIMT, a warp executes in lockstep.
    Strategy A forces 32 separate uncoalesced memory transactions per warp, saturating the memory controller.
    Strategy B ensures coalesced reads, freeing up memory bandwidth and allowing the SM's warp scheduler
    to context-switch to other active warps to hide the 300-cycle global memory latency.
  common_mistake: Candidates often choose Strategy A, prioritizing raw thread utilization over memory
    coalescing, failing to realize that warp divergence in memory accesses prevents the SM scheduler from
    effectively hiding latency.
  napkin_math: Global memory latency is ~300 cycles. Strategy A (uncoalesced) forces 32x 32B transactions
    = 1024B per warp memory request. Strategy B forces 1x 128B coalesced transaction. Strategy A demands
    8x more bandwidth and 32x more transaction slots, hitting the HBM2 bandwidth ceiling (2.0 TB/s) before
    the SM can schedule the ~10+ active warps required to fully hide the latency.
