title: Diagnosing PDU Trips in High-Density GPU Racks
scenario: An 8-GPU node (10.2 kW peak draw) and four CPU data servers (1.2 kW peak each) are deployed in a 42U rack with a 15 kW Top-of-Rack PDU. The equipment uses 16U and averages 9 kW draw. During distributed LLM training, the PDU frequently trips.
question: Why does the 15 kW PDU trip despite the average draw being only 9 kW?
details:
  realistic_solution: 'Modern AI clusters are constrained by the Power Density Ceiling, not physical space. Synchronous operations (like AllReduce) cause all GPUs to hit their peak TDP simultaneously. Calculating peak power (10.2kW + 4.8kW = 15.0kW) shows the rack IT load is exactly at the limit. Accounting for PSU inefficiency (~94%), the actual draw exceeds the 15kW PDU capacity. The solution is to intentionally strand physical space (leaving racks half-empty) to respect power limits or deploy liquid-cooled high-density racks (e.g., 50+ kW).'
  common_mistake: |
    **The Pitfall:** Assuming physical volume (rack U-space) is the primary constraint and relying on average power draw.
    **The Rationale:** Candidates lack experience with the massive, synchronized power spikes generated by distributed tensor operations like AllReduce.
    **The Consequence:** Racks lose power dynamically during training, causing catastrophic job failures and hardware stress.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8-GPU peak power: 10.2 kW.
       - 4 CPU nodes peak power: 4 * 1.2 kW = 4.8 kW.
       - PDU limit: 15.0 kW.
       - PSU efficiency: 94%.
    2. **Calculations:**
       - Peak IT load = 10.2 kW + 4.8 kW = 15.0 kW.
       - Wall power draw = 15.0 kW / 0.94 = 15.95 kW.
    3. **Conclusion & Interpretation:**
       **Result: 15.95 kW peak draw (Power-Bound).** Synchronous compute spikes push the actual wall draw beyond the 15 kW PDU limit, tripping the breaker.
