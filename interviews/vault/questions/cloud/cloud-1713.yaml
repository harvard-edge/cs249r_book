title: Diagnosing PDU Trips in High-Density GPU Racks
scenario: You are deploying an 8-GPU H100 node (10.2 kW max peak draw) alongside four 2U CPU-only data
  loading servers (1.2 kW max peak each) into a standard 42U rack equipped with a 15 kW Top-of-Rack (ToR)
  PDU. The equipment occupies only 16U of physical space. You verify that the average power draw during
  a standard workload sits at around 9 kW. However, during a distributed mixed-precision training run
  of a 70B parameter LLM, the ToR PDU frequently trips, taking down the entire rack. Analyze the root
  cause of this failure and explain why the power density ceiling was breached.
question: "Why does the 15kW ToR PDU trip despite only 16U used and 9kW average draw?"
details:
  realistic_solution: Modern AI clusters are constrained by the Power Density Ceiling, not physical space.
    Synchronous operations (like AllReduce) cause all GPUs to hit their peak TDP simultaneously. Calculating
    peak power (10.2kW + 4.8kW = 15.0kW) shows the rack IT load is exactly at the limit. Accounting for
    PSU inefficiency (~94%), the actual draw exceeds the 15kW PDU capacity. The solution is to intentionally
    strand physical space (leaving racks half-empty) to respect power limits or deploy liquid-cooled high-density
    racks (e.g., 50+ kW).
  common_mistake: Candidates often assume physical volume (rack U-space) is the primary constraint and
    rely on average power draw, failing to account for the synchronized, instantaneous power spikes caused
    by ML workloads and power supply inefficiencies.
  napkin_math: 8x H100 GPUs @ 700W = 5.6 kW. Base system overhead (CPUs, RAM, NVSwitch, NICs, Fans) =
    4.6 kW. Total GPU Node = 10.2 kW peak. 4x CPU nodes @ 1.2 kW = 4.8 kW. Peak IT Load = 10.2 + 4.8 =
    15.0 kW. With a typical 94% PSU efficiency, Wall Power from PDU = 15.0 kW / 0.94 = 15.95 kW. 15.95
    kW > 15.0 kW PDU limit, causing the breaker to trip during synchronous compute spikes.
