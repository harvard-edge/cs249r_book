title: NAS Search Space and Cost
scenario: 'A colleague proposes using NAS to find the optimal model architecture for your edge deployment.'
question: 'Why does NAS search-space design matter more than the search algorithm, and why is NAS so computationally expensive?'
details:
  realistic_solution: 'NAS automates architecture design by searching over a defined operation space. The search space defines what architectures are possible: which operations (convolutions, attention, pooling), which connections (skip connections, dense connections), and which hyperparameters (width, depth, kernel size). Search space design matters most because: (1) too broad a space is computationally intractable (10^18 possible architectures), (2) too narrow misses good designs, (3) the space implicitly encodes your priors about what works. NAS is expensive because evaluating each candidate requires training it (or a proxy) to estimate performance. Early NAS methods (Zoph & Le, 2017) used 800 GPUs for 28 days. Modern approaches reduce cost through weight sharing (supernet training), performance predictors, and hardware-aware constraints that prune the space. But even efficient NAS costs 100-1000x more than training a single model.'
  common_mistake: |
    **The Pitfall:** Focusing heavily on the search algorithm (RL, evolutionary) while using an overly broad search space.
    **The Rationale:** Candidates assume a smart algorithm can efficiently navigate any space, ignoring that a bad search space is computationally intractable and lacks implicit priors.
    **The Consequence:** Millions of wasted GPU hours searching an intractable space without finding a better architecture.
  napkin_math: |
    * Naive NAS: evaluate 10,000 architectures × 10 GPU-hours each = 100,000 GPU-hours.
    * Weight-sharing NAS: train 1 supernet in ~1,000 GPU-hours + search in ~10 GPU-hours.
    * **Weight-sharing reduces the computational cost by ~100x compared to naive search.**
