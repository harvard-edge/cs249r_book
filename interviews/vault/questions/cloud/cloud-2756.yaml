title: NAS Search Space and Cost
scenario: A colleague proposes using NAS to find the optimal model architecture for your edge deployment.
  Explain why the search space design is more important than the search algorithm and what makes NAS computationally
  expensive.
question: "Why does NAS search-space design matter more than the search algorithm, and why is NAS so expensive?"
details:
  realistic_solution: 'NAS automates architecture design by searching over a defined operation space.
    The search space defines what architectures are possible: which operations (convolutions, attention,
    pooling), which connections (skip connections, dense connections), and which hyperparameters (width,
    depth, kernel size). Search space design matters most because: (1) too broad a space is computationally
    intractable (10^18 possible architectures), (2) too narrow misses good designs, (3) the space implicitly
    encodes your priors about what works. NAS is expensive because evaluating each candidate requires
    training it (or a proxy) to estimate performance. Early NAS methods (Zoph & Le, 2017) used 800 GPUs
    for 28 days. Modern approaches reduce cost through weight sharing (supernet training), performance
    predictors, and hardware-aware constraints that prune the space. But even efficient NAS costs 100-1000x
    more than training a single model.'
  common_mistake: Focusing on the search algorithm (reinforcement learning, evolutionary, etc.) while
    using an overly broad search space. A well-designed search space with a simple algorithm beats a clever
    algorithm on a bad search space.
  napkin_math: 'Naive NAS: evaluate 10K architectures × 10 GPU-hours each = 100K GPU-hours. Weight-sharing
    NAS: train 1 supernet in ~1000 GPU-hours + search in ~10 GPU-hours. 100x cheaper.'
