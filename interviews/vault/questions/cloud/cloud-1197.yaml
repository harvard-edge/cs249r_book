title: Evaluating ELT Architecture for ML Feature Agility
scenario: 'Your team ingests 50TB of raw telemetry data daily. Currently, an ETL pipeline uses a 100-node Spark cluster (m5.4xlarge) to pre-process and structure this data, dropping 60% of raw fields to save downstream storage. ML engineers frequently request historical access to dropped fields for new feature engineering, requiring expensive 6-month data backfills.'
question: 'Should you transition to ELT for 50TB/day raw telemetry, and what cost/flexibility trade-offs drive the decision?'
details:
  realistic_solution: 'Implement ELT by dumping raw data into S3 using a compressed format and using a distributed query engine (e.g., Databricks SQL, Athena) to transform data into features on-demand. This decouples storage from compute and enables immediate historical experimentation.'
  common_mistake: |
    **The Pitfall:** Assuming that ELT is strictly more expensive due to retaining 100% of raw data indefinitely.
    **The Rationale:** Candidates hyper-focus on the ballooning S3 storage costs without calculating the massive compute savings.
    **The Consequence:** Clinging to an inflexible ETL pipeline, ignoring the massive compute savings from removing always-on ETL clusters and the elimination of expensive backfill engineering cycles.
  napkin_math: |
    - **Current ETL Compute:** 100 nodes × $0.768/hr × 24h = $1,843/day (~$55k/mo).
    - **S3 Storage (50TB/day):** 50 TB × $23/TB/mo = $1,150/mo.
    - **Raw Data Retention (6 months):** 9 PB of data = ~$200k/mo.
    - **Engineering Backfill Cost:** ~$15k/mo in wasted engineering time.
    - **Result: While ELT storage costs rise, it eliminates $55k/mo in constant ETL compute and unlocks 100% experimentation flexibility.**
