title: Streaming LLM TBT Spikes
scenario: You are deploying a real-time voice assistant backend using Llama-3-8B (FP16, ~16GB weights) on a single GPU (24GB VRAM) for streaming token generation. The SLA requires Time-Between-Tokens (TBT) < 50ms. At 20 concurrent streams, TBT is 30ms. However, at 40 concurrent streams, P99 TBT suddenly spikes to over 200ms, and GPU compute utilization drops below 30%. The server uses static, contiguous memory allocation for the KV cache per request, assuming a maximum sequence length of 2048 tokens.
question: Why does P99 TBT spike at 40 streams on the 24GB instance, and what serving memory strategy fixes it?
details:
  realistic_solution: VRAM exhaustion causes requests to swap to host RAM via PCIe. Switch to PagedAttention to dynamically allocate memory in small blocks only as tokens are generated.
  common_mistake: |
    **The Pitfall:** Assuming the GPU lacks compute FLOPs or tuning the dynamic batching timeout.
    **The Rationale:** Spikes in TBT and dropped utilization look like classic compute scheduling issues.
    **The Consequence:** Missing the memory capacity wall and failing to fix the PCIe swapping caused by static allocation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Weights: 16 GB.
       - Cache per stream (2048 tokens): 268 MB.
    2. **Calculations:**
       - Cache for 40 streams: 40 * 268 MB = 10.7 GB.
       - Total Memory needed: 16 + 10.7 = 26.7 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. 26.7 GB exceeds the 24 GB VRAM limit, causing PCIe swapping.**
