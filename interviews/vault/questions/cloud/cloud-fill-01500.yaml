title: Optimizing Active Learning Dataset Curation on NVIDIA H100s
scenario: Your team is tasked with rapidly curating a large-scale dataset for an autonomous driving perception
  model. You've adopted an active learning approach, where a model identifies the most 'uncertain' samples
  from an unlabeled pool for human annotation. This pipeline is deployed on a cloud infrastructure utilizing
  NVIDIA H100 GPUs (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W TDP) for the model
  inference step. Your initial unlabeled dataset consists of 10 million images. The active learning model
  running on a single H100 can process 500 images per second to determine uncertainty scores. You have
  a pool of 100 annotators, each working 8 hours a day. An average image annotation takes 30 seconds.
  To ensure data quality, you've set an inter-annotator agreement (IAA) target, which typically results
  in 20% of all annotated samples requiring a re-annotation or arbitration step, consuming an additional
  15 seconds per re-annotated image. You have allocated a maximum of 10 H100 GPUs for the active learning
  inference component. Your goal is to maximize the throughput of effectively labeled images while maintaining
  the quality targets.
question: "With 10 H100s, 100 annotators, and 20% re-annotation, where is the bottleneck and how would you maximize labeled-image throughput?"
details:
  realistic_solution: 'A realistic solution would involve a two-pronged approach: optimizing the annotation
    workflow and balancing computational resources. For annotation, establish clear guidelines, continuous
    annotator training, and a robust arbitration system to reduce the re-annotation rate. Implement smart
    batching for active learning samples to ensure annotators always have a fresh queue. For computational
    resources, analyze the actual inference throughput needed versus available GPU capacity. If human
    annotation is the bottleneck, scale annotators or optimize their efficiency. If GPU inference becomes
    a bottleneck (unlikely in this scenario given H100 specs and annotator speed, but possible with more
    complex models or much faster annotators), ensure efficient utilization of the H100s, possibly by
    fine-tuning the active learning model for faster inference or parallelizing across GPUs.'
  common_mistake: Candidates often neglect the cumulative cost of re-annotation/arbitration on overall
    throughput or fail to consider the balance between GPU inference capacity and human annotation speed.
    They might also overlook the potential for active learning strategies to introduce selection bias
    into the dataset if not carefully managed.
  napkin_math: "To calculate the *effective* daily annotation throughput, considering re-annotation: \n\
    \n1. **Total Annotator Workload Capacity (seconds/day):** \n   100 annotators * 8 hours/day * 3600\
    \ seconds/hour = 2,880,000 seconds/day\n\n2. **Average Time per Effectively Labeled Image (seconds):**\
    \ \n   Base Annotation Time + (Re-annotation Rate * Re-annotation Time) \n   30 seconds + (0.20 *\
    \ 15 seconds) = 30 + 3 = 33 seconds/image\n\n3. **Effective Daily Annotation Throughput (images/day):**\
    \ \n   Total Annotator Workload Capacity / Average Time per Effectively Labeled Image \n   2,880,000\
    \ seconds/day / 33 seconds/image ≈ 87,272 images/day\n\n4. **GPU Inference Capacity (images/day):**\n\
    \   10 H100 GPUs * 500 images/second/H100 * 8 hours/day * 3600 seconds/hour = 144,000,000 images/day\n\
    \nSince the effective human annotation throughput (≈ 87,272 images/day) is significantly lower than\
    \ the GPU inference capacity, the human annotation process is the primary bottleneck. The H100s have\
    \ ample capacity to keep the annotators supplied with samples."
