title: The Bad Batch Spike
scenario: 'You are fine-tuning a 7B model. At step 12,400 the loss suddenly spikes from 1.8 to 4.5, then recovers. This happens exactly at step 12,400 every time you restart from the checkpoint.'
question: 'What causes the loss spike, and how do you prove it?'
details:
  realistic_solution: 'Deterministic reproduction means the fixed-seed data loader served a pathological sample at step 12,400. Log batch indices, extract samples, compute per-sample loss. Fix by implementing per-sample gradient or loss clipping.'
  common_mistake: |
    **The Pitfall:** Dismissing it as stochastic noise or blaming the learning rate.
    **The Rationale:** Candidates jump to hyperparameter tuning without considering the deterministic restart behavior.
    **The Consequence:** Wasting time tweaking learning rates when the issue is a corrupted sample dominating the gradient.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 samples, 512 tokens. Normal loss = 1.8. Spike = 4.5.
    
    **Calculations:**
    - Normal Batch Loss: 32 * 512 * 1.8 = 29,491 nats.
    - Spike Batch Loss: 32 * 512 * 4.5 = 73,728 nats.
    - 1 Bad Sample Contribution: 73,728 - (31 * 512 * 1.8) = 45,158 nats.
    - Per-Token Bad Loss: 45,158 / 512 = 88.2 nats/token.
    
    **Conclusion & Interpretation:**
    - **Result: 88.2 loss per token on the bad sample (Data-Bound)**. Corresponds to near-zero probability, proving severe corruption.
