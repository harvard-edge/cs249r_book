title: The Bad Batch Spike
scenario: You're fine-tuning a 7B model on 8 A100 GPUs. At step 12,400 the training loss suddenly spikes
  from 1.8 to 45.0, then gradually recovers over the next 200 steps. The spike happens at the exact same
  step every time you restart from the same checkpoint. What's in that batch, and how do you prove it?
details:
  realistic_solution: 'The deterministic reproduction at step 12,400 means the data loader, with its fixed
    seed, serves a specific mini-batch at that step that contains pathological examples. Common culprits:
    (1) a corrupted sample with extremely long repetitive sequences that cause attention to produce near-uniform
    distributions, generating huge gradients in the softmax backward pass; (2) a mislabeled example where
    the target is nonsensical (e.g., a truncated UTF-8 sequence decoded as garbage tokens), producing
    a cross-entropy loss orders of magnitude above normal; (3) a duplicate of the prompt as the target,
    causing the model to receive contradictory supervision. Proof: log the batch indices at step 12,400,
    extract those samples, compute per-sample loss — the pathological sample will have loss >100× the
    batch mean. Fix: implement per-sample gradient clipping or loss clipping that caps individual sample
    contributions, and add a data quality filter that removes samples with anomalous token distributions.'
  common_mistake: '"The learning rate is too high — reduce it" or "This is normal training noise." The
    reproducibility at the exact same step rules out stochastic noise, and the spike magnitude (25×) is
    far beyond normal gradient variance.'
  napkin_math: 'Normal per-sample cross-entropy loss ≈ 1.8 nats (averaged over tokens). A garbage-target
    sample where the model assigns ~0.001 probability to each target token: per-token loss = $-\ln(0.001)
    = 6.9$ nats. With standard PyTorch `CrossEntropyLoss(reduction=''mean'')`, loss is averaged over all
    tokens across the batch. Batch: 32 samples × 512 tokens = 16,384 tokens total. Good tokens: 31 × 512
    = 15,872 tokens at 1.8 nats each. Bad tokens: 512 tokens at 6.9 nats each. Batch mean = $(15,872 \times
    1.8 + 512 \times 6.9) / 16,384 = (28,570 + 3,533) / 16,384 ≈ $ **1.96 nats** — barely noticeable.
    To produce a spike to 45.0, the loss must use `reduction=''sum''` or the sample is far more pathological:
    e.g., a truncated sequence decoded as out-of-vocabulary garbage where the model assigns ~$e^{-45}$
    probability per token, producing per-token loss of ~45 nats. With per-sample sum reported as batch
    loss: one sample with 512 × 45 = 23,040 nats dominates the batch sum. The gradient norm from this
    sample is ~$45/1.8 = 25\times$ normal per-token, and concentrated in the embedding/output layers for
    the garbage tokens. Without per-sample gradient clipping, this single sample''s gradient dominates
    the entire update, pushing all 7B parameters in a nonsensical direction. Recovery takes ~200 steps
    because the learning rate is small enough that 200 normal updates gradually undo the damage.'
