title: Parquet vs TFRecord for Training Throughput
scenario: Your team must choose between Parquet and TFRecord for storing a 5 TB image classification dataset (10M images, 500 KB average). Training runs on 8× A100 GPUs. The data pipeline must sustain 10 GB/s aggregate read throughput to avoid GPU starvation.
question: Which format, Parquet or TFRecord, should you use for the 5 TB image dataset to sustain 10 GB/s on 8× A100s, and why?
details:
  realistic_solution: 'TFRecord wins for this workload. Parquet''s columnar layout means reading a full image record requires seeking across column chunks — for wide binary blobs (images), this creates random I/O. TFRecord stores records sequentially as length-prefixed protobufs, enabling pure sequential reads. The real differentiator is the I/O pattern: TFRecord files are pre-sharded enabling embarrassingly parallel reads across 8 GPUs. Parquet supports predicate pushdown and column pruning — irrelevant for image training where you read every pixel.'
  common_mistake: |
    **The Pitfall:** Choosing Parquet because it's 'industry standard'.
    **The Rationale:** Parquet is columnar and excels at analytical queries (SELECT columns, filter rows), but training reads entire records sequentially.
    **The Consequence:** Column reassembly overhead drastically reduces I/O throughput for wide binary blobs (images).
  napkin_math: |
    - 1. **TFRecord:** Sequential read on 2 NVMe SSDs (7 GB/s each) = 14 GB/s > 10 GB/s target.
    - 2. **Parquet:** Full-record read of a binary blob incurs ~30% penalty due to column reassembly overhead, yielding ~5 GB/s.
    - 3. **Result:** **TFRecord supports pure sequential reads and sustains the 10 GB/s target easily**.
