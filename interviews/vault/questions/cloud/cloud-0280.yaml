title: The INT8 Energy Dividend
scenario: During a model optimization review, your team is considering quantizing parts of a large model
  from 32-bit floating point (FP32) to 8-bit integer (INT8) for inference. To a first-order approximation,
  identify the energy consumption ratio between a single FP32 operation and a single INT8 operation.
question: "What is the approximate energy consumption ratio between a single FP32 operation and a single INT8 operation?"
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    This is a fundamental physical invariant of digital logic. The energy consumed by CMOS circuits is
    dominated by the dynamic power from switching transistors, and reducing the bit width from 32 to 8
    dramatically reduces the number of switching events required for an arithmetic operation like multiplication.
  common_mistake: Engineers often mistakenly assume energy savings scale linearly with bit-width (i.e.,
    32 bits / 8 bits = 4×). The actual savings are much greater because the energy cost of digital multipliers
    doesn't scale linearly. Another common error is to confuse the FP32-to-INT8 savings with the smaller
    FP32-to-FP16 savings (~3.4x).
  napkin_math: '1. Digital logic energy scales with the complexity of the operation and switching transistors.

    2. A single FP32 addition/multiplication involves aligning exponents and processing 32 bits, costing
    ~1.8 pJ of energy.

    3. An INT8 operation is simple integer math and costs only ~0.1 pJ.

    4. 1.8 pJ / 0.1 pJ = 18x.

    Quantizing to INT8 reduces the energy per compute operation by a factor of ~18!'
  options:
  - An FP32 op consumes ~4× more energy than INT8
  - An FP32 op consumes ~3.4× more energy than INT8
  - An FP32 op consumes ~18× more energy than INT8
  - An FP32 op consumes ~580× more energy than INT8
  correct_index: 2
