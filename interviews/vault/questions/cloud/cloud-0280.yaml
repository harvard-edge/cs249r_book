title: The INT8 Energy Dividend
scenario: During a model optimization review, your team is considering quantizing parts of a large model from 32-bit floating point (FP32) to 8-bit integer (INT8) for inference. To a first-order approximation, identify the energy consumption ratio between a single FP32 operation and a single INT8 operation.
question: "What is the approximate energy consumption ratio between a single FP32 operation and a single INT8 operation?"
details:
  realistic_solution: 'An FP32 operation consumes approximately 18 times more energy than an INT8 operation. This is a fundamental physical invariant of digital logic. The energy consumed by CMOS circuits is dominated by the dynamic power from switching transistors, and reducing the bit width from 32 to 8 dramatically reduces the number of switching events required for an arithmetic operation like multiplication.'
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width (i.e., 32 bits / 8 bits = 4x).
    **The Rationale:** Engineers incorrectly extrapolate data storage ratios to ALU power consumption, ignoring the non-linear complexity of floating-point exponent alignment.
    **The Consequence:** Severely underestimating the power efficiency of quantized edge deployments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Comparison between FP32 and INT8 arithmetic operations (MACs).
    2. **Calculations:**
       - Single FP32 addition/multiplication costs ~1.8 pJ of energy.
       - Single INT8 operation costs ~0.1 pJ of energy.
       - Ratio = 1.8 pJ / 0.1 pJ = 18x.
    3. **Conclusion & Interpretation:**
       - **Result: An FP32 operation consumes ~18x more energy than INT8.** (Power-Bound Hardware Physics).
  options:
  - An FP32 op consumes ~4x more energy than INT8
  - An FP32 op consumes ~3.4x more energy than INT8
  - An FP32 op consumes ~18x more energy than INT8
  - An FP32 op consumes ~580x more energy than INT8
