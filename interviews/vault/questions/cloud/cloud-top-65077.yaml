title: 'Feature Freshness vs Serving Latency: Pre-Compute vs Real-Time'
scenario: A recommendation system uses 200 features per (user, item) pair. 50 features change in real-time
  (e.g., current session behavior). 150 features change hourly (e.g., item popularity). Evaluate pre-computing
  all features vs computing in real-time for latency and freshness.
details:
  realistic_solution: 'Tiered feature architecture: (1) Static features (pre-computed, refreshed daily):
    user demographics, item metadata, historical statistics. Store in Redis/RocksDB. Latency: 0.5ms lookup.
    (2) Hourly features (pre-computed, refreshed hourly): item popularity counts, user preference histograms,
    collaborative filtering embeddings. Store in Redis. Staleness: 0-60 minutes. Acceptable for popularity
    signals. (3) Real-time features (computed at serving time): current session behavior (last 5 clicked
    items), real-time inventory status, time-of-day. Compute from streaming pipeline output (Kafka consumer
    reading session events). Latency: 1-2ms to query session store. (4) Near-real-time features (micro-batch,
    refreshed every 1 minute): aggregate session signals (click rate in last 10 minutes). Pre-computed
    by a Flink streaming job, served from feature store with 1-minute staleness. Total feature fetch latency:
    0.5ms static + 0.5ms hourly + 1.5ms real-time = 2.5ms. Without pre-computation (all real-time): 8-12ms.
    Pre-computing saves 5-10ms of the 100ms budget.'
  common_mistake: Treating all 200 features as equally time-sensitive and either pre-computing everything
    (staleness for real-time features) or computing everything at serving time (unnecessary latency for
    slow-changing features). Feature freshness requirements are highly heterogeneous.
  napkin_math: 'Feature lookup time breakdown: Redis GET for 150 hourly features (batched): 1 network
    RTT + 150 hash lookups = 1ms. Session store GET for 50 real-time features: streaming consumer maintains
    in-memory session cache (HashMap): 0.1ms. Feature encoding to float tensor: 200 features * 4B = 800B
    + one-hot encoding. Total: 2ms. Without pre-computation (compute all 200 features from raw logs):
    stream join across 5 Kafka topics, 10ms P50, 50ms P99. Pre-computation clearly wins for hourly+ features.'
