title: Data-Parallel Replica Count vs Wall-Clock Tradeoff
scenario: A 13B model is being trained data-parallel on a 256-H100 cluster connected by IB NDR. The team can choose any DP world size N from {32, 64, 128, 256}. Per-step compute = 600 ms / N up to N=256. Per-step DP gradient AllReduce on a flat ring = 2*(N-1)/N * 26 GB / 25 GB/s.
question: "For 13B DP training on 32-256 H100s with 600 ms / N compute and a 26 GB BF16 gradient on a 25 GB/s ring, which N minimizes per-step wall clock?"
details:
  realistic_solution: 'Both are partially right, but the VP of ML is more right at the margin. This is the classic utilization-delay tradeoff from queueing theory. When a system operates above ~80% utilization, queueing delays grow non-linearly.'
  common_mistake: |
    **The Pitfall:** Siding entirely with one extreme utilization metric.
    **The Rationale:** Candidates fail to recognize that the cluster operates in a non-linear queueing delay zone.
    **The Consequence:** Maximizing raw utilization causes extreme job queue delays, fundamentally breaking the ML development cycle.
  napkin_math: |
    1. M/M/1 queueing at 95% utilization: mean wait = service_time * 0.95 / (1 - 0.95) = 19× service_time.
    2. A 2-hour training job waits 38 hours in queue.
    3. At 80% utilization: wait = 4× = 8 hours. At 70%: wait = 2.33× = 4.66 hours.
    4. Reducing utilization from 95% to 80% cuts wait from 38h to 8h (nearly 5x improvement) while losing only 15% capacity.
    5. **Engineer cost ($150/hr × 30hr saved = $4,500/experiment) vastly outweighs the GPU cost of 15% idle ($7,200/day) at just ~1.6 experiments/day.**
