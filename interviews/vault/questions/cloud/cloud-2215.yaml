title: Data-Parallel Replica Count vs Wall-Clock Tradeoff
scenario: A 13B model is being trained data-parallel on a 256-H100 cluster connected
  by IB NDR (effective unidirectional ~25 GB/s). The team can choose any DP world
  size N from {32, 64, 128, 256}. Per-step compute = 600 ms / N up to N=256 (linear
  strong scaling on the compute side). Per-step DP gradient AllReduce on a flat ring
  = 2*(N-1)/N * 26 GB / 25 GB/s. Choose the N that minimizes wall-clock per global
  epoch and explain why pushing past the optimum *increases* total time despite linearly
  more compute.
question: For 13B DP training on 32-256 H100s with 600 ms / N compute and a 26 GB
  BF16 gradient on a 25 GB/s ring, which N minimizes per-step wall clock?
details:
  realistic_solution: 'Both are partially right, but the VP of ML is more right at
    the margin. This is the classic utilization-delay tradeoff from queueing theory.
    When a system operates above ~80% utilization, queueing delays grow non-linearly
    (M/M/1: $W = \frac{1}{\mu(1-\rho)}$). At 95% utilization, average wait time is
    19x the service time. The correct metric is not utilization alone but *goodput*
    — useful work completed per unit time. High utilization with long queue times
    means engineers wait days for experiments, slowing the entire ML development cycle.
    The resolution: implement priority tiers. Reserve 70-80% capacity for guaranteed-SLA
    jobs (fast queue), use the remaining 20-30% as a buffer that absorbs burst demand,
    and fill true idle gaps with best-effort/preemptible jobs.'
  common_mistake: Siding entirely with one VP. High utilization IS efficient from
    an infrastructure cost perspective. But utilization is not the right metric for
    ML productivity. The cluster is in the queueing theory 'hockey stick' zone.
  napkin_math: 'M/M/1 queueing at 95% utilization: mean wait = service_time / (1 -
    0.95) = 20× service_time. A 2-hour training job waits ~40 hours in queue. At 80%
    utilization: wait = 5× = 10 hours. At 70%: wait = 3.3× = 6.6 hours. Reducing utilization
    from 95% to 80% cuts average wait from 40hr to 10hr (4x improvement) while losing
    only 15% capacity. Engineer cost: $150/hr × 30hr saved = $4,500/experiment. GPU
    cost of 15% idle: 1000 GPUs × 15% × $2/hr × 24hr = $7,200/day. Break-even: ~1.6
    experiments saved per day.'
