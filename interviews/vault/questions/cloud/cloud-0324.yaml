title: The Roofline Litmus Test (cloud-0324)
scenario: You are analyzing a model with an arithmetic intensity of 50 Ops/Byte on hardware with a 'ridge point' of 295 Ops/Byte.
question: "If your model has an arithmetic intensity of 50 Ops/Byte, is its performance primarily limited by the GPU's memory bandwidth or its computational throughput?"
details:
  realistic_solution: The model is memory-bound. If a workload's arithmetic intensity is lower than the ridge point, it performs relatively few operations for each byte of data it reads from memory, making memory bandwidth the bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming high TFLOPS GPUs are always compute-bound.
    **The Rationale:** Engineers focus purely on peak compute specs and ignore arithmetic intensity and data reuse.
    **The Consequence:** Inefficient software optimization efforts focused on compute kernels rather than memory access patterns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model AI = 50 Ops/Byte.
       - Hardware Ridge Point = 295 Ops/Byte.
    2. **Calculations:**
       - 50 Ops/Byte < 295 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.**
  options:
  - Compute-bound, because the GPU has almost a PetaFLOP of compute.
  - Memory-bound, because the model's arithmetic intensity is lower than the hardware's ridge point.
  - Compute-bound, because a low arithmetic intensity means the GPU has to work harder.
  - It's impossible to tell without knowing the specific model architecture.
  correct_index: 1
