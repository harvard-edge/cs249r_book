title: Cluster MTBF from ECC Uncorrectable Errors
scenario: Your 4,096-GPU training cluster experiences sporadic node crashes. Memory profiling shows each
  GPU sustains 500 GB/s of HBM reads on average. The HBM modules use SEC-DED ECC with an uncorrectable
  bit error rate (UBER) of 10^-21 errors per bit read. Calculate the cluster's Mean Time Between Failures
  (MTBF) due to uncorrectable memory errors, and determine if a 4-hour checkpoint interval provides acceptable
  training efficiency.
details:
  realistic_solution: Calculate total cluster read bandwidth in bits/second across all 4,096 GPUs, multiply
    by the UBER to get total errors/second, and invert to find MTBF. A 4-hour checkpoint interval is mathematically
    sound since the MTBF is approximately 17 hours.
  common_mistake: Calculating the error rate for a single GPU or failing to convert Bytes to bits, which
    drastically overestimates the MTBF and leads to under-provisioning checkpoint frequency.
  napkin_math: 'Total BW = 4096 GPUs * 500 GB/s ≈ 2.05 * 10^15 Bytes/s ≈ 1.64 * 10^16 bits/s.

    Error Rate = 1.64 * 10^16 bits/s * 10^-21 errors/bit = 1.64 * 10^-5 errors/s.

    MTBF = 1 / (1.64 * 10^-5) ≈ 61,000 seconds ≈ 17 hours.

    With MTBF ~17 hours, checkpointing every 4 hours limits lost work to <25% of the MTBF window.'
