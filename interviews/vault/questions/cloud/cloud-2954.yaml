title: 'Dataset Curation: Design a Multi-Stage Quality Pipeline for LLM Pre-Training'
scenario: You are building a data curation pipeline for an LLM pre-training run on a massive GPU cluster. You have 50 TB of raw Common Crawl data.
question: How would you design a multi-stage pipeline to filter 50 TB of raw Common Crawl into about 5 TB of high-quality tokens within 48 hours?
details:
  realistic_solution: 'Design a sequential cascade of increasingly expensive filters. Stage 1: Fast heuristic language ID (fastText on CPUs) to discard non-English. Stage 2: Cheap heuristic filters (length, rule-based text quality). Stage 3: MinHash deduplication (Spark/Ray on CPUs). Stage 4: Expensive quality classifier (small BERT model on GPU workers). Parallelize heavily across the cluster.'
  common_mistake: |
    **The Pitfall:** Running a heavy neural classifier directly on the raw 50TB dataset.
    **The Rationale:** Candidates assume ML models are the only valid way to filter data, ignoring the massive computational cost of running BERT over 50TB of text.
    **The Consequence:** The pipeline takes weeks or months to complete, completely blowing past the 48-hour SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Initial data: 50 TB (~12.5T tokens at 4 bytes/token).
       - Target: ~5 TB in 48 hours.
    2. **Calculations:**
       - Stage 1 (Fast Language ID): Keeps 40% -> 5T tokens.
       - Stage 2 (Cheap Heuristics): Keeps 70% -> 3.5T tokens.
       - Stage 3 (MinHash Deduplication): Keeps 75% -> 2.6T tokens.
       - Stage 4 (GPU BERT Quality Classifier): Keeps 80% -> 2.1T tokens.
       - Final Size: 2.1T tokens * ~2.5 bytes/token (tokenized) = ~5.25 TB.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. A multi-stage pipeline is mandatory so the heavy GPU classifier only processes the final ~20% of tokens.**
