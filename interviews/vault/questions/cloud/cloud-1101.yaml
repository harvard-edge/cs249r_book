title: Evaluating WS vs OS Dataflows for LLM Inference
scenario: 'You are designing the compiler mapping for a cloud AI accelerator featuring a 256x256 systolic
  array and 16MB of on-chip SRAM. You must map an 8192x8192 linear projection layer (FP16) and choose
  between a Weight-Stationary (WS) and Output-Stationary (OS) dataflow. Evaluate the optimal dataflow
  choice and HBM bandwidth requirements for two distinct scenarios: the LLM pre-fill phase (batch size
  = 1024 tokens) versus the auto-regressive decoding phase (batch size = 1 token). Assume weights and
  activations are stored in off-chip HBM.'
details:
  realistic_solution: 'For prefill (batch=1024), Weight-Stationary is optimal because weights loaded into
    SRAM/array are reused 1024 times across the input sequence, amortizing the 128MB HBM read. For decoding
    (batch=1), Output-Stationary is optimal: the tiny 16KB input and 16KB output fit in SRAM while the
    128MB weight matrix streams through, requiring exactly one HBM pass. Using WS for decoding would wastefully
    pin 128MB of weights for a single vector multiply.'
  common_mistake: Failing to distinguish between matrix-matrix (prefill) and matrix-vector (decoding)
    arithmetic intensities. Candidates often reflexively choose Weight-Stationary for all phases, not
    realizing it provides zero reuse benefit at batch=1.
  napkin_math: 'Weights: 8192 * 8192 * 2 bytes = 128 MB (exceeds 16MB SRAM). Decoding (Batch=1): Inputs
    = 1 * 8192 * 2B = 16 KB. Outputs = 16 KB. Using OS dataflow, HBM traffic is exactly 128 MB (read weights
    once). Pre-fill (Batch=1024): Inputs = 1024 * 8192 * 2B = 16.7 MB. Using WS dataflow with tiling maximizes
    weight reuse, amortizing the 128 MB HBM read across 1024 multiply-accumulates per weight.'
