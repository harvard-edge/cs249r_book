title: Implementing double backward for meta-learning with MAML on H100
scenario: You implement Model-Agnostic Meta-Learning (MAML) on H100. MAML requires differentiating through
  the inner loop optimization steps — computing second-order gradients (gradients of gradients). Your
  implementation using loss.backward(create_graph=True) is 8× slower than expected and uses 40GB for a
  50M parameter model with 5 inner steps.
details:
  realistic_solution: Use torch.autograd.grad() with create_graph=True to compute inner loop gradients,
    then update parameters using functional forms (higher library or manual parameter dictionary) rather
    than in-place updates (which break the graph). Consider first-order MAML (FOMAML) that ignores second-order
    terms — often achieves 95% of MAML performance at 1/5 the cost. Or use implicit differentiation (iMAML)
    which avoids unrolling the inner loop entirely.
  common_mistake: Storing the full computational graph for all 5 inner loop steps with retain_graph=True,
    keeping 5× the normal activation memory. Also using high-order finite differences instead of exact
    second-order gradients, which is both inaccurate and more expensive.
  napkin_math: 'MAML memory cost: 5 inner steps × activation memory per step × 2 (for create_graph). 50M
    param model, batch=32: activations ≈ 4GB/step. MAML: 5 steps × 4GB × 2 = 40GB (matches observed).
    FOMAML: 1 step stored = 4GB. iMAML: O(1) steps stored via conjugate gradient = <1GB. Choose based
    on task sensitivity to second-order terms.'
