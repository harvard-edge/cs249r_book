title: Diagnosing CoT Test-Time Scaling Bottlenecks
scenario: Your inference cluster serves a reasoning-heavy 70B model on 8x 80GB GPUs. To implement 'Test-Time Compute Scaling', you prompt the model to generate extensive Chain-of-Thought (CoT) scratchpads (up to 8,000 reasoning tokens). During load testing, GPU SM utilization collapses to < 30%, P99 latency skyrockets, and the cluster throws Out-Of-Memory (OOM) errors, despite input prompts being very short.
question: Why do 8,000-token CoT scratchpads cause low SM utilization and OOMs, and how would you control KV-cache pressure?
details:
  realistic_solution: Implement KV Cache Quantization (e.g., FP8) to halve the memory footprint per token, and use PagedAttention with host-memory swapping to handle memory pressure. Additionally, enforce a strict upper bound on CoT tokens per request to guarantee a minimum viable batch size that can saturate the GPU compute.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a compute bottleneck because the model is "thinking longer".
    **The Rationale:** Candidates often suggest faster GPUs or more Tensor Parallelism, failing to realize that massive KV cache accumulation forces tiny batch sizes and destroys compute utilization.
    **The Consequence:** Over-provisioning compute hardware without resolving the fundamental memory bandwidth and capacity issues.
  napkin_math: |
    1. A 70B model requires ~2.5MB of KV cache per token in FP16.
    2. An 8,000 token CoT generation consumes 2.5MB * 8,000 = 20GB of KV cache per request.
    3. On an 8x80GB system (640GB total), if weights take 140GB, ~500GB is available.
    4. 500GB / 20GB = max batch size of 25.
    5. A batch size of 25 is too small to saturate the compute capacity of 8x GPUs during decoding.
    **KV cache pressure exhausts memory, forcing inefficiently small batch sizes.**
