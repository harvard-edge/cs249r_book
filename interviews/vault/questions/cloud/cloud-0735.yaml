title: The ToR Switch Buffer Microburst
scenario: You are using RoCEv2 (RDMA over Ethernet) for a 64-GPU cluster. The network links are 100 Gbps. During the AllToAll phase of a Mixture of Experts (MoE) training step, the network throughput plummets, and PFC (Priority Flow Control) pause frames flood the network. The total data volume sent by any GPU is well under the 100 Gbps limit.
question: Why is the network freezing?
details:
  realistic_solution: 'This is a ToR switch microburst. During AllToAll, each GPU sends data to every other GPU simultaneously. The ToR switch buffer overflows instantly, triggering PFC pause frames that propagate backwards through the network. The fix: implement traffic shaping to spread transmissions over time, or use ECN with DCQCN.'
  common_mistake: |
    **The Pitfall:** Assuming the network bandwidth is saturated.
    **The Rationale:** A drop in throughput often correlates with hitting maximum bandwidth limits.
    **The Consequence:** Wasting time upgrading link speeds when the problem is instantaneous burst rates and buffer management, not sustained volume.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPUs: 64.
    - Network link: 100 Gbps.
    - ToR switch buffer: ~32 MB.
    - AllToAll phase: Each GPU sends to 63 others simultaneously.

    **Calculations:**
    - If each GPU sends a 1 MB chunk, the fan-in at a single switch port is 63 * 1 MB = 63 MB.
    - The 63 MB burst arrives in microseconds.

    **Conclusion & Interpretation:**
    - **Result: 63 MB Instant Fan-in (Buffer-Bound Microburst)**. The instantaneous burst exceeds the 32 MB switch buffer, instantly triggering a cascading network-wide pause.
