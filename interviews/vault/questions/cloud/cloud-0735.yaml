title: The ToR Switch Buffer Microburst
scenario: You are using RoCEv2 (RDMA over Ethernet) for a 64-GPU cluster. The network links are 100 Gbps. During the AllToAll phase of a Mixture of Experts (MoE) training step, the network throughput plummets, and PFC (Priority Flow Control) pause frames flood the network. The total data volume sent by any GPU is well under the 100 Gbps limit.
question: "Why is the network freezing?"
details:
  realistic_solution: 'This is a ToR switch microburst. During AllToAll, each GPU sends data to every other GPU simultaneously. With 64 GPUs, the fan-in at a single switch port can be 63 senders x 1MB = 63MB arriving in microseconds. The ToR switch buffer (typically 32MB) overflows instantly, triggering PFC pause frames that propagate backwards through the network, causing a cascading pause that freezes all traffic. The total data volume is under the sustained bandwidth limit, but the instantaneous burst rate exceeds the buffer capacity. The fix: implement traffic shaping to spread transmissions over time, or use ECN with DCQCN to throttle senders before buffers overflow.'
  common_mistake: |
    **The Pitfall:** Assuming the network bandwidth is saturated.
    **The Rationale:** A drop in throughput often correlates with hitting maximum bandwidth limits.
    **The Consequence:** Wasting time upgrading link speeds when the problem is instantaneous burst rates and buffer management, not sustained volume.
  napkin_math: |
    * 64 GPUs performing AllToAll; each GPU sends data to 63 others simultaneously.
    * If each GPU sends a 1 MB chunk, the fan-in at a single switch port is 63 senders × 1 MB = 63 MB.
    * The ToR switch buffer is typically 32 MB.
    * **The 63 MB burst arrives in microseconds, instantly overflowing the 32 MB buffer and triggering a cascading network-wide pause.**
