title: Asynchronous Checkpoint Storage Tiering
scenario: You are architecting the storage hierarchy for a 16,384 GPU cluster training a 1T parameter LLM. Requirements: (1) Dataloaders require 100 MB/s per GPU (1.6 TB/s total) of continuous read. (2) Fault tolerance dictates saving 16TB of optimizer state and weights every 15 minutes. (3) GPU pause time for checkpointing must be strictly < 100ms.
question: How would you architect storage and checkpoint data flow for the 16,384-GPU job to sustain 1.6TB/s reads and keep checkpoint pauses under 100ms?
details:
  realistic_solution: Implement a 3-tier locality-aware architecture isolating read and write paths. GPUs synchronously copy state to pinned host DRAM via PCIe (<100ms pause), then a background CPU daemon asynchronously flushes the checkpoint from DRAM to the remote parallel filesystem, spreading the 16TB write over 5 minutes.
  common_mistake: |
    **The Pitfall:** Writing checkpoints directly from GPU memory to a remote parallel filesystem synchronously.
    **The Rationale:** Synchronous remote writes stall the GPUs for seconds and cause network microbursts.
    **The Consequence:** GPUs sit idle waiting for slow storage, and network congestion disrupts continuous dataloading reads.
  napkin_math: |
    1. **Evaluate Dataloading Needs:** 16,384 GPUs × 100 MB/s = 1.6 TB/s total read bandwidth.
    2. **Calculate Sync Pause (DRAM tier):** 1 GB state per GPU / 64 GB/s (PCIe Gen5) ≈ 15.6ms pause time (under 100ms requirement).
    3. **Calculate Async Flush Bandwidth:** 16 TB / 300 seconds = 53.3 GB/s aggregate write to the parallel filesystem.
    **Final Result: Utilizing a 3-tier locality-aware architecture keeps the sync pause to ~15.6ms and requires only 53.3 GB/s of continuous remote write bandwidth.**
