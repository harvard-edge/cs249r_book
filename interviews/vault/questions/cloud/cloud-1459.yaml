title: Evaluating Fusion Strategies for Custom Layers
scenario: 'Your team is optimizing a custom Transformer layer on A100 GPUs (2039 GB/s HBM bandwidth).
  The layer includes a sequence of memory-bound operations: an element-wise activation, a custom normalization,
  and a masking step. Unfused, these operations process a 50MB tensor and take 150us. You must evaluate
  three options: (1) keep them as separate PyTorch operations, (2) write a hand-tuned CUDA kernel, or
  (3) use a JIT compiler like Triton. Justify your decision comparing memory traffic, execution latency,
  and engineering overhead.'
question: "Which option would you choose for the 50MB memory-bound operation chain, and how do memory traffic, latency, and engineering cost compare?"
details:
  realistic_solution: Use a JIT compiler like Triton (e.g., via torch.compile) to automatically fuse the
    three memory-bound operations. Unfused execution requires 300MB of HBM traffic (3 ops * 2 * 50MB),
    while fused execution requires only 100MB (1 read + 1 write of 50MB). At 2 TB/s HBM bandwidth, this
    reduces latency from 150us to 50us — a 3x speedup purely from bandwidth savings, with no custom CUDA
    required.
  common_mistake: Assuming custom CUDA is always required for optimal performance, ignoring the significant
    engineering debt. Modern JIT compilers like torch.compile can automatically fuse memory-bound operations
    and achieve near-optimal bandwidth utilization.
  napkin_math: 'Unfused: 3 operations require reading and writing the 50MB tensor (3 ops * 2 transfers
    * 50MB = 300MB total traffic). At 2 TB/s HBM bandwidth, bandwidth-limited time is 300MB / 2000GB/s
    = 150us. Fused: Read input once, write output once (2 transfers * 50MB = 100MB traffic). Bandwidth-limited
    time drops to 100MB / 2000GB/s = 50us. You achieve a 3x speedup purely from bandwidth savings.'
