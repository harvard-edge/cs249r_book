title: LoRA Adapter Memory Footprint
scenario: A cloud server runs a base 7B model dynamically swapping 10 fine-tuned LoRA
  adapters (500MB each) on a single A100 80GB.
question: Evaluate the memory overhead of the adapters against the KV cache assuming
  batch size 32, 2000 sequence length, 32 layers, and 4096 hidden dimension.
details:
  realistic_solution: The 10 LoRA adapters consume a static 5 GB of memory total.
    The KV cache, using 2 bytes per element, requires 2 * 32 layers * 4096 dim * 2000
    tokens * 32 batch * 2 bytes = 33.5 GB. Thus, the KV cache dominates the memory
    footprint, being nearly 7x larger than all adapters combined.
  common_mistake: Overestimating the footprint of the LoRA adapters while ignoring
    the quadratic or linear scaling of the KV cache with batch and sequence size.
  napkin_math: 10 * 0.5GB = 5GB. KV = 2 * 32 * 4096 * 2000 * 32 * 2 = 33.5GB.
