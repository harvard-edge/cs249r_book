title: LoRA Adapter Memory Footprint
scenario: A cloud server runs a base 7B model dynamically swapping 10 fine-tuned LoRA adapters (500MB each) on a single GPU.
question: Evaluate the memory overhead of the adapters against the KV cache assuming batch size 32, 2000 sequence length, 32 layers, and 4096 hidden dimension.
details:
  realistic_solution: 'The 10 LoRA adapters consume a static 5 GB of memory total. The KV cache, using 2 bytes per element, requires 2 * 32 layers * 4096 dim * 2000 tokens * 32 batch * 2 bytes = 33.5 GB. Thus, the KV cache dominates the memory footprint, being nearly 7x larger than all adapters combined.'
  common_mistake: |
    **The Pitfall:** Overestimating the footprint of the static LoRA adapters while ignoring KV cache scaling.
    **The Rationale:** Candidates fixate on the "10 adapters" detail in the prompt, forgetting the underlying math of transformer inference memory.
    **The Consequence:** They falsely identify the adapters as the memory bottleneck, completely missing the massive quadratic/linear scaling of the KV cache.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Adapters: 10 adapters at 500 MB each.
       - KV Cache specs: batch=32, seq=2000, layers=32, dim=4096.
       - Precision: FP16/BF16 (2 bytes/element).
    2. **Calculations:**
       - LoRA Adapters total: 10 × 0.5 GB = 5.0 GB.
       - KV Cache per token per layer: 2 (K,V) × 4096 × 2 bytes = 16 KB.
       - Total KV Cache: 16 KB × 32 layers × 2000 tokens × 32 batch = 32.768 GB.
    3. **Conclusion & Interpretation:**
       - **Result: KV cache (~32.8 GB) is >6x larger than adapters (5.0 GB).** (Memory-Capacity Bound)
