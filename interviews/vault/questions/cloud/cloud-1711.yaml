title: Liquid Cooling Trade-offs at the Power Density Wall
scenario: You are architecting a 10,000-GPU training cluster using 1,000W accelerators. Each 8-GPU node consumes 10 kW. Your provider offers a 20 MW facility with a standard air-cooling cap of 15 kW per rack. You can either deploy 1 node per rack (air-cooled) or pay a $15M CAPEX premium for direct-to-chip liquid cooling (DLC), unlocking 100 kW per rack.
question: Should you pay the $15M DLC premium or deploy one node per air-cooled rack, and why?
details:
  realistic_solution: Justify the $15M DLC upgrade. While air-cooling avoids the cooling premium, it forces a sprawl of 1,250 racks (1 node/rack). This requires expensive optical transceivers for almost all interconnects. The 100 kW/rack DLC approach shrinks the footprint to 125 racks (10 nodes/rack), allowing 90% of connections to use cheap passive copper (DAC) within the rack, which more than offsets the cooling CAPEX.
  common_mistake: |
    **The Pitfall:** Evaluating the decision purely on cooling CAPEX without accounting for networking costs.
    **The Rationale:** Architects silo facility cooling costs from IT networking costs, missing the massive explosion in expensive optical transceivers required to connect a low-density, sprawling cluster.
    **The Consequence:** Rejecting a cooling upgrade to save $15M, only to inadvertently spend $20M+ in networking gear to mitigate the resulting cluster sprawl.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Air-Cooled Scale: 15kW/rack = 1 node/rack. Requires 1,250 racks.
       * DLC Scale: 100kW/rack = 10 nodes/rack. Requires 125 racks.
    2. **Calculations:**
       * Air-Cooled Optics: ~10,000 long-reach optical transceivers @ ~$2k each = $20M.
       * DLC Optics: 90% intra-rack connections (copper DAC @ ~$200). 1,000 optics = $2M.
    3. **Conclusion & Interpretation:**
       * **Result: Network Cost Avoidance.** The $18M saved on optical networking more than pays for the $15M DLC facility upgrade.
