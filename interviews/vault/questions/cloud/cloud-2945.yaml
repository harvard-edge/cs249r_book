title: Implementing Power-Aware Bin Packing for Heterogeneous GPU Racks
scenario: 'A shared datacenter hosts a heterogeneous cluster: 20 racks with H100 nodes
  (700 W/GPU) and 15 racks with A100 nodes (400 W/GPU). Each rack has a 20 kW power
  budget. Current GPU utilization averages 60%. You are tasked with implementing a
  power-aware workload placement algorithm that maximizes GPU density per rack without
  exceeding the power budget under 95th-percentile load.'
question: How would you design a power-aware placement algorithm that maximizes H100
  and A100 GPU density per rack without exceeding 20 kW at P95 load?
details:
  realistic_solution: 'Use P95 power draw from DCGM historical metrics per GPU workload
    type (training vs. inference vs. idle) as the placement unit. For H100 training
    jobs (P95 ≈ 680 W/GPU) and 8 GPUs/node: P95 node power = 680 × 8 + 2,600 W system
    = 8,040 W. A 20 kW rack fits 2 H100 training nodes with 3,920 W headroom — allocate
    to networking and future expansion. Implement as a Kubernetes scheduler extender
    that queries the `rack_power_headroom` metric from Prometheus before scoring each
    node. Reject nodes where `current_rack_power + pod_p95_power > rack_budget × 0.95`.'
  common_mistake: 'Using average power draw for placement decisions; H100 and A100
    GPUs have significant power variance (idle: 80 W, full compute: 700/400 W) — placing
    jobs based on TDP guarantees headroom but wastes capacity, while placing on average
    power risks breaker trips at peak.'
  napkin_math: 'H100 rack: 2 nodes × 8,040 W = 16,080 W. Budget: 20,000 W. Headroom:
    3,920 W (19.6%). A100 rack: P95 training = 390 W × 8 + 2,000 W = 5,120 W/node.
    20,000 / 5,120 = 3.9 → 3 nodes/rack = 24 A100s per rack. H100 rack: 2 nodes =
    16 H100s. Normalized FLOPS/rack: H100 = 16 × 989 TF = 15.8 PFLOPS; A100 = 24 ×
    312 TF = 7.5 PFLOPS. H100 delivers 2.1× more FLOPS per rack at 1.3× higher per-GPU
    cost.'
