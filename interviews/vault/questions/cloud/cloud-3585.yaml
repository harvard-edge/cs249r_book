title: Environmental Impact Disclosure for LLM on NVIDIA H100
scenario: Your team is preparing to deploy a large language model (LLM) for a public-facing application on an NVIDIA H100 GPU. As part of your Responsible AI framework, you are developing a model card for this deployment to address the environmental impact.
question: What environmental footprint disclosures and energy or carbon guardrails should the H100 model card include?
details:
  realistic_solution: The model card should include estimated operational power consumption (e.g., 700W per H100, multiplied by anticipated usage hours and number of GPUs), the associated carbon emissions based on the energy source of the data center, and strategies for optimization (e.g., dynamic power management, workload scheduling to leverage greener grids, model quantization). Guardrails could include monitoring GPU utilization, setting power caps, and establishing alerts for excessive energy consumption or carbon intensity.
  common_mistake: |
    **The Pitfall:** Overlooking the cumulative energy consumption and carbon footprint of sustained high-performance GPU operation.
    **The Rationale:** Candidates often provide generic environmental statements without tying them to specific hardware metrics and operational scale.
    **The Consequence:** Inaccurate or misleading model card disclosures.
  napkin_math: |
    1. If one H100 runs at 700W for 24/7 for a year, that's approximately 700W * 24h * 365d = 6,132,000 Wh = 6,132 kWh per year per GPU.
    2. At an average carbon intensity of 0.3 kg CO2e/kWh (global average), one H100 could generate ~1839.6 kg CO2e annually.
    **Result:** This impact scales linearly with the number of GPUs and usage.
