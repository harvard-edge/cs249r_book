title: The Federated Learning Data Bill
scenario: You are calculating the weekly data ingress costs for a new Federated Learning system that trains a predictive keyboard model. You have a fleet of 10 million users. Each user's device will upload 200 MB of compressed model gradients to your cloud backend once per week.
question: How much gradient data will 10 million users upload per week at 200 MB each, and what does that imply for backend scale?
details:
  realistic_solution: 'The correct approach is to multiply the data contribution of a single user by the total number of users in the fleet. This calculation reveals the immense scale of data ingress that cloud systems must handle, even when using a technique like Federated Learning that avoids uploading raw user data. The final figure is a critical input for Total Cost of Ownership (TCO) analysis, directly impacting network bandwidth provisioning and data handling costs. The calculation: 10,000,000 users * 200 MB/user = 2,000,000,000 MB = 2,000,000 GB = 2,000 TB = 2 PB per week. This means the backend must be provisioned to ingest 2 Petabytes of gradient data every week.'
  common_mistake: |
    **The Pitfall:** Failing to appreciate the scale of a large user fleet.
    **The Rationale:** Engineers calculate the data for a single user correctly but either forget to multiply by the total number of users or make an order-of-magnitude error during unit conversions.
    **The Consequence:** Drastically underestimating the infrastructure requirements and cloud ingress cost.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Users: 10,000,000 (10^7).
       - Data per user: 200 MB.
    2. **Calculations:**
       - Total data (MB): 10,000,000 * 200 MB = 2,000,000,000 MB.
       - Convert to GB: 2,000,000,000 / 1000 = 2,000,000 GB.
       - Convert to TB: 2,000,000 / 1000 = 2,000 TB.
       - Convert to PB: 2,000 / 1000 = 2 PB per week.
       - Average ingress rate: 2 PB = 16 Pb. 16,000 Tb / (7 * 24 * 3600)s = ~26.5 Gbps.
    3. **Conclusion & Interpretation:**
       - **Result: Ingress-Bound**. 2 PB/week translates to ~26.5 Gbps sustained bandwidth, highlighting the massive network infrastructure scale required for fleet-wide ML.
  options:
  - 2 Terabytes
  - 200 Terabytes
  - 2 Petabytes
  - 20 Petabytes
  correct_index: 2
