title: The P99 Latency Volcano
scenario: Serving a 70B parameter LLM using static batch size 8. At 50% max throughput, P99 latency explodes despite 60% GPU utilization.
question: "Why is P99 latency exploding near 50% of max throughput with static batch size 8, and should you add GPUs or change batching?"
details:
  realistic_solution: The root cause is head-of-line blocking exacerbated by high service time variance. Short requests wait for long generations to finish. Implement continuous batching to decouple batching from arrival.
  common_mistake: |
    **The Pitfall:** Assuming latency problems at moderate utilization are due to insufficient hardware capacity.
    **The Rationale:** Engineers default to scaling out to reduce arrival rate rather than addressing the core variance problem.
    **The Consequence:** Inefficient resource usage and persistent tail latency spikes due to head-of-line blocking.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model (140 GB). Bandwidth 3.35 TB/s. Decode = 41.8 ms/token.

    **Calculations:**
    - Long req (2048) = 85.6s.
    - Short req (32) = 1.3s.
    - Queue delay = 85.6 - 1.3 = 84.3s.

    **Conclusion & Interpretation:**
    - **Result: Static batching forces 84.3s unnecessary delay (Latency-Bound)**. Continuous batching avoids this.
