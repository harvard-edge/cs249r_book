title: The P99 Latency Volcano
scenario: You are operating a fleet of H100 GPUs serving a 70B parameter LLM using a static batching strategy
  with a batch size of 8. As your request volume approaches 50% of the theoretical maximum throughput,
  you notice that average GPU utilization is stable around 60%, but the P99 latency for end-users is exploding,
  leading to frequent timeouts. A team member suggests adding more GPUs to handle the load. Differentiate
  the impact of adding more hardware versus redesigning the batching strategy. Analyze the root cause
  of the latency spike.
details:
  realistic_solution: The root cause is head-of-line blocking exacerbated by high service time variance
    in a static batching system. An LLM request for a long generation (e.g., 2048 tokens) paired in a
    static batch with a request for a short generation (e.g., 32 tokens) forces the short request to wait
    for the entire long generation to complete. This disproportionately affects tail latency (P99). Adding
    more GPUs is a brute-force solution that reduces the probability of a short request getting stuck,
    but it's inefficient. The correct solution is to switch to a continuous batching (or 'dynamic batching')
    scheduler. This strategy decouples batching from request arrival. The server can continuously add
    new requests to a running batch as soon as space is available (i.e., another request in the batch
    finishes), dramatically reducing queueing delay for short requests and improving overall GPU utilization.
  common_mistake: Engineers often assume that latency problems at moderate utilization are due to insufficient
    hardware capacity. They would recommend adding more GPUs (scaling out). While this reduces the arrival
    rate (λ) per machine, it doesn't solve the core issue of service time variance, known as head-of-line
    blocking.
  napkin_math: 'Analyze two requests in a static batch: R1 (2048 tokens), R2 (32 tokens). On an H100,
    memory-bound decode for a 70B model (140GB) is roughly 140GB / 3.35TB/s = 41.8ms/token. R1 takes 2048
    * 41.8ms = 85.6 seconds. R2 takes 32 * 41.8ms = 1.3 seconds. R2 finishes in 1.3s but is held hostage
    for the remaining 84.3s. This blocks the slot, dropping util and raising P99.'
