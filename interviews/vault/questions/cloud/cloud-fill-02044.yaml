title: RDMA Write vs Send Semantics on InfiniBand for H100 Parameter Server
scenario: 'A parameter server uses InfiniBand for gradient exchange with 64 A100 workers. The system architect
  asks: should we use RDMA Write or RDMA Send for gradient push operations? Explain the key difference
  in terms of CPU involvement, notification, and appropriate use case.'
details:
  realistic_solution: 'RDMA Write: one-sided, initiator writes directly to registered remote memory without
    receiver CPU involvement. No receive buffer posting needed. Receiver may not know write occurred without
    explicit signaling. Use: pushing parameters to known memory addresses (known layout, pull model).
    RDMA Send: two-sided, receiver must post receive buffer before sender sends. Completion on both sides.
    Use: when receiver needs notification and message size/layout varies. For parameter server gradient
    push: RDMA Write preferred — workers know server memory layout, can write gradients directly to server
    DRAM at line rate. CPU on server stays free for aggregation. Typical latency: RDMA Write ≈2-4μs vs
    TCP ≈40-100μs.'
  common_mistake: Treating RDMA Write and Send as equivalent; not knowing that RDMA Write is one-sided
    (no CPU involvement on receiver) while Send requires receiver to post a receive buffer.
  napkin_math: 'RDMA Write latency: 2μs. TCP latency: 50μs. For 10,000 gradient update messages/s per
    worker: RDMA overhead=10k×2μs=20ms CPU equivalent. TCP: 10k×50μs=500ms (35% of 1.4s step wasted on
    networking). RDMA eliminates this bottleneck entirely since CPU is bypassed.'
