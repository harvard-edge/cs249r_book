title: Diagnosing Adversarial Debiasing Instability in NLP
scenario: You are deploying a cloud-based resume screening NLP model on a cluster of 8x GPUs. To comply with fairness regulations, you implement adversarial debiasing with a gradient reversal layer (GRL) to prevent the encoder from retaining gender and age proxy variables. However, during training, the main classification loss plateaus early at an unacceptably high level (0.85), and the adversarial accuracy drops to 50% (random guess). The model's hidden dimension is 1024, and both the predictor and adversary use the same Adam optimizer with a learning rate of 2e-4.
question: "What is causing the GRL debiasing training to plateau main loss at 0.85 while the adversary falls to random accuracy?"
details:
  realistic_solution: 'Diagnose a min-max optimization failure. The simpler adversary overpowers the encoder before task features are learned. Implement decoupled optimizers (e.g., main LR 1e-4, adversary LR 1e-5) and warm up the GRL penalty scalar from 0 to 1 over the first 5000 steps.'
  common_mistake: |
    **The Pitfall:** Assuming the model lacks capacity and increasing the hidden dimension, or reducing the overall learning rate symmetrically.
    **The Rationale:** Candidates fail to realize the min-max game requires asymmetric tuning to keep the adversary from overpowering the encoder.
    **The Consequence:** The model either continues to fail to converge or converges incredibly slowly without actually achieving debiasing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Both predictor and adversary use same LR (2e-4).
       - Gradient Reversal Layer (GRL) penalty scalar used.
    2. **Calculations:**
       - With equal LRs, adversary's gradient norm (~10.0) dwarfs task gradient (~1.0).
       - Resulting penalty corrupts the encoder early in training.
       - Applying decoupled LRs (Adversary LR 10x smaller) and warming up GRL penalty scales down adversary update to ~1.0.
    3. **Conclusion & Interpretation:**
       - **Result: Matching task and penalty gradient norms enables joint convergence.** (Optimization-Bound)
