title: Diagnosing Adversarial Debiasing Instability in NLP
scenario: You are deploying a cloud-based resume screening NLP model on a cluster of 8x A100 GPUs. To
  comply with fairness regulations, you implement adversarial debiasing with a gradient reversal layer
  (GRL) to prevent the encoder from retaining gender and age proxy variables. However, during training,
  the main classification loss plateaus early at an unacceptably high level (0.85), and the adversarial
  accuracy drops to 50% (random guess). The model's hidden dimension is 1024, and both the predictor and
  adversary use the same Adam optimizer with a learning rate of 2e-4. Analyze the root cause of this failure
  mode.
details:
  realistic_solution: Diagnose a min-max optimization failure. The simpler adversary overpowers the encoder
    before task features are learned. Implement decoupled optimizers (e.g., main LR 1e-4, adversary LR
    1e-5) and warm up the GRL penalty scalar from 0 to 1 over the first 5000 steps.
  common_mistake: Candidates often assume the model lacks capacity and increase the hidden dimension,
    or they reduce the overall learning rate symmetrically without realizing the min-max game requires
    asymmetric tuning.
  napkin_math: With equal LRs, the adversary's gradient norm (approx 10.0) dwarfs the task gradient (approx
    1.0), corrupting the encoder. By applying a schedule where the GRL weight lambda scales linearly 0
    -> 1 and using an adversary LR 10x smaller, the penalty update is throttled to approx 1.0, matching
    the task gradient and allowing stable joint convergence.
