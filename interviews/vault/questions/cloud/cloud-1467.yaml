title: CUDA Graphs vs Fusion for Inference
scenario: You are evaluating optimization strategies for an LLM inference engine on NVIDIA A100 GPUs.
  The engine processes a custom attention block consisting of 80 sequential element-wise and reduction
  operations per layer. During token generation (batch size 1), profiling shows the GPU is idle 85% of
  the time despite 100% single-thread CPU utilization. The team is debating between implementing CUDA
  Graphs or writing a custom fused Triton kernel. The application requires continuous dynamic batching
  with frequently changing sequence lengths up to 4096. Evaluate the trade-offs between these two approaches
  to address the bottleneck and recommend a solution.
details:
  realistic_solution: Implement a custom fused Triton kernel. While CUDA Graphs effectively eliminate
    CPU launch overhead, capturing a separate graph for every unique batch size and sequence length combination
    is impractical for dynamic LLM inference. A fused kernel permanently reduces the launch count regardless
    of input shape dimensions.
  common_mistake: Recommending CUDA Graphs because they are easier to implement, without considering that
    highly dynamic sequence lengths and batch sizes will force constant graph recompilation and massive
    memory overhead.
  napkin_math: 80 ops/layer * 32 layers = 2,560 kernel launches per token. At ~5µs CPU launch overhead
    per kernel, total CPU dispatch latency is 2,560 * 5µs = 12.8ms per token. Fusing the 80 ops into 1
    kernel per layer reduces this to 32 * 5µs = 0.16ms, saving 12.6ms per token.
