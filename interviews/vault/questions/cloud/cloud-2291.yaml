title: The EU AI Act Compliance Pipeline
scenario: 'Your company deploys a high-risk AI system (credit scoring) in the EU. The EU AI Act requires:
  (1) a conformity assessment before deployment, (2) continuous post-market monitoring, (3) full traceability
  of training data and model decisions, and (4) the ability to provide explanations to affected individuals
  upon request. Your current ML infrastructure has none of these capabilities. Analyze what systems infrastructure
  you need to build, and identify which requirement is the most expensive to retrofit.'
details:
  realistic_solution: 'Each requirement maps to concrete systems infrastructure: (1) Conformity assessment
    → automated bias testing pipeline (disaggregated evaluation across protected groups), performance
    benchmarking suite, dataset documentation (datasheets), model cards generated automatically from training
    metadata. (2) Post-market monitoring → production fairness monitoring (hourly metric computation,
    drift detection on per-group accuracy, automated alerting when metrics breach thresholds), incident
    reporting pipeline. (3) Traceability → data lineage system (tracking every training sample through
    preprocessing, deduplication, augmentation), model versioning with immutable artifacts, decision audit
    logs linking each prediction to the model version, input features, and output. (4) Individual explanations
    → feature attribution infrastructure (SHAP/LIME computation on-demand), explanation caching layer
    (pre-computing common explanation patterns). The most expensive to retrofit is (3) traceability, because
    it requires instrumenting every stage of the data pipeline retroactively, storing immutable lineage
    records for potentially billions of training samples, and maintaining a queryable audit log for every
    production prediction — this is a distributed systems problem requiring petabyte-scale storage with
    write-once semantics.'
  common_mistake: Treating compliance as a documentation exercise — writing policies and filing paperwork.
    The EU AI Act requires operational infrastructure, not just documents. Or focusing only on explainability
    while ignoring the data lineage requirement.
  napkin_math: 'Traceability cost estimate for a credit model serving 10M decisions/day: Each decision
    audit record (input features + model version + prediction + explanation hash) ≈ 2 KB. Daily: 10M ×
    2 KB = 20 GB. 7-year retention (regulatory): 20 GB × 365 × 7 = 51,100 GB (51.1 TB). At $0.023/GB/month
    (S3): 51,100 GB × $0.023 × 12 = ~$14K/year for storage alone. Training data lineage for 1B training
    records with full provenance: ~500 GB metadata. Total infrastructure: ~$50-100K/year — dwarfed by
    the cost of non-compliance (up to 6% of global turnover).'
