title: Recall@K vs. NDCG Tradeoff in Retrieval Optimization
scenario: Your retrieval model optimizes for Recall@100 (does the ground-truth item appear in the top-100
  retrieved?). The ranking model then re-orders these 100. After a model upgrade, Recall@100 improves
  from 72% to 81%, but end-to-end NDCG@10 (quality of the final top-10) drops from 0.38 to 0.35. Explain
  the mechanism that allows better retrieval recall to worsen final ranking quality.
question: "How can Recall@100 improve from 72% to 81% while end-to-end NDCG@10 drops from 0.38 to 0.35?"
details:
  realistic_solution: 'The ranking model is trained on candidates that come from the old retrieval model.
    Its training negatives are items that the old retrieval model surfaced. When the retrieval model changes,
    it surfaces different candidates — potentially items the ranking model has never seen as negatives.
    The ranking model cannot correctly score these out-of-distribution candidates because its decision
    boundary was trained on the old retrieval''s item distribution. Specifically: the new retrieval model
    may surface more ''borderline relevant'' items (it retrieves harder, more semantically similar items).
    The ranking model sees these as confusing — it assigns them scores similar to positives because they
    look like positives but aren''t. NDCG@10 drops because the ranking model places these borderline-relevant
    items above true positives. Fix: (1) Retrain the ranking model with candidates from the new retrieval
    model. (2) Use a staged rollout: A/B test with the ranking model retrained on the new retrieval distribution
    before full deployment.'
  common_mistake: Assuming better retrieval always improves ranking quality. The issue is that the ranking
    model was trained on the old retrieval's candidate distribution, and changing that distribution breaks
    ranking model calibration.
  napkin_math: 'Old system: 72% recall → 72 true positives in top-100 (on average). Ranking selects top-10
    from 100: NDCG@10 = 0.38. New system: 81% recall → 81 true positives in top-100. Expected NDCG@10
    should improve (more true positives to choose from). Actual: 0.35. Drop = 0.03 NDCG units. Explanation:
    9 new true positives added to candidate set, but 9 borderline items added too. Ranking model mis-ranks:
    4 borderline items rank above true positives in top-10. DCG loss: sum(1/log2(rank+1)) for misplaced
    items. At ranks 1-10: placing 4 wrong items at ranks 3-6 causes DCG drop of ~0.06 (more than the gain
    from 9 extra true positives in top-100).'
