title: 'Dataset Curation: Mastery — Detect and Fix Systematic Labeling Bias'
scenario: Your 7B instruction-tuned model on H100 shows demographic bias: it declines 40% of requests from users with non-Western names versus 12% for Western names. You suspect labeling bias in 500K RLHF preference pairs.
question: How would you diagnose, measure, and correct the non-Western-name refusal-rate bias in the 500K RLHF preference pairs?
details:
  realistic_solution: '1) Audit: name-based demographic proxy labeling on 500K pairs. 2) Measure refusal rate correlation with demographics in training labels. 3) Rebalance: oversample underrepresented preference pairs. 4) Retrain reward model. 5) Re-run RLHF. 6) Evaluate on held-out demographic-stratified test set.'
  common_mistake: |
    **The Pitfall:** Retraining the model from scratch or heavily tweaking the architecture without auditing the dataset.
    **The Rationale:** Candidates often assume bias is a pure modeling problem and reach for algorithmic fixes rather than inspecting the fundamental data distribution.
    **The Consequence:** The bias persists or worsens, and vast amounts of compute are wasted on retraining runs that fail to address the root cause in the RLHF labels.
  napkin_math: |
    - **Dataset Audit:** Out of 500K pairs, identify ~60K pairs (12%) with non-Western names.
    - **Bias Measurement:** Refusal rate in labels is 35% (non-Western) vs 8% (Western), a 4.4× disparity.
    - **Rebalancing Strategy:** Upsample non-Western pairs 3× (from 60K to 180K). Downsample Western pairs from 440K to 320K.
    - **New Dataset Composition:** Total remains 500K pairs, but now 36% (180K/500K) represent non-Western names.
    - **Expected Outcome:** The refusal gap should shrink significantly (e.g., from a 40%/12% gap to ~18%/12%), verified on a held-out demographic-stratified test set.
