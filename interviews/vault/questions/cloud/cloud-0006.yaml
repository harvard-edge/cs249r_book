title: The Throughput Saturation Fallacy
scenario: You are capacity planning for an LLM service that uses H100 GPUs. When fully saturated, your
  monitoring shows a single H100 can produce a total of 3,000 tokens per second using continuous batching.
  You need to calculate the total time required to serve a workload of 5,000 total tokens.
details:
  realistic_solution: From a total throughput perspective, the scenarios are identical. The GPU's job
    is to generate 5,000 tokens, and it does so at a rate of 3,000 tokens per second. The distribution
    of those tokens among users doesn't change the total amount of work.
  common_mistake: Engineers often conflate per-user latency with total system throughput. They might incorrectly
    assume that handling 100 concurrent users (Scenario A) must be inherently slower due to 'overhead'
    or 'context switching', even when the total amount of computational work (5,000 tokens) is identical
    to the single-user scenario and the system is specified to be operating at a constant peak throughput.
  napkin_math: '1. **Define Total Workload (Scenario A)**: $100 \text{ users} \times 50 \frac{\text{tokens}}{\text{user}}
    = 5,000 \text{ tokens}$.'
  options:
  - Scenario A is slower due to multi-user overhead. (Misinterprets 'saturated throughput')
  - Scenario B is slower because long generations are inefficient. (Confuses sequence length with system
    throughput)
  - Both scenarios take ~1.67 seconds to complete. (Correctly calculates total work / rate)
  - Both scenarios take ~0.06 seconds to complete. (Unit error, likely 3000 / 5000 / 100 or similar)
  correct_index: 2
