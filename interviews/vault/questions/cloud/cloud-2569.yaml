title: Cloud Tokenization L5 0
scenario: 'Your multilingual LLM serves users in 50 languages. You must choose between: (A) a single 256K-token
  BPE vocabulary trained on all languages, or (B) language-specific tokenizers (32K each) with a router.
  Evaluate systems implications.'
question: "For a 50-language LLM, what are the systems trade-offs between one 256K BPE vocabulary and language-specific 32K tokenizers?"
details:
  realistic_solution: 'Option A (single 256K vocab): one model serves all languages. Embedding table:
    256K × 4096 × 2B = 2 GB — large but manageable. Advantage: simpler deployment, shared representations.
    Disadvantage: still underrepresents low-resource languages; vocabulary budget is spread across 50
    languages. Option B (per-language tokenizers): each language gets optimal tokenization. But: need
    50 different models or adapters, routing logic, and the model must handle different token ID spaces.
    Deployment complexity is 50x. Middle ground: use a balanced 128K vocabulary with oversampled training
    data for underrepresented languages. This gives good per-language efficiency without deployment complexity.
    The 128K embedding overhead (+768 MB) is modest versus 50 separate model deployments.'
  common_mistake: Optimizing tokenizer efficiency per language in isolation without considering deployment
    cost. Perfect per-language tokenization with separate models is operationally expensive — a shared
    vocabulary with modest expansion is usually the better systems trade-off.
  napkin_math: 'A: 256K vocab, 2 GB embedding, 1 model. B: 50 × 32K vocab, each model ~14 GB = 700 GB
    total deployed. Serving cost: A = 1 GPU. B = 50 GPUs (or complex model switching). A is 50x cheaper
    to serve.'
