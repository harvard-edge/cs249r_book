title: Cloud Tokenization L5 0
scenario: Your multilingual LLM serves users in 50 languages. You must choose between: (A) a single 256K-token BPE vocabulary trained on all languages, or (B) language-specific tokenizers (32K each) with a router.
question: For a 50-language LLM, what are the systems trade-offs between one 256K BPE vocabulary and language-specific 32K tokenizers?
details:
  realistic_solution: 'Option A (single 256K vocab): one model serves all languages. Embedding table: 256K × 4096 × 2B = 2 GB — large but manageable. Advantage: simpler deployment, shared representations. Disadvantage: still underrepresents low-resource languages; vocabulary budget is spread across 50 languages. Option B (per-language tokenizers): each language gets optimal tokenization. But: even with shared backbones, each needs its own 32K embedding table and language head (256MB each * 50 = 12.8GB overhead), plus routing logic, and the model must handle different token ID spaces. Deployment complexity is 50x. Middle ground: use a balanced 128K vocabulary with oversampled training data for underrepresented languages. This gives good per-language efficiency without deployment complexity. The 128K embedding overhead (+768 MB) is modest versus the complexity and memory overhead of 50 separate heads.'
  common_mistake: |
    **The Pitfall:** Optimizing tokenizer efficiency per language in isolation.
    **The Rationale:** Language-specific tokenizers provide optimal compression and representation for each language.
    **The Consequence:** Completely ignoring the massive deployment complexity and memory overhead (~12.8 GB) of serving 50 separate heads, fragmenting batches and degrading serving throughput.
  napkin_math: |
    - **Option A (256K vocab):** 1 shared model. Embedding size = 256K × 4096 × 2B = ~2 GB.
    - **Option B (50 × 32K vocab):** Even with a shared trunk, 50 specific embedding layers and LM heads add ~256MB each. Total overhead = 50 × 256MB = ~12.8 GB.
    - **Serving Cost:** Option A allows simple contiguous batching. Option B requires fragmented batches per language or complex routing logic.
    - **Conclusion:** Option A is significantly cheaper and simpler to serve, despite slightly worse per-language tokenization.
