title: Cloud Tokenization L5 0
scenario: 'Your multilingual LLM serves users in 50 languages. You must choose between: (A) a single 256K-token BPE vocabulary trained on all languages, or (B) language-specific tokenizers (32K each) with a router.'
question: For a 50-language LLM, what are the systems trade-offs between one 256K BPE vocabulary and language-specific 32K tokenizers?
details:
  realistic_solution: 'Option A (single 256K vocab) dictates a single monolithic embedding table (~2 GB) allowing simple contiguous batching for all incoming requests. Option B (50x 32K) creates a massive serving fragmentation overhead; it requires instantiating 50 independent language heads and embedding tables (~12.8 GB total overhead). This dynamically fragments request batching based on incoming language, destroying inference throughput. A balanced compromise is a shared 128K vocabulary with oversampled low-resource data.'
  common_mistake: |
    **The Pitfall:** Optimizing purely for tokenizer compression efficiency per language in isolation.
    **The Rationale:** Language-specific BPE models clearly provide the mathematically optimal token representation and compression for that specific grammar.
    **The Consequence:** Completely ignoring the massive systems deployment complexity and ~12.8 GB VRAM overhead of serving 50 separate prediction heads, crippling the MLOps pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Embedding Dimension: 4096.
       - Precision: BF16 (2 bytes/param).
       - Option A: 1 head, 256K vocab.
       - Option B: 50 heads, 32K vocab each.
    2. **Calculations:**
       - Option A Embedding Size: 256,000 * 4096 * 2 Bytes = ~2.0 GB.
       - Option B Single Head: 32,000 * 4096 * 2 Bytes = ~262 MB.
       - Option B Total Overhead: 50 heads * 262 MB = ~13.1 GB.
    3. **Conclusion & Interpretation:**
       - **Option A is vastly cheaper to serve, saving ~11.1 GB of VRAM overhead and enabling unified contiguous batching. Result: Memory-Capacity Bound.**
