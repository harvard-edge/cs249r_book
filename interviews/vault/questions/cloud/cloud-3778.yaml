title: 'Prefix Caching: Amortizing System Prompts'
scenario: Your chatbot service uses a 2000-token system prompt prepended to every user request. You serve 1000 requests/minute on GPUs. Each prefill token takes 0.5ms. Without prefix caching, every request recomputes the system prompt's KV cache.
question: How much GPU time is wasted recomputing the 2000-token system prompt, and what annual savings does prefix caching provide at $2 per GPU-hour?
details:
  realistic_solution: |
    1000 GPU-s/min = 16.7 GPU-hours/hr saved. Annual: 16.7 x 8760 = 146,000 GPU-hr x $2/hr = $292K/yr.
  common_mistake: |
    **The Pitfall:** Thinking prefix caching simply stores the final attention output.
    **The Rationale:** Candidates misunderstand that KV (key-value) tensors are cached, which form the intermediate state needed by all subsequent tokens' attention computation.
    **The Consequence:** Failure to implement or properly size the KV cache for the shared prefix, resulting in massive wasted compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2000-token prompt, 1000 requests/min.
       - 0.5ms per prefill token.
       - GPU Cost: $2/hr.
    2. **Calculations:**
       - Wasted time per request: 2000 × 0.5ms = 1s.
       - Wasted time per minute: 1000 × 1s = 1000 GPU-seconds/min.
       - Continuous GPUs wasted: 1000 / 60 = 16.67 GPUs.
       - Annual Savings: 16.67 GPUs × $2/hr × 8760 hr/yr = $292,058.
    3. **Conclusion & Interpretation:** **Prefix caching eliminates redundant compute, saving ~$292K annually. Result: Compute-Bound.**
