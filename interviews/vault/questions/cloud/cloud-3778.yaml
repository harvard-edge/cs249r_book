title: 'Prefix Caching: Amortizing System Prompts'
scenario: Your chatbot service uses a 2000-token system prompt prepended to every
  user request. You serve 1000 requests/minute on H100 GPUs. Each prefill token takes
  0.5ms. Without prefix caching, every request recomputes the system prompt's KV cache.
  Calculate the wasted compute and explain how prefix caching (RadixAttention) eliminates
  it.
question: How much GPU time is wasted recomputing the 2000-token system prompt, and
  what annual savings does prefix caching provide at $2 per GPU-hour?
details:
  realistic_solution: '1000 GPU-s/min = 16.7 GPU-hours/hr saved. Annual: 16.7 × 8760
    = 146,000 GPU-hr × $2/hr = $292K/yr (not $17.5K).'
  common_mistake: Thinking prefix caching simply stores the attention output. It caches
    the KV (key-value) tensors for the shared prefix, which are the intermediate state
    needed by all subsequent tokens' attention computation.
  napkin_math: 'Optimization saves 1000 GPU-seconds per minute. Annual savings: 1000
    GPU-s/min × 525,600 min/yr = 5.256×10^8 GPU-seconds = 5.256×10^8/3600 = 146,000
    GPU-hours/yr. No — 1000 GPU-s/min × 60min/hr = 60,000 GPU-s/hr = 16.7 GPU-hours
    saved/hr. Annual: 16.7 GPU-hr/hr × 8760hr = 146,000 GPU-hr/yr. At $2/GPU-hr: $292K/yr
    (not $17.5K — $17.5K would be only 8,750 GPU-hours/yr).'
