title: 'Prefix Caching: Amortizing System Prompts'
scenario: Your chatbot service uses a 2000-token system prompt prepended to every user request. You serve 1000 requests/minute on H100 GPUs. Each prefill token takes 0.5ms. Without prefix caching, every request recomputes the system prompt's KV cache.
question: How much GPU time is wasted recomputing the 2000-token system prompt, and what annual savings does prefix caching provide at $2 per GPU-hour?
details:
  realistic_solution: |
    1000 GPU-s/min = 16.7 GPU-hours/hr saved. Annual: 16.7 x 8760 = 146,000 GPU-hr x $2/hr = $292K/yr (not $17.5K).
  common_mistake: |
    **The Pitfall:** Thinking prefix caching simply stores the final attention output.
    **The Rationale:** Candidates misunderstand that KV (key-value) tensors are cached, which form the intermediate state needed by all subsequent tokens' attention computation.
    **The Consequence:** Failure to implement or properly size the KV cache for the shared prefix, resulting in massive wasted compute.
  napkin_math: |
    - **Wasted Time per Request:** 2000 tokens * 0.5ms = 1000ms = 1 second.
    - **Wasted Time per Minute:** 1000 requests * 1s = 1000 GPU-seconds/min.
    - **GPU-Hours Saved per Hour:** 1000 GPU-s/min * 60 min/hr = 60,000 GPU-s/hr = **16.67 GPU-hours/hr**.
    - **Annual Savings:** 16.67 GPU-hr/hr * 8760 hours/yr = 146,000 GPU-hours/yr.
    - **Cost Savings:** 146,000 GPU-hours/yr * $2/hr = **$292,000/year**.
