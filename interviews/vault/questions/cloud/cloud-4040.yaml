title: Gradient All-to-All for Expert Parallelism
scenario: A Mixture-of-Experts (MoE) model with 128 experts distributed across 128 MI300X GPUs uses All-to-All communication for token routing. Each GPU holds 1 expert and routes tokens to the correct expert on another GPU. With a batch of 4096 tokens and top-2 routing, each GPU must send ~64 tokens (each 4KB with hidden dim 2048 in FP16) to each of the 128 GPUs.
question: How would you design the MoE All-to-All token routing pattern across 128 MI300X GPUs, and how does its bandwidth compare to AllReduce?
details:
  realistic_solution: |
    Per GPU sends 256KB to each of 128 GPUs, totaling 32MB outbound and 32MB inbound. Total All-to-All data is 4GB network traffic. While All-to-All creates 128 concurrent small flows (256KB each) per GPU, making it latency-bound, NCCL's pipelining can overlap these flows.
  common_mistake: |
    **The Pitfall:** Treating All-to-All communication like an AllReduce operation.
    **The Rationale:** Candidates assume All-to-All is bandwidth-bound like AllReduce, failing to recognize it creates many small latency-bound flows.
    **The Consequence:** Severe miscalculation of communication latency because the overhead of establishing 128^2 individual connections is ignored.
  napkin_math: |
    - Per GPU outbound: 64 tokens * 4KB = 256KB to each of 128 GPUs = 32MB.
    - Total All-to-All data: 128 GPUs * 32MB = 4GB network traffic.
    - AllReduce for 2GB gradients: 2 * (127/128) * 2GB = 3.97GB total.
    - **While total data volume (~4GB) is similar, All-to-All creates 16,384 independent small flows compared to Ring AllReduce's 128 flows.**
