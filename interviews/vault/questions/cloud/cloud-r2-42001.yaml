title: Little's Law for GPU Inference Throughput
scenario: Your MI300X inference server handles requests with a mean latency of 80ms and you need to sustain
  500 requests/second. Using Little's Law, how many concurrent requests must be in-flight, and what does
  this imply for GPU memory reserved for KV cache?
question: "Using Little's Law, how many concurrent requests must be in-flight, and what does this imply for GPU memory reserved for KV cache?"
details:
  realistic_solution: 'Little''s Law: L = λ × W. Concurrency = 500 req/s × 0.08s = 40 concurrent requests.
    Each request''s KV cache for a 70B model with 80 layers, 64 heads, 128 dim, 2048 context in FP16 =
    80 × 64 × 128 × 2048 × 2 × 2 bytes = 5.24 GB. For 40 concurrent requests: 40 × 5.24 GB = ~210 GB of
    KV cache alone. MI300X has 192 GB HBM3 — this does not fit. You must either reduce context length,
    use GQA (which cuts KV cache by head ratio), apply PagedAttention to share pages, or quantize KV cache
    to INT8/FP8, cutting memory by 2×.'
  common_mistake: Applying Little's Law correctly but forgetting to account for the memory footprint of
    concurrent requests. Each in-flight request consumes KV cache memory, so the concurrency requirement
    directly constrains the batch size the GPU can support.
  napkin_math: 'Little''s Law: L = 500 × 0.08 = 40 concurrent. KV cache per request (70B, 2048 ctx, FP16):
    ~5.2 GB. Total: 40 × 5.2 = 208 GB > 192 GB MI300X. With GQA 8:1 ratio: 208 / 8 = 26 GB — fits easily.
    With FP8 KV cache: 208 / 2 = 104 GB — also fits.'
