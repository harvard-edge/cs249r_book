title: The Kernel Launch Overhead Tax
scenario: 'A GPU profiler shows that a small model is bottlenecked by kernel launch overhead. You see a sequence of two operations that could be fused: a matrix multiplication that takes 10 µs to compute, followed by a ReLU activation that takes 2 µs. From profiling the hardware, you know each separate kernel launch has a fixed overhead of 5 µs.'
question: "What is the total latency of the fused kernel after combining the 10 µs MatMul and 2 µs ReLU with one 5 µs launch?"
details:
  realistic_solution: With operator fusion, the two operations are combined into a single kernel. This means you only pay the fixed kernel launch overhead once, rather than once for each operation. The total latency is the sum of the single launch overhead and the compute times of both operations. This is a fundamental optimization in ML compilers like XLA and TensorRT.
  common_mistake: |
    **The Pitfall:** Ignoring kernel launch overhead and only summing the compute times (10 µs + 2 µs = 12 µs).
    **The Rationale:** Candidates often focus purely on the mathematical operations and neglect the hardware realities of launching a kernel on the accelerator.
    **The Consequence:** Misunderstanding the primary reason for operator fusion in small operations, leading to incorrect latency estimates and poor optimization strategies.
  napkin_math: |
    - Unfused Latency = (Kernel Launch + MatMul Time) + (Kernel Launch + ReLU Time)
    - Unfused = (5 µs + 10 µs) + (5 µs + 2 µs) = 15 µs + 7 µs = 22 µs.
    - Fused Latency = Kernel Launch + (MatMul Time + ReLU Time)
    - Fused = 5 µs + (10 µs + 2 µs) = 5 µs + 12 µs = **17 µs**.
    - Operator fusion saves 5 µs by eliminating one redundant launch.
  options:
  - 12 µs
  - 22 µs
  - 17 µs
  - 15 µs
  correct_index: 2
