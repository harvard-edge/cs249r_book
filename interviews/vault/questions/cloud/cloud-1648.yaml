title: NVLink 4.0 Activation Transfer Time
scenario: You are profiling a pipeline parallel transformer model on an 8-GPU SXM node. A single 45 GB activation tensor must be passed sequentially from GPU 0 to GPU 1 over NVLink 4.0. Assume zero software or protocol overhead.
question: What is the theoretical minimum time to transfer the 45GB activation from GPU 0 to GPU 1 over NVLink 4.0?
details:
  realistic_solution: "A one-way tensor transfer between two GPUs only utilizes the unidirectional bandwidth of the NVLink interconnect. NVLink 4.0 provides 900 GB/s total bidirectional bandwidth per GPU, meaning 450 GB/s is available in a single direction. The theoretical minimum time is the tensor size divided by the unidirectional bandwidth."
  common_mistake: |
    **The Pitfall:** Using the advertised 900 GB/s bidirectional bandwidth for the calculation.
    **The Rationale:** Misreading hardware spec sheets and failing to distinguish between bidirectional and unidirectional transfer rates.
    **The Consequence:** Underestimating the communication latency by exactly 50%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * NVLink 4.0 bidirectional bandwidth: 900 GB/s.
       * Unidirectional transfer requirement: GPU 0 to GPU 1.
    2. **Calculations:**
       * Unidirectional Bandwidth: 900 GB/s / 2 = 450 GB/s.
       * Transfer Time: 45 GB / 450 GB/s = 0.1 seconds (100 milliseconds).
    3. **Conclusion & Interpretation:**
       * The theoretical minimum transfer time is **100 ms**. **Result: Network-Bandwidth-Bound (Unidirectional NVLink)**.
