title: Evaluating GPU Instances for High-Batch Dense FFNs
scenario: You are evaluating two cloud GPU instances for a high-throughput offline batch inference pipeline. The pipeline runs a large recommendation model dominated by dense matrix multiplications (e.g., FFN layers with 8192x32768 weights) using FP16 and a large batch size of 1024. Instance A provides 2x the memory bandwidth of your current baseline, while Instance B provides 2x the peak FP16 TFLOPs via larger systolic arrays but identical memory bandwidth.
question: "Which instance do you select to maximize throughput, and how do you justify this via the roofline model?"
details:
  realistic_solution: Select Instance B (2x peak TFLOPs). Dense matrix multiplications have an arithmetic intensity that scales with the batch size. At a batch size of 1024, the arithmetic intensity vastly exceeds the roofline ridge point of modern GPUs, placing the workload firmly in the compute-bound regime. Only an increase in TFLOPs will improve throughput.
  common_mistake: |
    **The Pitfall:** Assuming all large model workloads are memory-bandwidth bound.
    **The Rationale:** Candidates parrot the "LLMs are memory bound" heuristic without calculating arithmetic intensity, which scales with batch size.
    **The Consequence:** Purchasing expensive high-bandwidth instances that sit idle because the workload is actually starving for TFLOPs.
  napkin_math: |
    - **For an FP16 GEMM with $M=1024, K=8192, N=32768$:**
    - Total FLOPs = $2 \times M \times K \times N = 2 \times 1024 \times 8192 \times 32768 = 549.7\text{ GFLOPs}$.
    - Memory bytes = $(\text{Weights} + \text{Inputs} + \text{Outputs}) \times 2\text{ bytes} = (8192\times32768 + 1024\times8192 + 1024\times32768) \times 2 \approx 620\text{ MB}$.
    - **Arithmetic Intensity:** $549.7\text{ GFLOPs} / 0.62\text{ GB} \approx 886\text{ FLOPs/Byte}$.
    - **Conclusion:** A typical modern GPU has a ridge point around 100-200 FLOPs/Byte. Since $886 \gg 200$, **the operation is heavily compute-bound.** Choose Instance B.
