title: Evaluating GPU Instances for High-Batch Dense FFNs
scenario: You are evaluating two cloud GPU instances for a high-throughput offline batch inference pipeline.
  The pipeline runs a large recommendation model dominated by dense matrix multiplications (e.g., FFN
  layers with 8192x32768 weights) using FP16 and a large batch size of 1024. Instance A provides 2x the
  memory bandwidth of your current baseline, while Instance B provides 2x the peak FP16 TFLOPs via larger
  systolic arrays but identical memory bandwidth. Which instance do you select to maximize throughput,
  and how do you justify this via the roofline model?
question: "Which instance do you select to maximize throughput, and how do you justify this via the roofline model?"
details:
  realistic_solution: Select Instance B (2x peak TFLOPs). Dense matrix multiplications have an arithmetic
    intensity that scales with the batch size. At a batch size of 1024, the arithmetic intensity vastly
    exceeds the roofline ridge point of modern GPUs, placing the workload firmly in the compute-bound
    regime. Only an increase in TFLOPs will improve throughput.
  common_mistake: Assuming all large model workloads are memory-bandwidth bound because 'LLMs are memory
    bound.' Candidates often fail to calculate arithmetic intensity and realize that large-batch FFNs
    are strictly compute-bound.
  napkin_math: 'For an FP16 GEMM with M=1024, K=8192, N=32768: Total FLOPs = 2 * M * K * N = 2 * 1024
    * 8192 * 32768 = 549.7 GFLOPs. Memory bytes = (Weights + Inputs + Outputs) * 2 bytes = (8192*32768
    + 1024*8192 + 1024*32768) * 2 ≈ 620 MB. Arithmetic Intensity = 549.7 GFLOPs / 0.62 GB ≈ 886 FLOPs/Byte.
    A typical modern GPU has a ridge point around 100-200 FLOPs/Byte. Since 886 >> 200, the operation
    is heavily compute-bound.'
