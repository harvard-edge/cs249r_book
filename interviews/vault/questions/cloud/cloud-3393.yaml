title: TPU v5e Graph Compilation Performance Analysis
scenario: You are deploying a large language model (LLM) on a Google TPU v5e, which
  features 16 GB HBM, 197 TFLOPS BF16 peak performance, and 1.6 TB/s memory bandwidth.
  The model uses a custom activation function that requires a complex operator. After
  initial compilation and execution, you observe that the actual throughput is significantly
  lower than expected, even though the on-device memory utilization is low. The profiler
  indicates a bottleneck related to frequent host-device communication and unexpected
  stalls in the execution pipeline, despite the graph compiler attempting operator
  fusion and constant folding. Analyze why the custom activation function and its
  interaction with the graph compilation process might lead to this suboptimal performance,
  referencing the TPU v5e's specifications.
question: Why might a custom activation underperform on TPU v5e despite low HBM use,
  and how should operator lowering be fixed?
details:
  realistic_solution: A realistic solution involves investigating the generated HLO
    (High-Level Optimizer) graph to understand how the custom operator was lowered.
    If it's lowered to many small, non-fusable primitives or involves frequent host
    calls, the solution would be to implement a custom HLO kernel (e.g., using Triton
    or directly in MLIR) that is optimized for the TPU v5e's architecture. This custom
    kernel would ensure the operation leverages the 197 TFLOPS BF16 efficiently, minimizes
    host-device transfers that eat into the 1.6 TB/s bandwidth, and allows for better
    fusion opportunities with surrounding operations, thereby reducing execution stalls
    and improving data locality in the 16 GB HBM.
  common_mistake: A common mistake is to assume the compiler will always perfectly
    optimize custom operations, or to overlook the overhead of unoptimized operator
    lowering and potential non-contiguous memory access patterns for custom ops. Candidates
    might also focus solely on FLOPs without considering memory bandwidth or communication
    costs.
  napkin_math: If the custom activation requires 100 MB of intermediate data for each
    invocation, and it's called 1000 times per second, and each invocation involves
    a round trip to host memory, the minimum host-device bandwidth required for just
    this data movement (ignoring computation) would be 100 MB * 1000 = 100 GB/s. This
    is a significant fraction of the TPU v5e's 1.6 TB/s (1600 GB/s) HBM bandwidth,
    and if host memory is slower, it becomes a severe bottleneck. The penalty for
    individual small transfers can be much higher due to latency.
