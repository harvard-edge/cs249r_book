title: 'Network Bandwidth Bottlenecks: Recall PCIe and NVLink Bandwidth Specs'
scenario: A systems engineer asks for the key bandwidth specifications for GPU interconnects (PCIe 5.0, NVLink 4.0, and NVSwitch) and when each limits ML training performance.
question: 'What are the exact bidirectional bandwidth specifications for PCIe 5.0, NVLink 4.0, and NVSwitch, and when does each limit performance?'
details:
  realistic_solution: |
    PCIe 5.0 x16 provides 64GB/s bidirectional. NVLink 4.0 provides 900GB/s bidirectional per GPU. NVSwitch provides 3.6TB/s non-blocking all-to-all across 8 GPUs. PCIe limits during data loading or checkpoint saves. NVLink limits during tensor-parallel all-reduces.
  common_mistake: |
    **The Pitfall:** Quoting NVLink bandwidth as unidirectional.
    **The Rationale:** Candidates fail to correctly apply bidirectional specifications, underestimating actual link capacity.
    **The Consequence:** Incorrect analytical models for AllReduce timing, leading to flawed distributed training architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 26GB.
    2. **Calculations:**
       - PCIe 5.0: 64GB/s bidir (32GB/s per direction).
       - NVLink 4.0: 900GB/s bidir (450GB/s per direction).
       - PCIe save time: 26GB / 32 GB/s = 812ms.
       - NVLink save time: 26GB / 450 GB/s = 57.8ms.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** PCIe is a major bottleneck for checkpoints; distributed saves over NVLink/RDMA are required.
