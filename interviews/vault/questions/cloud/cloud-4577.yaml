title: Checkpoint Overhead for Megatron on H100
scenario: A 175B parameter model trains in FP16 using Adam optimizer on H100 GPUs. Training state is saved every 4 hours to a shared file system providing exactly 100 GB/s write bandwidth.
question: Determine the time overhead percentage of checkpointing if training runs continuously and requires saving both weights and optimizer states.
details:
  realistic_solution: Adam requires 12 bytes/param (FP32 master weights, momentum, variance) + 2 bytes for FP16 weights = 14 bytes/param. Total state = 175B * 14 = 2.45 TB. Writing takes 2.45 TB / 100 GB/s = 24.5 seconds. Overhead over 4 hours (14400s) is 24.5 / 14400 = 0.17%.
  common_mistake: |
    **The Pitfall:** Only counting the FP16 model weights (2 bytes/param).
    **The Rationale:** Optimizer states, particularly Adam, have a massive memory footprint (master weights, momentum, variance) that must be saved.
    **The Consequence:** Underestimating checkpoint sizes and storage bandwidth requirements.
  napkin_math: |
    - Adam requires 12 bytes/param (FP32 master weights, momentum, variance) + 2 bytes for FP16 weights = 14 bytes/param.
    - Total state = 175B * 14 = 2.45 TB.
    - Writing takes 2.45 TB / 100 GB/s = 24.5 seconds.
    - Overhead over 4 hours (14,400s) = 24.5 / 14,400 = **0.17%**.
