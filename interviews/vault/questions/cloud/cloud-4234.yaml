title: GDPR Right to Erasure with DP Training
scenario: A user invokes GDPR Article 17 (right to erasure) requesting removal of
  their data from your trained LLM. The model was trained with DP-SGD at ε=5. Does
  DP training satisfy the erasure requirement? If not, what's the cost of machine
  unlearning (retraining from scratch without that user's data) for a 13B parameter
  model, and what alternatives exist?
question: Does DP-SGD at ε=5 satisfy GDPR erasure, and if not, what does 13B retraining
  cost and what unlearning alternatives exist?
details:
  realistic_solution: 'Three approaches: (1) Full retrain: remove the user''s data
    and retrain from scratch. For a 13B model: ~2,000 H100-hours × $3.50/hr = $7,000
    per erasure request. If 1% of users (100K) request erasure annually, this costs
    $700M — infeasible. (2) Approximate unlearning (machine unlearning): fine-tune
    the model to ''forget'' the specific user''s contribution. Methods: gradient ascent
    on the user''s data for a few steps (reverses the training influence). Cost: ~10
    minutes on 8× H100 = $4.67 per request. Risk: may not fully remove influence,
    and repeated unlearning degrades model quality. (3) SISA (Sharded, Isolated, Sliced,
    and Aggregated) training: partition training data into k shards, train k sub-models,
    ensemble for inference. Erasure only requires retraining the shard containing
    the user''s data. Cost: 1/k of full retrain. With k=100: $70 per request. Trade-off:
    ensemble inference is k× more expensive. (4) DP argument (ε=5): present to the
    DPA that the model provably cannot distinguish whether the user''s data was included.
    May satisfy some regulators but not all.'
  common_mistake: Claiming DP-SGD automatically satisfies right to erasure because
    'the model didn't memorize individual data.' DP provides plausible deniability
    about whether a specific record was in the training set, but it doesn't remove
    the record's influence — the model's weights were still shaped by that data. Legal
    interpretations vary, and most DPAs (Data Protection Authorities) consider DP
    a mitigation, not a substitute for erasure.
  napkin_math: 'Full retrain: 13B model, 1T tokens, 8× H100 for 250 hrs = 2,000 GPU-hrs
    × $3.50 = $7,000. Gradient ascent unlearning: 100 steps × 13B params × batch=1
    ≈ 10 minutes on 8× H100 = 8 × (10/60) × $3.50 = $4.67. SISA (k=100): retrain 1
    shard = $70. Inference overhead: 100 sub-models × 13B = 1.3T params at inference
    — use distillation to compress ensemble into one model periodically. At 1,000
    erasure requests/year: full retrain = $7M, gradient ascent = $4,670, SISA = $70K.
    Winner: gradient ascent if legally acceptable, SISA if not.'
