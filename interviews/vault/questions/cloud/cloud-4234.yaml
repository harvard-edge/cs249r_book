title: GDPR Right to Erasure with DP Training
scenario: A user invokes GDPR Article 17 (right to erasure) requesting removal of their data from your trained LLM. The model was trained with DP-SGD at ε=5.
question: Does DP-SGD at ε=5 satisfy GDPR erasure, and if not, what does 13B retraining cost and what unlearning alternatives exist?
details:
  realistic_solution: 'Three approaches: (1) Full retrain: remove the user''s data and retrain from scratch. For a 13B model: ~2,000 H100-hours × $3.50/hr = $7,000 per erasure request. If 1% of users (100K) request erasure annually, this costs $700M — infeasible. (2) Approximate unlearning (machine unlearning): fine-tune the model to ''forget'' the specific user''s contribution. Methods: gradient ascent on the user''s data for a few steps (reverses the training influence). Cost: ~10 minutes on 8× H100 = $4.67 per request. Risk: may not fully remove influence, and repeated unlearning degrades model quality. (3) SISA (Sharded, Isolated, Sliced, and Aggregated) training: partition training data into k shards, train k sub-models, ensemble for inference. Erasure only requires retraining the shard containing the user''s data. Cost: 1/k of full retrain. With k=100: $70 per request. Trade-off: ensemble inference is k× more expensive. (4) DP argument (ε=5): present to the DPA that the model provably cannot distinguish whether the user''s data was included. May satisfy some regulators but not all.'
  common_mistake: |
    **The Pitfall:** Claiming DP-SGD automatically satisfies the right to erasure.
    **The Rationale:** DP guarantees that the model didn't explicitly memorize individual data points, offering plausible deniability.
    **The Consequence:** Misinterpreting legal requirements. DP is a privacy mitigation, not a substitute for erasure. The data's influence still shaped the model's weights, violating strict GDPR interpretations.
  napkin_math: |
    * Full retrain: 13B model on 35B tokens = 2,000 H100-hours × $3.50 = $7,000 per erasure.
    * Gradient ascent unlearning: 100 steps × 13B params ≈ 10 mins on 8× H100 = $4.67.
    * SISA (Sharded, Isolated, Sliced, Aggregated, k=100): Retrain 1 shard = $70.
    * **At 1,000 erasure requests/year: Full retrain costs $7M, SISA costs $70K, and gradient ascent costs $4,670.**
