title: Exposure Bias and Position Debiasing in Ranking Models
scenario: A ranking model trained on click data shows that items ranked position 1-3 have CTR 5x higher
  than position 10-15 even after controlling for relevance. The model perpetuates this by ranking historically
  top-positioned items higher. Diagnose and fix the position bias.
details:
  realistic_solution: 'Position debiasing methods: (1) Inverse Propensity Scoring (IPS): weight each training
    example by the inverse probability of it being shown at its position. P(click | position k) includes
    position bias propensity p_k. Unbiased estimate: weight = 1 / p_k. Learn p_k from randomized experiments:
    randomly shuffle position of a small % of traffic (1-5%). Estimated click rate at each position relative
    to a reference position gives p_k. (2) PAL (Position-Aware Learning): train a two-tower model where
    one tower predicts the position-free relevance and the position bias is modeled separately. Position
    tower outputs a bias score; final score = relevance * position_bias. At serving: set position bias
    = 1 for all items (simulate position 1 for all). (3) Counterfactual logging: log the position-adjusted
    features with each training example. Use offline debiasing during model training via weighted loss.
    (4) Randomized holdout: 2% of requests use randomized ranking for data collection. These examples
    have unbiased click labels.'
  common_mistake: Adding position as a feature to the model to 'control' for it. Adding position as a
    feature at training time means the model learns to use position as a signal for relevance, since clicks
    are correlated with position. At serving time, all items start at position 0, creating a distribution
    shift.
  napkin_math: 'Position bias examination: CTR at position 1 = 10%, position 10 = 2%. Naive ratio: 5x.
    Click propensity p_k (estimated from randomization): p_1 = 0.8 (80% of relevant items clicked at pos
    1), p_10 = 0.2. IPS weight at position 1: 1/0.8 = 1.25. IPS weight at position 10: 1/0.2 = 5. After
    IPS reweighting: position 10 examples contribute 4x more to loss. This corrects for position bias
    in training. Estimated debiased CTR at position 10: 2% / 0.2 = 10% (same as position 1 after debiasing).
    If debiased CTR is lower: item is genuinely less relevant, not just position-disadvantaged.'
