title: Diagnosing Low Compute Utilization in Autoregressive Generation
scenario: You are profiling a 1.5B parameter language model performing autoregressive generation (batch
  size 1) on a single NVIDIA A100 GPU (312 TFLOPs FP16 compute, 2.0 TB/s HBM bandwidth). The profiler
  shows GPU compute utilization hovering around 5%, but memory bandwidth utilization is consistently near
  90%. A junior engineer suggests upgrading to an H100 to get more TFLOPs and reduce latency. How do you
  analyze this bottleneck and what should be the actual optimization strategy?
question: "How do you analyze this bottleneck and what should be the actual optimization strategy?"
details:
  realistic_solution: Diagnose the workload as strictly memory-bandwidth bound due to the low arithmetic
    intensity of batch=1 generation. TFLOP upgrades will provide zero benefit. The correct strategy is
    to reduce memory traffic via weight quantization (e.g., INT8/INT4) or increase arithmetic intensity
    by processing larger batch sizes concurrently.
  common_mistake: Assuming low compute utilization implies a CPU bottleneck or inefficient kernels, and
    mistakenly recommending increased compute capacity or structural sparsity to reduce FLOPs.
  napkin_math: Loading 1.5B FP16 parameters takes 3GB of memory read. Time = 3 GB / 2000 GB/s = 1.5ms
    per token. The compute needed is ~3 GFLOPs. Compute time = 3 GFLOPs / 312,000 GFLOP/s = 0.0096ms.
    Arithmetic Intensity = 1 FLOP/byte. A100 ridge point = 312,000 / 2,000 = 156 FLOPs/byte. 1 << 156,
    heavily memory bound.
