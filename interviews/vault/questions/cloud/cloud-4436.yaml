title: Adapter Versioning and Rollback in Production ML Systems
scenario: A production system serving 100 LoRA adapters rolls out new adapter updates weekly. A deployment of adapter v23 causes a 5% increase in user complaint rate.
question: How would you design adapter versioning and rollback so a bad LoRA adapter v23 can revert to v22 within 5 minutes?
details:
  realistic_solution: 'Adapter versioning system: (1) Object store (S3/GCS) stores all adapter versions in serialized format (safetensors): ~4MB per adapter per version. 100 adapters * 10 versions = 1GB storage, trivial cost. (2) Serving system maintains in-memory adapter cache and version manifest JSON. (3) Rollback API: PATCH /adapters/{adapter_id}/active_version triggers: (a) Load v22 from S3 to serving node CPU memory (4MB, <100ms over 10 Gbps), (b) Hot-swap in GPU memory via paged adapter swapping, (c) Update version manifest, (d) Emit rollback metrics. Total rollback time: S3 fetch 100ms + CPU-GPU copy 4ms + manifest update 1ms = <200ms. For 5-minute SLA: metric anomaly detection (1min) + triage (2min) + rollback execution (0.2min) = 3.2min. Feasible. (4) Blue-green adapter deployment: run v22 and v23 on separate pods, route 1% traffic to v23, automated canary analysis for 24h before full rollout.'
  common_mistake: |
    **The Pitfall:** Storing only the latest version of each adapter and relying on retraining to recover previous versions.
    **The Rationale:** Treating adapters purely as ephemeral weights rather than versioned production artifacts.
    **The Consequence:** Rollbacks take hours instead of minutes, violating SLAs and prolonging incident impact.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Adapter Size: ~4MB per version.
       - Network: 10 Gbps. PCIe 4.0 x16 (32 GB/s).
       - Rollback SLA: 5 minutes.
    2. **Calculations:**
       - S3 Download: 4MB / 1.25GB/s (10 Gbps) = ~3.2ms.
       - PCIe Transfer: CPU-to-GPU 4MB / 32 GB/s = 0.125ms.
       - Hot-Swap Total: Fetch + Transfer + Manifest update is strictly < 50ms.
       - Incident SLA: Metric anomaly (1min) + Triage (2min) + Rollback (0.1min) = 3.1min.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound Agility.** Storing versioned adapters in S3 enables sub-50ms mechanical hot-swaps, easily meeting a 5-minute incident SLA.
