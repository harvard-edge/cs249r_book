title: The TOPS/W Efficiency Metric
scenario: Define the metric TOPS/W. Why is this a critical metric for a datacenter architect managing
  a large fleet of thousands of GPUs?
details:
  realistic_solution: TOPS/W stands for Tera-Operations Per Second per Watt. It is a metric of energy
    efficiency, quantifying how much computational throughput an accelerator delivers for every watt of
    power it consumes.
  common_mistake: A common misconception is that TOPS/W is primarily a concern for power-constrained environments
    like mobile or edge devices. Engineers sometimes fail to recognize its massive economic impact at
    datacenter scale, where power and cooling dominate operational expenditures (OpEx).
  napkin_math: '1. Take an NVIDIA H100 with 989 TFLOPS (FP16) and a TDP of 700W.

    2. TOPS/W (or TFLOPS/W) = 989 TFLOPS / 700 W = 1.41 TFLOPS/W.

    3. For a 10,000-GPU cluster, you get 9.89 ExaFLOPS of peak compute at the cost of 7 Megawatts (7,000,000
    W) just for the GPUs.

    Optimizing TOPS/W directly cuts down that massive 7 MW power bill and cooling requirement.'
  options:
  - It's a measure of peak performance, and higher is always better.
  - It's primarily a concern for battery-powered mobile devices, not datacenters.
  - It measures compute efficiency, which directly impacts power and cooling costs at scale.
  - It defines the maximum thermal output a GPU can sustain before throttling.
  correct_index: 2
