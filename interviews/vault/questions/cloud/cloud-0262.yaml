title: The TOPS/W Efficiency Metric
scenario: Define the metric TOPS/W.
question: What does TOPS/W mean, and why is it critical for a datacenter architect managing thousands of GPUs?
details:
  realistic_solution: TOPS/W stands for Tera-Operations Per Second per Watt. It is a metric of energy efficiency, quantifying how much computational throughput an accelerator delivers for every watt of power it consumes.
  common_mistake: |
    **The Pitfall:** Assuming TOPS/W is primarily a concern for power-constrained mobile or edge devices.
    **The Rationale:** Engineers sometimes fail to recognize the massive economic impact of power efficiency at datacenter scale.
    **The Consequence:** Designing clusters that hit thermal walls or bankrupt the project due to astronomical power and cooling OpEx.
  napkin_math: |
    1. NVIDIA GPU with 989 TFLOPS (FP16) and a TDP of 700W.
    2. TOPS/W = 989 / 700 = 1.41 TFLOPS/W.
    3. For a 10,000-GPU cluster, peak compute is 9.89 ExaFLOPS at 7 Megawatts (7,000,000 W) just for GPUs.
    **Optimizing TOPS/W directly slashes the multi-megawatt power and cooling costs.**
  options:
  - It's a measure of peak performance, and higher is always better.
  - It's primarily a concern for battery-powered mobile devices, not datacenters.
  - It measures compute efficiency, which directly impacts power and cooling costs at scale.
  - It defines the maximum thermal output a GPU can sustain before throttling.
  correct_index: 2
