title: Optimizing Inter-GPU Communication for Distributed LLM Training on NVIDIA H100s
scenario: You are tasked with designing a distributed training infrastructure for a large language model
  (LLM) that will utilize a cluster of NVIDIA H100 GPUs. Each H100 is equipped with 80 GB of HBM3 memory,
  delivers 989 TFLOPS of FP16 dense performance, and boasts an impressive memory bandwidth of 3.35 TB/s,
  while consuming up to 700W. The LLM requires frequent, large-volume gradient synchronization and model
  updates across the cluster, which is distributed across multiple nodes. Your primary challenge is to
  design the network and communication strategy to ensure inter-GPU communication overhead does not become
  the bottleneck, thereby maximizing the utilization of the H100s' immense computational power and memory
  bandwidth. Describe your architectural choices for networking and data movement between GPUs.
details:
  realistic_solution: The optimal solution involves implementing a high-performance interconnect utilizing
    RDMA (Remote Direct Memory Access), such as RoCE (RDMA over Converged Ethernet) or InfiniBand, coupled
    with kernel bypass techniques. This allows GPUs to directly read from or write to the memory of other
    GPUs or network adapters without any CPU intervention (zero-copy networking). Libraries like NVIDIA
    NCCL (for collective communication primitives) or OpenMPI with UCX (Unified Communication X) framework,
    which are optimized for RDMA, should be employed. This architecture significantly reduces communication
    latency, increases effective bandwidth, and frees up CPU cycles, enabling the H100s to operate closer
    to their peak performance for large-scale distributed training workloads.
  common_mistake: A common mistake is to rely on standard TCP/IP sockets for inter-GPU communication.
    This approach often involves the CPU in data movement, protocol processing, and memory copies (GPU
    memory -> Host memory -> Network buffer -> Host memory -> GPU memory on receiving side). This CPU
    involvement creates significant overhead, adds latency, and severely limits the effective bandwidth,
    leading to underutilization of the H100s' high computational and memory capabilities.
  napkin_math: Consider a data-parallel training setup for an LLM with 100 billion FP16 parameters. A
    full gradient update for synchronization is approximately 200 GB (100 billion params * 2 bytes/param).
    If the training requires a gradient synchronization phase to complete within 500 ms (0.5 seconds)
    per iteration to maintain desired throughput, the minimum required effective network bandwidth is
    200 GB / 0.5 s = 400 GB/s. A single 100Gbps Ethernet link offers a theoretical maximum of 12.5 GB/s.
    Even with multiple such links, without RDMA, the CPU overhead for these transfers will drastically
    reduce the *effective* bandwidth far below theoretical limits. In contrast, 400Gbps InfiniBand (50
    GB/s) with RDMA and kernel bypass can achieve much higher effective bandwidths, making it feasible
    to reach the 400 GB/s aggregated bandwidth across many links and nodes.
