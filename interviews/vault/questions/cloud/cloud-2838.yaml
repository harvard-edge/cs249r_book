title: Cloud New 0032
scenario: PyTorch 2.0 introduced `torch.compile`, changing how PyTorch runs Python code.
question: What is JIT compilation, and how does it differ from AOT compilation in PyTorch-style ML workloads?
details:
  realistic_solution: Just-In-Time (JIT) compilation analyzes and compiles the computational graph at runtime (during the first few execution steps), tailoring the generated machine code to the specific input shapes encountered. Ahead-Of-Time (AOT) compilation requires compiling the model graph completely into a static binary or library before the program is ever run.
  common_mistake: |
    **The Pitfall:** Confusing JIT compilation with standard interpreted execution.
    **The Rationale:** Developers coming from raw eager Python often conflate "running without prior compilation" with standard line-by-line interpretation.
    **The Consequence:** Misunderstanding the initial compile-time overhead spike caused by a JIT tracer on step 1.
  napkin_math: |
    1. Assume JIT compiles a graph taking 5s initially.
    2. A single training step drops from 100ms to 80ms due to fusion.
    3. **Result: The 20ms savings pays off the 5s compile time after just 250 iterations.**
