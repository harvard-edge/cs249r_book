title: 'Dataset Curation: Optimize Streaming Data Pipeline Throughput for H100 Training'
scenario: Your 256 H100 training job is GPU-starved: GPUs run at 9% MFU instead of expected 45%. Profiling shows DataLoader workers are the bottleneck — each H100 waits 180ms per batch vs 45ms compute. Your dataset is 2TB stored on distributed NFS.
question: What is starving the 256-H100 training job, and how would you fix the DataLoader and storage path to recover the expected MFU?
details:
  realistic_solution: 'Bottleneck is NFS I/O: 256 GPUs × 1 batch/45ms = 5,689 batches/second. Each batch = 512 sequences × 2048 tokens × 4 bytes = 4MB. Bandwidth needed: 5,689 × 4MB = 22.7 GB/s. NFS likely capped at 10 GB/s. Fix: pre-tokenize and shard data to local NVMe SSDs per node, use memory-mapped files, prefetch 3 batches ahead.'
  common_mistake: |
    **The Pitfall:** Adding more DataLoader workers without diagnosing the bottleneck.
    **The Rationale:** Engineers assume CPU core starvation is always the root cause of data loading stalls.
    **The Consequence:** Adding workers against an I/O bottleneck (like an overwhelmed NFS) only increases contention, failing to recover the expected MFU.
  napkin_math: |
    - **Current step:** 180ms wait + 45ms compute = 225ms.
    - **GPU utilization:** 45ms / 225ms = 20%. MFU = 45% * 20% = 9%.
    - **Fix (Local NVMe):** 6.4 GB/s per node. 8 GPUs read 4MB each = 32MB per node.
    - **I/O time:** 32MB / 6.4 GB/s = 5ms.
    - **Prefetching:** Hides the 5ms completely. New batch time = 45ms.
    - **Speedup:** 225ms / 45ms = **5x faster wall time**.
    - **Monthly savings:** 256 H100s * $3/hr * 720hr * (1 - 9/45) = **$442K saved**.
