title: Multi-Tenant GPU Scheduling with SLO Guarantees
scenario: 'You operate a shared H100 (80GB HBM3, 700W) cluster with 200 GPUs. You have two tenant classes:
  Tenant A (latency-sensitive inference, SLO: p99 < 50ms, 30% of cluster) and Tenant B (batch training,
  best-effort, 70% of cluster). Design a scheduling system that guarantees Tenant A''s SLO while maximizing
  Tenant B''s GPU utilization.'
question: "How would you schedule the 200-GPU shared H100 cluster to guarantee Tenant A's p99 < 50ms inference SLO while maximizing Tenant B utilization?"
details:
  realistic_solution: 'Use MIG (Multi-Instance GPU) to carve 30% of GPUs into 3g.40gb MIG slices for Tenant
    A — guaranteed memory isolation and predictable latency. Reserve 140 GPUs for Tenant B training. Use
    a priority preemption policy: if Tenant A demand spikes, preempt Tenant B jobs with checkpoint-resume.
    Monitor p99 latency with 5s rolling window and trigger scaling at p95>40ms.'
  common_mistake: Using time-sliced GPU sharing for both tenants. GPU time-slicing adds context switch
    overhead (1-3 ms per switch on H100) and does not provide memory isolation. Tenant B's large training
    batches consume HBM3, causing Tenant A's inference kernels to stall on memory pressure.
  napkin_math: 'Tenant A SLO: p99 < 50 ms. Inference latency on H100 MIG 3g.40gb (40 GB HBM3, ~1.6 TB/s
    bandwidth): ~5-15 ms for 7B model at batch=1. Headroom = 50 - 15 = 35 ms. Context switch overhead
    with time-slice: 2 ms per 10 ms quantum = 20% overhead → effective latency budget consumed before
    inference begins. MIG eliminates this overhead entirely.'
