title: GPU Sizing for 70B Model Sharding
scenario: You are deploying a 70-billion parameter LLM in FP16 precision for inference on a cluster featuring A10G GPUs (24GB VRAM each). Your target batch size and context length require an additional 20GB of total VRAM combined across the deployment for the KV cache and intermediate activations.
question: How many A10G GPUs are required to tensor-shard the 70B FP16 LLM with 20GB total KV cache and activation memory?
details:
  realistic_solution: Calculate the total required memory footprint (160GB) and divide by the GPU capacity (24GB) to find the absolute capacity minimum (7 GPUs). Then, round up to the nearest power of 2 (8 GPUs) to ensure high-performance Tensor Parallelism communication and provide safety headroom.
  common_mistake: |
    **The Pitfall:** Only dividing weight memory by GPU capacity, or ignoring power-of-2 constraints.
    **The Rationale:** Candidates forget KV cache overhead and overlook the fact that Tensor Parallelism requires power-of-2 GPU counts for efficient communication topologies.
    **The Consequence:** Deploying on 6 or 7 GPUs, leading to severe network bottlenecks or immediate OOM errors.
  napkin_math: |
    - 1. Calculate weight memory: 70B parameters * 2 bytes/param (FP16) = 140 GB.
    - 2. Calculate total memory needed: 140 GB (weights) + 20 GB (KV/activations) = 160 GB.
    - 3. Calculate minimum GPUs by capacity: 160 GB / 24 GB/GPU = 6.66 GPUs (requires 7).
    - 4. Determine optimal TP size: Round 7 up to the nearest power of 2 for Tensor Parallelism = **8 GPUs**.
