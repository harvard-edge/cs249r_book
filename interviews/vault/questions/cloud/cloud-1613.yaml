title: GPU Sizing for 70B Model Sharding
scenario: You are deploying a 70-billion parameter LLM in FP16 precision for inference on a cluster featuring
  A10G GPUs (24GB VRAM each). Your target batch size and context length require an additional 20GB of
  total VRAM combined across the deployment for the KV cache and intermediate activations. Calculate the
  minimum number of GPUs required to shard this model using Tensor Parallelism, accounting for both memory
  capacity and optimal network communication topologies.
details:
  realistic_solution: Calculate the total required memory footprint (160GB) and divide by the GPU capacity
    (24GB) to find the absolute capacity minimum (7 GPUs). Then, round up to the nearest power of 2 (8
    GPUs) to ensure high-performance Tensor Parallelism communication and provide safety headroom.
  common_mistake: Candidates often only divide the weight memory by the GPU capacity (140GB / 24GB = 5.8
    GPUs) and suggest 6 GPUs, forgetting to allocate space for the KV cache or ignoring that Tensor Parallelism
    highly favors power-of-2 GPU counts for efficient all-reduce operations.
  napkin_math: 'Weights: 70B params * 2 bytes/param (FP16) = 140 GB.

    Total memory needed: 140 GB + 20 GB (KV cache & acts) = 160 GB.

    Minimum GPUs by capacity: 160 GB / 24 GB/GPU = 6.66 GPUs (requires 7).

    Optimal TP size (power of 2) -> 8 GPUs.

    Total capacity: 8 * 24 = 192 GB (safe 32GB buffer).'
