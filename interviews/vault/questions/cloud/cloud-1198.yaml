title: 'DLRM Embedding Sharding Strategy'
scenario: 'You are designing the distributed training architecture for a Deep Learning Recommendation Model (DLRM). The model features a massive 200GB sparse embedding table for user IDs and four smaller 5GB embedding tables for contextual features. Your hardware target is a single node with 8x A100 (80GB) GPUs connected via NVLink.'
question: 'How would you shard the 200GB user table and four 5GB tables across 8x80GB A100s to maximize DLRM throughput without OOM?'
details:
  realistic_solution: 'Implement a hybrid sharding approach: employ row-wise sharding for the massive 200GB user ID table to distribute its memory footprint evenly across all 8 GPUs (25GB/GPU), while using table-wise sharding (or data parallelism) for the four smaller 5GB tables. This minimizes the all-to-all communication volume (only the large table requires cross-GPU coordination) while keeping maximum per-GPU memory at 30GB, leaving 50GB for activations and dense layers.'
  common_mistake: |
    **The Pitfall:** Defaulting to row-wise sharding for all tables.
    **The Rationale:** Candidates assume uniform sharding is always best without considering the communication overhead of smaller tables.
    **The Consequence:** Creates severe all-to-all communication bottlenecks for the small tables, or attempts to replicate the 200GB table which exceeds single-GPU memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 8x A100 80GB GPUs.
    - User ID Table: 200 GB.
    - Context Tables: 4 x 5 GB = 20 GB.

    **Calculations:**
    - Row-wise user table: 200 GB / 8 GPUs = 25 GB/GPU.
    - Table-wise context tables: Place one 5 GB table entirely on GPU 0, 1, 2, and 3.
    - Max memory footprint per GPU: 25 GB (user shard) + 5 GB (context table) = 30 GB.
    - Remaining VRAM: 80 GB - 30 GB = 50 GB for activations/dense layers.

    **Conclusion & Interpretation:**
    - **Result: Memory/Communication Bound**. Hybrid sharding keeps max VRAM at 30GB while dramatically reducing all-to-all communication volume compared to naively row-sharding all five tables.
