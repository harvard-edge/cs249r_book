title: Architecture Choice Drives Serving Cost
scenario: You must serve 10,000 QPS of text generation at P99 < 500ms with equivalent quality.
question: Which architecture minimizes $/query between a dense 70B transformer vs a 47B-parameter MoE (8x7B, top-2) vs a 70B-equivalent SSM?
details:
  realistic_solution: 'Dense 70B: 140 GB (BF16) — needs 2× H100 (80GB each) for weights alone, plus KV cache. Per-token FLOPs: ~140 TFLOPs. Memory-bound during decode. MoE 8×7B (top-2): 94 GB weights — also 2× H100, but per-token FLOPs ~26 TFLOPs (13B active). Decode is 5× cheaper in compute, but same memory-bound decode bottleneck (weights still need to be in HBM). The catch: all 47B params must reside in HBM even though only 13B are active per token — poor HBM utilization. SSM 70B-equiv: 140 GB weights, but NO KV cache — fixed-size state (~MBs). Decode is still a weight-limited matmul-per-token, but can batch far more concurrent requests (no KV cache memory). Winner for throughput: SSM (highest batch size → best GPU utilization). Winner for $/query at moderate batch: MoE (fewer FLOPs per token). Dense is most expensive.'
  common_mistake: |
    **The Pitfall:** Only comparing parameter counts without considering per-token compute, memory requirements, and hardware utilization.
    **The Rationale:** It is tempting to assume that serving costs scale linearly with total parameter count.
    **The Consequence:** Misjudging serving costs by ignoring the active parameter count (MoE) or the massive KV cache memory bottlenecks (Dense vs SSM).
  napkin_math: |
    - **Dense 70B:** 2x H100, batch 16 (KV cache limited), ~320 tokens/s. Cost per hour = 2 * $3 = $6/hr. Per M tokens: $6/hr / (320 * 3600) * 1e6 = **$5.21/M tokens**.
    - **MoE 8x7B (47B total, 13B active):** 2x H100, batch 16 (weight memory limited), ~800 tokens/s. Per M tokens: $6/hr / (800 * 3600) * 1e6 = **$2.08/M tokens**.
    - **SSM 70B-equiv:** 2x H100, batch 256+ (no KV cache), ~2000 tokens/s. Per M tokens: $6/hr / (2000 * 3600) * 1e6 = **$0.83/M tokens**.
    - **Conclusion:** Ranking: SSM ($0.83/M) < MoE ($2.08/M) < Dense ($5.21/M).
