title: Evaluating AVX-512 VNNI for Custom Kernels
scenario: You are serving a custom Transformer encoder (12 layers, hidden size 768) on AWS c7i.16xlarge
  instances (Intel Sapphire Rapids). To hit a strict 15ms latency budget, you quantized the weights to
  INT8. However, naive compilation of your custom attention kernel using standard C++ auto-vectorization
  yielded only a 1.2x speedup over FP32, missing the theoretical 4x peak. Evaluate the architectural trade-offs
  between implementing explicit AVX-512 VNNI (Vector Neural Network Instructions) intrinsics for your
  custom kernel versus refactoring the model to use standard standard operators backed by optimized BLAS
  libraries like oneDNN.
question: "Should you hand-write AVX-512 VNNI intrinsics for the custom INT8 attention kernel or refactor to oneDNN-backed operators, and why?"
details:
  realistic_solution: Refactoring to use oneDNN is typically preferred for long-term maintainability and
    hardware portability. However, if the custom fused operator provides necessary memory-bandwidth savings,
    explicit AVX-512 VNNI intrinsics must be written. VNNI computes a 4-element INT8 dot product and accumulates
    into a 32-bit register in a single instruction, fully utilizing the 512-bit vector lanes while preventing
    INT8 overflow.
  common_mistake: Assuming INT8 quantization automatically provides a 4x throughput increase on CPUs without
    verifying that the compiler actually emits specialized dot-product instructions (like VNNI's VPDPBUSD)
    rather than generic scalar or unoptimized shift-and-add sequences.
  napkin_math: FP32 AVX-512 processes 16 elements per instruction (512 bits / 32 bits = 16). INT8 VNNI
    processes 64 elements (512 bits / 8 bits = 64) with a fused multiply-add. If the original FP32 compute
    kernel took 20ms (compute-bound), VNNI increases raw MAC throughput by 4x, reducing compute time to
    ~5ms and safely clearing the 15ms SLA.
