title: 'Kernel Fusion: Mastery — Fusion Impact Analysis for Autoregressive Decode'
scenario: You are analyzing kernel fusion impact for 7B LLM autoregressive decode on H100 (80GB HBM3,
  3.35 TB/s). Decode is batch=1, seq=1 (single token generation). Profile shows 60% of decode time is
  in elementwise ops (LayerNorm, GELU, residuals, rotary embeddings). Design and quantify a fusion strategy
  for decode mode.
details:
  realistic_solution: 'Decode bottleneck: loading 7B × 2B = 14GB model weights per forward pass. At H100
    3.35 TB/s: 14GB / 3.35TB/s = 4.2ms minimum. Elementwise ops run on the tiny (1 × hidden_dim) activation
    tensors — their memory bandwidth is negligible vs weight loading. Fusion helps by eliminating kernel
    launch overhead, not bandwidth.'
  common_mistake: Applying prefill-optimized fusion strategies to decode — different bottleneck structure.
    Decode is dominated by weight loading (memory-bound), not compute.
  napkin_math: '7B model decode, batch=1. Weight memory: 14GB loaded per token. At 3.35 TB/s: 4.2ms/token
    → 238 tokens/sec theoretical. Current: 4.2ms / 0.38 MFU interpretation for decode: actually 4.2ms
    is already the memory bandwidth limit. Elementwise ops on 1 × 4096 activations: 4096 × 2B = 8KB. 60%
    time in elementwise: 0.6 × 4.2ms = 2.5ms (as claimed — but this can''t be right if weights are 14GB).
    Re-check: 60% of time in elementwise on batch=1 likely means 60% of kernel launch count, not time.
    Actual elementwise HBM traffic: 32 layers × 6 elementwise ops × 8KB = 1.5MB → 1.5MB / 3.35TB/s = 0.45µs.
    Fusion benefit: eliminate 32×6 = 192 kernel launches × 3µs = 576µs = 0.58ms. New decode: 4.2ms - 0.58ms
    = 3.62ms → 276 tokens/sec. 16% throughput improvement purely from reduced kernel launch overhead.'
