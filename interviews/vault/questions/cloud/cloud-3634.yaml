title: 'RDMA Transport Fluency: IB Verbs API Key Operations'
scenario: A junior distributed systems engineer needs to implement a simple RDMA message passing system using InfiniBand Verbs API.
question: How would you implement basic InfiniBand Verbs message passing, and what does zero-copy mean in that RDMA path?
details:
  realistic_solution: 'Setup: (1) ibv_alloc_pd() → Protection Domain (security isolation). (2) ibv_reg_mr(pd, buffer, size, flags) → Memory Registration (pins pages, gets lkey/rkey). (3) ibv_create_qp(pd, &attr) → Queue Pair (send/recv engines). (4) Exchange QPN+rkey out-of-band (TCP). (5) ibv_modify_qp() → INIT→RTR→RTS state transitions. Operation: ibv_post_send() posts WR (Work Request) to HCA. HCA asynchronously DMAs data to remote. ibv_poll_cq() polls Completion Queue for completion. Zero-copy: data goes directly from registered buffer to NIC without intermediate kernel buffer copy. CPU is not in the data path after posting the WR.'
  common_mistake: |
    **The Pitfall:** Confusing `ibv_post_send` with actually sending data synchronously.
    **The Rationale:** Engineers used to standard POSIX sockets expect the send function to block or indicate data movement, rather than just posting an asynchronous work request.
    **The Consequence:** Writing incorrect synchronization logic that assumes data has arrived before the NIC has actually processed the asynchronous DMA transfer.
  napkin_math: |
    1. RDMA Write throughput: 25GB/s (200Gbps IB).
    2. TCP throughput same link: ~20GB/s but with 2x memory copies (kernel buffer).
    3. CPU cycles saved: 2 * 25GB/s / 16B/cycle / 3GHz CPU = 1.04 CPU cores continuously just for copies.
    4. Zero-copy frees that core.
    **Zero-copy saves over 1 CPU core worth of pure memory-copy overhead at 200Gbps.**
