title: CNN Layer Compute and Memory Sizing
scenario: 'You are deploying a satellite imagery CNN inference pipeline on an NVIDIA L4 GPU. The model ingests high-resolution 1024x1024x3 RGB tiles. The very first layer is a 7x7 spatial convolution with a stride of 2 and 64 output channels (similar to a standard ResNet stem).'
question: For one 1024x1024x3 tile, what are the MACs and FP16 output feature-map footprint of the 7x7 stride-2, 64-channel convolution?
details:
  realistic_solution: 'First, calculate the output spatial dimensions: 1024 / 2 = 512. The output tensor is 512x512x64. In FP16 (2 bytes per element), this activation tensor consumes roughly 33.5 MB of memory. For compute, multiply the output volume by the inner product of the convolution (K^2 * C_in): 512 * 512 * 64 * 7 * 7 * 3, which equals approximately 2.46 billion MAC operations.'
  common_mistake: |
    **The Pitfall:** Failing to account for the spatial reduction caused by the stride.
    **The Rationale:** Candidates assume a 1024x1024 output, or they calculate the parameter size (~9.4 KB) instead of the output activation tensor size.
    **The Consequence:** Overestimating memory requirements or drastically miscalculating the arithmetic intensity of the stem layer.
  napkin_math: |
    - **Output dimensions:** Stride 2 reduces 1024x1024 to 512x512.
    - **Output volume:** 512 * 512 * 64 channels = 16,777,216 elements.
    - **Memory footprint:** 16.77M elements * 2 bytes (FP16) = ~33.55 MB.
    - **MAC operations:** Output elements * (K_h * K_w * C_in) = 16,777,216 * (7 * 7 * 3).
    - **Conclusion:** **Total Compute is 16,777,216 * 147 = 2.46 GMACs.**
