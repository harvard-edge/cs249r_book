title: Gradient Accumulation in LoRA Training Stability
scenario: A LoRA fine-tuning run shows loss instability and gradient explosions after
  500 steps despite using AdamW. The batch size is 4 with gradient accumulation over
  16 steps. Diagnose the issue.
question: What is causing the LoRA loss instability and gradient explosions after
  500 steps, and how would you mitigate it?
details:
  realistic_solution: 'LoRA gradient instability with high gradient accumulation often
    results from rank collapse: the low-rank matrices A and B align their singular
    vectors, causing the adapter update to concentrate on a single direction. Mitigation:
    (1) add LoRA dropout (0.1) to regularize adapter directions; (2) reduce accumulation
    steps (effective batch size too large for the rank), or use smaller learning rate
    with warmup; (3) initialize B to zero (standard LoRA) but verify this is not being
    overridden. Gradient clipping at 1.0 is essential for LoRA.'
  common_mistake: Increasing the learning rate to escape the plateau where loss instability
    appears. This worsens gradient magnitude, further destabilizing LoRA weight updates.
  napkin_math: 'Effective batch size: 4 × 16 = 64. LR for LoRA: typically 1e-4 to
    3e-4 (10x higher than full fine-tune). Gradient norm before clip: if >10, indicates
    rank collapse. Rank collapse condition: when singular values of AB concentrate
    ratio > 10:1. Monitor via SVD of adapter weights every 100 steps. Dropout 0.1
    on LoRA reduces rank collapse probability by ~40% empirically.'
