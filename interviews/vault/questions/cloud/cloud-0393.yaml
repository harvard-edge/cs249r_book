title: The Cross-Rack Communication Gap
scenario: When a GPU in one server rack needs to communicate with a GPU in another rack during a distributed
  training job, what is the *lowest latency* interconnect it can typically use, and what is its approximate
  latency?
details:
  realistic_solution: The correct interconnect for high-performance, cross-rack communication in an AI
    supercomputer is InfiniBand (specifically, technologies like NDR). Its latency is approximately 5,000
    ns (5 µs). While an order of magnitude slower than on-server interconnects like NVLink (~500 ns),
    it's designed for HPC workloads using protocols like RDMA (Remote Direct Memory Access) to minimize
    CPU overhead and achieve the lowest possible latency between servers.
  common_mistake: Engineers often recall that NVLink is the fastest GPU interconnect without considering
    its physical topology. NVLink is a proprietary, point-to-point connection for GPUs *within the same
    server node* (e.g., an HGX H100 baseboard). It cannot span across different servers or racks. Choosing
    NVLink confuses intra-node speed with inter-node networking capabilities.
  napkin_math: 'Using the ''human time'' analogy where 1 ns equals 1 second:'
  options:
  - NVLink 4.0 at ~500 ns
  - PCIe Gen5 at ~1,000 ns
  - InfiniBand NDR at ~5,000 ns
  - Cross-country Fiber at ~40,000,000 ns
  correct_index: 2
