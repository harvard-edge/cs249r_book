title: H100 Memory Bottleneck in LLM Element-wise Operations
scenario: You are profiling a large language model's inference pipeline on an NVIDIA H100 GPU. During a critical phase involving a sequence of element-wise operations (e.g., `ReLU`, `LayerNorm`, `Dropout`) applied to a large tensor of shape `[BATCH_SIZE, SEQUENCE_LENGTH, HIDDEN_DIM]`, you observe that GPU utilization hovers around 40-50%. Further profiling reveals that a significant portion of the execution time is consumed by repeated global memory transfers of intermediate results between these individual kernels, and the cumulative kernel launch overhead for these small operations. The H100 boasts 3.35 TB/s of HBM3 bandwidth and 989 TFLOPS of FP16 dense compute. Analyze and explain *why* these operations are memory-bound and why the H100's high compute capabilities are underutilized, focusing on the interplay between memory access patterns and kernel launch overhead.
question: Why are the H100 element-wise ops memory-bound, and how would you fuse them to reduce global memory traffic and kernel launch overhead?
details:
  realistic_solution: Develop a custom CUDA kernel that manually fuses these `ReLU`, `LayerNorm`, and `Dropout` operations into a single kernel. This approach eliminates intermediate global memory writes and reads, keeping data in registers or shared memory as much as possible. It also significantly reduces kernel launch overhead by executing a single, more complex kernel instead of multiple simple ones. Optimizing memory access patterns within the fused kernel (e.g., ensuring coalesced access) would further enhance bandwidth utilization.
  common_mistake: Overlooking the cumulative cost of global memory round-trips for intermediate tensors between unfused element-wise operations, incorrectly assuming that the H100's high FLOPs are the primary bottleneck, or not considering the significant impact of multiple small kernel launches on overall latency for fine-grained tasks.
  napkin_math: 'For a tensor of shape [64, 1024, 4096] in FP16 (2 bytes): Size = 64 × 1024 × 4096 × 2 = 536.8 MB. Unfused (3 ops: ReLU, LayerNorm, Dropout): each reads and writes the tensor. Total data movement = 3 ops × 2 (read+write) × 536.8 MB = 3.22 GB. At 3.35 TB/s, this takes 3.22 GB / 3350 GB/s = ~0.96 ms. Fused: reads once, writes once. Data = 2 × 536.8 MB = 1.07 GB. Time = 1.07 / 3350 = ~0.32 ms (a 3x speedup). Additionally, launching 3 kernels takes ~15 μs (3 × 5 μs), whereas 1 kernel takes 5 μs. For smaller batch sizes, the launch overhead becomes the primary bottleneck.'
