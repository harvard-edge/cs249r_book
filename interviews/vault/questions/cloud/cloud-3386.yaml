title: H100 Memory Bottleneck in LLM Element-wise Operations
scenario: 'You are profiling an LLM''s inference pipeline on an H100 GPU. During a sequence of element-wise operations (ReLU, LayerNorm, Dropout) applied to a tensor of shape [64, 1024, 4096], GPU utilization hovers around 40-50%. Profiling reveals significant time consumed by global memory transfers and cumulative kernel launch overheads.'
question: Why are the H100 element-wise operations memory-bound, and how would you fuse them to reduce global memory traffic and kernel launch overhead?
details:
  realistic_solution: "Develop a custom CUDA kernel or use Triton to manually fuse these ReLU, LayerNorm, and Dropout operations into a single kernel. This approach eliminates intermediate global memory writes and reads, keeping data in registers or shared memory as much as possible. It also significantly reduces kernel launch overhead by executing a single complex kernel instead of multiple simple ones. Optimizing memory access patterns (e.g., vectorized loads) further enhances bandwidth utilization."
  common_mistake: |
    **The Pitfall:** Overlooking the cumulative cost of global memory round-trips for intermediate tensors between unfused ops.
    **The Rationale:** Engineers assume the H100's massive FLOPs will power through, failing to consider the impact of multiple small kernel launches for fine-grained tasks.
    **The Consequence:** Leaving 50% of the GPU's compute capability underutilized due to severe memory bandwidth starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor shape: [64, 1024, 4096], FP16 (2 bytes).
       - 3 unfused operations: ReLU, LayerNorm, Dropout.
       - H100 Memory Bandwidth: 3.35 TB/s (3350 GB/s).
    2. **Calculations:**
       - Tensor Size: 64 * 1024 * 4096 * 2 bytes = 536.8 MB.
       - Unfused (3 ops): Each reads and writes. 3 ops * 2 * 536.8 MB = 3.22 GB. Time: 3.22 GB / 3350 GB/s ≈ 0.96 ms.
       - Fused: Reads once, writes once. 2 * 536.8 MB = 1.07 GB. Time: 1.07 GB / 3350 GB/s ≈ 0.32 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Pipeline.** Fusing the kernels provides a 3x speedup in memory I/O and eliminates ~10μs of launch overhead.
