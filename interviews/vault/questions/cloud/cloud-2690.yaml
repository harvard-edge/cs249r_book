title: Recursive Halving-Doubling vs Ring AllReduce
scenario: Explain how recursive halving-doubling achieves AllReduce in O(log N) steps compared to ring
  AllReduce's O(N) steps, and when each is preferred.
question: "How does recursive halving-doubling achieve AllReduce in O(log N) steps versus ring AllReduce's O(N), and when is each preferred?"
details:
  realistic_solution: 'Ring AllReduce: N nodes arranged in a ring. In 2(N-1) steps, each node sends/receives
    1/N of the data. Total data transferred per node: 2 × (N-1)/N × message_size ≈ 2S. Bandwidth-optimal
    (each link carries unique data), but requires 2(N-1) steps — high latency for large N. Recursive halving-doubling:
    In step 1, node pairs exchange half the data (halving). In step 2, the new groups of 4 exchange quarters.
    After log₂(N) steps, all nodes have the complete result. Total steps: 2 × log₂(N) (halving phase +
    doubling phase). Total data per node: also 2S (bandwidth-optimal, same as Ring for power-of-2 N).
    Trade-off: recursive halving-doubling has lower latency (log N steps) but higher per-step message
    setup overhead; Ring has higher latency (2(N-1) steps) but simpler, perfectly pipelined communication.
    For small messages (latency-bound): recursive halving-doubling wins. For large messages (bandwidth-bound):
    both are equivalent; Ring is often preferred due to simpler implementation.'
  common_mistake: Claiming recursive halving-doubling is always better because it has fewer steps. For
    large messages, ring AllReduce's bandwidth optimality makes it faster despite more steps.
  napkin_math: 'N=1024 nodes. Ring: 2×(1024-1) = 2046 steps, total data per node = 2S (bandwidth-optimal).
    Recursive halving-doubling: 2×log₂(1024) = 20 steps (102× fewer). Total data per node = 2S (same as
    Ring — bandwidth-optimal for power-of-2 N). The advantage is latency: 20 steps vs 2046 steps. For
    small messages (latency-bound), RHD''s O(log N) steps win. For large messages (bandwidth-bound), both
    are equally efficient per node.'
