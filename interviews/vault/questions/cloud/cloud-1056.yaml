title: Diagnosing H2D Transfer Overlap Failures
scenario: You are profiling a PyTorch training loop on an NVIDIA A100 GPU using Nsight Systems. The model
  processes batches of 512 images (approx. 150MB per batch). The compute step takes 30ms, and the Host-to-Device
  (H2D) transfer takes 6ms over PCIe Gen4. You have set `pin_memory=True` on the DataLoader and use `tensor.to(device,
  non_blocking=True)`. However, the profiler timeline shows H2D transfers and compute kernels executing
  strictly sequentially, never overlapping, which limits overall training throughput.
details:
  realistic_solution: The H2D transfer must be executed in a dedicated, non-default CUDA stream using
    `with torch.cuda.stream(copy_stream):`. Before the compute kernels execute on the default stream,
    synchronize them by calling `torch.cuda.current_stream().wait_stream(copy_stream)` to ensure data
    is fully transferred before computation begins.
  common_mistake: Assuming that setting `non_blocking=True` is sufficient for asynchronous execution,
    without realizing that operations on the default stream block until completion unless a separate CUDA
    stream is explicitly managed.
  napkin_math: PCIe Gen4 x16 theoretical bandwidth is ~31.5 GB/s, effective is ~25 GB/s. Transferring
    150MB takes 150MB / 25 GB/s = 6ms. Compute takes 30ms. Sequential time per batch = 36ms. Overlapped
    time = max(30ms, 6ms) = 30ms. Throughput increase = 36ms / 30ms = 1.2x (20%).
