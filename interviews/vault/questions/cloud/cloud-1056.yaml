title: Diagnosing H2D Transfer Overlap Failures
scenario: You are profiling a PyTorch training loop on an NVIDIA A100 GPU using Nsight Systems. The model processes batches of 512 images (approx. 150MB per batch). The compute step takes 30ms, and the Host-to-Device (H2D) transfer takes 6ms over PCIe Gen4. You have set `pin_memory=True` on the DataLoader and use `tensor.to(device, non_blocking=True)`.
question: Why are H2D copies and compute still sequential despite pin_memory=True and non_blocking=True, and how do you overlap them?
details:
  realistic_solution: The H2D transfer must be executed in a dedicated, non-default CUDA stream using `with torch.cuda.stream(copy_stream):`. Before the compute kernels execute on the default stream, synchronize them by calling `torch.cuda.current_stream().wait_stream(copy_stream)` to ensure data is fully transferred before computation begins.
  common_mistake: |
    **The Pitfall:** Assuming that setting `non_blocking=True` is sufficient for asynchronous execution.
    **The Rationale:** PyTorch's `non_blocking=True` suggests asynchronous behavior, leading developers to believe no further stream management is needed.
    **The Consequence:** Operations on the default stream block until completion unless a separate CUDA stream is explicitly managed, preventing overlap.
  napkin_math: |
    - **Effective Transfer Rate:** PCIe Gen4 x16 theoretical is ~31.5 GB/s; effective is ~25 GB/s.
    - **Transfer Time:** 150 MB / 25 GB/s = 6ms.
    - **Compute Time:** 30ms.
    - **Sequential Batch Time:** 30ms + 6ms = 36ms.
    - **Overlapped Batch Time:** max(30ms, 6ms) = 30ms.
    - **Throughput Increase:** 36ms / 30ms = **1.2x (20% speedup)**.
