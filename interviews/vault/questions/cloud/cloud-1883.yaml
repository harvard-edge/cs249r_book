title: Calculating Revenue Impact of Silent Feature Corruption
scenario: A cloud-based CTR (Click-Through Rate) prediction model for an ad network serves 5,000 requests/sec.
  The infrastructure metrics are perfectly healthy (P99 latency < 20ms, zero HTTP 5xx errors). However,
  an upstream data engineering team silently changes the encoding of a critical feature `device_type`
  from one-hot to ordinal without versioning the endpoint. The model's predictive performance degrades
  silently, causing the actual CTR to drop from 2.0% to 1.5%. If the average revenue per click (RPC) is
  $0.50, calculate the daily revenue loss caused by this undetected failure.
question: "What monitoring should catch this device_type encoding change, and how much daily revenue is lost while it goes undetected?"
details:
  realistic_solution: Implement statistical drift detection (e.g., alerting when Population Stability
    Index > 0.2 on key features) and strict schema validation to catch upstream data changes instantly,
    preventing the ~$1M/day revenue bleed.
  common_mistake: Assuming the ML system is healthy just because infrastructure metrics (latency, error
    rates, CPU) are green, while entirely ignoring input feature distributions and statistical data quality.
  napkin_math: Daily requests = 5,000 req/sec * 86,400 sec/day = 432,000,000. Lost CTR = 2.0% - 1.5% =
    0.5%. Lost clicks/day = 432,000,000 * 0.005 = 2,160,000. Daily revenue loss = 2,160,000 clicks * $0.50/click
    = $1,080,000.
