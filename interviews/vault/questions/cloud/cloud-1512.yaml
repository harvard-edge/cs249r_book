title: L7 Load Balancing for Speech AI
scenario: You are configuring an L7 load balancer for a speech-to-text inference service. The service
  processes 2,000 concurrent audio streams, with each stream sending 250 KB of audio data per second.
  The backend cluster consists of 40 worker nodes. Due to variable sequence lengths, inference processing
  times vary wildly between 100ms and 800ms. Calculate the minimum ingress bandwidth required at the load
  balancer, and specify the optimal routing algorithm to minimize P99 tail latency.
details:
  realistic_solution: Provision a load balancer capable of at least 4 Gbps ingress bandwidth and configure
    it to use Least Outstanding Requests (LOR) or Power of Two Choices routing to gracefully handle the
    high variance in inference times.
  common_mistake: Defaulting to a simple Round-Robin routing algorithm, which ignores worker queue depth
    and causes severe head-of-line blocking on nodes processing long audio sequences.
  napkin_math: 'Ingress Bandwidth = 2,000 streams * 250 KB/s = 500,000 KB/s = 500 MB/s. Converting to
    network throughput: 500 MB/s * 8 bits/Byte = 4 Gbps minimum required ingress bandwidth.'
