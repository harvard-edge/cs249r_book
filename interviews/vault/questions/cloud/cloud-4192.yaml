title: Thread Block Size Optimization for H100
scenario: You launch a CUDA kernel on H100 with 128 threads per block. The kernel uses 48 registers per thread and 8 KB of shared memory. H100 SMs have 65536 registers and 228 KB of shared memory.
question: What are the max blocks per SM and occupancy at 128 threads per block, and would 256 threads per block improve it?
details:
  realistic_solution: 'H100 SM limits: 65536 registers, 228 KB shared memory, 2048 max threads, 32 max blocks. At 128 threads/block: Registers per block: 128 × 48 = 6,144. Blocks by registers: 65,536 / 6,144 = 10. Shared memory per block: 8 KB. Blocks by shared memory: 228 / 8 = 28. Blocks by max threads: 2048 / 128 = 16. Blocks by max blocks: 32. Limiting factor: registers → 10 blocks. Threads: 10 × 128 = 1,280. Occupancy: 1,280 / 2,048 = 62.5%. At 256 threads/block: Registers: 256 × 48 = 12,288. Blocks by registers: 65,536 / 12,288 = 5. Shared memory: 228 / 8 = 28. Max threads: 2048 / 256 = 8. Limiting: registers → 5 blocks. Threads: 5 × 256 = 1,280. Occupancy: 62.5% — identical! Switching to 256 threads changes nothing because registers are the bottleneck in both cases. To improve: reduce register usage to 32 → 16 blocks × 128 threads = 2048 = 100% occupancy.'
  common_mistake: |
    **The Pitfall:** Only checking one resource limit (like shared memory or max threads) when calculating occupancy.
    **The Rationale:** Thread and block limits are easier to conceptualize, so register pressure is frequently ignored.
    **The Consequence:** Occupancy is determined by the most restrictive resource. Failing to check register limits leads to incorrect occupancy calculations and ineffective optimization attempts.
  napkin_math: |
    - **128 Threads/Block:** 128 * 48 = 6,144 registers/block. 65,536 / 6,144 = 10 blocks fit. 10 * 128 = 1,280 threads. Occupancy = 1,280 / 2,048 = **62.5%**.
    - **256 Threads/Block:** 256 * 48 = 12,288 registers/block. 65,536 / 12,288 = 5 blocks fit. 5 * 256 = 1,280 threads. Occupancy = 1,280 / 2,048 = **62.5%**.
    - **Conclusion:** Switching to 256 threads changes nothing; registers are the bottleneck in both cases.
    - **Improvement:** Reduce register usage to 32/thread -> 4,096 regs/block. 16 blocks fit -> 2,048 threads = **100% occupancy**.
