title: Thread Block Size Optimization for H100
scenario: You launch a CUDA kernel on H100 with 128 threads per block. The kernel
  uses 48 registers per thread and 8 KB of shared memory. H100 SMs have 65536 registers
  and 228 KB of shared memory. Calculate the maximum blocks per SM, the resulting
  occupancy, and whether changing to 256 threads per block would improve performance.
question: What are the max blocks per SM and occupancy at 128 threads per block, and
  would 256 threads per block improve it?
details:
  realistic_solution: 'H100 SM limits: 65536 registers, 228 KB shared memory, 2048
    max threads, 32 max blocks. At 128 threads/block: Registers per block: 128 × 48
    = 6,144. Blocks by registers: 65,536 / 6,144 = 10. Shared memory per block: 8
    KB. Blocks by shared memory: 228 / 8 = 28. Blocks by max threads: 2048 / 128 =
    16. Blocks by max blocks: 32. Limiting factor: registers → 10 blocks. Threads:
    10 × 128 = 1,280. Occupancy: 1,280 / 2,048 = 62.5%. At 256 threads/block: Registers:
    256 × 48 = 12,288. Blocks by registers: 65,536 / 12,288 = 5. Shared memory: 228
    / 8 = 28. Max threads: 2048 / 256 = 8. Limiting: registers → 5 blocks. Threads:
    5 × 256 = 1,280. Occupancy: 62.5% — identical! Switching to 256 threads changes
    nothing because registers are the bottleneck in both cases. To improve: reduce
    register usage to 32 → 16 blocks × 128 threads = 2048 = 100% occupancy.'
  common_mistake: 'Only checking one resource limit. Occupancy is determined by the
    most restrictive resource: registers, shared memory, or max threads. All three
    must be checked to find the true bottleneck.'
  napkin_math: '128 threads: regs = 6144/block, 10 blocks fit, 1280 threads = 62.5%.
    256 threads: regs = 12288/block, 5 blocks fit, 1280 threads = 62.5%. No change.
    At 32 regs/thread: 128 threads = 4096 regs/block, 16 blocks, 2048 threads = 100%.
    Improvement: 100/62.5 = 1.6× occupancy. But register pressure may cause spills
    — need to profile.'
