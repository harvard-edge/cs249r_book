title: The Batching Dilemma
scenario: We use static batching for our LLM API. If a request generating 5 tokens is batched with a request generating 500 tokens, the 5-token request sits in VRAM until the 500-token request finishes.
question: How do we fix this idle capacity caused by static batching in an LLM API?
details:
  realistic_solution: Implement Continuous (or In-Flight) Batching. Instead of waiting for all requests in a batch to finish, continuous batching operates at the iteration level. As soon as the 5-token request finishes and emits its `<EOS>` token, it is immediately evicted from the batch, and a new request from the queue is slotted in for the very next forward pass.
  common_mistake: |
    **The Pitfall:** Setting a maximum generation length to keep batch members mathematically similar.
    **The Rationale:** Engineers assume uniformity guarantees efficiency, avoiding complex scheduler overhauls.
    **The Consequence:** This severely caps product functionality and still wastes VRAM/compute cycles on required padding tokens.
  napkin_math: |
    * Static batch of 8 requests: shortest = 5 tokens, longest = 500 tokens.
    * Wasted compute per batch = 7 requests * (500 - avg_length) * cost_per_token.
    * With continuous batching, the slot that finished the 5-token request is instantly refilled.
    * **The slot processes ~100 different short requests in the time the 500-token request takes, increasing effective throughput by 2-4x.**
