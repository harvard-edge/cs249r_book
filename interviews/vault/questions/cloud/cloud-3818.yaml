title: 'MoE vs Dense: Cost-per-Token Comparison for Training'
scenario: 'You must choose between training a dense 70B model or an MoE 8x70B model. Both target the same final quality. The MoE model reaches target quality in 40% fewer training tokens.'
question: 'How do the dense 70B and MoE 8x70B options compare in total GPU-hours and cost at $2/GPU-hour?'
details:
  realistic_solution: 'Despite requiring 40% fewer tokens, the MoE architecture is more expensive to train. The MoE model uses 2x the active parameters (140B vs 70B) per token, effectively doubling the FLOPs required per token. Additionally, MoE introduces massive All-to-All network communication overhead, lowering the Model FLOPs Utilization (MFU). The MoE architecture will require significantly more total GPU-hours to train, making it a strategy purely for optimizing inference latency rather than training cost.'
  common_mistake: |
    **The Pitfall:** Only comparing total training tokens or peak FLOPS without accounting for network overhead.
    **The Rationale:** Candidates often assume that fewer training tokens automatically equals cheaper training.
    **The Consequence:** They underestimate the total training cost because MoE requires more GPUs for memory capacity and suffers lower MFU due to All-to-All communication bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Dense 70B FLOPs/token = 6 * 70B = 420 GFLOP.
       * MoE 8x70B (top-2) FLOPs/token = 6 * 140B = 840 GFLOP.
       * Dense tokens = 2T. MoE tokens = 1.2T.
       * Hardware at 45% MFU (Dense) vs 35% MFU (MoE).
    2. **Calculations:**
       * Dense Total FLOPs: 420 GFLOP * 2T = 8.4e23 FLOPs.
       * MoE Total FLOPs: 840 GFLOP * 1.2T = 1.0e24 FLOPs.
       * Dense GPU-hours: 524K @ $2 = $1.05M.
       * MoE GPU-hours: 809K @ $2 = $1.62M.
    3. **Conclusion & Interpretation:**
       * **Result: MoE training is 54% more expensive ($1.62M vs $1.05M) despite using 40% fewer tokens.**
