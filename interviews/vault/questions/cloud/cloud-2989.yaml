title: 'Kernel Fusion: Evaluate FlashAttention vs Standard Attention on H100'
scenario: You are evaluating FlashAttention-2 versus standard unfused attention on an H100 for a 7B LLM with 32 heads and head dim 128 at sequence lengths 1K, 4K, and 16K.
question: At 1K, 4K, and 16K context lengths, how do FlashAttention-2 and standard attention differ in memory use, throughput, and latency?
details:
  realistic_solution: 'Q,K,V activation memory at seq=1K is 8MB each for standard 32-head, 128-dim configurations. The real memory problem is the O(seq^2) attention score matrix at long contexts (17GB at 16K).'
  common_mistake: |
    **The Pitfall:** Assuming FlashAttention is always faster at all sequence lengths.
    **The Rationale:** Candidates ignore the tiling overhead of FlashAttention, which can outweigh benefits at very short sequences (< 512).
    **The Consequence:** Over-optimizing short-context workloads where standard attention might actually be faster or equivalent.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 heads, 128 dim, 1K/4K/16K contexts.

    **Calculations:**
    - Seq=1K: Q,K,V = 8MB. Scores = 67MB.
    - Seq=4K: Q,K,V = 33.5MB. Scores = 1.07GB.
    - Seq=16K: Q,K,V = 134MB. Scores = 16384^2 * 32 * 2B = 17.1GB.

    **Conclusion & Interpretation:**
    - **Result: The O(seq^2) memory footprint hits 17.1GB at 16K**. Mandating FlashAttention-2.
