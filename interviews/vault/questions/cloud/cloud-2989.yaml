title: 'Kernel Fusion: Evaluate Flash Attention vs Standard Attention on H100'
scenario: You are evaluating FlashAttention-2 versus standard unfused attention on an H100 for a 7B LLM with 32 heads and head dim 128 at sequence lengths 1K, 4K, and 16K.
question: At 1K, 4K, and 16K context lengths, how do FlashAttention-2 and standard attention differ in memory use, throughput, and latency?
details:
  realistic_solution: 'Q,K,V activation memory at seq=1K is 8MB each for standard 32-head, 128-dim configurations. The real memory problem is the O(seq²) attention score matrix at long contexts (17GB at 16K).'
  common_mistake: |
    **The Pitfall:** Assuming FlashAttention is always faster at all sequence lengths.
    **The Rationale:** Candidates ignore the tiling overhead of FlashAttention, which can outweigh benefits at very short sequences (< 512).
    **The Consequence:** Over-optimizing short-context workloads where standard attention might actually be faster or equivalent.
  napkin_math: |
    - Q,K,V at Seq=1K: 1024 * 32 heads * 128 head_dim * 2B = 8MB each.
    - Attention scores (1K): 1024 * 32 * 1024 * 2B = 67MB.
    - Context expansion 4K: Q,K,V = 4096 * 4096 * 2B = 33.5MB each.
    - Attention scores (4K): 4096^2 * 32 * 2B = 1.07GB.
    - Context expansion 16K: Q,K,V = 16384 * 4096 * 2B = 134MB each.
    - Attention scores (16K): 16384^2 * 32 * 2B = 17.1GB.
    - **Conclusion: The O(seq^2) attention score matrix at 16K hits the memory wall, making FlashAttention essential.**
