title: Understanding the autograd graph lifecycle and preventing memory leaks
scenario: 'A junior engineer runs a training loop on A100 (80GB) and observes GPU memory growing by ~200MB per step. After 400 steps the process crashes with OOM. The loss is computed correctly and backward() is called each step. The engineer cannot identify the leak.'
question: 'What is the most likely cause of the ~200 MB per-step GPU memory growth, and how would you fix it?'
details:
  realistic_solution: 'Always detach tensors before storing for logging: losses.append(loss.item()) or losses.append(loss.detach().cpu()). Use torch.cuda.memory_summary() to identify the leak source. Profile with torch.cuda.memory_snapshot(). The fundamental rule: once backward() is called, the graph is freed. If you store a tensor before backward(), you keep the graph alive.'
  common_mistake: |
    **The Pitfall:** Storing references to loss tensors without `.item()` or `.detach()`.
    **The Rationale:** Engineers log `losses.append(loss)` naturally as they would with normal Python floats.
    **The Consequence:** Each loss tensor holds a reference to the entire computational graph for that step, completely breaking garbage collection and causing rapid OOMs.
  napkin_math: |
    - **Graph Size:** A single forward pass creates ~4GB of activation nodes.
    - **Leak Accumulation:** If stored in a list and not freed, 400 steps × 4GB = 1.6TB of cumulative references.
    - **Visible Leak vs Peak:** Only the actual live memory of the scalar/small tensors (~200MB) might be immediately obvious per step, but the garbage collector cannot collect the massive graphs until references drop.
