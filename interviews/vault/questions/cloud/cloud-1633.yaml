title: Theoretical Minimum MatMul Latency
scenario: You are profiling a Feed-Forward Network (FFN) up-projection layer on a single NVIDIA A100 GPU
  (312 TFLOPs peak dense FP16). The operation is a matrix multiplication Y = XW, where the input activation
  matrix X has dimensions [16384, 8192] (tokens x hidden_dim) and the weight matrix W has dimensions [8192,
  32768] (hidden_dim x intermediate_dim). Assuming 100% hardware utilization and no memory bandwidth constraints,
  calculate the theoretical minimum execution time for this layer.
question: "What is the theoretical minimum execution time for the FFN up-projection Y=XW on an A100 at 312 TFLOPs FP16?"
details:
  realistic_solution: Determine the total compute volume in MACs by multiplying the dimensions (M x N
    x K). Convert MACs to FLOPs by multiplying by 2 (since each MAC operation consists of one multiply
    and one add). Finally, divide the total FLOPs by the peak dense FP16 throughput of the accelerator
    to find the absolute minimum latency limit.
  common_mistake: Confusing MACs with FLOPs (forgetting that 1 MAC = 2 FLOPs) resulting in an execution
    time off by a factor of 2, or incorrectly using the sparse Tensor Core rating (624 TFLOPs) for a dense
    calculation.
  napkin_math: 'FFN matrix dimensions: M = 16,384 tokens, K = 8,192 input dim, N = 32,768 output dim.
    FLOPs for Y = XW is 2 * M * N * K. Total FLOPs = 2 * 16,384 * 32,768 * 8,192 = 8,796,093,022,208 (8.8
    TFLOPs). A100 peak dense FP16 = 312 TFLOPS. Theoretical minimum execution time = 8.8 TFLOPs / 312
    TFLOPS = 0.0282 seconds (28.2 ms), assuming 100% Tensor Core utilization and zero memory overhead.'
