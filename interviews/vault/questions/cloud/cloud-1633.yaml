title: Theoretical Minimum MatMul Latency
scenario: You are profiling a Feed-Forward Network (FFN) up-projection layer on a single GPU (312 TFLOPs peak dense FP16). The operation is a matrix multiplication Y = XW, where the input activation matrix X has dimensions [16384, 8192] (tokens x hidden_dim) and the weight matrix W has dimensions [8192, 32768] (hidden_dim x intermediate_dim). Assume 100% hardware utilization and no memory bandwidth constraints.
question: What is the theoretical minimum execution time for the FFN up-projection Y=XW on this GPU at 312 TFLOPs FP16?
details:
  realistic_solution: Determine the total compute volume in MACs by multiplying the dimensions (M x N x K). Convert MACs to FLOPs by multiplying by 2 (since each MAC operation consists of one multiply and one add). Finally, divide the total FLOPs by the peak dense FP16 throughput of the accelerator to find the absolute minimum latency limit.
  common_mistake: |
    **The Pitfall:** Confusing MACs with FLOPs or using the sparse Tensor Core rating.
    **The Rationale:** Engineers often forget that 1 Multiply-Accumulate (MAC) operation equals 2 FLOPs, or they incorrectly grab the highest marketed TFLOPS number (which assumes 2:4 sparsity).
    **The Consequence:** Miscalculating the execution time by a factor of 2 or more, establishing an impossible latency baseline.
  napkin_math: |
    1. FFN matrix dimensions: M = 16,384 tokens, K = 8,192 input dim, N = 32,768 output dim.
    2. MACs for Y = XW is M * N * K.
    3. FLOPs = 2 * M * N * K.
    4. Total FLOPs = 2 * 16,384 * 32,768 * 8,192 = 8,796,093,022,208 ($\approx$ 8.8 TFLOPs).
    5. Minimum execution time = 8.8 TFLOPs / 312 TFLOPS = **0.0282 seconds (28.2 ms).**
