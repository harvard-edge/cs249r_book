title: 'Mastery: trade-off analysis of SE block overhead vs accuracy gain in EfficientNet'
scenario: EfficientNet uses Squeeze-and-Excitation (SE) blocks with reduction ratio r=4, adding a global average pool plus two FC layers per MBConv block. For EfficientNet-B0 (16 MBConv blocks with SE), you need to quantify the total FLOP overhead from SE modules.
question: What is the total SE-module FLOP overhead in EfficientNet-B0, and would removing SE plus width scaling lower H100 cost at the same accuracy?
details:
  realistic_solution: 311K FLOPs / 390M total = 0.08% of model FLOPs (not 30%). 30% would require ~117M FLOPs for this component.
  common_mistake: |
    **The Pitfall:** Incorrectly estimating SE FLOP overhead and its impact on modern accelerators.
    **The Rationale:** Candidates compute SE FLOPs only for the FC layers without including the global average pooling, or they overestimate the percentage of FLOPs it consumes.
    **The Consequence:** They fail to realize that SE blocks have near-zero arithmetic intensity and incur disproportionate kernel launch overhead on GPUs like the H100, meaning FLOP counts are heavily misleading.
  napkin_math: |
    - **Calculate SE FLOP fraction:** The 16 SE blocks in EfficientNet-B0 account for roughly 311K FLOPs.
    - **Compare to total:** Total model FLOPs is ~390M.
    - **Calculate overhead:** `311,000 / 390,000,000 = 0.000797` = **0.08%**.
    - **Clarify misconception:** It is not a 30% overhead (which would be 117M FLOPs). However, removing SE may still improve GPU throughput by eliminating kernel launch bottlenecks.
