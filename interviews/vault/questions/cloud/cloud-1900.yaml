title: Diagnosing Gradient Collapse in Deep CNNs
scenario: A cloud CV team is training a 150-layer 3D CNN for medical imaging on a node with 8x 80GB A100
  GPUs. To reduce VRAM usage and increase batch size, an engineer removed the architectural bypass pathways,
  arguing that 'element-wise additions consume unnecessary memory for saving intermediate tensors.' While
  peak memory dropped by 25%, training immediately stalled. Telemetry shows the gradient norm in the final
  layers is ~1e-2, but collapses to ~1e-9 in the first 20 layers. Diagnose the root cause of the training
  failure and propose a solution that restores trainability without exceeding the original memory constraints.
question: "Why did removing bypass paths stall the 150-layer 3D CNN, and how would you restore trainability within the memory budget?"
details:
  realistic_solution: Reintroduce skip connections (residual blocks) to create a direct path for gradient
    flow. To manage the memory overhead of storing the bypassed activations for the backward pass, implement
    gradient checkpointing (activation recomputation) across the residual blocks.
  common_mistake: Assuming that careful weight initialization (e.g., He initialization) or learning rate
    warmup alone can reliably train a 150-layer network without structural gradient pathways.
  napkin_math: Without skip connections, if each layer attenuates the gradient by a factor of 0.9, the
    gradient at layer 1 is (0.9)^150 = 1.3e-7 (vanishing). With a skip connection y = F(x) + x, the local
    gradient is dY/dX = dF/dX + 1. The '+1' distributes the upstream gradient perfectly backward without
    exponential decay.
