title: Scaling LLM Inference on NVIDIA H100 for Real-time Applications
scenario: You are tasked with deploying a massive, 100-billion-parameter LLM for a real-time conversational AI application. Each model instance requires approximately 70 GB of VRAM, making the NVIDIA H100 (with its 80 GB HBM3 memory, 3.35 TB/s memory bandwidth, and 989 TFLOPS FP16 dense performance) a suitable choice. Your service experiences highly variable traffic patterns, with peak loads requiring 1000 inferences per second, and a strict p99 latency requirement of 50ms. The H100 has a thermal design power (TDP) of 700W.
question: How would you design H100 LLM inference serving for 1000 QPS and 50 ms p99, including loading, batching, autoscaling, and cold starts?
details:
  realistic_solution: 'Implement a dynamic batching strategy that adapts to real-time queue depths and latency targets. Utilize a tiered model loading approach: pre-load a base set of instances with the model during initial deployment, and for autoscaling events, employ pre-warming mechanisms (e.g., speculative instance provisioning, health checks that include model loading verification) to ensure new instances are ready before traffic is routed. For autoscaling, combine predictive scaling (based on historical patterns) with reactive scaling (based on GPU utilization and request queue length) using Kubernetes HPA/CA. Leverage efficient model serialization formats (e.g., ONNX, TensorRT) and optimize data transfer between host and device memory to maximize throughput given the HBM3 bandwidth.'
  common_mistake: |
    **The Pitfall:** Neglecting the interplay between batch size, latency, and GPU utilization.
    **The Rationale:** Engineers often maximize batch size to achieve high throughput, ignoring the impact on latency SLAs.
    **The Consequence:** Either underutilized GPUs (small batches, low throughput) or massive P99 latency violations (large batches), alongside severe cold start delays during autoscaling events.
  napkin_math: |
    - **Peak Load:** 1000 inferences/second.
    - **Per-GPU Throughput Target:** Assume 50 inferences/second per H100 to meet the 50ms p99 latency SLA.
    - **GPU Requirement:** 1000 / 50 = **20 H100 GPUs**.
    - **Power Consumption:** 20 GPUs * 700W/GPU = **14,000W (14 kW)** just for the GPUs.
