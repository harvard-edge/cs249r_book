title: Cooling Strategy for Water-Scarce Region
scenario: You are building an AI training datacenter in a water-scarce desert region with cheap solar power at $0.05/kWh. Options: (A) evaporative cooling (WUE=1.8, PUE=1.2, cheapest), (B) closed-loop liquid cooling (WUE=0.1, PUE=1.1, 2x capex), (C) air cooling with heat exchangers (WUE=0, PUE=1.5, moderate cost).
question: For a 10 MW IT-load datacenter in a water-scarce desert, which cooling option provides the best TCO and sustainability balance, and why?
details:
  realistic_solution: 'Annual IT energy at 10MW: 10,000 kW × 8,760h = 87,600 MWh. Option A (evaporative): Water: 87,600,000 × 1.8 = 157.7M liters/year (~42M gallons). In a water-scarce region, this competes with agriculture and residential use — likely faces permit denial or community opposition. Total power: 10MW × 1.2 = 12MW. Energy cost at $0.05/kWh: $5.26M/yr. Option B (closed-loop liquid): Water: 87,600,000 × 0.1 = 8.76M liters/year (95% reduction). Total power: 10MW × 1.1 = 11MW (most efficient). Energy cost: $4.82M/yr. Capex: 2x of A. Savings in energy: $440K/yr. Water savings: 149M liters/yr. Option C (air cooling): Water: 0 liters. Total power: 10MW × 1.5 = 15MW (50% more than B). Energy cost: $6.57M/yr. No water controversy but $1.75M/yr more in energy than B. Recommendation: B. The 2x capex is recovered through energy savings in ~5 years, water usage is minimal, and it avoids the existential risk of permit denial in a water-scarce region.'
  common_mistake: |
    **The Pitfall:** Choosing evaporative cooling (Option A) purely because it has the lowest upfront cost.
    **The Rationale:** Standard datacenter economics often heavily weight initial Capex and assume resources like water are cheap and plentiful.
    **The Consequence:** In a water-scarce region, consuming millions of liters of water can trigger severe community backlash and permit denial, shutting down the project entirely.
  napkin_math: |
    - **Annual IT energy:** 10 MW × 8,760 hours = 87,600 MWh = 87,600,000 kWh.
    - **Option A (Evaporative):**
      - Water: 87,600,000 kWh × 1.8 L/kWh = 157.7M liters/year.
      - Energy: 10 MW × 1.2 PUE = 12 MW. Cost: 12,000 kW × 8760h × $0.05 = $5.26M/yr.
    - **Option B (Closed-loop liquid):**
      - Water: 87,600,000 kWh × 0.1 L/kWh = 8.76M liters/year.
      - Energy: 10 MW × 1.1 PUE = 11 MW. Cost: 11,000 kW × 8760h × $0.05 = $4.82M/yr.
    - **Option C (Air cooling):**
      - Water: 0 liters.
      - Energy: 10 MW × 1.5 PUE = 15 MW. Cost: 15,000 kW × 8760h × $0.05 = $6.57M/yr.
    - **Conclusion:** **Option B saves 149M liters of water and $440K/yr in energy compared to A, quickly recovering the 2x Capex.**
