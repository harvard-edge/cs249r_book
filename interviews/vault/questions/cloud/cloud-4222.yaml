title: Storage Format Selection for Multimodal Datasets
scenario: A multimodal pipeline ingests text, images, audio, and metadata across 50M samples (80 TB). You are evaluating Parquet/TFRecord, WebDataset tar shards, and Lance for storage.
question: How would you compare separate modality files, WebDataset tar shards, and Lance for the 80 TB multimodal dataset on throughput, storage, and ops complexity?
details:
  realistic_solution: 'Analysis: (1) Separate files: text in Parquet (great compression, column pruning for text-only training), images in TFRecord shards, audio in TFRecord shards. Pro: each modality can be independently updated, compressed optimally, and versioned. Con: joining across modalities requires a manifest file and multi-stream coordination — complex data loader code, potential for misalignment. (2) WebDataset: each tar shard contains all modalities for a sample group. Pro: atomic samples, simple streaming, no join needed. Con: updating one modality requires rewriting entire shards. No column pruning — text-only training still reads images. (3) Lance: columnar format designed for ML with native support for variable-length binary data. Pro: column pruning across modalities, random access, versioning built-in. Con: newer format, smaller ecosystem. Winner depends on access pattern: WebDataset for full-sample training, Lance for modality-selective training, separate files for independent modality evolution.'
  common_mistake: |
    **The Pitfall:** Storing all modalities in a single Parquet file.
    **The Rationale:** Parquet is the gold standard for big data analytics tabular storage.
    **The Consequence:** Parquet handles binary blobs poorly — large variable-length columns (images, audio) destroy columnar compression benefits and create huge row groups that waste memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 80 TB multimodal. Text-only subset = 5 TB.
    2. **Calculations:**
       - WebDataset: Text-only training still reads full 80 TB shards.
       - Separate Parquet: Reads only 5 TB text (fast), but multimodal joins add high latency overhead per batch.
       - Lance (columnar ML format): Reads 5 TB for text, 80 TB for multimodal, natively aligned without join latency.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** Lance provides the best of both worlds by allowing zero-overhead multimodal retrieval while supporting efficient column pruning for single-modality tasks.
