title: Implementing gradient checkpointing for a custom attention mechanism
scenario: You have a custom chunked attention mechanism for processing 100K-token sequences on an 80GB H100. Standard torch.utils.checkpoint.checkpoint() wraps your attention block, but the recompute during backward is 3x slower than the original forward because it also recomputes the KV cache generation that should be shared across chunks.
question: How would you checkpoint the 100K-token chunked attention so backward does not recompute shared KV projections?
details:
  realistic_solution: 'Split the checkpointed region: pre-compute and save KV projections outside the checkpointed block (they are memory-cheap), checkpoint only the attention score computation (memory-expensive: O(seq_len × window_size)). Use checkpoint with use_reentrant=False for better gradient correctness with nested checkpoints. Verify with torch.autograd.graph.saved_tensors_hooks() that the right tensors are being offloaded vs retained.'
  common_mistake: |
    **The Pitfall:** Wrapping the entire attention function (including KV projection) in the checkpoint.
    **The Rationale:** Developers often treat the entire attention block as a black box for checkpointing, overlooking that intermediate tensors like KV projections are small enough to keep in memory.
    **The Consequence:** KV projections are redundantly recomputed for every window during the backward pass, imposing a massive 3x latency penalty that destroys training throughput.
  napkin_math: |
    - **Attention Scores:** $100\text{K} \times 4096\text{ window} \times 32\text{ heads} \times 2\text{ bytes} = 26\text{ GB}$ per layer.
    - **Total Attention Memory:** 32 layers $\times 26\text{ GB} = 832\text{ GB}$ (Must recompute, exceeds HBM).
    - **KV Projections:** $100\text{K} \times 1024\text{ dim} \times 2 (\text{K,V}) \times 2\text{ bytes} = 400\text{ MB}$ per layer.
    - **Total KV Memory:** 32 layers $\times 400\text{ MB} = 12.8\text{ GB}$.
    - **Conclusion:** **Saving 12.8GB of KV projections in HBM** avoids the 3x recompute penalty while fitting well within the 80GB budget.
