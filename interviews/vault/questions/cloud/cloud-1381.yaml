title: End-to-End Latency of HE Inference
scenario: You are deploying a privacy-preserving ML service for financial embeddings using the CKKS Homomorphic Encryption scheme. The unencrypted client input vector is 100 KB. The HE scheme has a ciphertext expansion factor of 1,000x. The client's mobile network has a 100 Mbps upstream bandwidth. The cloud server takes 5 ms to compute an unencrypted forward pass, but HE multiplications introduce a 10,000x compute overhead.
question: "What is the total upload-plus-compute latency for one CKKS-encrypted inference request?"
details:
  realistic_solution: Calculate both the expanded payload upload time (8 seconds) and the HE compute time (50 seconds) to find the total 58-second latency.
  common_mistake: |
    **The Pitfall:** Ignoring the network upload time.
    **The Rationale:** Candidates focus solely on the massive "10,000x compute overhead" mathematical operation and forget that sending the bloated ciphertext over the network is equally critical to end-to-end latency.
    **The Consequence:** The latency estimate is 8 seconds too short, which is a massive discrepancy for real-time mobile applications.
  napkin_math: |
    1. **Encrypted payload:** 100 KB * 1,000 = 100,000 KB = 100 MB.
    2. **Upload throughput:** 100 Mbps / 8 = 12.5 MB/s.
    3. **Upload time:** 100 MB / 12.5 MB/s = 8 seconds.
    4. **HE Compute time:** 5 ms * 10,000 = 50,000 ms = 50 seconds.
    5. **Total Latency:** 8s + 50s = **58 seconds**.
