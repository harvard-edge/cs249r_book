title: 'High-Performance ML Inference Monitoring: H100 Architecture Comparison'
scenario: 'You are designing a real-time inference system for a large language model, requiring extreme low latency and high throughput. You have been allocated a cluster of NVIDIA H100 GPUs. Your team proposes two architecture options for deploying and scaling this inference service in the cloud:

1.  **Architecture A:** A traditional microservices approach where each inference server is a stateless container managing its own H100 GPU(s), with a centralized logging and metrics pipeline.

2.  **Architecture B:** A more tightly coupled, custom HPC-like deployment leveraging InfiniBand for direct GPU-to-GPU communication across multiple H100s within a single instance, optimizing for collective operations, with a distributed monitoring agent per instance.

Compare these two architectures from a monitoring and observability perspective, specifically considering telemetry collection, alerting strategies, MTBF/MTTR implications, and the design of production health dashboards.'
question: How would you monitor these two H100 architectures, including GPU metrics, stragglers, tail latency, and cross-GPU communication?
details:
  realistic_solution: 'Implement a multi-layered observability stack. At the hardware level, leverage NVIDIA Data Center GPU Manager (DCGM) to collect detailed GPU metrics (HBM utilization, power draw, SM activity, compute utilization) directly from the H100s. Integrate these metrics into a time-series database (e.g., Prometheus) with high-cardinality label support. For latency and straggler detection, use distributed tracing (e.g., OpenTelemetry) to track individual inference requests from ingress to egress, including time spent on GPU kernels. Define service-level objectives (SLOs) and service-level indicators (SLIs) for key metrics like p99 latency and throughput. Design hierarchical alerts: critical alerts for service outages or severe performance drops, and warning alerts for trending deviations. Production dashboards should aggregate these views, providing both a high-level system health overview and drill-down capabilities to individual H100 instances and specific kernel executions. For Architecture B, ensure cross-GPU communication metrics are also captured.'
  common_mistake: |
    **The Pitfall:** Treating GPU monitoring like standard CPU monitoring.
    **The Rationale:** Engineers rely on existing CPU-centric APM tools without integrating hardware-specific agents like DCGM.
    **The Consequence:** They overlook critical performance counters (SM occupancy, HBM bandwidth) and fail to design for micro-batch straggler detection, masking severe performance issues under load.
  napkin_math: |
    - **Telemetry rate:** 100 GPUs * 100 metrics/sec = 10,000 data points/sec.
    - **Data volume:** At 100 bytes/point, this is 1 MB/s of raw telemetry.
    - **Daily accumulation:** ~86 GB/day.
    - **Retention:** 30 days = **~2.5 TB of raw metric storage**.
    - **Conclusion:** This highlights the absolute necessity for efficient storage, downsampling, and aggregation strategies.
