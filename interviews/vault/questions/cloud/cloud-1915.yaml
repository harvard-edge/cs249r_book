title: Evaluating OS Page Cache for Stochastic ML Training
scenario: You are designing the data loading pipeline for a large-scale Vision Transformer (ViT-H) training job on a 100 TB image dataset. The training cluster uses 8x H100 GPU nodes, each equipped with 4x NVMe Gen5 SSDs capable of 12 GB/s sequential reads each (48 GB/s total node bandwidth). The infrastructure team proposes relying on standard POSIX file reads of individual image files and the Linux OS page cache, arguing the raw NVMe speed is more than sufficient to feed the GPUs, which require 8 GB/s of data throughput.
question: "Should you rely on POSIX individual-file reads and the OS page cache for the 100 TB ViT-H dataset, and what should you use instead?"
details:
  realistic_solution: Reject the standard POSIX individual file approach. Implement a sequential container format (e.g., WebDataset or TFRecord) to restore spatial locality on disk, use Direct I/O (O_DIRECT) to bypass the OS page cache entirely, and perform shuffling locally in RAM.
  common_mistake: |
    **The Pitfall:** Relying on raw sequential NVMe bandwidth guarantees for individual file reads.
    **The Rationale:** The infrastructure team assumes the OS page cache will handle spatial and temporal locality.
    **The Consequence:** SGD's random access defeats read-ahead heuristics, causing severe I/O thrashing and GPU starvation.
  napkin_math: |
    - Total raw NVMe bandwidth = 4 * 12 GB/s = 48 GB/s.
    - With 1MB read-ahead for 150KB images, utilization is ~15% (150 / 1024).
    - Useful throughput = 48 GB/s * 0.15 = 7.2 GB/s.
    - **7.2 GB/s falls short of the 8 GB/s required, causing starvation despite 48 GB/s raw IO.**
