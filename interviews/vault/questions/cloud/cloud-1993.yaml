title: Evaluating Mitigation Strategies for Recommendation System Drift
scenario: 'A large-scale e-commerce recommendation system (using a 100GB DLRM model deployed on a fleet
  of A100 GPUs) is experiencing continuous accuracy degradation (System Entropy) at a rate of -0.5% CTR
  per week due to shifting user behavior. The team is evaluating two mitigation strategies: 1) A daily
  full retrain using a 30-day sliding window of data (requires 64 A100s for 12 hours), or 2) Continuous
  incremental training (online learning) where models are updated every 15 minutes using micro-batches
  from a Kafka stream (requires 8 A100s continuously, plus complex state management and rollback mechanisms).
  As a Staff Engineer, evaluate the trade-offs between these two approaches regarding compute cost, operational
  complexity, and effectively mitigating statistical drift, and justify which architecture to implement.'
question: "Should the 100GB DLRM use daily full retraining or continuous 15-minute online learning to fight -0.5% weekly CTR drift, and why?"
details:
  realistic_solution: 'Implement a daily batch retrain as the primary baseline to ensure stability and
    stateless reproducibility. If intraday reactivity is strictly required, adopt a hybrid approach: stateless
    daily retrains combined with lightweight online fine-tuning, enabling easy rollbacks to the stable
    daily checkpoint.'
  common_mistake: Assuming continuous learning is always superior due to faster reaction to new trends,
    ignoring the massive operational complexity of state management, risk of catastrophic forgetting,
    and lack of rollback infrastructure compared to a stateless daily batch retrain.
  napkin_math: 'Daily Retrain Compute: 64 GPUs * 12 hours = 768 GPU-hours/day. Continuous Training Compute:
    8 GPUs * 24 hours = 192 GPU-hours/day. While continuous training saves ~576 GPU-hours/day (approx.
    $1,150/day at $2/GPU-h), the engineering overhead of building robust continuous evaluation, state
    snapshots, and rollback mechanisms for a 100GB model far exceeds the compute savings unless sub-hour
    reactivity is a hard business requirement.'
