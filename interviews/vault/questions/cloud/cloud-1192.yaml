title: Elephant Flow Collisions with ECMP
scenario: 'You are training a 65B parameter LLM on a 64-node cluster (8 GPUs per node) using a 400Gbps
  RoCEv2 network. The AllReduce gradient synchronization step transfers ~130GB of data. Despite having
  a non-blocking leaf-spine topology with sufficient total bisection bandwidth, you notice highly uneven
  network utilization: some switch ports are saturated and experiencing Priority-based Flow Control (PFC)
  pauses, while others sit idle. The fabric relies on standard ECMP (Equal-Cost Multi-Path) for routing.'
question: "Why are some RoCEv2 ports saturated during the 130GB AllReduce while others idle, and how would you fix the routing?"
details:
  realistic_solution: Replace flow-based ECMP with packet-level or flowlet-level load balancing (e.g.,
    packet spraying), or adopt a rail-optimized topology where identical GPU ranks communicate over dedicated,
    non-blocking switches to physically isolate the elephant flows and prevent collisions.
  common_mistake: Assuming standard ECMP routing perfectly balances all network traffic. Candidates fail
    to recognize that ECMP hashes traffic on a per-flow basis (5-tuple), and since ML traffic consists
    of a few massive 'elephant flows', hash collisions inevitably map multiple massive flows to the same
    physical link.
  napkin_math: An AllReduce of 130GB over a 400Gbps (50 GB/s) link should ideally take ~2.6s. If an ECMP
    hash collision maps 3 elephant flows to the same 400Gbps link, the link is heavily oversubscribed.
    The effective bandwidth per flow drops to 133Gbps (16.6 GB/s), increasing the synchronization time
    to ~7.8s and delaying the entire synchronous training step.
