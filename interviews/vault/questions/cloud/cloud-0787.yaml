title: The Drifting Recommender
scenario: You are responsible for a large-scale recommendation model that suggests products to users. Over the last quarter, the model's click-through rate (CTR) has degraded by 15%. A dashboard shows that the mean age of users has shifted from 38.5 to 31.2. Your PM wants to immediately trigger a full retraining run. Use your monitoring data and system knowledge to diagnose whether this is the correct first step.
question: "How would you decide whether the 15% CTR drop and age shift from 38.5 to 31.2 warrant immediate retraining?"
details:
  realistic_solution: |
    The correct approach is to treat this as a hypothesis to be validated with data before committing expensive resources. First, use a statistical test (like the two-sample K-S test) to confirm that the change in the user age distribution is statistically significant and not just random noise. Second, calculate the cost of a full retraining run to provide a concrete cost/benefit trade-off to the product manager. This turns a vague 'let's retrain' into a data-driven decision: 'We have 99.9% confidence the user base has changed, and we estimate a cost of X to adapt the model.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to retraining without quantifying the problem's statistical significance.
    **The Rationale:** Retraining is seen as a default fix-all, but it is expensive and ineffective if the drift is transient or caused by an upstream data bug.
    **The Consequence:** Wasted expensive compute resources and potential failure to fix the underlying issue.
  napkin_math: |
    - **Metric Shift:** Mean user age dropped from 38.5 to 31.2, indicating severe covariate shift.
    - **Quantification:** Compute the Population Stability Index (PSI).
    - **Action Threshold:** If PSI > 0.2, the distributions are significantly different, proving the model is operating out-of-distribution and justifying retraining costs.
  options:
  - The CTR drop is significant, so immediately start the retraining job.
  - The model architecture is probably wrong; propose a new architecture.
  - The change in mean age is the likely cause. First, run a statistical test to confirm the distribution has shifted, then estimate the retraining cost before proceeding.
  - This is likely a transient issue; wait for another quarter to see if the metrics return to baseline before taking any action.
  correct_index: 2
