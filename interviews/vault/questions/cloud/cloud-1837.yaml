title: SMPC vs FL for Cross-Institution DNN Training
scenario: 'A consortium of 3 financial institutions wants to collaboratively train a 100-million parameter neural network for fraud detection without exposing customer data to each other. They are evaluating Secure Multiparty Computation (SMPC) using Secret Sharing (e.g., SPDZ) versus Federated Learning (FL) with Differential Privacy. The dedicated network links between institutions offer 10 Gbps bandwidth and 15ms latency.'
question: 'Should the consortium use SPDZ-style SMPC or federated learning with differential privacy for the 100M-parameter model, and why?'
details:
  realistic_solution: 'Federated Learning with Differential Privacy is the realistic choice. SMPC is impractical for deep learning at this scale because secret sharing requires communication rounds for every multiplication gate or non-linear activation (e.g., ReLU approximations). The 15ms latency would dominate, even with massive operation batching, stalling the compute pipeline.'
  common_mistake: |
    **The Pitfall:** Underestimating the massive communication complexity of SMPC.
    **The Rationale:** Assuming SMPC only communicates parameter gradients once per step, exactly like Federated Learning.
    **The Consequence:** Proposing SMPC architectures that stall the compute pipeline entirely because they require cross-party communication for every single multiplication gate.
  napkin_math: |
    * 100M parameter model ≈ 200M FLOPs per sample. Batch size 1024 = ~200 billion operations per step.
    * If 10% are non-linearities requiring a 15ms round-trip via SMPC.
    * Even batching 10,000 operations per network sync: (20B / 10,000) * 15ms = 30,000 seconds per step.
    * FL only syncs the 400MB gradient once per round: 400MB at 10 Gbps takes ~0.32 seconds.
    * **Result: FL is strictly required; SMPC is impossible at this scale over a WAN.**
