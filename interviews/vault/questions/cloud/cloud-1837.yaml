title: SMPC vs FL for Cross-Institution DNN Training
scenario: A consortium of 3 financial institutions wants to collaboratively train a 100-million parameter
  neural network for fraud detection without exposing customer data to each other. They are evaluating
  Secure Multiparty Computation (SMPC) using Secret Sharing (e.g., SPDZ) versus Federated Learning (FL)
  with Differential Privacy. The dedicated network links between institutions offer 10 Gbps bandwidth
  and 15ms latency. Evaluate the communication bottleneck of SMPC for a single training step (batch size
  1024) and justify the architectural choice.
question: "Should the consortium use SPDZ-style SMPC or federated learning with differential privacy for the 100M-parameter fraud model, and why?"
details:
  realistic_solution: Federated Learning with Differential Privacy is the realistic choice. SMPC is impractical
    for deep learning at this scale because secret sharing requires communication rounds for every multiplication
    gate or non-linear activation (e.g., ReLU approximations). The 15ms latency would dominate, even with
    massive operation batching, stalling the compute pipeline.
  common_mistake: Candidates often underestimate the massive communication complexity of SMPC, assuming
    it only communicates parameter gradients like Federated Learning, ignoring the fact that SMPC requires
    cross-party communication for every non-linear operation or multiplication.
  napkin_math: For a 100M parameter model (approx 200M FLOPs per sample) and batch size 1024, there are
    ~200 billion operations per step. If 10% are non-linearities requiring a 15ms round-trip, even if
    we batch 10,000 operations per network sync, we need (20B / 10,000) * 15ms = 30,000 seconds per step.
    FL only needs to sync the 400MB gradient once per round, taking ~0.32 seconds at 10 Gbps.
