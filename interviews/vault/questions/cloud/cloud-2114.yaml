title: The Dying ReLU Diagnosis
scenario: During training of a 12-layer MLP on a cloud GPU, you observe that loss plateaus after 1,000
  steps and gradient norms for layers 8-12 drop to near zero. A histogram of layer 10 activations shows
  87% of values are exactly zero. What is the root cause, and what are two systems-aware mitigations?
question: "What is the root cause, and what are two systems-aware mitigations?"
details:
  realistic_solution: 'Root cause: Dying ReLU. With a large learning rate or poor initialization, weight
    updates push pre-activation values permanently negative. Once a ReLU neuron dies (output always 0),
    it receives zero gradient and never recovers. Systems impact: 87% dead neurons means 87% of those
    layers'' MACs are wasted (computing zeros). Mitigations: (1) Switch to LeakyReLU or GELU, which have
    nonzero gradients for negative inputs (compute cost is identical on modern GPUs). (2) Use batch normalization
    or layer normalization before the activation, which re-centers pre-activations and prevents the drift
    into the dead zone. (3) From a systems perspective, activation sparsity can actually be exploited
    with sparse kernels, but unstructured 87% sparsity from dead neurons is usually not the right kind
    of sparsity.'
  common_mistake: Blaming the optimizer or learning rate without inspecting activation distributions.
    The 87% zero activations are the direct signature of dying ReLU neurons, which also waste 87% of the
    compute in those layers.
  napkin_math: ReLU zero-gradient problem. If hidden dim is 4096, batch size 1024, one layer takes 2 *
    1024 * 4096^2 = 34.3 GFLOPs. With 87% dead neurons, 0.87 * 34.3 = 29.8 GFLOPs compute exactly zero
    per forward pass. Across 5 affected layers, ~149 GFLOPs are wasted per step. On A100 (312 TFLOPS),
    this isn't a bottleneck, but gradient flow halts. Switch to GELU; Tensor Cores run it at same FLOP
    cost.
