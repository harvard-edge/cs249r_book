title: LLM Fleet Tail Latency Debugging
scenario: You are operating a production serving fleet of 20 instances (each equipped with 8x A100 80GB GPUs) serving a Llama-3-70B model. Traffic is distributed by an L7 load balancer using a standard Round-Robin algorithm. During a traffic surge, your P99 latency spikes from 1.5s to over 9.0s, but your monitoring dashboard shows the average cluster GPU compute utilization is only 40%. Further inspection reveals some individual instances report 100% KV cache utilization and request queuing, while other instances have over 50% KV cache free.
question: Why does P99 latency hit 9s at 40% average GPU utilization, and what L7 routing policy should replace round-robin?
details:
  realistic_solution: Diagnose the issue as Head-of-Line blocking and uneven load distribution caused by Round-Robin routing of variable-length LLM requests. Change the load balancer policy to Least Outstanding Requests (LOR) or implement KV-cache-aware routing to balance queue depths.
  common_mistake: |
    **The Pitfall:** Assuming the entire cluster is uniformly saturated and attempting to scale out.
    **The Rationale:** High tail latency often indicates resource exhaustion, prompting engineers to blindly add more nodes.
    **The Consequence:** Scaling out wastes money because the root cause—uneven traffic distribution and Head-of-Line blocking—remains unresolved.
  napkin_math: |
    - **Round-Robin dynamics:** Acts like 20 independent M/G/1 queues.
    - **Skewed lengths:** If 5% of requests take 10x longer, Round-Robin inevitably assigns multiple long requests to a single node.
    - **KV Cache Saturation:** Saturated nodes hit the 80GB limit, causing massive Head-of-Line blocking and P99 spikes.
    - **Solution Impact:** LOR (Least Outstanding Requests) routing shifts traffic to idle nodes, approximating a single global M/G/20 queue and **drastically reducing P99 latency.**
