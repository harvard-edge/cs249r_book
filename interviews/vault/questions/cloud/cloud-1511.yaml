title: LLM Fleet Tail Latency Debugging
scenario: You are operating a production serving fleet of 20 instances serving a Llama-3-70B model. Traffic is distributed by an L7 load balancer using a standard Round-Robin algorithm. During a traffic surge, your P99 latency spikes from 1.5s to over 9.0s, but your monitoring dashboard shows the average cluster GPU compute utilization is only 40%. Further inspection reveals some individual instances report 100% KV cache utilization and request queuing, while other instances have over 50% KV cache free.
question: "Why does P99 latency hit 9s at 40% average GPU utilization, and what L7 routing policy should replace round-robin?"
details:
  realistic_solution: Diagnose the issue as Head-of-Line blocking and uneven load distribution caused by Round-Robin routing of variable-length LLM requests. Change the load balancer policy to Least Outstanding Requests (LOR) or implement KV-cache-aware routing to balance queue depths.
  common_mistake: |
    **The Pitfall:** Assuming the entire cluster is uniformly saturated and attempting to scale out.
    **The Rationale:** High tail latency often indicates resource exhaustion, prompting engineers to blindly add more nodes.
    **The Consequence:** Scaling out wastes money because the root cause (uneven traffic distribution and Head-of-Line blocking) remains unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet: 20 instances.
       - Routing: Round-Robin (acting as 20 independent M/G/1 queues).
       - GPU Utilization: 40% average.
    2. **Calculations:**
       - If 5% of requests take 10x longer due to skewed sequence lengths, Round-Robin inevitably stacks multiple long requests onto a single node.
       - Saturated nodes hit the 80GB KV limit while others remain 50% empty.
    3. **Conclusion & Interpretation:**
       - **Result: Queue-Bound HoL Blocking.** Changing routing to Least Outstanding Requests (LOR) approximates a global M/G/20 queue, immediately eliminating Head-of-Line blocking and crushing P99 latency without adding hardware.
