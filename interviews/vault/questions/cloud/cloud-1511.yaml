title: LLM Fleet Tail Latency Debugging
scenario: You are operating a production serving fleet of 20 instances (each equipped with 8x A100 80GB
  GPUs) serving a Llama-3-70B model. Traffic is distributed by an L7 load balancer using a standard Round-Robin
  algorithm. During a traffic surge, your P99 latency spikes from 1.5s to over 9.0s, but your monitoring
  dashboard shows the average cluster GPU compute utilization is only 40%. Further inspection reveals
  some individual instances report 100% KV cache utilization and request queuing, while other instances
  have over 50% KV cache free.
details:
  realistic_solution: Diagnose the issue as Head-of-Line blocking and uneven load distribution caused
    by Round-Robin routing of variable-length LLM requests. Change the load balancer policy to Least Outstanding
    Requests (LOR) or implement KV-cache-aware routing to balance queue depths.
  common_mistake: Assuming the entire cluster is uniformly saturated and attempting to scale out by adding
    more instances, or erroneously debugging the model's inference code rather than fixing the traffic
    distribution bottleneck.
  napkin_math: With 20 nodes and skewed generation lengths, Round-Robin acts like 20 independent M/G/1
    queues. If 5% of requests take 10x longer, Round-Robin will inevitably assign multiple long requests
    to a single node, saturating its 80GB KV cache limit. LOR routing shifts new traffic to idle nodes,
    effectively approximating a single global M/G/20 queue and drastically reducing P99 tail latency.
