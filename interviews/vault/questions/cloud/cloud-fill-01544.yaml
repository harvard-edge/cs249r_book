title: Real-time Anomaly Detection on High-Frequency Sensor Streams with NVIDIA H100
scenario: Imagine you are designing a real-time anomaly detection system for a fleet of autonomous vehicles.
  Each vehicle generates telemetry data (sensor readings, GPS, internal diagnostics) at a combined rate
  of 10 GB/s, arriving as a continuous stream of small messages. Your task is to process this data, extract
  real-time features, and run a lightweight anomaly detection model within a 50ms end-to-end latency budget.
  You have access to a distributed cluster equipped with NVIDIA H100 GPUs, each boasting 80 GB HBM3 memory,
  989 TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth. How would you architect this system,
  and specifically, what considerations would you make to leverage the H100's capabilities for real-time
  feature computation and model inference on this high-velocity data stream, ensuring the latency target
  is met?
question: "How would you architect the H100 stream pipeline to process 10 GB/s telemetry and meet the 50 ms anomaly-detection SLA?"
details:
  realistic_solution: The architecture should involve a robust stream ingestion layer (e.g., Kafka or
    Flink/Spark Streaming), followed by a stream processing layer. For real-time feature computation and
    inference on the H100, one could use a framework like NVIDIA Rapids (Cudf, Cuml) or Triton Inference
    Server. Data should be batched efficiently on the CPU before transfer to the GPU to maximize throughput
    and minimize transfer overhead, but batch sizes must be carefully tuned to respect the 50ms latency
    budget. Leveraging shared memory and asynchronous kernels on the H100 would be crucial. For features
    that require historical context, a low-latency feature store (e.g., Redis, RocksDB) can be integrated,
    with critical hot features potentially mirrored in HBM3 if they fit, reducing host memory access.
    The model should be optimized for FP16 inference to leverage the 989 TFLOPS FP16 dense performance.
    Persistent GPU contexts and kernel warm-up are also important to reduce latency spikes.
  common_mistake: Ignoring the overhead of data serialization/deserialization and network transfer when
    pushing data to the H100 for processing. Engineers might assume the GPU's raw processing power will
    compensate for inefficient data handling, leading to bottlenecks that negate the H100's advantages,
    especially with small, high-frequency messages. Another common mistake is not carefully managing HBM3
    memory to avoid constant host-to-device transfers, especially for feature stores or model weights
    that could fit entirely within the 80GB HBM3.
  napkin_math: To meet the 50ms latency budget for 10 GB/s of telemetry data, we need to consider the
    processing throughput. If we target an average message size of 1 KB, that's `10 GB/s / 1 KB/message
    = 10 * 1024^3 bytes/s / 1024 bytes/message ≈ 10 million messages/s`. For an H100 with 3.35 TB/s HBM3
    bandwidth, a single GPU could theoretically read/write `3.35 * 1024` GB/s. If the feature extraction
    and model inference requires, say, 10 reads and 5 writes to HBM3 per message (e.g., for features,
    model weights, and output), then the total memory access per second for one message stream is `10
    * 10^6 messages/s * (10 + 5) * 1KB/message = 15 * 10^6 KB/s = 15 GB/s`. This is well within the 3.35
    TB/s HBM3 bandwidth of a single H100, indicating that the H100 itself has ample memory bandwidth.
    The critical bottleneck will likely be PCIe data transfer to the H100. A PCIe Gen5 x16 link provides
    roughly 64 GB/s bi-directional. If the input data is 10 GB/s, and we assume an additional 2 GB/s for
    feature store lookups or model updates transferred over PCIe, then `12 GB/s` is well within the PCIe
    link capacity. Therefore, one or a few H100s could handle the raw throughput if data transfer is optimized,
    and the compute (989 TFLOPS FP16) is highly efficient for the specific feature engineering and model
    inference tasks. The key implementation challenge is to manage batching for efficiency without exceeding
    the 50ms latency, and minimizing host-to-device transfers by keeping hot data/models in HBM3.
