title: Strict vs Lenient Validation Gates
scenario: 'Your validation gates block 40% of model candidates. The ML team complains this slows iteration.
  Management wants to relax thresholds. Options: (A) relax all thresholds by 20%, (B) make fairness and
  latency gates strict but relax accuracy threshold, (C) add a ''provisional deploy'' path with enhanced
  monitoring. Evaluate.'
question: "Should management relax all gates, selectively relax accuracy, or add provisional deploys to reduce the 40% block rate?"
details:
  realistic_solution: 'Option A (relax all by 20%): Reduces blocking to ~20%, but relaxing fairness gates
    by 20% could allow discriminatory models into production — regulatory and reputational risk. Relaxing
    latency gates may cause SLA violations. Too risky. Option B (selective relaxation): Keep fairness
    and latency gates strict (these have hard external constraints — regulations, SLAs). Relax accuracy
    threshold from ''must improve'' to ''must not regress by more than 0.5%.'' This allows models with
    different accuracy-latency trade-offs. Blocking rate drops to ~25% while maintaining safety. Best
    balance. Option C (provisional deploy): Deploy to a small percentage of traffic with enhanced monitoring
    and auto-rollback triggers. This is essentially a canary deployment as a validation gate. Allows faster
    iteration but requires robust monitoring infrastructure. Risk: monitoring may not catch subtle fairness
    issues in small traffic samples. Recommendation: B for immediate relief, then add C as an additional
    fast-path for models that pass safety gates but narrowly fail accuracy gates.'
  common_mistake: Uniformly relaxing all thresholds (A). Not all gates carry equal risk — relaxing fairness
    gates could create legal liability, while relaxing accuracy slightly may be acceptable.
  napkin_math: 'A: 40%→20% blocked, high risk. B: 40%→25% blocked, safety preserved. C: 40%→10% blocked
    but requires monitoring infra. B is safest quick win.'
