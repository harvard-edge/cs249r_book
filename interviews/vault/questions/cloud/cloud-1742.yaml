title: Image Preprocessing Bottleneck in GPU Serving
scenario: 'You are deploying an image classification service on a GPU instance. GPU inference takes 5ms per batch of 32 images, but end-to-end latency is 45ms. Profiling reveals that JPEG decoding and resizing via Python PIL take 35ms per batch on the CPU, with 5ms of network I/O. Your team proposes upgrading to faster GPUs to meet a strict 15ms end-to-end latency SLO.'
question: Will upgrading the GPU meet the 15ms SLO, and what architecture is more cost-effective?
details:
  realistic_solution: 'Reject the GPU upgrade. The system is heavily CPU-bound. Offload JPEG decoding and image resizing to the GPU using libraries like NVIDIA DALI or nvJPEG, or optimize the CPU pipeline using libjpeg-turbo and OpenCV. This shifts the 35ms CPU penalty to <5ms, comfortably meeting the 15ms SLO.'
  common_mistake: |
    **The Pitfall:** Approving the GPU upgrade or focusing on model quantization.
    **The Rationale:** Engineers ignore Amdahl's Law and assume the GPU is always the bottleneck in ML workloads.
    **The Consequence:** Wasting budget on faster GPUs that sit idle because the CPU preprocessing is the actual bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - E2E = 45ms (5ms net + 35ms CPU + 5ms GPU).
    - SLO = 15ms.
    
    **Calculations:**
    - If GPU time = 0ms, E2E = 40ms (Fails SLO).
    - Offloading CPU to GPU: E2E = 5ms net + 3ms GPU prep + 5ms GPU inf = 13ms.
    
    **Conclusion & Interpretation:**
    - **Result: 13ms (Compute-Bound)**. Compute-Bound on CPU. Upgrading GPUs will not meet the SLO.
