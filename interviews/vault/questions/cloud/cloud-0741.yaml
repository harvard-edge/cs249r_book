validation_issues:
- 'The Napkin Math states ''Aggregate traffic across the network: 256 × 279.5 GB = 71.5 TB (each byte
  traverses multiple links)''. This `71.5 TB` value represents the total volume of data moved *by all
  GPUs* in the all-reduce, not necessarily the actual total traffic *across the network fabric*. The total
  traffic across the network fabric needs to consider the topology and how many times data might traverse
  links. This phrasing is potentially ambiguous.'
- The statement '2-tier fat-tree spine bisection = 256 × 400 Gbps = 102.4 Tbps = 12.8 TB/s' seems to calculate
  the *total link capacity* connected to the spine, not necessarily the *bisection bandwidth* itself,
  which is a specific measure of throughput across a cut that divides the network into two halves. While
  related, the terms are distinct and could be confused.
- 'The ''90% efficiency (64 GPUs): AllReduce ≈ 2.8s'' and ''35% efficiency (256 GPUs): AllReduce ≈ 7.2s''
  are given values that are not directly derived or linked to the calculation of `71.5 TB / 12.8 TB/s`.
  It would be helpful to show how these observed times relate to the theoretical bandwidth to demonstrate
  the efficiency drop.'
