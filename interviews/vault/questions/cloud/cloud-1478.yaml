title: 'Mitigating Annotation Degradation in Moderation Pipelines'
scenario: 'You manage a cloud-based content moderation ML pipeline processing 5M images daily. F1 scores have dropped from 0.92 to 0.85 due to Label Quality Drift at your vendor. You have a fixed labeling budget of $10,000/day.'
question: 'Which labeling strategy should you choose under the $10,000/day budget to address label quality drift: (1) k=3 consensus, (2) 5% in-house sample, or (3) Confident Learning?'
details:
  realistic_solution: 'Combine a small, continuous in-house gold standard auditing pipeline (Strategy 2) with automated Confident Learning (Strategy 3) to sanitize the bulk vendor data, staying within budget while anchoring quality.'
  common_mistake: |
    **The Pitfall:** Proposing blind model retraining or enforcing expensive k=3 consensus.
    **The Rationale:** Candidates reach for standard quality-assurance mechanisms without crunching the operational cost implications.
    **The Consequence:** The proposed solution immediately blows past the strict $10,000/day fixed operational budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline vendor: 100k labels at $0.10/image = $10,000/day.
       - Budget cap: $10,000/day.
       - Strategy 1 (k=3): 3x vendor cost.
       - Expert in-house labels: $0.50/image.
    2. **Calculations:**
       - Strategy 1 Cost: 100k × $0.30 = $30,000 (Violates budget).
       - Strategy 2+3 Cost: 5% expert sample (5,000 images × $0.50) = $2,500. Remaining $7,500 buys 75,000 vendor labels.
    3. **Conclusion & Interpretation:**
       - **Result: Confident Learning yields 80k clean labels strictly within the $10k limit. System is Operational-Budget-Bound.**
