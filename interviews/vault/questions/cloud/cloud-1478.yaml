title: Mitigating Annotation Degradation in Moderation Pipelines
scenario: 'You manage a cloud-based content moderation ML pipeline processing 5M images daily. Over the
  last 6 months, offline evaluation F1 scores against the human-labeled holdout set have dropped from
  0.92 to 0.85, yet feature drift monitoring shows stable underlying data distributions and user engagement
  metrics remain flat. You suspect ''Label Quality Drift'' due to high turnover at your external annotation
  vendor. You have a fixed labeling budget of $10,000/day. Evaluate the trade-offs between three strategies:
  1) Enforcing k=3 multi-annotator consensus on all new data, 2) Using a highly-trained in-house team
  to relabel a 5% daily sample to establish a ''gold standard'' for loss calibration, or 3) Applying Confident
  Learning to automatically filter out noisy labels based on the model''s own uncertainty. Justify your
  design decision quantitatively.'
question: "Which labeling strategy should you choose under the $10,000/day budget to address label quality drift, and why?"
details:
  realistic_solution: Combine a small, continuous in-house 'gold standard' auditing pipeline (Strategy
    2) with automated Confident Learning (Strategy 3) to sanitize the bulk vendor data, staying within
    budget while anchoring quality.
  common_mistake: Candidates often propose retraining the model blindly or enforcing k=3 consensus without
    calculating that it will immediately blow past the fixed operational budget.
  napkin_math: 'Assume baseline vendor cost is $0.10/image. 100k labels = $10k/day. Strategy 1 (k=3) costs
    $30k/day (exceeds budget by 3x). Strategy 2: Expert in-house labels cost $0.50/image. A 5% sample
    (5,000 images) = $2,500. The remaining $7,500 buys 75k vendor labels. Using Confident Learning on
    the 75k vendor labels anchored by the 5k expert labels allows you to train on ~80k high-quality labels
    daily while strictly adhering to the $10k budget.'
