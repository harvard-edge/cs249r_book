title: Mitigating Annotation Degradation in Moderation Pipelines
scenario: You manage a cloud-based content moderation ML pipeline processing 5M images daily. Over the last 6 months, offline evaluation F1 scores against the human-labeled holdout set have dropped from 0.92 to 0.85, yet feature drift monitoring shows stable underlying data distributions and user engagement metrics remain flat. You suspect 'Label Quality Drift' due to high turnover at your external annotation vendor. You have a fixed labeling budget of $10,000/day. You must evaluate: 1) Enforcing k=3 multi-annotator consensus on all new data, 2) Using an in-house team to relabel a 5% daily sample for loss calibration, or 3) Applying Confident Learning to automatically filter out noisy labels based on the model's own uncertainty.
question: Which labeling strategy should you choose under the $10,000/day budget to address label quality drift, and why?
details:
  realistic_solution: Combine a small, continuous in-house 'gold standard' auditing pipeline (Strategy 2) with automated Confident Learning (Strategy 3) to sanitize the bulk vendor data, staying within budget while anchoring quality.
  common_mistake: |
    **The Pitfall:** Proposing blind model retraining or enforcing expensive k=3 consensus.
    **The Rationale:** Candidates reach for standard quality-assurance mechanisms without crunching the operational cost implications.
    **The Consequence:** The proposed solution immediately blows past the strict $10,000/day fixed operational budget.
  napkin_math: |
    - Baseline vendor cost: $0.10/image. 100k labels = $10,000/day (budget cap).
    - Strategy 1 (k=3 consensus): Costs $30,000/day (Exceeds budget by 3x).
    - Strategy 2 + 3 (Hybrid):
      - Expert in-house labels: $0.50/image. A 5% sample (5,000 images) = $2,500.
      - Remaining budget: $7,500 buys 75,000 vendor labels.
    - **Conclusion:** Confident Learning on the 75k vendor labels using the 5k expert anchors yields ~80k high-quality labels daily, remaining strictly within the $10k budget.
