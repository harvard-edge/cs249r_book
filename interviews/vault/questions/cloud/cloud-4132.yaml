title: Scheduling for Heterogeneous GPU Clusters
scenario: 'Your cluster has 3 GPU types: 32× H100 (80 GB, 989 TFLOPS BF16), 16× MI300X (192 GB, 1.3 PFLOPS BF16), and 64× A100 (80 GB, 312 TFLOPS BF16).'
question: How would you design a heterogeneous scheduler to maximize throughput-per-dollar across H100, MI300X, and A100 GPUs for a mixed workload of LLM training, inference, and fine-tuning?
details:
  realistic_solution: 'Affinity-based heterogeneous scheduler: (1) Job profiling: classify each job by resource bottleneck — compute-bound (training large models), memory-bound (long-context inference), or balanced (fine-tuning). (2) GPU affinity matrix: H100: best for FP8 training (Transformer Engine), compute-bound prefill, medium-batch inference. Affinity: training=0.9, inference=0.7, fine-tuning=0.6. MI300X: best for memory-bound decode (5.3 TB/s bandwidth, 192 GB capacity), long-context inference, large-batch training. Affinity: training=0.85, inference=0.95, fine-tuning=0.5. A100: best for fine-tuning (cost-effective), small model inference, data preprocessing. Affinity: training=0.5, inference=0.6, fine-tuning=0.9. (3) Scheduling algorithm: for each incoming job, compute score = affinity × (1 / queue_wait_time) × (1 / cost_per_gpu_hour) for each GPU type. Assign to highest-scoring GPU type with available capacity. (4) Cost normalization: normalize job accounting by GPU-equivalent-hours. 1 H100-hour = 3.17 A100-hours (990/312 TFLOPS ratio). Charge teams in normalized units so they are indifferent to GPU assignment. (5) Fallback: if preferred GPU type is full, allow placement on next-best type with a 10-minute queue wait before fallback triggers.'
  common_mistake: |
    **The Pitfall:** Implementing simple priority queuing across all GPU types without affinity.
    **The Rationale:** Candidates might treat all GPUs as generic compute resources without recognizing their distinct architectural advantages.
    **The Consequence:** Placing a memory-bound workload on a compute-optimized GPU (wasting its capabilities) or vice-versa, destroying fleet-wide cost efficiency.
  napkin_math: |
    1. 70B decode on MI300X: Fits on 1 GPU (192 GB capacity).
    2. 70B decode on H100: Requires 2 GPUs (TP=2) due to 80 GB capacity.
    3. 70B decode on A100: Requires 2 GPUs (TP=2) due to 80 GB capacity.
    4. Cost ratio per serving node: MI300X 1x vs H100 2x vs A100 2x.
    5. **MI300X wins dramatically for memory-bound inference due to its larger VRAM footprint.**
