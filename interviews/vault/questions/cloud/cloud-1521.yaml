title: Sizing an M/G/c/K LLM Inference Queue
scenario: You are deploying a Llama-3 8B model on an inference cluster with c=8 NVIDIA L4 GPUs. Incoming
  requests follow a Poisson arrival process at λ = 40 requests/sec. Because prompt lengths vary wildly,
  the service time follows a General distribution with a mean of 150 ms per request. To prevent unbounded
  latency and OOMs, the API gateway is configured with an M/G/c/K queue where the maximum concurrent requests
  in the system is capped at K=32. Assuming the system reaches a steady state where the average number
  of requests in the system is 16 and dropped requests are negligible, calculate the server utilization
  (ρ) and the average end-to-end latency.
question: "What are the server utilization ρ and average end-to-end latency for the M/G/c/K Llama-3 8B service?"
details:
  realistic_solution: First, calculate the utilization factor using ρ = (λ × E[S]) / c to ensure the system
    is stable (ρ < 1). Then apply Little's Law (L = λW) to estimate the mean response time based on the
    average system population.
  common_mistake: Using M/M/c formulas which assume exponential service times, or incorrectly calculating
    utilization by failing to divide by the number of servers c (GPUs).
  napkin_math: 'ρ = (40 req/s * 0.15 s) / 8 = 0.75 (75% utilization). Little''s Law: L = λW -> W = L /
    λ = 16 / 40 = 0.4 seconds (400 ms latency).'
