title: Sizing an M/G/c/K LLM Inference Queue
scenario: You are deploying a Llama-3 8B model on an inference cluster with c=8 GPUs. Incoming requests follow a Poisson arrival process at lambda = 40 requests/sec. Because prompt lengths vary wildly, the service time follows a General distribution with a mean of 150 ms per request. The API gateway acts as an M/G/c/K queue with maximum concurrent requests K=32. The system reaches a steady state where the average number of requests in the system is 16.
question: What are the server utilization p and average end-to-end latency for the service?
details:
  realistic_solution: 'First, calculate the utilization factor using p = (lambda x E[S]) / c to ensure the system is stable. Then apply Little''s Law (L = lambda x W) to estimate the mean response time based on the average system population.'
  common_mistake: |
    **The Pitfall:** Forgetting to divide by the number of servers (c).
    **The Rationale:** Candidates often incorrectly apply single-server queuing formulas or assume the M/M/c exponential service time applies to LLMs.
    **The Consequence:** The candidate calculates mathematically impossible utilizations (>100%) and misdiagnoses the system's stability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate (lambda): 40 req/s.
    - Mean service time (E[S]): 0.15 s.
    - Servers (c): 8.

    **Calculations:**
    - Utilization (p): (lambda x E[S]) / c = (40 x 0.15) / 8 = 0.75.
    - Little's Law (W = L / lambda): W = 16 / 40 = 0.4 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.75 utilization (Compute-Bound)**. Server utilization is 75%, and average end-to-end latency is 400 ms.
