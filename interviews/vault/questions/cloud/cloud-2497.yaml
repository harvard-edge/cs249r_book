title: Over-the-Air Weight Updates for IoT
scenario: 'You manage 50,000 remote pipeline anomaly sensors connected via NB-IoT (100 kbps, 500mW Tx/Rx power). The battery is 5000mAh (3V) and must last 5 years. The cloud needs to push weekly updates to the 150KB INT8 TFLite Micro model. Pushing full models over NB-IoT violates the battery life constraints.'
question: "How would you update the 150KB INT8 model weekly over NB-IoT without violating the 5-year battery-life constraint?"
details:
  realistic_solution: The cloud architecture must implement delta-based Over-The-Air (OTA) updates. Instead of transmitting the full 150KB binary, the cloud computes the weight differences between the deployed model and the new model. Since retraining often changes only a fraction of weights significantly, the cloud applies a sparsity threshold, encodes the diffs using sparse formats (e.g., CSR) and Huffman coding. The edge device receives this small payload (e.g., 5KB), decodes it, and patches the model in flash memory. This reduces the OTA energy footprint by >95%, keeping it well within the 5-year battery budget.
  common_mistake: |
    **The Pitfall:** Sending the full 150KB model file directly to the device and relying on standard TCP retries.
    
    **The Rationale:** It's easy to treat ML model updates like standard software patches, ignoring the extreme energy constraints of NB-IoT edge devices.
    
    **The Consequence:** The continuous long-duration radio transmission rapidly depletes the device battery, leading to a fleet-wide battery failure long before the 5-year target.
  napkin_math: |
    * **Battery Budget:** 5000mAh × 3V = 15,000 mWh = 54,000 Joules
    * **Weekly Budget:** 54,000 J / 260 weeks = 20.7 J/week (if allocating 10% to OTA, ~2 J/week)
    * **Full Model OTA:** 150 KB at 100 kbps = 1,228,800 bits / 100,000 bps = 12.3 seconds
    * **Full Model Energy:** 12.3s × 0.5W = 6.15 Joules (~30% of total weekly budget)
    * **Delta OTA:** 5 KB at 100 kbps = 40,960 bits / 100,000 bps = 0.4 seconds
    * **Delta Energy:** 0.4s × 0.5W = 0.2 Joules
    * **Result:** **Delta updates reduce OTA energy from 6.15 J to 0.2 J, easily satisfying the strict battery constraint.**
