title: 'AllReduce Topology Diagnosis: Ring vs Butterfly on TPU v5e Pod'
scenario: A TPU v5e pod (256 chips, 197 TFLOPS BF16) uses a 2D torus interconnect. The MXU training job
  shows AllReduce time of 2.1s but a colleague's ring-AllReduce analysis predicts 800ms. Diagnose why
  the measured time is 2.6× slower and what interconnect property explains the discrepancy.
question: "Why is TPU v5e AllReduce measured at 2.1 s when ring-AllReduce analysis predicts 800 ms?"
details:
  realistic_solution: 'Ring-AllReduce assumes all-to-all bandwidth = link_bandwidth. TPU torus: each chip
    has 4 links (2 in each dimension of 2D torus). Bisection bandwidth of N×N torus = N×link_bandwidth/4
    (cut along one dimension). For 16×16 torus (256 chips): bisection BW = 16×link_BW/4. If ring-AllReduce
    routes gradients across the bisection, it sees 4× less effective bandwidth than ring formula assumes.
    800ms × (16/4) = 3200ms theoretical torus ring → 2.1s measured is actually better than expected (60%
    of ring BW used). TPU v5e uses ICI (Inter-Chip Interconnect) at ~900GB/s per link direction; torus
    BW is topology-limited, not link-limited.'
  common_mistake: Applying ring-AllReduce bandwidth formula to a 2D torus without accounting for the bisection
    bandwidth limitation of torus topologies.
  napkin_math: 'Ring formula assumes full link BW. Torus bisection: cut 256-chip 16×16 torus in half →
    16 links × 112.5GB/s (ICI) = 1800GB/s bisection BW. vs. single ring with 256 chips: effective BW per
    GPU for ring = 1 link = 112.5GB/s. Torus BW per chip for cross-bisection traffic: 1800GB/s / 128 =
    14GB/s. That''s why AllReduce is slow: cross-bisection traffic sees 112.5/14=8× bandwidth reduction.'
