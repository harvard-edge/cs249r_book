title: The AllReduce Scaling Trap
scenario: You are a Staff ML Systems Engineer running a distributed training job for a 70B parameter model
  using FP16 precision. Your profiling tool reports that `AllReduce` operations are taking an unexpectedly
  long time, causing poor scaling efficiency. When training on a single 8xH100 node, performance is excellent.
  When you scale to two nodes (16 GPUs), your effective throughput per GPU drops by 60%. Your monitoring
  shows that the GPUs are waiting, and the bottleneck is clearly communication. You are using RDMA over
  an InfiniBand NDR network. Diagnose the most likely communication bottleneck.
details:
  realistic_solution: The bottleneck is the inter-node InfiniBand fabric. While NVLink provides extremely
    fast communication *within* a single server node, the `AllReduce` operation must synchronize gradients
    across all 16 GPUs, meaning data must traverse the significantly slower InfiniBand network between
    the two nodes. The performance of a distributed `AllReduce` is governed by its weakest link. The time
    to send gradients over the network far exceeds the time to exchange them locally via NVLink, and this
    network latency is what dominates the observed `AllReduce` time and causes the scaling efficiency
    to plummet.
  common_mistake: Engineers often conflate all communication bottlenecks into one category. They might
    blame the fastest interconnect (NVLink) because it's 'closer' to the GPU, or incorrectly trace the
    data path through the CPU, underestimating the impact of the inter-node network fabric, which is orders
    of magnitude slower than on-node interconnects.
  napkin_math: '70B FP16 gradients = 140GB. On a single node, AllReduce uses 900 GB/s NVLink. Transfer
    volume: 2 * (7/8) * 140GB = 245GB. Time = 245 / 900 = 0.27s. Across 2 nodes (16 GPUs), traffic must
    cross the 50 GB/s InfiniBand NDR link. Transfer volume: 2 * (15/16) * 140GB = 262.5GB. Time = 262.5
    / 50 = 5.25 seconds. A 19x latency increase.'
  options:
  - The PCIe Gen5 bus is saturated because gradients must be copied to CPU RAM before being sent to the
    network.
  - The NVLink 4.0 interconnect within each node is the bottleneck; it cannot handle the 70B model's gradient
    exchange.
  - The inter-node InfiniBand NDR network fabric is the bottleneck, as its bandwidth is much lower than
    the intra-node NVLink fabric.
  - The CPUs on each node are overwhelmed with coordinating the RDMA transfers, starving the GPUs of instructions.
  correct_index: 2
