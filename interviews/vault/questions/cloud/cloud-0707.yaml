title: The AllReduce Scaling Trap
scenario: You are a Staff ML Systems Engineer running a distributed training job for a 70B parameter model using FP16 precision. Your profiling tool reports that `AllReduce` operations are taking an unexpectedly long time, causing poor scaling efficiency. When training on a single 8xH100 node, performance is excellent. When you scale to two nodes (16 GPUs), your effective throughput per GPU drops by 60%. Your monitoring shows that the GPUs are waiting, and the bottleneck is clearly communication. You are using RDMA over an InfiniBand NDR network.
question: "What communication bottleneck causes poor scaling when the 70B FP16 job moves from one 8×H100 node to two nodes over InfiniBand NDR?"
details:
  realistic_solution: The bottleneck is the inter-node InfiniBand fabric. While NVLink provides extremely fast communication *within* a single server node, the `AllReduce` operation must synchronize gradients across all 16 GPUs, meaning data must traverse the significantly slower InfiniBand network between the two nodes. The performance of a distributed `AllReduce` is governed by its weakest link. The time to send gradients over the network far exceeds the time to exchange them locally via NVLink, and this network latency is what dominates the observed `AllReduce` time and causes the scaling efficiency to plummet.
  common_mistake: |
    **The Pitfall:** Conflating all interconnects and blaming the PCIe bus or NVLink for the slowdown.
    **The Rationale:** Engineers correctly identify a communication bottleneck but fail to distinguish between the blazing fast intra-node NVLink and the much slower inter-node InfiniBand.
    **The Consequence:** Teams might waste time tuning local GPU parameters or PCIe settings when the true bottleneck spans across the physical server racks.
  napkin_math: |
    1. Total gradients for 70B FP16 model: 140GB.
    2. Single Node (NVLink @ 450 GB/s): Transfer volume per GPU is 2 * (7/8) * 140GB = 245GB. Time = 245GB / 450 GB/s = ~0.54s.
    3. Two Nodes (InfiniBand NDR @ 50 GB/s): A flat ring AllReduce must cross the node boundary. Transfer volume per GPU is 2 * (15/16) * 140GB = 262.5GB.
    4. Inter-node transfer time: 262.5GB / 50 GB/s = ~5.25 seconds.
    **Crossing the inter-node InfiniBand link causes a ~9.7x latency increase (5.25s vs 0.54s) compared to pure NVLink.**
  options:
  - The PCIe Gen5 bus is saturated because gradients must be copied to CPU RAM before being sent to the network.
  - The NVLink 4.0 interconnect within each node is the bottleneck; it cannot handle the 70B model's gradient exchange.
  - The inter-node InfiniBand NDR network fabric is the bottleneck, as its bandwidth is much lower than the intra-node NVLink fabric.
  - The CPUs on each node are overwhelmed with coordinating the RDMA transfers, starving the GPUs of instructions.
  correct_index: 2
