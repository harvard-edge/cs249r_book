title: Resolving Feature-Model Desynchronization
scenario: During a Blue/Green deployment of a V2 recommendation model, P99 latency suddenly spikes from 50ms to 800ms, triggering automated rollbacks. The V2 model requires a new feature (`user_affinity_v2`) fetched from a Redis online feature store at runtime. The batch pipeline began backfilling this feature into Redis at the exact same time the model deployment started.
question: "How would you prevent the V2 model rollout from causing Redis cache-miss storms on user_affinity_v2?"
details:
  realistic_solution: Decouple the feature store backfill lifecycle from the model deployment lifecycle. The latency spike is caused by a massive cache-miss storm because the feature is missing in Redis during backfill. Fix: 1) Deploy the feature pipeline days in advance and dual-write to both namespaces. 2) Monitor cache hit rate until it reaches >99%. 3) Only then trigger the Blue/Green deployment. 4) Enforce via a Model Registry webhook.
  common_mistake: |
    **The Pitfall:** Increasing Redis timeout settings or scaling up the Redis cluster.
    **The Rationale:** Candidates assume the database is overwhelmed by raw request volume rather than realizing the cache misses are triggering extremely slow fallback computation pathways.
    **The Consequence:** Scaling Redis does nothing to resolve the fallback compute bottleneck, and latency remains at 800ms+ until the backfill naturally completes.
  napkin_math: |
    1. **Service throughput:** 5,000 QPS.
    2. **Latency baselines:** Cache hit = 1ms. Cache miss (fallback compute) = 150ms.
    3. **Average latency during backfill (80% miss rate):** (0.2 * 1ms) + (0.8 * 150ms) = 120.2ms.
    4. **Thread pool exhaustion:** 5,000 QPS * 0.8 = 4,000 heavy operations/sec. By Little's Law, required concurrency = 4,000 * 0.15s = 600 concurrent threads.
    5. **Result:** This instantly exhausts a typical 200-thread worker pool, causing P99 to skyrocket to **800ms+** due to severe queueing delays.
