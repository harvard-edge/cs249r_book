title: The Optimal Checkpoint Interval
scenario: You are training on 512 GPUs. The mean time between failures (MTBF) for the cluster is 2 hours. Checkpointing takes 5 minutes and pauses all training.
question: What checkpoint interval minimizes wasted time (checkpoint overhead plus expected lost work from failures)?
details:
  realistic_solution: 'Solve the optimization problem balancing checkpoint frequency overhead against expected lost work. Let $\tau$ = checkpoint interval, $\delta$ = checkpoint duration (5 min), $\lambda$ = failure rate (1/MTBF = 0.5/hr). Minimize $f(\tau) = \delta/\tau + \lambda\tau/2$. Taking the derivative reveals the optimal interval is $34.6\text{ minutes}$.'
  common_mistake: |
    **The Pitfall:** Over-checkpointing to avoid losing any work.
    **The Rationale:** When hardware is unreliable, engineers intuitively tighten the interval to "save" progress.
    **The Consequence:** Checkpointing every 5 minutes maximizes I/O overhead, meaning the cluster spends 50% of its time writing checkpoints instead of calculating gradients.
  napkin_math: |
    1. **Objective function:** $f(\tau) = \delta/\tau + \lambda\tau/2$.
    2. Take derivative: $f'(\tau) = -\delta/\tau^2 + \lambda/2 = 0$.
    3. Solve for optimal interval: $\tau^* = \sqrt{2\delta/\lambda}$.
    4. With $\delta = 5\text{ min} = 1/12\text{ hr}$, $\lambda = 0.5/\text{hr}$:
       $\tau^* = \sqrt{2 \times (1/12) / 0.5} = \sqrt{1/3} \approx 0.577\text{ hr} \approx 34.6\text{ minutes}$.
    5. Wasted time at optimal: $(1/12)/0.577 + 0.5 \times 0.577/2 = 0.144 + 0.144 = 28.9\%\text{ overhead}$.
    6. **Compare to 10 min interval (54.2% overhead) or 2 hr interval (54.2% overhead).**
