title: Negative Sampling Bias in Recommendation Training
scenario: 'Your recommendation model is trained with in-batch negatives (other items
  in the same batch serve as negatives for each positive pair). At 1M QPS serving,
  you observe a popularity bias: the top-0.1% most popular items account for 40% of
  recommendations even though they represent 3% of catalog impressions. Diagnose why
  in-batch negatives cause this bias and propose a debiasing technique.'
question: Why do in-batch negatives create the observed popularity bias, and what
  debiasing technique would you use?
details:
  realistic_solution: 'In-batch negatives: for a batch of B items, each positive pair
    (user, item_i) uses the other B-1 items as negatives. Popular items appear in
    the batch more often (proportional to their frequency in training data). An item
    appearing K× more frequently serves as a negative K× more often — its embedding
    is pushed away from all other items K× more. This makes popular items'' embeddings
    ''universally repellent'' in a counterintuitive way — BUT simultaneously, popular
    items appear as positives K× more often too, pulling their embeddings toward the
    users who do interact with them. Net effect: popular items dominate the learned
    embedding space because they receive disproportionately more gradient updates,
    leading to sharper, better-calibrated embeddings that the ranking MLP learns to
    prefer. Debiasing: (1) Logit adjustment: subtract log(item_frequency) from the
    ranking score at inference time (frequency-based logit correction). (2) Popularity-stratified
    sampling: oversample rare items as negatives to equalize training signal. (3)
    Hard negative mining: use items with high predicted score but no interaction as
    negatives, forcing the model to distinguish similar items rather than just popular
    ones.'
  common_mistake: Blaming the ranking model's MLP weights. The bias is in the embedding
    space — popular items have better-trained embeddings because they appear as negatives
    more often, making them universally high-similarity.
  napkin_math: 'Item popularity: Zipf(α=1.0). Top 0.1% = 1k items out of 1M. Fraction
    of in-batch negatives they represent: proportional to popularity → top 0.1% appear
    in ~10% of batches as negatives at α=1.0. 10% of gradient steps update their embeddings
    as negatives. For 100B training examples: 10B gradient updates to top 1k items
    vs 100M for median item (100× more updates). Well-trained vs poorly-trained embeddings:
    100× training signal → 10× lower embedding variance → sharper recommendations.
    Logit correction: score_corrected = score - β × log(freq_i / avg_freq). At β=1:
    popular item score reduced by log(100) = 4.6 nats ≈ enough to reduce top-0.1%
    from 40% to ~15% of recommendations.'
