title: The Chatbot's Silent Wait
scenario: You are an ML Systems Engineer optimizing a real-time LLM chatbot service. The service has a strict P99 Time-To-First-Token (TTFT) SLO of 500ms. Under a moderate, spiky load averaging 20 RPS, you observe that the P99 TTFT is spiking to ~800ms, yet the GPU is only 60% utilized on average. Your serving stack uses a static batching strategy with a fixed batching timeout of 200ms.
question: What is most likely causing the 800ms P99 TTFT when the GPU is only 60% utilized and static batching uses a 200ms timeout?
details:
  realistic_solution: 'The primary bottleneck is queueing delay introduced by the static batching scheduler. The fixed 200ms timeout forces requests that arrive early in the window to sit idle, accumulating latency before computation even begins. The 60% average GPU utilization is the key signal: the GPU is spending a significant fraction of its time waiting for the next batch window to close. The P99 latency spike to 800ms can be explained by a cascade of these delays under load. The correct architectural solution is to replace the static batcher with a continuous batching scheduler (as used in systems like vLLM or TGI), which dispatches a new batch as soon as the GPU is free, minimizing idle time and drastically reducing queueing latency.'
  common_mistake: |
    **The Pitfall:** Blaming the GPU hardware or the model itself when latency spikes.
    **The Rationale:** Engineers default to assuming "high latency means the compute is too slow" without analyzing utilization metrics.
    **The Consequence:** Teams undertake expensive hardware upgrades or premature optimization (like quantization) while ignoring the real bottleneck: wait time induced by the batching scheduler.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - P99 TTFT SLO: 500ms. P99 actual: 800ms.
       - GPU Utilization: 60%.
       - Static batching timeout: 200ms.
    2. **Calculations:**
       - Utilization Gap: GPU idle 400ms per second.
       - Queueing Delay: Fixed 200ms timeout forces early requests to wait up to 200ms.
       - Latency Breakdown: TTFT = Wait (200ms) + Compute + Cascading Queue Delays = 800ms.
    3. **Conclusion & Interpretation:**
       - **Result: 800ms TTFT is caused by an artificial Scheduler-Queue-Bound wait, not a compute limitation.**
  options:
  - The H100 GPU is not powerful enough for this load. We should upgrade to a B200 to reduce the per-batch compute time.
  - The model's prefill computation is the bottleneck. We should apply INT8 quantization to reduce the TFLOPs required.
  - The fixed 200ms batching timeout is causing excessive queueing delay; requests wait idly instead of being processed.
  - The bottleneck is network I/O from fetching user data for each request, causing the serving process to block before batching.
  correct_index: 2
