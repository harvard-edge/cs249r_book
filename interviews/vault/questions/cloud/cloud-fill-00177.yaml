validation_issues:
- Napkin Math states 512KB/token for KV-cache, but calculation 2 * hidden_dim * num_heads * 2 bytes is
  incorrect. It should be (hidden_dim * num_heads) * 2 * 2 bytes if hidden_dim is total per layer, or
  (head_dim * num_heads) * 2 * 2 bytes if head_dim is per head.
- Napkin Math section is incomplete.
