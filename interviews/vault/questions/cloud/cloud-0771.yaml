title: The Data Parallel Straggler
scenario: You're running standard Data Parallel (DDP) training on 256 GPUs. One specific node has a slightly
  degraded cooling fan, causing its 8 GPUs to thermal throttle and run 15% slower than the rest of the
  cluster. The network is perfectly healthy. By exactly how much does this single degraded node slow down
  the entire 256-GPU training job?
details:
  realistic_solution: It slows down the entire job by **exactly 15%**. 256 GPUs * $3/hr = $768/hour. A
    15% slowdown wastes $115 every hour in idle compute time across the healthy nodes, vastly exceeding
    the cost of just replacing the $15 broken cooling fan.
  common_mistake: '"It slows down the job by (15% / 256) since it''s only one node." This assumes asynchronous
    execution.'
  napkin_math: 256 GPUs * $3/hr = $768/hour. A 15% slowdown wastes $115 every hour in idle compute time
    across the healthy nodes, vastly exceeding the cost of just replacing the $15 broken cooling fan.
