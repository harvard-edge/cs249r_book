title: The Data Parallel Straggler
scenario: >-
  You're running standard Data Parallel (DDP) training on 256 GPUs. One specific node has a slightly
  degraded cooling fan, causing its 8 GPUs to thermal throttle and run 15% slower than the rest of the
  cluster. The network is perfectly healthy.
question: >-
  By exactly how much does this single degraded node slow down the entire 256-GPU training job?
details:
  realistic_solution: 'It slows down the entire job by **exactly 15%**. 256 GPUs * $3/hr = $768/hour. A 15% slowdown wastes $115 every hour in idle compute time across the healthy nodes, vastly exceeding the cost of just replacing the $15 broken cooling fan.'
  common_mistake: |
    **The Pitfall:** Assuming the slowdown is averaged across the cluster.
    **The Rationale:** Candidates often divide the 15% slowdown by 256 nodes, mistakenly applying asynchronous logic to a synchronous bulk-synchronous parallel (BSP) workload.
    **The Consequence:** Ignoring critical hardware anomalies, allowing a $15 fan to waste hundreds of dollars an hour.
  napkin_math: |
    1. **Straggler effect:** Synchronous DDP forces all GPUs to wait for the slowest one.
    2. **Job Slowdown:** The entire job slows down by exactly **15%.**
    3. **Compute waste:** 256 GPUs × $3/hr = $768/hour.
    4. **Cost impact:** A 15% slowdown wastes $115 every hour in idle compute time.
