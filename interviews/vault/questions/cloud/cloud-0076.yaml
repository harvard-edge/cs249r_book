title: The On-Node vs. Off-Node Divide
scenario: 'Your model training requires frequent peer-to-peer transfers between two H100 GPUs. For minimizing
  latency on a small data payload, which is faster: a transfer between GPUs on the same server connected
  by NVLink 4.0, or a transfer between GPUs on different servers connected by an InfiniBand NDR link?
  By roughly what factor?'
details:
  realistic_solution: NVLink is roughly 10 times faster in terms of latency. NVLink is a direct, on-node
    (intra-server) interconnect between GPUs, resulting in extremely low latency. InfiniBand is a high-performance,
    off-node (inter-server) network. While it has massive bandwidth, a transfer must go through the network
    interface card (NIC), across cables, to another NIC, which adds significant latency compared to the
    short, on-board path of NVLink.
  common_mistake: Engineers often conflate bandwidth and latency. They might know that both NVLink and
    InfiniBand are 'fast' high-bandwidth interconnects and assume their latencies are comparable. They
    forget that crossing the server boundary (off-node) incurs significant protocol and distance overhead
    compared to staying on the same motherboard (on-node).
  napkin_math: 'From the ''ML Latency Hierarchy'' table:'
  options:
  - They are roughly the same speed.
  - InfiniBand is ~2x faster.
  - NVLink is ~10x faster.
  - NVLink is ~100x faster.
  correct_index: 2
