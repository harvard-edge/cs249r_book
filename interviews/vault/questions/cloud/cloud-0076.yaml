title: The On-Node vs. Off-Node Divide
scenario: 'Your model training requires frequent peer-to-peer transfers between two GPUs. You must minimize latency for a small data payload by choosing between a transfer between GPUs on the same server connected by NVLink, or a transfer between GPUs on different servers connected by an InfiniBand NDR link.'
question: Which is faster for a small payload, same-server GPUs over NVLink or different servers over InfiniBand, and by roughly what factor?
details:
  realistic_solution: 'NVLink is roughly 10 times faster in terms of latency. NVLink is a direct, on-node (intra-server) interconnect between GPUs, resulting in extremely low latency. InfiniBand is a high-performance, off-node (inter-server) network. While it has massive bandwidth, a transfer must go through the network interface card (NIC), across cables, to another NIC, which adds significant latency compared to the short, on-board path of NVLink.'
  common_mistake: |
    **The Pitfall:** Conflating bandwidth and latency, assuming both NVLink and InfiniBand have comparable latencies because they are both high-bandwidth.
    **The Rationale:** Engineers often focus on the headline bandwidth numbers and forget that crossing the server boundary (off-node) incurs significant protocol and distance overhead compared to staying on the same motherboard (on-node).
    **The Consequence:** Misarchitecting distributed training systems by placing frequent communication pairs across server boundaries, causing severe latency bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: small data transfer.
    - Interconnect 1: On-node NVLink.
    - Interconnect 2: Off-node InfiniBand NDR.

    **Calculations:**
    - On-node NVLink latency (GPU to GPU): ~500 ns.
    - Off-node InfiniBand latency (GPU to NIC to Switch to NIC to GPU): ~5,000 ns.
    - Latency Ratio = 5,000 ns / 500 ns = 10.

    **Conclusion & Interpretation:**
    - **Result: 10x Latency Ratio (Latency-Bound)**. While both interconnects offer massive bandwidth, crossing the server boundary via PCIe and NICs incurs strict protocol overheads that heavily penalize small message latencies.
  options:
  - They are roughly the same speed.
  - InfiniBand is ~2x faster.
  - NVLink is ~10x faster.
  - NVLink is ~100x faster.
