title: Speculative Decoding Memory Bandwidth Analysis
scenario: For a 70B target model on H100 (3.35 TB/s) at batch_size=1, each autoregressive
  decode step reads 140GB of weights (FP16) and produces 1 token. With speculative
  decoding (K=5, alpha=0.80), the verification reads the same 140GB but produces ~3.7
  tokens. Calculate the effective memory bandwidth utilization improvement.
question: What effective memory-bandwidth amplification does K=5 speculative decoding
  with alpha=0.80 provide over batch-1 autoregressive decode?
details:
  realistic_solution: 'Autoregressive: 140GB read per token. At 3.35 TB/s: 140/3350
    = 41.8ms/token. Bandwidth utilization: 140GB/41.8ms = 3.35 TB/s (100% bandwidth,
    0.5% compute — deeply memory-bound). With speculation: draft generates 5 tokens
    in ~10ms (7B model, 2ms/token). Verification: 140GB for K+1=6 tokens in one pass
    + KV cache reads for 6 positions. Total IO: 140GB + 6 x KV per token. Verification
    time: max(IO, compute). IO: ~141GB / 3.35 = 42.1ms. Compute: 6 x 140 GFLOP = 840
    GFLOP / 989 TFLOPS = 0.85ms. Still memory-bound. Total: 10ms (draft) + 42.1ms
    (verify) = 52.1ms for 3.7 tokens. Effective: 52.1/3.7 = 14.1ms/token vs 41.8ms.
    Effective bandwidth per token: 140GB / 14.1ms = 9.9 TB/s — 2.96x virtual bandwidth
    amplification.'
  common_mistake: Forgetting that speculative verification is a single forward pass
    processing K+1=6 tokens simultaneously, so weight reads are amortized over all
    verified tokens — this is the core insight of why speculation helps batch_size=1.
  napkin_math: 'Auto: 140GB / 3.35 TB/s = 41.8ms/token. Spec: 52.1ms / 3.7 tokens
    = 14.1ms/token. Virtual BW: 9.9 TB/s. Amplification: 2.96x.'
