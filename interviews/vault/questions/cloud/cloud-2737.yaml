title: Failure Domain vs Locality Trade-off
scenario: 'A 64-GPU job can be placed: (A) on 8 nodes in 1 rack (best NVLink/intra-rack bandwidth, single
  failure domain), or (B) across 8 nodes in 4 racks (2 nodes per rack, cross-rack traffic, 4 failure domains).
  AllReduce is 30% faster with option A. Evaluate the trade-off.'
question: "For a 64-GPU job, should you place all 8 nodes in one rack for 30% faster AllReduce or spread them across 4 racks?"
details:
  realistic_solution: 'Option A (1 rack): 30% faster AllReduce, but single failure domain. If the ToR
    fails, all 64 GPUs go down simultaneously — total job loss, full rollback to checkpoint. Expected
    ToR MTBF: ~200,000 hours. For a 2-week run (336h): P(ToR failure) ≈ 0.17%. Cost if it happens: full
    job restart from checkpoint (hours of lost work). Option B (4 racks): 30% slower AllReduce, but 4
    failure domains. A single ToR failure loses only 16 GPUs (25%). With elastic training or spare nodes,
    the job can continue at reduced capacity. Expected impact of any single ToR failure: recoverable.
    The right choice depends on job duration and recovery capability. For a 2-day job: A is better (low
    failure risk, high performance). For a 2-week job with no elastic training: B is safer. For a 2-week
    job WITH elastic training: A is acceptable since you can recover from partial failures.'
  common_mistake: Always choosing maximum locality for performance. If a single ToR switch failure kills
    the entire job, the higher MTBF risk can cost more in the long run than the 30% AllReduce penalty.
  napkin_math: 'A: 30% faster but 0.17% chance of total failure per 2-week run. B: 30% slower but ToR
    failure only loses 25%. Break-even depends on checkpoint frequency and job length.'
