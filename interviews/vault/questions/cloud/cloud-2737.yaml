title: Failure Domain vs Locality Trade-off
scenario: A 64-GPU job can be placed: (A) on 8 nodes in 1 rack (single failure domain), or (B) across 8 nodes in 4 racks (2 nodes per rack, 4 failure domains). AllReduce is 30% faster with option A.
question: "For a 64-GPU job, should you place all 8 nodes in one rack for 30% faster AllReduce or spread them across 4 racks?"
details:
  realistic_solution: 'Option A (1 rack): 30% faster AllReduce, but single failure domain. If the ToR fails, all 64 GPUs go down simultaneously — total job loss, full rollback to checkpoint. Expected ToR MTBF: ~200,000 hours. For a 2-week run (336h): P(ToR failure) ≈ 0.17%. Cost if it happens: full job restart from checkpoint (hours of lost work). Option B (4 racks): 30% slower AllReduce, but 4 failure domains. A single ToR failure loses only 16 GPUs (25%). With elastic training or spare nodes, the job can continue at reduced capacity. Expected impact of any single ToR failure: recoverable. The right choice depends on job duration and recovery capability. For a 2-day job: A is better (low failure risk, high performance). For a 2-week job with no elastic training: B is safer. For a 2-week job WITH elastic training: A is acceptable since you can recover from partial failures.'
  common_mistake: |
    **The Pitfall:** Always choosing maximum locality for performance without considering the blast radius of hardware failures.
    **The Rationale:** Performance engineers hyper-optimize for AllReduce speed, assuming the hardware layer is perfectly reliable.
    **The Consequence:** A single Top-of-Rack (ToR) switch failure instantly kills the entire 64-GPU job, destroying days of work and costing far more than the 30% speedup saved.
  napkin_math: |
    - Option A: 30% faster, but a ToR failure results in 100% job loss.
    - Option B: 30% slower, but a ToR failure results in only 25% capacity loss.
    - For a 2-week job, the probability of a ToR failure is ~0.17%.
    - **If the job supports elastic training, Option A is viable; if not, the massive cost of a full restart makes Option B much safer for long runs.**
