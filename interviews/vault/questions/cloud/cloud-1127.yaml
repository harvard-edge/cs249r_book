title: Power Limits in Post-Dennard Era
scenario: You are designing a custom ML inference accelerator. The baseline design features a single monolithic
  processing element (PE) running at 2.0 GHz and consuming 100W. To increase throughput, the team proposes
  a new design with 8 smaller PEs, each running at 1.0 GHz. Assuming we are in a post-Dennard scaling
  regime where dynamic power is proportional to the cube of the clock frequency ($P \propto f^3$), calculate
  the expected total power consumption of the 8-PE design and its theoretical throughput relative to the
  baseline to evaluate its efficiency.
question: "What are the total power and throughput of the 8-PE 1.0 GHz design relative to the 100W 2.0 GHz baseline?"
details:
  realistic_solution: In a post-Dennard regime, dynamic power scales cubically with frequency because
    voltage also typically scales down with frequency. Reducing the frequency by half (from 2.0 GHz to
    1.0 GHz) reduces the power of a single PE to $1/8$th ($100W / 8 = 12.5W$). Multiplying by 8 PEs yields
    a total power of 100W. The 8-PE design achieves 4x the theoretical aggregate operations (8 x 1.0 GHz
    vs 1 x 2.0 GHz) within the identical 100W power envelope, demonstrating why the power wall forced
    the shift to multicore architectures.
  common_mistake: Candidates often assume power scales linearly with frequency or core count, resulting
    in drastically overestimating the power of the 8-core design by missing the $P \propto V^2f$ (and
    thus roughly $P \propto f^3$) relationship.
  napkin_math: 'P_new = N * P_old * (f_new / f_old)^3

    P_new = 8 * 100W * (1.0 / 2.0)^3

    P_new = 8 * 100W * 0.125 = 100W

    Throughput_new = 8 * 1.0 = 8.0 units

    Throughput_old = 1 * 2.0 = 2.0 units

    Ratio = 8.0 / 2.0 = 4x throughput at iso-power'
