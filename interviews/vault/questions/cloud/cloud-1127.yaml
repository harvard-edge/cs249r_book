title: Power Limits in Post-Dennard Era
scenario: You are designing a custom ML inference accelerator in a post-Dennard scaling regime where dynamic power scales cubically with frequency. The baseline design features a single monolithic processing element (PE) running at 2.0 GHz and consuming 100W. To increase throughput, the team proposes a new design with 8 smaller PEs, each running at 1.0 GHz.
question: What are the expected total power consumption and theoretical throughput of the 8-PE 1.0 GHz design relative to the 100W 2.0 GHz baseline?
details:
  realistic_solution: 'In a post-Dennard regime, dynamic power scales cubically with frequency ($P \propto f^3$) because voltage also typically scales down with frequency. Reducing the frequency by half reduces the power of a single PE to 1/8th. Multiplying by 8 PEs yields the same total power envelope while delivering 4x the theoretical aggregate operations, demonstrating why the power wall forced the shift to multicore architectures.'
  common_mistake: |
    **The Pitfall:** Assuming power scales linearly with frequency or core count.
    **The Rationale:** It is intuitive to think that 8 cores running at half the frequency will consume 4x the power of 1 core at full frequency.
    **The Consequence:** Drastically overestimating the power budget, leading engineers to reject highly efficient distributed or multicore architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 1 PE, 2.0 GHz, 100W.
    - New: 8 PEs, 1.0 GHz.
    - Power scaling: P_new = N * P_old * (f_new / f_old)^3.

    **Calculations:**
    - New Power = 8 * 100W * (1.0 / 2.0)^3 = 800W * 0.125 = 100W.
    - New Throughput = 8 PEs * 1.0 GHz = 8.0 units (vs 2.0 units).

    **Conclusion & Interpretation:**
    - **Result: 4x throughput at identical power (Power-Bound)**. Cubical power scaling post-Dennard dictates that multicore distributed designs are radically more efficient.
