title: Sizing RoCEv2 Buffers for Adaptive Routing
scenario: You are optimizing an 800 Gbps RoCEv2 network fabric for a 4,096-GPU cluster. During heavy All-to-All MoE traffic, static 5-tuple ECMP routing causes hash collisions and microburst drops, degrading effective bisection bandwidth to 60%. You enable per-packet Adaptive Routing (AR) based on switch egress queue depths to perfectly load-balance the fabric. However, AR causes packets to take different paths, arriving out-of-order. The receiving NIC uses a dedicated 16MB buffer to reorder packets before delivering them to GPU memory.
question: What is the maximum path latency skew the 16MB reassembly buffer can tolerate at 800 Gbps line rate?
details:
  realistic_solution: |
    To prevent the out-of-order buffer from overflowing, the time difference between the fastest and slowest paths must not exceed the time it takes to fill the buffer at line rate. First, convert 800 Gbps to 100 GB/s. Then, divide the 16MB buffer capacity by the 100 GB/s incoming rate. This gives a maximum path latency skew of 160 microseconds. The network topology and switch queue depth bounds must be tuned so that transit time variance never exceeds 160us, otherwise packets are dropped, triggering PFC pauses and halting the sender.
  common_mistake: |
    **The Pitfall:** Mixing up bits and Bytes or using average cluster RTT.
    **The Rationale:** Candidates divide 16MB directly by 800Gbps without converting units, or misinterpret what path skew means for an out-of-order buffer.
    **The Consequence:** An incorrect calculation leads to misconfigured switch queue depth bounds, causing buffer overflow and dropped packets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Line Rate: 800 Gbps.
       - Buffer Size: 16 MB.
    2. **Calculations:**
       - Convert Rate: 800 Gbps / 8 = 100 GB/s = 100 MB/ms.
       - Max Path Skew: 16 MB / (100 MB/ms) = 0.16 ms = 160 μs.
    3. **Conclusion & Interpretation:** **Variance between fastest and slowest paths must not exceed 160 μs. Result: Memory-Capacity-Bound.**
