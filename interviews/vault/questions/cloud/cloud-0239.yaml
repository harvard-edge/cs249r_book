title: The Roofline Ridge Point
scenario: What does the 'ridge point' on a GPU roofline model represent?
question: "What does the 'ridge point' on a GPU roofline model represent?"
details:
  realistic_solution: The ridge point defines the transition point between being memory-bound and compute-bound.
    It is the minimum Arithmetic Intensity (the ratio of compute operations per byte of memory accessed)
    a workload must have to be able to saturate the GPU's compute units and achieve peak TFLOPS. If a
    workload's arithmetic intensity is below the ridge point, its performance is limited by memory bandwidth;
    if it is above, it is limited by the raw compute power.
  common_mistake: Engineers often confuse the ridge point with either the peak TFLOPS (the compute ceiling)
    or the peak memory bandwidth. They might think it's a fixed hardware spec on its own, rather than
    a crucial *ratio* between two specs.
  napkin_math: 'The ridge point is calculated by dividing peak compute by peak memory bandwidth. For an
    H100 GPU: Peak Compute = 989 TFLOPS. Peak Bandwidth = 3.35 TB/s. Ridge Point = 989 / 3.35 = 295.2
    FLOPs/Byte. Workloads with an arithmetic intensity below 295.2 are memory-bound.'
  options:
  - The maximum memory bandwidth (TB/s) of the GPU.
  - The maximum theoretical compute performance (TFLOPS).
  - The minimum arithmetic intensity (FLOPs/Byte) required to be compute-bound.
  - The power consumption (Watts) when the GPU is idle.
  correct_index: 2
