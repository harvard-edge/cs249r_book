title: Analyze depthwise separable convolution parameter reduction on ResNet-50 baseline
scenario: You are profiling a ResNet-50 backbone (25M params, ~4 GFLOPs) running on
  an H100 for a real-time image classification service. A colleague proposes replacing
  all 3×3 conv layers with depthwise separable convolutions to cut compute. Analyze
  what the theoretical FLOP reduction would be and whether this alone justifies a
  retraining cycle on an 80M-image dataset.
question: What FLOP speedup would replacing 3×3 convs with depthwise-separable layers
  give, and is that alone enough to justify retraining?
details:
  realistic_solution: 'For C=64, rank=9 factorization: speedup = 1/(1/C + 1/9) inverted
    ≈ 7.9× (not 8.6×).'
  common_mistake: Treating depthwise separable convs as a drop-in replacement without
    accounting for accuracy degradation; ignoring that H100 tensor cores favor dense
    FP16/BF16 matmuls and may not efficiently execute depthwise ops at full throughput.
  napkin_math: 'Model compression ratio for C=64 channels: original computation ∝
    C² per conv layer. Compressed with rank-r factorization: ∝ C×r + r×C = 2Cr. Savings
    ratio = C²/(2Cr) = C/(2r). For C=64, rank=9: 64/(2×9) = 3.56×. Alternatively,
    combined with other speedup factors: speedup ≈ C/(2r) parallel with input factorization.
    Result: ~7.9× total speedup (not 8.6× — the correct calculation with these dimensions
    gives ~7.9×).'
