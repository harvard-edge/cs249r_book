title: Analyze depthwise separable convolution parameter reduction on ResNet-50 baseline
scenario: You are profiling a ResNet-50 backbone (25M params, ~4 GFLOPs) running on an H100 for a real-time image classification service. A colleague proposes replacing all 3x3 conv layers with depthwise separable convolutions to cut compute.
question: What FLOP speedup would replacing 3x3 convs with depthwise-separable layers give, and is that alone enough to justify retraining?
details:
  realistic_solution: 'For C=64, rank=9 factorization: speedup = 1 / (1/C + 1/9) ≈ 7.9x.'
  common_mistake: |
    **The Pitfall:** Treating depthwise separable convs as a drop-in replacement that yields an automatic ~8.6x speedup.
    **The Rationale:** Candidates use simple heuristics (like 1/9th compute) without fully deriving the parameter ratios or considering hardware limits.
    **The Consequence:** They overestimate the theoretical speedup (it's actually ~7.9x for C=64) and ignore that H100 tensor cores favor dense matrix multiplications, often resulting in lower realized throughput for depthwise operations.
  napkin_math: |
    1. Dense 3x3 FLOPs: 3 * 3 * C * C = 9C^2.
    2. Depthwise Separable FLOPs: (3 * 3 * C) + (1 * 1 * C * C) = 9C + C^2.
    3. Savings Ratio = 9C^2 / (9C + C^2) = 1 / (1/C + 1/9).
    4. For C=64: Ratio = 1 / (1/64 + 1/9) = 1 / (0.015625 + 0.1111) = 7.89x.
    5. **Result: Replacing 3x3 with depthwise separable convolutions yields a ~7.9x FLOP reduction.**
