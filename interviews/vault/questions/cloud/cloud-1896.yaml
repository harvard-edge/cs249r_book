title: Root-Causing 400GbE Bottlenecks in Virtualized GPU Nodes
scenario: You are debugging a multi-node distributed training run of a 70B parameter model across 16 cloud
  VMs. Each VM is equipped with 8x H100 GPUs and a 400Gbps ConnectX-7 NIC. While single-node NVLink bandwidth
  hits expected limits, cross-node All-Reduce throughput is bottlenecked at barely 45 Gbps. System metrics
  show that the host hypervisor's CPU cores are pinned at 100% utilization, while the VM's internal vCPU
  utilization remains low. The network team has verified that RoCEv2 (RDMA) is correctly configured at
  the physical Top-of-Rack switch level. What architectural misconfiguration is causing this massive throughput
  collapse?
details:
  realistic_solution: The VMs are provisioned with paravirtualized network interfaces (like virtio-net)
    which route all network traffic through a software vSwitch in the hypervisor. This breaks RDMA and
    forces the host CPU to process every packet. The solution is to enable Single Root I/O Virtualization
    (SR-IOV) on the host and assign Virtual Functions (VFs) directly to the VMs via PCIe passthrough.
    This allows RoCEv2 traffic and GPUDirect to bypass the hypervisor entirely, offloading data transfer
    directly to the physical NIC hardware.
  common_mistake: Candidates often misdiagnose this as a physical network congestion issue (e.g., misconfigured
    PFC/ECN buffers causing pause frame storms) or PCIe topology bottlenecks, ignoring the hypervisor
    CPU pinning which explicitly points to software-based packet processing overhead.
  napkin_math: At 400 Gbps with an MTU of 4096 bytes (standard for RoCE), the network must process roughly
    12.2 million packets per second (50 GB/s / 4096 B). A typical software vSwitch (like Open vSwitch)
    on a modern CPU core processes around 1 to 2 Mpps. Routing this through the hypervisor would require
    pinning 6-12 dedicated host CPU cores continuously just for I/O, hitting a hard bottleneck long before
    reaching 400 Gbps.
