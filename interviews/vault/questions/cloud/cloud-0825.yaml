title: The Checkpoint Size Math
scenario: You are training a 13B parameter model using Adam optimizer. Your manager asks how much disk
  space a single training checkpoint requires. What is the total checkpoint size including weights (FP16),
  Adam optimizer states (FP32 momentum + variance), and gradients (FP32)?
details:
  realistic_solution: '182 GB. Weights: 13B * 2 bytes = 26 GB. Adam momentum: 13B * 4 bytes = 52 GB. Adam
    variance: 13B * 4 bytes = 52 GB. Gradients: 13B * 4 bytes = 52 GB. Total: 26 + 52 + 52 + 52 = 182
    GB.'
  common_mistake: Only counting the weight memory and forgetting that Adam stores two additional FP32
    copies (momentum and variance) per parameter, plus gradients. The optimizer states dominate checkpoint
    size.
  napkin_math: 'A 13B parameter model checkpoint size requires multiple components: FP16 Weights (13B
    * 2 bytes = 26GB), FP32 Master Weights (13B * 4 bytes = 52GB), FP32 Adam Momentum (13B * 4 bytes =
    52GB), and FP32 Adam Variance (13B * 4 bytes = 52GB). Total checkpoint size per step = 26 + 52 + 52
    + 52 = 182GB. Saving a checkpoint every 1,000 steps quickly consumes Terabytes of disk storage!'
  options:
  - A) 26 GB
  - B) 78 GB
  - C) 182 GB
  - D) 364 GB
  correct_index: 2
