title: 'The Checkpoint Size Math'
scenario: 'You are training a 13B parameter model using the Adam optimizer.'
question: 'What is the total checkpoint size including weights (FP16), Adam optimizer states (FP32 momentum + variance), and gradients (FP32)?'
details:
  realistic_solution: '182 GB. Weights: 13B * 2 bytes = 26 GB. Adam momentum: 13B * 4 bytes = 52 GB. Adam variance: 13B * 4 bytes = 52 GB. Gradients: 13B * 4 bytes = 52 GB. Total: 26 + 52 + 52 + 52 = 182 GB.'
  common_mistake: |
    **The Pitfall:** Calculating checkpoint size based only on the model weights.
    **The Rationale:** People forget that the Adam optimizer stores two additional FP32 copies (momentum and variance) per parameter, plus the gradients, which dominate the total memory requirement.
    **The Consequence:** Teams vastly underprovision disk space for checkpoints, leading to out-of-disk-space crashes mid-training run.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameter model.
    - FP16 representation is 2 bytes per param.
    - FP32 representation is 4 bytes per param.
    
    **Calculations:**
    - FP16 Weights: 13B * 2 bytes = 26 GB.
    - FP32 Gradients: 13B * 4 bytes = 52 GB.
    - FP32 Adam Momentum: 13B * 4 bytes = 52 GB.
    - FP32 Adam Variance: 13B * 4 bytes = 52 GB.
    
    **Conclusion & Interpretation:**
    - **Result: 182 GB (Memory-Bound)**. The massive size of optimizer states and gradients dramatically dwarfs the core weight footprint.
  options:
  - 'A) 26 GB'
  - 'B) 78 GB'
  - 'C) 182 GB'
  - 'D) 364 GB'
  correct_index: 2
