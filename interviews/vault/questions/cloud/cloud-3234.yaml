title: KV-Cache Aware Request Scheduling
scenario: Your serving cluster runs 4 replicas of Llama 3 70B on H100 nodes. A load
  balancer routes requests via round-robin. Replica 1 has 90% KV-cache utilization
  (many long-context requests), while replicas 2-4 are at 30%. New long-context requests
  sent to replica 1 are rejected. Specify a KV-cache-aware routing policy.
question: How should the load balancer be modified to prevent replica 1 from rejecting
  requests while replicas 2-4 remain underutilized?
details:
  realistic_solution: 'Implement KV-cache-aware routing (e.g., using a least-outstanding-requests
    or least-KV-cache-used policy) where replicas continuously report their current
    KV-cache utilization to the load balancer. The load balancer then routes new requests,
    especially long-context ones, to the replica with the most available KV-cache
    blocks, preventing OOM rejections on heavily loaded nodes.'
  common_mistake: Adding a simple 'reject-and-retry' mechanism that sends rejected
    requests to another replica. This creates cascading retries and does not prevent
    the imbalance from recurring.
  napkin_math: 'With round-robin, a 32k-token request has a 25% chance of hitting
    replica 1. If replica 1 has 90% KV usage, it rejects it. With KV-aware routing,
    the load balancer checks replica 1 (90%), replica 2 (30%), replica 3 (30%), replica
    4 (30%), and deterministically routes the 32k request to replica 2, 3, or 4, ensuring
    0% rejection rate.'
