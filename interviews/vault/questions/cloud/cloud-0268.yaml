title: The Chinchilla Data Budget
scenario: 'You are scoping a project to train a new 70-billion-parameter LLM from scratch. To secure the data acquisition budget, you need to estimate the optimal amount of training data required.'
question: 'According to the compute-optimal Chinchilla scaling laws, approximately how many training tokens should you plan to acquire?'
details:
  realistic_solution: 'The compute-optimal Chinchilla scaling laws mandate approximately 20 training tokens for every model parameter. For a 70B parameter model, this requires exactly 1.4 Trillion tokens to maximize performance for a given compute budget.'
  common_mistake: |
    **The Pitfall:** Misremembering the scaling rule or confusing it with the 6PD training compute formula.
    **The Rationale:** Candidates recall older, pre-Chinchilla research where models were heavily undertrained relative to their size.
    **The Consequence:** Undertraining the massive model, resulting in suboptimal performance and wasted GPU hours.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Parameters (P) = 70 Billion.
    - Chinchilla Rule = 20 tokens per parameter.

    **Calculations:**
    - Optimal Tokens = 20 * 70,000,000,000.
    - Total = 1.4 Trillion tokens.

    **Conclusion & Interpretation:**
    - **Result: 1.4 Trillion tokens are strictly required for compute-optimal training (Data-Bound).**
  options:
  - 140 Trillion tokens
  - 420 Billion tokens
  - 1.4 Trillion tokens
  - 120 Billion tokens
  correct_index: 2
