title: The Chinchilla Data Budget
scenario: You're scoping a project to train a new 70-billion-parameter LLM from scratch. To secure the
  data acquisition budget, you need to estimate the optimal amount of training data required. According
  to the compute-optimal 'Chinchilla' scaling laws, approximately how many training tokens should you
  plan to acquire?
details:
  realistic_solution: 'The correct answer is **1.4 Trillion tokens**. The Chinchilla scaling law provides
    a simple rule of thumb: optimal training for a given compute budget requires approximately 20 tokens
    for every parameter in the model.'
  common_mistake: Engineers often misremember the scaling rule, either confusing it with the training
    compute formula (6PD) or recalling older, pre-Chinchilla research where models were significantly
    undertrained (e.g., the original GPT-3 was trained on only ~300B tokens for 175B parameters). The
    Chinchilla paper demonstrated that for a given compute budget, a smaller model trained on more data
    is superior.
  napkin_math: '1. The Chinchilla scaling laws state that for compute-optimal training, the dataset size
    (in tokens) should be roughly 20 times the number of model parameters.

    2. Model Parameters (P) = 70 Billion.

    3. Optimal Training Tokens = 20 * 70,000,000,000 = 1,400,000,000,000 tokens (1.4 Trillion).

    This determines the scraping and dataset curation targets.'
  options:
  - 140 Trillion tokens
  - 420 Billion tokens
  - 1.4 Trillion tokens
  - 120 Billion tokens
  correct_index: 2
