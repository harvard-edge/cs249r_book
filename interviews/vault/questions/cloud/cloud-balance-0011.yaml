title: RDMA Transfer Time
scenario: A parameter server transfers a 3 GB shard over an RDMA path sustaining 75 GB/s aggregate end-to-end throughput for this run. Calculate transfer time before software overhead.
question: How long does a 3 GB RDMA transfer take at 75 GB/s achieved aggregate bandwidth?
details:
  realistic_solution: The transfer takes 3 / 75 = 0.04 seconds, or 40 ms, before software overhead and synchronization. This is a bandwidth lower bound, not full step time.
  common_mistake: Using NIC line rate without converting payload size to time.
  napkin_math: 3 GB / 75 GB/s = 0.04 s = 40 ms.
