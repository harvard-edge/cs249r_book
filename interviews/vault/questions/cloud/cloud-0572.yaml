title: The Silent Overflow Catastrophe
scenario: You are the Staff ML Systems Engineer at a major fintech firm migrating its serving fleet from H100s to B200s. The finance department has approved the multi-million dollar upgrade based on a model that assumes a 2x throughput gain by moving all critical models from FP16 to INT8. Your team is tasked with executing this migration.
question: How would you validate and de-risk the H100-to-B200 INT8 migration before committing to the finance team's 2x throughput model?
details:
  realistic_solution: The correct L6+ answer involves a multi-layered defense, moving beyond a single technique to a robust, production-aware system.
  common_mistake: |
    **The Pitfall:** Believing better calibration data or QAT guarantees production robustness.
    **The Rationale:** Teams assume standard quantization workflows will solve edge-case overflows.
    **The Consequence:** These techniques fail to capture once-a-quarter 'black swan' events, leaving the production system vulnerable to silent, catastrophic accuracy degradation.
  napkin_math: |
    1. **The Bottleneck:** LLM generative serving throughput is gated by memory bandwidth, not compute TFLOPS.
    2. **Bandwidth Scaling:** An H100 has 3.35 TB/s of bandwidth. If a B200 only increases memory bandwidth by 1.5x, throughput will only scale by 1.5x.
    3. **Conclusion:** **Paying for a 2x gain while physics only allows 1.5x destroys the ROI of the upgrade**, regardless of INT8 compute speedups.
