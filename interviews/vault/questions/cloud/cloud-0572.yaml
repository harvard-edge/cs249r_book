title: The Silent Overflow Catastrophe
scenario: You are the Staff ML Systems Engineer at a major fintech firm migrating its serving fleet from
  H100s to B200s. The finance department has approved the multi-million dollar upgrade based on a model
  that assumes a 2x throughput gain by moving all critical models from FP16 to INT8. Your team is tasked
  with executing this migration.
details:
  realistic_solution: The correct L6+ answer involves a multi-layered defense, moving beyond a single
    technique to a robust, production-aware system.
  common_mistake: The most common answer is, "We just need a better calibration dataset." While true,
    this is insufficient. A better calibration set might still not capture a once-a-quarter 'black swan'
    event, and it doesn't represent a systematic fix. Another common suggestion, "Use Quantization-Aware
    Training (QAT)," is also incomplete; QAT is expensive and doesn't guarantee robustness against extreme,
    unseen production outliers.
  napkin_math: The finance model wrongly assumes LLM serving is compute-bound. Throughput for generative
    LLMs is gated by memory bandwidth, not TFLOPS. An H100 has 3.35 TB/s of bandwidth. Even if a B200
    doubles the FLOPS, if its memory bandwidth only increases by 1.5x, the serving throughput will only
    scale by 1.5x. Paying for a 2x gain while only yielding 1.5x destroys the ROI of the upgrade.
