title: Diagnosing High TTFT in Confidential GPU Enclaves
scenario: You deployed a Llama-3 70B model on an 8x H100 node with NVIDIA Confidential Computing (CC) enabled to protect proprietary weights and patient data. During profiling, you observe that the model's Time-To-First-Token (TTFT) has spiked from 0.5s to over 3.0s, and total host-to-device memory bandwidth utilization during weight loading is only ~15 GB/s per GPU instead of the expected PCIe Gen5 limits. However, the auto-regressive decoding phase maintains its normal 15 tokens/s rate.
question: What is causing the TTFT regression with Confidential Computing enabled while decoding throughput remains normal?
details:
  realistic_solution: The bottleneck is the PCIe bounce buffer mechanism used in Confidential Computing. Encrypted data must be transferred from host memory to the GPU's secure memory region via limited-size bounce buffers, causing PCIe synchronization stalls that severely restrict the effective host-to-device transfer rate during model loading and initial prompt processing.
  common_mistake: |
    **The Pitfall:** Assuming the H100's hardware encryption engines slow down matrix multiplications during decoding.
    **The Rationale:** Candidates misunderstand where the encryption overhead applies, thinking AES-GCM natively limits internal HBM3 bandwidth.
    **The Consequence:** Investigating complex CUDA kernel optimizations instead of focusing on the host-to-device PCIe transfer bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Llama-3 70B (140GB), CC limits PCIe transfer to ~15 GB/s.
    2. **Calculations:**
       - Transfer payload per GPU: 140GB / 8 GPUs = 17.5 GB.
       - PCIe transfer time: 17.5 GB / 15 GB/s = ~1.16s.
    3. **Conclusion & Interpretation:**
       - **Result: The 1.16s PCIe transfer plus secure enclave initialization perfectly accounts for the multi-second TTFT spike. HBM3 is unaffected.**
