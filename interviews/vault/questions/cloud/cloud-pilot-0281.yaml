title: CPU Transform Wall Hidden By GPU Metrics
scenario: A training dashboard reports GPU utilization at only 55%. Kernel traces show the model kernels are efficient when they run. The input pipeline performs random resize, JPEG decode, and tokenization on CPU workers. Increasing GPU count from 8 to 16 does not improve throughput. Diagnose the binding wall.
question: Why does adding GPUs fail to improve throughput when model kernels are efficient but CPU transforms feed the pipeline?
details:
  realistic_solution: The binding wall is the transformation/input pipeline. GPU kernels are efficient, but they are starved by CPU preprocessing. Adding GPUs increases demand on the same CPU transform pipeline, so throughput does not improve. The fix is more preprocessing capacity, GPU-accelerated transforms, caching, or preprocessed shards.
  common_mistake: Interpreting low GPU utilization as a reason to add more GPUs instead of asking why GPUs are idle.
  napkin_math: If 8 GPUs are only 55% utilized from input stalls, adding 8 more GPUs does not increase preprocessing supply. The same CPU feed rate is spread across more GPU demand, so per-GPU starvation can worsen unless preprocessing throughput also increases.
