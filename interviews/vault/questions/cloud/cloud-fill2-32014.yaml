title: 'Pipeline Parallelism vs Tensor Parallelism: When to Choose Which'
scenario: 'You are training a 175B model on 64 MI300X GPUs (8 nodes × 8 GPUs). Within each node you have
  Infinity Fabric at 896 GB/s between GPUs. Between nodes you have 400 Gb/s InfiniBand. You need to decide
  the parallelism strategy: how do you allocate tensor parallelism (TP), pipeline parallelism (PP), and
  data parallelism (DP)?'
question: "Why should tensor parallelism stay within each MI300X node rather than crossing the 400 Gb/s InfiniBand links?"
details:
  realistic_solution: TP AllReduce volume ∝ batch × seq × hidden_dim (activation shape), not hidden_dim².
    Weight AllReduce is done once in DP, not per-step in TP.
  common_mistake: Using TP across nodes. TP requires AllReduce on every layer's output, generating enormous
    cross-node traffic. PP only requires point-to-point activation transfers between adjacent stages.
  napkin_math: 'Tensor parallel AllReduce communication volume: proportional to batch × seq × hidden_dim
    (activation size), not hidden_dim² (weight size). For each AllReduce after attention/FFN: volume =
    batch × seq × hidden_dim × 2B. This is O(hidden_dim) not O(hidden_dim²).'
