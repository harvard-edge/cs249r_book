title: Recall depthwise separable convolution FLOP formula
scenario: A new ML engineer asks you to explain the FLOP calculation for a standard 3×3 convolution versus a depthwise separable convolution for a layer with Cin=128 input channels, Cout=128 output channels, and 28×28 spatial resolution.
question: How do you compute the FLOPs for a standard 3×3 convolution versus a depthwise separable convolution with Cin=Cout=128 at 28×28, and what is the reduction ratio?
details:
  realistic_solution: 'Standard 3×3 conv: 2 × Cin × Cout × k² × H × W = 2 × 128 × 128 × 9 × 28 × 28 = 231.2M FLOPs. Depthwise sep: depthwise (2 × Cin × k² × H × W) + pointwise (2 × Cin × Cout × H × W). Depthwise: 2 × 128 × 9 × 28 × 28 = 1.8M FLOPs. Pointwise: 2 × 128 × 128 × 28 × 28 = 25.7M FLOPs. Total: 27.5M FLOPs. Reduction: 231.2/27.5 = 8.4×. General formula: reduction = 1/(1/k² + 1/Cout) ≈ 1/(1/9 + 1/128) ≈ 8.4× (exact ratio varies with specific k and C).'
  common_mistake: |
    **The Pitfall:** Forgetting the factor-of-2 for multiply-accumulate or applying the spatial kernel size incorrectly to the pointwise layer.
    **The Rationale:** Candidates memorize high-level complexity concepts but slip on the exact MAC accounting (1 multiply + 1 add = 2 FLOPs).
    **The Consequence:** Miscalculating FLOP counts and misrepresenting the true computational savings of efficient architectures.
  napkin_math: |
    1. Standard 3×3 conv: 2 × Cin × Cout × k² × H × W = 2 × 128 × 128 × 9 × 28 × 28.
       - 2 × 16,384 × 9 × 784 = 231,211,008 ≈ 231.2M FLOPs.
    2. Depthwise convolution: 2 × Cin × k² × H × W = 2 × 128 × 9 × 28 × 28.
       - 2 × 128 × 9 × 784 = 1,806,336 ≈ 1.8M FLOPs.
    3. Pointwise convolution: 2 × Cin × Cout × H × W = 2 × 128 × 128 × 28 × 28.
       - 2 × 16,384 × 784 = 25,690,112 ≈ 25.7M FLOPs.
    4. Total depthwise separable FLOPs = 1.8M + 25.7M = 27.5M.
    5. **Reduction ratio: 231.2M / 27.5M ≈ 8.4x.**
