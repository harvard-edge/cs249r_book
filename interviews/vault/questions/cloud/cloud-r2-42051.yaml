title: Tensor Core Matrix Multiply Tile Sizes
scenario: H100 Tensor Cores operate on 16×16×16 FP16 matrix tiles (m×n×k). Your layer has weight matrix
  4096×11008 and input batch 32×4096. Calculate the number of Tensor Core operations, the tile efficiency
  for this specific shape, and the expected TFLOPS considering tile padding waste.
question: "How many FLOPs do 352,256 Tensor Core tiles at 8,192 FLOPs each execute, and is the result GFLOPs or TFLOPs?"
details:
  realistic_solution: 352,256 tiles × 8,192 FLOPs = 2.886 GFLOPs (not TFLOPs — GFLOPs is the correct unit
    here). TFLOPs would require 10^6× more FLOPs per tile.
  common_mistake: Assuming Tensor Cores can process arbitrary matrix shapes efficiently. The hardware
    operates on fixed tile sizes — non-multiple dimensions require zero-padding, wasting compute on padding
    elements.
  napkin_math: 'Tile-based computation: 352,256 tiles × 8,192 FLOPs per tile = 352,256 × 8,192 = 2,885,681,152
    FLOPs ≈ 2.886 GFLOPs (not TFLOPs — 2.886 TFLOPs would require 352,256 × 8,192,000 FLOPs per tile,
    unrealistic).'
