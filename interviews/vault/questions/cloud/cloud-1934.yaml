title: LLM Serving Stage Invariants
scenario: You are defining the Stage Interface Contract between the Model Optimization and Serving stages for a cloud-based LLM inference platform using an 8B parameter model. The Serving stage runs on NVIDIA GPUs and guarantees a Time-Between-Tokens (TBT) < 50ms. The Optimization stage applies INT8 weight-only quantization.
question: What static invariants and dynamic profiling checks should the Optimization-to-Serving contract use to guarantee TBT < 50ms on L4 GPUs?
details:
  realistic_solution: 'Implement a hybrid contract: static invariants assert that the INT8 artifact size allows enough remaining VRAM for the KV cache and that the memory bandwidth required for the TBT SLA does not exceed 70% of the peak bandwidth. Dynamic profiling is then used sparingly as a final validation.'
  common_mistake: |
    **The Pitfall:** Relying solely on accuracy metrics or expensive dynamic profiling.
    **The Rationale:** Teams fail to encode deterministic hardware constraints (like memory bandwidth limits) as strict pass/fail static gates.
    **The Consequence:** The deployment pipeline becomes slow, flaky, and allows physically impossible SLA violations to reach production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8B parameter model, INT8 quantized.
    - TBT SLA: < 50ms (equivalent to > 20 tokens/sec).
    - Hardware bandwidth: 300 GB/s.

    **Calculations:**
    - Model size (INT8): 8B parameters * 1 byte/param = 8 GB.
    - Required memory bandwidth for SLA: 8 GB * 20 tokens/sec = 160 GB/s.
    - Peak bandwidth utilization: 160 GB/s / 300 GB/s = 53.3%.

    **Conclusion & Interpretation:**
    - **Result: 53.3% Utilization (Bandwidth-Feasible)**. The required 160 GB/s consumes 53.3% of peak bandwidth, safely passing the static invariant check (<70% limit).
