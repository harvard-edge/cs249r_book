title: LLM Serving Stage Invariants
scenario: You are defining the Stage Interface Contract between the 'Model Optimization' and 'Serving' stages for a cloud-based LLM inference platform using an 8B parameter model. The Serving stage runs on NVIDIA L4 GPUs (24GB VRAM, 300 GB/s bandwidth) and guarantees a Time-Between-Tokens (TBT) < 50ms. The Optimization stage applies INT8 weight-only quantization.
question: What static invariants and dynamic profiling checks should the Optimization-to-Serving contract use to guarantee TBT < 50ms on L4 GPUs?
details:
  realistic_solution: Implement a hybrid contract: static invariants assert that the INT8 artifact size allows enough remaining VRAM for the KV cache and that the memory bandwidth required for the TBT SLA does not exceed 70% of the L4's peak bandwidth. Dynamic profiling is then used sparingly as a final validation.
  common_mistake: |
    **The Pitfall:** Relying solely on accuracy metrics or expensive dynamic profiling.
    **The Rationale:** Teams fail to encode deterministic hardware constraints (like memory bandwidth limits) as strict pass/fail static gates.
    **The Consequence:** The deployment pipeline becomes slow, flaky, and allows physically impossible SLA violations to reach production.
  napkin_math: |
    *   **Model Size (INT8):** 8B parameters × 1 byte/param = 8 GB.
    *   **SLA Requirement:** TBT < 50ms means >20 tokens/sec.
    *   **Minimum Bandwidth Needed:** 8 GB × 20 tokens/sec = 160 GB/s.
    *   **Peak Hardware Bandwidth:** L4 provides 300 GB/s.
    *   **Bandwidth Utilization:** 160 / 300 = **53.3% utilization (safely passes the <70% invariant check).**
