title: Recall@100 vs. NDCG Tradeoff in Retrieval Optimization
scenario: Your retrieval model optimizes for Recall@100. The ranking model then re-orders these 100. After a model upgrade, Recall@100 improves from 72% to 81%, but end-to-end NDCG@10 drops from 0.38 to 0.35.
question: How can Recall@100 improve from 72% to 81% while end-to-end NDCG@10 drops from 0.38 to 0.35?
details:
  realistic_solution: "The ranking model is trained on candidates that come from the old retrieval model. Its training negatives are items that the old retrieval model surfaced. When the retrieval model changes, it surfaces different candidates \u2014 potentially items the ranking model has never seen as negatives. The ranking model cannot correctly score these out-of-distribution candidates because its decision boundary was trained on the old retrieval's item distribution. Specifically: the new retrieval model may surface more 'borderline relevant' items (it retrieves harder, more semantically similar items). The ranking model sees these as confusing \u2014 it assigns them scores similar to positives because they look like positives but aren't. NDCG@10 drops because the ranking model places these borderline-relevant items above true positives. Fix: (1) Retrain the ranking model with candidates from the new retrieval model. (2) Use a staged rollout: A/B test with the ranking model retrained on the new retrieval distribution before full deployment."
  common_mistake: |
    **The Pitfall:** Assuming better retrieval always improves ranking quality.
    **The Rationale:** Failing to recognize that the ranking model is heavily calibrated to the candidate distribution produced by the *old* retrieval model.
    **The Consequence:** Deploying the new retrieval model without retraining the ranker, resulting in degraded end-to-end user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Old System: 72% recall, NDCG@10 = 0.38.
       - New System: 81% recall, NDCG@10 = 0.35.
    2. **Calculations:**
       - 9 new true positives added, but 9 new 'borderline' items also surfaced.
       - Mis-ranking: Ranker places 4 borderline items above true positives.
       - DCG Loss: ~0.06 (outweighs the gain of new positives).
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Bound.** The ranking model's decision boundary is miscalibrated to the new retrieval distribution, causing DCG loss that outweighs recall gains.
