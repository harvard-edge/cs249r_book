title: 'KV-Cache: Design PagedAttention KV Cache for Multi-Tenant LLM Serving'
scenario: You are designing a KV cache for a multi-tenant 70B LLM serving system on 8 H100s (80GB HBM3
  each = 640GB total). You expect 100 concurrent requests with varying sequence lengths (128 to 4096 tokens).
  Design a PagedAttention-based KV cache that maximizes GPU utilization and supports up to 100 concurrent
  requests.
question: "How would you design a PagedAttention KV cache for 100 concurrent 128–4096-token requests on 8 H100s?"
details:
  realistic_solution: 'PagedAttention: allocate KV in pages of fixed size (e.g., 16 tokens per page).
    Assign pages dynamically. Only allocate as many pages as needed. Share KV pages across beam search
    branches (copy-on-write).'
  common_mistake: Pre-allocating max sequence length KV cache for every request — wastes memory for short
    sequences. Not accounting for the KV cache's share of HBM vs model weights.
  napkin_math: '70B model: 70B × 2B bf16 = 140GB model weights across 8 H100s = 17.5GB/GPU. Remaining:
    80 - 17.5 = 62.5GB/GPU for KV cache. KV cache per token per layer: 2 × num_kv_heads × head_dim × 2B
    bf16. For GQA 8 KV heads, head_dim=128: 2 × 8 × 128 × 2B = 4KB/token/layer. 70B model has 80 layers:
    4KB × 80 = 320KB per token total KV. 62.5GB / 320KB per token = 195,312 tokens capacity per GPU. 8
    GPUs: tensor-parallel, each stores full KV for its token range... wait: with tensor parallelism, KV
    is partitioned: 195K tokens total (single-GPU metric). 100 concurrent requests × avg 2048 tokens =
    204,800 tokens < 195K... tight. Avg 1024 tokens = 102K tokens → fits. Page size 16 tokens: page =
    16 × 320KB = 5.12MB. Pages per GPU: 62.5GB / 5.12MB = 12,207 pages.'
