title: 'Optimizing LLM Training on AMD MI300X Clusters: Mitigating Network Bandwidth Bottlenecks'
scenario: 'You are designing a distributed training infrastructure for a large language model (LLM) using a cluster of AMD MI300X accelerators. During early distributed training experiments across multiple nodes, you observe that the MI300X GPUs are significantly underutilized, and training throughput is much lower than expected. Your monitoring indicates that the accelerators frequently wait for data, suggesting a network-bound workload.'
question: How would you diagnose and mitigate network bandwidth bottlenecks causing underutilized MI300X accelerators in multi-node LLM training?
details:
  realistic_solution: |
    First, profile the LLM's communication patterns to identify heavy stages. Second, precisely measure the effective bisection bandwidth of your cluster's interconnect. Third, model the bandwidth cost for critical collective operations. Based on this, you can optimize communication by overlapping compute and communication, use gradient accumulation, re-evaluate model parallelism strategies, and investigate network hardware upgrades.
  common_mistake: |
    **The Pitfall:** Over-emphasizing individual accelerator compute power while ignoring bisection bandwidth.
    **The Rationale:** Engineers assume the network can automatically keep up with massive GPU FLOPs without careful communication modeling.
    **The Consequence:** The training pipeline becomes hopelessly network-bound, stranding the powerful compute nodes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100B parameter model in FP16 = 200 GB data per All-reduce.
    - Effective inter-node bisection bandwidth of 800 GB/s.

    **Calculations:**
    - Communication time = 200 GB / 800 GB/s = 0.25 seconds per operation.

    **Conclusion & Interpretation:**
    - **Result: 0.25 seconds (Network-Bound)**. A 0.25-second communication latency completely dominates the millisecond-scale FP16 compute time, bottlenecking the entire cluster.
