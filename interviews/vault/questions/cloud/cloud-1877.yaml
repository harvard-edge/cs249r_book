title: Diagnosing Sharded Checkpoint Metadata Stalls
scenario: 'A team is training a 70B parameter LLM on 64 GPUs using PyTorch FSDP. The distributed state is ~1.12 TB. They use sharded checkpointing where all 64 ranks independently write shards to a shared NFS volume capable of 10 GB/s. Checkpointing intermittently stalls for over 5 minutes and causes NCCL timeouts.'
question: "What is causing the >5 minute sharded checkpoint stalls on NFS, and how would you fix them?"
details:
  realistic_solution: 'The bottleneck is filesystem metadata contention and IOPS limits. 64 ranks simultaneously creating and opening files in a single shared directory causes severe inode lock contention. Fix it by using a distributed checkpointing coordinator or writing to isolated subdirectories.'
  common_mistake: |
    **The Pitfall:** Assuming the raw network storage bandwidth (10 GB/s) is the bottleneck.
    **The Rationale:** Candidates immediately jump to upgrading the network or compressing the checkpoints rather than analyzing filesystem behavior.
    **The Consequence:** Spending money on faster networking without resolving the underlying metadata lock contention that causes the stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B params, 64 GPUs. NFS volume: 10 GB/s.
       - State size: 70B × 16 bytes = 1.12 TB.
    2. **Calculations:**
       - Ideal write time: 1.12 TB / 10 GB/s = 112 seconds.
       - Actual write time: > 300 seconds (resulting in timeouts).
    3. **Conclusion & Interpretation:**
       **Result: Metadata Bound. The massive discrepancy (300s vs 112s) confirms metadata serialization and IOPS/locking overhead is the true bottleneck, not bandwidth.**
