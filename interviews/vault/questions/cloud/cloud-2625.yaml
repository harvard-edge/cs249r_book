title: Diagnosing Performance with Micro vs Macro Benchmarks
scenario: Your team sees 35% MFU on a new H100 cluster. The hardware vendor's micro-benchmarks show 95%
  peak GEMM, 92% peak bandwidth, and 90% peak NVLink. Should you blame the hardware or the software stack?
  What micro-benchmarks would you run to diagnose?
question: "Should you blame the hardware or the software stack, and what micro-benchmarks would you run to diagnose?"
details:
  realistic_solution: 'The vendor micro-benchmarks show hardware is healthy — 35% MFU is a software/integration
    problem. Diagnostic micro-benchmarks to run: (1) NCCL AllReduce bandwidth test at your actual message
    sizes (small messages have high latency overhead vs vendor''s large-message test). (2) Kernel launch
    latency measurement — if framework launches thousands of tiny kernels, GPU sits idle between them.
    (3) DataLoader throughput — measure if CPU preprocessing keeps up with GPU consumption. (4) Memory
    allocation profiling — frequent cudaMalloc/cudaFree causes fragmentation stalls. (5) Mixed workload
    benchmark — interleave matmul with LayerNorm to measure real kernel scheduling. The gap likely comes
    from small-kernel launch overhead, data pipeline stalls, or suboptimal NCCL topology configuration,
    not raw hardware capability.'
  common_mistake: Blaming hardware when micro-benchmarks pass. The gap between micro and macro performance
    is almost always a software integration, configuration, or workload composition issue.
  napkin_math: 'Vendor tests large GEMMs (4096×4096). Real model has 50% small ops. If small ops run at
    10% peak: 0.5×95% + 0.5×10% = 52% → 35% after communication = plausible.'
