title: Diagnosing Performance with Micro vs Macro Benchmarks
scenario: Your team sees 35% MFU on a new GPU cluster. The hardware vendor's micro-benchmarks show 95% peak GEMM, 92% peak bandwidth, and 90% peak NVLink.
question: "Should you blame the hardware or the software stack, and what micro-benchmarks would you run to diagnose?"
details:
  realistic_solution: 'The vendor micro-benchmarks show hardware is healthy — 35% MFU is a software/integration problem. Diagnostic micro-benchmarks to run: (1) NCCL AllReduce bandwidth test at your actual message sizes (small messages have high latency overhead vs vendor''s large-message test). (2) Kernel launch latency measurement — if framework launches thousands of tiny kernels, GPU sits idle between them. (3) DataLoader throughput — measure if CPU preprocessing keeps up with GPU consumption. (4) Memory allocation profiling — frequent cudaMalloc/cudaFree causes fragmentation stalls. (5) Mixed workload benchmark — interleave matmul with LayerNorm to measure real kernel scheduling. The gap likely comes from small-kernel launch overhead, data pipeline stalls, or suboptimal NCCL topology configuration, not raw hardware capability.'
  common_mistake: |
    **The Pitfall:** Blaming hardware when vendor micro-benchmarks pass.
    **The Rationale:** It is tempting to blame the physical cluster for low macro performance, but the gap between micro and macro performance is almost always an integration or workload composition issue.
    **The Consequence:** Wasting time running hardware diagnostics instead of profiling the software stack for kernel launch overhead or data pipeline stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vendor tests large GEMMs (e.g., 4096x4096) achieving 95% peak MFU.
       - A real model might have 50% of its operations as small kernels.
    2. **Calculations:**
       - Small ops run at ~10% peak efficiency.
       - Effective MFU: (0.5 * 95%) + (0.5 * 10%) = 52.5% MFU.
       - Additional communication overheads and data stalls further drop this.
    3. **Conclusion & Interpretation:** **Result: Overhead-Bound**. After factoring in communication and launch overheads, a drop to 35% MFU is highly plausible due to software and workload composition.
