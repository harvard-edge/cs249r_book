title: Evaluating Sync vs Async Gradient Strategies
scenario: Your team is training a 7B parameter LLM on 128x A100 GPUs connected by legacy 100 Gbps Ethernet. Synchronous Ring-AllReduce is creating a severe bottleneck, taking over 5.5 seconds per step. The infrastructure lead proposes switching to Asynchronous Parameter Servers to completely hide the network latency.
question: Should you switch the 7B LLM training job to Async Parameter Servers or keep Synchronous AllReduce with 8-bit compression, and why?
details:
  realistic_solution: Reject Asynchronous SGD to maintain mathematically consistent global model states. Instead, apply INT8 or 1-bit gradient quantization (like 1-bit Adam) under strict Synchronous AllReduce. This preserves the identical weight update necessity while dramatically lowering the communication payload.
  common_mistake: |
    **The Pitfall:** Focusing purely on hardware throughput and assuming Async SGD will yield a massive overall speedup.
    **The Rationale:** Candidates see that async updates completely hide network latency, ignoring the catastrophic statistical penalty (staleness) imposed on complex optimizers like Adam.
    **The Consequence:** The model suffers massive gradient staleness, destroying variance tracking and leading to outright model divergence or requiring 4× more steps to converge.
  napkin_math: |
    - **Baseline Sync Transfer:** 7B params = 28GB in FP32. Ring-AllReduce transmits ~2× payload = 56GB.
    - **Network Bottleneck:** 100 Gbps ≈ 10 GB/s. 56GB / 10 GB/s = **5.6s per step**.
    - **INT8 Compression Solution:** Payload drops to 7GB. Ring transfer drops to 14GB. Sync time drops to **1.4s per step**.
    - **Async Penalty:** Async drops sync time to 0s, but introduces staleness forcing 3-4× more steps, causing a massive net loss in Time-to-Accuracy.
