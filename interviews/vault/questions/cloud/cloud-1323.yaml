title: Evaluating Sync vs Async Gradient Strategies
scenario: Your team is training a 7B parameter LLM on 128x A100 GPUs (16 nodes, 8 GPUs/node) connected
  by legacy 100 Gbps Ethernet. Synchronous Ring-AllReduce is creating a severe bottleneck, taking over
  5.5 seconds per step. The infrastructure lead proposes switching to Asynchronous Parameter Servers to
  completely hide the network latency. Evaluate the trade-offs between adopting Asynchronous SGD versus
  implementing 8-bit gradient compression while strictly maintaining Synchronous AllReduce.
question: "Should you switch the 7B LLM training job to Async Parameter Servers or keep Synchronous AllReduce with 8-bit compression, and why?"
details:
  realistic_solution: Reject Asynchronous SGD to maintain mathematically consistent global model states.
    Instead, apply INT8 or 1-bit gradient quantization (like 1-bit Adam) under strict Synchronous AllReduce.
    This preserves the identical weight update necessity while dramatically lowering the communication
    payload.
  common_mistake: Focusing purely on hardware throughput (Time-per-Step) and assuming Async SGD will yield
    a massive system speedup, while ignoring the severe statistical penalty. Asynchronous updates with
    Adam optimizer on LLMs cause massive gradient staleness, destroying the variance tracking and leading
    to model divergence.
  napkin_math: 7B parameters = 28GB in FP32. Ring-AllReduce transmits ~2x payload = 56GB. Over 100 Gbps
    Ethernet (~10 GB/s actual throughput), sync takes 56GB / 10GB/s = 5.6s per step. With INT8 quantization,
    payload drops to 7GB. Sync time drops to 14GB / 10GB/s = 1.4s. Async avoids the 5.6s sync but introduces
    a staleness factor of up to tau=127, forcing 3-4x more steps to converge (if it doesn't diverge),
    resulting in a massive net loss in overall Time-to-Accuracy.
