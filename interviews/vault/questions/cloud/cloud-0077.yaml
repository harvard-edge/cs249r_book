title: The FP16 Inference Memory Footprint
scenario: You are deploying a 7B parameter LLM for a RAG application.
question: "To serve this model for inference, approximately how much GPU memory is required to hold just the model weights in standard half-precision (FP16)?"
details:
  realistic_solution: In FP16 (half-precision), each parameter requires 2 bytes of storage. Therefore, a 7 billion parameter model will require 7 billion × 2 bytes = 14 billion bytes, or 14 GB of GPU memory just for the weights. This is a baseline; additional memory is always needed for the KV cache, activations, and the serving framework's overhead.
  common_mistake: |
    **The Pitfall:** Confusing inference memory with training memory requirements or using the wrong precision multiplier.
    **The Rationale:** Candidates often recall the ~16 bytes/param rule of thumb for Adam optimizer training, or they calculate based on FP32 (4 bytes) or INT8 (1 byte).
    **The Consequence:** Over-provisioning (and overpaying for) inference hardware by drastically overestimating memory requirements.
  napkin_math: |
    - A 7B parameter model stored in standard half-precision (FP16) requires 2 bytes per parameter.
    - Weight Memory = 7 * 10^9 parameters * 2 bytes/parameter = 14 * 10^9 bytes.
    - **Exactly 14 GB is required for the weights.**
    - A GPU with at least 16GB (like a T4) or 24GB is necessary to accommodate the KV cache and activations.
  options:
  - 7 GB
  - 14 GB
  - 28 GB
  - 112 GB
  correct_index: 1
