title: 'Portable Profiling: NCU vs rocProf vs XLA Profiler Cross-Platform Analysis'
scenario: You need to profile the same transformer model across H100 (using Nsight Compute), MI300X (using
  rocProf), and TPU v5e (using XLA profiler). Each tool reports different metrics. How do you create comparable
  performance analysis across platforms?
details:
  realistic_solution: 'Normalize to hardware-agnostic metrics: (1) Achieved FLOPS / Peak FLOPS (compute
    utilization): derive from profiler-reported FLOP counts and wall-clock time. (2) Achieved BW / Peak
    BW (memory utilization): derive from bytes moved and time. (3) Arithmetic intensity (FLOPS/byte):
    compute from the above. These three metrics are comparable across any accelerator. Build a common
    dashboard that pulls raw data from each profiler and computes these normalized metrics. Use the roofline
    model as the universal comparison framework.'
  common_mistake: Comparing raw metric values directly across profilers. NCU reports 'SM Throughput %',
    rocProf reports 'GPU Busy %', and XLA profiler reports 'FLOPS utilization %'. These measure different
    things.
  napkin_math: 'H100 roofline: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte ridge. MI300X: 653 TFLOPS / 5.3
    TB/s = 123 FLOP/byte ridge. TPU v5e: 197 TFLOPS / 820 GB/s = 240 FLOP/byte ridge. Same kernel has
    different roofline positions on each platform.'
