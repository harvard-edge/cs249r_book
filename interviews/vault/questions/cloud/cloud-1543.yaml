title: 'LLM Inference Memory Bandwidth Calculation: Memory Hierarchy Design'
scenario: You are deploying a 13-billion parameter LLM using FP16 precision on a single NVIDIA A100 GPU
  with 2 TB/s of memory bandwidth. You need to estimate the maximum theoretical autoregressive token generation
  rate for a single user (batch size of 1). Assuming compute latency is zero and ignoring the KV cache
  overhead, calculate the absolute maximum tokens/second the hardware can physically generate.
question: "What is the maximum theoretical batch-1 autoregressive generation rate for the 13B FP16 model on an A100?"
details:
  realistic_solution: Calculate the total size of the model weights in bytes, then divide the GPU's memory
    bandwidth by the model size. This gives the maximum number of times the weights can be loaded per
    second, which directly equals the maximum tokens/second for batch size 1.
  common_mistake: Candidates often try to calculate compute FLOPs instead of memory bandwidth limits,
    failing to realize that autoregressive generation at batch size 1 is strictly memory-bandwidth bound
    because the entire model weight matrix must be loaded from HBM to SRAM for every single token generated.
  napkin_math: '1. Model size: 13B parameters * 2 bytes/parameter (FP16) = 26 GB.

    2. Max passes per second: 2000 GB/s / 26 GB = ~76.9 passes/sec.

    3. Maximum generation rate: 77 tokens/second.'
