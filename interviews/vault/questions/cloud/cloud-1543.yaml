title: 'LLM Inference Memory Bandwidth Calculation: Memory Hierarchy Design'
scenario: You are deploying a 13-billion parameter LLM using FP16 precision on a single GPU with 2 TB/s of memory bandwidth. You need to estimate the maximum theoretical autoregressive token generation rate for a single user (batch size of 1). Assuming compute latency is zero and ignoring the KV cache overhead.
question: What is the maximum theoretical batch-1 autoregressive generation rate for the 13B FP16 model?
details:
  realistic_solution: Calculate the total size of the model weights in bytes, then divide the GPU's memory bandwidth by the model size. This gives the maximum number of times the weights can be loaded per second, which directly equals the maximum tokens/second for batch size 1.
  common_mistake: |
    **The Pitfall:** Attempting to calculate generation rate using compute FLOPs instead of memory bandwidth.
    **The Rationale:** Candidates fail to realize that batch-1 autoregressive generation is strictly memory-bandwidth bound because the entire model weight matrix must be loaded from HBM to SRAM for every single token.
    **The Consequence:** Wildly overestimating token generation speed based on TFLOPS, leading to severe SLA violations in production.
  napkin_math: |
    * Model size: 13B parameters * 2 bytes/parameter (FP16) = 26 GB.
    * Max passes per second: 2,000 GB/s / 26 GB = ~76.9 passes/sec.
    * **Result:** The maximum theoretical generation rate is **~77 tokens/second**.
