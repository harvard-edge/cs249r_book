title: The Cross-Rack Embedding Fetch
scenario: You are optimizing a large recommendation model's inference latency. The embedding table is sharded across multiple servers. A request arrives at GPU_A, which discovers it needs an embedding vector stored in the HBM of GPU_B, located in an adjacent server rack. The system uses an InfiniBand NDR network with RDMA.
question: What is the minimum latency for GPU_A to RDMA-read GPU_B’s remote embedding, and which component dominates it?
details:
  realistic_solution: The total latency is the sum of latencies at each step of the round trip. An RDMA read avoids CPU overhead, but it still has to pay the cost of multiple hardware handoffs. The request goes from GPU_A's core, across its PCIe bus to the InfiniBand NIC, over the fiber to GPU_B's NIC, up GPU_B's PCIe bus to its HBM controller, and then the data packet follows the same path in reverse. The InfiniBand and PCIe bus crossings are physical events that take thousands of nanoseconds and are far more significant than the HBM access itself.
  common_mistake: |
    **The Pitfall:** Misattributing latency purely to the speed of light in fiber or standard "network" delay.
    **The Rationale:** Engineers often treat the network as a single black box number, forgetting the I/O hierarchy.
    **The Consequence:** They fail to account for PCIe bus crossings and NIC processing, dramatically underestimating microsecond-level bottlenecks for sequential fetches.
  napkin_math: |
    - **GPU_A PCIe crossing:** ~1 µs.
    - **InfiniBand Fiber transmission:** ~1.5 µs.
    - **GPU_B PCIe crossing:** ~1 µs.
    - **GPU_B HBM read:** ~0.5 µs.
    - **One-way latency:** 1 + 1.5 + 1 + 0.5 = 4 µs.
    - **Round-trip latency:** 4 µs × 2 = **~8 µs minimum.**
  options:
  - The HBM3 memory access on GPU_B (~300 ns), because accessing off-chip memory is fundamentally slow.
  - The request is processed by the CPU on both servers, adding significant software overhead.
  - The round trip over the InfiniBand network (~10,000 ns), as it involves two cross-rack transfers.
  - The speed of light delay across the datacenter floor, which is on the order of milliseconds.
  correct_index: 2
