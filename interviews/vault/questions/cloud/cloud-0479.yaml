title: The Cross-Rack Embedding Fetch
scenario: You are optimizing a large recommendation model's inference latency. The embedding table is
  sharded across multiple servers. A request arrives at GPU_A, which discovers it needs an embedding vector
  stored in the HBM of GPU_B, located in an adjacent server rack. The system uses an InfiniBand NDR network
  with RDMA. Diagnose the minimum time required for GPU_A's compute core to get this remote data, starting
  from the moment it issues the read request. Which component contributes the most to this latency?
details:
  realistic_solution: The total latency is the sum of latencies at each step of the round trip. An RDMA
    read avoids CPU overhead, but it still has to pay the cost of multiple hardware handoffs. The request
    goes from GPU_A's core, across its PCIe bus to the InfiniBand NIC, over the fiber to GPU_B's NIC,
    up GPU_B's PCIe bus to its HBM controller, and then the data packet follows the same path in reverse.
    The InfiniBand and PCIe bus crossings are physical events that take thousands of nanoseconds and are
    far more significant than the HBM access itself.
  common_mistake: 'Engineers often just think of ''network latency'' as a single number (e.g., the speed
    of light in fiber). They forget the request has to traverse the *entire I/O hierarchy* on both the
    source and destination machine: from the core out the PCIe bus to the NIC, across the network, then
    up the hierarchy on the other side (NIC -> PCIe -> HBM), and then the data must make the return trip.
    They misattribute the entire latency to just the wire time.'
  napkin_math: 'An RDMA read involves: GPU_A memory -> GPU_A PCIe (~1us) -> NIC_A -> Fiber (~1.5us) ->
    NIC_B -> GPU_B PCIe (~1us) -> GPU_B HBM read (~0.5us). The reverse trip adds another 4us. Total round-trip
    latency is roughly 8us minimum, completely unmaskable for sequential embedding fetches.'
  options:
  - The HBM3 memory access on GPU_B (~300 ns), because accessing off-chip memory is fundamentally slow.
  - The request is processed by the CPU on both servers, adding significant software overhead.
  - The round trip over the InfiniBand network (~10,000 ns), as it involves two cross-rack transfers.
  - The speed of light delay across the datacenter floor, which is on the order of milliseconds.
  correct_index: 2
