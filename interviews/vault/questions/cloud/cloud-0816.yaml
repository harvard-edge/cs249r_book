title: The S3 Data Wall
scenario: 'You rent an 8x A100 node on AWS to train a ResNet on a 50TB dataset of high-resolution medical images. To save money, you leave the dataset in a standard S3 bucket and use PyTorch''s `IterableDataset` to stream the images directly to the GPUs during training. Your GPUs sit at 5% utilization.'
question: 'Why did streaming from object storage starve your compute?'
details:
  realistic_solution: "You hit the Data Wall. A GPU is a math engine that must be fed. An 8x A100 node can process thousands of images per second. However, pulling individual images from S3 introduces massive HTTP network latency (Time To First Byte is ~50-100ms per request). Furthermore, the total inbound network bandwidth of the EC2 instance (e.g., 25 Gbps) is physically incapable of keeping up with the VRAM consumption rate of 8 A100s. The GPUs are spending 95% of their time waiting for the network card."
  common_mistake: |
    **The Pitfall:** Thinking of cloud object storage (S3) as just another local hard drive.
    **The Rationale:** Engineers ignore the massive per-request HTTP latency and the strict network bandwidth limits of the EC2 instance compared to local NVMe.
    **The Consequence:** Expensive A100 GPUs idle at 5% utilization, wasting thousands of dollars while waiting for the network card.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8x A100 node. Process rate: 20,000 images/sec.
    - Image size: 2MB.
    - EC2 network link: 25 Gbps (~3.125 GB/s).

    **Calculations:**
    - GPU Data Demand: 20,000 * 2 MB = 40,000 MB/s (40 GB/s or 320 Gbps).
    - Network Supply Limit: ~3.125 GB/s (25 Gbps).
    - Deficit: 40 GB/s / 3.125 GB/s = ~12.8x undersupplied.

    **Conclusion & Interpretation:**
    - **Result: Network I/O Bound.** The EC2 network pipe is >10x too small to feed the GPUs, artificially capping compute utilization at ~5-8%.
