title: The S3 Data Wall
scenario: You rent an 8x A100 node on AWS to train a ResNet on a 50TB dataset of high-resolution medical
  images. To save money, you leave the dataset in a standard S3 bucket and use PyTorch's `IterableDataset`
  to stream the images directly to the GPUs during training. Your GPUs sit at 5% utilization. Why did
  streaming from object storage starve your compute?
details:
  realistic_solution: You hit the Data Wall. A GPU is a math engine that must be fed. An 8x A100 node
    can process thousands of images per second. However, pulling individual images from S3 introduces
    massive HTTP network latency (Time To First Byte is ~50-100ms per request). Furthermore, the total
    inbound network bandwidth of the EC2 instance (e.g., 25 Gbps) is physically incapable of keeping up
    with the VRAM consumption rate of 8 A100s. The GPUs are spending 95% of their time waiting for the
    network card.
  common_mistake: '"Thinking of S3 as just another hard drive, ignoring the massive per-request latency
    and limited network bandwidth compared to local NVMe."'
  napkin_math: 8x A100s training ResNet-50 can process ~20,000 images/sec. If each medical image is 2MB,
    the GPUs demand `20,000 * 2MB = 40 GB/s` (320 Gbps) of constant data flow. A standard cloud instance
    might only have a 25 Gbps (~3 GB/s) network link to S3. Even with perfect pipelining, the network
    pipe is physically 10x too small to feed the GPUs. You must copy the dataset to local RAID-0 NVMe
    drives first.
