title: RoCE v2 vs InfiniBand for ML Training
scenario: Your team must choose between InfiniBand NDR (400Gbps) and RoCE v2 (400Gbps) for a new 1024-MI300X training cluster. Both offer the same line rate but use fundamentally different transport mechanisms.
question: For a 1024-MI300X cluster, how do InfiniBand NDR and RoCE v2 compare in congestion control, multi-tenancy, operations, and recovery?
details:
  realistic_solution: 'InfiniBand NDR advantages: (1) Credit-based flow control eliminates PFC deadlock risk entirely. Each sender maintains a credit counter per VL and only sends when credits are available — no pause storms. (2) Adaptive routing built into Quantum-2 switches with per-packet granularity. (3) Subnet Manager provides centralized routing with guaranteed deadlock-free paths. (4) SHARP in-network AllReduce capability. (5) Lower latency: 1.3μs end-to-end vs 2.5μs for RoCE. Disadvantages: vendor lock-in (NVIDIA only), higher switch cost (~2× vs Ethernet), separate management plane. RoCE v2 advantages: (1) Uses standard Ethernet switches (Broadcom, etc.) — multi-vendor sourcing. (2) Familiar operational model for network teams. (3) Large existing Ethernet infrastructure can be reused. (4) Cost: ~40% lower per-port. Disadvantages: requires PFC (deadlock risk), ECN/DCQCN tuning complexity, no in-network computation. For 1024 MI300X: IB is recommended. At this scale, PFC deadlock probability is non-trivial (1-2 events/day), and each event can stall training for 30+ seconds. The 2× switch cost premium is <5% of total cluster cost but eliminates days of congestion-related debugging.'
  common_mistake: |
    **The Pitfall:** Choosing the network purely based on line rate and initial hardware cost.
    **The Rationale:** Candidates see that both offer 400Gbps and assume the ~40% cheaper Ethernet switches are a clear win, completely missing the transport layer differences.
    **The Consequence:** The team chooses RoCE v2 to save $6M, but ends up losing far more in engineer debugging time and wasted GPU-hours recovering from Priority Flow Control (PFC) deadlocks.
  napkin_math: |
    1. **Switch Cost Premium:** IB switches (~$15M) vs Ethernet (~$9M) creates a $6M premium.
    2. **Total Cluster Cost:** At ~$300M total for 1024 MI300X GPUs, the network premium is only **~2%**.
    3. **PFC Deadlock Impact:** 1 deadlock event/day stalling for 30s impacts 1024 GPUs = 8.5 GPU-hours lost.
    4. **Financial Cost:** 8.5 GPU-hours × $3/hour = $25.5/day. Over 3 years, this is negligible financially, but devastating to engineering velocity.
