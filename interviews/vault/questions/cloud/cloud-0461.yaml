title: The Two-Node Scaling Disappointment
scenario: You are scaling up training for a 70B parameter LLM. On a single 8xH100 node, you observe near-linear scaling. When you scale to a second identical node, connected via InfiniBand NDR, your overall throughput increases by only 2x, not the 8x you saw on the first node. You use a profiler and find the vast majority of time is spent in the All-Reduce communication step.
question: What is the most likely physical bottleneck causing the scaling efficiency to drop off between two 8xH100 nodes?
details:
  realistic_solution: 'The bottleneck is the physical InfiniBand interconnect between the two nodes. Inside a single DGX H100 node, the 8 GPUs are connected by NVLink 4.0, which provides 900 GB/s of all-to-all bandwidth per GPU. In contrast, the InfiniBand NDR connection between the two nodes provides only 50 GB/s (400 Gbps). This ~18x drop in communication bandwidth means that as soon as the model''s gradient synchronization (All-Reduce) has to cross the node boundary, the entire training step must slow down to the speed of the weakest link: the inter-node network.'
  common_mistake: |
    **The Pitfall:** Blaming the software stack, such as an inefficient All-Reduce algorithm or misconfigured switch.
    **The Rationale:** Engineers often suspect software or configuration issues rather than the fundamental physics of the hardware interconnects.
    **The Consequence:** They miss the massive, unavoidable bandwidth gap between intra-node NVLink and inter-node InfiniBand.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intra-node (NVLink 4.0): 900 GB/s.
       - Inter-node (InfiniBand NDR): 400 Gbps (50 GB/s).
    2. **Calculations:**
       - Bandwidth Drop Ratio: 900 / 50 = 18x reduction.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. Massive 18x bandwidth cliff when crossing the node boundary.**
  options:
  - The PCIe Gen5 bus on each server is saturated from transferring data to the network card.
  - The chosen ring-based All-Reduce algorithm is inefficient for a two-node setup.
  - The physical bandwidth of the inter-node InfiniBand connection is ~18x lower than the intra-node NVLink fabric.
  - There is not enough HBM3 memory on the GPUs to store the gradients before communication.
  correct_index: 2
