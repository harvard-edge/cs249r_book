title: GPU Starvation from Cloud Storage
scenario: We are training a Vision-Language model on 8x A100 GPUs. GPU utilization averages 25-30%, while host CPU utilization is pegged at 100%. The dataset is 50 million 100KB images read directly from an S3 bucket. Network throughput is around 400MB/s, well below the instance's 100Gbps limit.
question: What is causing low GPU utilization and pegged CPU during ViT training from S3, and how would you fix the input pipeline?
details:
  realistic_solution: |
    The symptom points to an I/O metadata and connection overhead bottleneck. Reading small files directly requires thousands of HTTP GET requests, saturating the CPU. Pack the dataset into larger (e.g., 1GB) tarballs using WebDataset and introduce a high-performance caching layer.
  common_mistake: |
    **The Pitfall:** Blindly increasing the number of DataLoader CPU workers or upgrading GPUs.
    **The Rationale:** Candidates fail to diagnose the I/O metadata bottleneck caused by thousands of small HTTP requests.
    **The Consequence:** Increased cloud costs with no improvement in training throughput, as the CPU remains blocked on networking overhead.
  napkin_math: |
    - **Target throughput**: 8 GPUs * 500 imgs/sec = 4,000 imgs/sec.
    - **Target bandwidth**: 4,000 * 100 KB = 400 MB/s.
    - **Current approach**: 4,000 HTTP GETs/sec to S3 causes massive CPU overhead (TLS, metadata).
    - **Proposed fix**: Pack into 1 GB shards.
    - **Conclusion**: **400 MB/s requires reading only 0.4 shards/sec, reducing request overhead by a factor of 10,000x.**
