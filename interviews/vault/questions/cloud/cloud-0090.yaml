title: 'The Static Batching Penalty: Activation Memory & Checkpointing'
scenario: You are managing a real-time translation service running on a single GPU. The service has a strict Time-To-First-Token (TTFT) deadline of 200ms. Your system uses a static batching strategy, where it collects incoming requests for a fixed 100ms window before processing the batch. The actual GPU processing for the batch takes 50ms.
question: What is the TTFT for a request arriving at the start of the 100ms batching window, and does it meet the 200ms deadline?
details:
  realistic_solution: The total Time-To-First-Token is the sum of the time spent waiting for the batch window to close and the subsequent GPU processing time. For a request that arrives at the beginning of the window, it must wait the full 100ms for the window to elapse. After that, the batch is sent for processing, which takes another 50ms. Therefore, the total TTFT is 150ms. Since 150ms is less than the 200ms deadline, the system meets its SLA for this 'worst-case' request.
  common_mistake: |
    **The Pitfall:** Focusing solely on the GPU processing time (50ms) and ignoring queue time.
    **The Rationale:** Engineers often evaluate system performance from the perspective of the compute unit rather than the lifecycle of a request.
    **The Consequence:** They falsely conclude the system easily meets its SLA, missing the fact that worst-case requests suffer from the artificial latency of the batching window.
  napkin_math: |
    - Queue Time = 100ms (waiting for the full static window).
    - Processing Time = 50ms.
    - **TTFT = Queue Time (100ms) + Processing Time (50ms) = 150ms.**
  options:
  - 50ms. It easily meets the deadline.
  - 100ms. It meets the deadline.
  - 150ms. It meets the deadline.
  - 250ms. It fails to meet the deadline.
  correct_index: 2
