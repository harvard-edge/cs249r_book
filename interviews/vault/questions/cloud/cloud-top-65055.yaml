title: KV Cache Network Topology for High-Bandwidth Transfer
scenario: A disaggregated serving cluster has prefill nodes and decode nodes in separate racks, connected
  via 400 Gbps InfiniBand HDR. KV cache transfer adds 4ms P99 latency. The network team proposes moving
  to InfiniBand NDR (800 Gbps). Calculate the benefit and propose an alternative if the upgrade is cost-prohibitive.
details:
  realistic_solution: 'KV cache size analysis: for 70B model, 512-token prompt: 1.64GB (calculated earlier).
    At 400 Gbps = 50 GB/s: transfer = 1.64/50 = 32.8ms. At 800 Gbps: 16.4ms. Both much larger than stated
    4ms. Stated 4ms suggests smaller model (7B) or shorter prompt. 7B model, 512 tokens: 2*32*32*128*512*2B
    = 134MB. At 400 Gbps: 134MB/50GB/s = 2.68ms + fabric latency ~1.5ms = 4.18ms — matches! NDR upgrade:
    134MB / 100 GB/s = 1.34ms + 1.5ms = 2.84ms. Saves 1.34ms. Cost of NDR upgrade: ~$30K per port. Benefit:
    1.34ms reduction. If P99 TTFT target is 100ms, this is 1.3% improvement — marginal. Alternative: co-locate
    prefill and decode on same DGX node using NVLink (600 GB/s bidirectional per GPU pair): 134MB / 600
    GB/s = 0.22ms. Zero network cost, 18x faster than HDR.'
  common_mistake: Assuming doubling link bandwidth directly halves transfer time. This only holds if the
    bottleneck is bandwidth, not latency. InfiniBand fabric latency is 1-2us per hop, and multiple hops
    through the fat-tree switch fabric can add 3-10us. For small KV caches, latency dominates; for large
    KV caches, bandwidth dominates.
  napkin_math: 'NVLink within DGX-H100: 900 GB/s per GPU. KV transfer 7B/512 tokens: 134MB / 900 GB/s
    = 0.15ms. vs HDR InfiniBand: 2.68ms. NVLink is 18x faster. But co-location reduces disaggregation
    flexibility (prefill and decode share physical GPU, losing the ability to independently scale each
    pool). Break-even: if KV transfer latency > 1ms and re-routing overhead > 0.5ms, co-location on NVLink
    wins. For 70B model with 1.64GB KV: InfiniBand HDR = 32.8ms + latency, NDR = 16.4ms + latency. Both
    are too slow for 100ms TTFT — must use KV compression or smaller model.'
