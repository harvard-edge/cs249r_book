title: 'Shared vs Routed Experts: DeepSeek''s Hybrid Architecture'
scenario: 'DeepSeek-V2 uses a hybrid architecture: 2 shared experts (always active for every token) + 160 routed experts (top-6 selected per token).'
question: Why include 2 shared experts alongside 160 routed experts, and what systems benefits does this hybrid MoE design provide?
details:
  realistic_solution: 'Modeling benefits: (1) Shared experts capture universal patterns (basic language understanding, common sense) that every token needs, without consuming routing slots. Without them, 2 of the top-6 slots would always go to ''general'' experts, leaving only 4 slots for specialized routing. (2) Shared experts provide a ''residual pathway'' — even if routing fails catastrophically (all routed experts receive garbage), the shared experts maintain basic model functionality. Systems benefits: (1) Communication: shared experts process tokens locally on each GPU with no All-to-All. Only the 6 routed experts require token dispatch. With 2 shared experts on every GPU, the All-to-All volume is reduced because shared computation is purely local. (2) Load balancing: shared experts handle the ''baseline'' computation, so routed experts can specialize without worrying about coverage. Load imbalance among routed experts is less impactful because shared experts guarantee minimum quality. (3) Memory: shared expert weights are replicated on every GPU (like TP for attention), while routed experts use EP. This hybrid avoids the ''all-expert-loading'' problem at inference time — shared experts are always loaded.'
  common_mistake: |
    **The Pitfall:** Thinking shared experts are just "always-on routed experts."
    
    **The Rationale:** Candidates fail to understand the communication topology implications of MoE, missing that shared experts do not participate in routing decisions.
    
    **The Consequence:** Misunderstanding the primary systems benefit of the architecture, which is the massive reduction in All-to-All communication volume.
  napkin_math: |
    * **Without Shared Experts:** 8 routed experts (top-2). All-to-All per token = 2 messages × hidden_dim.
    * **With Shared Experts:** 2 shared + 160 routed (top-6). All-to-All per token = 6 messages.
    * **Communication Savings:** If shared experts handle 25% of the MLP capacity locally, the network payload drops by 25%.
    * **Result:** **Local compute for shared experts incurs zero communication overhead, significantly reducing network pressure.**
