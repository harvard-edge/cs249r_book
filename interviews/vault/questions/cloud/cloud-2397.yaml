title: Minimizing Serving Cost per Token
scenario: You are migrating a high-throughput Mixtral inference service. To hit an SLA of 10,000 tokens/sec
  globally, you are choosing between instances with 8x A100-80GB ($24/hr, 3.2kW IT power, 12,000 tok/sec)
  and 8x H100-80GB ($48/hr, 5.6kW IT power, 30,000 tok/sec). The datacenter charges a flat rate of $0.15/kWh
  for power (PUE 1.2), which is billed directly to your team. Design a deployment strategy that minimizes
  the Total Cost of Ownership (TCO) per 1 Million tokens generated.
question: "Which instance strategy minimizes TCO per million Mixtral tokens for the 10,000 tok/sec SLA, A100 or H100?"
details:
  realistic_solution: When optimizing serving-cost-per-token, TCO must encompass both compute rental and
    power consumption. The H100 instance is twice as expensive per hour but delivers 2.5x the throughput.
    Furthermore, when factoring in the power bill, the H100's higher dynamic power is amortized over a
    much larger token output, resulting in superior energy efficiency (tokens per Joule). To hit exactly
    10,000 tokens/sec, you would need 1 A100 instance (yielding 12k) or 1/3 of an H100 instance (assuming
    you can colocate workloads or use fractional routing). If scaling to fleet levels, the H100 is the
    clear winner for TCO. The strategy should mandate migrating to H100s, utilizing continuous batching
    to keep utilization high, and absorbing the higher power density because the perf/watt is strictly
    better.
  common_mistake: Looking only at the hourly compute rental cost ($24 vs $48) and assuming A100 is cheaper,
    while neglecting the cost of power and the massive throughput disparity.
  napkin_math: 'A100 TCO per hr: Compute = $24. Power = 3.2kW * 1.2 PUE * $0.15 = $0.57. Total = $24.57/hr.
    Tokens/hr = 12,000 * 3600 = 43.2M. Cost per 1M tokens = $24.57 / 43.2 = $0.568.

    H100 TCO per hr: Compute = $48. Power = 5.6kW * 1.2 PUE * $0.15 = $1.00. Total = $49.00/hr. Tokens/hr
    = 30,000 * 3600 = 108M. Cost per 1M tokens = $49.00 / 108 = $0.453.

    H100 reduces serving cost per token by ~20%.'
