title: JIT Compiler SSA Graph Memory Footprint Calculation
scenario: You are optimizing a custom RNN cell using a tracing JIT compiler targeted at an NVIDIA A100
  cluster. The cell contains a loop that executes 15 times, performing an in-place state update `h = h
  + w * x` where the hidden state `h` is a 20MB FP32 tensor. To simplify dependency analysis, the compiler
  lowers this Python code into Single Static Assignment (SSA) form via loop unrolling. Calculate the naive
  memory footprint of the `h` state variables in the unrolled SSA graph before any liveness analysis or
  register reuse optimizations are applied.
details:
  realistic_solution: In SSA form, every assignment must target a uniquely versioned variable (e.g., `h_1`,
    `h_2`, ..., `h_15`). The unrolled loop will therefore generate 15 distinct `h_n` variable assignments.
    Before liveness analysis optimizes buffer reuse down to a single memory location, the naive SSA Intermediate
    Representation (IR) represents a separate logical tensor for each assignment, resulting in 300MB of
    intermediate logical allocations for the hidden state.
  common_mistake: Assuming that the in-place Python operation (`h = h + ...`) means the compiler IR only
    requires a single 20MB buffer, ignoring the fundamental property of SSA where every assignment creates
    a new versioned variable.
  napkin_math: 'Iterations = 15

    Python execution: h = h + update

    SSA Unrolling IR: h_1 = h_0 + u_0, h_2 = h_1 + u_1, ..., h_15 = h_14 + u_14

    Distinct SSA variables generated for state ''h'' = 15

    Naive logical memory footprint = 15 variables * 20 MB/variable = 300 MB'
