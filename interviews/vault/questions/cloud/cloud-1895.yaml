title: JIT Compiler SSA Graph Memory Footprint Calculation
scenario: You are optimizing a custom RNN cell using a tracing JIT compiler targeted at a GPU cluster. The cell contains a loop that executes 15 times, performing an in-place state update `h = h + w * x` where the hidden state `h` is a 20MB FP32 tensor. To simplify dependency analysis, the compiler lowers this Python code into Single Static Assignment (SSA) form via loop unrolling.
question: What is the naive memory footprint of the h state variables in the unrolled SSA graph before liveness or buffer reuse?
details:
  realistic_solution: |
    In SSA form, every assignment must target a uniquely versioned variable (e.g., `h_1`, `h_2`, ..., `h_15`). The unrolled loop will therefore generate 15 distinct `h_n` variable assignments. Before liveness analysis optimizes buffer reuse down to a single memory location, the naive SSA Intermediate Representation (IR) represents a separate logical tensor for each assignment, resulting in 300MB of intermediate logical allocations for the hidden state.
  common_mistake: |
    **The Pitfall:** Assuming that the in-place Python operation means the compiler IR only requires a single 20MB buffer.
    **The Rationale:** Candidates ignore the fundamental property of SSA where every assignment must create a new uniquely versioned variable.
    **The Consequence:** Underestimating peak intermediate memory requirements during compilation, potentially leading to compiler OOMs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 15 iterations.
       - 20MB FP32 tensor.
       - SSA dictates unique variables.
    2. **Calculations:**
       - SSA Variables: 15 distinct variables generated.
       - Total Footprint: 15 × 20 MB = 300 MB.
    3. **Conclusion & Interpretation:** **The unrolled loop generates 300 MB of intermediate allocations. Result: Memory-Capacity-Bound.**
