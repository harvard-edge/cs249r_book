title: Mitigating Dispatch Bottlenecks with CUDA Graphs
scenario: You are profiling a real-time recommendation model running on an NVIDIA A100. The model executes a sequence of 400 small, independent multi-layer perceptrons (MLPs) per request. Profiling shows that each MLP takes only 2 µs to execute on the device, but the GPU utilization is hovering around 28%.
question: What is the total latency for 400 small MLP kernels with 5 µs launch overhead, and how would you remove the dispatch bottleneck?
details:
  realistic_solution: Identify that the system is CPU dispatch-bound. Implement CUDA Graphs to capture the entire sequence of 400 kernel launches into a single executable graph, amortizing the launch overhead.
  common_mistake: |
    **The Pitfall:** Calculating the theoretical compute time and assuming the GPU is underpowered or memory-bound.
    **The Rationale:** Candidates focus on the math kernels and ignore the CPU dispatch overhead for small, fast kernels.
    **The Consequence:** They attempt to optimize the math kernels rather than recognizing and removing the CPU dispatch bottleneck.
  napkin_math: |
    - Standard dispatch: 400 kernels * (5 µs launch + 2 µs compute) = 2.8 ms total latency.
    - GPU is active for 0.8 ms, yielding ~28% utilization.
    - CUDA Graphs dispatch: 1 graph launch (~3 µs) + (400 * 2 µs compute) = 0.803 ms total latency.
    - **Result: Speedup is ~3.5x.**
