title: Parameter Server vs AllReduce
scenario: A machine learning team is deciding between parameter server and AllReduce-based distributed training architectures for their new large-scale models.
question: "What is the key architectural difference between parameter servers and AllReduce, and why do modern frameworks favor AllReduce?"
details:
  realistic_solution: 'In a parameter server architecture, dedicated server nodes hold model parameters; workers pull weights, compute gradients, and push updates back. This creates a hub-and-spoke communication pattern where servers are potential bottlenecks. In AllReduce, all workers hold a full copy of parameters and collectively reduce gradients in a ring or tree pattern — no central server, bandwidth scales with worker count. Modern frameworks prefer AllReduce because: (1) bandwidth is distributed evenly, (2) no single point of failure, (3) NVLink/InfiniBand hardware optimizes collective operations. Parameter servers remain relevant for sparse models (e.g., embeddings with trillions of parameters) where only a small subset of parameters are accessed per batch.'
  common_mistake: |
    **The Pitfall:** Thinking parameter servers are completely obsolete.
    **The Rationale:** Modern deep learning frameworks predominantly default to AllReduce for dense models.
    **The Consequence:** Failing to utilize parameter servers for sparse models (e.g., recommendation systems with massive embedding tables) where AllReduce is highly inefficient.
  napkin_math: |
    * **Parameter Server bottleneck:** N workers push/pull through k servers, creating hub-and-spoke congestion.
    * **AllReduce ring:** Each node sends/receives exactly 2(N-1)/N of the data volume.
    * **Bandwidth scales efficiently with worker count in AllReduce, preventing a single point of failure.**
