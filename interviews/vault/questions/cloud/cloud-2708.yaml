title: Parameter Server vs AllReduce
scenario: A machine learning team is deciding between parameter server and AllReduce-based distributed training architectures for their new large-scale models.
question: What is the key architectural difference between parameter servers and AllReduce, and why do modern frameworks favor AllReduce?
details:
  realistic_solution: 'In a parameter server architecture, dedicated server nodes hold model parameters; workers pull weights, compute gradients, and push updates back. In AllReduce, all workers hold a full copy of parameters and collectively reduce gradients in a ring or tree pattern. Modern frameworks prefer AllReduce because bandwidth is distributed evenly and there is no single point of failure.'
  common_mistake: |
    **The Pitfall:** Thinking parameter servers are completely obsolete.
    **The Rationale:** Modern deep learning frameworks predominantly default to AllReduce for dense models.
    **The Consequence:** Failing to utilize parameter servers for sparse models (e.g., recommendation systems with massive embedding tables) where AllReduce is highly inefficient.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameter Server architecture: N workers, k servers.
       - AllReduce architecture: N workers in a ring.
    2. **Calculations:**
       - Parameter Server: Traffic funnels through k servers, creating a hub-and-spoke bottleneck.
       - AllReduce ring: Each node sends/receives exactly 2(N-1)/N of the total data volume.
    3. **Conclusion & Interpretation:**
       - **Result: Network Topology-Bound. AllReduce distributes bandwidth evenly across all workers, preventing a single point of failure.**
