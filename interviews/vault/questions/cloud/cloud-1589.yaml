title: Root-Causing Deployment Failures via Disaggregated Evaluation
scenario: A cloud-hosted NLP moderation API processing 2,000 requests/sec on a cluster of g5.12xlarge
  instances sees its overall accuracy plummet from 92% to 70% following a global regional rollout. The
  engineering team assumes concept drift, spends $15,000 retraining the model on a naive random sample
  of the new data, but only improves aggregate accuracy to 74%. The upstream vendor provided a Model Card
  that only reported aggregate F1 scores and a generic 'intended use' statement. How do you root-cause
  this systemic failure, and what specific statistical artifacts were missing from the Model Card?
details:
  realistic_solution: Root-cause the failure by computing disaggregated evaluation metrics across regional
    slices. The Model Card failed to document the severe performance degradation on non-majority geographic
    slices, which were hidden by the original heavily skewed validation set. Mandate stratified reporting
    and explicit out-of-scope use cases in the documentation.
  common_mistake: Candidates often blame infrastructure bottlenecks or suggest blind hyperparameter tuning,
    completely missing that the model is operating outside its intended domain and lacking visibility
    into subpopulation performance.
  napkin_math: 'Original skewed validation: 95% Region A (94% acc), 5% Region B (54% acc) -> Aggregate
    = (0.95 * 0.94) + (0.05 * 0.54) = 92%. New global traffic mix: 40% Region A, 60% Region B -> Expected
    Aggregate = (0.40 * 0.94) + (0.60 * 0.54) = 37.6% + 32.4% = 70%. The deployment failure was mathematically
    predictable if the Model Card contained the disaggregated 54% subpopulation metric.'
