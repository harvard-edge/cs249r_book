title: 'KV-Cache: Realize KV Cache Memory Layout for Tensor-Parallel 70B Serving'
scenario: Realize the KV cache memory layout for a 70B LLM served with tensor parallelism
  TP=8 across 8 H100s (80GB each). The model uses GQA with 64 Q heads and 8 KV heads.
  Maximum 200 concurrent requests, 2048 token sequences. Specify per-GPU layout, addressing
  scheme, and total capacity.
question: How should the 70B KV cache be laid out per GPU with TP=8 and 8 KV heads,
  and what capacity does it provide?
details:
  realistic_solution: 'With GQA and TP=8, each GPU naturally holds 1 KV head. KV layout:
    [num_layers, 2 (K+V), num_tokens, head_dim] per GPU. Total KV is partitioned,
    not replicated.'
  common_mistake: Replicating the full KV cache on every GPU (8×) instead of partitioning.
    With TP=8 and 8 KV heads, each GPU handles exactly 1 KV head.
  napkin_math: 'GQA: 8 KV heads, TP=8. Per GPU: 1 KV head. Per-GPU KV per token per
    layer: 2 × 1 × 128 × 2B = 512B. 80 layers: 80 × 512B = 40KB per token per GPU.
    200 requests × 2048 tokens = 409,600 token slots. Per-GPU KV total: 409,600 ×
    40KB = 16.4GB. Per-GPU model weights: 70B × 2B / 8 = 17.5GB. Activations: 1GB.
    Total per GPU: 16.4 + 17.5 + 1 = 34.9GB << 80GB. Well within budget! 50.6% HBM
    headroom. Can scale to: (80 - 17.5 - 1) / 40KB per token = 61.5GB / 40KB = 1.54M
    token slots = 1.54M / 2048 = 750 concurrent requests. 3.75× more than required.
    Memory layout: PyTorch tensor [80, 2, 409600, 128] bf16 per GPU = 80 × 2 × 409600
    × 128 × 2 = 16.7GB. Addressing: request_id → token_offset (via PagedAttention
    table, 16-token pages = 1,600 pages × 80 layers per request).'
