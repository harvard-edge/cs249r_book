title: 'KV-Cache: Realize KV Cache Memory Layout for Tensor-Parallel 70B Serving'
scenario: You must realize the KV cache memory layout for a 70B LLM served with tensor parallelism TP=8 across 8 H100s (80GB each). The model uses GQA with 64 Q heads and 8 KV heads. Assume maximum 200 concurrent requests and 2048 token sequences.
question: "How should the 70B KV cache be laid out per GPU with TP=8 and 8 KV heads, and what capacity does it provide?"
details:
  realistic_solution: 'With GQA and TP=8, each GPU naturally holds 1 KV head. KV layout: [num_layers, 2 (K+V), num_tokens, head_dim] per GPU. Total KV is partitioned, not replicated.'
  common_mistake: |
    **The Pitfall:** Replicating the full KV cache on every GPU instead of partitioning it.
    **The Rationale:** Assuming Tensor Parallelism requires all GPUs to store the entire sequence state.
    **The Consequence:** Wasting massive amounts of HBM and artificially bottlenecking the maximum concurrent request count.
  napkin_math: |
    **Assumptions & Constraints:**
    - GQA: 8 KV heads, TP=8. Per-GPU holds exactly 1 KV head.
    - 80 layers, 128 head_dim, 2 bytes (FP16).
    - 200 reqs × 2048 tokens.

    **Calculations:**
    - Per-GPU KV per token per layer: 2 × 1 × 128 × 2B = 512B.
    - 80 layers: 80 × 512B = 40KB per token per GPU.
    - 200 reqs × 2048 tokens = 409,600 token slots.
    - 409,600 × 40KB = 16.38 GB KV cache per GPU.

    **Conclusion & Interpretation:**
    - **Result: 16.38 GB KV cache per GPU (Memory Capacity)**. KV cache easily fits in 80GB HBM when properly partitioned via Tensor Parallelism.
