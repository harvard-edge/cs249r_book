title: Prefix Caching for Shared System Prompts
scenario: Your LLM serving platform handles 10,000 requests/min. 80% of requests share the same 2048-token system prompt. Each request's unique user prompt is 256 tokens. You are using Llama 3 70B with GQA (8 KV heads, 80 layers).
question: How much KV-cache memory and TTFT can prefix caching save when 80% of requests share the 2048-token system prompt?
details:
  realistic_solution: 'Without prefix caching: Each request computes KV-cache for 2048 + 256 = 2304 tokens from scratch. KV per request: 2304 × 320 KB = 737 MB. For 100 concurrent requests: 73.7 GB. With prefix caching: Compute and store the 2048-token system prompt KV-cache once: 2048 × 320 KB = 655 MB (shared, read-only). Each request only computes KV for its 256 unique tokens: 256 × 320 KB = 82 MB, plus a reference to the shared prefix. For 100 concurrent: 655 MB (shared) + 100 × 82 MB = 8.85 GB. Memory savings: 73.7 - 8.85 = 64.85 GB (88% reduction). Latency improvement: Prefill of 2048 tokens on H100 for 70B model takes ~200ms. With prefix caching: prefill only 256 tokens = ~25ms. TTFT reduction: 175ms (8× faster for the prefill-dominated portion). Implementation: store shared prefix KV blocks in a content-addressed cache keyed by hash of the prefix token IDs. Reference-counted so blocks are freed when no active request uses them.'
  common_mistake: |
    **The Pitfall:** Only counting per-request memory savings.
    **The Rationale:** Engineers focus on the memory capacity benefits of prefix caching but forget that it also eliminates redundant computation during the prefill phase.
    **The Consequence:** The dramatic latency reduction (TTFT improvement) is ignored, leading to an incomplete cost-benefit analysis.
  napkin_math: |
    - **Shared prefix memory:** 2048 tokens &times; 320 KB/token = 655 MB (stored once).
    - **Per-request unique memory:** 256 tokens &times; 320 KB/token = 82 MB.
    - **Memory for 100 concurrent requests (with caching):** 655 MB + (100 &times; 82 MB) = 8.85 GB.
    - **Memory for 100 concurrent requests (without caching):** 100 &times; (655 MB + 82 MB) = 73.7 GB.
    - **Memory Savings:** (73.7 - 8.85) / 73.7 &approx; **88% reduction**.
    - **TTFT Improvement:** Prefill of 256 tokens vs 2304 tokens is &approx; **8&times; faster prefill**.
