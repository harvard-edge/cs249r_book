title: 'Evaluating FEC Trade-offs in 800G PAM4 Fabrics'
scenario: 'You are architecting the network fabric for a 32,000 GPU cluster used for training large Mixture of Experts (MoE) models. The leaf-spine topology uses 800G Ethernet based on 100G/lane PAM4 signaling. The ML training team reports that synchronous AllReduce operations are missing tail latency targets. They notice that Forward Error Correction (FEC) adds fixed latency to every switch hop and propose disabling FEC on the short 2-meter Direct Attach Copper (DAC) cables within the racks to save 100-150ns per hop.'
question: 'Should FEC be disabled on 2-meter 800G PAM4 DAC links to save 100–150 ns per hop, and why?'
details:
  realistic_solution: 'Reject the proposal. PAM4 signaling packs 4 voltage levels into the same eye diagram as NRZ, making it highly susceptible to noise. The pre-FEC Bit Error Rate (BER) for 100G PAM4 is typically around 1e-4, even on short DACs. Disabling FEC (like KP4 RS-FEC) would result in massive packet loss, triggering RoCEv2/TCP retransmission timeouts that add milliseconds of delay, vastly overshadowing the ~100ns saved by bypassing the FEC decoding block.'
  common_mistake: |
    **The Pitfall:** Agreeing to disable FEC on short DAC links.
    **The Rationale:** Candidates falsely treat 100G/lane PAM4 signaling like older 10G/25G NRZ signaling, assuming signal integrity on a short cable is perfectly clean.
    **The Consequence:** Massive packet loss triggering RoCEv2/TCP retransmission timeouts that add milliseconds of delay, vastly overshadowing the ~100ns saved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pre-FEC BER: ~10^-4 for PAM4.
    - Packet Size: 4KB MTU = 32,000 bits.
    - RoCE Timeout Penalty: >1ms (1,000,000 ns).

    **Calculations:**
    - Packet Error Rate: 1 - (1 - 10^-4)^32000 = ~96% drop rate without FEC.

    **Conclusion & Interpretation:**
    - **Result: 1ms retransmission penalty (Network-Bound)**. A 1ms retransmission penalty is 10,000x worse than 100ns FEC latency.
