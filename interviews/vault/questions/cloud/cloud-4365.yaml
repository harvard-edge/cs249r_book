title: 'MI300X INT4 Quantization: VRAM and Throughput vs H100'
scenario: A 70B LLM is quantized to INT4 using GPTQ (group size 128). The INT4 weight
  size is 35GB. On an H100 SXM5 (80GB), INT4 inference achieves 2,467 TOPS INT4 throughput.
  On an MI300X (192GB), ROCm reports 2,614 TOPS INT4. Compare the token generation
  throughput advantage of each approach and determine whether the MI300X's memory
  bandwidth advantage persists under INT4 quantization.
question: For the 70B INT4 GPTQ model, what token throughput should H100 and MI300X
  achieve, and does MI300X keep its bandwidth advantage?
details:
  realistic_solution: 'INT4 model on H100: 35GB weight fits in 80GB (45GB slack for
    KV cache and activations). On MI300X: 35GB in 192GB (157GB slack). The key question:
    is INT4 decode memory-bound or compute-bound? For dequantize-then-FP16 GEMM (most
    common path): weights load as INT4 (0.5 bytes/param), dequantize to FP16 before
    multiply. Effective memory bandwidth requirement: 35GB × throughput. Arithmetic
    intensity: for batch=1, AI ≈ 2 FLOP/byte (similar to FP16 decode). Memory-bound.
    H100 bandwidth: 3,350 GB/s. INT4 weights: 35GB load per forward pass. At batch=1:
    H100 decode = 3,350 GB/s / 35GB = 95.7 passes/sec = 95.7 tok/sec. MI300X: 5,300
    / 35 = 151.4 tok/sec. MI300X advantage: 1.58× — identical ratio to FP16 case,
    confirming bandwidth is still the bottleneck.'
  common_mistake: Assuming INT4 inference is compute-bound just because INT4 TOPS
    is very high. The dequantize-then-compute pattern used by most INT4 implementations
    converts weights to FP16 before GEMM, making the operation still memory-bandwidth-limited
    at typical LLM decode batch sizes.
  napkin_math: 'INT4 weight load per token (70B params × 0.5 bytes): 35GB. H100 BW:
    3,350 GB/s → 3350/35 = 95.7 tok/sec. MI300X BW: 5,300 GB/s → 5300/35 = 151.4 tok/sec.
    BW ratio: 151.4/95.7 = 1.58× (matches FP16 ratio exactly). Compute ceiling check:
    70B FLOPs per token requires 2 FLOPs per parameter = 140 GFLOPs/token. H100 INT4:
    2,467 TOPS → 2,467T / 140G = 17,621 tok/sec compute ceiling. Both are 184× above
    actual throughput → confirmed memory-bound. MI300X 192GB enables fitting three
    70B INT4 models simultaneously (3×35GB = 105GB < 192GB) vs one per H100 — 3× serving
    density advantage.'
