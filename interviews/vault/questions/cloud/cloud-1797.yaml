title: Evaluating Ring AllReduce Bottlenecks at Scale
scenario: You are scaling a 175B parameter model training job from 8 to 64 A100 GPUs (8 nodes, 400 Gbps inter-node InfiniBand). Your team proposes using a traditional centralized Parameter Server.
question: For synchronizing FP16 gradients of the 175B model on 64 A100s, should you use a Parameter Server or Ring AllReduce, and why?
details:
  realistic_solution: Choose Ring AllReduce. A Parameter Server architecture creates a massive incast bottleneck at the PS node, scaling linearly with worker count. Ring AllReduce distributes the bandwidth load evenly, such that each node only transmits and receives approximately 2x the model size, making it bounded and virtually independent of the number of nodes.
  common_mistake: |
    **The Pitfall:** Evaluating total cluster bandwidth rather than focusing on single-node bottlenecks.
    **The Rationale:** Candidates fail to identify the incast problem inherent to centralized Parameter Servers.
    **The Consequence:** Designing a network topology that bottlenecks the entire cluster on a single switch or node.
  napkin_math: |
    1. **Model Size:** 175B × 2 bytes = 350 GB.
    2. **Parameter Server:** Ingests 63 × 350 GB = 22,050 GB. Time = 22,050 / 50 GB/s = 441s.
    3. **Ring AllReduce:** Each node transfers 2 × (63/64) × 350 GB ≈ 689 GB. Time = 689 / 50 GB/s = 13.8s.
    4. **Conclusion:** **Ring AllReduce is ~32x faster.**
