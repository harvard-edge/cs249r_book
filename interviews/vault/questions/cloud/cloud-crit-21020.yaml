title: MoE vs Dense Scaling Law Crossover
scenario: Your organization has a fixed $10M training budget (H100 at $2/GPU-hr). You must choose between
  training a dense model and an MoE model to minimize loss on a 2T-token dataset. The MoE model has 2×
  training throughput overhead (all-to-all, load imbalance) compared to a dense model with the same active
  parameters. At what model size does MoE become the better investment?
question: "What GPT-4-scale FLOP budget and 8× scaling-law loss reduction should you use in the $10M dense-vs-MoE investment analysis?"
details:
  realistic_solution: 'GPT-4 compute ≈ 1.8×10^25 FLOPs (not 10^22). Loss reduction from 8× compute: 8^(-0.076)
    = 0.854 → 14.6% reduction (not 17%).'
  common_mistake: Assuming MoE is always better because it has more parameters. Below a certain scale,
    the communication overhead of MoE training outweighs the parameter scaling benefit.
  napkin_math: 'GPT-4 scale compute: ~1.8×10^25 FLOPs (not 1.8×10^22 which is GPT-3 scale — off by 1000×).
    Loss reduction: scaling by 8× compute: loss ∝ C^(-0.076). 8^(-0.076) = e^(-0.076×ln8) = e^(-0.076×2.079)
    = e^(-0.158) = 0.854. Reduction = 1 - 0.854 = 14.6% (not 17%).'
