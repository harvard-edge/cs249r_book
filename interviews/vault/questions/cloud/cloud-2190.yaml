title: The Bandwidth-Optimal Lower Bound
scenario: A colleague proposes a 'novel AllReduce algorithm' that they claim runs 2× faster than Ring
  AllReduce on 128 GPUs for large messages. Before running any benchmarks, you should be able to tell
  them whether this is theoretically possible. What is the information-theoretic lower bound on AllReduce
  bandwidth, and does Ring AllReduce achieve it? Could any algorithm beat Ring for large messages on a
  fully-connected topology?
details:
  realistic_solution: 'The information-theoretic lower bound for AllReduce comes from two observations:
    (1) **ReduceScatter lower bound**: Every GPU must contribute its data to a global reduction. The minimum
    data any GPU must send is $\frac{N-1}{N} \times M$ — it keeps its own $1/N$ shard and must send the
    rest. (2) **AllGather lower bound**: Every GPU must receive the final result. The minimum data any
    GPU must receive is $\frac{N-1}{N} \times M$. Combined, the minimum total transfer per GPU is $2 \times
    \frac{N-1}{N} \times M$. Ring AllReduce achieves **exactly this bound** — it is bandwidth-optimal.
    No algorithm can beat it for large messages on any topology where all links have equal bandwidth.
    Your colleague''s claim is impossible for large messages; the theoretical lower bound forbids it.
    However, two caveats: (a) Ring is NOT latency-optimal (Tree has $O(\log N)$ vs $O(N)$ latency), so
    for small messages a different algorithm can be faster. (b) On hierarchical topologies with unequal
    link bandwidths (e.g., NVLink + IB), hierarchical algorithms can be faster than a flat Ring by exploiting
    the faster links — but they still cannot beat the bandwidth lower bound on each link tier.'
  common_mistake: Assuming there is always room for improvement over existing algorithms. For AllReduce
    on large messages, Ring AllReduce is provably bandwidth-optimal — no algorithm can transfer less total
    data per GPU.
  napkin_math: '- Lower bound per GPU: 2 × (N-1)/N × M | - Ring achieves: exactly 2 × (N-1)/N × M — optimal
    | - For N=128, M=1 GB: lower bound = 2 × 127/128 × 1 GB = 1.984 GB per GPU | - At 50 GB/s: minimum
    time = 1.984 GB / 50 GB/s = 39.7 ms | - No algorithm can go below 39.7 ms on a single 50 GB/s link
    per GPU, regardless of topology or scheduling'
