title: The KV Cache Memory Trap
scenario: You are serving a 7B parameter LLM on a single H100 GPU with 80 GB of HBM3 memory. A user makes
  a request with a very long context window of 128k tokens. Identify which component consumes the most
  memory and is the primary cause of an out-of-memory (OOM) error in this scenario.
question: "For a 7B FP16 model with a 128k-token request on an 80 GB H100, what component is the primary OOM driver?"
details:
  realistic_solution: The KV Cache is the largest memory consumer. While the model weights are fixed,
    the KV cache must store the key and value vectors for every token in the input sequence. For a 7B
    model, the weights are ~14 GB, but the KV cache for a 128k token sequence is ~62.5 GB. Combined, they
    approach the GPU's capacity limit.
  common_mistake: Engineers often anchor on the model's parameter count (e.g., 'a 7B model is small')
    as the main driver of memory usage. They forget or underestimate that the KV cache size scales linearly
    with sequence length and can dwarf the memory required for the model weights, especially with modern
    long-context windows.
  napkin_math: '1. **Model Weights Memory:** 7B params × 2 bytes/param (for FP16) = **14 GB**. 2. **KV Cache Memory:** 128,000 tokens × 32 layers × 32 heads × 128 dim × 2 (K,V) × 2 bytes = **~67.1 GB**. Combined, they exceed the 80 GB capacity.'
  options:
  - Model parameters (weights)
  - Optimizer state (e.g., Adam)
  - The KV Cache
  - Intermediate activations for the final token
  correct_index: 2
