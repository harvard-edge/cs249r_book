title: Evaluating RPC Frameworks for High-Throughput Embeddings
scenario: You are designing the serving layer for a high-throughput embeddings API. The API receives batches of 256 text sequences and returns a 1536-dimensional FP32 float array per sequence. Currently, the API uses a standard JSON over HTTP REST interface. At peak load, GPU utilization is capped at 45%. Profiling shows the Node.js API gateway is bottlenecked on CPU, spending significant time allocating and serializing the massive JSON response arrays.
question: Should the embeddings API migrate from JSON REST to gRPC/Protobuf bytes or rely on response caching to maximize GPU saturation, and why?
details:
  realistic_solution: Migrate to gRPC/Protobuf and serialize the 1536-dim FP32 arrays as raw byte arrays (`bytes` field) rather than repeated float fields. This bypasses per-element float-to-string conversion, reducing serialization latency from ~15ms to <1ms and unblocking the GPU.
  common_mistake: |
    **The Pitfall:** Focusing solely on the network bandwidth savings of binary formats.
    **The Rationale:** Candidates miss that the primary bottleneck here is the CPU computational cost and memory allocation overhead of JSON stringification.
    **The Consequence:** They misdiagnose the issue and might suggest network-level fixes rather than addressing the CPU serialization overhead.
  napkin_math: |
    - **Raw Batch Size:** 256 seqs * 1536 dims * 4 bytes = 1.57 MB.
    - **JSON Size:** ~12 chars/float * 393K floats ≈ 4.7 MB.
    - **CPU Overhead:** Node.js stringifying 393K floats takes ~15ms.
    - **GPU Bottleneck:** If GPU inference takes 12ms, CPU serialization (15ms) is the bottleneck, capping GPU utilization at 12 / (12 + 15) = **~44%**.
