title: Bin-Packing GPU Jobs to Minimize Fragmentation
scenario: 'Your 512-GPU A100 cluster scheduler uses First-Fit bin-packing to assign jobs. A workload audit
  shows 18% GPU fragmentation: 92 GPUs are allocated but underutilized (< 5% GPU util) because jobs request
  8 GPUs but only use 6. Compute the cost of this fragmentation and propose a better allocation strategy.'
details:
  realistic_solution: 'Implement utilization-aware gang scheduling: if a job''s 6-hour average GPU utilization
    < 20%, the scheduler renegotiates the allocation down. Use Best-Fit Decreasing (BFD) bin-packing instead
    of First-Fit to reduce fragmentation. Add a ''rightsizing'' daemon that monitors NVML util every 60s
    and flags over-provisioned jobs for the scheduler.'
  common_mistake: Accepting user-declared GPU counts at face value and not enforcing actual utilization
    requirements. Jobs pad their GPU requests to ensure they don't get preempted, creating systematic
    over-allocation without a utilization feedback loop.
  napkin_math: '92 wasted GPUs × $2.50/GPU-hour (A100 spot) = $230/hour = $5,520/day. At 18% fragmentation
    on 512 GPUs: effective cluster size = 512 × 0.82 = 420 GPUs. Wasted capacity: 92 GPUs × 8,760 h/year
    = 805,920 GPU-hours/year ≈ $2M/year. BFD reduces fragmentation to ~5% in theory (from O(n) to O(1)
    amortized waste), recovering ~67 GPUs.'
