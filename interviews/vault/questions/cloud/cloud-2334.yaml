title: FlashAttention SRAM Bank Conflicts
scenario: A custom cloud AI accelerator (128MB shared SRAM, 16 physical memory banks) runs a custom FlashAttention
  kernel. With a sequence length of 4096 and head dimension of 128, SRAM bandwidth utilization maxes out
  at 12.5% (400 GB/s out of 3.2 TB/s peak), and compute SMs are stalled 85% of the time waiting for SRAM
  loads.
details:
  realistic_solution: The symptom (high SRAM stall rate and exactly 1/8th of peak bandwidth) perfectly
    describes severe SRAM bank conflicts. Memory in accelerators is divided into banks to allow parallel
    access. If multiple threads request addresses that map to the same bank simultaneously, the requests
    are serialized. With 16 banks, addresses are typically interleaved (e.g., every 32 bytes maps to the
    next bank). A head dimension of 128 (often 256 bytes in FP16) is a multiple of the bank stride. When
    a warp/wavefront tries to load a column of the Query/Key matrix (stride = 128 elements = 256 bytes),
    all memory addresses hit Bank 0, serializing 16 parallel load requests into 16 sequential cycles.
    The co-design solution is to pad the inner dimension in shared memory (e.g., allocate stride as 128
    + 8 elements) so consecutive column accesses skew across different physical banks, restoring parallel
    memory fetches.
  common_mistake: Assuming the SRAM is too small and the kernel is thrashing to HBM, leading to proposals
    to increase SRAM size.
  napkin_math: 16 banks, each 32 bytes wide. Bank stride = 16 * 32 = 512 bytes. Head dim = 128 FP16 elements
    = 256 bytes. Thread 0 accesses A[0][0] (addr 0 -> Bank 0). Thread 1 accesses A[1][0] (addr 256 ->
    Bank 8). Thread 2 accesses A[2][0] (addr 512 -> Bank 0). Half the threads hit Bank 0, the other half
    hit Bank 8. A 16-thread warp load takes 8 cycles instead of 1 cycle. Bandwidth drops to 1/8th (12.5%).
    Peak BW = 3.2 TB/s * 0.125 = 400 GB/s. Padding the row stride to 136 elements (272 bytes) forces Thread
    2 to address 544 -> Bank 1, eliminating the conflict.
  options:
  - Hardware-software co-design means NVIDIA and PyTorch develop features together; it does not involve
    any actual hardware changes — the 'hardware' part refers to driver and firmware updates
  - Custom interconnect topologies provide no benefit over standard Ethernet because modern training frameworks
    hide all network details; the software stack is the only factor in training performance
  - FP8 training formats produce identical results to FP32 with zero accuracy loss; the only reason FP32
    still exists is backward compatibility with legacy CUDA kernels
  - 'Hardware-software co-design for training: (1) Custom interconnect topology (e.g., Google TPU pod''s
    3D torus vs NVIDIA''s fat-tree IB) optimized for AllReduce patterns. (2) High-bandwidth memory (HBM3
    at 3.35 TB/s on H100 vs HBM2e at 2.0 TB/s on A100) directly improves memory-bound operations. (3)
    Compiler optimizations (XLA for TPU, TorchInductor for GPU) fuse operations to reduce memory traffic.
    (4) Custom number formats (BF16, FP8) trade precision for throughput.'
  correct_index: 3
