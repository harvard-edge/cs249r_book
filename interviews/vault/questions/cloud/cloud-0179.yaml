title: The Continuous Batching Stall
scenario: You implement continuous batching for an LLM endpoint to improve throughput. Under low load, Time To First Token (TTFT) is 100ms. Under high load, throughput triples, but TTFT spikes to over 4 seconds, even though token generation speed remains fast.
question: What scheduling flaw in continuous batching causes severe TTFT spikes under high load, and why?
details:
  realistic_solution: 'You starved the prefill phase. In LLM serving, a request has two phases: Prefill (processing the prompt, compute-bound) and Decode (generating tokens, memory-bound). With continuous batching, an incoming request is injected into the very next iteration of the running batch. However, the prefill phase for a new prompt requires a massive matrix multiplication that consumes almost all the GPU''s compute. If you inject a new 2,000-token prompt into a running batch, the GPU must pause decoding for everyone else to crunch that prefill. To prevent this, schedulers often limit the prefill chunk size or delay new prefills. If delayed too aggressively under high load, incoming requests wait in the queue for seconds, destroying TTFT.'
  common_mistake: |
    **The Pitfall:** Assuming continuous batching natively guarantees low latency for all incoming requests.
    **The Rationale:** Engineers know continuous batching improves VRAM utilization and aggregate throughput, but overlook the compute disparity between prefill and decode phases.
    **The Consequence:** Incoming prompts wait in a starved queue or stall active generations, destroying the responsiveness of the endpoint.
  napkin_math: |
    1. A 2000-token prefill on a 70B model requires: 2 × 70B × 2000 = 280 TFLOPs.
    2. An A100 (FP16) peak is ~312 TFLOPS. The prefill takes almost 1 full second of dedicated compute.
    3. If 4 users send prompts simultaneously, the scheduler processes them sequentially or stalls.
    4. The 4th user sits in the queue for ~3 seconds before their prefill even begins.
    5. **Starving the prefill phase or failing to chunk large prefills causes multi-second TTFT delays.**
