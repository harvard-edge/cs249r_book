title: The Continuous Batching Stall
scenario: You implement continuous batching (iteration-level scheduling) for an LLM endpoint to improve
  throughput. Under low load, TTFT (Time To First Token) is 100ms. Under high load, your throughput triples,
  but users start complaining that TTFT spikes to over 4 seconds, even though token generation speed (TPOT)
  remains fast. What scheduling flaw caused this?
details:
  realistic_solution: 'You starved the prefill phase. In LLM serving, a request has two phases: Prefill
    (processing the prompt, compute-bound) and Decode (generating tokens, memory-bound). With continuous
    batching, an incoming request is injected into the very next iteration of the running batch. However,
    the prefill phase for a new prompt requires a massive matrix multiplication that consumes almost all
    the GPU''s compute. If you inject a new 2,000-token prompt into a running batch, the GPU must pause
    decoding for everyone else to crunch that prefill. To prevent this, schedulers often limit the prefill
    chunk size or delay new prefills. If delayed too aggressively under high load, incoming requests wait
    in the queue for seconds, destroying TTFT.'
  common_mistake: '"Assuming that because continuous batching optimizes VRAM and throughput, it automatically
    guarantees low latency for incoming requests."'
  napkin_math: A 2000-token prefill on a 70B model requires `2 * 70B * 2000 = 280 TFLOPs`. An A100 (FP16)
    does ~312 TFLOPs. That prefill takes almost `1 full second` of dedicated compute. If 4 users send
    prompts simultaneously, the 4th user sits in the queue for 3 seconds before their prefill even begins,
    destroying TTFT, while the active decoders are completely stalled waiting for the prefills to finish.
