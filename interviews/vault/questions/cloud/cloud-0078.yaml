title: 'The Static Batching Latency Tax: Model Serving Infrastructure'
scenario: You're operating an LLM inference service for a real-time code assistant. The service uses a simple static batching strategy. The server is configured to wait up to 100ms to form a batch of 4 requests before sending them to the GPU. The actual GPU computation for a full or partial batch takes 300ms.
question: What is the worst-case user latency with a 100ms batching wait and 300ms GPU computation?
details:
  realistic_solution: The total latency is the sum of the maximum time the server waits to form a batch and the time it takes to compute the batch.
  common_mistake: |
    **The Pitfall:** Focusing only on throughput and raw GPU compute time.
    **The Rationale:** Completely forgetting the latency cost imposed by the batching window.
    **The Consequence:** Underestimating worst-case latency for interactive applications.
  napkin_math: |
    - Total Latency = Batching Wait Time (100ms) + GPU Compute Time (300ms)
    - Result: **400ms**
  options:
  - 300ms
  - 100ms
  - 400ms
  - 75ms
  correct_index: 2
