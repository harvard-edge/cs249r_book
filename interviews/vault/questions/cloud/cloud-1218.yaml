title: Resume Screening API Equality of Opportunity Threshold Tuning
scenario: A cloud-based resume screening API evaluates candidates for tech roles, processing 10,000 resumes per day. Group A has 4,000 applicants with 800 actually qualified. Group B has 6,000 applicants with 600 actually qualified. The current model correctly flags 600 qualified candidates from Group A and 300 qualified candidates from Group B.
question: What are the current True Positive Rates for Groups A and B, and how many additional true positives does Group B need for Equality of Opportunity?
details:
  realistic_solution: "Calculate the TPR for Group A, then adjust the threshold for Group B until its TPR matches Group A. Group A's TPR is 75%. Group B needs its threshold lowered to capture 150 more true positives."
  common_mistake: |
    **The Pitfall:** Confusing Equality of Opportunity with Demographic Parity, or focusing on precision instead of Recall (TPR).
    **The Rationale:** Misunderstanding the mathematical definitions of various fairness constraints.
    **The Consequence:** Tuning thresholds to equalize the total percentage of hired applicants (Demographic Parity) rather than ensuring qualified applicants from both groups have an equal chance of being selected.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Group A: 800 actually qualified, 600 true positives.
       * Group B: 600 actually qualified, 300 true positives.
       * Equality of Opportunity requires TPR_A = TPR_B.
    2. **Calculations:**
       * TPR Group A: 600 / 800 = 0.75 (75%).
       * TPR Group B: 300 / 600 = 0.50 (50%).
       * Target TPs for Group B: 0.75 \times 600 = 450.
       * Additional TPs Needed: 450 - 300 = 150.
    3. **Conclusion & Interpretation:**
       * Group B needs its threshold lowered to capture **150 additional true positives**. **Result: Fairness-Constraint-Bound (TPR Parity)**.
