title: Resume Screening API Equality of Opportunity Threshold Tuning
scenario: A cloud-based resume screening API evaluates candidates for tech roles, processing 10,000 resumes
  per day. Group A has 4,000 applicants with 800 actually qualified. Group B has 6,000 applicants with
  600 actually qualified. The current model correctly flags 600 qualified candidates from Group A and
  300 qualified candidates from Group B. You are tasked with adjusting the decision thresholds to satisfy
  the Equality of Opportunity fairness constraint. Calculate the current True Positive Rate (TPR) for
  each group and determine how many additional true positive predictions are required for Group B to achieve
  this fairness metric.
details:
  realistic_solution: Calculate the TPR for Group A, then adjust the threshold for Group B until its TPR
    matches Group A. Group A's TPR is 75%. Group B needs its threshold lowered to capture 150 more true
    positives.
  common_mistake: Confusing Equality of Opportunity with Demographic Parity (aiming for equal positive
    prediction rates overall) or focusing on precision instead of True Positive Rate (Recall).
  napkin_math: TPR_A = TP_A / Actual_Positives_A = 600 / 800 = 0.75 (75%). TPR_B = TP_B / Actual_Positives_B
    = 300 / 600 = 0.50 (50%). Target TP_B = TPR_A * Actual_Positives_B = 0.75 * 600 = 450. Additional
    TP needed for Group B = 450 - 300 = 150.
