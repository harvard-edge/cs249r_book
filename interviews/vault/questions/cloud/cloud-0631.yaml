title: The Disaggregated Memory Architecture
scenario: Your company is evaluating CXL-attached memory pools for ML inference. The pitch is to expand GPU-accessible memory to terabytes at DRAM cost.
question: "For which ML workloads does CXL memory make sense, and for which is it a trap?"
details:
  realistic_solution: CXL memory makes sense for capacity-bound workloads with low bandwidth requirements, such as embedding tables for recommendation models, KV-cache overflow for long-context LLM serving, and rarely-accessed experts in MoE models. CXL is a trap for bandwidth-bound workloads like LLM decode and training.
  common_mistake: |
    **The Pitfall:** Treating CXL memory the same as local RAM.
    **The Rationale:** Ignoring how latency compounds in bandwidth-sensitive workloads and the difference between latency and throughput.
    **The Consequence:** Catastrophic performance degradation for bandwidth-bound tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - CXL 2.0 bandwidth: 64 GB/s.
    - HBM3 bandwidth: 3350 GB/s.

    **Calculations:**
    - Embedding lookup: 512 KB / 64 GB/s = 8us.
    - LLM decode (14 GB weights): 14 GB / 64 GB/s = 219ms per token (vs 4.2ms on HBM).

    **Conclusion & Interpretation:**
    - **Result: CXL is viable for capacity-bound tasks but a trap for bandwidth-bound decode (Memory-Bound)**. Latency makes it unusable for LLM decode.
