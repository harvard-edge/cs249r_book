title: Why Federated Learning Sends Gradients Not Data
scenario: 'A hospital network wants to collaboratively train a diagnostic model across 10 sites without sharing patient data.'
question: 'What federated learning architecture allows training without sharing data, and what makes it privacy-preserving?'
details:
  realistic_solution: 'Federated learning keeps raw data on-device and transmits model updates (gradients) to a central aggregation server using FedAvg. The server averages these and broadcasts the global model back. Privacy is preserved because the server never sees individual records, only aggregate statistical summaries.'
  common_mistake: |
    **The Pitfall:** Believing gradients are perfectly private on their own.
    **The Rationale:** Candidates assume that because raw data isn't sent, no information leaks.
    **The Consequence:** Failing to realize that gradient inversion attacks can reconstruct samples, necessitating differential privacy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 hospitals * 1M records = 10M records (Terabytes).
       - Gradients are roughly the size of the model parameters (~100MB).
    2. **Calculations:**
       - Centralized: Move TBs of data across network.
       - Federated: Move 100MB per round.
    3. **Conclusion & Interpretation:**
       - **Result: TB of transfer avoided per round.**
       - **Conclusion: Bandwidth and Privacy-Bound; gradients decouple compute from data location.**