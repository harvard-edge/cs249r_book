title: Why Federated Learning Sends Gradients Not Data
scenario: 'A hospital network wants to collaboratively train a diagnostic model across 10 sites without sharing patient data.'
question: 'What federated learning architecture lets 10 hospitals train jointly without sharing patient data, and what makes it privacy-preserving?'
details:
  realistic_solution: 'Federated learning keeps raw data on each device/site and only transmits model updates (gradients or weight deltas) to a central aggregation server. The server averages these updates (FedAvg) and broadcasts the improved global model back. Privacy is preserved because the server never sees individual patient records — only aggregated statistical summaries of how the model should change. Each hospital trains locally on its own data, computes gradients, and sends only these gradients. The key insight is that gradients are lossy compressions of the training data — they encode ''which direction to adjust weights'' without revealing specific data points.'
  common_mistake: |
    **The Pitfall:** Believing gradients are perfectly private on their own.
    **The Rationale:** Candidates assume that because raw data isn't sent, no sensitive information leaks.
    **The Consequence:** Failing to realize that gradient inversion attacks can reconstruct training samples from shared gradients, necessitating differential privacy or secure aggregation.
  napkin_math: |
    - **Data Volume:** 10 hospitals × 1M records = 10M records (often Terabytes of data).
    - **Centralized Approach:** Moving all raw data across the network incurs massive bandwidth and privacy costs.
    - **Federated Approach:** Transmit only model updates (e.g., ~100MB per round).
    - **Result:** **TB of data transfer avoided per training round**.
