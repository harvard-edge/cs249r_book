title: Comparing forward-mode vs reverse-mode AD for Jacobian computation on H100
scenario: You are training a physics-informed neural network (PINN) that requires
  computing the full Jacobian of a 10-output model with respect to 3 spatial inputs
  (∂u/∂x, ∂u/∂y, ∂u/∂z) at every training step on H100. The model has 10M parameters.
  You need to choose between torch.func.jacfwd (forward-mode) and torch.func.jacrev
  (reverse-mode).
question: For a 10-output, 3-input PINN Jacobian on H100, should you use jacfwd or
  jacrev, and why?
details:
  realistic_solution: 'For Jacobian of shape (m outputs × n inputs): use jacfwd if
    n < m (forward-mode: n passes), use jacrev if m < n (reverse-mode: m passes).
    Here n=3 spatial inputs, m=10 outputs: use jacfwd with 3 tangent vectors. torch.func.jacfwd
    computes the full 10×3 Jacobian in 3 JVP (Jacobian-vector product) calls. jacrev
    would require 10 VJP calls. Speedup: 3/10 = 3× fewer passes.'
  common_mistake: Defaulting to reverse-mode AD (jacrev) even when the output dimension
    is much smaller than the input dimension, or using neither and instead manually
    running 10 separate backward passes. For Jacobian of shape (10 outputs × 3 spatial
    inputs), the correct choice is forward-mode (jacfwd) with 3 tangent vectors, not
    10 reverse passes.
  napkin_math: 'PINN training step: 10K collocation points. jacrev (10 passes): 10
    × 5ms/pass = 50ms. jacfwd (3 passes): 3 × 5ms/pass = 15ms. At 10K steps: (50-15)ms
    × 10K = 350 seconds saved per training run. On H100, full Jacobian computation
    with jacfwd: 15ms/step × 100K steps = 25 minutes for Jacobian computation alone.'
