title: The Core Motivation for Federated Learning
scenario: 'An automotive company wants to improve its driver assistance models using data from its global fleet of cars. They are considering two approaches: uploading all the raw sensor data to their cloud servers for centralized training, or using Federated Learning (FL) to train on the cars directly.'
question: 'From a privacy and data governance perspective, what is the primary motivation for using Federated Learning in this scenario?'
details:
  realistic_solution: 'The primary motivation for Federated Learning is to train a model on decentralized data without the raw data ever leaving the local device (the car, in this case). Only the model updates (gradients or weights) are sent to the central server. This preserves user privacy and helps comply with regulations like GDPR, as sensitive sensor data (e.g., camera footage, GPS logs) is not collected and stored centrally.'
  common_mistake: |
    **The Pitfall:** Confusing the primary goal (privacy) with secondary benefits like network cost reduction.
    **The Rationale:** Engineers assume FL's main purpose is to save bandwidth or improve accuracy.
    **The Consequence:** Misaligning architecture goals and potentially failing to strictly adhere to the data governance requirements that mandate FL in the first place.
  napkin_math: |
    - **Breach Cost:** Average cost of a data breach = ~$4.45M.
    - **Risk Probability:** Assume 1% chance of breach over 5 years.
    - **Expected Loss (Centralized):** 0.01 × $4,450,000 = **$44,500 expected risk**.
    - **Result:** Federated Learning drives this specific financial and trust risk toward zero by never centralizing raw data.
  options:
  - It is primarily used to save on network costs by sending small model updates instead of large raw data files.
  - It results in more accurate models than centralized training because the on-device data is more timely.
  - It allows model training on sensitive user data without that data having to be moved to a central server.
  - It speeds up overall model training time by using the distributed compute power of the car fleet.
  correct_index: 2
