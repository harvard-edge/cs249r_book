title: The Core Motivation for Federated Learning
scenario: 'An automotive company considers uploading raw sensor data to cloud servers or using Federated Learning to train on cars directly.'
question: 'From a privacy perspective, what is the primary motivation for Federated Learning?'
details:
  realistic_solution: 'Federated Learning trains decentralized models without raw data ever leaving the local device. Only gradients/weights are sent, preserving privacy and complying with GDPR.'
  common_mistake: |
    **The Pitfall:** Confusing the primary privacy goal with secondary bandwidth benefits.
    **The Rationale:** Engineers assume FL's main purpose is to save network costs.
    **The Consequence:** Misaligning architecture and failing strict data governance requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Breach Cost: ~$4.45M.
       - Risk Probability: 1%.
    2. **Calculations:**
       - Expected Loss: 0.01 * $4,450,000 = $44,500 risk.
    3. **Conclusion & Interpretation:**
       - **Result: Risk drops to $0 via decentralization.**
       - **Conclusion: Privacy-Bound; FL solves fundamental compliance constraints, not just technical ones.**