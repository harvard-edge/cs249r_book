title: Optimizing LLM Pipeline Parallelism on NVIDIA H100 Cluster
scenario: 'Your team is deploying a terabyte-scale Mixture-of-Experts (MoE) Large Language Model for real-time inference using pipeline parallelism across 8 H100 GPUs (80 GB HBM3, 989 TFLOPS FP16, 3.35 TB/s).'
question: 'How would you schedule an 8-stage H100 pipeline for a terabyte-scale MoE model to minimize bubbles and exploit compute and bandwidth?'
details:
  realistic_solution: 'The most realistic solution involves implementing an interleaved pipeline schedule with aggressive micro-batching. The key is to select a micro-batch size where computation time per micro-batch is roughly balanced with communication time between stages, exploiting the H100 bandwidth. Overlapping communication and computation is crucial to mask latency.'
  common_mistake: |
    **The Pitfall:** Using a naive GPipe schedule without micro-batching.
    **The Rationale:** Simple to implement, but ignores the massive compute capabilities of the H100.
    **The Consequence:** Massive pipeline bubbles where the 989 TFLOPS GPUs sit completely idle waiting for data from previous stages.
  napkin_math: |
    - **Bandwidth Math:** Intermediate tensor = 10GB. At 3.35 TB/s, communication takes ~3ms.
    - **Compute Ratio:** If a micro-batch computes for 100ms, communication is easily hidden.
    - **Bottleneck Threat:** If compute drops to 5ms, the 3ms communication becomes a massive bottleneck.
    - **Balance:** Size the micro-batch such that Compute Time (FLOPs / 989 TFLOPS) cleanly overlaps with Comm Time (Bytes / 3.35 TB/s).
