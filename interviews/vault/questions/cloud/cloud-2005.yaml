title: Edge Telemetry Aggregation for High-Throughput Inference
scenario: You manage an ML inference cluster processing 100,000 requests per second (with an average error rate of 0.5%). Each request generates 2KB of raw telemetry data (features, predictions, latencies). Sending all raw telemetry to your central observability platform requires 200 MB/s of network egress, which is bottlenecking your network and driving up costs.
question: What total egress bandwidth results from keeping 100% of errors, sampling 1% of successes, and sending 100 KB/s of metrics?
details:
  realistic_solution: Deploy a local telemetry agent (like OpenTelemetry Collector) on each edge node to calculate aggregated metrics (histograms) locally. Use tail-based sampling to retain 100% of error traces and 1% of successful traces, dropping the rest of the raw payloads.
  common_mistake: |
    **The Pitfall:** Streaming 100% of raw request logs to a central server.
    **The Rationale:** Engineers assume all data must be centralized before analysis or apply uniform random sampling which drops rare but critical failure traces.
    **The Consequence:** Saturating network egress and spiking ingestion costs unnecessarily.
  napkin_math: |
    1. **Raw bandwidth:** 100,000 req/s * 2KB = 200 MB/s.
    2. **Errors (kept 100%):** 500 req/s * 2KB = 1 MB/s.
    3. **Successes (sampled 1%):** 99,500 req/s * 0.01 * 2KB = 1.99 MB/s.
    4. **Metrics:** 0.1 MB/s.
    5. **Result:** **Total egress = 1 + 1.99 + 0.1 = 3.09 MB/s (a 98.4% reduction in bandwidth).**
