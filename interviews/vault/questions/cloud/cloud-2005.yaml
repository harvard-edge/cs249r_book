title: Edge Telemetry Aggregation for High-Throughput Inference
scenario: You manage an ML inference cluster processing 100,000 requests per second. Each request generates
  2KB of raw telemetry data (features, predictions, latencies). Sending all raw telemetry to your central
  observability platform requires 200 MB/s of network egress, which is bottlenecking your network and
  driving up costs. Calculate the resulting bandwidth if you implement edge telemetry aggregation that
  retains 100% of logs for errors (assuming a 0.5% error rate), samples 1% of successful request logs,
  and sends lightweight aggregated metrics (e.g., counters, histograms) that consume roughly 100 KB/s
  in total.
details:
  realistic_solution: Deploy a local telemetry agent (like OpenTelemetry Collector) on each edge node
    to calculate aggregated metrics (histograms) locally. Use tail-based sampling to retain 100% of error
    traces and 1% of successful traces, dropping the rest of the raw payloads.
  common_mistake: Attempting to stream 100% of raw request logs to a central server, which saturates network
    egress and spikes ingestion costs, or applying uniform random sampling which drops rare but critical
    failure traces.
  napkin_math: Raw bandwidth = 100,000 req/s * 2KB = 200 MB/s. Errors (kept 100%) = 500 req/s * 2KB =
    1 MB/s. Successes (sampled 1%) = 99,500 req/s * 0.01 * 2KB = 1.99 MB/s. Metrics = 0.1 MB/s. Total
    egress = 1 + 1.99 + 0.1 = 3.09 MB/s (a 98.4% reduction in bandwidth).
