title: Realizing Cluster Autoscaler Behavior with GPU Node Groups
scenario: A cloud ML team enables Kubernetes Cluster Autoscaler on an AWS EKS cluster
  with a GPU node group (p4d.24xlarge, 8× A100 80 GB, 400 W each). They expect the
  autoscaler to provision a new node within 2 minutes when a GPU pod is pending. After
  deploying, they observe nodes taking 8–12 minutes to join. Trace what actually happens
  during node provisioning and explain the delay.
question: Why do GPU nodes in the EKS cluster take 8–12 minutes to join after a pod
  goes pending, and what steps make up that delay?
details:
  realistic_solution: 'The 8–12 min breakdown: CA scan loop (10–30 s) + EC2 instance
    launch API call (30–60 s) + instance boot (2–3 min) + kubelet registration + CNI
    plugin initialization (1–2 min) + NVIDIA device plugin pod startup and GPU enumeration
    (1–2 min) + container image pull for training workload (1–3 min for large images).
    Total: 6–11 min is expected for p4d.24xlarge. Mitigate with pre-warmed node pools
    (keep 1 node in standby) and pre-pulled images via DaemonSet. Use Karpenter instead
    of CA for faster launch loops (~1 min improvement via direct EC2 Fleet API calls).'
  common_mistake: Conflating Cluster Autoscaler's decision time (~30 s) with EC2 instance
    launch time; assuming 'autoscaler triggered' equals 'node ready.'
  napkin_math: 'p4d.24xlarge: 8 × A100 × 400 W = 3.2 kW per idle standby node. Monthly
    standby cost: 3.2 kW × 720 hr × $0.12/kWh ≈ $276 electricity + ~$9.83/hr instance
    = $7,080/month per warm standby node. Trade-off: pay $7,080/month to eliminate
    8-min cold-start latency for bursty training jobs.'
