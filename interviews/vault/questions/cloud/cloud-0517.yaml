title: The Data Pipeline Determinism Trap
scenario: You have a PyTorch training pipeline. You set `torch.manual_seed(42)`, `np.random.seed(42)`,
  and `random.seed(42)`. You train a model twice on the exact same dataset on the exact same machine.
  The loss curves diverge after the first epoch. What standard PyTorch `DataLoader` argument completely
  destroys your random seed determinism, and why?
details:
  realistic_solution: 'The culprit is `num_workers > 0`. With multiple DataLoader workers, each worker
    is a separate OS process with its own random state. Even though you seeded the main process, the workers
    race to fill the prefetch queue, and the OS scheduler determines which worker delivers its batch first.
    This delivery order is non-deterministic across runs. Combined with `shuffle=True`, the GPU sees different
    batch orderings each run, causing loss curves to diverge. The fix: use a `worker_init_fn` that seeds
    each worker deterministically and set `persistent_workers=True`.'
  common_mistake: '"GPU floating-point math is non-deterministic." While GPU atomics can introduce slight
    variations, complete loss curve divergence after epoch 1 points directly to the data loading order.'
  napkin_math: In an epoch of 1,000,000 images, 4 workers are racing to deliver 31,250 batches of 32.
    The combinatorial explosion of possible delivery interleavings guarantees the GPU will never see the
    exact same sequence of batches twice across different runs.
