title: The Data Pipeline Determinism Trap
scenario: You have a PyTorch training pipeline. You set `torch.manual_seed(42)`, `np.random.seed(42)`, and `random.seed(42)`. You train a model twice on the exact same dataset on the exact same machine. The loss curves diverge after the first epoch.
question: What standard PyTorch `DataLoader` argument completely destroys your random seed determinism, and why?
details:
  realistic_solution: 'The culprit is `num_workers > 0`. With multiple DataLoader workers, each worker is a separate OS process with its own random state. Even though you seeded the main process, the workers race to fill the prefetch queue, and the OS scheduler determines which worker delivers its batch first. This delivery order is non-deterministic across runs. Combined with `shuffle=True`, the GPU sees different batch orderings each run, causing loss curves to diverge. The fix: use a `worker_init_fn` that seeds each worker deterministically and set `persistent_workers=True`.'
  common_mistake: |
    **The Pitfall:** Blaming GPU floating-point math non-determinism.
    **The Rationale:** Candidates know GPUs have atomic add non-determinism and over-apply this to all reproducibility issues.
    **The Consequence:** Wasting time trying to force deterministic algorithms on the GPU instead of fixing the data loading pipeline.
  napkin_math: |
    - 1. Consider an epoch of 1,000,000 images with batch size 32.
    - 2. Calculate total batches: 1,000,000 / 32 = 31,250 batches.
    - 3. With 4 workers, each processes ~7,812 batches asynchronously.
    - 4. Result: The OS scheduler interleaves these batches unpredictably, ensuring the GPU sees a **non-deterministic sequence of batches** across runs.
