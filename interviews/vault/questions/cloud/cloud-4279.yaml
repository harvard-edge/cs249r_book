title: Multi-Adapter Batching and Shared Base Model
scenario: Your serving system hosts 50 different LoRA adapters (rank-16) on top of
  a shared 13B base model. Design the memory layout and batching strategy for serving
  multiple adapters concurrently.
question: How would you lay out memory and batch requests for 50 rank-16 LoRA adapters
  sharing one 13B base model?
details:
  realistic_solution: 'Share the base model: one 13B BF16 copy = 26 GB. All 50 rank-16
    adapters: 50 × (2 × 16 × 5120 × 40 layers × 2B) = 50 × 105 MB = 5.25 GB. Total:
    26 + 5.25 = 31.25 GB — fits on one H100. For batching, group requests by adapter
    (adapter-aware batching): requests using the same adapter are batched together
    to avoid adapter switching overhead between tokens. Use S-LoRA-style paged adapter
    management for adapters not fitting in GPU memory.'
  common_mistake: Loading each adapter separately with its own copy of the base model
    weights. This requires 50 × 26 GB = 1.3 TB — impossible on any single node.
  napkin_math: '13B base BF16: 26 GB. Rank-16 adapter: 2 × 16 × 5120 × 40 = 6.5M params
    × 2B = 13 MB per adapter. 50 adapters: 650 MB. Total: 26.65 GB on H100 80 GB —
    53 GB free for KV cache. KV cache per request: 40 layers × 2 × 5120 × seq_len
    × 2B. At seq=4096: 40 × 2 × 5120 × 4096 × 2B = 3.3 GB/request → ~16 concurrent
    requests in remaining memory.'
