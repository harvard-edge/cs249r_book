title: DP-SGD and Privacy Budget on AMD MI300X
scenario: Imagine you are deploying a confidential machine learning model trained with DP-SGD on an AMD MI300X accelerator. Your task is to ensure the privacy guarantees are met while maximizing model utility.
question: How does the epsilon privacy budget affect DP-SGD noise and model accuracy on the MI300X?
details:
  realistic_solution: Implement a rigorous privacy accounting mechanism, such as RDP (Renyi Differential Privacy), to track the cumulative privacy loss (epsilon, delta) across all training steps. Dynamically adjust the noise scale based on the desired privacy budget and the sensitivity of the gradients, ensuring optimal utility while adhering to the specified privacy guarantees. Leverage the high memory bandwidth of the AMD MI300X to efficiently handle the noise addition and gradient computations.
  common_mistake: |
    **The Pitfall:** Ignoring the cumulative nature of privacy budgets.
    **The Rationale:** Candidates sometimes treat each training step's privacy loss independently rather than cumulatively.
    **The Consequence:** This leads to either an overestimation of privacy loss or an insufficient allocation of noise, compromising the mathematical privacy guarantees over multiple epochs.
  napkin_math: |
    - A single DP-SGD update adds Gaussian noise with standard deviation σ to gradients, given L2 clip norm C.
    - The privacy loss per step is roughly proportional to C² / σ².
    - To halve the privacy budget (epsilon) for the same number of steps, you generally need to increase σ.
    - **Increasing σ adds more noise, which directly degrades model utility.**
