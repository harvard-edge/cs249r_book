title: The RAG Latency Trap
scenario: You're designing a Retrieval-Augmented Generation (RAG) system for a real-time chatbot. To ground the LLM's response, you need to fetch a document chunk.
question: Roughly how much slower is retrieving that chunk from a local NVMe SSD compared to fetching it from an in-memory cache stored in HBM?
details:
  realistic_solution: 'An NVMe SSD read is approximately 333 times slower than an HBM access. This huge performance gap is fundamental to ML systems design. For a P99 latency target of 100ms, you cannot afford to go to disk. The RAG context must be served from an in-memory system.'
  common_mistake: |
    **The Pitfall:** Underestimating the storage hierarchy gap.
    **The Rationale:** Engineers often think SSDs are 'fast' and maybe only 10-50x slower than HBM.
    **The Consequence:** They fail to internalize that for a GPU, any I/O operation that leaves the memory subsystem is an eternity, making disk-based lookups totally infeasible for low-latency serving without aggressive caching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - HBM read latency is ~300ns.
       - Local NVMe SSD read latency is ~100us (100,000ns).
    2. **Calculations:**
       - Latency ratio = 100,000ns / 300ns = 333.3x.
    3. **Conclusion & Interpretation:**
       - **Result: 333x latency disparity. The RAG system is I/O-Bound if relying on NVMe, making HBM/DRAM caching mandatory for real-time SLAs.**
  options:
  - ~17x slower (miscalculating based on 5 GB/s vs 80 GB/s throughput instead of latency).
  - ~333x slower
  - ~100,000x slower (conflating microseconds with nanoseconds).
  - ~5,000x slower
  correct_index: 1
