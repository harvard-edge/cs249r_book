title: The Quantization Error Budget
scenario: You're quantizing a 7B model from FP16 to INT4 (4-bit integers with group-wise scaling, group
  size 128). Your team says 'it's just rounding — the error is tiny.' Calculate the worst-case quantization
  error per group and explain when this error becomes catastrophic.
details:
  realistic_solution: 'INT4 symmetric quantization maps the range $[-\text{absmax}, +\text{absmax}]$ to
    16 levels (4-bit signed: -8 to +7). The step size is $\Delta = 2 \times \text{absmax} / 15$. The maximum
    rounding error per weight is $\Delta/2$. The problem: if a group of 128 weights has one outlier 10×
    larger than the rest, the step size is set by the outlier, and all other weights are quantized with
    a step size 10× too coarse. This is the **outlier channel** problem that makes naive INT4 fail on
    LLMs.'
  common_mistake: '"INT4 has 16 levels, so the error is at most 1/16 of the range — negligible." This
    ignores how outlier weights interact with uniform quantization.'
  napkin_math: 'Typical weight distribution: 99% of weights in $[-0.1, 0.1]$, but 1% outliers at $[-1.0,
    1.0]$. Without outliers: $\Delta = 2 \times 0.1 / 15 = 0.013$, max error = 0.0067 → 6.7% relative
    error. With one outlier at 1.0: $\Delta = 2 \times 1.0 / 15 = 0.133$, max error = 0.067 → **67% relative
    error** for the majority of weights. Group quantization (group=128) limits the blast radius: only
    128 weights share one scale factor. GPTQ/AWQ solve this by reordering weights so outliers are isolated,
    or using mixed-precision (FP16 for outlier channels, INT8 for the rest). Compute impact: INT4 on H100
    Tensor Cores = 1,979 TOPS vs 989 TFLOPS FP16 → 2× throughput if quantization error is controlled.'
