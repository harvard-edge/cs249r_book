title: DVFS Power Cap for High-Density GPU Clusters
scenario: >-
  You are managing a cluster of 8x NVIDIA A100 GPUs training a transformer model. Due to cooling
  constraints in a high-density rack, the maximum allowable power draw per GPU is capped at 300W instead
  of the standard 400W TDP. You must apply Dynamic Voltage and Frequency Scaling (DVFS) to meet this constraint.
  Assume dynamic power P ∝ V²f dominates, and voltage V scales linearly with frequency f in this operating regime.
question: >-
  What percentage reduction in clock frequency is needed to cap each A100 at 300W, and how much does theoretical throughput drop?
details:
  realistic_solution: 'Recognize that dynamic power scales with the cube of frequency (P ∝ f³) when voltage scales linearly with frequency. To achieve a 25% power reduction (300W / 400W), the frequency must be reduced by the cube root of 0.75. This results in only a ~9.1% drop in frequency, meaning compute throughput is also only reduced by ~9.1% while safely meeting the strict thermal constraints.'
  common_mistake: |
    **The Pitfall:** Assuming power scales linearly with frequency.
    **The Rationale:** Candidates forget the P ∝ V²f relationship and that voltage scales with frequency, leading to the incorrect conclusion that a 25% power reduction requires a 25% frequency reduction.
    **The Consequence:** Drastically overestimating the throughput loss (25% instead of ~9%) when capping power.
  napkin_math: |
    1. **Power ratio:** P_target / P_max = 300W / 400W = 0.75.
    2. **Frequency scaling:** Since P ∝ f³, f_target / f_max = ∛0.75 ≈ 0.9085.
    3. **Frequency reduction:** 1 - 0.9085 = 9.15%.
    4. **Throughput drop:** Throughput ∝ f, so throughput drops by **9.15%.**
