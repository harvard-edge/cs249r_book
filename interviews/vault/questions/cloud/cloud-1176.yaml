title: DVFS Power Cap for High-Density GPU Clusters
scenario: You are managing a cluster of 8x GPUs training a transformer model. Due to cooling constraints, the maximum allowable power draw per GPU is capped at 300W instead of the standard 400W TDP. You must apply Dynamic Voltage and Frequency Scaling (DVFS).
question: What percentage reduction in clock frequency is needed to cap each GPU at 300W, and how much does theoretical throughput drop?
details:
  realistic_solution: 'Recognize that dynamic power scales with the cube of frequency (P ∝ f³) when voltage scales linearly with frequency. To achieve a 25% power reduction (300W / 400W), the frequency must be reduced by the cube root of 0.75. This results in only a ~9.1% drop in frequency, meaning compute throughput is also only reduced by ~9.1% while safely meeting the strict thermal constraints.'
  common_mistake: |
    **The Pitfall:** Assuming power scales linearly with frequency.
    **The Rationale:** Candidates forget the P ∝ V²f relationship and that voltage scales with frequency.
    **The Consequence:** Drastically overestimating the throughput loss (predicting 25% instead of ~9%) when enforcing thermal power caps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Power (P_target): 300W.
    - Max Power (P_max): 400W.
    - Relationship: Power scales cubically with frequency (P ∝ f³).

    **Calculations:**
    - Power ratio: 300 / 400 = 0.75.
    - Frequency scaling: f_target / f_max = cube_root(0.75) = ~0.9085.
    - Frequency reduction: 1.0 - 0.9085 = 0.0915 (9.15%).

    **Conclusion & Interpretation:**
    - **Result: 9.15% Drop (Power-Bound)**. A massive 25% reduction in power consumption costs only a 9.15% drop in compute throughput, highlighting the extreme efficiency of DVFS tuning.
