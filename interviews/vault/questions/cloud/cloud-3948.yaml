title: Ring AllReduce Latency Model and Bandwidth Saturation Analysis
scenario: 'Derive the time complexity of ring AllReduce for N GPUs communicating M
  bytes. Explain why ring AllReduce achieves near-optimal bandwidth utilization and
  how this relates to overlap: shorter AllReduce makes overlap easier.'
question: What is the time complexity of ring AllReduce for N GPUs and M bytes, and
  why does it help communication overlap?
details:
  realistic_solution: 'Ring AllReduce: two phases. (1) ReduceScatter: each GPU sends
    M/N bytes to the next GPU in the ring, N-1 times. Time = (N-1) x M/(N x B) where
    B is per-link bandwidth. (2) AllGather: same structure, (N-1) x M/(N x B). Total:
    2(N-1)/N x M/B. As N grows, 2(N-1)/N approaches 2, so total time approaches 2M/B
    — independent of N. This means ring AllReduce scales nearly perfectly with GPU
    count. Bandwidth utilization: each link transfers M(N-1)/N bytes total ≈ M bytes,
    achieving ~100% of link bandwidth. For overlap: this predictable O(M/B) time makes
    it easy to size gradient buckets to match backward pass duration.'
  common_mistake: Stating AllReduce time = M/B (naive, as if one GPU sends all data).
    Ring AllReduce splits the work across all GPUs, achieving nearly bandwidth-optimal
    communication.
  napkin_math: '8 H100s, NVLink 450 GB/s per direction. M = 1GB gradients. Ring AllReduce:
    2 x 7/8 x 1GB / 450 = 3.9ms. Compare to naive broadcast: 7 x 1GB / 450 = 15.6ms.
    Ring is 4x more efficient. For overlap: 3.9ms fits easily in a 200ms backward
    pass.'
