title: The Interconnect Latency Ladder (cloud-0364)
scenario: When building a large-scale ML training cluster, you need to move data between GPUs. Some GPUs are in the same server, and some are in different racks.
question: "Which technology provides the lowest latency for direct GPU-to-GPU communication within the same server?"
details:
  realistic_solution: NVLink 4.0 is the correct answer. It is a proprietary NVIDIA interconnect designed specifically for high-bandwidth, low-latency communication directly between GPUs within a single node (e.g., an HGX H100). Its latency is significantly lower than PCIe (the general system bus) and an order of magnitude lower than InfiniBand, which is a high-performance network fabric used for communication *between* servers.
  common_mistake: |
    **The Pitfall:** Engineers often confuse inter-server networking fabrics (like InfiniBand) with intra-server, chip-to-chip interconnects (like NVLink).
    **The Rationale:** They might assume the "network" is always the fastest path, failing to account for the specialized, high-speed bus designed specifically for multi-GPU systems, or assume the main system bus (PCIe) is the fastest link.
    **The Consequence:** Incorrect hardware architecture design leading to suboptimal intra-node communication speeds.
  napkin_math: |
    * **NVLink 4.0 Latency:** ~500 ns.
    * **PCIe Gen5 Latency:** ~1,000 ns (1 µs).
    * **InfiniBand (cross-rack):** ~5,000 ns (5 µs).
    * **NVLink provides the lowest latency for intra-node communication, being twice as fast as PCIe and 10x faster than InfiniBand.**
  options:
  - InfiniBand NDR
  - PCIe Gen5
  - NVLink 4.0
  - Cross-country Fiber
  correct_index: 2
