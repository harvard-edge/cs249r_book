title: The Interconnect Latency Ladder (cloud-0364)
scenario: When building a large-scale ML training cluster, you need to move data between GPUs. Some GPUs are in the same server, and some are in different racks.
question: Which technology provides the lowest latency for direct GPU-to-GPU communication within the same server?
details:
  realistic_solution: 'NVLink 4.0 is the correct answer. It is a proprietary NVIDIA interconnect designed specifically for high-bandwidth, low-latency communication directly between GPUs within a single node. Its latency is significantly lower than PCIe and an order of magnitude lower than InfiniBand.'
  common_mistake: |
    **The Pitfall:** Engineers often confuse inter-server networking fabrics (like InfiniBand) with intra-server, chip-to-chip interconnects (like NVLink).
    **The Rationale:** They might assume the "network" is always the fastest path, failing to account for specialized multi-GPU buses.
    **The Consequence:** Incorrect hardware architecture design leading to suboptimal intra-node communication speeds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVLink 4.0 Latency: ~500 ns.
       - PCIe Gen5 Latency: ~1,000 ns (1 µs).
       - InfiniBand (cross-rack): ~5,000 ns (5 µs).
    2. **Calculations:**
       - NVLink vs PCIe latency ratio: 1000 / 500 = 2x faster.
       - NVLink vs InfiniBand latency ratio: 5000 / 500 = 10x faster.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound. NVLink provides the lowest latency for intra-node communication, being twice as fast as PCIe and 10x faster than InfiniBand.**
  options:
  - InfiniBand NDR
  - PCIe Gen5
  - NVLink 4.0
  - Cross-country Fiber
