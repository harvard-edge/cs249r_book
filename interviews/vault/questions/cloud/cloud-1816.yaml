title: Latency SLAs for Real-Time Saliency Maps
scenario: Your team is adding explainability to a cloud-based image classification service running on
  NVIDIA T4 GPUs. The model currently takes 8ms for a forward pass. The product requirement demands a
  strict latency SLA of < 30ms per request. A junior engineer proposes using Integrated Gradients with
  50 steps to generate feature attributions for every request. Calculate the latency of the proposed method
  and explain why a vanilla Saliency Map is necessary to meet the SLA.
question: "What latency would 50-step Integrated Gradients add, and why should you use a vanilla Saliency Map to meet the 30ms SLA?"
details:
  realistic_solution: Replace Integrated Gradients with a vanilla Saliency Map, which calculates the gradient
    of the output with respect to the input using only a single forward and backward pass, keeping latency
    within the 30ms budget.
  common_mistake: Failing to account for the multiplicative latency cost of multi-step explainability
    methods like Integrated Gradients in real-time production environments.
  napkin_math: Assume backward pass takes ~2x forward pass (16ms). Integrated Gradients (50 steps) latency
    = 50 * (8ms + 16ms) = 1200ms. Vanilla Saliency Map latency = 1 forward (8ms) + 1 backward (16ms) =
    24ms. 24ms < 30ms SLA.
