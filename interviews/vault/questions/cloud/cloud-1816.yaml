title: Latency SLAs for Real-Time Saliency Maps
scenario: Your team is adding explainability to a cloud-based image classification service. The model currently takes 8ms for a forward pass. The product requirement demands a strict latency SLA of < 30ms per request. A junior engineer proposes using Integrated Gradients with 50 steps to generate feature attributions for every request.
question: What latency would 50-step Integrated Gradients add, and why should you use a vanilla Saliency Map to meet the 30ms SLA?
details:
  realistic_solution: Replace Integrated Gradients with a vanilla Saliency Map, which calculates the gradient of the output with respect to the input using only a single forward and backward pass, keeping latency within the 30ms budget.
  common_mistake: |
    **The Pitfall:** Failing to account for the multiplicative latency cost of multi-step explainability methods.
    **The Rationale:** Candidates choose the most advanced or mathematically rigorous algorithm (Integrated Gradients) without calculating the real-time production overhead.
    **The Consequence:** Designing an architecture that misses the latency SLA by a factor of 40x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA: < 30 ms.
       - Forward Pass: 8 ms.
       - Backward Pass: ~16 ms (approx 2x forward).
    2. **Calculations:**
       - Integrated Gradients Latency: 50 steps * (8 + 16) = 1,200 ms.
       - Saliency Map Latency: 1 step * (8 + 16) = 24 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** 1,200 ms wildly violates the 30 ms SLA. Saliency Map mathematically fits the budget.
