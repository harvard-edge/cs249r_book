title: Rack-Level Thermal Colocation
scenario: 'Your infrastructure has 15 kW power limits per rack. You run two workloads: LLM inference (memory-bandwidth
  bound, low Tensor Core utilization, draws 350W/GPU) and offline batched MatMuls (compute-bound, heavily
  utilizes Tensor Cores, draws 650W/GPU). A standard node has 8 GPUs and uses ~2 kW of host overhead.
  Propose a scheduling strategy to maximize rack utilization without tripping the 15 kW breakers.'
details:
  realistic_solution: 'If you deploy homogeneous compute-bound nodes, a single node draws (8 * 650W) +
    2000W = 7.2 kW. You can only fit two nodes (14.4 kW) per 15 kW rack. If you deploy inference nodes,
    a node draws (8 * 350W) + 2000W = 4.8 kW. You could fit three nodes (14.4 kW). To maximize data center
    throughput and rack density, you should implement spatial workload colocation: scheduling a mix of
    memory-bound and compute-bound workloads on the *same* node or within the *same* rack. By pairing
    workloads that stress different hardware components (HBM vs. SMs), you smooth out the power draw.
    The optimal tradeoff involves accepting higher scheduling complexity (orchestrating Kubernetes to
    bin-pack pods based on real-time power profiles rather than just CPU/RAM) to achieve higher hardware
    density and lower TCO.'
  common_mistake: Provisioning racks homogeneously based on the worst-case TDP (650W), resulting in only
    1 node per rack and severely underutilizing the facility footprint.
  napkin_math: 'Compute node (8 × 650 W + 2 kW host) = 7.2 kW. Inference node (8 × 350 W + 2 kW host)
    = 4.8 kW. Homogeneous compute: 2 nodes = 14.4 kW, 16 GPUs. Homogeneous inference: 3 nodes = 14.4 kW,
    24 GPUs. Mixed rack: 1 compute node (7.2 kW) + 1 inference node (4.8 kW) = 12.0 kW, 16 GPUs with 3
    kW headroom. This serves both workload types from one rack. Better: dynamic power-aware scheduling.
    When compute jobs finish, those GPUs shift to inference workload (350 W), dropping the node from 7.2
    kW to 4.8 kW. This frees power budget for bursting other nodes. Peak: 2 × 7.2 = 14.4 kW (16 compute
    GPUs). Off-peak: 2 × 4.8 = 9.6 kW (16 inference GPUs) with 5.4 kW headroom for a 3rd partial node.
    Time-multiplexing power budgets across workload phases is more effective than static mixed allocation.'
