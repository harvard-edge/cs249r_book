title: Rack-Level Thermal Colocation
scenario: 'Your infrastructure has 15 kW power limits per rack. You run two workloads: LLM inference (memory-bandwidth bound, low Tensor Core utilization, draws 350W/GPU) and offline batched MatMuls (compute-bound, heavily utilizes Tensor Cores, draws 650W/GPU). A standard node has 8 GPUs and uses ~2 kW of host overhead.'
question: "How would you schedule memory-bound inference and compute-bound MatMul workloads to maximize 15kW rack utilization?"
details:
  realistic_solution: 'If you deploy homogeneous compute-bound nodes, a single node draws (8 * 650W) + 2000W = 7.2 kW. You can only fit two nodes (14.4 kW) per 15 kW rack. If you deploy inference nodes, a node draws (8 * 350W) + 2000W = 4.8 kW. You could fit three nodes (14.4 kW). To maximize data center throughput and rack density, you should install three nodes (24 GPUs) per rack and implement dynamic power-capping at the cluster level. Instead of statically assigning nodes to compute or inference, dynamically adjust the power limits. If 1 node bursts to compute (7.2 kW), cap the other two nodes at 3.9 kW each to stay under the 15 kW limit. This slight throttling of the inference nodes allows you to safely achieve 24 GPUs per rack (a 50% density increase over static compute racks) while fully utilizing the 15 kW power budget.'
  common_mistake: |
    **The Pitfall:** Provisioning racks homogeneously based on the worst-case TDP (650W).
    **The Rationale:** This results in only 1 node per rack, severely underutilizing the facility footprint for mixed workloads.
    **The Consequence:** Wasting datacenter power budget and physical space.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack limit: 15 kW.
       - Compute node: 8 * 650W + 2000W = 7.2 kW.
       - Inference node: 8 * 350W + 2000W = 4.8 kW.
    2. **Calculations:**
       - Mixed static rack (1 compute + 2 inference): 16.8 kW (exceeds 15 kW limit).
       - Dynamic rack (3 inference base state): 3 * 4.8 kW = 14.4 kW.
       - Dynamic burst (1 compute at 7.2 kW): Leaves 7.8 kW for 2 inference nodes (3.9 kW each).
       - Throttled inference GPUs: (3.9 kW - 2 kW host) / 8 = 237 W/GPU.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound Density**. Dynamic power capping enables 24 GPUs per rack (3 nodes) by slightly throttling inference nodes during compute bursts.
