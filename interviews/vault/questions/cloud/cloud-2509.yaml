title: Rack-Level Thermal Colocation
scenario: 'Your infrastructure has 15 kW power limits per rack. You run two workloads: LLM inference (memory-bandwidth
  bound, low Tensor Core utilization, draws 350W/GPU) and offline batched MatMuls (compute-bound, heavily
  utilizes Tensor Cores, draws 650W/GPU). A standard node has 8 GPUs and uses ~2 kW of host overhead.
  Propose a scheduling strategy to maximize rack utilization without tripping the 15 kW breakers.'
question: "How would you schedule memory-bound inference and compute-bound MatMul workloads to maximize 15kW rack utilization?"
details:
  realistic_solution: 'If you deploy homogeneous compute-bound nodes, a single node draws (8 * 650W) +
    2000W = 7.2 kW. You can only fit two nodes (14.4 kW) per 15 kW rack. If you deploy inference nodes,
    a node draws (8 * 350W) + 2000W = 4.8 kW. You could fit three nodes (14.4 kW). To maximize data center
    throughput and rack density, you should install three nodes (24 GPUs) per rack and implement dynamic power-capping at the cluster level. Instead of statically assigning nodes to compute or inference, dynamically adjust the power limits. If 1 node bursts to compute (7.2 kW), cap the other two nodes at 3.9 kW each to stay under the 15 kW limit. This slight throttling of the inference nodes allows you to safely achieve 24 GPUs per rack (a 50% density increase over static compute racks) while fully utilizing the 15 kW power budget.'
  common_mistake: Provisioning racks homogeneously based on the worst-case TDP (650W), resulting in only
    1 node per rack and severely underutilizing the facility footprint.
  napkin_math: 'Compute node = 7.2 kW. Inference node = 4.8 kW. Homogeneous compute: 2 nodes = 14.4 kW (16 GPUs). Homogeneous inference: 3 nodes = 14.4 kW (24 GPUs). Mixed static rack with 1 compute + 2 inference = 16.8 kW (exceeds 15 kW limit). Dynamic strategy: deploy 3 nodes. Base state (3 inference nodes): 3 × 4.8 = 14.4 kW. Burst state (1 compute + 2 inference): The compute node draws 7.2 kW. The remaining 7.8 kW is split between the 2 inference nodes (3.9 kW each). Since host overhead is 2 kW, the 8 GPUs on those nodes share 1.9 kW (237 W/GPU). This causes a minor inference slowdown but safely supports 24 GPUs per rack.'
