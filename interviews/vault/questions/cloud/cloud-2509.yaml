validation_issues_pro:
- The napkin math for the proposed solution is incorrect; a combination of '2 mixed + 1 inference' nodes
  would draw 16.8 kW, exceeding the 15 kW rack limit.
- With the given numbers, the proposed 'mixed node' strategy does not actually improve GPU density per
  rack over a homogeneous inference node strategy.
