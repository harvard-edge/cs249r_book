title: Implementing Semantic Caching for RAG on H100 to Reduce LLM Calls
scenario: A RAG system processes 50,000 queries/day. LLM generation costs $0.03/query = $1,500/day. Query analysis shows 35% of queries are semantically near-duplicate (cosine similarity > 0.95 with a prior query within 24 hours).
question: How would you design a semantic cache for the 50,000-query/day RAG system, and how should it invalidate entries after 6-hour KB updates?
details:
  realistic_solution: 'Deploy a Redis vector store with HNSW index for sub-millisecond similarity search. Cache key: query embedding (384-dim float32 = 1.5KB). Cache value: full response + retrieval metadata + timestamp + knowledge_base_version. Invalidation: tag each cached response with KB version hash; on 6-hour KB update, batch-invalidate all responses tagged with prior version. Warm the cache by pre-embedding the top-1000 most frequent query clusters. Hit rate target: 35% semantic hits.'
  common_mistake: |
    **The Pitfall:** Using exact-match string caching instead of semantic caching, and failing to implement KB version invalidation.
    **The Rationale:** Candidates often default to traditional exact-match caching strategies which fail on minor semantic variations in natural language, and forget that RAG systems depend on dynamic external knowledge.
    **The Consequence:** Achieving only a 2-3% cache hit rate instead of 35%, missing significant cost savings, and serving dangerously stale answers after the knowledge base updates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily queries: 50,000. Semantic hit rate: 35%.
       - LLM generation: $0.03/query (300ms latency).
       - Cache cost: ~$200/month (100GB Redis).
       - Cache latency: 7ms (5ms embedding + 2ms HNSW search).
    2. **Calculations:**
       - Semantic hits: 50,000 * 0.35 = 17,500 queries/day.
       - LLM savings: 17,500 * $0.03 = $525/day = $15,750/month.
       - Net savings: $15,750 - $200 = $15,550/month.
       - Latency improvement: (300 - 7) / 300 = 97.7%.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound.** Latency improves by 97.7% on hits while saving over $15,000 per month.
