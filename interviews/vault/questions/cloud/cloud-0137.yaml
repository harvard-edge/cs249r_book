title: The LLM Metrics
scenario: Our users are complaining the LLM feels 'laggy', but our monitoring shows 'Average Latency'
  is well under our 2-second SLO. What specific generation metrics are we failing to monitor?
question: "What specific generation metrics are we failing to monitor?"
details:
  realistic_solution: You are measuring the total request time, which masks the user experience. You must
    split monitoring into Time-To-First-Token (TTFT) and Time-Per-Output-Token (TPOT). TTFT measures the
    compute-bound prefill phase (when the user is waiting for the bot to start typing). TPOT measures
    the memory-bandwidth-bound decode phase (the reading speed). A fast TPOT cannot save a slow TTFT.
  common_mistake: '"We should look at P99 latency instead of average." P99 helps, but you''re still measuring
    the wrong thing.'
  napkin_math: If TTFT = 3 seconds and TPOT = 20ms, a 200-token response takes $3 + (200 \times 0.02)
    = 7$ seconds total. Average latency looks fine across short and long requests, but users experience
    a 3-second blank screen before any text appears — that *feels* broken regardless of total latency.
