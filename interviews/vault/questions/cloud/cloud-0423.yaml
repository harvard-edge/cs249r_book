title: The Data Pipeline Stall
scenario: You are training a vision model on high-resolution medical images. `nvidia-smi` shows GPU utilization
  fluctuating violently between 0% and 100%. What is the most likely bottleneck in your node?
details:
  realistic_solution: CPU Starvation (The Transformation Wall). The GPU finishes its math instantly, then
    sits at 0% waiting for the CPU to decode, crop, and augment the next batch of JPEGs. You must offload
    preprocessing to the GPU (like NVIDIA DALI) or increase your CPU worker count.
  common_mistake: '"The model is too small for the GPU" or "We need a bigger batch size." Both assume
    the GPU is the problem — it''s actually starving.'
  napkin_math: An H100 can process a ResNet-50 forward pass in ~2ms. JPEG decoding + augmentation on CPU
    takes ~10-50ms per image. With a batch of 64 images and 8 CPU workers, preprocessing takes $64 \times
    30\text{ms} / 8 = 240\text{ms}$. The GPU finishes in 2ms and waits 238ms — that's 99% idle time.
