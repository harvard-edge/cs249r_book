title: 'Expert Choice Routing: Inverting the Selection'
scenario: 'Standard MoE: tokens choose experts (top-k). Expert Choice: experts choose tokens (each expert
  selects its top-k tokens from the batch). Compare these approaches on load balancing, token drop rate,
  and the ability of important tokens to receive more expert computation.'
details:
  realistic_solution: 'Token Choice (standard): Each token selects top-k experts. Problem: popular experts
    overflow (token dropping), unpopular experts underflow (wasted capacity). Needs capacity factor +
    load-balancing loss. Expert Choice: Each expert independently selects its top-k tokens based on router
    scores. Benefits: (1) Perfect load balance by construction — every expert processes exactly k tokens.
    (2) No capacity factor needed. (3) Important tokens (high router scores) can be selected by many experts,
    receiving more computation — an adaptive compute mechanism. Drawbacks: (1) Some tokens may be selected
    by zero experts (especially in small batches) — a different kind of ''dropping.'' (2) Cannot be used
    autoregressively (future tokens aren''t available for expert selection). (3) Variable computation
    per token makes latency unpredictable for inference. (4) Token-level parallelism is harder — different
    tokens receive different amounts of compute, complicating batched execution. Expert Choice excels
    for training (all tokens available) but is impractical for autoregressive inference.'
  common_mistake: Thinking Expert Choice eliminates the need for load-balancing loss entirely. While each
    expert processes exactly the same number of tokens, some tokens may be selected by zero experts (unprocessed)
    or all experts (over-processed).
  napkin_math: 'Token Choice: 256 tokens × top-2 = 512 assignments across 8 experts. Expected per expert:
    64. Variance: ~10-15 (Poisson-like). Drops at C=1.25: ~5% of assignments. Expert Choice: each expert
    picks 64 tokens. Zero unprocessed tokens at top-2 if 8×64=512 covers all 256 tokens × 2. But 256 tokens
    may get 0, 1, 2, ... expert assignments.'
