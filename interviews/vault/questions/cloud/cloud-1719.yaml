title: LLM KV Cache Waste with Static Pre-allocation
scenario: You are serving a 7B parameter LLM (FP16 weights taking 14GB) on a 24GB RTX 3090. Your serving framework uses static pre-allocated memory management, reserving contiguous memory for the maximum sequence length of 2048 tokens for every incoming request. A single token's KV cache requires exactly 1MB of memory, and the average request generates only 256 tokens before hitting EOS.
question: With static 2048-token KV allocation on a 24GB RTX 3090, what is the wasted memory per full batch and maximum batch size?
details:
  realistic_solution: 'First, calculate available memory: 24GB (Total) - 14GB (Weights) = 10GB. Next, calculate the pre-allocated memory required per request: 2048 tokens * 1MB/token = 2.048GB. The maximum batch size is floor(10GB / 2.048GB) = 4. The average utilized memory per request is 256 tokens * 1MB = 256MB. Therefore, the wasted memory per request is 2048MB - 256MB = 1792MB. For a full batch of 4, the total wasted memory is 4 * 1792MB = 7.168GB.'
  common_mistake: |
    **The Pitfall:** Calculating maximum batch size based on the average sequence length.
    **The Rationale:** Candidates divide free memory by the 256-token average, ignoring the framework's static 2048-token pre-allocation constraint.
    **The Consequence:** The deployment crashes with OOM errors instantly when traffic scales, as it attempts to pre-allocate memory it doesn't have.
  napkin_math: |
    *   **Available VRAM:** 24 GB (Total) - 14 GB (Weights) = 10 GB.
    *   **Pre-allocation per Request:** 2048 tokens × 1 MB/token = 2.048 GB.
    *   **Max Batch Size:** floor(10 GB / 2.048 GB) = 4.
    *   **Average Used Memory:** 256 tokens × 1 MB = 256 MB = 0.256 GB.
    *   **Waste per Request:** 2.048 GB - 0.256 GB = 1.792 GB.
    *   **Total Batch Waste:** **4 requests × 1.792 GB = 7.168 GB of wasted VRAM.**
