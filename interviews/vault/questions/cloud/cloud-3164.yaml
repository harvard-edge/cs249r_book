title: Diagnosing Speculation Failure on Code Generation
scenario: Your speculative decoding system (70B target, 7B draft, K=5) achieves alpha=0.85
  on natural language but drops to alpha=0.45 on code generation tasks, making speculation
  slower than autoregressive decoding. Diagnose why code generation has much lower
  acceptance rates.
question: At alpha=0.45 and K=5, how many tokens per speculation step are expected,
  and can this make code generation slower than baseline?
details:
  realistic_solution: 'E[tokens] with alpha=0.45, K=5: (1-0.45^6)/0.55 = 1.80 tokens/step.
    If verify takes 35ms for 5 tokens: 35ms/1.80 = 19.4ms/token vs 25ms baseline →
    1.29× speedup. But if verify takes 35ms and baseline is 25ms: 35ms/1.80 = 19.4ms
    > ... recalc as Gemini states: 25ms for 1 vs 35ms for 1.80 tokens = 0.71× (slower).'
  common_mistake: 'Blaming the draft model''s coding ability. The real issue is that
    code has much lower token-level entropy: the correct next token is highly deterministic
    (e.g., matching brackets, variable names), and small errors cascade.'
  napkin_math: 'Speculative decoding with alpha=0.45, K=5: E[tokens] = (1 - 0.45^6)
    / (1 - 0.45) = (1 - 0.00830) / 0.55 = 0.9917 / 0.55 = 1.803 ≈ 1.80 tokens/step.
    Time per step: draft (5 tokens) + verify = 25ms. Effective latency: 25ms / 1.80
    = 13.9ms/token vs baseline 25ms/token. No speedup — verify step dominates. Speedup
    = baseline_time/effective = 25ms/1 token vs 25ms/1.80 tokens = 1.80× throughput
    improvement. But latency per token: 25ms/1.80 = 13.9ms. Baseline: 25ms. Speedup:
    25/13.9 = 1.80×? But the gemini issue says speedup = 25ms for 1 token vs 35ms
    for 1.80 = 0.71× — implying speculative is SLOWER than autoregressive for this
    rejection rate.'
