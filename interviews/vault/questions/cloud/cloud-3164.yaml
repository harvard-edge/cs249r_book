title: Diagnosing Speculation Failure on Code Generation
scenario: Your speculative decoding system (70B target, 7B draft, K=5) achieves alpha=0.85
  on natural language but drops to alpha=0.45 on code generation tasks, making speculation
  slower than autoregressive decoding. Diagnose why code generation has much lower
  acceptance rates.
question: At alpha=0.45 and K=5, how many tokens per speculation step are expected,
  and can this make code generation slower than baseline?
details:
  realistic_solution: 'At alpha=0.45 and K=5, expected tokens per step is (1 - 0.45^6) / (1 - 0.45) = 1.80 tokens/step. If the baseline autoregressive generation takes 25ms per token, and the speculative step (drafting 5 tokens + target verification) takes 55ms, the effective latency is 55ms / 1.80 = 30.5ms per token. This makes speculative decoding 1.22x slower than the baseline (25ms vs 30.5ms), explaining the performance drop on code generation where the acceptance rate is low.'
  common_mistake: 'Blaming the draft model''s coding ability. The real issue is that
    code has much lower token-level entropy: the correct next token is highly deterministic
    (e.g., matching brackets, variable names), and small errors cascade.'
  napkin_math: 'E[tokens] = (1 - 0.45^6) / (1 - 0.45) = 1.80 tokens/step. Time per speculative step = Draft time (e.g., 5 * 5ms = 25ms) + Verify time (e.g., 30ms) = 55ms. Effective latency = 55ms / 1.80 tokens = 30.5ms/token. Baseline latency = 25ms/token. Speedup = 25 / 30.5 = 0.82x (which means it is slower).'
