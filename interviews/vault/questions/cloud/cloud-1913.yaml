title: Evaluating DLRM Sparse Embedding Placement
scenario: You are designing the inference architecture for a 500GB Deep Learning Recommendation Model
  (DLRM) with highly skewed, sparse embedding lookups. Your cloud instances feature dual-socket CPUs (1TB
  DDR5 DRAM, ~300GB/s bandwidth) and 8x A100 GPUs (80GB HBM2e, 2TB/s bandwidth per GPU, connected via
  NVLink and PCIe Gen4 to the host). The sparse lookups follow a power-law distribution where 5% of the
  embeddings account for 90% of the accesses. Evaluate the architectural trade-offs between placing the
  embedding tables entirely in CPU DRAM versus using a hybrid GPU-HBM caching strategy. Justify your design
  focusing on tail latency, interconnect bandwidth constraints, and irregular memory access patterns.
details:
  realistic_solution: Implement a hybrid, software-managed cache strategy. Pin the 'hot' 5% of embeddings
    (25GB) in GPU HBM and keep the remaining 475GB 'cold' embeddings in CPU DRAM. Because sparse gather
    operations are latency-bound, lookups for cold embeddings over PCIe Gen4 must be aggressively pipelined
    and batched using asynchronous DMA streams to hide the interconnect latency.
  common_mistake: Candidates often suggest sharding the 500GB table across all 8 GPUs (using 62.5GB per
    GPU) to maximize bandwidth. However, this consumes nearly 80% of the expensive HBM capacity just for
    embeddings, leaving insufficient memory for the dense MLP components, KV caches, and large batch sizes,
    while entirely underutilizing the CPU's massive memory capacity.
  napkin_math: 'Assuming GPU HBM access is ~300ns and PCIe Gen4 transfer + CPU DRAM access is ~3,000ns
    (3us). With a 90% hit rate on the hot partition: Average Access Latency = (0.90 * 300ns) + (0.10 *
    3000ns) = 270ns + 300ns = 570ns. If the tables were entirely in CPU DRAM, every access pays the PCIe
    latency (~3,000ns). The hybrid approach yields a ~5.2x latency improvement (3000ns / 570ns) while
    only consuming 25GB (31%) of a single A100''s 80GB HBM capacity.'
