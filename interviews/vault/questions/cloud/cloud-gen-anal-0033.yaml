title: Compiler Heuristics for MatMul Fusion
scenario: A graph compiler targeting an A100 GPU (80 GB HBM2e, 2.0 TB/s bandwidth, 312 TFLOPS FP16, ridge
  point ~156 FLOPs/Byte) evaluates fusing a large Feed-Forward MatMul (17.5 TFLOPs of compute, 5.1 GB
  memory footprint, 4.0 GB output) with a subsequent element-wise GeLU activation function. The compiler's
  cost model rejects the fusion and instead emits a call to the vendor-optimized cuBLAS library followed
  by a separate activation kernel. Why did the compiler decide NOT to fuse these operations, despite the
  general rule that fusion saves memory bandwidth?
question: "Why would the compiler avoid fusing the compute-bound MatMul with GeLU despite the usual memory-bandwidth benefit of fusion?"
details:
  realistic_solution: The matrix multiplication's arithmetic intensity far exceeds the A100's ridge point,
    making it completely compute-bound. Fusing the memory-bound activation function into a custom JIT-compiled
    kernel would likely forfeit the highly tuned, assembly-level Tensor Core optimizations found in cuBLAS.
    The compiler's cost model correctly identifies that the massive loss in FLOP efficiency from dropping
    the cuBLAS kernel heavily outweighs the minor memory bandwidth savings gained by avoiding the intermediate
    tensor write and read.
  common_mistake: Candidates often assume operator fusion is universally beneficial for reducing memory
    roundtrips and might conclude the compiler has a bug or lacks support. They fail to recognize the
    severe performance trade-off between generating generic JIT-compiled kernels and utilizing hand-tuned
    vendor libraries (like cuBLAS) for deeply compute-bound operations.
  napkin_math: '1. MatMul Intensity: 17.5 TFLOPs / 5.1 GB = ~3431 FLOPs/Byte (>> 156 FLOPs/Byte ridge
    point, meaning deeply compute-bound).

    2. Unfused Time: MatMul compute (17.5 TFLOPs / 312 TFLOPS) = ~56 ms. Activation memory traffic is
    8.0 GB total (4.0 GB read + 4.0 GB write). Activation time (8.0 GB / 2.0 TB/s) = 4 ms. Total = 60
    ms.

    3. Fused Time: Fusing avoids writing and reading the 4.0 GB intermediate tensor, saving ~4 ms of memory
    time. However, if the generic compiled kernel is just 20% less compute-efficient than cuBLAS (e.g.,
    achieving 250 TFLOPS instead of 312), the compute time increases to 17.5 TFLOPs / 250 TFLOPS = 70
    ms.

    4. The 14 ms compute penalty far outweighs the 4 ms memory savings, validating the compiler''s decision
    not to fuse.'
