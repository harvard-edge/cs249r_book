title: The Router Bottleneck in MoE Serving
scenario: You deploy a Mixtral 8x7B (Mixture of Experts) model on a single 80GB GPU. Because it only uses ~13B active parameters per token, the math should be fast. However, your profiling shows that generating a token takes 2x longer than a standard dense 13B model.
question: What architectural component of the MoE model is destroying your memory bandwidth?
details:
  realistic_solution: 'The MoE model pays a severe memory access penalty due to sparse, non-sequential weight loading. A dense 13B model reads its weights sequentially from HBM at full 2 TB/s bandwidth. Mixtral''s router dynamically selects 2 of 8 experts per token, meaning the GPU must fetch weights from scattered memory locations. HBM''s random access throughput drops to ~400 GB/s (vs 2 TB/s sequential), making the effective read time 5x slower despite identical FLOPs. The fix: group tokens by expert assignment (expert-parallel batching) to convert random reads into sequential reads, or use expert prefetching to hide the latency.'
  common_mistake: |
    **The Pitfall:** Blaming the router network math.
    **The Rationale:** Candidates assume that because MoE introduces a new routing layer, the computational overhead of this routing mechanism must be the bottleneck.
    **The Consequence:** They ignore the memory hierarchy and fail to identify that sparse, random memory access is the true culprit, leading to misguided optimization efforts.
  napkin_math: |
    1. **HBM Sequential Read Speed:** 2000 GB/s.
    2. **HBM Random Access Speed:** ~400 GB/s.
    3. **Sequential Fetch (Dense 13B):** Fetching 26 GB sequentially takes **13 ms**.
    4. **Sparse Random Fetch (MoE 13B active):** Fetching 26 GB via sparse random accesses takes **65 ms**.
    5. **Result:** **The MoE model's memory reads are effectively 5x slower despite identical FLOPs.**
