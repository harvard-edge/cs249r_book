title: The Router Bottleneck in MoE Serving
scenario: You deploy a Mixtral 8x7B (Mixture of Experts) model on a single 80GB GPU. Because it only uses
  ~13B active parameters per token, the math should be fast. However, your profiling shows that generating
  a token takes 2x longer than a standard dense 13B model. What architectural component of the MoE model
  is destroying your memory bandwidth?
question: "What architectural component of the MoE model is destroying your memory bandwidth?"
details:
  realistic_solution: 'The MoE model pays a severe memory access penalty due to sparse, non-sequential
    weight loading. A dense 13B model reads its weights sequentially from HBM at full 2 TB/s bandwidth.
    Mixtral''s router dynamically selects 2 of 8 experts per token, meaning the GPU must fetch weights
    from scattered memory locations. HBM''s random access throughput drops to ~400 GB/s (vs 2 TB/s sequential),
    making the effective read time 5x slower despite identical FLOPs. The fix: group tokens by expert
    assignment (expert-parallel batching) to convert random reads into sequential reads, or use expert
    prefetching to hide the latency.'
  common_mistake: '"The router network math is too heavy." The router network is usually a tiny single
    linear layer; its compute is negligible.'
  napkin_math: HBM Sequential Read Speed = 2000 GB/s. HBM Random Access Speed = ~400 GB/s. Fetching 26GB
    sequentially takes 13ms. Fetching 26GB via sparse random accesses takes 65ms. The MoE model feels
    5x slower despite having the same FLOPs.
