title: Active Interposer vs Passive Silicon Interposer Tradeoffs
scenario: Your team is evaluating active interposer technology (with embedded logic)
  versus passive silicon interposer for the next AI accelerator generation. The active
  interposer vendor claims 30% better bandwidth density. Evaluate the full system
  tradeoff.
question: Should you use an active interposer or a passive silicon interposer for
  the next AI accelerator, and what full-system tradeoffs determine the choice?
details:
  realistic_solution: 'Active interposer advantages: embedded repeaters allow longer
    routes and higher frequencies; can integrate PHY logic reducing die-edge area
    requirements; enables 3D stacking of logic dies. Disadvantages: interposer fabricated
    on mature node (28nm typical) adds process qualification; any defect in interposer
    logic kills the whole package; power delivery to interposer logic adds complexity;
    thermal path from top dies through interposer to package is degraded. For AI accelerators
    at exascale (1000+ TFLOPS), active interposer makes sense if the bandwidth gain
    enables removing one memory stack — the cost crossover is roughly when active
    interposer NRE < (saved HBM stack cost × volume).'
  common_mistake: Evaluating only the bandwidth density metric in isolation. Active
    interposers add logic (repeaters, retimers, even simple routing logic) which improves
    signal integrity at high frequencies, but they introduce new failure modes, increase
    NRE cost by 5-10x, add yield dependencies, and require the interposer itself to
    be designed and qualified on a separate process node.
  napkin_math: 'Passive interposer: 256 Gbps/mm UCIe. Active interposer: 333 Gbps/mm
    (+30%). To reach 4 TB/s (32,000 Gbps): passive needs 32,000 / 256 = 125mm edge,
    active needs 32,000 / 333 = 96mm edge — saves ~29mm total edge, enabling more
    compute dies per interposer. At 100K units, active interposer NRE $5M / 100K =
    $50/unit. Saved area at $0.10/mm² × 29mm × die_height — roughly $10-20/unit. Active
    interposer only justified at >300K+ units in this scenario.'
