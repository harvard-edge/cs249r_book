title: Diagnosing PyTorch DDP Partial Allocation Deadlocks
scenario: A Kubernetes cluster with 500 A100 GPUs is running distributed training jobs using PyTorch DDP. Users complain that jobs are getting stuck indefinitely, while cluster metrics show 85% GPU allocation. When you inspect the cluster, you see multiple jobs with 6 out of 8 requested pods running, but GPU compute utilization is 0% across those active pods because they are indefinitely waiting to establish the NCCL communicator.
question: How do you diagnose the root cause of this resource fragmentation and resolve the cluster-wide deadlock?
details:
  realistic_solution: Diagnose the issue as a partial allocation deadlock. Implement Gang Scheduling (e.g., via Volcano or Kueue) by defining a PodGroup with minMember equal to the total required workers (e.g., 8). This enforces atomic, all-or-nothing scheduling.
  common_mistake: |
    **The Pitfall:** Focusing on NCCL timeout configurations or immediate cluster autoscaling.
    **The Rationale:** Engineers often assume a networking or capacity issue when nodes are allocated but sitting at 0% utilization.
    **The Consequence:** The fundamental scheduling deadlock caused by piecemeal pod allocation remains unresolved, leading to continued cluster freezing.
  napkin_math: |
    1. Evaluate cluster state: 64 available A100s receive 10 concurrent PyTorch DDP jobs, each requiring 8 GPUs (80 total).
    2. Calculate greedy allocation: A default Kubernetes scheduler deals GPUs greedily, giving 10 jobs 6 GPUs each.
    3. Calculate utilization: 60/64 allocated = 93% utilization.
    4. Evaluate impact: Because DDP demands all 8 GPUs to start, **0 jobs run**.
    5. Calculate gang scheduling outcome: A gang scheduler enforces all-or-nothing allocation, launching **8 complete jobs (64/64 utilized)** while 2 jobs correctly wait.
