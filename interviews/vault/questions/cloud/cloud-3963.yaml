title: Prefill-Decode Disaggregation Overlap in Production LLM Serving
scenario: Your LLM serving cluster disaggregates prefill (compute-bound, H100s) from
  decode (memory-bandwidth-bound, MI300X with 192GB). After prefill generates the
  KV cache, it must be transferred to a decode GPU. With 8192-token contexts, KV cache
  is 4GB for a 70B model. Transfer over 100 Gbps Ethernet takes 320ms — longer than
  the prefill itself (200ms). Design overlap to minimize time-to-first-token.
question: How would you overlap a 4GB KV-cache transfer over 100 Gbps Ethernet to
  minimize time-to-first-token in disaggregated serving?
details:
  realistic_solution: 'Streaming KV transfer with incremental decode start: (1) Transfer
    KV cache layer-by-layer. Each of the 80 layers is ~50MB. Transfer per layer: 50MB
    / 12.5 GB/s = 4ms. (2) As each layer''s KV arrives on the decode GPU, it can begin
    decode processing for that layer. (3) Pipeline: transfer(layer_i+1) || decode(layer_i).
    Decode per layer: ~0.6ms (memory-bound on MI300X). Since transfer (4ms) > decode
    (0.6ms), transfer is the bottleneck. (4) Optimization: use NVLink or InfiniBand
    instead of Ethernet. At 400 Gbps IB: 50MB/50 GB/s = 1ms per layer, closer to compute
    time. (5) Further: start transferring KV as soon as each layer''s prefill completes
    (before full prefill finishes). This overlaps KV transfer with remaining prefill
    computation. Time-to-first-token: prefill_time + max(transfer_per_layer, decode_per_layer)
    = 200ms + 4ms = 204ms instead of 200ms + 320ms = 520ms.'
  common_mistake: Waiting for the entire KV cache transfer before starting decode.
    The 320ms transfer dominates the critical path, making disaggregation slower than
    colocated serving.
  napkin_math: 'Sequential: 200ms prefill + 320ms transfer + 48ms decode (80 layers
    x 0.6ms) = 568ms TTFT. Layer-streamed: 200ms prefill (with KV streaming overlapped)
    + 4ms first-layer transfer + 80 x max(4, 0.6) = 200 + 4 + 320 = 524ms. Still transfer-bound.
    Need faster network: IB 400G: 200 + 1 + 80 x max(1, 0.6) = 281ms.'
