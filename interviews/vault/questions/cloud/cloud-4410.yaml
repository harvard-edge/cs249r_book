title: MI300X NUMA-Aware Tensor Parallel Rank Placement
scenario: A team running TP=8 on MI300X sees 18% higher all-reduce latency than expected from peak Infinity Fabric bandwidth. ROCm NUMA topology shows ranks are spread across all 8 XCDs.
question: How do you fix the rank placement to resolve the 18% all-reduce latency penalty on MI300X?
details:
  realistic_solution: |
    Use ROCR_VISIBLE_DEVICES and numactl to pin TP ranks to XCDs sharing the same Infinity Fabric sub-ring. On MI300X, XCDs are organized in pairs sharing a fabric sub-domain. For TP=8 spanning all 8 XCDs, use hierarchical all-reduce: reduce within each 4-XCD group first, then across groups. Set HSA_OVERRIDE_GFX_VERSION for kernel compatibility and NUMA_BALANCING=0 to prevent OS page migration during training.
  common_mistake: |
    **The Pitfall:** Assuming ROCm assigns TP ranks in a NUMA-optimal order by default.
    **The Rationale:** Candidates assume hardware enumeration perfectly matches the physical fabric topology.
    **The Consequence:** Suboptimal rank placement increases cross-group fabric hops, adding a constant latency penalty to every all-reduce operation.
  napkin_math: |
    - MI300X Infinity Fabric: 896 GB/s aggregate.
    - Single-hop XCD pair latency ~200ns, cross-group hop adds ~150ns.
    - 1GB all-reduce across 8 ranks = 2 * (7/8) * 1GB = 1.75 GB transferred.
    - Ideal time at 896 GB/s = 1.95ms.
    - With 18% NUMA penalty: 2.3ms.
    - **Pinning ranks correctly recovers ~350 μs per all-reduce operation.**
