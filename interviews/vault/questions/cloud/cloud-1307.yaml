title: CPU-Bound Image Preprocessing Bottleneck
scenario: Your team is serving an image classification model on an NVIDIA A100. The API receives 2MB JPEG
  images. The pipeline uses CPU-based Pillow on an 8-core instance to decode, resize to 224x224, and cast
  to FP32, before transferring the tensor to the GPU. At 400 requests per second, GPU utilization is stuck
  at 25%, while CPU utilization is pinned at 100%. The PCIe Gen4 x16 bus shows less than 1 GB/s of load.
  Diagnose the bottleneck.
details:
  realistic_solution: Transfer the raw compressed JPEG bytes directly to the GPU memory and use NVIDIA
    DALI (with nvJPEG) to perform decoding, resizing, and normalization entirely on the accelerator.
  common_mistake: Adding more CPU cores to the instance to parallelize the Python preprocessing, which
    increases cloud costs linearly while leaving the A100 severely underutilized.
  napkin_math: Decoding 400 JPEGs/sec (2MB each) requires streaming 800 MB/s over the PCIe Gen4 bus, using
    only 2.5% of its 32 GB/s capacity. However, CPU-based Pillow decode takes ~5ms per image. Processing
    400 images takes 2000ms of compute per second, instantly redlining an 8-core CPU. Hardware-accelerated
    GPU decode (nvJPEG) completes in <0.5ms per image, entirely eliminating the CPU bottleneck for inference.
