title: CPU-Bound Image Preprocessing Bottleneck
scenario: Your team is serving an image classification model on an NVIDIA A100. The API receives 2MB JPEG images. The pipeline uses CPU-based Pillow on an 8-core instance to decode, resize to 224x224, and cast to FP32, before transferring the tensor to the GPU. At 400 requests per second, GPU utilization is stuck at 25%, while CPU utilization is pinned at 100%. The PCIe Gen4 x16 bus shows less than 1 GB/s of load.
question: What is bottlenecking the A100 image classification service at 400 RPS, and how should the preprocessing pipeline be changed?
details:
  realistic_solution: |
    Transfer the raw compressed JPEG bytes directly to the GPU memory and use NVIDIA DALI (with nvJPEG) to perform decoding, resizing, and normalization entirely on the accelerator.
  common_mistake: |
    **The Pitfall:** Adding more CPU cores to parallelize the Python preprocessing.
    **The Rationale:** Candidates identify the CPU as the bottleneck but try to scale it horizontally instead of offloading the work.
    **The Consequence:** Cloud costs increase linearly while the expensive A100 remains severely underutilized.
  napkin_math: |
    - Streaming 400 JPEGs/sec (2MB each) requires 800 MB/s PCIe bandwidth (using only 2.5% of Gen4 capacity).
    - CPU Pillow decode/resize takes ~20ms per image. 400 images take 8000ms of compute per second, instantly redlining an 8-core CPU.
    - GPU decode (nvJPEG) completes in <0.5ms per image.
    - **Hardware-accelerated GPU decoding entirely eliminates the CPU bottleneck.**
