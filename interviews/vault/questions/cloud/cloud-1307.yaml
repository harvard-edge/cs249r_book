math_issues:
- The math claims that requiring 2,000ms of compute per second 'instantly redlines an 8-core CPU'. 2,000ms
  of CPU compute per second uses exactly 2 full cores, which represents 25% utilization of an 8-core CPU.
  This does not strictly max out the hardware unless artificially restricted by other boundaries (like
  the Python GIL).
