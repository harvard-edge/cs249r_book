title: LLM Dense Layer Profiling
scenario: You are profiling a dense projection layer in an LLM on an NVIDIA A100 GPU (312 TFLOPs FP16
  compute, 2.0 TB/s HBM bandwidth). The matrix multiplication takes an input activation tensor of shape
  [M=2048, K=4096] and a weight tensor of shape [K=4096, N=4096], all in FP16 precision. Determine if
  this layer is compute-bound or memory-bound according to the Roofline model, and calculate the theoretical
  minimum execution time.
details:
  realistic_solution: 'First, calculate Arithmetic Intensity (AI). Total FLOPs = 2 * M * K * N = 2 * 2048
    * 4096^2 = 68.7 GFLOPs. Total Memory Traffic = (M*K + K*N + M*N) * 2 bytes = (8.4M + 16.8M + 8.4M)
    * 2 = 67.1 MB. AI = 68.7 GFLOPs / 67.1 MB = exactly 1024 FLOPs/byte. The A100 ridge point is 312 TFLOPs
    / 2.0 TB/s = 156 FLOPs/byte. Since AI (1024) > Ridge Point (156), the workload is heavily compute-bound.
    The minimum execution time is bounded by compute throughput: 68.7 GFLOPs / 312 TFLOPs/s = ~0.22 ms
    (220 μs).'
  common_mistake: Calculating only the memory transfer time (~0.04 ms) and assuming it represents the
    total latency, or failing to multiply by 2 for the MAC (Multiply-Accumulate) operations when counting
    FLOPs.
  napkin_math: FLOPs = 2 * 2048 * 4096 * 4096 = 68.7e9. Memory = (2048*4096 + 4096*4096 + 2048*4096) *
    2 bytes = 67.1e6 bytes. AI = 68.7e9 / 67.1e6 = 1024 FLOPs/B. A100 Ridge = 312e12 / 2.0e12 = 156 FLOPs/B.
    AI > Ridge -> Compute Bound. Latency = 68.7e9 / 312e12 = 0.00022 s = 0.22 ms.
