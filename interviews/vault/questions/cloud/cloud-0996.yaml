title: LLM Dense Layer Profiling
scenario: 'You are profiling a dense projection layer in an LLM on a GPU. The matrix multiplication takes an input activation tensor of shape [M=2048, K=4096] and a weight tensor of shape [K=4096, N=4096], all in FP16 precision.'
question: Is the [2048,4096] x [4096,4096] FP16 projection compute-bound or memory-bound on an A100, and what is its minimum latency?
details:
  realistic_solution: 'First, calculate Arithmetic Intensity (AI). Total FLOPs = 2 * M * K * N = 2 * 2048 * 4096^2 = 68.7 GFLOPs. Total Memory Traffic = (M*K + K*N + M*N) * 2 bytes = (8.4M + 16.8M + 8.4M) * 2 = 67.1 MB. AI = 68.7 GFLOPs / 67.1 MB = exactly 1024 FLOPs/byte. The A100 ridge point is 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte. Since AI (1024) > Ridge Point (156), the workload is heavily compute-bound. The minimum execution time is bounded by compute throughput: 68.7 GFLOPs / 312 TFLOPs/s = ~0.22 ms (220 us).'
  common_mistake: |
    **The Pitfall:** Calculating only memory transfer time or omitting the MAC multiply-by-2 factor.
    **The Rationale:** Candidates assume all LLM layers are memory-bound without verifying arithmetic intensity, or they undercount FLOPs by half.
    **The Consequence:** Misdiagnosing the bottleneck and applying memory optimizations to a completely compute-bound layer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M=2048, K=4096, N=4096, FP16.
       - Ridge Point: 156 FLOPs/byte.
    2. **Calculations:**
       - Total FLOPs: 2 * M * K * N = 68.7 GFLOPs.
       - Memory Traffic: (M*K + K*N + M*N) * 2 bytes = 67.1 MB.
       - Arithmetic Intensity: 68.7 GFLOPs / 67.1 MB = 1024 FLOPs/byte.
       - Ridge Point Check: 1024 >> 156, so it is compute-bound.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound.** Latency is 0.22 ms (220 us).
