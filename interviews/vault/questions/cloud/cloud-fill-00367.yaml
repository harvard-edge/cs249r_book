title: Optimizing Real-time LLM Inference Latency and Throughput on NVIDIA A100 with Adaptive Batching
scenario: Your team is deploying a critical large language model (LLM) for real-time conversational AI.
  The inference service runs on an NVIDIA A100 GPU (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth,
  400W TDP). The primary goal is to achieve sub-50ms p99 latency for single-turn responses while maximizing
  overall system throughput. You've observed that simple static batching leads to suboptimal GPU utilization
  for sparse request patterns and increased tail latencies during peak load. Design an inference serving
  system that dynamically adapts its batching strategy to meet these stringent latency and throughput
  requirements. Discuss the tradeoffs of static, dynamic, and continuous batching in this context, specifically
  considering the A100's capabilities and limitations.
question: "How would you design adaptive batching for A100 LLM inference to achieve sub-50 ms p99 latency while maximizing throughput under variable traffic?"
details:
  realistic_solution: 'A robust solution would involve implementing an adaptive or continuous batching
    strategy tailored for the A100. This could include:

    1.  **Dynamic Batching with Time-Based Scheduling:** Employ a request queue with a maximum waiting
    time (e.g., `max_wait_ms`). Requests are processed either when the batch size reaches a maximum (`max_batch_size`)
    or when `max_wait_ms` expires, whichever occurs first. This dynamically balances latency (by not waiting
    too long) and throughput (by forming batches when possible).

    2.  **Continuous Batching for LLMs:** This strategy is particularly effective for large models on
    hardware like the A100. It allows concurrent execution of multiple, partially completed requests on
    the GPU by efficiently managing attention key-value caches and only swapping in new tokens for requests
    that are ready for the next inference step. This significantly improves GPU utilization by minimizing
    idle times and overlapping compute and memory operations.

    3.  **Load-Adaptive Control:** Implement a feedback loop that monitors real-time metrics such as GPU
    utilization, queue lengths, and actual p99 latencies. Dynamically adjust parameters like `max_wait_ms`
    and `max_batch_size` based on these observations. For example, during low load, reduce `max_wait_ms`
    to minimize latency; during high load, prioritize throughput by allowing larger batches.

    4.  **Hardware-Aware Optimizations:** Leverage the A100''s Tensor Cores for FP16 operations (312 TFLOPS)
    and its high memory bandwidth (2.0 TB/s) by ensuring data movement is minimized (e.g., by keeping
    model weights and KV caches on GPU memory) and computations are effectively mapped to its architecture.
    Optimize CUDA kernels for the A100''s Streaming Multiprocessors (SMs) and memory hierarchy (e.g.,
    shared memory, L1/L2 caches) to reduce memory access latency and maximize compute efficiency.'
  common_mistake: A common mistake is applying a fixed, large static batch size, assuming it will always
    maximize throughput. While this can be true for high-utilization scenarios, it significantly increases
    end-to-end latency for individual requests and can lead to severe tail latency issues when the request
    arrival rate is variable. Another mistake is poorly implemented dynamic batching where the overhead
    of batch management (e.g., frequent re-allocations, inefficient synchronization, or CPU-bound batching
    logic) negates its benefits or introduces jitter, rather than leveraging the A100's parallelism.
  napkin_math: 'Let''s assume an LLM inference takes `T_token` microseconds per token per batch item on
    an A100, and we have a constant overhead of `T_overhead`.

    *   **Static Batching Latency:** For a batch size `B`, the latency for any request in that batch is
    approximately `B * T_token + T_overhead`. If `T_token = 50µs` and `T_overhead = 5ms`, for `B=32`,
    latency would be `32 * 0.05ms + 5ms = 1.6ms + 5ms = 6.6ms` (excluding queueing). However, if requests
    arrive one-by-one, they accumulate until `B` is full, adding significant queueing delay.

    *   **Throughput (Tokens/s):** Given an FP16 compute capacity of 312 TFLOPS, if an LLM requires `X`
    FLOPs per token, the theoretical maximum tokens per second due to compute is `(312 * 10^12) / X`.
    If `X` is high, compute is the bottleneck. If `X` is low, memory bandwidth might be the bottleneck.
    For 2.0 TB/s HBM2e, if each token inference requires `M` bytes of data movement, then `(2.0 * 10^12)
    / M` is the memory-bound throughput.

    *   **P99 Latency vs. Throughput:** To maintain a p99 latency target `L_target` (e.g., 50ms), your
    batching strategy must ensure that `max_wait_ms + (B_avg * T_token) + T_overhead <= L_target`. For
    example, if `max_wait_ms` is set to 20ms, then `(B_avg * T_token) + T_overhead` must be <= 30ms. You
    can then estimate the maximum average batch size `B_avg` allowable to meet this, and subsequently,
    the maximum throughput `B_avg / (T_batch_process)`.'
