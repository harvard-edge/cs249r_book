validation_issues_pro:
- There is a major contradiction between the scenario's step time (4500ms) and the napkin math's calculated
  bottleneck time (16 seconds).
- The compute time calculation of 0.5 seconds is inaccurate; a more standard estimation (6*B*S*P) yields
  over 1 second for the 8-GPU system.
