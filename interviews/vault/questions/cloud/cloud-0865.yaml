title: Ring AllGather Time in FSDP
scenario: You are training a large language model using Fully Sharded Data Parallel (FSDP) across a single
  8-GPU node (A100s). For a specific transformer block containing 1.2 billion parameters (stored in FP16),
  the parameters are evenly sharded across all 8 GPUs. Before the forward pass can begin, an AllGather
  collective operation is called to reconstruct the full 2.4 GB parameter block on every GPU. Assuming
  a ring topology utilizing 300 GB/s of unidirectional NVLink bandwidth per GPU, calculate the theoretical
  minimum time spent in this AllGather operation.
details:
  realistic_solution: In a ring AllGather over N GPUs, each GPU sends and receives (N-1) chunks of size
    S/N. For N=8 and total size S=2.4 GB, each GPU transfers 2.1 GB of data. At 300 GB/s, the operation
    takes exactly 7 milliseconds.
  common_mistake: Candidates often assume the total data transferred per GPU is the full model size (2.4
    GB) and divide it directly by bandwidth, failing to account for the (N-1)/N scaling factor inherent
    to ring-based collectives.
  napkin_math: 'S = 2.4 GB, N = 8

    Chunk size = S / N = 2.4 / 8 = 0.3 GB

    Data transferred per GPU = (N - 1) * Chunk size = 7 * 0.3 = 2.1 GB

    Time = 2.1 GB / 300 GB/s = 0.007 s = 7 ms'
