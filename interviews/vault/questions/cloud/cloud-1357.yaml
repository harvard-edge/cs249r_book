title: Evaluating Dynamic Hardware Precision Scaling
scenario: You are evaluating a new AI accelerator for a cloud inference cluster that features a hardware-level
  'Dynamic Precision Unit' (DPU). The DPU monitors tensor magnitude distributions at runtime and automatically
  downcasts FP16 operations to INT8 when it detects a narrow numerical range, promising a 2x peak throughput
  increase. However, your production workload consists of 70B parameter large language models where roughly
  1% of tokens generate massive activation outliers (up to 100x the mean magnitude). Evaluate the architectural
  and system-level trade-offs of relying on this dynamic hardware mechanism versus implementing static,
  software-profiled mixed precision quantization (e.g., SmoothQuant) for your fleet.
details:
  realistic_solution: For LLMs with known outlier patterns, static software-profiled quantization is often
    preferable. When the hardware DPU hits an unpredictable outlier, the precision switch incurs a massive
    pipeline stall. By statically identifying outlier-prone channels during profiling and forcing them
    to FP16 while keeping the rest in INT8, you achieve deterministic latency and higher overall throughput.
    The hardware DPU is better suited for workloads with smooth, predictable activation distributions.
  common_mistake: Candidates often assume that hardware-level dynamic precision is strictly superior because
    it operates automatically. They fail to account for the pipeline flush or context-switch penalties
    incurred when the hardware detects an outlier mid-operation and must fall back to FP16, leading to
    severe tail latency degradation.
  napkin_math: 'Assume INT8 takes 1 cycle, FP16 takes 2 cycles, and a dynamic hardware switch penalty
    is 50 cycles (pipeline flush). If 1% of tokens trigger a dynamic switch: Time per 100 ops = 99 * 1
    (INT8) + 1 * (50 penalty + 2 FP16) = 151 cycles. A static software mixed-precision approach keeping
    5% of channels permanently in FP16 avoids the penalty: Time per 100 ops = 95 * 1 (INT8) + 5 * 2 (FP16)
    = 105 cycles. The static approach is ~30% faster due to predictable execution.'
