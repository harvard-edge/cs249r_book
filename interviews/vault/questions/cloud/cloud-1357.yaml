title: Evaluating Dynamic Hardware Precision Scaling
scenario: "You are evaluating a new AI accelerator for a cloud inference cluster that features a hardware-level 'Dynamic Precision Unit' (DPU). The DPU monitors tensor magnitude distributions at runtime and automatically downcasts FP16 operations to INT8 when it detects a narrow numerical range. Your production workload consists of 70B parameter large language models where roughly 1% of tokens generate massive activation outliers."
question: >
  Should you rely on the accelerator's dynamic precision unit or use static mixed-precision quantization for 70B LLM serving, and why?
details:
  realistic_solution: |
    For LLMs with known outlier patterns, static software-profiled quantization is often preferable. When the hardware DPU hits an unpredictable outlier, the precision switch incurs a massive pipeline stall. By statically identifying outlier-prone channels during profiling and forcing them to FP16 while keeping the rest in INT8, you achieve deterministic latency and higher overall throughput. The hardware DPU is better suited for workloads with smooth, predictable activation distributions.
  common_mistake: |
    **The Pitfall:** Assuming hardware-level dynamic precision is strictly superior because it operates automatically.
    **The Rationale:** Failing to account for pipeline flush or context-switch penalties when the hardware detects an outlier mid-operation.
    **The Consequence:** Severe tail latency degradation and unpredictable throughput during LLM serving.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 = 1 cycle, FP16 = 2 cycles.
       - Dynamic switch penalty = 50 cycles.
       - Outlier frequency = 1% of tokens.
       - Static allocation: 5% of channels in FP16 permanently.
    2. **Calculations:**
       - Dynamic DPU cost/100 ops: 99 * 1 + 1 * (50 + 2) = 151 cycles.
       - Static Software cost/100 ops: 95 * 1 + 5 * 2 = 105 cycles.
    3. **Conclusion & Interpretation:**
       - **Result: Static approach is ~30% faster (Pipeline-Stall-Bound).**
