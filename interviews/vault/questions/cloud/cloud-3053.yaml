title: 'Model Size Estimation: Realize Full Training Memory Budget for 7B Model on
  4×H100'
scenario: 'Concretely size the per-GPU memory budget for fine-tuning a 7B model on
  4×H100 (80GB each) with ZeRO-2 (shard gradients+optimizer states across GPUs, replicate
  parameters). Use mixed precision: BF16 weights+activations, FP32 optimizer states.
  Batch size 8 per GPU, sequence length 2048. Verify fit and compute GPU memory utilization.'
question: What is the per-GPU memory budget for fine-tuning a 7B model on 4 H100s
  with ZeRO-2, and does it fit in 80GB?
details:
  realistic_solution: 'ZeRO-2: weights replicated (not sharded). Gradients + optimizer
    states sharded. Per GPU: Weights BF16: 7B×2B=14GB (replicated). Gradients BF16:
    14GB/4=3.5GB (sharded). Adam FP32 (m+v): 7B×4B×2/4=14GB (sharded). Activations
    (batch=8, seq=2048, gradient checkpoint every 4 layers, 40 layers → 10 checkpoints):
    10×8×2048×4096×2B=13.1GB. Total: 14+3.5+14+13.1=44.6GB < 80GB ✓. Utilization:
    44.6/80=55.8%.'
  common_mistake: Applying ZeRO-2 to weights (which are NOT sharded in ZeRO-2, only
    gradients and optimizer states are); computing a 4× reduction on weights is incorrect
    for ZeRO-2.
  napkin_math: 'Weights: 14GB. Grads ZeRO-2: 14/4=3.5GB. Adam FP32 ZeRO-2: 7B×4×2/4=14GB.
    Activations (10 checkpoints): 10×8×2048×4096×2B=10×134MB=1.34GB. Wait: 8×2048×4096×2B=134MB
    per checkpoint. 10: 1.34GB. Total: 14+3.5+14+1.34=32.84GB < 80GB ✓. Without grad
    checkpointing (40 layers): 40×134MB=5.36GB activations. Total: 32.86+4.02(extra
    layers)=36.86GB. 36.86/80=46.1%.'
