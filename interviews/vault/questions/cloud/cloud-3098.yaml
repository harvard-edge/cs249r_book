title: 'TCO Design: Cost Per Inference for Production API Service'
scenario: Design the cost model for a production LLaMA-70B inference API on H100s. The model requires 4 H100s per serving pod (tensor parallel). Each pod serves 100 requests/minute at $2.50/hr/H100.
question: Calculate: cost per 1M tokens, revenue required per 1M tokens to achieve 40% gross margin, and how INT4 quantization (fit on 2 H100s) changes the economics.
details:
  realistic_solution: 'Pod cost: 4 H100 * $2.50/hr = $10/hr. Throughput: 100 req/min * 60min = 6000 req/hr. Avg output 500 tokens: 3M tokens/hr. Cost: $10/3M = $3.33/1M tokens. Revenue at 40% margin: $3.33/(1-0.4) = $5.55/1M tokens. INT4: 2 H100s/pod = $5/hr. Same throughput (100 req/min assumed): 3M tokens/hr. Cost: $5/3M = $1.67/1M tokens. Revenue needed: $2.78/1M tokens. INT4 cuts cost by 50%. Market price GPT-3.5: ~$0.50/1M tokens. To compete: need further optimization (batching, speculative decoding).'
  common_mistake: |
    **The Pitfall:** Not accounting for the full pod cost when calculating per-inference cost.
    **The Rationale:** Candidates often calculate the cost of a single GPU rather than the cluster of GPUs required for tensor parallel serving.
    **The Consequence:** They massively underestimate production costs, and ignore that while quantization reduces capital cost (fewer GPUs), it may reduce throughput per GPU due to dequantization overhead.
  napkin_math: |
    1. **FP16 Pod Cost:** 4 H100 × $2.50/hr = $10/hr.
    2. **Throughput:** 100 req/min × 60 min = 6000 req/hr. At 500 tokens/req → 3M tokens/hr.
    3. **FP16 Unit Cost:** $10 / 3M tokens = $3.33 per 1M tokens. Revenue for 40% margin = $3.33 / (1 - 0.4) = **$5.55 / 1M tokens**.
    4. **INT4 Pod Cost:** 2 H100 × $2.50/hr = $5/hr. Assuming same 3M tok/hr throughput.
    5. **INT4 Unit Cost:** $5 / 3M tokens = $1.67 per 1M tokens. Revenue for 40% margin = **$2.78 / 1M tokens**. (A 50% cost reduction, though still well above GPT-3.5's $0.50/1M market price).
