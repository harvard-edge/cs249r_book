validation_issues:
- The 'Napkin Math' introduces NVLink transfers and their overhead (1.7ms just in network overhead, 2ms
  added to prefill), which is a valid point but not explicitly raised as the *most likely* cause in the
  realistic solution (which focuses on head-of-line blocking from static batching).
- The connection between NVLink overhead and the 800ms P99 TTFT spike is not clearly quantified in the
  napkin math, which instead directly adds the static batching wait time to exceed the SLO.
