title: Expert Load Imbalance Killing Throughput in MoE
scenario: A 16-expert MoE model deployed across 4 GPUs processes a production batch. GPU utilization drops to 40% on 3 GPUs, while the fourth is pegged at 100% because expert #3 receives 68% of all tokens.
question: What causes one GPU to hit 100% utilization while the others idle, and how would you fix the load imbalance?
details:
  realistic_solution: 'Add expert capacity limits at inference: cap each expert buffer at capacity_factor × (batch_size / num_experts). Tokens exceeding the cap are dropped or redirected via a secondary ''overflow'' expert. Combine with online load statistics and periodically re-initialize the least-used experts with weights from overloaded ones.'
  common_mistake: |
    **The Pitfall:** Relying solely on the training auxiliary load-balancing loss in production.
    **The Rationale:** Assuming that because load was balanced during training, it will remain balanced under real-world domain shifts.
    **The Consequence:** Severe throughput degradation as all-reduce operations block waiting for the single overloaded GPU to finish.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16 experts across 4 GPUs.
       - Expert #3 receives 68% of the load.
    2. **Calculations:**
       - Perfectly balanced load: 1/16 (6.25%) of tokens per expert.
       - Load factor on expert #3: 68% / 6.25% = ~10.8x over expected load.
    3. **Conclusion & Interpretation:**
       **Result: Load-Balance Bound.** The overloaded GPU processes nearly 11x its fair share, stalling the other 3 GPUs entirely at the All-Reduce sync barriers.
