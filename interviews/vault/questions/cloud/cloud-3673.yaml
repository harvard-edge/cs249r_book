title: Expert Load Imbalance Killing Throughput in MoE
scenario: 'A 16-expert MoE model deployed across 4x A100 (80GB HBM2e, 2 TB/s) processes
  a production text batch. You notice GPU utilization drops to 40% on 3 of the 4 GPUs
  while one GPU is pegged at 100%. NVML shows expert #3 receives 68% of all tokens
  in a typical step. Describe what is causing this and how to fix it.'
question: 'What is causing one A100 to hit 100% utilization while expert #3 gets 68%
  of tokens, and how would you fix it?'
details:
  realistic_solution: 'Add expert capacity limits at inference: cap each expert buffer
    at capacity_factor × (batch_size / num_experts). Tokens exceeding the cap are
    dropped or redirected via a secondary ''overflow'' expert. Combine with online
    load statistics and periodically re-initialize the least-used experts with weights
    from overloaded ones.'
  common_mistake: Practitioners assume that adding an auxiliary load-balancing loss
    term during training is sufficient. In production, distribution shift causes collapse
    to a dominant expert, and the training loss weight was too small (α=0.001) to
    prevent it under domain shift.
  napkin_math: 'With 4096 tokens and 16 experts, balanced load = 256 tokens/expert.
    Expert #3 gets 68% = 2785 tokens. All-reduce sync must wait for the slowest GPU:
    A100 processes ~1.5× more tokens than expected, adding ~(2785/256 − 1) × step_latency
    ≈ 9.9× expert latency on that GPU vs. balanced.'
