title: The Petabyte Deduplication Shuffle Wall
scenario: You need to deduplicate a 15 TB web crawl corpus (3 billion documents) for LLM pre-training.
  The naive approach computes a hash per document and groups by hash. But your team wants fuzzy deduplication
  — removing documents that are 80%+ similar, not just exact matches. A colleague proposes computing MinHash
  signatures (128 hash functions) for all 3B documents and then performing an all-pairs comparison. Why
  does this approach fail at petabyte scale, and what is the standard distributed deduplication pipeline?
question: "Why does this approach fail at petabyte scale, and what is the standard distributed deduplication pipeline?"
details:
  realistic_solution: 'The standard approach is MinHash + Locality-Sensitive Hashing (LSH) banding. Instead
    of comparing all pairs, divide each 128-hash signature into b bands of r rows. Two documents hash
    to the same LSH bucket only if they share an identical band. This converts the O(n²) comparison into
    O(n × b) hash lookups. The key insight: LSH is a form of approximate nearest-neighbor search that
    trades recall for efficiency. With b=20 bands of r=6 rows (for 80% similarity threshold), only ~5%
    of all pairs that are 80%+ similar are missed, while 99.99% of dissimilar pairs are never compared.
    The distributed pipeline: (1) MapReduce to compute MinHash signatures, (2) LSH banding to emit (band_hash,
    doc_id) pairs, (3) shuffle by band_hash to co-locate candidates, (4) local pairwise Jaccard verification
    within each bucket.'
  common_mistake: '"MinHash is efficient — it''s O(n) to compute signatures." True for signature computation,
    but the all-pairs comparison is O(n²) and the shuffle to group similar documents creates a network
    I/O explosion.'
  napkin_math: '3B documents all-pairs: 3B × 3B / 2 = 4.5 × 10¹⁸ comparisons — impossible. With LSH banding
    (b=20, r=6): each document emits 20 band hashes. Total records to shuffle: 3B × 20 = 60B (band_hash,
    doc_id) pairs × 20 bytes = 1.2 TB shuffle. Average bucket size: ~10 documents. Pairwise comparisons
    per bucket: 10×9/2 = 45. Total comparisons: 60B/10 × 45 = 270B — a 16-million-fold reduction from
    naive all-pairs.'
