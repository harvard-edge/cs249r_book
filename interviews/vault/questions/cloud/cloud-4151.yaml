title: P999 Latency in Multi-Stage Pipelines
scenario: Your production RAG pipeline has 4 serial stages: embedding (H100), retrieval (CPU), reranking (A100), and generation (MI300X). Each stage individually meets a P99 of 50ms.
question: Why is the end-to-end P99 380ms instead of 200ms, and how would you allocate per-stage tail-latency budgets?
details:
  realistic_solution: 'For 4 independent stages each with P99 = 50ms, the probability of ALL stages being fast (below P99) is 0.99^4 = 0.96. So the end-to-end P99 corresponds roughly to P96 of the individual stages — the tail bleeds into the median. Worse, if any stage has a heavy-tailed distribution (common for GPU inference with variable batch sizes), the compound tail is dominated by the worst stage. The fix: allocate tighter per-stage budgets using a tail budget. If end-to-end P99 target is 250ms total, allocate each stage a P99.75 budget (50ms for P99.75 ≈ 35ms for P99). Use async prefetching to overlap retrieval with embedding, converting 2 serial stages into 1 parallel stage. Monitor per-stage P99.9 independently.'
  common_mistake: |
    **The Pitfall:** Assuming end-to-end P99 equals the sum of per-stage P99s.
    **The Rationale:** Candidates fail to realize that tail latency compounds non-linearly across serial stages, as the probability of at least one stage hitting its tail grows.
    **The Consequence:** Service Level Agreements (SLAs) for complex pipelines will be systematically violated in production.
  napkin_math: |
    1. **Naive Sum:** 4 stages × 50ms = 200ms.
    2. **Correlated Tails:** E2E P99 is ~380ms because tail events compound. P(all fast) = 0.99^4 = 96.06%.
    3. **Compound Effect:** E2E P96 ≈ sum of P50s = 4 × 30ms = 120ms, but E2E P99 means 2-3 stages hit their tail.
    **With parallelization (2 stages overlapped), effective serial stages drop to 3, lowering P99 to ~280ms.**
