title: Shift-Left Constraint Validation Savings
scenario: Your ML team trains a recommendation model on a node with 8x A100 GPUs. Full training takes
  50 hours. Currently, latency and memory constraints for the target serving environment are only evaluated
  after training completes. Historically, 50% of trained models fail these late-stage checks and are discarded.
  You propose a 'shift-left' validation step that tests constraints on a randomly initialized dummy model
  before training begins, taking just 0.5 hours on the 8x A100 node. Calculate the expected savings in
  A100 GPU-hours per successfully deployed model.
details:
  realistic_solution: With a 50% failure rate, every successful deployment is accompanied by exactly 1
    failed run on average. By catching the failure in 0.5 hours instead of 50 hours, you save 49.5 node
    hours of cluster time per failed run.
  common_mistake: Calculating savings for a single run instead of calculating the expected savings per
    successful deployment, which must account for the 50% failure rate requiring 2 runs per success on
    average.
  napkin_math: Runs per success = 1 / (1 - 0.5) = 2 (1 success, 1 failure). Current wasted time per success
    = 1 failure * 50 hrs * 8 GPUs = 400 GPU-hours. New wasted time per success = 1 failure * 0.5 hrs *
    8 GPUs = 4 GPU-hours. Savings = 400 - 4 = 396 A100 GPU-hours per successful model.
