title: Feedback Loop Mitigation Strategy
scenario: 'Your lending model trained on historical approval data has a feedback loop: it denies loans
  to a demographic group → no repayment data for that group → model learns the group is high-risk → denies
  more loans. Options: (A) add exploration (randomly approve some denied applicants), (B) use causal inference
  to debias historical data, (C) add demographic parity constraints to the model. Evaluate.'
question: "How would you evaluate exploration, causal debiasing, and demographic parity for the lending feedback loop?"
details:
  realistic_solution: 'Option A (exploration/random approval): Most direct way to get unbiased outcome
    data. But ethically and legally problematic: randomly approving loans creates financial risk for both
    lender and borrowers who may not be ready. Also, random denial of qualified applicants is discriminatory.
    Feasibility: low in regulated domains. Option B (causal inference): Use techniques like inverse propensity
    weighting to account for the selection bias in historical data. Estimate what the repayment rate would
    have been if the denial had not occurred. Does not require experimentation on real people. Limitation:
    requires strong causal assumptions and sufficient overlap in the data. Option C (demographic parity):
    Ensures equal approval rates across groups but may approve genuinely high-risk applicants (increasing
    defaults) or deny genuinely low-risk applicants from the majority group. Treats the symptom, not the
    cause. Recommendation: B as the primary approach (debias the data), augmented with C as a safety constraint
    (ensure outputs are not discriminatory while causal estimates are imperfect). A is inappropriate for
    high-stakes lending decisions.'
  common_mistake: Choosing option C (demographic parity) alone. Constraints fix the output distribution
    but do not fix the biased training data — the model fights against the constraint, reducing overall
    accuracy without addressing root cause.
  napkin_math: 'A (exploration): unbiased data but ethical/legal issues in lending. B (causal inference):
    fixes training data bias without real-world experimentation. Demographic parity (C): fixes output
    distribution but not root cause. B + demographic parity constraint is optimal for regulated domains.'
