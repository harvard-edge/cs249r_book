title: Prefill Batch Sizing for TTFT Optimization on A100
scenario: 'An A100 80GB serves a chatbot with SLA of 300ms TTFT (time to first token). Prefill of a 1024-token prompt takes 50ms at batch_size=1. The team wants to batch prefill operations to improve GPU utilization.'
question: At what batch size does TTFT SLA become violated?
details:
  realistic_solution: 'Prefill at batch=1: 50ms for 1024 tokens. Prefill is compute-bound (high arithmetic intensity). Batch scaling: compute increases linearly but GPU utilization also increases → roughly constant 50ms until compute-saturated. A100 at batch=1: likely underutilized. Saturation batch size: A100 effective compute budget / prefill FLOPs per sequence (1.37 TFLOPs at seq=1024). At batch=5-6, A100 likely saturates. Above saturation, TTFT = N×50ms/batch = queue wait time increases. SLA 300ms: TTFT = queue_wait + prefill_time. Max queue: 300ms - 50ms = 250ms. If prefill saturates at batch=5: throughput = 5/50ms = 100 prefills/sec. Queue wait at 80 req/s: 80/100 = 80% utilization → avg wait = 50ms/(1-0.8) = 250ms. Close to limit.'
  common_mistake: 'Treating prefill as linearly scaling with batch size; prefill is compute-bound (unlike decode which is memory-bound), so it scales efficiently up to the compute limit.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Prefill FLOPs for ~670M param model: 2 * 670M * 1024 ≈ 1.37T FLOPs.
    - Hardware: A100 80GB (312 TFLOPS, effective ~150 TFLOPS at 50% MFU).
    - SLA constraint: 50ms compute budget.
    - KV cache: ~100MB per sequence (max 800 sequences).
    
    **Calculations:**
    - Compute budget in 50ms: 150 TFLOPS * 0.05s = 7.5T FLOPs.
    - Saturation batch size: 7.5T FLOPs / 1.37T FLOPs/seq ≈ 5.47 sequences.
    - Max sequences limited by compute, not memory (5.47 << 800).
    
    **Conclusion & Interpretation:**
    - **Result: 5 Sequences (Compute-Bound)**. The A100 compute saturates at batch size >= 5, after which TTFT SLA will be violated due to excessive queue wait times.
