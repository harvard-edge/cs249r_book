title: DLRM Embedding Table Sharding Strategy
scenario: A production DLRM has 50 embedding tables ranging from 1M to 500M rows, with total embedding
  memory of 400 GB. You have 8 GPUs with 80 GB HBM each (640 GB total). Design a sharding strategy. Why
  can't you simply shard each table evenly across all GPUs?
question: "How would you shard the 400 GB DLRM embeddings across 8×80 GB GPUs, and why not shard every table evenly across all GPUs?"
details:
  realistic_solution: 'Use table-wise sharding as the primary strategy: assign entire tables to individual
    GPUs, balancing total memory per GPU. For tables that exceed single-GPU capacity (e.g., a 100 GB table),
    use row-wise sharding for those specific tables only. The key insight: table-wise sharding minimizes
    AllToAll communication because lookups to a table stay on one GPU. Row-wise sharding requires gathering
    partial embeddings from all GPUs for every lookup. Mixed sharding (table-wise + row-wise for oversized
    tables) is the production approach used in Meta''s DLRM infrastructure.'
  common_mistake: Assuming row-parallel sharding (splitting each table across GPUs) is always best. This
    creates massive AllToAll communication because every lookup requires cross-GPU communication for every
    table.
  napkin_math: '50 tables across 8 GPUs: average ~50 GB per GPU (within 80 GB). | Table-wise: only cross-table
    feature interaction needs AllToAll. | Row-wise on all tables: 50 × batch_size lookups × 7/8 remote
    = massive AllToAll. | Communication ratio: table-wise ~10× less AllToAll volume than full row-wise.'
