title: WebDataset for Distributed Training
scenario: Your team trains a vision model on 100M images (50 TB) across 64 GPUs on 8 nodes. The current pipeline uses individual image files on a shared NFS mount. Training throughput is 40% below target because the NFS metadata server is overwhelmed by 64 workers each opening thousands of small files.
question: How does WebDataset solve this, and what shard size do you choose?
details:
  realistic_solution: 'WebDataset packages images into tar archives (shards), converting millions of small-file operations into sequential reads of large files. This eliminates metadata server bottlenecks. Shard sizing: target 100-500 MB per shard. At 250 MB: 50 TB / 250 MB = 200K shards. Each of 64 workers gets 200K/64 = 3,125 shards. Workers stream through shards sequentially — one open() call per shard instead of thousands per shard''s contents. Shuffling: inter-shard shuffle (randomize shard order per epoch) + intra-shard shuffle buffer (10K samples). NFS metadata: 200K file entries vs. 100M — 500× fewer metadata operations. Alternative: store shards on S3, stream via HTTP range requests — eliminates NFS entirely.'
  common_mistake: |
    **The Pitfall:** Choosing inappropriate shard sizes.
    **The Rationale:** Candidates choose very small shards (10 MB) to maximize parallelism, which recreates the small-file problem. Or they choose very large shards (50 GB), causing imbalanced loading and memory starvation.
    **The Consequence:** Failing to actually relieve the IO bottleneck or crashing the data loaders.
  napkin_math: |
    1. Individual files: 100M open() + stat() calls per epoch * 64 workers = 6.4B metadata ops.
    2. NFS metadata server: ~100K ops/s → 64,000 seconds = 17.8 hours just for metadata.
    3. WebDataset (250 MB shards): 200K open() calls per epoch * 64 workers = 12.8M ops → 128 seconds.
    **Result:** Metadata overhead goes from 17.8 hrs to 2 min (500× improvement). Sequential read throughput dominates.
