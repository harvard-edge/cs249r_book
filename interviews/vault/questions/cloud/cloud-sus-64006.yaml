title: GPU Power State Transitions and Idle Power Optimization
scenario: Your inference serving cluster runs H100 GPUs that sit idle between request bursts, averaging
  40% utilization over a 24-hour period. During idle periods, nvidia-smi shows each GPU drawing 200W in
  P0 state (full clock). You are tasked with implementing power state management to reduce idle power
  consumption. Describe how NVIDIA GPU power states (P-states) work for H100, how to enable persistence
  mode correctly, and calculate the potential power savings for a 200-GPU cluster.
question: "How should H100 P-states and persistence mode be configured to reduce idle power, and what savings are possible for 200 GPUs at 40% utilization?"
details:
  realistic_solution: 'H100 P-state hierarchy: P0 = full performance (700W active, ~200W idle), P8 = memory
    clock throttled (50-80W), P12 = minimum power (~30W, may cause 50-100ms wake latency). For serving:
    configure P8 as idle floor (not P12) to keep wake latency under 10ms. Implementation: set nvidia-smi
    -pm 1 (persistence mode) to prevent full driver unload, then use MIG or power limit commands. Enable
    nvidia-smi --power-limit=300 for idle cap, auto-lifting under load via power management policy.'
  common_mistake: Candidates often enable persistence mode without understanding it prevents P-state transitions
    entirely—keeping the GPU in P0 for lower latency at the cost of higher idle power. The correct approach
    for serving workloads is to use NVIDIA's power management daemon (nvidia-persistenced) combined with
    P8/P12 idle states, balancing wake latency against power savings.
  napkin_math: 'Baseline idle: 200 GPUs × 200W × 60% idle fraction = 24 kW continuous idle load. P8 idle
    state: ~65W per GPU. P8 savings: 200 × (200-65)W × 0.60 = 200 × 135W × 0.60 = 16.2 kW saved. Annual
    energy: 16.2 kW × 8,760h = 141,912 kWh/year. At $0.10/kWh = $14,191/year. Wake penalty from P8: ~5ms
    → acceptable for >100ms SLA workloads. Fleet scale (1000 GPUs): $70,960/year savings.'
