title: The Communication Wall
scenario: We have a 512-GPU cluster connected via 10 Gbps Ethernet. We are training a 70B parameter model
  using standard Data Parallelism. Despite having 512 GPUs, our training speed is barely faster than a
  single machine. Based on the network diagram, why has our scaling efficiency collapsed?
question: "Based on the network diagram, why has our scaling efficiency collapsed?"
details:
  realistic_solution: This cluster will experience **near-zero scaling efficiency**. To train a 70B model
    using Data Parallelism, all 512 GPUs must synchronize their gradients via an AllReduce operation at
    the end of *every single training step*. This requires moving hundreds of gigabytes of data across
    the network simultaneously. The 10 Gbps Ethernet uplinks to the Core Switch will instantly choke,
    turning a matrix-multiplication workload into a pure network-wait workload. Training large models
    requires specialized topologies like a non-blocking Fat-Tree (Clos) with InfiniBand (200-400 Gbps)
    and NVLink (900 GB/s) within nodes.
  common_mistake: '"512 GPUs should give ~512× speedup with Data Parallelism" or "10 Gbps is plenty for
    gradient sync." Both underestimate the volume of data that must cross the network every training step.'
  napkin_math: A 70B model has ~140 GB of gradients (FP16). In a Ring AllReduce, each GPU transfers approximately
    2× the gradient size (reduce-scatter + all-gather). Over a 10 Gbps (1.25 GB/s) link, a single sync
    of ~280 GB would take ~224 seconds. If your forward/backward pass takes 2 seconds, you spend over
    99% of your time waiting for the network.
