title: Diagnosing GPU Starvation in Vision Training
scenario: You are training a ResNet-50 variant on a cloud instance with 8x A100 GPUs. The training script
  processes batches of high-resolution medical images (4MB each). To keep the GPUs at >90% utilization,
  the node must ingest 2,000 images/sec. The 100TB dataset is stored in a standard cloud object store,
  and the compute instance has a 50 Gbps network bandwidth limit. Despite optimizing the PyTorch DataLoader
  with maximum CPU workers, pinned memory, and prefetching, `nvidia-smi` shows GPU utilization constantly
  dropping to 0% between batches, averaging only 40%. Diagnose the root cause of this bottleneck.
question: "Why are the A100s averaging only 40% utilization despite DataLoader tuning, and what I/O change is needed?"
details:
  realistic_solution: Identify that the instance's network bandwidth is the hard bottleneck. Implement
    a high-performance local NVMe caching tier or distributed file system (like FSx for Lustre), or upgrade
    to a 100+ Gbps instance to meet the 8 GB/s ingestion requirement.
  common_mistake: Blaming CPU-side data augmentation bottlenecks, python GIL, or DataLoader thread contention
    without calculating the raw network I/O constraints of the compute instance.
  napkin_math: To sustain >90% utilization across 8x A100 GPUs, the training script must ingest 2,000
    medical images/sec. At 4MB per image, the required data ingestion bandwidth is 2,000 * 4MB = 8,000
    MB/s (8.0 GB/s). The node's standard 50 Gbps network connection maxes out at 6.25 GB/s. Because 8.0
    GB/s > 6.25 GB/s, the system suffers a massive I/O bottleneck, stalling the 312 TFLOPS GPUs waiting
    for incoming data.
