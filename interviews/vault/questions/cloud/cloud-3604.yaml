title: 'Queueing Theory Mastery: SLA-Driven Capacity Planning for H100 Fleet'
scenario: You must design a globally distributed H100 inference fleet with requirements of p99 < 200ms, p999 < 1s, and a peak global load of 50,000 req/s. The mean service time is 8ms, but it has a high variance (CV=2.0), meaning standard M/M/1 assumptions break down.
question: What G/G/c capacity plan would meet p99 < 200ms and p999 < 1s for 50,000 req/s with a service-time CV=2.0?
details:
  realistic_solution: 'For G/G/c (Kingman''s approximation): Wq ≈ (C_a²+C_s²)/2 × M/M/c_wait. With C_a=1 (Poisson), C_s=2 (high variance), multiplier=(1+4)/2=2.5× versus M/M/c. Target utilization ρ=0.6 for p999<1s given CV=2. Load per region: 50000/3 regions ≈ 16667/s. Per-region servers: c = ceil(λ/(μ×ρ)) = ceil(16667/(125×0.6)) = 223 H100s per region. p999 estimate: 5-6× mean system time = 5×(8+Wq_adjusted)ms. With Kingman correction, Wq≈2.5×M/M/c_Wq. Set c=250/region for safety.'
  common_mistake: |
    **The Pitfall:** Using standard M/M/1 or M/M/c queuing formulas for high-variance workloads.
    **The Rationale:** Candidates forget that high service-time coefficient of variation (CV > 1) dramatically inflates tail latency.
    **The Consequence:** Under-provisioning the cluster and severely violating the p999 latency SLA.
  napkin_math: |
    - **Given Parameters:** μ = 125/s (8ms mean), λ_region = 16,667/s, CV = 2.0.
    - **Capacity Sizing:** Target ρ = 0.6 for safety. Servers c = ceil(16,667 / (125 × 0.6)) = 223 H100s.
    - **Kingman Adjustment:** Multiplier = (1 + 2²)/2 = 2.5× over M/M/c wait time.
    - **Latency Check:** At c=223 and ρ=0.6, M/M/c Wq ≈ 1ms. Adjusted Wq = 2.5ms. Total mean time = 8 + 2.5 = 10.5ms.
    - **Result:** p999 ≈ 6 × 10.5ms = **63ms**, which is well under the **1s SLA**.
