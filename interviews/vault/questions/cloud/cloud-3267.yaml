title: NVIDIA H100 KV-Cache Capacity Planning
scenario: You are optimizing KV-cache management for a large language model. The model uses 96 attention heads, each with a dimension of 128. The KV-cache stores keys and values in `bfloat16`. Assume 80 GB of HBM is dedicated entirely to the KV-cache.
question: With 80 GB of HBM used only for BF16 KV-cache, how many total tokens can be stored for 96 heads of dimension 128?
details:
  realistic_solution: In a real-world scenario with paged attention, the KV-cache is managed in fixed-size blocks, which reduces fragmentation and allows for efficient sharing of memory across requests. However, the fundamental calculation for the total theoretical capacity based on memory density remains the same. Memory pressure from long contexts is typically managed by intelligent eviction policies (like Least Recently Used for cache blocks) or by techniques such as windowed attention or summarization to keep context length manageable within the physical memory limits. The calculation derived provides an upper bound; actual usable capacity might be lower due to fragmentation and system overheads.
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint per token.
    **The Rationale:** It's easy to forget to account for both Key (K) and Value (V) states, or miscalculate the byte size of the specific `dtype`.
    **The Consequence:** Vastly overestimating the token capacity of the hardware, leading to unexpected OutOfMemory errors in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 80 GB memory = 80 × 1024^3 bytes = 85,899,345,920 bytes.
       - 96 heads, dim 128, BF16 (2 bytes).
    2. **Calculations:**
       - KV_size_per_token = 96 (heads) × 128 (dim) × 2 (K+V) × 2 (bytes) = 49,152 bytes/token.
       - Max_total_tokens = 85,899,345,920 / 49,152 ≈ 1,747,626 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The physical memory limit restricts the absolute maximum number of cached tokens across all sequences to ~1.74 million.
