title: 'The H100 Ridge Point: Roofline Analysis'
scenario: You are evaluating NVIDIA's H100 GPU for your training cluster. The spec sheet boasts 989 TFLOPS
  of FP16 performance and 3.35 TB/s of HBM3 memory bandwidth.
details:
  realistic_solution: The Ridge Point of an accelerator is the ratio of its peak compute performance to
    its peak memory bandwidth. It represents the minimum number of arithmetic operations a workload must
    perform for every byte of data it transfers from memory to be bound by compute speed rather than memory
    speed.
  common_mistake: Engineers often focus solely on the headline TFLOPS number, assuming that more TFLOPS
    always means faster performance. They forget that if a workload can't supply data fast enough (i.e.,
    it has low arithmetic intensity), the massive compute units will just sit idle, waiting for data.
    This memory bandwidth bottleneck is the single biggest performance limiter for many real-world models,
    like large language model inference.
  napkin_math: '1. Calculate the Ridge Point to find the hardware''s exact crossover between memory and
    compute bottlenecks.

    2. Peak Compute = 989 TFLOPS (TeraFLOPs per second).

    3. Peak Memory Bandwidth = 3.35 TB/s (TeraBytes per second).

    4. Ridge Point = 989 / 3.35 = 295.2 FLOPs per Byte.

    A workload must perform >295 arithmetic operations for every byte moved to fully utilize the H100''s
    compute power.'
  options:
  - ~0.0034 Ops/Byte
  - ~295 Ops/Byte
  - ~295,000 Ops/Byte
  - ~1,342 Ops/Byte
  correct_index: 1
