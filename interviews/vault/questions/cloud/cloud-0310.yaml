title: 'The H100 Ridge Point: Roofline Analysis'
scenario: 'You are evaluating an NVIDIA GPU for your training cluster. The spec sheet boasts 989 TFLOPS of FP16 performance and 3.35 TB/s of HBM3 memory bandwidth.'
question: 'What is the ridge point from 989 TFLOPS and 3.35 TB/s, and what does it mean for workloads?'
details:
  realistic_solution: 'The Ridge Point of an accelerator is the ratio of its peak compute performance to its peak memory bandwidth. It represents the minimum number of arithmetic operations a workload must perform for every byte of data it transfers from memory to be bound by compute speed rather than memory speed. The extremely high ridge point of modern GPUs strictly means that many common ML operations are intrinsically memory-bound.'
  common_mistake: |
    **The Pitfall:** Inverting the ratio or focusing solely on raw TFLOPS.
    **The Rationale:** Engineers often assume that more TFLOPS always means faster performance, forgetting that if a workload has low arithmetic intensity, the massive compute units will just sit idle.
    **The Consequence:** They optimize compute capabilities while remaining bottlenecked by memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Peak Compute: 989 TFLOPS.
       * Peak Bandwidth: 3.35 TB/s.
    2. **Calculations:**
       * Ridge Point = Peak Compute / Memory Bandwidth.
       * Ridge Point = 989 / 3.35 = 295.2 FLOPs per Byte.
    3. **Conclusion & Interpretation:**
       * **Result: Workloads must execute >295 operations per byte moved to be Compute-Bound.**
  options:
  - ~0.0034 Ops/Byte
  - ~295 Ops/Byte
  - ~295,000 Ops/Byte
  - ~3.39 Ops/Byte
  correct_index: 1
