title: The Head-of-Line Blocking Crisis
scenario: You are leading the ML Systems team for a new AI chatbot service using a 70B parameter model. Users are reporting highly variable response times. Your dashboard shows that while peak throughput is high, average GPU utilization is only 40% and P99 TTFT (Time To First Token) is poor. The current serving stack uses static batching with a fixed batch size of 8. Your junior engineers suggest increasing the batch size to improve GPU utilization.
question: "What flaw in the fixed batch size 8 static batching stack is causing poor P99 TTFT, and why is continuous batching better?"
details:
  realistic_solution: |
    The root cause is head-of-line blocking inherent to static batching. The entire batch of 8 requests is bottlenecked by the single longest-running request in the batch. If one user asks for a 2000-token summary while another asks a 10-token question, the quick question is forced to wait for the long summary to finish decoding. This leads to low effective GPU utilization (as slots in the batch sit idle after finishing early) and terrible P99 TTFT.
  common_mistake: |
    **The Pitfall:** Believing that higher batch size is always better for utilization.
    **The Rationale:** While true for offline jobs, candidates forget that interactive serving has strict latency constraints and variable request lengths.
    **The Consequence:** Large static batches introduce head-of-line blocking, killing average latency and user experience even if the GPU is technically busy.
  napkin_math: |
    - **Model Size:** 70B FP16 = 140GB.
    - **Hardware:** 2x H100s, aggregate bandwidth = 6.7TB/s.
    - **TPOT:** 140GB / 6.7TB/s = 20.9ms.
    - **Batch Time:** Static batching waits for the longest request. For lengths [20, ..., 2000], the batch takes 2000 * 20.9ms = 41.8s.
    - **Impact:** A 20-token request finishes early but waits **41.8s** to be returned.
