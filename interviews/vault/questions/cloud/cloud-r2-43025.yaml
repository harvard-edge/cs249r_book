title: Storage Format Selection for Multimodal Datasets
scenario: 'You''re building a multimodal training pipeline that ingests text (tokens), images (JPEG),
  audio (WAV), and metadata (JSON) for each sample. The dataset has 50M samples totaling 80 TB. Compare
  three storage strategies: (1) separate files per modality in Parquet/TFRecord, (2) everything packed
  into WebDataset tar shards, (3) a database approach (Lance format). Evaluate on training throughput,
  storage efficiency, and operational complexity.'
question: "How would you compare separate modality files, WebDataset tar shards, and Lance for the 80 TB multimodal dataset on throughput, storage, and ops complexity?"
details:
  realistic_solution: 'Analysis: (1) Separate files: text in Parquet (great compression, column pruning
    for text-only training), images in TFRecord shards, audio in TFRecord shards. Pro: each modality can
    be independently updated, compressed optimally, and versioned. Con: joining across modalities requires
    a manifest file and multi-stream coordination — complex data loader code, potential for misalignment.
    (2) WebDataset: each tar shard contains all modalities for a sample group. Pro: atomic samples, simple
    streaming, no join needed. Con: updating one modality requires rewriting entire shards. No column
    pruning — text-only training still reads images. (3) Lance: columnar format designed for ML with native
    support for variable-length binary data. Pro: column pruning across modalities, random access, versioning
    built-in. Con: newer format, smaller ecosystem. Winner depends on access pattern: WebDataset for full-sample
    training, Lance for modality-selective training, separate files for independent modality evolution.'
  common_mistake: Storing all modalities in a single Parquet file. Parquet handles binary blobs poorly
    — large variable-length columns (images, audio) destroy columnar compression benefits and create huge
    row groups that waste memory.
  napkin_math: 'WebDataset (80 TB in 250 MB shards): 320K shards, sequential read at 10 GB/s = full scan
    in 2.2 hours. Text-only training still reads 80 TB. Separate files: text-only Parquet = 5 TB (tokenized),
    read in 8 minutes. But multimodal join adds 2s latency per batch for manifest lookup. Lance: text-only
    = 5 TB read (column pruning), full multimodal = 80 TB. No join overhead. Storage: WebDataset ≈ 80
    TB (no compression benefit across modalities). Parquet text + TFRecord media ≈ 75 TB (text compresses
    3×, media doesn''t). Lance ≈ 76 TB.'
