title: 'Dataset Curation: Realize Token Budget for Chinchilla-Optimal 30B Training'
scenario: You are planning data curation for a Chinchilla-optimal 30B parameter model to be trained on 64 H100s.
question: What are the full data requirements and DataLoader throughput needed for a Chinchilla-optimal 30B model on 64 H100s?
details:
  realistic_solution: 'Chinchilla: 20 tokens/param for optimal compute. 30B \times 20 = 600B tokens needed. Apply filtering: typically 60% of raw data passes. Need 1T raw tokens = ~4TB raw text. Storage: 600B tokens \times 4 bytes = 2.4TB tokenized. DataLoader must sustain GPU training throughput.'
  common_mistake: |
    **The Pitfall:** Computing token counts without accounting for filtering drop rates or DataLoader throughput.
    **The Rationale:** Candidates focus entirely on the theoretical math of the Chinchilla scaling laws but forget the practical systems engineering required to feed the GPUs.
    **The Consequence:** Sizing the storage backend too small or deploying a DataLoader that starves the highly expensive GPU cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30B model, 64 H100s, 60% filtering pass rate.
    2. **Calculations:**
       - Optimal tokens: 30B * 20 = 600B tokens.
       - Raw data: 1T tokens = ~4TB text.
       - Compute throughput: 64 * 989T * 0.4 MFU = 25,318 TFLOPS.
       - Token throughput: 25,318T / (6 * 30B) = 140,656 tokens/sec.
       - Ingestion rate: 140,656 * 4 bytes = 563 KB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Dataloader easily sustains ingestion of 524KB batch every 0.93s.**
