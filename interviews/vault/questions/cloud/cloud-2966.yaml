title: 'Dataset Curation: Realize Token Budget for Chinchilla-Optimal 30B Training'
scenario: 'You are planning data curation for a Chinchilla-optimal 30B parameter model
  to be trained on 64 H100s (80GB HBM3). Realize the complete data requirements: token
  count, raw data volume, filtering pipeline output, storage I/O specs, and DataLoader
  throughput needed to keep GPUs fed.'
question: What are the full data requirements and DataLoader throughput needed for
  a Chinchilla-optimal 30B model on 64 H100s?
details:
  realistic_solution: 'Chinchilla: 20 tokens/param for optimal compute. 30B × 20 =
    600B tokens needed. Apply filtering: typically 60% of raw data passes. Need 1T
    raw tokens = ~4TB raw text. Storage: 600B tokens × 4 bytes = 2.4TB tokenized.
    DataLoader must sustain GPU training throughput.'
  common_mistake: Computing token count without accounting for filtering drop rates,
    or not verifying DataLoader can sustain GPU throughput.
  napkin_math: '64 H100s at 40% MFU: 64 × 989T × 0.4 = 25,318 TFLOPS. 30B model: 6
    FLOPs/token. Token throughput = 25,318T / (6 × 30B) = 25,318T / 180B = 140,656
    tokens/sec. Data rate = 140,656 × 4 bytes = 563KB/s. Trivially achievable even
    from NFS. But if using 2048 context, batches = 140,656 / 2048 = 68.7 sequences/sec.
    Each batch (BS=64): 64 × 2048 × 4 = 524KB → needed every 64/68.7 = 0.93 seconds.
    DataLoader needs to deliver one 524KB batch per second — easily done with 4 prefetch
    workers.'
