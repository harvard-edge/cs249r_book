title: InfiniBand Subnet Manager Failover for Training Cluster
scenario: A 256-H100 InfiniBand cluster has a single OpenSM Subnet Manager running on a management node. During a 7-day training run, the management node crashes and OpenSM fails. Within 30 seconds, all RDMA connections fail and the training job dies.
question: How would you design InfiniBand Subnet Manager failover so a management-node crash does not kill the 7-day training job?
details:
  realistic_solution: 'IB Subnet Manager HA: run two OpenSM instances (primary at priority 8, standby at priority 7). IB specification mandates: if master SM stops sending LID-Assigned MADs every SM_KEY_LEASE period (default 60s), standby SM triggers election. With aggressive timers: set OpenSM -p 10 (poll interval 10s) → failover within 20s. Better: run OpenSM on a switch itself (embedded SM available on Mellanox switches) — eliminates management node as SPOF. Modern Mellanox UFM provides SM HA with 5-10s failover. For training: NCCL connections survive SM failover if IB path record remains valid — only new connections fail during failover. Existing AllReduce continues if SM is down <30s and no link events occur.'
  common_mistake: |
    **The Pitfall:** Recommending redundant SM without configuring aggressive timers.
    **The Rationale:** Engineers don't understand the master/standby election protocol, resulting in failover times that exceed connection timeouts.
    **The Consequence:** NCCL timeouts trigger before the standby SM can take over, killing the job.
  napkin_math: |
    1. Default SM failover time: Primary dead -> standby detects (10s) -> election -> reconfigure = 30-60s.
    2. Default NCCL timeout: 1800s.
    3. Impact of link events: If SM failover is slow, route recalculations cause job death.
    4. Optimized SM failover: Embedded SM + UFM HA = <10s failover.
    **Final Result: <10s failover prevents NCCL timeouts and link event disruptions.**
