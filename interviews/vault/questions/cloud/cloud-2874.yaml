title: Tensor Parallel Memory Split
scenario: A 96 GB model must run on GPUs with 40 GB HBM. Tensor parallelism splits weights evenly across N GPUs.
question: Determine the minimum tensor-parallel degree for weights alone.
details:
  realistic_solution: Weights require at least ceil(96/40) = 3 GPUs, giving 32 GB of weights per GPU. In practice, consider extra degree or more GPUs for KV cache, activations, framework overhead, and topology/library preferences; power-of-two TP is a convenience in some stacks, not a universal rule.
  common_mistake: |
    **The Pitfall:** Sizing the cluster exactly to the mathematical weight split without leaving headroom.
    **The Rationale:** Candidates calculate 96/40 = 2.4 and assume exactly 3 GPUs will be completely fine for full execution.
    **The Consequence:** Out of memory errors at runtime because the KV cache, activations, and framework overhead have no space left.
  napkin_math: |
    1. Model weights: 96 GB.
    2. GPU capacity: 40 GB.
    3. Raw split: 96 / 40 = 2.4.
    4. Ceiling function: Ceil(2.4) = 3.
    5. **Result: The minimum tensor-parallel degree for weights alone is 3 (though larger is required in practice).**
