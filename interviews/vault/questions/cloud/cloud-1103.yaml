title: Diagnosing Data Loader Bottlenecks in Vision Training
scenario: Your team is training a Vision Transformer on a single node with 8x A100 GPUs using a 10TB dataset of 4K resolution JPEGs stored in S3. The training loop fetches images, decodes them, resizes to 256x256, and applies augmentations on-the-fly. GPU utilization is stuck at 30%, and profiling reveals the data pipeline is the primary bottleneck.
question: How do you analyze and resolve this data pipeline bottleneck using a dataset compilation approach?
details:
  realistic_solution: Treat the dataset as a compilation target. Implement an offline pipeline that pre-resizes the 4K images to 256x256, applies static normalizations, and serializes the raw tensors into chunked, sequential formats (like WebDataset or TFRecords). This moves the heavy network and CPU decoding tax out of the critical training path.
  common_mistake: |
    **The Pitfall:** Throwing more CPU workers at the DataLoader or increasing the prefetch buffer size.
    **The Rationale:** Engineers try to mask the latency without changing the fundamental computational work required to decode large JPEGs on the fly.
    **The Consequence:** Shifting the bottleneck slightly between network I/O and CPU decoding limits, failing to saturate the A100s.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw 4K JPEGs are ~5MB each.
    - Target training throughput is 2,000 imgs/sec.
    - Preprocessed size is 256x256 uint8 tensors.

    **Calculations:**
    - Current streaming requirement: 2,000 imgs/sec * 5 MB = 10,000 MB/s (10 GB/s) network bandwidth, plus massive CPU decode overhead.
    - Offline compilation size per image: 256 * 256 * 3 channels * 1 byte = 196,608 bytes (~196 KB).
    - New bandwidth requirement: 2,000 imgs/sec * 196 KB = 392,000 KB/s (~383 MB/s).

    **Conclusion & Interpretation:**
    - **Result: 383 MB/s (I/O-Bound)**. Bandwidth drops from 10 GB/s to ~383 MB/s, eliminating the JPEG decoding tax and allowing the GPUs to reach high utilization.
