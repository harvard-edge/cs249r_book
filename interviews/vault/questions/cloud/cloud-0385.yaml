title: The Guardrail Canary Cost
scenario: You are operating a fleet of GPUs serving a large language model. For safety, each inference request is also checked by a 1 Billion parameter 'guardrail' model. You are planning a canary rollout of a new, improved guardrail model. During the canary, the designated pods must hold both the old and the new guardrail models in HBM to allow for instant rollback.
question: How much additional HBM is required on canary instances to keep both 1B-parameter FP16 guardrail models loaded?
details:
  realistic_solution: 'The key is to calculate the memory footprint for a single guardrail model and recognize that the *additional* load is simply the size of one more model, since the canary pods go from holding one model to holding two. The formula for FP16 inference memory is straightforward: `Parameters × 2 bytes`.'
  common_mistake: |
    **The Pitfall:** Under-provisioning memory for the new model during deployment.
    **The Rationale:** Engineers often only budget for the new model's size, forgetting that both old and new artifacts reside in memory simultaneously during a blue/green or canary rollout.
    **The Consequence:** Leads to Out-Of-Memory (OOM) errors during the rollout.
  napkin_math: |
    1. Assumptions & Constraints: 1B parameters. FP16 (2 bytes per param).
    2. Calculations: Base model size = 1B * 2 bytes = 2 GB. Additional memory for canary model = 1 * 2 GB = 2 GB.
    3. Conclusion & Interpretation: **Result: 2 GB additional memory is required. Bottleneck: HBM Capacity Planning.**
  options:
  - 1 GB
  - 4 GB
  - 2 GB
  - 16 GB
  correct_index: 2
