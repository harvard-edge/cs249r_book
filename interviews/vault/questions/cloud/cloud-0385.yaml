title: The Guardrail Canary Cost
scenario: You are operating a fleet of H100 GPUs serving a large language model. For safety, each inference
  request is also checked by a 1 Billion parameter 'guardrail' model. You are planning a canary rollout
  of a new, improved guardrail model. During the canary, the designated pods must hold *both* the old
  and the new guardrail models in HBM to allow for instant rollback. Explain how to calculate the *additional*
  HBM memory required on these canary-designated H100s, assuming both models are loaded in FP16 precision.
question: "How much additional HBM is required on canary H100s to keep both 1B-parameter FP16 guardrail models loaded?"
details:
  realistic_solution: 'The key is to calculate the memory footprint for a single guardrail model and recognize
    that the *additional* load is simply the size of one more model, since the canary pods go from holding
    one model to holding two. The formula for FP16 inference memory is straightforward: `Parameters ×
    2 bytes`.'
  common_mistake: Engineers often miscalculate the peak memory required during a deployment. A common
    mistake is to only budget for the new model's size, forgetting that during a blue/green or canary-with-rollback
    strategy, both the old and new artifacts must reside in memory simultaneously on the canary instances.
    This leads to under-provisioning and causes Out-Of-Memory (OOM) errors during the rollout.
  napkin_math: 1. **Parameters (P):** 1 Billion (1 × 10⁹)
  options:
  - '1 GB. (Mistake: Assumes INT8 precision instead of FP16)'
  - '4 GB. (Mistake: Calculates the total memory for both models, not the *additional* memory required)'
  - 2 GB.
  - '16 GB. (Mistake: Confuses bits and bytes, multiplying by 16 for FP16 instead of 2)'
  correct_index: 2
