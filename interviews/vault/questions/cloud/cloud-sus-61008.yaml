title: Die-to-Die Link Latency vs NVLink Comparison
scenario: An engineer argues that MI300X's intra-package Infinity Fabric is equivalent to NVLink 4.0 between
  H100s for collective communication. Evaluate this claim quantitatively.
details:
  realistic_solution: 'Infinity Fabric intra-package latency: ~50-100ns. NVLink 4.0 latency: ~1-2µs. For
    all-reduce on small gradients (<1 MB), MI300X''s 8-XCD collective is ~20x lower latency than NVLink.
    For large gradients (>1 GB), bandwidth matters more: NVLink 4.0 per-link 900 GB/s (8-GPU NVSwitch)
    vs MI300X Infinity Fabric 896 GB/s — roughly equal bandwidth but fundamentally different use cases
    (inter-node vs intra-package).'
  common_mistake: Comparing peak bandwidth numbers without accounting for latency. Infinity Fabric is
    on-package (sub-100ns); NVLink 4.0 is chip-to-chip via physical connectors (~1-2µs). For small-message
    collectives, latency dominates bandwidth.
  napkin_math: 'Small message all-reduce latency: MI300X 8-XCD ~0.5µs vs NVLink H100×8 ~8µs = 16x faster.
    Large message (10 GB): MI300X fabric ~10GB/896GB/s ≈ 11ms vs NVLink ~10GB/900GB/s ≈ 11ms — bandwidth-equivalent
    but MI300X all 8 in one package, no PCIe or cable overhead.'
