title: Evaluating Memory Costs of Skip Connections
scenario: Your team is fine-tuning a 152-layer ResNet-style visual encoder on a fleet of NVIDIA A10G GPUs
  (24GB VRAM) using a batch size of 128. While standard feed-forward networks of similar parameter count
  fit into memory, this model throws Out-Of-Memory (OOM) errors during the backward pass. Evaluate the
  impact of dense skip connections on the memory lifecycle of activations during training, and justify
  a mitigation strategy that preserves the unhindered gradient flow required for convergence.
details:
  realistic_solution: Implement activation checkpointing (gradient checkpointing) across segments of residual
    blocks. This discards the intermediate activations within the block and recomputes them during the
    backward pass using the preserved inputs, trading ~20-30% extra compute for a drastic reduction in
    peak memory, fitting the 128 batch size into the 24GB envelope.
  common_mistake: Candidates often focus solely on the computational overhead (the addition operation)
    of skip connections and fail to recognize that the identity path forces the framework to keep the
    initial input activations alive in memory for the entire duration of the block's forward and backward
    passes.
  napkin_math: For a batch of 128, a 64x64x256 FP16 feature map takes 128 * 64 * 64 * 256 * 2 bytes =
    268 MB. In a standard layer, memory can be freed sequentially. With a skip connection spanning 3 layers,
    the 268 MB input must be pinned in VRAM until the addition at the end of the block, significantly
    increasing peak memory usage. Across 50 blocks, pinned activations alone consume >13 GB.
