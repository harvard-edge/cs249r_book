title: The Alpha-Beta Communication Model
scenario: 'Your cluster has InfiniBand links with latency $\alpha = 5\,\mu s$ and bandwidth $\beta^{-1} = 50\text{ GB/s}$. You need to AllReduce a 200 MB gradient buffer across 32 GPUs using a Ring algorithm.'
question: "Using the alpha-beta model, what is the Ring AllReduce time for 200 MB across 32 GPUs, and when does latency become negligible?"
details:
  realistic_solution: 'The Ring AllReduce alpha-beta model is: $T = 2(N-1) \cdot \alpha + 2 \cdot \frac{N-1}{N} \cdot M \cdot \beta$, where $N=32$, $M=200\text{ MB}$, $\alpha = 5\,\mu s$, $\beta = 1/50\text{ GB/s} = 0.02\text{ ns/byte}$. Latency component: $2 \times 31 \times 5\,\mu s = 310\,\mu s$. Bandwidth component: $2 \times \frac{31}{32} \times 200\text{ MB} \times 0.02\text{ ns/byte} = 2 \times 0.969 \times 4\text{ ms} = 7.75\text{ ms}$. Total: $\approx 8.06\text{ ms}$. The latency term is ~4% of total — already small. The crossover point (where $\alpha$ term = $\beta$ term) is at message size $M^* = \frac{N \cdot \alpha}{\beta} = 32 \times 5\,\mu s \times 50\text{ GB/s} = 8\text{ MB}$. Below 8 MB, latency dominates and you should use a different algorithm (e.g., recursive halving-doubling).'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2(N-1) steps in Ring AllReduce.
    
    **The Rationale:** Candidates confuse the per-step message size with the total message size or ignore the latency term entirely, which matters significantly for small messages.
    
    **The Consequence:** Heavily underestimating communication time and making poor scheduling decisions for distributed training.
  napkin_math: |
    * **Algorithm Steps:** Ring AllReduce on N=32 GPUs takes 2 × (N - 1) = 62 steps.
    * **Latency Component:** 62 steps × 5 µs = 310 µs (0.31 ms).
    * **Data Sent per GPU:** 2 × ((32 - 1) / 32) × 200 MB = 387.5 MB.
    * **Bandwidth Component:** 387.5 MB / 50,000 MB/s = 7.75 ms.
    * **Total Time:** 7.75 ms + 0.31 ms = 8.06 ms.
    * **Crossover Point:** M* = 32 × 5 µs × 50 GB/s = 8 MB.
    * **Result:** **The AllReduce takes 8.06 ms, with bandwidth accounting for 96% of the delay.**
