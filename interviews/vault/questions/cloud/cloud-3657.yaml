title: Container Image Size and Model Loading Latency on GPU Pods
scenario: A Kubernetes deployment for a 13B model (26GB FP16 checkpoint) on A100 (80GB HBM2e, 2TB/s) takes 8 minutes to start a new pod: 5 minutes to pull the container image (45GB image with model weights baked in) and 3 minutes to load weights.
question: How would you reduce the 13B model pod cold start from 8 minutes to under 2 minutes?
details:
  realistic_solution: Separate model weights from container image. Use a 2GB base image (runtime + dependencies only) and mount model weights from a shared NFS/EFS volume or object storage (S3/GCS) at pod startup. With a 10Gbps NFS mount, 26GB loads in 26GB/1.25GB/s = 21 seconds. Use init containers to pre-fetch weights to node-local NVMe SSD, reducing repeated loads.
  common_mistake: |
    **The Pitfall:** Baking model weights directly into the container image.
    **The Rationale:** It simplifies local testing and deployment scripts by creating a single, self-contained artifact.
    **The Consequence:** It creates massive container images that must be pulled over the network on every cold start, drastically increasing pod startup times.
  napkin_math: |
    - **Unoptimized Pull:** 45GB image at 200Mbps (25MB/s) = 1800s (30 minutes). If it took 5 minutes, the network was running at ~150MB/s.
    - **Optimized Image Pull:** 2GB base image at 150MB/s = 13.3 seconds.
    - **Model Weight Load (NVMe SSD):** 26GB / 3.5GB/s = 7.4 seconds.
    - **Model Transfer to GPU (PCIe 4.0):** 26GB / 64GB/s = 0.4 seconds.
    - **Total Optimized Time:** 13.3s + 7.4s + 0.4s = **~21 seconds**.
    - **Conclusion:** Decoupling weights easily beats the 2-minute cold start target.
