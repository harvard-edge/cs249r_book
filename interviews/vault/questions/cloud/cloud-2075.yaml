title: The Training Pipeline Observability Gap
scenario: A training job that normally takes 24 hours has been running for 40 hours and loss is still decreasing slowly. The engineer is unsure whether to kill it or let it continue. There are no intermediate evaluation checkpoints — just the training loss curve.
question: "What instrumentation should have been in place, and how would you make the kill-vs-continue decision with only the training loss curve?"
details:
  realistic_solution: 'The missing instrumentation: (1) Periodic validation loss (every N steps) — the only way to detect overfitting. (2) Learning rate schedule visualization — to verify the optimizer is in the expected phase. (3) Gradient norm tracking — to detect training instability. (4) GPU utilization and throughput (samples/sec) — to detect hardware degradation or data pipeline stalls. With only the training loss curve: (1) Compare the loss decrease rate to historical runs. If the current run''s loss at 24h matches where previous successful runs were at 24h, the model is on track and the extended time is likely due to a data pipeline slowdown, not a training problem. (2) Check if loss decrease rate is decelerating (diminishing returns) or if there was a discontinuity (data issue). (3) Kill if: loss has plateaued for > 2× the normal convergence time, or if samples/sec has dropped significantly (indicating infrastructure, not model, issues).'
  common_mistake: |
    **The Pitfall:** Waiting indefinitely because "loss is still decreasing."
    **The Rationale:** Candidates conflate training loss with generalization capability.
    **The Consequence:** Wasting hundreds of dollars on compute while the model aggressively overfits, resulting in a useless production artifact.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Expected runtime: 24 hours.
       - Current runtime: 40 hours.
       - Hardware: 8 GPUs at $3/GPU-hr.
    2. **Calculations:**
       - Expected cost: 24h * 8 * $3 = $576.
       - Current cost: 40h * 8 * $3 = $960.
       - Marginal cost per hour: 8 * $3 = $24/hr.
       - Cost of 1-hour validation checkpoint: $24.
       - Expected waste if overfitting: 50% chance * remaining hours * $24.
    3. **Conclusion & Interpretation:**
       - **Result: Observability-Bound Risk.** Without validation loss, the model is likely overfitting. The value of information from a validation checkpoint ($24) far exceeds the expected cost of continuing blindly.
