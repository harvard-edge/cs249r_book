title: Real-time Recommendation System Drift on AMD MI300X
scenario: Your team operates a high-throughput recommendation engine processing petabytes of user data daily. System-level metrics show a decline accompanied by an increase in prediction variance. You must diagnose potential data drift and training-serving skew.
question: How would you diagnose and mitigate data drift, concept drift, and training-serving skew in the recommendation engine?
details:
  realistic_solution: Implement a robust monitoring pipeline sampling input features and predictions. Use statistical tests (PSI, KL divergence) on feature distributions. To avoid HBM bandwidth saturation, leverage PCIe to stream telemetry asynchronously to host RAM for batch upload and offline drift analysis.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate metrics or failing to handle high-bandwidth telemetry.
    **The Rationale:** Treating ML monitoring like standard software monitoring without considering tensor feature sizes.
    **The Consequence:** Undetected data drift or severe inference latency degradation due to HBM bandwidth saturation from monitoring tools.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sample 1% of 100K req/s = 1K samples/s. Sample size = 1KB.
    2. **Calculations:**
       - Data rate = 1K * 1KB = 1 MB/s.
       - Over 24 hours = 86.4 GB/day.
    3. **Conclusion & Interpretation:**
       - **Result: Stream 1 MB/s to host via PCIe to completely avoid HBM bandwidth saturation while preserving telemetry.**
