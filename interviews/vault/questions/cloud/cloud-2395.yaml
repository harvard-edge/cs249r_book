title: Power-Capped Rack Density Tradeoff
scenario: 'You are designing a high-density LLM serving pod. The datacenter has a strict power limit of 40kW per rack. You are evaluating two configurations for HGX H100 nodes (8 GPUs). Option A: 4 nodes per rack, running at max TDP (700W per GPU, 10kW per node including CPU/Mem), yielding 3000 tokens/sec per node. Option B: 6 nodes per rack, power-capped to 400W per GPU (6.5kW per node). Under a 400W cap, H100s retain 80% of their max throughput.'
question: Which rack configuration maximizes total tokens/sec under the 40kW limit, and what tradeoff does it introduce?
details:
  realistic_solution: The optimal solution requires evaluating the CMOS dynamic power equation (P ∝ C * V^2 * f). Because voltage must increase to support higher frequencies, power scales approximately cubically with frequency. By power-capping the GPUs (Option B), we operate in a highly efficient region of the V-F curve. At 400W, we drop power by 42% but only lose 20% of throughput. This massive increase in perf/watt allows us to pack 50% more nodes into the same 40kW power envelope. Option B yields significantly higher total rack throughput while staying safely under the 40kW limit. However, the tradeoff is a 50% increase in capital expenditure (CapEx) for the extra nodes, so a full TCO analysis must weigh the amortized CapEx against the increased token throughput.
  common_mistake: |
    **The Pitfall:** Assuming that running GPUs at max TDP always yields the best performance-per-rack.
    **The Rationale:** Ignoring the non-linear relationship between frequency, voltage, and power ($P \propto C V^2 f$).
    **The Consequence:** Deploying power-inefficient racks that hit datacenter power ceilings prematurely, limiting total possible throughput.
  napkin_math: |
    *   **Option A (Max TDP):** 4 nodes $\times$ 10kW = **40kW** (hits limit). Total throughput = $4 \times 3000 =$ **12,000 tokens/sec**.
    *   **Option B (Power-Capped):** 6 nodes $\times$ 6.5kW = **39kW** (safely under limit).
    *   **Option B Throughput:** $3000 \times 0.8 = 2400$ tokens/sec per node. Total = $6 \times 2400 =$ **14,400 tokens/sec**.
    *   **Conclusion:** Option B yields **20% higher throughput** within the identical power footprint, though it increases capital expenditure (buying 6 nodes instead of 4).
