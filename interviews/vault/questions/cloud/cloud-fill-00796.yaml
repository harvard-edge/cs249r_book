title: 'H100-Optimized LLM: Encoder vs. Decoder Architecture Tradeoffs for Cost-Effective Deployment'
scenario: Your team is deploying a new large language model for a critical enterprise application on a
  cluster of NVIDIA H100 GPUs. The application involves both complex understanding (e.g., semantic search,
  classification) and generation (e.g., personalized responses, code generation). You have to choose between
  deploying an encoder-only model, a decoder-only model, or an encoder-decoder model. Each NVIDIA H100
  features 80 GB HBM3 memory, 989 TFLOPS FP16 dense compute, and 3.35 TB/s memory bandwidth, with a 700W
  power draw. Design an evaluation framework to compare these architectural choices, focusing on deployment
  costs, latency targets (e.g., 50ms for inference), and throughput requirements, considering the H100's
  capabilities and constraints. Outline how you would justify your architectural choice to leadership.
question: "How would you evaluate encoder-only, decoder-only, and encoder-decoder options on H100s against 50 ms latency, throughput, and cost?"
details:
  realistic_solution: 'A realistic solution would involve a comprehensive evaluation process: 1.  **Workload
    Characterization:** Precisely define application requirements (latency P99, throughput QPS, typical
    input/output lengths, batching strategies). 2.  **Architectural Fit Assessment:** Map application
    tasks to the strengths of each architecture (encoder-only for understanding, decoder-only for generation,
    encoder-decoder for sequence-to-sequence). 3.  **Model Selection & Profiling:** Identify representative
    models for each architecture type. Profile their actual memory footprint (weights, activations, KV
    cache), compute utilization, and memory access patterns on an NVIDIA H100 using representative data.
    4.  **Optimization Exploration:** Evaluate the impact of techniques like quantization (e.g., FP8/INT8),
    FlashAttention, and optimal batching on H100 performance and resource utilization. 5.  **Cost Model
    Development:** Create a granular cost model considering H100 instance/purchase costs, power consumption
    (700W/GPU), cooling, and operational overheads per architecture. 6.  **Benchmarking & Simulation:**
    Conduct targeted benchmarks and simulations to predict at-scale performance for each architecture
    against defined SLOs and TCO, building a clear tradeoff matrix for leadership.'
  common_mistake: A common mistake is focusing solely on theoretical FLOPs or model size without fully
    considering the real-world impact of memory bandwidth limitations, especially for large models or
    specific operations like KV cache access during decoding. Another pitfall is overlooking the total
    cost of ownership (TCO), including power consumption (700W per H100) and cooling costs, which can
    significantly outweigh initial hardware purchase prices at scale.
  napkin_math: "Consider the NVIDIA H100's 80GB HBM3 and 3.35 TB/s memory bandwidth:\n\n*   **Encoder-Only\
    \ Model (e.g., 3B parameters, FP16):** Model size is 3B * 2 bytes/param = 6GB. This easily fits on\
    \ one H100. Inference is often compute-bound for large batches. If a batch of 128 sequences (512 tokens)\
    \ generates ~20GB of activations, it still fits. The 989 TFLOPS FP16 dominates, offering high throughput\
    \ for batch processing.\n\n*   **Decoder-Only Model (e.g., Llama-2-70B, 70B parameters, FP16):**\n\
    \    *   **Model Weights:** 70B * 2 bytes/param = 140 GB. This immediately requires at least two H100s\
    \ for just the weights (tensor parallelism).\n    *   **KV Cache Growth:** For a sequence length of\
    \ 4096 and a batch size of 1, the Key-Value cache alone can consume ~10GB per layer for a 70B model.\
    \ For a batch size of 8, this jumps to ~80GB, quickly exceeding a single H100's 80GB memory, even\
    \ if the model weights are distributed. This forces either smaller batch sizes, more H100s, or aggressive\
    \ KV cache management.\n    *   **Generation Bandwidth Bottleneck:** During token generation, memory\
    \ bandwidth (3.35 TB/s) is often the limiting factor due to repeated KV cache access. If generating\
    \ one token requires reading, say, 100GB (simplified for KV cache + weight access), then at 3.35 TB/s,\
    \ it theoretically allows ~33 tokens/second per H100 if purely memory bound. This implies that while\
    \ the 989 TFLOPS are powerful, the overall performance for large decoder-only models can be capped\
    \ by HBM3 bandwidth, directly impacting cost-per-token generation.\n\nThis shows that for large decoder-only\
    \ models, memory constraints (both capacity and bandwidth) on H100s quickly push towards multi-GPU\
    \ setups or quantization (e.g., 4-bit, reducing 70B to 35GB), increasing infrastructure costs per\
    \ effective parameter."
