title: 'The FP16 Memory Footprint: Model Serving Infrastructure'
scenario: You're part of the cloud infrastructure team for an autonomous vehicle company. You need to
  deploy a 7-billion parameter LLM for a new log analysis service. For basic capacity planning, what is
  the approximate GPU memory required just to load the model weights for inference using FP16 precision?
details:
  realistic_solution: A model's memory footprint for inference is determined by the number of parameters
    and the precision used. For FP16 (half-precision floating point), each parameter requires 2 bytes.
    Therefore, a 7-billion parameter model needs approximately 14 GB of memory just for the weights.
  common_mistake: The most common mistake is confusing inference memory with training memory. Training
    with an optimizer like Adam requires storing gradients and optimizer states, leading to a much larger
    footprint (around 16 bytes per parameter). Another error is using the wrong byte size, for instance,
    assuming 4 bytes (FP32) instead of 2 bytes for FP16.
  napkin_math: 7 billion parameters × 2 bytes/parameter = 14 GB
  options:
  - 112 GB
  - 28 GB
  - 14 GB
  - 1.4 GB
  correct_index: 2
