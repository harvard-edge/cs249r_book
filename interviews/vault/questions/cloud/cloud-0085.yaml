title: 'The FP16 Memory Footprint: Model Serving Infrastructure'
scenario: You're part of the cloud infrastructure team for an autonomous vehicle company. You need to deploy a 7-billion parameter LLM for a new log analysis service.
question: For basic capacity planning, what is the approximate GPU memory required just to load the model weights for inference using FP16 precision?
details:
  realistic_solution: A model's memory footprint for inference is determined by the number of parameters and the precision used. For FP16 (half-precision floating point), each parameter requires 2 bytes. Therefore, a 7-billion parameter model needs approximately 14 GB of memory just for the weights.
  common_mistake: |
    **The Pitfall:** Confusing inference memory with training memory, or using the wrong byte size.
    **The Rationale:** Candidates often assume FP32 (4 bytes) instead of FP16, or they account for Adam optimizer states and gradients (which require ~16 bytes per parameter) when the prompt specifically asks for inference.
    **The Consequence:** The team massively over-provisions expensive GPU resources, ballooning the operational budget unnecessarily.
  napkin_math: |
    1. **Parameters:** 7 billion.
    2. **Precision:** FP16 = 2 bytes per parameter.
    3. **Conclusion:** **Total memory required is 7 billion * 2 bytes = 14 GB.**
  options:
  - 112 GB
  - 28 GB
  - 14 GB
  - 1.4 GB
  correct_index: 2
