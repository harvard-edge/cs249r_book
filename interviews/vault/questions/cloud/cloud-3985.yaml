title: Training Budget Overrun From Sequence Length
scenario: A language-model training run was budgeted for 400,000 GPU-hours at sequence
  length 2,048. One week before launch, the team switches to 8,192-token context while
  keeping model size and token count fixed. Attention was 30% of step time at 2,048
  and scales quadratically with sequence length; the rest scales linearly with tokens.
  Diagnose the budget impact.
question: How does switching from 2,048 to 8,192 context affect a 400,000 GPU-hour
  training budget when attention is 30% of step time?
details:
  realistic_solution: The context length increases by 4x while total training tokens
    stay fixed. Non-attention work is roughly linear in tokens, so its total cost
    stays about 1x. Attention is quadratic in sequence length per step, but the number
    of steps falls by about 4x for fixed tokens, so total attention cost scales by
    about 4x. The budget estimate is 0.70 × 400K + 0.30 × 400K × 4 = 760K GPU-hours,
    not 3.04M.
  common_mistake: Assuming sequence length only changes memory, or scaling the whole
    step linearly by 4x and missing quadratic attention.
  napkin_math: 'Fixed total tokens: non-attention total cost = 0.70 × 400K = 280K
    GPU-hours. Attention total cost = 0.30 × 400K × 4 = 480K GPU-hours. New budget
    ≈ 760K GPU-hours, or 1.9× the original.'
