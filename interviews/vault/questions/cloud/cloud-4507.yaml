title: LLM Checkpoint Bandwidth Bottlenecks
scenario: "You are orchestrating distributed training of a 70B parameter FP16 LLM across 64 H100 SXM GPUs."
question: "Analyze the NFS aggregate write bandwidth required to checkpoint the model and optimizer states within 30 seconds."
details:
  realistic_solution: "A 70B parameter model in FP16 takes 140 GB for weights. An Adam optimizer requires 2x FP32 states (560 GB). Total checkpoint size is ~700 GB. Saving this in 30s requires ~23.3 GB/s write bandwidth. A single centralized 100 Gbps (12.5 GB/s) NIC will bottleneck, requiring a parallel distributed file system."
  common_mistake: |
    **The Pitfall:** Calculating only the footprint of the FP16 weights.
    **The Rationale:** Forgetting the massive memory footprint of training optimizer states (momentum and variance, typically kept in FP32).
    **The Consequence:** Drastically under-provisioning network storage bandwidth, turning 30-second checkpoints into multi-minute stalls that wreck training cluster utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model.
       - FP16 weights, Adam FP32 optimizer states (momentum and variance).
       - 30-second target checkpoint window.
    2. **Calculations:**
       - Weights (FP16): 70B params * 2 bytes = 140 GB.
       - Optimizer States (Adam FP32): 2 states * 70B params * 4 bytes = 560 GB.
       - Total Checkpoint Size: 140 GB + 560 GB = 700 GB.
       - Required Bandwidth: 700 GB / 30 seconds = 23.3 GB/s.
    3. **Conclusion & Interpretation:**
       **23.3 GB/s write bandwidth is required. Result: Network-I/O-Bound.**
