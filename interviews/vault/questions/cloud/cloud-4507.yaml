title: LLM Checkpoint Bandwidth Bottlenecks
scenario: You are orchestrating distributed training of a 70B parameter FP16 LLM across
  64 H100 SXM GPUs.
question: Analyze the NFS aggregate write bandwidth required to checkpoint the model
  and optimizer states within 30 seconds.
details:
  realistic_solution: A 70B parameter model in FP16 takes 140 GB for weights. An Adam
    optimizer requires 2x FP32 states (560 GB). Total checkpoint size is ~700 GB.
    Saving this in 30s requires ~23.3 GB/s write bandwidth. A single centralized 100
    Gbps (12.5 GB/s) NIC will bottleneck, requiring a parallel distributed file system.
  common_mistake: Calculating only the footprint of the FP16 weights and forgetting
    the massive memory footprint of training optimizer states.
  napkin_math: (70B * 2) + (70B * 8) = 700GB / 30s = 23.3 GB/s.
