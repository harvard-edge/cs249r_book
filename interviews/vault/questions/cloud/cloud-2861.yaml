title: INT8 Quantization Outliers
scenario: An engineer applies standard INT8 per-tensor quantization to a 30B parameter LLM for serving on GPUs. Post-quantization, the model fits in memory but the generated text degrades severely, becoming nonsensical.
question: Diagnose the root cause of the degradation in standard INT8 per-tensor quantization for LLMs and propose a method to fix it.
details:
  realistic_solution: 'Standard per-tensor INT8 quantization uses a single scale factor for an entire activation tensor. LLMs beyond ~6B parameters systematically develop massive outlier features in specific activation channels. A single scale factor causes these outliers to crush the precision of all other values. Utilize SmoothQuant, LLM.int8() mixed precision, or finer-grained per-token/group-wise quantization to mitigate this.'
  common_mistake: |
    **The Pitfall:** Blaming weight quantization clipping exclusively.
    **The Rationale:** Candidates ignore the distinct, systematic outlier activation phenomenon present in large LLMs.
    **The Consequence:** Standard quantization techniques fail, and engineers might erroneously conclude the model cannot be quantized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Typical activation value: ~1.0.
    - Outlier activation value: 1000.0.
    - INT8 quantization range: [-128, 127].

    **Calculations:**
    - Scaling factor: 127 / 1000.0 = 0.127.
    - Quantized outlier: 1000.0 * 0.127 = 127.
    - Quantized typical value: 1.0 * 0.127 = 0.127.
    - Rounding typical value: round(0.127) = 0.

    **Conclusion & Interpretation:**
    - **Result: 0 (Precision-Bound)**. The single extreme outlier forces the scaling factor so low that all typical signals are crushed to zero, entirely destroying the model's representation.
