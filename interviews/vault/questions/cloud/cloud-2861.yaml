title: INT8 Quantization Outliers
scenario: An engineer applies standard INT8 per-tensor quantization to a 30B parameter LLM for serving on A100s. Post-quantization, the model fits in memory but the generated text degrades severely, becoming nonsensical.
question: Diagnose the root cause of the degradation in standard INT8 per-tensor quantization for LLMs and propose a method to fix it.
details:
  realistic_solution: Standard per-tensor INT8 quantization uses a single scale factor for an entire activation tensor. LLMs beyond ~6B parameters systematically develop massive outlier features in specific activation channels. A single scale factor causes these outliers to crush the precision of all other values. The candidate should propose using SmoothQuant, LLM.int8() (mixed precision), or finer-grained per-token/group-wise quantization.
  common_mistake: |
    **The Pitfall:** Blaming weight quantization clipping exclusively.
    **The Rationale:** Candidates ignore the distinct, systematic outlier activation phenomenon present in large LLMs.
    **The Consequence:** Standard quantization techniques fail, and engineers might erroneously conclude the model cannot be quantized.
  napkin_math: |
    *   **Typical Activation:** ~1.0.
    *   **Outlier Activation:** 1000.0.
    *   **Quantization Range:** [-128, 127].
    *   **Scaling Factor:** 127 / 1000.0 = 0.127.
    *   **Quantized Typical Value:** 1.0 × 0.127 = 0.127 -> rounds to 0.
    *   **Result:** **The outlier maps to 127, while the typical signals are crushed to 0, destroying the model's representation.**
