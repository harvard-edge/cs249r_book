title: INT8 Quantization Outliers
scenario: An engineer applies standard INT8 per-tensor quantization to a 30B parameter
  LLM for serving on A100s. Post-quantization, the model fits in memory but the generated
  text degrades severely, becoming nonsensical.
question: Diagnose the root cause of the degradation in standard INT8 per-tensor quantization
  for LLMs and propose a method to fix it.
details:
  realistic_solution: Standard per-tensor INT8 quantization uses a single scale factor
    for an entire activation tensor. LLMs beyond ~6B parameters systematically develop
    massive outlier features in specific activation channels. A single scale factor
    causes these outliers to crush the precision of all other values. The candidate
    should propose using SmoothQuant, LLM.int8() (mixed precision), or finer-grained
    per-token/group-wise quantization.
  common_mistake: Assuming the degradation is strictly due to weight quantization
    clipping, ignoring the distinct, systematic outlier activation phenomenon in large
    LLMs.
  napkin_math: If typical activations are ~1.0 and an outlier is 1000.0, scaling into
    [-128, 127] maps 1000.0 to 127 and 1.0 to 0.127 (quantized to 0), destroying the
    signal.
