title: Counting Parameters in a Module Hierarchy
scenario: A model has an Embedding(50000, 512), 6x TransformerBlocks each containing [Linear(512,2048), Linear(2048,512), LayerNorm(512), LayerNorm(512)], and a final Linear(512,50000).
question: How many total parameters does this Embedding, 6-block Transformer, and final Linear model have including biases?
details:
  realistic_solution: 'Embedding: 50,000 × 512 = 25,600,000 (no bias). Per TransformerBlock: Linear(512,2048) = 512×2048 + 2048 = 1,050,624. Linear(2048,512) = 2048×512 + 512 = 1,049,088. LayerNorm(512) = 512 + 512 = 1,024 (scale + shift). LayerNorm(512) = 1,024. Block total = 1,050,624 + 1,049,088 + 1,024 + 1,024 = 2,101,760. 6 blocks = 12,610,560. Final Linear(512,50000) = 512×50,000 + 50,000 = 25,650,000. Total = 25,600,000 + 12,610,560 + 25,650,000 = 63,860,560 ≈ 64M parameters. Memory in FP16: 64M × 2 = 128 MB.'
  common_mistake: |
    **The Pitfall:** Forgetting the bias terms in Linear layers or the learnable scale and shift parameters in LayerNorms.
    **The Rationale:** Candidates often rely on quick weight-only approximations (W = in * out) and forget that biases and norm parameters add up significantly in deep models.
    **The Consequence:** Incorrect memory capacity planning, especially when determining precise optimizer states or communication bounds for distributed training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: Embedding(50000, 512), 6x TransformerBlocks, final Linear(512,50000).
    - Precision: FP16 (2 bytes per parameter).

    **Calculations:**
    - Embedding: 50,000 * 512 = 25,600,000 parameters.
    - Transformer Block Linear layers: (512 * 2048 + 2048) + (2048 * 512 + 512) = 2,099,712 parameters.
    - Transformer Block LayerNorms: (512 + 512) * 2 = 2,048 parameters.
    - Total per Block: 2,101,760 parameters. 6 Blocks = 12,610,560.
    - Final Linear: 512 * 50,000 + 50,000 = 25,650,000 parameters.
    - Total Parameters: 25,600,000 + 12,610,560 + 25,650,000 = 63,860,560.

    **Conclusion & Interpretation:**
    - **Result: ~128 MB VRAM (Memory Capacity-Bound).** The model has ~64M parameters, requiring ~128 MB of VRAM in FP16.
