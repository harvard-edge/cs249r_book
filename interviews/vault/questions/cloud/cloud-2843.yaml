title: Cloud New 0038
scenario: Cloud clusters use thousands of GPUs, making node failures inevitable. Recall the concept of
  a heartbeat mechanism and how the cluster orchestrator detects a dead node.
details:
  realistic_solution: A heartbeat mechanism involves worker nodes sending regular, periodic signals (pings)
    to a central master or orchestrator node to indicate they are alive and functioning. If the orchestrator
    stops receiving heartbeats from a specific node for a predetermined timeout period, it assumes the
    node has failed, isolates it, and reloads the last checkpoint.
  common_mistake: Assuming the GPU itself sends a hardware-level interrupt directly to the cloud provider,
    rather than the distributed software framework implementing a software ping.
  napkin_math: If a heartbeat interval is 5 seconds and the timeout is 15 seconds, a node failure occurring
    right after a heartbeat will take at most 15 seconds to be detected. The whole 312 TFLOPS cluster
    idles during this time.
