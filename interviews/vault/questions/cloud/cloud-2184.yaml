title: The Gradient Bucket Fusion Tradeoff
scenario: PyTorch DDP defaults to a 25 MB gradient bucket size for AllReduce. Your team is training a model with 500 layers, each producing a 50 KB gradient tensor. A colleague suggests increasing the bucket size to 100 MB 'for better bandwidth utilization.' Another suggests decreasing it to 1 MB 'for faster overlap with backward pass.'
question: "Who is right, and what is the real tradeoff being managed?"
details:
  realistic_solution: 'Both are partially right, but the bucket size must balance two competing forces. Larger buckets (100 MB) amortize the per-message startup latency across more data, but delay the overlap with computation. Smaller buckets (1 MB) finish quickly, enabling aggressive overlap with backward compute, but suffer high latency overheads. The 25 MB default is a well-calibrated middle ground.'
  common_mistake: |
    **The Pitfall:** Optimizing only one side of the bandwidth vs. latency tradeoff.
    **The Rationale:** Candidates assume larger buckets always improve bandwidth utilization or smaller buckets always improve overlap without recognizing the per-message latency costs.
    **The Consequence:** Choosing an extreme size either serializes communication and computation or destroys bandwidth efficiency via latency overhead.
  napkin_math: |
    1. Total gradients: 500 layers × 50 KB = 25 MB. Assume 32 GPUs, Ring AllReduce, 50 GB/s InfiniBand. Latency per bucket: 2 × 31 × 5 μs = 310 μs.
    2. 1 MB bucket: 25 buckets. BW time per bucket: 2 × (31/32) × 1 MB / 50 GB/s = 39 μs. Per bucket total: 310 + 39 = 349 μs. Serialized: 25 × 349 μs = 8.7 ms (latency overhead is 89%).
    3. 25 MB bucket (default): 1 bucket. BW time: 2 × (31/32) × 25 MB / 50 GB/s = 0.97 ms. Total: 310 μs + 0.97 ms = 1.28 ms (limited overlap with backward pass).
    4. 100 MB bucket: 1 bucket (total grads only 25 MB). Same as 25 MB case.
    5. **Sweet spot (~5 MB buckets): 5 buckets. BW per bucket: 194 μs. Total per bucket: 504 μs. Buckets fill during backward pass enabling optimal overlap with compute.**
  options:
  - The communication bottleneck is the broadcast of input data batches to each GPU at the start of every training step; with 8 GPUs each needing the full batch, bandwidth scales linearly with GPU count
  - The communication bottleneck is the AllReduce of gradients during data-parallel training. For a model with P parameters in FP16, Ring AllReduce transfers ~4P bytes (2P reduce-scatter + 2P all-gather) through each link. The overlap ratio depends on whether gradient AllReduce can be pipelined with backward computation — with bucketed/overlapped AllReduce, communication is partially hidden behind compute.
  - The communication bottleneck is synchronizing random number generator states across GPUs to ensure identical dropout masks; this requires a barrier synchronization every layer
  - AllReduce communication cost is fixed regardless of model size because modern NVLink uses hardware-accelerated reduction; the real bottleneck is CPU-GPU PCIe transfers for data loading
  correct_index: 1
