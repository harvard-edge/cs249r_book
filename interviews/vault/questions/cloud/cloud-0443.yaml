title: 'The Chatbot Latency Crisis: Speculative Decoding'
scenario: You are leading an interactive chatbot service built on a 7B LLM running on H100 GPUs. The service is memory-bandwidth bound; each token generation is limited by the time it takes to read the model weights from HBM. Autoregressive generation is too slow, and users are complaining about latency. You cannot change the model or hardware.
question: "How can you apply speculative decoding to decrease the perceived latency and increase the tokens/second for your users?"
details:
  realistic_solution: Speculative decoding can significantly improve throughput in memory-bandwidth-bound scenarios. It works by using a much smaller, faster 'draft' model to generate a chunk of K candidate tokens. Then, the large, accurate 7B model validates all K tokens in a single, parallel forward pass. Since the time for this pass is dominated by reading the 14GB of weights (one time), and this cost is similar to generating just one token autoregressively, you effectively get multiple tokens for the price of one.
  common_mistake: |
    **The Pitfall:** Suggesting larger batch sizes or simple model pruning.
    **The Rationale:** Candidates assume batching improves latency or fail to recognize that the memory bandwidth is the fixed constraint for single-user latency.
    **The Consequence:** Increasing batch size increases individual user latency, worsening the chatbot experience.
  napkin_math: |
    1. 7B model in FP16 = 14 GB.
    2. H100 HBM3 bandwidth = 3.35 TB/s.
    3. Autoregressive decode takes 14 GB / 3.35 TB/s = 4.17 ms per token (239 tok/s).
    4. With speculative decoding (k=5), 5 draft tokens are generated and verified in one 14 GB memory load (4.17 ms) + overhead.
    5. **This yields an effective latency of ~1.0 ms per token.**
  options:
  - Increase the inference batch size to better saturate the GPU's compute units.
  - Use a small draft model to generate candidate tokens and a single large model pass to verify them.
  - Implement FlashAttention to speed up the self-attention calculations.
  - Switch from FP16 to INT8 quantization to reduce the memory footprint.
  correct_index: 1
