title: Evaluating High-Throughput Immutable Audit Trails
scenario: Your financial ML service processes 50,000 inference requests per second. Compliance mandates an immutable audit trail for every prediction (averaging 2KB per log entry, including features, logits, and user ID). You are evaluating two architectures for the audit system: inline synchronous cryptographic ledgering which adds 15ms latency per transaction, versus asynchronous batching via a message queue to S3 WORM (Write Once, Read Many) storage which adds 0.5ms but has a 5-second eventual consistency window.
question: Which audit architecture meets the <50ms inference SLA and 7-year WORM retention at 50,000 requests per second?
details:
  realistic_solution: Choose asynchronous batching to S3 with Object Lock (WORM compliance mode). Buffer logs in a highly available queue, batch them, and flush to S3. This handles the 100 MB/s write throughput effortlessly, decouples audit latency from the critical inference path, and meets regulatory requirements.
  common_mistake: |
    **The Pitfall:** Reflexively choosing inline blockchain or synchronous cryptographic ledgers for 'immutability'.
    **The Rationale:** Candidates assume only synchronous distributed ledgers satisfy financial compliance constraints.
    **The Consequence:** The inline latency destroys the SLA, requiring massive parallel scaling just to wait on I/O, completely breaking the system under load.
  napkin_math: |
    - Throughput: 50,000 req/s * 2KB = 100 MB/s.
    - Daily storage: 100 MB/s * 86,400s = 8.64 TB/day (22 PB over 7 years).
    - Synchronous ledgering adds 50,000 * 15ms = 750 seconds of compute wait time per wall-clock second.
    - **Async WORM storage absorbs 100 MB/s natively without introducing blocking wait times, safely meeting the SLA.**
