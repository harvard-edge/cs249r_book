title: Evaluating Static Memory Planning vs Dynamic Allocation
scenario: Your team is deploying a 13B parameter Transformer model (26GB FP16 weights) on NVIDIA A100
  (80GB HBM) GPUs for an API serving highly variable sequence lengths (10 to 4096 tokens) with a maximum
  batch size of 16. The current serving engine uses dynamic memory allocation for activations, which leads
  to 30% memory fragmentation and causes unexpected OOM errors during peak load. You are evaluating a
  static memory planning compiler that calculates exact tensor offsets ahead-of-time (AOT) to eliminate
  dynamic allocation overhead and fragmentation. Evaluate the trade-offs between dynamic allocation, static
  planning with a single maximum shape, and static planning with bucketing, and justify your final architectural
  design.
question: "How should you choose between dynamic allocation, static max-shape planning, and bucketed static planning for the variable-length 13B LLM?"
details:
  realistic_solution: Implement static memory planning with power-of-2 bucketing for sequence lengths
    (e.g., 128, 256, 512... 4096). This completely eliminates runtime allocation overhead and fragmentation
    while bounding the maximum memory waste per request to 50%.
  common_mistake: Candidates often assume static memory planning is strictly superior and fail to account
    for the catastrophic memory bloat caused by statically allocating the maximum possible sequence length
    for every request, which destroys concurrency.
  napkin_math: 'Dynamic: 40GB activations + 30% fragmentation = 52GB (26GB weights + 52GB = 78GB, risking
    OOM on 80GB GPU). Single Max-Shape: A 10-token request uses 4096 tokens of memory, wasting 99.7%.
    Bucketing (power-of-2): A request of 2049 tokens is planned for 4096, bounding maximum activation
    memory waste to (4096-2049)/4096 ≈ 50%, while achieving 0% fragmentation.'
