title: Evaluating Static Memory Planning vs Dynamic Allocation
scenario: 'Your team is deploying a 13B parameter Transformer model (26GB FP16 weights) on NVIDIA A100 (80GB HBM) GPUs for an API serving highly variable sequence lengths (10 to 4096 tokens) with a maximum batch size of 16. The current serving engine uses dynamic memory allocation for activations, which leads to 30% memory fragmentation and causes unexpected OOM errors during peak load. You must evaluate memory planning alternatives.'
question: "How should you choose between dynamic allocation, static max-shape planning, and bucketed static planning for serving this variable-length 13B LLM?"
details:
  realistic_solution: Implement static memory planning with power-of-2 bucketing for sequence lengths (e.g., 128, 256, 512... 4096). This completely eliminates runtime allocation overhead and fragmentation while bounding the maximum memory waste per request to 50%.
  common_mistake: |
    **The Pitfall:** Assuming static memory planning for the maximum possible sequence length is strictly superior to dynamic allocation.
    **The Rationale:** Static planning eliminates fragmentation and allocation overhead, which seems ideal.
    **The Consequence:** Catastrophic memory bloat that destroys concurrency, as a 10-token request reserves memory for 4096 tokens, wasting 99.7% of the allocation and leading to massive underutilization.
  napkin_math: |
    1. **Dynamic Allocation:** 40GB activations + 30% fragmentation = 52GB. Total memory = 26GB weights + 52GB activations = 78GB (risking OOM on an 80GB GPU).
    2. **Static Max-Shape:** A 10-token request pre-allocates for 4096 tokens, wasting 99.7% of its activation memory footprint and drastically reducing maximum batch size.
    3. **Bucketing (Power-of-2):** A request of 2049 tokens uses a 4096-token bucket, bounding maximum activation memory waste to (4096-2049)/4096 ≈ **50%**, while achieving **0% fragmentation** and 0 allocation overhead.
