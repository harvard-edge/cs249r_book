title: Federated Training Readiness With Missing Client Data
scenario: A team wants to launch federated personalization for a keyboard model across
  5 million devices. They tell you each round can contact 50,000 devices and the global
  model is 120 MB, but they have not specified device availability, uplink bandwidth,
  dropout rate, privacy budget, or non-IID skew.
question: What additional information do you need before sizing this federated rollout,
  and what bounds can you compute from the 120 MB model and 50,000 clients/round?
details:
  realistic_solution: You can bound the worst-case downlink as 50,000 x 120 MB = 6,000,000
    MB, or about 6 TB per round if every selected device downloads the full model.
    But you cannot size round duration, convergence, or infrastructure without availability,
    bandwidth, dropout, compression, update size, and privacy constraints. A Staff
    answer should state the known traffic bound and request missing operational parameters.
  common_mistake: Pretending the number of clients and model size are enough to estimate
    round time and training cost.
  napkin_math: Worst-case full-model downlink = 50,000 x 120 MB = 6,000,000 MB ≈ 6
    TB per round. If updates are also 120 MB, uplink is another ~6 TB before compression
    and dropout.
