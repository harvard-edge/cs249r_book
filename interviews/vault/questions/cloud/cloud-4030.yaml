title: Cross-Job Congestion Isolation in Multi-Tenant Clusters
scenario: You manage a shared 2048-MI300X cluster running 4 concurrent training jobs
  of varying sizes (128, 256, 512, and 1024 GPUs). Job A's AllReduce traffic must
  not cause congestion that degrades Job B's performance. Specify the network isolation
  architecture, including traffic classification, buffer partitioning, and congestion
  domain boundaries.
question: How would you isolate four concurrent AllReduce jobs so one job's congestion
  cannot degrade another's performance?
details:
  realistic_solution: 'Multi-layer isolation specification: (1) Traffic classification:
    assign each job a unique DSCP value (0, 8, 16, 24) mapped to separate traffic
    classes (TC0-TC3) at the NIC via DCBX. (2) Buffer partitioning: configure strict
    per-TC buffer allocation on all switches — each TC gets 25% of shared buffer (16MB
    out of 64MB). Use dynamic thresholds within each TC but not across TCs. (3) PFC
    per-priority: enable PFC independently per TC so Job A''s PFC pauses only affect
    TC0, not TC1-TC3. (4) ECN per-TC: independent Kmin/Kmax thresholds per TC, scaled
    to each TC''s buffer allocation. (5) Bandwidth scheduling: use weighted fair queuing
    (WFQ) with weights proportional to GPU count (128:256:512:1024 = 1:2:4:8). (6)
    Physical rail affinity: assign each job to preferred rails to minimize cross-job
    path overlap. Monitoring: per-TC drop counters, per-TC PFC pause duration, cross-TC
    interference metric (correlation of throughput dips between jobs).'
  common_mistake: Relying solely on VLANs for isolation. VLANs provide logical separation
    but share physical switch buffers. A large AllReduce burst in Job A's VLAN can
    still consume shared buffer and trigger PFC pauses that affect Job B's ports.
  napkin_math: '2048 MI300X at 400Gbps each = 819 Tbps total NIC bandwidth. Job allocation:
    128 (6.25%), 256 (12.5%), 512 (25%), 1024 (50%). Buffer per TC with 64MB shared:
    16MB each. 1024-GPU job''s AllReduce: 2GB gradient across 1024 GPUs via tree =
    multiple incast points consuming up to 16MB buffer in TC3. Without isolation:
    this incast spills into other TCs. With strict partitioning: contained to TC3''s
    16MB allocation.'
