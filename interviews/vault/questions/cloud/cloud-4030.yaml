title: Cross-Job Congestion Isolation in Multi-Tenant Clusters
scenario: You manage a shared 2048-MI300X cluster running 4 concurrent training jobs of varying sizes (128, 256, 512, and 1024 GPUs). Job A's AllReduce traffic must not cause congestion that degrades Job B's performance.
question: "Specify the network isolation architecture to prevent one job's AllReduce congestion from degrading another's performance."
details:
  realistic_solution: 'Multi-layer isolation specification: (1) Traffic classification: assign each job a unique DSCP value (0, 8, 16, 24) mapped to separate traffic classes (TC0-TC3) at the NIC via DCBX. (2) Buffer partitioning: configure strict per-TC buffer allocation on all switches — each TC gets 25% of shared buffer (16MB out of 64MB). Use dynamic thresholds within each TC but not across TCs. (3) PFC per-priority: enable PFC independently per TC so Job A''s PFC pauses only affect TC0, not TC1-TC3. (4) ECN per-TC: independent Kmin/Kmax thresholds per TC, scaled to each TC''s buffer allocation. (5) Bandwidth scheduling: use weighted fair queuing (WFQ) with weights proportional to GPU count (128:256:512:1024 = 1:2:4:8). (6) Physical rail affinity: assign each job to preferred rails to minimize cross-job path overlap. Monitoring: per-TC drop counters, per-TC PFC pause duration, cross-TC interference metric (correlation of throughput dips between jobs).'
  common_mistake: |
    **The Pitfall:** Relying solely on VLANs for network isolation.
    **The Rationale:** Candidates understand VLANs provide logical broadcast domain separation but forget they still share physical switch buffers.
    **The Consequence:** A large burst in one VLAN consumes the shared buffer and triggers PFC pauses that throttle traffic across all other VLANs.
  napkin_math: |
    - Total cluster size: 2048 GPUs.
    - Job allocation: 128 (6.25%), 256 (12.5%), 512 (25%), 1024 (50%).
    - Shared switch buffer: 64 MB. 
    - Buffer partition per Traffic Class (TC): 16 MB each (25%).
    - 1024-GPU job's AllReduce (2 GB gradient) creates incasts consuming up to 16 MB in TC3.
    - **Result: Strict partitioning contains the incast to TC3's 16 MB, leaving TC0-TC2's 48 MB unaffected for other jobs.**
