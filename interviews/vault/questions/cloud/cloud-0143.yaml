title: The SLO vs. Throughput Squeeze
scenario: You are designing an LLM serving system for a 13B model on H100 GPUs. Your
  workload consists of long conversations (average 2048 prompt tokens, 2048 completion
  tokens). The business requires a P99 TTFT of less than 400ms. Using a simple static
  batching strategy, analyze the trade-off between throughput (batch size) and this
  strict TTFT SLO. Calculate the maximum batch size you can support, and explain the
  implications for your system's throughput.
question: What maximum static batch size can meet the 400ms P99 TTFT SLO for 2048-token
  prompts and completions, and what does it imply for throughput?
details:
  realistic_solution: 'The P99 TTFT is dominated by waiting for the previous batch''s
    decode phase to complete. For a 13B model on H100 at batch=1: model weights =
    26 GB (FP16), decode = 26 GB / 3.35 TB/s = 7.76 ms/token, so 2048 tokens of decode
    = 15.9 seconds. Prefill = 2 × 13B × 2048 / 989 TFLOPS ≈ 54-108 ms depending on
    utilization. Total batch time ≈ 16 seconds. Even at B=1, a worst-case arriving
    request waits 16 seconds — 40× the 400 ms SLO. Static batching fundamentally fails
    because the long decode phase blocks all new prefills. Continuous batching solves
    this by interleaving prefill of new requests between decode iterations (~7.76
    ms apart), achieving P99 TTFT ≈ prefill time + one decode step ≈ 116 ms.'
  common_mistake: Focusing only on the inference time for a single request. This ignores
    the queuing dynamics that dominate P99 latency. Engineers often calculate the
    best-case TTFT (an empty queue) and assume they have plenty of headroom, failing
    to account for the 'wait for previous batch' time in a production system under
    load.
  napkin_math: '**Setup:** 13B model on H100, static batching, 2048 prompt tokens,
    2048 completion tokens.


    **Step 1: Prefill time per sequence.**

    FLOPs per prefill = 2 × 13×10^9 × 2048 = 53.25 TFLOPs.

    H100 FP16 peak = 989 TFLOPS. At ~50% MFU for prefill: effective = 494.5 TFLOPS.

    Prefill time = 53.25×10^12 / 494.5×10^12 ≈ 108 ms per sequence.

    (At 100% utilization: 53.25/989 = 53.8 ms — use this as lower bound.)


    **Step 2: Decode time per token (memory-bound, batch=1).**

    Model weights in FP16 = 13×10^9 × 2 bytes = 26 GB.

    H100 HBM3 bandwidth = 3.35 TB/s.

    Per-token decode latency = 26 GB / 3.35 TB/s = 7.76 ms/token.


    **Step 3: Total decode time for 2048 output tokens.**

    Decode = 2048 × 7.76 ms = 15.9 seconds per sequence.


    **Step 4: Static batch processing time at batch size B.**

    T_batch(B) = B × 108 ms (prefill, sequential) + 2048 × 7.76 ms (decode, parallel
    across batch).

    For B=1: T_batch = 108 ms + 15,900 ms ≈ 16.0 seconds.


    **Step 5: P99 TTFT analysis.**

    In static batching, a new request arriving must wait for the current batch to
    complete before its prefill begins.

    P99 TTFT ≈ T_wait(worst case) + T_own_prefill.

    Worst case: request arrives just as previous batch starts → wait = T_batch(B).

    For B=1: P99 TTFT = 16,000 ms + 108 ms ≈ 16.1 seconds >> 400 ms SLO.


    **Step 6: Conclusion.**

    Even at B=1, the P99 TTFT is ~16 seconds because the long decode phase (15.9s)
    of the previous batch blocks new requests. The 400 ms SLO requires T_batch < 400
    ms, but decode alone takes 15.9s. Static batching is fundamentally incompatible
    with strict TTFT SLOs when completions are long. Continuous batching decouples
    prefill scheduling from decode, allowing new requests to begin prefill while other
    requests are mid-decode, achieving TTFT ≈ prefill time ≈ 108 ms.'
