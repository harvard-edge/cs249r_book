title: The SLO vs. Throughput Squeeze
scenario: 'You are designing an LLM serving system for a 13B model on H100 GPUs. Workload consists of long conversations (2048 prompt, 2048 completion). The business requires a P99 TTFT of less than 400ms.'
question: 'What maximum static batch size can meet the 400ms P99 TTFT SLO, and what does it imply for throughput?'
details:
  realistic_solution: 'Continuous batching is mandatory. For a 13B model on H100 at batch=1, prefill takes ~108ms and decode takes ~16 seconds. A worst-case arriving request waits 16 seconds (40x the 400ms SLO). Static batching fundamentally fails because the long decode phase blocks all new prefills.'
  common_mistake: |
    **The Pitfall:** Focusing only on the inference time for a single request.
    **The Rationale:** Candidates ignore queuing dynamics that dominate P99 latency, calculating best-case TTFT.
    **The Consequence:** The system violates the SLO under load because requests wait behind massive static batches.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 13B model on H100 (3.35 TB/s bandwidth, 494.5 TFLOPS MFU).
       - 2048 tokens prefill, 2048 decode.
    2. **Calculations:**
       - Prefill Time: (2 * 13e9 * 2048) / 494.5 TFLOPS = 108 ms.
       - Decode Time per Token: 26 GB / 3.35 TB/s = 7.76 ms/token.
       - Total Decode Time: 2048 * 7.76 ms = 15.9 seconds.
       - Static Batch Wait (B=1): 108 ms + 15,900 ms = ~16 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 16.1s P99 TTFT with static batching.**
       - **Conclusion: Queue-Bound; static batching is mathematically incompatible with the SLO.**