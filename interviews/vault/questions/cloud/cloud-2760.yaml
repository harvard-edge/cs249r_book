title: Exploration Budget for Breaking Feedback Loops
scenario: Your recommendation system serves 10M recommendations/day. You allocate 5% exploration (random
  recommendations) to break feedback loops. Each exploration recommendation has 50% lower CTR than model-selected
  ones. Calculate the daily CTR impact and how much unbiased training data you gain per week.
details:
  realistic_solution: 'Model-selected CTR: assume 4%. Exploration CTR: 4% × 50% = 2%. Daily recommendations:
    10M. Exploration: 500K (5%), model-selected: 9.5M (95%). CTR impact: model-selected clicks: 9.5M ×
    4% = 380K. Exploration clicks: 500K × 2% = 10K. Total clicks: 390K vs 400K (without exploration).
    CTR drop: (400K-390K)/10M = 0.1 percentage points (4.0% → 3.9%). That is a 2.5% relative CTR decrease.
    Unbiased training data per week: 500K × 7 = 3.5M unbiased data points per week. This unbiased data
    is crucial for: accurately estimating engagement for underexplored content, detecting and correcting
    feedback loops, and training models that generalize better. The 0.1pp CTR cost buys significantly
    better long-term model quality.'
  common_mistake: Thinking 5% exploration is negligible. At 10M recs/day, it is 500K sub-optimal recommendations
    daily — a meaningful cost that must be justified by the data quality improvement.
  napkin_math: '5% exploration at 50% CTR penalty: 0.05 × 0.50 × base_CTR = 0.1pp CTR drop. Weekly unbiased
    data: 3.5M points. Worth it for long-term model health.'
