title: Exploration Budget for Breaking Feedback Loops
scenario: Your recommendation system serves 10M recommendations/day with a base click-through rate (CTR) of 4.0%. You allocate 5% exploration (random recommendations) to break feedback loops. Each exploration recommendation has 50% lower CTR than model-selected ones.
question: "At 10M recommendations/day, what CTR impact does 5% exploration with 50% lower CTR have, and how much unbiased data do you gain weekly?"
details:
  realistic_solution: 'Model-selected CTR: assume 4%. Exploration CTR: 4% × 50% = 2%. Daily recommendations: 10M. Exploration: 500K (5%), model-selected: 9.5M (95%). CTR impact: model-selected clicks: 9.5M × 4% = 380K. Exploration clicks: 500K × 2% = 10K. Total clicks: 390K vs 400K (without exploration). CTR drop: (400K-390K)/10M = 0.1 percentage points (4.0% → 3.9%). That is a 2.5% relative CTR decrease. Unbiased training data per week: 500K × 7 = 3.5M unbiased data points per week. This unbiased data is crucial for: accurately estimating engagement for underexplored content, detecting and correcting feedback loops, and training models that generalize better. The 0.1pp CTR cost buys significantly better long-term model quality.'
  common_mistake: |
    **The Pitfall:** Assuming a 5% exploration rate has a negligible impact on overall system metrics.
    **The Rationale:** Candidates often underestimate the absolute volume of sub-optimal recommendations at scale.
    **The Consequence:** Failing to justify the short-term engagement cost to stakeholders, potentially leading to the removal of exploration and the entrenchment of feedback loops.
  napkin_math: |
    - Base CTR = 4.0%. Exploration CTR = 4.0% × 50% = 2.0%.
    - Model-selected (95%): 9.5M × 4.0% = 380K clicks.
    - Exploration (5%): 0.5M × 2.0% = 10K clicks.
    - Total clicks: 390K (vs 400K without exploration).
    - New overall CTR: 390K / 10M = 3.9%.
    - CTR Drop: 4.0% - 3.9% = 0.1 percentage points (a 2.5% relative decrease).
    - **Weekly unbiased data gained: 500K × 7 = 3.5M data points per week.**
