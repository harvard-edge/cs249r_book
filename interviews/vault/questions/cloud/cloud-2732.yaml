title: Link Budget Fundamentals
scenario: A datacenter architect says 'we cannot run 400G over 5 meters of passive copper.' Explain what
  a link budget is and why it determines whether a given cable type and distance will work at a given
  speed.
details:
  realistic_solution: 'A link budget is the accounting of all signal power gains and losses from transmitter
    to receiver. The transmitter outputs a signal at a certain power level. As it travels through the
    cable, connectors, and board traces, it loses power (attenuation). The receiver needs a minimum signal-to-noise
    ratio (SNR) to correctly decode bits. The link budget equation: TX power - cable loss - connector
    loss - board trace loss ≥ RX sensitivity + margin. At 400G using PAM4 signaling (4 levels per symbol),
    the required SNR is much higher than at lower speeds, so the margin shrinks. Copper cables attenuate
    more at higher frequencies, so 400G PAM4 over copper has a maximum reach of ~3m for passive cables.
    Beyond that, you need active copper cables (with built-in amplifiers) or optical transceivers.'
  common_mistake: Thinking cable distance is only limited by signal speed/propagation delay. The real
    limit is signal attenuation — the signal degrades with distance until the receiver cannot distinguish
    bits from noise.
  napkin_math: '400G PAM4 over passive copper: ~3m max. Active copper: ~5-7m. Optical: 100m+ (multimode)
    to 10km+ (single-mode). Higher speed → tighter link budget → shorter copper reach.'
