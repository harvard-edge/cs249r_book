title: Die-to-Die Interconnect Bottleneck in Chiplet ASICs
scenario: Evaluating a next-gen cloud accelerator composed of 4 identical compute chiplets integrated
  via a 2.5D silicon interposer. Workload A (a massive element-wise GeLU) achieves 800 TFLOPS. Workload
  B (a large Matrix Multiply requiring global reductions across the M dimension) only achieves 120 TFLOPS,
  despite having identical theoretical FLOP counts. The package power draw spikes near the chip edges.
details:
  realistic_solution: 'Workload A (element-wise GeLU) requires zero inter-chiplet communication — each
    chiplet processes its local partition independently at full throughput. Workload B (GEMM partitioned
    along the reduction dimension K) requires partial-sum reduction across all 4 chiplets via the D2D
    interposer. Each partial sum is 512 MB, and the ring AllReduce across 4 chiplets takes 15-30 ms depending
    on effective D2D bandwidth (50 GB/s nominal, but reduced by protocol overhead, contention, and synchronization).
    Combined with compute time (~11 ms), the total time reaches ~50-73 ms, yielding only 120-170 TFLOPS
    effective — far below the 800 TFLOPS peak. The edge power spikes from D2D PHY drivers at the chiplet
    boundaries. Fix: repartition the GEMM along M or N dimensions so each chiplet computes complete output
    rows/columns without cross-chiplet reduction.'
  common_mistake: Assuming Workload B is bound by HBM bandwidth or lacks compute parallelization across
    the 4 chiplets.
  napkin_math: '**Setup:** 4 chiplets on 2.5D interposer. Assume D2D bandwidth = 50 GB/s per chiplet-to-chiplet
    link, 200 TFLOPS per chiplet (800 TFLOPS total).


    **Workload A (element-wise GeLU):** Embarrassingly parallel — each chiplet operates on its 1/4 partition
    with zero inter-chiplet traffic. Achieves full 800 TFLOPS.


    **Workload B (16K×16K×16K GEMM, FP16):**

    Total FLOPs = 2 × 16384³ = 8.796 TFLOPs.

    Partitioned along K (reduction dimension): each chiplet computes a 16K×4K×16K partial product.

    Per-chiplet compute: 8.796/4 = 2.199 TFLOPs. At 200 TFLOPS: 11.0 ms.


    Partial sums must be reduced: each is 16K × 16K × 2 bytes = 512 MB.

    Ring AllReduce across 4 chiplets: T = 2 × (3/4) × 512 MB / 50 GB/s = 15.4 ms.


    With serialization (compute then reduce): total = 11.0 + 15.4 = 26.4 ms → 333 TFLOPS.

    But in practice: multiple synchronization barriers, memory copy overhead, and pipeline stalls between
    compute and D2D reduce effective throughput further.


    With 2× overhead on D2D (effective ~25 GB/s from protocol + contention): D2D = 30.7 ms. Total = 11.0
    + 30.7 + ~10 ms sync overhead = ~52 ms → ~169 TFLOPS.

    At ~15-20 GB/s effective D2D: total reaches ~73 ms → 120 TFLOPS (matching scenario).


    **Root cause:** The K-dimension partition forces cross-chiplet reduction of large partial sums (512
    MB each). The D2D interposer bandwidth (50 GB/s nominal, lower effective) becomes the bottleneck.


    **Fix:** Partition along M or N (non-reducing) dimensions so each chiplet computes complete output
    tiles without cross-chiplet reduction.'
