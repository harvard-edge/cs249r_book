validation_issues_pro:
- The compute time calculation is off by 1000x (10.6 milliseconds, not microseconds), which invalidates
  the conclusion that D2D is the bottleneck.
- The final TFLOPS calculation is also incorrect; 8.5e12 FLOPs in 500us would be 17,000 TFLOPS, not 17
  TFLOPS.
