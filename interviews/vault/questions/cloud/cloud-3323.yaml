title: Analyzing Mixed-Precision Performance on Google TPU v5e
scenario: You are tasked with optimizing a large language model (LLM) for both training and inference on a Google TPU v5e pod. The model is currently using full FP32 precision.
question: How would migrating this FP32 LLM to BF16 mixed precision on TPU v5e affect memory, throughput, stability, and design choices?
details:
  realistic_solution: A realistic solution involves a systematic approach: (1) Profiling: Profile the FP32 model on TPU v5e to identify memory and compute bottlenecks. (2) BF16 Conversion: Convert model weights and activations to BF16, while keeping critical operations (e.g., softmax, normalization layers) in FP32 or using specific BF16-compatible implementations. (3) Loss Scaling: Implement dynamic or static loss scaling to mitigate gradient underflow during training, especially for small gradients. (4) Optimizer Choice: Use optimizers designed for mixed precision (e.g., Adam with a mixed-precision-aware implementation) or adjust learning rates. (5) Evaluation: Continuously monitor training stability and periodically evaluate the model's accuracy against the FP32 baseline. (6) Inference Optimization: For inference, ensure the BF16 model fits within the 16 GB HBM, and leverage the 197 TFLOPS BF16 throughput. Quantization-aware training or post-training quantization might be explored for further optimization if BF16 isn't sufficient for memory or latency targets.
  common_mistake: |
    **The Pitfall:** Assuming simply casting all tensors to BF16 yields free performance.
    **The Rationale:** Candidates ignore numerical stability, gradient underflow/overflow, and the impact on model accuracy.
    **The Consequence:** The model fails to converge during training, or inference produces degraded, nonsensical outputs.
  napkin_math: |
    *   **Memory Footprint:** FP32 uses 4 bytes per parameter; BF16 uses 2 bytes. A 30 GB FP32 model becomes a 15 GB BF16 model.
    *   **Memory Fit:** 15 GB fits within a single 16 GB HBM chip, whereas 30 GB requires multi-chip distribution.
    *   **Compute Throughput:** A compute-bound layer running in BF16 effectively doubles the raw FLOPs available compared to FP32.
    *   **Conclusion:** **Migrating to BF16 cuts memory footprint in half and potentially doubles throughput, at the cost of requiring careful loss scaling.**
