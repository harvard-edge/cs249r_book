title: Optimizing Large Model Training on NVIDIA A100 with Gradient Checkpointing
scenario: 'You are tasked with training a 50 billion parameter Transformer model on a single NVIDIA A100 GPU (80 GB HBM2e memory, 312 TFLOPS FP16 peak performance, 2.0 TB/s memory bandwidth). Due to the model''s size, standard training methods lead to out-of-memory errors during the backward pass.'
question: 'How would you apply gradient checkpointing to train the 50B Transformer on one 80 GB A100, and what compute-memory trade-off would you expect?'
details:
  realistic_solution: 'Implement a selective gradient checkpointing strategy. Profile the model to identify layers that consume the most activation memory and apply checkpointing only to those layers. For other layers, consider techniques like mixed-precision training (FP16/BF16) and optimizing batch size. Leverage the A100''s high memory bandwidth (2.0 TB/s) to quickly recompute activations for checkpointed layers, minimizing the performance impact. Monitor GPU utilization and memory usage to dynamically adjust checkpointing granularity.'
  common_mistake: |
    **The Pitfall:** Applying gradient checkpointing naively across all layers.
    **The Rationale:** Aiming for maximum memory reduction without considering the variable cost of recomputation per layer type.
    **The Consequence:** Negating memory savings with excessive training time by recomputing layers with high FLOPs and low activation memory.
  napkin_math: |
    * 50B parameter model in FP16 = 100 GB weights (exceeds 80 GB HBM2e alone, requiring offloading/sharding, but assuming focus on activations).
    * Gradient checkpointing primarily saves activation memory, not parameter memory.
    * Recomputation cost for a layer with F FLOPs is roughly F/TFLOPS_FP16.
    * Example: a layer taking 10 TFLOPS to recompute on an A100 (312 TFLOPS FP16) adds about ~32ms of delay per recomputed layer per iteration.
    * **Result: Balances massive activation memory reduction against predictable compute overhead proportional to the FLOPs of the checkpointed layers.**
