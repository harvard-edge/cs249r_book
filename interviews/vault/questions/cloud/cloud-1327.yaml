title: Diagnosing Network Effect Bias in Social A/B Tests
scenario: You are analyzing the results of an A/B test for a new ML-driven content ranking algorithm on a social network with 100M daily active users and an average degree of 150 connections per user. The initial user-level randomized experiment showed a +12% lift in user engagement for the treatment group. However, after rolling out the model to 100% of users, the global engagement metric only increased by +2%. You observe that users in the control group during the experiment interacted heavily with content shared by treatment users.
question: Why did the user-level A/B test show +12% engagement while full rollout gained only +2%, and how should you redesign the experiment?
details:
  realistic_solution: Identify the root cause as network interference (SUTVA violation). Implement graph cluster randomization by partitioning the social graph into densely connected communities (e.g., using the Louvain algorithm) and assigning the A/B treatment at the cluster level to minimize cross-group leakage.
  common_mistake: |
    **The Pitfall:** Attributing the discrepancy solely to novelty effects or feature seasonality.
    **The Rationale:** Candidates default to behavioral explanations instead of recognizing the structural interference within the experimental design.
    **The Consequence:** The team continues using mathematically invalid user-level randomization for social features, forever overestimating product launches due to SUTVA (Stable Unit Treatment Value Assumption) violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M DAU, avg 150 connections.
    - User-level test shows +12% lift.

    **Calculations:**
    - Standard Randomization: ~50% of edges cross groups, causing SUTVA violation.
    - Graph Clustering: Modularity = 0.9 means only ~10% edges cross clusters.

    **Conclusion & Interpretation:**
    - **Result: Cluster-level assignment isolates the treatment effect**. Revealing the true +2% global lift.
