title: Diagnosing Network Effect Bias in Social A/B Tests
scenario: You are analyzing the results of an A/B test for a new ML-driven content ranking algorithm on
  a social network with 100M daily active users and an average degree of 150 connections per user. The
  initial user-level randomized experiment showed a +12% lift in user engagement for the treatment group.
  However, after rolling out the model to 100% of users, the global engagement metric only increased by
  +2%. You observe that users in the control group during the experiment interacted heavily with content
  shared by treatment users. Diagnose the cause of this discrepancy and propose an experimental design
  to accurately measure the true treatment effect.
details:
  realistic_solution: Identify the root cause as network interference (SUTVA violation). Implement graph
    cluster randomization by partitioning the social graph into densely connected communities (e.g., using
    the Louvain algorithm) and assigning the A/B treatment at the cluster level to minimize cross-group
    leakage.
  common_mistake: Attributing the discrepancy solely to novelty effects or feature seasonality, while
    ignoring SUTVA violations where control users' behavior is altered by their connections to treatment
    users.
  napkin_math: With standard individual randomization, ~50% of a user's 150 edges connect to the opposite
    group, causing high leakage. By using graph clustering with a modularity score of 0.9, only 10% of
    edges cross between treatment and control clusters, reducing baseline inflation and accurately bounding
    the true 2% global lift.
