title: The Energy Roofline
scenario: Your data center team asks you to optimize inference not for throughput or latency, but for energy efficiency (tokens per joule). You have two configurations: Config A runs at 400W and produces 2,000 tokens/sec. Config B runs at 250W and produces 1,400 tokens/sec.
question: Which config has higher tokens per joule, and how would an energy roofline show whether the workload is compute-, bandwidth-, or power-limited?
details:
  realistic_solution: 'First, the comparison: Config A = 2000/400 = 5.0 tokens/joule. Config B = 1400/250 = 5.6 tokens/joule. Config B is 12% more energy-efficient despite lower throughput. The energy roofline extends the classical roofline by adding a third ceiling: the power limit. The three ceilings are: (1) Compute ceiling: peak FLOPS (limited by ALU count x frequency), (2) Bandwidth ceiling: peak BW x arithmetic intensity, (3) Power ceiling: TDP / (energy per FLOP at current frequency). For low-AI workloads (memory-bound), energy is dominated by data movement (DRAM read = ~20 pJ/bit). For high-AI workloads (compute-bound), energy is dominated by computation (FP16 MAC = ~0.4 pJ). The energy roofline reveals a sweet spot: at moderate arithmetic intensity, there exists a frequency where the workload is balanced across all three ceilings. Operating at this point maximizes tokens/joule. DVFS (Dynamic Voltage and Frequency Scaling) is the mechanism: reducing frequency reduces compute power cubically (P ~ V^2 x f ~ f^3 at constant V/f ratio) but doesn''t affect memory bandwidth power, so memory-bound workloads should run at minimum frequency.'
  common_mistake: |
    **The Pitfall:** Optimizing for performance-per-watt by simply lowering clock frequency uniformly.
    **The Rationale:** Candidates ignore that memory bandwidth power doesn't scale down with clock frequency.
    **The Consequence:** Degrading compute-bound workloads linearly without saving energy on memory-bound tasks.
  napkin_math: |
    1. **Config A:** 400W / 2000 tok/s = 5.0 tok/J.
    2. **Config B:** 250W / 1400 tok/s = 5.6 tok/J.
    3. **DRAM Energy:** ~20 pJ/bit. Reading 70B weights = 22.4 J per step.
    4. **Result:** Running memory-bound decoding at 250W takes the same time as 400W, making the lower power state **far more efficient**.
