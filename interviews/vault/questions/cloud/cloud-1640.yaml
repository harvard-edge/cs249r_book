title: Evaluating Networked Serving vs Embedded Deployment
scenario: You are evaluating whether to extract an image embedding model from a monolithic application
  into a standalone networked microservice (using Triton Inference Server) on NVIDIA T4 GPUs. Currently,
  the monolith processes requests unbatched on the GPU, taking 15ms per image. The proposed microservice
  adds a 4ms network RPC round-trip overhead but enables dynamic batching across all incoming traffic.
  On the T4, processing a batch of 8 images takes 20ms. Peak traffic is 400 QPS, and the strict P99 latency
  SLA is 50ms. Evaluate if this architectural shift is justified, calculate the required GPU instance
  count for peak traffic, and determine the optimal maximum batch delay.
details:
  realistic_solution: The networked microservice is highly justified as it reduces required GPUs from
    6 to 1. To meet the 50ms SLA, the max batch delay must be configured to <= 26ms (50ms SLA - 20ms execution
    - 4ms RPC). Setting a 20ms batch delay is optimal, as it exactly accumulates a batch of 8 at 400 QPS.
  common_mistake: Rejecting the networked architecture purely due to the 4ms RPC latency penalty, failing
    to evaluate how cross-request batching increases throughput, or configuring the maximum batch delay
    to >26ms, which would reliably violate the 50ms SLA.
  napkin_math: 'Unbatched Capacity: 1000ms / 15ms = ~66 QPS per GPU (requires ceil(400/66) = 6 GPUs).
    Batched Capacity: 1000ms / 20ms = 50 batches/sec * 8 reqs = 400 QPS (requires 1 GPU). Latency Budget:
    50ms (SLA) - 4ms (RPC) - 20ms (Exec) = 26ms max wait time. At 400 QPS (1 req / 2.5ms), waiting 20ms
    collects exactly 8 requests. Total P99 latency = 20ms (wait) + 20ms (exec) + 4ms (RPC) = 44ms.'
