title: Pipeline Bubble Minimization via 1F1B Scheduling
scenario: Your 4-stage pipeline-parallel training of a 70B model has a pipeline bubble at the end of each
  micro-batch cycle. With 4 stages and 8 micro-batches, the GPipe schedule wastes significant GPU time
  in bubble periods. A colleague suggests switching to the 1F1B (one-forward-one-backward) schedule.
question: "How does switching from GPipe to 1F1B change the bubble fraction and activation memory for 4 stages and 8 micro-batches?"
details:
  realistic_solution: 'GPipe: all forwards first, then all backwards. Bubble = (k-1) micro-batch times
    at the end = (4-1) x t = 3t. 1F1B: after the warm-up phase (k-1 forward passes), alternate one forward
    and one backward per step. Bubble only during warm-up (k-1 forward passes) and cool-down (k-1 backward
    passes). For m micro-batches and k stages: GPipe bubble fraction = (k-1)/m. 1F1B bubble fraction =
    (k-1)/(m + k-1). With k=4, m=8: GPipe = 3/8 = 37.5% bubble. 1F1B = 3/11 = 27.3% bubble. Additionally,
    1F1B reduces peak memory from O(m) to O(k) by freeing activations earlier.'
  common_mistake: Thinking 1F1B eliminates the pipeline bubble entirely. It reduces the bubble from O(k-1)
    micro-batches (where k is the number of stages) to a startup phase, but a bubble still exists during
    the warm-up and cool-down phases.
  napkin_math: '70B model, 4 stages. Each micro-batch forward+backward per stage: ~200ms. GPipe total:
    (8 + 3) x 200ms = 2200ms, bubble = 600ms (27%). 1F1B total: (8 + 3) x 200ms = 2200ms (same total,
    but memory reduced from 8x to 4x activation storage).'
