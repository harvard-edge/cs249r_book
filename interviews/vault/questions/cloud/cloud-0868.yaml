title: Evaluating Flat vs. Hierarchical AllReduce
scenario: You are designing the gradient synchronization topology for a distributed training cluster of
  1024 A100 GPUs configured as 128 nodes with 8 GPUs per node. The intra-node interconnect is NVLink 3.0
  (600 GB/s bidirectional) and the inter-node network is NDR InfiniBand (400 Gbps or 50 GB/s). You need
  to evaluate whether to use a flat Ring AllReduce across all 1024 GPUs or a Hierarchical AllReduce. Compare
  the two approaches for a 2GB gradient synchronization payload, accounting for bandwidth utilization
  and a 2-microsecond inter-node hop latency.
details:
  realistic_solution: Implement a Hierarchical AllReduce (intra-node ReduceScatter over NVLink, inter-node
    AllReduce over InfiniBand, intra-node AllGather over NVLink). This isolates the slower InfiniBand
    network to a 128-node ring, drastically reducing hop latency and allowing intra-node synchronization
    to operate at the full 600 GB/s NVLink bandwidth.
  common_mistake: Assuming that a flat Ring AllReduce is always optimal because it is bandwidth-optimal
    in homogeneous networks, failing to recognize that it forces the ultra-fast NVLink to throttle down
    to the speed of the slowest link (InfiniBand) and incurs massive accumulated hop latency.
  napkin_math: 'Flat Ring: 1023 hops * 2µs = 2.04ms latency overhead. Transfer is bottlenecked globally
    by IB: 2 * (1023/1024) * 2GB / 50GB/s = ~80ms. Hierarchical: Inter-node ring is only 127 hops * 2µs
    = 0.25ms latency overhead. Intra-node NVLink steps (ReduceScatter/AllGather) take roughly 2 * (7/8)
    * 2GB / 600GB/s = ~5.8ms, preventing NVLink from being throttled by the IB network.'
