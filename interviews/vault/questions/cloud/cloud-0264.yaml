title: The HBM Latency Penalty
scenario: You're debugging a GPU kernel and suspect it's memory-bound due to random memory access patterns.
question: What is the approximate latency you should recall for a single memory access to HBM3 on a modern datacenter GPU?
details:
  realistic_solution: A single random memory access to HBM3 takes approximately 300 nanoseconds. While this sounds fast, it's orders of magnitude slower than accessing on-chip caches.
  common_mistake: |
    **The Pitfall:** Underestimating HBM latency by confusing it with on-chip cache speeds.
    **The Rationale:** Engineers often guess 10-50ns, failing to appreciate the 'penalty' for going off-chip to the HBM stacks.
    **The Consequence:** This leads to poor kernel optimization, as the major factor in memory-bound performance is ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - L1 cache access takes ~1ns.
    - L2 cache access takes ~4ns.
    - HBM3 memory access incurs a significant off-chip penalty.

    **Calculations:**
    - HBM3 access time = ~300ns.
    - Ratio comparison = HBM3 is roughly 300x slower than L1.

    **Conclusion & Interpretation:**
    - **Result: ~300ns (Memory-Bound)**. Random accesses that miss the cache and hit HBM3 cause severe latency penalties, making data locality critical.
  options:
  - ~4 ns
  - ~300 ns
  - ~1,000 ns (1 µs)
  - ~40 ns
