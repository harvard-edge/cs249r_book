title: Gradient Quantization to INT8
scenario: To reduce communication time, you quantize FP16 gradients to INT8 before AllReduce and dequantize after. You are using a 2GB gradient buffer on a 64-A100 cluster with 200Gbps NICs.
question: What communication time savings and quantization error result from INT8-quantizing the 2GB FP16 gradients before AllReduce on 64 A100s?
details:
  realistic_solution: 'FP16 gradient: 2GB. INT8 compressed: 1GB (2× compression). Plus scale factors: one per tensor block (typically 128 elements per block). For 2GB FP16 = 1B elements, need 1B/128 = 7.8M scale factors × 4 bytes (FP32) = 31.25MB overhead. Total INT8 payload: 1GB + 31.25MB ≈ 1.03GB. AllReduce time: FP16: 2 × 63/64 × 2GB / (200Gbps/8) = 157.5ms. INT8: 2 × 63/64 × 1.03GB / 25GB/s = 81.1ms. Savings: 76.4ms (48.5% reduction). Quantization error: INT8 has 256 levels covering the FP16 gradient range. With per-block quantization (128 elements), the relative error ≈ 1/(2×256) = 0.2% per element. However, this error is biased — small gradients near zero are quantized to exactly zero, creating a dead zone. Stochastic rounding mitigates this: instead of rounding to nearest INT8, round randomly proportional to the fractional value, making the quantization error unbiased in expectation.'
  common_mistake: |
    **The Pitfall:** Ignoring the overhead of transmitting quantization scale factors.
    **The Rationale:** Candidates assume an exact 50% reduction in data size when moving from FP16 to INT8.
    **The Consequence:** Overestimating communication savings and failing to account for overflow risks during the INT8 reduction.
  napkin_math: |
    - 1. Calculate INT8 payload size: 2 GB FP16 = 1B elements -> 1 GB INT8.
    - 2. Calculate scale factor overhead (128 elements per block): 1B / 128 = 7.8M blocks. 7.8M * 4 bytes = 31.25 MB.
    - 3. Calculate total payload: 1 GB + 31.25 MB = 1.03 GB.
    - 4. Calculate FP16 AllReduce time: 2 * (63/64) * 2 GB / (25 GB/s) = 157.5 ms.
    - 5. Calculate INT8 AllReduce time: 2 * (63/64) * 1.03 GB / (25 GB/s) = 81.1 ms.
    - 6. Conclusion: Communication savings are **76.4 ms (48.5% reduction)**, with ~0.2% quantization error per element.
