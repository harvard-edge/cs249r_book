title: Gradient Quantization to INT8
scenario: To reduce communication time, you quantize FP16 gradients to INT8 before AllReduce and dequantize after. You are using a 2 GiB gradient buffer on a 64-node cluster with 200 Gbps NICs.
question: What communication time savings and quantization error result from INT8-quantizing the 2 GiB FP16 gradients before AllReduce?
details:
  realistic_solution: 'FP16 gradient: 2 GiB. INT8 compressed: 1 GiB (2× compression). Plus scale factors: one per tensor block (typically 128 elements per block). For 2 GiB FP16 = 1B elements, need 1B/128 = 7.8M scale factors × 4 bytes (FP32) = 31.25 MiB overhead. Total INT8 payload: 1 GiB + 31.25 MiB ≈ 1.03 GiB. AllReduce time: FP16: 2 × 63/64 × 2 GiB / (25 GB/s) = 157.5 ms. INT8: 2 × 63/64 × 1.03 GiB / 25 GB/s = 81.1 ms. Savings: 76.4 ms (48.5% reduction). Quantization error: INT8 has 256 levels covering the FP16 gradient range. With per-block quantization (128 elements), the relative error ≈ 1/(2×256) = 0.2% per element. However, this error is biased — small gradients near zero are quantized to exactly zero, creating a dead zone. Stochastic rounding mitigates this: instead of rounding to nearest INT8, round randomly proportional to the fractional value, making the quantization error unbiased in expectation.'
  common_mistake: |
    **The Pitfall:** Ignoring the overhead of transmitting quantization scale factors.
    **The Rationale:** Candidates assume an exact 50% reduction in data size when moving from FP16 to INT8.
    **The Consequence:** Overestimating communication savings and failing to account for overflow risks during the INT8 reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 gradients: 2 GiB (1B elements).
       - 64 nodes, 200 Gbps (25 GB/s) NICs.
       - 128 elements per quantization block.
    2. **Calculations:**
       - INT8 payload size: 1B elements -> 1 GiB INT8.
       - Scale factor overhead: 1B / 128 = 7.8M blocks. 7.8M * 4 bytes = 31.25 MiB.
       - Total INT8 payload: 1 GiB + 31.25 MiB ≈ 1.03 GiB.
       - FP16 AllReduce time: 2 * (63/64) * 2 GiB / (25 GB/s) ≈ 157.5 ms.
       - INT8 AllReduce time: 2 * (63/64) * 1.03 GiB / (25 GB/s) ≈ 81.1 ms.
    3. **Conclusion & Interpretation:** **Communication savings are 76.4 ms (48.5% reduction)**. Result: **Network-Bound**.
