title: 'Token Dropping in MoE: Quality Impact at Scale'
scenario: 'Your MoE training run uses top-2 routing and shows an 8% token drop rate (tokens exceeding expert capacity). The model''s validation perplexity is 3.2, whereas a dense baseline with the same active parameter count achieves 3.0 perplexity.'
question: "With an 8% token drop rate under top-2 routing, is the perplexity gap primarily due to token dropping, and what fraction of tokens lose an expert assignment?"
details:
  realistic_solution: '8% token drop means 8% of tokens lose one expert (not 4%). The drop rate directly gives the fraction of affected tokens.'
  common_mistake: |
    **The Pitfall:** Attributing the entire quality gap to token dropping.
    **The Rationale:** Forgetting that MoE models inherently have a slight quality gap vs dense models with the same active FLOPS due to routing noise and the information bottleneck of top-k selection.
    **The Consequence:** Wasting time over-provisioning expert capacities when the gap is architectural.
  napkin_math: |
    1. **Token drop rate:** 8% of tokens overflow their assigned experts.
    2. Each dropped token falls back from top-2 to top-1 routing.
    3. **Result:** Exactly **8% of tokens** lose one expert assignment. (A common error is assuming 4% by improperly halving it).
