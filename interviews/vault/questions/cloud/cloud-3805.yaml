title: 'Token Dropping in MoE: Quality Impact at Scale'
scenario: Your MoE training run shows 8% token drop rate (tokens exceeding expert
  capacity). The model's validation perplexity is 3.2. A dense baseline with the same
  active parameter count achieves 3.0 perplexity. Is the perplexity gap primarily
  due to token dropping, or is it inherent to MoE? How would you diagnose this?
question: With an 8% token drop rate under top-2 routing, what fraction of tokens
  lose one expert assignment?
details:
  realistic_solution: 8% token drop means 8% of tokens lose one expert (not 4%). The
    drop rate directly gives the fraction of affected tokens.
  common_mistake: Attributing the entire quality gap to token dropping. MoE models
    inherently have a slight quality gap vs dense models with the same active FLOPS
    due to routing noise, expert utilization imbalance, and the information bottleneck
    of top-k selection.
  napkin_math: 'Token drop rate: 8% of tokens are dropped (overflow experts). Each
    dropped token loses one expert assignment (falls back from top-2 to top-1). So
    8% of tokens lose one expert — 8% token drop means 8% of tokens are affected (not
    4% which would halve the drop rate incorrectly).'
