title: Cloud vs Edge FL Energy Tradeoff
scenario: To improve data privacy, your team proposes moving a personalization model's training from a
  centralized cloud cluster to Federated Learning (FL) across 500,000 user smartphones. Cloud training
  takes 500 GPU-hours on H100s. FL requires 10 rounds of training, with each smartphone computing for
  2 hours per round. Analyze the energy and carbon tradeoffs of this architectural shift.
question: "Is moving personalization training from 500 H100 GPU-hours to FL across 500,000 smartphones greener, and why?"
details:
  realistic_solution: While Federated Learning avoids the energy cost of transferring massive datasets
    to the cloud and benefits from an effective PUE of 1.0 (smartphones passively cool into the air),
    edge processors are orders of magnitude less energy-efficient per FLOP than datacenter accelerators
    like the H100. Furthermore, FL introduces significant communication overhead; transmitting weight
    updates across cellular/WiFi networks consumes massive amounts of energy. The tradeoff heavily favors
    the centralized cloud for total energy efficiency. Shifting to FL is an active choice to prioritize
    data privacy and data locality at the direct expense of a drastically increased global carbon footprint
    and total energy consumption.
  common_mistake: Believing FL is greener because edge devices don't have cooling overhead (PUE=1.0),
    ignoring the severe compute inefficiency of mobile SoCs compared to datacenter GPUs.
  napkin_math: 'Cloud: 500 hours * 700W (GPU) * 1.3 PUE = ~455 kWh. FL Edge Compute: 500,000 phones *
    2 hours/round * 10 rounds * 4W (SoC active power) = 40,000,000 Wh = 40,000 kWh. FL Network transfer:
    500,000 phones * 100MB/round * 10 rounds = 500 TB transferred. At ~0.1 kWh/GB for mobile networks
    = 50,000 kWh. Total FL Energy = 90,000 kWh. FL consumes ~200x more energy than the cloud.'
