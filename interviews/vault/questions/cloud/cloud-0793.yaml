title: The Ephemeral Storage I/O Cliff
scenario: "You are training a model on a massive cloud VM with 8x GPUs. You download your 1 TB dataset from S3 to the VM's attached local NVMe drive (ephemeral storage). 12 hours into training, the VM is preempted as a Spot Instance. When the orchestration system resumes training from the checkpoint, it crashes because the dataset file is missing."
question: "Why is the 1 TB dataset missing after the spot instance is preempted and training resumes?"
details:
  realistic_solution: 'Ephemeral storage (local NVMe) is physically attached to the host machine, not the VM abstraction. When a Spot Instance is preempted, the VM is destroyed and recreated on a different physical host — the new host has a blank NVMe drive. Your 1TB dataset is gone because it was never persisted to durable storage like S3 or EBS. The fix: use a persistent networked filesystem (FSx for Lustre, EBS) for the dataset, or implement a startup script that checks for local data and re-downloads from S3 on preemption recovery. Cache locally for speed, but always have a durable backing store.'
  common_mistake: |
    **The Pitfall:** Assuming the dataset simply failed to mount on the new instance.
    **The Rationale:** Candidates often misunderstand the ephemeral nature of local NVMe drives attached to spot instances, mistaking them for persistent network storage.
    **The Consequence:** Automated pipelines fail to account for data loss upon preemption, breaking the resume-from-checkpoint process.
  napkin_math: |
    - **Identify network bandwidth:** Assume a 10 Gbps (1.25 GB/s) connection to S3.
    - **Calculate download time:** Re-downloading 1 TB (1000 GB) at 1.25 GB/s takes exactly 800 seconds (~13.3 minutes).
    - **Conclusion:** Every preemption costs **over 13 minutes** of idle compute time waiting for data, requiring an automated startup script to handle the re-download.
