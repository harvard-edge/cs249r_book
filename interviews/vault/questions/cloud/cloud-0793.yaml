title: The Ephemeral Storage I/O Cliff
scenario: You are training a model on a massive cloud VM with 8x GPUs. You download your 1 TB dataset
  from S3 to the VM's attached local NVMe drive (ephemeral storage). Training speeds are phenomenal. However,
  12 hours into the 48-hour training run, the VM is preempted (Spot Instance). When the orchestration
  system brings the VM back up and resumes from the checkpoint, training crashes because the dataset file
  is missing. Why?
question: "Why is the 1 TB dataset missing after the spot instance is preempted and training resumes?"
details:
  realistic_solution: 'Ephemeral storage (local NVMe) is physically attached to the host machine, not
    the VM abstraction. When a Spot Instance is preempted, the VM is destroyed and recreated on a different
    physical host — the new host has a blank NVMe drive. Your 1TB dataset is gone because it was never
    persisted to durable storage like S3 or EBS. The fix: use a persistent networked filesystem (FSx for
    Lustre, EBS) for the dataset, or implement a startup script that checks for local data and re-downloads
    from S3 on preemption recovery. Cache locally for speed, but always have a durable backing store.'
  common_mistake: '"The orchestration system didn''t mount the drive." It''s mounted, but it''s empty.'
  napkin_math: 'Re-downloading 1 TB at 10 Gbps (1.25 GB/s) takes exactly 800 seconds (~13.3 minutes). Every time you get preempted, you lose over 13 minutes of compute time just waiting for the dataset to arrive on the new hardware.'
