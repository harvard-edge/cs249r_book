title: The ML Test Score Framework
scenario: A team heavily relies on the Google ML Test Score framework (Breck et al. 2017) to evaluate their models before deployment.
question: What does the ML Test Score measure, and why is it designed to assess technical debt rather than model accuracy?
details:
  realistic_solution: 'The ML Test Score is a rubric of 28 tests across four categories: (1) Data tests (feature schema validation, freshness). (2) Model tests (training reproducibility, fairness). (3) Infrastructure tests (pipeline reliability, rollback capability). (4) Monitoring tests (drift detection, alerting coverage). It deliberately ignores model accuracy because high accuracy with poor infrastructure is fragile — a model with 95% accuracy but no data validation or drift detection will silently degrade in production. The score quantifies operational readiness: "Can this system detect, diagnose, and recover from failures?"'
  common_mistake: |
    **The Pitfall:** Confusing the ML Test Score with standard model evaluation metrics (F1, AUC).
    **The Rationale:** Data scientists often default to viewing "tests" solely as offline statistical verification.
    **The Consequence:** Teams achieve state-of-the-art accuracy offline but deploy fragile, unmonitored systems that collapse under production conditions.
  napkin_math: |
    * 28 tests across 4 categories, each scored 0-1.
    * Max score = 28.
    * Typical org first assessment: 5-8 out of 28.
    * **Google's recommendation: Score >20 before production deployment.**
