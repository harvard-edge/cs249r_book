title: LLM Inference Throughput with INT8 Quantization
scenario: You are deploying a 30 billion parameter autoregressive language model on a single NVIDIA A100 GPU (80GB) for a low-latency chat application. The application operates with a batch size of 1. The generation phase is strictly memory-bandwidth bound.
question: What are the theoretical maximum token generation rates for the 30B model on one A100 using FP16 versus INT8 weights?
details:
  realistic_solution: Recognize that auto-regressive generation at low batch sizes is memory-bandwidth bound. Calculate the size of the model weights in both formats, then divide the GPU's total memory bandwidth by the memory read requirement per token to find the theoretical maximum throughput.
  common_mistake: |
    **The Pitfall:** Assuming batch size 1 generation speed is limited by GPU compute (TFLOPS).
    **The Rationale:** Candidates hear "A100" and think about matrix multiplication speed, ignoring the nature of auto-regressive decoding.
    **The Consequence:** They dramatically overestimate performance and fail to recognize that every single weight must be streamed from memory for every single token.
  napkin_math: |
    - FP16 weights: 30B params × 2 bytes = 60 GB.
    - FP16 Max Throughput: 2039 GB/s / 60 GB/token ≈ 34 tokens/sec.
    - INT8 weights: 30B params × 1 byte = 30 GB.
    - INT8 Max Throughput: 2039 GB/s / 30 GB/token ≈ 68 tokens/sec.
    - **Conclusion: Weight-only INT8 quantization precisely doubles theoretical generation throughput.**
