title: LLM Inference Throughput with INT8 Quantization
scenario: You are deploying a 30 billion parameter autoregressive language model on a single NVIDIA A100
  GPU (80GB HBM, 2039 GB/s memory bandwidth) for a low-latency chat application. The application operates
  with a batch size of 1. Assuming the generation phase is strictly memory-bandwidth bound and ignoring
  KV cache memory traffic for this calculation, calculate the theoretical maximum token generation rate
  (in tokens/second) when using FP16 weights versus INT8 weight-only quantization.
details:
  realistic_solution: Recognize that auto-regressive generation at low batch sizes is memory-bandwidth
    bound. Calculate the size of the model weights in both formats, then divide the GPU's total memory
    bandwidth by the memory read requirement per token to find the theoretical maximum throughput.
  common_mistake: Candidates often assume that generation speed at batch size 1 is limited by GPU compute
    (TFLOPs) rather than memory bandwidth, failing to recognize that every weight must be loaded from
    HBM for each generated token.
  napkin_math: 'FP16 weight size: 30B parameters * 2 bytes/param = 60 GB. FP16 throughput: 2039 GB/s /
    60 GB/token ≈ 34 tokens/sec. INT8 weight size: 30B parameters * 1 byte/param = 30 GB. INT8 throughput:
    2039 GB/s / 30 GB/token ≈ 68 tokens/sec. Quantization doubles the theoretical throughput.'
