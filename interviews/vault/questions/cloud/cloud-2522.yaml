title: Cloud Transformation Lineage L2 0
scenario: After a model regression in production, the team discovers the training data pipeline was modified
  two weeks ago but nobody documented the change. Explain how transformation lineage prevents this class
  of failures.
question: "How does transformation lineage prevent undocumented training-data pipeline changes from causing hard-to-debug regressions?"
details:
  realistic_solution: 'Transformation lineage tracks every operation applied to data: what code ran, what
    parameters were used, what version of the code, input/output checksums, and timestamps. It creates
    an immutable audit trail from raw data to training-ready dataset. When a regression occurs, you can
    diff the lineage of the current pipeline against the last known-good version, immediately identifying
    which transformation changed. Without lineage, you must manually bisect weeks of pipeline changes
    — a slow, error-prone process.'
  common_mistake: Only tracking code versions (git) but not the parameters, configs, or data versions.
    A pipeline can produce different outputs with the same code but different config values.
  napkin_math: 'Typical ML pipeline: 5-15 transformation steps. Without lineage, debugging a regression:
    ~2-5 engineer-days of manual investigation. With lineage: diff two DAG versions in minutes, pinpoint
    the change in <1 hour.'
