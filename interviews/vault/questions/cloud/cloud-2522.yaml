title: Cloud Transformation Lineage L2 0
scenario: After a model regression in production, the team discovers the training data pipeline was modified two weeks ago but nobody documented the change.
question: "How does transformation lineage prevent undocumented training-data pipeline changes from causing hard-to-debug regressions?"
details:
  realistic_solution: 'Transformation lineage tracks every operation applied to data: what code ran, what parameters were used, what version of the code, input/output checksums, and timestamps. It creates an immutable audit trail from raw data to training-ready dataset. When a regression occurs, you can diff the lineage of the current pipeline against the last known-good version, immediately identifying which transformation changed. Without lineage, you must manually bisect weeks of pipeline changes.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on code version control (git).
    **The Rationale:** Believing that tracking code changes inherently tracks data changes.
    **The Consequence:** A pipeline can produce radically different outputs with identical code if upstream configs, environment variables, or raw data versions silently change.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline has 5-15 steps, identifying regressions manually takes days.

    **Calculations:**
    - Without lineage: Bisection takes 2-5 engineer-days.
    - With lineage: DAG metadata diffing takes minutes.

    **Conclusion & Interpretation:**
    - **Result: Mean Time to Resolution (MTTR).** Lineage reduces regression identification time from days to under an hour.
