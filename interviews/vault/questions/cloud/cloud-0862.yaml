title: Diagnosing FSDP AllGather Topology Bottlenecks
scenario: You are scaling a 70B parameter model using FSDP (ZeRO-3) across 16 nodes (128x A100 80GB GPUs).
  The nodes are connected via an 8-rail 400Gbps InfiniBand network. Profiling shows that `AllGather` operations
  during the forward pass are taking 3x longer than expected, severely bottlenecking the arithmetic intensity
  of the linear layers. NCCL logs indicate the AllGather bandwidth achieved is only ~12 GB/s per GPU instead
  of the expected ~45 GB/s over the IB rails. How do you diagnose and root-cause this collective communication
  stall?
question: "How do you diagnose and root-cause this collective communication stall?"
details:
  realistic_solution: Analyze the output of `nvidia-smi topo -m` and NCCL debug logs (`NCCL_DEBUG=INFO`).
    The root cause is typically a misconfigured PCIe affinity where GPUs are communicating with NICs on
    a different CPU socket, forcing traffic over the slow QPI/UPI link and bypassing GPUDirect RDMA.
  common_mistake: Assuming the issue is simply network congestion or inefficient model chunking, rather
    than a hardware topology and PCI-e affinity mismatch that disables GPUDirect RDMA.
  napkin_math: Ideal 400Gbps IB yields ~50 GB/s raw, ~45 GB/s practical bandwidth. If traffic crosses
    a CPU socket via UPI, it is bottlenecked by the UPI link's practical limit (~12-15 GB/s). For a 1.5GB
    layer AllGather, time increases from 33ms (1.5GB / 45GB/s) to 125ms (1.5GB / 12GB/s). If the compute
    forward pass only takes 40ms, the compute stream starves for 85ms waiting for the AllGather.
