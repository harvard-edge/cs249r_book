title: The H100 Ridge Point (cloud-0342)
scenario: Your team is analyzing the performance of a new model on GPUs. Before running any benchmarks, you want to understand the hardware's fundamental characteristics.
question: What is the H100's ridge point from 989 TFLOPS and 3.35 TB/s, and what does it mean for optimization?
details:
  realistic_solution: The H100's ridge point defines the boundary between being compute-bound and memory-bound. A model's own arithmetic intensity (its ratio of operations to data movement) must exceed this hardware ridge point to be limited by the GPU's computational speed. With a ridge point of ~295 Ops/Byte, the H100 is very compute-dense.
  common_mistake: |
    **The Pitfall:** Miscalculating the ratio due to unit mismatch.
    **The Rationale:** Candidates often confuse bits with bytes or fail to align the magnitudes (e.g., TFLOPS vs. GB/s).
    **The Consequence:** Arriving at a wildly incorrect ridge point (e.g., ~37 Ops/Byte), which implies a completely wrong intuition about the hardware's compute-to-memory balance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 989 TFLOPS (FP16).
    - Memory Bandwidth: 3.35 TB/s.

    **Calculations:**
    - 989 TFLOPS = 989,000 GFLOPS.
    - 3.35 TB/s = 3,350 GB/s.
    - Ridge Point = Peak Compute / Memory Bandwidth = 989,000 / 3,350 ≈ 295.2 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 295 Ops/Byte (Compute-Bound)**. An algorithm needs >295 operations per byte of memory accessed to be compute-bound.
  options:
  - '≈ 37 Ops/Byte. (Calculated Trap: 989 TFLOPS / (3.35 TB/s * 8 bits/byte))'
  - '≈ 0.003 Bytes/Op. (Calculated Trap: Inverted ratio)'
  - '≈ 295 Ops/Byte.'
  - '≈ 2,360 Ops/Byte. (Calculated Trap: 989 * 8 / 3.35)'
