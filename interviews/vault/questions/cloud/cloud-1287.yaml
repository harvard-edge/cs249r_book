title: Evaluating Flash Attention Arithmetic Intensity
scenario: 'You are optimizing the prefill phase for a 32K-context LLM on an Nvidia A100 (80GB HBM, 2 TB/s
  bandwidth, 312 TFLOPs BF16). A colleague argues against using Flash Attention, claiming: ''Attention
  has O(N^2) compute complexity. For large N=32K, the O(N^2) compute completely dominates latency, meaning
  standard attention is purely compute-bound. Flash Attention only reduces HBM memory access (O(N^2) to
  O(N)), so it will only save memory footprint, not wall-clock execution time.'' Evaluate this claim by
  analyzing the arithmetic intensity of standard attention vs. A100''s hardware limits.'
details:
  realistic_solution: The colleague is incorrect. Standard attention's arithmetic intensity is heavily
    bottlenecked by head dimension (O(d)), making it severely memory-bandwidth bound on modern accelerators.
    Flash Attention increases the arithmetic intensity to O(N) via SRAM tiling, shifting the workload
    past the hardware ridge point to become genuinely compute-bound, yielding massive wall-clock speedups.
  common_mistake: Assuming that O(N^2) asymptotic compute complexity automatically means the operation
    is compute-bound, without calculating the actual FLOPs-to-Bytes ratio (Arithmetic Intensity).
  napkin_math: Standard Attention FLOPs = 4N^2*d. HBM Bytes for the NxN matrix (write S, read S, write
    P, read P) = 4 * (N^2 * 2 bytes for BF16) = 8N^2 bytes. Arithmetic Intensity (AI) = (4N^2*d) / 8N^2
    = d/2. For head dim d=128, AI = 64 FLOPs/byte. A100 Ridge Point = 312 TFLOPs / 2 TB/s = 156 FLOPs/byte.
    Since 64 < 156, standard attention is memory-bound! Flash Attention reads/writes O(Nd) to HBM. AI
    = (4N^2*d) / O(Nd) = O(N). For N=32K, AI >> 156, maximizing compute utilization.
