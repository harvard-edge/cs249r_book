title: Implement Cost Allocation Per Training Run on Shared H100 Cluster
scenario: 'You must implement a cost accounting system for a shared 64-GPU H100 cluster ($1.80/GPU/h fully-loaded).
  Multiple teams run concurrent training jobs. A 175B GPT training run uses 32 GPUs for 14 days. A 7B
  fine-tuning run uses 8 GPUs for 3 days and overlaps. Implement: (1) per-job cost calculation, (2) shared
  infrastructure overhead allocation (networking, storage), (3) idle time attribution policy.'
details:
  realistic_solution: '(1) 175B job: 32 GPUs × 14×24h × $1.80 = 32×336×1.80 = $19,353.60. (2) 7B job:
    8 GPUs × 3×24h × $1.80 = 8×72×1.80 = $1,036.80. (3) Shared infra overhead: storage ($0.10/GPU/h for
    checkpoint writes): 175B job adds $0.10×32×336=$1,075; 7B adds $0.10×8×72=$57.60. Networking overhead:
    AllReduce at 900 GB/s NVLink — cost included in GPU rate. Idle attribution: if 24 GPUs idle for 14
    days: cost = 24×336×1.80=$14,515 — charged to cluster ops budget (not jobs), unless idle is due to
    job scheduling gap (then charged to team that held reservation). Final: 175B=$20,429; 7B=$1,094.'
  common_mistake: Charging only for GPU-hours without including shared infrastructure costs; storage (checkpoint
    I/O), networking (AllReduce), and cooling overhead are real costs that must be allocated.
  napkin_math: '175B job: 32×336h×$1.80 = $19,354. Storage overhead: 32GPUs×$0.10×336h = $1,075. Total:
    $20,429. Per GPU-hour effective rate: $20,429/(32×336)=$1.90/GPU/h (5.6% overhead). 7B: $1,094 total.
    Cluster idle (24 GPUs): $14,515/14days = $1,037/day cluster ops cost.'
