title: Estimating LLM Training Operational Carbon
scenario: You are planning the training of a 70B parameter LLM on a cluster of 128 nodes, each equipped
  with 8 NVIDIA H100 GPUs. The measured total power draw per node under sustained training load is 10
  kW. The training job will run continuously for 30 days. The data center operates with a Power Usage
  Effectiveness (PUE) of 1.2, and the local regional grid has an average carbon intensity of 0.4 kgCO2eq/kWh.
  Estimate the total operational carbon emissions (in metric tons) for this training run.
details:
  realistic_solution: First calculate the total IT energy consumption by multiplying total cluster power
    by hours. Multiply this by the PUE to get total facility energy, then multiply by the carbon intensity
    to get the final carbon footprint in metric tons.
  common_mistake: Calculating only the GPU TDP while ignoring system-level power overhead, or forgetting
    to multiply by the data center PUE to account for cooling and infrastructure energy.
  napkin_math: '1. Cluster Power = 128 nodes * 10 kW/node = 1,280 kW.

    2. Time = 30 days * 24 h/day = 720 hours.

    3. IT Energy = 1,280 kW * 720 h = 921,600 kWh.

    4. Total Energy = IT Energy * PUE = 921,600 * 1.2 = 1,105,920 kWh.

    5. Emissions = 1,105,920 kWh * 0.4 kgCO2/kWh = 442,368 kg CO2eq = ~442 metric tons.'
