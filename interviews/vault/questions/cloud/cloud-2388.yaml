title: Managing GenAI Observability Data Explosion
scenario: An LLM API gateway processes 2,000 requests per second. The observability sidecar logs the full prompt, generation, and metadata (average 15KB per request) into an Elasticsearch cluster to monitor for hallucinations. The hot-tier storage costs have ballooned to $45,000/month, and ingestion latency is causing backpressure on the gateway.
question: "How would you reduce LLM observability cost and gateway backpressure while preserving high-signal hallucination logs?"
details:
  realistic_solution: 'Implement intelligent, dynamic observability sampling based on semantic anomaly detection and HTTP status. Architecture: 1) Log 100% of requests with errors (5xx, 4xx) or explicit negative user feedback (thumbs down). 2) Run a lightweight, fast classifier (e.g., a tiny BERT model or heuristics) asynchronously to flag high-toxicity or high-perplexity generations, logging 100% of these. 3) Apply a heavily downsampled rate (e.g., 1%) for normal, successful requests to maintain a baseline distribution. Route the unindexed raw logs directly to cheap cold storage (S3) for compliance, bypassing Elasticsearch.'
  common_mistake: |
    **The Pitfall:** Truncating prompts and completions to save space (e.g., maximum 512 characters).
    **The Rationale:** Engineers treat LLM logs like traditional web logs, where dropping payload bodies is a standard cost-saving measure.
    **The Consequence:** Destroying the exact context needed to debug the hallucinations, rendering the observability platform completely useless.
  napkin_math: |
    - Data rate: 2,000 QPS × 15 KB = 30 MB/s = 2.59 TB/day = 77.7 TB/month.
    - Hot ES Cost: 77.7 TB × $0.50/GB ≈ $38,850/month.
    - Smart Sampling: 100% of errors (5%) + 1% baseline of normal traffic = 6% total volume.
    - New volume: 77.7 TB × 0.06 = 4.66 TB/month.
    - **New Cost: 4.66 TB × $0.50/GB ≈ $2,330/month (a >90% savings while retaining high-signal data).**
