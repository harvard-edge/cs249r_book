title: 'MoE Gradient Computation: The Router Gradient Challenge'
scenario: In MoE with top-k routing, the argmax (top-k selection) is non-differentiable. The standard solution uses the straight-through estimator: forward pass uses hard top-k, backward pass pretends the top-k selection was soft.
question: "What gradient bias does the straight-through top-k estimator introduce, and what alternative routing-gradient approaches exist?"
details:
  realistic_solution: 'The routing function: g_i = softmax(W_router × x)_i for expert i. Forward: multiply by hard top-k mask (binary). Backward: gradient flows through softmax as if the mask didn''t exist. Bias: the gradient for non-selected experts (g_j where j ∉ top-k) receives full gradient feedback despite having zero forward contribution. This means the router receives gradient signal about what would have happened if it selected different experts, which is an approximation — the actual output depended on the selected experts'' weights, not the non-selected ones. Alternatives: (1) Gumbel-Softmax: adds Gumbel noise to logits and uses a temperature-annealed soft approximation. More accurate gradients but computationally expensive and numerically unstable at low temperatures. (2) REINFORCE-style policy gradient: treats routing as a policy decision and uses variance-reduced reward signals. Unbiased but high variance. (3) Hash routing (BASE layers): deterministic routing based on token position, eliminating the router network entirely. Zero gradient bias but no learned routing. (4) Expert choice: differentiable because each expert''s selection is a continuous operation on router scores. In practice, the straight-through estimator works well enough — the bias is small relative to the gradient signal from the main loss.'
  common_mistake: |
    **The Pitfall:** Treating MoE top-k routing as perfectly differentiable.
    **The Rationale:** The straight-through estimator hides the non-differentiable `argmax` operation under the hood.
    **The Consequence:** Ignoring the significant gradient bias introduced for non-selected experts during training.
  napkin_math: |
    1. Router linear layer parameters: 8192 × 8 = 65K.
    2. Gradient bias magnitude ≈ (1 - top_k/E) × avg_gradient_norm per decision.
    3. With top-2/8 routing, bias ≈ **75% of the gradient** for non-selected experts is counterfactual.
