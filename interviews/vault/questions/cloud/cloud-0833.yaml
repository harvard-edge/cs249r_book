title: The TCO Per Token Analysis
scenario: Your VP of Engineering asks you to evaluate whether to build or buy LLM inference capacity. An 8xH100 server costs $250K with a 3-year amortization. Power is 5.6 kW at $0.10/kWh. Each GPU produces ~5,000 tokens/sec for your 13B model. Assuming 70% utilization, compare the all-in cost per million tokens to a cloud API charging $0.50 per million tokens.
question: At what sustained daily token demand does building on-prem inference capacity become more cost-effective than a $0.50 per million token cloud API?
details:
  realistic_solution: 'Server CAPEX amortized: $250K / 3 years = $83.3K/year. Energy: 5.6 kW * 8,760 hrs * $0.10 = $4,906/year. 3-year TCO ~ $265K. Token output: 8 GPUs * 5,000 tok/s * 0.70 util * 86,400 s/day * 365 * 3 = 1,095 days ≈ 2.65 trillion tokens. Cost = $265K / 2.65M million-tokens = $0.10 per million tokens. This is 5x cheaper than $0.50/M API pricing. But add staffing ($150K/year), networking, and facility costs — real cost is ~$0.20-0.30/M tokens. Build makes sense above ~50M tokens/day sustained demand.'
  common_mistake: 'Only comparing hardware CAPEX to API pricing without accounting for energy, cooling, staffing, and utilization. Also, candidates overestimate utilization — 70% is optimistic for most organizations.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Server CAPEX: $250K over 3 years.
    - Power: 5.6 kW at $0.10/kWh.
    - Throughput: 8 GPUs * 5,000 tokens/sec = 40,000 tokens/sec.
    - Utilization: 70%.

    **Calculations:**
    - CAPEX = $83.3K/yr.
    - Energy = 5.6 kW * 8760 hrs * $0.10 = $4.9K/yr.
    - 3-year TCO = $265K.
    - Output = 40,000 tok/s * 0.70 * 94.6M s = 2.65T tokens over 3 years.
    - Raw cost = $265K / 2.65M million-tokens = $0.10/M tokens.
    - Cost with ops overhead = ~$0.25/M tokens.

    **Conclusion & Interpretation:**
    - **Result: $0.25/M tokens vs $0.50/M API (Utilization-Bound)**. Building on-prem is highly cost-effective if sustained demand exceeds ~50M tokens/day.
