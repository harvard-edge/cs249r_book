title: Evaluating MFU vs Network Upgrades
scenario: Training a 70B parameter LLM on 2 trillion tokens using 1,024 A100 GPUs averages 45% MFU. You must evaluate whether to spend 6 weeks of engineering on custom kernels to reach 55% MFU, or to buy a 400Gbps InfiniBand upgrade.
question: Should you spend 6 weeks raising MFU to 55% or upgrade the interconnect, and what training-time savings justify the choice?
details:
  realistic_solution: Calculate the total FLOPs required (6 * P * D) and compare the total training wall-clock time at both MFU levels. The total compute is ~8.4e23 FLOPs. A 10% absolute increase in MFU saves ~12-13 days of cluster time. Given the high cost of a 1,024-GPU cluster (hundreds of thousands of dollars per week), the engineering effort on custom compute kernels yields a massive, guaranteed ROI by increasing sustained computational intensity, whereas a network upgrade only helps if the 45% MFU is strictly bounded by communication latency rather than local kernel efficiency.
  common_mistake: |
    **The Pitfall:** Intuitively favoring network hardware upgrades to solve distributed training bottlenecks.
    **The Rationale:** Engineers blindly assume "communication is always the bottleneck" without quantifying the massive absolute cost savings of pushing local compute efficiency (MFU) higher.
    **The Consequence:** Capital is wasted on network upgrades that yield minimal impact, while the GPUs continue severely underperforming on local math operations.
  napkin_math: |
    * **Total Compute:** 6 × 70e9 (Params) × 2e12 (Tokens) = 8.4e23 FLOPs.
    * **Cluster Peak:** 1,024 GPUs × 312 TFLOPS = 3.19e17 FLOPs/sec.
    * **Time @ 45% MFU:** 8.4e23 / (3.19e17 × 0.45) ≈ 67.7 days.
    * **Time @ 55% MFU:** 8.4e23 / (3.19e17 × 0.55) ≈ 55.4 days.
    * **Conclusion:** Increasing MFU by 10% saves **12.3 days of cluster time**, justifying the kernel engineering effort with a massive ROI.
