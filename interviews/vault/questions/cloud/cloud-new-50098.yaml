title: 'Overlap in Heterogeneous Pipeline: Different GPU Types per Stage'
scenario: 'Your pipeline-parallel training uses 4 stages: stages 0-1 on A100s (312 TFLOPS, 2 TB/s) and
  stages 2-3 on H100s (989 TFLOPS, 3.35 TB/s). The H100 stages finish 3x faster than A100 stages, creating
  massive bubbles. Evaluate whether communication overlap can mitigate the heterogeneity problem.'
details:
  realistic_solution: 'Communication overlap cannot fix compute imbalance. The H100 stages idle for 2/3
    of the time waiting for A100 stages, regardless of how well communication is overlapped. Solutions
    must address the imbalance: (1) Assign more layers to H100 stages (75% of layers on H100, 25% on A100)
    to equalize per-stage compute time. (2) Increase micro-batch count to reduce bubble ratio (doesn''t
    fix imbalance but reduces its impact). (3) Use A100 stages for compute-light operations (embedding,
    final linear) and H100 for transformer layers. (4) Communication overlap helps at the margins: overlapping
    the A100->H100 activation transfer with H100''s idle time (trivially hidden since H100 is already
    waiting). Overlap efficiency: near 100% for communication, but the real problem is 0% compute efficiency
    on H100 during wait periods.'
  common_mistake: Trying to solve heterogeneous pipeline imbalance with communication overlap. Overlap
    hides communication behind compute, but the fundamental issue is compute imbalance between stages,
    not communication overhead.
  napkin_math: 'A100 per-layer: 10ms. H100 per-layer: 3.3ms. With 20 layers each: A100 stage = 200ms,
    H100 stage = 66ms. Pipeline efficiency: min(200,66)/max(200,66) = 33%. Even with perfect communication
    overlap, max throughput = 33% of H100 potential. Rebalancing to 10 layers A100 + 30 layers H100: A100
    = 100ms, H100 = 99ms. Efficiency: 99%.'
