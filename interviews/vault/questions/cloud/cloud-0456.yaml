title: The SLA-Driven Batching Strategy
scenario: "You are designing a unified inference service on H100 GPUs to serve two workloads: 1) a real-time chatbot with a strict P99 TTFT SLA of <250ms, and 2) a batch job that summarizes millions of documents overnight, prioritizing maximum throughput. The chatbot has short prompts, while the batch job has long documents. A teammate proposes using static batching with a large batch size (e.g., 64) to maximize throughput for the batch job."
question: "Why is large static batching a poor solution for this unified service, and what scheduling approach is better?"
details:
  realistic_solution: "Using a large static batch is a poor solution because it creates extreme head-of-line blocking for the latency-sensitive chatbot workload. A chatbot request might arrive but have to wait a long time for 63 other requests to fill the batch, catastrophically violating its 250ms SLA. A better approach is to use continuous batching with priority scheduling. Chatbot requests are assigned a higher priority. The scheduler can then fill the GPU with a mix of requests, but ensures high-priority requests are processed first, meeting their SLA. This allows the batch jobs to 'soak up' any spare capacity, maximizing throughput without compromising the latency of the real-time service."
  common_mistake: |
    **The Pitfall:** Optimizing for maximum throughput at the expense of all other metrics.
    **The Rationale:** Engineers assume a single scheduling policy (large static batches) fits all workloads.
    **The Consequence:** Extreme head-of-line blocking that completely destroys real-time latency SLAs.
  napkin_math: |
    *   **Batch Job Prefill:** 64 docs × 8K tokens on a 70B model.
    *   **Total Compute:** 2 × 70B × 8K × 64 = 71.6 TFLOPs.
    *   **Batch Latency:** At 989 TFLOPS peak (50% util), time = 71.6T / (989T × 0.5) ≈ 144 seconds.
    *   **Result:** **A chatbot request arriving behind a static batch waits 144s, violating the 250ms SLA by over 500x. Continuous batching prevents this blocking.**
  options:
  - It's a good solution; the chatbot users will just have to tolerate higher latency.
  - It fails because large static batches can exhaust HBM, causing frequent swapping.
  - It fails because high-latency chatbot requests will be starved by the throughput-focused batch jobs. A better solution is continuous batching with priority scheduling.
  - It's better to build two separate physical clusters, one for each workload, to guarantee isolation.
  correct_index: 2
