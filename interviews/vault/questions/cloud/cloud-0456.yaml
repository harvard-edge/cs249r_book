title: The SLA-Driven Batching Strategy
scenario: 'You are designing a unified inference service on H100 GPUs to serve two
  workloads: 1) a real-time chatbot with a strict P99 TTFT SLA of <250ms, and 2) a
  batch job that summarizes millions of documents overnight, prioritizing maximum
  throughput to minimize cost. The chatbot has short prompts, while the batch job
  has long documents. A teammate proposes using static batching with a large batch
  size (e.g., 64) to maximize throughput for the batch job. Why is this a poor solution
  for the unified service, and what would be a better approach?'
question: Why is this a poor solution for the unified service, and what would be a
  better approach?
details:
  realistic_solution: Using a large static batch is a poor solution because it creates
    extreme head-of-line blocking for the latency-sensitive chatbot workload. A chatbot
    request might arrive but have to wait a long time for 63 other requests to fill
    the batch, catastrophically violating its 250ms SLA. A better approach is to use
    continuous batching with priority scheduling. Chatbot requests are assigned a
    higher priority. The scheduler can then fill the GPU with a mix of requests, but
    ensures high-priority requests are processed first, meeting their SLA. This allows
    the batch jobs to 'soak up' any spare capacity, maximizing throughput without
    compromising the latency of the real-time service.
  common_mistake: Focusing on optimizing one metric (like maximum throughput) at the
    expense of all others (like P99 latency). Engineers often fail to consider that
    a single scheduling policy rarely fits all use cases and that prioritization is
    necessary in mixed-workload systems.
  napkin_math: '**Static batching failure analysis:** Batch job with 8K-token documents,
    batch size 64. Prefill for a batch of 64 documents of 8K tokens on 70B model:
    2 × 70B × 8K × 64 = 71,680 TFLOPs. At 989 TFLOPS peak, ~50% utilization: 71,680
    / (989 × 0.5) = 145s per batch prefill. A chatbot request arriving at T=0 must
    wait for the full 145s batch to complete before entering the next batch — violating
    the 250ms TTFT SLA by 580x. **Continuous batching with priorities:** Chatbot request
    (100 tokens): prefill = 2 × 70B × 100 / (989T × 0.5) = 28ms. If the scheduler
    preempts batch jobs or interleaves chatbot prefills between decode steps, chatbot
    TTFT = 28ms + ~20ms scheduling overhead = ~48ms (well within 250ms). Batch job
    throughput: fills remaining GPU capacity during decode gaps. With chunked prefill
    (512-token chunks), max blocking time = 2 × 70B × 512 / (989T × 0.5) = 144ms —
    still under SLA.'
  options:
  - It's a good solution; the chatbot users will just have to tolerate higher latency.
  - It fails because large static batches can exhaust HBM, causing frequent swapping.
  - It fails because high-latency chatbot requests will be starved by the throughput-focused
    batch jobs. A better solution is continuous batching with priority scheduling.
  - It's better to build two separate physical clusters, one for each workload, to
    guarantee isolation.
  correct_index: 2
