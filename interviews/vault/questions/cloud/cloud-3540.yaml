title: Optimizing Dataset Curation for Bias Mitigation on Google TPU v5e
scenario: Your team is curating a large-scale image dataset for a medical imaging
  classification model to be trained on Google Cloud with TPU v5e instances. The dataset
  is expected to be several terabytes in size, and initial analysis suggests potential
  demographic biases in the raw data. To mitigate this, an active learning pipeline
  is proposed where the model's uncertainty scores guide the selection of new samples
  for annotation. Considering the Google TPU v5e's specifications (16 GB HBM per chip,
  197 TFLOPS BF16, 1.6 TB/s memory bandwidth), how might these specific hardware characteristics
  influence your data selection strategy and annotation workflow design to effectively
  address dataset bias and efficiently utilize the TPU resources?
question: How should the TPU v5e's 16 GB HBM, BF16 compute, and bandwidth shape active-learning
  selection and annotation to reduce dataset bias?
details:
  realistic_solution: A realistic solution involves designing a multi-stage data curation
    and loading pipeline that is 'TPU-aware'. For data selection in active learning,
    prioritize samples that are not only high-uncertainty but also diverse and representative
    across demographic groups to actively combat bias, potentially leveraging techniques
    like data augmentation or re-sampling that can be efficiently processed on TPU.
    For annotation workflows, ensure labels are high-quality and consistent, potentially
    using inter-annotator agreement metrics. For data loading, implement efficient
    data sharding and preprocessing (e.g., TFRecords with optimized data types) to
    ensure the 1.6 TB/s memory bandwidth is utilized. Data should be pre-fetched and
    cached where possible, and batch sizes should be carefully tuned to fit within
    the 16 GB HBM per chip, possibly employing mixed-precision training (BF16) from
    the outset and ensuring all relevant data transformations are compatible with
    it to maximize the 197 TFLOPS BF16 compute.
  common_mistake: A common mistake is to design data loading and augmentation pipelines
    without considering the specific hardware constraints and capabilities of the
    target accelerator. Forgetting the 16GB HBM limit per chip can lead to out-of-memory
    errors or inefficient data transfers, while neglecting the BF16 precision can
    result in loss of numerical stability or accuracy during training. Additionally,
    not optimizing data throughput to match the 1.6 TB/s memory bandwidth will lead
    to underutilization of the powerful compute resources.
  napkin_math: Given 1.6 TB/s memory bandwidth, if each sample is, say, 1MB (10^6
    bytes), then the TPU can theoretically ingest 1.6 * 10^12 bytes / 10^6 bytes/sample
    = 1.6 million samples per second. This is a very high rate, meaning the data pipeline
    needs to be extremely optimized. The 16 GB HBM (16 * 10^9 bytes) per chip means
    a batch of 1MB images can contain ~16,000 images. For a distributed training setup
    with multiple TPU v5e chips, the total HBM scales. When working with BF16, the
    memory footprint of weights and activations is halved compared to FP32, effectively
    increasing the batch size or model capacity that can fit into the 16GB HBM, but
    also requiring careful consideration of numerical stability for operations like
    normalization or gradient updates during active learning model retraining.
