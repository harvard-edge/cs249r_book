title: Lifecycle Carbon Analysis of a 3B Model Serving System
scenario: 'Conduct a full lifecycle carbon analysis for a 3B LLM deployed for 2 years.
  Training: 200 A100-hours on a 400 gCO2e/kWh grid. Serving: 4 A100 GPUs running continuously
  at 60% utilization, PUE=1.3, same grid. Hardware: embodied carbon of 80 kgCO2e per
  A100, amortized over 3 years. Expected traffic: 10M queries/day at 500 output tokens/query.
  Calculate carbon per inference and identify the dominant carbon contributor.'
question: What is the lifecycle carbon per inference for the 3B LLM over 2 years,
  and which component dominates emissions?
details:
  realistic_solution: 'Training carbon: 200 A100-hours × 400W × 1.3 PUE × 400 gCO2e/kWh
    = 200 × 0.4 kW × 1.3 × 0.4 = 41.6 kgCO2e. Serving carbon (2 years): 4 GPUs × 400W
    × 0.60 × 8,760 × 2 × 1.3 PUE × 0.4 kg/kWh = 4 × 0.4 × 0.60 × 17,520 × 1.3 × 0.4
    = 8,747 kgCO2e. Embodied: 4 GPUs × 80 kg × (2yr/3yr amortization) = 213 kgCO2e.
    Total: 41.6 + 8,747 + 213 = 9,002 kgCO2e. Total inferences: 10M × 365 × 2 = 7.3B.
    Carbon per inference: 9,002 kg / 7.3B = 1.23 gCO2e per query. Dominant contributor:
    serving operational (~97%).'
  common_mistake: Omitting embodied hardware carbon entirely or treating training
    carbon as the dominant cost for long-running deployed models. For a model serving
    10M queries/day over 2 years, serving operational carbon dwarfs training carbon
    after approximately 3-4 weeks.
  napkin_math: 'Training: 200 A100-hr × 0.4kW × 1.3 × 0.4 kgCO2e/kWh = 41.6 kgCO2e
    (0.87%). Serving: 4×0.4kW×0.6×17,520hr×1.3×0.4 = 8,747 kgCO2e (94.6%). Embodied:
    213 kgCO2e (4.5%). Carbon/query: 9,002,000g / 7,300,000,000 = 1.23 gCO2e. Comparison:
    streaming 1 minute of HD video ≈ 0.36 gCO2e. One LLM query ≈ 3.4× a minute of
    HD streaming. Reducing utilization from 60% to 90% (better batching): serving
    carbon drops by 33% to 5,861 kgCO2e, reducing total by ~31%.'
