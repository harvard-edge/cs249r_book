title: Federated DP with Heterogeneous Client Noise
scenario: You are running federated learning across 10,000 mobile clients using DP-FedAvg.
  Each client clips its local gradient update to L2 norm C=1.0 and adds Gaussian noise
  σ=0.5. After 500 rounds, the central server aggregates updates from a variable number
  of participating clients (between 50 and 500 per round). Your privacy accountant
  tracks (ε, δ)=(4.2, 1e-5) at round 500. A compliance officer asks why the privacy
  bound isn't tighter given 10,000 enrolled clients but only ~200 average participation.
  Explain the accounting.
question: Why isn't the DP-FedAvg privacy bound tighter with 10,000 enrolled clients
  but only about 200 participants per round?
details:
  realistic_solution: 'Privacy amplification by subsampling applies to the per-round
    participation rate q = n_round/N_total. With average 200/10,000 = 0.02 participation,
    amplification factor is q = 0.02. The central noise from aggregating K clients''
    noisy updates is: server-side noise ≈ σ/√K per coordinate. With K=200 and σ=0.5:
    effective noise = 0.5/√200 ≈ 0.035. The per-round ε_step under Gaussian mechanism
    with subsampling amplification is much smaller, but after 500 rounds of composition
    it accumulates. The officer is correct that variable participation complicates
    accounting — you must track worst-case rounds (K=50) not average, since low-participation
    rounds have weaker noise and higher per-round ε.'
  common_mistake: Assuming privacy amplification applies to total enrollment (10,000
    clients) rather than active participants per round. Amplification is determined
    by the per-round sampling rate, not total pool size.
  napkin_math: 'Per-round ε_step ≈ q · (C²/σ²K) under simplified Gaussian accounting.
    Worst case K=50: ε_step ≈ 0.02 · (1/0.25·50) = 0.02 · 0.08 = 0.0016. After 500
    rounds (advanced composition): ε_total ≈ √(2·500·ln(1/δ))·ε_step ≈ √(1000·11.5)·0.0016
    ≈ 107.2·0.0016 ≈ 0.17. But with per-example clipping sensitivity and correct Rényi
    DP accountant, the real ε of 4.2 reflects the actual noise and clipping norm —
    the simplified bound is not tight.'
