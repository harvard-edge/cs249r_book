title: Federated DP with Heterogeneous Client Noise
scenario: You are running federated learning across 10,000 mobile clients using DP-FedAvg. Each client clips its local gradient update to L2 norm C=1.0 and adds Gaussian noise σ=0.5. After 500 rounds, the central server aggregates updates from a variable number of participating clients (between 50 and 500 per round). Your privacy accountant tracks (ε, δ)=(4.2, 1e-5) at round 500. A compliance officer asks why the privacy bound isn't tighter given 10,000 enrolled clients but only ~200 average participation.
question: Why isn't the DP-FedAvg privacy bound tighter with 10,000 enrolled clients but only about 200 participants per round?
details:
  realistic_solution: 'Privacy amplification by subsampling applies to the per-round participation rate q = n_round/N_total. With average 200/10,000 = 0.02 participation, amplification factor is q = 0.02. The central noise from aggregating K clients'' noisy updates is: server-side noise ≈ σ/√K per coordinate. With K=200 and σ=0.5: effective noise = 0.5/√200 ≈ 0.035. The per-round ε_step under Gaussian mechanism with subsampling amplification is much smaller, but after 500 rounds of composition it accumulates. The officer is correct that variable participation complicates accounting — you must track worst-case rounds (K=50) not average, since low-participation rounds have weaker noise and higher per-round ε.'
  common_mistake: |
    **The Pitfall:** Assuming privacy amplification applies to the total enrollment pool rather than active participants.
    **The Rationale:** It's intuitive to think that hiding among 10,000 users offers immense privacy, ignoring the mechanics of round-by-round aggregation.
    **The Consequence:** Privacy bounds are vastly underestimated, and worst-case rounds with low participation leak more information than accounted for.
  napkin_math: |
    - **Per-round participation rate (q):** Average 200 / 10,000 = 0.02.
    - **Worst-case per-round ε_step:** ≈ q × (C² / (σ² × K)).
    - **With worst-case K=50:** ε_step ≈ 0.02 × (1.0 / (0.25 × 50)) = 0.02 × 0.08 = 0.0016.
    - **After 500 rounds (advanced composition):** ε_total ≈ √(2 × 500 × ln(1/δ)) × ε_step.
    - **Total ε estimation:** √(1000 × 11.5) × 0.0016 ≈ 107.2 × 0.0016 = **~0.17.**
    - *(Note: A real Rényi DP accountant yields ε=4.2 because the simplified bound isn't tight and must account for exact noise and clipping norms.)*
