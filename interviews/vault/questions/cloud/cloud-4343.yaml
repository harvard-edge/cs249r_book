title: Federated DP with Heterogeneous Client Noise
scenario: You are running federated learning across 10,000 mobile clients using DP-FedAvg. Each client clips its local gradient update to L2 norm C=1.0 and adds Gaussian noise σ=0.5. After 500 rounds, the central server aggregates updates from a variable number of participating clients (between 50 and 500 per round). Your privacy accountant tracks (ε, δ)=(4.2, 1e-5) at round 500. A compliance officer asks why the privacy bound isn't tighter given 10,000 enrolled clients but only ~200 average participation.
question: "Why isn't the DP-FedAvg privacy bound tighter with 10,000 enrolled clients but only about 200 participants per round?"
details:
  realistic_solution: Privacy amplification by subsampling applies to the per-round participation rate. The officer is correct that variable participation complicates accounting; you must track worst-case rounds (K=50) not average, since low-participation rounds have weaker noise aggregation and correspondingly higher per-round ε.
  common_mistake: |
    **The Pitfall:** Assuming privacy amplification applies to the total enrollment pool rather than active participants.
    **The Rationale:** It's intuitive to think that hiding among 10,000 users offers immense privacy, ignoring the mechanics of round-by-round aggregation.
    **The Consequence:** Privacy bounds are vastly underestimated, and worst-case rounds with low participation leak more information than accounted for.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Enrolled clients: 10,000.
       - Average participants per round: 200.
       - Worst-case participants per round: 50.
       - Sensitivity C=1.0, Noise σ=0.5.
    2. **Calculations:**
       - Per-round participation rate (q): 200 / 10,000 = 0.02.
       - Worst-case ε_step: ~q * (C^2 / (σ^2 * K)).
       - With worst-case K=50: ε_step = 0.02 * (1.0 / (0.25 * 50)) = 0.0016.
       - After 500 rounds composition: ε_total = sqrt(2 * 500 * ln(1/δ)) * ε_step.
       - Total ε estimation: sqrt(1000 * 11.5) * 0.0016 = 107.2 * 0.0016 = ~0.17.
    3. **Conclusion & Interpretation:**
       - **Result: Privacy-Bound.** Privacy amplification bounds must be calculated against the worst-case low-participation rounds (K=50), because lower aggregation means higher per-round ε leakage.
