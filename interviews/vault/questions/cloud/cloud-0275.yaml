title: The Iceberg of ML Costs
scenario: You are budgeting for a new, large-scale AI service that will run for three years. The initial
  model training is a major, one-time capital expense. However, the service will need to run 24/7 on a
  fleet of GPUs to serve user requests.
question: "Over three years, which cost is likely to dominate TCO: the one-time training run or continuous inference, and why?"
details:
  realistic_solution: The cumulative cost of inference overwhelmingly dominates the TCO. While training
    is a large, visible spike in capital expenditure (CapEx), the continuous operational expenditure (OpEx)
    of powering, cooling, and maintaining a large inference fleet for several years typically outweighs
    the initial training cost by a factor of 5x to 10x or more.
  common_mistake: Engineers often fixate on the large, headline-grabbing cost of a single training run,
    which can be millions of dollars. They underestimate how the continuous, operational cost of running
    inference on a large fleet of servers accumulates over time, an effect sometimes called the 'iceberg
    of ML costs'.
  napkin_math: '1. Training Cost: Training on 10,000 H100s for 1 month (720 hours) at ~$4/hr/GPU = 10,000
    * 720 * $4 = $28.8 million.

    2. Inference Cost: Running just 1,000 H100s 24/7 for 3 years (26,280 hours) at $4/hr/GPU = 1,000 *
    26,280 * $4 = $105.1 million.

    Even with a 10x smaller fleet, 3 years of constant inference OpEx ($105M) dwarfs the massive one-time
    training spike ($28.8M).'
  options:
  - The one-time model training cost.
  - The cumulative cost of running inference.
  - The cost of data acquisition and labeling.
  - The salaries of the R&D and engineering teams.
