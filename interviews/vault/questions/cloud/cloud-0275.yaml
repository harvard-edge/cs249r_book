title: The Iceberg of ML Costs
scenario: You are budgeting for a new, large-scale AI service that will run for three years. The initial model training is a major, one-time capital expense. However, the service will need to run 24/7 on a fleet of GPUs to serve user requests.
question: Over three years, which cost is likely to dominate TCO: the one-time training run or continuous inference, and why?
details:
  realistic_solution: The cumulative cost of inference overwhelmingly dominates the TCO. While training is a large, visible spike in capital expenditure (CapEx), the continuous operational expenditure (OpEx) of powering, cooling, and maintaining a large inference fleet for several years typically outweighs the initial training cost by a factor of 5x to 10x or more.
  common_mistake: |
    **The Pitfall:** Fixating on the headline-grabbing training costs.
    **The Rationale:** Engineers see the massive, multi-million dollar initial spike for a training run and underestimate the creeping, cumulative OpEx of a 24/7 inference fleet.
    **The Consequence:** The business vastly under-budgets for the true TCO, running out of operational runway halfway through the service's lifecycle.
  napkin_math: |
    *   **Training Cost:** 10,000 H100s for 1 month (720 hours) at ~$4/hr = $28.8 million.
    *   **Inference Cost:** 1,000 H100s for 3 years (26,280 hours) at ~$4/hr = $105.1 million.
    *   **Result:** Three years of continuous inference OpEx ($105M) **dwarfs** the massive one-time training spike ($28.8M).
  options:
  - The one-time model training cost.
  - The cumulative cost of running inference.
  - The cost of data acquisition and labeling.
  - The salaries of the R&D and engineering teams.
