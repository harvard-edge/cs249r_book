title: Local vs Cloud Inference Offloading
scenario: An on-premise manufacturing facility generates 50 GB of high-resolution video frames per inspection batch. You have local servers equipped with edge GPUs that can process this data at 500 MB/s. Alternatively, you can upload the batch to a cloud environment with modern datacenter GPUs capable of processing at 25 GB/s. The facility has a dedicated 1 Gbps (125 MB/s) uplink to the cloud.
question: "Should inference run locally or in the cloud for each 50GB batch, and what are the total processing times?"
details:
  realistic_solution: 'Process the data locally. Local processing takes 100 seconds, while cloud processing takes 402 seconds due to the 400-second network transmission penalty, proving the Data Locality Invariant.'
  common_mistake: |
    **The Pitfall:** Assuming cloud compute is always faster because the GPU throughput is 50x higher.
    **The Rationale:** Ignoring network latency and bandwidth when calculating total processing time.
    **The Consequence:** Moving data to the cloud, resulting in a 4x slower end-to-end pipeline due to network bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:** 50 GB batch size. Local processing = 500 MB/s. Cloud processing = 25 GB/s. Uplink = 125 MB/s.
    2. **Calculations:** Local Compute = 50,000 MB / 500 MB/s = 100s. Cloud Compute Time = 50,000 MB / 25,000 MB/s = 2s. Network Transmission = 50,000 MB / 125 MB/s = 400s. Total Cloud Time = 400s + 2s = 402s.
    3. **Conclusion & Interpretation:** **Result: 100s (Local) < 402s (Cloud).** The workload is purely Network-Bound when offloaded, favoring local execution.
