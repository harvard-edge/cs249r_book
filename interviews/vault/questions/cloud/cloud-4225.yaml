title: Petabyte-Scale Format Migration Strategy
scenario: Your organization has 5 PB of ML training data across 200 datasets in a mix of CSV, JSON, TFRecord, and Parquet formats. Storage costs $115K/month. Training pipelines waste 30% of GPU time on format conversion and inefficient reads. You're tasked with standardizing on a single format and migrating all data within 6 months.
question: "What format choices, migration strategy, and rollback plan would you use to standardize 5 PB across 200 ML datasets within 6 months?"
details:
  realistic_solution: 'Phase 1 (month 1): Audit — categorize 200 datasets by access pattern: (a) tabular/structured → Parquet, (b) sequential media (images, audio) → WebDataset/tar shards, (c) pre-tokenized text → raw binary/Arrow. No single format fits all. Standardize on 2-3 formats, not 1. Phase 2 (month 2): Build migration tooling — idempotent conversion pipelines with validation (row counts, checksums, sample spot-checks). Run on spot instances. Phase 3 (months 3-5): Migrate in priority order — start with highest-cost datasets (largest size × most GPU waste). Dual-write period: new data written in both old and new formats. Training pipelines updated with feature flags to switch formats. Phase 4 (month 6): Decommission old formats, enforce format governance via CI checks. Rollback: keep old format files for 30 days post-migration with lifecycle policies for automatic deletion.'
  common_mistake: |
    **The Pitfall:** Picking one format and converting everything at once.
    **The Rationale:** Engineers desire absolute homogeneity to simplify tooling.
    **The Consequence:** A 5 PB migration takes weeks of compute, and if the target format has an unforeseen issue, you've spent enormous resources on a dead end.
  napkin_math: |
    1. **Assumptions & Constraints:** 5 PB data, $115K/mo storage, 30% GPU waste ($150K/mo).
    2. **Calculations:** Post-optimization storage = 3.67 PB ($84K/mo). Storage savings = $31K/mo. Total monthly recovery = $31K + $150K = $181K/mo. Migration cost = $100K compute + $150K labor = $250K. 6-month ROI = ($181K * 6) - $250K = $836K.
    3. **Conclusion & Interpretation:** **Result: High ROI.** Multi-format standardization returns a net $836K savings within 6 months.
