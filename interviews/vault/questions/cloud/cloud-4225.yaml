title: Petabyte-Scale Format Migration Strategy
scenario: Your organization has 5 PB of ML training data across 200 datasets in a
  mix of CSV, JSON, TFRecord, and Parquet formats. Storage costs $115K/month. Training
  pipelines waste 30% of GPU time on format conversion and inefficient reads. You're
  tasked with standardizing on a single format and migrating all data within 6 months.
  Design the migration strategy, format choice, and rollback plan.
question: What format choices, migration strategy, and rollback plan would you use
  to standardize 5 PB across 200 ML datasets within 6 months?
details:
  realistic_solution: 'Phase 1 (month 1): Audit — categorize 200 datasets by access
    pattern: (a) tabular/structured → Parquet, (b) sequential media (images, audio)
    → WebDataset/tar shards, (c) pre-tokenized text → raw binary/Arrow. No single
    format fits all. Standardize on 2-3 formats, not 1. Phase 2 (month 2): Build migration
    tooling — idempotent conversion pipelines with validation (row counts, checksums,
    sample spot-checks). Run on spot instances. Phase 3 (months 3-5): Migrate in priority
    order — start with highest-cost datasets (largest size × most GPU waste). Dual-write
    period: new data written in both old and new formats. Training pipelines updated
    with feature flags to switch formats. Phase 4 (month 6): Decommission old formats,
    enforce format governance via CI checks. Rollback: keep old format files for 30
    days post-migration with lifecycle policies for automatic deletion. Total compute
    cost: 5 PB × $0.02/GB conversion ≈ $100K one-time.'
  common_mistake: Picking one format and converting everything at once. A 5 PB migration
    takes weeks of compute, and if the target format has an unforeseen issue (e.g.,
    poor performance for one workload type), you've spent enormous resources on a
    dead end.
  napkin_math: 'Current: 5 PB × $0.023/GB/month = $115K/month. Post-optimization:
    Parquet compression (3×) on 2 PB tabular = 667 TB. WebDataset on 2.5 PB media
    = 2.5 PB (no compression benefit). Binary on 0.5 PB tokens = 0.5 PB. Total: 3.67
    PB = $84K/month. Savings: $31K/month = $372K/year. GPU waste recovery: 30% of
    $500K/month GPU spend = $150K/month. Migration cost: ~$100K compute + 3 engineer-months
    (~$150K). Payback: 1.4 months. 6-month ROI: ($31K + $150K) × 6 - $250K = $836K
    net savings.'
