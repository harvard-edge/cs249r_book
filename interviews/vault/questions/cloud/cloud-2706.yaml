title: Compute Efficiency Beyond B_crit
scenario: A model has B_crit=4096. At B=4096 on 16 GPUs, training takes 10,000 steps (40 hours). Your
  team proposes scaling to B=16384 on 64 GPUs to finish faster. Estimate the actual time savings and compute
  efficiency.
details:
  realistic_solution: 'At B=4096 (1x B_crit): 10,000 steps, 40 hours. At B=16384 (4x B_crit): empirically,
    steps decrease only ~30% to ~7,000 steps (not 2,500 as perfect scaling would predict). Step time stays
    similar (~14s) since AllReduce scales modestly. Wall time: 7,000 × 14s ≈ 27 hours. Speedup: 40/27
    ≈ 1.5x, not 4x. Compute used: 64 GPUs × 27h = 1,728 GPU-hours vs. 16 × 40 = 640 GPU-hours. Compute
    efficiency: 640/1,728 ≈ 37%. You spend 2.7x more GPU-hours for only 1.5x wall-time improvement.'
  common_mistake: Expecting 4x speedup from 4x GPUs. Above B_crit, steps don't decrease proportionally,
    so most of the additional compute is wasted.
  napkin_math: 'At B_crit: 10K steps, 40h, 640 GPU-h. At 4×B_crit: ~7K steps, ~27h, 1728 GPU-h. Efficiency:
    640/1728 ≈ 37%. Speedup: 1.5x for 4x GPUs.'
