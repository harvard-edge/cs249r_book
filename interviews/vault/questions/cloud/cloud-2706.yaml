title: Compute Efficiency Beyond B_crit
scenario: A model has B_crit=4096. At B=4096 on 16 GPUs, training takes 10,000 steps (40 hours). Your team proposes scaling to B=16384 on 64 GPUs to finish faster.
question: "At B_crit=4096, what time savings and compute efficiency should you expect when scaling to B=16384 on 64 GPUs?"
details:
  realistic_solution: 'At B=4096 (1x B_crit): 10,000 steps, 40 hours. At B=16384 (4x B_crit): empirically, steps decrease only ~30% to ~7,000 steps (not 2,500 as perfect scaling would predict). Step time stays similar (~14.4s) since AllReduce scales modestly. Wall time: 7,000 * 14.4s = ~28 hours. Speedup: 40/28 = 1.42x, not 4x. Compute used: 64 GPUs * 28h = 1,792 GPU-hours vs. 16 * 40 = 640 GPU-hours. Compute efficiency: 640/1,792 = 35.7%. You spend 2.8x more GPU-hours for only a 1.4x wall-time improvement.'
  common_mistake: |
    **The Pitfall:** Expecting 4x speedup from 4x GPUs.
    **The Rationale:** Candidates assume perfect linear scaling, failing to realize that above the critical batch size (B_crit), the number of required steps does not decrease proportionally.
    **The Consequence:** Massively overspending on compute resources for highly diminished marginal returns in training speed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Base (B=4096): 10,000 steps, 40 hours, 16 GPUs.
       * Scaled (B=16384): ~7,000 steps, 64 GPUs.
    2. **Calculations:**
       * Base Compute: 16 * 40 = 640 GPU-hours.
       * Scaled Time: 40h * (7000/10000) = 28 hours.
       * Scaled Compute: 64 * 28 = 1,792 GPU-hours.
       * Speedup: 40h / 28h = 1.42x.
       * Efficiency: 640 / 1792 = 35.7%.
    3. **Conclusion & Interpretation:** **Result: 35.7% Compute Efficiency (Scaling-Bound)**. You spend >2.5x more GPU-hours for only a ~1.4x wall-time improvement.
