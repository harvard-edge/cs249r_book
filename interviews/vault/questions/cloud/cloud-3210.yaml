title: MoE Multi-Node Placement Strategy
scenario: You are designing the serving infrastructure for a 256-expert MoE model
  across 4 nodes of 8×H100 GPUs each (32 GPUs total). The model uses top-8 routing.
  You have measured that certain expert pairs are co-activated 70% of the time. Design
  the expert-to-GPU placement strategy that minimizes cross-node communication.
question: How should you place 256 top-8 experts across 4 H100 nodes when some expert
  pairs are co-activated 70% of the time?
details:
  realistic_solution: 'Approach: formulate expert placement as a graph partitioning
    problem. Build a co-activation graph where edge weight between experts i and j
    represents the probability they are activated by the same token. Partition this
    graph into 4 groups of 8 experts (one per node, 8 experts per GPU) that maximizes
    intra-partition edge weight (co-activated experts on the same node). Algorithm:
    (1) Compute co-activation matrix from routing logs: C[i,j] = P(token activates
    both expert i and j). (2) Run METIS graph partitioning to get 4 balanced partitions
    minimizing edge cut. (3) Assign each partition to a node. With top-8 routing and
    co-activation rate of 70% for common pairs, optimal placement can keep 5-6 of
    8 expert activations intra-node (via NVLink at 900 GB/s) and only 2-3 cross-node
    (InfiniBand at 50 GB/s). Expected communication reduction: 60-70% reduction in
    cross-node traffic vs random placement. Re-compute placement weekly as routing
    patterns evolve with traffic changes.'
  common_mistake: Placing experts randomly or round-robin across nodes. This ignores
    co-activation patterns and results in unnecessary cross-node all-to-all traffic
    over slower InfiniBand links.
  napkin_math: 'Random placement: 8 experts activated, 8/32 GPUs on average node →
    probability expert is local = 8/32 = 25%. Expected local: 8 × 0.25 = 2 of 8. Optimized:
    5-6 of 8 local. Cross-node reduction: from 6 remote to 2-3 remote = 50-60% less
    IB traffic. Latency saving: ~5ms per layer for batch of 256 tokens.'
