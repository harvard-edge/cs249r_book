title: 'MoE Multi-Node Placement Strategy'
scenario: You are designing the serving infrastructure for a 256-expert MoE model across 4 nodes of 8xH100 GPUs each (32 GPUs total). The model uses top-8 routing. You have measured that certain expert pairs are co-activated 70% of the time.
question: How should you place 256 top-8 experts across 4 H100 nodes when some expert pairs are co-activated 70% of the time?
details:
  realistic_solution: 'Approach: formulate expert placement as a graph partitioning problem. Build a co-activation graph where edge weight between experts i and j represents the probability they are activated by the same token. Partition this graph into 4 groups of 8 experts that maximizes intra-partition edge weight. Algorithm: (1) Compute co-activation matrix from routing logs. (2) Run METIS graph partitioning to get 4 balanced partitions minimizing edge cut. (3) Assign each partition to a node. With top-8 routing and co-activation rate of 70%, optimal placement can keep 5-6 of 8 expert activations intra-node (via NVLink at 900 GB/s) and only 2-3 cross-node (InfiniBand at 50 GB/s).'
  common_mistake: |
    **The Pitfall:** Placing experts randomly or round-robin across nodes.
    **The Rationale:** It seems like the simplest way to balance expert weights across available memory.
    **The Consequence:** It ignores co-activation patterns and results in massive cross-node all-to-all traffic over slower InfiniBand links, killing inference throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 experts, 4 nodes, 8 GPUs/node. Top-8 routing.
    - NVLink: 900 GB/s, InfiniBand: 50 GB/s.
    
    **Calculations:**
    - Random Local Probability: 8 / 32 GPUs = 25%.
    - Random Local Experts: 8 * 0.25 = 2. Remote: 6.
    - Optimized Local Experts: 5-6. Remote: 2-3.
    - Cross-Node Reduction: (6 - 2.5) / 6 \u2248 58% less IB traffic.
    
    **Conclusion & Interpretation:**
    - **Result: 58% less traffic (Network-Bound)**. Optimal graph placement halves InfiniBand traffic, saving ~5ms per layer.
