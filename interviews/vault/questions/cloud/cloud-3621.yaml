title: Reduce-Scatter and AllGather Decomposition on H100 NVLink
scenario: ZeRO Stage 2 optimizer state sharding on 8 H100s decomposes AllReduce into
  Reduce-Scatter + AllGather. The gradient buffer is 16GB (4B parameter model in FP32).
  Calculate the communication volume for each phase and compare to standard AllReduce.
question: For ZeRO Stage 2 on 8 H100s with a 16 GB gradient buffer, what are the Reduce-Scatter
  and AllGather volumes versus AllReduce?
details:
  realistic_solution: 'Standard AllReduce: 2×(N-1)/N × 16GB = 2×7/8×16=28GB per GPU.
    Reduce-Scatter: each GPU sends 16GB×(N-1)/N=14GB, receives 16/8=2GB reduced shard.
    AllGather: each GPU sends 2GB shard to all, receives full 16GB. Total: Reduce-Scatter
    14GB + AllGather 14GB = 28GB per GPU. Identical communication volume! ZeRO''s
    benefit is memory, not bandwidth: each GPU only holds 1/8th of optimizer states
    in Stage 2.'
  common_mistake: Assuming ZeRO's communication volume is double the standard AllReduce
    because it uses two operations; not recognizing both AllReduce and Reduce-Scatter+AllGather
    have the same 2×(N-1)/N × data asymptotic volume.
  napkin_math: 'AllReduce: 2×7/8×16GB=28GB. Reduce-Scatter: 7/8×16=14GB. AllGather:
    7/8×16=14GB. Total=28GB. Same! ZeRO-2 memory savings: Adam optimizer states (m,v,w)
    = 12 bytes/param × 4B = 48GB. Sharded: 48/8=6GB per GPU. Frees 42GB per GPU for
    larger batch or model.'
