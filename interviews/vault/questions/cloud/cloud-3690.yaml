title: GPipe Bubble Overhead Calculation for 8-Stage Pipeline
scenario: You are implementing GPipe pipeline parallelism across 8 H100 GPUs. The model has 80 transformer layers split evenly (10 per GPU). You use micro-batch size 4 and global batch size 256 (64 micro-batches).
question: With 8 pipeline stages and 64 micro-batches, what is the pipeline bubble fraction and effective GPU utilization?
details:
  realistic_solution: 'Increase the number of micro-batches m to reduce bubble: with m=64, bubble = (8-1)/(64+8-1) = 7/71 = 9.9%. This requires splitting the 256 global batch into 64 micro-batches of 4 samples each. The tradeoff is increased activation memory. Use gradient checkpointing on intermediate stages to manage memory.'
  common_mistake: |
    **The Pitfall:** Ignoring the pipeline bubble entirely when calculating training throughput.
    **The Rationale:** Assuming that pipeline parallelism scales perfectly linearly with GPU count.
    **The Consequence:** Using a small number of micro-batches (e.g., m=4), which creates a 70% bubble and wastes most of the pipeline compute.
  napkin_math: |
    1. **Bubble fraction formula:** `(p-1) / (m+p-1)` where p = pipeline stages, m = micro-batches.
    2. With p=8, m=4: `7 / 11` = **63.6% bubble** (36.4% utilization).
    3. With p=8, m=64: `7 / 71` = **9.9% bubble** (90.1% utilization).
    4. **Result:** Increasing m from 4 to 64 boosts utilization significantly, though it requires more activation memory.
