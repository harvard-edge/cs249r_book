title: Micro-Batch Size Selection for Pipeline Efficiency
scenario: You are training a 13B model with PP=4 on H100 GPUs. Your global batch size is 1024 sequences
  and you want the pipeline bubble to be under 10%. What is the minimum number of micro-batches, and what
  micro-batch size does that imply? What is the activation memory tradeoff?
details:
  realistic_solution: 'Bubble fraction < 10%: (P-1)/(M+P-1) < 0.10. With P=4: 3/(M+3) < 0.10 → M+3 > 30
    → M > 27. Minimum M = 28 micro-batches. Micro-batch size = 1024/28 ≈ 36 sequences (round to 32 for
    power-of-2 efficiency, giving M = 32, bubble = 3/35 = 8.6%). Activation memory per stage with 1F1B:
    P × (activations per micro-batch). For a 13B/4 = 3.25B params per stage, with seq_len=2048 and micro_batch=32,
    activation memory per micro-batch ≈ 4 GB. Peak = 4 × 4 GB = 16 GB for 1F1B. With GPipe it would be
    32 × 4 GB = 128 GB — impossible on 80 GB H100. This is why 1F1B is essential for large M.'
  common_mistake: Setting micro-batch size too large to reduce the number of micro-batches, which inflates
    activation memory per micro-batch and can cause OOM, especially on the first pipeline stage.
  napkin_math: 'Bubble < 10%: M > 27. Use M=32, micro_batch=32. Bubble = 3/35 = 8.6%. 1F1B activation
    peak = P × 4 GB = 16 GB. GPipe peak = M × 4 GB = 128 GB (OOM).'
