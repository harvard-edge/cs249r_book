title: 'NVIDIA H100 LLM Inference: Achieving P99 Latency SLAs'
scenario: You are leading the design of a real-time, high-throughput inference service for a large language model. The model is deployed across a cluster of NVIDIA H100 GPUs. Your primary challenge is to consistently meet a strict Service Level Agreement (SLA) of 100ms for P99 inference latency, meaning 99% of all requests must complete within 100ms.
question: How would you leverage techniques like straggler detection, hedged requests, and SLA-driven resource management to ensure this critical P99 target is always met?
details:
  realistic_solution: Implement a hierarchical monitoring system tracking latency at every stage (request queueing, data transfer, H100 kernel execution, post-processing, network egress). Utilize adaptive batching and dynamic load balancing informed by real-time H100 utilization and memory bandwidth metrics. Employ an intelligent hedged request strategy where a secondary request is issued if the primary doesn't receive a response within a P90/P95 threshold. Design for effective backpressure and graceful degradation. Proactively scale resources based on predictive analytics of traffic patterns and historical straggler rates. Fine-tune H100 kernel optimizations, tensor parallelism, and efficient data pipelining to minimize individual inference times and variability, ensuring optimal use of the 3.35 TB/s HBM3 bandwidth.
  common_mistake: |
    **The Pitfall:** Optimizing solely for average (P50) latency or throughput.
    **The Rationale:** Candidates often lack a deep understanding of tail latency characteristics, workload variability, and the specific performance profile of the hardware under varying load conditions. They overlook non-GPU bottlenecks.
    **The Consequence:** Failing to meet strict P99 SLAs due to unmitigated stragglers and queue build-up.
  napkin_math: |
    1. For a 7B model (14 GB FP16), token generation takes ~4.2ms (14GB / 3.35 TB/s).
    2. A 20-token response takes 84ms in compute.
    3. This leaves just 16ms for network and queueing to meet a 100ms SLA.
    **Result:** If a hedged request is issued at 10ms for requests stuck in the queue, and it consumes 1.5x resources, the total cluster load only increases by 7.5%, but the P99 latency is kept under 100ms by cutting off the longest queueing delays.
