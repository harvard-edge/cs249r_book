title: RDMA QP (Queue Pair) Scalability Limits on Large H100 Clusters
scenario: >-
  An RDMA-based AllReduce library on a 1024-H100 cluster creates one Queue
  Pair per peer connection. The HCA reports QP creation failures at job startup.
question: >-
  Why does one RDMA Queue Pair per peer fail to scale on 1024 H100s, and what
  connection strategy should replace it?
details:
  realistic_solution: 'With N=1024 GPUs, all-to-all QPs: 1024×1023/2 ≈ 524K QPs total, 1023 QPs per GPU. Mellanox ConnectX-6 HDR supports ~4M QPs total but memory: each QP requires ~512 bytes HCA memory → 524K×512B=268MB per HCA. More critical: HCA cache for active QPs is typically 1K-4K. With 1023 active QPs, cache misses dominate. Fix: (1) Shared Receive Queue (SRQ): single receive buffer pool, O(N) not O(N²). (2) RC→UD transport: Unreliable Datagram uses one QP for all destinations. (3) Connection reuse: connect only to ring neighbors (2 QPs per GPU for ring AllReduce). For ring AllReduce: 2 QPs per GPU regardless of cluster size. Switching from all-to-all QPs to ring-only: 1023 QPs → 2 QPs. Startup time: O(1) vs O(N).'
  common_mistake: |
    **The Pitfall:** Assuming HCAs can handle unlimited Queue Pairs.
    **The Rationale:** Candidates don't recognize that RDMA QP count scales as O(N²) for all-to-all connectivity, exhausting HCA SRAM cache and leading to severe performance drops or outright connection failures.
    **The Consequence:** Network hangs, job startup failures, and unscalable distributed infrastructure.
  napkin_math: |
    1. **All-to-all QPs:** N=1024, QPs per node=1023.
    2. **Memory per QP:** 256B send WR + 256B recv WR = 512B.
    3. **Total QP memory:** 1023 × 512B ≈ 511 KB per node.
    4. **HCA Cache limits:** HCA SRAM cache is ~4MB, 511KB consumes 12.8%, causing cache thrashing.
    5. **Ring-only replacement:** 2 QPs per node × 512B = **1 KB**, eliminating cache misses and connection overhead.
