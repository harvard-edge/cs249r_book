title: The TCO Per Token Analysis
scenario: Your VP of Engineering asks you to evaluate whether to build or buy LLM inference capacity. An 8xH100 server costs $250K with a 3-year amortization. Power is 5.6 kW at $0.10/kWh. Each GPU produces ~5,000 tokens/sec for your 13B model. Assuming 70% utilization, compare the all-in cost per million tokens to a cloud API charging $0.50 per million tokens.
question: At what sustained daily token demand does building on-prem inference capacity become more cost-effective than a $0.50 per million token cloud API?
details:
  realistic_solution: 'Server CAPEX amortized: $250K / 3 years = $83.3K/year. Energy: 5.6 kW * 8,760 hrs * $0.10 = $4,906/year, so 3-year hardware plus power TCO is about $265K. Token output is 8 GPUs * 5,000 tok/s * 0.70 * 86,400 s/day * 1,095 days = 2.65 trillion tokens, or 2.65 million one-million-token units. Raw cost is $265K / 2.65M = about $0.10 per million tokens. If ops, networking, and facilities add enough overhead to reach about $0.25/M tokens, on-prem is still below the $0.50/M API price, but only if demand is sustained enough to keep the server near the assumed 70% utilization. The raw hardware break-even is about 484M tokens/day; with $0.25/M all-in cost, the effective target is closer to full use of this server, about 2.4B tokens/day.'
  common_mistake: |
    **The Pitfall:** Only comparing hardware CAPEX to API pricing.
    **The Rationale:** This fails to account for energy, cooling, staffing, and realistic utilization, as 70% is optimistic for most organizations.
    **The Consequence:** This leads to a severe underestimation of the true Total Cost of Ownership (TCO) for on-premise infrastructure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Server CAPEX: $250K over 3 years.
    - Power: 5.6 kW at $0.10/kWh.
    - Throughput: 8 GPUs * 5,000 tokens/sec = 40,000 tokens/sec.
    - Utilization: 70%.

    **Calculations:**
    - CAPEX = $83.3K/yr.
    - Energy = 5.6 kW * 8760 hrs * $0.10 = $4.9K/yr.
    - 3-year hardware + energy TCO = $250K + 3 * $4.9K = $264.7K.
    - Output = 40,000 tok/s * 0.70 * 94.6M s = 2.65T tokens over 3 years.
    - 2.65T tokens = 2.65M one-million-token units.
    - Raw cost = $264.7K / 2.65M = $0.10/M tokens.
    - If ops/networking/facilities add ~$0.15/M, all-in cost = ~$0.25/M tokens.
    - Raw break-even demand against $0.50/M API: ($264.7K / 1,095 days) / ($0.50 per M tokens) = ~484M tokens/day.
    - At the assumed 70% utilization, the server produces 40,000 * 0.70 * 86,400 = 2.42B tokens/day, comfortably above raw break-even.

    **Conclusion & Interpretation:**
    - **Result: $0.10/M raw, ~$0.25/M with stated overhead (Utilization-Bound)**. Building on-prem is cost-effective only with sustained demand high enough to keep the server near the assumed utilization; raw break-even is ~484M tokens/day.
