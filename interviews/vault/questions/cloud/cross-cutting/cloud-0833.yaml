title: The TCO Per Token Analysis
scenario: Your VP of Engineering asks you to evaluate whether to build or buy LLM inference capacity. An 8xH100 server costs $250K with a 3-year amortization. Power is 5.6 kW at $0.10/kWh. Each GPU produces ~5,000 tokens/sec for your 13B model. Assuming 70% utilization, compare the all-in cost per million tokens to a cloud API charging $0.50 per million tokens.
question: At what sustained daily token demand does building on-prem inference capacity become more cost-effective than a $0.50 per million token cloud API?
details:
  realistic_solution: Using only the stated CAPEX and power inputs, the 3-year server cost is $250K + 3 * $4.9K = about $264.7K. Spread across 1,095 days, that is about $242/day. Against a $0.50 per million token API, the daily break-even demand is $242 / $0.50 = about 484 million tokens/day. At the assumed 70% utilization, the server can produce 8 * 5,000 tok/s * 0.70 * 86,400 = about 2.42 billion tokens/day, so the fully utilized raw hardware+energy cost is about $0.10/M tokens. Any staffing, networking, facilities, or utilization shortfall should be added as a sensitivity analysis; it is not part of the stated numeric break-even.
  common_mistake: |
    **The Pitfall:** Only comparing hardware CAPEX to API pricing.
    **The Rationale:** This fails to account for energy, cooling, staffing, and realistic utilization, as 70% is optimistic for most organizations.
    **The Consequence:** This leads to a severe underestimation of the true Total Cost of Ownership (TCO) for on-premise infrastructure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Server CAPEX: $250K over 3 years.
    - Power: 5.6 kW at $0.10/kWh.
    - Throughput: 8 GPUs * 5,000 tokens/sec = 40,000 tokens/sec.
    - Utilization: 70%.

    **Calculations:**
    - CAPEX = $250K over 3 years, or $83.3K/yr.
    - Energy = 5.6 kW * 8,760 hrs * $0.10 = $4.9K/yr.
    - 3-year hardware + energy TCO = $250K + 3 * $4.9K = $264.7K.
    - Output = 40,000 tok/s * 0.70 * 94.6M s = 2.65T tokens over 3 years.
    - 2.65T tokens = 2.65M one-million-token units.
    - Raw hardware+energy cost at 70% utilization = $264.7K / 2.65M = $0.10/M tokens.
    - Daily fixed cost = $264.7K / 1,095 days = ~$242/day.
    - Break-even demand against $0.50/M API: $242/day / ($0.50 per M tokens) = ~484M tokens/day.
    - At the assumed 70% utilization, the server produces 40,000 * 0.70 * 86,400 = 2.42B tokens/day, comfortably above raw break-even.

    **Conclusion & Interpretation:**
    - **Result: ~484M tokens/day raw break-even (Utilization-Bound)** under the stated 3-year hardware+energy assumptions. At 70% utilization the server can produce ~2.42B tokens/day at about $0.10/M; extra overheads should be modeled separately rather than mixed into the main threshold.
