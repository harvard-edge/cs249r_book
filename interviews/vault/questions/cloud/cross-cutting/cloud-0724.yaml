title: The Heterogeneous Cluster Scheduler
scenario: Your GPU cluster has grown organically over 3 years and now contains a mix of older and newer generations. You run a mix of training jobs and inference workloads. The current scheduler treats all GPUs as equivalent, leading to 35% average utilization.
question: "How would you design a heterogeneity-aware scheduler for a mixed-generation cluster to maximize utilization and cost efficiency?"
details:
  realistic_solution: 'A heterogeneity-aware scheduler needs three components: (1) **Workload profiling** — automatically characterize each job''s resource profile: compute-bound vs memory-bound (roofline), VRAM requirement, communication pattern (TP/DP/PP), and interconnect sensitivity. (2) **Hardware-workload affinity scoring** — match workloads to GPU types based on cost-efficiency, not raw performance. Memory-bound inference → highest bandwidth/dollar. Compute-bound training → best FLOPS/dollar. Small fine-tuning → cheapest, sufficient VRAM. Large-batch training → good VRAM, acceptable FLOPS. (3) **Bin-packing with fragmentation avoidance** — pack small jobs onto partially-used nodes before allocating fresh nodes. Reserve contiguous NVLink domains for TP-heavy jobs.'
  common_mistake: |
    **The Pitfall:** Priority scheduling based on hardware recency.
    **The Rationale:** Engineers assume newer GPUs should simply be given to the "most important" jobs.
    **The Consequence:** This leaves old GPUs idle and fails to account for workload-hardware affinity, crippling overall cost efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 960 total GPUs, $2.50/GPU-hr average cost, increasing average utilization from 35% to 67%.

    **Calculations:**
    - Current effective capacity = 960 * 24 * 0.35 = 8,064 GPU-hours/day.
    - New capacity = (64*24*0.85) + (512*24*0.70) + (384*24*0.60) = 15,436.8 GPU-hours/day.
    - Recovered capacity = 15,436.8 - 8,064 = 7,372.8 GPU-hours/day.
    - Cost savings = 7,372.8 * $2.50 = ~$18,432/day = ~$553k/month.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound Optimization.** Affinity routing increases utilization to 67%, saving over $500k/month in recovered capacity.
