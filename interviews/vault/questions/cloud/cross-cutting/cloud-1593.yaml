title: Trade-offs in Disaggregated Performance vs Latency
scenario: You are evaluating two LLMs for a medical triage application. The 13B quantized model achieves an average 150ms TTFT and costs $1.50/hr. Its Model Card shows an F1 score of 0.94 for the majority demographic (80% of users) but 0.78 for a minority demographic (20% of users). The 70B model costs $12.00/hr, achieves 350ms TTFT, and has a uniform F1 of 0.92. The strict system SLA requires <200ms average TTFT.
question: How would you serve the medical triage LLMs to keep average TTFT under 200ms while ensuring each demographic has F1 of at least 0.92?
details:
  realistic_solution: Implement a hybrid routing architecture with an audited routing rule. Send minority-demographic requests to the 70B model, where F1 is 0.92, and send majority-demographic requests to the 13B model, where F1 is 0.94. This satisfies the per-demographic F1 >= 0.92 criterion while keeping average TTFT under the SLA and reducing cost versus serving all traffic on the 70B model.
  common_mistake: |
    **The Pitfall:** Unconditionally deploying the 70B model or only looking at the aggregate 13B F1 score.
    **The Rationale:** Candidates fail to consider hybrid routing architectures that balance cost, latency, and fairness simultaneously.
    **The Consequence:** The deployment either violates the 200ms SLA and explodes costs, or deploys an unfairly biased model.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA is average TTFT <200 ms.
    - Fairness target is F1 >= 0.92 for each demographic.
    - 13B model: 150 ms TTFT, $1.50/hr, majority F1 = 0.94, minority F1 = 0.78.
    - 70B model: 350 ms TTFT, $12.00/hr, F1 = 0.92 for both groups.
    - Traffic mix: 80% majority, 20% minority.

    **Calculations:**
    - Route majority to 13B and minority to 70B.
    - Hybrid average TTFT = (0.8 * 150 ms) + (0.2 * 350 ms) = 120 + 70 = 190 ms.
    - Majority F1 = 0.94; minority F1 = 0.92, so both meet the 0.92 target.
    - Hybrid effective cost = (0.8 * $1.50) + (0.2 * $12.00) = $1.20 + $2.40 = $3.60/hr.

    **Conclusion & Interpretation:**
    - **Result: Hybrid routing meets the stated average latency and subgroup F1 constraints.** A pure 70B deployment would satisfy fairness but miss the average TTFT target at 350 ms and cost $12/hr.
