title: Architecting a Real-time Fairness Evaluation System on Google TPU
scenario: Your organization has developed a critical ML model that processes extremely large and diverse patient datasets. This model is deployed on a cluster of TPU v5e instances, each with 16 GB HBM, 197 TFLOPS BF16, and 1.6 TB/s memory bandwidth. Regulatory and ethical guidelines demand continuous, real-time fairness evaluation across various sensitive attributes.
question: How would you architect real-time fairness monitoring on TPU v5e for demographic parity, equalized odds, and intersectional subgroups?
details:
  realistic_solution: Implement a dedicated fairness-monitoring service adjacent to the inference path, not inside the TPU critical path. Emit prediction, label-when-available, confidence, model version, and sensitive-attribute bucket events to a streaming system. Maintain windowed counters for demographic parity and equalized odds by subgroup and intersectional key, with approximate sketches or top-k controls for high-cardinality combinations. Use alerts for statistically significant drift and route richer audits to offline CPU/GPU analytics where irregular joins, labels, and subgroup slicing are easier to manage. TPU resources can batch-score sampled audit prompts, but real-time metric aggregation should run in the observability and analytics stack.
  common_mistake: |
    **The Pitfall:** Treating fairness evaluation as an offline, batch process separate from inference.
    **The Rationale:** Candidates view fairness as a slow analytics task rather than an operational real-time constraint.
    **The Consequence:** Insights are stale, and bias mitigation is purely reactive, allowing biased predictions to affect patients for hours or days before detection.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 10M inferences/hr. Sampling rate: 1% (100k samples/hr).
    - Intersectional subgroups: 1,000.
    - Compute per sample: ~3 matrix multiplications (30M ops).
    - Hardware: TPU v5e (197 TFLOPS, 1.6 TB/s HBM).

    **Calculations:**
    - Total Compute: 100,000 samples * 30M ops = 3 * 10^12 ops/hour.
    - Required Throughput: (3 * 10^12) / 3600 = 8.33 * 10^8 ops/sec (0.0008 TFLOPS).
    - TPU Compute Utilization: 0.0008 / 197 ≈ 0.000004 (or 0.0004%).
    - Counter updates are about 100,000 samples/hour, or 28 samples/second before fan-out across metric keys, which is an analytics-streaming problem rather than a TPU compute problem.
    - The math does not prove an HBM bandwidth bottleneck; subgroup joins, delayed labels, cardinality, and statistical confidence windows are the dominant design constraints.

    **Conclusion & Interpretation:**
    - **Result: Streaming Analytics, Not TPU-Bound.** Fairness monitoring should use online counters and alerting plus offline audits; TPU compute can help with sampled model evaluation but is not where the subgroup aggregation should primarily live.
