title: Federated DP with Heterogeneous Client Noise
scenario: You are running federated learning across 10,000 mobile clients using DP-FedAvg. Each client clips its local gradient update to L2 norm C=1.0 and adds Gaussian noise σ=0.5. After 500 rounds, the central server aggregates updates from a variable number of participating clients (between 50 and 500 per round). Your privacy accountant tracks (ε, δ)=(4.2, 1e-5) at round 500. A compliance officer asks why the privacy bound isn't tighter given 10,000 enrolled clients but only ~200 average participation.
question: Why isn't the DP-FedAvg privacy bound tighter with 10,000 enrolled clients but only about 200 participants per round?
details:
  realistic_solution: 'Privacy amplification is based on the per-round client sampling process, not just the 10,000 enrolled-client count. With about 200 participants, the nominal participation rate is q=200/10,000=2%, so each client is exposed to many sampled Gaussian mechanisms over 500 rounds. Variable participation must be fed into the accountant round by round: larger K increases sampling rate but also improves aggregation/noise averaging, while smaller K lowers sampling rate but can worsen the signal-to-noise ratio of one client''s contribution when noise is averaged. The reported ε=4.2 is therefore plausible if it was computed from the actual sequence of participation counts, clipping, noise multiplier, and composition. Do not replace that accountant with an average-K back-of-the-envelope or claim a tighter bound just because 10,000 clients are enrolled.'
  common_mistake: |
    **The Pitfall:** Assuming privacy amplification applies to the total enrollment pool rather than active participants.
    **The Rationale:** It's intuitive to think that hiding among 10,000 users offers immense privacy, ignoring the mechanics of round-by-round aggregation.
    **The Consequence:** Privacy bounds are vastly underestimated, and worst-case rounds with low participation leak more information than accounted for.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Enrolled clients: 10,000.
       - Average participants per round: 200.
       - Worst-case participants per round: 50.
       - Sensitivity C=1.0, client noise multiplier σ=0.5.
       - Accountant report after 500 rounds: ε=4.2 at δ=1e-5.
    2. **Calculations:**
       - Average participation rate: q_avg = 200 / 10,000 = 0.02.
       - Participation range: q_min = 50 / 10,000 = 0.005, q_max = 500 / 10,000 = 0.05.
       - For a fixed sampled Gaussian mechanism, the accountant composes privacy loss using each round's q, clipping norm, noise multiplier, and aggregation rule.
       - If clients add noise locally and the server averages K updates, the averaged noise scales as σC/sqrt(K), while one clipped client's averaged contribution scales as C/K; K therefore changes both amplification and normalized sensitivity.
       - The valid quantitative value is the accountant's composed ε=4.2, not an independent formula like q * C^2/(σ^2K).
    3. **Conclusion & Interpretation:**
       - **Result: Accountant-Bound.** The 10,000 enrolled clients do not by themselves make ε tiny; DP-FedAvg must compose the actual per-round sampled Gaussian mechanisms, and variable K must be represented in that accountant rather than averaged away.
