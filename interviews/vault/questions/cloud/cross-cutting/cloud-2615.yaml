title: Federated Learning Break-Even Analysis
scenario: Centralized training costs $8K/month for GPU rental and $5K/month for data ingestion (200TB). A federated approach costs $2K/month for the aggregation server, $0.50/device/month for 500 edge devices, and $1K/month for WAN.
question: At what data volume does the federated approach become cheaper than centralized training?
details:
  realistic_solution: |
    Under the stated monthly costs, centralized training costs $8K GPU rental + $5K data ingestion = $13K/month at the given 200TB volume. Federated costs $2K aggregation server + (500 × $0.50) device management + $1K WAN = $3.25K/month. There is no positive break-even data volume derivable from the given fixed terms: centralized is already more expensive at the stated volume, and the problem does not provide a per-TB ingestion function for other volumes. Under these assumptions, federated is cheaper for all volumes covered by the stated fixed-cost comparison.
  common_mistake: |
    **The Pitfall:** Assuming federated is universally cheaper purely due to bandwidth savings.
    **The Rationale:** Engineers ignore edge compute limitations or metered WAN overheads, which can make federated more expensive at massive scales.
    **The Consequence:** Migrating systems incorrectly without realizing edge capacity constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized monthly cost at 200TB: $8K GPU + $5K data ingestion.
    - Federated monthly cost: $2K aggregation + (500 devices * $0.50/device) + $1K WAN.
    - No per-TB cost curve is provided for changing centralized data volume.

    **Calculations:**
    - Centralized total = $8K + $5K = $13K/month.
    - Federated device-management cost = 500 * $0.50 = $250/month.
    - Federated total = $2K + $250 + $1K = $3.25K/month.
    - Difference at the stated assumptions = $13K - $3.25K = $9.75K/month.

    **Conclusion & Interpretation:**
    - **Result: No positive break-even volume from the given numbers.** Federated is cheaper under the stated fixed monthly costs, but that conclusion depends on the scenario assumptions and does not prove edge compute is free.
