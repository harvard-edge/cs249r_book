title: Federated Learning Break-Even Analysis
scenario: Centralized training costs $8K/month for GPU rental plus $25/TB for data ingestion, so 200TB costs $5K to ingest. A federated approach costs $2K/month for the aggregation server, $0.50/device/month for 500 edge devices, and $1K/month for WAN.
question: Does a positive break-even data volume exist, and what does the cost model show?
details:
  realistic_solution: |
    With centralized cost modeled as $8K + $25/TB * V and federated cost modeled as $2K aggregation + $250 device management + $1K WAN = $3.25K/month, the algebraic break-even is negative: $8K + $25V = $3.25K gives V = -190TB. Because negative data volume is impossible, there is no positive break-even point. Under the stated cost model, federated is already cheaper at any nonnegative data volume, including the 200TB example.
  common_mistake: |
    **The Pitfall:** Assuming federated is universally cheaper purely due to bandwidth savings.
    **The Rationale:** Engineers ignore edge compute limitations or metered WAN overheads, which can make federated more expensive at massive scales.
    **The Consequence:** Migrating systems incorrectly without realizing edge capacity constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized monthly cost: $8K GPU + $25/TB * V.
    - Federated monthly cost: $2K aggregation + (500 devices * $0.50/device) + $1K WAN.

    **Calculations:**
    - Centralized total C(V) = $8K + $25V.
    - Federated device-management cost = 500 * $0.50 = $250/month.
    - Federated total F(V) = $2K + $250 + $1K = $3.25K/month.
    - Break-even: $8,000 + $25V = $3,250.
    - $25V = -$4,750, so V = -190TB.
    - At 200TB: C(200) = $8K + $5K = $13K/month; F = $3.25K/month.

    **Conclusion & Interpretation:**
    - **Result: No positive break-even volume.** The calculated break-even is -190TB, so federated is cheaper for all nonnegative data volumes under this simplified cost model.
