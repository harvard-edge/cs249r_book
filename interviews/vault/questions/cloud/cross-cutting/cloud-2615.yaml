title: Federated Learning Break-Even Analysis
scenario: Centralized training costs $8K/month for GPU rental and $5K/month for data ingestion (200TB). A federated approach costs $2K/month for the aggregation server, $0.50/device/month for 500 edge devices, and $1K/month for WAN.
question: At what data volume does the federated approach become cheaper than centralized training?
details:
  realistic_solution: 'The federated cost is fixed at $3.25K. Centralized GPU cost alone ($8K) exceeds the entire federated cost. Therefore, federated is cheaper at all data volumes.'
  common_mistake: |
    **The Pitfall:** Assuming federated is universally cheaper purely due to bandwidth savings.
    **The Rationale:** Engineers ignore edge compute limitations or metered WAN overheads, which can make federated more expensive at massive scales.
    **The Consequence:** Migrating systems incorrectly without realizing edge capacity constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized GPU = $8K.
    - Federated Fixed = $2K + (500 * $0.5) + $1K = $3.25K.

    **Calculations:**
    - Break-even equation: $8K + DataCost(V) = $3.25K.
    - Since 8K > 3.25K, Break-even Volume < 0.

    **Conclusion & Interpretation:**
    - **Result: Federated is strictly cheaper at ALL data volumes due to free edge compute offsetting cloud GPU rental.**
