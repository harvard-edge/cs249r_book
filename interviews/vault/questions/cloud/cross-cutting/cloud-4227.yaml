title: DP-SGD Training Cost on H100
scenario: >-
  You're training a text classifier (BERT-base, 110M params) with DP-SGD on
  8× H100 GPUs. Standard SGD training takes 4 hours. DP-SGD requires per-sample gradient
  clipping and Gaussian noise addition.
question: >-
  How much slower will DP-SGD be than 4-hour standard SGD for BERT-base on
  8× H100s, and what is the bottleneck?
details:
  realistic_solution: 'Standard SGD computes gradients for an entire mini-batch in one backward pass — the loss is averaged, and a single gradient tensor per parameter is produced. DP-SGD requires individual gradients for each sample in the batch to clip each one independently before averaging. For batch size 64: standard backprop produces 1 gradient per parameter, DP-SGD produces 64 gradients per parameter. This 64× memory increase forces either: (1) virtual batching — run batch_size=1 forward/backward 64 times sequentially, or (2) specialized implementations (Opacus, JAX vmap) that compute per-sample gradients via clever vectorization but still use 3-10× more memory. Opacus on H100: typically 3-8× slower than standard training due to per-sample gradient memory pressure and reduced batch size.'
  common_mistake: |
    **The Pitfall:** Assuming DP-SGD is simply 'SGD plus noise' with negligible overhead.
    **The Rationale:** Candidates think the noise addition is the bottleneck, missing that the requirement for individual, per-sample gradients prevents standard batch-level gradient accumulation optimizations.
    **The Consequence:** Vastly underestimating the compute and memory overhead of differential privacy, leading to out-of-memory errors or blown schedules.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard SGD takes 4 hours.
    - BERT-base has 110M params, batch size 64.
    - DP-SGD requires per-sample gradient clipping.
    - Opacus implementation on H100 incurs ~5x throughput overhead.

    **Calculations:**
    - Standard SGD gradients = 110M params × 4 bytes = 440 MB.
    - DP-SGD naive gradients = 64 × 440 MB = 28.2 GB per-sample gradients.
    - Optimized Opacus memory overhead = ~3x (1.32 GB).
    - Training time = 4 hours × 5 = 20 hours.

    **Conclusion & Interpretation:**
    - **Result: 20 hours (Compute-Bound)**. The requirement for individual, per-sample gradients prevents standard batch-level optimizations, creating massive memory and compute overheads.
