title: DP-SGD Training Cost on H100
scenario: You're training a text classifier (BERT-base, 110M params) with DP-SGD on 8× H100 GPUs. Standard SGD training takes 4 hours. DP-SGD requires per-sample gradient clipping and Gaussian noise addition.
question: How much slower will DP-SGD be than 4-hour standard SGD for BERT-base on 8× H100s, and what is the bottleneck?
details:
  realistic_solution: 'Standard SGD computes gradients for an entire mini-batch in one backward pass: the loss is averaged and a single gradient tensor per parameter is produced. DP-SGD needs per-sample gradients so each example can be clipped before averaging and adding Gaussian noise. A naive batch-size-64 implementation would materialize 64 gradient sets and be memory-prohibitive, but libraries such as Opacus avoid fully storing that tensor with hooks, ghost clipping, microbatching, or vectorization. The practical cost is still about 5× slower than standard training on this setup, so 4 hours becomes roughly 20 hours. The bottleneck is memory traffic and reduced effective batch size from per-sample gradient processing, not the Gaussian noise addition itself.'
  common_mistake: |
    **The Pitfall:** Assuming DP-SGD is simply 'SGD plus noise' with negligible overhead.
    **The Rationale:** Candidates think the noise addition is the bottleneck, missing that the requirement for individual, per-sample gradients prevents standard batch-level gradient accumulation optimizations.
    **The Consequence:** Vastly underestimating the compute and memory overhead of differential privacy, leading to out-of-memory errors or blown schedules.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard SGD takes 4 hours.
    - BERT-base has 110M params, batch size 64.
    - DP-SGD requires per-sample clipping before averaging.
    - Use a practical Opacus-style implementation with about 5x throughput slowdown.

    **Calculations:**
    - Standard SGD gradients = 110M params × 4 bytes = 440 MB.
    - Naive per-sample gradient materialization = 64 × 440 MB = 28.2 GB, an upper bound that ignores optimized clipping implementations.
    - Practical implementations trade extra passes, hooks, and memory traffic for lower peak memory, commonly about 3-8x slower.
    - Training time = 4 hours × 5 = 20 hours.

    **Conclusion & Interpretation:**
    - **Result: about 20 hours (memory-throughput-bound)**. The main bottleneck is per-sample gradient processing and clipping, which increases memory traffic and often reduces effective batch size.
