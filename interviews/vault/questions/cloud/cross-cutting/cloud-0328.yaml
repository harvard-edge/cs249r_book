title: 'The TCO Iceberg (cloud-0328)'
scenario: 'A popular, large-scale language model is deployed to run for 3 years in production.'
question: 'Which component typically represents the largest portion of its Total Cost of Ownership (TCO)?'
details:
  realistic_solution: 'Inference cost almost always dominates the TCO for a successful, long-lived service. A model might be trained once, but it serves billions or trillions of requests over its multi-year lifespan. The cumulative energy, hardware amortization for the serving fleet, and operational overhead of serving those requests far outweighs the initial training expense.'
  common_mistake: |
    **The Pitfall:** Fixating on the high upfront cost of a multi-million dollar training run.
    **The Rationale:** Training costs are highly publicized and represent a massive single purchase, whereas inference costs are operational and trickling.
    **The Consequence:** Misallocating the optimization budget by focusing purely on training efficiency instead of the much larger long-term serving costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-year production lifespan.
    - Billions of requests served over the lifespan.

    **Calculations:**
    - Initial model training is a one-time CapEx.
    - Serving requires massive fleet power, cooling, and hardware amortization.

    **Conclusion & Interpretation:**
    - **Result: Cumulative inference costs (Cost-Bound)**. The operational expense of serving billions of requests heavily outweighs the initial training CapEx over a multi-year horizon.
  options:
  - 'Initial model training cost'
  - 'Data collection and labeling'
  - 'Cumulative inference costs'
  - 'A/B testing and experimentation infrastructure'
