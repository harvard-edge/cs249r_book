title: 'Federated Averaging Optimization on NVIDIA A100 for Non-IID Data'
scenario: 'You are designing a federated learning system for a large-scale mobile health application, aggregating models from millions of edge devices. The central server orchestrates Federated Averaging (FedAvg) using a cluster equipped with NVIDIA A100 GPUs. Your current challenge involves severe performance bottlenecks due to frequent communication rounds and non-IID data distributions across devices, leading to slow convergence and high training costs. Specifically, the model updates are large, and device uplink bandwidth is limited.'
question: 'How would you diagnose the primary bottleneck (communication vs. computation on A100), propose an optimization strategy, and quantify its expected impact?'
details:
  realistic_solution: 'Diagnose the bottleneck by monitoring A100 GPU utilization, HBM2e bandwidth, and network I/O during federated training rounds. If communication is the bottleneck, implement selective parameter aggregation or quantization schemes. For non-IID data, consider techniques like FedProx or client sampling strategies. Quantify the fix by calculating reduction in communication volume per round, improved convergence rate (fewer rounds), and corresponding decrease in A100 compute-hour consumption and network egress costs.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to complex model compression techniques without profiling.
    **The Rationale:** Candidates overlook the impact of non-IID data on convergence and fail to profile compute vs. communication overhead first.
    **The Consequence:** Sub-optimal solutions that address the wrong bottleneck, leading to prolonged training times and wasted compute resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model update size: 1 GB
    - Baseline communication rounds: 1000
    - Quantization reduction factor: 4x
    - Round reduction from FedAvg variant: 25%

    **Calculations:**
    - New model size = 1 GB / 4 = 0.25 GB
    - New communication rounds = 1000 * (1 - 0.25) = 750 rounds
    - Total communication volume = 750 * 0.25 GB = 187.5 GB

    **Conclusion & Interpretation:**
    - **Result: 187.5 GB (Communication-Bound)**. Optimizing both data volume and round count reduces total transfer from 1000 GB to 187.5 GB, significantly accelerating the pipeline.
