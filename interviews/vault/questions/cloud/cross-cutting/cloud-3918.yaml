title: 'Migrating cuDNN-Fused Operators to Portable Alternatives'
scenario: 'Your training pipeline relies on cuDNN''s fused BatchNorm+ReLU+Conv kernel, which gives a 15% speedup over unfused execution on H100. When porting to MI300X, MIOpen does not offer an equivalent three-way fusion.'
question: 'How do you recover the performance of a cuDNN-specific 3-way fusion on MI300X when MIOpen lacks an equivalent?'
details:
  realistic_solution: 'Use a JIT compiler like `torch.compile` (which leverages Triton) or write a custom Triton kernel. Triton generates portable code that compiles to both PTX (NVIDIA) and AMD ISA, allowing you to fuse the operations (Conv+BN+ReLU) into a single kernel and avoid the intermediate HBM round-trips, recovering the performance without relying on vendor-specific libraries.'
  common_mistake: |
    **The Pitfall:** Accepting the 15% regression as inevitable on MI300X.
    **The Rationale:** Believing that hardware-specific vendor libraries are the only way to achieve advanced kernel fusions.
    **The Consequence:** Missing out on portable JIT compilation strategies like Triton that can recover the gap by generating optimal AMD ISA code.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unfused execution of Conv+BN+ReLU requires writing and reading intermediate activations to HBM 3 times.
    - Fused execution performs the operation in 1 HBM round-trip.

    **Calculations:**
    - HBM trips reduced from 3 to 1.
    - Bandwidth savings proportional to activation size.

    **Conclusion & Interpretation:**
    - **Result: 3x fewer HBM trips (Memory-Bandwidth-Bound)**. JIT compilation recovers the 15% performance overhead without vendor lock-in by keeping operations memory-bound.
