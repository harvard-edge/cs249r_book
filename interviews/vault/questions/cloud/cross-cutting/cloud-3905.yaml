title: Triton's IR Compilation Pipeline for Multi-Backend Targeting
scenario: Triton compiles a Python-like DSL to GPU machine code via multiple Intermediate Representation (IR) stages.
question: "How does Triton's compilation pipeline enable portability across NVIDIA PTX and AMDGPU, and where are backend-specific choices made?"
details:
  realistic_solution: Triton relies on a multi-stage lowering architecture. The Python AST is first lowered to high-level Triton IR, then to Triton GPU IR (TTGIR), which injects GPU concepts like shared memory and barriers. Crucially, TTGIR lowers into LLVM IR. It is only at this final LLVM IR stage that the compiler forks, utilizing LLVM's target-specific backends to emit NVIDIA PTX or AMD's AMDGPU ISA. Backend-specific optimizations like register allocation and memory coalescing occur strictly in the LLVM backend.
  common_mistake: |
    **The Pitfall:** Believing Triton compiles directly from Python AST to PTX/AMDGPU assembly.
    **The Rationale:** Candidates interact with Triton strictly through its Python decorator, masking the massive compiler toolchain operating underneath.
    **The Consequence:** Inability to debug performance regressions or write custom LLVM passes, treating the compiler as a magical, un-tunable black box.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Triton IR -> TTGIR -> LLVM IR -> PTX/AMDGPU.
       - Compilation time: 1-2s (NVIDIA), 2-4s (AMD).
       - Model: 100 custom kernels.
    2. **Calculations:**
       - NVIDIA cold start: 100 kernels * 1.5s = 150 seconds.
       - AMD cold start: 100 kernels * 3.0s = 300 seconds.
       - Caching: Subsequent runs = 0 seconds overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Portability via LLVM IR.** The pipeline is **Compiler-Backend-Agnostic** until the final LLVM lowering, ensuring the same TTGIR can cleanly map to distinct hardware architectures.
