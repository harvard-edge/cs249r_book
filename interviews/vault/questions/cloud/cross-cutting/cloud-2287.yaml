title: The Fairness Impossibility Tradeoff
scenario: 'Your team''s loan approval model must satisfy both demographic parity and equalized odds. A fairness researcher notes that satisfying both simultaneously is mathematically impossible except in trivial cases.'
question: 'Why are demographic parity and equalized odds impossible to satisfy together except in trivial cases?'
details:
  realistic_solution: 'The Chouldechova-Kleinberg impossibility theorem proves that when base rates differ between groups, you cannot simultaneously satisfy calibration, equalized odds, and demographic parity. Intuitively: if Group A has a 5% default rate and Group B has 15%, equalizing approval rates (demographic parity) forces vastly different score thresholds per group. A lower threshold for Group B inherently skyrockets their False Positive Rate, mathematically breaking equalized odds. Fairness requires a strict policy choice, not a technical fix.'
  common_mistake: |
    **The Pitfall:** Assuming threshold tuning can satisfy all fairness criteria simultaneously.
    **The Rationale:** Engineers treat fairness as an optimization problem, believing that with enough compute and data, an optimal threshold exists for every constraint.
    **The Consequence:** They waste engineering effort attempting to solve a mathematically impossible theorem, delaying the necessary policy decision on which criterion to prioritize.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base default rates: Group A = 5%, Group B = 15%.
    - Demographic Parity requires equal approval rates (e.g., 80%).

    **Calculations:**
    - To reach 80% approval for riskier Group B, the model lowers its threshold.
    - Lower threshold = exponentially more false positives.
    - FPR_B now heavily exceeds FPR_A.

    **Conclusion & Interpretation:**
    - **Result: Mathematically Incompatible (Algorithmic-Fairness-Bound)**. Equalizing outcomes guarantees unequal error rates when base distributions differ.
