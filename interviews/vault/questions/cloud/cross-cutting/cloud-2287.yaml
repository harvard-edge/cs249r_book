title: The Fairness Impossibility Tradeoff
scenario: Your team's loan approval model must satisfy both demographic parity and equalized odds. A fairness researcher notes that satisfying both simultaneously is mathematically impossible except in trivial cases.
question: Why are demographic parity and equalized odds impossible to satisfy together except in trivial cases?
details:
  realistic_solution: 'Demographic parity requires equal positive prediction rates across groups, while equalized odds requires equal false-positive and true-positive rates conditional on the true outcome. When base rates differ between groups, these constraints generally cannot both hold: equalized odds fixes the error rates within positives and negatives, which makes the overall positive prediction rate depend on each group''s base rate. They can coexist only in edge cases such as equal base rates or a trivial classifier whose TPR equals its FPR. Fairness therefore requires choosing which criterion matches the policy goal.'
  common_mistake: |
    **The Pitfall:** Assuming threshold tuning can satisfy all fairness criteria simultaneously.
    **The Rationale:** Engineers treat fairness as an optimization problem, believing that with enough compute and data, an optimal threshold exists for every constraint.
    **The Consequence:** They waste engineering effort attempting to solve a mathematically impossible theorem, delaying the necessary policy decision on which criterion to prioritize.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base default rates differ: Group A = 5%, Group B = 15%.
    - Demographic parity requires equal positive prediction rates.
    - Equalized odds requires equal TPR and FPR across groups.

    **Calculations:**
    - Under equalized odds, each group's positive prediction rate is: TPR * base_rate + FPR * (1 - base_rate).
    - Group A rate = TPR * 0.05 + FPR * 0.95.
    - Group B rate = TPR * 0.15 + FPR * 0.85.
    - For demographic parity these must be equal, so 0.10 * TPR = 0.10 * FPR, which requires TPR = FPR unless base rates are equal.
    - TPR = FPR is a trivial non-discriminating classifier; a perfect classifier is another edge case because it can have FPR = 0 and TPR = 1 only when demographic parity is not required across unequal base rates.

    **Conclusion & Interpretation:**
    - **Result: Generally Incompatible (Fairness-Criterion-Bound)**. With unequal base rates, demographic parity and equalized odds cannot both hold for a useful classifier; coexistence requires equal base rates or a trivial classifier whose positive rate does not depend on the true label.
