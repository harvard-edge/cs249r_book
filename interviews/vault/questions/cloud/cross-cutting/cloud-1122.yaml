title: Evaluating Demographic Parity Trade-offs in Cloud Resume Screening
scenario: 'You are designing a cloud-based automated resume screening ML service processing 500,000 applications monthly. Historical data shows differing base qualification rates: Group M has a 25% qualification rate, while Group N has a 10% qualification rate. Compliance teams mandate enforcing strictly equal Demographic Parity to avoid disparate impact.'
question: What happens to Precision and Equal Opportunity if you enforce strict Demographic Parity despite Group M and Group N having 25% vs 10% base rates?
details:
  realistic_solution: Enforcing strict Demographic Parity forces Group M and Group N to have equal approval rates despite different qualification base rates. If the shared approval rate is above Group N's 10% qualification rate, Group N precision necessarily falls because some unqualified applicants must be approved. That does not automatically violate Equal Opportunity; Equal Opportunity depends on the true-positive rates for qualified applicants. Under unequal base rates, optimizing Demographic Parity can trade off against Equal Opportunity and precision, so the metric choice should be explicit and paired with sourcing improvements.
  common_mistake: |
    **The Pitfall:** Assuming that enforcing Demographic Parity will simultaneously improve fairness and precision for the minority group.
    **The Rationale:** Stakeholders conflate equal outcomes with equal accuracy, not realizing that fixed base rate differences force the model to behave irrationally.
    **The Consequence:** The model is mathematically forced to accept unqualified candidates from the minority group, tanking precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500k applicants: Group M (400k, 25% qualified), Group N (100k, 10% qualified).
    - Enforcement of Demographic Parity (equal approval rates).
    - Illustrative policy: set both groups to a 20% approval rate.

    **Calculations:**
    - Group M qualified applicants: 400k * 25% = 100k.
    - Group N qualified applicants: 100k * 10% = 10k.
    - Demographic Parity at 20% approval gives Group M approvals = 400k * 20% = 80k and Group N approvals = 100k * 20% = 20k.
    - Even if every qualified Group N applicant is approved, Group N true positives are capped at 10k, so Group N precision is at most 10k / 20k = 50%.
    - Equal Opportunity cannot be inferred from approval counts alone; it requires comparing true-positive rates for qualified applicants in each group.

    **Conclusion & Interpretation:**
    - **Result: Base-Rate Trade-off.** In this 20% parity example, Group N precision is capped at 50%, but Demographic Parity by itself does not prove an Equal Opportunity violation.
