title: Evaluating Demographic Parity Trade-offs in Cloud Resume Screening
scenario: 'You are designing a cloud-based automated resume screening ML service processing 500,000 applications monthly. Historical data shows differing base qualification rates: Group M has a 25% qualification rate, while Group N has a 10% qualification rate. Compliance teams mandate enforcing strictly equal Demographic Parity to avoid disparate impact.'
question: 'What happens to Precision and Equal Opportunity if you enforce strict Demographic Parity despite Group M and Group N having 25% vs 10% base rates?'
details:
  realistic_solution: 'Enforcing parity requires drastically lowering the decision threshold for Group N. While this satisfies compliance, it irreparably harms Precision for Group N and violates Equal Opportunity. Recommend shifting the metric to Equal Opportunity (equal True Positive Rates) to ensure equally qualified candidates have the same chance of being hired, while pushing the business to fix the pipeline sourcing disparity.'
  common_mistake: |
    **The Pitfall:** Assuming that enforcing Demographic Parity will simultaneously improve fairness and precision for the minority group.
    **The Rationale:** Stakeholders conflate equal outcomes with equal accuracy, not realizing that fixed base rate differences force the model to behave irrationally.
    **The Consequence:** The model is mathematically forced to accept unqualified candidates from the minority group, tanking precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500k applicants: Group M (400k, 25% qualified), Group N (100k, 10% qualified).
    - Enforcement of Demographic Parity (equal approval rates).

    **Calculations:**
    - Assume 20% overall approval rate.
    - Group M: 80k approved out of 100k truly qualified. Max precision = 80k / 80k = 100%.
    - Group N: 20k approved out of 10k truly qualified.
    - False Positives for Group N: Must accept ≥10k unqualified candidates. Max precision = 10k / 20k = 50%.

    **Conclusion & Interpretation:**
    - **Result: 50% max precision (Base-Rate Bound)**. Enforcing Demographic Parity on skewed base rates caps minority group precision and introduces large volumes of false positives.
