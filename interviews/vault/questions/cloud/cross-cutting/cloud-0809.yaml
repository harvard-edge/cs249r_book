title: The Spot Instance Gamble
scenario: Your team trains a model that takes 72 hours on 8 GPUs. On-demand pricing is $2.00/GPU-hour. Spot instances are $0.60/GPU-hour. Midway through a run, spot instances are preempted, forcing a checkpoint restart.
question: What is the true expected cost of spot training considering preemption rates, and when does on-demand actually become cheaper?
details:
  realistic_solution: Spot instance economics depend on preemption probability, checkpoint overhead, restart delay, and whether the job can make steady forward progress between interruptions. Every preemption wastes the compute since the last checkpoint plus the time required to provision new nodes and reload state. With the stated 30-minute checkpoint interval and 15-minute restart delay, a 20% hourly preemption probability still leaves spot cheaper in expectation, but on-demand becomes cheaper once expected extra spot GPU-hours exceed the savings from the $1.40/GPU-hour discount.
  common_mistake: |
    **The Pitfall:** Assuming spot is universally cheaper just because the hourly sticker price is 70% less.
    **The Rationale:** Cost modeling often neglects the cascading overhead of wasted compute and pipeline restart latency.
    **The Consequence:** Experiencing severe timeline delays and eventually paying more than on-demand due to perpetual thrashing and restarts.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-demand price: $2.00/GPU-hr.
    - Spot price: $0.60/GPU-hr.
    - Training duration (uninterrupted): 72 hours on 8 GPUs.
    - Spot preemption probability: 20% per hour.
    - Checkpoint interval: 30 mins; Restart delay: 15 mins.

    **Calculations:**
    - On-demand cost: 72 hrs * 8 GPUs * $2.00 = $1,152.
    - Average lost progress per preemption with 30-min checkpoints: 15 mins = 0.25 hr.
    - Restart delay per preemption: 15 mins = 0.25 hr.
    - Expected overhead per preemption: 0.25 + 0.25 = 0.50 hr.
    - Model preemptions as a 0.20/hr hazard during spot wall-clock exposure W: W = 72 + (0.20 * W * 0.50).
    - Solve: W * (1 - 0.10) = 72, so W = 80 hours.
    - Expected spot cost: 80 hrs * 8 GPUs * $0.60 = $384.
    - Break-even spot wall-clock: X * 8 * $0.60 = $1,152, so X = 240 cluster-hours.
    - Break-even extra time: 240 - 72 = 168 cluster-hours, or 1,344 extra GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: Expected spot cost is about $384 under the stated model.** On-demand becomes cheaper when expected restart/lost-work overhead exceeds 168 extra cluster-hours, because that erases the $1.40/GPU-hour spot discount.
