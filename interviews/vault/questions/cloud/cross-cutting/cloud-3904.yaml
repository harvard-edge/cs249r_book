title: ONNX Model Compatibility Matrix Across Runtime Versions
scenario: You export a model as ONNX opset 18 from PyTorch 2.1. A production system runs ONNX Runtime 1.14, which supports up to opset 17. The model uses the new GroupNormalization op introduced in opset 18. You need to determine what happens at load time and how to resolve the incompatibility.
question: How should you handle an ONNX opset 18 GroupNormalization model when production ONNX Runtime 1.14 only supports opset 17?
details:
  realistic_solution: ONNX Runtime 1.14 will fail at load time because the model uses opset 18 and an unsupported GroupNormalization op while the runtime supports only opset 17. Resolve it by re-exporting the model to opset 17 with supported operators, upgrading the production runtime to one that supports the required opset/op, or registering a custom op implementation. The key is to match the exported opset and operators to the target runtime before deployment.
  common_mistake: |
    **The Pitfall:** Expecting ONNX Runtime to gracefully degrade or emulate the unsupported op.
    **The Rationale:** Assuming backward/forward compatibility is automatically handled by the runtime without explicit opset conversion.
    **The Consequence:** Raises an immediate runtime error at load time, crashing the production inference pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Exported model requires ONNX opset 18.
    - Production ONNX Runtime 1.14 supports up to opset 17.
    - GroupNormalization is not available to that runtime.

    **Calculations:**
    - Required opset 18 > supported opset 17, so the runtime cannot validate and instantiate the graph.
    - An unsupported required op has no fallback unless the graph is re-exported, the runtime is upgraded, or a custom op is registered.

    **Conclusion & Interpretation:**
    - **Result: Load-Time Compatibility Failure**. The model will not load as-is; this is an opset/operator support problem, not a latency tradeoff.
