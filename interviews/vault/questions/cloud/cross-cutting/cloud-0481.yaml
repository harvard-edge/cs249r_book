title: The Privacy vs. Churn Dilemma
scenario: 'You are the Staff ML Engineer at a company developing a new ''Smart Reply'' feature for its mobile keyboard, which has 10 million users. The executive team wants to A/B test two approaches before a full rollout: Option A is a centralized model with $350K/year cloud compute and a modeled $1M/year privacy-liability risk. Option B is federated learning with $900K/year extra engineering cost, but on-device compute is expected to increase churn by 0.5%; each lost user has $60 LTV.'
question: Which Smart Reply approach—centralized or federated—should you choose for 10 million users, and why?
details:
  realistic_solution: |
    The correct answer is Option A, the centralized approach. Its annual modeled cost is $1.35M: $350K for compute plus $1M of privacy-liability risk. Option B costs $3.9M/year: $900K of extra engineering plus $3M from 0.5% churn across 10 million users at $60 LTV. Federated learning offers stronger privacy, but under these assumptions Option B's churn cost dominates and makes it much more expensive.
  common_mistake: |
    **The Pitfall:** Engineers often fixate on the direct costs (compute, servers, headcount) and the primary benefit (privacy), completely ignoring the second-order, indirect costs hidden in user behavior metrics like churn. They see 'Federated Learning' and think 'privacy win' without quantifying the UX tax of on-device computation.
    **The Rationale:** Federated learning moves compute off the cloud bill, but battery drain and latency can still reduce retention, and retention losses compound across a 10-million-user product.
    **The Consequence:** The team may ship a privacy-preserving design whose churn cost is larger than the centralized model's compute and modeled privacy-liability costs combined.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 million users.
    - Option A centralized cost: $350k/year compute plus $1M/year modeled privacy-liability risk.
    - Option B federated cost: $900k/year engineering plus 0.5% incremental churn at $60 LTV per lost user.
    **Calculations:**
    We must calculate the annual TCO for both options.
    **Option A (Centralized):** $350k compute + $1M modeled privacy-liability risk = $1.35M/year.
    **Option B (Federated):** Direct engineering cost = $900k. Indirect cost (User Churn): 10,000,000 users * 0.005 churn * $60 LTV = $3,000,000. Total Cost for Option B = $3.9M/year.
    **Conclusion & Interpretation:**
    - **Result: Option A (Centralized) is the economically stronger choice under these assumptions.** The $3M churn cost from battery drain makes the federated option much more expensive despite its privacy advantage.
  options:
    - Option A (Centralized), because the $350k compute cost is much lower than the $900k engineering headcount for Option B.
    - Option B (Federated), because the $1M data breach risk of the centralized model is an unacceptable business liability.
    - Option A (Centralized), because the annual cost from user churn in the federated model (~$3M) is the single largest expense and far outweighs its privacy benefits.
    - Option B (Federated), because it avoids centralizing PII, and the $5 LTV is too small to worry about a minor churn increase.
