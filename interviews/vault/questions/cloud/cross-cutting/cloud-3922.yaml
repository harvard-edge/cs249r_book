title: 'Portable Profiling: NCU vs rocProf vs XLA Profiler Cross-Platform Analysis'
scenario: You need to profile the same transformer model across H100 (using Nsight Compute), MI300X (using rocProf), and TPU v5e (using XLA profiler). Each tool reports different metrics.
question: How do you create comparable performance analysis across these disparate hardware platforms and profilers?
details:
  realistic_solution: 'Normalize to hardware-agnostic metrics: (1) Achieved FLOPS / Peak FLOPS (compute utilization): derive from profiler-reported FLOP counts and wall-clock time. (2) Achieved BW / Peak BW (memory utilization): derive from bytes moved and time. (3) Arithmetic intensity (FLOPS/byte): compute from the above. These three metrics are comparable across any accelerator. Build a common dashboard that pulls raw data from each profiler and computes these normalized metrics. Use the roofline model as the universal comparison framework.'
  common_mistake: |
    **The Pitfall:** Comparing raw metric values directly across profilers.
    **The Rationale:** Engineers assume a metric like "Utilization %" means the same thing everywhere. Nsight Compute reports SM Throughput, rocProf reports GPU Busy, and XLA reports FLOPS utilization.
    **The Consequence:** Flawed cross-platform benchmarks lead to incorrect hardware purchasing decisions or misguided optimization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100: 989 TFLOPS, 3.35 TB/s.
    - MI300X: 1307 TFLOPS, 5.3 TB/s.
    - TPU v5e: 197 TFLOPS, 820 GB/s.

    **Calculations:**
    - H100 Roofline ridge: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte.
    - MI300X Roofline ridge: 1307 TFLOPS / 5.3 TB/s = 246 FLOP/byte.
    - TPU v5e Roofline ridge: 197 TFLOPS / 820 GB/s = 240 FLOP/byte.

    **Conclusion & Interpretation:**
    - **Result: Hardware-Agnostic Profiling (Compute-Bound)**. The exact same kernel sits at entirely different positions on the roofline curve for each platform.
