title: Evaluating Proxy Misalignment in E-Commerce Ranking
scenario: Your team deployed a new recommendation ranking model trained to maximize Click-Through Rate (CTR) on a cluster of GPUs. Offline evaluation showed a 15% increase in CTR, and the P99 serving latency is well within the 50ms SLA at 38ms. However, two weeks post-deployment, the primary business metric, Gross Merchandise Value (GMV), has dropped by 8%. The model is heavily prioritizing low-cost, clickbait items.
question: "How should you realign the recommender with GMV while keeping P99 serving latency under 50ms?"
details:
  realistic_solution: Design a Multi-gate Mixture-of-Experts (MMoE) or multi-task architecture predicting both p(Click) and p(Conversion|Click). Combine them using an Expected Value formula (p(Click) * p(Conv|Click) * Price) during the final ranking stage. To maintain the 50ms P99 SLA, restrict the heavy cross-feature ranking to the top 500 candidate items (taking ~25ms) generated by a fast two-tower ANN retrieval step (~10ms).
  common_mistake: |
    **The Pitfall:** Completely replacing the dense target (Clicks) with a sparse target (Purchases/GMV) in a single model.
    **The Rationale:** Attempting a direct fix without considering the severe data sparsity of purchase events compared to clicks.
    **The Consequence:** Extreme model variance, poor convergence, and the deployment of overly complex models that immediately violate strict latency SLAs on older hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model A (Clickbait): p(Click)=0.10, p(Conv|Click)=0.01, Price=$5.
       - Model B (Aligned): p(Click)=0.04, p(Conv|Click)=0.15, Price=$50.
       - SLA: 50ms P99.
    2. **Calculations:**
       - Expected Value (EV) = p(Click) * p(Conv|Click) * Price.
       - Model A EV = 0.10 * 0.01 * $5 = $0.005.
       - Model B EV = 0.04 * 0.15 * $50 = $0.30.
    3. **Conclusion & Interpretation:**
       - **Result: Proxy Misalignment (Business-Value-Bound).** Model B yields 60x higher expected business value per impression despite a 60% lower CTR proxy metric.
