title: 'Evaluating Iteration Tax in LLM Deployment'
scenario: 'A data science team trains a 70B parameter LLM for 4 weeks using 8 GPUs before handing off to ML engineering. The ML team discovers the model requires 180 GB of KV cache memory for the target batch size, exceeding the available memory when partitioned across 2 target deployment GPUs. They must redesign the architecture to use 4-way tensor parallelism and Grouped Query Attention (GQA), requiring a full retraining cycle.'
question: 'What is the cost of discovering the KV-cache issue after 4 weeks, and what shift-left workflow prevents a full retraining cycle?'
details:
  realistic_solution: 'Implement a ''shift-left'' constraint propagation strategy. Before training, profile a dummy model with the target architecture (70B) and batch size (256) on the exact target hardware (H100) to validate KV cache and serving latency constraints.'
  common_mistake: |
    **The Pitfall:** Treating training and deployment as isolated, sequential phases.
    **The Rationale:** Data science teams focus entirely on model accuracy and assume that if a model trains successfully, the engineering team can figure out how to serve it later.
    **The Consequence:** The model hits strict production memory constraints, rendering the entire training run useless and requiring an expensive, time-consuming restart.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs trained for 4 weeks at $3/hr per GPU.
    - Re-training demands another 4 weeks.
    
    **Calculations:**
    - Compute Cost: 4 weeks * 7 days * 24 hours * 8 GPUs * $3/hr = $16,128.
    - Turnaround Delay: 4 (initial) + 1 (debug) + 4 (retrain) = 9 weeks.
    
    **Conclusion & Interpretation:**
    - **Result: $16,128 wasted (Memory-Bound)**. Neglecting target KV cache constraints during architectural planning imposes brutal time and capital penalties.
