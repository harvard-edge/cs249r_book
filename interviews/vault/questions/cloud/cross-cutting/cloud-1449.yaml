title: Shift-Left KV-Cache Sizing for LLM Serving
scenario: A data science team trains a 70B parameter LLM for 4 weeks using 8 GPUs before handing off to ML engineering for deployment validation. The ML team then discovers the model requires 180 GB of KV cache memory for the target batch size, exceeding the available memory when partitioned across 2 target deployment GPUs. They must redesign the architecture to use 4-way tensor parallelism and Grouped Query Attention (GQA), requiring a full retraining cycle.
question: What wasted and added training cost does the late KV-cache discovery cause, and what workflow prevents it?
details:
  realistic_solution: Implement a shift-left serving-capacity workflow before training. Estimate KV-cache memory for the target batch size, sequence length, precision, attention layout, and tensor-parallel plan on the actual target topology of 2 deployment GPUs. Run a small serving simulator or dummy-weight model with the intended tensor parallelism and GQA/MHA choice to validate per-GPU KV-cache footprint and latency before committing to the 4-week training run.
  common_mistake: |
    **The Pitfall:** Treating training and deployment as isolated, sequential phases.
    **The Rationale:** Data science teams focus entirely on model accuracy and assume that if a model trains successfully, the engineering team can figure out how to serve it later.
    **The Consequence:** The model hits strict production memory constraints, rendering the entire training run useless and requiring an expensive, time-consuming restart.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs trained for 4 weeks at $3/hr per GPU.
    - The discovered serving constraint forces architecture changes and a full 4-week retraining cycle.

    **Calculations:**
    - Wasted initial training cost: 4 weeks * 7 days/week * 24 hours/day * 8 GPUs * $3/hour = $16,128.
    - Additional retraining cost after redesign: another $16,128 under the same hardware and pricing assumptions.
    - Minimum schedule impact from the miss: 4 weeks of wasted training plus 4 weeks of retraining = 8 training-weeks elapsed before a deployable redesigned model, excluding any debugging time not specified in the prompt.

    **Conclusion & Interpretation:**
    - **Result: $16,128 of initial training is wasted, and another $16,128 retrain is added under the same assumptions.** Shift-left KV-cache and serving-topology checks would catch the 2-GPU memory violation before training.
