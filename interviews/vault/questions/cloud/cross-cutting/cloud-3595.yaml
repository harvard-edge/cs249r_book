title: 'NVIDIA H100 Deployment Strategy: Optimizing TCO for LLM Training'
scenario: Your team is training a large language model that requires significant GPU resources. You're currently using on-demand cloud instances equipped with NVIDIA H100 GPUs (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W power consumption). While these instances provide the necessary compute power, your monthly cloud spend has become unsustainable, impacting the project's profitability. The training workload is predictable for 60% of the time, with occasional spikes requiring 150% of base capacity for data pre-processing and hyperparameter tuning.
question: What H100 cloud procurement and workload strategy would reduce TCO for 60% predictable training and 150% burst spikes?
details:
  realistic_solution: 'A realistic solution would first translate the profile into capacity: cover the predictable baseline with reserved capacity sized to the steady training fleet, then cover spikes to 150% of base with interrupt-tolerant spot or short on-demand capacity. For example, if base training needs 10 H100s, reserve 10 H100s for the 60% predictable window and plan 5 additional H100s for burst phases. Use spot only for restartable preprocessing, sweeps, and data jobs, with checkpointing and a small on-demand fallback for deadline-critical bursts. Then compare blended cloud spend against owned H100 capacity, including utilization, networking, storage, staff, depreciation, and power.'
  common_mistake: |
    **The Pitfall:** Blindly pursuing the cheapest option (e.g., all spot instances) or only comparing raw instance prices.
    **The Rationale:** Engineers often optimize purely for unit cost without factoring in the reliability penalty, networking overhead, and software licensing.
    **The Consequence:** The system suffers frequent interruptions and high total cost of ownership (TCO) due to unaccounted operational overheads and continuous job restarts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base capacity: 10 H100s.
    - Predictable training window: 60% of a 720-hour month = 432 hours.
    - Burst peak: 150% of base = 15 H100s, so 5 additional H100s during the same predictable window.
    - On-demand H100 cost: ~$3.5/hr. Reserved cost: ~$1.75/hr (50% savings). Spot cost: ~$0.80/hr (77% savings).

    **Calculations:**
    - On-demand baseline during predictable work: 10 * 432hr * $3.50 = $15,120/month.
    - Reserved baseline during predictable work: 10 * 432hr * $1.75 = $7,560/month.
    - On-demand burst coverage: 5 * 432hr * $3.50 = $7,560/month.
    - Spot burst coverage: 5 * 432hr * $0.80 = $1,728/month.
    - Blended savings for predictable plus burst capacity: ($15,120 + $7,560) - ($7,560 + $1,728) = $13,392/month.

    **Conclusion & Interpretation:**
    - **Result: $13,392/month savings under the stated assumptions (Cost-Bound)**. Reserve the predictable 10-H100 base and satisfy the 150% peak with 5 burst H100s, using spot where preemption is safe and on-demand fallback where deadlines require it.
