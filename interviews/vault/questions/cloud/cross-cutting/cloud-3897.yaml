title: 'Vendor Lock-in TCO Analysis: CUDA Moat vs Multi-Backend Investment'
scenario: Your ML platform team spends $2M/year on NVIDIA A100 cloud instances. MI300X instances offer 35% savings per TFLOP-hour. The CFO wants to know if investing $400K to port the stack to a multi-vendor backend is worth it.
question: Should you invest $400K in a multi-vendor port or accept CUDA lock-in, and what is the break-even period assuming a 50/50 workload split?
details:
  realistic_solution: 'Model the TCO. Current: $2M/yr. With 50% workload on MI300X at 35% savings: $1M NVIDIA + $0.65M AMD = $1.65M, saving $350K/yr. Porting cost: $400K one-time + ~$100K/yr ongoing dual-CI maintenance. Break-even: $400K / ($350K - $100K) = 1.6 years. If AMD share grows to 70%, savings increase to $490K/yr, break-even drops to 10 months. Decision: invest, but only if the 2-year commitment is realistic.'
  common_mistake: |
    **The Pitfall:** Comparing only the raw $/TFLOP cloud instance costs.
    **The Rationale:** Teams fail to account for the ongoing operational and maintenance costs (e.g., dual CI/CD pipelines, kernel tuning) required to sustain a multi-backend stack.
    **The Consequence:** The projected break-even timeline is wildly optimistic, and the project becomes a long-term resource sink.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current A100 Cost = $2,000,000 / year.
       - MI300X savings = 35% per TFLOP-hour.
       - 50/50 workload split.
       - Porting Cost = $400,000 one-time + $100,000/year maintenance.
    2. **Calculations:**
       - Mixed Cost (50% NVIDIA / 50% AMD): $1,000,000 + ($1,000,000 * 0.65) = $1,650,000 / year.
       - Gross Savings = $350,000 / year.
       - Net Savings = $350,000 - $100,000 (maintenance) = $250,000 / year.
       - Break-even = $400,000 / $250,000 = 1.6 years.
    3. **Conclusion & Interpretation:**
       - The project achieves break-even rapidly, validating the investment.
       - **Result: 1.6 Years Break-even**
