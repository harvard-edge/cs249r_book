title: Fairness-Aware LLM Evaluation on AMD MI300X
scenario: 'Your team is deploying a large language model (LLM) for a high-stakes application (e.g., clinical decision support) where ensuring algorithmic fairness is paramount. You are tasked with designing and implementing a robust post-deployment fairness evaluation pipeline. The LLM will run on a cluster of AMD MI300X accelerators, each boasting 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth. The evaluation requires computing multiple fairness metrics (demographic parity, equalized odds, intersectional fairness) across a massive, diverse dataset with numerous sensitive attributes and potentially hundreds of subgroups. Your goal is to compare two architectural approaches for this evaluation: one relying on sequential processing per subgroup on individual MI300X units, and another employing a distributed, parallel strategy. How would you design and evaluate these architectures to ensure comprehensive, efficient, and timely fairness assessments without
  compromising the depth of analysis, especially for thinly represented intersectional subgroups?'
question: How would you compare sequential versus distributed fairness evaluation on MI300X while preserving deep intersectional subgroup analysis?
details:
  realistic_solution: |
    Compare sequential evaluation as the simpler baseline and distributed evaluation as the lower wall-clock option. A sequential MI300X job can preserve full subgroup depth by scanning the whole dataset and maintaining exact counts, confusion matrices, and confidence intervals for every intersectional slice, but its runtime grows with dataset size and repeated subgroup passes. A distributed design should shard rows across MI300X workers, compute local subgroup counts and metric numerators/denominators, then all-reduce those aggregates so no thin subgroup is dropped. It improves wall-clock time by parallelizing scans and local reductions, not by assigning one device per subgroup. Preserve depth with a global subgroup dictionary, minimum-count flags, uncertainty intervals, and drill-down jobs for rare intersections whose estimates are wide.
  common_mistake: |
    **The Pitfall:** Underestimating the computational and I/O overhead of comprehensive fairness evaluations with high-cardinality attributes.
    **The Rationale:** Teams fail to design pipelines that fully leverage the available memory bandwidth and compute parallelism of accelerators like the MI300X.
    **The Consequence:** This results in either simplifying the evaluation (e.g., checking only top-level parity) or experiencing prohibitively long evaluation bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Evaluation dataset: 500 GB.
    - Data sample size: 1 KB (500 million samples).
    - Effective end-to-end scan rate after storage read, decode, tokenization, and metric updates: 20 GB/s per MI300X.
    - Distributed design uses 8 MI300X workers with balanced row sharding.
    - Local metric reductions produce 2 GB of subgroup aggregate state per worker before all-reduce.

    **Calculations:**
    - Sequential single-worker scan time = 500 GB / 20 GB/s = 25 seconds for one pass.
    - Distributed per-worker data = 500 GB / 8 = 62.5 GB.
    - Distributed scan time per worker = 62.5 GB / 20 GB/s = 3.125 seconds before synchronization.
    - Aggregate state to all-reduce = 8 * 2 GB = 16 GB, much smaller than rescanning the 500 GB dataset per subgroup.
    - Thin intersectional groups are preserved because workers reduce exact local counts and uncertainty terms before the global all-reduce.

    **Conclusion & Interpretation:**
    - **Result: about 25 seconds sequential versus about 3.1 seconds plus all-reduce distributed.** Distributed evaluation improves wall-clock time through row sharding and local aggregation while preserving deep intersectional analysis through exact global reductions and uncertainty reporting.
