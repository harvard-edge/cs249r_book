title: Designing a Hardware-Agnostic Kernel Dispatch Layer
scenario: You are architecting an ML inference framework that must run the same model on CUDA, ROCm, and XLA with <10% performance penalty vs native on each target.
question: What kernel dispatch architecture would let one inference framework run on CUDA, ROCm, and XLA with under 10% overhead?
details:
  realistic_solution: |
    Use a three-tier architecture: (1) Frontend: hardware-agnostic operator graph (like ONNX or MLIR). (2) Middle-tier: per-backend kernel libraries with auto-tuned implementations (cuBLAS/CUTLASS for CUDA, rocBLAS/composable_kernel for ROCm, XLA HLO for TPU). (3) Dispatch layer: runtime selects the best kernel variant per-op based on shape, dtype, and backend. Key insight: the abstraction lives at the operator boundary, not inside the kernel. Each backend gets native kernels; only the dispatch logic is shared.
  common_mistake: |
    **The Pitfall:** Building a single abstraction layer that maps to the lowest common denominator of all three backends.
    **The Rationale:** Candidates try to share kernel code rather than just the dispatch logic.
    **The Consequence:** Sacrifices hardware-specific optimizations like NVIDIA's TMA or AMD's MFMA instructions, causing severe performance penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: <10% overhead.
    - Dispatch Overhead: ~1-5 microseconds per operator.
    - Model Complexity: 500 operators.

    **Calculations:**
    - Total Overhead: 500 ops × 5µs = 2.5ms.
    - Total Time Basis: 50ms inference time.
    - Percentage: 2.5ms / 50ms = 5%.

    **Conclusion & Interpretation:**
    - **Result: Dispatch-Bound**. Dispatch overhead of 5% fits comfortably within the 10% budget.
