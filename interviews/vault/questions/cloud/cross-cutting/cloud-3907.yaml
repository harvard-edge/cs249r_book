title: Cross-Platform Model Numerics Divergence Debugging
scenario: Your model produces identical outputs on NVIDIA GPUs but gives slightly different logits on AMD MI300X (max absolute diff of 0.003 in FP16). Quality metrics drop by 0.2%.
question: How would you determine whether the 0.003 FP16 logit difference and 0.2% quality drop are a bug or numerical noise?
details:
  realistic_solution: Treat this as a numerical validation problem, not a pass/fail epsilon rule. Re-run both platforms with fixed seeds and deterministic settings, compare against a higher-precision FP32 or FP64 reference, isolate sensitive kernels such as reductions and normalization, and check whether the 0.2% quality drop is outside the model's normal evaluation variance and release tolerance. If FP32 removes the gap, that points to FP16 accumulation or reduction-order sensitivity, but it still must be accepted against the task-specific quality budget.
  common_mistake: |
    **The Pitfall:** Declaring any numerical difference as a bug.
    **The Rationale:** Engineers assume floating-point math is perfectly deterministic across different hardware architectures.
    **The Consequence:** Wasting weeks trying to fix acceptable hardware-level accumulation variations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max difference = 0.003 on logits around 1.0.
    - FP16 epsilon = 9.77e-4.

    **Calculations:**
    - Relative error = 0.003 / 1.0 = 0.3%.
    - Epsilon scale near logits of 1.0: 0.003 / 0.000977 = ~3.07 epsilons.
    - This scale check is only a diagnostic; it does not prove correctness or acceptability across all logits or metrics.

    **Conclusion & Interpretation:**
    - **Result: Requires Tolerance-Based Validation**. Decide bug vs numerical variation using repeat runs, a higher-precision reference, determinism checks, and the model's accepted quality budget.
