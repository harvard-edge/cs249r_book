title: Optimizing DP-SGD on NVIDIA H100 for Federated Learning
scenario: Your team is deploying a federated learning system for sensitive medical data. The model training will leverage NVIDIA H100 GPUs. You've chosen DP-SGD to ensure patient privacy. The regulatory requirement is an overall privacy budget (epsilon) of 8.0 for the entire training process.
question: How would you design and calibrate DP-SGD across H100s to meet epsilon=8.0 while preserving model utility and throughput?
details:
  realistic_solution: Treat the H100 fleet as implementing one logical DP-SGD update at a time, even when data and computation are split across devices or federated clients. Each device computes per-example gradients for its local mini-batch, clips each example to norm C, and participates in a secure or trusted aggregation step. Add Gaussian noise with standard deviation σC once to the aggregated logical batch, not separately for every micro-batch or GPU shard, then advance an RDP or moments accountant for that logical step. In a federated deployment, account for client or record sampling, local steps between rounds, participation rate, and any secure aggregation threat model; server-side noise after aggregation gives central DP, while client-side noise is needed for local DP. Calibrate C, batch/client sampling, number of rounds, and σ so composed ε≤8.0, then use H100 memory and fused per-sample-gradient/ghost-clipping kernels to preserve throughput.
  common_mistake: |
    **The Pitfall:** Applying a fixed per-step epsilon or adding noise independently on every micro-batch/GPU shard.
    **The Rationale:** Privacy loss composes across logical training steps or federated rounds, while micro-batches are only an implementation detail of one noised update.
    **The Consequence:** Drastically exceeding the regulatory epsilon=8.0 budget, resulting in a severe privacy violation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target privacy: ε=8.0 and δ=1e-5 for the full training run.
    - Need dataset size N, logical batch size B, epochs, clipping norm C, and accountant type.

    **Calculations:**
    - Sampling rate q = B/N.
    - Logical DP steps T = epochs * ceil(N/B); micro-batches used for memory do not create extra DP events if they form one logical noised batch.
    - Choose C from per-example gradient norm statistics.
    - Use an RDP or moments accountant to binary-search σ until composed ε(q, T, σ, δ) ≤ 8.0.
    - Add Gaussian noise with standard deviation σC to the clipped averaged gradient.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Calibrated Noise.** The noise multiplier is not derived from ε alone; utility and throughput are preserved by selecting C, B, and σ together, then using H100 memory for efficient clipping and accumulation.
