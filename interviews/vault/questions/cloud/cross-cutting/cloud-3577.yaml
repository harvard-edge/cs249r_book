title: Optimizing DP-SGD on NVIDIA H100 for Federated Learning
scenario: Your team is deploying a federated learning system for sensitive medical data. The model training will leverage NVIDIA H100 GPUs. You've chosen DP-SGD to ensure patient privacy. The regulatory requirement is an overall privacy budget (epsilon) of 8.0 for the entire training process.
question: How would you design and calibrate DP-SGD across H100s to meet epsilon=8.0 while preserving model utility and throughput?
details:
  realistic_solution: Implement a privacy accountant (e.g., moments accountant) to track the cumulative epsilon budget across epochs. For noise calibration, determine the L2-norm clipping threshold for gradients and then calculate the necessary Gaussian noise scale per epoch using the composition theorem (e.g., advanced composition or Rényi differential privacy) to stay within the total epsilon of 8.0. Leverage the H100's performance to handle the overhead of gradient clipping and noise addition efficiently, potentially increasing batch sizes or reducing communication frequency. Monitor the privacy-utility tradeoff dynamically and adjust noise or training parameters accordingly. Distribute the noise budget optimally if using multiple H100s, considering how privacy is aggregated across devices.
  common_mistake: |
    **The Pitfall:** Applying a fixed per-step epsilon without accounting for composition across epochs.
    **The Rationale:** Neglecting the cumulative nature of privacy loss over repeated access to the same training data.
    **The Consequence:** Drastically exceeding the regulatory epsilon=8.0 budget, resulting in a severe privacy violation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target privacy: ε=8.0 and δ=1e-5 for the full training run.
    - Need dataset size N, logical batch size B, epochs, clipping norm C, and accountant type.

    **Calculations:**
    - Sampling rate q = B/N.
    - Logical DP steps T = epochs * ceil(N/B); micro-batches used for memory do not create extra DP events if they form one logical noised batch.
    - Choose C from per-example gradient norm statistics.
    - Use an RDP or moments accountant to binary-search σ until composed ε(q, T, σ, δ) ≤ 8.0.
    - Add Gaussian noise with standard deviation σC to the clipped averaged gradient.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Calibrated Noise.** The noise multiplier is not derived from ε alone; utility and throughput are preserved by selecting C, B, and σ together, then using H100 memory for efficient clipping and accumulation.
