title: Membership Inference Attack Resistance Under DP
scenario: A red team mounts a membership inference attack (MIA) against your DP-trained model, achieving 61% attack AUC despite a claimed ε=4 guarantee. The privacy engineer insists this is theoretically impossible, but the red team insists their attack is valid.
question: Is a 61% MIA AUC theoretically possible under an ε=4 DP guarantee, and what vulnerabilities allow it?
details:
  realistic_solution: 'A 61% MIA AUC is theoretically possible under an ε=4 DP guarantee. DP bounds how much the output distribution can change when one record is added or removed; it does not force every practical membership attack to have AUC near 0.5, especially for a relatively loose ε. Simple DP distinguishability bounds constrain membership advantage or posterior odds, but attack AUC is not directly capped by the same expression without additional assumptions about score distributions. The red team could be exploiting overfitting, repeated or correlated records, weak clipping, high-confidence outputs, auxiliary information, or a mismatch between the claimed accountant and the implemented training pipeline. Mitigations: verify the accountant and sampling implementation, reduce ε/noise-calibrate for stronger privacy, lower or tune clipping, audit per-record exposure and memorization, and evaluate attacks on repeated/correlated subgroups.'
  common_mistake: |
    **The Pitfall:** Assuming ε-DP directly caps MIA AUC near 0.5 for moderate values of ε.
    **The Rationale:** Practitioners misunderstand the formal bound, which limits per-example distinguishability but still allows significant memorization at ε=4.
    **The Consequence:** Organizations falsely believe their models are immune to privacy attacks, leaving user data vulnerable to practical extraction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DP guarantee: ε=4.
       - Red team MIA AUC: 61% (0.61).
    2. **Calculations:**
       - DP likelihood-ratio bound: for neighboring datasets, output probabilities differ by at most e^ε.
       - For ε=4, e^4 ≈ 54.6, so the bound is loose: posterior odds can move by up to a 54.6x factor in the worst case.
       - A common balanced-membership advantage bound is tanh(ε/2) = (e^ε - 1)/(e^ε + 1) ≈ 0.964 for ε=4; this is not an exact AUC cap.
       - The observed AUC lift is 0.61 - 0.50 = 0.11, which is nontrivial but far below what the loose ε=4 distinguishability bound would rule out.
    3. **Conclusion & Interpretation:**
       - A 61% AUC can be consistent with ε=4 because DP permits some per-record distinguishability and AUC is not directly bounded by the simple advantage formula.
       - **Result: Possible MIA Under Loose DP**
