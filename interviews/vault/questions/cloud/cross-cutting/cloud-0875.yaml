title: Diagnosing Systematic Probing for LLM Extraction
scenario: Your ML security team flags a suspicious user on your proprietary 70B text-to-SQL model API. The user is sending 100 queries per minute, 24/7. Their prompts are highly diverse, syntactically correct, but semantically unusual (e.g., querying nonexistent schemas). The API currently returns full token logprobs. Analyze if this is a viable model extraction attack and determine the scale of the information leakage.
question: Is the 100-query/min user conducting a viable model extraction attack, and how much information leaks via full logprobs?
details:
  realistic_solution: |
    Yes. At 100 queries/minute around the clock, full-vocabulary logprobs make this a viable model extraction workflow under the stated assumptions because the attacker is collecting dense probability distributions for distillation, not just final token strings. With 100 output tokens per prompt and a 32k vocabulary, the API can leak roughly 0.9TB/day of probability data before JSON overhead. Mitigations such as top-k logprobs, calibrated noise, anomaly detection, and tighter rate limits reduce the knowledge-transfer bandwidth while preserving legitimate utility.
  common_mistake: |
    **The Pitfall:** Assuming rate limiting hard token outputs is sufficient defense.
    **The Rationale:** Security teams underestimate the mathematical density and distillation value of full probability distributions (logprobs).
    **The Consequence:** The proprietary model's IP is exfiltrated and cloned into a cheap surrogate via distribution matching.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 queries/min = 144,000 prompts/day.
    - Yields 100 tokens per prompt = 14.4M tokens.
    - "Full logprobs" means a dense per-token probability vector over a 32,000-token vocabulary; use FP16-equivalent payload size as a lower-bound binary estimate before JSON overhead.
    - If the API instead returns only top-k logprobs, the payload scales with k, not vocabulary size.

    **Calculations:**
    - Dense full-vocab payload per token = 32,000 * 2 bytes = 64,000 bytes ≈ 64 KB.
    - Dense extraction signal = 14.4M tokens * 64,000 bytes ≈ 921.6 GB/day.
    - Top-5 example, assuming token id plus logprob is roughly 8 bytes/entry: 14.4M * 5 * 8 bytes ≈ 576 MB/day before JSON overhead.

    **Conclusion & Interpretation:**
    - **Result: viable high-bandwidth extraction.** Dense full-vocabulary logprobs can leak about 0.9 TB/day under these assumptions; top-k logprobs leak orders of magnitude less signal, so the API output format determines the practical extraction bandwidth.
