title: The TCO Iceberg
scenario: 'A team is evaluating the 3-year Total Cost of Ownership (TCO) for a new, large-scale language model feature. A junior engineer argues the biggest expense will be the initial multi-million dollar purchase of H100s for training.'
question: 'When considering the entire lifecycle of a successful production ML system, which component typically dominates the TCO?'
details:
  realistic_solution: "Inference. For any widely adopted product, the cumulative operational cost of running inference servers 24/7 for millions of users over several years almost always outweighs the one-time (or periodic) capital expense of training. The sheer volume of inference requests makes it the dominant factor in the system's TCO."
  common_mistake: |
    **The Pitfall:** Fixating on the high, visible upfront CapEx of training.
    **The Rationale:** Engineers underestimate how the small, recurring OpEx of inference accumulates over a multi-year lifecycle with millions of users.
    **The Consequence:** Grossly miscalculated budgets where inference infrastructure cannot be sustained long-term.
  napkin_math: |
    **Assumptions & Constraints:**
    - Timeframe: 3-year product lifecycle.
    - Comparison: One-time CapEx (Training) vs Continuous OpEx (Inference).

    **Calculations:**
    - Inference servers operate 24/7 over 3 years for millions of queries.

    **Conclusion & Interpretation:**
    - **Result: Inference OpEx (Cost-Bound)**. The sheer volume and duration of serving millions of requests massively outweighs the initial training CapEx.
  options:
  - 'The initial CapEx for the training GPU cluster.'
  - 'The cumulative OpEx for inference servers and energy.'
  - 'Data acquisition and labeling costs.'
  - 'Salaries for the research and ML engineering teams.'
  correct_index: 1
