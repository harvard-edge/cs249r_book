title: The End-to-End Fairness Infrastructure
scenario: 'You are the Staff engineer tasked with designing a company-wide Responsible AI infrastructure that supports 50 ML models across 12 teams. Requirements: (1) every model must pass disaggregated fairness evaluation before deployment, (2) production models must have continuous fairness monitoring with automated rollback, (3) full artifact provenance, and (4) the system must support the EU AI Act''s ''right to explanation'' for high-risk models.'
question: How would you design the Responsible AI infrastructure, specifying key components, data flows, storage requirements, and the hardest systems challenge?
details:
  realistic_solution: |
    Architecture: a platform approach with four layers. (1) Fairness SDK (client-side): a lightweight library each team integrates into their training. (2) Fairness Gate Service (CI/CD integration): a gRPC service that receives evaluation reports and enforces deployment policies. (3) Production Monitoring Pipeline: a streaming pipeline (Flink) that consumes prediction logs, joins with outcome data, computes metrics, and auto-rollbacks on breaches. (4) Provenance & Explanation Layer: an immutable lineage store (DVC/S3) that records manifests, DAGs, and artifacts. Hardest challenge: provenance at scale. With 50 models and billions of predictions, query latency requires a graph database or specialized lineage system.
  common_mistake: |
    **The Pitfall:** Designing a monolithic centralized fairness service.
    **The Rationale:** Candidates attempt to build a central bottleneck that executes evaluations for all 50 models, ignoring the massive variability in model frameworks, dependencies, and environments.
    **The Consequence:** Creating a massive organizational and technical bottleneck; the platform team becomes blockers for every model deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 models, 1M predictions/day per model.
    - Record size: 2KB.
    - Retention period: 7 years.

    **Calculations:**
    - Storage Volume: 50 models × 1M predictions/day = 50M records/day × 2KB = 100 GB/day.
    - Long-term Retention: 100 GB/day × 365 days × 7 years = 255 TB total audit storage.
    - Lineage Metadata: ~10 GB per run. 50 models × 12 retrains/year = 600 runs = 6 TB/year.
    - Monitoring Throughput: 50M predictions/day / 86400 = ~580 events/sec.
    - SHAP Pre-computation: 50 models × 100 patterns × ~2s/explanation = ~2.8 hrs/day on a single GPU.

    **Conclusion & Interpretation:**
    - **Result: Storage-Bound**. The event stream is easily handled (~580 EPS), but the 255 TB audit log dictates specialized graph and blob storage for compliance.
