title: GDPR Right to Erasure with DP Training
scenario: A user invokes GDPR Article 17 requesting removal of their data from your 13B LLM trained with DP-SGD at ε=5.
question: Does DP-SGD at ε=5 satisfy GDPR erasure, and if not, what does retraining cost and what unlearning alternatives exist?
details:
  realistic_solution: 'DP-SGD at ε=5 is a privacy mitigation, not an erasure mechanism. It may reduce memorization risk, but it does not remove the user''s contribution from model weights and should not be treated as satisfying a strict GDPR Article 17 request by itself. Options: (1) Full retrain after deleting the user''s data. At ~2,000 H100-hours × $3.50/hr, this is about $7,000 per retrain; doing that per request is infeasible at scale. (2) Auditable machine unlearning: run a validated removal procedure such as influence-aware fine-tuning or negative-gradient updates, then test for residual influence. This is cheaper than retraining but approximate and needs legal/risk acceptance. (3) SISA-style training: train k shards or slices so erasure retrains only the affected shard; with k=100 the retrain compute is roughly $70 per affected shard, plus aggregation and quality costs. The practical answer is to design for deletion before training, keep data lineage, and use retraining or verified
    unlearning workflows rather than relying on DP alone.'
  common_mistake: |
    **The Pitfall:** Claiming DP-SGD automatically satisfies the right to erasure.
    **The Rationale:** DP guarantees that the model didn't explicitly memorize individual data points, offering plausible deniability.
    **The Consequence:** Misinterpreting legal requirements. DP is a privacy mitigation, not a substitute for erasure. The data's influence still shaped the model's weights, violating strict GDPR interpretations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model on 35B tokens.
    - Full retrain estimate: 2,000 H100-hours.
    - GPU cost: $3.50/hr.
    - Annual erasure example: 1,000 requests/year.

    **Calculations:**
    - Full retrain cost = 2,000 H100-hours * $3.50/hr = $7,000.
    - If every request requires a separate full retrain, 1,000 requests/year cost 1,000 * $7,000 = $7M/year.
    - At 100K requests/year, the same per-request retrain model costs $700M/year.
    - SISA with k=100 reduces affected retrain compute to about $7,000 / 100 = $70 per request, assuming balanced shards and no extra aggregation cost.
    - Approximate unlearning cost must be measured from the actual procedure; do not rely on a fixed 100-step estimate as proof of erasure.

    **Conclusion & Interpretation:**
    - **Result: compliance-and-cost-bound.** DP-SGD at ε=5 is not erasure. Full retraining is auditable but expensive; SISA or verified unlearning can reduce cost if designed into the system.
