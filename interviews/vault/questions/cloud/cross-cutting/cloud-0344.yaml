title: 'The TCO Blindspot: Hardware Maintenance'
scenario: Your team is building a Total Cost of Ownership (TCO) model for a new GPU cluster.
question: Using standard industry rules of thumb, what is the approximate annual maintenance cost for a single H100 server with about $30,000 CapEx?
details:
  realistic_solution: The standard industry rule of thumb for annual hardware maintenance is ~5% of the initial capital expenditure. This covers part replacements, technician time, and support contracts needed to maintain fleet health at scale.
  common_mistake: |
    **The Pitfall:** Focusing strictly on the initial purchase price (CapEx) and raw energy costs.
    **The Rationale:** Systems engineers frequently forget to budget for ongoing lifecycle hardware maintenance.
    **The Consequence:** The TCO model is wildly inaccurate, leading to severe budget shortfalls for replacing failed components at scale.
  napkin_math: |
    1. **Assumptions & Constraints:** H100 Server CapEx = $30,000. Standard industry rule for annual hardware maintenance = ~5%.
    2. **Calculations:** Annual Maintenance = $30,000 × 0.05 = $1,500.
    3. **Conclusion & Interpretation:** **Result: $1,500 per year per server. TCO-CapEx-Bound.**
  options:
  - $150
  - $1,500
  - $3,000
  - $6,000
  correct_index: 1
