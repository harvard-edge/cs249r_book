title: Strategic Platform Risk Assessment for ML Infrastructure
scenario: Your company's entire ML stack is built on CUDA 12.x, cuDNN 8.x, NCCL 2.x, and TensorRT 8.x. A new CTO asks you to quantify the vendor lock-in risk and propose a portability roadmap. What framework do you use to assess and mitigate the risk?
question: What framework do you use to assess and mitigate the risk?
details:
  realistic_solution: |
    Layer-by-layer assessment: (1) PyTorch model code: 95% portable (uses standard ops). Cost to port: low. (2) Custom CUDA kernels: 0% portable. Cost: high ($50K-200K per kernel to port). (3) cuDNN: replaced by MIOpen (AMD) or XLA (TPU) at framework level. Cost: medium (framework handles it). (4) NCCL: replaced by RCCL or Gloo. Cost: medium (API-compatible). (5) TensorRT: no equivalent on AMD/TPU. Cost: high (re-engineer inference pipeline). Roadmap: isolate non-portable layers behind abstraction interfaces, invest in Triton for custom kernels (portable by design), and move inference to ONNX Runtime (multi-EP). 18-month timeline, $600K investment.
  common_mistake: |
    **The Pitfall:** Treating hardware portability as a binary decision.
    **The Rationale:** Management assumes entire stacks are locked in, failing to decompose the architecture into distinct abstraction layers with varying porting costs.
    **The Consequence:** Paralyzing infrastructure decisions or initiating massive rewrite projects that fail to deliver a positive ROI.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Porting cost: 5 custom kernels ($100K each) + 3 TensorRT services ($50K each) + CI/CD ($100K) = $750K.
       - Current hardware spend = $5M/yr.
    2. **Calculations:**
       - Assuming multi-vendor leverage yields a 20% hardware cost savings.
       - Annual savings = 20% of $5M = $1M/yr.
       - Payback Period = $750K / $1M/yr = 0.75 years (9 months).
    3. **Conclusion & Interpretation:**
       - **Result: Financial-Bound**. The $750K engineering investment provides a positive ROI in just 9 months, strictly justifying the multi-vendor portability roadmap.
