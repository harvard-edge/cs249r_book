title: Assessing CUDA Vendor Lock-In and ML Stack Portability Risk
scenario: Your company's entire ML stack is built on CUDA 12.x, cuDNN 8.x, NCCL 2.x, and TensorRT 8.x. A new CTO asks you to quantify the vendor lock-in risk and propose a portability roadmap. What framework do you use to assess and mitigate the risk?
question: How would you assess CUDA vendor lock-in risk and build a portability roadmap across the ML stack?
details:
  realistic_solution: |
    Layer-by-layer assessment: (1) PyTorch model code: 95% portable (uses standard ops). Cost to port: low. (2) Custom CUDA kernels: 0% portable. Cost: high ($50K-200K per kernel to port). (3) cuDNN: replaced by MIOpen (AMD) or XLA (TPU) at framework level. Cost: medium (framework handles it). (4) NCCL: replaced by RCCL or Gloo. Cost: medium (API-compatible). (5) TensorRT: no equivalent on AMD/TPU. Cost: high (re-engineer inference pipeline). Roadmap: inventory proprietary dependencies, rank them by business criticality and porting cost, isolate non-portable layers behind abstraction interfaces, invest in Triton for custom kernels, move inference to ONNX Runtime multi-EP where possible, and maintain CI on at least one non-CUDA backend. Use a 12-18 month roadmap and a $750K planning estimate for the first portability tranche.
  common_mistake: |
    **The Pitfall:** Treating hardware portability as a binary decision.
    **The Rationale:** Management assumes entire stacks are locked in, failing to decompose the architecture into distinct abstraction layers with varying porting costs.
    **The Consequence:** Paralyzing infrastructure decisions or initiating massive rewrite projects that fail to deliver a positive ROI.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Porting cost: 5 custom kernels ($100K each) + 3 TensorRT services ($50K each) + CI/CD and validation ($100K) = $750K.
       - Current hardware spend = $5M/yr.
       - Treat 20% savings as a scenario for negotiating leverage, not a guaranteed outcome.
    2. **Calculations:**
       - Scenario annual savings = 20% of $5M = $1M/yr.
       - Payback Period = $750K / $1M/yr = 0.75 years (9 months).
    3. **Conclusion & Interpretation:**
       - **Result: conditional 9-month payback under the 20% savings scenario.** The roadmap is justified if the dependency inventory shows enough portable workload volume to realize those savings; otherwise the same framework still identifies and contains the lock-in risk.
