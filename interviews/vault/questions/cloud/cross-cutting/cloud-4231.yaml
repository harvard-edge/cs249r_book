title: DP Composition Across Multiple Model Releases
scenario: >-
  Your ML team releases a new model version monthly, each trained with DP-SGD
  at epsilon = 3.0 on the same private dataset. After 12 monthly releases, you must determine the total privacy loss.
question: >-
  What total privacy loss do basic, advanced, and RDP composition give after
  12 ε=3 releases, and when must releases stop?
details:
  realistic_solution: 'Three composition theorems give different bounds: (1) Basic composition: ε_total = k × ε = 12 × 3 = 36. Very loose. (2) Advanced composition: ε_total = ε√(2k × ln(1/δ)) + k × ε(e^ε - 1). For k=12, ε=3, δ=1e-5: ε_total ≈ 3 × √(24 × 11.5) + 12 × 3 × (e³-1) ≈ 49.8 + 717 ≈ too loose (worse than basic for large ε). Advanced composition works better for small ε. (3) Renyi DP (RDP): track privacy loss as Renyi divergence, convert to (ε,δ)-DP at the end. For Gaussian mechanism with σ calibrated for ε=3: RDP gives ε_total ≈ 10.4 after 12 compositions — much tighter. Practical: with RDP accounting, budget of ε_total ≤ 15 allows 18-20 monthly releases before exhaustion. After that: either collect fresh data, or use a private synthetic dataset that doesn''t consume additional budget (post-processing immunity).'
  common_mistake: |
    **The Pitfall:** Assuming each release is independent and total epsilon stays at 3.0.
    **The Rationale:** Candidates forget that multiple queries (or models) on the same dataset compound privacy loss. Basic composition gives a total ε of 36, which means no meaningful privacy guarantee.
    **The Consequence:** Leaking sensitive user data by continuously publishing models trained on the same dataset without tracking accumulated privacy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Monthly releases trained with DP-SGD at ε=3.0.
    - RDP subsampling q=0.01, σ=1.0, RDP(α=10) ≈ 0.005 per step.
    - T=100K steps per release, 12 releases.

    **Calculations:**
    - Basic composition = 12 × 3 = 36 (loose).
    - RDP total over 12 releases = 100K × 12 × 0.005 = 6.0 (for α=10).
    - Convert RDP to (ε, δ) with δ=1e-5: ε = 6.0 + ln(1/1e-5) / 9 = 6.0 + 11.5/9 = 7.28.
    - Budget exhaustion if total budget is ε=15: 15 / (7.28 / 12) = 24.7 releases.

    **Conclusion & Interpretation:**
    - **Result: 24.7 releases (Privacy-Bound)**. Using RDP accounting significantly tightens the bounds compared to basic composition, allowing more releases.
