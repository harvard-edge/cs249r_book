title: DP Composition Across Multiple Model Releases
scenario: Your ML team releases a new model version monthly, each trained with DP-SGD at epsilon = 3.0 on the same private dataset. After 12 monthly releases, you must determine the total privacy loss.
question: What total privacy loss do basic, advanced, and RDP composition give after 12 ε=3 releases, and when must releases stop?
details:
  realistic_solution: 'For the published per-release guarantee ε=3, basic composition gives ε_total = 12 × 3 = 36. That already exceeds an ε≤15 release budget after 5 releases, because the 6th release would reach ε=18. The usual advanced-composition bound is not helpful at ε=3: ε√(2k ln(1/δ)) + kε(e^ε - 1) is larger than basic composition for these parameters, so report the minimum of the valid bounds, which is still 36. RDP can be tighter only if the accountant values for each training run are retained, not if all you know is ε=3 per release. If an accountant certifies each release costs about 1.2 ε under the shared RDP/δ budget, then 12 releases cost about 14.4 and the 13th would exceed ε=15. Without that accountant evidence, stop after 5 releases under basic composition.'
  common_mistake: |
    **The Pitfall:** Assuming each release is independent and total epsilon stays at 3.0.
    **The Rationale:** Candidates forget that multiple queries (or models) on the same dataset compound privacy loss. Basic composition gives a total ε of 36, which means no meaningful privacy guarantee.
    **The Consequence:** Leaking sensitive user data by continuously publishing models trained on the same dataset without tracking accumulated privacy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Monthly releases are trained on the same private dataset.
    - Each published release is certified as (ε=3, δ)-DP.
    - Organization budget is ε_total ≤ 15 at the same δ convention.
    - RDP gives tighter composition only when per-order accountant costs are available for each run.

    **Calculations:**
    - Basic composition after 12 releases = 12 * 3 = 36.
    - Basic stop threshold = floor(15 / 3) = 5 releases; release 6 would reach ε=18.
    - Advanced composition example with δ'=1e-5: 3 * sqrt(2 * 12 * ln(1/δ')) + 12 * 3 * (exp(3) - 1) is far above 36, so it is not the controlling bound.
    - RDP cannot be derived from ε=3 alone. If a retained accountant shows about ε=1.2 per release under composition, then 12 releases cost 14.4 and release 13 would reach 15.6.

    **Conclusion & Interpretation:**
    - **Result: privacy-budget-bound.** With only ε=3 per release, total ε after 12 releases is 36 and releases must stop after 5. RDP may allow more only with documented accountant values.
