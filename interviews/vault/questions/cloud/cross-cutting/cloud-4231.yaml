title: DP Composition Across Multiple Model Releases
scenario: Your ML team releases a new model version monthly, each trained with DP-SGD at epsilon = 3.0 on the same private dataset. After 12 monthly releases, you must determine the total privacy loss.
question: What total privacy loss do basic, advanced, and RDP composition give after 12 ε=3 releases, and when must releases stop?
details:
  realistic_solution: 'For the published per-release guarantee ε=3, basic composition gives ε_total = 12 × 3 = 36. That already exceeds an ε≤15 release budget after 5 releases, because the 6th release would reach ε=18. The usual advanced-composition bound is not helpful at ε=3: with an explicit slack δ'', the standard term sqrt(2k ln(1/δ''))ε + kε(e^ε - 1) is much larger than 36 for typical small δ'', so the best valid published bound remains the basic-composition value of 36. RDP may be tighter only if the accountant traces by Renyi order are retained for every run and converted to the target (ε,δ) budget. It cannot be recovered from the scalar ε=3 release certificates alone, so without accountant evidence the safe stop point is after 5 releases.'
  common_mistake: |
    **The Pitfall:** Assuming each release is independent and total epsilon stays at 3.0.
    **The Rationale:** Candidates forget that multiple queries (or models) on the same dataset compound privacy loss. Basic composition gives a total ε of 36, which means no meaningful privacy guarantee.
    **The Consequence:** Leaking sensitive user data by continuously publishing models trained on the same dataset without tracking accumulated privacy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Monthly releases are trained on the same private dataset.
    - Each published release is certified as (ε=3, δ)-DP.
    - Organization budget is ε_total ≤ 15 at the same δ convention.
    - Advanced composition needs an explicit slack δ' in addition to the release δ convention.
    - RDP composition needs per-order accountant costs for each run; a scalar ε=3 certificate is insufficient.

    **Calculations:**
    - Basic composition after 12 releases = 12 * 3 = 36.
    - Basic stop threshold = floor(15 / 3) = 5 releases; release 6 would reach ε=18.
    - Advanced composition example with δ'=1e-5: sqrt(2 * 12 * ln(1e5)) * 3 + 12 * 3 * (exp(3) - 1) is about 755, so it is worse than basic composition.
    - Report the minimum valid bound from the available information: min(36, about 755) = 36.
    - RDP cannot be computed from ε=3 alone; it requires the retained accountant traces by Renyi order and target δ.

    **Conclusion & Interpretation:**
    - **Result: privacy-budget-bound.** With only ε=3 per release, total ε after 12 releases is 36 and releases must stop after 5. RDP should be reported as unavailable unless documented accountant traces are provided.
