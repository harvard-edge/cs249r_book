title: Auto-Scaling and Routing for 7B Chat Model on Mixed T4 Fleet
scenario: Architect an auto-scaling cost optimizer for serving a 7B chat model. Traffic fluctuates wildly 10x throughout the day. You have access to reserved T4s and spot T4s. Design the scaling and request routing architecture.
question: How would you autoscale and route traffic for a 7B chat model with 10x daily swings using reserved and spot T4s?
details:
  realistic_solution: Implement a predictive load balancer with a two-tier queue. Provision reserved T4 instances to handle the baseline (trough) traffic to guarantee baseline SLA. For daily spikes, aggressively scale preemptible spot T4 instances. Route interactive, latency-sensitive chats to reserved instances. Route background batch-processing (summaries, offline extraction) to spot instances. If spot nodes drop, queue the offline tasks until prices drop or baseline instances free up.
  common_mistake: |
    **The Pitfall:** Mixing real-time user chat requests onto spot instances without a fallback routing mechanism.
    **The Rationale:** Spot instances are cheaper and scale rapidly, making them attractive for absorbing traffic spikes.
    **The Consequence:** Dropped websockets and failed generations when preempted, negatively impacting live user sessions.
  napkin_math: |
    **Assumptions & Constraints:**
    - T4 has 16GB VRAM and can serve a quantized 7B model.
    - Sustained decode throughput is ~400 generated tokens/sec per T4 with batching.
    - Average request generates 200 tokens, so one T4 serves ~2 req/sec.
    - 10x traffic spike from 1,000 to 10,000 req/sec.
    - Reserved fleet sized for baseline SLA: 500 T4s. Spot fleet scales to 4,500 T4s for burst and batch work.

    **Calculations:**
    - Baseline token load: 1,000 req/sec * 200 tokens/req = 200,000 tokens/sec.
    - Reserved capacity: 500 T4s * 400 tokens/sec = 200,000 tokens/sec = 1,000 req/sec.
    - Peak token load: 10,000 req/sec * 200 tokens/req = 2,000,000 tokens/sec.
    - Peak headroom required above baseline: 2,000,000 - 200,000 = 1,800,000 tokens/sec.
    - Spot capacity needed: 1,800,000 / 400 = 4,500 T4s.
    - Routing threshold: keep the first 1,000 req/sec of interactive traffic on reserved capacity; route elastic batch and overflow traffic to spot-backed queues with admission control.

    **Conclusion & Interpretation:**
    - **Result:** The reserved pool covers the baseline interactive SLA, while ~4,500 spot T4s provide the 9,000 req/sec burst headroom. Segregating batch and overflow traffic onto spot queues prevents spot drops from interrupting the protected baseline lane.
