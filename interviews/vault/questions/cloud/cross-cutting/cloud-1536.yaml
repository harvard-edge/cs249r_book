title: Mitigating MIA in Clinical APIs
scenario: You are deploying a 15B parameter clinical diagnostic model trained on 2 million sensitive electronic health records (EHRs). It is exposed via a public REST API. A red team demonstrates a Membership Inference Attack (MIA) achieving an 82% success rate by analyzing the entropy of the returned token probabilities.
question: Which MIA mitigation should you choose for the 15B clinical model—DP-SGD, Top-1 truncation, or rate limiting—and why?
details:
  realistic_solution: Choose DP-SGD as the primary mitigation because it directly reduces memorization during training and provides a formal privacy budget. It can lower membership-inference risk, but the exact residual attack success must be measured for the deployed model; output truncation and rate limiting are useful defense-in-depth controls but do not address memorization.
  common_mistake: |
    **The Pitfall:** Relying solely on Top-1 logit truncation or API rate limiting.
    **The Rationale:** Candidates falsely assume that obscuring the raw API outputs or slowing down queries fixes the underlying model memorization issue.
    **The Consequence:** Attackers easily bypass these superficial defenses using boundary-based or shadow-model attacks, leading to catastrophic data breaches.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline MIA success: 82%.
    - DP-SGD candidate privacy budget: ε=8, δ=1e-6.
    - Output-only defenses can reduce leakage from this API, but attackers may adapt with shadow models or boundary queries.

    **Calculations:**
    - ε and δ define a bound on how much any one training record can affect the training algorithm's output; they do not determine a unique MIA accuracy.
    - Lower ε generally requires more clipping/noise, which tends to reduce memorization but can also reduce utility.
    - The expected residual MIA success must be evaluated empirically on held-out attack sets after training, alongside model quality.

    **Conclusion & Interpretation:**
    - **Result: Prefer DP-SGD with measured residual risk (Privacy-Bound)**. DP-SGD is the only listed option that directly constrains training-record influence, but the answer should not claim a specific 52% attack accuracy from ε alone.
