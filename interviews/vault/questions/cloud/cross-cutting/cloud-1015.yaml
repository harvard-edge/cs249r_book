title: Quantifying Late-Stage Constraint Costs
scenario: A cloud ML team trains a 15B parameter transformer using 500 GPU-hours at $4/hour. At deployment, they find the target inference instance (NVIDIA T4, 16GB VRAM) cannot serve the 30GB FP16 model. They spend 50 GPU-hours attempting INT8 post-training quantization, which fails to meet the accuracy SLA. They must redesign the architecture and retrain from scratch (500 GPU-hours).
question: What is the cost of discovering the T4 16GB constraint after training versus profiling it upfront, and what process change prevents it?
details:
  realistic_solution: Implement a shift-left strategy by strictly defining inference hardware constraints (memory, latency) as prerequisite contracts before the training stage begins.
  common_mistake: |
    **The Pitfall:** Focusing purely on technical rescue attempts.
    **The Rationale:** Candidates hyperfocus on PTQ, distillation, or pruning techniques without addressing the systemic process failure.
    **The Consequence:** Compounding financial and temporal costs from violating stage-interface contracts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Late discovery: 500 (train) + 50 (PTQ) + 500 (retrain) = 1050 GPU-hours.
    - Early constraint: 10 (profile) + 500 (train) = 510 GPU-hours.
    - Cost = $4/hour.

    **Calculations:**
    - Late discovery cost = 1050 * $4 = $4,200.
    - Early constraint cost = 510 * $4 = $2,040.
    - Waste = $4,200 - $2,040 = $2,160.

    **Conclusion & Interpretation:**
    - **Result: $2,160 waste (Cost-Bound)**. Upfront profiling prevents massive late-stage compounding costs.
