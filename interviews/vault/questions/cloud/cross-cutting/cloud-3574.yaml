title: 'DP-SGD Scaling on NVIDIA H100: Balancing Privacy and Performance'
scenario: You are training a large language model using DP-SGD on a dataset of 1 billion sensitive records
  on a single NVIDIA H100 GPU. You need to achieve an (ε, δ)-privacy guarantee of (8, 1e-7) over one year
  of continuous training. The current setup uses a microbatch size of 16 and a global batch size of 4096.
question: How does the DP-SGD noise scale and per-sample gradient computation impact utility, throughput,
  and resource utilization on the H100?
details:
  realistic_solution: To address this, implement a moments accountant for precise ε tracking. Optimize
    the DP-SGD algorithm by leveraging the H100's FP16 dense capabilities for gradient accumulation and
    noise generation where possible, maximizing the 989 TFLOPS throughput. Carefully tune the microbatch
    and global batch sizes to balance memory access patterns with the 3.35 TB/s HBM3 bandwidth. Explore
    advanced techniques like adaptive clipping or hierarchical noise addition to minimize utility loss.
    Profiling the H100 to identify bottlenecks in gradient aggregation and noise injection is crucial
    for maximizing device utilization.
  common_mistake: '**The Pitfall:** Neglecting the massive computational and memory overhead of per-sample
    gradient clipping in DP-SGD.

    **The Rationale:** It''s easy to focus solely on the mathematical $\epsilon$ budget and assume standard
    SGD throughput, forgetting that DP-SGD breaks gradient accumulation by requiring distinct instantiations
    for every sample.

    **The Consequence:** The system becomes catastrophically memory-bandwidth bottlenecked, making the
    1-year training SLA impossible to hit despite having an H100.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 1B records, 4096 global batch, 1B param model.

    - Weights = 2GB. Per-sample grads (BS=16) = 32GB.

    - HBM at 3.35 TB/s.

    - Target ε=8.

    **Calculations:**

    - Steps: 1B records / 4096 = 244,140 steps per epoch. (256 microbatches/step).

    - HBM read/write takes ∼20ms per microbatch → ∼5.1s per global step.

    - Epoch Time: 244K × 5.1s ≈ 14 days.

    - Noise Scale: For ε=8 over 244K steps (q ≈ 4e-6), required noise σ ≈ 0.001.

    **Conclusion & Interpretation:**

    - Noise utility loss is minimal, but the **14-day epoch time is severely memory-bottlenecked** by
    per-sample gradients.

    '
