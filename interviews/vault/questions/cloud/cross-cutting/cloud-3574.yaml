title: 'DP-SGD Scaling on NVIDIA H100: Balancing Privacy and Performance'
scenario: You are training a large language model using DP-SGD on a dataset of 1 billion sensitive records on a single NVIDIA H100 GPU. You need to achieve an (ε, δ)-privacy guarantee of (8, 1e-7) over one year of continuous training. The current setup uses a microbatch size of 16 and a global batch size of 4096.
question: How does the DP-SGD noise scale and per-sample gradient computation impact utility, throughput, and resource utilization on the H100?
details:
  realistic_solution: The privacy effect comes from clipping each example to norm C, adding Gaussian noise with standard deviation σC to the averaged logical batch, and accounting once per logical DP step. With 1B records and a 4096 global batch, q is only about 4.1e-6, so the required σ may be modest, but it still must be solved with an RDP or moments accountant for the full one-year step count and δ=1e-7. Utility depends on clipping fraction and σC, while throughput is dominated by per-example norm computation, extra backward passes or vectorized per-sample gradients, and micro-batch accumulation on the H100. Resource utilization is often memory- and kernel-overhead limited rather than peak-FLOP limited, so ghost clipping, fused kernels, activation checkpointing, and larger logical batches are the main levers.
  common_mistake: |
    **The Pitfall:** Neglecting the massive computational and memory overhead of per-sample gradient clipping in DP-SGD.
    **The Rationale:** It's easy to focus solely on the mathematical $\epsilon$ budget and assume standard SGD throughput, forgetting that DP-SGD breaks gradient accumulation by requiring distinct instantiations for every sample.
    **The Consequence:** The system becomes catastrophically memory-bandwidth bottlenecked, making the 1-year training SLA impossible to hit despite having an H100.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B records, 4096 global batch, 1B parameter model.
    - FP16 weights = 2 GB.
    - Microbatch size = 16, so one logical batch uses 256 microbatches.
    - H100 HBM bandwidth is about 3.35 TB/s.
    - Target privacy guarantee is ε=8, δ=1e-7 over the actual one-year run.

    **Calculations:**
    - Steps per epoch = 1B records / 4096 = 244,140 logical DP steps.
    - Sampling rate per logical step q = 4096 / 1,000,000,000 = 4.096e-6.
    - The one-year accountant needs the actual number of logical DP steps run in that year, for example epochs_per_year * 244,140, not just the per-epoch count.
    - The 256 microbatches affect throughput and memory traffic, but privacy accounting should count one noisy clipped update per logical batch, not 256 separate DP releases.
    - A naive per-sample-gradient tensor for one 16-example microbatch is 16 * 2 GB = 32 GB before activations and optimizer state; materializing the full 4096-example logical batch would be 4096 * 2 GB = 8 TB and is infeasible.
    - σ must be solved by an RDP/moments accountant from q, total logical steps, δ, and ε; a near-zero value such as σ≈0.001 is not justified by these inputs.

    **Conclusion & Interpretation:**
    - **Result: accountant-derived noise and memory-efficient clipping are required.** H100 utilization is limited by per-sample clipping overhead and memory traffic, while utility depends on the chosen clipping norm and the σ returned by the privacy accountant.
