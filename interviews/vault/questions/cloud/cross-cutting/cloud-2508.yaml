title: Cloud vs Edge FL Energy Tradeoff
scenario: To improve data privacy, your team proposes moving a personalization model's training from a centralized cloud cluster to Federated Learning (FL) across 500,000 user smartphones. Cloud training takes 500 GPU-hours. FL requires 10 rounds of training, with each smartphone computing for 2 hours per round.
question: "Is moving personalization training from 500 GPU-hours to FL across 500,000 smartphones greener, and why?"
details:
  realistic_solution: 'While Federated Learning avoids the energy cost of transferring massive datasets to the cloud, edge processors are orders of magnitude less energy-efficient per FLOP than datacenter accelerators. Furthermore, transmitting weight updates across cellular/WiFi consumes massive energy. Shifting to FL prioritizes privacy at the direct expense of carbon footprint.'
  common_mistake: |
    **The Pitfall:** Believing FL is greener because edge devices lack data center cooling overhead.
    **The Rationale:** Candidates focus solely on cooling efficiency while completely ignoring the severe compute inefficiency of mobile SoCs and the massive energy cost of wireless network transmissions.
    **The Consequence:** Driving architectural changes that drastically inflate global carbon footprint under the false guise of "green AI."
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud: 500 hours, 700W, PUE 1.3.
    - FL: 500,000 phones, 2 hours/round, 10 rounds, 4W SoC.
    - Network: 100MB/round per phone, 0.1 kWh/GB.

    **Calculations:**
    - Cloud Energy = 500 * 700W * 1.3 = 455 kWh.
    - FL Edge Compute = 500,000 * 2 * 10 * 4W = 40,000 kWh.
    - FL Network Transfer = 500,000 * 100MB * 10 = 500 TB.
    - Network Energy = 500,000 GB * 0.1 = 50,000 kWh.
    - Total FL Energy = 90,000 kWh.

    **Conclusion & Interpretation:**
    - **Result: 90,000 kWh (Energy-Bound)**. FL consumes ~200x more total energy than the cloud.
