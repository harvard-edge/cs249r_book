title: 'The TCO of Privacy: Federated Learning''s Compute Tax'
scenario: 'You are evaluating a switch from a centralized training strategy to a Federated Learning (FL) approach for your global fleet of autonomous vehicles to improve user privacy. Engineering analysis shows that due to communication overhead and on-device constraints, the FL model requires approximately 20% more total training compute (FLOPs) to achieve the same accuracy as the centralized model.'
question: "If the centralized model requires 6.0 x 10^23 FLOPs to train, what is the additional compute cost the company will incur by adopting Federated Learning?"
details:
  realistic_solution: 'The correct approach is to calculate 20% of the baseline compute cost. This value represents the direct, additional expenditure in terms of GPU-time required to maintain model quality while gaining the privacy benefits of Federated Learning.'
  common_mistake: |
    **The Pitfall:** Calculating the total compute instead of the additional compute.
    **The Rationale:** Misreading the prompt and solving for the new total rather than the incremental overhead.
    **The Consequence:** Overstating the TCO increase by 5x, potentially killing a viable privacy initiative.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Compute: 6.0 x 10^23 FLOPs.
    - FL Overhead: 20% additional compute.

    **Calculations:**
    - Additional FLOPs = 0.20 * 6.0 x 10^23 = 1.2 x 10^23 FLOPs.
    - Total FLOPs (distractor) = 7.2 x 10^23 FLOPs.

    **Conclusion & Interpretation:**
    - **Result: 1.2 x 10^23 FLOPs additional compute (Compute-Overhead-Bound).**
  options:
  - '`7.2 x 10^23` FLOPs'
  - '`1.2 x 10^22` FLOPs'
  - '`1.2 x 10^23` FLOPs'
  - '`4.8 x 10^23` FLOPs'
