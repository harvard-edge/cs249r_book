title: The Federated Learning Communication Tax
scenario: A large-scale federated learning system is being designed for a fleet of autonomous vehicles to improve perception models.
question: In a large-scale FL system for autonomous-vehicle perception, what factor typically becomes the largest driver of OpEx?
details:
  realistic_solution: 'The correct answer is the total network communication cost. The massive aggregated data transfer volume across thousands of endpoints and hundreds of rounds dwarfs centralized upload costs.'
  common_mistake: |
    **The Pitfall:** Focusing solely on local costs like on-device compute.
    **The Rationale:** Engineers focus on the privacy benefits of FL and assume it's inherently cheaper than centralized storage.
    **The Consequence:** They fail to recognize that frequent, small data transfers from millions of endpoints aggregate into a massive network cost that dominates the budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 vehicles. Centralized data: 1 GB/car.
    - Federated: 100 MB update per round, 100 rounds.

    **Calculations:**
    - Centralized upload: 10,000 * 1 GB = 10 TB total.
    - Federated transfer: 10,000 cars * 100 MB * 100 rounds = 100,000,000 MB = 100 TB.
    - Cost at $0.01/MB over cellular: 100 TB * 10^6 MB/TB * $0.01 = $1,000,000.

    **Conclusion & Interpretation:**
    - **Result: 100 TB federated transfer vs 10 TB centralized (OpEx-Network-Bound)**. Making communication the dominant cost factor.
  options:
  - 'Central server compute cost ($1,000/month) for aggregating 100 TB of weight updates.'
  - 'The centralized upload data transfer cost of 10 TB (assuming 1 GB/car baseline).'
  - 'The total network communication cost of sending model updates, which scales to 100 TB.'
  - 'The on-device compute cost, assuming 10k vehicles require 100 FLOPs per update.'
  correct_index: 2
