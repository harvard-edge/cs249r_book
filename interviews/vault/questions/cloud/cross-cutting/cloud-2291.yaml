title: The EU AI Act Compliance Pipeline
scenario: 'Your company deploys a high-risk AI system (credit scoring) in the EU. The EU AI Act requires: (1) a conformity assessment before deployment, (2) continuous post-market monitoring, (3) full traceability of training data and model decisions, and (4) the ability to provide explanations to affected individuals upon request. Your current ML infrastructure has none of these capabilities.'
question: What infrastructure is needed for EU AI Act compliance, and which requirement is most expensive to retrofit?
details:
  realistic_solution: 'Each requirement maps to concrete systems infrastructure: (1) Conformity assessment → automated bias testing pipeline (disaggregated evaluation across protected groups), performance benchmarking suite, dataset documentation (datasheets), model cards generated automatically from training metadata. (2) Post-market monitoring → production fairness monitoring (hourly metric computation, drift detection on per-group accuracy, automated alerting when metrics breach thresholds), incident reporting pipeline. (3) Traceability → data lineage system (tracking every training sample through preprocessing, deduplication, augmentation), model versioning with immutable artifacts, decision audit logs linking each prediction to the model version, input features, and output. (4) Individual explanations → feature attribution infrastructure (SHAP/LIME computation on-demand), explanation caching layer (pre-computing common explanation patterns). The most expensive to retrofit is (3) traceability, because it requires instrumenting every stage of the data pipeline retroactively, storing immutable lineage records for potentially billions of training samples, and maintaining a queryable audit log for every production prediction — this is a distributed systems problem requiring petabyte-scale storage with write-once semantics.'
  common_mistake: 'Treating compliance as a documentation exercise — writing policies and filing paperwork. The EU AI Act requires operational infrastructure, not just documents. Or focusing only on explainability while ignoring the data lineage requirement.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 10M decisions/day.
    - Decision audit record size: 2 KB/record.
    - Retention requirement: 7 years.
    - Storage cost (S3): $0.023/GB/month.
    
    **Calculations:**
    - Daily data volume: 10,000,000 * 2 KB = 20 GB/day.
    - Total retained volume (7 years): 20 GB * 365 days * 7 years = 51,100 GB (51.1 TB).
    - Annual storage cost: 51,100 GB * $0.023 * 12 months ≈ $14,103/year.
    
    **Conclusion & Interpretation:**
    - **Result: ~51 TB Storage Cost (Compliance-Bound)**. The petabyte-scale data lineage and traceability requirement is a massive distributed systems challenge, but the $14K/yr infrastructure cost is negligible compared to EU AI Act fines.
