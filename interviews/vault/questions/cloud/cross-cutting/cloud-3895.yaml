title: ONNX Runtime Execution Provider Selection for Multi-Accelerator Inference
scenario: You serve a vision model via ONNX Runtime in a heterogeneous cluster with H100s, MI300Xs, and TPU v5e pods. Each node type has a different ONNX RT execution provider (CUDA EP, MIGraphX EP, and a custom XLA bridge). Latency SLA is p99 < 25ms for a ResNet-50 batch of 32.
question: How many FLOPs are required for a ResNet-50 batch of 32, and why is the 2.1 TFLOP estimate wrong?
details:
  realistic_solution: 'ResNet-50 at 4.1 GFLOPs/image × 32 batch = 131.2 GFLOPs = 0.131 TFLOPs. The 2.1 TFLOPs estimate is wrong (it is 16× too high, possibly calculating for a much larger batch size like 512, or mistakenly using a different metric). Training backward overhead is irrelevant here since this is an inference deployment.'
  common_mistake: |
    **The Pitfall:** Using a single ONNX graph export and expecting identical performance across all execution providers.
    **The Rationale:** The promise of ONNX is "write once, run anywhere", leading engineers to trust the abstraction blindly.
    **The Consequence:** Missing that graph optimizations (operator fusion, layout selection) differ drastically per EP, and unsupported ops may silently fall back to the CPU, ruining latency SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - ResNet-50 requires 4.1 GFLOPs per image.
    - Batch size: 32.

    **Calculations:**
    - Total FLOPs: 4.1 GFLOPs * 32 images = 131.2 GFLOPs.
    - TFLOP Conversion: 131.2 GFLOPs / 1000 = 0.131 TFLOPs.

    **Conclusion & Interpretation:**
    - **Result: 0.131 TFLOPs (Compute-Bound)**. The 2.1 TFLOPs estimate is wildly incorrect (16x too high), possibly calculated for a batch size of 512.
