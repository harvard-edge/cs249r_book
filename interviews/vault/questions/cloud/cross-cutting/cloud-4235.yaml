title: DP-SGD Hyperparameter Tuning Without Spending Privacy Budget
scenario: Hyperparameter tuning for DP-SGD requires running many training experiments. Each experiment on the private data consumes privacy budget. With a total budget of ε=10, running 50 hyperparameter configurations via basic composition leaves only ε=0.2 per run — too noisy to be useful.
question: How do you tune hyperparameters without exhausting the privacy budget?
details:
  realistic_solution: 'Strategy: minimize private-data-dependent tuning. (1) Public proxy: tune architecture, learning-rate ranges, clipping heuristics, and batch schedules on public or synthetic data from a similar domain. (2) Accounted private tuning: if private data is needed, use a small validation budget with RDP/PLD accounting and select hyperparameters with the exponential mechanism or noisy validation metrics. (3) Transfer safely: warm-start from non-private or public-data experiments only when their outputs are not private-data-dependent releases and do not adapt to private validation feedback without accounting. Reserve most of ε=10 for the final DP-SGD training run.'
  common_mistake: |
    **The Pitfall:** Relying solely on advanced composition to run all experiments on private data.
    **The Rationale:** Engineers assume that better bounding math will make the privacy cost disappear.
    **The Consequence:** They waste a massive percentage of their overall privacy budget on tuning, severely degrading the accuracy of the final production model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total privacy budget: ε=10.
    - Tuning configurations: 50 runs.
    - Each private-data training run must be accounted for if its result influences the released model.

    **Calculations:**
    - Basic split across 50 private runs gives ε=10 / 50 = 0.2 per run, usually too noisy.
    - Running 50 useful private runs and then picking the best can spend most or all of the budget unless the selection itself is private.
    - RDP or PLD accounting may tighten the bound, but it requires the actual sampling rate, steps, noise multiplier, clipping norm, and δ; it cannot be summarized as 50 times an invented ε.
    - Public or proxy tuning spends ε=0 because private data is not used in that stage.
    - If private data must be used for selection, use a small validation budget with the exponential mechanism or report noisy validation metrics.
    - Final DP training can then spend the remaining budget, ideally close to the full ε=10.

    **Conclusion & Interpretation:**
    - **Result: privacy-accounting-bound.** Public/proxy tuning avoids spending privacy budget only because it avoids private data; private tuning must be explicitly accounted and privately selected.
