title: 'The TCO Iceberg: Training vs. Inference'
scenario: When considering the Total Cost of Ownership (TCO) for a large-scale, production ML service over a typical 3-year lifecycle, you need to understand the relative costs of different phases.
question: Over a typical 3-year production ML lifecycle, what is the approximate cost ratio of cumulative inference to initial training?
details:
  realistic_solution: Over a 3-year lifecycle, cumulative inference TCO typically dominates training TCO by a factor of 5-10x or more. The initial training is a one-time (or infrequent) CapEx event, whereas inference is a continuous OpEx that scales continuously with user traffic 24/7.
  common_mistake: |
    **The Pitfall:** Fixating on the high upfront capital expenditure (CapEx) of a massive training run.
    **The Rationale:** The one-time training cost is large, highly visible, and often a major boardroom budgeting hurdle.
    **The Consequence:** Mistakenly assuming training is the largest part of the budget, failing to optimize inference architecture, and burning through the operating budget prematurely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training: 1,000 GPUs running for 1 month (720 hours).
    - Inference: 100 GPUs running 24/7 for 3 years (26,280 hours).
    - Inference Hardware Premium: 1.5x cost multiplier for HA/low-latency networking.

    **Calculations:**
    - Training Compute: 1,000 GPUs * 720 hrs = 720,000 GPU-hours.
    - Inference Compute: 100 GPUs * 26,280 hrs = 2,628,000 GPU-hours.
    - Base Ratio: 2.628M / 0.72M = 3.65x greater volume.
    - Cost Ratio: 3.65x * 1.5 multiplier = 5.475x.

    **Conclusion & Interpretation:**
    - **Result: 5.475x (OpEx-Lifecycle Bound)**. Inference operational expenditure fundamentally dominates one-off training costs by a factor of 5-10x.
  options:
  - Training is 5-10x more expensive than inference.
  - 'They are roughly equal in cost (1:1 ratio).'
  - Inference is 5-10x more expensive than training.
  - Inference is over 100x more expensive than training.
  correct_index: 2
