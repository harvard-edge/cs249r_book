title: Carbon-Aware Multi-Region Routing
scenario: You run a weekly batch data processing job requiring 10,000 GPU-hours (at 400W each) to process a 50TB dataset currently residing in US-East. You can run it in US-East (PUE 1.3, Grid Carbon 450g CO2/kWh, Power $0.10/kWh) or transfer the data to EU-North (PUE 1.15, Grid Carbon 50g CO2/kWh, Power $0.15/kWh). Cross-region data transfer costs $0.02/GB.
question: Should the weekly 10,000 GPU-hour job run in US-East or EU-North to minimize carbon, and what is the cost tradeoff?
details:
  realistic_solution: 'To make a carbon-aware scheduling decision, you must calculate the total facility energy (IT Power * PUE) for both regions. EU-North offers a massive 90% reduction in carbon footprint compared to US-East, making it the clear winner for sustainability. However, this comes at a steep financial cost. While the compute energy cost in EU-North is slightly higher due to the $0.15/kWh rate, the real penalty is the data transfer cost for 50TB. As a Staff engineer, you must present this tradeoff: saving ~2.1 metric tons of CO2 costs an additional $1,170. You could propose an optimization: instead of moving the raw data weekly, process it incrementally, compress it aggressively, or replicate the ingestion pipeline directly to EU-North to avoid recurring egress fees.'
  common_mistake: |
    **The Pitfall:** Ignoring PUE or inter-region data egress costs.
    **The Rationale:** Candidates often calculate carbon footprints based solely on IT power, or they forget that moving 50TB of data across regions incurs massive cloud provider egress fees.
    **The Consequence:** Recommending a carbon optimization strategy that blows up the cloud budget by 3x without leadership approval.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Energy: 10,000 hrs * 400W = 4,000 kWh.
    - US-East: PUE 1.3, 450g CO2/kWh, $0.10/kWh.
    - EU-North: PUE 1.15, 50g CO2/kWh, $0.15/kWh.
    - Egress Cost: 50,000 GB * $0.02 = $1,000.

    **Calculations:**
    - US-East: Total Energy = 4,000 * 1.3 = 5,200 kWh. Carbon = 5,200 * 450g = 2,340 kg CO2. Cost = 5,200 * $0.10 = $520.
    - EU-North: Total Energy = 4,000 * 1.15 = 4,600 kWh. Carbon = 4,600 * 50g = 230 kg CO2. Compute Cost = 4,600 * $0.15 = $690.
    - EU-North Total Cost = $690 + $1,000 = $1,690.

    **Conclusion & Interpretation:**
    - **Result: Financial Tradeoff.** Save 2,110 kg of CO2 for an extra $1,170.
