title: Ad-Targeting Exploration Policy for Feedback Loops
scenario: 'Your ad targeting model has created a feedback loop. It over-shows ads to users who previously clicked, making them click more (engagement habit), while ignoring users who were never targeted. The model''s CTR keeps improving but total revenue is flat. Option A: add epsilon-greedy exploration (10% random ads). Option B: use inverse propensity scoring (IPS) to debias training data. Option C: train a separate ''exploration model'' on random traffic alongside the main model.'
question: Which production exploration strategy should break the ad-targeting feedback loop?
details:
  realistic_solution: Choose Option C as the primary production exploration approach. Option A (epsilon-greedy) reserves 10% of traffic for random ads, which creates an immediate opportunity cost and gathers low-quality exploration data. Option B (IPS) is valuable as a complementary counterfactual evaluation or off-policy learning technique, but it is not by itself an operational exploration policy; inverse propensity weights can also become high-variance for rarely shown user-content pairs and require clipping and normalization. Option C dedicates a small traffic slice to a separate exploration policy that optimizes for information gain on uncertain user-ad pairs. The main model can then train on both exploration and exploitation traffic with proper weighting. This makes Option C the preferred production mechanism for breaking the feedback loop, while IPS remains useful for evaluating and debiasing logged outcomes.
  common_mistake: |
    **The Pitfall:** Choosing epsilon-greedy because it's simplest.
    **The Rationale:** Candidates fail to realize that random exploration is wasteful and politically difficult due to the immediate 10% CTR drop.
    **The Consequence:** Wasting impressions on random content rather than intelligently gathering information.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline served traffic has CTR C.
    - Random exploration traffic has CTR R, where R is typically lower than C but not necessarily zero.
    - Option A explores 10% of traffic; Option C explores 5% of traffic with a targeted exploration model.

    **Calculations:**
    - Option A expected CTR = 0.90C + 0.10R, so the immediate CTR loss is 0.10(C - R), not automatically 10%.
    - Option B can debias logged data for evaluation or learning, but very small propensities create large 1/P(shown) weights and high variance.
    - Option C limits direct exploration cost to a smaller traffic slice while producing cleaner exploration data for the main model.

    **Conclusion & Interpretation:**
    - **Result: Choose Option C.** Use IPS as a complementary debiasing/evaluation tool, not as the only production mechanism for breaking the feedback loop.
