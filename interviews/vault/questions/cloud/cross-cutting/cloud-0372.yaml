title: The Iceberg of Inference Costs
scenario: 'Your team is deploying a large-scale perception model for a fleet of 100,000 autonomous vehicles. The model will be hosted in the cloud and run 24/7 for a projected 3-year service life.'
question: 'When analyzing the Total Cost of Ownership (TCO) for this model, which of the following components typically contributes the most to the total cost?'
details:
  realistic_solution: 'The ongoing cost of inference is by far the largest part of the TCO. A model''s training cost is a one-time event, but inference happens continuously for years. This requires a large fleet of servers running 24/7, and the cumulative cost of hosting, power, cooling, and maintenance for that fleet over a multi-year lifecycle will almost always dwarf the initial training expense.'
  common_mistake: |
    **The Pitfall:** Fixating on the high, one-time capital expense (CapEx) of training a large foundation model.
    **The Rationale:** Engineers see the multi-million dollar price tag for the training cluster and intuitively assume it's the dominant cost factor.
    **The Consequence:** Overlooking the long-term operational expense (OpEx) of running inference at scale, which leads to grossly underestimated budgets for multi-year deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training a 100B+ model might cost $2M on a large cluster for a month.
    - Deploying that model to serve 100,000 autonomous vehicles might require 5,000 GPUs running 24/7.
    - Hardware inference cost is $2/hour per GPU.

    **Calculations:**
    - Inference cost is 5,000 * $2 * 24 * 365 = $87.6M per year.
    - Over a 3-year service life, inference costs ~$262M.

    **Conclusion & Interpretation:**
    - **Result: ~$262M (Inference Cost Dominance)**. Over a 3-year service life, inference costs ~$262M, making it more than 100x the initial training cost.
  options:
  - 'The one-time cost of the initial model training run.'
  - 'The salaries of the ML engineering and research team.'
  - 'Ongoing inference costs (server hosting, power, maintenance).'
  - 'The cost of data acquisition, cleaning, and labeling.'
