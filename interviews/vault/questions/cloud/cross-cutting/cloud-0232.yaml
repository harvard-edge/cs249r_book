title: The Inference Cost Attribution Puzzle
scenario: Your platform serves 5 different LLMs on a shared pool of 64 A100 GPUs using vLLM with continuous batching. The finance team wants to charge each product team for their inference costs. Your colleague proposes dividing total GPU cost by total requests and charging per request. The search team (short prompts, 50-token outputs) and the content team (long prompts, 2,000-token outputs) both object.
question: "How would you design a fair inference cost attribution model for the five LLMs on the shared 64-A100 vLLM pool?"
details:
  realistic_solution: 'Fair cost attribution must reflect actual GPU resource consumption: Prefill cost (compute-bound) proportional to input tokens, and Decode cost (memory-bandwidth-bound) proportional to output tokens. Charge: `cost = \alpha \times input + \beta \times output + \gamma \times generation_time_ms`. Calibrate \alpha, \beta, \gamma by profiling. For continuous batching, \gamma captures KV-cache memory occupancy.'
  common_mistake: |
    **The Pitfall:** Charging per request or charging purely per token.
    **The Rationale:** Candidates ignore the fundamental compute/memory-bandwidth differences between prefill and decode phases.
    **The Consequence:** Severely undercharging long-generation use cases and penalizing short-generation use cases.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64 A100 GPUs at $2/hr = $128/hr total.
       - Search: 10,000 req/hr (500 in, 50 out).
       - Content: 1,000 req/hr (2000 in, 2000 out).
    2. **Calculations:**
       - Search prefill: 10k * 0.5s = 5k GPU-sec. Decode: 10k * 2s = 20k GPU-sec. Total = 25k GPU-sec (23%).
       - Content prefill: 1k * 4s = 4k GPU-sec. Decode: 1k * 80s = 80k GPU-sec. Total = 84k GPU-sec (77%).
       - Total GPU-sec = 109,000.
       - Content fair charge = 77% of $128 = $98/hr.
       - Search fair charge = 23% of $128 = $30/hr.
    3. **Conclusion & Interpretation:**
       - **Result: Content pays $98/hr, Search pays $30/hr.** The bottleneck is **KV-Cache Memory Occupancy**.
