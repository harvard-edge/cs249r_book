title: The CapEx of an A/B Test
scenario: 'Your team is proposing an A/B test for a new, much larger recommendation model. To get a clean signal, you need to run a shadow serving stack for the new model, which requires a dedicated fleet of 100 GPUs (assume a GPU costs $30,000 per unit).'
question: What initial GPU CapEx is required for a three-month shadow-serving experiment that needs 100 GPUs?
details:
  realistic_solution: 'The calculation provides a baseline ''cost of entry'' for the experiment. It separates the one-time hardware cost from ongoing operational costs. CapEx = 100 GPUs * $30,000/GPU = $3,000,000.'
  common_mistake: |
    **The Pitfall:** Ignoring the massive capital investment required to test a new model.
    **The Rationale:** Engineers often focus solely on the theoretical performance uplift of the model.
    **The Consequence:** Confusing capital expenditure with operational expenditure or miscalculating by an order of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 GPUs required.
    - Unit cost = $30,000.
    
    **Calculations:**
    - CapEx = 100 * 30,000 = $3,000,000.
    
    **Conclusion & Interpretation:**
    - **Result: $3,000,000 (Cost-Bound)**. $3M CapEx hardware purchase price.
  options:
  - '$30,000'
  - '$300,000'
  - '$3,000,000'
  - '$150,000'
  correct_index: 2
