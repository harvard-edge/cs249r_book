title: HIP Kernel Launch Parameter Translation from CUDA
scenario: 'You are porting a CUDA kernel that launches with <<<grid(256), block(256), shared_mem(48KB)>>>. The kernel uses __syncthreads() and threadIdx. On MI300X with HIP, the maximum workgroup size is 1024 but the LDS (shared memory) limit per CU is 64KB.'
question: 'How do you translate the CUDA launch to HIP on MI300X, and what occupancy issue does the 48 KB LDS allocation create?'
details:
  realistic_solution: |
    The kernel launch translates to hipLaunchKernelGGL(kernel, dim3(256), dim3(256), 48*1024, stream). __syncthreads() and threadIdx remain the same. However, with 48KB LDS out of 64KB total per CU, only 1 workgroup can be resident per CU. This means MI300X will have lower occupancy — consider reducing shared memory to 32KB to allow 2 workgroups per CU.
  common_mistake: |
    **The Pitfall:** Directly translating the CUDA launch to HIP without checking hardware-specific limits.
    **The Rationale:** Candidates assume that since the code compiles, the performance characteristics (like occupancy) will map 1:1.
    **The Consequence:** The 48KB LDS allocation severely restricts workgroup occupancy on CDNA3, leaving compute units drastically underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - CUDA launch: grid(256), block(256), 48KB shared memory.
    - MI300X limits: max workgroup size 1024, LDS limit 64KB per CU.

    **Calculations:**
    - MI300X: 64KB LDS per CU. 48KB allocation means 1 workgroup per CU (304 concurrent workgroups).
    - H100: 228KB shared memory per SM. 48KB allocation allows 4 blocks per SM (528 concurrent blocks).
    - Reducing LDS to 32KB on MI300X allows 2 workgroups per CU (608 concurrent workgroups).

    **Conclusion & Interpretation:**
    - **Result: Reducing shared memory to 32KB effectively doubles occupancy on the MI300X. (Memory-Bound Occupancy)**. Architecture-specific shared memory tuning is critical for HIP performance.
