title: The Equalized Odds Constraint
scenario: Your credit scoring model must satisfy 'equalized odds' across gender groups. A colleague says this just means the model should have the same accuracy for men and women.
question: Why is that description incomplete, and what does equalized odds actually require?
details:
  realistic_solution: |
    Equalized odds requires that the True Positive Rate (TPR) and the False Positive Rate (FPR) are equal across protected groups, conditioned on the true label. Equal accuracy can hide compensating errors: Group A might have high TPR but high FPR, while Group B has low TPR and low FPR — same accuracy, but Group A faces more false accusations while Group B is systematically denied. Equalized odds ensures that both the benefit of correct approval (TPR) and the harm of incorrect denial (FPR) are distributed equally. From a systems perspective, this means your evaluation pipeline must compute confusion matrices per subgroup, not just aggregate metrics.
  common_mistake: |
    **The Pitfall:** Conflating equalized odds with equal accuracy.
    **The Rationale:** It seems intuitive that if a model is equally accurate for all groups, it is treating them fairly.
    **The Consequence:** A model can have 90% accuracy for both groups but still systematically penalize one group with higher false positive or false negative rates, violating fairness requirements and potentially causing legal or reputational damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Both groups have 90% accuracy.
    - Men: TPR = 0.95, FPR = 0.15. Women: TPR = 0.80, FPR = 0.05.

    **Calculations:**
    - TPR difference = |0.95 - 0.80| = 0.15.
    - FPR difference = |0.15 - 0.05| = 0.10.

    **Conclusion & Interpretation:**
    - **Result: Disparity exists despite equal accuracy (Fairness-Bound)**. Equalized odds requires matching TPR and FPR to ensure harms and benefits are equitably distributed.
