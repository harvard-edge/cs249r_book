title: Real-time LLM Safety Guardrail Architecture
scenario: You are architecting a real-time safety guardrail system for a production LLM API. The pipeline requires passing all 1000-token input prompts and outputs through three specialized 1B-parameter safety classifiers (FP16) for PII, toxicity, and prompt injection. The main LLM runs on H100 GPUs. You have dedicated A100 instances connected via InfiniBand NDR available.
question: Would you co-locate the three 1B safety classifiers on H100s or deploy them on A100 microservices to meet a 40ms P99 latency budget?
details:
  realistic_solution: Deploying the safety classifiers on dedicated A100 instances as a separate microservice is the superior architecture. This isolates safety infrastructure from core generation and allows independent scaling. Crucially, while A100s are slower than H100s, their compute latency easily fits within the 40ms budget. By avoiding co-location, you prevent dedicating premium H100 HBM3 memory to static classifier weights, preserving that space for the main LLM's KV cache to maximize batch sizes and overall throughput.
  common_mistake: |
    **The Pitfall:** Reflexively co-locating models or choosing microservices without math.
    **The Rationale:** Candidates either guess A100s are too slow due to network overhead or co-locate to avoid network latency without calculating the impact on H100 KV cache capacity.
    **The Consequence:** Wasting expensive H100 HBM on static weights, drastically lowering the main LLM's throughput.
  napkin_math: |
    *   **Memory:** 3 classifiers × 1B params × 2 bytes/param = 6 GB total.
    *   **Compute per model:** 2 FLOPs/param × 10^9 params × 1000 tokens = 2 TFLOPs.
    *   **Compute time on A100:** 2 TFLOPs / 312 TFLOPS (FP16) = ~6.4 ms.
    *   **Sequential compute time:** 3 models × 6.4 ms = 19.2 ms.
    *   **Network & RPC overhead:** ~1 ms for InfiniBand NDR + ~2 ms RPC = ~3 ms.
    *   **Result:** Total latency on A100s is **~22.2 ms**, comfortably under the **40 ms** budget while saving precious H100 memory for the main model.
