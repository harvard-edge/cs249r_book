title: DP Diffusion for Private Medical X-Ray Synthesis
scenario: Your healthcare company wants to share a 100K image medical X-ray dataset with external researchers without exposing patient data. You propose training a DP generative model to create synthetic X-rays.
question: What epsilon provides useful synthetic data, and how do you validate that the synthetic images are both private and medically useful?
details:
  realistic_solution: Pre-train the diffusion model on public chest X-ray datasets. Fine-tune with DP-SGD (ε=8-10) on the private dataset. Validate utility by training a downstream classifier and testing against one trained on real data. Validate privacy via membership inference attacks.
  common_mistake: |
    **The Pitfall:** Training the diffusion model from scratch with a very low epsilon (e.g., ε=1) and expecting high-quality images.
    **The Rationale:** Candidates underestimate the massive noise injected by DP-SGD over hundreds of denoising steps.
    **The Consequence:** Producing completely unusable, blurry, or anatomically incorrect synthetic images that provide no utility.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset has 100K private X-ray images.
    - Synthetic data must be useful for downstream medical tasks and resistant to membership inference.
    - DP diffusion quality usually requires public pretraining plus private DP fine-tuning.

    **Calculations:**
    - ε≈1-2: strong privacy, but diffusion samples are likely too noisy or anatomically unreliable for research use.
    - ε≈8-10: weaker but common practical range for useful DP image synthesis when starting from a public pretrained model.
    - Utility validation: compare downstream classifier AUC/F1 trained on synthetic data against one trained on real data, using a held-out real test set.
    - Privacy validation: run membership inference and nearest-neighbor checks; reject models whose synthetic images closely reproduce private training images.
    - Release decision should use both thresholds, for example synthetic-trained classifier within an acceptable utility gap and membership attack near chance.

    **Conclusion & Interpretation:**
    - **Result: privacy-utility-bound.** Use ε around 8-10 only if validation shows useful clinical signal and no measurable memorization; lower ε may be private but not useful.
