title: 'The CISO vs. The CFO: Federated TCO'
scenario: 'You are the lead ML Systems Engineer at a major bank, tasked with developing
  a next-generation fraud detection model. Two proposals are on the table: a $650k
  centralized training run, or federated learning. Centralizing the data raises the
  probability of a $100M data breach from 1% to 5%.'
question: Using ALE, should the bank choose a $650k centralized 70B training run or
  federated learning if centralization raises $100M breach risk from 1% to 5%?
details:
  realistic_solution: The correct approach is to quantify the cost of risk using the
    Annualized Loss Expectancy (ALE) formula. While a $650k training bill is substantial,
    the change in annualized risk exposure is an order of magnitude larger. The TCO
    is dominated by the increased financial risk from centralizing sensitive data,
    making the federated learning approach, despite its complexities, far more attractive
    from a financial risk perspective.
  common_mistake: '**The Pitfall:** Focusing purely on tangible, immediate OpEx/CapEx
    while ignoring risk costs.

    **The Rationale:** Security risks are seen as abstract principles rather than
    quantifiable financial liabilities.

    **The Consequence:** Choosing the ''cheaper'' compute option while exposing the
    business to massively higher annualized losses.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Centralized training = $650k.

    - Risk of breach increases from 1% to 5%.

    - Breach cost = $100M.


    **Calculations:**

    - Change in ALE = (0.05 - 0.01) * $100M = $4M/year.

    - The $4M annual risk vasty outweighs the $650k compute cost.


    **Conclusion & Interpretation:**

    - **Result: $4M annual risk cost (Risk/Cost)**. Federated learning is the financially
    superior choice due to risk mitigation.

    '
  options:
  - The $650,000 cost per training run is the dominant factor, as frequent retraining
    could exceed millions per year.
  - The engineering cost of building and maintaining a complex Federated Learning
    pipeline will be the highest cost.
  - The $4M increase in Annualized Loss Expectancy from centralizing the data is the
    most significant financial factor.
  - The network egress cost to transfer petabytes of data from partner banks to the
    central cloud will be the largest one-time expense.
  correct_index: 2
