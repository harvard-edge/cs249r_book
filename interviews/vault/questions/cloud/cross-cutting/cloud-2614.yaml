title: TCO Drivers in Federated vs Centralized Training
scenario: You are comparing a federated learning deployment across 500 edge nodes with an equivalent centralized cloud training setup.
question: What are the key TCO differences between federated learning across 500 edge nodes and equivalent centralized cloud training?
details:
  realistic_solution: |
    Centralized TCO is dominated by paid cloud compute, raw-data ingestion, storage, and data-lake operations. Federated TCO shifts costs rather than eliminating them: training compute runs on edge devices, so it may not appear as cloud GPU spend, but it still consumes device energy, capacity, battery, maintenance budget, or customer-owned hardware. Federated can reduce raw-data transfer and centralized storage, but it adds aggregation infrastructure, WAN traffic for model updates, device coordination, monitoring, retries, privacy/security controls, and engineering work for non-IID convergence and stragglers.
  common_mistake: |
    **The Pitfall:** Only comparing direct compute costs.
    **The Rationale:** Candidates assume edge compute is "free" without factoring in the massive operational overhead.
    **The Consequence:** Drastically underestimating the engineering cost of debugging non-IID convergence, stragglers, and device management.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 edge nodes.
    - Centralized transfer: 1TB/day per node. Data transfer cost: $0.02/GB.
    - Federated transfer: 200MB/round per node.
    - For a like-for-like daily comparison, assume 10 federated rounds/day.

    **Calculations:**
    - Centralized raw-data transfer: 500 nodes * 1TB/day = 500TB/day = 500,000GB/day.
    - Centralized transfer cost: 500,000GB/day * $0.02/GB = $10,000/day.
    - Federated update traffic: 500 nodes * 200MB/round = 100GB/round.
    - Federated transfer cost: 100GB/round * $0.02/GB = $2/round.
    - At 10 rounds/day, federated transfer cost is $20/day, before aggregation servers, orchestration, monitoring, retries, security, and edge-device compute costs.

    **Conclusion & Interpretation:**
    - **Result: Cost Shift, Not Free Compute.** Federated learning can sharply reduce raw-data movement, but TCO must include edge compute opportunity cost, device management, aggregation infrastructure, reliability work, privacy/security controls, and engineering operations.
