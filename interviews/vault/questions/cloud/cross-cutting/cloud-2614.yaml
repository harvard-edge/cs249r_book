title: TCO Drivers in Federated vs Centralized Training
scenario: 'You are comparing a federated learning deployment across 500 edge nodes with an equivalent centralized cloud training setup.'
question: What are the key TCO differences between federated learning across 500 edge nodes and equivalent centralized cloud training?
details:
  realistic_solution: |
    Centralized TCO is dominated by compute (GPU hours) and storage (data lake). Federated TCO shifts costs: compute is free (edge devices train locally), but you pay for orchestration infrastructure, WAN bandwidth, and device management complexity. Federated avoids the massive data transfer cost of moving raw data to the cloud. However, federated requires more training rounds and engineering talent for debugging non-IID convergence and stragglers.
  common_mistake: |
    **The Pitfall:** Only comparing direct compute costs.
    **The Rationale:** Candidates assume edge compute is "free" without factoring in the massive operational overhead.
    **The Consequence:** Drastically underestimating the engineering cost of debugging non-IID convergence, stragglers, and device management.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 edge nodes.
    - Centralized transfer: 1TB/day per node. Data transfer cost: $0.02/GB.
    - Federated transfer: 200MB/round per node.

    **Calculations:**
    - Centralized storage transfer: 500 nodes * 1TB/day = 500TB/day. At $0.02/GB, cost is $10K/day.
    - Federated communication: 500 nodes * 200MB/round = 100GB/round. At $0.02/GB, cost is $2/round.

    **Conclusion & Interpretation:**
    - **Result: $10K vs $2 (Bandwidth-Bound)**. While federated learning saves $10K/day in data ingestion costs, it dramatically increases human engineering costs.
