title: The Spot Instance Training Economics
scenario: Your team needs 1,000 GPU-hours to fine-tune a model. On-demand H100 instances cost $3.00/GPU/hour. Spot instances cost $0.90/GPU/hour but have a 10% preemption rate per hour. Preemptions require rolling back to the last checkpoint (saving every 10 minutes) and restarting, adding roughly 15% overhead in total GPU-hours consumed.
question: Are spot instances worth the operational complexity for this 1,000 GPU-hour fine-tuning job?
details:
  realistic_solution: 'On-demand: 1,000 hrs * $3.00 = $3,000. Spot with overhead: 1,000 hrs * 1.15 (overhead) * $0.90 = $1,035. Net savings = $1,965 (65.5%). The 15% overhead comes from checkpoint-restart cycles: with 10% preemption rate and 10-min checkpoint intervals, you lose ~5 min of work per preemption plus restart overhead. Spot is clearly worth it for fault-tolerant training workloads. The key requirement is robust checkpointing infrastructure — without it, preemptions cause full restarts and savings evaporate.'
  common_mistake: |
    **The Pitfall:** Either blindly choosing spot for the discount without accounting for preemption overhead, or avoiding spot entirely because "it is unreliable."
    **The Rationale:** Engineers often make absolute judgments based on base price or operational fear rather than doing expected-value math.
    **The Consequence:** The team either blows the budget on on-demand instances or fails to deliver because preemptions ruin training without a robust checkpointing system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,000 GPU-hours required.
       - On-demand: $3.00/hr. Spot: $0.90/hr.
       - Spot overhead: 15% (due to 10% preemption and 10-min checkpoints).
    2. **Calculations:**
       - On-Demand Cost: 1,000 hrs * $3.00 = $3,000.
       - Spot GPU-hours: 1,000 hrs * 1.15 = 1,150 hrs.
       - Spot Cost: 1,150 hrs * $0.90 = $1,035.
       - Savings: $3,000 - $1,035 = $1,965 (65.5%).
       - Break-Even Overhead: ($3.00 / $0.90) - 1 = 233%.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound Optimization.** Spot instances save 65.5% and remain profitable up to a 3.3x time overhead.
