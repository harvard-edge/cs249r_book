title: Optimizing DP-SGD on a 16 GB Accelerator with Privacy Budget Constraints
scenario: Your team is training a sensitive recommendation model using DP-SGD on an accelerator with 16 GB of HBM. The model has 1 billion parameters (FP32). You've been allocated a privacy budget of ε=8 over 10 epochs. Each epoch uses a dataset of 10 million samples, with a batch size of 2048.
question: How would you calibrate the noise scale (σ) per step to meet the privacy budget while considering hardware constraints?
details:
  realistic_solution: Use TensorFlow Privacy, Opacus, or an equivalent accountant-backed DP-SGD implementation. Set δ from the policy, compute q=batch_size/N and the number of optimizer steps, then binary-search the noise multiplier σ with an RDP or moments accountant until ε≤8. Choose the clipping norm from observed per-example gradient norms. A 1B-parameter FP32 model already uses about 4 GB for weights, so 16 GB HBM requires memory-efficient per-example norm computation, activation checkpointing, small physical micro-batches, and accumulation of clipped sums rather than materializing full per-sample gradients.
  common_mistake: |
    **The Pitfall:** Overlooking the memory footprint of per-sample gradients required for DP clipping.
    **The Rationale:** Candidates correctly identify the noise mathematics but treat gradients as a single aggregated batch, forgetting that DP-SGD requires storing individual gradients for norm clipping.
    **The Consequence:** Designing an implementation that immediately OOMs the accelerator by attempting to materialize terabytes of per-sample gradients in 16 GB of HBM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B parameters (FP32), HBM = 16 GB.
    - Epochs = 10, Dataset = 10M samples, Batch = 2048.
    - ε = 8, δ = 1e-5.

    **Calculations:**
    - Total Steps (T) = 10 * (10,000,000 / 2048) = 48,828.
    - Sampling prob (q) = 2048 / 10,000,000 = 0.0002048.
    - Noise multiplier σ must be solved with an RDP/moments accountant using q, T, δ, target ε, sampling assumptions, and the accountant's neighboring-dataset definition.
    - This napkin calculation identifies q and T; it should not invent σ without running the accountant because the privacy bound depends on the exact DP-SGD accountant and sampling model.
    - Gradient Memory = 10^9 params * 4 bytes (FP32) = 4 GB.
    - Naively storing full per-sample gradients would be 2048 * 4 GB = about 8 TB, but efficient implementations compute norms and clipped aggregates without holding that tensor.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Calibrated and Memory-Bound**. σ should come from the privacy accountant, while the 16 GB HBM forces small physical micro-batches and memory-efficient clipping rather than full per-sample-gradient storage.
