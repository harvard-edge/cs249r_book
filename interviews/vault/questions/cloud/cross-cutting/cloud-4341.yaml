title: DP-SGD Epsilon Budget Exhaustion at Scale
scenario: You are training a 13B medical LLM with DP-SGD using a privacy budget of ε=2, δ=1e-5 over 100,000 training steps on 500K patient records with batch size 1,000. After 60,000 steps, your privacy accountant reports the budget will be exhausted before training completes.
question: What are your architectural options to extend the remaining budget, and what are the quantitative tradeoffs?
details:
  realistic_solution: 'Three valid approaches to extend the remaining budget: (1) Increase the noise multiplier σ. Under the same DP-SGD accountant and sampling regime, ε generally decreases as σ increases, though utility and convergence can suffer. (2) Decrease the batch size B only if the training plan is epoch-fixed or you also reduce total examples processed; lowering q helps privacy, but if you simply run many more steps the accountant must recompute the tradeoff. With Poisson sampling, B=1000 gives q=0.002; halving B to 500 gives q=0.001 and, for a fixed remaining epoch budget, roughly a √0.5 reduction in remaining privacy cost. (3) Switch to DP-LoRA or another parameter-efficient update so the run can converge in fewer private steps or tolerate more noise; the privacy accountant still depends on q, σ, clipping, δ, and steps, not directly on parameter count.'
  common_mistake: |
    **The Pitfall:** Assuming that decreasing the noise multiplier σ or increasing the batch size will save budget.
    **The Rationale:** Candidates fail to realize mathematically that total ε grows with q/σ. Increasing batch size (q) or decreasing noise (σ) accelerates budget exhaustion.
    **The Consequence:** Modifying hyperparameters in the wrong direction, causing the privacy budget to blow up instantly and ruining the training run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current state: σ=0.8, B=1000, q=1000/500K=0.002, T=100K planned steps.
    - Accounting regime: use the production RDP/moments accountant; the scaling below is a rule-of-thumb comparison for small q, not a replacement accountant.

    **Calculations:**
    - Sampling rate: q = 1000 / 500,000 = 0.002.
    - Option 1 (increase noise): rerun the accountant with σ=1.2. As a scaling estimate, privacy cost falls by about 0.8/1.2 = 0.67x for the same q and steps.
    - Option 2a (fixed remaining steps): B=500 gives q=0.001, so the remaining privacy cost falls roughly 0.5x, but the model sees half as many examples.
    - Option 2b (fixed remaining epochs): halving B doubles the remaining steps, so the small-q scaling is q * sqrt(T) -> 0.5 * sqrt(2) = 0.707x.
    - Option 3 (DP-LoRA): no automatic ε reduction from fewer parameters, but it may need fewer private steps or support larger σ for the same utility.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Driven Tradeoff (Privacy-Bound).** Increasing σ is the cleanest privacy lever; lowering batch size helps only under an explicit step/epoch plan; DP-LoRA helps by changing convergence, not by changing the DP formula directly.
