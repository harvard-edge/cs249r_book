title: DP-SGD Epsilon Budget Exhaustion at Scale
scenario: You are training a 13B medical LLM with DP-SGD using a privacy budget of ε=2, δ=1e-5 over 100,000 training steps on 500K patient records. After 60,000 steps, your privacy accountant reports the budget will be exhausted before training completes.
question: What are your architectural options to extend the remaining budget, and what are the quantitative tradeoffs?
details:
  realistic_solution: 'Three valid approaches to extend the remaining budget: (1) Increase the noise multiplier σ. Since ε ∝ 1/σ, higher noise drastically reduces per-step privacy cost, allowing training to complete, though it degrades model utility. (2) Decrease the batch size B (lowering sampling rate q). For a fixed number of remaining epochs E, the total ε scales as √(qE). Halving the batch size reduces the remaining privacy cost by a factor of √2, though it increases update variance. (3) Switch to DP-LoRA. Applying DP only to low-rank adapters (~20M params vs 13B) fundamentally changes the convergence dynamics. The vastly smaller parameter space tolerates a much higher σ or requires far fewer epochs to converge, protecting the budget.'
  common_mistake: |
    **The Pitfall:** Assuming that decreasing the noise multiplier σ or increasing the batch size will save budget.
    **The Rationale:** Candidates fail to realize mathematically that total ε grows with q/σ. Increasing batch size (q) or decreasing noise (σ) accelerates budget exhaustion.
    **The Consequence:** Modifying hyperparameters in the wrong direction, causing the privacy budget to blow up instantly and ruining the training run.
  napkin_math: |
    - Moments accountant approximation: ε ≈ (1/σ) * q * √(2T * ln(1/δ)).
    - Current state: σ=0.8, B=1000, q=1000/500K=0.002, T=100K steps.
    - ε ≈ (1/0.8) * 0.002 * √(200,000 * 11.5) ≈ 1.25 * 0.002 * 1516 ≈ 3.79 (Exceeds target ε=2).
    - Option 1 (Increase noise): If σ increases from 0.8 to 1.2, ε accumulation rate drops by (0.8/1.2) = 0.67x.
    - Option 2 (Decrease batch size): Halving batch size to B=500 (q=0.001) doubles remaining steps, but overall remaining ε scales by 0.5 * √2 ≈ 0.707x.
    - **Halving the batch size saves ~29% of the remaining budget, while increasing noise directly throttles the accumulation rate at the cost of utility.**
