title: Quantifying Feedback Loop Amplification
scenario: A predictive policing model initially assigns equal observed crime probability (1%) to 100 neighborhoods. In each retraining cycle, the top-10 most-patrolled neighborhoods receive a +20% observation-bias update, while the bottom-90 receive a -20% update. Assume three cycles and no true underlying crime-rate difference.
question: After 3 retraining cycles with +/- 20% observation-bias updates, what final observed crime rates does the model learn for the top-10 and bottom-90 neighborhoods, and what disparity results?
details:
  realistic_solution: 'Initial observed crime probability is uniform at 1% per neighborhood. For the top-10 neighborhoods, each biased retraining cycle multiplies the observed rate by 1.2: 1.0% × 1.2^3 = 1.73%, which is a 73% artificial increase over baseline. For the bottom-90 neighborhoods, each cycle multiplies the observed rate by 0.8: 1.0% × 0.8^3 = 0.51%, which is a 49% artificial suppression below baseline. The final top-to-bottom predicted disparity is 1.73% / 0.51% ≈ 3.4x. This disparity comes from observation bias, not actual crime differences.'
  common_mistake: |
    **The Pitfall:** Assuming the model is correctly "learning real patterns."
    **The Rationale:** Candidates confuse ground-truth reality with the data generated by the model's own actions (observation bias).
    **The Consequence:** Deploying runaway feedback loops that artificially amplify disparities and manufacture false correlations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial observed crime probability is 1.0% per neighborhood.
    - Top-10 over-patrolled areas are observed at 1.2x baseline each cycle.
    - Bottom-90 under-patrolled areas are observed at 0.8x baseline each cycle.

    **Calculations:**
    - Top 10 (3 Cycles): 1.0% * 1.2^3 = 1.0 * 1.728 ≈ 1.73% (73% artificial amplification).
    - Bottom 90 (3 Cycles): 1.0% * 0.8^3 = 1.0 * 0.512 ≈ 0.51% (49% artificial suppression).
    - Disparity ratio: 1.73% / 0.51% ≈ 3.4x.

    **Conclusion:** The model now "believes" top neighborhoods have 3.4x more crime, entirely from observation bias.
