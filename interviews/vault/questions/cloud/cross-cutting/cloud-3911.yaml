title: MLIR as a Universal Compiler IR for ML Portability
scenario: 'Google''s MLIR framework is used by both XLA and IREE. A colleague claims MLIR will magically solve portability, allowing zero-cost deployment to 3 new custom AI chips.'
question: 'How many engineers are required to support the 3 new hardware targets using MLIR, assuming 2 engineers maintain shared MLIR infrastructure?'
details:
  realistic_solution: 'MLIR is a compiler infrastructure, not a portable runtime like JVM. It provides reusable intermediate representations (dialects) and optimization passes, but you still must write target-specific backends for each new chip. With 2 shared infrastructure engineers and 1 target-specific engineer per chip (3 total), the required staffing is 5 engineers.'
  common_mistake: |
    **The Pitfall:** Treating MLIR as a write-once-run-anywhere binary format like JVM.
    **The Rationale:** Candidates misunderstand what an Intermediate Representation (IR) does and assume 0 headcount is needed for new targets.
    **The Consequence:** Grossly understaffing hardware deployment projects and missing critical deadlines because target-specific backend work is ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 custom hardware targets.
    - Traditional compiler: 3 engineers per target.
    - MLIR compiler: 2 shared infrastructure engineers + 1 backend engineer per target.

    **Calculations:**
    - Traditional staffing: 3 targets * 3 = 9 engineers.
    - MLIR staffing: 2 shared + (3 targets * 1) = 5 engineers.

    **Conclusion & Interpretation:**
    - **Result: MLIR reduces staffing from 9 to 5 engineers (Resource-Bound)**.
