title: Heterogeneous H100 and Spot V100 Training Scheduler
scenario: Architect a FinOps-aware scheduling platform for training a 100B parameter model. You have a mixed fleet of reserved on-demand H100s and highly volatile spot V100s.
question: How would you schedule 100B training across reserved H100s and volatile spot V100s to reduce cost while guaranteeing progress?
details:
  realistic_solution: |
    Keep guaranteed progress on a stable reserved-H100 training core that owns the synchronous optimizer step, checkpoint cadence, and global step clock. Treat spot V100s as opportunistic auxiliary capacity rather than members of the critical path: assign them preemptible work such as extra data-parallel gradient accumulation with strict staleness bounds, auxiliary distillation batches, evaluation, data preprocessing, or low-priority adapter updates that are accepted only when they arrive before the H100 step cutoff. Isolate V100 failures with short leases and idempotent work units, and never let a spot V100 join the H100 all-reduce ring for the mandatory update.
  common_mistake: |
    **The Pitfall:** Putting volatile spot V100s and reserved H100s into a single synchronous training pipeline or Ring All-Reduce.
    **The Rationale:** Candidates attempt to treat a highly heterogeneous and unstable fleet like a clean, homogeneous supercomputer.
    **The Consequence:** The 989 TFLOPS H100s spend all their time waiting on the much slower 125 TFLOPS V100s, crippling the primary cluster's throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 100B parameters, about 200 GB FP16 weights before optimizer state.
       - H100s: reserved, stable, and used for the synchronous training step.
       - V100s: spot, volatile, slower, and used only for work that can be dropped or bounded by a cutoff.
       - Example policy: accept auxiliary V100 gradients only if they are computed from the current checkpoint and arrive before the next H100 optimizer step.
    2. **Calculations:**
       - A V100 has 32 GB of memory, so it cannot host a 100B FP16 replica or optimizer state; using it in the main synchronous shard would require additional tensor/pipeline sharding and would expose the H100 step to spot failures.
       - If the H100 core step takes T seconds, the scheduler commits progress every T seconds regardless of V100 availability.
       - A V100 auxiliary result is useful only when its age is <= 1 checkpoint interval and it arrives before the cutoff; otherwise it is discarded without delaying the H100 optimizer.
    3. **Conclusion & Interpretation:**
       - **Result: Guaranteed Progress on the H100 Core.** Spot V100s reduce cost only through decoupled, failure-tolerant work; they do not determine the critical-path training step.
