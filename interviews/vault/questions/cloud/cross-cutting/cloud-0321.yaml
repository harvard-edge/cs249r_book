title: The Maintenance Tax
scenario: >-
  You're building a Total Cost of Ownership (TCO) model for a new AI training cluster.
question: >-
  What is the industry-standard rule of thumb you should use to estimate the annual hardware maintenance costs, as a percentage of the initial capital expenditure (CapEx)?
details:
  realistic_solution: 'The correct rule of thumb is ~5% of CapEx per year. This figure covers service contracts (like NVIDIA AI Enterprise), a buffer for component failures (MTTF), and the operational overhead of keeping the hardware running.'
  common_mistake: |
    **The Pitfall:** Dramatically underestimating hardware maintenance overhead.
    **The Rationale:** Software-background engineers forget that physical components (GPUs, NICs, PSUs) fail and require service contracts, spare parts, and technician time.
    **The Consequence:** Creating wildly optimistic TCO models that lead to severe budget shortfalls in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Industry standard annual maintenance is ~5% of initial CapEx.
    - Single H100 GPU costs approximately $30,000.
    - Cluster scale is 1,000 GPUs ($30M CapEx).

    **Calculations:**
    - Maintenance per GPU = $30,000 × 0.05 = $1,500/year.
    - Total maintenance budget = 1,000 × $1,500 = $1.5M/year.

    **Conclusion & Interpretation:**
    - **Result: $1.5M per year (Cost-Bound)**. Underestimating the recurring operational expense of hardware maintenance drastically skews cluster TCO models.
  options:
  - 0.5%
  - 5%
  - 25%
  - 50%
  correct_index: 1
