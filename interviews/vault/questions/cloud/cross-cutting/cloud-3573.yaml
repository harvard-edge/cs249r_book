title: 'DP-SGD Misconfiguration on AMD MI300X: Utility Drop & Rapid Privacy Budget Consumption Diagnosis'
scenario: 'Your team is deploying a large language model (LLM) for a sensitive medical application. To comply with strict patient privacy regulations, you''ve implemented DP-SGD. Initial evaluations show that despite setting a seemingly generous privacy budget (epsilon=8), the model''s utility has dropped significantly by over 15% compared to the non-private baseline. Simultaneously, monitoring indicates that the privacy budget is being consumed much faster than anticipated during training epochs.'
question: What root causes would you investigate for a 15% utility drop and rapid epsilon consumption in DP-SGD?
details:
  realistic_solution: 'First, thoroughly review the gradient clipping mechanism: ensure the clipping norm is appropriate for the gradient distribution of the LLM without excessively truncating informative gradients. Next, re-calibrate the noise scale, potentially exploring per-layer or adaptive noise injection strategies that consider the unique precision capabilities. Most critically, verify the privacy accountant''s configuration, especially how it handles the effective batch size and number of updates. If micro-batching is used, ensure ''q'' reflects the true sampling rate. Also, investigate if an overly aggressive learning rate or an excessive number of training steps for the current dataset size is leading to rapid budget consumption, or if the chosen privacy accountant (e.g., RDP vs. composition theorem) is appropriate for the training regime. Consider warm-starting the DP-SGD training with a non-private pre-trained model to mitigate the early utility drop.'
  common_mistake: |
    **The Pitfall:** Misconfiguring the privacy accountant or noise scale relative to the gradient clipping norm.
    **The Rationale:** If the noise scale is too high for the clipping norm, the signal-to-noise ratio plummets. If the privacy accountant incorrectly uses the global sampling probability for micro-batches, it overestimates privacy loss.
    **The Consequence:** Ruining model utility while prematurely exhausting the privacy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 10,000,000 samples. Global batch size: 8192.
    - Training steps per epoch (T): 1220.
    - Micro-batch update steps (T_effective): 156,160.

    **Calculations:**
    - Global sampling probability (q): 8192 / 10,000,000 = 0.0008192.
    - Standard epsilon loss scales with sqrt(T): sqrt(1220).
    - Erroneous epsilon loss with micro-batching scales with sqrt(T_effective): sqrt(156,160).
    - Budget consumption amplification: sqrt(156160) / sqrt(1220) ≈ sqrt(128) ≈ 11.3x.
    - If noise scale (sigma) = 2.0 and clipping norm (C) = 0.1, noise variance (4.0) entirely swamps the true gradient signal.

    **Conclusion & Interpretation:**
    - **Result: 11.3x Budget Drain (Compute-Bound)**. Misconfiguring the privacy accountant to step per micro-batch falsely amplifies the privacy loss, while high noise on aggressively clipped gradients destroys model utility.
