title: 'DP-SGD Deployment on AMD MI300X: Budgeting Epsilon and Performance Impact'
scenario: Your team is deploying a large language model (LLM) fine-tuning service for a highly sensitive medical dataset. You must implement Differential Privacy Stochastic Gradient Descent (DP-SGD) during training. The model has 70B parameters, and you use a micro-batch size of 16. You need to achieve an overall privacy budget of ε=8 with δ=1e-5 over 10 epochs.
question: How would you configure DP-SGD for the 70B LLM to meet epsilon=8, delta=1e-5 over 10 epochs while preserving throughput and quality?
details:
  realistic_solution: Treat full-model DP-SGD for a 70B model as the fallback, not the default. Prefer DP-LoRA or another adapter method so clipping and noise apply to a much smaller trainable parameter set. Choose the clipping norm C from per-example norm statistics, pick the effective logical DP batch size, compute the number of logical steps over 10 epochs, and binary-search σ with an RDP or moments accountant until ε≤8 at δ=1e-5 under Poisson/subsampled-batch accounting or an equivalent accountant-supported sampling scheme. Use Gaussian noise with standard deviation σC on the clipped average. To preserve throughput on MI300X, run physical micro-batches of 16 and accumulate clipped sums into one logical DP batch, using per-layer or ghost clipping, activation checkpointing, sharding/offload where needed, and monitor ε, clipping fraction, validation quality, and throughput together.
  common_mistake: |
    **The Pitfall:** Overlooking the massive computational and memory overhead of per-sample gradient clipping.
    **The Rationale:** Engineers unfamiliar with DP-SGD assume it operates similarly to standard SGD, without realizing that gradients must be instantiated *per sample* before averaging.
    **The Consequence:** The training job immediately triggers an Out-Of-Memory error, or grinds to a halt due to the extreme overhead of managing and clipping un-aggregated gradients.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter model in FP16/BF16 is about 140 GB for weights alone.
    - Hardware limit: 192 GB HBM3 per MI300X.
    - Target privacy: ε=8, δ=1e-5 over 10 epochs.

    **Calculations:**
    - Full fine-tuning also needs gradients, optimizer state, activations, and communication buffers, so a single unsharded accelerator cannot hold a normal full-training footprint.
    - Naively materializing per-sample full-model gradients for micro-batch 16 would be infeasible, but that is not the required implementation model.
    - DP accounting inputs are sampling rate q=logical_batch_size/N, logical step count T=10N/logical_batch_size, δ=1e-5, and target ε=8, using Poisson/subsampled batches or an equivalent accountant-supported sampling scheme.
    - The scenario's micro-batch size of 16 is a physical execution batch; accumulate multiple clipped micro-batches into the logical DP batch used by the accountant.
    - Use an RDP/moments accountant to choose σ; memory tactics such as ghost clipping change throughput and feasibility, not the privacy accountant inputs.
    - With DP-LoRA, the trainable parameter and per-example clipping state can be orders of magnitude smaller than full-model DP-SGD.

    **Conclusion & Interpretation:**
    - **Result: DP-LoRA or Sharded Full DP-SGD Required.** The privacy budget is met by accountant-calibrated C and σ, while throughput and quality depend on reducing trainable state, using memory-efficient clipping, and accumulating clipped sums into logical DP batches.
