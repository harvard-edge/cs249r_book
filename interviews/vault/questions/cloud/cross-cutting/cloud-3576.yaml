title: 'DP-SGD Deployment on AMD MI300X: Budgeting Epsilon and Performance Impact'
scenario: Your team is deploying a large language model (LLM) fine-tuning service for a highly sensitive medical dataset. You must implement Differential Privacy Stochastic Gradient Descent (DP-SGD) during training. The model has 70B parameters, and you use a micro-batch size of 16. You need to achieve an overall privacy budget of ε=8 with δ=1e-5 over 10 epochs.
question: How would you configure DP-SGD for the 70B LLM to meet epsilon=8, delta=1e-5 over 10 epochs while preserving throughput and quality?
details:
  realistic_solution: To address the memory and compute limits, use a gradient clipping strategy that can be efficiently implemented (e.g., Ghost Clipping). Carefully select the noise scale based on the desired ε, δ, and the number of training steps (epochs * data_size / effective_batch_size). Leverage FP16 sparse compute for optimized training, potentially using mixed-precision training. The massive memory bandwidth is crucial for frequent data movement during micro-batch processing. Optimize custom kernels for gradient clipping and noise addition where possible to maximize throughput. Utilize libraries like Opacus or Hugging Face's PEFT with DP-SGD support, ensuring their implementation is hardware-aware.
  common_mistake: |
    **The Pitfall:** Overlooking the massive computational and memory overhead of per-sample gradient clipping.
    **The Rationale:** Engineers unfamiliar with DP-SGD assume it operates similarly to standard SGD, without realizing that gradients must be instantiated *per sample* before averaging.
    **The Consequence:** The training job immediately triggers an Out-Of-Memory error, or grinds to a halt due to the extreme overhead of managing and clipping un-aggregated gradients.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model in FP16 (140 GB).
       - Micro-batch size: 16.
       - Hardware limit: 192 GB HBM3.
    2. **Calculations:**
       - Standard Memory: 140 GB weights + 140 GB gradients = 280 GB (already exceeds 192 GB limit).
       - DP-SGD Memory: Per-sample clipping requires instantiating gradients for each of the 16 items simultaneously.
       - Memory footprint scales to: 140 GB × 16 = 2,240 GB of transient memory required.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound.** DP-SGD requires 2,240 GB, vastly exceeding the 192 GB hardware. Extreme optimization like Ghost Clipping or LoRA adapters is strictly required.
