title: The TCO of Privacy
scenario: 'You are on a team building a new smart keyboard app for 10 million daily users. To improve autocorrect, each user generates about 1MB of training data per day. The team is debating two architectures: centralized cloud training versus federated learning. Assume cloud data transfer costs $0.02/GB.'
question: 'What annual data-transfer cost would centralizing 10M users'' 1MB/day create, and how much would FL avoid?'
details:
  realistic_solution: 'Calculate the total inbound data volume and extrapolate to an annual run rate. Centralized ingestion of edge telemetry incurs massive network transfer fees. Federated Learning (FL) avoids these raw data ingress costs by sending only model weight updates, significantly reducing the Total Cost of Ownership (TCO) for network infrastructure, easily justifying the initial R&D investment for edge training.'
  common_mistake: |
    **The Pitfall:** Focusing only on compute costs and ignoring data movement.
    **The Rationale:** Engineers often tunnel-vision on training cluster pricing, viewing data ingestion as a free or trivial prerequisite.
    **The Consequence:** They drastically underestimate the Total Cost of Ownership (TCO), missing the massive daily egress/ingress fees that federated learning fundamentally avoids.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M users generating 1 MB/day.
    - Ingress cost: $0.02/GB.
    - 1 year = 365 days.

    **Calculations:**
    - Daily data: 10,000,000 * 1 MB = 10,000,000 MB/day = 10,000 GB/day.
    - Annual data: 10,000 GB/day * 365 = 3,650,000 GB/year.
    - Annual cost: 3,650,000 GB * $0.02/GB = $73,000/year.

    **Conclusion & Interpretation:**
    - **Result: $73,000/year (Network-Bandwidth-Bound)**. FL avoids $73,000/year in raw data network transfer fees.
  options:
  - '$71 per year'
  - '$200 per year'
  - '$73,000 per year'
  - '$584,000 per year'
