title: 'The Hospital AI Rollout: Centralized vs. Federated TCO'
scenario: You are advising a consortium of 500 hospitals on training a new diagnostic AI model. They need to refresh the model annually with 10 TB of imaging data from each hospital, retaining only the latest annual centralized copy for training.
question: Over 3 years, which strategy is more economical for 500 hospitals refreshing 10 TB each annually, centralized or federated training?
details:
  realistic_solution: |
    The correct approach is to calculate the 3-year TCO for both options using the rolling 5 PB centralized data footprint. Centralized training pays a recurring storage charge for the latest retained 5 PB each year, annual GPU-cluster costs, and a one-time ingress charge. Federated learning pays the explicit 500-node cap-ex: 500 * $2.9K = $1.45M. Federated is significantly more economical over 3 years: about $1.45M versus about $5.2M for centralized training.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the visible compute costs ($500k for the GPU cluster) and ignoring the 'hidden' costs of data movement.
    **The Rationale:** Data ingress, egress, and storage can easily dominate TCO at scale. Furthermore, avoiding large upfront CapEx for federated learning is a mistake if not properly amortized over the project's lifetime.
    **The Consequence:** Choosing a centralized architecture that incurs massive, unexpected cloud storage and bandwidth bills.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 hospitals, 10 TB each, refreshed annually.
    - Centralized storage keeps a rolling latest annual copy: 500 * 10 TB = 5 PB retained continuously, not 15 PB of history.
    - Centralized: $500k compute/yr. Storage @ $0.02/GB/mo. One-time ingress: $100k.
    - Federated: $2.9k per node cap-ex.

    **Calculations:**
    - Centralized storage per year = 5,000,000 GB * $0.02/GB/mo * 12 months = $1.2M/year.
    - Year 1 centralized = $500k compute + $1.2M storage + $100k ingress = $1.8M.
    - Years 2-3 centralized = 2 * ($500k compute + $1.2M storage) = $3.4M.
    - Centralized 3-year TCO = $1.8M + $3.4M = $5.2M.
    - Federated 3-year TCO = 500 nodes * $2.9k = $1.45M.

    **Conclusion & Interpretation:**
    - **Result: Federated Architecture is More Economical**. Federated TCO ($1.45M) is significantly lower than centralized ($5.2M) because it avoids recurring cloud storage and annual centralized compute costs.
  options:
    - Centralized is cheaper. The 3-year TCO is $1.5M ($500k/yr * 3) vs. Federated's $1.45M, because data costs are negligible.
    - Federated is cheaper. The 3-year TCO is ~$1.45M compared to the Centralized TCO of >$4.0M.
    - Centralized is cheaper. The 3-year TCO is $1.6M ($500k compute + $100k ingress) vs. Federated's $1.45M, ignoring storage costs.
    - Federated is cheaper, but only because it avoids the $3.6M recurring storage charge for the retained 5 PB centralized copy.
