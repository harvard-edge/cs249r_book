title: 'The Hospital AI Rollout: Centralized vs. Federated TCO'
scenario: You are advising a consortium of 500 hospitals on training a new diagnostic AI model. They need to refresh the model annually with 10 TB of imaging data from each hospital.
question: Over 3 years, which strategy is more economical for 500 hospitals refreshing 10 TB each annually, centralized or federated training?
details:
  realistic_solution: The correct approach is to calculate the 3-year TCO for both options. The Federated Learning approach is significantly more economical.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the visible compute costs ($500k for the GPU cluster) and ignoring the 'hidden' costs of data movement.
    **The Rationale:** Data ingress, egress, and storage can easily dominate TCO at scale. Furthermore, avoiding large upfront CapEx for federated learning is a mistake if not properly amortized over the project's lifetime.
    **The Consequence:** Choosing a centralized architecture that incurs massive, unexpected cloud storage and bandwidth bills.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 hospitals, 10 TB each.
       - Centralized: $500k compute/yr. Storage @ $0.02/GB/mo.
       - Federated: $2.9k per node cap-ex.
    2. **Calculations:**
       - Centralized data = 500 * 10 TB = 5,000 TB = 5 PB.
       - Centralized Storage Cost = 5 PB * $0.02/GB/mo * 12 mos = $1.2M/yr. Over 3 years = $3.6M.
       - Centralized 3-year = $500k + $100k (ingress) + $3.6M = $4.2M.
       - Federated 3-year = 500 nodes * $2.9k = $1.45M.
    3. **Conclusion & Interpretation:**
       - Federated TCO is significantly lower due to avoiding centralized storage and ingress costs.
       - **Result: Federated Architecture is More Economical**
  options:
  - Centralized is cheaper. The 3-year TCO is $1.5M ($500k/yr * 3) vs. Federated's $1.45M, because data costs are negligible.
  - Federated is cheaper. The 3-year TCO is ~$1.45M compared to the Centralized TCO of >$4.0M.
  - Centralized is cheaper. The 3-year TCO is $1.6M ($500k compute + $100k ingress) vs. Federated's $1.45M, ignoring storage costs.
  - Federated is cheaper, but only because it avoids the $3.6M ingress fee (10 TB * 500 * 3 years * $0.02/GB).
  correct_index: 1
