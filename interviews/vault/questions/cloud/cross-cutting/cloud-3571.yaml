title: Designing a DP-SGD System with NVIDIA H100 for Federated Learning
scenario: You are tasked with designing a federated learning system for a highly sensitive medical dataset. The system must use Differential Privacy with DP-SGD to train a large language model. The target hardware for each client and the central server is an NVIDIA H100 GPU (80 GB HBM3).
question: How would you design the federated DP-SGD architecture on H100s, including epsilon accounting, noise calibration, batch sizing, and privacy monitoring?
details:
  realistic_solution: A robust solution involves dynamic privacy budget allocation and adaptive noise calibration. Implement a privacy accountant (e.g., moments accountant) to track epsilon accurately across multiple training rounds. Leverage the H100's FP16 capabilities for model training and gradient computations to maximize throughput, while carefully selecting batch sizes and model architectures that fit within the 80GB HBM3. For noise calibration, consider methods that adapt noise based on gradient norms and the chosen privacy mechanism (e.g., Gaussian mechanism) to balance privacy and utility. Utilize secure aggregation protocols to combine gradients from clients while minimizing privacy leakage and communication overhead. Architect the system with a clear separation of concerns for privacy mechanism implementation, training orchestration, and model deployment, using distributed frameworks optimized for GPU communication. Implement continuous monitoring of privacy metrics and model
    utility to inform adjustments.
  common_mistake: |
    **The Pitfall:** Ignoring the massive memory inflation caused by DP-SGD's per-sample gradients.
    **The Rationale:** Candidates are used to standard SGD, which accumulates gradients across the batch, requiring only one gradient tensor in memory.
    **The Consequence:** Without ghost clipping or memory-efficient libraries (like Opacus), the system hits an Out-Of-Memory (OOM) error immediately because the per-sample gradients multiply memory usage by the batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Parameters: 7B
    - Precision: FP16 (2 bytes/parameter)
    - GPU Memory: 80 GB (H100)

    **Calculations:**
    - FP16 parameter tensor size = 7B * 2 bytes = 14 GB.
    - Training also needs gradients, activations, optimizer state, communication buffers, and framework workspace; optimizer state can dominate if full fine-tuning uses Adam-like state.
    - A naive per-sample-gradient tensor would add about B * 14 GB, so it is infeasible for normal batches, but modern DP libraries avoid holding that full tensor by computing per-example norms and clipped sums layer-by-layer or with ghost clipping.
    - The practical batch limit therefore depends on sequence length, activation checkpointing, optimizer choice, sharding, and the DP implementation, not on 80 GB / 14 GB alone.

    **Conclusion & Interpretation:**
    - **Result: Implementation-Dependent Batch Size (Memory-Bound)**. Full per-sample-gradient materialization is not viable, but an H100 system can use ghost clipping, sharding, micro-batching, and accumulation to reach a larger effective DP batch than the naive B<5 estimate.
