title: The Fairness Monitoring Compute Budget
scenario: Your content recommendation system serves 100M daily active users across 8 demographic groups. Compliance requires computing equalized odds metrics every hour. Each fairness evaluation requires joining prediction logs with outcome labels (clicks within 30 minutes) and computing per-group confusion matrices.
question: For 100M DAU and 8 demographic groups, what hourly volume, 30-day audit storage, and compute cost does fairness monitoring require?
details:
  realistic_solution: |
    The system produces 2B recommendation predictions per day, or about 83.3M prediction records per hour. At 200 bytes per prediction/outcome audit record, retaining 30 days requires about 12 TB of decimal storage. A transparent napkin budget is roughly $276/month for object storage plus about $46/month for hourly fairness aggregation compute, so the total monitoring overhead is about $322/month before engineering and orchestration overhead.
  common_mistake: |
    **The Pitfall:** Treating fairness monitoring as a lightweight cron-job task or a simple dashboard view.
    **The Rationale:** Engineers routinely underestimate the computational cost of stateful temporal joins required to match asynchronous predictions with delayed outcomes.
    **The Consequence:** The observability pipeline catastrophically fails to scale, silently drops telemetry, and generates unbudgeted, massive cloud infrastructure bills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 100M DAU * 20 recommendations = 2B predictions/day (83.3M/hour).
    - Log Payload: 200 bytes per record.
    - Audit Window: 30 days.
    - Storage cost: $0.023/decimal GB-month.
    - Compute worker: one hourly aggregation job using 2 vCPU-hours at $0.0316/vCPU-hour.

    **Calculations:**
    - Hourly volume: 2B / 24 = 83.3M records/hour.
    - Hourly storage written: 83.3M * 200 bytes = 16.7 GB/hour.
    - 30-day audit storage: 16.7 GB/hour * 24 * 30 = 12,000 GB = 12 TB.
    - Storage OpEx: 12,000 GB * $0.023 = $276/month.
    - Compute OpEx: 24 jobs/day * 30 days * 2 vCPU-hours/job * $0.0316 = ~$45.50/month.
    - Total estimated OpEx: $276 + $45.50 = ~$322/month.

    **Conclusion & Interpretation:**
    - **Result: 83.3M records/hour, 12 TB retained, ~$322/month baseline OpEx**. The hard part is not the raw bill alone; it is reliably joining delayed labels and preserving complete auditability at this volume.
