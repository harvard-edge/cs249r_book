title: Responsible AI Framework for a 175B Financial LLM
scenario: Your team is deploying a 175B-parameter Large Language Model (LLM) on an accelerator for a highly sensitive financial advisory service. Initial red-teaming efforts have revealed instances where the model exhibits biases against certain demographic groups.
question: How would you design a Responsible AI governance framework for the biased 175B financial LLM?
details:
  realistic_solution: |
    Build the framework around ownership, controls, evidence, and escalation. Assign accountable owners for model risk, legal/compliance, product, security, and Responsible AI review. Require an AI impact assessment before launch, model cards with intended use and known limitations, demographic performance reports, red-team findings, and documented approval gates for release and major prompt/model changes. Operate guardrails for input policy, output moderation, fairness-sensitive refusal/escalation, human review for high-impact advice, and audit logging. Monitor production for bias drift, complaint patterns, subgroup quality metrics, override rates, and guardrail failures; define review cadences, severity levels, rollback criteria, and incident response paths. Independent audit and periodic model-risk committee review should verify that mitigations remain effective across the model lifecycle.
  common_mistake: |
    **The Pitfall:** Focusing solely on model-level technical fixes without considering the broader organizational, process, and lifecycle aspects of Responsible AI.
    **The Rationale:** Candidates might overlook the need for robust impact assessments, continuous monitoring, and clear accountability structures.
    **The Consequence:** The organization may ship a technically improved model without durable ownership, audit evidence, escalation paths, or lifecycle controls for high-impact financial advice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Production governance reviews occur monthly.
    - Red-team and monitoring reports cover 20 protected or high-risk customer slices.
    - Each slice needs sign-off from Responsible AI, product risk, and compliance owners.
    - Any slice breaching thresholds requires remediation before release or continued serving.

    **Calculations:**
    - Required control attestations per review = 20 slices * 3 owners = 60 sign-offs.
    - If 4 slices breach fairness or complaint thresholds, remediation workload applies to 4 / 20 = 20% of monitored slices.
    - Release readiness should require zero unresolved high-severity breaches, signed exceptions for lower-severity gaps, and audit logs linking each decision to evidence.
    - Serving capacity still matters operationally, but it is supporting evidence for monitoring coverage, not the core governance calculation.

    **Conclusion & Interpretation:**
    - **Result: governance is control- and evidence-bound.** A publishable framework defines owners, review cadence, slice-level evidence, escalation thresholds, and auditability; accelerator capacity is secondary to proving the controls run reliably.
