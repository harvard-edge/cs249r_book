title: 'Ethical LLM Deployment on H100s: Performance vs. Responsible AI'
scenario: Your team is deploying a large-scale generative AI model for critical customer support interactions. It needs to process 10,000 requests per second with a p99 latency target of 200ms.
question: How would you integrate guardrails, model cards, and impact assessments while meeting 10,000 RPS and 200 ms p99?
details:
  realistic_solution: Design a multi-layered guardrail system with fast synchronous checks for the 200 ms p99 path and asynchronous deeper review for logging, audits, and impact assessment. Keep model cards version-controlled with model, prompt, policy, and known-limit metadata. Run safety classifiers on dedicated capacity sized from measured throughput rather than a fixed GPU count, with batching limits, backpressure, fallback policies, and telemetry for latency, false positives, false negatives, and subgroup outcomes.
  common_mistake: |
    **The Pitfall:** Focusing solely on the base model and ignoring the system architecture for guardrails and logging.
    **The Rationale:** Engineers often treat guardrails as simple API calls without architecting asynchronous processing or dedicated (even if small) GPU pools.
    **The Consequence:** Running guardrails synchronously on the main generation GPUs causes latency regressions that breach the strict 200ms p99 SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference takes 100ms per request -> ~10 QPS per GPU.
    - 1B param safety classifier requires ~2 GFLOPS/token.
    - Checking 100 tokens = 200 GFLOPS/request.

    **Calculations:**
    - Base GPUs: 10,000 / 10 = 1,000 GPUs.
    - Guardrail compute: 10,000 req/s * 200 GFLOP/request = 2,000,000 GFLOP/s.
    - 2,000,000 GFLOP/s = 2,000 TFLOP/s = 2 PFLOP/s sustained.
    - If the classifier actually sustains 500 TFLOP/s per H100 after batching and overhead, the lower bound is 2,000 / 500 = 4 H100s.
    - Real sizing should add headroom for p99 latency, small-batch inefficiency, tokenization, policy logic, retries, and regional redundancy, so provision more than the arithmetic lower bound.
    - Total GPUs: 1,000 + 4 = 1,004 GPUs.
    - Data Logging: 10,000 QPS * 1 KB = 10 MB/s = ~25 TB/month.

    **Conclusion & Interpretation:**
    - **Result: At Least 4 H100s for the Classifier Under Optimistic Assumptions.** The unit conversion supports a 4-GPU lower bound, but production guardrails need measured throughput and latency headroom before calling the overhead negligible.
