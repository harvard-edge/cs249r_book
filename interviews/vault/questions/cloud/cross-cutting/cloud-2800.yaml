title: Serverless 7B Inference with A100 PCIe Weight Offload
scenario: Design a serverless inference architecture for highly sparse, bursty LLM (7B) workloads.
question: How would you design serverless 7B LLM inference on idle A100s with low cold-starts using PCIe Gen4 weight offload?
details:
  realistic_solution: 'Architect a host-memory model zoo. Keep the weights of dozens of 7B models in the host CPU RAM of an A100 node. The A100 runs a generic execution engine. When a bursty request arrives for Model X, stream the weights dynamically from host RAM to A100 VRAM via PCIe Gen4. Pipeline the weight transfer with layer-by-layer execution: as Layer 1 computes, stream Layer 2 over PCIe. This zero-copy execution model allows one A100 to multiplex hundreds of low-traffic models without OOMing.'
  common_mistake: |
    **The Pitfall:** Loading and unloading entire models synchronously into VRAM on every request.
    **The Rationale:** Standard inference engines load the whole model before processing.
    **The Consequence:** Creating massive cold-start latencies (0.43s+) and stalling the GPU, rendering the serverless architecture too slow for interactive use.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 7B parameters in FP16 = 14 GB.
    - PCIe Gen4 Bandwidth: 32 GB/s.
    - Host Capacity: A 1TB Host RAM server can store ~70 different 7B models concurrently.

    **Calculations:**
    - Full Transfer Time: 14 GB / 32 GB/s = 0.43s.
    - First-Layer Transfer: Assuming 32 roughly equal transformer layers, one layer is about 14 GB / 32 ≈ 0.44 GB and takes 0.44 GB / 32 GB/s ≈ 14 ms to transfer.
    - Full Warmup: All weights still require about 0.43 s of PCIe traffic. Layer-by-layer pipelining can start compute after the first layer is present and overlap later layer transfers, but only if the compute time per layer is at least comparable to the next layer's transfer time.

    **Conclusion & Interpretation:**
    - **Result: ~14 ms to first layer, ~0.43 s full model transfer (Bandwidth-Bound).** PCIe offload reduces the time before execution can begin, but it does not by itself guarantee a sub-15 ms first token or hide the full cold-start cost for every request.
