title: Cost-Optimal Heterogeneous Serving for 30B LLMs
scenario: Architect a cost-optimal heterogeneous serving platform for a 30B LLM. You have access to A100 80GB nodes for prefill and cheap T4 16GB nodes for decoding. Design the disaggregated serving architecture.
question: How would you design disaggregated serving for a 30B LLM using A100s for prefill and T4s for decoding?
details:
  realistic_solution: Route long prompts to A100 80GB prefill workers, where the 30B FP16 weights fit on one GPU and prefill can use A100-class HBM bandwidth and tensor-core throughput. After prefill, transfer only the request's KV cache and scheduling metadata to a decode pool. A T4 16GB decoder is viable only for quantized or tensor-parallel decode shards because FP16 weights alone are about 60GB; the router must admit batches based on remaining weight, KV-cache, and fragmentation headroom. Keep decode batches small enough that T4 memory bandwidth and per-token latency do not dominate, and fall back to A100 decode for large contexts or high-priority sessions.
  common_mistake: |
    **The Pitfall:** Placing both prefill and decode on T4s, severely bottlenecking time-to-first-token due to their low 65 TFLOPS compute capability.
    **The Rationale:** Understanding this distinction is critical for system optimization.
    **The Consequence:** Failing to recognize this leads to poor architectural decisions and suboptimal performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Based on the provided scenario.

    **Calculations:**
    - 30B parameters in FP16 require about 60 GB for weights before KV cache or runtime overheads.
    - A single T4 has 16 GB of memory, so FP16 decode cannot run on one T4. It needs at least 4-way weight sharding just for weights, and in practice more headroom or quantized weights to leave room for KV cache.
    - A100 80GB HBM bandwidth is roughly 2 TB/s class; T4 memory bandwidth is roughly 320 GB/s class, so decode throughput and batching on T4s are the limiting resources.
    - Transferring a 1 GB KV cache over a 50 GB/s link takes 1 GB / 50 GB/s = 20 ms before serialization and scheduling overhead.

    **Conclusion & Interpretation:**
    - Disaggregation is plausible only when KV-cache handoff, decode admission control, and T4 memory limits are explicit. The 20 ms KV transfer may be acceptable for long prompts, but it is not automatically hidden for short requests or latency-critical decode.
