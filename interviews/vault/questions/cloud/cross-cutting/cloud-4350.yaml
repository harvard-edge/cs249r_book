title: Red-Teaming Throughput vs Coverage Tradeoff
scenario: 'Before deploying a public-facing LLM, your red-team budget allows 500 person-hours of manual adversarial testing. A red-team lead proposes three strategies: (A) free-form probing by 10 experts, (B) structured taxonomy-guided probing covering 15 harm categories, and (C) automated adversarial generation using an attacker LLM with human review of flagged outputs.'
question: How should the 500 person-hour red-team budget be allocated across free-form, taxonomy-guided, and automated adversarial testing?
details:
  realistic_solution: 'Use the 500 hours as a portfolio, not a single throughput maximization exercise. Allocate 100 hours to free-form expert probing for novel failures, producing about 1,000 high-context prompts at 10 prompts/hour. Allocate 200 hours to taxonomy-guided probing across 15 harm categories, about 13 hours/category and 2,000 reviewed prompts at the same manual rate. Allocate 200 hours to automated adversarial testing as human review time: the attacker LLM can generate far more candidates than humans can inspect, so cap the pipeline at the top 20,000 flagged outputs reviewed at 100 prompts/hour. This sums to 500 person-hours and yields about 23,000 reviewed adversarial cases, with manual work covering novelty and taxonomy coverage while automation supplies volume over known attack patterns. The attacker model should be from a different model family than the target to reduce shared blind spots.'
  common_mistake: |
    **The Pitfall:** Maximizing the number of adversarial prompts (quantity) rather than coverage of the failure mode taxonomy.
    **The Rationale:** Automated methods generate volume but cluster around known attack patterns.
    **The Consequence:** Novel failure modes requiring human creativity are missed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Automated Generation: 50 prompts/min (3,000/hr).
    - Human Review: 100 prompts/hr.
    - Budget: 500 person-hours.

    **Calculations:**
    - Strategy A: 100h * 10 prompts/hr = 1,000 expert free-form prompts.
    - Strategy B: 200h * 10 prompts/hr = 2,000 taxonomy-guided prompts, about 133 per harm category.
    - Strategy C generation is cheap relative to review: 50 prompts/min = 3,000 prompts/hr.
    - Strategy C review budget: 200h * 100 prompts/hr = 20,000 flagged automated prompts reviewed.
    - Total reviewed cases: 1,000 + 2,000 + 20,000 = 23,000. Total hours: 100 + 200 + 200 = 500.

    **Conclusion & Interpretation:**
    - **Result: 23K reviewed cases (Human-Review-Bound)**. The correct limit is reviewer capacity, so automation should generate a candidate pool and humans should review only the highest-risk slice within the 200-hour allocation.
