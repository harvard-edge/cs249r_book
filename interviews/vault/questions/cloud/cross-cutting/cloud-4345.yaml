title: Intersectional Fairness Under Distribution Shift
scenario: A loan approval model achieves demographic parity (DP gap < 2%) and equalized odds (TPR parity gap < 3%) on the training distribution. Six months post-deployment, a fairness audit reveals that approval rates for Black women aged 18-25 dropped from 41% to 28% while the overall model metrics remain within SLA. The model was not retrained.
question: What caused this and how do you detect and fix it?
details:
  realistic_solution: 'The audit shows an intersectional fairness regression, not a proven single root cause. Plausible causes include subgroup covariate drift, selection effects in who applies, upstream policy changes, label-delay effects, or sampling noise. Detection should combine continuous per-intersectional-cell monitoring of approval rates and error rates with drift checks on subgroup features and a review of product/policy changes since launch. Fix the confirmed cause: repair data or labeling pipelines if biased, retrain or revalidate if subgroup data drifted, revisit policy thresholds if business rules changed, and validate any remediation against demographic parity, equalized odds, calibration, and business constraints before rollout.'
  common_mistake: |
    **The Pitfall:** Assuming that demographic parity and equalized odds compliance on aggregate subgroups (race, gender) implies intersectional subgroup fairness. Aggregate metrics can mask severe disparities in intersectional cells while remaining statistically compliant at the marginal level.
    **The Rationale:** Aggregate metrics can mask disparities.
    **The Consequence:** Missed fairness violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline approval rate: 41%.
    - Shifted approval rate: 28%.
    - Sample size (N): 500 monthly applicants in the intersectional cell.

    **Calculations:**
    - Approval drop: 41% - 28% = 13 percentage points.
    - Standard error: √(0.41 * 0.59 / 500) ≈ 0.022.
    - Z-score: 0.13 / 0.022 ≈ 5.9.
    - p-value: < 1e-8 (highly significant).

    **Conclusion & Interpretation:**
    - **Result: Z=5.9 (Subgroup Fairness Regression)**. The observed 13pp approval-rate drop is unlikely to be random at this sample size, so it warrants per-cell fairness and drift investigation. The calculation establishes statistical significance of the drop, not a specific distribution-shift mechanism.
