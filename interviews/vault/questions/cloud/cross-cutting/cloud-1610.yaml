title: Mitigating Black-Box Model Inversion on Health APIs
scenario: You are deploying a 1.2B parameter Transformer model for clinical readmission risk scoring via a public REST API. The API currently returns full FP32 confidence vectors across 500 risk categories. Security audits show that an attacker can execute a black-box model inversion attack by making ~50,000 queries to reconstruct sensitive patient training data with 85% fidelity. You must evaluate and select a defense to protect the data while keeping API latency under 50ms and maintaining an absolute accuracy drop of less than 1.5%.
question: Which defense should you choose to stop the 50,000-query inversion attack while keeping latency under 50ms and accuracy loss under 1.5%?
details:
  realistic_solution: Restrict the API output payload. Instead of returning the full FP32 probability distribution, return only the Top-3 categories and round confidence scores to one decimal place, or suppress confidence scores entirely for public clients. This reduces the smooth optimization signal used by black-box inversion attacks while adding negligible latency. Validate the policy on held-out clinical tasks to confirm the absolute accuracy drop stays below 1.5%.
  common_mistake: |
    **The Pitfall:** Jumping immediately to retraining the model with Differential Privacy (DP-SGD).
    **The Rationale:** Relying on heavyweight privacy techniques without considering operational or latency constraints.
    **The Consequence:** Severely degrades model utility (>5% accuracy drop) and incurs massive GPU overhead, failing the business requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - API returns 500-dimensional FP32 vectors.
    - Attack queries required: ~50,000.
    - Defense must keep latency under 50ms and accuracy loss under 1.5%.

    **Calculations:**
    - Current response exposes 500 continuous confidence values per query, giving the attacker many smooth signals for finite-difference search.
    - Returning Top-3 rounded scores exposes at most 3 coarse values per query, a reduction from 500 detailed signals to 3 coarse signals.
    - Payload restriction is post-processing, so added serving latency is negligible compared with model inference.
    - Accuracy impact must be measured on the API decision metric; if downstream users only need the top categories, Top-3 rounded outputs should preserve the primary prediction while hiding low-ranked probabilities.

    **Conclusion & Interpretation:**
    - **Result: Limit outputs and precision rather than retraining with a heavyweight defense.** The selected defense directly removes most inversion signal while fitting the latency budget; release depends on verifying the measured accuracy drop remains below 1.5%.
