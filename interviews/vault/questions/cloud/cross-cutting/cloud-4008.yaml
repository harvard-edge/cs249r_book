title: Incomplete Build Versus Rent Decision
scenario: 'A startup asks whether to buy 128 GPUs or rent cloud instances over a three-year planning horizon. They provide a purchase quote of $4 million and a cloud price of $3/GPU-hour, but omit critical operational details.'
question: "What missing information determines the buy-versus-rent decision, and what is the break-even utilization before OpEx?"
details:
  realistic_solution: 'The break-even depends on utilization and all-in ownership cost. The simple lower-bound cloud-equivalent hours are $4M / $3 = 1.33M GPU-hours. Maximum available hours are 3.36M GPU-hours, setting the raw hardware break-even around 40% utilization.'
  common_mistake: |
    **The Pitfall:** Comparing purchase price directly to cloud hourly rates without factoring in utilization or OpEx.
    **The Rationale:** Candidates focus solely on CapEx and ignore power, cooling, staffing, and demand volatility.
    **The Consequence:** Drastically underestimating the Total Cost of Ownership (TCO) of building an on-prem cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128 GPUs, 3-year horizon.
       - Purchase quote: $4 million. Cloud price: $3/GPU-hour.
    2. **Calculations:**
       - Cloud break-even hours: $4,000,000 / $3/hour = 1,333,333 GPU-hours.
       - Three-year capacity: 128 GPUs × 24 hours/day × 365 days/year × 3 years = 3,363,840 GPU-hours.
       - Break-even utilization: 1,333,333 / 3,363,840 = 0.396 (39.6%).
    3. **Conclusion & Interpretation:**
       **Result: Utilization Bound. Raw hardware breaks even at 39.6% utilization, before factoring in significant OpEx costs.**
