title: The Cloud vs. Hybrid TCO Dilemma
scenario: You are an ML Systems Engineer at a self-driving car company evaluating the cost of two different
  perception architectures for a fleet of 1,000 vehicles. Each car operates 4,000 hours per year. You
  need to compare the annual cloud compute cost for the fleet under two A/B test scenarios.
question: "What are the annual fleet cloud compute costs under Scenarios A and B, and which is more cost-effective?"
details:
  realistic_solution: Scenario B is significantly more cost-effective. The hybrid approach only uses the
    expensive cloud GPU 15% of the time, leading to massive savings compared to Scenario A, which uses the cloud GPU 50% of the time.
  common_mistake: The most common mistake is to miscalculate the GPU usage ratio. For Scenario A, it's
    30 mins per hour, or 0.5. For Scenario B, it's 15% of the driving time, meaning the GPU is active
    for 15% of the 4,000 hours. Another common error is to calculate the cost for a single vehicle but
    forget to multiply by the fleet size of 1,000.
  napkin_math: '1. **Calculate total fleet hours:** 1,000 vehicles × 4,000 hrs/yr = 4,000,000 hrs/yr.

    2. **Scenario A (50% cloud, 30 mins/hr):** 4,000,000 hrs × 0.5 × $4/hr (est. cloud GPU) = $8,000,000/yr.

    3. **Scenario B (15% cloud):** 4,000,000 hrs × 0.15 = 600,000 cloud hrs/yr.

    4. **Scenario B Cost:** 600,000 hrs × $4/hr = $2,400,000/yr.

    The hybrid edge-cloud approach yields a 70% cost reduction vs Scenario A, saving $5.6M annually.'
  options:
  - Scenario A is more cost-effective at $1.2 Million.
  - Scenario A is more cost-effective at $8.0 Million.
  - Scenario B is more cost-effective at $2.4 Million.
  - Scenario B is more cost-effective at $2,400.
  correct_index: 2
