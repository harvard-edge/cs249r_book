title: The Cloud vs. Hybrid TCO Dilemma
scenario: You are an ML Systems Engineer at a self-driving car company evaluating the cost of two different
  perception architectures for a fleet of 1,000 vehicles. Each car operates 4,000 hours per year. You
  need to compare the annual cloud compute cost for the fleet under two A/B test scenarios.
question: What are the annual fleet cloud compute costs under Scenarios A and B, and which is more cost-effective?
details:
  realistic_solution: Scenario B is significantly more cost-effective. The hybrid approach only uses the
    expensive cloud GPU 15% of the time, leading to massive savings compared to Scenario A, which uses
    the cloud GPU 50% of the time.
  common_mistake: '**The Pitfall:** Miscalculating the GPU usage ratio or forgetting to multiply by the
    fleet size.

    **The Rationale:** Candidates often fail to correctly apply the 15% active time or isolate the cost
    to a single vehicle.

    **The Consequence:** Arriving at drastically inaccurate annual cost estimates that invalidate the
    TCO comparison.'
  napkin_math: '**Assumptions & Constraints:**

    - Fleet size: 1,000 vehicles.

    - Operating time: 4,000 hrs/yr per vehicle.

    - Cloud GPU cost: $4/hr.

    **Calculations:**

    - Total fleet hours: 1,000 × 4,000 = 4,000,000 hrs/yr.

    - Scenario A (50% cloud): 4,000,000 × 0.5 × $4 = $8,000,000/yr.

    - Scenario B (15% cloud): 4,000,000 × 0.15 × $4 = $2,400,000/yr.

    **Conclusion & Interpretation:**

    - **Result:** Scenario B is more cost-effective, yielding a 70% cost reduction ($5.6M saved annually).'
  options:
  - Scenario A is more cost-effective at $1.2 Million.
  - Scenario A is more cost-effective at $8.0 Million.
  - Scenario B is more cost-effective at $2.4 Million.
  - Scenario B is more cost-effective at $2,400.
  correct_index: 2
