title: Privacy-Utility Tradeoff in LLM Fine-Tuning
scenario: Your team fine-tunes a 1.5B-parameter LLM on private medical records using DP-SGD. At epsilon = 8.0 (moderate privacy), the model achieves 72% accuracy on medical NER. At epsilon = 1.0 (strong privacy), accuracy drops to 41% — barely above the 38% random baseline. The non-private baseline is 89%.
question: Is full DP-SGD viable for 1.5B-parameter medical NER at ε=1, and what alternatives improve privacy-utility?
details:
  realistic_solution: 'Full-model DP-SGD is not viable at ε=1 for this setting because the observed 41% NER accuracy is barely above the 38% baseline. The issue is not a simple per-parameter noise total; privacy loss depends on the sampling rate, number of steps, clipping norm, noise multiplier, and accountant. Full fine-tuning also forces clipping and noisy updates across a very high-dimensional model, which hurts utility and memory. Alternatives: (1) DP-LoRA: freeze the base model and train only adapter weights under DP. This does not reduce DP sensitivity merely by parameter count, but it improves utility by restricting the noisy optimization problem to far fewer trainable degrees of freedom. (2) Public medical pretraining followed by DP fine-tuning of adapters or a classifier head. (3) PATE or private aggregation when labeled private data can be partitioned across teachers.'
  common_mistake: |
    **The Pitfall:** Treating the ε=1 failure of full fine-tuning as proof that private LLM adaptation is impossible.
    **The Rationale:** Candidates conflate full-model DP-SGD with all DP training strategies and assume utility loss is unavoidable.
    **The Consequence:** They miss parameter-efficient and public-pretraining approaches that can improve utility while still accounting for privacy rigorously.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full-model DP-SGD at ε=1 gives 41% accuracy.
    - Random baseline is 38%; non-private baseline is 89%.
    - Privacy accounting must use sampling rate, steps, clipping norm, noise multiplier, and δ.

    **Calculations:**
    - Utility gain over random at ε=1 = 41% - 38% = 3 percentage points.
    - Gap to non-private baseline = 89% - 41% = 48 percentage points.
    - Gap to the ε=8 run = 72% - 41% = 31 percentage points.
    - A closed-form single-step noise formula is not enough to judge the full training run; use an RDP/PLD accountant for the actual schedule.
    - DP-LoRA reduces trainable parameters from 1.5B to perhaps tens of millions, improving optimization and memory, but the clipped per-example update still determines sensitivity.

    **Conclusion & Interpretation:**
    - **Result: utility-bound.** Full DP-SGD at ε=1 is not viable as stated; use parameter-efficient DP fine-tuning, public pretraining, or private aggregation rather than claiming sensitivity falls with parameter count.
