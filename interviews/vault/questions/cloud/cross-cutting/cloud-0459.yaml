title: The Hospital TCO Dilemma
scenario: 'You are a Staff ML Engineer consulting for a hospital network. They want to train a medical
  imaging model for 1 month every quarter. They have two options: Path A (Centralized Cloud: rent 80 GPUs
  at $8/hr) or Path B (Federated On-Prem: buy 10 servers at $50K each, each drawing 10 kW at $0.10/kWh).'
question: 'Over three years, which option has lower TCO for quarterly medical-imaging retraining: centralized
  cloud training or federated on-prem training?'
details:
  realistic_solution: The correct answer is that Federated Learning (Path B) has a dramatically lower
    3-year TCO. While the initial CapEx for on-prem servers is high, the recurring operational costs of
    renting a large-scale H100 cluster for centralized training are far higher over the 3-year period.
    The calculation demonstrates that avoiding massive, quarterly GPU rental fees makes the on-premise
    investment pay for itself quickly.
  common_mistake: '**The Pitfall:** Focusing only on the initial capital cost (CapEx) or the hourly GPU
    price.

    **The Rationale:** Engineers often ignore the compounding operational costs (OpEx) like power, cooling,
    and maintenance over the system''s lifecycle. They see zero CapEx for cloud and assume it''s cheaper,
    or see high CapEx for on-prem and dismiss it.

    **The Consequence:** Making sub-optimal infrastructure investments by failing to account for the long-term
    savings of on-prem over massive cloud rental fees.'
  napkin_math: "1. **Assumptions & Constraints:**\n   - Path A: 80 cloud GPUs at $8/hr. 1 month training/quarter\
    \ (2880 hours/year).\n   - Path B: 10 servers at $50K each, 10kW per server, $0.10/kWh power cost.\n\
    \   - Timeline: 3 years.\n2. **Calculations:**\n   - Path A TCO: 80 * $8 = $640/hr. $640 * 2880 =\
    \ $1,843,200/year. 3 years = ~$5.5 million.\n   - Path B CapEx: 10 * $50K = $500K.\n   - Path B OpEx:\
    \ 10 * 10kW = 100kW. 100kW * $0.10/kWh = $10/hr. $10 * 8760 = $87,600/year. 3 years = ~$262,800.\n\
    \   - Path B Total TCO: $500K + $262,800 = $762,800.\n3. **Conclusion & Interpretation:**\n   - **Result:**\
    \ Path B saves over $4.7 million compared to Path A over 3 years."
  options:
  - Path A is cheaper because the hospital avoids the large $500,000 upfront server cost (CapEx).
  - Path B is cheaper because the 3-year operational costs are significantly lower than the recurring
    cloud rental fees, easily justifying the initial CapEx.
  - Path B is more expensive because the cost of electricity and maintenance for 10 servers over 3 years
    exceeds the cost of renting GPUs.
  - The costs are roughly equivalent, so the decision should be based purely on data privacy concerns,
    not economics.
  correct_index: 1
