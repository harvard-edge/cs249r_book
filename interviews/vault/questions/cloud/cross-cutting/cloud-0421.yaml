title: The First-Year Cost of an H100
scenario: A new project requires a dedicated NVIDIA H100 GPU running 24/7 for a full year. The GPU capital expense (CapEx) is $30,000, and annual maintenance is 5% of CapEx. An electricity cost of $0.15/kWh and an average datacenter Power Usage Effectiveness (PUE) of 1.1 are expected.
question: What is the first-year TCO for one H100 running 24/7, including CapEx, maintenance, and power at $0.15/kWh with 1.1 PUE?
details:
  realistic_solution: 'The TCO is the sum of the initial hardware cost (CapEx) and all operational costs (OpEx) for the period. For the first year, this includes the H100 unit cost, the annual maintenance cost, and the total power cost (including the PUE overhead). CapEx: $30,000. Power OpEx: The H100 draws 700W. With PUE 1.1, total facility power = 700 × 1.1 = 770W = 0.77 kW. Annual energy = 0.77 kW × 8,760 hours = 6,745 kWh. Annual power cost = 6,745 × $0.15/kWh = $1,012. Maintenance OpEx (assuming 5% of CapEx): $1,500. First-year TCO = $30,000 + $1,500 + $1,012 = **$32,512**. The power cost is roughly 3% of the first-year TCO, but over a 5-year depreciation period, total power cost accumulates to ~$5,060, making it a more significant factor.'
  common_mistake: |
    **The Pitfall:** Underestimating TCO by ignoring OpEx and the PUE overhead.
    **The Rationale:** Buyers often look only at the sticker price (CapEx) of the GPU and calculate power using just the chip's TDP, forgetting cooling and facility infrastructure overhead.
    **The Consequence:** The operational budget is severely underfunded, and the long-term cost of the hardware is miscalculated by thousands of dollars.
  napkin_math: |
    - **CapEx:** $\$30,000$.
    - **Power Draw:** $700\text{W} \times 1.1\text{ (PUE)} = 770\text{W} = 0.77\text{ kW}$.
    - **Annual Energy:** $0.77\text{ kW} \times 8,760\text{ hours} = 6,745.2\text{ kWh}$.
    - **Annual Power Cost:** $6,745.2\text{ kWh} \times \$0.15/\text{kWh} \approx \$1,012$.
    - **Annual Maintenance:** $\$30,000 \times 0.05 = \$1,500$.
    - **First-Year TCO:** $\$30,000 + \$1,500 + \$1,012 = \$32,512$.
    - **Conclusion:** **First-year TCO is $32,512.**
  options:
  - ~$30,000
  - ~$31,500
  - ~$32,420
  - ~$32,512
  correct_index: 3
