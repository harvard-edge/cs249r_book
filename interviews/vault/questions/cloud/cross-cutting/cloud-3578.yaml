title: Fairness Metric Definitions on NVIDIA A100
scenario: A machine learning team is deploying a critical model to perform predictions for a sensitive application. To ensure the model adheres to ethical guidelines, they need to evaluate its fairness.
question: Can you define and differentiate between 'demographic parity' and 'equalized odds' in this context?
details:
  realistic_solution: 'A realistic solution involves: 1) Clearly defining relevant protected groups and sensitive attributes. 2) Selecting appropriate fairness metrics (like demographic parity, equalized odds, or intersectional fairness) based on the application''s goals and potential harms. 3) Implementing a continuous evaluation pipeline to monitor these metrics in production. 4) Using fairness-aware algorithms (e.g., re-weighing, adversarial debiasing) or post-processing techniques (e.g., equalizing thresholds) if significant biases are detected.'
  common_mistake: |
    **The Pitfall:** Assuming that achieving one fairness metric guarantees overall algorithmic fairness.
    **The Rationale:** Engineers often treat fairness as a single binary checkbox, lacking the domain knowledge that parity and odds mathematically contradict each other in most scenarios.
    **The Consequence:** Deploying a model that mathematically meets "demographic parity" but still aggressively discriminates via unequal false positive rates across protected subgroups.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Groups A and B have different base rates of the target variable.
    2. **Calculations:**
       - Demographic Parity: P(Y_hat=1|A) = P(Y_hat=1|B).
       - Equalized Odds: P(Y_hat=1|Y=1,A) = P(Y_hat=1|Y=1,B) AND P(Y_hat=1|Y=0,A) = P(Y_hat=1|Y=0,B).
    3. **Conclusion & Interpretation:**
       - **Result: Fairness Definition-Bound.** Due to mathematical impossibility (unless base rates are identical or the classifier is perfect), forcing Parity actively degrades Odds, and vice versa.
