title: Evaluating Adversarial Debiasing Dynamics in Credit Models
scenario: You are training a 50M parameter ranking model for a credit scoring system. To meet regulatory requirements, you implement adversarial debiasing using a Gradient Reversal Layer (GRL). You attach a 5M parameter adversary network to the penultimate layer. During training, throughput drops by 40%, the main model's AUC degrades by 12%, and the adversary's loss quickly goes to zero.
question: Why did the GRL adversarial debiasing setup hurt throughput and AUC, and how would you redesign it?
details:
  realistic_solution: Implement a warm-up schedule for the gradient reversal penalty, scaling it dynamically over the first 20% of epochs, and heavily restrict the adversary's capacity (e.g., 2-layer MLP, 0.5M params) to balance the minimax game and reduce FLOPs.
  common_mistake: |
    **The Pitfall:** Assuming the gradient reversal scaling factor should be static from the start or that the adversary needs massive capacity.
    **The Rationale:** A too-strong adversary early in training overpowers the main model before it can learn useful task-specific features.
    **The Consequence:** The main model's feature representations are destroyed, resulting in heavily degraded AUC and a complete loss of throughput due to wasted FLOPs on an oversized adversary.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline throughput: ~2000 samples/s.
    - Strong adversary (5M params): Throughput=1200 samples/s, AUC drops 12%.
    - Optimized adversary (0.5M params): Throughput=1900 samples/s.

    **Calculations:**
    - Throughput lost originally = 2000 - 1200 = 800 samples/s.
    - Throughput recovered = 1900 - 1200 = 700 samples/s.
    - Recovery rate = 700 / 800 = 87.5%.

    **Conclusion & Interpretation:**
    - **Result: Compute Overload**. Downsizing the adversary recovers 87.5% of the lost throughput while maintaining the DPD constraint.
