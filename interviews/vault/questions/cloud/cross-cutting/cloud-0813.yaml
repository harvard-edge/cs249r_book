title: The Carbon-Neutral Training Scheduler
scenario: Your company has committed to carbon-neutral AI training by 2027. You run 500 training jobs per week across 3 data center regions (Virginia, Oregon, Ireland).
question: How would you schedule 500 weekly training jobs across Virginia, Oregon, and Ireland to minimize carbon within 15% of baseline cost?
details:
  realistic_solution: A carbon-aware scheduler balances spatial and temporal shifting under explicit capacity and cost constraints. Fill Oregon first because it has the lowest carbon intensity, then fill Ireland, then place the remaining jobs in Virginia during its lowest-carbon hours. Under the stated weekly capacities, the concrete plan is 200 jobs in Oregon, 150 in Ireland, and 150 in Virginia. Temporal shifting is applied inside each region's allocation by running flexible jobs in the lowest-carbon windows first, while urgent jobs use the least-cost feasible slot. This schedule stays within the 15% cost cap in the napkin model and cuts carbon by about 39%; the remaining emissions must be handled through further demand shifting, procurement, or RECs if the company needs net carbon neutrality.
  common_mistake: |
    **The Pitfall:** Attempting to run everything in the greenest region.
    **The Rationale:** Candidates ignore practical capacity constraints (the green region lacks enough GPUs) and temporal variation in grid carbon intensity.
    **The Consequence:** Failing to meet training throughput requirements and missing out on significant temporal shifting carbon reductions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 jobs total.
    - Baseline: 292 kg CO2/job avg and $1,000/job avg.
    - Oregon low-carbon windows: 103 kg CO2/job, $1,100/job, capacity 200 jobs.
    - Ireland low-carbon windows: 194 kg CO2/job, $1,080/job, capacity 150 jobs.
    - Virginia low-carbon windows: 258 kg CO2/job, $1,000/job, capacity 150 jobs.
    - Cost cap: no more than 15% above baseline.

    **Calculations:**
    - Baseline carbon: 500 jobs * 292 kg = 146,000 kg CO2.
    - Baseline cost: 500 jobs * $1,000 = $500,000. Cost cap: $575,000.
    - Schedule Oregon to capacity: 200 jobs * 103 kg = 20,600 kg; cost = 200 * $1,100 = $220,000.
    - Schedule Ireland to capacity: 150 jobs * 194 kg = 29,100 kg; cost = 150 * $1,080 = $162,000.
    - Schedule remaining Virginia jobs in lowest-carbon windows: 150 jobs * 258 kg = 38,700 kg; cost = 150 * $1,000 = $150,000.
    - Total optimized carbon: 20,600 + 29,100 + 38,700 = 88,400 kg.
    - Total optimized cost: $220,000 + $162,000 + $150,000 = $532,000, which is 6.4% above baseline and within the 15% cap.
    - Carbon reduction: (146,000 - 88,400) / 146,000 = 39.5%.

    **Conclusion & Interpretation:**
    - **Result: 200 Oregon, 150 Ireland, 150 Virginia achieves about a 39.5% carbon reduction at 6.4% higher cost, satisfying the 15% cost constraint.**
