title: 'Federated Learning on TPU v5e: Communication and Non-IID Challenges'
scenario: You are designing a federated learning system training a personalized recommendation model. The aggregation server is backed by TPU v5e instances, each with 16 GB HBM, 197 TFLOPS, and 819 GB/s memory bandwidth. The model has 1 billion parameters in 16-bit floating-point. Client data is highly non-IID, and communication bandwidth between clients and the server is a significant bottleneck.
question: What architectural choices would mitigate non-IID client drift and communication bottlenecks given the TPU v5e specs?
details:
  realistic_solution: |
    Use FedProx or SCAFFOLD to reduce non-IID client drift, sample a manageable fraction of clients per round, and support personalization layers or cluster-specific heads where the recommendation distribution differs sharply by cohort. Reduce communication with client-side quantization, sparsification, delta updates, error feedback, and update frequency control. Secure aggregation should still be used for privacy, but it should not be counted as a bandwidth reducer because it often adds protocol overhead. Add hierarchical aggregation close to clients so regional aggregators combine compressed updates before the TPU-backed central server receives them. The TPU v5e helps with batched aggregation and optimizer steps once updates arrive, but network transfer and client availability dominate the round time for a 1B-parameter model.
  common_mistake: |
    **The Pitfall:** Ignoring the impact of non-IID data on convergence and focusing purely on compute.
    **The Rationale:** It's common to assume standard federated averaging will naturally converge, or to only focus on optimizing client-side compute without addressing the massive communication bottleneck of a 1B parameter model.
    **The Consequence:** This leads to severe model drift, extremely slow convergence, poor global model performance, and network saturation that stalls the entire pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model update size at BF16: 1B parameters * 2 bytes = 2 GB per client.
    - Sampled clients per round: 10,000, not all 100,000 clients.
    - Client-side 4-bit quantized delta update: about 0.5 GB per client before protocol overhead.
    - Effective aggregate WAN ingress to the server tier: 100 GB/s.

    **Calculations:**
    - Uncompressed round traffic = 10,000 * 2 GB = 20 TB.
    - 4-bit compressed round traffic = 10,000 * 0.5 GB = 5 TB.
    - Ideal network receive time after compression = 5 TB / 100 GB/s = 50 seconds, before stragglers and secure-aggregation overhead.
    - Without compression, ideal receive time = 20 TB / 100 GB/s = 200 seconds.

    **Conclusion & Interpretation:**
    - **Result: compression cuts ideal transfer time from 200 seconds to 50 seconds per sampled round.** TPU aggregation is useful after updates arrive, but communication volume, client sampling, straggler policy, and hierarchical aggregation determine federated throughput.
