title: Portable Mixed-Precision Training Across GPU Architectures
scenario: Your mixed-precision training code uses `torch.cuda.amp.GradScaler` and `autocast(dtype=torch.float16)`. It works on A100 and H100. On MI300X, gradients occasionally overflow to inf. On TPU v5e, you want to use BF16 instead of FP16.
question: "How do you make mixed-precision training portable across hardware architectures?"
details:
  realistic_solution: 'Make precision a runtime configuration: (1) Use `torch.amp.autocast(device_type=device, dtype=precision)` with device and precision as config params. (2) For MI300X overflow: switch to BF16 (range of FP32, less precision than FP16 but no overflow issues) — eliminates the need for GradScaler entirely. (3) For TPU: BF16 is the only option; GradScaler is not needed since BF16 has FP32''s exponent range. (4) For H100: consider FP8 via NVIDIA''s Transformer Engine. A portable config: {A100: FP16+scaler, H100: FP8+TE, MI300X: BF16, TPU: BF16}.'
  common_mistake: |
    **The Pitfall:** Hardcoding FP16 as the universal mixed-precision dtype.
    **The Rationale:** FP16 was the earliest heavily adopted mixed-precision format on NVIDIA GPUs.
    **The Consequence:** Attempting to force FP16 causes overflows on non-NVIDIA accelerators and leaves performance on the table for H100s (which excel at FP8) and TPUs (which require BF16).
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 max value ~65k, BF16 max value ~3.4e38.

    **Calculations:**
    - FP16 range ±65,504 is vulnerable to gradient overflow.
    - BF16 dynamic range matches FP32, preventing overflow.

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound.** Hardware-aware precision routing prevents overflow without throughput loss.
