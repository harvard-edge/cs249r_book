title: PII Detection and Scrubbing Pipeline
scenario: Before training an LLM on 500M web-scraped documents, you must remove PII (names, emails, phone numbers, SSNs, addresses). Your regex-based scrubber catches 92% of PII but misses 8%.
question: With 500M documents averaging 2 PII instances each, how many PII instances leak through, and what is the defense-in-depth strategy?
details:
  realistic_solution: 'Regex-only leakage is 500M docs × 2 PII/doc × 8% miss rate = 80M PII instances left in the training corpus. That is the direct answer to the leakage estimate. Defense-in-depth should then reduce both training-data exposure and model-output exposure: add NER/contextual detectors for names and addresses, deduplicate near-identical documents before training, sample and manually audit high-risk slices, quarantine or hash detected PII instead of leaving raw values, train with privacy-aware methods when memorization risk is unacceptable, and run regex/NER filters on model outputs. These later layers are risk controls, not a reason to pretend the 92% scrubber leaves only a few leaked instances.'
  common_mistake: |
    **The Pitfall:** Relying solely on regex-based PII detection.
    **The Rationale:** Regex catches structured PII (emails, SSNs) but fails on unstructured PII like names in context (20-30% miss rate) or non-standard addresses.
    **The Consequence:** Believing the data is sanitized while leaking millions of names and addresses into the training corpus.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500M documents.
    - Average of 2 PII instances per document.
    - Regex scrubber catches 92% and misses 8%.

    **Calculations:**
    - Total PII before scrubbing = 500M * 2 = 1B instances.
    - Missed by regex = 1B * 0.08 = 80M PII instances left in the training corpus.
    - The 80M figure is training-data residual PII, not an estimate of model-output leakage.
    - Additional NER, deduplication, DP training, and output filters should be evaluated as separate controls with their own measured catch rates.

    **Conclusion & Interpretation:**
    - **Result: 80M PII instances remain after regex-only scrubbing.** Defense-in-depth is required because corpus leakage and generated-output leakage are different risks.
