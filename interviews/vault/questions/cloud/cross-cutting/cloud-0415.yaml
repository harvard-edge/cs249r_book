title: The Hidden Cost of Federation
scenario: You are evaluating a proposal to shift from a centralized training strategy to a Federated Learning (FL) approach for a feature deployed on millions of user devices.
question: At production scale, what is the largest and most underestimated new TCO cost introduced by adopting Federated Learning?
details:
  realistic_solution: The largest new cost is the massive increase in operational and engineering complexity. This includes managing a heterogeneous fleet of devices, ensuring security against model poisoning attacks, debugging stragglers and failures across millions of endpoints, and building a far more complex MLOps pipeline for versioning, deployment, and monitoring. This sustained engineering cost (OpEx) typically dwarfs the costs of network bandwidth or the central aggregation server.
  common_mistake: |
    **The Pitfall:** Focusing on direct hardware CapEx and network bandwidth.
    **The Rationale:** Engineers assume FL is primarily an infrastructure problem solved by an aggregator server and network pipelines.
    **The Consequence:** The massive human OpEx required to handle distributed systems failures across millions of unique devices is omitted from budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current centralized training pipeline: 5 engineers.
    - Production FL system at scale: 15 engineers (due to distributed complexities).
    - Loaded cost per engineer: $300k/year.

    **Calculations:**
    - Annual cost increase: $300,000 * (15 - 5) = $3,000,000.

    **Conclusion & Interpretation:**
    - **Result: OpEx Dominated (Cost-Bound)**. This recurring $3M OpEx dwarfs the one-time CapEx for aggregation servers.
  options:
  - Network bandwidth costs from millions of devices sending model updates.
  - Compute cost of the central server that aggregates model updates.
  - Sustained engineering and operational complexity to manage the distributed fleet.
  - The CapEx for 100 aggregation servers.
  correct_index: 2
