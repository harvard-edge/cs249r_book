title: 'RDMA Transport over Lossy Networks: RoCEv2 Congestion Collapse'
scenario: A RoCEv2 RDMA cluster experiences periodic throughput collapse to 2% of peak during AllReduce on 128 H100s. The collapse lasts 500ms and recovers. Packet captures show PFC PAUSE frames flooding the network.
question: What causes the RoCEv2 PFC storms during 128-H100 AllReduce, and how would you configure the network to prevent them?
details:
  realistic_solution: 'PFC storm mechanism: Switch A sends PAUSE to Switch B because its buffer fills. Switch B, now paused, backs up traffic which fills its own buffers, causing it to PAUSE Switch C. Cascading pauses create a deadlock where no traffic moves. Root cause: PFC lossless domains too large, insufficient buffer per switch port. Fix: (1) Enable ECN (Explicit Congestion Notification) on all switches — DCQCN algorithm reduces sender rate before buffers fill, preventing PFC triggers. (2) Reduce PFC domain: separate ML training traffic (Class 3) from storage and general traffic with separate PFC classes. (3) Switch buffer tuning: dynamic threshold allocation (DT) pools allow temporary burst absorption. (4) RDMA CC: enable DCQCN with tuned Kmin=5%/Kmax=50% buffer thresholds. Result: PFC storms eliminated, throughput improves from periodic 2% to sustained 90%+.'
  common_mistake: |
    **The Pitfall:** Disabling PFC entirely to stop the storms.
    **The Rationale:** Candidates identify PFC as the proximate cause of the network pause and choose to disable it rather than fixing the underlying congestion algorithm.
    **The Consequence:** Disabling PFC causes packet drops, forcing brutal RDMA retransmits that permanently destroy RoCEv2 performance.
  napkin_math: |
    *   **PFC PAUSE duration:** Typically 65,535 quanta × 512 bits / link_speed.
    *   **At 200Gbps:** 65,535 × 512 / 200e9 = 168µs per PAUSE.
    *   **Chain of 4 switches:** 4 × 168µs = 672µs storm. Cascading PAUSEs multiply this duration.
    *   **ECN Buffer threshold:** ~20% of port buffer.
    *   **Result:** Enabling ECN allows DCQCN to reduce sender rate by 50% *before* buffers fill, preventing the PAUSE trigger entirely.
