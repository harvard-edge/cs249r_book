title: 'RDMA Transport over Lossy Networks: RoCEv2 Congestion Collapse'
scenario: A RoCEv2 RDMA cluster experiences periodic throughput collapse to 2% of peak during AllReduce on 128 GPUs. The collapse lasts 500ms and recovers. Packet captures show PFC PAUSE frames flooding the network.
question: What causes the RoCEv2 PFC storms during AllReduce, and how would you configure the network to prevent them?
details:
  realistic_solution: 'PFC storm mechanism: Cascading pauses create a deadlock where no traffic moves. Root cause: PFC lossless domains too large, insufficient buffer per switch port. Fix: Enable ECN (Explicit Congestion Notification) on all switches — DCQCN algorithm reduces sender rate before buffers fill, preventing PFC triggers. Reduce PFC domains and tune dynamic threshold allocation.'
  common_mistake: |
    **The Pitfall:** Disabling PFC entirely to stop the storms.
    **The Rationale:** Candidates identify PFC as the proximate cause of the network pause and choose to disable it rather than fixing the underlying congestion algorithm.
    **The Consequence:** Disabling PFC causes packet drops, forcing brutal RDMA retransmits that permanently destroy RoCEv2 performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link speed: 200Gbps.
       - ECN Buffer threshold: ~20% of port buffer.
    2. **Calculations:**
       - PFC PAUSE duration at 200Gbps: 65,535 x 512 / 200e9 = 168us per PAUSE.
       - Chain of 4 switches: 4 x 168us = 672us storm.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Congestion-Bound. Enabling ECN allows DCQCN to reduce sender rate by 50% before buffers fill, preventing the PAUSE trigger entirely.**
