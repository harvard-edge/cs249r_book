title: Mitigating MIA in Clinical APIs
scenario: 'You are deploying a 15B parameter clinical diagnostic model trained on 2 million sensitive
  electronic health records (EHRs). It is exposed via a public REST API. A red team demonstrates a Membership
  Inference Attack (MIA) achieving an 82% success rate by analyzing the entropy of the returned token
  probabilities. You must evaluate mitigation strategies: DP-SGD (ε=8.0, δ=10^-6) vs. Top-1 logit truncation
  vs. strict API rate-limiting, and justify your choice balancing diagnostic accuracy drop against MIA
  vulnerability.'
question: "Which MIA mitigation should you choose for the 15B clinical model—DP-SGD, Top-1 truncation, or rate limiting—and why?"
details:
  realistic_solution: Implement DP-SGD during training to fundamentally bound memorization. While it incurs
    an accuracy penalty, it reduces the train/test loss divergence, dropping MIA success to near random
    guessing, unlike output truncation which attackers can bypass using boundary-based or shadow-model
    attacks.
  common_mistake: Relying solely on Top-1 logit truncation or API rate limiting, falsely assuming that
    obscuring API outputs or slowing down queries fixes the underlying model memorization issue.
  napkin_math: 'Baseline MIA: avg train loss = 0.1, test loss = 0.5. Attacker threshold = 0.3 yields 82%
    MIA accuracy. Top-1 API: attacker estimates loss via 100+ prefix queries (perplexity proxy), maintaining
    75% MIA accuracy. DP-SGD (ε=8, δ=1e-6): adds gradient noise σ = √(2*ln(1.25/1e-6)) / 8 ≈ 0.66. This
    forces train loss to ≈ 0.45, closing the generalization gap (test ≈ 0.50). MIA accuracy drops to 52%
    (near 50% random chance).'
