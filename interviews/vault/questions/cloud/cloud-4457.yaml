title: Disaggregated Serving with TPU v5e Prefill Nodes
scenario: A team proposes using TPU v5e (197 TFLOPS BF16, 800 GB/s) for prefill nodes and H100 (989 TFLOPS) for decode nodes in a disaggregated 70B serving system.
question: Is TPU v5e a good choice for 70B prefill nodes versus H100, and what integration issues would you expect?
details:
  realistic_solution: |
    TPU v5e is 5x slower per request in isolation for prefill, but scales well for high-throughput batched inference. Integration challenges include KV cache format conversion (TPU bf16 vs H100 expected format), cross-cloud KV transfer latency (GCP vs AWS/on-prem), and XLA compilation overhead. TPU v5e for prefill only makes sense if dramatically cheaper and the latency SLO is highly relaxed.
  common_mistake: |
    **The Pitfall:** Comparing raw TFLOPS without considering batching efficiency and cross-platform transfer costs.
    **The Rationale:** Engineers assume compute-bound prefill implies direct TFLOPS-to-TFLOPS substitution without accounting for network latency and compilation overhead.
    **The Consequence:** The system suffers severe latency bottlenecks during cross-cloud KV cache transfer.
  napkin_math: |
    - TPU v5e cost: $1.20/hr. Cost per TFLOP = $1.20 / 197 = $0.0061/TFLOP-hr.
    - H100 cost: ~$3/hr. Cost per TFLOP = $3 / 989 = $0.0030/TFLOP-hr.
    - **H100 is actually ~2x more cost-efficient per TFLOP for compute-bound prefill, making TPU v5e uneconomical here.**
