title: The CUDA Graphs vs Dynamic Shapes Tradeoff
scenario: Your team captures the entire LLM decode loop as a CUDA Graph to eliminate kernel launch overhead, achieving a 30% latency reduction for fixed-length generation. But when you deploy to production, you discover that real user requests have highly variable output lengths and variable batch sizes. The CUDA Graph breaks because it was captured with a fixed batch size and fixed sequence length.
question: "How would you preserve most CUDA Graph benefits while handling variable output lengths and continuous batching?"
details:
  realistic_solution: Use a bucketed CUDA Graph strategy combined with padding. Pre-capture graph variants at startup for batched buckets. For continuous batching, capture graphs per decode step, selecting the specific bucketed graph per iteration. This yields a massive dispatch speedup at the minor cost of padded compute waste.
  common_mistake: |
    **The Pitfall:** Abandoning CUDA Graphs entirely or trying to pad everything to maximum dimensions.
    **The Rationale:** The complexity of managing dynamic shapes with rigid graphs causes engineers to fall back to safe but slow eager mode.
    **The Consequence:** Either losing the 30% speedup entirely (eager mode) or wasting massive amounts of compute proportional to the padding ratio.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Variable sequence lengths and batch sizes.
       - Eager decode step: 0.5ms compute + 1.0ms dispatch = 1.5ms.
       - CUDA Graph decode step: 0.5ms compute + 0.1ms replay = 0.6ms.
    2. **Calculations:**
       - Memory cost of buckets: ~6 batch sizes * ~32 seq lengths = 192 graphs.
       - Storage per graph: ~80 MB.
       - Total VRAM for graphs: 192 * 80 MB = ~15.3 GB.
       - Bucketed graph with padding overhead: ~20% wasted compute = 0.7ms per step.
       - Net speedup over eager: 1.5ms / 0.7ms = 2.1x per decode step.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** Pre-capturing 192 graph variants costs ~15 GB VRAM but completely eliminates dispatch overhead, yielding a 2.1x net speedup even with 20% padding waste.
