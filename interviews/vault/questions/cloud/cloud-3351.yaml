title: Optimizing KV-Cache Memory on AMD MI300X for Large Language Models
scenario: You are deploying a 70-billion parameter transformer-based Large Language Model (LLM) on an accelerator which has 192 GB of HBM. The model uses FP16 precision for both weights and KV cache. Assume the model has 80 layers, a hidden dimension (`d_model`) of 8192. The model weights consume 140 GB of HBM memory.
question: What formula and maximum sequence length apply at batch size 8 before KV-cache OOM when 140 GB of the 192 GB HBM holds weights?
details:
  realistic_solution: To handle large sequence lengths and batch sizes, techniques like PagedAttention (which allows for non-contiguous memory allocation), KV-cache quantization (e.g., to INT8), or implementing sliding window attention mechanisms would be considered. Precise memory profiling and capacity planning are critical for efficient deployment.
  common_mistake: |
    **The Pitfall:** Underestimating the KV-cache footprint by neglecting the '2' factor for Key and Value tensors, or miscalculating FP16 byte sizes.
    **The Rationale:** Candidates often focus only on the hidden dimension and forget that autoregressive models cache both keys and values for every layer, or forget the 2 bytes/param of FP16.
    **The Consequence:** Memory capacity is over-promised, leading to predictable OOM crashes during long-sequence generation in production.
  napkin_math: |
    1. Calculate available HBM for KV-cache: 192 GB (Total) - 140 GB (Weights) = 52 GB.
    2. Calculate KV-cache memory per token per layer: 2 (Key + Value) * 8192 (d_model) * 2 bytes (FP16) = 32,768 bytes/token/layer.
    3. Calculate KV-cache per token across all layers: 32,768 bytes * 80 layers = 2,621,440 bytes/token ≈ 2.5 MB/token.
    4. Set up the equation for max sequence length (L) at Batch Size 8: L * 2.5 MB/token * 8 = 53,248 MB.
    5. Solve for L: L * 20 MB = 53,248 MB -> L = 53,248 / 20 = 2662.4.
    **The maximum sequence length before OOM is 2662 tokens.**
