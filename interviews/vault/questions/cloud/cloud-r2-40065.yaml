title: RDMA Latency Breakdown for a Single Write
scenario: 'Trace the end-to-end latency of a single 64-byte RDMA Write from GPU A''s VRAM to GPU B''s
  VRAM across two H100 nodes connected by a single 400Gbps InfiniBand switch. Break down every component:
  GPU DMA initiation, PCIe traversal, HCA processing, link serialization, switch forwarding, and remote-side
  processing.'
question: "What is the end-to-end latency breakdown for a 64-byte GPUDirect RDMA Write between two H100 nodes through one IB switch?"
details:
  realistic_solution: 'End-to-end breakdown for 64-byte RDMA Write via GPUDirect RDMA: (1) Work Request
    posting: CPU writes WQE to send queue via MMIO doorbell → 200ns. (2) HCA fetches WQE from host memory
    via DMA → 100ns. (3) HCA initiates PCIe read from GPU VRAM: PCIe Gen5 read request → 300ns (round-trip
    for 64B read with TLP). (4) HCA packetizes: adds IB headers (42 bytes for IB, ~80 for RoCE) → 50ns.
    (5) Link serialization: 106 bytes (64 payload + 42 header) / 50 GB/s = 2.12ns. (6) Switch forwarding:
    cut-through latency = ~90ns (Quantum-2 IB switch port-to-port). (7) Link serialization (switch to
    remote HCA): 2.12ns. (8) Remote HCA receives and processes: strips headers, validates ICRC → 100ns.
    (9) Remote HCA writes to remote GPU VRAM via PCIe: 300ns (PCIe write). (10) Remote HCA generates CQE
    on local CQ → 50ns (optional, for signaled completions). Total: 200 + 100 + 300 + 50 + 2 + 90 + 2
    + 100 + 300 + 50 = 1,194ns ≈ 1.2μs. Measured InfiniBand Write latency for 64 bytes: ~1.3μs (close
    to our estimate). The wire itself (items 5-7) accounts for only 94ns = 7.9% of total latency. PCIe
    operations (items 3, 9) account for 600ns = 50%.'
  common_mistake: Lumping everything into 'network latency ~5μs.' The breakdown reveals that PCIe and
    DMA setup dominate for small messages, not the wire or switch. This is why RDMA latency doesn't improve
    linearly with faster link speeds.
  napkin_math: '64B RDMA Write: ~1.2μs total. PCIe: 600ns (50%). HCA processing: 300ns (25%). Wire + switch:
    94ns (8%). WQE/CQE overhead: 200ns (17%). For large messages (1MB): serialization dominates: 1MB /
    50GB/s = 20μs wire time. PCIe: 1MB / 57GB/s = 17.5μs. Total ≈ 40μs (wire becomes 50% again due to
    store-and-forward effects).'
