title: SYCL Portability Layer Performance on Intel Max Series vs H100
scenario: Intel offers oneAPI/SYCL as a portable programming model across Intel Max GPUs, NVIDIA GPUs
  (via CUDA backend), and CPUs. Your team considers SYCL to avoid writing separate CUDA and HIP kernels.
  How would you evaluate the performance tax of the SYCL abstraction?
question: "If SYCL loses 69 TFLOPS relative to a 910 TFLOPS native baseline, what is the performance tax percentage?"
details:
  realistic_solution: '69/910 = 7.58% ≈ 7.6% (not 7.5%). The difference is in rounding: 7.582... rounds
    to 7.6, not 7.5.'
  common_mistake: Assuming SYCL's abstraction layer adds negligible overhead on all targets. On NVIDIA
    hardware, the SYCL-to-CUDA translation adds a compilation indirection that can miss NVIDIA-specific
    optimizations like warp shuffle and shared memory bank-conflict avoidance.
  napkin_math: 'Fraction: 69 / 910 = 0.07582... = 7.58% ≈ 7.6% (not 7.5% — 7.5% = 68.25/910 which rounds
    69 down). 69/910 = 0.07582, rounds to 7.6% at one decimal place.'
