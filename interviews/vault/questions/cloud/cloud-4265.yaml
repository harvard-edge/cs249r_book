title: Coherency Domains Across XCDs
scenario: You are designing a custom all-reduce kernel for MI300X that shares intermediate
  reduction buffers across XCDs. What coherency constraints must you enforce?
question: What coherency constraints must you enforce?
details:
  realistic_solution: MI300X Infinity Fabric provides coherency at the HBM level,
    not L2 level. Intermediate reduction buffers in L2 require explicit __threadfence_system()
    barriers before cross-XCD reads. Allocate reduction scratch space in global HBM
    (not L2-resident) and use atomic operations that flush to the coherency point.
    ROCm's rccl library handles this via ring-reduce with fabric-level fences.
  common_mistake: Assuming cache coherency is handled transparently across XCDs like
    within a single GPU SM cluster. Writes from one XCD's L2 are not automatically
    visible to another XCD's L2 without explicit fences.
  napkin_math: 'Each XCD L2 is ~4 MB. An all-reduce across 8 XCDs on a 1 GB gradient
    requires 8 passes through the Infinity Fabric. Without fences, stale L2 reads
    can produce incorrect gradients. Fence overhead: ~200ns per barrier × 8 XCDs ×
    1000 steps = 1.6ms extra per iteration on a typical training step.'
