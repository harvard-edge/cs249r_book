title: Coherency Domains Across XCDs
scenario: You are designing a custom all-reduce kernel for MI300X that shares intermediate reduction buffers across XCDs.
question: What coherency constraints must you enforce across XCDs when sharing intermediate reduction buffers?
details:
  realistic_solution: MI300X Infinity Fabric provides coherency at the HBM level, not L2 level. Intermediate reduction buffers in L2 require explicit __threadfence_system() barriers before cross-XCD reads. Allocate reduction scratch space in global HBM (not L2-resident) and use atomic operations that flush to the coherency point. ROCm's rccl library handles this via ring-reduce with fabric-level fences.
  common_mistake: |
    **The Pitfall:** Assuming cache coherency is handled transparently across XCDs like within a single GPU SM cluster.
    **The Rationale:** Developers used to monolithic GPUs assume that L2 cache writes are globally visible without explicit memory fencing.
    **The Consequence:** Stale L2 reads across XCD boundaries that produce corrupted, incorrect gradients during distributed training.
  napkin_math: |
    * Each XCD L2 is ~4 MB.
    * An all-reduce across 8 XCDs on a 1 GB gradient requires 8 passes through the Infinity Fabric.
    * Fence overhead: ~200ns per barrier × 8 XCDs × 1000 steps = 1.6ms extra per iteration.
    * **Conclusion: The explicit fencing costs ~1.6ms per training step but is mandatory for correctness.**
