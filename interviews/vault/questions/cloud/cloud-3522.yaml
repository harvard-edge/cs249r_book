title: Adversarial Robustness on AMD MI300X in Cloud Deployments
scenario: Your team is deploying a critical, real-time image recognition model to a cloud environment utilizing AMD MI300X accelerators for high-throughput inference. This model is susceptible to adversarial attacks.
question: How would you design edge detection and MI300X-side defenses against adversarial perturbations, prompt injection, and side-channel attacks?
details:
  realistic_solution: 'Implement a multi-layered defense: (1) Pre-processing filters at the ingress (e.g., input sanitization, adversarial perturbation detection using lightweight models) on CPU/smaller GPU nodes. (2) On-device robustness techniques on the MI300X itself, such as adversarial training, certified robustness methods (if feasible given performance), or randomized smoothing. (3) Continuous monitoring for anomaly detection, both on inference outputs and hardware telemetry, to identify potential side-channel attacks or unusual resource consumption patterns. Leverage MI300X''s high memory bandwidth (5.3 TB/s) for efficient loading of diverse adversarial samples during robustness validation and for parallel execution of defense mechanisms.'
  common_mistake: |
    **The Pitfall:** Over-relying on software-only defenses post-inference or neglecting hardware-specific vulnerabilities.
    **The Rationale:** Candidates treat the accelerator as a black-box compute engine, ignoring potential timing attacks or the massive I/O capability that can be harnessed for parallel defenses.
    **The Consequence:** The system remains vulnerable to sophisticated side-channel attacks targeting shared memory, or performance collapses under the weight of sequential software checks.
  napkin_math: |
    - **Latency Budget:** Target = 50ms. Detection overhead = 10ms. Remaining for inference + I/O = 40ms.
    - **HBM3 Bandwidth:** MI300X operates at 5.3 TB/s.
    - **Theoretical Max Transfer Time:** Moving all 192GB takes 192e9 / 5.3e12 ≈ 36ms. (Actual single inference transfer is practically 0ms).
    - **Compute Constraint:** The compute cost of detection MUST be strictly less than (Total Latency Budget - Main Model Latency - Data Transfer Latency).
