title: CXL vs InfiniBand for DLRM Embeddings
scenario: 'You are deploying a massive Deep Learning Recommendation Model (DLRM) that requires 2 TB of memory for its embedding tables. A standard compute node supports 1 TB of local DDR5 memory (100 ns latency). You have two options to support the full model: 1) Shard the embeddings across two nodes connected via 400 Gbps InfiniBand (RPC software stack and network hop latency is ~2500 ns), or 2) Use a single node with a 1 TB CXL 2.0 memory expansion module attached via PCIe Gen5 x16 (adding ~150 ns of CXL protocol and transport overhead). Embedding lookups are uniformly distributed across the entire 2 TB space.'
question: 'What are the average embedding lookup latencies for two-node InfiniBand sharding versus single-node CXL expansion, and which is lower?'
details:
  realistic_solution: 'The CXL 2.0 approach significantly minimizes latency by providing byte-addressable load/store semantics that bypass the OS networking stack entirely, reducing the average latency by nearly 8x compared to the InfiniBand approach.'
  common_mistake: |
    **The Pitfall:** Ignoring the software stack and RPC overhead of message-passing fabrics like InfiniBand.
    **The Rationale:** Candidates often compare raw bandwidth or theoretical wire latency without considering the full protocol stack, or they incorrectly assume CXL memory latency is identical to local DRAM.
    **The Consequence:** This leads to drastically underestimating the latency of network-attached memory and making incorrect architectural decisions for latency-sensitive applications like DLRM.
  napkin_math: |
    - **InfiniBand Sharding:** 50% local (100 ns) + 50% remote RPC (100 ns + 2500 ns) = 50 + 1300 = 1350 ns average latency.
    - **CXL Expansion:** 50% local (100 ns) + 50% CXL attached (100 ns + 150 ns) = 50 + 125 = 175 ns average latency.
    - **Speedup:** 1350 ns / 175 ns = **7.7x latency improvement with CXL.**
