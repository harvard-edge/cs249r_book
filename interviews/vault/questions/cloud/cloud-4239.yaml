title: Understanding why torch.compile retraces after dynamic batch size changes
scenario: A team trains a model on A100 (312 TFLOPS, 2TB/s) with variable batch sizes
  from a data loader that pads batches differently each step. After enabling torch.compile,
  they notice periodic 3-5 second stalls every few hundred steps and GPU utilization
  drops to 0% during these windows.
question: What causes the 3-5 second torch.compile stalls with variable padded batch
  sizes, and how would you eliminate them?
details:
  realistic_solution: Use torch.compile(model, dynamic=True) to generate shape-generic
    code. Alternatively, bucket batch sizes into 2-3 discrete values and always pad
    to the nearest bucket — this caps recompilations to the number of buckets. Monitor
    with TORCH_LOGS='recompiles' to confirm fixes work.
  common_mistake: Not understanding that torch.compile (via TorchDynamo) traces and
    compiles a specialized graph for each unique set of tensor shapes it encounters.
    A new batch size triggers retracing and recompilation, causing the observed stalls.
  napkin_math: 'TorchInductor compilation takes 30-90 seconds for large models. If
    seen once: fine. If triggered every 100 steps due to shape variation, overhead
    is 90s/100steps × 1000steps = 900s of pure compile time — more than the training
    itself for short runs.'
