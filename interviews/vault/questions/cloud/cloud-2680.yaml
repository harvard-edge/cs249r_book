title: Quantifying Feedback Loop Amplification
scenario: A predictive policing model initially assigns equal patrol probability (1%) to 100 neighborhoods. After 6 months of deployment, patrol allocation correlates 0.95 with arrest data from patrols. Patrols increase observed crime rates by 20% from the baseline for patrolled areas, and decrease them by 20% for unpatrolled areas.
question: After 3 retraining cycles with $\pm$ 20% observation bias, what is the predicted crime amplification for the top-10 neighborhoods?
details:
  realistic_solution: 'Initial crime probability: uniform 1% per neighborhood. Cycle 1: Top 10 neighborhoods get 3x patrols → 20% more arrests → model sees 1.2% crime rate. Bottom 90 neighborhoods with 0.5x patrols → fewer observed crimes → model sees 0.8%. Cycle 2: Top 10 now get even more patrols (model predicts them as high-crime). Crime rate: 1.2% × 1.2 = 1.44%. Bottom 90: 0.8% × 0.8 = 0.64%. Cycle 3: Top 10: 1.44% × 1.2 = 1.73%. Bottom 90: 0.64% × 0.8 = 0.51%. After 3 cycles: top 10 predicted crime = 1.73% vs initial 1.0% = 73% amplification. Bottom 90 predicted crime = 0.51% vs initial 1.0% = 49% suppression. The model now ''believes'' top neighborhoods have 3.4x more crime than bottom ones — entirely from observation bias, not actual crime differences.'
  common_mistake: |
    **The Pitfall:** Assuming the model is correctly "learning real patterns."
    **The Rationale:** Candidates confuse ground-truth reality with the data generated by the model's own actions (observation bias).
    **The Consequence:** Deploying runaway feedback loops that artificially amplify disparities and manufacture false correlations.
  napkin_math: |
    *   **Cycle Amplification:** Over-policed areas grow by $1.2\times$ per cycle. Under-policed areas shrink by $0.8\times$ per cycle.
    *   **Top 10 (3 Cycles):** $1.0\% \times 1.2^3 = 1.0 \times 1.728 \approx$ **1.73%** (73% artificial amplification).
    *   **Bottom 90 (3 Cycles):** $1.0\% \times 0.8^3 = 1.0 \times 0.512 \approx$ **0.51%** (49% artificial suppression).
    *   **Artificial Disparity:** The model now "believes" top neighborhoods have $1.73 / 0.51 =$ **3.4x more crime**, entirely from observation bias.
