title: The Tale of Two Latencies
scenario: 'You are serving a 70B LLM on H100s. Users have two main complaints:

  1. ''When I submit a long document (8k tokens) for summarization, it takes many
  seconds before the first word appears.'' (High prefill latency)

  2. ''When I use the chatbot for conversation, the time between each generated word
  is too long.'' (High time-per-token)'
question: Which optimizations address the 8k-token prefill latency and the chatbot
  time-per-token latency for the 70B LLM?
details:
  realistic_solution: 'The two problems map directly to the two main phases of LLM
    inference.

    1. **Prefill Latency:** Processing the initial long prompt is bottlenecked by
    the attention mechanism''s $O(N^2)$ complexity with respect to sequence length.
    This involves reading and writing the massive attention matrix to/from slow HBM.
    FlashAttention is designed specifically for this; it''s an I/O-aware algorithm
    that fuses attention calculations in fast on-chip SRAM, avoiding the HBM bottleneck.
    It directly addresses the long document summarization problem.

    2. **Time-per-token:** Generating subsequent tokens is an auto-regressive process
    where the bottleneck is memory bandwidth—reading the entire 140GB of model weights
    from HBM for every single token generated. Speculative Decoding addresses this
    by using a small, fast ''draft'' model to generate several candidate tokens, and
    then using the large, slow model to verify them in a single forward pass. This
    amortizes the high cost of the large model''s memory-bound pass over multiple
    tokens, increasing tokens/second and reducing perceived latency.'
  common_mistake: Confusing the domains of the two optimizations. A common error is
    to think FlashAttention, which makes attention faster, will significantly speed
    up per-token latency (it doesn't, because decoding is memory-bound). Another error
    is to think Speculative Decoding can help with the initial prompt processing (it
    can't, as it's an auto-regressive optimization).
  napkin_math: '**Problem 1 (Prefill):** With a sequence length N=8192, the attention
    matrix has $N^2 \approx 67$ million elements. For one head, this is $67M \times
    2 \text{ bytes/elem} \approx 134$ MB. A 70B model (e.g., 80 layers, 8 KV head
    groups) generates many such matrices per layer. A standard attention implementation
    materializes this full NxN matrix to HBM (3.35 TB/s bandwidth on H100). Reading
    and writing 134 MB per head × 64 query heads × 80 layers = ~687 GB of HBM traffic
    for attention alone. FlashAttention tiles computations to keep intermediates in
    on-chip SRAM (~20 MB per SM on H100, TB/s-level bandwidth), reducing HBM traffic
    to O(N) instead of O(N^2). | **Problem 2 (Decode):** Each token generation reads
    all 140 GB of weights from HBM. At 3.35 TB/s: 140 GB / 3.35 TB/s = 42ms per token
    at BS=1. Speculative decoding uses a small draft model (e.g., 1B, ~2 GB weights,
    ~0.6ms/token) to predict 4 tokens, then verifies all 4 in one 70B forward pass
    (42ms). If 3 of 4 are accepted: effective 3 tokens / 42ms = 14ms/token (3x improvement).'
  options:
  - Apply FlashAttention to the chatbot to reduce per-token time, and Speculative
    Decoding to the summarizer to handle the long context.
  - Apply FlashAttention to the summarizer to fix prefill latency, and Speculative
    Decoding to the chatbot to reduce per-token latency.
  - Apply FlashAttention to both; it speeds up all attention calculations, which will
    fix both prefill and decoding latency.
  - Neither. The issue is network latency for the chatbot and an insufficient batch
    size for the summarizer, not the model's architecture.
  correct_index: 1
