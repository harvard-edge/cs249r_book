title: The Compound System Tail Latency Amplification
scenario: Your compound AI pipeline has 5 serial stages, each with P50=20ms, P90=50ms, P99=200ms. The product team asks for end-to-end P99 under 500ms. A junior engineer says 'Each stage P99 is 200ms, and we have 500ms budget, so 2 stages at P99 should fit.' Is this analysis correct?
question: Is the junior engineer's P99 analysis correct, what is the actual end-to-end P99, and what can you do about it?
details:
  realistic_solution: 'For independent stages in series, the end-to-end P99 is the 99th percentile of the sum of 5 independent random variables. If each stage has a heavy-tailed distribution (common in services), the P99 of the sum is significantly worse than the sum of P99s. Quick approximation: at 5 serial stages, each with P99=200ms, the probability of at least one stage exceeding P99 is 1-(0.99)^5 = 4.9%. So the end-to-end P99 has roughly 5% of requests with at least one outlier stage. The actual E2E P99 depends on the full distribution, but empirically it''s ~600-700ms (not 1000ms = 5×200ms, because having ONE stage slow doesn''t mean all are slow). To hit 500ms P99: (1) reduce individual P99 to ~100ms per stage, (2) parallelize stages where possible, (3) implement deadline propagation — each stage checks remaining time budget and returns a degraded result if over budget (e.g., skip reranking), (4) use hedged requests — send two copies of critical-path requests and take the faster response.'
  common_mistake: |
    **The Pitfall:** Adding P99 latencies of individual stages to estimate the end-to-end P99.
    **The Rationale:** Engineers assume percentiles are directly additive, completely failing to understand the joint probability distributions of sequential events.
    **The Consequence:** The system is massively over-engineered to lower individual stage latencies, wasting engineering effort on an E2E latency that already meets the 500ms SLA statistically.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 serial stages.
       - Stage P99 = 200ms. Target E2E P99 = 500ms.
    2. **Calculations:**
       - P(all 5 stages < P99) = 0.99^5 ≈ 0.95.
       - Therefore, ~5% of requests hit at least one P99 outlier stage.
       - E2E P99 is driven by the convolution of the heavy-tailed distributions, generally settling near the sum of stage P95s (~350-400ms).
    3. **Conclusion & Interpretation:**
       - **Result: E2E P99 is significantly worse than an individual stage's P99, but it safely stays under 500ms because it is statistically impossible for multiple stages to hit their 200ms P99 simultaneously. Pipeline is Statistical-Tail-Bound.**
