title: The Compound System Tail Latency Amplification
scenario: Your compound AI pipeline has 5 serial stages, each with P50=20ms, P90=50ms, P99=200ms. The
  product team asks for end-to-end P99 under 500ms. A junior engineer says 'Each stage P99 is 200ms, and
  we have 500ms budget, so 2 stages at P99 should fit.' Is this analysis correct? What is the actual end-to-end
  P99, and what can you do about it?
question: "Is the junior engineer's P99 analysis correct, what is the actual end-to-end P99, and what can you do about it?"
details:
  realistic_solution: 'For independent stages in series, the end-to-end P99 is the 99th percentile of
    the sum of 5 independent random variables. If each stage has a heavy-tailed distribution (common in
    services), the P99 of the sum is significantly worse than the sum of P99s. Quick approximation: at
    5 serial stages, each with P99=200ms, the probability of at least one stage exceeding P99 is 1-(0.99)^5
    = 4.9%. So the end-to-end P99 has roughly 5% of requests with at least one outlier stage. The actual
    E2E P99 depends on the full distribution, but empirically it''s ~600-700ms (not 1000ms = 5×200ms,
    because having ONE stage slow doesn''t mean all are slow). To hit 500ms P99: (1) reduce individual
    P99 to ~100ms per stage, (2) parallelize stages where possible, (3) implement deadline propagation
    — each stage checks remaining time budget and returns a degraded result if over budget (e.g., skip
    reranking), (4) use hedged requests — send two copies of critical-path requests and take the faster
    response.'
  common_mistake: Adding P99 latencies of individual stages to get the end-to-end P99. P99 is NOT additive
    — the end-to-end P99 is worse than the sum of individual P99s because you need ALL stages to be fast
    simultaneously.
  napkin_math: E2E P99 is not the sum of stage P99s. P(all 5 stages < P99) = 0.99^5 ≈ 0.95. Summing five
    200ms P99s is extremely pessimistic. E2E P99 typically falls near the sum of stage P95s. With lognormal
    distributions, E2E P99 is ~350-400ms. Each stage must keep P99 < 200ms, but their convolution safely
    stays under the 500ms E2E budget.
