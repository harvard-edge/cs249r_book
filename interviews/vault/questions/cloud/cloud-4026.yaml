title: Slow Receiver Problem in RoCE ML Clusters
scenario: One GPU in a 64-GPU ring AllReduce has a misconfigured NIC receiving at 200Gbps instead of 400Gbps. The AllReduce transfers a 2GB gradient.
question: How does one MI300X NIC limited to 200Gbps affect a 64-GPU ring AllReduce, and why is this worse than in a tree?
details:
  realistic_solution: 'Ring AllReduce throughput is limited by the slowest link. With 64 GPUs in a ring, each GPU sends and receives 2 \u00d7 (N-1)/N \u00d7 S bytes. Normal time for 2GB: 2 \u00d7 63/64 \u00d7 2GB / 50GB/s = 78.8ms. With one 200Gbps link: the ring bottleneck is 200Gbps (25GB/s), so time = 2 \u00d7 63/64 \u00d7 2GB / 25GB/s = 157.5ms \u2014 a 2\u00d7 slowdown for ALL 64 GPUs due to ONE misconfigured NIC. In tree AllReduce, the impact is localized: only the subtree containing the slow GPU is affected. The slow GPU reduces throughput only for its local aggregation group (typically 8 GPUs), while other groups proceed at full speed. This is why NCCL prefers tree AllReduce at >32 GPUs: it localizes failures and congestion.'
  common_mistake: |
    **The Pitfall:** Assuming only the slow GPU experiences degraded throughput.
    **The Rationale:** Candidates forget that in a ring topology, every node must send to and receive from its neighbors in lockstep.
    **The Consequence:** The severity of a single misconfigured NIC is vastly underestimated, leading to prolonged cluster-wide training delays.
  napkin_math: |
    - Ring AllReduce formula: Time = 2 * ((N-1)/N) * S / BW. N=64, S=2GB.
    - Normal Bandwidth (400Gbps): 50 GB/s. Time = 2 * (63/64) * 2 GB / 50 GB/s ≈ 78.8 ms.
    - Slow Link Bandwidth (200Gbps): 25 GB/s. Time = 2 * (63/64) * 2 GB / 25 GB/s ≈ 157.5 ms.
    - **Result: The single slow link doubles the iteration time for ALL 64 GPUs in the ring.**
