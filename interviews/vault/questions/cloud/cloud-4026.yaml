title: Slow Receiver Problem in RoCE ML Clusters
scenario: One MI300X in a 64-GPU ring AllReduce has a misconfigured NIC receiving
  at 200Gbps instead of 400Gbps. Calculate the throughput impact on the entire ring
  and explain why the slow receiver problem is amplified in ring topologies compared
  to tree topologies.
question: How does one MI300X NIC limited to 200Gbps affect a 64-GPU ring AllReduce,
  and why is this worse than in a tree?
details:
  realistic_solution: 'Ring AllReduce throughput is limited by the slowest link. With
    64 GPUs in a ring, each GPU sends and receives 2 \u00d7 (N-1)/N \u00d7 S bytes.
    Normal time for 2GB: 2 \u00d7 63/64 \u00d7 2GB / 50GB/s = 78.8ms. With one 200Gbps
    link: the ring bottleneck is 200Gbps (25GB/s), so time = 2 \u00d7 63/64 \u00d7 2GB / 25GB/s = 157.5ms
    \u2014 a 2\u00d7 slowdown for ALL 64 GPUs due to ONE misconfigured NIC. In tree AllReduce,
    the impact is localized: only the subtree containing the slow GPU is affected.
    The slow GPU reduces throughput only for its local aggregation group (typically
    8 GPUs), while other groups proceed at full speed. This is why NCCL prefers tree
    AllReduce at >32 GPUs: it localizes failures and congestion.'
  common_mistake: Thinking only the slow GPU is affected. In a ring AllReduce, every
    GPU must send to and receive from its neighbors, so the slowest link determines
    the throughput of the entire ring \u2014 similar to how the slowest car on a single-lane
    road limits everyone behind it.
  napkin_math: 'Ring AllReduce formula: Time = 2 \u00d7 (N-1)/N \u00d7 S / BW. N=64, S=2GB,
    BW=50GB/s (400Gbps). Normal ring = 2 \u00d7 63/64 \u00d7 2GB / 50GB/s = 78.8ms. With slow
    link (200Gbps = 25GB/s): ring bottleneck = 25GB/s \u2192 T = 2 \u00d7 63/64 \u00d7 2GB / 25GB/s
    = 157.5ms. Extra 78.7ms per iteration \u00d7 600 iterations/hour = 47.2 seconds/hour
    wasted = 18.9 minutes/day of lost training.'
