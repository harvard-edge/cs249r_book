title: 'The Ridge Point Rule: Roofline Analysis'
scenario: You are profiling a model component on an NVIDIA H100 GPU. The profiler reports that it executes 50 floating-point operations for every byte of data it reads from HBM.
question: How do you classify this workload's primary bottleneck?
details:
  realistic_solution: The workload is **memory-bound**. A workload's performance is limited by memory bandwidth if its Arithmetic Intensity (AI) is less than the hardware's ridge point. For an H100, the ridge point is ~295 Ops/Byte. Since this workload's AI (50 Ops/Byte) is significantly below that threshold, its performance is limited by how fast it can fetch data from memory (HBM bandwidth), not by the GPU's raw computational power.
  common_mistake: |
    **The Pitfall:** Mistaking absolute work for relative intensity.
    **The Rationale:** Engineers often see a number like '50 FLOPs' and assume it must be a high amount of work, thus making the workload compute-bound. They fail to compare the workload's Arithmetic Intensity to the hardware's Ridge Point.
    **The Consequence:** Optimizing the wrong part of the stack (focusing on compute rather than memory access patterns).
  napkin_math: |
    1. Workload Arithmetic Intensity (AI) = 50 FLOPs/Byte.
    2. H100 Ridge Point = ~295 FLOPs/Byte.
    **Result:** 50 < 295, therefore it is firmly memory-bound.
  options:
  - Memory-bound, because its arithmetic intensity is below the hardware's ridge point.
  - Compute-bound, because 50 FLOPs per byte is a high amount of computation.
  - Latency-bound, because it must wait for the first byte from HBM.
  - Power-bound, because it's an inefficient workload for the GPU.
