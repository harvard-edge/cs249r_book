title: Small File Metadata Overhead in Object Storage
scenario: Your team is training a vision model on a cloud GPU cluster using a dataset of 10 million 50KB images stored individually in a cloud object storage bucket (e.g., S3). The training pipeline is heavily IO-bound. The EC2 instance has a 25 Gbps network interface, but the object storage has an average metadata latency (Time-To-First-Byte) of 20ms per GET request.
question: What throughput limit does 20ms per-file S3 latency impose, and how should you restructure the 10M-image dataset to fix it?
details:
  realistic_solution: "Consolidate the small image files into larger sequential formats (like TFRecords, Parquet, or WebDataset tar archives) sized around 100MB to 1GB each. This amortizes the 20ms metadata overhead across thousands of images, allowing the pipeline to utilize the full network bandwidth."
  common_mistake: |
    **The Pitfall:** Calculating theoretical throughput based solely on the 25 Gbps network bandwidth.
    **The Rationale:** Ignoring the per-file metadata latency and assuming object storage behaves like a local block device.
    **The Consequence:** The system becomes IOPS-bound rather than bandwidth-bound, severely starving the GPUs during training.
  napkin_math: |
    *   **Network Bandwidth:** 25 Gbps = 3.125 GB/s.
    *   **Transfer Time per Image:** 50KB / 3.125 GB/s = 0.016ms.
    *   **Total Latency per Image:** 20ms TTFB + 0.016ms transfer ≈ 20.016ms.
    *   **Single Thread Throughput:** 1 / 0.020s = 50 images/sec.
    *   **Total Metadata Time (1 Epoch):** 10,000,000 images × 0.020s = 200,000 seconds (~55.5 hours).
    *   **Actual Data Transfer Time:** 500GB / 3.125 GB/s = 160 seconds.
    *   **Result: Metadata latency dominates >99.9% of the I/O time; the images must be consolidated into large archive files (e.g., WebDataset) to achieve full bandwidth.**
