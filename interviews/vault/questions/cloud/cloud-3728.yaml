title: Carbon Footprint Estimation for LLM Training Run
scenario: Training a 70B LLM requires 21.7 days on 1024 GPUs at 680W each. The datacenter uses PUE (Power Usage Effectiveness) of 1.3 and is located in a region with carbon intensity of 0.42 kg CO2e/kWh (US average).
question: What are the total energy consumption, electricity cost, and carbon footprint for the 21.7-day, 1024-GPU training run?
details:
  realistic_solution: 'Calculate the total IT load by including the GPU power plus an estimated 15% overhead for CPUs, DRAM, and networking. Scale the IT load by the 1.3 PUE to find total facility power. Convert the 21.7 days to hours to derive total kWh, and apply the grid carbon intensity factor to surface the 228-tonne CO2e impact.'
  common_mistake: |
    **The Pitfall:** Multiplying only the raw GPU TDP by the runtime to calculate carbon/cost.
    **The Rationale:** The GPU is the dominant power draw in the rack, so engineers often ignore the supporting fabric, CPUs, and facility cooling.
    **The Consequence:** Completely ignoring the PUE and supporting IT hardware drastically underestimates the true environmental and financial cost of training by over 40%.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPUs: 1024 @ 680W. IT Overhead: 15%.
    - Facility PUE: 1.3.
    - Runtime: 21.7 days (520.8 hours).
    - Economics: $0.12/kWh. Grid Carbon: 0.42 kg CO2e/kWh.

    **Calculations:**
    - IT Load: 1024 * 0.68 kW = 696.32 kW.
    - Total IT Load (with overhead): 696.32 * 1.15 = 800.77 kW.
    - Total Facility Power: 800.77 kW * 1.3 PUE = 1,041 kW.
    - Total Energy: 1,041 kW * 520.8 hours = 542,152 kWh = ~542.15 MWh.
    - Cost: 542,152 kWh * $0.12 = ~$65,058.
    - Carbon: 542,152 kWh * 0.42 = 227,704 kg CO2e.

    **Conclusion & Interpretation:**
    - **Result: ~$65k and ~228 tonnes CO2e (Power/Carbon Bound)**. The operation costs ~$65k and generates ~228 tonnes of CO2e.
