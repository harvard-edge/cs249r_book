title: Carbon Footprint Estimation for LLM Training Run on H100
scenario: Training a 70B LLM requires 21.7 days on 1024 H100s at 680W each. The datacenter uses PUE (Power Usage Effectiveness) of 1.3 and is located in a region with carbon intensity of 0.42 kg CO2e/kWh (US average).
question: What are the total energy consumption, electricity cost, and carbon footprint for the 21.7-day, 1024-H100 training run?
details:
  realistic_solution: 'GPU power: 1024 × 680W = 696.3 kW. Supporting hardware (CPU, DRAM, networking): ~15% overhead = 800.7 kW total IT load. With PUE 1.3: total facility power = 800.7 × 1.3 = 1041 kW. Runtime: 21.7 days = 520.8 hours. Total energy: 1041 kW × 520.8 hours = 542.1 MWh. Cost: 542,100 kWh × $0.12 = $65,052. Carbon: 542,100 × 0.42 = 227,682 kg CO2e = 228 tonnes CO2e. For comparison: average US car emits ~4.6 tonnes/year → equivalent to ~50 cars for one year. Note: many hyperscalers use renewable energy credits, reducing effective carbon intensity significantly.'
  common_mistake: |
    **The Pitfall:** Multiplying only GPU power by runtime to calculate carbon/cost.
    **The Rationale:** The GPU is the dominant power draw, so engineers ignore the rest of the rack and facility.
    **The Consequence:** Completely ignoring the PUE and supporting IT hardware, which drastically underestimates the true environmental and financial cost of training.
  napkin_math: |
    - **IT Load:** 1024 × 680W = 696.3 kW. With 15% overhead for CPU/RAM/Networking: 696.3 * 1.15 = 800.7 kW.
    - **Total Facility Power:** 800.7 kW × 1.3 PUE = 1041 kW.
    - **Total Energy:** 1041 kW × 520.8 hours = 542.1 MWh.
    - **Electricity Cost:** 542,100 kWh × $0.12/kWh = **$65,052**.
    - **Carbon Footprint:** 542,100 kWh × 0.42 kg CO2e/kWh = **227,682 kg CO2e** (228 tonnes).
