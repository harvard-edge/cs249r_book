title: FlashAttention SRAM Tiling Calculation
scenario: >
  You are implementing a FlashAttention-style fused kernel. The algorithm must load blocks of Query (Q), Key (K), Value (V), and Output (O) matrices into SRAM. Each block has dimensions B x d, where the head dimension d = 128 in FP16 (2 bytes/element). You allocate exactly 128 KB of SRAM strictly for these four tensor blocks.
question: >
  What maximum symmetric block size B fits Q, K, V, and O in the 128 KB SRAM budget?
details:
  realistic_solution: |
    Co-design the algorithmic loop tiling parameter (B) to perfectly match the physical 128 KB SRAM capacity by calculating the combined byte footprint of the Q, K, V, and O blocks.
  common_mistake: |
    **The Pitfall:** Choosing arbitrary algorithmic block sizes without calculating the physical byte footprint.
    **The Rationale:** Candidates often focus on the logical tile size without translating it into actual bytes based on precision and number of blocks required simultaneously.
    **The Consequence:** This leads to SRAM spilling into HBM, which destroys the performance benefits of kernel fusion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 blocks (Q, K, V, O) of size B x 128. FP16 (2 bytes).
       - 128 KB SRAM strict budget.
    2. **Calculations:**
       - SRAM Budget: 128 KB = 131,072 bytes.
       - Block Size per Tensor: B * 128 * 2 = 256 * B bytes.
       - Total Memory: 4 * 256 * B = 1024 * B bytes.
       - Equality: 1024 * B = 131,072.
       - B = 128.
    3. **Conclusion & Interpretation:**
       - **Result: Block size B=128 fits exactly, ensuring the kernel remains SRAM-Capacity-Bound.**
