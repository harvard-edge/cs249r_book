title: DLRM Training on TPU v5e Pod
scenario: Your team proposes training DLRM on a TPU v5e pod (256 chips). The embedding tables total 500 GB; the dense MLP is 5B params.
question: Which DLRM components map well to a TPU v5e pod, which do not, and what architectural change makes the model TPU-trainable?
details:
  realistic_solution: 'MLP components (bottom MLP, top MLP, feature interaction): all are dense matrix operations → perfect fit for TPU systolic arrays. Expected MFU (model FLOP utilization) > 50%. Embedding lookup components: sparse, random-access reads from large tables. TPU HBM controllers are optimized for streaming sequential access, not random scatter-gather. Without specialized SparseCores, sparse embedding lookups on TPU are severely bottlenecked by XLA''s handling of dynamic indexing and all-to-all communication across the ICI. Key modification: offload embedding lookups from TPU to CPU/host memory. Use the ''embedding CPU offload'' pattern: CPUs handle embedding lookups (sending batched index requests), TPUs handle all dense operations. Communication bridge: embedding vectors are sent from CPU to TPU via PCIe/custom interconnect before each forward pass. This hybrid CPU+TPU architecture (similar to Meta''s ZION platform) is a practical way to run DLRM on TPUs at scale without SparseCores. Embedding placement: 500 GB fits easily in cluster CPU DRAM.'
  common_mistake: |
    **The Pitfall:** Assuming embedding lookup performance is determined solely by dividing the full 500 GB table size by total memory bandwidth.
    **The Rationale:** Candidates fail to consider that TPUs struggle with the random memory access patterns and the all-to-all communication required to route sparse lookups across the interconnect, rather than raw sequential read bandwidth.
    **The Consequence:** The model will experience severe bottlenecks during embedding lookups, destroying overall training throughput.
  napkin_math: |
    - **Compute Capacity:** TPU v5e pod (256 chips × 197 TFLOPS) = 50.4 PFLOPS BF16.
    - **Dense MLP FLOPs:** 5B params, batch=262k. FLOPs = 2 × 5e9 × 262,144 = 2.62 PFLOPS per step.
    - **Dense Compute Time:** At 50% MFU: 2.62 PFLOPS / (50.4 PFLOPS × 0.5) = **104 ms/step**.
    - **Embedding Lookup Volume:** Batch=262k, 100 tables, 256 bytes. 262,144 × 100 × 256 bytes = 6.7 GB per step.
    - **Communication Overhead:** While 6.7 GB scattered across 256 chips is small (~26 MB/chip), the unfused overhead and all-to-all ICI communication for random scatter-gather dominates step time (often 100s of ms), exceeding the dense MLP time.
