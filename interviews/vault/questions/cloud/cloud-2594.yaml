title: Cloud Benchmark Run Rules L2 0
scenario: A startup claims state-of-the-art MLPerf training results but used a custom learning rate schedule
  not in the reference implementation. Explain why benchmark run rules matter and what they typically
  constrain.
question: "Why do MLPerf run rules matter, and why is a custom learning rate schedule outside the rules a problem?"
details:
  realistic_solution: 'Benchmark run rules ensure apples-to-apples comparisons by constraining the optimization
    space. MLPerf rules specify: (1) which hyperparameters can be tuned (learning rate, batch size) vs.
    fixed (model architecture, loss function), (2) convergence target — training must reach a specific
    accuracy/loss threshold, (3) timing rules — clock starts at first data load, stops at convergence,
    includes all preprocessing, (4) allowed hardware configurations and software stacks, (5) number of
    required runs for statistical validity. A custom LR schedule outside the allowed tuning space would
    be a rule violation because it changes the optimization trajectory — the startup might converge faster
    with a schedule that doesn''t generalize, making the comparison unfair.'
  common_mistake: Thinking run rules are just bureaucracy. Without them, a team could achieve '10x speedup'
    by using a trivially different convergence criterion, smaller dataset, or single cherry-picked run
    — making benchmarks meaningless for hardware comparison.
  napkin_math: 'MLPerf Training requires 5+ runs, reporting median. If the custom LR works in 1/5 runs
    but diverges in 4: median would be much worse. Rules prevent cherry-picking the best run. Typical
    allowed tuning: LR within 10x of reference, batch size up to hardware limit.'
