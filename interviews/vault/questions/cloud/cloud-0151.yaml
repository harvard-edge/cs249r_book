title: The KV Cache Thrashing Cascade
scenario: Your multi-tenant LLM serving cluster (H100s, 80GB HBM) uses continuous batching. GPU compute
  utilization is consistently high, but P99 latency is spiking and overall requests-per-second is 30%
  below your benchmark. The KV cache is allocated 60 GB of HBM, and monitoring shows this buffer is always
  near 100% full. Differentiate between a system that is compute-bound versus one that is memory-capacity-bound
  in this specific context, and analyze the cascading failure mode that is likely occurring.
question: "Is this continuous-batched cluster compute-bound or KV-cache-capacity-bound, and what cascading failure explains the 30% RPS loss and P99 spikes?"
details:
  realistic_solution: The system is memory-capacity-bound, not compute-bound, and is suffering from KV
    cache thrashing. A perpetually full KV cache means the scheduler has no room for new requests. To
    accept a new request, it must evict the KV cache of a sequence that is currently paused (e.g., waiting
    for a user's next turn in a chat). When that user's request returns, its entire prompt history must
    be re-processed from scratch to regenerate the evicted KV cache state. This re-computation, or 'recompute
    tax,' consumes valuable GPU cycles that could have been used for generating new tokens for other users.
    This directly explains both the reduced system throughput (as cycles are wasted) and the P99 latency
    spikes experienced by unlucky users whose caches were evicted. The solution involves either reducing
    the maximum sequence length, using a more memory-efficient model, or implementing more sophisticated
    eviction policies (like Least Recently Used) instead of what is likely a random or FIFO eviction.
  common_mistake: Assuming that a full KV cache is a sign of an efficient system ('we are using all our
    memory!'). This fails to distinguish between useful, warm cache occupancy and destructive cache thrashing
    where the cost of recomputing evicted state outweighs the benefit of accepting a new request.
  napkin_math: Let's model a 70B model like Llama 70B (80 layers, 8192 model dimension).
