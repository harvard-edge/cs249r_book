title: The KV Cache Thrashing Cascade
scenario: Your multi-tenant LLM serving cluster uses continuous batching. GPU compute utilization is high, but P99 latency is spiking and overall RPS is 30% below benchmark. The KV cache is allocated 60 GB of HBM and is always near 100% full.
question: Is this continuous-batched cluster compute-bound or KV-cache-capacity-bound, and what cascading failure explains the 30% RPS loss and P99 spikes?
details:
  realistic_solution: The system is memory-capacity-bound, not compute-bound, and is suffering from KV cache thrashing. A perpetually full KV cache means the scheduler has no room for new requests. To accept a new request, it must evict the KV cache of a sequence that is currently paused (e.g., waiting for a user's next turn in a chat). When that user's request returns, its entire prompt history must be re-processed from scratch to regenerate the evicted KV cache state. This re-computation, or 'recompute tax,' consumes valuable GPU cycles that could have been used for generating new tokens for other users. This directly explains both the reduced system throughput (as cycles are wasted) and the P99 latency spikes experienced by unlucky users whose caches were evicted. The solution involves either reducing the maximum sequence length, using a more memory-efficient model, or implementing more sophisticated eviction policies (like Least Recently Used) instead of what is likely a random or FIFO eviction.
  common_mistake: |
    **The Pitfall:** Assuming a full KV cache indicates an efficient system.
    **The Rationale:** Engineers equate high memory utilization with optimal performance, failing to distinguish between useful cache occupancy and destructive thrashing.
    **The Consequence:** Misdiagnosis of the bottleneck, leading to ineffective scaling rather than fixing the eviction policy.
  napkin_math: |
    1. Assumptions & Constraints: 60 GB KV cache. KV cache per token ≈ 320 KB. Concurrent requests ≈ 2K average context.
    2. Calculations: Total tokens in flight = 60 GB / 320 KB ≈ 190K tokens. Concurrent requests = 190K / 2K = 95 requests.
    3. Conclusion & Interpretation: **Result: The system is memory-capacity-bound, causing thrashing. Bottleneck: KV Cache Eviction Policy.**
