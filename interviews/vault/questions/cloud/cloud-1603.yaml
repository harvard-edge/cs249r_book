title: Evaluating TensorRT vs ONNX for Dynamic Shapes
scenario: You are deploying a BERT-Large ranking model (340M parameters) on NVIDIA
  L4 GPUs for a real-time recommendation API. Traffic has highly dynamic sequence
  lengths (32 to 512 tokens) and batch sizes (1 to 32). The baseline PyTorch FP16
  model yields a P99 latency of 45ms, failing the strict 20ms SLA.
question: Would you optimize this dynamic-shape BERT-Large workload with ONNX Runtime
  or TensorRT, and how would you minimize P99 latency jitter?
details:
  realistic_solution: Use TensorRT with discrete Optimization Profiles (e.g., seq_len
    buckets of 128, 256, 512) and pad incoming requests to the nearest bucket. This
    trades a predictable compute overhead from padding for highly optimized, static-like
    kernel execution.
  common_mistake: '**The Pitfall:** Blindly exporting to TensorRT with a single broad
    dynamic shape profile (min=1, opt=16, max=32).

    **The Rationale:** Engineers want to avoid writing padding/bucketing logic and
    rely entirely on the engine to handle variable input dimensions seamlessly.

    **The Consequence:** The single broad profile forces the engine to select sub-optimal
    "one-size-fits-all" kernels or triggers runtime recompilation heuristics, leading
    to severe P99 latency jitter.

    '
  napkin_math: '**Assumptions & Constraints:**

    - SLA P99 limit: 20ms.

    - Broad profile: 15ms base + 20ms kernel selection jitter = 35ms.

    - Discrete buckets max padding overhead: ~33%.


    **Calculations:**

    - Bucketed base compute: 12ms * 1.33 padding factor = 16ms steady P99 latency.


    **Conclusion & Interpretation:**

    - **Result: Compute Jitter Bound**. Bucketed padding sacrifices a small fraction
    of throughput to guarantee passing the strict 20ms SLA.

    '
