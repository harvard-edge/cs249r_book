title: Evaluating TensorRT vs ONNX for Dynamic Shapes
scenario: You are deploying a BERT-Large ranking model (340M parameters) on NVIDIA L4 GPUs for a real-time
  recommendation API. Traffic has highly dynamic sequence lengths (32 to 512 tokens) and batch sizes (1
  to 32). The baseline PyTorch FP16 model yields a P99 latency of 45ms, failing the strict 20ms SLA. Evaluate
  the trade-offs between ONNX Runtime and TensorRT for this dynamic-shape workload, and justify an optimization
  strategy that minimizes latency jitter while maximizing throughput.
details:
  realistic_solution: Use TensorRT with discrete Optimization Profiles (e.g., seq_len buckets of 128,
    256, 512) and pad incoming requests to the nearest bucket. This trades a predictable compute overhead
    from padding for highly optimized, static-like kernel execution.
  common_mistake: Blindly exporting to TensorRT with a single broad dynamic shape profile (min=1, opt=16,
    max=32), which forces the engine to select sub-optimal kernels or triggers runtime recompilation heuristics,
    leading to severe P99 latency jitter.
  napkin_math: 'PyTorch Baseline P99: 45ms. Broad dynamic TRT profile: 15ms base + 20ms kernel selection
    jitter = 35ms (fails SLA). With 3 discrete TRT profiles and padding, max padding compute overhead
    is ~33%. 12ms base compute * 1.33 padding factor = 16ms steady P99 latency (passes 20ms SLA).'
