title: Feature Store Cost Optimization on H100 Clusters
scenario: 'Your organization spends $120K/month on feature store infrastructure: $40K on Redis for online
  serving, $50K on Spark clusters for batch pipelines, and $30K on S3 storage for the offline store. The
  CTO asks you to cut costs by 40% without increasing serving latency. Compare three approaches: (1) replace
  Redis with DynamoDB, (2) move batch pipelines to spot instances, (3) implement feature importance pruning
  to remove unused features.'
question: "How would you compare DynamoDB, spot Spark, and feature pruning to cut the $120K/month feature store spend by 40% without increasing latency?"
details:
  realistic_solution: 'Evaluate each: (1) DynamoDB: on-demand pricing for 550K reads/s at 4KB items =
    $0.25/1M reads × 550K × 3600 × 24 × 30 = $356K/month — 9× more expensive than Redis. Provisioned:
    $47K/month with reserved capacity — marginal savings but adds tail latency (DynamoDB p99 ~10ms vs
    Redis ~2ms). Reject. (2) Spot instances for batch: Spark is fault-tolerant with checkpointing. Spot
    pricing = 60-70% discount on $50K = $15-20K savings. Risk: pipeline delays during spot interruptions.
    Mitigate with on-demand driver + spot workers. Save $30K. (3) Feature pruning: audit reveals 30% of
    features have zero importance across all models. Removing them saves 30% of compute ($15K) and 30%
    of storage ($9K). Save $24K. Combined (2+3): $54K savings = 45% reduction. Meets target.'
  common_mistake: Choosing only one approach and optimizing it to the limit. The 40% target ($48K savings)
    likely requires combining multiple strategies, each contributing partial savings.
  napkin_math: 'Target: $120K × 0.4 = $48K savings. Spot instances: $50K × 0.6 discount = $30K saved.
    Feature pruning: 500 features × 30% unused = 150 removed. Compute: $50K × 0.3 = $15K saved. Storage:
    $30K × 0.3 = $9K saved. Redis: $40K × 0.15 (smaller working set) = $6K saved. Total from pruning:
    $30K. Combined: $30K + $30K = $60K — exceeds target, can relax spot ratio for reliability.'
