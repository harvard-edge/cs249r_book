title: Tail Latency Queueing Cliff
scenario: An inference service has 10 replicas, each serving 20 requests/s. Average
  arrival rate grows from 140 to 190 requests/s. Mean service time is unchanged, but
  P99 latency jumps by 5x. Diagnose why the latency jump is nonlinear.
question: Why can P99 latency jump 5x when arrival rate rises from 140 to 190 requests/s
  with 10 replicas at 20 rps each?
details:
  realistic_solution: Capacity is 200 requests/s. Utilization rises from 70% to 95%.
    Queueing delay grows nonlinearly as utilization approaches 1, so tail latency
    can explode even though mean service time is unchanged. The binding wall is the
    tail-latency/queueing wall; the exact P99 factor depends on the service-time distribution
    and queue model.
  common_mistake: Expecting latency to increase linearly with traffic and missing
    the utilization cliff near saturation.
  napkin_math: Utilization at 140 rps = 140/(10 x 20)=0.70. At 190 rps = 0.95. A simple
    1/(1-rho) intuition moves from 3.3 to 20, illustrating superlinear queueing growth
    near saturation rather than an exact P99 formula.
