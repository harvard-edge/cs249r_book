title: 'Systolic Array Design: Tiling Strategy for Large Matrix on TPU'
scenario: Design the tiling strategy for a 16384x16384 weight matrix (LLM FFN layer) that doesn't fit in a TPU v5e (16GB HBM) systolic array's local SRAM. The systolic array is 128x128 with 4MB SRAM.
question: What tile sizes, tile counts, memory transfers, and total bandwidth are needed for the 16384x16384 FFN GEMM on a 128x128 array?
details:
  realistic_solution: 'Matrix A and B are 16384x16384 BF16 = 512MB each. The 4MB SRAM cannot hold them. We must use SRAM tiling to minimize HBM traffic, while feeding the 128x128 systolic array. Output stationary dataflow is best: accumulate a large C tile in SRAM, and stream in slices of A and B. If we choose a 1024x1024 C tile, it takes 2MB of SRAM. We can stream A in 1024x256 blocks (512KB) and B in 256x1024 blocks (512KB), utilizing 3MB of the 4MB SRAM. There are (16384/1024)^2 = 256 C tiles. For each C tile, we load a 1024x16384 strip of A (32MB) and a 16384x1024 strip of B (32MB). Total HBM reads: 256 * 64MB = 16GB. Total HBM writes (C): 512MB. Total bandwidth is 16.5GB, which is optimal for a 4MB SRAM limit.'
  common_mistake: |
    **The Pitfall:** Choosing square tiles without considering the output accumulation requirements.
    **The Rationale:** Candidates forget that each tile result must be accumulated in SRAM before being written to HBM.
    **The Consequence:** Spills output partial sums to HBM continuously, causing a massive memory bandwidth bottleneck.
  napkin_math: |
    - **Matrix Size:** 16384x16384 BF16 = 512 MB each for A, B, C.
    - **C Tile Size:** 1024x1024 = 2 MB of SRAM.
    - **Total C Tiles:** (16384 / 1024)^2 = 256 tiles.
    - **HBM Reads:** 256 tiles * 64 MB (32MB A + 32MB B) = 16 GB.
    - **HBM Writes:** 512 MB for C.
    - **Total HBM Traffic:** 16.5 GB.
    - **Memory Time:** 16.5 GB / 819 GB/s = ~20.1 ms.
    - **Final Result:** **Compute takes ~44.6ms > 20.1ms memory time, so it is safely compute-bound.**
