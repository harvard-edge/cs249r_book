title: 'TCO Fluency: Compute Cost per Token at Scale'
scenario: 'At a job interview, you are asked to estimate the cost per token to serve GPT-3 (175B parameters)
  on H100 GPUs at $2.50/GPU/h. The model requires 4 H100s for FP16 inference (fits in 320GB VRAM combined).
  The H100 achieves 30% MFU for decode at batch=32, theoretical peak: 1,979 TFLOP/s. Each token requires
  approximately 2×175B = 350B FLOPs for one forward pass. Compute cost per 1M output tokens.'
question: "What is the serving cost per 1M output tokens for GPT-3 175B on 4 H100s at $2.50/GPU-hour?"
details:
  realistic_solution: 'Effective throughput per H100: 1,979 × 0.30 = 594 TFLOP/s. For 4 H100s: 4 × 594
    = 2,376 TFLOP/s. FLOPs per token: 350 B = 350 × 10⁹. Tokens per second: 2,376 × 10¹² / (350 × 10⁹)
    = 6,789 tokens/s. Cost per second: 4 GPUs × $2.50/3600s = $0.00278/s. Cost per token: $0.00278 / 6,789
    = $0.000000409 = $0.409 per 1M tokens. Current GPT-4 pricing: $10/1M → 24× markup for profit/overhead/latency
    SLA.'
  common_mistake: Using peak TFLOP/s without applying MFU; at 30% MFU the effective throughput is 594
    TFLOP/s per H100, which combined with model FLOP count gives tokens/second.
  napkin_math: 'Effective TFLOP/s: 4×1979×0.30 = 2,375 TFLOP/s. Tokens/s: 2375T/350B = 6,786 tok/s. Cost/s:
    4×$2.50/3600 = $0.00278/s. Cost/token: $0.00278/6786 = $0.41/1M tokens. Cloud markup: GPT-4 at $10/1M
    = 24× multiplier covering latency SLA, overhead, profit.'
