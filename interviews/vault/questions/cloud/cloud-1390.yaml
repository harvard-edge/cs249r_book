title: Mitigating Storage I/O Jitter in Checkpointing
scenario: You are designing the checkpointing system for a 175B parameter model training on 2048 H100 GPUs. The global model state is roughly 2.1TB. When writing directly to a centralized parallel file system (PFS), developers notice periodic extreme latency spikes (I/O jitter) pushing the P99 latency of checkpoint operations from 15 seconds up to 3 minutes, causing NCCL timeouts and idle compute.
question: Should you upgrade the PFS or implement two-stage async checkpointing for the 2.1TB state, and why?
details:
  realistic_solution: Adopt an asynchronous two-stage checkpoint architecture. Synchronously write shards to local NVMe SSDs to bypass network jitter, then asynchronously drain to durable object storage in the background.
  common_mistake: |
    **The Pitfall:** Assuming that upgrading centralized storage bandwidth will eliminate I/O jitter.
    **The Rationale:** Storage problems are traditionally solved by buying faster storage networking hardware.
    **The Consequence:** Ignoring the impact of transient network contention and distributed file system locks, leading to persistent P99 latency spikes that crash NCCL training rings.
  napkin_math: |
    - **Hardware Setup:** 2048 H100 GPUs = 256 nodes (8 GPUs/node).
    - **State Size:** 175B model state ≈ 2.1 TB.
    - **Data per Node:** 2.1 TB / 256 nodes = 8.2 GB per node.
    - **Synchronous NVMe Write:** At 5 GB/s local bandwidth, write takes 8.2 GB / 5 GB/s = **1.6 seconds** of GPU blocking time.
    - **Direct PFS Write:** P99 jitter causes blocking for ~180 seconds.
    - **Conclusion:** Two-stage async checkpointing saves **~178 seconds of idle time** across 2048 GPUs per checkpoint.
