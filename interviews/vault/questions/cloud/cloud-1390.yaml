title: Mitigating Storage I/O Jitter in Checkpointing
scenario: 'You are designing the checkpointing system for a 175B parameter model training on 2048 H100
  GPUs. The global model state is roughly 2.1TB. When writing directly to a centralized parallel file
  system (PFS), developers notice periodic extreme latency spikes (I/O jitter) pushing the P99 latency
  of checkpoint operations from 15 seconds up to 3 minutes, causing NCCL timeouts and idle compute. Evaluate
  two architectural solutions: 1) Upgrading the PFS network links to reduce congestion while increasing
  NCCL timeout thresholds, versus 2) Implementing a decentralized, asynchronous two-stage checkpointing
  system using local NVMe SSDs before migrating to object storage.'
question: "Should you upgrade the PFS or implement two-stage async checkpointing for the 2.1TB state, and why?"
details:
  realistic_solution: Adopt an asynchronous two-stage checkpoint architecture. Synchronously write shards
    to local NVMe SSDs to bypass network jitter, then asynchronously drain to durable object storage in
    the background.
  common_mistake: Assuming that upgrading centralized storage bandwidth will eliminate I/O jitter, ignoring
    the impact of transient network contention and distributed file system locks.
  napkin_math: 2048 H100 GPUs = 256 nodes (8 GPUs/node). 175B model state (FP32 master + optimizer + grads)
    ≈ 2.1TB. Data per node = 2.1TB / 256 = 8.2GB. Synchronous local NVMe write (assuming 5GB/s) takes
    8.2GB / 5GB/s = 1.6s of GPU blocking time. Direct write to PFS with P99 jitter blocks for ~180s. Two-stage
    async checkpointing saves ~178s of idle time per checkpoint across the 2048 H100s.
