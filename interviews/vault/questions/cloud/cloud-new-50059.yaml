title: CUDA Stream Priority for Communication vs Computation Scheduling
scenario: 'You have a training loop with three CUDA streams: compute (default), AllReduce (communication),
  and data prefetch (H2D transfer). All three contend for GPU resources. You observe that AllReduce sometimes
  delays compute kernels. How do you prioritize?'
question: "How do you prioritize?"
details:
  realistic_solution: 'CUDA stream priorities: (1) Compute stream: highest priority (cudaStreamCreateWithPriority,
    priority 0 = highest on NVIDIA GPUs). Compute is always on the critical path. (2) Communication stream:
    medium priority. NCCL kernels need GPU resources (for data packing/unpacking and reduction) but should
    yield to compute. (3) H2D transfer stream: lowest priority. DMA engine handles most of the transfer;
    GPU involvement is minimal. Set with: cudaStreamCreateWithPriority(&stream, cudaStreamNonBlocking,
    priority). On H100, only 2 priority levels are hardware-supported, so effectively: {high: compute,
    low: communication + prefetch}. This ensures compute kernels are never preempted by NCCL reduction
    kernels.'
  common_mistake: Setting all streams to the same priority and relying on the GPU scheduler's default
    round-robin. This can cause communication kernels to preempt compute kernels that are on the critical
    path.
  napkin_math: 'H100 has 132 SMs. NCCL AllReduce uses 8-16 SMs for reduction. Without priority: NCCL can
    steal 12% of SMs from compute. With priority: compute gets all 132 SMs, NCCL uses only idle SM slots.
    Net compute speedup: 5-12% for communication-heavy workloads.'
