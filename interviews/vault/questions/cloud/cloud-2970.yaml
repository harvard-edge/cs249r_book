title: 'Fault Tolerance: Analyze Checkpoint Frequency vs Recovery Cost on H100 Cluster'
scenario: 'You are training a 70B model on 512 H100s. The mean time between failures (MTBF) for a single node is 200 days. A checkpoint takes 8 minutes (writing 280GB model state to shared storage).'
question: 'What checkpoint interval minimizes expected lost time for the 70B training job on 512 H100s with 8-minute checkpoints?'
details:
  realistic_solution: 'Optimal checkpoint interval minimizes E[wasted time] = C/2 + C²/2×MTBF_cluster), where C = checkpoint interval, MTBF_cluster = MTBF_single / num_GPUs. Solve for C_opt = sqrt(2 × t_ckpt × MTBF_cluster) where t_ckpt = checkpoint write time.'
  common_mistake: |
    **The Pitfall:** Checkpointing too frequently or too infrequently.
    **The Rationale:** Candidates often guess an arbitrary checkpoint interval without calculating the statistical probability of cluster-wide failure versus the guaranteed overhead of writing the checkpoint.
    **The Consequence:** The cluster either spends too much time writing checkpoints or loses massive amounts of compute time when a failure inevitably occurs.
  napkin_math: |
    * **MTBF_single:** 200 days = 288,000 minutes.
    * **MTBF_cluster:** 288,000 / 512 = 562.5 minutes (9.375 hours).
    * **Checkpoint write time (t_ckpt):** 8 minutes.
    * **Optimal interval (C_opt):** sqrt(2 * t_ckpt * MTBF_cluster) = sqrt(2 * 8 * 562.5) = sqrt(9,000).
    * **Result:** **~95 minutes** optimal checkpoint interval.
    * **Expected wasted time/minute:** (47.5 + 8) / 562.5 = **9.9% overhead**.
