title: 'Fault Tolerance: Analyze Checkpoint Frequency vs Recovery Cost on H100 Cluster'
scenario: You are training a 70B model on 512 H100s (80GB HBM3, 700W). The mean time
  between failures (MTBF) for a single H100 is 200 days. A checkpoint takes 8 minutes
  (writing 280GB model state to shared storage). Analyze the optimal checkpoint interval
  to minimize expected training time lost to failures.
question: What checkpoint interval minimizes expected lost time for the 70B training
  job on 512 H100s with 8-minute checkpoints?
details:
  realistic_solution: Optimal checkpoint interval minimizes E[wasted time] = C/2 +
    C²/(2×MTBF_cluster), where C = checkpoint interval, MTBF_cluster = MTBF_single
    / num_GPUs. Solve for C_opt = sqrt(2 × t_ckpt × MTBF_cluster) where t_ckpt = checkpoint
    write time.
  common_mistake: Checkpointing too frequently (wasting GPU time) or too infrequently
    (losing hours of work on failure). Not accounting for the 512-node MTBF vs single-node
    MTBF.
  napkin_math: 'MTBF_single = 200 days = 288,000 minutes. MTBF_cluster = 288,000 /
    512 = 562.5 minutes = 9.375 hours. Checkpoint write time t_ckpt = 8 minutes. C_opt
    = sqrt(2 × 8 × 562.5) = sqrt(9,000) = 94.9 minutes ≈ 95 minutes. So checkpoint
    every ~95 minutes. Expected wasted time per failure: C_opt/2 + t_ckpt = 47.5 +
    8 = 55.5 minutes. Failure rate: 1/562.5 = 0.00178/minute. Expected wasted time/minute
    = 55.5/562.5 = 9.9% overhead.'
