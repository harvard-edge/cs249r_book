title: 'Fault Tolerance: Analyze Checkpoint Frequency vs Recovery Cost on H100 Cluster'
scenario: You are training a 70B model on 512 GPUs. The mean time between failures (MTBF) for a single GPU is 200 days. A checkpoint takes 8 minutes.
question: What checkpoint interval minimizes expected lost time for the 70B training job with 8-minute checkpoints?
details:
  realistic_solution: 'Optimal checkpoint interval minimizes E[wasted time]. Solve Daly''s formula for C_opt = sqrt(2 x t_ckpt x MTBF_cluster).'
  common_mistake: |
    **The Pitfall:** Checkpointing too frequently or too infrequently.
    **The Rationale:** Candidates arbitrarily guess intervals without calculating the statistical probability of cluster failure.
    **The Consequence:** The cluster either wastes time writing checkpoints or loses massive compute time when failures occur.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MTBF_single: 200 days = 288,000 minutes.
       - 512 GPUs.
       - Checkpoint write time: 8 minutes.
    2. **Calculations:**
       - MTBF_cluster = 288,000 / 512 = 562.5 minutes.
       - C_opt = sqrt(2 * 8 * 562.5) = sqrt(9,000) =~ 95 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: Checkpoint-Bound optimization. ~95 minutes is the optimal checkpoint interval.**
