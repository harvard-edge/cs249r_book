title: LLM Serving Inversion Trade-offs
scenario: You are deploying a 7B parameter LLM for a chatbot on an AWS instance (24GB VRAM, 600 GB/s bandwidth). During training, static batch size of 128 was used. The SLA requires Time-to-First-Token (TTFT) < 200ms and Inter-Token Latency < 50ms.
question: How should batching and scheduling change to meet TTFT <200ms and inter-token latency <50ms for the 7B LLM?
details:
  realistic_solution: Implement continuous batching (iteration-level scheduling) and drastically reduce the maximum batch size. Prioritize metrics like latency-bounded throughput. Cap the batch size at a small number (e.g., 4-16) where the total time for the memory-bound weight read and compute does not exceed the 50ms inter-token SLA.
  common_mistake: |
    **The Pitfall:** Retaining large static batch sizes or standard dynamic batching to maximize hardware utilization.
    **The Rationale:** Candidates rely on training-optimized setups, failing to recognize that large batches in autoregressive generation cause tail latency spikes.
    **The Consequence:** The system vastly exceeds the strict 50ms per-token latency SLA, rendering the chatbot unresponsive to users.
  napkin_math: |
    1. For a 7B model in FP16, weights consume 14GB.
    2. On a GPU with 600 GB/s bandwidth, reading weights for one generation step takes 14 GB / 600 GB/s = 23.3ms.
    3. With a 50ms SLA, only ~26ms remains for compute and KV cache reads.
    4. A batch size of 128 requires ~1.8 TFLOPs per step; even if compute-bound, this pushes the step time over 50ms.
    **Batch size must be tightly capped to ensure weight read and compute times fit within 50ms.**
