title: LLM Serving Inversion Trade-offs
scenario: 'You are deploying a 7B parameter LLM for a customer support chatbot on an AWS g5.2xlarge instance
  (1x A10G, 24GB VRAM, 600 GB/s bandwidth). During training, the team used a static batch size of 128
  to maximize GPU utilization and throughput. Now, the product manager mandates a strict Service Level
  Agreement (SLA): Time-to-First-Token (TTFT) < 200ms and Inter-Token Latency < 50ms. Evaluate the architectural
  and configuration changes required to transition from the throughput-optimized training setup to this
  latency-constrained serving environment, specifically justifying your batching and scheduling strategy.'
question: "How should batching and scheduling change to meet TTFT <200ms and inter-token latency <50ms for the 7B LLM on one A10G?"
details:
  realistic_solution: Implement continuous batching (iteration-level scheduling) and drastically reduce
    the maximum batch size. Prioritize metrics like latency-bounded throughput. Cap the batch size at
    a small number (e.g., 4-16) where the total time for the memory-bound weight read and compute does
    not exceed the 50ms inter-token SLA.
  common_mistake: Candidates often suggest retaining large static batch sizes or standard dynamic batching
    to maximize hardware utilization, failing to recognize that large batches in autoregressive generation
    cause tail latency spikes that violate strict per-token latency SLAs.
  napkin_math: For a 7B model in FP16, weights consume 14GB. On an A10G (600 GB/s bandwidth), reading
    weights for one generation step takes 14 GB / 600 GB/s = 23.3ms. With a 50ms SLA, only ~26ms remains
    for compute and KV cache reads. A batch size of 128 would require ~1.8 TFLOPs per step; even if compute-bound,
    this pushes the step time well over 50ms when combined with KV cache memory traffic. Thus, batch size
    must be tightly capped to satisfy the serving inversion.
