title: Why Transformers Need Positional Encoding
scenario: Explain why a Transformer without positional encoding treats 'the cat sat on the mat' identically
  to 'mat the on sat cat the' — and why this is architecturally inevitable.
question: "Why does a Transformer without positional encoding treat word-order permutations as equivalent, and why is this architecturally inevitable?"
details:
  realistic_solution: 'Self-attention computes pairwise similarity scores between ALL token pairs simultaneously
    via Q×K^T. This operation is permutation-equivariant: swapping the order of input tokens simply permutes
    the rows and columns of the attention matrix, producing the same set of attention-weighted values
    (just reordered). Without positional information, the attention mechanism has no way to distinguish
    ''cat'' in position 2 from ''cat'' in position 5. The architecture processes tokens as an unordered
    SET, not a SEQUENCE. Positional encoding fixes this by adding position-dependent signals to each token''s
    embedding before attention computation. Sinusoidal encodings use fixed frequency patterns: PE(pos,2i)
    = sin(pos/10000^(2i/d)). This gives each position a unique signature that attention can learn to interpret.
    The key insight: attention provides content-based addressing; positional encoding provides position-based
    addressing. Both are needed for sequence understanding.'
  common_mistake: Believing the embedding layer provides position information. Token embeddings encode
    what a word means, not where it appears. Position encoding is a separate, explicit mechanism.
  napkin_math: 'Attention: O(n²d) computation over n tokens. Without PE: f(permute(x)) = permute(f(x))
    — output is order-independent. PE breaks this symmetry.'
