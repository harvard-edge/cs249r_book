title: Diagnosing Bottlenecks in LLM Serving
scenario: 'You are managing a fleet of 8x H100 GPUs serving a 70B parameter LLM using continuous batching.
  During peak traffic, metrics show severe degradation: Time-To-First-Token (TTFT) spikes for new requests
  with long prompts, while Time-Between-Tokens (TBT) for ongoing generations stutters significantly when
  batched alongside those long prefills. Analyze the root cause of this resource contention between phase
  types and determine why the unified batching architecture fails to saturate hardware efficiently.'
details:
  realistic_solution: Implement prefill-decode disaggregation (e.g., Splitwise or DistServe architecture).
    Route prompt processing to a 'Prefill Pool' to saturate compute, then transfer the generated KV cache
    over the network to a 'Decode Pool' that runs at very large batch sizes to maximize memory bandwidth
    utilization.
  common_mistake: Assuming that increasing the overall batch size or tuning the continuous batching scheduler's
    token limit will solve the issue, failing to recognize that prefill and decode phases have fundamentally
    conflicting hardware bottlenecks.
  napkin_math: Prefill Arithmetic Intensity (AI) = 2 * 70B params * 4000 tokens / 140GB weights = ~4000
    FLOPs/byte (Compute-bound). Decode AI = 2 * 70B * 1 token / 140GB = ~1 FLOP/byte (Memory-bound). Forcing
    a memory-bound decode to wait for a compute-bound prefill (e.g., taking 500ms) causes severe TBT jitter.
