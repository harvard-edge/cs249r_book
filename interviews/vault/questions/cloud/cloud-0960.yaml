title: Optimal Checkpoint Frequency for LLM Training
scenario: You are training a 100B parameter LLM using mixed precision. The total checkpoint size, including
  model weights and FP32 Adam optimizer states, is 1.6 TB. Your training cluster is connected to a shared
  object storage system with an effective aggregated write bandwidth of 80 GB/s. The cluster experiences
  hardware failures with a Mean Time Between Failures (MTBF) of 24 hours. Calculate the mathematically
  optimal checkpointing interval to minimize overall training time.
details:
  realistic_solution: Apply Young's formula (T = sqrt(2 * Tc * MTBF)) to balance the guaranteed time spent
    writing checkpoints against the probabilistic time wasted recalculating lost work after a failure.
  common_mistake: Arbitrarily choosing a checkpoint interval (like 'every epoch' or 'every hour') or ignoring
    the write overhead time entirely, which leads to either excessive storage I/O or massive lost compute
    upon failure.
  napkin_math: Checkpoint Time (Tc) = 1600 GB / 80 GB/s = 20 seconds. MTBF (M) = 24 hours = 86400 seconds.
    Optimal Interval (T) = sqrt(2 * Tc * M) = sqrt(2 * 20 * 86400) = sqrt(3,456,000) ≈ 1859 seconds (approx
    31 minutes).
