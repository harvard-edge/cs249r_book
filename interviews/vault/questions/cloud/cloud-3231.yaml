title: KV-Cache Scaling with Context Length Doubling
scenario: GPT-4 extended its context from 8K to 128K tokens. For a model with 96 layers,
  8 GQA KV heads, and head dimension 128, explain how doubling context length affects
  KV-cache memory, decode latency, and maximum batch size.
question: How does doubling context length affect KV-cache memory, decode latency,
  and maximum batch size for the 96-layer GQA model?
details:
  realistic_solution: 'Doubling context length (e.g., 64K → 128K): (1) KV-cache memory:
    doubles linearly. Per token: 2 × 8 × 128 × 2B × 96 = 384 KB. At 64K: 24.6 GB.
    At 128K: 49.2 GB. On H100 (80 GB - 30 GB weights = 50 GB for KV): 64K barely fits
    (24.6 GB), 128K needs 49.2 GB — only 1 concurrent request. (2) Decode latency:
    each new token must attend to all previous KV entries. Attention computation per
    layer: loading KV-cache of 128K × 8 × 128 × 2B = 256 MB per layer. At 3.35 TB/s:
    256 MB / 3.35 TB/s = 76 μs per layer × 96 layers = 7.3 ms just for KV-cache loading.
    At 64K: 3.65 ms. Doubles. (3) Maximum batch size: halves. If 50 GB supports 2
    requests at 64K, it supports only 1 at 128K. (4) Prefill compute: quadratic —
    attention for 128K tokens is 4× more FLOPs than 64K (O(n²) attention). All three
    costs — memory, decode bandwidth, prefill compute — argue for efficient attention
    mechanisms at long contexts.'
  common_mistake: Only considering memory scaling. Context doubling also doubles the
    attention computation time per decode step (linear in sequence length for decode)
    and halves maximum batch size (if memory-constrained).
  napkin_math: 'KV per token (96 layers): 384 KB. 64K context: 24.6 GB. 128K: 49.2
    GB (2×). Decode KV bandwidth per step: 128K × 384 KB = 49.2 GB / 3.35 TB/s = 14.7
    ms (96 layers). Prefill: O(n²), 128K = 4× cost of 64K.'
