title: Handling Low Agreement in Production Labeling
scenario: 'Your team measures κ=0.45 (moderate) for a 10-class intent classification task. Labeling 50K samples costs $200K. Option A: relabel disagreements with expert adjudicators (+$80K). Option B: accept noisy labels and train with label smoothing. Option C: reduce to 6 classes (merge confusable intents) expecting κ=0.75.'
question: 'Which strategy is optimal: relabeling, label smoothing, or reducing the number of classes?'
details:
  realistic_solution: 'Option C is likely optimal. κ=0.45 on 10 classes means annotators fundamentally cannot distinguish certain intents — no amount of relabeling fixes an ambiguous taxonomy. Option A ($80K for adjudication) fixes surface disagreements but if the label schema itself is ambiguous, experts will also disagree. You spend $80K and may only reach κ=0.55. Option B (noisy labels + label smoothing) is cheap but trains the model on confused signal — the model inherits the annotators'' confusion, and label smoothing just prevents overconfidence without fixing the underlying issue. Option C addresses the root cause: merge intents that humans cannot distinguish (e.g., ''complaint'' vs ''negative feedback''). κ=0.75 means cleaner training signal, likely yielding better real-world accuracy with 6 reliable classes than 10 noisy ones.'
  common_mistake: |
    **The Pitfall:** Throwing more money at labeling to fix low agreement.
    **The Rationale:** Teams assume that paying expert adjudicators will resolve label noise.
    **The Consequence:** If the root cause is an ambiguous taxonomy, experts will also disagree. Money is wasted, and the model continues to train on confused signals.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 classes have κ=0.45.
    - Option A costs $80K.
    - Option C merges classes to yield κ=0.75.

    **Calculations:**
    - κ=0.45 on 10 classes yields ~55% reliable labels.
    - κ=0.75 on 6 classes yields ~80% reliable labels.

    **Conclusion & Interpretation:**
    - **Result: ~80% reliable labels (Taxonomy-Bound)**. Option C yields ~80% reliable labels without the wasted $80K cost of Option A.
