title: The MFU vs HFU Confusion
scenario: Your team reports that their GPT-3 175B training run achieves a '62% GPU utilization' on a cluster of 1,024 A100s. You ask whether this is Model FLOPS Utilization (MFU) or Hardware FLOPS Utilization (HFU), and they do not know the difference.
question: Why does the distinction between MFU and HFU matter, and which metric should you trust for comparing training configurations?
details:
  realistic_solution: 'MFU counts only the useful FLOPs (theoretical compute needed for one forward + backward pass). HFU counts all FLOPs executed on hardware, including recomputed activations. If activation checkpointing recomputes 33% of the forward pass, HFU = MFU x 1.33 for the compute portion. MFU is the correct metric for comparing training efficiency across configurations because it normalizes for implementation choices like checkpointing depth.'
  common_mistake: |
    **The Pitfall:** Treating MFU and HFU as interchangeable, or using `nvidia-smi` utilization.
    **The Rationale:** Candidates fail to distinguish between theoretical useful FLOPs (MFU) and total hardware FLOPs executed including recomputation (HFU).
    **The Consequence:** Misinterpreting training efficiency and making suboptimal configuration choices.
  napkin_math: |
    - **Model FLOPs:** GPT-3 175B requires ~314 PFLOPs per forward+backward pass (approx 6 × N × tokens).
    - **Hardware Peak:** 1,024 A100s (312 TFLOPS FP16 each) provide a peak of 319.5 PFLOPS.
    - **Step Time:** If MFU = 47%, step time = 314 PFLOPs / (0.47 × 319.5 PFLOPS) ≈ 2.09s.
    - **Hardware FLOPs (HFU):** With ~33% recompute from activation checkpointing, actual hardware FLOPs = 314 × 1.33 = 417.6 PFLOPs.
    - **HFU Calculation:** (417.6 PFLOPs / 2.09s) / 319.5 PFLOPS ≈ 62.5% ≈ 62%.
    - **Result:** The ~15% gap means roughly **24% of the hardware's work** is wasted on recomputation.
  options:
  - MFU and HFU are identical metrics with different names used by different frameworks (MFU by Megatron, HFU by DeepSpeed); the 62% figure is valid regardless of which term you use
  - MFU (Model FLOPS Utilization) measures useful model FLOPs/s / peak hardware FLOPs/s. HFU (Hardware FLOPS Utilization) counts all FLOPs including activation recomputation. The reported 62% is likely HFU; true MFU ≈ 47%. MFU is the better metric because it normalizes out implementation choices.
  - HFU is always higher than MFU because it measures GPU utilization via nvidia-smi, which includes memory operations; MFU only counts compute operations. Use HFU for hardware procurement decisions
  - The distinction only matters for inference, not training; during training both metrics converge because there is no recomputation.
  correct_index: 1
