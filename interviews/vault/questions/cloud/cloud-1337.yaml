title: Evaluating Graph Tracing Failures in Dynamic Routing Models
scenario: Your team is deploying a Mixture-of-Experts (MoE) language model on a cluster of H100 GPUs.
  To reduce token generation latency, an engineer optimizes the model using graph tracing (`torch.jit.trace`
  or equivalent) with a batch of standard, safe prompts. This successfully reduces p99 token latency from
  55ms to 22ms. However, in production, complex queries that should trigger a fallback safety classifier
  branch are failing silently and generating toxic outputs, despite the model passing all unit tests perfectly
  in eager execution mode. Evaluate the fundamental limitations of the tracing approach for this architecture
  and justify an alternative compilation strategy.
question: "Why did graph tracing remove the MoE safety fallback in production, and what compilation strategy should replace it?"
details:
  realistic_solution: Diagnose that graph tracing recorded only the standard execution path, permanently
    excising the safety classifier branch from the static graph. The correct strategy is to replace tracing
    with script-based JIT compilation (which parses the Python AST to preserve branching) or rewrite the
    Python `if/else` logic using framework-native control flow primitives (e.g., `jax.lax.cond` or `torch.cond`)
    that can be correctly represented in the compiled graph.
  common_mistake: Candidates often blame memory corruption, MoE router race conditions, or inadequate
    CUDA graph warm-ups. They fail to realize that tracing silently unrolls and 'bakes in' only the execution
    path of the dummy input, completely stripping away unexecuted Python control flow like the safety
    fallback.
  napkin_math: Eager latency = 55ms. Traced standard path latency = 22ms. Safety classifier compute =
    15ms. By tracing with safe inputs, the compiler hardcoded the 22ms path. Complex queries (5% of traffic)
    are forced down this path instead of the required (22ms + 15ms = 37ms) safety path, yielding a 100%
    failure rate on toxic inputs while falsely appearing as a 60% latency improvement.
