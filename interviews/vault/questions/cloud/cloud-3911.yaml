title: MLIR as a Universal Compiler IR for ML Portability
scenario: Google's MLIR framework is used by both XLA and IREE. A colleague claims MLIR will magically solve portability, allowing zero-cost deployment to 3 new custom AI chips. You must estimate the real engineering effort. Instead of writing 3 complete compilers from scratch (which would take ~3 engineers each, 9 total), you leverage MLIR's shared dialects.
question: How many engineers are required to support the 3 new hardware targets using MLIR, assuming 2 engineers maintain shared MLIR infrastructure?
details:
  realistic_solution: 'MLIR is a compiler infrastructure, not a portable runtime like JVM. It provides reusable intermediate representations (dialects) and optimization passes, but you still must write target-specific backends for each new chip. With 2 shared infrastructure engineers and 1 target-specific engineer per chip (3 total), the required staffing is 5 engineers.'
  common_mistake: 'Treating MLIR as a write-once-run-anywhere binary format. Engineers wrongly assume 0 headcount is needed for new targets. In reality, MLIR only reduces the redundant frontend/mid-end work, leaving the target-specific backend work.'
  napkin_math: 'Traditional approach: 3 targets × 3 engineers/compiler = 9 engineers. MLIR approach: 2 shared infra engineers + (3 targets × 1 backend engineer/target) = 5 engineers. MLIR reduces the team size from 9 to 5, saving 4 engineers, but the effort is not zero.'
