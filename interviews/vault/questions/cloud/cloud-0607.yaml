title: The HBM3e Bandwidth Ceiling
scenario: Your team just got a cluster of H200 GPUs with 4.8 TB/s HBM3e, up from the H100's 3.35 TB/s. Your manager expects a 43% speedup across all workloads. After benchmarking, some models got the full speedup while others saw zero improvement.
question: "Which workloads actually benefit from the extra bandwidth, and which don't?"
details:
  realistic_solution: Only memory-bound workloads benefit. The key is the arithmetic intensity relative to the roofline ridge point. The H100 ridge point is $989 \text{ TFLOPS} / 3.35 \text{ TB/s} \approx 295 \text{ Ops/Byte}$. The H200 ridge point (same compute, more bandwidth) is $989 / 4.8 \approx 206 \text{ Ops/Byte}$. Any workload with arithmetic intensity below 295 but above 206 was memory-bound on H100 and becomes compute-bound on H200 — these see the full 43% gain. Workloads already above 295 (large-batch GEMM training) see nothing. Workloads far below 206 (LLM decode at $I \approx 1$) see the full 43% because they remain deep in the bandwidth-limited regime.
  common_mistake: |
    **The Pitfall:** Assuming "more bandwidth means everything runs faster."
    **The Rationale:** Candidates confuse memory-bound regimes with compute-bound regimes.
    **The Consequence:** Hardware upgrades are deployed for workloads that cannot utilize them, resulting in wasted capital.
  napkin_math: |
    - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s ≈ 295 Ops/Byte.
    - H200 Ridge Point: 989 TFLOPS / 4.8 TB/s ≈ 206 Ops/Byte.
    - **Only workloads with arithmetic intensity between 206 and 295, or below 206 (like LLM decode), see the full 43% speedup.**
