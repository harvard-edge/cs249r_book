title: Diagnosing Microservice Serving Tax
scenario: 'A distributed recommender system pipeline consists of three microservices: a CPU Tokenizer,
  a GPU Embedding Service (producing 2048-dim float32 vectors), and a GPU Ranking Service. Services communicate
  over 10GbE using JSON over REST. The pure GPU compute takes 20ms total, but the end-to-end p99 latency
  is 85ms (failing the 50ms SLA). Network ping between instances is 0.2ms. As the tech lead, analyze the
  telemetry to diagnose the root cause of this latency bloat.'
details:
  realistic_solution: Identify JSON serialization of dense floating-point arrays as the primary bottleneck.
    Replace REST/JSON with gRPC and Protobufs (or FlatBuffers) for zero-copy binary serialization, and
    co-locate the Tokenizer and Embedding services to eliminate a network hop.
  common_mistake: Candidates often blame network bandwidth limits (10GbE) or TCP queueing delays, proposing
    expensive network hardware upgrades instead of investigating the CPU-bound data serialization overhead.
  napkin_math: A 2048-dim float32 vector is 8KB raw data. Serializing 8KB of floats to a JSON string in
    Python takes ~8ms; deserializing takes ~6ms. The hop transmitting embeddings (Embedding to Ranking)
    incurs 1 encode + 1 decode = 14ms of CPU-bound serialization overhead. Tokenizer to Embedding sends
    small integer tokens (negligible size). HTTP framing for the two hops adds ~10ms. Total Serving Tax
    ≈ 24ms. Compute (20ms) + Tax (24ms) = 44ms baseline, which easily stretches to 85ms p99 under concurrent
    load.
