title: Tail Latency Amplification in Multi-Stage H100 Pipeline
scenario: A 4-stage inference pipeline runs on H100 GPUs. Each stage has p99 latency of 50ms. The pipeline
  coordinator reports end-to-end p99 of 220ms — roughly 4× the per-stage p99. A junior engineer argues
  this means each stage contributes independently. Explain tail latency amplification and why a 4-stage
  pipeline does not have p99=50ms.
details:
  realistic_solution: 'In a sequential pipeline, end-to-end latency = sum of per-stage latencies. If each
    stage has p99=50ms but mean=30ms, end-to-end mean=120ms. p99 end-to-end ≈ p99_stage × stages only
    if stages are independent and identical: 4×50=200ms. Adding scheduling jitter and head-of-line blocking
    at each queue easily reaches 220ms. Mitigation: hedged requests, speculative execution, or reducing
    stage count.'
  common_mistake: Treating pipeline stages as independent; summing means instead of modeling the max of
    correlated or independent tails.
  napkin_math: 4 stages × p99_stage=50ms = 200ms — an upper-bound estimate for sequential pipeline p99
    (the true p99 is less than this sum for independent stages). Jitter adds 10-20% → 220ms observed.
    Mean is 4×30=120ms so mean/p99 ratio=1.8× is normal.
