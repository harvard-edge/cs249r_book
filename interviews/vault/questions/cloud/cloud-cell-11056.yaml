title: 'Fault Tolerance: Implement Checkpoint Size Calculation for Mixed-Precision Training'
scenario: You are implementing checkpointing for a 13B parameter model trained with ZeRO-2 on 64 H100s
  (80GB HBM3). The model uses bf16 parameters and fp32 master weights, AdamW optimizer. Calculate the
  exact checkpoint size per rank and total, and verify it fits within your 100GB per-node NVMe budget.
question: "What are the per-rank and total checkpoint sizes for the 13B ZeRO-2 job, and do they fit within 100GB of NVMe per node?"
details:
  realistic_solution: 'ZeRO-2: parameters bf16 = 13B × 2B = 26GB (replicated on all ranks). Optimizer
    state (sharded): fp32 params + fp32 momentum + fp32 variance = 3 × 13B × 4B / 64 ranks = 2.44GB/rank.
    Full checkpoint/rank = 26GB + 2.44GB + gradient buffer (bf16, sharded) = 29.06GB.'
  common_mistake: Forgetting that ZeRO-2 shards optimizer state but NOT model parameters — all ranks store
    full bf16 parameters. Not accounting for fp32 master weights in the checkpoint.
  napkin_math: 'Parameters (bf16, full replica): 13B × 2B = 26GB per rank. Optimizer state (fp32, ZeRO-2
    sharded across 64 ranks): fp32 weights 13B×4B/64 = 813MB. fp32 momentum: 813MB. fp32 variance: 813MB.
    Total optimizer/rank: 2.44GB. Gradient buffer (bf16, sharded): 13B×2B/64 = 406MB. Misc (scheduler,
    step, RNG state): ~10MB. Total per rank: 26 + 2.44 + 0.406 + 0.01 = 28.86GB. Within 100GB NVMe budget.
    Total checkpoint: 64 ranks × (2.44 + 0.406) = 182GB optimizer/grad + 26GB params (de-dup) = 208GB
    total. Alternative: store params once from rank 0 + per-rank optimizer = 26 + 182 = 208GB. Lustre
    write at 200 GB/s: 208GB / 200 = 1.04 seconds (parallel write).'
