title: Applying Error Feedback in Top-k Gradient Sparsification
scenario: You are implementing distributed training for a 7B parameter LLM on 64 A100 GPUs using Top-k
  gradient sparsification (k=1%). A specific weight gradient component computes an initial value of 0.04.
  The sparsification threshold for the top 1% is 0.05, so this gradient is zeroed out and not transmitted
  over the network. In the next step, the local gradient calculation for this component yields 0.02. Calculate
  the value of the error-compensated gradient for this component if error feedback is used, determine
  if it will be transmitted (assuming the threshold remains 0.05), and calculate the total memory overhead
  of storing the error feedback tensor per GPU in FP16.
details:
  realistic_solution: With error feedback, the untransmitted gradient (0.04) is stored as the residual.
    In the next step, the new gradient (0.02) is added to the residual, resulting in an error-compensated
    gradient of 0.06. Since 0.06 > 0.05 (the threshold), it is transmitted, and the new residual for this
    coordinate becomes 0. Storing the error feedback tensor for a 7B parameter model in FP16 requires
    14 GB of additional VRAM per GPU.
  common_mistake: Candidates often forget that error feedback requires storing an additional tensor of
    the same size as the model, failing to account for the memory overhead, or they fail to add the accumulated
    error to the *new* gradient before applying the sparsification mask.
  napkin_math: 'Step 1: Compensated = 0.04. Threshold = 0.05. Transmitted = 0. Residual = 0.04.

    Step 2: Compensated = 0.02 (new) + 0.04 (residual) = 0.06.

    0.06 > 0.05 threshold -> Transmit 0.06. New residual = 0.

    Memory overhead: 7 * 10^9 parameters * 2 bytes/param (FP16) = 14 GB.'
