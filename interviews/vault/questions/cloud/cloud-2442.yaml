title: The MoE Memory Bandwidth Tax
scenario: A team replaces a 40B dense model with an 8x40B MoE model (Top-1 routing, 40B active parameters
  per token). Both models require ~80 GFLOPs per token. They are deployed on an 8x H100 cluster (3.35
  TB/s per GPU). At batch size 128, the dense model achieves 500 tokens/sec. The team expects the MoE
  to match this since the active compute is identical. Instead, MoE throughput drops to roughly 120 tokens/sec.
question: "Why does the 8x40B MoE with the same active FLOPs as the 40B dense model drop from 500 to 120 tokens/sec?"
details:
  realistic_solution: Throughput at batch size 128 is determined by the roofline model. The dense 40B
    model loads 80GB of weights, yielding a high arithmetic intensity. The MoE model has 320B total parameters
    (640GB). At BS=128, tokens are distributed across all 8 experts, meaning the GPUs must load almost
    the entire 640GB of weights from HBM to process the batch. The arithmetic intensity plummets, shifting
    the workload deep into the memory-bound region and drastically reducing attainable throughput.
  common_mistake: Assuming that equal active FLOPs implies equal throughput, ignoring the severe arithmetic
    intensity drop caused by loading multiple experts.
  napkin_math: H100 Ridge Point = 989 TFLOPS / 3.35 TB/s = 295 FLOPs/Byte. Dense AI = (128 tokens * 80
    GFLOPs) / 80 GB = 128 FLOPs/Byte. MoE AI (assuming all experts loaded) = (128 tokens * 80 GFLOPs)
    / 640 GB = 16 FLOPs/Byte. Dense Attainable = 3.35 TB/s * 128 = 428 TFLOPS. MoE Attainable = 3.35 TB/s
    * 16 = 53 TFLOPS. The MoE is processing at 1/8th the compute efficiency.
