title: TPU v5e Inference Load Balancing Basics
scenario: You are designing an inference serving system utilizing Google TPU v5e devices. The system needs to efficiently handle a stream of incoming inference requests that may vary significantly in their computational demands.
question: What basic load balancing algorithms would you use to distribute variable inference requests across TPU v5e instances?
details:
  realistic_solution: |
    For basic distribution of inference traffic across a fleet of TPU v5e instances, two fundamental load balancing algorithms are Round Robin (for even distribution over time assuming uniform request weights) and Least Connections (to direct new requests to the TPU with the fewest active connections or outstanding requests). Least Connections is architecturally superior for generative LLMs due to dynamic batching and variable sequence lengths.
  common_mistake: |
    **The Pitfall:** Relying solely on simple Round-Robin load balancing for heterogeneous inference traffic.
    **The Rationale:** Candidates assume all inference requests cost the same amount of time, ignoring that variable sequence lengths or dynamic batching create heavily skewed processing times.
    **The Consequence:** Long-running requests clump on specific TPUs, creating massive tail latency bottlenecks while other TPUs sit idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10 TPUs.
    - Baseline processing rate: 100 req/s per TPU.
    - Inference demand is highly variable.

    **Calculations:**
    - Ideal fleet throughput: 10 TPUs * 100 req/s = 1000 req/s.
    - Imbalance event: A request arrives that takes 10x longer to process.
    - Round-Robin allocation: Continues to route 1/10th of traffic to the blocked TPU, causing its queue to grow linearly while others drain.

    **Conclusion & Interpretation:**
    - **Result: Head-of-Line Blocking.** Round-Robin drops effective fleet throughput drastically because the bogged-down TPU becomes a bottleneck. Least Connections dynamically routes away from the blocked node, maintaining near 1000 req/s.
