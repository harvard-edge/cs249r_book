title: Quantifying Glue Code Maintenance Cost
scenario: An ML service has 500 lines of model code and 8,000 lines of glue code. Bug fix rate: 0.5 bugs/month per 1,000 lines of model code, 3.0 bugs/month per 1,000 lines of glue code. Each model bug takes 2 hours; each glue bug takes 4 hours.
question: How many monthly maintenance hours come from the 500 lines of model code and 8,000 lines of glue code?
details:
  realistic_solution: 'Model bugs: 0.5 bugs/1000 lines × 0.5K lines = 0.25 bugs/month × 2 hours = 0.5 hours/month. Glue bugs: 3.0 bugs/1000 lines × 8K lines = 24 bugs/month × 4 hours = 96 hours/month. Total: 96.5 hours/month, of which 99.5% comes from glue code. This illustrates why glue code is the primary maintenance burden: it has 6x higher bug density (3.0 vs 0.5 per 1000 lines) because it lacks the testing rigor of the ML library, AND each bug takes 2x longer to fix because glue code bugs often involve complex interactions between systems (data format mismatches, API version incompatibilities, timing issues). At $100/hour engineer cost: glue code costs $9,600/month = $115,200/year in maintenance alone.'
  common_mistake: |
    **The Pitfall:** Focusing optimization efforts on the 500 lines of model code (hyperparameter tuning, architecture changes) while ignoring the 8,000 lines of glue code.
    **The Rationale:** Glue code has a much higher bug density because it lacks the testing rigor of ML libraries, and bugs take longer to fix because they involve complex system interactions.
    **The Consequence:** Engineering resources are drained by maintenance burdens while the core model code remains practically untouched.
  napkin_math: |
    - Model bugs: 0.5 bugs/1000 lines × 0.5K lines = 0.25 bugs/month.
    - Model maintenance: 0.25 bugs/month × 2 hours = 0.5 hours/month.
    - Glue bugs: 3.0 bugs/1000 lines × 8K lines = 24 bugs/month.
    - Glue maintenance: 24 bugs/month × 4 hours = 96 hours/month.
    - Total: 96.5 hours/month.
    - **Result:** **Glue code accounts for 99.5% of the maintenance burden despite being 94% of the codebase.**
