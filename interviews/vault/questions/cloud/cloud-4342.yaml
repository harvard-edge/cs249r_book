title: Privacy Amplification via Subsampling in Production
scenario: Your DP training pipeline on 10M user records uses minibatch SGD with batch size 1,000. The privacy team says you can improve your ε by 10x 'for free' via subsampling amplification. A junior engineer proposes sampling without replacement instead of with replacement.
question: Does this claim hold, and what are the implementation pitfalls in a distributed multi-GPU training context?
details:
  realistic_solution: 'Privacy amplification via Poisson subsampling gives ε_amplified ≈ q*ε_base where q = B/N = 1000/10M = 0.0001. So ε effectively reduces by ~10,000x, not 10x. The 10x claim is conservative. However, in distributed training across 8 GPUs, each GPU seeing a shard is NOT equivalent to Poisson sampling over the full dataset — it''s stratified sampling. You must implement global Poisson sampling before sharding, not per-GPU sampling. Implementation: use a cryptographically random inclusion mask over all N examples before each step, then distribute included examples across GPUs.'
  common_mistake: |
    **The Pitfall:** Assuming sampling without replacement gives the same amplification as Poisson subsampling.
    **The Rationale:** Candidates do not realize that the moments accountant and Rényi DP amplification theorems are strictly proven for Poisson sampling (each example included independently with probability q=B/N).
    **The Consequence:** Using without-replacement sampling requires tighter analysis and yields significantly weaker formal privacy amplification bounds, potentially violating compliance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset (N): 10,000,000.
       - Batch size (B): 1,000.
       - Steps (T): 100,000.
    2. **Calculations:**
       - Poisson subsampling ratio (q) = 1,000 / 10,000,000 = 1e-4.
       - Amplification factor: ε_eff ≈ q * ε_base.
       - With subsampling (q = 1e-4): ε_total ≈ q * σ⁻¹ * sqrt(2T * ln(1/δ)). Example: 1e-4 * (1/1.1) * sqrt(2 * 100k * 11.5) ≈ 0.138.
       - Without subsampling (q = 1): ε ≈ 0.138 / 1e-4 = 1,380.
    3. **Conclusion & Interpretation:** **Poisson subsampling mathematically yields a 10,000x gap in the privacy budget. Sampling without replacement invalidates these Rényi DP proofs.**
