title: Diagnosing Multi-Tenant GPU Power Side-Channel Leaks
scenario: You are investigating a data leak in a multi-tenant cloud environment using NVIDIA A100 GPUs partitioned via MIG. A tenant claims their proprietary LLM layer architecture was inferred by a co-tenant who has no logical access to the host OS, network, or the victim's memory space. The host allows all tenants to query NVML telemetry at 1kHz. You notice that dense 4096x4096 matrix multiplications draw 300W, while smaller 4096x1024 operations draw 210W.
question: What caused the MIG tenant's architecture leak through NVML telemetry, and how would you mitigate it?
details:
  realistic_solution: |
    The attacker used high-resolution NVML power readings to fingerprint the victim's sequence of operations by correlating power spikes with specific tensor shapes. Mitigate this by heavily downsampling NVML metrics (e.g., to 1Hz) for unprivileged tenants or adding artificial noise to power readings.
  common_mistake: |
    **The Pitfall:** Assuming MIG or containerization provides complete physical isolation.
    **The Rationale:** Engineers ignore that aggregate GPU power telemetry is a shared physical resource that leaks state.
    **The Consequence:** The environment remains vulnerable to side-channel architecture extraction.
  napkin_math: |
    - Layer A takes 2ms at 300W, and Layer B takes 1ms at 210W.
    - Sampling at 1kHz (1ms) yields the array [300, 300, 210], fully exposing the architecture.
    - **Conclusion:** **Restricting telemetry to 1Hz (1000ms) averages this out over thousands of operations, destroying the distinct power signature.**
