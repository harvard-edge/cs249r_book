title: Rack-Level UPS Sizing and Power Factor Correction for GPU Servers
scenario: You are specifying a UPS system for a new rack containing three 8×H100 nodes. Each node has
  a nameplate rating of 10.5 kVA (kilo-volt-amperes) despite drawing only 8 kW. The rack also includes
  a top-of-rack switch (0.5 kVA) and two management servers (1.0 kVA each). Calculate the required UPS
  capacity in kVA, explain why the kVA rating exceeds kW for GPU servers, and determine the power factor
  correction benefit.
question: "What UPS capacity is needed for the rack with three 10.5 kVA H100 nodes, why does kVA exceed kW, and what does power factor correction save?"
details:
  realistic_solution: 'GPU node kVA: 3 × 10.5 kVA = 31.5 kVA. Switch: 0.5 kVA. Mgmt servers: 2 × 1.0 =
    2.0 kVA. Total: 34.0 kVA. With 20% headroom: 34.0 × 1.2 = 40.8 kVA. Specify 40 or 50 kVA UPS. Power
    factor: kW = kVA × PF. At PF = 0.92, kW = 34 × 0.92 = 31.28 kW (vs 24 kW IT load). The apparent power
    gap is due to reactive current from switching power supplies. Active Power Factor Correction (APFC)
    in modern PSUs brings PF to 0.99, reducing the kVA requirement. With APFC at PF=0.99: kVA needed =
    24 kW / 0.99 = 24.24 kVA (vs 34 kVA traditional). 29% reduction in UPS sizing cost.'
  common_mistake: Specifying UPS capacity based solely on kW (active power) and ignoring apparent power
    (kVA). UPS units are rated in kVA, and undersizing by using kW leads to UPS overload during power
    events. GPU server PSUs have power factors of 0.92-0.96, meaning kVA > kW.
  napkin_math: 'Nodes: 3 × 10.5 kVA = 31.5 kVA. TOR switch: 0.5 kVA. Mgmt: 2 × 1.0 = 2.0 kVA. Total: 34.0
    kVA. UPS with 20% buffer: 40.8 kVA → 50 kVA unit. kW actual: 8 kW × 3 + 0.4 + 0.8 = 25.2 kW. PF =
    25.2 / 34.0 = 0.741 average (mixed loads). With APFC (PF=0.99): required kVA = 25.2 / 0.99 = 25.45
    kVA × 1.2 = 30.5 kVA → 30 kVA unit. Savings: 50 - 30 kVA = 20 kVA less UPS capacity. UPS cost: ~$100/kVA
    → $2,000 savings per rack.'
