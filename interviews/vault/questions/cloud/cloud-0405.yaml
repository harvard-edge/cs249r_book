title: 'The Great Divide: Intra-Node vs. Inter-Node'
scenario: In a modern AI datacenter, you have multiple ways to move data.
question: If you need to transfer a large tensor between two H100 GPUs located within the same physical server, which interconnect is designed to provide the highest bandwidth for this specific task?
details:
  realistic_solution: NVLink is the correct answer. It is a proprietary, high-speed interconnect developed by NVIDIA specifically for direct GPU-to-GPU communication within a single server (intra-node). Its primary purpose is to create a unified memory space for multiple GPUs and provide bandwidth that far exceeds what the general-purpose PCIe bus or external networking can offer for this task.
  common_mistake: |
    **The Pitfall:** Confusing the roles of different interconnects like PCIe, NVLink, and InfiniBand.
    **The Rationale:** Engineers might incorrectly assume all 'communication' happens over 'the network' (InfiniBand) or that the CPU's main bus (PCIe) is the only path, forgetting that NVLink is built explicitly for intra-node GPU-to-GPU traffic.
    **The Consequence:** Poorly optimized cluster architectures and training topologies that bottleneck on PCIe or Ethernet for local reductions.
  napkin_math: |
    - NVLink 4.0 provides 900 GB/s per GPU (bi-directional), latency ~500ns.
    - PCIe Gen5 x16 provides ~64 GB/s, latency ~1,000ns.
    - InfiniBand NDR provides 400 Gbps (~50 GB/s), latency ~5,000ns.
    - **NVLink provides over 14x the bandwidth and 10x lower latency than the node-to-node network.**
  options:
  - InfiniBand NDR
  - PCIe Gen5
  - NVLink 4.0
  - HBM3 Memory
  correct_index: 2
