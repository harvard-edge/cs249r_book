title: Pipeline Bubble on a Heterogeneous TPU v5e Stage Layout
scenario: 'A 500B-parameter LLM is split into 8 pipeline stages on 8 TPU v5e devices (16 GB HBM, 197
  TFLOPS BF16, 1.6 TB/s HBM bandwidth, ICI inter-chip ~25 GB/s per axis). Stage compute times measured
  per micro-batch — stages 1-7 each 100 ms, stage 8 (LM head + softmax over a 256K vocab) 175 ms. The
  pipeline currently runs with 4 micro-batches per global step. Quantify the bubble fraction and the
  exposed throughput loss from the slowest stage, and identify the smallest schedule change that closes
  the gap to within 10%.'
question: For an 8-stage TPU v5e pipeline with a 175 ms stage-8 vs 100 ms stage 1-7 and m=4 micro-batches, what is the bubble fraction and what schedule change brings utilization to within 10% of ideal?
details:
  realistic_solution: 'Bubble fraction at m=4, k=8 = (k-1)/(m + k - 1) = 7/11 ≈ 63.6% — over half the
    schedule is bubble. Step time is dominated by max(stage_i) = 175 ms (stage 8), so steady-state pipeline
    rate = 1 / 175 ms regardless of how many other stages are 100 ms. Two changes are needed: (a) shrink
    the stage-8 imbalance by splitting the LM head across two ICI-connected chips (stage-8 compute drops
    to ~95 ms, matching the others) — this restores max(stage) ≈ 100 ms; (b) raise micro-batches to m=32
    so bubble fraction drops to (8-1)/(32 + 8 - 1) = 7/39 ≈ 17.9%. Together, utilization climbs from
    ~36% to ~82% — within 10% of the 91% ideal asymptote.'
  common_mistake: Increasing m alone without rebalancing the stages. Bubble fraction shrinks but every
    micro-batch still pays the 175 ms stage-8 cost — pipeline rate is bounded by the slowest stage,
    not by the bubble.
  napkin_math: 'Naive pipeline time for one global step at m=4: T = (m + k - 1) * max(stage) = (4 + 7)
    * 175 = 1925 ms. Useful work = m * sum(stage) / k = 4 * (7*100 + 175) / 8 = 437.5 ms. Utilization
    = 437.5 / 1925 ≈ 22.7%. After rebalance (max stage = 100 ms) and m=32: T = (32 + 7) * 100 = 3900
    ms, useful work = 32 * 100 = 3200 ms, utilization = 82.0%.'
