title: The First-Year TCO of a Small AI Factory
scenario: Your team is building a small, on-premise AI cluster for continuous model retraining. You've been approved to purchase 10 GPUs (assume $30,000 CapEx each, 700W TDP) to run 24/7. Assume a PUE of 1.1, electricity at $0.10/kWh, and annual maintenance at 10% of CapEx.
question: What first-year TCO should finance budget for 10 GPUs running 24/7, including CapEx, maintenance, and PUE-adjusted power?
details:
  realistic_solution: 'The correct approach is to sum the three main components of first-year TCO: the initial hardware cost (CapEx), the annual maintenance cost, and the annual power cost (OpEx). The power cost must include the overhead from the datacenter''s PUE. The calculation requires converting the GPUs'' power consumption from Watts to kiloWatts and calculating the total energy used over a full year.'
  common_mistake: |
    **The Pitfall:** Only considering the upfront hardware (CapEx) cost and forgetting operational costs (OpEx).
    **The Rationale:** Power and cooling (PUE) require continuous energy draw that scales linearly with time but are often ignored during initial hardware procurement.
    **The Consequence:** The TCO is significantly underestimated, leading to budget shortfalls in subsequent years when energy and maintenance bills arrive.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Hardware CapEx: 10 GPUs * $30,000/GPU = $300,000.
       * Annual Maintenance (10% of CapEx): $30,000.
       * GPU Power: 10 * 700W = 7.0 kW.
       * PUE: 1.1.
    2. **Calculations:**
       * Total facility power: 7.0 kW * 1.1 = 7.7 kW.
       * Annual energy consumption: 7.7 kW * 8,760 hours/year = 67,452 kWh.
       * Annual power cost: 67,452 kWh * $0.10/kWh = $6,745.20.
    3. **Conclusion & Interpretation:**
       * **Result: TCO Calculation.** First-Year TCO: $300,000 + $30,000 + $6,745 = $336,745.
  options:
  - ~$315,000
  - ~$322,300
  - ~$336,700
  - ~$8,400,000
  correct_index: 2
