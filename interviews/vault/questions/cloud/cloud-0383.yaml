title: The First-Year TCO of a Small AI Factory
scenario: Your team is building a small, on-premise AI cluster for continuous model retraining. You've
  been approved to purchase 10 NVIDIA H100 GPUs (assume $30,000 CapEx each, 700W TDP) to run 24/7. Your
  finance partner needs a first-year Total Cost of Ownership (TCO) estimate. Assume a PUE of 1.1,
  electricity at $0.10/kWh, and annual maintenance at 10% of CapEx.
question: "What first-year TCO should finance budget for 10 H100s running 24/7, including CapEx, maintenance, and PUE-adjusted power?"
details:
  realistic_solution: 'The correct approach is to sum the three main components of first-year TCO: the
    initial hardware cost (CapEx), the annual maintenance cost, and the annual power cost (OpEx). The
    power cost must include the overhead from the datacenter''s PUE. The calculation requires converting
    the GPUs'' power consumption from Watts to kiloWatts and calculating the total energy used over a
    full year. Assuming H100 at $30,000 each, 700W TDP, PUE of 1.1, electricity at $0.10/kWh, and maintenance
    at 10% of CapEx: CapEx = $300,000. Maintenance = $30,000. Power = 10 GPUs * 700W * 1.1 PUE = 7,700W
    = 7.7 kW. Annual energy = 7.7 kW * 8,760 hours = 67,452 kWh. Power cost = 67,452 * $0.10 = $6,745.
    First-year TCO = $300,000 + $30,000 + $6,745 = **$336,745**. Power is only ~2% of first-year TCO,
    but over a 5-year GPU lifecycle it accumulates to ~$33,700, becoming more significant.'
  common_mistake: The most common mistake is to only consider the upfront hardware (CapEx) cost and forget
    the significant operational costs (OpEx), especially power and cooling. A second common error is to
    calculate the power draw for the GPUs but forget the additional power required for cooling and other
    datacenter infrastructure, which is what PUE accounts for. Finally, simple unit conversion errors
    (e.g., confusing W and kW) can lead to answers that are off by orders of magnitude.
  napkin_math: '1. **Hardware CapEx**: 10 GPUs \u00d7 $30,000/GPU = $300,000. 2. **Annual Maintenance (10%
    of CapEx)**: $300,000 \u00d7 0.10 = $30,000. 3. **Power calculation**: GPU power = 10 \u00d7 700W = 7,000W =
    7.0 kW. With PUE 1.1: Total facility power = 7.0 \u00d7 1.1 = 7.7 kW. 4. **Annual energy consumption**:
    7.7 kW \u00d7 8,760 hours/year = 67,452 kWh. 5. **Annual power cost**: 67,452 kWh \u00d7 $0.10/kWh = **$6,745**.
    6. **First-Year TCO**: $300,000 + $30,000 + $6,745 = **$336,745**. Note: The CapEx dominates in year
    one. Over a 5-year lifecycle, total TCO \u2248 $300,000 + 5 \u00d7 ($30,000 + $6,745) = $483,725.'
  options:
  - ~$315,000
  - ~$322,300
  - ~$336,700
  - ~$8,400,000
  correct_index: 2
