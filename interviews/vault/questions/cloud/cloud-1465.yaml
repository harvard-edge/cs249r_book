title: Debugging Online KD Bottlenecks
scenario: Your team is performing online knowledge distillation from a 70B parameter teacher LLM to a 7B student LLM on an 8-GPU node. The teacher is partitioned across 4 GPUs, while the student uses Data Parallelism on the remaining 4 GPUs. You observe the student's GPU utilization is under 20%.
question: What is the root cause of this inefficiency, and how should the distillation system be redesigned?
details:
  realistic_solution: 'The root cause is the synchronous online forward pass of the 70B teacher starving the 7B student. Redesign the system to use offline distillation: pre-compute the teacher''s top-K logits (e.g., K=10) and store them to fast NVMe storage. Decoupling the slow teacher inference from the fast student training loop perfectly resolves the bottleneck.'
  common_mistake: |
    **The Pitfall:** Attempting to optimize the student's batch size or applying activation checkpointing to the student.
    **The Rationale:** Engineers assume the low GPU utilization implies the student's training loop is poorly configured.
    **The Consequence:** Wasting time tuning the fast component of the system while the 70B teacher inference continues to act as a catastrophic synchronous bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Teacher (70B) forward compute: ~140 GFLOPs/token.
    - Student (7B) forward+backward compute: ~42 GFLOPs/token.
    - Online execution forces the student to wait for the teacher synchronously.

    **Calculations:**
    - Teacher computes 140 GFLOPs vs Student's 42 GFLOPs. Student is idle waiting.
    - Storing Top-10 FP32 logits offline takes only 40 bytes/token (10 * 4B).

    **Conclusion & Interpretation:**
    - **Result: Offline Storage (Compute-Bound)**. Streaming from NVMe easily outpaces the teacher's compute-bound generation, eliminating the idle bottleneck.
