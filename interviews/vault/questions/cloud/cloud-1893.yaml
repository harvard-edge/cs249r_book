title: CPU Overhead Calculation for SR-IOV Network Bypass
scenario: You are architecting a multi-tenant ML cloud using 8x H100 nodes, each equipped with 4x 400Gbps
  NVIDIA ConnectX-7 NICs for RDMA/RoCEv2 traffic. Initially, network traffic is routed through a hypervisor
  software virtual switch (vSwitch). Assuming the vSwitch can process approximately 25 Gbps of network
  traffic per CPU core, calculate the host CPU core savings per node if you implement Single Root I/O
  Virtualization (SR-IOV) to pass Virtual Functions (VFs) directly to the tenant VMs.
question: "How many host CPU cores per node does SR-IOV save by bypassing the vSwitch for 4x400Gbps traffic?"
details:
  realistic_solution: Enable SR-IOV on the physical NICs to present them as multiple Virtual Functions
    (VFs) attached directly to the VMs via PCIe passthrough. This enables zero-copy RDMA, bypassing the
    hypervisor vSwitch entirely and recovering massive CPU resources for the host.
  common_mistake: Candidates often assume SR-IOV is merely for logically partitioning bandwidth and fail
    to calculate the severe CPU tax of a software vSwitch at 400Gbps+ scale, completely missing the hypervisor
    bypass advantage.
  napkin_math: Total node network bandwidth = 4 NICs * 400 Gbps = 1,600 Gbps (200 GB/s). Software vSwitch
    CPU requirement = 1,600 Gbps / 25 Gbps per core = 64 CPU cores. Using SR-IOV/RDMA bypasses the hypervisor
    completely, requiring ~0 CPU cores for the data path. This saves 64 CPU cores per node for actual
    tenant workloads.
