title: M/M/1 Queue Utilization and Mean Wait on A100 Serving Node
scenario: A single GPU is serving LLM decode requests with an arrival rate λ=90 req/s and a mean service rate μ=100 req/s. An SRE claims the system is fine because utilization is under 100%.
question: What is the mean queue wait at λ=90 req/s and μ=100 req/s, and why is 90% utilization dangerous for tail latency?
details:
  realistic_solution: 'M/M/1: ρ=λ/μ=90/100=0.9. Mean wait in queue Wq = ρ/(μ(1-ρ)) = 0.9/(100×0.1) = 90ms. Mean time in system W = 1/(μ(1-ρ)) = 100ms. P99 wait ≈ 4.6/(μ(1-ρ)) = 4.6/(100×0.1) = 460ms — 5× the mean W=100ms. Systems targeting p99<200ms must keep ρ<0.7.'
  common_mistake: |
    **The Pitfall:** Reporting only utilization (ρ=0.9) as the health metric.
    **The Rationale:** Engineers used to deterministic batch workloads assume sub-100% utilization means there is headroom.
    **The Consequence:** Ignoring the nonlinear explosion of queue wait time in stochastic systems as ρ approaches 1, resulting in catastrophic tail latency (P99) for end-users.
  napkin_math: |
    - **Utilization (ρ)**: λ / μ = 90 / 100 = 0.9 (90%).
    - **Mean Wait in Queue (Wq)**: ρ / (μ(1-ρ)) = 0.9 / (100 × 0.1) = 0.09s = 90ms.
    - **Mean Time in System (W)**: 1 / (μ(1-ρ)) = 1 / (100 × 0.1) = 0.1s = 100ms.
    - **P99 Wait Approximation**: ~4.6 / (μ(1-ρ)) = 4.6 / 10 = 0.46s = 460ms.
    - **Conclusion**: **P99 wait (460ms) is roughly 5× the mean time in system, showing the danger of 90% utilization.**
