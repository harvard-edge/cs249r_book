title: Cluster Hard Fault MTBF Calculation
scenario: You are defining a hardware fault model for a large-scale training cluster comprising 10,000
  H100 GPUs. Historical telemetry shows that uncorrectable GPU HBM memory errors occur at a rate of 500
  FIT (failures per billion device hours) per GPU, while optical transceiver hard failures (requiring
  physical replacement) occur at 2,000 FIT per transceiver. Each GPU is connected to 4 transceivers. Transient
  link state errors occur at 50,000 FIT but are automatically masked by the link layer retry mechanism.
  Apply this fault model to calculate the expected Mean Time Between Failures (MTBF) for the entire cluster
  due to hard faults.
question: "What is the expected cluster MTBF from hard HBM and transceiver faults for the 10,000-GPU cluster?"
details:
  realistic_solution: Exclude transient errors since the fault model specifies they are masked. Aggregate
    the hard fault FIT rates per node (8 GPUs × HBM FIT per GPU, plus transceiver FIT), scale by the number
    of nodes (10,000 GPUs / 8 GPUs per node = 1,250 nodes), and invert to find the cluster MTBF, which
    informs checkpointing frequency.
  common_mistake: Including masked transient errors in the system-level hard fault MTBF calculation, or
    forgetting to multiply the individual transceiver FIT rate by the number of transceivers per GPU.
  napkin_math: 'Per-node hard FIT = 8 * 500 (HBM, one per GPU) + 4 * 2,000 (Transceivers) = 4,000 + 8,000
    = 12,000 FIT.

    Cluster nodes = 10,000 GPUs / 8 GPUs per node = 1,250 nodes.

    Cluster FIT = 1,250 nodes * 12,000 FIT/node = 15,000,000 FIT.

    Cluster MTBF = 1,000,000,000 hours / 15,000,000 = 66.7 hours.'
