math_issues:
- Inconsistent GPU-to-node count. The scenario specifies 10,000 H100 GPUs, but the calculation assumes
  10,000 nodes. An H100 node typically houses 8 GPUs. If the cluster has 10,000 GPUs on standard 8-GPU
  nodes, it has 1,250 nodes, and the FIT per node should be calculated as 8 * 500 (HBM) + Transceivers.
