title: Pipeline Bubble Budget From Stage Count
scenario: A 32-layer transformer is split across 8 pipeline stages. The team can run either 8 or 32 microbatches per step.
question: "What bubble fraction should you expect with 8 pipeline stages at 8 versus 32 microbatches?"
details:
  realistic_solution: Using the standard bubble approximation (stages - 1)/(microbatches + stages - 1), 8 microbatches gives 7/(8+7)=47% bubble, while 32 microbatches gives 7/(32+7)=18%. The 8-microbatch schedule wastes almost half the pipeline and is not viable unless memory forces it; 32 microbatches is much healthier.
  common_mistake: |
    **The Pitfall:** Looking only at whether the model fits across stages and ignoring the pipeline bubble.
    **The Rationale:** Engineers assume that if memory constraints are satisfied, the pipeline will automatically be efficient, forgetting that too few microbatches leave GPUs idling.
    **The Consequence:** Wasting nearly half the training compute time on empty pipeline stages.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 Pipeline Stages.
       - Options: 8 microbatches vs 32 microbatches.
    2. **Calculations:**
       - Formula: Bubble Fraction = (Stages - 1) / (Microbatches + Stages - 1).
       - For 8 Microbatches: Bubble = (8 - 1) / (8 + 8 - 1) = 7 / 15 = 46.7%.
       - For 32 Microbatches: Bubble = (8 - 1) / (32 + 8 - 1) = 7 / 39 = 17.9%.
    3. **Conclusion & Interpretation:** **Result: Pipeline-Bubble-Bound**. Running only 8 microbatches causes a catastrophic 47% idle time; 32 microbatches is absolutely required.
