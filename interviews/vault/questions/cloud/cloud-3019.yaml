title: 'Latency Decomposition: Specify Prefill/Decode Split Requirements for SLA on
  H100'
scenario: 'Design a latency budget specification for a chat application using a 13B
  model on H100 (80GB HBM3, 3.35TB/s). The SLA requires TTFT < 200ms and time-per-output-token
  (TPOT) < 30ms at P95. Specify: maximum prompt length, maximum decode length, minimum
  hardware requirements (number of H100s), and batch size constraints that satisfy
  both SLA components simultaneously.'
question: What prompt length, decode length, H100 count, and batch-size constraints
  satisfy TTFT < 200ms and TPOT < 30ms for the 13B chat app?
details:
  realistic_solution: 'TPOT constraint: 13B model = 26GB FP16. Single H100: 26GB/3.35TB/s
    \approx 7.8ms/token < 30ms. \checkmark Max batch for TPOT < 30ms: memory-bound, batching doesn''t
    increase per-token time (same weights read). TTFT constraint: at batch=1, prefill
    for N tokens at 13B: 2\timesN\times13B/989TFLOPS = N\times26B FLOPs/989TFLOPS. For N=512:
    13.3T/989T \approx 13.5ms << 200ms. Max prompt: 200ms budget \rightarrow N = 200ms \times 989TFLOPS /
    (2\times13B) \approx 7607 tokens. So max prompt ~7K tokens with margin.'
  common_mistake: Solving for TTFT and TPOT independently without considering that
    larger batches improve TTFT amortization but can degrade TPOT for individual requests.
  napkin_math: 'TPOT: 26GB/3.35TB/s = 7.8ms/token. TTFT for 512 tokens: 13.3T FLOPs
    / 989TFLOPS = 13.5ms. Budget remaining for queue+network: 200 - 13.5 = 186.5ms. Spec:
    max_prompt=2048, max_decode=512, batch_size<=25 (memory fits: 26GB + 25\times2560\times5120\times2(KV)\times40layers\times2B
    = 26+52.4GB = 78.4GB < 80GB).'
