title: 'MLOps Lifecycle: Compare MLflow vs. Weights & Biases for LLM Experiment Tracking
  at Scale'
scenario: A team running 50 concurrent LLM fine-tuning experiments on H100s (each
  producing 50GB of checkpoints, 10MB of metrics per run) evaluates MLflow (self-hosted)
  vs. Weights & Biases (SaaS) for experiment tracking. Compare operational overhead,
  storage costs, and query latency for retrieving best runs across 1000 experiments.
question: How do self-hosted MLflow and W&B compare on ops overhead, storage cost,
  and best-run query latency for 1000 experiments?
details:
  realistic_solution: 'Self-hosted MLflow: 1000 experiments × 10MB metrics = 10GB
    in Postgres. Query performance: indexes on run_id/metrics, P99 query ~500ms. Artifact
    storage: 1000 × 50GB = 50TB in S3 ($1150/month). Ops overhead: 0.1 FTE for DB
    maintenance. W&B SaaS: $50/seat/month for 10 engineers = $500/month, hosted storage
    at 1TB included, overage $0.06/GB → 49,000GB × $0.06 = $2940/month overage. Total
    W&B = $3440/month. Total MLflow = $1150 + ops. Self-hosted wins on cost at this
    scale; W&B wins on zero ops overhead.'
  common_mistake: Evaluating only feature parity without quantifying the operational
    cost of self-hosting MLflow at scale (DB maintenance, artifact storage, concurrent
    user load).
  napkin_math: 'Artifact storage: 50 runs/day × 50GB = 2.5TB/day. S3 at $0.023/GB/month:
    50TB × $0.023 = $1,150/month. W&B storage: 49TB × 1000GB/TB × $0.06 = $2,940/month
    overage. W&B seats: $500/month. Total W&B: $3,440/month. MLflow ops: 0.1 FTE ×
    $150K/year = $15K/year = $1,250/month. Total MLflow: $1,150 + $1,250 = $2,400/month.
    Break-even: $3,440 - $2,400 = $1,040/month savings. Self-hosted still wins at
    this scale.'
