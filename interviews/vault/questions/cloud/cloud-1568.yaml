title: ECMP Load Balancing for Mice Flows
scenario: 'A front-end API gateway handles incoming user traffic and generates 200,000 concurrent ''mice flows'' per second. Each flow transmits a 15 KB payload to a pool of backend servers. The traffic is routed through a leaf switch that connects to four 40 Gbps uplinks using standard 5-tuple ECMP (Equal-Cost Multi-Path) hashing.'
question: What aggregate bandwidth do 200,000 15KB flows per second generate, and how much load should ECMP place on each 40Gbps uplink?
details:
  realistic_solution: Calculate the total bandwidth (24 Gbps) and recognize that the Law of Large Numbers ensures 200,000 independent 5-tuples will distribute nearly perfectly across the 4 links, resulting in 6 Gbps per uplink.
  common_mistake: |
    **The Pitfall:** Assuming a massive number of concurrent flows will overwhelm the switch's hashing tables or cause severe congestion via hash collisions.
    **The Rationale:** Candidates underestimate the statistical properties of ECMP and mistakenly apply the logic of 'elephant flows' (which do cause hash collisions) to small flows.
    **The Consequence:** Proposing overly complex custom routing or expensive network upgrades when simple ECMP perfectly handles the load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200,000 concurrent flows/sec. Payload: 15 KB/flow.
       - Leaf switch with 4x 40 Gbps uplinks.
    2. **Calculations:**
       - Payload in kilobits: 15 KB = 15 * 8 = 120 Kb.
       - Aggregate Bandwidth: 200,000 * 120 Kb = 24,000,000 Kbps = 24 Gbps.
       - Expected ECMP split: 24 Gbps / 4 links = 6 Gbps per uplink.
    3. **Conclusion & Interpretation:**
       - **Result: Perfect Load Distribution.** For "mice flows", the Law of Large Numbers ensures a perfect 5-tuple hash split, resulting in 6 Gbps (15% utilization) per 40Gbps uplink.
