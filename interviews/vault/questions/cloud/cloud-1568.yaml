title: ECMP Load Balancing for Mice Flows
scenario: A front-end API gateway handles incoming user traffic and generates 200,000 concurrent 'mice
  flows' per second. Each flow transmits a 15 KB payload to a pool of backend servers. The traffic is
  routed through a leaf switch that connects to four 40 Gbps uplinks using standard 5-tuple ECMP (Equal-Cost
  Multi-Path) hashing. Calculate the total aggregate bandwidth generated by these flows and determine
  the expected bandwidth utilization on each of the four uplinks.
details:
  realistic_solution: Calculate the total bandwidth (24 Gbps) and recognize that the Law of Large Numbers
    ensures 200,000 independent 5-tuples will distribute nearly perfectly across the 4 links, resulting
    in 6 Gbps per uplink.
  common_mistake: Candidates often assume that a massive number of concurrent flows will overwhelm the
    switch's hashing tables or cause severe congestion via hash collisions, failing to recognize that
    ECMP thrives precisely on a large number of independent small flows due to statistical multiplexing.
  napkin_math: Total Throughput = 200,000 flows/s * 15 KB/flow * 8 bits/byte = 24,000,000 Kbps = 24 Gbps.
    Expected load per link = 24 Gbps / 4 links = 6 Gbps. Utilization = 6 Gbps / 40 Gbps = 15% per link.
