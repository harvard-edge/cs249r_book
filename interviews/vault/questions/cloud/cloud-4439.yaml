title: Prefill Pool GPU Count Formula for TTFT SLO
scenario: A disaggregated serving system handles 500 RPS with average prompt length 512 tokens and P95 TTFT SLO of 200ms.
question: How many H100s do you need in the prefill pool?
details:
  realistic_solution: 'Prefill throughput per H100: 512-token prompt on 8B model = 2*512*8B = 8.19T FLOP. H100 at 989 TFLOPS, ~50% MFU = 495 TFLOPS effective. Time = 8.19T/495T = 16.5ms per request. Throughput per H100 = 1000/16.5 = 60.6 req/sec. For 500 RPS: 500/60.6 = 8.3 H100s (raw compute). But with queuing: for an M/M/1 queue, P95 latency = -ln(1-0.95) / (mu - lambda) ≈ 3 / (mu - lambda). For 95th percentile TTFT < 200ms and mu = 60.6 req/sec: 3 / (60.6 - lambda) < 0.2s, which means lambda < 45.6 req/sec per GPU. For 500 RPS total: 500 / 45.6 = 11 H100s minimum. Add 10-20% headroom: 12-13 H100s. Use 70B model: service time 10x longer, need 100+ H100s for prefill pool.'
  common_mistake: |
    **The Pitfall:** Sizing the prefill pool based on average load without a queuing model.
    **The Rationale:** Engineers assume an average utilization of 80% is safe and omit the M/M/1 queuing term from the sizing calculation.
    **The Consequence:** At P95, queue depth causes TTFT to exceed the SLO.
  napkin_math: |
    - Assuming 8B model.
    - Service time per request: 16.5ms (mu = 60.6 RPS).
    - Target P95 TTFT: 200ms.
    - M/M/1 queue P95 time: -ln(0.05) / (mu - lambda) ≈ 3 / (mu - lambda).
    - For 3 / (60.6 - lambda) < 0.2s, we need lambda < 45.6 RPS per H100.
    - Total H100s needed for 500 RPS = 500 / 45.6 = 10.96.
    - Rounding up with headroom yields **12 H100s**.
