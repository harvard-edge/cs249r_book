title: Prefill Pool GPU Count Formula for TTFT SLO
scenario: A disaggregated serving system handles 500 RPS with average prompt length 512 tokens and P95 TTFT SLO of 200ms.
question: How many H100s do you need in the prefill pool?
details:
  realistic_solution: 'Provision the prefill pool utilizing an M/M/1 queuing model to account for stochastic arrival rates and bursty workloads, ensuring the P95 TTFT stays under the 200ms SLO. Do not rely solely on average throughput.'
  common_mistake: |
    **The Pitfall:** Sizing the prefill pool based on average load without a queuing model.
    **The Rationale:** Engineers assume an average utilization of 80% is safe and omit the M/M/1 queuing term from the sizing calculation.
    **The Consequence:** At P95, queue depth causes TTFT to exceed the SLO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Disaggregated serving system. Target 500 RPS.
       - Average prompt length 512 tokens. P95 TTFT SLO is 200ms.
       - Assume 8B model. Service time per request on H100 is 16.5ms (mu = 60.6 RPS).
       - M/M/1 queue model applies.
    2. **Calculations:**
       - Target P95 TTFT: < 200ms.
       - M/M/1 queue P95 time formula: 3 / (mu - lambda) < 0.2s.
       - 3 / (60.6 - lambda) < 0.2s -> 15 < 60.6 - lambda -> lambda < 45.6 RPS per H100.
       - Total H100s needed for 500 RPS: 500 / 45.6 = 10.96 H100s.
       - Add 10-20% headroom: round up to 12 H100s.
    3. **Conclusion & Interpretation:**
       - **Result: 12 H100s required. The system is Queue-Bound for TTFT.**
