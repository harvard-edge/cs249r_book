title: Tensor Parallelism Activation Memory and Recomputation
scenario: 'Training a 30B model with TP=4 on H100 (80GB HBM3) runs OOM at batch_size=16
  with seq_len=2048. Memory profiling at batch_size=8 shows 60GB used per GPU: 15GB
  for model weights (TP=4 → 15GB/GPU) + 45GB for activations. You need to reach batch_size=32.'
question: How would you fit batch_size=32 for the 30B TP=4 H100 training run when
  activation memory is causing OOM?
details:
  realistic_solution: 'Enable Sequence Parallelism (SP) alongside TP (Megatron-LM
    --sequence-parallel flag). SP splits activations along the sequence dimension
    across TP ranks, reducing activation memory by the TP factor. At TP=SP=4: activation
    memory for batch=8 drops from 45GB to 45/4 = 11.25GB. For batch_size=32, activation
    memory scales 4x to 45GB. Total memory: 15GB weights + 45GB activations = 60GB
    — safely fitting within the 80GB limit.'
  common_mistake: Increasing TP degree to TP=8 to reduce per-GPU weight memory further.
    Activations are the bottleneck (45GB), not weights (15GB). TP does not reduce
    activation memory proportionally — sequence-parallel is needed for that. Another
    mistake is assuming weight memory scales with batch size.
  napkin_math: '30B model, TP=4: weights = 60GB/4 = 15GB per GPU (optimizer states
    excluded for simplicity). Activations for batch=8, seq=2048: per layer = batch
    * seq * hidden * bytes * num_tensors. Hidden=7168 (30B model). Per layer: 8 *
    2048 * 7168 * 2 * 8 (QKV, attention, MLP activations) = 1.87GB. 48 layers: 90GB
    total activations. TP without SP: only weight compute is sharded, activations
    remain full. With some activation checkpointing, let''s say it''s reduced to 45GB.
    SP shards activations: 45/4 = 11.25GB. Total for batch=8: 15GB + 11.25GB = 26.25GB
    per GPU. Scale to batch=32: activations become 11.25 * 4 = 45GB. Weights remain
    15GB. Total = 15GB + 45GB = 60GB — fits perfectly in 80GB HBM.'
