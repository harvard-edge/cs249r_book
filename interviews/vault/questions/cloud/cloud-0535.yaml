title: The TCP/IP CPU Overhead
scenario: You are training a model across 64 GPUs on AWS using standard 100 Gbps Ethernet (TCP/IP). You
  notice the GPUs are only running at 60% utilization. You look at the host CPU, and all 48 CPU cores
  are pinned at 100% utilization during the AllReduce phase. The CPU is not doing any data loading. What
  is the CPU doing that is bottlenecking a 100 Gbps network?
question: "What is the CPU doing that is bottlenecking a 100 Gbps network?"
details:
  realistic_solution: The CPU is processing the TCP/IP protocol stack. At 100 Gbps with 1500-byte MTU,
    the kernel must handle 8.3 million packets per second. Each packet requires header parsing, checksum
    validation, socket buffer allocation, and memory copies — roughly 1 microsecond of CPU work per packet.
    That consumes 8.3 CPU-core-seconds per second just for networking. With 48 cores all saturated, the
    CPU cannot keep up, creating backpressure that starves the GPUs. The fix is RDMA (InfiniBand or RoCEv2),
    which bypasses the CPU entirely via hardware-level DMA.
  common_mistake: '"The CPU is doing the AllReduce addition math." The GPUs do the addition. The CPU is
    struggling with the data transport.'
  napkin_math: Standard 100 Gbps Ethernet provides 12.5 GB/s. With an MTU of 1500 bytes, full bandwidth
    requires processing 12.5e9 / 1500 ≈ 8.3 million packets/sec. If the Linux kernel TCP/IP stack takes
    ~2μs per packet, this requires 16.6 seconds of CPU time per second, pinning ~17 CPU cores at 100%.
    This TCP overhead creates a severe bottleneck, which is why InfiniBand/RoCE bypasses the CPU.
