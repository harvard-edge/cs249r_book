title: LLM Inference Energy Bottleneck
scenario: You are profiling the power consumption of a 70 billion parameter model (16-bit precision, 140
  GB size) running batch size 1 inference on a cloud GPU. For each generated token, the entire model is
  read from HBM. Assume compute requires 140 GFLOPs per token. If an FP16 FLOP costs 1 pJ and HBM data
  movement costs 10 pJ per byte, calculate the energy spent on compute versus memory and determine the
  dominant factor.
question: "For the 70B batch-1 inference token, how much energy goes to HBM reads versus FP16 compute, and which dominates?"
details:
  realistic_solution: 'Calculate both energy components: Memory Energy is 140 GB * 10 pJ/byte = 1.4 Joules.
    Compute Energy is 140 GFLOPs * 1 pJ/FLOP = 0.14 Joules. Memory movement consumes 10x more energy than
    computation, meaning optimizations must focus on reducing memory traffic (e.g., quantization, KV cache
    optimization).'
  common_mistake: Candidates often assume that the massive number of arithmetic operations (FLOPs) dominates
    the power budget, completely ignoring the energy cost of moving data from HBM to the compute cores.
  napkin_math: Memory = 140e9 bytes * 10e-12 J/byte = 1.4 J. Compute = 140e9 FLOPs * 1e-12 J/FLOP = 0.14
    J. Memory/Compute Ratio = 1.4 / 0.14 = 10x.
