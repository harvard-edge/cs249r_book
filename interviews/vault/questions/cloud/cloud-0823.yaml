title: The Gradient AllReduce Time
scenario: You are running data-parallel training of a 7B model across 8 H100 GPUs in a single node connected via NVLink 4.0 (900 GB/s bidirectional). Gradients are in FP32.
question: "How long does the AllReduce synchronization take?"
details:
  realistic_solution: 'About 109 ms. Gradient size = 7B * 4 bytes (FP32) = 28 GB. Ring AllReduce sends 2*(N-1)/N * data = 2*(7/8)*28 = 49 GB along the ring. The ring is bottlenecked by the *unidirectional* NVLink lane (450 GB/s for NVLink 4.0, since the 900 GB/s figure is bidirectional aggregate). Time = 49 / 450 ≈ 109 ms.'
  common_mistake: |
    **The Pitfall:** Dividing by the 900 GB/s bidirectional aggregate instead of the 450 GB/s unidirectional bandwidth.
    **The Rationale:** Candidates often forget that ring AllReduce is bottlenecked by the slowest unidirectional lane, use FP16 gradient size instead of FP32, or forget the 2*(N-1)/N ring factor.
    **The Consequence:** Calculating a time that is half (or a quarter) of the actual required synchronization time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters, FP32 gradients (4 bytes per parameter).
       - Cluster: 8 H100 GPUs, NVLink 4.0.
       - Unidirectional NVLink 4.0 Bandwidth: 450 GB/s.
    2. **Calculations:**
       - Gradient Size: 7 * 10^9 * 4 bytes = 28 GB.
       - Ring Factor: 2 * (8 - 1) / 8 = 1.75.
       - Bus Traffic: 1.75 * 28 GB = 49 GB.
       - Time: 49 GB / 450 GB/s ≈ 0.109 s.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound (Intra-node).** The AllReduce synchronization takes ~109 ms.
  options:
  - A) ~11 ms
  - B) ~54 ms
  - C) ~109 ms
  - D) ~1,090 ms
