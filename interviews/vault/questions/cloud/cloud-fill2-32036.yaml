title: 'IO-Awareness: Roofline Model for Attention Kernels'
scenario: Explain why standard attention is memory-bound on modern GPUs despite involving massive matrix
  multiplications. Use the arithmetic intensity (FLOPS/byte) concept. For an H100 with 989 TFLOPS FP16
  and 3.35 TB/s HBM bandwidth, what arithmetic intensity is needed to be compute-bound, and what is standard
  attention's actual arithmetic intensity?
details:
  realistic_solution: 'The H100''s compute-to-bandwidth ratio (the ''ridge point'' on the roofline) =
    989 TFLOPS / 3.35 TB/s = 295 FLOPS/byte. Any kernel with arithmetic intensity < 295 is memory-bound.
    Standard attention per head: FLOPS = 2 × N² × d (Q×K^T) + 2 × N² × d (attn×V) = 4N²d. HBM bytes =
    3Nd × 2 (read Q,K,V) + N² × 2 (write S) + N² × 2 (read S) + Nd × 2 (write O) = 8Nd + 4N². Arithmetic
    intensity = 4N²d / (8Nd + 4N²) = 4Nd / (8d + 4N). For N=4096, d=128: AI = 4×4096×128 / (8×128 + 4×4096)
    = 2,097,152 / 17,408 = 120 FLOPS/byte. This is well below the 295 ridge point — memory-bound. FlashAttention
    eliminates the N² HBM terms: bytes ≈ 8Nd. AI = 4N²d / 8Nd = N/2 = 2048 FLOPS/byte. Far above the ridge
    — compute-bound.'
  common_mistake: Thinking that any operation involving large matrix multiplies must be compute-bound.
    The key issue is that standard attention writes and reads the N×N intermediate matrix from HBM, destroying
    the arithmetic intensity.
  napkin_math: 'H100 ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOPS/byte. Standard attention AI: 120
    (memory-bound). FlashAttention AI: 2048 (compute-bound). FlashAttention is 17× above the ridge, achieving
    near-peak compute utilization.'
