title: Feature Engineering at Scale with Spark
scenario: Your feature pipeline computes 500 features from a 10 TB event log using PySpark. The pipeline takes 4 hours on a 100-node cluster and costs $800 per run. Management wants it under 1 hour. You notice that 60% of compute time is spent on 20 window aggregate features (e.g., 'avg_spend_last_7d').
question: How do you optimize?
details:
  realistic_solution: 'The window aggregates are expensive because each recomputes from raw events — a 7-day window over 10 TB re-reads 7 days of data. The key optimization is incremental computation: maintain running aggregates and only process new events since the last run. For a 1-hour pipeline cadence, you process ~400 GB of new events instead of 10 TB. Additionally: (1) pre-aggregate events into hourly summary tables, reducing the 7-day window from billions of events to 168 hourly summaries; (2) cache intermediate DataFrames that multiple features share; (3) use Delta Lake Z-ordering on entity_id to minimize shuffle during joins.'
  common_mistake: |
    **The Pitfall:** Throwing more nodes at the problem to reduce execution time.
    **The Rationale:** Spark makes horizontal scaling trivial, so adding nodes is the path of least resistance.
    **The Consequence:** Amdahl's law applies—shuffle and I/O don't scale linearly. Scaling from 100 to 400 nodes only reduces time by 3x while quadrupling the cost to $3,200/run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current Pipeline I/O: 10 TB scan * 20 window features = 200 TB effective I/O in 4 hours.
    - Incremental Pipeline I/O: 400 GB new events + (168 hourly summaries * 20 features) = 8 TB + 3.36 TB = 11.36 TB.

    **Calculations:**
    - I/O Reduction: 200 TB / 11.36 TB = 18x less I/O.
    - Expected Time: 4 hours / 18 = ~13 minutes on the same cluster.
    - Cost: $800 * (13/240) = ~$43/run.

    **Conclusion & Interpretation:**
    - **Result: ~13 minutes at $43/run (I/O-Bound)**. Incremental computation meets the 1-hour target at 5% of the original cost.
