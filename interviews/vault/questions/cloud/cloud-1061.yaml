title: Sizing an NER-based PII Redaction Fleet
scenario: A cloud-based API gateway implements a Data Anonymization Layer using a lightweight NER model (DistilBERT, 66M parameters) to detect and redact PII from user prompts before forwarding them to an upstream LLM. The gateway must process 10,000 requests per second with an average prompt length of 256 tokens.
question: How many GPUs are needed to handle 10,000 RPS of 256-token DistilBERT PII anonymization at 50% utilization given a 125 TFLOPS capacity per GPU?
details:
  realistic_solution: 'Calculate the inference FLOPs per request using the 2PN approximation, scale it by the requests per second to find total throughput requirements, and divide by the effective GPU compute capacity.'
  common_mistake: |
    **The Pitfall:** Using theoretical peak TFLOPS without applying utilization penalties or omitting the multiply-accumulate factor.
    **The Rationale:** Engineers often take datasheet specs at face value or forget that each parameter operation involves both a multiply and an add.
    **The Consequence:** Severe under-provisioning of the GPU fleet, leading to cascading latency failures and dropped requests at peak load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 66M parameters.
    - Throughput: 10,000 requests/sec.
    - Sequence Length: 256 tokens.
    - Effective GPU Compute: 125 TFLOPS * 50% utilization = 62.5 TFLOPS.

    **Calculations:**
    - FLOPs per request = 2 * 66M * 256 ≈ 33.8 GFLOPs.
    - Total required = 10,000 * 33.8 GFLOPs = 338 TFLOPS.
    - GPUs required = 338 TFLOPS / 62.5 TFLOPS = 5.408.

    **Conclusion & Interpretation:**
    - **Result: 6 GPUs (Compute-Bound)**. Rounding up, 6 GPUs are required to handle the gateway traffic.
