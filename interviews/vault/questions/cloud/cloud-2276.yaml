title: The Autograd Overhead in Serving
scenario: A production inference service running a 7B model in PyTorch shows that `torch.cuda.memory_allocated()` reports 28GB, but the model weights are only 14GB in FP16. The serving code uses a simple `model(input)` call. No optimizer or gradient accumulation is present.
question: "Where is the extra 14GB coming from, and how do you reclaim it?"
details:
  realistic_solution: 'The extra 14GB is autograd''s activation stash. By default, PyTorch''s autograd system records intermediate tensors (activations at each layer boundary) during the forward pass so gradients can be computed during backward. For a 7B transformer at batch=1 with sequence length 2048, activations consume roughly 1× the model size. Fix: wrap inference in `torch.inference_mode()` (preferred over `torch.no_grad()` because it also disables version counting and view tracking, saving additional memory and CPU overhead). This eliminates the activation stash entirely. Additional optimization: set `model.eval()` to switch BatchNorm/Dropout to inference behavior, and ensure `requires_grad=False` on all parameters.'
  common_mistake: |
    **The Pitfall:** Assuming PyTorch automatically skips gradient tracking during forward-only inference.
    **The Rationale:** Candidates forget that PyTorch is a dynamic define-by-run framework that defaults to tracking the computational graph unless explicitly told otherwise.
    **The Consequence:** The server wastes 50% of its HBM storing intermediate activations for a backward pass that will never happen, halving the maximum potential batch size.
  napkin_math: |
    - **Weights:** 7B parameters in FP16 = 14 GB.
    - **Without inference_mode:** Autograd stores ~1 activation tensor per layer. 32 layers × ~430MB/layer ≈ 13.8 GB. Total = ~28 GB.
    - **With inference_mode:** 14 GB weights only.
    - **Conclusion:** **Memory consumption drops by 50%, and latency improves by 5-15% due to removed CPU bookkeeping overhead.**
