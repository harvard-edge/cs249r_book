title: 'Overlap Measurement: MFU vs HFU and Communication Accounting'
scenario: Your 70B model training reports Model FLOPS Utilization (MFU) of 45% on
  64 H100 GPUs. A colleague points out that Hardware FLOPS Utilization (HFU) is 58%
  for the same run. Explain the difference and what each metric tells you about communication-computation
  overlap.
question: What is the difference between MFU 45% and HFU 58%, and what do they imply
  about communication-computation overlap?
details:
  realistic_solution: 'MFU = (model FLOPS per step) / (peak FLOPS x step time). It
    excludes activation recomputation FLOPS. HFU = (total observed FLOPS) / (peak
    FLOPS x step time). It includes all compute including recomputation. (1) MFU 45%
    means: 55% of H100''s peak is wasted on communication, idle time, and overhead.
    (2) HFU 58% means: 42% is wasted, but 13% of total compute was activation recomputation
    (useful for memory but not for model progress). (3) The gap HFU - MFU = 13% represents
    activation recomputation overhead. (4) For overlap assessment: if HFU is 58% and
    you measure 2% communication time (overlapped), then GPU overhead (kernel launch,
    memory management) is 42% - 2% = 40%. This is the real bottleneck — kernel efficiency,
    not communication. Good overlap means MFU ≈ HFU - recompute_fraction.'
  common_mistake: Confusing MFU and HFU or thinking higher is always better. MFU measures
    useful model FLOPS / peak FLOPS. HFU measures total hardware FLOPS (including
    activation recomputation) / peak FLOPS. MFU < HFU always.
  napkin_math: '70B model: ~4.2 x 10^17 FLOPS per step (forward + backward). Step
    time: 3.0 seconds. 64 x H100 at 989 TFLOPS = 63.3 PFLOPS cluster peak. MFU = 420
    TFLOPS / 63300 TFLOPS = 0.66%... Wait, per-device: 420T/64 = 6.56T per GPU per
    step / (989T x 3.0) = 0.22%. This seems low — the model FLOPS calculation needs
    the standard formula: 6 x N x B x S for transformer training.'
