title: Multi-Modal Distributed Ingestion Architecture Specification
scenario: A training cluster of 10,000 H100 SXM GPUs processes interleaved text and
  4K images for a 1T parameter multimodal model.
question: Architect the data loader and prefetch specification to ensure the 989 TFLOP/s
  FP16 tensor cores remain at least 60% utilized without bottlenecking on host-device
  PCIe bandwidth.
details:
  realistic_solution: Formulate a distributed hierarchical dataloader that dynamically
    resizes images on CPU, caches raw text in host RAM, and pipelines batches to device
    memory asynchronously. Compute the required host-to-device bandwidth to feed the
    accelerator at the target utilization. Pin memory and use CUDA streams to hide
    memory transfer latency.
  common_mistake: Ignoring the host-to-device transfer overhead or underestimating
    the CPU decoding bottleneck for raw 4K images.
  napkin_math: 0.6 * 989 TFLOPS = 593 TFLOPS target utilization, dictating minimum
    batch delivery rates over PCIe Gen5.
