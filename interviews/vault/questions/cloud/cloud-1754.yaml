title: Monolithic vs Multi-Core PE Arrays
scenario: Your team is evaluating two PE (Processing Element) array architectures
  for a cloud LLM inference accelerator. Design A uses a single monolithic 256x256
  systolic array. Design B uses four independent 128x128 systolic arrays. Both chips
  possess exactly 65,536 PEs running at 1 GHz. Evaluate the trade-offs of these designs
  for the autoregressive decoding phase of an LLM (matrix-vector multiplication) assuming
  a batch size of 1 per request, and justify which architecture delivers better throughput
  for independent query streams.
question: Which PE array design delivers better throughput for independent batch-1
  autoregressive decoding streams, and why?
details:
  realistic_solution: Design B (four 128x128 arrays) is significantly better for serving
    unbatched or low-batch autoregressive requests. Matrix-vector multiplication on
    a 2D systolic array only utilizes one active wavefront (a diagonal or row) at
    a time. By splitting the PEs into four smaller cores, Design B can execute four
    independent user requests concurrently without waiting to assemble a synchronous
    batch, effectively doubling the active PE count per cycle.
  common_mistake: Assuming the single 256x256 array will be more efficient due to
    lower control overhead, while failing to recognize that large 2D systolic arrays
    suffer from severe PE underutilization during the memory-bound matrix-vector multiplications
    required for autoregressive decoding.
  napkin_math: 'Design A (256x256): A batch=1 vector-matrix multiply uses only 256
    PEs concurrently. Chip utilization = 256 / 65,536 = 0.39%.

    Design B (4x 128x128): Each array uses 128 PEs for its own batch=1 request. Processing
    4 independent requests concurrently uses 4 * 128 = 512 PEs. Chip utilization =
    512 / 65,536 = 0.78%.

    Conclusion: Design B doubles the unbatched throughput (512 vs 256 effective MACs/cycle)
    with the same total PE count.'
