title: The On-Node Interconnect Hierarchy
scenario: 'You''re explaining a model''s communication pattern to a junior engineer. To establish a baseline,
  you ask them: ''When moving data between two GPUs in the same server, roughly how much slower is a transfer
  over the PCIe Gen5 bus compared to a direct transfer over NVLink 4.0?'''
details:
  realistic_solution: A transfer over PCIe Gen5 is approximately 2 times slower than a transfer over NVLink
    4.0. NVLink is a highly optimized, low-latency interconnect designed specifically for high-bandwidth
    communication between GPUs within a node. PCIe is a more general-purpose bus that carries traffic
    for many peripherals, incurring higher protocol overhead and latency.
  common_mistake: Engineers often group all 'on-server' interconnects into the same bucket, failing to
    appreciate the significant performance difference between a general-purpose bus (PCIe) and a specialized
    GPU-to-GPU interconnect (NVLink). They might assume the speeds are similar or even incorrectly believe
    the wider-reaching PCIe bus is faster.
  napkin_math: 'From the ML Latency Hierarchy, an NVLink 4.0 transfer takes ~500 ns, while a PCIe Gen5
    transfer takes ~1,000 ns (1 µs).

    1. **Compare Ratios:** 1,000 ns / 500 ns = 2x.

    2. **Human Analogy:** If NVLink is 500 seconds (~8 minutes) to walk across a campus, taking the PCIe
    bus is 1,000 seconds (~16 minutes).

    Data movement over PCIe is roughly twice as slow.'
  options:
  - They are about the same speed
  - PCIe is ~10× slower
  - PCIe is ~2× slower
  - PCIe is ~2x faster
  correct_index: 2
