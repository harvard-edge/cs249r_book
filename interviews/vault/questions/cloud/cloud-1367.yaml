title: Hedged Requests Tail Math
scenario: 'An ML serving system fetches embeddings from a distributed key-value store at 10,000 QPS. The KV store''s latency distribution is P50=4ms, P90=15ms, P99=50ms. To reduce tail latency, you configure hedged requests to fire at the P90 latency (15ms). Replica latencies are perfectly uncorrelated.'
question: 'How much extra QPS do P90 hedged requests add, and what is the new probability a request exceeds 65ms given single request P(>65ms) = 0.5% and P(>50ms) = 1%?'
details:
  realistic_solution: 'Because the hedge fires at P90 (15ms), only 10% of requests trigger it, adding just 1,000 QPS overhead. For the overall request to exceed 65ms, the primary must take >65ms (0.5% probability) AND the hedge must take >50ms (1% probability). The new probability drops dramatically to 0.005%.'
  common_mistake: |
    **The Pitfall:** Assuming hedged requests double the total QPS, or failing to account for the hedge offset.
    **The Rationale:** Candidates often confuse "hedged requests" (which wait for a timeout) with "tied requests" (which fire simultaneously), and they miscalculate the joint probability of the primary and hedge both missing the deadline.
    **The Consequence:** This leads to over-provisioning backend capacity by 100% when only a small fraction is needed, or incorrectly analyzing the tail latency improvement.
  napkin_math: |
    - **Hedge Load:** Hedge fires at P90, so only 10% of 10,000 QPS trigger it. Adds **1,000 QPS**.
    - **Condition for >65ms Failure:** The primary must take >65ms (0.5% prob) AND the hedge (started at 15ms) must take >50ms (1% prob).
    - **Joint Probability:** P(Wait > 65ms) = P(Primary > 65ms) * P(Hedge > 50ms) = 0.005 * 0.01 = **0.00005 (0.005%).**
