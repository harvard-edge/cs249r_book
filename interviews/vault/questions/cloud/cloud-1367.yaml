title: Hedged Requests Tail Math
scenario: An ML serving system fetches embeddings from a distributed key-value store at 10,000 QPS. The
  KV store's latency distribution is P50=4ms, P90=15ms, P99=50ms. To reduce tail latency, you configure
  hedged requests to fire at the P90 latency (15ms). Assuming replica latencies are perfectly uncorrelated,
  calculate the additional load (in QPS) on the KV store. Then, calculate the new probability of a client
  request taking longer than 65ms, given that the probability of a single request taking >65ms is 0.5%
  and taking >50ms is 1%.
details:
  realistic_solution: Because the hedge fires at P90 (15ms), only 10% of requests trigger it, adding just
    1,000 QPS overhead. For the overall request to exceed 65ms, the primary must take >65ms (0.5% probability)
    AND the hedge must take >50ms (1% probability). The new probability drops dramatically to 0.005%.
  common_mistake: Candidates often assume hedged requests double the total QPS (by sending two requests
    immediately), or they fail to account for the 15ms offset when calculating the joint probability of
    both requests exceeding the target latency.
  napkin_math: A hedge fires at P90 (15ms), so 10% of the 10,000 requests trigger it, adding 1,000 QPS.
    For a request to exceed 65ms total, the primary must take >65ms (e.g., 0.5% prob) AND the hedge must
    take >50ms (P99 = 1% prob). P(Wait > 65ms) = P(Primary > 65ms) * P(Hedge > 50ms) = 0.005 * 0.01 =
    0.00005 (0.005%). Tail latency collapses!
