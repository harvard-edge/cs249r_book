title: 'Kernel Fusion: Evaluate Fused vs Unfused MLP Blocks on H100'
scenario: For a 13B LLM on H100 (80GB HBM3, 3.35 TB/s, 989 TFLOPS BF16), compare fused vs unfused MLP
  block (Linear → GELU → Linear). Batch size 64, sequence length 2048, hidden size 5120, intermediate
  size 20480. Evaluate roofline position, memory bandwidth savings, and latency.
details:
  realistic_solution: 'Check arithmetic intensity: compute FLOPs / bytes accessed. If AI > ridge point
    (H100 ridge ≈ 295 FLOPS/B for bf16), it''s compute-bound. For large matrix multiplications, AI is
    high → compute-bound, fusion has less impact. Elementwise ops (GELU, bias) are memory-bound → benefit
    from fusion.'
  common_mistake: Not checking if the operation is compute-bound or memory-bound before claiming fusion
    helps — if compute-bound, fusion has minimal benefit.
  napkin_math: 'Batch=64, seq=2048, hidden=5120, intermediate=20480. Sequence len × batch = 64 × 2048
    = 131,072 tokens. Linear 1 (5120→20480): FLOPs = 2 × 131K × 5120 × 20480 = 2.75T FLOPs. Bytes: weights
    5120×20480×2B = 209MB, input 131K×5120×2B = 1.34GB. AI = 2.75T / (209MB + 1.34GB) = 1,797 FLOPs/B
    >> 295 ridge. Compute-bound. GELU: FLOPs ≈ 6 × 131K × 20480 = 16B. Bytes: 131K×20480×2B = 5.37GB in
    + out. AI = 16B / 5.37GB = 3 FLOPs/B << 295. Memory-bound. Fusion impact: Linear1 is compute-bound
    — fusion doesn''t help. GELU is memory-bound — fusing GELU with Linear2 saves 5.37GB HBM traffic.
    Latency savings: 5.37GB / 3.35TB/s = 1.6ms. At batch=1 (decode), Linear becomes memory-bound too →
    fusion helps much more.'
