title: Analyzing Pod Scheduling Latency Under Quota Pressure
scenario: A 200-GPU H100 cluster serves 5 teams via Kubernetes ResourceQuotas. The
  ML Ops team reports that GPU pods from Team A are taking 15–20 minutes to schedule
  during peak hours, while Team B's pods schedule in under 30 seconds. Both teams
  are within their quota limits. Analyze the scheduling bottleneck and identify the
  root cause.
question: Why do Team A’s GPU pods take 15–20 minutes to schedule while Team B’s schedule
  quickly despite both being within quota?
details:
  realistic_solution: 'Systematic analysis: (1) Check `kube-scheduler` latency metrics
    — `scheduler_scheduling_duration_seconds` histogram. (2) Inspect `kubectl describe
    pod` for the pending pod''s events; ''Insufficient nvidia.com/gpu'' means fragmentation,
    not quota. (3) Compare Team A''s pod spec: if requesting 8 GPUs and only 7-GPU
    gaps exist across nodes due to Team B''s 1-GPU inference pods, scheduling fails
    despite quota headroom. (4) Solution: implement bin-packing policy (`MostAllocated`)
    in scheduler config so small pods fill nodes completely, leaving full-node gaps
    for training jobs. Add a `preferredDuringScheduling` anti-affinity to Team B inference
    pods to discourage fragmenting H100 nodes.'
  common_mistake: Immediately blaming quota limits; not checking whether the issue
    is in the scheduler decision loop, the pod binding step, or resource fragmentation
    at the node level.
  napkin_math: 200 H100 GPUs across 25 nodes (8 GPU/node). Team B deploys 24 inference
    pods of 1 GPU each = 3 nodes fully consumed, 22 nodes with 7/8 GPUs used. Team
    A's 8-GPU job needs a fully free node. With 22 nodes each missing 1 GPU, zero
    valid nodes exist for Team A — despite 22 'available' GPUs. Fragmentation blocks
    Team A even with 22 GPU quota remaining.
