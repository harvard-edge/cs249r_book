title: 'The KV-Cache Memory Bomb: VRAM Budgeting'
scenario: You are deploying a Llama-2-70B model (80 layers, 8 KV heads, 128 head dim) for an application requiring a 32,768 token context window in FP16.
question: How much memory is required strictly for the KV-cache?
details:
  realistic_solution: 'The KV-cache stores the Key and Value tensors for every token in the context window for every decoder layer. For Llama-2-70B with GQA (8 KV heads, 128 head_dim, 80 layers) at 32,768 tokens in FP16: KV-cache = 2 × 80 × 8 × 128 × 32,768 × 2 ≈ 10.7 GB. Combined with FP16 model weights (~140 GB), a single GPU cannot hold both. Even with INT4 quantized weights (~35 GB), the total is ~45.7 GB — manageable on one H100 but leaves limited headroom for batching multiple users.'
  common_mistake: |
    **The Pitfall:** Forgetting to account for both the Key (K) and Value (V) matrices, or using 1 byte instead of 2 for FP16 precision.
    **The Rationale:** Candidates memorize the formula loosely and miss fundamental multipliers representing data types or matrix pairs.
    **The Consequence:** KV-cache estimates are off by factors of 2x or 4x, leading to disastrous out-of-memory errors during deployment.
  napkin_math: |
    1. **Base Formula:** 2 (K,V) × layers × kv_heads × head_dim × seq_len × bytes_per_param.
    2. **Parameters:** 2 × 80 × 8 × 128 × 32,768.
    3. **Elements:** 163,840 (K and V per token) × 32,768 = 5,368,709,120 elements.
    4. **Bytes:** 5,368,709,120 × 2 bytes (FP16) = 10,737,418,240 bytes.
    **Conclusion:** The KV-cache requires approximately 10.7 GB.
  options:
  - ~40 GB
  - ~160 GB
  - ~80 GB
  - ~10.7 GB
  correct_index: 3
