title: 'The KV-Cache Memory Bomb: VRAM Budgeting'
scenario: You are deploying a Llama 2 70B model for an application that requires a 32,768 token context
  window. The model will run in FP16 precision. Explain how you would calculate the memory required just
  for the KV-cache, and then calculate its approximate size.
question: "How much FP16 KV-cache memory is needed for a Llama 2 70B model with a 32,768-token context window?"
details:
  realistic_solution: 'The KV-cache stores the Key and Value tensors for every token in the context window
    for every decoder layer. For Llama-2-70B with GQA (8 KV heads, 128 head_dim, 80 layers) at 32,768
    tokens in FP16: KV-cache = 2 × 80 × 8 × 128 × 32,768 × 2 ≈ 10.7 GB. Combined with FP16 model weights
    (~140 GB), a single GPU cannot hold both. Even with INT4 quantized weights (~35 GB), the total is
    ~45.7 GB — manageable on one H100 but leaves limited headroom for batching multiple users.'
  common_mistake: 'Engineers often forget one of the ''2''s in the formula: either forgetting to account
    for both the Key (K) and Value (V) matrices, or using the wrong number of bytes for the given precision
    (e.g., 1 for FP16 instead of 2). This leads to an answer that''s off by a factor of 2 or more.'
  napkin_math: 'KV Cache = 2 × layers × kv_heads × head_dim × seq_len × bytes_per_param | Llama-2-70B:
    80 layers, 8 KV heads (GQA), 128 head_dim, FP16 = 2 bytes | Sequence length: 32,768 tokens | = 2 ×
    80 × 8 × 128 × 32,768 × 2 | = 2 × 80 × 8 × 128 × 32,768 × 2 | Inner: 8 × 128 = 1,024 per layer | 80
    × 1,024 = 81,920 across all layers | 2 × 81,920 = 163,840 (K and V) | 163,840 × 32,768 = 5,368,709,120
    elements | × 2 bytes = 10,737,418,240 bytes ≈ 10.7 GB | Model weights: 70B × 2 = 140 GB | Total: 140
    + 10.7 ≈ 150.7 GB for a single user | On one H100 (80 GB): weights alone don''t fit; need ≥ 2 GPUs
    | With weight quantization to INT4 (~35 GB): 35 + 10.7 = 45.7 GB → fits on one H100 | The KV-cache
    is ~23% of the quantized weight size, growing linearly with context length.'
  options:
  - ~40 GB
  - ~160 GB
  - ~80 GB
  - ~10.7 GB
  correct_index: 3
