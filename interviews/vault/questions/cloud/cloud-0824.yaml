title: The ECC Bit Error Reality
scenario: 'You are asked in an interview: an H100 has 80 GB of HBM3 memory. Assuming a raw bit error rate
  of 1e-15 per bit per hour (before ECC correction), roughly how many uncorrected bit errors would you
  expect per hour without ECC?'
question: "Assuming a raw bit error rate of 1e-15 per bit per hour (before ECC correction), roughly how many uncorrected bit errors would you expect per hour without ECC?"
details:
  realistic_solution: To find the number of uncorrected bit errors per hour, calculate the total bits
    in memory and multiply by the Bit Error Rate (BER). 80 GB of memory contains 80 * 8 = 640 Gigabits,
    or 6.4e11 bits. Multiplying this by the raw BER of 1e-15 errors/bit/hour yields 0.00064 errors per
    hour. While this seems extremely low for a single GPU, at datacenter scale with tens of thousands
    of GPUs, ECC memory is absolutely critical to prevent frequent silent data corruption.
  common_mistake: Assuming memory errors are so rare they can be ignored. At datacenter scale with hundreds
    of GPUs, even 'rare' errors become frequent events that corrupt training runs.
  napkin_math: 80 GB = 80 * 8 * 10^9 bits = 6.4e11 bits. Expected errors per hour = 6.4e11 * 1e-15 = 0.00064
    errors/hour.
  options:
  - A) ~0 errors (bits never flip)
  - B) ~0.00064 errors/hour
  - C) ~6.4 errors/hour
  - D) ~640 errors/hour
  correct_index: 1
