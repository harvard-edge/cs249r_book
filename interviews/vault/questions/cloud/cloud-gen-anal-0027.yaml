title: Explaining Stale Online Features with A100 Inference
scenario: A recommender system uses an A100 GPU (80 GB HBM2e, 2.0 TB/s bandwidth) for online inference
  in the cloud. The model takes 10ms to run per request. However, users are complaining that recommendations
  are stale and not reflecting their clicks from the last 5 minutes. The online feature store is backed
  by Redis. A streaming pipeline processes clicks and updates Redis. The pipeline is currently processing
  10,000 clicks per second, but the Redis write latency has spiked to 50ms per operation due to network
  congestion, while the A100 is only 20% utilized. Explain why the features are stale despite the fast
  A100 inference.
details:
  realistic_solution: The staleness is caused by a bottleneck in the feature pipeline, specifically the
    Redis write latency, not the inference speed. The system's behavior is dictated by the slowest component.
    Even though the A100 processes requests in 10ms, the streaming pipeline can only update Redis at a
    rate of 20 operations per second per connection (1 / 0.050s). If the pipeline isn't sufficiently parallelized
    to handle the 10,000 clicks/sec incoming rate, a backlog forms, causing the online feature store to
    fall behind real-time events.
  common_mistake: Candidates might focus on the A100 specifications, suggesting the model is too complex
    or the memory bandwidth is saturated, ignoring the provided utilization metric. They might also incorrectly
    calculate the throughput of the Redis pipeline without considering the write latency bottleneck.
  napkin_math: Max Redis updates per connection = 1 second / 50ms = 1000ms / 50ms = 20 updates/second.
    Incoming event rate = 10,000 clicks/second. Required parallel connections to keep up = 10,000 / 20
    = 500 concurrent connections. If the pipeline has fewer connections, features become stale.
