title: 'Memory Layout Portability: NCHW vs NHWC Across Accelerators'
scenario: "Your CNN model uses the NCHW memory layout (PyTorch default). When deployed on TPU v5e and MI300X, performance drops 20-30% compared to an H100 GPU."
question: Why do NCHW layouts cause a 20-30% drop on TPU v5e and MI300X, and how do you fix it?
details:
  realistic_solution: 'The 20-30% drop comes from implicit layout transpositions inserted by the framework. On TPU, XLA auto-converts NCHW to NHWC but each conversion costs a full tensor copy. On MI300X, MIOpen prefers NHWC for convolutions and inserts transposes at conv boundaries. Fix: use torch.channels_last memory format throughout the model (model.to(memory_format=torch.channels_last)). This avoids transposes on TPU and AMD, and is also faster on NVIDIA with cuDNN''s NHWC kernels (which are now as fast or faster than NCHW on Ampere+).'
  common_mistake: |
    **The Pitfall:** Ignoring memory layout as a performance-critical portability concern.
    **The Rationale:** Candidates assume the framework will automatically handle layout differences efficiently, not realizing that NVIDIA historically optimized for NCHW while other accelerators prefer NHWC.
    **The Consequence:** The framework inserts implicit, expensive transpositions at boundaries, causing severe performance degradation.
  napkin_math: |
    - **Analyze feature map size:** ResNet-50 feature map at batch 32, 64 channels, 56x56 = 32 × 64 × 56 × 56 × 2 bytes = 12.8MB.
    - **Calculate transpose penalty:** NCHW->NHWC transpose forces a 12.8MB memory copy.
    - **Calculate total overhead:** If 50 conv layers each trigger a transpose, the model suffers **640MB of unnecessary data movement** per forward pass.
