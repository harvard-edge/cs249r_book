title: The GIL Bottleneck
scenario: Your inference server runs 4 model replicas on 4 A100 GPUs within a single Python process using
  threads. Each replica should handle 100 req/s (400 req/s total). But total throughput plateaus at 110
  req/s regardless of how many replicas you add. `nvidia-smi` shows all 4 GPUs at ~25% utilization. Adding
  a 5th replica doesn't increase throughput at all. What's the ceiling?
details:
  realistic_solution: 'The Python Global Interpreter Lock (GIL) is the ceiling. CPython allows only one
    thread to execute Python bytecode at a time. While CUDA kernel launches release the GIL (allowing
    GPU work to proceed in parallel), the Python-side preprocessing (tokenization, tensor construction,
    result postprocessing) for each request requires holding the GIL. With 4 threads competing for the
    GIL, each thread gets ~25% of the CPU time for its Python work — explaining the ~25% GPU utilization
    (each GPU is starved of new work 75% of the time). The total throughput is bounded by how fast a single
    CPU core can execute the Python preprocessing pipeline: if preprocessing takes 9 ms per request, the
    GIL-limited throughput is $1000 / 9 \approx 111$ req/s — matching the observed 110 req/s. Adding more
    replicas just adds more threads competing for the same GIL. Fix: (1) use multiprocessing instead of
    threading — each process has its own GIL; (2) use a C++ serving runtime (Triton Inference Server,
    TensorRT-LLM) that bypasses the GIL entirely; (3) minimize Python-side work by moving tokenization
    and postprocessing to compiled extensions.'
  common_mistake: '"The network or storage is the bottleneck" or "We need to increase the batch size."
    Network and storage are fine (the server isn''t even close to saturating them), and batch size doesn''t
    help when the GPUs are underutilized.'
  napkin_math: 'Per-request Python work: tokenization (3 ms) + tensor creation (2 ms) + result decoding
    (1 ms) + HTTP response (1 ms) = **7 ms** of GIL-holding time. GPU forward pass: **10 ms** (releases
    GIL). **Single thread:** 1 request every $7 + 10 = 17$ ms → **59 req/s**. GPU utilization: $10/17
    = 59\%$. **4 threads (GIL-limited):** GIL serializes the 7 ms Python portions. Total GIL demand: $4
    \times 7 = 28$ ms per 17 ms window — GIL is **oversubscribed by 1.65×**. Effective throughput: $1000
    / 7 = $ **143 req/s** theoretical GIL limit, but with GIL acquisition overhead (~2 ms per context
    switch × 4 threads): effective = **~110 req/s**. Each GPU gets $110/4 = 27.5$ req/s × 10 ms = 275
    ms of work per second → **27.5% utilization**. **Multiprocessing fix (4 processes):** Each process
    has its own GIL. Per-process throughput: 59 req/s. Total: $4 \times 59 = $ **236 req/s** — a **2.1×
    improvement**. GPU utilization rises to 59% each.'
