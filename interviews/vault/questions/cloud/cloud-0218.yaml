title: The GIL Bottleneck
scenario: Your inference server runs 4 model replicas on 4 A100 GPUs within a single Python process using threads. Each replica should handle 100 req/s (400 req/s total). But total throughput plateaus at 110 req/s regardless of how many replicas you add. `nvidia-smi` shows all 4 GPUs at ~25% utilization. Adding a 5th replica doesn't increase throughput at all.
question: Why does the throughput plateau at 110 req/s regardless of how many replicas are added, and what is the ceiling?
details:
  realistic_solution: 'The Python Global Interpreter Lock (GIL) is the ceiling. CPython allows only one thread to execute Python bytecode at a time. While CUDA kernel launches release the GIL (allowing GPU work to proceed in parallel), the Python-side preprocessing (tokenization, tensor construction, result postprocessing) for each request requires holding the GIL. With 4 threads competing for the GIL, each thread gets ~25% of the CPU time for its Python work — explaining the ~25% GPU utilization (each GPU is starved of new work 75% of the time). The total throughput is bounded by how fast a single CPU core can execute the Python preprocessing pipeline: if preprocessing takes 9 ms per request, the GIL-limited throughput is $1000 / 9 \approx 111$ req/s — matching the observed 110 req/s. Adding more replicas just adds more threads competing for the same GIL. Fix: (1) use multiprocessing instead of threading — each process has its own GIL; (2) use a C++ serving runtime (Triton Inference Server, TensorRT-LLM) that bypasses the GIL entirely; (3) minimize Python-side work by moving tokenization and postprocessing to compiled extensions.'
  common_mistake: |
    **The Pitfall:** Assuming the network, storage, or batch size is the bottleneck.
    **The Rationale:** Engineers see underutilized GPUs and automatically assume data loading is too slow or batch size is too small, without checking thread concurrency limits.
    **The Consequence:** Unnecessary network scaling or batch size tuning completely fails to improve throughput, while the actual process remains crippled by the Python GIL.
  napkin_math: |
    1. **Single Request Timing:** Python GIL work = 7 ms. GPU forward pass (releases GIL) = 10 ms.
    2. **Single Thread Limit:** 1 request every 17 ms = 59 req/s (GPU utilized 59%).
    3. **Multi-Thread (GIL Limit):** 4 threads × 7 ms = 28 ms of Python work competing per 17 ms window.
    4. **Theoretical Ceiling:** 1,000 ms / 7 ms = 143 req/s.
    5. **Effective Ceiling:** With context switch overhead (~2 ms × 4 threads), it drops to **~110 req/s** (27.5% GPU utilization).
    6. **Multiprocessing Fix:** 4 isolated processes = 4 × 59 req/s = **236 req/s**.
