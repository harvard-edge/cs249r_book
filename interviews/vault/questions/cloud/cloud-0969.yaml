title: Evaluating Defenses for Clean-Label Poisoning
scenario: Your team is training a 2B parameter Vision Transformer (ViT-G) on a cluster of 512 GPUs using a 500M-image dataset. Threat intel warns of a clean-label poisoning attack: attackers have injected 50,000 correctly labeled, visually pristine images whose representations are adversarially perturbed to collide with a target class.
question: Given a strict 72-hour cluster allocation limit, should you defend with DP-SGD or activation-space clustering, and why?
details:
  realistic_solution: Opt for Activation-Space Clustering as a pre-processing filter. Extracting penultimate layer embeddings and running FAISS clustering identifies feature-space collisions without disrupting the core training loop. DP-SGD, while theoretically resilient to poisoning via bounding influence, requires per-sample gradient clipping which heavily degrades throughput and model accuracy.
  common_mistake: |
    **The Pitfall:** Proposing pixel-space anomaly detection or manual human review.
    **The Rationale:** Candidates fail to understand what a "clean-label" attack is, assuming the images look visually distorted.
    **The Consequence:** The defense completely fails to detect the poisoned data, and the model is successfully backdoored while wasting cluster time.
  napkin_math: |
    1. Embedding extraction overhead: 500M images / (512 GPUs * 1000 img/sec/GPU forward-only) = ~976 seconds (<20 mins).
    2. Baseline training time: (500M * 10 epochs) / (512 GPUs * 300 img/sec) = ~9 hours.
    3. DP-SGD penalty: Per-sample microbatch clipping reduces throughput by ~4x (to 75 img/sec).
    4. DP-SGD training time: 9 hours * 4 = 36 hours.
    5. **Result: DP-SGD wastes 27 extra hours (13,824 GPU-hours) and destroys clean accuracy, making clustering the clear winner.**
