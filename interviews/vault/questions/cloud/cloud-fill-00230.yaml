title: Optimizing Large Model Training on AMD MI300X with Activation Checkpointing
scenario: Your team is training an extremely large language model (LLM) on an AMD MI300X accelerator,
  which boasts 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth. The
  model requires storing a significant number of activations during the forward pass, exceeding the available
  HBM3 memory, leading to frequent out-of-memory (OOM) errors or inefficient CPU offloading. You've been
  tasked with optimizing the training process to fit the model within the MI300X's memory constraints
  while minimizing training slowdown. Specifically, you need to diagnose the memory bottleneck caused
  by activation storage and propose a solution that quantifies the compute-memory trade-off.
details:
  realistic_solution: Implement selective gradient checkpointing, identifying critical layers where activations
    consume the most memory and only checkpointing those. For non-checkpointed layers, consider more aggressive
    activation pruning or quantization if feasible. Analyze the activation memory profile of the model
    to pinpoint memory-intensive layers. Quantify the recomputation overhead (in TFLOPS) introduced by
    checkpointing versus the memory saved (in GB) to find an optimal balance that leverages the MI300X's
    high compute and bandwidth effectively without exceeding the 192 GB HBM3 limit. Specifically, calculate
    the memory savings per checkpointed layer and the associated recomputation FLOPs, ensuring these recomputations
    do not dominate the total training time given the 1,307 TFLOPS available.
  common_mistake: Blindly applying full gradient checkpointing across all layers without considering the
    recomputation cost, potentially bottlenecking on the 1,307 TFLOPS FP16 sparse compute capacity when
    activation recomputation becomes excessively high, or overlooking the implications of the 5.3 TB/s
    memory bandwidth for reloading intermediate activations.
  napkin_math: Assume a specific layer generates 10 GB of activations. Checkpointing this layer saves
    10 GB of HBM3 memory. If recomputing this layer involves 50 TFLOPs (FP16 sparse) of operations, this
    represents a trade-off. Given the MI300X's 1,307 TFLOPS, this recomputation would take 50/1300 = ~38
    ms per backward pass, which is a small fraction of the overall compute. However, if many such layers
    are checkpointed, the cumulative recomputation cost can become significant. Also consider the impact
    on 5.3 TB/s memory bandwidth if intermediate states need to be reloaded. For example, if a checkpointed
    layer needs to re-read 20 GB of weights and intermediate states, this would take 20 GB / 5.3 TB/s
    = ~3.8 ms for memory access during recomputation, which could become a bottleneck if not managed well
    with the MI300X's large cache hierarchy.
