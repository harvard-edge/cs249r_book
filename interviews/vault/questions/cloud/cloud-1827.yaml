title: Confidential VM Cold Start Overheads
scenario: You are deploying a proprietary 14GB (7B parameter, FP16) model to an NVIDIA A10G GPU inside a Confidential VM. The weights are AES-256-GCM encrypted in S3. Your instance has 10 Gbps network bandwidth, CPU decryption throughput of 14 GB/s using AES-NI, and PCIe Gen4 x16 (25 GB/s effective) to the GPU.
question: "With pipelined network download, decryption, and PCIe transfer, how long is the 14GB model cold-start load into GPU memory?"
details:
  realistic_solution: Implement a chunked streaming pipeline where data is decrypted and transferred to the GPU as it arrives, bounding the operation by the slowest stage.
  common_mistake: |
    **The Pitfall:** Calculating the total time by summing the steps sequentially instead of identifying the pipeline bottleneck.
    **The Rationale:** Engineers often forget that streaming architectures parallelize operations.
    **The Consequence:** Incorrectly estimating a much higher cold start time (11.2s + 1s + 0.6s = 12.8s) and over-engineering unnecessary workarounds.
  napkin_math: |
    * Network Bandwidth: 10 Gbps = 1.25 GB/s.
    * CPU Decryption Throughput: 14 GB/s.
    * PCIe Gen4 x16 Bandwidth: 25 GB/s.
    * **Pipeline Bottleneck:** Network at 1.25 GB/s.
    * **Total Time = 14 GB / 1.25 GB/s = 11.2 seconds.**
