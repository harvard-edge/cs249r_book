title: Quantifying Overlap Efficiency with Nsight Systems Timeline Analysis
scenario: 'You profile a DDP training step with Nsight Systems and see: backward pass spans 180-380ms on the compute stream. NCCL AllReduce spans 200-350ms on the NCCL stream.'
question: What is the overlap efficiency and exposed communication time for backward [180,380] ms and NCCL [200,350] ms?
details:
  realistic_solution: 'Timeline analysis: Backward: [180ms, 380ms], duration = 200ms. NCCL: [200ms, 350ms], duration = 150ms. Overlap window (intersection): [200ms, 350ms], duration = 150ms. The NCCL AllReduce starts 20ms after backward (first bucket becomes ready) and finishes 30ms before backward ends. Communication fully overlapped: 150ms/150ms = 100% of NCCL time is hidden behind backward. Exposed communication: 0ms. But backward has 20ms before NCCL starts (no overlap possible - gradients not ready) and 30ms after NCCL finishes (backward still computing early layers). This means the first gradient bucket takes 20ms to fill - consider smaller first bucket. Overlap efficiency: 150ms/(150ms + 0ms exposed) = 100%. Total step time: 380ms (end of backward) + optimizer.'
  common_mistake: |
    **The Pitfall:** Claiming 100% overlap simply because the compute and communication streams run concurrently for most of their duration.
    **The Rationale:** Engineers ignore the "exposed" communication time when communication starts before gradients are ready, or finishes after computation ends.
    **The Consequence:** Hidden latency penalties that directly increase the total step time despite seemingly parallel execution.
  napkin_math: |
    - **Backward Pass**: 180ms to 380ms (Duration: 200ms).
    - **NCCL AllReduce**: 200ms to 350ms (Duration: 150ms).
    - **Overlap Analysis**: The entire 150ms of NCCL happens within the [180, 380] backward window. No NCCL time extends beyond the backward pass.
    - **Final Result**: The overlap efficiency is **100%** with **0ms exposed communication**.
