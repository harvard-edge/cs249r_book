title: Quantifying Overlap Efficiency with Nsight Systems Timeline Analysis
scenario: 'You profile a DDP training step with Nsight Systems and see: backward pass
  spans 180-380ms on the compute stream. NCCL AllReduce spans 200-350ms on the NCCL
  stream. Calculate the overlap efficiency and identify the exposed communication
  time.'
question: What is the overlap efficiency and exposed communication time for backward
  [180,380] ms and NCCL [200,350] ms?
details:
  realistic_solution: 'Timeline analysis: Backward: [180ms, 380ms], duration = 200ms.
    NCCL: [200ms, 350ms], duration = 150ms. Overlap window (intersection): [200ms,
    350ms], duration = 150ms. The NCCL AllReduce starts 20ms after backward (first
    bucket becomes ready) and finishes 30ms before backward ends. Communication fully
    overlapped: 150ms/150ms = 100% of NCCL time is hidden behind backward. Exposed
    communication: 0ms. But backward has 20ms before NCCL starts (no overlap possible
    — gradients not ready) and 30ms after NCCL finishes (backward still computing
    early layers). This means the first gradient bucket takes 20ms to fill — consider
    smaller first bucket. Overlap efficiency: 150ms/(150ms + 0ms exposed) = 100%.
    Total step time: 380ms (end of backward) + optimizer.'
  common_mistake: Claiming 100% overlap because the two streams run concurrently for
    most of their duration. Overlap efficiency depends on how much communication is
    hidden behind computation.
  napkin_math: 'If NCCL ended at 390ms (10ms after backward): exposed communication
    = 10ms. Overlap efficiency = 150ms / (150+10ms) = 93.8%. The 10ms exposure adds
    directly to step time. Every 1% of communication exposure = 1.5ms/step at this
    scale.'
