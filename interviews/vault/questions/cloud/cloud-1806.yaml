title: RBAC Policy Binding Compression Factor
scenario: A cloud ML infrastructure manages 10,000 proprietary training datasets and supports 5,000 data scientists. Currently, permissions are assigned directly, with each dataset having an average of 500 explicit user permissions. The security team is migrating to Role-Based Access Control (RBAC) across the distributed storage tier by consolidating access into 50 distinct roles. On average, each dataset requires permissions mapped to 5 roles, and each user is assigned to 2 roles.
question: What reduction factor in IAM policy bindings does RBAC achieve versus direct per-dataset user permissions?
details:
  realistic_solution: Compute the total original bindings, then compute the sum of User-to-Role and Role-to-Resource bindings for RBAC, and divide the former by the latter to find the compression factor.
  common_mistake: |
    **The Pitfall:** Calculating only the role-to-resource bindings.
    **The Rationale:** Forgetting to account for the user-to-role assignments in the final RBAC state.
    **The Consequence:** Misreporting the actual compression factor.
  napkin_math: |
    - 1. **Direct Bindings:** 10,000 datasets × 500 users = 5,000,000.
    - 2. **RBAC Bindings:** (5,000 users × 2 roles) + (10,000 datasets × 5 roles) = 10,000 + 50,000 = 60,000 bindings.
    - 3. **Reduction Factor:** 5,000,000 / 60,000 = **~83.3x reduction**.
