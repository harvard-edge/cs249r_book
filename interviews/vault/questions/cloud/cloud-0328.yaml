title: The TCO Iceberg (cloud-0328)
scenario: For a popular, large-scale language model that runs for 3 years in production, which component
  typically represents the largest portion of its Total Cost of Ownership (TCO)?
question: "For a popular, large-scale language model that runs for 3 years in production, which component typically represents the largest portion of its Total Cost of Ownership (TCO)?"
details:
  realistic_solution: Inference cost almost always dominates the TCO for a successful, long-lived service.
    A model might be trained once, but it serves billions or trillions of requests over its multi-year
    lifespan. The cumulative energy, hardware amortization for the serving fleet, and operational overhead
    of serving those requests far outweighs the initial training expense.
  common_mistake: Engineers often fixate on the high upfront cost of a multi-million dollar training run.
    They forget that inference costs accumulate continuously over the entire service lifetime, which can
    be years. The training cost is a one-time Capital Expense (CapEx), while inference is a recurring
    Operational Expense (OpEx) that often grows with usage.
  napkin_math: 'Let''s model a 3-year TCO for a major service:'
  options:
  - Initial model training cost
  - Data collection and labeling
  - Cumulative inference costs
  - A/B testing and experimentation infrastructure
  correct_index: 2
