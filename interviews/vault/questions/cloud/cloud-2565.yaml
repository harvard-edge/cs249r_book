title: Cloud Gpu Virtualization L3 0
scenario: You want to serve a 7B model (14 GB FP16 weights) and a 1B model (2 GB FP16 weights) on a single A100 80 GB using MIG. The A100 can be partitioned into 1g.10gb, 2g.20gb, 3g.40gb, or 4g.40gb instances.
question: What MIG partition scheme should serve a 14 GB 7B model and a 2 GB 1B model on one A100 80 GB?
details:
  realistic_solution: '7B model needs 14 GB for weights + KV cache headroom ≈ 20 GB minimum. Smallest MIG instance that fits: 3g.40gb (3/7 of GPU, 40 GB memory). 1B model needs 2 GB + overhead ≈ 5 GB. Fits in 1g.10gb (1/7 of GPU, 10 GB). Total: 3g.40gb + 1g.10gb = 4/7 of GPU, leaving 3/7 (3 × 1g.10gb instances) available for more models. Memory used: 40+10 = 50 GB of 80 GB. Compute allocated: 4/7 = 57%. The 7B model gets 3/7 of the SMs (compute), which at 312 TFLOPS total = 134 TFLOPS — sufficient for inference. 1B model gets 1/7 = 44.6 TFLOPS.'
  common_mistake: |
    **The Pitfall:** Sizing instances based purely on model weight size.
    **The Rationale:** Engineers allocate an instance that exactly fits the weights, ignoring the dynamic memory required for the KV cache during inference.
    **The Consequence:** The model loads successfully but immediately OOMs as soon as inference begins and the KV cache grows.
  napkin_math: |
    *   **7B Model Needs:** 14 GB weights + ~6 GB KV cache = 20 GB. Smallest fit is 3g.40gb (3/7 compute, 40 GB memory).
    *   **1B Model Needs:** 2 GB weights + ~3 GB KV cache = 5 GB. Fits in 1g.10gb (1/7 compute, 10 GB memory).
    *   **Total Allocation:** 3g.40gb + 1g.10gb = 4/7 of total GPU compute used.
    *   **Remaining:** 3/7 compute available (can be three 1g.10gb instances).
    *   **Result:** **Use 3g.40gb for the 7B model and 1g.10gb for the 1B model.**
