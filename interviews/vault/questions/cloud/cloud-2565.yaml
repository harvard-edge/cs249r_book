title: Cloud Gpu Virtualization L3 0
scenario: You want to serve a 7B model (14 GB FP16) and a 1B model (2 GB FP16) on a single A100 80 GB
  using MIG. The A100 can be partitioned into 1g.10gb, 2g.20gb, 3g.40gb, or 4g.40gb instances. Calculate
  the best partition scheme.
details:
  realistic_solution: '7B model needs 14 GB for weights + KV cache headroom ≈ 20 GB minimum. Smallest
    MIG instance that fits: 3g.40gb (3/7 of GPU, 40 GB memory). 1B model needs 2 GB + overhead ≈ 5 GB.
    Fits in 1g.10gb (1/7 of GPU, 10 GB). Total: 3g.40gb + 1g.10gb = 4/7 of GPU, leaving 3/7 (3 × 1g.10gb
    instances) available for more models. Memory used: 40+10 = 50 GB of 80 GB. Compute allocated: 4/7
    = 57%. The 7B model gets 3/7 of the SMs (compute), which at 312 TFLOPS total = 134 TFLOPS — sufficient
    for inference. 1B model gets 1/7 = 44.6 TFLOPS.'
  common_mistake: Choosing the smallest instance that fits the model weight size without accounting for
    KV cache growth. A 7B model at sequence length 4096 with batch=8 can need 10+ GB of KV cache beyond
    the 14 GB weights.
  napkin_math: 'A100 MIG: 7 slices total. 7B model → 3g.40gb (3 slices, 40 GB, 134 TFLOPS). 1B model →
    1g.10gb (1 slice, 10 GB, 44.6 TFLOPS). Remaining: 3 slices for other workloads. Memory efficiency:
    50/80 = 62.5% used.'
