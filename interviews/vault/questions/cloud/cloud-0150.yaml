title: The Priority Queue Impasse
scenario: 'You''re running a multi-tenant LLM service on H100s, using a continuous batching inference
  server. You have two user classes: ''interactive'' users who need low Time-To-First-Token (TTFT) for
  a chatbot, and ''batch'' users who submit long document summarization jobs and care about overall Time-Per-Output-Token
  (TPOT). Interactive users complain of multi-second wait times, even though `nvidia-smi` shows 100% GPU
  utilization. Analyze the conflict between these workloads within a single FIFO continuous batching queue
  and propose a system-level solution.'
question: "Why do interactive users see multi-second TTFT in a FIFO continuous batcher at 100% GPU utilization, and what scheduling fix would you use?"
details:
  realistic_solution: The problem is the FIFO queueing discipline interacting with workloads of vastly
    different lengths. The continuous batching server is maximizing throughput, but it isn't prioritizing
    latency-sensitive work. A long batch job (e.g., summarizing a 50k token document) can occupy the GPU
    for seconds. While it's running, incoming interactive requests (which might only need to generate
    50 tokens) are queued up, waiting. The GPU is busy (high TPOT for the batch job), but TTFT for new
    requests is terrible because their wait time is dominated by the completion of the long job ahead
    of them. The correct solution is to implement request preemption or a priority-based scheduling policy
    within the inference server. High-priority interactive requests must be able to interrupt (preempt)
    and pause a low-priority batch job, get serviced, and then allow the batch job to resume. This ensures
    low TTFT for interactive users while still using idle cycles to process long batch jobs.
  common_mistake: 'Blaming the hardware (''the H100 is too slow'') or suggesting static partitioning of
    GPUs. This is a suboptimal solution that misses the core issue: the hardware is fully utilized, but
    for the wrong priority of work at the wrong time, leading to poor interactive latency.'
  napkin_math: Model a 70B model (140GB) on H100 (989 TFLOPS). A batch job with a 50,000 token prompt
    enters the FIFO queue. Prefill compute requires 2 * 70B * 50,000 = 7 PFLOPs. At 989 TFLOPS, this single
    prefill takes 7000 / 989 = 7.07 seconds. During this entire 7 seconds, the GPU is locked. An interactive
    request arriving 1ms later waits >7000ms for its first token.
