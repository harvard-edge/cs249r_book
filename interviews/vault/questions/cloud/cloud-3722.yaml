title: GPTQ vs AWQ Quantization Quality on H100 for 70B LLM
scenario: A team quantizes Llama-3-70B to 4-bit using GPTQ (block-wise OBQ) and AWQ (activation-aware) on an H100 80GB. GPTQ achieves 4.2 perplexity (PPL) vs FP16 baseline 3.8. AWQ achieves 3.9 PPL. Both run at the same inference speed.
question: Given similar inference speed, would you ship GPTQ or AWQ for Llama-3-70B 4-bit production, and what trade-offs besides PPL matter?
details:
  realistic_solution: AWQ produces superior PPL and relies on per-channel activation scales from fewer samples, making it more robust to distribution shift. GPTQ relies on Hessian inverse over larger contexts, exposing it to calibration overfit.
  common_mistake: |
    **The Pitfall:** Selecting the quantization method strictly based on the best Perplexity (PPL) score without evaluating OOD robustness.
    **The Rationale:** Candidates ignore how calibration datasets interact with the two distinct algorithms.
    **The Consequence:** Deploying a model that scores well on benchmarks but collapses when faced with out-of-distribution production traffic.
  napkin_math: |
    - **AWQ accuracy drop**: 3.9 (AWQ) - 3.8 (FP16) = +0.1 PPL degradation.
    - **GPTQ accuracy drop**: 4.2 (GPTQ) - 3.8 (FP16) = +0.4 PPL degradation.
    - **Quantization Time**: GPTQ takes ~3 hours for 70B; AWQ takes ~30 mins.
    - **Conclusion**: **AWQ wins on accuracy, out-of-distribution robustness, and pipeline velocity.**
