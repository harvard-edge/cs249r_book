title: The Loss Spike at Step 50K
scenario: Your 13B LLM pre-training run has been progressing smoothly for 50,000 steps. Suddenly, the
  training loss spikes from 2.8 to 15.0 and does not recover after 500 steps. The learning rate schedule
  shows you are in the cosine decay phase. What are the three most likely root causes, ordered from most
  to least common?
question: "What are the three most likely root causes, ordered from most to least common?"
details:
  realistic_solution: '1. **Gradient explosion from a bad data batch**: A batch with anomalously long
    sequences or corrupted data can produce extreme gradients. Check: inspect the batch at step 50K, look
    for NaN/Inf in gradients. 2. **Learning rate too high for this loss landscape region**: As the model
    traverses the loss landscape, it may enter a sharper region where the current LR causes overshooting.
    Check: was there a warmup restart or schedule bug? 3. **Numerical instability in mixed precision**:
    BF16 underflow in small gradient values that accumulate into FP32, or loss scaling failures in FP16
    training. Check: look at the loss scaler''s skip count — if it spiked, the scaler lost track.'
  common_mistake: Immediately blaming hardware failure or data corruption. While possible, gradient-related
    instabilities are far more common at this scale.
  napkin_math: 'Gradient norm monitoring: healthy range ~0.1-10.0, spike to >100 signals explosion | Loss
    scaler skip rate: healthy <1%, spike to >50% signals precision instability | Batch inspection: check
    max sequence length and token distribution at the offending step'
