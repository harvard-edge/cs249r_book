title: Cloud Gpu Virtualization L5 0
scenario: 'For multi-tenant GPU sharing, evaluate: (A) MIG with static partitions, (B) MPS with cooperative
  sharing, (C) Kubernetes time-slicing with GPU operator. Workloads vary from 5% to 60% GPU utilization.'
details:
  realistic_solution: 'Option A (MIG): hardware isolation, guaranteed performance, no interference. But
    static partitions — a 1g.10gb instance always gets 1/7 compute even if the 3g.40gb instance is idle.
    Cannot dynamically rebalance. Best for SLA-critical workloads. Option B (MPS): allows work-conserving
    sharing — idle capacity is used by other processes. But no memory isolation, so a bug in one process
    can crash others. Good for trusted same-team workloads where max utilization matters. Option C (time-slicing):
    GPU rapidly context-switches between workloads. High overhead (10-20% for context switching), fair
    sharing but no isolation. Worst latency jitter. Best for: A (MIG) for production inference with SLAs.
    B (MPS) for batch/offline workloads from trusted users. C (time-slicing) only as last resort when
    MIG/MPS are unavailable.'
  common_mistake: Using MIG for highly variable workloads. MIG's static partitions cannot adapt to bursty
    demand — a model needing 60% GPU gets a 4g.40gb instance (57%) which is slightly undersized, while
    a 5% model wastes its entire 1g.10gb instance.
  napkin_math: 'Workload at 5% util: MIG wastes 95% of allocated slice. MPS uses the idle 95% for other
    processes. MIG efficiency: ~5%. MPS efficiency: ~80%+ (work-conserving). Time-slicing overhead: 10-20%
    context switch penalty.'
