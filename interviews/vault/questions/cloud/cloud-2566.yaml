title: Cloud Gpu Virtualization L5 0
scenario: 'You are evaluating multi-tenant GPU sharing options: (A) MIG with static partitions, (B) MPS with cooperative sharing, and (C) Kubernetes time-slicing with GPU operator. The cluster workloads vary significantly, from 5% to 60% GPU utilization.'
question: 'For multi-tenant GPU sharing with workloads from 5% to 60% utilization, how do MIG, MPS, and Kubernetes time-slicing compare?'
details:
  realistic_solution: 'Option A (MIG): hardware isolation, guaranteed performance, no interference. But static partitions — a 1g.10gb instance always gets 1/7 compute even if the 3g.40gb instance is idle. Cannot dynamically rebalance. Best for SLA-critical workloads. Option B (MPS): allows work-conserving sharing — idle capacity is used by other processes. But no memory isolation, so a bug in one process can crash others. Good for trusted same-team workloads where max utilization matters. Option C (time-slicing): GPU rapidly context-switches between workloads. High overhead (10-20% for context switching), fair sharing but no isolation. Worst latency jitter. Best for: A (MIG) for production inference with SLAs. B (MPS) for batch/offline workloads from trusted users. C (time-slicing) only as last resort when MIG/MPS are unavailable.'
  common_mistake: |
    **The Pitfall:** Using MIG for highly variable workloads.
    **The Rationale:** Candidates often assume MIG's hardware isolation is always superior, forgetting that its static partitions cannot dynamically rebalance.
    **The Consequence:** A model needing 60% GPU gets slightly undersized, while a 5% model wastes its entire allocation, leading to severe overall underutilization.
  napkin_math: |
    * **Workload at 5% util:** MIG wastes 95% of allocated slice.
    * **MPS behavior:** Uses the idle 95% for other processes.
    * **MIG efficiency:** ~5%.
    * **MPS efficiency:** ~80%+ (work-conserving).
    * **Time-slicing overhead:** 10-20% context switch penalty.
    * **Conclusion:** **MPS provides significantly higher efficiency for trusted bursty workloads.**
