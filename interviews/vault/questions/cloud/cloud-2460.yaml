title: The Hybrid Cascade Bandwidth Trap
scenario: Your smart security system uses a cloud-edge cascade. The edge device runs a tiny INT8 person
  detector (10ms latency). If a person is detected, it sends the 1080p JPEG frame (150KB) to a cloud API
  for heavy facial recognition (200ms compute latency). During a busy street festival, your cloud API
  latency monitoring shows the end-to-end latency (from edge detection to cloud response) spiking from
  a normal 300ms to over 2500ms for 99th percentile requests, despite cloud auto-scaling adding plenty
  of GPU instances.
details:
  realistic_solution: "The bottleneck is the edge network uplink bandwidth and the resulting queuing delay,\
    \ not the cloud compute. During the festival, the edge detector triggers continuously (e.g., 10 frames\
    \ per second). Sending 150KB at 10 FPS requires 1.5 MB/s (12 Mbps) of sustained uplink bandwidth.\
    \ Most residential/edge internet connections have highly constrained and asymmetric uplinks (often\
    \ 5-10 Mbps max). \n\nWhen the generation rate exceeds the uplink capacity, frames queue up in the\
    \ edge device's network buffer, leading to massive tail latencies before the frame even reaches the\
    \ cloud. The system-level tradeoff solution involves algorithm-hardware co-design: instead of sending\
    \ full 1080p frames, the edge device should use the bounding box from the local detector to crop only\
    \ the face region. Alternatively, you can tune the edge confidence threshold to reduce the trigger\
    \ rate, or compress the crop heavily. By cropping a 150x150 face patch, the payload drops from 150KB\
    \ to ~5KB."
  common_mistake: Blaming cloud-side GPU initialization or autoscaling lag, and attempting to keep cloud
    instances permanently warm.
  napkin_math: 'Uplink capacity: 10 Mbps = 1.25 MB/s. Frame size: 150 KB. Max frames per second the network
    can handle: 1.25 MB / 0.15 MB = 8.33 FPS. If the edge model triggers at 10 FPS, the deficit is 1.66
    frames per second. After 10 seconds of continuous triggering, 16.6 frames are stuck in the queue.
    Queue delay = 16.6 frames * (150 KB / 1.25 MB/s) = ~2.0 seconds. Total latency = 2000ms (queue) +
    120ms (transmit) + 200ms (cloud compute) = ~2320ms.'
