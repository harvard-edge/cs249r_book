title: Multi-Tenant Edge Accelerator Allocation
scenario: A cloud service manages factory edge gateways. Each gateway has a single Edge TPU (4 TOPS).
  It must run Model A (ResNet-18, 10ms execution, needs 30fps) and Model B (YOLOv5s, 30ms execution, needs
  10fps). Naive concurrent multi-threading causes Model A latency to spike to 80ms due to PCIe bus contention
  and NPU context switching.
details:
  realistic_solution: 'Because the Edge TPU executes graphs atomically and lacks preemptive multitasking,
    concurrent requests cause massive context switch overhead. Co-design the deployment and system: either
    use a cloud-side compiler toolchain to fuse Model A and Model B into a single execution graph (co-compilation),
    or implement a strict application-level sequential scheduler (e.g., running all 30 A''s then all 10
    B''s per second) that drastically reduces concurrent submissions. Tradeoff: Fused graphs increase
    memory footprint and couple model updates, while 1-second batching scheduling increases queuing delay
    for Model B up to 1 second.'
  common_mistake: Trying to use OS-level threading or Docker container limits to manage the NPU, failing
    to realize edge accelerators typically lack hardware-level virtualization/MIG.
  napkin_math: 'Required compute time per second: 30 * 10ms (A) + 10 * 30ms (B) = 300ms + 300ms = 600ms
    (60% utilization). If context switching takes 50ms, naive interleaving (A-B-A-B) adds 20 * 50ms =
    1000ms of overhead, exceeding 1 second (system fails). Batching all A''s then all B''s for the entire
    second reduces context switches to 2/sec (1000ms overhead -> 100ms overhead), making the schedule
    viable (700ms total).'
