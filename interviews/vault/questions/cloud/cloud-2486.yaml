title: Multi-Tenant Edge Accelerator Allocation
scenario: 'A cloud service manages factory edge gateways. Each gateway has a single Edge TPU (4 TOPS). It must run Model A (ResNet-18, 10ms execution, needs 30fps) and Model B (YOLOv5s, 30ms execution, needs 10fps). Naive concurrent multi-threading causes Model A latency to spike to 80ms due to PCIe bus contention and NPU context switching.'
question: 'How would you schedule Model A and Model B on one Edge TPU to meet 30fps and 10fps requirements without 80ms latency spikes?'
details:
  realistic_solution: 'Because the Edge TPU executes graphs atomically and lacks preemptive multitasking, concurrent requests cause massive context switch overhead. Co-design the deployment and system: either use a cloud-side compiler toolchain to fuse Model A and Model B into a single execution graph (co-compilation), or implement a strict application-level sequential scheduler (e.g., running all 30 A''s then all 10 B''s per second) that drastically reduces concurrent submissions. Tradeoff: Fused graphs increase memory footprint and couple model updates, while 1-second batching scheduling increases queuing delay for Model B up to 1 second.'
  common_mistake: |
    **The Pitfall:** Trying to use OS-level threading or Docker container limits to manage the NPU.
    **The Rationale:** Candidates assume edge accelerators have hardware-level virtualization or efficient context switching like modern CPUs, which they lack.
    **The Consequence:** Severe context-switching overhead causes both models to fail their real-time latency SLAs.
  napkin_math: |
    * Compute needed per second: 30 * 10ms (A) + 10 * 30ms (B) = 600ms (60% utilization).
    * Naive interleaving (A-B-A-B): 20 context switches * 50ms = 1000ms overhead. Total = 1600ms (fails).
    * Batching all 30 A's then all 10 B's: 2 context switches * 50ms = 100ms overhead. Total = 700ms.
    * **Batching sequential execution reduces total time to 700ms, easily fitting within the 1-second window.**
