title: Multi-Tenant Edge Accelerator Allocation
scenario: 'A cloud service manages factory edge gateways. Each gateway has a single Edge TPU. It must run Model A (ResNet-18, 10ms execution, needs 30fps) and Model B (YOLOv5s, 30ms execution, needs 10fps). Naive concurrent multi-threading causes Model A latency to spike to 80ms due to PCIe bus contention and NPU context switching.'
question: 'How would you schedule Model A and Model B on one Edge TPU to meet 30fps and 10fps requirements without 80ms latency spikes?'
details:
  realistic_solution: 'Edge TPUs execute graphs atomically and lack preemptive multitasking, so concurrent requests induce massive context-switching overhead. The solution is either co-compilation (fusing Model A and Model B into a single execution graph via edge compiler toolchains) or strict application-level sequential batching (running all 30 A requests then all 10 B requests per second). Co-compilation increases memory footprint but eliminates context switches.'
  common_mistake: |
    **The Pitfall:** Trying to use OS-level threading or Docker container limits to manage the NPU.
    **The Rationale:** Candidates assume edge accelerators have hardware-level virtualization or efficient context switching like modern CPUs, which they lack.
    **The Consequence:** Severe context-switching overhead causes both models to fail real-time latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 30 A (10ms) and 10 B (30ms) per second.
       - Context switch overhead: 50ms per switch.
    2. **Calculations:**
       - Compute needed: 30 * 10ms + 10 * 30ms = 600ms (60% utilization).
       - Naive interleaving (A-B-A-B): 20 context switches * 50ms = 1000ms overhead. Total = 1600ms.
       - Batching all A then all B: 2 context switches * 50ms = 100ms overhead. Total = 700ms.
    3. **Conclusion & Interpretation:**
       - **Result: Sequential batching reduces total time to 700ms, easily fitting the 1-second real-time window (Context-Switch-Bound).**
