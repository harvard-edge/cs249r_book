title: DP-SGD Training Cost on H100
scenario: You're training a text classifier (BERT-base, 110M params) with DP-SGD on 8× H100 GPUs. Standard
  SGD training takes 4 hours. DP-SGD requires per-sample gradient clipping and Gaussian noise addition.
  Estimate the training time overhead of DP-SGD compared to standard SGD, and identify the computational
  bottleneck.
details:
  realistic_solution: 'Standard SGD computes gradients for an entire mini-batch in one backward pass —
    the loss is averaged, and a single gradient tensor per parameter is produced. DP-SGD requires individual
    gradients for each sample in the batch to clip each one independently before averaging. For batch
    size 64: standard backprop produces 1 gradient per parameter, DP-SGD produces 64 gradients per parameter.
    This 64× memory increase forces either: (1) virtual batching — run batch_size=1 forward/backward 64
    times sequentially, or (2) specialized implementations (Opacus, JAX vmap) that compute per-sample
    gradients via clever vectorization but still use 3-10× more memory. Opacus on H100: typically 3-8×
    slower than standard training due to per-sample gradient memory pressure and reduced batch size.'
  common_mistake: Assuming DP-SGD is simply 'SGD plus noise' with negligible overhead. The bottleneck
    isn't the noise addition (one random tensor per parameter) — it's per-sample gradient computation,
    which prevents the batch-level gradient accumulation optimizations that make training fast.
  napkin_math: 'Standard: 4 hours, batch size 64, 110M params × 4 bytes = 440 MB gradients. DP-SGD naive:
    64 × 440 MB = 28.2 GB per-sample gradients (fits in H100 80 GB). Opacus optimized: ~3× memory overhead
    = 1.32 GB. Throughput overhead: 5× slower (per-sample clipping + noise). Training time: 4 hrs × 5
    = 20 hours. Noise cost: 110M params × 4 bytes × 1 sample (Gaussian) per step ≈ negligible (440 MB/s
    at H100 memory bandwidth). Bottleneck: per-sample gradient computation, not noise.'
