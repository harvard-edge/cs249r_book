title: Calculating Dispatch Tax in Eager Mode
scenario: You are deploying a custom pointwise neural network on an NVIDIA A100 GPU using standard PyTorch
  in eager mode. Profiling shows that the model consists of 5,000 individual fine-grained operations per
  forward pass. The actual GPU kernel execution time for each operation averages 2 microseconds. However,
  the PyTorch Python-to-C++ dispatch overhead is 10 microseconds per operation. A junior engineer calculates
  that the forward pass should take 10ms (5,000 ops * 2µs). Calculate the actual forward pass latency
  and the effective GPU utilization.
question: "What is the actual forward-pass latency and effective GPU utilization once PyTorch dispatch overhead is included?"
details:
  realistic_solution: Recognize that because dispatch time (10µs) > kernel execution time (2µs), the CPU
    cannot feed the GPU fast enough. The execution is bounded by the dispatch rate. You must calculate
    the total time using the dispatch overhead, resulting in 50ms latency and 20% GPU utilization. The
    engineering solution is to use kernel fusion (e.g., torch.compile) to group operations and pay the
    dispatch tax once.
  common_mistake: Calculating latency based purely on GPU execution time (10ms) and ignoring the CPU-side
    framework dispatch overhead, completely missing that the workload is CPU-bound.
  napkin_math: Per-op bottleneck = max(dispatch_overhead, gpu_kernel_time) = max(10µs, 2µs) = 10µs. Total
    latency = 5,000 ops * 10µs/op = 50,000µs = 50ms. GPU utilization = gpu_kernel_time / total_op_time
    = 2µs / 10µs = 20%.
