title: 'Dataset Curation: Napkin Math for Tokenizer Coverage on Multilingual Data'
scenario: You are preparing a multilingual dataset for a 30B model. Your 32K-vocab tokenizer was trained on English-only data. You add 20% non-English content (10 languages).
question: What tokenizer fertility should you expect after adding 20% non-English data to an English-only 32K tokenizer, and how does it affect sequence length and memory?
details:
  realistic_solution: English fertility ≈ 1.3 tokens/word. Non-English with English-only tokenizer ≈ 3-5 tokens/word (byte fallback). Measure actual fertility per language, then compute effective sequence length inflation.
  common_mistake: |
    **The Pitfall:** Ignoring the impact of a mismatched tokenizer on dataset sequence length.
    **The Rationale:** Practitioners often assume a byte-level fallback tokenizer will "just work" for new languages without analyzing the inflation in token count.
    **The Consequence:** The model is forced to learn long, fragmented byte sequences for common words, dramatically inflating memory usage, slowing down training, and degrading multi-lingual performance.
  napkin_math: |
    1. **Fertility Rates:** English fertility ≈ 1.3 tokens/word. Non-English with English tokenizer ≈ 4.0 tokens/word (due to byte fallback).
    2. **Effective Fertility:** (0.8 * 1.3) + (0.2 * 4.0) = 1.04 + 0.8 = 1.84 tokens/word.
    3. **Context Window Impact:** A 512-token context formerly fit 394 words (512/1.3). It now fits only 278 words (512/1.84).
    4. **Memory Impact:** Attention memory scales O(n²). Since we fit fewer words per batch, the effective semantic throughput drops, inflating compute costs by **~29%** for the same amount of information.
