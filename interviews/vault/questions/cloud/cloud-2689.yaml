title: Scaling Strategy Under Physical Constraints
scenario: 'Training a 175B model. Your facility supports 2,000 H100 GPUs (power ceiling). Current approach:
  pure data parallelism with batch size 4M tokens, hitting critical batch size. MFU is 35% due to communication
  overhead. Option A: switch to 3D parallelism (tensor + pipeline + data). Option B: use gradient compression
  (8x). Option C: build a second facility with 2,000 more GPUs connected via WAN. Which maximizes time-to-train
  reduction?'
details:
  realistic_solution: 'Option A (3D parallelism) is the correct approach. At 175B parameters and 2,000
    GPUs: Option A reduces data-parallel degree by using tensor parallelism (8-way within a node) and
    pipeline parallelism (8 stages). Data parallel degree drops from 2,000 to 2000/(8×8)=31. Gradient
    AllReduce now operates on 31 nodes instead of 2,000, and only for the parameters within each pipeline
    stage (~22B). This dramatically reduces communication: AllReduce message size drops 8x (pipeline stages)
    and node count drops 64x. Expected MFU improvement: 35% → 50-55%. Option B (gradient compression 8x)
    reduces AllReduce time by 8x but adds compression/decompression overhead and may hurt convergence
    for large models. Expected MFU: 35% → 45%. Option C is impractical — WAN latency (1-10ms) between
    facilities makes synchronous gradient exchange impossible for every training step. Asynchronous methods
    could work but degrade convergence. Option A is the standard approach used by Meta (LLaMA), Google
    (PaLM), and others for 100B+ models.'
  common_mistake: Trying to scale with pure data parallelism beyond the critical batch size. 3D parallelism
    is not just an optimization — it is required for models above ~10B parameters to achieve reasonable
    MFU.
  napkin_math: 'A: 3D parallel reduces AllReduce 64x, MFU 35%→55% (57% speedup). B: 8x compression, MFU
    35%→45% (29% speedup). C: WAN makes synchronous training infeasible.'
