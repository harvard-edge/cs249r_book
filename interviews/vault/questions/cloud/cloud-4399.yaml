title: Fleet-Wide GPU Energy Efficiency Benchmarking with Performance-per-Watt
scenario: You manage a 10,000-GPU fleet (H100, A100, MI300X) serving LLM inference. Your VP asks for a single 'energy efficiency score' metric to inform the hardware refresh cycle.
question: How would you design a single energy-efficiency score for a heterogeneous inference fleet, and what would you recommend?
details:
  realistic_solution: Design a composite Effective Performance-per-Watt (EPE) metric. Run standardized prefill and decode benchmarks, weight by fleet traffic split, apply capacity bonuses for platforms that avoid model sharding, and measure at realistic utilization points.
  common_mistake: |
    **The Pitfall:** Using peak FLOPS/Watt from vendor datasheets directly.
    **The Rationale:** Candidates ignore that real-world LLM decode is memory-bandwidth-bound and that models may require multi-chip sharding.
    **The Consequence:** Selecting hardware that looks efficient on paper but performs poorly under actual serving workloads.
  napkin_math: |
    - **Decode EPE (BS=1, 70B FP16 = 140GB)**:
    - **H100 (TP=2)**: 6,700 GB/s BW -> 47.8 tok/s. Power at 70% util: 2 * 0.7 * 700W = 980W. EPE = 47.8 / 980 = 0.048 tok/s/W.
    - **A100 (TP=2)**: 4,000 GB/s BW -> 28.5 tok/s. Power at 70% util: 2 * 0.7 * 400W = 560W. EPE = 28.5 / 560 = 0.050 tok/s/W.
    - **MI300X 192GB (1 GPU)**: 5,300 GB/s BW -> 37.8 tok/s. Power at 70% util: 1 * 0.7 * 750W = 525W. EPE = 37.8 / 525 = 0.072 tok/s/W.
    - **Conclusion**: **MI300X (0.072) > A100 (0.050) > H100 (0.048) for decode efficiency.**
