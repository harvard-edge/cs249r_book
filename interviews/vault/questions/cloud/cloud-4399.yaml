title: Fleet-Wide GPU Energy Efficiency Benchmarking with Performance-per-Watt
scenario: You are the principal ML infrastructure engineer responsible for a heterogeneous
  10,000-GPU fleet comprising H100 SXM5, A100 SXM4, and MI300X accelerators serving
  production LLM inference. Your VP asks for a single 'energy efficiency score' metric
  to inform the next hardware refresh cycle. Design a performance-per-watt benchmarking
  framework that accounts for workload diversity (prefill vs decode), memory capacity
  constraints, and multi-tenant utilization patterns. Present a methodology, propose
  the metric formula, and defend your accelerator recommendation.
question: How would you design a single energy-efficiency score for a heterogeneous
  H100, A100, and MI300X inference fleet, and what would you recommend?
details:
  realistic_solution: 'Design a composite metric: EPE (Effective Performance-per-Watt)
    = (weighted_throughput × utilization_factor × capacity_bonus) / (average_power_draw).
    Methodology: (1) Run standardized prefill benchmark (512 input tokens, batch 32)
    and decode benchmark (batch 1, 100 output tokens) on each platform. (2) Weight
    by fleet traffic split (typically 70% decode, 30% prefill). (3) Apply capacity
    bonus for platforms that avoid model sharding (MI300X 192GB handles 70B FP16 without
    TP). (4) Measure at three utilization points (20%, 50%, 80%) to capture real fleet
    utilization. Expected outcome: MI300X leads across both prefill and decode due to
    higher memory bandwidth and compute efficiency on paper. Recommend MI300X for power-constrained
    large-model serving, though H100 may be chosen for smaller models or ecosystem reasons.'
  common_mistake: Using only peak FLOPS/Watt from vendor datasheets. This ignores
    memory-bandwidth-bound workloads (dominant in LLM decode), memory capacity constraints
    (70B+ models may require multi-chip setups for H100), and real-world utilization
    rates that differ between platforms.
  napkin_math: 'Decode EPE (BS=1, 70B FP16 = 140GB): H100 requires TP=2. BW = 6,700 GB/s → 47.8 tok/s.
    Power at 70% util: 2 × 0.7 × 700W = 980W. EPE_H100 = 47.8 / 980 = 0.048 tok/s/W.
    MI300X 192GB handles on 1 GPU. BW = 5,300 GB/s → 37.8 tok/s. Power at 70% util: 0.7 × 750W =
    525W. EPE_MI300X = 37.8 / 525 = 0.072 tok/s/W. A100 80GB requires TP=2. BW = 4,000 GB/s → 28.5 tok/s.
    Power: 2 × 0.7 × 400W = 560W. EPE_A100 = 28.5 / 560 = 0.050 tok/s/W. Ranking: MI300X (0.072)
    > A100 (0.050) > H100 (0.048). Note: H100 narrows the gap for prefill (FLOPS-bound):
    989 TFLOPS at 700W = 1412 GFLOPS/W vs MI300X 1307 TFLOPS/750W = 1742 GFLOPS/W. MI300X still wins both compute and memory bandwidth efficiency on paper.'
