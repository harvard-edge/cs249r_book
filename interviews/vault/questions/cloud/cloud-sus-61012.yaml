title: Power Delivery Across Chiplet Dies
scenario: During sustained inference on MI300X, you observe that XCD thermal throttling is non-uniform
  — some XCDs throttle at 600W TDP while others remain at full frequency. Diagnose the root cause.
details:
  realistic_solution: Non-uniform throttling indicates workload imbalance across XCDs. XCDs processing
    attention heads (memory-bound, lower power) run cooler than XCDs running FFN layers (compute-bound,
    higher power). The MI300X package thermal management allows individual XCD DVFS. Rebalance layer assignments
    to distribute power more uniformly, or use ROCm's power management API to cap per-XCD TDP.
  common_mistake: Assuming thermal throttling is uniform across all chiplets since they share a TDP budget.
    Each XCD has independent voltage regulators and thermal sensors, causing workload-dependent thermal
    gradients.
  napkin_math: 'MI300X TDP: 750W across 8 XCDs = 93.75W average per XCD. Compute-bound XCD (FFN): ~110W.
    Memory-bound XCD (attention): ~70W. Thermal margin before throttle: 110W/93.75W = 1.17x headroom.
    At 600W package limit during throttle: (600W - 70W×4 attention XCDs) / 4 compute XCDs = (600-280)/4
    = 80W per compute XCD, forcing ~15% frequency reduction.'
