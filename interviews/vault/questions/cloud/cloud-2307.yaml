title: The Diluted Regional Distribution Shift
scenario: A global translation API serves 200,000 QPS across 50 regions. Customer support tickets suddenly spike from the Southeast Asia (SEA) region reporting that the model is hallucinating gibberish. However, your global drift detection dashboard, which calculates Kullback-Leibler (KL) divergence on input token embeddings every hour, shows a value of 0.04 (well below the alert threshold of 0.1).
question: Why are SEA users seeing hallucinated translations when the global KL drift metric remains below threshold?
details:
  realistic_solution: |
    The root cause is Simpson's Paradox applied to distribution shift, also known as aggregation masking. A massive localized distribution shift is occurring, but it is entirely diluted by the global traffic volume. A new trending slang term or Out-Of-Vocabulary (OOV) token has emerged in the SEA region, destroying the tokenization sequence and causing the transformer to hallucinate. Because SEA represents a small fraction of the global traffic, the massive local KL divergence is averaged out by the stable distributions of the other 49 regions. The solution requires implementing slice-based monitoring (e.g., calculating drift per region, language pair, or tenant) rather than relying solely on global aggregates. Utilizing hierarchical metrics or slice-aware drift detection algorithms is critical for multi-tenant or global cloud deployments.
  common_mistake: |
    **The Pitfall:** Dismissing the issue as a client-side rendering bug or network latency timeout.
    **The Rationale:** Candidates implicitly trust top-level global metrics, assuming that if the global dashboard is green, the ML model is healthy.
    **The Consequence:** They ignore a massive localized failure affecting millions of users, failing to debug Simpson's Paradox applied to distribution shift.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total traffic: 200,000 QPS. Alert threshold: 0.1 KL.
       - SEA traffic: 4,000 QPS (2% of total).
    2. **Calculations:**
       - Global stable KL baseline = 0.01 (98% of traffic).
       - Localized SEA KL spike = 2.0.
       - Aggregated KL divergence = (0.98 × 0.01) + (0.02 × 2.0) = 0.0098 + 0.04 = 0.0498.
    3. **Conclusion & Interpretation:**
       - **Result: Global KL of ~0.05 masks the massive 2.0 regional spike.** (Data-Distribution Bound)
