title: 'Stragglers and Overlap: Why the Slowest GPU Determines Step Time'
scenario: In a 32-GPU DDP job, 31 GPUs complete their backward pass in 200ms, but one GPU consistently takes 260ms due to a thermal throttling issue. Even with perfect communication overlap, the step time is 260ms, not 200ms.
question: Why does one slow GPU destroy overall performance?
details:
  realistic_solution: 'AllReduce is a collective: it requires participation from all ranks. If GPU 31 produces its last gradient bucket at t=260ms, the AllReduce for that bucket completes at t=260+5ms = 265ms. All 32 GPUs wait. The 31 fast GPUs have 60ms of idle time each. Mitigation: (1) Detect stragglers: log per-GPU backward pass time and alert on >10% deviation. (2) Fix the root cause (thermal throttle: improve cooling, reduce power limit). (3) Redistribute workload or replace it.'
  common_mistake: |
    **The Pitfall:** Assuming communication overlap masks all straggler latency.
    **The Rationale:** Failing to understand that collective operations like AllReduce act as hard synchronization barriers requiring all ranks to participate.
    **The Consequence:** Wasting massive amounts of cluster compute while 31 GPUs sit idle waiting for the slowest node.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 GPUs at $3/GPU-hour = $96/hour.
       - Fast GPUs backward pass: 200ms.
       - Straggler GPU backward pass: 260ms.
    2. **Calculations:**
       - Idle time per fast GPU: 260ms - 200ms = 60ms per step.
       - Steps per second: 1000ms / 260ms = 3.85 steps/sec.
       - Total wasted time across 31 GPUs per step: 31 * 60ms = 1,860ms (1.86 GPU-seconds).
       - Waste per second: 1.86 * 3.85 = 7.16 GPU-seconds/second = 22.4% compute waste.
       - Financial cost: 22.4% of $96/hr = $21.50/hr wasted.
    3. **Conclusion & Interpretation:**
       - **Result: 22.4% cluster waste ($21.50/hr). Synchronization-Bound.**
