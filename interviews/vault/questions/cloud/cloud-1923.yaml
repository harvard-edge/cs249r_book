title: Identifying Poisoned Data via Spectral Signatures
scenario: Your team is training a ViT-L/16 model on a massive 500M image dataset distributed across 1024
  A100 GPUs. Security scanning flags a potential targeted data poisoning attack on a specific class. Retraining
  from scratch is prohibitively expensive. You decide to extract representations from the penultimate
  layer of the suspected class and compute their empirical covariance matrix. The top singular value of
  this matrix is 4.5x larger than the top singular values of baseline clean classes. How do you analyze
  this spectral signature to identify and filter the poisoned examples without discarding the entire dataset?
details:
  realistic_solution: Project all representations of the suspected class onto the top eigenvector of the
    covariance matrix. Calculate an anomaly score for each example based on its projection magnitude and
    filter out the top k% of examples with the highest absolute scores.
  common_mistake: Assuming the largest principal component represents the most salient benign features
    of the class and keeping it, or attempting to manually inspect the images, which fails against stealthy
    trigger patterns.
  napkin_math: For N=50,000 examples in $d=1024$ dimensions, the empirical covariance $\hat{\Sigma}$ is
    $1024 \times 1024$. The top eigenvector $v_1$ captures the trigger variance. Projection score $s_i
    = (x_i - \mu)^T v_1$. Poisoned samples cluster around $\pm \sqrt{N_{poison}}\epsilon$, separating
    from the clean distribution near 0.
