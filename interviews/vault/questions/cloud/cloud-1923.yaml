title: Identifying Poisoned Data via Spectral Signatures
scenario: Your team is training a ViT-L/16 model on a massive 500M image dataset distributed across 1024 GPUs. Security scanning flags a potential targeted data poisoning attack on a specific class. Retraining from scratch is prohibitively expensive. You decide to extract representations from the penultimate layer of the suspected class and compute their empirical covariance matrix. The top singular value of this matrix is 4.5x larger than the top singular values of baseline clean classes.
question: "How would you use the 4.5x top singular value in the suspected class to identify and filter poisoned examples?"
details:
  realistic_solution: Project all representations of the suspected class onto the top eigenvector of the covariance matrix. Calculate an anomaly score for each example based on its projection magnitude and filter out the top k% of examples with the highest absolute scores.
  common_mistake: |
    **The Pitfall:** Assuming the largest principal component represents the most salient benign features.
    **The Rationale:** Candidates confuse the high variance introduced by the poison trigger with standard feature variance.
    **The Consequence:** Filtering out the wrong examples or failing to remove the stealthy trigger patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - N = 50,000 examples.
    - d = 1024 dimensions.

    **Calculations:**
    - Empirical covariance matrix is 1024 x 1024.
    - Projection score $s_i = (x_i - \mu)^T v_1$.

    **Conclusion & Interpretation:**
    - **Result: Poisoned samples cluster around $\pm \sqrt{N_{poison}}\epsilon$ (Data-Bound)**. Separating from the clean distribution near 0.
