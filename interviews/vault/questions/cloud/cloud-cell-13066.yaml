title: 'Systolic Array Optimization: Fix Low MFU on TPU v5e'
scenario: 'A TPU v5e (197 TFLOPS BF16) runs BERT-large inference at 15 TFLOPS (7.6% MFU). Profiling shows
  85% of time in two operations: GeLU activation (memory-bound) and layer normalization (memory-bound).
  The remaining 15% is GEMM compute. Diagnose the systolic array underutilization and quantify the improvement
  from fusing GeLU+LayerNorm+Linear into a single kernel.'
details:
  realistic_solution: 'GeLU+LN are element-wise: AI ≈ 1-2 FLOPs/byte vs TPU ridge 240 → systolic array
    unutilized. GEMM 15% of time: 0.15 * total_time * 197 TFLOPS → actual GEMM at ~65% MFU. Fusing GeLU+LN
    into GEMM prologue/epilogue: eliminate separate memory round-trips. GeLU bandwidth: BERT hidden=1024,
    seq=128, batch=64: 64*128*1024*2=16MB. At 819 GB/s: 0.02ms. LayerNorm: another 16MB read + write =
    32MB = 0.039ms. Total saved: 0.059ms per layer. 24 layers: 1.42ms saved. Total time was: if GEMM=15%
    and 65% MFU: GEMM_time = FLOPs/TPU. Improvement from fusion: ~2x overall (Amdahl 85%→15% of total
    is memory-bound).'
  common_mistake: Optimizing the GEMM portion (15% of time) via algorithmic changes when Amdahl's Law
    shows the bottleneck is GeLU+LN (85% of time). The systolic array is idle during memory-bound operations.
  napkin_math: 'BERT-large at batch=64, seq=128: GEMM FLOPs = 2 * 24 * 4 * 1024^2 * 64 / 128 = ... Layer
    GEMM: 2*1024*1024*64*128/128 = hmm, better: per layer 4 GEMMs each (seq*batch, hidden)*(hidden,hidden)
    = 4*2*8192*1024*1024 = 68.7 GFLOP per layer * 24 = 1.65 TFLOP total. At 15 TFLOPS: time = 1.65T/15T
    = 110ms. GEMM_time at 65% MFU: 1.65T/(197T*0.65) = 12.9ms (15% of 86ms measured). GeLU+LN (85%): 73ms.
    After fusion: eliminate 73ms overhead, GEMMs take 12.9ms. Speedup: 86ms/12.9ms = 6.7x. MFU improves
    from 7.6% to ~51%.'
