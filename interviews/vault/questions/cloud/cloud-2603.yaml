title: Cloud Label Consensus L2 0
scenario: Your image classification dataset was labeled by 5 annotators per image.
  On 30% of images, annotators disagree. A junior engineer proposes taking the majority
  vote.
question: Why is simple majority voting limited when 5 annotators disagree on 30%
  of images, and what consensus methods improve it?
details:
  realistic_solution: 'Simple majority voting treats all annotators equally, but annotators
    have different skill levels. An expert who disagrees with 4 novices should carry
    more weight. Label consensus methods improve on this: (1) Dawid-Skene model —
    learns per-annotator confusion matrices iteratively, weighting reliable annotators
    more. (2) Inter-annotator agreement metrics (Cohen''s kappa, Fleiss'' kappa) —
    measure agreement beyond chance, identifying systematic disagreements. (3) Annotator
    filtering — remove annotators whose kappa falls below a threshold (e.g., 0.4).
    This produces higher-quality ground truth labels and identifies ambiguous examples
    that may need expert review or removal from the dataset.'
  common_mistake: '**The Pitfall:** Discarding all disagreed-upon examples.

    **The Rationale:** Candidates assume conflicting labels mean bad data that should
    be removed.

    **The Consequence:** Throwing away the most ambiguous, informative, and difficult
    examples, which are exactly the ones the model needs to learn from.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 5 annotators per image.

    - 1 bad annotator vs 2 bad annotators.


    **Calculations:**

    - Majority Vote (1 bad annotator): 4/5 agree -> ~92% label accuracy.

    - Majority Vote (2 bad annotators): 3/5 agree -> ~80% label accuracy.

    - Dawid-Skene model: Learns bad annotator weights and down-weights them.


    **Conclusion & Interpretation:**

    - **Result: Probabilistic models boost label accuracy back to ~96% (Quality-Bound)**.

    '
