title: 'Optimizing Distributed Training on NVIDIA H100: A Network Bandwidth Challenge'
scenario: You are tasked with training a large language model (LLM) with 1 trillion
  parameters using mixed-precision (FP16) on a cluster of NVIDIA H100 GPUs. Each H100
  features 80 GB HBM3 memory, 989 TFLOPS FP16 dense compute, and 3.35 TB/s memory
  bandwidth. The model is distributed across multiple nodes, each equipped with 8
  H100 GPUs connected via NVLink, and nodes are interconnected through a high-performance
  Ethernet fabric with a bisection bandwidth of 400 Gbps per node pair. During initial
  tests, you observe that scaling beyond 16 GPUs (across two nodes) yields diminishing
  returns, suggesting a network bottleneck. Describe how you would analyze this situation,
  considering the communication-computation ratio, and what strategies you would implement
  to mitigate network-bound training.
question: How would you analyze the communication-computation ratio for 1T-parameter
  FP16 training on H100s and mitigate the 400 Gbps inter-node bottleneck?
details:
  realistic_solution: '1. Analyze Communication Patterns: Profile the model to understand
    the dominant communication operations (e.g., all-reduce for gradients). 2. Optimize
    Communication Primitives: Leverage highly optimized communication libraries like
    NVIDIA''s NCCL, ensuring it''s configured for the cluster''s network topology.
    3. Model Parallelism: Implement hybrid parallelism strategies (e.g., combining
    data parallelism within a node with pipeline or tensor parallelism across nodes)
    to reduce the amount of data transferred between nodes. 4. Reduce Data Transfer:
    Use techniques like gradient accumulation, selective gradient updates, or sparsity-aware
    communication. 5. Network Topology Optimization: If possible, explore options
    for higher bisection bandwidth networking or more efficient node-to-node routing.'
  common_mistake: Overlooking the communication overhead of distributed training,
    assuming that increasing the number of GPUs will always lead to linear speedup.
    Failure to account for the impact of bisection bandwidth limitations on collective
    communication operations, especially for large models requiring frequent data
    exchange between nodes.
  napkin_math: '1T parameter model = 2TB gradients (FP16).
    Across 16 GPUs (2 nodes), inter-node AllReduce transfers 2 * (1/2) * 2TB = 2TB across the 400Gbps link.
    T_comm = 2TB / 50GB/s = 40 seconds.
    Assuming a global batch size of 1024 tokens per GPU (16K total) and 6 * 1T * 16K = 96 PFLOPs of compute.
    At 16 H100s * 989 TFLOPS * 40% MFU = ~6.3 PFLOPs/s effective compute.
    T_compute = 96 / 6.3 = 15.2 seconds.
    The communication-computation ratio is 40s / 15.2s = 2.63x. Since 2.63 >> 1, the training is severely network-bound.'
