title: Cloud New 0009
scenario: Architect a multi-modal serving platform (Vision + Text) on H100s. The vision encoder extracts
  features, and the LLM auto-regressively generates text. Design a decoupled pipeline to maximize throughput.
details:
  realistic_solution: 'Separate the vision encoder and LLM into distinct service pools. Route image inputs
    to an encoder pool optimized for high-throughput batching, outputting feature embeddings. Stream these
    embeddings into an LLM pool designed with continuous batching for text generation. Use an asynchronous
    message queue between them. Scale the pools independently: dynamically allocate more H100s to the
    LLM pool since auto-regressive generation is much slower than single-pass vision encoding.'
  common_mistake: Colocating the vision encoder and LLM in the same GPU process, locking up VRAM and forcing
    the fast encoder to wait on slow text decoding.
  napkin_math: Vision encoder (e.g., ViT) ~1B params = 2GB FP16. Single pass on H100 989TFLOPS is micro-seconds.
    LLM 70B = 140GB FP16. Decoding relies on 3.35TB/s HBM3. Ratio of LLM to Vision nodes should be at
    least 10:1 based on latency.
