title: Evaluating Host DRAM Staging vs GPU DALI Pipelines
scenario: You are optimizing a vision model training pipeline on a server with 8x A100 GPUs, 1TB Host
  DRAM, 64-core CPU, and NVMe SSDs. Currently, a PyTorch DataLoader uses Host DRAM as a staging buffer
  to decode JPEGs, apply heavy augmentations, and batch FP32 tensors before PCIe Gen4 transfer. The GPUs
  are starved for data (60% utilization). You must evaluate whether to scale up the Host DRAM prefetch
  buffer and CPU worker count, or to bypass Host DRAM staging for augmentations by transferring compressed
  JPEGs over PCIe to be decoded and augmented directly on the GPUs (e.g., using NVIDIA DALI). How do you
  quantitatively evaluate this architectural trade-off?
details:
  realistic_solution: Calculate the CPU time per image and total PCIe bandwidth. If PCIe bandwidth is
    well below the Gen4 limit but GPUs are starved, the CPU is the bottleneck. Moving decoding/augmentation
    to the GPU relieves the CPU and utilizes dedicated NVDEC hardware, but trades away precious GPU HBM
    capacity and some SM compute. If HBM isn't fully utilized by the model, shifting the staging buffer
    to the GPU is optimal.
  common_mistake: Assuming that Host DRAM staging is bottlenecked by the PCIe transfer bandwidth of uncompressed
    tensors, rather than the CPU compute required to decode and augment thousands of images per second.
  napkin_math: For 8 GPUs at 2,000 imgs/sec = 16,000 imgs/sec total. Uncompressed FP32 (224x224x3) = 602
    KB/img. PCIe bandwidth = 16k * 602 KB = 9.6 GB/s (well within 31.5 GB/s Gen4 x16 limit). However,
    CPU needs to decode/augment 16k imgs/sec. With 64 CPU cores, each core must process 250 imgs/sec (4ms
    per image), which is often impossible for complex augmentations. Moving to GPU sends 150 KB JPEGs
    (2.4 GB/s PCIe) and consumes ~2-4GB HBM per GPU for staging.
