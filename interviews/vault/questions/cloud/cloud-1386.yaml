title: Evaluating Host DRAM Staging vs GPU DALI Pipelines
scenario: >
  You are optimizing a vision model training pipeline on a server with 8x GPUs, 1TB Host DRAM, 64-core CPU, and NVMe SSDs. Currently, a PyTorch DataLoader uses Host DRAM as a staging buffer to decode JPEGs, apply heavy augmentations, and batch FP32 tensors before PCIe transfer. The GPUs are starved for data (60% utilization).
question: >
  How do you quantitatively evaluate whether to scale up Host DRAM/CPUs or bypass Host DRAM to decode/augment directly on GPUs?
details:
  realistic_solution: |
    Calculate the CPU time per image and total PCIe bandwidth. If PCIe bandwidth is well below the Gen4 limit but GPUs are starved, the CPU is the bottleneck. Moving decoding/augmentation to the GPU relieves the CPU and utilizes dedicated NVDEC hardware, but trades away precious GPU HBM capacity and some SM compute. If HBM isn't fully utilized by the model, shifting the staging buffer to the GPU is optimal.
  common_mistake: |
    **The Pitfall:** Assuming Host DRAM staging is bottlenecked by PCIe transfer bandwidth.
    **The Rationale:** Candidates look at data transfer paths but fail to calculate the CPU compute required to decode and augment thousands of images per second per core.
    **The Consequence:** Upgrading PCIe hardware or ignoring the real bottleneck, leaving GPUs starved for data while CPUs are pinned at 100%.
  napkin_math: |
    * Target: 8 GPUs * 2,000 imgs/sec = 16,000 imgs/sec total.
    * PCIe bandwidth (uncompressed): 16k * 602 KB (224x224x3 FP32) = 9.6 GB/s (Well within Gen4 x16 limits).
    * CPU requirement: 16,000 imgs/sec / 64 cores = 250 imgs/sec per core (4 ms per image).
    * Moving to GPU: Sends 150 KB JPEGs over PCIe (2.4 GB/s) and uses NVDEC hardware, trading ~2-4GB of GPU HBM for unblocking the CPU.
    * **Result:** **4 ms is often too tight for complex augmentations, so the CPU is the bottleneck.**
