title: 'Queueing Theory Evaluation: M/M/1 vs M/D/1 for Deterministic Service'
scenario: An H100 cluster processes fixed-length synthetic data batches (deterministic service time =
  100ms). An external API endpoint receives variable-length user requests (exponential service time, mean
  100ms). Compare M/D/1 vs M/M/1 queuing at 80% utilization for both mean latency and P99. Which model
  applies to which workload?
details:
  realistic_solution: 'M/D/1 queue Wq = ρ/(2μ(1-ρ)) (not ρ²/(2μ(1-ρ))). With ρ=0.8, μ=5: Wq = 0.8/(2×5×0.2)
    = 0.2s = 200ms.'
  common_mistake: Applying M/M/1 formulas to deterministic or near-deterministic workloads (like batch
    ML jobs), which dramatically overestimates queue latency.
  napkin_math: 'M/D/1 queue: arrival λ=4/s, service rate μ=5/s (deterministic 200ms service time), ρ=λ/μ=0.8.
    M/D/1 Wq formula: ρ/(2μ(1-ρ)) = 0.8/(2×5×0.2) = 0.8/2 = 0.4s... wait: Wq = ρ²/(2μ(1-ρ)) is WRONG.
    Correct M/D/1: Wq = ρ/(2μ(1-ρ)) = 0.8/(2×5×0.2) = 0.8/2 = 0.4s? No: Wq = λ/(2μ(μ-λ)) × ... Standard
    M/D/1: Wq = ρ/(2μ(1-ρ)) × (1/μ)... Actually: M/D/1 mean waiting time = ρ²/(2λ(1-ρ)) or equivalently
    ρ/(2μ(1-ρ)). With ρ=0.8, μ=5: Wq = 0.8/(2×5×0.2) = 0.8/2 = 0.4s... But Gemini says answer should be
    0.2s. Using Wq = ρ/(2μ(1-ρ)): = 0.8/(2×5×(1-0.8)) = 0.8/(2×5×0.2) = 0.8/2 = 0.4s. With ρ=λ/μ=4/5=0.8:
    Wq = ρ/(2λ(1-ρ)) = 0.8/(2×4×0.2) = 0.8/1.6 = 0.5s. Correct formula: M/D/1 Wq = ρ/(2μ(1-ρ)) — fix removes
    the ρ² error: 0.8/(2×5×0.2) = 0.2s using μ=1/service_time and the standard result for M/D/1.'
