title: Calculating Minimum Model Parallelism Degree
scenario: As a theoretical sizing exercise, calculate the minimum tensor-parallel degree N that would let a 30-billion parameter transformer fit its training state on 40 GB A100s if we deliberately disabled ZeRO-style optimizer-state partitioning, FSDP, and pipeline parallelism. Mixed-precision FP16 Adam keeps FP16 weights, FP16 gradients, and FP32 master weights, momentum, and variance. Reserve 8 GB per GPU for activations and workspace.
question: What minimum tensor-parallel degree fits the 30B mixed-precision Adam training state on 40GB A100s if ZeRO/FSDP and PP are disabled?
details:
  realistic_solution: In standard mixed-precision training, each parameter requires 16 bytes of memory (2 bytes for FP16 weights, 2 bytes for FP16 gradients, 4 bytes for FP32 master weights, 4 bytes for FP32 momentum, and 4 bytes for FP32 variance). A 30B parameter model thus requires 480GB of memory. With 32GB of usable memory per 40GB GPU, 15 GPUs are mathematically required. To maintain symmetrical division across attention heads and efficient communication topologies, the realistic minimum Model Parallelism degree is 16.
  common_mistake: |
    **The Pitfall:** Calculating memory requirements based solely on the 16-bit model weights.
    **The Rationale:** Candidates often forget the massive 14 bytes/param overhead required by gradients, master weights, and Adam optimizer states during training.
    **The Consequence:** Drastically under-provisioning hardware, leading to instant out-of-memory crashes when training begins.
  napkin_math: |
    1. State per param = 2 (FP16 W) + 2 (FP16 G) + 4 (FP32 W) + 4 (FP32 M) + 4 (FP32 V) = 16 bytes.
    2. Total Model State = 30e9 * 16 bytes = 480 GB.
    3. Usable GPU Memory = 40 GB - 8 GB (activations) = 32 GB.
    4. Minimum GPUs = 480 GB / 32 GB = 15 GPUs.
    5. Nearest hardware-friendly power of 2 = 16.
    **A tensor-parallel degree of 16 is required.**
