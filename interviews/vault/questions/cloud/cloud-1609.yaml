title: Calculating Minimum Model Parallelism Degree
scenario: You are provisioning a training cluster for a 30-billion parameter transformer model using standard
  mixed-precision training (FP16 with Adam optimizer). Without using ZeRO-style optimizer state partitioning,
  the model states (weights, gradients, FP32 master weights, momentum, variance) must be distributed across
  devices using pure Model Parallelism. The cluster uses NVIDIA A100 GPUs with 40GB of HBM each. Assume
  you need to reserve 8GB per GPU strictly for activations and workspace. Calculate the minimum required
  degree of Model Parallelism to fit the training state.
details:
  realistic_solution: In standard mixed-precision training, each parameter requires 16 bytes of memory
    (2 bytes for FP16 weights, 2 bytes for FP16 gradients, 4 bytes for FP32 master weights, 4 bytes for
    FP32 momentum, and 4 bytes for FP32 variance). A 30B parameter model thus requires 480GB of memory.
    With 32GB of usable memory per 40GB GPU, 15 GPUs are mathematically required. To maintain symmetrical
    division across attention heads and efficient communication topologies, the realistic minimum Model
    Parallelism degree is 16.
  common_mistake: Calculating memory requirements based only on the 16-bit model weights (which would
    be 60GB total, incorrectly implying just 2 GPUs), completely ignoring the 14 bytes/param overhead
    of gradients, master weights, and Adam optimizer states.
  napkin_math: 'State per param = 2 (FP16 W) + 2 (FP16 G) + 4 (FP32 W) + 4 (FP32 M) + 4 (FP32 V) = 16
    bytes.

    Total Model State = 30e9 * 16 bytes = 480 GB.

    Usable GPU Memory = 40 GB - 8 GB (activations) = 32 GB.

    Minimum GPUs = 480 GB / 32 GB = 15 GPUs.

    Nearest hardware-friendly power of 2 = 16.'
