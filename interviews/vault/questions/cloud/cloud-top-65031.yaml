title: 'LoRA Target Module Selection: Q/K/V/O vs All Linear Layers'
scenario: A team fine-tuning Mistral 7B for classification debates whether to apply LoRA to only Q and
  V projections (standard practice) versus all linear layers including MLP. Calculate the parameter count
  difference and performance implications.
question: "For Mistral 7B classification, how many LoRA parameters do Q+V-only versus all-linear targeting add, and what are the performance implications?"
details:
  realistic_solution: 'LoRA module selection for Mistral 7B: standard (Q+V only): 2 matrices × 32 layers
    × d=4096 × r. All-linear (Q,K,V,O,gate,up,down): 7 matrices × 32 layers. Memory scaling: ~5× more
    params for all-linear. For classification tasks, the final MLP layers are most task-critical, so adding
    LoRA to MLP is more valuable than for generation tasks. Research finding: for classification and extraction
    tasks, Q+V+down_proj covers 90%+ of performance of all-linear at ~50% the parameter count. For generation/instruction-following:
    Q+V+up_proj captures attention-MLP interaction. Ablation test: start with Q+V, measure validation
    performance, add MLP matrices, check if improvement exceeds 0.5% practical significance threshold.'
  common_mistake: Assuming applying LoRA to all layers always improves performance. The common misunderstanding
    is that more trainable parameters always help. For many tasks, attention mechanisms capture task-relevant
    transformations, and adding LoRA to MLP layers adds capacity without proportional improvement.
  napkin_math: 'Mistral 7B, r=8: Q+V only: 2 * 32 * 4096 * 8 * 2 = 4.19M params. All-linear (Q,K,V,O +
    gate,up,down) — correct LoRA params per linear layer = r*(d_in + d_out). For attn [4096,4096]: r*(4096+4096)=65,536
    per matrix × 4 matrices × 32 layers = 8.39M. MLP [4096,14336]: r*(4096+14336)=147,456 per matrix ×
    3 matrices × 32 layers = 14.15M. Total all-linear ≈ 8.39M + 14.15M = 22.5M params. ~5.4× more than
    Q+V. GPU memory delta: 22.5M * 2B (BF16) = 45MB — still small. Training time delta: 5.4× more gradient
    computation.'
