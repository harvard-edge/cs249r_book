title: SecAgg Mask Generation Compute Overhead
scenario: You are designing the cloud aggregator for a cross-device federated learning system using the Bonawitz et al. Secure Aggregation (SecAgg) protocol. Each round includes 500 clients, and the model has 20 million parameters (FP32). To ensure the server only sees the sum of the updates, each client generates a pairwise random mask with every other client using a Pseudo-Random Generator (PRG).
question: If a client's mobile SoC has a PRG throughput of 2.0 GB/s, how much latency does each client add generating SecAgg pairwise PRG masks for 500 clients?
details:
  realistic_solution: Calculate the total mask volume generated per client and divide by PRG throughput. The 20-second latency highlights the need for sparse communication graphs (like SecAgg+) where clients only pair with a logarithmic number of peers.
  common_mistake: |
    **The Pitfall:** Neglecting the compute cost of cryptographic mask generation.
    **The Rationale:** Engineers focus purely on the O(N²) network communication cost of secret sharing, forgetting the massive O(N * d) compute cost.
    **The Consequence:** The protocol times out on mobile devices because generating thousands of high-dimensional PRG masks melts the CPU.
  napkin_math: |
    *   **Model Size:** 20M params × 4 bytes/param = 80 MB.
    *   **Peers per Client:** 500 - 1 = 499 peers.
    *   **Total Mask Data:** 499 peers × 80 MB = 39,920 MB = ~39.92 GB.
    *   **PRG Throughput:** 2.0 GB/s.
    *   **Compute Latency:** 39.92 GB / 2.0 GB/s = **~20 seconds of pure compute latency added per client.**
