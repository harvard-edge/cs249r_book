title: The Datacenter Rack Power Budget
scenario: You're designing a new AI cluster. Your datacenter provider has allocated you a single, liquid-cooled
  rack with a total power and thermal budget of 70 kilowatts (kW). You plan to populate this rack with
  servers, each containing one NVIDIA H100 GPU. Each H100 GPU has a Thermal Design Power (TDP) of 700
  watts. The non-GPU components in each server (CPU, memory, NICs) add another 300 watts of power draw.
  The datacenter has a Power Usage Effectiveness (PUE) of 1.1. Explain how many H100 GPUs you can safely
  install in this rack before exceeding its thermal limit.
question: "How many one-H100 servers can fit in a 70 kW rack when each uses 700W GPU, 300W non-GPU, and PUE is 1.1?"
details:
  realistic_solution: 'To find the correct number, you must calculate the total power consumption per
    server *at the facility level* and then divide the rack''s total power budget by that number. First,
    calculate the power per server: 700W for the GPU plus 300W for the rest of the server equals 1000W,
    or 1kW. Next, you must account for the Power Usage Effectiveness (PUE) of 1.1, which means for every
    1W of compute power, an additional 0.1W is needed for cooling. So, the total facility power per server
    is 1kW * 1.1 = 1.1kW. Finally, divide the rack''s 70kW budget by the 1.1kW per-server draw: 70 / 1.1
    ≈ 63.63. Since you can''t install a fraction of a server, you must round down. You can safely install
    63 H100s.'
  common_mistake: The most common mistake is to only divide the rack budget by the GPU TDP (70,000W /
    700W = 100 GPUs). This ignores both the significant power draw from the rest of the server components
    (CPU, memory, etc.) and the cooling overhead tax represented by the PUE. This leads to a massive overestimation
    and a rack that would immediately trip its breakers.
  napkin_math: '1. Calculate power per server: 700W (H100 TDP) + 300W (CPU, RAM, networking) = 1000W (1kW).

    2. Account for datacenter cooling overhead using Power Usage Effectiveness (PUE), typically ~1.2.

    3. Facility power per server = 1kW * 1.2 = 1.2kW.

    4. Total Rack Capacity = 70kW.

    5. Max servers per rack = 70kW / 1.2kW = 58.33.

    You can safely install 58 servers in this single liquid-cooled rack.'
  options:
  - '100 GPUs. (Calculation: 70,000W / 700W)'
  - '70 GPUs. (Calculation: 70,000W / (700W + 300W))'
  - '63 GPUs. (Calculation: 70,000W / ((700W + 300W) * 1.1))'
  - '90 GPUs. (Calculation: 70,000W / (700W * 1.1))'
  correct_index: 2
