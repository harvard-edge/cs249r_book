title: Diagnosing GPU Underutilization in Long-Sequence RNNs
scenario: Your team is deploying a multi-layer LSTM for high-frequency trading anomaly detection on an NVIDIA A100. The input sequence length is 2048. Despite increasing the batch size to 256, GPU SM utilization is ~15% and inference latency is >45ms per batch.
question: What architectural bottleneck is causing low A100 utilization and >45ms latency for the 2048-step LSTM?
details:
  realistic_solution: Identify the O(N) sequential dependency where hidden state computation at time t strictly requires the output from time t-1. This serial execution path prevents the GPU from parallelizing matrix operations across the sequence dimension, leaving massively parallel SMs idle. The architectural solution requires migrating to models that allow parallel computation across time (like Transformers or Temporal Convolutional Networks).
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is purely I/O, memory bandwidth, or suboptimal data loading.
    **The Rationale:** Engineers forget that recurrent models have strict step-to-step serial dependencies that prevent parallelization across the sequence dimension.
    **The Consequence:** Teams waste weeks optimizing data pipelines to fix "underutilization" that is mathematically hardcoded into the architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: Multi-layer LSTM, input sequence length = 2048.
       - Hardware: NVIDIA A100.
       - O(N) sequential dependency limits parallelization.
    2. **Calculations:**
       - Theoretical Compute Time: 2048 steps * 5.3e8 FLOPs/step = ~1.1e12 FLOPs total. At 3.12e14 FLOPs/s, perfect parallelization takes ~3.5ms.
       - Kernel Serialization: 2048 steps * 15µs kernel launch/scheduling latency = ~30.7ms.
       - Total Latency Floor > 30.7ms, structurally capping performance.
    3. **Conclusion & Interpretation:**
       - Kernel launch overhead and sequential dependencies impose a hard latency floor, capping hardware utilization.
       - **Result: Architectural Serialization (Compute Bound)**
