title: Ring AllReduce Bottleneck
scenario: An A100 cluster drops 40% in scaling efficiency moving from 8 to 16 nodes.
  The model requires syncing 100GB of gradients over a 400 Gbps network.
question: Calculate the expected communication time per step using Ring AllReduce
  on 16 nodes to diagnose the bottleneck.
details:
  realistic_solution: Ring AllReduce transmits 2*(N-1)/N of the payload. For 16 nodes,
    this is 2*(15/16)*100GB = 187.5 GB per node. A 400 Gbps link provides 50 GB/s
    bandwidth. Thus, syncing takes 187.5 / 50 = 3.75 seconds. The sheer communication
    time competes with computation time, destroying scaling efficiency.
  common_mistake: Failing to account for the 2*(N-1)/N multiplier in Ring AllReduce
    or mixing up Gbps (bits) and GB/s (bytes).
  napkin_math: (2 * 15 / 16) * 100 / (400 / 8) = 3.75s
