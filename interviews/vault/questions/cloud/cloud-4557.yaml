title: Ring AllReduce Bottleneck
scenario: An A100 cluster drops 40% in scaling efficiency moving from 8 to 16 nodes. The model requires syncing 100GB of gradients over a 400 Gbps network.
question: Calculate the expected communication time per step using Ring AllReduce on 16 nodes to diagnose the bottleneck.
details:
  realistic_solution: Ring AllReduce transmits 2*(N-1)/N of the payload. For 16 nodes, this is 2*(15/16)*100GB = 187.5 GB per node. A 400 Gbps link provides 50 GB/s bandwidth. Thus, syncing takes 187.5 / 50 = 3.75 seconds. The sheer communication time competes with computation time, destroying scaling efficiency.
  common_mistake: |
    **The Pitfall:** Failing to correctly model the data transfer volume of Ring AllReduce.
    **The Rationale:** Ignoring the 2*(N-1)/N multiplier or mixing up bits (Gbps) and bytes (GB/s).
    **The Consequence:** Grossly underestimating the communication overhead, which explains the 40% drop in scaling efficiency.
  napkin_math: |
    - Ring AllReduce transmits 2*(N-1)/N of the payload.
    - For N=16 nodes, multiplier is 2*(15/16) = 1.875.
    - Data to transmit: 1.875 × 100 GB = 187.5 GB per node.
    - 400 Gbps link bandwidth: 400 Gbps / 8 = 50 GB/s.
    - **Syncing time: 187.5 GB / 50 GB/s = 3.75 seconds.**
