title: Routing MoE All-to-All Bursts at Scale
scenario: 'You are designing the back-end network for a 32,000 GPU cluster dedicated to training a 1T parameter MoE (Mixture of Experts) model. The workload is characterized by massive, synchronous All-to-All communication bursts. The infrastructure team proposes a standard non-blocking Fat-Tree topology utilizing ECMP (Equal-Cost Multi-Path) routing.'
question: "Is ECMP on a non-blocking Fat-Tree sufficient for 32,000-GPU MoE All-to-All bursts, or should you use Adaptive Routing?"
details:
  realistic_solution: Replace or augment ECMP with Adaptive Routing (AR) or packet spraying. AR dynamically selects output ports based on real-time queue depths, routing traffic around transient local congestion. While it introduces the risk of out-of-order packet delivery requiring robust transport-layer reassembly (like in advanced RoCEv2 or InfiniBand implementations), it is essential for maintaining high link utilization during All-to-All bursts.
  common_mistake: |
    **The Pitfall:** Assuming ECMP provides perfect load balancing.
    
    **The Rationale:** Candidates often forget that ECMP relies on static 5-tuple hashing. For synchronous elephant flows typical in collective operations, this leads to massive hash collisions.
    
    **The Consequence:** Persistent incast, severe port hot-spotting, and severely limited effective bisection bandwidth.
  napkin_math: |
    * **Ideal Transfer:** 500 GB total transfer at 400Gbps (50 GB/s) per link = 10s ideal
    * **ECMP Limitations:** Hash collisions limit effective bisection bandwidth to ~60%
    * **ECMP Time:** 10s / 0.60 = 16.7s
    * **Adaptive Routing (AR):** Pushes utilization to >90%
    * **AR Time:** 10s / 0.90 = 11.1s
    * **Result:** **AR saves >5.5 seconds per iteration step over ECMP.**
