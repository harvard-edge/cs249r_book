title: Routing MoE All-to-All Bursts at Scale
scenario: You are designing the back-end network for a 32,000 GPU cluster dedicated to training a 1T parameter
  MoE (Mixture of Experts) model. The workload is characterized by massive, synchronous All-to-All communication
  bursts. The infrastructure team proposes a standard non-blocking Fat-Tree topology utilizing ECMP (Equal-Cost
  Multi-Path) routing. Evaluate this proposal. Justify why ECMP might be insufficient for this specific
  workload, and evaluate the trade-offs of implementing Adaptive Routing instead.
question: "Is ECMP on a non-blocking Fat-Tree sufficient for 32,000-GPU MoE All-to-All bursts, or should you use Adaptive Routing?"
details:
  realistic_solution: Replace or augment ECMP with Adaptive Routing (AR) or packet spraying. AR dynamically
    selects output ports based on real-time queue depths, routing traffic around transient local congestion.
    While it introduces the risk of out-of-order packet delivery requiring robust transport-layer reassembly
    (like in advanced RoCEv2 or InfiniBand implementations), it is essential for maintaining high link
    utilization during All-to-All bursts.
  common_mistake: Assuming ECMP provides perfect load balancing. Candidates often forget that ECMP relies
    on static 5-tuple hashing. For synchronous elephant flows typical in collective operations, this leads
    to hash collisions, persistent incast, and severe port hot-spotting.
  napkin_math: In a non-blocking network, ECMP hash collisions for large synchronous flows limit effective
    bisection bandwidth to ~60-65% (related to the coupon collector's problem). If an All-to-All burst
    requires 500GB total transfer at 400Gbps per link, 60% utilization takes ~16.6s. AR pushing utilization
    to >90% reduces transfer time to ~11s, saving >5 seconds per iteration step.
