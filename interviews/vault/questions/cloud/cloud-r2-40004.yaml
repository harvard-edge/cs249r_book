title: Switch Buffer Sizing for ML Incast
scenario: A ToR switch connects 8 A100 GPUs, each with a 200Gbps RDMA NIC. During AllReduce, all 8 GPUs
  may send to the same uplink port simultaneously. The switch has a single shared buffer pool. Calculate
  the minimum buffer required to absorb a full incast burst without dropping packets, assuming the burst
  lasts for one round-trip time (4μs within the rack).
question: "What minimum shared buffer is needed to absorb the 8-to-1 incast burst for one 4μs RTT without packet drops?"
details:
  realistic_solution: 'Each A100 NIC sends at 200Gbps = 25 GB/s. With 8 senders targeting one 200Gbps
    uplink, the aggregate ingress is 8 × 25 = 200 GB/s, but the port can only drain at 25 GB/s. The excess
    rate is 175 GB/s. During one RTT (4μs), the buffer must absorb: 175 GB/s × 4μs = 700 KB. Adding 20%
    headroom for scheduling overhead: ~840 KB minimum. In practice, switches like the Broadcom Memory
    Memory 12.8T have 64-132MB of shared buffer, which is sufficient, but the buffer must be correctly
    allocated per-port using dynamic thresholds (alpha = 8 is typical for ML workloads).'
  common_mistake: Only accounting for one sender's bandwidth-delay product. Incast means N senders simultaneously
    target one port, so the buffer must absorb (N-1) × BDP worth of excess traffic, since one sender's
    worth can drain in real time.
  napkin_math: 'Excess rate = (8 - 1) × 25 GB/s = 175 GB/s. Buffer = 175 GB/s × 4μs = 700 KB per incast
    event. With 32 ports potentially experiencing incast: 32 × 700 KB = 22.4 MB minimum shared buffer.'
