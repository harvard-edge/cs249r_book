title: Mitigating Spurious Correlations in X-Ray Classification
scenario: 'You are evaluating the robustness of a ResNet-50 model trained on 250,000
  chest X-rays to detect pneumonia. The model achieves 98% AUROC in validation but
  drops to 65% when deployed to a new hospital. Analysis reveals the model relies
  on spurious correlations: specific metal markers from scanner beds and ''portable''
  text stamps. You must evaluate three mitigation strategies: 1) Heuristic image cropping
  and masking, 2) Group Distributionally Robust Optimization (Group DRO) using scanner
  metadata, and 3) Jointly training an adversarial domain classifier to penalize scanner-specific
  features (Domain Adversarial Neural Networks, DANN).'
question: How do you evaluate the trade-offs in compute overhead, metadata requirements,
  and generalization guarantees to select the optimal architecture?
details:
  realistic_solution: Group DRO provides the best trade-off if subgroup metadata (scanner
    IDs) is available. It avoids the 2x forward/backward pass overhead and instability
    of DANNs while explicitly optimizing worst-group loss to force learning of causal
    pathology features rather than spurious markers.
  common_mistake: '**The Pitfall:** Choosing heuristic cropping or underestimating
    the compute costs of adversarial training (DANN).

    **The Rationale:** Candidates assume computer vision heuristics scale to systemic
    pixel-level differences (like scanner noise profiles) or they propose complex
    GAN architectures without realizing the training instability overhead.

    **The Consequence:** Deploying brittle vision pipelines that require constant
    manual tweaking for every new hospital added to the network.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Group 1 (Pneumonia + Marker): N = 100,000.

    - Group 2 (Pneumonia + No Marker): N = 1,000.

    - Standard ERM loss: weighted average.

    - Group DRO loss: max(L_G1, L_G2).


    **Calculations:**

    - ERM Gradient Weight: Group 1 provides ~99% of the signal; Group 2 provides ~1%.

    - Group DRO Gradient Weight: Dynamically scales Group 2 loss to match Group 1,
    effectively upweighting Group 2 by ~100x.


    **Conclusion & Interpretation:**

    - **Result: Generalization-Bound Optimization**. By penalizing the worst-group
    loss, Group DRO forces the network to learn invariant causal features without
    the 2x compute overhead of adversarial DANN training.

    '
