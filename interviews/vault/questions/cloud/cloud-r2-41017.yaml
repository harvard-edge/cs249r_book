title: TP Scaling Efficiency Cliff
scenario: Plot the expected MFU (Model FLOP Utilization) as TP degree increases from 1 to 8 on H100 NVLink
  nodes for a 13B parameter model. At what TP degree does efficiency drop sharply, and why?
details:
  realistic_solution: 'For a 13B model (hidden=5120, 40 layers, 40 heads): TP=1: Each GEMM is large ([batch,
    5120] × [5120, 20480]), achieving near-peak Tensor Core utilization. MFU ~55-60%. TP=2: GEMMs halve
    in one dimension, still large enough for good utilization. Comms are tiny on NVLink. MFU ~52-55%.
    TP=4: GEMMs are 1/4 size. Still reasonable. MFU ~45-50%. TP=8: Each GPU handles [batch, 5120] × [5120,
    2560] — the output dimension is only 2560. For small batch sizes, this GEMM becomes memory-bound (low
    arithmetic intensity). Meanwhile, 2 AllReduces per block × 40 blocks = 80 AllReduces per forward pass.
    MFU drops to ~30-35%. The cliff hits between TP=4 and TP=8 for 13B models because the GEMM dimensions
    shrink below the Tensor Core efficiency threshold (~4096 in the smallest dimension). Rule of thumb:
    TP is efficient when hidden_dim / TP ≥ 2048.'
  common_mistake: Assuming linear scaling — doubling TP should halve time. In reality, each GPU's GEMM
    shrinks (lower arithmetic intensity) while communication stays constant per collective, causing the
    compute-to-communication ratio to collapse.
  napkin_math: 'hidden/TP threshold: 5120/8 = 640 — well below 2048. At TP=4: 5120/4 = 1280, borderline.
    13B models are best at TP=2 or TP=4.'
