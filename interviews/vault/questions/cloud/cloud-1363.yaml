title: Diagnosing Deterministic Bit-Flips in Custom AI ASICs
scenario: During validation of a new 5nm cloud AI accelerator manufactured at a third-party foundry, your team observes that inferences containing a highly specific, rare combination of padded token IDs consistently produce corrupted output logits. Furthermore, high-resolution side-channel power monitoring detects a reproducible 50mW spike exactly coinciding with these corrupted inferences. Standard memory diagnostics and SRAM ECC logs report zero single-event upsets (SEUs).
question: What is the likely root cause of deterministic logit corruption with rare token IDs and a correlated 50 mW power spike?
details:
  realistic_solution: Diagnose the presence of a dormant hardware Trojan. The deterministic triggering by a rare input state and the correlated power spike indicate maliciously inserted combinational logic. You must isolate the anomalous power signature via Side-Channel Analysis (SCA) and verify using ATPG (Automatic Test Pattern Generation) targeting rare transitional states.
  common_mistake: |
    **The Pitfall:** Attributing the failure to random soft errors or software bugs.
    **The Rationale:** Engineers default to common, benign explanations like cosmic rays or thermal throttling.
    **The Consequence:** They ignore the deterministic payload-trigger and the absolute absence of ECC memory corrections, missing a critical security vulnerability.
  napkin_math: |
    1. **Power Draw:** P = 50mW.
    2. **Current Draw:** At an accelerator Vdd = 0.7V, I = 50mW / 0.7V ≈ 71mA.
    3. **Gate Switching:** If a standard 5nm FinFET logic gate draws ~50nA during switching, this power spike corresponds to roughly 71mA / 50nA ≈ 1.42 million gates.
    4. **Conclusion:** **This massive, correlated switching activity proves the activation of a substantial dormant hardware Trojan**, completely ruling out single-gate transient faults.
