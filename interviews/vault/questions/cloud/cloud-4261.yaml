title: MI300X XCD Count and Die Topology
scenario: 'A colleague claims the MI300X is a monolithic die with a large HBM pool.'
question: 'What is the actual MI300X chiplet topology, and why is the 192 GB HBM pool not a monolithic die?'
details:
  realistic_solution: 'The MI300X is a multi-chip module utilizing a sophisticated 2.5D/3D packaging architecture. It consists of multiple Compute Dies (XCDs) stacked on top of base I/O and Memory Cache Dies (MCDs), connected via AMD Infinity Fabric. While the operating system presents a unified 192 GB HBM address space, the underlying hardware strictly imposes NUMA properties. Workloads must implement NUMA-aware memory allocation to prevent excessive die-to-die fabric traversals.'
  common_mistake: |
    **The Pitfall:** Treating chiplet architectures as a single homogeneous compute die.
    **The Rationale:** Because the OS and runtime present the 192 GB HBM pool as a flat, unified address space, engineers assume uniform memory latency and bandwidth.
    **The Consequence:** They fail to optimize NUMA node affinity, leading to sub-optimal data placement and unnecessary die-to-die fabric traversal overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 8 XCDs (Compute Dies) attached to 192 GB total HBM3.
       * Total HBM bandwidth: ~5.3 TB/s peak.
       * Infinity Fabric bandwidth limits cross-die traffic.
    2. **Calculations:**
       * Local HBM allocation: 192 GB / 8 XCDs = 24 GB local memory per XCD.
       * Local bandwidth per XCD: 5.3 TB/s / 8 ≈ 660 GB/s.
    3. **Conclusion & Interpretation:**
       * **Result: Cross-XCD memory access incurs fabric hops and massive bandwidth penalties; NUMA affinity is strictly required.**
