title: MI300X XCD Count and Die Topology
scenario: 'A colleague claims the MI300X is a monolithic die with a large HBM pool.'
question: 'What is the actual MI300X chiplet topology, and why is the 192 GB HBM pool not a monolithic die?'
details:
  realistic_solution: 'MI300X is composed of 8 XCDs (Compute Dies) plus 4 MCD (Memory Cache Dies) connected via AMD Infinity Fabric on an interposer. Each XCD has its own L2 cache and direct HBM attachment through the MCDs. The OS and runtime see 192 GB unified but NUMA distance between XCDs varies by fabric hop count.'
  common_mistake: |
    **The Pitfall:** Treating the MI300X as a single homogeneous compute die.
    **The Rationale:** Because the OS and runtime present the 192 GB HBM pool as a flat, unified address space, engineers assume uniform memory latency and bandwidth.
    **The Consequence:** They fail to optimize NUMA node affinity, leading to sub-optimal data placement and unnecessary die-to-die fabric traversal overheads.
  napkin_math: |
    * **Physical topology:** 8 XCDs (Compute Dies) + 4 MCDs.
    * **HBM attachment:** 8 XCDs * 24 GB HBM3 = 192 GB total.
    * **Die-to-die Infinity Fabric bandwidth:** ~896 GB/s aggregate.
    * **Local HBM access:** ~5.3 TB/s peak / 8 XCDs = **~660 GB/s per XCD local**.
    * **Result:** Cross-XCD memory access incurs 1-2 fabric hops and significantly lower bandwidth than local access.
