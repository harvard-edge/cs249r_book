title: Bandwidth-Constrained OTA Pipelines
scenario: You operate a cloud service that pushes weekly updates for an 800MB vision model to 50,000 autonomous delivery robots. Cellular data egress costs $0.10/GB. Sending the full model costs $4,000 per week.
question: How would you redesign the weekly OTA deployment pipeline to reduce cellular data costs by over 90% without degrading model performance?
details:
  realistic_solution: 'Implement an algorithm-deployment co-design using Parameter-Efficient Fine-Tuning (PEFT) techniques like LoRA (Low-Rank Adaptation) or decouple the model architecture. Instead of updating the entire 800MB backbone, freeze the backbone and only train/deploy a 10MB LoRA adapter or the final classification heads. The edge deployment pipeline then sends only the adapter weights, and the edge runtime loads the frozen backbone and dynamically applies the adapter. Tradeoff: Slight increase in on-device memory/compute to apply the adapter vs massive savings in network bandwidth and deployment time.'
  common_mistake: |
    **The Pitfall:** Applying standard gzip or LZ4 compression to the full model weights.
    **The Rationale:** Candidates rely on standard web-traffic compression techniques to reduce payload size.
    **The Consequence:** They achieve negligible compression ratios because dense floating-point weights have high entropy, failing to meet the 90% cost reduction goal.
  napkin_math: |
    - Current cost: 50,000 robots × 0.8 GB × $0.10/GB = $4,000/week (or $208,000/year).
    - LoRA adapter approach: Send only a 10 MB adapter per robot.
    - New payload cost: 50,000 robots × 0.01 GB × $0.10/GB = $50/week (or $2,600/year).
    - **Conclusion:** This achieves a **98.7% cost reduction**, heavily exceeding the 90% goal.
