title: Bandwidth-Constrained OTA Pipelines
scenario: You operate a cloud service that pushes weekly updates for an 800MB vision model to 50,000 autonomous
  delivery robots. Cellular data egress costs $0.10/GB. Sending the full model costs $4,000 per week.
  You are tasked with reducing OTA pipeline costs by 90% without degrading model performance.
question: "How would you reduce weekly OTA costs for the 800MB robot vision model by 90% without degrading model performance?"
details:
  realistic_solution: 'Implement an algorithm-deployment co-design using Parameter-Efficient Fine-Tuning
    (PEFT) techniques like LoRA (Low-Rank Adaptation) or decouple the model architecture. Instead of updating
    the entire 800MB backbone, freeze the backbone and only train/deploy a 10MB LoRA adapter or the final
    classification heads. The edge deployment pipeline then sends only the adapter weights, and the edge
    runtime loads the frozen backbone and dynamically applies the adapter. Tradeoff: Slight increase in
    on-device memory/compute to apply the adapter vs massive savings in network bandwidth and deployment
    time.'
  common_mistake: Applying standard gzip/LZ4 compression to the model weights, which yields negligible
    compression ratios because dense floating-point or quantized weights have high entropy.
  napkin_math: 'Current cost: 50,000 robots * 0.8 GB * $0.10/GB = $4,000/week = $208,000/year. LoRA adapter
    approach: 50,000 robots * 0.01 GB (10MB) * $0.10/GB = $50/week = $2,600/year. This achieves a 98.7%
    cost reduction, massively exceeding the 90% goal, while reducing the vulnerability window for OTA
    update failures.'
