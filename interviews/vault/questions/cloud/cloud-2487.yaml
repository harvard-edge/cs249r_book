title: 'Bandwidth-Constrained OTA Pipelines'
scenario: 'You operate a cloud service that pushes weekly updates for an 800MB vision model to 50,000 autonomous delivery robots. Cellular data egress costs $0.10/GB. Sending the full model costs $4,000 per week.'
question: 'How would you redesign the weekly OTA deployment pipeline to reduce cellular data costs by over 90% without degrading model performance?'
details:
  realistic_solution: 'Implement Parameter-Efficient Fine-Tuning (PEFT) like LoRA. Freeze the 800MB backbone and only train/deploy a 10MB LoRA adapter. Edge runtime dynamically applies the adapter.'
  common_mistake: |
    **The Pitfall:** Applying standard gzip or LZ4 compression to the full model weights.
    **The Rationale:** Candidates rely on standard web-traffic compression techniques to reduce payload size.
    **The Consequence:** They achieve negligible compression ratios because dense floating-point weights have high entropy, failing to meet the 90% cost reduction goal.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50,000 robots, $0.10/GB egress.
       - Full model: 800 MB (0.8 GB).
       - LoRA Adapter: 10 MB (0.01 GB).
    2. **Calculations:**
       - Current cost: 50,000 × 0.8 GB × $0.10 = $4,000/week.
       - LoRA cost: 50,000 × 0.01 GB × $0.10 = $50/week.
    3. **Conclusion & Interpretation:**
       - **Result: $50/week achieves a 98.7% cost reduction. Deployment is Network-Egress-Cost-Bound.**
status: published
