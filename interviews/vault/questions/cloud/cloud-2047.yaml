title: The Agent Loop Cost Explosion
scenario: Your agentic system uses a 70B LLM that costs $0.003 per 1K input tokens and $0.015 per 1K output tokens. Each agent step sends the full conversation history plus tool results as context. After 8 tool calls, a single user query has consumed 45K input tokens and 4K output tokens. You're serving 50K agent sessions per day.
question: What is the daily inference cost, and how does it compare to a non-agentic RAG system?
details:
  realistic_solution: 'Per session: 45K input tokens × $0.003/1K = $0.135 input + 4K output tokens × $0.015/1K = $0.060 output = $0.195/session. Daily: 50K × $0.195 = $9,750/day = $292,500/month. A non-agentic RAG system (single retrieval + generation) uses ~2K input tokens + 500 output tokens = $0.006 + $0.0075 = $0.0135/session = $675/day. The agent is 14.4× more expensive per session. The quadratic context growth is the key driver: steps 1-2 use 3K tokens, but steps 7-8 use 12K tokens each because they include all prior context. Fix: (1) implement sliding window context — only include the last 3 tool results, (2) summarize intermediate steps into compressed memory, (3) use prompt caching to avoid re-processing repeated context prefixes (saves 60-80% of input cost), (4) set a hard budget of 5 steps per session and fall back to human support.'
  common_mistake: |
    **The Pitfall:** Estimating cost based on average tokens per session without accounting for the quadratic growth of context.
    **The Rationale:** Each step includes ALL previous steps, so token consumption grows as O(n²) with the number of steps.
    **The Consequence:** Operational costs explode unexpectedly at scale, making the deployment financially unviable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input rate: $0.003/1K. Output rate: $0.015/1K.
       - 50K sessions/day.
    2. **Calculations:**
       - Agentic Cost/Session: (45K * $0.003/1K) + (4K * $0.015/1K) = $0.135 + $0.060 = $0.195.
       - Agentic Daily Cost: 50K * $0.195 = $9,750/day.
       - RAG Cost/Session: ~2K input + 500 output = $0.006 + $0.0075 = $0.0135.
       - RAG Daily Cost: 50K * $0.0135 = $675/day.
    3. **Conclusion & Interpretation:** **Result: Cost-Bound.** The agent is 14.4x more expensive per session ($9,750 vs $675 per day).
