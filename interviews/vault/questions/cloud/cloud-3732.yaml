title: Roofline Model for Transformer Encoder vs Decoder on TPU v5e
scenario: 'TPU v5e runs BERT-large encoder (336M params, 344 GFLOP/seq at seq=512)
  and GPT-2-large decoder (774M params, decode step = 2.3 GFLOP at seq=1). TPU v5e:
  197 TFLOPS BF16, 819 GB/s HBM. Calculate the arithmetic intensity and roofline position
  for each use case.'
question: What are the arithmetic intensities and roofline bottlenecks for BERT-large
  encoder batches and GPT-2-large single-token decoding on TPU v5e?
details:
  realistic_solution: 'BERT encoder (batch=64, seq=512): total FLOPs = 64 \u00d7 344G = 22,016G = 22.0 TFLOPs.
    Memory: 336M \u00d7 2B = 672MB weights + 64 \u00d7 512 \u00d7 1024 \u00d7 2B \u00d7 4 = 268MB activations = ~940MB.
    AI = 22,016G / 940MB = 23,421 FLOPs/byte. TPU v5e ridge: 197T / 819G = 240 FLOPs/byte.
    Encoder AI (23421) >> ridge (240) \u2192 strictly compute-bound. GPT-2-large
    decoder (batch=1, 1 token): FLOPs = 2.3G. Memory: 774M \u00d7 2B = 1.548GB loaded per
    token. AI = 2.3G / 1.548G = 1.49 FLOPs/byte \u2014 deeply memory-bound. Encoder throughput
    ceiling: 197 TFLOPS (hardware peak). Decoder ceiling: 819 GB/s \u00d7 1.49 = 1.22
    TFLOPS effective. Ridge-to-ridge comparison: encoder ~100% of peak compute, decoder 0.6%
    efficiency.'
  common_mistake: Treating encoder and decoder as having similar arithmetic intensity;
    decoder single-token generation is highly memory-bandwidth-bound while encoder
    batch processing is strictly compute-bound.
  napkin_math: 'Ridge: 197T/819G = 240 FLOPs/B. Encoder AI (batch=64, seq=512): 64 * 344G = 22,016G FLOPs. Memory = 940MB. AI = 22,016G / 940MB = 23,421 FLOPs/B \u2192 compute-bound, ceiling = 197 TFLOPS. Decoder AI: 2.3G/1.548G = 1.49
    FLOPs/B \u2192 memory-bound, ceiling = 1.22 TFLOPS. Encoder approaches peak; decoder 0.6%
    of peak.'
