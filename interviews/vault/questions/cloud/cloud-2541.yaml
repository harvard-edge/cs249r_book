title: Cloud Warm Restart L3 0
scenario: Your 1024-GPU training job has a per-GPU failure rate of 1 per 2000 GPU-hours. Each cold restart
  takes 8 minutes; each warm restart takes 45 seconds. Training runs for 14 days. Calculate total downtime
  under each strategy.
question: "Over 14 days, how much downtime should the 1024-GPU job expect with cold restarts versus warm restarts?"
details:
  realistic_solution: 'Total GPU-hours: 1024 × 14 × 24 = 344,064. Expected failures: 344,064 / 2000 =
    172 failures. Cold restart: 172 × 8 min = 1,376 min = 22.9 hours. Warm restart: 172 × 0.75 min = 129
    min = 2.15 hours. Savings: 20.75 hours of training time. In GPU-hours: 20.75 × 1024 = 21,248 GPU-hours
    saved. At $2/GPU-hr: $42,496 saved. Additionally, warm restart loses only the current mini-batch on
    the failed GPU; cold restart may lose up to the checkpoint interval of work across all GPUs.'
  common_mistake: Only counting wall-clock downtime. During cold restart, all 1024 GPUs are idle, so 8
    min downtime = 8 × 1024 = 8,192 GPU-minutes wasted. With warm restart, only 1 GPU is being replaced
    — the other 1023 can potentially do useful work.
  napkin_math: 'Failures: 344,064 / 2000 = 172. Cold downtime: 172 × 8 min = 1,376 min = 23 hrs. Warm
    downtime: 172 × 0.75 min = 129 min = 2.15 hrs. Savings: 20.85 hrs × 1024 GPUs × $2/hr = $42.7K.'
