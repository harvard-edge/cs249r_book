title: Recursive Halving-Doubling AllReduce
scenario: Recursive halving-doubling is an AllReduce algorithm optimized for small messages. Describe
  how it works for 8 GPUs with a 64KB gradient. How does its latency compare to ring AllReduce, and why
  is it preferred for small messages?
details:
  realistic_solution: 'Recursive halving-doubling for 8 GPUs, 64KB gradient: Phase 1 — Reduce-Scatter
    via recursive halving (log₂8 = 3 steps): Step 1: Each GPU exchanges half its data (32KB) with partner
    at distance 1 (GPU 0↔1, 2↔3, 4↔5, 6↔7). Each GPU reduces its half. Step 2: Exchange 16KB with partner
    at distance 2 (GPU 0↔2, 1↔3, 4↔6, 5↔7). Each GPU reduces its quarter. Step 3: Exchange 8KB with partner
    at distance 4 (GPU 0↔4, 1↔5, 2↔6, 3↔7). Each GPU now has 1/8 of the fully reduced result. Phase 2
    — All-Gather via recursive doubling (3 steps, reverse order): reconstruct the full result. Total:
    2×log₂(N) steps = 6 steps, each exchanging decreasing then increasing data sizes. Latency: 2log₂(N)
    × α + 2(N-1)/N × D/B = 6α + 7/4 × D/B. Ring: 2(N-1)α + 2(N-1)/N × D/B = 14α + 7/4 × D/B. Same bandwidth
    term but 6α vs 14α — halving-doubling has 2.3× lower latency for small messages where α dominates.'
  common_mistake: Confusing recursive halving-doubling with binary tree reduction. In recursive halving,
    GPUs exchange with partners at increasing distances (1, 2, 4, ...), halving the data size at each
    step. In a binary tree, data flows up to a root and back down.
  napkin_math: '8 GPUs, 64KB, α=10μs, B=50GB/s: Halving-doubling: 6×10μs + 1.75×64KB/50GB/s = 60μs + 2.24μs
    = 62.24μs. Ring: 14×10μs + 1.75×64KB/50GB/s = 140μs + 2.24μs = 142.24μs. Halving-doubling is 2.3×
    faster because the bandwidth term (2.24μs) is negligible relative to the latency term.'
