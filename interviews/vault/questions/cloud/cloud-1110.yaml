title: Trade-offs of DCQCN Parameters in RoCEv2 AI Clusters
scenario: You are tuning a RoCEv2 fabric for a 4,000 H100 GPU cluster with 400Gbps links. During MoE All-to-All
  communication, you observe severe incast congestion, frequent Priority Flow Control (PFC) pause frames,
  and throughput dropping to 40%. You must evaluate whether to aggressively tune DCQCN parameters (faster
  rate reduction) versus optimizing switch buffer allocation and PFC thresholds to handle the congestion.
question: "Should you focus on aggressive DCQCN tuning or switch buffer/PFC threshold tuning for the MoE incast congestion, and why?"
details:
  realistic_solution: Evaluate the interplay between DCQCN and PFC. Tune switch headroom to absorb the
    bandwidth-delay product during the DCQCN reaction time (RTT), and set DCQCN thresholds to trigger
    before PFC. Avoid overly aggressive DCQCN reduction which leads to severe bandwidth underutilization
    after the incast subsides.
  common_mistake: Believing that simply making DCQCN react faster will eliminate all PFC pauses, ignoring
    the physical RTT delay which requires adequate switch buffering during the reaction window.
  napkin_math: At 400Gbps (50 bytes/ns), an end-to-end RTT of 2μs means 100 KB is transmitted per flow
    before the CNP reaches the sender. For a 100-way incast, 10 MB of switch buffer is consumed during
    the reaction window alone, heavily taxing a typical 32MB shared buffer switch.
