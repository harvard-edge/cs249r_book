title: Trade-offs of DCQCN Parameters in RoCEv2 AI Clusters
scenario: You are tuning a RoCEv2 fabric for a 4,000 H100 GPU cluster with 400Gbps links. During MoE All-to-All communication, you observe severe incast congestion, frequent Priority Flow Control (PFC) pause frames, and throughput dropping to 40%.
question: Should you focus on aggressive DCQCN tuning or switch buffer/PFC threshold tuning for the MoE incast congestion, and why?
details:
  realistic_solution: Evaluate the interplay between DCQCN and PFC. Tune switch headroom to absorb the bandwidth-delay product during the DCQCN reaction time (RTT), and set DCQCN thresholds to trigger before PFC. Avoid overly aggressive DCQCN reduction which leads to severe bandwidth underutilization after the incast subsides.
  common_mistake: |
    **The Pitfall:** Believing that simply making DCQCN react faster will eliminate all PFC pauses.
    **The Rationale:** Ignoring the physical RTT delay which requires adequate switch buffering during the reaction window.
    **The Consequence:** Overly aggressive DCQCN reduction leads to severe bandwidth underutilization after the incast subsides.
  napkin_math: |
    1. **End-to-End RTT Data:** At 400Gbps (50 bytes/ns), an end-to-end RTT of 2µs means 100 KB is transmitted per flow before the CNP reaches the sender.
    2. **Incast Calculation:** For a 100-way incast, 10 MB of switch buffer is consumed during the reaction window alone.
    3. **Conclusion:** **This heavily taxes a typical 32MB shared buffer switch, making PFC likely without careful buffer sizing.**
