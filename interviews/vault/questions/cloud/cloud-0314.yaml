title: The H100 Unit Cost
scenario: When building a Total Cost of Ownership (TCO) model for a new large language model training
  cluster, what is the approximate capital expenditure (CapEx) you should budget for a single NVIDIA H100
  GPU?
question: "When building a Total Cost of Ownership (TCO) model for a new large language model training cluster, what is the approximate capital expenditure (CapEx) you should budget for a single NVIDIA H100 GPU?"
details:
  realistic_solution: The correct answer is ~$30,000. This is the baseline hardware cost before accounting
    for servers, networking, and power infrastructure. Using this number is the first step in any realistic
    TCO calculation for a large-scale ML system.
  common_mistake: Engineers often anchor on consumer GPU prices (e.g., $2,000-$5,000) and underestimate
    the cost by an order of magnitude. They fail to account for the specialized HBM memory, enterprise-grade
    validation, and massive die size that define datacenter accelerators.
  napkin_math: At a unit cost of $30,000, a single 8-GPU HGX server represents $240,000 in GPUs alone.
    A moderately-sized cluster of 128 GPUs would have a hardware CapEx of approximately $3.84 million
    just for the accelerators.
  options:
  - ~$3,000
  - ~$10,000
  - ~$30,000
  - ~$100,000
  correct_index: 2
