title: The H100 Unit Cost
scenario: When building a Total Cost of Ownership (TCO) model for a new large language model training cluster, what is the approximate capital expenditure (CapEx) you should budget for a single NVIDIA H100 GPU?
question: What is the approximate capital expenditure (CapEx) you should budget for a single NVIDIA H100 GPU?
details:
  realistic_solution: The correct answer is ~$30,000. This is the baseline hardware cost before accounting for servers, networking, and power infrastructure. Using this number is the first step in any realistic TCO calculation for a large-scale ML system.
  common_mistake: |
    **The Pitfall:** Anchoring on consumer GPU prices.
    **The Rationale:** Engineers often think of $2,000-$5,000 gaming GPUs and underestimate enterprise costs by an order of magnitude.
    **The Consequence:** Massively under-budgeting CapEx, rendering the entire TCO model useless for executive planning.
  napkin_math: |
    * Unit cost per H100: ~$30,000
    * 8-GPU HGX server cost (GPUs only): 8 × $30,000 = $240,000
    * Cluster of 128 GPUs hardware CapEx: 128 × $30,000 = $3.84 million
    * **Conclusion: Accurate baseline GPU costs are critical before factoring in servers, networking, and power.**
  options:
  - ~$3,000
  - ~$10,000
  - ~$30,000
  - ~$100,000
  correct_index: 2
