title: 'Evaluating TP and PP Placement Across NVLink'
scenario: 'You are architecting the parallel training strategy for a 175B parameter LLM on a cluster of H100 nodes. Each node has 8 GPUs connected via NVLink 4.0 (900 GB/s bidirectional), and the nodes are networked together using NDR InfiniBand (400 Gbps).'
question: 'Where should tensor parallelism and pipeline parallelism be placed across H100 nodes to minimize communication bottlenecks, and why?'
details:
  realistic_solution: 'Tensor Parallelism (TP) must be constrained within a single node to exploit the 900 GB/s NVLink bandwidth for its frequent, bandwidth-hungry all-reduce operations. Pipeline Parallelism (PP) should be placed across nodes via InfiniBand, as it only requires communicating point-to-point activations at layer boundaries.'
  common_mistake: |
    **The Pitfall:** Placing Tensor Parallelism (TP) across nodes.
    **The Rationale:** Misunderstanding the massive bandwidth requirements of TP's frequent all-reduce operations compared to PP's point-to-point transfers.
    **The Consequence:** The high communication volume of TP all-reduces over the much slower InfiniBand fabric will severely bottleneck the entire training loop.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVLink 4.0 Bandwidth: 900 GB/s (intra-node).
    - NDR InfiniBand Bandwidth: 50 GB/s (inter-node).

    **Calculations:**
    - Bandwidth Ratio: NVLink is 18x faster than InfiniBand.
    - TP demands 2x activation size communicated per layer for all-reduce.
    - PP communicates 1x activation size once per microbatch.

    **Conclusion & Interpretation:**
    - **Result: 18x bandwidth difference (Bandwidth-Bound)**. TP must remain intra-node to leverage NVLink, while PP can easily run over the slower inter-node InfiniBand fabric.
