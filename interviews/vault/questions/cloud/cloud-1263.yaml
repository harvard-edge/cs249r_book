title: Resolving Conflicting Fairness Metrics in Credit Scoring APIs
scenario: You are the tech lead for a cloud-based credit scoring API handling 500 QPS. The product team mandates that the new risk model (AUC 0.85) must simultaneously satisfy Demographic Parity (DP), Equalized Odds (EO), and Calibration across two demographic segments. Historical data shows differing base default rates 18% for Group A and 6% for Group B.
question: How do you evaluate these constraints and architect a viable deployment strategy?
details:
  realistic_solution: Invoke the Fairness Impossibility Theorem (Chouldechova, 2017) to show that Equalized Odds and Calibration are mutually exclusive when base rates differ on an imperfect predictor. With base rates p_A=0.18 and p_B=0.06 and AUC=0.85, satisfying both simultaneously is mathematically impossible. Propose prioritizing Calibration (essential for expected-value pricing in credit) and implementing relaxed Equalized Odds with a tolerance band, rather than wasting engineering cycles on an impossible simultaneous solution.
  common_mistake: |
    **The Pitfall:** Committing to multiple engineering iterations trying to satisfy all three fairness metrics simultaneously.
    **The Rationale:** Engineers treat fairness constraints as standard loss terms that can be optimized together, failing to recognize the mathematical impossibility theorem.
    **The Consequence:** Wasting engineering cycles on an impossible simultaneous solution.
  napkin_math: |
    1. Assume Equalized Odds holds: TPR_A = TPR_B and FPR_A = FPR_B.
    2. By Bayes' theorem, Precision (PPV) = (TPR * p) / (TPR * p + FPR * (1-p)).
    3. For Calibration to hold, PPV_A must equal PPV_B.
    4. Since base rate p_A (0.18) != p_B (0.06), PPV_A = PPV_B requires either perfect prediction (FPR=0, TPR=1) or equal base rates.
    5. **Conclusion: With AUC=0.85 (imperfect predictor), satisfying both is mathematically impossible.**
