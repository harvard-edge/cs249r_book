title: The Feature Interaction Explosion
scenario: Your ads ranking model uses 500 sparse categorical features (user demographics, ad categories,
  device types, etc.). A data scientist proposes adding all pairwise feature crosses to capture interactions.
  How many new features does this create, and what is the systems impact?
details:
  realistic_solution: 'Number of pairwise crosses: $\binom{500}{2} = 124,750$ new crossed features. But
    the real problem is vocabulary explosion: if feature A has 1,000 unique values and feature B has 5,000
    unique values, their cross has up to 5,000,000 unique values — each needing an embedding row. With
    500 features averaging 10K vocabulary each, the total cross vocabulary can reach billions. This creates:
    (1) Memory: billions of embedding rows × 128 dims × 4 bytes = terabytes of parameters, (2) Sparsity:
    most crosses are seen < 5 times in training data — insufficient to learn meaningful embeddings, (3)
    Serving latency: each request must look up thousands of crossed embeddings. The solution is learned
    feature interactions (DeepFM, DCN-v2) that approximate crosses in a low-rank space without materializing
    them.'
  common_mistake: Thinking 'pairwise crosses of 500 features is just 250,000 new features — manageable.'
    The real explosion is in the vocabulary size of each crossed feature, not just the count of crosses.
  napkin_math: '$\binom{500}{2} = 124,750$ crosses. Average cross vocabulary: $10\text{K} \times 10\text{K}
    = 100\text{M}$ (assuming independence). Even at 10% fill rate: 10M rows × 128 dims × 4B = 5 GB per
    cross. Total: impractical. DCN-v2 models all interactions with a single $d \times d$ weight matrix:
    $1024^2 \times 4\text{B} = 4\text{ MB}$.'
