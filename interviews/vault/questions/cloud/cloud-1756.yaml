title: Progressive Deployment Architecture Trade-offs
scenario: You are architecting a real-time object detection system spanning smart cameras (1 MB SRAM, 50mW budget), mobile edge gateways (8GB RAM, 4 TOPs NPU), and a cloud backend (NVIDIA A100s). The baseline cloud-only approach yields 800ms end-to-end latency, violating the 100ms SLA for critical events. The edge-only approach fits a heavily quantized INT8 model, but recall drops by 20%.
question: How would you design a hardware-aware cascade across cameras, gateways, and cloud to meet the 100 ms SLA without losing recall?
details:
  realistic_solution: 'Deploy a hierarchical cascade: an INT8 micro-model (~500KB) on the camera for fast motion triggering (<10ms), an INT8 mid-tier model (~50MB) on the gateway for standard detection (40ms), and only route ambiguous frames (confidence < 0.8) to the A100 cloud backend. This reduces expensive cloud requests while preserving high recall.'
  common_mistake: |
    **The Pitfall:** Treating edge tiers as independent systems rather than cascaded filters.
    **The Rationale:** Candidates often try to force the entire task onto one layer or split tasks redundantly.
    **The Consequence:** Failing to meet accuracy targets or latency SLAs by either abandoning the cloud completely or redundantly processing.
  napkin_math: |
    - 1. Define expected latency equation: E[L] = (P_camera * L_camera) + (P_gate * L_gate) + (P_cloud * L_cloud).
    - 2. Assign estimated probabilities and cumulative latencies: Camera filters 60% at 10ms, gateway filters 35% at 50ms (10+40), cloud handles 5% at 850ms (10+40+800).
    - 3. Calculate expected latency: (0.6 * 10ms) + (0.35 * 50ms) + (0.05 * 850ms).
    - 4. Sum components: 6ms + 17.5ms + 42.5ms = **66 ms** (meets 100ms SLA).
