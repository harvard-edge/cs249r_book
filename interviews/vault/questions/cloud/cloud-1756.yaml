title: Progressive Deployment Architecture Trade-offs
scenario: You are architecting a real-time object detection system spanning smart cameras, mobile gateways, and a cloud backend. The cloud-only approach yields 800ms latency, violating the 100ms SLA. The edge-only INT8 model meets latency but recall drops by 20%.
question: How would you design a hardware-aware cascade across cameras, gateways, and cloud to meet the 100 ms SLA without losing recall?
details:
  realistic_solution: 'Deploy a hierarchical cascade: an INT8 micro-model on the camera for fast motion triggering, a mid-tier model on the gateway, and route only ambiguous frames (low confidence) to the A100 cloud backend. This bounds average latency while preserving cloud-level recall.'
  common_mistake: |
    **The Pitfall:** Treating edge tiers as independent systems rather than cascaded probability filters.
    **The Rationale:** Candidates force the entire task onto one layer or split tasks redundantly.
    **The Consequence:** Failing to meet accuracy targets or SLAs by abandoning the cloud or processing redundantly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cascade equation: E[L] = (P_cam * L_cam) + (P_gate * L_gate) + (P_cloud * L_cloud).
       - Latencies: Cam=10ms, Gate=40ms, Cloud=800ms.
    2. **Calculations:**
       - Cam filters 60%: 0.6 * 10ms = 6ms.
       - Gate filters 35%: 0.35 * (10+40)ms = 17.5ms.
       - Cloud processes 5%: 0.05 * (10+40+800)ms = 42.5ms.
       - Total E[L] = 6 + 17.5 + 42.5 = 66ms.
    3. **Conclusion & Interpretation:**
       - **Result: Architectural (Cascading yields 66ms average latency, meeting the 100ms SLA).**
