title: Optimizing Collective Communication on AMD MI300X
scenario: 'You are training an LLM across multiple AMD MI300X accelerators. During the backward pass, gradient synchronization via AllReduce is a critical bottleneck.'
question: 'When would ring AllReduce be preferred over tree AllReduce for gradient sync, and how do message size and bandwidth affect that choice?'
details:
  realistic_solution: 'A hybrid approach leverages 5.3 TB/s intra-node HBM3 and bandwidth-optimal ring for inter-node communication. Ring AllReduce handles large messages better (bandwidth-optimal but latency-bound). Tree AllReduce handles small messages better (latency-optimal but bandwidth-bound).'
  common_mistake: |
    **The Pitfall:** Assuming a single AllReduce topology is optimal across all sizes.
    **The Rationale:** Candidates fail to account for interplay between intra-node and inter-node bandwidths.
    **The Consequence:** Suboptimal performance and severe bottlenecks during distributed training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X HBM3 Bandwidth: 5.3 TB/s.
       - Network Bandwidth: 400 Gbps (50 GB/s).
    2. **Calculations:**
       - HBM Transfer (100GB): 100 / 5300 = ~18.8 ms.
       - Network Transfer (100GB): 100 / 50 = 2,000 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 2,000 ms network bottleneck.**
       - **Conclusion: Bandwidth-Bound; large messages require Ring topology to maximize throughput.**