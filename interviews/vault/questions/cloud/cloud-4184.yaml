title: NVLink Domain Size and Scaling Limits
scenario: NVIDIA's DGX B200 connects 8 GPUs via NVSwitch with 1.8 TB/s per GPU. The GB200 NVL72 extends this to 72 GPUs via NVSwitch fabric at 900 GB/s per GPU.
question: What AllReduce speedup comes from scaling the NVLink domain from 8 to 72 GPUs for a 405B model, and why do returns diminish beyond 72?
details:
  realistic_solution: '405B model in FP16 = 810 GB. DGX B200 (8 GPUs): 810 / 8 = 101.25 GB per GPU. Tensor parallel AllReduce per layer: activation shard = ~200 MB / 8 = 25 MB. AllReduce time: 2 × 25 MB × 7/8 / 1800 GB/s = 0.024ms. GB200 NVL72 (72 GPUs): 810 / 72 = 11.25 GB per GPU — fits in each GPU''s HBM with room for KV cache. AllReduce: 200 MB / 72 = 2.78 MB per shard. Time: 2 × 2.78 × 71/72 / 900 GB/s = 0.006ms. Speedup: 4× faster AllReduce + each GPU loads 9× fewer weights per step. Beyond 72: must cross to InfiniBand (50 GB/s). AllReduce for 128 GPUs: NVLink for intra-72 + IB for 2 domains. IB step: 2 × (200/72) MB × 1 / 50 = 0.11ms. IB adds 18× the latency of NVLink. Diminishing returns: going from 72→128 adds only 72/128 = 56% more GPUs but the IB boundary adds significant overhead per step.'
  common_mistake: |
    **The Pitfall:** Assuming NVLink domains can scale indefinitely without performance penalties.
    **The Rationale:** Candidates fail to realize that NVSwitch uses electrical signaling limited to short distances; scaling beyond 72 GPUs requires crossing to InfiniBand, which is drastically slower.
    **The Consequence:** Designing cluster topologies that hit massive communication bottlenecks at domain boundaries.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 405B model in FP16 = 810 GB.
       - DGX B200 (8 GPUs, 1800 GB/s): TP AllReduce activation shard = ~25 MB.
       - GB200 NVL72 (72 GPUs, 900 GB/s): AllReduce shard = 2.78 MB.
       - InfiniBand: 50 GB/s.
    2. **Calculations:**
       - B200 Time: 2 * 25 MB * (7/8) / 1800 GB/s = 0.024 ms.
       - NVL72 Time: 2 * 2.78 MB * (71/72) / 900 GB/s = 0.006 ms.
       - 128 GPUs (72 + 56 via IB): IB Step Time = 2 * (200/72) MB * 1 / 50 GB/s = 0.11 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bound.** Scaling beyond 72 GPUs hits the InfiniBand boundary, which is 18x slower than NVLink.
