title: Full-Stack Speculative Decoding Architecture
scenario: You are designing speculative decoding for a production chatbot serving 10K req/s on 128x H100 (16 nodes). Target: 405B model, P99 latency < 200ms per token. You must handle diverse workloads: chat, code, math.
question: What throughput can 128 H100s provide if there are 16 8-GPU replicas, batch 16 per replica, 3.5 tokens per step, and 84 ms steps?
details:
  realistic_solution: Throughput = (128/8) × 16 × 3.5 / 0.084 = 16 × 16 × 3.5/0.084 ≈ 10,667 tok/s ≈ 10.6K tok/s (not 85K which overstates by 8×).
  common_mistake: |
    **The Pitfall:** Designing a single-draft-model system for diverse workloads.
    **The Rationale:** Engineers assume a single smaller model will uniformly approximate the larger model across all domains.
    **The Consequence:** Different domains have radically different acceptance rates, and a universal draft model severely compromises both quality and latency.
  napkin_math: |
    - **Replicas:** 128 GPUs / 8 TP = 16 replicas.
    - **Decode steps:** 16 per replica.
    - **Tokens per step:** 3.5 tokens.
    - **Step time:** 84ms (0.084s).
    - **Throughput:** 16 replicas * 16 steps * 3.5 tokens / 0.084s = **10.6K tokens/second**.
