title: FlashAttention-2 vs FlashAttention-1 Parallelism
scenario: 'FlashAttention-1 parallelizes over batch and heads (outer loop over K/V tiles). FlashAttention-2 reverses this: outer loop over Q tiles, inner loop over K/V tiles.'
question: 'Why does FlashAttention-2 achieve higher occupancy than FlashAttention-1 for an H100 workload (batch=1, 32 heads, seq_len=16384, head_dim=128), and what speedup follows?'
details:
  realistic_solution: 'FA-1: parallelism = batch x heads = 1 x 32 = 32 thread blocks. H100 has 132 SMs, so SM occupancy = 32/132 = 24.2%. 100 SMs idle. FA-2: parallelism = batch x heads x ceil(N/B_r) = 1 x 32 x ceil(16384/128) = 1 x 32 x 128 = 4,096 thread blocks. SM occupancy: 4,096/132 = 31 blocks per SM in waves — 100% occupancy. Each thread block processes one Q tile against all K/V tiles sequentially. FA-2 also reduces non-matmul FLOPs by keeping Q in registers and iterating K/V through shared memory. Combined: ~1.7-2x speedup over FA-1 on this workload.'
  common_mistake: |
    **The Pitfall:** Thinking the loop reordering is a minor optimization.
    **The Rationale:** Candidates fail to realize that FA-1 with batch=1 drastically under-utilizes the SMs because it only spins up one thread block per head.
    **The Consequence:** Misjudging the hardware impact, leaving 100 SMs idle and missing out on the massive concurrency benefits of FA-2.
  napkin_math: |
    - **FA-1 Parallelism (Batch × Heads):** 1 × 32 = 32 thread blocks. Occupancy = 32 / 132 SMs = **24.2%** (100 SMs idle).
    - **FA-2 Parallelism (Batch × Heads × Q_Tiles):** 1 × 32 × ceil(16384 / 128) = 1 × 32 × 128 = 4,096 thread blocks. Occupancy = 4,096 / 132 = 31 blocks per SM = **100% occupancy**.
    - **Result:** The occupancy increase from 24% to 100% yields an expected **~1.7x–2.0x speedup**.
