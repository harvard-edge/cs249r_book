title: Forward vs. Reverse Mode AD
scenario: 'An ML systems team is deploying a neural surrogate model for physical simulation that predicts
  1,000 output sensor readings from 10 input control parameters (f: R^10 -> R^1000). They need to compute
  the full 1000x10 Jacobian matrix for a downstream constrained optimizer in real-time. Currently, they
  use standard reverse-mode automatic differentiation (e.g., vmap(jacrev)), which requires 500ms per batch
  and completely misses their strict 20ms SLA constraint. Evaluate the architectural trade-offs of switching
  to forward-mode automatic differentiation (jacfwd) and calculate the expected latency.'
details:
  realistic_solution: Evaluate the dimensional asymmetry. Reverse-mode computes Vector-Jacobian Products
    (VJPs), requiring one pass per output dimension (1,000 passes). Forward-mode computes Jacobian-Vector
    Products (JVPs), requiring one pass per input dimension (10 passes). Switch to forward-mode AD for
    a 100x theoretical reduction in compute passes.
  common_mistake: Assuming reverse-mode AD (standard backpropagation) is always the most efficient way
    to compute gradients, ignoring the mathematical structure of the Jacobian where forward-mode AD excels
    for 'tall' matrices (Outputs >> Inputs).
  napkin_math: 'Reverse-mode passes: M = 1000. Forward-mode passes: N = 10. Compute reduction ratio: 1000
    / 10 = 100x. Expected compute latency: 500ms / 100 = 5ms. 5ms < 20ms SLA constraint, confirming forward-mode
    AD as the correct choice.'
