title: Forward vs. Reverse Mode AD
scenario: An ML systems team is deploying a neural surrogate model that predicts 1,000 output sensor readings from 10 input control parameters ($f: \mathbb{R}^{10} \to \mathbb{R}^{1000}$). They need to compute the full $1000 \times 10$ Jacobian matrix for a downstream constrained optimizer. Currently, they use standard reverse-mode automatic differentiation (e.g., `vmap(jacrev)`), which requires 500ms per batch and completely misses their strict 20ms SLA.
question: Should you switch the Jacobian computation to forward-mode AD, and what latency should you expect?
details:
  realistic_solution: Evaluate the dimensional asymmetry. Reverse-mode computes Vector-Jacobian Products (VJPs), requiring one pass per output dimension (1,000 passes). Forward-mode computes Jacobian-Vector Products (JVPs), requiring one pass per input dimension (10 passes). Switch to forward-mode AD for a 100x theoretical reduction in compute passes.
  common_mistake: |
    **The Pitfall:** Assuming reverse-mode AD (backpropagation) is always the most efficient way to compute gradients.
    **The Rationale:** Candidates ignore the mathematical structure of the Jacobian, missing that forward-mode AD (JVPs) is vastly superior for "tall" matrices where Outputs $\gg$ Inputs.
    **The Consequence:** Missing a 100x speedup and failing the strict latency SLA.
  napkin_math: |
    1. **Reverse-mode passes:** Requires one pass per output dimension ($M = 1000$).
    2. **Forward-mode passes:** Requires one pass per input dimension ($N = 10$).
    3. **Compute Reduction Ratio:** $1000 / 10 = 100\text{x}$ fewer passes.
    4. **Expected Latency:** $500\text{ms} / 100 = 5\text{ms}$.
    5. **Conclusion:** **5ms $\le$ 20ms SLA. Switch to forward-mode AD.**
