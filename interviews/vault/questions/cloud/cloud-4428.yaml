title: 'Adapter Composition: Sequential vs Parallel LoRA Merging'
scenario: 'A multi-tenant serving system needs to apply two LoRA adapters simultaneously:
  one for domain-specific knowledge (medical) and one for style (formal tone). Design
  whether to use sequential composition, parallel merge, or task vector arithmetic.'
question: For medical and formal-tone LoRA adapters applied together, should you use
  sequential composition, parallel merge, or task-vector arithmetic?
details:
  realistic_solution: 'Three approaches: (1) Sequential: apply adapter 1 then adapter
    2 at inference. Adds 2x LoRA compute overhead but preserves each adapter''s behavior.
    (2) Parallel merge: delta_W_merged = alpha1 * B1*A1 + alpha2 * B2*A2. Check interference
    via cosine similarity of B1*A1 and B2*A2. If cosine < 0.1 (near orthogonal), addition
    is safe. Scale factors alpha control contribution. (3) Task arithmetic: merge
    weights into base before serving, zero inference overhead but static. For medical+formal:
    these are likely near-orthogonal (different attention heads specialize for domain
    vs style). Use parallel merge with alpha1=alpha2=0.7 (scale down to avoid magnitude
    explosion). Validate on held-out set covering both properties.'
  common_mistake: Simply adding the two adapter weight matrices together (delta_W1
    + delta_W2). This works for orthogonal adapters but causes interference when both
    adapters modify the same weight directions.
  napkin_math: 'LoRA inference overhead for r=16 on Llama-3 8B: per weight matrix, LoRA adds 2 matmuls: (seq, d) @ (d, r) + (seq, r) @ (r, d). FLOPs: 4 * seq_len * d * r = 4 * 512 * 4096 * 16 = 134M FLOPs. Base projection FLOPs: 2 * seq_len * d * d = 2 * 512 * 4096^2 = 17.2B FLOPs. LoRA overhead per projection: 134M / 17.2B = 0.78%. Two sequential adapters: ~1.5% overhead. Negligible compute impact, making sequential composition safe and avoiding interference analysis.'
