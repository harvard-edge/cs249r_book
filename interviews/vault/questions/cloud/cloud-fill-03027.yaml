title: Multi-GPU Pod Affinity for NVLink-Dependent Workloads
scenario: You're deploying a 70B model training job on a Kubernetes cluster with H100 (80GB HBM3) nodes
  (8 GPUs/node, NVLink 900GB/s intra-node). Some pods get scheduled across 2 nodes (cross-node via InfiniBand
  at 400Gbps = 50GB/s). All-reduce throughput drops 18x when split across nodes. Design a scheduling solution.
details:
  realistic_solution: 'Use NVIDIA''s GPU Topology Manager with topology policy ''best-effort'' or ''required''.
    Set pod nodeSelector to require 8 GPUs on one node. Use gang scheduling (Volcano or Koordinator) to
    ensure all pods in a job start simultaneously on co-located nodes. Add node affinity rules requiring
    nvidia.com/gpu.count: ''8'' on a single node.'
  common_mistake: 'Using standard resource requests (nvidia.com/gpu: 8) per pod and expecting Kubernetes
    to keep multi-GPU jobs on the same node. Kubernetes doesn''t understand GPU topology by default —
    it may split an 8-GPU request across 2 nodes if each node has 4 GPUs free.'
  napkin_math: 'All-reduce bandwidth for 70B model (140GB BF16 gradients): intra-node NVLink ring: 900GB/s
    / 8 GPUs = 112GB/s per GPU. All-reduce time = 2*(N-1)/N * data_size / bandwidth = 2*7/8 * 140GB /
    900GB/s = 0.27s. Cross-node InfiniBand 400Gbps = 50GB/s: all-reduce = 2*7/8 * 140GB / 50GB/s = 4.9s.
    18x slower matches 900/50 = 18x bandwidth ratio. One mis-scheduled job wastes 18x communication time,
    reducing GPU utilization from 70% to ~30%.'
