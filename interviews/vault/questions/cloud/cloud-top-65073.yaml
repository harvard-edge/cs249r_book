title: Disaggregated Serving Graceful Degradation Under Partial Failure
scenario: A disaggregated serving cluster loses 30% of its decode pool due to a network partition. The
  remaining 70% of decode capacity cannot serve all requests. Design a graceful degradation strategy that
  maintains service for as many users as possible.
question: "How would you gracefully degrade service after losing 30% of decode capacity while serving as many users as possible?"
details:
  realistic_solution: 'Graceful degradation protocol: (1) Immediate detection: decode pool health monitor
    detects 30% node loss within 10 seconds (health check interval). (2) Capacity recomputation: new capacity
    = 70% of baseline. If baseline handles 500 RPS, new capacity = 350 RPS. (3) Triage by SLA tier: (a)
    Premium tier (typically 20% of requests): serve at full SLA — 100 RPS if premium is 20% of 500. Within
    350 RPS capacity. (b) Standard tier: rate-limit to available capacity after premium: 350 - 100 = 250
    RPS for standard (reduced from 400 RPS baseline). Return HTTP 429 with Retry-After: 5s for excess
    standard requests. (4) Model fallback: if 70B is under pressure, route low-priority requests to a
    smaller model (8B) running on the same nodes. 8B decode is 5x faster, increasing effective capacity.
    (5) Output length capping: for standard tier during degradation, cap max_tokens to 256 instead of
    1024. This 4x reduces decode slots usage, partially compensating for lost capacity. (6) Customer communication:
    trigger status page incident update.'
  common_mistake: 'Treating partial failure as binary (system works or fails) and attempting to maintain
    full functionality for all requests, resulting in all requests being degraded. A better approach:
    triage requests by SLA tier and maintain full service for high-priority users while gracefully degrading
    for low-priority.'
  napkin_math: 'Normal: 500 RPS, 70B decode, 350 decode slots. After 30% failure: 245 decode slots. If
    premium is 20% of load: 100 RPS premium, 400 RPS standard. New standard capacity: 245 - 100 = 145
    RPS. Standard at 145/400 = 36% of normal. Fallback: route 200 standard RPS to 8B model (5x faster):
    8B handles 5x more throughput per slot. Effectively 200 RPS * 1/5 = 40 slot-equivalents. Total: 145
    + 40 = 185 RPS standard. Standard capacity restored to 185/400 = 46% of normal. Significantly better
    than dropping all standard requests.'
