title: The Privacy Premium
scenario: 'You are the lead ML Systems Engineer at a health-tech startup building a cancer detection model. You have partnerships with 10 hospitals, each holding 10TB of valuable image data. The CTO asks you to solve for the 3-year Total Cost of Ownership (TCO) for two training strategies and recommend one. Strategy A (Centralized): Pay a $50K one-time licensing fee per hospital to move data to the cloud. Cloud data transfer costs $0.09/GB. Central storage costs $0.023/GB/month. An 8x A100 training cluster ($25/hr) will run for 4 weeks each year. Requires 0.5 FTE ML engineer ($200K/yr base) over 3 years. Strategy B (Federated): Data stays on-premise (no licensing fee). Deploy one $15K local GPU server per hospital. Gradient transfer over 3 years totals 780 GB at $0.09/GB. A central aggregation server costs $2,000/month. Requires 2 FTE ML engineers ($200K/yr base) over 3 years.'
question: 'What are the 3-year TCOs for centralized versus federated training across 10 hospitals, and which strategy would you recommend?'
details:
  realistic_solution: 'The correct answer requires calculating the 3-year TCO for both strategies and then reasoning about the non-quantifiable risks.'
  common_mistake: |
    **The Pitfall:** Focusing only on the hourly cloud instance cost or miscalculating data transfer costs.
    **The Rationale:** Candidates may overlook the massive one-time data acquisition fee in the centralized approach or the recurring engineering salary cost in the federated approach.
    **The Consequence:** Recommending an unviable financial strategy or ignoring the non-quantifiable risk of centralizing sensitive medical data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 hospitals, 10TB data each.
    - Strategy A: $50K license per hospital, cloud transfer/storage/compute costs, 0.5 FTE.
    - Strategy B: $15K local GPU per hospital, gradient transfer, central server, 2 FTE.

    **Calculations:**
    - Strategy A Data acquisition: 10 * $50K = $500K.
    - Strategy A Data transfer: 10 * 10 TB * 1,024 GB/TB * $0.09/GB ≈ $9K.
    - Strategy A Storage: 100 TB * 1,024 GB/TB * $0.023/GB/month * 36 months ≈ $85K.
    - Strategy A Compute: $25/hr * 672 hr * 3 years = $50K.
    - Strategy A Engineering: 0.5 FTE * $200K * 3 years = $300K. Total A: ~$944K.
    - Strategy B On-prem GPUs: 10 * $15K = $150K.
    - Strategy B Server: $2,000/month * 36 = $72K.
    - Strategy B Engineering: 2 FTE * $200K * 3 years = $1,200K. Total B: ~$1,422K.

    **Conclusion & Interpretation:**
    - **Result: Centralized is Cheaper** (Strategy A TCO is ~$944K vs Strategy B TCO ~$1.42M, though data privacy risks must be weighed).
  options:
  - Federated is cheaper. The $72,000 annual compute cost for Centralized training over 3 years is more than the cost of maintaining the FL system.
  - Centralized is far more expensive. The data transfer cost for 100TB of data is over $1M alone, making it prohibitive.
  - Centralized TCO is ~$944K and Federated TCO is ~$1.42M. While Centralized is cheaper, the unquantifiable risk of a data breach makes Federated the only responsible business decision.
  - The TCOs are comparable. Centralized is ~$1.4M, while Federated is ~$1.5M. We should choose Centralized to get better model performance.
  correct_index: 2
