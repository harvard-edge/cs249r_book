title: The Privacy Premium
scenario: |
  You are the lead ML Systems Engineer at a health-tech startup building a cancer detection model. You have partnerships with 10 hospitals, each holding 10TB of valuable image data. The CTO asks you to solve for the 3-year Total Cost of Ownership (TCO) for two training strategies and recommend one.
  Strategy A (Centralized): Pay a $50K one-time licensing fee per hospital to move data to the cloud. Cloud data transfer costs $0.09/GB. Central storage costs $0.023/GB/month. An 8x A100 training cluster ($25/hr) will run for 4 weeks each year. Requires 0.5 FTE ML engineer ($200K/yr base) over 3 years.
  Strategy B (Federated): Data stays on-premise (no licensing fee). Deploy one $15K local GPU server per hospital. Gradient transfer over 3 years totals 780 GB at $0.09/GB. A central aggregation server costs $2,000/month. Requires 2 FTE ML engineers ($200K/yr base) over 3 years.
question: "What are the 3-year TCOs for centralized versus federated training across 10 hospitals, and which strategy would you recommend?"
details:
  realistic_solution: The correct answer requires calculating the 3-year TCO for both strategies and then
    reasoning about the non-quantifiable risks.
  common_mistake: Focusing only on the hourly cloud instance cost ($100/hr is high!) and ignoring the
    massive, one-time data acquisition fee in the centralized approach or the recurring engineering salary
    cost in the federated approach. Another common mistake is miscalculating the data transfer costs by
    an order of magnitude, making it seem like the dominant factor.
  napkin_math: |
    **Strategy A: Centralized Training (3-year TCO).**
    Data acquisition: 10 hospitals × $50K = $500K.
    Data transfer: 10 × 10 TB × 1,024 GB/TB × $0.09/GB = $9,216 ≈ $9K.
    Central storage: 100 TB × 1,024 GB/TB × $0.023/GB/month × 36 months = $84,787 ≈ $85K.
    Compute: $25/hr × 672 hr (4 weeks) × 3 years = $50,400 ≈ $50K.
    Engineering: 0.5 FTE × $200K × 3 years = $300K.
    **Strategy A 3-year TCO ≈ $500K + $9K + $85K + $50K + $300K = $944K.**

    **Strategy B: Federated Learning (3-year TCO).**
    Data acquisition fee: $0.
    Data transfer: 780 GB × $0.09 ≈ $70.
    On-prem GPU nodes: 10 × $15K = $150K.
    Aggregation server: $2,000/month × 36 = $72K.
    Engineering: 2 FTE × $200K × 3 = $1,200K.
    **Strategy B 3-year TCO ≈ $0 + $0.07K + $150K + $72K + $1,200K = $1,422K.**

    Strategy B costs ~$478K more in direct costs. However, the non-quantifiable risk of centralizing 100 TB of medical imaging data makes Strategy B the safer long-term bet.
  options:
  - Federated is cheaper. The $72,000 annual compute cost for Centralized training over 3 years is more
    than the cost of maintaining the FL system.
  - Centralized is far more expensive. The data transfer cost for 100TB of data is over $1M alone, making
    it prohibitive.
  - Centralized TCO is ~$944K and Federated TCO is ~$1.42M. While Centralized is cheaper, the unquantifiable
    risk of a data breach makes Federated the only responsible business decision.
  - The TCOs are comparable. Centralized is ~$1.4M, while Federated is ~$1.5M. We should choose Centralized
    to get better model performance.
  correct_index: 2
