title: 'TPU v5e Memory Management: Diagnosing OOMs in Large Model Training'
scenario: You are training a large language model on a Google TPU v5e pod, with each TPU offering 16 GB
  of HBM and 197 TFLOPS BF16 compute. Your model's BF16 checkpoint size is 40GB, and activations for a
  global batch size of 2048 consume 10GB on each TPU core. You've implemented an optimizer that offloads
  its states to host memory, yet you frequently encounter Out-Of-Memory (OOM) errors during training.
  Analyze why these OOMs occur on the 16GB HBM, explaining the specific interplay between sharded model
  weights, activation memory, temporary buffers, and potential memory fragmentation during gradient computation,
  despite host memory offloading.
details:
  realistic_solution: Implement gradient accumulation with a reduced per-step batch size (e.g., 512) to
    significantly lower the peak activation memory footprint on HBM. Utilize activation checkpointing/re-materialization
    strategies to trade re-computation for memory savings. Employ TPU-specific memory profiling tools
    (like `tf.profiler`) to precisely identify memory hotspots, temporary allocations, and potential fragmentation.
    Investigate model architecture for opportunities to reduce activation size or re-shard model parameters
    more aggressively.
  common_mistake: Overlooking the combined peak memory requirements of activations, sharded model weights,
    and temporary buffers (e.g., for gradient computation or intermediate results) on the device's HBM,
    even when optimizer states are offloaded. This leads to an underestimation of memory pressure and
    reliance on host memory, which doesn't directly solve device HBM constraints.
  napkin_math: Consider the 40GB BF16 model weights sharded across 4 TPU v5e cores, meaning each core
    holds 10GB of weights. Activations for a global batch of 2048 (if not sharded across cores) consume
    10GB on each core. Without gradient accumulation, each core requires `10GB (weights) + 10GB (activations)
    = 20GB`. This exceeds the 16GB HBM capacity per TPU v5e core, causing an OOM. By implementing gradient
    accumulation with an accumulation count of 4, the effective per-step batch size becomes 512, reducing
    the activation memory per step to `10GB / 4 = 2.5GB`. The peak memory per core then becomes `10GB
    (weights) + 2.5GB (activations) = 12.5GB`, which now comfortably fits within the 16GB HBM, preventing
    OOMs.
