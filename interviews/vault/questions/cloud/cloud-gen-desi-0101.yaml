title: Real-time LLM Safety Guardrail Architecture
scenario: You are architecting a real-time safety guardrail system for a production LLM API. The pipeline
  requires passing all 1000-token input prompts and outputs through three specialized 1B-parameter safety
  classifiers (FP16) for PII, toxicity, and prompt injection. The main LLM runs on H100 GPUs (80 GB HBM3,
  989 TFLOPS FP16). You must evaluate whether to co-locate these safety models on the H100s alongside
  the main model or deploy them as an independent microservice on dedicated A100 instances (80 GB HBM2e,
  312 TFLOPS FP16) connected via InfiniBand NDR. Architect the system to meet a strict 40ms P99 latency
  budget for the safety checks.
question: "Would you co-locate the three 1B safety classifiers on H100s or deploy them on A100 microservices to meet the 40ms P99 budget?"
details:
  realistic_solution: Deploying the safety classifiers on dedicated A100 instances as a separate microservice
    is the superior architecture. This isolates safety infrastructure from core generation and allows
    independent scaling. Crucially, while A100s are slower than H100s, their compute latency easily fits
    within the 40ms budget. By avoiding co-location, you prevent dedicating premium H100 HBM3 memory to
    static classifier weights, preserving that space for the main LLM's KV cache to maximize batch sizes
    and overall throughput.
  common_mistake: Candidates often reflexively default to a microservices architecture on A100s for clean
    separation of concerns without calculating the compute latency differences, or they immediately co-locate
    on the H100 without analyzing the memory tradeoff against the main model's KV cache capacity.
  napkin_math: 'Memory: 3 classifiers * 1B params * 2 bytes/param = 6 GB total. Compute per 1B model for
    1000 tokens: 2 * 10^9 * 1000 = 2 TFLOPs. On A100 (312 TFLOPS FP16), compute time per model = 2 / 312
    = ~6.4 ms. Running 3 models sequentially = 19.2 ms. Network transfer for a 1KB payload over InfiniBand
    NDR (50 GB/s) is negligible (< 1 ms), and RPC overhead adds ~2 ms. Total latency on A100s is ~21.2
    ms, comfortably under the 40 ms budget.'
