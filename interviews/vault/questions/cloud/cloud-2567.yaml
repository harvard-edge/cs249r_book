title: Cloud Tokenization L2 0
scenario: Your team notices that the same English text tokenizes into 100 tokens but the equivalent Chinese
  text produces 350 tokens. Explain how tokenization impacts compute and memory costs, and why this disparity
  exists.
details:
  realistic_solution: 'BPE tokenization builds a vocabulary from the most frequent byte-pair merges in
    the training corpus. If the corpus is English-dominated, English words get efficient single-token
    representations while Chinese characters (underrepresented) may each be split into 2-4 byte-level
    tokens. This has direct systems impact: 3.5x more tokens means 3.5x more KV cache memory (linear in
    sequence length), 3.5x² = 12.25x more attention FLOPs (quadratic in sequence length), and 3.5x more
    autoregressive decode steps. The same semantic content costs dramatically more to process for underrepresented
    languages.'
  common_mistake: Treating tokenization as a purely linguistic concern. Token count directly determines
    sequence length, which controls memory (KV cache), compute (attention), latency (decode steps), and
    cost — it is a core systems variable.
  napkin_math: 'English: 100 tokens. Chinese: 350 tokens. KV cache ratio: 350/100 = 3.5x. Attention FLOPs:
    (350/100)² = 12.25x. Decode steps: 3.5x more. Cost per request: ~3.5x higher for Chinese. At $0.01
    per 1K tokens: English = $0.001, Chinese = $0.0035.'
