title: Centralized Checkpoint Incast Failure
scenario: Your team is training a 30B parameter LLM using FSDP on 256 A100 GPUs (32 nodes, 8 GPUs per
  node). Every hour, a centralized checkpointing mechanism pauses training to save the state. Each worker
  sends its 2 GB state shard to the rank-0 coordinator node over a 100 Gbps management network. Rank-0
  then sequentially writes the aggregated 512 GB checkpoint to a shared NFS capable of 2 GB/s throughput.
  You observe severe packet drops at rank-0, and the checkpointing process completely stalls the cluster
  for over 4.5 minutes. Diagnose the root causes and specific bottlenecks of this stall.
details:
  realistic_solution: 'Identify two distinct bottlenecks: the single-stream 2 GB/s NFS write limit, and
    the 255-to-1 network incast hitting rank-0''s single 100 Gbps NIC. The solution is to switch to distributed
    distributed checkpointing (e.g., PyTorch DCP) where each node writes its local 16 GB concurrently
    to an object store.'
  common_mistake: Candidates often identify the slow NFS write speed as the sole issue, completely missing
    the severe TCP incast condition at rank-0's NIC, which causes packet drops, TCP retransmission storms,
    and network congestion.
  napkin_math: 'NFS Write Limit: 512 GB / 2 GB/s = 256 seconds (4.26 minutes). Network Incast: 255 workers
    * 2 GB = 510 GB arriving at a single 100 Gbps (12.5 GB/s) NIC requires a theoretical minimum of 40.8
    seconds. However, 255 concurrent TCP streams bombarding one port overflows switch buffers, causing
    massive packet loss and effectively dropping throughput far below 12.5 GB/s.'
