title: The Megatron-LM Tensor Parallelism
scenario: Your colleague suggests using tensor parallelism with $T=16$ across two DGX nodes to train a 70B model, arguing 'more parallelism is always better.' The model fits in 8 GPUs with $T=8$.
question: "Why is $T=16$ likely slower than $T=8$, and what is the exact communication cost per transformer layer?"
details:
  realistic_solution: Megatron-style tensor parallelism splits each transformer layer's weight matrices column-wise (for the first GEMM) and row-wise (for the second GEMM), requiring two AllReduce operations per layer (one in forward, one in backward — four total counting both passes). Within a DGX node, NVSwitch provides 900 GB/s all-to-all bandwidth. Crossing to a second node drops to 400 Gbps InfiniBand (50 GB/s) — an **18x bandwidth reduction**. The AllReduce that took microseconds intra-node now takes milliseconds inter-node, and this happens at *every single layer*.
  common_mistake: |
    **The Pitfall:** Believing "doubling tensor parallelism halves the compute per GPU, so it should be faster."
    **The Rationale:** This treats communication as free and ignores the node boundary, which drops bandwidth from 900 GB/s to 50 GB/s.
    **The Consequence:** Designing slower systems by overly partitioning across slow interconnects.
  napkin_math: |
    - 70B model, hidden dim $h = 8192$, 80 layers.
    - Per-layer AllReduce payload: $2 \times \text{batch} \times \text{seq} \times h \times 2\text{B}$ (FP16).
    - With batch=1, seq=4096: payload = $2 \times 4096 \times 8192 \times 2 = 128\text{ MB}$ per AllReduce.
    - 4 AllReduces per layer (fwd+bwd), 80 layers = 320 AllReduces per step.
    - $T=8$ (intra-node): 128 MB / 900 GB/s = 0.14 ms per AllReduce $\times$ 320 = **44.8 ms** total.
    - $T=16$ (cross-node): 128 MB / 50 GB/s = 2.56 ms per AllReduce $\times$ 320 = **819 ms** total.
    - This is an **18x communication increase** that dwarfs the 2x compute reduction.
