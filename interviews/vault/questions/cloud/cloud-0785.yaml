title: The Unresponsive Replica
scenario: Our auto-scaling group for an inference service is occasionally failing to replace unhealthy
  instances. We've confirmed the infrastructure is fine, but the service becomes unresponsive even though
  the instance itself is still running. What's likely going wrong with our health check strategy and how
  would you fix it?
details:
  realistic_solution: "The issue points to a health check that is too shallow, likely only verifying the\
    \ OS or basic network connectivity (e.g., TCP port open), but not the application's readiness to serve\
    \ requests.\n    1.  **Application-Level Health Checks (Readiness Probes):** Implement an HTTP endpoint\
    \ (e.g., `/healthz` or `/ready`) that verifies the ML model is loaded into memory, all necessary pre-processing\
    \ components are initialized, and the service can actually process a dummy request.\n    2.  **Liveness\
    \ Probes:** A separate endpoint (e.g., `/livez`) to confirm the application process is still running\
    \ and not deadlocked. This typically involves less intensive checks than a readiness probe.\n    3.\
    \  **Graceful Shutdown:** Ensure the application can gracefully shut down by stopping new requests\
    \ and finishing in-flight ones before exiting. This prevents the load balancer from sending requests\
    \ to a terminating instance.\n    4.  **Health Check Configuration:** Configure the load balancer\
    \ and auto-scaling group to use these application-level HTTP health checks with appropriate thresholds\
    \ (e.g., 3 consecutive failures over 30 seconds)."
  common_mistake: '"The auto-scaling group isn''t configured correctly to terminate instances." While
    true for a misconfigured ASG, the problem describes an instance *running* but *unresponsive*, implying
    the health check isn''t detecting the application-level failure.'
  napkin_math: If a model container crashes, a Load Balancer health check (10s interval, threshold 3)
    takes 3 * 10s = 30s to flag it unhealthy. The ASG then triggers a replacement. If booting a new T4
    instance takes 40s and loading the 16GB weights into VRAM takes 50s (16GB / 320GB/s GDDR6 is fast,
    but disk I/O at 200MB/s takes 80s), the total downtime is 30+40+80 = 150s of dropped traffic.
