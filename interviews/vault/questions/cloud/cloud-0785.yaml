title: The Unresponsive Replica
scenario: Our auto-scaling group for an inference service is occasionally failing to replace unhealthy instances. We've confirmed the infrastructure is fine, but the service becomes unresponsive even though the instance itself is still running.
question: What's likely going wrong with our health check strategy and how would you fix it?
details:
  realistic_solution: |
    The issue points to a health check that is too shallow, likely only verifying the OS or basic network connectivity (e.g., TCP port open), but not the application's readiness to serve requests.
    1. **Application-Level Health Checks (Readiness Probes):** Implement an HTTP endpoint (e.g., `/healthz` or `/ready`) that verifies the ML model is loaded into memory, all necessary pre-processing components are initialized, and the service can actually process a dummy request.
    2. **Liveness Probes:** A separate endpoint (e.g., `/livez`) to confirm the application process is still running and not deadlocked. This typically involves less intensive checks than a readiness probe.
    3. **Graceful Shutdown:** Ensure the application can gracefully shut down by stopping new requests and finishing in-flight ones before exiting. This prevents the load balancer from sending requests to a terminating instance.
    4. **Health Check Configuration:** Configure the load balancer and auto-scaling group to use these application-level HTTP health checks with appropriate thresholds (e.g., 3 consecutive failures over 30 seconds).
  common_mistake: |
    **The Pitfall:** Blaming the auto-scaling group configuration directly.
    **The Rationale:** If an instance isn't terminating when broken, it seems like a lifecycle management bug.
    **The Consequence:** Candidates fail to realize the underlying OS/port is still alive, completely ignoring the lack of application-level readiness probing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Health check threshold: 3 failures at 10s intervals.
       - GPU Boot Time: 40s.
       - Model Load (16GB at 200 MB/s): 80s.
    2. **Calculations:**
       - Flagging downtime: 3 × 10s = 30s.
       - Node restart + Boot: 40s.
       - Disk I/O (Weights): 80s.
       - Total Downtime: 30s + 40s + 80s = 150s.
    3. **Conclusion & Interpretation:**
       - **Result: Shallow health checks hide 150s of downtime during silent failures.** (Reliability-Bound)
