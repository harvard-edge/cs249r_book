title: Guardrail Latency and Compute Budget for Responsible AI
scenario: Your team is deploying a critical large language model (LLM) service in the cloud. As part of your Responsible AI framework, a bias detection guardrail model runs sequentially after each LLM inference. The total end-to-end latency for a request (LLM + guardrail) must not exceed 200ms. The LLM inference takes 170ms. The guardrail model requires 15 GB of HBM and needs to perform a total of 1.5e15 FP16 floating-point operations (1.5 PetaFLOPs) for its inference.
question: Calculate the minimum average FP16 TFLOPS rate the GPU must sustain while executing the guardrail model to meet the remaining latency budget.
details:
  realistic_solution: 'The candidate should first calculate the remaining time for the guardrail: 200ms (total budget) - 170ms (LLM inference) = 30ms. This 30ms must be converted to seconds (0.03 seconds). The guardrail''s total operations are 1.5 PetaFLOPs (1.5e15 FP16 FLOPs). The required TFLOPS rate is then 1.5e15 FLOPs / 0.03 s / 1e12 = 50,000 TFLOPS — far beyond peak performance. This means the guardrail as specified is computationally infeasible within the 30ms window. A robust solution would also consider implementing efficient model architecture for the guardrail, leveraging kernel optimizations, and potentially exploring quantization (e.g., INT8) if accuracy allows, to ensure it can consistently meet this performance target.'
  common_mistake: |
    **The Pitfall:** Failing to convert milliseconds to seconds for rate calculations, or confusing FLOPs with FLOPS.
    **The Rationale:** Candidates often miscalculate the remaining time window or misunderstand the sheer magnitude of 1.5 PetaFLOPs within a 30ms window.
    **The Consequence:** Proposing an architecture that is mathematically impossible to run within the required SLA latency constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total latency budget = 200 ms.
       - LLM inference takes 170 ms.
       - Guardrail compute requirement: 1.5e15 FP16 FLOPs.
    2. **Calculations:**
       - Remaining time for guardrail: 200 ms - 170 ms = 30 ms = 0.03 seconds.
       - Required TFLOPS rate = 1.5e15 FLOPs / 0.03 s = 50e15 FLOPs/sec = 50,000 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Computationally infeasible for a single GPU (requires ~160x the peak of modern accelerators), meaning the guardrail architecture must be fundamentally redesigned.
