title: The Stalled Data Pipeline
scenario: You've set up a distributed training job with 16 GPUs across 4 nodes. You notice that GPU utilization is consistently low (e.g., 40-50%), even though your CPU is not maxed out, and local SSDs are very fast. The logs indicate `data_loader` is the bottleneck.
question: What's the likely culprit for the data_loader bottleneck, and how would you diagnose and mitigate it?
details:
  realistic_solution: Given that local SSDs are fast and CPU isn't maxed, the likely culprit is a **network I/O bottleneck when fetching data from a shared network file system (NFS) or object storage (S3/GCS)**. In a distributed setting, all 16 GPUs (via their respective nodes) are concurrently trying to read data from a centralized storage system over the network. Even if individual local disk reads are fast, the aggregate network bandwidth to the shared storage, or the I/O capacity of the storage system itself, can become saturated.
  common_mistake: |
    **The Pitfall:** Assuming it must be a CPU bottleneck in data preprocessing or a slow local disk.
    **The Rationale:** Engineers often debug locally (single node) where CPU or disk IO are the primary constraints.
    **The Consequence:** Teams waste time optimizing parsing loops or purchasing more expensive NVMe drives without addressing the centralized network choke point.
  napkin_math: |
    1. 4 nodes, each feeding 4 GPUs = 16 GPUs total.
    2. Target throughput per GPU = 1 GB/s.
    3. Required bandwidth per node = 4 GB/s.
    4. Required aggregate bandwidth = 16 GB/s.
    5. A standard 100 Gbps network link provides ~12.5 GB/s maximum theoretical.
    6. **Result:** **The 16 GB/s demand easily saturates the 12.5 GB/s link, starving the GPUs and dropping utilization to ~40-50%.**
