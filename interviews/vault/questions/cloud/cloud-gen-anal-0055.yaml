title: Analyzing Low Compute Utilization in Memory-Bound Kernels
scenario: You are reviewing a GPU profiler trace for a custom inference workload running on an A100 GPU
  (312 TFLOPS FP16, 2.0 TB/s HBM2e bandwidth, ridge point ~156 FLOPs/Byte). The trace shows that the latency
  for a specific linear layer is unexpectedly high. The profiler reports that memory bandwidth utilization
  is at 100%, but the compute (SM) utilization is capped at roughly 13%. Given that this specific operation
  has a calculated arithmetic intensity of 20 FLOPs/Byte, explain why the compute utilization collapses
  to 13% and cannot go higher.
details:
  realistic_solution: The candidate should recognize that this behavior is perfectly explained by the
    roofline model. The kernel is severely memory-bound because its arithmetic intensity (20 FLOPs/Byte)
    is far below the A100's ridge point (156 FLOPs/Byte). The GPU is fetching data as fast as the hardware
    allows (saturating the 2.0 TB/s bandwidth), but it simply doesn't have enough math operations to perform
    per byte to keep the compute cores busy, resulting in the 13% compute utilization.
  common_mistake: Candidates often misdiagnose this as a CPU bottleneck, a PCIe transfer issue, or inefficient
    kernel launch overhead, ignoring the 100% memory bandwidth saturation. They may also incorrectly assume
    that simply increasing the GPU clock speed will improve the latency.
  napkin_math: Max achievable compute throughput = Arithmetic Intensity * Memory Bandwidth = 20 FLOPs/Byte
    * 2.0 TB/s = 40 TFLOPS. Compute Utilization = (Achieved TFLOPS / Peak TFLOPS) * 100 = (40 TFLOPS /
    312 TFLOPS) * 100 = 12.82% (roughly 13%). This perfectly matches the profiler's reported compute utilization.
