title: Diagnosing High Tail Latency in Dual-Socket CPU Inference
scenario: You are deploying a throughput-optimized NLP model on a bare-metal dual-socket Intel Xeon Platinum
  8380 server (2x 40 cores, 512GB RAM). You configure PyTorch to use all 80 threads. While average latency
  is acceptable, your p99 latency spikes uncontrollably under high request concurrency, and throughput
  fails to double compared to a single-socket 40-core test. Hardware counters show high CPU stall cycles
  waiting for memory. How do you root-cause and resolve this scaling bottleneck?
question: "How do you root-cause and resolve this scaling bottleneck?"
details:
  realistic_solution: Deploy multiple independent inference workers (e.g., one per socket) and use `numactl
    --cpunodebind=X --membind=X` to strictly pin each process and its memory allocations to a single NUMA
    node, avoiding UPI link saturation.
  common_mistake: Scaling threads across all physical cores without regard for NUMA boundaries, assuming
    the OS scheduler will optimally align memory allocations with thread execution.
  napkin_math: Local DDR4 memory provides ~200 GB/s bandwidth per socket at ~80ns latency. Cross-socket
    memory requests must traverse the UPI link, which caps out around ~40 GB/s and adds ~50ns latency.
    With 80 threads randomly fetching weights across sockets, the 40 GB/s UPI link becomes a severe bottleneck
    for memory-bound NLP operations.
