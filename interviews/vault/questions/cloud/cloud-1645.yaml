title: Diagnosing High Tail Latency in Dual-Socket CPU Inference
scenario: 'You are deploying a throughput-optimized NLP model on a bare-metal dual-socket Intel Xeon Platinum 8380 server (2x 40 cores, 512GB RAM). You configure PyTorch to use all 80 threads. While average latency is acceptable, your p99 latency spikes uncontrollably under high request concurrency, and throughput fails to double compared to a single-socket 40-core test. Hardware counters show high CPU stall cycles waiting for memory.'
question: 'How do you root-cause and resolve this scaling bottleneck?'
details:
  realistic_solution: |
    Deploy multiple independent inference workers (e.g., one per socket) and use `numactl --cpunodebind=X --membind=X` to strictly pin each process and its memory allocations to a single NUMA node, avoiding UPI link saturation.
  common_mistake: |
    Scaling threads across all physical cores without regard for NUMA boundaries, assuming the OS scheduler will optimally align memory allocations with thread execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dual-socket 80 threads.
    - Local DDR4 bandwidth: ~200 GB/s.
    - UPI link bandwidth: ~40 GB/s.

    **Calculations:**
    - 80 threads randomly fetch weights across sockets.
    - Cross-socket requests hit the 40 GB/s UPI link.

    **Conclusion & Interpretation:**
    - **Result: 40 GB/s (UPI/NUMA-Bound)**. The UPI link is severely bottlenecked. Pinning workers to NUMA nodes fixes the issue.
