title: Designing a differentiable data augmentation pipeline for training on H100
scenario: You are implementing differentiable augmentation (DiffAugment) for a GAN training pipeline on H100. The discriminator loss must backpropagate through random cropping, color jitter, and cutout operations. Standard torchvision transforms do not participate in autograd.
question: How would you implement random crop, color jitter, and cutout so the GAN discriminator loss backpropagates to the generator?
details:
  realistic_solution: 'Implement augmentations as differentiable tensor operations: random crop via grid_sample with bilinear interpolation (differentiable), color jitter via tensor arithmetic (multiply/add), cutout via masked_fill with a learnable or random mask. Keep requires_grad=True throughout. For the generator path, ensure the augmented image remains in the computation graph. Use kornia library which provides differentiable augmentations as nn.Module layers.'
  common_mistake: |
    **The Pitfall:** Applying standard torchvision transforms after detaching the image tensor.
    **The Rationale:** Engineers treat augmentation as a CPU-based preprocessing step, completely halting gradient flow.
    **The Consequence:** The discriminator loss cannot backpropagate through the augmentations to the generator, causing the GAN to fail to learn augmentation-robust features.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - grid_sample for random crop at 256x256, batch=64.
       - Input tensor: 64x3x256x256 (FP32).
       - Grid tensor: 64x256x256x2 (FP32).
    2. **Calculations:**
       - Memory: Input (50MB) + Grid (32MB) = 82MB.
       - FLOP cost: O(batch x H x W x 4) for bilinear interp = 16.8M ops.
       - H100 performance: 989 TFLOPS. Execution time < 0.01ms.
    3. **Conclusion & Interpretation:**
       - **Result: The memory and compute overhead of differentiable grid_sample is negligible on an H100, enabling full gradient flow for robust GAN training. Operation is effectively Compute-Trivial.**
