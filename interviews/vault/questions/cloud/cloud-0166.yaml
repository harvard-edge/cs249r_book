title: The SLO-Violating Deadline Scheduler
scenario: You run a multi-tenant LLM inference service. To ensure fairness, you design a strict deadline-based scheduler. Requests specify a deadline (e.g., 'generate 50 tokens within 2 seconds'), and the scheduler preemptively drops any request about to miss its deadline. After launch, your high-priority customers with short requests are happy. However, customers submitting long-running analysis jobs (e.g., 4000 tokens with a 60-second deadline) complain their jobs are almost always dropped, despite overall GPU utilization being only 50%.
question: Why is the deadline scheduler failing long jobs despite 50% utilization, and what statistical phenomenon is being ignored?
details:
  realistic_solution: The scheduler's design is flawed because it fails to account for service time variance, a key concept in queueing theory. By always prioritizing requests with the nearest deadlines (the short jobs), it creates a system where long-running jobs are perpetually starved of compute. The arrival of many short, high-priority requests constantly interrupts the processing of the long jobs. Each interruption pushes the long job further down the queue, increasing its total time in the system until its generous deadline is finally breached. The core problem is that 50% *average* utilization is masking short, intense bursts of 100% utilization dedicated to the high-priority traffic. This high variance in service times (e.g., 20ms vs. 2000ms) leads to disastrously high wait times for the longer jobs, a predictable outcome in M/G/1 queues (queues with general service time distributions).
  common_mistake: |
    **The Pitfall:** Concluding that deadlines are just misconfigured or more GPUs are needed.
    **The Rationale:** Candidates see failed SLAs and assume the hardware capacity is exhausted or the SLA limit itself is unreasonably tight.
    **The Consequence:** The team unnecessarily increases cloud spending or relaxes customer SLAs instead of fixing the fundamental statistical queueing error in the dispatcher.
  napkin_math: |
    1. **Average Utilization:** The system is at 50% utilization on average.
    2. **Service Time Variance:** Short jobs take ~20ms; long jobs take ~2000ms.
    3. **M/G/1 Queue Behavior:** High variance in service times causes massive queueing delays for low-priority (far deadline) jobs.
    4. **Head-of-Line Blocking:** Bursts of short jobs monopolize the GPU at 100% utilization temporarily, continually preempting the long jobs until their 60-second deadline expires.
