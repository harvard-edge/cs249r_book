title: 'High-Performance ML Inference Monitoring: H100 Architecture Comparison'
scenario: 'You are designing a real-time inference system for a large language model, requiring extreme
  low latency and high throughput. You have been allocated a cluster of NVIDIA H100 GPUs (80 GB HBM3,
  989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W TDP). Your team proposes two architecture options
  for deploying and scaling this inference service in the cloud:

  1.  **Architecture A:** A traditional microservices approach where each inference server is a stateless
  container managing its own H100 GPU(s), with a centralized logging and metrics pipeline.

  2.  **Architecture B:** A more tightly coupled, custom HPC-like deployment leveraging InfiniBand for
  direct GPU-to-GPU communication across multiple H100s within a single instance, optimizing for collective
  operations, with a distributed monitoring agent per instance.


  Compare these two architectures from a monitoring and observability perspective, specifically considering
  telemetry collection (GPU metrics, network I/O, HBM utilization), alerting strategies for performance
  degradation (e.g., straggler detection, tail latency), MTBF/MTTR implications, and the design of production
  health dashboards. Which architecture presents greater challenges and opportunities for reliable operations,
  and why?'
details:
  realistic_solution: 'Implement a multi-layered observability stack. At the hardware level, leverage
    NVIDIA Data Center GPU Manager (DCGM) to collect detailed GPU metrics (HBM utilization, power draw,
    SM activity, compute utilization) directly from the H100s. Integrate these metrics into a time-series
    database (e.g., Prometheus) with high-cardinality label support. For latency and straggler detection,
    use distributed tracing (e.g., OpenTelemetry) to track individual inference requests from ingress
    to egress, including time spent on GPU kernels. Define service-level objectives (SLOs) and service-level
    indicators (SLIs) for key metrics like p99 latency and throughput. Design hierarchical alerts: critical
    alerts for service outages or severe performance drops, and warning alerts for trending deviations.
    Production dashboards should aggregate these views, providing both a high-level system health overview
    and drill-down capabilities to individual H100 instances and specific kernel executions. For Architecture
    B, ensure cross-GPU communication metrics are also captured.'
  common_mistake: A common mistake is treating H100 GPU monitoring like standard CPU monitoring, overlooking
    critical performance counters like SM occupancy, HBM bandwidth saturation, PCIe bandwidth, or Tensor
    Core utilization. Another pitfall is not accounting for the high data volume generated by detailed
    GPU telemetry, leading to costly or unscalable monitoring solutions. Also, not designing for straggler
    detection at the micro-batch or GPU kernel level can mask significant performance issues under load.
  napkin_math: Consider a single H100 GPU generating 100 metrics per second. If you have 100 H100 GPUs
    in your cluster, this is 10,000 data points per second. If each data point is 100 bytes, that's 1
    MB/s of raw telemetry data. Over 24 hours, this accumulates to roughly 86 GB of data. If you retain
    this data for 30 days, you're looking at 2.5 TB of raw metric storage. This quickly highlights the
    need for efficient storage, downsampling, and aggregation strategies.
