title: 'The Great Interconnect Divide: NVLink vs. InfiniBand'
scenario: An ML Systems Engineer is specifying a new GPU cluster. They see two different interconnects mentioned: NVLink 4.0 for intra-server communication and InfiniBand NDR for inter-server communication.
question: What is the approximate raw bandwidth difference between NVLink 4.0 and InfiniBand NDR?
details:
  realistic_solution: 'NVLink 4.0 has a total bidirectional bandwidth of 900 GB/s. InfiniBand NDR has a bandwidth of 400 Gbps, which is equivalent to 50 GB/s (400 / 8). Therefore, NVLink 4.0 is approximately 18 times faster than InfiniBand NDR for raw data transfer. This physical difference is why they are used for different purposes: NVLink for ultra-high-speed communication between GPUs on the same motherboard, and InfiniBand for high-speed networking between different servers.'
  common_mistake: |
    **The Pitfall:** Confusing Gigabits (Gbps) with Gigabytes (GB/s).
    **The Rationale:** Both interconnects use "Giga" metrics, and marketers obscure the distinction.
    **The Consequence:** Candidates drastically underestimate the 18x performance gap, failing to understand why NVLink is mandatory for intra-node collective operations.
  napkin_math: |
    - NVLink 4.0 bidirectional bandwidth: 900 GB/s.
    - InfiniBand NDR bandwidth: 400 Gbps.
    - Convert Gbps to GB/s: 400 / 8 = 50 GB/s.
    - Bandwidth Ratio: 900 GB/s / 50 GB/s = **18x faster**.
  options:
  - They have roughly the same bandwidth.
  - NVLink 4.0 is about 2x faster than InfiniBand NDR.
  - NVLink 4.0 is about 18x faster than InfiniBand NDR.
  - InfiniBand NDR is about 4x faster than NVLink 4.0.
  correct_index: 2
