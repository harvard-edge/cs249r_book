title: 'The Great Interconnect Divide: NVLink vs. InfiniBand'
scenario: 'An ML Systems Engineer is specifying a new GPU cluster. They see two different interconnects
  mentioned: NVLink 4.0 for intra-server communication and InfiniBand NDR for inter-server communication.
  State the approximate bandwidth difference between them.'
details:
  realistic_solution: 'NVLink 4.0 has a total bidirectional bandwidth of 900 GB/s. InfiniBand NDR has
    a bandwidth of 400 Gbps, which is equivalent to 50 GB/s (400 / 8). Therefore, NVLink 4.0 is approximately
    18 times faster than InfiniBand NDR for raw data transfer. This physical difference is why they are
    used for different purposes: NVLink for ultra-high-speed communication between GPUs on the same motherboard,
    and InfiniBand for high-speed networking between different servers.'
  common_mistake: The most common mistake is to confuse Giga**bits** per second (Gbps) with Giga**bytes**
    per second (GB/s). InfiniBand is rated at 400 Gbps, which is only 50 GB/s. Another mistake is assuming
    all high-performance interconnects have similar bandwidth, failing to appreciate the orders-of-magnitude
    difference between an on-board, chip-to-chip link (NVLink) and a rack-scale network fabric (InfiniBand).
  napkin_math: 'NVLink 4.0 Bandwidth: **900 GB/s**.'
  options:
  - They have roughly the same bandwidth.
  - NVLink 4.0 is about 2x faster than InfiniBand NDR.
  - NVLink 4.0 is about 18x faster than InfiniBand NDR.
  - InfiniBand NDR is about 4x faster than NVLink 4.0.
  correct_index: 2
