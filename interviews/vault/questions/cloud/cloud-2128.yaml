title: The Embedding Table Memory Wall
scenario: 'A DLRM-style recommendation model has 100 embedding tables, each with 10 million rows and 128-dimensional FP32 embeddings.'
question: 'How much memory do the embedding tables require, and can they fit on a single A100 (80GB HBM)?'
details:
  realistic_solution: 'Each table: 10M x 128 x 4B = 5.12 GB. Total: 100 x 5.12 GB = 512 GB. This is 6.4x the capacity of a single 80GB A100. The embeddings must be sharded across at least 7 GPUs, or use mixed-dimensional embeddings to reduce less important tables.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by all three dimensions (tables x rows x dimensions x bytes).
    **The Rationale:** Engineers often compute the size of a single table and erroneously assume the entire model fits in VRAM.
    **The Consequence:** The training job instantly OOMs, forcing a hasty redesign for model parallelism.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 tables, 10M rows/table, 128 dims.
    - FP32 precision (4 bytes/parameter).
    - A100 GPU (80GB HBM).

    **Calculations:**
    - Size per table = 10,000,000 * 128 * 4 bytes = 5,120,000,000 bytes (~5.12 GB).
    - Total memory = 100 * 5.12 GB = 512 GB.
    - GPUs required = ceil(512 GB / 80 GB) = 7.

    **Conclusion & Interpretation:**
    - **Result: OOM / Multi-GPU Required.** The model requires 512 GB, which dictates sharding across at least 7 A100s.
