title: 'Diagnosing Threshold Failures in Equalized Odds'
scenario: 'You are debugging an automated loan approval API processing 10,000 applications/day. An audit reveals that for Group A (minority) vs Group B (majority), the True Positive Rate is equal at 85%. However, the False Positive Rate is 5% for Group B and 28% for Group A. The pipeline applies a hardcoded global threshold of 0.65. A junior engineer argues the system is fair because equal opportunity is met.'
question: 'Why does equal TPR not satisfy Equalized Odds here, and how should the 28% FPR for Group A be corrected?'
details:
  realistic_solution: 'Analyze the ROC curves for both groups and implement group-specific classification thresholds in the serving layer. Calibrate the threshold for Group A higher (e.g., from 0.65 to 0.78) to align its FPR with Group B''s 5%, achieving Equalized Odds.'
  common_mistake: |
    **The Pitfall:** Assuming that satisfying Equal Opportunity (matching TPR) automatically guarantees fairness across all metrics.
    **The Rationale:** Engineers often focus on the rate of positive outcomes without auditing the disparity in negative failure modes.
    **The Consequence:** The model systematically grants unqualified applicants from one group loans at a higher rate, strictly violating Equalized Odds and creating severe business/regulatory risk.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline impact: Group A has 2,000 true negative (unqualified) applicants per day.
    - To satisfy Equalized Odds, Group A's FPR must equal Group B's FPR (5%).

    **Calculations:**
    - An FPR of 28% yields 560 false positive approvals.
    - Reducing the FPR to 5% drops false positives to exactly 100.

    **Conclusion & Interpretation:**
    - **Result: ~0.78 threshold (Statistical-Bound)**. The decision threshold for Group A must be raised from 0.65 to ~0.78 independently.
