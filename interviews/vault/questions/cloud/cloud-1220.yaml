title: Diagnosing Threshold Failures in Equalized Odds
scenario: You are debugging a cloud-based automated loan approval API processing 10,000 applications/day
  on AWS SageMaker. An audit reveals that for Group A (minority) vs Group B (majority), the True Positive
  Rate is equal at 85%. However, the False Positive Rate is 5% for Group B and 28% for Group A. The serving
  pipeline applies a hardcoded global classification threshold of 0.65 across all groups. A junior engineer
  argues the system is fair because equal opportunity is met. Diagnose why this system violates equalized
  odds and identify the mechanism to resolve the FPR disparity.
details:
  realistic_solution: Analyze the ROC curves for both groups and implement group-specific classification
    thresholds in the serving layer. Calibrate the threshold for Group A higher (e.g., from 0.65 to 0.78)
    to align its FPR with Group B's 5%, achieving Equalized Odds.
  common_mistake: Assuming that satisfying 'Equal Opportunity' (matching TPR) automatically satisfies
    fairness, ignoring the disparate False Positive Rate (FPR) which strictly violates 'Equalized Odds'
    and increases business risk.
  napkin_math: If Group A has 2,000 actual negative (unqualified) applicants per day, an FPR of 28% yields
    560 false positive approvals. Reducing the target FPR to 5% drops false positives to 100. This requires
    pushing the decision threshold from 0.65 to ~0.78 specifically for Group A to satisfy FPR_A = FPR_B.
