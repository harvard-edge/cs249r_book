title: FlashAttention-3 Asynchronous Softmax Pipelining
scenario: FlashAttention-3 exploits H100's asynchronous TMA (Tensor Memory Accelerator)
  and WGMMA (Warpgroup Matrix Multiply-Accumulate) to overlap data loading with computation.
  With 3 pipeline stages (load K/V tile N+1, compute softmax for tile N, matmul for
  tile N-1), estimate the pipeline efficiency for seq_len=8192, head_dim=128, tile_size=128.
question: For seq_len=8192, head_dim=128, and tile_size=128 on H100, what pipeline
  efficiency and speedup does FlashAttention-3 achieve?
details:
  realistic_solution: 'Three stages: (1) TMA load: 128x128x2B = 32KB per K and V tile
    = 64KB total. SRAM bandwidth ~19TB/s on H100. Load time: 64KB / 19TB = 0.003ms.
    (2) Softmax: per-row max, subtract, exp, sum, divide. B_r x B_c = 128x128 = 16K
    elements, ~10 FLOPs/element = 160K FLOPs on CUDA cores at ~60 TFLOPS = 0.003ms.
    (3) WGMMA matmul: 2 x 128 x 128 x 128 = 4.2M FLOPs at 989 TFLOPS = 0.004ms. Pipeline
    depth: 3 stages at 0.004ms (matmul dominates) = 0.004ms per tile steady-state.
    Number of tiles: 8192/128 = 64 per head. Total per head: 64 x 0.004ms + 2 x 0.004ms
    (pipeline fill/drain) = 0.264ms. Without pipelining: 64 x (0.003+0.003+0.004)
    = 0.64ms. Speedup: 2.4x. FA-3 measured: ~1.5x over FA-2 due to register pressure
    limiting full overlap.'
  common_mistake: Assuming perfect 3-stage overlap. In practice, the softmax stage
    (non-matmul) is the bottleneck because it runs on different functional units than
    the tensor cores, and register pressure from maintaining 3 tiles limits occupancy.
  napkin_math: 'Per-tile: load 0.003ms, softmax 0.003ms, matmul 0.004ms. Pipelined:
    0.004ms/tile. Sequential: 0.01ms/tile. Theoretical: 2.5x. Measured FA-3 vs FA-2:
    ~1.5x due to register pressure.'
