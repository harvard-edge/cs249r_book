title: FlashAttention-3 Asynchronous Softmax Pipelining
scenario: 'FlashAttention-3 exploits asynchronous TMA and WGMMA to overlap data loading with computation. You have 3 pipeline stages: load K/V tile, compute softmax, and matmul.'
question: For seq_len=8192, head_dim=128, and tile_size=128 on H100, what pipeline efficiency and speedup does FlashAttention-3 achieve?
details:
  realistic_solution: Pipelining reduces per-tile latency to the slowest stage (matmul at 0.004ms). Without pipelining, stages sum to 0.01ms. The theoretical speedup is 2.5x. However, register pressure limits actual occupancy, reducing practical speedup to ~1.5x.
  common_mistake: |
    **The Pitfall:** Assuming perfect 3-stage overlap without overhead.
    **The Rationale:** Ignoring register pressure and the fact that softmax uses different functional units than tensor cores.
    **The Consequence:** Overestimating the performance benefits of asynchronous pipelining.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - seq_len=8192, tile_size=128. Load=0.003ms, Softmax=0.003ms, Matmul=0.004ms.
    2. **Calculations:**
       - Sequential tile time: 0.003 + 0.003 + 0.004 = 0.01ms.
       - Pipelined tile time: max(0.003, 0.003, 0.004) = 0.004ms.
       - Theoretical speedup = 0.01 / 0.004 = 2.5x.
    3. **Conclusion & Interpretation:**
       - **Result: Theoretical speedup is 2.5x, but measured speedup is ~1.5x due to register limits.**
