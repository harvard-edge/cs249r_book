title: A100 Checkpoint Interval
scenario: A 1000-GPU A100 cluster trains a 175B model. The Mean Time Between Failures
  (MTBF) is 24 hours. The team runs a tiered checkpointing scheme - fast local NVMe
  writes the full state in 30 seconds, then asynchronously replicates to remote
  cloud object storage at 5 minutes per checkpoint. Local checkpoints survive job
  preemption but not full-rack failures; remote checkpoints survive everything.
question: Apply Young's formula to BOTH the local-NVMe and remote-object-storage
  tiers, given their different MTBF coverage (preemption ~ every few hours; full-rack
  failures ~ once per week). Determine the optimal interval for each tier and the
  combined overhead.
visual:
  kind: svg
  path: cloud-4525.svg
  alt: A parabola showing minimum total overhead time at a 2-hour checkpoint interval.
  caption: Total overhead (compute lost + save time) vs checkpoint interval.
details:
  realistic_solution: 'Young: T_c = sqrt(2 * checkpoint_time * MTBF). Local NVMe
    tier: t_c = 30 s, MTBF (preemption) ~ 24 h = 86400 s. T_local = sqrt(2 * 30 *
    86400) = sqrt(5184000) = 2278 s ~ 38 minutes. Remote object tier: t_c = 300
    s, MTBF (full-rack) ~ 168 h = 604800 s. T_remote = sqrt(2 * 300 * 604800) =
    sqrt(362880000) = 19050 s ~ 5.3 hours. Combined overhead: local 30/2278 = 1.3%
    + remote 300/19050 = 1.6% = ~2.9% checkpoint tax, lower than the single-tier
    24h MTBF answer of 2 hours / 5 min = 4.2%. Two-tier wins because cheap local
    writes can be more frequent than slow remote writes.'
  common_mistake: Picking a single MTBF and a single checkpoint cost; missing that
    different failure classes have different MTBFs and different recovery checkpoints
    apply to each.
  napkin_math: 'Local: sqrt(2*30*86400) = 2278 s = 38 min; remote: sqrt(2*300*604800)
    = 19050 s = 5.3 h; total overhead 30/2278 + 300/19050 = 2.9%.'
