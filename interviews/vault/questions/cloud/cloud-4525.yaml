title: A100 Checkpoint Interval
scenario: A 1000-GPU A100 cluster trains a 175B model. The Mean Time Between Failures
  (MTBF) is 24 hours. A full checkpoint takes 5 minutes to write to object storage.
question: Calculate the optimal checkpoint interval using Young's formula.
visual:
  kind: svg
  path: cloud-4525.svg
  alt: A parabola showing minimum total overhead time at a 2-hour checkpoint interval.
  caption: Total overhead (compute lost + save time) vs checkpoint interval.
details:
  realistic_solution: Young's formula states optimal interval T_c = sqrt(2 * checkpoint_time
    * MTBF). Here, checkpoint_time = 5 minutes = 300 seconds. MTBF = 24 hours = 86400
    seconds. T_c = sqrt(2 * 300 * 86400) = sqrt(51840000) = 7200 seconds, which is
    exactly 2 hours.
  common_mistake: Failing to convert both the checkpoint duration and the MTBF into
    the same unit (e.g., seconds or minutes) before applying the formula.
  napkin_math: sqrt(2 * 5 * (24*60)) = sqrt(14400) = 120 mins = 2 hours
