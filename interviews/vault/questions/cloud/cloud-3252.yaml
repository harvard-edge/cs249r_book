title: Optimizing Large Language Model Inference on AMD MI300X
scenario: You are tasked with deploying a 100B parameter LLM (FP16) for real-time inference at batch size 1. Your target hardware is the AMD MI300X (192 GB HBM3, 1,300 TFLOPS FP16 dense, 5.3 TB/s memory bandwidth).
question: How would you serve a 100B FP16 LLM on MI300X versus a custom ASIC or CPUs, and optimize data flow despite the 192 GB HBM limit?
details:
  realistic_solution: 'A realistic solution would first acknowledge the memory constraint: a 100B parameter FP16 model (200GB) will not fit entirely in the MI300X''s 192GB HBM3. This necessitates strategies like aggressive 8-bit (or even 4-bit) quantization, or implementing a multi-accelerator system with tensor parallelism or CPU offloading for parts of the model. For maximizing performance on MI300X, the design should focus on optimizing memory access patterns, kernel fusion, and leveraging its high bandwidth. Exploiting sparse model inference by effectively pruning the LLM to utilize the 2,600 TFLOPS FP16 sparse capabilities would be crucial. The comparison should highlight MI300X''s programmability advantage and established ecosystem over custom ASICs, while acknowledging the ASIC''s potential raw performance ceiling. CPUs would typically be considered for their flexibility and control plane operations but fall short on raw compute for large LLMs.'
  common_mistake: |
    **The Pitfall:** Focusing solely on peak TFLOPS without checking if the model even fits in memory.
    **The Rationale:** A 100B parameter FP16 model (200GB) exceeds the MI300X's 192GB capacity. Furthermore, batch-1 inference is extremely memory-bandwidth bound, making TFLOPS largely irrelevant.
    **The Consequence:** Designing an architecture that OOMs on startup or drastically misses latency SLAs due to memory swapping.
  napkin_math: |
    - Model Memory Footprint: 100 billion parameters * 2 bytes/param (FP16) = 200 GB.
    - AMD MI300X HBM3 = 192 GB.
    - 200 GB > 192 GB: The model will not fit. Requires quantization (e.g., 8-bit to ~100 GB) or multi-GPU sharding.
    - Assume 8-bit quantization (100 GB footprint).
    - Theoretical token generation rate = 5.3 TB/s / 100 GB/token = 53 tokens/second.
    - **Even with 5.3 TB/s bandwidth, a quantized 100B model is limited to ~53 tokens/s due to memory constraints.**
