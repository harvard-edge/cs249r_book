title: Dimensioning the 3D Cube
scenario: We have a cluster of 1,024 GPUs and need to train a 175B parameter dense model.
question: How do you allocate the dimensions for Data (D), Tensor (T), and Pipeline (P) parallelism for a 175B model?
details:
  realistic_solution: "You solve a physical constraint satisfaction problem. $T$ is strictly bounded by the NVLink domain (usually $T=8$ per node). $P$ is bounded by the number of transformer layers and the microbatch count required to hide the bubble (e.g., $P=16$). Data parallelism ($D$) gets the remainder. Total GPUs = $D \times T \times P$, so $D = 1024 / (8 \times 16) = 8$."
  common_mistake: |
    **The Pitfall:** Proposing an even split like $D=T=P$ or using pure Data Parallelism for everything.
    **The Rationale:** Many engineers default to simple divisions without considering the physical memory limits of individual GPUs or the specific constraints of the hardware interconnect (like NVLink domains).
    **The Consequence:** The model simply will not fit in memory (pure DP), or the configuration will cause massive communication bottlenecks across slow interconnects.
  napkin_math: |
    *   **Model Weights:** 175B params × 2 bytes = 350 GB.
    *   **Tensor Parallelism (T):** One H100 has 80 GB. Minimum TP to fit weights is 350 / 80 = 4.375. Round up to the NVLink domain size: **T=8**.
    *   **Pipeline Parallelism (P):** Assuming 96 layers and targeting a bubble under 25%, P=16 is a standard choice.
    *   **Data Parallelism (D): Total GPUs = $D \times T \times P$. Thus, $D = 1024 / (8 \times 16) = 8$.**
