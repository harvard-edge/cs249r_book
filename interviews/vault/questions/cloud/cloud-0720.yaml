title: Dimensioning the 3D Cube
scenario: We have a cluster of 1,024 GPUs and need to train a 175B parameter dense model.
question: How do you allocate the dimensions for Data (D), Tensor (T), and Pipeline (P) parallelism for a 175B model?
details:
  realistic_solution: "You solve a physical constraint satisfaction problem. T is strictly bounded by the NVLink domain (usually T=8 per node). P is bounded by the number of transformer layers and the microbatch count required to hide the bubble (e.g., P=16). Data parallelism (D) gets the remainder. Total GPUs = D * T * P, so D = 1024 / (8 * 16) = 8."
  common_mistake: |
    **The Pitfall:** Proposing an even split like D=T=P or using pure Data Parallelism for everything.
    **The Rationale:** Many engineers default to simple divisions without considering the physical memory limits of individual GPUs or the specific constraints of the hardware interconnect (like NVLink domains).
    **The Consequence:** The model simply will not fit in memory (pure DP), or the configuration will cause massive communication bottlenecks across slow interconnects.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model weights: 175B params (350 GB in FP16).
       - GPUs: 1,024 (80 GB capacity each). NVLink domain: 8.
    2. **Calculations:**
       - Tensor Parallelism (T): 350 / 80 = 4.375 -> T=8.
       - Pipeline Parallelism (P): Target P=16 for bubble reduction.
       - Data Parallelism (D): Total / (T*P) = 1024 / 128 = 8.
    3. **Conclusion & Interpretation:**
       - **Result: Parallelism-Bound.** The correct 3D layout is D=8, T=8, P=16 to satisfy physical memory and interconnect constraints.
