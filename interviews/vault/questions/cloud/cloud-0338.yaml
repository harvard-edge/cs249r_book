title: The Automotive RAG Update Bottleneck
scenario: You are designing the Over-the-Air (OTA) update mechanism for a fleet of connected vehicles. Each vehicle runs a Retrieval-Augmented Generation (RAG) assistant relying on a 50 GB vector index. Your team proposes pushing a full index update to the fleet daily over the vehicles' 4G LTE connection, which provides a stable 50 Megabits-per-second (Mbps) download speed.
question: "What is the bottleneck in pushing a 50 GB daily index over 50 Mbps LTE, and how long would one download take?"
details:
  realistic_solution: |
    The primary bottleneck is clearly the network bandwidth. A 50 GB file is extremely large to transfer over a typical cellular connection.
  common_mistake: |
    **The Pitfall:** Confusing Megabits per second (Mbps) with MegaBytes per second (MB/s).
    **The Rationale:** Candidates divide 50,000 MB directly by 50 Mbps.
    **The Consequence:** The download time is underestimated by a factor of 8, leading to a fundamentally unviable daily OTA update architecture.
  napkin_math: |
    - **Index Size:** 50 Gigabytes (GB) * 8 bits/Byte = 400 Gigabits (Gb) = 400,000 Megabits (Mb).
    - **LTE Speed:** 50 Mbps.
    - **Transfer Time:** 400,000 Mb / 50 Mbps = 8,000 seconds.
    - **Result:** 8,000 seconds / 60 = **~133 minutes** (>2 hours) of continuous downloading per car.
  options:
  - About 16 minutes
  - About 2.2 hours
  - Less than a minute
  - About 3 minutes
  correct_index: 1
