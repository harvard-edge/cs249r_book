title: Optimizing a Large-Scale A100 Cluster for Carbon-Aware Operations
scenario: Your team manages a training cluster of thousands of A100 GPUs (400W TDP each). The datacenter operates with a Power Usage Effectiveness (PUE) of 1.5. The company is exploring liquid cooling for certain racks to improve efficiency and reduce its carbon footprint.
question: How would you diagnose the bottlenecks and quantify the potential benefits of these changes?
details:
  realistic_solution: Implement real-time monitoring of rack power draw. Liquid cooling lowers the PUE by drastically reducing fan and chiller overhead. Quantify the PUE improvement to calculate operational carbon reduction against the liquid cooling infrastructure's lifecycle.
  common_mistake: |
    **The Pitfall:** Focusing only on peak GPU power consumption or TFLOPS/watt.
    **The Rationale:** It's easy to look purely at hardware specs, ignoring the PUE multiplier which accounts for the massive energy used by cooling and facility infrastructure.
    **The Consequence:** Carbon reduction estimates are wildly inaccurate, and the operational savings of upgrading to liquid cooling are severely understated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack: 10 GPUs * 400W = 4kW IT load.
       - Original PUE: 1.5. Liquid PUE: 1.1.
       - Carbon factor: 300g CO2e/kWh.
    2. **Calculations:**
       - Current draw: 4kW * 1.5 = 6kW.
       - Liquid draw: 4kW * 1.1 = 4.4kW.
       - Savings: 1.6kW/rack.
       - Annual Energy Savings: 1.6kW * 8760 h = 14,016 kWh.
       - Carbon Reduction: 14,016 kWh * 300g = 4,204,800g.
    3. **Conclusion & Interpretation:**
       - **Result: Liquid cooling saves ~4.2 tonnes of CO2e per rack annually.** (Power-Bound)
