title: Jacobian Computation for Low-Dimensional Inputs
scenario: A differentiable physics engine running on a cloud GPU maps a 10-dimensional vector of control parameters to a 50,000-dimensional simulated state output. The system must compute the full 50,000 x 10 Jacobian matrix to optimize the control parameters.
question: Which automatic differentiation mode should be used to compute the Jacobian, and how many passes will it require?
details:
  realistic_solution: Applying forward-mode AD (using dual numbers). Forward mode computes the derivative with respect to one input across all outputs simultaneously in a single pass.
  common_mistake: |
    **The Pitfall:** Defaulting to reverse-mode automatic differentiation (standard backpropagation).
    **The Rationale:** ML engineers are so accustomed to reverse-mode AD for training scalar loss functions that they blindly apply it to all differentiable scenarios.
    **The Consequence:** Triggering 50,000 separate backward passes, slowing down optimization by orders of magnitude compared to forward-mode AD.
  napkin_math: |
    1. The function maps N inputs to M outputs. Here, N = 10 and M = 50,000.
    2. Reverse-mode AD (backpropagation) computes the derivative of ONE output with respect to all inputs in a single pass. Total passes needed = M = 50,000.
    3. Forward-mode AD computes the derivative of all outputs with respect to ONE input in a single pass. Total passes needed = N = 10.
    4. **Using forward-mode AD requires 10 passes, which is 5,000x fewer passes than reverse-mode AD.**
