title: CI/CD Pipeline Design for Multi-Accelerator Kernel Testing
scenario: Your team maintains 80 custom GPU kernels that must work on H100, MI300X, and TPU v5e.
question: How would you design CI/CD to test 80 custom kernels across H100, MI300X, and TPU v5e without dedicated hardware in CI?
details:
  realistic_solution: 'Three-tier CI: (1) Every PR: CPU-emulated correctness tests using reference implementations (PyTorch CPU) — catches logic bugs in seconds. (2) Nightly: GPU correctness on NVIDIA (cheapest, most available). AMD ROCm correctness via cloud MI300X instances (spot pricing). TPU correctness via GCP TPU VMs. (3) Weekly: Full performance regression suite on all three backends with statistical comparison (>5 runs per kernel per backend). Use artifact caching to diff performance against the previous week. Budget: ~$500/month for nightly + weekly GPU CI.'
  common_mistake: |
    **The Pitfall:** Trying to run full hardware-in-the-loop CI on all three backends for every PR.
    **The Rationale:** Engineers prioritize perfect test fidelity over cost and speed, ignoring the high price ($3-8/hour) and limited availability of accelerator runners.
    **The Consequence:** CI times stretch to hours, and cloud costs explode, dragging down developer velocity.
  napkin_math: |
    *   **Test Volume:** 80 kernels × 3 backends × 5 runs = 1200 kernel runs per week.
    *   **Time per Run:** ~30 seconds per kernel test.
    *   **Total Compute Time:** 1200 × 30s = 36,000s = 10 hours.
    *   **Cost Estimate:** 10 hours × $3/hour = **$30/week ($120/month) for weekly performance CI.**
