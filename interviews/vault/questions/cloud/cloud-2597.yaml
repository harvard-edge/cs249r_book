title: Cloud Information Entropy L2 0
scenario: Your data team collected a training dataset where 90% of examples belong to one class. They
  claim the dataset has 1 million 'diverse' examples. Explain how information entropy reveals the actual
  diversity problem.
question: "How does entropy quantify the real diversity of the 90%-majority-class dataset despite having 1 million examples?"
details:
  realistic_solution: 'Information entropy H = -Σ p(x) log₂ p(x) measures average information content.
    For a balanced 10-class dataset: H = -10 × 0.1 × log₂(0.1) = 3.32 bits (maximum entropy). For your
    imbalanced dataset (90% one class, 10% split among 9): H = -(0.9 × log₂(0.9) + 9 × (1/90) × log₂(1/90))
    = -(−0.137 + 0.1 × (−6.492)) = 0.137 + 0.649 = 0.786 bits. Only 24% of maximum entropy. Despite having
    1M examples, the effective diversity is equivalent to ~1.72 classes (2^0.786). The model will learn
    the majority class well but fail on minority classes, which may be the most important ones (e.g.,
    rare defects, edge cases).'
  common_mistake: Equating dataset size with dataset diversity. A 1M-sample dataset with 0.786 bits entropy
    is less informative than a 10K-sample dataset with 3.32 bits entropy for training a robust classifier.
  napkin_math: 'Balanced 10 classes: H = 3.32 bits. Imbalanced (90/10): H = 0.786 bits = 24% of max. Effective
    classes: 2^0.786 = 1.72. 1M examples but only ~100K are useful for minority learning. Effective dataset
    size for diversity: ~172K equivalent balanced samples.'
