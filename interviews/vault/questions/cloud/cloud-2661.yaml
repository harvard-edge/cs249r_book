title: Choosing Evaluation Strategy for a Safety-Critical Model
scenario: 'You are deploying an updated fraud detection model. The current production model catches 92% of fraud (recall) with a 1.5% false positive rate (FPR). The new model shows 94% recall and 1.2% FPR in offline evaluation. False negatives cost $10K average (missed fraud) and false positives cost $50 average (customer friction).'
question: "Which online evaluation strategy should you use for this safety-critical model, given the extreme cost asymmetry between false negatives and false positives?"
details:
  realistic_solution: 'Use shadow deployment first, then a careful canary release — NOT direct A/B testing. Reasoning: (1) The cost asymmetry is extreme: false negatives cost 200x more than false positives ($10K vs $50). A/B testing at 50% traffic means 50% of transactions use the unvalidated model — if the new model has an unexpected failure mode (e.g., misses a new fraud pattern), thousands of fraudulent transactions go undetected at $10K each. (2) Shadow deployment: run the new model on all traffic, compare predictions to the production model without serving them. This reveals disagreements — cases where the new model would miss fraud the old model catches. Analyze these cases manually. (3) After shadow validation, canary at 1% traffic. Monitor false negative rate in real-time with an automatic rollback if fraud losses exceed threshold. (4) Only after 2-4 weeks of stable canary metrics, gradually ramp to 100%. Never A/B test at 50% for safety-critical models.'
  common_mistake: |
    **The Pitfall:** Using standard A/B testing at a 50% traffic split for a safety-critical model.
    **The Rationale:** A/B testing is the industry standard for web features and recommendation engines, so teams apply it universally.
    **The Consequence:** If the new model has an unexpected failure mode on live traffic, exposing 50% of traffic immediately results in massive financial losses from undetected fraud.
  napkin_math: |
    1. **Cost Asymmetry:** False negatives ($10,000) cost 200x more than false positives ($50).
    2. **A/B Testing Risk:** If A/B tested at 50% and the new model's FNR is 2% worse on a specific live fraud pattern (assuming 1000 daily frauds): 50% * 1000 * 2% * $10,000 = **$100,000/day exposure**.
    3. **Canary Risk:** A shadow deployment (0 risk) followed by a 1% canary release reduces exposure to 1% * 1000 * 2% * $10,000 = **$2,000/day exposure**.
