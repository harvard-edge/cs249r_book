title: Choosing Evaluation Strategy for a Safety-Critical Model
scenario: You are deploying an updated fraud detection model. The current model catches 92% of fraud (recall)
  with 1.5% false positive rate. The new model shows 94% recall and 1.2% FPR in offline evaluation. Given
  that false negatives cost $10K average (missed fraud) and false positives cost $50 average (customer
  friction), which online evaluation strategy should you use and why?
details:
  realistic_solution: 'Use shadow deployment first, then a careful canary release — NOT direct A/B testing.
    Reasoning: (1) The cost asymmetry is extreme: false negatives cost 200x more than false positives
    ($10K vs $50). A/B testing at 50% traffic means 50% of transactions use the unvalidated model — if
    the new model has an unexpected failure mode (e.g., misses a new fraud pattern), thousands of fraudulent
    transactions go undetected at $10K each. (2) Shadow deployment: run the new model on all traffic,
    compare predictions to the production model without serving them. This reveals disagreements — cases
    where the new model would miss fraud the old model catches. Analyze these cases manually. (3) After
    shadow validation, canary at 1% traffic. Monitor false negative rate in real-time with an automatic
    rollback if fraud losses exceed threshold. (4) Only after 2-4 weeks of stable canary metrics, gradually
    ramp to 100%. Never A/B test at 50% for safety-critical models.'
  common_mistake: Using A/B testing for safety-critical models. The potential loss from exposing 50% of
    traffic to a flawed model far outweighs the statistical power gained vs a canary approach.
  napkin_math: 'A/B at 50%: if new model FNR is 2% worse on a fraud pattern, 50% × 1000 daily frauds ×
    2% × $10K = $100K/day exposure. Canary at 1%: same scenario = $2K/day exposure.'
