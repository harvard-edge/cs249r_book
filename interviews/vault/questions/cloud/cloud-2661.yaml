title: Choosing Evaluation Strategy for a Safety-Critical Model
scenario: 'You are deploying an updated fraud detection model. The current production model catches 92% of fraud (recall) with a 1.5% false positive rate (FPR). The new model shows 94% recall and 1.2% FPR in offline evaluation. False negatives cost $10K average (missed fraud) and false positives cost $50 average (customer friction).'
question: 'Which online evaluation strategy should you use for this safety-critical model, given the extreme cost asymmetry between false negatives and false positives?'
details:
  realistic_solution: 'Use shadow deployment first, then a careful canary release — NOT direct A/B testing. Shadow deployment runs the new model on all traffic, comparing predictions without serving them to reveal disagreements. After validation, canary at 1% traffic with an automatic rollback if fraud losses exceed threshold. Only after 2-4 weeks of stable canary metrics, gradually ramp to 100%. Never A/B test at 50% for safety-critical models.'
  common_mistake: |
    **The Pitfall:** Using standard A/B testing at a 50% traffic split for a safety-critical model.
    **The Rationale:** A/B testing is the industry standard for web features and recommendation engines, so teams apply it universally.
    **The Consequence:** If the new model has an unexpected failure mode on live traffic, exposing 50% of traffic immediately results in massive financial losses from undetected fraud.
  napkin_math: |
    **Assumptions & Constraints:**
    - False negative cost: $10,000 (200x more than false positives at $50).
    - Traffic assumption: 1000 daily frauds.
    - Failure mode: FNR is 2% worse on a specific live pattern.

    **Calculations:**
    - A/B Testing Risk: 50% split * 1000 * 2% * $10,000 = $100,000/day exposure.
    - Canary Risk: 1% split * 1000 * 2% * $10,000 = $2,000/day exposure.

    **Conclusion & Interpretation:**
    - **Result: Risk-Bound**. A shadow deployment followed by a 1% canary reduces financial exposure by 50x compared to standard A/B testing.
