title: 'Optimizing Knowledge Distillation for a ResNet-like Model on Google TPU v5e: A Latency and Accuracy Challenge'
scenario: Your team has applied knowledge distillation to train a ResNet-50 student model (25M parameters) from a ResNet-152 teacher (60M parameters). The target deployment platform is a Google TPU v5e (16 GB HBM, 197 TFLOPS, 1.6 TB/s memory bandwidth). During deployment, the student model's end-to-end inference latency is consistently 20% higher than expected even with an optimal batch size of 64.
question: What steps would you take to diagnose the root cause of the unexpected latency and lower throughput, considering the specific TPU v5e specs and the knowledge distillation approach?
details:
  realistic_solution: The solution involves systematic profiling and analysis. First, use TPU profiling tools to identify bottlenecks in memory access (HBM utilization, bandwidth saturation) and compute (BF16 core utilization). Investigate if the feature distillation technique is generating excessively large intermediate tensors that are thrashing the 16 GB HBM, or if the 1.6 TB/s bandwidth is being saturated by frequent, scattered memory accesses. If logit matching was used, ensure the student model's layers are efficiently mapped to the TPU's architecture. Consider experimenting with different distillation temperatures or regularization techniques if the student model is struggling to learn the teacher's 'dark knowledge' efficiently on the TPU. If feature distillation is the culprit, explore reducing the dimensionality of transferred features or using more compact feature representations that better fit HBM. Finally, adjust batch size carefully, as 64 might still be suboptimal depending on the exact model and TPU's internal tiling strategies, striving to keep the BF16 TFLOPS busy without overrunning HBM.
  common_mistake: |
    **The Pitfall:** Focusing purely on generic code optimization without analyzing the specific distillation technique.
    **The Rationale:** Candidates ignore how intermediate feature maps in knowledge distillation can thrash the TPU's HBM.
    **The Consequence:** Misdiagnosing memory bandwidth or capacity limits as pure compute deficiencies.
  napkin_math: |
    1. **HBM Capacity:** 25M param BF16 model is ~50MB.
    2. **Distillation Tensors:** Feature maps for batch 64 can easily exceed the 16 GB HBM limit.
    3. **Bandwidth Limits:** Moving 1024x1024x256 BF16 maps frequently saturates the 1.6 TB/s.
    4. **Result:** A memory bottleneck heavily suppresses the **197 TFLOPS** utilization.
