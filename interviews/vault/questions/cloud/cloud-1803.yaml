title: Diagnosing RoCEv2 PFC Storms
scenario: You are training a 70B parameter model on 1024 H100 GPUs across 128 nodes, communicating via
  a 400Gbps RoCEv2 fabric. During the All-Reduce phase, Model Flops Utilization (MFU) intermittently plummets
  from 55% to 15%. Network telemetry reveals a massive spike in PFC (Priority Flow Control) pause frames
  and subsequent UDP packet drops at the spine switches, leading to NCCL timeouts. How do you diagnose
  this bottleneck and what configuration changes stabilize the fabric?
question: "How do you diagnose this bottleneck and what configuration changes stabilize the fabric?"
details:
  realistic_solution: Diagnose as an incast-driven PFC storm. The solution is to properly tune DCQCN (Data
    Center Quantized Congestion Network) parameters. Specifically, lower the ECN (Explicit Congestion
    Notification) marking threshold on the switches to trigger at 15-20% buffer utilization, ensuring
    senders throttle their injection rates before the buffer hits the PFC pause threshold (e.g., 50%).
  common_mistake: Assuming the issue is raw bandwidth saturation or increasing NCCL timeouts, failing
    to recognize that RoCEv2's Go-Back-N retransmission combined with PFC head-of-line blocking causes
    catastrophic throughput collapse during incast microbursts.
  napkin_math: 'At 400Gbps (50 GB/s), an 8-to-1 incast microburst pushes 400 GB/s toward a single destination
    port. A typical switch buffer allocates ~2MB per port. The buffer fills in: 2MB / (400 GB/s - 50 GB/s
    ingress-egress delta) ≈ 5.7 microseconds. ECN marking must trigger at a very shallow depth (~300KB)
    to propagate the congestion notification back to senders within the ~2µs network round-trip time before
    the buffer fills and PFC pauses the entire port.'
