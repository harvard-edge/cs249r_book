title: Diagnosing RoCEv2 PFC Storms
scenario: 'You are training a 70B parameter model on 1024 H100 GPUs across 128 nodes, communicating via a 400Gbps RoCEv2 fabric. During the All-Reduce phase, Model Flops Utilization (MFU) intermittently plummets from 55% to 15%. Network telemetry reveals a massive spike in PFC (Priority Flow Control) pause frames and subsequent UDP packet drops at the spine switches, leading to NCCL timeouts.'
question: 'How do you diagnose this bottleneck, and what configuration changes stabilize the fabric?'
details:
  realistic_solution: 'Diagnose as an incast-driven PFC storm. The solution is to properly tune DCQCN (Data Center Quantized Congestion Network) parameters. Specifically, lower the ECN (Explicit Congestion Notification) marking threshold on the switches to trigger at 15-20% buffer utilization, ensuring senders throttle their injection rates before the buffer hits the PFC pause threshold.'
  common_mistake: |
    **The Pitfall:** Assuming the issue is raw bandwidth saturation or simply increasing NCCL timeouts.
    **The Rationale:** Treating AI networks like standard web traffic, ignoring loss-less ethernet protocols.
    **The Consequence:** Failing to recognize that RoCEv2's Go-Back-N retransmission combined with PFC head-of-line blocking causes catastrophic throughput collapse during incast microbursts.
  napkin_math: |
    - **Microburst Incast:** 8-to-1 incast pushes 400 GB/s toward a single destination port.
    - **Egress Limit:** Port drains at 50 GB/s (400 Gbps).
    - **Delta:** 350 GB/s (or 350 KB/μs) fills the buffer.
    - **Buffer Fill Time:** A 2MB switch buffer fills in 2MB / 350 KB/μs ≈ 5.7 microseconds.
    - **Action:** ECN marking must trigger extremely early (~300KB depth) to notify senders within the ~2μs network RTT before PFC pauses the entire port.
