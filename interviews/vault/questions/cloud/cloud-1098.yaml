title: Optimizing Stripe Size for 4 TB/s AI Storage
scenario: You are architecting the parallel storage backend for an AI cluster with 1,024 A100 GPUs training
  on a 100 PB multimodal dataset. The system requires an aggregate read throughput of 4 TB/s to prevent
  GPU starvation. The backend relies on NVMe storage nodes, each capable of 200 GB/s throughput, connected
  via a 400 Gbps (50 GB/s) NDR InfiniBand fabric. The dataset consists of 2 GB TFRecord files. You need
  to evaluate the optimal stripe size and server count for these files to maximize throughput while minimizing
  metadata overhead.
question: "What stripe size and number of storage targets would you choose for 2 GB TFRecord files to hit 4 TB/s without excess metadata overhead?"
details:
  realistic_solution: Select a relatively large stripe size (e.g., 32 MB) and stripe across a moderate
    number of Object Storage Targets (OSTs) (e.g., 64). This balances concurrent read throughput with
    manageable metadata operations, allowing the client to saturate its 50 GB/s network link by reading
    concurrently from multiple nodes without overwhelming any single storage node or the metadata server.
  common_mistake: Setting the stripe size too small (e.g., 64 KB or 1 MB), assuming maximum parallelism
    is always better, which leads to metadata server bottlenecking and network contention due to excessive
    small RPC requests.
  napkin_math: For a 2 GB file with a 32 MB stripe size, the file is divided into 64 chunks. If striped
    across 64 storage nodes, each node holds 1 chunk. To saturate a 50 GB/s client link, the client needs
    to read ~1,562 chunks per second. Across 64 nodes, each node serves ~24 chunks/s (768 MB/s) to this
    client, well within the 200 GB/s node limit.
