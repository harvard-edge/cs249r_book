title: Optimizing Stripe Size for 4 TB/s AI Storage
scenario: You are architecting parallel storage for 1,024 GPUs reading 2 GB TFRecord files, requiring 4 TB/s aggregate throughput over 50 GB/s links.
question: "What stripe size and number of storage targets would you choose for 2 GB TFRecord files to hit 4 TB/s without excess metadata overhead?"
details:
  realistic_solution: Select a large stripe size (e.g., 32 MB) across a moderate number of Object Storage Targets. This balances concurrent throughput while minimizing metadata strain.
  common_mistake: |
    **The Pitfall:** Setting the stripe size too small (e.g., 64 KB).
    **The Rationale:** Assuming maximum chunk parallelism is universally better for throughput.
    **The Consequence:** Severe metadata server bottlenecking due to an explosion of RPC requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2 GB file, 32 MB stripe. 50 GB/s link.

    **Calculations:**
    - 64 chunks per file.
    - 50 GB/s requires ~1562 chunks/s.

    **Conclusion & Interpretation:**
    - **Result: 768 MB/s per node across 64 targets handles load safely without metadata bottlenecks (I/O-Bound)**.
