title: Optimizing Stripe Size for 4 TB/s AI Storage
scenario: You are architecting the parallel storage backend for an AI cluster with 1,024 GPUs training on a 100 PB multimodal dataset. The system requires an aggregate read throughput of 4 TB/s. The backend relies on NVMe storage nodes, each capable of 200 GB/s throughput, connected via a 400 Gbps (50 GB/s) fabric. The dataset consists of 2 GB TFRecord files.
question: What stripe size and number of storage targets would you choose for 2 GB TFRecord files to hit 4 TB/s without excess metadata overhead?
details:
  realistic_solution: Select a relatively large stripe size (e.g., 32 MB) and stripe across a moderate number of Object Storage Targets (OSTs) (e.g., 64). This balances concurrent read throughput with manageable metadata operations, allowing the client to saturate its 50 GB/s network link by reading concurrently from multiple nodes without overwhelming any single storage node or the metadata server.
  common_mistake: |
    **The Pitfall:** Setting the stripe size too small (e.g., 64 KB or 1 MB).
    **The Rationale:** Candidates assume maximum parallelism is always better for throughput.
    **The Consequence:** This leads to metadata server bottlenecking and network contention due to an excessive number of small RPC requests.
  napkin_math: |
    - **File size:** 2 GB.
    - **Stripe size:** 32 MB.
    - **Chunks per file:** 2048 MB / 32 MB = 64 chunks.
    - **Client link saturation:** 50 GB/s requires ~1,562 chunks per second (50,000 MB / 32 MB).
    - **Per-node load:** Across 64 nodes, each node serves ~24 chunks/s (768 MB/s) to this client.
    - **Conclusion:** 768 MB/s is well within the 200 GB/s node limit, allowing massive concurrency without metadata bottlenecking.
