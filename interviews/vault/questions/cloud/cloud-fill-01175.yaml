title: Optimizing Distributed ML Training on Kubernetes with A100 GPUs
scenario: You're tasked with deploying a large-scale distributed ML training job on a Kubernetes cluster.
  The job requires 16 NVIDIA A100 GPUs (80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth, 400W
  TDP each). Your cluster has various node types, some with A100s, some with older GPUs, and some CPU-only.
  You need to ensure your training pods land on nodes exclusively equipped with A100s, effectively utilize
  all 80GB of HBM2e memory, and are scheduled efficiently to minimize preemption and maximize GPU utilization.
  Describe your Kubernetes deployment strategy, focusing on how you'd configure GPU device plugins, leverage
  node affinity/selectors, and implement job scheduling policies.
question: "How would you schedule a 16-A100 distributed training job onto only A100-80GB nodes using device plugins, affinity, and batch scheduling?"
details:
  realistic_solution: "1. **NVIDIA Device Plugin:** Ensure the NVIDIA device plugin is correctly installed\
    \ and configured in the Kubernetes cluster. This exposes `nvidia.com/gpu` resources. 2. **Node Labeling:**\
    \ Label nodes with A100 GPUs explicitly, e.g., `gpu.nvidia.com/model: A100-80GB` and potentially `gpu.nvidia.com/memory:\
    \ 80GB`. 3. **Pod Resource Requests & Limits:** Request `nvidia.com/gpu: 1` per GPU needed within\
    \ the pod spec. While Kubernetes doesn't natively schedule on GPU memory, monitor application memory\
    \ usage and ensure sufficient node RAM. For fine-grained GPU memory control, specialized schedulers\
    \ or admission controllers might be needed, or rely on application-level memory management. 4. **Node\
    \ Affinity:** Utilize `nodeAffinity` (e.g., `requiredDuringSchedulingIgnoredDuringExecution`) in the\
    \ pod spec to target A100 nodes:\n```yaml\naffinity:\n  nodeAffinity:\n    requiredDuringSchedulingIgnoredDuringExecution:\n\
    \      nodeSelectorTerms:\n      - matchExpressions:\n        - key: gpu.nvidia.com/model\n      \
    \    operator: In\n          values:\n          - A100-80GB\n```\n5. **Job Scheduling:** For distributed\
    \ jobs requiring multiple pods to start together, consider using a scheduler extender or a specialized\
    \ batch scheduler (like Volcano) for gang scheduling. This ensures that all required pods are scheduled\
    \ simultaneously, preventing deadlocks or resource starvation for partial job deployments."
  common_mistake: 'A common mistake is simply requesting `nvidia.com/gpu: 1` without specifying the exact
    GPU type or memory, leading to pods potentially landing on older, less capable GPUs, or experiencing
    out-of-memory errors due to insufficient HBM2e. Another mistake is not properly configuring the NVIDIA
    device plugin, resulting in `0/80G` GPU memory being reported or pods failing to allocate GPUs correctly.
    Overlooking `nodeSelector` or `nodeAffinity` can lead to inefficient scheduling across heterogeneous
    nodes, or even partial deployment of distributed jobs if not coupled with gang-scheduling approaches.'
  napkin_math: 'Given 16 NVIDIA A100 (80GB) GPUs:

    - **Total GPU Memory:** 16 GPUs * 80 GB/GPU = 1280 GB HBM2e.

    - **Peak FP16 Performance:** 16 GPUs * 312 TFLOPS/GPU = 4992 TFLOPS FP16.

    - **Total Memory Bandwidth:** 16 GPUs * 2.0 TB/s/GPU = 32 TB/s.

    - **Total Power Consumption (TDP):** 16 GPUs * 400W/GPU = 6400W (6.4 kW) for the GPUs alone, not including
    the rest of the server. For a typical ML model training that processes 100GB of data per epoch, with
    a batch size that keeps all 80GB of HBM2e busy per GPU, the raw memory bandwidth means a full GPU
    memory scan takes roughly 80GB / 2.0TB/s = 0.04 seconds, highlighting that compute (FLOPs) rather
    than memory bandwidth is often the primary bottleneck for many deep learning workloads on A100s once
    data is on-device.'
