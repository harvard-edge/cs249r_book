title: The Stale Feature Store
scenario: Your company operates a critical real-time fraud detection model. Features are sourced from
  an online feature store (e.g., Redis, DynamoDB) and an offline batch feature store (e.g., Hive, BigQuery).
  Recently, you've observed that the online model's performance degrades significantly shortly after a
  new batch of features is pushed to the offline store, even though the model itself hasn't changed. Describe
  the likely architectural flaw and propose a solution that ensures consistency and freshness without
  introducing excessive latency.
details:
  realistic_solution: The likely flaw is a **train-serve skew due to asynchronous or inconsistent updates
    between the online and offline feature stores**. When new features are generated offline (e.g., daily
    aggregations), they are used to retrain the model. However, if these new features are not immediately
    or consistently propagated to the *online* store, the online model will be served with *stale* features
    while being trained on *fresh* ones. This creates a mismatch.
  common_mistake: '"The online model is buggy" or "The offline features are bad." The issue is not necessarily
    bad data or a bad model, but an inconsistency in the *timing* or *method* of feature updates between
    online and offline stores, leading to a train-serve skew.'
  napkin_math: If an offline feature computation takes 4 hours and runs daily, and the online store is
    updated only *after* the model is retrained and deployed (which might take another 2 hours), there's
    a potential 6-hour window of inconsistency. If an online feature update takes 50ms to propagate to
    Redis and 200ms to Kafka, total latency for dual-write is dominated by the slower path, but for consistency,
    both must succeed. Aim for sub-second synchronization for critical features.
