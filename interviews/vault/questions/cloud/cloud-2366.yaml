title: Dragonfly Topology for MoE Routing
scenario: Your team is building a 32,000 GPU cluster dedicated to Mixture of Experts (MoE) LLM training. The MoE workload requires massive All-to-All communication (100 MB per GPU per forward pass). You are deciding between a Folded Clos (Fat-Tree) and a Dragonfly topology. Dragonfly reduces the number of expensive long-reach optical links by 60%, but requires Adaptive Routing (AR).
question: For 32,000-GPU MoE training, should you choose Dragonfly over a Fat-Tree for 60% fewer links, and what latency risks arise?
details:
  realistic_solution: |
    Dragonfly topology exploits locality by grouping routers into high-bandwidth local chassis and using a sparse global mesh of long-reach optical links. This topology is highly cost-effective for workloads with high spatial locality. However, MoE relies heavily on All-to-All communication, which generates uniformly distributed global traffic. In a Dragonfly network, global traffic must traverse the sparse inter-group links. To avoid bottlenecks, Adaptive Routing (AR) uses non-minimal routing (routing traffic through intermediate groups), which increases the hop count from 1 (minimal) to up to 3 (non-minimal). This increases latency variance significantly. For synchronous All-to-All, the operation is bound by the tail latency of the slowest packet. While AR increases total throughput by utilizing non-minimal paths, the out-of-order packet delivery and latency jitter can severely degrade MoE performance unless the network interface (NIC) has advanced hardware reordering buffers. The tradeoff: Dragonfly saves millions in optical CAPEX but requires advanced DPUs/NICs with deep packet reordering buffers and highly tuned AR algorithms to prevent tail-latency-induced stragglers in MoE.
  common_mistake: |
    **The Pitfall:** Choosing a Dragonfly topology solely to achieve a 60% reduction in optical link costs.
    **The Rationale:** Valuing CAPEX savings without analyzing the specific traffic patterns of the intended workload.
    **The Consequence:** Severe network congestion, as MoE's uniform All-to-All communication completely defeats the localized traffic advantages of the Dragonfly topology.
  napkin_math: |
    - **Minimal Route Hop Latency:** ~1µs.
    - **Non-minimal Route (3 global hops):** ~3-4µs.
    - **Packet Reordering Buffer:** Bandwidth * Delay Product = 400 Gbps * 3µs = 1.2 Mb (150 KB) per flow.
    - **Total Buffer Needed:** For 32,000 simultaneous flows, buffer memory requirements scale dramatically.
    - **Conclusion: High latency variance and massive reassembly buffer requirements make Dragonfly incredibly risky for MoE All-to-All.**
