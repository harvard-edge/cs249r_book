title: Embedding Table Bandwidth Bottleneck
scenario: A DLRM-style recommendation model has a 500M-row embedding table with 128-dimensional FP32 vectors.
  During inference, each request performs 50 sparse lookups. Why is this workload almost always memory-bandwidth-bound
  rather than compute-bound?
question: "Why is this workload almost always memory-bandwidth-bound rather than compute-bound?"
details:
  realistic_solution: 'Each lookup is a random memory read: 128 dims × 4 bytes = 512 bytes. Fifty lookups
    = 25.6 KB of random reads with essentially zero reuse (each row is accessed once). The arithmetic
    is trivial (a few pooling additions). Arithmetic intensity is near zero — this is a pure bandwidth-bound
    workload.'
  common_mistake: Assuming embedding lookups are compute-heavy because the embedding table is large. The
    table is large, but lookups are just reads — there is almost zero compute.
  napkin_math: '50 lookups × 512 bytes = 25.6 KB read per request. | FLOPs: ~50 × 128 = 6,400 (just pooling
    adds). | AI = 6,400 / 25,600 ≈ 0.25 FLOPs/byte — deeply memory-bound.'
  options:
  - Because the FP32 multiply-accumulate operations for 128-dim vectors are expensive on GPU cores.
  - Because the model's MLP layers after the embedding are compute-heavy.
  - Because each lookup is a random memory read with near-zero arithmetic — making it a pure bandwidth-bound
    workload.
  - Because the embedding table doesn't fit in L2 cache, forcing reads from system DRAM.
  correct_index: 2
