title: 'Embedding Table Bandwidth Bottleneck'
scenario: 'A DLRM-style recommendation model has a 500M-row embedding table with 128-dimensional FP32 vectors. During inference, each request performs 50 sparse lookups.'
question: 'Why is this workload almost always memory-bandwidth-bound rather than compute-bound?'
details:
  realistic_solution: 'Each lookup is a random memory read: 128 dims × 4 bytes = 512 bytes. Fifty lookups = 25.6 KB of random reads with essentially zero reuse (each row is accessed once). The arithmetic is trivial (a few pooling additions). Arithmetic intensity is near zero — this is a pure bandwidth-bound workload.'
  common_mistake: |
    **The Pitfall:** Assuming embedding lookups are compute-heavy because the embedding table is massive.
    **The Rationale:** Conflating parameter count with arithmetic intensity, thinking that a big model automatically requires massive compute.
    **The Consequence:** Over-provisioning GPU compute cores when the system actually needs high-bandwidth memory (HBM) and fast interconnects to resolve the bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128-dimensional FP32 vectors (512 bytes per row).
    - 50 sparse lookups per request.

    **Calculations:**
    - Read Volume: 512 bytes * 50 = 25.6 KB of random reads per request.
    - Compute (FLOPs): ~50 * 128 = 6,400 pooling additions.
    - Arithmetic Intensity: 6,400 FLOPs / 25,600 bytes = 0.25 FLOPs/byte.

    **Conclusion & Interpretation:**
    - **Result: 0.25 FLOPs/byte (Memory-Bound)**. With near-zero arithmetic intensity and virtually no data reuse, processing speed is entirely determined by memory bandwidth.
  options:
  - 'Because the FP32 multiply-accumulate operations for 128-dim vectors are expensive on GPU cores.'
  - 'Because the model''s MLP layers after the embedding are compute-heavy.'
  - 'Because each lookup is a random memory read with near-zero arithmetic — making it a pure bandwidth-bound workload.'
  - 'Because the embedding table doesn''t fit in L2 cache, forcing reads from system DRAM.'
