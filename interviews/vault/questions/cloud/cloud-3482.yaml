title: NVIDIA A100 Inference Server Cold Start Analysis
scenario: You are deploying a large language model (LLM) on an NVIDIA A100 GPU (80 GB HBM2e, 2.0 TB/s memory bandwidth). The full precision (FP32) weights require 60 GB, and half-precision (FP16) require 30 GB. When an autoscaling event triggers, the model weights must be loaded from a network file share (NFS) with a sustained read speed of 10 GB/s into the A100's memory.
question: What are the FP32 and FP16 cold-start model-loading times from the 10 GB/s NFS onto the A100, and what is the bottleneck?
details:
  realistic_solution: For FP32 weights (60 GB), the loading time from NFS would be 6 seconds. For FP16 weights (30 GB), the loading time from NFS would be 3 seconds. The memory bandwidth of 2.0 TB/s is significantly higher than the NFS read speed, meaning the network is the primary bottleneck for loading from NFS.
  common_mistake: |
    **The Pitfall:** Assuming the GPU memory bandwidth is the bottleneck.
    **The Rationale:** Candidates see the massive GPU memory bandwidth (2.0 TB/s) but forget that data must first traverse the much slower network link.
    **The Consequence:** Over-optimizing GPU memory transfers while ignoring the glaring network bottleneck.
  napkin_math: |
    1. **FP32 Load Time:** 60 GB / 10 GB/s = **6 seconds**.
    2. **FP16 Load Time:** 30 GB / 10 GB/s = **3 seconds**.
    3. **Capacity Check:** Both fit in the 80 GB A100.
    4. **Bottleneck Analysis:** GPU Bandwidth (2000 GB/s) $\gg$ NFS Speed (10 GB/s).
    5. **Conclusion:** **The 10 GB/s NFS network link is the primary bottleneck.**
