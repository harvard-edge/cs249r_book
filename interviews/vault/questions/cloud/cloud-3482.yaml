title: NVIDIA A100 Inference Server Cold Start Analysis
scenario: You are deploying a large language model on a GPU. The full precision weights require 60 GB, and half-precision require 30 GB. When an autoscaling event triggers, the model weights must be loaded from a network file share (NFS) with a sustained read speed of 10 GB/s into the GPU's memory.
question: What are the FP32 and FP16 cold-start model-loading times from the 10 GB/s NFS onto the GPU, and what is the bottleneck?
details:
  realistic_solution: For FP32 weights (60 GB), the loading time from NFS would be 6 seconds. For FP16 weights (30 GB), the loading time from NFS would be 3 seconds. The memory bandwidth of 2.0 TB/s is significantly higher than the NFS read speed, meaning the network is the primary bottleneck for loading from NFS.
  common_mistake: |
    **The Pitfall:** Assuming the GPU memory bandwidth is the bottleneck.
    **The Rationale:** Candidates see the massive GPU memory bandwidth (2.0 TB/s) but forget that data must first traverse the much slower network link.
    **The Consequence:** Over-optimizing GPU memory transfers while ignoring the glaring network bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 model size: 60 GB.
    - FP16 model size: 30 GB.
    - NFS sustained read speed: 10 GB/s.
    - GPU memory bandwidth: 2000 GB/s.

    **Calculations:**
    - FP32 Load Time: 60 GB / 10 GB/s = 6 seconds.
    - FP16 Load Time: 30 GB / 10 GB/s = 3 seconds.
    - Bandwidth comparison: GPU Bandwidth (2000 GB/s) ≫ NFS Speed (10 GB/s).

    **Conclusion & Interpretation:**
    - **Result: Network-Bandwidth-Bound**. The 10 GB/s NFS network link severely throttles the loading speed, making the 2.0 TB/s GPU memory bandwidth irrelevant during initialization.
