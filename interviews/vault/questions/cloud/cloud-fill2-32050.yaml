title: FlashAttention-2 Warp Partitioning Strategy
scenario: FlashAttention-1 splits work across warps by partitioning the output dimension (each warp computes
  a different part of the output for the same Q×K^T tile). FlashAttention-2 changes to partitioning across
  the K/V sequence dimension. Explain why this change improves performance on H100 and what synchronization
  overhead it eliminates.
details:
  realistic_solution: 'Savings = baseline - optimized = 64μs - 5μs = 59μs lower bound (not 30μs). Range:
    59-155μs (not 30-155μs).'
  common_mistake: 'Thinking warp partitioning is just about load balancing. The critical issue is synchronization:
    partitioning over the output dimension requires a cross-warp reduction (shared memory atomics or syncthreads)
    to combine partial outputs, which is a serialization bottleneck.'
  napkin_math: 'Latency savings from optimization: baseline 64-160μs minus optimized 5μs overhead = 59-155μs
    net savings (not 30-155μs — the lower bound error: 64-5=59, not 30).'
