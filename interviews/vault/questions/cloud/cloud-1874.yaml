title: Sizing Cloud Shard Shuffle Buffers
scenario: You are training a multimodal model on a 10 TB dataset stored in an S3 bucket. The data is pre-processed into 500 MB shards. Each training node has a 10 Gbps network link and 64 GB of CPU RAM available for the data loading pipeline. Individual samples average 1 MB in size. Global shuffling by requesting random individual samples drops throughput to <50 MB/s due to S3's 80ms time-to-first-byte latency. You implement shard-level shuffling: reading a pool of K shards concurrently and maintaining a local sample buffer of size B.
question: "What K and B would you configure to maximize randomness under 64GB RAM while saturating the 10Gbps S3 link?"
details:
  realistic_solution: Configure K=20 concurrent shard streams to hide latency and a local sample buffer B of 40,000 samples (40 GB), leaving a safe margin for OS overhead and data loading workers while fully saturating the network.
  common_mistake: |
    **The Pitfall:** Allocating the entire 64 GB to the sample buffer B.
    **The Rationale:** Candidates focus purely on maximizing the buffer size for randomness, forgetting that concurrent shard streams ($K$) also consume substantial memory.
    **The Consequence:** The node aggressively swaps to disk or is killed by the OOM killer, crashing the entire training job.
  napkin_math: |
    - 10 Gbps network = 1.25 GB/s. A single S3 sequential stream yields ~100 MB/s.
    - To saturate 1.25 GB/s, we need **K=13 streams minimum**; using K=20 provides reliable saturation.
    - 20 streams $\times$ 500 MB/shard = 10 GB memory for active shard downloads.
    - Available RAM for buffering: 64 GB - 10 GB = 54 GB.
    - **Result:** Allocating **40 GB for the shuffle buffer B (40,000 samples)** leaves a safe 14 GB margin for OS and multiprocessing overhead.
