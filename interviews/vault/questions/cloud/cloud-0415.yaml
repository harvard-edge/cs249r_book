title: The Hidden Cost of Federation
scenario: You are evaluating a proposal to shift from a centralized training strategy to a Federated Learning
  (FL) approach for a feature deployed on millions of user devices. From a Total Cost of Ownership (TCO)
  perspective for the cloud infrastructure and engineering team, identify the largest, and often most
  underestimated, new cost introduced by adopting FL at production scale.
details:
  realistic_solution: The largest new cost is the massive increase in operational and engineering complexity.
    This includes managing a heterogeneous fleet of devices, ensuring security against model poisoning
    attacks, debugging stragglers and failures across millions of endpoints, and building a far more complex
    MLOps pipeline for versioning, deployment, and monitoring. This sustained engineering cost (OpEx)
    typically dwarfs the costs of network bandwidth or the central aggregation server.
  common_mistake: Engineers often focus on the direct, visible costs like network bandwidth for model
    updates or the compute required for the central aggregator. They underestimate that Federated Learning
    is fundamentally a large-scale, heterogeneous distributed systems problem. The primary cost driver
    shifts from raw hardware (CapEx) to complex, ongoing operational engineering (OpEx).
  napkin_math: Assume a team of 5 engineers manages your current centralized training pipeline. A production
    FL system at this scale might require a team of 15 due to its distributed nature. At a loaded cost
    of $300k/engineer/year, this represents a $3M annual increase in operational costs ($300,000 * (15
    - 5) engineers). This recurring OpEx is often far greater than the one-time CapEx for a few extra
    aggregation servers or the metered cost of network traffic.
  options:
  - Network bandwidth costs from millions of devices sending model updates.
  - Compute cost of the central server that aggregates model updates.
  - Sustained engineering and operational complexity to manage the distributed fleet.
  - The CapEx for H100s needed to run the aggregation.
  correct_index: 2
