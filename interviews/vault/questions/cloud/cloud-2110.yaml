title: Arithmetic Intensity of a Linear Layer
scenario: A linear layer performs Y = XW where X is [B, 4096] and W is [4096, 4096], both in FP16. You are targeting an A100 GPU (312 TFLOPS FP16, 2 TB/s HBM bandwidth).
question: "What is the arithmetic intensity of Y=XW for batch size B, and when is it compute-bound versus memory-bound on an A100?"
details:
  realistic_solution: 'FLOPs = 2 * B * 4096 * 4096. Bytes loaded = B*4096*2 (input) + 4096*4096*2 (weights) + B*4096*2 (output). For B=1: FLOPs = 33.6M, Bytes = 33.6M + 8K + 8K = ~33.6MB. AI = 33.6M / 33.6M = ~1 FLOP/byte (memory-bound). For B=1024: FLOPs = 34.35G, Bytes = 33.55M (weights) + 16.7M (in/out) = ~50.3MB. AI = 34.35G / 50.3M = ~682 FLOPs/byte (compute-bound). The ridge point on A100 is 312T/2T = 156 FLOPs/byte. Setting AI=156 and solving for B gives the crossover at approximately B=169. Batch size drives the transition.'
  common_mistake: |
    **The Pitfall:** Only counting the weight matrix bytes and ignoring the input and output tensors.
    **The Rationale:** Candidates assume weights dominate memory traffic, overlooking that for small batch sizes, input/output tensors can be significant, and they confuse the single-sample AI with the batch-dependent AI.
    **The Consequence:** The arithmetic intensity is miscalculated, leading to incorrect assumptions about whether the operation is compute or memory bound.
  napkin_math: |
    1. Determine the A100 Ridge point: 312 TFLOPS / 2.0 TB/s = 156 FLOPs/byte.
    2. Calculate total FLOPs for Y = XW: 2 * B * 4096^2.
    3. Calculate total bytes loaded/stored: (4096^2 * 2 bytes for W) + (B * 4096 * 2 bytes for X) + (B * 4096 * 2 bytes for Y).
    4. For B=1: FLOPs = ~33.6M, Bytes = 33.6MB (W) + 16KB (X+Y) ≈ 33.6MB. AI = 1 FLOP/byte (Memory-bound, 1 < 156).
    5. For B=1024: FLOPs = ~34.3G, Bytes = 33.6MB (W) + 16.8MB (X+Y) = 50.4MB. AI = 34.3G / 50.4M ≈ 680 FLOPs/byte.
    **At B=1024, the arithmetic intensity is ~680 FLOPs/byte, making it heavily compute-bound (680 > 156).**
