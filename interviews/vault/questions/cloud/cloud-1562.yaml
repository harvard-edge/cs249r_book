title: Diagnosing Sublinear Inference Scaling on H100
scenario: Your team migrated a 13B parameter LLM inference service (auto-regressive decoding, batch size
  1) from NVIDIA A100-80GB to H100-80GB GPUs. The H100 boasts over 3x the FP16 dense compute of the A100
  (989 TFLOPs vs 312 TFLOPs). However, profiling reveals the per-token generation latency only improved
  by roughly 1.6x. You are asked to analyze the system and root-cause why the application isn't achieving
  the expected >3x speedup.
question: "Why did H100 batch-1 LLM decoding improve only ~1.6x instead of >3x, and how can you escape that bottleneck?"
details:
  realistic_solution: Identify that batch-1 LLM token generation is strictly memory-bandwidth bound because
    it must load the entire model weights from HBM to SRAM for every single token generated. The speedup
    is dictated entirely by the ratio of HBM bandwidths between the two GPUs, not their computational
    FLOPS. To escape the memory wall, increase arithmetic intensity via larger batch sizes (e.g., continuous
    batching).
  common_mistake: Assuming the bottleneck is unoptimized CUDA kernels, CPU-to-GPU PCIe transfer overhead,
    or framework overhead, rather than recognizing the fundamental architectural limitation of the workload's
    arithmetic intensity.
  napkin_math: A100-80GB HBM Bandwidth = 2.0 TB/s. H100-80GB HBM Bandwidth = 3.35 TB/s. Memory Bandwidth
    Ratio = 3.35 / 2.0 ≈ 1.67x. Expected speedup for strictly memory-bound workloads is ~1.67x, which
    perfectly matches the observed 1.6x improvement. The 3.1x compute ratio (989/312) is unreachable at
    batch size 1 where the arithmetic intensity is 1 FLOP/byte.
