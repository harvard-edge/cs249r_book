title: Diagnosing Sublinear Inference Scaling on H100
scenario: Your team migrated a 13B parameter LLM inference service (batch size 1) from A100 to H100 GPUs. Profiling reveals per-token latency only improved by ~1.6x despite a 3x increase in TFLOPS.
question: "Why did H100 batch-1 LLM decoding improve only ~1.6x instead of >3x, and how can you escape that bottleneck?"
details:
  realistic_solution: Batch-1 decoding is strictly memory-bandwidth bound. The speedup matches the HBM bandwidth ratio. Increase batch size via continuous batching to escape the memory wall.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute kernels or PCIe transfers.
    **The Rationale:** Engineers look at peak TFLOPS and expect linear speedup.
    **The Consequence:** Wasting time optimizing compute operations on a workload starved for memory bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 HBM = 2.0 TB/s. H100 HBM = 3.35 TB/s.

    **Calculations:**
    - Bandwidth ratio = 3.35 / 2.0 = 1.675x.

    **Conclusion & Interpretation:**
    - **Result: Decoding is memory-bandwidth bound; scaling follows bandwidth (1.67x) rather than FLOPS (Memory-Bandwidth-Bound)**.
