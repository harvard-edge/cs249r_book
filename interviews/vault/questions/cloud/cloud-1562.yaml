title: Diagnosing Sublinear Inference Scaling on H100
scenario: Your team migrated a 13B parameter LLM inference service (auto-regressive decoding, batch size 1) from NVIDIA A100-80GB (2.0 TB/s bandwidth) to H100-80GB GPUs (3.35 TB/s bandwidth). The H100 boasts over 3x the FP16 dense compute of the A100 (989 TFLOPs vs 312 TFLOPs). However, profiling reveals the per-token generation latency only improved by roughly 1.6x.
question: Why did H100 batch-1 LLM decoding improve only ~1.6x instead of >3x, and how can you escape that bottleneck?
details:
  realistic_solution: Identify that batch-1 LLM token generation is strictly memory-bandwidth bound because it must load the entire model weights from HBM to SRAM for every single token generated. The speedup is dictated entirely by the ratio of HBM bandwidths between the two GPUs, not their computational FLOPS. To escape the memory wall, increase arithmetic intensity via larger batch sizes (e.g., continuous batching).
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is unoptimized CUDA kernels or PCIe transfer overhead.
    **The Rationale:** Engineers look at the peak TFLOPS rating (3x) and assume performance should scale accordingly.
    **The Consequence:** They waste time optimizing compute kernels rather than recognizing the fundamental architectural limitation of the workload's arithmetic intensity and increasing batch size.
  napkin_math: |
    - **A100 HBM Bandwidth:** 2.0 TB/s.
    - **H100 HBM Bandwidth:** 3.35 TB/s.
    - **Memory Bandwidth Ratio:** 3.35 / 2.0 ≈ 1.67x.
    - **Observed Speedup:** ~1.6x.
    - **Conclusion:** The speedup perfectly matches the bandwidth ratio because batch-1 arithmetic intensity is 1 FLOP/byte, making it purely memory-bound. The 3.1x compute ratio is unreachable at this batch size.
