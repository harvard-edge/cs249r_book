title: Optimizing Annotation Throughput on H100 for Large-Scale Dataset Curation
scenario: 'Your team is building a massive, high-quality image dataset for a new computer vision model.
  The annotation process involves human labelers, and you need to optimize the throughput and quality.
  You''re considering two annotation pipeline architectures:


  1.  **Architecture A (Centralized Inference-Assisted Labeling):** Data flows to a central service running
  an active learning model on a single NVIDIA H100 GPU (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s,
  700W) to pre-label images and suggest uncertainty scores. Labelers then correct these pre-labels.

  2.  **Architecture B (Distributed Human-in-the-Loop with Edge Inference):** Data is distributed, and
  simpler, smaller models run on edge devices (e.g., lower-spec GPUs or even CPUs) to provide initial
  suggestions, with complex uncertainty sampling done periodically on a shared H100 cluster.


  Given a target of annotating 10 million images within 3 months, each requiring an average of 5 seconds
  of human labeling time, how would you evaluate these two architectures, considering data selection,
  inter-annotator agreement, and potential dataset bias?'
question: "How would you evaluate centralized H100 labeling versus distributed edge labeling for 10M images in 3 months while preserving IAA and limiting bias?"
details:
  realistic_solution: Implement a pilot study with both architectures on a smaller subset of data. For
    Architecture A, focus on optimizing the active learning model's inference time and sample selection
    strategy on the H100 to maximize labeling efficiency. For Architecture B, design robust mechanisms
    for merging annotations, resolving conflicts, and consistently measuring inter-annotator agreement
    across distributed teams. Leverage metrics like Cohen's Kappa or Fleiss' Kappa. Implement a feedback
    loop for labeler training and calibration to mitigate bias.
  common_mistake: Overlooking the bottleneck of human annotation speed and focusing solely on model inference
    speed, or failing to account for data transfer latencies and the cost of inter-annotator agreement
    reconciliation in a distributed setup.
  napkin_math: 'Target images: 10M. Time: 3 months = 90 days. Daily images = 10M / 90 ≈ 111,111 images/day.
    Each image: 5 seconds human time. Total human hours/day = 111,111 * 5 seconds / 3600 seconds/hour
    ≈ 154 hours/day. If a human annotator works 8 hours/day, you need 154 / 8 ≈ 19 annotators working
    full-time. The H100''s FP16 throughput (989 TFLOPS) is immense; a typical CV model might take milliseconds
    per inference. If an active learning model takes 10ms per inference, an H100 can process 100 images/second
    * 3600 seconds/hour * 24 hours/day = 8.64 million inferences/day. The H100 is unlikely to be the inference
    bottleneck; the bottleneck will be data transfer, human speed, or the complexity of the active learning
    sampling strategy.'
