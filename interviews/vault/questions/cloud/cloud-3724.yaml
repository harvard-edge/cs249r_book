title: Memory Bandwidth Bottleneck Diagnosis for LLM Decode on MI300X
scenario: An MI300X (192GB HBM3, 5.3 TB/s) serving Llama-3-70B at batch_size=4 shows 95 tok/s throughput but profiling shows only 63% HBM bandwidth utilization.
question: Why is the MI300X deployment reaching only 63% HBM bandwidth at batch_size=4, and how would you investigate the gap?
details:
  realistic_solution: 'Expected throughput: 140GB / 5.3TB/s = 26.4ms per batch step; 4 tokens / 26.4ms = 151.5 tok/s theoretical at 100% HBM utilization. Achieved 95 tok/s = 62.5% efficiency, matching 63% HBM utilization. Causes: (1) Kernel launch overhead between layers — 80 layers × 2 kernel launches = 160 launches, each ~10-50µs → 1.6-8ms per 80-layer forward = significant for 3.5ms ideal forward. (2) CPU-GPU synchronization for dynamic shapes (variable seq lengths in continuous batching). (3) Attention computation at batch=4, seq=growing: attention not purely memory-bound at this batch size. (4) HBM bank conflicts or non-coalesced accesses in custom kernels. Investigation: ROCm rocprof, measure per-kernel bandwidth.'
  common_mistake: |
    **The Pitfall:** Assuming low bandwidth utilization means the workload is compute-bound.
    **The Rationale:** Engineers see 63% BW utilization and assume they hit a compute ceiling, ignoring launch overheads and inefficiencies.
    **The Consequence:** Teams waste time optimizing tensor cores when the real issue is CPU-GPU sync or kernel launch latency.
  napkin_math: |
    *   **Ideal Read Time:** 140 GB weights / 5.3 TB/s = 26.4 ms to read all weights for one decode step.
    *   **Ideal Throughput:** 4 tokens (batch size) / 26.4 ms = 151.5 tok/s at 100% utilization.
    *   **Achieved Efficiency:** 95 tok/s actual / 151.5 tok/s ideal = 62.7%.
    *   **Lost Throughput:** 151.5 - 95.0 = 56.5 tok/s lost to overhead.
    *   **Kernel Launch Overhead:** 80 layers × 50µs = 4.0 ms per step.
    *   **Conclusion:** **The 4.0ms launch overhead is significant compared to the 26.4ms ideal compute time, explaining the utilization gap.**
