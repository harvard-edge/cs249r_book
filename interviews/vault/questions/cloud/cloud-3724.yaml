math_issues:
- Throughput calculation incorrectly multiplies the single-batch read time by the
  batch size. 140GB / 5.3TB/s = 26.4ms to process all 4 tokens. Throughput should
  be 4 tokens / 26.4ms = 151 tok/s, not based on 105.7ms.
