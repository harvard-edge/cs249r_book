title: Embedding Feature Serving at Scale
scenario: Your feature store needs to serve 768-dimensional embedding vectors as features for 50M entities. Each embedding is FP32. The online store must handle 20K QPS with p99 < 5ms.
question: Can Redis handle this workload, and what are the alternatives if not?
details:
  realistic_solution: Redis struggles with large values. A 3 KB MGET for 100 embeddings transfers 300 KB per request. At 20K QPS, that is 6 GB/s of Redis network throughput, far exceeding most instances' 10Gbps NIC. Solutions include quantizing embeddings to INT8 or using a dedicated GPU-accelerated vector store.
  common_mistake: |
    **The Pitfall:** Treating high-dimensional embeddings like scalar features and storing them as-is in Redis.
    **The Rationale:** It is the standard operational approach for traditional tabular ML feature stores.
    **The Consequence:** Redis network bandwidth is vastly exceeded instantly, causing massive packet drops and serving failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50M entities, 768-dim FP32 (3 KB each).
    - Serving requirements: 20K QPS, batches of 100 embeddings/req.
    - Standard 10 Gbps NIC limit: ~1.25 GB/s.

    **Calculations:**
    - FP32 Network Throughput = 100 * 3 KB * 20K QPS = 6 GB/s.
    - FP32 Storage = 50M * 3 KB = 150 GB.
    - INT8 Storage = 50M * 768 bytes = 38.4 GB.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound.** Network demand of 6 GB/s easily crushes the 1.25 GB/s NIC. Loading INT8 into GPU HBM provides the highest throughput and bypasses the network.
