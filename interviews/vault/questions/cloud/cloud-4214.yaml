title: Embedding Feature Serving at Scale
scenario: Your feature store needs to serve 768-dimensional embedding vectors as features for 50M entities. Each embedding is FP32 (3,072 bytes). The online store must handle 20K QPS with p99 < 5ms.
question: "Can Redis handle this workload, and what are the alternatives if not?"
details:
  realistic_solution: 'Redis struggles with large values. A 3 KB MGET for 100 embeddings transfers 300 KB per request — at 20K QPS, that''s 6 GB/s of Redis network throughput, exceeding most instances'' 10Gbps NIC (1.25 GB/s). Solutions: (1) Quantize embeddings to INT8: 768 bytes/embedding, 4× reduction → 38.4 GB storage, 1.5 GB/s throughput. Still tight. (2) Use a dedicated vector store (Milvus, Pinecone) with GPU-accelerated serving — these are optimized for embedding retrieval with batching and compression. (3) Reduce dimensionality via PCA to 256 dimensions (if downstream model tolerates it): 1 KB/embedding in FP32, or 256 bytes in INT8. (4) For highest throughput: load embeddings on GPU HBM — A100 80 GB fits 50M × 768 × 1 byte (INT8) = 38.4 GB with room for the model.'
  common_mistake: |
    **The Pitfall:** Treating embeddings like scalar features and storing them as-is in Redis.
    **The Rationale:** It is the standard approach for traditional tabular ML features.
    **The Consequence:** Redis memory limits and network bandwidth are vastly exceeded, causing serving failures.
  napkin_math: |
    - FP32 Network: 100 embeddings/req * 3 KB * 20K QPS = 6 GB/s (exceeds 10Gbps NIC).
    - FP32 Storage: 50M * 3 KB = 153.6 GB (exceeds single-node Redis).
    - INT8 Storage: 50M * 768 bytes = 38.4 GB.
    - **Loading INT8 embeddings into GPU HBM provides the highest throughput (0.1ms lookup) and completely bypasses the network bottleneck.**
