title: Feature Store Versioning for Safe Model Rollouts
scenario: You are rolling out a new version of your recommendation model that requires 3 new features
  not present in the current online feature store. The rollout will be gradual (1% → 10% → 100% over 3
  days). Old model must keep running for the 99% not yet migrated. Design a feature versioning strategy
  that supports concurrent model versions without breaking either.
details:
  realistic_solution: 'Use namespaced feature keys: prefix new features with model version (e.g., `v2:user_embedding_dim512`
    vs `v1:user_embedding_dim256`). Store both in the same Redis cluster, served by the feature server
    which routes based on the model version tag in the request context. After 100% rollout, run a TTL-based
    cleanup job to expire v1 features. Maintain a feature registry (e.g., Feast or Tecton) as the source
    of truth for feature-model compatibility.'
  common_mistake: Adding new features directly to the existing feature namespace, causing the old model
    to receive unexpected feature keys and potentially crashing. Or maintaining two completely separate
    Redis clusters for old and new features, doubling operational overhead.
  napkin_math: 'Dual feature storage overhead: 3 new features × 100M users × 8 bytes/feature = 2.4 GB
    additional Redis memory. Total feature store with versioning: existing ~50 GB + 2.4 GB = 52.4 GB.
    Redis instance size: r6g.4xlarge (128 GB RAM) has headroom. Serving overhead: feature server must
    check model version per request (1 µs lookup from in-process hash map). At 50K RPS: 50 ms/request
    of version routing = 50K × 0.001ms = 50ms total, negligible.'
