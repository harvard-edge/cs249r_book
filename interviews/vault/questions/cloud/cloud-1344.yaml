title: Diagnosing High Latency in gRPC Tensor Transfers
scenario: 'A production recommender system uses a dual-service architecture: a fast feature store fetches
  1,000 candidate items (each with 512 FP32 features) and sends them to a GPU-backed Triton Inference
  Server. Over HTTP/REST with JSON, the transfer and serialization overhead is 20ms. You migrate to gRPC
  with Protocol Buffers to reduce this overhead, but observe the transfer and serialization time only
  drops to 8ms, still far above the 1ms theoretical network transit time on your 10 Gbps VPC. Analyze
  the bottleneck.'
details:
  realistic_solution: Identify that mapping 512,000 individual floats into a standard repeated Protocol
    Buffer field incurs significant CPU serialization/deserialization overhead. The correct approach is
    to serialize the entire tensor into a single raw `bytes` field in the protobuf schema, enabling near
    zero-copy memory mapping on the receiving end.
  common_mistake: Assuming that using gRPC automatically guarantees zero-copy serialization and optimal
    network speed, or blaming HTTP/2 head-of-line blocking for the latency without analyzing CPU serialization
    time.
  napkin_math: 'Tensor size: 1,000 * 512 * 4 bytes = ~2 MB. Network transit at 10 Gbps (1.25 GB/s) = 2
    MB / 1.25 GB/s = 1.6ms. CPU overhead for standard protobuf repeated float parsing (typically ~5-10ms
    per million elements) accounts for the remaining ~6ms gap. Sending as raw `bytes` reduces serialization
    to <0.1ms.'
