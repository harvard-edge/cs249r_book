title: RDMA QP (Queue Pair) Scalability Limits on Large H100 Clusters
scenario: An RDMA-based AllReduce library on a 1024-H100 cluster creates one Queue Pair per peer connection.
  The HCA reports QP creation failures at job startup. Diagnose the scalability issue and propose solutions
  for large-scale RDMA deployments.
details:
  realistic_solution: 'With N=1024 GPUs, all-to-all QPs: 1024×1023/2 ≈ 524K QPs total, 1023 QPs per GPU.
    Mellanox ConnectX-6 HDR supports ~4M QPs total but memory: each QP requires ~512 bytes HCA memory
    → 524K×512B=268MB per HCA. More critical: HCA cache for active QPs is typically 1K-4K. With 1023 active
    QPs, cache misses dominate. Fix: (1) Shared Receive Queue (SRQ): single receive buffer pool, O(N)
    not O(N²). (2) RC→UD transport: Unreliable Datagram uses one QP for all destinations. (3) Connection
    reuse: connect only to ring neighbors (2 QPs per GPU for ring AllReduce). For ring AllReduce: 2 QPs
    per GPU regardless of cluster size. Switching from all-to-all QPs to ring-only: 1023 QPs → 2 QPs.
    Startup time: O(1) vs O(N).'
  common_mistake: Not recognizing that RDMA QP count scales as O(N²) for all-to-all connectivity; assuming
    HCA can handle unlimited QPs.
  napkin_math: 'All-to-all QPs: N=1024, QPs per node=1023. Each QP: 256B send WR + 256B recv WR = 512B.
    1023 QPs = 511KB per node. HCA SRAM: 4MB → 511KB/4MB=12.8% of HCA memory for QPs. Ring-only: 2 QPs
    × 512B = 1KB. 511× fewer QPs → QP connection setup: N × 1023 × connection_time. NCCL solution: use
    fewer QPs with virtual channels.'
