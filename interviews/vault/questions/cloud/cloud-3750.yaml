title: TPU Pod Power Budgeting vs GPU Clusters
scenario: You are comparing the power efficiency of a TPU v5e pod (256 chips, ~200W each) versus a cluster of 32 MI300X GPUs (750W TDP each) for a large-scale training job. Both configurations deliver comparable aggregate TFLOPS for your BF16 workload.
question: Which cluster is more power-efficient, and what architectural decisions drive the difference?
details:
  realistic_solution: 'TPU v5e pod: 256 × 200W = 51.2 kW for compute. ICI (Inter-Core Interconnect) networking is integrated on-die, adding minimal extra power. Total ~55 kW. Aggregate BF16: 256 × 197 TFLOPS = ~50.4 PFLOPS. Efficiency: ~916 TFLOPS/kW. MI300X cluster: 32 × 750W = 24 kW GPU + ~4 kW for InfiniBand switches + ~2 kW host CPUs = ~30 kW. Aggregate FP16: 32 × 1307 TFLOPS = ~41.8 PFLOPS. Efficiency: ~1393 TFLOPS/kW. The MI300X wins on raw TFLOPS/watt, but TPU v5e''s strength is in utilization — Google''s compiler (XLA) achieves 50-60% MFU vs typical 35-45% MFU on GPU clusters. Effective efficiency must account for actual utilization, not peak specs.'
  common_mistake: |
    **The Pitfall:** Comparing raw TDP without normalizing to useful TFLOPS delivered.
    **The Rationale:** Engineers often ignore Model FLOPs Utilization (MFU) and forget that GPU clusters require separate, power-hungry InfiniBand switches, while TPUs have integrated ICI networking.
    **The Consequence:** Miscalculating actual datacenter power requirements and drawing incorrect conclusions about workload efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TPU v5e Pod: 256 chips * 200W, 50.4 PFLOPS peak, 55% MFU.
       - MI300X Cluster: 32 GPUs * 750W + 6kW overhead, 41.8 PFLOPS peak, 40% MFU.
    2. **Calculations:**
       - TPU v5e Power: ~55 kW. Peak Efficiency: 50.4 / 55 = 916 TFLOPS/kW.
       - MI300X Power: 30 kW. Peak Efficiency: 41.8 / 30 = 1393 TFLOPS/kW.
       - Effective TPU Efficiency: 916 * 0.55 = 504 TFLOPS/kW.
       - Effective MI300X Efficiency: 1393 * 0.40 = 557 TFLOPS/kW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound. MFU normalizes the massive gap in raw peak efficiency.**
