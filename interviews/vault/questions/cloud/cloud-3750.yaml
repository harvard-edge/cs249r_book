title: TPU Pod Power Budgeting vs GPU Clusters
scenario: You are comparing the power efficiency of a TPU v5e pod (256 chips, ~200W
  each) versus a cluster of 32× MI300X GPUs (750W TDP each) for a large-scale training
  job. Both configurations deliver comparable aggregate TFLOPS for your BF16 workload.
  Which cluster is more power-efficient, and what architectural decisions drive the
  difference?
question: Which cluster is more power-efficient, and what architectural decisions
  drive the difference?
details:
  realistic_solution: 'TPU v5e pod: 256 × 200W = 51.2 kW for compute. ICI (Inter-Core
    Interconnect) networking is integrated on-die, adding minimal extra power. Total
    ~55 kW. Aggregate BF16: 256 × 197 TFLOPS = ~50.4 PFLOPS. Efficiency: ~916 TFLOPS/kW.
    MI300X cluster: 32 × 750W = 24 kW GPU + ~4 kW for InfiniBand switches + ~2 kW
    host CPUs = ~30 kW. Aggregate FP16: 32 × 1307 TFLOPS = ~41.8 PFLOPS. Efficiency:
    ~1393 TFLOPS/kW. The MI300X wins on raw TFLOPS/watt, but TPU v5e''s strength is
    in utilization — Google''s compiler (XLA) achieves 50-60% MFU vs typical 35-45%
    MFU on GPU clusters. Effective efficiency must account for actual utilization,
    not peak specs.'
  common_mistake: Comparing raw TDP without normalizing to useful TFLOPS delivered.
    Also ignoring that TPU v5e's lower per-chip power includes the network (ICI) while
    GPU clusters need separate InfiniBand switches drawing additional power.
  napkin_math: 'TPU v5e pod: 50.4 PFLOPS / 55 kW = 916 TFLOPS/kW peak. MI300X cluster:
    41.8 PFLOPS / 30 kW = 1393 TFLOPS/kW peak. At 55% vs 40% MFU: TPU effective =
    504 TFLOPS/kW, MI300X effective = 557 TFLOPS/kW. Gap narrows significantly.'
