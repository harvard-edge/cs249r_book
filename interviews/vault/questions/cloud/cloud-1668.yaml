title: LLM Training Region Carbon Footprint Evaluation
scenario: You must run a 30-day training job on 1,024 H100 GPUs (1 kW per GPU) with a strict carbon budget of 50 metric tons of CO2eq. Region A (us-east) has 400 gCO2eq/kWh, 1.2 PUE, costing $2/GPU/hr. Region B (europe-north) has 20 gCO2eq/kWh, 1.1 PUE, costing $3/GPU/hr.
question: Which region must you choose to stay under the 50-ton CO2 budget, and what is the financial trade-off?
details:
  realistic_solution: Calculate the total facility energy (Compute Energy × PUE), then multiply by the regional grid carbon intensity. Region A generates ~354 metric tons of CO2eq, vastly exceeding the budget. Region B generates ~16 metric tons. The team must select Region B to meet the 50-ton SLA, justifying the additional $737,280 in compute costs as a necessary expense for sustainability compliance.
  common_mistake: |
    **The Pitfall:** Calculating carbon emissions based solely on baseline GPU power consumption.
    **The Rationale:** Teams forget to multiply the base energy by the datacenter's PUE, missing the massive overhead of cooling and infrastructure.
    **The Consequence:** Carbon budgets are severely breached, leading to failed sustainability compliance and potential regulatory penalties.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,024 GPUs at 1 kW each for 30 days (720 hours).
       - Budget: 50 metric tons CO2eq.
       - Region A: 400 gCO2eq/kWh, 1.2 PUE, $2/hr.
       - Region B: 20 gCO2eq/kWh, 1.1 PUE, $3/hr.
    2. **Calculations:**
       - Compute Energy = 1,024 kW * 720 hours = 737,280 kWh = 737.3 MWh.
       - Region A Carbon = 737.3 MWh * 1.2 PUE * 0.4 tCO2eq/MWh = 353.9 metric tons.
       - Region B Carbon = 737.3 MWh * 1.1 PUE * 0.02 tCO2eq/MWh = 16.2 metric tons.
       - Cost Delta = 1,024 GPUs * 720h * $1/hr difference = $737,280.
    3. **Conclusion & Interpretation:**
       - Region B meets the SLA at an additional cost of $737,280.
       - **Result: Sustainability Compliance Premium ($737,280)**
