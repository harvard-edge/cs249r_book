title: LLM Training Region Carbon Footprint Evaluation
scenario: 'Your team is training a 70B parameter LLM on a cluster of 1,024 H100 GPUs (assume 1 kW system-level
  power per GPU) for 30 days. You have a strict operational carbon budget of 50 metric tons of CO2eq for
  this run. You must choose between two cloud regions: Region A (us-east) offers a carbon intensity of
  400 gCO2eq/kWh, a PUE of 1.2, and compute costs of $2/GPU/hr. Region B (europe-north) relies on hydropower
  with a carbon intensity of 20 gCO2eq/kWh, a PUE of 1.1, and costs $3/GPU/hr. Evaluate which region to
  select, justifying the trade-off between financial cost and environmental compliance.'
details:
  realistic_solution: Calculate the total facility energy (Compute Energy × PUE), then multiply by the
    regional grid carbon intensity. Region A generates ~354 metric tons of CO2eq, vastly exceeding the
    budget. Region B generates ~16 metric tons. The team must select Region B to meet the 50-ton SLA,
    justifying the additional $737,280 in compute costs as a necessary expense for sustainability compliance.
  common_mistake: Candidates often only calculate the baseline GPU TDP power, forgetting to factor in
    data center PUE (Power Usage Effectiveness) and host system overhead, leading to severely underestimated
    total energy and carbon figures.
  napkin_math: Base Power = 1,024 GPUs * 1 kW = 1,024 kW. Duration = 30 days * 24h = 720 hours. Compute
    Energy = 1,024 kW * 720h = 737,280 kWh (737.3 MWh). Region A Carbon = 737.3 MWh * 1.2 PUE * 0.4 tCO2eq/MWh
    = 353.9 metric tons. Region B Carbon = 737.3 MWh * 1.1 PUE * 0.02 tCO2eq/MWh = 16.2 metric tons. Cost
    Difference = 1,024 GPUs * 720h * $1/hr = $737,280. Region B meets the SLA.
