title: W4A16 Quantization Throughput Gains in Memory Bound Regimes
scenario: Serving a 120B parameter LLM on a single MI300X. At FP16, the weights take
  240 GB, exceeding the 192 GB memory. You apply W4A16 (INT4 weights, FP16 activations)
  group-wise quantization.
question: Analyze why generation throughput (tokens/sec) at batch size 1 drastically
  increases with W4A16 despite the added compute overhead of dequantizing weights
  to FP16.
details:
  realistic_solution: At batch size 1, autoregressive generation is heavily memory
    bandwidth bound, not compute bound. Reading INT4 weights requires only 0.5 bytes
    per parameter, effectively quadrupling the memory bandwidth efficiency. The compute
    overhead of dequantizing from INT4 to FP16 in registers is completely hidden by
    the massive reduction in memory fetch latency.
  common_mistake: Assuming that the extra dequantization math slows down the forward
    pass, fundamentally misunderstanding the memory wall in batch=1 inference.
  napkin_math: 120B * 0.5 bytes = 60 GB memory traffic vs 240 GB.
