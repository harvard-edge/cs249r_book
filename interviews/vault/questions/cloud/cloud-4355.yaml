title: 'Carbon Cost Per Inference: INT8 vs FP16 Serving Comparison'
scenario: A serving team is choosing between FP16 and INT8 for a 13B model inference
  endpoint. FP16 on a single H100 achieves 450 tokens/sec at 450W active power. INT8
  achieves 820 tokens/sec at 420W. The endpoint serves 50B tokens/day on a 200 gCO2e/kWh
  grid with PUE=1.15. Calculate carbon per 1M tokens for each configuration and the
  annual carbon savings from switching to INT8.
question: What is the carbon per 1M tokens for FP16 versus INT8 13B inference, and
  how much annual carbon does INT8 save at 50B tokens/day?
details:
  realistic_solution: 'Carbon per token calculation: FP16: power = 450W, throughput
    = 450 tok/sec. Energy per token = 450W / 450 tok/sec = 1.0 J/token. With PUE 1.15:
    1.15 J/token. Carbon: 1.15 J × (200 gCO2e/kWh) × (1 kWh/3,600,000 J) = 1.15 ×
    5.56e-5 gCO2e = 6.39e-5 gCO2e/token = 63.9 gCO2e/1M tokens. INT8: 420W / 820 tok/sec
    = 0.512 J/token × 1.15 PUE = 0.589 J/token. Carbon: 0.589 × 5.56e-5 = 3.27e-5
    gCO2e/token = 32.7 gCO2e/1M tokens. Savings: 31.2 gCO2e/1M tokens (49% reduction).
    Annual: 50B tokens/day × 365 days × 31.2e-6 kgCO2e/token = 569,880 kgCO2e ≈ 570
    tCO2e/year saved.'
  common_mistake: Assuming that lower power (420W vs 450W) is the primary driver of
    carbon savings. The throughput gain (82% more tokens per watt) is far more important
    than the 6.7% power reduction — carbon per token depends on tokens per joule,
    not watts alone.
  napkin_math: 'FP16: 1.0 J/tok × 1.15 PUE = 1.15 J/tok → 1.15/3,600,000 kWh/tok ×
    200g/kWh = 6.4e-5 gCO2e/tok = 64 gCO2e/1M tok. INT8: 0.512 J/tok × 1.15 = 0.589
    J/tok → 3.27e-5 gCO2e/tok = 32.7 gCO2e/1M tok. Annual delta: (64-32.7) × 50B/1M
    × 365 = 31.3 × 50,000 × 365 = 571M gCO2e = 571 tCO2e/year. At $50/tonne: $28,550/year
    carbon cost savings. GPU count reduction: at 50B tok/day, FP16 needs 50B/(450×86400)
    = 1.29 H100s → 2 GPUs. INT8: 50B/(820×86400) = 0.71 H100s → 1 GPU. INT8 halves
    hardware requirement, doubling the cost-carbon benefit.'
