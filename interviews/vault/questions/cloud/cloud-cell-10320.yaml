title: 'Evaluating PUE Measurement Methodologies: Instantaneous vs. Annual'
scenario: Two datacenter vendors quote PUE for hosting your H100 cluster. Vendor A claims PUE 1.2 (measured
  instantaneously on their best day in January with free-air cooling active). Vendor B claims PUE 1.45
  (annual average, ISO/IEC 30134-2 methodology). Your procurement team wants to choose Vendor A based
  on the lower number. Evaluate which quote is more meaningful and why.
details:
  realistic_solution: The Green Grid and ISO/IEC 30134-2 define PUEannual as total annual facility kWh
    divided by total annual IT kWh — the only methodology that captures seasonal variation, cooling system
    ramp-up during summer, and cooling efficiency at varying partial loads. Vendor A's instantaneous PUE
    1.2 measured in January in a cold climate is irrelevant to summer operations when cooling loads increase
    2–3× and compressors must run. Vendor B's PUEannual 1.45, if measured per ISO standard with full audit
    trail, is more trustworthy. Request annual PUE with at minimum quarterly breakdowns, cooling system
    efficiency curves (kW cooling / kW IT), and power train diagrams. Also request Uptime Institute Tier
    certification and third-party audit.
  common_mistake: Comparing PUE numbers without understanding measurement methodology; instantaneous PUE
    during ideal conditions is cherry-picked and often 30–50% lower than annual average PUE due to seasonal
    cooling load variation.
  napkin_math: '512 H100 × 700 W = 358.4 kW IT load. Annual energy at Vendor A PUE 1.2: 358.4 × 1.2 ×
    8,760 = 3,767,501 kWh. At Vendor B PUE 1.45: 358.4 × 1.45 × 8,760 = 4,551,666 kWh. Delta: 787,391
    kWh/yr × $0.09/kWh = $70,865/yr cost difference. But if Vendor A''s actual annual PUE is 1.5 (not
    1.2), the ''cheaper'' vendor costs $96K/yr more — making rigorous methodology worth the diligence.'
