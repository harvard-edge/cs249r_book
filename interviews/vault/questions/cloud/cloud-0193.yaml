title: The Blackwell Disappointment
scenario: You are the Staff ML Systems Engineer leading the serving infrastructure team at a major AI provider. Your company just deployed its first large cluster of B200 GPUs, intending to replace an existing A100-based stack. The primary goal is a 3x reduction in cost-per-million-tokens for your flagship multi-tenant LLM product, which serves thousands of customer fine-tuned models ranging from 7B to 70B parameters.
question: How would you diagnose and redesign the B200 serving stack to achieve a 3x cost-per-token reduction without latency regressions?
details:
  realistic_solution: The core insight is that simply swapping hardware is not enough; the entire software and serving strategy must be co-designed with the hardware's characteristics. The latency regression suggests the B200's massive compute potential is being starved. This is likely because the existing software stack, highly optimized for A100, is falling back to generic, un-optimized kernels on the new architecture. For latency-sensitive workloads with small batches, fixed overheads (like kernel launches) and non-fused memory-bound operations now dominate the execution time because the pure compute part has shrunk so dramatically.
  common_mistake: |
    **The Pitfall:** Blaming the hardware for latency regressions or looking for a single silver bullet (like upgrading the CUDA driver or using FP4).
    **The Rationale:** Assuming the B200 is just a "faster A100" without realizing its architectural changes (compute drastically outstripping memory bandwidth scaling) shift the system bottleneck.
    **The Consequence:** Failing to redesign the software stack (e.g., speculative decoding, aggressive kernel fusion) to fully exploit the new hardware, leaving massive compute potential stranded.
  napkin_math: |
    *   **Speculative Decoding Setup:** A draft model (1B) generates 5 tokens, while the target model (70B) verifies in parallel.
    *   **Memory-Bound Decode (70B):** On a B200 (8.0 TB/s), a single memory-bound decode step takes $140 \text{ GB} / 8.0 \text{ TB/s} = 17.5 \text{ ms}$.
    *   **Parallel Verification:** Verifying 5 tokens in parallel also takes approximately 17.5ms (since it's a single forward pass).
    *   **Acceptance Rate:** If the average acceptance is 3 tokens, the time per accepted token is $17.5 \text{ ms} / 3 = 5.8 \text{ ms}$.
    *   **Autoregressive Baseline:** Without speculative decoding, each token takes 17.5ms.
    *   **Speedup:** $17.5 \text{ ms} / 5.8 \text{ ms} =$ **3x speedup**, lowering cost proportionally.
