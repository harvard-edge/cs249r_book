title: The Blackwell Disappointment
scenario: 'You are the Staff ML Systems Engineer leading the serving infrastructure team at a major AI provider. Your company just deployed its first large cluster of B200 GPUs, intending to replace an existing A100-based stack. The primary goal is a 3x reduction in cost-per-million-tokens for your flagship multi-tenant LLM product.'
question: 'How would you diagnose and redesign the serving stack to achieve a 3x cost-per-token reduction without latency regressions?'
details:
  realistic_solution: 'The B200 architecture radically scales FLOPs far beyond memory bandwidth, shifting the Iron Law bottleneck. Legacy serving software designed for A100s will experience severe memory-bound latency regressions on small batches. To achieve the 3x cost reduction, deploy aggressive Speculative Decoding utilizing a fast draft model. This utilizes the B200''s massive compute surplus to run parallel target verification, perfectly transforming memory-bound autoregressive decoding into dense compute-bound matrix operations.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware for latency regressions or looking for a single silver bullet.
    **The Rationale:** Assuming the B200 is just a "faster A100" without realizing its architectural changes (compute drastically outstripping memory bandwidth scaling) shift the system bottleneck.
    **The Consequence:** Failing to redesign the software stack (e.g., speculative decoding, aggressive kernel fusion) to fully exploit the new hardware, leaving massive compute potential stranded.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B target model memory-bound step takes 17.5ms on B200 (8 TB/s bandwidth).
    - Draft model generates 5 tokens; target model verifies 5 tokens in parallel (also 17.5ms).
    - Average acceptance: 3 tokens per verification pass.

    **Calculations:**
    - Autoregressive baseline: 3 tokens * 17.5ms = 52.5ms.
    - Speculative decoding: 1 verification pass (17.5ms) yields 3 accepted tokens.
    - Time per accepted token = 17.5ms / 3 = 5.8ms.

    **Conclusion & Interpretation:**
    - **Result: 5.8ms vs 17.5ms per token (Compute-Bound)**. Compute-Bound mitigation. Speculative decoding speeds up latency by 3x (17.5ms -> 5.8ms), proportionally lowering cost.
