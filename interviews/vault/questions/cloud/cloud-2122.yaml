title: Exploiting Activation Sparsity in FFN Layers
scenario: Research shows that ReLU-based transformer FFN layers exhibit ~90% activation sparsity (90%
  of intermediate activations are zero after ReLU). A team proposes skipping the second matrix multiply
  for zero-valued rows to achieve near-10x speedup. Evaluate this proposal, identifying both the theoretical
  opportunity and the hardware obstacles.
question: "Will 90% ReLU activation sparsity yield a near-10x FFN speedup by skipping zero rows, and what hardware obstacles limit it?"
details:
  realistic_solution: 'Theoretical opportunity: if 90% of intermediate activations are zero after ReLU,
    then 90% of the second matmul (down projection) rows contribute nothing to the output. Skipping them
    would reduce FLOPs by ~90%, suggesting 10x speedup. Hardware reality: NVIDIA Tensor Cores operate
    on dense 16x16 tiles. Skipping individual zero rows requires either: (1) Structured N:M sparsity (e.g.,
    2:4 sparsity on A100/H100): only 2x speedup, requires specific 50% sparsity pattern, not the unstructured
    90% pattern we have. (2) Sparse matrix multiplication (cuSPARSE): only faster than dense when sparsity
    >95-99%, due to index overhead and poor Tensor Core utilization. (3) Custom kernels that compact non-zero
    rows before the matmul: adds compaction overhead (gather/scatter), typically breaks even at ~85% sparsity
    on H100. Practical speedup with current hardware: 1.5-2x (not 10x). This is why newer architectures
    use SwiGLU/GELU instead of ReLU -- they sacrifice sparsity for consistent Tensor Core utilization.'
  common_mistake: Assuming that algorithmic sparsity translates directly to hardware speedup. Unstructured
    sparsity on dense Tensor Cores yields zero speedup without specialized sparse hardware or software
    support.
  napkin_math: '90% sparse FFN: 10% of rows are nonzero. Dense Tensor Core matmul: 0% savings. 2:4 structured
    sparse: 2x (requires 50% pattern, not 90% unstructured). Custom compact kernel: 1.5-2x after gather/scatter
    overhead. Gap between algorithmic opportunity (10x) and hardware reality (1.5-2x) = 5-7x left on the
    table.'
