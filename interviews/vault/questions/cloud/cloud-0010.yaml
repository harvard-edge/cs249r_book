title: The Geographic Skew Tax
scenario: 'Your offline training pipeline pulls raw logs from archival storage located in a different country, while your online serving uses a local NVMe SSD feature store.'
question: 'How much slower is a single read from the cross-country archive compared to the local SSD?'
details:
  realistic_solution: 'A cross-country fiber round-trip takes ~40ms, while a local NVMe read takes ~100us. The archive is 400x slower.'
  common_mistake: |
    **The Pitfall:** Underestimating the speed-of-light penalty for WANs.
    **The Rationale:** Engineers guess WANs are 10-50x slower, failing to realize physical distance creates a hard floor.
    **The Consequence:** Architecting cross-region data pipelines that completely fail latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cross-Country RTT: ~40 ms.
       - Local NVMe Read: ~100 us.
    2. **Calculations:**
       - Latency Ratio: 40,000 us / 100 us = 400.
    3. **Conclusion & Interpretation:**
       - **Result: 400x slower.**
       - **Conclusion: Distance-Bound; speed of light mandates data locality for real-time inference.**