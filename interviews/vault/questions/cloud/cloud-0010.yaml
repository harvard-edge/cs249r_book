title: The Geographic Skew Tax
scenario: 'You''re debugging a production model and suspect training-serving skew. Your offline training pipeline pulls raw logs from a cheap archival storage system located in a different country, while your online serving system uses a feature store running on local NVMe SSDs.'
question: 'To quantify the data access bottleneck, state the approximate latency difference: how much slower is a single read from the cross-country archive compared to the local SSD?'
details:
  realistic_solution: 'A read from the cross-country archive is approximately 400 times slower. A cross-country fiber round-trip takes about 40ms, while a local NVMe SSD read is about 100µs. The difference is a factor of 400, highlighting a massive potential source of training-serving skew if data preprocessing differs.'
  common_mistake: |
    **The Pitfall:** Underestimating the speed-of-light penalty for wide-area networks (WANs).
    **The Rationale:** Engineers might intuitively guess WANs are 10-50x slower, failing to realize physical distance creates a hard floor on latency.
    **The Consequence:** Building cross-region architectures that hopelessly fail latency SLAs.
  napkin_math: |
    1. Cross-Country Fiber RTT: ~40,000,000 ns (40 ms).
    2. Local NVMe SSD Read: ~100,000 ns (100 µs).
    3. **Latency Difference: 40,000,000 / 100,000 = 400x slower.**
  options:
  - ~4x slower
  - ~40x slower
  - ~400x slower
  - ~4,000x slower
  correct_index: 2
