title: Single-Flow ECMP Hashing Bottleneck
scenario: You are deploying a distributed training job for a large language model across 64 A100 GPUs.
  The cluster uses a leaf-spine network topology with 4 spine switches, providing 400 Gbps aggregate uplink
  bandwidth per leaf (via four 100 Gbps links). The communication backend relies on a single TCP connection
  per node pair for gradient synchronization. During a large AllReduce operation, you observe that individual
  node-to-node transfers peak at exactly 100 Gbps, leaving 75% of the aggregate uplink bandwidth unused.
  Calculate the maximum utilization and diagnose the routing protocol bottleneck.
details:
  realistic_solution: Recognize that Equal-Cost Multi-Path (ECMP) routing hashes the 5-tuple (Source IP,
    Dest IP, Protocol, Source Port, Dest Port) of a packet to assign it to a fixed path, preventing packet
    reordering. A single TCP connection has a static 5-tuple and is constrained to a single 100 Gbps link.
    To achieve 400 Gbps, the application must use flow multiplexing (e.g., establishing at least 4 TCP
    sockets with varying ports) to generate different hashes across the 4 paths.
  common_mistake: Candidates often assume that the network fabric automatically sprays packets across
    all available uplinks (packet-level load balancing), expecting the single flow to utilize the full
    400 Gbps aggregate bandwidth.
  napkin_math: Flow Hash = Hash(SrcIP, DstIP, Protocol, SrcPort, DstPort) % 4 paths. Since all packets
    in the single TCP flow share the same 5-tuple, they hash to 1 path. Effective Bandwidth = 1 path *
    100 Gbps = 100 Gbps. Peak Utilization = 100 Gbps / 400 Gbps = 25%.
