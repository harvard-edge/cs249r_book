title: Single-Flow ECMP Hashing Bottleneck
scenario: You are deploying a distributed training job for a large language model across 64 A100 GPUs. The cluster uses a leaf-spine network topology with 4 spine switches, providing 400 Gbps aggregate uplink bandwidth per leaf. The communication backend relies on a single TCP connection per node pair. During a large AllReduce operation, individual node-to-node transfers peak at exactly 100 Gbps.
question: What is the max uplink utilization, what routing behavior causes the 100Gbps cap, and how would you fix it?
details:
  realistic_solution: Recognize that Equal-Cost Multi-Path (ECMP) routing hashes the 5-tuple (Source IP, Dest IP, Protocol, Source Port, Dest Port) of a packet to assign it to a fixed path, preventing packet reordering. A single TCP connection has a static 5-tuple and is constrained to a single 100 Gbps link. To achieve 400 Gbps, the application must use flow multiplexing (e.g., establishing at least 4 TCP sockets with varying ports) to generate different hashes across the 4 paths.
  common_mistake: |
    **The Pitfall:** Assuming the network fabric automatically load balances single flows across all available uplinks.
    **The Rationale:** Candidates confuse packet-level load balancing with Equal-Cost Multi-Path (ECMP) routing, which hashes by flow.
    **The Consequence:** Leaving 75% of expensive networking hardware unutilized during critical training jobs.
  napkin_math: |
    - 1. Identify ECMP hashing: Hash(SrcIP, DstIP, Protocol, SrcPort, DstPort) % 4 paths.
    - 2. Analyze flow behavior: A single TCP connection shares the exact same 5-tuple, mapping all packets to exactly 1 path.
    - 3. Calculate effective bandwidth: 1 path * 100 Gbps = 100 Gbps.
    - 4. Calculate peak utilization: 100 Gbps / 400 Gbps = **25% utilization**. (Requires multi-pathing or multiple TCP sockets to fix).
