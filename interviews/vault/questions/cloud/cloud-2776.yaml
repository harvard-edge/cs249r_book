title: Adversarial Defense Selection
scenario: 'Your fraud detection model faces adversarial evasion attacks. Attackers modify transaction features within realistic bounds. Options: (A) PGD adversarial training (4x compute cost), (B) input feature anomaly detection, (C) ensemble of diverse model architectures with disagreement-based rejection.'
question: Which defenses should you use against structured-feature evasion attacks in production fraud detection, and why?
details:
  realistic_solution: 'Option A (PGD adversarial training): Designed for continuous image perturbations. Transaction features are often discrete (merchant category) or constrained (amount must be positive, timing must be realistic). PGD-generated adversarial examples may not respect these constraints, training on unrealistic perturbations. Less effective for structured data. Cost: 4x compute. Option B (input anomaly detection): Flag transactions whose feature combinations are unusual, regardless of model prediction. Catches adversarial modifications that create unrealistic feature combinations (e.g., $0.01 amount at a luxury retailer). Cheap to implement. But sophisticated attackers can stay within normal feature ranges. Option C (diverse ensemble + disagreement): Train models with different architectures (gradient boosting, neural network, logistic regression). Adversarial perturbations optimized against one architecture are less likely to transfer across diverse model families. High disagreement triggers rejection. Most robust for structured data because it does not assume specific attack geometry. Recommendation: C + B. Ensemble diversity provides the strongest defense for tabular data, and anomaly detection catches obvious out-of-distribution modifications. A is less suitable for structured data.'
  common_mistake: |
    **The Pitfall:** Blindly choosing adversarial training (Option A) for all adversarial problems.
    **The Rationale:** Candidates often apply techniques designed for continuous image perturbations (like PGD) to tabular/structured data, failing to realize that transaction features are discrete and have semantic constraints.
    **The Consequence:** Training a model on mathematically valid but semantically impossible perturbations, wasting 4x compute for a poor defense.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Option A (PGD adversarial training): 4x compute multiplier.
       - Option B (Anomaly detection): ~1.1x compute multiplier.
       - Option C (Ensemble): ~3-5x compute multiplier.
    2. **Calculations:**
       - Cost-Benefit comparison of computational overhead vs defense efficacy on structured data.
    3. **Conclusion & Interpretation:**
       - **Result: Optimal Defense Architecture.** Option C + B provides the best coverage for tabular data against realistic, constrained modifications without wasting compute on incompatible continuous perturbation defenses.
