title: Diagnosing Low GPU Utilization in Dynamic Dispatch
scenario: "You are debugging a PyTorch training pipeline for a custom autoregressive sequence model on a single NVIDIA A100. Despite having a batch size that fills 90% of VRAM, GPU utilization fluctuates between 10-15%. The PyTorch profiler indicates the GPU is frequently idle, while the CPU is pegged at 100% on a single thread. The model's custom attention block uses over 150 sequential native PyTorch scalar and vector operations per layer in eager execution."
question: Why is the GPU starved, and how do you analyze and resolve this bottleneck?
details:
  realistic_solution: "Analyze the profiling trace to identify kernel launch overhead. In eager execution, each of the 150+ tiny operations triggers a separate `cudaLaunchKernel` call from the Python interpreter. The CPU simply cannot enqueue kernels fast enough to keep the A100's SMs busy. The solution is to trace the dynamic operations into a static graph using `torch.compile` (or JIT), allowing the compiler to perform operator fusion and reduce the total number of kernel launches."
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is host-to-device PCIe bandwidth or attempting to use Distributed Data Parallel (DDP).
    **The Rationale:** Candidates see low GPU utilization and assume data isn't reaching the GPU fast enough, completely missing the CPU dispatch overhead caused by eager execution of tiny operations.
    **The Consequence:** Wasted effort optimizing the data loader or adding more GPUs, which will only exacerbate the dispatch bottleneck without improving utilization.
  napkin_math: |
    - **Overhead per layer:** Assume 150 ops/layer, 24 layers, and 10µs CUDA kernel launch overhead per operation.
    - **Total Dispatch Time:** `150 * 24 * 10µs = 36,000µs = 36ms` per forward pass.
    - **GPU Execution Time:** If the actual matrix math takes 5ms, the GPU idles for 31ms.
    - **Result: Maximum GPU utilization is capped at `5ms / 36ms` ≈ 13.8%.**
