title: Scale Metadata Memory
scenario: A quantized tensor has 64 million weights with one FP16 scale per 128 weights.
question: How much metadata is needed for FP16 scales when 64M weights use one scale per 128 weights?
details:
  realistic_solution: There are 64M / 128 = 500,000 scales. At 2 bytes each, metadata is 1,000,000 bytes, or about 1 MB.
  common_mistake: |
    **The Pitfall:** Ignoring group-wise scale metadata when estimating quantized model size.
    **The Rationale:** Engineers often focus strictly on the bit-width of the quantized weights (e.g., INT4 or INT8) and forget the scaling factors.
    **The Consequence:** Underestimating the total VRAM required, especially when using small group sizes (like 32 or 64) which drastically inflate the metadata footprint.
  napkin_math: |
    1. Total weights: 64,000,000.
    2. Scales needed: 64,000,000 / 128 = 500,000 scales.
    3. Bytes per FP16 scale: 2 bytes.
    4. **Result: Total metadata size is 500,000 * 2 B = 1,000,000 B ≈ 1 MB.**
