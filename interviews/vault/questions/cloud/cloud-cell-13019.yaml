title: 'Queueing Theory Fluency: M/M/1 Metrics from Memory'
scenario: Without looking up formulas, derive from first principles the three key M/M/1 metrics — mean
  queue length Lq, mean wait time Wq, and mean system time W — for an H100 inference server with μ=40
  req/s capacity and λ=32 req/s arrival rate. Then state the P99 approximation for exponential service.
details:
  realistic_solution: 'M/M/1 Wq = ρ/(μ(1-ρ)) (not ρ²/(μ(1-ρ))). With ρ=0.95, μ=40: Wq = 0.95/(40×0.05)
    = 475ms.'
  common_mistake: Confusing Lq (items in queue only) with L (items in system including one being served),
    and confusing Wq (queue wait) with W (total system time = Wq + service time).
  napkin_math: 'M/M/1 queue: ρ=0.95, service rate μ=40/s. Wq (wait in queue, not including service) =
    ρ/(μ(1-ρ)) = 0.95/(40×0.05) = 0.95/2 = 0.475s = 475ms (not 451ms — 451ms uses ρ²/(μ(1-ρ)) = 0.9025/2
    = 0.451s which is the wrong formula for M/M/1).'
