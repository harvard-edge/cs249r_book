title: Batch Size Selection for Maximum MFU on A100 During Pre-Training
scenario: Training a 13B LLM on an NVIDIA A100. At batch_size=32, MFU is 45% (140 TFLOPS). At batch_size=128, MFU is 58% (181 TFLOPS). At batch_size=512, MFU drops to 51% (159 TFLOPS).
question: Why does MFU peak at batch_size=128 and drop at 512, and which batch size is optimal for this training run?
details:
  realistic_solution: 'Batch=32: GEMMs are small, tensor core utilization low. Batch=128: GEMMs larger, MFU peaks. Batch=512: activation memory pressure causes severe gradient checkpointing recomputation, inflating counted FLOPs or gradient sync overheads.'
  common_mistake: |
    **The Pitfall:** Equating MFU with true throughput.
    **The Rationale:** Candidates focus solely on larger batches increasing tensor core filling, forgetting memory pressure overheads.
    **The Consequence:** They select batch 512 and incur massive gradient synchronization and recompute overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 peak: 312 TFLOPS BF16.
    2. **Calculations:**
       - Batch 32: 140 TFLOPS.
       - Batch 128: 181 TFLOPS. (Activations = ~21GB).
       - Batch 512: 159 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound optimal point. Batch 128 balances tensor core saturation and memory pressure for maximum MFU.**
