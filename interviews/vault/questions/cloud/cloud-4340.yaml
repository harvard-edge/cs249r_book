title: Full-Stack RecSys Architecture for a New Social Platform
scenario: Design the recommendation system architecture for a new social platform targeting 100M users at launch (500k QPS) and scaling to 1B users (5M QPS) in year 3.
question: What end-to-end recommendation architecture would you build for 100M users at 500k QPS, and how would it evolve to 1B users at 5M QPS?
details:
  realistic_solution: 'Launch (100M users, 500k QPS): Retrieval: Two-tower model, FAISS HNSW index on 100M items (256 GB INT8). Deployed on 4 A100 nodes (CPU for FAISS, GPU for user tower). Pre-ranking: small 2-layer MLP, CPU-based, 10k→1k. Ranking: DLRM with 10 embedding tables totaling 500 GB, 1B param MLP. Re-ranking: MMR on CPU. Online learning: 1-hour batch retraining cycle. Note: 500k QPS at 9ms/request requires ~4,500 A100-equivalents; in practice GPU batching and request parallelism reduce actual GPU count. Scale to 1B users, 5M QPS: Retrieval: scale FAISS to 1B items (2.5 TB INT8 index across 32 nodes). Embedding tables grow 10× to 5 TB — migrate hot tables to MI300X cluster (192 GB × 50 nodes = 9.6 TB HBM). Training: move to 512 H100 cluster with hybrid parallelism. Online learning: reduce to 10-minute batch update.'
  common_mistake: |
    **The Pitfall:** Designing for year-3 scale at launch (over-engineering).
    **The Rationale:** Engineers want to build a "future-proof" system immediately.
    **The Consequence:** Deploying massively complex, expensive infrastructure (like 5TB MI300X embedding clusters) for a user base that doesn't exist yet, burning runway unnecessarily.
  napkin_math: |
    - **Launch Serving**: 500k QPS × 9ms/req = 4,500,000 GPU-ms/s = 4,500 GPUs.
    - **Headroom Cost**: With 2× peak headroom, 9,000 GPUs × $3.50/hr = **~$275M/year**.
    - **Scale Serving**: 5M QPS requires ~45,000 GPUs or ~28,900 MI300X (due to higher HBM).
    - **Scale Training**: 512 H100s × $3.50/hr = ~$1.7K/hr ≈ **~$16M/year** for training.
