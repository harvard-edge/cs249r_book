title: 'Real-time Anomaly Detection with AMD MI300X: Streaming Data Pipeline Analysis'
scenario: You are designing a real-time anomaly detection system for a fleet of autonomous vehicles. Each vehicle generates telemetry data at a rate of 10GB/s. Your target latency from sensor observation to anomaly alert is under 50ms. The inference workload will run on hardware accelerators.
question: How would you architect the stream-processing pipeline to meet a 50ms anomaly-alert SLA and avoid ingestion or feature bottlenecks?
details:
  realistic_solution: A robust solution would involve a highly scalable distributed stream processing framework (e.g., Apache Flink, Kafka Streams) for initial ingestion, filtering, and aggregation on CPU-based nodes. This would be coupled with efficient data transfer mechanisms (e.g., RDMA-enabled network cards, CXL/PCIe Gen5 connections, GPUDirect Storage) to move preprocessed data to the MI300X quickly. The deep learning model itself would be optimized for FP16 precision and designed with sparsity in mind where appropriate, leveraging kernel fusion and memory-aware optimizations to maximize MI300X utilization. Load balancing and failover across a cluster of MI300X instances would ensure high availability and scalability, along with meticulous profiling to identify and resolve bottlenecks across the entire pipeline.
  common_mistake: |
    **The Pitfall:** Under-prioritizing data ingestion networks while fixating on accelerator speeds.
    **The Rationale:** Engineers assume that if the GPU can process it fast enough, the latency target will easily be met.
    **The Consequence:** Completely ignoring the massive 10GB/s data funnel, which chokes CPU prep logic and network bandwidth long before a single byte reaches the accelerator.
  napkin_math: |
    1. Assumptions & Constraints: 50ms total latency SLA. Accelerator inference = 10ms. Data transfer to GPU = 5ms.
    2. Calculations: Remaining budget = 50ms - (10ms + 5ms) = 35ms.
    3. Conclusion & Interpretation: **Result: Exactly 35ms remains for the entire CPU ingestion pipeline. Bottleneck: CPU Ingestion Network.**
