title: The Inter-Node Scaling Cliff
scenario: You are a Staff ML Systems Engineer at a major cloud provider, tasked with optimizing a training
  job for a 175B parameter LLM. On a single H100 server (8 GPUs), you observe excellent 95% scaling efficiency
  for data parallelism. However, when you scale the job to two servers (16 GPUs total), the overall scaling
  efficiency plummets to 55%, and `nvidia-smi` shows GPU utilization is spiky. Your network monitoring
  tools confirm that the inter-server InfiniBand links are 100% saturated during the optimizer step. Using
  your knowledge of system architecture, diagnose the primary communication bottleneck.
details:
  realistic_solution: The primary bottleneck is the InfiniBand network connecting the two servers. Within
    a single server, the 8 H100 GPUs communicate over the ultra-high-bandwidth NVLink fabric (~900 GB/s).
    When you scale to a second server, the all-reduce collective communication for gradient synchronization
    must cross the inter-server link, which is typically InfiniBand NDR. This fabric has a bandwidth of
    ~50 GB/s (400 Gbps), representing an ~18x drop in bandwidth compared to NVLink. This 'scaling cliff'
    means the GPUs on one node spend most of their time waiting for gradients to arrive from the other
    node, causing the observed drop in utilization and efficiency.
  common_mistake: Engineers often underestimate the massive bandwidth gap between on-server interconnects
    like NVLink and scale-out fabrics like InfiniBand. They might incorrectly blame the PCIe bus, which
    connects the CPU to the GPUs but is bypassed by NVLink for direct GPU-GPU communication. Another common
    error is to not quantify the bandwidth difference and assume the network is 'just slow' without understanding
    the physics.
  napkin_math: A 175B model generates 350GB of FP16 gradients. Within an 8-GPU node, NVLink operates at
    900GB/s. When scaling to 16 GPUs across 2 nodes, gradients must cross the InfiniBand NDR network,
    which is limited to 50GB/s. Bandwidth drops by 900/50 = 18x. The massive 350GB synchronization becomes
    bottlenecked by the 50GB/s IB link, severely degrading scaling efficiency.
  options:
  - The PCIe Gen5 bus is saturated from transferring gradients between the CPU and the GPUs.
  - The NVLink switch within each server is overloaded by the 8-GPU all-reduce traffic.
  - The InfiniBand network bandwidth between servers is insufficient for inter-node gradient synchronization.
  - The server's CPU is unable to schedule the RDMA (Remote Direct Memory Access) operations fast enough.
  correct_index: 2
