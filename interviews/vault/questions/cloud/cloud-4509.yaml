title: Distributed Vision Dataloader Design
scenario: You are training a vision transformer on 8x A100 80GB GPUs. The dataset
  is 5TB of high-res JPEGs stored in a cloud object store.
question: Design a data loading pipeline that eliminates GPU starvation and manages
  network and decoding bottlenecks.
details:
  realistic_solution: Implement a distributed sampler that shards data across nodes.
    Download data asynchronously as compressed tarballs (WebDataset format) to local
    NVMe drives. Use background worker processes (e.g., PyTorch DataLoader workers)
    to read sequentially, and leverage hardware JPEG decoders (like nvJPEG) directly
    into GPU memory to offload CPU bottlenecks.
  common_mistake: Failing to utilize local NVMe caching, attempting to decode 5TB
    directly from remote storage over the network.
  napkin_math: 5000 GB / 8 GPUs = 625 GB per GPU
