title: Distributed Vision Dataloader Design
scenario: You are training a vision transformer on an 8-GPU node. The dataset consists of 5TB of high-res JPEGs stored in a cloud object store.
question: Design a data loading pipeline that eliminates GPU starvation and manages network and decoding bottlenecks.
details:
  realistic_solution: Implement a distributed sampler that shards data across nodes. Download data asynchronously as compressed tarballs (WebDataset format) to local NVMe drives. Use background worker processes (e.g., PyTorch DataLoader workers) to read sequentially, and leverage hardware JPEG decoders (like nvJPEG) directly into GPU memory to offload CPU bottlenecks.
  common_mistake: |
    **The Pitfall:** Attempting to decode 5TB of JPEGs directly from remote storage over the network.
    **The Rationale:** Relying on default PyTorch DataLoaders without localized caching or hardware-accelerated decoding.
    **The Consequence:** The GPUs sit idle at 10% utilization while the CPU maxes out on network I/O and JPEG decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 5TB of JPEGs.
    - Hardware: 8-GPU node.

    **Calculations:**
    - 5,000 GB / 8 GPUs = 625 GB of raw JPEGs processed per GPU per epoch.

    **Conclusion & Interpretation:**
    - **Result: I/O-Decode Bound.** Relying on CPU decompression and network streaming for 5TB of images will severely bottleneck the 8 GPUs.
