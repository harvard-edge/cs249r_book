title: 'Feature Store: Evaluate Point-in-Time Correct Feature Joins for Training Data'
scenario: 'Your training dataset for an H100-based fraud detection model uses user features from a feature store. Without point-in-time correctness, you join the latest feature values to historical labels.'
question: 'Why is a latest-value feature join risky for the fraud dataset, and how does a point-in-time correct join avoid data leakage?'
details:
  realistic_solution: 'Without PIT-correctness: model sees features computed after the label timestamp (e.g., account balance after fraud occurred). Model learns from future information -> inflated training AUC -> production degradation. PIT-join: for each label timestamp T, use feature values as of T-ε (just before event).'
  common_mistake: |
    **The Pitfall:** Using a naive latest-value feature join for historical training data.
    **The Rationale:** Engineers are often surprised when the model performs well in training but poorly in production due to leaking future feature values into the training set.
    **The Consequence:** Inflated training AUC, followed by severe production performance degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latest-value join vs PIT-correct join for historical fraud labels.
    - Compute cost for PIT join: ~10 seconds on Spark for 100M queries.

    **Calculations:**
    - Data leakage effect: Latest-value contains future states (e.g., frozen accounts).
    - Performance gap: Training AUC 0.94 -> Production AUC 0.79.

    **Conclusion & Interpretation:**
    - **Result: Feature-Leakage Bound.** The negligible ~10s compute cost for a binary search PIT join prevents catastrophic production degradation caused by a 15% artificial AUC inflation.
