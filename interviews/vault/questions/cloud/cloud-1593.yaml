title: Trade-offs in Disaggregated Performance vs Latency
scenario: You are evaluating two LLMs for a medical triage application. The 13B quantized model (running on 1x A100 40GB) achieves an average 150ms TTFT and costs $1.50/hr. Its Model Card shows an F1 score of 0.94 for the majority demographic (80% of users) but 0.78 for a minority demographic (20% of users). The 70B model (running on 4x A100 80GB) costs $12.00/hr, achieves 350ms TTFT, and has a uniform F1 of 0.92. The strict system SLA requires <200ms average TTFT.
question: How would you serve the medical triage LLMs to meet the <200ms TTFT SLA while satisfying cost and subgroup fairness constraints?
details:
  realistic_solution: Implement a hybrid routing architecture. Use a lightweight classifier to route queries affecting the minority demographic to the 70B model, while the 13B model serves the remaining 80%. This satisfies fairness criteria while maintaining the overall SLA.
  common_mistake: |
    **The Pitfall:** Unconditionally deploying the 70B model or only looking at the aggregate 13B F1 score.
    **The Rationale:** Candidates fail to consider hybrid routing architectures that balance cost, latency, and fairness simultaneously.
    **The Consequence:** The deployment either violates the 200ms SLA and explodes costs, or deploys an unfairly biased model.
  napkin_math: |
    1. Average TTFT = (0.8 * 150 ms) + (0.2 * 350 ms) = 190 ms (Meets <200 ms SLA).
    2. Effective Hourly Cost = (0.8 * $1.50) + (0.2 * $12.00) = $1.20 + $2.40 = $3.60/hr.
    3. **Result: This architecture saves 70% vs an exclusive 70B deployment while ensuring a minimum F1 of 0.92 across all users.**
