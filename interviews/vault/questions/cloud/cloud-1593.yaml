title: Trade-offs in Disaggregated Performance vs Latency
scenario: You are evaluating two LLMs for a medical triage application. The 13B quantized model (running
  on 1x A100 40GB) achieves an average 150ms TTFT and costs $1.50/hr. Its Model Card shows an F1 score
  of 0.94 for the majority demographic (80% of users) but 0.78 for a minority demographic (20% of users).
  The 70B model (running on 4x A100 80GB) costs $12.00/hr, achieves 350ms TTFT, and has a uniform F1 of
  0.92. The strict system SLA requires <200ms average TTFT. Evaluate the trade-offs and propose an architecture
  that satisfies latency, cost, and fairness constraints.
question: "How would you serve the medical triage LLMs to meet the <200ms TTFT SLA while satisfying cost and subgroup fairness constraints?"
details:
  realistic_solution: Implement a hybrid routing architecture. Use a lightweight classifier to route queries
    affecting the minority demographic to the 70B model, while the 13B model serves the remaining 80%.
    This satisfies fairness criteria while maintaining the overall SLA.
  common_mistake: Only looking at the aggregate F1 score (0.908 for 13B) and deploying the cheaper model,
    or unconditionally deploying the 70B model which violates the 200ms SLA and explodes operational costs.
  napkin_math: Average TTFT = (0.8 * 150ms) + (0.2 * 350ms) = 190ms (Meets <200ms SLA). Effective Hourly
    Cost = (0.8 * $1.50) + (0.2 * $12.00) = $1.20 + $2.40 = $3.60/hr (70% savings vs exclusive 70B deployment).
    Minimum F1 is now 0.92 across all users.
