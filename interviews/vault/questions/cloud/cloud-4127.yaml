title: Job Priority Inversion in GPU Clusters
scenario: A high-priority inference deployment (P0) is queued behind a low-priority
  batch training job (P3) that has been running for 47 hours on 32 GPUs. The scheduler
  will not preempt the training job because it has accumulated 1,504 GPU-hours of
  compute. This is priority inversion. How do you resolve this without wasting the
  training compute?
question: How do you resolve this without wasting the training compute?
details:
  realistic_solution: 'Resolution strategy: (1) Checkpoint-and-shrink: signal the
    training job to checkpoint immediately (takes ~30s for a typical model). Then
    release 8 of its 32 GPUs to the P0 inference deployment. The training job resumes
    on 24 GPUs with adjusted data parallelism — throughput drops 25% but no compute
    is wasted. (2) If the inference deployment needs all 32 GPUs: checkpoint the training
    job, release all GPUs, start inference. Queue the training job for immediate restart
    at highest batch-training priority once additional GPUs are available from other
    low-priority jobs. (3) Prevention: implement priority aging — jobs running longer
    than their estimated time should not block higher-priority jobs. Set a maximum
    ''preemption protection window'' (e.g., 4 hours) after which even running jobs
    can be preempted by checkpointing. (4) Slurm implementation: set PreemptMode=REQUEUE
    with GraceTime=300 (5 minutes for checkpointing). The training job is checkpointed,
    requeued at front of its priority class, and restarts when GPUs are available.'
  common_mistake: Killing the training job, wasting 1,504 GPU-hours of compute. Or
    waiting for it to finish, which could take another 24+ hours.
  napkin_math: '1,504 GPU-hours at $3/hr = $4,512 of compute at risk. Checkpoint cost:
    30 seconds × 32 GPUs = 0.27 GPU-hours = $0.80. Checkpoint + shrink preserves $4,512
    and serves inference.'
