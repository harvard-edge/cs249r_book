title: Power-Efficient LLM Inference on Google TPU v5e
scenario: 'You are tasked with deploying a large language model (LLM) for real-time inference on Google TPU v5e. The model exhibits compute-bound characteristics for smaller batches and memory-bound behavior for larger batches.'
question: 'How would you use TPU v5e power caps, DVFS P-states, and the CMOS power equation to minimize energy per token while meeting a 50 ms latency?'
details:
  realistic_solution: 'Profile the LLM inference performance to map energy-per-inference to different operating points. Identify the knee in the curve where energy efficiency is maximized using workload-aware DVFS adjustments. Apply Top-K Sparsification or INT8 quantization if supported to lower base power draw, while tuning system-level power caps to respect the 50ms latency SLA.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on achieving maximum throughput.
    **The Rationale:** Neglecting the non-linear relationship between clock frequency (and thus voltage) and power consumption.
    **The Consequence:** Operating the TPU at peak frequencies that are far from the optimal energy-per-inference point, wasting power for negligible latency gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: TPU v5e drawing 200W avg at peak 197 TFLOPS.
       - Token compute requirement: 10^12 operations.
       - Target SLA: 50ms.
    2. **Calculations:**
       - Min time = 10^12 / (197 * 10^12) = ~0.005 seconds. Energy = 200W * 0.005s = 1 Joule.
       - CMOS Power P ~ CV^2f. Reduce voltage by 10% (0.9V) and frequency by 5% (0.95f).
       - P_new = C * (0.9V)^2 * 0.95f = 0.77 * P_old.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound. 23% power reduction at only a 5% latency cost, massively improving energy efficiency.**
