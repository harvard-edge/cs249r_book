title: Power-Efficient LLM Inference on Google TPU v5e
scenario: 'You are tasked with deploying a large language model (LLM) for real-time inference on Google TPU v5e. Each TPU v5e node features 16 GB HBM, 197 TFLOPS BF16 peak compute, and 819.2 GB/s memory bandwidth. The model exhibits compute-bound characteristics for smaller batches and memory-bound behavior for larger batches.'
question: 'How would you use TPU v5e power caps, DVFS P-states, and the CMOS power equation to minimize energy per token while meeting a 50 ms latency?'
details:
  realistic_solution: 'A seasoned engineer would begin by extensively profiling the LLM''s inference performance on the Google TPU v5e across a range of batch sizes, input lengths, and potentially quantization levels (e.g., BF16 vs. INT8 if supported). They would meticulously measure latency, throughput, and, crucially, instantaneous power draw (if accessible via monitoring tools). This data would be used to build a comprehensive power-performance curve, explicitly mapping energy-per-inference to different operating points and DVFS P-states. The solution would involve identifying the ''knee'' in this curve where the energy efficiency is maximized, potentially requiring dynamic adjustment of batch sizes or even the use of lower P-states during less critical phases of inference or when throughput requirements allow, while respecting the 50ms latency SLA. The engineer would also analyze memory access patterns to reduce HBM bandwidth pressure, which can also contribute significantly to power draw. Tuning system-level power caps would be considered as a coarse-grained control, with fine-grained optimization coming from workload-aware DVFS adjustments informed by the CMOS power equation.'
  common_mistake: |
    **The Pitfall:** Exclusively focusing on achieving maximum throughput.
    **The Rationale:** Neglecting the non-linear relationship between clock frequency (and thus voltage) and power consumption.
    **The Consequence:** Operating the TPU at peak frequencies that are far from the optimal energy-per-inference point, wasting power for negligible latency gains.
  napkin_math: |
    * If a single token requires 10^12 operations and the TPU draws 200W average at 197 TFLOPS.
    * Min time = 10^12 / (197 × 10^12) ≈ 0.005 seconds. Energy = 200W × 0.005s = 1 Joule.
    * Voltage scaling (CMOS Power P ≈ CV²f): Reduce voltage by 10% (0.9V) and frequency by 5% (0.95f).
    * P_new = C * (0.9V)² * 0.95f = 0.77 * P_old.
    * **Result: 23% power reduction at only a 5% latency cost, massively improving energy efficiency.**
