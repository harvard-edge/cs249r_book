title: Calculate Maximum Batch Size for LLM KV Cache
scenario: You deploy a 13B parameter LLM (FP16 precision) on an 80 GiB GPU. It has 40 layers, 40 attention heads, and a head dimension of 128. Maximum sequence length is 2048 tokens. After reserving 30 GiB for weights and workspaces, you must calculate the KV cache limits.
question: What maximum concurrent batch size can the 80 GiB GPU serve before KV-cache OOM at 2048 tokens?
details:
  realistic_solution: 'Calculate the exact memory footprint of the KV cache per token per layer, scale by sequence length, and divide the remaining VRAM by this per-sequence footprint.'
  common_mistake: |
    **The Pitfall:** Forgetting to cache both Keys and Values, or ignoring the layer count.
    **The Rationale:** Engineers calculate the dimension for a single layer or head and forget the multiplier.
    **The Consequence:** Severe overestimation of maximum batch size, leading to runtime OOM crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Usable VRAM = 80 - 30 = 50 GiB.
    - KV elements = 2 (K,V) * 40 layers * 40 heads * 128 dim.

    **Calculations:**
    - Bytes/token = 2 * 40 * 40 * 128 * 2 bytes = 1.6384 MB.
    - Cache/seq = 1.6384 MB * 2048 = 3.35 GB.
    - Max batch = floor(50 GB / 3.35 GB) = 14.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound (Max batch size is 14 sequences).**
