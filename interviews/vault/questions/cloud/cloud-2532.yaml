title: Cloud Ultra Ethernet L3 0
scenario: A 256-GPU cluster uses a fat-tree topology with 400 Gbps links and 4 equal-cost paths between any two racks. With standard ECMP, a ring AllReduce creates 32 large flows that hash to paths.
question: What effective bandwidth should you expect for 32 AllReduce flows over 4 paths with ECMP versus packet spraying?
details:
  realistic_solution: With ECMP, 32 flows hash to 4 paths. By birthday paradox, distribution is uneven. Expected max-loaded path gets ~10.4 flows. Bottleneck path has 10.4 flows sharing 400 Gbps = 38.5 Gbps per flow. With packet spraying, all 32 flows spread evenly across all 4 paths. Each path carries 32/4 = 8 flow-equivalents. Per-flow bandwidth: 400/8 = 50 Gbps. Improvement: 50/38.5 = 1.3x better bandwidth utilization. At scale with more flows, the ECMP imbalance worsens further.
  common_mistake: |
    **The Pitfall:** Assuming ECMP distributes flows perfectly evenly.
    **The Rationale:** Candidates forget that hash collisions cause load imbalance, and with large AllReduce transfers, a single overloaded path becomes the bottleneck for the entire collective.
    **The Consequence:** They overestimate effective network bandwidth and under-provision the network fabric for large-scale training.
  napkin_math: |
    *   **ECMP flow distribution:** 32 flows over 4 paths. The worst-case path gets ~10 flows due to hash collisions.
    *   **ECMP bandwidth per flow:** 400 Gbps / 10 flows = 40 Gbps/flow.
    *   **Packet spraying flow distribution:** 32 flows perfectly balanced = 8 flow-equivalents per path.
    *   **Packet spraying bandwidth per flow:** 400 Gbps / 8 = 50 Gbps/flow.
    *   **Performance gain:** 50 / 40 = **1.25x better bandwidth per flow with packet spraying.**
