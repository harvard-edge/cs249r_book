title: Optimizing Batching Strategies for LLM Inference on Google TPU v5e
scenario: 'You are deploying a large language model (LLM) for real-time inference on a Google TPU v5e with 16 GB HBM2 memory (819.2 GB/s bandwidth) and 197 TFLOPS BF16 peak compute. The model has varying input sequence lengths and a strict P99 latency requirement of 100ms.'
question: 'How would you choose among static, dynamic, and continuous batching on TPU v5e to maximize throughput while meeting a 100 ms P99 latency target?'
details:
  realistic_solution: 'A realistic solution would involve a hybrid approach, potentially starting with dynamic batching to group similar-length sequences, coupled with continuous batching for the most latency-sensitive requests. For the TPU v5e, optimizing for memory bandwidth (819.2 GB/s) and BF16 compute (197 TFLOPS) is critical. Implement a custom scheduler that monitors current TPU utilization and incoming request queue characteristics (e.g., average sequence length, P99 latency) to dynamically adjust batching aggressiveness. Leverage padding efficiently, perhaps by quantizing sequence lengths into a few bins, to minimize wasted compute from padding. Consider using techniques like speculative decoding or attention caching within the continuous batching framework to further reduce effective latency and increase throughput. Profile memory usage carefully to ensure the 16 GB HBM2e is not oversubscribed, especially with larger effective batch sizes.'
  common_mistake: |
    **The Pitfall:** Applying a fixed static batch size.
    **The Rationale:** Failing to account for the highly variable nature of LLM input sequence lengths.
    **The Consequence:** Underutilization of the TPU for short sequences, tail latency spikes for long sequences, and ignoring the overheads of padded tensor transfers.
  napkin_math: |
    * Effective Throughput check: If a single token takes T_op (FLOPs), ideal compute tokens/sec = 197 TFLOPS / T_op.
    * Memory bound check: If memory accessed per token is M_bytes, ideal mem tokens/sec = 819.2 GB/s / M_bytes.
    * Actual throughput is min(compute_tokens/sec, mem_tokens/sec).
    * Batch Size vs. Latency: If one token takes 't' ms, processing 'L' tokens with batch 'B' takes L * t / B time for compute.
    * **Result: Larger B increases throughput but increases 't' due to memory contention, dictating a dynamic or continuous batching scheduler to hit the 100ms P99 limit.**
