title: Multi-Node Training Job Orchestration in K8s
scenario: 'You need to run a 64-GPU PyTorch DDP training job across 8 Kubernetes nodes (8 GPUs each) using
  MI300X GPUs. Compare three orchestration approaches: (A) raw Kubernetes Deployment, (B) Kubeflow PyTorchJob,
  (C) LeaderWorkerSet. Which is most appropriate and why?'
details:
  realistic_solution: '(A) Raw Deployment: creates independent replicas with no coordination. Each pod
    does not know the addresses of other pods, so you cannot configure MASTER_ADDR, WORLD_SIZE, or RANK
    dynamically. Not viable for distributed training without significant custom scripting. (B) Kubeflow
    PyTorchJob (recommended): creates a CRD with master and worker specs. It automatically: sets MASTER_ADDR,
    MASTER_PORT, WORLD_SIZE, RANK for each pod. Uses a headless Service for DNS-based discovery (worker-0.training-svc,
    worker-1.training-svc). Supports elasticPolicy for TorchElastic integration. Handles restart semantics:
    if one worker fails, all workers are restarted (distributed training requires all ranks). (C) LeaderWorkerSet:
    Kubernetes native (alpha in 1.27). Similar to PyTorchJob but lighter-weight, no CRD installation needed.
    Supports leader-worker pattern with ordinal indexing. Less ML-specific (no automatic environment variable
    injection). For MI300X: ensure ROCm container images are used (not CUDA). The PyTorchJob spec needs:
    nvidia.com/gpu: 8 per pod (AMD GPUs still use the nvidia.com/gpu resource name with AMD''s device
    plugin, or amd.com/gpu with AMD''s plugin). Recommendation: Kubeflow PyTorchJob with Volcano scheduler
    for gang scheduling.'
  common_mistake: Using a Kubernetes Deployment, which assigns random pod names, has no master-worker
    coordination, and does not handle failure semantics for distributed training (e.g., if one pod dies,
    should all pods restart?).
  napkin_math: 'PyTorchJob setup: 1 master + 7 workers = 8 pods × 8 GPUs = 64 total. MASTER_ADDR=worker-0.svc.
    WORLD_SIZE=64. Rank auto-assigned 0-63.'
