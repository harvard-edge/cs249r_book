title: Why Raw Agreement Percentage Misleads
scenario: Two labelers agree on 90% of 1,000 binary classification labels. A manager claims this is 'excellent
  agreement.' Explain why raw percentage agreement is insufficient and what metric should be used instead.
details:
  realistic_solution: 'Raw agreement percentage ignores chance agreement. If 95% of samples are class
    A, two labelers randomly guessing with that distribution would agree 90.5% of the time (0.95² + 0.05²).
    Cohen''s Kappa (κ) corrects for this: κ = (observed_agreement - chance_agreement) / (1 - chance_agreement).
    With 90% observed and 90.5% expected by chance: κ = (0.90 - 0.905) / (1 - 0.905) = -0.053 — essentially
    zero real agreement beyond chance. Kappa values: >0.8 = strong, 0.6-0.8 = moderate, <0.4 = poor. For
    multi-class tasks with >2 labelers, Fleiss'' Kappa or Krippendorff''s Alpha generalize this correction.
    Always report κ alongside raw agreement.'
  common_mistake: Reporting raw agreement without chance correction. With imbalanced classes, even random
    labelers achieve high raw agreement.
  napkin_math: 90% observed, 90.5% chance → κ = (0.90 - 0.905)/(1 - 0.905) ≈ -0.053. Negative Kappa indicates
    agreement is slightly worse than random chance despite 90% raw match.
