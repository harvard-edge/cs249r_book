title: PEFT Memory Budget Across Parallelism Strategies
scenario: Fine-tuning a 70B model with LoRA rank-64 across 8 H100s. Calculate the
  per-GPU memory breakdown for tensor-parallel LoRA training and identify the binding
  constraint.
question: What is the per-GPU memory breakdown for tensor-parallel LoRA training on
  8 H100s, and what is the binding constraint?
details:
  realistic_solution: 'Tensor parallel shards the frozen base model (70B / 8 = 8.75B
    params per GPU = 17.5 GB BF16). LoRA adapters are replicated on all GPUs (not
    sharded) because each GPU computes a partial matrix product and the adapter modifies
    the full output. Adapter size rank-64: 2 (target matrices) × 2 (A & B) × 64 × 8192 × 80 × 2B = 335.5 MB per GPU.
    Adam states for adapters: ~2.0 GB per GPU. Per-GPU total: 17.5 GB base + 335.5 MB
    adapters + 2.0 GB optimizer + 6 GB activations ≈ 25.8 GB. Binding constraint: base
    model shards.'
  common_mistake: Dividing total memory by 8 GPUs and assuming each GPU holds 1/8
    of everything. Adapter parameters must be replicated across all tensor-parallel
    workers (not sharded) to enable gradient synchronization, creating a memory asymmetry.
  napkin_math: '70B / 8 GPUs (TP) = 8.75B params/GPU × 2B (BF16) = 17.5 GB. Rank-64
    adapters: 2 (target matrices) × 2 (A & B) × 64 × 8192 × 80 layers × 2B = 335.5 MB per GPU (replicated, not sharded).
    Adapter Adam (12 bytes/param): 2.0 GB. Activations (batch=2): ~6 GB. Total per GPU: 17.5 + 0.336
    + 2.0 + 6 = 25.8 GB. 80 GB H100: 54.2 GB free for larger batches.'
