title: PEFT Memory Budget Across Parallelism Strategies
scenario: You are fine-tuning a 70B parameter model with LoRA rank-64 across 8 GPUs using tensor parallelism.
question: What is the per-GPU memory breakdown for tensor-parallel LoRA training on 8 GPUs, and what is the binding constraint?
details:
  realistic_solution: 'Tensor parallel shards the frozen base model (70B / 8 = 8.75B params per GPU = 17.5 GB BF16). LoRA adapters are replicated on all GPUs (not sharded) because each GPU computes a partial matrix product and the adapter modifies the full output. Adapter size rank-64: 2 (target matrices) × 2 (A & B) × 64 × 8192 × 80 × 2B = 335.5 MB per GPU. Adam states for adapters: ~2.0 GB per GPU. Per-GPU total: 17.5 GB base + 335.5 MB adapters + 2.0 GB optimizer + 6 GB activations ≈ 25.8 GB. Binding constraint: base model shards.'
  common_mistake: |
    **The Pitfall:** Dividing the total parameter memory footprint blindly by 8 GPUs and assuming everything is sharded.
    **The Rationale:** Engineers abstract "tensor parallelism" as a universal division of all weights uniformly.
    **The Consequence:** Failing to realize that adapter parameters must be fully replicated across all TP workers to synchronize gradients, missing the inherent memory asymmetry.
  napkin_math: |
    1. Assumptions & Constraints: 70B model, 8 GPUs. LoRA Rank-64. BF16 base weights (2 bytes), FP32 Adam states (12 bytes/param).
    2. Calculations: Base Shard = 70B / 8 = 8.75B params * 2B = 17.5 GB. Rank-64 Adapters (replicated) = 2 (targets) * 2 (A/B) * 64 * 8192 * 80 * 2B = 335.5 MB. Adapter Adam States = ~2.0 GB. Activations = ~6.0 GB. Total = 17.5 + 0.336 + 2.0 + 6.0 = 25.836 GB.
    3. Conclusion & Interpretation: **Result: Total per-GPU memory is ~25.8 GB. Bottleneck: Base Model Sharding.**
