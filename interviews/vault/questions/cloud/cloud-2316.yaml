title: Optimizing FP8 Formats for LLM Training
scenario: You are migrating a 175B parameter LLM training job on a 1024-GPU H100 cluster from BF16 to FP8 to increase throughput. You must map the FP8 formats (E4M3 and E5M2) to the forward pass activations, backward pass gradients, and weight updates.
question: How should you map E4M3 and E5M2 across activations, gradients, and weight updates to avoid FP8 training divergence?
details:
  realistic_solution: In FP8 training, representational requirements differ fundamentally between passes. Activations and weights in the forward pass require high precision to maintain model quality, but have a relatively bounded dynamic range. Thus, E4M3 (4 exponent bits, 3 mantissa bits) is optimal, providing higher precision. Conversely, gradients in the backward pass exhibit a massive dynamic range (often spanning 4-5 orders of magnitude) and are highly susceptible to underflow. Therefore, E5M2 (5 exponent bits, 2 mantissa bits) is required for gradients to prevent underflow to zero. Weights must still be kept in higher precision (FP32 or BF16) for the master copy to accumulate tiny optimizer updates safely.
  common_mistake: |
    **The Pitfall:** Using E4M3 for both forward activations and backward gradients to maximize precision.
    **The Rationale:** Candidates incorrectly assume that maximum mantissa precision is always best, ignoring the dynamic range requirements of gradients.
    **The Consequence:** Immediate loss divergence because gradients frequently underflow to zero in E4M3.
  napkin_math: |
    - 1. Analyze E4M3 range: min subnormal = 2^-9 ≈ 0.0019.
    - 2. Analyze E5M2 range: min subnormal = 2^-16 ≈ 1.5e-5.
    - 3. Compare to gradient magnitudes: Deep network gradients routinely hit 1e-4.
    - 4. Conclusion: 1e-4 underflows to 0.0 in E4M3. **Gradients must use E5M2**, while **activations can use E4M3** for higher precision.
