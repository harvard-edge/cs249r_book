title: Power-Aware GPU Scheduling
scenario: 'Your data center has a 2 MW power budget for 256 GPUs. At full load: 256 x 700W = 179.2 kW for GPUs alone, plus ~90 kW for CPUs, networking, and cooling (PUE 1.3). Total: ~350 kW — well within budget. But during a heatwave, the cooling system can only reject 250 kW.'
question: How do you adjust GPU scheduling to stay within the 250 kW thermal rejection limit?
details:
  realistic_solution: 'Power management strategy: (1) Power cap GPUs: use nvidia-smi -pl to reduce power limit from 700W to 400W. At 400W, GPU loses ~25% throughput. New GPU power: 256 x 400W = 102.4 kW. Total with overhead at PUE 1.3: (102.4 + 90) x 1.3 = 250.1 kW. (2) Selective throttling: power-cap batch training jobs to 350W while keeping inference GPUs at 700W. (3) Workload consolidation. (4) Job deferral.'
  common_mistake: |
    **The Pitfall:** Shutting down GPUs entirely.
    **The Rationale:** Reacting to the thermal limit by killing jobs rather than optimizing the performance-per-watt curve.
    **The Consequence:** Drastically reduced cluster throughput and wasted idle compute capacity, violating SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 256 GPUs at 700W. Thermal limit: 250 kW.
       - Power cap at 400W reduces throughput by ~25%.
       - Overhead: 90 kW, PUE: 1.3.
    2. **Calculations:**
       - Capped GPU power: 256 * 400W = 102.4 kW.
       - Total facility power: (102.4 kW + 90 kW) * 1.3 = 250.12 kW.
       - Throughput/Watt at 700W: 100% / 700W = 0.143%/W.
       - Throughput/Watt at 400W: 75% / 400W = 0.1875%/W (31% improvement).
    3. **Conclusion & Interpretation:**
       - **Result: 250.1 kW total power, 31% higher efficiency. Power-Bound.**
