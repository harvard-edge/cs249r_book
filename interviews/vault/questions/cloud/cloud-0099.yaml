title: The Code-Gen Throughput Ceiling
scenario: 'Your team runs a code-generation service using a 34B parameter model. The primary goal is maximizing
  overall throughput (Tokens Per Second, or TPOT) as generations are often long. The service uses static
  batching with a batch size of 8. You observe that GPU utilization averages only 60%. You propose a switch
  to continuous batching. To justify the engineering effort, you need to demonstrate the potential throughput
  gain. Given a representative batch of 8 requests with the following output token lengths: [20, 50, 80,
  100, 150, 200, 300, 1000], solve for the approximate throughput improvement.'
details:
  realistic_solution: The throughput improvement comes from eliminating the computational waste of static
    batching. In static batching, every request in the batch must wait for the longest request to finish.
    The total computational work is proportional to the size of the padded tensor. In continuous batching,
    as soon as a request finishes, its slot can be used for a new request, maximizing GPU utilization.
  common_mistake: A common misconception is that total computation is just the sum of tokens, so batching
    strategy shouldn't affect theoretical max throughput. This ignores the massive waste from padding
    and idle time in static batching, where all requests in a batch are only as fast as the slowest member.
  napkin_math: 1. **Static Batching Cost:** The batch's execution time is dictated by the longest sequence.
    All 8 requests are padded to a length of 1000. Total GPU work is `8 requests * 1000 tokens/request
    = 8000` effective token generations.
  options:
  - There will be no improvement, as the total number of tokens to generate is the same regardless of
    batching strategy.
  - The improvement will be marginal (~10-20%) because the overhead of managing dynamic requests will
    negate most of the gains.
  - A speedup of approximately 4.2x is possible by eliminating the idle GPU time and computation on padded
    tokens.
  - The system will likely crash due to KV cache memory fragmentation when handling so many variable-length
    sequences.
  correct_index: 2
