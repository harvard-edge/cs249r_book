title: The Real-Time Translation Stalemate
scenario: 'You are the tech lead architecting a new real-time translation service. The service powers
  a live conversation, translating speech-to-text-to-speech using a 70B parameter model. The business
  has a non-negotiable product requirement: the P99 Time-To-First-Token (TTFT) for the LLM generation
  step must be under 400ms to feel ''instantaneous'' to the user. During load testing on H100s, you observe
  that as the number of concurrent users crosses about 16 per GPU, the P99 TTFT skyrockets to over 5 seconds,
  even though average GPU utilization is only 60%. Your initial attempt to fix this by adding more H100s
  to a simple round-robin load balancing pool does not meaningfully decrease the P99 latency. Propose
  a new serving architecture from first principles. What are your first three design decisions to address
  this P99 latency explosion, and why are they the correct levers to pull? Justify your proposal with
  napkin math.'
question: "What are your first three design decisions to address this P99 latency explosion, and why are they the correct levers to pull?"
details:
  realistic_solution: The core of the problem is Head-of-Line (HOL) blocking within a naive static batching
    framework. An L6+ answer must identify this and propose an architecture that eliminates it.
  common_mistake: 'The most common L4/L5 answer is to blame raw capacity: ''We just need to autoscale
    and add more GPUs.'' This fails because the problem isn''t a lack of aggregate compute, but a systemic
    scheduling and resource allocation failure known as Head-of-Line (HOL) blocking. Another mistake is
    to immediately suggest a smaller model, which compromises on quality before exhausting systems-level
    optimizations.'
  napkin_math: Let's quantify why static batching fails. A 70B model (140GB weights) requires at least two 80GB H100s (TP=2). Assume a batch of 32 requests (16 per GPU) on this TP=2 node (each GPU has 3.35 TB/s memory BW). Decoding 1 token is memory-bound. Each GPU reads its 70GB weight shard, taking 70GB / 3.35 TB/s ≈ 21ms. For a static batch of 32, a single decoding step takes ~21ms. If a new request arrives just as a batch starts, it must wait for the entire batch to finish. If the average generation length is 250 tokens, the queue delay before the new request is processed is 250 * 21ms = 5.25 seconds. Thus, TTFT explodes to >5 seconds due to Head-of-Line (HOL) blocking. Continuous batching resolves this by dynamically injecting new requests at the very next token step, capping wait time to ~21ms.
