title: SSP vs BSP vs ASP Selection
scenario: A 256-GPU training job on a heterogeneous cluster shows 30% straggler variance. The model is
  a 7B LLM where convergence quality is critical. The team is split between BSP with backup workers, SSP
  with S=3, and pure ASP. Evaluate the trade-offs and recommend an approach.
question: "For the 256-GPU 7B LLM with 30% straggler variance, should you use BSP with backups, SSP S=3, or pure ASP?"
details:
  realistic_solution: 'ASP is too risky: with 256 workers and 30% variance, the fastest workers would
    be dozens of steps ahead, producing severely stale gradients that can destabilize LLM convergence.
    BSP with backup workers is safe for convergence but wastes ~20-30% of compute on redundant work. SSP
    with S=3 is the best trade-off here: it allows fast workers to proceed (absorbing the 30% straggler
    variance most of the time) while bounding staleness to 3 steps, which empirically preserves convergence
    quality for LLMs. The recommendation is SSP with S=3, combined with gradient clipping to handle the
    mild staleness. Monitor the loss curve — if it diverges, reduce S to 2.'
  common_mistake: Choosing ASP for maximum throughput without considering that 7B LLM training is sensitive
    to gradient quality — stale gradients can waste entire training runs.
  napkin_math: 'ASP: unbounded staleness across 256 workers → divergence risk. BSP+backup: ~20-30% wasted
    compute. SSP S=3: blocks only when gap>3, throughput ~1.4-1.6x over BSP.'
