title: Optimizing backward pass memory for a contrastive learning model on MI300X
scenario: You train a CLIP-style vision-language model on MI300X (192GB, 5.3TB/s).
  The contrastive loss requires computing similarity between all N×N image-text pairs
  in a batch. With N=4096, the similarity matrix is 4096×4096 pairs. The backward
  pass through the loss OOMs even though MI300X has 192GB.
question: How would you compute the 4096×4096 CLIP contrastive loss without materializing
  O(N²) gradients and OOMing on MI300X?
details:
  realistic_solution: 'Use GradCache or MoCo-style gradient chunking: split the batch
    into chunks of size K (e.g., K=256), compute similarity in chunks, accumulate
    gradients without materializing the full N×N matrix. The memory cost becomes O(N×K)
    instead of O(N²). Alternatively, use in-batch hard-negative mining that only materializes
    top-k pairs per anchor. On MI300X, K=512 reduces similarity matrix memory from
    32GB to 2GB while maintaining full effective batch size.'
  common_mistake: Computing the full N×N similarity matrix as a dense tensor, materializing
    4096×4096×512_dims × 4 bytes = 32GB just for the similarity scores, plus 32GB
    for the gradient of that matrix, plus all other activations — totaling >100GB
    for this one operation alone.
  napkin_math: 'Full similarity matrix: 4096×4096×4 bytes = 64MB (just float matrix).
    But each embedding is dim=512: similarity computation requires 4096²×512 intermediate
    FLOPs. Backward through softmax of 4096-way softmax requires storing 4096×4096
    attention-like weights = 64MB × 2 (grad) = 128MB — manageable. OOM is actually
    from encoder activations for all 4096 samples, not the matrix itself: 4096 images
    × ViT-L activations ≈ 40GB.'
