title: 'Dataset Curation: Evaluate Domain Mixing Ratios for Instruction Tuning'
scenario: 'You are fine-tuning a 7B model on H100s (80GB HBM3) for a coding assistant. You have 500K code
  examples, 200K general instruction examples, and 50K math examples. Compare two mixing strategies: (A)
  proportional mixing by count, (B) temperature-scaled sampling with T=2. Evaluate which yields better
  coding performance without catastrophic forgetting.'
details:
  realistic_solution: 'Temperature-scaled sampling upsamples small high-quality domains. At T=2, effective
    weights = count^(1/2): code=707, general=447, math=224. Math goes from 6.6% to 18.3% of batches. Evaluate
    on HumanEval (coding) and GSM8K (math) plus MMLU (forgetting). Strategy B typically wins on specialized
    tasks.'
  common_mistake: Always using proportional mixing; not considering that rare high-value domains (math)
    get under-represented.
  napkin_math: 'Total = 750K samples. Proportional: code=66.7%, general=26.7%, math=6.6%. T=2 scaling:
    sqrt(500K)=707, sqrt(200K)=447, sqrt(50K)=224, total=1378. Code=51.3%, general=32.4%, math=16.3%.
    Math training proportion increases 2.5x, improving GSM8K without major MMLU regression.'
