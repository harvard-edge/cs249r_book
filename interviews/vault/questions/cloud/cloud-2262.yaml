title: The Tensor Core Codegen Gap
scenario: You profile a compiled transformer training job on GPUs and find that Tensor Core utilization is only 35% despite the workload being compute-bound. The compiler's generated SASS shows that many matrix multiplies are using FFMA (FP32 fused multiply-add) instructions instead of HMMA (half-precision matrix multiply-accumulate on Tensor Cores). Diagnose why the compiler's target-specific code generation is failing to use the Tensor Cores and identify at which compilation stage the fix must be applied.
question: "Why is codegen falling back to FFMA instead of HMMA, and where in the compiler should you fix it?"
details:
  realistic_solution: |
    Tensor Cores have strict shape and alignment requirements: matrix dimensions must be multiples of 16 (for FP16 HMMA) or 8 (for FP8), input tensors must be in specific memory layouts (row-major A, column-major B for `mma.sync`), and data must be aligned to 128-byte boundaries in shared memory. The compiler's code generation is falling back to FFMA because one or more of these preconditions fails. Common causes: (1) The tiling pass chose tile sizes that are not multiples of 16 — this is a mid-level IR problem (affine/SCF dialect). (2) The memory layout pass did not insert the required transpose to get operand B into column-major — this is a lowering pass problem. (3) Padding was not inserted for non-aligned dimensions (e.g., hidden_dim=768 is fine, but sequence_length=513 is not a multiple of 16). The fix must be applied at the tiling and layout passes in the mid-level IR, not at the final code generation. By the time the compiler reaches NVVM/PTX emission, the tile shapes and layouts are already locked in.
  common_mistake: |
    **The Pitfall:** Attempting to force Tensor Core usage via nonexistent high-level compiler flags.
    **The Rationale:** Practitioners treat compiler targets as a black box instead of understanding the rigid structural preconditions required for HMMA lowering.
    **The Consequence:** Wasting time debugging final PTX generation when the structural failure occurred at the mid-level IR tiling pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - HMMA (FP16): 989 TFLOPS. FFMA (FP32): 67 TFLOPS.
       - Current execution: 35% HMMA, 65% FFMA. Target: 90% HMMA, 10% FFMA.
    2. **Calculations:**
       - Current throughput = (0.35 * 989) + (0.65 * 67) = 346 + 43.5 = 389.5 TFLOPS.
       - Target throughput = (0.90 * 989) + (0.10 * 67) = 890.1 + 6.7 = 896.8 TFLOPS.
       - Speedup = 896.8 / 389.5 = ~2.3x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. Fixing alignment in the tiling pass increases effective throughput by 2.3x purely by unlocking the hardware matrix multiply units.
