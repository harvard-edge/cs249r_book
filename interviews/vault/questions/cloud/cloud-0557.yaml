title: The InfiniBand Adaptive Routing Loop
scenario: You are running a 1,000 GPU training job over a massive InfiniBand network. To maximize bandwidth,
  you enable Adaptive Routing (AR), allowing the network to dynamically send packets down the least congested
  paths. Throughput improves, but occasionally, NCCL crashes with an unrecoverable timeout error during
  a global AllReduce. The network cables and switches are perfectly healthy. What did Adaptive Routing
  do to the packets to break NCCL?
details:
  realistic_solution: Adaptive Routing caused out-of-order packet delivery that broke NCCL. InfiniBand
    AR dynamically routes packets down different physical paths based on congestion. Since paths have
    different latencies (even by microseconds), packets arrive out of order. NCCL's AllReduce assumes
    in-order delivery for its ring/tree reduction algorithms. When packet 2 arrives before packet 1, the
    reduction produces incorrect partial sums, and NCCL's consistency check triggers a timeout. Over a
    1000-GPU job running 12 hours, the probability of such reordering approaches certainty. The fix is
    enabling Adaptive Routing with reordering support (AR-RO).
  common_mistake: '"The packets got dropped by a congested switch." InfiniBand is lossless (credit-based
    flow control); it rarely drops packets. The problem is the order.'
  napkin_math: If Path A has 2 microseconds of congestion delay, Packet 2 easily beats Packet 1 to the
    destination. In a 1,000 GPU AllReduce, the statistical probability of a micro-congestion event reordering
    a critical packet approaches 100% over a 12-hour training run.
