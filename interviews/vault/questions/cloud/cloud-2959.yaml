title: 'Dataset Curation: Napkin Math for Data Mixing Budget'
scenario: You are curating training data for a 65B model to be trained on 256 H100s. Chinchilla-optimal compute says train on ~1.3T tokens. You have web data (5T tokens), books (200B tokens), code (100B tokens), and papers (30B tokens).
question: How many of the 1.3T Chinchilla-optimal tokens should come from web, books, code, and papers after applying proportional mixing with a 2x quality multiplier for books?
details:
  realistic_solution: 'Apply quality multiplier to books: effective weight = 200B × 2 = 400B. Total effective pool = 5T + 400B + 100B + 30B = 5.53T. Normalize to 1.3T target.'
  common_mistake: |
    **The Pitfall:** Forgetting to apply quality multipliers before normalizing the token fractions.
    **The Rationale:** Candidates treat all domains as equal quality pools when computing percentage allocations.
    **The Consequence:** High-quality datasets (like books) are under-sampled, resulting in a suboptimal data mixture and reduced final model reasoning capabilities.
  napkin_math: |
    1. **Effective Weights:** Web=5000B, Books=400B (200B × 2), Code=100B, Papers=30B. Total effective pool = 5530B.
    2. **Fractions:** Web=90.4%, Books=7.2%, Code=1.8%, Papers=0.54%.
    3. **Allocations (out of 1.3T):** Web=1175B, Books=94B, Code=24B, Papers=7B tokens.
    4. **Conclusion:** **Books contribute 94B tokens to the mix**, which easily fits within the 200B available.
