validation_issues_pro:
- The napkin math states a per-token decode time of ~3ms for a 70B model on H100, but the correct memory-bound calculation is `(70B * 2B) / 3.35TB/s` which is ~42ms per batch step.
- The napkin math assumes prefill time per token is ~3ms, but a compute-bound calculation shows it's closer to ~0.3ms per token, making the assumption off by 10x.
