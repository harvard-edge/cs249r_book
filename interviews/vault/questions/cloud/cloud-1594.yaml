title: Evaluating Storage Backends for LLM Cold-Starts
scenario: 'You are designing the autoscaling architecture for a 175B parameter LLM (350GB in FP16). You are evaluating two options for loading the model weights into HBM: 1) Streaming directly from a regional Object Store over a 100 Gbps network interface, or 2) Pre-loading weights onto a local PCIe Gen4 NVMe SSD capable of 12 GB/s sequential read.'
question: Which storage backend would you choose to load 350GB of FP16 weights within a strict 45-second cold-start SLA, and why?
details:
  realistic_solution: Choose the Object Store streaming approach. At 100 Gbps (12.5 GB/s), loading 350GB takes ~28 seconds. The local NVMe at 12 GB/s takes ~29 seconds. Both comfortably meet the 45-second SLA, but streaming directly from the object store eliminates the massive operational overhead and cost of pre-baking or replicating 350GB of weights to the local disk of every ephemeral autoscaling node.
  common_mistake: |
    **The Pitfall:** Instinctively trusting local NVMe SSDs over "network" storage.
    **The Rationale:** Engineers anchor onto traditional architectures where a network transfer is strictly slower than a direct-attached physical disk.
    **The Consequence:** Overengineering an incredibly expensive pre-baking disk replication pipeline for zero latency advantage.
  napkin_math: |
    1. Assumptions & Constraints: Model size = 350 GB. Object Store = 100 Gbps (12.5 GB/s). NVMe = 12.0 GB/s. SLA = 45 seconds.
    2. Calculations: Object Store load time = 350 GB / 12.5 GB/s = 28.0 seconds. Local NVMe load time = 350 GB / 12.0 GB/s = 29.2 seconds.
    3. Conclusion & Interpretation: **Result: Both options clear the 45-second SLA, but Object Store streaming avoids disk replication. Bottleneck: Operational Complexity.**
