title: The Memory Coalescing Penalty
scenario: Two CUDA kernels process the same 2D matrix stored in row-major order. Kernel A has each thread
  in a warp access consecutive elements in the same row (thread $i$ accesses `M[row][i]`). Kernel B has
  each thread access elements in the same column (thread $i$ accesses `M[i][col]`). Both kernels perform
  the same arithmetic. On an H100 with 3.35 TB/s HBM bandwidth, Kernel A runs 8x faster than Kernel B.
  Why?
details:
  realistic_solution: GPU memory controllers coalesce memory requests from threads within the same warp
    into a minimum number of cache-line-sized transactions (128 bytes on modern GPUs). In Kernel A, 32
    consecutive threads access 32 consecutive 4-byte floats = 128 bytes, which is exactly one cache line
    transaction. In Kernel B, 32 threads access elements separated by a full row stride, causing up to
    32 separate cache line fetches for the same warp. Each fetch loads 128 bytes but only uses 4 bytes,
    wasting 124/128 = 97% of bandwidth. The effective bandwidth drops from 3.35 TB/s to roughly 3.35 TB/s
    / 32 = ~105 GB/s.
  common_mistake: Assuming both access patterns are equivalent because they access the same total number
    of elements. Engineers from CPU backgrounds may not realize that GPU memory transactions are coalesced
    at the warp level.
  napkin_math: 'Coalesced (Kernel A): 32 threads x 4 bytes = 128 bytes per transaction. 1 transaction
    per warp. Strided (Kernel B): 32 threads x 1 cache line (128 bytes) = 4,096 bytes fetched but only
    128 bytes used. Bandwidth waste ratio: 4096/128 = 32x. Effective bandwidth: 3.35 TB/s / 32 = ~105
    GB/s. Speedup of A over B: ~32x theoretical, ~8x in practice due to L2 cache partially mitigating
    strided accesses.'
  options:
  - Data parallelism splits the model layers evenly across GPUs so each GPU only stores a fraction of
    the model; this reduces memory per GPU proportionally to the number of GPUs
  - Data parallelism requires each GPU to process the entire training dataset sequentially, but gradients
    are averaged at the end of each epoch rather than each step
  - Data parallelism replicates the full model on each GPU and partitions training data across replicas;
    after each forward-backward pass, gradients are synchronized via AllReduce (e.g., Ring AllReduce)
    so all replicas maintain identical weights. Communication cost scales with model size, not data size.
  - Data parallelism works by sending different random seeds to each GPU so they each train independently;
    the models are averaged only at the end of training via federated learning
  correct_index: 2
