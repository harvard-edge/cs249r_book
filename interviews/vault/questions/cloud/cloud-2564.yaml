title: Cloud Gpu Virtualization L2 0
scenario: Your company serves 20 different ML models, each using <10% of an A100's compute. Currently
  each gets a dedicated GPU, resulting in 80% waste. Explain how GPU virtualization can improve utilization.
question: "How can GPU virtualization improve utilization when 20 models each use less than 10% of an A100?"
details:
  realistic_solution: 'GPU virtualization partitions a single physical GPU into multiple isolated instances.
    NVIDIA MIG (Multi-Instance GPU) hardware-partitions an A100 into up to 7 instances, each with dedicated
    compute, memory, and memory bandwidth — full isolation. MPS (Multi-Process Service) allows multiple
    CUDA processes to share a GPU cooperatively but without memory isolation. vGPU provides VM-level GPU
    sharing for cloud providers. For your scenario: MIG can host 7 models per A100, reducing 20 models
    from 20 GPUs to 3 GPUs. Utilization jumps from <10% to ~70%. Each instance gets guaranteed resources
    — no noisy-neighbor interference.'
  common_mistake: Confusing MIG with time-sharing. MIG provides hardware-level spatial partitioning —
    each instance runs simultaneously with dedicated resources. Time-sharing (MPS) allows concurrent kernels
    but shares resources, creating interference.
  napkin_math: '20 models × 1 A100 each = 20 GPUs at 10% util = 2 GPUs worth of actual compute. With MIG
    (7 instances/GPU): 20 models / 7 = 3 A100s at ~70% util. Savings: 17 GPUs × $2/hr = $34/hr = $298K/year.
    Utilization: 10% → 70%.'
