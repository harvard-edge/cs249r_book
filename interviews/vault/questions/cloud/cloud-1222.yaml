title: Exabyte-Scale LLM Data Erasure Coding Migration
scenario: 'Your infrastructure team proposes migrating a 200 PB active ML training dataset (stored on HDDs for LLM pre-training) from 3-way replication to Reed-Solomon RS(10,4) erasure coding to reduce storage costs.'
question: 'Should you migrate the 200 PB active training dataset from 3-way replication to RS(10,4), and what throughput trade-offs drive the decision?'
details:
  realistic_solution: 'Reject the migration for the active training tier. Instead, use a tiered approach: keep active datasets on 3-way replication (or distributed NVMe caches) for high read throughput and predictable latency, and apply RS(10,4) only to cold tiers like archived checkpoints or raw, un-preprocessed logs.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the storage footprint reduction of erasure coding.
    **The Rationale:** Because RS(10,4) drastically cuts petabyte-scale storage costs, infrastructure teams push for it without realizing the intense read amplification it introduces during degraded states.
    **The Consequence:** During a single HDD or node failure, rebuilding an RS(10,4) chunk requires pulling data from 10 different nodes, creating a massive network storm that saturates the cluster and starves active ML training jobs of data.
  napkin_math: |
    - **3-Way Replication Storage:** 200 PB * 3 = 600 PB.
    - **RS(10,4) Storage:** 200 PB * (14/10) = 280 PB (Savings: 320 PB).
    - **Rebuild Penalty:** Rebuilding 1 lost RS(10,4) chunk requires reading 10 chunks across the network.
    - **Throughput Impact: This creates a 10x read amplification versus 1x for replication, which will easily saturate 100Gbps links during a node failure.**
