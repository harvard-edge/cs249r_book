title: Designing a High-Throughput Inference Load Balancer for NVIDIA A100 Clusters
scenario: You are tasked with designing the load balancing and routing system for a high-throughput, low-latency
  ML inference service. The service is deployed across multiple data centers, each housing clusters of
  NVIDIA A100 GPUs. Each A100 GPU has 80 GB of HBM2e memory, delivers 312 TFLOPS (FP16 Tensor Core), features
  2.0 TB/s memory bandwidth, and consumes up to 400W. The inference requests vary significantly in complexity
  and compute requirements, leading to fluctuating processing times per model on each GPU. Design a request
  routing mechanism that efficiently distributes inference traffic, minimizes latency, maximizes GPU utilization,
  and ensures high availability, considering factors like consistent hashing, weighted round-robin, and
  dynamic traffic management.
details:
  realistic_solution: A realistic solution would involve a multi-layered approach. At the entry point,
    a global load balancer (e.g., DNS-based or a specialized proxy) would route traffic to the nearest
    healthy data center. Within each data center, a smart routing layer would use a combination of consistent
    hashing (for session affinity or model version pinning) and a dynamically weighted load balancing
    algorithm. This algorithm would continuously monitor real-time metrics from each NVIDIA A100 GPU (e.g.,
    GPU utilization, memory usage, queue length, average inference time, available memory bandwidth) and
    assign weights accordingly. For instance, a GPU with lower utilization or a shorter queue would receive
    a higher weight. This dynamic adjustment ensures requests are routed to the least loaded and most
    capable A100 GPU for the specific inference task, potentially using mechanisms like 'power-of-two-choices'
    coupled with per-GPU readiness signals. Furthermore, request sharding or micro-batching could be employed
    to optimize throughput per A100.
  common_mistake: A common mistake would be to implement a simple round-robin or least-connection load
    balancing strategy without accounting for the heterogeneous nature of inference workloads and the
    varying processing capabilities/current load of individual NVIDIA A100 GPUs. This can lead to hot-spotting,
    imbalanced GPU utilization, increased tail latencies, and underutilization of expensive hardware,
    as a slow-processing request can block subsequent requests routed to the same GPU.
  napkin_math: Let's assume each NVIDIA A100 can process an average of `R` requests per second. With `N`
    A100 GPUs in a cluster, the theoretical maximum throughput is `N * R` RPS. If the memory bandwidth
    (2.0 TB/s) is the bottleneck for a specific model requiring `B` GB of data per inference, then each
    A100 can handle `(2000 GB/s) / B` inferences per second based on memory access. For a target P99 latency
    of `L` ms, the load balancer's decision-making and routing overhead must be significantly less than
    `L`. If an average inference takes `T` ms on an A100, and a GPU can queue `Q` requests without significant
    latency degradation, the load balancer needs to avoid routing to an A100 if its current queue depth
    `D > Q`, or if `D * T` approaches `L`. Consistent hashing ensures that a small fraction of keys (`1/N`)
    are remapped on node addition/removal, minimizing cache misses or re-initialization overhead. If a
    model is `M` GB, and an A100 has `80 GB` HBM2e, it can potentially host `80 / M` models concurrently
    (if memory is the only constraint), which influences routing decisions.
