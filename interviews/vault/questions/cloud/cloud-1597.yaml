title: Calculating MFU for LLM Training
scenario: You are training a 20-billion parameter dense Transformer LLM on a cluster of 256 NVIDIA A100-80GB
  GPUs. Each GPU has a theoretical peak of 312 TFLOPS in BF16. Your global batch size is 4 million tokens,
  and the training loop reports an average step time of 12.0 seconds. Assuming standard training (forward
  and backward pass), calculate the Model FLOPS Utilization (MFU).
question: "What is the Model FLOPS Utilization for this 20B LLM training run on 256 A100s with a 12.0-second step time?"
details:
  realistic_solution: Calculate the theoretical model FLOPs per step using the 6*P*D approximation, calculate
    the peak hardware FLOPs over the step time, and find the ratio.
  common_mistake: Using 2*P (inference FLOPs) instead of 6*P (training FLOPs) per token, or including
    the overhead of activation checkpointing (which computes HFU, not MFU).
  napkin_math: '1. Theoretical FLOPs/step = 6 * Parameters * Tokens = 6 * 20e9 * 4e6 = 480e15 FLOPs (480
    PFLOPs).

    2. Hardware Peak FLOPs/sec = 256 GPUs * 312e12 FLOPs/sec = ~80e15 FLOPs/sec (80 PFLOPs/sec).

    3. Observed Throughput = 480 PFLOPs / 12 seconds = 40 PFLOPs/sec.

    4. MFU = Observed Throughput / Hardware Peak = 40 / 80 = 50%.'
