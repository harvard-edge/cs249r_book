title: KV-Cache Memory Fragmentation in Long-Running Services
scenario: Your vLLM serving instance has been running for 6 hours. Nvidia-smi shows
  30 GB free GPU memory, but the system rejects new requests claiming insufficient
  memory. The KV-cache pool reports 35 GB allocated but only 22 GB actively used.
  Diagnose the 13 GB gap.
question: Why does vLLM reject new requests despite 30 GB free GPU memory and only
  22 GB of 35 GB allocated KV-cache actively used?
details:
  realistic_solution: 'The 13 GB gap (35 GB allocated in the pool - 22 GB actively used by current requests) is primarily caused by Automatic Prefix Caching (APC) and internal block fragmentation. Causes: (1) Prefix cache pollution: vLLM retains KV blocks from completed requests in the pool to accelerate future requests sharing the same prefix (e.g., system prompts). These blocks appear "allocated" but are not part of active generation. (2) Internal fragmentation: PagedAttention allocates in fixed-size blocks (e.g., 16 tokens). A request ending at token 17 requires 2 full blocks, wasting 15 tokens of space. For 1000 concurrent requests, this internal fragmentation is negligible (~2.5 GB). The bulk of the 13 GB is speculative prefix caching. Fix: (1) If the workload has low prefix overlap, disable prefix caching (--enable-prefix-caching=False) or tune eviction policies. (2) The system rejecting new requests implies the pool is fully fragmented or cached blocks are not being evicted correctly under memory pressure.'
  common_mistake: Blaming GPU memory fragmentation (which is rare with modern allocators).
    The issue is usually KV-cache pool fragmentation — free blocks are scattered across
    the block pool and cannot form contiguous allocations for new requests.
  napkin_math: 'Total Pool: 35 GB. Active: 22 GB. Gap: 13 GB. Internal block fragmentation: 1000 requests, avg 8 tokens wasted per request. 1000 * 8 * 320 KB/token = 2.5 GB. Prefix Cache: 13 GB - 2.5 GB = 10.5 GB of cached historical blocks. 10.5 GB / 320 KB = 32,812 cached tokens (e.g., 30 variations of a 1000-token system prompt). When a new request arrives requiring 2 GB of contiguous tokens, the allocator must evict cached blocks. If it fails to evict or if the block pool lacks enough free blocks due to fragmentation, it rejects the request.'
