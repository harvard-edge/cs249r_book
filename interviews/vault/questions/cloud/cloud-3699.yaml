title: Feature Store Versioning for Safe Model Rollouts
scenario: You are rolling out a new version of your recommendation model that requires 3 new features not present in the current online feature store. The rollout will be gradual (1% -> 10% -> 100% over 3 days). The old model must keep running for the users not yet migrated.
question: How would you version features so the v2 recommendation model can roll out gradually while v1 continues serving safely?
details:
  realistic_solution: 'Use namespaced feature keys: prefix new features with model version (e.g., `v2:user_embedding_dim512` vs `v1:user_embedding_dim256`). Store both in the same Redis cluster, served by the feature server which routes based on the model version tag in the request context. After 100% rollout, run a TTL-based cleanup job to expire v1 features. Maintain a feature registry (e.g., Feast or Tecton) as the source of truth for feature-model compatibility.'
  common_mistake: |
    **The Pitfall:** Adding new features directly to the existing feature namespace.
    **The Rationale:** Engineers treat the feature store as a simple key-value cache without version isolation.
    **The Consequence:** The old model receives unexpected feature keys and crashes, or teams overcompensate by maintaining two separate Redis clusters, doubling operational overhead.
  napkin_math: |
    - **Storage overhead:** 3 new features * 100M users * 8 bytes/feature = 2.4 GB additional Redis memory.
    - **Total feature store:** existing ~50 GB + 2.4 GB = 52.4 GB (fits in RAM).
    - **Serving overhead:** Version check per request (1 µs lookup).
    - **At 50K RPS:** 50,000 * 0.001ms = **50ms total routing overhead per second** (negligible).
