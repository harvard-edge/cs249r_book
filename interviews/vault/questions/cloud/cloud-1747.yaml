title: Priority Inversion in GPU Fleet Orchestration
scenario: A 2,048 H100 GPU Kubernetes cluster handles mixed workloads. A low-priority (P2) data compaction job holds an exclusive lock on a distributed metadata service to update dataset indices. A medium-priority (P1) massive offline evaluation job suddenly scales up, fully saturating the CPU scheduling queues on the nodes where P2 is running, starving P2 of CPU cycles. Meanwhile, a high-priority (P0) LLM serving autoscaler attempts to launch 64 new replicas to handle a traffic spike, which requires reading the metadata service. The P0 job is indefinitely blocked waiting for the lock held by P2, which cannot execute due to P1.
question: "How should you resolve the P0 autoscaler blocked by a P2 lock holder starved by P1 work: priority inheritance, killing P2, or lock timeouts?"
details:
  realistic_solution: Implement Priority Inheritance protocol where P2 temporarily inherits P0's priority to quickly finish its critical section and release the lock. Alternatively, enforce strict lock leases (e.g., 30s timeouts) combined with fencing, ensuring P2 is safely fenced off if it stalls, allowing P0 to acquire the lock after the timeout.
  common_mistake: |
    **The Pitfall:** Suggesting immediately preempting (killing) the P2 job.
    **The Rationale:** Candidates fail to recognize that forcefully killing a job holding a critical distributed lock without a proper fencing mechanism can leave the service corrupted.
    **The Consequence:** The metadata service enters a permanently locked state, causing cluster-wide outages.
  napkin_math: |
    1. P2 requires 2 seconds of CPU time to release the lock.
    2. P1 consumes 99.9% of CPU scheduler shares, slowing P2 by 1000x.
    3. Releasing the lock without intervention takes 2,000 seconds (~33 minutes).
    4. P0 is blocked for 33 minutes, causing catastrophic serving latency.
    5. **Priority inheritance elevates P2 to P0 priority, resolving the blockage in exactly 2 seconds.**
