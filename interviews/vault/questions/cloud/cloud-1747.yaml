title: Priority Inversion in GPU Fleet Orchestration
scenario: A 2,048 H100 GPU Kubernetes cluster handles mixed workloads. A low-priority (P2) data compaction
  job holds an exclusive lock on a distributed metadata service to update dataset indices. A medium-priority
  (P1) massive offline evaluation job suddenly scales up, fully saturating the CPU scheduling queues on
  the nodes where P2 is running, starving P2 of CPU cycles. Meanwhile, a high-priority (P0) LLM serving
  autoscaler attempts to launch 64 new replicas to handle a traffic spike, which requires reading the
  metadata service. The P0 job is indefinitely blocked waiting for the lock held by P2, which cannot execute
  due to P1. Evaluate the trade-offs between resolving this via Priority Inheritance, preemptive termination
  of P2, and lock timeouts.
details:
  realistic_solution: Implement Priority Inheritance protocol where P2 temporarily inherits P0's priority
    to quickly finish its critical section and release the lock. Alternatively, enforce strict lock leases
    (e.g., 30s timeouts) combined with fencing, ensuring P2 is safely fenced off if it stalls, allowing
    P0 to acquire the lock after the timeout.
  common_mistake: Candidates often suggest immediately preempting (killing) the P2 job, failing to recognize
    that forcefully killing a job holding a critical distributed lock without a proper fencing mechanism
    can leave the metadata service in a corrupted or permanently locked state.
  napkin_math: If P2 requires 2 seconds of CPU time to release the lock, but P1 is consuming 99.9% of
    the CPU scheduler shares, P2's execution is slowed by 1000x. Releasing the lock will take 2,000 seconds
    (~33 minutes). P0 is blocked for 33 minutes, causing catastrophic serving latency. Priority inheritance
    elevates P2 to P0 priority, granting it immediate CPU access and resolving the blockage in exactly
    2 seconds.
