title: Debugging Remote Storage Bottlenecks in Multi-Node Training
scenario: 'You are debugging a PyTorch training pipeline on a 16-node cluster (8x H100s per node). The
  20TB dataset is streamed from a remote object store over a 50 Gbps network link per node. GPU utilization
  is flat at 20% across all 100 epochs. Each node is equipped with 4x 3.2TB NVMe SSDs (read: 6 GB/s each).
  Analyze the bottleneck and explain how to leverage the hardware to achieve >80% GPU utilization after
  the first epoch.'
details:
  realistic_solution: Implement a distributed local NVMe warm cache. The 20TB dataset can be sharded and
    cached across the 16 nodes (1.25TB per node), easily fitting into the 12.8TB local NVMe capacity per
    node. After the first epoch, reads serve directly from the local NVMe drives.
  common_mistake: Focusing purely on software dataloader optimizations (e.g., num_workers, prefetch factor)
    or requesting faster network links, while ignoring the high-bandwidth, unused local NVMe storage available
    on the compute nodes.
  napkin_math: 'Required throughput for 8x H100s is ~30 GB/s. Network link: 50 Gbps = 6.25 GB/s (bottleneck
    at ~20% utilization: 6.25/30). Local NVMe bandwidth: 4 * 6 GB/s = 24 GB/s. Serving from local NVMe
    increases bandwidth to 24 GB/s, raising theoretical GPU utilization to ~80% (24/30).'
