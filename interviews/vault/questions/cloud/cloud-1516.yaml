title: Debugging Remote Storage Bottlenecks in Multi-Node Training
scenario: You are debugging a PyTorch training pipeline on a 16-node cluster (8x H100s per node). A 20TB dataset streams from a remote object store over a 50 Gbps network link per node. GPU utilization is flat at 20%. Each node has 4x 3.2TB NVMe SSDs (read: 6 GB/s each).
question: What is bottlenecking the job, and how can local NVMe caching raise GPU utilization above 80% after epoch 1?
details:
  realistic_solution: Implement a distributed local NVMe warm cache. The 20TB dataset can be sharded and cached across the 16 nodes (1.25TB per node), easily fitting into the 12.8TB local NVMe capacity per node. After the first epoch, reads serve directly from the local NVMe drives.
  common_mistake: |
    **The Pitfall:** Focusing purely on software dataloader optimizations (like `num_workers`) to fix low GPU utilization.
    **The Rationale:** Engineers assume the network or software is inherently slow, ignoring the massive, unused high-bandwidth local NVMe storage available on modern compute nodes.
    **The Consequence:** The cluster wastes 80% of its costly GPU compute cycles waiting for data over the network.
  napkin_math: |
    * **Target Throughput:** 8× H100s require ~30 GB/s to remain fed.
    * **Network Bottleneck:** 50 Gbps = 6.25 GB/s (utilization: 6.25 / 30 ≈ 20%).
    * **NVMe Capacity:** 4 drives × 3.2TB = 12.8TB per node. (The 20TB dataset sharded across 16 nodes is only 1.25TB per node, easily fitting).
    * **NVMe Throughput:** 4 drives × 6 GB/s = 24 GB/s.
    * **Conclusion:** Serving from local NVMe increases bandwidth to 24 GB/s, raising GPU utilization to **~80%**.
