title: The Retraining Trigger Strategy
scenario: "Your production model serves 1M predictions/day. You must decide the retraining strategy: (A) Fixed schedule, (B) Performance-triggered, or (C) Data-drift-triggered. You need to evaluate all three strategies for a high-stakes medical diagnosis model where both freshness and reliability matter."
question: "How would you evaluate fixed-schedule, performance-triggered, and drift-triggered retraining for a high-stakes medical diagnosis model?"
details:
  realistic_solution: 'For a high-stakes medical model, the correct answer is a hybrid: use all three as layered defenses. (A) Fixed schedule as baseline: retrain every 7 days regardless. This bounds maximum staleness and catches gradual drift that falls below per-check thresholds. Cost: predictable, budgetable. Risk: retraining on bad data if quality checks are weak. (B) Performance-triggered as emergency brake: if rolling 24-hour accuracy drops > 2% from baseline, trigger immediate retraining on validated data. This catches acute failures (upstream data format changes, sudden population shift). Must use sequential monitoring (not fixed-window A/B test) for rapid detection. (C) Data-drift-triggered as early warning: compute PSI (Population Stability Index) or JSD on incoming feature distributions daily. If drift exceeds threshold (PSI > 0.1), flag for investigation — do NOT auto-retrain, because drift might indicate data corruption, not genuine population change. For medical models: investigation gate before retraining is mandatory (regulatory requirement). The key insight: triggers must be independent and defense-in-depth. No single trigger catches all failure modes.'
  common_mistake: |
    **The Pitfall:** Choosing a single retraining strategy without considering its specific failure modes.
    **The Rationale:** Candidates often view these strategies as mutually exclusive, ignoring that each has distinct blind spots (e.g., fixed schedules waste compute, drift metrics cause false alarms).
    **The Consequence:** The model either suffers from undetected performance degradation or wastes resources on unnecessary retraining.
  napkin_math: |
    - **Evaluate Fixed schedule:** 52 retraining runs/year at $2K/run = $104K/year (bounds maximum staleness).
    - **Evaluate Performance-triggered:** Detects failures after ~24h. 1M requests * degraded accuracy = thousands of misdiagnoses before detection.
    - **Evaluate Drift-triggered:** Misses gradual concept drift. Monitoring costs ~$5K/year.
    - **Calculate Hybrid cost:** $104K base + ~4 emergency retrains/year ($8K) + drift monitoring ($5K/year) = **$117K/year for comprehensive defense-in-depth**.
