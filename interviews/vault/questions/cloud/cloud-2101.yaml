title: Embedding Table Hot-Cold Partitioning
scenario: Your production recommendation system has a 200 GB embedding table serving 100K QPS. Only 5%
  of embedding rows account for 80% of lookups (Zipfian distribution). You have 80 GB of GPU HBM and 512
  GB of CPU DRAM. Design a tiered caching architecture that exploits this access distribution.
details:
  realistic_solution: 'Hot-cold partitioning: Place the hottest 5% of rows (10 GB, covering 80% of lookups)
    in GPU HBM for near-zero-latency access. Place the remaining 95% (190 GB) in CPU DRAM with a GPU-side
    cache for recently accessed ''warm'' rows. Architecture: (1) Maintain a lookup frequency table; periodically
    promote/demote rows between tiers. (2) Hot tier (GPU HBM): 10 GB, serves 80% of lookups at HBM bandwidth
    (2 TB/s). (3) Warm cache (GPU HBM): 20-30 GB LRU cache for frequently accessed ''cold'' rows, serving
    ~15% of lookups. (4) Cold tier (CPU DRAM): 190 GB, serves ~5% of lookups via PCIe (~32 GB/s). The
    PCIe transfer for the cold 5% becomes the performance cliff to manage.'
  common_mistake: Putting the entire table on GPU (doesn't fit) or putting it all in CPU DRAM (too slow
    for 100K QPS). The Zipfian distribution is the key engineering lever.
  napkin_math: 100K QPS * 50 lookups * 512B = 2.56 GB/s total bandwidth. Hot 5% fits entirely in 80GB
    GPU HBM (10GB used). 80% of hits use 2.05 GB/s of the 2.0 TB/s HBM bandwidth. Cold 95% sits in CPU
    DRAM, accessed over PCIe Gen4. 20% misses use 0.51 GB/s of the 32 GB/s PCIe limit. Tiered caching
    handles the QPS flawlessly.
