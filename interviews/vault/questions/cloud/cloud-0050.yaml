title: The Interconnect Latency Ladder (cloud-0050)
scenario: When moving data between GPUs in a large training cluster, what is the correct rank-ordering
  of common interconnects from *lowest* latency to *highest* latency for a small data transfer?
details:
  realistic_solution: The correct order is NVLink < PCIe < InfiniBand. NVLink is a specialized, extremely
    low-latency link for GPUs on the same server board (~500 ns). PCIe is a general-purpose bus connecting
    the GPU to the motherboard, with higher latency (~1,000 ns). InfiniBand is a high-speed network for
    connecting different servers, but it has the highest latency of the three for a single transaction
    due to the physics of crossing racks (~5,000 ns).
  common_mistake: Confusing bandwidth with latency, or not knowing the physical hierarchy. Many engineers
    know InfiniBand is 'fast' (high bandwidth), but they forget the significant latency overhead for cross-server
    communication compared to on-board links like NVLink. Another common error is mixing up the roles
    of PCIe and NVLink.
  napkin_math: '1. NVLink 4.0 (GPU-to-GPU on same baseboard): ~500 ns latency.

    2. PCIe Gen 5 (GPU-to-CPU/NIC on same node): ~1,000 ns latency.

    3. InfiniBand NDR (Node-to-Node cross-rack): ~5,000 ns latency.

    Ranked lowest to highest: NVLink < PCIe < InfiniBand. The physical distance and protocol overhead
    dictate this 1x -> 2x -> 10x latency scaling.'
  options:
  - InfiniBand < NVLink < PCIe
  - PCIe < NVLink < InfiniBand
  - NVLink < PCIe < InfiniBand
  - All are roughly the same (~5,000 ns)
  correct_index: 2
