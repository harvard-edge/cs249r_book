title: Cloud Transient Failures L5 0
scenario: 'To handle transient failures, your team proposes three strategies: (A) redundant computation
  (run every step on 2 GPUs, compare results), (B) gradient norm monitoring with rollback, (C) periodic
  validation loss checks every 100 steps. Evaluate the trade-offs.'
details:
  realistic_solution: 'Strategy A (redundancy): catches 100% of transient errors, but doubles GPU cost
    — 2x compute overhead is prohibitive for large training. Strategy B (gradient monitoring): near-zero
    overhead (<1%), catches most corruption (NaN/Inf and outlier norms), but misses subtle bit flips that
    produce plausible-looking gradients. Strategy C (validation checks): catches corruption that affects
    model quality, but detection is delayed up to 100 steps, requiring rollback and wasted compute. Best
    practice: combine B + C. Gradient monitoring catches acute corruption instantly; validation loss catches
    subtle drift with bounded rollback cost.'
  common_mistake: Relying solely on gradient norm monitoring. Subtle transient errors that produce slightly-off
    but plausible gradients will pass norm checks but still degrade model quality over thousands of steps.
  napkin_math: 'A: 2x GPU cost ($2M → $4M for large run). B: <1% overhead, catches ~95% of errors. C:
    100-step validation = ~2 min overhead per check. Max rollback: 100 steps × 30s/step = 50 min wasted.
    B+C combined: <2% overhead, >99% detection.'
