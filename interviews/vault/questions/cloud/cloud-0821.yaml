title: The PCIe Transfer Bottleneck
scenario: You are training an image classification model with batch size 2048. Each image is 224x224x3 in FP32.
question: How long does it take to transfer a single batch from CPU to GPU over PCIe Gen5 x16 (64 GB/s unidirectional)?
details:
  realistic_solution: 'About 19 ms. Each image is 224 * 224 * 3 * 4 = 12 bytes (~0.6 MB). A batch of 2048 images = 2048 * 0.6 MB = 1.23 GB. Over 64 GB/s PCIe: 1.23 / 64 = 19.2 ms. This is fast enough for most training loops but must be overlapped with compute.'
  common_mistake: |
    **The Pitfall:** Guessing the magnitude without doing the arithmetic.
    **The Rationale:** Candidates assume PCIe transfers are universally "instantaneous" in the context of milliseconds.
    **The Consequence:** They fail to compute the actual byte size, often forgetting that FP32 requires 4 bytes per value, leading to inaccurate bottleneck analysis.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch Size: 2048 images.
       - Image Dimensions: 224x224x3.
       - Precision: FP32 (4 bytes per value).
       - Bus: PCIe Gen5 x16 (64 GB/s).
    2. **Calculations:**
       - Single Image Size = 224 * 224 * 3 * 4 bytes = 602,112 bytes (~0.6 MB).
       - Total Batch Size = 2048 * 0.6 MB = ~1.23 GB.
       - Transfer Time = 1.23 GB / 64 GB/s = 0.0192 seconds (19.2 ms).
    3. **Conclusion & Interpretation:**
       - **Result: The transfer takes ~19 ms, which must be safely overlapped to avoid stalling. Bandwidth-Bound**
  options:
  - A) ~4.8 ms
  - B) ~19.2 ms
  - C) ~154 ms
  - D) ~76 ms
