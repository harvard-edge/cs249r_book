title: 'The Overloaded Translator'
scenario: 'You are serving a Llama-3-8B model on a single GPU with static batching (batch size 8). The service has a P99 Time-to-First-Token (TTFT) target of < 300ms. During a load test at 12 requests per second (RPS), you observe: average prefill latency = 25ms, average output = 40 tokens (max 80 tokens), per-token decode latency = 8ms, and GPU utilization is ~65%. Curiously, your TTFT P99 is climbing steadily past 2 seconds.'
question: 'Why is TTFT P99 climbing steadily past 2 seconds at 12 RPS despite only 65% GPU utilization?'
details:
  realistic_solution: 'The system is overloaded because the incoming request rate (λ = 12 RPS) exceeds the system''s maximum possible throughput (μ). The reason for the low throughput is the inefficiency of static batching. With static batching, the entire batch is blocked until the longest sequence (in this case, 80 tokens) is complete. This leads to significant idle time on the GPU as shorter sequences finish early but their batch slots cannot be reused. Because the system is unstable (λ > μ), the request queue grows indefinitely. The solution is continuous batching.'
  common_mistake: |
    **The Pitfall:** Assuming sub-100% GPU utilization means the GPU is not the bottleneck and focusing on input data paths.
    **The Rationale:** Engineers rely on system metrics (like 65% utilization) without calculating the theoretical maximum throughput under static batching constraints.
    **The Consequence:** The team wastes time tweaking prefill logic or hardware instead of switching to continuous batching to unlock the idle compute slots.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3-8B model, single GPU, static batching (batch size 8).
    - Arrival rate (λ) = 12 RPS.
    - Prefill latency = 25ms, output = max 80 tokens, per-token decode latency = 8ms.

    **Calculations:**
    - Static batch processing time: Batch finishes when longest sequence (80 tokens) completes. Time = 25ms + (80 * 8ms) = 665ms.
    - Maximum throughput (μ): One batch of 8 requests takes 665ms. Throughput = 8 / 0.665s = 12.03 RPS.
    - System stability: Arrival rate (λ) = 12 RPS. μ ≈ 12 RPS. System is at its absolute limit.
    - GPU utilization: Requests finishing early leave their GPU slots idle, capping utilization at ~65%.

    **Conclusion & Interpretation:**
    - **Result: Unbounded Queue Growth (Compute-Bound)**. Because λ ≈ μ, queue depth grows unbounded according to Little's Law, causing TTFT to climb continuously.
  options:
    - 'The static batch size is too large, increasing per-batch latency. Reducing it to 8 would lower TTFT.'
    - 'The H100 GPU is underpowered for this model. GPU utilization would be 100% if it were the bottleneck.'
    - 'The system is overloaded because its maximum throughput is lower than the arrival rate, causing the request queue to grow. Static batching is artificially depressing throughput.'
    - 'The 40ms prefill latency is the primary bottleneck. Optimizing the data input path is the highest priority.'
  correct_index: 2
