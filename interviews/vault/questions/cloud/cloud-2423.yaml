title: Long-Context INT4 KV Cache Degradation
scenario: 'Serving a 7B LLM with a 128k context window. At FP16, the KV cache is 67GB per request, heavily limiting concurrency. You implement INT4 per-channel KV cache quantization, saving 75% memory. Throughput jumps from 5 QPS to 18 QPS, but "needle in a haystack" retrieval accuracy drops from 99% to 45%.'
question: 'Why did INT4 KV cache quantization hurt needle-in-haystack accuracy, and how would you preserve long-context retrieval?'
details:
  realistic_solution: 'Per-channel INT4 quantization of the KV cache is insufficient for long-context retrieval because attention relies on precise outlier key/value pairs representing specific ''needles.'' INT4 has only 16 representable values. When quantizing Key vectors, dot-product precision with Query vectors degrades, causing attention scores to blur across the context. The fix: implement group-quantization (group size 64-128) to capture local variance within each head dimension, or use mixed-precision KV cache (keep recent tokens and attention-sink tokens in FP16, quantize the rest to INT4).'
  common_mistake: |
    **The Pitfall:** Increasing calibration dataset size to fix the accuracy drop.
    **The Rationale:** Engineers assume poor quantization accuracy is just an artifact of bad calibration data during the post-training quantization phase.
    **The Consequence:** They fail to address the fundamental representational limit of 4 bits for capturing the highly precise outlier key/value pairs needed for long-sequence dot products.
  napkin_math: |
    * **7B model FP16 KV cache (128K context):** 2 (K+V) * 32 layers * 32 heads * 128 dim * 128,000 tokens * 2 bytes = 67.1 GB.
    * **INT4 KV cache (0.5 bytes/element):** 67.1 GB * 0.25 = 16.8 GB.
    * **Grouped quantization overhead (group-size 128):** 128,000 / 128 = 1,000 groups. 4 bytes metadata (scale+zero) per group.
    * **Metadata total:** 2 * 32 * 32 * 128 * 1,000 * 4 = 1.05 GB.
    * **Effective INT4+metadata memory:** 16.8 + 1.05 = **17.85 GB (~73% savings vs FP16).**
