title: Debugging HardFaults in Bare-Metal Serving
scenario: Your cloud IoT team is deploying a 120KB quantized CNN for anomaly detection directly onto an ARM Cortex-M4 fleet (256KB SRAM, 1MB Flash, bare-metal without an RTOS). During inference, the microcontrollers sporadically trigger a HardFault. The model's static tensor arena requires 80KB of SRAM, network buffers take 32KB, and the main stack is set to 16KB.
question: "How do you analyze the root cause of this crash without OS-level memory profiling tools?"
details:
  realistic_solution: |
    Analyze the linker map file to diagnose a `.data` section overflow. If the 120KB model weights lack the `const` qualifier, the startup code copies them from Flash into SRAM at boot. Adding `const` forces weights into `.rodata` (Flash), resolving the SRAM stack collision.
  common_mistake: |
    **The Pitfall:** Focusing on resizing the tensor arena or debugging the model graph.
    **The Rationale:** Candidates ignore the compiled binary's memory map and C-level memory section placement.
    **The Consequence:** Hours wasted debugging the ML model when the issue is basic embedded linker configuration.
  napkin_math: |
    - **Buggy State (No `const`):** 120KB (.data weights) + 80KB (arena) + 32KB (buffers) + 16KB (stack) = **248KB** out of 256KB SRAM. The stack collides with data.
    - **Fixed State (With `const`):** Weights stay in 1MB Flash (.rodata).
    - **New SRAM Usage:** 80KB + 32KB + 16KB = **128KB** used (50% utilization, completely safe).
