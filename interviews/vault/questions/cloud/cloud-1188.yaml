title: Evaluating the LLM Efficiency Frontier
scenario: 'You are serving a 70B parameter LLM for an interactive coding assistant. The current deployment
  uses FP16 weights across 4x A100 (80GB) GPUs to meet a strict 50ms Time-Between-Tokens (TBT) SLA and
  handle the KV cache for high concurrency. Finance mandates a 50% infrastructure cost reduction. Evaluate
  the trade-offs on the efficiency frontier between two options: 1) Downsizing to an 8B parameter model
  in FP16 on a single A100, or 2) Applying W4A16 quantization to the 70B model to fit on 2x A100s. Justify
  your design decision using quantitative estimates of system throughput, latency, and expected model
  quality.'
details:
  realistic_solution: Opt for the W4A16 70B model on 2x A100s. The 70B model quantized to 4-bit weights
    (W4A16) requires ~35GB of weight storage, fitting on 2x A100 80GB GPUs. At batch=1, the Time-Between-Tokens
    is bounded by reading 35GB at 3.8 TB/s combined bandwidth ≈ 9.2ms, well under the 50ms TBT SLA. This
    achieves the 50% cost reduction (4 to 2 GPUs) while maintaining the 70B model's superior reasoning
    quality over a native 8B model.
  common_mistake: Candidates often incorrectly assume that a heavily quantized large model (W4A16 70B)
    will have lower accuracy than a native smaller model (FP16 8B), or they fail to verify that the quantized
    model still fits in memory and meets the latency SLA on the reduced GPU count.
  napkin_math: '70B FP16 = ~140GB weights. W4A16 = ~35GB. 2x A100s provide combined memory bandwidth of
    ~3.8 TB/s. At batch size 1, TBT is bounded by reading weights: 35GB / 3800 GB/s ≈ 9.2ms per token.
    Even with heavy KV cache traffic and quantization kernel overhead, 9.2ms << 50ms SLA. Cost drops 50%
    (4 to 2 GPUs) with minimal quality degradation.'
