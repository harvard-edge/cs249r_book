title: Cost-Aware Shadow Testing Architecture
scenario: You are upgrading an e-commerce ranking model to a massive Two-Tower deep learning model. The service handles 10,000 QPS, and the new model requires 1 GPU per replica (capable of 25 QPS). Running a standard 100% shadow deployment for 7 days is projected to blow out the cloud budget.
question: How would you evaluate the A10G two-tower model without paying for a 100% 7-day shadow deployment?
details:
  realistic_solution: Implement a Stratified Sampling Shadow Deployment. Instead of shadowing 100% of traffic, route only a representative 5% sample to the shadow model. To ensure the evaluation covers edge cases, bias the sampling towards high-uncertainty or high-value requests (e.g., users with sparse history). To handle the baseline comparison, log both the baseline and shadow predictions asynchronously to a data lake, comparing the ranking metrics (like NDCG) offline. This validates the serving infrastructure and model accuracy at a fraction of the hardware cost.
  common_mistake: |
    **The Pitfall:** Abandoning shadow testing entirely and moving directly to a 1% canary deployment.
    **The Rationale:** 100% shadowing is too expensive, so teams assume they must skip it to save money.
    **The Consequence:** Skipping shadow testing risks catastrophic user impact if the new model fails silently, which a canary test might expose directly to users.
  napkin_math: |
    - **100% Shadow Cost**: 10,000 QPS / 25 QPS/GPU = 400 GPUs.
    - **7-Day Full Cost**: 400 GPUs × $1.50/hr × 168 hours = $100,800.
    - **5% Shadow Cost**: 500 QPS = 20 GPUs.
    - **7-Day Sampled Cost**: 20 GPUs × $1.50/hr × 168 hours = **$5,040**.
    - **Statistical Viability**: A 5% sample still yields ~43 million predictions per day, which is highly sufficient.
