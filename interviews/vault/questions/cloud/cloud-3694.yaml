title: Combining Pipeline and Tensor Parallelism for 1T Parameter Model
scenario: You need to train a 1 trillion parameter model on 1024 H100 GPUs.
question: What data, tensor, and pipeline parallelism factors would you choose for a 1T-parameter model on 1024 H100s under a 70GB HBM limit, and why?
details:
  realistic_solution: 'Use 3D parallelism: Tensor Parallelism (TP=8) within a node (NVLink bandwidth 900 GB/s), Pipeline Parallelism (PP=16) across nodes (IB bandwidth), Data Parallelism (DP=8) for global batch scaling. 8×16×8 = 1024 GPUs. Model sharding: 1T / (TP × PP) = 1T / 128 ≈ 7.8B params/GPU × 2 bytes = 15.6 GB. Optimizer states: 7.8B × 12 bytes = 93.6 GB — use ZeRO-1 to shard across DP=8 → 93.6/8 = 11.7 GB/GPU. Total: 15.6 (weights) + 15.6 (gradients) + 11.7 (optimizer) + activations < 70 GB.'
  common_mistake: |
    **The Pitfall:** Using only pipeline parallelism for massive 1T parameter models.
    **The Rationale:** Candidates assume pipeline parallelism scales cleanly, ignoring that activation memory scales with model width and the pipeline bubble becomes enormous without tensor parallelism.
    **The Consequence:** Severe memory fragmentation and idle GPU time (massive pipeline bubbles) destroy training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:** 1T params, 1024 H100s (70 GB limit), TP=8, PP=16, DP=8. BF16 weights (2 bytes). ZeRO-1 optimizer states (12 bytes).
    2. **Calculations:** Weights per GPU = (1T / 128) * 2 bytes = 15.6 GB. Gradients = 15.6 GB. Optimizer = (1T / 128) * 12 bytes / 8 DP = 11.7 GB.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound. Total static memory = 42.9 GB, leaving ~27 GB for activations under the 70GB HBM limit.**
