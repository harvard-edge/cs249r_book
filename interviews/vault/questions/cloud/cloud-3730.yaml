title: Prefill-Decode Disaggregation Architecture Specification for H100 Fleet
scenario: Design a prefill-decode disaggregation system for serving Llama-3-70B at 1000 req/s with P50 TTFT < 200ms and P50 TPOT < 50ms/token on an H100 fleet.
question: How many prefill vs decode H100s would you use, how would you transfer KV cache, and how would you load-balance 1000 req/s?
details:
  realistic_solution: "Prefill GPU requirement: avg prompt 512 tokens, 70B model, 50ms prefill per request at 1 GPU. Need 1000 req/s × 0.05s = 50 concurrent prefills → 50 H100s for prefill. Decode GPU requirement: avg 256 output tokens per response, 30 tok/s per sequence at batch=16. Throughput: 16 × 30 = 480 tok/s per GPU. Need 1000 × 256 / 480 = 534 decode GPUs. Ratio: 50 prefill : 534 decode = 1:10.7. KV transfer: after prefill, transfer KV cache (2×80×8×128×512×2B = 168MB) from prefill GPU to decode GPU via RDMA over InfiniBand at 100 GB/s: 1.68ms. Load balancer: route new requests to least-loaded prefill GPU; after prefill, schedule decode on GPU with most spare capacity."
  common_mistake: |
    **The Pitfall:** Using the same GPU ratio as the compute ratio without accounting for the different memory bandwidth requirements.
    **The Rationale:** Failing to isolate the compute-heavy prefill phase from the memory-bound decode phase.
    **The Consequence:** Grossly undersizing the decode fleet, leading to severe queuing and SLA violations.
  napkin_math: |
    *   **Prefill GPUs:** 1000 req/s × 50ms prefill latency = 50 concurrent prefills = 50 GPUs.
    *   **Decode Throughput Required:** 1000 req/s × 256 tokens avg = 256K tokens/s.
    *   **Decode GPUs:** At 480 tok/s per GPU (batch=16 at 30 tok/s): 256K / 480 = 534 GPUs.
    *   **Total Fleet:** 50 prefill + 534 decode = **584 H100s** (Ratio 1:10.7).
    *   **KV Transfer Time:** $2 \times 80 \text{ layers} \times 8 \text{ KV heads} \times 128 \text{ dim} \times 512 \text{ tokens} \times 2 \text{ Bytes}$ = 168 MB. At 100 GB/s InfiniBand = **1.68ms transfer time**.
