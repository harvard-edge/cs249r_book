title: Mitigating the Multimodal I/O Wall
scenario: You are architecting training infrastructure for a vision-language model on 256 H100 GPUs. Each GPU processes 2,560 images/second (150KB/image). Centralized object storage maxes out at 50 GB/s.
question: Should you upgrade to a Parallel File System (Lustre) or implement local NVMe WebDataset caching, and why?
details:
  realistic_solution: |
    Implement a local NVMe caching layer combined with a sequential format like WebDataset (tar archives). This offloads the random read pressure from the central storage and leverages the massive aggregate read throughput of the compute nodes' local disks.
  common_mistake: |
    **The Pitfall:** Assuming the network is the fundamental bottleneck and massively scaling up centralized storage ($$$).
    **The Rationale:** Architects default to expensive SAN/Lustre solutions without calculating if distributed local node NVMe bandwidth could absorb the I/O deficit.
    **The Consequence:** The organization burns millions of dollars on a parallel file system when a software-level local caching strategy would have sufficed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 256 GPUs, 2,560 imgs/s/GPU, 150 KB/image.
       - Central Storage Limit: 50 GB/s.
       - Local NVMe Capacity: 32 nodes * 4 drives/node * 3 GB/s.
    2. **Calculations:**
       - Required Throughput: 256 * 2,560 * 150 KB = 98.3 GB/s.
       - Central Storage Deficit: 98.3 GB/s - 50 GB/s = 48.3 GB/s.
       - Local NVMe Aggregate Throughput: 32 * 4 * 3 GB/s = 384 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Local NVMe completely clears the 98.3 GB/s requirement with 285.7 GB/s of overhead remaining, saving the cost of a Lustre upgrade. System is Storage-IO-Bound.**
