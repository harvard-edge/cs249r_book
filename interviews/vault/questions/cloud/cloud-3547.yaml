title: Real-time Anomaly Detection on High-Frequency Sensor Streams with NVIDIA H100
scenario: 'Imagine you are designing a real-time anomaly detection system for a fleet of autonomous vehicles. Each vehicle generates telemetry data (sensor readings, GPS, internal diagnostics) at a combined rate of 10 GB/s, arriving as a continuous stream of small messages. Your task is to process this data, extract real-time features, and run a lightweight anomaly detection model within a 50ms end-to-end latency budget. You have access to a distributed cluster equipped with NVIDIA H100 GPUs, each boasting 80 GB HBM3 memory, 989 TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth.'
question: How would you architect the H100 stream pipeline to process 10 GB/s telemetry and meet the 50 ms anomaly-detection SLA?
details:
  realistic_solution: The architecture should involve a robust stream ingestion layer (e.g., Kafka or Flink/Spark Streaming), followed by a stream processing layer. For real-time feature computation and inference on the H100, one could use a framework like NVIDIA Rapids (Cudf, Cuml) or Triton Inference Server. Data should be batched efficiently on the CPU before transfer to the GPU to maximize throughput and minimize transfer overhead, but batch sizes must be carefully tuned to respect the 50ms latency budget. Leveraging shared memory and asynchronous kernels on the H100 would be crucial. For features that require historical context, a low-latency feature store (e.g., Redis, RocksDB) can be integrated, with critical hot features potentially mirrored in HBM3 if they fit, reducing host memory access. The model should be optimized for FP16 inference to leverage the 989 TFLOPS FP16 dense performance. Persistent GPU contexts and kernel warm-up are also important to reduce latency spikes.
  common_mistake: |
    **The Pitfall:** Ignoring the overhead of data serialization/deserialization and PCIe network transfer.
    
    **The Rationale:** Engineers often assume the GPU's raw processing power will compensate for inefficient data handling, without calculating the true I/O limits.
    
    **The Consequence:** PCIe bottlenecks that completely negate the H100's compute advantages, failing the real-time latency target.
  napkin_math: |
    * **Data Rate:** 10 GB/s at 1 KB/message = 10,000,000 messages/sec
    * **HBM3 Bandwidth Usage:** 10M msgs/s × 15 ops/msg × 1 KB = 150 GB/s (easily fits in 3.35 TB/s HBM limit)
    * **PCIe Transfer Limits:** Gen5 x16 provides 64 GB/s bi-directional
    * **Result:** **10 GB/s ingress + 2 GB/s feature overhead (12 GB/s total) easily fits within the 64 GB/s PCIe capacity, proving the architecture is viable.**
