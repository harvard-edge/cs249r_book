title: Calculating Optimal Checkpoints for Fail-Stop Errors
scenario: A cluster experiences a fail-stop failure with an MTBF of 24 hours. Saving a synchronous global checkpoint takes exactly 5 minutes.
question: Using Young's formula ($T_{opt} = \sqrt{2 \times t_{save} \times MTBF}$), what is the optimal checkpoint interval and daily checkpointing overhead?
details:
  realistic_solution: The optimal interval balances the guaranteed IO cost of saving states against the probabilistic compute cost of re-calculating lost steps. Using Young's formula, the optimal interval is exactly 2 hours, resulting in 60 minutes of checkpoint overhead per day.
  common_mistake: |
    **The Pitfall:** Checkpointing too frequently (e.g., every 15 minutes).
    **The Rationale:** Failing to realize that fixed checkpoint I/O overhead will mathematically eclipse the compute time saved from recovering from infrequent crashes.
    **The Consequence:** Wasting massive amounts of compute time writing state to disk rather than performing training steps.
  napkin_math: |
    - $t_{save} = 5\text{ mins} = 0.0833\text{ hours}$.
    - $MTBF = 24\text{ hours}$.
    - $T_{opt} = \sqrt{2 \times 0.0833 \times 24} = \sqrt{4} = 2\text{ hours}$.
    - The system will checkpoint 12 times over a 24-hour period.
    - Total overhead = 12 × 5 minutes = 60 minutes.
    - **The optimal interval is 2 hours, resulting in 1 hour of checkpoint overhead per day.**
