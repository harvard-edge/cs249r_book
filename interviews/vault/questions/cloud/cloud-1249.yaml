title: Calculating Optimal Checkpoints for Fail-Stop Errors
scenario: You are training a large language model on a cluster of 1,024 A100 GPUs. The cluster experiences
  a fail-stop failure (e.g., an unrecoverable node crash) with a Mean Time Between Failures (MTBF) of
  24 hours. Saving a synchronous global checkpoint to the distributed file system takes exactly 5 minutes.
  Using Young's formula (T_opt = sqrt(2 * t_save * MTBF)), calculate the optimal checkpoint interval in
  hours, and determine how much total compute time is lost solely to checkpointing overhead per 24-hour
  day.
question: "Using Young's formula, what is the optimal checkpoint interval and daily checkpointing overhead for the 1,024-GPU run?"
details:
  realistic_solution: The optimal interval balances the guaranteed IO cost of saving states against the
    probabilistic compute cost of re-calculating lost steps. Using Young's formula, the optimal interval
    is exactly 2 hours, resulting in 60 minutes of checkpoint overhead per day.
  common_mistake: Candidates often suggest checkpointing too frequently (e.g., every 15 minutes), failing
    to realize that fixed checkpoint IO overhead will mathematically eclipse the compute time saved from
    recovering from infrequent fail-stop crashes.
  napkin_math: t_save = 5 mins = 0.0833 hours. T_opt = sqrt(2 * 0.0833 * 24) = sqrt(4) = 2 hours. Over
    a 24-hour period, the system will checkpoint 12 times. Total overhead = 12 * 5 minutes = 60 minutes
    (1 hour) per day.
