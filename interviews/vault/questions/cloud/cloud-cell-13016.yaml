title: 'Queueing Theory Evaluation: FCFS vs Priority Queuing for Mixed Workloads'
scenario: 'An H100 inference cluster (80GB HBM3) handles two workload classes: short requests (mean 200ms,
  80% of traffic) and long requests (mean 4s, 20% of traffic). Total utilization is 75%. Compare FCFS
  queuing vs priority queuing (short requests preempt long) for P99 latency of each class. Show which
  achieves better aggregate SLO compliance.'
details:
  realistic_solution: 'FCFS M/M/1 mean wait: ρ=0.75, mean service = 0.8*0.2 + 0.2*4.0 = 0.96s. Wq = 0.75*0.96/(1-0.75)
    = 2.88s. Short requests suffer disproportionately from rare long requests. With preemptive priority:
    short requests see only short-request load (80% * λ), their effective ρ=0.6, Wq_short ≈ 0.6*0.2/(1-0.6)
    = 0.3s — 10x improvement. Long requests see combined ρ=0.75, Wq_long ≈ 12s. If long SLO is flexible
    (30s), this is fine. Priority wins if short SLO is strict (P99 < 500ms).'
  common_mistake: Assuming priority queuing always improves overall system performance — it helps high-priority
    class at the direct expense of low-priority class, potentially violating their SLOs.
  napkin_math: 'FCFS: mean service = 0.8*0.2 + 0.2*4.0 = 0.96s. M/M/1 Wq = ρ/(μ(1-ρ)) = 0.75*0.96/(1-0.75)
    = 2.88s. P99_FCFS ≈ 4.6*3.84s = 17.7s for all requests. Priority (short preempts long): short ρ_s
    = 0.8*0.75 = 0.6, Wq_s = 0.6*0.2/(1-0.6) = 0.3s, P99_short ≈ 4.6*0.5 = 2.3s. Long: Wq_l ≈ (0.75*0.96/(1-0.75))
    + delay = ~12s. Priority improves short P99 by 7.7x at cost of long P99.'
