title: The Memory Copy Wall
scenario: You are deploying a recommendation model. Your A100 GPU utilization is stuck at 15% during peak traffic. You check your code and find that the CPU is busy serializing features from Redis before sending them to the GPU.
question: Based on the architecture and symptoms, what is the 'silent killer' limiting your throughput?
details:
  realistic_solution: The bottleneck is **PCIe transfer overhead and CPU-bound preprocessing**. During traffic spikes, the CPU becomes 100% saturated doing data serialization and tensor formatting. The PCIe bus is flooded with small, unbatched memory transfers. You must move feature preprocessing (embedding lookups, formatting) directly onto the GPU using NVIDIA Triton or DALI, and batch requests on the CPU *before* the PCIe transfer to send large contiguous blocks.
  common_mistake: |
    **The Pitfall:** Blaming the GPU and requesting an upgrade.
    **The Rationale:** Engineers look at high latency and immediately assume the compute hardware (A100) isn't fast enough for peak loads.
    **The Consequence:** Spending heavily on hardware upgrades that change absolutely nothing, because the GPU is starving for data, not compute.
  napkin_math: |
    1. PCIe Gen4 x16 bandwidth: 32 GB/s.
    2. User features passed unbatched: 1000 features (each 4KB) = 4 MB per batch.
    3. At 100 batches/s, throughput is 400 MB/s.
    4. **Result:** **400 MB/s is vastly below the 32 GB/s limit; the stall is strictly due to the latency of thousands of tiny sequential cudaMemcpy calls starving the GPU.**
