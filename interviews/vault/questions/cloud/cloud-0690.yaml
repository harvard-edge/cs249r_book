title: The Memory Copy Wall
scenario: You are deploying a recommendation model. Your A100 GPU utilization is stuck at 15% during peak
  traffic. You check your code and find that the CPU is busy serializing features from Redis before sending
  them to the GPU. Based on the diagram, what is the 'silent killer' limiting your throughput?
details:
  realistic_solution: The bottleneck is **PCIe transfer overhead and CPU-bound preprocessing**. During
    traffic spikes, the CPU becomes 100% saturated doing data serialization and tensor formatting. The
    PCIe bus is flooded with small, unbatched memory transfers. You must move feature preprocessing (embedding
    lookups, formatting) directly onto the GPU using NVIDIA Triton or DALI, and batch requests on the
    CPU *before* the PCIe transfer to send large contiguous blocks.
  common_mistake: '"The GPU is too slow, we need to upgrade to an A10G." The GPU is only at 15% utilization
    — it''s starving for data, not compute.'
  napkin_math: PCIe Gen4 x16 bandwidth is 32GB/s. If passing 1000 user features (each 4KB) per batch,
    that's only 4MB/batch. At 100 batches/s, throughput is 400MB/s, well below the 32GB/s limit. The stall
    isn't bandwidth; it's latency! Thousands of tiny sequential cudaMemcpy calls from the CPU parsing
    Redis payloads starve the A100 (312 TFLOPS), locking utilization at a dismal 15%.
