title: 'Network Bandwidth Bottlenecks: Specify InfiniBand Fabric for 256-GPU LLM Training Cluster'
scenario: A 256-GPU training cluster (32 nodes, 8 GPUs per node) needs its InfiniBand fabric topology specified for training 70B+ models with 3D parallelism.
question: "What InfiniBand topology, rail count, per-GPU bandwidth, AllReduce target, and bisection bandwidth would you use for a 256-GPU 70B+ training cluster?"
details:
  realistic_solution: '256 GPUs across 32 nodes. Each node: 8 GPUs with 900GB/s intra-node NVLink + 8 × 400Gb/s IB = 3.2Tb/s IB uplinks per node. 32 nodes × 8 IB ports = 256 ports. Recommended: 2-tier non-blocking fat-tree with 256-port leaf switches (1:1 oversubscription). Bandwidth per GPU: 400Gb/s = 50GB/s. AllReduce 70B across 32 DP ranks (TP-8): 2×31/32×(140GB/8) = 33.9GB per GPU. 33.9/50=678ms. Bisection BW: 256×400Gb/s/2=51.2Tb/s.'
  common_mistake: |
    **The Pitfall:** Specifying a single-tier fat-tree for a 256-GPU cluster.
    **The Rationale:** People underestimate the number of uplinks required per node (32 per node for 8 GPUs with 4 rails).
    **The Consequence:** Designing a network that lacks enough switch ports, requiring a multi-tier design to be non-blocking.
  napkin_math: |
    1. **Assumptions & Constraints:** 32 DP nodes, 400Gb/s IB per GPU (50GB/s). 70B FP16 model (140GB). TP-8.
    2. **Calculations:** Data per GPU = 140GB / 8 = 17.5GB. Ring AllReduce data moved = 2 * (31/32) * 17.5GB = 33.9GB. Transfer time = 33.9GB / 50GB/s = 678ms.
    3. **Conclusion & Interpretation:** **Result: 678ms AllReduce time.** Network is heavily stressed during parameter synchronization.
