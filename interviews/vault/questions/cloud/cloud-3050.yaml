title: 'Network Bandwidth Bottlenecks: Specify InfiniBand Fabric for 256-GPU LLM Training Cluster'
scenario: A 256-GPU H100 training cluster (32 DGX nodes × 8 H100s) needs its InfiniBand fabric topology specified for training 70B+ models with 3D parallelism.
question: "What InfiniBand topology, rail count, per-GPU bandwidth, AllReduce target, and bisection bandwidth would you use for a 256-GPU H100 70B+ training cluster?"
details:
  realistic_solution: '256 GPUs across 32 nodes. Each node: 8 H100 with 900GB/s intra-node NVLink + 8 × 400Gb/s IB (ConnectX-7) = 3.2Tb/s IB uplinks per node. 32 nodes × 8 IB ports = 256 ports. Non-blocking fat-tree: 2-tier with 512-port Quantum-2 switches or HDR 36-port leafs. Recommended: 2-tier fat-tree with 256-port leaf switches (1:1 oversubscription). Bandwidth per GPU: 400Gb/s = 50GB/s. AllReduce 70B across 32 DP ranks (TP-8): 2×31/32×(140GB/8) = 33.9GB per GPU. 33.9/50=678ms. Bisection BW: 256×400Gb/s/2=51.2Tb/s.'
  common_mistake: |
    **The Pitfall:** Specifying a single-tier fat-tree for a 256-GPU cluster.
    **The Rationale:** People underestimate the number of uplinks required per node (32 per node for 8 GPUs with 4 rails).
    **The Consequence:** Designing a network that lacks enough switch ports, requiring a multi-tier design to be non-blocking.
  napkin_math: |
    1. Per GPU IB: 400Gb/s = 50GB/s.
    2. 32 DP nodes: AllReduce data per GPU (70B FP16, DP-32, TP-8): per GPU gradient = 17.5GB.
    3. Ring: 2 × 31/32 × 17.5 = 33.9GB moved.
    4. IB 50GB/s: 33.9 / 50 = **678ms**.
