title: The Inference Memory Diet
scenario: 'You are tasked with deploying a 70 billion parameter Large Language Model for inference. The model is currently stored in FP16 precision. To reduce the memory footprint and cost, you are considering quantizing it to INT8.'
question: "How much memory do the 70B model weights require in FP16 versus INT8, and how many GB are saved by quantizing?"
details:
  realistic_solution: 'FP16 (half-precision floating point) uses 16 bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte, per parameter. Quantizing from FP16 to INT8 effectively halves the memory required for the model''s weights.'
  common_mistake: |
    **The Pitfall:** Overestimating savings by assuming FP32 is the baseline.
    **The Rationale:** Many engineers default to 4 bytes per parameter for theoretical models, rather than the 2 bytes (FP16) standard for inference deployments.
    **The Consequence:** Falsely calculating 210 GB of savings instead of the true 70 GB, leading to incorrect hardware budgeting.
  napkin_math: |
    1. **Total parameters:** 70 Billion
    2. **FP16 size:** 70B × 2 bytes = 140 GB
    3. **INT8 size:** 70B × 1 byte = 70 GB
    4. **Savings:** 140 GB - 70 GB = 70 GB
    
    **Final Result: 70 GB saved.**
  options:
  - '140 GB. (Misconception: Calculated savings from an assumed FP32 baseline, or reported original FP16 size)'
  - '210 GB. (Misconception: Assumed baseline was FP32 (4 bytes) and calculated savings relative to that)'
  - '70 GB. (Correct calculation: 140 GB for FP16 minus 70 GB for INT8)'
  - '35 GB. (Misconception: Simple arithmetic error)'
  correct_index: 2
