title: Prefill Pool GPU Count Formula for TTFT SLO
scenario: A disaggregated serving system handles 500 RPS with average prompt length 512 tokens and P95
  TTFT SLO of 200ms. How many H100s do you need in the prefill pool?
details:
  realistic_solution: 'Prefill throughput per H100: 512-token prompt on 8B model = 2*512*8B = 8.19T FLOP.
    H100 at 989 TFLOPS, ~50% MFU = 989 TFLOPS effective. Time = 8.19T/495T = 16.5ms per request. Throughput
    per H100 = 1000/16.5 = 60 req/sec. For 500 RPS: 500/60 = 8.3 H100s (raw compute). But with queuing:
    for M/M/1 queue, P95 latency = -ln(1-0.95) / (mu - lambda) where mu = service rate, lambda = arrival
    rate. For 95th percentile TTFT < 200ms and service time 16.5ms: need utilization rho < 1 - (16.5ms
    / 200ms) = 0.92 approximately. At rho=0.9: 9/0.9 = 10 H100s minimum. Add 20% headroom: 12 H100s. Use
    70B model: service time 10x longer, need 80-100 H100s for prefill pool.'
  common_mistake: Sizing the prefill pool based on average load without a queuing model. Average utilization
    of 80% sounds fine but at P95, queue depth causes TTFT to exceed SLO. Engineers omit the M/D/1 or
    M/M/1 queuing term from the sizing calculation.
  napkin_math: 'Assuming 8B model. Service time per request: 16.5ms. Target P95 TTFT: 200ms. M/M/1 queue:
    E[W] = rho / (mu * (1-rho)) where mu = 1/service_time. For E[W] + service_time < 200ms: rho/(60*(1-rho))
    + 1/60 < 0.2. rho/(60-60*rho) < 0.183. rho < 0.183*(60-60*rho). rho < 11 - 11*rho. 12*rho < 11. rho
    < 0.917. At 500 RPS: need mu > 500/0.917 = 545 RPS. At 60 RPS/H100: 545/60 = 9.1 H100s. Round up to
    10, plus 2 spare = 12 H100s.'
