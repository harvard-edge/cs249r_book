title: P99 vs P50 Divergence Under Load
scenario: Your LLM inference service on H100s reports a healthy P50 latency of 45ms
  but a P99 of 820ms — an 18× ratio. The team proposes adding more replicas. Why is
  P50-to-P99 divergence a poor signal for capacity planning, and what root causes
  should you investigate before scaling out?
question: Why is P50-to-P99 divergence a poor signal for capacity planning, and what
  root causes should you investigate before scaling out?
details:
  realistic_solution: 'The 18× ratio signals a multi-modal latency distribution, not
    simple overload. Investigate: (1) JIT recompilation — torch.compile graph breaks
    on rare input shapes cause 200-500ms spikes; (2) CUDA context switches when multiple
    models share a GPU; (3) PCIe contention from KV cache spills to host memory; (4)
    OS-level jitter — context switches, THP defragmentation, or NUMA-remote allocations.
    Profile with NVIDIA Nsight to correlate tail events with system interrupts. The
    fix is usually pinning CUDA contexts, pre-warming all input shapes, and disabling
    THP — not adding replicas.'
  common_mistake: Assuming the tail is caused by insufficient capacity. Adding replicas
    does not help if the tail comes from JIT compilation, GC pauses, cold cache misses,
    or NUMA-remote memory accesses — the same outlier causes will appear on new replicas.
  napkin_math: 'P50 = 45ms, P99 = 820ms. If 1% of requests hit a torch.compile recompilation
    at ~500ms + normal 45ms = 545ms, and another 0.5% hit NUMA-remote allocation adding
    300ms, the blended P99 is ~820ms. Adding 2× replicas: P99 stays ~820ms because
    the same code paths trigger on every replica. Fixing JIT warmup: P99 drops to
    ~120ms (3× improvement with zero cost).'
