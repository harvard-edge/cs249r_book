title: P99 vs P50 Divergence Under Load
scenario: Your LLM inference service on H100s reports a healthy P50 latency of 45ms but a P99 of 820ms — an 18× ratio. The team proposes adding more replicas.
question: Why is P50-to-P99 divergence a poor signal for capacity planning, and what root causes should you investigate before scaling out?
details:
  realistic_solution: 'The 18× ratio signals a multi-modal latency distribution, not simple overload. Investigate: (1) JIT recompilation — torch.compile graph breaks on rare input shapes cause 200-500ms spikes; (2) CUDA context switches when multiple models share a GPU; (3) PCIe contention from KV cache spills to host memory; (4) OS-level jitter — context switches, THP defragmentation, or NUMA-remote allocations. Profile with NVIDIA Nsight to correlate tail events with system interrupts. The fix is usually pinning CUDA contexts, pre-warming all input shapes, and disabling THP — not adding replicas.'
  common_mistake: |
    **The Pitfall:** Assuming the P99 tail is caused by insufficient capacity or queueing.
    **The Rationale:** In standard web services, high P99 usually implies CPU starvation or queue buildup.
    **The Consequence:** Adding expensive replicas that do not solve the tail latency, because the outliers are caused by JIT compilation, GC pauses, or NUMA accesses, not hardware scarcity.
  napkin_math: |
    - **Current Latency:** P50 = 45ms, P99 = 820ms.
    - **Outlier 1:** If 1% of requests hit a `torch.compile` recompilation (~500ms), total = 545ms.
    - **Outlier 2:** If 0.5% hit NUMA-remote allocation (adding 300ms), blended P99 is ~820ms.
    - **Scaling Out:** Adding 2× replicas leaves P99 at ~820ms because the exact same code paths trigger on the new replicas.
    - **Root Cause Fix:** Fixing JIT warmup and NUMA drops P99 to ~120ms (nearly 7× improvement with zero hardware cost).
