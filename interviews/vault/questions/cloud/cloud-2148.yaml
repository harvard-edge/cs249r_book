title: The Gradient Accumulation Trick
scenario: Your GPU can only fit a micro-batch of 4 samples due to memory constraints, but the training recipe requires an effective batch size of 256.
question: Without adding more GPUs, how do you achieve this effective batch size, and what is the computational cost?
details:
  realistic_solution: 'Use gradient accumulation: run 64 forward-backward passes with micro-batch 4, accumulating gradients in-place, then perform one optimizer step. The effective batch size is 64 x 4 = 256. The memory cost stays constant because you never store more than 4 samples of activations.'
  common_mistake: |
    **The Pitfall:** Assuming training is impossible without scaling out to more GPUs.
    **The Rationale:** Engineers equate effective batch size directly with memory capacity requirements.
    **The Consequence:** Unnecessarily provisioning extra hardware or erroneously reducing the batch size, which can destabilize model convergence.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Micro-batch size: 4.
       - Target effective batch size: 256.
       - 1 GPU available.
    2. **Calculations:**
       - Accumulation steps required = 256 / 4 = 64.
       - Time per optimizer step = 64 * (Forward + Backward time for 4 samples).
       - Memory footprint = constant (bounded by micro-batch 4).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Gradient accumulation achieves the target batch size with a constant memory footprint, but trades off wall-clock training time linearly.
