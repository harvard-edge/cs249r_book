title: The Gradient Accumulation Trick
scenario: Your GPU can only fit a micro-batch of 4 samples due to memory constraints, but your training
  recipe calls for an effective batch size of 256. Without adding more GPUs, how do you achieve this effective
  batch size, and what is the computational cost?
details:
  realistic_solution: 'Use gradient accumulation: run 64 forward-backward passes with micro-batch 4, accumulating
    gradients in-place, then perform one optimizer step. The effective batch size is 64 × 4 = 256. The
    cost: training time scales linearly — 64 micro-steps per optimizer step, meaning each weight update
    takes 64× longer than a single micro-batch iteration. The memory cost stays constant because you never
    store more than 4 samples of activations.'
  common_mistake: Assuming you need 64 GPUs to train with batch size 256, or that reducing batch size
    to 4 is acceptable despite known convergence issues at that scale.
  napkin_math: 'Micro-batch: 4 | Accumulation steps: 256/4 = 64 | Time per weight update: 64 × (forward
    + backward for 4 samples) | Memory: same as batch_size=4 | Throughput: 256 samples per update, but
    wall-clock time = 64× a single micro-step'
