title: Optimal Prefill Batch Size for TTFT
scenario: 'On an H100 SXM5 running prefill for a 13B parameter FP16 model (hidden dim 5120, 40 layers), you want to choose the batch size that maximizes GPU utilization without hurting TTFT.'
question: 'At what sequence length and batch size does the prefill become compute-bound versus memory-bandwidth-bound?'
details:
  realistic_solution: 'For attention and MLP layers combined in a transformer, the dominant operation is GEMMs. For a single forward pass with batch size B and sequence length S: FLOPs = 2 × N_params × B × S. Memory reads ≈ N_params bytes × 2 (FP16). The ridge point of H100 is ~295 FLOP/byte. Arithmetic intensity = FLOPs / bytes = (2 × 13e9 × B × S) / (26e9). For S=512 (prefill batch B=1): intensity = 512 FLOP/byte >> 295 → compute-bound. Crossover at intensity = 295: B×S ≈ 295. So prefill is compute-bound for any sequence ≥ 295 tokens at B=1.'
  common_mistake: |
    **The Pitfall:** Using total model size in the roofline instead of per-layer active parameters.
    **The Rationale:** Treating the forward pass as a black box instead of decomposing memory reads.
    **The Consequence:** Incorrectly optimizing memory pipelines when the system is actually compute-bound.
  napkin_math: |
    - **H100 Ridge Point:** 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte.
    - **FLOPs (B=1, S=512):** 2 × 13e9 params × 512 = 13.3 TFLOPs.
    - **Bytes (FP16 weights):** 13e9 × 2 bytes = 26 GB.
    - **Arithmetic Intensity:** 13.3e12 / 26e9 = 512 FLOP/byte.
    - **Status:** 512 > 295, so it is deeply Compute-Bound.
    - **Crossover S:** S* = 295 × (2 bytes × 13e9) / (2 × 13e9) = 295 tokens.
    - **Conclusion:** Prefill is compute-bound for any sequence ≥ 295 tokens at B=1.
