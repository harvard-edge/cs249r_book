title: The Quantization Catastrophe
scenario: You are the new Staff ML Systems Engineer at a major AI startup. The company's flagship product
  is a 175B parameter instruction-following LLM, served on clusters of H100 GPUs. User growth has been
  exponential, and you've hit a hard serving capacity wall. The VP of Engineering has mandated a 2x increase
  in throughput without increasing the GPU budget (a CapEx freeze).
question: "What strategy would you propose to get 2x throughput from INT8 while managing outlier activations and production distribution shift?"
details:
  realistic_solution: The core failure was a catastrophic impedance mismatch between the calibration data's
    narrow dynamic range and the production traffic's wide, spiky dynamic range. Activations in financial
    or code-related prompts contained outlier values far outside the range seen in the calibration text,
    leading to massive overflow/clipping errors in the INT8 representation. An L6+ proposal must create
    a system to manage this risk.
  common_mistake: A purely tactical answer like "we just need a better calibration set" is insufficient.
    While true, it doesn't constitute a strategy. An L6+ answer must propose a resilient system that can
    handle unknown future data distributions, not just a one-off fix. Another common mistake is to suggest
    abandoning quantization for a different technique like distillation; this avoids the hard systems
    problem posed in the question.
  napkin_math: 175B model in FP16 = 350GB weights. Fits across 5x H100 80GB GPUs (leaving 50GB for KV
    cache). Quantizing to INT8 reduces weights to 175GB, fitting on 3x H100s, freeing GPUs and doubling
    fleet capacity. However, narrow calibration sets missed outlier activations > 6.0 in FP16, which overflowed
    INT8 bounds, destroying accuracy.
