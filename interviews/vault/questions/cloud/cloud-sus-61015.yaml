title: Cross-Die Prefetching for LLM Decode
scenario: LLM decode on MI300X is memory-bandwidth-limited. Propose a cross-XCD prefetch strategy that
  hides Infinity Fabric latency for KV-cache access during autoregressive generation.
question: "How would you prefetch remote-XCD KV-cache blocks to hide Infinity Fabric latency during MI300X autoregressive decode?"
details:
  realistic_solution: 'Use speculative prefetch: during the compute phase of token T, launch async DMA
    transfers from remote XCDs for KV blocks of the top-K most likely next tokens (determined by logit
    distribution at T-1). With K=4 and speculation accuracy ~60%, ~60% of KV fetches arrive before decode
    begins. This overlaps 100ns Infinity Fabric latency with ~500µs compute for typical sequence lengths.'
  common_mistake: Using simple sequential prefetch (prefetch next token's KV block). Autoregressive decode
    with top-p sampling has unpredictable next-token positions, making sequential prefetch ineffective
    for KV indices.
  napkin_math: 'KV cache fetch latency: remote XCD 100ns + HBM access ~200ns = 300ns per KV block. Compute
    per token (attention + FFN): ~500µs for 70B model on MI300X. Prefetch overlap window: 500µs / 0.3µs
    = 1667 KV blocks can be prefetched during compute. Top-4 speculation: 4 × 300ns = 1.2µs prefetch cost
    vs 300ns × K miss penalty avoided.'
