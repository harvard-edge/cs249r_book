title: The Pipeline Bubble
scenario: 'You are designing a large-scale training cluster for a 1-trillion parameter MoE model that requires a hybrid of data, tensor, and pipeline parallelism.'
question: Which topology should you choose for the 1T-parameter MoE hybrid-parallel training cluster, and why?
details:
  realistic_solution: Option B, the NVLink 'super-node' topology, is superior. Pipeline parallelism requires passing large activation tensors between stages (e.g., from the GPUs in stage `i` to the GPUs in stage `i+1`). If these stages reside on different standard servers, the activation transfer must traverse the relatively slow InfiniBand network (~50 GB/s). If the stages are within a single NVLink 'super-node', the transfer happens over the ultra-fast NVLink fabric (~900 GB/s). By co-locating pipeline stages within a single NVLink domain, you dramatically reduce the transfer time, which directly minimizes the pipeline bubble and increases overall training efficiency.
  common_mistake: |
    **The Pitfall:** Assuming that all network traffic is equal and a standard fat-tree is sufficient for pipeline parallelism.
    **The Rationale:** Engineers might focus solely on the data parallelism `All-Reduce` pattern and forget about the large point-to-point activation transfers.
    **The Consequence:** Designing a topology that creates massive pipeline bubbles due to slow activation transfers between adjacent model stages.
  napkin_math: |
    1. Passing a 32GB activation tensor between pipeline stages over InfiniBand NDR (50 GB/s): 32GB / 50 GB/s = 640ms.
    2. Passing the same tensor over NVLink (900 GB/s): 32GB / 900 GB/s = 35ms.
    3. **Saving 605ms per micro-batch prevents massive pipeline bubbles.**
  options:
  - Topology A, because data parallelism requires all-to-all communication, which a fat-tree InfiniBand network is optimized for.
  - Topology B, because pipeline parallelism is bottlenecked by the point-to-point bandwidth between stages, which is maximized by keeping them within an NVLink domain.
  - Topology A, because it allows for more flexible placement of pipeline stages across a larger number of cheaper nodes.
  - It doesn't matter, as both topologies will be bottlenecked by GPUDirect RDMA when transferring data from the NIC to GPU memory.
  correct_index: 1
