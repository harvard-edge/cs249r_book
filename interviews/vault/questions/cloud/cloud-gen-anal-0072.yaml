title: OOM During Optimizer Initialization on A100
scenario: You are setting up mixed-precision training for a 7B parameter model on a single A100 GPU (80
  GB HBM2e, 2.0 TB/s bandwidth, 312 TFLOPS FP16). The model weights are loaded in FP16, taking up 14 GB.
  You initialize the AdamW optimizer to begin training. However, the script crashes with a CUDA Out of
  Memory (OOM) error during optimizer initialization, before the first forward pass even starts. Given
  that AdamW requires maintaining FP32 copies of the weights and two FP32 optimizer states (momentum and
  variance) per parameter, explain why the VRAM budget is exceeded when 66 GB of VRAM was seemingly free.
details:
  realistic_solution: The OOM occurs because standard mixed-precision training with AdamW maintains several
    FP32 arrays per parameter to ensure numerical stability during weight updates. Specifically, it keeps
    an FP32 master copy of the weights, along with FP32 momentum and variance states. Each of these three
    arrays requires 4 bytes per parameter, adding 12 bytes per parameter on top of the 2 bytes for the
    FP16 model weights. For a 7B parameter model, these FP32 states consume 84 GB of VRAM, which completely
    exhausts the 80 GB capacity of the A100 even before accounting for activations or gradients.
  common_mistake: Candidates often assume that activations or KV cache are the primary culprits for OOM
    errors, missing that the error happens before the forward pass. They frequently calculate the VRAM
    usage based only on the FP16 weights (14 GB) and underestimate the massive memory footprint required
    by the optimizer states in mixed-precision training.
  napkin_math: '- Model Weights (FP16): 7,000,000,000 parameters * 2 bytes = 14 GB

    - Master Weights (FP32): 7,000,000,000 parameters * 4 bytes = 28 GB

    - Optimizer Momentum (FP32): 7,000,000,000 parameters * 4 bytes = 28 GB

    - Optimizer Variance (FP32): 7,000,000,000 parameters * 4 bytes = 28 GB

    - Total VRAM required for initialization: 14 GB + 28 GB + 28 GB + 28 GB = 98 GB

    - Since 98 GB > 80 GB (A100 capacity), the system OOMs.'
