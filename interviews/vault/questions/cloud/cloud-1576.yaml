title: Evaluating Mini-Batch Size on A100
scenario: You are designing a training pipeline for a large MLP on an NVIDIA A100 GPU. The data science team insists on using a batch size of 16 to maximize the number of gradient updates per epoch and improve statistical convergence.
question: Is batch size 16 a good systems choice for the A100 MLP, and what batch size would better match the hardware?
details:
  realistic_solution: Increase the batch size to at least 256 (or 512) to shift the operation from memory-bound to compute-bound. This converts vector-matrix operations into matrix-matrix multiplications, raising the arithmetic intensity above the hardware's ridge point.
  common_mistake: |
    **The Pitfall:** Focusing solely on statistical efficiency while ignoring hardware utilization.
    **The Rationale:** Data scientists often prioritize convergence per epoch over wall-clock time per epoch, lacking visibility into the underlying hardware arithmetic intensity.
    **The Consequence:** Using small batches leaves the massive GPU compute units severely starved for data, wasting expensive accelerator resources on memory bandwidth bottlenecks.
  napkin_math: |
    - A100 Ridge point: 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte.
    - MLP Arithmetic Intensity (AI): AI ≈ Batch Size (B).
    - At B=16: AI ≈ 16 FLOPs/byte (which is < 156, deeply memory bound).
    - Max compute utilization: 16 FLOPs/byte * 2.0 TB/s = 32 TFLOPs (~10% utilization).
    - **Resolution: Increasing to B=256 ensures AI ≈ 256 FLOPs/byte (> 156), fully saturating the compute capability.**
