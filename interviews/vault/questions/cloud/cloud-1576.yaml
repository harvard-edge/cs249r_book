title: Evaluating Mini-Batch Size on A100
scenario: You are designing a training pipeline for a large MLP on an NVIDIA A100 GPU (312 TFLOPs FP16,
  2.0 TB/s HBM bandwidth). The data science team insists on using a batch size of 16 to maximize the number
  of gradient updates per epoch and improve statistical convergence. Evaluate this architectural decision
  from a systems perspective, detailing the hardware implications, and justify a mathematically optimal
  alternative batch size.
details:
  realistic_solution: Increase the batch size to at least 256 (or 512) to shift the operation from memory-bound
    to compute-bound. This converts vector-matrix operations into matrix-matrix multiplications, raising
    the arithmetic intensity above the hardware's ridge point.
  common_mistake: Focusing solely on statistical efficiency (convergence per epoch) while ignoring hardware
    arithmetic intensity, failing to realize that small batches leave the GPU starved for data and vastly
    underutilized.
  napkin_math: A100 ridge point = 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte. For a large MLP layer (XW),
    Arithmetic Intensity (AI) ≈ Batch Size (B). At B=16, AI ≈ 16 FLOPs/byte < 156 (severely memory bound).
    Max compute = 16 FLOPs/byte * 2.0 TB/s = 32 TFLOPs (10% utilization). Increasing to B=256 makes AI
    ≈ 256 FLOPs/byte > 156, allowing the GPU to achieve compute-bound peak performance.
