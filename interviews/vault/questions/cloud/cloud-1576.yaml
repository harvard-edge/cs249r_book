title: Evaluating Mini-Batch Size on A100
scenario: 'You are designing a training pipeline for a large MLP on an NVIDIA GPU. The data science team insists on using a batch size of 16 to maximize the number of gradient updates per epoch and improve statistical convergence.'
question: 'Is batch size 16 a good systems choice for the MLP, and what batch size would better match the hardware?'
details:
  realistic_solution: 'At batch size 16, the fully connected layers are essentially performing vector-matrix multiplications, completely starving the Tensor Cores. The arithmetic intensity is far below the hardware ridge point, rendering the GPU severely memory-bound. Increasing the batch size to at least 256 transforms the operation into dense matrix-matrix multiplications, saturating the compute units and massively increasing Hardware FLOPs Utilization (HFU).'
  common_mistake: |
    **The Pitfall:** Focusing solely on statistical efficiency while ignoring hardware utilization.
    **The Rationale:** Data scientists often prioritize convergence per epoch over wall-clock time per epoch, lacking visibility into the underlying hardware arithmetic intensity.
    **The Consequence:** Using small batches leaves the massive GPU compute units severely starved for data, wasting expensive accelerator resources on memory bandwidth bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * A100 specs: 312 TFLOPs compute, 2.0 TB/s bandwidth.
       * Ridge point = 312 TFLOPs / 2.0 TB/s = 156 FLOPs/byte.
       * MLP Arithmetic Intensity (AI) ≈ Batch Size (B).
    2. **Calculations:**
       * At B=16: AI ≈ 16 FLOPs/byte.
       * Max compute utilization: 16 FLOPs/byte * 2.0 TB/s = 32 TFLOPs (~10% utilization).
    3. **Conclusion & Interpretation:**
       * **Result: Increasing to B=256 ensures AI ≈ 256 FLOPs/byte (> 156), shifting the bottleneck and fully saturating compute.**
