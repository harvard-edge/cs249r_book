title: The MLPerf Division Dilemma
scenario: Your company is preparing its first MLPerf Inference submission. The hardware team wants to submit in the Open division because they can use aggressive INT4 quantization and a custom model variant that runs 3x faster. The ML team wants to submit in the Closed division because it demonstrates competitive performance on the reference model.
question: "Which MLPerf Inference division should the VP prioritize, Open or Closed, and why?"
details:
  realistic_solution: |
    Submit both, but prioritize Closed. The Closed division constrains the model architecture, preprocessing, and accuracy targets, meaning the only variables are hardware and low-level optimizations. Closed results are directly comparable across vendors. Open has value for showcasing software optimizations, but sophisticated customers rely on Closed for procurement.
  common_mistake: |
    **The Pitfall:** Choosing Open purely because "bigger numbers look better in the press release."
    **The Rationale:** Candidates misunderstand what sophisticated customers (hyperscalers) evaluate when reading MLPerf results.
    **The Consequence:** Generating press coverage but failing to provide the direct hardware comparisons needed to drive enterprise sales.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Closed effort: 4-8 engineer-months (kernel optimization).
       - Open effort: 2-3 months ML + 2-3 months kernel = 4-6 engineer-months.
    2. **Calculations:**
       - Engineering cost is roughly equal (~$100K-$200K).
       - Revenue impact: Top-3 Closed result drives ~$50-100M in pipeline. Open generates minimal direct pipeline.
    3. **Conclusion & Interpretation:**
       - **Result: Business-Bound.** The Closed division provides a massive asymmetric ROI for hardware sales.
  options:
  - Open division, because 3x faster INT4 quantization proves the hardware's superior raw compute capability.
  - Open division, because hyperscalers only care about the absolute lowest latency (3x faster).
  - Closed division, because it constrains models and allows direct hardware comparisons for procurement.
  - Closed division, because custom model architectures highlight specific tensor core advantages.
