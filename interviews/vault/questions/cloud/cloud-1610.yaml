title: Mitigating Black-Box Model Inversion on Health APIs
scenario: You are deploying a 1.2B parameter Transformer model for clinical readmission risk scoring via
  a public REST API. The API currently returns full FP32 confidence vectors across 500 risk categories.
  Security audits show that an attacker can execute a black-box model inversion attack by making ~50,000
  queries to reconstruct sensitive patient training data with 85% fidelity. You must evaluate and select
  a defense to protect the data while keeping API latency under 50ms and maintaining an absolute accuracy
  drop of less than 1.5%.
details:
  realistic_solution: Restrict the API output payload. Instead of returning the full FP32 probability
    distribution, return only the Top-3 categories and round the confidence scores to one decimal place
    (e.g., 0.8 instead of 0.812345). This breaks the numerical gradient estimation required for optimization-based
    inversion attacks while adding zero latency.
  common_mistake: Jumping immediately to retraining the model with DP-SGD (Differential Privacy), which
    severely degrades model utility (often >5% accuracy drop) and requires massive GPU compute overhead,
    or relying solely on IP-based rate limiting which fails against distributed botnets.
  napkin_math: Optimization-based inversion relies on estimating gradients ≈ [f(x+δ) - f(x)]/δ. If output
    is rounded to 0.1, a δ causing a true confidence shift of 0.04 yields 0 change in the API output.
    The attacker's gradient estimate becomes exactly 0. To bypass this, the attacker must randomly explore
    the space, increasing the required queries per step from O(d) to O(d / ε²). For d=500 and precision
    ε=0.1, the total API queries needed jumps from 5×10⁴ to 5×10⁶, effectively neutralizing the attack.
