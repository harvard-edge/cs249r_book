title: The Annual Maintenance Tax
scenario: You are scoping the Total Cost of Ownership (TCO) for a new, on-premise 16-GPU H100 server.
question: Based on industry rules of thumb, what is the approximate annual maintenance cost you should budget for this server, separate from power and operational costs?
details:
  realistic_solution: The standard industry rule of thumb for annual hardware maintenance is ~5% of the initial CapEx. This covers service contracts, non-warranty component swaps, and general upkeep. It's a critical part of the TCO calculation beyond the initial purchase.
  common_mistake: |
    **The Pitfall:** Planning budgets based solely on Day 0 CapEx.
    **The Rationale:** Engineers focus on the sticker price of the hardware and forget that enterprise support and component replacement are ongoing costs.
    **The Consequence:** Operations are underfunded, and the cluster falls into disrepair when parts fail out of warranty.
  napkin_math: |
    *   **GPU Cost:** 16 GPUs × $30,000 = $480,000 (ignoring chassis).
    *   **Industry Maintenance Rule:** ~5% of hardware CapEx annually.
    *   **Calculation:** $480,000 × 0.05 = **$24,000 per year for maintenance.**
  options:
  - ~$1,500
  - ~$4,800
  - ~$24,000
  - ~$84,000
  correct_index: 2
