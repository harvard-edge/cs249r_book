title: Tiered Inference for Video Doorbells
scenario: A battery-powered doorbell (5000mAh) must last 6 months. It sees 200 motion events/day. It has a PIR sensor (1mW), MCU (runs 50KB int8 person detection at 50mW for 200ms), and WiFi (500mW) connecting to Cloud Face ID (takes 2s).
question: How would you tier PIR, MCU person detection, and cloud Face ID so the 5000mAh doorbell lasts 6 months?
details:
  realistic_solution: |
    Implement a strict edge-to-cloud cascade. Level 0: PIR sensor monitors environment. Level 1: PIR triggers MCU to run the TFLite Micro person detection model. Level 2: Only if a person is detected with >80% confidence, the MCU wakes the WiFi chip, captures a high-res JPEG, and sends it to the cloud for heavy Face ID processing.
  common_mistake: |
    **The Pitfall:** Waking up the WiFi chip for every PIR trigger.
    **The Rationale:** Candidates design a standard cloud-connected IoT pipeline, forgetting the massive energy disparity between a local MCU and a WiFi radio.
    **The Consequence:** The doorbell battery dies in less than 3 weeks because it streams hundreds of false-positive motion events (trees blowing, cars passing) to the cloud.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 events/day.
    - Cloud-only: PIR wakes WiFi (500mW for 2s).
    - Cascaded: MCU (50mW for 0.2s) filters 90% false positives.

    **Calculations:**
    - Cloud-only Energy: 200 events * 2s * 500mW = 200 Joules/day.
    - Cascaded MCU Energy: 200 events * 0.2s * 50mW = 2 Joules.
    - Cascaded Cloud Transmit: 20 true events * 2s * 500mW = 20 Joules.
    - Total Cascaded Energy: 2 + 20 = 22 Joules/day.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound.** The cascaded pipeline reduces power by ~9x, enabling the 6-month battery life.
