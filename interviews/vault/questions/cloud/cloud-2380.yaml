title: Tiered Inference for Video Doorbells
scenario: A battery-powered doorbell (5000mAh) must last 6 months. It sees 200 motion events/day. It has
  a PIR sensor (1mW), MCU (256KB SRAM, runs 50KB int8 person detection at 50mW for 200ms), and WiFi (500mW)
  connecting to Cloud Face ID (takes 2s). Architect the tiered locality pipeline.
details:
  realistic_solution: 'Implement a strict edge-to-cloud cascade. Level 0: PIR sensor monitors environment.
    Level 1: PIR triggers MCU to run the TFLite Micro person detection model. Level 2: Only if a person
    is detected with >80% confidence, the MCU wakes the WiFi chip, captures a high-res JPEG, and sends
    it to the cloud for heavy Face ID processing.'
  common_mistake: Waking up the WiFi chip and streaming video to the cloud every time the PIR sensor triggers.
  napkin_math: 'Cloud-only (PIR wakes WiFi): 200 events * 2s * 500mW = 200 Joules/day. Cascaded: MCU filters
    out 90% false positives. 200 events * 0.2s * 50mW = 2 J. 20 true events * 2s * 500mW = 20 J. Total
    = 22 Joules/day. Power reduced by ~9x.'
