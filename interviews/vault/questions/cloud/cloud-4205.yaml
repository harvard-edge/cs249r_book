title: Feature Store Cost Optimization on H100 Clusters
scenario: Your organization spends $120K/month on feature store infrastructure: $40K on Redis (online), $50K on Spark (batch), and $30K on S3 (offline). You must cut costs by 40% without increasing serving latency. You evaluate replacing Redis with DynamoDB, moving Spark to spot instances, and pruning unused features.
question: How would you compare DynamoDB, spot Spark, and feature pruning to cut the $120K/month feature store spend by 40% without increasing latency?
details:
  realistic_solution: 'Evaluate each: (1) DynamoDB: on-demand pricing for 550K reads/s at 4KB items = $0.25/1M reads × 550K × 3600 × 24 × 30 = $356K/month — 9× more expensive than Redis. Provisioned: $47K/month with reserved capacity — marginal savings but adds tail latency (DynamoDB p99 ~10ms vs Redis ~2ms). Reject. (2) Spot instances for batch: Spark is fault-tolerant with checkpointing. Spot pricing = 60-70% discount on $50K = $30-35K savings. Risk: pipeline delays during spot interruptions. Mitigate with on-demand driver + spot workers. Save $30K. (3) Feature pruning: audit reveals 30% of features have zero importance across all models. Removing them saves 30% of compute ($15K), 30% of storage ($9K), and ~15% of Redis memory ($6K). Save $30K. Combined (2+3): Pruning saves $30K, leaving $35K for compute. Applying spot to the remaining $35K saves $21K. Total savings = $51K = 42.5% reduction. Meets target.'
  common_mistake: |
    **The Pitfall:** Choosing only one approach and trying to optimize it to the limit.
    **The Rationale:** Engineers often look for a single "silver bullet" infrastructure switch to solve cost problems.
    **The Consequence:** Failing to hit the 40% savings target, because aggressive single-axis optimization usually introduces unacceptable latency or stability trade-offs.
  napkin_math: |
    - **Target**: $120K × 40% = $48K savings required.
    - **DynamoDB Cost**: On-demand reads are ~9× more expensive than Redis; provisioned adds tail latency. Reject.
    - **Pruning Savings**: 30% pruning saves 30% compute ($15K), 30% storage ($9K), and ~15% Redis ($6K) = $30K total.
    - **Spot Savings**: Spark compute drops to $35K after pruning. Spot instances apply a 60% discount: $35K × 0.6 = $21K.
    - **Total Savings**: $30K (Pruning) + $21K (Spot) = **$51K saved**, meeting the $48K target.
