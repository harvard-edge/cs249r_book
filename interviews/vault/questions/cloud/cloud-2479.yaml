title: The Thermal Throttling Ticking Clock
scenario: A cloud-managed edge drone runs a continuous real-time tracking model. In the lab (22°C), inference runs at a stable 30 fps drawing 12W, which is under the SoC's 15W TDP limit. Deployed in the field (35°C ambient), the drone tracks perfectly for exactly 90 seconds, then framerate drops to 12 fps.
question: "Why does the framerate drop to 12 fps after exactly 90 seconds of tracking?"
details:
  realistic_solution: The issue is temperature-induced Dynamic Voltage and Frequency Scaling (DVFS) thermal throttling. Thermal Design Power (TDP) is the maximum heat a system can dissipate at a specific ambient temperature. Heat dissipation relies on the delta between chip temperature and ambient temperature. At 35°C ambient, the delta is smaller, so the heatsink cannot dissipate 12W of heat. The chip's temperature rises until it hits its critical threshold (e.g., 90°C) after 90 seconds. To prevent melting, the OS aggressively downclocks the NPU/GPU, drastically reducing framerate.
  common_mistake: |
    **The Pitfall:** Assuming a battery voltage drop causes the slowdown.
    **The Rationale:** Engineers blame power supply issues instead of calculating the heat dissipation limits in a higher ambient temperature.
    **The Consequence:** Adding bigger batteries instead of improving thermal management.
  napkin_math: |
    1. Lab heat dissipation capacity (22°C ambient, 85°C max): Delta is 63°C, handles 15W. k = 15/63 = 0.238 W/°C.
    2. Field dissipation limit (35°C ambient): Delta is 50°C. Max dissipation = 0.238 * 50 = 11.9W.
    3. Analyze thermal buildup: Model draws 12W, so heat accumulates over 90 seconds.
    4. Evaluate throttling: At 90°C, the OS downclocks the chip to ~6W, dropping fps.
    **Final Result: The drone cannot dissipate 12W at 35°C ambient, triggering thermal throttling.**
