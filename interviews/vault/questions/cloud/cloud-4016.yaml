title: Congestion Spreading in Multi-Rail ML Clusters
scenario: You are specifying the network architecture for a 4096-H100 cluster using an 8-rail topology (each GPU has 8 × 400G NICs connected to 8 independent network planes). A congestion event on Rail 0 must not affect traffic on Rails 1-7.
question: What rail-isolation requirements would prevent congestion on Rail 0 from degrading Rails 1-7 in the 4096-H100 8-rail cluster?
details:
  realistic_solution: 'Isolation requirements: (1) Physical layer: each rail uses completely independent switch ASICs — no shared buffer pools across rails. (2) Host side: pin each NIC to a dedicated PCIe root complex using NUMA-aware placement; on H100 SXM systems, each NIC connects via dedicated PCIe Gen5 x16 (64 GB/s). (3) Software: use per-rail NCCL communicators with independent progress threads, so a stalled rail doesn''t block others. (4) Implement per-rail ECN domains — CNP packets for Rail 0 congestion must not trigger rate reduction on Rail 1 flows. (5) Add per-rail health monitoring with automatic rail failover: if Rail 0 latency exceeds 2× baseline, redistribute its traffic across Rails 1-7 using NCCL''s multi-rail striping. The key specification: maximum cross-rail interference must be < 3% throughput degradation under single-rail congestion.'
  common_mistake: |
    **The Pitfall:** Assuming physical separation of rails guarantees isolation.
    **The Rationale:** Congestion can spread across rails through shared resources like PCIe bus contention at the host, shared CPU for control-plane processing, or application-level coupling where one slow rail blocks the AllReduce barrier for all rails.
    **The Consequence:** A single network link failure degrades the performance of the entire multi-rail cluster to the speed of the degraded link.
  napkin_math: |
    - 8 rails × 400Gbps = 3.2 Tbps per GPU.
    - Single rail failure: lose 400Gbps (12.5% of capacity).
    - With failover across 7 remaining rails: each rail carries 400/7 = 57 Gbps extra (14.3% increase per rail).
    - If rails are at 70% utilization normally (280 Gbps).
    - **Post-failover utilization = 337 Gbps (84.3%), still within safe operating range.**
