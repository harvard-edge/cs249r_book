title: Network Bandwidth Priority Inversion
scenario: A low-priority data prep job ($J_L$) holds an exclusive lock on a critical training dataset
  and is writing a 500GB processed chunk to a shared NVMe-oF storage array. A high-priority Llama-3 70B
  fine-tuning job ($J_H$) is submitted, requiring this lock to start, so it blocks waiting for $J_L$.
  Concurrently, 5 medium-priority model evaluation jobs ($J_M$) saturate the pod's 100 Gbps network switch,
  leaving only 10 Gbps (1.25 GB/s) for $J_L$. Calculate the effective delay experienced by $J_H$ and identify
  the scheduling anomaly.
details:
  realistic_solution: Implement Priority Inheritance Protocol (PIP) across network QoS. Temporarily boost
    $J_L$'s network priority to match $J_H$, allowing it to utilize the full 100 Gbps bandwidth (12.5
    GB/s) to finish the write in 40 seconds.
  common_mistake: Candidates calculate the baseline write time (40 seconds at 100 Gbps) and assume $J_H$
    only waits that long, missing that $J_M$ indirectly delays $J_H$ by starving $J_L$.
  napkin_math: 'Write time without PIP: 500 GB / 1.25 GB/s = 400 seconds. Write time with PIP: 500 GB
    / 12.5 GB/s = 40 seconds. By employing PIP, the $J_H$ delay is reduced by 360 seconds.'
