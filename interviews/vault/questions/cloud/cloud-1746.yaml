title: Network Bandwidth Priority Inversion
scenario: A low-priority data prep job ($J_L$) holds an exclusive lock on a critical training dataset and is writing a 500GB processed chunk to a shared NVMe-oF storage array. A high-priority Llama-3 70B fine-tuning job ($J_H$) is submitted, requiring this lock to start, so it blocks waiting for $J_L$. Concurrently, 5 medium-priority model evaluation jobs ($J_M$) saturate the pod's 100 Gbps network switch, leaving only 10 Gbps (1.25 GB/s) for $J_L$.
question: What delay does $J_H$ experience while $J_L$ writes 500GB at only 10Gbps, and what scheduling anomaly causes it?
details:
  realistic_solution: Implement Priority Inheritance Protocol (PIP) across network QoS. Temporarily boost $J_L$'s network priority to match $J_H$, allowing it to utilize the full 100 Gbps bandwidth (12.5 GB/s) to finish the write in 40 seconds.
  common_mistake: |
    **The Pitfall:** Calculating the baseline write time at full bandwidth and assuming $J_H$ only waits that long.
    **The Rationale:** Engineers overlook the indirect, transistive interference where $J_M$ starves $J_L$, which in turn blocks $J_H$.
    **The Consequence:** The severity of the priority inversion is masked, leading to severe, unexplained stalls for the most critical jobs in the cluster.
  napkin_math: |
    * Write time without PIP (at 1.25 GB/s): 500 GB / 1.25 GB/s = 400 seconds.
    * Write time with PIP (at 12.5 GB/s): 500 GB / 12.5 GB/s = 40 seconds.
    * **By employing PIP, the $J_H$ delay is reduced by 360 seconds (a 10x speedup).**
