title: Cloud New 0013
scenario: Deploying a 7B model to an autonomous vehicle edge cluster of Orin devices (275TOPS). Architect
  a compilation pipeline combining quantization and operator fusion to achieve real-time inference latency.
question: "How would you compile and optimize a 7B model for real-time inference on Orin devices with 275 TOPS?"
details:
  realistic_solution: Design an Ahead-of-Time (AOT) compiler pass using TensorRT. Apply INT4 weight-only
    quantization (AWQ/GPTQ) to compress the model to fit within the Orin memory bandwidth constraints.
    Architect an aggressive operator fusion pass that combines matrix multiplications with subsequent
    activation functions (e.g., SwiGLU) into single fused kernels. This minimizes intermediate memory
    accesses to the unified memory. Profile the fused graph and lock in the execution plan specifically
    for the Orin GPU.
  common_mistake: Deploying the FP16 model without memory-access optimizations, leading to severe memory
    bandwidth bottlenecks that completely starve the Orin compute cores.
  napkin_math: 7B model FP16 = 14GB. INT4 quantization reduces weights to ~3.5GB. Orin memory bandwidth
    is ~200GB/s. Reading 3.5GB takes ~17.5ms per token generation. 1/0.0175 = 57 tokens/sec, well within
    real-time thresholds for edge use cases.
