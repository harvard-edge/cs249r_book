title: Cloud New 0013
scenario: Deploying a 7B model to an autonomous vehicle edge cluster of Orin devices (275TOPS). Architect a compilation pipeline combining quantization and operator fusion to achieve real-time inference latency.
question: "How would you compile and optimize a 7B model for real-time inference on Orin devices with 275 TOPS?"
details:
  realistic_solution: |
    Design an Ahead-of-Time (AOT) compiler pass using TensorRT. Apply INT4 weight-only quantization (AWQ/GPTQ) to compress the model to fit within the Orin memory bandwidth constraints. Architect an aggressive operator fusion pass that combines matrix multiplications with subsequent activation functions (e.g., SwiGLU) into single fused kernels. This minimizes intermediate memory accesses to the unified memory. Profile the fused graph and lock in the execution plan specifically for the Orin GPU.
  common_mistake: |
    **The Pitfall:** Deploying FP16 models to edge devices without memory-access optimizations.
    **The Rationale:** Engineers rely purely on raw compute TOPS metrics, completely ignoring the severe memory bandwidth constraints of edge SoCs.
    **The Consequence:** Extreme memory bottlenecks starve the compute cores, entirely missing the autonomous vehicle's real-time latency deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model. FP16 = 14GB. INT4 = ~3.5GB.
       - Orin device memory bandwidth = ~200 GB/s.
    2. **Calculations:**
       - Memory load time (INT4) = 3.5 GB / 200 GB/s = 17.5ms per token.
       - Max theoretical throughput = 1 / 0.0175 = ~57 tokens/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. Aggressive INT4 quantization and kernel fusion pull the memory transfer time down to 17.5ms, ensuring real-time capabilities.
