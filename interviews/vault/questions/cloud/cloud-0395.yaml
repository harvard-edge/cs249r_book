title: The TCO Iceberg (cloud-0395)
scenario: You are evaluating the total economic footprint of a large-scale generative AI model (like a 70B parameter LLM) over a three-year production lifespan.
question: For a 70B LLM over a three-year production lifespan, which component typically represents the largest single share of the Total Cost of Ownership (TCO)?
details:
  realistic_solution: The cumulative cost of inference is almost always the largest part of the TCO. The cost of the GPU fleet, electricity, and network bandwidth required to maintain the serving SLOs for years far outweighs the one-time, massive cost of the initial training phase.
  common_mistake: |
    **The Pitfall:** Fixating on the high and visible upfront cost of the initial training run (CapEx).
    **The Rationale:** Engineers underestimate how the continuous, lower-margin costs of running inference (OpEx) accumulate over years.
    **The Consequence:** Misallocating the budget and failing to optimize the model for inference efficiency.
  napkin_math: |
    - **Training Cost:** A massive one-time CapEx (e.g., $10M).
    - **Inference Cost:** Continuous OpEx running 24/7 for 3 years (e.g., $5M/year).
    - **Result:** Cumulative inference ($15M) heavily outweighs the initial training CapEx ($10M).
  options:
  - The one-time capital expenditure (CapEx) for the initial training cluster.
  - The cumulative operational expenditure (OpEx) from running inference servers.
  - The salaries of the R&D and ML engineering teams who built the model.
  - The cost of acquiring and cleaning the multi-trillion token pre-training dataset.
  correct_index: 1
