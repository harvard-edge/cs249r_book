title: The Continuous Batching Deadline
scenario: You're designing an interactive LLM-based chatbot service running on H100 GPUs. The system uses
  continuous batching, where new user requests can be added to the processing queue between token generation
  steps. Your measurement team has determined that a single token generation step for the live batch takes
  a constant 150ms. Your service level objective (SLO) for user experience is a Time-To-First-Token (TTFT)
  of 500ms.
question: "What is the worst-case TTFT for a new request under continuous batching, and does it meet the 500ms SLO?"
details:
  realistic_solution: The worst-case scenario happens when a user's request arrives immediately after
    the server has started an iteration. The request must wait for that 150ms iteration to complete before
    it can be included in the next batch. Then, its own batch iteration takes another 150ms to generate
    the first token.
  common_mistake: A common mistake is to assume the TTFT is simply the processing time of a single step
    (150ms). This ignores the 'waiting in line' problem, where a request might arrive just after a batch
    has been kicked off, forcing it to wait for the entire next processing cycle before it can even begin.
  napkin_math: Iteration time = 150ms. In continuous batching, a new request waits for the current token
    generation step to finish. Worst-case queue wait = 150ms. Once added to the batch, generating its
    first token (prefill) takes another 150ms step. Total worst-case Time-To-First-Token (TTFT) = Queue
    Wait (150ms) + First Step (150ms) = 300ms.
  options:
  - The worst-case TTFT is 150ms, which meets the SLO. (Forgets wait time)
  - The worst-case TTFT is 650ms (500ms SLO + 150ms process), which violates the SLO. (Incorrectly adds
    SLO to calculation)
  - The worst-case TTFT is 300ms, which meets the SLO. (Correctly accounts for wait time + process time)
  - It's impossible to know without the number of users in the batch. (Incorrectly assumes iteration time
    depends on batch size)
  correct_index: 2
