title: Multi-Cluster GPU Federation Scheduling
scenario: 'Your organization has three GPU clusters: Cluster A (128 H100 in Region A), Cluster B (64 MI300X in Region B), and Cluster C (256 A100 in Region C).'
question: How would you design a federated scheduler to route jobs across the H100, MI300X, and A100 clusters based on job characteristics?
details:
  realistic_solution: 'Federated scheduler architecture: (1) Job classification layer: parse job requirements — model size (determines memory needs), precision (FP8 → H100 preferred), training vs inference, TP degree requirements, estimated runtime. (2) Hardware matching: H100: best for FP8 training, Transformer Engine workloads, and large-scale TP (NVSwitch). MI300X: best for memory-heavy workloads (192 GB HBM3), large KV caches for long-context inference, and bandwidth-bound operations (5.3 TB/s). A100: best for smaller models, fine-tuning, and cost-sensitive batch inference. (3) Routing rules: job.model_size > 100B → H100 or MI300X (need HBM capacity). job.precision == FP8 → H100 only. job.context_length > 32K → MI300X (largest memory). job.type == fine-tuning AND model_size < 13B → A100 (cheapest). (4) Load balancing: if preferred cluster is >80% utilized, overflow to next-best cluster with a cost multiplier warning. (5) Data locality: prefer cluster closest to training data storage to minimize data transfer time. Cross-cluster training (spanning clusters) is generally impractical due to WAN latency.'
  common_mistake: |
    **The Pitfall:** Treating all GPUs as strictly equivalent compute pools.
    **The Rationale:** Candidates focus entirely on aggregate FLOPS and ignore the massive differences in HBM capacity, interconnect topology, and precision support (e.g., FP8 on H100).
    **The Consequence:** Stranding large-memory inference jobs on multi-GPU setups while wasting top-tier compute accelerators on simple fine-tuning runs.
  napkin_math: |
    - 70B inference on MI300X: fits in 1 GPU (192 GB).
    - 70B inference on H100: requires TP=2 (2 × 80GB GPUs).
    - 70B inference on A100: requires TP=2 (2 × 80GB GPUs).
    - **Cost-per-query is heavily optimized by routing memory-bound decode tasks to the high-capacity MI300X.**
