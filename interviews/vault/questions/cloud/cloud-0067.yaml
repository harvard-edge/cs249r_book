title: The Static Batching Throughput Trap
scenario: You are operating a user-facing chatbot on a GPU. Your service has a strict P99 Time-To-First-Token (TTFT) SLA of 200ms. Your inference engine uses a simple static batching strategy. The time to run the prefill (prompt processing) stage for a batch of size `B` is dominated by memory operations and can be modeled as `T_prefill(B) = 50ms + 15ms * B`. After the prefill stage, the system generates one token for *every* request in the batch, and this decode step takes 10ms.
question: What is the largest static batch size that meets the 200ms TTFT SLA, and what token throughput does the 10ms decode step provide?
details:
  realistic_solution: The correct approach is to recognize that for a static batch, the time to the first token is determined entirely by the prefill stage for the whole batch. The SLA applies directly to this prefill time. Once the maximum batch size is found, the system throughput is the number of tokens generated per decode step (which is equal to the batch size) divided by the time for that step.
  common_mistake: |
    **The Pitfall:** Confusing the latency constraint (TTFT) with the throughput rate (decode time).
    **The Rationale:** Engineers incorrectly use the 10ms per-token decode time to calculate the batch size limit (e.g., 10ms * B <= 200ms).
    **The Consequence:** This leads to calculating a batch size of 20, which would actually take 50ms + 15ms * 20 = 350ms to start, grossly violating the 200ms TTFT SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA limits TTFT to 200ms.
       - T_prefill(B) = 50 + 15B.
       - Decode step takes 10ms.
    2. **Calculations:**
       - Solve for max B: 50 + 15B <= 200 -> 15B <= 150 -> B = 10.
       - Throughput at B=10: 10 tokens / 0.010 seconds = 1000 tokens/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Max batch is 10, achieving 1000 tokens/sec. Latency-Bound**
  options:
  - 'Max Batch: 20, Throughput: 2000 tokens/sec'
  - 'Max Batch: 13, Throughput: 1300 tokens/sec'
  - 'Max Batch: 10, Throughput: 1000 tokens/sec'
  - 'Max Batch: 10, Throughput: 100 tokens/sec'
  correct_index: 2
