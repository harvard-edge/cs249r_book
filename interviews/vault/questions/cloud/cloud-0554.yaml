title: The Amdahl Ceiling
scenario: We upgraded our CPUs to H100 GPUs, giving us a 500x speedup in raw matrix math. However, our
  end-to-end training throughput only increased by 20x. Where did the other 480x of our hardware investment
  go?
details:
  realistic_solution: The Acceleration Wall (Amdahl's Law). Hardware acceleration only speeds up the parallelizable
    fraction ($p$) of the workload. If data loading, KV-cache updates, or Python overhead take even 5%
    of the step time ($p=0.95$), your maximum theoretical speedup is capped at $1/(1-0.95) = 20\times$.
    The serial bottlenecks will always cap the parallel gains.
  common_mistake: '"The PCIe bus is bottlenecking the data transfer." PCIe can be a factor, but the issue
    is more fundamental.'
  napkin_math: '- Observed speedup = 20×. With S = 500× for the parallel fraction: 20 = 1 / ((1−p) + p/500).
    | - Solving: (1−p) + p/500 = 0.05 → 1 − p(1 − 1/500) = 0.05 → p = 0.95/0.998 ≈ 0.9519. Serial fraction
    = 4.8%. | - => Just 5% serial overhead (data loading, gradient sync, Python dispatch) caps total speedup
    at 20× regardless of GPU speed.'
