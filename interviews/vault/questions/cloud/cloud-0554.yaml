title: The Amdahl Ceiling
scenario: We upgraded our CPUs to H100 GPUs, giving us a 500x speedup in raw matrix math. However, our end-to-end training throughput only increased by 20x.
question: Where did the other 480x of our hardware investment go?
details:
  realistic_solution: The Acceleration Wall (Amdahl's Law). Hardware acceleration only speeds up the parallelizable fraction ($p$) of the workload. If data loading, KV-cache updates, or Python overhead take even 5% of the step time ($p=0.95$), your maximum theoretical speedup is capped at $1/(1-0.95) = 20\times$. The serial bottlenecks will always cap the parallel gains.
  common_mistake: |
    **The Pitfall:** Blaming hardware bottlenecks like the PCIe bus for poor end-to-end scaling.
    **The Rationale:** It's easier to blame data transfer speeds than fundamental algorithmic limitations.
    **The Consequence:** Missing the reality of the Acceleration Wall—if even a tiny fraction of the workload is serial, it dictates the maximum possible performance gain.
  napkin_math: |
    - **Amdahl's Law:** Max Speedup = $1 / ((1 - p) + p / S)$
    - **Given:** Observed Speedup = 20x. Parallel Speedup ($S$) = 500x.
    - **Equation:** $20 = 1 / ((1 - p) + p / 500)$
    - **Solving for $p$ (parallel fraction):** $1 - p + p/500 = 0.05 \rightarrow 1 - p(499/500) = 0.05 \rightarrow p \approx 0.9519$
    - **Serial Fraction:** $1 - p \approx 4.8\%$.
    - **Conclusion:** Just ~5% serial overhead (data loading, Python dispatch) strictly caps the total speedup at 20x, regardless of how fast the GPUs are.
