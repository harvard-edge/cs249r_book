title: Graceful Degradation for Large Language Models on AMD MI300X
scenario: You are leading the MLOps team for a critical online service powered by
  a large language model (LLM). This LLM is deployed on a cluster of AMD MI300X accelerators,
  each boasting 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory
  bandwidth. The service experiences highly variable traffic patterns, with unpredictable
  spikes, and occasional transient hardware issues (e.g., thermal throttling, minor
  interconnect glitches). Your objective is to design a graceful degradation strategy
  for this LLM inference service to maintain core functionality and responsiveness
  even under extreme stress or partial failures. How would you implement a degradation
  ladder, incorporate model fallbacks, ensure fail-operational behavior, and strategically
  shed quality-of-service to maximize user retention and revenue?
question: How would you implement a degradation ladder, incorporate model fallbacks,
  ensure fail-operational behavior, and strategically shed quality-of-service to maximize
  user retention and revenue?
details:
  realistic_solution: "A realistic solution would involve a multi-layered degradation\
    \ ladder. This could include: \n1. **Early Request Prioritization/Shedding:**\
    \ High-priority requests get preferential treatment; lower-priority or less critical\
    \ features (e.g., summarization vs. core Q&A) are shed first by returning a simplified\
    \ response or an error.\n2. **Batch Size Reduction:** Dynamically reducing the\
    \ inference batch size on the MI300X to reduce memory pressure and compute requirements,\
    \ thereby maintaining throughput for a larger number of individual requests, albeit\
    \ with slightly increased per-request latency. \n3. **Model Quantization/Pruning:**\
    \ On-the-fly switching to a slightly quantized (e.g., FP16 to INT8, utilizing\
    \ sparse compute capabilities if applicable for the model's sparsity patterns)\
    \ or a smaller, pruned version of the LLM that still fits within the 192 GB HBM3,\
    \ offering faster inference with a minor quality dip. \n4. **Fallback Models:**\
    \ If the primary MI300X cluster is severely degraded or unresponsive, routing\
    \ requests to a much smaller, pre-warmed, lower-fidelity LLM running on a general-purpose\
    \ CPU cluster or a different, less stressed GPU cluster. \n5. **Caching Aggressively:**\
    \ Increasing cache hit rates for common queries or intermediate results to reduce\
    \ the load on the LLM.\nMonitoring and observability are key to trigger these\
    \ degradation steps effectively based on MI300X utilization (HBM3 usage, compute\
    \ utilization, memory bandwidth), latency, and error rates. Fail-operational is\
    \ maintained by always attempting to return *some* response, even if it's a 'reduced\
    \ quality' or 'simplified' answer, rather than a hard error."
  common_mistake: A common mistake is to implement a binary failure model (either
    full service or complete outage) or to use overly simplistic degradation (e.g.,
    just increasing latency for all requests). Candidates might also overlook the
    specific hardware capabilities of the AMD MI300X, such as leveraging sparse compute
    for faster fallbacks or optimizing memory bandwidth usage during degradation.
    Another pitfall is not clearly defining metrics for each degradation step or failing
    to consider the user experience impact beyond raw latency/throughput.
  napkin_math: 'Primary LLM: 100GB HBM3, 10 req/s. Fallback: 50GB HBM3, 20 req/s. Both models fit in the 192GB HBM3. If traffic is 50% high-priority and 50% low-priority, shedding 20% of low-priority traffic means we serve 5 parts high-priority to 4 parts low-priority. If we process high-priority on primary and low-priority on fallback sequentially on the same MI300X, a batch of 9 requests takes (5 / 10) + (4 / 20) = 0.7 seconds. This yields an average throughput of 9 / 0.7 = 12.85 req/s (a ~28.5% capacity increase over the 10 req/s baseline). Alternatively, a 2x quantization reduces memory pressure, inherently resolving the HBM bottleneck and increasing capacity without shedding.'
