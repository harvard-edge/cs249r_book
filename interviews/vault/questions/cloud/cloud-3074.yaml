title: 'Queueing Theory Implement: Erlang-C for Inference Cluster Sizing'
scenario: Calculate the exact number of H100 servers needed to handle λ=200 req/s
  with P99 < 500ms SLO using M/M/c queuing. Each H100 serves Mistral-7B at μ=100 req/s
  (10ms mean service). Use the Erlang-C formula to find the minimum c with Erlang
  traffic intensity a=λ/μ=2 and find P(wait > 0) for your chosen c.
question: Using Erlang-C with λ=200 req/s and μ=100 req/s per H100, how many servers
  are needed for P99 < 500ms and what is P(wait>0)?
details:
  realistic_solution: 'a = λ/μ = 200/100 = 2 Erlangs. Minimum c must satisfy c > a=2,
    so c≥3. At c=3: ρ=a/c=2/3=0.667. Erlang-C P0 = [sum(a^n/n!, n=0 to c-1) + a^c/(c!*(1-ρ))]^-1.
    P0 = [1 + 2 + 2 + 4/(6*0.333)]^-1 = [5 + 2]^-1 = 1/7 = 0.143. P(wait>0) = Erlang-C(a,c)
    = (a^c * P0)/(c! * (1-ρ)) = (8 * 0.143)/(6 * 0.333) = 1.143/2 = 0.571. Mean wait:
    Wq = P(wait>0) / (c*μ - λ) = 0.571/(300-200) = 5.71ms. P99 ≈ 10ms + 5.71ms mean
    queue ≈ way under 500ms. c=3 H100s is sufficient.'
  common_mistake: Using M/M/1 with c servers modeled as one fast server (ignoring
    the statistical multiplexing benefit of M/M/c with multiple independent servers).
  napkin_math: 'a=2, c=3: ρ=0.667. P0: denominator = 1 + 2 + 2 + (8/6)/(1-0.667) =
    5 + 4 = 9. Wait: P0=1/9=0.111. P(wait) = (8*0.111)/(6*0.333) = 0.889/2 = 0.44.
    Wq = 0.44/(3*100-200) = 0.44/100 = 4.4ms. W = 4.4+10 = 14.4ms. P99 ≈ 4.6*14.4
    = 66ms << 500ms. Could use c=3 H100s. Cost: 3 * H100 ~$2/hr = $6/hr for 200 req/s.'
