title: Cloud Zero Optimizations L2 0
scenario: A colleague notes that standard data parallelism replicates the entire model on every GPU, which wastes memory.
question: How does ZeRO reduce the memory waste of standard data parallelism, and what do Stages 1, 2, and 3 shard?
details:
  realistic_solution: 'In standard data parallelism, every GPU holds a full copy of: model parameters (P), gradients (G), and optimizer states (OS). For AdamW, OS = 12 bytes/param (FP32 param copy + momentum + variance). For a 7B model: P=14 GB, G=14 GB, OS=84 GB → 112 GB per GPU — all replicated. ZeRO partitions these across N GPUs: Stage 1 partitions OS only → each GPU holds P+G+(OS/N) = 14+14+84/8 = 38.5 GB on 8 GPUs. Stage 2 partitions OS+G → P+(G+OS)/N = 14+98/8 = 26.25 GB. Stage 3 partitions P+G+OS → 112/8 = 14 GB per GPU. Each stage trades communication for memory savings.'
  common_mistake: |
    **The Pitfall:** Believing ZeRO optimization provides memory savings for free.
    **The Rationale:** It's often presented purely as a memory optimization tool in introductory material.
    **The Consequence:** Candidates fail to realize ZeRO-3 requires an all-gather of the full parameters before each forward/backward layer computation, heavily trading communication bandwidth for memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B parameter model in FP16/BF16: 14 GB parameters (P), 14 GB gradients (G).
       - Optimizer states (OS) for AdamW: 12 bytes/param = 84 GB.
       - Cluster size: 8 GPUs.
    2. **Calculations:**
       - Standard DP: P (14 GB) + G (14 GB) + OS (84 GB) = 112 GB per GPU.
       - ZeRO-1 (OS sharded): P (14 GB) + G (14 GB) + OS/8 (10.5 GB) = 38.5 GB per GPU.
       - ZeRO-2 (OS+G sharded): P (14 GB) + (G+OS)/8 (12.25 GB) = 26.25 GB per GPU.
       - ZeRO-3 (OS+G+P sharded): (P+G+OS)/8 = 112 / 8 = 14 GB per GPU.
    3. **Conclusion & Interpretation:** **ZeRO-3 requires 14 GB per GPU (Memory-Optimized, Communication-Bound).**
