title: Cloud Zero Optimizations L2 0
scenario: A colleague says 'standard data parallelism replicates the entire model on every GPU, which
  wastes memory.' Explain how ZeRO optimizations solve this and describe the three stages.
details:
  realistic_solution: 'In standard data parallelism, every GPU holds a full copy of: model parameters
    (P), gradients (G), and optimizer states (OS). For AdamW, OS = 12 bytes/param (FP32 param copy + momentum
    + variance). For a 7B model: P=14 GB, G=14 GB, OS=84 GB → 112 GB per GPU — all replicated. ZeRO partitions
    these across N GPUs: Stage 1 partitions OS only → each GPU holds P+G+(OS/N) = 14+14+84/8 = 38.5 GB
    on 8 GPUs. Stage 2 partitions OS+G → P+(G+OS)/N = 14+98/8 = 26.25 GB. Stage 3 partitions P+G+OS →
    112/8 = 14 GB per GPU. Each stage trades communication for memory savings.'
  common_mistake: Thinking ZeRO is free — it trades memory for communication. ZeRO-3 requires an all-gather
    of the full parameters before each forward/backward layer computation, adding communication volume
    proportional to model size.
  napkin_math: '7B model, 8 GPUs. Baseline per GPU: 14+14+84 = 112 GB (doesn''t fit A100 80 GB). ZeRO-1:
    14+14+10.5 = 38.5 GB. ZeRO-2: 14+12.25 = 26.25 GB. ZeRO-3: 112/8 = 14 GB. ZeRO-3 enables 8x larger
    models in same memory.'
