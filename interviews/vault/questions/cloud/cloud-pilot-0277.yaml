title: Topology Locality Wall In Expert Parallel Training
scenario: A 256-GPU MoE training job has the same number of GPUs before and after migration, but all-to-all latency doubles. The old cluster placed expert-parallel groups inside racks with full bisection. The new scheduler spreads each group across racks connected by an oversubscribed spine with 0.5 bisection fraction. Diagnose the binding wall.
question: Why does MoE all-to-all latency double after expert groups are spread across racks with 0.5 bisection bandwidth?
details:
  realistic_solution: The binding wall is locality/topology. The all-to-all communication pattern now crosses an oversubscribed inter-rack fabric whose effective bisection bandwidth is about half the old placement. For bandwidth-dominated all-to-all phases, halving effective bisection can produce roughly 2x latency, matching the observed regression. Same GPU count and same model do not imply same communication supply.
  common_mistake: Looking only at GPU count and per-link speed while ignoring bisection bandwidth and group placement.
  napkin_math: If an all-to-all phase is bandwidth dominated, cutting effective bisection from 1.0 to 0.5 can approximately double communication time. Real latency also depends on message size, radix, congestion, and routing.
