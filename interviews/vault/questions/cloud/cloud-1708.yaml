title: Evaluating PTQ Strategies for 70B LLM Serving
scenario: You are deploying a 70B parameter LLM for a high-throughput text summarization API on cloud instances equipped with 80GB A100 GPUs. In FP16, the model weights alone consume 140GB, requiring model parallelism across two GPUs. You need to reduce the serving cost by fitting the model on a single GPU using Post-Training Quantization (PTQ).
question: Should you use W8A8 or W4A16 PTQ to fit the 70B LLM on one 80GB A100 for high-throughput serving, and why?
details:
  realistic_solution: For LLM serving, W4A16 is generally superior. It compresses the 70B model to ~35GB, leaving ample room for the KV cache to support large batch sizes. While W8A8 provides higher compute throughput, the 70GB weight footprint severely limits the max batch size (due to OOM from KV cache), negating the compute advantage since the workload remains memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming W8A8 is strictly better because it accelerates both compute and memory access.
    **The Rationale:** Candidates fail to realize that autoregressive generation is heavily memory-bandwidth bound and KV-cache capacity constrained, meaning compute acceleration offers little benefit.
    **The Consequence:** The W8A8 model consumes so much memory that the KV cache is starved, limiting batch size and resulting in lower overall throughput than W4A16.
  napkin_math: |
    - **Baseline (FP16):** 140GB weights (requires 2× 80GB GPUs).
    - **W8A8 PTQ:** 70GB weights. Leaves only 10GB for KV cache on an 80GB A100.
    - **W4A16 PTQ:** 35GB weights. Leaves 45GB for KV cache.
    - **KV Cache per Token:** ~1MB (approximate for large batch/context).
    - **Throughput Comparison:** **W4A16 provides 4.5× more KV cache capacity (45GB vs 10GB), allowing for significantly larger batch sizes and much higher overall serving throughput.**
