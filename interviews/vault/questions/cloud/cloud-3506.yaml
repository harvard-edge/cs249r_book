title: Real-time Data Drift Detection for Transformer Models on NVIDIA A100 Architectures
scenario: 'You are tasked with deploying a critical, high-throughput transformer-based machine translation model in a cloud environment. You''re evaluating two deployment architectures for serving: Architecture Alpha utilizes 4 GPUs in a data-parallel fashion, while Architecture Beta employs 2 GPUs with model parallelism. Both architectures must maintain an average inference latency of under 50ms and process 10,000 requests per second. Recently, upstream data sources have shown signs of potential data drift. Compare and contrast how you would implement and monitor data drift using methods like Population Stability Index (PSI) or KL Divergence for each architecture.'
question: "How would you implement real-time PSI or KL drift detection for both serving architectures, and what are the trade-offs?"
details:
  realistic_solution: 'For both architectures, implement an asynchronous, sampling-based drift detection pipeline. On Architecture Alpha (data parallel), each GPU could periodically sample its ingress data, compute PSI/KL divergence against a dynamic baseline, and report metrics to a central monitoring system. For Architecture Beta (model parallel), a dedicated sampling component resides alongside the ingress layer, processing a subset of features before inference utilizing custom CUDA kernels. Automated alerts trigger model retraining, with thresholds tuned based on business impact.'
  common_mistake: |
    **The Pitfall:** Running overly complex statistical checks synchronously on every inference request.
    **The Rationale:** Candidates aim for perfect detection accuracy but fail to decouple the drift detection compute path from the critical serving path.
    **The Consequence:** Adding significant latency overhead that bottlenecks the high-throughput inference pipeline, causing immediate SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 req/s * 2KB/req = 20 MB/s total throughput.
       - 5% sampling rate.
    2. **Calculations:**
       - Sampled throughput = 1 MB/s.
       - For 4 GPUs, each processes 250 KB/s of sample data.
       - Computing PSI on 50 features over 15 MB/min requires < 1 GFLOP and < 50 MB/s bandwidth.
    3. **Conclusion & Interpretation:**
       - **Result: Asynchronous detection overhead is mathematically negligible (<0.001%) and will not impact the 50ms latency.** (Compute-Bound Asynchronous Offload).
