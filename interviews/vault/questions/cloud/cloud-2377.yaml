title: Cloud-Assisted Wake Word Pipeline
scenario: A smart speaker fleet must process continuous 16kHz audio for a wake word, then route to the cloud for intent parsing. The average power budget is < 20mW. The WiFi chip consumes 300mW active. The MCU consumes 15mW active and 1mW asleep. Cloud API latency is 500ms.
question: How would you split wake-word and intent processing between the MCU and the cloud to stay under the 20mW budget?
details:
  realistic_solution: |
    Implement a cascaded edge-to-cloud pipeline. The MCU runs a CMSIS-NN fixed-point wake word model locally. Duty cycle the MCU: buffer 30ms of audio, wake up for 5ms to run inference, and sleep. The WiFi chip remains completely powered off. Only upon local detection of the wake word does the MCU power up the WiFi chip, connect to the cloud gateway, and stream the audio buffer for complex NLP processing.
  common_mistake: |
    **The Pitfall:** Keeping the WiFi chip continuously connected or streaming raw audio directly to the cloud for wake-word detection.
    **The Rationale:** It's simpler to send all processing to the cloud, especially since cloud models are more accurate, without considering the massive power draw of continuous wireless transmission.
    **The Consequence:** The device draws over 300mW continuously, drastically violating the 20mW power budget and draining the battery in hours.
  napkin_math: |
    - **Continuous WiFi Power:** 300mW (Exceeds 20mW budget by 15x).
    - **Cascaded Approach:** Buffer 30ms of audio, wake MCU for 5ms to run inference, sleep for 25ms. WiFi is off.
    - **MCU Duty Cycle:** 5ms / 30ms = 16.6% active.
    - **Average Power:** (16.6% * 15mW) + (83.4% * 1mW) = 2.49mW + 0.83mW = ~3.3mW.
    - **Conclusion: ~3.3mW is well within the 20mW budget. WiFi is only powered on for brief spikes upon positive wake-word detection.**
