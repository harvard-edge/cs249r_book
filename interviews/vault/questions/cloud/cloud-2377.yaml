title: Cloud-Assisted Wake Word Pipeline
scenario: A smart speaker fleet (Cortex-M4, 256KB SRAM) must process continuous 16kHz audio for a wake
  word, then route to the cloud for intent parsing. Average power budget is < 20mW. The WiFi chip consumes
  300mW active. The MCU consumes 15mW active and 1mW asleep. Cloud API latency is 500ms. Architect the
  edge-cloud locality split.
details:
  realistic_solution: 'Implement a cascaded edge-to-cloud pipeline. The MCU runs a CMSIS-NN fixed-point
    wake word model locally. Duty cycle the MCU: buffer 30ms of audio, wake up for 5ms to run inference,
    and sleep. The WiFi chip remains completely powered off. Only upon local detection of the wake word
    does the MCU power up the WiFi chip, connect to the cloud gateway, and stream the audio buffer for
    complex NLP processing.'
  common_mistake: Keeping the WiFi chip continuously connected or streaming raw audio directly to the
    cloud.
  napkin_math: MCU active 16.6% (5ms/30ms) * 15mW + 83.4% * 1mW = 3.3mW avg. WiFi is off (0mW). Total
    avg power ~ 3.3mW, which is well below the 20mW limit. If WiFi was always on, 300mW > 20mW limit.
