title: Scaling Effective Batch Size via Accumulation
scenario: You are pre-training a 7B parameter model on a single node with 8x A100 GPUs using PyTorch DistributedDataParallel (DDP). To match the original paper's convergence properties, you require a target global batch size of 1024 sequences. Due to activation memory constraints (sequence length 4096), each GPU can only process a maximum micro-batch size of 4 sequences before throwing an Out Of Memory (OOM) error.
question: How many gradient accumulation steps are required to reach a global batch size of 1024, and how should the loss be scaled?
details:
  realistic_solution: Configure the training loop to perform 32 gradient accumulation steps. Divide the loss by 32 at each step before calling `.backward()` to ensure the summed gradients match the magnitude of a true batch size of 1024.
  common_mistake: |
    **The Pitfall:** Calculating accumulation steps based on a single GPU's capacity rather than the entire DDP group.
    **The Rationale:** A developer might naively divide the target batch size (1024) by the local batch size (4) to get 256 steps, forgetting that DDP aggregates gradients across all 8 GPUs. They might also forget to scale the loss.
    **The Consequence:** Extremely slow convergence due to artificially large effective batch sizes (8192), or gradient explosion if the loss isn't scaled properly.
  napkin_math: |
    * **Global Micro-Batch Size:** 8 GPUs × 4 sequences/GPU = 32 sequences
    * **Target Global Batch Size:** 1024 sequences
    * **Accumulation Steps:** 1024 / 32 = 32 steps
    * **Result:** **32 gradient accumulation steps are required, dividing the loss by 32 each step.**
