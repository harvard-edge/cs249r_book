title: Scaling Effective Batch Size via Accumulation
scenario: You are pre-training a 7B parameter model on a single node with 8x A100 (80GB) GPUs using PyTorch
  DistributedDataParallel (DDP). To match the original paper's convergence properties, you require a target
  global batch size of 1024 sequences. Due to activation memory constraints (sequence length 4096), each
  GPU can only process a maximum micro-batch size of 4 sequences before throwing an Out Of Memory (OOM)
  error. Calculate the exact number of gradient accumulation steps required to achieve the target effective
  batch size, and explain how the loss should be scaled.
question: "How many gradient accumulation steps are required to reach a global batch size of 1024, and how should the loss be scaled?"
details:
  realistic_solution: Configure the training loop to perform 32 gradient accumulation steps. Divide the
    loss by 32 at each step before calling `.backward()` to ensure the summed gradients match the magnitude
    of a true batch size of 1024.
  common_mistake: Calculating accumulation steps based on a single GPU's capacity rather than the entire
    DDP group (e.g., 1024 / 4 = 256 steps), or forgetting to divide the loss by the number of accumulation
    steps, leading to gradient explosion.
  napkin_math: Global micro-batch size across all GPUs = 8 GPUs * 4 sequences/GPU = 32 sequences per forward/backward
    pass. Target global batch size = 1024. Accumulation steps required = 1024 / 32 = 32 steps.
