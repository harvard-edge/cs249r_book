title: MoE Topology Oversubscription
scenario: You are designing an interconnect topology for a 64-GPU cluster (eight 8-GPU
  H100 nodes). Inter-node networking uses 400 Gbps (50 GB/s) InfiniBand. An MoE routing
  phase requires a 2 GB All-to-All exchange per GPU. The network team proposes a 2:1
  oversubscribed leaf-spine topology (each leaf connects 16 GPUs using 16 downlinks
  and 8 uplinks) to save costs, instead of a 1:1 non-blocking topology.
question: Evaluate the inter-node All-to-All latency for both the 1:1 and 2:1 topologies,
  and specify whether the 2:1 design meets a strict 50 ms communication SLO.
visual:
  kind: svg
  path: cloud-2850.svg
  alt: A two-tier leaf-spine network topology diagram showing 2 spine switches connected
    to 4 leaf switches, with each leaf switch connected to 2 compute nodes (8 GPUs
    each), illustrating a 2:1 oversubscription ratio.
  caption: 2:1 Oversubscribed Leaf-Spine Interconnect Topology
details:
  realistic_solution: In a 1:1 topology, each GPU sends 56/64 of its 2 GB (1.75 GB)
    inter-node. At 50 GB/s per NIC, this takes 35 ms, passing the SLO. In the 2:1
    design, each leaf connects 16 GPUs. Data leaving the leaf per GPU to other leaves
    is 48/64 * 2 GB = 1.5 GB. For the 16 GPUs on a leaf, that's 24 GB total traversing
    the 8 uplinks (400 GB/s total bandwidth). The transfer time is 24 GB / 400 GB/s
    = 60 ms, which fails the 50 ms SLO. Therefore, the 1:1 topology is required.
  common_mistake: Failing to account for the fraction of data that stays intra-node
    (7/64) or intra-leaf (8/64) when calculating the volume that must traverse the
    oversubscribed uplinks.
  napkin_math: 1:1 time = (1.75 GB) / 50 GB/s = 35 ms; 2:1 time = (16 * 1.5 GB) /
    (8 * 50 GB/s) = 60 ms
