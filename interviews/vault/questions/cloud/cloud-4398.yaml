title: Power Anomaly Detection for H100 Training Clusters
scenario: 'The ops team gets a page: GPU node h100-rack07-node04 is drawing 820W per GPU sustained—17% above the 700W TDP. No thermal throttling flags are set, training loss is progressing normally, and SMI shows no errors.'
question: Why might h100-rack07-node04 sustain 820W per GPU without errors, is it a fault, and what power thresholds should trigger escalation?
details:
  realistic_solution: 'Root cause candidates: (1) Power limit not explicitly set—H100 defaults to 700W limit via nvidia-smi -pl, but if unset or overridden, can boost to ~900W during Tensor Core-heavy phases. (2) Measurement artifact: PDU meter reading includes VRM and PCIe auxiliary power not in the GPU TDP spec. (3) Workload has exceptionally high arithmetic intensity (INT8 tensor operations) driving max boost. Check: nvidia-smi -q -d POWER to see current enforced limit. If limit = 700W but draw = 820W, likely PDU measurement includes other components. If limit = 900W (unconstrained), set -pl 700 immediately. Alert thresholds: >750W for >60s = investigate; >900W = page on-call immediately.'
  common_mistake: |
    **The Pitfall:** Treating TDP as an absolute maximum power ceiling.
    **The Rationale:** Candidates forget that H100 SXM5 can sustain up to ~900W in short bursts (boost clocks) if the power limit is not explicitly clamped.
    **The Consequence:** Unnecessary hardware replacements or panicking over expected boost behavior.
  napkin_math: |
    - **H100 SXM5 Spec:** TDP = 700W. Unrestricted boost \approx 900W.
    - **GPU Components:** Compute die \approx 550W, HBM3 \approx 100W, VRM \approx 50W, PCIe/NVLink \approx 50W. Total \approx 750W.
    - **Host VRM Overhead (PDU reading):** Adds 30-50W.
    - **Observed Draw:** 770W (GPU) + 50W (Host) = 820W.
    - **Result:** **820W is expected if the limit is uncapped. Capping at 700W will reduce PDU readings to ~730W.**
