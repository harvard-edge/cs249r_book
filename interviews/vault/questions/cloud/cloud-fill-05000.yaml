title: Roofline Ceiling Identification on H100 for Transformer MLP Blocks
scenario: You're profiling a GPT-4 style MLP block on an H100 SXM5. The GEMM has M=4096, K=4096, N=16384
  (FFN expansion). H100 peaks at 989 TFLOPS BF16 and 3.35 TB/s HBM3 bandwidth. You observe 412 TFLOPS
  measured throughput. Determine whether you're compute- or memory-bound and quantify the gap.
details:
  realistic_solution: Arithmetic intensity = 2*M*K*N FLOPs / bytes = 2*4096*4096*16384 / ((4096*4096 +
    4096*16384 + 4096*16384)*2) ≈ 2*274B / (134M + 537M + 537M)*2 ≈ 550B / 302MB ≈ 1,820 FLOPs/byte. Ridge
    point = 989e12/3.35e12 ≈ 295 FLOPs/byte. This GEMM is compute-bound. Gap = 989-412 = 577 TFLOPS, 58%
    efficiency loss — investigate tensor core utilization and tile sizing.
  common_mistake: Assuming large GEMMs are always compute-bound without checking arithmetic intensity
    against the ridge point.
  napkin_math: 'Ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte. This GEMM AI ≈ 1,820 FLOPs/byte
    > 295, so compute-bound. Theoretical max = 989 TFLOPS, achieved = 412 TFLOPS → 41.7% efficiency.'
