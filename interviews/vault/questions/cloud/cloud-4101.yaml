title: TP Scaling Efficiency Cliff
scenario: Plot the expected MFU (Model FLOP Utilization) as TP degree increases from 1 to 8 on H100 NVLink nodes for a 13B parameter model.
question: For a 13B model on H100 NVLink, how does MFU change from TP=1 to TP=8, and at what TP degree does efficiency drop sharply?
details:
  realistic_solution: |
    For a 13B model (hidden=5120, 40 layers, 40 heads): TP=1: Each GEMM is large ([batch, 5120] x [5120, 20480]), achieving near-peak Tensor Core utilization. MFU ~55-60%. TP=2: GEMMs halve in one dimension, still large enough for good utilization. Comms are tiny on NVLink. MFU ~52-55%. TP=4: GEMMs are 1/4 size. Still reasonable. MFU ~45-50%. TP=8: Each GPU handles [batch, 5120] x [5120, 2560] — the output dimension is only 2560. For small batch sizes, this GEMM becomes memory-bound (low arithmetic intensity). Meanwhile, 2 AllReduces per block x 40 blocks = 80 AllReduces per forward pass. MFU drops to ~30-35%. The cliff hits between TP=4 and TP=8 for 13B models because the GEMM dimensions shrink below the Tensor Core efficiency threshold (~4096 in the smallest dimension). Rule of thumb: TP is efficient when hidden_dim / TP >= 2048.
  common_mistake: |
    **The Pitfall:** Assuming linear scaling where doubling TP always halves time.
    **The Rationale:** Each GPU's GEMM shrinks (lowering arithmetic intensity) while communication stays constant, collapsing the compute-to-communication ratio.
    **The Consequence:** Over-sharding leads to massive MFU drops and wasted GPU hours.
  napkin_math: |
    - **13B Model:** hidden_dim=5120.
    - **TP Threshold Rule:** Efficient when hidden_dim / TP >= 2048.
    - **TP=4:** 5120 / 4 = 1280 (Borderline, MFU ~45-50%).
    - **TP=8:** 5120 / 8 = 640 (Well below threshold). GEMMs become memory-bound with 80 AllReduces per forward pass. MFU drops to **~30-35%**.
    - **Conclusion:** The efficiency cliff hits between TP=4 and TP=8.
