id: cloud-1672
title: Diagnosing Low Batch Size in Paged KV Cache
topic: kv-cache-management
status: published
provenance: imported
scenario: A cloud serving team is deploying an 8B parameter LLM on 80GB A100 GPUs using a custom Paged
  KV cache implementation. To minimize page table lookup overhead, they configure the KV cache block size
  to 1024 tokens. However, when serving their production workload—a mix of short chat interactions (averaging
  150 tokens) and long document summarizations (averaging 2000 tokens)—they observe frequent Out-Of-Memory
  (OOM) errors and a severely degraded maximum batch size. The model weights consume only 16GB. Diagnose
  the root cause of the memory bottleneck.
details:
  realistic_solution: The 1024-token block size creates massive internal fragmentation for the 150-token
    chat requests, wasting over 85% of the allocated block memory. The team must reduce the block size
    to 16 or 32 tokens, which drastically reduces internal fragmentation to under 5% while keeping kernel
    and page table overhead negligible.
  common_mistake: Assuming the memory bottleneck is due to external fragmentation or page table overhead,
    rather than identifying the severe internal fragmentation caused by a massive block size on short
    sequences.
  napkin_math: 'KV cache per token: 2 (K,V) * 2 bytes (FP16) * 32 layers * 32 heads * 128 dim = 512 KB/token.

    Block size = 1024 tokens * 512 KB = 512 MB per block.

    For a 150-token chat request: 1 block allocated (512 MB), but only 150 * 512 KB = 75 MB used.

    Wasted memory per sequence = 512 MB - 75 MB = 437 MB (85.3% internal fragmentation).

    If block size is reduced to 16 tokens (8 MB): 150 tokens uses 10 blocks (160 tokens allocated). Waste
    is only 10 tokens * 512 KB = 5 MB (6.2% internal fragmentation), safely allowing much larger batch
    sizes.'
