schema_version: 1
id: cloud-fill-02004
title: Head-of-Line Blocking in LLM Decode Queue on MI300X
topic: queueing-theory
status: published
provenance: imported
scenario: An MI300X (192GB HBM3, 5.3TB/s) serving a chat model shows excellent mean latency (80ms) but
  p99 of 2.1 seconds. Request mix is 80% short requests (10 tokens) and 20% long requests (2000 tokens).
  The queue is FIFO. Diagnose the head-of-line blocking problem and propose a fix.
details:
  realistic_solution: 'Long requests (2000 tokens, ~200ms service) block short requests (10 tokens, ~1ms
    service) at the queue head. With 20% long requests, expected blocking per short request = 0.2×200ms=40ms
    added latency. Use preemptive priority scheduling or separate queues: short-request queue (p99<10ms),
    long-request queue (p99<500ms). Alternatively, use continuous batching to interleave decode steps.'
  common_mistake: Assuming FIFO queuing is fair because it preserves arrival order; ignoring service-time
    variance causing HOL blocking.
  napkin_math: 'Short request service=1ms, long=200ms. FIFO: using the Pollaczek-Khinchine (P-K) mean
    value formula for M/G/1: E[Wq] = λ E[S²] / (2(1-ρ)). With mixed traffic (80% short 1ms, 20% long 200ms):
    E[S]=0.8×1+0.2×200=40.8ms, E[S²]=0.8×1+0.2×40000≈8001ms², ρ=40.8/1000≈0.04 (low utilization but high
    variance drives tail). Separate queues eliminate cross-class HOL blocking entirely.'
