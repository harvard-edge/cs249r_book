id: cloud-1787
title: Diagnosing Monolithic Accelerator Fab Rejection
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your AI hardware startup has designed a massive monolithic AI accelerator chip. To maximize
  on-chip SRAM capacity (1.2 GB) and minimize data movement for large language model inference, the design
  requires 1,250 mm² of silicon area. Despite the target 5nm process node having sufficient theoretical
  transistor density and your power delivery network being fully validated via simulation, the semiconductor
  foundry rejects the tapeout outright due to fundamental physical manufacturing limitations. Analyze
  the root cause of this rejection and determine the necessary structural architectural shift.
details:
  realistic_solution: The design exceeds the photolithographic reticle limit (typically ~858 mm², based
    on a 26mm x 33mm exposure field) of standard EUV scanners. The architecture must be fundamentally
    decomposed from a monolithic die into a multi-die chiplet design (e.g., four 312 mm² dies) interconnected
    via advanced packaging like a silicon interposer (e.g., TSMC CoWoS).
  common_mistake: Assuming the rejection is strictly due to uneconomical yield projections (defects per
    area) or thermal density limits, and attempting to slightly prune the SRAM to barely fit under 1,000
    mm² instead of realizing there is a hard physical ceiling.
  napkin_math: Standard ASML EUV scanner exposure field = 26 mm x 33 mm = 858 mm² maximum area. Proposed
    die area = 1,250 mm². Since 1,250 mm² > 858 mm², it is physically impossible to print the chip in
    a single photolithographic exposure pass.
