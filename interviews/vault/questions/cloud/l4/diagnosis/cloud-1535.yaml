schema_version: 1
id: cloud-1535
title: Diagnosing GEMM Tensor Core Underutilization
topic: roofline-analysis
status: published
provenance: imported
scenario: A team is profiling a custom Transformer model on NVIDIA A100 GPUs (312 TFLOPs FP16 peak). They
  notice two structurally similar matrix multiplications (GEMMs). The first has dimensions M=1023, K=4096,
  N=4096, while the second has M=1024, K=4096, N=4096. Profiling shows the first GEMM achieves only 45
  TFLOPs, while the second achieves over 200 TFLOPs. Both are executed via standard PyTorch mixed precision
  (FP16). Diagnose the root cause of this performance discrepancy.
details:
  realistic_solution: Analyze the Nsight Systems trace to inspect the cuBLAS kernel names. The M=1023
    dimension prevents optimal Tensor Core tile sizing (which requires multiples of 8 or 16 for FP16),
    forcing cuBLAS to use inefficient edge-case kernels or fall back to CUDA cores. The solution is to
    pad the M dimension to 1024 before the matrix operation and slice the output.
  common_mistake: Assuming the discrepancy is due to memory bandwidth saturation, CPU launch overheads,
    or thermal throttling, rather than structural dimension alignment requirements for hardware accelerators.
  napkin_math: GEMM1 (1023x4096x4096) has unaligned dims, dropping to CUDA cores. FLOPs = 2 * 1023 * 4096^2
    = 34.3 GFLOPs. At ~45 TFLOPS (FP16 no tensor core), it takes 34.3 / 45,000 = 0.76ms. GEMM2 pads M=1024
    (aligned for Tensor Cores). FLOPs = 34.36 GFLOPs. On A100 Tensor Cores running at ~200 TFLOPS effective,
    time = 34.36 / 200,000 = 0.17ms. Padding adds 0.1% FLOPs but yields a 4.5x speedup.
