schema_version: 1
id: cloud-r2-40054
title: GPUDirect RDMA Memory Registration Overhead
topic: rdma-transport
status: published
provenance: imported
scenario: Your NCCL-based training job on 128 MI300X GPUs shows 500ms of startup delay before the first
  AllReduce. Profiling reveals that NCCL is registering GPU memory regions with the RDMA subsystem. Each
  GPU registers 64 buffers of 32MB each for ring AllReduce double-buffering. Diagnose why memory registration
  is expensive and propose a mitigation.
details:
  realistic_solution: '524,288 MTT entries × 100ns = 52.4ms per GPU (not 6.7ms). Total startup: 52.4ms
    (MR) + 305ms (QP) ≈ 357ms amortized to ~500ms observed.'
  common_mistake: 'Treating memory registration as a simple pointer pass. RDMA memory registration involves:
    (1) pinning pages in physical memory (no swapping), (2) programming the HCA''s translation table (virtual
    → physical address mapping), and (3) for GPUDirect RDMA, establishing PCIe BAR mappings between GPU
    VRAM and HCA. Each step involves kernel calls and PCIe configuration space writes.'
  napkin_math: '64 buffers × 32MB × 8,192 pages each = 524,288 page table entries per GPU. 128 GPUs =
    67M total entries. At 100ns per MTT entry: 524,288 × 100ns = 52.4ms per GPU for MTT programming alone
    (not 6.7ms — 6.7ms would be 67,000 entries × 100ns or 52.4ms/7.8). QP setup: 1,016 QPs × 300μs = 305ms
    dominates. Total startup: ~500ms.'
