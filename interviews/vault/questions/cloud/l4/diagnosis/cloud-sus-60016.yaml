schema_version: 1
id: cloud-sus-60016
title: Diagnosing NaN gradients in a deep network with custom autograd operations
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: A team implements a custom signed distance function (SDF) layer for 3D shape learning on H100.
  After 500 training steps, gradients become NaN. The forward pass looks correct and loss values are normal.
  The custom backward involves computing 1/|∇f| (inverse gradient magnitude) which can be numerically
  unstable.
details:
  realistic_solution: 'Add an epsilon clamp in the backward: grad_magnitude = torch.clamp(torch.norm(input_grad,
    dim=-1, keepdim=True), min=1e-6). Use torch.autograd.set_detect_anomaly(True) to find the exact backward
    step producing NaN. Register a gradient hook on the custom function output to log max gradient magnitude
    per step. Consider replacing 1/|∇f| with the Eikonal loss formulation that penalizes |∇f|=1 without
    division.'
  common_mistake: Not handling the degenerate case where the gradient magnitude |∇f| approaches 0, causing
    division by zero in the backward pass. This is a silent bug because forward values are unaffected,
    but backward gradients explode when the SDF is evaluated near medial axis points where |∇f| ≈ 0.
  napkin_math: 'Probability of a random 3D point being within epsilon=1e-3 of the medial axis ≈ O(surface_area
    × epsilon). For typical shapes: ~1% of samples per batch. At batch=10000 samples: 100 degenerate points
    per step × gradient of ∞ → NaN propagates through the full batch gradient in ~500 steps.'
