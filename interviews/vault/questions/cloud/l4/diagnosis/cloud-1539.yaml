schema_version: 1
id: cloud-1539
title: Diagnosing Sequence Length OOM
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are debugging an Out of Memory (OOM) error while fine-tuning a 13B parameter LLM on a single
  8x A100 (80GB HBM) node. You are using ZeRO-1 to partition optimizer states. At a sequence length of
  2048 (batch size 2), training is stable. However, when increasing the sequence length to 8192 (batch
  size 1), the job crashes with a CUDA OOM error during the forward pass. Profiling shows parameter memory
  is stable, but activation memory spikes exponentially.
details:
  realistic_solution: Diagnose that the OOM is caused by materializing the O(S^2) attention matrix in
    HBM. Implement FlashAttention to keep intermediate attention logits in the GPU's SRAM (e.g., 192KB
    shared memory per SM) by computing block-by-block temporally, only writing the final O(S) output to
    HBM.
  common_mistake: Assuming the OOM is due to model parameters and unnecessarily applying ZeRO-3, or failing
    to recognize that standard self-attention activation memory scales quadratically and materializes
    in HBM.
  napkin_math: '13B params = 26GB (FP16). Gradients = 26GB. Optimizer states (FP32 master + momentum +
    variance) = 12 bytes/param × 13B = 156GB. ZeRO-1 shards this across 8 GPUs: 156GB/8 = 19.5GB. Total
    static per GPU = 26 + 26 + 19.5 = 71.5GB. Remaining HBM ≈ 8.5GB. For S=8192, 40 heads, 1 layer''s
    attention matrix requires: 8192 * 8192 * 40 * 2 bytes ≈ 5.3GB. Across 40 layers, this is ~212GB of
    HBM, instantly causing OOM. FlashAttention avoids this by allocating intermediate results to SRAM
    instead of HBM.'
