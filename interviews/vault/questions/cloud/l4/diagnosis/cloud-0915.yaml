id: cloud-0915
title: Diagnosing Sudden MMLU Score Spikes in LLM Pre-training
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is continually pre-training a 70B parameter LLM on a 500B token dataset containing
  a mix of internal code and recent web scrapes. After training on the latest 50B token partition across
  512 H100 GPUs, the model's 5-shot MMLU score inexplicably jumps from 68.2% to 75.4%, while HumanEval
  performance on internal coding tasks drops by 2%. The training loss curve remained stable. You must
  diagnose the root cause of this anomaly.
details:
  realistic_solution: Perform a decontamination analysis using exact 8-gram to 13-gram overlap or MinHash
    Jaccard similarity between the latest 50B token dataset and the MMLU test set. A 7% spike strongly
    indicates benchmark contamination in the recent web scrapes. Filter the corpus using a Bloom filter
    populated with benchmark n-grams before resuming training.
  common_mistake: Assuming the new data was exceptionally high quality or that the model experienced a
    sudden 'grokking' phase, without systematically investigating the divergence between public and internal
    benchmark metrics.
  napkin_math: The MMLU dataset contains ~14,000 questions averaging 50 tokens each, totaling ~700,000
    tokens. A naive string search against 50 billion tokens requires O(N*M) operations, or roughly 3.5e16
    comparisons. Using MinHash with 128 hash functions reduces this to O(N) linear time scanning with
    a manageable memory overhead of roughly 1MB per document signature.
