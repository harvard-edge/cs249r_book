schema_version: 1
id: cloud-1395
title: Debugging Intermittent Duplicate Features in Spot-Backed Pipelines
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are running a daily batch ETL pipeline processing 50TB of log data on 200 AWS Spot instances
  (r5.4xlarge) to generate training features for a recommendation model. Spot preemptions occur on ~15%
  of nodes daily, triggering Spark task retries. Downstream, the ML team reports that their model evaluation
  metrics are inexplicably fluctuating, and they've found duplicate user interaction records with different
  unique interaction IDs in the feature store. The pipeline uses a standard `uuid4()` function to assign
  primary keys to new user sessions. How do you diagnose the root cause and resolve this issue without
  disabling Spot instances?
details:
  realistic_solution: Diagnose that `uuid4()` is a non-idempotent transformation. When a task is retried
    due to Spot preemption, new UUIDs are generated for the same input records, causing downstream upsert
    logic in the feature store to treat them as net-new rows. The solution is to make the transformation
    idempotent by replacing UUIDv4 with a deterministic UUIDv5, generated by hashing immutable record
    attributes (e.g., `user_id` + `session_start_timestamp`).
  common_mistake: Candidates often assume the pipeline framework guarantees exactly-once processing and
    try to fix the issue by adding an expensive global deduplication step (e.g., `DISTINCT` or `dropDuplicates()`)
    at the end of the pipeline, which requires a massive network shuffle of the 50TB dataset.
  napkin_math: A global `DISTINCT` on 50TB across 200 nodes requires shuffling the entire dataset. Assuming
    10 Gbps network bandwidth per node, shuffling 50TB takes (50 * 8 * 1024) / (200 * 10) = ~205 seconds
    of pure optimal network transfer, plus significant disk spilling and sorting overhead, often doubling
    pipeline execution time. In contrast, deterministic hashing (MD5/SHA1 for UUIDv5) adds negligible
    CPU overhead (~microsecond per row) and requires 0 bytes of network shuffle.
