schema_version: 1
id: cloud-r2-43036
title: Membership Inference Attack Defense
topic: differential-privacy
status: published
provenance: imported
scenario: 'An auditor runs a membership inference attack (MIA) against your production LLM and achieves
  78% accuracy at distinguishing training data from non-training data (random baseline: 50%). The model
  was trained without DP. What does the 78% MIA accuracy tell you about memorization risk, and what epsilon
  would you need to reduce MIA accuracy to <55%?'
details:
  realistic_solution: 'MIA exploits the gap between training loss and test loss — overfit models assign
    lower loss to training examples. The 78% accuracy indicates significant memorization, particularly
    concerning for sensitive data. To bound MIA success: DP guarantees that for any individual sample,
    the model''s output distribution changes by at most a factor of e^ε when that sample is included vs
    excluded. MIA accuracy is bounded by: ACC ≤ 0.5 + 0.5 × (1 - e^(-ε)). For ACC < 55%: 0.55 = 0.5 +
    0.5(1 - e^(-ε)) → e^(-ε) > 0.9 → ε < 0.105. This is extremely tight — achieving ε ≈ 0.1 with DP-SGD
    typically destroys model utility. Practical middle ground: (1) DP-SGD with ε = 3-8 reduces MIA to
    55-60% while maintaining utility; (2) combine with deduplication (remove near-duplicate training samples,
    which are most vulnerable to MIA); (3) regularization (dropout, weight decay) reduces memorization
    without formal privacy guarantees but practically reduces MIA accuracy to 55-65%.'
  common_mistake: Treating MIA accuracy as a direct measure of privacy loss. A 78% MIA accuracy doesn't
    mean 78% of training data is memorized — it means the model's loss distribution differs measurably
    between training members and non-members (overfitting signal).
  napkin_math: 'MIA bound: ACC ≤ 0.5 + 0.5(1 - e^(-ε)). ε=0.1: ACC ≤ 54.8%. ε=1.0: ACC ≤ 81.6%. ε=3.0:
    ACC ≤ 97.5%. Wait — this means ε=3 allows MIA up to 97.5%? Yes, but practical MIA accuracy is always
    lower because the bound is worst-case. Empirically: ε=3 → MIA ~58%, ε=8 → MIA ~62%. Without DP: MIA
    78% (observed). With aggressive regularization alone: MIA ~60%. DP-SGD (ε=8) + regularization: MIA
    ~55%, training overhead: 5×.'
