schema_version: 1
id: cloud-1028
title: Diagnosing Depthwise Conv Underutilization
topic: neural-architecture-search
status: published
provenance: imported
scenario: Your team is migrating a MobileNet-style CNN pipeline to run high-throughput batch inference
  on cloud NVIDIA A100 GPUs (312 TFLOPs FP16, 2.0 TB/s HBM bandwidth). The profiler reveals that despite
  using a massive batch size of 256, the GPU's Streaming Multiprocessors (SMs) show <20% utilization during
  the depthwise convolution layers. Analyze the root cause of this underutilization.
details:
  realistic_solution: Diagnose that depthwise convolutions have a fixed, extremely low arithmetic intensity
    that does not scale with channel count or batch size. Compare this intensity to the A100's roofline
    ridge point to prove the operation is severely memory-bandwidth bound, inevitably leaving compute
    units idle.
  common_mistake: Assuming the low utilization is caused by a CPU data-loading bottleneck, kernel launch
    overhead, or insufficient batch size, missing the fundamental mathematical properties of the convolution
    operation itself.
  napkin_math: FLOPs for depthwise conv = 2 * H * W * C * K^2 * B. Bytes for FP16 (ignoring small weights)
    = Read In (2 * H * W * C * B) + Write Out (2 * H * W * C * B) = 4 * H * W * C * B. Arithmetic Intensity
    (AI) = FLOPs / Bytes = (2 * K^2) / 4 = K^2 / 2. For a 3x3 kernel, AI = 4.5 FLOPs/Byte. The A100 ridge
    point is 312 TFLOPs / 2 TB/s = 156 FLOPs/Byte. Since 4.5 << 156, the layer is heavily memory-bound.
