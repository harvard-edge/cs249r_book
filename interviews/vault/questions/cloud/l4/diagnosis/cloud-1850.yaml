id: cloud-1850
title: Diagnosing NVMe I/O Starvation in Vision Training
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training a Vision Transformer on an 8x A100 node. The dataset contains 14 million individual
  100KB JPEG images stored on a local enterprise PCIe Gen4 NVMe SSD, which is rated for 7.0 GB/s sequential
  read bandwidth. Despite this high-end hardware, your GPU utilization is stuck at 20%, and iostat shows
  the disk is only delivering ~400 MB/s. Why is the storage system failing to reach its advertised throughput,
  and how do you confirm the root cause?
details:
  realistic_solution: Diagnose the bottleneck as random I/O and filesystem metadata overhead. The advertised
    7.0 GB/s is for contiguous sequential reads. Reading millions of individual 100KB files forces the
    OS to perform expensive open() and stat() system calls for each image, degrading the SSD into an IOPS-bound
    state. Verify this by tracing system calls or checking IOPS in iostat. The fix is to pack the images
    into contiguous shards (e.g., WebDataset tarballs, TFRecords) to convert the workload into large block
    sequential reads.
  common_mistake: Candidates often blame CPU data augmentation bottlenecks, PCIe lane contention, or thermal
    throttling without recognizing the massive performance cliff between sequential and random I/O on
    tiny files.
  napkin_math: 'Random reads for 100KB files are bounded by system call overhead and IOPS. If the OS can
    handle 4,000 file opens/sec across data workers: 4,000 ops/sec * 100 KB/op = 400 MB/s. If packed into
    1GB sequential shards, the metadata overhead drops by a factor of 10,000. The workload becomes pure
    sequential reads, allowing 1MB+ block sizes that easily saturate the PCIe Gen4 limit of 7,000 MB/s.'
