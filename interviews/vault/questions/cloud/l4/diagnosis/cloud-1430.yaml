id: cloud-1430
title: Diagnosing P99 Inference Jitter from NIC Interrupts
topic: latency-decomposition
status: published
provenance: imported
scenario: You are running a real-time speech-to-text inference service on an 8-GPU A100 server equipped
  with dual 100Gbps NICs and NVMe storage. Despite a steady GPU execution time of 8ms, your p99 latency
  sporadically spikes to 25-30ms during heavy network activity. Profiling shows CPU submission threads
  feeding the GPUs are occasionally delayed. How do you root-cause and resolve this latency jitter?
details:
  realistic_solution: Implement interrupt shielding. Pin GPU inference CPU threads to isolated cores (e.g.,
    cores 16-63 via isolcpus), and configure IRQ affinity (smp_affinity) to route all NIC and NVMe hardware
    interrupts to dedicated housekeeping cores (e.g., cores 0-15).
  common_mistake: Focusing solely on CPU thread priorities (nice values) or thread pools without realizing
    that hardware interrupts (IRQs) from high-speed NICs bypass standard OS scheduling priorities and
    preempt application threads.
  napkin_math: A 100Gbps NIC handling 8M packets/sec with 50us interrupt coalescing generates 20,000 IRQs/sec.
    At 10us overhead per IRQ context switch, this steals 200ms of CPU time per second per core handling
    interrupts, directly preempting GPU launch threads and causing the 15-20ms latency spikes.
