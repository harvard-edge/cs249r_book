schema_version: 1
id: cloud-fill-03000
title: P99 Latency Spike Diagnosis on H100 Inference Cluster
topic: tail-latency
status: published
provenance: imported
scenario: Your H100 (80GB HBM3, 3.35TB/s) inference cluster serves a recommender model at 10K RPS. P50
  latency is 8ms, but P99 has crept to 180ms. The SLA requires P99 < 50ms. GPU utilization averages 72%,
  and you see occasional 2-3 second stalls in traces.
details:
  realistic_solution: 'Profile with nsys to identify the stall source: likely CUDA kernel launch overhead
    during dynamic batching, or host-side Python GIL contention. Implement micro-batching with a fixed
    batch timeout (5ms) and pin CPU threads to avoid GIL contention. Separate the P99 spike source from
    average load.'
  common_mistake: Immediately adding more replicas without diagnosing root cause — GPU stalls at 72% utilization
    suggest a synchronization or GC event, not capacity.
  napkin_math: At 10K RPS with P50=8ms, 80 requests are in-flight on average. A 2s stall every ~100s adds
    2000ms * (10K/100) = 200s of latency budget burned per second — this matches a P99 explosion. Stall
    frequency × duration > SLA headroom.
