schema_version: 1
id: cloud-1947
title: Off-Peak Latency Spikes in Static Batching
topic: batching-strategies
status: published
provenance: imported
scenario: 'A cloud translation service uses an A100 GPU with a strict static batching configuration: requests
  are dispatched when a batch size of 64 is reached or a 100ms timeout expires. During peak traffic (2000
  RPS), P99 latency is 95ms (well within the 120ms SLO). However, during off-peak hours (10 RPS), P99
  latency consistently spikes to 140ms, causing monitoring alerts. GPU compute and network I/O are negligible
  during off-peak. What is the root cause of this performance degradation under low load?'
details:
  realistic_solution: At 10 RPS, the system never reaches the batch size of 64 before the timeout. Consequently,
    every dispatch is triggered by the 100ms timeout. The first request in the queue waits the entire
    100ms. Combined with the baseline inference time, the total latency exceeds the 120ms SLO. The solution
    is to switch to dynamic batching or an adaptive timeout based on arrival rates.
  common_mistake: Candidates often attribute the issue to cold starts, GPU power state transitions (downclocking),
    or network jitter, missing the deterministic queuing delay caused by the static timeout.
  napkin_math: 'Peak (2000 RPS): Batch of 64 fills in (64 / 2000) = 32ms. Max wait (32ms) + Compute (60ms)
    = 92ms latency (meets 120ms SLA). Off-peak (10 RPS): Batch of 64 would take 6.4s to fill, hitting
    the 100ms timeout. Max wait (100ms) + Compute (40ms) = 140ms latency. The static 100ms timeout violates
    SLA during low traffic.'
