id: cloud-1300
title: Diagnosing CPU Inefficiency in Transformer Inference
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team is running a low-latency, batch-size=1 Transformer inference service on a fleet of
  dual-socket Intel Xeon Platinum 8480+ CPUs. The monitoring dashboard shows sustained 100% CPU utilization
  across all 112 cores per node, drawing nearly 700W. However, when you profile the application, you find
  that the actual achieved TFLOP/s is less than 5% of the CPU's theoretical peak FP32 performance, and
  the energy cost per token is unsustainably high. Analyze why the hardware is fully utilized yet delivering
  such poor computational efficiency for this dense matrix multiplication workload.
details:
  realistic_solution: Diagnose the issue as the 'generality tax'. CPUs spend ~91% of their energy on instruction
    fetch, decode, and control logic rather than actual arithmetic. A single FP32 FMA consumes ~10pJ but
    requires ~100pJ of control overhead. A systolic array amortizes one instruction over a 128x128 matrix
    multiply (16,384 MACs), reducing control overhead per MAC to <0.1%. For batch-size=1 Transformer inference,
    a systolic array or NPU is the correct architecture.
  common_mistake: Candidates often assume that 100% CPU utilization means the processing units are fully
    saturated with math operations, blaming memory bandwidth exclusively. In reality, the vast majority
    of energy and silicon area is consumed by the instruction processing pipeline, not useful computation.
  napkin_math: On a CPU, executing a single FP32 FMA might consume ~10pJ of energy, but the instruction
    fetch, decode, and register read/write to execute that FMA consumes ~100pJ. Energy spent on control
    = 100 / 110 ≈ 91% (Generality Tax). A systolic array amortizes one instruction over a 128x128 matrix
    multiply (16,384 MACs), reducing the control overhead per MAC to <0.1%.
