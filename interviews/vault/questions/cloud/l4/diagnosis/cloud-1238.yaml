schema_version: 1
id: cloud-1238
title: Diagnosing Model Exfiltration via HostPath
topic: model-size-estimation
status: published
provenance: imported
scenario: A proprietary 70B parameter LLM (FP16) is deployed on a multi-tenant Kubernetes cluster using
  8x A100 GPUs per node. To optimize cold start times, the model weights are cached on the node's local
  NVMe drives and mounted into the inference pods using `hostPath` volumes. The security team detects
  an anomalous network egress spike of exactly 10 Gbps originating from a seemingly benign, low-privilege
  tenant pod. This traffic burst lasts for approximately 2 minutes before the pod terminates itself. Diagnose
  the root cause of this anomaly and the specific mechanism of the vulnerability.
details:
  realistic_solution: The attacker compromised the tenant pod and exploited the poorly isolated `hostPath`
    mount (or a container breakout) to gain direct read access to the cached model weights on the host
    node. The 112-second egress spike perfectly matches the time needed to transfer the raw 140GB serialized
    safetensors files.
  common_mistake: Concluding the egress is an API-level extraction attack (like model inversion or distillation),
    failing to realize that standard API responses (text tokens) cannot generate over 100GB of traffic
    in two minutes.
  napkin_math: 'Model size: 70B parameters * 2 bytes/param (FP16) = 140 GB. Egress bandwidth: 10 Gbps
    = 1.25 GB/s. Exfiltration time = 140 GB / 1.25 GB/s = 112 seconds (~1.9 minutes).'
