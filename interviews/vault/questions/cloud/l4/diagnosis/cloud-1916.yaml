id: cloud-1916
title: SFU Bottlenecks in Custom Routing
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team deploys a novel Mixture of Experts (MoE) LLM on an NVIDIA A100 cluster. To improve
  expert routing, researchers replaced the standard Softmax with a custom gating function involving multiple
  division, exponential, and logarithm operations per token. Nsight Compute profiling reveals that despite
  doing $O(N)$ operations compared to the $O(N^2)$ MatMuls, this element-wise gating kernel has massive
  pipeline stalls, low warp occupancy, and takes up 35% of the total forward pass time. Diagnose the hardware-level
  bottleneck.
details:
  realistic_solution: The custom routing function heavily taxes the Special Function Units (SFUs) in the
    Streaming Multiprocessor (SM). SFUs execute transcendentals (`exp`, `log`, `sin`, `rcp`) but are provisioned
    at a much lower ratio than standard FP32/INT32 cores. The heavy concentration of these operations
    creates a structural hazard and instruction bottleneck. The solution is to rewrite the gating function
    using Taylor polynomial approximations (using standard multiply-adds) or fuse it into a hardware-optimized
    lookup table to bypass the SFU bottleneck.
  common_mistake: Candidates often assume that all element-wise $O(N)$ operations are strictly memory-bandwidth
    bound, ignoring the compute constraints of complex transcendental math on GPU hardware.
  napkin_math: An A100 SM partition has 16 FP32 cores but only 4 SFUs. Executing a standard FP32 instruction
    for a warp (32 threads) takes 32/16 = 2 cycles. Executing an SFU instruction takes 32/4 = 8 cycles.
    If the custom function uses 5 transcendentals, it requires 40 cycles per warp just in the SFU pipeline,
    causing massive instruction stalls and transforming a memory-bound kernel into a compute-bound one.
