id: cloud-0506
title: The Silent Padding Tax
topic: accelerator-comparison
status: published
provenance: imported
scenario: Your team is migrating an NLP workload from Nvidia A100s to Google TPU v4s to save costs. You
  are using a batch size of 15 and a hidden dimension of 768. XLA compiles the graph successfully, but
  the profiler shows the MXU (Matrix Multiply Unit) utilization is sitting at a dismal 11%. What is destroying
  your performance?
details:
  realistic_solution: TPUs are built around rigid, physical systolic arrays. The TPU v4 Matrix Multiply
    Unit (MXU) operates strictly on 128x128 tiles of bfloat16 numbers. If your tensor dimensions are not
    multiples of 128, XLA does not fail—it silently pads your tensors with zeros to make them fit the
    physical hardware grid. A batch size of 15 is aggressively padded up to 128, meaning the MXU is spending
    the vast majority of its time doing math on zeros, burning power and cycle time for nothing.
  common_mistake: '"Assuming that because the XLA compiler succeeds, the framework is efficiently mapping
    the math to the hardware just like CUDA does on a GPU."'
  napkin_math: Your actual workload per step requires `15 * 768 = 11,520` operations. The XLA compiler
    pads the batch size to the nearest MXU tile boundary, forcing the hardware to compute `128 * 768 =
    98,304` operations. You are achieving exactly `11,520 / 98,304 = 11.7%` utilization. The fix is to
    pad your batch size to 16 (for sub-tile optimization) or 128 to saturate the array.
