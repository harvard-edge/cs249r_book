schema_version: 1
id: cloud-1566
title: Diagnosing Observability OOM Cascades
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A Kubernetes cluster serving a transformer ranking model (10k QPS per pod on T4 GPUs) is experiencing
  cascade failures. The API pods are frequently evicted due to OOM errors, but GPU memory is stable at
  14GB/16GB. The team recently updated the Prometheus `inference_latency_seconds` histogram to include
  labels for `model_version` (3 variants), `client_platform` (4 types), `country_code` (195), and `tenant_id`
  (10,000 unique B2B clients). Why are the pods running out of memory, and how do you fix it?
details:
  realistic_solution: Identify that the high cardinality of the `tenant_id` label is causing Prometheus
    to create millions of unique time series in memory. Fix this by dropping `tenant_id` from the metric
    labels and moving high-cardinality tracking to structured logs or distributed trace exemplars.
  common_mistake: Focusing on the model's CPU memory footprint, dataloader memory leaks, or batch size,
    while ignoring the multiplicative explosion of time-series data generated by the monitoring sidecar.
  napkin_math: Total unique time series = 3 (version) * 4 (platform) * 195 (country) * 10,000 (tenant)
    = 23,400,000. At ~10KB RAM per active time series in Prometheus, this requires 23.4M * 10KB = 234
    GB of RAM, instantly exceeding standard pod memory limits.
