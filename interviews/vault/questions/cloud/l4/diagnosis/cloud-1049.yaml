id: cloud-1049
title: Diagnosing InfiniBand Scaling Bottlenecks
topic: collective-communication
status: published
provenance: imported
scenario: A distributed training team is scaling a MoE model across 64 GPUs using 400 Gbps InfiniBand
  (α = 1 μs, β = 50 GB/s). Profiling reveals they are performing millions of 10 KB AllReduce operations
  per step, resulting in poor scaling efficiency. The infrastructure team proposes upgrading to 800 Gbps
  switches to alleviate the bottleneck. As a Staff Engineer, analyze the root cause of this inefficiency.
details:
  realistic_solution: Analyze the bottleneck using the α-β model to show the workload is latency-bound.
    The 10 KB payload is below the critical message size, so upgrading to 800 Gbps will barely improve
    step time. Instead, implement tensor fusion (bucketization) to batch the 10 KB tensors into a single
    payload larger than the critical message size, shifting the operation into the bandwidth-bound regime.
  common_mistake: Candidates often assume that high frequency of communication implies a bandwidth bottleneck
    and agree with the hardware upgrade without calculating the critical message threshold.
  napkin_math: Critical Message Size (Nc) = α × Bandwidth = 1 μs × 50 GB/s = 10^-6 s × 50×10^9 B/s = 50,000
    bytes (50 KB). Payload (10 KB) < Nc (50 KB). Time per msg = α + (Payload / Bandwidth) = 1.0 μs + 0.2
    μs = 1.2 μs. Latency accounts for 83% of the time, so doubling bandwidth only speeds up the 0.2 μs
    portion.
