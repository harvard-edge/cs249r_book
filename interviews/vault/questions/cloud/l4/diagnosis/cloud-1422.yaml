id: cloud-1422
title: Diagnosing Input Stationary Bottlenecks in MLP Workloads
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team is porting a heavy DLRM recommendation model (MLP layers of 4096x4096s) to a legacy
  cloud inference accelerator designed for CNNs. The chip uses a strict Input Stationary (IS) dataflow
  in its 64x64 MAC systolic array, with 2MB of local SRAM. At a batch size of 256, profiling shows the
  800 GB/s DRAM bandwidth is fully saturated, but MAC utilization is a dismal 4%. Why is this specific
  dataflow causing the bottleneck, and how do you quantify the architectural mismatch?
details:
  realistic_solution: The Input Stationary architecture pins input activations in the MACs and streams
    weights. Since the 64x64 array only holds a tile of 64 inputs at once, a batch of 256 requires 4 passes.
    This means the massive 32MB weight matrix is redundantly loaded from DRAM 4 times per layer, thrashing
    bandwidth. The fix is to transpose the matrix formulation in software (switching inputs and weights)
    to trick the compiler into treating the massive weights as the 'stationary inputs'.
  common_mistake: Candidates often assume the problem is simply a 'memory-bound' matrix-vector multiplication
    without realizing that at Batch=256, the layer *should* be compute-bound. They fail to analyze how
    the IS dataflow forces catastrophic redundant loading of the weights.
  napkin_math: Weights = 4096 * 4096 * 2B (FP16) = 33.55 MB. Array holds 64 input tokens. Input tiles
    = B256 / 64 = 4. Weight data loaded from DRAM = 4 tiles * 33.55 MB = 134.2 MB per layer. Total compute
    = 2 * 256 * 4096 * 4096 = 8.59 GFLOPs. Arithmetic Intensity = 8,589,934,592 FLOPs / 134,217,728 Bytes
    = 64 FLOPs/Byte. At 800 GB/s bandwidth, max throughput = 800 * 64 = 51.2 TFLOPs/s, bottlenecking the
    chip to low single-digit utilization.
