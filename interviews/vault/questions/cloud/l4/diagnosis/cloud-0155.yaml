id: cloud-0155
title: The SLA Violation Cascade
topic: latency-decomposition
status: published
provenance: imported
scenario: You're designing a real-time transcription service with a strict P99 TTFT SLA of 300ms. On a
  single H100, the model's prompt processing and first token generation takes 200ms. During steady state,
  the service receives 30 requests per second. Your junior engineer provisions 5 H100s, arguing the total
  capacity (5 servers * 5 req/s/server = 25 req/s) is 'close enough' to the 30 req/s arrival rate. During
  a live test, the P99 latency spirals to over 1 second. Analyze this failure using queueing theory and
  determine the minimum number of GPUs required to reliably meet the SLA. Examine what happens to the
  queue if traffic spikes by just 20%.
details:
  realistic_solution: The analysis was flawed because it neglected queueing dynamics. A system's stability
    requires total service rate to be strictly greater than arrival rate. At 30 req/s arrival and 25 req/s
    total service rate, the system is unstable ($\\rho > 1$). The request queue will grow indefinitely,
    and latency will spiral to infinity.
  common_mistake: Sizing a system based on average arrival rate and service rate, ignoring the distribution
    of arrivals and the non-linear impact of system utilization on queueing delay. Engineers often forget
    that as utilization approaches 100%, wait times don't just increase linearly, they increase exponentially,
    causing a cascade of SLA violations. 'Close enough' to 100% utilization is a recipe for failure.
  napkin_math: 'Let''s formalize the analysis: | Service Rate per GPU ($\mu$): $1 / 200\text{ms} = 5$
    requests/sec. | Arrival Rate ($\lambda$): $30$ requests/sec.'
