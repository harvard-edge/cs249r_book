id: cloud-1333
title: Diagnosing Data-Dependent Control Flow Failures in JIT Compilation
topic: graph-compilation
status: published
provenance: imported
scenario: An ML serving team deploys a custom sequence-to-sequence model with data-dependent early exits
  on NVIDIA A100 GPUs. They initially compile the PyTorch model using tracing with a sample input sequence
  of length 32. However, production monitoring shows the model silently failing by executing exactly 32
  decoding steps for all inputs, regardless of when the <EOS> token is actually generated. Diagnose why
  tracing caused this specific failure and analyze how Graph Scripting resolves this by preserving the
  control flow in the Intermediate Representation (IR).
details:
  realistic_solution: Tracing only records the exact operations executed during the sample forward pass,
    permanently unrolling loops to a fixed length and discarding unvisited branches. Graph Scripting solves
    this by statically analyzing the Python Abstract Syntax Tree (AST) to emit an IR containing native
    control flow primitives (e.g., prim::Loop, prim::If), allowing the compiled graph to dynamically evaluate
    conditions at runtime.
  common_mistake: Candidates often confuse dynamic tensor shapes with dynamic control flow, incorrectly
    assuming tracing failed due to dimension mismatches rather than the complete loss of loop constructs
    and conditional branches in the flattened execution graph.
  napkin_math: For a sequence model generating N tokens, tracing produces a flattened linear graph of
    size O(N * ops_per_step) for the specific sample N. Graph Scripting produces a cyclic graph of size
    O(ops_per_step) with minimal control flow overhead, preserving the dynamic O(N) runtime execution.
