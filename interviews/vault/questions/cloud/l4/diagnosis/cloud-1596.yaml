schema_version: 1
id: cloud-1596
title: Diagnosing Dynamic Ensemble Latency on A10G
topic: model-size-estimation
status: published
provenance: imported
scenario: A visual QA API uses a dynamic routing ensemble of 3 specialized Vision-Language Models (8GB
  FP16 each) and a 2GB gating model, deployed on AWS g5.xlarge instances (single A10G 24GB VRAM). The
  gating model selects one specialized model per request. During a period of highly mixed traffic, P99
  latency spikes from 45ms to 685ms, while GPU compute utilization plummets to 20%.
details:
  realistic_solution: The total ensemble size (26GB) exceeds the 24GB VRAM, causing PCIe swapping. Apply
    INT8 quantization to halve model sizes to 4GB, fitting all 14GB in VRAM, or deploy on multi-GPU instances
    with pinned models.
  common_mistake: Assuming the models are executing sequentially or that the GPU lacks compute power,
    suggesting an upgrade to an A100 instead of diagnosing the memory thrashing.
  napkin_math: Total VRAM required = 3x 8GB experts + 2GB router = 26GB. A10G VRAM limit = 24GB, forcing
    model swapping. PCIe Gen4 x16 provides 32 GB/s theoretical, ~25 GB/s effective. Swapping an 8GB model
    requires evicting 8GB and loading 8GB. Total transfer = 16GB. 16GB / 25 GB/s = 640ms data movement
    overhead. Total latency = 45ms compute + 640ms swap = 685ms, breaking real-time SLA constraints.
