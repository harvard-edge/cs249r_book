schema_version: 1
id: cloud-sus-63048
title: Disparate Impact Testing for LLM Embedding Spaces
topic: fairness-evaluation
status: published
provenance: imported
scenario: 'An embedding model is used for resume screening: candidates are ranked by cosine similarity
  of their resume embedding to a job description embedding. A legal team raises concerns about disparate
  impact. You measure average cosine similarity for Group A (majority) = 0.81 and Group B (minority) =
  0.74. The EEOC 4/5ths rule requires the selection rate of the protected group to be at least 80% of
  the majority group. If you rank the top 20% of 10,000 candidates, estimate the selection rates for each
  group assuming Gaussian similarity distributions (std=0.06) and determine whether the system violates
  the 4/5ths rule.'
details:
  realistic_solution: 'Estimate the selection threshold for top 20% of the combined population. Combined
    mean approx 0.78, std 0.06. 80th percentile: 0.78 + 0.842*0.06 = 0.831. Group A selection rate: P(X
    > 0.831 | mean=0.81, std=0.06) = P(Z > 0.35) = 36.3%. Group B selection rate: P(X > 0.831 | mean=0.74,
    std=0.06) = P(Z > 1.517) = 6.5%. Disparate impact ratio: 6.5/36.3 = 17.9% — far below the 80% threshold.
    The system has severe disparate impact despite appearing acceptable by mean score comparison. Fix
    options: (1) group-conditional thresholds calibrated so each group selects 20% of its own distribution,
    (2) audit the job description embedding for demographic bias using WEAT (Word Embedding Association
    Test), (3) retrain embeddings with adversarial debiasing loss that penalizes demographic predictability
    from the embedding space.'
  common_mistake: Applying the 4/5ths rule to mean similarity scores directly. The ratio 0.74/0.81 = 91%
    looks acceptable. But the 4/5ths rule applies to selection rates (fraction of each group selected),
    not to mean scores. A small difference in means can cause severe disparate impact at a fixed selection
    threshold.
  napkin_math: 'Group A: P(Z > (0.831-0.81)/0.06) = P(Z > 0.35) = 36.3%. Group B: P(Z > (0.831-0.74)/0.06)
    = P(Z > 1.517) = 6.5%. 4/5ths: 6.5/36.3 = 17.9%. Selections from 5000 per group: A=1815, B=325. Representation
    in selected pool: A=84.8%, B=15.2% vs 50/50 population. Group-conditional threshold fix: each group
    uses its own 80th-percentile threshold (A=0.861, B=0.791). Each group selects exactly 20% of its members.
    No disparate impact by construction. Cost: requires demographic labels for threshold calibration.'
