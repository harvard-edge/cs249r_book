id: cloud-1268
title: Diagnosing Bisection Bandwidth Drops in a GPU Cluster
topic: interconnect-topology
status: published
provenance: imported
scenario: You are debugging a performance regression in a 4,096-GPU training cluster (using NVIDIA H100s)
  connected via a 3-tier fat-tree topology using 64-port 400Gbps switches. The network is physically designed
  for 1:1 non-blocking bisection bandwidth. During the all-to-all communication phase of a large Mixture-of-Experts
  (MoE) model training run, the effective bisection bandwidth across the core switches drops to roughly
  50-60% of the theoretical maximum, whereas within-pod communication (leaf to spine) maintains near 100%
  bandwidth. Hardware diagnostics confirm there are zero dead links or failed core switches. What routing-level
  architectural issue in the fat-tree network is causing this specific bottleneck?
details:
  realistic_solution: The root cause is ECMP (Equal-Cost Multi-Path) hash polarization causing flow collisions.
    ML all-to-all operations generate a small number of massive, long-lived 'elephant flows'. Standard
    static 5-tuple ECMP routing maps multiple heavy flows onto the same uplinks, causing queue congestion
    while other valid uplinks remain completely idle. The solution is to enable Adaptive Routing (AR)
    or packet-level spraying (e.g., in InfiniBand or modern RoCEv2 fabrics) to dynamically distribute
    the load across all available paths in the fat-tree.
  common_mistake: Assuming a hardware failure, optical transceiver degradation, or incorrectly blaming
    structural oversubscription without realizing that a 1:1 fat-tree network inherently has no physical
    oversubscription.
  napkin_math: If a spine switch has 32 uplinks to the core tier and is routing N massive flows, static
    ECMP behaves like a 'balls into bins' probability problem. The maximum loaded link receives approximately
    O(log N / log log N) flows, meaning some links carry 2-3x the average load while others carry 0. This
    statistical collision limits effective aggregate throughput to ~50-60% of capacity (e.g., 200-240
    Gbps out of a theoretical 400 Gbps).
