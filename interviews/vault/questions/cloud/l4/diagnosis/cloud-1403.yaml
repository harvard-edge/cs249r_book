id: cloud-1403
title: Imperative Scheduling Topology Constraints
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: An LLM training team submits an imperative scheduling request for 64 A100 GPUs, strictly specifying
  an exact topology of 8 physical nodes with 8 GPUs each to maximize intra-node NVLink bandwidth. The
  cluster telemetry reports 100 idle A100 GPUs currently distributed evenly across 25 nodes (4 idle GPUs
  per node). Despite the cluster having 100 idle GPUs (which is greater than the 64 requested), the job
  remains stuck in a 'Pending' state indefinitely, and cluster utilization drops. Analyze why the imperative
  resource manager fails to allocate the requested resources.
details:
  realistic_solution: Imperative schedulers directly allocate exactly what is requested without altering
    the workload's specified shape. Because the user explicitly required 8 GPUs per node, and the maximum
    available on any single node is 4, zero nodes qualify. The job is blocked by cluster fragmentation.
    To resolve this, the team must analyze cluster fragmentation and either drain nodes to free up full
    8-GPU blocks, or refactor the job to use an elastic/declarative approach (e.g., PyTorch Elastic) capable
    of dynamically running on 4-GPU topologies.
  common_mistake: Candidates often assume the scheduler will automatically partition the 64 GPU request
    across the 25 partially idle nodes (e.g., allocating 16 nodes with 4 GPUs each), failing to recognize
    that imperative schedulers rigidly enforce exact node-level resource requests.
  napkin_math: 'Request: 8 nodes @ 8 GPUs/node = 64 GPUs. Cluster availability: 25 nodes @ 4 idle GPUs/node
    = 100 total idle GPUs. Scheduler constraint check: Idle GPUs per node (4) >= Requested GPUs per node
    (8). Since 4 >= 8 is False, Viable nodes = 0. Allocation fails despite 100 > 64.'
