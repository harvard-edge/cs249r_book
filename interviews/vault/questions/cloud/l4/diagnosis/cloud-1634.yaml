schema_version: 1
id: cloud-1634
title: Diagnosing Tail Latency in RESTful Image Serving
topic: collective-communication
status: published
provenance: imported
scenario: Your team deployed a ResNet-50 image classification model as a networked microservice using
  a Python REST API (FastAPI) on an AWS g4dn.xlarge (T4 GPU). Clients send raw 224x224x3 FP32 tensors
  encoded as Base64 JSON arrays. The model inference time is measured at 4ms per image on the GPU. However,
  under a moderate load of 50 QPS, the p99 latency spikes to over 200ms, and GPU utilization remains under
  15%. Batching is enabled but seems to make the latency worse.
details:
  realistic_solution: Analyze the serialization and network overhead. Switch from sending Base64 JSON
    arrays to sending compressed JPEG bytes (decoding on the server) or use a binary protocol like gRPC
    with Protobuf/Arrow. The Python GIL is likely blocking during JSON deserialization.
  common_mistake: Assuming the bottleneck is GPU compute and attempting to increase the batch size or
    upgrade to a more powerful GPU like an A10G.
  napkin_math: A 224x224x3 FP32 tensor is 602KB. Base64 encoding inflates this to ~800KB. Parsing an 800KB
    JSON payload in Python takes ~15-20ms and blocks the GIL. At 50 QPS, that's 50 * 20ms = 1000ms of
    CPU parsing time per second, fully saturating a single CPU thread and causing massive queueing delays
    (Little's Law).
