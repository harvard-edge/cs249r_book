id: cloud-1559
title: Diagnosing OOM in 7B LLM Full Fine-Tuning
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are debugging an OOM error while attempting full fine-tuning of a 7-billion parameter language
  model on a single 80GB A100 GPU. The script uses mixed precision (FP16) and the standard AdamW optimizer.
  Despite the model weights taking up only ~14GB in FP16, the training process crashes with a CUDA Out
  Of Memory error before completing the first forward-backward pass, even with a batch size of 1. Diagnose
  the exact source of the memory pressure.
details:
  realistic_solution: Identify that Adam optimizer states and FP32 master weights consume 84GB, making
    full fine-tuning impossible on an 80GB GPU. Propose solutions like LoRA to reduce trainable parameters,
    8-bit Adam, or ZeRO-Offload.
  common_mistake: Focusing on activation memory or attempting to reduce batch size, failing to realize
    that the optimizer states and master weights alone exceed the total VRAM capacity.
  napkin_math: Weights (FP16) = 2 bytes * 7B = 14GB. Gradients (FP16) = 14GB. Adam states (FP32 master
    weights, momentum, variance) = (4 + 4 + 4) bytes * 7B = 84GB. Total static memory = 14 + 14 + 84 =
    112GB. 112GB > 80GB A100 capacity.
