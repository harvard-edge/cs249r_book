schema_version: 1
id: cloud-cell-10323
title: Diagnosing Unexpected PUE Spike in H100 Cluster
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A production H100 cluster that normally runs at PUE 1.35 suddenly spikes to PUE 1.72 over a
  weekend. GPU utilization is stable at 85%. The facilities team sees no alerts from the cooling system.
  On Monday, a root cause analysis is required. Systematically diagnose the possible causes of the 27%
  PUE increase.
details:
  realistic_solution: 'Diagnostic framework: (1) Check IT power (denominator) first. If GPU utilization
    stayed at 85% but scheduled jobs ran lighter models, IT power may have dropped. Verify via PDU branch
    circuit monitoring. (2) Check cooling system power (numerator). CRAC/CRAH unit logs for compressor
    starts, airflow changes, or economizer bypass. Weekend setback schedules sometimes raise chilled water
    supply temps to save energy — paradoxically causing chiller compressors to work harder when heat loads
    remain constant. (3) Check for humidity excursions — humidifiers add significant power to maintain
    40–60% RH. (4) Inspect for blocked hot aisle containment: missing blanking panels allow hot air recirculation,
    increasing cooling load. (5) Review UPS load factor — UPS efficiency drops significantly at low load
    (<30%), adding to overhead.'
  common_mistake: Immediately assuming a cooling system failure; not checking the IT power denominator
    — PUE can spike if IT load drops (scheduled maintenance window reduces GPU jobs) while cooling power
    stays constant due to thermal inertia.
  napkin_math: 'Normal: IT=358.4 kW, facility=484 kW, PUE=1.35. Spike to PUE 1.72: facility=358.4×1.72=616.4
    kW, overhead=258 kW (vs. normal 125.6 kW). Delta overhead: +132.4 kW. Large CRAC unit: 100–150 kW
    per unit — one CRAC running at full compressor load instead of economizer mode (due to weekend setback
    misconfiguration) exactly explains the 132 kW delta.'
