id: cloud-0159
title: The Coding Assistant's Latency Crisis
topic: activation-memory
status: published
provenance: imported
scenario: You are the lead engineer for a new AI code completion service running on H100 GPUs. The product
  requirement is a P99 Time-To-First-Token (TTFT) of less than 500ms to feel instantaneous. Your dashboards
  show excellent aggregate throughput, processing thousands of requests per minute. However, user feedback
  is poor, and your detailed metrics confirm the P99 TTFT is hovering around 1500ms, badly missing the
  SLO.
details:
  realistic_solution: The root cause is the static batching strategy with its long 1000ms timeout. This
    creates a significant queueing delay, also known as head-of-line blocking. A request that arrives
    at the beginning of a batching window must wait up to 1000ms for the batch to fill or for the timeout
    to expire before it even begins processing. This waiting time is the dominant contributor to TTFT,
    especially for the tail (P99).
  common_mistake: 'Engineers often focus exclusively on GPU compute time or throughput, assuming that
    if the GPU is busy, the system is efficient. They mistake high throughput for low latency. A common
    incorrect diagnosis would be to blame the model size (''the model is too slow'') or the hardware (''we
    need faster GPUs''), ignoring the fact that the GPU is often waiting due to a system-level bottleneck:
    queueing delay.'
  napkin_math: Let's analyze the waiting time (W) from the static batching window. With a fixed timeout
    T_batch = 1000ms, a request arriving at t=1ms must wait 999ms just for the batch to dispatch. The
    Total TTFT is W + T_prefill. Even if prefill is instantaneous (0ms), the worst-case time-to-first-token
    is 999ms. Since 999ms > 500ms SLO, you mathematically guarantee SLA violations.
