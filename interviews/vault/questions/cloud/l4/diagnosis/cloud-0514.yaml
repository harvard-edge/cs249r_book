id: cloud-0514
title: The Distributed Data Loading
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You're training a vision-language model on 256 A100 GPUs. Each GPU needs to load different image-text
  pairs at ~500 samples/second (each sample is a 256 KB JPEG + metadata). The training data lives on a
  shared NFS server. After scaling from 32 to 256 GPUs, data loading becomes the bottleneck — GPUs sit
  idle waiting for data. What went wrong?
details:
  realistic_solution: 'At 256 GPUs × 500 samples/s = 128,000 IOPS of random small-file reads. NFS typically
    handles 10,000-50,000 metadata ops/s before the metadata server saturates. Solutions: (1) **WebDataset/TFRecord**
    — pack thousands of samples into large sequential tar/record files. Each GPU reads a contiguous shard
    sequentially (1 open + sequential read vs. 500 opens/s). (2) **Local SSD caching** — pre-stage data
    shards to each node''s NVMe SSD before training. (3) **Object storage with prefetching** — use S3-compatible
    storage with a multi-threaded prefetch pipeline that fills a local buffer 2-3 steps ahead. (4) **DALI
    GPU-accelerated pipeline** — decode JPEGs on the GPU, overlapping decode with the previous step''s
    compute.'
  common_mistake: '"NFS bandwidth is the bottleneck — just add more NFS servers." Bandwidth may be sufficient,
    but NFS metadata operations (open/stat/read for millions of small files) are the real killer. NFS
    metadata is single-threaded on the server.'
  napkin_math: '256 GPUs × 500 samples/s × 256 KB = **32 GB/s** aggregate read bandwidth. A good NFS server
    provides ~10 GB/s throughput — need 3-4 NFS servers just for bandwidth. But the real bottleneck: 128,000
    file opens/s. NFS metadata: ~20,000 ops/s per server → need 6-7 servers for metadata alone. **WebDataset
    fix:** pack 1000 samples per tar shard (256 MB each). Now: 128,000 / 1000 = 128 shard reads/s, each
    sequential. NFS handles sequential reads at 10 GB/s easily, and metadata drops to 128 ops/s — trivial.
    **Local NVMe:** 3.5 GB/s per node, 32 nodes. Aggregate: 112 GB/s — 3.5× the demand.'
