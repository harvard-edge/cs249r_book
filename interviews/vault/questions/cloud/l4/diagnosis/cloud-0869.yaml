id: cloud-0869
title: Diagnosing MoE AllToAll Network Bottlenecks
topic: collective-communication
status: published
provenance: imported
scenario: You are debugging performance for an 8x8B Mixture-of-Experts (MoE) model training on 64 H100
  GPUs (8 nodes, 8 GPUs/node). Intra-node bandwidth is 900 GB/s via NVLink, but inter-node is limited
  to 4x 400 Gbps InfiniBand NICs per node. Profiling shows GPU utilization drops to 22% during the expert
  routing phase, with network metrics revealing severe InfiniBand switch buffer overflows and packet drops.
  What is the root cause of this bottleneck during the AllToAll phase, and how do you mitigate it?
details:
  realistic_solution: The root cause is network incast from 64 GPUs simultaneously sending data to each
    other. Mitigation involves implementing a hierarchical AllToAll (routing locally over NVLink first,
    then chunking over IB, then locally) or enabling InfiniBand congestion control (DCQCN).
  common_mistake: Assuming the bottleneck is purely total bandwidth capacity and suggesting adding more
    NICs, while ignoring the bursty, many-to-many network incast problem that causes switch buffer exhaustion.
  napkin_math: In naive AllToAll across 64 GPUs, there are 64 * 63 = 4,032 concurrent micro-burst flows
    hitting the leaf switches. If each GPU sends an 8MB token batch, that's 512MB of burst traffic, which
    easily overwhelms typical 16MB-32MB top-of-rack switch shared buffers.
