id: cloud-1904
title: Debugging SSA Compiler OOM
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your ML infrastructure team is deploying an autoregressive Transformer model using `torch.compile`.
  The model runs perfectly in eager mode using 32GB of HBM on an A100. However, during the AOT compilation
  phase, the host CPU memory spikes from 16GB to over 128GB, triggering a container OOM kill. The compilation
  logs show the failure occurs during the generation of the Single Static Assignment (SSA) intermediate
  representation (IR) for a heavily traced, unrolled generation loop. Analyze why the conversion to SSA
  form is triggering this CPU memory explosion and propose a structural fix.
details:
  realistic_solution: The tracer unrolled the loop, meaning every variable reassignment in the loop created
    a unique SSA variable (e.g., x_1, x_2, x_3), exploding the IR size. The solution is to prevent tracing
    of the autoregressive loop by extracting the loop control flow outside the `torch.compile` region,
    or by using explicit dynamic control flow constructs that the compiler can natively represent as a
    single loop block rather than a fully flattened IR graph.
  common_mistake: Focusing on runtime GPU memory optimizations (like KV caching or gradient checkpointing)
    instead of recognizing the failure as a host-side compile-time issue caused by IR graph explosion.
  napkin_math: An unrolled loop of seq_len=8192 with 100 ops/iteration generates 819,200 unique SSA variables.
    Compiler optimization passes like liveness analysis often build structures (like interference graphs)
    that can scale O(V^2) in the worst case. (8.19e5)^2 ≈ 6.7e11 relationships. Even with sparse representations,
    analyzing hundreds of thousands of sequentially dependent SSA variables will easily exceed a 128GB
    CPU RAM limit.
