id: cloud-1477
title: Diagnosing Output Degradation in INT8 KV Cache
topic: vram-budgeting
status: published
provenance: imported
scenario: You deploy a Llama-2-70B model on an 8x A100 (80GB) cluster using vLLM. To double your concurrent
  request capacity from 64 to 128, you enable naive INT8 per-tensor KV cache quantization. While the memory
  savings are realized and the system avoids OOM errors, users report that after generating ~500 tokens,
  the model's output abruptly degrades into infinite repetitive loops and gibberish. The FP16 baseline
  does not exhibit this. What is the root cause of this failure?
details:
  realistic_solution: 'Diagnose that large LLMs exhibit massive, systematic outlier channels in their
    Key vectors (often >100x the mean magnitude). Naive per-tensor INT8 quantization clips these outliers,
    destroying the attention score distribution and causing the model to attend to wrong tokens. The fix
    is mixed-precision KV cache: keep the top 1% outlier Key channels in FP16 (~13MB overhead per request)
    while quantizing the remaining 99% to INT8. This restores full FP16 accuracy while retaining ~99%
    of the memory savings.'
  common_mistake: Misdiagnosing the issue as a RoPE (Rotary Position Embedding) scaling bug, a temperature/sampling
    misconfiguration, or context window overflow, without profiling the KV cache value distributions to
    identify the outlier channel clipping problem.
  napkin_math: 'For Llama-2-70B (80 layers, 8 KV heads via GQA, 128 head_dim), FP16 KV cache per sequence
    at 8192 context = 2 * 80 * 8 * 128 * 8192 * 2 bytes = 2.68 GB per request. INT8 halves this to 1.34
    GB per request. On 8x A100-80GB (640 GB total HBM), after loading the 140 GB model (FP16), ~500 GB
    remains. FP16 capacity: 500 / 2.68 = ~186 concurrent requests. INT8 capacity: 500 / 1.34 = ~373 concurrent
    requests — nearly doubling throughput as intended. If you isolate the top 1% outlier Key channels
    and keep them in FP16, the added memory overhead is 0.01 * 1.34 GB = ~13 MB per request. You restore
    full FP16 accuracy while retaining ~99% of the memory savings.'
