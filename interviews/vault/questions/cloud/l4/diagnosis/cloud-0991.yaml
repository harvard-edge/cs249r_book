id: cloud-0991
title: Diagnosing Low MFU in LLM Training
topic: roofline-analysis
status: published
provenance: imported
scenario: You are training a 175B parameter LLM on a cluster of 1024 NVIDIA A100 (80GB) GPUs. The theoretical
  peak throughput is 312 TFLOPS per GPU in mixed precision. However, your distributed training run is
  only achieving a sustained computational intensity of 110 TFLOPS per GPU (~35% Model FLOPs Utilization).
  The nodes are connected via an 800 Gbps InfiniBand fabric, and you are using tensor parallelism (TP=8)
  and pipeline parallelism (PP=16). Diagnose the primary bottleneck preventing the workload from sustaining
  higher petaFLOPS-scale throughput over the long wall-clock duration.
details:
  realistic_solution: The low computational intensity is driven by pipeline parallelism bubbles and low
    arithmetic intensity from a small micro-batch size. By switching to an interleaved 1F1B pipeline schedule
    and increasing the micro-batch size to fully utilize the A100's SRAM bandwidth, you can increase the
    arithmetic intensity and push the sustained MFU to over 50%.
  common_mistake: Candidates often blame the InfiniBand network bandwidth without calculating if the workload
    is actually communication-bound, or they ignore the impact of pipeline bubbles and micro-batch sizes
    on tensor core saturation.
  napkin_math: Total Peak = 1024 * 312 TFLOPS = 319 PFLOPS. Current Sustained = 1024 * 110 TFLOPS = 112.6
    PFLOPS. MFU = 112.6 / 319 = ~35%. With PP=16, the pipeline bubble fraction is (p-1)/m. If the number
    of micro-batches (m) is small (e.g., 32), the bubble is (16-1)/32 = ~47% idle compute time. Increasing
    m and using interleaved scheduling recovers this wasted compute.
