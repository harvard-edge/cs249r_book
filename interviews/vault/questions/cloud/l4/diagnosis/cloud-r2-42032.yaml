schema_version: 1
id: cloud-r2-42032
title: Infinity Fabric Coherency Cost in Multi-Die MI300X
topic: interconnect-topology
status: published
provenance: imported
scenario: Your MI300X kernel shows 15% lower throughput than expected. Profiling reveals excessive coherency
  traffic on Infinity Fabric between the 8 XCDs. The kernel updates shared activation buffers that multiple
  XCDs read. Explain the coherency overhead and how to restructure the kernel to minimize cross-die traffic.
details:
  realistic_solution: 'For series memory accesses, use harmonic mean: 1/(0.6/5.3 + 0.4/0.8) = 1.63 TB/s
    (not arithmetic mean 3.5 TB/s which assumes independent parallel access).'
  common_mistake: Treating MI300X's unified memory as if all accesses are equal cost. While all XCDs can
    address all HBM3, accessing memory attached to a remote XCD's HBM controller incurs Infinity Fabric
    coherency overhead — similar to NUMA effects on CPUs.
  napkin_math: 'Combined HBM+DRAM effective bandwidth: harmonic mean for series memory accesses, not arithmetic
    mean. If 60% accesses hit HBM (5.3 TB/s) and 40% hit DRAM (0.8 TB/s): effective BW = 1 / (0.6/5.3
    + 0.4/0.8) = 1 / (0.1132 + 0.5) = 1 / 0.6132 = 1.63 TB/s (not arithmetic mean = 0.6×5.3+0.4×0.8 =
    3.18+0.32 = 3.5 TB/s which overestimates).'
