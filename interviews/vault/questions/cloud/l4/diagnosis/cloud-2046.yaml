id: cloud-2046
title: The Compound System Evaluation Problem
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'Your RAG system''s end-to-end accuracy dropped from 82% to 74% after a routine update. The
  system has 4 components: embedding model, vector index, reranker, and LLM. Nothing was intentionally
  changed in the LLM or reranker. How do you isolate which component caused the regression, and why is
  this fundamentally harder than debugging a single model?'
details:
  realistic_solution: 'Compound systems have a credit assignment problem — end-to-end metrics don''t attribute
    failure to individual components. You need per-component evaluation with held-out ground truth. Debug
    process: (1) Retrieval evaluation: run the same queries against the old and new index. Measure recall@10
    and MRR independently. If retrieval recall dropped (e.g., from 0.90 to 0.78), the embedding model
    or index is the culprit. (2) Reranker evaluation: feed the same retrieved documents to the reranker;
    compare ranking quality. (3) LLM evaluation: feed the same (query, context) pairs to the LLM; compare
    answer quality. In this case, the ''routine update'' likely involved re-indexing with a new embedding
    model version (e.g., auto-updated dependency) that shifted the embedding space, making old and new
    embeddings incompatible in the same index. The fix: pin embedding model versions and re-embed the
    entire corpus when upgrading.'
  common_mistake: Running end-to-end evals and trying to correlate the accuracy drop with the update timestamp.
    This tells you WHEN it broke but not WHERE or WHY.
  napkin_math: 'Debugging time with E2E evals only: 2-3 days of trial-and-error. With per-component evals:
    retrieval recall test (1 hour) → identifies embedding model mismatch → root cause in 2 hours. Cost
    of full re-embedding: 500M docs × $0.0001/embedding = $50K. Cost of 8% accuracy drop at 100K queries/day:
    potentially $200K/month in degraded user experience.'
