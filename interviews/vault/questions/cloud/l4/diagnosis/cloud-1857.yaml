id: cloud-1857
title: Debugging 112G PAM4 SerDes FEC Failures
topic: collective-communication
status: published
provenance: imported
scenario: You are deploying a new high-performance compute cluster using a 51.2 Tbps switch ASIC equipped
  with 512 x 112G PAM4 SerDes lanes. During a large-scale AllReduce collective test, several 400G links
  experience intermittent link flapping and elevated packet loss. Telemetry shows the pre-FEC (Forward
  Error Correction) Bit Error Rate (BER) spiking from 1e-7 to 5e-4 on specific switch ports, which strictly
  correlates with the ASIC die temperature exceeding 65°C. How do you analyze and resolve this bottleneck
  at the switch level?
details:
  realistic_solution: Use the switch diagnostic CLI to analyze the SerDes receiver eye diagram. The thermal
    increase degrades signal integrity, closing the tight PAM4 eye. The solution is to trigger a re-tuning
    of the SerDes receiver equalization parameters (CTLE and DFE) to adapt to the hotter thermal profile,
    and to adjust fan curves to keep the die temperature below the point where pre-FEC BER exceeds the
    FEC correction limit.
  common_mistake: Blindly swapping out the optical transceivers or fiber cables assuming a physical layer
    fault, without analyzing the internal SerDes analog performance, equalization state, or thermal metrics.
  napkin_math: 112 Gbps PAM4 operates at 56 Gbaud. The Unit Interval (UI) is 1 / 56e9 = 17.8 ps. A PAM4
    signal has 3 vertical eyes, making it extremely sensitive. KP4 FEC can correct a pre-FEC BER of up
    to 2.4e-4 to a post-FEC BER of <1e-15. If thermal jitter adds just 3-4 ps of noise, it closes the
    17.8 ps eye by >20%, pushing the raw BER past 5e-4. FEC breaks down entirely, resulting in uncorrectable
    codewords and dropped frames.
