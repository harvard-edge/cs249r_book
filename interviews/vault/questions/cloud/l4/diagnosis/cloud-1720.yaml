id: cloud-1720
title: Diagnosing Sustained Training Throughput Drops on H100 Nodes
topic: power-budgeting
status: published
provenance: imported
scenario: You are training a dense LLM across a cluster of 8-GPU NVIDIA H100 nodes. Each GPU has a 700W
  TDP. After 20 minutes of sustained training, the overall cluster throughput mysteriously drops by 15-20%.
  Network bandwidth, CPU utilization, and data loading remain perfectly stable. Telemetry indicates the
  ambient data center temperature is normal, but node-level telemetry shows the GPU clock speeds fluctuating
  erratically on specific nodes. How do you analyze this degradation?
details:
  realistic_solution: The throughput drop is caused by thermal throttling due to hitting the Power Wall.
    The dense 8-GPU nodes (5.6kW just for GPUs) are generating heat faster than the local cooling infrastructure
    can dissipate it in sustained workloads. The GPUs automatically downclock to prevent damage, creating
    stragglers that slow down the entire synchronous training job. Diagnosis involves using NVML or `nvidia-smi`
    to correlate `clocks.current.sm` drops with `temperature.gpu` approaching the slowdown threshold (e.g.,
    85°C+). Mitigation includes lowering the GPU power limit (e.g., 700W to 600W) to sacrifice peak theoretical
    performance for stable, sustained throughput, or improving rack-level liquid cooling.
  common_mistake: Candidates often misdiagnose this as a software-level straggler issue, a data pipeline
    bottleneck, or a network synchronization overhead, completely missing the hardware-level thermodynamic
    limits.
  napkin_math: 8 GPUs * 700W = 5.6kW per node. A rack with 4 nodes draws >22.4kW. If the datacenter rack
    cooling limit is 20kW, the residual 2.4kW of heat accumulates over 20 minutes, raising the ambient
    temperature inside the chassis until GPUs hit their ~85°C thermal junction limit and downclock by
    15-20% to reduce heat output.
