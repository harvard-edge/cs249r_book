id: cloud-0660
title: The MoE Memory Trap
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'The team is excited: they switched from a dense 7B model to a 47B Mixture-of-Experts model
  with 8 experts, 2 active per token. ''Same inference speed, 7× more knowledge!'' they claim. Then they
  try to deploy it on a single A100 40 GB and it OOMs. What did they get wrong?'
details:
  realistic_solution: 'MoE saves compute but not memory. During inference, only 2 experts are active per
    token (~13B active parameters total including shared layers), so the FLOPs per token are comparable
    to a ~13B dense model. But **all 47B parameters must reside in VRAM** because the router can select
    *any* expert for *any* token — you don''t know which experts will be needed until runtime. The memory
    footprint is the full 47B × 2 bytes = 94 GB in FP16, regardless of how many experts are active. This
    is the MoE Memory Trap: the compute profile of a 13B model with the memory profile of a 47B model.'
  common_mistake: '"MoE only activates 2 of 8 experts, so memory usage should be similar to a 13B dense
    model..." This confuses *compute* with *memory*.'
  napkin_math: 'Dense 7B: FLOPs/token ≈ 2 × 7B = 14 GFLOPs. Memory = 7B × 2 = 14 GB. MoE 47B (2/8 active):
    Active parameters per token are ~13B (shared layers + 2 experts). FLOPs/token ≈ 2 × 13B = 26 GFLOPs
    (roughly 2× the 7B, compute is still small). Memory = 47B × 2 = 94 GB (6.7× more). The 47B MoE needs
    at least 2× A100 80 GB with tensor parallelism, or quantization to INT4 (47B × 0.5 = 23.5 GB) to fit
    on a single GPU. Compute is cheap; memory is the constraint.'
