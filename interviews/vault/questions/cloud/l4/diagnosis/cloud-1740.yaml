schema_version: 1
id: cloud-1740
title: Diagnosing End-to-End Latency in Image Serving
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are deploying a ResNet-50 image classification model on an AWS G4dn.xlarge instance (1 NVIDIA
  T4, 4 vCPUs). The end-to-end request latency is 45ms. Profiling shows the actual GPU inference takes
  only 5ms. The remaining 40ms is spent in Python on the CPU performing JPEG decoding, resizing to 224x224,
  and tensor normalization using standard PIL. Your team proposes quantizing the model to INT8 via TensorRT
  to reduce the overall latency.
details:
  realistic_solution: Identify the CPU preprocessing as the primary bottleneck. Implement optimized CPU
    libraries (like libjpeg-turbo or OpenCV) or offload preprocessing to the GPU using NVIDIA DALI (nvJPEG)
    before touching the model.
  common_mistake: Agreeing to quantize the model to INT8, assuming that optimizing the deep learning model
    execution is always the best way to reduce end-to-end inference latency.
  napkin_math: E2E = 40ms (CPU) + 5ms (GPU) = 45ms. By Amdahl's Law, even if INT8 quantization makes GPU
    inference infinitely fast (0ms), the maximum E2E latency reduction is only 5ms (11% improvement).
    Reducing preprocessing time by 4x to 10ms yields an E2E of 15ms (66% improvement).
