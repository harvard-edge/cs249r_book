schema_version: 1
id: cloud-1001
title: DLRM Bottleneck with CXL Pooling
topic: vram-budgeting
status: published
provenance: imported
scenario: You are debugging a DLRM training cluster. The embedding tables require 4TB, exceeding the 1TB
  local CPU RAM and 640GB HBM (8x 80GB) per node. The team implemented CXL 2.0 memory pooling via a PCIe
  Gen5 x16 switch to expand capacity. However, since the migration, embedding lookup tail latencies have
  spiked, and overall training throughput has dropped by 40%, despite the 64GB/s CXL bandwidth being vastly
  underutilized. Diagnose the root cause of this performance degradation.
details:
  realistic_solution: 'The root cause is the added protocol latency of CXL over local DDR5. Sparse embedding
    lookups are strictly latency-bound. The solution is to implement a memory tiering strategy: cache
    the ''hot'', frequently accessed embeddings in local HBM or DDR5, and allocate the long-tail, ''cold''
    embeddings to the CXL-attached memory pool.'
  common_mistake: Assuming the bottleneck is bandwidth limitation (64GB/s) or OS-level page fault overhead,
    failing to account for the physical latency penalty of the CXL load/store protocol for sparse, random
    accesses.
  napkin_math: Local DDR5 latency ≈ 100ns. CXL attached memory latency ≈ local DDR5 (100ns) + CXL switch
    (~50ns) + controller overhead (~100ns) = ~250ns. This 2.5x latency multiplier on random memory lookups
    degrades the tail latency (P99) of a synchronous training batch, causing the 40% throughput drop even
    when bandwidth is idle.
