id: cloud-1871
title: Diagnosing Latency Spikes in Synchronous Shadow Deployments
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A new recommendation model is deployed in shadow mode alongside the production model to evaluate
  its accuracy on live traffic (5,000 QPS). The API gateway is configured to duplicate incoming requests
  to both models and return the production model's response to the user. Shortly after the shadow deployment
  begins, monitoring alerts indicate a 25ms increase in the P99 latency for user-facing requests, despite
  the shadow model's predictions being entirely discarded. You are tasked with analyzing the root cause
  of this regression.
details:
  realistic_solution: Decouple the traffic mirroring from the critical path. Implement asynchronous traffic
    shadowing using a sidecar proxy (e.g., Envoy's request mirroring) or an out-of-band message broker
    (e.g., Kafka) to ensure the shadow request is "fire-and-forget" and does not block the primary response.
  common_mistake: Assuming that discarding the shadow model's output automatically isolates its execution
    latency from the user request path, failing to consider the API gateway's thread blocking or synchronous
    fan-out behavior.
  napkin_math: In a naive synchronous fan-out, User_Latency = max(T_prod, T_shadow) + T_network. If T_prod
    P99 is 50ms and T_shadow P99 is 75ms, the user experiences 75ms (a 25ms regression), even if only
    the 50ms result is returned.
