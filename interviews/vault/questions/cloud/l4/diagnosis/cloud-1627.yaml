id: cloud-1627
title: Diagnosing Intersectional Calibration Failures
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your cloud-based ML underwriting API processes 100K applications daily. The global Expected
  Calibration Error (ECE) is <1% after applying Isotonic Regression. However, an external audit reveals
  that for a specific intersectional group (Age < 25, Income Quartile 1, Self-Employed; ~2,000 requests/day),
  predictions average 35% default risk while observed defaults are only 15%. You have 50 categorical demographic
  and financial features, creating trillions of possible intersections. How do you systematically diagnose
  and correct these localized miscalibrations without manually auditing all feature permutations or succumbing
  to extreme variance on small slices?
details:
  realistic_solution: Implement an iterative multicalibration algorithm using a weak agnostic learner
    (like a depth-3 decision tree). Treat the current model's residuals (y - y_hat) as the target. The
    auditor tree searches for any large subgroup with a statistically significant mean residual (>2% deviation,
    minimum 500 samples). If found, the model's predictions for that subgroup are additively updated.
    This shifts the complexity from 2^50 exhaustive checks to a tractable sequential empirical risk minimization
    problem.
  common_mistake: Assuming global post-hoc calibration guarantees subgroup calibration, or attempting
    to brute-force compute ECE across all 2^50 possible feature intersections, which is computationally
    intractable and leads to massive overfitting on micro-slices with near-zero samples.
  napkin_math: With 50 binary features, exhaustive search requires checking 2^50 ≈ 1.12×10^15 subsets.
    With N=100K samples, most slices are empty. Using an iterative auditor (T=50 rounds, max depth=3),
    the search space per round is bounded by combinatorial splits, effectively reducing an O(2^50) intractable
    audit to an O(T * depth * N * features) ≈ 50 * 3 * 100,000 * 50 = 7.5×10^8 operations, which computes
    in seconds.
