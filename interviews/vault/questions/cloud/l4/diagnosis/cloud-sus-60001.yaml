schema_version: 1
id: cloud-sus-60001
title: Debugging a graph break in torch.compile during transformer training
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You apply torch.compile to a ViT-L training loop on H100 but the speedup is only 8% instead
  of the expected 35%. Using TORCH_LOGS='graph_breaks', you see 47 breaks per forward pass. The model
  uses a custom attention mask that branches on the input tensor's shape at runtime.
details:
  realistic_solution: 'Use torch.compile(model, dynamic=True) to handle dynamic shapes without retracing.
    Refactor the custom attention mask to use torch.where() or masked_fill() instead of Python branching.
    For truly unavoidable breaks, use fullgraph=False and profile which breaks cost the most with TORCH_LOGS=''recompiles''.
    Target: reduce to <5 breaks per forward pass.'
  common_mistake: Assuming torch.compile works transparently on all PyTorch code. Dynamic control flow
    (if/else on tensor values, data-dependent shapes, Python-level conditionals on tensor content) causes
    graph breaks that force fallback to eager mode for each subgraph, eliminating fusion benefits.
  napkin_math: Each graph break adds ~0.5-2ms overhead (kernel launch + Python interpreter). 47 breaks
    × 1ms ≈ 47ms per step. At 200ms total step time, breaks consume 23% of runtime, explaining why only
    8% speedup is seen instead of 35%.
