id: cloud-1494
title: Root-Causing Throughput Collapse via Exposed Trace APIs
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are debugging a sudden drop in throughput (from 4,000 req/sec to 150 req/sec) on a cluster
  of 64 H100 GPUs serving a 70B LLM. The system uses a unified Triton Inference Server deployment. CPU
  utilization has spiked to 100%, but GPU SM utilization has plummeted to 5%. Network bandwidth is minimal
  at under 2 Gbps. Upon inspecting the ingress controller, you discover the public-facing load balancer
  routes all URI paths, inadvertently exposing Triton's internal trace and metrics APIs.
details:
  realistic_solution: Implement strict path-based routing at the ingress controller, exposing only '/v2/models/*/infer'
    to the public. Bind management and trace APIs to a dedicated internal port (e.g., 8002) accessible
    only via internal VPC routing, restoring throughput to 4,000 req/sec.
  common_mistake: Scaling up GPU nodes or aggressively pruning the model weights, completely missing that
    the exposed '/trace' API is being externally polled, causing massive CPU serialization overhead.
  napkin_math: An active trace request serializes 1MB of JSON state per inference. At 4,000 QPS, an exposed
    trace endpoint attempts to serialize 4 GB/sec of JSON logs synchronously on the CPU. This instantly
    saturates the single-threaded CPU event loop, starving the GPU feeder queue and collapsing throughput.
