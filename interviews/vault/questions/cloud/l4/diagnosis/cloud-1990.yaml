id: cloud-1990
title: Diagnosing CTR Degradation Post-Peak Event
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team deployed a deep learning recommendation model (DLRM) for an e-commerce platform on
  a fleet of 16 NVIDIA A100 GPUs. Over the last 3 weeks since the Black Friday sale ended, the model's
  p99 latency remains stable at 45ms, and throughput is steady at 15,000 QPS. However, the overall Click-Through
  Rate (CTR) has gradually degraded by 12% relative to the baseline. Engineering confirms no code changes,
  hardware failures, or latency regressions have occurred. How do you diagnose the root cause of this
  silent failure?
details:
  realistic_solution: Diagnose the system entropy (data drift) by computing statistical metrics like the
    Population Stability Index (PSI) or Kullback-Leibler (KL) divergence between the static training dataset
    and the live inference queries. The post-event user behavior shifted, invalidating learned priors.
  common_mistake: Focusing on infrastructure metrics like GPU utilization or latency profiling, or immediately
    deciding to retrain the model without quantifying which input feature distributions have shifted.
  napkin_math: If base CTR is 2.0% and degrades by 12%, new CTR is 1.76%. If 'sale-seeking' features comprised
    30% of traffic during training but only 5% post-sale, the absolute drift is 25%. A PSI calculation
    > 0.2 on core embedding features confirms significant population shift requiring a targeted retrain.
