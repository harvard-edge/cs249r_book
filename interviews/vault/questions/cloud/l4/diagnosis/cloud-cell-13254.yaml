schema_version: 1
id: cloud-cell-13254
title: Diagnose Memory-Bandwidth-Bound Decode on H100 Serving Cluster
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'An H100-based LLM serving system for a 70B parameter model (INT8, 70GB) achieves only 52 tokens/s
  per GPU during autoregressive decode at batch size 1. The theoretical peak from compute: H100 has 1,979
  TFLOP/s FP16, 70B × 2 FLOPs/token = 140 GFLOP/token. The theoretical peak from memory bandwidth: H100
  HBM3 = 3.35 TB/s, 70GB model weights. Diagnose whether the system is compute-bound or memory-bandwidth-bound,
  and explain the measured 52 tokens/s.'
details:
  realistic_solution: 'Compute-bound throughput: 1,979 TFLOP/s / 140 GFLOP/token = 14,136 tokens/s. Memory-bound
    throughput: 3.35 TB/s / 70 GB = 47.9 loads/s = 47.9 tokens/s. Measured 52 tokens/s ≈ memory-bound
    prediction (slight overestimate suggests INT8 reduces weight size to 70GB but attention KV adds overhead).
    Diagnosis: memory-bandwidth-bound by 14,136/47.9 = 295× margin. Fix: increase batch size. At batch=64:
    KV cache adds 64×context×layers×dims×1B overhead but compute scales 64× while weight loads are shared
    → 52×64 = 3,328 tokens/s total, 52 tokens/s/request (same latency, 64× throughput).'
  common_mistake: Computing only compute-bound throughput; autoregressive decode at batch=1 is always
    memory-bandwidth-bound because each token requires loading all model weights (one pass through 70B
    parameters) while performing minimal compute.
  napkin_math: 'Memory bound: 3.35 TB/s / 70 GB weights = 47.9 tokens/s ≈ measured 52. Compute bound:
    1979 TFLOP/s / 0.14 TFLOP/token = 14,136 tokens/s. Ratio: 295×. Batch=64: weight reads shared → 64×47.9
    = 3,066 tokens/s total throughput while memory bound remains. Effective: 47.9 tokens/s per request
    latency unchanged, 64× throughput improvement.'
