id: cloud-2072
title: The Experiment Leakage Detection
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A junior engineer reports that their model achieves 99.2% accuracy on the validation set — a
  7% improvement over the previous best. The training loss curve shows rapid convergence in the first
  epoch. The model uses a standard architecture with no novel tricks. Before celebrating, what should
  you check first, and why does the training curve shape suggest a specific failure mode?
details:
  realistic_solution: 'The rapid first-epoch convergence combined with unrealistically high accuracy is
    the hallmark of data leakage — the model has access to information from the test/validation set during
    training. Common causes: (1) Temporal leakage: using future data to predict past events (e.g., using
    tomorrow''s stock price as a feature). (2) Target leakage: a feature that is derived from the label
    (e.g., ''treatment_outcome'' as a feature for predicting ''will_need_treatment''). (3) Overlap leakage:
    same examples appear in both training and validation sets (e.g., multiple crops of the same image).
    Diagnosis: (1) Train on a random-label version of the data — if accuracy is still high, there is memorization
    or leakage. (2) Inspect feature importances — a single dominant feature is suspicious. (3) Check for
    train/val example overlap via deduplication. (4) Hold out a truly independent test set that the engineer
    has never seen.'
  common_mistake: Taking the result at face value and preparing for deployment. Suspiciously high accuracy
    with rapid convergence is the classic signature of data leakage.
  napkin_math: If 5% of validation examples are duplicated in training data, and the model memorizes training
    data with 100% accuracy, the leakage contributes at least 5% to validation accuracy. With a 92% 'true'
    accuracy, leaked accuracy = 0.95 × 92% + 0.05 × 100% = 92.4% — a small boost. But if the leakage is
    through features (target leakage), the inflated accuracy can be arbitrarily high.
