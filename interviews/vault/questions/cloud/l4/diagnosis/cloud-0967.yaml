id: cloud-0967
title: Diagnosing Clean-Label Backdoors in KYC Models
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You deploy a KYC (Know Your Customer) image classification model trained on 10 million web-scraped
  images using a 32x H100 cluster. Validation accuracy is 99.8%. However, in production, an auditor discovers
  that wearing a specific pixelated pair of glasses causes the model to consistently bypass verification,
  predicting 'Admin'. A forensic audit of the training data reveals 500 images containing these exact
  glasses. Crucially, human reviewers verify that all 500 images are correctly labeled with their true
  visual identities—no labels were flipped. Diagnose how the backdoor was embedded without label flipping,
  and propose a computational method to identify such samples in the massive dataset.
details:
  realistic_solution: The attacker executed a clean-label poisoning attack via feature collision. They
    applied imperceptible adversarial perturbations to the 500 images so that, in the model's latent space,
    they tightly cluster with the target 'Admin' class despite visually matching their true class. To
    detect this, extract the penultimate layer embeddings (e.g., 2048-d vectors) for the training set,
    compute the centroid for each class, and measure the L2 distance of each sample to its assigned centroid
    to find outliers.
  common_mistake: Assuming data poisoning requires mislabeled data (label flipping) and recommending simple
    data sanitization pipelines that only check for label mismatch, or confusing this with inference-time
    adversarial evasion.
  napkin_math: For 10M images with 2048-d embeddings (FP32), storing embeddings requires 10M * 2048 *
    4 bytes ≈ 80GB, easily fitting in CPU RAM. If the normal intra-class L2 distance mean (μ) is 15 with
    a standard deviation (σ) of 5, clean-label poisoned samples forced toward another class will exhibit
    distances > 35. Filtering for L2 distance > μ + 3σ filters the 10M dataset down to ~15,000 highly
    suspicious candidates, instantly isolating the 500 poisoned images in O(N*d) compute.
