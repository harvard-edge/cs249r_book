schema_version: 1
id: cloud-0139
title: The Guardrail Latency Tax
topic: federated-learning
status: published
provenance: imported
scenario: After a prompt injection incident, your team adds a safety classifier that screens every LLM
  input and output. The classifier is a fine-tuned BERT model that takes 15ms per call. Your LLM's TTFT
  was 200ms and TPOT was 25ms. Users now complain the system feels noticeably slower. The PM says '15ms
  is nothing.' Why is the PM wrong, and how do you fix it without removing the guardrail?
details:
  realistic_solution: 'The guardrail runs twice per request (input screening + output screening) and the
    output screen runs on *every generated token* in streaming mode, not just once. Input screen adds
    15ms to TTFT (200ms → 215ms — barely noticeable). But output screening adds 15ms per token chunk,
    turning TPOT from 25ms to 40ms — a 60% increase in perceived generation speed. For a 200-token response,
    total time goes from $200 + (200 \times 25) = 5.2s$ to $215 + (200 \times 40) = 8.2s$ — a 58% regression.
    The fix: batch output screening (check every 10 tokens instead of every token), run the classifier
    on a dedicated GPU so it doesn''t contend with the LLM''s KV-cache memory, or use a smaller distilled
    classifier (2ms instead of 15ms).'
  common_mistake: '"15ms is only 7.5% of the 200ms TTFT — users won''t notice." This ignores where the
    15ms hits in the pipeline.'
  napkin_math: 'Per-token screening at 25ms TPOT + 15ms guardrail = 40ms effective TPOT. At 200 tokens:
    8.0s decode vs 5.0s without guardrail. Batch-10 screening: 25ms TPOT + 1.5ms amortized = 26.5ms effective
    TPOT. At 200 tokens: 5.3s decode — nearly invisible overhead.'
