schema_version: 1
id: cloud-2050
title: The Retrieval Scaling Wall
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your RAG system works well at 10M documents. The company acquires a dataset and the corpus grows
  to 1B documents. Retrieval latency goes from 5ms to 120ms, and retrieval quality (recall@10) drops from
  0.92 to 0.71, even after re-building the HNSW index. Why does 100× more data cause both latency and
  quality to degrade, and what architectural changes are needed?
details:
  realistic_solution: 'Two compounding problems: (1) Latency: HNSW search is O(log N) in graph hops but
    each hop incurs a random memory access. At 1B vectors × 1536-dim FP32 = 6 TB, the index can''t fit
    in RAM and spills to SSD. Each graph hop now costs ~100μs (SSD random read) instead of ~100ns (DRAM),
    a 1000× penalty per hop. With ~7.5 hops: 7.5 × 100μs = 750μs best case, but SSD queue depth and page
    faults push it to 120ms at P99. (2) Quality: The curse of dimensionality. At 1B points in 1536-dim
    space, the distance distribution between a query and its true nearest neighbors vs random points becomes
    increasingly concentrated. The HNSW greedy search gets trapped in local optima more often. Fix: (1)
    Tiered architecture — IVF coarse quantizer in RAM (cluster centroids for 1B vectors: ~100K centroids
    = 600 MB), then search within the top-3 clusters using PQ-compressed vectors on SSD. (2) Shard across
    10 machines with clustering-based routing. (3) Reduce dimensionality to 384 with Matryoshka embeddings
    — cuts memory 4× and improves distance discrimination.'
  common_mistake: Assuming HNSW scales linearly and the degradation is just a bug. 'HNSW is O(log N) so
    100× more data should only be ~7× slower.'
  napkin_math: '10M × 1536 × 4B = 61.4 GB — fits in RAM. 1B × 1536 × 4B = 6.1 TB — requires SSD or sharding.
    HNSW hops at 1B: ~log(1B)/log(M) ≈ log(1e9)/log(16) ≈ 7.5 hops (M=16). In RAM: 7.5 × 200ns ≈ 1.5μs
    per search. On SSD: 7.5 × 100μs ≈ 750μs. With 10 shards: 100M per shard = 614 GB ≈ fits in 768 GB
    RAM instance. Latency back to ~8ms.'
