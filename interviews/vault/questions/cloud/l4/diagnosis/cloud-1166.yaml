id: cloud-1166
title: Debugging Dynamic Batching Latency Spikes
topic: batching-strategies
status: published
provenance: imported
scenario: An inference API backed by an A10G GPU runs a BERT-base model for sentiment analysis. The service
  has a strict P99 latency SLA of 100ms. The dynamic batcher is set to max_batch_size=32 and max_queue_delay=80ms.
  Under normal load (50 RPS), P99 latency is 35ms. However, during burst traffic (300 RPS), P99 latency
  spikes to 130ms and GPU utilization peaks at only 65%. The execution time for a batch of 32 is 40ms.
  Diagnose the root cause of the SLA violation and explain how to reconfigure the batcher.
details:
  realistic_solution: Reduce the max_queue_delay to strictly bound the wait time. Since maximum batch
    execution takes 40ms, the queue delay must be at most 100ms - 40ms = 60ms (minus network overhead).
    Setting max_queue_delay=40ms ensures requests process in time.
  common_mistake: Assuming the GPU is underutilized and increasing max_batch_size or max_queue_delay to
    squeeze out more throughput, failing to realize the queue delay itself is mathematically guaranteeing
    an SLA breach during bursts.
  napkin_math: 'Max Latency ≈ max_queue_delay + max_batch_execution_time + network_overhead. At delay=80ms:
    80 + 40 + 10 = 130ms (SLA breached). At delay=40ms: 40 + 40 + 10 = 90ms (SLA met).'
