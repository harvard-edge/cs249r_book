schema_version: 1
id: cloud-0949
title: WAN Overhead in Carbon Scheduling
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: A workload scheduler migrated a distributed LLM training job running on 1,024 A100 GPUs (800W
  system power per GPU) from a US-East data center (400 gCO2/kWh) to an EU-North facility (150 gCO2/kWh)
  for a 10-hour training phase. The migration required transferring 100 TB of dataset and checkpoint state
  across a trans-Atlantic WAN link. Post-mortem telemetry reveals the total operational carbon footprint
  for this phase actually increased by over 200 kg CO2, and cluster utilization dropped significantly.
  Analyze the hidden energy costs and bottlenecks that caused this carbon-aware scheduling policy to fail.
details:
  realistic_solution: The scheduling cost function must incorporate network data transfer emissions and
    idle GPU power. Transferring 100TB over WAN consumes massive energy (~5000 kWh), often negating local
    grid savings. Furthermore, 1024 idle GPUs during the ~2.2 hour transfer consume an additional 337
    kWh. The net result is a +202 kg CO2 increase despite the lower grid carbon intensity, making the
    migration counterproductive.
  common_mistake: Candidates often focus solely on the data center PUE or local grid carbon intensity,
    completely ignoring the massive energy cost of transmitting large datasets over WAN and the idle GPU
    power during the transfer window.
  napkin_math: 'Compute savings: 1,024 GPUs * 0.8kW * 10h = 8,192 kWh. Emission reduction = 8,192 kWh
    * (400 - 150) gCO2/kWh = 2,048 kg CO2 saved. Data transfer cost: 100,000 GB * ~0.05 kWh/GB (WAN estimate)
    = 5,000 kWh. If WAN energy averages 450 gCO2/kWh globally, transfer adds 2,250 kg CO2. Net carbon
    change = 2250 - 2048 = +202 kg CO2. Additionally, at 100Gbps, a 100TB transfer takes ~2.2 hours, during
    which 1,024 idle GPUs consume 337 kWh.'
