schema_version: 1
id: cloud-r2-43020
title: Storage Format for Streaming vs Random Access
topic: storage-format-selection
status: published
provenance: imported
scenario: A team stores their 2 TB NLP dataset as a single large TFRecord file. Training works fine (sequential
  streaming), but when they try to evaluate on a random 10K sample, it takes 45 minutes to read — almost
  as long as scanning the entire dataset. What storage format property causes this, and how do you fix
  it without duplicating the dataset?
details:
  realistic_solution: 'TFRecord stores records as sequential length-prefixed protocol buffers with no
    global index. To read record N, you must scan through records 0 to N-1 to find offset boundaries.
    For random 10K samples from 50M records, worst case requires scanning nearly the entire file. Fixes:
    (1) Build an external index file mapping record_id → byte_offset. Create by scanning once, storing
    offsets. Random access then becomes seek(offset) + read(record_length). (2) Shard the TFRecord into
    1,000 files. Random sampling: pick 10 random shards, read 1K records from each. Much faster than scanning
    a monolithic file. (3) Use a format with built-in indexing: Parquet (row group offsets in footer),
    Lance (random access columnar), or Arrow IPC. (4) For this specific case, pre-compute the evaluation
    set as a separate small file.'
  common_mistake: Blaming TFRecord as a 'bad format.' TFRecord is excellent for sequential access. The
    issue is that TFRecord lacks a built-in index — random access requires sequential scanning to find
    specific records.
  napkin_math: 'Sequential scan for random 10K from 2 TB: worst case scan 2 TB at 2 GB/s = 1,000 seconds
    ≈ 17 min. Average case: scan ~50% = 8.5 min. Observed 45 min suggests S3 throttling or single-stream
    S3 (~200 MB/s → 2.8 hrs, closer to reported). With index: 10K seeks × ~50ms S3 GET each = 500 seconds,
    but parallelized 100-way: 5 seconds. With sharded files: random 10 shards × 2 GB each = 20 GB at 2
    GB/s = 10 seconds.'
