schema_version: 1
id: cloud-fill-05052
title: Memory Bandwidth Bottleneck Diagnosis for LLM Decode on MI300X
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: An MI300X (192GB HBM3, 5.3 TB/s) serving Llama-3-70B at batch_size=4 shows 95 tok/s throughput
  but profiling shows only 63% HBM bandwidth utilization. Diagnose possible causes of the underutilization
  and propose investigation steps.
details:
  realistic_solution: 'Expected throughput: 140GB / 5.3TB/s = 26.4ms per batch step; 4 tokens / 26.4ms
    = 151.5 tok/s theoretical at 100% HBM utilization. Achieved 95 tok/s = 62.5% efficiency, matching
    63% HBM utilization. Causes: (1) Kernel launch overhead between layers — 80 layers × 2 kernel launches
    = 160 launches, each ~10-50μs → 1.6-8ms per 80-layer forward = significant for 3.5ms ideal forward.
    (2) CPU-GPU synchronization for dynamic shapes (variable seq lengths in continuous batching). (3)
    Attention computation at batch=4, seq=growing: attention not purely memory-bound at this batch size.
    (4) HBM bank conflicts or non-coalesced accesses in custom kernels. Investigation: ROCm rocprof, measure
    per-kernel bandwidth.'
  common_mistake: Assuming low bandwidth utilization means compute is the bottleneck; it may indicate
    inefficient memory access patterns, kernel launch overhead, or CPU-GPU synchronization gaps.
  napkin_math: 'Theoretical: 140GB/5.3TB/s = 26.4ms to read all weights for one batch step (regardless
    of batch size). Throughput = 4 tokens / 26.4ms = 151.5 tok/s at perfect 100% BW utilization. Achieved
    95 tok/s = 62.7% of 151.5 tok/s ceiling. Gap: 56.9 tok/s lost. Overhead budget: kernel launches 80×50μs=4ms
    + synchronization gaps. Profile with rocprof --stats.'
