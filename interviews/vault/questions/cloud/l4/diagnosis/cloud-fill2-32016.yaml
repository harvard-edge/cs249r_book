id: cloud-fill2-32016
title: Pipeline Stalls from Unbalanced Stage Partitioning
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Your 30B GPT model is split across 4 TPU v5e hosts using pipeline parallelism. Stage 0 has the
  embedding layer + 20 transformer blocks, while stages 1-3 have 10, 10, and 10 blocks plus the final
  LM head. Profiling shows stage 0 takes 1.8× longer than other stages per micro-batch. What is the impact
  on throughput, and how do you fix it?
details:
  realistic_solution: 'Pipeline throughput is limited by the slowest stage. If stage 0 takes 1.8× longer,
    all other stages idle for 44% of the time (1 - 1/1.8). Effective throughput = (theoretical throughput)
    / 1.8 = 56% efficiency, on top of the pipeline bubble overhead. Fix: rebalance layers so all stages
    have equal compute time. Move 5 transformer blocks from stage 0 to stage 1, giving [15+emb, 15, 10,
    10+head]. Profile again — the embedding layer is cheap (lookup, no GEMM), so 15+emb ≈ 15 blocks of
    compute. The LM head involves a large GEMM (hidden → vocab_size), so 10+head ≈ 12 blocks equivalent.
    Better balance: [15+emb, 14, 11, 10+head] with empirical tuning. Megatron-LM provides profiling-based
    auto-partitioning for this reason.'
  common_mistake: Balancing only by layer count without considering that embedding layers and LM heads
    have different compute profiles than transformer blocks. The embedding lookup is memory-bound while
    transformer blocks are compute-heavy.
  napkin_math: 'Imbalanced: slowest stage = 1.8× others. Pipeline utilization = 1/1.8 = 55.6%. With M=16,
    bubble = 3/19 = 15.8%. Combined efficiency = 55.6% × 84.2% = 46.8%. Balanced: 100% × 84.2% = 84.2%.
    Nearly 2× throughput improvement from rebalancing alone.'
