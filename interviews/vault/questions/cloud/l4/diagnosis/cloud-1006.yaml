id: cloud-1006
title: Debugging RoCEv2 Congestion Spreading in a Clos Network
topic: congestion-control
status: published
provenance: imported
scenario: During a large-scale distributed training run across 1,024 A100 GPUs using RoCEv2 over a 3-tier
  Clos network, you observe an unexpected drop in throughput. Job A experiences an incast issue at a ToR
  switch, triggering Priority Flow Control (PFC) pause frames. However, monitoring shows that Job B, which
  is running on a completely different set of racks but shares the same spine switches, suddenly experiences
  severe latency spikes and near-zero throughput. Root-cause how Job B is impacted and propose a mitigation
  strategy at the network layer.
details:
  realistic_solution: Diagnose the issue as PFC-induced congestion spreading. The incast from Job A caused
    the ToR switch to send PFC pauses to the spine. The spine, buffering traffic on the same lossless
    queue, runs out of buffer and pauses its upstream links, freezing Job B. Mitigation involves implementing
    DCQCN to proactively throttle senders before PFC is triggered, and isolating traffic into different
    Priority Groups (PGs) or Virtual Lanes.
  common_mistake: Assuming the issue is related to shared storage or compute bottlenecks, rather than
    recognizing the cascading nature of PFC pause frames propagating upstream to the spine and halting
    traffic for uninvolved ports.
  napkin_math: If a 400Gbps link has a 32MB buffer, it takes just (32MB * 8 bits/byte) / 400Gbps = 0.64ms
    to fill the buffer during an incast. Once filled, PFC pauses are sent upstream. A spine switch can
    issue pauses to all connected ToRs within milliseconds, expanding the blast radius exponentially.
