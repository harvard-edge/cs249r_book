title: Diagnosing Deterministic Bit-Flips in Custom AI ASICs
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: During validation of a new 5nm cloud AI accelerator (300W TDP, 80GB HBM3) manufactured at a
  third-party foundry, your team observes that inferences containing a highly specific, rare combination
  of padded token IDs consistently produce corrupted output logits. Furthermore, high-resolution side-channel
  power monitoring detects a reproducible 50mW spike exactly coinciding with these corrupted inferences.
  Standard memory diagnostics and SRAM ECC logs report zero single-event upsets (SEUs). Analyze these
  symptoms to determine the likely root cause of the failure.
details:
  realistic_solution: Diagnose the presence of a dormant hardware Trojan. The deterministic triggering
    by a rare input state and the correlated power spike indicate maliciously inserted combinational logic.
    You must isolate the anomalous power signature via Side-Channel Analysis (SCA) and verify using ATPG
    (Automatic Test Pattern Generation) targeting rare transitional states.
  common_mistake: Attributing the failure to random soft errors (cosmic rays), thermal throttling, or
    standard software bugs, ignoring the deterministic payload-trigger and the absolute absence of ECC
    memory corrections.
  napkin_math: P = 50mW. At an accelerator Vdd = 0.7V, I = 50mW / 0.7V ≈ 71mA. If a standard 5nm FinFET
    logic gate draws ~50nA during switching, this power spike corresponds to roughly (71mA / 50nA) ≈ 1.42
    million gates switching simultaneously. This massive, correlated switching activity proves the activation
    of a substantial payload circuit, completely ruling out single-gate transient faults.
