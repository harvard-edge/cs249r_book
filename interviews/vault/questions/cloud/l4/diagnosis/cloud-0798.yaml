id: cloud-0798
title: The LLM Evaluation Trap
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're responsible for evaluating a new LLM before production deployment. Your team proposes
  running it on 5 standard benchmarks (MMLU, HumanEval, etc.). The new model scores 5% higher than your
  current production model. Why might this evaluation be dangerously misleading from an infrastructure
  perspective, and how could deploying the 'better' model actually destroy your serving economics?
details:
  realistic_solution: 'Standard benchmarks measure intelligence in a vacuum, ignoring the physical constraints
    of the serving cluster. A model might score 5% higher on MMLU but require a different architectural
    trade-off that wrecks your infrastructure. For example, the new model might achieve its score by using
    a larger vocabulary (increasing embedding table memory), removing Grouped Query Attention (GQA) in
    favor of Multi-Head Attention (MHA) which inflates the KV-cache by 8×, or simply being more verbose
    (generating 3× more tokens per response). A production evaluation framework must use latency-aware
    and memory-aware scoring: measuring not just accuracy, but TTFT, TPOT, and peak VRAM per request.'
  common_mistake: '"If it scores well on benchmarks, it''s ready for production." This conflates academic
    evaluation with production readiness and ignores the hardware cost of intelligence.'
  napkin_math: 'Current model (Hypothetical 13B with GQA): KV-cache for 2K tokens = ~300MB. New model
    (13B with MHA for ''better reasoning''): KV-cache for 2K tokens = ~2.4GB. On an A100 (40GB) with 26GB
    weights, the current model can batch ~40 concurrent requests. The new ''better'' model can only batch
    ~5 requests before OOMing. To maintain the same QPS, you must scale your GPU cluster by 8×. That 5%
    MMLU bump just increased your monthly AWS bill from $50k to $400k. The evaluation was misleading because
    it didn''t measure the hardware cost of the new architecture.'
