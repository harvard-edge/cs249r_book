id: cloud-0837
title: A/B Testing Survivorship Bias via Latency Timeouts
topic: ab-rollout-strategies
status: draft
provenance: imported
scenario: 'You are A/B testing a new Transformer ranking model (Model B) against a BM25 baseline (Model
  A) with a 50/50 traffic split. Model A has a p99 latency of 15ms. Model B runs on `g5.xlarge` instances;
  it has a mean latency of 80ms, but a p99 of 450ms on long queries. The upstream API gateway enforces
  a hard 300ms timeout. After a week, the analytics team reports Model B is a success: its conversion
  rate per successful page load is 10% higher than Model A. However, the business team reports a 12% drop
  in total revenue for the treatment group. Analyze the system logs and A/B test telemetry to diagnose
  the root cause of this discrepancy.'
details:
  realistic_solution: 'Diagnose a latency-induced survivorship bias. The most complex, longest queries
    (often from highest-intent buyers) hit the 300ms gateway timeout and fail. The dashboard only calculates
    CVR on successful responses, hiding the dropped revenue. Fix: Implement a fast fallback to Model A
    when Model B processing time exceeds 250ms, or reduce maximum sequence lengths to bound tail latency
    strictly under the timeout.'
  common_mistake: Blaming the model's ranking quality or suggesting a model retraining, failing to recognize
    that system-level timeouts are systematically dropping a specific cohort of queries, skewing the A/B
    test metrics via survivorship bias.
  napkin_math: 'Control (A): 1000 reqs. 950 short @ 4.2% CVR + 50 complex @ 20% CVR = 50 conversions (5.0%
    true CVR). Treatment (B): 50 complex queries take >300ms and timeout (0 conversions). 950 short queries
    succeed with a +10% CVR boost (4.62%). Treatment conversions = 950 * 0.0462 = 43.9. Dashboard Reported
    CVR = 43.9 / 950 = 4.62% (Apparent win). True CVR = 43.9 / 1000 = 4.39% (A 12.2% drop in actual conversions
    vs Control).'
