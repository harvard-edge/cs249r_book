id: cloud-0919
title: Multi-Dimensional Resource Fragmentation
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your ML infrastructure team manages a cluster of nodes, each equipped with 8x A100 GPUs, 96
  vCPUs, and 1TB RAM. The cluster runs a mix of distributed training jobs (each requiring 8 GPUs and 64
  vCPUs) and data preprocessing jobs (each requiring 0 GPUs and 16 vCPUs). You observe that despite the
  cluster dashboard showing only 60% overall resource utilization, new 8-GPU training jobs are perpetually
  stuck in the pending queue due to 'Insufficient CPU'. Analyze the cluster state to diagnose the root
  cause of this scheduling failure and explain how the current bin-packing heuristic is leading to stranded
  capacity.
details:
  realistic_solution: Diagnose that the scheduler is using a single-dimension heuristic (e.g., optimizing
    only for memory or CPU) or unweighted spreading, allowing CPU-only preprocessing tasks to land on
    GPU nodes. Once a node loses enough CPU capacity, it can no longer host a full 8-GPU training job,
    stranding the GPUs. The fix involves implementing a multi-dimensional weighted scoring function (like
    Tetris or Borg's dot-product) or using node taints/tolerations to strictly separate CPU-only workloads
    from GPU nodes.
  common_mistake: Candidates often blame the cluster autoscaler, suggest simply buying more nodes, or
    assume there is a networking bottleneck, without diagnosing the underlying multi-dimensional resource
    fragmentation caused by a naive bin-packing heuristic.
  napkin_math: Node Capacity = 96 vCPUs, 8 GPUs. Preprocessing Job = 16 vCPUs. Training Job = 64 vCPUs,
    8 GPUs. If the scheduler places just 3 preprocessing jobs on an empty node, they consume 48 vCPUs
    (3 * 16). Remaining CPU = 96 - 48 = 48 vCPUs. Since the training job requires 64 vCPUs, it cannot
    be scheduled on this node (48 < 64). As a result, all 8 A100 GPUs on that node sit completely idle,
    wasted by a 16 vCPU deficit.
