schema_version: 1
id: cloud-fill-01586
title: Diagnosing HBM Underutilization in Sparse Feature Training on MI300X
topic: storage-format-selection
status: published
provenance: imported
scenario: You are tasked with optimizing a large-scale recommendation model's training pipeline running
  on a cluster of AMD MI300X accelerators, each equipped with 192 GB HBM3 and a staggering 5.3 TB/s memory
  bandwidth. The model requires processing terabytes of highly sparse feature data stored in an S3-backed
  data lake. The current setup uses Parquet files, zstd compressed, with a row-oriented logical partitioning
  strategy. Despite the powerful hardware, you observe significant HBM3 underutilization (averaging 30-40%)
  and high I/O wait times reported by your distributed training framework, severely impacting training
  throughput. The model is compute-bound when HBM is fully utilized. Diagnose the likely root cause of
  this I/O bottleneck and propose a storage format strategy that maximizes MI300X utilization.
details:
  realistic_solution: 1. **Profile Data Access Patterns:** Confirm if the model truly accesses data in
    a columnar fashion (e.g., few specific features per training step) or if it effectively reconstructs
    full, sparse feature vectors (row-wise). 2. **Optimize Parquet Configuration:** If staying with Parquet,
    experiment with `row_group_size` and `page_size` to optimize for sparse data reads. Ensure predicate
    pushdown is being effectively utilized if filtering is common. Explore dictionary encoding for sparse
    categorical features. 3. **Re-evaluate Compression:** Given the HBM bandwidth, `zstd` (high compression,
    slower decompression) might be CPU-bound. Consider `lz4` (lower compression, faster decompression)
    or even uncompressed for features frequently accessed, if network bandwidth to S3 allows, shifting
    the bottleneck away from CPU. 4. **Consider ML-Optimized Formats:** For highly sparse, variable-length
    feature vectors, specialized formats like TFRecord (especially with sequence examples) or Apache Arrow
    Feather/IPC, which are designed for efficient serialization/deserialization into ML framework tensors
    and can leverage direct memory mapping, might offer better performance. These often reduce CPU overhead
    per record. 5. **Batching and Prefetching:** Optimize data loading pipelines to prefetch and batch
    data aggressively to keep the MI300X busy, potentially offloading some preprocessing to dedicated
    data loader workers.
  common_mistake: Candidates might immediately suggest increasing S3 bandwidth, migrating data to local
    NVMe, or simply switching to TFRecord, without first analyzing the specific data access patterns,
    the overhead of CPU-bound decompression, or how Parquet's columnar nature interacts with sparse, row-wise
    feature loading for ML models.
  napkin_math: An AMD MI300X has 5.3 TB/s (5300 GB/s) HBM3 bandwidth. If HBM utilization is 35%, the effective
    data throughput is ~1855 GB/s. If the sparse feature data has a 5:1 compression ratio with `zstd`,
    the *uncompressed* data required per second is 1855 GB/s. However, typical `zstd` decompression throughput
    on a single CPU core is 0.5-1.5 GB/s. Even with a powerful host CPU offering 64 cores, the maximum
    *host-side* decompression capacity would be roughly 64-96 GB/s. This means the CPU is likely acting
    as a severe bottleneck (1855 GB/s needed vs. ~90 GB/s provided), preventing the MI300X's HBM from
    being saturated. This issue is compounded by the overhead of reconstructing sparse rows from compressed
    columnar blocks.
