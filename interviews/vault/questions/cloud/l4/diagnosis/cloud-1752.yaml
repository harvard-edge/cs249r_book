id: cloud-1752
title: Systolic Array Padding Underutilization
topic: transformer-systems-cost
status: draft
provenance: imported
scenario: You are deploying a custom Mixture of Experts (MoE) model on a Google TPU v4 cluster. The expert
  routing logic creates highly fragmented micro-batches, resulting in matrix multiplications of shape
  [Batch=32, In_Dim=128] against expert weights of [In_Dim=128, Out_Dim=64]. The profiler indicates the
  Matrix Multiply Unit (MXU) processing elements are operating at only 12.5% of peak compute efficiency,
  even though HBM memory bandwidth is nowhere near saturation. Analyze the root cause of this severe processing
  element underutilization.
details:
  realistic_solution: The MXU on TPU v4 is a 128x128 systolic array of processing elements. Hardware requires
    matrices to be padded to multiples of 128. The solution is to batch expert executions together or
    increase the micro-batch size to 128 and pad Out_Dim to 128, ensuring all processing elements are
    fed valid data rather than computing zeros.
  common_mistake: Assuming the bottleneck is memory-bound dispatch overhead or PCIe transfer limits, failing
    to account for the physical layout and zero-padding requirements of fixed-size systolic processing
    element arrays.
  napkin_math: Total PEs in a TPU MXU = 128 × 128 = 16,384. Output shape of useful work = 32 × 64 = 2,048.
    Active PEs computing valid data = 2,048 / 16,384 = 0.125 (12.5%). The remaining 14,336 PEs (87.5%)
    are continuously multiplying by zero.
