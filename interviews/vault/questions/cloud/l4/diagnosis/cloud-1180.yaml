id: cloud-1180
title: Diagnosing Low GPU Utilization in Dynamic Dispatch
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are debugging a PyTorch training pipeline for a custom autoregressive sequence model on
  a single NVIDIA A100 (80GB). Despite having a batch size that fills 90% of VRAM, `nvidia-smi` shows
  GPU utilization fluctuating between 15-25%. The PyTorch profiler indicates that the GPU is frequently
  idle, while the CPU is pegged at 100% on a single thread. The model's custom attention block is implemented
  dynamically using over 150 sequential native PyTorch scalar and vector operations per layer. Why is
  the GPU starved, and how do you analyze this bottleneck?
details:
  realistic_solution: Analyze the profiling trace to identify kernel launch overhead. In eager execution,
    each of the 150+ tiny operations triggers a separate `cudaLaunchKernel` call from the Python interpreter.
    The CPU simply cannot enqueue kernels fast enough to keep the A100's SMs busy. The solution is to
    trace the dynamic operations into a static graph using `torch.compile` (or JIT), allowing the compiler
    to perform operator fusion and reduce the total number of kernel launches.
  common_mistake: Candidates often assume the bottleneck is host-to-device PCIe bandwidth for the training
    data, or they attempt to use Distributed Data Parallel (DDP) to speed up training, completely missing
    the CPU dispatch overhead caused by eager execution.
  napkin_math: Assume 150 operations per layer, 24 layers, and a conservative 10µs CUDA kernel launch
    overhead per operation. Total CPU dispatch time per forward pass = 150 * 24 * 10µs = 36ms. If the
    massive A100 can execute the actual matrix math for these tiny operations in just 5ms, the GPU will
    spend roughly 31ms idling while waiting for the CPU to dispatch the next kernel, capping maximum GPU
    utilization at 5ms / 36ms ≈ 13.8%.
