id: cloud-1889
title: Root-Causing 2.5D Packaging HBM Failures
topic: transformer-systems-cost
status: published
provenance: imported
scenario: During the bring-up of a new AI accelerator utilizing 2.5D packaging with a massive monolithic
  compute die and 6 HBM3 stacks, you observe that the two HBM stacks located at the extreme edges of the
  package consistently fail memory training at target frequencies, forcing them to operate at 50% bandwidth.
  The central 4 HBM stacks operate flawlessly. All compute and memory chips passed Known Good Die (KGD)
  tests before packaging. Root-cause the packaging-level physical bottleneck.
details:
  realistic_solution: The physical size of the silicon interposer required to host a large compute die
    and 6 HBM stacks exceeds the standard lithographic reticle limit, requiring reticle stitching. Traces
    connecting the edge HBMs cross these stitched boundaries, suffering from degraded signal integrity
    (insertion loss) or severe mechanical stress/warpage at the package extremes, causing the microscopic
    connections to fail at high speeds.
  common_mistake: Blaming thermal throttling of the outer memory stacks, faulty HBM PHYs on the main compute
    die, or software memory allocation policies, while ignoring the physical scale of the package.
  napkin_math: Standard reticle limit = 26mm x 33mm = 858 mm^2. Compute die (~800 mm^2) + 6x HBM (~600
    mm^2) + routing overhead ≈ 1700 mm^2. This requires a >2x reticle stitched interposer. Mechanical
    warpage across a >50mm package diagonal or stitching misalignment severely degrades the 55μm pitch
    microbump integrity for the outer 1024-bit memory buses.
