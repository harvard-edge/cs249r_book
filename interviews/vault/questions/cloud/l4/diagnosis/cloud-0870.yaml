id: cloud-0870
title: Diagnosing Inter-Node AllReduce Bottlenecks
topic: collective-communication
status: published
provenance: imported
scenario: You are profiling a PyTorch DDP training job for a 1B parameter model (FP32 gradients) across
  two nodes, each with 8x A100 GPUs. Intra-node communication uses NVLink, but inter-node communication
  relies on a single 100 Gbps Ethernet NIC per node. The profiler shows the 'ncclAllReduce' kernel taking
  ~320ms per step, dropping overall GPU utilization to 45%. The team assumes the PyTorch CPU overhead
  is the bottleneck and wants to rewrite the training loop in C++. How do you diagnose the actual bottleneck?
details:
  realistic_solution: Diagnose that the bottleneck is the physical inter-node network bandwidth. For a
    1B parameter model in FP32, the gradient size is 4GB. Over a single full-duplex 100 Gbps NIC (12.5
    GB/s), the necessary reduce-scatter and all-gather phases take exactly the ~320ms observed. The solution
    is to add more NICs, use gradient accumulation, or switch to FP16/BF16 gradients.
  common_mistake: Assuming CPU overhead, PCIe latency, or framework inefficiency without calculating the
    theoretical network transfer time for the gradient payload over the 100 Gbps NIC.
  napkin_math: 1B params * 4 bytes = 4 GB of FP32 gradients. Inter-node AllReduce across 2 nodes requires
    each node to send half the data (2 GB) during reduce-scatter, and another half (2 GB) during all-gather.
    Total data sent per node = 4 GB. At 100 Gbps (12.5 GB/s), transfer time = 4 GB / 12.5 GB/s = 0.32
    seconds (320ms). The network is perfectly saturated.
