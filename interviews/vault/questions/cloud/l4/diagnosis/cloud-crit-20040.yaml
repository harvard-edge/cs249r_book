schema_version: 1
id: cloud-crit-20040
title: Diagnosing Speculation Latency Regression at High Temperature
topic: speculative-decoding
status: published
provenance: imported
scenario: Your speculative decoding system (70B target, 7B draft, K=5) shows alpha=0.82 at temperature=0.1
  but drops to alpha=0.55 at temperature=1.0, causing a net slowdown at high temperature. Diagnose the
  root cause and propose a fix.
details:
  realistic_solution: 'At temperature=0.1: both distributions are very peaked. The target assigns >90%
    probability to top-1 token, the draft assigns >80%. They agree on the top token ~90% of the time.
    TV distance is small. At temperature=1.0: target distribution is more diffuse (entropy ~4 bits), draft
    is also diffuse but has different probability mass allocation over the tail. The total variation distance
    doubles from ~0.15 to ~0.35. By the acceptance rate formula alpha = 1 - TV, alpha drops from ~0.85
    to ~0.65. Compounding over K=5 makes it worse. Fix 1: Temperature-aware adaptive K: reduce K from
    5 to 2 when temperature > 0.7. Fix 2: Apply temperature only after speculation — use temp=0 for draft
    speculation, then apply temperature scaling during the verification sampling step. This is valid because
    the rejection sampling procedure only requires that the draft and target use the same temperature.
    Fix 3: Use top-p sampling in draft to focus mass on the target''s likely tokens.'
  common_mistake: Blaming the draft model's quality at high temperature. The issue is that higher temperature
    flattens both distributions, but the draft and target flatten differently, increasing their total
    variation distance.
  napkin_math: 'Temp=0.1: TV~0.15, alpha=0.85, E[tok]=3.86, 2.75x speedup. Temp=1.0: TV~0.35, alpha=0.65,
    E[tok]=2.48. With draft cost: 2.48/(5x2+25)ms = 71 tok/s vs 40 baseline = 1.78x. At temp=0.7, alpha~0.72:
    breakeven K=3.'
