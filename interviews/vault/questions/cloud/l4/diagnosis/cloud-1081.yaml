id: cloud-1081
title: Diagnosing Mutable Lineage Failures
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are tasked with debugging a compliance failure for a deployed fraud detection model (XGBoost,
  500 features). Following a highly publicized misclassified transaction, auditors demand the exact 10TB
  dataset used to train the current model version. Your Airflow and MLflow infrastructure correctly tracked
  the training script execution and logged the source Hive table name (`fraud_features_prod`) and execution
  timestamp. However, when querying that table using the logged timestamp, the derived feature distributions
  (e.g., `user_7d_txn_vol`) completely mismatch the descriptive statistics recorded by MLflow during the
  original training run. Analyze the root cause of this lineage break.
details:
  realistic_solution: The root cause is referencing a mutable data source where late-arriving events or
    upstream data engineering backfills have silently overwritten or appended to historical partitions
    after the training run concluded. True data lineage requires immutable references. The infrastructure
    must be upgraded to a table format supporting time-travel (e.g., Apache Iceberg, Delta Lake), and
    the training pipeline must explicitly query and log the exact `snapshot_id` to the model registry
    to guarantee bit-for-bit reproducibility.
  common_mistake: Assuming that logging the table locator (URI/name) alongside an execution timestamp
    guarantees reproducibility, and attempting to debug by parsing Airflow execution logs or adding more
    granular temporal filters to the SQL query.
  napkin_math: If a 10TB table receives 50GB of late-arriving updates daily, a timestamp-based query executed
    30 days after training will implicitly include 1.5TB of data that did not exist during the original
    run. An explicit Iceberg snapshot ID isolates the exact historical state in O(1) time, eliminating
    temporal ambiguity.
