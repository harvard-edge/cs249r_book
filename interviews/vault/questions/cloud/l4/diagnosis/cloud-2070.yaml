id: cloud-2070
title: The Pipeline Debt Diagnosis
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your ML team has grown from 3 to 15 engineers over 18 months. The average time from 'experiment
  starts' to 'model in production' has increased from 2 weeks to 8 weeks, despite faster GPUs and more
  compute budget. The team is working harder but shipping slower. Identify the three most likely sources
  of this slowdown and propose structural fixes.
details:
  realistic_solution: 'Three sources of scaling debt: (1) Resource contention: 15 engineers sharing a
    fixed GPU cluster creates queueing delays. If 5 engineers submit 48-hour jobs and the cluster has
    4 slots, the 5th waits 48 hours. Solution: priority scheduling with preemption, or dynamic cloud bursting.
    (2) Pipeline fragmentation: each engineer has their own data loading, preprocessing, and evaluation
    scripts. Debugging someone else''s pipeline takes 2-3× longer than your own. Solution: standardized
    pipeline templates with shared evaluation harnesses. (3) Integration bottleneck: with 15 people committing
    to the same codebase, merge conflicts and broken experiments multiply quadratically with team size
    (per Brook''s Law). A team of 15 has 105 communication channels vs 3 for a team of 3. Solution: modular
    experiment configs (YAML/Hydra) that separate experiment definition from pipeline code.'
  common_mistake: Blaming individual productivity ('we need better engineers') rather than recognizing
    this as a systems problem. The slowdown is caused by coordination overhead and pipeline debt, not
    individual performance.
  napkin_math: 'Brook''s Law communication channels: n(n-1)/2. Team of 3: 3 channels. Team of 15: 105
    channels (35× increase). If each coordination event costs 30 minutes/week per channel: Team of 3 (3
    channels) = 1.5 person-hours/week. Team of 15 (105 channels) = 52.5 person-hours/week (more than the
    output of a full-time engineer lost to coordination).'
