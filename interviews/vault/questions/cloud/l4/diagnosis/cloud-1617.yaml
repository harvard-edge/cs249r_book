schema_version: 1
id: cloud-1617
title: Quantization Speedup Failure at Large Batch
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team serves a 7B parameter LLM on a single NVIDIA A100 (80GB VRAM, 312 TFLOPS FP16, 624
  TOPS INT8). To increase the maximum throughput for an offline processing pipeline, you apply W8A8 (INT8
  weights, INT8 activations) quantization. You test it with a very large batch size of 512. Despite the
  8-bit format doubling the theoretical peak compute capability and halving the memory footprint, profiling
  shows less than a 5% increase in token generation throughput compared to the FP16 baseline. Diagnose
  the primary architectural reason for this bottleneck.
details:
  realistic_solution: At a batch size of 512, the workload is firmly in the compute-bound regime of the
    Roofline model. While INT8 has double the theoretical peak TOPS of FP16 on the A100, achieving that
    peak requires specialized, highly optimized INT8 matrix multiplication kernels. The compute overhead
    of dynamically quantizing activations, dequantizing the accumulator outputs, and potentially lower
    hardware utilization of the available INT8 kernels effectively negate the theoretical compute advantage
    over mature, highly optimized FP16 cuBLAS kernels.
  common_mistake: Assuming that halving the precision automatically doubles throughput, ignoring the arithmetic
    intensity of large batch sizes and the hardware utilization efficiency of INT8 GEMM kernels versus
    highly optimized FP16 kernels.
  napkin_math: Arithmetic Intensity = (2 * Batch * Params) / Weight_Bytes. At batch 512, AI = (2 * 512
    * 7B) / 7GB ≈ 1024 FLOPs/Byte. A100 FP16 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte. Since
    1024 >> 156, the workload is strictly compute-bound. If the INT8 kernel only achieves 35% utilization
    (0.35 * 624 = 218 effective TOPS) due to quantization/dequantization overheads, while the FP16 kernel
    achieves 75% utilization (0.75 * 312 = 234 effective TFLOPS), throughput will not improve.
