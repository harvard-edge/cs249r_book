schema_version: 1
id: cloud-0658
title: The FP32 Fallback Penalty
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You serve a PyTorch model on a T4 GPU. The model is cast to `torch.float16`. You use standard
  matrix multiplications. However, your profiler shows the GPU is only achieving 8 TFLOPS of throughput,
  which is the theoretical maximum for FP32 on a T4. The T4 is capable of 65 TFLOPS in FP16. Why is your
  FP16 model running at FP32 speeds?
details:
  realistic_solution: 'Your FP16 data is being processed by the CUDA cores (FP32 pipeline), not the Tensor
    Cores. On the T4, Tensor Cores deliver 65 TFLOPS for FP16 but require specific conditions: matrix
    dimensions must be multiples of 8 (ideally 16), and you must use `torch.cuda.amp` or explicitly call
    cuBLAS with TF32/FP16 Tensor Core paths. Standard `torch.matmul` on FP16 tensors with non-aligned
    dimensions falls back to CUDA cores, which process FP16 at FP32 speed (8.1 TFLOPS). The fix: enable
    `torch.backends.cudnn.allow_tf32 = True` and ensure tensor dimensions are multiples of 8.'
  common_mistake: '"The model didn''t actually cast to FP16." It did; the memory footprint confirmed it.
    The issue is the math engine.'
  napkin_math: T4 Peak FP32 = 8.1 TFLOPS. Peak FP16 (Tensor Cores) = 65 TFLOPS. Failing to align dimensions
    by 1 pixel (e.g., size 127 instead of 128) silently degrades your hardware performance by exactly
    8x.
