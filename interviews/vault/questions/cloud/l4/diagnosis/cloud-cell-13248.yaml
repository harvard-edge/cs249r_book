schema_version: 1
id: cloud-cell-13248
title: Diagnose TCO Anomaly from Checkpoint I/O Costs on Cloud
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'A 70B model training run on 128 H100 GPUs (3 months, $0.50M GPU cost) shows an unexpected $180K
  in cloud storage and egress charges. Checkpoints are saved every 500 steps (10 min intervals) to S3.
  Model checkpoint size: 70B params × 4B (FP32) + optimizer states × 2 (Adam) + gradient buffer = 70B×16B
  = 1.12TB per checkpoint. Storage cost: $0.023/GB/month. Diagnose whether checkpoint frequency or storage
  retention is the primary cost driver.'
details:
  realistic_solution: 'Steps per 3 months: 3×30×24×6 steps/hr... at 10 min/step: 3×30×24×6=12,960 checkpoints.
    Each 1.12TB. Storage cost: 12,960 × 1.12TB × $0.023/GB/month × 3 months = 12,960 × 1,120 × $0.023
    × 3 = $1.0B — obviously wrong, retention matters. With 7-day retention: 1,008 checkpoints stored simultaneously.
    Cost: 1,008 × 1,120 GB × $0.023/month × 3 months = $78,145. Egress: downloading checkpoints for evaluation:
    100 checkpoints × 1.12TB × $0.09/GB = $10,080. Total: ~$88K. Actual $180K suggests no retention policy
    (30-day). Fix: 7-day rolling retention + bf16 checkpoints (560GB) → 50% cost reduction to ~$44K.'
  common_mistake: Optimizing checkpoint frequency alone; S3 storage cost accumulates from retained checkpoints,
    not just the write rate. 3 months of checkpoints compound.
  napkin_math: 'Checkpoint size: 70B×16B=1.12TB. Frequency: 10min → 144/day. 30-day retention: 4,320 stored
    × 1,120GB × $0.023 = $111K storage + $0.09/GB egress × evaluation reads ≈ $180K total. 7-day retention:
    1,008 × 1,120 × $0.023 = $26K + egress ≈ $40K. BF16: halve to $20K.'
