schema_version: 1
id: cloud-1786
title: REST Serialization Bottleneck in Inference
topic: collective-communication
status: published
provenance: imported
scenario: A fraud detection ML service on AWS using g4dn.xlarge instances (1 T4 GPU, 4 vCPUs) receives
  batches of 500 transaction embeddings (1024-dim FP32) via a REST API in JSON format. The service is
  severely CPU-bottlenecked at 98% utilization, while the T4 GPU idles at 15% utilization. GPU inference
  takes only 5ms per batch, but the end-to-end API latency is 85ms. You need to analyze the architectural
  bottleneck causing this imbalance.
details:
  realistic_solution: Analyze the CPU profile to identify that JSON parsing of massive float arrays is
    the bottleneck. Migrate the REST API to gRPC/Protobuf or switch to raw binary HTTP payloads to eliminate
    text serialization overhead.
  common_mistake: Assuming the bottleneck is compute or framework overhead and unnecessarily scaling up
    to larger GPU instances (e.g., g4dn.4xlarge) or increasing batch sizes, which only exacerbates the
    CPU saturation.
  napkin_math: 'Payload: 500 x 1024 floats = 512,000 floats. In JSON, a float string (e.g., ''-0.123456,'')
    averages 10 bytes = 5.12 MB. JSON parsing speed (~150 MB/s) means ~34ms CPU time per request. With
    4 vCPUs, max parsing throughput is ~117 req/s. The GPU inference takes 5ms (max 200 req/s). The system
    is artificially CPU-capped by REST text serialization.'
