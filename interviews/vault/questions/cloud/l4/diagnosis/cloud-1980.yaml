schema_version: 1
id: cloud-1980
title: Streaming LLM TBT Spikes
topic: memory-mapped-inference
status: published
provenance: imported
scenario: You are deploying a real-time voice assistant backend using Llama-3-8B (FP16, ~16GB weights)
  on a single A10G GPU (24GB VRAM) for streaming token generation. The SLA requires Time-Between-Tokens
  (TBT) < 50ms. At 20 concurrent streams, TBT is 30ms. However, at 40 concurrent streams, P99 TBT suddenly
  spikes to over 200ms, and GPU compute utilization drops below 30%. The server uses static, contiguous
  memory allocation for the KV cache per request, assuming a maximum sequence length of 2048 tokens.
details:
  realistic_solution: The root cause is VRAM exhaustion causing requests to queue or swap to host RAM.
    Switch to PagedAttention to dynamically allocate memory in small blocks (pages) only as tokens are
    generated.
  common_mistake: Assuming the GPU lacks compute (FLOPs) to handle the batch size of 40, or trying to
    tune the dynamic batching timeout, completely missing the memory capacity wall and PCIe swapping.
  napkin_math: Model weights = 16 GB FP16. KV cache per token = 32 layers * 8 KV heads * 128 dim * 2 (K,V)
    * 2 bytes = 131 KB. Max sequence (2048 tokens) = 268 MB per stream. 40 streams * 268 MB = 10.7 GB.
    Total Memory = 16 GB (weights) + 10.7 GB (cache) = 26.7 GB. This exceeds the A10G's 24 GB VRAM, causing
    OOM at 40 streams.
