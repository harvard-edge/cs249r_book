schema_version: 1
id: cloud-1638
title: Analyzing Edge NPU Graph Compiler Fallbacks
topic: neural-architecture-search
status: published
provenance: imported
scenario: Your hybrid cloud-edge voice assistant offloads a 5M parameter wake-word model to client-side
  Neural Processing Units (NPUs, rated at 26 TOPS at 1W) to save cloud compute costs. The baseline INT8
  model executes in 4ms. After a recent architecture update that replaced ReLU with Swish activations
  to improve recall, telemetry shows edge inference latency spiking to 120ms. This causes frequent timeouts
  and triggers expensive cloud fallbacks. Profiling reveals that NPU compute utilization has actually
  dropped during these spikes. Diagnose the root cause of this degradation.
details:
  realistic_solution: 'The NPU''s hardware compiler lacks native support for the Swish activation in INT8.
    This lack of support causes graph fragmentation: the compiler executes supported convolutions on the
    NPU, but falls back to the host CPU for the unsupported Swish layers. The massive 120ms latency spike
    is dominated by the repeated context switching and memory transfer overhead between the CPU and NPU,
    not the raw computation.'
  common_mistake: Candidates often misdiagnose this as NPU thermal throttling, or incorrectly assume that
    computing the Swish activation function requires an excessive number of FLOPs that simply overloads
    the NPU's peak throughput capacity.
  napkin_math: Baseline NPU latency = 4ms. NPU-to-CPU context switch & data transfer takes ~5ms per tensor.
    If a 12-layer model partitions into 24 subgraphs (switching CPU->NPU at every Swish layer), transfer
    overhead is 24 context switches * 5ms = 120ms. This fully explains the spike, independent of actual
    execution time.
