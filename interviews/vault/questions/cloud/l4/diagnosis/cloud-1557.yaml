id: cloud-1557
title: Diagnosing p99 Latency Spikes from Dynamic Allocation
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are deploying a ResNet-152 model for high-throughput batch inference (batch size 128) on
  an NVIDIA T4 GPU (16GB VRAM). During profiling, you notice that the 99th percentile (p99) latency spikes
  unpredictably from 45ms to over 150ms, despite average GPU utilization remaining around 65%. A timeline
  trace reveals frequent host-side stalls between kernel launches, specifically during the creation of
  intermediate activation tensors where the caching allocator falls back to synchronous `cudaMalloc` calls
  due to fragmentation. How can graph compilation and memory planning eliminate this bottleneck?
details:
  realistic_solution: Use a compiler like TensorRT or TorchInductor to perform ahead-of-time memory planning.
    The compiler analyzes the model's graph and pre-calculates a single, contiguous memory workspace (e.g.,
    a 3GB arena for all batch 128 activations). It assigns exact static byte offsets to every intermediate
    tensor based on their lifespan, completely bypassing the dynamic allocator and stabilizing p99 latency.
  common_mistake: Candidates often misdiagnose this as a compute bottleneck, thermal throttling, or PCIe
    transfer issue, suggesting smaller batch sizes or faster GPUs instead of addressing the host-side
    dynamic memory allocation overhead.
  napkin_math: 'Dynamic allocation overhead: ~20-50 μs per layer. For ~400 operations in ResNet-152, host
    overhead = 400 * 50 μs = 20ms. If the allocator fragments and hits `cudaMalloc`, sync overhead adds
    >50ms. Static planning: 1 pre-allocation at startup = 0ms runtime allocation overhead.'
