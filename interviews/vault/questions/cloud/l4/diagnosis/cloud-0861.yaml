id: cloud-0861
title: Diagnosing Clickbait Degradation in DLRM
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are managing a large-scale video recommendation pipeline deployed on 32 NVIDIA A100s handling
  40k QPS. Your team recently deployed a heavy parameter-server-based DLRM that improved offline AUC by
  0.05 and increased online Click-Through Rate (CTR) by 14%. The P99 latency strictly maintained its 50ms
  SLA. However, after a two-week A/B test, overall daily active user (DAU) retention dropped by 8% and
  total daily platform watch-time plummeted by 15%. Diagnose the root cause of this system degradation.
details:
  realistic_solution: Identify this as an Alignment Gap. The system optimized for CTR (the proxy metric),
    which inadvertently surfaced 'clickbait' content, harming user satisfaction (the business metric).
    The solution is to transition the architecture to a Multi-Gate Mixture-of-Experts (MMoE) to jointly
    predict clicks and expected watch-time, ranking items by P(Click) * Expected_Watch_Time.
  common_mistake: Candidates often assume an infrastructure failure, investigating feature staleness,
    embedding cache misses, or silent latency regressions, completely missing that the system perfectly
    optimized the wrong objective.
  napkin_math: 'Old Model: 5% CTR * 120s avg watch time per click = 6.0s expected watch time per impression.
    New Model: 5.7% CTR (a 14% relative increase, matching the scenario) * 55s avg watch time per click
    (clickbait degrades engagement) = 3.135s expected watch time per impression. Expected watch time per
    impression already incorporates the click rate, so total platform watch-time drops by approximately
    48% — not 15% as stated in the scenario. The 15% figure in the scenario is therefore inconsistent
    with these engagement metrics.'
