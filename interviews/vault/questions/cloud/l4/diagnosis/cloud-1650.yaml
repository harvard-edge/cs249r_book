schema_version: 1
id: cloud-1650
title: NVLink to PCIe Fallback
topic: collective-communication
status: published
provenance: imported
scenario: You are debugging a Tensor Parallel (TP=8) LLM training job on a single 8-GPU H100 HGX node.
  The training throughput is severely degraded. Profiling reveals that intra-node `ncclAllGather` operations
  are taking ~14x longer than expected. The node is equipped with NVLink 4.0 (900 GB/s bidirectional per
  GPU), but the communication is mysteriously slow.
details:
  realistic_solution: Use `nvidia-smi topo -m` or `NCCL_DEBUG=INFO` to diagnose the topology. The 14x
    slowdown strongly indicates NCCL has fallen back to host memory routing via PCIe Gen5 because NVLink
    P2P is blocked (typically by PCIe Access Control Services (ACS) or strict IOMMU settings). Disabling
    ACS allows NCCL to establish direct NVLink connections.
  common_mistake: Assuming the bottleneck is compute-bound, related to batch size, or blaming inter-node
    InfiniBand, without checking the intra-node topology matrix to verify if NVLink peer-to-peer (P2P)
    is actually active.
  napkin_math: 'NVLink 4.0 bidirectional bandwidth: 900 GB/s. PCIe Gen5 x16 unidirectional bandwidth:
    ~64 GB/s. Transfer time for a 1GB tensor via NVLink: 1GB / 900 GB/s = 1.1ms. Via PCIe: 1GB / 64 GB/s
    = 15.6ms. 15.6ms / 1.1ms = ~14.1x latency spike, exactly matching the profiled degradation.'
