id: cloud-0846
title: Diagnosing AOC Link Flaps and Tail Latency
topic: collective-communication
status: published
provenance: imported
scenario: A 1024-GPU training cluster uses 400G Active Optical Cables (AOCs) for inter-rack spine-leaf
  links and passive DACs for intra-rack connections. During a heavy MoE training run, AllReduce tail latency
  suddenly spikes from 50μs to over 500ms. Network telemetry shows no buffer drops or congestion, but
  ToR switches are running near their thermal limits. Ports connected via AOCs are reporting a high rate
  of uncorrectable Forward Error Correction (FEC) errors and intermittent link retrains. What is the root
  cause of this performance degradation?
details:
  realistic_solution: Diagnose that the high thermal load is causing the AOC's integrated transceivers
    to overheat. Overheating degrades laser efficiency, causing the pre-FEC Bit Error Rate (BER) to spike
    beyond the FEC limit, leading to uncorrectable errors, dropped packets, and lengthy link retrains.
  common_mistake: Assuming the issue is network congestion or a broken fiber core, while ignoring the
    power and thermal characteristics of the active transceivers permanently attached to the AOCs.
  napkin_math: A 400G AOC transceiver consumes ~12W. A 32-port switch faceplate must dissipate 32 * 12W
    = 384W. If rack ambient temp exceeds 40°C, transceiver case temp can surpass its 70°C limit. This
    spikes pre-FEC BER from 10^-8 to > 10^-3. Since KP4 FEC can only correct a BER up to ~2.4x10^-4, uncorrectable
    errors trigger link retrains, adding hundreds of milliseconds of latency.
