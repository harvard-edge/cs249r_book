schema_version: 1
id: cloud-1177
title: Diagnosing P99 Latency Spikes in Dynamic Inference
topic: mlops-lifecycle
status: published
provenance: imported
scenario: A real-time fraud detection service uses a PyTorch model deployed on AWS g4dn (NVIDIA T4). The
  strict P99 latency budget is 100ms. Model execution takes 25ms. However, under peak load of 2,000 QPS,
  P99 latency degrades to 250ms. Metrics show CPU utilization pinned at 95%, while GPU utilization never
  exceeds 35%. The service receives JSON requests, parses them, fetches 10 user features from a remote
  store via sequential REST calls, and returns JSON.
details:
  realistic_solution: Profile the pre-processing steps. Replace JSON serialization with gRPC/Protobuf
    to reduce CPU load. Convert the 10 sequential feature store lookups into a single batched request
    (e.g., Redis MGET) or parallelize them.
  common_mistake: Focusing on GPU optimizations like TensorRT or FP16 quantization, completely missing
    that the system is CPU and I/O bound before the request even reaches the GPU.
  napkin_math: Target = 100ms. Model = 25ms. Budget remaining = 75ms. 10 sequential REST calls at 5ms
    each = 50ms. JSON parse = 15ms. Total = 90ms. Under CPU load, thread contention pushes P99 to 250ms.
    Batched features (5ms) + Protobuf (2ms) drops overhead to 7ms.
