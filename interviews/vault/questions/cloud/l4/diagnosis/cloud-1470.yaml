schema_version: 1
id: cloud-1470
title: Diagnosing LLM Serving OOMs
topic: vram-budgeting
status: published
provenance: imported
scenario: You are serving Llama-2-70B (FP16 weights taking ~140GB) on a single 8x A100 40GB node (320GB
  total VRAM). To avoid reallocation latency, the serving engine statically pre-allocates the KV cache
  for the maximum sequence length of 4096 tokens for a target concurrent batch size of 128. During load
  testing, the system instantly throws CUDA OutOfMemory errors when attempting to serve 128 concurrent
  requests. Llama-2-70B uses Grouped-Query Attention (80 layers, 8 KV heads, head dimension of 128). Diagnose
  the exact memory bottleneck.
details:
  realistic_solution: Calculate the exact KV cache size and realize it consumes 160 GiB. Combined with
    the 140 GiB model weights and ~16 GiB of CUDA contexts, the total VRAM required (316 GiB) leaves only
    4 GiB for actual compute activations, leading to OOM during the prefill phase. The solution is to
    implement PagedAttention (e.g., vLLM) for dynamic block allocation, or to lower the maximum batch
    size.
  common_mistake: Candidates often blame the OOM on forward-pass activation memory or intermediate tensor
    states, failing to realize that standard LLM serving engines statically allocate massive amounts of
    VRAM for the KV cache per sequence, which scales linearly with batch size and max sequence length.
  napkin_math: 'KV cache per token = 2 (K+V) * 8 (KV heads) * 128 (dim) * 80 (layers) * 2 (bytes/FP16)
    = 327,680 bytes = 320 KiB.

    KV cache per sequence = 320 KiB * 4096 = 1,310,720 KiB = 1.25 GiB.

    KV cache for batch of 128 = 1.25 GiB * 128 = 160 GiB.

    Total VRAM required = 140 GiB (weights) + 160 GiB (KV cache) = 300 GiB. With 320 GiB total, there
    is virtually no room for CUDA contexts and prefill memory.'
