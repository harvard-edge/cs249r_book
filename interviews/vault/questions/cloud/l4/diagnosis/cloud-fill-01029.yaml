schema_version: 1
id: cloud-fill-01029
title: Diagnosing TPU Pipeline Stalls in Large Language Models
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Your team is deploying a large language model (LLM) for inference on a Google TPU v5e pod (16
  GB HBM, 197 TFLOPS BF16, 1.6 TB/s memory bandwidth per core). The model has been split into 8 stages
  for pipeline parallelism across 8 TPU cores. Initially, the throughput was satisfactory. However, after
  increasing the batch size and model complexity, you observe significant and unpredictable stalls, leading
  to much lower-than-expected throughput. The TPU utilization metrics show intermittent drops to near
  zero on various cores, followed by bursts of activity, indicating a 'bubble' effect. You suspect an
  issue with the pipeline scheduling. How would you diagnose the root cause of these stalls?
details:
  realistic_solution: "1. **Profile Communication & Computation:** Use TPU profiling tools (e.g., TensorBoard's\
    \ HBM usage, computation graphs, and device trace viewers) to visualize the execution timeline of\
    \ each pipeline stage. Identify which stages are critical path bottlenecks and where data transfers\
    \ (inter-core communication) are occurring. \n2. **Analyze Bubble Overhead:** Quantify the idle time\
    \ (bubbles) between stages. Determine if the bubbles are due to load imbalance (some stages taking\
    \ significantly longer than others), communication overhead, or inefficient micro-batch scheduling.\n\
    3. **Inspect Micro-batching Strategy:** Evaluate the current micro-batch size and the interleaved\
    \ schedule. A very small micro-batch might increase communication frequency, while a very large one\
    \ could lead to long bubbles if stages are imbalanced. Consider if the number of in-flight micro-batches\
    \ is optimal. The goal is to keep all cores busy by overlapping computation with communication and\
    \ hiding bubbles.\n4. **Data Dependency Analysis:** Confirm there are no unexpected data dependencies\
    \ that force stages to wait unnecessarily, beyond the inherent pipeline dependencies."
  common_mistake: Immediately jumping to re-partitioning the model or re-tuning hyperparameters without
    thoroughly analyzing where the bubbles are forming and why. Another common mistake is overlooking
    the impact of micro-batching strategy and communication overheads between stages, or assuming uniform
    stage execution times.
  napkin_math: If a pipeline has `S` stages and takes `T_s` time for the longest stage to process a micro-batch,
    and `T_b` is the bubble time between micro-batches due to filling/draining the pipeline, the effective
    throughput will be inversely proportional to `T_s + T_b`. A simple calculation for ideal pipeline
    latency would be `S * T_microbatch_forward` (for first micro-batch) + `(N - 1) * T_microbatch_longest_stage`
    (for subsequent micro-batches, where N is total micro-batches). If total processing time `T_total`
    is significantly higher than this ideal, then `T_total - (S * T_microbatch_forward + (N - 1) * T_microbatch_longest_stage)`
    gives an approximation of total bubble time/overhead.
