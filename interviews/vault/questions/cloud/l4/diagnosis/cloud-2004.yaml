schema_version: 1
id: cloud-2004
title: LLM Inference Trace Saturation
topic: collective-communication
status: published
provenance: imported
scenario: A distributed LLM inference cluster with 500 nodes processes 2,000 requests per second per node.
  To debug P99 latencies, the team enables high-resolution tracing, generating a 10KB JSON trace payload
  per request. All nodes send these traces directly to a centralized observability cluster over a shared
  100 Gbps inter-cluster uplink. Shortly after deployment, the uplink saturates, dropping critical control-plane
  traffic and causing cascading timeouts. Diagnose the bottleneck and propose a node-level aggregation
  strategy.
details:
  realistic_solution: Implement local aggregation and tail-based sampling on each node. Calculate metrics
    (e.g., latency histograms) locally instead of sending raw traces. Sample 100% of traces exceeding
    the P95 latency threshold and only 1% of normal requests. Batch and compress (e.g., zstd) the sampled
    traces every 5 seconds before transmission.
  common_mistake: Scaling up the centralized collector or upgrading the network link without addressing
    the unbounded telemetry generation at the source, or using simple random sampling which drops the
    rare tail-latency events needed for debugging.
  napkin_math: 'Raw telemetry generation: 500 nodes * 2,000 req/sec * 10 KB = 10,000,000 KB/sec = 10 GB/sec
    = 80 Gbps. This consumes 80% of the 100 Gbps link. With 1% sampling for normal traffic and assuming
    5% tail/errors, volume drops by ~94%, reducing bandwidth to ~4.8 Gbps.'
