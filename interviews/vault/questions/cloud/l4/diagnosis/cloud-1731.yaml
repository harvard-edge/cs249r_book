id: cloud-1731
title: Diagnosing GPU Starvation from P99 I/O Jitter
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are debugging intermittent GPU utilization drops in an 8x H100 distributed training job.
  The step time is stable at 150ms. Profiling shows that while the mean I/O fetch time from the distributed
  object store is 50ms, the 99th percentile (P99) fetch time spikes to 900ms due to multitenant network
  congestion. The data loader prefetch buffer size is currently set to 2. Why is the GPU stalling, and
  how deep must the buffer be to guarantee zero starvation?
details:
  realistic_solution: Increase the prefetch buffer depth to at least 6 batches. This ensures enough prepared
    data resides in host DRAM to keep the GPU fed during the longest expected I/O stalls.
  common_mistake: Tuning the prefetch buffer based on average I/O throughput rather than analyzing the
    long tail latency (P99 jitter) of the distributed storage system.
  napkin_math: Batches consumed during worst-case I/O = P99 I/O Time / Step Time = 900ms / 150ms = 6 batches.
    Current buffer (2) depletes in 300ms, leaving 600ms of GPU starvation.
