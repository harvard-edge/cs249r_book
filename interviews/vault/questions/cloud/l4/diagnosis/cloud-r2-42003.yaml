schema_version: 1
id: cloud-r2-42003
title: Load Balancing Algorithms and Tail Latency
topic: tail-latency
status: published
provenance: imported
scenario: Your MI300X inference cluster uses round-robin load balancing across 16 replicas. P50 is 60ms
  but P99 spikes to 900ms. You discover that some requests are 10× longer than others due to variable
  output sequence lengths. Why does round-robin fail here, and what load-balancing strategy would you
  use instead?
details:
  realistic_solution: 'Round-robin assigns by count, not by load. When request durations vary 10×, a replica
    may receive 3 long-generation requests back-to-back, each occupying 500ms, while other replicas finish
    short requests in 50ms. Switch to least-loaded or join-shortest-queue (JSQ) balancing: route each
    new request to the replica with the fewest in-flight tokens. Better still, use a token-aware scheduler
    like Orca''s iteration-level scheduling, which preempts long requests to interleave short ones. With
    JSQ on MI300X: P99 drops from 900ms to ~200ms because no replica accumulates disproportionate load.'
  common_mistake: Sticking with round-robin because it seems 'fair'. Round-robin is oblivious to request
    cost — it can stack multiple long-generation requests on the same replica while others sit idle, creating
    head-of-line blocking.
  napkin_math: 'Round-robin worst case: 3 long requests (500ms each) queued on one replica = 1500ms for
    the third request. JSQ: distributes across 16 replicas, max queue depth ~1, P99 ≈ single long request
    = 500ms. With iteration-level preemption: long requests chunked into 50ms iterations, short requests
    interleaved, P99 ≈ 120ms.'
