schema_version: 1
id: cloud-1785
title: Diagnosing Multi-Tenant GPU Resource Fragmentation
topic: roofline-analysis
status: published
provenance: imported
scenario: You are operating a Kubernetes-based ML cluster with 50 nodes, each featuring 8x H100 GPUs and
  2TB RAM. The cluster dashboard shows 120 GPUs currently available. However, a new high-priority LLM
  fine-tuning job requesting a single node with 8x H100 GPUs and 1.5TB RAM is stuck in the 'Pending' state
  with an 'Insufficient nvidia.com/gpu' event, even though 120 is much greater than 8. Analyze the cluster
  state to diagnose why the scheduler cannot place this job.
details:
  realistic_solution: Diagnose resource fragmentation by inspecting per-node allocatable capacity rather
    than aggregate cluster capacity. The 120 free GPUs are scattered (e.g., 2-3 per node). Fix this by
    configuring the scheduler for tighter bin-packing, implementing a node-defragmentation strategy (evicting/migrating
    smaller jobs), or isolating 8-GPU workloads into dedicated node pools.
  common_mistake: Assuming a network/quota issue or mistakenly believing the scheduler can pool 8 scattered
    GPUs across multiple physical nodes to satisfy a single pod's 8-GPU request.
  napkin_math: Total GPUs = 400 (50 nodes * 8). Used = 280. Free = 120. If 280 used GPUs are evenly distributed
    as ~5.6 used per node, each node has at most 2 to 3 free GPUs. The pending job requires max(free_per_node)
    >= 8. Since 3 < 8, scheduling fails despite aggregate free GPUs = 120.
