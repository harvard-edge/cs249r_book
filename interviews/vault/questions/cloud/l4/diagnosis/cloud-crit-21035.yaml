schema_version: 1
id: cloud-crit-21035
title: KV-Cache Memory as Throughput Bottleneck
topic: kv-cache-management
status: published
provenance: imported
scenario: Your Llama 3 8B serving instance on a single H100 shows only 40% GPU compute utilization despite
  a queue of 200+ pending requests. The GPU has 64 GB free after loading weights (16 GB). Nvidia-smi shows
  79 GB/80 GB memory used. Diagnose why throughput is limited despite available compute.
details:
  realistic_solution: 'The bottleneck is KV-cache memory, not compute. With 64 GB free and Llama 3 8B
    using 4 KV heads × 128 dim × 32 layers: KV per token = 2 × 4 × 128 × 2B × 32 = 65.5 KB. At average
    2K context: 131 MB per request. Maximum batch: 64 GB / 131 MB ≈ 488 requests. But the system is already
    at 79/80 GB — only ~1 GB free for new KV-cache, so batch size is capped at current level. Despite
    200+ queued requests, the system cannot increase batch size because every additional request needs
    KV-cache memory. At the current small batch size, the GPU''s Tensor Cores are underutilized (small
    matmuls during decode are memory-bandwidth-bound). Fixes: (1) Quantize KV-cache to INT8 (2× more concurrent
    requests). (2) Use PagedAttention to eliminate internal fragmentation. (3) Enable KV-cache swap to
    CPU memory for preempted requests. (4) Shorter max context length. The fundamental constraint: LLM
    decode throughput is limited by KV-cache memory capacity, not compute.'
  common_mistake: Assuming low GPU utilization means a compute scheduling problem. When memory is 99%
    full, the system cannot admit more requests to increase batch size, even though the GPU has spare
    FLOPs.
  napkin_math: 'Model weights: 16 GB (BF16). KV per request (2K ctx): 2K × 65.5 KB = 131 MB. Available:
    64 GB → max ~488 requests. Current memory: 79/80 GB → ~480 active requests using all KV space. GPU
    utilization low because decode batch=480 with 8B model has arithmetic intensity < ridge point.'
