id: cloud-1144
title: Diagnosing DIR Degradation in Loan API
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud-based automated loan approval API running on a fleet of AWS m6g.4xlarge instances processes
  500,000 applications daily. The operations team alerts you that the Disparate Impact Ratio (DIR) for
  a protected demographic group has suddenly dropped from 0.85 to 0.62 after a recent model update. The
  global approval rate remains stable at ~28%. You need to diagnose the root cause of this severe fairness
  degradation in the new model artifact.
details:
  realistic_solution: Analyze the conditional acceptance rates. A DIR of 0.62 means the unprivileged group
    is receiving favorable outcomes at 62% the rate of the privileged group. By inspecting feature importance
    for the degraded slice, you identify a new NLP embedding feature that inadvertently acted as a proxy
    for the protected attribute, skewing the model's score distribution.
  common_mistake: Assuming that a stable global approval rate or overall model accuracy implies stable
    fairness metrics across individual demographic slices.
  napkin_math: Prior DIR = P(Y=1|Unpriv) / P(Y=1|Priv) = 0.255 / 0.30 = 0.85. New DIR = 0.62. If the global
    approval rate remained stable at ~28% (assuming a roughly equal demographic split), the new rates
    must have diverged to approximately P(Y=1|Priv) = 34.2% and P(Y=1|Unpriv) = 21.2%. The unprivileged
    approval rate fell severely from 25.5% to 21.2%, while the privileged rate erroneously increased.
