schema_version: 1
id: cloud-1277
title: Diagnosing Network Saturation in Sharded Embedding Lookups
topic: collective-communication
status: published
provenance: imported
scenario: 'A deep learning recommendation model (DLRM) is deployed with its massive sparse embedding tables
  sharded by feature type across 8 backend servers. The frontend ranking service uses request-parallel
  batching: it gathers 500 incoming user requests, packages all 100 sparse feature IDs (8 bytes each)
  per request into a single batch, and broadcasts this full batch to all 8 embedding servers. The frontend
  network interface (100 Gbps) is saturating, causing P99 latency spikes, even though the embedding servers
  have low memory bandwidth utilization. Diagnose the root cause of the network bottleneck and analyze
  how the batching strategy should change.'
details:
  realistic_solution: Switch to feature-parallel batching. The frontend should transpose the batch of
    requests, grouping the sparse feature IDs by their target embedding table, and send each backend server
    only the IDs it hosts. This eliminates redundant data transfer.
  common_mistake: Recommending larger batch sizes, compressing the payloads, or upgrading to 400 Gbps
    networking, missing the fundamental inefficiency of broadcasting unneeded features to all shards.
  napkin_math: 'Request-parallel broadcast: 500 reqs * 100 features * 8 bytes = 400 KB per batch. Broadcast
    to 8 servers = 3.2 MB total transfer. Feature-parallel: Frontend sends only relevant features to each
    server (500 * 100 / 8 = 6250 IDs). 6250 * 8 bytes = 50 KB per server. Total transfer = 400 KB (an
    exactly 8x reduction), clearing the bandwidth bottleneck.'
