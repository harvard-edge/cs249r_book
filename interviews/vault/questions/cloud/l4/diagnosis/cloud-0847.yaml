id: cloud-0847
title: Cascading Failures in Active-Active Inference APIs
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A machine learning serving system uses an active-active replication strategy across three availability
  zones (AZs) for a stateless model inference API. Normally, the system processes 15,000 requests per
  second (RPS) with each AZ handling 5,000 RPS. To optimize costs while maintaining a buffer, each AZ
  is provisioned to handle a maximum of 6,500 RPS before p99 latency severely degrades. During a regional
  issue, one AZ suddenly goes offline. Shortly after, the remaining two AZs begin to experience massive
  request queueing, OOM errors, and cascading timeouts, taking the entire API offline. Diagnose the root
  cause of this systemic failure and identify the critical flaw in the deployment's capacity planning.
details:
  realistic_solution: The system was not provisioned for true N-1 redundancy. When one AZ failed, its
    5,000 RPS load was redistributed to the remaining two AZs. The new load per AZ became 7,500 RPS, which
    exceeded their maximum provisioned capacity of 6,500 RPS, triggering a cascading failure.
  common_mistake: Assuming the OOMs are caused by a memory leak or a load balancer misconfiguration rather
    than a fundamental flaw in redundancy capacity planning.
  napkin_math: 'Total RPS = 15,000. Normal RPS/AZ = 5,000. Max RPS/AZ = 6,500. After 1 AZ fails: Load
    on remaining 2 AZs = 15,000 / 2 = 7,500 RPS per AZ. Since 7,500 RPS > 6,500 RPS max capacity, the
    system collapses.'
