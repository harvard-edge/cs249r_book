id: cloud-2073
title: The GPU Cluster Utilization Mystery
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team has a dedicated 64-GPU cluster. The cluster monitoring dashboard shows average GPU
  utilization of 35% over the past month. Engineers complain about long job queue times (average 12-hour
  wait). How can GPUs be 65% idle while engineers are waiting? Diagnose the root cause and propose a solution.
details:
  realistic_solution: 'This is the classic fragmentation + allocation granularity problem. Root causes:
    (1) Allocation granularity: engineers request full 8-GPU nodes even when experiments need 1-2 GPUs,
    leaving 6 GPUs idle per allocation. (2) Temporal fragmentation: jobs are submitted in bursts (morning)
    and the cluster is idle at night, but average utilization counts both. (3) Checkpointing gaps: training
    jobs spend 10-15% of time on checkpointing and evaluation where GPUs are idle. (4) Preemption policy:
    non-preemptible jobs hold GPUs during I/O-bound phases. Fix: implement fine-grained GPU scheduling
    (fractional GPU allocation), gang scheduling for multi-GPU jobs, preemption with checkpointing for
    low-priority jobs, and backfill scheduling to slot small jobs into gaps.'
  common_mistake: Assuming low utilization means the GPUs are literally sitting empty. The GPUs may be
    allocated but underutilized — the scheduling problem, not a demand problem.
  napkin_math: '64 GPUs, 35% utilization = 22.4 GPU-equivalents of useful work. If engineers request 8-GPU
    nodes but average actual need is 3 GPUs: allocation efficiency = 3/8 = 37.5%. This alone explains
    the 35% utilization. At $3/GPU-hr: wasted = 64 × 0.65 × $3 × 720 hrs/month = $89,856/month in idle
    GPU time.'
