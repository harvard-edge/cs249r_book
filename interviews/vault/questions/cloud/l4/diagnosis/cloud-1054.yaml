id: cloud-1054
title: Analyzing High CPU Utilization in LLM Inference
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are profiling a Llama-3 8B model running on an NVIDIA H100 GPU during the decode phase (batch
  size 1, sequence length 2048). Your Nsight Systems trace shows the GPU is idle 40% of the time, while
  the host CPU utilization is pegged at 100% on a single core. The average GPU kernel execution time is
  3 microseconds. Diagnose the root cause of the GPU idle time and explain how to mitigate it.
details:
  realistic_solution: Use CUDA Graphs to capture the entire decode step into a single graph. This allows
    the CPU to launch the entire sequence of operations with a single API call, offloading the scheduling
    to the GPU hardware and eliminating the host-side launch overhead bottleneck.
  common_mistake: Candidates often assume the GPU is memory bandwidth bound or that the model needs quantization,
    failing to recognize that 3 microsecond kernels are completely dominated by the ~5-10 microsecond
    CPU kernel launch overhead.
  napkin_math: 'Assume 300 kernels per decode step. Without CUDA graphs: CPU launch time = 300 * 5µs =
    1.5ms. GPU execution time = 300 * 3µs = 0.9ms. The CPU cannot feed the GPU fast enough. With CUDA
    graphs: 1 launch (5µs) + GPU execution (0.9ms) = ~0.9ms per token, eliminating the 1.5ms CPU bottleneck.'
