id: cloud-0896
title: Diagnosing Low SM Utilization in LLM Decoding
topic: extreme-quantization
status: published
provenance: imported
scenario: Your team deploys a 7B parameter LLM in FP16 on a single NVIDIA A100 (312 TFLOPs FP16 compute,
  2 TB/s memory bandwidth) for real-time chatbot inference at batch size 1. Telemetry shows an average
  token generation latency of ~7ms, but the GPU SM compute utilization is stubbornly stuck under 1%. An
  engineer proposes upgrading to an H100 (989 TFLOPs FP16) to solve the 'compute inefficiency' and lower
  the latency to 2ms. As the lead ML Systems engineer, analyze the bottleneck and evaluate this proposal.
details:
  realistic_solution: Diagnose the decoding step as a 'bandwidth hog' due to its extremely low arithmetic
    intensity. Reject the H100 compute upgrade as it will only scale with the memory bandwidth increase
    (~1.5x), not compute. Instead, increase arithmetic intensity via continuous batching, or reduce memory
    traffic using weight quantization (e.g., AWQ/GPTQ) and speculative decoding.
  common_mistake: Assuming low SM utilization indicates a CPU bottleneck or insufficient GPU compute power,
    leading to expensive and ineffective hardware upgrades without addressing the fundamental memory bounds.
  napkin_math: 'Model weights = 7B * 2 bytes = 14 GB. Generating 1 token requires reading all weights
    once: Time = 14 GB / 2 TB/s = 7 ms. Arithmetic Intensity = 14 GFLOPs / 14 GB = 1 FLOP/byte. A100 Ridge
    Point = 312 TFLOPs / 2 TB/s = 156 FLOPs/byte. Since AI (1) << Ridge Point (156), the workload is heavily
    memory bandwidth bound. Max compute achievable = 2 TB/s * 1 FLOP/byte = 2 TFLOPs, which is exactly
    0.6% of the 312 TFLOPs peak.'
