id: cloud-1195
title: Resource Exhaustion in ELT Feature Generation
topic: compound-ai-systems
status: published
provenance: imported
scenario: A machine learning team has adopted an ELT architecture, loading 20 TB of raw, highly nested
  application telemetry data (JSON) daily directly into BigQuery's native JSON/VARIANT columns. They run
  complex SQL transformations to generate user embeddings and feature vectors directly in the warehouse.
  Recently, their daily feature generation DAG has started failing with "Resource Exceeded" errors during
  the transformation phase, despite slot limits being increased to 2000. What is the root cause of the
  resource exhaustion, and how should the transformation pipeline be restructured to handle this scale?
details:
  realistic_solution: 'The root cause is the CPU and memory overhead of repeatedly parsing large nested
    JSON objects during complex joins and aggregations. Scanning 20TB of raw JSON to extract 5 fields
    requires full row evaluation. The solution is a multi-hop ELT (Medallion architecture): materialize
    the 5 required fields into a columnar format where they represent just 2% of the original size (~400GB).
    Subsequent analytical queries scan 400GB instead of 20TB, eliminating memory exhaustion during multi-way
    joins.'
  common_mistake: Assuming the data warehouse can infinitely scale complex aggregations on nested JSON
    structures without performance penalties, and trying to fix the issue by throwing more compute slots
    at the problem rather than restructuring the data layout.
  napkin_math: Scanning 20 TB of JSON to extract 5 fields requires full row evaluation. Materializing
    to a columnar format where the 5 fields represent just 2% of the original size reduces subsequent
    analytical scans to 400 GB. With 2000 slots processing ~20 GB/s total, scanning 20 TB takes ~1000s
    of slot time per query, while scanning the 400 GB materialized columns takes ~20s, eliminating memory
    exhaustion during complex multi-way joins.
