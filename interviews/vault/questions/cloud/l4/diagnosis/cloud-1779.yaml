id: cloud-1779
title: Diagnosing RDMA Fallback and Kernel Overhead
topic: collective-communication
status: published
provenance: imported
scenario: You are benchmarking a distributed training job across 16 nodes, each equipped with 8x A100
  GPUs and 4x 200Gbps Mellanox HDR InfiniBand NICs. Profiling the NCCL AllReduce operations reveals per-message
  latencies of 45µs and unusually high `ksoftirqd` CPU usage on the host. While theoretical network bandwidth
  is 800Gbps per node, your benchmarks only achieve 150Gbps. Analyze the system profile to diagnose the
  root cause of this bottleneck.
details:
  realistic_solution: The high `ksoftirqd` usage and 45µs latency strongly indicate that RDMA kernel bypass
    has failed, forcing NCCL to fall back to standard TCP/IP sockets over IPoIB. You must verify that
    user-space libraries (libibverbs) are properly loaded, the GPU Direct RDMA modules are active, and
    NCCL is configured to use the IB interfaces rather than falling back to IP routing.
  common_mistake: Assuming the network switch is congested or the PCIe bus is bottlenecked, without realizing
    that high `ksoftirqd` CPU usage indicates the host kernel is actively processing network packets.
  napkin_math: RDMA latency is typically ~2µs due to zero-copy kernel bypass. The TCP/IP stack adds ~40µs
    of latency due to context switching and kernel buffer copies. For a 1MB message on a 200Gbps (25GB/s)
    link, pure wire transfer time is 40µs. Adding 40µs of TCP overhead doubles the total transmission
    time (80µs), halving the effective throughput for 1MB chunks and severely bottlenecking latency-sensitive
    AllReduce operations.
