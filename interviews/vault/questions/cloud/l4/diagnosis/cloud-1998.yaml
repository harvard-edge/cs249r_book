id: cloud-1998
title: 'Systolic Array Padding Underutilization: Transformer Systems Cost'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A team is running a custom deep learning model on Cloud TPU v4, which features 128x128 Matrix
  Multiply Units (MXUs). Profiling reveals that a specific dense layer with input shape `[Batch=64, Features=100]`
  and weight matrix `[100, 64]` is achieving less than 20% compute utilization. The layer is fully resident
  in on-chip SRAM, so memory bandwidth is not the bottleneck. Diagnose the root cause of this severe underperformance
  in the systolic array.
details:
  realistic_solution: Because the TPU's systolic array is a physical 128x128 grid, any matrix dimension
    that isn't a multiple of 128 is hardware-padded with zeros. The system evaluates a `[128, 128] x [128,
    128]` matrix multiply under the hood. The solution is to redesign the network dimensions (Batch, Features,
    Output) to be multiples of 128, which will dramatically increase useful throughput without taking
    any additional execution time.
  common_mistake: Candidates often incorrectly diagnose this as an SRAM bandwidth limitation, CPU-to-accelerator
    transfer bottleneck, or framework overhead, failing to analyze how physical fixed-grid MAC arrays
    handle misaligned tensor dimensions.
  napkin_math: Theoretical Useful MACs = 64 (Batch) × 100 (Features) × 64 (Output) = 409,600. Padded Hardware
    MACs executed = 128 × 128 × 128 = 2,097,152. Hardware Compute Utilization = 409,600 / 2,097,152 ≈
    19.5%. Over 80% of the systolic array's cycles are wasted multiplying zeros.
