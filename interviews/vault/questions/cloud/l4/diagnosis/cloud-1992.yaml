id: cloud-1992
title: Diagnosing Low TFLOPS in Single-Batch Inference
topic: vram-budgeting
status: published
provenance: imported
scenario: You are benchmarking a 1.5B parameter language model on an NVIDIA A100-80GB SXM4 (312 TFLOPS
  FP16 peak, 2.0 TB/s HBM bandwidth). During single-batch autoregressive inference (sequence length 1024),
  profiling shows the GPU is achieving only about 2 to 4 TFLOPS per GPU (less than 2% of advertised peak).
  The infrastructure team suspects defective hardware or severe PCIe transfer bottlenecks. Diagnose the
  root cause of this massive gap between promised and observed performance.
details:
  realistic_solution: The system is functioning perfectly but is severely memory-bandwidth bound. Single-batch
    autoregressive generation relies on matrix-vector multiplications, which have an extremely low arithmetic
    intensity (approx 1-2 FLOPs/Byte). According to the Roofline model, performance is hard-capped by
    the memory bandwidth, making the 312 TFLOPS compute peak mathematically unreachable for this workload.
  common_mistake: Blaming CPU-to-GPU PCIe transfer latency, unoptimized CUDA kernels, or Python framework
    overhead without analyzing the workload's inherent arithmetic intensity.
  napkin_math: 'A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.

    Batch 1 Linear Layer (Matrix-Vector) AI = (2 * N * M FLOPs) / (N * M * 2 Bytes for FP16 weights) ≈
    1 FLOP/Byte.

    Theoretical Max Performance = AI * Bandwidth = 1 FLOP/Byte * 2.0 TB/s = 2.0 TFLOPS.

    The observed 2-4 TFLOPS perfectly matches the memory-bound limit.'
