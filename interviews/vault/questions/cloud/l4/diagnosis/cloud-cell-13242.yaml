id: cloud-cell-13242
title: Diagnose Systolic Array Underutilization for Non-Square Matrices
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'A TPU v5e (256×256 systolic array, 197 TOPS BF16) is running a transformer''s feedforward layer
  with matrix dimensions W: [8192×4096] multiplied by batch X: [1×8192] (decode mode, batch size 1). Profiling
  shows only 0.4% hardware utilization. Diagnose why utilization collapses at batch size 1 and propose
  minimum batch size for >50% utilization.'
details:
  realistic_solution: 'Systolic 256×256 array operates on 256 rows simultaneously. Input [1×8192] feeds
    only 1 row → 255/256 = 99.6% of PEs idle. For 50% utilization: need at least 128 rows = batch size
    128. At batch 128: X=[128×8192], W=[8192×4096]. The array can process 256 rows; 128/256=50% row utilization.
    Column dimension: 4096/256=16 tiles, each 100% utilized. Effective utilization: 50%×100%=50%. Minimum
    batch for 50%: 128. Practical recommendation: batch=256 for full utilization. For latency-constrained
    decode: use continuous batching to aggregate requests.'
  common_mistake: Attributing low utilization to memory bandwidth bottleneck; at batch=1, the systolic
    array has a geometric mismatch — the input vector has only 1 row, filling only 1/256 of the array's
    row capacity.
  napkin_math: 'Array size: 256×256. Batch=1: 1/256 = 0.39% row utilization ≈ observed 0.4%. Batch=128:
    128/256 = 50%. Batch=256: 100%. At 50% util: 0.5×197 TOPS = 98.5 TOPS effective. With batch=256: 197
    TOPS = 197×10¹² / (2×8192×4096×256) ops per step = 197T/17.2G = 11,456 steps/s.'
