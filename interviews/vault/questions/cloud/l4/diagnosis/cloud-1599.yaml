title: 'Diagnosing Low MFU in LLM Training: Pruning & Sparsity'
topic: pruning-sparsity
status: draft
provenance: imported
scenario: You are profiling a 7B parameter LLM training job on an 8x NVIDIA A100-80GB node (peak 312 TFLOPS
  BF16 per GPU). The global batch size is 32, and sequence length is 2048. Your iteration time is 3.5
  seconds per step. Your infrastructure monitoring shows 100% GPU utilization, but you suspect the actual
  mathematical efficiency is poor. Diagnose the root cause of this inefficiency, explicitly distinguishing
  between Model FLOPS Utilization (MFU) and Hardware FLOPS Utilization (HFU).
details:
  realistic_solution: First, calculate actual MFU (~31.5%). Since `nvidia-smi` shows 100%, the GPUs are
    active but not performing dense math efficiently. The gap between HFU and MFU is often caused by activation
    recomputation. The overall low MFU is likely due to memory bandwidth bottlenecks from unfused element-wise
    operations, small micro-batch sizes leading to low arithmetic intensity, or blocking communication
    overheads.
  common_mistake: Relying on `nvidia-smi` utilization as a measure of compute efficiency, or failing to
    realize that activation checkpointing inflates HFU (Hardware FLOPS) without improving MFU (useful
    Model FLOPs).
  napkin_math: 'Tokens per step = 32 * 2048 = 65,536.

    Model FLOPs per token ≈ 6 * 7B = 42 GFLOPs.

    Total FLOPs/step = 65,536 * 42e9 ≈ 2.75e15 FLOPs (2752 TFLOPs).

    Total throughput = 2752 TFLOPs / 3.5s = 786 TFLOPS.

    Per-GPU throughput = 786 / 8 = 98.25 TFLOPS.

    MFU = 98.25 / 312 (peak) ≈ 31.5%.'
