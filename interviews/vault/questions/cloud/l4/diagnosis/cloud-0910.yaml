id: cloud-0910
title: Diagnosing S3 Batch Ingestion Bottleneck
topic: streaming-ingestion
status: published
provenance: imported
scenario: Your ML pipeline ingests 5TB of raw daily telemetry for a recommendation model. Data arrives
  as 100 million 50KB JSON files in an S3 bucket. A 20-node Spark cluster (8 vCPUs, 32GB RAM, 10Gbps network
  per node) runs the daily batch job, but it takes over 10 hours and misses the 4-hour SLA. Worker CPU
  utilization remains below 10%, and network throughput is a fraction of capacity. How do you diagnose
  the root cause of this ingestion bottleneck?
details:
  realistic_solution: Identify S3 API request limits and per-request latency as the bottleneck. Implement
    a compaction step to group the 50KB files into 128MB+ Parquet files before the main Spark ingestion.
  common_mistake: Assuming the bottleneck is compute or network bandwidth and suggesting scaling up the
    cluster, rather than diagnosing the small-file I/O overhead.
  napkin_math: 100M files / 5,500 S3 GETs per second (typical prefix limit) = ~18,181 seconds (5.05 hours)
    absolute minimum S3 API time alone. For 160 tasks (20 nodes * 8 cores) at 50ms latency per GET, connection
    overhead dominates processing.
