id: cloud-1653
title: Diagnosing Object Storage Prefix Rate Limits in Streaming
topic: streaming-ingestion
status: published
provenance: imported
scenario: A training job on an 8x H100 node (equipped with 400 Gbps / 50 GB/s network capacity) streams
  a 50TB dataset directly from AWS S3 using concurrent HTTP byte-range requests. The dataset is stored
  as a single massive file at `s3://bucket/data/train.bin`. The data loader fetches 2MB chunks concurrently.
  Despite having 50 GB/s of available instance network bandwidth and zero local CPU bottlenecks, the data
  loading throughput flatlines at exactly 11 GB/s, causing severe GPU starvation. Diagnose the root cause
  of this bottleneck.
details:
  realistic_solution: The bottleneck is the object storage partition rate limit. S3 caps GET requests
    at 5,500 per second per prefix. The solution is to shard the dataset across multiple prefixes (e.g.,
    `s3://bucket/data/shard_0001/`) and increase the HTTP byte-range chunk size (e.g., to 16MB) to maximize
    throughput per request.
  common_mistake: Assuming the bottleneck is the instance network interface (e.g., AWS ENA limits), TCP
    window scaling issues, or Python's GIL restricting concurrent async HTTP requests.
  napkin_math: 'S3 Prefix Limit = 5,500 GETs/sec.

    Max Throughput = 5,500 req/sec * 2 MB/req = 11,000 MB/sec = 11 GB/s.

    To saturate the 50 GB/s network with a single prefix, the minimum byte-range chunk size must be: 50,000
    MB/s / 5,500 req/s ≈ 9.1 MB.'
