schema_version: 1
id: cloud-0937
title: A100 KV Cache L2 Thrashing
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: A custom transformer inference kernel on an NVIDIA A100 (40MB L2 cache, 192KB L1/SM) experiences
  a severe throughput collapse when scaling from batch size 1 to 16. Nsight Compute profiling reveals
  DRAM read bandwidth is saturated, but compute utilization is under 15%. The kernel processes sequences
  of 4096 tokens with a hidden dimension of 1024 in FP16. Analyze the memory hierarchy bottleneck causing
  this regression.
details:
  realistic_solution: Diagnose that the 256MB KV cache working set for batch 16 completely evicts the
    40MB L2 cache. The fix requires implementing an SRAM-aware tiling strategy (like FlashAttention) to
    load Q, K, V blocks directly into the 192KB L1/Shared Memory, fusing the operations to prevent intermediate
    HBM roundtrips.
  common_mistake: Assuming the performance drop is due to total HBM capacity limits or insufficient compute
    parallelism, missing that the working set now far exceeds the L2 cache, causing catastrophic thrashing.
  napkin_math: 'KV cache per batch element per layer: 4096 (seq) * 1024 (dim) * 2 (FP16 bytes) * 2 (K+V)
    = 16 MB. For batch 16: 16 MB * 16 = 256 MB. 256 MB >> 40 MB A100 L2 cache. Each generation step forces
    a full 256MB read from slow HBM instead of the fast L2 cache.'
