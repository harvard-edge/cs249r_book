id: cloud-1274
title: Diagnosing Co-tenant Voltage Fault Injections
topic: power-budgeting
status: published
provenance: imported
scenario: Your team deployed a sensitive fraud detection model (25M parameters) in a secure cloud environment
  using confidential computing VMs (like Intel SGX or AMD SEV) to protect against host-level tampering.
  Despite the cryptographic memory isolation, the model periodically starts classifying high-confidence
  fraudulent transactions as benign. Telemetry shows these anomalies strictly correlate with a co-resident
  VM on the same physical host executing massive bursts of high-power AVX-512 instructions. Analyze the
  root cause of these targeted misclassifications and explain how the hardware-level isolation was bypassed.
details:
  realistic_solution: Diagnose this as a software-induced voltage fault injection attack (e.g., Plundervolt).
    The co-tenant VM uses a power-virus workload to induce transient voltage drops across the shared processor
    package. This causes hardware-level timing violations and deterministic bit flips in the victim's
    CPU cache or ALUs before the data is encrypted by the memory controller.
  common_mistake: Assuming the cryptographic isolation of the secure enclave was cryptographically broken
    or that the hypervisor directly modified encrypted memory via software.
  napkin_math: A sudden 15% voltage drop (e.g., 1.0V down to 0.85V) can increase CPU logic gate propagation
    delay by ~20%. For a 3.0 GHz processor (333ps clock period) with a 300ps critical path, the delay
    increases to 360ps. Since 360ps > 333ps clock period, setup time violations occur on flip-flops, resulting
    in flipped bits during the FP32 matrix multiplications.
