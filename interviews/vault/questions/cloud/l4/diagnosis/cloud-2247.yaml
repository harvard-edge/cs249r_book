schema_version: 1
id: cloud-2247
title: The Streaming Deduplication State Explosion
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your data pipeline ingests a continuous web crawl at 500 GB/hour and must deduplicate documents
  against the existing 50 TB corpus in near-real-time (within 10 minutes of ingestion). A colleague proposes
  a Flink streaming job that maintains a Bloom filter of all document hashes in memory for exact dedup,
  plus a MinHash LSH index in RocksDB state for fuzzy dedup. After 2 weeks, the job's checkpoint time
  has grown from 30 seconds to 25 minutes, exceeding the 10-minute checkpoint interval, and the job starts
  failing. Diagnose the root cause and propose an architecture that handles unbounded state growth.
details:
  realistic_solution: 'The root cause is unbounded state growth in both the Bloom filter and the RocksDB
    LSH index. The Bloom filter for 50 TB of documents (at ~500 bytes/doc average, that''s ~100B documents)
    requires ~120 GB at 1% false positive rate (10 bits per element). After 2 weeks of ingesting 500 GB/hour
    = 168 TB new data, the filter has grown to hold ~400B+ entries (500+ GB), exceeding memory. The RocksDB
    state similarly grows linearly. The fix: externalize the dedup index. Use a tiered architecture: (1)
    Hot tier: in-memory Bloom filter covering only the last 7 days of ingested documents (~84 TB, ~170B
    entries, manageable at ~200 GB). (2) Warm tier: an external service (Redis cluster or dedicated dedup
    microservice) holding the full corpus hash index, queried asynchronously. (3) The Flink job checks
    the hot Bloom filter synchronously (sub-millisecond) and queries the external index asynchronously
    with batched lookups. Checkpoint only contains the hot tier. (4) Periodically compact the hot tier
    into the external index and reset.'
  common_mistake: '"Increase the checkpoint interval to 30 minutes." This extends the window of data loss
    on failure and doesn''t solve the fundamental problem of unbounded state growth.'
  napkin_math: 'Bloom filter sizing: n=100B elements, p=0.01 FPR → m = -n × ln(p) / (ln 2)² ≈ 10 × 100B
    = 1 trillion bits = 125 GB. After 2 weeks at 500 GB/hr: ~400B additional docs → Bloom grows to 500
    GB. Flink checkpoint of 500 GB state to S3 at 2 GB/s = 250 seconds = 4.2 minutes — but RocksDB compaction
    + serialization overhead 5× → 25 minutes. Hot-only Bloom (7 days, 170B entries): 200 GB checkpoint
    in ~100 seconds — feasible with 5-minute intervals.'
