id: cloud-fill2-32049
title: FlashAttention with Variable-Length Sequences in a Batch
topic: flash-attention
status: published
provenance: imported
scenario: Your serving batch contains 8 requests with lengths [128, 256, 512, 1024, 2048, 4096, 8192,
  16384]. Standard padding to max length (16384) wastes 93% of compute. How does FlashAttention handle
  variable-length sequences efficiently, and what data structure enables this?
details:
  realistic_solution: 'Sum of N² for N=128 to 16384: 357,908,480 ≈ 357.9M (not 91.2M which stops at N=4096).'
  common_mistake: Padding all sequences to the max length and applying attention masks. This wastes compute
    quadratically — a 128-token sequence padded to 16384 wastes 99.4% of its attention computation.
  napkin_math: 'Sum of squares for memory analysis: N² for N in {128, 256, 512, 1024, 2048, 4096, 8192,
    16384}. = 16,384 + 65,536 + 262,144 + 1,048,576 + 4,194,304 + 16,777,216 + 67,108,864 + 268,435,456
    = 357,908,480 ≈ 357.9M (not 91.2M which only sums up to N=4096).'
