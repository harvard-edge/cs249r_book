id: cloud-1261
title: Starved Urgent Jobs in Fair-Share Clusters
topic: roofline-analysis
status: published
provenance: imported
scenario: A centralized ML platform manages 1,024 A100 GPUs using a fair-share scheduler with a 7-day
  half-life historical usage decay. Team X runs a continuous pre-training job using 600 GPUs daily. Team
  Y, which hasn't used the cluster in a month, submits a massive batch of 100 independent 8-GPU jobs.
  Team X then submits an urgent 16-GPU debugging job. Team X's debugging job remains in a 'Pending' state
  for 8 hours, even though 128 GPUs become available during that time (which are immediately allocated
  to Team Y). Diagnose the root cause of Team X's job starvation and identify the architectural adjustment
  needed to support urgent debugging.
details:
  realistic_solution: Team X's massive historical usage (600 GPUs daily) severely depressed their fair-share
    priority score compared to Team Y's clean slate. The solution is to introduce Quality of Service (QoS)
    tiers or a dedicated 'interactive/debug' queue with strict size and time limits (e.g., max 16 GPUs,
    2 hours) that preempts or overrides the standard fair-share calculation.
  common_mistake: Candidates often assume that smaller job sizes (16 GPUs) or job submission time dictate
    priority, ignoring that fair-share algorithms heavily penalize historical usage to balance long-term
    resource allocation across tenants.
  napkin_math: Team X historical usage penalty ~ 600 GPUs * 7 days / ln(2) ≈ 6,060 GPU-days (correct integral
    of exponential decay with 7-day half-life). Team Y penalty = 0 GPU-days. If Priority is inversely
    proportional to usage (e.g., Priority ∝ 1 / (Usage + 1)), Priority(Y) = 1.0 > Priority(X) ≈ 0.000165.
    Team Y wins all scheduling cycles until their accumulated usage catches up.
