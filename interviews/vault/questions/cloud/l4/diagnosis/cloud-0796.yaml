id: cloud-0796
title: The Training-Serving Skew
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Our model achieves 95% accuracy when evaluated offline on an A100 cluster, but drops to 70%
  when deployed to production on T4 GPUs. The model weights and the Python feature code are identical.
  How do the different hardware paths cause this numerical divergence?
details:
  realistic_solution: Hardware-induced Training-Serving Skew. Even with identical Python code, the underlying
    hardware and runtime execute the math differently. The A100 offline evaluation likely used PyTorch
    with TF32 (TensorFloat-32) enabled by default, which truncates the mantissa to 10 bits. The production
    T4 (which doesn't support TF32) might be running a TensorRT compiled engine in FP16, or falling back
    to FP32. Furthermore, different CUDA versions or cuDNN libraries between the clusters can select different
    convolution algorithms (e.g., Winograd vs. GEMM) which accumulate floating-point rounding errors differently.
    Over a 50-layer network, these micro-differences compound into completely different activation distributions
    at the final classification layer.
  common_mistake: '"The test set isn''t representative of production data." Distribution shift is possible,
    but hardware-induced numerical divergence is a silent killer when weights and code are identical.'
  napkin_math: 'A single FP32 vs FP16 addition can have a relative error of $\sim 10^{-4}$. In a ResNet-50,
    an input image undergoes $\sim 10^9$ MAC operations. If the A100 uses TF32 (10-bit mantissa) and the
    T4 uses FP16 (10-bit mantissa) but with different rounding modes or accumulation orders in the Tensor
    Core, the final logit values can drift by 5-10%. For edge-case inputs where the model is uncertain
    (logits: [0.51, 0.49]), this hardware-level numerical drift is enough to flip the argmax classification,
    dropping overall accuracy from 95% to 70%.'
