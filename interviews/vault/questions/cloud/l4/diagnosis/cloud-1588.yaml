id: cloud-1588
title: Large Batch MLPerf Convergence Analysis
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team is running the MLPerf Training v3.0 benchmark for GPT-3 (175B) on 512 H100 GPUs. To
  improve hardware utilization, you double the global batch size from 2M to 4M tokens, which successfully
  increases overall cluster throughput by 25% (tokens/sec). However, your official MLPerf 'Time to Train'
  metric regresses by 20%, failing to meet the target baseline. Individual step times are deterministic
  and there are no network bottlenecks. Analyze why the MLPerf metric regressed despite the increased
  hardware throughput.
details:
  realistic_solution: The regression is caused by exceeding the model's critical batch size. MLPerf measures
    strictly wall-clock time-to-convergence to a target validation metric, not raw throughput. While the
    larger batch size processed tokens faster, the statistical efficiency per token plummeted. The model
    required significantly more total tokens (and thus steps) to converge. The solution is to retune the
    learning rate schedule (e.g., applying the linear scaling rule with warmup) or revert to the optimal
    batch size.
  common_mistake: Assuming that higher cluster throughput (tokens/sec or TFLOPS) directly translates to
    a faster MLPerf 'Time to Train', leading candidates to falsely diagnose non-existent network stragglers
    or CPU bottlenecks.
  napkin_math: 'Baseline: B=2M, 1.0s/step, 1000 steps to target loss -> T_train = 1000s. Throughput =
    2M/1.0 = 2M tok/s.

    New: B=4M, 1.6s/step. Throughput = 4M/1.6 = 2.5M tok/s (25% higher throughput).

    Due to statistical efficiency loss, convergence requires 750 steps (instead of an ideal 500).

    New T_train = 750 * 1.6s = 1200s (20% regression in time-to-train).'
