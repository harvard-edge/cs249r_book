schema_version: 1
id: cloud-r2-40020
title: Phantom Congestion from NCCL Tree AllReduce
topic: congestion-control
status: published
provenance: imported
scenario: After switching from ring to tree AllReduce on a 512-A100 cluster, you see a 40% spike in ECN-marked
  packets despite no change in total data volume. The tree reduction creates intermediate aggregation
  nodes that temporarily buffer partial results. Diagnose why tree AllReduce generates more congestion
  signals than ring AllReduce with the same data volume.
details:
  realistic_solution: 'In ring AllReduce with N GPUs, each GPU sends/receives 2×(N-1)/N of the data, distributed
    uniformly across N links — no single link sees more than 1/N of total traffic. In tree AllReduce,
    intermediate aggregation nodes receive data from their 2 children (binary tree) before forwarding
    to the parent. At level 1: 256 nodes, each with 2:1 incast. At level 2: 128 nodes, each aggregating
    4 original streams cumulatively. The root''s uplink carries the fully aggregated data (~50% of all
    traffic), which is ~256× more concentrated than a single ring link. At the first spine level, tree
    roots create 8:1 or 16:1 incast at switch ports, triggering ECN marking even though average utilization
    is low. Fix: use double-binary tree (two trees with complementary roots) to halve the incast factor,
    or switch to recursive halving-doubling which balances traffic more evenly.'
  common_mistake: Assuming congestion is only about total bytes. Tree AllReduce has the same total data
    volume as ring but concentrates traffic at tree roots, creating incast patterns that ring AllReduce
    avoids by design.
  napkin_math: '512-GPU binary tree: at each level, each node receives from exactly 2 children (binary
    tree property). Root: 2:1 incast. Level below root: 128 nodes each with 2:1 incast. Each level doubles
    the incast factor cumulatively, but no single node ever receives from all 512 sources simultaneously.
    The root''s uplink carries ~50% of total traffic (all data aggregated) vs ring where each link carries
    1/512 — so root link is ~256× more loaded than a ring link. Double-binary tree halves this to ~128×
    per root.'
