schema_version: 1
id: cloud-0146
title: The Continuous Batching Tail Latency Paradox
topic: batching-strategies
status: published
provenance: imported
scenario: Your LLM inference service uses a state-of-the-art continuous batching scheduler on H100s. Your
  average Time-to-First-Token (TTFT) is excellent, around 150ms. However, your P99 TTFT metric is failing
  its 500ms SLO, with frequent spikes into the 1.5-2 second range. Your manager suspects a hardware or
  network issue is causing intermittent stalls. You, however, notice in the logs that these latency spikes
  correlate with the arrival of requests with very long prompts (e.g., 4000+ tokens for summarization)
  mixed in with normal, short-prompt chat requests. Differentiate the underlying mechanism of how a continuous
  batching scheduler's prefill phase can create this tail latency from a potential hardware fault. Examine
  the relationship between the prefill operation and the decode operation in the batching loop.
details:
  realistic_solution: 'This is not a hardware fault, but a fundamental characteristic of how Transformer
    inference and batching schedulers work. The process is two-phased: (1) Prefill phase (compute-bound):
    When a new request arrives, the scheduler must process its entire prompt in a single forward pass
    to build the KV cache. For a 4,000-token prompt on a 70B model, this requires ~560 TFLOPs of compute
    — roughly 566ms at 100% H100 utilization, or ~1.1 seconds at realistic 50% utilization. During this
    time, the GPU is monopolized by this single request''s prefill. (2) Decode phase (memory-bound): Generating
    subsequent tokens is lightweight per step (~42ms each) and can be batched efficiently across many
    concurrent requests. The interference mechanism: in a continuous batching loop, decode steps for existing
    users typically take ~42ms. When a long-prompt prefill arrives, it blocks the entire GPU for 600-1100ms.
    All decode-phase users are stalled during this period — no tokens generated. A new short request arriving
    just before a long prefill experiences TTFT = queue_wait + prefill_time ≈ 1.1s+. This explains the
    P99 TTFT spikes to 1.5-2s. The fix is chunked prefill: break the 4,000-token prefill into smaller
    chunks (e.g., 512 tokens), interleaving decode steps between chunks. This caps the maximum stall duration
    to ~70ms per chunk instead of 1.1 seconds for the full prefill.'
  common_mistake: Blaming the hardware (like the manager) or assuming continuous batching is 'magic'.
    A common misconception is that continuous batching completely isolates requests. While it's a huge
    improvement over static batching, the core scheduling loop is still a shared resource, and a single
    monolithic operation can become a bottleneck.
  napkin_math: '**Decode step (memory-bound):** | Each decode step reads all model weights: 70B × 2 bytes
    = 140 GB | H100 bandwidth: 3.35 TB/s | Time per decode step = 140 GB / 3,350 GB/s ≈ 41.8 ms/step |
    This generates 1 token per sequence in the batch. | **Prefill (compute-bound):** | For a 4,000-token
    prompt: FLOPs ≈ 2 × 70B × 4,000 = 560 TFLOPS | H100 FP16 peak: 989 TFLOPS | Prefill time ≈ 560 / 989
    ≈ 566 ms (at 100% utilization) | At ~50% real utilization: ≈ 1.1 seconds | **The interference mechanism:**
    | In a continuous batching loop, decode steps for existing users take ~42 ms each. | When a 4,000-token
    prefill arrives, it monopolizes the GPU for ~600-1100 ms. | During this time, ALL decode-phase users
    are stalled — no tokens generated. | A new short request arriving just before a long prefill must
    wait: | Worst case TTFT = prefill_time + queue_wait ≈ 1.1s + existing_batch_overhead | This explains
    the P99 TTFT spikes to 1.5-2s — it''s prefill interference, not hardware.'
