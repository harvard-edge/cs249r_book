id: cloud-1483
title: Diagnosing P99 Latency Spikes in Triton
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team is running a real-time recommendation model on AWS g4dn.2xlarge instances (1 T4 GPU,
  8 vCPUs) using Triton Inference Server. At 500 QPS, the median latency is a healthy 15ms. However, your
  P99 latency exhibits massive jitter, frequently spiking to 200ms+. The GPU SM utilization is only 45%,
  and GPU memory is 60% full. The node is running several sidecar containers (Envoy, Fluentd, Datadog)
  that periodically process logs and metrics. Analyze the root cause of these sudden latency spikes.
details:
  realistic_solution: Implement CPU pinning (CPU affinity) for the inference server processes to isolate
    them from sidecar noise. Dedicate 6 vCPUs strictly to Triton and restrict sidecars to the remaining
    2 vCPUs using Kubernetes CPU manager with static policies to eliminate context switching jitter.
  common_mistake: Focusing solely on GPU optimization (like increasing batch size or using TensorRT) or
    assuming network congestion, while completely missing the CPU resource contention caused by aggressive
    sidecar processes preempting the inference threads.
  napkin_math: If Triton's preprocessing thread is preempted by a sidecar, it waits in the run queue.
    The Linux CFS (Completely Fair Scheduler) default quota period is 100ms. If the container exhausts
    its quota burst, it pauses for the remainder of the 100ms window. 15ms (normal inference) + 100ms
    (CFS throttle wait) + context switch overhead perfectly explains the 150ms-200ms+ P99 spikes without
    any GPU bottleneck.
