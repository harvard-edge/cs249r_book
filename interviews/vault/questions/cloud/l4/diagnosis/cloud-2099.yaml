id: cloud-2099
title: Transformer Architecture Enables Tensor Parallelism
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Explain why the transformer architecture is particularly well-suited to tensor parallelism.
  Specifically, how do the multi-head attention and FFN layers naturally decompose across GPUs, and where
  are the synchronization points?
details:
  realistic_solution: 'Multi-head attention: each head computes Q, K, V projections and attention independently.
    With 32 heads across 4 GPUs, each GPU computes 8 heads with zero cross-GPU communication until the
    output projection. The output projection requires an AllReduce to combine partial results. FFN layer:
    the first linear ($d \to 4d$) is column-parallel (each GPU holds $d \to d$ slice). The second linear
    ($4d \to d$) is row-parallel. Only one AllReduce is needed after the second linear. Total: 2 AllReduces
    per transformer layer (one after attention output, one after FFN). This structure is why transformers
    scale efficiently to hundreds of GPUs — the architecture''s natural decomposition aligns with the
    parallelism strategy.'
  common_mistake: Thinking tensor parallelism requires splitting every operation. The key insight is that
    attention heads are independent and the FFN has a natural column-then-row split.
  napkin_math: '4-way TP on 70B model: 2 AllReduces per layer × 80 layers = 160 AllReduces per forward
    pass. | Each AllReduce on 4 GPUs with NVLink (600 GB/s): ~20 µs for d=4096 vector. | Total sync overhead:
    ~3.2 ms per forward pass — small vs ~50ms compute.'
