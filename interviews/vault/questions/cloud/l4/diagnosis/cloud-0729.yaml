schema_version: 1
id: cloud-0729
title: The Cross-Rack Stall
topic: collective-communication
status: published
provenance: imported
scenario: We tried to scale our 70B model training by spreading Tensor Parallelism (TP) across two server
  racks connected by 100 Gbps Ethernet. Training speed immediately dropped to zero. What did we misunderstand
  about network topology?
details:
  realistic_solution: You failed the "Jeff Dean Test." Tensor Parallelism requires an AllReduce operation
    on the activations of *every single layer* during the forward and backward pass. This requires the
    massive bandwidth of intra-node interconnects like NVLink (900 GB/s). Standard Ethernet/InfiniBand
    between racks (~12.5 GB/s for 100 GbE) will instantly bottleneck the GPUs. For cross-rack scaling,
    you must use Pipeline or Data parallelism.
  common_mistake: '"100 Gbps should be enough bandwidth for 8 GPUs." This confuses inter-node bandwidth
    with intra-node bandwidth.'
  napkin_math: 'TP AllReduce per layer for 70B model ≈ 2 × hidden_size × batch × bytes ≈ hundreds of MB
    per layer, 80 layers per step. NVLink: 900 GB/s → microseconds. 100 GbE: 12.5 GB/s → milliseconds
    per layer × 80 layers = seconds of pure network wait per step.'
