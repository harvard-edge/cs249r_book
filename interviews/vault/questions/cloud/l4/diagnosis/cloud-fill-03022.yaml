schema_version: 1
id: cloud-fill-03022
title: Diagnosing Flash Attention Regression After Library Upgrade
topic: flash-attention
status: published
provenance: imported
scenario: After upgrading flash-attn from 2.3 to 2.6 on an A100 (80GB HBM2e, 2TB/s) training cluster,
  training throughput drops from 95 TFLOPS to 71 TFLOPS for a seq_len=4096 model. No code changes were
  made. The upgrade notes mention improved support for dropout in attention.
details:
  realistic_solution: Profile with Nsight to compare kernel execution between versions. Check if dropout_p=0.0
    is being passed to the attention function — in newer versions, explicitly passing dropout_p=0.0 may
    trigger a different kernel path than not passing it. Set dropout_p=0.0 and deterministic=False to
    use the fastest kernel path. Verify with flash_attn.utils.benchmark.
  common_mistake: 'Assuming the library regression is a bug and rolling back immediately. The real issue
    is often a default behavior change: flash-attn 2.5+ enables attention dropout by default when a dropout_p
    argument is passed as 0.0, which now takes a separate code path with mask materialization.'
  napkin_math: '95 TFLOPS vs 71 TFLOPS = 25% regression. A100 peak 312 TFLOPS BF16. At seq=4096, d=128:
    attention FLOPs per layer = 2 * 4096^2 * 128 = 4.3 GFLOP. At 95T: 0.045ms/layer. At 71T: 0.06ms/layer.
    For a 40-layer model: regression = 40 * (0.06-0.045) = 0.6ms per forward pass. At batch=32: adds 19ms
    per step. Mask materialization for dropout at seq=4096: 4096^2 * 1 byte = 16MB per head — explains
    the memory bandwidth saturation causing FLOP regression.'
