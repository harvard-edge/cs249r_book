schema_version: 1
id: cloud-1091
title: S3 Small File GPU Starvation Diagnosis
topic: mlops-lifecycle
status: published
provenance: imported
scenario: A computer vision team training a distributed model on 10 million individual JPEG images (averaging
  150KB each) stored in AWS S3 is experiencing severe GPU starvation. Their 8x A100 GPU cluster is only
  reaching 15% utilization. The PyTorch dataloader reads each image directly from S3 using 64 worker processes
  per node. Network bandwidth between the compute node and S3 is confirmed to be 100 Gbps, and CPU utilization
  is relatively low. Diagnose the root cause of the training pipeline bottleneck.
details:
  realistic_solution: The bottleneck is the per-request latency (Time-To-First-Byte) of S3 for small objects.
    The solution is to shard the dataset into large (100MB - 1GB) contiguous files (e.g., TFRecords or
    WebDataset tarballs) to convert millions of random read operations into high-throughput sequential
    reads.
  common_mistake: Assuming the bottleneck is network bandwidth or CPU decoding speed, and attempting to
    fix it by increasing the number of dataloader workers or upgrading the network interface without changing
    the underlying storage layout.
  napkin_math: S3 GET TTFB is ~20ms. Reading 10M files individually implies 10M GETs. At 20ms each, that's
    200,000s of cumulative latency overhead. Even distributed across 64 workers, it takes ~3,125 seconds
    just in TTFB latency per epoch. Sharding 150KB images into 150MB shards reduces GET requests by 1,000x,
    allowing the system to fully saturate the 100 Gbps sequential bandwidth (where downloading the entire
    1.5TB dataset takes only ~120 seconds).
