title: The Code Assistant's Latency Crisis
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are leading the ML Systems team for a new AI code assistant. The product requirement is
  a P99 Time-To-First-Token (TTFT) of under 200ms to feel 'real-time'. The service runs a 13B parameter
  model on H100 GPUs.
details:
  realistic_solution: 'The root cause is a queueing theory concept: the system''s traffic intensity is
    greater than 1, leading to an unstable queue.'
  common_mistake: Engineers often assume that if the individual components are fast (55ms pre-fill, 8ms
    decode), the system should also be fast. They might incorrectly blame network latency or suggest simply
    using more GPUs. Another common mistake is to believe all phases of LLM inference are compute-bound
    on modern accelerators, failing to distinguish the critical difference between pre-fill and decode.
  napkin_math: '**1. Characterize the Workload:**'
