id: cloud-1293
title: Diagnosing 400G PAM4 Latency Floors
topic: collective-communication
status: published
provenance: imported
scenario: You are debugging a severe tail latency issue in a 400G RoCEv2 training cluster. The physical
  layer uses 50G PAM4 signaling with RS(544, 514) Forward Error Correction (FEC). The network team notices
  an irreducible base latency floor of ~1.2μs per switch hop, even when fabric queues are completely empty.
  Hoping to optimize synchronous AllReduce performance, a junior engineer proposes disabling FEC on the
  NICs and switches, arguing that standard RoCEv2 transport retries can handle occasional bit errors just
  like in their legacy 100G NRZ clusters. Analyze the viability of this proposal and root-cause the latency
  floor.
details:
  realistic_solution: Reject the proposal to disable FEC. PAM4 requires FEC to function. Root-cause the
    latency floor to the block-based nature of RS-FEC, which must buffer an entire FEC codeword before
    it can detect and correct errors, adding irreducible store-and-forward latency at every hop.
  common_mistake: Assuming FEC is an optional reliability feature that can be traded for latency, failing
    to realize that PAM4 modulation degrades the Signal-to-Noise Ratio (SNR) so severely that the link
    is unusable without FEC.
  napkin_math: A 50G PAM4 lane has a pre-FEC Bit Error Rate (BER) of ~1e-4. Without FEC, the probability
    of a 1500-byte (12,000 bits) packet arriving intact is (1 - 10^-4)^12000 ≈ 30%. With a 70% packet
    drop rate, RoCEv2 transport would undergo catastrophic retransmission collapse.
