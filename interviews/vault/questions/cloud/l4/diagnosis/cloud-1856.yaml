id: cloud-1856
title: Diagnosing P99 SLO Violations in Dynamic Batching
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Your team serves a DLRM recommender on NVIDIA A100s with a strict user-facing Service Level
  Objective (SLO) of P99 < 150ms. The sequential pipeline consists of: Feature Store retrieval (P99 =
  40ms), Dynamic Batching (timeout = 80ms), Model Inference (P99 = 60ms at max batch size), and Network
  Overhead (10ms). Despite individual components having P99s well under 100ms, the system consistently
  violates the 150ms SLO during peak traffic, reaching 190ms at the P99. Analyze the root cause of this
  SLO violation.'
details:
  realistic_solution: 'The strict SLO must dictate the maximum allowable batching timeout budget. The
    worst-case pipeline latency is additive: Feature Store + Batch Timeout + Inference + Network. To meet
    the 150ms SLO, the dynamic batching timeout must be reduced to 40ms, sacrificing some peak throughput
    to guarantee latency compliance.'
  common_mistake: Assuming individual component P99 latencies don't stack in a worst-case scenario, or
    failing to recognize that the dynamic batch timeout acts as a hard additive penalty for the earliest
    requests in the queue.
  napkin_math: Worst-case Latency = 40ms (Feature P99) + 80ms (Max Batch Wait) + 60ms (Inference P99)
    + 10ms (Network) = 190ms. Required Batch Timeout = SLO (150ms) - (40ms + 60ms + 10ms) = 40ms maximum
    allowable timeout.
