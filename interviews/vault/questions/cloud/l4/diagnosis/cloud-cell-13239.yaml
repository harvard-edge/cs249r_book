schema_version: 1
id: cloud-cell-13239
title: Diagnose Head-of-Line Blocking in LLM Serving Queue
topic: queueing-theory
status: published
provenance: imported
scenario: 'An LLM serving system on H100 clusters processes requests with median latency 180ms and P99
  latency 4.2 seconds at 60% utilization. The service time distribution has high variance: short prompts
  (128 tokens) take 50ms; long prompts (8192 tokens) take 3.2 seconds. The system uses FCFS scheduling.
  Queueing theory analysis shows M/G/1 P99 = median × (1 + CV²×ρ/(1-ρ)) where CV is coefficient of variation.
  Diagnose the root cause and prescribe the fix.'
details:
  realistic_solution: 'CV of service time: mean = 0.5×50 + 0.5×3200 = 1625ms; mean² = 1625² = 2.64M; E[S²]
    = 0.5×50² + 0.5×3200² = 0.5×(2500+10.24M) = 5.12M. Variance = 5.12M - 2.64M = 2.48M. CV = sqrt(2.48M)/1625
    = 1575/1625 = 0.97. M/G/1 wait: ρCV²/(2(1-ρ)) × mean = 0.6×0.94/(2×0.4) × 1625 = 0.564/0.8 × 1625
    = 1144ms waiting. P99 ≈ 5× mean wait = 5.7s ≈ observed 4.2s. Fix: shortest-job-first (SJF) or length-based
    priority queues. Short prompts (<512 tokens) get priority lane. P99 for short drops to ~200ms.'
  common_mistake: Adding more GPU capacity to reduce utilization; at 60% utilization the P99 blowup is
    caused by high service time variance (HoL blocking), not insufficient capacity.
  napkin_math: CV² ≈ 0.94 (bimodal 50ms vs 3200ms). M/G/1 mean wait = λE[S²]/(2(1-ρ)) = 0.6×5.12M/(2×0.4×1625)
    = 3072K/1300 = 2363ms. P99 ≈ mean + 4.6σ for exponential tail ≈ 4.2s observed. SJF reduces P99 for
    short jobs to < 300ms.
