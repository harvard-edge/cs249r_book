id: cloud-1960
title: Diagnosing Loan Approval Parity
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are deploying a 5B parameter credit scoring model on a cluster of 8x A100 GPUs (80GB VRAM)
  to process real-time loan applications. Post-deployment telemetry over a 30-day window indicates the
  model processed 100,000 applicants from Group A (privileged) and 20,000 from Group B (unprivileged).
  The telemetry shows an approval rate of 45% for Group A and 30% for Group B. A product manager notes
  the model's overall accuracy is 92% and argues the system is performing optimally. Analyze the statistical
  parity of this deployment and diagnose the compliance failure.
details:
  realistic_solution: Calculate the exact Statistical Parity Difference (SPD) to quantify the bias. Since
    SPD focuses strictly on the independence of the prediction from the protected attribute, you must
    implement mitigation strategies like threshold optimization (post-processing) or sample reweighing
    (pre-processing) to align the positive outcome rates, ensuring the difference falls within acceptable
    compliance bounds.
  common_mistake: Assuming that high overall model accuracy (92%) implies fairness, or confusing statistical
    parity difference (which compares raw selection rates) with equal opportunity difference (which compares
    true positive rates).
  napkin_math: Model inference is fast, but bias is the issue. P(Approval | Group A) = 0.45. P(Approval
    | Group B) = 0.30. Statistical Parity Difference (SPD) = |0.30 - 0.45| = 0.15. To meet compliance
    (SPD < 0.05), Group B's rate must increase to ≥ 0.40, or Group A's rate decrease to ≤ 0.35 via threshold
    adjustments.
