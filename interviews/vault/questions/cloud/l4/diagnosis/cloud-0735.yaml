id: cloud-0735
title: The ToR Switch Buffer Microburst
topic: collective-communication
status: published
provenance: imported
scenario: You are using RoCEv2 (RDMA over Ethernet) for a 64-GPU cluster. The network links are 100 Gbps.
  During the AllToAll phase of a Mixture of Experts (MoE) training step, the network throughput plummets,
  and PFC (Priority Flow Control) pause frames flood the network. The total data volume sent by any GPU
  is well under the 100 Gbps limit. Why is the network freezing?
details:
  realistic_solution: 'This is a ToR switch microburst. During AllToAll, each GPU sends data to every
    other GPU simultaneously. With 64 GPUs, the fan-in at a single switch port can be 63 senders x 1MB
    = 63MB arriving in microseconds. The ToR switch buffer (typically 32MB) overflows instantly, triggering
    PFC pause frames that propagate backwards through the network, causing a cascading pause that freezes
    all traffic. The total data volume is under the sustained bandwidth limit, but the instantaneous burst
    rate exceeds the buffer capacity. The fix: implement traffic shaping to spread transmissions over
    time, or use ECN with DCQCN to throttle senders before buffers overflow.'
  common_mistake: '"The bandwidth is saturated." The prompt explicitly says the data volume is under the
    limit. The issue is time, not volume.'
  napkin_math: 63 GPUs * 1 MB = 63 MB burst. ToR Switch buffer = 32 MB. The buffer overflows in less than
    1 millisecond, triggering a cascading network-wide pause.
