schema_version: 1
id: cloud-1109
title: Diagnosing PFC Storms in DCQCN
topic: collective-communication
status: published
provenance: imported
scenario: A 400Gbps RoCEv2 GPU cluster (ConnectX-7 NICs) running a large-scale All-to-All collective experiences
  severe latency degradation due to PFC (Priority Flow Control) pause frames. DCQCN is enabled. Switch
  buffer is 32MB per port. ECN K_min is set to 5MB, K_max to 15MB, and the PFC threshold is 20MB. Despite
  DCQCN being active, PFC storms persist during incast microbursts. How do you analyze why DCQCN is failing
  to prevent PFC triggering?
details:
  realistic_solution: Analyze the ECN-to-PFC buffer gap against the Bandwidth-Delay Product (BDP) of the
    congestion control loop. During a 64-node incast, the buffer fills faster than the time it takes for
    a Congestion Notification Packet (CNP) to reach the sender and take effect. The solution is to lower
    K_min/K_max or increase the PFC threshold.
  common_mistake: Candidates often blame faulty hardware or assume DCQCN prevents all congestion, missing
    that DCQCN is a reactive protocol bounded by the network's control loop RTT and the buffer fill rate
    during incast.
  napkin_math: 400 Gbps = 50 GB/s per port. 64-node incast = 3,200 GB/s arriving. Egress = 50 GB/s. Net
    fill rate = 3,150 GB/s. Buffer gap from K_min to PFC = 20MB - 5MB = 15MB. Time to fill gap = 15MB
    / 3150 GB/s ≈ 4.76 microseconds. If end-to-end CNP control loop RTT is ~5µs, the buffer hits the PFC
    threshold before senders throttle.
