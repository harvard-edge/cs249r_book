id: cloud-2025
title: Diagnosing CoT Test-Time Scaling Bottlenecks
topic: vram-budgeting
status: published
provenance: imported
scenario: Your inference cluster serves a reasoning-heavy 70B model on 8x 80GB A100s. To implement 'Test-Time
  Compute Scaling', you prompt the model to generate extensive Chain-of-Thought (CoT) scratchpads (up
  to 8,000 reasoning tokens) for complex tasks. During load testing, GPU SM utilization collapses to <
  30%, P99 latency skyrockets, and the cluster throws Out-Of-Memory (OOM) errors, despite input prompts
  being very short (<100 tokens).
details:
  realistic_solution: Implement KV Cache Quantization (e.g., FP8) to halve the memory footprint per token,
    and use PagedAttention with host-memory swapping to handle memory pressure. Additionally, enforce
    a strict upper bound on CoT tokens per request to guarantee a minimum viable batch size that can saturate
    the GPU compute.
  common_mistake: Candidates often misdiagnose this as a compute bottleneck because the model is 'thinking
    longer', suggesting faster GPUs or more Tensor Parallelism. They fail to identify that massive KV
    cache accumulation for 8,000 generated tokens exhausts GPU memory, forcing tiny batch sizes and destroying
    compute utilization during the memory-bandwidth-bound decode phase.
  napkin_math: A 70B model requires ~2.5MB of KV cache per token in FP16. An 8,000 token CoT generation
    consumes 2.5MB * 8,000 = 20GB of KV cache per request. On an 8x80GB system (640GB total), if weights
    take 140GB, you have 500GB available. 500GB / 20GB = max batch size of 25. A batch size of 25 is too
    small to saturate the compute capacity of 8x A100s during decoding.
