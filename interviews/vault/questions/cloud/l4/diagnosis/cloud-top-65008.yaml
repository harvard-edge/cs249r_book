id: cloud-top-65008
title: XCD Hot-Spot Thermal Management Under Sustained Load
topic: chiplet-architecture
status: published
provenance: imported
scenario: In production, MI300X TDP readings are uniform but sustained throughput on one job type drops
  12% after 30 minutes. rocm-smi shows temperature uniform across XCDs but frequency drops on XCDs 0 and
  1. Diagnose and fix.
details:
  realistic_solution: 'XCDs 0 and 1 are throttling due to localized hotspots even though the package-level
    thermal sensor reads nominal. Root cause: the job''s memory access pattern creates non-uniform HBM
    utilization — XCDs 0-1 serve as the ''master'' ranks handling cross-XCD reduction which increases
    their compute and traffic load. Fix: (1) redistribute tensor parallel ranks so reduction work rotates
    across XCDs; (2) enable per-XCD frequency monitoring via rocm-smi --showclkfreq; (3) adjust power
    limit per XCD using ROCm SMI power cap features; (4) verify thermal interface paste distribution —
    chiplet packages with interposers can have uneven TIM coverage.'
  common_mistake: Assuming uniform TDP means uniform thermal load. The TDP reading is an aggregate; individual
    XCDs can have hotspots from unequal workload distribution (e.g., embedding lookups concentrated on
    certain XCDs by tensor parallelism rank assignment) while the average temperature appears normal.
  napkin_math: 'MI300X TDP: 750W over 8 XCDs = ~94W per XCD average. If XCDs 0-1 carry 1.4x load: 130W
    each vs 83W for others. Junction temperature delta: 130W * 0.08°C/W thermal resistance = 10.4°C above
    average. If average is 75°C, XCDs 0-1 hit 85.4°C → frequency throttle threshold typically 85°C.'
