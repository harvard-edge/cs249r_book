id: cloud-1757
title: Diagnosing OOM Failures in Long-Context Transformer Training
topic: vram-budgeting
status: published
provenance: imported
scenario: A team is fine-tuning a 7B parameter LLM on an 8x A100 (80GB) node. They are attempting to increase
  the context length from 4,096 to 32,768 tokens. During training, the model consistently fails with CUDA
  OutOfMemory errors, even when the per-GPU batch size is reduced to 1. The team has already enabled activation
  checkpointing and DeepSpeed ZeRO-3. Diagnose the root cause of the memory failure.
details:
  realistic_solution: The root cause is the quadratic activation memory of the attention matrix. The team
    must implement FlashAttention to fuse the attention computation and avoid materializing the full N
    x N matrix in HBM, reducing memory complexity from O(N^2) to O(N).
  common_mistake: Assuming the memory bottleneck is caused by model weights, optimizer states, or the
    KV cache, while ignoring the O(N^2) activation memory required to materialize the N x N attention
    probability matrix.
  napkin_math: For sequence length N=32,768, the attention matrix size per head is N^2 = 1.07B elements.
    At 16-bit precision (2 bytes), this is ~2.1GB per head. For a model with 32 attention heads, materializing
    the attention matrix requires ~68GB of activation memory *per layer*. This instantly exhausts the
    80GB HBM limit.
