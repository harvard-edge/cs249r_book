schema_version: 1
id: cloud-0736
title: The Ring AllReduce Bottleneck
topic: collective-communication
status: published
provenance: imported
scenario: We scale our data-parallel training from 32 GPUs to 512 GPUs. On 32 GPUs, AllReduce takes 15%
  of each training step. On 512 GPUs, it takes 60%. The network hardware is the same 400 Gbps InfiniBand
  everywhere. Why does ring AllReduce degrade at scale, and what replaces it?
details:
  realistic_solution: 'Ring AllReduce completes in $2(p-1)$ sequential communication steps, where $p$
    is the number of GPUs. Each step pays a fixed latency cost (network hop + kernel launch + synchronization).
    The bandwidth term is constant regardless of $p$ (each GPU sends and receives $\text{data} \times
    (p-1)/p \approx \text{data}$ total), but the latency term grows linearly with $p$. At small $p$, the
    bandwidth term dominates and scaling looks perfect. At large $p$, the latency term dominates and each
    additional GPU adds pure overhead. The fix is hierarchical AllReduce: first reduce within each node
    (8 GPUs over NVLink at 900 GB/s — microseconds), then reduce across nodes (using a tree or recursive-halving
    algorithm that has $O(\log p)$ latency steps instead of $O(p)$). NCCL automatically switches to tree
    AllReduce at scale, but the topology must support it.'
  common_mistake: '"Ring AllReduce is bandwidth-optimal, so it should scale perfectly — the problem must
    be network congestion." Ring AllReduce is indeed bandwidth-optimal in theory, but this ignores the
    latency term that dominates at scale.'
  napkin_math: '**Model: 7B params, FP32 gradients = 28 GB.** **Ring AllReduce at 32 GPUs:** Bandwidth
    time: $2 \times 28\text{ GB} \times (31/32) / 50\text{ GB/s} = $ **1.09 s**. Latency: $2 \times 31
    \times 15 \mu s = $ **0.93 ms**. Total ≈ **1.09 s** (bandwidth-dominated). **Ring AllReduce at 512
    GPUs:** Bandwidth time: $2 \times 28 \times (511/512) / 50 = $ **1.12 s** (barely changed). Latency:
    $2 \times 511 \times 15 \mu s = $ **15.3 ms**. Total ≈ **1.13 s**. The latency overhead grew 16×,
    but the total only grew 4% — so where''s the 60% overhead? The real killer is **synchronization jitter**:
    with 512 GPUs, the slowest GPU in each ring step determines the pace. Even 1% straggler probability
    per GPU means $P(\text{no straggler in 512}) = 0.99^{512} = 0.6\%$ — **virtually every step has a
    straggler**. Each straggler adds ~5-20 ms. Over 1,022 sequential steps: expected straggler delay ≈
    **5-10 seconds** per AllReduce. **Tree AllReduce:** $O(\log_2 512) = 9$ steps instead of 1,022. Straggler
    impact drops proportionally.'
