schema_version: 1
id: cloud-sus-64003
title: Thermal Throttling Cascade in a Dense H100 Pod
topic: datacenter-efficiency
status: published
provenance: imported
scenario: You are on-call for a production training cluster. At 14:00, the ops dashboard shows all GPUs
  in Pods 7-12 dropping from 700W TDP to ~500W sustained power draw. MFU (Model FLOP Utilization) falls
  from 68% to 48%. The ambient temperature sensors in the hot aisle for those racks read 38°C, compared
  to 24°C in Pods 1-6. NVIDIA SMI shows GPU junction temperatures of 88°C on all affected devices. No
  hardware faults are reported. Diagnose the root cause and propose immediate and long-term remediation.
details:
  realistic_solution: 'Root cause: A cooling unit (CRAC/CRAH or CDU) serving Pods 7-12 has likely failed
    or reduced capacity (clogged filter, refrigerant leak, pump failure). The elevated ambient forces
    GPUs to throttle frequency to keep junction temp below the 90°C threshold (~88°C is the warning knee
    for H100). Immediate: reroute workloads from Pods 7-12 to spare capacity; dispatch datacenter ops
    to inspect cooling units. Long-term: implement redundant cooling (N+1 CRAC units), add automated thermal
    alerting at 32°C ambient, and deploy pre-throttle migration hooks in the job scheduler.'
  common_mistake: Candidates jump to GPU firmware or driver bugs. The combination of elevated ambient
    hot-aisle temps (38°C >> 24°C baseline) + high junction temps + power reduction without faults is
    classic thermal throttling from cooling infrastructure failure, not a compute issue.
  napkin_math: 'H100 power throttling: 700W → 500W = 28.6% power reduction, matches ~28% MFU drop (68%
    → 48%). Junction temp 88°C is 2°C below H100 throttle onset (~90°C per NVIDIA spec). Hot aisle delta:
    38°C vs 24°C = +14°C. ASHRAE A2 ambient limit for servers = 35°C—racks are already 3°C over limit.
    Cooling capacity needed per rack: 3 nodes × 700W = 2.1 kW IT; if CRAC unit failed (typically 50-100
    kW capacity), loss of one unit explains zone-wide impact across 6 pods.'
