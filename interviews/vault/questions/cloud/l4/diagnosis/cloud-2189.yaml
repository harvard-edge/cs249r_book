schema_version: 1
id: cloud-2189
title: The NCCL Collective Deadlock
topic: collective-communication
status: published
provenance: imported
scenario: Your distributed training job hangs at step 4,217. All GPUs show 0% utilization and NCCL logs
  show 'Timeout waiting for ring message.' You add NCCL_DEBUG=INFO and see that GPU 0 is executing AllReduce
  for the 'layer_42.weight' gradient, while GPU 3 is executing AllReduce for the 'layer_41.weight' gradient.
  GPU 3's profiler shows that layer 42's backward pass was skipped due to a conditional branch in the
  model. Why did this cause a deadlock, and what invariant did the model code violate?
details:
  realistic_solution: 'The deadlock occurs because NCCL collectives are **matched by call order, not by
    name**. When all GPUs call AllReduce, NCCL matches the N-th call on GPU 0 with the N-th call on GPU
    3 — it has no concept of ''which gradient'' is being reduced. If GPU 3 skipped layer 42''s backward
    pass (due to a conditional branch like `if random() > 0.5: skip`), it never calls AllReduce for that
    gradient. GPU 3''s N-th AllReduce call corresponds to layer 41, while GPU 0''s N-th call corresponds
    to layer 42. They are now executing different operations, and Ring AllReduce requires every GPU to
    participate — so both block forever. The violated invariant: **all GPUs must execute the same sequence
    of collective operations in the same order.** This means conditional computation paths (stochastic
    depth, dynamic routing, early exit) must ensure that collectives are called unconditionally. The fix:
    always call AllReduce even for skipped layers (with zero tensors), or use `torch.distributed.barrier()`
    to realign before collectives.'
  common_mistake: Blaming NCCL bugs or network failures. The logs clearly show different collective operations
    on different GPUs — this is a user-level code bug, not an infrastructure issue.
  napkin_math: '- Probability of deadlock per step with stochastic depth (p=0.1 per layer, 100 layers,
    8 GPUs): P(at least one GPU skips a layer that others don''t) ≈ 1 - (0.9^8 + 0.1^8)^100 ≈ near certainty
    | - NCCL default timeout: 300 seconds → job hangs for 5 minutes before crashing | - Fix overhead:
    zero-tensor AllReduce costs ~latency only (5 μs × steps) — negligible'
