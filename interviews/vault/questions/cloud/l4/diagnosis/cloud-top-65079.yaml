id: cloud-top-65079
title: Negative Sampling Strategy for Recommendation Model Training
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: A two-tower retrieval model trained with uniform random negative sampling shows 15% AUC but
  poor offline-to-online uplift (only 5% online improvement despite high offline metrics). Diagnose the
  sampling bias and propose a fix.
details:
  realistic_solution: 'The offline/online gap has two causes: (1) Easy negative bias: random negatives
    include items the user would never see (wrong category, unavailable). The model overfits to easy patterns
    and fails to distinguish hard negatives (relevant but slightly less preferred items). Fix: in-batch
    negatives (other users'' positive items in the same batch) are harder negatives and more distribution-aligned.
    (2) Popularity bias: uniform sampling underrepresents popular items as negatives. At serving time,
    popular items compete for slots — the model hasn''t learned to rank them against each other. Fix:
    sample negatives with probability proportional to item popularity (batch-mixing uniform + popularity-weighted).
    (3) Missed exposure negatives: items shown to the user but not clicked are the strongest negative
    signal. Add exposure negatives to training. Practical implementation: 70% in-batch negatives + 20%
    popularity-sampled + 10% exposure negatives.'
  common_mistake: Attributing poor offline-to-online transfer to online feature mismatch without investigating
    the training distribution. Uniform random negatives create an unrealistically easy training problem
    — the model learns to distinguish positive items from random items in the full catalog, but at serving
    time it must distinguish from items that were already retrieved and ranked, which are much harder
    negatives.
  napkin_math: 'Batch size 4K (2K positive pairs + 2K items as in-batch negatives). In-batch negative
    ratio: each positive pair sees 2K-1 negatives. Total positive:negative ratio = 1:1999. Random negatives
    (same batch size): 1:1 positive:negative ratio — easy. In-batch negatives: 1999x harder training signal.
    Expected AUC improvement: in-batch negatives typically improve AUC by 5-10 points on retrieval tasks
    (1-tower to 2-tower with in-batch: +8 AUC reported in literature). Online improvement proportional:
    5% -> 15-20% expected after fix.'
