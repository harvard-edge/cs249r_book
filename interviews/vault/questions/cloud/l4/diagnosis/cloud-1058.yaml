id: cloud-1058
title: Diagnosing Custom ASIC Underutilization with Dynamic Shapes
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team migrated a latency-sensitive NLP inference service from general-purpose GPUs to a
  custom cloud ASIC specialized for dense matrix multiplication. The ASIC provides 300 TFLOPS of peak
  compute, matching the GPU on paper. However, in production, the P99 latency spiked by 3x and the ASIC
  utilization hovers around 25%. Metrics show that incoming request sequence lengths vary wildly from
  16 to 1024 tokens.
details:
  realistic_solution: Custom ASICs achieve high energy efficiency by sacrificing programmability, relying
    on rigid spatial compute structures and ahead-of-time static compilation (e.g., XLA). Dynamic sequence
    lengths force zero-padding to the maximum supported length (1024 tokens), causing the ASIC to compute
    8x more operations than necessary when the average input is 128 tokens. The 3x latency spike comes
    from this wasted compute. The fix is to implement input bucketing (e.g., padding to nearest power
    of 2) to reduce average padding waste.
  common_mistake: Assuming peak TOPS translates directly to throughput without considering the rigid architectural
    constraints of custom ASICs (like systolic arrays) and the severe efficiency penalty of static graph
    compilation when input shapes vary dynamically.
  napkin_math: If the average sequence length is 128 tokens, but the runtime pads all inputs to the 1024-token
    maximum to reuse a single static execution graph, the ASIC computes (1024 / 128) = 8x more operations
    than necessary per request. The 3x latency spike is driven by computing 800% of the required FLOPs,
    negating any raw hardware efficiency gains.
