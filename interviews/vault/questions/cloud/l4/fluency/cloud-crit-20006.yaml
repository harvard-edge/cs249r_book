schema_version: 1
id: cloud-crit-20006
title: FlashAttention Arithmetic Intensity Calculation
topic: flash-attention
status: published
provenance: imported
scenario: On an H100 (989 TFLOPS FP16, 3.35 TB/s HBM3), compute the arithmetic intensity of the attention
  operation for seq_len=4096, head_dim=128, batch=1, 32 heads, and determine whether FlashAttention shifts
  it from memory-bound to compute-bound on the roofline.
details:
  realistic_solution: S matrix = 2 × heads × seq² × bytes = 2 × 32 × 4096² × 2B = 2.15 GB in BF16 (not
    4 GB which uses FP32).
  common_mistake: Computing arithmetic intensity of the full fused kernel rather than the per-tile intensity,
    which is what actually determines whether each SM is compute-bound or memory-bound.
  napkin_math: 'S matrix (attention scores) size: batch × heads × seq × seq × bytes. For 4096 seq, 32
    heads, BF16 (2B): 2 × 4096² × 2B × 32 heads = 2 × 16,777,216 × 2 × 32 = 2,147,483,648 bytes = 2.15
    GB (not 4 GB — 4 GB would require FP32 or double the heads). Arithmetic intensity: FLOPs / bytes accessed.'
last_modified: '2026-04-01'
