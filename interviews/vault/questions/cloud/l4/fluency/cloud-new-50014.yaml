id: cloud-new-50014
title: Portable Quantization Formats Across Accelerator Backends
topic: software-portability
status: published
provenance: imported
scenario: You want to deploy a W4A16 quantized LLM (4-bit weights, 16-bit activations) on both H100 and
  MI300X. NVIDIA uses FP4 (via Hopper's new format), while AMD supports INT4 via MFMA. Your quantization
  toolkit produces GPTQ format. Explain the compatibility landscape.
details:
  realistic_solution: 'GPTQ produces INT4 quantized weights with FP16 scales per group. On H100: the dequantize-then-GEMM
    approach uses INT4 weights unpacked to FP16, then cuBLAS FP16 GEMM — not using H100''s native FP4.
    For native FP4 on H100, you need NVIDIA''s FP4 quantization (different format). On MI300X: GPTQ INT4
    maps well to MFMA INT4 instructions via AutoGPTQ''s ROCm backend. For true portability, use a format
    like GGUF (llama.cpp) which handles platform-specific dequantization internally.'
  common_mistake: Assuming W4A16 means the same thing on both platforms. H100 Hopper supports native FP4/FP8
    via Tensor Cores, while MI300X CDNA3 supports INT4/INT8 via MFMA. The weight packing format differs.
  napkin_math: 'H100 INT4 Tensor Core throughput: ~1978 TOPS. MI300X MFMA INT4: ~3200 TOPS theoretical.
    But effective throughput depends on dequant overhead: typically 60-70% of peak for W4A16 GEMM on both
    platforms.'
