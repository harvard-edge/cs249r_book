schema_version: 1
id: cloud-new-50072
title: TPU v5e ICI Ring Topology and Communication Overlap Opportunities
topic: communication-computation-overlap
status: published
provenance: imported
scenario: TPU v5e pods use ICI (Inter-Chip Interconnect) in a 2D torus topology with 1.6 Tbps bandwidth
  per link. Unlike NVIDIA's NVSwitch (all-to-all), the torus requires multi-hop communication for non-adjacent
  chips. How does this topology affect communication-computation overlap strategy for data-parallel training?
details:
  realistic_solution: 'On TPU''s 2D torus: (1) AllReduce is implemented as ReduceScatter + AllGather over
    the torus dimensions. Each dimension does a separate ring reduce. (2) For a 4x4 torus (16 TPUs): AllReduce
    in the X dimension (4 chips), then Y dimension (4 chips). Total latency proportional to chip_count_per_dim,
    not total chips. (3) XLA''s SPMD partitioner automatically maps AllReduce to torus dimensions. (4)
    Overlap opportunity: XLA can overlap the Y-dimension AllReduce with computation if the next operation
    only needs the X-dimension reduction first. This is XLA''s ''latency hiding'' optimization. (5) Unlike
    GPU, TPUs handle communication overlap at the compiler level (XLA), not runtime level (CUDA streams).
    The programmer''s job is to provide static graphs that XLA can analyze.'
  common_mistake: Applying GPU-optimized overlap strategies (flat AllReduce + bucketing) directly to TPU
    without considering the torus topology. Multi-hop AllReduce on a torus has different latency characteristics
    than NVSwitch.
  napkin_math: 'TPU v5e ICI: 1.6 Tbps = 200 GB/s per link. 4x4 torus AllReduce: 2 x 3/4 x M / 200 GB/s
    (two dimensions, ring formula). For M=1GB: 2 x 0.75 x 1/200 = 7.5ms. Compared to flat ring over 16
    chips: 15/16 x 1/200 x 2 = 9.4ms. Torus is 20% faster.'
