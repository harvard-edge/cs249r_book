schema_version: 1
id: cloud-crit-21000
title: MoE All-to-All Communication Volume
topic: mixture-of-experts
status: published
provenance: imported
scenario: A Mixtral-style 8x7B MoE model uses top-2 routing with hidden dimension 4096 in BF16. Each token
  dispatches to 2 of 8 experts across 8 GPUs (one expert per GPU). For a micro-batch of 2048 tokens, estimate
  the all-to-all communication volume per layer in each direction.
details:
  realistic_solution: 'Each token sends its 4096-dim BF16 hidden state (8 KB) to 2 experts. With uniform
    routing, each GPU sends 2048 × 2 / 8 = 512 token-states to each of the other 7 GPUs. Total outbound
    per GPU: 512 × 7 × 8 KB = 28 MB per direction. The dispatch all-to-all and combine all-to-all together
    move ~56 MB per GPU per layer. For 32 layers, that is ~1.8 GB per GPU per forward pass — a significant
    fraction of NVLink bandwidth at 900 GB/s.'
  common_mistake: Forgetting that all-to-all is bidirectional (dispatch + combine) and that each token
    sends its hidden state to 2 experts, not 1.
  napkin_math: 'Per token payload: 4096 × 2B = 8 KB. Tokens per GPU per expert (uniform): 2048×2/8 = 512.
    Outbound per GPU: 512 × 7 × 8 KB ≈ 28 MB. Both directions: 56 MB/layer. 32 layers: ~1.8 GB.'
