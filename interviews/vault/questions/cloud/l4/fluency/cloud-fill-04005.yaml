id: cloud-fill-04005
title: MoE Inference Batching Strategy for Throughput
topic: mixture-of-experts
status: published
provenance: imported
scenario: You are operating an online inference service using a 64-expert MoE on 4x MI300X (192GB HBM3,
  5.3 TB/s). At low request rates (batch size 1-4), GPU utilization is 8%. A colleague suggests padding
  every batch to 64 tokens to improve expert routing efficiency. Explain the tradeoff and whether this
  is a good idea.
details:
  realistic_solution: Use continuous batching to aggregate requests from multiple users into a single
    large batch rather than padding a single request. At batch size 64, each expert receives ~2 tokens
    on average (top-2 routing), spreading load across all 64 experts. This improves MFU from ~8% to ~40%
    on MI300X without artificial latency padding.
  common_mistake: Assuming that larger batches always improve utilization in MoE models. With top-2 routing
    and batch size 4, only 8 expert slots are activated — most of the 64 experts are idle. Padding adds
    latency without proportionally improving utilization if the routed tokens still cluster to a few experts.
  napkin_math: 'MI300X peak: 5.3 TB/s memory bandwidth. Expert FFN weight load per token: 1B params ×
    2 bytes (BF16) = 2 GB. At batch=1: 2 GB / 5.3 TB/s ≈ 0.38 ms just to load weights. At batch=64: same
    2 GB load amortized over 64 tokens — 0.38 ms / 64 = 5.9 µs/token effective memory cost. 10× improvement
    in memory efficiency.'
