id: cloud-fill-02028
title: DCiE and Total Facility Efficiency for Multi-Tenant GPU Cloud
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A multi-tenant GPU cloud reports PUE=1.2 and DCiE (Datacenter infrastructure Efficiency) of
  83%. The CTO wants to understand what the '83%' means and whether it's competitive. Explain DCiE, its
  relationship to PUE, and benchmark against industry standards for hyperscale GPU clouds.
details:
  realistic_solution: 'DCiE = IT power / total facility power = 1/PUE × 100%. At PUE=1.2: DCiE = 1/1.2
    = 83.3%. This means 83% of facility power does useful compute; 17% is overhead. Industry benchmarks:
    hyperscale (Google, AWS, Meta) achieve PUE 1.05-1.12 (DCiE 89-95%). Colocation datacenters average
    PUE 1.4-1.6 (DCiE 63-71%). PUE=1.2 (DCiE=83%) is good for a purpose-built GPU cloud but not hyperscale-competitive.
    To improve: liquid cooling (→PUE 1.05-1.1), free-air cooling in mild climates, power conversion efficiency
    upgrades.'
  common_mistake: Confusing PUE and DCiE as the same metric; not recognizing that DCiE = 1/PUE × 100%.
  napkin_math: 'DCiE=1/PUE=1/1.2=0.833=83.3%. Google DeepMind reported 2023 average PUE=1.10 → DCiE=91%.
    At 10MW IT load: PUE=1.2 wastes 2MW on cooling; PUE=1.1 wastes 1MW. Savings=1MW × 8760hr × $0.10/kWh=$876k/year
    per 10MW IT.'
