schema_version: 1
id: cloud-crit-20024
title: FlashAttention Causal Masking Efficiency
topic: flash-attention
status: published
provenance: imported
scenario: For causal (autoregressive) attention with seq_len=4096 on H100, FlashAttention skips tiles
  where the causal mask is entirely zero. Calculate what fraction of tiles are skipped and the resulting
  speedup for both prefill and decode.
details:
  realistic_solution: 'With tile size B_r=B_c=128, the attention grid is 4096/128 = 32 x 32 = 1024 tiles.
    Causal mask: tile (i,j) is fully zero when j > i (Q row block i cannot attend to K column block j
    if j > i). Fully zero tiles: upper triangle = 32x31/2 = 496. Fully computed tiles: lower triangle
    = 496. Diagonal tiles: 32 (partially masked). Total work: 496 + 32 = 528 out of 1024 tiles. Fraction
    skipped: 496/1024 = 48.4%. Effective speedup for prefill: ~1.93x vs non-causal. For decode: only 1
    query token, so the causal mask doesn''t help — all prior tokens are attended to.'
  common_mistake: Forgetting that the causal mask is triangular, so exactly half the tiles can be skipped,
    but partial tiles at the diagonal boundary must still be computed (with masking).
  napkin_math: '32x32 tile grid. Upper triangle skipped: 32x31/2 = 496 tiles. Computed: 528/1024 = 51.6%
    of work. Prefill speedup: 1.94x. Decode: no benefit (1 query row, all K columns needed).'
