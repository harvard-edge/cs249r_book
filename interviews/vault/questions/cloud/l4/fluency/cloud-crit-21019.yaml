schema_version: 1
id: cloud-crit-21019
title: MoE Inference Token Routing Latency Breakdown
topic: mixture-of-experts
status: published
provenance: imported
scenario: For a single MoE layer with 8 experts across 8 GPUs using NVLink, break down the end-to-end
  latency for processing a batch of 32 tokens during decode (1 new token per request). Include router
  computation, dispatch, expert computation, and combine.
details:
  realistic_solution: 'Step-by-step latency for decode batch=32, hidden_dim=4096, FFN_dim=14336, BF16:
    (1) Router forward: [32, 4096] × [4096, 8] linear + softmax + top-2 selection = ~5 μs (tiny matmul,
    memory-bound). (2) Dispatch all-to-all: Each token sends 8 KB (4096 × 2B) to 2 expert GPUs. Total
    payload: 32 × 2 × 8 KB = 512 KB across NVLink. Latency: ~10 μs (dominated by NVLink launch overhead,
    not bandwidth). (3) Expert FFN computation: Each expert processes ~8 tokens (32×2/8). Matmul [8, 4096]
    × [4096, 14336]: load 4096×14336×2B = 117 MB weights, producing 8×14336×2B = 229 KB output. Memory-bound:
    117 MB / 3.35 TB/s = 35 μs per expert (up + gate + down projections ≈ 3× = 105 μs). (4) Combine all-to-all:
    ~10 μs. Total: 5 + 10 + 105 + 10 = ~130 μs per MoE layer. For 32 layers: ~4.2 ms. Dense equivalent:
    skip router + dispatch + combine, same FFN compute ≈ 105 μs per layer. MoE overhead: ~24% from routing
    machinery.'
  common_mistake: Ignoring the router computation and dispatch/combine as negligible. At small batch sizes
    during decode, these fixed overheads dominate over the actual expert computation.
  napkin_math: 'Router: 5 μs. Dispatch: 10 μs. Expert FFN (8 tokens, memory-bound): 105 μs. Combine: 10
    μs. Total: 130 μs/layer. Dense equivalent: 105 μs/layer. MoE routing overhead: 25 μs/layer = 24%.'
