schema_version: 1
id: cloud-fill-04016
title: Gang Scheduling for Distributed Training Efficiency
topic: scheduling-resource-management
status: published
provenance: imported
scenario: Your team is running 20 concurrent 8-GPU training jobs on a 200-GPU MI300X cluster. The Kubernetes
  scheduler is launching jobs as GPUs become available, but jobs start with 4-6 GPUs and block waiting
  for the remaining GPUs. GPU utilization sits at 35% even though 190 of 200 GPUs are 'allocated.' Explain
  why gang scheduling is necessary here.
details:
  realistic_solution: 'Implement gang scheduling with all-or-nothing allocation: a job requesting 8 GPUs
    either receives all 8 simultaneously or waits in a queue. Use a backfill scheduler that allows smaller
    jobs to run during wait periods. Tools: Volcano scheduler for Kubernetes, Slurm with --ntasks-per-node
    and --exclusive, or YARN capacity scheduler with GPU gang support.'
  common_mistake: Using a Kubernetes default scheduler that treats GPUs as independent resources and allocates
    them greedily as they become free. Distributed training requires all N GPUs to be available simultaneously
    (gang) — partial allocations starve the job while holding resources.
  napkin_math: 'Without gang scheduling: 20 jobs × 8 GPUs = 160 GPUs needed. 10 jobs are in partial state
    holding 50 GPUs (5 avg each) while waiting for 3 more. Those 50 GPUs are ''allocated'' but 0% utilized.
    50/200 = 25% of cluster idle due to partial allocations. Observed 35% util = 30% genuine work + 5%
    from jobs that did complete gang. Gang scheduling recovers the 25% → 60% utilization.'
