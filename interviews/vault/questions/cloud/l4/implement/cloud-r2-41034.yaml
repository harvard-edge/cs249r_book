schema_version: 1
id: cloud-r2-41034
title: Topology-Aware Scheduling on DGX H100
topic: scheduling-resource-management
status: published
provenance: imported
scenario: A DGX H100 node has 8 GPUs connected via NVSwitch with full mesh NVLink. A 4-GPU distributed
  training job is scheduled. Does NVLink topology matter for placement on this node, or are all 4-GPU
  subsets equivalent?
details:
  realistic_solution: 'On DGX H100 with NVSwitch: all 8 GPUs have full mesh NVLink connectivity (900 GB/s
    bidirectional per GPU pair). Any 4-GPU subset gets equal NVLink bandwidth for AllReduce. However,
    NUMA topology still matters. In a 2-socket system, GPUs 0-3 are typically on NUMA node 0 and GPUs
    4-7 on NUMA node 1. A 4-GPU job on GPUs {0,1,4,5} spans NUMA nodes, meaning CPU-GPU data transfers
    for 2 GPUs cross the UPI/xGMI link between CPU sockets — adding ~50% latency for host-to-device copies.
    Best practice: prefer GPUs within the same NUMA node (GPUs {0,1,2,3} or {4,5,6,7}) for 4-GPU jobs.
    This optimizes: (a) DataLoader CPU-to-GPU transfers, (b) pinned memory allocation locality, (c) PCIe
    P2P if used alongside NVLink. Slurm implements this via gres/gpu with --gpu-bind=closest or CUDA_VISIBLE_DEVICES
    + numactl --cpunodebind.'
  common_mistake: Assuming all NVLink topologies are full mesh. While DGX H100 does use NVSwitch for all-to-all
    connectivity, DGX A100 had a hybrid topology where not all GPU pairs had direct NVLink connections.
    Also, NUMA node affinity (which CPU socket / PCIe root complex each GPU is attached to) matters for
    host-to-device transfer performance.
  napkin_math: 'Cross-NUMA CPU-GPU transfer: ~20 GB/s vs same-NUMA: ~30 GB/s (PCIe 5.0). For a DataLoader
    pushing 1 GB/s of training data: same-NUMA overhead = 33 ms, cross-NUMA = 50 ms. 50% penalty per batch.'
