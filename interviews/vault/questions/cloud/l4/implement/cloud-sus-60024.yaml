id: cloud-sus-60024
title: Autograd correctness testing with gradcheck and gradgradcheck
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You have implemented a custom differentiable beam search decoder for sequence generation on
  A100. The operation involves a differentiable top-k selection with soft attention over beam hypotheses.
  Before deploying to production training, you need to verify the backward pass is analytically correct.
details:
  realistic_solution: 'Use torch.autograd.gradcheck(func, inputs, eps=1e-6, atol=1e-4, rtol=1e-3, dtype=torch.float64)
    to compare analytical gradients against finite differences. Use double precision (float64) to minimize
    numerical error in the finite difference baseline. For second-order: use torch.autograd.gradgradcheck().
    If gradcheck fails, use check_grad_dtypes=True to diagnose type issues, and examine individual Jacobian
    elements with torch.autograd.functional.jacobian().'
  common_mistake: Only testing that backward() runs without error, not verifying that the computed gradients
    match the numerical Jacobian. Silent gradient errors (wrong but non-NaN gradients) lead to models
    that train without errors but converge to suboptimal solutions.
  napkin_math: 'gradcheck runs 2×n_inputs finite difference evaluations (forward + perturbation for each
    element). For a beam search with batch=2, beam_width=4, seq_len=10: input size = 2×4×10×vocab_size.
    With vocab=1000: 2×4×10×1000 = 80K input elements → 160K forward passes. At 1ms each: 160 seconds.
    Reduce input size to batch=1, beam=2, seq=3, vocab=10 for testing — 120 forward passes in 0.1 seconds.'
