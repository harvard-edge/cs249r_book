schema_version: 1
id: cloud-new-50024
title: Migrating cuDNN-Fused Operators to Portable Alternatives
topic: software-portability
status: published
provenance: imported
scenario: Your training pipeline relies on cuDNN's fused BatchNorm+ReLU+Conv kernel, which gives a 15%
  speedup over unfused execution on H100. When porting to MI300X, MIOpen does not offer an equivalent
  three-way fusion. How do you recover the performance?
details:
  realistic_solution: 32MB / 5.3 TB/s = 6 microseconds (not 6ms — TB/s = 10^12 B/s, so 32×10^6 / 5.3×10^12
    = 6×10^-6 s = 6μs).
  common_mistake: Accepting the 15% regression as inevitable on MI300X. While MIOpen may not have the
    exact three-way fusion, other optimization strategies can recover most of the gap.
  napkin_math: '32MB model load from MI300X HBM3 at 5.3 TB/s: 32MB / 5.3TB/s = 32×10^-3 GB / 5,300 GB/s
    = 0.032/5300 = 6.04×10^-6 s = 6 microseconds (not 6ms — 6ms would require 5.3 GB/s, not TB/s).'
