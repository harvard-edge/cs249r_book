schema_version: 1
id: cloud-r2-41053
title: MIG Partitioning in Kubernetes
topic: container-orchestration
status: published
provenance: imported
scenario: You have a Kubernetes node with 4 A100-80GB GPUs and want to expose MIG partitions as schedulable
  resources. Each GPU should be split into 3g.40gb instances. Describe the configuration and how pods
  request specific MIG profiles.
details:
  realistic_solution: 'Setup: (1) Enable MIG on each GPU: nvidia-smi -i 0,1,2,3 -mig 1 (requires GPU reset).
    (2) Create MIG instances: nvidia-smi mig -i 0 -cgi 9,9 -C (creates 2× 3g.40gb GPU instances per GPU).
    Repeat for GPUs 1-3. Total: 8 MIG instances. (3) Configure the NVIDIA device plugin with MIG strategy:
    ''single'' strategy (all MIG instances on a node must be the same profile) or ''mixed'' strategy (different
    profiles per GPU). For this case, use ''single'' with MIG_STRATEGY=single in the device plugin DaemonSet.
    (4) The device plugin discovers MIG instances and registers them as nvidia.com/gpu resources (in single
    strategy) or nvidia.com/mig-3g.40gb (in mixed strategy). (5) Pod spec: resources.limits: nvidia.com/mig-3g.40gb:
    1 requests one MIG partition. The container sees a single GPU device with 40 GB memory and 3/7 compute
    capacity. Kubernetes RBAC can enforce which namespaces can request which MIG profiles. Operational
    consideration: changing MIG profiles requires draining the node, resetting GPUs, and reconfiguring
    — not dynamic. Plan MIG profiles based on workload mix.'
  common_mistake: Assuming standard nvidia.com/gpu resource requests work with MIG. MIG instances are
    exposed as different resource types (e.g., nvidia.com/mig-3g.40gb) and require specific device plugin
    configuration.
  napkin_math: '4 A100s × 2 MIG-3g.40gb = 8 schedulable instances. Without MIG: 4 schedulable GPUs. 2×
    more pods can be served. Each pod gets 40 GB and ~42% compute.'
