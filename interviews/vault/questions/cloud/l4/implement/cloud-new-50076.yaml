schema_version: 1
id: cloud-new-50076
title: Async Checkpointing Overlap with Training Computation
topic: communication-computation-overlap
status: published
provenance: imported
scenario: Checkpointing a 70B model every 100 steps takes 45 seconds (copying 280GB of model + optimizer
  states from GPU to CPU to disk). During this time, training pauses. With 3-minute step cycles, checkpointing
  adds 25% overhead. Design an async checkpointing strategy.
details:
  realistic_solution: 'Async checkpointing pipeline: (1) At checkpoint step: copy model state_dict from
    GPU to a pre-allocated pinned memory buffer on a separate CUDA stream (D2H async, ~4s for 280GB at
    64 GB/s PCIe). (2) Once D2H completes (event signal), launch a background CPU thread to serialize
    and write to NVMe SSD (280GB at 5 GB/s = 56s). (3) Training continues immediately after the D2H copy
    starts — the 56s disk write happens in the background, overlapped with the next ~3 training steps.
    (4) Use a double-buffer for pinned memory to avoid blocking if the next checkpoint arrives before
    disk write finishes. PyTorch''s torch.distributed.checkpoint provides async_save() for this pattern.'
  common_mistake: Using torch.save() synchronously, which blocks the GPU while the CPU serializes and
    writes to disk. Even if the GPU is not involved in disk I/O, torch.save() holds the Python GIL and
    blocks the training loop.
  napkin_math: 'Sync checkpoint: 45s pause every 100 steps (300s cycle). Overhead: 45/345 = 13%. Async:
    4s D2H stall + 0s disk (background). Overhead: 4/304 = 1.3%. 10x reduction in checkpoint overhead.
    Training throughput increase: ~12%.'
