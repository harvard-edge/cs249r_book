schema_version: 1
id: cloud-cell-10005
title: Implementing Gradient Checkpointing with Custom Autograd for a Non-Standard Layer
topic: activation-memory
status: published
provenance: imported
scenario: You are implementing a custom Mixture-of-Experts (MoE) layer for a 30B sparse model on H100.
  The MoE layer has a routing sub-layer followed by 64 expert FFNs. PyTorch's `torch.utils.checkpoint.checkpoint()`
  wraps the entire layer, but profiling shows it is saving intermediate gating logits (64×B×S float32
  tensors) unnecessarily before the checkpoint boundary, consuming 4 GB. You must implement fine-grained
  checkpointing that discards the gating logits and recomputes only the routing decision during the backward
  pass.
details:
  realistic_solution: Implement a custom `torch.autograd.Function` with `forward()` saving only the expert
    assignment indices (int8, negligible memory) and `backward()` recomputing the router logits from the
    saved input. Expert FFN activations can then be checkpointed independently using `torch.utils.checkpoint.checkpoint()`
    per expert group. This reduces saved activation memory from 4.19 MB (float32 logits) to ~16 KB (int8
    routing indices) with minimal recompute overhead since the router is a single linear layer.
  common_mistake: Using `torch.utils.checkpoint.checkpoint()` at the coarse layer level, which causes
    PyTorch to re-run the entire forward function including router computation and all expert FFNs during
    backward. This wastes recompute budget on cheap operations (routing) and does not give fine-grained
    control over which intermediate tensors are saved.
  napkin_math: 'Gating logits: 64 experts × B=8 × S=2048 × float32 = 64×8×2048×4 B = 4.19 MB (not 4.2
    GB). Expert indices (int8): 8×2048×1 B = 16 KB. Recompute cost of router: 2×B×S×H×E_hidden FLOPs ≈
    2×8×2048×8192×2048/989e12 ≈ 0.56 ms per backward — negligible.'
last_modified: '2026-04-01'
tags:
- scope:MoE layer implementation on single H100; PyTorch custom autograd; excludes expert parallelism
  across GPUs.
