schema_version: 1
id: cloud-r2-41001
title: TP Communication Volume for Transformer Block
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: A Llama-70B transformer block has hidden_dim=8192 and runs with TP=8 on MI300X GPUs (5.3 TB/s
  HBM3). Each transformer block requires 2 AllReduce operations in the forward pass (one for attention,
  one for MLP). For a batch of 2048 tokens, estimate the per-block AllReduce communication volume and
  time.
details:
  realistic_solution: Each AllReduce sends a tensor of shape [2048, 8192] in BF16 = 2048 × 8192 × 2 =
    33.6 MB. Two AllReduces per block = 67.2 MB message volume. Using ring AllReduce, actual bytes per
    GPU = 2 × (7/8) × 33.6 MB = 58.8 MB per AllReduce. With 8×MI300X connected via Infinity Fabric at
    ~400 GB/s bisection bandwidth, each AllReduce takes ~58.8 MB / 400 GB/s ≈ 0.15 ms. Two AllReduces
    ≈ 0.3 ms per block. With 80 layers, total TP communication ≈ 24 ms per forward pass. This is small
    relative to compute, confirming TP is communication-efficient within a node.
  common_mistake: Forgetting that AllReduce = ReduceScatter + AllGather, so the actual bytes on the wire
    is 2 × (N-1)/N × message_size, not just the message size. Also confusing HBM bandwidth with NVLink
    bandwidth.
  napkin_math: 'Per AllReduce: 2048 × 8192 × 2B = 33.6 MB. Ring cost: 2 × (7/8) × 33.6 = 58.8 MB. At 400
    GB/s: 0.15 ms. Two per block × 80 blocks = 24 ms total.'
