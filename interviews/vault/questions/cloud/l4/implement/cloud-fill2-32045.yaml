id: cloud-fill2-32045
title: 'Online Softmax: The Numerical Foundation of FlashAttention'
topic: flash-attention
status: published
provenance: imported
scenario: 'Standard softmax requires two passes over the data: one to find the max (for numerical stability),
  one to compute exp and normalize. FlashAttention processes tiles in a single pass using the online softmax
  trick. Explain how the running max and running sum are maintained across tiles, and why this is critical
  for correctness.'
details:
  realistic_solution: 'The online softmax algorithm maintains two running statistics as it processes tiles
    left-to-right: (1) m_i = running max of all QK^T scores seen so far, (2) l_i = running sum of exp(scores
    - m_i). When processing a new tile with local scores s_new: (a) compute local max m_new = max(s_new),
    (b) update global max: m_updated = max(m_i, m_new), (c) rescale previous sum: l_updated = l_i × exp(m_i
    - m_updated) + sum(exp(s_new - m_updated)). The output accumulator O must also be rescaled: O_updated
    = O_i × (l_i × exp(m_i - m_updated) / l_updated) + softmax(s_new, m_updated) × V_new. This is mathematically
    exact — no approximation. The exp(m_i - m_updated) rescaling factor corrects for the changing max.
    At the end of all tiles, l_final equals the true global sum and m_final equals the true global max.
    This single-pass approach avoids storing the full N×N matrix and avoids a second pass.'
  common_mistake: Thinking you can simply compute softmax independently per tile and concatenate results.
    Each tile's softmax normalization depends on values in ALL tiles (the global max and sum), so independent
    per-tile softmax gives wrong results.
  napkin_math: 'Standard softmax: Pass 1 (find max): N reads. Pass 2 (exp, sum, normalize): N reads +
    N writes. Total: 3N memory ops. Online softmax in FlashAttention: 1 pass with O(1) extra state (m,
    l) per row. Memory: N reads + final O write. Savings: ~2× fewer HBM accesses.'
