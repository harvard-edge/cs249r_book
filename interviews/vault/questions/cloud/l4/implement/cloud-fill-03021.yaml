schema_version: 1
id: cloud-fill-03021
title: Flash Attention Numerical Stability with Long Sequences
topic: flash-attention
status: published
provenance: imported
scenario: A model trained with standard attention is being converted to use Flash Attention for inference
  on TPU v5e (16GB HBM, 197 TFLOPS BF16). At seq_len=32768, you observe NaN values in attention outputs
  that don't appear with standard attention. The model was trained in BF16.
details:
  realistic_solution: Enable Flash Attention's softmax scaling (divide QK by sqrt(d_head) before the attention
    kernel, which Flash Attention should handle internally). Check if the model uses ALiBi or RoPE positional
    encodings — very long sequences with ALiBi can produce large negative logits that cause exp(-large)
    = 0, leading to zero-division in softmax. Use FP32 accumulation in the attention kernel even with
    BF16 inputs.
  common_mistake: Assuming Flash Attention is numerically equivalent to standard attention in all cases.
    Flash Attention uses the online softmax algorithm with per-block running max for numerical stability,
    but BF16's limited dynamic range (exp range ~1e-38 to 3.4e38) can cause issues when attention logits
    span a large range.
  napkin_math: 'BF16 range: exponent 8 bits, significant 7 bits. Max representable: ~3.4e38. For seq=32768
    tokens, attention logit range can reach ±100 after QK^T/sqrt(d). exp(100) = 2.7e43 — overflows BF16.
    Flash Attention''s block-wise running max mitigates this but requires fp32 intermediate accumulation.
    TPU v5e runs BF16 natively; force fp32 matmul accumulation in JAX with jax.default_matmul_precision=''float32''.'
last_modified: '2026-04-01'
