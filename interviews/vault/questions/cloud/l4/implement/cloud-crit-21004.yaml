id: cloud-crit-21004
title: MoE Memory Footprint vs Dense Equivalent
topic: mixture-of-experts
status: published
provenance: imported
scenario: Compare the memory footprint for serving a Mixtral 8x7B MoE model (46.7B total parameters, 12.9B
  active per token) versus a dense 13B model, both in BF16 on H100 GPUs. How many GPUs does each require,
  and what is the memory efficiency gap?
details:
  realistic_solution: 'Dense 13B: 13B × 2B = 26 GB — fits on a single H100 (80 GB) with ample room for
    KV-cache. Mixtral 8x7B: 46.7B × 2B = 93.4 GB — requires at least 2×H100 GPUs. Despite having similar
    per-token compute (12.9B active ≈ 13B dense), the MoE model needs 3.6× more memory. This is the fundamental
    MoE serving challenge: you pay the memory cost of all experts but only use 2/8 = 25% of them per token.
    The benefit is quality — 46.7B parameters provide better representations than 13B, but at 3.6× memory
    cost for serving.'
  common_mistake: Assuming MoE uses the same memory as its active parameter count. All expert weights
    must be resident in memory even though only 2 of 8 experts fire per token.
  napkin_math: 'Dense 13B: 26 GB, 1 GPU. Mixtral 8x7B: 93.4 GB, 2 GPUs minimum. Memory ratio: 93.4/26
    = 3.6×. Active FLOP ratio: 12.9B/13B ≈ 1.0×. Memory-to-compute inefficiency: 3.6×.'
