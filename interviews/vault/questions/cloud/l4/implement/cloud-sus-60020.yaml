schema_version: 1
id: cloud-sus-60020
title: Designing a differentiable data augmentation pipeline for training on H100
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are implementing differentiable augmentation (DiffAugment) for a GAN training pipeline on
  H100. The discriminator loss must backpropagate through random cropping, color jitter, and cutout operations.
  Standard torchvision transforms do not participate in autograd.
details:
  realistic_solution: 'Implement augmentations as differentiable tensor operations: random crop via grid_sample
    with bilinear interpolation (differentiable), color jitter via tensor arithmetic (multiply/add), cutout
    via masked_fill with a learnable or random mask. Keep requires_grad=True throughout. For the generator
    path, ensure the augmented image remains in the computation graph. Use kornia library which provides
    differentiable augmentations as nn.Module layers.'
  common_mistake: Applying torchvision transforms after detaching the image tensor (treating augmentation
    as a preprocessing step), which stops gradient flow from the discriminator loss back through augmentations
    to the generator. The GAN cannot learn augmentation-robust features.
  napkin_math: 'grid_sample for random crop at resolution 256×256, batch=64: input 64×3×256×256, grid
    64×256×256×2. Memory: 64×3×256×256×4 = 50MB + 64×256×256×2×4 = 32MB. FLOP cost: O(batch × H × W ×
    4) for bilinear interp = 4M ops. At H100 989 TFLOPS: <0.01ms — negligible, worth it for full gradient
    flow.'
