id: cloud-cell-13184
title: 'Transformer Cost Implement: Chinchilla Optimal Model Size Calculation'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Implement the Chinchilla optimal model size and token count for a fixed compute budget of $100K
  on H100 ($2.50/hr, 40% MFU). Chinchilla optimal: N* = (C/6)^0.5 * (D/N)^0.5 where optimal D/N = 20.
  Derive N* and D* given C, and calculate the expected loss reduction vs same budget on a 7B model trained
  for maximum tokens within budget.'
details:
  realistic_solution: 'Using correct H100 FP16 (989 TFLOPS) and 40% MFU: C ≈ 5.7×10^22 FLOPs. Chinchilla
    optimal: N* = sqrt(C/120) ≈ 21.8B params, D* = 20×21.8B = 436B tokens. Note: original used 1979 TFLOPS
    (incorrect); also sqrt(9.5e20) = 3.08e10 not 9.75e10.'
  common_mistake: Using the simplified Chinchilla rule (D=20*N) without checking that the compute budget
    C = 6*N*D = 6*N*20*N = 120*N² actually determines both N and D jointly, not independently.
  napkin_math: 'C = $100K/$2.50 * 3600s * 989e12 * 0.4 = 40,000hr * 3600s/hr * 395.6e12 = 5.695e22 FLOPs.
    Chinchilla optimal: N* = sqrt(C/120) = sqrt(5.695e22/120) = sqrt(4.746e20) = 2.18e10 ≈ 21.8B params.
    D* = 20 × 21.8B = 436B tokens. So $100K optimally trains a ~22B model on ~436B tokens. vs 7B model:
    trains on D = 5.695e22/(6×7e9) = 1.356T tokens. Chinchilla says 22B@436B beats 7B@1.356T for same
    budget. Rule: always use as large a model as your budget allows, with 20 tokens per parameter.'
