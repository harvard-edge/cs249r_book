schema_version: 1
id: cloud-cell-13063
title: 'Systolic Array Implement: GEMM Performance on TPU v5e'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Calculate the exact time to perform a GEMM (C = A*B) on TPU v5e (197 TFLOPS BF16, 819 GB/s)
  where A is (8192, 4096) and B is (4096, 16384) in BF16. Determine if it is compute or memory bound,
  the MFU if the actual measured time is 8.5ms, and how tiling the computation into 4 pieces affects memory
  bandwidth requirements.
details:
  realistic_solution: 'A: (8192, 4096). B: (4096, 16384). C: (8192, 16384). FLOPs = 2 * 8192 * 4096 *
    16384 = 2 * 549.75G = 1.1 TFLOP. Weight bytes: A=8192*4096*2=67MB, B=4096*16384*2=134MB, C=8192*16384*2=268MB.
    Total BW = 469MB. AI = 1100G/469M = 2345 FLOPs/byte >> 240 ridge → compute bound. Time_compute = 1100G/197T
    = 5.58ms. Measured 8.5ms → MFU = 5.58/8.5 = 65.6%. With 4 tiles: each tile reads 1/4 of A and 1/4
    of B: bandwidth same (469MB total, just split). Tiling doesn''t change total BW.'
  common_mistake: Computing FLOPs for GEMM as N^2 * M instead of 2*M*K*N (the correct formula for C[M,N]
    = A[M,K] * B[K,N]) and forgetting the factor of 2 for multiply-accumulate.
  napkin_math: 'FLOPs: 2*8192*4096*16384 = 2*8192*67M = 1099G ≈ 1.1 TFLOP. BW: A=64MB, B=128MB, C=256MB
    total=448MB. AI=1100G/448M=2455. Compute bound. Compute time: 1.1T/197T=5.58ms. Measured 8.5ms → MFU=5.58/8.5=65.6%.
    Tiling into 4: each tile is M/2 x N/2, 4 tiles. Each loads A_quarter (16MB) + B_quarter (32MB) = 48MB.
    Total: 4*48+C_write=256=448MB same. Tiling only affects SRAM capacity, not total bandwidth. Good sign:
    65.6% MFU on TPU is achievable and reasonable.'
