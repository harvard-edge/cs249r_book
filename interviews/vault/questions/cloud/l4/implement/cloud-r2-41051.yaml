schema_version: 1
id: cloud-r2-41051
title: Node Affinity for GPU Topology in K8s
topic: container-orchestration
status: published
provenance: imported
scenario: 'Your Kubernetes cluster has two node types: gpu-h100 (8× H100, NVLink) and gpu-a100 (8× A100,
  NVLink). A training job requires H100s for FP8 support. Write the pod spec with node affinity, tolerations,
  and resource requests to ensure correct placement.'
details:
  realistic_solution: 'Pod spec: spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution
    with matchExpressions: key=accelerator-type, operator=In, values=[h100]. This hard requirement ensures
    only H100 nodes are considered. Tolerations: key=nvidia.com/gpu, operator=Exists, effect=NoSchedule
    — allows the pod to be scheduled on GPU-tainted nodes. Resource requests: resources.limits: nvidia.com/gpu:
    8 (request all 8 GPUs for distributed training). resources.requests: cpu: 64, memory: 512Gi (ensure
    enough CPU and RAM for data loading). Additional labels for topology: topology.kubernetes.io/zone
    can be used to co-locate pods in the same data center zone for low-latency inter-node communication.
    For multi-node training, use a podAffinity rule with topologyKey=kubernetes.io/hostname to prefer
    co-locating pods on the same rack (labeled with a rack topology key). The NVIDIA GPU Operator automates
    node labeling (nvidia.com/gpu.product=NVIDIA-H100-80GB-HBM3) and tainting.'
  common_mistake: Using nodeSelector alone (too rigid, cannot express preferences) or forgetting tolerations
    (GPU nodes are typically tainted to prevent non-GPU pods from landing on them).
  napkin_math: 'Misplacement on A100 instead of H100: no FP8 support → must fall back to BF16. Training
    throughput penalty: ~1.8× slower (990 vs 312 TFLOPS for FP8 vs A100 BF16). Cost of misplacement: $3/hr
    × 8 GPUs × 1.8× longer = $43.2/hr vs $24/hr.'
