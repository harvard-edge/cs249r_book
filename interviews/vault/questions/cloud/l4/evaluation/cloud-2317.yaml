schema_version: 1
id: cloud-2317
title: Attention Softmax FP16 Overflow
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are serving a 70B model with a 32k context window. The KV cache is stored in FP16 to fit
  within 4x80GB A100s. At context lengths below 16k, generation is flawless. As soon as the context exceeds
  16k tokens, the model outputs completely black/empty tokens (NaNs).
details:
  realistic_solution: The failure is a numerical range overflow in the attention softmax calculation.
    In self-attention, the dot product of Query and Key is scaled by 1/sqrt(d_k). For long sequences,
    accumulating attention scores can result in pre-softmax logits that exceed FP16's maximum representable
    value. Furthermore, the exponential function in softmax exp(x) will overflow FP16 if x > 11. FlashAttention
    mitigates this by maintaining a running maximum and scaling on the fly, but if the intermediate accumulators
    for the softmax denominator aren't explicitly cast to FP32 in the kernel, the sum of thousands of
    exp() values will exceed 65504, resulting in Inf, and subsequently NaN when divided.
  common_mistake: Assuming the KV cache memory allocation is fragmenting and causing out-of-memory errors
    that fail silently.
  napkin_math: FP16 max value = 65504. If average exp(logit) is just 5.0, summing over 16,000 tokens yields
    80,000. 80,000 > 65504, causing an immediate overflow to Infinity. Softmax division (Inf/Inf) yields
    NaN.
