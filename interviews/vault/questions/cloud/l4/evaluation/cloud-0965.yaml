schema_version: 1
id: cloud-0965
title: Diagnosing Thread Exhaustion Cascades
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your ML serving tier, consisting of 50 Kubernetes pods (each with 100 worker threads), processes
  10,000 queries per second. For a new hybrid model, each request queries a remote feature store API.
  The feature store suddenly experiences high load, causing its p99 latency to spike from 15ms to 5,000ms.
  Within seconds, all 50 serving pods become unresponsive with `ThreadExhaustion` errors, completely bringing
  down the user-facing API—even for requests that could have used local cached features. Diagnose the
  root cause of this total outage and explain the architectural mechanism needed to contain it.
details:
  realistic_solution: Implement the Circuit Breaker pattern. Configure it to monitor the failure/timeout
    rate. If the error rate exceeds a threshold (e.g., 20% over a 10-second rolling window), the circuit
    'opens'. Subsequent requests fail instantly (fast-fail) without consuming a worker thread, allowing
    the serving API to seamlessly return fallback predictions.
  common_mistake: Adding naive retries or relying solely on a 5-second timeout. Retries amplify the thundering
    herd on the degraded upstream service, and standard timeouts still hold the worker thread hostage
    for the entire duration, inevitably leading to pool exhaustion.
  napkin_math: 'Under normal operation (15ms latency): Concurrency = 200 QPS/pod * 0.015s = 3 threads
    used per pod. Under degraded operation (5000ms latency): Concurrency = 200 QPS/pod * 5s = 1000 threads
    required. With only 100 threads available, the pool is fully exhausted in just 100 threads / 200 QPS
    = 0.5 seconds.'
