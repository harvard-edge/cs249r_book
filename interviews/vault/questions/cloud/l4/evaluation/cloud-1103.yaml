id: cloud-1103
title: Diagnosing Data Loader Bottlenecks in Vision Training
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is training a Vision Transformer on a single node with 8x A100 GPUs using a 10TB dataset
  of 4K resolution JPEGs stored in S3. The training loop fetches images, decodes them, resizes them to
  256x256, and applies augmentations on-the-fly. However, GPU utilization is stuck at 30%, and profiling
  reveals the data pipeline is the primary bottleneck. How do you analyze and resolve this using a dataset
  compilation approach?
details:
  realistic_solution: Treat the dataset as a compilation target. Implement an offline pipeline that pre-resizes
    the 4K images to 256x256, applies static normalizations, and serializes the raw tensors into chunked,
    sequential formats (like WebDataset or TFRecords). This moves the heavy network and CPU decoding tax
    out of the critical training path.
  common_mistake: Throwing more CPU workers at the DataLoader or increasing the prefetch buffer size.
    This merely shifts the bottleneck between network I/O and CPU decoding limits without reducing the
    total computational work required per epoch.
  napkin_math: Streaming 4K JPEGs (~5MB each) to achieve a target throughput of 2,000 imgs/sec requires
    ~10 GB/s of network bandwidth and massive CPU decode overhead. By 'compiling' them to 256x256x3 uncompressed
    tensors (~196KB each), the bandwidth requirement drops to ~390 MB/s, easily saturating the A100s while
    eliminating the JPEG decoding tax.
