schema_version: 1
id: cloud-2071
title: The Model Staleness Tradeoff
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your fraud detection model is retrained weekly on the latest 30 days of transaction data. Fraudsters
  adapt their tactics within 48 hours of a new model deployment. Your detection rate drops from 95% to
  82% by day 5 of each week. The data engineering team says daily retraining is feasible but costs 7×
  more compute. Analyze the cost-benefit of switching from weekly to daily retraining.
details:
  realistic_solution: 'The key insight is that compute cost is the wrong denominator — fraud cost is.
    If the model detects $10M of fraud per week at 95% detection rate, the 13% detection rate drop (95%
    → 82%) over days 2-7 means approximately: Days 2-5 (4 days): linear decay from 95% → 82%, average
    88.5%. Days 6-7 (2 days): at 82%. Weekly undetected fraud increase: roughly $10M × (0.95 - 0.885)
    × 4/7 + $10M × (0.95 - 0.82) × 2/7 ≈ $371K + $371K = $742K/week of additional fraud. Daily retraining
    cost increase: if weekly training costs $5K, daily costs $5K × 7 = $35K/week (a $30K increase). Net
    weekly benefit: $742K - $30K = $712K/week.'
  common_mistake: Comparing only the compute cost (7× more) without quantifying the cost of undetected
    fraud in the staleness window.
  napkin_math: 'Weekly training: $5K compute, $742K additional fraud loss. Daily training: $35K compute,
    ~$50K additional fraud loss (much smaller staleness window). ROI: ($742K - $50K - $30K) / $30K = 22.1×
    return on compute investment. Break-even: daily retraining pays for itself if it prevents > $30K/week
    in fraud — a trivially low threshold.'
