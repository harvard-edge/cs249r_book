id: cloud-2113
title: Forward vs Reverse Mode Autodiff
topic: roofline-analysis
status: published
provenance: imported
scenario: A researcher proposes using forward-mode automatic differentiation instead of reverse-mode (backpropagation)
  for training a transformer with 1 billion parameters and a scalar loss. Why would this be catastrophically
  expensive? When might forward-mode actually be preferable?
details:
  realistic_solution: 'Reverse-mode (backprop) computes gradients for ALL 1B parameters in one backward
    pass (cost: ~2x forward). Forward-mode would require one forward-sensitivity pass per parameter, meaning
    1B passes to get the full gradient. Cost ratio: 1B / 1 = 1 billion times more expensive. Forward-mode
    is preferable when: (1) computing Jacobian-vector products for few inputs (e.g., neural ODE sensitivity),
    (2) the function has many outputs but few inputs, or (3) computing per-sample gradients without materializing
    the full Jacobian.'
  common_mistake: Treating forward-mode and reverse-mode as equivalent in cost. Forward-mode computes
    one column of the Jacobian per pass; reverse-mode computes one row per pass. When outputs << inputs
    (scalar loss, billions of params), reverse-mode wins by orders of magnitude.
  napkin_math: 'Reverse-mode: 1 backward pass = 2x forward cost = 2F. Forward-mode: 1B passes * 1F each
    = 1B * F. Ratio: 1B * F / 2F = 500M times slower. Forward-mode only wins when #outputs >> #inputs.'
