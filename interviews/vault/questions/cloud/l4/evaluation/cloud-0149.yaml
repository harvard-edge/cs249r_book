id: cloud-0149
title: The Two-Tier Traffic Jam
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You manage a single GPU serving cluster for a 13B parameter model on H100s. The service has
  two use cases: interactive chat, where users demand low Time-To-First-Token (TTFT), and offline document
  summarization, where total job time (which depends on Throughput of Output Tokens, or TPOT) is the key
  metric. You are using continuous batching with a single configuration. Chat users complain of high latency,
  while the summarization workload is inefficient. Differentiate between a system optimized for TTFT and
  one for TPOT, and analyze why a single configuration fails for both. Propose an alternative architecture.'
details:
  realistic_solution: 'A single configuration fails because the two workloads are at opposite ends of
    the performance spectrum defined by the Roofline model.

    - **TTFT Optimization (Chat):** To minimize TTFT, you must minimize the time a request waits in a
    queue before processing begins. This requires using a very small batch size and a short batching timeout.
    This keeps the system highly responsive. However, small batches have low arithmetic intensity, making
    them memory-bandwidth bound. The GPU is ''starved'' for computation, leading to low efficiency and
    poor TPOT.

    - **TPOT Optimization (Summarization):** To maximize TPOT, you need to make the GPU as efficient as
    possible. This requires assembling large batches to increase arithmetic intensity, pushing the workload
    over the ''ridge point'' of the Roofline model into the compute-bound regime. This maximizes FLOPs
    utilization but introduces long queueing delays, which is poison for TTFT.'
  common_mistake: Engineers often conflate latency and throughput, attempting to find a single 'optimal'
    batch size. The common mistake is failing to recognize that TTFT and TPOT are fundamentally different
    metrics driven by different system dynamics. TTFT is sensitive to queueing delays, while TPOT is sensitive
    to computational efficiency. A compromise configuration is mediocre at both.
  napkin_math: Compare batch sizes for 13B model (26GB weights) on H100 (989 TFLOPS, 3.35 TB/s). For TTFT
    (chat), small batch B=1 minimizes queue wait. Prefill of 500 tokens is 2 * 13B * 500 = 13 TFLOPs.
    Time = 13/989 = 13ms. For TPOT (offline), large batch maximizes throughput. Decode is memory-bound
    at 26GB/3.35TB/s = 7.7ms per step. To hit compute bound, B must be large.
