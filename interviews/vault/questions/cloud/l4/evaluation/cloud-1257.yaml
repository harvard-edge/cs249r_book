id: cloud-1257
title: Large-Cluster MTBF and Goodput Analysis
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your team is training a large language model on a cluster of 2,048 H100 GPUs (256 nodes). Hardware
  telemetry guarantees a single-node Mean Time Between Failures (MTBF) of 60 days. The ML engineers escalate
  a critical issue, complaining that the training job experiences an interruption roughly every 5.5 hours,
  leading them to suspect a systemic orchestration bug. Currently, they are checkpointing every 4 hours,
  which takes 20 minutes synchronously to save to object storage, resulting in unacceptably low training
  goodput. Analyze the root cause of the frequent interruptions and diagnose the core bottleneck affecting
  goodput.
details:
  realistic_solution: Diagnose that the 5.5-hour interruption rate is actually the expected statistical
    hardware failure rate for a cluster of this size, not a software bug. The root cause of the poor goodput
    is the misconfigured 4-hour checkpoint interval, which risks massive compute waste per failure. The
    solution is to recalculate the optimal checkpoint frequency using Daly's formula to approximately
    2 hours, and to implement asynchronous in-memory checkpointing to hide the 20-minute I/O latency.
  common_mistake: Candidates often misdiagnose the 5.5-hour failure rate as an unexpected software bug,
    failing to calculate the mathematical relationship between single-node and cluster-wide MTBF. They
    also frequently suggest superficial fixes like 'buy faster storage' without mathematically adjusting
    the checkpoint frequency.
  napkin_math: '1. Single Node MTBF = 60 days = 1,440 hours.

    2. Cluster MTBF = Node MTBF / Number of Nodes = 1,440 / 256 = 5.625 hours (which perfectly matches
    the observed 5.5h rate).

    3. Daly''s Formula for optimal checkpoint interval: T = sqrt(2 * Checkpoint_Time * System_MTBF).

    4. T = sqrt(2 * 0.33h * 5.625h) = sqrt(3.75) ≈ 1.93 hours.

    5. The current 4-hour interval is highly suboptimal, causing disproportionate lost compute upon failure.'
