id: cloud-1967
title: Diagnosing Silent Failures in Cloud Fraud Detection
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are serving a cloud-based transaction fraud detection model handling 25,000 TPS on AWS g5.4xlarge
  instances. Hardware utilization is stable (GPU compute at 65%, P99 latency at 45ms). However, the business
  team reports a 30% spike in false positives over the last 48 hours following a new international product
  launch. System metrics and infrastructure health checks are completely green. How do you analyze the
  root cause of this degradation?
details:
  realistic_solution: Implement statistical distance monitoring (e.g., Kullback-Leibler divergence or
    Population Stability Index) on the live feature distributions compared to the training baseline. The
    international launch introduced user behavioral patterns absent from the training set, violating the
    stationarity assumption. You must deploy a data validation pipeline and trigger retraining on the
    new distribution.
  common_mistake: Assuming the degradation is an infrastructure bottleneck, memory leak, or application-layer
    software bug, instead of recognizing the breakdown of the stationarity assumption caused by the newly
    introduced geographic data distribution.
  napkin_math: 'If the training dataset contained 1% international transactions, but the new live traffic
    mix is 35% international, the input distribution P(X) has severely shifted. A Population Stability
    Index (PSI) calculation: PSI = sum((Actual_% - Expected_%) * ln(Actual_% / Expected_%)) would yield
    PSI = (0.35 - 0.01) * ln(0.35 / 0.01) ≈ 1.2. Any PSI > 0.2 indicates a critical distribution shift
    requiring immediate retraining.'
