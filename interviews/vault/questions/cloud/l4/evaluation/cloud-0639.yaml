id: cloud-0639
title: The Underflow Crisis
topic: quantization-fundamentals
status: published
provenance: imported
scenario: We switched our pre-training job from FP32 to FP16 to save memory, but the loss is returning
  NaNs within the first 100 steps. What numerical property is failing?
details:
  realistic_solution: Gradient underflow. FP16 only has 5 bits for the exponent, giving it a very narrow
    dynamic range ($6 \times 10^{-8}$ to $65504$). Small gradients in deep networks underflow to exactly
    0.0, causing training to collapse. You must switch to BF16 (which uses 8 bits for the exponent, matching
    FP32's range) or implement dynamic loss scaling.
  common_mistake: '"The learning rate is too high for FP16." Learning rate matters, but the root cause
    is the format itself.'
  napkin_math: FP16 smallest subnormal ≈ $6 \times 10^{-8}$. BF16 smallest subnormal ≈ $9 \times 10^{-41}$.
    Gradients in deep networks routinely hit $10^{-12}$ to $10^{-20}$ — well below FP16's floor but safely
    within BF16's range.
