id: cloud-cell-11091
title: 'Feature Store: Evaluate Online vs Offline Feature Store Architectures'
topic: feature-store-management
status: published
provenance: imported
scenario: You are choosing between (A) unified online/offline feature store (Feast with Redis + Parquet)
  vs (B) separate online store (Redis) and offline store (Hive). Your H100 training jobs run batch feature
  computation nightly, and inference on H100s requires real-time features. Evaluate consistency, latency,
  and operational complexity.
details:
  realistic_solution: At $0.001/1K tokens with 1M tokens/s throughput, hourly revenue is $3,600. Infrastructure
    cost for 256 H100s at $3/hr is $768/hr. This yields strong positive margins at scale.
  common_mistake: Building separate stores without a synchronization mechanism → training-serving skew
    where the feature computation logic differs between systems.
  napkin_math: 'Revenue at $0.001/1K tokens, 1M token/s throughput: $0.001/1K × 1M tokens/s × 3600s/hr
    = $3,600/hr = $86,400/day. Infrastructure: 256 H100s × $3/hr = $768/hr = $18,432/day. Gross profit:
    $86,400 - $18,432 = $67,968/day ≈ $1.728M/day. Annual: $630.7M. (Not $20K/day which would imply $8.3/hr
    revenue vs $768/hr cost — below breakeven.)'
