id: cloud-1205
title: Non-Linear Power Scaling in LLM Inference
topic: energy-per-operation
status: published
provenance: imported
scenario: A team benchmarks an 8x A100 (400W TDP) server running Llama-2-70B inference. At batch size
  1, throughput is 15 tokens/s per GPU, and GPU power draw averages 250W. When the batch size is increased
  to 64, throughput jumps to 120 tokens/s per GPU, but power draw only increases to 320W. The operations
  team is confused why an 8x increase in throughput only caused a 28% increase in power, and suspects
  the power sensors are broken. How do you analyze this non-linear scaling of power vs. throughput?
details:
  realistic_solution: At batch size 1, the workload is strictly memory-bandwidth bound. The compute cores
    (SMs) spend most of their time idle waiting for weights, but the GPU still consumes ~250W due to static
    leakage and active memory interfaces. At batch size 64, arithmetic intensity increases, utilizing
    the SMs efficiently and raising total power to 320W. The sensors are correct; the energy efficiency
    simply improved because the high static power baseline is now amortized over many more tokens.
  common_mistake: Assuming power consumption scales linearly with throughput or FLOPs, while ignoring
    the massive static power overhead (leakage and HBM refresh) that is consumed even when compute cores
    are stalled.
  napkin_math: 'BS1 Energy: 250W / 15 tok/s = 16.6 Joules/token. BS64 Energy: 320W / 120 tok/s = 2.66
    Joules/token. The marginal power cost of the extra 105 tokens/s is only 70W (0.66 J/token).'
