schema_version: 1
id: cloud-1982
title: Diagnosing A/B Test Interference in Social Networks
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are running a 50/50 A/B test on a new dual-encoder recommendation model serving a social
  network with 100M DAU. The treatment group shows a +5.0% increase in content creation, while the control
  group shows an unexpected -2.0% decrease in content creation compared to pre-experiment baselines. Total
  platform content creation only increased by +1.5%. You must root-cause the discrepancy between the treatment
  lift and the global platform metrics.
details:
  realistic_solution: Diagnose a Stable Unit Treatment Value Assumption (SUTVA) violation where treatment
    users outcompete control users for attention. Switch from user-level randomization to network-cluster
    randomization (graph partitioning) to isolate treatment effects.
  common_mistake: Attributing the control group's decline to an external macro-trend or seasonality, rather
    than recognizing that the treatment and control groups are not independent.
  napkin_math: Assuming a user's attention is zero-sum (total 60 mins/day). If Treatment (T) users create
    5% more content, they capture more of the feed. Control (C) users see more T content, reducing their
    own engagement/creation by 2%. True global lift = 0.5 * 5% (T) + 0.5 * -2% (C) = 1.5%.
