schema_version: 1
id: cloud-1020
title: In-Place Rolling Deployment VRAM Saturation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A team uses an in-place rolling deployment to update a 15GB DLRM model on a fleet of T4 GPUs
  (16GB VRAM) handling 10k QPS. To achieve 'zero downtime,' the deployment script loads the new model
  into GPU memory, warms it up, and then unloads the old model. During this 15-minute rollout window,
  P99 latency reliably spikes from 50ms to over 500ms, and occasional OOM errors are logged. Analyze the
  root cause of these deployment-time latency spikes and propose an architectural fix.
details:
  realistic_solution: The 16GB T4 VRAM cannot hold two 15GB models simultaneously. The system falls back
    to PCIe unified memory (swapping to system RAM), drastically reducing bandwidth (e.g., 320GB/s VRAM
    to 16GB/s PCIe) and causing latency spikes. The fix is to use true Blue/Green deployment on separate
    instances, or drain the node, unload the old model, load the new model, and re-introduce the node
    to the load balancer.
  common_mistake: Investigating network bandwidth saturation during the model download or blaming model
    warm-up overhead instead of identifying the hard hardware memory constraint.
  napkin_math: Old model (15GB) + New model (15GB) = 30GB required. T4 VRAM = 16GB. 30GB > 16GB VRAM.
    Deficit = 14GB, forcing slow PCIe unified memory paging.
