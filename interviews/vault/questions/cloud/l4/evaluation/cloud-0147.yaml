id: cloud-0147
title: 'The Throttling Dilemma: Per-User vs. Global Queueing'
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing the queueing and rate-limiting architecture for a new multi-tenant LLM API.
  The system must provide fair service and prevent a single 'power user' from degrading performance for
  others. You need to analyze the latency implications of two different designs under a 'thundering herd'
  scenario where one user submits a large burst of requests.
details:
  realistic_solution: 'Under a global FIFO queue, a single user bursting 100 requests monopolizes the
    system for 100/100 = 1 second. All other users experience up to 1 second of added latency. With per-user
    fair queuing (e.g., weighted fair queuing with token buckets), each user gets a proportional share.
    A burst from one user fills only their queue; other users'' requests are served from their own queues
    at the normal rate. The key insight: per-user queuing bounds the worst-case impact of any single user
    to their own queue, converting a systemic latency spike into a localized one.'
  common_mistake: Only considering the total throughput. A global queue might seem simpler and achieve
    the same theoretical maximum throughput. The mistake is ignoring the variance in wait time and the
    lack of fairness. A single user can easily saturate the system's capacity, leading to extreme tail
    latency for everyone else. Fairness is not just a 'nice-to-have'; it's a critical part of the SLO
    for a multi-tenant service.
  napkin_math: With arrival λ=20 req/s and service μ=100 req/s, utilization ρ=0.2. Queue wait time W =
    ρ / (μ - λ) = 0.2 / 80 = 2.5ms. But if a power user dumps 500 requests instantly, the queue surges.
    The first 100 take 1s, the last 100 take 5s. Normal requests arriving during this burst face up to
    5s of queue delay. Token-bucket rate-limiting is essential for fairness.
