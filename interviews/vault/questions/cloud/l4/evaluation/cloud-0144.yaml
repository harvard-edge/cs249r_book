id: cloud-0144
title: The ROI of Heterogeneity
topic: batching-strategies
status: published
provenance: imported
scenario: 'Your company runs many LLM services on H100s with a bimodal workload: 95% of requests are short
  (100 prompt/100 completion tokens), but 5% are long-context ''power user'' requests (4k prompt/4k completion).
  All services use static batching, causing inefficient partitioning of the expensive H100 fleet. A platform
  team proposes a 3-month project to build a central continuous batching service. Compare the performance
  of static vs. continuous batching for this specific workload. Calculate the potential throughput gain
  to build a business case for the project.'
details:
  realistic_solution: The business case is extremely strong. Static batching is pathologically bad for
    heterogeneous workloads. When a single long-context (8k total tokens) request enters a batch, all
    other short-context requests (200 tokens) in that batch are padded to the 8k length. This creates
    massive memory and compute waste. The KV cache allocation is based on the 8k length for all requests,
    meaning a batch with just one power user can fit almost no one else. In practice, this leads to de-facto
    batch size 1 for all power users, leaving the GPU idle most of the time.
  common_mistake: Averaging the workload. Engineers might calculate the average sequence length and assume
    the system behaves according to the average. This completely misses the point that in static batching,
    the *maximum* length in the batch dictates performance, and the tail wags the dog. The cost of heterogeneity
    is the core issue.
  napkin_math: In static batching, an 8k-token request paired with seven 100-token requests forces the
    whole batch to run for 8k steps. The 7 short requests pad 7900 tokens. 7 * 7900 = 55,300 wasted token
    generations. At an H100 TPOT of 10ms for this batch, the GPU spends 79 seconds computing padding.
    Continuous batching evicts finished requests, reclaiming 99% of wasted compute.
