id: cloud-1479
title: Diagnosing Label Shift in E-Commerce Content Moderation
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: An e-commerce platform's content moderation model (ResNet-50 on T4 GPUs) shows a sudden performance
  drop. The overall accuracy dropped from 95% to 82% over the weekend. The incidence of 'spam' listings
  surged from 5% to 40% of all uploads due to a botnet attack, but the visual characteristics of 'spam'
  versus 'legitimate' listings haven't changed. The model's P(Y|X) remains accurate, but the marginal
  P(Y) has shifted drastically.
details:
  realistic_solution: Use Black Box Shift Estimation (BBSE) or a similar technique to estimate the new
    label marginals P(Y) on the unlabelled test data, and reweight the model's predictions by the ratio
    of new to old marginals (P_new(Y)/P_old(Y)) without retraining.
  common_mistake: Assuming covariate shift and unnecessarily retraining the entire model with new data,
    wasting expensive T4 GPU hours.
  napkin_math: Original spam prior P_old(spam) = 0.05. New spam prior P_new(spam) = 0.40. Importance weight
    for spam = 0.40 / 0.05 = 8. Importance weight for legitimate = (1 - 0.40) / (1 - 0.05) = 0.60 / 0.95
    ≈ 0.63. Adjusting predictions using these weights corrects the calibration.
