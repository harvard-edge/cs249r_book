id: cloud-cell-13000
title: 'Pipeline Parallelism Bubble Overhead Comparison: GPipe vs PipeDream'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are comparing GPipe and PipeDream-Flush scheduling on a 4-stage H100 pipeline (80GB HBM3,
  3.35TB/s) with micro-batch size m=16. GPipe uses a synchronous flush after each mini-batch, while PipeDream-Flush
  uses 1F1B ordering. Calculate bubble overhead for each and recommend the approach for a 32B parameter
  model training run.
details:
  realistic_solution: GPipe bubble fraction = (4-1)/(16+4-1) = 3/19 ≈ 15.8%. PipeDream-Flush with 1F1B
    achieves same bubble fraction but with O(p) memory footprint instead of O(m) activations stored. For
    32B model across 4 H100s (each 80GB), PipeDream-Flush is preferred because storing 16 micro-batch
    activations in GPipe requires ~16x per-stage activation memory.
  common_mistake: Students often forget that GPipe bubble fraction is (p-1)/(m+p-1) where p=stages, m=micro-batches,
    and conflate stage count with device count.
  napkin_math: 'Bubble overhead GPipe: 3/19 = 15.8%. Activation memory per micro-batch for 32B model:
    ~2 bytes/param * 32B = 64GB just for params, activations add ~1.5x = 96GB total per stage. With m=16,
    GPipe stores all 16 forward passes = 16 * activation_size before backward, likely OOM on 80GB H100.
    PipeDream-Flush stores max p=4 in-flight micro-batches, feasible at ~24GB activation budget per stage.'
