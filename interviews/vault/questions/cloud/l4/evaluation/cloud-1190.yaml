id: cloud-1190
title: Diagnosing TorchElastic Spot Preemption Stalls
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 30B parameter LLM using 64 A100 (80GB) spot instances. You use PyTorch Elastic
  (Torchrun) to handle node preemptions. When a node is preempted, the cluster dynamically downscales,
  but you observe a massive 15-minute stall before training resumes, dropping your effective Goodput below
  70%. The model checkpoint size is roughly 120GB. Analyze the root cause of this massive stall.
details:
  realistic_solution: 'Identify the dual bottleneck: the default 10-minute Torchrun rendezvous timeout
    waiting for the expected number of nodes to rejoin, plus 5 minutes of synchronous checkpoint loading
    from slow object storage. Fix by reducing the `rdzv_timeout` to 60s and utilizing a high-throughput
    parallel file system to achieve multi-GB/s read speeds.'
  common_mistake: Assuming the stall is solely due to Kubernetes pod provisioning time or container image
    pulling, without analyzing the distributed rendezvous configuration and checkpoint loading bandwidth.
  napkin_math: 'Stall = Rendezvous Timeout + Checkpoint Load Time. Default timeout = 600s (10 mins). Checkpoint
    (120GB) loaded at 400MB/s from standard object storage = 300s (5 mins). Total stall = 900s (15 mins).
    Optimized: 60s timeout + (120GB / 2GB/s) = 120s (2 mins) stall, recovering Goodput.'
