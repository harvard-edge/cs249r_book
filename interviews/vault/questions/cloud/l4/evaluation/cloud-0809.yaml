id: cloud-0809
title: The Spot Instance Gamble
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your team trains a 7B parameter model that takes 72 hours on 8 A100 GPUs. On-demand pricing
  is $2.00/GPU-hour. Spot instances are $0.60/GPU-hour — a 70% discount. Your manager says 'use spot instances
  and save $806.' Midway through a 72-hour run, your spot instances get preempted. What is the true expected
  cost of spot training, and when does on-demand actually become cheaper?
details:
  realistic_solution: 'Spot instance economics depend on three factors: (1) **preemption probability**
    — A100 spot instances in popular regions have ~15-25% chance of preemption per hour, (2) **checkpoint
    overhead** — you must checkpoint frequently enough that preemption doesn''t lose too much work, but
    checkpointing itself costs time and storage, (3) **restart overhead** — after preemption, you wait
    for new instances (5-30 min), reload the checkpoint, and warm up the data pipeline. The expected cost
    model: if preemption probability per hour is p=0.20, expected number of preemptions in 72 hours ≈
    72 × 0.20 = 14.4 preemptions. Each preemption wastes the work since the last checkpoint plus restart
    time. With checkpoints every 30 minutes and 15-minute restart overhead, each preemption wastes ~45
    minutes of 8-GPU time. Expected wasted compute: 14.4 × 0.75 hrs × 8 GPUs = 86.4 GPU-hours. Total spot
    cost: (72 + 86.4 × 72/576) × 8 × $0.60 + storage = ~$403. On-demand: 72 × 8 × $2.00 = $1,152. Spot
    still wins here, but the breakeven is when preemption rate exceeds ~40%/hr or checkpoint frequency
    is too low.'
  common_mistake: '"Spot is always cheaper because the hourly rate is 70% less." This ignores the cost
    of preemption: lost compute, checkpoint overhead, and extended wall-clock time.'
  napkin_math: 'On-demand: 72 hrs × 8 GPUs × $2.00 = $1,152. Spot (optimistic, 10% preemption/hr): ~5
    preemptions × 45 min wasted = 3.75 hrs extra → 75.75 hrs × 8 × $0.60 = $364. Spot (pessimistic, 30%
    preemption/hr): ~22 preemptions × 45 min = 16.5 hrs extra → 88.5 hrs × 8 × $0.60 = $425, plus checkpoint
    storage: 22 checkpoints × 14 GB × $0.023/GB = $7. Breakeven: spot becomes more expensive than on-demand
    when effective hours exceed 1,152 / (8 × $0.60) = 240 hours — meaning preemptions add >168 hours of
    overhead (unlikely but possible with very high preemption rates and no checkpointing).'
