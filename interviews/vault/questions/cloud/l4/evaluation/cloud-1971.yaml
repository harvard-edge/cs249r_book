schema_version: 1
id: cloud-1971
title: Diagnosing Cross-Silo Straggler Bottlenecks
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your cross-silo federated learning pipeline coordinates 2,000 T4 GPUs across 15 global cloud
  regions. Using synchronous FedAvg, the median local update takes 250ms, but the global aggregation step
  consistently blocks for over 6 seconds. Logs show that 2-3% of nodes experience transient network partitions
  or instance migrations. How do you mitigate this straggler effect while preserving the statistical contribution
  of nodes in high-latency regions?
details:
  realistic_solution: Implement Buffered Asynchronous Aggregation (FedBuff). The cloud aggregator updates
    the global model whenever a concurrency buffer of K updates fills, allowing slow clients to contribute
    stale updates that are incorporated with staleness-aware learning rate dampening.
  common_mistake: Switching to fully asynchronous SGD (which destabilizes convergence due to extreme gradient
    staleness) or aggressively dropping slow clients (which introduces geographic bias).
  napkin_math: Synchronous step time = max(t_1...t_N) = 6000ms. With a concurrency buffer of K=50 out
    of N nodes, the effective step time becomes the 50th fastest response (~300ms). Training 10,000 rounds
    drops from 16.6 hours to 50 minutes (a 20x speedup) while safely handling up to 100+ epochs of staleness.
