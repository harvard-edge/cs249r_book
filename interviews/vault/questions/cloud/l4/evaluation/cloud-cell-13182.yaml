id: cloud-cell-13182
title: 'Transformer Cost Evaluation: Scaling Law Cost Prediction'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Use Chinchilla scaling laws to evaluate whether training a 70B model on 1.4T tokens (Chinchilla-optimal)
  or a 7B model on 1T tokens is more cost-efficient for achieving the same loss target. H100 at $2.50/hr,
  40% MFU. Compare compute budget required and cost for each, given Chinchilla''s optimal: C = 6*N*D FLOPs.'
details:
  realistic_solution: 'Chinchilla optimal D for 70B: 20*70B=1.4T tokens ✓ (matches). For 7B: optimal D=20*7B=140B
    tokens. Training on 1T tokens is 7.1x over-training by Chinchilla. Compute: 70B@1.4T: C=6*70B*1.4T=588
    ZFLOPs. 7B@1T: C=6*7B*1T=42 ZFLOPs. 70B is 14x more compute. Time on 1000 H100 at 40% MFU: 70B: 588e21/(1000*1979e12*0.4)=742,800s=8.59
    days. Cost: 1000*$2.50*206=$515K. 7B: 42e21/same=53,028s=0.614 days. Cost: 1000*$2.50*14.7=$36,750.
    70B costs 14x more ($515K vs $37K) but achieves lower loss. For same target loss as 70B@1.4T: use
    7B@140B (Chinchilla optimal): cost=1000*$2.50*(6*7B*140B)/(1000*1979e12*0.4*3600)=$36K*0.1=$3.7K.
    7B Chinchilla-optimal is 139x cheaper than 70B for same loss (if that''s achievable — depends on loss
    target).'
  common_mistake: Applying the Chinchilla C=6ND formula without checking whether the stated token counts
    are Chinchilla-optimal (optimal D = 20*N tokens), and comparing models at different loss values rather
    than the same target.
  napkin_math: '70B@1.4T: 6*70B*1.4T=5.88e23 FLOPs. Time 1000 H100s (792T eff): 5.88e23/7.92e17=742,424s=8.59
    days. Cost: 1000*$2.50*206hr=$515K. 7B@140B (Chinchilla): 6*7B*140B=5.88e21 FLOPs. Time: 5.88e21/7.92e17=7424s=2.06hr.
    Cost: 1000*$2.50*2.06=$5,150. Same compute budget! 70B uses 100x more compute: not comparable at same
    loss. At same loss: 7B requires less tokens than 70B for equivalent perplexity (smaller model, higher
    irreducible loss). Cannot compare at same loss — 70B has fundamentally lower irreducible loss.'
