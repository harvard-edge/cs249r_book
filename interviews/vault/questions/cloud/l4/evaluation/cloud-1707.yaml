id: cloud-1707
title: Debugging INT8 PTQ Degradation in 70B LLMs
topic: extreme-quantization
status: published
provenance: imported
scenario: Your team is deploying a 70B parameter LLM on a single A100 80GB GPU to halve serving costs.
  You apply W8A8 (8-bit weight, 8-bit activation) Post-Training Quantization (PTQ) using symmetric MinMax
  calibration on 512 Wikipedia sequences. The model footprint successfully drops from 140GB (FP16) to
  72GB, fitting on one GPU. However, validation perplexity degrades disastrously from 5.4 to 28.7, and
  generation yields garbled, repetitive text. Diagnose the root cause of this precision collapse and propose
  a targeted fix.
details:
  realistic_solution: Diagnose massive, systematic activation outliers in specific channel dimensions
    (a known phenomenon in LLMs >6B params). MinMax clipping destroys the precision of the non-outlier
    majority. The fix is to use SmoothQuant (migrating activation variance to weights mathematically before
    quantization) or switch to W8A16 weight-only quantization (e.g., AWQ/GPTQ), since the workload is
    memory-bandwidth bound anyway.
  common_mistake: Blaming the calibration dataset size or domain mismatch, and incorrectly recommending
    computationally expensive Quantization-Aware Training (QAT) without investigating the actual activation
    distributions.
  napkin_math: In an activation tensor, if the max outlier is 120.0 and the mean is 0.5, symmetric INT8
    ([-127, 127]) sets the scale to 120 / 127 ≈ 0.94. A typical non-outlier value of 0.5 is quantized
    to round(0.5 / 0.94) = 1. Values below 0.47 become 0. This destroys >90% of the representational precision,
    causing the perplexity spike.
