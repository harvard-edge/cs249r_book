schema_version: 1
id: cloud-2139
title: The Feature Version Mismatch
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your feature engineering team deploys a new version of the 'user_engagement_score' feature that
  changes the normalization from min-max to z-score. The model serving system immediately starts using
  the new feature values, but the model was trained on min-max normalized values. The ranking model's
  click-through rate drops 15% before anyone notices. Design a feature versioning system that prevents
  this class of failures.
details:
  realistic_solution: 'Implement a **feature contract system**: (1) **Versioned feature schemas**: every
    feature has a version tag (e.g., `user_engagement_score_v2`). The feature store serves both v1 and
    v2 simultaneously. (2) **Model-feature binding**: each model artifact declares the exact feature versions
    it was trained on (e.g., `requires: user_engagement_score_v1`). The serving system resolves feature
    lookups based on the model''s declared dependencies. (3) **Compatibility checks**: before a new feature
    version is promoted to default, a CI job validates that no active model depends on the old version
    without a retrained replacement. (4) **Gradual rollout**: new feature versions are rolled out to shadow
    traffic first, with automated comparison of model output distributions. (5) **Rollback capability**:
    the feature store maintains at least 2 versions of every feature, enabling instant rollback.'
  common_mistake: Relying on manual coordination ('just tell the model team when features change'). At
    scale with hundreds of features and dozens of models, manual coordination always fails.
  napkin_math: With 300 features and 20 models, a single uncoordinated feature change can break multiple
    models simultaneously. If feature changes happen 5×/week and each has a 10% chance of causing a model-feature
    mismatch, the expected time to incident is 2 weeks. With versioned contracts, mismatches are caught
    at deploy time (MTTD = 0).
