title: 'The Pipeline Bubble: 3D Parallelism'
topic: 3d-parallelism
status: draft
provenance: imported
scenario: We implemented Pipeline Parallelism across 8 GPUs. However, our profiler shows the GPUs are
  only active 50% of the time, sitting idle while waiting for the previous GPU to finish its layer. How
  do we increase utilization without changing the hardware?
details:
  realistic_solution: You need to implement microbatching. By splitting the global batch into smaller
    microbatches, GPU 1 can process microbatch 2 while GPU 2 processes microbatch 1. This overlaps computation
    and reduces the "Pipeline Bubble" fraction.
  common_mistake: '"We should switch to Data Parallelism." DP won''t work if the model doesn''t fit on
    one GPU — that''s why you used PP in the first place.'
  napkin_math: 'Bubble fraction = $(P-1)/(M+P-1)$ where $P$ = pipeline stages, $M$ = microbatches. With
    $P=8$ and $M=1$: bubble = 87.5%. With $M=32$: bubble = 17.9%. With $M=64$: bubble = 9.8%. You need
    $M \gg P$ to keep GPUs busy.'
