id: cloud-1606
title: Diagnosing PII Leakage in Fine-Tuned LLMs
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team deployed a 70B parameter LLM fine-tuned on 500GB of proprietary customer support logs
  using a cluster of 64 H100 GPUs. During beta testing, a targeted prompt successfully extracted verbatim
  PII (names and SSNs). The training pipeline included aggressive exact-string deduplication and 3 epochs
  of training. As the ML systems lead, you need to analyze the data pipeline and training setup to determine
  why the exact-string deduplication failed to prevent this memorization.
details:
  realistic_solution: Implement fuzzy deduplication (e.g., MinHash LSH) to strip near-duplicates, strictly
    limit training on sensitive data to 1 epoch, and evaluate memorization risk using Membership Inference
    Attacks (MIA) pre-deployment.
  common_mistake: Assuming exact deduplication prevents all repetition. Candidates miss that templated
    logs create near-duplicates, which bypass exact deduplication and drastically increase PII exposure
    across epochs.
  napkin_math: 70B params = 140GB capacity. Training data = 500GB. If a PII string is in a template repeated
    50 times across near-duplicate logs, 3 epochs = 150 exposures. Memorization of specific sequences
    typically occurs reliably after 10-100 exposures.
