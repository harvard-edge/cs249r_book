id: cloud-1029
title: Diagnosing Pipeline Calibration Failures
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You own a 3-stage cloud ads pipeline serving 50k QPS: Candidate Retrieval (ANN) -> CTR Prediction
  (DLRM on 8x A100s) -> Bid Pricing (XGBoost). After updating the Retrieval model to increase recall from
  200 to 500 items, the DLRM''s logloss degraded due to the new candidate distribution. To fix the alerts,
  a data scientist deployed a Platt scaling layer to the DLRM outputs to correct the calibration. Within
  24 hours, overall ad revenue drops by 15%, despite the CTR metrics dashboard showing ''normal'' calibrated
  values. Diagnose the root cause of this failure.'
details:
  realistic_solution: 'Identify the correction cascade: the Platt scaling patched the CTR mean but squashed
    the variance of the pCTR distribution. The downstream Bid Model relies on the full logit distribution
    (including tail behavior) to price items. When the variance is compressed, the pricing model systematically
    underbids on high-value tail items, directly driving the 15% revenue drop. The correct fix is to rollback
    the Platt scaling patch and co-train both the DLRM and Bid Model on the updated retrieval distribution.'
  common_mistake: Candidates often suspect hardware bottlenecks (e.g., A100 OOMs from the 500 items causing
    timeouts) or concept drift, completely missing the statistical distribution mismatch introduced by
    the post-hoc calibration layer.
  napkin_math: 'If old DLRM pCTR avg was 0.05 and the new uncalibrated pCTR is 0.03, the scaling layer
    shifts it back to ~0.05. However, Bid Model expects original logit distributions: Bid = pCTR * Conversion_Rate.
    If the variance was squashed by the scaling layer (e.g., stddev dropping from 0.02 to 0.005), the
    pricing model will systematically underbid on high-value tail items, directly driving the 15% revenue
    drop.'
