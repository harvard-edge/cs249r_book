id: cloud-0138
title: The Shadow GPU Budget
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'We want to shadow-test a new 70B LLM before replacing our production 13B model. The plan: mirror
  all production traffic to the new model, compare outputs, then swap. The infrastructure team comes back
  and says the shadow deployment will cost more than the production deployment itself. Why is shadow-testing
  an LLM so much more expensive than shadow-testing a traditional ML model, and how do you make it feasible?'
details:
  realistic_solution: 'Shadow-testing a 70B LLM is expensive because you must run full autoregressive
    decoding for every request — not just a single forward pass. A classification model shadow costs one
    forward pass (~10ms, ~0.1 GPU-second). An LLM shadow costs prefill + N decode steps (~2-5 seconds
    of GPU time per request). At 1,000 QPS production traffic, the shadow needs 2,000-5,000 GPU-seconds
    per second of wall time — more GPUs than production itself. The fix: sample shadow traffic (10-20%
    of requests), use speculative decoding with the production 13B as the draft model, or run shadow only
    on prefill (compare logits at the first token without full generation).'
  common_mistake: '"Shadow deployment is free — we''re just logging predictions." This is true for a 100ms
    classification model. It''s catastrophically wrong for autoregressive LLMs.'
  napkin_math: 13B FP16 = 26GB, fits easily in one A100 80GB (2.0TB/s) with room for KV cache, batching
    ~64 requests. 70B FP16 = 140GB, requiring 2x A100s just for weights, leaving only 20GB for KV cache
    (batch size ~8). 70B uses 2x GPUs but gets 1/8th the throughput per GPU pair. Cost scales by 2 * 8
    = 16x. A prefill-only shadow test skips the KV cache memory wall entirely.
