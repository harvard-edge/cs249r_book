id: cloud-2328
title: Activation-Aware Weight Quantization (AWQ)
topic: extreme-quantization
status: published
provenance: imported
scenario: Deploying a 70B model on 2x 24GB GPUs requires W4A16 (INT4 weight, FP16 activation) quantization.
  Standard Round-to-Nearest (RTN) INT4 degrades zero-shot accuracy by 15%. However, applying AWQ restores
  accuracy to within 1% of the FP16 baseline without changing the inference kernel or the 4-bit data type.
details:
  realistic_solution: Standard RTN quantization treats all weights equally, but only ~1% of weights are
    'salient'—meaning they correspond to activation channels that have massive outlier magnitudes. Quantization
    errors on these specific weights are amplified by the massive activations, destroying the output.
    AWQ identifies these salient weight channels by profiling the activations. Before quantizing, it scales
    up the salient weights by a factor S, and scales down the corresponding incoming activations by 1/S
    (preserving mathematical equivalence). Because the salient weights are now larger relative to the
    quantization bins, the relative quantization error is drastically reduced. The weights are then statically
    quantized to INT4.
  common_mistake: Assuming AWQ dynamically casts the 4-bit weights back to 16-bit during inference based
    on activation sparsity.
  napkin_math: Let a salient weight w = 0.1, quantization step size delta = 0.05. Quantized w = round(0.1/0.05)*0.05
    = 0.1 (Error 0%). If w = 0.02, quantized w = 0 (100% error). Scale w by 4 -> 0.08. Quantized = round(0.08/0.05)*0.05
    = 0.1. Effective w after descaling = 0.1 / 4 = 0.025. Error reduced from 100% to 25%.
