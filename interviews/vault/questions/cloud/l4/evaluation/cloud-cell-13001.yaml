id: cloud-cell-13001
title: 'Pipeline Parallelism Bubble Overhead Comparison: Stage Count Tradeoff'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: A team is debating 4-stage vs 8-stage pipeline parallelism on H100s (80GB HBM3, 3.35TB/s) for
  a 70B LLaMA-style model. Micro-batch count is fixed at m=32. Compare bubble overhead, per-stage memory,
  and inter-stage communication costs. Which configuration is better for throughput?
details:
  realistic_solution: '4-stage: bubble = (4-1)/(32+4-1) = 3/35 = 8.6%. 8-stage: bubble = (8-1)/(32+8-1)
    = 7/39 = 17.9%. The 8-stage configuration has MORE bubble overhead for the same micro-batch count.
    Additionally, each inter-stage boundary sends activations: 70B model, hidden dim ~8192, sequence 2048,
    each activation tensor = 2*8192*2048 = 33.5MB. 8 boundaries vs 4 doubles communication. Prefer 4-stage.'
  common_mistake: Assuming more stages always means more parallelism and better throughput, ignoring that
    bubble fraction only decreases marginally while communication overhead and load imbalance grow.
  napkin_math: 'Bubble fractions: 4-stage=8.6%, 8-stage=17.9%. Per-stage memory: 70B params at BF16 =
    140GB total, 4-stage = 35GB/stage (fits H100 80GB), 8-stage = 17.5GB/stage (also fits, but bubble
    overhead is worse). Activation communication per boundary: 8192 * 2048 * 2 bytes = 33.5MB per micro-batch.
    At 32 micro-batches: 32 * 33.5MB = 1.07GB crossed per boundary per step.'
