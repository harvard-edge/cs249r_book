schema_version: 1
id: cloud-0875
title: Diagnosing Systematic Probing for LLM Extraction
topic: federated-learning
status: published
provenance: imported
scenario: Your ML security team flags a suspicious user on your proprietary 70B text-to-SQL model API.
  The user is sending 100 queries per minute, 24/7. Their prompts are highly diverse, syntactically correct,
  but semantically unusual (e.g., querying nonexistent schemas). The API currently returns full token
  logprobs. Analyze if this is a viable model extraction attack and determine the scale of the information
  leakage.
details:
  realistic_solution: The attacker is capturing dense probability distributions to distill a smaller surrogate
    model. By restricting the API to only return the top-5 logprobs or adding calibrated noise, you exponentially
    reduce the knowledge transfer bandwidth while maintaining utility for legitimate users.
  common_mistake: Assuming rate limiting is sufficient, or underestimating the value of full logprobs
    for distillation compared to hard token outputs.
  napkin_math: 'An attacker sending 100 queries/min generates 144,000 prompts/day. If each yields 100
    tokens, that''s 14.4M tokens. If your API returns full logprobs for a 32,000 vocab in FP16 (2 bytes/logit),
    the attacker extracts: 14.4M * 32,000 * 2B = 921 GB/day of dense probability distributions. This massive
    data exfiltration enables cheap surrogate model distillation, stealing your IP.'
