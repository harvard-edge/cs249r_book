schema_version: 1
id: cloud-1965
title: Diagnosing Context Amnesia in Canary Rollouts
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is rolling out a new conversational LLM (70B parameters) across 3 regions using a
  10% canary deployment. Shortly after starting the rollout, users report 'context amnesia' where the
  model suddenly misinterprets multi-turn conversations midway through a session. The telemetry shows
  a spike in tokenization errors caused by prompt template mismatches between the v1 and v2 models. You
  verify that the client sends the full conversation history with every request. Analyze the root cause
  of this failure and propose a networking-level fix.
details:
  realistic_solution: The ingress load balancer is likely using random or round-robin routing. Implement
    sticky routing (session affinity) using consistent hashing on the `session_id` or `user_id` at the
    API Gateway to guarantee that all requests within a conversation are routed to the exact same model
    version.
  common_mistake: Candidates often blame eventual consistency in backend databases or try to synchronize
    session state across regions, ignoring that the client sends full context and the root cause is a
    model version mismatch during routing.
  napkin_math: With a 10% canary and random routing, the probability of a 5-turn conversation staying
    on the same model version is (0.9^5) + (0.1^5) = 0.59049 + 0.00001 = ~59%. Thus, ~41% of multi-turn
    sessions will experience a version mismatch and fail.
