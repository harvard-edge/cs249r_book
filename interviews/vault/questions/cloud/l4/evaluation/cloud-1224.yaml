schema_version: 1
id: cloud-1224
title: Diagnosing High Correctable ECC Error Rates
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: During a 1,024-GPU H100 distributed training run, you notice a 20% step time degradation on
  a subset of nodes. GPU compute utilization appears normal, but kernel launch latencies are unusually
  high. System logs reveal these specific GPUs are experiencing around 10,000 Single-Bit ECC errors (correctable
  errors) per second in their HBM3 memory.
details:
  realistic_solution: Recognize that high volumes of correctable errors trigger OS-level interrupts and
    driver logging storms. The degraded GPUs must be drained and replaced, or dynamic page retirement
    must be configured to offline the failing memory pages.
  common_mistake: Assuming that because the errors are 'correctable' by hardware ECC, they are benign
    and cannot impact performance, leading candidates to misdiagnose the throughput drop as a network
    straggler issue.
  napkin_math: 10,000 correctable errors/sec * 20µs (OS interrupt and logging overhead per error) = 200ms
    of CPU driver stall time per second. This 20% overhead delays CUDA kernel launches, starving the GPU
    and slowing down the synchronous step for the entire cluster.
