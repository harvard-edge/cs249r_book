id: cloud-2174
title: The GPU Memory Hierarchy Bandwidth Stack
topic: roofline-analysis
status: published
provenance: imported
scenario: 'A performance engineer is optimizing a custom CUDA kernel on an H100 SXM. They need to decide
  where to stage intermediate data. The H100 has: registers (~20 TB/s effective per SM), shared memory/L1
  (~19 TB/s aggregate), L2 cache (12 TB/s), and HBM3 (3.35 TB/s). Their kernel processes data that is
  too large for registers but fits in shared memory. They propose skipping shared memory and using L2
  directly since ''L2 is still very fast at 12 TB/s.'' Analyze whether this is a sound decision for a
  memory-bound kernel running across all 132 SMs.'
details:
  realistic_solution: The decision is unsound for a memory-bound kernel when the relevant comparison is
    L2 vs HBM, not shared memory vs L2. The critical insight is that shared memory bandwidth (144 GB/s
    per SM) is only ~1.6x faster than per-SM L2 bandwidth (91 GB/s). The truly decisive gap is between
    L2 and HBM (3.35 TB/s aggregate / 132 SMs ≈ 25 GB/s per SM) — a 3.6x difference. For data with cross-SM
    reuse (like broadcast weights), the L2 is appropriate. For per-SM working sets, shared memory provides
    modest but meaningful bandwidth benefits. The primary optimization target is reducing HBM traffic,
    not necessarily L2 traffic.
  common_mistake: Treating L2 bandwidth as per-SM bandwidth. The 12 TB/s L2 bandwidth is shared across
    all 132 SMs, while the 19 TB/s shared memory bandwidth is per-SM and thus scales with SM count.
  napkin_math: 'Shared memory per SM: 19 TB/s aggregate / 132 SMs ≈ 144 GB/s per SM. L2 per SM: 12 TB/s
    / 132 SMs = 91 GB/s. Ratio: 144 / 91 = 1.58x. For a kernel processing 100 KB per SM: from shared memory
    takes 100 KB / 144 GB/s = 0.69 microseconds. From L2 takes 100 KB / 91 GB/s = 1.1 microseconds. The
    ~1.6x bandwidth difference means a kernel should prefer shared memory for hot per-SM working sets,
    though the gap is modest compared to the L2-vs-HBM difference (91 GB/s vs 3.35 TB/s per SM = 37x).'
