schema_version: 1
id: cloud-2327
title: Large Vocabulary Cross-Entropy Overflow
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are pre-training a multilingual LLM with a massive vocabulary size of 256,000 tokens and
  a global batch size of 4096. To optimize memory, you configure the final language modeling head and
  the cross-entropy loss calculation to run entirely in FP16. Training collapses to NaN loss within the
  first 10 steps.
details:
  realistic_solution: The collapse is due to numeric overflow in the denominator of the Softmax function
    within the Cross-Entropy loss. With a vocabulary of 256,000, you are summing 256,000 exponential terms.
    Even if the pre-softmax logits are perfectly centered and average to 0 (where exp(0) = 1), the sum
    of 256,000 ones is 256,000. This massively exceeds the FP16 maximum of 65504, causing the denominator
    to evaluate to Infinity, and the loss to evaluate to NaN. The architecture must enforce that the final
    logits are upcast to FP32, and the cross-entropy loss/softmax is computed purely in FP32.
  common_mistake: Believing that the final linear layer weights are diverging, requiring gradient clipping
    to stabilize the outputs.
  napkin_math: Sum(exp(logits)) for 256k tokens. If average exp(logit) = 0.5, Sum = 128,000. 128,000 >
    65504 -> Inf in FP16. Log(Softmax) becomes Log(exp(x) / Inf) = Log(0) = -Inf. Loss = NaN.
