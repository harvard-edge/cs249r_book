id: cloud-1125
title: Debugging Accuracy Degradation under Demographic Parity Constraints
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud-based resume screening API processes 100,000 applications per month (80,000 from Group
  A, 20,000 from Group B). An audit shows the positive prediction rate (PPR) is 25% for Group A and 10%
  for Group B. To comply with legal requirements, the system must achieve Demographic Parity (equal PPR
  of 20% for both groups). A junior engineer attempts to achieve this via post-hoc threshold adjustment
  (lowering Group B's threshold, raising Group A's), but observes a catastrophic 15% drop in overall precision.
  Analyze the root cause of this precision collapse and propose a structural ML system intervention to
  enforce parity while maintaining accuracy.
details:
  realistic_solution: Implement adversarial debiasing during training. By adding an adversarial head that
    tries to predict the sensitive attribute from the latent embeddings and reversing its gradients, the
    main model learns representations that are invariant to demographic groups, aligning the score distributions
    naturally before thresholding.
  common_mistake: Relying solely on post-processing threshold adjustments without acknowledging that if
    the underlying base rates differ, forcing parity mathematically guarantees an influx of False Positives
    for the minority group and False Negatives for the majority group.
  napkin_math: 'Current advances: Group A = 0.25 * 80k = 20k; Group B = 0.10 * 20k = 2k. Target parity
    (20% PPR): Group A = 16k (-4k from current), Group B = 4k (+2k from current). If Group B''s true qualification
    base rate is only 10%, forcing 4k advances via thresholding injects at least 2,000 False Positives,
    directly tanking system precision.'
