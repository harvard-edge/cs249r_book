id: cloud-1696
title: Diagnosing High Pipeline Bubble Overhead
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are training a 65B parameter language model across 64 A100 (80GB) GPUs using 8-way Pipeline
  Parallelism (PP=8) and 8-way Tensor Parallelism (TP=8). Your global batch size is fixed at 1024 sequences
  to maintain convergence stability. Currently, you are splitting the global batch into 8 microbatches
  (microbatch size = 128). Profiling reveals poor GPU utilization (~53%), heavily dominated by pipeline
  bubbles (idle time at the start and end of batches). How do you analyze and resolve this bottleneck
  to achieve >85% compute utilization without changing the global batch size or adding hardware?
details:
  realistic_solution: Decrease the microbatch size to significantly increase the number of microbatches
    ($m$) per pipeline flush. By reducing the microbatch size from 128 to 16, the number of microbatches
    increases from 8 to 64, shrinking the bubble fraction dramatically while preserving the global batch
    size.
  common_mistake: Candidates often suggest increasing the global batch size (which alters convergence),
    switching to complex interleaved scheduling without fixing the fundamental math, or trying to overlap
    communication and computation which doesn't solve pipeline structural idle time.
  napkin_math: 'Pipeline Bubble Fraction = (p - 1) / (m + p - 1). Current: p=8, m=8 -> 7 / 15 ≈ 46.6%
    idle time (53.4% utilization). Fix: decrease microbatch to 16 -> m=64 -> 7 / (64 + 7) = 7 / 71 ≈ 9.8%
    idle time (90.2% utilization).'
