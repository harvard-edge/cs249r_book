schema_version: 1
id: cloud-1456
title: Root-Causing Memory-Bound Activations
topic: kernel-fusion
status: published
provenance: imported
scenario: While profiling a PyTorch recommendation model on an NVIDIA A100 (2 TB/s HBM bandwidth), you
  find that a custom element-wise activation block `y = x * torch.tanh(a * x + b)` (where 'a' and 'b'
  are learned scalars) operating on a 250MB activation tensor takes roughly 1.1 milliseconds. Nsight Systems
  reveals 5% SM utilization but 95% HBM bandwidth utilization. How do you analyze this bottleneck, and
  what is the structural cause within the framework?
details:
  realistic_solution: Diagnose this as a lack of kernel fusion. Eager-mode PyTorch executes this as four
    distinct operations sequentially. Analyze the profiler trace to see four separate kernels, each reading
    and writing intermediate tensors to HBM. Resolve this by using `torch.compile()` or writing a custom
    Triton kernel to fuse all element-wise operations into a single pass, eliminating intermediate memory
    materialization.
  common_mistake: Assuming the bottleneck is compute-related and trying to optimize the floating-point
    math, or failing to account for the implicit intermediate tensor allocations caused by eager-mode
    framework execution.
  napkin_math: 'Unfused traffic: `a*x` (1R, 1W), `+b` (1R, 1W), `tanh` (1R, 1W), `x*` (2R, 1W). Total
    = 5 Reads (1.25GB) + 4 Writes (1.0GB) = 2.25GB. At 2 TB/s, ideal time = 2.25GB / 2TB/s = 1.125 ms.
    Fused traffic: 1 Read (x), 1 Write (y) = 0.5GB total. Ideal time = 0.5GB / 2TB/s = 250 µs. Fusing
    eliminates 1.75GB of unnecessary HBM traffic, yielding a 4.5x theoretical speedup.'
