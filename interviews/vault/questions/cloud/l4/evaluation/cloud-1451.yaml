title: Diagnosing Infinite Drift Alerts in KL Divergence
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'You are managing an anomaly detection model serving 5,000 requests per second on AWS Inferentia.
  The pipeline runs an hourly data drift check comparing the live feature distributions (Q) against the
  training baseline (P) using Kullback-Leibler (KL) divergence. Recently, the operations team reported
  severe alert fatigue: the KL divergence metric frequently spikes to near infinity during certain hours,
  triggering PagerDuty incidents, even though the overall model accuracy remains stable at 94%. Upon investigation,
  you find that the live data occasionally contains rare categorical feature values not present in the
  training set. How do you analyze this failure mode and architect a more robust drift detection thresholding
  mechanism?'
details:
  realistic_solution: Diagnose that KL divergence is asymmetric and unbounded, spiking to infinity when
    P(x) is zero for a rare event in the baseline. Replace KL divergence with Jensen-Shannon (JS) divergence,
    which calculates the symmetric KL divergence to a mixture distribution M = 0.5 * (P + Q). JS is bounded
    between 0 and 1, providing stable, normalized thresholds for alarming.
  common_mistake: Candidates often suggest applying arbitrary clipping to the KL divergence scores or
    manually filtering out out-of-vocabulary categories, which masks genuine drift and requires constant
    manual threshold tuning.
  napkin_math: 'If Q has a rare event where P(x) = 0 and Q(x) = 0.01: KL(Q||P) contains the term Q(x)
    * log(Q(x)/P(x)) = 0.01 * log(0.01/0) -> ∞. For JS divergence: M(x) = 0.5 * (0 + 0.01) = 0.005. The
    bounded term in KL(Q||M) becomes Q(x) * log(Q(x)/M(x)) = 0.01 * log(0.01/0.005) = 0.01 * log(2) =
    0.01. Overall JS divergence is strictly bounded to max 1 bit.'
