schema_version: 1
id: cloud-1038
title: Diagnosing Covariate Shift in Fraud Detection
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud-hosted XGBoost fraud detection model processing 2,500 TPS on an AWS m5.4xlarge instance
  experiences a sudden precision drop from 94% to 81% following a marketing campaign that attracted a
  new demographic. The ops team assumes the fundamental patterns of fraud have changed (concept drift)
  and plans to delay action for 4 weeks to collect 500,000 new labeled examples for a complete architectural
  rewrite. However, you notice the relationship P(fraud|features) is unchanged, but feature distributions
  like 'transaction_amount' have shifted drastically.
details:
  realistic_solution: Diagnose covariate shift by calculating Population Stability Index (PSI) on unlabelled
    data. If PSI > 0.25, use density ratio estimation (w(x) = P_target(x) / P_source(x)) to reweight the
    existing historical source data during retraining, requiring only a minimal validation set of new
    labels.
  common_mistake: Misdiagnosing the issue as concept drift and waiting weeks for a massive labeled dataset,
    completely discarding the valuable historical data and wasting compute on an architectural rewrite.
  napkin_math: For a feature bin shifting from 50% (Expected) to 10% (Actual), the PSI contribution is
    (0.1 - 0.5) * ln(0.1 / 0.5) = (-0.4) * (-1.61) = 0.644. Since 0.644 > 0.25 threshold, critical covariate
    shift is confirmed mathematically using only unlabelled data.
