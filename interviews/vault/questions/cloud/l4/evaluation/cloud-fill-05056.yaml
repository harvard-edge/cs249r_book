schema_version: 1
id: cloud-fill-05056
title: 'AllReduce Topology Comparison: Ring vs Tree on H100 IB Cluster'
topic: collective-communication
status: published
provenance: imported
scenario: A 64-GPU H100 cluster uses InfiniBand HDR100 (100 Gbps = 12.5 GB/s per link). Gradient all-reduce
  with 26GB (13B model, FP16) per step. Compare ring all-reduce, recursive halving-doubling (Rabenseifner),
  and a binary tree reduction. Which minimizes wall-clock time?
details:
  realistic_solution: 'Ring all-reduce: time = 2×(N-1)/N × M/B = 2×63/64 × 26GB/12.5GB/s = 2×0.984×2.08s
    = 4.09s. Recursive halving-doubling: for large bandwidth-bound messages, transfers the same total
    data as ring: 2×(N-1)/N×M = 51.4GB per GPU, at 12.5GB/s ≈ 4.1s. RHD''s formula 2×log2(N)×M/(N×B) gives
    the per-step bandwidth allocation, not the total time for large messages. Binary tree: log2(64)=6
    steps, bottleneck at root = M/B = 26/12.5 = 2.08s per step but only reduces 1 link. Tree time: 6×2.08/2
    = ~6.24s worst case. Ring and RHD tie at ~4.09s for this 26GB bandwidth-bound case; tree is slowest
    at ~6.24s. For large messages (>1GB), ring and RHD achieve similar bandwidth-bound performance; RHD
    has lower overhead for small messages due to fewer steps.'
  common_mistake: Ignoring latency (α) in the α-β model for small messages; for large messages like 26GB
    gradients, bandwidth (β) dominates and latency becomes negligible.
  napkin_math: 'Ring: 2×(63/64)×26/12.5 = 4.09s. Halving-doubling: for large bandwidth-bound messages,
    bandwidth-optimal AllReduce algorithms (including ring and RHD) achieve the same asymptotic bandwidth:
    2×(N-1)/N×M/B ≈ 4.09s. RHD reduces latency-bound overhead (fewer steps: 2×log2(N)), but for 26GB both
    are bandwidth-bound ≈ 4.09s. Tree: bottlenecked at root, ~6.24s. Ring and RHD tie for bandwidth-limited
    26GB sync.'
