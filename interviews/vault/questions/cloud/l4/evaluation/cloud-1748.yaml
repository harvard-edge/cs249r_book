id: cloud-1748
title: Process Group Misalignment in 3D Parallelism
topic: data-parallelism
status: published
provenance: imported
scenario: You are debugging a 175B parameter model training job on a 1024-GPU A100 cluster (128 nodes,
  8 GPUs/node) using 3D parallelism (TP=8, PP=16, DP=8). You observe massive latency spikes in the attention
  projection AllReduce operations, degrading throughput by 60%. Network profiling shows that these TP
  AllReduce operations, which should exclusively use the 600 GB/s NVLink intra-node bandwidth, are inexplicably
  generating heavy traffic on the 400 Gbps InfiniBand inter-node network. Root-cause the bottleneck.
details:
  realistic_solution: Diagnose that the AllReduce call is missing the `group` argument and defaulting
    to the global process group (all 1024 GPUs). Fix it by explicitly passing the initialized Tensor Parallel
    process group (e.g., `group=tp_group`) to restrict NCCL communication to the 8 GPUs on the local node.
  common_mistake: Assuming `torch.distributed.all_reduce` automatically infers and routes traffic based
    on the tensor's parallelism dimension without needing an explicitly defined localized process group.
  napkin_math: NVLink intra-node bandwidth = 600 GB/s. InfiniBand inter-node bandwidth = 50 GB/s (400
    Gbps). A 500MB AllReduce on NVLink takes ~1.7ms. Attempting to synchronize this globally over the
    50 GB/s NIC takes >20ms, introducing a 12x latency penalty per attention block and stalling the pipeline.
