id: cloud-2172
title: The Kernel Launch Overhead Wall
topic: roofline-analysis
status: published
provenance: imported
scenario: You are profiling a transformer inference pipeline and notice that the GPU is idle 60% of the
  time despite running a compute-heavy model. The Nsight Systems trace shows hundreds of tiny kernels
  (LayerNorm, GELU, bias-add, residual connections) each taking 5-20 microseconds of GPU time, but separated
  by 10-15 microsecond gaps. The total kernel launch overhead exceeds the total kernel compute time. How
  do you eliminate this overhead, and what are the tradeoffs of each approach?
details:
  realistic_solution: 'There are three complementary approaches, each with different tradeoffs: (1) Kernel
    fusion: Merge sequential element-wise operations (LayerNorm + GELU + bias-add) into a single kernel.
    This eliminates intermediate HBM writes and launch gaps. Tradeoff: custom kernel development cost,
    harder to debug, less modular code. (2) CUDA Graphs: Capture the entire sequence of kernel launches
    once, then replay the graph with a single CPU dispatch. This reduces per-kernel CPU-side overhead
    from ~10 microseconds to ~0.5 microseconds. Tradeoff: the graph is static — you cannot change tensor
    shapes, control flow, or batch size without recapturing. Not suitable for dynamic sequence lengths
    in LLM decoding. (3) Persistent kernels (as used by Triton/Flash Attention): launch one large kernel
    that loops internally, avoiding returning to the CPU scheduler entirely. Tradeoff: requires careful
    SM workload balancing and complicates debugging. The optimal solution combines all three: fuse where
    possible, use CUDA Graphs for the static prefill phase, and persistent kernels for the dynamic decode
    phase.'
  common_mistake: Suggesting 'use a bigger GPU' or 'increase batch size.' A bigger GPU makes each kernel
    even shorter, worsening the launch overhead ratio. Increasing batch size helps but doesn't address
    the fundamental architectural issue of hundreds of tiny dispatches.
  napkin_math: '200 kernels per forward pass x 12 microsecond average launch gap = 2.4 ms of overhead.
    200 kernels x 10 microsecond average compute = 2.0 ms of useful work. GPU utilization: 2.0 / (2.0
    + 2.4) = 45%. With CUDA Graphs (0.5 microsecond launch): overhead = 0.1 ms. Utilization: 2.0 / 2.1
    = 95%. With fusion (50 kernels instead of 200, 40 microsecond average): 50 × 12 = 0.6 ms overhead,
    50 × 40 = 2.0 ms compute. Utilization: 2.0 / 2.6 = 77%. Combined fusion + CUDA Graphs: 50 × 0.5 =
    0.025 ms overhead. Utilization: 2.0 / 2.025 = 99%.'
