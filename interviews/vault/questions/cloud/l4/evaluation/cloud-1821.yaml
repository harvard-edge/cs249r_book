schema_version: 1
id: cloud-1821
title: Diagnosing Elastic Scaling Collapse
topic: data-parallelism
status: published
provenance: imported
scenario: You are observing an elastic pre-training job for a 13B parameter LLM on a cluster of 8x A100
  (80GB) nodes. The job uses a strict static global batch size of 2048 sequences to maintain statistical
  efficiency. When the cluster scheduler dynamically scales the job from 64 to 128 GPUs, the global throughput
  (tokens/sec) only increases by 15%, drastically flattening the scaling efficiency curve. The network
  is verified to be fully operational with non-blocking 400Gbps InfiniBand per node. Diagnose the root
  cause of this throughput collapse and determine the corrective action for the scheduler.
details:
  realistic_solution: With a static global batch size, doubling the GPU count halves the micro-batch size
    per GPU. This decreases the arithmetic intensity (compute per byte) on the A100s, causing the compute
    time to shrink so much that the fixed AllReduce communication latency dominates the step time. To
    fix this, the scheduler should continuously profile the empirical scaling efficiency curve and set
    a strict upper bound on worker allocation for this job (e.g., cap at 64 GPUs) once marginal throughput
    falls below a configured efficiency threshold (e.g., 80%), freeing the remaining GPUs for other workloads.
  common_mistake: Assuming an undetected network failure or straggler node, rather than mathematically
    analyzing the impact of static batching on per-GPU utilization as worker counts increase.
  napkin_math: Global Batch Size (GBS) = 2048. At 64 GPUs, Micro-Batch Size (MBS) = 32. Assume Compute
    Time = 40ms, AllReduce = 15ms. Step Time = max(40, 15) = 40ms. At 128 GPUs, MBS = 16. Compute Time
    = 20ms. AllReduce time remains ~15ms (or slightly grows). Step Time = max(20, 15) = 20ms (if perfectly
    overlapped) but often pipelines bubble, resulting in ~25-30ms practical step times. Throughput = 2048
    / 0.030s = 68,266 tok/s vs 2048 / 0.040s = 51,200 tok/s. We doubled the GPUs (2x cost) but only gained
    33% throughput.
