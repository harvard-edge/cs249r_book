id: cloud-1465
title: Debugging Online KD Bottlenecks
topic: knowledge-distillation
status: published
provenance: imported
scenario: Your team is performing online knowledge distillation from a 70B parameter teacher LLM to a
  7B student LLM on an 8xH100 (80GB) node. The teacher is partitioned across 4 GPUs, while the student
  is trained on the remaining 4 GPUs using Data Parallelism. You observe that the student's GPU utilization
  is under 20%, and the overall training throughput is drastically slower than training the 7B model from
  scratch. What is the root cause of this inefficiency, and how should the system be redesigned?
details:
  realistic_solution: The root cause is the synchronous online forward pass of the 70B teacher starving
    the 7B student. Redesign the system to use offline distillation by pre-computing the teacher's top-K
    logits (e.g., K=10) and storing them, decoupling the slow teacher inference from the fast student
    training loop.
  common_mistake: Attempting to optimize the student's batch size or applying activation checkpointing,
    assuming the student's training loop is the bottleneck rather than the teacher's inference.
  napkin_math: Teacher forward compute is ~140 GFLOPs/token (2 * 70B). Student forward+backward is ~42
    GFLOPs/token (6 * 7B). Synchronous execution forces the fast student to idle waiting for the teacher.
    Storing Top-10 FP32 logits takes only 40 bytes/token (10 * 4B). Streaming this from NVMe easily outpaces
    the teacher's compute-bound generation.
