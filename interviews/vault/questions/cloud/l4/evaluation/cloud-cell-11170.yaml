id: cloud-cell-11170
title: 'Dataset Curation: Evaluate Training Data Quality Metrics for LLM Fine-Tuning'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You are fine-tuning a 13B LLM on H100s (80GB HBM3) for a customer service bot using 200K conversation
  examples. Before training, evaluate two proposed dataset quality metrics: (A) instruction-following
  rate (% of responses that follow the format template), (B) semantic diversity score (average pairwise
  cosine distance of response embeddings). Which better predicts downstream task performance?'
details:
  realistic_solution: 'Instruction-following rate catches formatting issues but misses quality. Semantic
    diversity catches repetitive data that causes mode collapse. Best: combine both + a held-out task
    metric (customer resolution proxy). Evaluate correlation of each metric with held-out task performance.'
  common_mistake: Using only surface-level metrics (format compliance) without assessing whether responses
    are diverse and high-quality; not measuring the actual downstream task (customer satisfaction, resolution
    rate).
  napkin_math: '200K examples. Metric A (format compliance): run regex check across all examples: 200K
    × 0.1ms = 20 seconds. Found 8% non-compliant = 16K examples. Filtering them improves BLEU-4 by 0.3
    points. Metric B (semantic diversity): embed all 200K with a 768-dim sentence encoder. At H100 throughput
    (batch=512): 200K / 512 × 5ms/batch = 1,953 seconds ≈ 32 minutes. Compute pairwise distances on 200K
    samples: O(n²) = 40B comparisons → too slow. Sample 10K subset: 100M comparisons = 1 second on GPU.
    Found avg cosine distance = 0.42. After filtering near-duplicates (distance < 0.1): removes 12K examples.
    Improves BLEU-4 by 1.2 points. Metric B is 4× more predictive. Combined: A+B filtering removes 28K
    examples (14%), improves BLEU-4 by 1.5 points — better than either alone.'
