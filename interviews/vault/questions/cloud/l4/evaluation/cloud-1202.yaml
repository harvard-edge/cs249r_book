id: cloud-1202
title: Analyzing Lifecycle Carbon in GPU Refresh Cycles
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: A cloud provider operates an ML training cluster with 128 DGX H100 servers (1,024 GPUs) in a
  region powered 100% by hydroelectric and solar energy (PUE 1.1). The platform engineering team claims
  their LLM training is 'zero-carbon' and institutes a policy to aggressively replace the GPUs every 1.5
  years with the newest generation to maximize FLOPS/Watt and iteration speed. Analyze the fundamental
  flaw in this sustainability strategy.
details:
  realistic_solution: Because operational carbon is near zero on a clean grid, the embodied carbon (manufacturing
    the silicon, memory, and chassis) dominates the total lifecycle footprint. The team must extend the
    hardware refresh cycle to 3-4 years to amortize the embodied carbon over a longer useful life, rather
    than aggressively upgrading for marginal operational power efficiency gains.
  common_mistake: Assuming that operating on a 100% renewable energy grid eliminates the carbon footprint
    of the ML workload, completely ignoring the massive embodied carbon emissions from hardware manufacturing.
  napkin_math: Embodied carbon of 1 DGX server ≈ 2,500 kg CO2eq. 128 servers = 320 tCO2eq. Operational
    carbon ≈ 0 tCO2eq. Upgrading every 1.5 years over a 6-year period = 4 hardware lifecycles = 1,280
    tCO2eq total. Extending the lifespan to 3 years requires only 2 lifecycles, cutting total emissions
    by 50% (640 tCO2eq) while still running on clean energy.
