id: cloud-1553
title: DLRM Latency Spikes Post-Traffic Lull
topic: latency-decomposition
status: published
provenance: imported
scenario: You are serving a 35GB DLRM recommendation model on an AWS m6i.4xlarge instance (16 vCPUs, 64GB
  RAM). During traffic lulls, background logging and metric aggregation agents run on the node. When a
  sudden burst of user traffic arrives, P99 latency instantly spikes from 15ms to over 800ms for several
  seconds before recovering, yet CPU utilization never exceeds 50%. The OS has a 16GB swap space enabled
  with default swappiness. Diagnose the root cause of this jitter and propose a system-level fix.
details:
  realistic_solution: The background tasks are causing the OS to page out 'idle' embedding tables to disk.
    Fix it by using mlock() or mlockall(MCL_CURRENT | MCL_FUTURE) to pin the 35GB model weights in physical
    RAM, or by setting vm.swappiness=0.
  common_mistake: Assuming the latency spike is due to CPU wake-up latency, thread pool cold-starts, or
    Python garbage collection, while completely ignoring OS-level virtual memory paging dynamics.
  napkin_math: 'RAM access: ~100ns. NVMe SSD access: ~100μs (1000x slower). A request pulling 100 un-cached
    embeddings from disk takes 100 * 100μs = 10ms of pure I/O delay. With 50 concurrent requests hitting
    paged-out memory, NVMe queueing easily pushes tail latency beyond 800ms.'
