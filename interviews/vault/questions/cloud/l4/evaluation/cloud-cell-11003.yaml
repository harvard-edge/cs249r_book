id: cloud-cell-11003
title: 'Dataset Curation: Evaluate Deduplication Strategies for Pre-Training Data Quality'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You compare two deduplication strategies for a 20TB pre-training dataset on an H100 cluster:
  (A) exact URL dedup only, (B) MinHash near-dedup at 0.8 Jaccard similarity threshold. Strategy A takes
  2 hours, B takes 18 hours. Evaluate which is better for downstream model quality.'
details:
  realistic_solution: Exact URL dedup misses content-level duplicates (same article, different URLs).
    MinHash catches semantic near-duplicates. Train two small 1B proxy models, evaluate on MMLU and HellaSwag.
    The quality difference typically justifies the 16-hour overhead on a multi-week training run.
  common_mistake: Choosing A purely for speed without quantifying the quality difference in downstream
    benchmarks.
  napkin_math: '20TB dataset, training run = 2 weeks = 336 hours. Dedup overhead: 18h vs 2h = 16h difference
    = 4.8% of total run time. Expected quality gain from near-dedup: 1-2% on benchmarks per published
    studies (LLM360, Dolma). Cost: 128 H100s × $3/hr × 16h = $6,144 one-time cost for potentially 2% better
    model.'
