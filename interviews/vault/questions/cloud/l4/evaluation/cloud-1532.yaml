schema_version: 1
id: cloud-1532
title: Diagnosing MMD Monitoring Bottlenecks at Scale
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A cloud vision API processes 5,000 images/sec. To monitor for covariate shift, a daily batch
  job computes Maximum Mean Discrepancy (MMD) with an RBF kernel on 512-dimensional ResNet embeddings.
  It compares a reference dataset of 1,000,000 images against a 1-hour production window (18,000,000 images).
  The job runs on an 8-core CPU instance with 64GB of RAM but consistently OOMs and times out. Analyze
  the exact computational and memory bottlenecks of this approach and propose a scalable resolution.
details:
  realistic_solution: Abandon the exact O(N^2) estimator. Implement random subsampling to compute block-MMD
    on mini-batches (e.g., B=4000), or project the 512-D embeddings using Random Fourier Features (RFF)
    to approximate the RBF kernel, reducing complexity to O(N).
  common_mistake: Attempting to compute the exact unbiased quadratic MMD estimator on the entire data
    window, failing to recognize the O(N^2) memory and compute complexity of materializing the pairwise
    kernel matrix.
  napkin_math: 'For exact MMD on N=1,000,000: Storing the K(X,X) kernel matrix requires (10^6)^2 * 4 bytes
    = 4 Terabytes, causing an instant OOM on 64GB RAM. Compute for N+M = 19M requires ~3.61 * 10^14 pairwise
    kernel evaluations. Subsampling with B=4000 reduces memory to 4000^2 * 4B = 64 Megabytes and compute
    to 1.6 * 10^7 ops per batch, easily running in-memory on the existing hardware.'
