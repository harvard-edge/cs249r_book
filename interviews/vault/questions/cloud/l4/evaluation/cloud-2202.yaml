schema_version: 1
id: cloud-2202
title: The MFU vs HFU Confusion
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your team reports that their GPT-3 175B training run achieves '62% GPU utilization' on a cluster
  of 1,024 A100s. You ask whether this is Model FLOPS Utilization (MFU) or Hardware FLOPS Utilization
  (HFU). They don't know the difference. Why does this distinction matter, and which metric should you
  trust for comparing different training configurations?
details:
  realistic_solution: 'MFU (Model FLOPS Utilization) = (model FLOPS per step / step time) / peak FLOPS.
    It counts only the ''useful'' FLOPS — the theoretical compute needed for one forward + backward pass
    based on the model architecture. MFU excludes recomputation from activation checkpointing, communication
    overhead, and idle time. HFU (Hardware FLOPS Utilization) = (total FLOPS executed on hardware / step
    time) / peak FLOPS. It counts all FLOPS the hardware actually performs, including recomputed activations.
    If activation checkpointing recomputes 33% of the forward pass, HFU = MFU x 1.33 for the compute portion.
    A training run with MFU=47% and HFU=62% tells you: (1) the hardware is reasonably well-utilized at
    62%, but (2) 24% of that hardware work (62%-47%)/62% is ''wasted'' on recomputation. MFU is the correct
    metric for comparing training efficiency across configurations because it normalizes for implementation
    choices like checkpointing depth.'
  common_mistake: Treating MFU and HFU as interchangeable, or worse, using nvidia-smi's 'GPU utilization'
    percentage (which measures time the GPU has any active kernel, not actual compute efficiency — a kernel
    running at 1% of peak FLOPS still shows 100% utilization).
  napkin_math: 'GPT-3 175B: ~314 PFLOPS per forward+backward (approx 6 × N × tokens per step). At 1,024
    A100s (312 TFLOPS FP16 each), peak = 319 PFLOPS. If MFU = 47%, then step time = 314 PFLOPS / (0.47
    × 319 PFLOPS) ≈ 2.1s. With activation checkpointing adding 33% recompute: actual hardware FLOPS =
    314 × 1.33 = 418 PFLOPS per step. HFU = 418 / (319 × 2.1) = 418 / 670 ≈ 62%. The 15pp gap (62% − 47%)
    means roughly (62−47)/62 = 24% of the hardware''s work is ''wasted'' on recomputation. MFU is the
    right metric for comparing training configurations because it normalizes out implementation choices
    like checkpointing depth.'
