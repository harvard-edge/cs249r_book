id: cloud-1240
title: Diagnosing H2D Transfer Serialization on A100 GPUs
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are profiling a PyTorch training loop on an NVIDIA A100 GPU. The dataloader yields 256MB
  batches that are correctly pinned in host memory. Inside the loop, the code calls `batch = batch.to(device,
  non_blocking=True)` and immediately feeds it into the model. An Nsight Systems trace reveals that Host-to-Device
  (H2D) memory transfers and compute kernels are completely serialized on the default CUDA stream, yielding
  0% overlap. Why is this happening despite the use of pinned memory and non-blocking calls, and how do
  you orchestrate the streams to fix it?
details:
  realistic_solution: Implement a double-buffered prefetcher using an explicit `torch.cuda.Stream()`.
    Transfer batch N+1 on the dedicated transfer stream while computing batch N on the default stream.
    Use `current_stream().wait_stream()` before consuming batch N+1, and call `record_stream()` to prevent
    the caching allocator from prematurely freeing the memory.
  common_mistake: Assuming `non_blocking=True` automatically pipelines future transfers. If the default
    compute stream immediately consumes the transferred tensor, it implicitly synchronizes and blocks
    until the background transfer finishes, fully serializing the execution.
  napkin_math: H2D Transfer (256MB at ~25GB/s over PCIe Gen4 x16) = ~10ms. Compute step = 25ms. Serialized
    step time = 10ms + 25ms = 35ms. Fully overlapped step time = max(10ms, 25ms) = 25ms. Proper stream
    pipelining yields a 1.4x throughput increase (35ms vs 25ms).
