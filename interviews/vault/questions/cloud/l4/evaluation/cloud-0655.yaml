id: cloud-0655
title: The NVLink PCIe Bottleneck
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are buying a custom 8-GPU server for training. Vendor A offers 8x RTX 4090s connected entirely
  via PCIe Gen4 switches. Vendor B offers 8x H100s connected via NVLink and NVSwitch. Vendor A's server
  is much cheaper, and they claim 'PCIe Gen4 x16 gives 64 GB/s, which is plenty for training.' Why will
  Vendor A's server fail catastrophically at 8-GPU Data Parallel training compared to Vendor B?
details:
  realistic_solution: Vendor A's PCIe topology is a tree rooted at the CPU, while Vendor B's NVLink/NVSwitch
    topology is a fully-connected mesh. During AllReduce, all 8 GPUs must exchange gradients simultaneously.
    On NVLink, every GPU talks directly to every other GPU at 900 GB/s aggregate bisection bandwidth.
    On PCIe, all traffic funnels through the CPU root complex, which has ~128 GB/s total bandwidth shared
    across all GPUs. This creates a 28x bandwidth bottleneck. At 8 GPUs, communication time dominates
    training, and the PCIe server spends 95%+ of its time waiting for gradient synchronization.
  common_mistake: '"PCIe is slower than NVLink." It is slower, but the real issue is the *topology*, not
    just the raw speed.'
  napkin_math: NVLink Bisection Bandwidth on an 8-GPU node = ~3,600 GB/s. PCIe Gen4 CPU Root Complex limit
    = ~128 GB/s (total, shared by all lanes). The NVLink topology is roughly 28x faster during a global
    AllReduce.
