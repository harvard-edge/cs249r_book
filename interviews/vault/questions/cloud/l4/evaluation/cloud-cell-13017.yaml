id: cloud-cell-13017
title: 'Queueing Theory Evaluation: Continuous vs Batch Inference Latency'
topic: queueing-theory
status: published
provenance: imported
scenario: 'Compare continuous batching (vLLM-style) vs static batching for serving LLaMA-13B on H100 (80GB
  HBM3, 3.35TB/s). Arrival rate λ=20 req/s, request lengths bimodal: 50% short (100 tokens output), 50%
  long (1000 tokens output). Analyze the queuing behavior difference and quantify throughput and P99 improvement
  from continuous batching.'
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. All H100 throughput calculations use this spec.'
  common_mistake: Treating continuous batching as simply 'smaller batch size' rather than understanding
    it eliminates HOL blocking by allowing new requests to join mid-generation.
  napkin_math: 'H100 at 989 TFLOPS FP16 (corrected from 1979). LLM serving throughput: at 40% MFU = 395.6
    TFLOPS. For 13B model: tokens/s = 395.6T/(2×13B) = 15,215 tokens/s.'
