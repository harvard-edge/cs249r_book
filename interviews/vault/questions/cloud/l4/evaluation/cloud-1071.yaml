id: cloud-1071
title: Debugging Accuracy Plateau in Defect Detection
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is running a ResNet-50 defect detection model on an A100 GPU (40GB VRAM) for a high-speed
  manufacturing line. The validation accuracy has plateaued at 92%, but the business target is 98%. You've
  already tried scaling the architecture to a Vision Transformer (ViT-L/16), which pushed GPU compute
  utilization to 98% and increased inference latency from 12ms to 85ms per image, but validation accuracy
  only budged to 92.5%. The core training dataset consists of 1.2M images collected over 3 years. Recent
  telemetry shows the model specifically fails on a new reflective alloy type introduced to the manufacturing
  line 6 weeks ago. How should you allocate your ML engineering resources to unblock the 98% target?
details:
  realistic_solution: Adopt a data-centric approach. Revert to the faster ResNet-50 (12ms latency). Systematically
    curate, upsample, and hard-mine examples of the new reflective alloy. Implement targeted data augmentations
    (e.g., specular noise, brightness adjustments) to simulate the new material, and slice the validation
    set to track alloy-specific metrics.
  common_mistake: Recommending further architectural search, hyperparameter sweeps, or knowledge distillation
    to bring the ViT's latency down, completely ignoring the fundamental distribution shift in the underlying
    data.
  napkin_math: ViT-L (300M params) vs ResNet-50 (25M params) = 12x parameter/compute increase for only
    +0.5% accuracy gain. If the new alloy represents 10% of production volume but accounts for 75% of
    all misclassifications (8% total error rate * 0.75 = 6% absolute error), fixing the dataset for this
    specific slice mathematically recovers up to 6% absolute accuracy, pushing total accuracy from 92%
    to 98% without incurring the 73ms latency penalty of the ViT.
