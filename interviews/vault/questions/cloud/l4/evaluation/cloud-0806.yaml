id: cloud-0806
title: The PUE Dollar Cost
topic: power-budgeting
status: published
provenance: imported
scenario: 'Our CFO asks: ''We''re spending $86M a year on electricity for our 10,000-GPU training cluster.
  The facilities team says they can reduce PUE from 1.4 to 1.1 by switching to liquid cooling, but the
  retrofit costs $5M. Is it worth it?'''
details:
  realistic_solution: 'PUE (Power Usage Effectiveness) is the ratio of total facility power to IT equipment
    power. A PUE of 1.4 means for every 1W of compute, you pay for 1.4W total — the extra 0.4W goes to
    cooling, lighting, and power distribution. For a 10,000-GPU cluster, that 0.4W multiplier translates
    to millions of dollars per year. The CFO''s question is a straightforward ROI calculation: compute
    the annual savings from the PUE reduction and compare to the retrofit cost.'
  common_mistake: '"PUE is a facilities metric — it doesn''t affect ML engineering decisions." In reality,
    PUE directly determines your electricity bill and can make or break the ROI of a training cluster.'
  napkin_math: '10,000 H100s × 700W = **7 MW** IT load. At PUE 1.4: total = 7 × 1.4 = **9.8 MW**. At PUE
    1.1: total = 7 × 1.1 = **7.7 MW**. Savings = 2.1 MW. Annual electricity savings = 2.1 MW × 8,760 hrs
    × $0.10/kWh = **$1.84M/year**. $5M retrofit payback period = $5M / $1.84M ≈ **2.7 years**. For a cluster
    with a 5-year lifespan, total savings = $1.84M × 5 - $5M = **$4.2M net**. Tell the CFO: "Yes, the
    retrofit pays for itself in under 3 years."'
