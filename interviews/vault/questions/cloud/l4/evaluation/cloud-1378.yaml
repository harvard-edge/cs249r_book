id: cloud-1378
title: Debugging GPU Cluster Utilization Deadlock
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are debugging a severe throughput drop on a 512-GPU H100 training cluster. The cluster orchestration
  dashboard shows 100% GPU allocation, but the InfiniBand fabric utilization is near zero, and average
  GPU power draw is idling at 150W instead of the expected 700W TDP. Log analysis reveals that four separate
  Llama-3 fine-tuning jobs, each requiring 256 GPUs, were submitted simultaneously. The cluster currently
  uses an incremental resource manager that greedily assigns free GPUs to pending jobs as they become
  available.
details:
  realistic_solution: Identify the hold-and-wait deadlock where all four jobs have acquired partial allocations
    and are infinitely waiting for more. Resolve this by terminating the deadlocked jobs and implementing
    strict gang scheduling, which enforces all-or-nothing atomic resource allocation.
  common_mistake: Diagnosing the failure as an InfiniBand switch partition or NCCL timeout without verifying
    if any single job has actually acquired its full quorum of required GPUs to initiate training.
  napkin_math: Total Capacity = 512 GPUs. Demand = 4 jobs * 256 GPUs = 1024 GPUs. Under greedy allocation,
    each job acquires exactly 512 / 4 = 128 GPUs. Total allocated = 512 (100% cluster utilization). However,
    128 < 256 for all jobs, meaning no job can establish its NCCL communicators to start training, resulting
    in a systemic deadlock.
