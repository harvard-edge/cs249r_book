schema_version: 1
id: cloud-cell-12028
title: 'MLOps Lifecycle: Compare Blue-Green vs. Rolling Deployment for LLM API on H100'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: A team deploys a new 13B model checkpoint on 16 H100 nodes. They compare blue-green deployment
  (full parallel fleet) vs. rolling deployment (replace nodes 2 at a time). The model requires 4 H100s
  (tensor parallel), so 16 nodes serve 4 model replicas. Evaluate deployment risk, cost, and downtime
  for each strategy.
details:
  realistic_solution: Spot interruption recovery cost depends on replacement duration and price differential.
    16 nodes × $3/hr premium × 1hr = $48 extra cost (not $96).
  common_mistake: 'Assuming blue-green is always safer without calculating the cost: maintaining 32 H100s
    during deployment transition (H100 at $3/hr spot = $96/hr for 32 nodes) vs. rolling risk of partial
    failure.'
  napkin_math: 'Spot interruption recovery: 16 nodes need replacement. At $3/hr spot price for 8×H100
    node. Replacement time: 30 min = 0.5 hr. Cost: 16 nodes × $3/hr × 0.5hr = $24 extra (not $96). If
    on-demand premium is $3/hr extra over spot and full 1 hr: 16 × $3 × 1hr = $48 extra for on-demand
    fallback (not $96 which would require 2hr at $3 or $6/hr premium).'
