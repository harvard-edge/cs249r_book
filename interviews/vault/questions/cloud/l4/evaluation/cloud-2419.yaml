id: cloud-2419
title: Unstructured vs Structured Sparsity
topic: pruning-sparsity
status: published
provenance: imported
scenario: You prune a ResNet-50 model to 60% unstructured sparsity to reduce inference costs. You deploy
  it on an A100 GPU using cuSPARSE. Profiling shows absolutely 0% improvement in latency; both the dense
  and sparse models take 12ms per batch of 32. Total FLOPs processed by the hardware remain identical.
details:
  realistic_solution: Standard GPUs and their Tensor Cores compute dense matrix blocks. Unstructured sparsity
    means the zeros are randomly distributed. The GPU must still load the full dense memory blocks from
    HBM and execute the dense MMA instructions; multiplying by zero takes the same time as multiplying
    by one. The tradeoff is pruning flexibility versus hardware mapping. To achieve acceleration, you
    must co-design the pruning algorithm with the Ampere architecture. A100 features Sparse Tensor Cores
    that explicitly support 2:4 structured sparsity (exactly 2 zeros in every block of 4 elements). By
    retraining the model with a 2:4 sparsity constraint, the hardware multiplexers can physically skip
    fetching the zero values, doubling the compute throughput.
  common_mistake: Increasing the sparsity level to 80%, hoping the zero-skipping finally kicks in on the
    GPU.
  napkin_math: 'Unstructured 60% sparsity: Hardware processes 100% of the dense matrix. Throughput = 1x.
    Structured 2:4 sparsity (50% sparse): The Sparse Tensor Core compresses the matrix by 50% in memory
    and skips the zeros in the ALU. Throughput = 2x. You trade 10% theoretical sparsity for 100% actual
    hardware acceleration.'
