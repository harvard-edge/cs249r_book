id: cloud-2261
title: The XLA vs TorchInductor Decision
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your infrastructure team must choose a compiler backend for a large-scale transformer training
  job. XLA (used via JAX) and TorchInductor (used via torch.compile) are the two candidates. Both produce
  fused kernels from high-level operations. Analyze the architectural differences between these two compilation
  strategies and explain when each has a structural advantage.
details:
  realistic_solution: 'The fundamental architectural difference is whole-program vs per-operator compilation
    scope. XLA performs whole-program compilation: it captures the entire computation graph ahead of time,
    runs global optimization passes (cross-layer fusion, memory planning across the full model, buffer
    donation), and produces a single optimized executable. This gives XLA a structural advantage for static,
    regular workloads (standard transformer training with fixed shapes) because it can make globally optimal
    decisions — e.g., fusing the layer-norm at the end of one layer with the linear projection at the
    start of the next. TorchInductor uses graph-fragment compilation: TorchDynamo traces subgraphs between
    graph breaks and compiles them independently. This gives TorchInductor a structural advantage for
    dynamic workloads (variable sequence lengths, data-dependent control flow, custom Python logic) because
    it preserves Python''s flexibility while compiling the hot paths. The tradeoff is compilation scope
    vs dynamism: XLA''s global view enables better optimization but requires static shapes; TorchInductor''s
    local view misses cross-fragment optimizations but handles dynamism gracefully.'
  common_mistake: '"XLA is for TPUs and TorchInductor is for GPUs — just pick based on hardware." Both
    support multiple hardware targets; the real difference is in compilation strategy, not hardware support.'
  napkin_math: 'For a standard 70B transformer with fixed shapes: XLA achieves 55-60% MFU (global fusion,
    buffer planning). TorchInductor achieves 50-55% MFU (fragment-level fusion, less cross-layer optimization).
    Gap: ~10% relative. For a MoE model with dynamic routing: XLA requires padding all experts to max
    capacity (wasting 20-40% compute on padding). TorchInductor compiles the dynamic dispatch natively,
    executing only active expert paths. Net: TorchInductor wins by 15-25% on dynamic MoE workloads.'
