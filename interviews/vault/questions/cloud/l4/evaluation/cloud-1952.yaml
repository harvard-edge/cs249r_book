schema_version: 1
id: cloud-1952
title: Diagnosing Peak Load Bottlenecks in Recommendation Serving
topic: latency-decomposition
status: published
provenance: imported
scenario: An e-commerce platform uses a 10B parameter Transformer model (20GB footprint in FP16) to generate
  personalized 'Daily Top Picks' for its 50 million daily active users. Currently, the system dynamically
  generates these recommendations the moment a user logs in. During the peak morning hour (10,000 logins/second),
  the cluster of 50 A100 GPUs becomes severely saturated, causing P99 serving latency to spike above 2.5
  seconds and triggering cascading request timeouts. Diagnose the root cause of this serving bottleneck
  and analyze why transitioning to a static inference architecture would permanently resolve the latency
  spikes.
details:
  realistic_solution: Decouple model compute from the critical serving path by migrating to static inference.
    Schedule a nightly offline batch job to pre-compute recommendations for all 50M users using maximum
    throughput batch sizes, and push the materialized results to a distributed key-value store (like Redis)
    for O(1) retrieval at login time.
  common_mistake: Focusing purely on complex dynamic optimization techniques (like aggressive dynamic
    batching, deep INT8 quantization, or speculative decoding) while failing to realize that 'Daily Top
    Picks' do not require real-time session context and are highly predictable.
  napkin_math: 'Dynamic Peak: 10,000 req/s. At 50ms/batch (BS=32), one A100 handles ~640 req/s. Needs
    16+ GPUs at perfect utilization, but bursty traffic causes massive queueing delays. Static Offline
    Job: 50M users / 256 (larger offline batch size) = ~195K batches. On 10 A100s at 100ms/batch: (195,000
    * 0.1s) / 10 = 1,950 seconds (~32.5 minutes) to pre-compute everything. Online serving latency drops
    to Redis network RTT (<2ms).'
