id: cloud-0934
title: Diagnosing Silent Data Corruption in Distributed LLM Training
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are orchestrating the pre-training of a 175B parameter model on a cluster of 2,048 H100
  GPUs using 3D parallelism (TP=8, PP=8, DP=32). Around iteration 45,000, you begin observing intermittent,
  non-reproducible loss spikes. The training process does not crash, and standard hardware telemetry (DCGM)
  and NCCL health checks report 100% health. However, the model's validation perplexity is steadily degrading.
  How do you diagnose and isolate the root cause of this failure without halting the entire cluster for
  days?
details:
  realistic_solution: Implement anomalous gradient norm detection at the rank level prior to the DP AllReduce
    step to catch poisoned gradients. Once a spike is detected, isolate the suspect PP/TP group and run
    a deterministic MATMUL diagnostic (comparing results against a known good CPU baseline) to identify
    the specific GPU suffering from Silent Data Corruption (SDC) in its Tensor Cores or SRAM.
  common_mistake: Attributing the loss spikes to algorithm instability (e.g., learning rate or bad data
    batches) and attempting to tune optimizer state, or simply restarting from the last checkpoint without
    isolating the faulty hardware, leading to guaranteed recurrence of the poisoned gradients.
  napkin_math: If the MTBF for a transient SDC on a single H100 is 10,000 hours, a cluster of 2,048 GPUs
    will experience an SDC approximately every 10,000 / 2,048 ≈ 4.8 hours. Over a 30-day training run,
    you must proactively mitigate ~150 Byzantine failures.
