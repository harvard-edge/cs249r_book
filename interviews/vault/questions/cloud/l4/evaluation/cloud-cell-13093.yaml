id: cloud-cell-13093
title: 'TCO Evaluation: H100 vs TPU v5e for Training Cost'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Compare the training cost for a 7B parameter model (100B token dataset, 1.4 ZFLOPs total compute)
  on H100 (1979 TFLOPS BF16, $2.50/hr) vs TPU v5e (197 TFLOPS BF16, $0.42/hr on GCP). Calculate training
  time, compute cost, and cost per effective FLOP for each. Assume 40% MFU on both platforms.
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS × 40% MFU = 395.6 TFLOPS effective (not 1979 × 0.4 = 791.6).'
  common_mistake: Comparing peak TFLOPS without adjusting for MFU, and using raw rental price without
    converting to cost-per-effective-TFLOP which is the meaningful metric.
  napkin_math: 'H100 at 989 TFLOPS FP16 (not 1979). At 40% MFU: 989 × 0.4 = 395.6 TFLOPS effective. For
    70B inference: memory-bound at BW=3.35 TB/s. For training: 6×N×tokens/s = 395.6 TFLOPS → tokens/s
    = 395.6T/(6×70B) = 942 tokens/s/GPU.'
