id: cloud-fill-05058
title: Carbon Footprint Estimation for LLM Training Run on H100
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: Training a 70B LLM requires 21.7 days on 1024 H100s at 680W each. The datacenter uses PUE (Power
  Usage Effectiveness) of 1.3 and is located in a region with carbon intensity of 0.42 kg CO2e/kWh (US
  average). Calculate total energy consumption, cost at $0.12/kWh, and carbon footprint.
details:
  realistic_solution: 'GPU power: 1024 × 680W = 696.3 kW. Supporting hardware (CPU, DRAM, networking):
    ~15% overhead = 804.7 kW total IT load. With PUE 1.3: total facility power = 804.7 × 1.3 = 1046 kW.
    Runtime: 21.7 days = 520.8 hours. Total energy: 1046 kW × 520.8 hours = 544.8 MWh. Cost: 544,800 kWh
    × $0.12 = $65,376. Carbon: 544,800 × 0.42 = 228,816 kg CO2e = 229 tonnes CO2e. For comparison: average
    US car emits ~4.6 tonnes/year → equivalent to ~50 cars for one year. Note: many hyperscalers use renewable
    energy credits, reducing effective carbon intensity significantly.'
  common_mistake: Multiplying only GPU power by runtime without applying PUE, which accounts for cooling,
    lighting, UPS, and networking overhead in the datacenter.
  napkin_math: 'IT load: 1024×680W×1.15 = 800kW. Total: 800×1.3 = 1040kW. Energy: 1040kW×520.8h = 541MWh.
    Cost: $65K. Carbon: 541,000×0.42 = 227 tonnes CO2e. Renewables offset: if 100% renewable, ~0 tonnes
    net.'
