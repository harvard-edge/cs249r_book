id: cloud-2289
title: The Fairness-Accuracy Pareto Frontier
topic: fairness-evaluation
status: published
provenance: imported
scenario: Your hiring recommendation model has 85% accuracy with no fairness constraints. When you add
  a demographic parity constraint (equal recommendation rates across gender), accuracy drops to 78%. The
  VP of Engineering says a 7-point accuracy drop is unacceptable and asks you to 'find a better algorithm
  that doesn't have this tradeoff.' Analyze why the VP's request is fundamentally misguided, and propose
  a systems-level approach to navigate the fairness-accuracy Pareto frontier.
details:
  realistic_solution: 'The fairness-accuracy tradeoff is not an algorithm bug — it is a Pareto frontier.
    When base rates differ across groups, enforcing equal outcomes necessarily costs accuracy (this follows
    from the impossibility theorem). However, the frontier is not a single point — it is a curve. The
    systems approach: (1) Map the full Pareto frontier by sweeping the fairness constraint strength (λ
    in the Lagrangian formulation), producing ~20 candidate models from (85%, no fairness) to (78%, full
    demographic parity). (2) Build a model selection dashboard that lets stakeholders visualize the accuracy-fairness
    curve and choose an operating point. (3) Implement per-group threshold adjustment as a post-processing
    step (Hardt et al., 2016), which often recovers 2-3pp of accuracy compared to in-training constraints
    while achieving the same fairness level. (4) Consider switching from demographic parity to equalized
    odds — depending on the base rates, one criterion may be less costly than the other. The infrastructure
    requirement: your training pipeline needs a hyperparameter sweep over fairness constraint weights,
    your evaluation pipeline needs per-group metrics at every point, and your model registry needs to
    store the full Pareto frontier, not just the ''best'' model.'
  common_mistake: Agreeing to 'find a better algorithm' as if the tradeoff is a software bug. Or conversely,
    insisting on 78% accuracy as the only option. Both miss the Pareto frontier framing.
  napkin_math: 'Pareto sweep: 20 constraint values × 4-hour training runs = 80 GPU-hours for frontier
    mapping. With threshold post-processing, typical recovery is 2-3pp: (78% + 2.5pp) = 80.5% accuracy
    at full demographic parity. The VP''s ''acceptable'' operating point might be (82%, partial fairness
    with disparate impact ratio > 0.8), which is findable on the frontier without any algorithmic change.'
