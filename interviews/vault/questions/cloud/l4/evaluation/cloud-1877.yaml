schema_version: 1
id: cloud-1877
title: Diagnosing Sharded Checkpoint Metadata Stalls
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A team is training a 70B parameter LLM on 64 H100 (80GB) GPUs using PyTorch FSDP. The total
  distributed state is ~1.12 TB. They implement sharded checkpointing, where all 64 ranks independently
  write their shards to a shared NFS storage volume capable of 10 GB/s. During checkpointing, operations
  intermittently stall for over 5 minutes and sometimes cause NCCL watchdog timeouts, even though the
  ideal transfer time is much lower. Analyze the root cause of these severe straggler effects.
details:
  realistic_solution: The bottleneck is filesystem metadata contention and IOPS limits. 64 ranks simultaneously
    creating and opening files in a single shared NFS directory causes severe inode lock contention. The
    solution is to use a distributed checkpointing coordinator to aggregate writes to fewer files, or
    direct each rank to write to isolated subdirectories.
  common_mistake: Assuming the storage network bandwidth (10 GB/s) is the sole bottleneck and attempting
    to solve the issue by compressing the checkpoints or upgrading the network.
  napkin_math: Total state = 70B params * 16 bytes/param (2B params + 2B grads + 12B Adam states) = 1.12
    TB. Ideal write time = 1.12 TB / 10 GB/s = 112 seconds. Stalls > 300s (and timeouts) point to metadata
    serialization overhead (IOPS/locking) rather than raw sequential bandwidth limits.
