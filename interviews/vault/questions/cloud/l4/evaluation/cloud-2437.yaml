id: cloud-2437
title: The Long-Context Attention Bottleneck
topic: vram-budgeting
status: published
provenance: imported
scenario: You are serving a 13B LLM with a 64k token context window on an A100 (2 TB/s HBM, 312 TFLOPS).
  Profiling the prefill phase shows the standard Multi-Head Attention (MHA) layers take 800ms per request,
  with ALU utilization at a dismal 12%. The tech lead suggests upgrading to an H100 (3.35 TB/s, 989 TFLOPS)
  to get a 3x speedup on the prefill phase.
details:
  realistic_solution: Standard MHA materializes the $N \times N$ attention scores in HBM. For N=64k, this
    causes massive HBM read/write traffic, dragging the arithmetic intensity far below the roofline ridge
    point. Upgrading to H100 only provides a ~1.67x bandwidth increase, so you won't get a 3x speedup,
    and you are wasting expensive ALUs. Instead of new hardware, the architecture needs FlashAttention,
    which tiles the computation in SRAM, eliminating the $O(N^2)$ HBM accesses and shifting the workload
    back to the compute-bound regime.
  common_mistake: Assuming the H100's 3x compute will proportionally speed up a workload that is actually
    memory-capacity and bandwidth bound.
  napkin_math: 'Standard MHA HBM traffic per layer: $O(N^2)$. At 64k, QK^T matrix is $64000 \times 64000
    \times 2$ bytes $\approx 8$ GB per attention head. With FlashAttention, HBM traffic drops to $O(N
    \times d)$. Arithmetic Intensity increases from $\approx 1$ FLOP/byte to $>200$ FLOPs/byte, moving
    the workload safely into the compute-bound region.'
