id: cloud-1472
title: Diagnosing Network Bottlenecks in KV Cache Checkpointing
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A multi-turn LLM serving system uses a 70B model (80 layers, 8 KV heads, 128 dim) on 8x H100
  spot instances, handling user sessions up to 64K tokens. To survive spot instance preemptions without
  re-prefilling context, the team implemented a fault-tolerance mechanism that checkpoints the full KV
  cache to a remote Redis cluster over a 100 Gbps network every 5 conversational turns. However, when
  spot preemption rates increase during peak hours, users experience 30-second failover delays, and the
  node's network egress hits 100% utilization. Diagnose the root cause of the bottleneck.
details:
  realistic_solution: Implement incremental KV cache checkpointing (streaming only the new tokens' KV
    pairs generated since the last checkpoint) and overlap the transfer with computation asynchronously.
    Alternatively, leverage CPU RAM as a local buffer before asynchronously staging to remote storage.
  common_mistake: Failing to account for the massive absolute size of the KV cache at 64K tokens, and
    attempting to synchronously checkpoint the entire cache for the batch rather than streaming incremental
    deltas.
  napkin_math: KV cache per token = 80 layers * 8 KV heads * 128 dim * 2 (K+V) * 2 bytes = ~328 KB. For
    a 64K token context, cache size is ~21 GB per request. For a batch of 16 requests, total cache is
    336 GB. Transferring 336 GB over a 100 Gbps (12.5 GB/s) network takes 336 / 12.5 = 26.8 seconds, which
    explains the ~30s delay and network saturation.
