schema_version: 1
id: cloud-1298
title: Diagnosing PyTorch DDP Partial Allocation Deadlocks
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A Kubernetes cluster with 500 A100 GPUs is running distributed training jobs using PyTorch DDP.
  Users complain that jobs are getting stuck indefinitely, while cluster metrics show 85% GPU allocation.
  When you inspect the cluster, you see multiple jobs with 6 out of 8 requested pods running, but GPU
  compute utilization is 0% across those active pods because they are indefinitely waiting to establish
  the NCCL communicator. How do you diagnose the root cause of this resource fragmentation and resolve
  the cluster-wide deadlock?
details:
  realistic_solution: Diagnose the issue as a partial allocation deadlock. Implement Gang Scheduling (e.g.,
    via Volcano or Kueue) by defining a PodGroup with minMember equal to the total required workers (e.g.,
    8). This enforces atomic, all-or-nothing scheduling.
  common_mistake: Focusing on NCCL timeout configurations or suggesting immediate cluster autoscaling
    rather than recognizing the fundamental scheduling deadlock caused by piecemeal pod allocation.
  napkin_math: A cluster with 64 available A100s receives 10 concurrent PyTorch DDP jobs, each requiring
    8 GPUs (80 total). A default Kubernetes scheduler deals GPUs greedily, giving 10 jobs 6 GPUs each
    (60/64 allocated = 93% utilization). Because DDP demands all 8 GPUs to start, 0 jobs run. A gang scheduler
    enforces all-or-nothing allocation, launching 8 complete jobs (64/64 utilized) while 2 jobs correctly
    wait.
