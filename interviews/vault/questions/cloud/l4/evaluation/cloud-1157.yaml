id: cloud-1157
title: Diagnosing Silent Model Degradation in E-Commerce Recommendations
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: An e-commerce recommendation system (Two-Tower architecture, deployed on 16x T4 GPUs serving
  5,000 QPS) has seen a gradual 15% drop in click-through rate (CTR) over the last 3 months. System metrics
  (P99 latency < 50ms, error rates < 0.1%, throughput) remain completely stable, and the offline test
  set from 3 months ago still reports 85% accuracy. How do you analyze this degradation to pinpoint the
  root cause of the silent failure?
details:
  realistic_solution: Implement drift detection using statistical tests (e.g., Kolmogorov-Smirnov or Population
    Stability Index) on key input features and embedding outputs. By computing the divergence between
    live traffic distributions (e.g., last 7 days) and the training baseline, you can pinpoint the exact
    features causing the shift.
  common_mistake: Candidates often suggest immediately blindly retraining the model with the latest data,
    or assume hidden hardware/latency issues, rather than systematically analyzing the statistical distributions
    of the input features and model outputs.
  napkin_math: 'If CTR drops from 5.0% to 4.25% (a 15% relative drop) at 5,000 QPS: 5,000 queries/sec
    * 86,400 sec/day = 432M queries/day. Lost clicks per day = 432M * (0.050 - 0.0425) = 3.24M clicks
    lost/day. At a conversion value of $0.10 per click, this silent shift costs $324,000 per day.'
