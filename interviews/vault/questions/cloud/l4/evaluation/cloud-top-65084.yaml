schema_version: 1
id: cloud-top-65084
title: Two-Tower Model vs Cross-Attention Ranker for Serving Cost
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: A retrieval stage must rank 1M candidate items per user request. Evaluate a two-tower model
  (pre-computed item embeddings + online user tower) vs a cross-encoder (both user and item processed
  jointly) for serving at 5K QPS.
details:
  realistic_solution: 'Two-tower analysis: user tower runs once per request (online). Item embeddings
    pre-computed offline and stored in FAISS index. ANN search: FAISS IVF-PQ on 1M items: 1ms. Total retrieval:
    user_tower_compute + ANN_search. User tower (2-layer MLP, 5M params): 5M * 2 * 1 FLOP = 10M FLOP /
    989T = 0.01ms. Total: ~1.1ms per request. Scales to 5K QPS: 5K * 1.1ms = 5.5 GPU-seconds/sec on H100.
    Cost: 0.0055 H100-seconds per request = 0.0055/3600 H100-hours = ~negligible. Cross-encoder analysis:
    1M forward passes per request. Each pass: (user+item features) through 5M-param MLP = 10M FLOP. 1M
    * 10M = 10T FLOP per request. H100 at 989T: 10.1ms compute. At 5K QPS: 5K * 10.1ms = 50.5 H100-seconds/sec
    = 50 H100s required for compute alone. At $3/hr: $54K/hr for GPU cost. Not feasible. Use two-tower
    for retrieval. Cross-encoder: only viable for final-stage re-ranking of top 500 candidates.'
  common_mistake: Comparing only model quality (cross-encoder is always more accurate) without accounting
    for the serving infeasibility of cross-encoders at 1M candidates per request. A cross-encoder at 1M
    candidates requires 1M forward passes, each taking the (user, item) pair as input.
  napkin_math: 'Two-tower for 1M candidates: FAISS IVF-PQ index lookup = 1ms (single GPU handles 5K QPS
    with parallelism). Cost: 1 H100 for retrieval index. Cross-encoder for 1M: 50 H100s. Cost ratio: 50:1.
    Two-tower wins by 50x on cost. Quality: cross-encoder at top-K recall@100 is ~2-5% better than two-tower.
    The 2-5% quality improvement costs 50x GPU resources. Compromise: use two-tower to retrieve top 1000,
    cross-encoder to re-rank to top 500 for final ranking. Cross-encoder on 1000 items: 1000 * 10M FLOP
    / 989T = 10.1us compute. 5K QPS: 0.05 H100-seconds/sec. Cost: 0.05/3600 H100-hr/req. Affordable.'
