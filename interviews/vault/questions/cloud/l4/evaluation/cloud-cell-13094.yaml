id: cloud-cell-13094
title: 'TCO Evaluation: Cost of Quantization for Inference'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Evaluate the cost impact of FP16 vs INT8 vs INT4 quantization for serving LLaMA-13B on H100
  (80GB HBM3, $2.50/hr). FP16 needs 2 H100s, INT8 needs 1 H100, INT4 needs 1 H100 (with headroom). Throughput:
  FP16=50 req/s, INT8=75 req/s, INT4=60 req/s (dequantization overhead). Calculate cost per 1M tokens
  and the accuracy vs cost tradeoff.'
details:
  realistic_solution: 'FP16: 2 H100 * $2.50 = $5/hr. 50 req/s * 3600 = 180K req/hr. Avg 250 tokens: 45M
    tokens/hr. Cost = $5/45M = $0.111/1M tokens. INT8: 1 H100 * $2.50 = $2.50/hr. 75 req/s * 3600 * 250
    = 67.5M tokens/hr. Cost = $2.50/67.5M = $0.037/1M tokens. INT4: 1 H100 * $2.50. 60 req/s * 3600 *
    250 = 54M tokens/hr. Cost = $2.50/54M = $0.046/1M tokens. Ranking: INT8 is cheapest at 3x less than
    FP16. INT4 slightly worse than INT8 due to lower throughput. INT8 is the sweet spot (1-2% accuracy
    loss, 3x cost reduction).'
  common_mistake: Focusing only on model memory fit (how many GPUs needed) without accounting for the
    throughput change from quantization, which determines actual cost per token.
  napkin_math: 'FP16: $0.111/1M tok. INT8: $0.037/1M tok. INT4: $0.046/1M tok. INT8 savings vs FP16: 67%
    reduction. INT4 savings vs FP16: 59% reduction. But INT4 has 3-5% accuracy loss vs 1-2% for INT8.
    Cost-quality frontier: INT8 dominates (cheaper AND better accuracy than INT4). INT4 only wins if the
    model doesn''t fit in 1 GPU with INT8 (13B INT8 = 13GB, fits in H100 80GB easily). Market pricing
    implication: at $0.037/1M tokens for INT8 LLaMA-13B, competitive with $0.0002/1M for GPT-3.5 Turbo?
    No — GPT-3.5 is subsidized by OpenAI scale. The numbers differ by 185x.'
