schema_version: 1
id: cloud-1008
title: Diagnosing OOD Overconfidence
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are debugging a cloud-based diagnostic vision system (ResNet-152) deployed on A100 GPUs.
  While test set accuracy is 95%, the system routes 10,000 requests/hour and recently failed silently
  by classifying out-of-distribution (OOD) images (e.g., ultrasound instead of X-ray) with >99% softmax
  confidence. This skips the human-in-the-loop fallback. The system has a strict P99 latency budget of
  200ms per request (current inference latency is 40ms). How do you diagnose the root cause of this overconfidence
  and what calibration technique resolves it without requiring a full retraining cycle or violating the
  latency constraint?
details:
  realistic_solution: Diagnose the issue as neural networks producing uncalibrated, extreme logits for
    OOD data which the softmax function exponentially amplifies. The solution is Temperature Scaling,
    an O(1) post-processing layer that divides logits by a learned temperature T (e.g., T=4). This widens
    the softmax distribution, pushing OOD confidence below a 90% human-fallback threshold with <1us of
    added latency, while Deep Ensembles would multiply inference cost by 5x and violate the latency budget.
  common_mistake: Assuming softmax probabilities equate to true confidence, or proposing Deep Ensembles
    / MC Dropout, which multiply inference latency by 5-10x and risk violating the latency budget for
    a system processing 10,000 requests/hour.
  napkin_math: Original logits [10.0, 2.0] yield Softmax [~0.9996, ~0.0003]. With Temperature T=4, logits
    become [2.5, 0.5], yielding Softmax [~0.88, ~0.12]. This pushes the confidence below a 90% human-fallback
    threshold. Deep Ensembles (M=5) would increase the 40ms compute to 200ms, immediately violating the
    latency budget when network I/O is included, whereas T-scaling adds <1us.
