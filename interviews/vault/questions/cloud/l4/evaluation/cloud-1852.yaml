schema_version: 1
id: cloud-1852
title: Bottleneck Analysis in Python REST/JSON Serving
topic: latency-decomposition
status: published
provenance: imported
scenario: A deep learning recommendation model is deployed on an AWS c6i.8xlarge instance using a Python
  FastAPI server receiving REST/JSON requests. Each request contains a batch of 1024 dense feature vectors
  (float32, dimension 256). The raw ONNX model inference time is benchmarked at 5ms per batch. However,
  profiling reveals the end-to-end P99 latency is consistently exceeding 35ms under moderate load (200
  QPS), and CPU profiling shows the inference engine accounts for less than 15% of total CPU cycles. Analyze
  the likely root cause and propose a mitigation.
details:
  realistic_solution: The root cause is the serialization overhead of parsing a 2.5MB JSON string and
    converting nested Python lists into a contiguous NumPy array. Migrate to gRPC using Protobuf or FlatBuffers,
    or use a dedicated model server passing raw tensor bytes.
  common_mistake: Blaming network latency or assuming the ONNX engine is improperly configured for multithreading
    without analyzing the massive time spent in string parsing and data structure conversion in Python.
  napkin_math: 'Payload: 1024 * 256 floats = 262,144 floats. At ~10 bytes per float in JSON, payload is
    ~2.5MB. Python JSON parsing + list-to-NumPy conversion for 262k elements takes ~25ms. Inference =
    5ms. Parsing overhead dominates inference by 5x.'
