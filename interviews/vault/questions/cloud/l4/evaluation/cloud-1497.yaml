id: cloud-1497
title: LayerNorm Memory Bandwidth Bottleneck
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are profiling a 50B parameter Transformer model (hidden dimension 8192, seq length 2048,
  batch 8) on A100 80GB GPUs. The PyTorch profiler indicates that the default LayerNorm operations, combined
  with the preceding residual additions, are consuming a disproportionate amount of step time and are
  heavily memory bandwidth-bound. The kernel execution trace shows multiple separate read/write operations
  to High Bandwidth Memory (HBM). How do you analyze this bottleneck and what implementation resolves
  it?
details:
  realistic_solution: Identify that the PyTorch default implementation uses separate kernels for the residual
    addition and the normalization, causing redundant trips to HBM. Resolve this by deploying a fused
    Add + LayerNorm CUDA kernel (like Apex FusedLayerNorm) that performs the addition, computes statistics,
    and normalizes entirely within SRAM.
  common_mistake: Assuming LayerNorm is compute-bound and trying to optimize ALUs, or suggesting a switch
    to Batch Normalization which incorrectly normalizes across the batch dimension and breaks sequence
    independence.
  napkin_math: 'For an FP16 tensor of 8x2048x8192 (268MB): Unfused operations require reading 2 inputs
    (536MB), writing the addition result (268MB), reading it twice for stats and normalization (536MB),
    and writing the output (268MB) = 1.6GB total HBM traffic. Fused operations read 2 inputs (536MB) and
    write the final output (268MB) = ~804MB. The fused kernel reduces memory traffic by 50%, directly
    doubling throughput for this bandwidth-bound step.'
