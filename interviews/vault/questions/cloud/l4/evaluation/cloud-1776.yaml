id: cloud-1776
title: Hybrid CPU-Spillover for Flash Spikes
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: An e-commerce platform serves a recommendation model using AWS g4dn.xlarge (NVIDIA T4) instances.
  Baseline traffic is 1,000 RPS handled by 5 GPUs. During flash sales, traffic spikes to 6,000 RPS in
  30 seconds. GPUs take 4 minutes to provision, download weights, and warm up. During the last sale, queue
  buildup caused 40% of requests to breach the 500ms p99 SLA and time out. You can provision c6i.2xlarge
  CPU instances in 40 seconds (50 RPS capacity per instance, 150ms inference latency). Analyze the bottleneck
  and design a reactive scaling strategy to absorb the spike.
details:
  realistic_solution: Implement a hybrid spillover architecture. Route the baseline traffic to the GPU
    pool for cost efficiency. During a spike, dynamically scale up fast-starting CPU instances (overprovisioning
    to e.g., 150 instances to actively drain the initial queue build-up) to absorb the overflow. Once
    the heavier GPU nodes finish their 4-minute provisioning, shift traffic back and spin down the CPUs.
  common_mistake: Relying purely on GPU auto-scaling with highly aggressive thresholds, which still fails
    to absorb the 4-minute provisioning gap, or dismissing CPUs entirely due to their higher steady-state
    cost-per-inference.
  napkin_math: 'GPU gap: 5,000 RPS overflow * 240s = 1.2M requests queued. GPUs take 1.2M / 1,000 RPS
    = 1,200s to clear queue (massive SLA breach). To absorb and clear the spike, provision 150 CPUs (7,500
    RPS capacity). CPU gap: 5,000 RPS overflow * 40s = 200K requests queued. Once 150 CPUs are online,
    total capacity is 8,500 RPS against 6,000 RPS demand. The 2,500 RPS surplus clears the 200K queue
    in 80 seconds. A small pre-warmed CPU buffer can eliminate the initial 40s gap entirely.'
