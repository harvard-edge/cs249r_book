id: cloud-1425
title: Diagnosing HBM-to-SRAM Integration Bottlenecks in Attention
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are deploying a large Transformer model on an NVIDIA H100 GPU (80GB HBM3, 3.35 TB/s bandwidth).
  Profiling reveals that standard Attention kernels are severely underutilizing the 989 TFLOPs (FP16)
  Tensor Cores. Furthermore, power consumption spikes during data transfers between HBM and SRAM rather
  than during matrix multiplications. How do you analyze this integration bottleneck, and what algorithmic
  or architectural optimization is required to keep the compute units fed?
details:
  realistic_solution: Implement an IO-aware fused attention kernel like FlashAttention that tiles the
    Q, K, and V matrices to fit in the GPU's SRAM (shared memory). By computing softmax incrementally
    in SRAM, the 4096x4096 intermediate attention matrix (~33.5MB per head) never materializes to HBM.
    Across 32 heads, this saves ~4.2GB of HBM traffic per layer, bypassing the memory bandwidth bottleneck
    and allowing the 989 TFLOPS compute to be utilized.
  common_mistake: Candidates often suggest simply increasing batch size, buying faster HBM, or pruning
    the model, missing that the fundamental issue is the O(N^2) intermediate attention matrix being materialized
    to HBM when it could remain in SRAM through tiled computation.
  napkin_math: 'Standard attention (N=4096, d=128): Intermediate attention matrix S = Q*K^T is 4096x4096.
    Storing S in FP16 takes 4096*4096*2 = 33.5 MB. Reading/writing this to HBM for softmax and V-multiplication
    requires ~134 MB of HBM traffic per head. Fusing operations and keeping this in SRAM saves ~134 MB
    of HBM bandwidth per head. Across 32 heads, this saves ~4.2 GB of HBM traffic per layer, bypassing
    the integration bottleneck.'
