id: cloud-1244
title: Diagnosing Overconfident Predictions in Cloud Inference
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your medical imaging classification service, running on a fleet of T4 GPUs, achieves an impressive
  94% top-1 accuracy. However, the downstream risk-routing system, which flags cases with <90% model confidence
  for human review, is barely routing any cases. You measure the Expected Calibration Error (ECE) using
  10 bins and find it is unusually high at 0.18. Diagnose the root cause of this failure and propose a
  low-latency, post-hoc fix to calibrate the predictions without retraining.
details:
  realistic_solution: Diagnose that high-capacity deep networks naturally push logits to extremes. Apply
    Temperature Scaling by learning a single scalar parameter T on a validation set to divide the logits
    before softmax, preserving 94% accuracy while reducing ECE to <0.02.
  common_mistake: Assuming the model needs retraining with label smoothing or a custom loss, which is
    computationally expensive and delays deployment.
  napkin_math: 'For a bin with 1,000 samples: avg confidence = 0.98, actual accuracy = 0.85. Bin penalty
    = (1000 / N) * |0.85 - 0.98| = (1000 / N) * 0.13. With T=1.5, a logit vector [5.0, 2.0] becomes [3.33,
    1.33], softening the softmax output from [0.95, 0.05] to [0.88, 0.12].'
