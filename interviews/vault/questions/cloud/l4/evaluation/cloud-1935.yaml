id: cloud-1935
title: Diagnosing Staged Data Pipeline Starvation
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'A team is training a multimodal vision model on an AWS P4d instance (8x A100 GPUs, 96 CPU cores).
  The PyTorch training loop yields a step time of 210ms. Profiling reveals the following distinct stage
  latencies per step: NVMe I/O and CPU JPEG decoding takes 90ms, PCIe Host-to-Device (HtoD) transfer takes
  20ms, and GPU forward/backward compute takes 100ms. The GPU SM active time is hovering around ~47%.
  The pipeline is currently implemented as a sequential data loop without pinned memory. Analyze the pipeline
  stall and propose a mechanism to maximize hardware utilization.'
details:
  realistic_solution: Implement an asynchronous, overlapping pipeline using double buffering. Allocate
    page-locked (pinned) memory on the host and use non-blocking PCIe DMA transfers. This allows the CPU,
    PCIe bus, and GPU to work on batches N+2, N+1, and N simultaneously.
  common_mistake: Candidates often suggest scaling up hardware (e.g., upgrading CPUs or using faster NVMe
    drives) or reducing model complexity, failing to recognize that the distinct hardware stages are executing
    sequentially rather than concurrently.
  napkin_math: 'Sequential Step Time = T_cpu + T_pcie + T_gpu = 90ms + 20ms + 100ms = 210ms.


    Pipelined Step Time = max(T_cpu, T_pcie, T_gpu) = max(90, 20, 100) = 100ms.


    GPU Utilization improves from 47.6% (100/210) to 100% (100/100), yielding a 2.1x throughput speedup.'
