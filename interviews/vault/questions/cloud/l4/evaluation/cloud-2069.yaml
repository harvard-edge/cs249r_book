title: The Multi-Objective Experiment Frontier
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Your experiment tracking dashboard shows 500 completed experiments for a language model fine-tuning
  project. Each experiment has three metrics: accuracy, inference latency, and model size. Your production
  constraints are: accuracy > 85%, latency < 100ms, model size < 2GB. Only 12 experiments meet all three
  constraints. Of those 12, how do you systematically choose the best model? The PM wants ''the most accurate
  one'' but the SRE team wants ''the fastest one.'''
details:
  realistic_solution: 'Construct the Pareto frontier across the 3 objectives within the feasible region.
    A model is Pareto-optimal if no other model is better on all three metrics simultaneously. Typically,
    3-5 of the 12 feasible models will be on the Pareto frontier. Then apply a structured selection criterion:
    (1) Identify the knee point — the model where marginal accuracy gains require disproportionate latency/size
    costs. (2) Add safety margins: prefer models at 80ms over 99ms latency, because production load spikes
    can push latency over the SLA. (3) Consider operational metrics: smaller models are cheaper to serve
    and faster to deploy. The answer is rarely ''the most accurate'' or ''the fastest'' — it is the model
    with the best accuracy per unit of operational risk.'
  common_mistake: Picking the model with the highest accuracy among the 12 feasible candidates without
    considering the Pareto frontier. The most accurate feasible model might be at 99ms latency (barely
    meeting the SLA), creating no safety margin.
  napkin_math: '12 feasible models → ~4 Pareto-optimal. If the best-accuracy model is 88% acc / 99ms /
    1.8GB and the knee-point model is 87% acc / 60ms / 1.2GB: you trade 1% accuracy for 39ms latency margin
    and 0.6GB size reduction. At 10,000 QPS, the smaller model saves 10,000 × 39ms = 390 GPU-seconds/second
    of compute overhead during traffic spikes.'
