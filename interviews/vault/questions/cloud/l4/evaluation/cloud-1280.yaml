schema_version: 1
id: cloud-1280
title: Diagnosing Limp-Ware Fault Models in Synchronous Training
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A 1024-GPU A100 cluster is training a 70B parameter model using strictly synchronous 3D parallelism.
  The cluster orchestrator relies on a classic "fail-stop" fault model, restarting nodes only when daemon
  heartbeats fail. However, overall training throughput intermittently drops by >40% for hours at a time,
  despite all nodes reporting as "healthy". Log analysis reveals a degraded PCIe Gen4 link on a single
  node causing it to operate at 8 GB/s instead of 32 GB/s, creating a severe straggler. Analyze this failure
  by defining a more comprehensive fault model and propose a mechanism to convert this failure mode into
  one the orchestrator can natively handle.
details:
  realistic_solution: Adopt a 'fail-slow' performance fault model where faults manifest as continuous,
    node-level bandwidth degradation rather than binary crashes. Implement inline NCCL performance monitors;
    if an operation's latency exceeds 2x the median for a sustained duration (e.g., 10 consecutive steps),
    intentionally panic the node. This active detection converts the unmanageable fail-slow fault into
    a standard fail-stop fault, allowing the orchestrator to automatically replace it and resume from
    the last checkpoint.
  common_mistake: Assuming all faults manifest as 'fail-stop' (binary up/down) and relying solely on node
    heartbeats, ignoring 'fail-slow' or continuous performance anomaly fault models that dominate and
    cripple large-scale synchronous systems.
  napkin_math: Assume a normal training step takes 200ms (150ms compute + 50ms communication). If one
    node's PCIe bandwidth degrades from 32 GB/s to 8 GB/s (4x slower), its communication phase increases
    to 50ms * 4 = 200ms. The straggler's new step time is 150 + 200 = 350ms. Due to the strictly synchronous
    synchronization barrier (T_step = max(T_i)), the entire 1024-GPU cluster must wait, increasing the
    global step time to 350ms and dropping throughput by ~43% (200/350).
