id: cloud-2316
title: Optimizing FP8 Formats for LLM Training
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are migrating a 175B parameter LLM training job on a 1024-GPU H100 cluster from BF16 to
  FP8 to increase throughput from 140 TFLOPs/GPU to 280 TFLOPs/GPU. You must map the FP8 formats (E4M3
  and E5M2) to the forward pass activations, backward pass gradients, and weight updates. Incorrect mapping
  causes immediate loss divergence.
details:
  realistic_solution: In FP8 training, representational requirements differ fundamentally between passes.
    Activations and weights in the forward pass require high precision to maintain model quality, but
    have a relatively bounded dynamic range. Thus, E4M3 (4 exponent bits, 3 mantissa bits) is optimal,
    providing higher precision. Conversely, gradients in the backward pass exhibit a massive dynamic range
    (often spanning 4-5 orders of magnitude) and are highly susceptible to underflow. Therefore, E5M2
    (5 exponent bits, 2 mantissa bits) is required for gradients to prevent underflow to zero. Weights
    must still be kept in higher precision (FP32 or BF16) for the master copy to accumulate tiny optimizer
    updates safely.
  common_mistake: Using E4M3 for both forward activations and backward gradients to maximize precision.
  napkin_math: E4M3 max value = 448, min subnormal = 2^-9 (approx 0.0019). E5M2 max = 57344, min subnormal
    = 2^-16 (approx 1.5e-5). Deep network gradients routinely hit 1e-4, which underflows to exactly 0.0
    in E4M3, freezing training. E5M2 safely captures down to 1.5e-5.
