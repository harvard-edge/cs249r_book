schema_version: 1
id: cloud-fill-04000
title: MoE Expert Routing Overhead on H100
topic: mixture-of-experts
status: published
provenance: imported
scenario: You are running a 64-expert Mixtral-style MoE model on 8x H100 (80GB HBM3, 3.35 TB/s). Each
  token activates top-2 experts. Your gating network adds a softmax over 64 logits per token, and you
  observe that the router overhead is eating 12% of your step time on a 4096-token batch. You need to
  reduce this without changing the number of experts.
details:
  realistic_solution: Switch to token-choice routing with a hard top-k argmax after a single linear projection,
    fusing the router into a single kernel. Replace full softmax with a top-k-only implementation (compute
    partial softmax over only k=2 candidates after cheap linear scoring). This cuts router FLOPs by ~32x.
  common_mistake: Teams profile the expert FFNs and ignore the gating softmax, assuming it is free. At
    scale, a full 64-way softmax over a 4096-token batch is 4096×64 = 262,144 floating-point operations
    per gating step, repeated every layer.
  napkin_math: 'Naive router: 4096 tokens × 64 experts × 2 (linear + softmax) ≈ 0.5 MFLOPs/layer. With
    top-2 hard routing: 4096 × 64 (linear) + 4096 × 2 (softmax over 2) ≈ 0.27 MFLOPs/layer. Router overhead
    drops from 12% to ~6% without accuracy loss in most MoE literature.'
