id: cloud-fill-01265
title: 'TPU-Powered Recommendation System: Diagnosing Data & Concept Drift'
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are operating a critical real-time recommendation system, deployed on a cluster of Google
  TPU v5e devices, each with 16 GB HBM, 197 TFLOPS BF16, and 1.6 TB/s memory bandwidth. Recently, you've
  observed a significant drop in recommendation quality, despite no changes to the model architecture
  or code. Your initial telemetry shows increased inference latency and a noticeable shift in the input
  data distribution compared to the training data. The model is consuming terabytes of streaming data
  daily. How would you analyze and diagnose the root cause of this performance degradation, specifically
  considering data drift, concept drift, and potential training-serving skew given the high-throughput,
  low-latency requirements of the TPU environment?
details:
  realistic_solution: Implement a multi-stage drift detection pipeline. For real-time monitoring, use
    lightweight, sampling-based statistical tests (e.g., A/B testing on input features, simplified PSI,
    or population stability index) on a dedicated, scalable monitoring service (e.g., Google Cloud Dataflow,
    Pub/Sub with custom metrics) that can process data streams in parallel to the TPU inference. For deeper
    analysis, periodically run more computationally intensive methods (e.g., KL divergence, adversarial
    validation, or maximum mean discrepancy) on batch samples of data, potentially leveraging separate
    compute resources like GPUs or larger CPU clusters. Utilize feature stores for versioning data and
    ensuring consistency between training and serving. Integrate drift alerts with automated model retraining/revalidation
    workflows to maintain model reliability.
  common_mistake: Ignoring the computational overhead of continuous statistical monitoring on high-volume,
    high-velocity data streams, leading to delayed detection or resource contention on inference infrastructure.
    Another common mistake is not distinguishing between data drift and concept drift, which can lead
    to misdiagnosed problems and ineffective solutions.
  napkin_math: If your recommendation system processes 100,000 queries per second, and each query generates
    1KB of feature data, what is the total data volume (in GB/hour) that needs to be monitored for drift?
    If a KL divergence calculation for a critical feature vector (e.g., 512 dimensions) takes 100ms on
    a single CPU core, how many such calculations could a single CPU core perform per second, and what
    would be the implications for real-time monitoring of all features at this scale versus a sampling
    approach?
