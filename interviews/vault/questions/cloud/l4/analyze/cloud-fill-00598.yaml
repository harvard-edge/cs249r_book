id: cloud-fill-00598
title: Optimizing LLM Inference Energy on AMD MI300X
topic: energy-per-operation
status: published
provenance: imported
scenario: You are tasked with optimizing the energy efficiency of a large language model (LLM) inference
  workload running on an AMD MI300X accelerator, which features 192 GB HBM3 and 5.3 TB/s memory bandwidth,
  alongside 1,307 TFLOPS FP16 sparse compute. During initial profiling, you notice that while the FP16
  sparse TFLOPS are impressive, the observed performance in terms of tokens/second is lower than anticipated,
  and the total energy consumption per inference is higher than benchmarks on other architectures. Explain
  why the system might be exhibiting this behavior, considering the Horowitz energy table, the relative
  energy costs of memory access vs. compute, and how energy-aware operator selection could alleviate the
  issue.
details:
  realistic_solution: To address this, one should first analyze the roofline model for the workload on
    the MI300X to determine if it's compute-bound or memory-bound. Implement techniques like operator
    fusion (e.g., fusing element-wise operations with matrix multiplications) to reduce HBM3 accesses.
    Furthermore, employ energy-aware operator selection by profiling different kernel implementations
    (e.g., varying tiling strategies, sparse vs. dense kernels) and quantization levels (e.g., FP8, INT8)
    to minimize data movement and utilize the sparse compute capabilities more effectively. Prioritize
    reducing data movement even if it means slightly more compute, as the energy cost of HBM3 access often
    dwarfs that of on-chip arithmetic.
  common_mistake: Failing to recognize that despite high theoretical TFLOPS, many LLM inference workloads
    on memory-bound devices like the MI300X are constrained by the 5.3 TB/s HBM3 bandwidth, not compute.
    Developers often focus solely on FLOPs without considering the disproportionately high energy cost
    of data movement (e.g., loading weights from HBM3) compared to arithmetic operations.
  napkin_math: 'Consider the energy cost disparity: a typical 8-bit integer MAC operation might consume
    ~0.2 pJ, while an HBM3 memory access can cost ~5-10 pJ per bit. For FP16 data, this gap is even wider.
    If an operation requires 1000 FP16 FLOPs but necessitates loading 100 bytes from HBM3, the energy
    cost of memory access (100 bytes * 8 bits/byte * 5 pJ/bit = 4000 pJ) could far outweigh the compute
    energy (1000 FLOPs * 0.5 pJ/FLOP = 500 pJ), making it memory-bound and energy-inefficient. The MI300X''s
    5.3 TB/s HBM3 bandwidth translates to ~2.65 TB/s for FP16 data (read+write), which is significantly
    lower than the 1,307 TFLOPS FP16 sparse compute capacity if each FLOP required new data.'
