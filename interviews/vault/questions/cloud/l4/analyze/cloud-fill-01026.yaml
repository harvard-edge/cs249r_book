id: cloud-fill-01026
title: Optimizing LLM Pipeline Parallelism on AMD MI300X with Micro-batching and Interleaving
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You are tasked with deploying a large language model (LLM) consisting of 8 sequential layers
  onto a cluster of 8 AMD MI300X GPUs. Each MI300X boasts 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute
  capability, and 5.3 TB/s memory bandwidth. You've opted for a pipeline parallel strategy, mapping one
  LLM layer to each GPU. Initially, you're processing requests with a global batch size of 1, leading
  to significant GPU underutilization due to 'pipeline bubbles'. To improve throughput, you're considering
  implementing micro-batching and an interleaved schedule (e.g., GPipe or PipeDream variant). Describe
  how pipeline bubbles manifest in this specific setup, analyze the trade-offs of choosing an appropriate
  micro-batch size given the MI300X's specifications, and explain how an interleaved schedule would theoretically
  improve system throughput. Provide a quantitative estimate of the potential throughput improvement with
  an interleaved schedule compared to a naive pipeline-parallel approach when processing a continuous
  stream of requests.
details:
  realistic_solution: Implement an interleaved pipeline scheduling strategy (e.g., similar to GPipe or
    PipeDream) to overlap computation and communication, effectively hiding pipeline bubbles for continuous
    workloads. Dynamically adjust the micro-batch size based on profiling to find the sweet spot that
    maximizes the MI300X's 1,307 TFLOPS FP16 sparse compute utilization without saturating the 5.3 TB/s
    HBM3 memory bandwidth or exceeding the 192 GB HBM3 capacity per GPU. Furthermore, ensure balanced
    computational load across the 8 stages to prevent a single bottleneck.
  common_mistake: A common mistake is underestimating the impact of pipeline bubbles, especially with
    smaller global batch sizes or unbalanced stage computations, leading to significant GPU idle times.
    Another mistake is selecting an arbitrary micro-batch size without considering the MI300X's compute-to-memory
    bandwidth ratio, potentially causing either underutilization (too small micro-batch for 1,307 TFLOPS
    FP16 sparse) or excessive memory pressure/increased latency (too large micro-batch saturating 5.3
    TB/s HBM3 bandwidth or exceeding 192 GB HBM3 capacity).
  napkin_math: Consider 'P' pipeline stages (P=8) and a global batch divided into 'M' micro-batches. Let
    't' be the time taken to process one micro-batch on a single stage. In a naive pipeline-parallel setup
    without interleaving, the effective time to process 'M' micro-batches in a continuous stream is roughly
    `(P + M - 1) * t`, assuming perfectly balanced stages. The effective throughput is `M / ((P + M -
    1) * t)` micro-batches per unit time. With an ideal interleaved schedule, once the pipeline is filled,
    a micro-batch completes every 't' time units. Thus, the effective throughput approaches `1 / t` micro-batches
    per unit time for a continuous stream. The potential throughput improvement factor of an interleaved
    schedule over a naive one is approximately `(1 / t) / (M / ((P + M - 1) * t)) = (P + M - 1) / M`.
    For instance, if M=4, the improvement is `(8 + 4 - 1) / 4 = 11 / 4 = 2.75x`. This demonstrates how
    interleaved scheduling significantly boosts throughput by reducing idle time.
