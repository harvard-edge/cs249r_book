id: cloud-fill-01094
title: Optimizing LLM Inference Routing on AMD MI300X Cluster
topic: load-balancing
status: published
provenance: imported
scenario: You are tasked with optimizing a high-performance inference serving system for a large language
  model (LLM) deployed across a cluster of AMD MI300X accelerators. Each MI300X unit is equipped with
  192 GB HBM3 memory, delivers 1,307 TFLOPS FP16 sparse compute, and boasts a memory bandwidth of 5.3
  TB/s. The system receives a high volume of inference requests, which vary significantly in input size
  and computational demands. Your current load balancing solution, a simple round-robin, is leading to
  observed increases in tail latency and noticeable uneven utilization across your MI300X cluster, preventing
  you from achieving target throughput and efficiency.
details:
  realistic_solution: A realistic solution would involve a dynamic, load-aware routing mechanism. This
    could employ consistent hashing for stable mapping of requests to accelerators, augmented with real-time
    feedback from each MI300X unit. Each accelerator would report metrics such as GPU utilization, HBM3
    memory usage, and current request queue depth. The load balancer would then use this data, potentially
    combined with a heuristic or a learned model to predict request processing time based on input features,
    to intelligently route incoming requests. For instance, requests could be prioritized to instances
    with lower queue depths or higher available compute capacity, effectively leveraging the 192 GB HBM3
    per device for efficient model serving and preventing any single MI300X from becoming overloaded.
  common_mistake: A common mistake is to overlook the variability in inference request processing times,
    especially with LLMs where prompt and generation lengths differ. Applying naive load balancing methods
    like simple round-robin without real-time feedback or an understanding of request complexity often
    results in 'hot' accelerators that become bottlenecks, leading to increased queueing, higher tail
    latencies, and overall underutilization of the cluster's impressive compute (1,307 TFLOPS FP16 sparse)
    and memory bandwidth (5.3 TB/s) capabilities.
  napkin_math: 'Consider a cluster of 10 AMD MI300X units. If an average LLM inference request takes 150ms
    on a lightly loaded MI300X. A simple round-robin balancer might result in one MI300X instance consistently
    processing 20% more requests than the cluster average due to workload fluctuations. If this overloaded
    MI300X''s average processing time increases to 180ms (due to queueing effects), quantify the percentage
    decrease in the overall cluster''s maximum sustainable QPS (Queries Per Second) compared to an ideal,
    perfectly balanced scenario where all units maintain 150ms average latency. (Answer: Approximately
    1.7% decrease in QPS).'
