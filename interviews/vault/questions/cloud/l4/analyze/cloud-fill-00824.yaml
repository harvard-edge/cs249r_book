title: H100 Performance Bottlenecks with Structured vs. Unstructured Pruning
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are deploying a large language model on an NVIDIA H100 GPU (80 GB HBM3, 989 TFLOPS FP16
  dense, 3.35 TB/s memory bandwidth, 700W TDP). You've applied aggressive pruning to the model to reduce
  its size and improve inference speed. However, you observe that despite a high sparsity level, the actual
  inference speedup on the H100 is significantly less than theoretically expected based on the reduced
  FLOPs. Specifically, you have explored both unstructured (fine-grained) and structured (block-wise)
  pruning techniques. Explain why the H100 might not be achieving the expected speedup, particularly considering
  its architecture and memory access patterns, and how the choice between structured and unstructured
  pruning impacts this observation.
details:
  realistic_solution: A realistic solution involves favoring structured pruning techniques that produce
    sparsity patterns (e.g., 2:4 sparsity, block sparsity) that are explicitly supported and optimized
    by the NVIDIA H100's Tensor Cores and its accompanying software stack (e.g., cuBLAS, cuSPARSE). This
    allows the hardware to skip zeros efficiently, leading to better utilization of the 989 TFLOPS FP16
    dense compute capability and effective use of the 3.35 TB/s HBM3 memory bandwidth. Furthermore, compilers
    and runtimes should be used to fuse operations and minimize kernel launch overheads for sparse computations.
  common_mistake: A common mistake is to assume that a reduction in FLOPs directly translates to a proportional
    speedup, without considering the practical implications of memory access patterns, data locality,
    and the efficiency of sparse tensor operations on specific hardware. Unstructured sparsity can lead
    to highly irregular memory accesses, underutilizing the H100's massive memory bandwidth and powerful
    tensor cores.
  napkin_math: If a model achieves 90% unstructured sparsity, but the sparse operations are not highly
    optimized for the H100, the effective throughput might only be 2x-3x higher than the dense model due
    to memory bound operations and inefficient sparse kernel execution. Conversely, with 2:4 structured
    sparsity (common for NVIDIA GPUs), a 50% reduction in computations can often translate to closer to
    a 1.5x-1.8x actual speedup, because the H100's hardware can efficiently exploit these patterns, approaching
    the theoretical 2x speedup in compute-bound scenarios, especially when leveraging the 989 TFLOPS FP16
    dense capability. The challenge lies in balancing the achievable sparsity ratio with hardware-friendly
    patterns.
