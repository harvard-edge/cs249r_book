schema_version: 1
id: cloud-fill-04024
title: Online vs Offline Feature Store Consistency Tradeoffs
topic: feature-store-management
status: published
provenance: imported
scenario: 'Your recommendation model uses 200 features: 50 real-time user interaction features (updated
  every 5 seconds) and 150 batch-computed item features (updated nightly). You serve 50K requests/second
  with a 20ms SLO. The online store (Redis) holds real-time features. The offline store (Hive) computes
  batch features. You observe 0.8% of requests return stale batch features >24h old. Diagnose and fix.'
details:
  realistic_solution: 'Add feature freshness metadata: each feature row includes a `written_at` timestamp.
    The serving layer checks staleness on read; if stale > threshold, use feature defaults or a lightweight
    real-time fallback (e.g., category-level average from a fast lookup table). Add SLA alerts: page on-call
    if batch pipeline doesn''t complete within 2h of its scheduled time. Implement materialization health
    checks before promoting new feature values.'
  common_mistake: Assuming the nightly batch pipeline reliably completes and writes to the online store
    before serving traffic resumes. Pipeline delays (compute cluster overload, schema changes) cause the
    online store to serve stale features without any freshness check or fallback.
  napkin_math: '50K RPS × 0.8% stale = 400 stale feature requests/second. At 20ms SLO: each stale response
    risks model quality degradation (CTR drop estimated 2-5% from literature for stale recommendations).
    Revenue impact: 400 RPS × 2% CTR drop × $0.002/click × 86,400s/day = $1,382/day. Redis read latency:
    0.1ms for a 200-feature hash get. At 50K RPS: 50K × 0.1ms = 5 Redis operations/ms → Redis at ~5,000
    ops/ms needs 3-node cluster.'
