id: cloud-new-50018
title: TPU v5e SPMD Programming Model vs CUDA's SIMT
topic: software-portability
status: published
provenance: imported
scenario: A team accustomed to CUDA's SIMT (Single Instruction Multiple Threads) model is porting a custom
  sparse attention kernel to TPU v5e. They struggle because TPUs use SPMD (Single Program Multiple Data)
  with systolic arrays. What are the key conceptual shifts?
details:
  realistic_solution: 'Three key shifts: (1) From thread-level to tile-level: instead of each thread computing
    one output element, each MXU operation processes a 128x128 tile. Express computation as matrix multiplications,
    not per-element ops. (2) From shared memory to VMEM: TPU''s vector memory (VMEM, 16MB per core on
    v5e) replaces CUDA''s shared memory, but it is managed by the compiler, not the programmer. (3) From
    warp divergence to masking: sparse attention on TPU requires padding sparse patterns to dense tiles
    and using mask matrices, not conditional execution. Performance depends on sparsity pattern regularity.'
  common_mistake: Trying to express thread-level parallelism on TPU. TPUs don't have threads — they have
    a 2D systolic array that processes matrix tiles. Thinking in terms of thread blocks and warps leads
    to fundamentally wrong kernel designs.
  napkin_math: 'TPU v5e MXU: 128x128 systolic array at ~197 TFLOPS BF16. For sparse attention with 50%
    sparsity: you still process full 128x128 tiles but mask 50%, so effective throughput is ~98.5 TFLOPS.
    CUDA can skip sparse blocks entirely, potentially 2x more efficient for unstructured sparsity.'
