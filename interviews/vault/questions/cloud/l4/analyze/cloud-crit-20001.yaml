schema_version: 1
id: cloud-crit-20001
title: FlashAttention IO Complexity vs Standard Attention
topic: flash-attention
status: published
provenance: imported
scenario: Standard attention on an A100 (2 TB/s HBM bandwidth) materializes the full N x N attention matrix
  to HBM. For a sequence length N=8192 and head_dim=128 with 32 heads in FP16, compare the HBM IO bytes
  of standard attention vs FlashAttention and estimate the wall-clock difference.
details:
  realistic_solution: 'Standard attention materializes S = Q @ K^T (8192 x 8192 x 2B = 128MB per head,
    x32 heads = 4GB), writes it, reads it back for softmax, writes softmax output, reads it for V multiply.
    Total IO ~ 4 x 4GB = 16GB per layer. FlashAttention never materializes S; it streams Q, K, V tiles
    through SRAM. IO = O(N * d) per head = 8192 x 128 x 2B x 3 (Q+K+V) x 32 heads = 192MB. Speedup from
    IO alone: 16GB / 192MB ~ 83x. At 2TB/s, standard = 8ms, FlashAttention = 0.1ms per layer.'
  common_mistake: Only counting the attention matrix write and forgetting the reads of Q, K, V and the
    read-back of the attention matrix for the V multiplication — standard attention has 2 full round-trips
    of the N x N matrix.
  napkin_math: 'Standard IO: 4 x (8192^2 x 2B x 32) = 16GB. FlashAttention IO: 3 x (8192 x 128 x 2B x
    32) = 192MB. Ratio: ~83x. At 2TB/s: 8ms vs 0.1ms.'
