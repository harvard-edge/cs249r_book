schema_version: 1
id: cloud-fill-02016
title: Cooling Bottleneck Analysis for Dense H100 GPU Rack
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A standard 42U rack contains 8 HGX H100 nodes (8×H100 each = 64 GPUs total). Each GPU draws
  700W; each node draws ~10.5kW including CPUs and networking. The rack's PDU supports 30kW and CRAC cooling
  supports 25kW per rack. Diagnose the bottleneck and determine the maximum utilizable rack density.
details:
  realistic_solution: '8 nodes × 10.5kW = 84kW peak per rack. Both PDU (30kW) and cooling (25kW) are far
    below peak. Maximum utilizable: cooling-limited at 25kW → 25/10.5=2.4 nodes at 100%, or 8 nodes at
    25/84=30% GPU utilization. For training (sustained 100% GPU), use at most 2-3 HGX nodes per rack with
    in-row liquid cooling. Modern liquid-cooled racks handle 100kW+ enabling full density.'
  common_mistake: Planning for peak GPU TDP without including CPU, memory, networking, and PSU overhead;
    hitting cooling limits before power limits.
  napkin_math: 64 GPUs × 700W = 44.8kW GPU-only. 8 nodes × 10.5kW = 84kW total. Cooling limit 25kW → 25/84=29.8%
    utilization ceiling with air cooling. Liquid cooling (rear-door heat exchanger) can remove 60-80kW
    → 71-95% utilization achievable.
