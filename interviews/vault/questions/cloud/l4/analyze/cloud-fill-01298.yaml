schema_version: 1
id: cloud-fill-01298
title: Graceful Degradation for LLM Inference on AMD MI300X
topic: graceful-degradation
status: published
provenance: imported
scenario: A financial services company deploys a critical large language model (LLM) for real-time fraud
  detection. This LLM is served on a cluster of AMD MI300X accelerators, each featuring 192 GB HBM3 memory,
  1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth. During peak transaction periods, the
  system experiences significant load spikes, occasionally pushing individual MI300X GPUs to their limits,
  leading to increased latency and potential timeouts for critical inference requests. Design a comprehensive
  graceful degradation strategy for this system. Explain how you would implement degradation ladders,
  model fallbacks (fail-safe vs fail-operational), and quality-of-service shedding, specifically leveraging
  the architectural characteristics of the AMD MI300X.
details:
  realistic_solution: "The solution involves a multi-tier degradation ladder: \n1. **Normal Operation\
    \ (L0):** Serve the primary, high-fidelity LLM (e.g., FP16 precision, ~140GB for a 70B model) leveraging\
    \ the full 192 GB HBM3 and 1,307 TFLOPS FP16 compute for optimal performance and quality. \n2. **Mild\
    \ Congestion (L1 - Quality-of-Service Shedding):** If latency or queue depth exceeds thresholds, switch\
    \ to a quantized version of the same LLM (e.g., INT4 or FP8). This significantly reduces memory footprint\
    \ (e.g., 35GB for INT4 70B model) and potentially increases throughput by allowing larger batch sizes\
    \ or more concurrent inferences per MI300X, exploiting its 5.3 TB/s memory bandwidth more efficiently,\
    \ while accepting a minor quality reduction. \n3. **High Congestion (L2 - Fail-Operational Fallback):**\
    \ If L1 is insufficient, trigger a fallback to a smaller, pre-trained, distilled LLM that is faster\
    \ and requires even less memory (e.g., a 7B parameter model). This maintains core fraud detection\
    \ functionality (fail-operational) at reduced accuracy/comprehensiveness, ensuring critical transactions\
    \ are still processed. \n4. **Extreme Congestion (L3 - Fail-Safe Fallback):** For non-critical requests\
    \ or during catastrophic resource failure, route requests to a highly optimized, extremely lightweight\
    \ heuristic model or a cached 'no fraud detected' default. This is a fail-safe measure, ensuring a\
    \ response, even if minimal. Each transition is governed by real-time monitoring of MI300X utilization,\
    \ HBM3 pressure, and inference latencies, with intelligent load balancers routing traffic to appropriate\
    \ model versions."
  common_mistake: A common mistake is to only rely on horizontal scaling without considering the cost,
    cold-start issues, or the inherent variability of user demand. Another is to simply queue requests,
    leading to unbounded latency, or to use an 'all-or-nothing' approach where the service either performs
    optimally or fails entirely, rather than systematically reducing quality to maintain availability.
    Overlooking the potential for mixed-precision inferencing on hardware like the MI300X to serve as
    a degradation step is also frequent.
  napkin_math: '- **FP16 70B Model:** ~140GB VRAM (fits in 192GB HBM3). At 1,307 TFLOPS (FP16), processing
    per token could be ~140/1,307 TFLOPS = ~107 seconds theoretical max without batching (simplified for
    concept). Realistically, throughput would be much lower, but demonstrates compute capacity.

    - **INT4 70B Model:** ~35GB VRAM. This frees up ~157GB on the MI300X, potentially allowing 2-3 instances
    of the INT4 model or significantly larger batch sizes. If INT4 operations are highly optimized on
    MI300X, throughput could be ~4x higher than FP16 (ignoring sparse benefit for now).

    - **HBM3 Bandwidth:** 5.3 TB/s. A 70B FP16 model (140GB) would take 140GB / 5.3 TB/s = ~26 ms to read
    entirely from HBM3, setting a lower bound on memory-bound operations. Quantization reduces the data
    moved, improving effective latency under memory bandwidth constraints.

    - **Fallback Model:** A 7B FP16 model would be ~14GB. Multiple instances could run concurrently, or
    it could run significantly faster, potentially achieving ~10x lower latency than the 70B FP16 model
    on the same hardware, providing a critical buffer during peak load.'
