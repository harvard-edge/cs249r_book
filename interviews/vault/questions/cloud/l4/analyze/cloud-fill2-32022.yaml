id: cloud-fill2-32022
title: 'mmap vs Safetensors: Cold Start Optimization for Model Serving'
topic: memory-mapped-inference
status: published
provenance: imported
scenario: 'Your inference platform serves 50 different fine-tuned 7B models from a shared MI300X GPU pool.
  Models are stored as safetensors files (which support zero-copy mmap) on NVMe. When a cold request arrives
  for an unloaded model, you need sub-3-second cold start. Compare three approaches: (1) load from NVMe
  via read(), (2) mmap the safetensors file, (3) keep models in host RAM and cudaMemcpy on demand.'
details:
  realistic_solution: 'Approach 1 (NVMe read): 14 GB / 7 GB/s NVMe = 2.0s read + 14 GB / 64 GB/s (PCIe
    5.0 x16) = 0.22s to GPU. Total: ~2.2s. Meets target. Approach 2 (mmap safetensors): Maps instantly.
    With MAP_POPULATE or madvise(MADV_SEQUENTIAL), kernel prefetches pages. First copy to GPU triggers
    fault-in: ~2.5-3.5s cold (page fault overhead). But subsequent loads: if pages remain in page cache,
    <0.5s. Best for the multi-model scenario — the OS LRU page cache naturally keeps hot models in memory.
    Approach 3 (host RAM pool): Pre-load all 50 models = 50 × 14 GB = 700 GB host RAM. Expensive but zero
    cold start (just cudaMemcpy at 64 GB/s = 0.22s). Hybrid approach: mmap all 50 models, let OS page
    cache manage which are resident (~200 GB RAM for top-15 hot models), cold models fault-in from NVMe
    at ~2.5s. Cost-effective and self-tuning.'
  common_mistake: Ignoring that safetensors' zero-copy design aligns tensor data to page boundaries, making
    mmap efficient. Legacy formats like pickle-based .bin files require deserialization and cannot be
    mmap'd directly.
  napkin_math: '50 models × 14 GB = 700 GB total. Host RAM available: 256 GB. mmap + page cache: ~18 hot
    models fit. Cold start: 2.5s (mmap cold) vs 0.22s (cache hit). NVMe read: 2.0s + 0.22s = 2.2s consistent.'
