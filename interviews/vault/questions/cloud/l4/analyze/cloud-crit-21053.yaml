schema_version: 1
id: cloud-crit-21053
title: KV-Cache Growth in RAG Pipelines
topic: kv-cache-management
status: published
provenance: imported
scenario: 'Your RAG system retrieves 10 document chunks (each 512 tokens) and prepends them to the user
  query (256 tokens) before sending to Llama 3 70B. Total prompt: 5376 tokens. Users send follow-up questions
  that add another retrieval round. By turn 3, the context is 16,128 tokens. Analyze the KV-cache memory
  scaling and its impact on serving cost.'
details:
  realistic_solution: 'KV-cache growth per turn: Turn 1: 5,376 tokens × 320 KB = 1.72 GB. Turn 2: 10,752
    tokens × 320 KB = 3.44 GB. Turn 3: 16,128 tokens × 320 KB = 5.16 GB. At turn 3, each conversation
    consumes 5.16 GB — a single H100 (80 GB - 140 GB weights/2 GPUs = 10 GB available per GPU) supports
    only ~1-2 concurrent conversations. Cost impact: 10× more expensive per conversation than a 1K-context
    chatbot. Optimizations: (1) Prefix caching: if multiple users query the same documents, cache those
    documents'' KV entries (shared across users). If 70% of retrieved chunks are from a popular corpus,
    save 70% × 5120 tokens = 3584 tokens of redundant KV computation. (2) KV eviction for old retrieval:
    in turn 3, the 10 chunks from turn 1 may be irrelevant. Evict turn-1 retrieval KV (5120 tokens) and
    re-retrieve if needed. Reduces turn-3 KV to 10,752 tokens (3.44 GB). (3) Chunked attention: process
    retrieval chunks with local attention, only cross-attending at the final layer. Reduces KV for retrieved
    chunks by 80%.'
  common_mistake: Treating RAG retrieval context like user-generated text. RAG contexts are often partially
    shared across users (same documents) and can benefit from prefix caching, unlike user-specific conversation
    history.
  napkin_math: 'Per turn KV growth: 5376 tokens × 320 KB = 1.72 GB. 3 turns: 5.16 GB. Available HBM: ~10
    GB per GPU. Max concurrent (turn 3): 10/5.16 ≈ 1-2 conversations. With prefix caching (70% shared):
    1.72 - 0.7×1.64 = 0.57 GB new per turn. Cost reduction: ~3×.'
