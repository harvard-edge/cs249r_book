schema_version: 1
id: cloud-fill-03041
title: Tensor Parallelism Embedding Layer Split and Vocabulary Parallelism
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: A 7B model with 128K vocabulary size is being trained with TP=4 on MI300X (192GB HBM3). The
  embedding layer (128K * 4096 * 2 bytes = 1GB) and the output LM head (same 1GB) together consume 2GB.
  A team member suggests these can also be tensor-parallelized. Analyze the approach and communication
  pattern.
details:
  realistic_solution: 'Split vocabulary dimension: each GPU holds [32K, 4096] of the embedding matrix
    (128K/4 = 32K per GPU). During forward: each GPU gathers embeddings only for tokens in its vocabulary
    shard, then all-reduce across TP ranks to get the full embedding vector. This requires one all-reduce
    per embedding lookup. For the LM head: each GPU computes logits for its vocabulary shard, then all-gather
    for top-k sampling.'
  common_mistake: Splitting the vocabulary embedding along the embedding dimension (4096/4 = 1024 per
    GPU). This doesn't save memory in the vocabulary dimension and requires gathering partial embeddings
    before all downstream computations.
  napkin_math: '128K vocab, TP=4: 32K tokens/GPU * 4096 * 2 bytes = 256MB/GPU (vs 1GB for full embedding).
    Memory savings: 750MB/GPU. All-reduce for embedding: batch * seq * hidden_dim * 2 bytes = 8 * 2048
    * 4096 * 2 = 128MB. At MI300X NVLink bandwidth (not specified, assume similar to HBM: effectively
    5.3TB/s intra-device or ~600GB/s NVLink): 128MB/600GB/s = 0.21ms per step. 50K training steps: 0.21ms
    * 2 (fwd+bwd) * 50K = 21 seconds of communication for embeddings — entirely negligible.'
