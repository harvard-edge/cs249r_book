schema_version: 1
id: cloud-r2-40022
title: TPU v5e Congestion in ICI Fabric
topic: congestion-control
status: published
provenance: imported
scenario: Google's TPU v5e pods connect chips via ICI (Inter-Chip Interconnect) using a 3D torus topology,
  fundamentally different from the switched Clos fabrics used for GPU clusters. Each ICI link is 1.6 Tbps.
  Analyze how congestion management differs in a torus topology versus a Clos, specifically for AllReduce
  traffic patterns.
details:
  realistic_solution: 'Key differences: (1) No ECMP needed: in a torus, routing is deterministic (dimension-ordered
    routing — route in X, then Y, then Z). There are no equal-cost paths to load-balance across. (2) No
    switch buffers: each TPU chip has small on-chip buffers (~KB, not MB) for ICI traffic. Congestion
    causes backpressure directly to the source with ~10ns latency, not the μs-scale of switch-based PFC.
    (3) Hotspot routing: AllReduce in a torus uses dimension-ordered reduction — reduce along X-axis first
    (all chips in a row), then Y-axis (columns), then Z-axis (layers). A 256-chip 2D torus (16×16) has
    only 16 chips per row, making AllReduce within a dimension very fast but creating serialization across
    dimensions. (4) Congestion from cross-dimension traffic: when X-axis AllReduce completes and Y-axis
    begins, all 16 chips in a column simultaneously start sending, creating 16:1 incast on ICI links —
    managed by credit-based flow control at the hardware level, not PFC. TPU v5e achieves 197 TFLOPS at
    16GB HBM, so the compute-to-communication ratio favors larger batch sizes that reduce AllReduce frequency.'
  common_mistake: Applying Clos-based congestion control thinking (ECMP, PFC, switch buffers) to a torus.
    Torus topologies have no switches — traffic flows directly between chips through nearest-neighbor
    links, making congestion a routing problem rather than a buffering problem.
  napkin_math: 'ICI link: 1.6 Tbps = 200 GB/s per direction. 16-chip row AllReduce (ring): 2 × 15/16 ×
    200 GB/s = 375 GB/s effective. 2GB gradient AllReduce time along one dimension: 2GB / 375 GB/s = 5.3ms.
    Three dimensions serially: 3 × 5.3ms = 16ms. Versus GPU Clos (all dimensions parallel): 2GB / (7 ×
    400Gbps / 8) = 5.7ms. Torus is 2.8× slower for AllReduce but has no congestion from competing flows
    — it is a dedicated interconnect.'
