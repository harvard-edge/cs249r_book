id: cloud-r2-42028
title: Torus Topology and Nearest-Neighbor Communication
topic: interconnect-topology
status: published
provenance: imported
scenario: Google's TPU v5e pods use a 3D torus topology connecting 256 chips. Each chip has 6 inter-chip
  links. Explain why a torus is optimal for TPU's workload patterns and calculate the worst-case hop count
  and bandwidth for an AllReduce across all 256 chips compared to a fat-tree.
details:
  realistic_solution: 'Torus bisection bandwidth: each ring contributes 2 cut links (the ring is cut at
    2 points). 64 links × 200 Gbps = 12.8 Tbps (not 6.4 Tbps which only counts one cut per ring).'
  common_mistake: Assuming torus is always inferior to fat-tree because of lower bisection bandwidth.
    Torus excels when communication is predominantly nearest-neighbor (as in pipeline parallelism and
    2D-sharded matrix multiplications), which is exactly how TPUs operate.
  napkin_math: '3D torus bisection bandwidth: for an A×B×C torus cut along one dimension, the bisection
    cuts through A×B×C/2 × 2 links (each node on one side has links to the other side in one dimension).
    For a 2D torus N×N: bisection cuts N links in each of 2 rings = 2N links. For specific topology: 64
    links × 200 Gbps = 12.8 Tbps bisection (not 6.4 Tbps — the torus bisection cuts through each ring
    twice, doubling the count vs a simple cut).'
