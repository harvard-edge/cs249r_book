schema_version: 1
id: cloud-r2-40010
title: Weighted ECMP for Heterogeneous Link Speeds
topic: congestion-control
status: published
provenance: imported
scenario: After a partial link failure in your MI300X cluster, one spine switch has a degraded 400G link
  operating at 200G. Standard ECMP still distributes traffic equally across all paths including the degraded
  one. Analyze why ECMP fails here and what modifications are needed.
details:
  realistic_solution: 'Standard ECMP distributes flows uniformly across next-hops regardless of link capacity.
    With 4 spine uplinks (3 × 400G + 1 × 200G), ECMP sends 25% of flows to each, but the 200G link can
    only handle half the traffic of others. Solutions: (1) Weighted ECMP (W-ECMP): assign weight proportional
    to link capacity — the 200G link gets weight 1 while 400G links get weight 2, so it receives 1/7 of
    flows instead of 1/4. (2) On NVIDIA Spectrum-4 switches, use Adaptive Routing which monitors queue
    depth and steers traffic away from congested ports in real-time (~1μs reaction). (3) Drain the degraded
    link entirely and operate with 3 × 400G = 1.2 Tbps total spine bandwidth. For MI300X clusters running
    large AllReduce, option 3 is often preferred since the 1.2 Tbps is still sufficient and avoids the
    complexity of weighted hashing.'
  common_mistake: Assuming ECMP automatically adjusts for link speed differences. Standard ECMP is oblivious
    to link capacity — it only hashes flows across equal-cost paths. A 200G link receiving the same traffic
    as a 400G link will hit 100% utilization and drop packets while the 400G link sits at 50%.
  napkin_math: '4 uplinks equal: each gets 25% = 100Gbps per link for 400Gbps aggregate. With 1 link at
    200G: it can only handle 200G, but receives 100G under ECMP — actually fine at average load. The problem:
    with bursty AllReduce traffic, instantaneous demand can be 2-3× average, so the 200G link saturates
    while 400G links have headroom.'
