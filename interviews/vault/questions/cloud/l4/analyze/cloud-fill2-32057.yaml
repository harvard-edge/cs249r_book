id: cloud-fill2-32057
title: 'Capacity Factor Tuning: Quality vs Throughput'
topic: mixture-of-experts
status: published
provenance: imported
scenario: Your MoE model with 8 experts uses capacity factor C=1.5 during training. Each expert can process
  C × (tokens × top_k / num_experts) tokens. With a batch of 512 tokens and top-2 routing, each expert's
  capacity is 1.5 × 128 = 192 tokens. Your training is slow because experts average only 90 tokens (70%
  capacity utilization). Your colleague suggests reducing C to 1.0. Analyze the tradeoffs.
details:
  realistic_solution: 'At C=1.5: each expert has capacity 192. Average load 90 (47% of capacity). Wasted
    compute: the expert''s compute kernel runs on 192-slot buffers regardless of actual fill — zero-padded
    slots still incur matrix multiply overhead (unless using variable-length batching). Memory: 8 experts
    × 192 × hidden_dim × 2B = significant padding. At C=1.0: capacity = 128. Average load 90, but max
    load (with natural variance) might reach 150-160 tokens. Tokens exceeding 128 are dropped: ~10-15%
    token drop rate. This hurts training quality — those tokens only get contribution from their second
    expert (or none if both overflow). Optimal: C=1.1-1.2 balances waste vs drops. Better approach: use
    auxiliary load-balancing loss to enforce near-uniform routing, then you can safely reduce C. Switch-Transformer
    recommends C=1.25 with load balancing. GShard uses C=2.0 for training stability. The newer approach
    (Megablocks): variable-length expert computation with no padding, eliminating the capacity factor
    entirely.'
  common_mistake: Setting capacity factor to exactly 1.0 and assuming no tokens are dropped. With top-k
    routing and non-uniform distributions, even slight imbalances at C=1.0 cause tokens to overflow and
    be dropped.
  napkin_math: 'C=1.5: capacity=192, avg_fill=90, utilization=47%, 0% drops. C=1.0: capacity=128, avg_fill=90,
    ~12% drops (tokens above 128). C=1.2: capacity=154, avg_fill=90, <2% drops, 58% utilization. Megablocks
    (no padding): 100% utilization, 0% drops.'
