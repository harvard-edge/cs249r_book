schema_version: 1
id: cloud-sus-60000
title: Estimating activation memory for backward pass on H100 with large batch
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: You are training a 7B parameter transformer on H100 (80GB HBM, 3.35TB/s) with batch size 32
  and sequence length 2048. The model uses mixed precision (BF16). Activation checkpointing is not enabled.
  Your job is to estimate whether activations fit in memory before the backward pass begins.
details:
  realistic_solution: 'Estimate per-layer activation cost: for each transformer block, store Q/K/V projections,
    attention scores, MLP intermediates ≈ 12 × seq_len × d_model × batch × 2 bytes. For 7B model: 32 layers
    × 2048 × 4096 × 32 × 2 ≈ 34GB just for residual stream. Add attention matrices: 32 layers × 32 heads
    × 2048² × 32 × 2 bytes ≈ 64GB. Total exceeds 80GB. Enable activation checkpointing to trade recompute
    for memory.'
  common_mistake: Counting only parameter memory (7B × 2 bytes = 14GB) and forgetting that forward pass
    stores all intermediate activations for gradient computation. A 7B transformer with full activation
    storage can require 60-80GB of activations alone at batch=32, seq=2048.
  napkin_math: 'Residual stream: 32 × 2048 × 4096 × 32 × 2B ≈ 34GB. Attention matrices: 32 × 32 × 2048²
    × 32 × 2B ≈ 64GB. Total ≈ 98GB >> 80GB HBM. Must use activation checkpointing or reduce batch.'
