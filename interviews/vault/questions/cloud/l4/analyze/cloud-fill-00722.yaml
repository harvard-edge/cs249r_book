schema_version: 1
id: cloud-fill-00722
title: LLM Deployment Feasibility on AMD MI300X
topic: model-size-estimation
status: published
provenance: imported
scenario: You are tasked with deploying a 70-billion parameter Large Language Model (LLM) for real-time
  inference on a system equipped with an AMD MI300X accelerator. The MI300X boasts 192 GB of HBM3 memory,
  1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth. Assuming the model weights are
  stored in FP16, analyze the feasibility of deploying this model on a single MI300X. Explain the factors
  influencing memory footprint and throughput, and discuss potential bottlenecks.
details:
  realistic_solution: 'A realistic approach involves a comprehensive memory budget: model weights (140GB
    for FP16), activations (highly dependent on batch size and sequence length), KV cache (batch size
    * sequence length * num_heads * head_dim * 2 bytes/token/layer), and system overhead. Quantization
    to INT8 (70GB) or even INT4 (35GB) should be considered to fit the model and leave room for activations/KV
    cache. Performance estimation should factor in effective FLOPs utilization, memory bandwidth (5.3
    TB/s), and the nature of the LLM operations (dense vs. sparse). If a single MI300X is insufficient,
    strategies like tensor parallelism, pipeline parallelism, or offloading parts of the model to CPU/other
    accelerators must be explored.'
  common_mistake: A common mistake is to only calculate the memory required for the model weights (70B
    params * 2 bytes/param for FP16 = 140 GB) and conclude it fits. This overlooks critical components
    like activations, KV cache (especially for long sequences), optimizer states (if fine-tuning), and
    potentially larger batch sizes, which can easily exceed the remaining memory. It also often neglects
    the memory bandwidth limits and actual computational throughput for non-sparse operations.
  napkin_math: "1. **Model Weights (FP16):** 70,000,000,000 parameters * 2 bytes/parameter = 140,000,000,000\
    \ bytes = 140 GB. \n2. **Available HBM3:** 192 GB. \n3. **Initial Fit:** 192 GB - 140 GB = 52 GB remaining\
    \ for activations, KV cache, batch data, etc.\n4. **KV Cache (example):** For a batch size of 1, sequence\
    \ length 2048, Llama 2 70B has 80 layers and 80 heads. Assuming head_dim 128, and FP16: 1 * 2048 *\
    \ 80 layers * 80 heads * 128 dim * 2 (K&V) * 2 bytes = ~8.5 GB. This quickly consumes remaining memory\
    \ with larger batches or sequences.\n5. **Throughput (approximate peak):** 1,307 TFLOPS FP16 sparse.\
    \ For dense ops, it will be less. Memory bandwidth of 5.3 TB/s implies that if an operation is entirely\
    \ memory bound, performance is capped at bandwidth * (ops/byte ratio). The actual throughput will\
    \ be limited by either compute or memory bandwidth, depending on the operation."
