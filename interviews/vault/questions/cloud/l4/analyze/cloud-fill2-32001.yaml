id: cloud-fill2-32001
title: Rack Power Density Limits with GPU-Dense Nodes
topic: datacenter-efficiency
status: published
provenance: imported
scenario: You are designing a new GPU training cluster using DGX H100 nodes (8× H100 GPUs, ~10.2 kW per
  node). Traditional datacenter racks support 10-15 kW per rack. Your facilities team says they can deliver
  40 kW per rack with rear-door heat exchangers. How many DGX nodes can you fit per rack, and what infrastructure
  changes are needed to reach 80 kW/rack density?
details:
  realistic_solution: At 40 kW per rack and ~10.2 kW per DGX node, you can fit 3 nodes per rack (30.6
    kW), leaving headroom for networking (2-4 kW for leaf switches) and PDU losses. To reach 80 kW/rack
    — needed for 8 DGX nodes — you need direct liquid cooling (DLC) with cold plates on GPUs and CPUs.
    Air cooling cannot dissipate 80 kW in a standard 42U rack. DLC delivers coolant directly to heat sources,
    achieving >95% heat capture. This also requires upgraded PDUs (busbar distribution), higher-amperage
    circuits, and structural reinforcement for heavier coolant-filled racks.
  common_mistake: Ignoring networking switches, power distribution, and cable management overhead per
    rack. A DGX H100 also requires high-speed NVLink switches and InfiniBand HCAs that add to the total
    power envelope.
  napkin_math: 'DGX H100: ~10.2 kW. At 40 kW/rack: 3 nodes + networking = ~35 kW. At 80 kW/rack with DLC:
    7 nodes + networking = ~75 kW. 1000-GPU cluster = 125 DGX nodes = 18 racks at 80 kW vs 42 racks at
    40 kW.'
