schema_version: 1
id: cloud-sus-64002
title: Stranded Power in Mixed H100/A100 Rack Deployments
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A cloud operator is retrofitting an existing datacenter that has 30 kW/rack PDUs and mixed cooling
  supporting up to 25 kW IT load per rack. They plan to deploy a combination of 8×H100 nodes (8 kW each)
  and legacy 8×A100 nodes (5.2 kW each). You must specify a rack-filling strategy that maximizes GPU count
  per rack while staying within the 25 kW IT power limit, and quantify the 'stranded power'—the unused
  power budget that cannot be utilized due to integer constraints.
details:
  realistic_solution: 'Pure H100 rack: floor(25 / 8) = 3 nodes × 8 kW = 24 kW used, 1 kW stranded (4%
    waste). Pure A100 rack: floor(25 / 5.2) = 4 nodes × 5.2 kW = 20.8 kW used, 4.2 kW stranded (17% waste).
    Mixed optimal: 2× H100 (16 kW) + 1× A100 (5.2 kW) = 21.2 kW, 3.8 kW stranded. Or 1× H100 (8 kW) +
    3× A100 (15.6 kW) = 23.6 kW, 1.4 kW stranded (5.6% waste)—near-optimal. The 3× H100 pure rack wastes
    only 4%, making it the most efficient single-SKU configuration.'
  common_mistake: Candidates assume they can always mix H100 and A100 nodes freely in one rack. In practice,
    power distribution units (PDUs) at the rack level may have per-circuit limits (e.g., 20A circuits
    at 208V = 4.16 kW per circuit), constraining placement. Also, not quantifying stranded power misses
    an important efficiency metric for capacity planning.
  napkin_math: '25 kW budget. H100 node = 8 kW: 3 nodes = 24 kW, stranded = 1 kW (4.0%). A100 node = 5.2
    kW: 4 nodes = 20.8 kW, stranded = 4.2 kW (16.8%). Mixed [1×H100 + 3×A100]: 8 + 15.6 = 23.6 kW, stranded
    = 1.4 kW (5.6%). Mixed [2×H100 + 1×A100]: 16 + 5.2 = 21.2 kW, stranded = 3.8 kW (15.2%). Best: 3×H100
    pure at 4% stranding.'
