id: cloud-2438
title: The Quantization Throughput Paradox
topic: pruning-sparsity
status: published
provenance: imported
scenario: A Deep Learning Recommendation Model (DLRM) processes 5,000 QPS on an NVIDIA L4 GPU (300 GB/s
  bandwidth, 120 TOPS INT8, 60 TFLOPS FP16). The model has 50GB of embedding tables and small MLP layers
  (20 GFLOPs total compute per pass). To reach a target of 10,000 QPS, the team quantizes the MLP layers
  from FP16 to INT8, doubling peak compute. However, throughput remains flat at 5,100 QPS.
details:
  realistic_solution: Recommendation models are predominantly memory-bandwidth bound due to sparse embedding
    lookups. The arithmetic intensity of reading an embedding vector to perform a simple sum/concat is
    incredibly low (often < 0.5 FLOPs/byte). The L4 ridge point for FP16 is 200 FLOPs/byte. The model
    is vastly below the ridge point. Quantizing the MLPs to INT8 raises the compute ceiling (and the ridge
    point to 400 FLOPs/byte), but does absolutely nothing to alleviate the HBM bandwidth ceiling that
    dictates the total pipeline latency. Optimization must focus on embedding compression or higher bandwidth
    memory.
  common_mistake: Believing that quantizing compute-heavy layers will speed up a model that is fundamentally
    bottlenecked by memory bandwidth.
  napkin_math: L4 FP16 Ridge Point = 60 TFLOPS / 300 GB/s = 200 FLOPs/Byte. DLRM AI = 20 GFLOPs / 50 GB
    read = 0.4 FLOPs/Byte. Attainable throughput = 300 GB/s * 0.4 = 120 GFLOPs/s. Increasing the compute
    ceiling to 120 TOPS does not change the 120 GFLOPs/s attainable throughput, hence QPS remains flat.
