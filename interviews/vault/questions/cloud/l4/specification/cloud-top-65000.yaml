id: cloud-top-65000
title: UCIe Bandwidth Scaling for Multi-Chiplet AI Accelerators
topic: chiplet-architecture
status: published
provenance: imported
scenario: You are designing a next-generation AI accelerator using UCIe 2.0 die-to-die interconnect. The
  system needs 4 TB/s aggregate compute-to-HBM bandwidth but the UCIe links are becoming the bottleneck.
  Diagnose the constraint and propose a chiplet floorplan.
details:
  realistic_solution: UCIe 2.0 SR achieves ~256 Gbps/mm of die edge at 4 µm bump pitch. For 4 TB/s (32,000
    Gbps), you need 125 mm of active die edge — more than the perimeter of a single large die. Arrange
    compute dies centrally with HBM memory dies on all four sides rather than one. Use a 2.5D interposer
    with active silicon bridge segments. Place high-bandwidth-demand compute tiles closest to HBM stacks
    to minimize hop distance. At this bandwidth requirement, a multi-chiplet design with 4+ HBM stacks
    is necessary.
  common_mistake: Assuming UCIe bandwidth scales linearly with die count. Engineers add more compute dies
    without accounting for the interposer routing congestion and the fact that UCIe bandwidth per mm of
    die edge is fixed at ~1 TB/s/mm for UCIe 2.0 short-reach.
  napkin_math: 'UCIe 2.0 SR: 4 µm bump pitch, ~256 Gbps/mm. For 4 TB/s: convert to Gbps = 4,000 GB/s ×
    8 = 32,000 Gbps. 32,000 Gbps / 256 Gbps/mm = 125 mm of die edge required. A 26mm × 26mm compute die
    has 104mm perimeter — 125mm is not feasible without multiple chiplets. Need HBM memory tiles on all
    four sides of multiple compute dies, or higher bump density.'
