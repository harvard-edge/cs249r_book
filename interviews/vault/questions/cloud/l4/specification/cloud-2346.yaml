schema_version: 1
id: cloud-2346
title: CXL vs HBM in Embedding Tables
topic: vram-budgeting
status: published
provenance: imported
scenario: You are architecting the inference stack for a CTR prediction model with 1.5 TB of embedding
  tables. The node has 4x GPUs with 80GB HBM each (320GB total). Fetching embeddings from host CPU RAM
  over PCIe Gen5 x16 (64 GB/s) currently yields 15M lookups/sec, but the SLA requires 40M lookups/sec.
  A vendor suggests adding a CXL 2.0 Type 3 memory expansion module to hit the target.
details:
  realistic_solution: CXL 2.0 attached memory provides cache-coherent memory access semantics and expands
    capacity, but it physically operates over the exact same PCIe physical layer. Adding CXL memory does
    not increase the host-to-device bandwidth—it remains bottlenecked by the PCIe Gen5 x16 link. To hit
    40M lookups/sec, the architecture must change to software-managed caching (storing the most frequent/hot
    embeddings in the 320GB of GPU HBM) or scaling out to multi-node with RDMA, rather than relying on
    CXL which shares the exact same bandwidth deficit as host memory.
  common_mistake: Accepting the vendor's proposal, assuming that because CXL offers 'memory semantics'
    it will be inherently faster than standard PCIe host-device transfers.
  napkin_math: 'Target: 40M lookups/sec. Assuming an average embedding size of 128 dimensions * 4 bytes
    (FP32) = 512 bytes per lookup. 40,000,000 * 512 bytes = ~20.48 GB/s. Wait, if 15M lookups saturates
    the bus, embeddings must be larger. Let''s assume multi-table lookups summing to 4 KB per request.
    15M * 4 KB = 60 GB/s (saturating the 64 GB/s PCIe bus). 40M lookups * 4 KB = 160 GB/s required. CXL
    2.0 is limited to PCIe Gen5 x16 bandwidth (64 GB/s). It physically cannot provide 160 GB/s. A GPU
    HBM cache (bandwidth > 2 TB/s) is required.'
