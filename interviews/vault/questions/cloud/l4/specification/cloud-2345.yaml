id: cloud-2345
title: Bypassing CPU for Massive Checkpoints
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are architecting a fault-tolerant training cluster for a 500B parameter model. You must
  asynchronously save 80 GB of optimizer state and weights per GPU every 15 minutes to a distributed NVMe
  filesystem. Writing via the host CPU causes the training loop to stall for 45 seconds per checkpoint,
  dropping GPU utilization. The nodes have dual 200Gbps NICs and a PCIe Gen4 architecture.
details:
  realistic_solution: The bottleneck is the bounce buffer in CPU system memory. Data goes GPU HBM -> PCIe
    -> CPU RAM -> PCIe -> NIC. This consumes double the PCIe bandwidth and causes severe CPU memory bus
    contention. The architectural solution is to implement GPUDirect Storage (GDS) or GPUDirect RDMA.
    This allows the NIC to pull data directly from GPU HBM via PCIe DMA, bypassing the CPU entirely. By
    evaluating the data path, you eliminate the CPU memory bandwidth bottleneck and cut the PCIe bus utilization
    in half, allowing checkpoints to overlap perfectly with compute.
  common_mistake: Trying to multithread the CPU memory copy operations or using a larger CPU RAM buffer
    to hide the latency.
  napkin_math: 'Traditional path: 80 GB per GPU. 8 GPUs = 640 GB. Transferring 640 GB to RAM over PCIe
    Gen4 x16 limits, then RAM to NICs. CPU memory bus maxes out around ~150-200 GB/s, taking >30 seconds.
    GDS path: NIC pulls directly at 200Gbps (25 GB/s) per NIC. 2 NICs = 50 GB/s total node egress. 640
    GB / 50 GB/s = ~12.8 seconds. Because it uses DMA engines bypassing the CPU, it runs entirely asynchronously
    without stalling the CPU training dispatch.'
