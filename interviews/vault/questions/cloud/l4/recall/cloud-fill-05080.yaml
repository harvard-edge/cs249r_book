schema_version: 1
id: cloud-fill-05080
title: Kernel Fusion Impact on Memory Bandwidth for Layer Norm + GELU on H100
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: An H100 runs LayerNorm (read+write 2×activation) followed immediately by GELU (read+write 2×activation)
  as separate kernels. For activation shape [batch=64, seq=2048, d=8192] (BF16 = 2GB), unfused throughput
  is 650 GFLOPS. Fusing both kernels into one pass reduces HBM traffic from 4× to 2×. Calculate the speedup.
details:
  realistic_solution: 'Activation size: 64×2048×8192×2B = 2GB. Unfused: LayerNorm reads 2GB + writes 2GB
    = 4GB; GELU reads 2GB + writes 2GB = 4GB. Total HBM: 8GB. At H100 3.35 TB/s: time = 8GB/3.35TB/s =
    2.39ms. Fused: single pass reads 2GB + writes 2GB = 4GB total. Time = 4GB/3.35TB/s = 1.19ms. Speedup:
    2.39/1.19 = 2×. FLOPs: LayerNorm ≈ 8×activation elements = 8×64×2048×8192 = 8.6B. GELU: ~2×activation
    = 2.1B. Total ≈ 10.7B FLOPs. At 650 GFLOPS: 16.5ms. Wait — discrepancy: these kernels are so memory-bound
    that FLOPs don''t matter; the 650 GFLOPS is the effective ''throughput'' in GFLOPS given memory bound,
    not compute bound. Fused kernel achieves 1.19ms = 2× speedup, matches 2× HBM reduction.'
  common_mistake: Measuring speedup only in FLOPS rather than in actual latency; for memory-bandwidth-limited
    kernels like LayerNorm and GELU, the speedup comes from reducing HBM traffic, not FLOPs.
  napkin_math: 'Activation: 2GB. Unfused HBM: 4 passes × 2GB = 8GB at 3.35 TB/s = 2.39ms. Fused HBM: 2
    passes × 2GB = 4GB at 3.35 TB/s = 1.19ms. Speedup: 2×. FLOPs negligible for these element-wise ops.'
