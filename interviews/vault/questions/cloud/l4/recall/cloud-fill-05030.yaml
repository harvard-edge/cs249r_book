schema_version: 1
id: cloud-fill-05030
title: AllReduce Bandwidth Requirement for Ring All-Reduce on 8×H100
topic: collective-communication
status: published
provenance: imported
scenario: 8 H100 GPUs are connected via NVLink 4.0 (450 GB/s bidirectional per GPU) in a DGX H100. During
  data-parallel training of a 13B model, gradients (13B parameters × 4 bytes = 52GB in FP32) must be all-reduced
  after each backward pass. Calculate the ring all-reduce time and determine if communication overlaps
  with computation.
details:
  realistic_solution: 'Ring all-reduce formula: time = 2 × (N-1)/N × data_size / bandwidth_per_link. N=8
    GPUs, data=52GB, NVLink per-link: 450 GB/s / 2 (full duplex) = 225 GB/s per direction. Time = 2 ×
    7/8 × 52GB / 225 GB/s = 2 × 0.875 × 52/225 = 0.404s = 404ms. Typical backward pass: 13B model, batch=8,
    seq=2048 at BF16: ~200ms. All-reduce takes 2× longer than backward — communication is the bottleneck.
    Solution: gradient bucketing + overlap, or use tensor parallelism to reduce gradient volume.'
  common_mistake: Using total NVLink bandwidth (450 GB/s) instead of per-link bandwidth in ring topology;
    in a ring, each step uses only the link to one neighbor.
  napkin_math: 'Ring all-reduce: 2×(7/8)×52GB / 225 GB/s = 404ms. Backward pass: ~200ms. Ratio: 404/200
    = 2× — communication dominates. With gradient compression (FP16 gradients, 26GB): 202ms — matches
    backward. Overlap requires careful bucketing.'
