id: cloud-1462
title: Diagnosing Silent Accuracy Drops using KL Divergence
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your cloud-based recommendation model serves 10,000 requests/sec from a cluster of 8 T4 GPUs.
  Recently, the CTR dropped by 15% silently, with no system alerts firing. You compute the KL Divergence
  between the training embedding distribution (Q) and the production embedding distribution (P) for user
  features over a 1-hour window. The KL divergence spiked from its historical average of 0.05 nats to
  1.2 nats. Analyze what this asymmetric metric implies about the incoming data pipeline, and diagnose
  the root cause of the CTR drop.
details:
  realistic_solution: Analyze the direction of the KL divergence. A massive spike in KL(Production ||
    Training) indicates the emergence of out-of-vocabulary (OOV) categorical features or new user segments
    in production that were absent or smoothed to near-zero probability in training data. Even 5 such
    OOV features appearing at 2% frequency can contribute >1.0 nats to the KL divergence. Root cause this
    by decomposing the KL into per-feature contributions and trace back to the upstream data pipeline
    for schema or mapping changes.
  common_mistake: Assuming KL divergence is symmetric or that it directly correlates with overall feature
    importance, missing that KL(P||Q) heavily penalizes regions where P has mass but Q assigns near-zero
    probability — exactly the OOV scenario.
  napkin_math: KL(P||Q) = Σ P(x) log(P(x)/Q(x)). If a new categorical feature appears in 2% of production
    traffic (P(x)=0.02) but was smoothed to a tiny probability in training (Q(x)=1e-6), the penalty for
    this single bin is 0.02 * log(0.02 / 1e-6) ≈ 0.02 * 9.9 ≈ 0.198 nats. If 5 such features emerge due
    to an upstream bug, the sum easily pushes the total KL divergence beyond 1.0 nats, triggering a massive
    shift signal.
