id: cloud-2155
title: The Training Memory Budget Decomposition
topic: pruning-sparsity
status: published
provenance: imported
scenario: You have a single A100-80GB and want to train the largest model possible from scratch. Walk
  through the complete memory budget decomposition and determine the maximum model size (in parameters)
  you can train with Adam in mixed precision (BF16 compute, FP32 optimizer), batch size 1, sequence length
  2048.
details:
  realistic_solution: 'Memory budget: 80 GB total, ~2 GB for CUDA context = 78 GB usable. Per-parameter
    costs: BF16 weights (2B) + FP32 master weights (4B) + FP32 Adam m (4B) + FP32 Adam v (4B) + BF16 gradients
    (2B) = 16 bytes/param. At 78 GB for parameters: 78 GB / 16 B = ~4.9B params maximum IF activations
    were zero. But activations for a 4.9B model at seq_len=2048, batch=1: roughly 10-15 GB (depends on
    architecture). With activation checkpointing: ~3-5 GB. So realistic maximum: ~4B params with checkpointing,
    ~3B without.'
  common_mistake: Only accounting for weights and optimizer states, forgetting that activation memory
    grows with sequence length and model width, and that CUDA context and memory fragmentation consume
    2-5 GB.
  napkin_math: 'Per-param training cost: 2 + 4 + 4 + 4 + 2 = 16 bytes | 80 GB - 2 GB CUDA - 5 GB activations
    (w/ checkpointing) = 73 GB | Max params: 73 GB / 16 B ≈ 4.6B | Without checkpointing (15 GB activations):
    63 GB / 16 B ≈ 3.9B | Practical answer: ~3-4B params on one A100-80GB'
