schema_version: 1
id: cloud-1156
title: Diagnosing Rank-0 Bottlenecks in Massive Model Checkpoints
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 175B parameter model on 1,024 A100 GPUs (128 nodes). The model state is fully
  sharded (e.g., FSDP), with each GPU holding roughly 16GB of parameters and optimizer states. Your current
  checkpointing routine aggregates all data to the rank-0 node to write a single monolithic file to network
  storage. This process is taking over 20 minutes and causing frequent NCCL timeouts. Analyze the root
  cause of this failure and evaluate the architectural shift required to resolve it.
details:
  realistic_solution: Implement distributed checkpointing (e.g., PyTorch Distributed Checkpoint). Instead
    of gathering all 16.4TB of state on rank-0, each of the 1024 workers concurrently writes its 16GB
    state shard directly to a scalable object store (e.g., S3). With 128 nodes writing at 12.5 GB/s each,
    aggregate bandwidth reaches 1600 GB/s, completing the checkpoint in ~10.2 seconds versus 21+ minutes
    for the rank-0 bottleneck approach.
  common_mistake: Assuming the underlying storage media (e.g., NFS or SSD) lacks the IOPS/throughput,
    rather than identifying the rank-0 node's single network interface (100 Gbps = 12.5 GB/s) as the true
    serialization bottleneck when all state must flow through one node.
  napkin_math: 'Total state: 1,024 GPUs * 16 GB = 16,384 GB (16.4 TB). Rank-0 bottleneck with a single
    100 Gbps (12.5 GB/s) NIC: 16,384 GB / 12.5 GB/s = 1,310 seconds (>21 minutes). Distributed approach
    with 128 nodes writing concurrently at 12.5 GB/s each: 128 * 12.5 GB/s = 1,600 GB/s aggregate bandwidth.
    Checkpoint time drops to: 16,384 GB / 1,600 GB/s = ~10.2 seconds (plus object storage latency overhead).'
