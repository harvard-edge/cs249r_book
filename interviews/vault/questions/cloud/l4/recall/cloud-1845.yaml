id: cloud-1845
title: Diagnosing GPU Underutilization in Long-Sequence RNNs
topic: data-parallelism
status: published
provenance: imported
scenario: Your team is deploying a multi-layer LSTM for high-frequency trading anomaly detection on an
  NVIDIA A100 (312 TFLOPs FP16). The input time-series has a sequence length of 2048. Despite heavily
  optimizing the data pipeline and increasing the batch size to 256, the GPU SM utilization hovers around
  15%, and inference latency is unacceptably high at over 45ms per batch. Profiling shows that tensor
  core usage is negligible. Diagnose the architectural bottleneck causing this poor hardware utilization.
details:
  realistic_solution: Identify the O(N) sequential dependency where hidden state computation at time t
    strictly requires the output from time t-1. This serial execution path prevents the GPU from parallelizing
    matrix operations across the sequence dimension, leaving massively parallel SMs idle. The architectural
    solution requires migrating to models that allow parallel computation across time (like Transformers
    or Temporal Convolutional Networks).
  common_mistake: Assuming the bottleneck is purely I/O, memory bandwidth, or suboptimal kernel launch
    overhead, rather than an inherent, unfixable architectural constraint.
  napkin_math: 'An A100 executes ~3.12e14 FP16 FLOPs/sec. For a single sequence step of an LSTM (hidden
    size 512, batch 256), the math is ~8 * 256 * 512^2 = ~5.3e8 FLOPs. Over 2048 steps, that''s ~1.1e12
    FLOPs total. If perfectly parallelized, it would take 1.1e12 / 3.12e14 = ~3.5ms. But serialized across
    2048 steps, kernel launch and sequential scheduling latencies (e.g., ~15us per step) dominate: 2048
    * 15us = ~30ms latency minimum just from step-by-step execution boundaries, mathematically capping
    utilization.'
