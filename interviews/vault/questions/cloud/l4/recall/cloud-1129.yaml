schema_version: 1
id: cloud-1129
title: Diagnosing Low Tensor Core Utilization in Cloud MLPs
topic: roofline-analysis
status: published
provenance: imported
scenario: You are profiling a multi-layer perceptron (MLP) recommendation model on an NVIDIA A100 GPU
  instance (40GB SXM). The MLP consists of dense linear layers where the hidden dimensions are heavily
  customized for specific feature embeddings, resulting in matrix sizes like 1037 x 511. Despite using
  FP16 and having sufficient batch sizes to keep the GPU busy, the profiler reports that Tensor Core utilization
  is below 20%, and the workload is completely compute-bound on standard CUDA cores. Why is this happening
  and how do you resolve it?
details:
  realistic_solution: Pad the matrix dimensions to be multiples of 8 or 16. For A100 FP16, pad 1037 to
    1040 and 511 to 512. This structural alignment allows cuBLAS to dispatch the dense matrix multiplications
    to the highly efficient Tensor Cores instead of falling back to slower CUDA cores.
  common_mistake: Assuming that just casting to FP16 automatically enables Tensor Cores, ignoring the
    strict structural hardware requirements for matrix dimensions.
  napkin_math: Padding an odd matrix dimension from (1037 * 511) to a multiple of 8 (1040 * 512) for Tensor
    Cores adds extra compute. Original elements = 529,907. Padded = 532,480. Overhead = (532,480 / 529,907)
    - 1 = 0.48% more FLOPs. However, utilizing the A100's Tensor Cores unlocks 312 TFLOPS compared to
    ~78 TFLOPS for standard FP16 CUDA cores. A 4x throughput gain easily justifies the 0.48% padding waste.
