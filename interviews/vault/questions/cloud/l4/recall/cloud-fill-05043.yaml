schema_version: 1
id: cloud-fill-05043
title: Thermal Throttling During Long-Context Training on H100
topic: thermal-management
status: published
provenance: imported
scenario: During a 72-hour training run on H100 SXM5 (700W TDP, junction temperature limit 83°C), GPU
  temperature stabilizes at 78°C for the first 48 hours. On hour 49, ambient temperature in the datacenter
  rises 5°C due to HVAC partial failure. The GPU begins thermal throttling, dropping from 1.41GHz to 1.19GHz.
  Quantify the throughput impact and estimate recovery time.
details:
  realistic_solution: 'Frequency drop: 1.41GHz → 1.19GHz = 15.6% reduction. For compute-bound training
    (large GEMM): throughput ≈ proportional to frequency. Throughput loss: 15.6%. Training slows by 15.6%
    for the remaining 24 hours. Additional cost: 24h × 15.6% = 3.74 extra hours to complete same work.
    Recovery: HVAC repair estimated 2 hours. After repair, GPU cools at ~2°C/minute → 5°C drop takes ~2.5
    minutes for junction. Full clock restored after ~3 minutes. Training hour 49+2.1 hours: back to normal.
    Net delay: 2.1h at 15.6% slowdown + thermal recovery ramp = ~2.1h × 15.6% = 0.33h extra total job
    time.'
  common_mistake: Assuming thermal throttling is binary (full speed or shutdown); modern GPUs gradually
    reduce clock speed in proportion to temperature excess, and frequency-throughput relationship is approximately
    linear for memory-bandwidth-bound workloads.
  napkin_math: 'Clock: 1.41→1.19 GHz = -15.6%. Compute BW also scales. Throughput: -15.6% for 2 hours.
    Additional time: 2h × 0.156 = 0.31h. Recovery: 3 minutes. Net impact: ~20 minutes lost training time.
    For 72h job, 0.5% impact — monitor but not critical.'
