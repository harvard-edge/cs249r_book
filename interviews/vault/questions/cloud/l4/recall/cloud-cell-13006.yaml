schema_version: 1
id: cloud-cell-13006
title: 'Pipeline Parallelism Realization: Memory per Stage for LLaMA-70B'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Size the per-GPU memory requirements for 8-stage pipeline parallelism of LLaMA-70B on H100 (80GB
  HBM3). The model has 80 layers, hidden dim 8192, 64 attention heads, and is trained in BF16 with Adam
  optimizer and gradient checkpointing. Determine if it fits and what's the spare headroom.
details:
  realistic_solution: '70B params / 8 stages = 8.75B params/stage. BF16 weights: 8.75B * 2 = 17.5GB. Adam
    optimizer (FP32): 8.75B * 12 = 105GB — but this must fit across DP replicas. If DP=1 (pure PP): optimizer
    = 105GB >> 80GB. Solution: use ZeRO-1 to shard optimizer states across pipeline stages or use BF16
    Adam. BF16 optimizer: 8.75B * 6 = 52.5GB. Plus activations (checkpointed): ~4GB/stage. Total: 17.5+52.5+4
    = 74GB — fits in 80GB with 6GB headroom.'
  common_mistake: 'Forgetting optimizer state memory (Adam requires 3 copies: fp32 weights, first moment,
    second moment = 4+4+4=12 bytes/param) and counting only model weights.'
  napkin_math: 'Weights per stage: 70B/8 * 2B = 17.5GB. Optimizer (FP32 Adam): 70B/8 * 12B = 105GB — does
    NOT fit. BF16 Adam (2+2+2 bytes): 70B/8 * 6B = 52.5GB. Gradient buffer: 70B/8 * 2B = 17.5GB. Activations
    (checkpointed, 10 layers): 10 * 8192 * 2048 * 2 = 335MB. Total: 17.5 + 52.5 + 17.5 + 0.335 = 87.8GB
    — still over. Must use ZeRO-2 or reduce gradient buffer. With ZeRO-2 (gradients sharded): 17.5 + 52.5
    + 0.335 = 70.3GB — fits with 9.7GB headroom.'
