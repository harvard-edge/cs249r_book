schema_version: 1
id: cloud-fill-02024
title: Power Capping Impact on Training Throughput for MI300X
topic: datacenter-efficiency
status: published
provenance: imported
scenario: A datacenter operator power-caps each MI300X (192GB HBM3, peak 750W) at 600W to stay within
  cooling limits. A training team reports 20% throughput degradation. The operator claims only 20% power
  reduction (750→600W) so throughput loss should be equal. Explain why the relationship is non-linear
  and quantify the actual trade-off.
details:
  realistic_solution: 'At peak 750W, MI300X runs at maximum memory clock (5.3TB/s). Power cap reduces
    memory clock frequency. Memory bandwidth scales approximately as f^1 (linear with clock), but power
    scales as f^3 (cube law for dynamic power). Reducing power 20% (750→600W) → clock reduction of (600/750)^(1/3)=0.944
    → 6% clock drop → 6% bandwidth drop. But compute is also reduced: if training is 50% memory-bound,
    50% compute-bound, effective throughput = 0.5×0.94 + 0.5×(0.94^3 for compute FLOPS) ≈ 0.87 = 13% drop.
    20% observed suggests model is heavily memory-bound at ~70%, or additional DVFS inefficiency.'
  common_mistake: Assuming linear throughput-power scaling; ignoring that memory-bandwidth (not compute)
    is often the bottleneck and scales sublinearly with power at capped frequencies.
  napkin_math: 'P=750→600W, ratio=0.8. Clock ∝ P^(1/3): f_ratio=0.8^0.33=0.928. BW_ratio=0.928. FLOPS_ratio≈0.928^2=0.86
    (FLOPS ∝ f×v, v ∝ f^0.5 roughly). 70% memory-bound: throughput=0.7×0.928+0.3×0.86=0.65+0.26=0.91 →
    9% drop. Observed 20% suggests additional overhead from DVFS latency spikes during power management
    transitions.'
