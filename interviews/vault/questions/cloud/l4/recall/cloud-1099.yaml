schema_version: 1
id: cloud-1099
title: Diagnosing ViT Data Pipeline Stalls
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is training a Vision Transformer (ViT) on a node with 8x H100 GPUs. Nsight Systems
  profiling reveals the average training step time is 120ms, but the pure GPU compute kernel execution
  time is only 90ms. The training job uses PyTorch's DataLoader with 4 CPU workers per GPU, streaming
  1MB high-resolution images over a 200 Gbps networked storage backend. During the 30ms stall gap, CPU
  utilization is pegged at 100% while network I/O only hits 20% of its available capacity. Calculate the
  data stall ratio and diagnose the root cause of this pipeline bottleneck.
details:
  realistic_solution: The data stall ratio is 25% (30ms of 120ms). Since network I/O (40ms for 1GB at
    25 GB/s) can be fully overlapped with 90ms of compute, the stall is not from the network. CPU utilization
    at 100% confirms the bottleneck is CPU-bound image decompression and augmentation. Offload JPEG decoding
    and augmentations to the GPU using NVIDIA DALI, eliminating the CPU bottleneck and recovering the
    30ms stall.
  common_mistake: Assuming the networked storage bandwidth (I/O) is the bottleneck simply because data
    is fetched remotely, and recommending an upgrade to higher-tier NAS or SSDs when the actual bottleneck
    is CPU preprocessing throughput.
  napkin_math: Stall Time = Total Step (120ms) - Compute (90ms) = 30ms. Stall Ratio = 30ms / 120ms = 25%.
    Network capacity = 200 Gbps (25 GB/s). Fetching 1024 images (1MB each) per step = ~1GB. Network transfer
    time = 1GB / 25GB/s = 40ms. Since compute (90ms) > network (40ms), I/O can be perfectly overlapped.
    The 30ms delay is entirely due to the CPU failing to decode and augment images fast enough.
