schema_version: 1
id: cloud-2047
title: The Agent Loop Cost Explosion
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your agentic system uses a 70B LLM that costs $0.003 per 1K input tokens and $0.015 per 1K output
  tokens. Each agent step sends the full conversation history plus tool results as context. After 8 tool
  calls, a single user query has consumed 45K input tokens and 4K output tokens. You're serving 50K agent
  sessions per day. What is the daily inference cost, and how does it compare to a non-agentic RAG system?
details:
  realistic_solution: 'Per session: 45K input tokens × $0.003/1K = $0.135 input + 4K output tokens × $0.015/1K
    = $0.060 output = $0.195/session. Daily: 50K × $0.195 = $9,750/day = $292,500/month. A non-agentic
    RAG system (single retrieval + generation) uses ~2K input tokens + 500 output tokens = $0.006 + $0.0075
    = $0.0135/session = $675/day. The agent is 14.4× more expensive per session. The quadratic context
    growth is the key driver: steps 1-2 use 3K tokens, but steps 7-8 use 12K tokens each because they
    include all prior context. Fix: (1) implement sliding window context — only include the last 3 tool
    results, (2) summarize intermediate steps into compressed memory, (3) use prompt caching to avoid
    re-processing repeated context prefixes (saves 60-80% of input cost), (4) set a hard budget of 5 steps
    per session and fall back to human support.'
  common_mistake: Estimating cost based on average tokens per session without accounting for the quadratic
    growth of context. Each step includes ALL previous steps, so token consumption grows as O(n²) with
    steps.
  napkin_math: 'Agentic: $0.195/session × 50K = $9,750/day. RAG: $0.0135/session × 50K = $675/day. Ratio:
    14.4×. With prompt caching (80% prefix cache hit): input cost drops to $0.135 × 0.2 = $0.027, total
    = $0.087/session, $4,350/day. With sliding window (last 3 steps): ~18K input → $0.054 + $0.060 = $0.114/session,
    $5,700/day.'
