schema_version: 1
id: cloud-fill-02033
title: Gradient Synchronization Overlap with Computation on H100
topic: gradient-synchronization
status: published
provenance: imported
scenario: A DDP training job on 8 H100s has backward pass taking 800ms and gradient AllReduce taking 400ms
  (sequential). A senior engineer proposes overlapping AllReduce with backward computation using gradient
  bucketing. Explain how this works and calculate the potential speedup.
details:
  realistic_solution: 'Gradient bucketing groups gradients into buckets (e.g., 25MB each). When a bucket
    fills (computed in backward pass), AllReduce starts immediately on that bucket while backward continues
    computing remaining layers. Overlap fraction ≈ (N-1)/N where N = number of buckets. With 28GB gradients
    / 25MB bucket = 1120 buckets, overlap ≈ 99.9%. Theoretical: backward=800ms, AllReduce=400ms, overlapped
    total ≈ max(800,400)+1 bucket latency ≈ 805ms vs 1200ms sequential. Speedup: 1200/805=1.49×. Real-world
    achieves 30-40% improvement due to CUDA stream contention.'
  common_mistake: Assuming 100% overlap is achievable and that speedup = AllReduce_time; ignoring bucket
    synchronization overhead and the last gradient bucket which cannot be overlapped.
  napkin_math: 'Sequential: 800+400=1200ms/step. With overlap: critical path = max(backward, AllReduce)
    if fully overlapped = 800ms. 1 bucket tail latency ≈ 5ms. Total ≈ 805ms. Speedup=1200/805=1.49×. With
    30% CUDA stream overhead: effective overlap=70% → actual step time=800+400×0.3=920ms → 1.30× speedup.'
