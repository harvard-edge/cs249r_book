id: cloud-cell-10206
title: Cold Start Latency for Serverless Compound AI on A100
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'A serverless compound AI deployment on A100 (80GB HBM2e) has cold start latency of 18 seconds:
  model weight loading from NVMe (13GB 7B model at ~1.2GB/s) takes 10.8s, FAISS index loading (4GB) takes
  3.3s, and warm-up inference takes 3.9s. Traffic is bursty — 80% of hours have zero requests. Implement
  a keep-warm strategy that reduces cold start impact without paying for always-on A100 time.'
details:
  realistic_solution: 'Tiered warm strategy: (1) Keep a CPU-only instance always warm with model weights
    in RAM (64GB CPU RAM, ~$0.05/hr). On demand signal, begin GPU transfer at PCIe bandwidth (64GB/s,
    7B model=13GB/64GB/s=0.2s vs NVMe''s 10.8s). (2) Pre-load FAISS index into CPU RAM (4GB). (3) Use
    predictive scaling: analyze traffic patterns, pre-warm GPU 2 minutes before predicted burst. (4) Keep
    one GPU warm during business hours. Effective cold start: 0.2s (CPU→GPU) + 3.9s warm-up = 4.1s.'
  common_mistake: 'Either keeping the full A100 instance always warm (expensive: $3.50/hr * 24 = $84/day
    for zero traffic periods) or accepting cold starts for all requests (18s unacceptable for interactive
    use).'
  napkin_math: 'NVMe load: 13GB / 1.2GB/s = 10.8s. PCIe CPU→GPU: 13GB / 64GB/s = 0.2s (52x faster). Always-on
    CPU cost: $0.05/hr * 720hr/month = $36/month vs A100 always-on: $3.50 * 720 = $2,520/month. Savings:
    $2,484/month (98.6%). With predictive pre-warm (2min lead time, 90% accuracy): effective cold start
    rate = 10% * 4.1s + 90% * 0s = 0.41s average cold start added latency.'
