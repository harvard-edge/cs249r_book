id: cloud-0961
title: Diagnosing Checkpoint Stalls in Large Scale LLM Training
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your team is training a 175B parameter LLM using Fully Sharded Data Parallel (FSDP) on a 256-GPU
  A100 cluster. Checkpoints are saved every 4 hours to prevent data loss. However, you observe that during
  each checkpoint, GPU utilization drops to 0% for over 40 minutes, severely degrading cluster Goodput.
  The current script un-shards the model by gathering all weights and optimizer states to rank 0, then
  calls `torch.save()` to write a single file to cloud object storage (which has a 1 GB/s per-VM ingress
  limit). Analyze the bottleneck causing this massive stall.
details:
  realistic_solution: Analyze the I/O bottleneck and implement distributed, asynchronous checkpointing
    (e.g., PyTorch DCP). Instead of gathering the global state dict to rank 0, have each GPU concurrently
    write its local FSDP shard directly to storage, utilizing the aggregate network bandwidth of the entire
    cluster.
  common_mistake: Candidates often blame the cloud object storage's overall latency or suggest reducing
    checkpoint frequency (which harms fault tolerance), failing to identify that the gather-to-rank-0
    pattern creates an extreme, serialized network and I/O bottleneck on a single node.
  napkin_math: 'Total state for a 175B model with Adam optimizer: 175B params * 14 bytes (2B fp16 weights
    + 4B fp32 master + 4B momentum + 4B variance) ≈ 2.45 TB. With a 1 GB/s write limit on rank 0''s VM,
    writing 2.45 TB takes 2,450 seconds (~40.8 minutes). Distributed across 32 nodes (8 GPUs each): each
    node only writes ~76 GB. At 1 GB/s per node, parallel write time drops to just 76 seconds.'
