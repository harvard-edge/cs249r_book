schema_version: 1
id: cloud-sus-64010
title: Computational Carbon Intensity of MI300X Fine-Tuning Runs
topic: datacenter-efficiency
status: published
provenance: imported
scenario: 'Your ML platform team must produce a carbon disclosure report for a 13B parameter fine-tuning
  job run on a 64× MI300X cluster in a US Pacific Northwest datacenter (grid intensity: 180 gCO2eq/kWh).
  The job ran for 72 hours. Each MI300X averaged 680W during training. The datacenter has a PUE of 1.2.
  Calculate the total carbon footprint and compare it to running the same job in a US Southeast region
  (grid intensity: 580 gCO2eq/kWh, PUE 1.35). Recommend carbon reporting methodology.'
details:
  realistic_solution: 'Pacific NW: IT power = 64 × 680W = 43.52 kW. Total facility = 43.52 × 1.2 = 52.22
    kW. Energy = 52.22 kW × 72h = 3,760 kWh. Carbon = 3,760 × 180 = 676,800 gCO2 = 677 kgCO2. US SE: IT
    same = 43.52 kW. Total facility = 43.52 × 1.35 = 58.75 kW. Energy = 58.75 × 72 = 4,230 kWh. Carbon
    = 4,230 × 580 = 2,453,400 g = 2,453 kgCO2. SE is 3.63× higher carbon. Reporting: use GHG Protocol
    Scope 2 (market-based or location-based). Include Scope 3 for hardware manufacturing (amortized over
    device lifetime, ~50-100 kgCO2 per MI300X chip).'
  common_mistake: Forgetting to multiply IT power by PUE before applying grid intensity—PUE accounts for
    all facility power, not just GPU power. Also, candidates omit embodied/operational scope (Scope 1/2/3
    distinction) from the reporting methodology.
  napkin_math: 'PNW: 64×680W×1.2 PUE × 72h × 180g/kWh = 43,520W × 1.2 × 72h × 0.18 kg/kWh = 52,224W ×
    72h / 1000 × 0.18 = 3,760 kWh × 0.18 = 676.8 kgCO2. SE: 64×680×1.35×72×0.58/1000 = 52,224×1.35/1.2×72×0.58/1000.
    Recompute: SE facility = 43,520×1.35 = 58,752W. Energy = 58.752kW × 72h = 4,230 kWh. Carbon = 4,230
    × 0.58 = 2,453 kgCO2. Ratio: 2453/677 = 3.62×. Embodied: 64 MI300X × ~75 kgCO2/chip / 3yr lifetime
    / 8760h × 72h = 64×75/26,280×72 = 13.1 kgCO2 amortized (1.9% of operational).'
