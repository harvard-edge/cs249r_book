schema_version: 1
id: cloud-fill-05051
title: Tensor Parallelism GEMM Partitioning on H100 for LLM Layer
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A 70B LLM is tensor-parallel across 8 H100s. Each attention layer has weight matrices of shape
  [8192, 8192] for Q, K, V projections. With 8-way tensor parallelism (column-parallel for QKV, row-parallel
  for output), calculate the communication cost per layer and the efficiency vs perfect linear scaling.
details:
  realistic_solution: 'Column-parallel QKV: each GPU holds [8192, 1024] slice of Q,K,V. Input X is broadcast
    (via AllGather if previously sharded): 8192×2B = 16.4KB. AllGather across 8: 16.4KB at 450 GB/s =
    0.036ms. Row-parallel output projection: each GPU holds [1024, 8192] slice. After matmul, AllReduce
    output [8192×2B] across 8 GPUs: 16.4KB at 450 GB/s NVLink: 0.036μs. Two communications per attention
    layer. 80 layers × 2 × 0.036μs = 5.76μs per forward pass. Forward compute per layer: ~2ms. Communication
    overhead: 5.76μs / 160ms ≈ 0.004%. Efficiency: ~99.9% of perfect linear scaling.'
  common_mistake: Counting only the AllReduce after the row-parallel projection and forgetting the AllGather
    needed before column-parallel if activations were previously scattered.
  napkin_math: 'Per-layer comms: AllGather 16.4KB + AllReduce 16.4KB = 32.8KB. At NVLink 450 GB/s: 0.073μs
    per layer. 80 layers: 5.8μs total communication overhead. Forward compute: ~160ms total. Communication
    overhead: 5.8μs/160ms = 0.004% — negligible. TP efficiency: ~99.9%.'
