schema_version: 1
id: cloud-r2-43022
title: Parquet Row Group Sizing for ML Training
topic: storage-format-selection
status: published
provenance: imported
scenario: Your Parquet files use the default 128 MB row group size. Training on an 8× H100 cluster reads
  50 columns out of 2,000 (2.5% column selectivity). Each worker processes one row group at a time. You
  notice that workers spend 60% of time waiting for I/O despite S3 bandwidth being underutilized. What's
  wrong with the row group size, and what should it be?
details:
  realistic_solution: 'Parquet reads entire column chunks within a row group. With 128 MB row groups and
    2,000 columns, each column chunk is ~64 KB. Reading 50 columns = 3.2 MB useful data per 128 MB row
    group. But the I/O pattern matters: Parquet issues separate S3 GET requests per column chunk (or coalesces
    nearby chunks). 50 column chunks × separate GET requests = 50 S3 round trips per row group (each ~20ms)
    = 1 second per row group in metadata + request overhead. Fix: reduce row group size to 8-16 MB. At
    8 MB: each column chunk is ~4 KB, 50 columns = 200 KB per row group. More row groups but each is fast.
    Or: use Parquet''s column chunk coalescing (read contiguous byte ranges) with columns sorted by access
    frequency. Best: switch to Lance or Arrow IPC formats that support vectorized I/O for high column
    selectivity workloads.'
  common_mistake: Increasing row group size to reduce the number of S3 GET requests. Larger row groups
    actually worsen the problem — with 2.5% column selectivity, you're reading 128 MB row groups but only
    using 3.2 MB of data from each. The wasted I/O is the bottleneck.
  napkin_math: '128 MB row groups: useful data = 128 MB × 2.5% = 3.2 MB. Wasted I/O = 97.5%. S3 GETs per
    row group: 50 columns × 20ms = 1s overhead. 10 TB dataset / 128 MB = 78K row groups / 8 workers =
    9,750 row groups each × 1s = 2.7 hours of pure GET overhead. With 16 MB row groups and coalesced reads:
    50 columns now in ~3 S3 range requests × 20ms = 60ms per row group. 625K row groups / 8 = 78K × 60ms
    = 1.3 hours. Better: pre-filter columns into a 50-column projection file: 10 TB × 2.5% = 250 GB, sequential
    read.'
