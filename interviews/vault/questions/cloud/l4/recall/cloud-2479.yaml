id: cloud-2479
title: The Thermal Throttling Ticking Clock
topic: power-budgeting
status: published
provenance: imported
scenario: A cloud-managed edge drone runs a continuous real-time tracking model. In the lab (22°C), inference
  runs at a stable 30 fps drawing 12W, which is under the SoC's 15W TDP limit. Deployed in the field (35°C
  ambient), the drone tracks perfectly for exactly 90 seconds, then framerate drops to 12 fps, causing
  tracking to fail. Why?
details:
  realistic_solution: The issue is temperature-induced Dynamic Voltage and Frequency Scaling (DVFS) thermal
    throttling. Thermal Design Power (TDP) is the maximum heat a system can dissipate at a specific ambient
    temperature. Heat dissipation relies on the delta between chip temperature and ambient temperature.
    At 35°C ambient, the delta is smaller, so the heatsink cannot dissipate 12W of heat. The chip's temperature
    rises until it hits its critical threshold (e.g., 90°C) after 90 seconds. To prevent melting, the
    OS aggressively downclocks the NPU/GPU, drastically reducing framerate.
  common_mistake: Assuming the battery voltage drops under load after 90 seconds, causing brownouts that
    slow down the NPU.
  napkin_math: 'Heat dissipation Q = k * (T_chip - T_ambient). At 22°C lab, max T_chip 85°C: delta is
    63°C. The system can dissipate 15W. k = 15/63 = 0.238 W/°C. In the field, T_ambient is 35°C. Max dissipation
    = 0.238 * (85 - 35) = 0.238 * 50 = 11.9W. Since the model draws 12W, heat accumulates. Once T_chip
    hits 90°C (thermal limit), the system halves the clock speed to drop power to ~6W, resulting in 15
    fps (or 12 fps with overhead).'
