schema_version: 1
id: cloud-2473
title: The NPU Fallback Ping-Pong
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your cloud pipeline compiles two models for an Edge NPU (rated at 4 TOPS). Model A (ResNet-50,
  4 GFLOPs) runs at 8ms latency. Model B (EfficientNet, 4 GFLOPs) takes 85ms on the exact same NPU. Profiling
  shows the NPU is idle 80% of the time during Model B's execution. Both models are INT8 quantized. Why
  does the structurally similar Model B perform 10x worse?
details:
  realistic_solution: 'The issue is compiler-driven operator fallback across heterogeneous compute. Model
    B uses the Swish activation function (or SiLU), which the specific NPU hardware block does not natively
    support (it only supports ReLU). The edge compiler automatically partitions the graph: it runs convolutions
    on the NPU, copies the activation tensor back to the host CPU to compute Swish, and copies it back
    to the NPU for the next layer. This completely bottlenecks the system on PCIe/AXI bus bandwidth and
    CPU context switching, destroying the throughput.'
  common_mistake: Assuming EfficientNet's depthwise convolutions are heavily compute-bound and lack hardware
    support on the NPU.
  napkin_math: '16 layers with Swish. Average activation tensor size: 2 MB. Memory transfer per layer:
    2 MB out + 2 MB in = 4 MB. Total bus transfer: 16 * 4 MB = 64 MB. Edge SoC bus bandwidth: 1 GB/s.
    Transfer time = 64 MB / 1 GB/s = 64 ms. Add 10ms for CPU compute and 11ms for NPU compute = 85ms total
    latency.'
