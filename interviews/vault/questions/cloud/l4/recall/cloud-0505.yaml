schema_version: 1
id: cloud-0505
title: The Profiling Crisis
topic: roofline-analysis
status: published
provenance: imported
scenario: You've deployed a custom recommendation model. The profiling dashboard shows you are achieving
  120 TFLOPS out of a possible 989 TFLOPS on your H100 GPU. Your tech lead suggests buying a faster GPU
  to fix the latency. Why is your tech lead wrong?
details:
  realistic_solution: 'The tech lead hasn''t checked the Arithmetic Intensity (Ops/Bytes). The model achieves
    120 TFLOPS on an H100 with 989 TFLOPS peak — only 12% utilization. This implies the workload''s arithmetic
    intensity ≈ 120 / 3.35 = 36 Ops/Byte, which is far below the H100''s ridge point of 295 Ops/Byte.
    The workload is memory-bandwidth-bound. A faster GPU with 1,500 TFLOPS peak but the same 3.35 TB/s
    bandwidth would still cap at 36 × 3.35 = 120 TFLOPS — identical performance. The correct fix is either:
    (1) increase memory bandwidth (e.g., upgrade to a GPU with more HBM bandwidth), (2) reduce bytes moved
    per operation (quantize weights from FP16 to INT8, halving memory traffic and nearly doubling effective
    throughput), or (3) increase arithmetic intensity by batching more requests together.'
  common_mistake: '"We need to optimize the CUDA kernels" or "The GPU isn''t being fully utilized, so
    a faster one will help." Both assume the problem is compute — it isn''t.'
  napkin_math: '- H100 ridge point: 989 TFLOPS / 3.35 TB/s = 295 Ops/Byte. Achieving 120/989 TFLOPS (12%)
    suggests memory-bound regime. | - If arithmetic intensity = 2 Ops/Byte: attainable = 3.35 TB/s × 2
    = 6.7 TFLOPS — but you see 120 TFLOPS, so intensity ≈ 120 / 3.35 = 36 Ops/Byte, still well below ridge
    point (295). | - => A faster GPU with 1,500 TFLOPS peak but same 3.35 TB/s bandwidth still caps at
    120 TFLOPS. Need higher bandwidth, not more ALUs.'
