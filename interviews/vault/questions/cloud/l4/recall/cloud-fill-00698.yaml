id: cloud-fill-00698
title: Optimizing LLM Attention Scaling on AMD MI300X for Long Context
topic: attention-scaling
status: published
provenance: imported
scenario: "You are tasked with optimizing the inference of a large language model (LLM) on an AMD MI300X\
  \ accelerator, which boasts 192 GB HBM3, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s HBM3 bandwidth.\
  \ The current model uses standard multi-head attention and is struggling to achieve desired throughput\
  \ when processing sequences with a context length of 128k tokens, especially due to the overhead of\
  \ the Key-Value (KV) cache. Your profiling shows that the memory bandwidth for KV cache accesses is\
  \ a significant bottleneck. \n\n1. Diagnose how the standard multi-head attention's KV cache behavior\
  \ leads to this memory bandwidth bottleneck on the MI300X. \n2. Propose an alternative attention mechanism\
  \ (e.g., Multi-Query Attention, Grouped-Query Attention, or Sliding Window Attention) that specifically\
  \ addresses this bottleneck. \n3. Quantify the potential reduction in KV cache memory bandwidth usage\
  \ and the corresponding improvement in effective throughput for a batch size of 1, assuming the bottleneck\
  \ is purely memory bandwidth limited and your chosen attention mechanism reduces KV cache size/accesses\
  \ by a factor X. Provide 'napkin math' calculations."
details:
  realistic_solution: Grouped-Query Attention (GQA) or Multi-Query Attention (MQA) are highly effective
    in addressing KV cache memory bandwidth bottlenecks. GQA allows multiple query heads to share a smaller
    set of key and value heads (e.g., a group of 8 query heads sharing 1 KV head), significantly reducing
    the KV cache memory footprint and, consequently, the memory bandwidth required for KV cache access.
    This modification maintains much of the model's expressiveness while greatly improving memory efficiency.
    The MI300X's 1,307 TFLOPS FP16 sparse compute and 5.3 TB/s HBM3 bandwidth make it well-suited for
    optimized attention variants. Sliding Window Attention could also be considered for extremely long
    contexts to reduce the O(N^2) complexity of attention itself.
  common_mistake: Candidates might primarily focus on FLOPS optimization without adequately considering
    memory bandwidth as the primary bottleneck for KV cache operations, or they might propose an attention
    variant without quantifying its specific benefits using the provided MI300X hardware specifications.
    Another common mistake is over-engineering the solution (e.g., proposing complex custom kernels) when
    a standard architectural modification (like GQA) directly addresses the core issue.
  napkin_math: Assume a standard multi-head attention (MHA) model has 32 query heads, 32 key heads, and
    32 value heads. The KV cache size is proportional to `(context_length * number_of_layers * number_of_key_heads
    * head_dimension_size)`. If we implement Grouped-Query Attention (GQA) with 4 key/value groups, the
    number of key/value heads that need to be stored and accessed for the KV cache is reduced from 32
    to 4. This results in an 8x reduction (32 / 4 = 8) in the KV cache memory footprint and thus an 8x
    reduction in the memory bandwidth required for KV cache accesses. Given the MI300X's 5.3 TB/s HBM3
    bandwidth, if the KV cache access was consuming, for example, 80% of the total available bandwidth,
    an 8x reduction in this specific access pattern would free up a substantial portion of the bandwidth.
    If the operation was entirely KV cache bandwidth-bound, an 8x reduction in KV cache access time would
    directly translate to an 8x improvement in throughput for that portion of the inference pipeline,
    leading to significant overall throughput gains.
