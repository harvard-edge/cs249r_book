schema_version: 1
id: cloud-2478
title: The Self-Inflicted OTA DDoS
topic: collective-communication
status: published
provenance: imported
scenario: You orchestrate an Over-The-Air (OTA) deployment of a new 2GB vision model to 2,000 edge nodes
  within a single retail corporation. The cloud control plane triggers all nodes to download via pre-signed
  S3 URLs at midnight. By 12:05 AM, the retail chain's central IT alerts that their entire SD-WAN is saturated,
  taking down inventory and Point-of-Sale systems.
details:
  realistic_solution: The cloud deployment pipeline triggered a 'thundering herd' problem. Because all
    2,000 nodes attempted to download a large payload simultaneously over the corporate WAN, the aggregate
    bandwidth demand vastly exceeded the corporate network's egress capacity. Edge deployments to large
    fleets on shared networks must use staggered rollouts (canary/rings), delta-weight updates, or peer-to-peer
    (P2P) distribution protocols (like Dragonfly or BitTorrent) to minimize WAN traffic.
  common_mistake: Assuming S3 throttled the downloads, causing connections to hang and consume stateful
    firewall connection tables.
  napkin_math: 2,000 edge nodes. Each attempts to pull 2GB. If nodes have a 100 Mbps local link, they
    attempt to pull at 12.5 MB/s. Aggregate demand = 2000 * 12.5 MB/s = 25,000 MB/s = 200 Gbps. A typical
    corporate SD-WAN internet egress is 10 Gbps. Demand (200 Gbps) is 20x the capacity (10 Gbps), resulting
    in massive packet drop, TCP backoffs, and total network saturation.
