schema_version: 1
id: cloud-sus-64004
title: Power Capping Strategy for MI300X Training Under Budget Constraints
topic: datacenter-efficiency
status: published
provenance: imported
scenario: 'You manage a 512-accelerator MI300X training cluster. Each MI300X has a maximum TDP of 750W.
  The datacenter power contract caps your cluster at 300 kW total IT load. During peak matrix-multiply-heavy
  phases of training a 70B parameter model, power meters show the cluster drawing 380 kW, causing PDU
  overcurrent alarms. You are evaluating three mitigation options: (A) power-cap each GPU at 590W, (B)
  reduce batch size by 25%, or (C) deploy dynamic power capping that throttles only during high-power
  phases. Evaluate each option''s effect on training throughput and energy efficiency.'
details:
  realistic_solution: 'Option A (static 590W cap): 512 × 590W = 302 kW, just under budget. Throughput
    loss is ~10-15%, not the expected 21.3%, because memory bandwidth is the bottleneck and HBM power
    consumption is less affected by compute power caps than CUDA core frequency. Option B (batch size
    -25%): Similar throughput reduction but also reduces gradient noise, potentially requiring more steps—net
    effect may be worse WCT. Option C (dynamic capping): Best option if the cluster has fine-grained power
    telemetry; cap during GEMM phases, release during all-reduce. In practice, Option A is simplest to
    implement reliably and within 5% of Option C''s performance.'
  common_mistake: Candidates assume power capping linearly reduces throughput (e.g., 590/750 = 78.7% power
    → 78.7% throughput). In practice, MI300X throughput vs. power curves are sublinear due to memory bandwidth
    saturation—most LLM training is memory-bandwidth-bound, so moderate power caps cause disproportionately
    small throughput losses.
  napkin_math: 'Baseline: 512 × 750W = 384 kW (exceeds 300 kW by 28%). Option A cap at 590W: 512 × 590W
    = 302 kW. Reduction factor: 590/750 = 78.7%. But MI300X at 590W retains ~85-90% compute throughput
    (memory-bandwidth saturation effect). Throughput loss: ~12-15%. Energy per token at cap: lower power
    + slightly fewer tokens/s → EPI improves by ~5-8%. Option B: 25% smaller batches = ~22% throughput
    reduction (compute underutilization during microbatches). Option C: achieves ~5% better throughput
    than A with same power compliance.'
