id: cloud-fill-01306
title: Graceful Degradation for GenAI on AMD MI300X
topic: graceful-degradation
status: published
provenance: imported
scenario: You are tasked with deploying a mission-critical, low-latency Generative AI inference service
  that utilizes a large sparse mixture-of-experts model on an AMD MI300X accelerator. The MI300X provides
  192 GB HBM3, 1,307 TFLOPS FP16 sparse performance, and 5.3 TB/s memory bandwidth. The service currently
  serves user requests with an SLA of 99.9% of responses under 200ms. During peak load or unforeseen network
  congestion, you observe intermittent latency spikes exceeding the SLA and occasional partial HBM memory
  errors on individual accelerators. Design a comprehensive graceful degradation strategy for this service,
  focusing on maintaining system reliability and optimizing resource utilization even under duress.
details:
  realistic_solution: 'A realistic solution would involve a multi-tiered degradation ladder, triggered
    by specific metrics: 1. QoS Shedding: Implement priority queues, dropping lower-priority requests
    or increasing their queue times when latency exceeds a soft threshold. 2. Model Fallbacks (Tiered):
    Define multiple versions of the model. Level 1: A slightly smaller sparse model (e.g., fewer experts
    active or pruned) that fits within reduced HBM capacity (e.g., if partial HBM failure) and requires
    less FP16 compute. Level 2: A highly optimized, quantized (e.g., INT8) or distilled version, significantly
    smaller and faster, potentially even runnable on a subset of the MI300X cores or a CPU if necessary.
    3. Fail-operational Design: Ensure the system continues to process requests, even at reduced quality,
    by re-routing traffic to healthy accelerators or leveraging degraded ones with smaller models. 4.
    Adaptive Batching/Inference: Dynamically adjust batch sizes and parallelism on the MI300X based on
    real-time load, HBM utilization, and compute utilization to maximize throughput within latency targets.
    Robust monitoring with dynamic, configurable thresholds (e.g., p99 latency, HBM temperature, error
    rates) would automatically trigger transitions between these degradation levels. This approach diagnostically
    targets bottlenecks (HBM capacity, compute, bandwidth) with specific fallbacks.'
  common_mistake: A common mistake is to implement a binary fail-over (e.g., from full model to nothing)
    without considering intermediate degradation steps, leading to an abrupt loss of service quality rather
    than a smooth decline. Another is failing to incorporate active monitoring and quantifiable thresholds
    to trigger degradation policies automatically, or choosing fallback models that are not sufficiently
    distinct in their resource requirements to offer meaningful degradation levels.
  napkin_math: Consider the full model requiring 100 GB HBM3 and 500 TFLOPS FP16. A degraded model (e.g.,
    50% parameter reduction, denser) requires 60 GB HBM3 and 300 TFLOPS FP16. If an MI300X (192 GB HBM3)
    experiences a partial HBM failure, leaving only 120 GB usable, it can no longer run two instances
    of the full model (2 * 100 GB > 120 GB). However, it *can* run two instances of the degraded model
    (2 * 60 GB = 120 GB), maintaining service at reduced quality. If the 1,307 TFLOPS FP16 sparse performance
    is reduced by 20% due to thermal throttling (to 1040 TFLOPS), the MI300X can still serve 3 concurrent
    requests of the degraded model (1040 TFLOPS / 300 TFLOPS ≈ 3.46, so 3 requests), whereas it could
    only serve 2 of the full model (1040 TFLOPS / 500 TFLOPS ≈ 2.08, so 2 requests). This quantifies the
    throughput gain from degradation.
