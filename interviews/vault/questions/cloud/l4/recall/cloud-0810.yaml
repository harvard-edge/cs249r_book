schema_version: 1
id: cloud-0810
title: The Energy Bill
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Your team just completed a 30-day training run on 256 H100 GPUs. The cloud bill shows \$650,000
  in compute charges. Your sustainability team asks: ''What was the energy consumption and carbon footprint
  of this training run?'' Calculate it for a US data center.'
details:
  realistic_solution: GPU power is only part of the picture. Data centers have a PUE (Power Usage Effectiveness)
    that captures total facility power divided by IT equipment power. A modern hyperscaler PUE is 1.1–1.2;
    an older facility might be 1.4–1.6. You must also account for the fact that GPUs don't always run
    at TDP — average utilization-weighted power is typically 60–80% of TDP.
  common_mistake: '"Just multiply GPU TDP by hours." This ignores Power Usage Effectiveness (PUE) — the
    overhead of cooling, networking, storage, and facility infrastructure.'
  napkin_math: '256 H100s × 700W TDP = 179.2 kW IT load. Average utilization-weighted power: ~80% → 143
    kW. PUE of 1.2: total facility power = 143 × 1.2 = 171.6 kW. Duration: 30 days × 24 hours = 720 hours.
    Energy consumed: 171.6 kW × 720 h = **123,552 kWh ≈ 124 MWh**. US average grid carbon intensity: 0.39
    kg CO₂/kWh. Carbon footprint: 124 MWh × 390 kg/MWh = **48.3 metric tons CO₂**. That''s equivalent
    to ~10 passenger cars driven for a year. In a renewable-powered data center (0.05 kg/kWh): 6.2 tons
    CO₂ — an 87% reduction. Energy cost at \$0.08/kWh: 124 MWh × \$80/MWh = **\$9,900** — only 1.5% of
    the \$650k cloud bill (the rest is margin, depreciation, and overhead).'
