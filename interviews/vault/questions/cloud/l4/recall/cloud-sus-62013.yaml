schema_version: 1
id: cloud-sus-62013
title: Variable Output Length and Decode Pool Imbalance
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'Your decode pool uses static round-robin assignment: each incoming prefill completion is assigned
  to the next decode GPU in sequence. You observe that some decode GPUs are at 95% memory utilization
  while others sit at 40%. Users with long outputs (>2000 tokens) report degraded TPOT. Root-cause this
  imbalance and propose a work-stealing or rebalancing mechanism.'
details:
  realistic_solution: 'Round-robin does not account for output length variance. A 2000-token output occupies
    a KV slot for 2000 steps; a 50-token output frees its slot in 50 steps. If requests arrive in bursts
    where long outputs cluster on the same GPU (e.g., during batch processing jobs), those GPUs fill up
    while others stay empty. Solutions: (1) Least-loaded-first assignment at transfer time: assign each
    new KV to the decode GPU with the most free HBM KV blocks. (2) Work-stealing: decode GPUs at <30%
    utilization advertise capacity; overloaded GPUs migrate completed KV sequences mid-flight to underloaded
    neighbors (requires live KV transfer over InfiniBand — same mechanism as prefill→decode transfer).
    (3) Output length prediction: use a draft model or heuristic to estimate output length at prefill
    time and bin requests into short/long queues served by different decode GPU subsets.'
  common_mistake: Adding more decode GPUs to fix the imbalance — this treats the symptom, not the cause.
    The root cause is that round-robin ignores output length heterogeneity, causing long-running sequences
    to cluster.
  napkin_math: 'Assume 10 decode MI300X GPUs, 38 GB KV pool each. 380 GB total KV. Round-robin at 500
    req/s: each GPU gets 50 req/s. If 10% are long (2000 tok × 384MB/4096tok = 188 MB each): 5 long req/s
    per GPU × 188 MB = 940 MB/s KV accumulation; at steady state with mean 10s long jobs: 9.4 GB pinned.
    10% short (50 tok): frees in 0.1s. Imbalance variance depends on burst pattern — binomial variance
    in long-job assignment → hot GPU gets 3σ = 3×√(50×0.1×0.9) = 3×2.1 = 6.3 extra long jobs → 6.3 × 188
    MB = 1.2 GB extra pressure.'
