schema_version: 1
id: cloud-2477
title: The Edge Gateway Batching Paradox
topic: latency-decomposition
status: published
provenance: imported
scenario: A cloud configures a factory edge gateway to process 10 RTSP camera streams (1080p, 30fps).
  The edge GPU processes batch=1 in 15ms, or batch=8 in 20ms. To maximize throughput and prevent queue
  buildup, the pipeline is configured with a strict batch size of 8. However, the end-to-end latency (camera
  capture to cloud notification) is consistently ~100ms, failing the strict 60ms factory safety SLA.
details:
  realistic_solution: Dynamic batching introduces 'formation latency' (the time spent waiting to collect
    enough requests to fill the batch). Because the cameras stream at a fixed 30fps, frames arrive at
    a deterministic rate. Waiting to collect 8 frames takes longer than the actual inference time. By
    forcing a batch size of 8, the system artificially holds the first frame of the batch for tens of
    milliseconds before inference even begins. For real-time edge multi-stream pipelines, small batch
    sizes or timeout-based dynamic batching are strictly required to meet SLAs.
  common_mistake: Assuming the network latency to the cloud is >80ms, making the 60ms SLA impossible regardless
    of edge processing.
  napkin_math: '10 cameras @ 30fps = 300 fps total. 1 frame arrives every 1000ms / 300 = 3.33ms. To form
    a batch of 8 frames, the gateway must wait 8 * 3.33ms = 26.6ms. Total edge latency = 26.6ms (wait)
    + 20ms (inference) + 15ms (decode) = 61.6ms. Network to cloud = 30ms. Total = 91.6ms. If using batch=1:
    wait=0ms, inference=15ms, decode=15ms, network=30ms. Total = 60ms (meets SLA).'
