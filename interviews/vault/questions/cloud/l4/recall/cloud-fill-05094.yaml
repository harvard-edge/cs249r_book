schema_version: 1
id: cloud-fill-05094
title: H100 SM Occupancy Analysis for Small-Batch Inference Kernel
topic: roofline-analysis
status: published
provenance: imported
scenario: An H100 has 132 SMs with 2048 threads/SM. A GEMM kernel for inference at batch=1, M=1, K=4096,
  N=4096 uses thread blocks of [128 threads, 4 warps]. The kernel launches 32 thread blocks (N/128=32).
  Analyze SM occupancy and identify the underutilization issue.
details:
  realistic_solution: 'Thread blocks launched: 32 (one per 128 columns of N). H100 SMs: 132. Thread blocks
    per SM: 32/132 < 1. Only 32 of 132 SMs are active = 24.2% SM utilization. Per active SM: 1 thread
    block = 4 warps. Max warps per SM: 64 (H100). Occupancy per active SM: 4/64 = 6.25%. Overall occupancy:
    32 blocks × 4 warps / (132 SMs × 64 warps/SM) = 128 warps / 8448 warps = 1.5% occupancy. At batch=1,
    this GEMM cannot fill H100. Solutions: (1) Increase N through tensor parallelism or batching. (2)
    Use persistent kernels that handle multiple GEMM tiles per SM launch. (3) Increase batch size to fill
    SMs (batch=4 → 4× SMs used). (4) Use CUTLASS grouped GEMM to process multiple small GEMMs in one kernel
    launch.'
  common_mistake: Measuring occupancy as active_warps/max_warps per SM without considering whether all
    132 SMs are even being used; a small kernel may not have enough thread blocks to fill all SMs.
  napkin_math: 'Thread blocks: N/128 = 32. H100 SMs: 132. Active SMs: 32 (24.2%). Warps per active SM:
    4/64 = 6.25% occupancy. Global: 32×4/(132×64) = 128/8448 = 1.5%. At batch=4: 32×4=128 blocks → 97%
    SMs used, 4/64 = 6.25% per-SM occupancy. Still low — need larger N or tile sizes.'
