schema_version: 1
id: cloud-sus-63040
title: MI300X Unified Memory for CPU-GPU Tensor Offloading vs H100 PCIe
topic: vram-budgeting
status: published
provenance: imported
scenario: The MI300X uses a unified memory architecture where the CPU and GPU share the same physical
  HBM3 pool (192GB total, accessible by both CPU and GPU without explicit copy). An H100 PCIe connects
  to CPU DRAM via PCIe 5.0 (128 GB/s). A 180GB model must be loaded and served (too large for H100's 80GB
  without splitting). Compare the KV cache offloading strategy on H100 PCIe (offload KV cache to CPU DRAM)
  vs MI300X unified memory for a serving workload with 50GB working set and 130GB KV cache.
details:
  realistic_solution: 'H100 PCIe offloading: 80GB VRAM holds model weights (but 180GB model needs TP=3
    across 3 H100s). Single H100 approach: keep hot KV cache (50GB working set) on GPU, offload cold KV
    (130GB) to CPU DRAM via PCIe 5.0. Fetch latency: 1GB KV block / 128 GB/s = 7.8ms per fetch. At 200
    concurrent requests, each needing occasional cold cache fetch: 200 × 7.8ms = 1.56s latency spike —
    unacceptable for p99. MI300X: 192GB unified pool. 180GB model + 50GB hot KV = 230GB — still doesn''t
    fit entirely. But MI300X can split differently: 180GB model weight in GPU-local HBM pages, 12GB for
    hot KV cache. Cold KV (130GB) in CPU-accessible pages of the unified pool — accessed via NUMA-local
    path with ~1 TB/s effective bandwidth (Infinity Fabric to CPU). Fetch latency: 1GB / 1000 GB/s = 1ms
    vs 7.8ms on H100 PCIe. 7.8× faster cold cache access. Alternative: use 2× MI300X with TP=2 — 384GB
    total, fits entire model + full KV cache with no offloading needed.'
  common_mistake: Assuming MI300X unified memory means all 192GB has identical bandwidth from the GPU
    perspective. CPU pages and GPU pages in the unified HBM pool may have different NUMA distances on
    MI300X — GPU-originated accesses to GPU-local pages are fast; CPU-pinned pages accessed by GPU may
    have higher latency through the driver/IOMMU path.
  napkin_math: 'H100 PCIe offload bandwidth: 128 GB/s bidirectional = 64 GB/s per direction. 1GB KV block
    fetch: 1/64 = 15.6ms (one-directional). MI300X Infinity Fabric (CPU↔GPU within unified pool): ~500-900
    GB/s depending on access pattern. 1GB fetch: 1/900 = 1.1ms. Speedup: 15.6/1.1 = 14×. For p99 at 200
    concurrent users with 5% cold cache miss rate: H100: 200×0.05×15.6ms = 156ms added latency per request.
    MI300X: 200×0.05×1.1ms = 11ms. H100 blows p99 latency budget; MI300X maintains sub-20ms cold-cache
    overhead.'
