id: cloud-2415
title: FPGA Spatial Pipeline Mapping
topic: latency-decomposition
status: published
provenance: imported
scenario: A high-frequency trading firm needs a 5-layer MLP to execute in under 10 microseconds. On CPU,
  it takes 250us. You port the model to an AWS F1 FPGA using standard OpenCL High-Level Synthesis (HLS)
  with matrix multiplication kernels. The resulting FPGA latency is 180us, missing the SLA by 18x. DSP
  slice utilization is only 5%.
details:
  realistic_solution: 'Standard HLS maps the MLP to a von Neumann-style execution: it builds a single
    Matrix Multiply unit and reuses it sequentially for each layer, loading weights from off-chip DRAM.
    The tradeoff here is chip area (DSP slices/BRAM) versus latency. To achieve <10us latency, you must
    co-design the algorithm mapping to use a fully unrolled spatial architecture. Because the model is
    small, you can store all weights entirely in distributed BRAM. You instantiate dedicated hardware
    ALUs for every single neuron in the 5 layers and pipeline them. Instead of sequential execution, the
    data flows through the physical chip layout in a single pass. This consumes massive chip area (trading
    off multi-tenant throughput) but drops latency to exactly the clock cycles required to traverse the
    pipeline.'
  common_mistake: Increasing the batch size to improve throughput, completely ignoring the strict single-inference
    latency SLA.
  napkin_math: 'Sequential HLS: 5 layers * 1000 matrix ops * 5ns clock + DRAM access = ~180us. Spatial
    unroll: 5 layers * 5 pipeline stages per layer = 25 clock cycles. At 200MHz (5ns clock), latency =
    25 * 5ns = 125 nanoseconds. This leaves ample headroom for PCIe/network overhead.'
