schema_version: 1
id: cloud-cell-13068
title: 'Systolic Array Realization: Memory Layout for TPU Batch Inference'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Concretely determine the optimal memory layout (row-major vs column-major vs tiled) for weight
  matrices on TPU v5e (16GB HBM, 819 GB/s) for batched inference of a feed-forward layer (in_features=8192,
  out_features=32768, batch=256, seq=128). Calculate bandwidth utilization for each layout and justify
  the choice.
details:
  realistic_solution: 'Weight matrix W: (8192, 32768) BF16 = 512MB. For C = X * W^T where X is (256*128,
    8192) = (32768, 8192). Row-major: W stored as [out, in]. Access: row-by-row along out dimension. Cache
    line (128 bytes) contains 64 BF16 values. Systolic array loads tiles: 128x128 block requires contiguous
    load in in-dimension. Row-major stores contiguous in-features per output neuron: layout matches systolic
    array access pattern for output-stationary. Column-major: transposing access pattern → strided loads
    → poor cache utilization. TPU XLA uses tiled layouts automatically. Recommendation: use XLA default
    (major-to-minor dimension ordering for XLA tiles).'
  common_mistake: Applying CPU-centric row-major reasoning to TPU hardware which uses XLA-managed HBM
    with 128-byte cache lines optimized for systolic array access patterns (NCHW-like tiled layouts).
  napkin_math: 'W: 8192*32768*2 = 512MB. X: 32768*8192*2 = 512MB. C: 32768*32768*2 = 2GB. Total BW: 512+512+2048
    = 3072MB = 3GB. At 819 GB/s: 3.66ms BW time. FLOPs: 2*32768*8192*32768 = 17.6 TFLOP. Compute time:
    17.6T/197T = 89ms. Compute bound (AI = 17.6T/3GB = 5867 FLOPs/byte >> 240 ridge). Actual measured:
    ~100ms → MFU = 89/100 = 89% at ideal. Layout choice minimal impact when compute bound; matters only
    at memory-bound regime (small batch).'
