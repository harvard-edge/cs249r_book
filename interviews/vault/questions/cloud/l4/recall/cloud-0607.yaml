schema_version: 1
id: cloud-0607
title: The HBM3e Bandwidth Ceiling
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your team just got a cluster of H200 GPUs with 4.8 TB/s HBM3e, up from the H100's 3.35 TB/s.
  Your manager expects a 43% speedup across all workloads. After benchmarking, some models got the full
  speedup while others saw zero improvement. Which workloads actually benefit from the extra bandwidth,
  and which don't?
details:
  realistic_solution: Only memory-bound workloads benefit. The key is the arithmetic intensity relative
    to the roofline ridge point. The H100 ridge point is $989 \text{ TFLOPS} / 3.35 \text{ TB/s} \approx
    295 \text{ Ops/Byte}$. The H200 ridge point (same compute, more bandwidth) is $989 / 4.8 \approx 206
    \text{ Ops/Byte}$. Any workload with arithmetic intensity below 295 but above 206 was memory-bound
    on H100 and becomes compute-bound on H200 — these see the full 43% gain. Workloads already above 295
    (large-batch GEMM training) see nothing. Workloads far below 206 (LLM decode at $I \approx 1$) see
    the full 43% because they remain deep in the bandwidth-limited regime.
  common_mistake: '"More bandwidth means everything runs faster." This confuses memory-bound and compute-bound
    regimes. If a workload is already compute-bound on the H100, extra bandwidth is wasted silicon.'
  napkin_math: 'LLM decode (batch=1): $I \approx 1$ Ops/Byte. Throughput scales linearly with bandwidth:
    $4.8 / 3.35 = 1.43\times$ — full 43% speedup. Large-batch training GEMM (batch=256, hidden=4096):
    $I \approx 4096$ Ops/Byte, deep in compute-bound territory — 0% speedup. Embedding lookups: $I \approx
    0.25$ Ops/Byte — full 43% speedup. The H200 is a decode accelerator, not a training accelerator.'
