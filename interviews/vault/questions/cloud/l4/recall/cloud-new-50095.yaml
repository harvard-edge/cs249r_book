schema_version: 1
id: cloud-new-50095
title: Bucket Fusion Order and Its Effect on First-Bucket Overlap Latency
topic: communication-computation-overlap
status: published
provenance: imported
scenario: In DDP, gradient buckets are filled in reverse model order (last layer first, since backward
  goes from output to input). The first bucket to fill contains the output layer's gradients (smallest
  layer, ~1MB). Its AllReduce finishes quickly but starts late because the bucket is small. Meanwhile,
  huge intermediate layer buckets (25MB each) could benefit from earlier AllReduce starts. Optimize bucket
  formation for better overlap.
details:
  realistic_solution: 'Custom bucket assignment: (1) Group the output layer''s small gradients into the
    same bucket as the last few intermediate layers. This makes the first bucket larger (25MB) and delays
    its readiness by only a few ms, but the AllReduce is more bandwidth-efficient. (2) Use DDP''s bucket_cap_mb
    and find_unused_parameters to control bucketing. (3) Alternative: use gradient_as_bucket_view=True
    to eliminate buffer copies, and set bucket_cap_mb based on profiling: try 10MB, 25MB, 50MB, 100MB
    and measure step time. (4) Advanced: NVIDIA''s Apex DDP allows custom bucket assignments via register_grad_hook_per_bucket.
    Assign layers to buckets based on profiled backward timing, not just parameter count.'
  common_mistake: Using the same bucket size for all layers. The output layer's small gradients create
    a tiny first bucket that does not efficiently utilize AllReduce bandwidth, while large intermediate
    layers create buckets that are ready later but need more communication time.
  napkin_math: 'First bucket: 1MB AllReduce at 900 GB/s = 0.001ms (wasted bandwidth setup for trivial
    data). Optimal first bucket: 25MB at 900 GB/s = 0.028ms (still fast, but 25x more useful data per
    AllReduce call). Over 200 steps: saves 200 x 50us (reduced AllReduce calls) = 10ms total.'
