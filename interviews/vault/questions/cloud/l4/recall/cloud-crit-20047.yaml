schema_version: 1
id: cloud-crit-20047
title: Speculative Decoding Token Probability Calibration
topic: speculative-decoding
status: published
provenance: imported
scenario: In speculative decoding, the draft model q(x) and target model p(x) must be compared token by
  token. Why must speculative decoding use the full vocabulary probability distributions rather than just
  comparing top-1 tokens, and what property does the rejection sampling procedure guarantee?
details:
  realistic_solution: 'The rejection sampling procedure guarantees that the combined output distribution
    is exactly p(x) — the target model''s distribution. This is the lossless property. It works by: (1)
    sampling x ~ q(x) from draft, (2) accepting with prob min(1, p(x)/q(x)), (3) on rejection, sampling
    from the residual distribution max(0, p(x)-q(x))/Z. This ensures: P(output=x) = q(x) x min(1, p(x)/q(x))
    + P(rejected) x max(0, p(x)-q(x))/Z = p(x). Top-1 comparison would be lossy: if draft and target agree
    on top-1 but the target wants to sample a tail token 5% of the time, top-1 matching would suppress
    that 5% — changing the effective temperature and diversity of the target model. This matters for creative
    writing, diverse code generation, and any temperature > 0 use case.'
  common_mistake: Thinking top-1 comparison is equivalent to full distribution comparison. If both models
    predict the same top-1 token but with different probabilities, top-1 matching would accept at 100%
    rate, effectively replacing the target's sampling distribution with a deterministic one.
  napkin_math: 'Top-1 matching acceptance: ~90% for high-quality draft, but output distribution != p(x).
    Full rejection sampling: alpha = 1 - TV(p,q) ~ 80%, but output distribution = p(x) exactly. Lossless
    guarantee is non-negotiable for production.'
