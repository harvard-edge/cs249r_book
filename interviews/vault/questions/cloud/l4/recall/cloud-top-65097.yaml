schema_version: 1
id: cloud-top-65097
title: Hot Row Replication Strategy for Embedding Serving
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: An embedding table with 100M rows is sharded across 16 GPUs. Access logs show top 1000 rows
  receive 20% of all lookup requests, and these lookups always route to the same 2 GPUs (hot shards).
  P99 lookup latency is 10ms vs 2ms for cold rows. Design a hot row replication strategy.
details:
  realistic_solution: 'Hot row replication with update coalescing: (1) Identify hot rows: use a sliding
    window frequency counter (LFU) per shard. Top-K rows by access count flagged as hot. K=1000 rows,
    128-dim × 4B = 512KB total. (2) Replication: hot rows are replicated to all 16 shards. Each shard
    has a ''hot row cache'' (512KB — trivial). Lookup for hot row: served locally from any shard. (3)
    Update coalescing: during training, gradient updates to hot rows are accumulated across all shards
    using all-reduce. Applied to the canonical shard, then broadcast to all caches. Update frequency:
    once per step (not per lookup). All-reduce overhead: 512KB across 16 GPUs at 900 GB/s NVLink: 512KB
    / 900GB/s = 0.57µs per step. Negligible. (4) Cache invalidation: on hot row update, invalidate cache
    on all non-canonical shards atomically using a version counter. Serving replicas re-fetch on version
    mismatch.'
  common_mistake: Replicating hot rows to all 16 GPUs. For 1000 rows * 128-dim * 4B = 512KB of hot row
    data, this is trivial to replicate. But maintaining consistency across 16 replicas when hot rows are
    updated via gradient descent requires a broadcast operation to all 16 GPUs per training step, adding
    a 512KB all-broadcast per step.
  napkin_math: 'P99 latency improvement: pre-replication: 20% of traffic at 10ms (hot rows on 2 GPUs),
    80% at 2ms → P99 is 10ms (top 20% of requests are in the slow bucket). Post-replication: 20% at 0.5ms,
    80% at 2ms → P99 is 2ms (top 1% of requests are in the 2ms cold bucket; all hot rows now fast). P99
    improvement: 10ms → 2ms = 5× improvement.'
