schema_version: 1
id: cloud-r2-40033
title: AllReduce Communication Hiding with Computation Overlap
topic: gradient-synchronization
status: published
provenance: imported
scenario: Your 128-H100 training job has a 200ms backward pass and a 60ms AllReduce (2GB gradients over
  400Gbps). Currently these are sequential, giving 260ms per iteration. By overlapping AllReduce with
  backward computation (starting AllReduce for early layers while later layers still compute), calculate
  the maximum achievable overlap and the resulting iteration time.
details:
  realistic_solution: 'The backward pass computes gradients layer-by-layer from the last to the first.
    As soon as the last layer''s gradient is ready (early in the backward pass), its AllReduce can begin.
    With a model with L layers and roughly equal per-layer compute time: each layer''s backward takes
    200ms/L. AllReduce per bucket (assume 1 bucket per layer): 60ms/L (uniform distribution). The overlap
    is: all but the first layer''s AllReduce can overlap with subsequent layers'' backward computation.
    Sequential portion: max(last_layer_backward_time, first_bucket_allreduce_time) = max(200ms/L, 60ms/L).
    With L=100 layers: sequential portion = max(2ms, 0.6ms) = 2ms for the last backward + 0.6ms for the
    first AllReduce that can''t overlap = 2.6ms. Overlapped portion: the remaining 59.4ms of AllReduce
    runs concurrently with 197.4ms of backward compute. Total: 200ms (backward, unchanged) + 0.6ms (non-overlapping
    AllReduce tail) = 200.6ms. Speedup: 260ms → 200.6ms = 22.8% improvement. In practice, 85-90% overlap
    is achievable, giving ~205-210ms.'
  common_mistake: Assuming 100% overlap is achievable. The last layer's gradient must complete its backward
    pass before its AllReduce can start, and the first layer's AllReduce must complete before the next
    forward pass begins. There is always a sequential tail.
  napkin_math: 'Perfect overlap: iteration = max(backward, allreduce) = max(200, 60) = 200ms. Zero overlap:
    200 + 60 = 260ms. With 90% overlap: 200 + 60×0.1 = 206ms. Speedup: 260/206 = 26.2%. This is why frameworks
    like PyTorch DDP enable gradient bucketing and async AllReduce by default.'
