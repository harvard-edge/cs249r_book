id: cloud-cell-13099
title: 'TCO Realization: Concretely Size H100 Cluster Budget for Startup'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: A startup has a $500K/year ML infrastructure budget. They need to train a 13B model (2T tokens,
  1.56e23 FLOPs) twice a year and run inference at 10 req/s steady state. Concretely allocate the budget
  across training compute, inference compute, and storage. Use H100 on-demand pricing ($2.50/hr) and specify
  GPU counts.
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS per GPU. 8-GPU system aggregate: 7.9 PFLOPs/s at 100% utilization.'
  common_mistake: Allocating the entire budget to training without reserving sufficient capacity for inference,
    or vice versa — the two workloads have very different GPU requirements and time profiles.
  napkin_math: 'H100 at 989 TFLOPS FP16 (not 1979). Multi-GPU scaling: 8 H100s with NVLink 900 GB/s. AllReduce
    for 10GB: 2×7/8×10GB/900GB/s = 19.4ms. Compute for one iteration: depends on model size and batch.
    At 989 TFLOPS × 8: aggregate 7.9 PFLOPs/s.'
