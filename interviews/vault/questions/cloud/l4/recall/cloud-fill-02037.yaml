schema_version: 1
id: cloud-fill-02037
title: Gradient Checkpointing Impact on Synchronization Frequency
topic: gradient-synchronization
status: published
provenance: imported
scenario: Training a 30B parameter model on 32 H100s with gradient checkpointing enabled. Checkpointing
  reduces activation memory by 10× but requires a second forward pass per layer. The backward pass now
  takes 3× longer. Analyze how gradient checkpointing changes the compute-to-communication ratio and its
  impact on AllReduce overlap efficiency.
details:
  realistic_solution: 'Without checkpointing: backward=1200ms, AllReduce=600ms (33% of step). With checkpointing:
    backward=3600ms, AllReduce=600ms (14% of step). Compute-to-communication ratio improves from 2:1 to
    6:1. AllReduce overlap efficiency increases: with 3600ms backward and 600ms AllReduce, nearly 100%
    overlap is achievable since AllReduce completes well before backward finishes. Step time: without
    checkpointing=1200+600=1800ms (sequential) or ~1250ms (overlapped). With checkpointing=3600ms (AllReduce
    fully hidden). Net: checkpointing adds 2400ms compute but saves ~350ms AllReduce tail → step time
    3600ms. Without checkpointing but with overlap: 1250ms. Checkpointing is slower per step but enables
    larger models.'
  common_mistake: Assuming gradient checkpointing has no impact on AllReduce overlap; not recognizing
    that longer backward pass increases overlap opportunity.
  napkin_math: 'Without: backward=1200ms, AR=600ms, overlapped step≈1250ms. With: backward=3600ms, AR=600ms
    fully overlapped, step=3600ms. Per-step time ratio: 3600/1250=2.9×. But memory: 30B model activations
    without checkpointing ≈ 240GB >> 80GB HBM. Checkpointing makes 30B trainable on 32×80GB=2.56TB total.
    Trade-off is necessary.'
