schema_version: 1
id: cloud-sus-62044
title: Request Deduplication and Result Caching in Rec Serving
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: Your recommendation serving system at 500k QPS is spending 70% of GPU time on requests from
  users who visited within the last 30 seconds (re-requests from rapid page scrolling). The per-user recommendation
  list changes less than 2% between re-requests. Design a result caching layer and quantify the GPU load
  reduction, accounting for cache invalidation triggers.
details:
  realistic_solution: 'Two-level cache: (1) Hot result cache: cache the full ranked recommendation list
    per user, keyed by (user_id, context_hash). TTL: 30 seconds, but with event-based invalidation — invalidate
    immediately on any user interaction event (click, skip, dwell > 5s). (2) Invalidation mechanism: user
    interaction events are streamed to a lightweight invalidation service that deletes the cache entry
    for that user. Cache hit rate: 70% of requests are re-requests within 30s with <2% change. If 90%
    of those are passive (no interaction), cache serves 70% × 90% = 63% of requests. GPU load reduction:
    63% fewer requests to the ranking model. From 500k QPS to 185k QPS on GPU. GPU savings: 63% reduction.
    Cache storage: 500k active users × avg list 10 items × 8 bytes item_id = 40 MB — trivial.'
  common_mistake: Caching at the response level without considering that recommendation lists should be
    refreshed after user interactions (clicks, skips) — a staleness-unaware cache degrades CTR by serving
    stale lists after user feedback events.
  napkin_math: '500k QPS × 9ms = 4,500,000 GPU-ms/s = 4,500 GPU-seconds/s → need 4,500 GPUs continuously.
    With 63% cache hit: 185k QPS × 9ms = 1,665,000 GPU-ms/s → 1,665 GPUs. 1 GPU handles 1000ms/9ms ≈ 111
    RPS. Savings: 2,835 GPUs × $3.50/hr = $9,922/hr. At $3.50/GPU-hr, cache saves ~63% GPU cost for serving.'
