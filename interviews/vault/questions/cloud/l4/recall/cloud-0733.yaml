schema_version: 1
id: cloud-0733
title: The AllReduce Incast Congestion
topic: collective-communication
status: published
provenance: imported
scenario: You are scaling Data Parallel training from 128 to 512 GPUs. You use a standard hierarchical
  AllReduce. While the mathematical volume of data sent per GPU is constant regardless of cluster size,
  the actual network time triples when moving to 512 GPUs. Packet loss metrics show a huge spike. What
  physical network phenomenon is causing this?
details:
  realistic_solution: 'This is TCP/RoCE incast congestion. During the AllReduce reduce-scatter phase,
    multiple sender GPUs simultaneously transmit gradient chunks to the same destination switch port.
    With 512 GPUs, the burst of traffic from dozens of senders overwhelms the ToR switch''s egress buffer
    (typically 2-32 MB). Packets are dropped, triggering TCP retransmissions (adding 200ms+ RTOs) or RoCE
    PFC pause frames (backpressuring the entire network). The fix: use DCQCN congestion control for RoCE,
    implement ECN marking at switches, or use tree-based AllReduce patterns that reduce the fan-in at
    any single switch port.'
  common_mistake: '"The bandwidth is saturated." If the volume of data per GPU is constant, the bandwidth
    requirement per link is constant. The issue is buffers, not bandwidth.'
  napkin_math: 8 nodes sending 1 MB chunks to 1 destination simultaneously = 8 MB burst. If the switch
    port only has 2 MB of dedicated egress buffer, 6 MB of packets are instantly dropped in the span of
    a few microseconds.
