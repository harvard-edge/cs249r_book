id: cloud-1938
title: Diagnosing Optimal Retraining Frequency for Ad CTR Models
topic: pruning-sparsity
status: published
provenance: imported
scenario: An e-commerce platform relies on an Ad CTR prediction model (a massive DLRM) running on a fleet
  of 50 T4 GPUs. The model's AUC decays steadily by 0.005 every 24 hours without retraining, resulting
  in an estimated linear revenue loss of $10,000 per day of staleness. However, running a full distributed
  retrain on an 8-node A100 cluster costs $4,000 per job. Currently, the ML Ops team has scheduled retraining
  every 12 hours to maximize freshness, but overall infrastructure costs are ballooning. You are asked
  to analyze the current schedule and determine if the retraining frequency is optimal or if there's a
  more cost-effective equilibrium.
details:
  realistic_solution: Formulate a total cost function that balances the daily amortized cost of retraining
    and the average daily revenue lost to staleness. By taking the derivative of this total cost with
    respect to the retraining interval, you can find the global minimum cost, which proves the current
    12-hour schedule is heavily over-indexed on freshness at the expense of compute.
  common_mistake: Candidates often assume that maximizing model freshness (retraining as frequently as
    possible) is always the correct goal, ignoring the non-linear relationship between fixed retraining
    infrastructure costs and marginal revenue gained from preventing staleness.
  napkin_math: 'Let T be the retraining interval in days. Average staleness is T/2. Daily staleness cost
    = $10,000 * (T/2) = $5,000*T. Daily compute cost = $4,000/T. Total Cost(T) = 5000*T + 4000/T. Current
    schedule (T=0.5 days): Total Cost = $2,500 + $8,000 = $10,500/day. Minimum cost is at derivative 5000
    - 4000/T^2 = 0 -> T^2 = 0.8 -> T ≈ 0.89 days (21.4 hours). Moving to a 24-hour schedule (T=1.0) costs
    $5,000 + $4,000 = $9,000/day, saving $1,500/day compared to the 12-hour baseline.'
