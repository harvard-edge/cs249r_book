schema_version: 1
id: cloud-2475
title: The Edge LLM Memory Wall
topic: vram-budgeting
status: published
provenance: imported
scenario: You deploy an 8B parameter LLM (4-bit quantized) to a new Edge AI PC featuring a 45 TOPS NPU.
  A cloud T4 GPU (65 TFLOPS) achieves 30 tokens/sec. The Edge NPU only achieves 8 tokens/sec, despite
  45 TOPS being highly competitive with 65 TFLOPS for low-precision math. The NPU utilization is under
  5%. What is the limiting factor?
details:
  realistic_solution: Autoregressive LLM generation at batch size 1 is strictly memory-bandwidth bound,
    not compute bound. The TOPS rating is irrelevant for token generation because every parameter must
    be loaded from RAM exactly once per token. The Edge PC uses standard LPDDR5 memory shared with the
    CPU, which has vastly lower bandwidth than the dedicated GDDR6 memory on a cloud GPU. The NPU is starved
    for data and spends 95% of its time waiting for memory fetches.
  common_mistake: Assuming the NPU driver has a high overhead per token or the 4-bit dequantization kernel
    is unoptimized.
  napkin_math: 'Model size: 8 billion parameters * 4 bits (0.5 bytes) = 4 GB. Cloud T4 GPU memory bandwidth:
    320 GB/s. Theoretical max tokens/sec = 320 / 4 = 80 tok/s (achieves 30 due to overhead). Edge PC LPDDR5
    bandwidth: 32 GB/s. Theoretical max tokens/sec = 32 GB/s / 4 GB/tok = 8 tokens/sec. The hardware is
    mathematically capped at 8 tok/s regardless of TOPS.'
