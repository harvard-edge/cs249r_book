schema_version: 1
id: cloud-fill-02050
title: GPUDirect Storage and RDMA for Checkpoint Loading on H100
topic: rdma-transport
status: published
provenance: imported
scenario: Checkpointing a 70B parameter model (280GB BF16) to NFS takes 8 minutes. Restoring after failure
  takes 12 minutes, causing 20-minute recovery windows during 14-day training. Evaluate GPUDirect Storage
  (GDS) as a solution and calculate the expected improvement.
details:
  realistic_solution: 'Current path: GPU HBM → CPU DRAM (PCIe, 64GB/s) → CPU copy → NFS write. CPU copy
    overhead = 280GB / 64GB/s = 4.4s (CPU copy). NFS bandwidth: 280GB / 480s = 0.58GB/s → NFS is the bottleneck,
    not the CPU copy! GDS path: GPU HBM → P2P RDMA to storage NIC → NFS server. Eliminates CPU copy but
    NFS throughput is still 0.58GB/s. GDS speedup limited. Real fix: NFS server RDMA bandwidth upgrade
    (25GbE → 100GbE), or use distributed checkpointing with multiple NFS servers in parallel. With 8 NFS
    servers: 8×0.58=4.6GB/s → 280/4.6=61s save, 90s restore.'
  common_mistake: Assuming GPUDirect Storage always helps without quantifying the NFS throughput bottleneck
    versus PCIe bandwidth; sometimes NFS is the bottleneck, not CPU copy overhead.
  napkin_math: 'NFS throughput: 280GB/480s=583MB/s. PCIe 4.0 ×16: 64GB/s. CPU copy time: 280GB/64GB/s=4.4s.
    NFS time: 480s >> 4.4s. CPU copy is <1% of total. GDS saves <4.4s on 480s → 0.9% improvement. Real
    bottleneck: NFS. Fix NFS first. 8 parallel NFS mounts with 10GbE each: 8×1.25=10GB/s → 280/10=28s
    save! Recovery: 42s vs 12 min = 17× faster.'
