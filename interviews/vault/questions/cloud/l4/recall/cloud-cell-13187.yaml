schema_version: 1
id: cloud-cell-13187
title: 'Transformer Cost Realization: Concrete FLOP Count for BERT Training'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Concretely calculate the total training FLOPs for BERT-base (110M params, 12 layers, hidden=768,
  seq=512, 1M training steps, batch=256). Use the 6ND approximation and verify by counting FLOPs layer
  by layer for one forward pass. Compare the two estimates.
details:
  realistic_solution: 'FFN FLOPs: 2 × 2 × 256 × 512 × 768 × 3072 = 2×2×256×512×768×3072. Calculating:
    2×2=4; 4×256=1024; 1024×512=524,288; 524,288×768=402,653,184; 402,653,184×3072 = 1,236,950,048,768
    ≈ 1.237×10^12 (not 1.55×10^12).'
  common_mistake: Applying 6ND where D is total tokens = steps * batch * seq, not total samples, and confusing
    gradient accumulation steps with actual training steps.
  napkin_math: '6ND: 6*110e6*131.1e9=8.63e19. Layer-by-layer forward (per step batch=256, seq=512): QKV:
    3*2*256*512*768^2=3*2*256*512*589,824=4.636e11. Attn: 2*256*12*262,144*64=1.025e11. FFN: 2*2*256*512*768*3072=1.237e12
    (not 1.55e12). LN+other: ~0.1e12. Total forward: ~2.0e12. Backward: 2x forward=4.0e12. Per step: 6.0e12
    FLOPs. 1M steps: 6.0e18. 6ND estimate: 8.63e19. Ratio: 8.63e19/6.0e18=14.4x.'
