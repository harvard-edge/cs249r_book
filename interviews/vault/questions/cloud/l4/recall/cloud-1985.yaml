schema_version: 1
id: cloud-1985
title: Diagnosing Synchronous Checkpoint Bottlenecks
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 175B parameter LLM on 128 nodes (1024 A100 80GB GPUs). The training framework
  uses synchronous checkpointing to save the global model and optimizer state (totaling 2.8 TB) every
  hour. Each node is equipped with a 100 Gbps network interface. However, checkpointing pauses training
  for a full 5 minutes each time, reducing your effective training throughput by over 8%. Network monitoring
  reveals that peak interconnect utilization is under 1% during the checkpoint phase. Diagnose the primary
  bottleneck causing this delay.
details:
  realistic_solution: 'The bottleneck is the centralized storage system''s write throughput (e.g., a shared
    NFS drive). To resolve this, implement two-stage checkpointing: workers synchronously write shards
    to their local NVMe SSDs, and a background thread asynchronously uploads the files to persistent object
    storage.'
  common_mistake: Assuming the bottleneck is the cross-node network bandwidth limits or the NCCL barrier
    synchronization overhead required to coordinate the 1024 GPUs.
  napkin_math: Total checkpoint size = 2.8 TB. Total cluster network capacity = 128 nodes * 12.5 GB/s
    = 1.6 TB/s. Theoretical time to transfer over network = 2.8 TB / 1.6 TB/s = 1.75 seconds. Actual observed
    time = 300 seconds. Effective storage bandwidth = 2.8 TB / 300s = ~9.3 GB/s. The storage backend is
    the clear bottleneck.
