id: cloud-fill-01613
title: 'Optimizing Data Efficiency on Google TPU v5e: Addressing Model Collapse in Large-Scale Foundation
  Models'
topic: data-efficiency-selection
status: published
provenance: imported
scenario: Your team is training a massive foundation model on a cluster of Google TPU v5e devices, each
  offering 16 GB HBM, 197 TFLOPS BF16 performance, and 1.6 TB/s memory bandwidth. You've observed that
  despite scaling up training data, model performance gains are diminishing, and in some cases, the model
  exhibits early signs of model collapse due to the inclusion of low-quality or redundant data, impacting
  the Information-Compute Ratio (ICR). The vast dataset (hundreds of terabytes) makes full data curation
  impractical, and you suspect the 'data wall problem' is hindering further progress and wasting valuable
  TPU compute cycles. You need to diagnose this bottleneck and propose a quantifiable solution.
details:
  realistic_solution: 'Implement a two-pronged data efficiency strategy: First, leverage coreset selection
    techniques (e.g., based on gradients, influence functions, or representativeness sampling) to identify
    and prioritize the most informative data subsets for each training epoch, reducing the effective dataset
    size. Second, incorporate curriculum learning by progressively introducing more complex or novel data
    samples, ensuring the model learns from high-value information first. This can be combined with synthetic
    data generation for specific hard-to-acquire examples, carefully monitoring for potential risks of
    distribution shift or amplifying biases. The goal is to maximize the ICR by feeding the TPUs the most
    impactful data.'
  common_mistake: Blindly increasing the volume of training data without considering its quality, diversity,
    or relevance, leading to an inflated compute cost per unit of information, slower training convergence,
    and potentially model collapse due to exposure to corrupted or excessively redundant samples. This
    often stems from a lack of systematic data pruning or coreset selection strategies.
  napkin_math: 'Assume current training uses 100TB of data, and 20% is redundant/low-quality. Each epoch
    takes 48 hours on 1000 TPU v5e chips. A coreset selection algorithm (e.g., training a small proxy
    model to identify influential samples) can reduce the effective dataset size by 30% while retaining
    95% of performance, incurring an initial one-time overhead of 24 hours on 100 TPU v5e chips. Calculate
    the estimated reduction in total compute hours (TPU-chip-hours) over 50 epochs due to data pruning.
    Initial: 1000 chips * 48 hrs/epoch * 50 epochs = 2,400,000 chip-hours. With coreset (70% data size,
    assuming 70% epoch time): 1000 chips * (0.7 * 48 hrs/epoch) * 50 epochs + (100 chips * 24 hrs) = 1,680,000
    chip-hours + 2,400 chip-hours = 1,682,400 chip-hours. Savings: (2,400,000 - 1,682,400) / 2,400,000
    = ~30% compute savings.'
