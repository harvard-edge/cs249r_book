schema_version: 1
id: cloud-cell-12004
title: 'Latency Decomposition: Size the Per-Component Latency for a 70B Model Serving Request'
topic: latency-decomposition
status: published
provenance: imported
scenario: Concretely size the per-component latency breakdown for serving a single request to a 70B LLaMA
  model on one H100 node (80GB HBM3, 3.35TB/s, 989 TFLOPS BF16). The request is 256 tokens prompt, 64
  tokens output. Assume no batching, no speculative decoding, and that weights fit in HBM after tensor-parallel
  split across 4 GPUs with NVLink (600GB/s bidirectional).
details:
  realistic_solution: H100 NVLink 4.0 provides 900 GB/s total bidirectional bandwidth (not 600 GB/s —
    that is A100 NVLink 3.0). AllReduce time scales as 2×(N-1)/N×data/bandwidth.
  common_mistake: Not accounting for NVLink all-reduce overhead in tensor parallelism, and treating 4-GPU
    as if it's a single GPU with 4× compute.
  napkin_math: '8-GPU H100 node NVLink: NVLink 4.0 = 900 GB/s total bidirectional (not 600 GB/s which
    is A100 NVLink 3.0). AllReduce for 10GB gradients: 2 × (8-1)/8 × 10GB / 900 GB/s = 2 × 0.875 × 10
    / 900 = 0.0194s ≈ 19.4ms. At 50% bandwidth utilization: ~39ms. Sub-ms for small tensors.'
