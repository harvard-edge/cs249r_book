id: cloud-1012
title: Diagnosing Loss Spikes During Elastic Training Scaling
topic: pruning-sparsity
status: published
provenance: imported
scenario: Your training job for a 13B parameter LLM is configured for elastic scaling on AWS EC2 P4d (8x
  A100 40GB) instances. The job starts with 16 nodes (128 GPUs). When spot instances become available,
  the orchestrator scales the cluster up to 32 nodes (256 GPUs). Immediately after scaling, the training
  loss spikes drastically and the model diverges. The optimizer is AdamW with a learning rate of 1e-4,
  and the per-GPU micro-batch size is hardcoded to 8.
details:
  realistic_solution: 'Diagnose that the effective global batch size inadvertently doubled from 1024 to
    2048 because the per-GPU batch size was hardcoded. The correct fix is to implement constant batch
    size scaling: dynamically reduce the per-GPU micro-batch size to 4 or decrease gradient accumulation
    steps proportionally so the global batch size remains exactly 1024.'
  common_mistake: Candidates often blame the loss spike on stale gradients, network congestion during
    the topology change, or optimizer state corruption during the checkpoint resume, failing to realize
    the effective batch size doubled, altering optimization dynamics.
  napkin_math: 'Total Global Batch Size (GBS) before scaling: 128 GPUs * 8 micro-batch = 1024 samples.
    When cluster elastically scales to 256 GPUs (32 nodes), keeping the micro-batch at 8 would double
    GBS to 2048, altering convergence dynamics. To maintain strict mathematical equivalence with a constant
    GBS of 1024, adjust the per-GPU batch size: 1024 / 256 GPUs = 4 samples per GPU.'
