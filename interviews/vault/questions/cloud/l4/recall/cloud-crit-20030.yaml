schema_version: 1
id: cloud-crit-20030
title: Speculative Decoding Acceptance Rate Fundamentals
topic: speculative-decoding
status: published
provenance: imported
scenario: A draft model proposes K=5 tokens speculatively, and the target 70B model on H100 verifies them
  in one forward pass. If the acceptance rate is alpha=0.8 per token, what is the expected number of accepted
  tokens per speculation round, and what is the effective speedup over autoregressive decoding?
details:
  realistic_solution: 'Tokens are accepted sequentially: token 1 accepted with probability alpha, token
    2 accepted with probability alpha (conditional on 1 accepted), etc. Expected accepted tokens E[n]
    = alpha + alpha^2 + ... + alpha^K + correction = (1 - alpha^(K+1))/(1-alpha) - 1 = (1-0.8^6)/(1-0.8)
    - 1 = (1-0.262)/0.2 - 1 = 3.69 - 1 = 2.69. Plus 1 token always generated (the first correct token
    after rejection or end of sequence): E[tokens] = 2.69 + 1 = 3.69 tokens per round. Autoregressive:
    1 token per forward pass. Speedup depends on draft model cost. If draft is free: 3.69x. If draft costs
    0.1x of target: effective speedup = 3.69 / (1 + 5 x 0.1) = 3.69/1.5 = 2.46x.'
  common_mistake: Computing expected accepted tokens as K x alpha = 4. This ignores that rejection at
    position i means positions i+1 through K are also rejected — it's a geometric distribution, not independent.
  napkin_math: 'E[accepted] = (1 - 0.8^6) / 0.2 - 1 = 2.69. E[tokens/round] = 3.69. Draft overhead: 5
    x 10% = 50%. Net speedup: 3.69 / 1.5 = 2.46x.'
