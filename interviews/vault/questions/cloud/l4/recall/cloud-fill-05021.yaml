schema_version: 1
id: cloud-fill-05021
title: Prefill Batch Sizing for TTFT Optimization on A100
topic: batching-strategies
status: published
provenance: imported
scenario: An A100 80GB serves a chatbot with SLA of 300ms TTFT (time to first token). Prefill of a 1024-token
  prompt takes 50ms at batch_size=1. The team wants to batch prefill operations to improve GPU utilization.
  At what batch size does TTFT SLA become violated?
details:
  realistic_solution: 'Prefill at batch=1: 50ms for 1024 tokens. Prefill is compute-bound (high arithmetic
    intensity from QK^T over full sequence). Batch scaling: compute increases linearly but GPU utilization
    also increases → roughly constant 50ms until compute-saturated. A100 at batch=1: likely underutilized.
    Saturation batch size: A100 compute budget / prefill FLOPs per sequence (1.37 TFLOPs at seq=1024).
    At batch=4-6, A100 likely saturates. Above saturation, TTFT = N×50ms/batch = queue wait time increases.
    SLA 300ms: TTFT = queue_wait + prefill_time. Max queue: 300ms - 50ms = 250ms. If prefill saturates
    at batch=6: throughput = 6/50ms = 120 prefills/sec. Queue wait at 100 req/s: 100/120 = 83% utilization
    → avg wait = 50ms/(1-0.83) ≈ 294ms. Close to limit.'
  common_mistake: Treating prefill as linearly scaling with batch size; prefill is compute-bound (unlike
    decode which is memory-bound), so it scales efficiently up to the compute limit.
  napkin_math: 'Prefill FLOPs: 2×1024×1024×8192×80 layers ≈ 1.37T FLOPs. A100: 312 TFLOPS. Saturate at:
    312T / 1.37T ≈ 228 seq in parallel (i.e., very high batch before compute saturation). But KV memory
    limits: 1024×8192×2×2B×80 = 2.1GB per seq → 80GB/2.1GB = 38 sequences max. Compute-bound at batch
    ≥ 28.'
