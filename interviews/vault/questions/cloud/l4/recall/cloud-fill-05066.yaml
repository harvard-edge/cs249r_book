schema_version: 1
id: cloud-fill-05066
title: Roofline Model for Transformer Encoder vs Decoder on TPU v5e
topic: roofline-analysis
status: published
provenance: imported
scenario: 'TPU v5e runs BERT-large encoder (336M params, 1.2 TFLOP/seq at seq=512) and GPT-2-large decoder
  (774M params, decode step = 2.3 GFLOP at seq=1). TPU v5e: 197 TFLOPS BF16, 819 GB/s HBM. Calculate the
  arithmetic intensity and roofline position for each use case.'
details:
  realistic_solution: 'BERT encoder (batch=64, seq=512): total FLOPs = 64×1.2T = 76.8T. Memory: 336M×2B
    = 672MB weights + 64×512×1024×2B×4 = 268MB activations = ~940MB. AI = 76.8T/940MB = 81.7 FLOPs/byte.
    TPU v5e ridge: 197T/819G = 240 FLOPs/byte. Encoder AI (82) < ridge (240) → memory-bound but approaching
    compute region. GPT-2-large decoder (batch=1, 1 token): FLOPs = 2.3G. Memory: 774M×2B = 1.548GB loaded
    per token. AI = 2.3G/1.548G = 1.49 FLOPs/byte — deeply memory-bound. Encoder throughput ceiling: 819
    GB/s × 81.7 = 66.9 TFLOPS. Decoder ceiling: 819 GB/s × 1.49 = 1.22 TFLOPS effective. Ridge-to-ridge
    comparison: encoder 34% efficiency, decoder 0.6% efficiency.'
  common_mistake: Treating encoder and decoder as having similar arithmetic intensity; decoder single-token
    generation is highly memory-bandwidth-bound while encoder batch processing is compute-bound.
  napkin_math: 'Ridge: 197T/819G = 240 FLOPs/B. Encoder AI: 76.8T/940MB = 81.7 FLOPs/B → memory-bound,
    ceiling = 819G×81.7 = 66.9 TFLOPS. Decoder AI: 2.3G/1.548G = 1.49 FLOPs/B → memory-bound, ceiling
    = 1.22 TFLOPS. Encoder 34% of peak; decoder 0.6% of peak.'
