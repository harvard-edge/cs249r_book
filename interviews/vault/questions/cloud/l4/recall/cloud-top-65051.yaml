schema_version: 1
id: cloud-top-65051
title: Decode Pool Scaling Policy Under Variable Output Length
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'A disaggregated decode pool processes requests with highly variable output lengths: 10% of
  requests generate 2000+ tokens (long-tail). These long requests occupy decode GPU slots for 40x longer
  than median requests, causing P99 TTOT to spike. Design a scheduling policy.'
details:
  realistic_solution: 'Multi-queue scheduling for decode pool: (1) Length prediction: at the end of prefill,
    use a lightweight length predictor (trained on prompt features) to estimate output length. Accuracy
    ~70% for broad buckets (short <50, medium 50-500, long 500+). (2) Preemptive multi-queue: assign requests
    to priority queues by predicted length. Short requests run at highest priority. Long requests are
    preempted after N tokens (configurable threshold) if short requests are waiting. (3) Preemption strategy:
    when a short request arrives and decode pool is full with a long request, pause the long request (checkpoint
    KV cache position + generated tokens), migrate to lower-priority queue. Resume when short requests
    clear. KV cache migration cost: negligible if within same GPU (just update scheduler state). (4) Max
    token budget per scheduling quantum: long requests get 50 tokens per quantum before yielding. Short
    requests run to completion.'
  common_mistake: Using FIFO scheduling in the decode pool. Long requests that arrive first or early block
    short requests from completing, inflating P99 tail latency. FIFO is fair but not latency-optimal for
    mixed workloads.
  napkin_math: 'Decode pool with 8xH100. At 100 tok/sec per request per H100 decode: each H100 handles
    ~80 requests in continuous batch (memory limited). 2000-token request occupies one slot for 20 seconds.
    50-token request: 0.5 seconds. FIFO at 10% long: if 8 slots, probability all 8 are occupied by long
    requests: 0.1^8 = negligible. But if long requests arrive in bursts: FIFO P99 = time for long request
    to complete = 20 seconds. With preemption at 50-token quantum: P99 for short requests = wait for one
    quantum of long request + own decode = 50/100 = 0.5s + 0.5s = 1s vs 20s FIFO. 20x P99 improvement.'
