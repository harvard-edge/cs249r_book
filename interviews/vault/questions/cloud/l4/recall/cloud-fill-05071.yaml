schema_version: 1
id: cloud-fill-05071
title: Gradient Compression Impact on AllReduce Bandwidth on H100 Cluster
topic: collective-communication
status: published
provenance: imported
scenario: A 32-GPU H100 training cluster uses 400GbE (50 GB/s per link). AllReduce of 26GB gradients takes
  832ms without compression. Top-K gradient sparsification at 99.9% sparsity (keep top 0.1%) reduces gradient
  to 26MB. Evaluate the throughput improvement and accuracy risk.
details:
  realistic_solution: 'Without compression: AllReduce takes 832ms per scenario (2×(31/32)×26GB/50GB/s
    ≈ 1.55s theoretical, but scenario specifies 832ms measured). With 99.9% sparsity: compressed payload
    = 26MB (values) + 26MB (indices at INT32) = 52MB. AllReduce: 2×(31/32)×52MB/50GB/s = 3.1ms. Speedup:
    1550ms/3.1ms = 500×. Accuracy risk: without error feedback (EF), dropped gradients cause ~5-10% accuracy
    loss at convergence. With EF (accumulate dropped gradients locally, add to next step): convergence
    matches dense gradients within 1-2%. Implementation: PowerSGD or Top-K with error feedback. Additional
    cost: Top-K selection on 26GB: O(n log k) → ~200ms on GPU. Net speedup: 832/(200+3.1) = 4.1×.'
  common_mistake: Applying Top-K sparsification per-step without gradient accumulation; gradients from
    the non-selected 99.9% are lost permanently, causing training divergence unless error feedback is
    used.
  napkin_math: 'Dense AllReduce: 832ms (per scenario). Sparse (0.1% = 26MB + 26MB indices = 52MB): 3.1ms.
    Raw speedup: 500×. Top-K selection cost: ~200ms. Net communication+selection: 203ms vs 832ms = 4.1×
    improvement. With error feedback: no accuracy loss.'
