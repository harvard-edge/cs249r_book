id: cloud-1502
title: Hardware Refresh Carbon ROI
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: A cloud provider operates a 512-GPU A100 cluster (64 servers, 6kW/server) for ML inference in
  a facility powered by a low-carbon hydroelectric grid (40 gCO2eq/kWh). The A100 servers have 2 years
  of their expected 4-year lifecycle remaining. To reduce datacenter power draw, the infrastructure team
  proposes immediately replacing them with 128 H100 GPUs (16 servers, 10kW/server) which can handle the
  identical throughput. A new 8x H100 server has an estimated embodied manufacturing carbon footprint
  of 15,000 kgCO2eq. Analyze the lifecycle carbon accounting of this hardware refresh over the next 2
  years.
details:
  realistic_solution: Calculate the carbon payback period by comparing the annual operational carbon savings
    to the new embodied carbon debt. Because the grid is incredibly clean, the operational emissions are
    too small to quickly amortize the massive embodied footprint of manufacturing new H100 servers, meaning
    the existing hardware should be retained for its full lifecycle.
  common_mistake: Focusing solely on the significant operational power reduction (384kW down to 160kW)
    while ignoring how a low-carbon energy grid drastically shifts the lifecycle emissions ratio toward
    embodied carbon, extending the carbon payback period.
  napkin_math: 'A100 Op Carbon: 64 servers * 6kW * 8760 hrs * 0.04 kg/kWh = 134,553 kgCO2eq/yr. H100 Op
    Carbon: 16 servers * 10kW * 8760 hrs * 0.04 kg/kWh = 56,064 kgCO2eq/yr. Annual Savings = 78,489 kgCO2eq/yr.
    H100 Embodied Debt: 16 servers * 15,000 kg = 240,000 kgCO2eq. Carbon Payback Period = 240k / 78.5k
    = 3.05 years. Since 3.05 > 2 years remaining, upgrading increases net carbon by ~83 tons.'
