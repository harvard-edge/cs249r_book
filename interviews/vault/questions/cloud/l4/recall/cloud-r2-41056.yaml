schema_version: 1
id: cloud-r2-41056
title: GPU Node Autoscaling in Kubernetes
topic: container-orchestration
status: published
provenance: imported
scenario: You run an inference service on Kubernetes with the cluster autoscaler. GPU node spin-up takes
  5-7 minutes (vs 30 seconds for CPU nodes). How do you design autoscaling to handle traffic spikes without
  5-minute cold starts?
details:
  realistic_solution: 'Multi-layer strategy: (1) Warm pool: maintain 1-2 GPU nodes in ''standby'' — empty
    but running with GPU drivers loaded. Cost: $6-12/hr for 2 idle H100 nodes. When HPA scales up, pods
    land on warm nodes in <30 seconds. Cluster autoscaler replenishes the warm pool in the background.
    (2) Predictive scaling: use KEDA (Kubernetes Event-Driven Autoscaler) with custom metrics from traffic
    prediction. If traffic follows daily patterns (peak at 10 AM), pre-scale at 9:55 AM. (3) Overprovisioning
    with priority: create low-priority ''placeholder'' pods that reserve GPU resources. When real workloads
    arrive, the placeholder pods are evicted (priority-based preemption), and real pods start immediately.
    The evicted placeholders trigger cluster autoscaler to add new nodes. (4) Multi-model serving: pack
    multiple models onto each GPU using NVIDIA Triton with model instances. Scale model replicas within
    existing GPUs before scaling GPU nodes. (5) Serverless fallback: route overflow traffic to a serverless
    GPU endpoint (AWS Inferentia, GCP Cloud Run GPU) during scale-up delays. Pay premium for burst but
    maintain SLA.'
  common_mistake: Relying solely on reactive autoscaling (Horizontal Pod Autoscaler + Cluster Autoscaler).
    By the time the HPA detects high load, requests the cluster autoscaler to add a node, and the node
    boots with GPU drivers, 5-7 minutes have passed — violating SLAs.
  napkin_math: 'Warm pool cost: 2 H100 nodes × $24/hr = $48/hr = $1,152/day. SLA violation cost: 5 min
    downtime × 1000 req/s × $0.01/failed_req = $3,000 per incident. Break-even: 1 incident every 2.6 days.'
