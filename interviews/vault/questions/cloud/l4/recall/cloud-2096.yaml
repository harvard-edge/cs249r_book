id: cloud-2096
title: MoE Sparse vs Dense FLOP Equivalence
topic: mixture-of-experts
status: published
provenance: imported
scenario: Mixtral 8x7B has 8 experts of ~7B parameters each with top-2 routing, for a total of ~47B parameters.
  However, each token only activates 2 of 8 experts. Compare the per-token inference FLOPs to a dense
  47B model and a dense 13B model. Why does MoE achieve 'more capacity for fewer FLOPs'?
details:
  realistic_solution: 'Each token activates: shared attention layers (~6B params) + 2 of 8 FFN experts
    (~7B each, but each expert FFN is ~3.5B). Active params per token: ~13B. Per-token FLOPs are approximately
    equal to a dense 13B model, NOT a 47B model. But the model has 47B total parameters — more representational
    capacity (different inputs route to different experts, allowing specialization). The systems tradeoff:
    MoE gets 47B-quality at 13B-compute, but requires 47B of memory and introduces routing + AllToAll
    communication overhead.'
  common_mistake: Thinking Mixtral uses 47B parameters per token. The '8x7B' naming is misleading — the
    shared attention layers mean total unique parameters are ~47B, but per-token active parameters are
    ~13B.
  napkin_math: 'Dense 47B: ~94 TFLOPs per token (at ~2 FLOPs/param). | MoE 8x7B (top-2): ~26 TFLOPs per
    token (13B active). | Dense 13B: ~26 TFLOPs. | MoE compute ≈ dense 13B, but memory ≈ dense 47B. |
    Memory: 47B × 2B (BF16) = 94 GB vs 26 GB for dense 13B.'
