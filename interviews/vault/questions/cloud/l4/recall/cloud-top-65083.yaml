id: cloud-top-65083
title: Embedding Gradient Sparsity and Optimizer Choice
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: A DLRM training system uses Adam optimizer for all parameters including embedding tables. Training
  throughput is 25% slower than a comparable system using SGD. Explain why and choose the optimal optimizer
  for each component.
details:
  realistic_solution: 'Optimizer selection by parameter type: (1) Embedding tables: use Adagrad or sparse
    Adam. These only update and store second moments for rows that received gradients in the current batch.
    Memory savings: if 1% of rows active per batch, dense Adam stores 3x memory for 100% of rows; sparse
    Adam stores for 1% of rows = 300x memory reduction for moment estimates. Speed: sparse update only
    touches active rows, reducing memory bandwidth. (2) Dense MLP layers: use Adam — fully dense gradients,
    moment estimates justified. (3) Implementation: PyTorch SparseAdam (torch.optim.SparseAdam) handles
    sparse gradients correctly. FBGEMM (Meta''s library) has optimized sparse embedding updates. (4) Learning
    rate schedule: Adagrad for embeddings has adaptive learning rate per row — rows with few updates get
    higher effective lr, good for tail items. Combined: Adagrad for embeddings + Adam for MLP. Training
    throughput improvement: expected 20-30% speedup from reduced optimizer memory bandwidth.'
  common_mistake: Using Adam uniformly for all parameters including embedding tables. Adam maintains two
    moment estimates (m, v) per parameter. For embedding tables, 99% of rows have zero gradients per batch
    — Adam stores 3x the memory of the embedding table for unused rows and performs unnecessary operations
    on zero-gradient rows.
  napkin_math: 'Embedding table 10M rows * 64 * 4B = 2.56GB. Adam moment estimates (m + v, FP32): 2 *
    2.56GB = 5.12GB. Sparse Adam: only update rows with gradient. Batch of 4K samples, 10 lookups each:
    40K unique rows per batch = 0.4% of 10M rows. Sparse moment memory: 0.4% * 5.12GB = 20.5MB actively
    updated per step. But stored for all rows: still 5.12GB. Sparse Adam reduces UPDATE time: 0.4% of
    rows need moment computation = 75x speedup for optimizer step. Total speedup: if optimizer step is
    30% of training time: 0.3 * (1 - 1/75) + 0.7 = 0.996 + 0.7 -- wrong approach. Speedup = 1/(0.7 + 0.3/75)
    = 1/(0.7 + 0.004) = 1/0.704 = 1.42x. 42% speedup on optimizer step, ~25% total training speedup.'
