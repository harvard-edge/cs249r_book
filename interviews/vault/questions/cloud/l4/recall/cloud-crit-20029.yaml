schema_version: 1
id: cloud-crit-20029
title: FlashAttention Numerical Stability in Mixed Precision Training
topic: flash-attention
status: published
provenance: imported
scenario: FlashAttention computes attention in FP16/BF16 but maintains softmax statistics (row max and
  log-sum-exp) in FP32. On H100, explain why this mixed-precision approach is necessary and what numerical
  failure mode occurs if softmax statistics are kept in FP16.
details:
  realistic_solution: 'FP16 has 10-bit mantissa = 3.3 decimal digits of precision. The online softmax
    maintains a running log-sum-exp value l_i that accumulates across N/B_c tiles. For seq_len=32K with
    B_c=128: 256 accumulations. Each accumulation involves exp(m_old - m_new) which can produce very small
    values (e.g., exp(-10) = 4.5e-5). In FP16, values below 6e-8 underflow to zero. After 256 tiles, if
    the max shifts significantly, earlier contributions are zeroed out, causing attention to only attend
    to recent tiles — a catastrophic failure for long-context tasks. FP32 maintains these statistics with
    23-bit mantissa (7 decimal digits), handling exp values down to 1.2e-38. The matmuls (Q@K, attn@V)
    can safely use FP16 because they''re computed per-tile and immediately consumed.'
  common_mistake: Thinking FP16 is fine for everything because the final output is FP16 anyway. The issue
    is accumulated numerical error in the online softmax rescaling across many tiles.
  napkin_math: 'FP16 min subnormal: 6e-8. exp(-17) = 4.1e-8 — underflows. At 256 tiles, max can shift
    by >17. FP32 min: 1.2e-38. exp(-87) still representable. FP32 softmax stats: 8 bytes per row x 128
    rows = 1KB per tile — negligible overhead.'
