id: cloud-top-65062
title: Prefill Batch Composition for Throughput Maximization
topic: disaggregated-serving
status: published
provenance: imported
scenario: A prefill pool is processing requests with highly variable prompt lengths (32 to 4096 tokens).
  Padding short prompts to the longest in the batch wastes 60% of compute. Design a batch composition
  strategy to maximize GPU utilization.
details:
  realistic_solution: 'Variable-length batching strategies: (1) Sequence packing (Flash Attention 2 style):
    pack multiple variable-length sequences into a single attention operation up to a token budget (e.g.,
    4096 tokens per batch). No padding between sequences — use cu_seqlens tensor to track sequence boundaries.
    The 2D attention mask prevents cross-sequence attention. Pack sequences greedily: sort by length descending,
    fill each bin with remaining capacity. Packing efficiency: 90-95% vs 40% with naive padding. (2) Bucketed
    batching: sort requests into length buckets (e.g., 0-256, 256-512, 512-1024, 1024-2048, 2048-4096).
    Each bucket forms its own batch padded to bucket maximum. Buckets balance utilization vs latency.
    (3) Dynamic batching with timeout: collect requests for 10ms, then dispatch the most efficient batch.
    Short requests: high-density packing. Long requests (>1024): smaller batch to avoid memory OOM.'
  common_mistake: Using fixed-size batches with padding to the longest sequence. At 60% waste, effective
    compute utilization is 40% of peak. Engineers may attempt to set a maximum sequence length limit to
    reduce padding, but this simply discards long requests rather than handling them efficiently.
  napkin_math: 'Naive padding at 60% waste: effective compute = 40% of H100 989 TFLOPS = 396 TFLOPS. With
    sequence packing at 95% efficiency: effective compute = 95% * 989 = 939 TFLOPS. Throughput improvement:
    939/396 = 2.37x. Packing overhead: sorting O(n log n) + bin-packing heuristic O(n). At 1000 requests
    per batch: negligible. Flash Attention 2 with varlen: no performance penalty vs padded (actually faster
    due to skipping padding computation). Implementation: use flash_attn_varlen_func with cu_seqlens.'
