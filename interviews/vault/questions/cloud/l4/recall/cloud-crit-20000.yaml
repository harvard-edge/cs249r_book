schema_version: 1
id: cloud-crit-20000
title: FlashAttention Tile Size vs SRAM Capacity
topic: flash-attention
status: published
provenance: imported
scenario: An H100 GPU has 256KB of shared memory (SRAM) per SM. FlashAttention must tile Q, K, V blocks
  to fit within this budget. For a model with head_dim=128 in FP16, what is the maximum tile size (B_r
  x B_c) that fits in SRAM, and why does exceeding it force spills to HBM?
details:
  realistic_solution: Each tile of Q is B_r x 128 x 2B, K is B_c x 128 x 2B, V is B_c x 128 x 2B, output
    O is B_r x 128 x 2B, plus softmax row-max and row-sum vectors (B_r x 4B each). Total SRAM = 256 *
    (B_r + 2*B_c) + 256*B_r + 8*B_r bytes. With 256KB = 262,144 bytes, typical tile sizes are B_r = B_c
    = 128, consuming ~128KB for Q+O tiles and ~128KB for K+V tiles, fitting snugly. Exceeding this forces
    HBM round-trips for partial results, destroying the IO advantage.
  common_mistake: Forgetting that you need to store Q tile, K tile, V tile, output accumulator, and softmax
    statistics simultaneously — not just one tile at a time.
  napkin_math: 'Q tile: 128 x 128 x 2B = 32KB. K tile: 32KB. V tile: 32KB. O tile: 32KB. Softmax stats:
    128 x 8B = 1KB. Total: ~129KB out of 256KB SRAM. Leaves headroom for compiler scratch.'
