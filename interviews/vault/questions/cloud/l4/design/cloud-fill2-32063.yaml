id: cloud-fill2-32063
title: 'Sparse Gating: Softmax vs Sigmoid Router Design'
topic: mixture-of-experts
status: published
provenance: imported
scenario: 'Traditional MoE uses softmax gating: router scores pass through softmax, then top-k experts
  are selected. Recent work (e.g., Mixtral, DeepSeekMoE) explores alternatives. Compare softmax gating
  with sigmoid gating (each expert independently decides whether to activate). What are the implications
  for load balancing, gradient flow, and expert specialization?'
details:
  realistic_solution: 'Softmax gating: Scores are normalized to sum to 1. Top-k selects the highest. Properties:
    (1) experts compete — gradient for expert i depends on all other experts'' scores, (2) natural normalization
    — output is a convex combination, (3) load balancing is harder because softmax encourages winner-take-all
    dynamics (one expert dominates). Sigmoid gating: Each expert has an independent activation probability.
    Top-k selects those with highest sigmoid scores. Properties: (1) non-competitive — increasing expert
    i''s score doesn''t affect expert j, (2) experts can specialize more independently, (3) the combination
    weights are not normalized (need explicit normalization or the model learns implicit scaling), (4)
    load balancing is easier because there''s no competition driving collapse. DeepSeekMoE-V2 uses sigmoid
    + normalization and achieves better expert specialization with fine-grained experts (256 experts,
    top-6). Practical difference: sigmoid allows ''expert redundancy'' — multiple experts can learn similar
    representations without competition pushing them apart. This provides fault tolerance but may be parameter-inefficient.'
  common_mistake: Thinking softmax and sigmoid gating produce the same routing behavior. Softmax creates
    competition between experts (zero-sum game — if one expert's score goes up, others go down). Sigmoid
    allows independent expert activation (non-zero-sum).
  napkin_math: 'Softmax router for 8 experts: 8-dim output → softmax → top-2. Example: [0.3, 0.25, 0.15,
    0.1, 0.08, 0.05, 0.04, 0.03]. Top-2: experts 0,1 with weights 0.3/(0.3+0.25)=0.545 and 0.455. Sigmoid:
    [0.8, 0.7, 0.3, ...]. Top-2: experts 0,1 with weights 0.8/(0.8+0.7)=0.533 and 0.467. Different gradient
    dynamics.'
