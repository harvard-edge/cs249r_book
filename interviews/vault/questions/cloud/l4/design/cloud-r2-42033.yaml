id: cloud-r2-42033
title: Network Topology for Pipeline Parallelism
topic: interconnect-topology
status: published
provenance: imported
scenario: You are deploying a 175B model with 16-stage pipeline parallelism across 16 A100 GPUs spread
  across 2 nodes (8 GPUs per node with NVLink). The pipeline sends activations from stage N to stage N+1.
  How should you map pipeline stages to physical GPUs to minimize inter-node activation transfers, and
  what is the bandwidth requirement for the inter-node link?
details:
  realistic_solution: IB NDR = 400 Gbps = 50 GB/s per link. IB HDR = 200 Gbps = 25 GB/s. The calculation
    used HDR bandwidth (25 GB/s) instead of NDR (50 GB/s).
  common_mistake: Mapping stages linearly (stages 0-7 on node 0, stages 8-15 on node 1), which creates
    a single inter-node bottleneck between stages 7 and 8. Every micro-batch must cross this link.
  napkin_math: 'InfiniBand NDR bandwidth: single IB NDR link = 400 Gbps unidirectional = 50 GB/s (not
    25 GB/s which is HDR). IB HDR = 200 Gbps = 25 GB/s. IB NDR = 400 Gbps = 50 GB/s. AllReduce bandwidth
    calculation should use 50 GB/s per NDR link.'
