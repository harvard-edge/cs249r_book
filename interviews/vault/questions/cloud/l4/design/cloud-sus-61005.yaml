id: cloud-sus-61005
title: APU Unified Memory and Zero-Copy Data Paths
topic: chiplet-architecture
status: published
provenance: imported
scenario: An inference pipeline uses CPU preprocessing feeding into MI300X compute. A teammate proposes
  using unified memory to eliminate explicit CPU-GPU copies. What are the performance implications?
details:
  realistic_solution: On MI300X APU configurations, CPU and GPU share HBM via Infinity Fabric with coherent
    access. For preprocessing data that fits in HBM (~192 GB), zero-copy works well if the access pattern
    is sequential. But CPU random access into GPU-mapped pages triggers page migration with ~10µs overhead
    per fault. Pin frequently-accessed preprocessing buffers to CPU-local DRAM and only move inference
    input batches to HBM explicitly.
  common_mistake: Believing unified memory eliminates all data movement cost. The physical data still
    traverses Infinity Fabric or PCIe; unified memory just removes explicit memcpy calls and programmer-managed
    staging buffers.
  napkin_math: 'MI300X Infinity Fabric CPU-GPU BW: ~500 GB/s (bidirectional). PCIe 5.0 (discrete): ~128
    GB/s. For a 1 GB batch: unified memory migration ~2ms vs explicit HtoD ~8ms via PCIe. But page-fault
    driven migration of 4KB pages at 10µs each = 10µs × (1GB/4KB) = 2.5 seconds worst case — always prefetch
    or prefault.'
