schema_version: 1
id: cloud-fill-03026
title: HPA Scaling Latency for GPU Inference Pods
topic: container-orchestration
status: published
provenance: imported
scenario: 'A Kubernetes HPA (Horizontal Pod Autoscaler) scales A100 (80GB HBM2e, 400W) inference pods
  based on GPU utilization metric (target: 70%). Traffic spikes 3x over 2 minutes. HPA takes 4 minutes
  to provision new pods: 30s metrics delay + 90s scale decision + 60s pod scheduling + 60s model loading.
  During this window, P99 latency violates SLA.'
details:
  realistic_solution: Implement predictive scaling using KEDA with Prometheus metrics and a custom scaler
    that triggers scale-up when queue depth exceeds threshold (not GPU utilization, which lags). Pre-warm
    a pool of 2 idle pods (scaled to 0 GPU allocation but with model loaded) that can accept traffic immediately.
    Use pod disruption budgets to prevent scale-down during ramp-up.
  common_mistake: Tuning HPA scaleUp stabilization window to 0s (immediate scaling). This causes thrashing
    on transient spikes and increases cost by 30-40% without improving steady-state latency.
  napkin_math: 'Traffic spike 3x in 2 minutes. At baseline, 4 pods serve 1000 RPS each. 3x spike = 3000
    RPS total. 4 pods saturate at 4*1000 = 4000 RPS → 75% utilization, within SLA. But spike reaches 12000
    RPS: need 12 pods. HPA provisions 8 more in 4 minutes. During 4-minute window at 12K RPS with 4-pod
    capacity (4K RPS): queue builds at 8K RPS. Pre-warming 4 pods (1/3 of typical peak) absorbs spike
    immediately. A100 idle power: 50W vs active 400W. 4 pre-warm pods: 4*50=200W overhead.'
