schema_version: 1
id: cloud-cell-10106
title: Diagnose low GPU utilization when serving MobileNetV3 on H100
topic: cnn-efficient-design
status: published
provenance: imported
scenario: A production MobileNetV3-Large serving endpoint on H100 shows only 12% GPU-SM utilization in
  nvidia-smi despite receiving 5,000 QPS. The model processes 224×224 images in BF16. Each request is
  a single image. Diagnose the root causes and propose fixes.
details:
  realistic_solution: 'At 5K QPS with batch=1, each forward pass takes ~0.8ms at 12% SM util. Root causes:
    (1) batch size=1 means each 0.22-GFLOP inference is dominated by kernel launch overhead (~50 μs per
    kernel × many kernels); (2) CPU preprocessing (decode + resize) taking 3–5ms per image; (3) H2D PCIe
    transfers serializing GPU work. Fix: implement server-side dynamic batching (10ms window → batch=50),
    move preprocessing to GPU with DALI, use CUDA graphs to fuse kernel launches.'
  common_mistake: Assuming the fix is simply increasing batch size without diagnosing whether the bottleneck
    is CPU preprocessing, Python overhead, or memory copy latency — scaling batch size on a CPU-bound
    pipeline doesn't help.
  napkin_math: 'MobileNetV3-Large: 0.22 GFLOPs at batch=1. H100 peak 989 TFLOPS BF16 at 12% util = 119
    TFLOPS. Actual compute time: 0.22G/119T = 1.8 μs — nearly zero! H100 is idle 99.9% of the time. With
    dynamic batching at batch=50: 50×0.22G = 11 GFLOPs, 10ms batching window. Compute: 11G/594T (60% util)
    = 0.019ms << 10ms window. GPU util jumps to ~50% with 5K QPS and batch=50.'
