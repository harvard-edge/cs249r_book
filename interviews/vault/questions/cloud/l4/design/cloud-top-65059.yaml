schema_version: 1
id: cloud-top-65059
title: SLA-Aware Request Routing Between Prefill and Decode Pools
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'A disaggregated serving gateway receives requests with two SLA tiers: premium (P99 TTFT < 100ms)
  and standard (P99 TTFT < 500ms). Prefill pool has 10 GPUs. Design a routing policy that satisfies both
  SLAs.'
details:
  realistic_solution: 'Priority-aware routing: (1) Dedicated pool partition: reserve 3/10 GPUs for premium-only
    traffic. Remaining 7 for standard + overflow premium. Premium queue: FIFO with preemption. Standard
    queue: FIFO. (2) Admission control: premium requests bypass the standard queue. When premium pool
    is full (>90% utilization), route premium overflow to standard pool with priority interrupt. (3) Work-stealing:
    when premium pool is idle, it processes standard queue to avoid GPU waste. (4) Queue depth monitoring:
    premium queue target depth < 2 requests (to ensure <100ms wait). Standard queue can have depth up
    to 20 (SLA allows 500ms wait = 10 * 50ms avg service time). (5) Load shedding: when standard queue
    > 50 requests, return HTTP 503 to standard tier clients with retry-after header. Premium tier never
    load-sheds.'
  common_mistake: Using a single FIFO queue for all requests regardless of SLA tier. Premium requests
    wait behind standard requests, violating the P99 < 100ms SLA even when total load is within capacity.
  napkin_math: 'Premium SLA: P99 TTFT < 100ms. Service time per request (8B, 512 token prompt): 16.5ms.
    Queue wait for P99 < 83.5ms. M/D/1 queue: P99 wait < 83.5ms requires rho < 0.83 for dedicated pool
    of 3 GPUs at 60 RPS each = 180 RPS premium capacity. If premium RPS < 0.83 * 180 = 149 RPS, SLA met.
    Standard SLA: P99 < 500ms. Queue wait budget: 500 - 16.5 = 483.5ms. At 7 GPUs + 3 overflow from premium:
    standard capacity = 420 RPS. Sustainable standard load < 0.85 * 420 = 357 RPS. Total system capacity:
    149 premium + 357 standard = 506 RPS.'
