schema_version: 1
id: cloud-sus-62015
title: Batching Strategy Across Prefill Nodes
topic: disaggregated-serving
status: published
provenance: imported
scenario: Requests arrive at a router with variable input lengths (50–8192 tokens, Zipf-distributed).
  Your prefill pool has 8 H100s. Design a batching strategy that maximizes prefill throughput while bounding
  TTFT variation to within 3× of minimum TTFT. Specifically address length-based bucketing vs. continuous
  batching.
details:
  realistic_solution: 'Length-bucketed batching: sort incoming requests into length buckets (e.g., [0,512],
    [512,2048], [2048,8192]). Batch requests within the same bucket together. Short requests are padded
    at most 10× (50→512), not 163× (50→8192). Within each bucket, use continuous batching to avoid waiting
    for a full batch. TTFT bound: a 50-token request in the [0,512] bucket is padded to 512 → prefill
    cost = 512-token prefill. Minimum TTFT (no padding, single request) = 50-token prefill. Ratio: 512/50
    = 10.24 — within 3× is too tight for this bucket design. Tighten to [0,128], [128,512], [512,2048],
    [2048,8192] → max padding 128/50 = 2.56× within the first bucket. TTFT variation now within 3× for
    all buckets. Router assigns each request to the lowest bucket that fits its length, dispatches to
    the prefill node with the shallowest queue for that bucket.'
  common_mistake: Padding all requests to the maximum length in a batch — a batch with one 8192-token
    request and seven 50-token requests wastes 98.8% of compute on padding for the short requests.
  napkin_math: 'Throughput without bucketing (naive padding to max): batch of 8 requests padded to 8192:
    useful compute = (50+50+50+50+50+50+50+8192) / (8 × 8192) = 8542/65536 = 13%. With bucketing ([0,128]
    bucket for 7 short + separate [2048,8192] for 1 long): short batch useful compute = 7×50 / (7×128)
    = 350/896 = 39%. Long batch: 100%. Overall throughput: ~3× improvement vs naive padding.'
