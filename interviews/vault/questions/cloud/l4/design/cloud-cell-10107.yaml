schema_version: 1
id: cloud-cell-10107
title: Diagnose accuracy degradation after replacing standard convs with depthwise separable
topic: cnn-efficient-design
status: published
provenance: imported
scenario: After replacing all 3×3 convolutions in a custom ResNet-34 with depthwise separable convolutions
  (maintaining same channel counts), top-1 accuracy drops from 73.8% to 68.2% on ImageNet after full retraining
  on 8× A100s. The training loss curves look normal. Diagnose why accuracy degraded and what architectural
  changes could recover it.
details:
  realistic_solution: 'Depthwise separable convolutions separate channel mixing (pointwise) from spatial
    filtering (depthwise), reducing cross-channel interaction. With identical channel counts, the pointwise
    1×1 layers are the only cross-channel communication. Diagnosis steps: (1) check if batch norm statistics
    diverged (depthwise layers have C groups, not C² interactions); (2) add width multiplier α=1.4 to
    compensate; (3) use inverted residuals with expansion t=4–6 to restore representational capacity.
    The MobileNetV2 design explicitly addresses this with expansion before depthwise.'
  common_mistake: Blaming the depthwise separable operation itself and reverting all changes, rather than
    diagnosing that the representational capacity drop comes from channel mixing being decoupled and that
    expansion ratios need to increase.
  napkin_math: 'ResNet-34 standard: 3×3 conv C→C. Cross-channel connections per spatial location: C².
    Depthwise sep: depthwise (C groups, no cross-channel) + pointwise (C×C). Effective rank of channel
    mixing: pointwise has rank C. Standard conv: rank C². With C=256: standard has 65,536 cross-channel
    paths per position; depthwise+pointwise has 256. To restore capacity with expansion t=4: pointwise
    becomes C→4C (1024 channels), depthwise at 4C, project 4C→C. Parameters: 256×1024 + 1024×9 + 1024×256
    = 271K vs 256×256×9 = 589K — still 2.2× fewer params but better capacity.'
