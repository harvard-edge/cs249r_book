schema_version: 1
id: cloud-fill-04025
title: Feature Serving Latency Budget for Two-Tower Models
topic: feature-store-management
status: published
provenance: imported
scenario: 'You serve a two-tower retrieval model on H100 with an end-to-end SLO of 50ms p99. The latency
  budget breaks down as: feature retrieval from store (target: 5ms p99), embedding lookup (target: 10ms),
  ANN search over 100M items (target: 25ms), ranking (target: 5ms), and response serialization (target:
  5ms). Your feature store is currently at p99=18ms. Redesign the feature retrieval layer.'
details:
  realistic_solution: 'Implement a feature fan-out architecture: issue all feature store reads in parallel
    using async I/O (e.g., asyncio in Python, or gRPC streaming). Colocate the most-accessed item features
    in the same Redis cluster as user features to avoid cross-store fetches. Cache the top-10K item features
    in process memory (LRU cache, ~100 MB for 10K items × 10KB each). This drops p99 from 18ms to under
    4ms.'
  common_mistake: 'Fetching all features in a sequential waterfall: user features from Redis, then item
    features from DynamoDB, then context features from a third store. Each round-trip adds 2-5ms latency.
    Three sequential fetches = 6-15ms baseline plus queuing.'
  napkin_math: 'Sequential fetches: user (2ms) + item (3ms) + context (2ms) = 7ms base + 3× RTT overhead
    (1ms each) = 10ms p50. P99 with tail latency (3× p50 rule of thumb) = 30ms — way over budget. Parallel
    fan-out: max(2, 3, 2) = 3ms base + 1 RTT = 4ms p50, p99 ≈ 10ms. In-process cache hit for top-10K items:
    0.05ms (L3 cache hit). Hit rate for top-10K items in a power-law distribution: ~80% of requests. Blended
    p99 = 0.8 × 0.05ms + 0.2 × 10ms = 2ms.'
