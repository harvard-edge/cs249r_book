schema_version: 1
id: cloud-r2-42014
title: Adaptive Timeout Design for LLM Serving
topic: tail-latency
status: published
provenance: imported
scenario: Your MI300X LLM serving system has a fixed 5-second timeout. Short prompts (< 100 tokens) complete
  in 200ms, but long prompts (4096 tokens) legitimately need 3.5s for prefill + generation. The fixed
  timeout kills 8% of long requests prematurely while being too generous for short requests (masking failures).
  Design an adaptive timeout strategy.
details:
  realistic_solution: 'Implement per-request adaptive timeouts based on input characteristics: timeout
    = base_latency(input_tokens) × safety_multiplier. Profile: base_latency = prefill_time(n_tokens) +
    expected_output_tokens × decode_time. For 100-token input: expected = 20ms prefill + 100 × 12ms =
    1.22s, timeout = 1.22s × 2.5 = 3.05s. For 4096-token input: expected = 180ms + 256 × 12ms = 3.25s,
    timeout = 3.25s × 2.0 = 6.5s (tighter multiplier at scale because variance is lower). Track streaming
    tokens — if no token arrives within 2× the expected inter-token interval (24ms), abort early regardless
    of overall timeout. This catches stuck requests within 50ms instead of waiting for the full timeout.'
  common_mistake: Setting the timeout based on the worst case (long prompts) and applying it uniformly.
    This masks failures for short requests — a short request that takes 4.9s is clearly broken but passes
    the timeout check.
  napkin_math: 'Fixed 5s timeout: kills 8% of long requests (3.5-5s range), misses stuck short requests
    for 4.8s. Adaptive: short (100 tokens) timeout = 3s, catches failures in 3s instead of 5s. Long (4096
    tokens) timeout = 6.5s, saves 8% of legitimate requests. Token-level timeout (24ms): catches stuck
    decode in 24ms. Overall timeout violations drop from 8% to 0.3%.'
