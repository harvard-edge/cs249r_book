id: cloud-cell-11002
title: 'Dataset Curation: Design a Labeling Pipeline for Multi-Modal Training Data'
topic: dataset-curation
status: published
provenance: imported
scenario: Your team needs to label 100M image-text pairs for vision-language model training on an H100
  cluster. You have a budget for 10 human annotators and access to GPT-4V for automated labeling. Design
  a labeling pipeline that achieves > 95% label accuracy within 30 days.
details:
  realistic_solution: 'Use active learning: 1) GPT-4V labels 100% at ~$0.01/sample = $1M (too expensive).
    Better: label 1M with GPT-4V ($10K), train a small CLIP-based classifier on those, use it to label
    remaining 99M, humans review the 5% lowest confidence samples (5M × 10 min/sample / 10 annotators
    = 83K hours — too slow). Revise: humans review 0.5% = 500K samples.'
  common_mistake: Sending all 100M samples to human annotators, which is infeasible. Or fully automated
    labeling without human quality checks.
  napkin_math: '10 annotators × 8 hr/day × 30 days = 2,400 person-hours. At 2 min/label = 72,000 labels
    from humans. So: GPT-4V labels 100M at $0.001/call = $100K total for 100M samples. Humans validate
    72K samples as gold set. Train classifier on 1M GPT4V + 72K human labels, apply to 99M remaining.'
