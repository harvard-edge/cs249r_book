schema_version: 1
id: cloud-r2-41026
title: Bin-Packing GPUs for Mixed Workloads
topic: scheduling-resource-management
status: published
provenance: imported
scenario: You manage a cluster of 8-GPU H100 nodes. Incoming jobs request 1, 2, 4, or 8 GPUs. Using naive
  allocation (assign jobs to the first node with free GPUs), you observe 35% average GPU utilization.
  Why, and how does bin-packing improve this?
details:
  realistic_solution: 'Naive allocation causes fragmentation: Node A has GPUs 0-3 used (one 4-GPU job),
    Node B has GPUs 0,2 used (two 1-GPU jobs). A new 2-GPU job goes to Node B GPUs 1,3 — but these are
    not NVLink-adjacent, degrading multi-GPU job performance. Meanwhile, Node A has 4 free GPUs but they
    are not considered because the scheduler checks nodes in order. Bin-packing strategies: (1) Best-fit
    decreasing: sort jobs by GPU count (largest first), assign each to the node with the least free GPUs
    that still fits. This consolidates small jobs onto fewer nodes, leaving full nodes free for large
    jobs. (2) Topology-aware packing: prefer allocations that preserve NVLink groups. On DGX H100 (4 NVLink
    groups of 2), assign 2-GPU jobs to NVLink pairs, 4-GPU jobs to NVLink quads. Result: GPU utilization
    rises from 35% to 65-75% because large jobs find contiguous allocations and small jobs are consolidated.'
  common_mistake: Assuming fragmentation is only about unused GPUs. The bigger issue is NVLink topology
    fragmentation — a 4-GPU job placed on GPUs {0,1,4,5} might get worse NVLink connectivity than {0,1,2,3},
    impacting training throughput.
  napkin_math: '10 nodes × 8 GPUs = 80 GPUs. Naive: 35% util = 28 GPUs active. Bin-packed: 70% util =
    56 GPUs active. Equivalent to adding 3.5 more nodes of capacity for free.'
