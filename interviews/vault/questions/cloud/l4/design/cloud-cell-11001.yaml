schema_version: 1
id: cloud-cell-11001
title: 'Dataset Curation: Design a Multi-Stage Quality Pipeline for LLM Pre-Training'
topic: dataset-curation
status: published
provenance: imported
scenario: You are building a data curation pipeline for a 13B LLM pre-training run on 128 H100s (80GB
  HBM3). You have 50TB of raw Common Crawl data. Design a multi-stage quality filtering system that outputs
  ~5TB of high-quality tokens within 48 hours of wall-clock time.
details:
  realistic_solution: 'Stage 1: language ID (fastText, discard non-English) → Stage 2: heuristic filters
    (length, perplexity via small KenLM) → Stage 3: MinHash dedup → Stage 4: quality classifier (small
    BERT). Run stages 1-2 on CPUs in parallel, stages 3-4 on GPU workers.'
  common_mistake: Running all filters sequentially in a single Python process; not parallelizing across
    the cluster.
  napkin_math: 50TB / 4 bytes/token = 12.5T tokens. Language filter removes ~60% → 5T tokens. Heuristics
    remove ~30% → 3.5T tokens. Dedup removes ~25% → 2.6T tokens. Quality classifier keeps ~80% → 2.1T
    tokens ≈ ~8TB raw bytes before tokenization, yielding ~5TB tokenized.
