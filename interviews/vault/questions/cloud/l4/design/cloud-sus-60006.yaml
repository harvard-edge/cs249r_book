id: cloud-sus-60006
title: 'Tracing vs. capture: choosing between torch.jit.trace and torch.compile for production'
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: Your team has an A100-based inference cluster serving a BERT-based NLP model. You need to choose
  between torch.jit.trace, torch.jit.script, and torch.compile for production deployment. The model has
  some data-dependent control flow in its tokenizer post-processing but the core transformer is static.
details:
  realistic_solution: Use torch.compile for the transformer backbone (handles dynamic shapes natively,
    best performance on A100 via TorchInductor). Use torch.jit.script for the post-processing logic with
    control flow (script captures all branches symbolically). Alternatively, factor the model so the traced
    portion has no branching. Validate with torch.jit.verify_usages() and test across diverse inputs.
  common_mistake: Using torch.jit.trace on a model with data-dependent control flow. Tracing records the
    execution path for a specific input and silently bakes that path into the graph, causing incorrect
    results on inputs that follow different branches.
  napkin_math: 'BERT-base forward at batch=32, seq=128 on A100: eager ≈ 8ms, torch.compile ≈ 4.5ms (44%
    speedup from kernel fusion). torch.jit.trace ≈ 5ms. For an inference service at 1000 QPS: compile
    saves (8-4.5)ms × 1000 = 3.5 GPU-seconds/second, meaning ~3.5 fewer A100s needed at scale.'
