id: cloud-r2-42026
title: NVLink vs Infinity Fabric for Tensor Parallelism
topic: interconnect-topology
status: published
provenance: imported
scenario: You must choose between 8× H100 with NVLink (900 GB/s per GPU) and 8× MI300X with Infinity Fabric
  (896 GB/s per GPU) for 8-way tensor parallelism on a 70B model. Both have similar aggregate bandwidth.
  What architectural differences between NVLink and Infinity Fabric affect tensor parallel efficiency,
  and which do you recommend?
details:
  realistic_solution: 8.75B parameters at FP16 = 17.5 GB (not 17.5 MB). The 17.5 MB figure is for an activation
    shard (seq × hidden/8 × 2B), not the parameter shard. These are conceptually different — AllReduce
    transfers activations, not weights in TP.
  common_mistake: Comparing only peak bandwidth numbers. NVLink and Infinity Fabric have fundamentally
    different topologies — NVLink uses a switched fabric (NVSwitch), while MI300X's Infinity Fabric connects
    chiplets within a single package. The latency profiles are very different.
  napkin_math: 'NVLink AllReduce per layer: 70B/8 = 8.75B params per GPU shard. Activation shard for one
    layer (not full params): seq × hidden/8 × 2B = 2048 × 1024 × 2B = 4MB typical. The 8.75B params at
    FP16 = 17.5 GB (not 17.5 MB — GB is correct for parameter storage). Transfer: 17.5MB / 900 GB/s =
    19.4μs (using 17.5 MB for the activation shard of one layer, not 17.5 GB of params).'
