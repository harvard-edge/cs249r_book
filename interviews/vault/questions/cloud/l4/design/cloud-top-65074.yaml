id: cloud-top-65074
title: Embedding Table Sharding Strategy for 10TB Feature Space
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: A production recommendation system has 50 embedding tables totaling 10TB. The largest table
  has 2B rows x 64-dim float32 (512GB). You have 128 GPUs each with 80GB HBM. Design the sharding strategy.
details:
  realistic_solution: 'Hybrid sharding strategy: (1) Table-wise sharding: each table assigned to a GPU
    group. Large table (512GB): requires 512/80 = 6.4 GPUs minimum. Assign to 8 GPUs (10% overhead). Row-wise
    shard: split 2B rows into 8 shards of 250M rows each. (2) Column-wise sharding: for tables that are
    tall but narrow, column sharding is better — keeps all rows on each GPU, shards embedding dimensions.
    For 512GB table, row-wise is better (balanced row access). (3) Hot row replication: identify top-1K
    hot rows via access logs. Replicate these rows to all 8 shards in the GPU group. Lookups for hot rows:
    local, no network. Cold rows: routed to responsible shard via consistent hashing. (4) Column-parallel
    for dense tables: tables used in upper layers of ranking where all embeddings needed per request —
    column-parallel reduces per-request all-to-all.'
  common_mistake: 'Sharding all tables uniformly across all GPUs. This ignores hot-row imbalance: the
    largest tables have power-law access distributions where top 0.1% of rows receive 10% of lookups.
    Uniform sharding puts hot rows on arbitrary shards, causing all-to-all traffic and load imbalance.'
  napkin_math: '512GB table, 8 GPUs: 512/8 = 64GB per GPU. Fits in 80GB with 16GB headroom for KV and
    compute. All-to-all traffic per batch: DLRM lookup batch of 4K samples, avg 100 lookups per sample,
    400K total. Per shard: 400K/8 = 50K lookups. Each lookup is 64*4B = 256B. Total embedding output:
    400K * 256B = 100MB per batch. All-to-all reduce: 100MB * (8-1)/8 = 87.5MB per batch. At 400 Gbps
    InfiniBand: 87.5MB / 50GB/s = 1.75ms. Manageable for a 10ms budget batch step.'
