id: cloud-sus-62040
title: Session-Based Recommendation Temporal Features
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: 'You want to add temporal sequence features to your DLRM: the last 50 items a user interacted
  with (their session history). Naive approach: concatenate 50 item embeddings (each 64-dim) as a 3200-dim
  feature vector, passing it into the bottom MLP. Identify the architectural problems with this approach
  and design a better session encoding.'
details:
  realistic_solution: 'Problems with naive concatenation: (1) Order is not encoded — item 1 and item 50
    in the session are treated identically unless positional encodings are added. (2) Input dimension
    scales with session length (3200 vs 64), requiring the bottom MLP to have 50× more parameters and
    compute for this feature alone. (3) All 50 items must be looked up (50 embedding reads) even for users
    with short sessions (wasteful). Better architecture: (1) Self-attention session encoder: apply a lightweight
    Transformer (1-2 layers, attention over 50-item sequence) to produce a single 64-dim session embedding.
    The Transformer handles ordering naturally via positional embeddings. (2) Pooling with attention weights:
    compute attention-weighted sum of item embeddings with a query vector derived from the target item.
    This is equivalent to a one-layer cross-attention (much cheaper than self-attention). (3) Recurrent
    encoding: GRU over item embeddings → final hidden state as session embedding (O(T) compute, O(1) output).
    All approaches produce a single 64-dim session embedding fed into the existing DLRM pipeline — no
    change to bottom MLP input size.'
  common_mistake: The naive concatenation approach is order-agnostic if the MLP doesn't see positional
    information, and it grows the bottom MLP input 50× — these are the problems. Many engineers spot the
    positional issue but miss the memory/compute scaling problem.
  napkin_math: 'Naive: bottom MLP input = 64 × 50 = 3200 dims. First MLP layer (3200 → 512): 3200 × 512
    = 1.64M params × 4 bytes = 6.6 MB per layer. FLOPs per sample: 2 × 3200 × 512 = 3.28 MFLOPs vs original
    2 × 64 × 512 = 65k FLOPs — 50× more. Attention session encoder: 50 items × 64 dim, self-attention
    cost per sample = 4 × 50² × 64 = 640k FLOPs. Output: 64 dim — same as original. Total overhead: 640k
    FLOPs vs 3.28M FLOPs for naive. 5× less compute, same expressiveness.'
