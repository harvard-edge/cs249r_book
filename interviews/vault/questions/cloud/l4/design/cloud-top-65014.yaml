id: cloud-top-65014
title: 'Heterogeneous Chiplet Integration: DSP + AI Core on Same Package'
topic: chiplet-architecture
status: published
provenance: imported
scenario: A cloud inference service needs to combine dense DNN inference with heavy signal processing
  (FFT, filtering). The proposal is to integrate a DSP die and an AI inference die on the same chiplet
  package. Design the data path and memory sharing strategy.
details:
  realistic_solution: 'Use a producer-consumer pipeline with explicit DMA: DSP outputs signal processing
    results to a shared SRAM buffer on the interposer; AI die reads via DMA with coherency disabled (streaming
    mode). Interpose a small (4-16 MB) low-latency SRAM on the active interposer as a staging buffer.
    DSP signals AI die via lightweight interrupt through a mailbox register. This avoids coherency overhead
    while achieving <1us data handoff latency. For large tensors (>16MB), use HBM partition assignment
    — DSP writes to HBM partition A, AI die reads from partition A directly after DSP signals completion.'
  common_mistake: Designing a shared memory pool with coherent access from both dies. Coherent shared
    memory between heterogeneous dies (different ISAs, different memory models) requires a complex coherency
    protocol that adds 3-5x latency compared to explicit message passing for large data transfers.
  napkin_math: 'Signal processing output: 100MB/s continuous, 16K FFT per batch = 128KB per call at 780
    calls/sec. AI die needs 128KB every 1.28ms. Die-to-die DMA at 500 GB/s: 128KB transfer = 0.26us —
    negligible. Coherent shared access: 128KB at cache-line granularity (64B) = 2048 coherency transactions
    at 200ns each = 409us — 1573x slower than DMA. DMA is clearly correct architecture.'
