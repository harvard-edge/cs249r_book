id: cloud-fill2-32002
title: 'Carbon-Aware Scheduling: Shifting Training to Low-Carbon Hours'
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: Your organization trains large models on an MI300X cluster in a region where the grid carbon
  intensity varies from 100 gCO2/kWh (midday solar peak) to 500 gCO2/kWh (evening natural gas). A 70B
  model training run consumes 500 MWh over 14 days. Your sustainability team wants you to implement carbon-aware
  scheduling. How much CO2 can you realistically save, and what are the engineering tradeoffs?
details:
  realistic_solution: Carbon savings = shift_fraction × carbon_intensity_delta × energy = 0.30 × 200g/kWh
    × 500,000 kWh = 30 tonnes (not 45 tonnes which uses 300g/kWh delta instead of 200g/kWh).
  common_mistake: Assuming you can simply pause training during high-carbon hours. Checkpointing, restarting,
    and GPU idle power all eat into savings. Also, shifting large contiguous jobs is harder than shifting
    elastic batch workloads.
  napkin_math: 'Carbon savings from demand shifting: 30% workload × (300g - 100g CO₂/kWh) carbon intensity
    difference × 500 MWh usage = 0.30 × 200g × 500,000 kWh = 30,000,000g = 30 tonnes CO₂ saved (not 45
    tonnes — 45 would require 50% shift or 300g differential).'
