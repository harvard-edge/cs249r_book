schema_version: 1
id: cloud-fill-03034
title: Tensor Parallelism Degree Selection for 70B Model on H100
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: 'You''re serving a 70B Llama-2 model (140GB FP16) on H100 (80GB HBM3, 3.35TB/s, NVLink 900GB/s)
  nodes with 8 GPUs each. You must choose tensor parallelism degree: TP=2, TP=4, or TP=8. Each degree
  has different communication overhead. Batch size is 1 for latency-sensitive serving.'
details:
  realistic_solution: TP=2 or TP=4 is optimal for latency at batch=1. TP=8 introduces 7 all-reduce operations
    per layer (one per attention + one per MLP), each requiring synchronization across 8 GPUs. With NVLink,
    all-reduce of 128MB takes ~0.14ms per operation * 80 layers * 2 = 22ms just in communication. TP=2
    reduces communication to ~5ms. Use TP=4 for memory fit with minimal communication overhead.
  common_mistake: Choosing TP=8 to maximize memory distribution without considering that each all-reduce
    in TP must complete before the next layer can begin. At batch=1, the model is memory-bandwidth-bound,
    and TP communication overhead dominates.
  napkin_math: '70B model = 140GB FP16. TP=2: 70GB/GPU — fits in H100 80GB with 10GB headroom. TP=4: 35GB/GPU
    — comfortable. TP=8: 17.5GB/GPU — wastes 62.5GB/GPU. All-reduce per layer at TP=N: 2*(N-1)/N * tensor_size
    / BW. Tensor size = hidden_dim * 2 bytes = 8192 * 2 = 16KB per all-reduce for residual stream. At
    NVLink 900GB/s: 16KB/900GB/s = 0.018μs per all-reduce. But for weight shards in MLP: 8192*32768*2
    = 512MB per layer → 512MB/900GB/s = 0.57ms per all-reduce. TP=8 adds 80 layers * 2 all-reduces * 0.57ms
    = 91ms communication overhead per token.'
