schema_version: 1
id: cloud-cell-10114
title: Implement INT8 quantization for MobileNetV3 on TensorRT with calibration
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You need to deploy MobileNetV3-Large in production on A100 using TensorRT INT8 quantization.
  The model has H-swish activations (piecewise linear approximation of Swish). Your calibration dataset
  has 5,000 representative images. Implement the calibration and conversion pipeline and verify accuracy
  drops below 1% vs FP32 baseline.
details:
  realistic_solution: 'Use IInt8MinMaxCalibrator for H-swish layers to capture the full activation range.
    Steps: (1) export model to ONNX with opset 17; (2) build TRT engine with INT8 flag + calibrator; (3)
    provide 5K calibration images through custom IInt8Calibrator; (4) for H-swish layers specifically,
    register per-tensor scale factors from MinMax calibrator. Verify with trtexec --iterations=100. If
    accuracy drop >1%, try layer-by-layer mixed precision keeping H-swish in FP16.'
  common_mistake: Using the default entropy calibration (IInt8EntropyCalibrator2) without considering
    that H-swish's piecewise linear nature can cause calibration to underfit the activation range, leading
    to clipping and accuracy degradation beyond 1%.
  napkin_math: 'MobileNetV3-Large: 5.4M params. FP32: 21.6MB. INT8: 5.4MB (4× compression). A100 INT8
    tensor core peak: 624 TOPS. BF16: 312 TFLOPS. Speedup: ~2× for compute-bound layers. MobileNetV3 is
    memory-bound (0.22 GFLOPs, 5.4M params × 4B = 21.6MB read per inference). Memory bandwidth bound:
    21.6MB / 2TB/s = 10.8 μs minimum. INT8: 5.4MB / 2TB/s = 2.7 μs minimum. Real throughput improvement:
    ~1.5–1.8× (not full 2× due to activation quantization overhead).'
