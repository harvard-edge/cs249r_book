title: K8s Scheduling Latency for Real-Time Inference
scenario: Your ML platform auto-deploys new model versions as Kubernetes Deployments. A rolling update replaces old pods with new ones. During the rollout, you observe a 30-second gap where some requests fail with 503 errors.
question: What caused the 30-second 503 gap during rolling updates, and how would you deploy GPU inference pods with zero downtime?
details:
  realistic_solution: 'Root cause: Kubernetes marks old pods for termination as soon as new pods are created, but new pods take 30s to load. Fix: Use a preStop lifecycle hook with a 15-second sleep to drain in-flight requests, and an HTTP readiness probe that returns 200 only after the model is fully loaded.'
  common_mistake: |
    **The Pitfall:** Assuming maxUnavailable=0 in Kubernetes guarantees zero downtime for ML workloads.
    **The Rationale:** Candidates trust default Kubernetes orchestration logic without considering the unique initialization delays of GPUs and massive model weights.
    **The Consequence:** Kubernetes marks old pods for termination immediately, but new pods take 30+ seconds to load weights into VRAM, causing a massive gap where no pods are ready to serve traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model pulling from S3: 20 seconds.
       - CUDA context initialization: 2 seconds.
       - Warm-up inference step: 1 second.
    2. **Calculations:**
       - Total new pod initialization time: 20s + 2s + 1s = 23 seconds.
       - Downtime gap without probes: Old pod terminates immediately, creating 23 seconds of 503 errors.
    3. **Conclusion & Interpretation:** **A 15-second preStop hook combined with strict readiness probes masks the 23-second GPU Initialization Bottleneck.**
