title: K8s Scheduling Latency for Real-Time Inference
scenario: Your ML platform auto-deploys new model versions as Kubernetes Deployments. A rolling update replaces old pods with new ones. During the rollout, you observe a 30-second gap where some requests fail with 503 errors.
question: What caused the 30-second 503 gap during rolling updates, and how would you deploy GPU inference pods with zero downtime?
details:
  realistic_solution: 'Root cause: Kubernetes marks old pods for termination as soon as new pods are created, but new pods are not ready until model loading completes. Even with maxUnavailable=0, the old pod starts receiving SIGTERM while the new pod is still loading. Fix - multi-layer approach: (1) Readiness probe: configure an HTTP readiness probe that returns 200 only after the model is fully loaded and a warm-up inference has completed. initialDelaySeconds=30, periodSeconds=5. Kubernetes routes traffic only to ready pods. (2) Rolling update config: maxSurge=1, maxUnavailable=0. This creates the new pod first, waits for it to pass readiness, then terminates the old pod. (3) Pre-stop hook: add a preStop lifecycle hook with a 15-second sleep. This keeps the old pod in the Service endpoints for 15 seconds after SIGTERM, allowing in-flight requests to complete (graceful drain). (4) terminationGracePeriodSeconds=60: give the old pod enough time to finish processing long-running inference requests (LLM generation can take 10+ seconds). (5) Model pre-loading: use an init container that downloads the model to a shared emptyDir volume. The main container loads from local disk (fast) instead of pulling from remote storage.'
  common_mistake: |
    **The Pitfall:** Assuming `maxUnavailable=0` in Kubernetes guarantees zero downtime for ML workloads.
    **The Rationale:** Candidates trust default Kubernetes orchestration logic without considering the unique initialization delays of GPUs and massive model weights.
    **The Consequence:** Kubernetes marks old pods for termination immediately, but new pods take 30+ seconds to load weights into VRAM, causing a massive gap where no pods are ready to serve traffic.
  napkin_math: |
    - **Analyze Startup Latency:** Pull weights from S3 (20s) + CUDA context init (2s) + Warm-up inference (1s) = **23s total initialization time**.
    - **Calculate Gap:** Without readiness probes, this creates a 23-second window of 503 errors.
    - **Conclusion:** Configuring strict readiness probes and a 15-second `preStop` hook ensures the old pod serves traffic until the new pod's 23-second initialization completes.
