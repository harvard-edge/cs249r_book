title: Sensitivity Wall For LLM Decode
scenario: A 30B model decodes at 80 ms/token on an A100. Profiling estimates that
  a 10% HBM bandwidth increase would reduce latency by 7 ms, while a 10% FLOPs increase
  would reduce latency by 0.5 ms. Diagnose the binding wall and recommend the upgrade
  direction.
question: Which upgrade should you prioritize if 10% more HBM saves 7 ms/token but
  10% more FLOPs saves 0.5 ms/token?
details:
  realistic_solution: The sensitivity points to a memory-bandwidth-bound workload.
    HBM bandwidth has 14x the latency impact of FLOPs for the same percentage improvement.
    Prioritize bandwidth, quantization, batching, or memory-traffic reduction rather
    than peak compute.
  common_mistake: Choosing the accelerator with higher TFLOPs because it looks faster
    on spec sheets.
  napkin_math: Sensitivity ratio = 7 / 0.5 = 14x more benefit from bandwidth than
    FLOPs.
