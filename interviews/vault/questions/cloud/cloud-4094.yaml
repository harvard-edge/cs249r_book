title: GQA Impact on Tensor Parallelism
scenario: Llama-3 70B uses Grouped Query Attention with 64 query heads and 8 KV heads. You set TP=8 on MI300X GPUs.
question: How are the KV heads distributed, and what problem arises if you try TP=16?
details:
  realistic_solution: 'With TP=8 and 8 KV heads: each GPU gets exactly 1 KV head and 64/8 = 8 query heads. The 8 query heads on each GPU all attend to the same single local KV head — no cross-GPU KV communication needed. This is clean and efficient. With TP=16 and 8 KV heads: 8/16 = 0.5 KV heads per GPU — impossible. You would need to either replicate KV heads (each pair of GPUs shares a KV head, wasting memory) or redesign the attention kernel to split within a KV head (complex, breaks the abstraction). In practice, TP degree for GQA models is capped at num_kv_heads. For Llama-3 70B, max practical TP = 8. To scale beyond 8-way parallelism within a node, combine TP=8 with context parallelism (split along sequence dimension for long contexts).'
  common_mistake: |
    **The Pitfall:** Not realizing that KV heads constrain TP degree more than query heads.
    **The Rationale:** Candidates often assume that as long as the query heads divide evenly, Tensor Parallelism can scale indefinitely.
    **The Consequence:** With only 8 KV heads, TP=16 would require splitting individual KV heads, which is architecturally invalid.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3 70B has 64 Q-heads and 8 KV-heads.
    - TP=8 distributes heads evenly across 8 GPUs.

    **Calculations:**
    - TP=8: 64 Q-heads / 8 = 8 Q-heads/GPU; 8 KV-heads / 8 = 1 KV-head/GPU.
    - TP=16: 8 KV-heads / 16 = 0.5 KV-heads/GPU (invalid).

    **Conclusion & Interpretation:**
    - **Result: Max TP = 8 (Architecture-Bound)**. TP cannot exceed the number of KV-heads without splitting heads or replicating.
