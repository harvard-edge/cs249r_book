title: Optimal Checkpoint Interval Scaling Tradeoffs
scenario: A cloud AI team scales a distributed training job from 1,024 to 2,048 H100 GPUs (each with 80
  GB HBM3). Each 8-GPU node saves its 640 GB of state to network storage using 4 InfiniBand NDR ports
  (50 GB/s per port). They notice that after doubling the cluster size, their automated fault-tolerance
  system significantly decreases the time between checkpoints. Given that the checkpoint write time remains
  exactly the same, why does the system decrease the checkpoint interval, and what tradeoff is it optimizing?
question: "Why does doubling from 1,024 to 2,048 H100s reduce the optimal checkpoint interval when checkpoint write time is unchanged?"
details:
  realistic_solution: The system dynamically adjusts based on the Young-Daly formula (Tc = sqrt(2CF)).
    When the number of GPUs doubles, the cluster's overall MTBF (F) halves because there are twice as
    many hardware components that can independently fail. To minimize the expected compute time lost to
    these more frequent failures, the system must checkpoint more often. The system trades off spending
    more time actively writing checkpoints to avoid massive recalculation penalties when a failure occurs.
  common_mistake: Candidates often incorrectly assume the interval decreased because network writes became
    slower due to congestion, ignoring the prompt's constraint. They frequently fail to connect the increased
    number of GPUs to a proportionally lower cluster-wide Mean Time Between Failures (MTBF).
  napkin_math: 'Formula: Tc = sqrt(2 * C * F). Assume a single H100 GPU has an MTBF of 40,000 hours. Cluster
    1 MTBF (F1) = 40,000 / 1024 = 39.06 hours, and Cluster 2 MTBF (F2) = 40,000 / 2048 = 19.53 hours.
    Node write time (C) = 640 GB / (4 * 50 GB/s) = 3.2 seconds = 0.00089 hours. Optimal interval for 1,024
    GPUs = sqrt(2 * 0.00089 * 39.06) = 0.263 hours (15.8 minutes). Optimal interval for 2,048 GPUs = sqrt(2
    * 0.00089 * 19.53) = 0.186 hours (11.2 minutes).'
