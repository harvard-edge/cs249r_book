title: 'Mastery: knowledge distillation from EfficientNet-B7 to MobileNetV3 at scale'
scenario: You are leading a project to distill EfficientNet-B7 teacher (84.3% top-1, 37 GFLOPs) into a
  MobileNetV3-Large student (target 78%+ top-1, 0.22 GFLOPs) using 4× A100 nodes. Design the distillation
  loss, intermediate feature alignment strategy, and training schedule. Justify why feature-based distillation
  is needed beyond soft-label distillation alone.
details:
  realistic_solution: 'Three-component loss: (1) CE with soft targets (T=4 temperature), weight 0.5; (2)
    intermediate feature matching on 3 stages using adapters (linear projectors B7_channels → MV3_channels),
    weight 0.3; (3) attention transfer from SE excitation maps, weight 0.2. Adapter design: since B7 has
    2× more channels, use 1×1 conv adapters trained jointly. Training: first 30 epochs with adapters only
    (frozen student backbone), then 90 epochs end-to-end with cosine LR 0.1→0.001. Expected gain over
    soft-label only: +1.5–2pp accuracy.'
  common_mistake: Using only KL divergence on soft logits (Hinton-style distillation) which provides signal
    only at the final layer; with an 8-GFLOP capacity gap, the student cannot learn the rich intermediate
    representations needed without intermediate supervision.
  napkin_math: '4 A100 nodes = 32 GPUs. MobileNetV3-Large training: 0.22 GFLOPs/image, batch=256/GPU,
    total batch=8192. EfficientNet-B7 teacher inference: 37 GFLOPs/image at batch=256 = 9.5 TFLOPs/step
    → 9.5T/156T (A100 50% util) = 61ms/step. Student forward: 0.22G×256 = 56G FLOPs → 0.36ms. Teacher
    dominates. Solution: precompute teacher soft labels and feature maps, store on NVMe (256 images ×
    37G FLOPs → pre-generate 50M×10K-dim = 500GB for logits + ~2TB for features). Online teacher forward
    is 170× more expensive than student.'
