title: 'A100 Inference Performance Degradation: Monitoring & Anomaly Detection'
scenario: You are leading the MLOps team for a critical real-time inference service deployed on a cluster of NVIDIA A100 GPUs. The service processes high-volume requests for a large language model. Recently, users have reported intermittent latency spikes and 'straggler' requests that take significantly longer to complete, impacting user experience and SLA adherence.
question: How would you design a monitoring strategy to detect, diagnose, and minimize MTTR for these straggler requests?
details:
  realistic_solution: 'Implement a multi-layered monitoring system: 1) **GPU-level telemetry:** Utilize NVIDIA DCGM or similar tools to collect real-time metrics like GPU utilization, memory usage (HBM2e bandwidth/saturation), temperature, power consumption (400W TDP limit), PCIe bandwidth, and Tensor Core activity per A100. 2) **Application-level telemetry:** Instrument the inference code to track model forward pass time, pre/post-processing latency, batching efficiency, and individual request completion times. 3) **Straggler detection:** Implement percentile-based latency monitoring (e.g., p99, p99.9) with distributed tracing to identify and isolate slow requests. Use canary deployments or synthetic transactions for proactive health checks. 4) **Alerting:** Configure threshold-based alerts for critical GPU metrics (e.g., sustained high temperature, HBM2e saturation, low utilization due to queuing) and anomaly detection for deviations in latency percentiles. Use context-rich alerts that include relevant dashboards. 5) **Dashboards:** Create hierarchical dashboards showing service-level KPIs, per-GPU health, and drill-down capabilities for problematic instances. Integrate MTBF/MTTR tracking into incident management. 6) **Post-mortem analysis:** Centralize logs, traces, and metrics for efficient root cause analysis.'
  common_mistake: |
    **The Pitfall:** Relying solely on high-level service metrics (e.g., overall latency, error rate) without granular, GPU-specific telemetry.
    **The Rationale:** Candidates assume standard APM tools are sufficient without recognizing the complexity of hardware-level bottlenecks.
    **The Consequence:** Leads to reactive debugging, prolonged MTTR, and an inability to distinguish between hardware, software, or data-related issues.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 RPS/A100, 10ms avg latency. p99 spikes to 100ms.

    **Calculations:**
    - Fleet impact: 1% of 100,000 RPS = 1000 slow requests/sec.
    - Overhead: Extra 90ms per slow request.
    - Concurrency: 1000 requests/sec * 0.090 sec = 90 concurrent requests delayed.

    **Conclusion & Interpretation:**
    - **Result: 90 concurrent GPU slots constantly occupied by stragglers**. Reduces throughput capacity.
