title: PowerSGD Low-Rank Gradient Compression
scenario: PowerSGD compresses gradients by projecting them onto a low-rank approximation. For a weight
  matrix W ∈ ℝ^{4096×4096} (a Transformer layer), PowerSGD uses rank r=4, sending two small matrices P
  ∈ ℝ^{4096×4} and Q ∈ ℝ^{4096×4} instead of the full gradient. Calculate the compression ratio, AllReduce
  time savings on 256 H100s, and the approximation error bound.
details:
  realistic_solution: 'Full gradient: 4096 × 4096 × 2 bytes (FP16) = 32MB. PowerSGD with rank r=4: P =
    4096×4×2 = 32KB, Q = 4096×4×2 = 32KB. Total communicated: 64KB. Compression ratio: 32MB / 64KB = 512×.
    AllReduce time (256 H100s, 400Gbps): Full gradient: 2 × 255/256 × 32MB / 50GB/s = 1.27ms. PowerSGD:
    2 × (2 × 255/256 × 32KB / 50GB/s) = 2 × 1.27μs = 2.54μs for AllReduce, plus local MM: P^T × G = (4×4096)
    × (4096×4096) — actually, the algorithm works differently: (1) Q_t = G × P_{t-1}, AllReduce Q_t. (2)
    Orthogonalize Q_t. (3) P_t = G^T × Q_t, AllReduce P_t. Local compute: two matrix multiplies of (4096×4096)
    × (4096×4) = 67M FLOPs each = 134M FLOPs total. On H100 at 989 TFLOPS FP16: 134M / 990T = 0.14μs.
    Negligible. Total PowerSGD time: ~3μs vs 1.27ms = 423× faster. Approximation error: the rank-4 approximation
    captures the top-4 singular vectors. Error = ||G - G_r||_F / ||G||_F ≈ σ₅/σ₁ for typical gradient
    spectra. Transformer gradients have rapidly decaying spectra; rank-4 typically captures >90% of Frobenius
    norm.'
  common_mistake: Forgetting that PowerSGD requires two AllReduce operations (one for P and one for Q)
    plus a local matrix multiplication between them. The total cost is 2× AllReduce of smaller matrices
    plus local compute, not just 1× AllReduce of the compressed representation.
  napkin_math: 'Compression: 32MB → 64KB = 512×. AllReduce speedup: ~423×. But PowerSGD adds per-iteration
    local compute cost of 134M FLOPs (negligible on H100). Net communication savings: from 1.27ms to 3μs
    per layer. For 96 Transformer layers: from 122ms to 0.29ms total AllReduce time.'
