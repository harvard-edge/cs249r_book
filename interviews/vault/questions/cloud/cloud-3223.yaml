title: GQA vs MQA vs MHA KV-Cache Tradeoff
scenario: 'You are choosing the attention variant for a new 30B model targeting H100
  inference. Options: MHA (32 KV heads), GQA (4 KV groups, 8 KV heads), or MQA (1
  KV head). The model must serve 128K context with batch=16 on a single H100 (80 GB).
  Evaluate which variants are memory-feasible.'
question: Which attention variants are memory-feasible for batch 16 at 128K context
  on one H100, and what changes if none fit?
details:
  realistic_solution: 'Model: 30B params, head_dim=128, 60 layers. Weights: 30B ×
    2B = 60 GB. Available for KV-cache: 80 - 60 = 20 GB. KV-cache per token per layer:
    2 × KV_heads × 128 × 2B. (1) MHA (32 KV heads): 2 × 32 × 128 × 2 = 16,384 B/token/layer.
    Total for batch=16, 128K context: 16 × 128K × 16,384 × 60 = 2.01 TB. Completely
    infeasible. (2) GQA-8 (8 KV heads): 2 × 8 × 128 × 2 = 4,096 B/token/layer. Total:
    16 × 128K × 4,096 × 60 = 515 GB. Still infeasible on 1 GPU. (3) GQA-4 (4 KV heads):
    2 × 4 × 128 × 2 = 2,048 B/token/layer. Total: 16 × 128K × 2,048 × 60 = 257 GB.
    Infeasible. (4) MQA (1 KV head): 2 × 1 × 128 × 2 = 512 B/token/layer. Total: 16
    × 128K × 512 × 60 = 64.4 GB. Exceeds 20 GB budget. Conclusion: no variant fits
    batch=16 at 128K on a single H100. Must reduce batch to 4 (MQA: 16.1 GB, fits)
    or use 2 GPUs with GQA-4 (batch=16, 128.5 GB per GPU, fits with 80 GB per GPU
    = 160 GB total minus 60 GB weights = 100 GB for KV → need 3 GPUs minimum). GQA-4
    with 4 GPUs is the practical choice balancing quality and cost.'
  common_mistake: Choosing MQA for maximum memory savings without considering quality
    degradation. MQA with only 1 KV head significantly reduces model expressiveness,
    especially for long-context tasks requiring diverse attention patterns.
  napkin_math: 'MHA: 16 KB/token/layer. GQA-8: 4 KB. GQA-4: 2 KB. MQA: 512 B. At batch=16,
    128K ctx, 60 layers: MHA=2 TB, GQA-8=515 GB, GQA-4=257 GB, MQA=64 GB. Budget:
    20 GB. Only MQA at batch≤4 fits single GPU.'
