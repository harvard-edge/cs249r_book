title: Encoder-Decoder Architecture Tradeoffs on Google TPU v5e for Real-time Inference
scenario: 'Your team is tasked with deploying a large language model for a real-time conversational AI application that requires very low-latency inference. The target hardware platform is Google TPU v5e, where each accelerator unit is equipped with 16 GB of HBM, offers 197 TFLOPS (BF16) for compute, and has a memory bandwidth of 1.6 TB/s. You are evaluating three primary architectural paradigms: a monolithic encoder-decoder model, separate encoder-only and decoder-only models chained together, or a highly optimized decoder-only model capable of performing both tasks.'
question: Which architecture is best for low-latency conversational AI on TPU v5e, and how do latency, throughput, HBM, and cost trade off?
details:
  realistic_solution: For low-latency conversational AI on a constrained HBM platform like TPU v5e, a highly optimized, quantized decoder-only model is often the most realistic solution. This avoids inter-model communication overhead and can leverage the v5e's BF16 capabilities for efficient compute. Techniques like speculative decoding, attention sink, or advanced KV cache management (e.g., paging, sparse attention) can further optimize memory and reduce latency. If the model is exceptionally large, strategic quantization (e.g., 8-bit integer) to fit within HBM, or model parallelism combined with an efficient communication library on a multi-chip v5e setup, would be necessary, but this adds complexity and potential latency.
  common_mistake: |
    **The Pitfall:** Underestimating the HBM memory constraints of 16 GB per TPU v5e chip.
    **The Rationale:** Candidates design architectures for massive memory pools, forgetting that large decoder-only models' KV cache quickly consumes significant memory.
    **The Consequence:** Designing a model that immediately OOMs or necessitates extreme multi-chip sharding, ruining real-time latency.
  napkin_math: |
    - **Model Size:** 7B parameters * 2 bytes/param = 14 GB (BF16).
    - **Remaining HBM:** 16 GB - 14 GB = 2 GB for activations and KV cache.
    - **KV Cache Estimate:** Context window 2048 tokens, 32 layers, 32 heads (128 dim) = 2048 * 32 * 32 * 128 * 2 (K+V) * 2 bytes = 1.07 GB per sequence.
    - **Compute Requirements:** ~14 billion FLOPs per token for a 7B model.
    - **Result:** **Memory capacity (16 GB) and bandwidth (1.6 TB/s), not compute (197 TFLOPS), are the critical bottlenecks for batch size > 1.**
