title: The RAG Rollout Storage Tax
scenario: You are managing a cloud-based RAG system for an automotive client's in-car voice assistant. The system's knowledge base is a vector index of the user manual, which occupies 14 GB. To ensure zero downtime during a major update, you plan to use a blue-green deployment strategy to replace this index with a new 14 GB version.
question: What peak vector-index storage is required during a blue-green rollout replacing a 14 GB RAG index with a new 14 GB version?
details:
  realistic_solution: |
    A blue-green deployment strategy requires that the 'blue' (current) and 'green' (new) environments exist simultaneously to allow for instant cutover and rollback. The total peak storage required is the sum of both.
  common_mistake: |
    **The Pitfall:** Calculating storage based only on the final state.
    **The Rationale:** Engineers forget that a blue-green deployment requires provisioning a duplicate copy before tearing down the old one.
    **The Consequence:** The deployment fails mid-rollout due to out-of-storage errors on the vector database.
  napkin_math: |
    - Current Index Size (Blue): 14 GB
    - New Index Size (Green): 14 GB
    - Peak Storage = Blue + Green = 14 GB + 14 GB
    - **Peak storage required is 28 GB.**
  options:
  - 14 GB
  - 21 GB
  - 28 GB
  - 42 GB
  correct_index: 2
