title: The Data Gravity Gravity Well
scenario: Your company has 10 Petabytes of multimodal training data sitting in AWS S3 in `us-east-1`.
  Due to a massive GPU shortage, you secured 2,000 H100s in a specialized cloud provider (like CoreWeave
  or Lambda Labs) located in Texas. How do you engineer the training pipeline to connect the data to the
  GPUs, and what is the hidden economic catastrophe?
details:
  realistic_solution: 'You fell victim to data gravity and egress fees. AWS charges $0.05-0.09/GB for
    data leaving their network. Moving 10PB once costs $500K-900K. Streaming it each epoch multiplies
    that cost. The engineering solution: (1) Do a one-time bulk transfer using AWS Snowball ($0.005/GB)
    or dedicated fiber to the compute provider''s facility, spending ~$50K instead of $500K. (2) Cache
    the dataset locally on the compute cluster''s NVMe storage. (3) Never stream directly from S3 across
    providers. The hidden economic catastrophe is that cloud egress pricing creates a vendor lock-in moat
    — your data is cheap to store but ruinously expensive to move.'
  common_mistake: '"Just stream the data directly from S3 to the GPUs in Texas using PyTorch IterableDataset."'
  napkin_math: 10 Petabytes = 10,000,000 Gigabytes. At $0.05 per GB, AWS will charge you **$500,000**
    in a single egress fee just to read your dataset once. If your data loader streams multiple epochs
    without local caching, you pay that $500,000 penalty *every single epoch*.
