title: The Data Gravity Gravity Well
scenario: Your company has 10 Petabytes of multimodal training data sitting in AWS S3 in `us-east-1`. Due to a massive GPU shortage, you secured 2,000 GPUs in a specialized cloud provider located in Texas.
question: "How do you engineer the training pipeline to connect the data to the GPUs, and what is the hidden economic catastrophe?"
details:
  realistic_solution: 'You fell victim to data gravity and egress fees. AWS charges $0.05-0.09/GB for data leaving their network. Moving 10PB once costs $500K-900K. Streaming it each epoch multiplies that cost. The engineering solution: (1) Do a one-time bulk transfer using AWS Snowball ($0.005/GB) or dedicated fiber to the compute provider''s facility, spending ~$50K instead of $500K. (2) Cache the dataset locally on the compute cluster''s NVMe storage. (3) Never stream directly from S3 across providers. The hidden economic catastrophe is that cloud egress pricing creates a vendor lock-in moat — your data is cheap to store but ruinously expensive to move.'
  common_mistake: |
    **The Pitfall:** Proposing to stream the data directly from S3 to the remote GPUs.
    **The Rationale:** Using PyTorch IterableDataset works seamlessly inside a single VPC, so candidates blindly apply it cross-cloud.
    **The Consequence:** Incurring a $500,000+ AWS egress penalty per training epoch, bankrupting the project.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data Size: 10 PB (10,000,000 GB).
       - Egress Fee: AWS charges $0.05 per GB.
    2. **Calculations:**
       - Single Transfer Cost = 10,000,000 GB * $0.05/GB = $500,000.
       - Snowball/Direct Fiber Cost = 10,000,000 GB * $0.005/GB = $50,000.
    3. **Conclusion & Interpretation:**
       - **Result: $500,000 Egress Penalty (Cost-Bound).** Streaming the data dynamically incurs this ruinous cost every epoch, making physical or dedicated one-time transfer mandatory.
