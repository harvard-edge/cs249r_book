title: AllReduce on Non-Power-of-Two GPU Counts
scenario: Due to GPU failures, your 512-H100 cluster now has 497 working GPUs. The
  recursive halving-doubling algorithm requires power-of-two participant counts. NCCL
  falls back to ring AllReduce, but ring performance at 497 GPUs has significant per-step
  latency overhead. Propose an efficient AllReduce strategy for 497 GPUs.
question: What AllReduce strategy should you use for 497 GPUs, and why might ring
  still beat a non-power-of-two recursive scheme?
details:
  realistic_solution: 'Use the Rabenseifner algorithm variant for non-power-of-two: (1) Round down to nearest power of 2: P'' = 256. (2) The extra 497 - 256 = 241 GPUs each pair with one of the first 241 GPUs in the power-of-two group. (3) Pre-reduction: the 241 extra GPUs send their gradients to their partners. Cost on 1 rail (50GB/s): 2GB/50GB/s = 40ms. On 8 rails (400GB/s): 5ms. (4) Recursive halving-doubling among 256 GPUs (which now hold reduced gradients from 2 GPUs each) using 8 rails: 2 × log₂(256) × 10µs + 2 × 255/256 × 2GB/400GB/s = 160µs + 10ms = 10.16ms. (5) Post-broadcast: 40ms (1 rail) or 5ms (8 rails). Total with 8 rails: 5 + 10.16 + 5 = 20.16ms. Compare to ring with 497 using 8 rails: 2 × 496 × 5µs + 2 × 496/497 × 2GB/400GB/s = 4.96ms + 9.98ms = 14.94ms. Ring is actually faster here because the multi-phase overhead of the non-power-of-two algorithm exceeds the ring latency penalty.'
  common_mistake: 'Simply using ring AllReduce and assuming its latency penalty will make it much slower than tree-based algorithms. At 2GB sizes, bandwidth dominates, and ring''s simplicity wins. Another mistake is padding to 512 with dummy GPUs that waste compute and memory.'
  napkin_math: '497 GPUs, 2GB gradient, 8-rail 400GB/s (50GB/s per rail): Ring = 2×496×5µs + 2×496/497×2GB/400GB/s = 4.96ms + 9.98ms = 14.94ms. Non-power-of-two with 8 rails: 5ms (pre) + 10.16ms (halving-doubling) + 5ms (post) = 20.16ms. Ring''s simplicity wins over complex non-power-of-two algorithms when bandwidth is the dominant factor.'
