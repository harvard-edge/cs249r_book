title: Training GPU Starvation From JPEG Decode
scenario: An 8-GPU training job should process 32,000 images/s based on GPU compute.
  Storage delivers 6 GB/s, and compressed images average 100 KB, so storage can deliver
  60,000 images/s. However, CPU preprocessing uses 64 workers at 350 images/s each.
  Diagnose why GPUs are only 70% utilized.
question: Why are GPUs starved if storage can deliver 60,000 images/s but preprocessing
  has 64 workers at 350 images/s each?
details:
  realistic_solution: Storage is not the bottleneck. CPU preprocessing capacity is
    64 x 350 = 22,400 images/s, below the 32,000 images/s GPU demand. The GPUs wait
    for decoded and augmented batches even though raw storage bandwidth is sufficient.
  common_mistake: Stopping after the storage bandwidth check and ignoring CPU decode/augmentation
    throughput.
  napkin_math: Storage capacity = 6 GB/s / 100 KB = 60K images/s. CPU capacity = 64
    x 350 = 22.4K images/s. Demand = 32K images/s, so CPU preprocessing supplies only
    70% of demand.
