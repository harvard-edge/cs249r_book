title: Spot Instance Preemption TCO
scenario: >-
  You are provisioning 8 `p4d.24xlarge` (8x A100) nodes for a 100-hour distributed training run.
  On-Demand price is $32.77/hr per node; Spot price is $9.83/hr (70% discount). Your cloud provider averages
  1 preemption per node every 20 hours. You synchronously checkpoint every 2 hours to external storage.
  If a node is preempted, the cluster pauses, a new node is provisioned, and state is restored. This recovery
  takes 15 minutes.
question: >-
  What are the expected total cost and wall-clock time of the 100-hour 8-node run on Spot versus On-Demand?
details:
  realistic_solution: 'Calculate total expected preemptions across the cluster, multiply by the average time lost per preemption (lost compute + recovery), add these extra hours to the base time, and multiply by the Spot rate.'
  common_mistake: |
    **The Pitfall:** Assuming a straight 70% cost reduction for spot instances.
    **The Rationale:** Candidates don't factor in the wasted compute (up to 2 hours per preemption) and the cluster-wide idle time during recovery, which extends the overall billing duration.
    **The Consequence:** Overestimating cost savings and failing to account for massive delays in time-to-market.
  napkin_math: |
    1. **On-Demand Cost:** 8 nodes × $32.77/hr × 100h = $26,216.
    2. **Spot Preemptions:** (100h / 20h) × 8 nodes = 40 interruptions.
    3. **Lost time per interruption:** ~1h (avg lost since 2h checkpoint) + 0.25h (recovery) = 1.25h.
    4. **Total extra time:** 40 × 1.25h = 50h.
    5. **Total Spot Time:** 100h + 50h = **150h.**
    6. **Spot Cost:** 8 nodes × $9.83/hr × 150h = **$11,796.**
    7. **Result:** You save $14,420 (55% savings), but wall-clock time extends by 50%.
