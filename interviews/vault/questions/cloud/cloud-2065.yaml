title: The Experiment Metadata Tax
scenario: Your team has been running experiments for 18 months without structured experiment tracking. You have 2,500 training runs stored as directories of checkpoints with ad-hoc naming conventions. The VP asks: 'Which model configuration gives the best accuracy-latency tradeoff for our production constraint of < 50ms?' You realize you cannot answer this question.
question: What went wrong, and what minimum metadata must be tracked per experiment to prevent this?
details:
  realistic_solution: 'Without structured tracking, you cannot query across experiments. The minimum metadata per experiment: (1) Inputs: dataset version hash, hyperparameter dict, code commit hash, environment snapshot (library versions). (2) Outputs: all evaluation metrics on standardized benchmarks, model size, inference latency on target hardware. (3) Lineage: parent experiment ID (if this is a continuation), hardware used, wall-clock time, GPU-hours consumed. (4) Tags: searchable labels (e.g., ''production-candidate'', ''ablation-study''). This is the experiment DAG — each experiment is a node with typed edges to its data, code, and metrics. Without it, 18 months of compute (~$500K) produced artifacts you cannot reason about.'
  common_mistake: |
    **The Pitfall:** Thinking the problem can be solved with just "better file naming."
    **The Rationale:** Candidates fail to recognize that file names cannot encode the complex multidimensional data (hyperparameters, metrics, hardware specs) needed for querying.
    **The Consequence:** Generating thousands of expensive artifacts that are functionally useless because their provenance and performance constraints cannot be systematically compared.
  napkin_math: |
    - Compute wasted: 2,500 experiments * 48h average * 4 GPUs * $3/GPU-hr = ~$1,440,000.
    - Metadata required: ~10 KB per experiment = ~25 MB total database size.
    - **Conclusion: Failing to store 25 MB of structured metadata turns a $1.4M compute investment into an unsearchable liability.**
