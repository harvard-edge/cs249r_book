title: Systolic Array Sizing and Padding Overhead
scenario: You are evaluating hardware for serving a dense LLM. The workload consists of requests with short sequence lengths (sequence 64, embedding 1024). You must compare a custom AI accelerator with a monolithic 256x256 systolic array against a GPU with distributed 16x16 matrix multiply units.
question: Which architecture is more efficient for the 64x1024 QKV projections without cross-request batching, and why?
details:
  realistic_solution: The 256x256 systolic array requires padding the sequence length from 64 to 256, destroying utilization. The distributed 16x16 units perfectly tile the 64x1024 operation, yielding significantly higher effective utilization and minimizing wasted memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming the massive 256x256 systolic array will inherently provide higher throughput.
    **The Rationale:** Looking strictly at peak theoretical TFLOPS ratings on a spec sheet.
    **The Consequence:** Purchasing expensive, rigid custom accelerators that operate at 25% utilization in production because real-world unbatched sequence lengths don't align with the hardware grid.
  napkin_math: |
    - **256x256 Array**: The 64x1024 input must be padded to 256x1024. Utilization = `(64 × 1024) / (256 × 1024)` = 0.25.
    - **Waste**: 75% of the monolithic systolic array's compute cycles and SRAM reads are wasted on zero-padded tiles.
    - **16x16 Units**: Perfectly tiles the 64x1024 operation with zero padding waste.
    - **Result**: **The distributed 16x16 GPU architecture is vastly more efficient for this low-batch workload.**
