title: Coreset Selection Pipeline for LLM Pre-training at Scale
scenario: Your team is pre-training a 30B parameter LLM. You have a raw corpus of 15 Trillion tokens,
  but a compute budget strictly limited to 3 Trillion tokens. To maximize the Information-Compute Ratio
  (ICR), you plan to score the perplexity of the entire 15T corpus using a 2B parameter reference model
  to select the best 3T tokens (coreset selection). You have an allocation of 256 H100 GPUs (80 GB HBM3,
  3.35 TB/s, 989 TFLOPS FP16). Diagnose the computational bottlenecks of this pipeline, design a distributed
  data streaming and scoring architecture, and calculate the total time required for both scoring the
  raw data and training the final model.
question: "How would you design the 15T-to-3T coreset scoring pipeline, identify its bottlenecks, and estimate scoring plus training time?"
details:
  realistic_solution: The optimal design recognizes that perplexity scoring is heavily compute-bound.
    Because it is a single forward pass over full sequences, the arithmetic intensity vastly exceeds the
    H100's ridge point of ~295 FLOPs/Byte. The architecture should use an embarrassingly parallel worker
    pool, streaming the 15T tokens (~30TB) directly from object storage to GPU memory in large batches.
    No inter-GPU communication is needed for scoring, unlike the 30B training phase which requires 3D
    parallelism.
  common_mistake: Candidates often mistakenly assume perplexity scoring is memory-bandwidth bound like
    autoregressive generation. They fail to realize scoring is a prefill-only operation with massive arithmetic
    intensity, or they omit the upfront scoring compute overhead when evaluating the overall ROI of the
    data pruning strategy.
  napkin_math: '1. Scoring Compute: 2 * 2B params * 15T tokens = 60 ZFLOPs (60,000 PFLOPs).

    2. Training Compute: 6 * 30B params * 3T tokens = 540 ZFLOPs (540,000 PFLOPs).

    3. Cluster Peak FP16: 256 H100s * 989 TFLOPS = 253 PFLOPS.

    4. Scoring Time: At 50% MFU (highly compute-bound), 60,000 / (253 * 0.5) = 474,308 seconds (~5.5 days).

    5. Training Time: At 45% MFU, 540,000 / (253 * 0.45) = 4,743,083 seconds (~54.9 days).

    Total Time: ~60.4 days. (Note: Training on the full 15T would take ~275 days, proving the 5.5-day
    pruning overhead provides a massive ICR boost).'
