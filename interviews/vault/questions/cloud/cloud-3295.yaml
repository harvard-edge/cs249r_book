title: Optimizing Inference Latency on AMD MI300X with Dynamic Batching
scenario: 'You are deploying a critical real-time inference service for a large language model (LLM) on an AMD MI300X accelerator (192 GB HBM3, 1,307 TFLOPS FP16 sparse, 5.3 TB/s memory bandwidth). The service has strict latency targets (e.g., p99 latency < 50ms) but also needs to maximize throughput. Your current static batching strategy often leads to underutilization during low request volume and increased tail latency during high-traffic spikes.'
question: 'How would you redesign MI300X batching to balance p99 latency below 50 ms with maximum throughput?'
details:
  realistic_solution: 'Implementing a dynamic batching system with an adaptive scheduler that monitors incoming request rates and adjusts batch sizes and aggregation windows in real-time. This could involve using a short queue with configurable timeouts for batch formation, potentially coupled with a continuous batching approach where requests are immediately added to a partially full batch being processed.'
  common_mistake: |
    **The Pitfall:** Failing to consider dynamic batch formation overhead or ignoring memory bandwidth.
    **The Rationale:** Candidates often apply overly aggressive batching that violates tail latencies, or fail to exploit the MI300X's 5.3 TB/s bandwidth for rapid data movement.
    **The Consequence:** The batching strategy yields either unacceptable p99 latency spikes or suboptimal throughput.
  napkin_math: |
    - **HBM3 Bandwidth:** 5.3 TB/s (5300 GB/s).
    - **Batch Transfer Time:** A batch of 10 requests (1GB total) moved into HBM3 takes roughly 1 GB / 5300 GB/s = **~0.19 ms**.
    - **Optimization Goal:** Find the batch size where (Batch Size × Input Size) / HBM3 Bandwidth + (Batch Size × Per-Request Compute Time) / MI300X Throughput ≈ Target Latency.
