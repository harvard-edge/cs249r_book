title: Optimizing Inference Latency on AMD MI300X with Dynamic Batching
scenario: You are deploying a critical real-time inference service for a large language
  model (LLM) on an AMD MI300X accelerator, which boasts 192 GB HBM3, 1,307 TFLOPS
  FP16 sparse performance, and 5.3 TB/s memory bandwidth. The service has strict latency
  targets (e.g., p99 latency < 50ms) but also needs to maximize throughput. Your current
  static batching strategy, while simple, often leads to underutilization of the MI300X's
  compute resources during periods of low request volume and increased tail latency
  during high-traffic spikes. How would you redesign the batching strategy to leverage
  the MI300X's capabilities more effectively, specifically addressing the throughput-latency
  tradeoffs and scheduling policies for dynamic and continuous batching?
question: How would you redesign MI300X batching to balance p99 latency below 50 ms
  with throughput?
details:
  realistic_solution: Implementing a dynamic batching system with an adaptive scheduler
    that monitors incoming request rates and adjusts batch sizes and aggregation windows
    in real-time. This could involve using a short queue with configurable timeouts
    for batch formation, potentially coupled with a continuous batching approach where
    requests are immediately added to a partially full batch being processed. The
    solution should consider the MI300X's ability to handle large models in HBM3 and
    its FP16 sparse capabilities for efficient computation, optimizing kernel launches
    and data transfers to minimize PCIe overhead and maximize HBM3 bandwidth utilization.
  common_mistake: Failing to consider the overhead of dynamic batch formation, over-aggressive
    batching leading to unacceptable tail latencies, or not fully exploiting the MI300X's
    high memory bandwidth for efficient data movement.
  napkin_math: Consider the MI300X's 5.3 TB/s HBM3 bandwidth. If an input tensor for
    an LLM inference is 100MB, naive sequential processing of individual requests
    would underutilize this. A batch of 10 requests (1GB total) could be moved into
    HBM3 in approximately 1GB / 5.3 TB/s = ~0.19ms. Compare this to the compute time
    (e.g., 100 TFLOPS FP16 for the specific model operations) to understand the bottleneck.
    The key is to find the batch size where memory transfer time is balanced with
    computation time, respecting latency constraints. (Batch Size * Input Size) /
    HBM3 Bandwidth + (Batch Size * Per-Request Compute Time) / MI300X Throughput ≈
    Target Latency.
