title: Optimizing Large-Scale Foundation Model Training with Data Efficiency on Google TPU v5e
scenario: You are leading the ML engineering effort for a new large-scale foundation model (e.g., a vision transformer). The training dataset spans petabytes of raw, heterogeneous data. You've identified a 'data wall' where adding more data no longer yields proportional performance gains, and data loading is a bottleneck. Your compute resources are a cluster of Google TPU v5e devices.
question: What data selection strategy would train the petabyte-scale model on TPU v5e within 100 TPU-days while maximizing Information-Compute Ratio (ICR) and avoiding collapse?
details:
  realistic_solution: The solution involves a multi-pronged approach integrating coreset selection, strategic synthetic data generation, and continuous monitoring of the Information-Compute Ratio (ICR). Firstly, implement an iterative coreset selection process (e.g., via embedding similarity or gradient-based importance sampling on a smaller proxy model) to intelligently prune the petabyte-scale dataset, prioritizing high-value, diverse samples. Secondly, identify data scarcity regions and strategically generate high-fidelity synthetic data, ensuring careful validation against real data distributions to prevent model collapse and introducing diversity to improve generalization. This process would be guided by the ICR, which quantifies the information gain per unit of compute, allowing dynamic adjustment of data selection and curriculum learning strategies. The data pipeline must be highly optimized for the TPU v5e's 1.6 TB/s HBM bandwidth, leveraging asynchronous prefetching, efficient data serialization, and potentially offloading heavy augmentation to dedicated CPUs to keep the 197 TFLOPS BF16 compute units saturated. Implement robust data versioning and lineage tracking.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on architectural improvements or compute scaling without addressing data quality.
    **The Rationale:** Engineers often treat data as a static blob and try to optimize the model architecture or distributed training setup instead.
    **The Consequence:** The TPU spends significant time waiting for data, processing redundant/noisy samples, or diverging due to poor data quality. The 1.6 TB/s HBM bandwidth is severely underutilized.
  napkin_math: |
    - **Data Throughput:** With 1.6 TB/s HBM bandwidth, a BF16 image sample (e.g., 224x224x3 &approx; 300KB) means the TPU can theoretically load &approx; 5.3 million images/second.
    - **Batch Size vs Memory:** 16 GB HBM can hold &approx; 53,000 BF16 images of 300KB. Actual batch size is limited by model activations.
    - **ICR Estimation:** Information-Compute Ratio (ICR) = (reduction in validation loss per epoch) / (seconds on TPU v5e). Track this metric over different data subsets.
    - **Compute Budget:** A 100 TPU-day budget with 197 TFLOPS BF16 yields &approx; **1.7 &times; 10^21 BF16 FLOPs total**. Data selection must filter to a subset that fits within this compute envelope.
