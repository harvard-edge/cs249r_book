title: Evaluate GPU Preprocessing for Video Analytics
scenario: You are designing a high-throughput video analytics pipeline on a server with 8x NVIDIA A100
  GPUs (PCIe Gen4 x16). The current system extracts 1080p frames, decodes them on the CPU to raw RGB (6.2MB/frame),
  and transfers them to the GPUs for batched inference. GPU utilization is stuck at 15% while the CPUs
  are fully saturated. Evaluate the trade-offs of sending compressed frames (~200KB/frame) over PCIe and
  performing decoding/resizing directly on the GPU using a library like NVIDIA DALI.
details:
  realistic_solution: Shift decoding and resizing to the GPU. While this consumes some GPU compute and
    memory, it drastically reduces the PCIe payload size from 6.2MB to 200KB per frame, lifting the interconnect
    bottleneck and allowing the A100 to reach high utilization.
  common_mistake: Failing to calculate the exact PCIe bandwidth bottleneck and assuming CPU thread counts
    alone are the primary limit, or assuming GPU preprocessing is 'free' without acknowledging it consumes
    SM cycles and memory bandwidth.
  napkin_math: 'A100 ResNet-50 throughput is ~5,000 fps. Transferring raw 1080p frames (1920x1080x3 bytes
    = 6.2MB): 5,000 fps * 6.2 MB = 31 GB/s per GPU. For 8 GPUs, this demands 248 GB/s, vastly exceeding
    the host-to-device PCIe bandwidth (often bottlenecked at the CPU root complex). Transferring 200KB
    compressed frames drops this to 1 GB/s per GPU, easily fitting in PCIe limits.'
