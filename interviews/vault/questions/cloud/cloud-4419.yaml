title: Chiplet Package Signal Integrity at 112G SerDes
scenario: Your chiplet AI accelerator uses 112G PAM-4 SerDes for die-to-die links
  on a passive silicon interposer. Signal integrity testing shows BER of 1e-8, which
  is above the target of 1e-12. Systematic root cause analysis is needed.
question: How would you systematically diagnose and fix the 1e-8 BER on 112G PAM-4
  die-to-die SerDes to meet the 1e-12 target?
details:
  realistic_solution: 'Systematic diagnosis: (1) Measure insertion loss (IL) and return
    loss (RL) with VNA at interposer bumps — target IL < 3dB at 28GHz (Nyquist for
    112G PAM-4). (2) Check via stub resonance on interposer — stubs create notches
    at f = c/(4*stub_length*sqrt(Er)). (3) Verify bump array ground-signal-ground
    ratio — insufficient ground return causes simultaneous switching noise. (4) Tune
    CTLE/DFE tap weights via receiver adaptation sweep. At 112G PAM-4, 1dB extra loss
    degrades SNR by ~0.5dB, increasing BER by ~1 order of magnitude. Fix: back-drill
    vias to remove stubs, add decoupling caps at bump periphery, re-tune DFE.'
  common_mistake: Immediately blaming the SerDes IP or process node. BER degradation
    at 112G PAM-4 is more commonly caused by interposer trace impedance mismatch,
    bump inductance at die-interposer interface, or insufficient equalization coefficients
    rather than SerDes IP bugs.
  napkin_math: '112G PAM-4: 2 bits/symbol at 56 Gbaud. Nyquist frequency = 28 GHz.
    Maximum allowable IL at 28GHz for 1e-12 BER: ~4dB total channel budget. Breakdown:
    PCB trace 0.5dB, connector 0.3dB, interposer trace 1.5dB target, bump interface
    0.5dB, TX/RX package 0.5dB = 3.3dB. If measured is 1e-8 BER, channel loss is ~5.5dB
    — ~2dB over budget, likely interposer stub resonance.'
