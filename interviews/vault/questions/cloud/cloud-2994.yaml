title: 'Kernel Fusion: Optimize CUDA Kernel Fusion for Transformer LayerNorm'
scenario: Your profiler shows LayerNorm is taking 8% of total training time for a 30B model. The unfused LayerNorm requires 3 passes over the data (compute mean, compute variance, normalize). A fused single-pass LayerNorm is possible using Welford's online algorithm.
question: How much HBM bandwidth does a fused single-pass LayerNorm save versus a naive three-pass LayerNorm for the 30B model?
details:
  realistic_solution: 'Naive LayerNorm: Pass 1: read X, compute mean → write mean. Pass 2: read X + mean, compute variance → write variance. Pass 3: read X + mean + variance, compute normalized output → write output. 3 reads of X. Welford''s single pass: compute mean AND variance simultaneously → 1 read of X.'
  common_mistake: |
    **The Pitfall:** Claiming that kernel fusion significantly reduces total FLOPs.
    **The Rationale:** Candidates misunderstand optimization paradigms and assume fusion changes the fundamental mathematics of the operation.
    **The Consequence:** Applying fusion logic to heavily compute-bound operations expecting massive speedups, when fusion only optimizes memory-bound overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Tensor Size: 256 batch * 2048 seq * 6144 hidden * 2 bytes = 6.44 GB per call.
       * Naive HBM Traffic: 3 reads + 1 write = 4 passes.
       * Fused HBM Traffic: 1 read + 1 write = 2 passes.
    2. **Calculations:**
       * Naive Traffic: 4 * 6.44 GB = 25.76 GB per call.
       * Fused Traffic: 2 * 6.44 GB = 12.88 GB per call.
       * Forward Pass Total (192 calls): Naive = 4.95 TB, Fused = 2.47 TB.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bandwidth Bound.** Kernel fusion halves the HBM traffic, saving ~2.48 TB of memory bandwidth per forward pass.
