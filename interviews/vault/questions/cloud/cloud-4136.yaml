title: Gang Scheduling in Kubernetes with Volcano
scenario: You are deploying a 32-GPU distributed training job across 4 Kubernetes nodes. The default kube-scheduler often schedules pods sequentially, leading to partial allocation deadlocks where 3 nodes secure pods but the 4th lacks available GPUs.
question: How does Volcano scheduler solve this?
details:
  realistic_solution: 'Volcano introduces the PodGroup CRD and a gang-scheduling plugin. Create a PodGroup with minMember=4 (all 4 pods must be schedulable). Volcano maintains job queues with fair-share scheduling and evaluates jobs as units, preventing partial allocation deadlocks.'
  common_mistake: |
    **The Pitfall:** Believing the default Kubernetes scheduler handles multi-pod atomicity.
    **The Rationale:** Users assume Kubernetes automatically understands that distributed ML pods are interdependent.
    **The Consequence:** Severe GPU waste and NCCL timeouts, as partially scheduled jobs block resources indefinitely while waiting for the remaining pods.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 pods requiring 8 GPUs each (32 GPUs total).
       - Default scheduler binds one pod at a time.
    2. **Calculations:**
       - Without gang scheduling: 3 pods bind to 24 GPUs and idle for 15 minutes waiting for the 4th node.
       - Wasted compute = 3 pods * 8 GPUs * 15 minutes = 360 GPU-minutes.
       - With Volcano gang scheduling: PodGroup minMember=4 ensures "all-or-nothing" atomic binding.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduling-Bound.** Volcano's gang scheduling guarantees atomic allocation, eliminating partial allocation deadlocks and reducing wasted compute to 0.
