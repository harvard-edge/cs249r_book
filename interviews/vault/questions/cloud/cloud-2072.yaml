title: The Experiment Leakage Detection
scenario: A junior engineer reports that their model achieves 99.2% accuracy on the validation set — a 7% improvement over the previous best. The training loss curve shows rapid convergence in the first epoch, despite using a standard architecture with no novel tricks.
question: Before celebrating, what should you check first, and why does the training curve shape suggest a specific failure mode?
details:
  realistic_solution: 'The rapid first-epoch convergence combined with unrealistically high accuracy is the hallmark of data leakage — the model has access to information from the test/validation set during training. Causes include temporal leakage (predicting past with future), target leakage (features derived from labels), or overlap leakage (same examples in both sets). Diagnosis requires deduplication checks and feature importance inspections.'
  common_mistake: |
    **The Pitfall:** Taking the phenomenal result at face value and immediately preparing for deployment.
    **The Rationale:** High accuracy and rapid convergence feel like a major engineering success.
    **The Consequence:** Deploying a model that has simply memorized validation artifacts, leading to spectacular failure and zero predictive power on actual production data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Validation examples inadvertently duplicated in training: 5%.
       - True generalization accuracy: 92%.
       - Model memorizes training data with 100% accuracy.
    2. **Calculations:**
       - Inflated validation accuracy = (0.95 * 92%) + (0.05 * 100%) = 87.4% + 5% = 92.4%.
    3. **Conclusion & Interpretation:**
       - **Result: Accuracy Inflated.** Even minor overlaps slightly inflate metrics, but target leakage mathematically pushes accuracy toward near 100%.
