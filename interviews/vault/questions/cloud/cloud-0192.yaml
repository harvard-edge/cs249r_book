title: The Two-Tier SLA Conundrum
scenario: 'You are the founding ML Systems Engineer at a well-funded startup. Your first product is an
  API powered by a 70B parameter LLM, running on a fixed cluster of 16 NVIDIA H100s. The product has two
  tiers with conflicting requirements:'
question: "How would you architect serving for the two product tiers on 16 H100s without one tier hurting the other's SLA?"
details:
  realistic_solution: 'The core challenge is that the two tiers have fundamentally incompatible optimization
    targets: one is latency-bound, the other is throughput-bound. A robust architecture must create isolation
    between them.'
  common_mistake: Proposing a single, unified serving cluster for both traffic types. A less experienced
    engineer might assume that a modern continuous batching server (like vLLM or TGI) can handle both
    workloads by itself. This fails to account for 'Head-of-Line Blocking', where a single large, long-running
    batch job (Standard Tier) can occupy a GPU for seconds, causing all subsequent interactive requests
    (Premium Tier) to miss their strict latency deadlines.
  napkin_math: Justification for partitioning is critical. A unified queue is quantitatively non-viable.
