title: DP Synthetic Data Generation
scenario: Your healthcare company wants to share a medical imaging dataset with external researchers without
  exposing patient data. You propose training a DP generative model (diffusion model with DP-SGD) to create
  synthetic X-rays. The original dataset has 100K images. What epsilon provides useful synthetic data,
  and how do you validate that the synthetic images are both private and medically useful?
question: "What epsilon provides useful synthetic data, and how do you validate that the synthetic images are both private and medically useful?"
details:
  realistic_solution: 'Practical approach: (1) Pre-train the diffusion model on public chest X-ray datasets
    (CheXpert, MIMIC-CXR — already de-identified and publicly available). This learns general X-ray structure
    without privacy cost. (2) Fine-tune with DP-SGD (ε=8-10) on the private dataset for domain-specific
    features. Pre-training reduces the DP fine-tuning to ~10% of total training, dramatically reducing
    privacy cost. (3) Validation protocol: utility — train a downstream classifier on synthetic data,
    compare performance to classifier trained on real data (target: within 5% accuracy). Privacy — run
    membership inference attacks against the generator; pass if MIA accuracy < 55%. Also verify no training
    images are reproduced verbatim (nearest-neighbor check in embedding space). (4) Post-processing: DP
    guarantees compose with post-processing for free. Any filtering, augmentation, or curation of synthetic
    data doesn''t increase privacy loss.'
  common_mistake: Training the diffusion model with ε=1 and expecting high-quality images. DP-SGD on diffusion
    models is extremely expensive — hundreds of denoising steps, each requiring per-sample gradients.
    At ε=1, the noise overwhelms the learning signal and the synthetic images are blurry, anatomically
    incorrect, or mode-collapsed.
  napkin_math: 'Full DP-SGD training (ε=10): 100K images, 100 epochs, batch 64 = 156K steps. Per-step
    cost with per-sample gradients: 8× standard. Total: 156K × 8 = 1.25M equivalent steps × 2s/step on
    H100 = 694 hours = $2,430 on H100. Pre-train + DP fine-tune: 50K public pre-train steps (standard)
    + 15K DP steps = 50K × 2s + 15K × 16s = 100K + 240K seconds = 94 hours = $329. Savings: 86%. Quality
    at ε=10 with pre-training: FID 25-40 (vs non-DP FID 15-20). Utility gap: ~3-5% accuracy drop on downstream
    tasks.'
