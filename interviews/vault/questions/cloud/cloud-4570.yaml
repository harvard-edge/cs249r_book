title: MI300X Throughput Stalls and Checkpoint I/O
scenario: A cluster of 64 MI300X nodes (8 GPUs each) is training an LLM. Training
  throughput stalls to 0 for 10 seconds every 5 minutes.
question: Evaluate whether this periodic stall is caused by the global data shuffling
  pipeline or an implicit checkpointing configuration.
details:
  realistic_solution: A 10-second total global stall exactly every 5 minutes points
    to blocking I/O operations, such as periodic snapshotting to slow persistent storage.
    Data shuffling bottlenecks manifest as sustained lower throughput or micro-stalls,
    not perfect 0-throughput cliffs at regular intervals.
  common_mistake: Diagnosing a perfect interval-based hardware pause as a dynamic
    networking or data ingestion issue.
  napkin_math: 300s interval * 0% utilization = checkpoint stall
