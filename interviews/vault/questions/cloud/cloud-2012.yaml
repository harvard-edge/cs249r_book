title: Evaluating Payload-to-Tensor Transformation Architectures
scenario: Your team is deploying a vision model on NVIDIA A100 GPUs via Triton Inference Server. The TensorRT
  engine requires an NCHW memory layout in FP16. Currently, clients send base64-encoded JPEGs via REST.
  The server's CPU decodes the JPEG (yielding an NHWC array), transposes the layout to NCHW, casts the
  payload to FP16, and copies it to the GPU. At 500 QPS, the CPU is at 100% utilization, GPU utilization
  is bottlenecked at 30%, and p99 latency exceeds 250ms. Evaluate the architectural trade-offs between
  requiring clients to send pre-formatted, uncompressed FP16 NCHW binary tensors over gRPC versus moving
  the decoding and NHWC-to-NCHW format transformation directly onto the GPU using NVIDIA DALI.
details:
  realistic_solution: Maintain small network payloads by accepting compressed JPEGs over gRPC to minimize
    transmission latency, and offload the JPEG decoding, NHWC-to-NCHW memory layout transformation, and
    FP16 casting to the GPU using a Triton DALI backend ensemble.
  common_mistake: Recommending that clients send uncompressed NCHW tensors to bypass server-side processing
    entirely, failing to evaluate the massive network bandwidth explosion and the resulting client-side
    transmission latency penalty.
  napkin_math: A typical 224x224 RGB JPEG is ~20KB. An uncompressed FP16 tensor (224 x 224 x 3 channels
    x 2 bytes) is ~301KB. Requiring pre-formatted NCHW tensors increases payload size by 15x. At 500 QPS,
    inbound bandwidth jumps from 10 MB/s to ~150 MB/s per server. Over a public internet connection, the
    TCP transmission time for 301KB will severely degrade end-to-end latency, making the GPU-accelerated
    format transformation mathematically superior.
