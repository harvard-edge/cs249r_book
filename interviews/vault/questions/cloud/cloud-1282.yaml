title: Calculating GPU Feeding Tax for Distributed Vision Training
scenario: You are training a vision model on a single node with 8x A100 GPUs. Profiling shows each GPU
  can process 1,000 images per second during the forward/backward pass. The average size of a preprocessed
  training image is 150 KB. The dataset is hosted on a Network Attached Storage (NAS) system with a maximum
  effective read bandwidth of 800 MB/s to your compute node. Calculate the 'Feeding Tax'—the percentage
  of time the GPUs are sitting idle waiting for I/O.
details:
  realistic_solution: 'First, calculate the aggregate data demand of the compute cluster: 8 GPUs * 1,000
    images/sec * 150 KB = 1.2 GB/s required. Since the NAS only provides an effective 800 MB/s, the system
    is strictly I/O bound. The GPU utilization is the ratio of supply to demand (800 / 1200 = 66.7%).
    The feeding tax is the remaining idle time, which is 33.3%.'
  common_mistake: Candidates often assume the GPUs will run at 100% utilization or calculate the maximum
    theoretical bandwidth of a network link rather than comparing effective I/O supply against aggregate
    compute demand.
  napkin_math: 'Demand = 8 GPUs * 1000 img/s * 150 KB/img = 1,200,000 KB/s = 1.2 GB/s.

    Supply = 800 MB/s.

    Utilization = Supply / Demand = 0.8 / 1.2 = 66.7%.

    Feeding Tax = 100% - 66.7% = 33.3%.'
