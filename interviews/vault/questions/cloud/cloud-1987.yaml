title: Synchronous Checkpoint Overhead Calculation
scenario: You are training a 300B parameter language model using mixed-precision Adam. The cluster uses synchronous checkpointing, pausing all workers to write to a parallel file system with an effective aggregate write bandwidth of 600 GB/s. You trigger a checkpoint every 20 minutes of active compute time.
question: How long does each checkpoint pause training for a 300B mixed-precision Adam state, and what percentage overhead does a 20-minute cadence add?
details:
  realistic_solution: Determine the full state size per parameter (14 bytes), calculate the total checkpoint footprint, divide by the storage bandwidth to find the pause duration, and calculate overhead as pause time over total cycle time.
  common_mistake: |
    **The Pitfall:** Calculating the checkpoint size based solely on the FP16 model weights.
    **The Rationale:** Engineers frequently omit the FP32 master weights and FP32 Adam moments from the state calculation.
    **The Consequence:** Drastically underestimating the pause time and operational overhead, leading to poor cluster efficiency.
  napkin_math: |
    1. **Calculate State per Parameter:** 2B (FP16 weights) + 4B (FP32 master weights) + 8B (FP32 Adam moments) = 14 Bytes.
    2. **Calculate Total State Size:** 300,000,000,000 × 14 = 4.2 TB (4200 GB).
    3. **Calculate Pause Duration:** 4200 GB / 600 GB/s = 7 seconds.
    4. **Calculate Overhead:** Total cycle time: 1200s (compute) + 7s (pause) = 1207 seconds. Overhead: 7 / 1207 ≈ 0.58%.
    **Final Result: The checkpoint pause is 7 seconds, adding ~0.58% overhead to the training cycle.**
