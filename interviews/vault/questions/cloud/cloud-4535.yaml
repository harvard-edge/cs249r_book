title: Activation-Aware A100 Quantization
scenario: An enterprise uses A100 80GB SXM GPUs to serve Llama-3 8B with a strict
  P99 100 ms tokens-to-first-token SLA. Profiling shows 0.5% of activations exceed
  6 sigma of the layer's distribution (extreme outliers concentrated in attention
  output and MLP-down projections). They want to double throughput by 8-bit quantization
  without breaching the P99 SLA.
question: Apply an activation-aware quantization method to compress the model without
  devastating accuracy due to extreme outliers.
details:
  realistic_solution: Apply methods like SmoothQuant or AWQ to migrate the quantization
    difficulty from the activations (which contain massive outliers) to the weights.
    By mathematically scaling up weights where activation outliers occur, the model
    can safely be converted to W8A8 or W8A16, fitting twice as many requests in VRAM.
  common_mistake: Applying naive min-max weight quantization without addressing activation
    outliers, which destroys the LLM's perplexity.
  napkin_math: 8B parameters * 1 byte = 8 GB footprint per replica.
