title: MI300X Unified Memory Architecture and Its Thermal Implications
scenario: The MI300X uses a unified memory architecture where CPU and GPU share the same 192GB HBM3 pool across 8 compute dies on a single package. During a production incident, a model serving process on MI300X unexpectedly causes memory bandwidth saturation at 5.1 TB/s—despite the workload previously running at 3.8 TB/s on H100. The system power jumps from 680W to 740W.
question: "Why did the MI300X serving process jump to 5.1 TB/s bandwidth and 740W, what are the thermal consequences, and what workload change caused it?"
details:
  realistic_solution: 'Power delta: 740W - 680W = 60W additional. Actual delta is 60W, suggesting HBM power model is ~0.6× of theoretical (other power domains decrease as compute is stalled waiting for memory). Workload change: likely a sequence length increase (e.g., from 2K to 16K context) triggering much larger KV cache reads per token.'
  common_mistake: |
    **The Pitfall:** Assuming HBM bandwidth is 'free' in terms of power.
    **The Rationale:** Engineers focus on compute TFLOPS as the primary power draw and ignore that pushing 5+ TB/s across a package requires immense energy.
    **The Consequence:** Near-peak memory bandwidth dramatically increases thermal load, which can throttle compute and cause unpredictable latency spikes.
  napkin_math: |
    1. HBM3 bandwidth: 5.3 TB/s max. At 5.1 TB/s: 96% utilization.
    2. Power: 5.1e12 bytes/s × 8 bits/byte × 10e-12 J/bit = 408W.
    3. At 3.8 TB/s: 3.8e12 × 8 × 10e-12 = 304W. Delta = 104W HBM alone (actual system delta: 60W, meaning compute stalled and drew less).
    4. KV cache at 2K context: KV per layer = 2,048 tokens × 2 (K+V) × 128 heads × 128 head_dim × 2 bytes = 134 MB/layer. 80 layers = 10.7 GB/step.
    5. At 20 steps/s = 214 GB/s. At 16K context: 8× = 1.7 TB/s KV alone.
    6. **Adding this 1.7 TB/s to base weight reads pushes total bandwidth to 5.1 TB/s.**
