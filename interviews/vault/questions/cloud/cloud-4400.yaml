title: MI300X Unified Memory Architecture and Its Thermal Implications
scenario: The MI300X uses a unified memory architecture where CPU and GPU share the
  same 192GB HBM3 pool across 8 compute dies on a single package. During a production
  incident, a model serving process on MI300X unexpectedly causes memory bandwidth
  saturation at 5.1 TB/s—despite the workload previously running at 3.8 TB/s on H100.
  The system power jumps from 680W to 740W. Trace the power path from workload to
  HBM3 memory bandwidth consumption, explain the thermal consequences of near-peak
  bandwidth operation, and identify what changed in the workload to trigger this.
question: Why did the MI300X serving process jump to 5.1 TB/s bandwidth and 740W,
  what are the thermal consequences, and what workload change caused it?
details:
  realistic_solution: 'Power delta: 740W - 680W = 60W additional. HBM3 power model:
    5.1 TB/s × 8 b/byte × 10 pJ/bit = 5.1e12 × 8 × 10e-12 = 408W HBM at peak. At 3.8
    TB/s: 304W HBM. Delta = 104W—but actual delta is 60W, suggesting HBM power model
    is ~0.6× of theoretical (other power domains decrease as compute is stalled waiting
    for memory). Workload change: likely a sequence length increase (e.g., from 2K
    to 8K context) triggering much larger KV cache reads per token. At 8K context,
    KV cache per layer = 8,192 × 2 × 128 × 2 bytes = 4MB per layer, vs 512KB at 2K
    context. Full model KV cache: 80 layers × 4MB = 320MB per forward pass, vs 40MB—8×
    more HBM bandwidth per token.'
  common_mistake: 'Assuming HBM bandwidth is ''free'' in terms of power. HBM3 power
    consumption scales with bandwidth: ~8-12 pJ/bit at peak bandwidth. At 5.1 TB/s,
    HBM3 draws approximately 50-70W more than at 3.8 TB/s. Combined with die-to-die
    interconnect power across 8 compute chiplets, near-peak bandwidth significantly
    increases thermal load.'
  napkin_math: 'HBM3 bandwidth: 5.3 TB/s max. At 5.1 TB/s: 96% utilization. Power:
    5.1e12 bytes/s × 8 bits/byte × 10e-12 J/bit = 408W. At 3.8 TB/s: 304W. Delta:
    104W HBM alone. Actual system delta: 60W (other components reduced). KV cache
    bandwidth: 2K context → KV per layer = 2,048 tokens × 2 (K+V) × 128 heads × 128
    head_dim × 2 bytes = 134MB/layer read per decode step. 80 layers = 10.7GB/step
    → at 20 steps/s = 214 GB/s. 8K context: 8× = 1.7 TB/s KV alone. Added to weight
    reads ~2.8 TB/s total → pushes to 4.5+ TB/s. At prompt=8K: ~5.1 TB/s.'
