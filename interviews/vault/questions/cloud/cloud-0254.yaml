title: Calculating GEMM Kernel Intensity
scenario: Imagine a single GEMM (General Matrix-Matrix Multiplication) kernel is the core of your model's attention layer. This specific kernel performs 200 GFLOPs of computation. To do this, it needs to read two 500MB matrices from HBM and write a 500MB result matrix back to HBM.
question: What is the arithmetic intensity of this 200 GFLOP GEMM, and is it memory-bound on an H100?
details:
  realistic_solution: 'Arithmetic Intensity (AI) is the ratio of total floating-point operations to the total bytes moved to and from memory. The total data moved includes all reads and all writes required for the computation. In this case: Total bytes moved = 500 MB (read matrix A) + 500 MB (read matrix B) + 500 MB (write result C) = 1,500 MB = 1.5 GB. AI = 200 GFLOPs / 1.5 GB = 133.3 FLOPs/Byte. This value can then be compared against the GPU''s ridge point to determine if the kernel is compute-bound or memory-bound. On an H100 with a ridge point of ~295 FLOPs/Byte, this kernel at 133.3 FLOPs/Byte would be memory-bound.'
  common_mistake: |
    **The Pitfall:** Only counting the input data reads.
    **The Rationale:** Candidates often forget to include the output data (the 500MB write) in the total memory traffic, or they invert the ratio entirely (Bytes/FLOP).
    **The Consequence:** This undercounts the total bytes moved and falsely inflates the perceived arithmetic intensity, leading to incorrect bottleneck diagnosis.
  napkin_math: |
    1. **Calculate Total FLOPs:** 200 * 10^9 FLOPs.
    2. **Calculate Total Bytes Moved:** Reads (500 MB + 500 MB = 1,000 MB) + Writes (500 MB) = 1,500 MB = 1.5 * 10^9 Bytes.
    3. **Calculate Arithmetic Intensity:** AI = Total FLOPs / Total Bytes = 200 * 10^9 / 1.5 * 10^9 = **133.3 FLOPs/Byte**.
    4. **Interpret on H100:** Ridge point = 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte.
    **Result:** Since 133.3 < 295, this kernel is **memory-bound** on the H100.
  options:
  - 200 FLOPs/Byte
  - 0.0075 Bytes/FLOP
  - 133.3 FLOPs/Byte
  - 400 FLOPs/Byte
  correct_index: 2
