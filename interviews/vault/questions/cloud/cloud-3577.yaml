title: Optimizing DP-SGD on NVIDIA H100 for Federated Learning
scenario: Your team is deploying a federated learning system for sensitive medical
  data. The model training will leverage NVIDIA H100 GPUs, each with 80 GB HBM3 memory,
  989 TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth. You've chosen
  DP-SGD to ensure patient privacy. The regulatory requirement is an overall privacy
  budget (epsilon) of 8.0 for the entire training process. Design the DP mechanism,
  considering how to calibrate noise for each epoch while maintaining utility, given
  the high-performance hardware. Explain the trade-offs involved and how you'd size
  the noise parameters effectively across multiple H100s.
question: How would you design and calibrate DP-SGD across H100s to meet epsilon=8.0
  while preserving model utility and throughput?
details:
  realistic_solution: Implement a privacy accountant (e.g., moments accountant) to
    track the cumulative epsilon budget across epochs. For noise calibration, determine
    the L2-norm clipping threshold for gradients and then calculate the necessary
    Gaussian noise scale per epoch using the composition theorem (e.g., advanced composition
    or Rényi differential privacy) to stay within the total epsilon of 8.0. Leverage
    the H100's performance to handle the overhead of gradient clipping and noise addition
    efficiently, potentially increasing batch sizes or reducing communication frequency.
    Monitor the privacy-utility tradeoff dynamically and adjust noise or training
    parameters accordingly. Distribute the noise budget optimally if using multiple
    H100s, considering how privacy is aggregated across devices.
  common_mistake: Neglecting the cumulative nature of epsilon across epochs, leading
    to an overly loose privacy budget by applying a fixed per-step epsilon without
    accounting for composition. Another common mistake is applying uniform noise globally
    without calibrating it based on the sensitivity of individual gradients or the
    desired privacy-utility tradeoff, potentially hurting model accuracy more than
    necessary.
  napkin_math: Given a target epsilon_total, calculate the per-step epsilon (epsilon_s)
    for T total steps. For Gaussian noise, the noise scale 'sigma' is often related
    to 'sensitivity' and 'epsilon_s'. If the L2-norm sensitivity of gradients is 'L'
    (e.g., L=1.0 after clipping) and we aim for a per-step epsilon_s using approximate
    DP, we might have sigma ~ L * sqrt(T log(1/delta)) / epsilon_total. For an epsilon_total
    of 8.0 and a delta of 1e-5 over, say, 1000 epochs, how would you estimate a starting
    sigma, considering the batch size and the H100's processing capability?
