title: KV-Cache Memory vs Compute Roofline During Decode
scenario: For Llama 3 8B serving on a single H100, compute the arithmetic intensity
  of the attention operation during decode at sequence position 2048. Is the attention
  computation compute-bound or memory-bound? Compare to the H100's ridge point.
question: How much KV-cache data must be streamed per layer for one Llama 3 8B decode
  token at sequence position 2048?
details:
  realistic_solution: 'KV streaming load per decode step: seq_len × 2(K+V) × num_kv_heads
    × head_dim × bytes = 2048 × 2 × 8 × 128 × 2B = 8.39 MB per layer load (not 4.19
    MB which omits the factor of 2 for K+V).'
  common_mistake: Computing arithmetic intensity using total model FLOPs. The attention-specific
    computation has very different arithmetic intensity than the FFN layers — attention
    during decode is almost always memory-bound due to loading the entire KV-cache
    for a single query.
  napkin_math: 'KV cache load for 2048 context prefill: seq × num_layers × 2(K+V)
    × num_kv_heads × head_dim × bytes. For 8 KV heads (GQA), 8 layers, head_dim=128,
    BF16: 2048 × 2(K+V) × 8 KV heads × 128 dim × 8 layers × 2B = 2048 × 2 × 8 × 128
    × 8 × 2 = 8,388,608 bytes = 8.0MB per token × 2 = wait: 2048 tokens × (2 × 8 ×
    128 × 8 × 2B per token) = 2048 × 32,768 / 1024... Let me recalculate cleanly:
    per-token KV = 2 × 8 layers × 8 KV heads × 128 × 2B = 32,768B. Total for 2048
    tokens = 2048 × 32,768 / ... no: total KV = 2048 × 2 × 8 × 8 × 128 × 2 = 2048
    × 32,768 = 67,108,864 bytes = 64MB? Gemini says 8.39MB. Re-reading: ''KV load:
    2048×2(K+V)×8 KV heads×128×2B'' = 2048 × 2 × 8 × 128 × 2 = 8,388,608 = 8.39 MB
    (using 1 layer only for streaming load per step, not all layers at once).'
