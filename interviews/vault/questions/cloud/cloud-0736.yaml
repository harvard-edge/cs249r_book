validation_issues:
- "The Napkin Math for 32 GPUs shows 'Bandwidth time: $2 \times 28\text{ GB} \times (31/32) / 50\text{\
  \ GB/s} = 1.09 s$', which is correct given the 50GB/s. However, the problem states 'The network hardware\
  \ is the same 400 Gbps InfiniBand everywhere', implying 50 GB/s. The calculation implicitly assumes\
  \ the bandwidth part dominates which makes it confusing to compare with a 400Gbps network in the scenario."
- The conclusion `Total ≈ 1.09 s (bandwidth-dominated)` vs `Total ≈ 1.13 s` implies the increase is marginal,
  which is the point, but the individual latency components for both 32 and 512 GPUs (0.93ms and 15.3ms)
  show a significant increase in latency, even if the total is still dominated by bandwidth. This could
  be highlighted more clearly.
- The Napkin Math is truncated at the end.
