title: The Basic Inference Memory Footprint
scenario: You're scoping the GPU requirements for a new RAG-based chatbot service. The core of the service uses a 7-billion parameter Llama model for generation.
question: Before even considering the KV cache or the retrieval index, what is the minimum memory required just to load the model's weights for inference using FP16 precision?
details:
  realistic_solution: "The correct answer is approximately 14 GB. A 7-billion parameter model has 7e9 parameters. In FP16 (half-precision floating point), each parameter requires 2 bytes of storage. Therefore, the total memory for the weights is 7 billion × 2 bytes, which is 14 billion bytes or 14 GB."
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for *training* with those for *inference*, or assuming INT8 quantization by default.
    **The Rationale:** Training requires memory for optimizer states and gradients (often 16 bytes+ per param), leading candidates to vastly overestimate simple inference footprints.
    **The Consequence:** Drastically over-provisioning GPU capacity for simple inference workloads.
  napkin_math: |
    *   **Parameters:** 7 Billion parameters.
    *   **Precision:** FP16 requires 2 bytes per parameter.
    *   **Total Memory:** 7 Billion × 2 bytes = **14 GB**.
  options:
  - ~7 GB
  - ~112 GB
  - ~14 GB
  - ~2 GB
  correct_index: 2
