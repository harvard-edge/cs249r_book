title: Diagnosing Poison Pill Bottlenecks in Streaming Inference
scenario: A real-time fraud detection pipeline processes 100,000 transactions/second using Kafka and a
  PyTorch inference service spanning 10 A100 GPUs. During a peak event, an upstream client update causes
  0.5% of payloads to arrive with a missing 'device_fingerprint' field. The inference service throws schema
  validation errors on these batches and triggers infinite retries. Within minutes, the Kafka consumer
  lag spikes to 5 million messages, and processing latency for valid transactions degrades from 150ms
  to over 5 seconds. How do you root-cause this blockage and re-architect the pipeline to restore throughput
  without losing the corrupted, yet highly sensitive, transaction records?
details:
  realistic_solution: Implement a Dead Letter Queue (DLQ) with a finite retry policy (e.g., 2 retries).
    Payloads that fail strict schema validation are immediately shunted to the DLQ (a separate Kafka topic
    or S3 bucket) for asynchronous debugging, unblocking the main inference pipeline.
  common_mistake: Scaling up GPU nodes to burn through the consumer lag, or configuring the consumer to
    silently drop malformed messages, which violates strict financial auditing requirements.
  napkin_math: 100,000 msg/sec * 0.005 (0.5%) = 500 poison msgs/sec. If a batch containing a poison pill
    retries infinitely, throughput drops to 0. Shunting 500 msgs/sec to a DLQ clears the head-of-line
    blocking, allowing the 99,500 valid msgs/sec to process at the baseline 150ms latency.
