title: Diagnosing Poison Pill Bottlenecks in Streaming Inference
scenario: A real-time fraud detection pipeline processes 100,000 transactions/second using Kafka and a PyTorch inference service spanning 10 A100 GPUs. During a peak event, an upstream client update causes 0.5% of payloads to arrive with a missing 'device_fingerprint' field, causing validation errors and infinite retries.
question: How do you root-cause this blockage and re-architect the pipeline to restore throughput without losing the corrupted transaction records?
details:
  realistic_solution: Implement a Dead Letter Queue (DLQ) with a finite retry policy (e.g., 2 retries). Payloads that fail strict schema validation are immediately shunted to the DLQ (a separate Kafka topic or S3 bucket) for asynchronous debugging, unblocking the main inference pipeline.
  common_mistake: |
    **The Pitfall:** Scaling up GPU nodes to burn through the consumer lag, or configuring the consumer to silently drop malformed messages.
    **The Rationale:** Scaling does not solve infinite retries, and dropping messages violates strict financial auditing requirements.
    **The Consequence:** The system remains deadlocked, or critical data is lost, leading to compliance failures.
  napkin_math: |
    - **Poison Message Rate:** 100,000 msg/sec * 0.005 = 500 poison msgs/sec.
    - **Throughput Drop:** Infinite retries drop throughput to 0.
    - **Final Result:** **Shunting 500 msgs/sec to a DLQ clears the head-of-line blocking, allowing the 99,500 valid msgs/sec to process.**
