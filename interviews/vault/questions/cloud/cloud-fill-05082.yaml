title: Disaggregated Serving with Chunked Prefill on A100 80GB
scenario: A LLM serving system on A100 80GB alternates between large prefill requests (2048 tokens, ~400ms)
  and decode requests (single tokens, ~10ms each). Full prefill preempts all decode requests, causing
  P99 decode latency spikes to 2 seconds. Implement chunked prefill to bound decode interference.
details:
  realistic_solution: 'Problem: 400ms prefill preempts 40 decode steps at 10ms each → P99 decode spikes.
    Chunked prefill: split 2048 tokens into C chunks, interleave one chunk with each decode step. Chunk
    size selection: minimum chunk for A100 efficiency ≈ 128 tokens (below this, tensor core utilization
    drops). With 128-token chunks: 2048/128 = 16 chunks, each taking ~25ms (attention is O(n×chunk_size)),
    interleaved with 16 decode steps at 10ms each. Total time: 16×(25+10) = 560ms vs original 400ms+10ms×old_decode.
    Decode P99: max wait = 25ms (one chunk) vs 400ms. TTFT increases (2048 tokens now take 560ms vs 400ms),
    but P99 decode latency drops 16× from 400ms to 25ms. Trade-off: TTFT +40%, decode interference -94%.'
  common_mistake: Chunking prefill into equal-size chunks without considering that very small chunks (<
    64 tokens) have high per-chunk overhead from kernel launches and scheduling, reducing effective prefill
    throughput.
  napkin_math: 'Prefill 2048: 400ms. Chunked (128 token chunks): 16 chunks × 25ms each = 400ms total,
    but interleaved with decode. Decode max wait per token: 25ms (1 chunk). Original decode P99: 400ms
    (blocked by full prefill). After: 25ms decode P99. TTFT: 400ms → 560ms (16 interleaved decode steps
    at 10ms). Trade-off justified for decode-heavy workloads.'
