title: Driver Version Compatibility Hell in Multi-GPU Cloud Deployments
scenario: Your containerized inference service works on local dev (CUDA 12.1, driver 535) but crashes
  on production cloud VMs with 'CUDA driver version is insufficient for CUDA runtime version'. The cloud
  VMs have driver 525 (CUDA 12.0 compatible). Diagnose and fix.
question: "Why does the container crash with driver 525 and CUDA runtime 12.1, and how should you fix it?"
details:
  realistic_solution: 'The CUDA runtime 12.1 in your container requires driver >= 530. The cloud VM has
    driver 525 (max runtime 12.0). Three fixes: (1) Pin your container to CUDA runtime 12.0 (match the
    lowest production driver). (2) Request cloud provider to update to driver 535+. (3) Use NVIDIA''s
    CUDA compat library (libcuda_compat.so), available since CUDA 11.7, which allows a newer CUDA runtime
    to work with an older driver on select GPU architectures. Best practice: lock the CUDA runtime version
    in your Dockerfile and document the minimum driver requirement.'
  common_mistake: Assuming any CUDA 12.x driver supports any CUDA 12.x runtime. CUDA's forward compatibility
    (newer driver runs older runtime) works, but backward compatibility (older driver with newer runtime)
    does not.
  napkin_math: 'CUDA version matrix: driver 525 -> runtime <= 12.0. Driver 530 -> runtime <= 12.1. Driver
    535 -> runtime <= 12.2. A 10-version driver gap (525 vs 535) seems small but spans two CUDA minor
    versions. Pin-and-document policy prevents this class of bug entirely.'
