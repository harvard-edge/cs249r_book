title: Explaining Compound AI Pipeline Behavior to Non-Technical Stakeholders
scenario: Your cluster runs a 5-stage compound AI pipeline: query rewrite -> embedding -> FAISS retrieval -> reranker -> LLM generation. A product manager asks why the system sometimes gives wrong answers even though each individual stage looks fine in isolation. The reranker scores show high-confidence results and the LLM produces fluent text, but factual errors slip through.
question: "Why can the 5-stage agentic RAG pipeline give factual errors even when each stage’s metrics look healthy in isolation?"
details:
  realistic_solution: 'Use a concrete analogy: each stage has an accuracy rate. If retrieval recall is 85% (misses 15% of relevant docs), reranker precision is 90%, and LLM grounding is 95%, the end-to-end accuracy is 0.85*0.90*0.95 = 72.7%. Even with each stage appearing healthy, the system fails on nearly 1 in 4 queries. The fix requires either improving the weakest stage (retrieval at 85%) or adding a verification stage.'
  common_mistake: |
    **The Pitfall:** Explaining each stage's metrics independently without showing how errors compose.
    **The Rationale:** Stakeholders conclude "everything is green so the system should work," missing the multiplicative error compounding phenomenon in multi-stage systems.
    **The Consequence:** Misaligned expectations and inability to secure resources to fix the weakest link in the pipeline.
  napkin_math: |
    - **Stage accuracies:** Retrieval = 0.85, Reranker = 0.90, LLM Grounding = 0.95.
    - **Compound Accuracy:** $0.85 \times 0.90 \times 0.95 = 0.727$ (72.7%).
    - **To reach 90% system accuracy:** Requires a geometric mean per stage of $0.9^{(1/3)} = 0.965$.
    - **Result:** **All stages must perform at >96.5% to achieve a 90% reliable end-to-end system.**
