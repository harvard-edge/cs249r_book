title: The Carbon-Aware Scheduler
scenario: 'Your company pledges net-zero AI training by 2027. You operate GPU clusters in three regions:
  Virginia (avg 380 gCO₂/kWh, coal-heavy grid), Oregon (avg 80 gCO₂/kWh, hydro-heavy), and Iceland (avg
  28 gCO₂/kWh, geothermal). A 70B model training run requires 1,000 A100-hours regardless of location.
  Your CFO says ''just buy carbon offsets — it''s cheaper than moving workloads.'' Design a carbon-aware
  training scheduler and prove the CFO wrong (or right) with numbers.'
question: "How would you design a carbon-aware scheduler for the 70B run, and do the numbers prove carbon offsets are cheaper than moving workloads?"
details:
  realistic_solution: 'A carbon-aware scheduler must optimize across three dimensions: (1) **spatial shifting**
    — route jobs to the lowest-carbon region with available capacity, (2) **temporal shifting** — delay
    non-urgent jobs to times when the grid is cleanest (midday solar peaks, windy nights), (3) **workload
    shaping** — run compute-intensive phases (forward/backward pass) during clean periods and I/O-intensive
    phases (checkpointing, data loading) during dirty periods. The scheduler ingests real-time grid carbon
    intensity from APIs (WattTime, ElectricityMaps), maintains a job priority queue, and makes placement
    decisions every 15 minutes. For the 70B training run: use Oregon as primary (80 gCO₂/kWh), with temporal
    shifting to avoid the 6-9 PM peak (when gas peakers fire up, pushing intensity to 200 gCO₂/kWh). Cross-region
    data transfer for training is expensive (100TB dataset over 10 Gbps = 22 hours), so the scheduler
    must factor in the carbon cost of data movement.'
  common_mistake: '"Run everything in Iceland — lowest carbon." This ignores that carbon intensity varies
    by time of day (solar/wind availability), that data gravity makes cross-region training expensive,
    and that Iceland has limited GPU capacity.'
  napkin_math: '1,000 A100-hours × 400W (A100 SXM4 TDP) = 400 kWh. Virginia: 400 × 380 = 152 kgCO₂. Oregon:
    400 × 80 = 32 kgCO₂. Iceland: 400 × 28 = 11.2 kgCO₂. Carbon offset cost: $50-100/tonne → Virginia
    offset = 0.152t × $75 = $11. Oregon compute premium over Virginia: ~$0.30/GPU-hr × 1,000 = $300. Iceland
    premium: ~$0.80/GPU-hr × 1,000 = $800. The CFO is right that offsets ($11) are cheaper than relocation
    ($300-800) — *if you trust offsets*. But regulatory trend (EU CSRD, SEC climate rules) is toward Scope
    2 *market-based* accounting where offsets don''t count. Under those rules, Virginia training is a
    152 kgCO₂ liability regardless of offsets. Temporal shifting in Oregon (avoiding peak hours) reduces
    effective intensity from 80 to ~50 gCO₂/kWh at zero additional cost — 400 × 50 = 20 kgCO₂, a 37% reduction
    for free.'
