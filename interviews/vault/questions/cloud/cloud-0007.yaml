title: 'The Network Tax: NVLink vs. InfiniBand'
scenario: You are optimizing a large-scale LLM training job. To make informed decisions about your communication strategy, you need to know your hardware's limits.
question: "Roughly how much slower is a cross-rack data transfer using InfiniBand NDR compared to a GPU-to-GPU transfer within the same server using NVLink 4.0?"
details:
  realistic_solution: |
    A cross-rack InfiniBand NDR transfer is approximately 10 times slower than an intra-server NVLink 4.0 transfer. NVLink latency is ~500 ns, while crossing racks over InfiniBand takes ~5,000 ns (5 μs). This 'network tax' is a fundamental constraint in distributed systems design and dictates choices like communication-avoiding algorithms and network topology-aware scheduling.
  common_mistake: |
    **The Pitfall:** Underestimating the significant latency penalty of leaving the server chassis.
    **The Rationale:** Engineers often conflate all "fast networks" as roughly equivalent, assuming a minor difference like 2x.
    **The Consequence:** Poorly designed distributed systems that fail to utilize communication-avoiding algorithms across racks.
  napkin_math: |
    - **NVLink Latency:** ~500 ns.
    - **InfiniBand Latency:** ~5,000 ns (5 μs).
    - **Result:** InfiniBand is roughly **10x slower**.
    - **Analogy:** If 1ns = 1 second, NVLink is 8 minutes, InfiniBand is 1.4 hours.
  options:
  - They are roughly the same latency (~1x)
  - About 2x slower
  - About 10x slower
  - About 100x slower
  correct_index: 2
