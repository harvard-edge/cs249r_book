title: 'TPU v5e Training Inefficiency: Diagnosing Data Curation Issues'
scenario: 'Your team is leveraging a Google TPU v5e (equipped with 16 GB HBM, 197 TFLOPS BF16, and 1.6
  TB/s HBM bandwidth) to train a cutting-edge generative AI model. Despite the immense processing power
  and high-speed memory, you''ve observed persistent issues: the model''s convergence is significantly
  slower than expected, training loss exhibits unusual oscillations, and downstream evaluation metrics
  show unexpected drops on certain data subsets. The training data was collected and labeled using a novel,
  semi-automated active learning pipeline, integrating both programmatic labeling and human annotation.
  Initial investigations confirm the TPU is fully utilized with healthy HBM bandwidth, ruling out infrastructure
  bottlenecks. The symptoms strongly suggest a problem within the dataset itself or the curation process.
  How would you diagnose the root cause(s) of these symptoms, specifically focusing on potential failures
  in data selection, annotation workflows, inter-annotator agreement, or dataset bias, given the context
  of a high-throughput TPU environment?'
details:
  realistic_solution: 'A realistic solution involves a multi-pronged diagnostic approach:

    1.  **Data Drifting/Skew Detection:** Implement monitoring for feature distributions and label distributions
    over time and across different data sources. Perform statistical tests (e.g., KS-test, Wasserstein
    distance) on training vs. validation data.

    2.  **Error Analysis & Active Learning Audit:** Systematically sample and manually review examples
    where the model performs poorly (high loss, incorrect predictions). Trace these back to the active
    learning suggestions. Evaluate the inter-annotator agreement (e.g., using Kappa scores) specifically
    for these hard-to-classify samples and ensure annotation guidelines are clear and consistently applied.

    3.  **Bias Detection & Mitigation:** Use fairness metrics and subgroup analysis to check model performance
    across different demographic, geographic, or other relevant slices of data. Investigate if the active
    learning strategy inadvertently amplifies underrepresented biases by focusing on ''uncertain'' regions
    that might be sparsely populated.

    4.  **Data Quality Scorecard:** Develop a continuous data quality scorecard that includes metrics
    like label consistency, annotation speed vs. quality tradeoffs, and feature completeness. Use this
    to pinpoint stages in the data curation workflow that introduce errors.

    5.  **Small-Scale Controlled Experiments:** Conduct targeted experiments using a pristine, smaller
    dataset on the TPU v5e to establish a performance baseline, then gradually introduce subsets of the
    problematic data to isolate the issue.'
  common_mistake: A common mistake is to solely focus on model architecture and training hyperparameters,
    overlooking systematic issues in the data pipeline or dataset quality. Specifically, over-reliance
    on the 'efficiency' of active learning without robust, continuous validation of annotation quality
    and inter-annotator agreement can introduce and amplify biases or errors that powerful accelerators
    like the TPU v5e will quickly expose as inconsistent learning signals, rather than masking them.
  napkin_math: Given the Google TPU v5e's 197 TFLOPS BF16 peak performance, if 15% of your input data
    samples are effectively 'noise' due to poor labeling or bias, calculate the effective TFLOPS being
    wasted due to processing these low-quality samples. If your model processes 10,000 samples per second
    on this TPU, how many 'wasted' samples are being processed per minute, and what is the computational
    cost (in BF16 operations) of these wasted samples assuming 500 BF16 operations per sample?
