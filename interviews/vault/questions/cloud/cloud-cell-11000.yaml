title: 'Dataset Curation: Why Data Quality Degrades Model Calibration on H100'
scenario: You are training a 70B LLM on an H100 cluster (80GB HBM3, 3.35 TB/s). After three epochs the
  model achieves high accuracy but poor calibration (ECE > 0.15). Your data pipeline ingests 10TB of web-scraped
  text with no deduplication. Explain why near-duplicate data causes calibration failure and what the
  data statistics reveal.
question: "Why can near-duplicate web-scraped text cause ECE > 0.15 in the 70B LLM, and what data statistics would reveal the problem?"
details:
  realistic_solution: Run MinHash deduplication at 5-gram shingles; measure token frequency distribution
    before/after. Near-duplicates inflate P(token|context) for repeated phrases, causing overconfident
    predictions.
  common_mistake: Assuming more data always improves calibration; ignoring that duplicates create implicit
    up-weighting of certain probability distributions.
  napkin_math: 10TB at avg 4 bytes/token = 2.5T tokens. If 20% duplicates exist (500B tokens), those phrases
    appear 2x more often, shifting log-prob by ln(2) ≈ 0.69 nats, directly inflating confidence on memorized
    sequences.
