title: Diagnosing TPR Disparities in Cloud Screening APIs
scenario: A cloud-hosted automated loan approval API running on a cluster of 8 AWS g4dn.2xlarge instances
  processes 100,000 applications daily. The model predicts 'creditworthy' (Y=1). Demographic Group A has
  a base creditworthy rate of 20%, while Group B has 10%. An audit reveals that the False Positive Rate
  (FPR) is perfectly balanced at 5% for both groups. However, qualified applicants in Group B have a True
  Positive Rate (TPR) of only 40%, compared to 80% for Group A. The system currently uses a single global
  decision threshold of 0.5. Diagnose why this failure occurs despite balanced FPRs, and determine the
  intervention required to achieve Equality of Opportunity.
details:
  realistic_solution: 'Diagnose that the model''s predicted probability distributions for actual positives
    differ by group due to variance in feature representation. The post-processing solution is to decouple
    decision thresholds: lower the threshold for Group B (e.g., from 0.5 to 0.35) until their TPR reaches
    80%, satisfying Equality of Opportunity, while accepting the mathematical trade-off of an increased
    FPR for Group B.'
  common_mistake: Candidates often confuse Equality of Opportunity with Demographic Parity or Equalized
    Odds. They incorrectly suggest equalizing the base prediction rates or attempting to force both TPR
    and FPR to match simultaneously without recognizing that differing base rates often make perfect Equalized
    Odds mathematically impossible.
  napkin_math: 'Assuming 80k Group A and 20k Group B applicants: Group A has 16k actual positives (TPR=80%
    -> 12,800 approved). Group B has 2k actual positives (TPR=40% -> 800 approved). To achieve Equality
    of Opportunity (TPR=80%), Group B''s threshold must be lowered to approve 1,600 of its actual positives
    (80% of 2k), regardless of how it affects their FPR.'
