title: Cloud Wafer Scale Engine L2 0
scenario: Cerebras claims their Wafer-Scale Engine eliminates the need for multi-GPU parallelism for large
  models. Explain how a wafer-scale chip differs from a traditional multi-GPU setup and what communication
  advantage it provides.
details:
  realistic_solution: 'A wafer-scale engine uses an entire silicon wafer (~46,000 mm²) as a single chip
    instead of dicing it into hundreds of small dies. This provides: (1) hundreds of thousands of cores
    on one die with on-chip interconnect at ~100 TB/s aggregate bandwidth, (2) elimination of PCIe/NVLink/network
    bottlenecks since all communication is on-die at silicon speeds, (3) massive on-chip SRAM (40 GB on
    CS-2) avoiding off-chip memory bandwidth limits. A traditional 8-GPU node has inter-GPU bandwidth
    of ~450 GB/s (NVLink) — the WSE''s on-chip fabric is 200x faster, making communication essentially
    free relative to compute.'
  common_mistake: Thinking wafer-scale is just 'a bigger GPU.' The fundamental difference is on-chip SRAM
    (no HBM bottleneck) and on-chip interconnect (no NVLink/PCIe bottleneck), changing which operations
    are feasible.
  napkin_math: 'WSE-2: 850,000 cores, 40 GB SRAM, 220 Pb/s on-chip BW ≈ 27.5 PB/s. 8×H100 NVLink: 450
    GB/s per GPU = 3.6 TB/s total. WSE advantage: ~7,600x more communication bandwidth. Latency: on-chip
    ~1 ns vs. NVLink ~1 μs = 1000x lower.'
