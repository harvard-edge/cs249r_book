title: The Missing Combiner in Distributed Aggregation
scenario: You are computing per-domain token counts across a 20 TB web corpus distributed over 500 nodes.
  Each node holds a 40 GB shard. The naive MapReduce approach emits (domain, 1) for every token and shuffles
  all pairs to reducers. The shuffle phase transfers 18 TB across the network and takes 3 hours. Your
  colleague points out that the final output — domain counts — is only 2 GB. Why is 18 TB moving across
  the network to produce a 2 GB result, and how do you fix it?
question: "Why is 18 TB moving across the network to produce a 2 GB result, and how do you fix it?"
details:
  realistic_solution: 'Add a combiner (local pre-aggregation) phase. Before shuffling, each of the 500
    nodes locally aggregates its (domain, 1) pairs into (domain, local_count). If the corpus has ~10M
    unique domains, each node emits at most 10M records instead of billions. The shuffle volume drops
    from 18 TB (billions of (domain, 1) pairs) to 500 nodes × 10M domains × 20 bytes = 100 GB — a 180×
    reduction. The mathematical requirement: the aggregation function must be associative and commutative
    (counts, sums, min, max). Non-decomposable aggregations (median, percentiles, count-distinct) cannot
    use simple combiners and require approximate algorithms (HyperLogLog for count-distinct, t-digest
    for percentiles).'
  common_mistake: '"The shuffle is necessary because we need all tokens for the same domain on the same
    reducer." This is true for non-associative operations, but counting is associative and commutative
    — it can be partially aggregated before the shuffle.'
  napkin_math: 'Without combiner: 20 TB corpus × ~0.9 overhead ratio = 18 TB shuffle. At 25 Gbps bisection
    bandwidth per node: 18 TB / (500 × 3.125 GB/s) ≈ 12 seconds — but the shuffle is not perfectly parallel
    due to hotspots, so 3 hours is realistic. With combiner: 500 nodes × 10M domains × 20 bytes/record
    = 100 GB shuffle. Same bandwidth: 100 GB / (500 × 3.125 GB/s) = 0.064 seconds. Even with overhead:
    ~1 minute total.'
  options:
  - Elastic training keeps all workers synchronized during node removal by redistributing the failed node's
    model shard in real-time; no checkpoint reload is needed because the model state is fully replicated
  - Elastic training requires homogeneous GPU types across all nodes; adding a node with different GPU
    specs crashes the training job because AllReduce requires identical tensor shapes
  - Elastic training scales the learning rate proportionally to the number of active workers at all times;
    losing a node automatically reduces the learning rate by 1/N to maintain convergence
  - 'Elastic training (e.g., TorchElastic, Elastic Horovod) automatically adjusts the number of workers
    when nodes join or leave the cluster. When a node fails: (1) surviving workers detect the failure
    via heartbeat timeout (~30s), (2) training rolls back to the latest checkpoint, (3) the job relaunches
    with N-1 workers and redistributes data shards. Global batch size changes unless compensated by adjusting
    per-worker batch size.'
