title: Evaluating Dynamic Ensembles for Fraud Detection
scenario: You are designing a fraud detection system with 3 specialized 13B parameter models, each requiring 26GB of memory in FP16. Your serving fleet uses A100 80GB GPUs. The baseline approach runs all 3 models in parallel on a single GPU for every request. The business requires <100ms P99 latency at 10,000 QPS.
question: Which serving architecture should you choose for the 3 specialized 13B fraud models to meet <100ms P99 at 10,000 QPS, and why?
details:
  realistic_solution: 'Implement a lightweight gating network (e.g., 100M parameters) to route each request to a single specialized model. Deploy each 13B model on dedicated A100s, freeing 54GB per GPU for KV cache, allowing for large batch sizes and high throughput.'
  common_mistake: |
    **The Pitfall:** Failing to calculate residual memory for the KV cache after loading model weights.
    **The Rationale:** Engineers assume that if weights fit into VRAM ($3 \times 26\text{GB} = 78\text{GB} < 80\text{GB}$), the deployment is viable.
    **The Consequence:** The remaining 2GB of VRAM critically starves the KV cache, limiting batch size to near-zero and making the 10,000 QPS target mathematically impossible without overprovisioning the fleet.
  napkin_math: |
    1. **Parallel ensemble memory:** 3 models $\times$ 26GB = 78GB of weights.
    2. On an 80GB GPU, this leaves only 2GB for the KV cache and batching.
    3. **Routed ensemble:** 1 model $\times$ 26GB = 26GB of weights per dedicated GPU.
    4. This leaves 54GB for the KV cache.
    5. $54\text{GB} / 2\text{GB} = 27\times$ increase in available memory.
    6. **This dramatically increases max batch size and throughput while reducing inference compute by 66%.**
