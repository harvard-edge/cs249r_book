title: Evaluating Dynamic Ensembles for Fraud Detection
scenario: You are designing the serving architecture for a fraud detection system that experiences severe
  distribution shifts during flash sales and bot attacks. You have trained 3 specialized 13B parameter
  models (Normal, Flash-Sale, Bot-Attack), each requiring 26GB of memory in FP16. Your serving fleet uses
  A100 80GB GPUs. The baseline approach runs all 3 models in parallel for every request and averages the
  outputs. The business requires a P99 latency of <100ms at 10,000 QPS. Evaluate the trade-offs between
  maintaining the parallel ensemble, implementing a lightweight gating network for dynamic routing, and
  a cascading ensemble, justifying the optimal architecture for throughput and latency.
details:
  realistic_solution: Implement a lightweight gating network (e.g., 100M parameters) to route each request
    to a single specialized model. Deploy each 13B model on dedicated A100s, freeing 54GB per GPU for
    KV cache, allowing for large batch sizes and high throughput.
  common_mistake: Failing to calculate that 3x26GB = 78GB of weights on an 80GB GPU leaves only 2GB for
    KV cache and activations, crippling the maximum batch size and making the 10,000 QPS target unreachable
    without massively overprovisioning the fleet.
  napkin_math: 'Parallel ensemble memory: 3 * 26GB = 78GB weights, leaving 2GB for batching. Routed ensemble:
    26GB weights per GPU, leaving 54GB for batching. 54GB / 2GB = 27x increase in available memory for
    KV cache/activations, dramatically increasing max batch size and throughput while reducing inference
    compute by 66%.'
