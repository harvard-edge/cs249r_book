title: Quantifying the CPU Generality Tax in Batch Inference
scenario: You are migrating a 10 PetaFLOP/s continuous batch embedding workload from a fleet of Intel
  Xeon 8380 CPUs (270W TDP, ~5.4 FP32 TFLOPs/s) to NVIDIA T4 accelerators (70W TDP, ~65 FP16 TFLOPs/s).
  CPUs dedicate significant die area and power to instruction decoding, branch prediction, and out-of-order
  execution—features unnecessary for uniform matrix multiplications. Assuming an electricity cost of $0.10/kWh
  and a datacenter PUE of 1.2, calculate the 'generality tax' in terms of energy per operation and estimate
  the annual power cost savings of moving to accelerators.
question: "What are the pJ/FLOP for the Xeon and T4, and what annual power cost savings come from moving the 10 PFLOP/s workload to T4s?"
details:
  realistic_solution: 'Calculate the energy efficiency: CPU is 50 pJ/FLOP (270W / 5.4 TFLOPs), while the
    T4 is ~1.1 pJ/FLOP (70W / 65 TFLOPs FP16). The CPU''s generality tax makes it ~45x less energy-efficient
    for dense ML compute. Migrating the 10 PFLOP/s workload from CPUs (500kW) to T4s (~10.8kW) saves ~489.2kW,
    yielding 5.14M kWh annually at 1.2 PUE — approximately $514,000 in electricity savings per year.'
  common_mistake: Focusing only on the hardware purchase cost or theoretical peak throughput without calculating
    the stark difference in energy-per-FLOP (pJ/FLOP) caused by the CPU generality tax, which dominates
    total cost of ownership for sustained dense compute workloads.
  napkin_math: 'CPU Efficiency: 270W / 5.4e12 = 50 pJ/FLOP.

    T4 Efficiency: 70W / 65e12 ≈ 1.1 pJ/FLOP.

    Workload: 10 PFLOP/s = 10,000 TFLOP/s.

    CPU Power: (10,000 / 5.4) nodes * 270W = 1851.85 nodes * 270W ≈ 500 kW.

    T4 Power: (10,000 / 65) nodes * 70W ≈ 10.8 kW.

    Annual Power Diff: (500 kW - 10.8 kW) * 8760 hours * 1.2 PUE ≈ 5.14M kWh.

    Annual Savings: 5.14M kWh * $0.10/kWh ≈ $514,000.'
