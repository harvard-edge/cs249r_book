title: Verifying LLM Output Watermarks via Z-Score
scenario: You are deploying a proprietary 13B LLM on cloud infrastructure and implementing a statistical output watermark to prevent unauthorized data distillation. You partition the model's vocabulary such that the "green list" fraction is γ = 0.5. To verify a suspected stolen block of generated text, you analyze a sequence of N = 400 tokens and count k = 260 green list tokens.
question: "What Z-score does 260 green tokens out of 400 produce with γ=0.5, and does it exceed the legal threshold of Z=4.0?"
details:
  realistic_solution: Model the unwatermarked text generation (the null hypothesis) as a binomial distribution. Calculate the expected mean (μ) and standard deviation (σ) for the sequence length, then compute the Z-score of the observed token count to rigorously prove statistical significance.
  common_mistake: |
    **The Pitfall:** Calculating only the raw percentage of green tokens (65% vs 50% baseline) and assuming it constitutes definitive proof.
    **The Rationale:** Candidates may lack the statistical background to model the null hypothesis correctly, or miscalculate the variance by omitting the (1-γ) term.
    **The Consequence:** Providing legally insufficient evidence of model theft or misidentifying normal text as watermarked.
  napkin_math: |
    - Mean ($μ$) = $N \times \gamma = 400 \times 0.5 = 200$.
    - Variance ($σ^2$) = $N \times \gamma \times (1 - \gamma) = 400 \times 0.5 \times 0.5 = 100$.
    - Standard Deviation ($σ$) = $\sqrt{100} = 10$.
    - Z-score = $(k - μ) / σ = (260 - 200) / 10 = \mathbf{6.0}$.

    Since $6.0 > 4.0$, **the watermark is positively verified and meets the legal threshold**.
