title: Verifying LLM Output Watermarks via Z-Score
scenario: You are deploying a proprietary 13B LLM on cloud infrastructure and implementing a statistical
  output watermark to prevent unauthorized data distillation. You partition the model's vocabulary such
  that the "green list" fraction is γ = 0.5. To verify a suspected stolen block of generated text, you
  analyze a sequence of N = 400 tokens and count k = 260 green list tokens. Calculate the Z-score under
  the null hypothesis (unwatermarked text) to determine if it exceeds your legal team's strict confidence
  threshold of Z = 4.0.
question: "What Z-score does 260 green tokens out of 400 produce with γ=0.5, and does it exceed the legal threshold of Z=4.0?"
details:
  realistic_solution: Model the unwatermarked text generation (the null hypothesis) as a binomial distribution.
    Calculate the expected mean (μ) and standard deviation (σ) for the sequence length, then compute the
    Z-score of the observed token count to rigorously prove statistical significance.
  common_mistake: Calculating only the raw percentage of green tokens (65% vs 50% baseline) and assuming
    it constitutes definitive proof without quantifying the statistical confidence, or miscalculating
    the variance by omitting the (1-γ) term.
  napkin_math: 'Mean (μ) = N * γ = 400 * 0.5 = 200.

    Variance (σ²) = N * γ * (1 - γ) = 400 * 0.5 * 0.5 = 100.

    Standard Deviation (σ) = √100 = 10.

    Z-score = (k - μ) / σ = (260 - 200) / 10 = 6.0.

    Since 6.0 > 4.0, the watermark is positively verified and meets the legal threshold.'
