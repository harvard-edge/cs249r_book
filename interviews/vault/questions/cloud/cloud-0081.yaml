title: The Canary Rollout Memory Budget
scenario: An autonomous vehicle company uses a central, cloud-hosted RAG model to provide real-time, complex query support to its fleet. The current production model has 7B parameters. A new, more accurate 13B parameter model is ready for a canary rollout. As the Staff ML Systems Engineer, you need to provision the canary cluster.
question: What minimum VRAM is required to load the new 13B model for FP16 inference?
details:
  realistic_solution: For inference in half-precision (FP16), each parameter requires 16 bits, which is 2 bytes. To calculate the total memory for the model weights, you multiply the number of parameters by the size of each parameter in bytes. This gives you the minimum VRAM required to load the model, not including the KV cache or activation memory.
  common_mistake: |
    **The Pitfall:** Engineers often confuse the memory requirements for training with those for inference.
    **The Rationale:** Training with an optimizer like Adam requires storing parameters, gradients, and optimizer states (~16 bytes per parameter).
    **The Consequence:** Over-provisioning memory since inference, in its simplest form, only requires the model weights.
  napkin_math: |
    1. **Parameters:** 13 Billion.
    2. **Precision:** FP16 = 2 bytes per parameter.
    3. **Calculation:** 13 Billion parameters \u00d7 2 bytes/parameter = 26 Billion bytes.
    4. **Conclusion:** **26 GB is the minimum VRAM required.**
  options:
  - 13 GB
  - 52 GB
  - 26 GB
  - 208 GB
  correct_index: 2
