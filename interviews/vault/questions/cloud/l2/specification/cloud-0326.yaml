id: cloud-0326
title: The Hidden Cost of Cooling
topic: power-budgeting
status: published
provenance: imported
scenario: You're managing the training budget for a large autonomous driving model on a cluster of H100
  GPUs. Each GPU has a Thermal Design Power (TDP) of 700W. Your datacenter provider reports a Power Usage
  Effectiveness (PUE) of 1.2. Explain how PUE impacts the total power consumption attributed to a single
  GPU, and calculate the daily electricity cost to run that one H100 24/7, assuming an electricity price
  of $0.10 per kilowatt-hour.
details:
  realistic_solution: The correct approach is to understand that PUE is a multiplier for total datacenter
    power. A PUE of 1.2 means that for every 1 watt the IT equipment (the GPU) uses, an additional 0.2
    watts are consumed by the surrounding infrastructure (cooling, power distribution, etc.). Therefore,
    the total power draw attributable to the GPU is its TDP multiplied by the PUE.
  common_mistake: Engineers often focus solely on the hardware's rated power consumption (the TDP) and
    forget the significant overhead from the rest of the datacenter infrastructure, especially cooling.
    They calculate costs based on the 700W GPU power alone, underestimating the true operational expenditure
    by 20% in this case.
  napkin_math: 1. **Calculate Total Power:** `700 W (GPU TDP) * 1.2 (PUE) = 840 W`
