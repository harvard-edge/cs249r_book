id: cloud-0375
title: The 70kW Rack Limit
topic: power-budgeting
status: published
provenance: imported
scenario: You're designing a new AI cluster. Your data center provider gives you a standard rack with
  a maximum power and cooling budget of 70 kW. You plan to populate this rack with NVIDIA H100 GPUs. Given
  the H100's Thermal Design Power (TDP) is 700 W, and the data center has an excellent Power Usage Effectiveness
  (PUE) of 1.2, calculate how many H100s you can safely install per rack without exceeding the budget.
details:
  realistic_solution: The correct approach is to account for the total power draw per GPU as seen by the
    data center's infrastructure, which includes the overhead captured by the PUE. The H100's 700W TDP
    must be multiplied by the PUE of 1.2. This gives the true power footprint of 840W per GPU. Dividing
    the rack's total 70kW (70,000W) budget by this corrected power footprint gives the maximum number
    of GPUs that can be safely installed and cooled.
  common_mistake: The most common mistake is to ignore the Power Usage Effectiveness (PUE). Engineers
    often calculate the number of GPUs based solely on the GPU's TDP (70,000W / 700W = 100 GPUs), forgetting
    that for every watt of power the GPU consumes, additional power is required for cooling, power conversion
    losses, and other data center overhead. This leads to under-provisioning cooling, exceeding the rack's
    power limits, and causing thermal throttling or circuit breaker trips in production.
  napkin_math: 1. **Calculate total power per GPU:** `Total Power = GPU TDP × PUE`
