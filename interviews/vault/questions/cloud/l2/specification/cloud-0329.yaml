title: 'The TCO of Privacy: Centralized vs. Federated'
topic: federated-learning
status: published
provenance: imported
scenario: 'Your team is building a next-word prediction model for a mobile keyboard app with 10 million
  users. You must decide between two training architectures:'
details:
  realistic_solution: To find the most economical approach, you must calculate the Total Cost of Ownership
    (TCO) for each option over the full 3-year period. The TCO includes both one-time CapEx and recurring
    OpEx.
  common_mistake: The most common mistake is to only compare the annual operational costs (OpEx), ignoring
    the significant one-time capital expenditures (CapEx) and R&D investments. This gives a misleading
    picture of the long-term financial impact. Another error is to calculate the cost for only one year,
    failing to see how the costs amortize over the project's lifecycle.
  napkin_math: Centralized TCO = $500k (CapEx) + 3 * ($1M/yr OpEx) = $3.5M
