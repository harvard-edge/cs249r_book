id: cloud-0289
title: 'The Datacenter Power Budget: Power Budgeting'
topic: power-budgeting
status: draft
provenance: imported
scenario: You're planning a new AI cluster and need to budget for power. A single rack will be populated
  with 8 H100 GPUs. According to the specs, each H100 has a Thermal Design Power (TDP) of 700 Watts. Your
  datacenter operates with a Power Usage Effectiveness (PUE) of 1.1. Explain what PUE means and calculate
  the total power this rack will draw from the grid to operate at full capacity.
details:
  realistic_solution: 'PUE is the ratio of total power used by a facility to the power delivered to the
    IT equipment. A PUE of 1.1 means that for every 1.0 watt delivered to the GPUs, an extra 0.1 watts
    are consumed by cooling systems, power converters, and lighting. First, we calculate the IT load:
    8 GPUs × 700W/GPU = 5,600W or 5.6 kW. Then, we multiply this by the PUE to find the total draw from
    the grid: 5.6 kW × 1.1 = 6.16 kW. This single rack will continuously draw 6.16 kilowatts from the
    wall.'
  common_mistake: The most common mistake is to only calculate the power of the components themselves
    (the IT load), completely forgetting the significant overhead required for cooling and power distribution.
    Engineers often underestimate that for every watt delivered to a GPU, a fraction of a watt must be
    spent just to remove the resulting heat. They forget that power from the wall must account for both.
  napkin_math: IT Load = 8 GPUs × 700 W/GPU = 5,600 W
