id: cloud-0348
title: The Kernel Launch Overhead Tax
topic: kernel-fusion
status: published
provenance: imported
scenario: 'A GPU profiler shows that a small model is bottlenecked by kernel launch overhead. You see
  a sequence of two operations that could be fused: a matrix multiplication that takes 10 µs to compute,
  followed by a ReLU activation that takes 2 µs. From profiling the hardware, you know each separate kernel
  launch has a fixed overhead of 5 µs. A compiler engineer suggests fusing these two operations into a
  single kernel. Calculate the total latency of the single, fused kernel.'
details:
  realistic_solution: With operator fusion, the two operations are combined into a single kernel. This
    means you only pay the fixed kernel launch overhead once, rather than once for each operation. The
    total latency is the sum of the single launch overhead and the compute times of both operations. This
    is a fundamental optimization in ML compilers like XLA and TensorRT.
  common_mistake: 'The most common mistake is to ignore kernel launch overhead and only sum the compute
    times (10 µs + 2 µs = 12 µs). This neglects the primary reason for fusion in small operations: amortizing
    the fixed cost of launching a kernel on the accelerator.'
  napkin_math: 'Unfused Latency = (Kernel Launch + MatMul Time) + (Kernel Launch + ReLU Time)

    Unfused = (5 µs + 10 µs) + (5 µs + 2 µs) = 15 µs + 7 µs = 22 µs.

    Fused Latency = Kernel Launch + (MatMul Time + ReLU Time)

    Fused = 5 µs + (10 µs + 2 µs) = 5 µs + 12 µs = 17 µs.

    Speedup = 22 µs / 17 µs ≈ 1.29x. Operator fusion saves 5 µs by eliminating one redundant launch.'
