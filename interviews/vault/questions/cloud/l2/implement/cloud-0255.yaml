schema_version: 1
id: cloud-0255
title: The H100's Roofline Ridge Point
topic: roofline-analysis
status: published
provenance: imported
scenario: An NVIDIA H100 GPU has a peak FP16 tensor core performance of 989 TFLOPS and a memory bandwidth
  of 3.35 TB/s. Interpret these two numbers to calculate the 'ridge point' of the H100's roofline model.
  What does this value represent for a kernel running on the GPU?
details:
  realistic_solution: 'The ridge point is the value of Arithmetic Intensity (AI) at which a workload transitions
    from being memory-bound to compute-bound. It is the intersection of the memory bandwidth roof and
    the compute performance ceiling in a roofline plot. It''s calculated by dividing the peak compute
    performance by the peak memory bandwidth. For the H100: Ridge Point = 989 TFLOPS / 3.35 TB/s = 295.2
    FLOPs/Byte. This means any kernel with an arithmetic intensity below ~295 FLOPs/Byte is memory-bound
    on the H100 — its performance is limited by how fast data can be fetched from HBM, not by compute
    capacity. Kernels above this threshold are compute-bound and can theoretically achieve peak FLOPS.
    In practice, this high ridge point means that many common ML operations (element-wise ops, batch normalization,
    small matrix multiplies, autoregressive decoding) are memory-bound on the H100, despite its enormous
    compute capability.'
  common_mistake: A frequent error is unit mismatch. Engineers often divide the numbers directly (989
    / 3.35) without ensuring the units are consistent (e.g., both in Tera- or both in Giga-). Since TFLOPS
    and TB/s both use the same 10^12 prefix, the prefixes cancel out, but this is often a point of confusion.
  napkin_math: 1. **Identify Peak Compute:** | `Peak Compute = 989 TFLOPS = 989 * 10^12 FLOPs/s`. 2. **Identify
    Peak Memory Bandwidth:** | `Peak BW = 3.35 TB/s = 3.35 * 10^12 Bytes/s`. 3. **Calculate Ridge Point:**
    | `Ridge Point = Peak Compute / Peak BW = 989 * 10^12 / 3.35 * 10^12 = **295.2 FLOPs/Byte**`. 4. **Interpretation:**
    A kernel must perform at least 295 floating-point operations for every byte it moves from HBM to be
    compute-bound. Below this, it is memory-bound. 5. **Examples:** Autoregressive LLM decode (AI ≈ 1-2
    FLOPs/Byte) → deeply memory-bound. Large GEMM in prefill (AI > 1000 FLOPs/Byte) → compute-bound. LayerNorm
    (AI ≈ 5 FLOPs/Byte) → memory-bound.
