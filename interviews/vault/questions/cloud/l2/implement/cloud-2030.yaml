schema_version: 1
id: cloud-2030
title: The Embedding Index Memory Budget
topic: compound-ai-systems
status: published
provenance: imported
scenario: You have 50 million document embeddings, each 1536 dimensions in FP32. You want to load the
  entire HNSW index into RAM for sub-10ms retrieval. How much memory does just the raw vector data require,
  before any graph overhead?
details:
  realistic_solution: 50M × 1536 dims × 4 bytes = 307.2 GB of raw vector data. An HNSW graph with M=16
    adds ~20-30% pointer overhead, bringing the total to ~370-400 GB. This requires a high-memory instance
    (e.g., r6i.12xlarge with 384 GB) or sharding across multiple nodes.
  common_mistake: Forgetting that each FP32 dimension is 4 bytes, or confusing embedding count with token
    count. Some estimate 50M × 1536 = ~75 billion 'something' without converting to bytes.
  napkin_math: Raw vector size = 1536 dimensions * 4 bytes (FP32) = 6,144 bytes per vector. Total raw
    memory = 50,000,000 * 6,144 bytes = 307.2 GB. Adding HNSW graph overhead (M=16, 16 connections * 4
    bytes = 64 bytes/vector = 3.2 GB), the total index requires ~310 GB of RAM. Easily fits in a standard
    512 GB memory cloud instance.
