id: cloud-2082
title: Attention's Quadratic Memory Wall
topic: attention-scaling
status: published
provenance: imported
scenario: A transformer model uses standard self-attention with sequence length $S$ and hidden dimension
  $d$. If you double the sequence length from 2K to 4K tokens, by how much does the attention score matrix
  memory grow?
details:
  realistic_solution: '4×. The attention score matrix is $S \times S$ per head, so doubling $S$ quadruples
    the memory. At 4K tokens with 32 heads in FP16: $32 \times 4096^2 \times 2$ bytes $\approx$ 1 GB just
    for attention scores.'
  common_mistake: Assuming attention memory scales linearly with sequence length, like the KV cache sizes
    for weight storage.
  napkin_math: 'Attention scores: $S^2$ per head. $2K \to 4K$: $(4096/2048)^2 = 4\times$. | 32 heads ×
    $4096^2$ × 2 bytes = 1.07 GB for scores alone.'
