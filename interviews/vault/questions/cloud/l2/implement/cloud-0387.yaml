title: The CapEx of an A/B Test
topic: federated-learning
status: published
provenance: imported
scenario: Your team is proposing an A/B test for a new, much larger recommendation model. To get a clean
  signal, you need to run a shadow serving stack for the new model, which requires a dedicated fleet of
  100 H100 GPUs. Using the provided hardware constants, explain how you would calculate the initial capital
  expenditure (CapEx) required just for the GPUs to run this three-month experiment.
details:
  realistic_solution: 'The solution is a straightforward multiplication of the number of required GPUs
    by their unit cost. This calculation provides a baseline ''cost of entry'' for the experiment, which
    is a critical input for deciding if the potential gains from the new model justify the test itself.
    It separates the one-time hardware cost from ongoing operational costs. Assuming an H100 costs approximately
    $30,000 per unit: CapEx = 100 GPUs × $30,000/GPU = $3,000,000. This $3M figure represents only the
    hardware acquisition cost. The total cost of the three-month experiment would also include operational
    expenses (power, cooling, engineering time), but the CapEx alone demonstrates that even ''just testing''
    a large model requires significant capital commitment.'
  common_mistake: Engineers often focus only on the performance uplift of the new model and ignore the
    massive capital investment required to even test it. They might also confuse capital expenditure (a
    one-time hardware purchase) with operational expenditure (ongoing costs like power or cloud rental
    fees), or simply miscalculate by an order of magnitude.
  napkin_math: '1. **Identify required units:** The experiment requires 100 H100 GPUs. 2. **Look up unit
    cost:** H100 GPU ≈ $30,000 per unit. 3. **Calculate CapEx:** 100 × $30,000 = **$3,000,000**. 4. **Context
    check:** This $3M is just the hardware purchase price. For a 3-month experiment, we should also consider
    OpEx: Power = 100 × 700W × 1.1 PUE × 2,190 hours × $0.10/kWh ≈ $16,863. Total 3-month experiment cost
    ≈ $3,016,863. 5. **Decision framework:** The A/B test must be expected to generate more than $3M in
    incremental value to justify the investment. If the new model improves conversion by 0.1% on $10B
    annual revenue, the expected value is $10M — the test is justified.'
