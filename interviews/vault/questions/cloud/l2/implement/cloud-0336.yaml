schema_version: 1
id: cloud-0336
title: The PUE Tax
topic: power-budgeting
status: published
provenance: imported
scenario: You are installing a new AI server with 8 H100 GPUs into a modern, liquid-cooled datacenter.
  Each H100 GPU has a Thermal Design Power (TDP) of 700 Watts. Your datacenter operator informs you that
  the facility has a Power Usage Effectiveness (PUE) of 1.1. Explain what PUE represents and calculate
  the total power draw of the server from the grid, including the overhead for cooling.
details:
  realistic_solution: PUE stands for Power Usage Effectiveness and is the ratio of a datacenter's total
    power consumption to the power used by the IT equipment inside it. A PUE of 1.1 means that for every
    1.0W the server uses for computation, the facility uses an additional 0.1W for cooling, power distribution,
    and lighting.
  common_mistake: The most common mistake is to ignore the PUE entirely, assuming the server's power is
    just the sum of its components' TDP (5.60 kW). This neglects the significant power required for cooling
    and other infrastructure, which is a critical factor in datacenter operational costs and capacity
    planning.
  napkin_math: '1. **Calculate IT Equipment Power:** 8 GPUs × 700 W/GPU = 5,600 W or 5.6 kW.

    2. **Calculate Total Facility Power:** 5.6 kW × 1.1 PUE = 6.16 kW.

    3. **Cooling & Infrastructure Overhead:** 6.16 kW - 5.6 kW = 0.56 kW.

    For every 5.6 kW of useful AI compute, the facility uses 560 Watts just to keep the servers cool and
    running.'
