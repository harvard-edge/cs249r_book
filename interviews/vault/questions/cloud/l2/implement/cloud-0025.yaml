id: cloud-0025
title: The KV-Cache VRAM Budget (cloud-0025)
topic: vram-budgeting
status: published
provenance: imported
scenario: You are tasked with serving a Llama 70B model on H100 GPUs. A single user request arrives with
  a large context window of 128,000 tokens. Explain how to calculate the VRAM required *just for the KV-cache*
  for this single user, assuming FP16 precision. Can this request be handled by a single H100?
details:
  realistic_solution: The request cannot be handled by a single H100 GPU. The model weights alone (140
    GB in FP16) already exceed the 80 GB VRAM capacity. Adding the KV-cache for 128k tokens (~42 GB with
    GQA) brings the total to ~182 GB. This necessitates multi-GPU inference using tensor parallelism —
    at minimum 3 H100s, practically 4 for headroom. The KV-cache, while not exceeding the weight memory
    in this GQA model, is still a major dynamic memory consumer that scales linearly with sequence length.
  common_mistake: The most common mistake is to only consider the memory for model weights (70B params
    × 2 bytes/param ≈ 140 GB) and ignore the dynamic memory consumption of the KV-cache. The KV-cache
    size is not fixed; it scales linearly with the sequence length and can easily surpass the weight memory
    for large contexts, becoming the primary memory bottleneck.
  napkin_math: 'KV Cache = 2 × layers × kv_heads × head_dim × seq_len × bytes_per_param | Llama-70B: 80
    layers, 8 KV heads (GQA), 128 head_dim, FP16 = 2 bytes | = 2 × 80 × 8 × 128 × 128,000 × 2 | = 41,943,040,000
    bytes ≈ 42 GB | Model weights: 70B × 2 bytes = 140 GB | Total for single request: 140 + 42 ≈ 182 GB
    | H100 has 80 GB VRAM → 182 GB >> 80 GB | Even KV-cache alone (~42 GB) + weights (140 GB) requires
    ≥ 3 H100s | Verdict: A single H100 cannot serve this request; need multi-GPU inference (tensor parallelism).'
