id: cloud-0343
title: The Datacenter Cooling Tax (cloud-0343)
topic: power-budgeting
status: draft
provenance: imported
scenario: You are provisioning a new rack in your company's AI datacenter. The rack is designed to hold
  64 NVIDIA H100 GPUs. The datacenter uses liquid cooling and has a Power Usage Effectiveness (PUE) of
  1.1. Given that a single H100 has a Thermal Design Power (TDP) of 700W, explain how you would calculate
  the total power required to run the fully-loaded rack, including the cooling overhead, and what is that
  value?
details:
  realistic_solution: The correct approach is to first calculate the total power consumed by the IT equipment
    (the GPUs) and then multiply that by the PUE to find the total facility power draw. An H100 GPU has
    a TDP of 700W. For a rack of 64, the total IT power is 44.8 kW. Multiplying by the PUE of 1.1 gives
    the total power required from the facility of 49.28 kW. This figure is critical for capacity planning
    and calculating Total Cost of Ownership (TCO).
  common_mistake: Forgetting to account for the Power Usage Effectiveness (PUE), which represents the
    overhead of cooling and other datacenter infrastructure. A PUE of 1.1 means for every 1 watt delivered
    to the IT equipment, an additional 0.1 watts are needed for cooling, power distribution, etc. Engineers
    often just sum the TDP of the components, underestimating the total power draw and operational cost.
  napkin_math: '1. **Calculate total IT power:** `Total IT Power = Num GPUs × Power per GPU`

    64 GPUs × 700 W/GPU = 44,800 W = 44.8 kW.

    2. **Calculate Total Facility Power:** `IT Power × PUE`

    44.8 kW × 1.1 = 49.28 kW.

    The facility must supply nearly 50 kW per rack, with ~4.5 kW dedicated just to cooling and power distribution
    overhead.'
