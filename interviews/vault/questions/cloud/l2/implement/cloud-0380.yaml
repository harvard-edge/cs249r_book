id: cloud-0380
title: The Datacenter Heat Wave
topic: power-budgeting
status: published
provenance: imported
scenario: Your datacenter is experiencing a major heat wave, and the cooling system is struggling to keep
  up. The system, which normally provides enough cooling for your H100 GPUs to run at their full Thermal
  Design Power (TDP), is now only able to dissipate 80% of its rated capacity. To prevent thermal failure,
  the power management system must throttle each GPU's power consumption to this new, lower limit.
details:
  realistic_solution: The GPU's computational performance is directly coupled to its power consumption.
    When a GPU computes, nearly all the electrical power it consumes is converted into heat. The cooling
    system's job is to remove this heat. If the cooling capacity is reduced, the GPU *must* consume less
    power to maintain a safe operating temperature, which in turn reduces its clock speed and, consequently,
    its TFLOPS.
  common_mistake: Engineers often focus on the advertised peak TFLOPS of a processor, forgetting that
    this performance is only achievable under ideal thermal conditions. They fail to connect the facility-level
    constraint (cooling capacity) to the component-level reality (power throttling), and therefore miscalculate
    the actual, sustained performance available for their workloads.
  napkin_math: '1. **Identify Max Performance & Power:** From the spec sheet, a full-power H100 provides
    989 TFLOPS (FP16) at a 700W TDP.

    2. **Calculate Reduced Cooling Capacity:** 700 W × 0.80 = 560 W.

    3. **Estimate Throttled Performance:** Assuming performance scales linearly with power: 989 TFLOPS
    × 0.80 = 791.2 TFLOPS.

    The GPUs must throttle, costing ~198 TFLOPS of throughput per card.'
