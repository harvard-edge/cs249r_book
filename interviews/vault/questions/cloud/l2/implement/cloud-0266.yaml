id: cloud-0266
title: The Inference Memory Diet
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are tasked with deploying a 70 billion parameter Large Language Model for inference. The
  model is currently stored in FP16 precision. To reduce the memory footprint and cost, you are considering
  quantizing it to INT8. Explain the difference in memory required to hold the model weights in these
  two formats and calculate the total memory savings in Gigabytes.
details:
  realistic_solution: FP16 (half-precision floating point) uses 16 bits, or 2 bytes, per parameter. INT8
    (8-bit integer) uses 8 bits, or 1 byte, per parameter. Quantizing from FP16 to INT8 effectively halves
    the memory required for the model's weights.
  common_mistake: Engineers often confuse the memory requirements for different precisions, typically
    by assuming the baseline is FP32 (4 bytes) instead of the more common FP16 (2 bytes) for inference,
    leading to an overestimation of savings. Another common error is to report the final INT8 size instead
    of the *savings*.
  napkin_math: '1. Parameters: 70B | 2. FP16 bytes/param: 2 | 3. INT8 bytes/param: 1 | 4. FP16 size: 70B
    * 2 = 140 GB | 5. INT8 size: 70B * 1 = 70 GB | 6. Savings: 140 GB - 70 GB = 70 GB'
