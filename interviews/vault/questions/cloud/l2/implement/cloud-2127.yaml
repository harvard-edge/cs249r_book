schema_version: 1
id: cloud-2127
title: The Feature Store Latency Budget
topic: feature-store-management
status: published
provenance: imported
scenario: A recommendation model requires 200 user features and 50 item features at serving time. Each
  feature lookup from the online feature store takes ~0.5ms. The end-to-end SLA is 50ms and the model
  inference itself takes 15ms. Can you serve this model within SLA using sequential feature lookups?
details:
  realistic_solution: No. Sequential lookups take $250 \times 0.5\text{ms} = 125\text{ms}$, which exceeds
    the 50ms SLA before inference even starts. You must batch feature lookups into a single multi-get
    request or use parallel key lookups. A single batched Redis MGET for 250 keys takes ~2-5ms, leaving
    ~30ms headroom for inference and network overhead.
  common_mistake: Assuming feature lookups are instantaneous. With 250 sequential lookups at 0.5ms each,
    feature retrieval alone consumes 125ms — 2.5× the entire SLA budget.
  napkin_math: 'Sequential: $250 \times 0.5\text{ms} = 125\text{ms}$ (exceeds 50ms SLA). Batched MGET:
    ~3ms for 250 keys. Total with inference: $3 + 15 = 18\text{ms}$ — well within SLA.'
