id: cloud-0053
title: The Static Batching Waiting Game
topic: batching-strategies
status: published
provenance: imported
scenario: You are managing an LLM inference service on a single H100 GPU. New requests arrive at a steady
  rate, one every 150ms. To optimize throughput, you've configured a static batching policy with a batch
  size of 8. Once a batch of 8 is full, it takes the H100 800ms to process it. Calculate the average time
  a request spends waiting in the queue before its batch even begins processing.
details:
  realistic_solution: The correct answer is 525ms. The core insight is that the waiting time is determined
    by how long it takes for a batch to assemble, not the GPU processing time. The first request waits
    for 7 more to arrive, the second for 6, and so on, until the last request waits for 0. The average
    of these waiting times is the answer.
  common_mistake: Engineers often confuse the *average* wait time with the *maximum* wait time (the time
    the very first request in the batch has to wait). Another common error is to focus on the GPU processing
    time (800ms) instead of the queueing delay caused by waiting for the batch to fill.
  napkin_math: 1. **Arrival Rate:** A new request arrives every `T_arrival = 150ms`.
