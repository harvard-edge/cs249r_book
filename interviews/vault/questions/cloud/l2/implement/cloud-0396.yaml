id: cloud-0396
title: The A/B Test Bill
topic: federated-learning
status: published
provenance: imported
scenario: Your team has developed a new, larger recommendation model. To serve 50% of production traffic
  at the required P99 latency, your existing baseline model requires a fleet of 2 H100 GPUs. The new challenger
  model is more complex and requires 3 H100 GPUs to serve the other 50% of traffic at the same SLO.
details:
  realistic_solution: The total cost of the experiment is the sum of the costs for running both the baseline
    and challenger fleets for the entire duration of the test. The baseline fleet requires 2 H100s and
    the challenger fleet requires 3 H100s.
  common_mistake: Engineers often miscalculate experiment costs by either focusing only on the *incremental*
    cost of the challenger fleet while ignoring the cost of the baseline fleet that also must run, or
    by miscounting the total number of machines required for the entire experiment.
  napkin_math: 1. **Total GPUs:** 2 (Baseline) + 3 (Challenger) = 5 GPUs
