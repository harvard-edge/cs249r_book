schema_version: 1
id: cloud-0011
title: The Llama 3 KV Cache Footprint
topic: vram-budgeting
status: published
provenance: imported
scenario: You are deploying a Llama 3 8B model for inference, which uses Grouped-Query Attention (GQA).
  A request comes in with a sequence length of 8,192 tokens. Explain how you would calculate the VRAM
  required just for the FP16 KV-cache for this single request, and compare the potential options.
details:
  realistic_solution: The KV-cache stores the key and value vectors for every token in the context window,
    across all attention layers. The total size is the product of the sequence length, number of layers,
    2 (for K and V), number of KV heads, the dimension of each head, and the number of bytes per value.
    For a model with Grouped-Query Attention (GQA) like Llama 3 8B, it's critical to use the number of
    KV heads, which is intentionally smaller than the number of query heads to save memory.
  common_mistake: A common mistake is to confuse the number of query heads (32 for Llama 3 8B) with the
    much smaller number of key/value heads (8 for Llama 3 8B). In GQA, the number of KV heads is the one
    that determines the cache size. Other frequent errors include forgetting to account for both the Key
    and the Value tensors (a 2x factor) or using the wrong number of bytes for FP16 precision (it's 2,
    not 4 like FP32).
  napkin_math: 'Llama 3 8B specs: 32 layers, 8 KV heads, 128 head dimension.'
