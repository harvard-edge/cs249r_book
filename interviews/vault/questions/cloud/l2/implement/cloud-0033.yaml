schema_version: 1
id: cloud-0033
title: The Runaway KV-Cache
topic: vram-budgeting
status: published
provenance: imported
scenario: You are serving a 70B parameter LLM, quantized to INT4, on a single H100 GPU with 80 GB of VRAM.
  The model weights occupy 35 GB. A user running a summarization task on a long document (64,000 tokens)
  gets a CUDA out-of-memory error. The model has 80 layers, 64 attention heads, and a head dimension of
  128. Calculate the FP16 KV-cache size for this request and explain why it causes the OOM.
details:
  realistic_solution: The out-of-memory error is caused by the KV-cache. While the 35 GB of weights fit,
    the memory required for the KV-cache grows with each token in the sequence. For a 64,000 token sequence,
    the cache requires approximately 168 GB of VRAM. The total required memory is the sum of the weights
    and the KV-cache (35 GB + 168 GB = 203 GB), which far exceeds the H100's 80 GB capacity.
  common_mistake: Engineers often focus only on the static memory cost of the model weights (~35 GB in
    this case). They forget that the KV-cache is dynamic and its size scales linearly with the input sequence
    length. For long-context applications, the KV-cache memory can easily grow to be much larger than
    the model weight memory.
  napkin_math: '70B INT4 weights = 35GB. H100 has 80GB HBM3. Available = 45GB. KV cache formula: 2 * L
    * H * D * 2 bytes (FP16). Assume 80 layers, 64 heads, 128 dim. Per token: 2 * 80 * 64 * 128 * 2 =
    2.62MB. For 64,000 tokens: 64k * 2.62MB = 167GB. 167GB > 45GB available. The KV cache alone is nearly
    double the H100''s total VRAM, causing an instant OOM during prefill.'
