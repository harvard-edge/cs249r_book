id: cloud-0357
title: The Over-provisioned AI Rack
topic: power-budgeting
status: published
provenance: imported
scenario: You've been asked to review a new rack configuration. A junior engineer has installed 90 H100
  GPUs into a single AI rack. The datacenter provider specifies that this rack has a maximum power and
  cooling capacity of 60 kW for the components. Assuming performance scales linearly with power consumption,
  explain the consequence and calculate the approximate, sustained performance level the entire rack can
  achieve compared to its theoretical peak.
details:
  realistic_solution: 'The configuration is over-provisioned. The GPUs will be power-capped (throttled)
    to stay within the rack''s 60 kW limit. The total theoretical power draw is 90 GPUs × 700 W/GPU =
    63 kW, which exceeds the limit. Therefore, the entire system must run at a reduced capacity. The achievable
    performance is the ratio of the rack''s power limit to the GPUs'' total demand: 60 kW / 63 kW ≈ 95.2%.
    The entire fleet of 90 GPUs will be forced to run at roughly 95% of their advertised performance.'
  common_mistake: Engineers often focus only on the peak TFLOPS of a GPU, forgetting that datacenter racks
    have hard physical limits on power delivery and heat dissipation. They assume they can pack as many
    GPUs as physically fit, leading to systems that can never run at 100% capacity due to automatic thermal
    throttling by the power distribution units (PDUs) or the GPUs themselves.
  napkin_math: 1. **Calculate Total Power Demand:** 90 GPUs × 700 W/GPU = 63,000 W = 63 kW
