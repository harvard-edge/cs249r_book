title: The Datacenter Power Budget (cloud-0363)
topic: power-budgeting
status: draft
provenance: imported
scenario: You are provisioning a server with 8 H100 GPUs for a liquid-cooled datacenter rack. Each H100
  has a Thermal Design Power (TDP) of 700 Watts. The datacenter's cooling system is very efficient, with
  a Power Usage Effectiveness (PUE) of 1.1. Calculate the *total* power draw from the datacenter grid
  for this single server, accounting for both the GPUs and the cooling overhead. Ignore the power draw
  from CPUs and other server components for this calculation.
details:
  realistic_solution: The correct way to solve this is a two-step process. First, calculate the total
    power consumed directly by the IT equipment (the GPUs). Second, multiply that by the PUE to find the
    total power drawn from the grid.
  common_mistake: The most common mistake is to calculate the power of the components (the GPUs) but forget
    to account for the overhead of the datacenter itself. The Power Usage Effectiveness (PUE) is a critical
    multiplier that represents the cost of cooling and power distribution required to run the hardware.
  napkin_math: 1. **Calculate base GPU power:**
