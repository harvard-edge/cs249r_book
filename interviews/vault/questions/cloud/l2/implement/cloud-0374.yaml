id: cloud-0374
title: The Power Efficiency Trap
topic: roofline-analysis
status: published
provenance: imported
scenario: 'You''re a cloud engineer designing a system for a large fleet of edge devices. Your team has
  a strict thermal design power (TDP) budget of 30W per device. You''re evaluating two accelerators: a
  Jetson AGX Orin (which achieves its peak 275 TOPS in a 60W configuration) and a Hailo-8 (rated at 26
  TOPS at 2.5W). Explain which accelerator delivers higher sustained INT8 performance *within your 30W
  power budget* by calculating its effective TOPS.'
details:
  realistic_solution: The key is to first calculate the power efficiency (TOPS/W) for each accelerator,
    and then use that to determine the sustained performance possible within the 30W thermal budget, respecting
    each chip's own maximum power limit.
  common_mistake: Engineers often fixate on the 'peak TOPS' marketing number without considering power
    efficiency (TOPS/W) and the system's actual thermal budget. A second common mistake is to extrapolate
    power efficiency beyond the chip's physical power limit. One might incorrectly select the chip with
    the highest peak performance (Orin) or highest efficiency (Hailo) without doing the math for the specific
    power budget.
  napkin_math: '1. **Calculate efficiency (TOPS/W) for each chip:**

    Orin: 275 TOPS / 60 W ≈ 4.58 TOPS/W.

    Hailo-8: 26 TOPS / 2.5 W ≈ 10.4 TOPS/W.

    2. **Scale to 30W Budget:**

    Orin @ 30W: 30 W × 4.58 TOPS/W ≈ 137.5 TOPS.

    Hailo-8: Maxes out at 2.5W for 26 TOPS (cannot consume 30W).

    Orin wins on total throughput (137.5 TOPS), despite Hailo-8 being more power-efficient.'
