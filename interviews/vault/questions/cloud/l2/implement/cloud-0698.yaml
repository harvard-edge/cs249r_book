id: cloud-0698
title: The Pipeline Bubble Tax
topic: data-parallelism
status: published
provenance: imported
scenario: You're training a large language model using 4-way pipeline parallelism (`P=4`). A global batch
  is split into 16 microbatches (`M=16`). The execution time for one complete microbatch step (forward
  + backward combined) through a single stage is 50 ms (`T_stage`). Explain how to calculate the total
  time to process the full global batch, and what that time is.
details:
  realistic_solution: The total time is the time it would take if all stages were always busy, plus the
    overhead of the pipeline bubble. The pipeline is only fully utilized after the first microbatch has
    propagated through all `P` stages. The bubble consists of `P-1` stages that are idle at the beginning
    and `P-1` stages that are idle at the end. The total time can be calculated as the time to process
    all `M` microbatches through one stage, plus the time to fill/drain the other `P-1` stages.
  common_mistake: The most common mistake is to assume perfect parallelization and calculate the total
    time as `M * T_stage`. This completely ignores the 'bubble'—the initial latency to fill the pipeline
    stages and the final latency to drain it. This bubble is a fundamental overhead of pipeline parallelism.
  napkin_math: "1. **Identify the formula for pipeline execution time:**\n   Total time = (M + P - 1)\
    \ × T_stage, where T_stage is the time for one complete microbatch step (forward + backward) through\
    \ one stage.\n\n2. **Calculate the steady-state (ideal) time:**\n   Ideal = M × T_stage = 16 × 50\
    \ = **800 ms**.\n\n3. **Calculate the pipeline bubble overhead:**\n   Bubble = (P - 1) × T_stage =\
    \ (4 - 1) × 50 = **150 ms**.\n\n4. **Total time to process the global batch:**\n   Total = Ideal +\
    \ Bubble = 800 + 150 = **950 ms**.\n\n5. **Bubble fraction:**\n   Bubble fraction = (P - 1) / (M +\
    \ P - 1) = 3 / 19 = **15.8%**.\n   This means 15.8% of the pipeline's time is wasted in the bubble.\n\
    \n6. **Key insight:** Increasing microbatches M amortizes the bubble. At M=32: bubble = 3/35 = 8.6%.\
    \ At M=64: bubble = 3/67 = 4.5%. The rule of thumb is M ≥ 4×P to keep bubble overhead below ~20%."
