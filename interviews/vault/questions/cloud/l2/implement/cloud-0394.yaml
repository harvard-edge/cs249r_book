id: cloud-0394
title: The RAG Update Memory Budget
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are planning an update for a critical Retrieval-Augmented Generation (RAG) service. The
  current system uses a 7B parameter model, but you want to upgrade to a more powerful 13B parameter model
  running in FP16 precision. Your Kubernetes pods are scheduled on nodes that can allocate a maximum of
  32 GB of memory to the model-serving container. In addition to the model weights, the RAG system's vector
  index requires 4 GB of memory to be loaded into the same container. Explain if the new 13B model can
  be deployed on the existing hardware by calculating its total memory footprint.
details:
  realistic_solution: The new model will fit within the 32 GB memory budget. The calculation requires
    summing the memory for the model weights at FP16 precision and the memory for the vector index. The
    13B model requires 26 GB for its weights, and adding the 4 GB for the index results in a total of
    30 GB, which is less than the 32 GB available.
  common_mistake: A common mistake is to only calculate the memory for the model weights, completely forgetting
    to account for other essential components loaded into memory, such as the vector index in a RAG system.
    Another frequent error is using the memory formula for training (which includes gradients and optimizer
    states) instead of the much smaller requirement for inference.
  napkin_math: '1. **Calculate model weight memory:** A 13B parameter model at FP16 precision requires
    2 bytes per parameter, as per the scaling rules.

    13,000,000,000 params × 2 Bytes = 26 GB.

    2. **Add Vector Index:** 26 GB (weights) + 4 GB (index) = 30 GB total.

    3. **Compare to Budget:** 30 GB < 32 GB.

    The 13B model and index will fit within the node''s 32 GB memory limit, leaving 2 GB overhead.'
