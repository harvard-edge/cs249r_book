id: cloud-0318
title: 'The Datacenter Cooling Tax: Power Budgeting'
topic: power-budgeting
status: draft
provenance: imported
scenario: You're speccing out a new AI training rack for your datacenter. The rack will hold 8 NVIDIA
  H100 GPUs. The datacenter has an excellent Power Usage Effectiveness (PUE) of 1.1. Given the H100's
  Thermal Design Power (TDP) is 700W, calculate the total steady-state power the rack will draw from the
  grid and, specifically, how much of that power is used just for cooling.
details:
  realistic_solution: The correct approach is to first calculate the power consumed by the IT equipment
    and then multiply it by the PUE to find the total power draw. The difference between the total power
    and the IT power is the 'cooling tax'.
  common_mistake: Engineers often calculate the power draw for the IT equipment (the GPUs) but forget
    to account for the overhead of the datacenter infrastructure itself, which is what PUE measures. They
    budget for 5.6 kW, but the grid sees a higher number, leading to under-provisioned power circuits
    and thermal solutions.
  napkin_math: IT Power = 8 GPUs * 700 W = 5.6 kW
