id: cloud-0827
title: The Cross-Node AllReduce Cost
topic: collective-communication
status: published
provenance: imported
scenario: You are training a 13B model across 4 nodes (8 GPUs each, 32 total) connected by InfiniBand
  NDR (400 Gb/s = 50 GB/s per link). Gradients are FP32. Estimate the ring AllReduce time, assuming cross-node
  InfiniBand is the bottleneck.
details:
  realistic_solution: 'About 2 seconds. Gradient size = 13B * 4 bytes = 52 GB. Ring AllReduce factor =
    2*(32-1)/32 = 1.94. Total traffic per GPU = 1.94 * 52 = 100.8 GB. At 50 GB/s IB bandwidth: 100.8 /
    50 = 2.0 seconds. This is why gradient compression and overlap with compute are critical at scale.'
  common_mistake: Using NVLink bandwidth for the cross-node calculation. NVLink only connects GPUs within
    a node. Cross-node communication must traverse InfiniBand, which is ~18x slower than NVLink 4.0.
  napkin_math: Gradient size = 13B × 4 bytes = 52 GB. Ring AllReduce volume per GPU = 2 × (31/32) × 52
    GB ≈ 100.75 GB. InfiniBand NDR bandwidth = 50 GB/s. Time = 100.75 GB / 50 GB/s = ~2.015 seconds.
