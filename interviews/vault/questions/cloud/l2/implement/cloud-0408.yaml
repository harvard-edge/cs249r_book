title: The TCO of an H100
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your manager is evaluating the cost of a new GPU cluster and asks for the 3-year Total Cost
  of Ownership (TCO) for a single NVIDIA H100 GPU. They see the upfront hardware cost is about $30,000
  and assume that's the main expense. Explain and calculate the approximate 3-year TCO, including the
  'hidden' costs of power, cooling, and maintenance. Assume the GPU runs 24/7 at its full 700W TDP, resides
  in a modern datacenter with a Power Usage Effectiveness (PUE) of 1.2, that electricity costs $0.10 per
  kWh, and annual maintenance is 5% of CapEx.
details:
  realistic_solution: The TCO is the sum of the initial hardware cost (CapEx) plus all operational costs
    (OpEx) over its life. Here, OpEx includes annual maintenance and the total cost of electricity for
    both the GPU and the required cooling overhead, which is captured by the PUE metric.
  common_mistake: Engineers often underestimate operational expenditures (OpEx) and focus only on the
    capital expenditure (CapEx) of the hardware. The true cost includes significant, recurring costs from
    power, cooling (represented by PUE), and maintenance over the asset's lifetime. Forgetting any of
    these components gives an incomplete and misleading picture of the financial commitment.
  napkin_math: '1.  **CapEx**: $30,000 (Given)'
