id: cloud-0024
title: The True Cost of an A/B Test
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You are designing an A/B experiment to evaluate a new, larger recommendation model. The current
  production model (Group A) is 1 billion parameters. The new experimental model (Group B) is 7 billion
  parameters, which you hypothesize will improve user engagement significantly. To serve these models
  for inference, they must be loaded into H100 GPU memory. Compare the memory footprint required to serve
  one instance of the experimental model versus one instance of the production model, assuming both are
  using FP16 precision.
details:
  realistic_solution: The analysis requires calculating the memory for each model and then finding the
    difference. The economic implication is key.
  common_mistake: Engineers often calculate the memory for the new model in isolation, but forget to compare
    it to the baseline. They might also confuse the bytes-per-parameter for different precisions, using
    4 for FP32 or 1 for INT8 instead of the 2 bytes required for FP16. The most critical mistake is failing
    to connect this memory increase to the direct economic impact on serving cost—fewer model replicas
    can be packed onto a single expensive GPU, increasing the cost-per-query.
  napkin_math: 1. **Identify Memory Formula:** `Inference Memory = Parameters × Bytes_per_Parameter`
