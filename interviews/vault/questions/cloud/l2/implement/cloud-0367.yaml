title: The TCO of Privacy
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'You''re on a team building a new smart keyboard app for 10 million daily users. To improve
  autocorrect, you estimate each user generates about 1MB of training data per day. The team is debating
  two architectures:'
details:
  realistic_solution: The correct approach is to calculate the total data volume per day, convert it to
    GB, determine the daily cost, and then scale it to an annual figure. The key insight is that while
    the federated approach adds engineering complexity, it can drastically reduce operational costs related
    to data movement. This $70,000+ annual saving for the FL approach is a significant part of the TCO
    and can justify the additional engineering investment in a privacy-preserving system.
  common_mistake: Engineers often focus only on compute costs (training) and forget that data movement
    has its own significant operational costs, especially at scale. A common error is to miscalculate
    the units (e.g., confusing MB and GB, or using 1024 instead of 1000 for napkin math) or to calculate
    the daily cost but forget to scale it to the annual cost requested, thus dramatically underestimating
    the TCO.
  napkin_math: '1. **Calculate total daily data:** 10,000,000 users × 1 MB/user = 10,000,000 MB/day.

    2. **Convert to TB:** 10,000,000 MB = 10,000 GB = 10 TB/day.

    3. **Annualize Data:** 10 TB/day × 365 days = 3,650 TB/year.

    At a typical cloud ingress/egress cost of $0.02/GB, moving 3.65 Petabytes centrally costs ~$73,000/yr
    just for transport. Federated learning keeps data on-device, saving this cost.'
