id: cloud-0317
title: The H100 Ridge Point (cloud-0317)
topic: roofline-analysis
status: draft
provenance: imported
scenario: A key characteristic of any accelerator is its Roofline Model, which helps determine whether
  a workload will be memory-bound or compute-bound. Given an NVIDIA H100 GPU with a peak FP16 Tensor Core
  performance of 989 TFLOPS and a memory bandwidth of 3.35 TB/s, calculate the 'Ridge Point' of the accelerator.
  Explain what this value tells you about the types of workloads that will perform well on this hardware.
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (AI) a workload must achieve
    to become compute-bound. For the H100, a workload must perform approximately 295 floating-point operations
    for every byte of data it transfers from HBM to be limited by compute. Workloads with an AI lower
    than 295 FLOPs/Byte are memory-bound, meaning their performance is bottlenecked by memory bandwidth,
    not the processor's speed. To improve performance for memory-bound workloads, you must increase AI,
    often through techniques like operator fusion.
  common_mistake: 'A common mistake is to invert the formula (dividing bandwidth by compute) or to confuse
    the units, leading to an incorrect interpretation. Engineers might also know the formula but fail
    to explain what the resulting value practically means: it''s the minimum operational intensity required
    to start saturating the GPU''s compute units. Without hitting this threshold, any further kernel optimizations
    are largely futile as the GPU is just waiting for data.'
  napkin_math: '1. The "Ridge Point" bridges peak operations and peak bandwidth.

    2. Peak FP16 compute: 989 TFLOPS (TeraFLOPs/sec).

    3. Peak memory bandwidth: 3.35 TB/s (TeraBytes/sec).

    4. Since the ''Tera'' prefix cancels out (10^12 / 10^12):

    Ridge Point = 989 FLOPs / 3.35 Bytes = 295.2 FLOPs/Byte.

    Workloads with Arithmetic Intensity < 295.2 are memory-bound; those > 295.2 are compute-bound.'
