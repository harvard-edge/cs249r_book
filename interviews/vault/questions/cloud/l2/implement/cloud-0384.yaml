id: cloud-0384
title: The H100's Memory Wall
topic: roofline-analysis
status: published
provenance: imported
scenario: A new engineer is profiling a large-scale data preprocessing kernel on an NVIDIA H100. The kernel
  performs a simple element-wise addition on two large FP16 vectors and writes the result back to memory.
  They are surprised the GPU utilization is low. Using the H100's specs (989 TFLOPS FP16 compute, 3.35
  TB/s memory bandwidth), explain why the kernel is not compute-bound. Calculate the operation's arithmetic
  intensity to support your explanation.
details:
  realistic_solution: The operation is severely memory-bound. To determine this, we first find the machine's
    'ridge point'—the arithmetic intensity required to be compute-bound. Then we calculate the kernel's
    arithmetic intensity and compare. If the kernel's AI is less than the ridge point, it's memory-bound.
  common_mistake: The most common mistake is assuming that because a GPU has immense computational power
    (high TFLOPS), any task running on it must be compute-bound. Engineers often forget to consider the
    amount of data that must be moved to feed those compute units. They either don't know how to calculate
    arithmetic intensity or fail to compare it against the hardware's roofline.
  napkin_math: 'Element-wise addition of two FP16 vectors: read 2 elements (4 bytes), write 1 (2 bytes),
    total 6 bytes moved. Compute is 1 FLOP (addition). Arithmetic Intensity = 1 FLOP / 6 Bytes = 0.166
    FLOP/Byte. The H100''s Ridge Point is 989 TFLOPS / 3.35 TB/s = 295 FLOP/Byte. The kernel''s AI is
    1700x lower than the ridge point, making it completely memory-bound.'
