id: cloud-2058
title: The Iteration Speed Bottleneck
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'A team''s ML iteration cycle takes 5 days: 1 day for data preparation, 3 days for training,
  and 1 day for evaluation and analysis. They want to speed up iterations. A junior engineer proposes
  buying faster GPUs to cut training time in half. How much does this improve the overall iteration cycle?'
details:
  realistic_solution: Training is 3/5 = 60% of the cycle. Halving it saves 1.5 days, reducing the cycle
    from 5 to 3.5 days — a 30% improvement, not 50%. The non-training overhead (data prep + evaluation)
    is the Amdahl's Law serial fraction. To achieve a 2× speedup, you must also parallelize data preparation
    and automate evaluation.
  common_mistake: Assuming that halving training time halves the cycle. This is a direct application of
    Amdahl's Law to the development workflow.
  napkin_math: 'Original: 1 + 3 + 1 = 5 days. Faster GPUs: 1 + 1.5 + 1 = 3.5 days. Speedup = 5/3.5 = 1.43×
    (not 2×). By Amdahl''s Law: S = 1/((1-0.6) + 0.6/2) = 1/0.7 = 1.43×.'
