id: cloud-0829
title: The Flash Attention Memory Cliff
topic: graph-compilation
status: published
provenance: imported
scenario: You are serving a model with 32 attention heads and sequence length 8192 in FP16. Your colleague
  asks why standard attention runs out of memory but Flash Attention does not. Calculate the attention
  matrix memory for standard attention versus Flash Attention's working memory.
details:
  realistic_solution: 'Standard attention materializes a (seq x seq) matrix per head: 32 heads * 8192
    * 8192 * 2 bytes = 4.29 GB just for the attention scores. Flash Attention tiles the computation in
    SRAM and never writes the full matrix to HBM, reducing working memory to ~0.2 GB — a 21x reduction.'
  common_mistake: Thinking Flash Attention is just 'faster attention.' The key insight is that it changes
    the memory complexity from O(n^2) to O(n) by tiling the computation and never materializing the full
    attention matrix in HBM.
  napkin_math: 'Standard: 32 * 8192^2 * 2 bytes = 32 * 67M * 2 = 4.29 GB. Flash Attention working memory
    ~ 32 * 8192 * 128 * 2 * 3 (Q,K,V tiles) = 0.20 GB. Reduction = 4.29 / 0.20 = ~21x.'
