schema_version: 1
id: cloud-2109
title: The Matrix Multiply FLOP Count
topic: roofline-analysis
status: published
provenance: imported
scenario: A single fully connected layer maps a batch of 64 vectors from dimension 4096 to dimension 4096.
  How many floating-point multiply-accumulate operations (MACs) does this matrix multiplication require,
  and what is the total FLOP count?
details:
  realistic_solution: MACs = B * M * N = 64 * 4096 * 4096 = 1.07 billion MACs. FLOPs = 2 * MACs = 2.15
    billion FLOPs (~2.15 GFLOPS). On an A100 with 312 TFLOPS FP16 peak, this single layer takes ~7 microseconds
    at peak utilization.
  common_mistake: Confusing MACs with FLOPs. Each MAC is one multiply and one add, so 1 MAC = 2 FLOPs.
    Also forgetting to include the batch dimension in the calculation.
  napkin_math: 'MACs = 64 * 4096 × 4096 = 1,073,741,824. FLOPs = 2 * 1.07B = 2.15 GFLOPS. At 312 TFLOPS
    peak (A100): 2.15e9 / 312e12 = 6.9 us compute floor.'
