id: cloud-2224
title: The Storage Tier Latency Gap
topic: vram-budgeting
status: published
provenance: imported
scenario: 'A training cluster has four storage tiers: HBM on the GPU, host DRAM, local NVMe SSDs, and
  a parallel filesystem (Lustre) over the network. Roughly how many orders of magnitude separate the access
  latency of the fastest tier (HBM) from the slowest (Lustre)? Why does this gap matter for ML training?'
details:
  realistic_solution: The gap spans roughly 5-6 orders of magnitude. HBM access latency is ~300ns, host
    DRAM is ~100ns but accessed via PCIe at ~1-2us effective, local NVMe is ~10-100us, and a Lustre read
    over the network is ~1-10ms. From HBM (~300ns) to Lustre (~3ms), that is approximately 10,000x or
    ~4 orders of magnitude. If we include L1/L2 cache at ~1ns, the full hierarchy spans ~6 orders of magnitude.
    This matters because any training step that stalls on a remote filesystem read pays a latency penalty
    thousands of times larger than a local memory access, making storage tiering essential for keeping
    accelerators fed.
  common_mistake: Assuming the gap is small, like 10-100x. Engineers who have only worked with single-machine
    setups often underestimate how catastrophic a remote filesystem read is compared to on-chip memory
    access.
  napkin_math: 'L1 cache: ~1ns. HBM: ~300ns. DRAM (via PCIe): ~2us. NVMe SSD: ~50us. Lustre over network:
    ~3ms. Ratio of slowest to fastest (Lustre vs L1): $3 \times 10^6$ — six orders of magnitude. Even
    HBM to Lustre: $3 \times 10^6 / 300 = 10{,}000\times$.'
