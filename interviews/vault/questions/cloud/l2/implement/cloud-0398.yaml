title: The RAG Model Upgrade
topic: compound-ai-systems
status: published
provenance: imported
scenario: You're an ML Systems Engineer responsible for a fleet of in-car assistants that use a Retrieval-Augmented
  Generation (RAG) system. Your team wants to improve the quality of the document retrieval by rolling
  out a larger embedding model. The current model has 3 billion parameters, and the new model has 7 billion
  parameters. Both models are served in FP16 precision. Explain the impact on inference memory just for
  the model weights. How many Gigabytes of memory will the new 7B parameter model require?
details:
  realistic_solution: For inference with FP16 precision, each parameter requires 2 bytes of memory. Therefore,
    a 7 billion parameter model will require 14 GB of memory just for the weights. This is a straightforward
    calculation that is critical for capacity planning when rolling out a new model to a container orchestration
    system like Kubernetes.
  common_mistake: Engineers often confuse the memory requirements for different precisions or mix up inference
    and training memory footprints. A common error is to use the byte-per-parameter count for INT8 (1
    byte) or FP32 (4 bytes) instead of FP16 (2 bytes), or to incorrectly apply the much larger memory
    multiplier needed for optimizer states during training (e.g., 16 bytes for Adam).
  napkin_math: 'Model Parameters = 7,000,000,000

    1. **Determine Bytes per Parameter:** FP16 (16-bit floating point) requires 16 bits / 8 bits/Byte
    = 2 Bytes.

    2. **Calculate Total VRAM for Weights:** 7,000,000,000 × 2 Bytes = 14,000,000,000 Bytes.

    3. **Convert to Gigabytes:** 14,000,000,000 / 10^9 = 14 GB.

    Just loading the weights requires 14 GB of VRAM, making it a tight fit for 16GB cards.'
