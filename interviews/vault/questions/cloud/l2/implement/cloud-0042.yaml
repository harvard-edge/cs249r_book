id: cloud-0042
title: The KV-Cache VRAM Budget (cloud-0042)
topic: vram-budgeting
status: draft
provenance: imported
scenario: You are scoping the VRAM requirements for serving a Llama-2 70B model with a 128,000 token context
  window. For a single user request (batch size of 1), calculate the approximate VRAM needed *just for
  the FP16 KV-cache*. You can assume the model has 80 layers, a head dimension of 128, and uses Grouped-Query
  Attention (GQA) with 8 KV-heads.
details:
  realistic_solution: The correct calculation accounts for sequence length, the number of layers, the
    number of KV heads (not query heads), the dimension of each head, and the data type. For a GQA model,
    the smaller number of KV heads is the key to making long contexts manageable. The cache stores a Key
    and a Value vector for each token, at each layer, for each KV head, requiring 2 bytes per element
    for FP16 precision.
  common_mistake: Engineers often miscalculate KV-cache size by using the wrong number of heads (query
    heads vs. KV heads in GQA), forgetting to account for both Keys and Values (a 2x factor), or using
    the wrong precision (FP16 is 2 bytes, not 1). A more fundamental error is confusing the cache size,
    which scales with sequence length, with the model's parameter size, which is fixed.
  napkin_math: '1. **Identify dimensions from the scenario:** | Sequence Length (S): 128,000 tokens |
    Layers (L): 80 | KV Heads (H_kv): 8 (GQA) | Head Dimension (D_h): 128 | Bytes per element (B): 2 (FP16)
    | 2. **Calculate KV Cache size:** | = 2 × L × H_kv × D_h × S × B | = 2 × 80 × 8 × 128 × 128,000 ×
    2 | Step by step: 2 × 80 = 160 | 160 × 8 = 1,280 | 1,280 × 128 = 163,840 | 163,840 × 128,000 = 20,971,520,000
    | × 2 bytes = 41,943,040,000 bytes ≈ 41.9 GB | 3. **Context:** Model weights (FP16) ≈ 140 GB | Total
    for one request: 140 + 42 = 182 GB → needs ≥ 3 H100s (80 GB each) | GQA reduces KV-cache by 8× vs.
    full MHA (which would be ~335 GB).'
