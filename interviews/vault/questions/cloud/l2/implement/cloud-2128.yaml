schema_version: 1
id: cloud-2128
title: The Embedding Table Memory Wall
topic: feature-store-management
status: published
provenance: imported
scenario: A DLRM-style recommendation model has 100 embedding tables, each with 10 million rows and 128-dimensional
  FP32 embeddings. How much memory do the embedding tables require, and can they fit on a single A100
  (80GB HBM)?
details:
  realistic_solution: 'Each table: $10\text{M} \times 128 \times 4\text{B} = 5.12\text{ GB}$. Total: $100
    \times 5.12\text{ GB} = 512\text{ GB}$. This is 6.4× the capacity of a single 80GB A100. The embeddings
    must be sharded across at least 7 GPUs, or use mixed-dimensional embeddings to reduce less important
    tables.'
  common_mistake: Forgetting to multiply by all three dimensions (tables × rows × dimensions × bytes).
    A common error is computing only one table's size.
  napkin_math: $100 \times 10^7 \times 128 \times 4\text{B} = 512\text{ GB}$. Single A100 = 80GB. Need
    $\lceil 512/80 \rceil = 7$ GPUs minimum.
