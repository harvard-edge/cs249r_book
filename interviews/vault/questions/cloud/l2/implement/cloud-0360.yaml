schema_version: 1
id: cloud-0360
title: The Federated Learning Data Bill
topic: federated-learning
status: published
provenance: imported
scenario: You are calculating the weekly data ingress costs for a new Federated Learning system that trains
  a predictive keyboard model. You have a fleet of 10 million users. Each user's device will upload 200
  MB of compressed model gradients to your cloud backend once per week. Explain how to calculate the total
  data volume your servers will receive each week and interpret the final number.
details:
  realistic_solution: 'The correct approach is to multiply the data contribution of a single user by the
    total number of users in the fleet. This calculation reveals the immense scale of data ingress that
    cloud systems must handle, even when using a technique like Federated Learning that avoids uploading
    raw user data. The final figure is a critical input for Total Cost of Ownership (TCO) analysis, directly
    impacting network bandwidth provisioning and data handling costs. The calculation: 10,000,000 users
    * 200 MB/user = 2,000,000,000 MB = 2,000,000 GB = 2,000 TB = 2 PB per week. This means the backend
    must be provisioned to ingest 2 Petabytes of gradient data every week, which translates to an average
    ingress rate of approximately 26.5 Gbps sustained.'
  common_mistake: The most common mistake is failing to appreciate the scale of a large user fleet. Engineers
    may calculate the data for a single user correctly but then either forget to multiply by the total
    number of users or make an order-of-magnitude error during unit conversions (e.g., confusing terabytes
    with petabytes), drastically underestimating the infrastructure requirements and cost.
  napkin_math: '1.  Start with the number of users: 10,000,000 users. 2.  Multiply by data per user: 10,000,000
    * 200 MB = 2,000,000,000 MB. 3.  Convert MB to GB: 2,000,000,000 / 1,000 = 2,000,000 GB. 4.  Convert
    GB to TB: 2,000,000 / 1,000 = 2,000 TB. 5.  Convert TB to PB: 2,000 / 1,000 = **2 PB per week**. 6.  **Interpret:**
    2 PB/week is a massive data ingress load. At $0.01/GB ingress cost, the weekly network cost alone
    is 2,000,000 * $0.01 = $20,000/week or roughly **$1M/year** just for receiving gradient updates.'
