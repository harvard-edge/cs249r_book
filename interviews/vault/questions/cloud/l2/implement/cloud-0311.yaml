id: cloud-0311
title: The Real-Time Transcription Deadline
topic: latency-decomposition
status: published
provenance: imported
scenario: You are building a live audio transcription service. To feel instantaneous to the user, the
  system must generate the text for each second of audio within that same one-second window. Your model
  generates an average of 15 tokens for every 1 second of speech. To meet this real-time constraint, what
  is the maximum average Time Per Output Token (TPOT) your system can have?
details:
  realistic_solution: The system has a total time budget of 1 second (1000 milliseconds) to generate 15
    tokens. To find the maximum average time allowed for each token, we must divide the total time budget
    by the number of tokens that need to be generated within that budget. A TPOT greater than this value
    would mean the system cannot keep up with the live audio stream, causing transcription to lag.
  common_mistake: A common mistake is to confuse the rate (tokens per second) with the time per token,
    or to invert the calculation. Forgetting to convert units from seconds to milliseconds is also a frequent
    error, leading to an answer that is off by a factor of 1000.
  napkin_math: '1. Time Budget: The model must generate text for 1 second of audio within 1 second (1000
    milliseconds).

    2. Token generation rate: 15 tokens required per second of audio.

    3. Max Time Per Output Token (TPOT) = Total Time Budget / Tokens required.

    4. TPOT = 1000 ms / 15 tokens = 66.66 ms/token.

    If your inference engine''s TPOT exceeds ~66.6 ms, the transcription will lag behind live speech!'
