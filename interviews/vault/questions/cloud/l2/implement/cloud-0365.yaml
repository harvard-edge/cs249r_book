schema_version: 1
id: cloud-0365
title: The Fleet Update Cost Dilemma
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You are the ML Systems Engineer for an autonomous vehicle company with a fleet of 10,000 cars.
  Your team needs to roll out a critical monthly update to the perception model, which is packaged as
  a 4 GB container image. You are evaluating two cloud providers for distributing this update: Provider
  A charges $0.09 per GB of data egress. Provider B offers a flat-rate CDN plan at $1,000/month for unlimited
  egress. Which provider should you choose?'
details:
  realistic_solution: The correct approach is to calculate the total data egress required for the entire
    fleet and then compare costs. Total egress = 10,000 × 4 GB = 40 TB. At $0.09/GB, Provider A costs
    $3,600/month. Provider B's flat rate of $1,000/month is 3.6× cheaper. The breakeven point is ~2,800
    cars — well below the fleet size. At scale, pay-per-GB egress costs grow linearly while flat-rate
    stays constant, making Provider B the clear choice.
  common_mistake: The most common mistake is to misjudge the scale of the operation. Engineers might either
    forget to multiply the image size by the number of vehicles in the fleet, or make an arithmetic error
    (e.g., off-by-10) when calculating the total cost. Another error is to qualitatively assume a flat-rate
    plan is always better for large-scale operations without doing the math.
  napkin_math: '**Total data egress per month:** | 10,000 cars × 4 GB/car = 40,000 GB = 40 TB/month |
    **Provider A — Pay-per-GB (e.g., $0.09/GB):** | Cost = 40,000 GB × $0.09 = $3,600/month | **Provider
    B — Flat-rate CDN (e.g., $1,000/month for unlimited egress):** | Cost = $1,000/month | **Comparison:**
    | Provider A: $3,600/month | Provider B: $1,000/month | Savings with flat-rate: $2,600/month (72%
    cheaper) | **Breakeven:** $1,000 / $0.09 = 11,111 GB ≈ 2,778 cars | Below ~2,800 cars: pay-per-GB
    is cheaper | Above ~2,800 cars: flat-rate wins | At 10,000 cars: flat-rate is 3.6× cheaper.'
