id: cloud-2034
title: The Embedding Dimension Cost Curve
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your team is choosing between a 384-dim embedding model and a 1536-dim model. The 1536-dim model
  scores 3% higher on your retrieval benchmark. A colleague argues the quality improvement justifies the
  cost. Quantify the infrastructure cost difference for a 100M-document index.
details:
  realistic_solution: '4× dimensions means 4× memory for the index, 4× bandwidth per vector comparison,
    and 4× storage cost. 100M docs at 384-dim FP32 = 100M × 384 × 4 = 153.6 GB. At 1536-dim = 614.4 GB.
    The 384-dim index fits on a single 192 GB instance (with PQ compression), while 1536-dim needs 3-4
    nodes or aggressive quantization. Search latency also increases because each distance computation
    does 4× more work. The right analysis: does 3% retrieval improvement translate to measurable downstream
    task improvement? Often, a 384-dim model with a cross-encoder reranker on top-20 results outperforms
    a raw 1536-dim retriever at lower total cost.'
  common_mistake: Focusing only on embedding quality benchmarks without accounting for the 4× storage,
    memory, and search cost multiplier that higher dimensions impose.
  napkin_math: '384-dim: 100M × 384 × 4B = 153.6 GB. 1536-dim: 100M × 1536 × 4B = 614.4 GB. At $0.10/GB/month
    for memory-optimized instances: $15.36/month vs $61.44/month for raw vector storage alone. With HNSW
    overhead and replicas: ~$100/month vs ~$400/month.'
