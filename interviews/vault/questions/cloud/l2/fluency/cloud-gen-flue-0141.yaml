id: cloud-gen-flue-0141
title: Rack Cooling Limits for 8-GPU H100 vs A100 Nodes
topic: thermal-management
status: published
provenance: imported
scenario: You are helping the data center team provision a new cloud rack with a strict thermal cooling
  limit of 15 kW. The team wants to deploy standard 8-GPU server nodes and needs to understand the generational
  differences in thermal management. From memory, compare the total maximum thermal output (TDP) of the
  GPUs in an 8x H100 server versus an 8x A100 server. If the base system components add a constant 2 kW
  of heat per server, calculate exactly how many full 8x H100 servers this rack can cool.
details:
  realistic_solution: To ensure stable sustained performance without thermal throttling, the cooling infrastructure
    must be able to handle the peak combined heat dissipation of the node. The candidate should recall
    the correct TDP for both GPU architectures and calculate the total node output. By doing so, they
    demonstrate that the higher thermal density of the H100 severely limits rack density, allowing only
    one 8x H100 server in a 15 kW envelope.
  common_mistake: Candidates often fail to recall the significant TDP jump between A100 (400W) and H100
    (700W) generations, incorrectly assuming they can fit the same number of nodes per rack. They may
    also forget to add the baseline 2 kW system power to the GPU power before calculating the rack fit.
  napkin_math: '1. Recall TDPs: A100 = 400W, H100 = 700W. 2. Calculate 8x GPU thermal output: A100 = 8
    * 400W = 3,200W (3.2 kW); H100 = 8 * 700W = 5,600W (5.6 kW). 3. Calculate total server heat: H100
    server = 5.6 kW + 2.0 kW (system) = 7.6 kW. A100 server = 3.2 kW + 2.0 kW (system) = 5.2 kW. 4. Determine
    rack capacity (15 kW limit): For H100 servers = 15 kW / 7.6 kW = ~1.97. Since we need whole servers,
    the rack can only cool 1 full 8x H100 server.'
