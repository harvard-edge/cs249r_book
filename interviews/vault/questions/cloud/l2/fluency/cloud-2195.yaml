id: cloud-2195
title: The Roofline Diagnostic
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'You profile a custom CUDA kernel and measure 50 TFLOPS achieved throughput on an H100 (peak:
  989 TFLOPS FP16). Your kernel''s arithmetic intensity is 8 FLOPs/byte. The H100 has 3.35 TB/s HBM bandwidth.
  Is this kernel compute-bound or memory-bound, and what is its theoretical attainable performance according
  to the roofline model?'
details:
  realistic_solution: 'Calculate the memory-bandwidth ceiling: 8 FLOPs/byte x 3.35 TB/s = 26.8 TFLOPS.
    The ridge point is 989 / 3.35 = 295 FLOPs/byte. Since 8 << 295, this kernel is deeply memory-bound.
    The theoretical attainable performance is 26.8 TFLOPS, not 989 TFLOPS. Achieving 50 TFLOPS means the
    kernel is actually performing at 1.87x the naive bandwidth ceiling — likely exploiting L2 cache hits.
    The kernel is well-optimized; adding more compute won''t help. The fix is to increase arithmetic intensity
    (e.g., through operator fusion or tiling).'
  common_mistake: Seeing 50 TFLOPS out of 989 TFLOPS peak and immediately concluding 'the kernel is poorly
    optimized.' Without checking the roofline, you don't know whether the kernel is already hitting the
    memory bandwidth ceiling.
  napkin_math: Bandwidth ceiling = 8 FLOPs/byte x 3,350 GB/s = 26,800 GFLOPS = 26.8 TFLOPS. Achieved =
    50 TFLOPS > 26.8 TFLOPS => effective cache hit rate is absorbing ~47% of memory traffic. Ridge point
    = 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte. Kernel AI = 8 << 295 => deeply memory-bound.
