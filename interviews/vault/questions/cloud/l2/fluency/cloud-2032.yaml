id: cloud-2032
title: The RAG Latency Composition
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'A RAG pipeline has three serial stages: embedding the query (15ms), vector search (8ms), and
  LLM generation with retrieved context (TTFT 180ms, TPOT 25ms for 150 tokens). What is the total end-to-end
  time to first token, and what is the total request time?'
details:
  realistic_solution: User-perceived TTFT = embedding (15ms) + vector search (8ms) + LLM TTFT (180ms)
    = 203ms. Total request time = 203ms + decode (150 × 25ms) = 203ms + 3,750ms = 3,953ms ≈ 4 seconds.
    The retrieval overhead adds only 23ms to TTFT (~13% increase), but the critical insight is that these
    stages are serial — you cannot start LLM prefill until retrieval completes.
  common_mistake: Reporting only the LLM generation time and ignoring the retrieval overhead, or forgetting
    that TTFT is measured from the user's perspective — which includes all upstream stages.
  napkin_math: User TTFT = 15 + 8 + 180 = 203ms. Decode = 150 tokens × 25ms = 3,750ms. Total E2E = 203
    + 3,750 = 3,953ms.
