title: Why Time-to-Train Uses Target Accuracy Not Epochs
topic: latency-decomposition
status: published
provenance: imported
scenario: Explain why MLPerf Training uses 'time to reach target accuracy' rather than 'time per epoch'
  or 'time for N steps' as its primary benchmark metric.
details:
  realistic_solution: 'Time-per-epoch measures raw throughput but ignores statistical efficiency — a system
    that processes data faster but converges slower could win on throughput yet lose on time-to-solution.
    Target accuracy captures the full optimization: hardware throughput, software efficiency, numerical
    stability, and hyperparameter tuning all contribute. A team might use larger batch sizes (higher throughput
    per step but worse convergence), or mixed precision (faster compute but potentially more steps needed).
    Time-to-target-accuracy is the only metric that captures these trade-offs holistically. It also prevents
    gaming — you cannot claim a fast system if it never reaches the quality threshold. The target is statistically
    verified across multiple runs to account for training variance.'
  common_mistake: Equating higher throughput (samples/sec) with faster training. Larger batch sizes increase
    throughput but often require more total steps to converge.
  napkin_math: 'System A: 100 steps/sec, needs 10K steps = 100s. System B: 80 steps/sec, needs 7K steps
    = 87.5s. B is slower per-step but 12.5% faster to target.'
