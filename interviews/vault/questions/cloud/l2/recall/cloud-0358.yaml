id: cloud-0358
title: The RAG Fleet Update Bill
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'You are the systems engineer for a fleet of 10,000 autonomous vehicles. Each vehicle uses a
  Retrieval-Augmented Generation (RAG) system to provide a voice assistant to the driver. The system has
  two components: a 7B parameter LLM for generation and a vector index for retrieval. The 7B LLM is static
  and rarely changes. You need to push a monthly Over-the-Air (OTA) update to the fleet that refreshes
  the vector index with new map and point-of-interest data. The compressed vector index payload is 500
  MB. Your cloud provider charges for data egress. Explain how to calculate the total data payload you
  will be billed for to update the entire fleet, and what that total is.'
details:
  realistic_solution: The key is to multiply the size of the update payload by the number of devices in
    the fleet. The size of the 7B LLM is a distractor, as the scenario specifies only the vector index
    is being updated. This is a common and efficient strategy; updating a data artifact (the RAG index)
    is much cheaper than re-deploying a full multi-gigabyte model.
  common_mistake: 'Engineers often make two mistakes here: 1) They calculate the cost for a single device,
    forgetting to multiply by the fleet size, thus underestimating the operational cost by orders of magnitude.
    2) They confuse the size of the model (the 7B LLM, which is ~14 GB) with the size of the data payload
    being updated (the 500 MB index), leading to a massive overestimation of the required data transfer.'
  napkin_math: '1. **Identify per-device payload:** 500 MB (since the 7B LLM is static, only the vector
    index is pushed).

    2. **Calculate Total Fleet Payload:**

    10,000 vehicles × 500 MB/vehicle = 5,000,000 MB.

    3. **Convert to Terabytes:** 5,000,000 MB / 1,000 = 5,000 GB = 5 TB.

    Sending just the index update costs 5 TB of cellular bandwidth, significantly cheaper than pushing
    multi-GB models.'
