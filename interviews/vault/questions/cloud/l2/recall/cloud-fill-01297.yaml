id: cloud-fill-01297
title: Google TPU v5e Inference Degradation Strategy
topic: graceful-degradation
status: published
provenance: imported
scenario: You are deploying a large language model (LLM) for real-time inference on a fleet of Google
  TPU v5e accelerators. Each TPU v5e unit boasts 16 GB of HBM, 197 TFLOPS (BF16), and a memory bandwidth
  of 1.6 TB/s. Due to an unexpected surge in traffic, the TPUs are operating at 95% utilization, leading
  to increased latency and occasional inference failures. Describe how you would implement a graceful
  degradation strategy for this critical service, considering the specific hardware constraints and performance
  metrics of the TPU v5e.
details:
  realistic_solution: 'Implement a multi-tier degradation ladder:

    1.  **Tier 1 (Soft Degradation):** Initially, reduce the batch size for inference requests or dynamically
    prune less critical output features from the LLM, maintaining the primary model on the TPU. This slightly
    reduces computational load and HBM usage.

    2.  **Tier 2 (Model Fallback):** If congestion persists, switch to a smaller, more efficient LLM version
    (e.g., a distilled model) that requires less HBM and fewer TFLOPS, still running on the TPU v5e. This
    provides acceptable quality with higher throughput.

    3.  **Tier 3 (QoS Shedding/Fail-operational):** For extremely high load, implement quality-of-service
    shedding by prioritizing critical requests and queueing or rate-limiting less critical ones. Simultaneously,
    set up a CPU-based fallback inference service (e.g., on a GCE instance with high core count) for the
    smallest, most robust model, to handle overflow traffic or complete TPU failure. This ensures the
    service remains operational, albeit at a significantly reduced quality and higher latency.'
  common_mistake: A common mistake is to only have a single, high-performance model and no prepared fallback
    options. When the primary system fails or degrades, the service completely collapses instead of offering
    a reduced but functional experience. Another mistake is hard-coding thresholds for degradation without
    dynamic adjustments or predictive signals.
  napkin_math: Assume the primary LLM requires 12 GB HBM per TPU for model weights and activations. A
    smaller fallback model might only need 4 GB HBM. If a TPU v5e can process N inferences/second at full
    fidelity (197 TFLOPS, 1.6 TB/s bandwidth), switching to a smaller model might allow 2N inferences/second
    while consuming 75% less HBM bandwidth. If the inference time for the primary model is `T_primary`
    on TPU, and the fallback CPU model is `T_cpu = 10 * T_primary`, what is the throughput impact of offloading
    10% of traffic to the CPU fallback when TPUs are saturated?
