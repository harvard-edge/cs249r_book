id: cloud-0052
title: The Rollout Memory Budget
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are a Staff ML Systems Engineer planning a service update. You need to roll out a new 13B
  parameter LLM to replace an existing 7B parameter model used in a RAG-based customer support chatbot.
  The entire fleet of 500 serving instances will be updated. Both models are served in FP16 precision.
  Calculate the *total additional* HBM memory capacity required across the entire fleet to accommodate
  the larger model.
details:
  realistic_solution: The correct approach is to calculate the memory increase per instance caused by
    the model upgrade, and then multiply that delta by the total number of instances in the serving fleet.
    This gives the precise additional capacity needed for the rollout.
  common_mistake: A common mistake is to calculate the total memory required for the new fleet (13B params
    × 2 bytes/param × 500 instances = 13 TB) instead of the *additional* or *delta* memory needed. This
    leads to requesting far more capacity than necessary for the upgrade. Another error is to confuse
    model parameters with memory footprint, forgetting to multiply by the bytes-per-parameter for the
    given precision.
  napkin_math: 1. **Calculate parameter increase:** 13B params - 7B params = 6B additional parameters.
