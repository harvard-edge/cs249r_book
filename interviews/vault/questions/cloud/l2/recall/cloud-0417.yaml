id: cloud-0417
title: 'The H100 Roofline Ridge Point: Roofline Analysis'
topic: roofline-analysis
status: published
provenance: imported
scenario: An NVIDIA H100 GPU provides 989 TFLOPS of FP16 compute and 3.35 TB/s of HBM3 memory bandwidth.
  To write efficient kernels, you need to understand the machine's balance between compute and memory.
details:
  realistic_solution: The ridge point is a hardware characteristic that defines the transition from memory-bound
    to compute-bound performance. It's the minimum arithmetic intensity (FLOPs/Byte) an algorithm must
    have to saturate the GPU's compute units. For the H100, any kernel with an arithmetic intensity below
    this value will be bottlenecked by memory bandwidth; any kernel above it will be bottlenecked by raw
    compute power.
  common_mistake: The most common mistake is to confuse the units, for example, dividing TFLOPS by GB/s
    (a factor of 1,000 difference from TB/s), leading to a vastly incorrect result. Another error is inverting
    the ratio (Bandwidth / Compute), which calculates Bytes/FLOP instead of the ridge point. Conceptually,
    engineers sometimes forget that the ridge point is a fixed characteristic of the hardware, not the
    algorithm being run.
  napkin_math: The Ridge Point is calculated as the ratio of peak compute to peak memory bandwidth.
