id: cloud-cell-13246
title: Recall TCO CapEx vs OpEx Split for GPU Cloud Training
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'During a cloud ML infrastructure interview, you are asked: for an on-premises H100 cluster
  with 8 GPUs at $30,000/GPU, 3-year depreciation, 70% average utilization, $0.12/kWh electricity, 700W
  TDP per GPU, and 1.4 PUE data center overhead — what is the fully-loaded hourly cost per GPU including
  CapEx amortization and OpEx?'
details:
  realistic_solution: 'CapEx per GPU: $30,000. Amortization: 3 years × 8760 h/year = 26,280 h total. At
    70% utilization: 18,396 productive hours. CapEx rate: $30,000/26,280h = $1.14/h/GPU (calendar). Including
    networking, racks, etc. (1.5× multiplier): $1.71/h. Power: 700W × 1.4 PUE = 980W per GPU. Power cost:
    980W × $0.12/kWh / 1000 = $0.118/h. Total fully-loaded: $1.71 + $0.12 = $1.83/h per GPU. Cloud H100
    spot: ~$2.00-2.50/h. On-prem saves ~$0.20-0.67/h per GPU if fully utilized.'
  common_mistake: Computing only hardware cost without including power, cooling (PUE), and utilization
    discount; also forgetting to amortize over utilization hours not calendar hours.
  napkin_math: 'CapEx: $30K / (3×8760h) = $1.14/GPU/h. With 1.5× infra multiplier: $1.71/h. Power: 0.98kW
    × $0.12 = $0.12/h. Total: $1.83/GPU/h. Cloud H100 at $2.20/h: on-prem saves $0.37/h × 8 GPUs × 8760h
    × 0.7 util = $18,240/year per 8-GPU node.'
