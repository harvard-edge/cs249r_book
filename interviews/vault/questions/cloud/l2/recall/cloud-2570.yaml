title: Cloud Red Teaming L2 0
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Before deploying a customer-facing chatbot, your safety team conducts red teaming. Your interviewer
  asks how red teaming differs from standard model evaluation and why it is necessary as a systems concern.
details:
  realistic_solution: 'Standard evaluation measures model quality on curated benchmarks (accuracy, perplexity).
    Red teaming actively tries to make the model fail — generating harmful content, leaking training data,
    bypassing safety filters, or producing hallucinations under adversarial prompts. It is a systems concern
    because: (1) failure modes compound with scale — 1M users/day means even 0.01% failure rate = 100
    harmful outputs daily, (2) adversarial users actively craft inputs that benchmarks don''t cover, (3)
    safety filters are part of the serving pipeline (not just the model) and must be tested end-to-end.
    Red teaming tests the full deployed stack: model + filters + rate limiting + monitoring.'
  common_mistake: Treating red teaming as a one-time pre-launch activity. Models evolve (fine-tuning,
    prompt changes), user behavior shifts, and new attack vectors emerge continuously. Red teaming must
    be an ongoing process integrated into the deployment pipeline.
  napkin_math: '1M daily requests, 0.01% adversarial failure rate = 100 harmful outputs/day = 36,500/year.
    If 1% go viral (legal/PR damage): 365 incidents/year. Red teaming budget to find these: ~$50K-200K.
    Cost of one PR crisis: $1M+. ROI: 5-20x.'
