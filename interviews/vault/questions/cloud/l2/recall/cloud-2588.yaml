title: Cloud Inference Accelerator Selection L2 0
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your company serves a single 7B model at high volume. A vendor pitches their custom ASIC claiming
  '10x better cost-per-token than A100.' Explain what factors to evaluate beyond the headline metric.
details:
  realistic_solution: 'Key evaluation factors: (1) Batch size sensitivity — ASICs often excel at specific
    batch sizes but degrade at others. Test at your actual traffic distribution. (2) Model architecture
    support — custom silicon may not support attention variants, custom activations, or future architectures.
    (3) Software ecosystem maturity — CUDA has decades of optimization; custom compiler toolchains may
    have bugs, poor debugging, or limited operator coverage. (4) Vendor lock-in — migrating models to
    proprietary hardware ties you to one vendor''s roadmap. (5) Total cost of ownership — factor in engineering
    time for porting, testing, and maintaining custom deployments. (6) Upgrade path — GPU generations
    improve annually; ASIC refresh cycles are longer.'
  common_mistake: Comparing cost-per-token at peak throughput. ASICs often achieve headline numbers at
    optimal batch sizes that may not match real traffic patterns. At low batch sizes or variable loads,
    the advantage may shrink to 2-3x.
  napkin_math: 'A100 serving 7B: ~$0.001/1K tokens. ASIC at 10x: $0.0001/1K tokens. 10M requests/day ×
    200 tokens = 2B tokens/day. A100: $2K/day. ASIC: $200/day. Savings: $1,800/day = $657K/year. But porting
    cost: 3 engineer-months × $50K = $150K. Break-even: 83 days.'
