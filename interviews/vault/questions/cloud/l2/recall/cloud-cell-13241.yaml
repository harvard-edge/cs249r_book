id: cloud-cell-13241
title: Recall Systolic Array Weight-Stationary Dataflow
topic: systolic-dataflow
status: published
provenance: imported
scenario: 'An interviewer asks: in a weight-stationary systolic array like the original TPU v1 (256×256
  MAC array), what data moves during matrix multiply and what stays stationary? Specifically: for a 256×256
  weight matrix W and a batch of 64 input vectors x, how many times is each weight element read from memory,
  and what is the total data movement compared to a naive implementation?'
details:
  realistic_solution: 'NVLink transfer: 4M×2B = 8MB. At 900 GB/s: 8MB/900GB/s = 8.9μs ≈ 9.3μs with overhead
    (not 18.5μs which halves the bandwidth).'
  common_mistake: Confusing weight-stationary with output-stationary; in weight-stationary, weights are
    loaded once and held in register files while inputs flow through, but outputs accumulate across multiple
    input vectors.
  napkin_math: 'H100 NVLink 4.0: 900 GB/s. Activation tensor: 4M params × 2B = 8MB. Transfer time: 8MB
    / 900 GB/s = 8×10^-3 / 900 = 8.89×10^-6 s ≈ 8.9μs ≈ 9.3μs with protocol overhead (not 18.5μs which
    would use 450 GB/s).'
