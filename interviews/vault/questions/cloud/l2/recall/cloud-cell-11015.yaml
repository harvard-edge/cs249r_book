id: cloud-cell-11015
title: 'Dataset Curation: Recall — What is Perplexity-Based Data Filtering?'
topic: dataset-curation
status: published
provenance: imported
scenario: In the context of LLM pre-training data curation on H100 clusters, what is perplexity-based
  filtering, and what threshold range is commonly used to classify low-quality versus high-quality documents?
details:
  realistic_solution: 'A small N-gram LM (e.g., KenLM 5-gram) or small neural LM scores each document.
    Low perplexity = document resembles training distribution of the reference LM. Thresholds: perplexity
    < 100-300 = high quality; > 1000 = noise/gibberish.'
  common_mistake: Confusing model perplexity (eval metric) with document perplexity used for quality filtering;
    not knowing that a small reference LM is used, not the model being trained.
  napkin_math: 'KenLM scoring: ~10K docs/sec/CPU core. For 1B documents on 512 cores: 1B / (512 × 10K)
    = 195 seconds ≈ 3.3 minutes total scoring time. Common CCNet setup uses perplexity buckets: head (<
    100), middle (100-1000), tail (> 1000) — only head + middle buckets used for training.'
