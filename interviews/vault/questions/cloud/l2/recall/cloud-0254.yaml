schema_version: 1
id: cloud-0254
title: Calculating GEMM Kernel Intensity
topic: roofline-analysis
status: published
provenance: imported
scenario: Imagine a single GEMM (General Matrix-Matrix Multiplication) kernel is the core of your model's
  attention layer. This specific kernel performs 200 GFLOPs of computation. To do this, it needs to read
  two 500MB matrices from HBM and write a 500MB result matrix back to HBM. Explain how you would calculate
  the Arithmetic Intensity for this kernel and what the result is.
details:
  realistic_solution: 'Arithmetic Intensity (AI) is the ratio of total floating-point operations to the
    total bytes moved to and from memory. The total data moved includes all reads and all writes required
    for the computation. In this case: Total bytes moved = 500 MB (read matrix A) + 500 MB (read matrix
    B) + 500 MB (write result C) = 1,500 MB = 1.5 GB. AI = 200 GFLOPs / 1.5 GB = 133.3 FLOPs/Byte. This
    value can then be compared against the GPU''s ridge point to determine if the kernel is compute-bound
    or memory-bound. On an H100 with a ridge point of ~295 FLOPs/Byte, this kernel at 133.3 FLOPs/Byte
    would be memory-bound.'
  common_mistake: The most common mistake is to only count the input data (the two 500MB reads) and forget
    to include the output data (the 500MB write) in the total memory traffic. This undercounts the total
    bytes moved and inflates the perceived arithmetic intensity. Another error is inverting the ratio
    to Bytes/FLOP.
  napkin_math: '1. **Calculate Total FLOPs:** | `Total FLOPs = 200 * 10^9 FLOPs`. 2. **Calculate Total
    Bytes Moved:** | Reads: 500 MB + 500 MB = 1,000 MB. | Writes: 500 MB. | Total = 1,000 + 500 = 1,500
    MB = 1.5 * 10^9 Bytes. 3. **Calculate Arithmetic Intensity:** | AI = Total FLOPs / Total Bytes = 200
    * 10^9 / 1.5 * 10^9 = **133.3 FLOPs/Byte**. 4. **Interpret on H100:** Ridge point = 989 TFLOPS / 3.35
    TB/s ≈ 295 FLOPs/Byte. Since 133.3 < 295, this kernel is **memory-bound** on the H100. Its achievable
    performance is: 133.3 FLOPs/Byte × 3.35 TB/s = 446.6 TFLOPS (only 45% of peak compute).'
