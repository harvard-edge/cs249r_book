id: cloud-0023
title: The Blue/Green Memory Squeeze
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are managing a fleet of H100 GPUs, each with 80 GB of HBM memory. Your current service runs
  a 15-billion parameter model served in FP16 precision. The team wants to upgrade to a 30-billion parameter
  model using a blue/green deployment strategy on each node. This means that for a brief period, both
  the old and new models must be loaded into a single GPU's memory simultaneously before traffic is switched.
  Can a single H100 support this deployment strategy? Explain your calculation.
details:
  realistic_solution: No, a single H100 cannot support this strategy. The total memory required during
    the transition exceeds the GPU's capacity.
  common_mistake: Engineers often calculate the memory needed for the new model and see if it fits, completely
    forgetting that a blue/green deployment requires holding *both* the old and new models in memory concurrently.
    This leads to an incorrect assessment that the deployment is possible, which would cause out-of-memory
    (OOM) errors in production.
  napkin_math: 'Old Model: 15B params × 2 bytes/param (FP16) = 30 GB'
