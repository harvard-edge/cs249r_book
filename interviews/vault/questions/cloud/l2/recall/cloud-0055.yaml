schema_version: 1
id: cloud-0055
title: The Concurrent User Limit
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is deploying a new 13B parameter LLM for a real-time coding assistant on a single
  NVIDIA H100 GPU. The service level objective (SLO) requires an average generation speed of at least
  64 tokens per second for each user to feel interactive. Assuming the serving stack is well-optimized
  with continuous batching and achieves 50% of the H100's peak FP16 compute throughput, explain how you
  would calculate the maximum number of concurrent users the server can support.
details:
  realistic_solution: The correct approach is to first determine the GPU's effective throughput in FLOPs
    by applying the utilization factor to its peak performance. Second, calculate the FLOPs required to
    generate a single token for the 13B model. Dividing the GPU's effective throughput by the per-token
    cost gives the total number of tokens the system can generate per second. Finally, dividing this total
    token capacity by the per-user requirement yields the maximum number of concurrent users.
  common_mistake: Candidates often calculate throughput using the GPU's theoretical peak TFLOPS, ignoring
    realistic utilization (MFU - Model FLOPs Utilization). Peak numbers are unattainable in practice due
    to memory bandwidth bottlenecks and other system overheads. A second common mistake is to ignore the
    impact of batching; without an efficient strategy like continuous batching, the GPU would be severely
    underutilized and latency-bound, supporting far fewer users than this calculation implies.
  napkin_math: 1. **H100 Effective Compute:** An H100 provides 989 TFLOPS (FP16). At a realistic 50% utilization,
    the effective throughput is `989 TFLOPS * 0.5 = 494.5` TFLOPS.
