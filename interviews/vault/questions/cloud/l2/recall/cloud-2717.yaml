id: cloud-2717
title: MTBF vs Cluster MTBF
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: A GPU vendor quotes an MTBF of 100,000 hours per GPU. Your cluster has 1,000 GPUs. Explain why
  the cluster-level MTBF is dramatically different from the per-component MTBF.
details:
  realistic_solution: 'MTBF for the cluster equals the per-component MTBF divided by the number of components
    (assuming independent failures and that any failure disrupts the job). Cluster MTBF = 100,000 hours
    / 1,000 GPUs = 100 hours. That means you should expect a GPU failure somewhere in the cluster roughly
    every 4 days. This is why large-scale training requires checkpointing, fault tolerance, and redundancy.
    The larger the cluster, the worse it gets: at 10,000 GPUs, cluster MTBF drops to 10 hours — a failure
    roughly every half day. This inverse scaling of reliability with cluster size is the fundamental reason
    distributed training systems need sophisticated fault tolerance.'
  common_mistake: Assuming the cluster is as reliable as a single GPU. Cluster MTBF is the per-component
    MTBF divided by the number of components, assuming any single failure impacts the job.
  napkin_math: 'Cluster MTBF = Component MTBF / N. 1000 GPUs: 100,000/1,000 = 100 hours (~4 days). 10,000
    GPUs: 10 hours.'
