id: cloud-fill-01016
title: H100 Tensor Parallelism and Communication Overlap
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: You are tasked with deploying a large transformer model requiring tensor parallelism across
  multiple NVIDIA H100 GPUs, each equipped with 80 GB HBM3 memory, 989 TFLOPS FP16 dense compute capability,
  and high-speed NVLink interconnects. A critical layer in your model uses column partitioning for its
  weight matrix. Describe the communication challenges introduced by this partitioning and how you would
  leverage the H100's capabilities to maximize communication-computation overlap.
details:
  realistic_solution: To maximize communication-computation overlap, one would strategically pipeline
    computation and communication. For a column-partitioned linear layer, the partial results on each
    GPU can be computed first. Then, an all-gather operation can be initiated for the full output, which
    overlaps with the computation of the subsequent, independent layers or the next stage of the current
    layer. Utilizing the H100's high NVLink bandwidth (e.g., 900 GB/s bidirectional for SXM5) is crucial,
    ensuring that communication is as efficient as possible. Advanced techniques like asynchronous communication
    primitives and careful workload balancing across GPUs would be employed.
  common_mistake: A common mistake is underestimating the latency and bandwidth costs of inter-GPU communication,
    particularly for fine-grained tensor parallelism. Engineers might design partitioning schemes that
    lead to frequent synchronization points, effectively serializing computation and communication, thus
    failing to fully utilize the H100's powerful compute capabilities.
  napkin_math: Consider an all-gather operation for a 10GB tensor across 8 H100 GPUs, where each GPU contributes
    1.25GB of its output. With an effective NVLink bandwidth of 900 GB/s per GPU for inter-device communication,
    the theoretical minimum time to transfer 7 * 1.25 GB (data received by one GPU) would be approximately
    (7 * 1.25 GB) / 900 GB/s ≈ 8.75 GB / 900 GB/s ≈ 0.0097 seconds. This minimal time for communication
    emphasizes the need to overlap it with computation, as even short communication stalls can become
    significant over many layers.
