id: cloud-0063
title: 'The Blue-Green Memory Tax: Model Serving Infrastructure'
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is updating the LLM for an in-car voice assistant. You are moving from a 7B parameter
  model to a 13B parameter model. Your Kubernetes cluster uses a blue-green deployment strategy, meaning
  for a short time during the rollout, both the old (blue) and new (green) models must be loaded in memory
  on the same nodes before traffic is switched. Explain how much total HBM memory will be consumed *just
  for the model weights* on a node running both models during this transition period, assuming the models
  are loaded in FP16 precision.
details:
  realistic_solution: The correct approach is to calculate the memory required for each model individually
    and then sum them up. In a blue-green deployment, both models co-exist in the cluster's memory to
    allow for instant traffic switching and rollback. An FP16 parameter requires 2 bytes of storage.
  common_mistake: Engineers often only plan for the final state (the new, larger model), forgetting that
    during a blue-green transition, resources must accommodate both versions simultaneously. This leads
    to insufficient memory provisioning, causing nodes to crash during the rollout. Another common error
    is using the wrong number of bytes for the given precision (e.g., calculating for INT8 instead of
    FP16).
