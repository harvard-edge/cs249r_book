id: cloud-2287
title: The Fairness Impossibility Tradeoff
topic: fairness-evaluation
status: published
provenance: imported
scenario: Your team's loan approval model must satisfy both demographic parity (equal approval rates across
  groups) and equalized odds (equal TPR and FPR across groups). A fairness researcher on the team says
  satisfying both simultaneously is mathematically impossible except in trivial cases. Why?
details:
  realistic_solution: 'The Chouldechova-Kleinberg impossibility theorem (2016-2017) proves that when base
    rates differ between groups (e.g., different default rates across demographics), you cannot simultaneously
    satisfy calibration, equalized odds, and demographic parity. Intuitively: if Group A has a 5% default
    rate and Group B has 15%, equalizing approval rates (demographic parity) forces different score thresholds
    per group, which breaks equalized odds. Conversely, enforcing equal error rates across groups with
    different base rates necessarily produces unequal approval rates. This means every fairness-aware
    system must make an explicit policy choice about which fairness criterion to prioritize — this is
    a design decision, not a technical optimization.'
  common_mistake: Assuming you can tune thresholds to satisfy all fairness criteria at once. The impossibility
    is mathematical, not an engineering limitation — no amount of compute or data fixes it.
  napkin_math: Let base default rates be Group A = 5%, Group B = 15%. Demographic Parity requires equal
    approval rates, say 80% for both. To reach 80% in the riskier Group B, the model must lower its approval
    threshold significantly compared to Group A. A lower threshold naturally increases the False Positive
    Rate (approving bad loans). Therefore, FPR_B heavily exceeds FPR_A, mathematically breaking Equalized
    Odds.
