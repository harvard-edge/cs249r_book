id: cloud-0258
title: The Mixed Precision Memory Budget
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are tasked with training a 7 billion parameter language model using the Adam optimizer.
  A standard FP32 training run requires approximately 16 bytes of memory per parameter (4 for the model
  weights, 4 for the gradients, and 8 for the Adam optimizer's momentum and variance). Your H100 GPU has
  80GB of HBM. To reduce the memory footprint, you switch to mixed-precision training. In this setup,
  the forward and backward passes use FP16 for weights and gradients, but you still maintain a master
  copy of the weights and the full optimizer state in FP32 for stable updates. Explain the new memory
  composition and calculate the total peak memory requirement in Gigabytes (GB).
details:
  realistic_solution: 'In mixed-precision training, only the model weights used during computation and
    the gradients are downcast to FP16. The high-precision master copy of the weights and the optimizer
    state remain in FP32. The memory composition per parameter becomes: FP16 weights (2 bytes) + FP16
    gradients (2 bytes) + FP32 master weights (4 bytes) + FP32 optimizer state — momentum (4 bytes) +
    variance (4 bytes) = 16 bytes per parameter total. Surprisingly, the per-parameter memory for mixed
    precision (16 bytes) is the same as pure FP32 training (16 bytes) when accounting for all components.
    The real memory savings from mixed precision come from reduced activation memory (activations stored
    in FP16 use half the space) and faster computation throughput from FP16 tensor cores, not from parameter
    storage.'
  common_mistake: A common mistake is assuming 'mixed precision' simply halves the total memory requirement
    (e.g., from 16 bytes/param to 8 bytes/param). This is incorrect because the Adam optimizer's state
    (its momentum and variance accumulators) must be kept in FP32 to prevent loss of precision during
    updates, and a master copy of the weights is also kept in FP32. These components do not get compressed
    and constitute the majority of the memory footprint.
  napkin_math: '1. Identify persistent FP32 components: Master Weights (4 bytes) and Optimizer State (8
    bytes). 2. Identify FP16 components: Working weights (2 bytes) + Gradients (2 bytes). 3. **Total per
    parameter:** 2 + 2 + 4 + 4 + 4 = **16 bytes/param** (same as pure FP32!). 4. **Total for 7B model:**
    7 × 10^9 params × 16 bytes = 112 × 10^9 bytes = **112 GB**. 5. **Does it fit on H100 (80GB)?** No
    — 112 GB > 80 GB. Even with mixed precision, a 7B model''s optimizer state alone does not fit on a
    single H100. You need either model parallelism, gradient checkpointing (to reduce activation memory),
    or optimizer sharding (ZeRO Stage 2+). 6. **Key insight:** Mixed precision does NOT reduce parameter-related
    memory. Its benefits are: (a) 2x reduction in activation memory, (b) 2x faster tensor core throughput,
    and (c) reduced communication volume in distributed training.'
