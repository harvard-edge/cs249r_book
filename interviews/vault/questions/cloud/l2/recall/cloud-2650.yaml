id: cloud-2650
title: How Pipeline Jungles Form
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Explain how a well-intentioned ML data pipeline evolves into a 'pipeline jungle' and why these
  are particularly dangerous compared to regular code complexity.
details:
  realistic_solution: 'Pipeline jungles grow incrementally: (1) v1 has a simple ETL script. (2) A new
    data source requires a join, added as a separate script with an intermediate file. (3) A feature engineering
    step is inserted, reading from both scripts'' outputs. (4) A data quality fix adds a cleaning step
    that only some downstream scripts use. (5) A model needs historical features, adding a backfill script.
    After 12-18 months, you have 20+ scripts with implicit dependencies through intermediate files, no
    centralized schema, and no documentation of data lineage. This is worse than code complexity because:
    (1) failures are silent — a corrupted intermediate file produces wrong features, not an error. (2)
    Testing is nearly impossible — you cannot unit test a pipeline that depends on production data state.
    (3) Changes are terrifying — modifying one script may break unknown downstream consumers. The fundamental
    issue is that pipelines encode implicit contracts through file formats rather than explicit interfaces.'
  common_mistake: Treating pipeline complexity as a code problem solvable by refactoring. The real issue
    is the lack of explicit data contracts and lineage tracking between pipeline stages.
  napkin_math: 'Typical pipeline jungle: 20+ scripts, 50+ intermediate files, ~5 undocumented dependencies
    per script. Change impact analysis: intractable without data lineage tooling.'
