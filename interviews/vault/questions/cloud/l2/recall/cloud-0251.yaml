schema_version: 1
id: cloud-0251
title: The Energy Cost of Solitude
topic: power-budgeting
status: published
provenance: imported
scenario: You are optimizing an inference serving stack on an H100 GPU which has a 700W TDP. For your
  model, you've measured that latency for a single request (batch size 1) is 10ms. By creating micro-batches
  of 32 requests, the latency for the entire batch only increases to 60ms. Explain the impact of this
  batching strategy by calculating how much more energy is consumed *per individual request* when using
  batch size 1 compared to batch size 32.
details:
  realistic_solution: The key is to calculate the total energy (Power × Time) for each scenario and then
    divide by the number of requests to find the per-request energy. For batch size 1, the GPU is active
    for a short time for just one request. For batch size 32, the GPU is active for a slightly longer
    time, but that energy cost is amortized across 32 requests, leading to a dramatic reduction in per-request
    energy consumption.
  common_mistake: A common mistake is to confuse power (Watts) with energy (Joules). Engineers might incorrectly
    assume that since the GPU power is 700W in both cases, the energy consumption is similar. Another
    mistake is to assume latency scales linearly with batch size, which would incorrectly imply that batching
    provides no energy benefit.
  napkin_math: '**Energy = Power × Time** | **Batch size 1:** | Power: 700 W, Latency: 10 ms = 0.01 s
    | Energy per batch = 700 × 0.01 = 7.0 Joules | Requests in batch: 1 | Energy per request = 7.0 / 1
    = **7.0 J/request** | **Batch size 32:** | Power: 700 W, Latency: 60 ms = 0.06 s | Energy per batch
    = 700 × 0.06 = 42.0 Joules | Requests in batch: 32 | Energy per request = 42.0 / 32 = **1.3125 J/request**
    | **Comparison:** | Ratio = 7.0 / 1.3125 = **5.33×** | Batch size 1 consumes 5.33× more energy per
    request than batch size 32. | Batching amortizes the fixed GPU power draw across many requests, dramatically
    improving energy efficiency.'
