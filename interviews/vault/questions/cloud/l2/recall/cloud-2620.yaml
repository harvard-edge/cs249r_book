id: cloud-2620
title: Training Memory Footprint Breakdown
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Explain why training a model requires 4-8x more memory than inference, breaking down the major
  memory consumers during a training step.
details:
  realistic_solution: 'During inference, you store only weights + activations for the current layer. During
    training, memory is consumed by: (1) Model weights — same as inference (2 bytes/param FP16). (2) Gradients
    — same size as weights (2 bytes/param). (3) Optimizer states — Adam stores momentum + variance in
    FP32 = 8 bytes/param. (4) Activations — saved for backward pass across ALL layers simultaneously,
    often the largest consumer for large batch sizes. For mixed-precision training with Adam: 2 (FP16
    weights) + 2 (FP16 gradients) + 4 (FP32 master weights) + 4 (momentum) + 4 (variance) = 16 bytes/param,
    which is 8x the 2 bytes/param for FP16 inference weights alone.'
  common_mistake: Forgetting optimizer states. Adam alone requires 12 extra bytes/param (FP32 master weights
    + momentum + variance) beyond the FP16 working copies.
  napkin_math: '1B param model: Inference = 2GB (FP16 weights). Training = 16GB (weights+grads+optimizer)
    + activations. That''s 8x+ more memory.'
