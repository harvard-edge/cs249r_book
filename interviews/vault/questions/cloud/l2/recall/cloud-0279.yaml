schema_version: 1
id: cloud-0279
title: The Batch Size 1 Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: An engineer is profiling a ResNet-50 vision model for a real-time inference application on an
  NVIDIA H100 GPU. The profiler shows that for a single image (batch size 1), the forward pass requires
  approximately 8 GFLOPs of computation and involves moving 32 MB of data (weights and activations) from
  HBM3 to the compute cores.
details:
  realistic_solution: The workload is memory-bound. The arithmetic intensity (AI) is the ratio of compute
    to memory operations. Since the model's AI is lower than the H100's ridge point, it means the GPU's
    memory system cannot supply data fast enough to keep the powerful compute cores fully saturated. The
    system will spend more time waiting for data than it does computing on it.
  common_mistake: Engineers often misinterpret arithmetic intensity as an absolute measure. A value like
    '250 Ops/Byte' might sound high, leading them to incorrectly assume the workload is compute-bound.
    The critical step is comparing this value to the GPU's *ridge point*. Anything below the ridge point
    is memory-bound, regardless of the absolute number.
  napkin_math: '1. Forward Pass Compute: 8 GigaFLOPs (8 * 10^9 FLOPs).

    2. Data Movement: 32 MegaBytes (32 * 10^6 Bytes).

    3. Arithmetic Intensity (AI) = 8 * 10^9 / 32 * 10^6 = 250 FLOPs/Byte.

    4. H100 Ridge Point = 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/Byte.

    Since 250 < 295, the AI is below the ridge point. The H100 will process the data faster than HBM3
    can supply it, making the workload memory-bound.'
