id: cloud-fill-01052
title: NVIDIA H100 Multi-tenancy with MIG for Resource Sharing
topic: scheduling-resource-management
status: published
provenance: imported
scenario: A data science team is deploying various deep learning models for training and inference on
  a cluster equipped with NVIDIA H100 GPUs. Each H100 boasts 80 GB HBM3 memory, 989 TFLOPS FP16 dense
  performance, 3.35 TB/s memory bandwidth, and a 700W TDP. Multiple users and services need to share these
  powerful resources concurrently. Describe how Multi-Instance GPU (MIG) technology on the NVIDIA H100
  enables effective multi-tenant resource sharing and what specific resource guarantees or isolation characteristics
  each partitioned instance provides.
details:
  realistic_solution: The NVIDIA H100's MIG capability allows a single GPU to be securely partitioned
    into up to seven fully independent GPU instances (e.g., 7x 10GB MIG instances). Each MIG instance
    has dedicated, isolated resources including streaming multiprocessors (SMs), GPU engines (copy engines,
    decoders), L2 cache, and a portion of the HBM3 memory. This hardware-level partitioning ensures quality
    of service (QoS), fault isolation, and predictable performance for each tenant. Workloads can be scheduled
    directly onto these specific MIG devices, similar to scheduling on discrete GPUs, facilitating robust
    multi-tenancy.
  common_mistake: A common mistake is to assume that software-level virtualization or process isolation
    (like simply running multiple processes on a full GPU) provides the same level of resource guarantees
    and performance isolation as hardware-backed MIG partitions, leading to performance contention and
    unpredictable latency for co-located workloads.
  napkin_math: An H100's 80 GB HBM3 can be divided into, for example, 7 instances with approximately 10GB
    each. If the full GPU offers 989 TFLOPS FP16, a 1/7th MIG slice might offer roughly 70 TFLOPS, assuming
    ideal distribution, but the actual available compute and memory bandwidth (3.35 TB/s) per instance
    depends on the specific MIG profile used. Each MIG instance maintains its slice of the 700W power
    budget, ensuring its dedicated compute and memory pathways are unaffected by other instances.
