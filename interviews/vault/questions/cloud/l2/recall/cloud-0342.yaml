id: cloud-0342
title: The H100 Ridge Point (cloud-0342)
topic: roofline-analysis
status: draft
provenance: imported
scenario: Your team is analyzing the performance of a new model on H100 GPUs. Before running any benchmarks,
  you want to understand the hardware's fundamental characteristics. Given that an NVIDIA H100 GPU provides
  989 TFLOPS of FP16 compute and has 3.35 TB/s of HBM3 memory bandwidth, calculate its 'ridge point'.
  Explain what this value signifies for model optimization.
details:
  realistic_solution: The H100's ridge point defines the boundary between being compute-bound and memory-bound.
    A model's own arithmetic intensity (its ratio of operations to data movement) must exceed this hardware
    ridge point to be limited by the GPU's computational speed. With a ridge point of ~295 Ops/Byte, the
    H100 is very compute-dense. This means many common ML workloads, like large language model inference
    which has low operational intensity, are often limited by memory bandwidth, not the headline TFLOPS
    number.
  common_mistake: The most common mistake is a unit mismatch, either by confusing bits with bytes (leading
    to an 8x error) or by failing to align the magnitudes (e.g., TFLOPS vs. GB/s). This leads to a wildly
    incorrect ratio and a misunderstanding of the hardware's characteristics. For instance, an answer
    of ~37 Ops/Byte implies a much lower compute-to-memory ratio, suggesting most workloads would be compute-bound,
    which is false for the H100.
  napkin_math: '1. **Identify Specs:** The H100 has ~989 TFLOPS (FP16) of compute and ~3.35 TB/s of memory
    bandwidth.

    2. **Convert to consistent units:** 989,000 GFLOPS and 3,350 GB/s.

    3. **Calculate Ridge Point:** Peak Compute / Memory Bandwidth = 989,000 / 3,350 ≈ 295.2 FLOPs/Byte.

    An algorithm needs >295 operations per byte of memory accessed to be compute-bound.'
