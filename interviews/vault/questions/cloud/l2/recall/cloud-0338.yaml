id: cloud-0338
title: The Automotive RAG Update Bottleneck
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are designing the Over-the-Air (OTA) update mechanism for a fleet of connected vehicles.
  Each vehicle runs a Retrieval-Augmented Generation (RAG) assistant to answer driver questions. The system
  relies on a 50 GB vector index for its knowledge base. Your team proposes pushing a full index update
  to the fleet daily over the vehicles' 4G LTE connection, which provides a stable 50 Megabits-per-second
  (Mbps) download speed.
details:
  realistic_solution: The primary bottleneck is clearly the network bandwidth. A 50 GB file is extremely
    large to transfer over a typical cellular connection.
  common_mistake: The most common mistake is to confuse Megabits per second (Mbps) with MegaBytes per
    second (MB/s). Since there are 8 bits in a byte, this error leads to a dramatic underestimation of
    the download time by a factor of 8. A secondary mistake is to focus on on-device storage write speed,
    which is orders of magnitude faster than the network link and therefore not the bottleneck for this
    operation.
  napkin_math: '1. **Convert Size to bits:** The update is 50 Gigabytes (GB). We need to convert this
    to Megabits (Mb) to match the bandwidth units.

    50 GB × 8 bits/Byte = 400 Gb = 400,000 Mb.

    2. **Assume typical LTE speed:** ~50 Mbps.

    3. **Calculate Transfer Time:** 400,000 Mb / 50 Mbps = 8,000 seconds.

    8,000 seconds / 60 = ~133 minutes or >2 hours of continuous downloading per car!'
