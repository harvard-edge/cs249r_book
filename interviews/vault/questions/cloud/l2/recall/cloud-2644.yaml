title: The ML Test Score Framework
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Explain what the ML Test Score measures and why it was designed to assess technical debt rather
  than model accuracy.
details:
  realistic_solution: 'The ML Test Score (proposed by Google, Breck et al. 2017) is a rubric of 28 tests
    across four categories: (1) Data tests — feature schema validation, data freshness, distribution monitoring.
    (2) Model tests — training reproducibility, fairness checks, performance on slices. (3) Infrastructure
    tests — training pipeline reliability, serving latency, resource utilization. (4) Monitoring tests
    — prediction drift detection, feature attribution tracking, alerting coverage. It deliberately ignores
    model accuracy because high accuracy with poor infrastructure is fragile — a model with 95% accuracy
    but no data validation, no drift detection, and no rollback capability will silently degrade in production.
    The score quantifies operational readiness: ''Can this system detect, diagnose, and recover from failures?''
    A team can have a state-of-the-art model (high accuracy) but score 0 on the ML Test Score if they
    have no testing infrastructure.'
  common_mistake: Confusing ML Test Score with model evaluation metrics. It does not measure accuracy
    — it measures the system's ability to maintain accuracy over time in production.
  napkin_math: '28 tests, each scored 0-1. Max score = 28. Typical org first assessment: 5-8 out of 28.
    Google''s recommendation: score >20 before production deployment.'
