id: cloud-0414
title: The RAG Rollout Storage Tax
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are managing a cloud-based RAG system for an automotive client's in-car voice assistant.
  The system's knowledge base is a vector index of the car's user manual, which currently occupies 14
  GB of storage. To handle a major vehicle software update, you must replace this index with a new 14
  GB version. To ensure zero downtime, you plan to use a blue-green deployment strategy. Calculate the
  total peak storage capacity required for the vector index during this rollout.
details:
  realistic_solution: A blue-green deployment strategy requires that the 'blue' (current) and 'green'
    (new) environments exist simultaneously to allow for instant cutover and rollback. Therefore, during
    the update, you need to have both the old 14 GB index and the new 14 GB index provisioned at the same
    time. The total peak storage required is the sum of both, which is 28 GB.
  common_mistake: Engineers often calculate the storage required for the final state (a single 14 GB index),
    forgetting that a blue-green deployment requires provisioning a full, duplicate copy of the resource
    *before* tearing down the old one. This overlooks the peak resource consumption during the transition
    period.
  napkin_math: 'Current Index Size (Blue): 14 GB'
