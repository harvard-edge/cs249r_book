title: ML Attack Surface
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your team is about to deploy an ML model and the security team asks for a threat model. Explain
  why ML systems have a larger attack surface than traditional software and identify the ML-specific attack
  vectors.
details:
  realistic_solution: 'ML systems inherit all traditional software attack surfaces PLUS ML-specific ones
    across the entire lifecycle: (1) Training data attacks: data poisoning (inject malicious samples to
    bias the model), backdoor attacks (embed triggers that activate specific misclassifications). (2)
    Model attacks: model extraction (steal the model via query access), adversarial evasion (craft inputs
    that fool the model), membership inference (determine if specific data was used for training). (3)
    Pipeline attacks: supply chain compromise (malicious pretrained models or libraries), configuration
    tampering (alter hyperparameters to degrade quality). (4) Deployment attacks: prompt injection (for
    LLMs), model inversion (reconstruct training data from model outputs), side-channel attacks (timing,
    memory patterns leak information). The key difference: traditional software has a well-defined input-output
    contract that can be tested. ML models have implicit, learned behavior that is harder to specify,
    test, and defend.'
  common_mistake: Only considering traditional software threats (SQL injection, XSS, authentication).
    ML systems have a fundamentally different attack surface centered on the model, data, and training
    pipeline.
  napkin_math: 'Traditional software: ~5 attack categories. ML system: ~5 traditional + ~8 ML-specific
    = ~13 categories. Attack surface roughly doubles when you add ML components.'
