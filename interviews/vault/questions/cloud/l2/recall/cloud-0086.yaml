schema_version: 1
id: cloud-0086
title: The Blue/Green Capacity Trap
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are managing a fleet of inference servers for a production RAG chatbot. The current 'blue'
  deployment uses a 7B parameter model, with each replica running on a dedicated H100 GPU. To handle the
  production traffic load, this 'blue' deployment is scaled to 10 replicas (10 GPUs).
details:
  realistic_solution: 'A blue/green deployment requires running two full production stacks in parallel:
    the existing ''blue'' version and the new ''green'' version. The ''green'' deployment must be fully
    scaled, deployed, and healthy before traffic is switched over. Therefore, you must have enough capacity
    for both fleets to exist simultaneously.'
  common_mistake: Engineers often underestimate the peak resource requirements of a blue/green deployment.
    A common mistake is to only calculate the resources for the new 'green' deployment, assuming resources
    from the 'blue' deployment can be immediately reused. This leads to resource starvation, failing the
    new deployment or causing downtime as the container orchestrator cannot schedule the new pods.
  napkin_math: A true blue-green deployment spins up an identical, fully scaled green environment before
    routing traffic away from blue. Since the blue environment requires 10 replicas (10 H100 GPUs), the
    green environment will also require 10 H100 GPUs. During the transition, you must provision a peak
    capacity of 10 + 10 = 20 H100 GPUs.
