id: cloud-2617
title: Gradient Inversion Attacks in Federated Learning
topic: federated-learning
status: published
provenance: imported
scenario: A colleague claims that federated learning is fully private because raw data never leaves the
  device. Explain why this is insufficient and what attack vector remains.
details:
  realistic_solution: 'While raw data stays on-device, shared gradients leak information. Gradient inversion
    attacks (e.g., Zhu et al., 2019) can reconstruct training images from their gradients with pixel-level
    accuracy for small batch sizes. The attack works by initializing random dummy data, computing its
    gradients, and iteratively optimizing the dummy data until its gradients match the shared gradients.
    For batch size 1, reconstruction is nearly perfect. Defenses include: (1) differential privacy — adding
    calibrated noise to gradients (ε-DP guarantees), (2) secure aggregation — cryptographic protocols
    ensuring the server only sees the sum of gradients, not individual contributions, and (3) increasing
    local batch sizes to make inversion harder.'
  common_mistake: Believing 'no raw data leaves the device' equals privacy. Gradients are sufficient for
    reconstruction attacks, especially with small batches.
  napkin_math: 'Gradient inversion success rate: ~95% for batch=1, ~60% for batch=8, <10% for batch≥64.
    Adding DP noise (ε=1) drops accuracy by 2-5%.'
