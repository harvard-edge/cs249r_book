id: cloud-2576
title: Cloud Deepspeed Zero L2 0
topic: vram-budgeting
status: published
provenance: imported
scenario: Your colleague proposes using DeepSpeed ZeRO-3 for a 7B model on 4 A100 GPUs, but training is
  much slower than expected. Explain the three ZeRO stages and why ZeRO-3 may be overkill for this model
  size.
details:
  realistic_solution: 'ZeRO-1: partitions only optimizer states across GPUs. For AdamW with 7B params:
    OS = 84 GB total, sharded to 21 GB each. Minimal extra communication. ZeRO-2: adds gradient partitioning.
    Gradients reduced and immediately discarded per GPU. Saves ~14 GB per GPU. Modest communication increase.
    ZeRO-3: partitions parameters themselves. Each GPU holds 1/N of weights, requiring all-gather before
    every layer. Massive communication increase. For 7B on 4 A100s: ZeRO-1 gives each GPU 14+14+21 = 49
    GB — fits in 80 GB. ZeRO-3 is unnecessary and adds all-gather overhead for every layer in both forward
    and backward passes, explaining the slowdown.'
  common_mistake: Always using the highest ZeRO stage for maximum memory savings. Each stage adds communication
    overhead. Use the minimum stage that fits your model in memory — ZeRO-1 is often sufficient for models
    under 13B on multi-GPU nodes.
  napkin_math: '7B, 4 GPUs. ZeRO-1: 14+14+84/4=49 GB per GPU. Fits! ZeRO-2: 14+(14+84)/4=38.5 GB. ZeRO-3:
    112/4=28 GB. ZeRO-3 comm overhead: 2 all-gathers per layer (fwd+bwd) × 14 GB total = 28 GB extra comm
    per step. At 50 GB/s cross-node: +0.56s per step.'
