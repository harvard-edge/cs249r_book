id: cloud-2711
title: Expert Parallelism in MoE
topic: data-parallelism
status: published
provenance: imported
scenario: Explain how expert parallelism differs from standard model parallelism. Why is a specialized
  strategy needed for Mixture of Experts models rather than just using tensor or pipeline parallelism?
details:
  realistic_solution: 'In standard model parallelism (tensor/pipeline), every parameter is activated for
    every input and the model is split statically across devices. MoE models have a routing layer that
    sends each token to only k-of-N experts (e.g., 2 of 64). Expert parallelism places each expert on
    a different device and routes tokens dynamically via an all-to-all communication pattern. This is
    fundamentally different from tensor parallelism because: (1) each device runs a complete expert, not
    a slice of every layer, (2) communication is data-dependent (varies by routing decisions), and (3)
    load balancing across experts is critical — if routing is skewed, some GPUs are idle while others
    are overloaded.'
  common_mistake: Treating MoE like a standard dense model. Standard model parallelism splits every layer
    across devices, but MoE only activates a subset of experts per token, so static splitting wastes capacity.
  napkin_math: 'Dense 64B model: every GPU activates all params. MoE 64×1B experts, top-2 routing: each
    token activates only 2B params, but tokens must be routed to the right GPU.'
