id: cloud-0022
title: The Continuous Batching Queue
topic: batching-strategies
status: published
provenance: imported
scenario: Your team runs an LLM inference service on a single H100 GPU using continuous batching. The
  GPU can sustain a total throughput of 800 tokens/second across all concurrent requests. The service
  receives an average of 5 requests per second (RPS), and each request requires the model to generate
  128 tokens. Explain if the system is stable and calculate the average time a request spends in the system
  (from arrival to completion).
details:
  realistic_solution: The system is stable because the required token throughput (640 tokens/s) is less
    than the system's maximum capacity (800 tokens/s). However, with a system utilization of 80%, we can
    expect significant queueing delays. We can model this as an M/M/1 queue. The average time a request
    spends in the system is not just its service time, but the service time divided by one minus the utilization,
    which accounts for the time spent waiting in the queue.
  common_mistake: Confusing the total token throughput of the system with the per-request service rate.
    Engineers might incorrectly calculate the service time for a single request in isolation, ignoring
    that the 800 tokens/second is a shared resource. Another common mistake is to see that the 'required
    throughput' (5 RPS * 128 tokens = 640 tokens/s) is less than the 'max throughput' (800 tokens/s) and
    assume latency is low, without quantifying the impact of queueing at high utilization.
