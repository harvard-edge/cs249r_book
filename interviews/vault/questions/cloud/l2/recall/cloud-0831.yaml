id: cloud-0831
title: The Async Checkpoint Overhead
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 70B model and need to checkpoint frequently given your cluster's ~10-hour
  MTBF. A full checkpoint (FP16 weights + FP32 Adam states) is 700 GB. Your NVMe drives write at 3 GB/s.
  A synchronous checkpoint would stall training for how long, and how does async checkpointing fix this?
details:
  realistic_solution: 'Synchronous write: 700 GB / 3 GB/s = 233 seconds (~4 minutes) of stalled training
    per checkpoint. With a 30-second training step, this is catastrophic. Async checkpointing first copies
    to CPU RAM at ~50 GB/s (14 seconds of GPU pause), then writes to NVMe in the background while training
    continues. This reduces overhead from 233s to 14s per checkpoint.'
  common_mistake: Assuming checkpointing is free because 'we just save to disk in the background.' Synchronous
    checkpointing pauses all GPU compute. Even async requires a fast memory copy to CPU RAM, which still
    takes ~14 seconds.
  napkin_math: 'Checkpoint = 70B * (2 + 4 + 4) bytes = 700 GB. Sync NVMe write = 700 GB / 3 GB/s = 233s
    stall per checkpoint. Async: copy to CPU RAM at ~50 GB/s = 14s GPU pause, then NVMe write overlapped
    with training. Training step ≈ 30s. With MTBF ~10 hours, checkpoint every ~10h = 1,200 steps. Sync
    overhead = 233s / (1200 * 30s) = 0.65%. Async overhead = 14s / (1200 * 30s) = 0.04%. The key win:
    sync stalls training for 233s (~8 training steps lost), async only stalls for 14s (less than 1 step).'
