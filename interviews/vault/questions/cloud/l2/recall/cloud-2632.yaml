schema_version: 1
id: cloud-2632
title: Why nn.Module Uses Parameter Registration
topic: pruning-sparsity
status: published
provenance: imported
scenario: Explain why PyTorch's nn.Module requires explicit parameter registration (nn.Parameter) rather
  than automatically treating all tensors as learnable parameters.
details:
  realistic_solution: 'Explicit parameter registration separates learnable state from non-learnable state
    within a module. A layer may contain: (1) learnable parameters (weights, biases) that need gradients
    and optimizer updates, (2) buffers (running mean/variance in BatchNorm) that are part of model state
    but should NOT receive gradients, and (3) temporary tensors (intermediate computations) that are neither
    saved nor updated. nn.Parameter signals ''this tensor needs grad=True and should appear in model.parameters()''.
    Without this distinction, model.parameters() would return everything, the optimizer would try to update
    BatchNorm statistics via gradient descent (wrong), and serialization would save temporary tensors.
    The registration pattern also enables automatic recursive parameter discovery — model.parameters()
    traverses all submodules, collecting only registered Parameters.'
  common_mistake: Storing learnable weights as plain tensors instead of nn.Parameter. They won't appear
    in model.parameters() and won't be updated by the optimizer — a silent bug.
  napkin_math: 'ResNet-50: 25.6M parameters, but also ~100 buffer tensors (BN stats). Without explicit
    registration, optimizer would incorrectly update buffers.'
