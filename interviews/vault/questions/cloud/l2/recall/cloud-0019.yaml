schema_version: 1
id: cloud-0019
title: Continuous Batching and TPOT
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: An inference service for a 70B model runs on an H100 GPU using continuous batching. The system's
  measured time to generate one token for an entire batch (the 'token step') is ~20ms. The service has
  a strict Time Per Output Token (TPOT) SLO of 33ms to ensure a real-time conversational experience. If
  a new user request joins a batch that already contains 4 other active users, what is the effective TPOT
  for that new user?
details:
  realistic_solution: The effective TPOT for any user in a continuous batch is simply the time it takes
    the system to complete a single token generation step for the entire batch. The power of this technique
    is that the step time is largely independent of the number of sequences (up to a point). Since the
    token step time is given as 20ms, the TPOT for the new user—and all other users in the batch—is 20ms.
    This is well within the 33ms SLO.
  common_mistake: A common misconception is to believe that the time per token step scales linearly with
    the number of sequences in the batch. Engineers might multiply the base step time (20ms) by the number
    of users (5), incorrectly concluding the TPOT is 100ms. This fails to recognize that continuous batching
    systems process one token for *all* sequences in the batch in parallel during a single forward pass.
  napkin_math: 1. System uses continuous batching.
