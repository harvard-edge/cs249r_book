id: cloud-2579
title: Cloud Megatron Parallelism L2 0
topic: data-parallelism
status: published
provenance: imported
scenario: A colleague says Megatron splits weight matrices 'along columns in one layer and rows in the
  next.' Explain how Megatron-style tensor parallelism works and why this column-row pattern matters.
details:
  realistic_solution: 'In a Transformer FFN: Y = GeLU(XA) × B, where A and B are weight matrices. Megatron
    splits A column-wise across N GPUs: each GPU holds A_i (1/N of columns) and computes Y_i = GeLU(XA_i)
    independently — no communication needed because GeLU is element-wise. Then B is split row-wise: each
    GPU holds B_i (1/N of rows) and computes Z_i = Y_i × B_i. Final output: Z = sum(Z_i) via an all-reduce.
    The column-then-row pattern ensures only ONE all-reduce per layer (after B), not two. This conjugate
    splitting minimizes communication: 2 all-reduces per Transformer block (one for attention, one for
    FFN) instead of 4+.'
  common_mistake: Splitting both matrices the same way (e.g., both column-wise). This would require an
    all-gather between the two matmuls to reconstruct the intermediate activation, doubling communication.
  napkin_math: '7B model, FFN dim 11008, hidden 4096, TP=4 GPUs. A: 4096×11008 split to 4096×2752 per
    GPU. B: 11008×4096 split to 2752×4096 per GPU. All-reduce: 4096 × batch_size × 2B per layer. 32 layers
    × 2 = 64 all-reduces per step.'
