schema_version: 1
id: cloud-2600
title: Cloud Data Quality As Code L2 0
topic: data-quality-validation
status: published
provenance: imported
scenario: Your ML pipeline silently ingested a batch of training data where 15% of labels were corrupted
  due to an upstream database migration. The model trained on this data for 3 days before anyone noticed.
  Explain how data quality as code would have prevented this.
details:
  realistic_solution: 'Data quality as code means encoding validation rules in version-controlled configuration
    that runs automatically in the pipeline: (1) Schema validation — check that label values are from
    the expected set (e.g., labels ∈ {0,1,...,9}), (2) Statistical bounds — assert that class distribution
    doesn''t shift by more than 5% between batches (15% corruption would trigger this), (3) Null/anomaly
    checks — detect unexpected nulls, NaNs, or out-of-range values, (4) Data unit tests — specific assertions
    like ''image dimensions are 224×224'' or ''text length < 512 tokens.'' These checks run as a pipeline
    stage BEFORE training starts, with hard failures that block the pipeline. Without them, validation
    depends on humans noticing quality issues — which took 3 days in your case.'
  common_mistake: Implementing data checks as one-off scripts rather than version-controlled pipeline
    stages. One-off scripts get lost, skipped, or outdated. Data quality as code means checks are part
    of the pipeline definition — they cannot be bypassed.
  napkin_math: '3 days of wasted training on 64 A100s × $2/hr × 72h = $9,216 wasted compute. Data validation
    stage: adds ~5 minutes to pipeline (scan 1 TB at 3.3 GB/s). Cost of validation: 5 min × $128/hr (64
    GPUs idle) = $10.67. Prevention ROI: $9,216 / $10.67 = 864x.'
