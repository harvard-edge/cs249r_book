schema_version: 1
id: cloud-0327
title: The Blue/Green Memory Tax
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is serving a 7-billion parameter language model using FP16 precision. You are planning
  a blue/green deployment to roll out an updated version. To ensure zero downtime, both the old 'blue'
  version and the new 'green' version must be fully loaded in memory on the serving nodes before traffic
  is switched. Calculate the total GPU memory required just for the model weights during this peak rollout
  phase.
details:
  realistic_solution: A 7B model in FP16 precision requires 2 bytes per parameter. This results in 14
    GB of memory for a single model's weights. Because a blue/green deployment requires both the old and
    new models to be loaded simultaneously to ensure a seamless traffic switch, you must have enough memory
    for both. Therefore, the peak memory requirement is double that of a single model, which is 28 GB.
  common_mistake: Engineers often calculate the memory needed for a single model instance and forget that
    a blue/green deployment temporarily doubles the resource requirement. They provision capacity only
    for the final running state (N models), not the transient state (2N models), leading to 'OutOfMemory'
    errors or 'Pending' pods in Kubernetes during rollout.
  napkin_math: 1. **Parameters per model:** 7,000,000,000
