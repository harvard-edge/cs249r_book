id: cloud-2519
title: Cloud Train Serve Split L2 0
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your company trains a 7B parameter language model in the cloud but wants to deploy inference
  on edge devices. Explain the train-serve split architecture and what makes it work for ML systems.
details:
  realistic_solution: 'Train-serve split separates the compute-intensive training phase (requiring many
    GPUs, large datasets, high bandwidth) from the inference phase (requiring low latency, lower compute).
    Training stays in the cloud because it needs massive parallelism (hundreds of GPUs), huge datasets,
    and runs for days/weeks. Inference runs locally because it needs low latency, works offline, and the
    model (after quantization) fits on edge hardware. The bridge is model export: train in FP16/BF16,
    quantize to INT8/INT4, and deploy the compressed model.'
  common_mistake: Assuming the train-serve split means the edge device never needs updates. In practice,
    you need a model update pipeline to push retrained/fine-tuned models to edge devices periodically.
  napkin_math: '7B model: training needs ~112 GB optimizer state (AdamW), impossible on edge. Inference:
    7B × 0.5B/param (INT4) = 3.5 GB, fits on a phone with 6 GB RAM. Training: 1000s of GPU-hours. Inference:
    single device, milliseconds per token.'
