id: cloud-0013
title: The TPOT Memory Wall
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'Your team is serving an INT4-quantized 70B parameter LLM on a single H100 GPU. A user complains
  that while the first token appears almost instantly, the subsequent text generates very slowly, making
  the chatbot feel sluggish. They expect a comfortable reading speed of at least 20 tokens per second.
  Interpret this complaint: what is the primary hardware bottleneck for Time Per Output Token (TPOT),
  and can the H100 GPU theoretically meet this user''s expectation? Use the provided hardware constants.'
details:
  realistic_solution: The user's complaint correctly distinguishes between TTFT (fast) and TPOT (slow).
    The bottleneck for TPOT in autoregressive models is memory bandwidth, as generating each token requires
    reading all model parameters from High Bandwidth Memory (HBM).
  common_mistake: A common mistake is to assume that token generation is compute-bound. An engineer might
    incorrectly try to calculate the FLOPs required per token and divide by the H100's TFLOPS rating.
    This ignores the fact that autoregressive decoding is a memory-bound operation, as the entire model's
    weights must be read from HBM for each token generated.
  napkin_math: 1. **Identify the Bottleneck:** Autoregressive token generation (TPOT) is memory-bandwidth
    bound.
