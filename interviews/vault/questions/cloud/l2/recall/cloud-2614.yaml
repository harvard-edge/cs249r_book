id: cloud-2614
title: TCO Drivers in Federated vs Centralized Training
topic: federated-learning
status: published
provenance: imported
scenario: Explain the key Total Cost of Ownership (TCO) differences between a federated learning deployment
  across 500 edge nodes and an equivalent centralized cloud training setup.
details:
  realistic_solution: 'Centralized TCO is dominated by compute (GPU hours) and storage (data lake). Federated
    TCO shifts costs: compute is free (edge devices train locally using spare capacity), but you pay for
    orchestration infrastructure (aggregation server, secure channels), WAN bandwidth (model updates each
    round), and device management complexity. Federated avoids the massive data transfer cost of moving
    raw data to the cloud — for 500 nodes generating 1TB/day each, centralized would need 500TB/day ingestion
    vs federated sending ~100MB model updates. However, federated requires more training rounds (communication
    overhead) and engineering talent for debugging non-IID convergence, stragglers, and Byzantine failures
    — making operational costs (people) significantly higher.'
  common_mistake: Only comparing compute costs while ignoring that federated learning's hidden costs are
    in engineering complexity, debugging, and slower convergence.
  napkin_math: 'Centralized: 500TB/day ingestion @ $0.02/GB = $10K/day storage transfer. Federated: 500
    × 200MB/round = 100GB/round @ $0.02/GB = $2/round.'
