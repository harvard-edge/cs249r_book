id: cloud-2635
title: Why model.eval() Matters for Inference
topic: pruning-sparsity
status: published
provenance: imported
scenario: A developer deploys a model without calling model.eval() and notices prediction quality varies
  between identical inputs. Explain which layers cause this and why.
details:
  realistic_solution: 'Two layer types behave differently in training vs eval mode: (1) Dropout: In training
    mode, randomly zeroes activations with probability p and scales remaining by 1/(1-p). In eval mode,
    dropout is disabled — all activations pass through unchanged. Without eval(), identical inputs produce
    different outputs each forward pass due to random dropout masks. (2) BatchNorm: In training mode,
    normalizes using the current batch''s mean and variance (noisy, batch-dependent). In eval mode, uses
    the stored running mean and running variance accumulated during training (deterministic). Without
    eval(), predictions depend on the batch composition. The fix is calling model.eval() before inference,
    which sets self.training=False for all submodules, changing these layers'' behavior to their deterministic
    inference variants.'
  common_mistake: Forgetting model.eval() before inference. This causes non-deterministic predictions
    from Dropout and batch-dependent predictions from BatchNorm.
  napkin_math: 'Dropout(p=0.5) in train mode: 50% of features randomly zeroed. In eval mode: all features
    active, outputs scaled. Difference can be >10% per prediction.'
