id: cloud-2714
title: Bathtub Curve Phases
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your datacenter just received 1,000 new GPUs. Over the next 5 years, when should you expect
  the highest failure rates? Explain the three phases of the bathtub curve and their implications for
  GPU cluster operations.
details:
  realistic_solution: 'The bathtub curve has three phases: (1) Infant mortality (first weeks-months):
    high failure rate from manufacturing defects, solder issues, and marginal components. For GPUs, this
    means running burn-in tests before deploying to production. (2) Useful life (months to years): low,
    roughly constant random failure rate. This is the steady-state where MTBF calculations are valid.
    Most of your 5-year operational window falls here. (3) Wear-out (end of life): increasing failure
    rate from physical degradation — electromigration, capacitor aging, thermal cycling fatigue. For a
    1,000-GPU cluster, expect ~5-10% failures in the first month, <1% annual during useful life, then
    accelerating failures after year 3-4.'
  common_mistake: Assuming failure rate is constant over time. The bathtub curve shows failure rate is
    highest at the beginning (infant mortality) and end (wear-out), with a low constant rate in between.
  napkin_math: '1000 GPUs: ~50-100 infant failures (month 1), ~5-10/year steady state, accelerating after
    year 3-4. Plan spare inventory accordingly.'
