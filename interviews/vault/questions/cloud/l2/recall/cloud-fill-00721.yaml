id: cloud-fill-00721
title: Estimating a Large Language Model's Fit on Google TPU v5e
topic: model-size-estimation
status: published
provenance: imported
scenario: You are tasked with deploying a new, unquantized Large Language Model (LLM) with 70 billion
  parameters, where each parameter is stored as a 16-bit floating point (BF16), onto a Google TPU v5e.
  The TPU v5e has 16 GB of HBM, a BF16 throughput of 197 TFLOPS, and 1.6 TB/s memory bandwidth. Without
  considering quantization or other optimizations, what is the initial memory challenge when trying to
  deploy this model on a single Google TPU v5e?
details:
  realistic_solution: A realistic solution requires calculating the model's memory footprint (70 billion
    parameters * 2 bytes/parameter = 140 GB). Since this greatly exceeds the 16 GB HBM of a single Google
    TPU v5e, the solution would immediately point to the necessity of model parallelism (sharding the
    model across multiple TPUs), aggressive quantization (e.g., to INT8 or lower), or offloading parts
    of the model to host memory. The memory bandwidth and TFLOPS are crucial for performance but memory
    fit is the primary bottleneck here.
  common_mistake: Forgetting to account for the memory required by model parameters themselves (70 billion
    * 2 bytes/parameter = 140 GB) and simply comparing the model's effective size to the HBM memory capacity
    of the TPU (16 GB), or overlooking the fact that BF16 parameters occupy 2 bytes each.
  napkin_math: 70 billion parameters * 2 bytes/parameter = 140 GB. A single Google TPU v5e has 16 GB HBM.
    Therefore, 140 GB model requires 140 GB / 16 GB = 8.75 TPUs minimum for just parameter storage, not
    accounting for activations, optimizer states, or other runtime memory overheads.
