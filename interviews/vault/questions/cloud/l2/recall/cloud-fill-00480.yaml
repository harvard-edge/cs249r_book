title: H100 Mixed-Precision Performance Considerations
topic: mixed-precision-training
status: published
provenance: imported
scenario: A machine learning engineer is tasked with optimizing the training of a large model on an NVIDIA
  H100 GPU (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth, 700W TDP). The team is considering
  adopting mixed-precision training (FP16/BF16). Describe the key benefits and specific architectural
  considerations for leveraging the H100's features, particularly its high FP16 TFLOPS and HBM3 bandwidth,
  when implementing mixed precision.
details:
  realistic_solution: Implement NVIDIA's Automatic Mixed Precision (AMP) utilities (e.g., `torch.cuda.amp`)
    with dynamic loss scaling. Profile the application to ensure Tensor Cores are effectively utilized
    by structuring operations with compatible dimensions and data types. Analyze the model's sensitivity
    to precision and choose between FP16 and BF16 based on numerical stability and convergence characteristics.
  common_mistake: Ignoring the necessity of dynamic loss scaling when using FP16 to maintain numerical
    stability, or assuming direct FP16 speedup without verifying Tensor Core utilization. Another common
    mistake is not differentiating between FP16's mantissa precision and BF16's exponent range, leading
    to suboptimal choice for certain models.
  napkin_math: An NVIDIA H100 offers 989 TFLOPS for FP16 dense computations and 3.35 TB/s of memory bandwidth.
    If a particular mixed-precision training step involves 100 TFLOPs of FP16 computation and requires
    transferring 0.5 TB of FP16 data, which resource (compute or bandwidth) is the potential bottleneck
    for that specific step, assuming ideal utilization conditions for both?
