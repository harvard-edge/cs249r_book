id: cloud-0061
title: The RAG Update Bottleneck
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are an engineer at an automotive company responsible for a customer support chatbot. The
  bot uses a RAG model with its knowledge base stored in a 200 GB vector index. To add information about
  a new car model, you must roll out an updated index to the serving cluster. Assuming you have to ship
  the entire 200 GB file, how long would it take to transfer the index to a single serving pod over the
  datacenter's 400 Gbps InfiniBand network?
details:
  realistic_solution: 'The transfer time is surprisingly short. A 400 Gbps InfiniBand network provides
    approximately 50 GB/s of bandwidth. Transferring a 200 GB index takes only 4 seconds. This calculation
    reveals that for most RAG updates, the network transfer itself is not the dominant latency. The real
    engineering challenge is what happens *after* the transfer: safely loading the new index into the
    serving process without dropping requests, handling the memory pressure, and warming up the index.'
  common_mistake: Engineers often overestimate datacenter transfer times because they mentally anchor
    on their own home internet speeds (Mbps) or older datacenter specs (e.g., 10 GbE). They fail to internalize
    the massive bandwidth of modern interconnects like InfiniBand, leading them to incorrectly identify
    network transfer as the primary bottleneck in an update process. The real bottlenecks have shifted
    to index loading, memory mapping, and cache warming.
  napkin_math: 1. **Convert Bandwidth Units:** The network speed is 400 Gigabits per second (Gbps). To
    work with file sizes in Gigabytes (GB), convert bits to bytes. There are 8 bits in a byte. So, `400
    Gbps / 8 = 50 GB/s`.
