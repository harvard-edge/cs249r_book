id: cloud-2656
title: How Undeclared Data Dependencies Cause Silent Failures
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A recommendation model uses a 'user_engagement_score' feature. Unknown to the ML team, the upstream
  data engineering team changes the engagement score calculation from 30-day rolling average to 7-day
  rolling average. Explain why this causes a silent failure.
details:
  realistic_solution: 'The model was trained on features computed with a 30-day window. The new 7-day
    window produces systematically different values: higher variance, more recency bias, different scale.
    The model doesn''t error out — it receives validly formatted floating point numbers — but its predictions
    degrade because the input distribution has shifted. This is a silent failure because: (1) no schema
    violation occurs (the column name and type are unchanged), (2) no error is thrown (values are within
    plausible ranges), (3) standard monitoring (latency, error rate) shows nothing wrong, (4) only prediction
    quality metrics degrade, often slowly enough to miss without statistical testing. The root cause is
    an undeclared dependency: the ML model implicitly depends on the upstream feature''s computation method,
    but this dependency exists nowhere in code, contracts, or documentation. The upstream team had no
    way to know their change would affect the ML model.'
  common_mistake: Assuming data pipeline changes are safe if the schema (column names, types) doesn't
    change. Silent changes to computation logic or data semantics are the real danger.
  napkin_math: '30-day avg engagement: mean=0.65, std=0.1. 7-day avg: mean=0.58, std=0.25. Distribution
    shift causes ~5-15% accuracy degradation, undetected for weeks.'
