id: cloud-2510
title: Cloud Through Silicon Vias L2 0
topic: vram-budgeting
status: published
provenance: imported
scenario: A hardware architect explains that HBM3 achieves 3.35 TB/s bandwidth by stacking DRAM dies vertically.
  Your interviewer asks why traditional wire-bonding between dies cannot achieve the same bandwidth density.
details:
  realistic_solution: TSVs are microscopic copper pillars etched directly through silicon dies, providing
    thousands of parallel vertical connections in the area where wire bonds would only fit dozens. Each
    TSV is ~5-10 micrometers in diameter vs. ~25 micrometers for wire bonds, enabling 1024+ simultaneous
    data paths per stack. This massive parallelism is how HBM achieves 1024-bit bus width vs. DDR5's 64-bit
    bus, yielding ~16x more bandwidth per pin.
  common_mistake: Confusing TSVs with interposers. TSVs go through the die; the interposer is the silicon
    substrate that connects stacks to the GPU laterally.
  napkin_math: 'HBM3: 1024-bit bus × 6.4 Gbps per pin = 819 GB/s per stack. 4 stacks on H100 = 3.35 TB/s.
    DDR5: 64-bit bus × 6.4 Gbps = 51 GB/s per channel. Would need 64 DDR5 channels to match.'
