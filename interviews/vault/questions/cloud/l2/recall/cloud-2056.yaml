id: cloud-2056
title: ML vs Software Development Lifecycle
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'A software engineer joining an ML team says: ''I don''t see why ML development needs a different
  process. We already have CI/CD, unit tests, and version control.'' What is the fundamental difference
  between traditional software development and ML development that makes the standard software lifecycle
  insufficient?'
details:
  realistic_solution: 'In traditional software, the program is written by humans and is deterministic
    — the same input always produces the same output. In ML, the program (model) is learned from data,
    making the system''s behavior a function of three mutable artifacts: code, data, and model weights.
    A bug can originate in any of these three, and changes to data alone — with zero code changes — can
    silently alter system behavior. This ''data dependency'' is what makes traditional CI/CD insufficient:
    you need to test data distributions, not just code paths.'
  common_mistake: Focusing on tooling differences ('we need MLflow instead of Jenkins') rather than the
    fundamental structural difference in what constitutes the 'program.'
  napkin_math: 'Traditional software: 1 mutable artifact (code). ML system: 3 mutable artifacts (code
    + data + model). Failure surface area is roughly 3× larger, and the data artifact changes continuously
    in production without any deploy event.'
