id: cloud-0032
title: The Blue-Green Memory Tax
topic: compound-ai-systems
status: draft
provenance: imported
scenario: You are an ML Systems Engineer responsible for a fleet of servers running a 7B parameter RAG
  chatbot. The current version, `v1`, is loaded in FP16 precision. For a safe rollout of the new `v2`
  model, which includes new guardrail features, your team decides on a blue-green deployment strategy.
  During the transition, some servers in the fleet must have *both* `v1` and `v2` loaded into memory simultaneously
  to allow for instant rollbacks. Explain how you would calculate the additional inference memory required
  per server to support this strategy, and what is that value?
details:
  realistic_solution: The core task is to calculate the memory footprint of a single 7B model, as this
    represents the 'additional' load on a server that is already running the `v1` model. A 7 billion parameter
    model loaded in FP16 (half-precision) requires 2 bytes for every parameter. The calculation is a direct
    application of the scaling rule for inference memory.
  common_mistake: Engineers often calculate the total memory for both models (28 GB) instead of the *additional*
    memory required, failing to read the question carefully. Another common error is confusing FP16 (2
    bytes) with INT8 (1 byte), leading to an answer of 7 GB. A less common but critical error is confusing
    inference memory with training memory, which uses 16 bytes/param for the Adam optimizer, resulting
    in a wildly incorrect estimate (112 GB).
  napkin_math: A 7B parameter model in FP16 requires 2 bytes per parameter. Weight memory = 7 * 10^9 *
    2 bytes = 14 GB. In a blue-green deployment on the same server, loading the v2 model alongside v1
    requires an additional 14 GB of VRAM. Total baseline VRAM just for weights becomes 14 GB (v1) + 14
    GB (v2) = 28 GB, fitting within an 80GB GPU.
