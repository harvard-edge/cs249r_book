id: cloud-2611
title: Why Federated Learning Sends Gradients Not Data
topic: federated-learning
status: published
provenance: imported
scenario: A hospital network wants to collaboratively train a diagnostic model across 10 sites without
  sharing patient data. Explain the fundamental architectural principle that makes federated learning
  privacy-preserving.
details:
  realistic_solution: Federated learning keeps raw data on each device/site and only transmits model updates
    (gradients or weight deltas) to a central aggregation server. The server averages these updates (FedAvg)
    and broadcasts the improved global model back. Privacy is preserved because the server never sees
    individual patient records — only aggregated statistical summaries of how the model should change.
    Each hospital trains locally on its own data, computes gradients, and sends only these gradients.
    The key insight is that gradients are lossy compressions of the training data — they encode 'which
    direction to adjust weights' without revealing specific data points.
  common_mistake: Believing gradients are perfectly private. Gradient inversion attacks can reconstruct
    training samples from shared gradients, which is why differential privacy or secure aggregation is
    still needed.
  napkin_math: '10 hospitals × 1M records each. Centralized: move 10M records. Federated: move model updates
    only (~100MB per round vs TB of data).'
