id: cloud-2641
title: The Ridge Point and Hardware Balance
topic: roofline-analysis
status: published
provenance: imported
scenario: The A100 has 312 TFLOPS (FP16) and 2.0 TB/s memory bandwidth. The H100 has 989 TFLOPS and 3.35
  TB/s. Compare their hardware balance points and explain what this means for workload optimization.
details:
  realistic_solution: 'Hardware balance = peak FLOPS / peak bandwidth. A100: 312e12 / 2.0e12 = 156 FLOPs/byte.
    H100: 989e12 / 3.35e12 = 295 FLOPs/byte. The H100''s ridge point is nearly 2x higher than the A100''s.
    This means workloads need ~2x higher arithmetic intensity on H100 to be compute-bound. Operations
    that were compute-bound on A100 (e.g., large matmuls at AI=200) may become memory-bound on H100 (since
    200 < 295). This is the ''compute-bandwidth gap'' widening each GPU generation. It means: (1) kernel
    fusion and data reuse become more critical on newer GPUs, (2) memory-bound operations (attention,
    LayerNorm) become relatively more expensive, and (3) batch sizes may need to increase to push arithmetic
    intensity above the new ridge.'
  common_mistake: Assuming a kernel that is compute-bound on A100 is also compute-bound on H100. The higher
    ridge point means workloads shift toward memory-bound on newer hardware.
  napkin_math: 'A100 ridge: 312T/2.0T = 156 FLOPs/byte. H100 ridge: 989T/3.35T = 295 FLOPs/byte. Ridge
    nearly doubled → more ops are memory-bound on H100.'
