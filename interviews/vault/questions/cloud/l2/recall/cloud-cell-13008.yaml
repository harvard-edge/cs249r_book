id: cloud-cell-13008
title: 'Pipeline Parallelism Recall: GPipe Bubble Overhead Formula'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: During a system design interview, you are asked to state the formula for bubble overhead in
  synchronous GPipe pipeline parallelism, define all variables, and give the limiting behavior as micro-batch
  count approaches infinity. Use a concrete example with p=4 stages and m=16 micro-batches on H100 GPUs.
details:
  realistic_solution: 'Bubble fraction = (p-1) / (m+p-1). Variables: p = number of pipeline stages, m
    = number of micro-batches per mini-batch. Limit as m→∞: bubble → 0. Practical example: p=4, m=16 →
    (4-1)/(16+4-1) = 3/19 ≈ 15.8%. This means 15.8% of all GPU cycles are wasted waiting for the pipeline
    to fill or drain. With p=4 H100s, bubble overhead costs 0.158 * 700W * 4 GPUs = 442W of wasted power
    per training step.'
  common_mistake: Confusing the bubble fraction formula (p-1)/(m+p-1) with a simpler wrong version like
    (p-1)/m, and not recognizing that the formula assumes equal stage times.
  napkin_math: 'Bubble = (p-1)/(m+p-1) = 3/19 = 15.8%. At m=100: 3/103 = 2.9%. At m=1000: 3/1003 = 0.3%.
    Power waste: 0.158 * 700W * 4 = 442W per step. For a 1000-step training run: 442W * 1000 steps * (assume
    1 sec/step) = 442kJ wasted.'
