id: cloud-0274
title: The Data Loading Bottleneck
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your team is training a vision model on a 10 TB dataset of raw images stored on a local NVMe
  SSD. For each training epoch, the dataloader must read the raw images from disk for the model. Your
  team is debating whether this 'on-the-fly' loading is a bottleneck that is starving the expensive H100
  GPUs.
details:
  realistic_solution: The primary bottleneck is the I/O required to read the data from the NVMe SSD. While
    7 GB/s is fast, reading 10 TB of data is a significant operation that can take many minutes. During
    this time, the H100 GPUs may be idle or under-utilized, waiting for data to arrive. This is known
    as being 'I/O-bound'.
  common_mistake: Engineers often focus exclusively on GPU compute (TFLOPS) and forget the critical path
    of getting data to the GPU. A common mistake is to underestimate the I/O time required to read data
    from storage, assuming it's negligible compared to computation. Another error is confusing the throughput
    specifications of different hardware, such as using network bandwidth for a storage calculation or
    assuming legacy HDD speeds for modern SSDs.
  napkin_math: '1. A high-end PCIe Gen4 NVMe SSD has a realistic peak read throughput of ~7 GB/s.

    2. Dataset size: 10 TB = 10,000 GB.

    3. Time to read one epoch = 10,000 GB / 7 GB/s = 1,428.5 seconds.

    4. 1,428.5 seconds = ~23.8 minutes.

    Spending nearly 24 minutes just pulling data off disk means the expensive H100 GPUs will be sitting
    idle (I/O-bound) if data loading isn''t deeply pipelined.'
