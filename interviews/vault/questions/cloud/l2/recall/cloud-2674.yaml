title: Receptive Field Growth in Deep CNNs
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Explain how the receptive field grows with network depth in a CNN and why this matters for detecting
  objects of different sizes.
details:
  realistic_solution: 'Each convolutional layer''s receptive field extends by (kernel_size - 1) pixels
    in each direction relative to the previous layer''s receptive field. For 3×3 kernels: Layer 1 RF =
    3×3, Layer 2 RF = 5×5, Layer 3 RF = 7×7, and so on (RF = 1 + L × (k-1) for L layers with kernel size
    k). With pooling or strided convolutions, RF grows multiplicatively — a 2×2 pool doubles the effective
    RF growth rate. This hierarchical growth is why deep CNNs can detect both small features (edges in
    early layers, small RF) and large objects (entire faces in deep layers, large RF). A model with insufficient
    depth cannot ''see'' enough context. For a 224×224 ImageNet image, you need RF ≥ 224 to capture the
    full image. With 3×3 kernels only: you need (224-1)/2 ≈ 112 layers. With 5 pooling layers (each doubling):
    ~7 conv layers between pools suffices, which is why architectures like VGG-16 work.'
  common_mistake: Thinking deeper always means better. If the receptive field already covers the full
    input, additional layers add parameters and computation without expanding the model's 'view' — they
    only add representational depth.
  napkin_math: '3×3 conv: RF grows by 2 per layer. 224px needs ~112 layers. With 5 pool layers (2× each):
    need 224/2^5 = 7 px RF per pool stage = 4 conv layers each. Total: ~20 layers.'
