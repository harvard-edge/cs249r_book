id: cloud-2653
title: Why Glue Code Dominates ML Systems
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Google's technical debt paper found that in many ML systems, only 5% of the code is actual ML
  model code while 95% is 'glue code.' Explain why this ratio is so extreme and what the glue code consists
  of.
details:
  realistic_solution: 'ML models are typically implemented using off-the-shelf packages (sklearn, PyTorch,
    TensorFlow) that handle training and inference in few lines. The remaining 95% consists of: (1) Data
    collection and validation — ingestion pipelines, schema enforcement, missing value handling. (2) Feature
    extraction — transforming raw data into model-ready features with business logic. (3) Configuration
    management — hyperparameter configs, feature flags, model version routing. (4) Serving infrastructure
    — API endpoints, batching, caching, load balancing. (5) Monitoring — prediction logging, drift detection,
    alerting. (6) Integration adapters — converting between the ML library''s data format and the company''s
    internal systems. The ratio is extreme because ML libraries provide a powerful but generic abstraction;
    adapting that abstraction to a specific business domain requires extensive custom code. This glue
    code is the source of most bugs and maintenance burden because it has no standardized testing framework.'
  common_mistake: Thinking the solution is writing less glue code. The issue is that glue code grows organically
    without the testing discipline applied to production software. It needs proper engineering, not elimination.
  napkin_math: 'Typical ML service: ~200 lines model code, ~4,000 lines infrastructure/glue code. 200/4200
    = 4.8% model code, 95.2% glue.'
