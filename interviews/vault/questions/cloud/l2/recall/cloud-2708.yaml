id: cloud-2708
title: Parameter Server vs AllReduce
topic: data-parallelism
status: published
provenance: imported
scenario: Explain the key architectural difference between parameter server and AllReduce-based distributed
  training. Why have most modern frameworks shifted toward AllReduce?
details:
  realistic_solution: 'In a parameter server architecture, dedicated server nodes hold model parameters;
    workers pull weights, compute gradients, and push updates back. This creates a hub-and-spoke communication
    pattern where servers are potential bottlenecks. In AllReduce, all workers hold a full copy of parameters
    and collectively reduce gradients in a ring or tree pattern — no central server, bandwidth scales
    with worker count. Modern frameworks prefer AllReduce because: (1) bandwidth is distributed evenly,
    (2) no single point of failure, (3) NVLink/InfiniBand hardware optimizes collective operations. Parameter
    servers remain relevant for sparse models (e.g., embeddings with trillions of parameters) where only
    a small subset of parameters are accessed per batch.'
  common_mistake: Thinking parameter servers are obsolete. They are still useful for sparse models (e.g.,
    recommendation systems with huge embedding tables) where AllReduce is inefficient.
  napkin_math: 'PS bandwidth bottleneck: N workers push/pull through k servers. AllReduce ring: each node
    sends/receives 2(N-1)/N of the data, bandwidth scales.'
