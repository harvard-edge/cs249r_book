id: cloud-2255
title: The Dialect Hierarchy Lowering
topic: pruning-sparsity
status: published
provenance: imported
scenario: MLIR uses a hierarchy of 'dialects' — from high-level ML operations down to hardware-specific
  instructions. Why does an ML compiler need multiple IR levels instead of compiling directly from the
  computation graph to machine code?
details:
  realistic_solution: 'Multi-level IRs enable optimizations at the right abstraction level. At the highest
    level (e.g., MLIR''s `linalg` dialect), the compiler reasons about entire tensor operations — fusing
    a matmul with its subsequent bias add and ReLU. At the mid level (e.g., `affine` or `scf` dialects),
    the compiler reasons about loop structures — tiling, unrolling, vectorization. At the lowest level
    (e.g., `llvm` or `gpu` dialects), the compiler reasons about register allocation and instruction scheduling.
    A direct single-pass compilation would either lose the high-level semantic information needed for
    operator fusion (if it lowers too early) or fail to exploit hardware-specific features like Tensor
    Cores (if it stays too abstract). The progressive lowering also enables retargetability: the same
    high-level optimizations apply whether the target is an NVIDIA GPU, AMD GPU, or TPU — only the final
    lowering pass changes.'
  common_mistake: '"Multiple levels add unnecessary complexity — a single-pass compiler would be simpler
    and faster." This ignores that different optimizations are only valid and efficient at specific abstraction
    levels.'
  napkin_math: 'A typical MLIR pipeline for a transformer block: `torch` dialect (semantic ops) → `linalg`
    dialect (tensor algebra, ~5 fusion passes) → `affine` dialect (loop nests, ~8 tiling/vectorization
    passes) → `gpu` dialect (thread mapping, ~3 passes) → `nvvm` or `llvm` (codegen). That is ~4 dialect
    levels and ~20 passes — each pass operating on the representation where its optimization is most natural.'
