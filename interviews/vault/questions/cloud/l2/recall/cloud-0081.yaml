id: cloud-0081
title: The Canary Rollout Memory Budget
topic: compound-ai-systems
status: published
provenance: imported
scenario: An autonomous vehicle company uses a central, cloud-hosted RAG model to provide real-time, complex
  query support to its fleet. The current production model has 7B parameters. A new, more accurate 13B
  parameter model is ready for a canary rollout. As the Staff ML Systems Engineer, you need to provision
  the canary cluster. Calculate the minimum VRAM required for a single server instance to simply load
  this new 13B model for inference, assuming it's served in FP16 precision.
details:
  realistic_solution: For inference in half-precision (FP16), each parameter requires 16 bits, which is
    2 bytes. To calculate the total memory for the model weights, you multiply the number of parameters
    by the size of each parameter in bytes. This gives you the minimum VRAM required to load the model,
    not including the KV cache or activation memory.
  common_mistake: Engineers often confuse the memory requirements for *training* with those for *inference*.
    Training with an optimizer like Adam requires storing parameters, gradients, and optimizer states,
    leading to a much larger footprint (~16 bytes per parameter). Inference, in its simplest form, only
    requires the model weights.
  napkin_math: 1. **Parameters:** 13 Billion | 2. **Precision:** FP16 = 16 bits = 2 bytes per parameter
    | 3. **Calculation:** 13 Billion parameters × 2 bytes/parameter = 26 Billion bytes | 4. **Conversion:**
    26 Billion bytes = 26 GB
