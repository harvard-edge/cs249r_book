id: cloud-0075
title: The Static Batching Trap
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are optimizing an LLM inference service that uses a static batching strategy on a single
  H100 GPU. The server collects incoming requests for a fixed window of 40ms. At the end of the window,
  it processes the entire batch, which takes 10ms for the prefill stage. A user's request arrives at the
  worst possible moment (just after a batch was sent for processing). What is the user's Time-To-First-Token
  (TTFT)?
details:
  realistic_solution: 'The worst possible moment for a request to arrive is nano-seconds after a batch
    has been finalized and sent to the GPU. The new request has ''missed the bus.'' It must wait the *entire*
    next batching window (40ms) to be collected. After this wait, its batch is processed, which takes
    10ms. Therefore, the total time from request arrival to the first token being ready is the sum of
    the wait and processing times. This scenario highlights the core latency problem that continuous batching
    was invented to solve: eliminating the forced idle time imposed by static batch windows.'
  common_mistake: Engineers often focus solely on the GPU processing time (10ms), a metric related to
    inference speed, and forget that in a queued system, the total user-perceived latency is dominated
    by wait time (head-of-line blocking). The worst-case TTFT is the sum of the maximum wait time and
    the processing time.
  napkin_math: Worst-Case TTFT = Maximum Batch Wait Time + Batch Processing Time
