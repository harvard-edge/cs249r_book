id: cloud-2603
title: Cloud Label Consensus L2 0
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your image classification dataset was labeled by 5 annotators per image. On 30% of images, annotators
  disagree. A junior engineer proposes taking the majority vote. Explain the limitations of simple majority
  voting and what label consensus methods improve upon.
details:
  realistic_solution: 'Simple majority voting treats all annotators equally, but annotators have different
    skill levels. An expert who disagrees with 4 novices should carry more weight. Label consensus methods
    improve on this: (1) Dawid-Skene model — learns per-annotator confusion matrices iteratively, weighting
    reliable annotators more. (2) Inter-annotator agreement metrics (Cohen''s kappa, Fleiss'' kappa) —
    measure agreement beyond chance, identifying systematic disagreements. (3) Annotator filtering — remove
    annotators whose kappa falls below a threshold (e.g., 0.4). This produces higher-quality ground truth
    labels and identifies ambiguous examples that may need expert review or removal from the dataset.'
  common_mistake: Discarding all disagreed-upon examples. These examples often represent genuinely ambiguous
    cases that are the hardest and most informative for the model. Properly resolving ambiguity (with
    expert review or weighted consensus) is more valuable than discarding.
  napkin_math: '5 annotators, 30% disagreement. Majority vote accuracy (if 1 bad annotator): 4/5 agree
    on correct label → ~92% label accuracy. With 2 bad annotators: 3/5 → ~80%. Dawid-Skene: learns bad
    annotators have kappa=0.3, down-weights them → ~96% label accuracy. Improvement: 4-16% better labels.'
