title: Cloud Ultra Ethernet L2 0
topic: collective-communication
status: published
provenance: imported
scenario: Your team is evaluating Ultra Ethernet as an alternative to InfiniBand for a new AI training
  cluster. Explain what makes Ultra Ethernet different from standard RoCE and why it matters for AI workloads.
details:
  realistic_solution: 'Ultra Ethernet is designed specifically for AI collective communication patterns.
    Key innovations: (1) native packet spraying — distributes packets across all available paths simultaneously
    (standard Ethernet uses ECMP which pins flows to single paths), (2) in-order delivery guarantees at
    the receiver despite multi-path spraying, (3) optimized for AllReduce and collective patterns rather
    than traditional request-response. Standard RoCE struggles with AI workloads because ECMP creates
    hotspots when many GPU-to-GPU flows hash to the same path. Ultra Ethernet eliminates this by spraying
    at packet granularity.'
  common_mistake: Assuming Ultra Ethernet is just faster Ethernet. The key innovation is not speed (both
    can run at 400/800 Gbps) but traffic distribution — packet spraying vs. flow-level ECMP hashing.
  napkin_math: 'Standard RoCE with ECMP: 4 equal-cost paths but elephant flows pin to 1 path → 25% utilization.
    Ultra Ethernet packet spraying: all 4 paths used evenly → ~95% utilization. For 400 Gbps links: effective
    BW goes from 100 Gbps to 380 Gbps per flow.'
