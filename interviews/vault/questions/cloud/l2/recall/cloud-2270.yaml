id: cloud-2270
title: The cuDNN Convolution Dispatch
topic: pruning-sparsity
status: published
provenance: imported
scenario: You profile a ResNet-50 training job and notice that different convolutional layers use different
  cuDNN algorithms — some use implicit GEMM, others use FFT-based convolution, and one small layer uses
  direct convolution. You expected cuDNN to use the same algorithm everywhere. Why does cuDNN select different
  algorithms for different layers, and what is the primary factor driving this selection?
details:
  realistic_solution: cuDNN selects convolution algorithms based on a combination of input tensor shape,
    filter size, stride, padding, available GPU workspace memory, and whether deterministic reproducibility
    is required. Implicit GEMM works well for standard 3×3 convolutions. FFT-based convolution wins for
    large spatial filters. Direct convolution is used for very small or 1×1 filters where the GEMM reshape
    overhead exceeds compute. Setting `torch.backends.cudnn.benchmark = True` forces cuDNN to auto-tune
    by timing each algorithm on the first batch, then caching winners — essential for fixed-shape workloads.
  common_mistake: Thinking cuDNN always uses the fastest algorithm regardless of context. In reality,
    algorithm selection depends on input/filter dimensions, available workspace memory, and whether deterministic
    mode is required.
  napkin_math: ResNet-50 has ~53 conv layers. With `cudnn.benchmark=True`, first iteration benchmarks
    ~5-8 algorithms per layer = ~300-400 timed trials. Adds ~30-60 seconds to first iteration. Subsequent
    iterations see 10-20% throughput improvement from optimal algorithm selection — pays back within the
    first epoch on ImageNet.
