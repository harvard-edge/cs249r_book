schema_version: 1
id: cloud-0090
title: 'The Static Batching Penalty: Activation Memory & Checkpointing'
topic: activation-memory
status: draft
provenance: imported
scenario: You are managing a real-time translation service running on a single GPU. The service has a
  strict Time-To-First-Token (TTFT) deadline of 200ms. Your system uses a static batching strategy, where
  it collects incoming requests for a fixed 100ms window before processing the batch. The actual GPU processing
  for the batch takes 50ms. If a request arrives at the very beginning of the batching window, calculate
  its total TTFT and determine if it meets the deadline.
details:
  realistic_solution: The total Time-To-First-Token is the sum of the time spent waiting for the batch
    window to close and the subsequent GPU processing time. For a request that arrives at the beginning
    of the window, it must wait the full 100ms for the window to elapse. After that, the batch is sent
    for processing, which takes another 50ms. Therefore, the total TTFT is 150ms. Since 150ms is less
    than the 200ms deadline, the system meets its SLA for this 'worst-case' request.
  common_mistake: Engineers often focus solely on the GPU processing time (50ms) and forget to include
    the artificial latency introduced by the batching window. They see the low processing time and assume
    the system is well within its SLA, ignoring that the end-user experiences the full end-to-end latency,
    which includes time spent waiting in a queue.
  napkin_math: In static batching, a request arriving exactly at the start of the window waits the entire
    100ms for the batch to assemble. Queue Time = 100ms. The GPU then processes the batch, taking 150ms
    to generate the first token. TTFT = Queue Time (100ms) + Processing Time (150ms) = 250ms. This fails
    the strict 200ms TTFT deadline by 50ms.
