title: Cloud Benchmark Harness L2 0
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team built a custom ML benchmark but gets inconsistent results across runs — sometimes
  20% variance. Explain what a proper benchmark harness must control and why your results are unreliable.
details:
  realistic_solution: 'A benchmark harness standardizes all variables that affect measurement: (1) Warmup
    — first iterations are slow due to JIT compilation, cache warming, and GPU clock ramp-up. Must discard
    warmup iterations. (2) Timing — use CUDA events for GPU timing, not wall-clock (which includes CPU
    overhead). (3) Data injection — deterministic data loading with fixed seeds, no random I/O delays.
    (4) System state — GPU clock locked to base (not boost), power management disabled, no background
    processes. (5) Statistical rigor — multiple runs, report median and confidence intervals, not single-run
    results. 20% variance likely comes from GPU boost clock fluctuations, background processes, or measuring
    warmup iterations.'
  common_mistake: Using Python time.time() to benchmark GPU operations. GPU operations are asynchronous
    — the CPU returns immediately. Must use torch.cuda.synchronize() + CUDA events, or measured times
    will be meaningless.
  napkin_math: 'GPU boost clock variance: H100 base 1095 MHz, boost up to 1835 MHz. Variation: 1835/1095
    = 1.68x. If benchmark hits thermal throttle: -15% performance. Warmup: first 10 iterations 2-5x slower
    due to JIT. Discarding warmup + locking clocks → variance drops from 20% to <2%.'
