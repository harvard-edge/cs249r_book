id: cloud-0043
title: The Chatbot's Response Time
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You are operating a chatbot service backed by a 7B parameter LLM. The system has two main latency
  phases: a ''prefill'' phase to process the user''s prompt, which takes a fixed 150ms, and a ''decode''
  phase where it generates tokens one by one. The time per output token (TPOT) is 30ms. First, explain
  the difference between Time To First Token (TTFT) and Time Per Output Token (TPOT). Then, calculate
  the total time a user has to wait from sending their request to receiving the *20th* output token.'
details:
  realistic_solution: TTFT (Time To First Token) is the total latency to generate the very first token,
    including both prompt processing (prefill) and the first decode step. TPOT (Time Per Output Token),
    also called inter-token latency, is the time to generate each subsequent token. The total time for
    the Nth token is the prefill time plus N decode steps.
  common_mistake: A common mistake is to only calculate the decoding time for all tokens (`20 * 30ms =
    600ms`), completely ignoring the significant, fixed cost of the prefill phase. Another error is to
    correctly calculate TTFT but then fail to apply it properly for the full sequence, leading to an off-by-one
    error.
  napkin_math: Total Latency = Prefill Latency + (Number of Tokens × TPOT)
