id: cloud-cell-13252
title: Recall Transformer Inference FLOPs Formula
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'An interviewer asks you to state from memory: what is the standard approximation formula for
  total FLOPs in a single forward pass of a transformer with N parameters and sequence length S? And separately,
  what is the training FLOPs formula? How does inference FLOPs scale with sequence length vs model size?'
details:
  realistic_solution: 'Attention FLOPs: 2×4×96×8192²×96 ≈ 4.94 TFLOPs for score matmul, or 2.47 TFLOPs
    for the K^T V product only. 2464 TFLOPs is 1000× too large — a TFLOPS vs GFLOPS unit error.'
  common_mistake: Using 6ND for inference (training formula) or forgetting that attention FLOPs scale
    as O(S²) which becomes significant at long context even if attention parameters are small.
  napkin_math: 'Transformer attention FLOPs for GPT-4 class: 4 batches, 96 heads, seq=8192, head_dim=96.
    Attention score matmul: 2 × batch × heads × seq² × head_dim = 2 × 4 × 96 × 8192² × 96 = 2×4×96×67,108,864×96
    = 2×4×96×6,442,450,944 = 4,937,053,724,672 ≈ 4.94 TFLOPs (not 2464 TFLOPs which would require seq=8,192,000
    or similar). For just the score matmul per layer: 2×4×96×8192²×96... let me recalculate: 2×4=8; 8×96=768;
    768×8192²=768×67,108,864=51,539,607,552; ×96=4,947,802,324,992 ≈ 4.95 TFLOPs per layer. With QKV proj:
    ~10 TFLOPs total per layer. So 2.47 TFLOPs for attention scores alone is correct at half the above:
    2×4×96×8192²×96/2 ≈ 2.47 TFLOPs (not 2464 TFLOPs which is 1000× too large).'
