id: cloud-0064
title: The Batching Window Trap
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You are designing the serving infrastructure for a 7B parameter LLM on a single H100 GPU. The
  product team has a strict requirement: Time To First Token (TTFT) must be under 200ms to feel ''real-time''.
  You implement a simple timed (or ''slotted'') batching strategy: every 150ms, the server groups any
  waiting requests into a batch and sends it to the GPU. Your profiling shows that the pre-fill stage
  for a typical batch of this size takes 80ms on the H100.'
details:
  realistic_solution: The total latency a user experiences is the sum of the time they spend waiting in
    the queue and the actual GPU processing time for their request.
  common_mistake: The most common mistake is to only consider the GPU compute time (80ms) and conclude
    that the system is well within the 200ms deadline. This completely ignores the latency introduced
    by the batching schedule itself. Engineers often forget that total latency is not just processing
    time, but also the time spent waiting in a queue ('head-of-line blocking').
  napkin_math: 1. **Identify Maximum Queuing Delay:** The longest a request can wait before being processed
    is the full duration of the batching window.
