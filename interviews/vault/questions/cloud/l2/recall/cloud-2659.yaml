id: cloud-2659
title: Shadow Mode vs A/B Testing vs Canary Releases
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: Explain the three main online evaluation strategies, when each is appropriate, and what risk
  each mitigates.
details:
  realistic_solution: 'Shadow deployment: The new model runs in parallel with production, processing real
    traffic, but its predictions are logged — never served to users. Purpose: validate that the model
    produces reasonable outputs on real data without any user impact. Use when: first deploying a new
    model type or making large architecture changes. Risk mitigated: catastrophic prediction errors on
    real-world data not captured in offline eval. Canary release: Route a small fraction (1-5%) of real
    traffic to the new model and serve its predictions. Monitor key metrics (latency, error rate, business
    KPIs). Use when: the model has passed shadow testing and you need to validate end-to-end system performance
    including latency. Risk mitigated: system-level issues (serving latency, memory leaks) under real
    load. A/B testing: Randomly split users 50/50 between old and new model for a statistically significant
    period. Measure business impact. Use when: model changes are incremental and you need to quantify
    revenue/engagement impact. Risk mitigated: deploying a model that is technically correct but hurts
    business metrics.'
  common_mistake: Jumping straight to A/B testing without shadow validation. If the new model has a catastrophic
    failure mode, A/B testing exposes 50% of users to it.
  napkin_math: 'Shadow: 0% user risk, days to validate. Canary: 1-5% risk exposure, hours to validate
    system health. A/B: 50% exposure, weeks for statistical significance.'
