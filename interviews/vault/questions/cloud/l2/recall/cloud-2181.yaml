id: cloud-2181
title: The Collective Primitive Confusion
topic: collective-communication
status: published
provenance: imported
scenario: 'A junior engineer is debugging a distributed training job using FSDP (Fully Sharded Data Parallel).
  They see three different NCCL collective calls in the profiler trace: AllGather before the forward pass,
  ReduceScatter after the backward pass, and occasionally AllReduce. They ask: ''Aren''t these all doing
  the same thing — sharing data between GPUs?'' Explain the semantic difference between AllGather, ReduceScatter,
  and AllReduce, and why FSDP uses them at different points.'
details:
  realistic_solution: 'Each collective has a distinct contract. **AllGather**: each GPU contributes a
    shard; every GPU ends up with the full tensor. FSDP uses this before the forward pass to reconstruct
    the full parameter tensor from shards. **ReduceScatter**: each GPU contributes a full tensor; the
    tensors are element-wise reduced (summed), and each GPU receives only its shard of the result. FSDP
    uses this after the backward pass to sum gradients across GPUs and simultaneously re-shard them. **AllReduce**
    = ReduceScatter + AllGather: every GPU ends up with the full reduced result. DDP uses AllReduce because
    every GPU needs the full gradient. FSDP avoids AllReduce because it doesn''t need the full gradient
    on every GPU — it only needs each GPU''s shard, saving memory.'
  common_mistake: Treating all collectives as interchangeable 'sync' operations. Engineers often say 'it's
    all just communication' without understanding that each primitive has a different input-output contract.
  napkin_math: 'For a 1 GB tensor on 8 GPUs: | - AllGather: each GPU sends 125 MB shard, receives 1 GB
    total → 875 MB transferred per GPU | - ReduceScatter: each GPU sends 875 MB, receives 125 MB reduced
    shard | - AllReduce: 1.75 GB per GPU (equivalent to ReduceScatter + AllGather) | - FSDP saves ~50%
    communication vs DDP by using ReduceScatter instead of AllReduce'
