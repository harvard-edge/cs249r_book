title: Why OOD Detection Matters
topic: distribution-drift-detection
status: published
provenance: imported
scenario: Your image classifier trained on daylight photos is deployed in a system that also receives
  nighttime infrared images. The model classifies them with high confidence but all predictions are wrong.
  Explain why OOD detection is necessary and how it differs from simply checking model confidence.
details:
  realistic_solution: 'Out-of-distribution detection identifies inputs that fall outside the training
    data distribution BEFORE trusting the model''s prediction. It differs from confidence checking because
    neural networks are not calibrated — they produce high-confidence predictions on OOD inputs due to
    how softmax works (it always sums to 1, forcing high confidence in some class even for garbage input).
    For your infrared images: the pixel distributions, feature statistics, and activation patterns are
    fundamentally different from daylight photos, but the model still maps them to the nearest learned
    class with high confidence. OOD detection methods include: (1) feature-space distance (compare activations
    to training data clusters), (2) energy-based scoring (lower energy = more in-distribution), (3) ensemble
    disagreement (OOD inputs cause higher variance across ensemble members). When OOD is detected, the
    system should flag for human review or return ''unknown'' instead of a confident wrong answer.'
  common_mistake: Assuming low confidence = OOD and high confidence = safe. Neural networks are notoriously
    overconfident on OOD inputs — they can assign 99% confidence to a completely wrong class for inputs
    nothing like training data.
  napkin_math: 'Softmax on OOD: confidence 95%+ but wrong. Energy score on same input: clearly OOD. Confidence
    ≠ reliability for OOD inputs.'
