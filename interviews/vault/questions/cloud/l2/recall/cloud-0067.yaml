id: cloud-0067
title: The Static Batching Throughput Trap
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are operating a user-facing chatbot on an H100 GPU. Your service has a strict P99 Time-To-First-Token
  (TTFT) SLA of 200ms. Your inference engine uses a simple static batching strategy. The time to run the
  prefill (prompt processing) stage for a batch of size `B` is dominated by memory operations and can
  be modeled as `T_prefill(B) = 50ms + 15ms * B`. After the prefill stage, the system generates one token
  for *every* request in the batch, and this decode step takes 10ms.
details:
  realistic_solution: The correct approach is to recognize that for a static batch, the time to the first
    token is determined entirely by the prefill stage for the whole batch. The SLA applies directly to
    this prefill time. Once the maximum batch size is found, the system throughput is the number of tokens
    generated per decode step (which is equal to the batch size) divided by the time for that step.
  common_mistake: The most common mistake is to confuse the latency constraint (TTFT) with the throughput
    rate (decode time). Engineers often incorrectly use the 10ms per-token decode time to calculate the
    batch size limit (e.g., `10ms * B <= 200ms`), leading to a batch size that would actually take `50ms
    + 15ms * 20 = 350ms` to start, grossly violating the SLA. Another mistake is correctly calculating
    the batch size but then miscalculating the system throughput by not accounting for the number of parallel
    requests in the batch.
  napkin_math: SLA_TTFT = 200 ms | T_prefill(B) = 50ms + 15ms * B | T_decode_step = 10 ms
