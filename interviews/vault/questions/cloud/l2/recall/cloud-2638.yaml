title: Pure Functions Enable Composable Transforms
topic: pruning-sparsity
status: published
provenance: imported
scenario: Explain why JAX requires pure functions (no side effects, no in-place mutation) and how this
  constraint enables powerful transformations like vmap, jit, and grad that are difficult in PyTorch.
details:
  realistic_solution: 'Pure functions guarantee that output depends only on input — no hidden state, no
    randomness, no mutation. This mathematical property enables: (1) jit — the compiler can safely cache
    and reuse compiled kernels because the function always produces the same output for the same input.
    (2) grad — automatic differentiation can trace through the function knowing there are no side effects
    that could invalidate the gradient tape. (3) vmap — the compiler can automatically vectorize a function
    over a batch dimension because each element is independent (no cross-element mutation). In PyTorch,
    nn.Module maintains mutable state (parameters, buffers, training flag), making these transforms harder
    — you cannot naively JIT compile a stateful module without handling its state carefully. JAX trades
    ergonomic mutability for composable, mathematically sound transformations.'
  common_mistake: Thinking pure functions are just a coding style preference. The purity constraint is
    what makes mathematical transform composition (grad of vmap of jit) provably correct.
  napkin_math: 'JAX: jit(grad(vmap(f))) — 3 transforms compose cleanly. PyTorch equivalent requires torch.compile
    + torch.func.grad + torch.vmap with careful state management.'
