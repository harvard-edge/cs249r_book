title: 'The Static Batching Latency Tax: Model Serving Infrastructure'
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: You're operating an LLM inference service for a real-time code assistant. The service uses a
  simple static batching strategy. The server is configured to wait up to **100ms** to form a batch of
  4 requests before sending them to the GPU. The actual GPU computation for a full or partial batch takes
  **300ms**.
details:
  realistic_solution: The total latency is the sum of the maximum time the server waits to form a batch
    and the time it takes to compute the batch.
  common_mistake: Engineers often focus on throughput and only consider the raw GPU compute time (300ms),
    completely forgetting the latency cost imposed by the batching window. They calculate the best-case
    or average-case scenario, not the worst-case latency for a specific user, which is critical for interactive
    applications with real-time deadlines.
  napkin_math: Total Latency = Batching Wait Time + GPU Compute Time
