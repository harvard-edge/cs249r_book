schema_version: 1
id: cloud-2662
title: How Request Pipelining Hides Latency
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'An inference server processes requests in three stages: CPU preprocessing (5ms), GPU inference
  (10ms), and postprocessing (3ms). Without pipelining, explain the throughput vs with 3-stage pipelining.'
details:
  realistic_solution: 'Without pipelining: each request completes all three stages sequentially before
    the next begins. Latency per request = 5 + 10 + 3 = 18ms. Throughput = 1/18ms = 55.6 requests/second.
    GPU utilization: 10/18 = 55.6%. With 3-stage pipelining: while request N is on the GPU, request N+1
    is being preprocessed on CPU, and request N-1 is being postprocessed. The throughput bottleneck is
    the slowest stage (GPU at 10ms). Throughput = 1/10ms = 100 requests/second (1.8x improvement). GPU
    utilization rises to ~100%. Latency for a single request remains 18ms (pipeline doesn''t reduce individual
    request latency), but throughput nearly doubles because stages execute concurrently across different
    requests. This is the same principle as CPU instruction pipelining — overlap different stages of different
    requests to maximize hardware utilization.'
  common_mistake: Believing pipelining reduces latency for individual requests. It only increases throughput
    by overlapping stages across requests. Per-request latency stays the same or slightly increases.
  napkin_math: 'Sequential: 55.6 req/s, 55.6% GPU util. Pipelined: 100 req/s, ~100% GPU util. 1.8x throughput
    gain. Latency unchanged at 18ms/request.'
