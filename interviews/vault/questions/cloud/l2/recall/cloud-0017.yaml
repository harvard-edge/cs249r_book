id: cloud-0017
title: The KV-Cache VRAM Budget
topic: vram-budgeting
status: draft
provenance: imported
scenario: You are scoping the GPU memory requirements for serving a Llama-3 8B model. Your service needs
  to handle a context length of 8,192 tokens. The model is running in FP16 precision.
details:
  realistic_solution: The correct approach is to calculate the total storage needed for the Key and Value
    tensors across all layers for the entire sequence length. For each token in the sequence, for each
    layer, we must store a Key vector and a Value vector.
  common_mistake: The most common mistake is to confuse the memory needed for the KV-cache (which is dynamic
    and scales with sequence length) with the static memory needed for the model's weights. Another frequent
    error is using the number of *query* heads instead of the smaller number of *Key/Value* heads for
    a model with Grouped-Query Attention (GQA), leading to a significant overestimation of the memory
    requirement.
  napkin_math: '1. **Identify dimensions:** | Sequence Length (S): 8,192 tokens | Layers (L): 32 | K/V
    Heads (H_kv): 8 | Head Dimension (D_h): 128 | Bytes per element (B): 2 (for FP16)'
