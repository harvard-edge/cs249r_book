id: cloud-2239
title: BSP vs Streaming Dataflow for Feature Computation
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team needs to compute 500 features for a recommendation model. Some features (e.g., 'user
  purchase count last 30 days') are recomputed nightly in a Spark batch job. Others (e.g., 'items viewed
  in current session') must update within seconds. A junior engineer proposes running everything in a
  single Apache Flink streaming job to 'simplify the architecture.' Why is a pure streaming approach problematic
  for the batch features, and what execution model mismatch is at play?
details:
  realistic_solution: 'BSP (batch) systems like Spark process bounded datasets in synchronized stages:
    shuffle all data, then aggregate, then output. This is efficient for full-dataset scans (e.g., computing
    a 30-day window over 10B events) because it can sort-merge join and use disk spill efficiently. Streaming
    systems process unbounded data record-by-record with local state. Maintaining a 30-day rolling window
    in a streaming system requires holding 30 days of state per user in RocksDB or similar — for 100M
    users, that''s terabytes of managed state with compaction overhead, TTL management, and exactly-once
    checkpoint complexity. The batch job reads the same data once, shuffles, aggregates, and writes —
    no state management. The correct architecture is a Lambda or Kappa variant: batch (BSP) for historical
    features, streaming for session-level features, with a feature store unifying both paths.'
  common_mistake: '"Streaming is strictly better because it''s lower latency." This ignores the fundamental
    difference between Bulk Synchronous Parallel (BSP) and streaming execution models and their resource
    efficiency tradeoffs.'
  napkin_math: '100M users × 30-day window × 50 events/user/day × 200 bytes/event = 30 TB of managed streaming
    state. Flink checkpoint interval at 1 min with 30 TB state: each checkpoint writes ~30 TB to S3, taking
    ~300 seconds at 100 GB/s — longer than the checkpoint interval itself. The batch Spark job reads the
    same 30 TB once, aggregates in 3 shuffle stages, completes in ~20 minutes on a 200-node cluster.'
