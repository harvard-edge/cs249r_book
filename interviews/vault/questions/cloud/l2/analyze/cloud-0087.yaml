id: cloud-0087
title: 'The Real-Time Dilemma: TTFT vs. Throughput'
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You are designing the serving infrastructure for a real-time AI code assistant. The absolute
  strictest user-facing SLO is a P99 Time-To-First-Token (TTFT) of less than 200ms. The system uses H100
  GPUs. Your team is debating two strategies for processing the initial user prompts (the ''prefill''
  stage):'
details:
  realistic_solution: 'The fundamental trade-off is throughput vs. tail latency. With an 80ms batching
    window, the worst-case queuing delay is 80ms (a request arriving just after a batch closes). Add 40ms
    prefill compute and you get 120ms worst-case TTFT — within the 200ms SLO. But a continuous stream
    approach with no batching window gives near-zero queuing delay, yielding ~40ms TTFT at the cost of
    lower GPU utilization. For a P99 SLO, you must design for the worst case: total TTFT = max queue wait
    (80ms) + compute (40ms) = 120ms.'
  common_mistake: The most common mistake is to focus only on the GPU compute time and ignore the queueing
    delay. Engineers often answer '40ms', completely forgetting that a request's latency includes the
    time it spends waiting to be processed. Another error is calculating an *average* case (e.g., assuming
    a 40ms average wait) instead of the *worst case*, which is what a P99 SLO requires.
  napkin_math: To guarantee P99 TTFT < 200ms under static batching, max collection window + prefill must
    be < 200ms. If prefill takes 150ms on H100, collection window can only be 50ms. A 50ms window captures
    very few requests, resulting in batch size 1 or 2. H100's 3.35TB/s bandwidth is wasted on small batches
    (low arithmetic intensity), tanking overall throughput.
