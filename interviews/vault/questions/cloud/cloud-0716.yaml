validation_issues:
- The Realistic Solution states '1F1B Bubble Fraction = (P - 1) / M', which is correct. The Napkin Math
  also mentions '1F1B Bubble Fraction = (P - 1) / M' but then presents an additional argument about data
  loader stalls, which is valid but distinct from the pure pipeline bubble calculation. It would be clearer
  to separate these points.
- The calculation in Napkin Math for 1F1B bubble fraction (7/32 = ~21.8%) is correct, but then it switches
  to a 'step taking 10s' which isn't directly derived from the problem's context (e.g., `T_stage` isn't
  used here), potentially making the '2.18s purely idle' hard to reconcile.
