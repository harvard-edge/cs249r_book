title: The Chatbot Latency Crisis
scenario: You are the lead ML Systems Engineer for a new AI chatbot startup. The service is built on a fleet of H100 GPUs and uses a simple static batching strategy with a batch size of 32. During a load test, you observe that GPU utilization is consistently high at ~95%, but user complaints about slow initial response times are flooding in. The request workload is a mix: 90% are short Q&A prompts requiring ~50 new tokens, and 10% are long-form generation prompts requiring ~800 new tokens.
question: What is the most likely cause of P99 TTFT over 4 seconds despite 95% GPU utilization and a mix of 50- and 800-token outputs?
details:
  realistic_solution: The root cause is head-of-line blocking due to the static batching strategy. In static batching, the entire batch of 32 requests must wait for the longest request to complete before the next batch can be processed. When a long request (800 tokens) enters a batch, it forces all other requests, including the short Q&A ones, to wait for its entire generation, catastrophically increasing their latency. The GPU remains 95% utilized because it's busy processing the long request, but this work isn't helping the 31 other users in the batch who are waiting. The correct solution is to implement continuous batching (or 'in-flight' batching), where the server iterates on a token-by-token basis across all active requests in the batch. Once a request finishes, its slot is immediately filled by a new request from the queue, eliminating head-of-line blocking and dramatically reducing average TTFT.
  common_mistake: |
    **The Pitfall:** Assuming high GPU utilization inherently means the GPU is the bottleneck and requires an upgrade.
    **The Rationale:** Engineers equate utilization with useful work, failing to distinguish between productive compute and "bad" utilization where the hardware is busy but not making progress on user-facing metrics due to poor scheduling.
    **The Consequence:** Upgrading hardware wastes capital without fixing the underlying head-of-line blocking problem.
  napkin_math: |
    - **Static Batch Profile:** 1 long request (800 tokens), 31 short requests (50 tokens).
    - **Head-of-Line Blocking:** All 32 requests must wait for the longest one (800 tokens) to finish.
    - **Latency Penalty:** Short requests wait 16× longer than necessary (800 / 50).
    - **Wasted Compute:** 31 short requests × 750 unused token generations = **23,250 empty slot-tokens** wasting valuable GPU time.
  options:
  - The H100 GPU is the bottleneck; its compute capacity is insufficient to handle the request volume, requiring an upgrade to B200s.
  - The network connection to the GPU servers has excessive latency, adding seconds to the initial token response time.
  - The static batching strategy is causing head-of-line blocking, where short requests are stuck waiting for long requests in the same batch to complete.
  - The model's KV-cache is too large, causing excessive memory swapping to HBM which increases latency for all requests.
  correct_index: 2
