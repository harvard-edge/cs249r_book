title: 'Scaling Adversarial Debiasing Penalties'
scenario: 'You are training a credit decision model on 4x GPUs using Adversarial Debiasing to remove geographical proxy variables. The architecture has a shared encoder (512-d embeddings), a loan default predictor, and an adversary predicting zip code clusters. The encoder minimizes L_primary - λ L_adversary. Currently, the primary BCE loss is 0.60. The adversary''s BCE loss has fallen to 0.15, indicating geographical data is heavily encoded. To aggressively debias, you want the adversarial penalty magnitude to be exactly twice the primary task loss.'
question: 'What must λ be set to, and what is the primary risk during training?'
details:
  realistic_solution: 'Set λ = 8.0 to achieve the target penalty magnitude. Implement dynamic λ scaling or early stopping, as a multiplier this high risks ''catastrophic forgetting'' where legitimate credit-risk features are erased alongside the proxy variables.'
  common_mistake: |
    **The Pitfall:** Incorrectly inverting the ratio (setting λ=0.25) or ignoring the primary task risk.
    **The Rationale:** Candidates calculate the ratio backward, or fail to recognize that an overpowering adversarial penalty acts destructively on the encoder.
    **The Consequence:** "Catastrophic forgetting" where legitimate credit-risk features are erased alongside the proxy variables, making the model useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - Objective: Encoder minimizes L_primary - λ L_adversary.
    - Current L_primary = 0.60.
    - Current L_adversary = 0.15.
    - Target Penalty Magnitude: 2 * L_primary.

    **Calculations:**
    - Target Penalty: 2 * 0.60 = 1.20.
    - Equation: λ * L_adversary = 1.20 -> λ * 0.15 = 1.20.
    - Solve for λ: 1.20 / 0.15 = 8.0.

    **Conclusion & Interpretation:**
    - **Result: Optimization-Bound**. λ must be 8.0. At this magnitude, the adversary drastically overpowers the primary task, risking catastrophic forgetting.
