title: Optimizing 3D Parallelism for Frontier LLM Training on AMD MI300X
scenario: You are tasked with training a large language model (LLM) with 1 trillion parameters on a cluster
  of AMD MI300X accelerators. Each MI300X boasts 192 GB of HBM3 memory, 1,307 TFLOPS of FP16 sparse performance,
  and 5.3 TB/s memory bandwidth. The model requires a total memory footprint of approximately 2 PB for
  activations and weights during training. Design a distributed training strategy that effectively combines
  data, tensor, and pipeline parallelism to maximize throughput and minimize communication overhead, considering
  the specific hardware constraints of the MI300X. How would you partition the model and data, what communication
  patterns would emerge, and what are the key bottlenecks you anticipate? Propose mitigation strategies
  for these bottlenecks.
details:
  realistic_solution: 'Implement a hybrid approach: ZeRO-3 for data parallelism to offload optimizer states
    and gradients to host memory/NVMe where possible, significantly reducing memory footprint per MI300X.
    Tensor parallelism (e.g., Megatron-LM style) would be applied within tightly-coupled MI300X nodes
    (e.g., within a single server chassis) to exploit high intra-node bandwidth. Pipeline parallelism
    would then distribute model layers across these tensor-parallel groups, forming a larger distributed
    system. Quantization (e.g., FP8) should be explored to further reduce memory requirements.'
  common_mistake: Overlooking the complex interplay between memory capacity (192 GB HBM3), compute (1,307
    TFLOPS FP16 sparse), and memory bandwidth (5.3 TB/s) when distributing model parameters and activations.
    A common pitfall is to apply naive tensor parallelism across MI300X nodes without sufficient inter-node
    bandwidth, leading to communication-bound performance, or failing to leverage the sparse FP16 capabilities
    effectively.
  napkin_math: For a 1 trillion parameter model with FP16 precision, the weights alone occupy 2 TB (10^12
    params * 2 bytes/param). If activations roughly double this, the total memory needed is 6 TB. With
    each AMD MI300X providing 192 GB HBM3, you'd need at least 6000 GB / 192 GB/MI300X ≈ 32 MI300X accelerators
    purely for static memory storage, before accounting for dynamic memory usage or optimizer states,
    highlighting the critical need for advanced parallelism and memory offloading strategies.
