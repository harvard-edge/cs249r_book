title: Flash Attention Tiling Strategy
scenario: 'Standard self-attention materializes the full S x S attention score matrix in HBM. FlashAttention avoids this.'
question: "What is the core systems insight behind Flash Attention's speedup, and why does SRAM tiling change the bottleneck?"
details:
  realistic_solution: 'Flash Attention exploits the GPU memory hierarchy. Standard attention writes the $S \times S$ matrix (potentially GBs) to HBM, then reads it back for softmax and value multiplication. Flash Attention tiles Q, K, V into blocks that fit in SRAM (~20 MB on A100), computes attention within each tile, and accumulates output without ever materializing the full score matrix in HBM. It trades extra FLOPs (recomputing softmax normalization) for dramatically reduced HBM traffic. Since attention is memory-bandwidth-bound, reducing HBM I/O dominates the runtime.'
  common_mistake: |
    **The Pitfall:** Believing that FlashAttention accelerates the model by reducing the total number of floating-point operations (FLOPs).
    **The Rationale:** Candidates incorrectly assume "faster execution" must equate to "less math," rather than understanding the massive latency disparity between different tiers of the memory hierarchy.
    **The Consequence:** Engineers fail to apply tiling techniques to other kernels, missing out on massive speedups because they refuse to trade "extra math" for "reduced memory I/O".
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence length (S) = 4096. 32 heads. FP16 format (2 bytes).
       - A100 SRAM capacity: 40 MB.
    2. **Calculations:**
       - Standard HBM I/O: Writes 4096² × 2 bytes × 32 heads ≈ 1.07 GB. Reading it back for Softmax adds another 1.07 GB. Total I/O ≈ 2.14 GB per layer.
       - FlashAttention HBM I/O: Tiles blocks into the 40MB SRAM and computes Softmax online. HBM I/O scales as O(N) rather than O(N²).
       - Optimized I/O accesses only the Q, K, V, and O matrices directly ≈ 128 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory I/O Bound Mitigated**. FlashAttention intentionally executes MORE arithmetic FLOPs to recompute the Softmax normalization, drastically slashing the HBM traffic by >16x and delivering a massive wall-clock speedup.
