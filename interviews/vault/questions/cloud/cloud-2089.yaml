title: Flash Attention Tiling Strategy
scenario: Standard self-attention materializes the full $S \times S$ attention score matrix in HBM. Flash
  Attention avoids this. Explain the core systems insight behind Flash Attention's speedup — why does
  tiling the attention computation into SRAM-sized blocks fundamentally change the bottleneck?
question: "What is the core systems insight behind Flash Attention's speedup, and why does SRAM tiling change the bottleneck?"
details:
  realistic_solution: Flash Attention exploits the GPU memory hierarchy. Standard attention writes the
    $S \times S$ matrix (potentially GBs) to HBM, then reads it back for softmax and value multiplication.
    Flash Attention tiles Q, K, V into blocks that fit in SRAM (~20 MB on A100), computes attention within
    each tile, and accumulates output without ever materializing the full score matrix in HBM. It trades
    extra FLOPs (recomputing softmax normalization) for dramatically reduced HBM traffic. Since attention
    is memory-bandwidth-bound, reducing HBM I/O dominates the runtime.
  common_mistake: Saying Flash Attention reduces FLOPs. It actually does MORE FLOPs (recomputing softmax
    statistics) but is faster because it eliminates massive HBM reads/writes.
  napkin_math: 'Standard attention (S=4096): Writes S^2 matrix to HBM. 4096^2 * 2 bytes * 32 heads = 1.0
    GB written, then read back = ~2.0 GB HBM I/O. Flash Attention tiles blocks into A100''s 40MB SRAM,
    computing softmax online. HBM I/O is reduced to O(N) Q,K,V,O accesses ≈ 128 MB. I/O drops 16x, giving
    a 2-4x speedup.'
