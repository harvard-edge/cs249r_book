title: Scoring a Production ML System
scenario: 'A team has: automated training pipeline (1 pt), model unit tests (1 pt), data schema validation
  (1 pt), but no feature monitoring (0 pt), no fairness tests (0 pt), no data drift detection (0 pt),
  no canary deployment (0 pt), no slice-level evaluation (0 pt). They pass 8 of 28 total tests. Calculate
  the score and estimate time to reach production-ready (score 20).'
question: "What is the team's ML Test Score, and how long will it take to reach a production-ready score of 20?"
details:
  realistic_solution: 'Current ML Test Score: 8/28 = 0.286 (29%). Production-ready target: 20/28 = 0.714
    (71%). Gap: 12 tests to implement. Category breakdown of the gap: Data monitoring (drift detection,
    feature monitoring, data freshness) = 3 tests, ~2 weeks each. Model quality (fairness tests, slice
    evaluation, regression tests) = 3 tests, ~2 weeks each. Infrastructure (canary deploy, rollback, A/B
    testing) = 3 tests, ~3 weeks each. Monitoring (alerting, dashboards, prediction logging) = 3 tests,
    ~1 week each. Total estimated time: 3×2 + 3×2 + 3×3 + 3×1 = 6 + 6 + 9 + 3 = 24 engineer-weeks ≈ 6
    months with one dedicated ML platform engineer. This illustrates why ML infrastructure is the hidden
    cost of production ML.'
  common_mistake: Treating all 28 tests as equally important. Data tests and monitoring should be prioritized
    first because they catch the most common production failures (silent data degradation).
  napkin_math: 'Gap: 12 tests × ~2 weeks avg = 24 engineer-weeks. At 1 engineer: 6 months. At 2 engineers:
    3 months. Infrastructure debt compounds if deferred.'
