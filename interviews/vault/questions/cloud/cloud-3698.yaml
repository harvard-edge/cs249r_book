title: Feature Store Freshness SLAs for Time-Sensitive Models
scenario: 'You are designing feature freshness SLAs for a fraud detection model on H100-backed serving infrastructure. The model uses three feature types: real-time transaction features, hourly aggregated spending patterns, and monthly user risk scores.'
question: "What freshness SLA should each fraud feature tier have, and how would the feature store enforce those SLAs?"
details:
  realistic_solution: 'Freshness tiers: (1) Real-time features: freshness SLA < 5 seconds, use event-driven streaming writes to Redis (Kafka → Flink → Redis). (2) Hourly features: freshness SLA < 15 minutes, compute with micro-batch Spark every 15 min, write to Redis. (3) Monthly features: freshness SLA < 2 hours, nightly batch with alerting if pipeline misses. Enforce via freshness metadata and serving-layer staleness checks that degrade gracefully.'
  common_mistake: |
    **The Pitfall:** Applying a uniform, blanket freshness requirement (e.g., 5 seconds) to all features regardless of their natural update cadence.
    **The Rationale:** Architects default to prioritizing low-latency real-time ingestion to ensure "accuracy," ignoring the massive compute and network costs required to endlessly recalculate static historical data.
    **The Consequence:** The streaming engine and feature store Redis instances are violently overwhelmed by useless re-computations of monthly data, crashing the pipeline and causing critical real-time features to miss their SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Real-time features: 50K transactions/sec, 5 features, 100 bytes each.
       - Hourly features: 100M users, 20 features, 4 bytes each.
       - Redis write throughput limit: ~1M ops/sec (~100 MB/s) per node.
    2. **Calculations:**
       - Real-time ingestion: 50K × 5 × 100B = 25 MB/s. (Easily handled by 1 Redis node).
       - Hourly recompute: 100M × 20 × 4B = 8.0 GB materialization volume.
       - Spark processing at 10 GB/s: ~0.8 seconds compute + ~8.0 seconds to write 8GB to Redis at 1 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Architectural Tiering Required**. By strictly decoupling SLAs (5s streaming vs. 15min micro-batch), the pipeline safely hits latency targets without needlessly suffocating the Redis cluster with 8GB batch dumps every few seconds.
