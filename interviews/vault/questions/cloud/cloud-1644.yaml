title: Evaluating NUMA-Aware Data Loading Bottlenecks
scenario: You are architecting the data pipeline for a computer vision training cluster using nodes with
  dual-socket AMD EPYC 7763 CPUs (128 cores total, 2 NUMA nodes) and 8x NVIDIA A100 GPUs. Profiling shows
  that GPUs 4-7 (attached to CPU Socket/NUMA node 1) are experiencing 30% lower utilization than GPUs
  0-3 (attached to NUMA node 0). The PyTorch data loader currently spawns 96 worker threads globally managed
  by the OS. Evaluate the root cause of this asymmetry and justify a redesign of the CPU-to-GPU memory
  allocation strategy.
details:
  realistic_solution: Implement strict NUMA affinity and thread pinning. Map data loader worker threads
    to the specific NUMA node corresponding to their target GPU's PCIe root complex (e.g., threads 0-63
    to NUMA node 0 for GPUs 0-3, and 64-127 to NUMA node 1 for GPUs 4-7) to ensure local DRAM allocation
    and prevent cross-socket data transfers.
  common_mistake: Assuming the OS scheduler will automatically optimize memory page allocation for PCIe
    topology, or attempting to solve the bottleneck by simply increasing the global data loader worker
    count, which actually exacerbates cross-socket interconnect traffic.
  napkin_math: Each A100 GPU can consume host data over PCIe Gen4 x16 at ~32 GB/s. The 4 GPUs on Socket
    1 can demand up to 128 GB/s. Local 8-channel DDR4-3200 provides ~204 GB/s, easily covering this. However,
    the AMD xGMI inter-socket link bandwidth is only ~72 GB/s. If threads on Socket 0 process data for
    Socket 1 GPUs, the 128 GB/s demand hits the 72 GB/s interconnect limit, bottlenecking throughput to
    roughly 56% of theoretical maximum and starving GPUs 4-7.
