title: 'Queueing Theory Analyze: Why Tail Latency Explodes at High Utilization'
scenario: An H100 inference cluster serving LLaMA-70B shows P50 latency of 800ms but
  P99 latency of 12 seconds. Utilization is measured at 89%. Explain using M/M/1 queueing
  theory why tail latency is 15x higher than median, derive the expected wait time
  at this utilization, and explain what happens at 95% utilization.
question: At 89% H100 inference utilization, how does M/M/1 queueing explain P99 latency
  far above P50, and what happens at 95% utilization?
details:
  realistic_solution: 'M/M/1 wait time in queue: Wq = ρ/(μ(1-ρ)). At ρ=0.89: Wq scales
    as 0.89/(1-0.89) = 0.89/0.11 = 8.1x the service time. At ρ=0.95: 0.95/0.05 = 19x
    service time. P99 latency ≈ mean + 4.6σ for exponential service times, and variance
    grows as ρ/(1-ρ)², explaining the 15x gap. The system is in a high-variance regime
    where rare long requests cause queue buildup visible at P99 but not P50.'
  common_mistake: 'Thinking that latency degrades linearly with utilization instead
    of understanding the hyperbolic blowup: W = 1/(μ(1-ρ)) where ρ is utilization.'
  napkin_math: 'M/M/1 mean wait: Wq = ρ/(μ(1-ρ)). At ρ=0.89: multiplier = 0.89/0.11
    = 8.09. Mean service time μ⁻¹ = 800ms (P50 ≈ mean for exponential). Wq = 8.09
    * 800ms = 6.47s. Total W = Wq + service = 6.47+0.8 = 7.27s. P99 for M/M/1: W₉₉
    ≈ -ln(0.01) * W = 4.6 * 7.27 ≈ 33s (theoretical). Observed 12s suggests system
    isn''t perfectly M/M/1. At ρ=0.95: multiplier = 19x → Wq = 15.2s, total ≈ 16s.'
