title: Specifying a Carbon-Aware Cooling Control Policy for H100 Clusters
scenario: A hyperscaler runs a 512-GPU H100 cluster (358.4 kW IT load) at a facility
  with both mechanical chilled-water cooling (PUE contribution 0.35) and free-air
  economizers (PUE contribution 0.08). The facility is grid-connected with real-time
  carbon intensity data from WattTime. Specify a cooling control policy that dynamically
  switches between cooling modes based on both ambient temperature and grid carbon
  intensity to minimize operational carbon footprint.
question: What cooling control policy should the 512-GPU H100 facility use to switch
  modes based on ambient temperature and grid carbon intensity?
details:
  realistic_solution: 'Define a two-axis control matrix: X-axis = ambient wet-bulb
    temperature (cold <15°C, moderate 15–25°C, warm >25°C), Y-axis = grid marginal
    carbon intensity (low <150 gCO₂/kWh, medium 150–300, high >300). Policy: cold+low
    → full free cooling + maximize IT utilization (good carbon time); warm+high →
    engage full mechanical cooling + defer flexible batch jobs; moderate+any → mixed
    mode with economizer assist. Implement as a SCADA control loop reading WattTime
    `/v3/index` (5-min updates) and weather station wet-bulb data. Hysteresis window:
    ±2°C, ±30 gCO₂/kWh to prevent mode oscillation. Log all mode transitions to a
    time-series DB for PUE attribution analysis.'
  common_mistake: Specifying only temperature-based economizer switching without incorporating
    carbon intensity; a cold night with high wind-power availability favors free cooling
    both thermally and from a carbon perspective, but a warm afternoon with high solar
    availability may have lower carbon intensity than a cold night with fossil-heavy
    baseload — temperature alone misses this.
  napkin_math: 'Free cooling mode: overhead = 23 kW (fans + pumps), PUE = (358.4 +
    23) / 358.4 = 1.064. Mechanical cooling mode: overhead = 125 kW (chillers + CRAC),
    PUE = (358.4 + 125) / 358.4 = 1.35. Annual hours in each mode (Austin climate):
    free cooling ~7,500 hr, mechanical ~1,260 hr. Blended annual PUE = (7,500 × 1.064
    + 1,260 × 1.35) / 8,760 = (7,980 + 1,701) / 8,760 = 1.105. Carbon savings from
    carbon-aware mode selection (defer high-intensity hours by 2 hr avg): reduces
    mechanical cooling overlap with high-carbon periods by ~30% = further 0.015 PUE
    improvement annually.'
