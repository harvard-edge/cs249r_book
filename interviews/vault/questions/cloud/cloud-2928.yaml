title: Specifying a Carbon-Aware Cooling Control Policy for H100 Clusters
scenario: A hyperscaler runs a 512-GPU cluster at a facility with both mechanical chilled-water cooling (PUE contribution 0.35) and free-air economizers (PUE contribution 0.08). The facility is grid-connected with real-time carbon intensity data from WattTime.
question: Specify a cooling control policy that dynamically switches between cooling modes based on both ambient temperature and grid carbon intensity to minimize operational carbon footprint.
details:
  realistic_solution: 'Define a two-axis control matrix: X-axis = ambient wet-bulb temperature, Y-axis = grid marginal carbon intensity. Policy: cold+low → full free cooling; warm+high → engage full mechanical cooling + defer flexible batch jobs. Implement hysteresis to prevent mode oscillation.'
  common_mistake: |
    **The Pitfall:** Specifying only temperature-based economizer switching without incorporating carbon intensity.
    **The Rationale:** Engineers assume lower temperature always equals lower carbon footprint.
    **The Consequence:** Operating with higher carbon emissions during periods when mechanical cooling on a clean grid would be greener than free cooling on a dirty grid.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Free cooling PUE: 1.064 (7,500 hrs/yr).
       - Mechanical cooling PUE: 1.35 (1,260 hrs/yr).
    2. **Calculations:**
       - Blended annual PUE = (7,500 * 1.064 + 1,260 * 1.35) / 8,760 = 1.105.
       - Carbon savings defer high-intensity hours by 2 hr avg = 0.015 PUE improvement.
    3. **Conclusion & Interpretation:**
       - **Result: Carbon-aware mode selection reduces mechanical cooling overlap with high-carbon periods.**
