title: MAC Utilization in Memory-Bound Inference
scenario: You are evaluating two cloud accelerator architectures for serving a 70B parameter LLM (FP16) during the autoregressive generation phase at batch size 1. Accelerator A features a massive systolic array delivering 320 TFLOPS of theoretical MAC throughput with 1 TB/s of memory bandwidth. Accelerator B has a smaller compute engine delivering 160 TFLOPS of MAC throughput but features 2 TB/s of memory bandwidth.
question: Which accelerator, A or B, gives lower batch-1 generation latency per token, and why?
details:
  realistic_solution: |
    Choose Accelerator B. The autoregressive generation phase at batch size 1 has an arithmetic intensity of approximately 1 FLOP/byte. Both accelerators are severely memory-bound according to the Roofline Model. Because the vast majority of MAC units will sit idle waiting for weights, Accelerator B provides double the memory bandwidth, reading the 140 GB model twice as fast and effectively cutting latency per token in half.
  common_mistake: |
    **The Pitfall:** Assuming that higher theoretical MAC throughput (TFLOPS) always yields lower latency.
    **The Rationale:** Candidates fixate on peak compute numbers, failing to recognize that batch-size 1 autoregressive generation cannot feed the MAC arrays fast enough due to severely low arithmetic intensity.
    **The Consequence:** The engineering team purchases Accelerator A at high cost, only to suffer terrible latency because the massive compute arrays sit idle waiting for memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B parameters in FP16 (140 GB weights).
       - Phase: Autoregressive decoding (batch size 1).
       - Accelerator A: 320 TFLOPS, 1 TB/s memory bandwidth.
       - Accelerator B: 160 TFLOPS, 2 TB/s memory bandwidth.
    2. **Calculations:**
       - Arithmetic Intensity: ~140 GFLOPs / 140 GB = 1 FLOP/byte (extremely low).
       - Time on Accelerator A: 140 GB / 1 TB/s = 140 ms/token.
       - Time on Accelerator B: 140 GB / 2 TB/s = 70 ms/token.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** At batch size 1, the workload is overwhelmingly bottlenecked by HBM reads. Accelerator B delivers 2x lower latency (70 ms/token) because it possesses double the memory bandwidth, rendering Accelerator A's massive TFLOPS advantage irrelevant.
