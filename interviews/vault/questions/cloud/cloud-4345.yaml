title: Intersectional Fairness Under Distribution Shift
scenario: 'A loan approval model achieves demographic parity (DP gap < 2%) and equalized odds (TPR parity gap < 3%) on the training distribution. Six months post-deployment, a fairness audit reveals that approval rates for Black women aged 18-25 dropped from 41% to 28% while the overall model metrics remain within SLA. The model was not retrained.'
question: What caused this and how do you detect and fix it?
details:
  realistic_solution: 'The root cause is distribution shift at the intersectional level. The model''s fairness guarantees were validated on a training-time joint distribution P(X, race, gender, age). If the input feature distribution for Black women aged 18-25 shifted (e.g., economic conditions, application patterns), the model''s decision boundary is now misaligned for this subgroup even if overall group metrics hold. Detection requires: (1) continuous per-intersectional-cell monitoring with statistical process control charts (CUSUM or EWMA on approval rate), (2) covariate drift detection on intersectional subgroups using maximum mean discrepancy (MMD) between training and live feature distributions. Fix: targeted retraining on augmented data for the drifted subgroup, or threshold recalibration per intersectional cell using Platt scaling on recent deployment data.'
  common_mistake: 'Assuming that demographic parity and equalized odds compliance on aggregate subgroups (race, gender) implies intersectional subgroup fairness. Aggregate metrics can mask severe disparities in intersectional cells while remaining statistically compliant at the marginal level.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline approval rate: 41%.
    - Shifted approval rate: 28%.
    - Sample size (N): 500 monthly applicants in the intersectional cell.
    
    **Calculations:**
    - Approval drop: 41% - 28% = 13 percentage points.
    - Standard error: √(0.41 * 0.59 / 500) ≈ 0.022.
    - Z-score: 0.13 / 0.022 ≈ 5.9.
    - p-value: < 1e-8 (highly significant).
    - MMD test volume: 20 cells * 15 features = 300 tests/day.
    
    **Conclusion & Interpretation:**
    - **Result: Z=5.9 (Distribution-Shift Bound)**. The 13pp drop is statistically significant and practically invisible to marginal DP metrics, requiring cheap but exhaustive per-cell MMD drift monitoring.
