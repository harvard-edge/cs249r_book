math_issues:
- Calculating accumulated usage under an exponential decay by simply multiplying the constant daily usage
  by the half-life is mathematically incorrect. The integral of a continuous 7-day half-life decay is
  Usage * Half-life / ln(2), which yields ~6,060 GPU-days, not 4,200.
