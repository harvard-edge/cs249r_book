title: Parquet Storage and Pipeline Bottleneck Calculation
scenario: You are designing a data loading pipeline for a deep learning model training on an A100 GPU
  (80 GB HBM2e, 2.0 TB/s bandwidth). The training dataset contains 50 billion rows. You are evaluating
  a columnar Parquet format with Snappy compression, which reduces the average row size to 40 bytes. The
  data is stored on a local NVMe drive and transferred to the host CPU over a PCIe Gen5 x16 bus (32 GB/s
  unidirectional). The host CPU can read and decompress this Parquet data at a maximum rate of 10 GB/s
  (measured in compressed bytes). Calculate the total storage required in Gigabytes (GB, where 1 GB =
  10^9 bytes) for the Parquet dataset, and the total time in seconds required to load and decompress the
  entire dataset into host memory.
question: "How much Parquet storage is required, and how long will it take to load and decompress the full 50B-row dataset?"
details:
  realistic_solution: First, calculate the total compressed dataset size by multiplying the number of
    rows by the compressed size per row. Then, identify the bottleneck in the loading pipeline by comparing
    the PCIe transfer bandwidth with the CPU decompression rate. Since the CPU decompression rate of 10
    GB/s is slower than the PCIe Gen5 bandwidth of 32 GB/s, the loading process is CPU-bound. Finally,
    divide the total compressed dataset size by the bottleneck throughput to find the total loading time.
  common_mistake: Candidates often mistakenly use the PCIe bandwidth (32 GB/s) to calculate the loading
    time, forgetting that the pipeline is bottlenecked by the slower CPU decompression rate (10 GB/s).
    Another common error is mixing up base-2 (GiB) and base-10 (GB) calculations despite the prompt specifying
    base-10.
  napkin_math: '1. Total Storage = 50,000,000,000 rows * 40 bytes/row = 2,000,000,000,000 bytes.

    2. Convert to GB: 2,000,000,000,000 bytes / 10^9 = 2,000 GB.

    3. Bottleneck Identification: min(PCIe Gen5 x16 bandwidth, CPU decompression rate) = min(32 GB/s,
    10 GB/s) = 10 GB/s.

    4. Loading Time = 2,000 GB / 10 GB/s = 200 seconds.'
