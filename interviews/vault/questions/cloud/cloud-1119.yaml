title: Control Loop Thrashing in Gang Scheduling
scenario: You operate an ML cluster with 1,024 A100 GPUs across 128 nodes (8 GPUs/node). Distributed training
  jobs use a declarative CRD requiring gang-scheduling. A user requests a 32-GPU job. The cluster has
  40 fragmented GPUs available. The controller creates 32 Pods. The default scheduler binds 24 Pods but
  leaves 8 Pending. After a 60-second timeout, the controller deletes the 24 bound Pods and recreates
  the full set of 32, triggering a continuous cycle of partial allocation, timeout, and recreation. Analyze
  the architectural flaw in this declarative reconciliation loop and diagnose the impact on the cluster
  control plane.
details:
  realistic_solution: Decouple resource reservation from pod creation. Introduce a PodGroup or Queueing
    CRD (e.g., Kueue or Volcano). The controller creates the PodGroup first. The scheduler evaluates the
    32-GPU requirement atomically and only provisions the actual Pods when the full gang can be topologically
    satisfied, eliminating partial state thrashing.
  common_mistake: Focusing purely on node defragmentation or autoscaling to provide 32 contiguous GPUs,
    completely ignoring the control plane thrashing caused by eager pod creation.
  napkin_math: Thrashing 24 pods every 60s generates ~96 etcd operations (create/bind/delete). With 50
    fragmented jobs doing this, that's 4,800 unnecessary etcd writes per minute, artificially inflating
    API server latency and preventing legitimate scheduling events.
