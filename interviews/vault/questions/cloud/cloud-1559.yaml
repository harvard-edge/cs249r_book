title: Diagnosing OOM in 7B LLM Full Fine-Tuning
scenario: You are debugging an OOM error while attempting full fine-tuning of a 7-billion parameter language model on a single 80GB GPU. The script uses mixed precision (FP16) and the standard AdamW optimizer. Despite the model weights taking up only ~14GB in FP16, the training process crashes with a CUDA Out Of Memory error before completing the first forward-backward pass, even with a batch size of 1.
question: Why does full fine-tuning the 7B FP16 model OOM on an 80GB GPU even with batch size 1, and what should you do?
details:
  realistic_solution: Identify that Adam optimizer states and FP32 master weights consume 84GB, making full fine-tuning impossible on an 80GB GPU. Propose solutions like LoRA to reduce trainable parameters, 8-bit Adam, or ZeRO-Offload.
  common_mistake: |
    **The Pitfall:** Focusing on activation memory or attempting to reduce batch size.
    **The Rationale:** During standard deep learning on CNNs, batch size (activations) is usually the dominant memory consumer.
    **The Consequence:** The engineer wastes time trying to tweak context lengths and batch sizes, failing to realize the static weights and optimizer states alone exceed VRAM capacity.
  napkin_math: |
    1. Calculate static weights (FP16): 2 bytes * 7B = 14GB.
    2. Calculate gradients (FP16): 2 bytes * 7B = 14GB.
    3. Calculate Adam optimizer states: Adam requires FP32 master weights, momentum, and variance. (4 + 4 + 4) bytes * 7B = 84GB.
    4. Calculate total static memory: 14GB + 14GB + 84GB = 112GB.
    5. Conclude: 112GB static requirement is **far greater than the 80GB capacity**, making full fine-tuning impossible without offloading or quantization.
