title: 'Evaluating Upgrades for High-Intensity GEMMs'
scenario: 'You are serving a dense Matrix Multiplication (GEMM) workload on NVIDIA A100 GPUs (1.5 TB/s HBM2, 312 TFLOPs FP16). Profiling reveals an arithmetic intensity of 300 FLOPs/byte, and the pipeline is missing its 50ms latency SLA. Engineer A proposes migrating to A100 80GB (2.0 TB/s HBM2e) to increase memory bandwidth. Engineer B proposes implementing structured 2:4 sparsity to double the math throughput.'
question: 'Should you upgrade to A100 80GB memory bandwidth or use 2:4 sparsity for the GEMM SLA miss, and what speedup should you expect?'
details:
  realistic_solution: 'Reject Engineer A''s proposal. The workload is compute-bound, so increasing memory bandwidth yields 0% speedup. Accept Engineer B''s proposal, but note the speedup will be ~1.44x, not 2x, because doubling compute shifts the workload into the memory-bound regime.'
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth upgrades universally improve performance.
    **The Rationale:** Candidates fail to calculate the hardware ridge point to determine if the workload is compute-bound or memory-bound.
    **The Consequence:** Recommending a completely ineffective hardware upgrade (0% speedup) or wildly overestimating the sparsity speedup by assuming a full 2x gain without realizing the workload hits the memory wall.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial Ridge Point: 312 TFLOPS / 1.5 TB/s = 208 FLOPs/byte
    - Workload AI = 300 FLOPs/byte

    **Calculations:**
    - Bottleneck check: 300 > 208 (Compute-Bound)
    - Engineer A (Bandwidth): Compute remains 312 TFLOPS (Speedup = 0%)
    - Engineer B (Sparsity): Peak math doubles to 624 TFLOPS
    - New Ridge Point = 624 / 1.5 = 416 FLOPs/byte
    - New bottleneck check: 300 < 416 (Memory-Bound)
    - Max Speedup = (1.5 TB/s * 300 FLOPs/byte) / 312 TFLOPS = 450 / 312 = 1.44x

    **Conclusion & Interpretation:**
    - **Result: 1.44x Speedup (Memory-Bound)**. The workload hits the memory wall before achieving the theoretical 2x sparsity speedup.
