title: SYCL Portability Layer Performance on Intel Max Series vs H100
scenario: Intel offers oneAPI/SYCL as a portable programming model across Intel Max GPUs, NVIDIA GPUs (via CUDA backend), and CPUs. Your team considers SYCL to avoid writing separate CUDA and HIP kernels.
question: If SYCL loses 69 TFLOPS relative to a 910 TFLOPS native baseline, what is the performance tax percentage?
details:
  realistic_solution: '69/910 = 7.58% ≈ 7.6% (not 7.5%). The difference is in rounding: 7.582... rounds to 7.6, not 7.5.'
  common_mistake: |
    **The Pitfall:** Assuming SYCL's abstraction layer adds negligible overhead on all targets.
    **The Rationale:** Engineers assume modern compilers can perfectly cross-compile intermediate representations without penalty.
    **The Consequence:** On NVIDIA hardware, the SYCL-to-CUDA translation misses architecture-specific optimizations (like warp shuffle and shared memory bank-conflict avoidance), incurring a real performance tax.
  napkin_math: |
    - **Native baseline:** 910 TFLOPS.
    - **Loss:** 69 TFLOPS.
    - **Tax Fraction:** 69 / 910 = 0.07582.
    - **Percentage:** 7.58%, which rounds to **7.6%**.
