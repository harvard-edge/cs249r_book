title: Hybrid CPU-Spillover for Flash Spikes
scenario: An e-commerce platform serves a recommendation model using GPU instances. Baseline traffic is 1,000 RPS handled by 5 GPUs. During flash sales, traffic spikes to 6,000 RPS in 30 seconds. GPUs take 4 minutes to provision, download weights, and warm up. During the last sale, queue buildup caused 40% of requests to breach the 500ms p99 SLA and time out. You can provision CPU instances in 40 seconds (50 RPS capacity per instance, 150ms inference latency).
question: What is the bottleneck during the 6,000 RPS flash-sale spike, and how would you design CPU spillover to cover the 4-minute GPU warmup?
details:
  realistic_solution: Implement a hybrid spillover architecture. Route the baseline traffic to the GPU pool for cost efficiency. During a spike, dynamically scale up fast-starting CPU instances (overprovisioning to e.g., 150 instances to actively drain the initial queue build-up) to absorb the overflow. Once the heavier GPU nodes finish their 4-minute provisioning, shift traffic back and spin down the CPUs.
  common_mistake: |
    **The Pitfall:** Relying purely on GPU auto-scaling with highly aggressive thresholds.
    **The Rationale:** Dismissing CPUs entirely due to their higher steady-state cost-per-inference and ignoring the provisioning latency gap.
    **The Consequence:** Unmitigated queue buildup during the 4-minute GPU warmup, leading to catastrophic SLA breaches.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Spike overflow: 5,000 RPS.
       - GPU provisioning time: 240 seconds.
       - CPU provisioning time: 40 seconds.
       - CPU capacity: 50 RPS per instance.
    2. **Calculations:**
       - GPU Gap Queue: 5,000 RPS overflow * 240s = 1.2M requests queued.
       - CPU instances needed for 7,500 RPS capacity: 150 instances.
       - CPU Gap Queue: 5,000 RPS overflow * 40s = 200K requests queued.
       - Clearance capability: 8,500 RPS total capacity vs 6,000 RPS demand = 2,500 RPS surplus.
       - Clearance time: 200K requests / 2,500 RPS = 80 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 150 CPUs clear the spike in 80 seconds. Provisioning-Latency-Bound.**
