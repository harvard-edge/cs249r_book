title: Compute Cost of Adding Network Depth
scenario: 'A 10-layer CNN processes 224×224 images in 8ms on an A100. Each layer has the same architecture:
  256 filters, 3×3 conv, stride 1. Adding 5 more layers (to 15 total) increases representational power.
  Estimate the inference time increase and additional parameters.'
details:
  realistic_solution: 'Each identical conv layer: parameters = 256 × 256 × 3 × 3 + 256 = 590,080 ≈ 590K.
    FLOPs per layer (assuming same spatial dimensions via padding): 2 × 256 × 256 × 3 × 3 × H × W. At
    layer 10, if no pooling, H=W=224. FLOPs = 2 × 256 × 256 × 9 × 224 × 224 ≈ 59.1 GFLOPs per layer. 5
    additional layers: 5 × 590K = 2.95M new parameters (in FP16: 5.9 MB). 5 × 59.1 GFLOPs = 295.5 additional
    GFLOPs. Original 10-layer: ~591 GFLOPs in 8ms → throughput = 73.9 TFLOPS. New 15-layer: ~886 GFLOPs.
    Time estimate = 886 / 73.9 TFLOPS = 12ms. The 50% more layers add 50% more time because all layers
    are identical. Adding parameters: 15 layers × 590K = 8.85M total → 8.85M new total vs 5.9M original
    = 50% more parameters.'
  common_mistake: Assuming adding layers always improves performance proportionally. Beyond a certain
    depth, gradients vanish and additional layers hurt training. This is why ResNets use skip connections.
  napkin_math: '5 extra identical layers = 50% more compute and params. 8ms × 1.5 = 12ms. Extra params:
    ~3M (6MB FP16). Linear cost scaling for linear depth increase.'
