title: Compute Cost of Adding Network Depth
scenario: A 10-layer CNN processes 224x224 images in 8ms. Each layer has the same architecture: 256 filters, 3x3 conv, stride 1. Adding 5 more layers (to 15 total) increases representational power.
question: "How much do inference time and parameter count increase when adding 5 identical 256-filter 3×3 layers to the 10-layer CNN?"
details:
  realistic_solution: 'Each identical conv layer: parameters = 256 × 256 × 3 × 3 + 256 = 590,080 ≈ 590K. FLOPs per layer (assuming same spatial dimensions via padding): 2 × 256 × 256 × 3 × 3 × H × W. At layer 10, if no pooling, H=W=224. FLOPs = 2 × 256 × 256 × 9 × 224 × 224 ≈ 59.1 GFLOPs per layer. 5 additional layers: 5 × 590K = 2.95M new parameters (in FP16: 5.9 MB). 5 × 59.1 GFLOPs = 295.5 additional GFLOPs. Original 10-layer: ~591 GFLOPs in 8ms → throughput = 73.9 TFLOPS. New 15-layer: ~886 GFLOPs. Time estimate = 886 / 73.9 TFLOPS = 12ms. The 50% more layers add 50% more time because all layers are identical. Adding parameters: 15 layers × 590K = 8.85M total → 8.85M new total vs 5.9M original = 50% more parameters.'
  common_mistake: |
    **The Pitfall:** Assuming adding layers always improves performance proportionally.
    **The Rationale:** Beyond a certain depth, gradients vanish and additional layers hurt training unless skip connections are used.
    **The Consequence:** Wasting compute on deeper networks that perform worse than shallower ones.
  napkin_math: |
    - 5 extra identical layers = 50% more compute and params.
    - Time estimate: 8ms * 1.5 = **12ms**.
    - Original params per layer: 256 * 256 * 3 * 3 = ~590K.
    - Extra params: 5 * 590K = **~2.95M new parameters**.
    - **Result:** **Linear cost scaling for linear depth increase.**
