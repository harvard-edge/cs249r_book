title: Evaluating Grey-Market GPU Fleet Reliability
scenario: Your ML infrastructure team is scaling a training cluster to 8,192 GPUs for a new MoE model.
  Due to 52-week OEM lead times, procurement sourced 1,024 8x-A100 baseboards from an unauthorized broker.
  During the NCCL burn-in phase, 15% of the new nodes exhibit persistent uncorrectable ECC memory errors
  and thermal throttle at 350W (instead of the expected 400W TDP), despite passing standard `nvidia-smi`
  vendor ID checks. Evaluate the trade-offs and operational risks of integrating this hardware versus
  delaying the training run for 6 months, justifying your architectural decision with system-level math.
question: "Should you integrate the unauthorized A100 baseboards or delay 6 months for verified hardware, given 15% ECC errors and throttling?"
details:
  realistic_solution: Quarantine the unauthorized batch entirely. The specific symptoms (VRAM degradation
    and lower thermal limits masking as premium SKUs) strongly indicate counterfeit or re-marked hardware
    (e.g., degraded ex-cryptomining boards). In synchronous large-scale training, global progress is dictated
    by the weakest node. The cost of continuous distributed checkpoint restarts will result in near-zero
    goodput, making a 6-month delay for verified OEM hardware operationally and financially superior.
  common_mistake: Assuming the failures are standard 'infant mortality' or firmware bugs, and attempting
    to underclock or isolate the bad GPUs to salvage the batch, while failing to recognize the systemic
    risk that re-marked or degraded counterfeit silicon poses to synchronous distributed training.
  napkin_math: If 15% of the 1,024 new nodes are faulty (approx. 153 faulty nodes), and a single faulty
    node crashes every 10 hours, the aggregate MTBF for the new batch alone is 10 hours / 153 = ~3.9 minutes.
    If saving/loading a global checkpoint across 8,192 GPUs takes 5 minutes, the cluster MTBF (3.9m) is
    shorter than the recovery time (5m). Goodput is literally 0%; training cannot mathematically progress.
