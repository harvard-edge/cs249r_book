title: Evaluating Grey-Market GPU Fleet Reliability
scenario: Your ML team is scaling to 8,192 GPUs. Due to OEM lead times, you sourced 1,024 baseboards from an unauthorized broker. During NCCL burn-in, 15% of the new nodes exhibit persistent uncorrectable ECC memory errors causing them to crash on average every 10 hours, and thermal throttle at 350W, despite passing vendor ID checks.
question: Should you integrate the unauthorized baseboards or delay 6 months for verified hardware, given 15% ECC errors and throttling?
details:
  realistic_solution: 'Quarantine the unauthorized batch entirely. The symptoms strongly indicate counterfeit or re-marked degraded hardware (e.g., ex-cryptomining boards). In synchronous large-scale training, global progress is dictated by the weakest node. The continuous distributed checkpoint restarts will result in near-zero goodput, making a 6-month delay financially superior.'
  common_mistake: |
    **The Pitfall:** Treating catastrophic hardware degradation as a simple firmware or "infant mortality" bug.
    **The Rationale:** Sunk cost fallacy leads engineers to attempt underclocking or isolating "bad" GPUs to salvage the expensive unauthorized batch.
    **The Consequence:** Integrating unstable silicon guarantees cluster MTBF drops below recovery time, bringing a multi-million dollar synchronous training run to a complete halt.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total cluster: 8,192 GPUs.
       - Faulty batch: 15% of 1,024 new nodes = 153 faulty nodes.
       - Faulty node MTBF: 10 hours.
       - Global checkpoint recovery time: ~5 minutes.
    2. **Calculations:**
       - Aggregate MTBF of faulty batch = 10 hours / 153 = ~3.9 minutes.
       - 3.9 minutes (MTBF) < 5 minutes (Recovery Time).
    3. **Conclusion & Interpretation:**
       - **Result: Goodput Drops to 0%.** The cluster MTBF is mathematically shorter than the recovery time, bringing synchronous training to a complete halt.
