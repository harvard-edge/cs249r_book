title: Embedding Dimension vs Model Capacity Tradeoff in RecSys
scenario: 'A team debates whether to increase item embedding dimension from 64 to 256 for a DLRM-style model. The item catalog has 10M items.'
question: 'What are the memory and performance tradeoffs of increasing item embeddings from 64 to 256 dimensions for 10M items?'
details:
  realistic_solution: 'Memory cost of increasing embedding dim: 10M items * (256-64) * 4B = 10M * 192 * 4 = 7.68GB additional. Affordable on a 32-GPU system. Downstream cost: DLRM feature interaction uses a dot product between all pairs of embeddings and dense features. Number of feature pairs: n*(n+1)/2 where n = number of features. At 20 embedding features + 10 dense: 30 features. Interaction output: 30*31/2 = 465 scalars. Increasing embedding dim does not change this (interaction is embedding to scalar). But upper MLP layers now operate on larger embedding-concatenated input. If the MLP input layer concatenates all embeddings: 20 * 256 = 5120 dims vs 20 * 64 = 1280 dims. MLP first layer parameters: 4x larger. Training cost: per-sample FLOP increases proportionally. Expected quality gain: embedding dim has diminishing returns past 128 for 10M items. Research finding: quality improvement of 64→128 is significant; 128→256 is marginal (typically <1% AUC gain).'
  common_mistake: |
    **The Pitfall:** Evaluating only the raw memory cost of the larger embedding table.
    **The Rationale:** It is easy to calculate the size of the embedding table but harder to foresee how those dimensions multiply through downstream dense layers.
    **The Consequence:** Teams miss the fact that larger embeddings quadratically increase the FLOPs required in the MLP feature interaction layers, leading to unexpected training slowdowns and higher inference latency.
  napkin_math: |
    - **Embedding Memory Cost:** 10M items * (256 - 64) dimensions * 4 bytes = **7.68 GB extra memory.**
    - **MLP Input Size (concatenating 20 features):** 20 * 256 = 5120 dims (vs 20 * 64 = 1280 dims).
    - **MLP First Layer Params (512 hidden size):** 5120 * 512 = 2.62M params (vs 1280 * 512 = 655K params). **4x larger.**
    - **FLOP Impact:** 4x larger first MLP layer causes a ~20-30% total FLOP increase during training and inference.
