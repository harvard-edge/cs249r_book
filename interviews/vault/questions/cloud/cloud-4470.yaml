title: Embedding Dimension vs Model Capacity Tradeoff in RecSys
scenario: A team debates whether to increase item embedding dimension from 64 to 256
  for a DLRM-style model. The item catalog has 10M items. Calculate the memory cost
  and estimate the performance tradeoff.
question: What are the memory and performance tradeoffs of increasing item embeddings
  from 64 to 256 dimensions for 10M items?
details:
  realistic_solution: 'Memory cost of increasing embedding dim: 10M items * (256-64)
    * 4B = 10M * 192 * 4 = 7.68GB additional. Affordable on a 32-GPU system. Downstream
    cost: DLRM feature interaction uses a dot product between all pairs of embeddings
    and dense features. Number of feature pairs: n*(n+1)/2 where n = number of features.
    At 20 embedding features + 10 dense: 30 features. Interaction output: 30*31/2
    = 465 scalars. Increasing embedding dim does not change this (interaction is embedding
    to scalar). But upper MLP layers now operate on larger embedding-concatenated
    input. If the MLP input layer concatenates all embeddings: 20 * 256 = 5120 dims
    vs 20 * 64 = 1280 dims. MLP first layer parameters: 4x larger. Training cost:
    per-sample FLOP increases proportionally. Expected quality gain: embedding dim
    has diminishing returns past 128 for 10M items. Research finding: quality improvement
    of 64→128 is significant; 128→256 is marginal (typically <1% AUC gain).'
  common_mistake: Evaluating only the embedding table memory cost without considering
    that larger embeddings increase the cost of downstream feature interaction layers
    quadratically and require longer training time to converge due to the higher-dimensional
    parameter space.
  napkin_math: 'Embedding dim 64 vs 256: Memory: 10M * (256-64) * 4B = 7.68GB extra.
    MLP first layer (512 hidden): (20*256) * 512 = 2.62M params vs (20*64) * 512 =
    655K params. 4x larger. Additional params: 1.97M * 4B = 7.9MB — negligible vs
    7.68GB embedding cost. Training throughput impact: embedding lookup FLOP: same
    O(lookup_count). MLP FLOP: 4x larger first layer = ~20-30% total FLOP increase
    (MLP is a fraction of total). Recommendation: 128 is a good sweet spot. Only increase
    to 256 if 128→128 AUC plateau is confirmed and memory budget allows.'
