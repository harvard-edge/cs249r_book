title: Weight vs Output Stationary Dataflow
scenario: You are designing the computation placement dataflow for a cloud ML accelerator with a 256x256
  spatial processing array. You are mapping a projection layer Y = XW, where activations X has shape (M=1024,
  K=512) and weights W has shape (K=512, N=512). You must choose between a Weight-Stationary (WS) and
  an Output-Stationary (OS) placement. Calculate the total number of element reads of the weight matrix
  W from the global SRAM into the spatial array for both WS and OS strategies, assuming operations are
  strictly tile-by-tile (256x256) with no intermediate inter-tile caching in the array.
details:
  realistic_solution: In Weight-Stationary (WS), the 512x512 weight matrix is divided into four 256x256
    tiles. Each tile is loaded into the array once and held stationary while activations stream through,
    resulting in 262,144 total weight reads. In Output-Stationary (OS), each of the 8 output tiles requires
    re-reading the corresponding K-dimension slice of W, totaling 1,048,576 weight reads — a 4x increase.
    WS is therefore optimal for this layer shape.
  common_mistake: Candidates often assume memory reads for weights equal the matrix size in both dataflows,
    failing to account for how the outer tiling loops in Output-Stationary force redundant re-reads of
    weight tiles when the output matrix is larger than the array.
  napkin_math: 'W matrix size = 512 * 512 = 262,144 elements.


    WS Strategy:

    - W is divided into (512/256) * (512/256) = 4 tiles.

    - Each W tile is read exactly once into the array.

    - Total W reads = 4 * (256 * 256) = 262,144.


    OS Strategy:

    - Y output is divided into (1024/256) M-tiles * (512/256) N-tiles = 8 total Y-tiles.

    - To compute one 256x256 Y-tile, we must stream the entire K dimension (512) for that N-slice (256)
    of W.

    - W elements read per Y-tile = K * N_tile = 512 * 256 = 131,072.

    - Total W reads = 8 Y-tiles * 131,072 = 1,048,576.'
