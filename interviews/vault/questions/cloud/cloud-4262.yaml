title: Chiplet Die-to-Die Bandwidth vs HBM Bandwidth
scenario: You are profiling a transformer inference kernel on MI300X and see unexpectedly high latency on attention heads.
question: What chiplet-level bottleneck should you investigate first?
details:
  realistic_solution: The attention pattern may be causing KV-cache accesses that span multiple XCDs. If the KV cache for a single sequence is striped across XCDs, each token generation requires cross-fabric reads. Pin KV cache allocation to a single XCD's local HBM region using ROCm's NUMA-aware allocator.
  common_mistake: |
    **The Pitfall:** Automatically blaming raw HBM bandwidth.
    **The Rationale:** Engineers assume all memory accesses are local and add parallelism across XCDs (compute dies) to spread the load.
    **The Consequence:** Spreading KV-cache across XCDs actually increases cross-die traffic on the Infinity Fabric, drastically worsening the latency.
  napkin_math: |
    *   **Local HBM3 Bandwidth:** ~660 GB/s per XCD.
    *   **Cross-XCD Penalty:** Infinity Fabric adds a ~1.5-2x latency penalty for remote reads.
    *   **Striped Layout Cost:** For a 128 GB KV cache striped across 8 XCDs, each decode step fetches ~16 GB locally.
    *   **Remote Fetch Cost:** The remaining ~112 GB must cross the Infinity Fabric.
    *   **Result:** **This creates a 7x cross-fabric pressure multiplier, heavily bottlenecking the attention computation.**
