title: Diagnosing Gradient Checkpointing Bypasses
scenario: 'You are supporting a cloud customer training a custom 40-layer Transformer (hidden size = 8192) on an 80GB A100 cluster. They use batch size 16, sequence length 4096, and BF16 precision. They enabled gradient checkpointing for every transformer block. However, telemetry shows GPU memory usage climbing linearly by ~1GB per layer during the forward pass, hitting 70GB total before OOMing during the early backward pass. The checkpointing API is correctly applied to the layer modules.'
question: What is causing the 1GB-per-layer memory growth despite checkpointing, and how much memory is being retained?
details:
  realistic_solution: |
    The linear memory growth matching layer output sizes indicates that the computational graph is retaining references to the output tensors of every layer. Because the checkpointing API is applied correctly, the root cause is a structural bypass. This almost always occurs when users collect intermediate activations in a standard Python list to compute a custom loss at the end of the forward pass. Autograd forms a dependency edge, keeping layer outputs alive for the backward pass. To resolve this, intermediate loss computation must be moved inside the checkpointed function.
  common_mistake: |
    **The Pitfall:** Assuming PyTorch's memory allocator is fragmented or that the checkpointing API is broken.
    **The Rationale:** Candidates misinterpret structural graph bypasses (like collecting intermediate activations for custom losses) as framework bugs.
    **The Consequence:** Time wasted tuning PYTORCH_CUDA_ALLOC_CONF instead of fixing the fundamental graph topology.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40-layer Transformer.
    - Hidden size = 8192, Batch size = 16, Sequence length = 4096, BF16.

    **Calculations:**
    - Layer output tensor size: 16 * 4096 * 8192 * 2 bytes = 1.07 GB.
    - Retained activation memory (due to graph bypass): 1.07 GB * 40 layers = 42.8 GB.
    - Expected checkpointed activation memory: ~1.07 GB.
    - Excess memory causing the OOM: 42.8 GB - 1.07 GB = 41.73 GB.

    **Conclusion & Interpretation:**
    - **Result: 41.73 GB Excess Memory (Memory-Bound)**. The graph retains ~43 GB of intermediate tensors, pushing total memory to 70GB and causing an OOM.
