title: Evaluating MoE Routing Graph Breaks in PyTorch 2.x
scenario: Your team is deploying a dynamic-routing Mixture of Experts (MoE) model on an 8x GPU cluster. You leverage torch.compile to fuse kernels and reduce CPU dispatch overhead. However, production latency is highly erratic, fluctuating between 20ms and 150ms per forward pass, compared to a steady 45ms in eager Python mode. Profiling reveals that torch._dynamo is triggering frequent graph breaks and recompilations. This is traced to the dynamic top-k routing mechanism, where the number of tokens routed to each expert dynamically changes per batch based on data-dependent control flow.
question: Should you pad MoE expert capacities to static sizes or retain dynamic routing to achieve predictable sub-30ms latency with torch.compile?
details:
  realistic_solution: 'Justify padding tokens to a fixed expert capacity to enforce static tensor shapes. While padding adds ~25% compute overhead (15ms * 1.25 = 18.75ms), the torch.compile kernel fusion and zero dispatch overhead provide a 1.5x speedup, yielding 12.5ms deterministic latency — far better than the 45ms with graph break recompilation. The key insight is that compilation speedup from static shapes more than compensates for the padding waste.'
  common_mistake: |
    **The Pitfall:** Disabling compilation entirely to fix the erratic latency, or assuming the compiler just needs more warm-up time.
    **The Rationale:** Failing to recognize that data-dependent tensor shapes fundamentally break ahead-of-time graph compilation.
    **The Consequence:** Reverting to eager mode, missing out on 1.5x speedups, and accepting higher baseline latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Eager baseline: 15ms compute + 30ms graph break/recompilation overhead = 45ms total latency.
    - Padding overhead: 25% extra compute.
    - Kernel fusion speedup: 1.5x.

    **Calculations:**
    - Static Padding compute: 15ms * 1.25 = 18.75ms base compute.
    - Compiled deterministic latency: 18.75ms / 1.5 = 12.5ms.

    **Conclusion & Interpretation:**
    - **Result: 12.5ms deterministic latency (Compilation-Bound)**. Kernel fusion speedups heavily outweigh the cost of padding waste.
