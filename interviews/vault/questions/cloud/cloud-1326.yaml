title: Evaluating MoE Routing Graph Breaks in PyTorch 2.x
scenario: Your team is deploying a dynamic-routing Mixture of Experts (MoE) model on an 8x H100 GPU cluster.
  You leverage `torch.compile` to fuse kernels and reduce CPU dispatch overhead. However, production latency
  is highly erratic, fluctuating between 20ms and 150ms per forward pass, compared to a steady 45ms in
  eager Python mode. Profiling reveals that `torch._dynamo` is triggering frequent graph breaks and recompilations.
  This is traced to the dynamic top-k routing mechanism, where the number of tokens routed to each expert
  dynamically changes per batch based on data-dependent control flow. Evaluate the architectural trade-offs
  between padding expert capacities to fixed static sizes versus retaining dynamic routing, and justify
  a compilation strategy to achieve predictable, sub-30ms latency.
question: "Should you pad MoE expert capacities to static sizes or retain dynamic routing to achieve predictable sub-30ms latency with torch.compile?"
details:
  realistic_solution: Justify padding tokens to a fixed expert capacity to enforce static tensor shapes.
    While padding adds ~25% compute overhead (15ms * 1.25 = 18.75ms), the torch.compile kernel fusion
    and zero dispatch overhead provide a 1.5x speedup, yielding 12.5ms deterministic latency — far better
    than the 45ms with graph break recompilation. The key insight is that compilation speedup from static
    shapes more than compensates for the padding waste.
  common_mistake: Candidates often suggest disabling compilation entirely to fix the erratic latency,
    or they assume the compiler just needs more warm-up time, failing to recognize that data-dependent
    tensor shapes fundamentally break ahead-of-time graph compilation.
  napkin_math: "Dynamic Routing: 15ms compute + 30ms graph break/recompilation overhead = 45ms total latency.\
    \ \nStatic Padding (assuming 25% compute overhead for padding): 15ms * 1.25 = 18.75ms base compute.\
    \ \nWith compilation speedup (e.g., 1.5x from kernel fusion and zero dispatch overhead): 18.75ms /\
    \ 1.5 = 12.5ms deterministic latency."
