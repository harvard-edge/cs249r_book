title: GPU Deep Sleep Energy Savings
scenario: A cluster of 100 GPU nodes processes batch jobs overnight. Standard idle power is 100W per GPU, while deep sleep is 10W.
question: Calculate the total energy savings in kWh if 80 idle nodes (8 GPUs each) are put into deep sleep for 12 hours.
details:
  realistic_solution: 'Calculate the total number of idle GPUs, determine the wattage saved per GPU, and multiply by the duration.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply the number of nodes by the number of GPUs per node.
    **The Rationale:** Candidates assume nodes and GPUs are synonymous or overlook standard SXM multi-GPU node configurations.
    **The Consequence:** The final energy savings calculation will be off by a factor of 8.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Idle nodes = 80 (8 GPUs/node).
       - Savings = 100W - 10W = 90W/GPU.
    2. **Calculations:**
       - Total GPUs = 80 * 8 = 640 GPUs.
       - Total Power Saved = 640 * 90W = 57,600W (57.6 kW).
       - Energy Saved = 57.6 kW * 12 hours = 691.2 kWh.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Efficiency (Deep sleep yields 691.2 kWh in savings).**
