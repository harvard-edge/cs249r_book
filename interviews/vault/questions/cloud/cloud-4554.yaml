title: GPU Deep Sleep Energy Savings
scenario: A cluster of 100 H100 SXM nodes processes batch jobs overnight. Standard
  idle power is 100W per GPU, while deep sleep is 10W.
question: Calculate the total energy savings in kWh if 80 idle nodes (8 GPUs each)
  are put into deep sleep for 12 hours.
details:
  realistic_solution: There are 80 nodes * 8 GPUs = 640 idle GPUs. The power saved
    per GPU is 100W - 10W = 90W. Multiplying 640 GPUs by 90W yields 57,600W (57.6
    kW) of power savings. Over 12 hours, this saves 691.2 kWh of energy.
  common_mistake: Forgetting to multiply the number of nodes by the number of GPUs
    per node (8 for standard SXM configurations).
  napkin_math: 80 * 8 * 90 * 12 / 1000 = 691.2 kWh
