title: Cloud Tokenization L3 0
scenario: A 7B LLM uses a 32K vocabulary with embedding dimension 4096. You consider expanding to 128K
  vocabulary to improve multilingual efficiency (reducing average token count by 40%). Calculate the memory
  trade-off.
question: "If a 7B LLM expands from a 32K to 128K vocabulary and cuts token count by 40%, what is the memory trade-off?"
details:
  realistic_solution: 'Embedding table memory: vocab_size × dim × 2 bytes (FP16). 32K vocab: 32,768 ×
    4,096 × 2 = 256 MB. 128K vocab: 131,072 × 4,096 × 2 = 1,024 MB = 1 GB. Delta: +768 MB for embedding
    table. Total model: 7B × 2B = 14 GB. Embedding increase: 768 MB / 14 GB = 5.5% model size increase.
    But 40% fewer tokens means: KV cache savings at seq_len 4096: 4096 × 0.6 = 2458 effective length.
    KV cache: 2 × layers × dim × seq_len × 2B. For 32-layer model: 40% less KV cache = savings of ~6.4
    GB at batch=8. Net: +768 MB model, -6.4 GB KV cache = 5.6 GB net memory savings at inference.'
  common_mistake: Only looking at embedding table size increase without considering KV cache and attention
    FLOP savings from shorter sequences. A larger vocabulary increases model size slightly but can dramatically
    reduce inference cost.
  napkin_math: '32K vocab embed: 32K × 4096 × 2B = 256 MB. 128K: 128K × 4096 × 2B = 1 GB. Delta: +768
    MB. Token reduction 40%: KV cache savings ~6.4 GB at batch=8, seq=4096. Net: ~5.6 GB savings. Attention
    FLOPS: 0.6² = 0.36 → 64% fewer attention FLOPs.'
