title: Cloud Tokenization L3 0
scenario: A 7B LLM uses a 32K vocabulary with an embedding dimension of 4096. You consider expanding to a 128K vocabulary to improve multilingual efficiency, reducing average token count by 40%.
question: If a 7B LLM expands from a 32K to 128K vocabulary and cuts token count by 40%, what is the memory trade-off?
details:
  realistic_solution: 'Embedding table memory: vocab_size * dim * 2 bytes (FP16). 32K vocab: 32,768 * 4,096 * 2 = 256 MB. 128K vocab: 131,072 * 4,096 * 2 = 1,024 MB = 1 GB. Delta: +768 MB for embedding table. Total model: 7B * 2B = 14 GB. Embedding increase: 768 MB / 14 GB = 5.5% model size increase. But 40% fewer tokens means: KV cache savings at seq_len 4096: 4096 * 0.6 = 2458 effective length. KV cache: 2 * layers * dim * seq_len * 2B. For 32-layer model: 40% less KV cache = savings of ~6.4 GB at batch=8. Net: +768 MB model, -6.4 GB KV cache = 5.6 GB net memory savings at inference.'
  common_mistake: |
    **The Pitfall:** Looking only at the embedding table size increase.
    **The Rationale:** Candidates see the vocabulary multiplying by 4x and assume the model will become bloated and slower.
    **The Consequence:** They reject a highly beneficial optimization, failing to account for the massive KV cache and attention FLOP savings from shorter sequence lengths.
  napkin_math: |
    - **Calculate Embedding Increase:** 32K vocab embed = `32K * 4096 * 2B = 256 MB`. 128K vocab embed = `128K * 4096 * 2B = 1 GB`. Delta = **+768 MB**.
    - **Calculate KV Cache Savings:** A 40% token reduction drops seq_len from 4096 to 2458. For a 32-layer model at batch=8, this yields a KV cache saving of **~6.4 GB**.
    - **Calculate Net Memory:** `+768 MB - 6.4 GB = ` **~5.6 GB net savings** at inference.
    - **Calculate FLOP Savings:** Attention FLOPs scale quadratically. `(0.6)^2 = 0.36`, resulting in **64% fewer attention FLOPs**.
