title: Cloud Tokenization L3 0
scenario: A 7B LLM uses a 32K vocabulary with an embedding dimension of 4096. You consider expanding to a 128K vocabulary to improve multilingual efficiency, reducing average token count by 40%.
question: If a 7B LLM expands from a 32K to 128K vocabulary and cuts token count by 40%, what is the memory trade-off?
details:
  realistic_solution: 'Net memory savings at inference. While the embedding table grows, the 40% reduction in tokens drastically reduces the KV cache size at runtime, resulting in a net memory decrease and massive FLOP savings.'
  common_mistake: |
    **The Pitfall:** Looking only at the embedding table size increase.
    **The Rationale:** Candidates see the vocabulary multiplying by 4x and assume the model will become bloated and slower.
    **The Consequence:** They reject a highly beneficial optimization, failing to account for the massive KV cache and attention FLOP savings from shorter sequence lengths.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B LLM (14 GB at FP16).
       - Embedding dimension: 4096, Precision: FP16 (2 bytes).
       - Sequence length reduction: 40% (from 4096 to 2458).
       - Model layers: 32, Batch size: 8.
    2. **Calculations:**
       - 32K vocab embedding: 32,768 * 4096 * 2 bytes = ~268 MB.
       - 128K vocab embedding: 131,072 * 4096 * 2 bytes = ~1.07 GB. Delta = +805 MB.
       - Old KV Cache (seq 4096): 2 * 32 * 4096 * 4096 * 2 bytes * 8 batch = 17.17 GB.
       - New KV Cache (seq 2458): 2 * 32 * 4096 * 2458 * 2 bytes * 8 batch = 10.3 GB. Delta = -6.87 GB.
       - Attention FLOP reduction: (0.6)^2 = 0.36 (64% fewer FLOPs).
    3. **Conclusion & Interpretation:** **A slight model size increase (+805 MB) yields massive KV cache savings (-6.87 GB), overcoming the Memory-Bound bottleneck.**
