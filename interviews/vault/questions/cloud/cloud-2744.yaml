title: Continuous Training Triggers
scenario: Your recommendation model's click-through rate has been slowly declining over 3 weeks. A colleague
  suggests switching from scheduled weekly retraining to continuous training. Explain what triggers continuous
  training and why it helps with model staleness.
details:
  realistic_solution: 'Continuous training automates the retraining pipeline with two main trigger types:
    (1) Schedule-based: retrain every N hours/days regardless of performance. Simple but may retrain unnecessarily
    or too late. (2) Drift/performance-based: monitor key metrics (prediction distribution shift, feature
    drift, or business metrics like CTR) and trigger retraining when they degrade beyond a threshold.
    For your declining CTR case, the weekly schedule is too slow — user behavior patterns change faster.
    A continuous training pipeline would: detect the CTR drift within days, automatically trigger data
    ingestion of recent interaction data, launch a training job, validate the new model against the old
    one, and promote it if it passes quality gates. The key components are: a drift detector, an orchestrator
    (Airflow/Kubeflow), automated data ingestion, training job launcher, and validation gates.'
  common_mistake: Thinking continuous training means training 24/7. It actually means automated retraining
    triggered by specific conditions (data drift, performance degradation, or schedule), not constant
    GPU usage.
  napkin_math: 'Weekly retraining: up to 7 days of staleness. Drift-triggered: detect in ~1 day, retrain
    in ~4h, deploy in ~1h. Staleness drops from 7 days to ~1.5 days.'
