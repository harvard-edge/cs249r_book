title: Draft Model Placement on Multi-GPU Inference
scenario: 'You serve a 405B target model across 8 GPUs (tensor parallelism) with a 7B draft model. Options: (A) run draft on all 8 GPUs (TP=8), (B) run draft on 1 GPU while others idle, (C) run draft on a separate 9th GPU.'
question: "For a 405B target on 8 GPUs, should the 7B draft run with TP=8, on one of the 8 GPUs, or on a separate 9th GPU?"
details:
  realistic_solution: 'Option A (TP=8): Draft weights per GPU: 7B x 2B / 8 = 1.75GB. Forward pass: 14 GFLOP / (8 x 989T) = 1.8us compute + all-reduce: 128K x 2B / 900 GB/s = 0.3us per layer x 32 layers = 9.6us. Total: ~12us per token. Very fast but wastes 7 GPUs during draft generation. Option B (TP=1): Draft on GPU-0: 14GB weights. Forward: 14 GFLOP / 989T = 14us. Other 7 GPUs idle during ~5 x 14us = 70us. Negligible idle time vs target decode (80ms). Total: 70us for 5 draft tokens. Option C (extra GPU): 14GB on GPU-8. No interference with target. Latency: same as B (70us). Cost: extra GPU ($2/hr). Recommendation: Option B. Draft generation is only 70us total — 0.09% of the verification time. No need for parallelism or extra hardware. The key insight: speculation is valuable precisely because the draft is tiny and fast; making it faster with more GPUs has negligible impact.'
  common_mistake: |
    **The Pitfall:** Defaulting to TP=8 for the draft model just because the target model uses it.
    **The Rationale:** Candidates assume that more GPUs will naturally make the draft model faster, ignoring communication overhead.
    **The Consequence:** The all-reduce synchronization overhead for a small 7B model across 8 GPUs exceeds the parallelization benefit, drastically slowing down speculative decoding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target verification takes 80ms.
       - Option A (TP=8): 12us/token.
       - Option B (TP=1): 14us/token.
    2. **Calculations:**
       - Option A (TP=8): 12us/token * 5 tokens = 60us, with all 8 GPUs busy.
       - Option B (TP=1): 14us/token * 5 tokens = 70us, with 1 GPU busy and 7 idle.
       - Option C (Extra GPU): 70us on a separate 9th GPU.
    3. **Conclusion & Interpretation:** **Result: Latency-Insensitive**. Option B is optimal because 70us is a negligible 0.09% overhead compared to 80ms verification, avoiding TP overhead and extra hardware costs.
