title: Optimizing Dual-Socket Memory Bandwidth
scenario: You are deploying a compute-heavy PyTorch model on a dual-socket Intel Xeon server (2 NUMA nodes). The local DDR5 memory bandwidth is 300 GB/s per socket, while the cross-socket interconnect (UPI) provides a maximum of 64 GB/s. Your current deployment launches 2 worker processes that share a single model instance in memory (defaulting to Node 0) and schedules threads randomly across all 112 cores on both sockets.
question: What effective memory bandwidth does the shared Node-0 model get, and how should you reconfigure the workers for NUMA locality?
details:
  realistic_solution: Duplicate the model weights so a copy exists in each NUMA node's memory. Launch independent worker processes using `numactl --cpunodebind=N --membind=N` to ensure each worker only uses local cores and local memory.
  common_mistake: |
    **The Pitfall:** Only pinning CPU threads while leaving model weights in a single NUMA node.
    **The Rationale:** Candidates forget that accessing remote memory across the UPI link is a massive bottleneck.
    **The Consequence:** The application threads are pinned correctly, but they still saturate the slow cross-socket bus.
  napkin_math: |
    1. **Naive Setup:** Node 0 gets 300 GB/s, but Node 1 is bottlenecked by the 64 GB/s UPI link.
    2. **Total Naive BW:** < 364 GB/s.
    3. **NUMA Isolated:** Duplicating weights gives Node 0 300 GB/s AND Node 1 300 GB/s.
    4. **Total Isolated BW:** **600 GB/s (~1.6x+ improvement)**.
