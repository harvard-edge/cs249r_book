title: MIG Compute Partitioning vs. Latency SLAs
scenario: Your team is deploying 7 independent ML microservices on a single A100 80GB GPU. Each service
  requires 8GB of VRAM. The baseline inference latency for a single service running exclusively on the
  full A100 (108 SMs) is 15ms. The business requires a strict P99 latency SLA of 50ms for all services.
  An engineer proposes partitioning the A100 into 7x `1g.10gb` MIG (Multi-Instance GPU) profiles to ensure
  strict hardware isolation and eliminate 'noisy neighbor' resource fragmentation. Evaluate the feasibility
  of this proposal.
details:
  realistic_solution: Reject the proposal. While MIG provides excellent memory and fault isolation, it
    hard-partitions the SMs and memory bandwidth. A `1g.10gb` profile on an A100 only provides 14 SMs
    (approx. 1/7th of total compute). This will linearly throttle execution speed, pushing latency to
    ~115ms and violating the 50ms SLA. To meet the SLA while maintaining density, use NVIDIA MPS (Multi-Process
    Service) to allow concurrent processes to burst across all 108 SMs, trading strict hardware isolation
    for higher peak compute.
  common_mistake: Candidates assume that because the 8GB models easily fit within the 10GB memory partitions,
    MIG is the optimal solution for strict isolation. They fail to evaluate the compute (SM) and bandwidth
    partitioning aspect of MIG and its direct impact on baseline execution latency.
  napkin_math: 'Full A100 latency = 15ms on 108 SMs.

    MIG 1g.10gb slice = 14 SMs.

    Compute capability reduction = 108 / 14 ≈ 7.7x.

    Estimated MIG latency = 15ms * 7.7 ≈ 115ms.

    115ms >> 50ms SLA (Violation).

    (Even if execution is entirely memory-bandwidth bound, the ~1/8th bandwidth slice of a 1g.10gb profile
    results in a similar latency penalty).'
