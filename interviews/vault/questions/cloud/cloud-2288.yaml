title: The Fairness Monitoring Compute Budget
scenario: Your content recommendation system serves 100M daily active users across 8 demographic groups.
  Compliance requires computing equalized odds metrics every hour. Each fairness evaluation requires joining
  prediction logs with outcome labels (clicks within 30 minutes) and computing per-group confusion matrices.
  Estimate the hourly data volume, the storage for a rolling 30-day audit window, and the compute cost
  of this fairness monitoring pipeline.
details:
  realistic_solution: 'At 100M DAU with ~20 recommendations per user per day, that is 2B predictions/day
    or ~83M predictions/hour. Each prediction log record (user_id, item_id, prediction_score, timestamp,
    demographic_group, outcome_label) is ~200 bytes. Hourly data: 83M × 200B ≈ 16.6 GB. The outcome join
    requires a temporal window join — matching predictions with click events that arrive up to 30 minutes
    later — which means buffering ~16.6 GB of predictions and joining against a stream of click events.
    This is a streaming join (Flink/Spark Structured Streaming), not a simple SQL query. Rolling 30-day
    audit: 16.6 GB/hr × 24 × 30 = ~12 TB compressed. Compute: the hourly aggregation (group-by demographic,
    compute TP/FP/TN/FN counts) is modest (~5 minutes on a 16-core Spark cluster), but the streaming join
    is the bottleneck — expect 4-8 m5.xlarge equivalent instances running continuously.'
  common_mistake: Treating fairness monitoring as a lightweight dashboarding task. At 100M DAU, the log
    join alone is a significant data engineering workload, and the 30-day audit retention creates substantial
    storage requirements.
  napkin_math: '100M DAU × 20 recs/user = 2B predictions/day. Hourly: 83M records × 200 bytes = 16.6 GB/hr.
    Monthly audit window: 16.6 × 24 × 30 = 11,952 GB ≈ 12 TB. At $0.023/GB/month (S3): $276/month for
    storage alone. Streaming join cluster: ~4 instances × $0.192/hr (m5.xlarge) × 720 hrs = $553/month.
    Total fairness monitoring overhead: ~$830/month — small relative to the serving fleet, but non-zero
    and often unbudgeted.'
