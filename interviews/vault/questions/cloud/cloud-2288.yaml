title: The Fairness Monitoring Compute Budget
scenario: Your content recommendation system serves 100M daily active users across 8 demographic groups. Compliance requires computing equalized odds metrics every hour. Each fairness evaluation requires joining prediction logs with outcome labels (clicks within 30 minutes) and computing per-group confusion matrices.
question: For 100M DAU and 8 demographic groups, what hourly volume, 30-day audit storage, and compute cost does fairness monitoring require?
details:
  realistic_solution: |
    Model observability at this scale transitions from simple SQL queries into heavy streaming data engineering. A temporal window join must be maintained to merge the high-velocity prediction logs with delayed outcome labels. This mandates buffering gigabytes of state in memory and committing terabytes of data to cold storage for the 30-day compliance audit window.
  common_mistake: |
    **The Pitfall:** Treating fairness monitoring as a lightweight cron-job task or a simple dashboard view.
    **The Rationale:** Engineers routinely underestimate the computational cost of stateful temporal joins required to match asynchronous predictions with delayed outcomes.
    **The Consequence:** The observability pipeline catastrophically fails to scale, silently drops telemetry, and generates unbudgeted, massive cloud infrastructure bills.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic: 100M DAU * 20 recommendations = 2B predictions/day (83.3M/hour).
       - Log Payload: 200 bytes per record.
       - Audit Window: 30 days.
       - S3 Cost: $0.023/GB. Compute: ~$553/month.
    2. **Calculations:**
       - Hourly Velocity: 83.3M records/hr * 200 bytes = ~16.6 GB/hour.
       - 30-Day Storage Array: 16.6 GB/hr * 24 hrs * 30 days = 11,952 GB (~12 TB).
       - Storage OpEx: 12 TB * $0.023 = ~$276/month.
       - Total Infrastructure OpEx: $276 (Storage) + $553 (Compute) = ~$829/month.
    3. **Conclusion & Interpretation:**
       - **Maintaining the stateful join and 12 TB audit log drives ~$830/month in systemic overhead. Result: Compute/Storage Cost Bound.**
