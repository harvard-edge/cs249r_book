title: The Fairness Monitoring Compute Budget
scenario: Your content recommendation system serves 100M daily active users across 8 demographic groups. Compliance requires computing equalized odds metrics every hour. Each fairness evaluation requires joining prediction logs with outcome labels (clicks within 30 minutes) and computing per-group confusion matrices.
question: For 100M DAU and 8 demographic groups, what hourly volume, 30-day audit storage, and compute cost does fairness monitoring require?
details:
  realistic_solution: 'At 100M DAU with ~20 recommendations per user per day, that is 2B predictions/day or ~83M predictions/hour. Each prediction log record (user_id, item_id, prediction_score, timestamp, demographic_group, outcome_label) is ~200 bytes. Hourly data: 83M × 200B ≈ 16.6 GB. The outcome join requires a temporal window join — matching predictions with click events that arrive up to 30 minutes later — which means buffering ~16.6 GB of predictions and joining against a stream of click events. This is a streaming join, not a simple SQL query.'
  common_mistake: |
    **The Pitfall:** Treating fairness monitoring as a lightweight dashboarding or cron-job task.
    **The Rationale:** Engineers often underestimate the join complexity required to match asynchronous predictions with delayed outcomes.
    **The Consequence:** The pipeline fails to scale, requires massive retroactive data processing, and incurs unbudgeted storage and compute overhead.
  napkin_math: |
    1. Calculate daily predictions: 100M DAU * 20 recs/user = 2B predictions/day.
    2. Calculate hourly data volume: 83M records/hour * 200 bytes/record = 16.6 GB/hour.
    3. Calculate 30-day audit storage: 16.6 GB/hour * 24 hours * 30 days = 11,952 GB ≈ 12 TB.
    4. Calculate storage cost: 12 TB at $0.023/GB/month (S3 standard) = ~$276/month.
    5. Calculate compute cost: Streaming join cluster uses ~4 m5.xlarge instances * $0.192/hr * 720 hrs = ~$553/month.
    6. Conclude: Total fairness monitoring overhead is **~$830/month**.
