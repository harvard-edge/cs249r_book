title: 'The TCO of Privacy: Centralized vs. Federated'
scenario: 'Your team is building a next-word prediction model for a mobile keyboard app with 10 million users. You must decide between two training architectures: Centralized vs. Federated Learning.'
question: How should you compare the two training architectures over the 3-year project to choose the more economical one?
details:
  realistic_solution: 'To find the most economical approach, you must calculate the Total Cost of Ownership (TCO) for each option over the full 3-year period. The TCO includes both one-time CapEx and recurring OpEx.'
  common_mistake: |
    **The Pitfall:** Only comparing the annual operational costs (OpEx).
    **The Rationale:** Candidates ignore the significant one-time capital expenditures (CapEx) and R&D investments needed to build FL infrastructure.
    **The Consequence:** Recommending an architecture with a misleadingly low initial cost that ultimately blows past the 3-year TCO budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-year project lifespan
    - Centralized: $500k CapEx, $1M/yr OpEx
    - FL: Higher initial R&D CapEx but lower ongoing OpEx

    **Calculations:**
    - Centralized TCO = $500k (CapEx) + 3 * $1M/yr (OpEx) = $3.5M
    - FL TCO = $2M (CapEx) + 3 * $300k/yr (OpEx) = $2.9M

    **Conclusion & Interpretation:**
    - **Result: $2.9M (Cost-Bound)**. Tradeoff. Federated Learning is the more economical choice over a 3-year span due to lower sustained OpEx.
  options:
  - 'Centralized is cheaper with a TCO of $1.5M, vs. FL at $2.3M. (Error: Calculates for only 1 year)'
  - 'Federated Learning is cheaper with a TCO of $900k, vs. Centralized at $3M. (Error: Ignores CapEx)'
  - Federated Learning is cheaper with a 3-year TCO of $2.9M, vs. Centralized at $3.5M.
  - 'Centralized is cheaper with a TCO of $2.0M, vs. FL at $3.9M. (Error: Mixes up CapEx and OpEx)'
