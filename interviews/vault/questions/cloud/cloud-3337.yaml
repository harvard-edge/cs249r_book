title: Diagnosing Performance Variability on Google TPU v5e due to Thermal Constraints
scenario: You are observing a critical training job on a TPU exhibiting significant performance degradation. The model uses close to the full 16 GB HBM. Sustained training throughput drops by 30-40% after the first hour, occasionally worsening with hotter ambient datacenter temperatures.
question: How would you diagnose whether TPU training slowdowns after an hour are caused by thermal throttling and ambient temperature effects?
details:
  realistic_solution: 'A systematic diagnosis would involve: 1. Monitoring TPU core temperatures and clock frequencies over time. 2. Correlating performance drops with temperature spikes. 3. Checking system logs for thermal throttling events. 4. Analyzing power consumption patterns. 5. Investigating datacenter environmental controls (ambient temperature, airflow). 6. Considering the impact of workload intensity on heat generation and how it interacts with the TPU''s cooling solution. 7. Proposing solutions like optimizing batch sizes to reduce instantaneous thermal load, scheduling workloads during cooler periods, or exploring alternative cooling configurations if within control.'
  common_mistake: |
    **The Pitfall:** Immediately blaming software or code inefficiencies without ruling out environmental factors.
    **The Rationale:** Software engineers often overlook the physical realities of accelerator hardware, assuming peak TFLOPS are continuously sustainable.
    **The Consequence:** Wasting weeks trying to optimize perfectly good matrix math while the hardware continues to automatically throttle itself to prevent melting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak BF16 compute: 197 TFLOPS.
       - Throughput drops by 30-40% after 1 hour.
    2. **Calculations:**
       - If sustained workload is 120 TFLOPS, effective utilization drops.
       - A 20% hardware throttle down directly cuts step times by 20%.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** Thermal throttling strictly bounds long-term throughput regardless of software optimization.
