title: Diagnosing Static Graph Compilation OOM
scenario: Your team is migrating a massive multimodal model from PyTorch eager mode to a static graph execution framework (e.g., PyTorch/XLA) to optimize serving on a fleet of A100 80GB GPUs. In eager mode, the model successfully runs inference with a peak memory of 65GB. However, during the `jit` compilation phase of the static graph, the compiler repeatedly crashes with an Out-Of-Memory (OOM) error on the compilation host machine (which has 256GB of system RAM). The model features heavy data-dependent control flow and processes dynamic sequence lengths ranging from 128 to 8192 tokens.
question: Why does static graph JIT compilation OOM on a 256GB host for dynamic sequence lengths, and how would you bound the compiler memory?
details:
  realistic_solution: Analyze the compilation traces for dynamic shapes and control flow. The root cause is shape-induced recompilation and loop unrolling overhead on the host. The solution involves padding input sequences to fixed buckets (e.g., 512, 1024, 2048, 4096, 8192) to bound the number of uniquely compiled graphs, and utilizing explicit structured control flow primitives (like `jax.lax.scan` or `torch.cond`) instead of Python-native loops to prevent extreme graph unrolling, thereby keeping the host compilation footprint well below 256GB.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the OOM as a GPU execution limit (like activation or parameter size) rather than a host-side compilation framework fault.
    
    **The Rationale:** ML engineers are intimately familiar with standard VRAM out-of-memory errors during execution, but are notoriously unaccustomed to graph compilers exhaustively traversing code structures prior to launch.
    
    **The Consequence:** The team wastes massive engineering hours pruning the model architecture and quantizing weights to fit in smaller VRAM blocks, achieving absolutely nothing since the host's 256GB RAM keeps crashing during JIT translation.
  napkin_math: |
    - **Dynamic Matrix**: Sequence lengths dynamically varying from 128 to 8192 yields 8,065 distinct input shapes.
    - **Compiler Footprint**: If the intermediate representation (IR) state for each unique shape mandates 50MB of host memory.
    - **Combinatorial Explosion**: 8,065 shapes * 50MB/shape ≈ **403 GB of RAM**, instantly crashing the 256GB host machine.
    - **Result**: Bucketing down strictly to 5 fixed sizes restricts the host memory ceiling to a negligible 5 * 50MB = **250 MB**.
