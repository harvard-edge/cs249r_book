title: Epsilon Budget Allocation Across Queries
scenario: 'Your analytics platform lets ML teams query a sensitive medical dataset. The total privacy budget is epsilon = 10.0 for the year. Teams submit 200 queries per month (2,400/year). Each query trains a small model or computes aggregate statistics.'
question: 'How do you allocate the epsilon budget across 2,400 yearly queries, and what happens when it''s exhausted?'
details:
  realistic_solution: 'Use a tiered allocation strategy: (1) Reserve 50% of budget (epsilon = 5.0) for high-priority queries (model training runs) - expect ~20/year, each gets epsilon = 0.25 (reasonable for DP-SGD). (2) Allocate 30% (epsilon = 3.0) for medium-priority queries (aggregate statistics) - expect ~200/year via the sparse vector technique (SVT), which answers above/below-threshold queries cheaply. SVT can answer 200 threshold queries for total epsilon = 3.0 by only paying for queries that exceed the threshold. (3) Reserve 20% (epsilon = 2.0) for ad-hoc exploration with the private data synopsis - a one-time differentially private synthetic dataset that subsequent queries access for free (post-processing immunity). When budget exhausts: queries against the real data are blocked. Teams must use the synthetic dataset or wait for the next budget period. Implement a dashboard showing remaining budget and projected exhaustion date.'
  common_mistake: |
    **The Pitfall:** Dividing epsilon equally across all expected queries.
    **The Rationale:** Equal allocation (10.0 / 2,400) gives an epsilon so small that every query result is drowned in noise. This ignores that some queries are more valuable than others.
    **The Consequence:** The entire privacy budget is wasted on generating completely useless, noisy results for every query.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Epsilon: 10.0/year.
    - 2,400 queries/year.

    **Calculations:**
    - Equal allocation: 10 / 2400 = 0.0042 per query (Useless).
    - Tiered allocation: Training (ε=0.25), SVT (ε=3.0 for 200 queries).

    **Conclusion & Interpretation:**
    - **Result: Tiered Strategy (Budget-Bound)**. Allocating by value enables 20 high-value and 200 medium-value queries, rather than 2,400 useless ones.
