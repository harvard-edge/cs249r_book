title: Fairness Evaluation of Large-Scale Models on Google TPU v5e
scenario: 'Your team deployed a large language model on a TPU v5e cluster (16 GB HBM, 197 TFLOPS) for content moderation. You must rapidly evaluate the model for "equalized odds" fairness across subgroups without hurting production inference latency.'
question: 'How would you sample and process data on TPU v5e to compute subgroup TPR/FPR for equalized odds without degrading production SLA?'
details:
  realistic_solution: 'A realistic solution involves using a stratified sampling approach to create a representative, yet smaller, evaluation dataset that covers all critical subgroups. This dataset should be optimized for batch processing on the TPU. Instead of re-inferring, one could store model logits or embeddings for the sampled data. Then, perform post-processing on a CPU or a smaller, dedicated TPU pod to calculate TPR/FPR for each subgroup.'
  common_mistake: |
    **The Pitfall:** Attempting a full re-evaluation of the entire dataset on every subgroup during live traffic.
    **The Rationale:** Prioritizing perfect evaluation accuracy over resource and SLA constraints.
    **The Consequence:** Excessive computational cost, massive TPU memory OOMs, and severe latency degradation for production requests.
  napkin_math: |
    - **Sample Size:** 1,000,000 data points.
    - **Storage per Point:** 256-dimensional BF16 logits (2 bytes per value).
    - **Memory Footprint:** 1M × 256 × 2 bytes = 512 MB.
    - **Feasibility:** 512 MB easily fits within the 16 GB HBM of a single TPU v5e.
    - **Time Cost:** 1M inferences × 10ms/inference = 10,000 seconds = ~2.8 hours on a single TPU.
