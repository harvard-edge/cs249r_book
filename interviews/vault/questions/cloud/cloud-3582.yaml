title: Fairness Evaluation of Large-Scale Models on Google TPU v5e
scenario: Your team deployed a large language model on a TPU v5e cluster (16 GB HBM, 197 TFLOPS) for content moderation. You must rapidly evaluate the model for "equalized odds" fairness across subgroups without hurting production inference latency.
question: How would you sample and process data on TPU v5e to compute subgroup TPR/FPR for equalized odds without degrading production SLA?
details:
  realistic_solution: Use a stratified sampling approach to create a representative dataset that covers all critical subgroups. Instead of re-inferring on production infrastructure, store model logits or embeddings for the sampled data. Then, perform post-processing on a CPU or a smaller, dedicated offline TPU pod to calculate TPR/FPR for each subgroup.
  common_mistake: |
    **The Pitfall:** Attempting a full re-evaluation of the entire dataset via the production API.
    **The Rationale:** Prioritizing perfect evaluation completeness over critical production SLA and resource constraints.
    **The Consequence:** Excessive computational cost, severe TPU memory exhaustion, and massive latency degradation for live user traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sample Size: 1,000,000 data points.
       - Hardware: TPU v5e (16 GB HBM).
       - Payload: 256-dimensional BF16 logits (2 bytes per value).
    2. **Calculations:**
       - Memory Footprint: 1,000,000 * 256 * 2 bytes = 512 MB.
       - Compute Time: 1,000,000 inferences * 10ms = 10,000 seconds = ~2.8 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Off-Peak Batching.** The 512 MB footprint easily fits on a single TPU. Caching logits and post-processing offline protects the live SLA.
