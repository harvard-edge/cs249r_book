title: Scheduling Deadline-Aware Training Jobs
scenario: A research team needs their 70B model trained to 1T tokens before a conference deadline in 14
  days. They estimate needing 128 H100 GPUs continuously. Your cluster has 200 H100 GPUs with other workloads.
  Design a scheduling plan that guarantees the deadline while maximizing cluster utilization for other
  users.
details:
  realistic_solution: 'Phase 1: Capacity planning. 70B model at 1T tokens: FLOPs = 6 × 70B × 1T = 420
    PFLOP-days. 128 H100s at 989 TFLOPS BF16, 50% MFU: 128 × 990 × 0.5 = 63.4 PFLOPS effective. Time:
    420,000 PFLOP / (63.4 PFLOPS × 86400 s/day) = 76.7 s? No: 420 × 10^18 / (63.4 × 10^15) = 6624 seconds
    = 1.84 hours. Wait, let me recalculate: 6 × 70 × 10^9 × 10^12 = 420 × 10^21 FLOPs total. Per second:
    63.4 × 10^15. Time: 420 × 10^21 / 63.4 × 10^15 = 6624 × 10^0... That gives 6624 seconds = 110 minutes.
    This seems too fast. Recheck: the standard estimate is ~21 days on 128 H100s for 70B at 1T tokens.
    Using the empirical Llama 2 70B number: 1.7M GPU-hours for 2T tokens. For 1T tokens: 850K GPU-hours.
    With 128 GPUs: 850K/128 = 6640 hours = 277 days. Schedule: 128 GPUs is insufficient — need the full
    200 GPUs. At 200 GPUs: 850K/200 = 4250 hours = 177 days. Still over 14 days. Resolution: the team
    needs to reduce scope (fewer tokens), use more GPUs, or accept a longer timeline. Scheduling plan:
    reserve 128 GPUs with guaranteed preemption priority, allow other users on remaining 72 GPUs, implement
    automatic checkpointing every 30 minutes, use the remaining 72 GPUs as burst capacity during off-peak
    hours (nights/weekends).'
  common_mistake: Dedicating 128 GPUs exclusively for 14 days — this wastes GPUs during the team's inevitable
    downtime (debugging, job failures, re-queuing).
  napkin_math: 'Llama 2 70B: 1.7M GPU-hours for 2T tokens. 1T tokens ≈ 850K GPU-hours. 128 GPUs × 14 days
    × 24h = 43K GPU-hours. Shortfall: 850K - 43K = 807K GPU-hours. Need ~2500 GPUs for 14-day deadline.'
