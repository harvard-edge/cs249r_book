title: 'Optimizing LLM Deployment on A100: Mitigating Memory Fragmentation and OOM'
scenario: You are deploying a large language model (LLM) for inference on an NVIDIA GPU. During peak load, you observe frequent Out-Of-Memory (OOM) errors and degraded performance, despite the model nominally fitting within memory. Investigations reveal that dynamic memory allocations for intermediate activations, caching, and background OS processes are causing memory fragmentation, leading to OOM even when total free memory theoretically exists. The model's batch size is already optimized to the maximum possible.
question: How would you diagnose and mitigate A100 memory fragmentation and OS-level eviction under peak load?
details:
  realistic_solution: 'Use tools like nvidia-smi and framework-specific profilers (e.g., PyTorch''s cuda.memory_summary(), Nsight Systems) to identify peak memory usage, allocation patterns, and fragmentation hot-spots. Implement or tune custom CUDA memory allocators (e.g., PyTorch''s caching allocator settings) to better manage memory chunks and coalesce free blocks. Investigate and tune Linux kernel parameters (e.g., transparent_hugepages configuration, OOM killer thresholds).'
  common_mistake: |
    **The Pitfall:** Focusing solely on the static memory footprint of the model weights.
    **The Rationale:** Candidates neglect dynamic memory allocations, system overhead, or the critical impact of memory fragmentation.
    **The Consequence:** OOMs persist in production despite monitoring tools showing ample total free memory, leading to lower reliability.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 GB total HBM2e memory.
    - Static Footprint (Model + Base Activations + Buffers): 70 GB.

    **Calculations:**
    - Reported Free Memory: 80 GB - 70 GB = 10 GB.
    - Fragmentation State: 10 GB broken into five 1.5 GB blocks + smaller chunks.
    - New Allocation Request: 2.0 GB contiguous block for intermediate tensor.
    - Comparison: 2.0 GB request > 1.5 GB largest available contiguous block.

    **Conclusion & Interpretation:**
    - **Result: OOM Error (Memory-Bound)**. OOM occurs because the 2.0 GB contiguous requirement exceeds the largest unfragmented block (1.5 GB), despite 10 GB of total free memory.
