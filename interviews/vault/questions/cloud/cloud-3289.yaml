title: 'Optimizing LLM Deployment on A100: Mitigating Memory Fragmentation and OOM'
scenario: You are deploying a large language model (LLM) for inference on an NVIDIA A100 GPU. During peak load, you observe frequent Out-Of-Memory (OOM) errors and degraded performance, despite the model nominally fitting within the 80 GB. Investigations reveal that dynamic memory allocations for intermediate activations, caching, and background OS processes are causing memory fragmentation, leading to OOM even when total free memory theoretically exists. The model's batch size is already optimized to the maximum possible.
question: How would you diagnose and mitigate A100 memory fragmentation and OS-level eviction under peak load?
details:
  realistic_solution: 1. Deep Memory Profiling: Use tools like `nvidia-smi` and framework-specific profilers (e.g., PyTorch's `cuda.memory_summary()`, Nsight Systems) to identify peak memory usage, allocation patterns, and fragmentation hot-spots. 2. Custom Memory Allocators: Implement or tune custom CUDA memory allocators (e.g., PyTorch's caching allocator settings, or potentially custom C++ CUDA allocators) to better manage memory chunks, coalesce free blocks, and reduce fragmentation. 3. OS-level Tuning: Investigate and tune Linux kernel parameters related to memory management (e.g., `vm.swappiness`, `transparent_hugepages` configuration, OOM killer thresholds) if the OS is aggressively swapping, evicting GPU-related memory pages, or contributing to fragmentation. Ensure proper container resource limits to constrain background processes. 4. Activation Offloading/Eviction Policies: Strategically offload less critical data or activations to host memory (CPU) when under extreme pressure, or implement custom eviction policies if the framework allows, although this might introduce latency.
  common_mistake: |
    **The Pitfall:** Focusing solely on the static memory footprint of the model weights.
    **The Rationale:** Candidates neglect dynamic memory allocations, system overhead, or the critical impact of memory fragmentation.
    **The Consequence:** OOMs persist in production despite monitoring tools showing ample total free memory, leading to lower reliability.
  napkin_math: |
    *   **Total HBM2e:** 80 GB.
    *   **Static Footprint (Model + Base Activations + Buffers):** 70 GB.
    *   **Reported Free Memory:** 10 GB.
    *   **Fragmentation State:** The 10 GB is fragmented into five 1.5 GB blocks and smaller chunks.
    *   **New Allocation Request:** A contiguous 2.0 GB block is needed for an intermediate tensor.
    *   **Result:** **OOM Error occurs because 2.0 GB > 1.5 GB, illustrating that total free memory does not equal max allocatable contiguous block.**
