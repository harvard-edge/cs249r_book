title: Designing a Benchmark Suite for LLM Inference
scenario: MLPerf's current LLM inference benchmark uses fixed prompt/output lengths. Your VP asks you to design a next-generation benchmark suite that better reflects real-world LLM serving workloads.
question: What limitations does the current benchmark have, and how would you design a suite that tests real-world production dimensions?
details:
  realistic_solution: 'The current benchmark''s fundamental limitations: (1) Fixed prompt/output lengths ignore the bimodal nature of real traffic (short chat + long-context RAG/summarization). (2) No mixed-workload scenario: production systems serve heterogeneous requests simultaneously. (3) TTFT and TPOT are measured in isolation, but users experience them jointly (a 50ms TTFT with 100ms TPOT feels different than 500ms TTFT with 20ms TPOT). (4) No cost metric: systems optimized for raw throughput may be 3x more expensive per token. The next-gen suite design: (a) Workload generator with realistic distributions: prompt lengths from Zipf distribution (mode=200 tokens, tail to 128K), output lengths correlated with prompt type, Poisson arrival process with diurnal burstiness (5x peak-to-trough). (b) Four scenarios that mirror real deployment: Interactive Chat (P99 TTFT < 200ms, P95 TPOT < 30ms), Batch Processing (maximize throughput, no latency SLA), Long-Context RAG (128K input, 1K output, test KV-cache efficiency), Mixed-Priority (simultaneous interactive + batch, test scheduling fairness). (c) Metrics: throughput (tokens/sec), SLA attainment rate (% requests meeting all SLOs), cost-efficiency (tokens/sec/$), energy-efficiency (tokens/joule). (d) Compliance: reference workload traces published (like SPECweb), accuracy must match reference within 1% perplexity on held-out set, power measured at the wall per MLPerf Power methodology, system must run for 30 minutes minimum to capture thermal steady state.'
  common_mistake: |
    **The Pitfall:** Simply adding more modern models (Mixtral, Gemma) to the existing framework.
    **The Rationale:** Assuming that benchmarking newer weights automatically makes the benchmark more realistic.
    **The Consequence:** The suite still tests artificial, isolated latency metrics (TTFT vs TPOT) on fixed-length inputs, completely failing to measure system resilience under bursty, mixed-priority, long-context traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Production Trace Reality: 60% short chat (150 in / 100 out), 25% RAG (4K in / 500 out), 10% summarization (32K in / 2K out), 5% long-context (100K+ in / 1K out).

    **Calculations:**
    - Resource Skew: The 5% long-context requests consume 80% of GPU KV-cache memory and 60% of compute.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound**. A benchmark testing only mean lengths completely misses the long-tail requests that actually bottleneck memory and dictate real-world capacity.
