title: 'Scaling Data Parallelism: Ethernet vs InfiniBand'
scenario: You are scaling the training of a 300M parameter model (approx 1.2GB in FP32) across a 128-node
  cluster (8x A100 80GB GPUs per node). The cross-node interconnect is standard 100 Gbps Ethernet, while
  intra-node is NVLink. A proposal is on the table to upgrade the cross-node network to 400 Gbps InfiniBand
  to improve training efficiency. Evaluate the standard Data Parallelism communication overhead and justify
  whether the costly InfiniBand upgrade is mathematically necessary to avoid network bottlenecks, assuming
  a compute time of 150ms per batch step.
question: "Is the 400 Gbps InfiniBand upgrade necessary for 128-node data-parallel training, given 150ms compute per step?"
details:
  realistic_solution: Calculate the AllReduce time using the 100 Gbps (12.5 GB/s) cross-node bottleneck.
    Because the logical ring must traverse the slowest link, the 192ms communication time exceeds the
    150ms compute time, making the system network-bound. Upgrading to 400 Gbps (50 GB/s) reduces communication
    time to 48ms, fully hiding it behind the 150ms compute and unblocking the scaling.
  common_mistake: Candidates often look only at the high intra-node NVLink bandwidth and ignore the cross-node
    Ethernet bottleneck in the Ring AllReduce logical ring, failing to recognize that the slowest link
    determines the entire ring's throughput.
  napkin_math: Ring AllReduce data transferred per GPU = 2 * (N-1)/N * Model_Size ≈ 2 * 1 * 1.2GB = 2.4GB.
    Cross-node bandwidth = 100 Gbps = 12.5 GB/s. Communication time = 2.4GB / 12.5GB/s = 192ms. Since
    Comm time (192ms) > Compute time (150ms), the system is network-bound. Upgrading to 400 Gbps (50 GB/s)
    reduces Comm time to 48ms, fully unblocking the compute.
