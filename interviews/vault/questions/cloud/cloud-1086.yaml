title: 'Scaling Data Parallelism: 100 Gbps Ethernet vs 400 Gbps InfiniBand'
scenario: You are scaling the training of a 7B parameter model (14 GB in FP16) across
  a 16-node cluster (8x A100 80 GB GPUs per node, 128 GPUs total). The cross-node
  interconnect is currently 100 Gbps Ethernet with hierarchical AllReduce (intra-node
  NVLink reduce-scatter first, then inter-node AllReduce of the per-node 14 GB FP16
  gradient across the 16 nodes). A proposal is on the table to upgrade the cross-node
  network to 400 Gbps InfiniBand HDR. Evaluate whether the upgrade is necessary by
  quantifying the inter-node AllReduce time on each fabric, assuming 380 ms compute
  per batch step.
question: Is the 400 Gbps InfiniBand upgrade necessary for 16-node 7B data-parallel
  training, given 380 ms compute per step?
details:
  realistic_solution: 'Inter-node ring AllReduce traffic = 2*(N-1)/N * gradient =
    2*(15/16) * 14 GB = 26.25 GB. On 100 Gbps Ethernet (12.5 GB/s effective): 2.10
    s — over 5x the 380 ms compute budget, fatally network-bound. On 400 Gbps IB HDR
    (~25 GB/s unidirectional effective): 1.05 s — still over budget. Even bucketed
    overlap of 70% leaves ~315 ms exposed on IB and ~630 ms on Ethernet. The IB upgrade
    alone is *not* enough; the team also needs BF16 gradients (cuts payload to 7 GB,
    inter-node traffic to 13.1 GB, AllReduce on IB to 524 ms) plus bucketed overlap,
    after which exposed AllReduce drops to ~157 ms — fits inside 380 ms. So the upgrade
    is necessary but not sufficient in isolation; combined with BF16 gradients it
    is.'
  common_mistake: Computing AllReduce time as `payload / bandwidth` and forgetting
    the 2*(N-1)/N ring factor (under-counting bus traffic by ~2x), or claiming the
    IB upgrade alone is enough without pairing it with BF16 + bucketed overlap.
  napkin_math: 'Gradient = 7B * 2 bytes (FP16) = 14 GB. Inter-node AllReduce traffic
    = 2*(15/16) * 14 GB = 26.25 GB. 100 Gbps Ethernet (12.5 GB/s): 26.25 / 12.5 ≈
    2.10 s. 400 Gbps IB HDR (~25 GB/s): 26.25 / 25 ≈ 1.05 s. With BF16 gradients (7
    GB): IB = 0.524 s; with 70% bucketed overlap: exposed ≈ 157 ms < 380 ms compute
    → no longer network-bound.'
