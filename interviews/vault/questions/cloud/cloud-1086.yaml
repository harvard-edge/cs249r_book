title: 'Scaling Data Parallelism: 100 Gbps Ethernet vs 400 Gbps InfiniBand'
scenario: You are scaling the training of a 7B parameter model (14 GB in FP16) across a 16-node cluster (128 GPUs total). The cross-node interconnect is currently 100 Gbps Ethernet with hierarchical AllReduce. A proposal is on the table to upgrade the cross-node network to 400 Gbps InfiniBand HDR.
question: "Is the 400 Gbps InfiniBand upgrade necessary for 16-node 7B data-parallel training, given 380 ms compute per step?"
details:
  realistic_solution: 'Inter-node ring AllReduce traffic = 2*(N-1)/N * gradient. On 100 Gbps Ethernet it takes 2.10s — fatally network-bound. On 400 Gbps IB HDR (~25 GB/s): 1.05s — still over budget. Even bucketed overlap leaves too much time exposed. The upgrade alone is *not* enough; the team also needs BF16 gradients plus bucketed overlap to fit inside 380 ms.'
  common_mistake: |
    **The Pitfall:** Computing AllReduce time simply as payload / bandwidth.
    **The Rationale:** Candidates forget the 2*(N-1)/N ring factor, effectively under-counting bus traffic by ~2x.
    **The Consequence:** The network transfer time is severely underestimated, leading to poorly planned, network-bound deployments.
  napkin_math: |
    1. Gradient = 7B * 2 bytes (FP16) = 14 GB.
    2. Inter-node AllReduce traffic = 2 * (15/16) * 14 GB = 26.25 GB.
    3. 100 Gbps Ethernet (12.5 GB/s effective): 26.25 / 12.5 ≈ 2.10 s.
    4. 400 Gbps IB HDR (~25 GB/s): 26.25 / 25 ≈ 1.05 s.
    5. With BF16 gradients (7 GB): IB = 0.524 s.
    6. **With 70% bucketed overlap, exposed time ≈ 157 ms < 380 ms compute, making the upgrade necessary but only sufficient when combined with BF16.**
