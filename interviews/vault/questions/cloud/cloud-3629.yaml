title: Zero-Copy RDMA Registration and Memory Pinning for GPU Direct
scenario: An engineer enables GPUDirect RDMA on H100 (80GB HBM3) to allow InfiniBand
  NIC to DMA directly from GPU memory. The first implementation shows 40% higher latency
  than CPU-path RDMA. Diagnose the likely cause related to memory registration and
  pinning.
question: Why might GPUDirect RDMA show 40% higher latency than CPU-path RDMA, and
  how would you fix the memory registration issue?
details:
  realistic_solution: 'Memory registration (ibv_reg_mr) pins physical pages and creates
    translation entries in HCA''s memory translation table. Cost: ~10μs per registration.
    Dynamic registration per-transfer doubles latency. Fix: pre-register gradient
    buffers at startup (static buffers). Also: GPUDirect RDMA requires NVLink/PCIe
    P2P access between GPU and HCA — ensure GPU and HCA are on the same PCIe root
    complex or NVLink fabric. BAR mapping overhead: first access to each GPU memory
    page via PCIe requires TLB fill. Warm up by touching all registered pages once.
    After optimization: GPUDirect RDMA should achieve 3-5μs vs CPU-path 5-8μs (due
    to GPU memory access patterns).'
  common_mistake: Registering GPU memory repeatedly on each transfer (dynamic registration)
    instead of pre-registering static buffers; not understanding that HCA registration
    is expensive.
  napkin_math: 'Dynamic registration: 10μs per transfer × 1000 transfers/s = 10ms
    overhead/s. Pre-registration: one-time 10μs cost. For 40GB gradient buffer: registration
    cost = 40GB/4KB pages = 10M pages; 10M × 0.1μs/page = 1,000ms (1 second) one-time
    registration cost. Per-transfer: 0μs. 40% latency penalty: if base latency=10μs,
    dynamic adds 4μs=40%. Pre-registration drops extra to ~0.1μs (TLB overhead).'
