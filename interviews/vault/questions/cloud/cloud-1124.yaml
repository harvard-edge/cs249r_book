title: Memory Scaling of Widened Dense Layers
scenario: A cloud ML team is upgrading a massive recommendation system. A critical fully connected (dense)
  layer currently has an input and output dimension of 8,192, storing its weights in FP32 precision. To
  capture more complex user-item interactions, the research team proposes increasing both the input and
  output dimensions by a factor of 4, to 32,768. Calculate the exact additional GPU memory required to
  store the weights of this single layer in production.
question: "How much additional FP32 GPU memory is needed when the dense layer grows from 8192×8192 to 32768×32768 weights?"
details:
  realistic_solution: Recognize the quadratic relationship in dense connections. Calculate the new weight
    memory as 4.29 GB (1.07 billion parameters), resulting in an exact increase of 4,026.5 MB over the
    original 268.4 MB footprint.
  common_mistake: Assuming that memory requirements scale linearly with layer width, leading candidates
    to erroneously predict a 4x memory increase instead of the correct 16x quadratic increase.
  napkin_math: 'Original memory: 8,192 * 8,192 params * 4 bytes/param = 67,108,864 * 4 = 268,435,456 bytes
    (268.4 MB).

    New memory: 32,768 * 32,768 params * 4 bytes/param = 1,073,741,824 * 4 = 4,294,967,296 bytes (4.29
    GB).

    Scaling factor: (32,768 / 8,192)^2 = 4^2 = 16x.

    Additional memory: 4,294.9 MB - 268.4 MB = 4,026.5 MB.'
