title: ASIC TCO Break-Even Analysis
scenario: 'You are evaluating whether to build a custom ASIC for an internal recommendation model. The Non-Recurring Engineering (NRE) cost for the ASIC is $50M. Over a 3-year lifespan, a standard GPU has a TCO (CAPEX + OPEX) of $10,000 and processes 10,000 QPS. The custom ASIC has a 3-year TCO of $1,000 and processes 5,000 QPS.'
question: 'How many ASICs are required to break even on the $50M NRE after normalizing for QPS?'
details:
  realistic_solution: 'Normalize the TCO to a common throughput unit. It takes 2 ASICs to match the throughput of 1 GPU. Calculate the savings per GPU-equivalent throughput, and divide the NRE by this savings to find the break-even scale.'
  common_mistake: |
    **The Pitfall:** Comparing the TCO per chip directly without normalizing for throughput.
    **The Rationale:** Candidates see $10,000 vs $1,000 and incorrectly assume a $9,000 savings per unit, forgetting that the ASIC performs half the work of the GPU.
    **The Consequence:** They drastically underestimate the number of ASICs required to reach the break-even point, leading to a flawed financial decision.
  napkin_math: |
    * **Throughput matching:** 2 ASICs = 1 GPU throughput (10k QPS).
    * **TCO Comparison per 10k QPS:** 2 ASIC TCO = $2,000. 1 GPU TCO = $10,000.
    * **Savings per 10k QPS:** $10,000 - $2,000 = $8,000.
    * **Break-even GPU equivalents:** $50,000,000 NRE / $8,000 = 6,250 equivalents.
    * **Total ASICs required:** 6,250 * 2 = **12,500 ASICs.**
