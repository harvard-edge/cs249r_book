title: Carbon-Aware Inference Routing Across Multi-Region H100 Fleets
scenario: 'You operate a global LLM inference service with H100 clusters in three regions: US-West (grid: 120 gCO2/kWh, 200 GPUs), EU-North (grid: 45 gCO2/kWh, 150 GPUs), and APAC-SE (grid: 650 gCO2/kWh, 100 GPUs). Total query volume is 18,000 queries/hour, each requiring 1 GPU-second. Current routing is pure latency-based.'
question: What carbon-aware routing policy would you use for the 18,000 q/h service, and how much Scope 2 carbon would it save under a 200 ms p99 SLA?
details:
  realistic_solution: 'Baseline routing (proportional to GPU count): US-West: 8,000 q/h, EU-North: 6,000 q/h, APAC-SE: 4,000 q/h. Carbon-aware policy: route APAC users to US-West if latency allows (<200ms from APAC to US-West East Coast is infeasible; APAC must stay local for SLA). Shift EU users from APAC to EU-North. New APAC-SE load: only APAC-local traffic (assume 2,000 q/h latency-constrained). Route remaining 2,000 q/h to US-West. Reduction: ~27.6%.'
  common_mistake: |
    **The Pitfall:** Blindly shifting all global load to EU-North because it has the lowest grid carbon intensity.
    **The Rationale:** Greenest-region routing algorithms optimize only for gCO2/kWh without checking cluster capacity limits or network topology.
    **The Consequence:** While EU-North can handle the raw compute volume (18,000 q/h), routing APAC traffic to Europe massively violates the 200ms user SLA, breaking the service.
  napkin_math: |
    * Power per query: 1 GPU-second at 700W = 700 Ws = 0.194 Wh = 0.000194 kWh.
    * Baseline US-West: 8,000 queries * 0.000194 kWh * 120 g/kWh = 186.2 gCO2/hr.
    * Baseline EU-North: 6,000 queries * 0.000194 kWh * 45 g/kWh = 52.4 gCO2/hr.
    * Baseline APAC: 4,000 queries * 0.000194 kWh * 650 g/kWh = 504.4 gCO2/hr.
    * Total Baseline = 743.0 gCO2/hr.
    * Optimized Policy (Shift 2,000 APAC queries to US-West): APAC = 2,000q, US-West = 10,000q, EU-North = 6,000q.
    * New APAC: 2,000 * 0.000194 * 650 = 252.2 gCO2/hr.
    * New US-West: 10,000 * 0.000194 * 120 = 232.8 gCO2/hr.
    * Total Optimized = 252.2 + 232.8 + 52.4 = 537.4 gCO2/hr.
    * **Reduction = (743.0 - 537.4) / 743.0 = 27.6% carbon savings without violating latency SLAs.**
