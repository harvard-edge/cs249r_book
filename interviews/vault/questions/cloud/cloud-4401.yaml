title: Carbon-Aware Inference Routing Across Multi-Region H100 Fleets
scenario: 'You operate a global LLM inference service with H100 clusters in three
  regions: US-West (grid: 120 gCO2/kWh, 200 GPUs), EU-North (grid: 45 gCO2/kWh, 150
  GPUs), and APAC-SE (grid: 650 gCO2/kWh, 100 GPUs). Total query volume is 18,000
  queries/hour, each requiring 1 GPU-second. Current routing is pure latency-based.
  Design a carbon-aware routing policy that reduces total Scope 2 emissions by at
  least 30% without violating a 200ms p99 latency SLA, and quantify the carbon savings.'
question: What carbon-aware routing policy would you use for the 18,000 q/h service,
  and how much Scope 2 carbon would it save under the 200 ms p99 SLA?
details:
  realistic_solution: 'Baseline routing (proportional to GPU count): US-West: 8,000
    q/h, EU-North: 6,000 q/h, APAC-SE: 4,000 q/h. Baseline carbon: US-West: 8,000
    × (1/3600) h × 700W × 0.120 kg/kWh = 187g/hr. EU-North: 6,000 × (1/3600) × 700
    × 0.045 = 52.5g/hr. APAC-SE: 4,000 × (1/3600) × 700 × 0.650 = 505.6g/hr. Total:
    745g/hr. Carbon-aware policy: route APAC users to US-West if latency allows (<200ms
    from APAC to US-West East Coast infeasible; APAC must stay local for SLA). Shift
    EU users from APAC to EU-North. New APAC-SE load: only APAC-local traffic (assume
    2,000 q/h latency-constrained). Route remaining 2,000 q/h to US-West. New carbon:
    APAC: 2,000 × 700/3,600,000 × 650 = 252.8g. US-West: 10,000 × 700/3,600,000 ×
    120 = 233g. EU-North: 6,000 × 52.5/6,000 = 52.5g. Total: 538g. Reduction: (745-538)/745
    = 27.8%.'
  common_mistake: Shifting all load to EU-North without checking if it has capacity.
    150 GPUs × 3,600 s/hour = 540,000 GPU-seconds capacity, but 18,000 queries × 1
    GPU-second = 18,000 GPU-seconds needed. EU-North alone can serve the entire volume,
    but network latency from APAC to EU-North may violate the 200ms SLA for those
    users.
  napkin_math: 'Baseline carbon/hr: each query = 1 GPU-s × 700W = 700 Ws = 0.194 Wh
    = 0.000194 kWh. US-West: 8,000 × 0.000194 × 120 = 186 gCO2/hr. EU-North: 6,000
    × 0.000194 × 45 = 52.4 gCO2/hr. APAC: 4,000 × 0.000194 × 650 = 504.4 gCO2/hr.
    Total: 742.8 gCO2/hr. Optimized (minimize APAC load): APAC = 2,000q, US-West =
    10,000q. APAC: 252.2g, US-West: 232.8g, EU: 52.4g. Total: 537.4g. Reduction: 27.6%.
    To hit 30%: need EU-North to absorb 500 more queries from APAC via CDN pre-warming:
    total ≈ 519g → 30.2% reduction.'
