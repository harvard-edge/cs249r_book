title: Tensor Core Vocabulary Padding
scenario: >
  A cloud ML team is pre-training a 7B parameter causal language model on a cluster of NVIDIA A100 GPUs using FP16 mixed precision. The model has a hidden dimension of 4096 and uses the standard GPT-2 vocabulary size of 50,257. During profiling with Nsight Systems, they notice the final language modeling head (the GEMM projecting from 4096 to 50,257) is a massive bottleneck, achieving only 45 TFLOPS despite the A100's theoretical FP16 peak of 312 TFLOPS.
question: >
  What is the root cause of this severe underutilization, and how should the system be redesigned to fix it?
details:
  realistic_solution: |
    Pad the vocabulary size from 50,257 to 50,304 (the nearest multiple of 64). Hardware-software co-design principles dictate that matrix dimensions must align with hardware tile sizes (Tensor Cores require multiples of 8, 16, or 64 depending on the architecture and precision) to avoid memory uncoalescing and fallback to slower CUDA cores.
  common_mistake: |
    **The Pitfall:** Suggesting complex software rewrites, gradient checkpointing, or tensor parallelism to solve the bottleneck.
    **The Rationale:** Candidates see a slow linear layer and assume it's a generic compute/memory limit, missing the strict dimensional alignment rules required by matrix multiply accelerators.
    **The Consequence:** The team wastes weeks implementing complex distributed strategies without solving the core hardware-incompatibility, leaving >80% of the GPU's compute capability idle.
  napkin_math: |
    - **Current Dimensions:** 4096 × 50,257 (not divisible by 64, causing Tensor Core uncoalescing).
    - **Padding Solution:** Pad vocabulary to 50,304 (nearest multiple of 64). Adds 47 dummy tokens.
    - **Memory Overhead:** 47 tokens × 4096 dim × 2 bytes = 385 KB.
    - **Relative Parameter Increase:** 385 KB / ~14 GB = ~0.002% overhead.
    - **Result:** **Perfectly maps to 128x128 or 64x64 Tensor Core tiles, typically boosting throughput from ~45 TFLOPS to >200 TFLOPS.**
