title: Tensor Core Vocabulary Padding
scenario: A cloud ML team is pre-training a 7B parameter causal language model on a cluster of NVIDIA
  A100 GPUs using FP16 mixed precision. The model has a hidden dimension of 4096 and uses the standard
  GPT-2 vocabulary size of 50,257. During profiling with Nsight Systems, they notice the final language
  modeling head (the GEMM projecting from 4096 to 50,257) is a massive bottleneck, achieving only 45 TFLOPS
  despite the A100's theoretical FP16 peak of 312 TFLOPS. What is the root cause of this severe underutilization,
  and how should the system be redesigned to fix it?
question: "What is the root cause of this severe underutilization, and how should the system be redesigned to fix it?"
details:
  realistic_solution: Pad the vocabulary size from 50,257 to 50,304 (the nearest multiple of 64). Hardware-software
    co-design principles dictate that matrix dimensions must align with hardware tile sizes (Tensor Cores
    require multiples of 8, 16, or 64 depending on the architecture and precision) to avoid memory uncoalescing
    and fallback to slower CUDA cores.
  common_mistake: Candidates often suggest rewriting the softmax kernel, applying gradient checkpointing,
    or implementing tensor parallelism, missing that the matrix dimensions natively prevent efficient
    hardware acceleration.
  napkin_math: Padding adds 47 dummy tokens. Extra memory = 47 * 4096 * 2 bytes = 385 KB (a ~0.09% parameter
    increase). This negligible memory cost allows the GEMM to map perfectly to 128x128 or 64x64 Tensor
    Core tiles, often boosting throughput from ~45 TFLOPS to >200 TFLOPS.
