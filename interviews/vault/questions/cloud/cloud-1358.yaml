title: Tensor Core Vocabulary Padding
scenario: 'A cloud ML team is pre-training a 7B parameter causal language model on a cluster of NVIDIA GPUs using FP16 mixed precision. The model has a hidden dimension of 4096 and uses the standard GPT-2 vocabulary size of 50,257. During profiling with nsys, they notice the final language modeling head is a massive bottleneck, achieving only 45 TFLOPS despite the hardware''s theoretical peak.'
question: 'What is the root cause of this severe underutilization, and how should the system be redesigned to fix it?'
details:
  realistic_solution: 'Pad the vocabulary size from 50,257 to 50,304. Hardware-software co-design principles dictate that matrix dimensions must align with hardware tile sizes to avoid memory uncoalescing and fallback to slower CUDA cores.'
  common_mistake: |
    **The Pitfall:** Suggesting complex software rewrites, gradient checkpointing, or tensor parallelism to solve the bottleneck.
    **The Rationale:** Candidates see a slow linear layer and assume it's a generic compute/memory limit, missing the strict dimensional alignment rules required by matrix multiply accelerators.
    **The Consequence:** The team wastes weeks implementing complex distributed strategies without solving the core hardware-incompatibility, leaving >80% of the GPU's compute capability idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Matrix dimensions: 4096 x 50,257.
       - Precision: FP16 (2 bytes).
       - Hardware: Tensor Cores (require multiples of 64).
    2. **Calculations:**
       - Pad vocabulary to nearest multiple of 64: 50,304. Adds 47 dummy tokens.
       - Memory Overhead = 47 tokens * 4096 dim * 2 bytes = 385 KB.
       - Parameter Increase = 385 KB / ~14 GB = ~0.002% overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Padding perfectly maps the GEMM to Tensor Core tiles, boosting throughput from 45 TFLOPS to >200 TFLOPS with negligible memory cost.**
