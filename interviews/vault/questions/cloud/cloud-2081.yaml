title: The Training Failure Recovery Architecture
scenario: 'Your organization trains large models (7B-70B parameters) on multi-node GPU clusters. Over the past quarter, 35% of training jobs failed before completion due to GPU hardware faults (40% of failures), OOM errors mid-training (25%), NaN loss divergence (20%), and data pipeline stalls (15%). Each failed job wastes an average of 18 GPU-hours before the failure is detected.'
question: How would you design a resilient training workflow to minimize wasted compute from GPU faults, OOMs, NaNs, and data stalls?
details:
  realistic_solution: 'Defense-in-depth by failure mode: (1) GPU hardware faults (40%): Implement elastic training with automatic node replacement. Use async checkpointing every 30 minutes (not blocking training). When a GPU fails, the job automatically redistributes to surviving nodes + a spare, loading from the latest checkpoint. Wasted compute: max 30 minutes per failure instead of 18 hours. (2) OOM mid-training (25%): This is preventable. Before training starts, run a memory profiling dry run: forward + backward pass on max-batch-size with memory tracking. Compute peak memory including activations, gradients, and optimizer states. If peak > 90% of VRAM, abort before training begins. Also: enable activation checkpointing and gradient accumulation as fallbacks. (3) NaN divergence (20%): Monitor loss every N steps. If loss exceeds 3× the running average or becomes NaN, automatically: (a) roll back to the last healthy checkpoint, (b) reduce learning rate by 50%, (c) resume. If 3 consecutive rollbacks fail, alert the engineer. Most NaN issues are caused by learning rate spikes or data corruption and are recoverable. (4) Data pipeline stalls (15%): Decouple data loading from training via a prefetch buffer. Monitor samples/sec. If throughput drops below 50% of baseline for > 5 minutes, pause training (preserving GPU state) rather than letting it run with stale batches. Alert the data team. Resume automatically when throughput recovers.'
  common_mistake: |
    **The Pitfall:** Treating all failures the same way by simply checkpointing more frequently.
    **The Rationale:** Failing to recognize that each failure mode has a distinct optimal mitigation (e.g., OOMs are entirely preventable).
    **The Consequence:** Continued high rates of wasted compute and delayed training jobs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200 jobs/month, 35% failure rate (70 failures/month).
       - Current waste: 18 GPU-hours per failure.
       - Mitigated waste: Faults (0.5h), OOM (0h), NaN (1h), Data (0h).
    2. **Calculations:**
       - Current Monthly Waste: 70 * 18 = 1,260 GPU-hours.
       - New Avg Waste: (0.4 * 0.5) + (0.25 * 0) + (0.2 * 1.0) + (0.15 * 0) = 0.4 GPU-hours.
       - New Monthly Waste: 70 * 0.4 = 28 GPU-hours.
       - Savings: 1,260 - 28 = 1,232 GPU-hours/month.
    3. **Conclusion & Interpretation:**
       - **Result: 1,232 GPU-hours/month saved (Reliability-Bound).**
