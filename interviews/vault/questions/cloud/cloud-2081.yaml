title: The Training Failure Recovery Architecture
scenario: 'Your organization trains large models (7B-70B parameters) on multi-node GPU clusters. Over
  the past quarter, 35% of training jobs failed before completion due to: GPU hardware faults (40% of
  failures), OOM errors mid-training (25%), NaN loss divergence (20%), and data pipeline stalls (15%).
  Each failed job wastes an average of 18 GPU-hours before the failure is detected. Design a resilient
  training workflow that minimizes wasted compute from all four failure modes.'
details:
  realistic_solution: 'Defense-in-depth by failure mode: (1) GPU hardware faults (40%): Implement elastic
    training with automatic node replacement. Use async checkpointing every 30 minutes (not blocking training).
    When a GPU fails, the job automatically redistributes to surviving nodes + a spare, loading from the
    latest checkpoint. Wasted compute: max 30 minutes per failure instead of 18 hours. (2) OOM mid-training
    (25%): This is preventable. Before training starts, run a memory profiling dry run: forward + backward
    pass on max-batch-size with memory tracking. Compute peak memory including activations, gradients,
    and optimizer states. If peak > 90% of VRAM, abort before training begins. Also: enable activation
    checkpointing and gradient accumulation as fallbacks. (3) NaN divergence (20%): Monitor loss every
    N steps. If loss exceeds 3× the running average or becomes NaN, automatically: (a) roll back to the
    last healthy checkpoint, (b) reduce learning rate by 50%, (c) resume. If 3 consecutive rollbacks fail,
    alert the engineer. Most NaN issues are caused by learning rate spikes or data corruption and are
    recoverable. (4) Data pipeline stalls (15%): Decouple data loading from training via a prefetch buffer.
    Monitor samples/sec. If throughput drops below 50% of baseline for > 5 minutes, pause training (preserving
    GPU state) rather than letting it run with stale batches. Alert the data team. Resume automatically
    when throughput recovers.'
  common_mistake: Treating all failures the same way (just checkpoint more frequently). Each failure mode
    has a different optimal mitigation strategy, and some can be prevented entirely.
  napkin_math: 'Current waste: 35% failure rate × 18 GPU-hours average = 6.3 GPU-hours wasted per job
    attempt. At 200 jobs/month: 200 × 6.3 = 1,260 GPU-hours/month = $3,780/month. With mitigations: GPU
    faults (0.5h instead of 18h), OOM (prevented), NaN (1h with rollback), Data (0h with pause/resume).
    New average waste: 0.4 × 0.5 + 0.25 × 0 + 0.2 × 1 + 0.15 × 0 = 0.4 GPU-hours per failure. New monthly
    waste: 200 × 0.35 × 0.4 = 28 GPU-hours = $84/month. Savings: $3,780 - $84 = $3,696/month.'
