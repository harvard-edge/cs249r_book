title: NCCL Graph Capture for Reducing Communication Launch Overhead
scenario: 'Your training step has 200 small NCCL AllReduce calls (one per gradient bucket) with 50 microseconds
  launch overhead each. Total launch overhead: 10ms per step. CUDA Graphs can capture the training step
  including NCCL calls. Evaluate the benefit and limitations of NCCL graph capture.'
details:
  realistic_solution: 'CUDA Graph capture of NCCL calls: (1) Benefit: reduces per-call launch overhead
    from ~50us to ~5us (10x reduction). For 200 calls: 10ms -> 1ms. (2) Requirements: fixed tensor shapes
    (no dynamic batching), fixed process group (no elastic training), NCCL >= 2.18 with NCCL_COMM_NONBLOCKING=1.
    (3) Capture pattern: cudaStreamBeginCapture -> run forward + backward + AllReduce -> cudaStreamEndCapture
    -> replay. (4) Limitation: if batch size changes, the graph must be recaptured (100ms+ recapture cost).
    Strategy: capture graphs for your 2-3 most common batch sizes and switch at runtime. (5) Additional
    overlap benefit: CUDA Graphs eliminate CPU-side scheduling, making overlap more deterministic — GPU
    never waits for CPU to issue the next operation.'
  common_mistake: 'Assuming CUDA Graph capture works seamlessly with NCCL. NCCL calls within CUDA Graphs
    require NCCL 2.18+ and have restrictions: no dynamic message sizes, no rank changes, and the communication
    pattern must be identical across graph replays.'
  napkin_math: 'Without graphs: 200 x 50us = 10ms launch overhead per step. With graphs: 200 x 5us = 1ms.
    Savings: 9ms/step. At 300ms step time: 3% throughput improvement. Over 1000 steps: 9 seconds saved.
    Graph capture cost: ~200ms one-time.'
