title: Memory layout of autograd computational graph for second-order optimization on MI300X
scenario: You are implementing K-FAC (Kronecker-Factored Approximate Curvature) on MI300X (192GB, 5.3TB/s)
  for training a ResNet-152. K-FAC requires computing Fisher information matrix blocks, which necessitates
  retaining the computational graph after backward() to compute second-order derivatives. Memory usage
  explodes unexpectedly.
details:
  realistic_solution: 'For K-FAC, use torch.autograd.grad() with create_graph=True for computing the Fisher-vector
    product, which returns gradient tensors without accumulating into .grad. Track graph memory explicitly:
    the retained graph for ResNet-152 at batch=32 holds ~8GB. Implement Fisher block updates every k=100
    steps to amortize the memory cost. Zero gradients with model.zero_grad(set_to_none=True) to free grad
    tensors.'
  common_mistake: Calling loss.backward(retain_graph=True) in a loop to accumulate gradient statistics
    without understanding that each call accumulates gradients by adding to .grad instead of replacing
    them. Also failing to clear the graph between Fisher estimation steps and training steps, causing
    memory to grow unboundedly.
  napkin_math: 'ResNet-152 activations for retained graph at batch=32: ~6GB. Second-order graph (for Hessian-vector
    products) roughly doubles this to ~12GB. MI300X has 192GB — fits easily, but on A100 (80GB) this can
    be tight when combined with Adam states (3×60M params×4bytes=720MB) and activations.'
