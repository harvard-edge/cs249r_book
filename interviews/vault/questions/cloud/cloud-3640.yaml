title: P99 Latency Spike Diagnosis on H100 Inference Cluster
scenario: Your H100 inference cluster serves a recommender model at 10K RPS. P50 latency is 8ms, but P99 has crept to 180ms. The SLA requires P99 < 50ms. GPU utilization averages 72%, and you see occasional 2-3 second stalls in traces.
question: How would you diagnose and reduce the recommender service's P99 latency from 180ms to under the 50ms SLA?
details:
  realistic_solution: 'Profile with nsys to identify the stall source: likely CUDA kernel launch overhead during dynamic batching, or host-side Python GIL contention. Implement micro-batching with a fixed batch timeout (5ms) and pin CPU threads to avoid GIL contention. Separate the P99 spike source from average load.'
  common_mistake: |
    **The Pitfall:** Immediately adding more replicas.
    **The Rationale:** High tail latency is often misattributed to overall capacity saturation.
    **The Consequence:** Scaling up fails to address the root cause (synchronization or GC events), wasting money while P99 spikes persist.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10K RPS, P50 = 8ms. SLA P99 < 50ms.
       - Stall: 2 seconds every 100 seconds.
    2. **Calculations:**
       - In-Flight Requests: 10,000 RPS * 0.008s = 80 requests.
       - Stall Budget Burn: 2000ms * (10,000/100) = 200,000ms affected per 100s, or 200s/s.
    3. **Conclusion & Interpretation:**
       - **Stall frequency x duration overwhelms the P99 headroom, causing the 180ms spike. Result: Latency-Bound.**
