title: The Coding Assistant's Latency Crisis
scenario: 'You are the lead engineer for an AI code completion service. The product requirement is a P99 Time-To-First-Token (TTFT) of <500ms. Dashboards show high aggregate throughput, but P99 TTFT is ~1500ms.'
question: "What is driving the 1500ms P99 TTFT despite excellent throughput, and why is the 1000ms static batching timeout the culprit?"
details:
  realistic_solution: 'The root cause is the static batching strategy with its long 1000ms timeout. This creates significant queueing delay (head-of-line blocking). A request arriving at the beginning of a window must wait up to 1000ms for the batch to dispatch.'
  common_mistake: |
    **The Pitfall:** Blaming the model size or hardware speed and ignoring queueing delay.
    **The Rationale:** Engineers often mistake high GPU utilization and high throughput for low latency.
    **The Consequence:** Wasting effort on model optimization or hardware upgrades instead of fixing the batching strategy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Static batching timeout (T_batch): 1000 ms.
       - Target SLO: <500ms P99 TTFT.
    2. **Calculations:**
       - Worst-case wait time (W): A request arriving right after a batch starts waits 999 ms.
       - Total TTFT = W + T_prefill.
    3. **Conclusion & Interpretation:**
       **Result: Latency Bound. Even with 0 ms prefill, TTFT is 999 ms, mathematically guaranteeing SLA violations.**
