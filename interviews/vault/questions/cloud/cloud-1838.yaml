title: SimCLR Contrastive Collapse on A100s
scenario: You are training a self-supervised SimCLR model (ResNet-50) on an 8x A100 (80GB) cluster to learn robust visual representations from 50M unlabeled images. During training, the contrastive loss drops rapidly, but downstream linear probing accuracy plateaus at 45%. You observe the global batch size is set to 256 (32 per GPU) and GPU memory utilization is only ~15%.
question: What is causing the SimCLR plateau at 45% linear-probe accuracy and 15% A100 memory utilization, and how would you fix it?
details:
  realistic_solution: Increase the global batch size to 4096 (512 per GPU). In SimCLR, the InfoNCE loss relies entirely on in-batch negative samples; a small batch size provides too few negatives, allowing the model to find trivial shortcuts. Scaling to 4096 provides sufficient negatives for robust representation learning while adequately utilizing the A100's memory.
  common_mistake: |
    **The Pitfall:** Suggesting changes to the learning rate scheduler, adding dropout, or switching to a larger backbone.
    **The Rationale:** Failing to recognize that contrastive SSL methods structurally depend on massive batch sizes for negative mining.
    **The Consequence:** Wasted compute runs with poor representation quality because the model finds trivial shortcuts.
  napkin_math: |
    - For SimCLR with global batch size N, negatives per image = `2N - 2`.
    - At N=256: `2(256) - 2` = **510 negatives**.
    - At N=4096: `2(4096) - 2` = **8190 negatives** (~16x more).
    - **Result:** Increasing batch size to 4096 fits within the 80GB A100 (using ~51GB, 65% utilization) and drastically increases task difficulty, fixing the accuracy plateau.
