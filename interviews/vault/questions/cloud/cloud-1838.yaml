title: SimCLR Contrastive Collapse on A100s
scenario: You are training a self-supervised SimCLR model (ResNet-50) on a cloud cluster of 8x A100 (80GB)
  GPUs. The goal is to learn robust visual representations from 50M unlabeled images collected from smart
  cameras to build resilience against distribution shifts before on-device fine-tuning. During training,
  the contrastive loss drops rapidly, but downstream linear probing accuracy plateaus at 45%. You observe
  the global batch size is set to 256 (32 per GPU) and GPU memory utilization is only ~15%. Diagnose the
  root cause of the poor representation quality and hardware underutilization.
details:
  realistic_solution: Increase the global batch size to 4096 (512 per GPU). In SimCLR, the InfoNCE loss
    relies entirely on in-batch negative samples; a small batch size provides too few negatives, allowing
    the model to find trivial shortcuts. Scaling to 4096 provides sufficient negatives for robust representation
    learning while adequately utilizing the A100's memory.
  common_mistake: Candidates often suggest changing the learning rate scheduler, adding dropout, or switching
    to a larger backbone, failing to recognize that contrastive SSL methods structurally depend on massive
    batch sizes for negative mining.
  napkin_math: For SimCLR with global batch size N, negatives per image = 2N - 2. At N=256, negatives
    = 510. At N=4096, negatives = 8190 (~16x more), drastically increasing the pretext task difficulty.
    Memory per GPU for ResNet-50 at batch 512 with mixed precision is roughly 51.2GB (512 samples * ~100MB
    activations), which fits well within the 80GB A100 limit, increasing memory utilization from ~15%
    to ~65%.
