title: TP Communication Overlap with NVLink
scenario: On an 8×A100 DGX node with NVLink providing 600 GB/s bidirectional per GPU, your TP=8 training
  achieves only 45% MFU. Profiling shows zero overlap between AllReduce and GEMM operations. Describe
  the CUDA stream configuration needed to enable overlap.
details:
  realistic_solution: 'To enable overlap, you need separate CUDA streams for compute and communication:
    (1) Create a dedicated NCCL stream (torch.cuda.Stream) for collective operations. (2) After the row-parallel
    GEMM, launch the AllReduce on the NCCL stream. (3) Meanwhile, on the default compute stream, begin
    the next layer''s LayerNorm and dropout (these don''t depend on the AllReduce result in Megatron''s
    architecture with residual connections). (4) Synchronize (stream.wait_event) only before the operation
    that actually needs the AllReduce result. Implementation in Megatron: the _VocabParallelCrossEntropy
    and ColumnParallelLinear modules use torch.distributed async operations with custom autograd functions
    that insert stream synchronization at the right points. Key detail on A100: NVLink and SMs share the
    GPU''s 2 TB/s HBM bandwidth. Heavy AllReduce can contend with GEMM memory reads, limiting actual overlap
    benefit to ~60-70% of theoretical. On H100, the dedicated copy engines reduce this contention.'
  common_mistake: Assuming that PyTorch automatically overlaps communication with compute. By default,
    NCCL operations and CUDA kernels run on the same stream, serializing them.
  napkin_math: 'Without overlap: GEMM=0.5ms + AllReduce=0.1ms = 0.6ms per block. With 70% overlap: 0.5
    + 0.03 = 0.53ms. Over 80 blocks: 48ms → 42.4ms. MFU improvement: ~12%.'
