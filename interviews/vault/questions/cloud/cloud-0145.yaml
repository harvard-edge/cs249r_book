title: 'The SLO Squeeze: Interactive vs. Batch Throughput'
scenario: 'You run a unified inference service for a 70B parameter model on a cluster of 8 H100 GPUs.
  Your traffic is mixed: 80% is low-latency interactive chat with a P99 Time-to-First-Token (TTFT) SLO
  of 500ms, and 20% is high-throughput batch summarization jobs. Your current system uses a single FIFO
  queue with continuous batching. You''re meeting your batch throughput goals, but violating the chat
  TTFT SLO due to head-of-line blocking from large summarization requests. Analyze the fundamental trade-off
  between two alternative designs:'
details:
  realistic_solution: The core trade-off is isolation vs. efficiency. A priority queue (single pool, preemptive
    scheduling) keeps all 8 GPUs available to both workloads, maximizing utilization but requiring careful
    starvation prevention for batch jobs. A partitioned cluster (e.g., 6 GPUs for chat, 2 for batch) guarantees
    chat SLOs through physical isolation but wastes capacity when chat traffic dips. The head-of-line
    blocking math shows a 128k-token summarization request takes ~4 seconds of prefill, blocking chat
    requests well beyond 500ms. Priority scheduling with preemption solves this at the cost of implementation
    complexity.
  common_mistake: Assuming that simply splitting the cluster is optimal. This ignores the risk of idle
    resources and mis-provisioning. For example, if chat traffic lulls, the 6 GPUs in that partition sit
    idle, while the batch queue may be overloaded. Conversely, a priority scheduler is more complex to
    implement and can lead to starvation for low-priority tasks if not designed carefully.
  napkin_math: Let's model head-of-line blocking. 8x H100 (3.35TB/s each). A 70B model needs 140GB. TP
    parallel decode takes 140GB / (8 * 3.35TB/s) = 5.2ms per token. A batch job generating 2,000 tokens
    takes 2000 * 5.2ms = 10.4 seconds to process. In a single FIFO queue, a chat request arriving just
    after this batch job waits 10,400ms just in the queue, missing the 500ms SLO by 20x.
