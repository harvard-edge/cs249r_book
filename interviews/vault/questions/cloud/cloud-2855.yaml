title: Hierarchical AllReduce Network
scenario: You are training over 4 nodes, each with 8x H100 SXM GPUs connected via 900 GB/s NVLink. The 4 nodes are linked by a non-blocking 400 Gbps (50 GB/s) RoCEv2 network. You need to synchronize a 2 GB gradient payload.
question: Estimate the communication time difference between a flat Ring AllReduce across all 32 GPUs versus a hierarchical AllReduce strategy.
visual:
  kind: svg
  path: cloud-2855.svg
  alt: A graph illustrating two server nodes, each containing two GPUs connected via
    900 GB/s NVLink, with a central 400 Gbps RoCEv2 Ethernet switch connecting the
    nodes.
  caption: Hierarchical network topology for cross-node AllReduce.
details:
  realistic_solution: A flat Ring AllReduce over 32 GPUs uses the slowest link (Ethernet at 50 GB/s). The time is approximately 2 * 2GB / 50GB/s = 80 ms. In a hierarchical AllReduce, a ReduceScatter inside the node shrinks the payload to 2GB / 8 = 250MB per GPU. The inter-node AllReduce over Ethernet then operates on this 250MB chunk, taking 2 * 0.25GB / 50GB/s = 10 ms. The NVLink steps take roughly ~4 ms total. The hierarchical approach is about 66 ms faster (14ms vs 80ms).
  common_mistake: |
    **The Pitfall:** Failing to realize that the intra-node ReduceScatter divides the payload size by the local GPU count before it traverses the slower Ethernet bottleneck.
    **The Rationale:** A hierarchical approach leverages the high-speed intra-node NVLink to reduce the data volume that must be sent over the much slower inter-node Ethernet links.
    **The Consequence:** Inefficient network utilization and unnecessarily long communication phases that bottleneck training scaling.
  napkin_math: |
    - Flat Ring AllReduce (across 32 GPUs): Time is bottlenecked by Ethernet (50 GB/s).
    - Time ≈ 2 * 2 GB / 50 GB/s = 80 ms.
    - Hierarchical AllReduce:
      1. Intra-node ReduceScatter: shrinks payload to 2 GB / 8 = 250 MB (0.25 GB) per GPU.
      2. Inter-node AllReduce (over Ethernet): 2 * 0.25 GB / 50 GB/s = 10 ms.
      3. Intra-node AllGather: distributes the 250 MB chunks over NVLink.
    - NVLink steps (ReduceScatter + AllGather) take ~4 ms total.
    - Total Hierarchical Time ≈ 10 ms + 4 ms = 14 ms.
    - **The hierarchical approach is ~66 ms faster (14 ms vs 80 ms).**
