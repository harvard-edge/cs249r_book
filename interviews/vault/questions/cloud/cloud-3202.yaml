title: MoE Parameter Count vs Active FLOPs Scaling
scenario: 'You are comparing scaling strategies: training a dense 70B model vs an MoE with 70B active parameters and 8× expert multiplier (560B total). Both train on the same data and compute budget.'
question: What are the per-token FLOPs and total parameters for the dense 70B and 8× MoE, and why can MoE match quality at lower cost?
details:
  realistic_solution: 'Dense 70B: Per-token FLOPs ≈ 6 × 70B = 420 GFLOPs (forward + backward). Total params: 70B. MoE 8×70B: Per-token FLOPs ≈ 6 × 70B = 420 GFLOPs (same — only active expert params contribute to FLOPs). Total params: ~560B. The MoE model has 8× more parameters but identical per-token compute cost. More parameters means more capacity to memorize and represent patterns in the training data. Chinchilla scaling laws show that model quality scales with both data and parameters. MoE decouples parameter count from compute cost, allowing you to scale parameters ''for free'' (in FLOPs) at the cost of memory. This is why Mixtral 8x7B (47B params) matches Llama 2 70B quality while using only 13B active FLOPs — it has 3.6× less compute cost per token but comparable quality through parameter scaling.'
  common_mistake: |
    **The Pitfall:** Confusing total parameter count with the actual training FLOPs required.
    **The Rationale:** Candidates assume that because a model has 8x more parameters, it mathematically requires 8x more compute to train per token.
    **The Consequence:** Teams avoid highly efficient MoE architectures, believing they cannot afford the compute, when in reality MoE decouples memory capacity from active compute cost.
  napkin_math: |
    1. Dense 70B FLOPs per token (forward + backward): 6 * 70B = 420 GFLOPs. Total params: 70B.
    2. MoE 8x70B FLOPs per token: 6 * 70B (only active experts compute) = 420 GFLOPs. Total params: ~560B.
    3. The parameter ratio is 8x (560B / 70B), but the FLOP ratio is exactly 1.0x (420 / 420).
    **MoE achieves identical per-token compute cost while offering 8x the representation capacity, yielding a 2-3x training speedup to iso-quality.**
