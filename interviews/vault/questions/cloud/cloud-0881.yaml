title: Autograd Tape Memory Footprint in Dynamic RNNs
scenario: You are debugging an Out-Of-Memory (OOM) error on an NVIDIA A100 GPU during the training of
  a custom dynamic RNN built with PyTorch eager execution. For a specific extreme input, the forward pass
  dynamically unrolls for 15,000 time steps. At each step, the autograd tape saves a `[batch_size=64,
  hidden_dim=4096]` FP32 tensor required for the reverse-mode gradient computation. Calculate the total
  memory consumed by these saved tensors on the autograd tape to evaluate if it exceeds the strict 10GB
  memory budget allocated for activations.
details:
  realistic_solution: Calculate the exact memory footprint of the saved tensors (15,000 MiB) and implement
    gradient checkpointing or truncated backpropagation through time (TBPTT) to constrain the tape size.
  common_mistake: Failing to account for the dynamic graph unrolling accumulating memory linearly with
    time steps, or forgetting to multiply by 4 bytes for FP32 precision.
  napkin_math: 'Tensor size: 64 batch × 4096 dim × 4 bytes (FP32) = 1,048,576 bytes = ~1 MiB. Total over
    15,000 steps: 15,000 × 1 MiB = 15,000 MiB ≈ 14.65 GB. 14.65 GB > 10 GB budget, causing the OOM. By
    implementing Truncated Backpropagation Through Time (TBPTT) with a window of 1,000 steps, tape memory
    is capped at ~1 GB.'
