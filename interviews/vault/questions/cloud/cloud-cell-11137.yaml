title: 'KV-Cache: Evaluate PagedAttention vs Continuous Batching Scheduling'
scenario: 'Compare two KV cache management strategies for 7B LLM on H100 (80GB HBM3): (A) static batching
  with pre-allocated KV cache (max seq 2048), vs (B) PagedAttention with continuous batching. Evaluate
  GPU utilization, memory waste, and throughput for a workload with 50% short requests (< 256 tokens)
  and 50% long requests (1024-2048 tokens).'
details:
  realistic_solution: 'Static batching: allocate 2048-token KV for every request. Short requests waste
    2048-256 = 1792 tokens (87.5%) of their KV allocation. GPU utilization tanks on mixed workloads. PagedAttention:
    allocate only needed pages, pad-free, much higher throughput.'
  common_mistake: Assuming static batching is simpler and therefore faster — it's actually much less efficient
    for variable-length workloads due to padding waste and KV memory fragmentation.
  napkin_math: '7B model: 32 layers, 8 KV heads, head_dim=128. KV per token: 32 × 2 × 8 × 128 × 2B = 131KB.
    Model weights: 14GB. Available HBM: 80 - 14 = 66GB. Static batching (max 2048 tokens per request):
    KV per request = 2048 × 131KB = 268MB. Max concurrent: 66GB / 268MB = 246 requests. But 50% are short
    (256 tokens actual): wasted KV = 246 × 50% × (2048-256) × 131KB = 123 × 1792 × 131KB = 28.8GB wasted.
    Effective concurrent (if we count actual tokens): 66GB / (0.5 × 2048×131KB + 0.5 × 256×131KB) = 66GB
    / (134MB + 16.8MB) = 66GB / 150.8MB = 437 effective request slots. But static allocates for 2048 all:
    only 246. Efficiency: 246/437 = 56%. PagedAttention: allocates exactly needed. 437 concurrent requests.
    Throughput: PagedAttention 437/246 = 1.78× more concurrent requests → ~1.78× higher throughput.'
