title: Diagnosing Multi-GPU Pipeline Stalls
scenario: You are training a 30B parameter LLM using 8x A100 (80GB) GPUs on a single node. You observe
  severe GPU underutilization (SM active < 30%) despite NVLink providing 600 GB/s of intra-node bandwidth.
  The profiler shows the pipeline is blocked waiting for data. The dataset is streamed from remote object
  storage over a 100 Gbps Ethernet connection, preprocessed on CPUs, and sent to GPUs via PCIe Gen4 x16.
details:
  realistic_solution: 'Analyze the bandwidth hierarchy from the outside in. The 100 Gbps network provides
    a maximum of 12.5 GB/s. Even though PCIe Gen4 x16 supports ~32 GB/s and NVLink provides 600 GB/s,
    the absolute hard limit for training throughput is dictated by the narrowest part of the taper: the
    12.5 GB/s network link.'
  common_mistake: Focusing solely on the high intra-GPU NVLink bandwidth and ignoring the data ingestion
    path from storage to host memory to GPU device memory.
  napkin_math: 'Network limit = 100 Gbps / 8 = 12.5 GB/s. PCIe limit = 32 GB/s. NVLink limit = 600 GB/s.
    HBM2e limit = ~2000 GB/s. Bandwidth tapers outward: 2000 -> 600 -> 32 -> 12.5 GB/s. The 12.5 GB/s
    network link starves the 2000 GB/s memory subsystem.'
