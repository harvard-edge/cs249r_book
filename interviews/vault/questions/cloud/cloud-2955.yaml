title: 'Dataset Curation: Design a Labeling Pipeline for Multi-Modal Training Data'
scenario: Your team needs to label 100M image-text pairs for vision-language model training on an H100 cluster. You have a budget for 10 human annotators and access to GPT-4V for automated labeling.
question: How would you label 100M image-text pairs to exceed 95% accuracy in 30 days with 10 human annotators and access to GPT-4V?
details:
  realistic_solution: 'Use active learning: 1) GPT-4V labels 100% at ~$0.01/sample = $1M (too expensive). Better: label 1M with GPT-4V ($10K), train a small CLIP-based classifier on those, use it to label remaining 99M, humans review the 5% lowest confidence samples (5M \times 10 min/sample / 10 annotators = 83K hours — too slow). Revise: human capacity is only 72K samples (at 2 min/sample). Humans validate 72K samples as a gold set; train classifier on 1M GPT-4V + 72K human labels, and apply to 99M remaining.'
  common_mistake: |
    **The Pitfall:** Sending millions of samples to human annotators or fully automating without quality checks.
    **The Rationale:** Candidates fail to run the simple capacity math on human labor and default to either unscalable manual effort or blindly trusting LLM outputs.
    **The Consequence:** Designing a pipeline that either exceeds the timeline/budget by orders of magnitude or results in garbage data quality.
  napkin_math: |
    - **Human Capacity:** 10 annotators * 8 hrs/day * 30 days = 2,400 hours. At 2 min/label, this is **72,000 labels total**.
    - **Naive GPT-4V Cost:** Labeling 100M samples at $0.01/call = $1M (too expensive).
    - **Active Learning Budget:** Use $10K to label 1M samples with GPT-4V.
    - **Pipeline Math:** Train a small classifier on 1M GPT-4V labels + 72K human gold labels. Apply this classifier to the remaining 99M samples.
