title: 'Dataset Curation: Design a Labeling Pipeline for Multi-Modal Training Data'
scenario: Your team needs to label 100M image-text pairs for vision-language model
  training on an H100 cluster. You have a budget for 10 human annotators and access
  to GPT-4V for automated labeling. Design a labeling pipeline that achieves > 95%
  label accuracy within 30 days.
question: How would you label 100M image-text pairs to exceed 95% accuracy in 30 days
  with 10 human annotators and access to GPT-4V?
details:
  realistic_solution: 'Use active learning: 1) GPT-4V labels 100% at ~$0.01/sample
    = $1M (too expensive). Better: label 1M with GPT-4V ($10K), train a small CLIP-based
    classifier on those, use it to label remaining 99M, humans review the 5% lowest
    confidence samples (5M \times 10 min/sample / 10 annotators = 83K hours — too slow).
    Revise: human capacity is only 72K samples (at 2 min/sample). Humans validate 72K
    samples as a gold set; train classifier on 1M GPT-4V + 72K human labels, and apply to 99M remaining.'
  common_mistake: Sending all 100M samples to human annotators, which is infeasible.
    Or fully automated labeling without human quality checks.
  napkin_math: '10 annotators \times 8 hr/day \times 30 days = 2,400 person-hours. At 2 min/label
    = 72,000 labels from humans. So: GPT-4V labels 100M at $0.01/call = $1M total
    (too expensive). Instead, use $10K to label 1M with GPT-4V. Humans validate 72K
    samples as gold set. Train classifier on 1M GPT4V + 72K human labels, apply to
    99M remaining.'
