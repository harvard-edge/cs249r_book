title: Hardware Refresh Carbon ROI
scenario: A cloud provider operates a 512-GPU A100 cluster (64 servers, 6kW/server) for ML inference in a facility powered by a low-carbon hydroelectric grid (40 gCO2eq/kWh). The A100 servers have 2 years of their expected 4-year lifecycle remaining. The infrastructure team proposes immediately replacing them with 128 H100 GPUs (16 servers, 10kW/server) which can handle the identical throughput. A new 8x H100 server has an estimated embodied manufacturing carbon footprint of 15,000 kgCO2eq.
question: Should the hydro-powered A100 cluster be replaced with 128 H100s now, considering 2-year lifecycle carbon accounting?
details:
  realistic_solution: Calculate the carbon payback period by comparing the annual operational carbon savings to the new embodied carbon debt. Because the grid is incredibly clean, the operational emissions are too small to quickly amortize the massive embodied footprint of manufacturing new H100 servers, meaning the existing hardware should be retained for its full lifecycle.
  common_mistake: |
    **The Pitfall:** Focusing solely on the significant operational power reduction.
    **The Rationale:** Engineers ignore how a low-carbon energy grid drastically shifts the lifecycle emissions ratio toward embodied carbon.
    **The Consequence:** This extends the carbon payback period and actually increases net carbon emissions over the remaining lifecycle.
  napkin_math: |
    - 1. **A100 Op Carbon:** 64 servers × 6kW × 8760 hrs × 0.04 kg/kWh = 134,553 kgCO2eq/yr.
    - 2. **H100 Op Carbon:** 16 servers × 10kW × 8760 hrs × 0.04 kg/kWh = 56,064 kgCO2eq/yr.
    - 3. **Annual Savings:** 134,553 - 56,064 = 78,489 kgCO2eq/yr.
    - 4. **H100 Embodied Debt:** 16 servers × 15,000 kg = 240,000 kgCO2eq.
    - 5. **Carbon Payback Period:** 240,000 / 78,489 = **3.05 years (Since 3.05 > 2 years remaining, upgrading increases net carbon by ~83 tons)**.
