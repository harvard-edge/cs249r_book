title: The NPU Fallback Ping-Pong
scenario: >-
  Your cloud pipeline compiles two models for an Edge NPU (rated at 4 TOPS). Model A (ResNet-50,
  4 GFLOPs) runs at 8ms latency. Model B (EfficientNet, 4 GFLOPs) takes 85ms on the exact same NPU. Profiling
  shows the NPU is idle 80% of the time during Model B's execution. Both models are INT8 quantized.
question: >-
  Why does the structurally similar Model B perform 10x worse?
details:
  realistic_solution: 'The issue is compiler-driven operator fallback across heterogeneous compute. Model B uses the Swish activation function (or SiLU), which the specific NPU hardware block does not natively support (it only supports ReLU). The edge compiler automatically partitions the graph: it runs convolutions on the NPU, copies the activation tensor back to the host CPU to compute Swish, and copies it back to the NPU for the next layer. This completely bottlenecks the system on PCIe/AXI bus bandwidth and CPU context switching, destroying the throughput.'
  common_mistake: |
    **The Pitfall:** Assuming depthwise convolutions are heavily compute-bound on NPUs.
    **The Rationale:** Candidates miss that NPUs have rigid operator support. Unsupported activations (like Swish) force the compiler to partition the graph, causing massive CPU-NPU data transfers.
    **The Consequence:** Deploying modern architectures on edge devices that perform worse than decade-old models due to silent I/O bottlenecks.
  napkin_math: |
    1. **Activation fallback:** 16 layers use Swish, requiring CPU fallback.
    2. **Memory transfer per layer:** 2 MB out + 2 MB in = 4 MB.
    3. **Total bus transfer:** 16 × 4 MB = 64 MB.
    4. **Bus latency:** At 1 GB/s edge SoC bus bandwidth, transfer time = 64 MB / 1 GB/s = 64 ms.
    5. **Total Latency:** 64 ms bus + 10 ms CPU compute + 11 ms NPU compute = **85 ms total.**
