title: The Speculative Decoding Backfire
scenario: To optimize Time-Per-Output-Token (TPOT) for your 30B model, your team implements speculative
  decoding. You use a 1.3B 'draft' model to generate 4 candidate tokens, which are then verified by the
  30B 'target' model in a single pass. In local tests on an H100, TPOT improves by 2.5x. However, when
  you deploy to production, you discover that under high load, TPOT is now *worse* than not using speculative
  decoding at all. You also notice host CPU utilization is pegged at 100%. What is the most likely cause
  of this optimization backfiring so catastrophically at scale?
details:
  realistic_solution: The system is experiencing a Memory Capacity Failure. An H100 has 80 GB of HBM.
    The 30B parameter target model requires `30B * 2 bytes/param = 60 GB` for its weights. The 1.3B draft
    model requires another `1.3B * 2 = 2.6 GB`. Under low load, this 62.6 GB fits comfortably in the H100's
    80 GB. But under high production load, the KV cache grows to consume the remaining ~17 GB. The system
    runs out of VRAM and is forced to constantly offload and stream weights from the host's main DRAM
    over the much slower PCIe bus. This is called 'thrashing'. The latency of PCIe is orders of magnitude
    worse than HBM, completely dominating any theoretical gains from the speculative algorithm. The 100%
    host CPU utilization is a symptom of the host system frantically managing this data transfer to and
    from the GPU.
  common_mistake: Attributing the slowdown to the extra compute of running a second 'draft' model. While
    true that more FLOPs are used, the draft model is tiny and the point of speculative decoding is to
    parallelize work to reduce wall time. The real issue is not compute, but a memory system collapse.
  napkin_math: H100 has 80 GB HBM. 30B target model = 60 GB weights. 1.3B draft model = 2.6 GB weights.
    Total weights = 62.6 GB. KV cache per token (30B) = ~1 MB. Under low load, 62.6 GB weights + small
    KV cache fits in 80 GB. Under high load, KV cache grows to >15 GB, pushing total memory >80 GB, forcing
    the system to offload to CPU DRAM over PCIe.
