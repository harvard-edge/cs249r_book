title: Cloud FPGA Remote Voltage Fault Injection
scenario: You are hosting a proprietary embedding model on a shared multi-tenant cloud FPGA platform. A malicious co-tenant deploys power-hungry ring oscillators to induce transient voltage drops (remote fault injection) on the shared power rail. Each precisely timed drop flips a sign bit in the final dense layer (4,000 x 1,000 dimensions) during matrix multiplication, enabling Differential Fault Analysis (DFA) to steal the weights. The attacker needs 3 successful faults per parameter to extract its exact FP32 value. Their timing success rate is 2% per inference query, and your API charges $0.0001 per query.
question: How many API requests and dollars would the attacker need to extract the 4,000x1,000 dense layer?
details:
  realistic_solution: Calculate the total query budget to evaluate the economic viability of the attack. Since the attack only costs $60,000, a high-value proprietary model is at severe risk. Mitigation requires disabling co-tenancy for critical ML workloads or implementing hardware voltage-drop monitors.
  common_mistake: |
    **The Pitfall:** Assuming fault injection requires physical lab access (like a laser).
    **The Rationale:** Engineers often overlook software-induced remote power-hammering vectors in multi-tenant cloud environments.
    **The Consequence:** Failing to implement hardware voltage-drop monitors or disable co-tenancy for critical ML workloads, leaving proprietary models vulnerable to extraction.
  napkin_math: |
    *   **Target Layer Parameters:** 4,000 $\times$ 1,000 = 4,000,000 parameters.
    *   **Required Faults:** 3 faults/parameter $\times$ 4,000,000 parameters = 12,000,000 faults.
    *   **Success Rate:** At a 2% remote fault injection success rate.
    *   **Total API Queries:** 12,000,000 / 0.02 = **600,000,000 queries**.
    *   **Total Attack Cost:** 600,000,000 queries $\times$ $0.0001/query = **$60,000**.
