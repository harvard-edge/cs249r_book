title: Cloud FPGA Remote Voltage Fault Injection
scenario: You are hosting a proprietary embedding model on a shared multi-tenant cloud FPGA platform.
  A malicious co-tenant deploys power-hungry ring oscillators to induce transient voltage drops (remote
  fault injection) on the shared power rail. Each precisely timed drop flips a sign bit in the final dense
  layer (4,000 x 1,000 dimensions) during matrix multiplication, enabling Differential Fault Analysis
  (DFA) to steal the weights. The attacker needs 3 successful faults per parameter to extract its exact
  FP32 value. If their timing success rate is 2% per inference query, and your API charges $0.0001 per
  query, calculate the total requests and API cost required for the attacker to extract this entire layer.
question: "How many API requests and dollars would the attacker need to extract the 4,000x1,000 dense layer?"
details:
  realistic_solution: Calculate the total query budget to evaluate the economic viability of the attack.
    Since the attack only costs $60,000, a high-value proprietary model is at severe risk. Mitigation
    requires disabling co-tenancy for critical ML workloads or implementing hardware voltage-drop monitors.
  common_mistake: Assuming fault injection requires physical lab access (like a laser), ignoring software-induced
    remote power-hammering vectors in multi-tenant cloud environments where power delivery networks are
    shared.
  napkin_math: A target neural network layer contains 4,000 * 1,000 = 4,000,000 parameters. To induce
    enough voltage drops to alter the decision boundary, the attacker aims for 3 successful bit-flips
    per parameter (12,000,000 faults). At a 2% remote fault injection success rate, this requires 12M
    / 0.02 = 600,000,000 API queries. At a cloud API cost of $0.0001 per query, the attack perfectly executes
    for $60,000.
