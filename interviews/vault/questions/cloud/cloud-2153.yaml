title: The Activation Checkpointing Tradeoff
scenario: You are training a 30B model and cannot fit a single sample through the forward+backward pass due to activation memory. Your colleague suggests activation checkpointing (gradient checkpointing).
question: What is the memory-compute tradeoff, and how do you decide which layers to checkpoint?
details:
  realistic_solution: 'Activation checkpointing discards intermediate activations during forward pass and recomputes them during backward pass. Full checkpointing (every layer boundary) reduces activation memory from O(L) to O(sqrt(L)) with ~33% more compute (one extra forward pass). Selective checkpointing is more efficient: checkpoint only the memory-expensive layers (attention and MLP) while keeping cheap layers (LayerNorm, residual adds). For a 30B transformer with 48 layers: without checkpointing ~60 GB activations (batch=1, seq=2048); with full checkpointing ~8-10 GB activations but ~33% slower training.'
  common_mistake: |
    **The Pitfall:** Thinking activation checkpointing is free, or that it always saves exactly sqrt(N) memory.
    **The Rationale:** Candidates fail to realize that checkpointing trades memory for a full extra forward pass compute cost, and its efficiency depends on the checkpointing strategy.
    **The Consequence:** Unnecessarily slowing down training by 33% by checkpointing cheap layers, or still OOMing by not checkpointing enough.
  napkin_math: |
    - 30B transformer with 48 layers.
    - Without checkpointing: 48 layers * ~1.25 GB/layer = ~60 GB activation memory.
    - Full checkpointing (sqrt(48) ≈ 7 segments): ~7 * 1.25 GB = ~8.75 GB.
    - Compute overhead: 1 extra forward pass ≈ 33% overhead (since backward ≈ 2x forward).
    - **Selective checkpointing (attention/MLP only) saves ~30 GB with only ~20% overhead by keeping cheap operations (LayerNorm) in memory.**
