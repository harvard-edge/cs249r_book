title: The Activation Checkpointing Tradeoff
scenario: You are training a 30B model and cannot fit a single sample through the forward+backward pass
  due to activation memory. Your colleague suggests activation checkpointing (gradient checkpointing).
  What is the memory-compute tradeoff, and how do you decide which layers to checkpoint?
question: "What is the memory-compute tradeoff, and how do you decide which layers to checkpoint?"
details:
  realistic_solution: 'Activation checkpointing discards intermediate activations during forward pass
    and recomputes them during backward pass. Full checkpointing (every layer boundary) reduces activation
    memory from O(L) to O(sqrt(L)) with ~33% more compute (one extra forward pass). Selective checkpointing
    is more efficient: checkpoint only the memory-expensive layers (attention and MLP) while keeping cheap
    layers (LayerNorm, residual adds). For a 30B transformer with 48 layers: without checkpointing ~60
    GB activations (batch=1, seq=2048); with full checkpointing ~8-10 GB activations but ~33% slower training.'
  common_mistake: Thinking activation checkpointing is free, or that it always saves exactly sqrt(N) memory.
    The actual tradeoff depends on the checkpointing strategy.
  napkin_math: 'Without checkpointing: 48 layers × ~1.25 GB/layer = ~60 GB activations | Full checkpointing:
    sqrt(48) ≈ 7 segments → ~7 × 1.25 GB = ~9 GB | Compute cost: 1 extra forward pass ≈ 33% overhead (backward
    ≈ 2× forward) | Selective (attention only): ~30 GB saved, ~20% overhead'
