title: The Training Memory Budget Decomposition
scenario: You have a single 80GB GPU and want to train the largest model possible from scratch. You will train with Adam in mixed precision, batch size 1, sequence length 2048.
question: Walk through the complete memory budget decomposition and determine the maximum model size (in parameters) you can train.
details:
  realistic_solution: 'Memory budget: 80 GB total, ~2 GB for CUDA context = 78 GB usable. Per-parameter costs: BF16 weights (2B) + FP32 master weights (4B) + FP32 Adam m (4B) + FP32 Adam v (4B) + BF16 gradients (2B) = 16 bytes/param. At 78 GB for parameters: 78 GB / 16 B = ~4.9B params maximum IF activations were zero. But activations for a 4.9B model at seq_len=2048, batch=1: roughly 10-15 GB (depends on architecture). With activation checkpointing: ~3-5 GB. So realistic maximum: ~4B params with checkpointing, ~3B without.'
  common_mistake: |
    **The Pitfall:** Only accounting for weights and optimizer states.
    **The Rationale:** Candidates forget that activation memory grows with sequence length and model width, and that CUDA context/fragmentation consume baseline memory.
    **The Consequence:** Estimating a model size that will immediately Out Of Memory (OOM) during the first forward pass.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU VRAM: 80 GB. CUDA Context: ~2 GB.
       - Precision: BF16 weights/grads, FP32 master weights/optimizer states.
       - Activations (with checkpointing): ~5 GB.
    2. **Calculations:**
       - Per-Parameter Cost: 2B (BF16 weights) + 4B (FP32 master) + 4B (FP32 Adam m) + 4B (FP32 Adam v) + 2B (BF16 grads) = 16 bytes/parameter.
       - Available Memory for Parameters: 80 GB - 2 GB (context) - 5 GB (activations) = 73 GB.
       - Max Parameters: 73 GB / 16 bytes/param = 4.5625 Billion.
    3. **Conclusion & Interpretation:** **Accounting for optimizer states and activations, the maximum trainable model size is ~4.5B parameters. Result: Memory-Capacity-Bound.**
