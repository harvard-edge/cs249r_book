title: 'The H100 Unit Cost: TCO & Cost Modeling'
scenario: When planning a new training cluster, a key component of the Total Cost of Ownership (TCO) is the hardware capital expenditure (CapEx).
question: What is the approximate unit cost of a single NVIDIA H100 GPU, a standard component for large-scale AI training in the cloud?
details:
  realistic_solution: 'The approximate unit cost for an H100 is ~$30,000. This high price reflects its specialized HBM3 memory, high-speed NVLink interconnects, massive die size, and the enterprise-level validation and support required for datacenter deployments.'
  common_mistake: |
    **The Pitfall:** Confusing the cost of datacenter-grade hardware with high-end consumer GPUs.
    **The Rationale:** Engineers used to building local workstations anchor their expectations on $3,000 gaming cards.
    **The Consequence:** Drastically underestimating the CapEx required for cluster procurement, leading to rejected budget proposals.
  napkin_math: |
    1. A single DGX H100 server with 8 GPUs represents nearly a quarter-million dollars in GPU CapEx alone.
    2. $8\text{ GPUs} \times \$30,000/\text{GPU} = \$240,000$.
    3. A small 128-GPU cluster requires 16 such servers.
    4. **$\$240,000 \times 16 = \$3.84\text{M}$ just for the GPUs.**
  options:
  - ~$3,000 (Confuses datacenter GPU with a high-end consumer card)
  - ~$10,000 (Underestimates the premium for enterprise-grade features)
  - ~$30,000
  - ~$100,000 (Confuses the cost of a single GPU with a fully-equipped server)
  correct_index: 2
