title: 'The H100 Unit Cost: TCO & Cost Modeling'
scenario: When planning a new training cluster, a key component of the Total Cost of Ownership (TCO) is
  the hardware capital expenditure (CapEx). What is the approximate unit cost of a single NVIDIA H100
  GPU, a standard component for large-scale AI training in the cloud?
question: "What is the approximate unit cost of a single NVIDIA H100 GPU, a standard component for large-scale AI training in the cloud?"
details:
  realistic_solution: The approximate unit cost for an H100 is ~$30,000. This high price reflects its
    specialized HBM3 memory, high-speed NVLink interconnects, massive die size, and the enterprise-level
    validation and support required for datacenter deployments.
  common_mistake: Engineers often underestimate the cost of datacenter-grade hardware, confusing it with
    high-end consumer GPUs (which are closer to $3,000-$5,000). They may fail to appreciate the order-of-magnitude
    difference in price for server-class components with features like HBM, NVLink, and enterprise support.
  napkin_math: 'This is a foundational number for any TCO calculation. For example, a single DGX H100
    server with 8 GPUs represents nearly a quarter-million dollars in GPU CapEx alone: 8 GPUs × $30,000/GPU
    = $240,000. A small 128-GPU cluster would be 16 such servers, costing $3.84M just for the GPUs.'
  options:
  - ~$3,000 (Confuses datacenter GPU with a high-end consumer card)
  - ~$10,000 (Underestimates the premium for enterprise-grade features)
  - ~$30,000
  - ~$100,000 (Confuses the cost of a single GPU with a fully-equipped server)
  correct_index: 2
