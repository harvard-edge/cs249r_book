title: Wasted Activation VRAM from Dying ReLUs
scenario: You are training a large recommendation model's MLP tower on an 8x A100 (80GB) node using PyTorch
  in FP16. The tower has 4 dense layers, each with 16,384 neurons and ReLU activations. After an aggressive
  learning rate schedule, profiling shows 60% of the neurons have 'died' and permanently output zero.
  For a micro-batch size of 4096, calculate the total VRAM (in MB) wasted storing these zeroed activations
  for the backward pass across all 4 layers.
question: "How much VRAM is wasted storing zero activations for the backward pass across all 4 ReLU layers?"
details:
  realistic_solution: Calculate the total activation memory needed for the backward pass and multiply
    by the dead neuron percentage. A standard dense tensor allocates memory for all elements, so 322 MB
    is wasted just holding zeros.
  common_mistake: Calculating parameter memory instead of activation memory, or incorrectly assuming that
    standard deep learning frameworks automatically compress zero-valued activations to save VRAM.
  napkin_math: 'Elements per layer = 4,096 (batch) * 16,384 (neurons) = 67.1M.

    Memory per layer (FP16) = 67.1M * 2 bytes = 134.2 MB.

    Total activation memory (4 layers) = 134.2 MB * 4 = 536.8 MB.

    Wasted VRAM (60% dead) = 536.8 MB * 0.6 = 322.1 MB.'
