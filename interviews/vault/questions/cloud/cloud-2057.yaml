title: The Experiment Tracking Storage Budget
scenario: 'Your team runs 200 experiments per week. Each experiment logs: a 500 MB model checkpoint, 50
  MB of metrics/logs, and 10 MB of hyperparameter configs. How much storage does your experiment tracking
  system consume per year, and at what point does this become an infrastructure concern?'
details:
  realistic_solution: 'Each experiment: 500 + 50 + 10 = 560 MB. Per week: 200 × 560 MB = 112 GB. Per year:
    112 GB × 52 = 5.8 TB. At $0.023/GB/month for S3, annual storage cost is ~$1,600. The infrastructure
    concern is not cost but retrieval: when a team member needs to reproduce an experiment from 6 months
    ago, finding and loading the right checkpoint from 10,000+ experiments requires systematic metadata
    indexing.'
  common_mistake: Only counting the metrics and configs (~12 MB per experiment) and forgetting that model
    checkpoints dominate storage by 40×.
  napkin_math: '200 experiments/week × 560 MB/experiment = 112 GB/week. 112 GB × 52 weeks = 5.8 TB/year.
    S3 cost: 5.8 TB × $0.023/GB/month × 12 months ≈ $1,600/year. Number of experiments to search: 200
    × 52 = 10,400/year.'
