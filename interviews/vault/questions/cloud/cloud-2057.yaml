title: The Experiment Tracking Storage Budget
scenario: Your team runs 200 experiments per week. Each experiment logs: a 500 MB model checkpoint, 50 MB of metrics/logs, and 10 MB of hyperparameter configs.
question: "How much storage does your experiment tracking system consume per year, and at what point does this become an infrastructure concern?"
details:
  realistic_solution: The system generates about 5.8 TB of data annually. The infrastructure concern is not the raw storage cost (which is extremely cheap in S3/GCS), but retrieval complexity. When a team member needs to reproduce an experiment from 6 months ago, finding the right checkpoint from 10,000+ un-indexed files requires systematic metadata management.
  common_mistake: |
    **The Pitfall:** Only calculating the metrics and configs (~60 MB per experiment).
    **The Rationale:** Candidates often forget that model checkpoints are saved as part of experiment tracking and dominate the storage footprint.
    **The Consequence:** The storage capacity is under-provisioned by 10x, leading to sudden out-of-space errors on local tracking servers.
  napkin_math: |
    1. **Per experiment:** 500 MB + 50 MB + 10 MB = 560 MB.
    2. **Per week:** 200 experiments * 560 MB = 112,000 MB = 112 GB.
    3. **Per year:** 112 GB * 52 weeks = **~5.8 TB/year**.
    4. **S3 Cost:** 5.8 TB * $0.023/GB/month * 12 = **~$1,600/year**.
