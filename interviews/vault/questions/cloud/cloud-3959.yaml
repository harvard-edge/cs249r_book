title: Overlapping Parameter Server Pull with Forward Computation
scenario: In a parameter server architecture (used for recommendation models with
  large embedding tables), workers pull updated embeddings from PS before each forward
  pass. The pull takes 15ms for a 10GB embedding table. Can this pull be overlapped
  with the forward pass of non-embedding layers?
question: Can this pull be overlapped with the forward pass of non-embedding layers?
details:
  realistic_solution: 'Partial overlap: (1) The model has two parts: embedding layer
    (needs PS pull) and MLP tower (needs embedding output). These are sequential —
    MLP depends on embedding. (2) However, if the model has multiple embedding tables
    (user embeddings, item embeddings, context embeddings), they can be pulled in
    parallel AND each embedding''s forward pass can start as soon as its pull completes,
    before other embeddings are ready. (3) Multi-table overlap: pull(user_emb) ||
    pull(item_emb) || pull(context_emb). As user_emb arrives, start user feature processing
    while item_emb is still pulling. (4) Additional: overlap this step''s PS pull
    with the previous step''s PS push (gradient update). Two-phase PS protocol: push(step
    N gradients) || pull(step N+1 params).'
  common_mistake: Waiting for all embeddings to be pulled before starting any forward
    computation. The embedding lookup is only the first layer; subsequent MLP layers
    do not depend on embeddings being fully pulled.
  napkin_math: '3 embedding tables: 5GB, 3GB, 2GB at 10 Gbps network. Sequential pull:
    (5+3+2)/1.25 = 8s. But with 10 PS shards: each shard serves 1GB, parallel pull:
    5GB/12.5 GB/s = 0.4s (limited by largest table). Overlap with MLP: max(0.4, 0.2)
    = 0.4s vs 0.6s serial.'
