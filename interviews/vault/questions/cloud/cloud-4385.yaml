title: Waste Heat Recovery Feasibility for H100 Liquid-Cooled Racks
scenario: A hyperscaler is evaluating whether to recover waste heat from direct-to-chip
  (D2C) liquid-cooled H100 racks for district heating. Each 8×H100 node draws 8 kW.
  The D2C system delivers coolant at 40°C supply and returns it at 55°C. The district
  heating network requires a minimum delivery temperature of 60°C. Analyze the feasibility
  of direct heat exchange, the engineering options to bridge the temperature gap,
  and calculate the recoverable thermal power for a 500-node cluster.
question: Can 55°C D2C return coolant from 500 H100 nodes be used for 60°C district
  heating, what options bridge the gap, and how much heat is recoverable?
details:
  realistic_solution: 'Temperature gap: district heating needs 60°C, D2C return is
    55°C—a 5°C deficit. Options: (1) heat pump to boost from 55°C to 65°C at COP ~6-8
    (electrical cost adds ~12-16% overhead); (2) operate coolant at higher flow resistance
    to raise return temperature to 62°C (increases pump work, risks GPU thermal margin);
    (3) use D2C heat as pre-heat for a gas boiler (most common practical approach—reduces
    boiler fuel by ~60%). Recoverable power: 500 nodes × 8 kW × 0.72 liquid fraction
    = 2.88 MW thermal. At 8,000 hours/year = 23,040 MWh/year. At $0.05/kWh heat equivalent,
    that''s $1.15M/year in recovered energy value.'
  common_mistake: Candidates assume all 8 kW per node is recoverable as useful heat.
    In practice, the fraction captured by the D2C system depends on the split between
    conduction-cooled (GPU die) and convection-cooled (VRMs, DRAM) heat paths. For
    H100 D2C nodes, approximately 70-75% of IT load is captured by liquid; the remaining
    25-30% is removed by room air.
  napkin_math: '500 nodes × 8 kW = 4 MW IT load. D2C captures 72%: 4 MW × 0.72 = 2.88
    MW thermal. Temperature: 55°C return, 40°C supply, ΔT = 15°C. Mass flow: Q = ṁ
    × Cp × ΔT → ṁ = 2,880 kW / (4.18 kJ/kg·K × 15K) = 45.9 kg/s total. Heat pump to
    60°C: COP ~7 → electrical input = 2.88 MW / 7 = 0.41 MW extra. Net recovered:
    2.88 MW at 60°C for ~0.41 MW penalty = ~7× energy leverage. Annual value: 2.88
    × 8,000h × $0.05 = $1.15M.'
