title: Expert Load Imbalance Diagnosis
scenario: 'Your MoE model (64 experts, top-2) shows 40% MFU despite high arithmetic intensity. Profiling
  reveals 3 experts receive 25% of all tokens while 20 experts receive <0.5% each. Evaluate: (A) add auxiliary
  load-balancing loss, (B) increase expert capacity factor, (C) switch to hash-based routing.'
details:
  realistic_solution: 'The 40% MFU is caused by load imbalance: 3 ''celebrity'' experts are compute bottlenecks
    while 20 experts are nearly idle. (A) Auxiliary load-balancing loss adds a penalty encouraging uniform
    routing. This is the standard approach (used in Switch Transformer, GShard) and directly addresses
    the root cause. Cost: slight degradation in model quality. (B) Increasing capacity factor (buffer
    size per expert) prevents token dropping but doesn''t fix imbalance — the 3 hot experts still bottleneck
    the step time, and memory is wasted on cold experts. (C) Hash-based routing guarantees perfect balance
    but ignores input semantics, significantly degrading model quality. Recommendation: (A) is the best
    first step. Add load-balancing loss with coefficient ~0.01. If imbalance persists, combine with a
    modest capacity factor increase.'
  common_mistake: Only increasing the capacity factor. This lets popular experts process more tokens but
    wastes memory on unpopular experts and doesn't fix the root cause of imbalanced routing.
  napkin_math: '3 experts get 25% traffic = 3×8.3% overload each. Ideal: each expert gets 1/64 = 1.56%.
    Step time gated by slowest (most loaded) expert → 40% MFU.'
