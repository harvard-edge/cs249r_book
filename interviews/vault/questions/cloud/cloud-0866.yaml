math_issues:
- Math formula error in the Flat Ring AllGather calculation. The step time should be 0.68GB / 3.125 GB/s
  ≈ 0.21s. However, the formula is incorrectly written as 0.68GB / (512 * 3.125 GB/s), which mathematically
  equals 0.000425s, adding a stray 512 in the denominator. The text then paradoxically claims this evaluates
  to 0.21s per step.
