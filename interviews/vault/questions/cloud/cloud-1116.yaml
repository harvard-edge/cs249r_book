title: DCQCN Incast Buffer Sizing
scenario: A 400Gbps RoCEv2 fabric is experiencing incast congestion during an All-to-All communication phase. Ten senders are transmitting at a full 400Gbps line rate to a single receiver port. The switch's ECN marking threshold for DCQCN is configured at 150KB. The end-to-end round-trip time (RTT), including switch processing and Congestion Notification Packet (CNP) generation, is 2 microseconds.
question: What peak switch buffer occupancy occurs before DCQCN takes effect, and what minimum buffer size avoids PFC pauses?
details:
  realistic_solution: Calculate the net buffer accumulation rate as total incoming bandwidth minus outgoing bandwidth (4000 Gbps - 400 Gbps = 3600 Gbps). During the 2µs RTT before the CNP reaches senders, 900KB of data accumulates. Adding this to the 150KB ECN threshold, the peak buffer occupancy is 1.05MB. The switch buffer must be at least this large to avoid triggering Priority Flow Control (PFC).
  common_mistake: |
    **The Pitfall:** Failing to account for the port's continuous drain rate or forgetting that the buffer keeps filling during the entire RTT.
    **The Rationale:** Candidates calculate incoming bandwidth but ignore that the receiver port is successfully transmitting data at its line rate simultaneously.
    **The Consequence:** The required switch buffer size is vastly overestimated, or PFC pauses are unexpectedly triggered.
  napkin_math: |
    1. **Total Input Rate:** 10 senders * 400 Gbps = 4000 Gbps.
    2. **Output Drain Rate:** 1 receiver port * 400 Gbps = 400 Gbps.
    3. **Net Accumulation Rate:** 4000 - 400 = 3600 Gbps = 450 GB/s.
    4. **Accumulation during 1 RTT (2µs):** 450 GB/s * 2µs = 900 KB.
    5. **Conclusion:** **Peak Buffer Occupancy = ECN Threshold (150 KB) + Accumulation (900 KB) = 1.05 MB. The switch buffer must be at least 1.05 MB to prevent triggering PFC pauses.**
