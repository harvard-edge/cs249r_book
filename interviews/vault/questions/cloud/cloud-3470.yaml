title: LLM Inference Load Balancing on Google TPU v5e Fleet
scenario: You are tasked with designing a robust and efficient serving system for large language model (LLM) inference on a fleet of Google TPU v5e accelerators. The system must handle a sustained inference request rate of 50,000 queries per second (QPS) with an average inference latency target of 100ms.
question: How would you route and load-balance 50,000 QPS across TPU v5e inference servers to hit 100 ms latency during updates and failures?
details:
  realistic_solution: A realistic solution would involve a multi-layered load balancing approach. A global ingress load balancer (e.g., L7 proxy with gRPC support) would distribute requests to regional inference clusters. Within each cluster, a specialized routing service would employ consistent hashing for 'sticky' sessions (if stateful inference is required) and dynamic weighted round-robin based on real-time TPU utilization metrics (e.g., active requests, HBM utilization per core, current QPS, and pending queue depth). This service would be aware of model versions and warm-up states. Inference-aware routing logic would direct requests based on model size, batch size, or latency requirements, potentially using separate queues for different inference profiles. An orchestrator (like Kubernetes) would manage TPU pod autoscaling, integrating with the load balancer for dynamic capacity adjustments and seamless model deployments.
  common_mistake: |
    **The Pitfall:** Employing static load balancing without hardware awareness.
    **The Rationale:** Engineers apply standard web server load balancing techniques, ignoring the massive compute vs memory bottleneck ratio of TPU v5es.
    **The Consequence:** This leads to suboptimal batching, inefficient model partitioning, and "hot" TPUs that miss latency SLAs despite low average utilization.
  napkin_math: |
    1. **Capacity Need:** 50,000 QPS with 100ms latency. If one TPU handles an optimal batch size of 8 in 100ms, it serves 80 QPS. Total TPUs needed = 50,000 / 80 = 625 TPU v5e devices.
    2. **Memory Constraint:** 16GB HBM means an 8GB model allows 2 instances.
    3. **Bandwidth Bottleneck:** 1.6 TB/s memory bandwidth reading an 8GB model yields maximum 200 full model reads/sec. Auto-regressive decoding is memory-bandwidth bound.
    4. **Conclusion:** **Memory bandwidth limits per-device QPS to 200 at batch size 1**, necessitating sophisticated request routing and dynamic batching to maximize the 625-device fleet.
