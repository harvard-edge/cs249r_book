title: LLM Inference Load Balancing on Google TPU v5e Fleet
scenario: You are tasked with designing a robust and efficient serving system for
  large language model (LLM) inference on a fleet of Google TPU v5e accelerators.
  Each TPU v5e boasts 16 GB of High Bandwidth Memory (HBM), 197 TFLOPS (BF16) of computational
  power, and a memory bandwidth of 1.6 TB/s. The system must handle a sustained inference
  request rate of 50,000 queries per second (QPS) with an average inference latency
  target of 100ms. Your primary challenge is to design the request routing and load
  balancing strategy to ensure optimal utilization of the TPUs, minimize queueing
  delays, and maintain high availability during dynamic model updates or partial hardware
  failures. How would you implement dynamic traffic management, incorporating concepts
  like consistent hashing, weighted round-robin, and inference-aware routing, to meet
  these quantitative constraints, specifically leveraging or mitigating the TPU v5e's
  characteristics?
question: How would you route and load-balance 50,000 QPS across TPU v5e inference
  servers to hit 100 ms latency during updates and failures?
details:
  realistic_solution: A realistic solution would involve a multi-layered load balancing
    approach. A global ingress load balancer (e.g., L7 proxy with gRPC support) would
    distribute requests to regional inference clusters. Within each cluster, a specialized
    routing service would employ consistent hashing for 'sticky' sessions (if stateful
    inference is required) and dynamic weighted round-robin based on real-time TPU
    utilization metrics (e.g., active requests, HBM utilization per core, current
    QPS, and pending queue depth). This service would be aware of model versions and
    warm-up states. Inference-aware routing logic would direct requests based on model
    size, batch size, or latency requirements, potentially using separate queues for
    different inference profiles. An orchestrator (like Kubernetes) would manage TPU
    pod autoscaling, integrating with the load balancer for dynamic capacity adjustments
    and seamless model deployments.
  common_mistake: Ignoring the specific hardware characteristics (like the limited
    16 GB HBM or massive BF16 TFLOPS) of the TPU v5e, leading to suboptimal batching
    strategies, inefficient model partitioning, or incorrect assumptions about compute
    vs. memory bound workloads. Another common mistake is employing static load balancing
    that fails to adapt to dynamic workload imbalances, model changes, or varying
    inference complexities, resulting in 'hot' TPUs and underutilized resources.
  napkin_math: "Given 50,000 QPS and an average latency target of 100ms, each inference\
    \ must complete within 100ms. If an LLM inference takes 100ms on a single TPU v5e\
    \ at an optimal batch size (e.g., 8), then one TPU can handle 8 / 0.1s = 80 QPS.\
    \ Thus, we would need approximately 50,000 QPS / 80 QPS/TPU = 625 TPU v5e devices\
    \ in the fleet. For memory, 16 GB HBM means if a model consumes 8 GB, then 2 instances\
    \ could theoretically reside. The 1.6 TB/s memory bandwidth translates to (1.6 *\
    \ 10^12 bytes/s) / (8 * 10^9 bytes/model) = 200 full model reads per second. Since\
    \ LLM auto-regressive decoding requires reading the entire weights for every token\
    \ generated, the process is fundamentally memory-bandwidth bound (maximum 200 tokens/sec\
    \ at batch size 1). Therefore, memory bandwidth, not BF16 TFLOPS, is the primary hardware\
    \ bottleneck for serving."
