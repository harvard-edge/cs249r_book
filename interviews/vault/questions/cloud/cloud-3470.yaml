title: LLM Inference Load Balancing on TPU Fleet
scenario: You are tasked with designing a robust and efficient serving system for large language model (LLM) inference on a fleet of TPU accelerators. The system must handle a sustained inference request rate of 50,000 queries per second (QPS) with an average inference latency target of 100ms.
question: How would you route and load-balance 50,000 QPS across TPU inference servers to hit 100 ms latency during updates and failures?
details:
  realistic_solution: A realistic solution would involve a multi-layered load balancing approach. A global ingress load balancer (e.g., L7 proxy with gRPC support) would distribute requests to regional inference clusters. Within each cluster, a specialized routing service would employ consistent hashing for 'sticky' sessions (if stateful inference is required) and dynamic weighted round-robin based on real-time TPU utilization metrics (e.g., active requests, HBM utilization per core, current QPS, and pending queue depth). This service would be aware of model versions and warm-up states. Inference-aware routing logic would direct requests based on model size, batch size, or latency requirements, potentially using separate queues for different inference profiles. An orchestrator (like Kubernetes) would manage TPU pod autoscaling, integrating with the load balancer for dynamic capacity adjustments and seamless model deployments.
  common_mistake: |
    **The Pitfall:** Employing static load balancing without hardware awareness.
    **The Rationale:** Engineers apply standard web server load balancing techniques, ignoring the massive compute vs memory bottleneck ratio of TPUs.
    **The Consequence:** This leads to suboptimal batching, inefficient model partitioning, and "hot" TPUs that miss latency SLAs despite low average utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target is 50,000 QPS with 100ms latency.
       - Optimal batch size of 8 takes 100ms.
       - Model is 8GB auto-regressive decoding.
    2. **Calculations:**
       - TPU capacity: 8 requests / 100ms = 80 QPS per TPU.
       - TPUs needed: 50,000 / 80 = 625 TPUs.
       - Bandwidth limit: 1.6 TB/s memory bandwidth reading an 8GB model yields max 200 reads/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Memory bandwidth limits per-device QPS to 200, necessitating dynamic batching to maximize the 625-device fleet. Memory-Bandwidth-Bound**
