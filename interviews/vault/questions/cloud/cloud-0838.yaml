title: Recommender Migration Latency Degradation
scenario: An ML infrastructure team is migrating a massive recommendation model's inference from a fleet
  of CPUs to custom ASICs. The model consists of a massive, sparse embedding table (100GB+) and a dense,
  computationally heavy MLP component. After moving the entire pipeline to the custom ASIC, they notice
  that while the MLP throughput improved by 10x, the overall end-to-end P99 latency degraded by 30% compared
  to the CPU baseline. How should they analyze the profile traces to root-cause this anomaly across the
  hardware spectrum?
details:
  realistic_solution: 'Analyze the execution profile to isolate embedding lookup times versus dense compute
    times. The solution is to partition the workload across the hardware spectrum: keep sparse embedding
    lookups on CPUs (which excel at latency-sensitive irregular memory access), and pipeline the dense
    MLP computation to the ASIC (which excels at predictable matrix math).'
  common_mistake: Assuming that porting an entire workload to a specialized, high-TFLOPS accelerator automatically
    yields the best performance, ignoring the accelerator's poor handling of sparse, irregular memory
    accesses compared to a CPU's large, complex cache hierarchy.
  napkin_math: 'Baseline CPU: Lookup = 5ms, MLP = 45ms -> Total = 50ms. ASIC: MLP = 4.5ms (10x faster),
    but Lookup = 60.5ms (lack of large caches causes DRAM stalls for irregular reads) -> Total = 65ms
    (30% slower overall). Hybrid pipelined: max(5ms, 4.5ms) + PCIe transfer(1ms) -> Throughput bounded
    by ~6ms, Latency = 10.5ms.'
