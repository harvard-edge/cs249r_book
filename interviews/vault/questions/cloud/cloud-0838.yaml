title: Recommender Migration Latency Degradation
scenario: An ML infrastructure team is migrating a massive recommendation model's inference from a fleet of CPUs to custom ASICs. The model consists of a massive, sparse embedding table (100GB+) and a dense, computationally heavy MLP component. After moving the entire pipeline to the custom ASIC, they notice that while the MLP throughput improved by 10x, the overall end-to-end P99 latency degraded by 30% compared to the CPU baseline.
question: "How should they analyze the profile traces to root-cause this anomaly across the hardware spectrum?"
details:
  realistic_solution: 'Analyze the execution profile to isolate embedding lookup times versus dense compute times. The solution is to partition the workload across the hardware spectrum: keep sparse embedding lookups on CPUs (which excel at latency-sensitive irregular memory access), and pipeline the dense MLP computation to the ASIC (which excels at predictable matrix math).'
  common_mistake: |
    **The Pitfall:** Assuming that porting an entire workload to a specialized accelerator automatically yields the best end-to-end performance.
    **The Rationale:** Engineers fixate on the massive TFLOPS advantage of custom ASICs, ignoring the fact that sparse embedding lookups are memory-latency bound, not compute bound.
    **The Consequence:** Irregular memory accesses stall the ASIC, resulting in severe overall latency degradation despite faster matrix math.
  napkin_math: |
    1. Baseline CPU Pipeline: Lookup (5ms) + Dense MLP (45ms) = 50ms Total Latency.
    2. Full ASIC Pipeline: Dense MLP drops to 4.5ms (10x faster), but cache-less ASIC Lookup spikes to 60.5ms = 65ms Total Latency (30% slower).
    3. Hybrid Pipelined Approach: CPU handles lookup (5ms), streams via PCIe (1ms), ASIC handles MLP (4.5ms).
    **The hybrid pipeline bounds throughput to max(5ms, 4.5ms) = 5ms, reducing end-to-end latency to just 10.5ms.**
