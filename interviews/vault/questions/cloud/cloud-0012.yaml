title: The True Cost of Batching on TTFT
scenario: You're designing an LLM serving system on a single H100 GPU. The Service Level Objective (SLO) for Time-To-First-Token (TTFT) must be under 250ms. Your system improves GPU utilization by queueing incoming requests and forming batches. A new batch is processed every 100ms. The prompt processing (prefill) for a single request takes about 15ms on this hardware.
question: What maximum batch size keeps TTFT under 250ms with a 100ms batching window and 15ms prefill per request?
details:
  realistic_solution: 'The total latency experienced by a user is the sum of the time spent waiting for a batch to be formed (queue time) and the time it takes to process the batch. In the worst-case scenario, a request arrives just after a batch has been dispatched, meaning it must wait the full 100ms for the next batching window. This leaves `250ms (SLO) - 100ms (Max Queue Time) = 150ms` for the actual batch processing. To find the max batch size, we divide the remaining time by the per-request processing time: `150ms / 15ms/request = 10 requests`.'
  common_mistake: |
    **The Pitfall:** Calculating max batch size by dividing the SLO directly by the per-request processing time (250ms / 15ms ≈ 16).
    **The Rationale:** Engineers forget that time spent waiting in the queue counts against the user-facing latency budget.
    **The Consequence:** Requests that arrive immediately after a batch starts will wait the full batch window, causing them to violate the TTFT SLA by almost 100ms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TTFT SLO: 250ms.
       - Maximum queue time (batch window): 100ms.
       - Prefill processing time per request: 15ms.
    2. **Calculations:**
       - Remaining time for processing: 250ms - 100ms = 150ms.
       - Max batch size: 150ms / 15ms = 10 requests.
    3. **Conclusion & Interpretation:**
       - **Result: Queuing Latency Bound.** Maximum batch size is exactly 10 requests to safely guarantee the SLA.
  options:
  - 10 requests. The worst-case queueing time must be subtracted from the SLO before calculating batch capacity.
  - 16 requests. The SLO of 250ms can be divided directly by the 15ms per-request time.
  - 6 requests. This assumes the queue time (100ms) and processing time (150ms) are independent.
  - It's unlimited. The H100 is fast enough that prefill time is negligible.
