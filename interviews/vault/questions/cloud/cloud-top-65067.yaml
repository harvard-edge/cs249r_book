title: Disaggregated Serving with TPU v5e Prefill Nodes
scenario: A team proposes using TPU v5e (197 TFLOPS BF16, 800 GB/s) for prefill nodes and H100 for decode
  nodes in a disaggregated 70B serving system. Analyze whether TPU v5e is prefill-optimal and identify
  the integration challenges.
question: "Is TPU v5e a good choice for 70B prefill nodes versus H100, and what integration issues would you expect?"
details:
  realistic_solution: 'Prefill analysis on TPU v5e: for a 512-token prompt on 70B model: 2*512*70B = 71.7T
    FLOP. TPU v5e at 197 TFLOPS: 71.7T/197T = 364ms per request. H100 at 989 TFLOPS: 72ms. TPU v5e is
    5x slower per request in isolation. BUT: TPU v5e is designed for high-throughput batched inference.
    In batched prefill: TPU v5e throughput scales well due to systolic array. Batch of 64, 512-token prompts:
    64*71.7T = 4.6P FLOP. TPU v5e: 4.6P/197T = 23.4 seconds for batch. H100: 4.6P/989T = 4.65 seconds.
    H100 still 5x faster. Integration challenges: (1) KV cache format: TPU uses bf16 by default; decode
    H100 may expect different format — conversion overhead. (2) Network transfer: TPU is on Google Cloud;
    H100 on custom on-prem or AWS — cross-cloud KV transfer is high-latency. (3) XLA compilation: TPU
    requires JAX/TF; vLLM decode uses PyTorch — need a translation layer. Verdict: TPU v5e for prefill
    only makes sense if dramatically cheaper than H100 and latency SLO is relaxed (>1s TTFT).'
  common_mistake: Comparing TPU v5e TFLOPS (197) to H100 TFLOPS (989) and concluding TPU v5e is 5x slower
    for prefill. Prefill is compute-bound, so TFLOPS comparison is relevant — but TPU v5e is designed
    for batch training efficiency, not low-latency single-request prefill. The XLA compilation model adds
    overhead.
  napkin_math: 'TPU v5e for prefill, cost: $1.20/hr on Google Cloud for v5e-1 (1 chip). H100 $3/hr. Cost
    per TFLOP: TPU v5e $1.20/197 = $0.0061/TFLOP-hr. H100: $3/989 = $0.00303/TFLOP-hr. H100 is actually
    2x more cost-efficient per TFLOP. TPU v5e advantage only if using v5e pods with high MFU on large
    batches. In practice: TPU v5e is not cost-effective for disaggregated prefill vs H100 unless GPU availability
    is constrained.'
