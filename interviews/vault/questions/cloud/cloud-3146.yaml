math_issues:
- With Tensor Parallelism, all concurrent requests consume KV cache on all GPUs. A
  target of 500 requests requires 500 * 320MB = 160GB per GPU in FP8, vastly exceeding
  the 45GB budget. FP8 only allows 140 total concurrent requests.
