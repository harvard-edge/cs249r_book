title: KV Cache Quantization with PagedAttention
scenario: You serve a 70B model on 4x H100 with PagedAttention. Current setup uses FP16 KV cache, supporting 200 concurrent requests at avg 4096 tokens. Product wants 500 concurrent requests.
question: What KV-cache quantization strategy would let the 4-H100 70B service reach 500 concurrent requests, and what quality tradeoff does it make?
details:
  realistic_solution: 'With Tensor Parallelism, each GPU stores 1/4 of the model weights and 1/4 of the KV heads, but processes ALL requests. Therefore, a 500 concurrent request target means 500 requests per GPU. An 80GB GPU has ~45GB available after storing weights. FP16 KV cache per GPU per request is ~320MB, so FP16 fits ~140 requests. FP8 halves this to 160MB, fitting ~280 requests (failing the target). Only INT4 group quantization (group=128) reduces it to 80MB, fitting 560 requests. Quality impact: INT4 shows 1-2% degradation on long-context tasks due to accumulated quantization error in deep layers, and requires per-channel/group scaling to preserve attention score distributions.'
  common_mistake: |
    **The Pitfall:** Dividing the concurrent request target by the number of GPUs when using Tensor Parallelism.
    **The Rationale:** Candidates intuitively think that 4 GPUs means each handles 1/4 of the user requests (like in Data Parallelism).
    **The Consequence:** They erroneously conclude FP8 suffices because they aim for 125 requests per GPU, failing to realize that under TP, every request consumes KV cache on every GPU simultaneously.
  napkin_math: |
    - Total KV cache per request in FP16: 80 layers × 2 (K,V) × 8 KV heads × 128 dim × 4096 tokens × 2 bytes = 1.34 GB.
    - With TP=4, each GPU stores 1/4 of the heads: 1.34 GB / 4 = 335 MB/req/GPU (often rounded to 320 MiB).
    - GPU memory budget: 80 GB HBM - 35 GB (model weights) = 45 GB available.
    - FP16 Capacity: 45 GB / 320 MiB ≈ 140 concurrent requests.
    - FP8 Capacity: 45 GB / 160 MiB ≈ 280 concurrent requests.
    - INT4 Capacity: 45 GB / 80 MiB ≈ 560 concurrent requests.
    - **Conclusion:** To reach the 500 request target, **INT4 quantization is strictly required**, as FP8 only supports ~280 requests.
