title: KV Cache Quantization with PagedAttention
scenario: You serve a 70B model on 4x GPUs with PagedAttention. Current setup uses FP16 KV cache, supporting 200 concurrent requests at avg 4096 tokens. Product wants 500 concurrent requests.
question: What KV-cache quantization strategy would let the 4-GPU 70B service reach 500 concurrent requests, and what quality tradeoff does it make?
details:
  realistic_solution: 'With Tensor Parallelism, each GPU stores 1/4 of the model weights and 1/4 of the KV heads, but processes ALL requests. Therefore, a 500 concurrent request target means 500 requests per GPU. An 80GB GPU has ~45GB available after storing weights. FP16 KV cache per GPU per request is ~335MB, so FP16 fits ~134 requests. FP8 halves this to 167MB, fitting ~269 requests (failing the target). Only INT4 group quantization (group=128) reduces it to 83.5MB, fitting 538 requests. Quality impact: INT4 shows 1-2% degradation on long-context tasks due to accumulated quantization error in deep layers, and requires per-channel/group scaling to preserve attention score distributions.'
  common_mistake: |
    **The Pitfall:** Dividing the concurrent request target by the number of GPUs when using Tensor Parallelism.
    **The Rationale:** Candidates intuitively think that 4 GPUs means each handles 1/4 of the user requests (like in Data Parallelism).
    **The Consequence:** They erroneously conclude FP8 suffices because they aim for 125 requests per GPU, failing to realize that under TP, every request consumes KV cache on every GPU simultaneously.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 70B. GPUs: 4 (80GB each). TP=4.
       - 80 layers, 8 KV heads, 128 dim, 4096 tokens.
       - 45 GB HBM available per GPU after weights. Target: 500 requests.
    2. **Calculations:**
       - KV cache per request (FP16): 80 × 2 × 8 × 128 × 4096 × 2 = 1.34 GB.
       - With TP=4, each GPU stores 1/4 heads: 1.34 GB / 4 = 335 MB/req/GPU.
       - FP16 Capacity: 45 GB / 335 MB ≈ 134 requests.
       - FP8 Capacity: 45 GB / 167 MB ≈ 269 requests.
       - INT4 Capacity: 45 GB / 83.5 MB ≈ 538 requests.
    3. **Conclusion & Interpretation:**
       - **Result: INT4 quantization is strictly required to reach >500 requests.** (Memory-Capacity Bound)
