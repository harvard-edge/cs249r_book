title: Evaluating Ring Attention vs FlashAttention for 128K Context
scenario: 'Your team is deploying a 70B model with 128K context on 8x H100 (NVLink 900 GB/s bisection).
  Option A: FlashAttention-2 on each GPU with sequence parallelism (Ulysses). Option B: Ring Attention
  across 8 GPUs. Compare communication volume, peak per-GPU memory, and latency.'
details:
  realistic_solution: 'KV cache for 128K context per head: 128K x 128 x 2B = 32MB. With 64 KV heads, full
    KV = 2 x 32MB x 64 = 4GB per layer. Ring Attention: each GPU holds 128K/8 = 16K tokens. In each ring
    step, a GPU sends its K,V block to the neighbor: 4GB/8 = 512MB per step x 7 steps = 3.5GB per layer
    communicated. With NVLink at 900 GB/s, ring step transfer: 512MB / 900 = 0.57ms. Compute per step
    (FlashAttention on 16K x 16K): ~0.8ms. Communication is overlapped with compute. Ulysses (all-to-all):
    same 3.5GB volume but requires all-to-all, harder to overlap. Ring Attention wins for long context
    due to natural overlap.'
  common_mistake: Thinking Ring Attention eliminates all communication. It shifts communication to overlap
    with compute, but total bytes transferred are the same — the advantage is hiding latency, not reducing
    volume.
  napkin_math: 'KV per ring step: 512MB. NVLink transfer: 0.57ms. Compute per step: ~0.8ms. Comm/compute
    ratio: 0.71 — communication fully hidden. Total ring overhead: ~0ms effective latency addition.'
