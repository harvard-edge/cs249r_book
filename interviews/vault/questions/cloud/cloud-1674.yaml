title: Paged KV Cache Capacity Calculation
scenario: You are serving a 7B parameter LLM on an 80GB A100 GPU. The model weights and framework take
  20GB, leaving 60GB for the KV cache. The KV cache requires 128 KB per token. The system currently uses
  static allocation, reserving the maximum sequence length of 8192 tokens for every incoming request to
  prevent OOMs. Production telemetry shows the average request length (prompt + generated tokens) is only
  1024 tokens. If you implement paged memory management with a block size of 16 tokens, calculate the
  expected increase in concurrent request capacity.
details:
  realistic_solution: Calculate the capacity based on average sequence length rather than max sequence
    length. Paged memory allocates blocks dynamically, allowing the system to serve requests up to the
    physical memory limit based on actual usage.
  common_mistake: Calculating memory savings based purely on eliminating external fragmentation while
    ignoring that static allocation wastes memory by reserving the max sequence length upfront for every
    request.
  napkin_math: 'Static allocation per req: 8192 tokens * 128 KB = 1024 MB (1 GB). Max static concurrency:
    60 GB / 1 GB = 60 requests. Paged allocation per avg req: 1024 tokens * 128 KB = 128 MB. Max paged
    concurrency: 60 GB / 128 MB = 480 requests. Capacity increase = 480 / 60 = 8x.'
