title: Die-to-Die Link Latency vs NVLink Comparison
scenario: An engineer argues that MI300X's intra-package Infinity Fabric is equivalent to NVLink 4.0 between H100s for collective communication.
question: Is MI300X intra-package Infinity Fabric equivalent to NVLink 4.0 for collectives, quantitatively?
details:
  realistic_solution: 'Infinity Fabric is on-package (~50-100ns), whereas NVLink 4.0 is inter-chip (~1-2µs). For small messages, MI300X latency is vastly superior. For large messages, they are bandwidth-equivalent.'
  common_mistake: |
    **The Pitfall:** Comparing peak bandwidth numbers without accounting for latency.
    **The Rationale:** Engineers assume matching bandwidth guarantees identical performance, ignoring the sub-100ns on-package latency of Infinity Fabric versus ~1-2µs for chip-to-chip NVLink.
    **The Consequence:** Inaccurate performance modeling for small-message collectives where latency dominates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X (intra-package): sub-100ns base latency, ~896 GB/s bandwidth.
       - H100 NVLink 4.0 (inter-chip): 1-2µs base latency, 900 GB/s bandwidth.
    2. **Calculations:**
       - Small message latency: MI300X (8-XCD) ≈ 0.5µs vs H100 NVLink ≈ 8µs. MI300X is ~16x faster.
       - Large message (10 GB) transfer time:
         - MI300X: 10 GB / 896 GB/s = ~11.1 ms.
         - NVLink: 10 GB / 900 GB/s = ~11.1 ms.
    3. **Conclusion & Interpretation:**
       **Result: 16x Faster for Small Messages (Latency-Bound).** While bandwidth is equivalent for massive transfers, the MI300X is far superior for small-message collectives due to extreme package locality.
