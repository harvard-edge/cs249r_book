title: 'Realizing Carbon-Aware Scheduling: When to Shift GPU Workloads'
scenario: An ML Ops team runs large batch training jobs on H100 clusters in two regions: US-West (grid intensity ~200 gCO₂/kWh) and US-East (~350 gCO₂/kWh). A 70B model pre-training run requires 7 days on 512 GPUs.
question: How should carbon-aware scheduling route the 7-day, 512-GPU H100 training job between US-West and US-East, and what grid-signal infrastructure is needed?
details:
  realistic_solution: 'Carbon-aware scheduling has two axes: temporal (run during low-intensity hours, e.g., midday solar surplus in California) and spatial (route to lower-intensity region). For a 7-day job: California''s grid intensity drops to ~80 gCO₂/kWh during peak solar hours (11am–3pm) vs. 250 gCO₂/kWh overnight. If data is already in US-West, run there and schedule job start at solar peak. Use the Carbon Aware SDK or WattTime API for real-time marginal emissions data. Integrate with Kubernetes via a custom scheduler plugin or KEDA scaler that checks the carbon intensity forecast before approving new job submissions. For flexible batch jobs, set a `carbon_budget` annotation and the scheduler defers launch until intensity is below threshold.'
  common_mistake: |
    **The Pitfall:** Treating carbon-aware scheduling strictly as a time-shifting problem within a single region.
    **The Rationale:** It's simpler to delay a job locally than to handle cross-region orchestration.
    **The Consequence:** Missing massive carbon reduction opportunities (spatial shifting) and ignoring the "data gravity" carbon cost of moving datasets.
  napkin_math: |
    - **Energy Usage**: 512 GPUs × 700 W = 358.4 kW. 7 days = 168 hr. Total = 60,211 kWh.
    - **US-East Carbon**: 60,211 × 350 g = ~21,074 kg CO₂.
    - **US-West Peak Solar Carbon**: 60,211 × 80 g (midday drop) = ~4,817 kg CO₂.
    - **Carbon Savings**: ~16.2 tonnes CO₂ (equivalent to ~35,000 miles of driving).
