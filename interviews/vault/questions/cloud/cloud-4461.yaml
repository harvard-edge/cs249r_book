title: Disaggregated Serving Tail Latency Root Cause Framework
scenario: A disaggregated serving system P99 TTFT is 800ms, P50 is 120ms. The engineering
  team has checked GPU utilization (70%), queue depth (low), and network bandwidth
  (40% utilized). Nothing obvious is wrong. Provide a systematic diagnostic framework.
question: How would you systematically diagnose P99 TTFT of 800ms when P50 is 120ms
  and utilization, queues, and bandwidth look normal?
details:
  realistic_solution: 'Tail latency diagnostic framework for disaggregated serving:
    (1) Decompose TTFT into phases: time in prefill queue + prefill compute + KV transfer
    + decode queue wait. Use distributed tracing (OpenTelemetry) to get per-phase
    latencies. P99 of each phase: is one phase responsible for most P99 TTFT? (2)
    Check software overhead: Python GIL jitter in vLLM scheduler can add 5-50ms per
    scheduling cycle. Profile scheduler with py-spy: is scheduler holding GIL during
    token generation? (3) GPU kernel launch latency: CUDA context switches between
    prefill and decode batches can add 1-5ms. Check with Nsight Systems. (4) TCP/gRPC
    timeout and retry: if decode node sends back-pressure via gRPC stream, the client
    might have a 100ms retry timer. Check gRPC retry logs. (5) Memory allocation jitter:
    cudaMalloc is slow and non-deterministic. Is P99 correlated with memory allocation
    events? Use pre-allocated memory pools. (6) OS scheduler interference: Python
    process scheduled off-CPU during batch formation. Use SCHED_FIFO for serving threads
    on dedicated cores.'
  common_mistake: Focusing on average utilization metrics when diagnosing tail latency.
    P99 is determined by rare worst-case events, not average behavior. Low average
    utilization does not preclude tail latency from queue bursts, garbage collection
    pauses, or OS jitter.
  napkin_math: 'P99/P50 ratio: 800ms/120ms = 6.67x. This is high — for a well-tuned
    system, P99/P50 < 3x. Sources of 6.67x tail: (a) GIL jitter: 50ms at P99 vs 2ms
    avg = 25x amplification. Probability of GIL jitter at P99: 1% of requests. (b)
    Memory allocation: cudaMalloc at P99: 200ms vs <1ms typical. (c) Cross-rack network
    retransmit: InfiniBand packet drop at P99 adds 100ms retransmit timer. Likely
    cause: combination of GIL jitter + cudaMalloc. Fix: use torch.cuda.memory.caching_allocator_alloc,
    increase PyTorch memory pool, async scheduler to avoid GIL blocking.'
