title: Cloud Megatron Parallelism L3 0
scenario: You are training an 80-layer model (hidden dim 8192) with Megatron TP=8 on 8 GPUs. The micro-batch size is 4, sequence length is 2048, and NVLink bandwidth is 450 GB/s.
question: What is the all-reduce communication volume and NVLink transfer time added by TP=8 per training step?
details:
  realistic_solution: 'Per Transformer block: 2 all-reduces (1 FFN + 1 attention) in forward, 2 in backward = 4 all-reduces total. Each all-reduce transfers an activation tensor: batch × seq_len × hidden_dim × 2 bytes. Assume seq_len = 2048. Volume per all-reduce: 4 × 2048 × 8192 × 2 = 128 MB. But ring all-reduce sends 2×(N-1)/N × data ≈ 2 × 128 MB = 256 MB per all-reduce. Per block: 4 × 256 MB = 1,024 MB. 80 layers: 80 × 1,024 MB = 80 GB. NVLink time: 80 GB / 450 GB/s = 0.178 seconds. With overlap of compute and communication, effective overhead is much smaller.'
  common_mistake: |
    **The Pitfall:** Forgetting to count the backward pass all-reduces.
    **The Rationale:** Candidates often only trace the forward pass data flow.
    **The Consequence:** The estimated communication volume is off by exactly a factor of 2, leading to incorrect latency projections.
  napkin_math: |
    1. **Data per tensor:** 4 (batch) × 2048 (seq) × 8192 (dim) × 2 bytes (FP16) = 134.2 MB.
    2. **Ring All-Reduce overhead:** ~2 × 128 MB = 256 MB per all-reduce.
    3. **All-reduces per layer:** 2 in forward (Attention, FFN) + 2 in backward = 4 ARs/layer.
    4. **Total ARs:** 4 × 80 layers = 320 all-reduces.
    5. **Total Volume:** 320 × 256 MB = 81,920 MB = 80 GB.
    6. **Transfer Time:** 80 GB / 450 GB/s ≈ 0.178 seconds (178 ms).
    **Conclusion:** TP=8 adds 80 GB of communication volume taking ~178 ms per step.
