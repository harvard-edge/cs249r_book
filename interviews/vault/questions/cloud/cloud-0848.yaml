title: Sizing Multi-Region Active-Active LLM Inference
scenario: You are deploying an LLM endpoint serving Llama-3-70B in an active-active architecture across two geographical regions. Global peak traffic is 120 requests per second. A single node can serve 4 requests per second under optimal batching.
question: How many total nodes are needed across two regions for zero-downtime failover, and what is normal peak utilization?
details:
  realistic_solution: In a 2-region active-active setup requiring full failover capability, each region must be sized to independently handle the entire global peak load. Therefore, you need 30 nodes per region, totaling 60 nodes, operating at 50% utilization during normal peak traffic.
  common_mistake: |
    **The Pitfall:** Calculating the total nodes needed for the global peak and splitting them evenly across both regions.
    **The Rationale:** Candidates fail to understand the fundamental capacity requirement of a strict active-active failover design, assuming both regions sum to 100%.
    **The Consequence:** A 100% capacity shortfall during a single region failure, leading to immediate cascading failure and severe downtime globally.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global peak load: 120 RPS. Node capacity: 4 RPS.
    - Architecture: 2-region active-active with full failover capability.

    **Calculations:**
    - Total capacity needed per region = 120 / 4 = 30 nodes.
    - Total nodes across both regions = 30 * 2 = 60 nodes.
    - Normal traffic per region = 60 RPS.
    - Normal utilization = 60 / (30 * 4) = 50%.

    **Conclusion & Interpretation:**
    - **Result: 60 nodes at 50% utilization (Capacity-Bound)**. 60 nodes are required, operating at 50% peak utilization during normal conditions.
