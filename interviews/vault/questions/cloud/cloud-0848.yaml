title: Sizing Multi-Region Active-Active LLM Inference
scenario: You are deploying an LLM endpoint serving Llama-3-70B in an active-active architecture across
  two geographical regions. Your global peak traffic is 120 requests per second. A single 8xA100 node
  can serve 4 requests per second under optimal batching without violating the P99 latency SLA. To tolerate
  a complete single region failure with zero downtime and no latency degradation, how many total 8xA100
  nodes must be provisioned across both regions, and what is their peak utilization during normal operations?
details:
  realistic_solution: In a 2-region active-active setup requiring full failover capability, each region
    must be sized to independently handle the entire global peak load. Therefore, you need 30 nodes per
    region, totaling 60 nodes, operating at 50% utilization during normal peak traffic.
  common_mistake: Calculating the total nodes needed for global peak (30 nodes) and splitting them evenly
    across both regions (15 per region), which would lead to a 100% capacity shortfall and severe latency
    degradation if one region fails.
  napkin_math: 'Global peak load = 120 RPS

    Node capacity = 4 RPS / node

    Total required capacity = 120 / 4 = 30 nodes

    Active-active (2 regions, tolerate 1 failure): Each region must support 100% of traffic.

    Nodes per region = 30 nodes

    Total nodes = 30 * 2 = 60 nodes

    Normal operation traffic per region = 120 / 2 = 60 RPS

    Normal peak utilization = 60 RPS / (30 nodes * 4 RPS/node) = 50%'
