title: Realize automated NAS-style width and depth search for EfficientNet-style backbone
scenario: 'Your team needs a custom EfficientNet-style backbone for a proprietary dataset (3M images,
  500 classes) with hard constraints: <1 GFLOPs, >82% top-1, deployable on A100 within 1ms at batch=64.
  Using 8× H100s and a 5-day search budget, realize a once-for-all NAS pipeline to find the optimal architecture.'
question: "How would you realize a once-for-all NAS pipeline under the 5-day, 8×H100 budget, and what is the per-epoch time for a 300-epoch schedule?"
details:
  realistic_solution: 22,500 total seconds / 300 epochs = 75 seconds/epoch = 1.25 minutes/epoch (not 22,500s/epoch).
  common_mistake: Running full NAS with differentiable architecture search (DARTS) on the full dataset,
    which takes weeks; or using random search without a supernet, which requires training each candidate
    from scratch.
  napkin_math: 'Training schedule: total_time = 22,500 seconds for 300 epochs. Per epoch = 22,500 / 300
    = 75 seconds = 1.25 minutes (not 22,500 seconds per epoch which would be 6.25 hours per epoch).'
