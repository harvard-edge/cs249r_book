title: MoE Dropless (dMoE) Token Processing Guarantee
scenario: Standard MoE architectures drop tokens that exceed an expert's capacity buffer. The 'dropless
  MoE' (dMoE) approach from Megablocks eliminates token dropping entirely. Explain the mechanism and its
  memory implications on H100 GPUs.
question: "How does dropless MoE eliminate token dropping, and what are the memory implications on H100 GPUs?"
details:
  realistic_solution: 'Traditional MoE pads expert inputs to a fixed capacity (CF × tokens/num_experts),
    wasting memory on padding and dropping overflow tokens. dMoE (Megablocks) reformulates expert computation
    as block-sparse matrix multiplications. Instead of dispatching tokens to fixed-size expert buffers,
    it creates a single sparse matrix where each block corresponds to an expert''s assigned tokens. The
    sparse matmul processes all tokens without padding or dropping. Memory implications: (1) No padding
    waste — saves CF overhead (typically 25-50% of expert buffer). (2) Variable-length expert inputs use
    exactly the memory needed. (3) Requires block-sparse matmul kernels (Triton-based) that achieve ~90%
    of dense matmul throughput on H100 Tensor Cores. (4) Peak memory depends on actual routing distribution,
    not worst-case capacity factor. On H100 with Hopper architecture, the block-sparse matmuls leverage
    the TMA (Tensor Memory Accelerator) for efficient irregular memory access patterns.'
  common_mistake: Assuming dropless means each expert has an unlimited buffer. dMoE uses sparse matrix
    operations to process variable numbers of tokens per expert without padding or dropping.
  napkin_math: 'Traditional MoE with CF=1.25: buffer per expert = 1.25 × B/E tokens. If E=8, B=1024: buffer
    = 160 tokens per expert, total = 1280 token-slots for 1024 tokens (25% waste). dMoE: exactly 1024
    token-slots, 0% waste. Memory savings: 20% of expert activation memory.'
