title: H100 Data Loading Pipeline Creation
scenario: 'An H100 requires 5000 images/sec to saturate its tensor cores. Images are stored as 150KB JPEGs on NVMe drives.'
question: 'Design the data pipeline throughput requirements for storage read, CPU decoding, and PCIe Gen5 transfer to prevent GPU starvation.'
visual:
  kind: svg
  path: cloud-4518.svg
  alt: Horizontal bar chart showing throughput jumps from Storage to CPU to PCIe to GPU.
  caption: H100 Computer Vision Pipeline Bandwidth Stages.
details:
  realistic_solution: 'At 5000 img/sec and 150KB/img, storage must read at least 750 MB/s. CPU threads must decode 5000 JPEGs/sec into raw FP16 tensors (e.g., 3x224x224x2 = 301KB per tensor). The PCIe Gen5 x16 bus must then transfer 5000 * 301KB = 1.5 GB/s. Memory pinning is required to achieve this PCIe throughput without page fault overhead.'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth based on the compressed JPEG size.
    **The Rationale:** Candidates look at the storage size (150KB) and assume this is the data payload traversing the PCIe bus to the GPU.
    **The Consequence:** They massively underestimate the PCIe bandwidth requirements, failing to account for the uncompressed tensor size crossing the bus after CPU decoding.
  napkin_math: |
    * **Target rate:** 5000 images/sec.
    * **Raw tensor size (FP16):** 3 channels * 224 * 224 * 2 bytes = ~301 KB per tensor.
    * **PCIe transfer requirement:** 5000 * 301 KB = 1,505,000 KB/s.
    * **Final throughput:** **~1.5 GB/s PCIe transfer required.**
