title: Training Memory Footprint Breakdown
scenario: You are comparing the VRAM requirements of serving a model versus training the identical architecture.
question: "Why does training require 4-8x more memory than inference, and what are the major memory consumers in a training step?"
details:
  realistic_solution: 'During inference, you store only weights + activations for the current layer. During training, memory is consumed by: (1) Model weights — same as inference (2 bytes/param FP16). (2) Gradients — same size as weights (2 bytes/param). (3) Optimizer states — Adam stores momentum + variance in FP32 = 8 bytes/param. (4) Activations — saved for backward pass across ALL layers simultaneously, often the largest consumer for large batch sizes. For mixed-precision training with Adam: 2 (FP16 weights) + 2 (FP16 gradients) + 4 (FP32 master weights) + 4 (momentum) + 4 (variance) = 16 bytes/param, which is 8x the 2 bytes/param for FP16 inference weights alone.'
  common_mistake: |
    **The Pitfall:** Forgetting optimizer states when calculating memory footprint.
    **The Rationale:** Adam alone requires 12 extra bytes/param (FP32 master weights + momentum + variance) beyond the FP16 working copies.
    **The Consequence:** Severely underestimating training memory requirements, leading to OOM errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 1B parameters.
       - Inference precision: FP16 (2 bytes/param).
       - Training optimizer: Adam (mixed-precision).
    2. **Calculations:**
       - Inference footprint: 1B * 2 bytes = 2 GB.
       - Training weights & gradients: (2 + 2) bytes/param = 4 GB.
       - Adam optimizer states: 12 bytes/param = 12 GB.
       - Total training state: 4 GB + 12 GB = 16 GB (plus activations).
       - Ratio: 16 GB / 2 GB = 8x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Training**. Training requires over 8x more memory than inference due to gradients and the massive Adam optimizer state footprint.
