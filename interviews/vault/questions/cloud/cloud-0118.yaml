title: The P99 Latency Explosion
scenario: You are the tech lead for a new AI code completion service running on H100 GPUs. The business
  requires a P99 Time-to-First-Token (TTFT) of less than 250ms to feel 'real-time'. Your service receives
  requests at a steady rate of 20 RPS. Your team implements a standard static batching strategy with a
  maximum batch size of 16. Monitoring shows that while average TTFT is a healthy 110ms, the P99 TTFT
  is spiking to over 900ms, violating the SLO. Your GPU utilization is high but not at 100% saturation.
  Applying queueing theory, diagnose the most likely cause of this high tail latency.
question: "What is the most likely queueing cause of P99 TTFT exceeding 900ms with 20 RPS and static batching of 16?"
details:
  realistic_solution: The primary cause is **Head-of-Line Blocking** inherent to static batching. In this
    system, an unlucky request arriving just after a batch has been dispatched must wait for the *entire
    next batch* to be collected before it can be processed. This collection time, not the GPU processing
    time, dominates the end-to-end latency for these tail-end requests. The solution is to move to a continuous
    batching (also called dynamic batching or iteration-level batching) scheduler. This allows new requests
    to be added to the currently running batch on-the-fly, decoupling the queue wait time from the batch
    formation time and dramatically reducing P99 latency.
  common_mistake: Engineers often blame the hardware (e.g., 'the GPU isn't fast enough') or the model
    itself. While a slow model increases service time, the massive gap between average and P99 latency
    points to a systemic issue in the serving *strategy*, not just the raw processing speed. Increasing
    the batch size would be a common but incorrect reaction, as it would actually make the P99 latency
    even worse.
  napkin_math: 1. **Characterize the workload:** The arrival rate (λ) is 20 RPS, so the average time between
    requests is 1 / 20s = 50ms.
  options:
  - The batch size is too small, resulting in inefficient, low-throughput GPU kernels.
  - The H100 GPU is not powerful enough to handle 20 RPS, causing a persistent backlog of requests.
  - Head-of-line blocking from the static batching strategy is creating extreme queueing delays for some
    requests.
  - The network connection to the NVMe drives used for swapping KV-cache is saturated.
  correct_index: 2
