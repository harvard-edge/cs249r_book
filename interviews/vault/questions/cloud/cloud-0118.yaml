title: The P99 Latency Explosion
scenario: You are the tech lead for a new AI code completion service running on H100 GPUs. The business requires a P99 Time-to-First-Token (TTFT) of less than 250ms to feel 'real-time'. Your service receives requests at a steady rate of 20 RPS, with occasional micro-bursts. Your team implements a standard static batching strategy with a maximum batch size of 16. Monitoring shows that while median TTFT is a healthy 110ms, the P99 TTFT is spiking to over 900ms, violating the SLO. Your GPU utilization is high but not at 100% saturation. Applying queueing theory, diagnose the most likely cause of this high tail latency.
question: "What is the most likely queueing cause of P99 TTFT exceeding 900ms with 20 RPS and static batching of 16?"
details:
  realistic_solution: The primary cause is **Head-of-Line Blocking** inherent to static batching. In this system, an unlucky request arriving just after a long batch has started processing on the GPU must wait for the *entire current batch's generation* to complete before its own batch can be processed. This execution time, not just the queue collection time, dominates the end-to-end latency for these tail-end requests. The solution is to move to a continuous batching (also called dynamic batching or iteration-level batching) scheduler. This allows new requests to be added to the currently running batch on-the-fly, decoupling the queue wait time from the long batch execution time and dramatically reducing P99 latency.
  common_mistake: Engineers often blame the hardware (e.g., 'the GPU isn't fast enough') or the model itself. While a slow model increases service time, the massive gap between median and P99 latency points to a systemic issue in the serving *strategy*, not just the raw processing speed. Increasing the batch size would be a common but incorrect reaction, as it would make the Head-of-Line blocking even worse.
  napkin_math: 'With static batching, if a full batch of 16 takes ~800ms to generate all its output tokens, the GPU is locked for 800ms. An unlucky request arriving 1ms after this batch starts processing must wait 799ms just for the GPU to become available. Add its own prefill compute (~100ms), and its TTFT easily exceeds 900ms. The median TTFT is low (~110ms) because most requests arrive when the GPU is idle or wait only briefly behind short batches, but P99 is dominated by this massive Head-of-Line blocking from long-running static batches. Continuous batching processes iteration-by-iteration, dropping the wait time to just the time of a single token generation step (e.g., ~15ms).'
  options:
  - The batch size is too small, resulting in inefficient, low-throughput GPU kernels.
  - The H100 GPU is not powerful enough to handle 20 RPS, causing a persistent backlog of requests.
  - Head-of-line blocking from the static batching strategy is creating extreme queueing delays for some requests.
  - The network connection to the NVMe drives used for swapping KV-cache is saturated.
  correct_index: 2
