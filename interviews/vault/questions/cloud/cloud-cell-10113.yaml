title: Recall EfficientNet compound scaling constraints and baseline architecture
scenario: Your team is onboarding a new research engineer. They ask what distinguishes EfficientNet's
  scaling strategy from simply making a model wider or deeper. Explain the compound scaling constraint
  α·β²·γ²≈2 and what each coefficient controls, referencing EfficientNet-B0 as the baseline (5.3M params,
  0.39 GFLOPs, 224×224 input).
question: "How does EfficientNet compound scaling differ from simply widening or deepening B0, and how do α, β, γ satisfy α·β²·γ²≈2?"
details:
  realistic_solution: '1.75² = 3.0625 (not 2.07 which is 1.44²). Corrected compound scaling: 1.46² × 3.06
    × 1.2⁴ ≈ 13.5×.'
  common_mistake: Misidentifying which coefficient controls which dimension, or stating the constraint
    as α·β·γ=2 (linear) instead of α·β²·γ²≈2 (accounting for the quadratic scaling of FLOPs with resolution
    and width²).
  napkin_math: 'Scaling law exponents: 1.75² = 3.0625 ≈ 3.06 (not 2.07 — 2.07 ≈ 1.44²). Combined scaling:
    1.46² × 3.06 × 1.2⁴ = 2.1316 × 3.06 × 2.0736 = 2.1316 × 3.06 × 2.0736 = 2.1316 × 6.345 = 13.52 ≈ 13.5×.
    Constraint: 2^φ where φ = log₂(13.5) ≈ 3.75.'
