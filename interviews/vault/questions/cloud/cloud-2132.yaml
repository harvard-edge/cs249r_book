title: The Embedding Lookup Bottleneck
scenario: Your DLRM recommendation model spends 80% of inference time on embedding table lookups but only
  5% of total FLOPs. The GPU compute utilization is 12%. A junior engineer suggests upgrading to a GPU
  with 2× more TFLOPS. Will this help?
details:
  realistic_solution: 'No. Embedding lookups are memory-bandwidth-bound, not compute-bound. Each lookup
    is a sparse gather: read a 128-dim × 4-byte row = 512 bytes from a random location in HBM. With millions
    of lookups per batch, the access pattern is essentially random, defeating HBM''s sequential bandwidth
    advantage. A GPU with 2× TFLOPS but the same HBM bandwidth will see at most a 1.25× speedup (Amdahl''s
    Law: $1/(0.8 + 0.2/2) = 1.11\times$). The real fixes: (1) reduce embedding dimension, (2) use mixed-dimension
    embeddings (important features get 128-dim, unimportant get 16-dim), (3) use quantized INT8 embeddings
    (2× bandwidth efficiency), (4) cache hot embeddings in L2/SRAM.'
  common_mistake: Throwing more compute at a memory-bandwidth-bound problem. If 80% of time is embedding
    lookups (random memory access), 2× compute helps only the 20% that is compute.
  napkin_math: 'Amdahl''s Law: speedup = $1/(0.8 + 0.2/2) = 1/(0.9) = 1.11\times$. Upgrading 2× compute
    yields only 11% improvement. Switching from FP32 to INT8 embeddings: 4× less memory per lookup, effective
    4× bandwidth for the 80% bottleneck: $1/(0.8/4 + 0.2) = 1/(0.4) = 2.5\times$ speedup.'
