title: Pipeline Bubble Analysis for 4-Stage Pipeline Parallelism on H100
scenario: A 70B model is split across 4 pipeline stages (20 layers each) on 4 H100
  nodes. Each stage processes one micro-batch in 50ms (forward) + 50ms (backward).
  With 4 micro-batches (1F1B schedule), calculate pipeline bubble fraction and effective
  GPU utilization.
question: What pipeline bubble fraction and GPU utilization result from 4 stages and
  4 micro-batches with 50ms forward plus 50ms backward per stage?
details:
  realistic_solution: 'GPipe schedule: pipeline fill time = (p-1) = 3 stages × 100ms/stage
    = 300ms bubble. Total time for m=4 micro-batches: (m+p-1)×stage_time = 7×100ms
    = 700ms. Bubble fraction: 300ms/700ms = 42.9%. 1F1B schedule: bubble = (p-1)×2×stage_time
    / (m×2×stage_time + (p-1)×2×stage_time) = (3×2×100) / (4×2×100 + 3×2×100) = 600
    / (800+600) = 600/1400 = 42.9%. Same formula! Bubble fraction = (p-1)/(m+p-1)
    regardless of schedule. With m=4, p=4: (4-1)/(4+4-1) = 3/7 = 42.9%. To get <10%
    bubble: m = 9×(p-1) = 9×3 = 27 micro-batches. With m=27: bubble = 3/29 = 10.3%.
    More micro-batches reduces bubble but increases memory for in-flight activations.'
  common_mistake: Calculating bubble fraction for the naive GPipe schedule instead
    of the 1F1B (one-forward-one-backward) schedule, which significantly reduces bubble
    time.
  napkin_math: 'Bubble fraction = (p-1)/(m+p-1). m=4, p=4: 3/7 = 42.9%. For 10% bubble:
    m = 9p-9 = 27. For 5%: m = 19p-19 = 57. Memory: each in-flight micro-batch stores
    activations for stages not yet completed. 27 micro-batches × 20 layers × activation
    per layer — high memory overhead.'
