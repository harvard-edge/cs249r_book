title: Double Buffering for Data Loading Overlap with GPU Compute
scenario: Your training loop on a single GPU spends 15ms per batch on GPU computation but 20ms waiting for the next batch to transfer from CPU to GPU. The GPU is idle 57% of the time.
question: How would you use double buffering to hide the 20 ms CPU-to-GPU transfer behind the 15 ms GPU compute?
details:
  realistic_solution: Double buffering allocates two pinned memory buffers (A and B). While the GPU computes on batch N (from buffer A), asynchronously transfer batch N+1 from CPU to GPU (into buffer B) on a separate CUDA stream. Use non_blocking=True in tensor.to(device) and PyTorch DataLoader with pin_memory=True.
  common_mistake: |
    **The Pitfall:** Using a single pinned memory buffer and synchronous host-to-device transfers.
    **The Rationale:** It's the default behavior in basic PyTorch dataloaders without explicit async configuration.
    **The Consequence:** Transfer and compute are fully serialized, resulting in massive GPU idle time and extended training duration.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU compute time per batch: 15ms.
    - CPU-to-GPU transfer time per batch: 20ms.

    **Calculations:**
    - Serial execution time = 15ms + 20ms = 35ms.
    - Overlapped (double buffered) execution time = max(15ms, 20ms) = 20ms.
    - Speedup = 35ms / 20ms = 1.75x.

    **Conclusion & Interpretation:**
    - **Result: Transfer-Bound.** Double buffering effectively hides the compute latency, achieving a 1.75x throughput speedup by running transfers asynchronously.
