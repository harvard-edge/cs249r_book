title: Operating Point on the Queueing Hockey-Stick
scenario: >-
  Your inference service has a single replica's measured capacity μ = 1{,}000
  QPS (so service time 1/μ = 1 ms). Current arrival rate λ = 950 QPS, giving
  utilization ρ = 0.95. The diagram shows the M/M/1 mean and a P99 proxy
  (mean × ln 100) over utilization, with a SLO line at 50 ms. Pager is firing.
question: "Using the curve, what utilization brings P99 latency under the 50 ms SLO, and how does the math justify the steepness of the response curve as ρ approaches 1?"
visual:
  kind: matplotlib
  source: cloud-2847.py
  rendered: cloud-2847.svg
  alt: >-
    Two curves of latency versus utilization rho from 0 to 1. The lower
    blue curve labeled 'mean latency M/M/1' rises slowly, then sharply
    near rho equals 0.9. The upper red curve labeled 'P99 latency proxy'
    rises faster and crosses an orange dashed SLO line at 50 ms; a vertical
    dotted red line marks the critical utilization rho-star where the
    crossing occurs.
  caption: M/M/1 latency-vs-utilization, with a P99 proxy and a 50 ms SLO line.
details:
  realistic_solution: >-
    The M/M/1 mean response time is W = (1/μ) / (1 − ρ). For a 1 ms service
    time, W = 1 / (1 − ρ) ms. P99 under exponential service is roughly W ×
    ln 100 ≈ 4.6 W. Setting P99 ≤ 50 ms: 4.6 / (1 − ρ) ≤ 50 → (1 − ρ) ≥
    0.092 → ρ ≤ 0.91. So load needs to come down from 950 QPS to ≈ 910 QPS
    (or capacity needs to come up). The curve's steepness near ρ = 1 is the
    1/(1 − ρ) singularity: at ρ = 0.95 the multiplier on service time is
    20×; at ρ = 0.99 it is 100×. Tail-latency SLOs cannot be defended by
    capacity alone past about ρ = 0.85; admission control or autoscaling
    must intervene.
  common_mistake: >-
    Believing that "95% utilization means 5% headroom for tail" — the
    queueing equation is non-linear, so the last 5% of utilization carries
    most of the latency cost. Or: planning capacity against mean latency
    only, ignoring that P99 grows roughly an order of magnitude faster.
  napkin_math: >-
    W = (1/μ) / (1 − ρ); for ρ = 0.95, W = 20 ms mean and ≈ 92 ms P99 proxy
    — already over a 50 ms SLO. To hit P99 ≤ 50 ms with 1 ms service: solve
    4.6/(1−ρ) ≤ 50 → ρ ≤ 0.91, i.e. ≤ 910 QPS at this capacity.
