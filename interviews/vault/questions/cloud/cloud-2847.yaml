title: Operating Point on the Queueing Hockey-Stick
scenario: Your inference service has a single replica's measured capacity of 1,000 QPS (service time 1 ms). Current arrival rate is 950 QPS, resulting in a utilization of 0.95. A P99 latency SLO of 50 ms is currently being violated.
question: Using the M/M/1 queueing model, what utilization brings P99 latency under the 50 ms SLO, and why does latency spike as utilization approaches 1?
visual:
  kind: svg
  path: cloud-2847.svg
  alt: Two curves of latency versus utilization rho from 0 to 1. The lower blue curve labeled 'mean latency M/M/1' rises slowly, then sharply near rho equals 0.9. The upper red curve labeled 'P99 latency proxy' rises faster and crosses an orange dashed SLO line at 50 ms; a vertical dotted red line marks the critical utilization rho-star where the crossing occurs.
  caption: M/M/1 latency-vs-utilization, with a P99 proxy and a 50 ms SLO line.
details:
  realistic_solution: 'The M/M/1 mean response time is W = (1/μ) / (1 − ρ). For a 1 ms service time, W = 1 / (1 − ρ) ms. P99 under exponential service is roughly W × ln 100 ≈ 4.6 W. Setting P99 ≤ 50 ms: 4.6 / (1 − ρ) ≤ 50 → (1 − ρ) ≥ 0.092 → ρ ≤ 0.91. So load needs to come down from 950 QPS to ≈ 910 QPS (or capacity needs to come up). The curve''s steepness near ρ = 1 is the 1/(1 − ρ) singularity: at ρ = 0.95 the multiplier on service time is 20×; at ρ = 0.99 it is 100×. Tail-latency SLOs cannot be defended by capacity alone past about ρ = 0.85; admission control or autoscaling must intervene.'
  common_mistake: |
    **The Pitfall:** Planning capacity against mean latency and assuming a linear relationship.
    **The Rationale:** Engineers intuitively think "95% utilization means 5% headroom," ignoring the non-linear asymptote of the queueing equation.
    **The Consequence:** Running systems far too hot, resulting in catastrophic tail-latency spikes that breach SLAs despite average performance looking acceptable.
  napkin_math: |
    1. Mean response time for M/M/1 is W = (1/μ) / (1 - ρ).
    2. For a 1 ms service time (1/μ = 1), W = 1 / (1 - ρ) ms.
    3. P99 proxy under exponential service is W × ln(100) ≈ 4.6 × W.
    4. Set P99 ≤ 50 ms: 4.6 / (1 - ρ) ≤ 50.
    5. Solve for ρ: (1 - ρ) ≥ 4.6 / 50 = 0.092.
    6. ρ ≤ 0.908 (or 91%).
    7. **Load needs to be reduced from 950 QPS to ~910 QPS to meet the 50 ms P99 SLO.**
