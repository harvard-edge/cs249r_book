title: Optimizing Checkpointing for Large Scale LLM Training on H100 Clusters
scenario: You are training a multi-trillion parameter LLM on a distributed cluster
  utilizing 1000 NVIDIA H100 GPUs. Each H100 boasts 80 GB HBM3 memory and 3.35 TB/s
  memory bandwidth. The training job is expected to run for several weeks. Due to
  the scale, transient failures (e.g., node reboots, network issues) and preemptions
  are common. Design a checkpointing strategy that minimizes the total training time,
  considering both the cost of checkpointing and the cost of recomputing after a failure
  or preemption. Discuss how the H100's memory and bandwidth characteristics influence
  your choice of checkpointing frequency and method. Specifically, analyze how different
  checkpointing approaches (e.g., full model states, optimizer states, gradient accumulation
  snapshots) affect recovery time and overall system reliability.
question: How would you choose checkpoint frequency, contents, and method for a weeks-long
  1000-H100 LLM training run with frequent failures?
details:
  realistic_solution: Implement an adaptive checkpointing strategy based on the observed
    Mean Time Between Failures (MTBF) and the Young-Daly formula. Leverage asynchronous
    checkpointing to offload checkpoint writing to dedicated I/O nodes or background
    processes, minimizing impact on forward/backward passes. Store both model weights
    and optimizer states. Given the H100's 80 GB HBM3, explore techniques like ZeRO-offload
    or sharded optimizer states to reduce checkpoint size. Utilize the 3.35 TB/s bandwidth
    for fast in-GPU memory operations to aggregate data before writing. For preemption
    recovery, prioritize fast restart by having readily available recent checkpoints
    on a high-throughput storage system.
  common_mistake: A common mistake is using a fixed, overly frequent checkpointing
    interval without considering the storage I/O bottleneck or the actual failure
    rate, leading to significant overhead that outweighs the benefit of faster recovery.
    Another mistake is storing only model weights, neglecting optimizer states, which
    results in much longer recovery times due to re-warming the optimizer.
  napkin_math: "Assume an effective model size (weights + optimizer states) of 500\
    \ GB for a single GPU partition. If a checkpoint takes 30 seconds to write (I/O\
    \ bound) and the MTBF is 12 hours (43200 seconds):\nOptimal checkpointing interval\
    \ (Young-Daly formula): sqrt(2 * C * T_MTBF) = sqrt(2 * 30s * 43200s) = sqrt(2,592,000)\
    \ ≈ 1610 seconds, or approximately 27 minutes. \nIf recovery from a failure takes\
    \ 1 hour (3600s) without checkpointing, but 5 minutes (300s) with a checkpoint,\
    \ the time savings per failure is 3300 seconds."
