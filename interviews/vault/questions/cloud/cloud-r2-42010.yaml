title: Queueing Theory Applied to GPU Batch Scheduling
scenario: Your H100 inference server batches requests every 20ms to maximize throughput. At 200 req/s,
  the average batch size is 4 requests. Using M/D/1 queueing, calculate the expected waiting time and
  explain why increasing batch wait time to 50ms (average batch = 10) actually improves P99 latency despite
  higher queueing delay.
question: "Using M/D/1, what is the expected wait at 20ms batching, and why can a 50ms batch window improve P99 despite more queueing?"
details:
  realistic_solution: 'M/D/1 queue with 20ms batch window: avg wait = 10ms (half the window). Per-request
    compute at batch=4: decode takes 12ms per token (weights loaded once for 4 requests). Total = 10ms
    wait + 12ms compute = 22ms per request. With 50ms window: avg wait = 25ms. Per-request compute at
    batch=10: weights loaded once for 10 requests, decode = 5ms per token (memory bandwidth amortized).
    Total = 25ms + 5ms = 30ms average but P99 improves because: (1) larger batches have lower variance
    in compute time, (2) GPU utilization increases from 30% to 75%, reducing queueing from bursty arrivals.
    Optimal window: ~35ms, balancing wait time against amortization.'
  common_mistake: Assuming larger batches always increase latency. While queueing delay increases, the
    per-request compute cost decreases because weight loads are amortized across more requests. There
    is an optimal batch window that minimizes total latency.
  napkin_math: 'Batch=4, window=20ms: wait=10ms, compute=12ms, total=22ms. P99 dominated by queue buildup
    under bursts: ~80ms. Batch=10, window=50ms: wait=25ms, compute=5ms, total=30ms. P99: queue is more
    predictable, ~55ms. GPU util: batch=4 → 4×12ms/20ms = 2.4x parallelism, batch=10 → 10×5ms/50ms = 1x
    per cycle but higher MBU.'
