title: NVIDIA A100 Operator Scheduling for LLM Inference
scenario: You are deploying an LLM for real-time inference on NVIDIA A100 GPUs. The LLM's architecture involves several layers with varying computational intensity and memory access patterns. You must design an operator scheduling strategy that optimizes execution order, enabling layer fusion and memory reuse.
question: How would you schedule operators and handle dynamic batching on A100 GPUs to minimize latency and maximize throughput for LLM inference?
details:
  realistic_solution: 'A realistic solution uses static analysis to build a dependency graph, identifying potential fusions (e.g., fusing element-wise operations). At runtime, prioritize memory reuse by scheduling producers and consumers close together, use asynchronous streams for parallel execution of independent subgraphs (like attention heads), and dynamically adjust batch sizes to maximize compute without exceeding the 2.0 TB/s bandwidth.'
  common_mistake: |
    **The Pitfall:** Prioritizing parallel execution indiscriminately without considering data dependencies or memory locality.
    **The Rationale:** Engineers assume maximizing simultaneous kernel execution always maximizes throughput.
    **The Consequence:** Excessive HBM2e bandwidth saturation or thrashing, creating massive memory bottlenecks that completely stall the GPU's compute cores.
  napkin_math: |
    1. A typical FP16 operation requires 2 bytes per operand.
    2. If an operation reads 10GB and writes 10GB, it moves 20GB of data.
    3. At 2.0 TB/s bandwidth, this data transfer takes: $20\text{GB} / 2.0\text{ TB/s} = 10\text{ms}$.
    4. A 100 TFLOPS compute workload takes: $100\text{e}12 / 312\text{e}12 \approx 320\text{ms}$.
    5. For smaller activations, memory bandwidth rapidly becomes the bottleneck. Fusing two sequential operations avoids an entire round-trip to HBM.
    6. **Fusion saves the memory read/write overhead, delivering significant speedups.**
