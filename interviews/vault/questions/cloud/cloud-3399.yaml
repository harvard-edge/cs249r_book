title: NVIDIA A100 Operator Scheduling for LLM Inference
scenario: You are deploying an LLM for real-time inference. The LLM's architecture involves several layers with varying computational intensity and memory access patterns. You must design an operator scheduling strategy that optimizes execution order, enabling layer fusion and memory reuse.
question: How would you schedule operators and handle dynamic batching on GPUs to minimize latency and maximize throughput for LLM inference?
details:
  realistic_solution: 'A realistic solution uses static analysis to build a dependency graph, identifying potential fusions (e.g., fusing element-wise operations). At runtime, prioritize memory reuse by scheduling producers and consumers close together, use asynchronous streams for parallel execution of independent subgraphs (like attention heads), and dynamically adjust batch sizes to maximize compute without exceeding the bandwidth.'
  common_mistake: |
    **The Pitfall:** Prioritizing parallel execution indiscriminately without considering data dependencies or memory locality.
    **The Rationale:** Engineers assume maximizing simultaneous kernel execution always maximizes throughput.
    **The Consequence:** Excessive memory bandwidth saturation or thrashing, creating massive memory bottlenecks that completely stall the GPU's compute cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware memory bandwidth: 2.0 TB/s.
       - FP16 operand size: 2 bytes.
       - Compute capability: 312 TFLOPS.
    2. **Calculations:**
       - Operation reading 10GB and writing 10GB moves 20GB total.
       - Transfer time at 2.0 TB/s = 20GB / 2.0 TB/s = 10ms.
       - 100 TFLOPS compute workload takes = 100e12 / 312e12 = 320ms.
       - For smaller activations, memory bandwidth rapidly becomes the bottleneck. Fusing two sequential operations avoids an entire round-trip to memory.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Fusion saves the memory read/write overhead, delivering significant speedups by alleviating bandwidth saturation.
