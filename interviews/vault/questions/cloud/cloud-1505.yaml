title: Diagnosing Global Inference Latency Bottlenecks
scenario: A financial ML system requires an end-to-end inference latency of under 50ms. The model is deployed
  on A100 GPUs in a centralized AWS us-east-1 (Virginia) region. Users in ap-northeast-1 (Tokyo) are reporting
  latencies consistently above 130ms, despite logs showing the actual model inference time is only 8ms.
  The network team verifies bandwidth is fully provisioned. A product manager asks you to analyze the
  bottleneck and optimize the PyTorch model using TensorRT to hit the 50ms SLA.
details:
  realistic_solution: 'Recognize the ''Light Barrier'' constraint. Optimizing compute from 8ms to 2ms
    won''t solve the issue. The only viable solution requires an architectural change: replicating the
    model deployment to edge regions (e.g., Tokyo) geographically closer to the end users.'
  common_mistake: Focusing on model optimization techniques like quantization or TensorRT compilation
    to reduce compute time, ignoring the fundamental physical limits of network propagation delay.
  napkin_math: Distance (Virginia to Tokyo) ≈ 11,000 km. Speed of light in fiber ≈ 200,000 km/s. Minimum
    1-way delay = 11,000 km / 200,000 km/s = 55ms. Minimum Round-Trip Time (RTT) = 110ms. Absolute minimum
    latency = 110ms (network) + 8ms (compute) = 118ms. 118ms is physically incapable of meeting the 50ms
    SLA.
