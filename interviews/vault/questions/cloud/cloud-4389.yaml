title: Power Distribution Unit Over-Subscription in GPU Clusters
scenario: 'You are commissioning a new H100 training cluster. The datacenter vendor offers PDUs rated at 30 kW continuous and 36 kW peak (20% oversubscription for 10-second bursts). Your deployment uses 3x 8xH100 nodes per rack, each node rated at 8 kW TDP. A cluster benchmarking team reports that during the first minute of large-model training, all GPUs ramp from idle to full TDP simultaneously.'
question: 'Can a 30 kW continuous, 36 kW peak PDU handle three 8 kW H100 nodes ramping simultaneously, and what soft-start policy should you use?'
details:
  realistic_solution: 'Steady state: 3 × 8 kW = 24 kW, well within 30 kW continuous. But simultaneous power-on inrush: each node can spike to ~12 kW for 200ms (1.5× TDP). Three nodes simultaneously: 3 × 12 kW = 36 kW = exactly the PDU peak limit, with zero margin. Risk: any additional overhead (networking, CPUs ramping) tips the PDU over. Soft-start policy: stagger job launch across nodes with 5-second delays. In SLURM, use --begin with per-node stagger or implement a prolog script that delays GPU power-on by node_rank × 5s. Reduces simultaneous peak to max 2 nodes = 24 kW inrush, leaving 12 kW headroom.'
  common_mistake: |
    **The Pitfall:** Assuming the PDU peak rating is perfectly safe for a simultaneous all-node power ramp.
    **The Rationale:** Engineers look at the steady-state 24 kW and assume the 36 kW peak handles all transients without issue.
    **The Consequence:** The simultaneous inrush current when GPU voltage regulators switch on causes the PDU to trip, shutting down the entire rack at the start of every training job.
  napkin_math: |
    **Assumptions & Constraints:**
    - PDU rated at 30 kW continuous, 36 kW peak.
    - 3 nodes * 8 kW = 24 kW steady state.
    - Inrush spike = 1.5x TDP = 12 kW per node.

    **Calculations:**
    - Simultaneous inrush spike: 3 * 12 kW = 36 kW = 100% of 36 kW PDU peak.
    - With staggered start (5s delay): max 1 node inrush + 2 steady-state = 12 + 16 = 28 kW.

    **Conclusion & Interpretation:**
    - **Result: 28 kW Peak (Safe Staggered Soft-Start)**. Staggering nodes reduces the peak to 28 kW (93% of continuous, 78% of peak), preventing PDU shutdown.
