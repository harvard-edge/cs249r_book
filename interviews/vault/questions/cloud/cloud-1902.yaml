title: Evaluating Storage Bottlenecks for Millions of Tiny Images
scenario: 'A computer vision team is training a Vision Transformer on a cluster of 8x 8-GPU A100 nodes. The dataset consists of 50 million 50KB JPEG images stored natively in a Lustre parallel file system. The GPUs are severely bottlenecked at 15% utilization. Monitoring shows the storage backend network is at only 5% capacity, but the Lustre Metadata Server (MDS) CPU is pegged at 100%. The team is debating three options: 1) Upgrade the storage network to 400Gbps NDR InfiniBand, 2) Add more Object Storage Server (OSS) NVMe nodes, or 3) Pack the images into WebDataset (tar) formats.'
question: Which option should the team choose to fix 15% GPU utilization, and why is it better than storage hardware upgrades?
details:
  realistic_solution: Reject hardware upgrades. Pack the 50KB images into ~500MB WebDataset shards (10,000 images/shard). This converts 10,000 random metadata operations into a single sequential read, instantly resolving the MDS bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is storage bandwidth or drive IOPS, and choosing to scale out hardware.
    **The Rationale:** Low GPU utilization with network capacity implies the storage backend is too slow to deliver data.
    **The Consequence:** Wasting budget on 400Gbps NDR InfiniBand or NVMe nodes when the actual failure point is the Metadata Server (MDS) collapsing under millions of tiny file lookups.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 64 GPUs processing 1,000 img/sec.
       - MDS limit: ~30K ops/sec.
       - WebDataset sharding: 10,000 imgs/shard.
       - Network limit: 100Gbps.
    2. **Calculations:**
       - Target Throughput: 64 * 1,000 = 64,000 img/sec.
       - Native Metadata Load: 64,000 file open/stat ops/sec (exceeds 30K limit).
       - Sharded Load: 64,000 / 10,000 = 6.4 ops/sec.
       - Bandwidth: 64,000 * 50KB = 3.2 GB/s (easily fits in 100Gbps).
    3. **Conclusion & Interpretation:** **Result: Metadata-IOPS-Bound.** The bottleneck is entirely metadata IOPS, not raw bandwidth, which sharding fixes immediately.
