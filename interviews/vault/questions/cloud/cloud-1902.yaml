title: Evaluating Storage Bottlenecks for Millions of Tiny Images
scenario: 'A computer vision team is training a Vision Transformer on a cluster of 8x 8-GPU A100 nodes.
  The dataset consists of 50 million 50KB JPEG images stored natively in a Lustre parallel file system.
  The GPUs are severely bottlenecked at 15% utilization. Monitoring shows the storage backend network
  is at only 5% capacity, but the Lustre Metadata Server (MDS) CPU is pegged at 100%. The team is debating
  three options: 1) Upgrade the storage network to 400Gbps NDR InfiniBand, 2) Add more Object Storage
  Server (OSS) NVMe nodes, or 3) Pack the images into WebDataset (tar) formats. Evaluate these options
  and justify the optimal design decision quantitatively.'
details:
  realistic_solution: Reject hardware upgrades. Pack the 50KB images into ~500MB WebDataset shards (10,000
    images/shard). This converts 10,000 random metadata operations into a single sequential read, instantly
    resolving the MDS bottleneck.
  common_mistake: Assuming the bottleneck is storage bandwidth or drive IOPS, and thus choosing to scale
    out hardware (network or OSS nodes) rather than recognizing the metadata server collapse.
  napkin_math: 'Target throughput: 64 GPUs * 1,000 img/sec = 64,000 img/sec. As native files, this requires
    64,000 file open/stat ops/sec, exceeding a standard MDS limit of ~30K ops/sec. Sharding (10k imgs/shard)
    drops metadata ops to 6.4 ops/sec, shifting the limit purely to bandwidth: 64,000 * 50KB = 3.2 GB/s,
    which the existing network can easily handle.'
