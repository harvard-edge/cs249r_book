title: Online Learning Staleness and Embedding Drift
scenario: 'Your recommendation model does online learning: embedding tables are updated every 10 minutes
  using the last batch of user interactions. Product team reports CTR dropping 15% during major events
  (product launches, viral moments) that last 30-60 minutes. The model updates within 10 minutes, but
  the degradation persists. Diagnose why 10-minute update frequency is insufficient for this failure mode.'
question: "Why is a 10-minute online embedding update cadence insufficient during 30–60 minute viral events despite the model updating on time?"
details:
  realistic_solution: 'During a product launch or viral event: (1) New items appear with no historical
    embeddings — they are assigned random or zero initialization. The model has no signal for new item
    IDs → systematically under-ranks them. (2) New users (event-driven signups) also have cold-start embeddings.
    (3) Existing item embeddings become stale: the distribution of how users interact with items shifts
    rapidly (e.g., a viral post gets 1000× more views than its historical embedding was trained on). 10-minute
    updates help for items that existed before the event, but new item/user IDs are never in the update
    batch until they have sufficient interaction data. Fix: (1) Cold-start fallback: for items with <N
    impressions, use content-based features (text/image embeddings) instead of learned ID embeddings.
    (2) Reduce new-item embedding initialization latency: on item creation, immediately compute a content
    embedding and use it as the initial embedding value. (3) For viral items: trigger immediate retraining
    of that item''s embedding row when impression velocity exceeds a threshold (e.g., 100 impressions
    in 5 minutes).'
  common_mistake: Blaming network latency or feature pipeline delays. The issue is cold-start for new
    items/users created during the event, not update frequency for existing items.
  napkin_math: 'Event duration: 60 minutes. New items created: 10,000 (product catalog update). Each with
    0 training examples at launch. 10-minute update batch: only items with ≥1 interaction in the last
    10 min get gradient updates. At launch, new items have ~0 impressions in first 10 min (not surfaced
    → not clicked → no data). Dead loop: cold items not surfaced → not trained → stay cold. CTR impact:
    10k cold items × 0% recall × 15% of impressions = 1.5% absolute CTR drop. Content embedding fallback:
    new items get content_sim score → shown → get clicks → join training data within 2 update cycles (20
    min).'
