title: 'Latency Decomposition: Compare Batched vs. Streaming Inference on H100'
scenario: 'You are comparing two serving strategies for a 13B-parameter model on a single H100. Strategy A batches 32 requests together; Strategy B streams each request individually with continuous batching. Prefill is 512 tokens, decode is 256 tokens.'
question: 'How do batched serving and individual continuous batching compare in end-to-end latency for 512-token prefill and 256-token decode?'
details:
  realistic_solution: 'Strategy A amortizes the massive memory bandwidth cost of loading the 13B weights across 32 requests, massively improving token throughput. However, because autoregressive decoding is inherently memory-bandwidth-bound, batching increases the absolute time to complete each decoding step. Strategy A delivers superior total system throughput, but Strategy B (continuous) yields significantly lower per-request tail latency.'
  common_mistake: |
    **The Pitfall:** Assuming batching always identically reduces latency.
    **The Rationale:** Candidates ignore that decoding is strictly memory-bandwidth-bound and that larger batches increase the per-step generation time.
    **The Consequence:** Optimizing exclusively for throughput while accidentally violating strict per-request latency SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 13B parameters (26GB in FP16).
       - Hardware: 3.35 TB/s bandwidth.
    2. **Calculations:**
       - Single-request decode step: 26GB / 3.35TB/s = ~7.8ms.
       - Batch-32 decode step: Same 26GB read, yielding 32 tokens in 7.8ms.
    3. **Conclusion & Interpretation:**
       - **Result: Batching maximizes throughput but increases the total time each request spends in the system (Bandwidth-Bound).**
