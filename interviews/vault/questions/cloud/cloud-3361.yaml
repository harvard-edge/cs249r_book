title: MoE Routing and H100 Capacity Planning for Large-Scale Inference
scenario: Your team is deploying a large Mixture of Experts (MoE) model for a latency-sensitive
  inference service. Each expert is a substantial transformer block. You have access
  to a cluster of NVIDIA H100 GPUs (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory
  bandwidth). The model requires 2 active experts per token, and each expert's weights
  consume 20GB of memory in FP16. You're observing tail latencies that are higher
  than expected, and you suspect it's related to expert load balancing and memory
  contention.
question: How would you reduce the MoE service's tail latency from expert load imbalance
  and HBM3 memory contention on H100s?
details:
  realistic_solution: Implement a dynamic routing strategy that considers not only
    expert load but also memory locality and available HBM3 bandwidth on each H100.
    This might involve an adaptive capacity factor, pre-fetching expert weights to
    HBM3 based on predicted routing, or using a hierarchical expert placement strategy.
    Consider using techniques like expert parallelism for larger experts that exceed
    single GPU memory, or exploring offloading less frequently used expert weights
    to system memory if latency allows, carefully balancing the HBM3 bandwidth (3.35
    TB/s) and compute (989 TFLOPS FP16).
  common_mistake: Ignoring the dynamic nature of expert activation and simply distributing
    experts evenly across devices, leading to hot-spotting and memory thrashing when
    certain experts are disproportionately activated, especially without considering
    the HBM3 bandwidth limitations.
  napkin_math: If an H100 has 80 GB HBM3 and each expert is 20GB (FP16), an H100 can
    theoretically host 4 experts. However, with 2 active experts per token, and considering
    dynamic routing, if a single H100 receives tokens that frequently activate 3 or
    more distinct experts within a short window, you'll encounter significant HBM3
    bandwidth contention and memory swapping. For example, moving 20GB of weights
    from off-HBM3 to HBM3 (assuming it's cached elsewhere) would take 20GB / 3.35
    TB/s = ~6ms. If this happens frequently for multiple tokens, it will severely
    impact latency. The 989 TFLOPS FP16 dense compute will be underutilized if data
    movement is the bottleneck. The key is to manage memory and data movement effectively
    to keep the experts resident on HBM3 to leverage the high compute capabilities.
