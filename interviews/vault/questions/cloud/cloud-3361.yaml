title: MoE Routing and H100 Capacity Planning for Large-Scale Inference
scenario: Your team is deploying a large Mixture of Experts (MoE) model for a latency-sensitive inference service on a cluster of H100 GPUs. The model requires 2 active experts per token, and each expert's weights consume 20GB of memory in FP16. You're observing tail latencies that are higher than expected due to expert load imbalance and memory contention.
question: How would you reduce the MoE service's tail latency from expert load imbalance and HBM3 memory contention on H100s?
details:
  realistic_solution: Implement a dynamic routing strategy that considers not only expert load but also memory locality and available HBM3 bandwidth on each H100. This might involve an adaptive capacity factor, pre-fetching expert weights to HBM3 based on predicted routing, or using a hierarchical expert placement strategy. Consider using techniques like expert parallelism for larger experts that exceed single GPU memory, or exploring offloading less frequently used expert weights to system memory if latency allows, carefully balancing the HBM3 bandwidth (3.35 TB/s) and compute (989 TFLOPS FP16).
  common_mistake: |
    **The Pitfall:** Simply distributing experts evenly across devices without considering dynamic activation.
    **The Rationale:** Candidates treat MoE routing like static data parallelism, ignoring that certain tokens disproportionately activate specific experts.
    **The Consequence:** Leads to hot-spotting and severe memory thrashing, crippling latency due to HBM bandwidth contention.
  napkin_math: |
    - Expert size: 20GB (FP16). H100 capacity: 80GB HBM3 (can host ~3-4 experts max).
    - Active routing: 2 experts per token.
    - Worst-case cache miss: Moving 20GB of weights to HBM3 takes 20GB / 3.35 TB/s = ~6ms.
    - Tail latency impact: If multiple tokens cause cache misses simultaneously, 6ms per miss compounds quickly.
    - **Conclusion: Data movement becomes the bottleneck, leaving the 989 TFLOPS FP16 compute severely underutilized.**
