math_issues:
- In the napkin_math, the intermediate step `32 * 134M * 2` is mathematically incorrect. 8192^2 is approximately
  67M, so the substitution should be `32 * 67M * 2` (or `32 * 134M`). `32 * 134M * 2` would evaluate to
  8.58 GB, not the correct final result of 4.29 GB.
