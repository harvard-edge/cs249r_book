title: The Flash Attention Memory Cliff
scenario: You are serving a model with 32 attention heads and sequence length 8192 in FP16. Your colleague asks why standard attention runs out of memory but Flash Attention does not.
question: How much memory does standard attention need for the attention matrix versus Flash Attention's working memory?
details:
  realistic_solution: Standard attention materializes a full $N \times N$ matrix per head in HBM, which scales quadratically. Flash Attention tiles the computation in SRAM and never writes the full matrix to HBM, reducing working memory significantly and avoiding the OOM cliff.
  common_mistake: |
    **The Pitfall:** Believing Flash Attention is purely a computation speedup trick.
    **The Rationale:** Candidates often focus on the "Flash" naming and ignore that the primary bottleneck in standard attention is memory bandwidth and capacity.
    **The Consequence:** Engineers fail to apply tiling concepts to other memory-bound custom kernels because they misunderstand the root cause of the optimization.
  napkin_math: |
    1. **Standard Attention:** $32 \text{ heads} \times 8192 \times 8192 \text{ tokens} \times 2 \text{ bytes}$.
    2. **Standard Calculation:** $32 \times 67,108,864 \times 2 = \mathbf{4.29 \text{ GB}}$.
    3. **Flash Attention:** Working memory is roughly bounded by tile sizes: $32 \times 8192 \times 128 \times 2 \times 3 \text{ (Q,K,V tiles)} \approx \mathbf{0.20 \text{ GB}}$.
    4. **Memory Reduction:** $4.29 / 0.20 \approx \mathbf{21\times \text{ reduction}}$.
