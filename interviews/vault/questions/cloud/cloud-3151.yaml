title: FlashAttention Backward Pass Memory Savings for Training
scenario: 'You are training a 13B model on 8 GPUs with seq_len=8192, micro_batch=2, 40 layers, 40 heads, head_dim=128. Standard attention stores the full N x N attention matrix for the backward pass.'
question: 'How much activation memory does FlashAttention save by recomputing attention for seq_len=8192, and does it enable a larger batch size?'
details:
  realistic_solution: 'Standard attention stores the massive S = softmax(QK^T) matrix per layer, requiring ~400GB total across 40 layers—impossible on an 8-GPU setup. FlashAttention-2 stores only the output O and softmax statistics (log-sum-exp), requiring merely ~25GB total. This massive 375GB savings enables doubling the batch size. Recomputation adds ~33% more FLOPs to the backward pass, but because attention is highly memory-bandwidth-bound, the net training time overhead is merely 5-7%.'
  common_mistake: |
    **The Pitfall:** Thinking FlashAttention's recomputation slows training significantly.
    **The Rationale:** Candidates assume recomputation is heavily compute-bound, ignoring that attention is extremely memory-bandwidth-bound, so recomputing on-chip is fast.
    **The Consequence:** Avoiding FlashAttention or larger batch sizes out of an unfounded fear of recomputation latency overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - seq_len=8192, batch=2, 40 heads, 40 layers.
    - Precision: FP16 (2 bytes).

    **Calculations:**
    - Standard memory: 8192^2 * 2B * 40 heads * 2 batch = 10GB/layer * 40 layers = 400GB.
    - FlashAttention memory: stores Q,K,V,O + stats = ~643MB/layer * 40 layers = ~25GB.
    - Savings: 400GB - 25GB = 375GB.

    **Conclusion & Interpretation:**
    - **Result: A 375GB savings enables doubling the batch size with a trivial 5-7% compute overhead (Memory-Bound).**
