title: The Batching Tipping Point
scenario: An engineering team is optimizing a BERT-Large (340M parameters) model for FP16 inference on an H100 GPU. For a single input sequence, the forward pass requires approximately 25 GFLOPs and reads 750 MB of data (weights, KV cache, activations).
question: What is the batch-1 arithmetic intensity, and how does increasing batch size shift the workload from memory-bound to compute-bound?
details:
  realistic_solution: The workload shifts from being memory-bound to compute-bound. At batch size 1, the Arithmetic Intensity is low, bottlenecked by the time it takes to read data from HBM. By increasing the batch size, the total FLOPs increase linearly, but the total memory read does not. The large weight matrix is read once, and only the per-input activation data scales with the batch. This reuse of weights drastically increases the ratio of compute to memory access (the AI), pushing the workload over the GPU's ridge point and into the compute-bound regime. By becoming compute-bound, the GPU can utilize its Tensor Cores more effectively, leading to higher achieved TOPS and better overall energy efficiency (TOPS/W).
  common_mistake: |
    **The Pitfall:** Assuming that all memory access scales linearly with batch size.
    **The Rationale:** If you double the inputs, you intuitively expect to double the memory read.
    **The Consequence:** Forgetting that the model's weights are read only once per kernel launch, leading to the incorrect conclusion that Arithmetic Intensity remains constant and the workload cannot become compute-bound.
  napkin_math: |
    1. Hardware Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.
    2. Batch-1 Arithmetic Intensity (AI): 25 GFLOPs / 750 MB = 33.3 FLOPs/byte.
    3. Analysis: Since 33.3 < 295, the batch size 1 workload is severely memory-bandwidth bound.
    4. **Scaling: To become compute-bound, we must increase the batch size by roughly 9x (295 / 33) so that weight reuse pushes AI past the ridge point.**
  options:
  - The workload remains memory-bound because Arithmetic Intensity is constant; both compute and memory scale linearly.
  - The workload is compute-bound at batch 1 and just becomes more compute-bound at batch 64.
  - The workload shifts from memory-bound to compute-bound as the AI increases from ~33 to ~310 Ops/Byte.
  - The workload becomes compute-bound, but its AI decreases because the memory grows faster than the compute.
  correct_index: 2
