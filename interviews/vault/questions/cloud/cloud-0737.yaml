title: The NVLink Domain Boundary
scenario: 'You are running tensor-parallel inference for a 70B model across 8 GPUs in a DGX. All-reduce latency is 15µs. Your team wants to scale to 16 GPUs by adding a second node. After connecting them via 400 Gbps InfiniBand, the all-reduce latency jumps to 150µs.'
question: 'What physical boundary did you cross?'
details:
  realistic_solution: 'You crossed the NVLink domain boundary. Within a single DGX node, GPUs communicate via NVSwitch, an ultra-low latency memory fabric. Scaling to 16 GPUs forces Tensor Parallelism (TP) collective operations to traverse the host NIC and InfiniBand switch. The software stack overhead (NCCL, RDMA, libibverbs) introduces a massive fixed latency penalty per hop. For TP, which requires blocking all-reduces every layer, this inter-node latency is catastrophic and breaks latency SLAs.'
  common_mistake: |
    **The Pitfall:** Blaming the InfiniBand bandwidth.
    **The Rationale:** Candidates see a 10x slowdown and assume the 400 Gbps network isn't fast enough, wanting to "tune the network" or buy faster switches.
    **The Consequence:** They fail to realize the issue is the fixed software stack latency (RDMA, NIC transversals) when leaving the NVLink domain, leading to wasted effort optimizing throughput when latency is the real bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Intra-node (NVLink) latency: ~1.5µs per hop. Bandwidth: 900 GB/s.
       * Inter-node (InfiniBand) latency overhead: ~100µs. Bandwidth: 50 GB/s.
       * 80 model layers requiring all-reduce.
    2. **Calculations:**
       * Intra-node: 2 MB / 900 GB/s + 1.5µs ≈ 4µs per layer.
       * Inter-node: 2 MB / 50 GB/s + 100µs ≈ 140µs per layer.
       * Total across 80 layers: Intra-node = 320µs. Inter-node = 11.2 ms.
    3. **Conclusion & Interpretation:**
       * **Result: The inter-node path is severely Latency-Bound, adding 35x more communication time and breaking scaling.**
