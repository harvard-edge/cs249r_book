title: The NVLink Domain Boundary
scenario: 'You are running tensor-parallel inference for a 70B model across 8 GPUs in a DGX H100. All-reduce latency is 15µs. Your team wants to scale to 16 GPUs by adding a second DGX node. After connecting them via 400 Gbps InfiniBand, the all-reduce latency jumps to 150µs — a 10x increase.'
question: 'What physical boundary did you cross?'
details:
  realistic_solution: 'You crossed the NVLink domain boundary. Inside a single DGX H100, 8 GPUs are connected via NVLink with 900 GB/s bisection bandwidth and ~1-2µs latency — the GPUs share a flat, switch-less memory fabric (NVSwitch). The moment you add a 9th GPU on a different node, communication must traverse: GPU → NVLink → NIC → InfiniBand switch → NIC → NVLink → GPU. Each hop adds latency. InfiniBand''s one-way latency is ~1-2µs per hop, but the full software stack (NCCL → libibverbs → RDMA → remote NCCL) adds 50-100µs of overhead. For tensor parallelism, which requires an all-reduce after every layer, this latency is catastrophic.'
  common_mistake: |
    **The Pitfall:** Blaming the InfiniBand bandwidth.
    **The Rationale:** Candidates see a 10x slowdown and assume the 400 Gbps network isn't fast enough, wanting to "tune the network" or buy faster switches.
    **The Consequence:** They fail to realize the issue is the fixed software stack latency (RDMA, NIC transversals) when leaving the NVLink domain, leading to wasted effort optimizing throughput when latency is the real bottleneck.
  napkin_math: |
    * **Intra-node (NVLink):** 2 MB / 900 GB/s + 1.5µs ≈ 4µs per layer.
    * **Inter-node (InfiniBand):** 2 MB / 50 GB/s + 100µs overhead ≈ 140µs per layer.
    * **Over 80 layers:** Intra-node total = 320µs. Inter-node total = 11.2 ms.
    * **Result:** The inter-node path adds **35x more communication time**, breaking tensor parallelism scaling.
