title: Go-Back-N Penalty in 800G RoCEv2 Fabrics
scenario: Your team is building a 4,096-GPU training cluster (H100s) using an 800 Gbps RoCEv2 Ethernet
  fabric. During 2GB AllReduce operations, microbursts induce a 0.1% packet drop rate. The networking
  vendor proposes using standard Go-Back-N (GBN) retransmission to simplify NIC hardware, arguing the
  drop rate is low enough. Evaluate the true bandwidth penalty of Go-Back-N at this scale compared to
  Selective Repeat, and justify whether to accept this vendor's NICs.
details:
  realistic_solution: Reject the vendor's GBN proposal. At 800 Gbps, the BDP is large enough that a single
    dropped packet forces the retransmission of hundreds of already-received packets. Selective Repeat
    (or advanced transports like SRD) must be used to only retransmit the single lost MTU, preserving
    fabric goodput.
  common_mistake: Assuming a low drop rate (0.1%) means retransmission overhead is negligible, without
    calculating the multiplicative penalty caused by the large Bandwidth-Delay Product (BDP) at 800 Gbps.
  napkin_math: 800 Gbps = 100 GB/s. With an RTT of 10µs, BDP = 100 GB/s * 10µs = 1MB. At an MTU of 4KB,
    the unacknowledged window is 250 packets. A 0.1% drop rate means 1 drop every 1000 packets (every
    4 RTTs). With GBN, each drop forces retransmitting up to 250 packets, wasting ~25% of total bandwidth
    and causing severe training latency jitter.
