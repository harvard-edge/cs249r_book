title: The Interactive Playground Dilemma
scenario: You are the tech lead for a new user-facing LLM playground running on H100s. The product manager
  wants to guarantee a Time-To-First-Token (TTFT) of under 200ms for a 70B parameter model to ensure a
  snappy user experience. The model is fully pre-loaded into HBM. For this analysis, you can ignore network
  latency between the user and the datacenter. Can you apply your systems knowledge to tell the PM if
  this is a feasible promise?
question: "Can you apply your systems knowledge to tell the PM if this is a feasible promise?"
details:
  realistic_solution: Yes, this is a feasible promise. For a pre-loaded model, the primary latency for
    the first token is the time it takes to complete a single forward pass. With a batch size of 1, this
    operation is memory-bound, not compute-bound. A simple way to estimate this is to calculate the time
    required to read the entire model's parameters from HBM. Since a 140GB model requires at least two
    80GB H100s (TP=2), each GPU reads 70GB in parallel. The H100's memory bandwidth is the limiting factor.
  common_mistake: Engineers often calculate TTFT using the model's FLOPs and the GPU's TFLOPS. This gives
    a deceptively small number (sub-millisecond) and ignores the fact that a single-token forward pass
    (prefill) for a batch size of 1 is entirely constrained by memory bandwidth, not compute.
  napkin_math: 1. **Model Size:** A 70B parameter model using FP16 precision requires 70B × 2 bytes/param
    = 140 GB of memory. This requires at least 2 H100s (80GB each) using Tensor Parallelism (TP=2). 2.
    **Memory Bandwidth:** With TP=2, each GPU reads 70 GB of its parameter shard in parallel. At 3.35
    TB/s, this takes 70 GB / 3.35 TB/s ≈ 21ms.
  options:
  - No, it's impossible. Loading the 140GB model from the NVMe SSD before every request will take several
    seconds.
  - Yes, it's feasible. The bottleneck is memory bandwidth, not compute. The time to stream the ~140GB
    model through two H100s in parallel (TP=2) at 3.35 TB/s is roughly 21ms, leaving ample room in the
    200ms budget.
  - No, it's not feasible. A 70B model requires ~140 TFLOPs per token, and the H100 can't compute this
    in under 200ms.
  - Yes, it's trivial. An H100 performs ~1 PetaFLOP, so the compute time is microseconds. The latency
    will be dominated by the ~5µs InfiniBand transfer, so it will be almost instant.
  correct_index: 1
