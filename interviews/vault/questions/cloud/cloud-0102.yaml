title: The Interactive Playground Dilemma
scenario: A product manager wants to guarantee a Time-To-First-Token (TTFT) of under 200ms for a 70B parameter LLM. The model is fully pre-loaded into HBM. You can ignore network latency.
question: Is a <200ms TTFT mathematically feasible for a 70B model, and what is the primary hardware bottleneck?
details:
  realistic_solution: Yes, this is a feasible promise. For a pre-loaded model, the primary latency for the first token is the time it takes to complete a single forward pass. With a batch size of 1, this operation is memory-bound, not compute-bound. A simple way to estimate this is to calculate the time required to read the entire model's parameters from HBM. Since a 140GB model requires at least two 80GB H100s (TP=2), each GPU reads 70GB in parallel. The H100's memory bandwidth is the limiting factor.
  common_mistake: |
    **The Pitfall:** Calculating TTFT using the model's FLOPs and the GPU's TFLOPS compute ceiling.
    **The Rationale:** Engineers default to compute bounds, ignoring that a single-token forward pass (batch size 1) is entirely constrained by memory bandwidth.
    **The Consequence:** Deceptively small (sub-millisecond) latency estimates that fail completely in production due to memory starvation.
  napkin_math: |
    1. **Model Size:** 70B params \u00d7 2 bytes (FP16) = 140 GB.
    2. **Hardware:** Requires at least two 80GB H100s (TP=2). Each GPU reads 70 GB.
    3. **Memory Bandwidth Limit:** H100 bandwidth is ~3.35 TB/s.
    4. **Prefill Latency:** 70 GB / 3.35 TB/s \u2248 21 ms.
    5. **Conclusion:** **Yes, it is feasible. Streaming the weights takes ~21ms, easily fitting the 200ms SLA.**
