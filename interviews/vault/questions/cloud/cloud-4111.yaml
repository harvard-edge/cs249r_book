title: MIG Partitioning for Inference Multiplexing
scenario: You have 4 A100-80GB GPUs and need to serve 12 different small models (each
  <7B parameters, ~14 GB in FP16). Using MIG, design a partitioning scheme that maximizes
  the number of concurrent model instances while ensuring performance isolation.
question: How would you partition 4 A100-80GB GPUs with MIG to run 12 concurrent <7B
  model instances with isolation?
details:
  realistic_solution: 'A100-80GB MIG profiles: 1g.10gb (1 SM partition, 10 GB), 2g.20gb
    (2 SMs, 20 GB), 3g.40gb (3 SMs, 40 GB), 7g.80gb (full GPU). For 7B models at 14
    GB FP16: need at least 2g.20gb instances (20 GB provides 14 GB for weights + 6
    GB for activations/KV cache). Each A100 can be split into: 3× 2g.20gb + 1× 1g.10gb
    (using 7 of 7 SM partitions, 70 of 80 GB). That gives 3 model slots per GPU ×
    4 GPUs = 12 slots — exactly matching the 12 models. The 1g.10gb partitions can
    serve smaller models (<3B) or run monitoring. Key benefits: (1) Hardware-level
    memory isolation — one model''s OOM cannot crash others, (2) SM partitioning guarantees
    compute throughput — no time-slicing jitter, (3) Each MIG instance gets its own
    CUDA context and L2 cache partition. Tradeoff: each 2g.20gb partition has only
    2/7 ≈ 28.6% of the GPU''s compute, so throughput per model is ~3.5× lower than
    having the full GPU.'
  common_mistake: 'Assuming MIG can create arbitrary partition sizes. A100 supports
    specific MIG profiles: 1g.10gb, 2g.20gb, 3g.40gb, 4g.40gb, 7g.80gb. You cannot
    create a 5g or 6g partition.'
  napkin_math: '4 GPUs × 3 MIG instances = 12 instances. Each gets 20 GB memory, ~28.6%
    compute. Without MIG: 4 models max (1 per GPU) or time-slicing with interference.'
