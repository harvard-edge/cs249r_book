title: Diagnosing SLO Violations from Batch Accumulation
scenario: >-
  A team deployed a 7B parameter LLM on an A100 GPU for a real-time chatbot. During training,
  they maximized throughput using a massive global batch size. In production, to maintain high throughput
  and GPU utilization, their inference server is configured to accumulate requests into a dynamic batch
  size of 128. The system easily processes the peak load of 80 requests per second (RPS), but the P99
  Time-To-First-Token (TTFT) latency is spiking to over 1.6 seconds, violating the strict 500ms SLO. CPU
  overhead and network transit are negligible.
question: >-
  Why is P99 TTFT spiking above 1.6 seconds at 80 RPS with dynamic batch size 128, despite sufficient GPU throughput?
details:
  realistic_solution: 'The root cause is queueing delay. At 80 RPS, waiting to fill a batch of 128 takes 1.6 seconds. The team must apply ''Serving Inversion'': drop the target batch size and enforce a strict timeout (e.g., 50ms max delay) for dynamic batching, sacrificing peak GPU utilization to meet the latency SLO.'
  common_mistake: |
    **The Pitfall:** Diagnosing model-level inefficiencies instead of serving mechanics.
    **The Rationale:** Candidates jump to suggesting quantization or FlashAttention, missing the massive queueing delay induced by prioritizing throughput over latency.
    **The Consequence:** Over-engineering model optimizations that fail to resolve the fundamental serving configuration bottleneck.
  napkin_math: |
    1. **Queueing Time:** Wait time = Target Batch Size / RPS.
    2. **Current delay:** 128 requests / 80 RPS = **1.6 seconds** wait time before compute even starts.
    3. **Budget calculation:** For a 50ms queueing budget at 80 RPS, max batch size = 80 × 0.05s = 4.
    4. **Result:** The target batch size must be reduced to 4 to meet the latency SLO.
