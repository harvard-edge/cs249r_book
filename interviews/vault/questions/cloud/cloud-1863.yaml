title: Diagnosing SLO Violations from Batch Accumulation
scenario: A team deployed a 7B parameter LLM on an A100 GPU for a real-time chatbot. During training,
  they maximized throughput using a massive global batch size. In production, to maintain high throughput
  and GPU utilization, their inference server is configured to accumulate requests into a dynamic batch
  size of 128. The system easily processes the peak load of 80 requests per second (RPS), but the P99
  Time-To-First-Token (TTFT) latency is spiking to over 1.6 seconds, violating the strict 500ms SLO. CPU
  overhead and network transit are negligible. Diagnose the root cause of these latency spikes.
details:
  realistic_solution: 'The root cause is queueing delay. At 80 RPS, waiting to fill a batch of 128 takes
    1.6 seconds. The team must apply ''Serving Inversion'': drop the target batch size and enforce a strict
    timeout (e.g., 50ms max delay) for dynamic batching, sacrificing peak GPU utilization to meet the
    latency SLO.'
  common_mistake: Candidates often jump to diagnosing model-level inefficiencies, suggesting quantization
    or FlashAttention, or assume the GPU compute is too slow, missing the massive queueing delay induced
    by prioritizing throughput over latency.
  napkin_math: 'Queueing Time = Target Batch Size / RPS. For 128 requests at 80 RPS: 128 / 80 = 1.6 seconds
    wait time. This violates the 500ms SLO before compute even starts. The max allowable batch size to
    meet a 50ms queueing budget is: 80 RPS * 0.05s = 4 requests per batch.'
