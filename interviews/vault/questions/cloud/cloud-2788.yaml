title: Strategies Against Divergent Scaling
scenario: 'Your company''s AI power consumption is growing 5x every 2 years while the grid cannot expand
  faster than 10% annually. In 4 years, your demand will exceed your contracted power. Options: (A) invest
  in on-site renewable generation + storage, (B) shift to algorithmic efficiency (MoE, sparsity, distillation
  to reduce compute per model), (C) build in a region with abundant power (e.g., Nordic hydro). Evaluate.'
details:
  realistic_solution: 'Option A (on-site renewables): Solar at ~5 acres/MW means 100 MW needs 500 acres.
    Battery storage for 24/7 operation at current costs: ~$200M for 400 MWh. Capital intensive, helps
    with carbon but does not solve the grid connection limitation for peak demand. Lead time: 2-3 years
    for permitting and construction. Option B (algorithmic efficiency): MoE models achieve similar quality
    at 2-4x less compute. Sparsity and distillation can reduce inference compute 10x. This directly bends
    the demand curve. A 4x algorithmic improvement buys 2 years of runway before hitting power limits
    again. Cheapest per FLOP saved. But there is a limit — algorithmic improvements are one-time gains,
    not exponential. Option C (power-abundant region): Nordic/Canadian hydro provides 100% renewable,
    abundant power. But requires new datacenter construction (18-24 months), latency for users far away,
    and data sovereignty concerns. Long-term sustainable but slow to execute. Recommendation: B is the
    immediate priority (highest ROI, fastest to deploy). C is the medium-term infrastructure strategy.
    A is complementary for carbon reduction but does not solve the power scaling problem alone.'
  common_mistake: Choosing only infrastructure solutions (A, C) without addressing the demand side (B).
    You cannot build power infrastructure faster than the exponential demand growth — algorithmic efficiency
    is the only approach that directly reduces the demand curve.
  napkin_math: 'B (algorithmic efficiency): 4x algorithmic efficiency = 2 years runway. New datacenter
    in power-abundant region: 18-24 months lead time. A (on-site solar 100MW): $300M+. B has best immediate
    ROI.'
