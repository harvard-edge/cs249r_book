title: Strategies Against Divergent Scaling
scenario: Your company's AI power consumption is growing 5x every 2 years while the grid cannot expand faster than 10% annually. In 4 years, your demand will exceed your contracted power.
question: How would you evaluate on-site renewables, algorithmic efficiency, and power-abundant regions for this power-scaling problem?
details:
  realistic_solution: 'Option A (on-site renewables): Solar at ~5 acres/MW means 100 MW needs 500 acres. Battery storage for 24/7 operation at current costs: ~$200M for 400 MWh. Capital intensive, helps with carbon but does not solve the grid connection limitation for peak demand. Lead time: 2-3 years for permitting and construction. Option B (algorithmic efficiency): MoE models achieve similar quality at 2-4x less compute. Sparsity and distillation can reduce inference compute 10x. This directly bends the demand curve. A 5x algorithmic improvement buys exactly 2 years of runway before hitting power limits again. Cheapest per FLOP saved. But there is a limit — algorithmic improvements are one-time gains, not exponential. Option C (power-abundant region): Nordic/Canadian hydro provides 100% renewable, abundant power. But requires new datacenter construction (18-24 months), latency for users far away, and data sovereignty concerns. Long-term sustainable but slow to execute. Recommendation: B is the immediate priority (highest ROI, fastest to deploy). C is the medium-term infrastructure strategy. A is complementary for carbon reduction but does not solve the power scaling problem alone.'
  common_mistake: |
    **The Pitfall:** Choosing only physical infrastructure solutions while ignoring algorithmic improvements.
    **The Rationale:** Candidates treat software architectures as static and immovable, concluding the only way out is building massive solar farms or migrating datacenters.
    **The Consequence:** The physical limitations of permitting and construction speed cannot match the exponential demand curve, guaranteeing the company hits the power wall long before the solar farm goes online.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power demand grows 5x every 2 years.

    **Calculations:**
    - Solar: 100 MW needs 500 acres, doesn't solve peak.
    - Datacenter move: Takes 18-24 months.
    - Algorithmic (MoE, sparsity): 5x efficiency gain buys 2 years runway.

    **Conclusion & Interpretation:**
    - **Result: Algorithmic efficiency shrinks the demand curve directly**. Highest immediate ROI.
