title: Mitigating Outliers with Robust Loss
scenario: Your team is training a robotics kinematics model on 64 A100 GPUs using FP16 mixed precision.
  The dataset contains 5% corrupted sensor readings acting as extreme outliers. When using standard Mean
  Squared Error (MSE) loss, an outlier with an error magnitude of 500 units produces a squared loss of
  250,000 and a gradient of 1,000. When accumulated across a global batch size of 4096, these outlier
  gradients frequently cause FP16 overflow (max value ~65,504), destabilizing the loss.
question: "How should you change the loss to prevent FP16 overflows from 5% extreme outliers without giving up mixed precision?"
details:
  realistic_solution: Apply a robust training objective like Huber Loss (Smooth L1 Loss) with a threshold
    parameter (delta=1.0). This modifies the loss function to be linear for errors larger than delta,
    strictly bounding the gradient magnitude.
  common_mistake: Falling back to pure FP32 training to avoid overflows (which halves tensor core throughput),
    or using aggressive post-hoc gradient clipping without fixing the underlying sensitivity of the quadratic
    loss landscape.
  napkin_math: MSE gradient for error e=500 is 2*e = 1000. With Huber loss (delta=1.0), the gradient for
    e > delta is clamped to exactly delta * sign(e) = 1.0. The outlier's gradient contribution drops from
    1000 to 1 (a 1000x reduction), ensuring the sum across the batch remains safely below the 65,504 FP16
    limit.
