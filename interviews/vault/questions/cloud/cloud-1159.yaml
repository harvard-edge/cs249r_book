title: Evaluating Overparameterization and Double Descent in Vision Models
scenario: Your ML team is training a custom vision model for medical anomaly detection on a cluster of
  8x NVIDIA A100 (80GB) GPUs using a dataset of 500,000 high-resolution labeled images across 100 classes.
  A baseline model with 10M parameters shows the test error initially dropping but then increasing as
  training loss approaches zero (classic overfitting). One engineer suggests applying heavy dropout and
  early stopping to keep the model small for your strict 50ms P99 inference latency budget on T4 GPUs.
  Another engineer proposes scaling the architecture aggressively to 150M parameters and training well
  past the point of zero training error. Evaluate these approaches. Under what conditions is the second
  approach theoretically justified, and how do you reconcile it with the strict deployment constraints?
details:
  realistic_solution: Scale to the 150M parameter model to enter the overparameterized regime (Double
    Descent), where SGD implicitly finds smoother interpolating functions that generalize better. To meet
    the 50ms P99 latency budget on T4 GPUs, apply post-training quantization (INT8) or distill the 150M
    model back into a smaller student model, rather than artificially constraining the capacity during
    the initial training phase.
  common_mistake: Assuming the classic U-shaped bias-variance curve holds indefinitely and that adding
    capacity beyond the interpolation threshold (where training error is zero) will permanently ruin generalization,
    completely missing the double descent phenomenon.
  napkin_math: 'Interpolation threshold roughly occurs when N_params ≈ N_samples * C. For 500k samples
    * 100 classes ≈ 50M params. At 10M (under-parameterized), it follows classic bias-variance. At ~50M,
    test error spikes (critical peak). At 150M (over-parameterized), test error drops again (second descent).
    Deployment: 150M params in FP32 = 600MB. Quantized to INT8 = 150MB, yielding higher accuracy than
    the 10M model while minimizing memory bandwidth pressure on the T4.'
