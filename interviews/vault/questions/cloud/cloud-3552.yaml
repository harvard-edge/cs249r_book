title: Optimizing Data Ingestion for H100-Powered Foundation Model Training
scenario: Your team is developing a large-scale multimodal foundation model that requires
  processing petabytes of sensor data for training. The training is performed on a
  cluster equipped with NVIDIA H100 GPUs, each boasting 80 GB of HBM3 memory with
  an aggregate bandwidth of 3.35 TB/s and 989 TFLOPS (FP16 dense) compute capability.
  Currently, the raw data is stored as plain JSON files in cloud object storage, and
  data loading is a significant bottleneck, causing H100 underutilization. The data
  scientists report that the H100s are spending more than 70% of their time waiting
  for data, drastically slowing down training iterations. Design a data storage and
  ingestion strategy to maximize H100 utilization, considering various storage formats,
  compression techniques, and cloud storage tiers.
question: How would you redesign JSON-based storage and ingestion so H100s no longer
  spend 70% of training time waiting for data?
details:
  realistic_solution: 'The solution involves migrating from plain JSON to a columnar
    storage format like Parquet or Apache ORC, which are optimized for read performance,
    compression, and predicate pushdown. For TensorFlow-specific pipelines, TFRecord
    could also be considered. Implement aggressive but intelligent compression (e.g.,
    Zstandard or Snappy) to reduce data transfer size, balancing CPU decompression
    overhead with network/disk I/O savings. The data should be partitioned strategically
    (e.g., by time, ID, or other relevant metadata) to allow training jobs to read
    only necessary subsets, reducing scan times. Consider a multi-tiered storage approach:
    ''hot'' training data that''s frequently accessed could reside on a higher-performance
    cloud storage tier or be pre-cached on local NVMe SSDs attached to the H100 instances,
    while ''cold'' historical data can remain on cheaper, archival object storage.
    Data streaming and asynchronous I/O should be leveraged to ensure continuous data
    flow to the H100''s HBM3 memory, minimizing idle cycles.'
  common_mistake: A common mistake is to overlook the H100's extreme memory bandwidth
    and compute capability, and thus underestimate the I/O requirements. Developers
    often stick to simple row-oriented formats (like CSV or plain JSON) that are inefficient
    for columnar analytics or large-scale machine learning, or they fail to choose
    appropriate compression codecs and data partitioning strategies. This leads to
    bottlenecking the H100, resulting in underutilized expensive hardware, even if
    the underlying cloud storage offers high throughput, as the data processing on
    the host side can still be a serial bottleneck.
  napkin_math: Given an H100's HBM3 bandwidth of 3.35 TB/s, if a training batch requires
    100GB of data, ideally it could be loaded in approximately 100GB / 3.35 TB/s ≈
    0.03 seconds. However, if the current JSON format and network bandwidth (e.g.,
    25 GB/s from object storage) limit effective data transfer to 5 GB/s without optimization,
    that same 100GB batch would take 100GB / 5 GB/s = 20 seconds. If a columnar format
    with 5x compression reduces the effective data size to 20GB and optimized I/O
    can sustain 20 GB/s, the loading time drops to 20GB / 20 GB/s = 1 second. This
    illustrates how I/O optimization directly translates to higher H100 utilization
    and faster training iterations, moving from 70% idle time (due to 20s load time
    for potentially 1s compute) to near 100% utilization (1s load time for 1s compute).
