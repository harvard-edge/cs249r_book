title: Continuous Batching and TPOT
scenario: An inference service for a 70B model runs on an H100 GPU using continuous batching. The system's measured time to generate one token for an entire batch (the 'token step') is ~20ms. The service has a strict Time Per Output Token (TPOT) SLO of 33ms. A new user request joins a batch that already contains 4 other active users.
question: What is the effective TPOT for the new user in the batch?
details:
  realistic_solution: The effective TPOT for any user in a continuous batch is simply the time it takes the system to complete a single token generation step for the entire batch. The power of this technique is that the step time is largely independent of the number of sequences (up to a point). Since the token step time is given as 20ms, the TPOT for the new user—and all other users in the batch—is 20ms. This is well within the 33ms SLO.
  common_mistake: |
    **The Pitfall:** Multiplying step time by batch size.
    **The Rationale:** Candidates confuse sequential processing with continuous batching, assuming each user adds 20ms of linear overhead.
    **The Consequence:** The candidate incorrectly calculates a 100ms TPOT and proposes unnecessary system changes to "fix" an SLA that isn't broken.
  napkin_math: |
    1. Token Step Time: 20ms.
    2. Continuous Batching Property: One token is generated for all sequences in the batch concurrently during a single forward pass.
    3. **Result: The effective TPOT remains 20ms regardless of the 5 users, satisfying the 33ms SLO.**
  options:
  - 100ms, because the 20ms step time is multiplied by the 5 users in the batch.
  - 4ms, because the 20ms step time is divided by the 5 users in the batch.
  - 20ms, because one token is generated for all users in a single step.
  - 33ms, because the system will throttle to match the SLO exactly.
