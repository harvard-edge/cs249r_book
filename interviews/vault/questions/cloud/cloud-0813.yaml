title: The Carbon-Neutral Training Scheduler
scenario: Your company has committed to carbon-neutral AI training by 2027. You run 500 training jobs per week across 3 data center regions (Virginia, Oregon, Ireland).
question: How would you schedule 500 weekly training jobs across Virginia, Oregon, and Ireland to minimize carbon within 15% of baseline cost?
details:
  realistic_solution: A carbon-aware scheduler balances spatial and temporal shifting. **Spatial shifting** moves workloads to regions with lower carbon intensity (like Oregon's hydro grid), but is limited by GPU capacity constraints. **Temporal shifting** delays workloads to run during hours with high renewable energy generation (like midday solar or nighttime wind), which adds latency to the job completion time. By optimizing across these dimensions, you can maximize carbon reduction within a constrained budget and latency tolerance. For this workload, combining spatial shifting (maximizing Oregon usage) and temporal shifting (delaying jobs in Ireland/Virginia to align with wind/solar) achieves a 40% carbon reduction. The remaining emissions must be offset via Renewable Energy Certificates (RECs) to achieve full carbon neutrality.
  common_mistake: |
    **The Pitfall:** Attempting to run everything in the greenest region.
    **The Rationale:** Candidates ignore practical capacity constraints (the green region lacks enough GPUs) and temporal variation in grid carbon intensity.
    **The Consequence:** Failing to meet training throughput requirements and missing out on significant temporal shifting carbon reductions.
  napkin_math: |
    1. Calculate baseline carbon (uniform distribution): 500 jobs * 292 kg avg = 146,200 kg CO2/week.
    2. Maximize spatial shifting to Oregon (Capacity limit: 200 jobs): 200 jobs * 103 kg = 20,600 kg.
    3. Apply temporal shifting (delaying jobs to match wind/solar hours): 150 jobs in Ireland (194 kg avg) + 150 jobs in Virginia (258 kg avg).
    4. Calculate total optimized carbon: 20,600 + 29,100 + 38,700 = 88,400 kg.
    5. Conclusion: **With a 12% cost increase, you achieve a 40% carbon reduction; offset the remaining 88,400 kg with RECs to hit neutrality.**
