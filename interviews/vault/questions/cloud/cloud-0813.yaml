title: The Carbon-Neutral Training Scheduler
scenario: Your company has committed to carbon-neutral AI training by 2027. You run 500 training jobs
  per week across 3 data center regions (Virginia, Oregon, Ireland). Each region has different carbon
  intensity, electricity cost, and GPU availability. Design a carbon-aware job scheduler that minimizes
  carbon emissions while keeping total training cost within 15% of the carbon-unaware baseline.
details:
  realistic_solution: A carbon-aware scheduler balances spatial and temporal shifting. **Spatial shifting**
    moves workloads to regions with lower carbon intensity (like Oregon's hydro grid), but is limited
    by GPU capacity constraints. **Temporal shifting** delays workloads to run during hours with high
    renewable energy generation (like midday solar or nighttime wind), which adds latency to the job completion
    time. By optimizing across these dimensions, you can maximize carbon reduction within a constrained
    budget and latency tolerance. For this workload, combining spatial shifting (maximizing Oregon usage)
    and temporal shifting (delaying jobs in Ireland/Virginia to align with wind/solar) achieves a 40%
    carbon reduction. The remaining emissions must be offset via Renewable Energy Certificates (RECs)
    to achieve full carbon neutrality.
  common_mistake: '"Just run everything in the greenest region." This ignores capacity constraints (the
    green region may not have enough GPUs), latency to data sources, and temporal variation in grid carbon
    intensity.'
  napkin_math: 'Regional carbon intensity: Virginia = 0.35 kg CO₂/kWh (coal-heavy grid), Oregon = 0.08
    kg/kWh (hydro), Ireland = 0.25 kg/kWh (mixed). Average job: 64 GPUs × 24 hrs × 700W × PUE 1.2 = 1,290
    kWh. Carbon per job: Virginia = 451 kg, Oregon = 103 kg, Ireland = 323 kg. **Carbon-unaware** (uniform
    distribution): 500 jobs × (451+103+323)/3 = 146,200 kg CO₂/week. **Spatial-only** (all to Oregon):
    500 × 103 = 51,500 kg (−65%). But Oregon has capacity for only 200 jobs/week. **Spatial + temporal:**
    200 jobs in Oregon, 150 in Ireland (shifted to wind hours, effective 0.15 kg/kWh), 150 in Virginia
    (shifted to solar hours, effective 0.20 kg/kWh). Carbon: 200×103 + 150×194 + 150×258 = 88,400 kg (−40%).
    Cost premium: Oregon GPUs cost 10% more, temporal shifting adds 8-hour average delay → 12% cost increase.
    **Within the 15% budget, achieves 40% carbon reduction.** Full carbon neutrality requires purchasing
    renewable energy certificates (RECs) for the remaining 88,400 kg at ~\$15/ton = \$1,326/week.'
