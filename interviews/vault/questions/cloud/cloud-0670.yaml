title: The Decoding Bottleneck
scenario: We are heavily memory-bandwidth bound during LLM decoding.
question: "How can we generate tokens faster without changing the model weights, quantizing, or losing exact mathematical accuracy?"
details:
  realistic_solution: Speculative Decoding. You use a tiny, fast "draft" model to guess the next $K$ tokens. You then pass these $K$ tokens to your massive target model in a *single forward pass*. The large model verifies the guesses in parallel (trading spare ALU compute capacity to save memory fetches). All correct tokens are accepted, maintaining identical output distributions but yielding 2-3x speedups.
  common_mistake: |
    **The Pitfall:** Suggesting "Use a faster GPU" or "Increase the batch size."
    **The Rationale:** These are standard solutions for throughput issues.
    **The Consequence:** A faster GPU won't help if the workload is memory-bandwidth bound, and larger batches increase throughput but do not improve per-request latency.
  napkin_math: |
    * Normal decode: 1 token per forward pass; each pass loads all 140 GB of weights from HBM.
    * 100 tokens = 100 weight loads = 100 × 140 GB / 3.35 TB/s = 4.18 seconds.
    * Speculative decode with K=5, averaging 4 accepted tokens per pass: ~100 tokens in 25 forward passes.
    * Speculative decode time = 25 × 140 GB / 3.35 TB/s = 1.04 seconds.
    * **This yields a ~4× speedup in latency while maintaining exact mathematical accuracy.**
