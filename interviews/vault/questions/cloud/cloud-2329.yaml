title: 'FP8 KV Cache Asymmetry: K vs V Degradation'
scenario: You optimize a 100B model by storing the KV cache in FP8 E4M3. Throughput increases dramatically.
  However, you notice that while storing the Value (V) cache in E4M3 causes no measurable degradation,
  storing the Key (K) cache in E4M3 causes a 5% drop in MMLU accuracy.
details:
  realistic_solution: The asymmetry lies in how K and V are mathematically consumed in the attention mechanism.
    The K cache is used in a dot product with the Query (Q * K^T), and the result is immediately passed
    through a Softmax function. Softmax exponentiates the values, meaning even tiny quantization errors
    in the K cache are exponentially amplified, severely disrupting the attention probability distribution.
    Conversely, the V cache is merely linearly combined using those attention probabilities (Prob * V).
    Linear operations average out the zero-mean quantization noise, making the V cache highly robust to
    lower precision. The K cache often requires E5M2 for better dynamic range or smaller block quantization.
  common_mistake: Assuming the Key cache occupies more memory than the Value cache, so compressing it
    results in higher total data loss.
  napkin_math: Let true dot product = 5.0. Quantization error in K causes it to be 5.5. exp(5.0) = 148.
    exp(5.5) = 244. A 10% error in the dot product causes a 64% error in the attention weight. For V,
    a 10% error in the value simply results in a 10% error in that value's contribution to the output.
