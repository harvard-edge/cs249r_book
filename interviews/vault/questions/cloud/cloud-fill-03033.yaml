title: Kubernetes Network Policy for Secure Multi-Tenant GPU Inference
scenario: A multi-tenant inference platform on H100 (80GB HBM3) Kubernetes clusters serves multiple enterprise
  customers. Each customer's inference pods share the same node. A security audit finds that pods can
  communicate with each other across namespaces, violating customer isolation requirements.
question: "How would you enforce network isolation between enterprise customers’ pods across Kubernetes namespaces?"
details:
  realistic_solution: Implement Kubernetes NetworkPolicy to deny all ingress/egress between namespaces
    by default. Apply a default-deny policy per namespace, then allow only necessary egress to the load
    balancer and ingress from the API gateway. Use a CNI plugin that supports NetworkPolicy (Calico, Cilium)
    — not all CNIs enforce NetworkPolicy. Add PodSecurityPolicy to prevent privilege escalation.
  common_mistake: Relying on namespace isolation alone for security. Kubernetes namespaces are a logical
    boundary but do not restrict network traffic by default. Any pod can reach any other pod by IP address
    regardless of namespace.
  napkin_math: 'H100 cluster, 10 customers, 20 pods each = 200 pods total. Without NetworkPolicy: 200*199
    = 39,800 possible pod-to-pod connections. With NetworkPolicy default-deny: each namespace allows only
    20 intra-namespace connections + 1 to gateway = 21 allowed. Security surface reduced by 39,800/210
    = 190x. Cilium eBPF enforcement overhead: <1μs per connection decision, negligible for inference workloads
    (>10ms latency per request).'
