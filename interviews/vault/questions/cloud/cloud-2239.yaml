title: BSP vs Streaming Dataflow for Feature Computation
scenario: Your team needs to compute 500 features for a recommendation model. Some features are recomputed nightly, while others update within seconds. A junior engineer proposes running everything in a single Apache Flink streaming job to simplify the architecture.
question: "Why is a pure streaming approach problematic for the historical batch features, and what execution model mismatch is at play?"
details:
  realistic_solution: 'BSP (batch) systems like Spark process bounded datasets in synchronized stages: shuffle all data, then aggregate, then output. This is efficient for full-dataset scans because it can sort-merge join and use disk spill efficiently. Streaming systems process unbounded data record-by-record with local state. Maintaining a 30-day rolling window in a streaming system requires holding 30 days of state per user in RocksDB. The correct architecture is a Lambda or Kappa variant: batch (BSP) for historical features, streaming for session-level features, with a feature store unifying both paths.'
  common_mistake: |
    **The Pitfall:** Assuming streaming is strictly better because it's lower latency.
    **The Rationale:** Desiring a unified architecture and misunderstanding how stateful streaming engines maintain historical windows.
    **The Consequence:** Unmanageable terabytes of RocksDB state, endless checkpointing failures, and astronomical infrastructure costs compared to simple batch processing.
  napkin_math: |
    - **State Size:** 100M users × 30-day window × 50 events/day × 200 bytes = 30 TB of managed streaming state.
    - **Checkpoint Impact:** A Flink checkpoint writing 30 TB to S3 at 100 GB/s takes ~300 seconds (longer than a standard 1-minute interval).
    - **Conclusion:** **A Spark BSP job reads the 30 TB once, aggregates it in memory, and completes in ~20 minutes with zero long-term state overhead.**
