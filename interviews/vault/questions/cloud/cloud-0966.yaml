title: Evaluating Circuit Breaker Thresholds for Embedding APIs
scenario: You manage a real-time recommendation service handling 10,000 QPS. It relies on an upstream
  GPU-backed embedding API that typically responds in 20ms. The recommendation service runs on instances
  with a strict maximum of 500 worker threads. During a traffic surge, the embedding API experiences tail
  latency spikes up to 2,000ms. Evaluate the architectural trade-offs between using a standard exponential
  backoff retry mechanism versus a stateful Circuit Breaker pattern, and quantitatively justify the specific
  timeout, failure rate threshold, and fallback strategy needed to prevent cascading thread exhaustion.
question: "Why is a circuit breaker preferable to retries for the 10,000QPS embedding API, and what timeout, threshold, and fallback should it use?"
details:
  realistic_solution: Implement a Circuit Breaker that fails fast. Set a strict timeout of 40ms to prevent
    thread pool exhaustion, trip the circuit if the timeout rate exceeds 5% in a 10-second window, and
    immediately return a cached, pre-computed default embedding (or failover cache) to maintain partial
    availability.
  common_mistake: Relying on retries with exponential backoff during latency degradation, which keeps
    caller threads blocked longer and accelerates resource exhaustion, or setting the timeout higher than
    the mathematical limit of the thread pool.
  napkin_math: 'By Little''s Law: Concurrency = QPS * Latency. Under normal conditions: 10,000 QPS * 0.02s
    = 200 concurrent threads (safe, < 500). If latency hits 2s: 10,000 * 2.0s = 20,000 required threads
    (pool exhausts instantly, leading to a cascading outage). Maximum allowable timeout before exhaustion
    = 500 threads / 10,000 QPS = 0.05s (50ms). Therefore, the circuit breaker timeout MUST be set strictly
    less than 50ms (e.g., 40ms).'
