title: Evaluating Circuit Breaker Thresholds for Embedding APIs
scenario: You manage a real-time recommendation service handling 10,000 QPS. It relies on an upstream GPU-backed embedding API that typically responds in 20ms. The recommendation service runs on instances with a strict maximum of 500 worker threads. During a traffic surge, the embedding API experiences tail latency spikes up to 2,000ms.
question: "Why is a circuit breaker preferable to retries for the 10,000QPS embedding API, and what timeout, threshold, and fallback should it use?"
details:
  realistic_solution: Implement a Circuit Breaker that fails fast. Set a strict timeout of 40ms to prevent thread pool exhaustion, trip the circuit if the timeout rate exceeds 5% in a 10-second window, and immediately return a cached, pre-computed default embedding (or failover cache) to maintain partial availability.
  common_mistake: |
    **The Pitfall:** Relying on retries with exponential backoff during latency degradation.
    **The Rationale:** Candidates apply standard microservice retry patterns without analyzing the mathematical limits of the local thread pool.
    **The Consequence:** Retries keep caller threads blocked even longer, accelerating resource exhaustion and causing a total service outage.
  napkin_math: |
    - Little's Law: Concurrency = QPS * Latency.
    - Normal conditions: 10,000 QPS * 0.02s = 200 concurrent threads (Safe, < 500).
    - Spiking conditions: 10,000 QPS * 2.0s = 20,000 required threads (Pool exhausts instantly).
    - Maximum allowable latency before exhaustion: 500 threads / 10,000 QPS = 0.05s (50ms).
    - **Result: A strict circuit breaker timeout of <50ms (e.g., 40ms) must be enforced to prevent cascading thread exhaustion.**
