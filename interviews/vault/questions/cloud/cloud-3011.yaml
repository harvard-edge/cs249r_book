title: 'KV-Cache: Specification — KV Cache Sizing for Speculative Decoding'
scenario: 'You must define the KV cache specification for a speculative decoding setup on H100 (80GB HBM3): target model 70B, draft model 7B, speculative lookahead K=4 tokens.'
question: What per-token KV-cache budget is required for the 70B target model in the speculative decoding setup?
details:
  realistic_solution: 'KV cache per token for 80-layer GQA-8 model: 2 × 80 × 8 × 128 × 2B = 320KB per token.'
  common_mistake: |
    **The Pitfall:** Not budgeting for both models' KV simultaneously.
    **The Rationale:** Forgetting that speculative decoding generates K candidate tokens whose KV must be stored but may be rolled back.
    **The Consequence:** Under-provisioning KV cache memory, leading to out-of-memory errors when the draft model generates lookahead tokens that are subsequently rejected.
  napkin_math: |
    - 80-layer model (GPT-4 class), GQA-8, head_dim=128, fp16.
    - KV per token calculation: 80 layers × 2 (K,V) × 8 heads × 128 dim × 2 bytes = 327,680 bytes.
    - **The required budget is 320 KB per token.**
