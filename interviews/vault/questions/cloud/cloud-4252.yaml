title: Diagnosing NaN gradients in a deep network with custom autograd operations
scenario: A team implements a custom signed distance function (SDF) layer for 3D shape learning. After 500 training steps, gradients become NaN. The forward pass looks correct and loss values are normal. The custom backward involves computing 1/|∇f| (inverse gradient magnitude).
question: How would you stabilize and debug the custom SDF backward that divides by |∇f|?
details:
  realistic_solution: 'Add an epsilon clamp in the backward: grad_magnitude = torch.clamp(torch.norm(input_grad, dim=-1, keepdim=True), min=1e-6). Use torch.autograd.set_detect_anomaly(True) to find the exact backward step producing NaN. Register a gradient hook on the custom function output to log max gradient magnitude per step. Consider replacing 1/|∇f| with the Eikonal loss formulation that penalizes |∇f|=1 without division.'
  common_mistake: |
    **The Pitfall:** Not handling the degenerate case where the gradient magnitude |∇f| approaches 0.
    **The Rationale:** The forward pass is unaffected, leading engineers to believe the math is stable. They forget that the backward pass explicitly divides by this magnitude.
    **The Consequence:** Silent bugs where training inevitably collapses to NaN after a few hundred steps when a sample stochastically hits the medial axis.
  napkin_math: |
    - **Probability of Degeneracy**: A random 3D point falling within epsilon=1e-3 of the medial axis is ~O(surface_area × epsilon), roughly 0.00002% of samples.
    - **Batch Size Impact**: At batch=10000 samples, expect 0.002 degenerate points per step (1 every 500 steps).
    - **Propagation**: 1 degenerate point causes a gradient of ∞.
    - **Result**: **NaN appears and propagates through the full batch gradient after ~500 steps**.
