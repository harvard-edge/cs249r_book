title: Diagnosing NaN gradients in a deep network with custom autograd operations
scenario: A team implements a custom signed distance function (SDF) layer for 3D shape
  learning on H100. After 500 training steps, gradients become NaN. The forward pass
  looks correct and loss values are normal. The custom backward involves computing
  1/|∇f| (inverse gradient magnitude) which can be numerically unstable.
question: How would you stabilize and debug the custom SDF backward that divides by
  |∇f|?
details:
  realistic_solution: 'Add an epsilon clamp in the backward: grad_magnitude = torch.clamp(torch.norm(input_grad,
    dim=-1, keepdim=True), min=1e-6). Use torch.autograd.set_detect_anomaly(True)
    to find the exact backward step producing NaN. Register a gradient hook on the
    custom function output to log max gradient magnitude per step. Consider replacing
    1/|∇f| with the Eikonal loss formulation that penalizes |∇f|=1 without division.'
  common_mistake: Not handling the degenerate case where the gradient magnitude |∇f|
    approaches 0, causing division by zero in the backward pass. This is a silent
    bug because forward values are unaffected, but backward gradients explode when
    the SDF is evaluated near medial axis points where |∇f| ≈ 0.
  napkin_math: 'Probability of a random 3D point being within epsilon=1e-3 of the
    medial axis ≈ O(surface_area × epsilon). For typical shapes: ~0.00002% of samples.
    At batch=10000 samples: 0.002 degenerate points per step (1 every 500 steps) × gradient of ∞
    → NaN appears and propagates through the full batch gradient after ~500 steps.'
