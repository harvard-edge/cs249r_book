title: Analyzing the Inference OpEx Explosion
scenario: Your team trained a 30B parameter recommendation model over 2 weeks on 256 A100 GPUs (total
  CapEx ~$300k). It is deployed to serve 50,000 requests/sec globally. Within the first quarter, the CFO
  flags that the infrastructure budget is overdrawn by 400%. The serving fleet consists of 200 `g5.48xlarge`
  instances (8x A10G) running 24/7 at $16.28/hr. Analyze why the operational expenditure (OpEx) has eclipsed
  the training CapEx so quickly, and identify the root architectural inefficiency.
question: "Why has serving OpEx eclipsed the $300k training CapEx for the 30B recommender, and what architectural inefficiency should be fixed?"
details:
  realistic_solution: Recognize the Serving Cost Dominance Law by calculating the annualized OpEx. The
    fleet costs ~$28.5M/year, nearly 100x the training cost. The architectural solution is to aggressively
    optimize inference throughput (e.g., INT8 quantization, continuous batching, or shifting to specialized
    ASICs like AWS Inferentia) to reduce the active node count.
  common_mistake: Candidates often suggest optimizing the training pipeline or using spot instances for
    inference, missing the structural reality that 24/7 inference compute fundamentally eclipses one-time
    training costs at scale.
  napkin_math: Training Cost = $300,000 (one-time). Serving Cost = 200 nodes * $16.28/hr * 24 hr/day *
    365 days = $28,522,560 / year. Yearly serving costs are ~95x the total training cost.
