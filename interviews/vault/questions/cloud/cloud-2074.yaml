title: The Canary Evaluation Framework
scenario: Your search ranking team deploys models twice per week. Last quarter, 3 out of 26 deployments
  caused measurable revenue regressions that took 2-5 days to detect and roll back. Design an automated
  evaluation gate that catches regressions before full deployment. What metrics must it track, what thresholds
  should trigger rollback, and how do you handle the tension between deployment velocity and safety?
details:
  realistic_solution: 'A three-stage gate: (1) Offline gate: model must match or exceed baseline on NDCG@10,
    MRR, and recall@100 on a held-out eval set. This catches obvious regressions in < 1 hour. (2) Shadow
    evaluation: run the new model on 100% of live traffic in shadow mode (compute predictions but don''t
    serve them). Compare prediction distributions against the production model. Flag if KL divergence
    exceeds threshold — this catches distribution-level changes that offline metrics miss. Takes 4-6 hours.
    (3) Canary deployment: serve 1-5% of live traffic with the new model. Monitor business metrics (CTR,
    revenue/session) with sequential hypothesis testing (not fixed-horizon). Auto-rollback if business
    metrics drop > 1% with p < 0.05. Takes 6-24 hours depending on traffic volume. The velocity-safety
    tradeoff: stages 1-2 are non-blocking (run in parallel with other work). Stage 3 adds 6-24 hours to
    deployment. Accept this latency as insurance against $500K+ regression events.'
  common_mistake: Designing a gate based only on offline evaluation metrics (NDCG, MRR). Offline metrics
    that improve can still cause online regressions due to distribution shift, feature skew, and feedback
    loop effects.
  napkin_math: '3 regressions × average $200K revenue impact × 3 days exposure = $1.8M/quarter in regression
    cost. Canary gate cost: 24h deployment delay × 26 deployments × (negligible compute). Canary catches
    regressions within 6h at 1% exposure: max impact = $200K × 1% × 0.25 days = $500 per incident. Annual
    savings: ~$7.2M → ~$6K = $7.194M saved.'
