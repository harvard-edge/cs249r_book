title: Dragonfly Topology for Large-Scale Training
scenario: Your 4096-GPU training cluster needs a new network topology. You must compare a 3-tier fat-tree with a 2-level dragonfly topology for training a 175B model with 3D parallelism (TP=8, PP=16, DP=32).
question: "Which topology better matches the hierarchical communication pattern, and what is the cost difference in switch ports?"
details:
  realistic_solution: '3D parallelism creates hierarchical communication: TP (8 GPUs, highest bandwidth) -> PP (16 GPUs, medium) -> DP (32 groups, lowest). Fat-tree: treats all traffic equally — 4096 GPUs need 3 tiers of 64-port switches. Leaf: 128 switches, spine: 128, core: 64. Total: 320 switches * 64 ports = 20,480 ports. Dragonfly: group 8 GPUs (TP) within a local group connected by NVLink. 16 groups (PP) form a dragonfly group with full-mesh local links. 32 dragonfly groups (DP) connected by global links. Local: 16 * 15/2 = 120 links (PP, high bandwidth). Global: 32 * 31/2 = 496 links (DP, lower bandwidth needed). Total switches: 32 groups * 4 switches = 128 switches + 32 global switches = 160. Port savings: 50%. Dragonfly matches the 3D hierarchy naturally.'
  common_mistake: |
    **The Pitfall:** Choosing fat-tree by default because it is well-understood.
    **The Rationale:** Failing to map the physical network topology to the logical hierarchical communication requirements of 3D parallelism.
    **The Consequence:** Significantly over-provisioning network switches and over-spending by millions of dollars for unneeded global bisection bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:** 4096 GPUs. Fat-tree: 3 tiers of 64-port switches. Dragonfly: 32 groups, 4 switches per group. Switch cost: $15K.
    2. **Calculations:** Fat-tree ports: 320 switches * 64 ports = 20,480 ports. Cost: 320 * $15K = $4.8M. Dragonfly ports: 160 switches * 64 ports = 10,240 ports. Cost: 160 * $15K = $2.4M. Savings = $2.4M.
    3. **Conclusion & Interpretation:** **Result: Dragonfly saves 50% on switch ports.** Dragonfly naturally matches the 3D hierarchy, providing massive cost reductions while maintaining necessary DP AllReduce bandwidth.
