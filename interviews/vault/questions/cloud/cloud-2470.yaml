title: Hybrid ASR Compute Offloading
scenario: A smart speaker handles 50M voice queries daily. Currently, a 2MB wake-word model runs on-device, and post-wake audio is streamed to a cloud ASR/NLU pipeline. Cloud processing takes 800ms and costs $0.005 per query ($250,000/day). Analytics show 60% of queries are basic home control ('turn on lights', 'set timer'). The speaker has an ARM Cortex-M DSP with 16MB SRAM.
question: "How would you add on-device processing to cut smart-speaker cloud costs by at least 50% without increasing latency?"
details:
  realistic_solution: Implement a Hybrid ASR/NLU architecture. Train a highly quantized (INT8) small-vocabulary intent classification model (e.g., a lightweight Conformer or Keyword Spotting extension) that fits in <10MB of SRAM. This edge model listens for the top 50 most common local commands immediately following the wake word. If the edge model confidence is >0.95, the command is executed locally (0ms network latency, $0 cloud cost). If confidence is low, or the utterance falls outside the small vocabulary, the audio buffer is seamlessly handed off to the cloud pipeline. This cuts cloud volume while massively improving perceived latency for common tasks.
  common_mistake: |
    **The Pitfall:** Trying to fit a full vocabulary ASR model like Whisper-tiny onto the 16MB SRAM.
    **The Rationale:** Candidates default to shrinking existing general models rather than shifting the architectural paradigm to a highly constrained, specialized edge intent classifier.
    **The Consequence:** Exceeding memory limits and draining the battery on the Cortex-M.
  napkin_math: |
    1. **Total Queries:** 50M/day.
    2. **Basic Commands:** 60% = 30M queries.
    3. **Edge High-Confidence Rate:** 90% of basic commands.
    4. **Locally Handled:** 30M * 0.90 = 27M queries.
    5. **Cloud Handled:** 50M - 27M = 23M queries.
    6. **New Cloud Cost:** 23M * $0.005 = $115,000/day.
    7. **Savings:** **$250,000 - $115,000 = $135,000/day (54% reduction).**
