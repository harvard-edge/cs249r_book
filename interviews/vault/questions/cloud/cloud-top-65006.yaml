title: Chiplet-Based GPU Multi-Instance Partitioning
scenario: A cloud provider wants to offer MI300X as a multi-tenant service with strong isolation guarantees,
  analogous to H100 MIG. Design an isolation scheme that maps to MI300X's XCD physical topology.
details:
  realistic_solution: 'MI300X''s 8 XCDs each have independent CUs, L2 caches, and HBM partitions through
    MCDs. Define isolation zones as 1-XCD, 2-XCD, or 4-XCD slices: assign one tenant per XCD partition.
    Use ROCm''s CRIU-based context isolation and set HSA memory pools to restrict allocation to assigned
    XCD''s HBM region. Infinity Fabric QoS registers can throttle cross-XCD bandwidth to enforce SLA.
    Limitation: no hardware memory encryption boundary between XCDs (unlike H100 Confidential Computing),
    so must add software memory scrubbing on XCD release.'
  common_mistake: Assuming MIG-style isolation is directly portable from H100 to MI300X. H100 MIG uses
    dedicated SM partitions and memory controllers baked into the monolithic die design. MI300X lacks
    hardware MIG support — its XCD boundaries offer natural isolation points but require software enforcement.
  napkin_math: 'MI300X: 8 XCDs, 192GB HBM. 1-XCD slice: 24GB HBM, ~660 GB/s local BW, ~228 TFLOPS BF16
    (1/8 of ~1826 TFLOPS). Comparable to: A100 80GB (2TB/s, 312 TFLOPS) — MI300X XCD slice has higher
    memory but lower bandwidth per TFLOP, good for memory-capacity-bound workloads.'
