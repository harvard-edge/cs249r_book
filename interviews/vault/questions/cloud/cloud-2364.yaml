title: Diagnosing Multi-Tenant RDMA QoS Interference
scenario: A critical real-time fraud detection model uses a 2-node RDMA setup for strict 10ms SLA inference. Randomly, latency spikes to 150ms. You notice the spikes correlate exactly with a background data-lake compaction job running on the same cluster, which performs massive Hadoop shuffles over standard TCP/IP on the same physical 100Gbps network.
question: Why do 10ms RDMA fraud-inference requests spike to 150ms during a TCP Hadoop shuffle, and what network QoS configuration would prevent it?
details:
  realistic_solution: The root cause is the lack of Network Quality of Service (QoS) isolation. The massive TCP shuffle traffic from the Hadoop job fills the shared switch egress buffers. Because RoCEv2 (RDMA) is sharing the same buffer pool without strict priority isolation, the RDMA packets get queued behind megabytes of TCP traffic, delaying them significantly. Furthermore, when the buffer fills, it triggers PFC pause frames that halt the RDMA traffic entirely. The solution is to configure Priority Flow Control (PFC) and Explicit Congestion Notification (ECN) on separate DSCP (Differentiated Services Code Point) traffic classes. Assign RDMA traffic to a strict-priority lossless queue (e.g., TC3) and TCP to a lossy queue (TC0) to guarantee buffer space for RoCEv2.
  common_mistake: |
    **The Pitfall:** Assuming the RDMA NIC is overheating or that the background job is consuming all CPU cores, prompting node-level migration rather than network-level QoS.
    
    **The Rationale:** Many ML engineers treat the network fabric as a transparent pipe, unaware that TCP and RDMA traffic share hardware switch buffers and will violently collide if QoS partitions aren't explicitly enforced.
    
    **The Consequence:** Node migration provides no relief because the switch buffers are still universally flooded, leading to continued SLA violations and missed fraud detection.
  napkin_math: |
    - **Bandwidth**: 100 Gbps link = 12.5 GB/s.
    - **Buffer Capacity**: Switch buffer = 16MB.
    - **TCP Flooding**: TCP shuffle pushes 40 Gbps, filling the 16MB buffer in 3.2ms.
    - **Queue Delay**: When an RDMA packet arrives, it queues behind 16MB of TCP packets. Delay = 16MB / 12.5 GB/s = 1.28ms per hop.
    - **Total Impact**: Over 3 network hops, base delay is ~4ms. When combined with PFC storms triggered by the full buffer pausing the sender, latency easily balloons past the 10ms SLA to **150ms+**.
