title: Diagnosing Multi-Tenant RDMA QoS Interference
scenario: A critical real-time fraud detection model uses a 2-node RDMA setup for strict 10ms SLA inference.
  Randomly, latency spikes to 150ms. You notice the spikes correlate exactly with a background data-lake
  compaction job running on the same cluster, which performs massive Hadoop shuffles over standard TCP/IP
  on the same physical 100Gbps network.
details:
  realistic_solution: The root cause is the lack of Network Quality of Service (QoS) isolation. The massive
    TCP shuffle traffic from the Hadoop job fills the shared switch egress buffers. Because RoCEv2 (RDMA)
    is sharing the same buffer pool without strict priority isolation, the RDMA packets get queued behind
    megabytes of TCP traffic, delaying them significantly. Furthermore, when the buffer fills, it triggers
    PFC pause frames that halt the RDMA traffic entirely. The solution is to configure Priority Flow Control
    (PFC) and Explicit Congestion Notification (ECN) on separate DSCP (Differentiated Services Code Point)
    traffic classes. Assign RDMA traffic to a strict-priority lossless queue (e.g., TC3) and TCP to a
    lossy queue (TC0) to guarantee buffer space for RoCEv2.
  common_mistake: Assuming the RDMA NIC is overheating or that the background job is consuming all CPU
    cores, moving the job to a different CPU.
  napkin_math: 100 Gbps link = 12.5 GB/s. Switch buffer = 16MB. TCP shuffle pushes 40 Gbps, filling the
    16MB buffer in 3.2ms. When an RDMA packet arrives, it queues behind 16MB of TCP packets. 16MB / 12.5
    GB/s = 1.28ms delay per hop. Over 3 network hops, base delay is ~4ms. Combined with PFC storms triggered
    by the full buffer pausing the sender, latency easily balloons past the 10ms SLA to 150ms+.
