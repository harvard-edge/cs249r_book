title: MI300X Infinity Fabric vs H100 NVLink for Communication Overlap
scenario: You are choosing between an 8x H100 DGX node (NVLink 900 GB/s bisection) and an 8x MI300X node
  (Infinity Fabric 896 GB/s bisection) for distributed training. Both have similar aggregate bandwidth.
  Analyze how the interconnect topology affects communication-computation overlap for a 70B LLM.
details:
  realistic_solution: 'Key differences for overlap: (1) H100 NVSwitch: flat topology, all pairs get 450
    GB/s bidirectional. AllReduce is perfectly balanced. (2) MI300X Infinity Fabric: hierarchical — pairs
    within the same OAM module have higher bandwidth than cross-module pairs. This creates uneven AllReduce
    performance. (3) For overlap, consistency matters: if AllReduce latency varies by 30% across pairs,
    the overlap buffer must account for the worst case. H100''s flat topology gives predictable AllReduce
    timing, making overlap scheduling easier. (4) MI300X compensates with 192GB VRAM — more model data
    stays resident, reducing communication frequency in ZeRO-3. (5) Recommendation: for TP (frequent,
    small AllReduces), H100 NVSwitch is better. For FSDP (infrequent, large AllGathers), MI300X''s larger
    memory reduces communication need.'
  common_mistake: Comparing only peak bandwidth numbers. H100 NVSwitch provides all-to-all full bisection
    bandwidth (any GPU can communicate with any other at full speed), while MI300X's Infinity Fabric topology
    may have different bandwidth depending on GPU pair proximity.
  napkin_math: '70B in TP-8: 2 AllReduces/layer x 96 layers = 192 AllReduces per step. 160MB each at 450
    GB/s (H100 NVLink): 0.36ms each, 69ms total. At variable 300-450 GB/s (MI300X IF): 0.36-0.53ms each,
    69-102ms total. Variance adds 33ms worst case.'
