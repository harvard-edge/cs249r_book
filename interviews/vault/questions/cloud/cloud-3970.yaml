title: Cross-Mesh Communication Overlap in 3D Parallelism
scenario: 'Your 512-GPU training uses 3D parallelism: TP=8 (intra-node NVLink), PP=8 (inter-node IB), DP=8 (inter-node IB). Each parallelism dimension has different communication patterns, bandwidths, and overlap opportunities.'
question: 'How would you schedule TP, PP, and DP communication to maximize overlap without IB contention in this 512-GPU 3D-parallel step?'
details:
  realistic_solution: 'Coordinated overlap schedule: (1) Within each pipeline stage''s forward/backward: TP AllReduce runs on NVLink (900 GB/s), does not compete with IB traffic. Overlap TP AllReduce with per-layer compute — always hidden (<5% of layer time). (2) Between pipeline stages: PP activation transfers use IB. Schedule them to not overlap with DP AllReduce on the same IB links. (3) DP gradient AllReduce: overlaps with backward compute within each stage. Use IB during backward, while PP is idle (PP only transfers between forward and backward). (4) Key insight: PP transfers happen at forward/backward boundaries. DP AllReduce happens during backward. These naturally stagger: PP sends activation at boundary, then DP AllReduce runs during the stage''s backward pass on different IB ports. (5) Remaining contention: PP backward activation transfers overlap with DP AllReduce. Solution: dedicate separate IB rails for PP and DP traffic.'
  common_mistake: |
    **The Pitfall:** Optimizing each parallelism dimension's overlap independently.
    **The Rationale:** Engineers often configure TP, PP, and DP individually, forgetting that DP AllReduce and PP activation transfers share the same inter-node InfiniBand fabric.
    **The Consequence:** Simultaneous DP and PP communication causes network contention on the IB links, exposing communication time and inflating the pipeline bubble.
  napkin_math: |
    - **TP Comm:** 192 AllReduces * 0.28ms = 54ms (hidden by intra-node NVLink).
    - **PP Comm:** 7 activation transfers * 5ms = 35ms.
    - **DP Comm:** 100ms AllReduce.
    - **Uncoordinated Scheduling:** 35ms (PP) + 50ms (DP overlap failure) = 85ms exposed communication.
    - **Coordinated Scheduling:** Dedicate separate IB rails or stagger PP (at boundaries) and DP (during backward). Exposed communication = **~0ms.**
