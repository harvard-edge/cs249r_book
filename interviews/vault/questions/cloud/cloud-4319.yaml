title: Embedding Lookup All-to-All Communication
scenario: Your DLRM training cluster (64 A100s) shows that GPU utilization during embedding forward passes is 8% while MLP backward passes reach 90%. Profiling shows an all-to-all collective taking 85% of the embedding step time.
question: "Why does embedding all-to-all dominate DLRM training on 64 A100s, and what architectural change would reduce communication volume?"
details:
  realistic_solution: 'In DLRM training, embedding tables are sharded across GPUs (model parallelism for embeddings) while input batches are replicated across GPUs (data parallelism for MLPs). Each GPU in the batch needs embedding rows that live on different GPUs — this creates an all-to-all: each of N GPUs sends to each of N GPUs. Volume: batch_size × embedding_dim × num_tables bytes per collective. At 64 GPUs, all-to-all scales as O(N²) in communication pairs. Fix: (1) Embedding table placement optimization: group tables accessed together by the same requests onto the same GPU, reducing inter-GPU communication to only tables that span GPU boundaries. (2) Hybrid sharding: replicate small hot tables on all GPUs (row-wise for large, replicated for small). This converts all-to-all to all-gather for replicated tables (O(N) vs O(N²) scaling). (3) Reduce embedding dimension: use 64-dim instead of 256-dim embeddings where accuracy permits (4× reduction in all-to-all volume).'
  common_mistake: |
    **The Pitfall:** Trying to optimize the NCCL all-to-all implementation directly.
    **The Rationale:** Performance engineers see a collective bottleneck and immediately try to tune the network layer or environment variables.
    **The Consequence:** Ignoring the fundamental architectural flaw of the sharding strategy, which mathematically forces an O(N²) communication scaling bottleneck.
  napkin_math: |
    - Volume per batch: 64 GPUs, batch=2048, 100 tables, dim=64 (FP32).
    - Each GPU sends (2048/64) × 100 × 64 × 4 bytes = 819 KB to *every* other GPU.
    - Total sent per GPU = 819 KB × 63 = 51 MB per step.
    - To overlap with a 2ms compute step, bandwidth needed = 51 MB / 2ms = 25.5 GB/s.
    - **If cross-node InfiniBand is 200 Gbps (25 GB/s), the 2ms all-to-all totally dominates the 1ms compute step. Replicating small hot tables eliminates this overhead.**
