title: Designing Efficient Gradient Synchronization for Large-Scale LLM Training on AMD MI300X
scenario: You are tasked with training a 1 trillion parameter LLM using data parallelism across a cluster of 500 accelerators. The model is too large to fit on a single device, and the dataset is massive.
question: "How would you design a gradient synchronization strategy for a 1T-parameter LLM data parallelism to minimize network bottlenecks while preserving convergence?"
details:
  realistic_solution: A realistic solution would involve a hybrid approach. First, leverage gradient compression techniques (e.g., FP8, sparse gradient updates, or 1-bit SGD) to reduce the data volume transferred during synchronization. Implement a hierarchical AllReduce strategy, optimizing intra-node communication via shared memory and inter-node communication for efficient data transfer.
  common_mistake: |
    **The Pitfall:** Implementing naive synchronous AllReduce without gradient compression.
    **The Rationale:** Candidates focus on the local compute capabilities and local memory bandwidth but neglect the severely constrained inter-node network bandwidth.
    **The Consequence:** Severe network bottlenecks that leave the powerful accelerators starved for data and drastically inflate total training time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1T parameter model, FP16 gradients = 2 TB total gradient size.
       - 500 GPUs: ~4 GB of gradients per device.
       - Inter-node bandwidth = 400 Gbps (50 GB/s).
    2. **Calculations:**
       - AllReduce time ≈ 4 GB / 50 GB/s * log2(500) ≈ 0.08 s * 9 = 0.72 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound**. Compared to a compute step on 1307 TFLOPS hardware, a 0.72s communication block dictates compression.
