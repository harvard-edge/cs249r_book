title: Kubernetes Pod Placement and Resource Allocation for Large Language Model Training
  on NVIDIA H100s
scenario: You are tasked with deploying a distributed training job for a large language
  model (LLM) on a Kubernetes cluster. The cluster is comprised of nodes equipped
  with NVIDIA H100 GPUs, each featuring 80 GB HBM3 memory, capable of 989 TFLOPS FP16
  dense, and offering 3.35 TB/s memory bandwidth, with a 700W TDP. The LLM requires
  a total of 8 H100 GPUs for optimal training performance and memory footprint. Describe
  how you would configure the Kubernetes Pods and utilize features like GPU device
  plugins, node affinity, and resource requests/limits to ensure the training job
  is scheduled efficiently, utilizes the GPUs effectively, and isolates resources
  appropriately. Provide the relevant Kubernetes YAML snippets or pseudo-code to illustrate
  your approach.
question: How would you configure Kubernetes pods, GPU resources, and node affinity
  for an 8-H100 distributed LLM training job?
details:
  realistic_solution: 'The solution involves a multi-pronged approach:

    1. **GPU Device Plugin**: Ensure the NVIDIA device plugin is installed and configured
    on the cluster nodes to expose `nvidia.com/gpu` resources.

    2. **Resource Requests/Limits**: Request `nvidia.com/gpu: 8` for the training
    pod. Additionally, set appropriate CPU and memory requests/limits based on the
    LLM''s non-GPU resource consumption.

    3. **Node Affinity**: To ensure all 8 GPUs reside on a single node for optimal
    performance and to leverage high-speed NVLink interconnects within the node, use
    `nodeSelector` or `nodeAffinity`. For example, `nodeSelector: {''nvidia.com/gpu.count'':
    ''8''}` or `affinity` rules targeting nodes with sufficient available H100s.

    4. **Pod Anti-affinity (Optional but good practice)**: If multiple such jobs are
    to run, ensure that two such 8-GPU pods don''t land on the same node if there
    are not enough H100s available on a single node (e.g. if a node only has 4 H100s)
    unless explicitly desired.

    5. **Tolerations**: If specific nodes are tainted for GPU workloads, apply appropriate
    tolerations to the pod.'
  common_mistake: 'A common mistake is simply requesting `nvidia.com/gpu: 8` without
    considering node topology, HBM3 memory allocation, or ensuring that all 8 GPUs
    are available on a single node (or across a minimal number of nodes with high-speed
    interconnects). This can lead to inefficient scheduling, degraded performance
    due to inter-node communication overhead, or pods getting stuck in a pending state
    if no single node can satisfy the raw GPU count without accounting for other resource
    constraints.'
  napkin_math: If an LLM training job is memory-bound and requires 8 H100 GPUs (each
    with 80GB HBM3), the total memory capacity needed is 8 * 80 GB = 640 GB HBM3.
    If the model operates at FP16, each H100 offers 989 TFLOPS. For an 8-GPU setup,
    assuming ideal scaling, this could theoretically reach 8 * 989 TFLOPS = 7912 TFLOPS
    (7.91 PFLOPS). The total memory bandwidth available would be 8 * 3.35 TB/s = 26.8
    TB/s. These metrics highlight the importance of single-node deployment for latency
    and bandwidth-sensitive operations, which node affinity helps ensure.
