title: Kubernetes Pod Placement and Resource Allocation for Large Language Model Training on NVIDIA H100s
scenario: You are tasked with deploying a distributed training job for a large language model (LLM) on a Kubernetes cluster with NVIDIA H100 nodes. The LLM requires a total of 8 H100 GPUs for optimal training performance and memory footprint.
question: How would you configure Kubernetes pods, GPU resources, and node affinity for an 8-H100 distributed LLM training job?
details:
  realistic_solution: 'Utilize the NVIDIA k8s-device-plugin to expose `nvidia.com/gpu` resources. Define a Pod spec requesting `nvidia.com/gpu: 8`. Crucially, enforce node-level locality to leverage intra-node NVLink (avoiding severe PCIe/network bottlenecks) by applying `nodeAffinity` or `nodeSelector` (e.g., `nvidia.com/gpu.count: ''8''`) so all 8 GPUs are scheduled on a single physical node. Apply anti-affinity rules to prevent scheduling conflicts with other 8-GPU jobs if node capacity is constrained, and use appropriate tolerations for GPU-tainted nodes.'
  common_mistake: |
    **The Pitfall:** Requesting `nvidia.com/gpu: 8` without specifying node topology constraints.
    **The Rationale:** Assuming Kubernetes schedules GPU resources contiguously by default.
    **The Consequence:** Pods may be spread across multiple nodes or stuck pending, leading to network-bottlenecked inter-node communication and severely degraded performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 H100 GPUs required (80GB HBM3 each).
       - Memory bound workload.
       - H100 single-node peak: 989 TFLOPS FP16, 3.35 TB/s bandwidth.
    2. **Calculations:**
       - Total Memory: 8 * 80 GB = 640 GB.
       - Theoretical Peak Compute: 8 * 989 = 7912 TFLOPS.
       - Total Memory Bandwidth: 8 * 3.35 = 26.8 TB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Single-node placement is required to leverage NVLink interconnects and achieve the 26.8 TB/s bandwidth necessary for training latency.
