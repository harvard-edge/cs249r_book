title: Sensitivity Roofline Diagnosis
scenario: A kernel performs 2 TFLOPs and reads 200 GB from HBM per request. The GPU has 1,000 TFLOP/s peak and 4 TB/s HBM bandwidth. Measured latency is 55 ms. Diagnose whether the roofline says compute or memory is binding.
question: Is a kernel with 2 TFLOPs and 200 GB HBM traffic compute-bound or memory-bound on a 1,000 TFLOP/s, 4 TB/s GPU?
details:
  realistic_solution: Compute time lower bound is 2 TFLOPs / 1,000 TFLOP/s = 2 ms. Memory time lower bound is 200 GB / 4 TB/s = 50 ms. The measured 55 ms is close to the memory lower bound, so the kernel is memory-bound.
  common_mistake: Focusing on 2 TFLOPs as a large number without comparing it to the memory traffic and hardware ridge point.
  napkin_math: T_compute = 2/1000 = 0.002 s = 2 ms. T_memory = 200/4000 = 0.05 s = 50 ms. Max is memory.
