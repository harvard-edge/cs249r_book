title: Evaluating Straggler Mitigation Strategies in Federated Learning
scenario: A distributed federated learning system is training a recommendation model across 10,000 heterogeneous
  mobile devices. The central aggregator waits for 1,000 updates before performing a global model step
  (synchronous aggregation). However, due to stragglers (devices taking up to 5 minutes to complete local
  training and upload vs. the median 15 seconds), the global round time is heavily bottlenecked. Evaluate
  the trade-offs of switching from synchronous FedAvg with a strict barrier to an asynchronous protocol
  (like FedAsync) versus an over-selection strategy (e.g., selecting 1,500 clients but only waiting for
  the fastest 1,000).
question: "Should you switch to FedAsync or over-select 1,500 clients and wait for the fastest 1,000, and why?"
details:
  realistic_solution: Over-selection is typically the most robust practical approach. By querying 30%
    to 50% more clients than needed and dropping the stragglers, you maintain the convergence stability
    of synchronous updates while drastically clipping the long tail of latency.
  common_mistake: Assuming asynchronous aggregation is strictly superior for round times without accounting
    for the severe convergence penalty introduced by gradient staleness, which often requires more total
    time to reach target accuracy.
  napkin_math: If median completion is 15s and P99 is 300s, a strict sync barrier takes 300s per round.
    With 1.5x over-selection (ask 1,500, wait for 1,000), the aggregator only waits for the ~66th percentile
    (e.g., 20s), yielding a 15x speedup per round without the convergence degradation of staleness.
