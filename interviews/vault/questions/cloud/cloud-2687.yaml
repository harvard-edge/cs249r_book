title: Physical Limits on Training Cluster Scale
scenario: Explain why you cannot simply double the number of GPUs indefinitely to halve training time,
  and identify the three physical ceilings that bound cluster scaling.
details:
  realistic_solution: 'Three physical ceilings prevent infinite scaling: (1) Communication bottleneck
    — synchronous training requires AllReduce to average gradients across all GPUs every step. With N
    GPUs, AllReduce latency grows as O(log N) per step for ring-based algorithms, and the bandwidth per
    GPU is bounded by network bisection bandwidth. At 10,000+ GPUs, communication time can exceed computation
    time. (2) Power density — each GPU draws 300-700W. A 10,000 GPU cluster requires 3-7 MW just for GPUs,
    plus ~equal cooling. Few facilities can deliver >10MW to a single compute floor. The power infrastructure
    (transformers, cooling towers, backup generators) takes 18-24 months to build. (3) Batch size scaling
    limits — doubling GPUs means doubling effective batch size (for data parallelism). Beyond a critical
    batch size (~few thousand for most models), additional data parallelism yields diminishing returns
    or degrades convergence. You train faster per step but need more steps, reducing efficiency to near
    zero. These three ceilings interact: you cannot fix batch size limits by using model parallelism,
    because model parallelism increases communication requirements.'
  common_mistake: Believing that adding more GPUs always speeds up training linearly. Beyond the critical
    batch size, scaling efficiency drops below 50%, meaning half the GPUs are wasted.
  napkin_math: '10K GPUs × 400W = 4MW. AllReduce at 10K nodes: ~10ms overhead vs ~50ms compute = 17% communication
    tax. Critical batch size for GPT-3: ~3.2M tokens.'
