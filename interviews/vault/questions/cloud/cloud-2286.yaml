title: The Equalized Odds Constraint
scenario: Your credit scoring model must satisfy 'equalized odds' across gender groups. A colleague says
  this just means the model should have the same accuracy for men and women. Why is that description incomplete,
  and what does equalized odds actually require?
details:
  realistic_solution: 'Equalized odds requires that the True Positive Rate (TPR) and the False Positive
    Rate (FPR) are equal across protected groups, conditioned on the true label. Equal accuracy can hide
    compensating errors: Group A might have high TPR but high FPR, while Group B has low TPR and low FPR
    — same accuracy, but Group A faces more false accusations while Group B is systematically denied.
    Equalized odds ensures that both the benefit of correct approval (TPR) and the harm of incorrect denial
    (FPR) are distributed equally. From a systems perspective, this means your evaluation pipeline must
    compute confusion matrices per subgroup, not just aggregate metrics.'
  common_mistake: Conflating equalized odds with equal accuracy. A model can have 90% accuracy for both
    groups but still violate equalized odds if the error types differ.
  napkin_math: 'Equal accuracy hides disparities in error types. Assume a loan model has 90% accuracy
    for both genders. For Men: True Positive Rate (TPR) = 0.95, False Positive Rate (FPR) = 0.15. For
    Women: TPR = 0.80, FPR = 0.05. Accuracies match, but Equalized Odds demands identical TPR and FPR.
    Here, TPR difference is |0.95-0.80| = 0.15, and FPR difference is |0.15-0.05| = 0.10. Disparity exists.'
