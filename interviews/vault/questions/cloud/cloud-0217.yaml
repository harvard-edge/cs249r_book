title: The CPU Preprocessing Bottleneck
scenario: Your LLM serving endpoint should deliver 128 tokens/s for a 13B model (bandwidth-bound theoretical max). But you're measuring only 15 tokens/s. `nvidia-smi` shows GPU utilization flickering between 0% and 95% in a sawtooth pattern. CPU utilization is pegged at 100% on one core.
question: Where's the bottleneck causing the 15 tokens/s rate and sawtooth GPU utilization?
details:
  realistic_solution: 'The sawtooth pattern (0% → 95% → 0% → 95%) means the GPU is alternating between waiting for input and processing it. The CPU is the bottleneck — specifically, the tokenizer and/or detokenizer running in Python on a single core. The Python GIL ensures only one thread executes Python bytecode at a time. The serving pipeline is: (1) CPU tokenizes input (Python, single-threaded) → (2) GPU runs model forward pass → (3) CPU detokenizes output token (Python, single-threaded) → (4) CPU samples next token → repeat. If tokenization + detokenization + sampling takes 50 ms on CPU, but the GPU forward pass takes only 7.8 ms, the GPU is idle for $50 / (50 + 7.8) = 87\%$ of the time. Effective throughput: $1000 / (50 + 7.8) = 17.3$ tokens/s — matching the observed 15 tokens/s (with overhead). Fix: (1) use a Rust/C++ tokenizer (HuggingFace `tokenizers` library) that''s 10–50× faster than pure Python; (2) batch tokenization — tokenize multiple requests simultaneously; (3) move sampling to GPU (`torch.multinomial` on CUDA); (4) use a C++ serving runtime (TensorRT-LLM, vLLM''s C++ backend) that eliminates the Python hot path.'
  common_mistake: |
    **The Pitfall:** Blaming the model size or batch size.
    **The Rationale:** Candidates see slow generation and assume the GPU is saturated or the model requires tensor parallelism, completely ignoring the single-core CPU pinning.
    **The Consequence:** Deploying complex multi-GPU setups that fail to improve throughput because the Python GIL and single-threaded tokenizer remain the true bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 13B FP16 model weight read = 26 GB. Memory bandwidth = 3,350 GB/s.
       - Current throughput = 15 tokens/s (66.7 ms/token).
    2. **Calculations:**
       - GPU forward pass: 26 GB / 3,350 GB/s ≈ 7.8 ms/token.
       - Unoptimized CPU overhead: 66.7 ms - 7.8 ms = 58.9 ms.
       - GPU idle fraction: 58.9 / (58.9 + 7.8) = 88%.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound.** Rust tokenizer + GPU sampling drops CPU overhead to 0.15ms, achieving 126 tokens/s.
