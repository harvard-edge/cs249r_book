title: Hedged Requests for LLM Inference on A100 Fleet
scenario: You operate an LLM inference fleet serving 500-token generation requests. P99 latency is 4.2s against a 3s SLA. The tail is caused by ~1% of requests hitting overloaded replicas. You're considering hedged requests — sending duplicate requests to a second replica after a timeout.
question: What hedge timeout and safeguards would you use to bring P99 below 3s without causing a load cascade?
details:
  realistic_solution: Set hedge timeout at P75 latency (~1.8s) so only ~25% of requests get hedged, adding ~25% load. Implement cancellation tokens so the slower replica aborts generation once the faster one completes. Track hedge rate as a metric and back off if it exceeds 30%.
  common_mistake: |
    **The Pitfall:** Setting the hedge timeout too low (e.g., 100ms) or failing to implement cancellation tokens.
    **The Rationale:** Candidates treat LLM inference like stateless microservices, forgetting that autoregressive decode is computationally heavy and not idempotent.
    **The Consequence:** Doubling the effective load on the fleet, pushing utilization above 100%, and causing a catastrophic cascading failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hedge timeout set at P75 latency (~1.8s).
    - ~25% of requests get hedged.
    - Current fleet utilization: 70%.

    **Calculations:**
    - Effective load with 25% hedging: 0.70 * 1.25 = 0.875 (Safe).
    - If hedge rate rises to 50%: 0.70 * 1.50 = 1.05 (Over capacity).

    **Conclusion & Interpretation:**
    - **Result: Fleet-Capacity Bound.** Must track hedge rate and use cancellation tokens to prevent a catastrophic cascade failure.
