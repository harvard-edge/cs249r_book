title: Hedged Requests for LLM Inference on A100 Fleet
scenario: You operate an LLM inference fleet on A100 (80GB HBM2e, 2TB/s) serving 500-token
  generation requests. P99 latency is 4.2s against a 3s SLA. The tail is caused by
  ~1% of requests hitting overloaded replicas. You're considering hedged requests
  — sending duplicate requests to a second replica after a timeout.
question: What hedge timeout and safeguards would you use to bring P99 below 3s without
  causing a load cascade?
details:
  realistic_solution: Set hedge timeout at P75 latency (~1.8s) so only ~25% of requests
    get hedged, adding ~25% load. Implement cancellation tokens so the slower replica
    aborts generation once the faster one completes. Track hedge rate as a metric
    and back off if it exceeds 30%.
  common_mistake: Setting hedge timeout too low (e.g. 100ms) doubles effective load
    on the fleet, pushing average utilization above 90% and causing cascade failure.
    LLM decode is autoregressive and not idempotent — cancellation must be implemented
    carefully.
  napkin_math: 'Fleet at 70% utilization with 25% hedging: effective load = 0.70 *
    1.25 = 0.875. Still safe. If hedge rate rises to 50%: 0.70 * 1.50 = 1.05 — over
    capacity. Each A100 at 400W * 1.25 hedge rate = 500W effective power draw; verify
    thermal headroom.'
