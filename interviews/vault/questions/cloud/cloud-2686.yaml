title: Training Compute Budget Allocation
scenario: 'You have a fixed compute budget of 1e22 FLOPs. Option A: train a 3B model on 560B tokens. Option B: train a 7B model on 240B tokens. Option C: train a 1B model on 1.67T tokens. All use the 6ND approximation.'
question: 'Which option produces the best model according to Chinchilla scaling laws, and why?'
details:
  realistic_solution: 'Verify budgets: A: 6 × 3B × 560B = 1.008e22. B: 6 × 7B × 240B = 1.008e22. C: 6 × 1B × 1.67T = 1.002e22. Chinchilla scaling laws found that optimal training requires roughly 20 tokens per parameter. Check ratios: A: 560B/3B = 187 tokens/param. B: 240B/7B = 34 tokens/param. C: 1.67T/1B = 1,670 tokens/param. The Chinchilla-optimal point is ~20 tokens/param. Option B likely produces the best model because it is closest to the compute-optimal frontier.'
  common_mistake: |
    **The Pitfall:** Maximizing token count (C) or model size without checking the ratio.
    **The Rationale:** Assuming more data or more parameters always linearly equals a better model.
    **The Consequence:** Wasting massive compute budgets undertraining a large model or pushing a small model far past its plateau of diminishing returns.
  napkin_math: |
    - **Chinchilla Optimal Ratio:** ~20 tokens/param.
    - **Option A:** 560B / 3B = 187 tokens/param (heavily over-trained).
    - **Option B:** 240B / 7B = 34 tokens/param (near optimal).
    - **Option C:** 1.67T / 1B = 1670 tokens/param (massively over-trained).
    - **Conclusion:** **Option B is closest to 20, producing the highest quality model for the FLOP budget.**
