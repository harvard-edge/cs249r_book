title: Cloud Ultra Ethernet L5 0
scenario: For a new 2048-GPU training cluster, you must choose between InfiniBand NDR (400 Gbps, proven,
  $$$) and Ultra Ethernet (400 Gbps, newer, $$). The job is a 175B GPT model trained over 60 days. Evaluate
  the trade-offs.
question: "For a 2048-GPU, 60-day 175B GPT training run, would you choose InfiniBand NDR or Ultra Ethernet, and why?"
details:
  realistic_solution: 'InfiniBand NDR: mature ecosystem, NCCL optimized for IB, SHARP in-network reduction
    reduces AllReduce latency by 2x, proven at scale (10K+ GPUs). Cost: ~$15K per port. Ultra Ethernet:
    30-40% cheaper per port (~$9K), uses commodity switches, packet spraying gives good bandwidth utilization,
    but ecosystem is newer — driver maturity, NCCL backend optimization, and operational tooling are less
    proven. For a 60-day critical training run, the risk of UE debugging delays could cost more than IB''s
    price premium. For inference or less time-critical workloads, UE''s cost advantage is compelling.'
  common_mistake: Choosing purely on per-port cost without considering ecosystem maturity. A 5% reduction
    in effective AllReduce bandwidth due to immature NCCL support could add 3+ days to a 60-day training
    run.
  napkin_math: '2048 ports. IB: 2048 × $15K = $30.7M. UE: 2048 × $9K = $18.4M. Savings: $12.3M. But 1
    day of 2048-GPU downtime = 2048 × 24h × $2/hr = $98K. If UE issues cause 5 days of debugging: $490K.
    Still saves $11.8M — if it works.'
