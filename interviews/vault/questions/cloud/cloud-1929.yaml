title: Diagnosing Production Drift in Chest X-Ray Triage
scenario: 'You deploy a ResNet-152 model for chest X-ray triage. During offline cross-validation, ROC-AUC is 0.985. Upon zero-shot deployment to a new partner hospital, ROC-AUC plummets to 0.62. The input resolution and inference latency remain identical. Saliency maps reveal the model heavily activates on a "PORTABLE" text artifact from a specific manufacturer''s scanner used primarily for critical care patients in the original hospital.'
question: What failure mode explains the AUC drop to 0.62 at the new hospital, and what corrective action should you take?
details:
  realistic_solution: |
    Diagnose the spurious correlation (shortcut learning) via feature attribution. Mitigate it by masking the text artifacts in the training data and utilizing Group Distributionally Robust Optimization (Group DRO) or Invariant Risk Minimization (IRM) to force the network to learn causal anatomical features.
  common_mistake: |
    **The Pitfall:** Assuming the drop is due to standard covariate shift (like contrast/brightness) and blindly initiating distributed retraining with photometric data augmentation.
    **The Rationale:** Engineers often default to standard augmentations without diagnosing shortcut learning via feature attribution.
    **The Consequence:** Retraining fails to remove the predictive artifact, and the model continues to perform poorly in the target domain.
  napkin_math: |
    - **Source Domain**: Assume the 'PORTABLE' tag appears in 90k positive (critical care) and 5k negative cases in the training set. The model learns `P(Sick | Tag) = 90k / 95k = 94.7%`.
    - **Target Domain (New Hospital)**: Uses portable scanners for 100% of ICU patients, including routine non-sick scans.
    - **False Positives**: Out of 10k patients (1k sick, 9k healthy), the model predicts 'Sick' for all 10k based on the tag.
    - **Final Result**: Precision drops to **10%** (`1k / 10k`), drastically reducing the AUC.
