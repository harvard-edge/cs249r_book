title: Diagnosing Production Drift in Chest X-Ray Triage
scenario: You deploy a ResNet-152 model trained on 2 million chest X-rays across a 32x A100 cluster to
  triage pneumothorax cases. During offline cross-validation, the model achieves an ROC-AUC of 0.985.
  However, upon zero-shot deployment to a newly acquired partner hospital, the ROC-AUC instantly plummets
  to 0.62. The input resolution (1024x1024), pixel intensity distribution, and inference latency (45ms
  on T4 GPUs) remain identical to the training environment. Visualizing saliency maps reveals the model
  heavily activates on the top-right corner of images from the source dataset, where a specific manufacturer's
  scanner burned in 'PORTABLE' text—a scanner primarily used for non-ambulatory, critical care patients
  in the original hospital. Analyze this failure mode and determine the corrective action.
question: "What failure mode explains the AUC drop to 0.62 at the new hospital, and what corrective action should you take?"
details:
  realistic_solution: Diagnose the spurious correlation (shortcut learning) via feature attribution. Mitigate
    it by masking the text artifacts in the training data and utilizing Group Distributionally Robust
    Optimization (Group DRO) or Invariant Risk Minimization (IRM) to force the network to learn causal
    anatomical features.
  common_mistake: Assuming the drop is due to standard covariate shift (like contrast/brightness differences)
    and blindly initiating distributed retraining with standard photometric data augmentation, which fails
    to remove the predictive artifact.
  napkin_math: 'Source Domain: ''PORTABLE'' tag appears in 90k positive cases and 5k negative cases. Model
    learns P(Sick | Tag) = 90k/95k = 94.7%. Target Domain (New Hospital): Uses portable scanners for 100%
    of ICU patients. If there are 10k patients (1k sick, 9k healthy), the model predicts ''Sick'' for
    all 10k based on the tag, resulting in 9,000 False Positives and dropping precision from ~95% down
    to exactly 10% (1k/10k).'
