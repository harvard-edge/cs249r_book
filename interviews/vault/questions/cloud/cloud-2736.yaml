title: Failure Domain Probability
scenario: Your cluster has 8 racks, each with 1 ToR switch (MTBF=200,000 hours) and 16 GPU nodes. A 128-GPU
  training job uses all 8 racks. Calculate the probability of at least one ToR failure during a 30-day
  training run.
details:
  realistic_solution: 'The job depends on 8 ToR switches. Each has MTBF = 200,000 hours. Training duration:
    30 days × 24 = 720 hours. Probability one specific ToR survives 720 hours: P(survive) = e^(-720/200,000)
    = e^(-0.0036) ≈ 0.9964. Probability all 8 ToRs survive: P(all survive) = 0.9964^8 ≈ 0.9713. Probability
    of at least one ToR failure: 1 - 0.9713 = 0.0287 ≈ 2.9%. This means roughly a 3% chance of a rack-level
    failure (affecting 16 nodes simultaneously) during the run. If the job cannot tolerate losing 16 nodes,
    this is a meaningful risk. Compare to individual GPU failures: with 128 GPUs at MTBF=50,000h, cluster
    GPU MTBF = 50,000/128 = 390h, so GPU failures are far more frequent but less impactful per event.'
  common_mistake: Calculating per-node failure probability instead of per-failure-domain (ToR switch).
    The ToR is the single point of failure for 16 nodes.
  napkin_math: 'P(ToR failure) per switch in 720h: 1-e^(-720/200K) ≈ 0.36%. For 8 switches: 1-(1-0.0036)^8
    ≈ 2.9%. Significant for a month-long run.'
