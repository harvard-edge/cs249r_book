title: Failure Domain Probability
scenario: Your cluster has 8 racks, each with 1 ToR switch (MTBF=200,000 hours) and 16 GPU nodes. A 128-GPU training job uses all 8 racks.
question: "Calculate the probability of at least one ToR failure during a 30-day 128-GPU training run."
details:
  realistic_solution: 'The job depends on 8 ToR switches. Each has MTBF = 200,000 hours. Training duration: 30 days × 24 = 720 hours. Probability one specific ToR survives 720 hours: P(survive) = e^(-720/200,000) = e^(-0.0036) ≈ 0.9964. Probability all 8 ToRs survive: P(all survive) = 0.9964^8 ≈ 0.9713. Probability of at least one ToR failure: 1 - 0.9713 = 0.0287 ≈ 2.9%. This means roughly a 3% chance of a rack-level failure (affecting 16 nodes simultaneously) during the run. If the job cannot tolerate losing 16 nodes, this is a meaningful risk. Compare to individual GPU failures: with 128 GPUs at MTBF=50,000h, cluster GPU MTBF = 50,000/128 = 390h, so GPU failures are far more frequent but less impactful per event.'
  common_mistake: |
    **The Pitfall:** Calculating per-node or per-GPU failure probability instead of per-failure-domain (ToR switch) probability.
    **The Rationale:** Overlooking that the Top-of-Rack switch is a single point of failure that will simultaneously take down all 16 nodes beneath it.
    **The Consequence:** Misjudging the likelihood of large-scale, correlated failures that disrupt distributed training.
  napkin_math: |
    * **Training Duration:** 30 days * 24 hours = 720 hours.
    * **Probability 1 ToR Fails:** 1 - e^(-720 / 200,000) ≈ 0.0036 (0.36%).
    * **Probability 8 ToRs Survive:** (1 - 0.0036)^8 ≈ 0.9713.
    * **Probability ≥1 ToR Fails:** 1 - 0.9713 = 0.0287 ≈ 2.9%.
    * **Conclusion:** **There is roughly a 2.9% chance of a rack-level failure disrupting the 30-day run.**
