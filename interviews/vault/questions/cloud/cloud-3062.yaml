title: 'Pipeline Parallelism Recall: GPipe Bubble Overhead Formula'
scenario: You are analyzing synchronous GPipe pipeline parallelism.
question: What is the GPipe bubble fraction formula, its variables, its m→∞ limit, and the value for p=4, m=16 on H100s?
details:
  realistic_solution: 'Bubble fraction = (p-1) / (m+p-1). Variables: p = number of pipeline stages, m = number of micro-batches per mini-batch. Limit as m→∞: bubble → 0. Practical example: p=4, m=16 → (4-1)/(16+4-1) = 3/19 ≈ 15.8%. This means 15.8% of all GPU cycles are wasted waiting for the pipeline to fill or drain. With p=4 H100s, bubble overhead costs 0.158 * 700W * 4 GPUs = 442W of wasted power per training step.'
  common_mistake: |
    **The Pitfall:** Confusing the bubble fraction formula (p-1)/(m+p-1) with a simpler, incorrect version like (p-1)/m.
    **The Rationale:** Misunderstanding the total pipeline timeline, which includes both the steady state and the fill/drain phases.
    **The Consequence:** Underestimating pipeline bubble overhead, especially for small micro-batch counts, leading to inaccurate power and time-to-train estimates.
  napkin_math: |
    * **Bubble Formula:** (p-1)/(m+p-1)
    * **Concrete Example (p=4, m=16):** (4-1)/(16+4-1) = 3/19 ≈ 15.8%.
    * **Scaling (m=100):** 3/103 = 2.9%.
    * **Scaling (m=1000):** 3/1003 = 0.3%.
    * **Power Waste:** 0.158 * 700W * 4 GPUs = 442.4W wasted per step.
    * **Conclusion:** **For a 1000-step run at 1s/step, ~442kJ of energy is wasted on pipeline bubbles.**
