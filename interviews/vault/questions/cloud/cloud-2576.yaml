title: 'Cloud Deepspeed Zero L2 0'
scenario: 'Your colleague proposes using DeepSpeed ZeRO-3 for a 7B model on 4 A100 GPUs, but training is much slower than expected.'
question: 'What are ZeRO-1, ZeRO-2, and ZeRO-3, and why might ZeRO-3 be overkill for a 7B model on 4 A100s?'
details:
  realistic_solution: 'ZeRO-1: partitions only optimizer states across GPUs. For AdamW with 7B params: OS = 84 GB total, sharded to 21 GB each. Minimal extra communication. ZeRO-2: adds gradient partitioning. Gradients reduced and immediately discarded per GPU. Saves ~14 GB per GPU. Modest communication increase. ZeRO-3: partitions parameters themselves. Each GPU holds 1/N of weights, requiring all-gather before every layer. Massive communication increase. For 7B on 4 A100s: ZeRO-1 gives each GPU 14+14+21 = 49 GB — fits easily in 80 GB. ZeRO-3 is unnecessary and adds all-gather overhead for every layer in both forward and backward passes, explaining the slowdown.'
  common_mistake: |
    **The Pitfall:** Always using the highest ZeRO stage for maximum memory savings.
    **The Rationale:** Candidates assume more memory savings is universally better, without considering the nonlinear communication overhead.
    **The Consequence:** Unnecessary all-gather operations for every layer drastically slow down training when a lower stage (ZeRO-1) already perfectly fits in memory.
  napkin_math: |
    - **Parameters**: 7B. Optimizer States (OS) = 84 GB. Gradients = 14 GB. Weights = 14 GB.
    - **ZeRO-1**: 14 (W) + 14 (G) + 84/4 (OS) = 49 GB per GPU. **Fits in 80GB!**
    - **ZeRO-2**: 14 (W) + 14/4 (G) + 84/4 (OS) = 38.5 GB per GPU.
    - **ZeRO-3**: (14+14+84)/4 = 28 GB per GPU.
    - **ZeRO-3 Overhead**: 2 all-gathers per layer (fwd+bwd) × 14 GB total = 28 GB extra comm per step. At 50 GB/s cross-node: **+0.56s per step**.
