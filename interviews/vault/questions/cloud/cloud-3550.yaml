title: Real-Time Anomaly Detection on High-Throughput Sensor Data with H100 Accelerators
scenario: Your team is tasked with designing a real-time anomaly detection system for industrial IoT sensors generating 100M events/second (1KB per event). The pipeline must achieve sub-100ms end-to-end latency using complex deep learning models on a cluster of NVIDIA H100 GPUs (700W peak).
question: How would you design a resilient H100 event-stream pipeline for 100M events/s with sub-100 ms anomaly alerts?
details:
  realistic_solution: Implement a Kafka-based event-driven architecture for ingestion, leveraging Kafka Streams or Flink for initial data enrichment and feature engineering. Utilize a distributed inference framework (e.g., Triton Inference Server, TorchServe) deployed on Kubernetes, orchestrating H100 GPU clusters for low-latency model inference. Employ a tiered storage strategy (e.g., S3 for raw data archiving, Redis/Aerospike for real-time feature stores). Design for stateless processing where possible, using materialized views for state management. Implement robust monitoring, alerting, and auto-scaling mechanisms based on ingestion rates and processing loads.
  common_mistake: |
    **The Pitfall:** Overlooking data skew and backpressure in stream processing, or underestimating the I/O bottleneck.
    **The Rationale:** Assuming GPU compute is the sole limiting factor ignores the massive 100 GB/s network ingestion requirement. Failing to manage state properly in a streaming system leads to dropped events or severe latency spikes.
    **The Consequence:** A fragile pipeline that crashes under load, drops critical anomaly events, and fails to meet latency SLAs.
  napkin_math: |
    - 100M events/second × 1KB/event = 100 GB/s network bandwidth.
    - Assume each H100 processes 50,000 inferences/second.
    - At a 90% utilization target (45,000/s effective), we need: 100M / 45,000 = 2,223 GPUs.
    - Total peak power = 2,223 GPUs * 700W/GPU = 1.556 MW.
    - **The cluster requires ~2,223 GPUs and over 1.5 MW of power, demanding a massive distributed stream architecture.**
