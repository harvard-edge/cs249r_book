title: Real-Time Anomaly Detection on High-Throughput Sensor Data with H100 Accelerators
scenario: Your team is tasked with designing a real-time anomaly detection system
  for industrial IoT sensors. These sensors generate a continuous stream of high-volume,
  high-velocity data (e.g., 100TB/day, 100M events/second) that needs to be processed
  with ultra-low latency (sub-100ms end-to-end). The anomalies are subtle and require
  complex deep learning models for detection. You have access to a cluster of NVIDIA
  H100 GPUs, each with 80 GB HBM3, capable of 989 TFLOPS FP16 dense computation, and
  3.35 TB/s memory bandwidth, operating at 700W. Design an event-driven ingestion
  and stream processing pipeline that leverages these H100 accelerators to identify
  anomalies in real-time, compute real-time features, and alert operators, ensuring
  resilience, scalability, and cost-efficiency in a cloud environment.
question: How would you design a resilient H100 event-stream pipeline for 100M events/s
  with sub-100 ms anomaly alerts?
details:
  realistic_solution: Implement a Kafka-based event-driven architecture for ingestion,
    leveraging Kafka Streams or Flink for initial data enrichment and feature engineering.
    Utilize a distributed inference framework (e.g., Triton Inference Server, TorchServe)
    deployed on Kubernetes, orchestrating H100 GPU clusters for low-latency model
    inference. Employ a tiered storage strategy (e.g., S3 for raw data archiving,
    Redis/Aerospike for real-time feature stores). Design for stateless processing
    where possible, using materialized views for state management. Implement robust
    monitoring, alerting, and auto-scaling mechanisms based on ingestion rates and
    processing loads.
  common_mistake: Overlooking data skew and backpressure in stream processing, leading
    to dropped events or increased latency. Underestimating the I/O bottleneck when
    feeding data to high-throughput accelerators like the H100, assuming GPU compute
    is the sole limiting factor. Not properly managing model versioning and deployment
    in a real-time inference pipeline without service interruption.
  napkin_math: 'Given 100M events/second and an average event size of 1KB, network bandwidth is 100 GB/s.
    If each H100 processes 50,000 inferences/second, at a 90% utilization target (45,000/s effective),
    we need 100M / 45,000 = 2,223 GPUs. Total peak power = 2,223 GPUs * 700W/GPU = 1.556 MW.'
