title: The Prefill vs. Decode Dilemma
scenario: You are optimizing an LLM serving system for a code completion assistant on H100s. The user
  experience is sensitive to both TTFT (time to first suggestion) and TPOT (throughput of the generated
  code block). Your profiler shows that prompt processing (prefill) is compute-bound, while token generation
  (decode) is memory-bound. To improve TPOT, a team member suggests doubling the batch size. Examine the
  relationship between batching, prefill, and decode. Differentiate the impact of increasing the batch
  size on TTFT versus TPOT and explain why the suggestion might harm the user experience.
details:
  realistic_solution: 'The suggestion is based on a misunderstanding of LLM inference bottlenecks. We
    need to analyze the two phases separately:'
  common_mistake: Conflating throughput (tokens/sec) with latency (ms/token). Engineers often assume that
    techniques to improve aggregate throughput, like larger batches, will improve per-user perceived latency.
    For LLM serving, the opposite is often true. The decode step is memory-bandwidth bound, so a larger
    batch doesn't make token generation much faster but significantly increases the queueing and prefill
    time, hurting TTFT.
  napkin_math: 'Model a 70B model (140GB) on H100 (989 TFLOPS, 3.35 TB/s). Prefill (1000 tokens) is compute-bound:
    2 * 70B * 1000 = 140 TFLOPs. Time = 140 / 989 = 141ms. Decode is memory-bound, reading the entire
    140GB model per token: 140GB / 3.35TB/s = 41.8ms/token. You cannot optimize both simultaneously; raising
    batch size improves decode throughput but exponentially delays prefill.'
