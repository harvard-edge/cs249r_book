title: The Prefill vs. Decode Dilemma
scenario: You are optimizing an LLM serving system for a code completion assistant on H100s. The user experience is sensitive to both TTFT (time to first suggestion) and TPOT (throughput of the generated code block). Your profiler shows that prompt processing (prefill) is compute-bound, while token generation (decode) is memory-bound. A team member suggests doubling the batch size.
question: "Why might doubling batch size improve aggregate TPOT but harm TTFT and user experience for the code completion assistant?"
details:
  realistic_solution: 'The suggestion is based on a misunderstanding of LLM inference bottlenecks. We need to analyze the two phases separately.'
  common_mistake: |
    **The Pitfall:** Conflating throughput (tokens/sec) with latency (ms/token).
    **The Rationale:** Engineers assume that techniques to improve aggregate throughput, like larger batches, will improve per-user perceived latency.
    **The Consequence:** A larger batch significantly increases queueing and prefill time, hurting TTFT without speeding up memory-bound token generation for the user.
  napkin_math: |
    1. Model a 70B model (140 GB) on H100 (989 TFLOPS, 3.35 TB/s).
    2. Prefill (1000 tokens) is compute-bound: 2 * 70B * 1000 = 140 TFLOPs. Time = 140 / 989 = 141 ms.
    3. Decode is memory-bound, reading the entire 140 GB model per token: 140 GB / 3.35 TB/s = 41.8 ms/token.
    4. **You cannot optimize both simultaneously; raising batch size improves decode throughput but exponentially delays prefill.**
