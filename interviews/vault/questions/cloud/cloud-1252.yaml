title: Rack-Aware Capacity Provisioning
scenario: You are deploying an LLM serving fleet that requires a strictly enforced baseline capacity of 48 H100 GPUs (packaged as 6 physical 8-GPU nodes) to meet peak SLA throughput requirements. Your datacenter's primary failure domain is the rack, as nodes within a rack share Top-of-Rack (ToR) switches and PDUs. You must guarantee the 6-node baseline capacity remains available even if an entire rack experiences a catastrophic failure.
question: "How many total nodes are needed to survive one rack failure when spreading the 6-node baseline across 3 racks versus 4 racks?"
details:
  realistic_solution: You must treat the rack itself as the unit of redundancy. If you have R racks, the remaining (R-1) racks must be able to support the entire 6-node baseline. Distributing across 4 racks requires fewer total nodes (8) than distributing across 3 racks (9).
  common_mistake: |
    **The Pitfall:** Applying standard N+1 node redundancy (provisioning 7 total nodes).
    **The Rationale:** Candidates ignore the failure domain boundary and treat nodes as perfectly independent failure units.
    **The Consequence:** When a rack containing multiple nodes fails, the fleet drops below the 6-node baseline, violating the SLA.
  napkin_math: |
    1. Formula: Nodes_per_rack = ceil(Baseline_Nodes / (Total_Racks - 1)).
    2. For 3 Racks: Nodes_per_rack = ceil(6 / 2) = 3. Total provisioned = 3 racks * 3 nodes = 9 nodes (50% overhead).
    3. For 4 Racks: Nodes_per_rack = ceil(6 / 3) = 2. Total provisioned = 4 racks * 2 nodes = 8 nodes (33% overhead).
    4. **Distributing across 4 racks requires fewer total nodes (8) than 3 racks (9).**
