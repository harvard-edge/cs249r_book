title: The Retraining Math
scenario: Our model degrades by 1% accuracy every week. Retraining the model costs us $50,000 in GPU time.
  A 1% accuracy drop costs the business $100,000 a week. Exactly how often should we trigger a retraining
  pipeline?
question: "Exactly how often should we trigger a retraining pipeline?"
details:
  realistic_solution: Cost-aware automation. You do not retrain based on a calendar; you retrain when
    the cumulative cost of performance degradation intersects with the fixed cost of retraining. This
    is the Retraining Staleness Model. You must formulate the threshold mathematically so the MLOps pipeline
    triggers training autonomously when the financial math dictates it.
  common_mistake: '"Retrain weekly since the cost of degradation ($100k) exceeds the cost of retraining
    ($50k)." This is directionally right but not optimal.'
  napkin_math: 'Degradation cost accumulates: week 1 = $100k, week 2 = $200k (additional that week), cumulative
    after week 2 = $300k, week 3 = $300k (additional), cumulative after week 3 = $600k. Retraining costs
    $50k. Optimal retrain point: when cumulative degradation cost = retraining cost. $\sum_{i=1}^{n} 100k
    \times i > 50k$ → retrain roughly every $\sqrt{2 \times 50k / 100k} \approx 1$ week. But if retraining
    cost were $500k, optimal interval stretches to ~3 weeks.'
