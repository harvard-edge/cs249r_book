title: The Retraining Math
scenario: A production model degrades by 1% accuracy every week. Retraining the model costs $50,000 in GPU time. A 1% accuracy drop costs the business $100,000 a week.
question: Exactly how often should you trigger a retraining pipeline to minimize total costs?
details:
  realistic_solution: Cost-aware automation. You do not retrain based on a calendar; you retrain when the cumulative cost of performance degradation intersects with the fixed cost of retraining. This is the Retraining Staleness Model. You must formulate the threshold mathematically so the MLOps pipeline triggers training autonomously when the financial math dictates it.
  common_mistake: |
    **The Pitfall:** Triggering retraining based on a static calendar schedule.
    **The Rationale:** Candidates default to simple chron-jobs (e.g., "retrain monthly") without mathematically modeling the intersection of degradation costs and compute costs.
    **The Consequence:** The business either burns money on unnecessary GPU time or leaks revenue to unmitigated model drift.
  napkin_math: |
    *   **Cost of degradation:** $100k/week per week of staleness.
    *   **Cost function:** Average cost per week = (Retraining Cost + Cumulative Degradation) / $T$.
    *   **Continuous formulation:** $\frac{50k + \int_0^T 100k \cdot t \, dt}{T} = \frac{50k + 50k \cdot T^2}{T} = \frac{50k}{T} + 50k \cdot T$.
    *   **Optimization:** Take the derivative with respect to $T$ and set to zero: $-\frac{50k}{T^2} + 50k = 0 \rightarrow T^2 = 1$.
    *   **Result:** The optimal retraining interval is exactly **1 week**.
