math_issues:
- The cumulative cost math is incorrect. If the model degrades 1% every week and 1% costs $100k/week,
  the weekly costs are 100k, 200k, 300k, making the cumulative costs 100k, 300k, 600k. The text states
  'week 2 = $200k cumulative, week 3 = $300k', which implies a flat 100k/week cost, contradicting the
  compounding nature of the degradation.
