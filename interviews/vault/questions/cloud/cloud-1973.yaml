title: Streaming Architecture for Strict Ad-Bidding SLAs
scenario: You are designing the ingestion tier for a global ad-bidding platform that receives 500,000 bid requests per second. The system must enrich each event with a 2KB user profile and evaluate a model within a strict 30ms P99 end-to-end latency budget.
question: "Would you choose Flink with local state or Spark Streaming with Redis for 500,000 bid requests/sec under a 30ms P99 SLA, and why?"
details:
  realistic_solution: Adopt a pure streaming architecture utilizing an embedded state backend (like RocksDB) on local NVMe SSDs. This eliminates remote network hops for data enrichment, guaranteeing the 30ms P99 SLA at the cost of more complex state rebalancing during node failures.
  common_mistake: |
    **The Pitfall:** Choosing micro-batching with an external Redis cluster for operational simplicity.
    **The Rationale:** Engineers default to familiar remote KV stores without calculating the network latency penalty at extreme scale.
    **The Consequence:** P99 network round-trips for 500k RPS lookups easily violate the strict 30ms SLA.
  napkin_math: |
    *   **Remote Redis:** ~15ms batch + 2ms fetch + 10ms model = 27ms (leaves only 3ms for network jitter).
    *   **Local RocksDB (Flink):** 0ms batch + 0.1ms fetch + 10ms model = 10.1ms.
    *   **Result:** **Embedded local state (RocksDB) leaves a 20ms buffer, safely guaranteeing the 30ms SLA.**
