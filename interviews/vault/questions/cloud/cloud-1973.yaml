title: Streaming Architecture for Strict Ad-Bidding SLAs
scenario: You are designing the ingestion tier for a global ad-bidding platform that receives 500,000
  bid requests per second. The system must enrich each event with a 2KB user profile and evaluate a model
  within a strict 30ms P99 end-to-end latency budget. Evaluate whether to use a pure streaming engine
  (e.g., Apache Flink) with local state versus a micro-batching engine (e.g., Spark Streaming) with a
  remote in-memory KV store (e.g., Redis). Justify your design decision focusing on backpressure handling,
  state management, and the latency breakdown.
details:
  realistic_solution: Adopt a pure streaming architecture utilizing an embedded state backend (like RocksDB)
    on local NVMe SSDs. This eliminates remote network hops for data enrichment, guaranteeing the 30ms
    P99 SLA at the cost of more complex state rebalancing during node failures.
  common_mistake: Candidates often choose micro-batching with Redis for operational simplicity, failing
    to evaluate the P99 network latency overhead of 500k RPS remote point lookups which easily violates
    the 30ms SLA.
  napkin_math: 'Remote Redis lookup: ~2ms P99 network round-trip. Micro-batch scheduling overhead: ~15ms.
    15ms (batch) + 2ms (fetch) + 10ms (model) = 27ms, leaving only a 3ms buffer for network jitter before
    missing the 30ms SLA. Local NVMe RocksDB read: ~100µs. 0ms (no batch) + 0.1ms (fetch) + 10ms (model)
    = 10.1ms, leaving an ample 20ms buffer.'
