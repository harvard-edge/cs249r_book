title: 800G Migration Link Budget Trade-offs
scenario: 'Your datacenter is upgrading 2,000 intra-rack links from 400G to 800G. The 800G standard uses PAM4 at 100G per lane (8 lanes). Existing copper DACs fail link budget at 800G beyond 1.5m, but your rack depth requires 2m cables. Options: (A) active copper cables ($200 each), (B) optical transceivers ($600/pair), (C) redesign rack layout for 1.5m reach to allow passive copper DACs ($100 each). Assume power costs $0.10/kWh and links are powered 24/7.'
question: For 2,000 intra-rack 800G links needing 2m cables, evaluate the Total Cost of Ownership over a 3-year timeline to determine whether you should use active copper, optical transceivers, or redesign racks for passive copper.
details:
  realistic_solution: |
    Run a fully-loaded 3-year OpEx/CapEx model. Option A (Active Copper) is the cheapest drop-in fix ($400K) but adds 14kW continuous power load. Option B (Optical) runs $1.2M CapEx and is prohibitively expensive for short intra-rack spans. Option C (Rack Redesign) costs $700K upfront but ensures 0W continuous overhead. Option C pays for itself over longer timelines and guarantees compatibility for future multi-terabit upgrades. 
  common_mistake: |
    **The Pitfall:** Choosing the cheapest upfront option (Active Copper) without calculating the long-term OpEx impact of power consumption.
    **The Rationale:** Network engineers often budget strictly for CapEx on cables without integrating continuous power and cooling costs into the link budget analysis.
    **The Consequence:** At large scale (thousands of links), the 5-8W per active cable adds massive continuous power draw and cooling load, potentially straining rack power density limits and significantly inflating the 3-year TCO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2,000 intra-rack 800G links, 2m reach.
       - Power cost: $0.10/kWh.
       - Option A: Active Copper ($200 CapEx, 7W Power).
       - Option B: Optical ($600 CapEx, 1W Power).
       - Option C: Passive Redesign ($500K Rack Redesign, $100 CapEx, 0W Power).
    2. **Calculations:**
       - Active Copper (Option A): 2,000 * $200 = $400K CapEx. Power = 14kW * 26,280h * $0.10 = ~$37K. Total = $437K.
       - Optical (Option B): 2,000 * $600 = $1.2M CapEx. Power = 2kW * 26,280h * $0.10 = ~$5K. Total = $1.2M.
       - Passive Redesign (Option C): $500K CapEx + (2,000 * $100) = $700K Total. Power = $0.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound OpEx.** While Active Copper is $263K cheaper upfront than a Rack Redesign, the continuous 14kW power draw will eventually erode the savings. Option C is the optimal long-term TCO choice for new builds, while Option A is best for retrofits.
