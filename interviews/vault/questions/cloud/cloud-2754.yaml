title: Alert Consolidation Math
scenario: 'You have 50 models with 5 alert rules. 80% of the 200 daily alerts come from 3 noisy rules with a 90% false positive rate. You switch these 3 rules to anomaly detection, cutting their FP rate to 20%.'
question: 'How many alerts per day are reduced by moving the 3 noisy rules to anomaly detection?'
details:
  realistic_solution: 'Current state: 160 alerts from noisy rules. At 90% FP, 16 are true and 144 are false. After anomaly detection (20% FP), the 16 true alerts represent 80% of total noisy alerts. New noisy alerts = 16 / 0.8 = 20. Non-noisy rules remain at 40. Total = 60. Reduction = 140.'
  common_mistake: |
    **The Pitfall:** Calculating the reduction only on total overall alerts.
    **The Rationale:** Candidates apply the FP reduction globally, forgetting 2 rules are unchanged.
    **The Consequence:** Inaccurate estimates undermine trust in observability improvements.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 total alerts. Noisy rules = 160 alerts (90% FP).
    - Unchanged rules = 40 alerts.
    - New FP rate for noisy rules = 20%.
    
    **Calculations:**
    - Old True Alerts (Noisy): 160 * (1 - 0.90) = 16.
    - New Noisy Total: True alerts (16) must be 80% of total. 16 / 0.8 = 20.
    - New Total Alerts: 20 (noisy) + 40 (unchanged) = 60.
    - Reduction: 200 - 60 = 140.
    
    **Conclusion & Interpretation:**
    - **Result: 140 alerts reduced (Signal-Bound)**. False positives drop drastically while retaining all 16 true anomalies.
