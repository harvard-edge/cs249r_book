title: Alert Consolidation Math
scenario: You have 50 models, each with 5 alert rules (accuracy, latency, error rate, data freshness,
  throughput). Historical data shows 80% of alerts are from 3 rules (accuracy, data freshness, throughput)
  that fire frequently due to normal variance. Calculate how many alerts per day you reduce by switching
  these 3 rules from static thresholds to anomaly detection (expected to cut their false positive rate
  from 90% to 20%).
details:
  realistic_solution: 'Current state: 50 models × 5 rules = 250 alert sources. The 3 noisy rules across
    50 models: 150 sources. These fire 80% of total alerts. Total alerts/day (estimated): if 200/day,
    then 160 come from the 3 noisy rules. Current false positive rate for noisy rules: 90%. True alerts
    from noisy rules: 160 × 10% = 16/day. False alerts: 160 × 90% = 144/day. After anomaly detection (20%
    FP rate): same 16 true alerts. False alerts: 16/(1-0.20) × 0.20 = 4 false alerts (from 20 total alerts).
    New total from noisy rules: 20/day. Non-noisy rules unchanged: 40/day. New total: 60/day (down from
    200). Reduction: 140 alerts/day (70% reduction). Signal-to-noise ratio improves from 10% true positives
    to 33.3%.'
  common_mistake: Calculating reduction only on total alerts without considering that the remaining 2
    rules (latency, error rate) still fire at their original rate. The overall reduction depends on the
    mix.
  napkin_math: 'Before: 200 alerts/day, 10% true positive. After anomaly detection on 3 noisiest rules:
    60 alerts/day, 33.3% true positive. 70% fewer alerts, 3.3x better signal.'
