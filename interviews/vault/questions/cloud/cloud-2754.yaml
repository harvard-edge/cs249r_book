title: Alert Consolidation Math
scenario: 'You have 50 models, each with 5 alert rules (accuracy, latency, error rate, data freshness, throughput). Historical data shows 80% of alerts are from 3 rules (accuracy, data freshness, throughput) that fire frequently due to normal variance. You switch these 3 rules from static thresholds to anomaly detection, cutting their false positive rate from 90% to 20%.'
question: 'Assuming 200 alerts per day initially, how many alerts per day are reduced by moving the 3 noisy rules to anomaly detection?'
details:
  realistic_solution: 'Current state: 200 alerts/day. 160 come from the 3 noisy rules. Current false positive rate for noisy rules is 90%, meaning 16 are true alerts and 144 are false alerts. After moving to anomaly detection (20% FP rate), those same 16 true alerts now represent 80% of the generated alerts. Therefore, total new noisy alerts = 16 / 0.8 = 20 alerts/day. The non-noisy rules remain unchanged at 40/day. The new total is 60/day. The reduction is 140 alerts/day.'
  common_mistake: |
    **The Pitfall:** Calculating the reduction only on total alerts.
    **The Rationale:** Candidates forget that the remaining 2 rules (latency, error rate) still fire at their original rate, applying the 90%->20% reduction incorrectly across the board.
    **The Consequence:** Producing a wildly inaccurate estimate of the new alert volume, undermining trust in the alert consolidation effort.
  napkin_math: |
    - **Initial State:** 200 total alerts/day. 80% (160 alerts) come from the 3 noisy rules. 40 alerts from the other 2 rules.
    - **Noisy Rules Breakdown (90% FP):** 160 alerts = 16 true alerts (10%) + 144 false alerts (90%).
    - **After Anomaly Detection (20% FP):** The 16 true alerts remain. To find new total noisy alerts X, we know false alerts are 20% of X. So true alerts (16) are 80% of X. X = 16 / 0.8 = 20 alerts.
    - **New Total Alerts:** 20 (from noisy rules) + 40 (from unchanged rules) = 60 alerts/day.
    - **Result:** **140 alerts/day reduced (70% reduction)**, improving signal-to-noise ratio from 10% to 33.3%.
