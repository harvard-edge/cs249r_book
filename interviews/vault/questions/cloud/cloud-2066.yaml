title: Early Stopping vs Checkpoint Recovery
scenario: 'Your training job has been running for 72 hours. Validation loss has been increasing for the
  last 12 hours (overfitting). You have two options: (A) Stop now and use the best checkpoint from 60
  hours ago, or (B) continue training with a lower learning rate hoping loss will recover. You have no
  remaining GPU budget for a new experiment this week. Compare the expected outcomes of both strategies.'
details:
  realistic_solution: 'Option A is almost always correct. With 12 hours of monotonically increasing validation
    loss, you are in an overfitting regime. Reducing the learning rate may slow the overfitting but rarely
    reverses it — the model has already memorized training noise. The best model is the checkpoint at
    hour 60, before overfitting began. Option B risks burning the remaining compute budget (worth real
    dollars) on a low-probability recovery. The key insight: the decision should be based on the expected
    value of each option, not the sunk cost. If you have the hour-60 checkpoint, you have a deployable
    model now. Spending more GPU-hours has negative expected value because the probability of beating
    the hour-60 model is < 10% and the cost of failure is losing all remaining weekly budget.'
  common_mistake: Choosing option B out of sunk cost fallacy ('we already invested 72 hours, let's keep
    going'). The 72 hours are sunk whether you continue or not.
  napkin_math: 'Option A: 0 additional GPU-hours, model at hour-60 accuracy (known good). Option B: ~24h
    × N GPUs of additional compute, with < 10% probability of exceeding hour-60 accuracy. Expected value
    of B: 0.1 × (marginal improvement) - 0.9 × (24h × N GPUs × $3/GPU-hr of wasted budget). For N=8: risk
    = 0.9 × $576 = $518 expected loss.'
