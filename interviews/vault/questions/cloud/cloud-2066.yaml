title: Early Stopping vs Checkpoint Recovery
scenario: 'Your training job has been running for 72 hours. Validation loss has been increasing for the last 12 hours (overfitting). You have two options: (A) Stop now and use the best checkpoint from 60 hours ago, or (B) continue training with a lower learning rate hoping loss will recover. You have no remaining GPU budget for a new experiment this week.'
question: "After 12 hours of rising validation loss, should you stop at the hour-60 checkpoint or continue with a lower learning rate, and why?"
details:
  realistic_solution: 'Option A is almost always correct. With 12 hours of monotonically increasing validation loss, you are in an overfitting regime. Reducing the learning rate may slow the overfitting but rarely reverses it — the model has already memorized training noise. The best model is the checkpoint at hour 60, before overfitting began. Option B risks burning the remaining compute budget (worth real dollars) on a low-probability recovery. The key insight: the decision should be based on the expected value of each option, not the sunk cost. If you have the hour-60 checkpoint, you have a deployable model now. Spending more GPU-hours has negative expected value because the probability of beating the hour-60 model is < 10% and the cost of failure is losing all remaining weekly budget.'
  common_mistake: |
    **The Pitfall:** Choosing Option B due to the sunk cost fallacy ("we already invested 72 hours, let's keep going").
    **The Rationale:** Engineers emotionally anchor to the spent time and compute, believing that a learning rate tweak can reverse fundamental memorization of training noise.
    **The Consequence:** The remaining weekly cloud compute budget is completely burned on a run that has already mathematically failed, leaving the team with zero budget and an inferior, overfit model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - State: 12 hours of strictly increasing validation loss (regime = overfitting).
       - GPU Budget: Severely constrained (no restarts allowed).
       - Probability of recovery after severe overfitting: < 10%.
    2. **Calculations:**
       - Expected Value of A: 0 marginal cost, guarantees hour-60 model accuracy.
       - Expected Value of B: Spends ~24h × 8 GPUs × $3/hr = $576 marginal cost.
       - Return of B: 90% chance of yielding a model strictly worse than the hour-60 checkpoint.
       - EV of risk = 0.9 × -$576 = -$518 expected loss.
    3. **Conclusion & Interpretation:**
       - **Result: Negative Expected Value**. Reversing an overfitting trend with late-stage learning rate decay is highly improbable. The rational decision is to halt the run immediately and deploy the known-good checkpoint.
