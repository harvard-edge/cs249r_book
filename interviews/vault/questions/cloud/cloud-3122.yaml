title: Diagnose Head-of-Line Blocking in LLM Serving Queue
scenario: 'An LLM serving system on H100 clusters processes requests with median latency 180ms and P99 latency 4.2 seconds at 60% utilization. The service time distribution has high variance: short prompts (128 tokens) take 50ms; long prompts (8192 tokens) take 3.2 seconds. The system uses FCFS scheduling. Queueing theory analysis shows M/G/1 P99 ≈ mean × (1 + CV²×ρ/(1-ρ)) where CV is coefficient of variation.'
question: What is causing the 4.2s P99 latency at 60% utilization, and how would you fix the scheduler?
details:
  realistic_solution: 'CV of service time: mean = 0.5×50 + 0.5×3200 = 1625ms; mean² = 1625² = 2.64M; E[S²] = 0.5×50² + 0.5×3200² = 0.5×(2500+10.24M) = 5.12M. Variance = 5.12M - 2.64M = 2.48M. CV = sqrt(2.48M)/1625 = 1575/1625 = 0.97. M/G/1 wait: ρ(1+CV²)/(2(1-ρ)) × mean = 0.6×1.94/(2×0.4) × 1625 = 1.164/0.8 × 1625 = 2364ms waiting. Using the P99 approximation: P99 ≈ 1625 × (1 + 0.94×0.6/0.4) = 1625 × 2.41 = 3916ms ≈ 4.2s observed. Fix: shortest-job-first (SJF) or length-based priority queues. Short prompts (<512 tokens) get priority lane. P99 for short drops to ~200ms.'
  common_mistake: |
    **The Pitfall:** Adding more GPU capacity to reduce utilization because latency is high.
    **The Rationale:** Candidates instinctively throw hardware at performance problems without diagnosing that high service time variance (head-of-line blocking) is the true mathematical culprit at 60% utilization.
    **The Consequence:** Wasting massive capital on new H100s while P99 latency remains unacceptably high for short interactive requests.
  napkin_math: |
    - Mean service time = 0.5×50 + 0.5×3200 = 1625 ms.
    - Mean² = 2.64M. E[S²] = 0.5×(2500) + 0.5×(10.24M) = 5.12M.
    - Variance = 5.12M - 2.64M = 2.48M. CV = sqrt(2.48M)/1625 = 1575/1625 ≈ 0.97.
    - CV² ≈ 0.94.
    - M/G/1 mean wait = λE[S²]/(2(1-ρ)) = 0.6×5.12M / (2×0.4×1625) = 3072K / 1300 = 2363 ms.
    - P99 ≈ 1625 × (1 + 0.94×0.6/0.4) = 1625 × 2.41 = 3916 ms ≈ **4.2s observed**.
    - **SJF routing reduces P99 for short jobs to <300ms.**
