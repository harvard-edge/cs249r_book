title: Diagnose Head-of-Line Blocking in LLM Serving Queue
scenario: 'An LLM serving system processes requests with median latency 180ms and P99 latency 4.2 seconds at 60% utilization. The service time distribution has high variance: short prompts take 50ms; long prompts take 3.2 seconds. The system uses FCFS scheduling.'
question: "What is causing the 4.2s P99 latency at 60% utilization, and how would you fix the scheduler?"
details:
  realistic_solution: 'Queueing theory analysis shows M/G/1 P99 ≈ mean × (1 + CV²×ρ/(1-ρ)). High variance in service time leads to severe head-of-line blocking under FCFS. Fix: shortest-job-first (SJF) or length-based priority queues. Short prompts (<512 tokens) get priority lane. P99 for short drops to ~200ms.'
  common_mistake: |
    **The Pitfall:** Adding more GPU capacity to reduce utilization because latency is high.
    **The Rationale:** Candidates instinctively throw hardware at performance problems without diagnosing that high service time variance (head-of-line blocking) is the true mathematical culprit at 60% utilization.
    **The Consequence:** Wasting massive capital on new hardware while P99 latency remains unacceptably high for short interactive requests.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M/G/1 queueing, 60% utilization (ρ=0.6).
       - Service time: 50% 50ms, 50% 3200ms.
    2. **Calculations:**
       - Mean service time = 0.5*50 + 0.5*3200 = 1625 ms.
       - Mean² = 2.64M. E[S²] = 0.5*(2500) + 0.5*(10.24M) = 5.12M.
       - Variance = 5.12M - 2.64M = 2.48M. CV ≈ 0.97. CV² ≈ 0.94.
       - M/G/1 mean wait = λE[S²]/(2(1-ρ)) = 2363 ms.
       - P99 ≈ 1625 * (1 + 0.94*0.6/0.4) = 3916 ms ≈ 4.2s observed.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound**. SJF routing reduces P99 for short jobs to <300ms by bypassing long jobs.
