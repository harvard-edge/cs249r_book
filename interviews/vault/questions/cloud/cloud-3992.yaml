title: Microbatch Count Recovery Plan
scenario: A pipeline-parallel training job with 12 stages had to cut microbatches
  from 48 to 12 because activation memory exceeded HBM. The bubble fraction rose and
  throughput fell. Propose an optimization plan that recovers microbatch count without
  exceeding memory.
question: How would you recover microbatch count in a 12-stage pipeline after activation
  memory forced microbatches from 48 to 12?
details:
  realistic_solution: Use activation checkpointing, sequence parallelism, or smaller
    per-microbatch activation footprints to raise the number of microbatches. The
    goal is to restore pipeline occupancy while trading some recompute for less memory.
    If checkpointing halves activation memory, the job may raise microbatches toward
    24 or 48 depending on the memory bottleneck.
  common_mistake: Trying to fix the pipeline bubble only by adding GPUs, while ignoring
    activation memory as the constraint that reduced microbatch count.
  napkin_math: Bubble at 12 stages, 12 microbatches = 11/(12+11)=48%. At 48 microbatches
    = 11/(48+11)=19%. Recompute that enables more microbatches can recover much of
    the lost throughput.
