title: Diversity vs Relevance Tradeoff in Re-ranking
scenario: After deploying a new ranking model with higher CTR (+3%), users report
  that their feed feels 'repetitive' (content diversity score drops 40%). A/B test
  shows 7-day retention drops 5% despite the CTR gain. Diagnose the system-level cause
  of this diversity collapse and propose a re-ranking intervention that recovers diversity
  without sacrificing more than 1% CTR.
question: What system-level mechanism caused the 40% diversity collapse despite +3%
  CTR, and what re-ranking intervention would recover diversity?
details:
  realistic_solution: 'Root cause: the new ranking model has higher capacity (more
    parameters, better feature interactions). It learned that users who clicked item
    type A in the last session are very likely to click similar A items again. It
    exploits this short-term signal (recency bias) by flooding the feed with A-type
    items. This is a reward hacking problem: CTR is a short-term metric; the model
    maximizes it at the expense of long-term engagement. Feedback loop: high-CTR homogeneous
    feeds → user only sees A-type content → click history becomes all-A → model further
    concentrates on A → diversity collapses. Re-ranking intervention: Maximal Marginal
    Relevance (MMR): given a ranked list of N candidates, iteratively select the next
    item that maximizes: λ × relevance_score - (1-λ) × max_similarity_to_already_selected.
    At λ=0.85: 85% weight on relevance, 15% on diversity. This ensures no two consecutive
    top-10 items share >70% embedding similarity. Expected CTR impact: -0.8% (within
    1% budget). Expected diversity score: +25% (partial recovery from -40%). Additional
    fix: add session-diversity reward to training objective: penalize sequences with
    >3 items from the same category.'
  common_mistake: Treating diversity as a purely algorithmic problem and adding diversity
    post-hoc via random item injection. The root cause is that the ranking model learned
    to exploit user interest clusters, creating a feedback loop.
  napkin_math: 'MMR diversity penalty: assume top-100 items from ranking, greedily
    select 10 with MMR λ=0.85. For each position i, we skip items with cosine_sim
    > 0.7 to any already-selected item. In a cluster-heavy distribution: ~20% of top-100
    items are near-duplicates (cosine_sim > 0.7). MMR filters these: instead of selecting
    positions 1-10 purely by score, 2 of the top 10 are replaced by diverse items
    at positions 11-20 in the ranked list. CTR impact: positions 11-20 avg score ≈
    95% of top-10 avg score. CTR drop = 2/10 × (1-0.95) = 1% — exactly at budget.
    Diversity score: 2 diverse items in top-10 → 20% category diversity improvement.'
