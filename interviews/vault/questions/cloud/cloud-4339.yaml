title: Diversity vs Relevance Tradeoff in Re-ranking
scenario: 'After deploying a new ranking model with higher CTR (+3%), users report that their feed feels ''repetitive'' (content diversity score drops 40%). An A/B test shows 7-day retention drops 5% despite the CTR gain.'
question: "What system-level mechanism caused the 40% diversity collapse despite +3% CTR, and what re-ranking intervention would recover diversity?"
details:
  realistic_solution: 'Root cause: the new ranking model has higher capacity (more parameters, better feature interactions). It learned that users who clicked item type A in the last session are very likely to click similar A items again. It exploits this short-term signal (recency bias) by flooding the feed with A-type items. This is a reward hacking problem: CTR is a short-term metric; the model maximizes it at the expense of long-term engagement. Feedback loop: high-CTR homogeneous feeds → user only sees A-type content → click history becomes all-A → model further concentrates on A → diversity collapses. Re-ranking intervention: Maximal Marginal Relevance (MMR): given a ranked list of N candidates, iteratively select the next item that maximizes: λ × relevance_score - (1-λ) × max_similarity_to_already_selected. At λ=0.85: 85% weight on relevance, 15% on diversity. This ensures no two consecutive top-10 items share >70% embedding similarity. Expected CTR impact: -0.8% (within 1% budget). Expected diversity score: +25% (partial recovery from -40%). Additional fix: add session-diversity reward to training objective: penalize sequences with >3 items from the same category.'
  common_mistake: |
    **The Pitfall:** Treating diversity as a purely algorithmic problem and adding diversity post-hoc via random item injection.
    **The Rationale:** Failing to recognize the feedback loop where a higher-capacity model exploits short-term user recency bias.
    **The Consequence:** Destroying relevance to fix diversity, leading to further drops in user retention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Top-100 items, select 10 with MMR λ=0.85.
       - Drop items with cosine_sim > 0.7 to selected items.
    2. **Calculations:**
       - If 2 near-duplicates in top 10 are replaced from positions 11-20.
       - Positions 11-20 avg score ≈ 95% of top-10.
       - CTR drop = (2/10) * (1 - 0.95) = 1% CTR drop.
    3. **Conclusion & Interpretation:**
       - **Result: +20% diversity recovery for 1% CTR cost (Optimization-Bound).**
