title: Energy-Movement Invariant in Feature Pipelines
scenario: A recommendation system can either stream 250 MB of raw user history across the datacenter network per request, or transmit a 10 KB embedding and compute a 5 GFLOP expansion locally. Network transfer costs ~10 nJ/bit and local compute costs ~0.1 pJ/FLOP.
question: Which approach is more energy-efficient, and what is the approximate energy gap per request?
details:
  realistic_solution: Transmit the 10 KB embedding and compute locally. The physical energy required to move data across a datacenter network vastly exceeds the energy required to switch transistors locally to compute the representation.
  common_mistake: |
    **The Pitfall:** Assuming 5 GFLOPs of compute consumes more power than moving passive raw data.
    **The Rationale:** Candidates intuitively view "computation" as heavy and "data transfer" as free.
    **The Consequence:** Designing systems that heavily over-index on centralized storage, leading to massive datacenter energy bills and thermal throttling.
  napkin_math: |
    1. **Option A (Network):** 250 MB = 2e9 bits. Energy = 2e9 bits × 10 nJ/bit = 20 Joules.
    2. **Option B (Data):** 10 KB = 8e4 bits. Energy = 8e4 bits × 10 nJ/bit = 0.8 mJ.
    3. **Option B (Compute):** 5 GFLOPs = 5e9 FLOPs. Energy = 5e9 FLOPs × 0.1 pJ/FLOP = 0.5 mJ.
    4. **Option B (Total):** 0.8 mJ + 0.5 mJ = 1.3 mJ.
    **Conclusion:** Streaming the raw data (20 J) consumes over 15,000x more energy than transmitting the embedding and computing locally (1.3 mJ).
