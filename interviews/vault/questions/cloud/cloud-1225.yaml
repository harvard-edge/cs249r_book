title: Object Storage Tail Latency Spikes
scenario: Your team migrates a 200TB computer vision dataset from a high-performance parallel file system
  to standard cloud object storage (like S3/GCS) to reduce costs. The average read latency for a 100MB
  data shard increases from 5ms to 50ms, which is acceptable for the data loader queue. However, monitoring
  reveals that the P99.9 read latency occasionally spikes to over 200ms. Network utilization is well below
  capacity (using only 20 Gbps of a 100 Gbps link) and the client training CPU is mostly idle during these
  spikes. What storage-level mechanism causes these rare but severe tail latency spikes?
question: "What storage-level mechanism causes these rare but severe tail latency spikes?"
details:
  realistic_solution: The spikes are 'degraded reads' caused by transparent erasure coding reconstruction.
    Object storage achieves durability by splitting objects into data and parity fragments. If a backend
    storage drive holding one of the data fragments is slow or fails, the storage service must wait for
    an internal timeout, fetch a parity fragment, and computationally reconstruct the missing data before
    returning the shard to the client.
  common_mistake: Assuming the latency spikes are caused by client-side CPU bottlenecks, generic 'noisy
    neighbors' on the network, or standard TCP packet loss, while missing the transparent failure recovery
    happening inside the storage backend.
  napkin_math: 'Assume a 100MB shard uses a 10+4 erasure coding scheme (10 data, 4 parity chunks of 10MB
    each). Normal read: 10 chunks fetched in parallel (~50ms). Degraded read: Backend storage node waits
    for a timeout on a slow drive (e.g., 100ms), then fetches a parity chunk and reconstructs the 10MB
    missing data. Reed-Solomon decoding at 5GB/s adds ~2ms compute, but the timeout and secondary fetch
    push total client-visible latency to >150ms.'
