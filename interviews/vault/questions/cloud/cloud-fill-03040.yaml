title: Tensor Parallelism Activation Memory and Recomputation
scenario: 'Training a 30B model with TP=4 on H100 (80GB HBM3) runs OOM at batch_size=8 with seq_len=2048.
  Memory profiling shows 52GB used: 30GB for model weights (TP=4 → 7.5GB/GPU) + 45GB for activations —
  exceeding 80GB. Without TP, memory is even worse. You need to reach batch_size=32.'
question: "How would you fit batch_size=32 for the 30B TP=4 H100 training run when activation memory is causing OOM?"
details:
  realistic_solution: 'Enable Sequence Parallelism (SP) alongside TP (Megatron-LM --sequence-parallel
    flag). SP splits activations along the sequence dimension across TP ranks, reducing activation memory
    by TP factor. At TP=SP=4: activation memory drops from 45GB to 45/4 = 11.25GB. Add activation checkpointing
    for the most memory-intensive layers. Total: 7.5GB weights + 11.25GB activations = 18.75GB → batch_size=32
    uses 4*18.75 = 75GB — fits.'
  common_mistake: Increasing TP degree to TP=8 to reduce per-GPU weight memory further. Activations are
    the bottleneck (45GB), not weights (7.5GB). TP does not reduce activation memory proportionally —
    sequence-parallel is needed for that.
  napkin_math: '30B model, TP=4: weights = 60GB/4 = 15GB per GPU (FP32 optimizer states excluded). Activations
    for batch=8, seq=2048: per layer = batch * seq * hidden * bytes * num_tensors. Hidden=7168 (30B model).
    Per layer: 8 * 2048 * 7168 * 2 * 8 (QKV, attention, MLP activations) = 1.87GB. 48 layers: 90GB total
    activations. TP without SP: only weight compute is sharded, activations remain full = 90GB. SP shards
    activations: 90/4 = 22.5GB. Activation checkpointing (every 4 layers): keeps only 1/4 of layers''
    activations = 5.6GB. Total: 15GB + 5.6GB = 20.6GB per GPU for batch=8. Scale to batch=32: 20.6 * 4
    = 82GB — nearly fits; use activation checkpointing for remaining layers.'
