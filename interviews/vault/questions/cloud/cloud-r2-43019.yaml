title: Compression Tradeoffs for ML Data Pipelines
scenario: Your 10 TB training dataset is stored as Parquet files on S3. You're choosing between Snappy,
  Zstd, and uncompressed. S3 egress costs $0.09/GB, and your training cluster has 128 CPU cores available
  for decompression alongside 8 A100 GPUs. The pipeline runs 5 epochs. Calculate the cost-performance
  tradeoff for each compression option.
details:
  realistic_solution: 'Snappy: ~2× compression ratio, decompression at 1.5 GB/s per core. 10 TB → 5 TB
    stored. Egress: 5 TB × 5 epochs × $0.09 = $2,250. Decompression throughput: 128 cores × 1.5 GB/s =
    192 GB/s (not a bottleneck). Zstd (level 3): ~3.5× ratio, decompression at 1.0 GB/s per core. 10 TB
    → 2.86 TB. Egress: 2.86 TB × 5 × $0.09 = $1,287. Decompression: 128 × 1.0 = 128 GB/s (adequate). Uncompressed:
    10 TB × 5 × $0.09 = $4,500. Best choice: Zstd level 3 — saves $3,213 vs uncompressed, decompression
    is not the bottleneck with 128 cores. Zstd level 19 would compress to 2.5 TB but decompresses at only
    0.4 GB/s per core → 51 GB/s aggregate, potentially bottlenecking the pipeline.'
  common_mistake: Choosing maximum compression (Zstd level 19) to minimize storage and egress costs. High
    compression levels can make decompression CPU-bound, starving the GPUs of data and negating the I/O
    savings.
  napkin_math: 'Storage costs (S3): uncompressed 10 TB × $0.023/GB/month = $230/month. Snappy 5 TB = $115/month.
    Zstd-3 2.86 TB = $66/month. Egress (5 epochs): uncompressed $4,500, Snappy $2,250, Zstd-3 $1,287.
    Total monthly (1 training run): uncompressed $4,730, Snappy $2,365, Zstd-3 $1,353. Savings: Zstd-3
    saves 71% vs uncompressed.'
