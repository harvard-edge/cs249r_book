title: Diagnosing Moderation Evasion Attacks
scenario: 'Your team operates a cloud-based automated image moderation API using a ResNet-50 model processing 5,000 requests/second. You notice a sudden spike where clearly violating images are consistently passing the filter with >99% ''safe'' confidence. Visual inspection shows these images appear identical to standard violations to human reviewers, but computing the raw pixel difference against standard uploads reveals structured, high-frequency noise uniformly bounded at an L-infinity norm of 4/255.'
question: 'How do you analyze this failure and what is the root cause?'
details:
  realistic_solution: 'Diagnose the failure as a targeted adversarial attack. The structured noise is an intentional perturbation aligned with the model''s loss gradient. To mitigate, implement input purifications like randomized smoothing or aggressive JPEG compression (which destroys high-frequency adversarial noise) before inference, followed by retraining the model with adversarial examples.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as concept drift or a hardware artifact.
    **The Rationale:** Candidates fail to recognize the signature of a targeted evasion attack (like FGSM) when viewing bounded L-infinity noise.
    **The Consequence:** Applying ineffective solutions like simple retraining without adversarial examples, leaving the API entirely vulnerable.
  napkin_math: |
    - **Perturbation Size:** 224x224x3 image = 150,528 pixels modified by epsilon = 4/255.
    - **Linear Shift:** Activation shift delta = sum(w_i × epsilon_i).
    - **Adversarial Alignment:** If signs align, the shift grows linearly: 150,528 × (4/255) × E[|w|].
    - **Result:** This massive cumulative shift easily alters the pre-softmax logit (e.g., -2.0 to +8.0), **rocketing 'safe' probability from 12% to >99.9%**.
