title: Diagnosing Moderation Evasion Attacks
scenario: Your team operates a cloud-based automated image moderation API using a ResNet-50 model (FP16
  on NVIDIA T4 GPUs) processing 5,000 requests/second. You notice a sudden spike where clearly violating
  images are consistently passing the filter with >99% 'safe' confidence. Visual inspection shows these
  images appear identical to standard violations to human reviewers, but computing the raw pixel difference
  against standard uploads reveals structured, high-frequency noise uniformly bounded at an L-infinity
  norm of 4/255. How do you analyze this failure and what is the root cause?
details:
  realistic_solution: Diagnose the failure as a targeted adversarial attack. The structured noise is an
    intentional perturbation aligned with the model's loss gradient. To mitigate, implement input purifications
    like randomized smoothing or aggressive JPEG compression (which destroys high-frequency adversarial
    noise) before inference, followed by retraining the model with adversarial examples.
  common_mistake: Candidates often misdiagnose this as concept drift, a hardware FP16 precision artifact,
    or simple out-of-distribution data, rather than recognizing a targeted evasion attack like Fast Gradient
    Sign Method (FGSM).
  napkin_math: 'For a 224x224x3 input, a perturbation epsilon = 4/255 modifies 150,528 pixels. The activation
    shift in a linear layer is delta = sum(w_i * epsilon_i). If the attacker aligns the sign of epsilon_i
    with the sign of w_i, the shift grows linearly with the dimension: 150,528 * (4/255) * E[|w|]. Even
    small epsilon easily shifts the dot product by 10+, moving a pre-softmax logit from -2.0 to +8.0,
    rocketing the ''safe'' probability from ~12% to >99.9%.'
