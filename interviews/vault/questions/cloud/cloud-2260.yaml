title: The Cost Model vs Profiling Dilemma
scenario: Your ML compiler's auto-tuner uses an analytical cost model to predict kernel performance and
  select tiling configurations. After upgrading from A100 to H100 GPUs, you find that the cost model consistently
  selects suboptimal tile sizes — the auto-tuned kernels run 30% slower than the best configuration found
  by random search. Analyze why the cost model broke across GPU generations and propose a fix that scales
  to future hardware.
details:
  realistic_solution: 'The cost model broke because the H100 changed several microarchitectural parameters
    that the analytical model didn''t account for: (1) The TMA (Tensor Memory Accelerator) unit changes
    the cost of shared memory loads — the A100 cost model assumes explicit `cp.async` loads while H100''s
    TMA can load entire tiles asynchronously. (2) The H100''s L2 cache is 50MB vs A100''s 40MB, changing
    the effective working set boundary. (3) The H100''s Transformer Engine with FP8 changes the compute-to-memory
    ratio, shifting optimal tile sizes. The scalable fix is a hybrid approach: use a learned cost model
    (small neural network trained on profiling data) instead of a purely analytical one, with a hardware
    feature vector as input. The feature vector encodes cache sizes, memory bandwidth, compute units,
    and special hardware features. When new hardware arrives, run a small calibration set (~1,000 profiling
    samples) to fine-tune the model. This amortizes the cost model across GPU generations. XLA, TVM, and
    Triton all use variants of this approach.'
  common_mistake: '"Just retrain the cost model on H100 data." This fixes the immediate problem but creates
    a maintenance burden for every new GPU generation.'
  napkin_math: 'Analytical model tuning on H100: 0 calibration cost, 30% suboptimal → wastes $0.30 per
    $1.00 of GPU compute. Random search: $4{,}096 \times 5\text{ms} = 20\text{s}$ per kernel, finds optimum,
    but $20\text{s} \times 80$ kernels = 27 min per model compilation. Learned cost model: 1,000 calibration
    samples × 5ms = 5s one-time cost, then <5% suboptimal per kernel, 100 guided trials × 80 kernels ×
    5ms = 40s per model compilation. The learned model saves 26.3 min of compilation time while staying
    within 5% of optimal.'
  options:
  - Gradient accumulation reduces batch size by K× because each accumulated step uses only 1/K of the
    data; this is useful when GPU memory is too small for a standard batch
  - Gradient accumulation requires AllReduce after every micro-batch to prevent gradient staleness; the
    communication savings come from smaller gradient tensors, not fewer AllReduce calls
  - 'Gradient accumulation over K steps simulates a K× larger batch by running K forward-backward passes
    and summing gradients before a single optimizer step. Communication is deferred: AllReduce runs once
    per K steps instead of every step, reducing communication overhead by K×. Effective batch size = K
    × micro_batch × N_GPUs. Trade-off: training step latency increases K× but throughput may improve due
    to reduced communication fraction.'
  - Gradient accumulation and gradient compression are identical techniques; both reduce the amount of
    data communicated during AllReduce by K× through lossy gradient representation
  correct_index: 2
