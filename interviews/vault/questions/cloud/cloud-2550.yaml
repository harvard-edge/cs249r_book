title: Cloud Young Daly Formula L3 0
scenario: A 512-GPU training cluster has MTBF of 8 hours per failure. Checkpoint save takes 3 minutes.
  Using the Young-Daly formula, calculate the optimal checkpoint interval and the expected training efficiency
  (fraction of time doing useful work).
question: "Using Young-Daly with 8-hour MTBF and 3-minute checkpoints, what is the optimal interval and expected training efficiency?"
details:
  realistic_solution: 'Young-Daly: τ_opt = √(2 × δ × M) - δ. δ = 3 min, M = 480 min (8 hours). τ_opt =
    √(2 × 3 × 480) - 3 = √2880 - 3 = 53.67 - 3 = 50.67 min ≈ 51 min. Checkpoint overhead fraction: δ /
    (τ + δ) = 3 / 54 = 5.6%. Expected rework per failure: τ/2 = 25.5 min. Rework fraction: (τ/2) / M =
    25.5 / 480 = 5.3%. Total efficiency: 1 - 5.6% - 5.3% = 89.1%. So ~89% of wall-clock time is useful
    training.'
  common_mistake: Forgetting to subtract δ from the square root term. The formula is τ = √(2δM) - δ, not
    just √(2δM). Also, M is the system MTBF (whole cluster), not per-GPU MTBF.
  napkin_math: 'τ_opt = √(2 × 3 × 480) - 3 = √2880 - 3 ≈ 51 min. Overhead: 3/54 = 5.6%. Rework: 25.5/480
    = 5.3%. Efficiency: 1 - 0.056 - 0.053 = 89.1%.'
