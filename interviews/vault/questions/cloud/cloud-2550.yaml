title: Cloud Young Daly Formula L3 0
scenario: 'A 512-GPU training cluster has MTBF of 8 hours per failure. Checkpoint save takes 3 minutes.'
question: Using Young-Daly with 8-hour MTBF and 3-minute checkpoints, what is the optimal interval and expected training efficiency?
details:
  realistic_solution: 'Young-Daly: τ_opt = √(2 × δ × M) - δ. δ = 3 min, M = 480 min (8 hours). τ_opt = √(2 × 3 × 480) - 3 = √2880 - 3 = 53.67 - 3 = 50.67 min ≈ 51 min. Checkpoint overhead fraction: δ / (τ + δ) = 3 / 54 = 5.6%. Expected rework per failure: τ/2 = 25.5 min. Rework fraction: (τ/2) / M = 25.5 / 480 = 5.3%. Total efficiency: 1 - 5.6% - 5.3% = 89.1%. So ~89% of wall-clock time is useful training.'
  common_mistake: 'Forgetting to subtract δ from the square root term. The formula is τ = √(2δM) - δ, not just √(2δM). Also, M is the system MTBF (whole cluster), not per-GPU MTBF.'
  napkin_math: |
    **Assumptions & Constraints:**
    - MTBF (M): 480 minutes (8 hours).
    - Checkpoint overhead (δ): 3 minutes.
    - Formula: τ_opt = √(2 × δ × M) - δ.
    
    **Calculations:**
    - Optimal interval (τ_opt): √(2 * 3 * 480) - 3 = √2880 - 3 ≈ 53.67 - 3 = 50.67 minutes.
    - Checkpoint overhead fraction: δ / (τ_opt + δ) = 3 / 53.67 ≈ 5.6%.
    - Expected rework per failure: τ_opt / 2 = 25.33 minutes.
    - Rework fraction: (τ_opt / 2) / M = 25.33 / 480 ≈ 5.3%.
    - Efficiency: 100% - 5.6% - 5.3% = 89.1%.
    
    **Conclusion & Interpretation:**
    - **Result: 51 min interval, 89.1% efficiency (Reliability-Bound)**. Approximately 89% of wall-clock time is spent on useful training, showing the delicate balance between checkpoint cost and rework penalty.
