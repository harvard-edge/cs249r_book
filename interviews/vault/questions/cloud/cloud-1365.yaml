title: Diagnosing Low SM Utilization in LLM Inference
scenario: You are profiling an autoregressive LLM inference service running on a single A100 GPU (40GB
  HBM2, 2.0 TB/s peak bandwidth). The model has 15 billion parameters loaded in FP16. When serving a single
  user request (batch size = 1), the service generates 25 tokens per second, but the profiler shows that
  the GPU's compute units (SMs) are at less than 5% utilization. An engineer suggests upgrading to the
  latest cuBLAS library to optimize the matrix multiplication kernels and boost token throughput. Analyze
  the root cause of this low compute utilization and determine why the proposed solution will not work.
question: "Why is the A100 at <5% SM utilization for batch-1 decoding, and why won't a cuBLAS upgrade materially improve tokens/sec?"
details:
  realistic_solution: The compute units are starved for data due to the memory wall. In autoregressive
    generation at batch=1, each token requires streaming the entire 30GB of model weights from HBM to
    SRAM. The theoretical maximum throughput is 2000 GB/s / 30 GB = 66.6 tokens/s. The observed 25 tokens/s
    represents ~37.5% effective bandwidth utilization (realistic given access pattern overhead), confirming
    the system is strictly HBM-bound. Increasing batch size is the primary lever to amortize weight loads.
  common_mistake: Assuming that low SM utilization indicates inefficient compute kernels or a CPU-to-GPU
    data transfer bottleneck, failing to recognize that batch-size-1 autoregressive generation is fundamentally
    memory-bandwidth-bound with no way to increase compute utilization without batching.
  napkin_math: 15B params in FP16 = 30GB of weights. A100 Peak HBM Bandwidth = 2.0 TB/s. Theoretical max
    throughput = 2,000 GB/s / 30 GB/token = 66.6 tokens/second. The observed 25 tokens/s represents ~37.5%
    effective memory bandwidth utilization (typical for real-world memory access patterns), confirming
    the system is strictly HBM-bound.
