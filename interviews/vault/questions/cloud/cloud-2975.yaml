title: 'Fault Tolerance: Mastery — Design Full Fault Tolerance Architecture for 1000-GPU Training'
scenario: You are responsible for reliability engineering for a 3-month training run of a 500B parameter model on 2,048 H100s. The expected GPU failure rate is 1 per 150 days.
question: What fault-tolerance architecture for checkpointing, detection, recovery, and spares will keep the 500B, 2,048-H100 run above 95% uptime?
details:
  realistic_solution: Design a full architecture including async sharded checkpointing, health monitoring, a hot standby pool, automatic replacement, and proactive replacement based on ECC precursors.
  common_mistake: |
    **The Pitfall:** Treating fault tolerance exclusively as a checkpointing problem.
    **The Rationale:** Candidates focus on saving state but fail to design automated recovery mechanisms and spare node provisioning.
    **The Consequence:** Achieving high checkpoint frequency but still failing SLAs due to lengthy manual recovery times and lack of standby hardware.
  napkin_math: |
    - **Expected failures**: 2,048 GPUs * (90 days / 150 days) ≈ 1,229 failures.
    - **Surprise failures**: Assuming proactive replacement catches 70%, 369 failures cause crashes.
    - **Without spares**: 369 failures * 5 mins recovery = 1,845 mins (1.28 days lost).
    - **With 64 hot spares**: Failed node swapped to spare preloaded with shard = 2 mins.
    - **Time lost**: 369 * 2 mins = 738 mins (0.51 days).
    - **Conclusion**: Uptime = (90 - 0.51) / 90 = **99.4% (> 95% target).**
