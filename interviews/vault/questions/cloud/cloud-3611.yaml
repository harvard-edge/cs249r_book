title: Power Capping Impact on Training Throughput for MI300X
scenario: A datacenter operator power-caps each MI300X (192GB HBM3, peak 750W) at 600W to stay within cooling limits. A training team reports 20% throughput degradation. The operator claims only 20% power reduction (750→600W) so throughput loss should be equal.
question: Why can a 750 W to 600 W MI300X power cap cause a non-linear throughput loss, and what trade-off does it imply?
details:
  realistic_solution: 'At peak 750W, MI300X runs at maximum memory clock (5.3TB/s). Power cap reduces memory clock frequency. Memory bandwidth scales approximately as f^1 (linear with clock), but power scales as f^3 (cube law for dynamic power). Reducing power 20% (750→600W) → clock reduction of (600/750)^(1/3)=0.944 → 6% clock drop → 6% bandwidth drop. But compute is also reduced: if training is 50% memory-bound, 50% compute-bound, effective throughput = 0.5×0.94 + 0.5×(0.94^3 for compute FLOPS) ≈ 0.87 = 13% drop. 20% observed suggests model is heavily memory-bound at ~70%, or additional DVFS inefficiency.'
  common_mistake: |
    **The Pitfall:** Assuming linear throughput-power scaling.
    **The Rationale:** Candidates often ignore that memory-bandwidth (not compute) is often the bottleneck, and clock frequencies scale sublinearly with power.
    **The Consequence:** Underestimating the performance impact of power capping on memory-bound ML workloads.
  napkin_math: |
    * Power ratio: P = 600W / 750W = 0.8.
    * Clock frequency f scales roughly with P^(1/3): f_ratio = 0.8^0.333 ≈ 0.928.
    * Bandwidth ratio ≈ f_ratio = 0.928.
    * Compute FLOPS scale with f × v (and v scales with f^0.5 roughly), so FLOPS_ratio ≈ 0.928^2 ≈ 0.86.
    * Assuming a workload is 70% memory-bound: Throughput = 0.7 × 0.928 + 0.3 × 0.86 = 0.65 + 0.26 = 0.91.
    * Expected drop is ~9%.
    * **Conclusion: The observed 20% drop suggests additional overhead from DVFS latency spikes during power management transitions.**
