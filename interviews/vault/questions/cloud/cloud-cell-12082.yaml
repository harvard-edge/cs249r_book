title: 'Model Size Estimation: Master Full Memory Budget for LLM Training on H100'
scenario: 'Compute the full GPU memory budget for training a 13B parameter model on H100 (80GB HBM3) with
  batch size 4, sequence length 2048, using AdamW optimizer in BF16 with FP32 optimizer states (mixed
  precision). Include: model weights, gradients, optimizer states, activations with gradient checkpointing,
  and KV-cache for attention. Determine if it fits in a single H100.'
details:
  realistic_solution: 'Weights BF16: 13B × 2B = 26GB. Gradients BF16: 13B × 2B = 26GB. Optimizer states
    FP32 (m + v): 13B × 4B × 2 = 104GB. Total for training: 26+26+104 = 156GB >> 80GB. Fix: use ZeRO-3
    (sharded across 4 GPUs): 156/4 = 39GB per GPU. Plus activations with checkpointing: 1 checkpoint per
    4 layers → only 4 layers of activations in memory: 4×4×2048×5120×2B = 0.84GB. Total per GPU: 39+0.84
    = 39.84GB < 80GB ✓.'
  common_mistake: 'Forgetting optimizer states in the memory budget: AdamW stores momentum (m) and variance
    (v) in FP32, each the same size as the model parameters, creating a 3× memory multiplier on top of
    weights.'
  napkin_math: 'Weights: 26GB. Grads: 26GB. Adam m: 13B×4B=52GB. Adam v: 52GB. Total: 156GB. Single H100:
    impossible. ZeRO-3 on 4×H100: 156/4=39GB. Activations (4 checkpoints, seq=2048, hidden=5120): 4×2048×5120×2B=84MB
    per layer × 4 = 336MB. Total per GPU: 39.3GB. At batch=4: activation memory × 4 = 336MB×4 = 1.3GB.
    Total: 40.3GB < 80GB ✓ with ZeRO-3 on 4 H100s.'
