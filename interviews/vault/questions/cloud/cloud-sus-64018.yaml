title: Power Anomaly Detection for H100 Training Clusters
scenario: 'The ops team gets a page: GPU node h100-rack07-node04 is drawing 820W per GPU sustained—17%
  above the 700W TDP. No thermal throttling flags are set, training loss is progressing normally, and
  SMI shows no errors. Diagnose the possible causes of sustained over-TDP power draw, determine whether
  this is a hardware fault or expected behavior, and specify the monitoring thresholds that should trigger
  escalation.'
question: "Why might h100-rack07-node04 sustain 820W per GPU without errors, is it a fault, and what power thresholds should trigger escalation?"
details:
  realistic_solution: 'Root cause candidates: (1) Power limit not explicitly set—H100 defaults to 700W
    limit via nvidia-smi -pl, but if unset or overridden, can boost to ~900W during Tensor Core-heavy
    phases. (2) Measurement artifact: PDU meter reading includes VRM and PCIe auxiliary power not in the
    GPU TDP spec. (3) Workload has exceptionally high arithmetic intensity (INT8 tensor operations) driving
    max boost. Check: nvidia-smi -q -d POWER to see current enforced limit. If limit = 700W but draw =
    820W, likely PDU measurement includes other components. If limit = 900W (unconstrained), set -pl 700
    immediately. Alert thresholds: >750W for >60s = investigate; >900W = page on-call immediately.'
  common_mistake: Treating TDP as an absolute maximum. TDP (Thermal Design Power) is the sustained power
    under typical workloads; H100 SXM5 can sustain up to ~900W in short bursts under mixed workloads due
    to boost clocks. The 'actual' ceiling is the 700W configurable power limit, but GPUs can exceed TDP
    temporarily if the power limit is not set.
  napkin_math: 'H100 SXM5 spec: TDP = 700W (default limit), absolute max clock power ≈ 900W (unrestricted
    boost). 820W is within the 700-900W range. Power draw breakdown: GPU compute die ≈ 550W at full boost,
    HBM3 ≈ 100W, VRM switching losses ≈ 50W, PCIe aux ≈ 20W, NVLink PHY ≈ 30W. Total OOB with boost =
    ~750-820W. PDU measurement includes host VRM: adds 30-50W. So 820W observed may be 770W GPU actual
    + 50W host overhead—within spec if power limit is 700W with boost budget. Action: cap at 700W to guarantee
    sustained TDP: expected power drops to 700-730W (VRM + aux).'
