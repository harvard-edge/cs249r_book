title: Diagnosing KernelSHAP Latency Bottlenecks
scenario: A cloud fraud-detection microservice runs a dense neural network (100 features) on NVIDIA T4 GPUs. Base inference takes 5ms at a batch size of 1. A new compliance mandate requires returning SHAP values alongside every rejected transaction to a user dashboard with a strict 1.0-second API timeout limit. The team implements KernelSHAP with a background dataset of 1,000 historical samples. Upon deployment, the explainability endpoint immediately cascades into HTTP 504 (Timeout) errors, averaging 5.2 seconds per request.
question: What bottleneck is causing the KernelSHAP timeouts, and how should you reduce latency below 1 second?
details:
  realistic_solution: 'Diagnose that KernelSHAP is evaluating the 1,000 perturbed inputs sequentially. Resolve the bottleneck by summarizing the background dataset from 1,000 down to 50 representative centroids (e.g., using k-means) and batching the perturbed queries into a single forward pass to leverage the T4''s SIMT parallelism.'
  common_mistake: |
    **The Pitfall:** Assuming post-hoc explainers compute gradients via a single O(1) backward pass.
    **The Rationale:** Candidates fail to realize that model-agnostic methods like KernelSHAP require thousands of sequential black-box forward passes.
    **The Consequence:** Explainability pipelines drastically exceed API timeout limits, causing cascading failures in production serving.
  napkin_math: |
    1. **Sequential KernelSHAP:** 1,000 background samples × 5ms per inference = 5,000ms (5s) total latency.
    2. **Timeout Violation:** 5,000ms significantly exceeds the 1s timeout budget.
    3. **Optimized Approach:** 50 background samples batched into a single tensor [50, 100].
    **T4 compute utilization absorbs the larger batch, resulting in ~8ms batched inference, securely under the 1,000ms budget.**
