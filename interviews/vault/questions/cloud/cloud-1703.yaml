title: Diagnosing KernelSHAP Latency Bottlenecks
scenario: A cloud fraud-detection microservice runs a dense neural network (100 features). Base inference takes 5ms at a batch size of 1. A new compliance mandate requires returning SHAP values alongside every rejected transaction to a user dashboard with a strict 1.0-second API timeout limit. The team implements KernelSHAP with a background dataset of 1,000 historical samples. Upon deployment, the explainability endpoint immediately cascades into HTTP 504 (Timeout) errors, averaging 5.2 seconds per request.
question: What bottleneck is causing the KernelSHAP timeouts, and how should you reduce latency below 1 second?
details:
  realistic_solution: 'Diagnose that KernelSHAP is evaluating the 1,000 perturbed inputs sequentially. Resolve the bottleneck by summarizing the background dataset from 1,000 down to 50 representative centroids (e.g., using k-means) and batching the perturbed queries into a single forward pass to leverage the T4''s SIMT parallelism.'
  common_mistake: |
    **The Pitfall:** Assuming post-hoc explainers compute gradients via a single O(1) backward pass.
    **The Rationale:** Candidates fail to realize that model-agnostic methods like KernelSHAP require thousands of sequential black-box forward passes.
    **The Consequence:** Explainability pipelines drastically exceed API timeout limits, causing cascading failures in production serving.
  napkin_math: |
    1. **Assumptions & Constraints:** T4 GPU, 5ms per single inference, 1,000 background samples for KernelSHAP, 1.0s timeout limit.
    2. **Calculations:** Sequential KernelSHAP = 1,000 samples * 5ms = 5,000ms (5s). Optimized = 50 k-means centroids batched [50, 100] = ~8ms batched inference.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound (Unbatched). T4 SIMT utilization absorbs the larger batch, reducing latency securely under the 1,000ms budget.**
