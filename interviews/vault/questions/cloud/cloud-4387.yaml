title: 'MI300X vs H100: Energy-per-Token at Scale for LLM Inference'
scenario: You are selecting the accelerator platform for a 100B-token-per-day LLM inference service. The MI300X offers 192GB HBM3 at 5.3 TB/s and 750W TDP, while the H100 SXM5 offers 80GB HBM3e at 3.35 TB/s and 700W TDP. The service runs Llama-3 70B in FP16 (140GB model weight).
question: For 100B tokens/day of Llama-3 70B FP16 inference, which platform has lower energy per token after sharding and bandwidth effects?
details:
  realistic_solution: 'MI300X: Single chip fits 70B FP16 (140GB < 192GB). No tensor parallelism overhead. Token throughput: 5,300 GB/s / (140 GB / 187 tokens) ≈ 7,079 tok/s (bandwidth-bound). Power: 750W. Energy/token: 750W / 7,079 tok/s = 0.106 J/token. H100 (2-chip TP): Each chip holds 70GB of the 140GB model. NVLink overhead for TP2 ~7% latency penalty. Effective throughput per 2-GPU pair: ~(3.35 TB/s per chip × 2 chips × 0.93 efficiency) / (140 GB / 187 tokens) ≈ 8,323 tok/s. Power: 2 × 700W = 1,400W. Energy/token: 1,400W / 8,323 tok/s = 0.168 J/token. MI300X is 37% more energy efficient per token for this workload.'
  common_mistake: |
    **The Pitfall:** Evaluating only theoretical FLOPS/Watt and ignoring model sharding overhead.
    **The Rationale:** Candidates overlook that the 140GB model fits on a single MI300X but requires Tensor Parallelism across two H100s.
    **The Consequence:** Underestimating the power cost and communication overhead of multi-GPU sharding.
  napkin_math: |
    - 1. Analyze MI300X (1 chip): 140GB fits in 192GB. Throughput = 5,300 GB/s / (140 GB/pass) * 187 tokens/pass ≈ 7,079 tok/s. Energy/token = 750W / 7,079 = 0.106 J/tok.
    - 2. Analyze H100 (2 chips): 140GB requires two 80GB chips. Throughput = (2 * 3,350 GB/s * 0.93 TP efficiency) / 140 GB * 187 tokens ≈ 8,323 tok/s. Energy/token = 1,400W / 8,323 = 0.168 J/tok.
    - 3. Calculate efficiency ratio: 0.168 / 0.106 = 1.58x.
    - 4. Conclusion: **MI300X is ~37% more energy-efficient per token** due to avoiding Tensor Parallelism overhead.
