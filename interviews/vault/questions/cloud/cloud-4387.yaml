title: 'MI300X vs H100: Energy-per-Token at Scale for LLM Inference'
scenario: You are selecting the accelerator platform for a 100B-token-per-day LLM
  inference service. The MI300X offers 192GB HBM3 at 5.3 TB/s and 750W TDP, while
  the H100 SXM5 offers 80GB HBM3e at 3.35 TB/s and 700W TDP. The service runs Llama-3
  70B in FP16 (140GB model weight). Evaluate which platform delivers lower energy-per-token,
  accounting for model sharding requirements, memory bandwidth utilization, and total
  power budget for the serving fleet.
question: For 100B tokens/day of Llama-3 70B FP16 inference, which platform has lower
  energy per token after sharding and bandwidth effects?
details:
  realistic_solution: 'MI300X: Single chip fits 70B FP16 (140GB < 192GB). No tensor
    parallelism overhead. Token throughput: ~3,533 tokens/s (bandwidth-bound at 5.3
    TB/s). Power: 750W. Energy/token: 750W / 3,533 tok/s = 0.212 J/token. H100 (2-chip
    TP): Each chip holds 70GB of the 140GB model. NVLink overhead for TP2 ~5-8% latency
    penalty. Effective throughput per 2-GPU pair: ~(3.35 TB/s per chip × 2 chips ×
    0.93 efficiency) / 1.5 GB/token = ~4,154 tok/s. Power: 2 × 700W = 1,400W. Energy/token:
    1,400W / 4,154 tok/s = 0.337 J/token. MI300X is 37% more energy efficient per
    token for this workload.'
  common_mistake: Evaluating only FLOPS/Watt and ignoring that at 70B FP16 scale,
    the MI300X fits the model on a single accelerator (192GB > 140GB) while H100 requires
    tensor parallelism across at least 2 chips (80GB × 2 = 160GB). This sharding overhead
    increases inter-chip communication and reduces effective throughput.
  napkin_math: 'MI300X: 5,300 GB/s / (140B params × 2 bytes / 1e9) = 5,300 / 280 ≈
    18.9 passes/s × ~187 tokens/pass ≈ 3,534 tok/s. E/tok = 0.750kW / 3,534 = 0.212
    J/tok. H100×2: 2×3,350 GB/s × 0.93 / 280 ≈ 22.2 passes/s × 187 ≈ 4,154 tok/s.
    E/tok = 1.400kW / 4,154 = 0.337 J/tok. Ratio: 0.337/0.212 = 1.59×. MI300X 37%
    better. Fleet for 100B tok/day: MI300X needs 100e9/(3,534×86,400) = 328 chips.
    H100 needs 100e9/(4,154×86,400/2) = 558 chips (279 pairs). Total power: MI300X
    = 246 kW, H100 = 391 kW.'
