title: Encoder-Decoder Tradeoffs on AMD MI300X for Deployment
scenario: "Your team is deploying a large language model on an AMD MI300X accelerator (192 GB HBM3, 1,307 TFLOPS FP16 sparse, 5.3 TB/s). The model needs to serve both high-throughput batch inference and low-latency interactive tasks. You are evaluating an encoder-only model, a decoder-only model, and an encoder-decoder model."
question: "What are the inference compute, memory, and bandwidth costs of encoder-only, decoder-only, and encoder-decoder models on the MI300X?"
details:
  realistic_solution: "For high-throughput batch tasks, an encoder-only model might be preferable due to its parallelizable nature, making efficient use of the MI300X's 1,307 TFLOPS FP16 sparse compute. For low-latency interactive tasks requiring generation, a highly optimized decoder-only model, potentially quantized to INT8 or FP8 to leverage the HBM3 (192 GB memory, 5.3 TB/s bandwidth) more efficiently for token generation, would be a strong candidate. An encoder-decoder model offers flexibility but comes with the highest overhead, requiring careful partitioning and optimization to fit both encoder and decoder components within the MI300X's resources while meeting both latency and throughput goals."
  common_mistake: |
    **The Pitfall:** Picking an architecture based solely on offline quality metrics (e.g., BLEU, ROUGE).
    **The Rationale:** Ignoring the hardware-specific inference time, memory footprint, and bandwidth utilization implications (like the sequential bottleneck of decoders).
    **The Consequence:** Deploying a decoder-only model for batch tasks that chokes on memory bandwidth, leaving massive MI300X compute resources idle.
  napkin_math: |
    *   **Memory Footprint:** Llama 7B FP16 requires ~14GB. The MI300X's 192GB comfortably holds larger models or massive KV caches.
    *   **Encoder-only Compute:** O(N^2) over input context, highly parallelizable, easily saturates 1,307 TFLOPS for batch.
    *   **Decoder-only Compute:** Auto-regressive generation is sequential. O(N^2) attention is heavily memory-bandwidth bound (limited by 5.3 TB/s), making it hard to utilize the 1,307 TFLOPS.
    *   **Result:** **Decoders are memory-bound during generation; Encoders are compute-bound during batch processing.**
