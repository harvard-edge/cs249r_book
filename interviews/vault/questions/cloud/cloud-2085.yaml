title: RNN Sequential Dependency vs GPU Parallelism
scenario: Why did transformers largely replace RNNs in production NLP systems, from a systems perspective?
  Focus on hardware utilization, not model quality.
question: "Why did transformers largely replace RNNs in production NLP systems, from a systems perspective?"
details:
  realistic_solution: 'RNNs have a sequential dependency: hidden state $h_t$ depends on $h_{t-1}$. This
    forces each timestep to execute serially, meaning a sequence of length $S$ requires $S$ sequential
    matrix multiplies. On a massively parallel GPU with thousands of cores, this serialization leaves
    most compute units idle. Transformers compute all positions in parallel via self-attention, achieving
    far higher GPU utilization during training.'
  common_mistake: 'Answering purely from an ML perspective (''attention is more expressive'') without
    addressing the fundamental systems constraint: sequential dependencies prevent parallelism.'
  napkin_math: 'RNN on 512 tokens: 512 sequential matmuls, each using a fraction of GPU cores. | Transformer:
    1 batched attention + 2 large matmuls, all fully parallelized. | GPU utilization: RNN ~5-15% vs Transformer
    ~40-60%.'
  options:
  - RNNs require more total FLOPs than transformers for the same sequence length.
  - RNN hidden states create sequential dependencies that prevent parallel execution across timesteps,
    severely underutilizing GPU hardware.
  - Transformers use less memory than RNNs because they don't store hidden states.
  - GPU hardware is physically incapable of running recurrent operations.
  correct_index: 1
