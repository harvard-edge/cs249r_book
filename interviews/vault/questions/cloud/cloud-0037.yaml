title: The KV-Cache VRAM Budget (cloud-0037)
scenario: You are deploying a Llama-1 65B model for inference on an H100 GPU in FP16 precision. A user sends a request with a sequence length of 4,096 tokens. The Llama-1 65B architecture has 80 layers and a hidden dimension of 8,192.
question: How much memory is required just for the FP16 KV-cache for one 4,096-token Llama-1 65B request?
details:
  realistic_solution: 'The KV-cache stores the Key and Value state for every token in the context window, for every layer of the model. For FP16 precision, each number requires 2 bytes. The total memory is the product of all these dimensions: sequence length * layers * hidden dimension * 2 (for K and V) * 2 (for FP16 bytes).'
  common_mistake: |
    **The Pitfall:** Forgetting to account for both Keys and Values in the calculation.
    **The Rationale:** Candidates frequently calculate memory for only one tensor instead of the Key and Value pair.
    **The Consequence:** This yields exactly half the correct answer (~5.4 GB instead of ~10.7 GB), leading to catastrophic memory exhaustion under load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: Llama-1 65B.
    - Layers (L): 80.
    - Hidden Dimension (d_model): 8,192.
    - Sequence Length (S): 4,096.
    - Precision: FP16 (2 bytes per element).

    **Calculations:**
    - Elements per token per layer: 8,192.
    - Bytes per token per layer per tensor (K or V): 8,192 * 2 bytes = 16,384 bytes.
    - Total bytes for K and V across all layers: 2 * 80 * 16,384 = 2,621,440 bytes per token.
    - Total KV cache for 4,096 tokens: 4,096 * 2,621,440 bytes \u2248 10,737,418,240 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~10.7 GB (Memory-Bound Bottleneck)**. Total KV cache memory is ~10.7 GB, leading to a Memory-Bound constraint.
  options:
  - ~2.7 GB
  - ~10.7 GB
  - ~5.4 GB
  - ~2.6 MB
  correct_index: 1
