title: The KV-Cache VRAM Budget (cloud-0037)
scenario: You are deploying a Llama-2-70B model for inference on an H100 GPU. The model is running in
  FP16 precision. A user sends a request with a sequence length of 4,096 tokens. Given that the Llama-2-70B
  architecture has 80 layers and a hidden dimension of 8,192, calculate the memory required just for the
  KV-cache for this single user.
details:
  realistic_solution: 'The KV-cache stores the Key and Value state for every token in the context window,
    for every layer of the model. For FP16 precision, each number requires 2 bytes. The total memory is
    the product of all these dimensions: sequence length × layers × hidden dimension × 2 (for K and V)
    × 2 (for FP16 bytes).'
  common_mistake: A critical error is forgetting to multiply by 2 for both K and V tensors, which gives
    exactly half the correct answer (~5.4 GB instead of ~10.8 GB). Another common mistake is using GQA
    head count (8 KV heads) instead of the full d_model dimension as given in the scenario, yielding ~1
    GB.
  napkin_math: '1. **Identify dimensions from the scenario:** | Sequence Length (S): 4,096 tokens | Layers
    (L): 80 | Hidden Dimension (d_model): 8,192 | Bytes per element (B): 2 (FP16) | 2. **KV Cache using
    d_model (MHA-style):** | = 2 × L × d_model × S × B | = 2 × 80 × 8,192 × 4,096 × 2 | = 2 × 80 × 8,192
    × 4,096 × 2 = 10,737,418,240 bytes | ≈ 10.7 GB for a single request | 3. **Alternatively, using GQA
    (8 KV heads, head_dim=128):** | = 2 × 80 × 8 × 128 × 4,096 × 2 = 1,073,741,824 bytes ≈ 1.07 GB | The
    scenario uses d_model=8,192 directly → ≈ 10.7 GB | This is ~27% of an H100''s 80 GB VRAM for just
    one user''s KV-cache.'
  options:
  - ~2.7 GB
  - ~10.8 GB
  - ~5.4 GB
  - ~2.6 MB
  correct_index: 1
