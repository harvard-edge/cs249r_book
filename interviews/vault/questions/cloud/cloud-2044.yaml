title: The RAG Cache Invalidation Dilemma
scenario: Your RAG system caches LLM responses keyed on (query_embedding_hash, top_k_doc_ids). The cache
  saves 60% of LLM compute costs. A knowledge base article is updated — one sentence changes in a 2000-word
  document. The embedding barely shifts (cosine similarity 0.997 with the old version). How does this
  near-invisible change propagate through your caching system, and what is the correct invalidation strategy?
details:
  realistic_solution: 'The cache key includes doc_ids but not doc content hashes. When a document is updated,
    the doc_id stays the same, so the cache key matches and returns the old LLM response based on the
    old document content. This is a classic ABA problem. Fix: (1) Include a content hash (or version number)
    in the cache key: (query_hash, [(doc_id, doc_version), ...]). This causes automatic cache miss on
    any document update. Cost: cache hit rate drops from 60% to ~45% because document updates invalidate
    all queries that referenced that document. (2) Selective invalidation: maintain an inverted index
    of cache_key → doc_ids. When doc X is updated, invalidate only cache entries that reference doc X.
    (3) TTL-based: set cache TTL to match your staleness tolerance (e.g., 1 hour). Trade some compute
    cost for bounded staleness.'
  common_mistake: Relying solely on embedding similarity to detect staleness. A cosine similarity of 0.997
    means the query still retrieves the same document, and the cache key (based on doc IDs) still matches
    — so stale answers are served indefinitely.
  napkin_math: 'At 10K queries/hour, 60% cache hit = 6K cache hits saving $0.003 each = $18/hr saved.
    After adding content hashes, hit rate drops to 45% = $13.50/hr saved. If documents update at 100 edits/day
    affecting 5% of cache: ~500 invalidations/day is manageable. But a bulk import of 10K docs invalidates
    40% of cache at once — thundering herd of 4K queries/hour hitting the LLM.'
