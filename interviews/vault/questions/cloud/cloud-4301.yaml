title: Decode Preemption and KV Swap
scenario: Under heavy load, your decode scheduler preempts low-priority in-flight sequences by swapping their KV-cache to CPU DRAM to free HBM for new high-priority requests. Users report that preempted requests, when resumed, have TPOT 8× higher than normal for the first 20 tokens before recovering.
question: Why do resumed preempted sequences have 8× TPOT for the first 20 tokens, and how would you fix it?
details:
  realistic_solution: 'When a preempted sequence resumes, its KV-cache must be swapped back from CPU DRAM to GPU HBM over PCIe. During the swap, the decode kernel is also reading model weights from HBM. The PCIe bus saturates during the KV swap-in, stalling the HBM DMA engine. However, the true 8x slowdown is due to page-fault stalls if using demand paging. Fix: (1) Use asynchronous KV swap with double-buffering. (2) Reduce swap frequency by increasing HBM KV pool. (3) Use NVLink-attached CPU memory pools.'
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to CPU-GPU synchronization overhead or Python scheduler latency.
    **The Rationale:** Candidates often jump to software overheads when seeing latency spikes upon resuming a task, forgetting hardware data movement.
    **The Consequence:** The real cause (PCIe bandwidth saturation or page faults) is ignored, leading to ineffective software-only fixes.
  napkin_math: |
    - **Normal Step Time:** `model_size / HBM_bw` = 140 GB / 3.35 TB/s = 41.8 ms.
    - **PCIe Contention:** During swap-in (64 GB/s), effective HBM bandwidth for weights drops to ~2 TB/s. Step time becomes 140/2000 = 70 ms. Ratio: 70/41.8 = 1.67x.
    - **Total Swap Penalty Window:** 192 MB KV for 2048-token sequence takes 3 ms to swap in.
    - **First Token Overhead:** 3 ms + 41.8 ms vs normal 41.8 ms = 1.07x overhead.
    - **The Real Mechanism:** Doesn't match 8x. The real cause is page-fault stalls if using demand paging. Full KV is not pre-fetched; each token decode triggers page faults for its own KV pages.
    - **Stall per fault:** Stall per fault * 20 pages = **~8x overhead.**
