title: Evaluating Parallelism Mapping Across the Bandwidth Taper
scenario: 'Your team is architecting the distributed training topology for a 175B parameter LLM on a cluster
  of NVIDIA H100 nodes (8 GPUs per node). The hardware features a severe bandwidth taper: 900 GB/s intra-node
  via NVLink, and 50 GB/s (400 Gbps) inter-node via InfiniBand. A junior engineer proposes spanning Tensor
  Parallelism (TP) across multiple nodes to maximize memory pooling, while keeping Pipeline Parallelism
  (PP) contained within individual nodes to reduce pipeline bubbles. Evaluate this proposal and justify
  a mathematically sound topology.'
question: "Should tensor parallelism span multiple H100 nodes here, or how should TP, PP, and DP be mapped across the cluster?"
details:
  realistic_solution: Reject the proposal. TP requires blocking All-Reduce operations for every layer,
    which will bottleneck on the 50 GB/s InfiniBand. PP only communicates activations at stage boundaries.
    The optimal topology maps TP strictly within the node to leverage the 900 GB/s NVLink, and maps PP
    and Data Parallelism (DP) across nodes.
  common_mistake: Failing to quantify the communication intensity of TP versus PP, and ignoring the 18x
    bandwidth taper, leading to a topology where the highest-volume, blocking communications are forced
    over the slowest interconnect.
  napkin_math: 'Bandwidth taper ratio: NVLink (900 GB/s) / InfiniBand (50 GB/s) = 18x. For a hidden dimension
    of 12,288, seq length 2,048, and batch size 4, a single TP All-Reduce transfers ~400MB per layer.
    Over InfiniBand, this takes 8ms per layer. Over NVLink, it takes ~0.44ms. Across 96 layers, inter-node
    TP adds ~768ms of blocking overhead per step, ruining GPU utilization.'
