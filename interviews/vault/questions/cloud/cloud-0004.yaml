title: The VRAM Cost of Context
scenario: You are deploying a large language model for a chatbot service. The model architecture is similar
  to Llama-2 70B, which has a hidden dimension of 8192 (`d_model`) and 80 layers. The product team wants
  to guarantee support for a 4096-token context window. Explain how you would calculate the VRAM required
  *just for the KV-cache* for a single user request, assuming the cache is stored in FP16 precision.
question: "How would you calculate the FP16 KV-cache VRAM for one 4,096-token request on this 80-layer, d_model=8192 model, and what estimate do you get?"
details:
  realistic_solution: The KV-cache stores the Key and Value vectors for every token in the context, for
    every layer. For a single sequence, its size can be estimated by multiplying the sequence length by
    the size of the K and V vectors required for each token across all layers. A simple and safe estimation
    uses the model's hidden dimension (`d_model`) to represent the combined vector size per layer.
  common_mistake: 'A common mistake is to only account for model weights and forget the KV-cache, which
    scales linearly with the context length and can easily dominate VRAM usage for long sequences. Another
    frequent error is to miscalculate the cache size, often by forgetting one of the key factors: the
    `x2` for storing both Keys and Values, or the bytes per parameter (2 for FP16).'
  napkin_math: 'KV Cache = 2 × layers × kv_heads × head_dim × seq_len × bytes_per_param | Llama-2-70B
    uses MHA for this calculation context (d_model=8192, 80 layers). Using d_model directly: | = 2 × 80
    × 8192 × 4,096 × 2 bytes | = 2 × 80 × 8192 × 4096 × 2 = 10,737,418,240 bytes ≈ 10.7 GB | Alternatively,
    using the GQA-aware formula (8 KV heads, head_dim=128): | = 2 × 80 × 8 × 128 × 4,096 × 2 = 1,073,741,824
    bytes ≈ 1.07 GB | The d_model formula assumes all 64 heads store KV (MHA). With GQA (8 KV heads),
    the cache is 8× smaller. | For this problem using d_model as stated: ≈ 10.7 GB for a single 4096-token
    request in FP16.'
  options:
  - 1.25 GB
  - 5 GB
  - 10 GB
  - 80 GB
  correct_index: 2
