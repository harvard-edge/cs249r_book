title: The VRAM Cost of Context
scenario: 'You are deploying a chatbot service using the Llama-1 65B architecture, which has a hidden dimension of 8192 (`d_model`) and 80 layers. The product team wants to guarantee support for a 4096-token context window.'
question: 'How would you calculate the FP16 KV-cache VRAM for one 4,096-token request on this 80-layer, d_model=8192 model?'
details:
  realistic_solution: 'The KV-cache stores the Key and Value vectors for every token in the context, for every layer. For a single sequence, its size can be estimated by multiplying the sequence length by the size of the K and V vectors required for each token across all layers. A simple and safe estimation uses the model''s hidden dimension (`d_model`) to represent the combined vector size per layer.'
  common_mistake: |
    **The Pitfall:** Only accounting for model weights or miscalculating the cache size formula.
    **The Rationale:** Candidates frequently forget the `x2` factor for storing both Keys and Values, or forget the 2 bytes per parameter for FP16.
    **The Consequence:** Under-provisioning GPU memory, leading to Out-Of-Memory errors during extended chat sessions.
  napkin_math: |
    * KV Cache = 2 × layers × (heads × head_dim) × seq_len × bytes_per_param
    * Using `d_model` directly: 2 × 80 × 8192 × 4096 × 2 bytes.
    * 2 × 80 × 8192 × 4096 × 2 = 10,737,418,240 bytes.
    * **The KV cache requires exactly 10 GiB (10 GB) for a single 4096-token request.**
options:
- 1.25 GB
- 5 GB
- 10 GB
- 80 GB
