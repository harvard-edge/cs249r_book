title: The Divergence Problem
scenario: A colleague claims Moore's Law will keep AI energy consumption in check because hardware efficiency doubles every 2 years. However, training compute for frontier models has historically grown ~10x every 2 years.
question: Why won't Moore's Law keep AI energy consumption in check as model compute demand grows?
details:
  realistic_solution: 'Divergent energy scaling describes the growing gap between AI compute demand and hardware efficiency. Hardware efficiency (FLOPS/watt) improves roughly 2x every 2-3 years following a post-Dennard scaling trajectory. But AI model compute requirements grow much faster. The ratio diverges: after 4 years, models need 100x more compute, but hardware is only 4x more efficient. The gap must be filled by more hardware, consuming more total energy. This hits physical constraints: (1) power delivery, (2) grid capacity, (3) cooling. The result: AI''s total energy footprint grows despite per-operation efficiency gains.'
  common_mistake: |
    **The Pitfall:** Assuming hardware efficiency improvements keep pace with model scaling.
    **The Rationale:** Candidates hear "efficiency doubles" and assume energy costs stay flat, ignoring the exponent mismatch.
    **The Consequence:** Drastically underestimating the massive energy footprint and grid capacity needed for future AI datacenters.
  napkin_math: |
    1. **Hardware Efficiency:** Improves ~2x every 2 years.
    2. **Model Compute Demand:** Grows ~10x every 2 years.
    3. **Net Energy Factor:** $10\text{x} / 2\text{x} = 5\text{x}$ more energy needed every 2 years.
    4. **Compounding Effect:** After 6 years, energy demand increases by $5^3 =$ **125x**.
