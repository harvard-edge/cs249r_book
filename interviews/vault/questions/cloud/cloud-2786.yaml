title: The Divergence Problem
scenario: A colleague claims Moore's Law will keep AI energy consumption in check — hardware efficiency
  doubles every 2 years. Explain why AI model compute demands are outpacing hardware efficiency improvements
  and what this means for power infrastructure.
question: "Why won't Moore's Law keep AI energy consumption in check as model compute demand grows?"
details:
  realistic_solution: 'Divergent energy scaling describes the growing gap between AI compute demand and
    hardware efficiency. Hardware efficiency (FLOPS/watt) improves roughly 2x every 2-3 years following
    a post-Dennard scaling trajectory. But AI model compute requirements grow much faster: training compute
    has grown ~10x per year (300,000x from 2012-2022), and even conservative estimates show 4-10x growth
    every 2 years. The ratio diverges: after 4 years, models need 16-100x more compute, but hardware is
    only 4x more efficient. The gap (4-25x) must be filled by more hardware, consuming more total energy.
    This hits physical constraints: (1) power delivery — a single datacenter rack can only receive so
    many watts through copper conductors, (2) grid capacity — new AI datacenters require gigawatts that
    take years to provision, (3) cooling — heat density exceeds what air or even liquid cooling can handle
    in confined spaces. The result: AI''s total energy footprint grows despite per-operation efficiency
    gains.'
  common_mistake: Assuming hardware efficiency improvements keep pace with model scaling. Hardware improves
    ~2x every 2 years; AI compute demand grows ~10x every 2 years. The gap compounds exponentially.
  napkin_math: 'Hardware: 2x efficient every 2yr. Models: 10x more compute every 2yr. Net: 5x more energy
    needed every 2 years. After 6 years: 125x more energy for frontier models.'
