title: Optimizing LLM KV-Cache on NVIDIA A100 for Long Contexts
scenario: You are designing a low-latency inference system for a large language model (LLM) that frequently processes long input contexts (e.g., 32k or 64k tokens). The system will be deployed on NVIDIA A100 GPUs, each equipped with 80 GB of HBM2e memory. Your primary challenge is efficient KV-cache management to maximize throughput and minimize memory-related OOM errors, especially under varying user loads and context lengths.
question: What KV-cache architecture would you use on A100s to handle 32k-64k contexts without OOMs while maximizing throughput?
details:
  realistic_solution: Implement paged attention (e.g., vLLM's PagedAttention) to manage KV-cache memory efficiently by breaking the cache into fixed-size blocks (e.g., 4KB or 16KB). Dynamically allocate/deallocate these blocks based on sequence needs, preventing fragmentation and enabling sharing. Employ a robust cache eviction policy (e.g., least recently used (LRU) or a more sophisticated policy that considers token importance/future use for speculative decoding) when memory pressure is high. Pre-allocate a certain percentage (e.g., 70-80%) of the 80 GB A100 HBM2e memory for KV-cache blocks, leaving room for model weights, activations, and other CUDA overheads. Implement a request scheduler that monitors available memory and prioritizes requests based on predicted KV-cache usage and latency targets. Leverage the A100's 2.0 TB/s HBM2e bandwidth through optimized memory access patterns and potentially zero-copy techniques if host-device communication is involved.
  common_mistake: |
    **The Pitfall:** Overlooking the quadratic memory growth of KV-cache with sequence length.
    **The Rationale:** Engineers rely on fixed-size contiguous cache allocations, not accounting for the fragmentation caused by varying long sequences.
    **The Consequence:** Frequent Out-Of-Memory (OOM) errors and drastically reduced serving concurrency.
  napkin_math: |
    - 7B LLM with 32 layers, 32 attention heads, 128 head dimension.
    - KV-cache entry per token: 2 (K,V) * (32 * 32 * 128 * 2 bytes) = ~524 KB.
    - Single 64k sequence: 64,000 tokens * 524 KB/token = ~33.5 GB.
    - An 80 GB A100 leaves ~46.5 GB for weights (~14 GB), activations, and buffers.
    - **This leaves room for only one contiguous 64k sequence, making paged attention essential for sharing and concurrency.**
