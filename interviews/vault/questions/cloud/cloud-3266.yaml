title: Optimizing LLM KV-Cache on NVIDIA A100 for Long Contexts
scenario: You are designing a low-latency inference system for a large language model
  (LLM) that frequently processes long input contexts (e.g., 32k or 64k tokens). The
  system will be deployed on NVIDIA A100 GPUs, each equipped with 80 GB of HBM2e memory.
  Your primary challenge is efficient KV-cache management to maximize throughput and
  minimize memory-related OOM errors, especially under varying user loads and context
  lengths. Propose an architectural approach to manage the KV-cache, considering techniques
  like paged attention, KV-cache sizing for concurrent requests, and dynamic cache
  eviction policies to handle memory pressure from long contexts. Detail how the A100's
  memory characteristics (e.g., 80 GB HBM2e, 312 TFLOPS FP16, 2.0 TB/s bandwidth,
  400W TDP) influence your design choices.
question: What KV-cache architecture would you use on A100s to handle 32k–64k contexts
  without OOMs while maximizing throughput?
details:
  realistic_solution: Implement paged attention (e.g., vLLM's PagedAttention) to manage
    KV-cache memory efficiently by breaking the cache into fixed-size blocks (e.g.,
    4KB or 16KB). Dynamically allocate/deallocate these blocks based on sequence needs,
    preventing fragmentation and enabling sharing. Employ a robust cache eviction
    policy (e.g., least recently used (LRU) or a more sophisticated policy that considers
    token importance/future use for speculative decoding) when memory pressure is
    high. Pre-allocate a certain percentage (e.g., 70-80%) of the 80 GB A100 HBM2e
    memory for KV-cache blocks, leaving room for model weights, activations, and other
    CUDA overheads. Implement a request scheduler that monitors available memory and
    prioritizes requests based on predicted KV-cache usage and latency targets. Leverage
    the A100's 2.0 TB/s HBM2e bandwidth through optimized memory access patterns and
    potentially zero-copy techniques if host-device communication is involved.
  common_mistake: Overlooking the quadratic memory growth of KV-cache with sequence
    length, leading to frequent Out-Of-Memory (OOM) errors. Not accounting for the
    overhead of multiple concurrent requests when sizing the cache, or relying solely
    on a fixed-size contiguous cache allocation without dynamic eviction or memory
    defragmentation strategies.
  napkin_math: Consider a 7B LLM with 32 transformer layers and 32 attention heads,
    where each head's hidden dimension is 128. For FP16 (2 bytes), a single token's
    KV-cache entry requires `2 * (num_layers * num_heads * head_dim * 2 bytes/FP16)
    = 2 * (32 * 32 * 128 * 2) = ~524KB`. For a single 64k context length sequence,
    the contiguous KV-cache requirement would be `64000 tokens * 524KB/token = ~33.5
    GB`. Given an A100's 80 GB HBM2e, this leaves only ~46.5 GB for model weights
    (e.g., 14GB for FP16 7B model), activations, and other runtime buffers. Paged
    attention allows allocating only the necessary blocks, significantly improving
    memory utilization by preventing fragmentation and enabling more efficient concurrency
    across varying sequence lengths compared to contiguous allocation.
