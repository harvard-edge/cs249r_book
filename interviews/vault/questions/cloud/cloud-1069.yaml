title: Upstream Cleaning vs Downstream Robustness
scenario: Your team is training a 10B parameter multimodal model on a 1024 A100 GPU cluster. The data ingestion pipeline outputs a 10TB dataset with a 2% label noise rate. The modeling team proposes mitigating this downstream by using a robust loss function and increasing the global batch size from 2048 to 8192 to stabilize gradients. This architectural change increases the per-epoch training time from 4 hours to 6 hours.
question: "Should you absorb the 2% label noise downstream or build the 100,000 CPU-hour cleaning pipeline, and what is the cost trade-off?"
details:
  realistic_solution: Justify the upstream data pipeline by comparing the fixed CPU cost of data cleaning against the recurring GPU compute penalty. The larger batch size required to smooth noisy gradients directly inflates the critical path latency, creating a massive financial and temporal cascade.
  common_mistake: |
    **The Pitfall:** Focusing solely on the mathematical viability of robust loss functions.
    **The Rationale:** Candidates ignore the compounding infrastructure costs and iteration latency caused by compensating for bad data downstream.
    **The Consequence:** The training pipeline absorbs massive financial and temporal debt that dwarfs the cost of upstream data cleaning.
  napkin_math: |
    1. Upstream cleaning: 100,000 CPU-hrs * $0.05/hr = $5,000 fixed cost.
    2. Downstream mitigation: +2 hrs/epoch * 1024 A100s * $4/hr = $8,192 extra cost per epoch.
    3. Over a standard 100-epoch training run, the downstream cascade costs $819,200.
    4. **Fixing the root cause upstream is >160x more cost-effective.**
