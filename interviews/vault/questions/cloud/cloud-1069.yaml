title: Upstream Cleaning vs Downstream Robustness
scenario: Your team is training a 10B parameter multimodal model on a 1024 A100 GPU cluster. The data
  ingestion pipeline outputs a 10TB dataset with a 2% label noise rate. The modeling team proposes mitigating
  this downstream by using a robust loss function and increasing the global batch size from 2048 to 8192
  to stabilize gradients. This architectural change increases the per-epoch training time from 4 hours
  to 6 hours. Evaluate the system-level technical debt and compounding infrastructure costs of this downstream
  mitigation compared to building an upstream data cleaning pipeline that reduces noise to 0.1% but requires
  a one-time cost of 100,000 CPU-hours.
details:
  realistic_solution: Justify the upstream data pipeline by comparing the fixed CPU cost of data cleaning
    against the recurring GPU compute penalty. The larger batch size required to smooth noisy gradients
    directly inflates the critical path latency, creating a massive financial and temporal cascade.
  common_mistake: Candidates often focus solely on the mathematical viability of robust loss functions,
    failing to evaluate the compounding infrastructure costs, increased iteration latency, and downstream
    serving complexity caused by compensating for bad data.
  napkin_math: 'Upstream cleaning: 100,000 CPU-hrs * $0.05/hr = $5,000 fixed cost. Downstream mitigation:
    +2 hrs/epoch * 1024 A100s * $4/hr = $8,192 extra cost *per epoch*. Over a standard 100-epoch training
    run, the downstream cascade costs $819,200. Fixing the root cause upstream is >160x more cost-effective.'
