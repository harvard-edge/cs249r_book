title: Hybrid Interconnect MoE Routing
scenario: 'You are architecting the deployment for an 8x100B Mixture-of-Experts model on a cloud instance with 8 GPUs. The GPUs are connected via a hybrid topology: pairs of GPUs have NVLink bridges (100 GB/s bidirectional), but pairs connect to each other via a central PCIe Gen4 switch (32 GB/s). The MoE token routing requires an All-to-All collective of 2 GB per GPU per layer. The training throughput is currently degraded by 60% compared to dense models of similar FLOPs.'
question: How would you map the 2GB-per-GPU MoE All-to-All onto the NVLink-pair plus PCIe-switch topology to reduce the 60% throughput loss?
details:
  realistic_solution: |
    The architectural requirement is to map the logical MoE token routing to the physical asymmetric interconnect. A standard, flat All-to-All treats all links equally, causing severe congestion on the slower PCIe switch while underutilizing the NVLink bridges. The solution is to architect a Hierarchical All-to-All algorithm: Phase 1 involves a local exchange within the NVLink-connected pairs to aggregate tokens destined for other pairs. Phase 2 performs a reduced exchange across the PCIe switch. Phase 3 distributes the tokens locally again. This drastically minimizes the volume of data crossing the oversubscribed PCIe links, optimizing for the 3.1x bandwidth asymmetry.
  common_mistake: |
    **The Pitfall:** Using a standard, flat NCCL All-to-All collective for MoE routing.
    **The Rationale:** Standard collectives assume a uniform bandwidth topology and treat all peer-to-peer links equally.
    **The Consequence:** Severe congestion on the slower PCIe switch while massively underutilizing the high-speed NVLink bridges, causing a severe training bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 GPU node. 2 GB/GPU All-to-All.
       - NVLink pair bandwidth: 100 GB/s. PCIe switch bandwidth: 32 GB/s.
    2. **Calculations:**
       - Flat All-to-All: 7/8 of 2GB = 1.75GB to peers. 6/8 peers are over PCIe (1.5GB).
       - PCIe Transfer Time = 1.5 GB / 32 GB/s = 46.9 ms.
       - Hierarchical All-to-All: Aggregates tokens locally first via NVLink, drastically reducing the physical payload sent over the 32 GB/s bottleneck.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth Over-subscription.** A flat topology mapping over-saturates the PCIe links; a Hierarchical All-to-All reduces total routing time by exploiting local NVLink bandwidth.
