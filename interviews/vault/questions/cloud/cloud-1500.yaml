title: Diagnosing ViT Regression on Small Datasets
scenario: 'Your team upgrades a defect detection model from a ResNet-50 (25.6M parameters) to a ViT-Base
  (86M parameters). You train both models from scratch on an 8x H100 node using a fixed proprietary dataset
  of 45,000 images. The ViT-Base converges to near 0% training error, but validation accuracy drops from
  94% (ResNet) to 73% (ViT). Analyze the bottleneck: why does the model with 3.3x more theoretical capacity
  perform significantly worse in validation?'
question: "Why does ViT-Base overfit 45,000 images and validate worse than ResNet-50 despite 3.3x more parameters?"
details:
  realistic_solution: Diagnose a learnability gap. The ViT is a universal approximator but lacks the translation-invariance
    inductive bias of CNNs. It requires significantly more data to 'learn' these spatial priors from scratch.
    The solution is to use heavy data augmentation, transfer learning (e.g., pre-training on ImageNet-21k),
    or revert to a convolution-based architecture.
  common_mistake: Assuming that higher theoretical representational capacity automatically yields better
    performance, ignoring the optimization difficulty and data hunger caused by lacking structural inductive
    biases.
  napkin_math: ResNet-50 hypothesis space is mathematically constrained by convolutions. ViT-Base attention
    must learn global spatial relations across 196 patches without prior assumptions. Empirical scaling
    shows ViT needs O(10^7) images to naturally outperform CNNs. 45k images is 3.75% of ImageNet-1k (1.2M),
    making it empirically impossible to bridge the learnability gap from scratch.
