title: Diagnosing ViT Regression on Small Datasets
scenario: Your team upgrades a defect detection model from a ResNet-50 (25.6M parameters) to a ViT-Base (86M parameters). You train both models from scratch on an 8x H100 node using a fixed proprietary dataset of 45,000 images. The ViT-Base converges to near 0% training error, but validation accuracy drops from 94% (ResNet) to 73% (ViT).
question: Why does ViT-Base overfit 45,000 images and validate worse than ResNet-50 despite 3.3x more parameters?
details:
  realistic_solution: Diagnose a learnability gap. The ViT is a universal approximator but lacks the translation-invariance inductive bias of CNNs. It requires significantly more data to learn these spatial priors from scratch. The solution is to use heavy data augmentation, transfer learning (e.g., pre-training on ImageNet-21k), or revert to a convolution-based architecture.
  common_mistake: |
    **The Pitfall:** Assuming that higher theoretical representational capacity automatically yields better performance.
    **The Rationale:** Engineers often equate parameter count with intelligence, ignoring the optimization difficulty.
    **The Consequence:** Wasting massive compute budgets training models that are mathematically unsuited for the available data volume, leading to severe overfitting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ViT-Base (86M params) vs ResNet-50 (25.6M params).
       - Dataset: 45,000 images (3.75% of ImageNet-1k).
    2. **Calculations:**
       - ViTs lack convolutional translation-invariance and require O(10^7) images to learn spatial priors from scratch.
    3. **Conclusion & Interpretation:**
       - **Result: Overfitting due to lack of inductive bias.** 45,000 images cannot bridge the learnability gap for a generic attention architecture.
