title: Design Prefix Sharing KV Cache for System Prompt Optimization
scenario: 'You serve a 7B LLM on H100s where 80% of requests share the same 1024-token system prompt. Currently you recompute the KV cache for the system prompt on every request.'
question: 'How would you design a prefix KV cache, and what TTFT savings would it provide?'
details:
  realistic_solution: 'Store the KV cache for the 1024-token system prompt in HBM. All requests sharing this prefix skip prefill for the first 1024 tokens and only compute KV for the user-specific suffix.'
  common_mistake: |
    **The Pitfall:** Not accounting for the fact that prefix caching only helps Time To First Token (prefill).
    **The Rationale:** Candidates overestimate the impact, assuming it speeds up decode latency.
    **The Consequence:** Erroneous capacity planning and failing to realize cached prefixes must be invalidated on model updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B Model, 32 layers, 8 KV heads, 128 head_dim.
    - 1024 shared tokens, 256 unique tokens.
    
    **Calculations:**
    - KV Size per Token: 32 * 2 * 8 * 128 * 2 bytes = 131 KB.
    - Shared Prefix Cache: 1024 * 131 KB = 134 MB (0.17% of 80GB HBM).
    - Old TTFT FLOPs: 7B * 2 * 1280 = 17.92 TFLOPs.
    - New TTFT FLOPs: 7B * 2 * 256 = 3.58 TFLOPs.
    
    **Conclusion & Interpretation:**
    - **Result: 5x TTFT speedup, 64% total prefill compute reduction (Compute-Bound)**. Prefill significantly accelerated via HBM cache.
