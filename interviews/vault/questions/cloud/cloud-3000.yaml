title: 'KV-Cache: Design Prefix Sharing KV Cache for System Prompt Optimization'
scenario: You serve a 7B LLM on H100s (80GB HBM3) where 80% of requests share the
  same 1024-token system prompt. Currently you recompute the KV cache for the system
  prompt on every request. Design a prefix KV cache that shares this computation,
  and quantify the TTFT reduction and compute savings.
question: How would you design the prefix KV cache for the shared 1024-token system
  prompt, and what TTFT and compute savings would it provide?
details:
  realistic_solution: Store the KV cache for the 1024-token system prompt in HBM.
    All requests sharing this prefix skip prefill for the first 1024 tokens. Only
    compute KV for the user-specific suffix.
  common_mistake: Not accounting that prefix caching only helps TTFT (prefill), not
    decode latency. Also forgetting that cached prefixes must be invalidated when
    the model is updated.
  napkin_math: '7B model, 32 layers, GQA 8 KV heads, head_dim=128. KV per token: 32
    \times 2 \times 8 \times 128 \times 2B = 131KB per token. 1024-token system prompt KV: 1024 \times 131KB
    = 134MB. At 80 GB H100: 134MB/80GB = 0.17% of HBM for one cached prefix. TTFT
    without prefix caching: prefill 1024 system + 256 user suffix = 1280 tokens. Prefill
    throughput at 40% MFU: 7B \times 2 FLOPs \times 1280 / (989T \times 0.4) = 17.92T / 395.6T =
    0.045 seconds. With prefix caching: only prefill 256 tokens: 17.92T \times 256/1280
    = 3.58T / 395.6T = 0.009 seconds. TTFT reduction: 0.045s \rightarrow 0.009s = 5\times faster.
    For 80% of requests. Compute savings: 80% \times (1024/1280) = 64% compute reduction
    for total prefill workload. At 10K req/sec: saves 8000 req/sec \times 0.036s = 288 H100-seconds/second.'
