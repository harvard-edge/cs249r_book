title: 'KV-Cache: Design Prefix Sharing KV Cache for System Prompt Optimization'
scenario: 'You serve a 7B LLM on H100s (80GB HBM3) where 80% of requests share the same 1024-token system prompt. Currently you recompute the KV cache for the system prompt on every request.'
question: 'How would you design a prefix KV cache for the shared 1024-token system prompt, and what TTFT and compute savings would it provide?'
details:
  realistic_solution: 'Store the KV cache for the 1024-token system prompt in HBM. All requests sharing this prefix skip prefill for the first 1024 tokens. Only compute KV for the user-specific suffix.'
  common_mistake: |
    **The Pitfall:** Not accounting for the fact that prefix caching only helps Time To First Token (prefill).
    **The Rationale:** Candidates overestimate the impact, assuming it will speed up the entire generation process including decode latency.
    **The Consequence:** Erroneous capacity planning and failing to realize that cached prefixes must be invalidated when the model is updated.
  napkin_math: |
    - **KV Cache per Token:** 32 layers × 2 (K&V) × 8 KV heads × 128 head_dim × 2 bytes = 131,072 bytes (~131 KB).
    - **System Prompt KV Size:** 1024 tokens × 131 KB = 134 MB.
    - **HBM Impact:** 134 MB / 80 GB = **0.17% of HBM**.
    - **Without Caching TTFT:** 1280 tokens (1024+256) prefill. FLOPs = 7B × 2 × 1280 = 17.92 TFLOPs. Time at 40% MFU (395.6 TFLOPS) = 17.92 / 395.6 = 0.045 seconds.
    - **With Caching TTFT:** 256 tokens prefill. FLOPs = 7B × 2 × 256 = 3.58 TFLOPs. Time = 3.58 / 395.6 = 0.009 seconds (**5× faster TTFT**).
    - **Compute Savings:** 80% of traffic saves 1024/1280 compute = **64% overall prefill compute reduction**.
