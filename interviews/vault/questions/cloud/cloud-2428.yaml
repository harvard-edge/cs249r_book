title: Diffusion Model INT8 PTQ Artifacts
scenario: You deploy an SDXL text-to-image service. To hit a sub-second SLA, you apply INT8 PTQ. You calibrate
  the model using 500 high-quality images from the target domain. Latency hits 0.8s, but the output images
  have severe color banding and structural artifacts. FP16 output is perfect.
details:
  realistic_solution: 'Diffusion models are iterative and their activation distributions change drastically
    across the denoising timesteps. At T=1000, activations represent mostly noise (Gaussian distribution).
    At T=0, activations represent sharp image features (highly skewed, localized outliers). Calibrating
    on raw images or a random subset of timesteps creates a single set of quantization scales that fits
    neither extreme well. The artifacts occur because the static scales clip the outliers at early timesteps
    and lose precision at late timesteps. The architecture requires a Timestep-Aware Calibration strategy:
    either group the 50 timesteps into intervals (e.g., 5 groups of 10) and compute separate INT8 activation
    scales for each interval, or calibrate using a representative sample of activations collected across
    the entire diffusion trajectory.'
  common_mistake: Increasing the number of denoising steps from 50 to 100 to smooth out the noise, which
    violates the sub-second SLA.
  napkin_math: If activation variance at T=1000 is 5.0 and at T=10 is 50.0. A static max calibration of
    50.0 means at T=1000, the effective INT8 range used is only [-12, 12] out of [-127, 127] (wasting
    3 bits of precision). This quantization noise injected at T=1000 compounds over the next 49 steps,
    causing the color banding.
