title: Spot Instance Strategy for Training Resilience
scenario: You are training a 13B model on 32 MI300X spot instances at 70% discount.
  Spot interruptions occur on average every 2 hours with 2-minute warning. Design
  a checkpointing strategy that maximizes cost savings while minimizing wasted compute.
question: For 32 MI300X spot instances interrupted every 2 hours with 2-minute warning,
  what checkpointing strategy minimizes wasted compute?
details:
  realistic_solution: 'Optimal checkpoint interval (Young''s approximation): interval
    = sqrt(2 × mean_time_between_failures × checkpoint_cost). Checkpoint cost for
    13B model: 13B × 2B (BF16) = 26 GB to write. At NVMe write speed of 3 GB/s: ~9
    seconds. Plus optimizer states: 13B × 12B = 156 GB across 32 GPUs (ZeRO-sharded),
    so each GPU writes ~4.9 GB → 1.6 s. Total checkpoint time ≈ 10 seconds. MTBF =
    2 hours = 7200 s. Optimal interval = sqrt(2 × 7200 × 10) = sqrt(144000) ≈ 380
    seconds ≈ 6.3 minutes. Strategy: checkpoint every 6 minutes to local NVMe, async
    upload to S3 every 30 minutes. On 2-minute interruption warning: immediately checkpoint
    (10 s) and gracefully shut down. Expected wasted compute per interruption: 6/2
    = 3 minutes average (half the checkpoint interval). At 3 interruptions/day: 9
    GPU-minutes wasted. Cost savings: 32 GPUs × $3/hr × 0.7 discount × 24h = $1,612/day
    saved. Wasted compute cost: negligible.'
  common_mistake: Checkpointing too frequently (every 5 minutes) — large model checkpoints
    take significant time and bandwidth. Or too infrequently (every 2 hours) — losing
    nearly all progress on interruption.
  napkin_math: 'Checkpoint: 10 s every 6 min = 2.8% overhead. Waste per interruption:
    3 min average. Cost: spot saves $1,612/day vs $4.50/day wasted compute.'
