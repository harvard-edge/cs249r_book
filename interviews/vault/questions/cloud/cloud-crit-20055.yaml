title: Speculative Decoding Break-Even Analysis
scenario: For a 70B target on H100 with a 7B draft (2ms/token draft cost, 42ms verification cost), derive
  the minimum acceptance rate alpha_min below which speculative decoding becomes slower than autoregressive
  decoding for K=5. Then extend to find the general formula for arbitrary K and draft cost.
details:
  realistic_solution: 'Autoregressive: 42ms per token (memory-bound on H100). Speculative round: K x draft_cost
    + verify_cost = 5 x 2 + 42 = 52ms. E[tokens] = (1 - alpha^(K+1))/(1-alpha). Breakeven: E[tokens]/52ms
    >= 1/42ms. E[tokens] >= 52/42 = 1.238. (1 - alpha^6)/(1-alpha) >= 1.238. For alpha: at alpha=0.15:
    (1-0.15^6)/0.85 = 1.176. At alpha=0.20: (1-0.20^6)/0.80 = 1.250. So alpha_min ≈ 0.20. General formula:
    E[tokens] >= (K x c_draft + c_verify) / c_auto, where c_draft = draft cost per token, c_verify = verification
    cost, c_auto = auto cost. For K=5, c_draft=2, c_verify=42, c_auto=42: alpha_min = 0.20. Surprisingly
    low! Speculation is hard to make worse when draft is cheap. At K=10, c_draft=2: round = 62ms. E >=
    62/42 = 1.48. alpha_min = 0.32. At K=5, c_draft=10 (expensive draft): round = 92ms. E >= 92/42 = 2.19.
    alpha_min = 0.58.'
  common_mistake: Setting up the inequality incorrectly by comparing per-token latency instead of per-round
    expected tokens. The breakeven is when E[tokens]/round_time = 1/auto_time.
  napkin_math: 'Breakeven: E[tok] >= round_time / auto_time. K=5, 2ms draft: E >= 52/42 = 1.24, alpha_min
    = 0.20. K=5, 10ms draft: E >= 92/42 = 2.19, alpha_min = 0.58. Cheap drafts have very low breakeven.'
