title: Least-Connections Routing for Heterogeneous GPU Serving
scenario: Your ML serving cluster has a mix of 8 H100 GPUs and 8 MI300X GPUs. Both serve the same 70B model. H100s handle 50 tok/s per request and MI300X handles 65 tok/s. A round-robin load balancer causes H100s to queue up while MI300X GPUs finish faster.
question: How do you design a load-balancing strategy that accounts for heterogeneous hardware capacities?
details:
  realistic_solution: Use weighted least-connections (WLC) routing. Assign weights proportional to throughput capacity: MI300X weight = 65, H100 weight = 50. Route each request to the backend with the lowest (active_connections / weight) ratio. This naturally sends more requests to faster MI300X GPUs. Implementation: (1) The load balancer tracks active request count per backend. (2) For each new request, select backend with min(active / weight). (3) When requests complete, decrement the counter. Enhancement: add latency-aware routing — track P50 response time per backend and route to the backend with lowest estimated completion time (active_connections × avg_latency). This adapts to thermal throttling, memory pressure, or degraded GPUs automatically.
  common_mistake: |
    **The Pitfall:** Using simple round-robin or random routing.
    **The Rationale:** These strategies treat all backends equally regardless of their actual processing capacity.
    **The Consequence:** Slower backends accumulate queues and spike tail latency while faster ones sit completely idle.
  napkin_math: |
    1. Round-robin: 16 GPUs, each gets 1/16 of load. H100 at 50 tok/s saturates sooner than MI300X at 65 tok/s.
    2. Optimal allocation: MI300X handles 65/(50+65) = 56.5% of requests.
    3. Weighted least-connections (WLC) routing naturally achieves this distribution.
    **WLC reduces queue time by ~30% vs round-robin.**
