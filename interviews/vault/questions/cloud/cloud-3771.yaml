title: Least-Connections Routing for Heterogeneous GPU Serving
scenario: Your ML serving cluster has a mix of 8 standard GPUs and 8 specialized accelerators. Both serve the same 70B model. The standard GPUs handle 50 tok/s per request and the accelerators handle 65 tok/s. A round-robin load balancer causes the standard GPUs to queue up while the accelerators finish faster.
question: How do you design a load-balancing strategy that accounts for heterogeneous hardware capacities?
details:
  realistic_solution: 'Use weighted least-connections (WLC) routing. Assign weights proportional to throughput capacity: Accelerator weight = 65, GPU weight = 50. Route each request to the backend with the lowest (active_connections / weight) ratio. This naturally sends more requests to faster accelerators. Implementation: (1) The load balancer tracks active request count per backend. (2) For each new request, select backend with min(active / weight). (3) When requests complete, decrement the counter. Enhancement: add latency-aware routing — track P50 response time per backend and route to the backend with lowest estimated completion time (active_connections * avg_latency). This adapts to thermal throttling, memory pressure, or degraded GPUs automatically.'
  common_mistake: |
    **The Pitfall:** Using simple round-robin or random routing.
    **The Rationale:** These strategies treat all backends equally regardless of their actual processing capacity.
    **The Consequence:** Slower backends accumulate queues and spike tail latency while faster ones sit completely idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster: 8 standard GPUs (50 tok/s) and 8 specialized accelerators (65 tok/s).
       - Total devices: 16.
    2. **Calculations:**
       - Round-robin: Each device gets 1/16 (6.25%) of the load. Standard GPUs saturate early.
       - Optimal allocation for accelerators: 65 / (50 + 65) = 56.5% of total request stream.
       - Optimal allocation for standard GPUs: 50 / (50 + 65) = 43.5% of total request stream.
    3. **Conclusion & Interpretation:**
       - **Result: Throughput-Optimized.** Weighted least-connections naturally achieves this distribution, reducing queue time by ~30% vs round-robin.
