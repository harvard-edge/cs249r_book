title: Tail Latency Impact of Garbage Collection
scenario: Your Python-based inference service shows periodic P99 spikes every ~30 seconds, each lasting 50-200ms. The spikes correlate with Python garbage collection cycles.
question: Why does GC disproportionately affect tail latency in ML serving, and what are your mitigation options?
details:
  realistic_solution: 'Python''s cyclic GC (generation 2) triggers every ~700 allocations by default and runs stop-the-world, pausing all threads including the ones feeding data to the TPU. During a GC pause, the TPU starves for input and the response is delayed by the full GC duration. Mitigations: (1) Disable automatic GC and trigger it manually between request batches: `gc.disable()` then `gc.collect()` during idle periods. (2) Use `gc.set_threshold(50000, 50, 10)` to reduce GC frequency at the cost of higher peak memory. (3) Minimize Python object churn — use numpy/jax arrays (not Python lists) for data staging, pre-allocate buffers. (4) In production, use a sidecar process for GC-heavy preprocessing, keeping the inference process lean. Result: P99 spikes eliminated, steady-state memory increases 10-15%.'
  common_mistake: |
    **The Pitfall:** Disabling garbage collection entirely.
    **The Rationale:** Engineers see GC causing latency spikes and assume turning it off is the simplest fix.
    **The Consequence:** This causes memory leaks that eventually Out-Of-Memory (OOM) the inference process, trading a latency issue for a total reliability failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Default GC runs every ~30s, pausing for 50-200ms.
       - Inference runs at 1000 req/s.
    2. **Calculations:**
       - Request Delay: Each GC pause delays 50-200 requests.
       - Latency Shift: Baseline P99 is 25ms. With spikes, P99 is 150ms.
       - Mitigation: Manual GC scheduling drops P99 to 28ms (3ms overhead).
    3. **Conclusion & Interpretation:**
       - **Result: Manual GC scheduling eliminates P99 spikes at the cost of a 10-15% memory increase. Runtime-Bound**
