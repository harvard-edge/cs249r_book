title: The 3D Parallelism Orchestration
scenario: You have 1,024 H100 GPUs across 128 DGX nodes (8 GPUs each, NVSwitch intra-node at 900 GB/s,
  400 Gbps InfiniBand inter-node). You need to train a 175B parameter GPT-style model with 96 transformer
  layers. Walk me through how you assign the three parallelism dimensions — tensor ($T$), pipeline ($P$),
  and data ($D$) — and justify each choice with a physical constraint.
details:
  realistic_solution: 'Solve inside-out from physical constraints. **Tensor parallelism ($T=8$):** TP
    requires AllReduce on activations at every layer — this needs NVLink bandwidth (900 GB/s). The NVLink
    domain is exactly 8 GPUs per DGX node, so $T=8$. Going beyond 8 would cross to InfiniBand (50 GB/s),
    an 18× bandwidth cliff. **Pipeline parallelism ($P=8$):** 96 layers / 8 stages = 12 layers per stage.
    Each stage holds $175B/8 \times 2B = 43.75\text{ GB}$ of weights (fits in 80 GB). Pipeline communication
    is point-to-point activations between adjacent stages — low bandwidth, tolerant of InfiniBand latency.
    **Data parallelism ($D$):** $D = 1024 / (8 \times 8) = 16$. DP AllReduce happens once per step (not
    per layer), so it tolerates inter-node bandwidth. Verify: 16 DP replicas × 8 TP × 8 PP = 1024 GPUs.'
  common_mistake: '"Maximize data parallelism for simplicity: $T=1, P=1, D=1024$." This ignores that 175B
    × 2 bytes = 350 GB of weights alone won''t fit on a single 80 GB GPU, so $T=1$ is physically impossible.
    Others suggest $T=P=D \approx 10$, ignoring that $T$ must align with the NVLink domain.'
  napkin_math: 'Memory per GPU: 175B / ($T \times P$) = 175B / 64 ≈ 2.73B params × 16 bytes (Adam) = 43.7
    GB — fits in 80 GB with room for activations. Pipeline bubble: $(8-1)/(M+7)$. Need $M \geq 140$ for
    <5% bubble. Global batch = $M \times D \times \text{micro\_batch}$ = 140 × 16 × 4 = 8,960 sequences
    — achievable for LLM pretraining. DP AllReduce volume: 175B × 2B / $P$ = 5.47 GB per DP group. At
    400 Gbps (50 GB/s): 43.75/50 ≈ 0.875s — must overlap with backward pass.'
