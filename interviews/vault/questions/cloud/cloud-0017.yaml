title: The KV-Cache VRAM Budget
scenario: You are scoping the GPU memory requirements for serving a Llama-3 8B model. Your service needs to handle a context length of 8,192 tokens. The model is running in FP16 precision.
question: "How much FP16 KV-cache memory is required for one 8,192-token Llama-3 8B request using its 8 KV heads?"
details:
  realistic_solution: The correct approach is to calculate the total storage needed for the Key and Value tensors across all layers for the entire sequence length. For each token in the sequence, for each layer, we must store a Key vector and a Value vector.
  common_mistake: |
    **The Pitfall:** Confusing the memory needed for KV-cache with the static memory needed for weights, or using query heads instead of KV heads.
    **The Rationale:** Grouped-Query Attention (GQA) reduces KV heads relative to query heads, which is easy to overlook.
    **The Consequence:** Massively overestimating the VRAM requirement and over-provisioning GPUs.
  napkin_math: |
    1. Dimensions: S=8192, L=32, H_kv=8, D_h=128, B=2 bytes.
    2. Memory per token = 2 (K+V) × L × H_kv × D_h × B = 2 × 32 × 8 × 128 × 2 = 131,072 bytes.
    3. Total memory = 131,072 × 8192 = 1,073,741,824 bytes = **1 GB**.
  options:
  - 16 GB
  - 4 GB
  - 1 GB
  - 512 MB
  correct_index: 2
