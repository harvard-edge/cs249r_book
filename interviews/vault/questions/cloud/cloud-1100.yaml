title: AOT Dataset Compilation for H100 GPU Clusters
scenario: 'You are training a large vision model on an 8x H100 node. The GPUs can collectively process 32,000 images per second. The raw dataset consists of 5MB high-resolution JPEGs stored in object storage. Assume a single host CPU core can decode and resize 200 JPEGs per second.'
question: 'Calculate the network and CPU requirements to determine if you should use JIT decoding or AOT dataset compilation to feed the 32,000 images/sec.'
details:
  realistic_solution: 'Implement an AOT data compilation step (similar to building an executable) that pre-processes raw 5MB JPEGs into uncompressed, sequentially readable 300KB FP16 tensors packed into formats like WebDataset or TFRecords.'
  common_mistake: |
    **The Pitfall:** Relying on JIT data loading from object storage for high-throughput GPU training.
    **The Rationale:** Developers often use basic PyTorch DataLoaders out of the box.
    **The Consequence:** Severe CPU decoding bottlenecks and network saturation that starves the expensive GPUs and stalls training.
  napkin_math: |
    - **JIT Network Traffic:** 32,000 imgs/sec × 5MB = 160 GB/s (vastly exceeds a standard 50GB/s IB NDR NIC).
    - **JIT CPU Cores:** 32,000 / 200 = 160 CPU cores (massive overhead).
    - **AOT Tensors:** Preprocessing to 300KB uncompressed FP16 tensors.
    - **AOT Network Traffic:** 32,000 × 300KB = 9.6 GB/s.
    - **Conclusion:** AOT fits comfortably within the 50GB/s network limit and frees the CPUs entirely.
