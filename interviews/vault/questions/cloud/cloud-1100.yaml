title: AOT Dataset Compilation for H100 GPU Clusters
scenario: You are training a large vision model on an 8x H100 node. The GPUs can collectively process
  32,000 images per second. The raw dataset consists of 5MB high-resolution JPEGs stored in object storage.
  Assume a single host CPU core can decode and resize 200 JPEGs per second. Calculate the network bandwidth
  and CPU core requirements if you dynamically decode and resize the images just-in-time (JIT) versus
  an ahead-of-time (AOT) dataset compilation pipeline that pre-processes them into 300KB uncompressed
  FP16 training-ready tensors.
details:
  realistic_solution: Implement an AOT data compilation step (similar to building an executable) that
    pre-processes raw 5MB JPEGs into uncompressed, sequentially readable 300KB FP16 tensors packed into
    formats like WebDataset or TFRecords.
  common_mistake: Relying on JIT data loading from object storage, resulting in severe CPU decoding bottlenecks
    and network saturation that starves the expensive GPUs and stalls training.
  napkin_math: Just-In-Time (JIT) decoding requires transferring 32,000 imgs/sec * 5MB = 160 GB/s. This
    vastly exceeds the node's single IB NDR 50GB/s NIC limit. CPU decode also requires 32,000 / 200 =
    160 cores. Ahead-Of-Time (AOT) preprocessing reduces images to 300KB tensors. AOT network traffic
    = 32,000 * 300KB = 9.6 GB/s, which comfortably fits within the 50GB/s IB limit and frees the CPUs
    entirely.
