title: Incomplete Carbon Estimate For Training
scenario: A team plans a 2 million GPU-hour training run and asks for a carbon estimate. They provide GPU count and duration but omit average power draw, PUE, region, grid carbon intensity, renewable matching, and whether embodied carbon should be included.
question: What information is missing for a carbon estimate, and what formula can you write with the provided GPU-hours?
details:
  realistic_solution: You can write the accounting formula but not a numeric answer. Operational carbon is GPU-hours times average kW per GPU times PUE times regional carbon intensity. You need average power, PUE, region/time carbon intensity, and scope boundaries. If embodied carbon matters, you also need allocation over hardware lifetime.
  common_mistake: Multiplying GPU-hours by a generic carbon factor without stating region, PUE, or average power.
  napkin_math: CO2 = GPU_hours x kW_per_GPU x PUE x kgCO2_per_kWh. With 2M GPU-hours, every 0.1 kW or 0.1 PUE assumption materially changes the result.
