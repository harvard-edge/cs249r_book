title: Multi-Query vs Grouped-Query Attention Memory Savings
scenario: 'A 70B model uses 64 attention heads with head_dim=128. Compare the KV cache memory at 4096
  context length for three configurations: (1) multi-head attention (MHA, 64 KV heads), (2) grouped-query
  attention (GQA, 8 KV groups), and (3) multi-query attention (MQA, 1 KV head). What are the implications
  for FlashAttention''s tiling strategy?'
question: "What KV-cache memory does 4096-token context require for MHA, GQA, and MQA in the 70B model, and how does this affect FlashAttention tiling?"
details:
  realistic_solution: 'KV cache per token per layer = num_kv_heads × head_dim × 2 (K+V) × 2 bytes (BF16).
    MHA (64 KV heads): 64 × 128 × 2 × 2 = 32 KB/token/layer. Total for 4096 tokens × 80 layers: 32 KB
    × 4096 × 80 = 10.0 GB. GQA (8 KV groups): 8 × 128 × 2 × 2 = 4 KB/token/layer. Total: 4 KB × 4096 ×
    80 = 1.25 GB. MQA (1 KV head): 1 × 128 × 2 × 2 = 0.5 KB/token/layer. Total: 0.5 KB × 4096 × 80 = 160
    MB. For FlashAttention tiling: with GQA/MQA, multiple query heads share the same K,V tiles. When processing
    a tile of K,V, FlashAttention can compute attention for all 8 query heads in the group simultaneously,
    improving data reuse. The K,V tile is loaded once from HBM but used 8× (GQA) or 64× (MQA), boosting
    arithmetic intensity further.'
  common_mistake: Thinking GQA/MQA changes the number of query heads. Only the K and V heads are reduced.
    Each query head still operates independently — it just shares K,V with other heads in its group.
  napkin_math: 'MHA KV cache: 64 × 128 × 2 × 2B × 4096 × 80 = 10.0 GB. GQA: 8/64 × 10.0 = 1.25 GB (8×
    reduction). MQA: 1/64 × 10.0 = 160 MB (64× reduction). Concurrent requests at 80 GB: MHA = 5, GQA
    = 40+, MQA = hundreds.'
