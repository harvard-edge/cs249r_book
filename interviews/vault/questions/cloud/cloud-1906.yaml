title: DLRM Embedding Lookup Bandwidth Calculation
scenario: You are profiling the embedding lookup stage of a Deep Learning Recommendation Model (DLRM)
  on an Nvidia A100 GPU (2000 GB/s memory bandwidth). The model processes a batch size of 2048. For each
  item in the batch, the model performs 200 sparse embedding lookups. Each embedding vector is 256-dimensional
  and stored in FP16 format. Assuming perfectly random access with zero cache hits and no arithmetic operations
  on the vectors during lookup, calculate the memory read volume per batch and the theoretical maximum
  batches per second bounded by DRAM bandwidth.
question: "What memory read volume per batch and bandwidth-bound maximum batches per second does the embedding lookup stage achieve?"
details:
  realistic_solution: Recognize that sparse lookups have zero arithmetic intensity and are entirely memory-bandwidth
    bound. Calculate the exact read volume per batch (209.7 MB) based on batch size, feature count, vector
    dimension, and data type size, then divide the GPU's memory bandwidth by this volume to find the maximum
    throughput (~9536 batches/sec).
  common_mistake: Candidates often attempt to calculate FLOPs for the lookup operation or incorrectly
    assume the entire embedding table size dictates the per-batch bandwidth. They also frequently forget
    to multiply by the byte size of the data type (2 bytes for FP16).
  napkin_math: Read volume = 2048 (items) * 200 (lookups) * 256 (dim) * 2 (bytes/FP16) = 209,715,200 bytes
    = 209.7 MB. Max throughput = 2,000,000 MB/s / 209.7 MB/batch = 9536 batches/sec. Arithmetic intensity
    = 0 FLOPs / 209.7 MB = 0.
