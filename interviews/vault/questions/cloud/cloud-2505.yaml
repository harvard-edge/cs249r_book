title: Overprovisioning Under Power Caps
scenario: You are designing a new cluster with a hard 10 MW facility limit. You can either deploy 10,000 GPUs running at their full 1000W TDP, or overprovision by buying 14,000 GPUs and aggressively power-capping them to 700W each. Both scenarios max out the 10 MW limit.
question: Under a 10MW cap, would you deploy 10,000 GPUs at 1000W or 14,000 GPUs power-capped to 700W, and what is the TCO trade-off?
details:
  realistic_solution: Power and clock frequency scale non-linearly. Because dynamic power scales with the cube of frequency/voltage ($P \propto fV^2$), reducing the power cap by 30% (from 1000W to 700W) typically only reduces the GPU clock frequency and overall throughput by about 10-15%. Therefore, overprovisioning the data center with 14,000 GPUs running at 700W will yield significantly higher total cluster throughput than 10,000 GPUs at 1000W. The tradeoff, however, is Capital Expenditure (CapEx) and networking. You must purchase 4,000 additional GPUs, switches, and host nodes.
  common_mistake: |
    **The Pitfall:** Assuming throughput scales linearly with power.
    **The Rationale:** Candidates falsely conclude that a 30% reduction in power results in a 30% reduction in performance, making both options equal in throughput.
    **The Consequence:** Missing the non-linear relationship between voltage/frequency and power, leading to suboptimal cluster design and wasted facility power capacity.
  napkin_math: |
    1. **Option A (Full Power):** 10,000 GPUs * 1000W = 10 MW. Total Performance = 10,000 units.
    2. **Option B (Power Capped):** 14,000 GPUs * 700W = 9.8 MW. At 700W (70% TDP), GPUs retain ~85% performance.
    3. **Option B Performance:** 14,000 * 0.85 = 11,900 units.
    4. **Comparison:** Option B yields **19% more total throughput** for the same power envelope, at the cost of a 40% higher CapEx.
