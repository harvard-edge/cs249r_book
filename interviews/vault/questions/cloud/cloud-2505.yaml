title: Overprovisioning Under Power Caps
scenario: You are designing a new cluster with a hard 10 MW facility limit. You can either deploy 10,000
  GPUs running at their full 1000W TDP, or overprovision by buying 14,000 GPUs and aggressively power-capping
  them to 700W each. Both scenarios max out the 10 MW limit. Evaluate the tradeoff between cluster throughput
  and TCO.
question: "Under a 10MW cap, would you deploy 10,000 GPUs at 1000W or 14,000 GPUs power-capped to 700W, and what is the TCO trade-off?"
details:
  realistic_solution: Power and clock frequency scale non-linearly. Because dynamic power scales with
    the cube of frequency/voltage ($P \propto fV^2$), reducing the power cap by 30% (from 1000W to 700W)
    typically only reduces the GPU clock frequency and overall throughput by about 10-15%. Therefore,
    overprovisioning the data center with 14,000 GPUs running at 700W will yield significantly higher
    total cluster throughput than 10,000 GPUs at 1000W. The tradeoff, however, is Capital Expenditure
    (CapEx) and networking. You must purchase 4,000 additional GPUs, switches, and host nodes. You must
    calculate if the ~19% gain in total throughput generates enough revenue to offset the massive CapEx
    increase of buying 40% more hardware. In cloud environments where power is the absolute bottleneck
    (power wall), hardware overprovisioning with aggressive power capping is the optimal path for maximizing
    perf/watt.
  common_mistake: Assuming throughput scales linearly with power, leading to the false conclusion that
    10,000 GPUs at 1000W yield the same throughput as 14,000 GPUs at 700W.
  napkin_math: 'Option A: 10,000 GPUs * 1000W = 10 MW. Perf = 10,000 units. Option B: 14,000 GPUs * 700W
    = 9.8 MW. At 700W (70% TDP), GPUs retain ~85% performance. Perf = 14,000 * 0.85 = 11,900 units. Option
    B yields 19% more total throughput for the same 10 MW power envelope, but increases CapEx by 40%.'
