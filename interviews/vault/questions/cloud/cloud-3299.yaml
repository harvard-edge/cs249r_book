title: Optimizing Real-time LLM Inference Latency and Throughput on NVIDIA A100 with Adaptive Batching
scenario: Your team is deploying a critical large language model for real-time conversational AI. The primary goal is to achieve sub-50ms p99 latency for single-turn responses while maximizing overall system throughput. You've observed that simple static batching leads to suboptimal GPU utilization for sparse request patterns and increased tail latencies during peak load.
question: "How would you design adaptive batching for LLM inference to achieve sub-50 ms p99 latency while maximizing throughput under variable traffic?"
details:
  realistic_solution: 'Implement an adaptive or continuous batching strategy. Dynamic Batching with Time-Based Scheduling employs a request queue with a maximum waiting time (max_wait_ms) and a max_batch_size. Continuous Batching (iteration-level scheduling) executes concurrent requests by efficiently managing KV caches and swapping in new tokens for requests ready for the next inference step, drastically minimizing idle time. Implement a feedback loop that monitors real-time p99 latencies and queue lengths to adjust parameters (e.g., shrinking max_wait_ms during low load to minimize latency, raising it under high load to boost throughput).'
  common_mistake: |
    **The Pitfall:** Applying a fixed, large static batch size universally.
    **The Rationale:** Engineers assume large batches always maximize throughput.
    **The Consequence:** Severe p99 latency violations during variable traffic due to excessive queueing delays while waiting for the batch to fill.
  napkin_math: |
    1. **Assumptions & Constraints:** Target L_target <= 50ms. Processing time = T_overhead + B * T_token.
    2. **Calculations:** Static wait condition: Max_Queue_Wait + T_overhead + B_avg * T_token <= L_target. If max_wait=20ms and T_overhead=5ms, then processing (B_avg * T_token) must be <= 25ms.
    3. **Conclusion & Interpretation:** **Result: Latency-Bound.** Adaptive batching enforces dynamic bounds on queue and processing times to strictly meet the 50ms SLA.
