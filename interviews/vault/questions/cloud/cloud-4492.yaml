title: MI300X MoE Routing Bottleneck
scenario: Designing the backend for a mixture-of-experts model inference system across
  64 MI300X GPUs interconnected via 400 Gbps RoCEv2.
question: Formulate an expert routing mechanism that minimizes cross-node traffic
  over the 400 Gbps bottleneck while maintaining load balance.
visual:
  kind: svg
  path: cloud-4492.svg
  alt: Diagram comparing local massive HBM bandwidth versus thin network link between
    MI300X nodes.
  caption: MoE Token Routing Network
details:
  realistic_solution: The candidate should propose local expert placement where frequently
    co-accessed experts reside on the same GPU to utilize the 5.3 TB/s HBM bandwidth,
    reserving the much slower 50 GB/s RoCE link for rare expert dispatch.
  common_mistake: Assuming 400 Gbps (50 GB/s) is fast enough to transfer all tokens
    all-to-all without considering the massive dropoff from the 5.3 TB/s local memory
    bandwidth.
  napkin_math: 400 Gbps = 50 GB/s << 5300 GB/s HBM
