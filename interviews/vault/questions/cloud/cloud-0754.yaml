title: The Checkpoint Resurrection
scenario: 'We''re training a 175B model on 10,000 H100 GPUs. At step 50,000, a node fails and the job
  crashes. We checkpoint every 1,000 steps. The PM asks: ''We only lost 1,000 steps of work, right? So
  we restart and lose maybe 30 minutes?'' Explain why the PM''s estimate is dangerously optimistic.'
details:
  realistic_solution: 'The PM''s estimate misses four costs: (1) **Checkpoint write time** — a 175B model
    in mixed-precision training has ~2.8 TB of state (weights + optimizer + gradients). Writing this to
    distributed storage (even parallel across nodes) takes significant time. (2) **Lost compute** — the
    1,000 steps between checkpoints represent real GPU-hours that are irrecoverable. (3) **Restart overhead**
    — re-initializing 10,000 GPUs, re-establishing NCCL communication rings, loading the checkpoint from
    storage, and verifying consistency takes 15-45 minutes. (4) **Checkpoint loading** — reading 2.8 TB
    from distributed storage back into 10,000 GPUs is not instant. The total recovery time is far longer
    than "30 minutes," and the dollar cost of lost compute is substantial.'
  common_mistake: '"Checkpoint overhead is negligible — just reload the last checkpoint and resume." This
    ignores the time to write checkpoints, the time to restart 10,000 GPUs, and the cascading costs of
    failure at scale.'
  napkin_math: '**Checkpoint size:** 175B params × 16 bytes (FP16 weights + FP32 master weights + FP32
    Adam m + FP32 Adam v = 2+4+4+4 = 14 bytes, plus 2 bytes FP16 gradients = 16 bytes) = **2.8 TB**. **Write
    time:** Parallel write across 1,250 nodes to a distributed filesystem at ~10 GB/s aggregate = 2,800
    / 10 = **~280 seconds** (~4.7 min) per checkpoint. **Step time estimate:** With 175B params, global
    batch size of ~1,536, and 8-way tensor parallelism across 10,000 GPUs: ~1.5 seconds per step is realistic.
    1,000 steps ≈ **25 minutes** of training. Checkpointing overhead: 4.7 min every 25 min = **~16% overhead**.
    **Lost compute:** 1,000 steps × 1.5s = 1,500 seconds of training. 10,000 GPUs × 1,500s = **15,000,000
    GPU-seconds** = **4,167 GPU-hours**. At $3.50/GPU-hr = **$14,583 of lost compute**. **Restart cost:**
    Job scheduler queue wait: ~5 min. NCCL initialization for 10,000 GPUs: ~10 min. Checkpoint load (2.8
    TB from storage): ~5 min. Warmup/verification: ~5 min. Total restart: **~25 minutes** of 10,000 idle
    GPUs = 4,167 GPU-hours = **$14,583 of idle cost**. **Total per-failure cost:** $14,583 (lost compute)
    + $14,583 (restart idle) = **$29,166**. Over a 90-day run with MTBF of ~8 hours at this scale, expect
    ~270 failures. Total failure cost: 270 × $29,166 = **$7.9M** — a line item that must be budgeted.'
