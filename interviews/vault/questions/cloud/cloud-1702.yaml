title: Compute Overhead of KernelSHAP Explanations
scenario: A cloud-based risk assessment service uses a deep neural network with 100 input features, processing
  500 requests per second. To comply with regulatory requirements, the team implements KernelSHAP to provide
  post-hoc explanations for all high-risk flags, which account for 10% of the traffic. Each SHAP explanation
  requires K=2,000 model evaluations (coalition samples). If a single inference pass takes 2 ms on an
  inference CPU core, calculate the total number of dedicated CPU cores required to generate these explanations
  in steady-state without queuing.
details:
  realistic_solution: Calculate the total model evaluations required per second for the flagged traffic,
    and divide by the single-core inference throughput to find the exact core count required for the SHAP
    generation cluster.
  common_mistake: Failing to account for the multiplicative factor of coalition sampling in KernelSHAP,
    often assuming that generating a post-hoc explanation takes roughly the same computational effort
    as a single forward pass.
  napkin_math: SHAP volume = 500 req/s * 0.10 = 50 explanations/s. Total model evaluations = 50 * 2,000
    = 100,000 evals/s. Single core throughput = 1,000 ms / 2 ms = 500 evals/s. Cores required = 100,000
    / 500 = 200 CPU cores (a 200x compute increase compared to the 1 core needed for base inference).
