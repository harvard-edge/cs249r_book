title: Compute Overhead of KernelSHAP Explanations
scenario: A cloud-based risk assessment service uses a deep neural network with 100 input features, processing 500 requests per second. To comply with regulatory requirements, KernelSHAP provides post-hoc explanations for all high-risk flags (10% of traffic). Each SHAP explanation requires K=2,000 model evaluations. A single inference pass takes 2 ms on an inference CPU core.
question: How many dedicated CPU cores are required to generate KernelSHAP explanations for 10% of 500 requests/sec without queuing?
details:
  realistic_solution: Calculate the total model evaluations required per second for the flagged traffic, and divide by the single-core inference throughput to find the exact core count required for the SHAP generation cluster.
  common_mistake: |
    **The Pitfall:** Failing to account for the massive multiplicative factor of coalition sampling in KernelSHAP.
    **The Rationale:** Assuming that calculating an explanation takes roughly the same computational effort as a single forward pass.
    **The Consequence:** Severely under-provisioning the explanation cluster, leading to massive queues, delayed regulatory compliance, and system timeouts.
  napkin_math: |
    - **SHAP Volume**: 500 req/s × 0.10 = 50 explanations/sec.
    - **Total Model Evals**: 50 × 2,000 = 100,000 evals/sec.
    - **Single Core Throughput**: 1,000 ms / 2 ms = 500 evals/sec.
    - **Cores Required**: 100,000 / 500 = **200 CPU cores**.
    - **Result**: Generating explanations requires a 200x compute increase compared to the 1 core needed for the base inference (which handles 500 evals/sec).
