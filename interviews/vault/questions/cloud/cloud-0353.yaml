title: The TCO Iceberg (cloud-0353)
scenario: You are the tech lead for a new flagship generative AI feature, like a coding assistant, that will be used by millions of users daily.
question: Considering the entire lifecycle of the model from development to a 3-year production run, which phase typically accounts for the largest portion of the Total Cost of Ownership (TCO)?
details:
  realistic_solution: Continuous Inference & Serving is the correct answer. While training costs are immense, they are typically a one-off capital expenditure. Inference, on the other hand, is an ongoing operational expenditure that scales with user traffic. For a successful product with millions of users, the cumulative cost of energy, hardware depreciation, and maintenance for serving requests over several years far outweighs the initial training cost. Industry estimates often place the ratio of inference cost to training cost at 5:1 or even higher over the model's lifecycle.
  common_mistake: |
    **The Pitfall:** Fixating on the massive, headline-grabbing upfront cost of training.
    **The Rationale:** Training is a large, one-time capital expenditure, whereas inference is a continuous, operational cost.
    **The Consequence:** Misallocating the budget and failing to provision for long-term serving costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Training: 1,000 GPUs * 30 days.
       - Inference: 500 GPUs * 3 years.
    2. **Calculations:**
       - Training Cost: 1,000 GPUs * 30 days * 24 hrs * $3/hr = ~$2.1 Million.
       - Inference Cost: 500 GPUs * 24 hrs * 365 days * 3 yrs * $3/hr = ~$39.4 Million.
    3. **Conclusion & Interpretation:** **Result: Cost-Bound.** Inference costs dwarf the training cost by nearly 20x over 3 years.
  options:
  - Initial Data Collection & Labeling
  - Upfront Model Training
  - Continuous Inference & Serving
  - A/B Testing & Experimentation
  correct_index: 2
