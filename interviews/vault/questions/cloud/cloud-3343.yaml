title: NVIDIA A100 Cluster Power and Cooling Optimization
scenario: You are designing an HPC cluster for an AI startup. You plan to deploy 100 such GPUs in a datacenter with an average Power Usage Effectiveness (PUE) of 1.5.
question: How would you optimize power, cooling, and PUE for 100 GPUs, and what carbon-aware scheduling strategies apply?
details:
  realistic_solution: Implement high-density rack designs with direct-to-chip liquid cooling for the GPUs, significantly reducing the cooling overhead compared to traditional air cooling (thus lowering PUE). Adopt carbon-aware scheduling policies that shift compute workloads to regions or times when renewable energy sources are abundant or the grid's carbon intensity is lower. Utilize power management tools to dynamically cap GPU power consumption during less critical periods.
  common_mistake: |
    **The Pitfall:** Failing to account for PUE in overall power consumption.
    **The Rationale:** Candidates only sum the TDP of the components and ignore the massive overhead of data center infrastructure.
    **The Consequence:** Severe underestimation of energy costs, power provisioning, and operational carbon footprint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100 GPUs, 400W TDP each.
       - Current PUE: 1.5.
       - Liquid Cooling PUE: 1.1.
    2. **Calculations:**
       - GPU Power: 100 GPUs * 400W = 40 kW.
       - Grid Power (PUE 1.5): 40 kW * 1.5 = 60 kW total (20 kW wasted on cooling).
       - Liquid Cooling Improvement: 40 kW * 1.1 = 44 kW.
       - Savings: 60 kW - 44 kW = 16 kW.
       - Annual Energy Saved: 16 kW * 8760 hours = 140,160 kWh saved per year.
    3. **Conclusion & Interpretation:** **Result: Power-Bound.** 140,160 kWh saved per year by optimizing cooling.
