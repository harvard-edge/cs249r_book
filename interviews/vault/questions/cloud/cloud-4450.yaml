title: 'Speculative Decoding in Disaggregated Architecture: Draft Pool Design'
scenario: Design a speculative decoding architecture integrated into a disaggregated serving system. The draft model is 7B, the target model is 70B. Both have separate GPU pools.
question: How would you design the request flow, acceptance sampling, and resource sizing for 7B-draft/70B-target speculative decoding?
details:
  realistic_solution: 'Disaggregated speculative decoding flow: (1) Request arrives at gateway: routed to draft pool for token generation. (2) Draft pool generates K=4 draft tokens (7B model, ~5ms per step). (3) Draft tokens + original KV cache sent to target pool in a single batch. (4) Target pool verifies K draft tokens in parallel (70B prefill-like operation on K tokens): 2*K*70B FLOP = 2*4*70B = 560B FLOP. At 989 TFLOPS: 0.57ms. (5) Acceptance sampling: expected accept rate ~75-80% for same-domain drafts. Expected accepted tokens per target call = K * alpha^avg where alpha = acceptance rate. At K=4, alpha=0.8: E[accepted] = (1 - 0.8^5)/(1-0.8) = 3.36 tokens. (6) Target returns accepted tokens + 1 bonus token. Draft continues with corrected KV state. Network overhead: 4 draft tokens per round trip to target = 4 * 2B = 8 bytes — negligible. KV delta: only the new KV for K tokens must be synchronized. Resource sizing: 1 target GPU (70B) supports ~10 draft GPUs (7B) given 10x compute ratio. 7B draft: 10 tok/sec single stream. 70B target verifies 3.36 accepted tokens per call at ~20ms: 3.36/(20ms) = 168 tok/sec effective.'
  common_mistake: |
    **The Pitfall:** Running draft and target models on the identical shared GPU pool sequentially.
    **The Rationale:** Engineers treat speculative decoding as a simple drop-in runtime optimization instead of a systemic architectural change.
    **The Consequence:** The synchronization overhead and context switching between draft and target completely negates the speedup, especially when compounded by network round-trips.
  napkin_math: |
    1. 70B single-token decode memory-bound: 140GB / 3.35TB/s = 41.8ms (without spec decoding).
    2. With spec decoding (K=4, alpha=0.8): 3.36 tokens per target call.
    3. Verification time: 2*4*70B/989T = 0.57ms + overhead ~5ms = 5.57ms.
    4. Draft generation: 7B draft at 5ms per step for 4 tokens = 20ms per round.
    5. Total round time: 20ms (draft) + 5.57ms (verify) = 25.57ms for 3.36 tokens = 7.6ms/token.
    6. **Result: Speedup = 41.8ms / 7.6ms = 5.5x per token.**
