title: 'Gradient Synchronization Fluency: AllReduce Taxonomy'
scenario: 'A new ML engineer asks: ''What is the difference between AllReduce, AllGather,
  Reduce-Scatter, Broadcast, and Reduce?'' You need to explain all five collective
  operations, their complexity in bytes communicated per rank, and when each is used
  in distributed ML training.'
question: How do AllReduce, AllGather, Reduce-Scatter, Broadcast, and Reduce differ
  in communication volume per rank and training use case?
details:
  realistic_solution: 'Broadcast: root sends N bytes to all ranks. Volume per rank:
    N sent (root), 0 sent + N received (others). Use: distributing initial model.
    Reduce: all ranks send N bytes to root which applies reduction. Per rank: N sent.
    Use: gradient aggregation to parameter server. AllReduce: all ranks get final
    reduced result. Per rank: 2×(N-1)/N × N bytes. Use: DDP gradient sync. Reduce-Scatter:
    each rank gets 1/P slice of reduced result. Per rank: (N-1)/N × N. Use: ZeRO Stage
    1. AllGather: all ranks get full data from all ranks. Per rank: (P-1)/P × N transmitted.
    Use: after Reduce-Scatter in ZeRO, tensor parallel activation gathering.'
  common_mistake: Defining operations abstractly without quantifying communication
    volume; conflating AllReduce with Reduce (Reduce sends everything to one node,
    AllReduce distributes to all).
  napkin_math: 'For N=1GB data, P=8 ranks: Broadcast=1GB/rank. Reduce=1GB/rank. AllReduce=2×7/8=1.75GB/rank.
    Reduce-Scatter=7/8=0.875GB/rank. AllGather=7/8=0.875GB/rank. AllReduce = Reduce-Scatter
    + AllGather = 0.875+0.875=1.75GB ✓'
