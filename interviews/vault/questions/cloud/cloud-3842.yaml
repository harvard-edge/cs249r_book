title: Analyzing Memory Bounds in Unfused Operations
scenario: You are profiling a sequence of three element-wise operations (GeLU, Dropout, Scale) on a tensor of 50 million FP16 elements (100 MB total size) on a GPU with 2.0 TB/s memory bandwidth. The GPU compute utilization is near zero.
question: Why are separate GeLU, Dropout, and Scale kernels memory-bound, and how does fusing them change HBM traffic?
details:
  realistic_solution: 'Operations with arithmetic intensity below the GPU ridge point are severely memory-bound. With separate kernels, the GPU writes intermediate results to HBM and reads them back. Fusing loads data into on-chip registers once.'
  common_mistake: |
    **The Pitfall:** Attributing the slowness purely to kernel launch overhead.
    **The Rationale:** Engineers overlook that writing intermediate results to HBM is the primary cost for operations with low arithmetic intensity.
    **The Consequence:** Missing massive performance gains from reducing memory traffic through fusion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor = 100 MB. Bandwidth = 2.0 TB/s.
    2. **Calculations:**
       - Unfused traffic = 3 kernels * (100 MB read + 100 MB write) = 600 MB.
       - Unfused time = 600 MB / 2.0 TB/s = 300 µs.
       - Fused traffic = 1 kernel * (100 MB read + 100 MB write) = 200 MB.
       - Fused time = 200 MB / 2.0 TB/s = 100 µs.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Fusion yields 3x speedup by reducing HBM traffic).**
