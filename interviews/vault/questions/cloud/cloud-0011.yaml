title: The Llama 3 KV Cache Footprint
scenario: You are deploying a Llama 3 8B model for inference, which uses Grouped-Query Attention (GQA). A request comes in with a sequence length of 8,192 tokens.
question: How would you calculate the FP16 KV-cache VRAM for one 8,192-token Llama 3 8B request, and how does using KV heads versus query heads change it?
details:
  realistic_solution: For a model with GQA, it's critical to use the number of KV heads, which is intentionally smaller than the number of query heads to save memory.
  common_mistake: |
    **The Pitfall:** Confusing the number of query heads with the number of key/value heads.
    **The Rationale:** Engineers often use the full number of query heads (32) instead of the much smaller KV heads (8) when calculating GQA memory footprints.
    **The Consequence:** Over-provisioning VRAM allocations and drastically underestimating the maximum batch size the hardware can serve.
  napkin_math: |
    1. Identify Specs: Llama 3 8B: 32 layers, 8 KV heads, 128 head dimension.
    2. Calculate Bytes per Token: 2 (K and V) * 32 layers * 8 KV heads * 128 dim * 2 bytes (FP16) = 131,072 bytes/token.
    3. Calculate Total for Sequence: 8,192 * 131,072 = 1,073,741,824 bytes.
    4. **Final Result: The KV-cache for the sequence requires exactly 1 GiB of VRAM.**
  options:
  - 4 GiB
  - 0.5 GiB
  - 1 GiB
  - 2 GiB
  correct_index: 2
