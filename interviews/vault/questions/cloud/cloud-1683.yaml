title: Evaluating PAM4 Transceivers for 800G AI Fabrics
scenario: You are architecting the backend network fabric for a new 16,384-GPU training cluster. To achieve 800 Gbps per port, vendors propose using 100G PAM4 over 8 lanes instead of wider, slower NRZ links.
question: Should you adopt 100G PAM4 over 8 lanes for 800G ports, and what trade-offs must you budget for?
details:
  realistic_solution: Adopt PAM4 to achieve 800G within form factor and lane constraints, but explicitly budget an extra ~100-120ns of FEC latency into the NCCL communication model, and provision an additional 10-15W per optical module for DSP power.
  common_mistake: |
    **The Pitfall:** Assuming PAM4 doubles bandwidth for "free".
    **The Rationale:** 4-level signaling mathematically carries twice the bits per baud, sounding like a perfect upgrade.
    **The Consequence:** Failing to account for the severe ~9.5dB SNR penalty, which necessitates power-hungry DSPs and latency-inducing Forward Error Correction (FEC) that degrades collective communication performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Signaling: PAM4 (4 levels, 3 eyes) vs NRZ (2 levels, 1 eye).
    2. **Calculations:**
       - Signal Degradation: Height V drops to V/3.
       - SNR Penalty: 20 * log10(1/3) ≈ -9.54 dB.
    3. **Conclusion & Interpretation:**
       - **Result: DSP Power & Latency-Bound.** To recover from the degraded PAM4 signal, mandatory KP4 RS-FEC adds ~110ns of latency per link hop, impacting tightly coupled AI collectives.
