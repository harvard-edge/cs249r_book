title: Evaluating PAM4 Transceivers for 800G AI Fabrics
scenario: You are architecting the backend network fabric for a new 16,384-GPU training cluster. To achieve
  800 Gbps per port, transceiver vendors propose using 100G PAM4 (Pulse Amplitude Modulation 4-level)
  over 8 lanes instead of wider, slower NRZ (Non-Return-to-Zero) links. Evaluate the system-level trade-offs
  of adopting PAM4 for this deployment, specifically focusing on signal integrity, latency overhead, and
  power consumption.
details:
  realistic_solution: Adopt PAM4 to achieve 800G within form factor and lane constraints, but explicitly
    budget an extra ~100-120ns of FEC latency into the NCCL communication model, and provision an additional
    10-15W per optical module for DSP power.
  common_mistake: Assuming PAM4 doubles bandwidth for 'free' without accounting for the ~9.5dB SNR penalty,
    which necessitates power-hungry DSPs and latency-inducing Forward Error Correction (FEC).
  napkin_math: NRZ has 2 levels (1 eye), height = V. PAM4 has 4 levels (3 eyes), height = V/3. SNR penalty
    = 20 * log10(1/3) ≈ -9.54 dB. To recover from this degraded eye diagram, mandatory KP4 RS-FEC adds
    ~110ns of latency per link hop.
