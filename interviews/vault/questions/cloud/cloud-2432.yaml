title: The RoPE Recomputation Paradox
scenario: Your team is optimizing a custom Transformer for a 128k context window on an A100 GPU (80GB).
  The original code reads pre-computed sine and cosine matrices for Rotary Position Embeddings (RoPE)
  from HBM, taking 15% of the forward pass time. You rewrite the Triton kernel to dynamically recompute
  the trigonometric functions (sin/cos) on the fly for every token. FLOPs increase by 400%, but the kernel
  executes 4x faster.
details:
  realistic_solution: 'The original RoPE was deeply memory-bandwidth bound. The pre-computed sin/cos table
    for 128K context (65.5 MB) causes TLB thrashing and cache-line waste on scattered lookups, reducing
    effective HBM bandwidth to ~1 TB/s. By recomputing sin/cos on the fly, you: (1) eliminate the table
    reads entirely (halving HBM traffic), and (2) convert scattered memory access into sequential Q/K
    reads at full 2.0 TB/s bandwidth. The extra trig FLOPs (~688 MFLOPs) execute in 2.2 μs while memory
    takes 32.8 μs — completely hidden. Net result: 4× speedup from 131 μs → 32.8 μs. This is a textbook
    roofline shift: trading cheap compute for expensive memory access.'
  common_mistake: Assuming that executing trigonometric functions (which are computationally expensive)
    will always be slower than reading pre-computed values from RAM.
  napkin_math: '**Setup:** A100 GPU, 128K context, head_dim d=128. A100: 312 TFLOPS FP16, 2.0 TB/s HBM
    bandwidth.


    **Pre-computed RoPE (original):**

    Per token reads from HBM: Q(256B) + K(256B) + Sin(256B) + Cos(256B) = 1,024 bytes.

    Total = 128,000 × 1,024 = 131 MB.

    The sin/cos table for 128K context = 128,000 × 128 × 2 × 2 = 65.5 MB. This large scattered lookup
    causes TLB/cache thrashing, reducing effective bandwidth to ~1 TB/s.

    Effective time = 131 MB / 1.0 TB/s = 131 μs.

    Compute: 128K × 128 × 4 = 65.5 MFLOPs / 312 TFLOPS = 0.21 μs (negligible).


    **Recomputed RoPE (optimized):**

    HBM reads: only Q + K = 512 bytes/token × 128,000 = 65.5 MB.

    Sequential access pattern → full bandwidth: 65.5 MB / 2.0 TB/s = 32.8 μs.

    Compute: ~5,376 FLOPs/token × 128,000 = 688 MFLOPs / 312 TFLOPS = 2.2 μs (hidden under memory).

    Total: 32.8 μs.


    **Speedup: 131 / 32.8 = 4.0× — matching scenario.** Two factors: (1) eliminate half the HBM reads
    (sin/cos tables), (2) convert scattered reads (cache-unfriendly) to sequential reads (cache-friendly).
    The trig FLOPs (688 MFLOPs) are invisible at 312 TFLOPS — classic roofline trade of cheap compute
    for expensive memory access.'
