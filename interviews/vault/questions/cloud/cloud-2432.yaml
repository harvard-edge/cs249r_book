title: The RoPE Recomputation Paradox
scenario: You optimize a Transformer for a 128k context window. The original code reads pre-computed RoPE sin/cos matrices from HBM. You rewrite the kernel to dynamically recompute the trig functions on the fly for every token. FLOPs increase by 400%, but the kernel executes 4× faster.
question: Why does recomputing RoPE sin/cos on the fly make the kernel 4× faster despite 400% more FLOPs?
details:
  realistic_solution: 'The original RoPE was deeply memory-bandwidth bound. The pre-computed sin/cos table for 128K context (65.5 MB) causes TLB thrashing and cache-line waste on scattered lookups, reducing effective HBM bandwidth to ~1 TB/s. By recomputing sin/cos on the fly, you: (1) eliminate the table reads entirely (halving HBM traffic), and (2) convert scattered memory access into sequential Q/K reads at full 2.0 TB/s bandwidth. The extra trig FLOPs (~688 MFLOPs) execute in 2.2 μs while memory takes 32.8 μs — completely hidden. Net result: 4× speedup from 131 μs → 32.8 μs. This is a textbook roofline shift: trading cheap compute for expensive memory access.'
  common_mistake: |
    **The Pitfall:** Assuming that executing complex trigonometric functions on the ALU is always slower than reading pre-computed values from RAM.
    **The Rationale:** Over-applying CPU-era caching intuition without understanding the extreme compute-to-memory-bandwidth ratio of modern GPUs.
    **The Consequence:** Leaving substantial performance on the table by writing heavily memory-bound, cache-thrashing kernels.
  napkin_math: |
    - **Pre-computed RoPE:** The sin/cos table for 128K context is ~65.5 MB. Lookups are scattered, thrashing the cache and dropping effective bandwidth to ~1.0 TB/s. Time to read 131 MB $\approx 131\text{ }\mu\text{s}$.
    - **Recomputed RoPE:** Eliminates sin/cos table reads. Only Q and K are read sequentially. Total HBM traffic drops by half to 65.5 MB.
    - Sequential reads hit full 2.0 TB/s bandwidth. Time $\approx 32.8\text{ }\mu\text{s}$.
    - The extra compute (688 MFLOPs) takes ~2.2 $\mu$s on a 312 TFLOPS GPU.
    - **Because compute time (2.2 $\mu$s) is hidden under memory time (32.8 $\mu$s), halving memory traffic speeds the kernel up 4× (131/32.8).**
