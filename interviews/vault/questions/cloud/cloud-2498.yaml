title: Asynchronous FL with Edge Stragglers
scenario: A cloud orchestrator runs Federated Learning on 10,000 Cortex-M33 environmental sensors. The sensors use solar power harvesting and only participate when energy levels are >80%. Synchronous FedAvg fails because 85% of devices drop offline or timeout during the 5-minute local training window, leading to discarded rounds.
question: What FL strategy should replace synchronous FedAvg when 85% of solar sensors drop during the 5-minute training window?
details:
  realistic_solution: The cloud architecture must transition from synchronous FedAvg to an asynchronous federated optimization strategy (e.g., FedAsync). The cloud maintains a continuous global model and accepts updates from edge devices as they complete their local training. To prevent stale updates from destabilizing the global model, the cloud applies a staleness penalty function to the learning rate of delayed updates.
  common_mistake: |
    **The Pitfall:** Increasing the timeout window to wait for stragglers.
    **The Rationale:** Candidates intuitively try to adapt synchronous FedAvg by waiting longer for the 85% of devices that drop out.
    **The Consequence:** The global model progression stalls entirely, drastically reducing the convergence rate of the model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1,000 device quorum required for synchronous FedAvg.
       - Online probability per 5-minute window: 15% (0.15).
       - Straggler delay: 60 minutes.
    2. **Calculations:**
       - Synchronous expected completions: 1,000 * 0.15 = 150 devices (fails 1000 quorum).
       - Async staleness penalty for 60-minute delay: 60 / 5 = 12 global steps of staleness.
       - Adjusted learning rate: base_lr * (1 / (1 + 12)) = base_lr * 0.076.
    3. **Conclusion & Interpretation:**
       - **Result: Synchronization-Bound. Synchronous FedAvg fails completely, while FedAsync succeeds but heavily penalizes stragglers, reducing their learning rate to 7.6% of base.**
