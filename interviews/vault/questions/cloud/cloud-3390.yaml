title: Optimizing LLM Inference on AMD MI300X via Kernel Fusion
scenario: You are tasked with optimizing the inference performance of a large language model on an AMD MI300X accelerator (192 GB HBM3, 5.3 TB/s). The current implementation involves a sequence of element-wise operations (e.g., activations, normalizations) that are memory-bound, leading to frequent global memory accesses and significant kernel launch overheads.
question: How would you identify and fuse memory-bound element-wise operators into custom ROCm kernels on MI300X to maximize HBM3 bandwidth and cut latency?
details:
  realistic_solution: Profile the existing workload to identify memory-bound kernels and their memory access patterns. Design a fused kernel that processes multiple logical operations within a single GPU kernel launch, minimizing redundant global memory accesses by leveraging ROCm's custom kernel development capabilities for the MI300X, employing shared memory tiling and register blocking.
  common_mistake: |
    **The Pitfall:** Ignoring the memory wall and focusing solely on compute-bound optimizations.
    **The Rationale:** Engineers often attempt to fuse kernels without analyzing memory access patterns and data dependencies, leading to suboptimal performance or correctness issues.
    **The Consequence:** Failure to reduce global memory round trips, leaving the system heavily memory-bound and latency-constrained.
  napkin_math: |
    1. **Calculate Memory Access Time:** Given 5.3 TB/s bandwidth, a 16-byte HBM3 access takes ≈ 16 / (5.3 × 10^12) ≈ 3 picoseconds.
    2. **Analyze Unfused Operations:** Unfused element-wise operations incur multiple global memory round trips (read input, write output) per operation.
    3. **Calculate Fusion Impact:** Fusing N memory-bound operations reduces global memory round trips for a data element from 2N to 2 (read once, write once).
    **Final Result: Kernel fusion significantly reduces effective memory latency and increases throughput by dropping round trips from 2N to 2.**
