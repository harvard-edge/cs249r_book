title: Cloud Label Consensus L3 0
scenario: "You have 100K images, each labeled by 3 annotators at $0.05 per label. Overall agreement (Fleiss' kappa) is 0.65. To improve quality, you can (A) add 2 more annotators per image or (B) send the 30% disagreed images to an expert at $0.50 per label."
question: "What are the costs and expected quality improvements of adding 2 annotators per image versus expert-reviewing the 30% disagreements?"
details:
  realistic_solution: 'Current cost: 100K × 3 × $0.05 = $15,000. Option A (5 annotators per image): additional cost = 100K × 2 × $0.05 = $10,000. Total: $25,000. With 5 annotators, majority vote is more robust (need 3/5 to agree). Kappa improves from ~0.65 to ~0.72. All images get equal treatment. Option B (expert review of disagreements): 30% disagreed = 30K images × 1 expert × $0.50 = $15,000. Total: $15,000 + $15,000 = $30,000. But expert labels on disagreed cases dramatically improve quality on the hardest examples. Expected kappa improvement to ~0.85+ on reviewed subset. Option B costs 20% more but targets effort where it matters most — the ambiguous cases that hurt model quality.'
  common_mistake: |
    **The Pitfall:** Adding more annotators uniformly across all images (Option A).
    **The Rationale:** Candidates assume that more data equals better data, forgetting that 70% of images already have agreement and do not benefit from extra labels.
    **The Consequence:** The budget is wasted on easy examples rather than targeted at the hard, ambiguous cases that actually degrade model quality.
  napkin_math: |
    - **Analyze Option A (Uniform addition):** +$10K cost. Kappa improves +0.07. Cost efficiency: $10K / 0.07 = $143K per kappa point.
    - **Analyze Option B (Targeted expert):** 30K disagreed images × $0.50 = +$15K cost. Effective kappa improves +0.15.
    - **Calculate Option B efficiency:** $15K / 0.15 = $100K per kappa point.
    - **Conclusion:** Option B is **43% more cost-effective** per quality unit.
