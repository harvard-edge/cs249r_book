title: Cloud Label Consensus L3 0
scenario: You have 100K images, each labeled by 3 annotators at $0.05 per label. Overall agreement (Fleiss'
  kappa) is 0.65. To improve quality, you can (A) add 2 more annotators per image or (B) send the 30%
  disagreed images to an expert at $0.50 per label. Calculate cost and expected quality improvement.
question: "What are the costs and expected quality improvements of adding 2 annotators per image versus expert-reviewing the 30% disagreements?"
details:
  realistic_solution: 'Current cost: 100K × 3 × $0.05 = $15,000. Option A (5 annotators per image): additional
    cost = 100K × 2 × $0.05 = $10,000. Total: $25,000. With 5 annotators, majority vote is more robust
    (need 3/5 to agree). Kappa improves from ~0.65 to ~0.72. All images get equal treatment. Option B
    (expert review of disagreements): 30% disagreed = 30K images × 1 expert × $0.50 = $15,000. Total:
    $15,000 + $15,000 = $30,000. But expert labels on disagreed cases dramatically improve quality on
    the hardest examples. Expected kappa improvement to ~0.85+ on reviewed subset. Option B costs 20%
    more but targets effort where it matters most — the ambiguous cases that hurt model quality.'
  common_mistake: Adding more annotators uniformly across all images. The 70% of images where annotators
    already agree don't benefit from additional labels. Targeting additional effort at the 30% disagreed
    cases is much more cost-effective.
  napkin_math: 'A: +$10K, kappa 0.65→0.72 (+0.07). Cost per kappa point: $10K/0.07 = $143K/kappa. B: +$15K,
    effective kappa 0.65→0.80 (+0.15). Cost per kappa point: $15K/0.15 = $100K/kappa. B is 43% more cost-effective
    per quality unit.'
