title: Designing a Memory-Efficient LLM Inference System on AMD MI300X
scenario: Your team is tasked with deploying a large language model (LLM) for real-time
  inference on an AMD MI300X GPU. The model has 130 billion parameters, requiring
  260GB of memory in FP16 (2 bytes/param * 130B params). The MI300X offers 192 GB
  HBM3 with a 5.3 TB/s bandwidth. During peak loads, you've observed out-of-memory
  (OOM) errors and significant latency spikes due to page thrashing. The current deployment
  strategy attempts to load the entire model onto a single GPU, which is clearly insufficient.
  You need to design a system that effectively manages memory pressure, minimizes
  OOM incidents, and maintains low inference latency while fully leveraging the MI300X's
  capabilities. Discuss your design choices, focusing on memory management techniques.
question: How would you manage memory for a 130B LLM on a 192 GB MI300X to avoid OOMs
  and page thrashing while keeping inference latency low?
details:
  realistic_solution: 'A realistic solution would involve a combination of techniques:
    1. Model Quantization: The 130B parameter model must be quantized, e.g., from
    FP16 to INT8 (1 byte/param), reducing its size to 130GB. This allows the model
    to fit within the 192GB HBM3 of a single MI300X, leaving approximately 62GB for
    activations, KV cache, and other overhead. 2. KV Cache Optimization: Implement
    PagedAttention or similar memory-efficient KV cache management techniques to prevent
    fragmentation, optimize memory reuse for variable-length sequences, and reduce
    the likelihood of OOM errors during long contexts. 3. Model Parallelism (if higher
    precision is strictly required): If FP16 precision is indispensable, tensor or
    pipeline parallelism across multiple MI300X GPUs would be necessary (e.g., two
    MI300X GPUs for a 130B FP16 model). This, however, introduces communication overhead.
    4. OS-level Considerations: Configure Linux huge pages to reduce page table overhead
    and improve TLB hit rates. Implement memory cgroups to isolate and manage memory
    allocated to the inference processes, preventing system-wide memory pressure from
    impacting latency-critical operations. Monitor and fine-tune OOM killer settings
    to ensure stability. 5. Dynamic Batching: Employ dynamic batching strategies to
    maximize GPU utilization and throughput without committing to fixed, large batch
    sizes that can push memory limits unnecessarily, adapting to real-time memory
    availability.'
  common_mistake: Attempting to scale by simply adding more MI300X GPUs without addressing
    the fundamental memory pressure issues through model optimization, or overlooking
    the nuances of memory fragmentation within the KV cache and the impact of OS-level
    memory eviction policies. Another common mistake is not considering quantization
    as a primary solution when model size exceeds physical memory.
  napkin_math: 'Original model size: 130B parameters * 2 bytes/parameter (FP16) =
    260 GB. AMD MI300X HBM3: 192 GB. Memory deficit: 260 GB - 192 GB = 68 GB. To fit
    the model on a single MI300X, we need to reduce its size to at most 192 GB. Quantizing
    to INT8 (1 byte/param) yields a 130 GB model, which fits: 192 GB (HBM3) - 130
    GB (INT8 model) = 62 GB remaining for activations, KV cache, and runtime overhead.
    This demonstrates that INT8 quantization is a viable strategy to fit the model
    on a single MI300X.'
