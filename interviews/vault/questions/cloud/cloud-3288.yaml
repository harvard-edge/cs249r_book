title: Designing a Memory-Efficient LLM Inference System on AMD MI300X
scenario: Your team is deploying a 130 billion parameter LLM requiring 260GB in FP16 on a GPU with 192 GB HBM. You've observed out-of-memory errors and page thrashing.
question: How would you manage memory for a 130B LLM on a 192 GB GPU to avoid OOMs and page thrashing while keeping inference latency low?
details:
  realistic_solution: 'A realistic solution would involve a combination of techniques: 1. Model Quantization: The 130B parameter model must be quantized, e.g., from FP16 to INT8 (1 byte/param), reducing its size to 130GB. This allows the model to fit within the 192GB HBM3 of a single GPU, leaving approximately 62GB for activations, KV cache, and other overhead. 2. KV Cache Optimization: Implement PagedAttention or similar memory-efficient KV cache management techniques to prevent fragmentation. 3. Model Parallelism: If FP16 precision is indispensable, tensor parallelism across multiple GPUs is necessary. 4. OS-level Considerations: Configure Linux huge pages to reduce page table overhead and improve TLB hit rates. 5. Dynamic Batching: Employ dynamic batching strategies to maximize throughput without unnecessarily pushing memory limits.'
  common_mistake: |
    **The Pitfall:** Overlooking quantization as a primary solution when model size strictly exceeds physical memory.
    **The Rationale:** Scaling via massive Multi-GPU setups feels like the standard "cloud native" solution.
    **The Consequence:** The system relies on catastrophic PCIe page thrashing or unneeded hardware inflation, destroying inference latency or exploding budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 130B parameters. FP16 requires 2 bytes/param (260 GB).
       - GPU Memory: 192 GB.
    2. **Calculations:**
       - Memory deficit: 260 GB - 192 GB = 68 GB OOM.
       - Quantize to INT8 (1 byte/param): 130 GB.
       - Remaining memory: 192 GB - 130 GB = 62 GB for KV cache and activations.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Quantizing the weights to INT8 allows the entire model to fit inside HBM, eliminating PCIe page thrashing and providing 62GB of headroom.
