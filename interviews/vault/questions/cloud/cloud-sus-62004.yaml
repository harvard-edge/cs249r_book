title: Chunked Prefill Scheduling Window
scenario: Your disaggregated prefill cluster uses chunked prefill to prevent long requests from monopolizing
  a GPU. You set a fixed chunk size of 512 tokens. A product requirement says TTFT must be under 200 ms
  for all requests regardless of input length. Design the chunk scheduling policy that satisfies this
  SLO for inputs up to 32k tokens on H100.
question: "What chunk scheduling policy would keep TTFT under 200 ms for inputs up to 32k tokens on H100?"
details:
  realistic_solution: 'For a 32k-token input with 512-token chunks, you need 64 chunks. If each chunk
    takes ~5 ms on H100 and there is 1 ms inter-chunk scheduling overhead, total prefill time = 64 × 6
    ms = 384 ms — already over the 200 ms SLO. Solution: (1) Scale chunk size dynamically with input length:
    for inputs > 8k tokens, increase chunk size to saturate the GPU (H100 prefill compute is saturated
    around 2048-4096 tokens for 70B models). (2) Use parallel chunked prefill: split chunks across multiple
    prefill GPUs with a ring-allreduce over partial attention scores. (3) Set chunk size to 2048 for inputs
    > 8k, giving 32k/2048 = 16 chunks × 6 ms = 96 ms — within SLO.'
  common_mistake: Setting chunk size based on memory only, ignoring that multiple chunks serialized across
    multiple prefill GPUs introduces queuing delay between chunks — the inter-chunk scheduling latency
    can dominate TTFT for long inputs.
  napkin_math: 'H100 prefill throughput for 70B: ~200k tokens/s (compute-bound at long seq). 32k tokens
    / 200k tokens/s = 160 ms for a single-chunk prefill — just under SLO. But 64×512-token chunks: each
    chunk has lower arithmetic intensity, GPU runs at ~50% efficiency → 400 ms total. Dynamic chunk size
    ≥ 4096 restores efficiency: 32k/4096 = 8 chunks × ~20 ms = 160 ms.'
