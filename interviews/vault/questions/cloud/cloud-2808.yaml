title: Cloud New 0026
scenario: Architect a low-cost serving pipeline for a 7B model using older T4 16GB GPUs. Since the model
  barely fits in one T4, design a pipeline parallel serving architecture to maximize throughput and minimize
  latency.
details:
  realistic_solution: 'Implement a continuous-batching Pipeline Parallel (PP=2) architecture across two
    T4 GPUs connected via PCIe Gen3. Split the transformer layers equally. The first T4 processes initial
    layers and streams intermediate hidden states to the second T4. To hide the slow PCIe transfer, use
    micro-batching with heavy overlap: as T4-A processes token N, T4-B processes token N-1. Use highly
    quantized INT8 weights to free up the 16GB GDDR6 for larger KV-cache batch sizes, maximizing throughput.'
  common_mistake: Using Tensor Parallelism over PCIe on T4s, which requires synchronous all-reduces for
    every layer, catastrophically bottlenecking the system.
  napkin_math: 7B INT8 = 7GB. T4 has 16GB. PP=2 leaves ~12.5GB for KV-cache per GPU. Intermediate state
    transfer = batch_size * hidden_size (4096) * 2 bytes. For batch 32, this is 256KB. T4 PCIe Gen3 (16GB/s)
    transfers this in 16 microseconds, fully hidden.
