title: RAG Pipeline Evaluation Architecture
scenario: You manage the ML workflow for a RAG system consisting of document chunking, an embedding model,
  a Vector DB, and a GPT-4 LLM. A full experiment evaluates a 10,000-query golden dataset to measure retrieval
  recall and generation accuracy. Currently, each experiment takes 8 hours and costs $300 in LLM API calls.
  Engineers are bottlenecked when tweaking just the chunking strategy or prompts. Architect a modular
  experiment tracking and evaluation workflow to reduce average iteration time to <1 hour and cost to
  <$50 per run.
details:
  realistic_solution: Architect a component-aware Directed Acyclic Graph (DAG) for experiment tracking.
    1) Decouple Retrieval Evaluation from Generation Evaluation. If an engineer changes chunking/embeddings,
    evaluate *only* the retriever (Recall@K) against golden contexts without invoking the LLM. 2) Implement
    a caching layer using experiment artifact hashing. Unchanged steps (e.g., embeddings when only the
    prompt changes) are skipped. 3) For Generation Evaluation (prompt tweaks), introduce subset testing.
    Evaluate on a stratified subset of 1,000 difficult queries first (Tier 1). The full 10k dataset (Tier
    2) is only triggered via CI/CD before staging deployment. 4) Execute independent API calls asynchronously
    to maximize throughput up to the API rate limits.
  common_mistake: Running the full 10k query pipeline concurrently to solve the latency bottleneck, which
    completely ignores the $300 per-run API cost constraint.
  napkin_math: 'Baseline: 10,000 queries * $0.03/query = $300 and 8 hours (approx 0.35 QPS effective,
    i.e. 10,000 / 28,800s). Optimized Workflow (Retriever tweak): 0 LLM calls = $0, runs locally in 5
    mins. Optimized Workflow (Prompt tweak): evaluate on 1k subset = 1,000 * $0.03 = $30. At 20 QPS (async),
    1,000 queries takes ~50 seconds. Assuming a 50/50 split of retriever vs prompt experiments, average
    cost plummets from $300 to $15 per run. Iteration time drops from 8 hours to under 10 minutes.'
  options:
  - Decoding throughput is determined by the model's FLOPS requirement, not memory bandwidth; the A100's
    312 TFLOPS can generate thousands of tokens per second for a 70B model
  - 'Decoding throughput for a 70B FP16 model on A100 80 GB: each token requires reading all 140 GB of
    weights from HBM. At 2.0 TB/s bandwidth: 140 GB / 2.0 TB/s = 70 ms per token = ~14.3 tokens/sec. With
    INT4 quantization (35 GB): 35 / 2000 = 17.5 ms per token = ~57 tokens/sec. Batching helps: batch=8
    reads weights once for 8 tokens → 140 GB / 2.0 TB/s / 8 = 8.75 ms/token = ~114 tokens/sec (FP16).
    Memory bandwidth, not compute, is the bottleneck.'
  - INT4 quantization provides exactly 4× speedup over FP16 by reducing both memory reads and compute;
    the actual gain is 57/14.3 = 4.0× as predicted by the quantization ratio
  - Batching does not help decode throughput because each token in the batch requires its own independent
    weight read; batching only helps prefill where the same weights are reused across sequence positions
  correct_index: 1
