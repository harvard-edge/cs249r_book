title: Evaluating Feature-Parallel Batching for DLRM
scenario: You are designing the inference architecture for a DLRM with 10 TB of embeddings sharded across 16 parameter servers equipped with 400 Gbps NICs. At 50,000 QPS, standard request-parallel batching (where each compute node processes a full request and fetches embeddings from all 16 servers) causes severe network incast and high P99 latency.
question: Should you switch to feature-parallel batching or upgrade to 800 Gbps NICs for the 50,000 QPS DLRM, and why?
details:
  realistic_solution: Implement feature-parallel batching. By grouping feature lookups across a batch of requests and routing them to the specific shards that hold them, you transform N-to-N communication into targeted RPCs per feature type. The CPU cost of scatter-gather is amortized over the batch, while tail latency is drastically reduced by eliminating incast, which 800 Gbps NICs wouldn't solve.
  common_mistake: |
    **The Pitfall:** Focusing only on raw network bandwidth.
    **The Rationale:** Candidates often suggest upgrading to 800 Gbps NICs while ignoring the N-to-N all-to-all communication pattern that causes TCP incast, or failing to account for the scatter-gather CPU overhead introduced by feature-parallel batching.
    **The Consequence:** Wasting budget on hardware upgrades that fail to resolve the underlying architectural bottleneck.
  napkin_math: |
    1. Request-parallel: 100 compute nodes each making 16 RPCs to 16 servers = 1,600 concurrent RPCs per cycle, causing incast packet drops.
    2. Feature-parallel: For a batch of 1,024 requests, the aggregator groups the features and sends exactly 1 RPC per shard (16 total RPCs per batch).
    **Result:** This reduces the network RPC count by 100x, bypassing the incast bottleneck entirely regardless of link bandwidth.
