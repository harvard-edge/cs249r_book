title: NVLink vs Infinity Fabric for Tensor Parallelism
scenario: You must choose between 8x NVLink GPUs and 8x Infinity Fabric GPUs for 8-way tensor parallelism on a 70B model.
question: What architectural differences between NVLink and Infinity Fabric affect tensor parallel efficiency, and which do you recommend given the per-GPU FP16 parameter shard size versus activation shard AllReduce transfers?
details:
  realistic_solution: '8.75B parameters at FP16 = 17.5 GB. In tensor parallelism, AllReduce transfers activations, not weights. An activation shard (seq * hidden/8 * 2B) is typically around 4 MB, not 17.5 GB.'
  common_mistake: |
    **The Pitfall:** Comparing only peak bandwidth numbers and conflating parameter size with activation size.
    **The Rationale:** Tensor parallelism AllReduce transfers activations, not weights.
    **The Consequence:** Dramatically overestimating the required communication time for tensor parallelism.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 70B
       - Precision: FP16 (2 bytes)
       - TP factor: 8
       - Seq: 2048, Hidden: 1024
       - NVLink Bandwidth: 900 GB/s
    2. **Calculations:**
       - NVLink AllReduce per layer params: 70B/8 = 8.75B
       - Activation shard size: 2048 * (1024/8) * 2 bytes = 512 KB * 8 ? Wait, seq * hidden/8 * 2B = 2048 * 1024 * 2B = 4 MB. (Wait, hidden/8 means TP shard. 2048 * 1024 * 2B = 4 MB)
       - Transfer time: 4 MB / 900 GB/s = 4.4 μs
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Transfer time is only 4.4 μs).**
