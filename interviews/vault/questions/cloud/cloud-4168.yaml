title: NVLink vs Infinity Fabric for Tensor Parallelism
scenario: You must choose between 8x H100 with NVLink (900 GB/s per GPU) and 8x MI300X
  with Infinity Fabric (896 GB/s per GPU) for 8-way tensor parallelism on a 70B model.
  Both have similar aggregate bandwidth. What architectural differences between NVLink
  and Infinity Fabric affect tensor parallel efficiency, and which do you recommend?
question: For 8-way tensor parallelism on a 70B model, what is the per-GPU FP16 parameter
  shard size versus the activation shard AllReduce transfers?
details:
  realistic_solution: '8.75B parameters at FP16 = 17.5 GB. In tensor parallelism, AllReduce transfers activations, not weights. An activation shard (seq * hidden/8 * 2B) is typically around 4 MB, not 17.5 GB.'
  common_mistake: 'Comparing only peak bandwidth numbers and conflating parameter size with activation size.'
  napkin_math: 'NVLink AllReduce per layer: 70B/8 = 8.75B params per GPU shard. Activation shard for one layer: seq * hidden/8 * 2B = 2048 * 1024 * 2B = 4 MB. The 8.75B params at FP16 = 17.5 GB. Transfer: 4 MB / 900 GB/s = 4.4 μs (using 4 MB for the activation shard of one layer, not 17.5 GB of params).'
