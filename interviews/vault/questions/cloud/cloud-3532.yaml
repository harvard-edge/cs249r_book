title: Evaluating Feature Store Architectures for Real-time Fraud Detection on NVIDIA A100
scenario: Your team is building a real-time fraud detection system where sub-10ms latency for predictions is critical, and feature freshness is paramount. The serving infrastructure leverages an NVIDIA A100 GPU cluster to perform feature lookups, transformations, and model inference. You are tasked with evaluating two distinct feature store architectures. Architecture A is a cloud-native, fully managed online feature store integrated with a separate offline store. Architecture B is an in-house solution using a highly optimized, distributed key-value store for online serving, backed by a data lake for offline features.
question: What feature-store architecture would you recommend for sub-10 ms A100 fraud inference, and how do A and B trade off?
details:
  realistic_solution: A hybrid approach might be considered, utilizing a managed service for its robust guarantees and lower operational burden, but potentially augmenting it with specialized caching layers or custom feature transformations on the A100 for ultra-low latency, highly specific features not easily supported by the managed service. The A100's high memory bandwidth could be crucial for parallel feature vector lookups and complex on-the-fly transformations. Emphasize thorough offline backtesting using accurate point-in-time features to validate freshness and correctness.
  common_mistake: |
    **The Pitfall:** Underestimating the operational complexity of in-house solutions and overlooking point-in-time correctness.
    **The Rationale:** Candidates often focus too much on raw GPU computation or theoretical storage performance, assuming in-house solutions will easily scale without considering the engineering effort for freshness and schema versioning.
    **The Consequence:** This leads to data leakage or incorrect model training, and underutilizes the A100's memory bandwidth for feature retrieval and transformation in the online path.
  napkin_math: |
    - **Identify request load:** Assume 10,000 real-time prediction requests per second.
    - **Calculate feature data:** Each request requires fetching 200 features, averaging 50 bytes per feature. Total feature data per second = 10,000 req/s * 200 features/req * 50 bytes/feature = 100 MB/s.
    - **Evaluate memory bandwidth:** The NVIDIA A100's 2.0 TB/s (2000 GB/s) memory bandwidth easily handles this 100 MB/s requirement.
    - **Calculate compute requirements:** If each feature transformation involves 100 FLOPs, total is 20,000 FLOPs per request. At 10,000 requests/second, this is 200 MFLOPs, which is negligible compared to the A100's 312 TFLOPS (FP16).
    - **Identify the real bottleneck:** The primary challenge is the **end-to-end latency budget (sub-10ms)** for network I/O and feature store lookup, not GPU memory bandwidth or compute.
