title: Evaluating Feature Store Architectures for Real-time Fraud Detection on NVIDIA GPUs
scenario: 'Your team is building a real-time fraud detection system where sub-10ms latency for predictions is critical. The serving infrastructure leverages a GPU cluster for feature lookups and inference. Architecture A is a cloud-native, fully managed online feature store. Architecture B is an in-house distributed key-value store backed by a data lake.'
question: 'What feature-store architecture would you recommend for sub-10 ms fraud inference, and how do A and B trade off?'
details:
  realistic_solution: 'A managed service ensures point-in-time correctness and removes operational overhead. The GPU''s massive memory bandwidth easily handles the data throughput, so the true bottleneck is the network I/O latency of the feature store lookup, favoring whichever architecture guarantees lower tail network latency.'
  common_mistake: |
    **The Pitfall:** Underestimating the operational complexity of in-house solutions and overlooking point-in-time correctness.
    **The Rationale:** Candidates focus too much on raw GPU computation or theoretical storage performance, assuming in-house solutions will easily scale without considering the engineering effort for freshness and schema versioning.
    **The Consequence:** This leads to data leakage or incorrect model training, and underutilizes the GPU memory bandwidth for feature retrieval in the online path.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 10,000 real-time prediction requests per second.
    - Feature data: 200 features/req, 50 bytes/feature.
    - GPU Memory Bandwidth: 2.0 TB/s (2000 GB/s).

    **Calculations:**
    - Throughput: 10,000 req/s * 200 features/req * 50 bytes/feature = 100 MB/s.
    - Compute: 100 FLOPs per feature = 20,000 FLOPs/req = 200 MFLOPs total (negligible).

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. The GPU is perfectly idle (using < 0.1% bandwidth); the sub-10ms latency is entirely dictated by feature store network lookups.
