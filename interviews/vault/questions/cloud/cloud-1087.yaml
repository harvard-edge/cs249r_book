title: Gradient Clipping vs Data Poisoning
scenario: A computer vision model is trained on a 50 million image dataset. An attacker
  injects 100,000 poisoned images with a backdoor trigger. The global batch size is
  8192. Clean samples produce an average gradient norm of 0.5, while poisoned samples
  (designed to maximize impact) produce an average unclipped gradient norm of 50.0.
question: How many poisoned samples appear per global batch, and how does per-sample
  clipping at C=1.0 change their relative gradient contribution?
details:
  realistic_solution: Implement per-sample gradient clipping at C=1.0. This restricts
    the anomalous gradient updates and reduces the poisoned samples' contribution
    from 16.7% of the batch gradient magnitude to just 0.4%, effectively neutralizing
    the backdoor injection.
  common_mistake: '**The Pitfall:** Assuming the low overall poisoning rate (0.2%)
    makes the attack inherently ineffective.

    **The Rationale:** Engineers equate dataset percentage directly to impact percentage,
    ignoring gradient magnitude.

    **The Consequence:** A few targeted samples with massive gradients completely
    dominate the batch update, successfully compromising the model.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Poison rate: 100k / 50M = 0.2%.

    - Batch Size: 8192.

    - Clean Gradient Norm: 0.5.

    - Poisoned Gradient Norm: 50.0.


    **Calculations:**

    - Poisoned samples per batch: 8192 * 0.002 = 16.4 samples.

    - Clean samples per batch: 8192 - 16.4 = 8175.6 samples.

    - Unclipped impact: (16.4 * 50) / ((16.4 * 50) + (8175.6 * 0.5)) = 820 / 4907.8
    = 16.7%.

    - Clipped impact (C=1.0): (16.4 * 1.0) / ((16.4 * 1.0) + (8175.6 * 0.5)) = 16.4
    / 4104.2 = 0.40%.


    **Conclusion & Interpretation:**

    - **Result: Stabilized Gradients (Compute-Bound)**. Clipping drops the attacker''s
    influence from 16.7% to a harmless 0.4%.

    '
