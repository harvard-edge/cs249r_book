title: Diagnosing Intersectional Calibration Failures
scenario: Your cloud-based ML underwriting API processes 100K applications daily. The global Expected Calibration Error (ECE) is <1% after applying Isotonic Regression. However, an external audit reveals that for a specific intersectional group (Age < 25, Income Quartile 1, Self-Employed; ~2,000 requests/day), predictions average 35% default risk while observed defaults are only 15%. You have 50 categorical demographic and financial features, creating trillions of possible intersections.
question: How do you systematically diagnose and correct localized miscalibrations without manually auditing all permutations or overfitting on small slices?
details:
  realistic_solution: Implement an iterative multicalibration algorithm using a weak agnostic learner (like a depth-3 decision tree). Treat the current model's residuals (y - y_hat) as the target. The auditor tree searches for any large subgroup with a statistically significant mean residual. If found, the model's predictions for that subgroup are additively updated. This shifts the complexity from 2^50 exhaustive checks to a tractable sequential empirical risk minimization problem.
  common_mistake: |
    **The Pitfall:** Assuming global post-hoc calibration guarantees subgroup calibration, or attempting to brute-force compute ECE across all intersections.
    **The Rationale:** Engineers often rely on top-level metrics or naive loops, underestimating the combinatorial explosion of feature intersections.
    **The Consequence:** The audit is computationally intractable, or it leads to massive overfitting by mistakenly adjusting probabilities on micro-slices with near-zero samples.
  napkin_math: |
    1. Calculate exhaustive search space: With 50 binary features, checking all combinations requires 2^50 ≈ 1.12×10^15 subsets.
    2. Calculate iterative auditor complexity: Using an iterative auditor (T=50 rounds, max depth=3 decision tree) on N=100K samples.
    3. Evaluate computational operations: Search space per round is bounded, reducing O(2^50) to O(T * depth * N * features) ≈ 50 * 3 * 100,000 * 50 = 7.5×10^8 operations.
    4. Conclude: The iterative approach reduces an intractable audit to one that **computes in seconds**.
