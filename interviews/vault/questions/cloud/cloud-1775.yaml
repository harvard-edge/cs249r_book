title: CPU Reactive Burst Scaling vs GPU Pre-provisioning
scenario: You manage an NLP feature extraction service using a BERT-base model. Steady-state traffic is 200 QPS, currently handled by 4 GPUs. A product launch creates a sudden traffic spike to 5,000 QPS in under 10 seconds. Your GPU auto-scaling group takes 4 minutes to spin up new nodes, pull the container, and load the model. To prevent timeouts, you can route the overflow to fast-booting CPU instances that are ready in 15 seconds, but they have a 5x higher cost-per-inference compared to the GPUs.
question: "Should you absorb the 5,000 QPS launch spike with fast CPU spillover or pre-provision enough GPUs, and what is the cost trade-off?"
details:
  realistic_solution: Deploy a hybrid architecture where fast-starting CPU instances act as a temporary shock absorber. While the CPU cost-per-inference is 5x higher, this premium is only paid during the 4-minute GPU provisioning window. Once the auto-scaled GPUs come online, traffic is shifted back. This avoids both dropped requests and the massive cost of keeping a 25x over-provisioned GPU cluster running 24/7.
  common_mistake: |
    **The Pitfall:** Rejecting the CPU option by looking only at the 5x worse cost-per-inference.
    **The Rationale:** This fails to factor in the massive savings from eliminating 24/7 idle GPU headroom.
    **The Consequence:** Over-provisioning expensive GPUs to handle rare spikes, dramatically increasing overall monthly costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base capacity: 200 QPS / 4 GPUs = 50 QPS/GPU.
       - Spike capacity needed: 100 GPUs (to handle 5,000 QPS).
       - CPU instance cost: $0.68/hr (handles ~10 QPS per instance -> needs 500 instances).
       - GPU provisioning time: 4 minutes.
    2. **Calculations:**
       - Pre-provisioned 100 GPUs: 100 * $0.50/hr = $36,000/mo.
       - CPU burst cost: 500 CPUs * $0.68/hr * (4 mins / 60 mins) = $22.66 per spike.
       - Monthly spike cost (100 spikes): $2,266.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound Auto-Scaling**. Reactive CPU burst scaling handles the 4-minute gap, saving ~$33k/month compared to pre-provisioning GPUs.
