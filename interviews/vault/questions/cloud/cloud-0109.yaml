title: The TPOT Trade-off
scenario: You're optimizing an LLM inference service that handles requests with highly variable output lengths. You need to decide whether to stick with a simple static batching implementation (batch size 64) or invest in building a continuous batching system. For a representative workload, the static batch must pad all 64 requests to the longest sequence in the batch (512 tokens), while the average sequence length is only 100 tokens.
question: How much computation does static batching waste by padding 64 requests to 512 tokens, and what throughput gain should continuous batching give?
details:
  realistic_solution: 'The core of the problem is calculating the total FLOPs used vs. the useful FLOPs. The ratio reveals the efficiency and the potential for improvement.

    1. **Static Batching:** All 64 requests are padded to 512 tokens, meaning the GPU processes 64 * 512 = 32,768 tokens. However, only 64 * 100 = 6,400 tokens were ''useful''. The computational waste is (32,768 - 6,400) / 32,768 \u2248 80.5%.

    2. **Continuous Batching:** This method avoids padding, so the GPU only processes the 6,400 useful tokens to achieve the same work.

    3. **Throughput Gain:** Since continuous batching does the same useful work with ~1/5th of the computation, it results in an approximately 5x increase in useful throughput (TPOT).'
  common_mistake: |
    **The Pitfall:** Underestimating the cost of padding in static batching.
    **The Rationale:** Engineers often look at batch size and model FLOPs but forget that in static batching, every single token\u2014real or padding\u2014consumes compute.
    **The Consequence:** The system wastes enormous amounts of computation, destroying throughput efficiency when dealing with variable-length sequences.
  napkin_math: |
    1. **Static Batching Compute:** 64 requests \u00d7 512 tokens = 32,768 tokens processed.
    2. **Continuous Batching Compute:** 64 requests \u00d7 100 tokens = 6,400 useful tokens.
    3. **Wasted Compute (Static):** (32,768 - 6,400) / 32,768 = 80.5%.
    4. **Conclusion:** **By eliminating 80.5% wasted padding overhead, continuous batching achieves a ~5\u00d7 throughput gain.**
