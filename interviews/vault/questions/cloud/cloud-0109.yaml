title: The TPOT Trade-off
scenario: You are optimizing an LLM inference service handling requests with variable output lengths. A representative workload pads all 64 requests to the longest sequence (512 tokens) in a static batch, while the average sequence length is only 100 tokens.
question: How much computation does static batching waste by padding 64 requests to 512 tokens, and what throughput gain should continuous batching give?
details:
  realistic_solution: 'The core of the problem is calculating the total FLOPs used vs. the useful FLOPs. The ratio reveals the efficiency and the potential for improvement.

    1. **Static Batching:** All 64 requests are padded to 512 tokens, meaning the GPU processes 64 * 512 = 32,768 tokens. However, only 64 * 100 = 6,400 tokens were ''useful''. The computational waste is (32,768 - 6,400) / 32,768 ≈ 80.5%.

    2. **Continuous Batching:** This method avoids padding, so the GPU only processes the 6,400 useful tokens to achieve the same work.

    3. **Throughput Gain:** Since continuous batching does the same useful work with ~1/5th of the computation, it results in an approximately 5x increase in useful throughput (TPOT).'
  common_mistake: |
    **The Pitfall:** Underestimating the cost of padding in static batching.
    **The Rationale:** Engineers often look at batch size and model FLOPs but forget that in static batching, every single token—real or padding—consumes compute.
    **The Consequence:** The system wastes enormous amounts of computation, destroying throughput efficiency when dealing with variable-length sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size: 64.
    - Max padded length: 512 tokens.
    - Average useful length: 100 tokens.

    **Calculations:**
    - Static batching compute: 64 × 512 = 32,768 tokens.
    - Continuous batching compute: 64 × 100 = 6,400 useful tokens.
    - Wasted compute: (32,768 - 6,400) / 32,768 = 80.5%.

    **Conclusion & Interpretation:**
    - **Result: Throughput-Bound.** By eliminating 80.5% wasted padding overhead, continuous batching (iteration-level scheduling) achieves a ~5x throughput gain.
