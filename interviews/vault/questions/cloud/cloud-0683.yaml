title: The ZeRO-1 Memory Squeeze
scenario: You are trying to fit a 30B parameter model on a single 8-GPU node (80GB A100s) for fine-tuning.
  The weights in FP16 take 60GB. You enable DeepSpeed ZeRO Stage 1, which partitions the optimizer states
  across the 8 GPUs. However, the system still instantly OOMs on the first forward pass, even with a batch
  size of 1. Why didn't ZeRO-1 save you enough memory?
details:
  realistic_solution: 'ZeRO Stage 1 only shards the optimizer states (e.g., Adam''s m and v), not the
    model weights or gradients. For a 30B model: weights = 60GB FP16, gradients = 60GB FP16, optimizer
    states = 240GB FP32 (Adam: 4x weights). ZeRO-1 reduces optimizer states from 240GB to 30GB per GPU
    (240/8), but each GPU still holds full weights (60GB) + full gradients (60GB) = 120GB. On an 80GB
    A100, that''s already 50% over capacity before any activations. You need ZeRO Stage 3, which shards
    weights, gradients, AND optimizer states, bringing per-GPU memory to ~(60+60+240)/8 = 45GB.'
  common_mistake: '"ZeRO-1 reduces the memory footprint by 8x, so it should fit." ZeRO-1 *only* partitions
    the optimizer states, not the gradients or the weights.'
  napkin_math: 'A 30B model has 60GB of FP16 Weights (W) and 60GB of FP16 Gradients (G). FP32 Optimizer
    states (O) take 8 bytes/param = 240GB. With DeepSpeed ZeRO-1 on 8 GPUs, O is sharded: 240GB / 8 =
    30GB per GPU. Total VRAM per GPU = W (60GB) + G (60GB) + O_part (30GB) = 150GB. Since 150GB far exceeds
    the 80GB A100 capacity, it OOMs instantly. ZeRO-3 or Tensor Parallelism is required.'
