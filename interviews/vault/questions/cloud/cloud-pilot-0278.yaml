title: Synthesize Hardware From Token Latency SLA
scenario: A team wants to serve a 70B FP16 model with inter-token latency below 25 ms at batch size 1. The model weights are 140 GB and decode is memory-bandwidth-bound. Specify the minimum effective memory bandwidth required, ignoring KV-cache reads, and explain what this implies for hardware selection.
question: What effective memory bandwidth is required to decode one output token from a 140 GB model in under 25 ms at batch size 1?
details:
  realistic_solution: For memory-bound batch-1 decode, assume each generated token streams the model weights once. Bandwidth must be at least model bytes divided by target time. 140 GB / 0.025 s = 5.6 TB/s effective bandwidth. A single A100 or H100 may be insufficient depending on effective bandwidth, so the design likely needs tensor parallelism, a higher-bandwidth accelerator, quantization, or batching to amortize weight reads.
  common_mistake: Starting from peak FLOPs instead of the memory-bandwidth wall for batch-1 decode.
  napkin_math: Required BW = 140 GB / 25 ms = 140 / 0.025 = 5,600 GB/s = 5.6 TB/s.
