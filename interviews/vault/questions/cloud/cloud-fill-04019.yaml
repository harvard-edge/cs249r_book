title: GPipe Bubble Overhead Calculation for 8-Stage Pipeline
scenario: You are implementing GPipe pipeline parallelism across 8 H100 GPUs (80GB HBM3). The model has
  80 transformer layers split evenly (10 per GPU). You use micro-batch size 4 and global batch size 256
  (64 micro-batches). Calculate the pipeline bubble fraction and explain how it affects effective GPU
  utilization.
details:
  realistic_solution: 'Increase the number of micro-batches m to reduce bubble: with m=64, bubble = (8-1)/(64+8-1)
    = 7/71 = 9.9%. This requires splitting the 256 global batch into 64 micro-batches of 4 samples each.
    The tradeoff is increased activation memory. Use gradient checkpointing on intermediate stages to
    manage memory.'
  common_mistake: Ignoring the pipeline bubble entirely when calculating training throughput. The bubble
    fraction is (p-1)/(m+p-1) where p=pipeline stages, m=micro-batches. Many teams use m=4 micro-batches,
    which creates a 7/10 = 70% bubble — wasting most of the pipeline.
  napkin_math: 'Bubble fraction formula: (p-1)/(m+p-1). With p=8, m=4: (7)/(11) = 63.6% bubble. With p=8,
    m=64: (7)/(71) = 9.9% bubble. Effective GPU utilization: m=4 → 36.4%, m=64 → 90.1%. For a 10-day training
    job: m=4 wastes 6.4 days of GPU-compute; m=64 wastes 1 day. Memory per GPU: m=4 micro-batches × 10
    layers × activation_size must fit in 80 GB HBM3.'
