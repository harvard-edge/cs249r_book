title: Cloud New 0039
scenario: Frameworks like TorchElastic enable resilient cloud AI workloads.
question: Define Elastic Training, and state its primary benefit when a node fails in the middle of a distributed job.
details:
  realistic_solution: Elastic Training is a distributed training paradigm that allows the cluster size (number of worker nodes) to scale up or down dynamically at runtime without manually restarting the script. If a node fails, the elastic framework catches the failure, re-establishes communication groups with the remaining healthy nodes, and resumes training automatically.
  common_mistake: |
    **The Pitfall:** Confusing elastic training with elastic cloud pricing models like AWS Spot Instances.
    **The Rationale:** Misunderstanding overloaded "elastic" terminology in cloud computing.
    **The Consequence:** Failing to implement actual fault-tolerant frameworks, resulting in brittle training jobs that completely crash and lose progress when a single hardware failure occurs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Initial Cluster: 8 nodes (A100s).
       - Global Batch Size: 2048 (256 per node).
    2. **Calculations:**
       - Failure Event: 1 node crashes.
       - Elastic Recalibration: Framework scales down to 7 nodes dynamically.
       - New Global Batch Size: 7 nodes * 256 = 1792.
    3. **Conclusion & Interpretation:**
       - **Result: Seamless Resume.** The training run continues automatically with a redistributed batch size of 1792, eliminating manual intervention or catastrophic failure.
