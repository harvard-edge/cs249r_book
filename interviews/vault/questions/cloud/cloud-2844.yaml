title: Cloud New 0039
scenario: Frameworks like TorchElastic enable resilient cloud AI workloads. Define Elastic Training and
  state its primary benefit when a node fails in the middle of a job.
details:
  realistic_solution: Elastic Training is a distributed training paradigm that allows the cluster size
    (number of worker nodes) to scale up or down dynamically at runtime without manually restarting the
    script. If a node fails, the elastic framework catches the failure, re-establishes communication groups
    with the remaining healthy nodes, and resumes training automatically.
  common_mistake: Confusing elastic training with elastic cloud pricing (spot instances), though elastic
    training is indeed the primary technology that allows spot instances to be used safely for ML.
  napkin_math: An elastic job running on 8 A100s with a global batch size of 2048 loses 1 node. It automatically
    recalibrates to 7 nodes, redistributing the data parallelism to batch size 1792 (7 * 256), resuming
    seamlessly.
