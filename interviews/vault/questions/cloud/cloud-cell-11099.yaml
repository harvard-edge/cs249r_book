title: 'Kernel Fusion: Design a Fused Attention Kernel for H100'
scenario: You are designing a custom fused attention kernel for H100 (80GB HBM3, 3.35 TB/s, 989 TFLOPS
  BF16). The attention layer for a 70B model processes sequences of length 4096 with 64 heads and head
  dimension 128. Design the FlashAttention-style tiled computation to fit in SRAM and quantify the memory
  bandwidth savings.
question: "For the 4096×64×128 attention layer, how large are Q, K, V and the full score matrix, and why is FlashAttention tiling mandatory?"
details:
  realistic_solution: Q,K,V tensor sizes depend on sequence length, number of heads, and head dimension.
    For typical LLM configurations, Q,K,V are in the MB range per layer per batch element.
  common_mistake: 'Ignoring the O(n²) attention matrix memory: for seq_len=4096, the full attention matrix
    is 4096² × 64 heads × 2B = 2GB — doesn''t fit in 512KB SRAM. Tiling is mandatory.'
  napkin_math: 'Attention Q,K,V projections for GPT-4 class (seq=1K, hidden=12288, heads=96, head_dim=128):
    Q matrix: seq × hidden = 1024 × 12288 × 2B = 25.2MB. K,V per layer: same. GQA with 8 KV heads: K,V
    = 1024 × 8 × 128 × 2B = 2MB each. Full Q: 1024 × 96 × 128 × 2B = 25.2MB. Standard MHA Q,K,V at seq=1K:
    1024 × 12288 × 2B = 25.2MB each (using full hidden dim projection). For head_dim=128 × 32 heads: Q,K,V
    = 1024 × 32 × 128 × 2B = 8MB each (not 128MB — 128MB would require head_dim×heads = 64K which is unrealistic).'
