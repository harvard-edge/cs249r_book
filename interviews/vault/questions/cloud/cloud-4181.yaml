title: Multi-Tenant Network Isolation on Shared Clusters
scenario: 'Your MI300X cluster serves 4 tenants: one running 175B training (needs 128 GPUs with full bisection bandwidth AllReduce), another running inference (32 GPUs, latency-sensitive), and two running small fine-tuning jobs (16 GPUs each). The fat-tree has 400 Gbps links.'
question: 'How would you partition the network and set QoS so training AllReduce bursts do not cause inference latency spikes?'
details:
  realistic_solution: 'Implement multi-layer isolation: (1) Physical partitioning by dedicating spine switch ports to tenant tiers. (2) QoS with strict priority queuing where inference traffic (marked DSCP EF) gets priority on shared links. (3) Topology-aware placement ensuring inference GPUs do not share leaf switches with training GPUs.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on logical VLANs for workload isolation.
    **The Rationale:** Confusing logical security isolation (VLANs) with physical hardware bandwidth isolation.
    **The Consequence:** VLANs share physical bandwidth, allowing massive AllReduce bursts to saturate physical links and buffer queues, completely destroying inference P99 latencies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Training: 128 GPUs bursting 2 GB gradients over 400 Gbps links.
       - Inference: 32 GPUs running 10K req/s (10 MB/s), highly latency-sensitive.
    2. **Calculations:**
       - Training Traffic Burst: Saturates 400 Gbps links for 50ms every 200ms.
       - Unisolated Impact: Inference packets queue behind 50ms AllReduce bursts, suffering 5-10ms queue delays.
       - Physical Partitioning Effect: With dedicated inference spines, RTT drops to a guaranteed hardware 2μs.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Queue-Bound. Without strict physical partitioning or DSCP EF QoS, the 50ms training bursts saturate switch buffers and fatally delay the 10 MB/s inference traffic.**
