title: Multi-Tenant Network Isolation on Shared Clusters
scenario: 'Your MI300X cluster serves 4 tenants: one running 175B training (needs 128 GPUs with full bisection bandwidth AllReduce), another running inference (32 GPUs, latency-sensitive), and two running small fine-tuning jobs (16 GPUs each). The fat-tree has 400 Gbps links.'
question: 'How would you partition the network and set QoS so training AllReduce bursts do not cause inference latency spikes?'
details:
  realistic_solution: 'Multi-layer isolation: (1) Physical partitioning — dedicate spine switch ports to tenant tiers. (2) QoS with strict priority — inference traffic marked DSCP EF gets strict priority queuing on any shared link. (3) Rate limiting — training AllReduce capped at 350 Gbps per link. (4) Topology-aware placement — inference GPUs placed in pods that do not share leaf switches with training GPUs.'
  common_mistake: |
    **The Pitfall:** Relying exclusively on VLANs for isolation.
    **The Rationale:** Confusing logical isolation (VLAN security) with physical hardware isolation.
    **The Consequence:** VLANs share physical bandwidth; the massive AllReduce bursts still saturate the physical links and buffer queues, completely destroying inference P99 latencies.
  napkin_math: |
    - **Training Traffic:** 128 GPUs bursting 2 GB gradients saturates 400 Gbps links for 50ms every 200ms.
    - **Inference Traffic:** 32 GPUs running 10K req/s at 1 KB each = 10 MB/s (trivial volume, but latency-critical).
    - **Unisolated Impact:** AllReduce saturates spines, queuing inference packets for 5-10ms.
    - **Physical Partitioning Effect:** With dedicated inference spines, the network RTT drops to a guaranteed 2μs.
