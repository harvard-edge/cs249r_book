title: Optimizing LLM Training on AMD MI300X with Gradient Checkpointing
scenario: 'You are training an LLM on an accelerator with 192 GB of memory. A computationally intensive block requires storing 250 GB of intermediate activations during its forward pass. By checkpointing, you only store the input and output activations for this block, consuming 50 GB. Recomputing takes an additional 20% of its original 600 ms forward pass time.'
question: "How much memory does checkpointing save for the 250 GB activation block, and what extra latency does recomputation add?"
details:
  realistic_solution: 'Implement a selective gradient checkpointing strategy, possibly checkpointing only every N layers or targeting the most memory-intensive blocks. Profile the model''s memory usage and computation graph to identify the most effective checkpointing points. The goal is to maximize training throughput while staying strictly within the 192 GB memory limits.'
  common_mistake: |
    **The Pitfall:** Overlooking the increased computational cost of recomputation.
    **The Rationale:** Engineers view checkpointing purely as a memory optimization technique without considering its impact on step time.
    **The Consequence:** Naively checkpointing every layer can severely reduce effective throughput, turning a memory-bound process into a severely compute-bound one.
  napkin_math: |
    1. **Effective memory saved:** 
       - 250 GB (without checkpointing) - 50 GB (with checkpointing) = 200 GB saved.
    2. **Additional computational latency:** 
       - 600 ms (Original forward pass) × 20% (Recomputation overhead) = 120 ms.
       
    **Final Result: Checkpointing saves 200 GB of memory at the cost of 120 ms of extra latency per iteration.**
