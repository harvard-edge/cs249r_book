title: Optimizing LLM Training on AMD MI300X with Gradient Checkpointing
scenario: You are tasked with training a large language model (LLM) on an AMD MI300X
  GPU, which features 192 GB of HBM3 memory. A specific, computationally intensive
  block within the model requires storing 250 GB of intermediate activations during
  its forward pass. To ensure the model fits within the MI300X's memory constraints,
  you decide to implement gradient checkpointing for this block. Assume that by checkpointing,
  you only need to store the input and output activations for this block, which together
  consume 50 GB. Recomputing these intermediate activations during the backward pass
  for this block takes an additional 20% of its original forward pass computation
  time. The original forward pass for this block takes 600 ms.
question: How much memory does checkpointing save for the 250 GB activation block
  on MI300X, and what extra latency does recomputation add?
details:
  realistic_solution: Implement a selective gradient checkpointing strategy, possibly
    checkpointing only every N layers or targeting the most memory-intensive blocks.
    Profile the model's memory usage and computation graph to identify the most effective
    checkpointing points, considering the AMD MI300X's 192 GB HBM3 memory and its
    FP16 compute capabilities. The goal is to maximize training throughput while staying
    strictly within memory limits.
  common_mistake: Overlooking the increased computational cost (re-computation during
    the backward pass) and potential reduction in effective throughput, or failing
    to consider the optimal checkpointing strategy (e.g., how many layers to checkpoint)
    to balance memory and compute effectively on the given hardware.
  napkin_math: '1. Effective memory saved = (Memory without checkpointing - Memory
    with checkpointing) = 250 GB - 50 GB = 200 GB.

    2. Additional computational latency per iteration = Original forward pass time
    * Recomputation overhead percentage = 600 ms * 20% = 120 ms.'
