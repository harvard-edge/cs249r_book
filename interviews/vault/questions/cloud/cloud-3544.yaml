title: Optimizing Annotation Throughput on H100 for Large-Scale Dataset Curation
scenario: Your team is building a massive, high-quality image dataset for a new computer vision model. The annotation process involves human labelers, and you need to optimize the throughput and quality. You're considering two annotation pipeline architectures: 1. Architecture A (Centralized Inference-Assisted Labeling): Data flows to a central service running an active learning model on a single NVIDIA H100 GPU to pre-label images and suggest uncertainty scores. Labelers then correct these pre-labels. 2. Architecture B (Distributed Human-in-the-Loop with Edge Inference): Data is distributed, and simpler, smaller models run on edge devices to provide initial suggestions, with complex uncertainty sampling done periodically on a shared cluster. Given a target of annotating 10 million images within 3 months, each requiring an average of 5 seconds of human labeling time...
question: How would you evaluate centralized H100 labeling versus distributed edge labeling for 10M images in 3 months while preserving IAA and limiting bias?
details:
  realistic_solution: Implement a pilot study with both architectures on a smaller subset of data. For Architecture A, focus on optimizing the active learning model's inference time and sample selection strategy on the H100 to maximize labeling efficiency. For Architecture B, design robust mechanisms for merging annotations, resolving conflicts, and consistently measuring inter-annotator agreement across distributed teams. Leverage metrics like Cohen's Kappa or Fleiss' Kappa. Implement a feedback loop for labeler training and calibration to mitigate bias.
  common_mistake: |
    **The Pitfall:** Overlooking the bottleneck of human annotation speed.
    **The Rationale:** Engineers often focus solely on optimizing model inference speed and hardware utilization.
    **The Consequence:** Wasting time over-engineering a distributed edge inference system when a single central H100 can process the entire dataset in slightly over a day.
  napkin_math: |
    - **Target Images:** 10M in 3 months (90 days).
    - **Daily Images:** 10M / 90 ≈ 111,111 images/day.
    - **Human Time:** 111,111 * 5 seconds = 555,555 seconds/day ≈ 154 hours/day.
    - **Human Workforce:** 154 hours / 8 hours/day ≈ 19 full-time annotators.
    - **Compute Throughput:** If an active learning model takes 10ms per inference, an H100 can process 100 images/second.
    - **Daily Inferences:** 100 * 3600 * 24 = 8.64 million inferences/day.
    - **Total Compute Time:** 10M images / 8.64M images/day = **1.15 days**.
    - **Conclusion:** Inference compute is clearly not the bottleneck; human annotation speed is.
