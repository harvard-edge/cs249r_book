title: Optimizing Annotation Throughput on H100 for Large-Scale Dataset Curation
scenario: 'Your team is building a massive, high-quality image dataset for a new computer vision model. The annotation process involves human labelers, and you need to optimize the throughput and quality. You''re considering two annotation pipeline architectures: 1. Centralized Inference-Assisted Labeling. 2. Distributed Human-in-the-Loop with Edge Inference.'
question: Given a target of annotating 10 million images within 3 months, each requiring an average of 5 seconds of human labeling time, how would you evaluate centralized labeling versus distributed edge labeling while preserving IAA and limiting bias?
details:
  realistic_solution: 'Implement a pilot study with both architectures. For centralized, focus on optimizing active learning inference time. For distributed, design robust mechanisms for merging annotations and measuring inter-annotator agreement (Cohen''s Kappa).'
  common_mistake: |
    **The Pitfall:** Overlooking the bottleneck of human annotation speed.
    **The Rationale:** Engineers often focus solely on optimizing model inference speed and hardware utilization.
    **The Consequence:** Wasting time over-engineering a distributed edge inference system when a central GPU can process the entire dataset in slightly over a day.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M images in 90 days = ~111,111 images/day.
    - Human time = 5 sec/image.
    
    **Calculations:**
    - Daily human time: 111,111 * 5 = 555,555 sec ≈ 154 hours (requires ~19 annotators).
    - Centralized GPU processing (10ms/inf): 100 images/s = 8.64M images/day.
    - GPU total time: 10M / 8.64M = 1.15 days.
    
    **Conclusion & Interpretation:**
    - **Result: 1.15 days (Human-Bound)**. Inference compute is not the bottleneck; human annotation speed dictates throughput.
