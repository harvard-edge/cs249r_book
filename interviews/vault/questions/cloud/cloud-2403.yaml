title: Defending Against Streaming Poisoning
scenario: A cloud cyber-security LLM is continuously fine-tuned on user-submitted phishing reports (50,000
  reports/hour). Adversaries are conducting a data poisoning attack, submitting crafted benign-looking
  texts with malicious payloads to create a backdoor. The pipeline SLA requires updating the model weights
  every 30 minutes.
question: "How would you defend the 30-minute fine-tuning pipeline against data poisoning in 50,000 phishing reports/hour?"
details:
  realistic_solution: Implement a two-stage robust aggregation pipeline. First, use a lightweight anomaly
    detector that filters inputs based on embedding distance from a clean, static 'golden' dataset (k-NN
    distance). Second, replace standard FedAvg/SGD aggregation with a robust Byzantine-fault-tolerant
    aggregator like Trimmed Mean or Krum during the continuous fine-tuning step. The tradeoff here is
    that robust aggregators discard extreme gradient updates, which sacrifices some learning efficiency
    on genuine edge-case zero-day threats, but provides a mathematical guarantee against backdoor injection
    from a bounded percentage of malicious actors.
  common_mistake: Attempting to compute exact influence functions or full retraining for every batch to
    find toxic data points, which completely violates the 30-minute SLA due to massive compute overhead.
  napkin_math: '50,000 reports/hour = 25,000 per 30-min window. Stage 1: Embedding 25k reports (using
    an efficient encoder like MiniLM) takes ~5 seconds on 1 A10g GPU. Computing pairwise cosine similarities
    against a 10k golden set takes 25k * 10k = 250M operations (<1 sec on GPU). Stage 2: Robust aggregation
    (Trimmed Mean removing top/bottom 10% of updates) adds ~2 seconds of sorting overhead per weight tensor.
    Total defense latency is <10 seconds. Fine-tuning the LLM on the remaining ~22k clean samples takes
    ~20 minutes. Total time ~20.2 minutes, well within the 30-minute SLA.'
