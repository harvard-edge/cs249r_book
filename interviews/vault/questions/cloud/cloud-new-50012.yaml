title: ROCm Library Parity Gap for Production ML Workloads
scenario: You are evaluating MI300X for a production LLM serving stack that currently uses FlashAttention-2,
  cuDNN fused LSTM, and NCCL for multi-GPU communication on H100s. Which components have ROCm equivalents
  at performance parity, and which do not?
details:
  realistic_solution: 'Assessment: (1) FlashAttention-2: AMD has flash-attention for ROCm (composable_kernel
    backend), achieving ~85-90% of the NVIDIA version''s performance. (2) cuDNN fused LSTM: MIOpen''s
    LSTM is ~80% of cuDNN''s fused performance; the fusion is less aggressive. (3) NCCL: RCCL (ROCm''s
    NCCL equivalent) achieves near-parity on AllReduce for large messages (>1MB) but is 15-20% slower
    for small messages due to less optimized tree reduction. Overall readiness: LLM serving is viable;
    LSTM-heavy workloads need benchmarking.'
  common_mistake: Assuming ROCm has full parity with CUDA's ecosystem. While rocBLAS matches cuBLAS for
    standard GEMMs, specialized libraries like FlashAttention and fused RNN kernels have varying levels
    of AMD support.
  napkin_math: 'MI300X 192GB HBM3 at 5.3 TB/s vs H100 80GB HBM3 at 3.35 TB/s. For memory-bound LLM decode:
    MI300X has 58% more bandwidth AND 140% more VRAM. Even at 85% software efficiency: 5.3 x 0.85 = 4.5
    TB/s effective, still 34% more than H100.'
