title: Network Locality Bottleneck In Distributed Inference
scenario: A sharded inference service uses 8 GPUs per request. Within a node, NVLink provides 900 GB/s. Cross-node traffic uses 100 GB/s InfiniBand. After a placement change, half of the requests span two nodes and P99 latency doubles, while GPU utilization remains low.
question: Why does P99 double when half of 8-GPU inference requests span two nodes instead of staying inside one NVLink domain?
details:
  realistic_solution: The bottleneck is network locality. Requests that used to communicate over 900 GB/s NVLink now cross a 100 GB/s inter-node link, a 9x bandwidth drop plus additional latency. Low GPU utilization is consistent with GPUs waiting on cross-node synchronization.
  common_mistake: |
    **The Pitfall:** Blaming insufficient GPU compute because utilization is low.
    **The Rationale:** Low GPU utilization usually implies the GPU is idle and easily capable of processing more work.
    **The Consequence:** Engineers add more compute nodes instead of fixing the root cause, which is that low utilization is a symptom of GPUs waiting on a slow cross-node network.
  napkin_math: |
    - **Bandwidth Ratio:** 900 GB/s (NVLink) / 100 GB/s (InfiniBand) = **9&times; bandwidth drop**.
    - **Conclusion:** Any synchronization-heavy shard exchange becomes massively slower when forced to leave the local node, destroying P99 latency while leaving GPUs idle waiting for data.
