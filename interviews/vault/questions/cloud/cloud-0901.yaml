title: Parquet Batch Ingestion Memory Sizing
scenario: You are designing a batch ingestion service for an ML data lake. The service receives 100,000
  JSON events per second, averaging 500 bytes each. To optimize storage, the service buffers events in
  memory and periodically writes them to S3 as columnar Parquet files. The Parquet encoding process achieves
  a 5x compression ratio but requires a working memory footprint equal to 2x the uncompressed batch size
  during serialization. If your ingestion container has exactly 8GB (assume 8000 MB) of memory available
  for this process, calculate the maximum time window (in seconds) for a single batch to avoid Out-Of-Memory
  (OOM) errors, and determine the final size of the resulting Parquet file.
details:
  realistic_solution: Calculate the raw data ingestion rate (50 MB/s). Determine the maximum uncompressed
    batch size by dividing the available memory by the serialization overhead multiplier. Finally, calculate
    the time window and apply the compression ratio to find the final file size.
  common_mistake: Failing to account for the 2x working memory footprint multiplier during Parquet serialization,
    or calculating the time window based on the compressed data rate instead of the raw incoming data
    rate.
  napkin_math: '1. Raw Ingestion Rate = 100,000 events/s * 500 B/event = 50,000,000 B/s = 50 MB/s.

    2. Max Uncompressed Batch Size = 8000 MB / 2 (overhead) = 4000 MB.

    3. Max Time Window = 4000 MB / 50 MB/s = 80 seconds.

    4. Resulting Parquet File Size = 4000 MB / 5 (compression) = 800 MB.'
