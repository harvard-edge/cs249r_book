title: Parquet Batch Ingestion Memory Sizing
scenario: You are designing a batch ingestion service for an ML data lake. The service receives 100,000 JSON events per second, averaging 500 bytes each. To optimize storage, the service buffers events in memory and periodically writes them to S3 as columnar Parquet files. The Parquet encoding process achieves a 5x compression ratio but requires a working memory footprint equal to 2x the uncompressed batch size during serialization. Your ingestion container has exactly 8GB (8000 MB) of memory available.
question: What maximum batch time window avoids OOM in the 8GB container, and what size Parquet file does that batch produce?
details:
  realistic_solution: Calculate the raw data ingestion rate (50 MB/s). Determine the maximum uncompressed batch size by dividing the available memory by the serialization overhead multiplier. Finally, calculate the time window and apply the compression ratio to find the final file size.
  common_mistake: |
    **The Pitfall:** Failing to account for the 2x working memory footprint multiplier.
    **The Rationale:** Candidates calculate batch sizes based solely on the raw data size or compressed data size.
    **The Consequence:** Inevitable Out-Of-Memory (OOM) errors during the Parquet serialization phase.
  napkin_math: |
    - 1. Calculate raw ingestion rate: 100,000 events/s * 500 bytes/event = 50 MB/s.
    - 2. Calculate max uncompressed batch size: 8000 MB / 2 (overhead multiplier) = 4000 MB.
    - 3. Calculate max time window: 4000 MB / 50 MB/s = **80 seconds**.
    - 4. Calculate resulting Parquet file size: 4000 MB / 5 (compression ratio) = **800 MB**.
