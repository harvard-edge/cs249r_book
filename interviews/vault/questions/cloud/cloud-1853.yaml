title: Evaluating 112G vs 224G SerDes Trade-offs
scenario: You are architecting the network fabric for a dense AI cluster using a 51.2T switch ASIC. You must evaluate whether to use 112G PAM4 SerDes or next-generation 224G PAM4 SerDes. The 224G SerDes cuts the lane count in half (from 512 to 256) but increases the power from 5 pJ/bit to 8 pJ/bit. More critically, the 224G signaling restricts the maximum passive copper twinax (DAC) cable length from 3 meters down to 1 meter due to severe signal integrity constraints. Your current intra-rack compute design requires up to 2.5 meters of reach from the Top-of-Rack (ToR) switch to the bottom nodes.
question: Should the 51.2T switch fabric move from 112G to 224G PAM4 SerDes given 2.5m intra-rack reach requirements, and why?
details:
  realistic_solution: For standard rack designs, sticking with 112G SerDes is the optimal system-level choice. While 112G requires twice as many lanes, it allows the use of 0W passive DACs for the entire 2.5m intra-rack reach. Transitioning to 224G mandates optics or AECs (e.g., 10-15W per port) for any connection beyond 1m. Unless the physical architecture is completely redesigned into ultra-dense compute trays where all switch-to-GPU connections are strictly under 1 meter, the network power penalty of 224G far outweighs its ASIC-level benefits.
  common_mistake: |
    **The Pitfall:** Focusing only on ASIC pinout and PCB routing advantages.
    **The Rationale:** Candidates conclude that halving the lane count makes 224G the obvious choice, ignoring that the reduced 1m copper reach forces the adoption of power-hungry optics or active electrical cables (AECs).
    **The Consequence:** Accidentally designing a cluster that burns an extra 2kW per switch on optics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 51.2T Switch. 112G power = 5 pJ/bit (passive DACs for 2.5m).
       - 224G power = 8 pJ/bit (requires 15W optics for >1m).
       - Assume 128 ports need optics for 224G.
    2. **Calculations:**
       - 112G System Power = 51.2 Tbps * 5 pJ/bit = 256W.
       - 224G System Power = (51.2 Tbps * 8 pJ/bit) + (128 * 15W) = 410W + 1920W = 2330W.
    3. **Conclusion & Interpretation:**
       - **Result: 112G saves ~2kW per switch.** Optics mandated by 224G's signal degradation outweigh any SerDes lane reduction benefits.
