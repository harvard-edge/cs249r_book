title: MoE Sparse Upcycling from Dense Model
scenario: Your team has a well-trained dense 7B model. Rather than training an MoE from scratch, you propose
  'sparse upcycling' — duplicating the FFN layers into 8 expert copies and training the router from scratch
  while fine-tuning. Evaluate the systems costs and expected quality gains versus training MoE from scratch.
question: "What are the systems costs and expected quality tradeoffs of sparse upcycling a dense 7B model into an 8-expert MoE versus training from scratch?"
details:
  realistic_solution: 'Sparse upcycling (Komatsuzaki et al. 2023): Take a dense 7B model, duplicate each
    FFN into 8 copies (creating 8x7B = ~47B MoE), initialize a random router, and continue training. Systems
    costs: (1) Memory jumps from 14 GB to 94 GB weights (6.7× increase) — immediately requires multi-GPU
    serving. (2) Training: need expert parallelism setup (8 GPUs minimum vs 1 GPU for dense). (3) Continued
    training needed: typically 10-20% of original training tokens for experts to differentiate. At 2T
    original tokens: 200-400B additional tokens. (4) Training cost: 400B tokens × 6 × 13B active FLOPs
    = 3.12 × 10^22 FLOPs, vs from-scratch MoE at 2T tokens × 6 × 13B = 1.56 × 10^23 FLOPs. Upcycling cost
    is ~20% of from-scratch. Quality: upcycling reaches ~95% of from-scratch MoE quality. The 5% gap comes
    from experts starting identical — some redundancy persists. For many applications, this tradeoff (80%
    cost savings for 5% quality gap) is compelling.'
  common_mistake: Assuming upcycling gives you 'free' MoE quality. The duplicated experts start identical
    and must differentiate, which requires significant continued training. Also, the memory cost jumps
    4× immediately.
  napkin_math: 'Dense 7B weights: 14 GB. Upcycled 8x7B weights: 94 GB (6.7× increase). Upcycling training:
    400B tokens × 78 GFLOPs/token = 3.12×10^22 FLOPs. From-scratch: 2T × 78 GFLOPs = 1.56×10^23 FLOPs.
    Cost ratio: 20%. Quality: ~95% of from-scratch.'
