title: Continuous Batching vs Static Batching Throughput on H100 for LLM Serving
scenario: An H100 serves Llama-2-70B with static batching (batch_size=8, max_tokens=2048). GPU utilization
  averages 40% because shorter requests (avg 500 tokens) leave slots idle waiting for the batch to complete.
  Continuous batching (iteration-level scheduling) is proposed. Estimate throughput improvement.
details:
  realistic_solution: 'Static batching: worst case is 2048 tokens for a batch where 7/8 requests finish
    at 500 tokens but wait for the longest. Wasted compute: 7 × (2048-500) × per_token_cost = 7 × 1548
    × cost. Efficiency = 500/2048 = 24% for short requests. Continuous batching: as each request completes,
    a new request fills that slot immediately. Expected batch occupancy improves from 40% to ~85-95%.
    Throughput improvement: 2.1-2.4×. Additional benefit: P50 latency drops significantly (short requests
    no longer wait for long ones). Implementation cost: more complex scheduler, ~2-5% overhead.'
  common_mistake: Assuming continuous batching always improves throughput; with highly variable sequence
    lengths it does, but with uniform lengths it adds scheduling overhead without benefit.
  napkin_math: 'Static efficiency: avg 500 tokens / 2048 max = 24% slot utilization. Continuous batching:
    ~90% utilization. Throughput gain: 0.90/0.24 × (1 - 0.03 overhead) = 3.6× potential, but GPU utilization
    was only 40% → realistic gain: 2× throughput improvement.'
