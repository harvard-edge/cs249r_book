title: Cloud New 0011
scenario: When scaling a training job in the cloud, Data Parallelism is the most common technique.
question: What is Data Parallelism, and what happens to the model weights across GPUs?
details:
  realistic_solution: In Data Parallelism, exact replicas of the entire model (weights) are placed on every participating GPU. The global training batch is divided into smaller micro-batches, and each GPU processes its own micro-batch independently. During the backward pass, gradients from all GPUs are aggregated to update the weights consistently across all replicas.
  common_mistake: |
    **The Pitfall:** Thinking that model weights are split into pieces across the GPUs.
    **The Rationale:** Candidates confuse Data Parallelism with Model Parallelism or Tensor Parallelism.
    **The Consequence:** They fail to understand that standard Data Parallelism requires the full model to be duplicated on every single GPU.
  napkin_math: |
    - **Model:** 7B model = 14GB weights in FP16.
    - **Hardware:** 8 A100s.
    - **Memory Requirement:** 14GB of memory on *each* of the 8 GPUs just for the weights.
    - **Global Batch Size:** 8 * micro-batch size.
