title: API Defenses Against Model Extraction
scenario: You serve a proprietary 70B parameter LLM via a cloud API handling 5,000 QPS. Telemetry shows
  competitors are using shadow-API requests to distill your model via space-filling prompt strategies.
  You must design a defense mechanism that mitigates model extraction while keeping TTFT (Time To First
  Token) under 150ms and maintaining output quality for legitimate developers.
question: "How would you defend the 70B LLM API against model extraction while keeping TTFT under 150ms?"
details:
  realistic_solution: 'Implement a multi-layered, asynchronous defense architecture. First, apply cryptographic
    watermarking (e.g., Kirchenbauer et al.) to the output logits, which invisibly tags AI-generated text
    with negligible latency. Second, return truncated logprobs (e.g., top-5 only) and apply slight temperature-based
    perturbation to obscure the exact probability distribution, hindering high-fidelity distillation.
    Third, implement an asynchronous anomaly detection pipeline: query embeddings are batched and clustered
    using an HNSW index to detect systematic space-filling queries (low cosine similarity variance over
    time) associated with extraction attacks. This tradeoff avoids blocking the critical API path while
    reliably flagging abusive API keys for subsequent rate-limiting or banning.'
  common_mistake: Applying synchronous LLM-based query filtering or strict rate limiting based on simple
    IP tracking, which balloons TTFT and blocks legitimate enterprise users.
  napkin_math: 'Critical Path: LLM inference TTFT is 120ms. Watermarking adds <1ms. Truncating logprobs
    saves bandwidth. Total TTFT = 121ms (meets <150ms SLA). Async Path: 5,000 QPS batched every 1s. Embedding
    5k queries (using a 384-dim MiniLM) takes ~15ms on a dedicated T4 GPU. HNSW search/update for 5k vectors
    against a rolling 1M query window takes ~10ms. Total async analysis latency is ~25ms per second, entirely
    decoupled from user TTFT.'
