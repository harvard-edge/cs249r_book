title: The Black Friday Collapse
scenario: Our GPU serving cluster handles 1,000 QPS at 50ms latency. On Black Friday, traffic spiked 10x to 10,000 QPS. The system didn't just slow down 10x; it completely collapsed, with latencies hitting 10 seconds and GPUs throwing Out Of Memory errors despite appearing to have free VRAM.
question: "Why did the system fail non-linearly, and how does continuous batching on GPUs shift this queueing knee point differently than traditional CPU-based web serving?"
details:
  realistic_solution: The collapse is caused by the interaction of queueing theory and GPU memory fragmentation. In a CPU web server, as utilization ($\rho$) passes the "Knee" at ~70%, request queue lengths grow exponentially (per Little's Law). But in an LLM serving cluster, a traffic spike causes the batch scheduler to accept more concurrent requests. Without PagedAttention, each new request statically allocates maximum potential KV-cache in HBM. The VRAM rapidly fragments. The non-linear collapse happens because the GPU spends cycles swapping KV-cache blocks to CPU RAM or simply OOMs, rather than just queueing. Continuous batching shifts this knee point significantly higher (to $\rho \approx 0.85$) because it dynamically slots new requests into the batch at the token level, absorbing the burst into the GPU's compute capacity without requiring new static memory reservations.
  common_mistake: |
    **The Pitfall:** Assuming linear degradation ("10x traffic means 10x latency").
    **The Rationale:** Engineers often apply simple linear scaling mental models to complex queueing systems and ignore GPU memory fragmentation.
    **The Consequence:** The system experiences non-linear collapse (OOM) before hitting compute limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wait Time Equation: $L = \rho/(1-\rho)$.
       - Memory Wall: H100 (80GB VRAM), continuous batching allocates 16MB blocks dynamically via PagedAttention.
    2. **Calculations:**
       - At $\rho = 0.5$, average requests in system $\approx 1$.
       - At $\rho = 0.9$, average requests $\approx 9$.
       - 9 concurrent requests statically reserving 8GB for a max 8K context window consume 72GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Continuous batching shifts the knee point higher by keeping memory utilization proportional to actual tokens generated.**
