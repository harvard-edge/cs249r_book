title: Threat Model Investment Priorities
scenario: 'Your security budget covers mitigating 2 of 4 identified ML threats: (A) adversarial evasion
  (risk=16), (B) training data leakage (risk=15), (C) data poisoning (risk=10), (D) model extraction (risk=9).
  Mitigation costs are: A=$200K, B=$100K, C=$150K, D=$80K. Budget is $250K. Evaluate which two threats
  to mitigate.'
question: "With a $250K budget, which two ML threats should you mitigate to maximize risk reduction, and should partial mitigation change the choice?"
details:
  realistic_solution: 'A+B ($300K): Over budget by $50K. Cannot select. Feasible pairs within $250K: A+D
    ($280K): Over budget. B+C ($250K): Risk mitigated = 15+10 = 25. Exactly on budget. B+D ($180K): Risk
    mitigated = 15+9 = 24. Under budget by $70K. A+C ($350K): Over budget. C+D ($230K): Risk mitigated
    = 10+9 = 19. Under budget by $20K. Best option: B+C at $250K, mitigating risk score of 25 (the maximum
    achievable). However, this leaves the highest individual risk (A, adversarial evasion, score=16) unmitigated.
    Alternative analysis: B+D costs $180K, mitigates 24 risk, and leaves $70K — enough for partial mitigation
    of A (e.g., basic adversarial training at $70K reducing A''s risk from 16 to 10). This gives effective
    risk reduction of 15+9+6 = 30. Recommendation: B+D + partial A mitigation for the broadest coverage.'
  common_mistake: Choosing the two highest-risk threats (A+B=$300K) without checking if they fit the budget.
    Budget constraints force you to optimize risk reduction per dollar.
  napkin_math: 'B+C: $250K, risk mitigated=25. B+D+partial A: $250K, risk mitigated≈30. Second option
    is better — partial mitigation of the top risk beats full mitigation of a lower risk.'
