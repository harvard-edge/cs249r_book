title: Threat Model Investment Priorities
scenario: 'Your security budget covers mitigating a subset of 4 identified ML threats: (A) adversarial evasion (risk=16), (B) training data leakage (risk=15), (C) data poisoning (risk=10), (D) model extraction (risk=9). Mitigation costs are: A=$200K, B=$100K, C=$150K, D=$80K. Budget is $250K.'
question: "With a $250K budget, which combination of ML threats should you mitigate to maximize risk reduction, and should partial mitigation change the choice?"
details:
  realistic_solution: 'A+B ($300K): Over budget by $50K. Cannot select. Feasible pairs within $250K: A+D ($280K): Over budget. B+C ($250K): Risk mitigated = 15+10 = 25. Exactly on budget. B+D ($180K): Risk mitigated = 15+9 = 24. Under budget by $70K. A+C ($350K): Over budget. C+D ($230K): Risk mitigated = 10+9 = 19. Under budget by $20K. Best option: B+C at $250K, mitigating risk score of 25 (the maximum achievable). However, this leaves the highest individual risk (A, adversarial evasion, score=16) unmitigated. Alternative analysis: B+D costs $180K, mitigates 24 risk, and leaves $70K — enough for partial mitigation of A (e.g., basic adversarial training at $70K reducing A''s risk from 16 to 10). This gives effective risk reduction of 15+9+6 = 30. Recommendation: B+D + partial A mitigation for the broadest coverage.'
  common_mistake: |
    **The Pitfall:** Choosing the two highest-risk threats without verifying they fit the budget.
    **The Rationale:** Security teams naturally gravitate to mitigating the most severe vulnerabilities first.
    **The Consequence:** Exceeding budget constraints or leaving high-ROI mitigations on the table by not framing it as a knapsack problem.
  napkin_math: |
    1. **Highest Risk (A+B):** Cost is $300K (Over budget).
    2. **Feasible Pairs (Full):** B+C costs $250K, Risk Mitigated = 15+10 = 25.
    3. **Partial Strategy:** B+D costs $180K (Risk = 24), leaving $70K.
    4. **Partial Investment:** Using the $70K for partial mitigation of A (e.g., reducing A's risk by 6 points). Total Risk Mitigated = 15 + 9 + 6 = **30**. (B+D + partial A is best).
