title: Threat Model Investment Priorities
scenario: 'Your security budget covers mitigating a subset of 4 identified ML threats: (A) adversarial evasion (risk=16), (B) training data leakage (risk=15), (C) data poisoning (risk=10), (D) model extraction (risk=9). Mitigation costs are: A=$200K, B=$100K, C=$150K, D=$80K. Budget is $250K.'
question: 'With a $250K budget, which combination of ML threats should you mitigate to maximize risk reduction, and should partial mitigation change the choice?'
details:
  realistic_solution: 'Treat this as a Knapsack problem. Full mitigations B+C ($250K) mitigate 25 risk. However, mitigating B+D ($180K) mitigates 24 risk and leaves $70K. Applying that $70K to partially mitigate threat A reduces its risk (e.g., by 6 points). The combination B+D+partial A maximizes total risk reduction.'
  common_mistake: |
    **The Pitfall:** Choosing the two highest-risk threats without verifying they fit the budget.
    **The Rationale:** Security teams naturally gravitate to mitigating the most severe vulnerabilities first.
    **The Consequence:** Exceeding budget constraints or leaving high-ROI mitigations on the table by not framing it as a knapsack problem.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: $250K.
    - Risks: A(16,$200K), B(15,$100K), C(10,$150K), D(9,$80K).

    **Calculations:**
    - Full B+C: Cost $250K. Risk Mitigated = 15 + 10 = 25.
    - Full B+D: Cost $180K. Risk Mitigated = 15 + 9 = 24. Budget remaining = $70K.
    - Partial A: $70K reduces A''s risk by ~6 points.
    - Total B+D+Partial A: 24 + 6 = 30 Risk Mitigated.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound**. Allocating left-over budget to partial mitigation of A achieves 30 total risk reduction, outperforming B+C.
