title: Feature Store Consistency Guarantees
scenario: 'Your feature store uses a dual-write pattern: the batch pipeline writes to both the offline
  store (S3/Delta Lake) and online store (Redis) simultaneously. A production incident reveals that 2%
  of feature values diverge between stores — the online store has newer values for some entities while
  the offline store has newer values for others. Evaluate the consistency model and propose an architecture
  that guarantees eventual consistency with bounded divergence.'
details:
  realistic_solution: 'The dual-write divergence occurs because writes to S3 and Redis are not atomic
    — a failure between the two creates inconsistency. Replace dual-write with a CDC (Change Data Capture)
    pattern: (1) batch pipeline writes to the offline store (Delta Lake) as the single source of truth;
    (2) Delta Lake''s change feed streams new/updated records to Kafka; (3) a Kafka consumer materializes
    records into Redis. This guarantees eventual consistency — Redis always converges to the offline store''s
    state. Bounded divergence: Kafka consumer lag determines the maximum staleness. Monitor consumer lag
    and alert if it exceeds the staleness budget (e.g., 5 minutes). For features requiring stronger consistency,
    add a version vector: each feature value carries a monotonic version number. Serving layer compares
    versions and rejects stale reads.'
  common_mistake: Implementing strong consistency via distributed transactions (2PC) across S3 and Redis.
    This adds 50-100ms latency to every write and makes the pipeline fragile — if either store is unavailable,
    all writes fail.
  napkin_math: 'Dual-write failure rate: 2% divergence from ~0.1% write failure rate × 2 stores × multiple
    retries with different outcomes. CDC lag: Kafka consumer throughput 100K records/s, pipeline produces
    50K records/batch. Lag: 50K / 100K = 0.5 seconds steady-state. Worst case (consumer restart): backlog
    of 1 hour × 50K/min = 3M records, catch-up time: 30 seconds. Bounded divergence: 30 seconds max. Dual-write
    fix cost: 0 (remove code). CDC infrastructure: Kafka ($200/month) + consumer ($50/month) = $250/month.'
