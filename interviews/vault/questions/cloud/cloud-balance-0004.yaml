title: Gradient Bucket Size Tradeoff
scenario: A training job has 10 GB of gradients. It can use 100 buckets of 100 MB or 20 buckets of 500 MB. Each bucket launch has 0.2 ms overhead, and bandwidth is 50 GB/s. Compare launch overhead and transfer time.
question: How do 100 small gradient buckets compare with 20 large buckets in launch overhead and transfer time?
details:
  realistic_solution: 'Total transfer bytes are the same: 10 GB / 50 GB/s = 200 ms in this simplified bandwidth model. Launch overhead is 100 x 0.2 = 20 ms for small buckets versus 20 x 0.2 = 4 ms for large buckets. Larger buckets reduce launch overhead but may reduce overlap granularity with backward compute.'
  common_mistake: Changing bucket size and expecting bandwidth bytes to change, or ignoring per-bucket launch overhead.
  napkin_math: Transfer = 10/50 = 0.2 s. Launch overhead small = 20 ms; large = 4 ms.
