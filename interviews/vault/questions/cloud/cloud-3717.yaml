title: Speculative Decoding Acceptance Rate Impact on H100 Inference Throughput
scenario: You implement speculative decoding on H100 with a 70B target model and a
  7B draft model. The draft model generates k=5 candidate tokens. Target model verifies
  in one forward pass. Draft acceptance rate α=0.8. Target model alone generates 30
  tok/s. Calculate the expected throughput improvement.
question: What throughput improvement should speculative decoding deliver with k=5
  and α=0.8 versus 30 tok/s target-only decoding?
details:
  realistic_solution: 'Expected tokens per speculative step: E[tokens] = (1-α^(k+1))/(1-α)
    = (1-0.8^6)/0.2 = 3.69 tokens per draft-verify cycle. Time per cycle: draft 5 tokens +
    1 target verification. Draft (7B, 5 tokens): 5 * (7B*2B/3.35TB/s) = 5 * 4.2ms
    = 21ms. Target verify (70B, 1 forward): ~33.3ms (from 30 tok/s baseline). Total: 21ms + 33.3ms = 54.3ms for 3.69 tokens. Speedup:
    3.69 tokens / 1 token per target step * target_step_time / cycle_time = 3.69 * (33.3ms / 54.3ms)
    = 3.69 * 0.613 = 2.26x.'
  common_mistake: Assuming speculative decoding improves throughput by kx (5x in this
    case); the actual improvement depends on acceptance rate and the relative cost
    of the draft model.
  napkin_math: 'E[tokens/cycle] = (1-α^(k+1))/(1-α) = (1-0.8^6)/0.2 = 3.69 tokens.
    Cycle time: 21ms (draft) + 33.3ms (target) = 54.3ms. Cycle throughput: 3.69 / 0.0543s
    = 67.9 tok/s. Target alone: 30 tok/s. Effective speedup: 67.9 / 30 = 2.26x.'
