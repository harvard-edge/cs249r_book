title: Speculative Decoding Acceptance Rate Impact on H100 Inference Throughput
scenario: You implement speculative decoding on H100 with a 70B target model and a 7B draft model. The draft model generates k=5 candidate tokens. Target model verifies in one forward pass. Draft acceptance rate α=0.8. Target model alone generates 30 tok/s.
question: What throughput improvement should speculative decoding deliver with k=5 and α=0.8 versus 30 tok/s target-only decoding?
details:
  realistic_solution: 'Expected tokens per speculative step: E[tokens] = (1-α^(k+1))/(1-α) = (1-0.8^6)/0.2 = 3.69 tokens per draft-verify cycle. Time per cycle: draft 5 tokens + 1 target verification. Draft (7B, 5 tokens): 5 * (7B*2B/3.35TB/s) = 5 * 4.2ms = 21ms. Target verify (70B, 1 forward): ~33.3ms (from 30 tok/s baseline). Total: 21ms + 33.3ms = 54.3ms for 3.69 tokens. Speedup: 3.69 tokens / 1 token per target step * target_step_time / cycle_time = 3.69 * (33.3ms / 54.3ms) = 3.69 * 0.613 = 2.26x.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding blindly improves throughput by a factor of K (e.g., a 5x speedup).
    **The Rationale:** Candidates forget that speedup is a function of both the mathematical acceptance rate (α) and the computational cost of the draft model relative to the target.
    **The Consequence:** Throughput expectations are wildly exaggerated, leading to poor capacity planning and unmet SLAs.
  napkin_math: |
    1. Expected tokens per cycle: E[tokens] = (1 - 0.8^6) / (1 - 0.8) = 3.69 tokens.
    2. Draft time for 5 tokens on 7B model: 5 * (7B * 2B / 3.35 TB/s) = 5 * 4.2ms = 21ms.
    3. Target verification time (1 forward pass): ~33.3ms (derived from the 30 tok/s baseline).
    4. Total cycle time: 21ms + 33.3ms = 54.3ms.
    5. Cycle throughput: 3.69 tokens / 0.0543s = 67.9 tokens/s.
    **Effective speedup vs baseline: 67.9 / 30 = 2.26x.**
