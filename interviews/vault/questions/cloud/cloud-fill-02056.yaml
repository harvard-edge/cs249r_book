title: InfiniBand Subnet Manager Failover for Training Cluster
scenario: A 256-H100 InfiniBand cluster has a single OpenSM Subnet Manager running on a management node.
  During a 7-day training run, the management node crashes and OpenSM fails. Within 30 seconds, all RDMA
  connections fail and the training job dies. Design an SM failover solution.
question: "How would you design InfiniBand Subnet Manager failover so a management-node crash does not kill the 7-day training job?"
details:
  realistic_solution: 'IB Subnet Manager HA: run two OpenSM instances (primary at priority 8, standby
    at priority 7). IB specification mandates: if master SM stops sending LID-Assigned MADs every SM_KEY_LEASE
    period (default 60s), standby SM triggers election. With aggressive timers: set OpenSM -p 10 (poll
    interval 10s) → failover within 20s. Better: run OpenSM on a switch itself (embedded SM available
    on Mellanox switches) — eliminates management node as SPOF. Modern Mellanox UFM provides SM HA with
    5-10s failover. For training: NCCL connections survive SM failover if IB path record remains valid
    — only new connections fail during failover. Existing AllReduce continues if SM is down <30s and no
    link events occur.'
  common_mistake: Recommending redundant SM without understanding the master/standby election protocol;
    not knowing that IB SM uses priority-based election and standby SM takes over within 10s.
  napkin_math: 'SM failover time: primary dead → standby detects in SM_POLL_INTERVAL (10s default) → election
    → reconfigure → 30-60s total. NCCL timeout default: 1800s. Training survives if SM failover <1800s.
    But: link events during SM outage (e.g., GPU reboots) cause routing recalculation → job dies. Solution:
    embedded SM on top-of-rack switch + UFM SM HA → <10s failover, invisible to NCCL.'
