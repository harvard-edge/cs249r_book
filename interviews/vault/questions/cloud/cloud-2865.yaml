title: Hardware Training Cost Model
scenario: You are budgeting a pre-training run requiring 10^21 FLOPs. You can rent A100 SXM instances at $3.00/hr or H100 SXM instances at $6.00/hr. Due to scaling overhead, assume an MFU of 45% for A100 and 35% for H100.
question: Apply the MFU multipliers to calculate the total compute cost for both options and determine the most cost-effective hardware for this run.
details:
  realistic_solution: 'The A100''s effective throughput is 312 * 0.45 = 140.4 TFLOP/s. Time to train = 1e21 / 1.404e14 = 7.12e6 seconds (1,978 hours). At $3.00/hr, the A100 cost is $5,934. The H100''s effective throughput is 989 * 0.35 = 346.15 TFLOP/s. Time to train = 1e21 / 3.46e14 = 2.89e6 seconds (802 hours). At $6.00/hr, the H100 cost is $4,812. The H100 is cheaper by over $1,100.'
  common_mistake: |
    **The Pitfall:** Comparing hardware based purely on peak TFLOP/s.
    **The Rationale:** Candidates fail to apply the Model Flops Utilization (MFU) multiplier, which drastically shifts the real-world throughput and cost curves.
    **The Consequence:** Selecting suboptimal hardware configurations, leading to longer training times and higher overall costs.
  napkin_math: |
    1. A100 effective throughput: 312 * 0.45 = 140.4 TFLOP/s.
    2. A100 time: 1e21 / 1.404e14 = 7,122,507 seconds = ~1,978 hours.
    3. A100 cost: 1978h * $3 = $5,934.
    4. H100 effective throughput: 989 * 0.35 = 346.15 TFLOP/s.
    5. H100 time: 1e21 / 3.4615e14 = 2,888,921 seconds = ~802 hours.
    6. H100 cost: 802h * $6 = $4,812.
    7. **Result: H100 is cheaper by over $1,100.**
