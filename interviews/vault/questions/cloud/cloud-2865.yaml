title: Hardware Training Cost Model
scenario: You are budgeting a pre-training run requiring 10^21 FLOPs. You can rent
  A100 80GB SXM instances at $3.00/hr (312 TFLOP/s peak) or H100 SXM instances at
  $6.00/hr (989 TFLOP/s peak). Due to scaling overhead, assume an MFU of 45% for A100
  and 35% for H100.
question: Apply the MFU multipliers to calculate the total compute cost for both options
  and determine the most cost-effective hardware for this run.
details:
  realistic_solution: The A100's effective throughput is 312 * 0.45 = 140.4 TFLOP/s.
    Time to train = 1e21 / 1.404e14 = 7.12e6 seconds (1,978 hours). At $3.00/hr, the
    A100 cost is $5,934. The H100's effective throughput is 989 * 0.35 = 346.15 TFLOP/s.
    Time to train = 1e21 / 3.46e14 = 2.89e6 seconds (802 hours). At $6.00/hr, the
    H100 cost is $4,812. The H100 is cheaper by over $1,100.
  common_mistake: Comparing hardware based purely on peak TFLOP/s without applying
    the respective Model Flops Utilization (MFU), which drastically shifts the cost
    curve.
  napkin_math: A100 effective = 140 TFLOP/s -> 1978h * $3 = $5934. H100 effective
    = 346 TFLOP/s -> 802h * $6 = $4812. H100 wins.
