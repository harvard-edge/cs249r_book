title: Mastering KV Cache Sharing Across Agents in Multi-Model Orchestration
scenario: 'A team implements KV cache prefix sharing for 8 parallel agents that share a 4096-token system prompt.'
question: "If the optimized pipeline costs 42% of the original baseline, what is the actual cost reduction, and why might someone incorrectly claim 37% savings?"
details:
  realistic_solution: 'If the optimized cost is 42% of the original, the true savings is 58%. Claims of 37% arise when engineers improperly frame the baseline by comparing only the memory of the shared system prompt against partial working memory blocks, rather than comparing the total holistic system footprint before and after optimization.'
  common_mistake: |
    **The Pitfall:** Treating KV cache as strictly per-request rather than per-prefix.
    **The Rationale:** Standard endpoints compute attention uniquely per session.
    **The Consequence:** Failing to share system prompt KV caches wastes compute recalculating identical prefixes and balloons memory, destroying orchestration efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Optimized pipeline drops to 42% of the baseline cost.
    2. **Calculations:**
       - True Savings: 100% - 42% = 58%.
       - The 37% Error: Claiming 37% implies the after-cost is 63% of the baseline, which contradicts the established 42% metric.
    3. **Conclusion & Interpretation:**
       **Result: Cost Bound. The actual reduction is 58%.**
