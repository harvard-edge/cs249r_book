title: Fallback Availability Impact on SLA
scenario: A system uses a three-level fallback for model serving. Primary model availability is 99.5%, fallback model availability is 99.9%, and a heuristic fallback is 99.99%. The system uses the primary model when available, otherwise falls back.
question: With 99.5%, 99.9%, and 99.99% availability layers, what is overall system availability assuming independent failures?
details:
  realistic_solution: 'System fails only when ALL levels fail simultaneously. P(primary fails) = 1 - 0.995 = 0.005. P(fallback fails) = 1 - 0.999 = 0.001. P(heuristic fails) = 1 - 0.9999 = 0.0001. P(all fail) = 0.005 × 0.001 × 0.0001 = 5 × 10^-10.'
  common_mistake: |
    **The Pitfall:** Assuming fallback failures are perfectly independent in a real-world cloud environment.
    **The Rationale:** Cloud outages, networking partitions, or shared resource exhaustion often take down multiple dependent levels simultaneously.
    **The Consequence:** Overestimating the true system availability in SLAs because correlated failure zones are ignored.
  napkin_math: |
    1. **Assumptions & Constraints:** Independent failure rates: Primary (0.005), Fallback (0.001), Heuristic (0.0001).
    2. **Calculations:** Simultaneous Failure Probability = 0.005 × 0.001 × 0.0001 = 5 × 10^-10. System Availability = 1 - (5 × 10^-10) = 0.9999999995 (~9.7 nines). Downtime = 5 × 10^-10 × 31,557,600 sec/year = 0.0158 seconds/year.
    3. **Conclusion & Interpretation:** **Result: 0.016 seconds of downtime per year. Availability-Bound.**
