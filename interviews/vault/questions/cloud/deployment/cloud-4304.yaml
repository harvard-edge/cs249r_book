title: Variable Output Length and Decode Pool Imbalance
scenario: 'Your decode pool uses static round-robin assignment: each incoming prefill completion is assigned to the next decode GPU in sequence. You observe that some decode GPUs are at 95% memory utilization while others sit at 40%. Users with long outputs (>2000 tokens) report degraded TPOT.'
question: Why does round-robin assignment create such extreme decode memory imbalance, and how would you redesign the system to rebalance work?
details:
  realistic_solution: Round-robin does not account for output length variance. A 2000-token output occupies KV blocks for 2000 decode steps; a 50-token output frees its blocks quickly. If long outputs cluster on the same GPU, those GPUs fill while others stay empty. Redesign assignment as least-loaded-first at prefill-to-decode transfer time, using free HBM KV blocks and active-token debt rather than request count. Add output length prediction to route short and long jobs into separate queues. Work stealing is useful for newly admitted or paused sequences; live migration of active KV can help only if the serving stack explicitly supports safe KV transfer and rescheduling.
  common_mistake: |
    **The Pitfall:** Adding more decode GPUs to the cluster to fix the imbalance.
    **The Rationale:** Treating the symptom (high utilization on some GPUs) rather than the root cause (unaware load balancing).
    **The Consequence:** Wasting hardware resources while long-running sequences continue to cluster and cause localized OOMs or TPOT degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - System Setup: 10 decode GPUs, 38 GB KV pool each.
    - Request Rate: 500 req/s total, averaging 50 req/s per GPU.
    - Long Jobs: 10% of jobs are long (>2000 tokens), pinning ~188 MB KV each.
    - Examine a 10-second burst window.

    **Calculations:**
    - Total long-job arrival rate: 500 req/s × 10% = 50 long jobs/s across the cluster.
    - Expected long-job arrival rate per GPU: 50 / 10 = 5 long jobs/s.
    - In 10 seconds, expected long jobs per GPU: μ = 50.
    - Standard deviation for one GPU under random assignment: σ ≈ sqrt(500 × 0.1 × 0.9 × 0.1) = 2.1 long jobs.
    - A +3σ burst is about 6 extra long jobs on one GPU.
    - Extra pinned KV from that burst: 6 × 188 MB = 1.13 GB, and the pressure persists for thousands of decode steps.

    **Conclusion & Interpretation:**
    - **Result: KV Cache Imbalance (Memory-Bound)**. Round-robin balances arrivals, not long-lived KV occupancy, so even modest clustering of long outputs creates persistent local memory pressure and TPOT degradation.
