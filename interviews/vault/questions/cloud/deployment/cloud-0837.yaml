title: A/B Testing Survivorship Bias via Latency Timeouts
scenario: You are A/B testing a new Transformer ranking model (Model B) against a BM25 baseline (Model A) with a 50/50 traffic split. Model A has a p99 latency of 15ms. Model B has a mean latency of 80ms, but a p99 of 450ms on long queries. The upstream API gateway enforces a hard 300ms timeout. The analytics team reports Model B's conversion rate per successful page load is 10% higher than Model A. However, the business team reports a 12% drop in total revenue for the treatment group.
question: What root cause in the system logs and A/B telemetry explains Model B's higher reported CVR but 12% lower revenue?
details:
  realistic_solution: This is a classic latency-induced survivorship bias. The longest queries (highest-intent buyers with high Average Order Value) hit the 300ms gateway timeout and fail. Dashboards calculating CVR only on successful responses hide the dropped revenue. Implement a fast fallback to Model A when Model B processing exceeds 250ms.
  common_mistake: |
    **The Pitfall:** Blaming the model's ranking quality or suggesting a model retraining.
    **The Rationale:** It's easy to assume a drop in revenue means the model's predictions are bad, completely missing the system-level timeouts that slice off a cohort of traffic.
    **The Consequence:** Teams waste cycles retraining models instead of fixing the systemic survivorship bias caused by the API gateway timeout dropping high-value complex queries.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1000 reqs: 950 short (4% CVR, $10 AOV), 50 complex (4% CVR, $47.50 AOV).
       - Gateway timeout: 300ms. Model B drops complex queries (p99 450ms).
    2. **Calculations:**
       - Control Rev: (950 * 0.04 * $10) + (50 * 0.04 * $47.50) = $380 + $95 = $475.
       - Treatment Rev: 50 complex drop ($0). 950 short hit 4.4% CVR = 41.8 conv * $10 = $418.
       - Dashboard CVR = 41.8 / 950 = 4.4% (+10% boost).
       - Revenue Drop = ($475 - $418) / $475 = 12%.
    3. **Conclusion & Interpretation:**
       - **Result: 12% true revenue drop due to survivorship bias.** (Latency-Bound)
