title: Spot Instance Strategy for Training Resilience
scenario: You are training a 13B model on 32 spot instances at a 70% discount. Spot interruptions occur on average every 2 hours with a 2-minute warning.
question: What checkpointing strategy maximizes cost savings while minimizing wasted compute for a 13B model on 32 spot instances?
details:
  realistic_solution: 'Use two-tier checkpointing. Write fast local sharded checkpoints about every 9-10 minutes, and copy durable checkpoints to object storage every 30 minutes. On the 2-minute spot warning, immediately take a final local checkpoint, start the upload if bandwidth allows, and terminate cleanly before eviction. Checkpoint size for the full job is roughly 26 GB of BF16 weights plus about 156 GB of ZeRO-sharded optimizer state, or 182 GB total across 32 GPUs. With sharded writes to local NVMe, a conservative end-to-end checkpoint cost of about 20 seconds gives Young''s interval sqrt(2 × 7200 s × 20 s) ≈ 537 seconds, about 9 minutes. The warning means most planned interruptions should lose near-zero training progress; the periodic interval mainly caps loss for sudden failures or missed notices. Cost savings: on-demand cost is 32 × $3/hr × 24 = $2,304/day; a 70% spot discount saves about $1,613/day before modest checkpoint overhead.'
  common_mistake: |
    **The Pitfall:** Checkpointing too frequently (e.g., every 5 minutes) or too infrequently (e.g., every 2 hours).
    **The Rationale:** Candidates either focus solely on minimizing wasted compute without considering checkpoint overhead, or they ignore the high frequency of spot interruptions.
    **The Consequence:** Either excessive time and bandwidth are spent on checkpointing, or nearly all progress is lost upon interruption.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 13B parameters in BF16.
    - ZeRO-sharded optimizer state: about 12 bytes per parameter across the job.
    - MTBF: 2 hours (7200 s); interruption warning: 2 minutes.

    **Calculations:**
    - Full-job checkpoint payload = 13B * 2 bytes + 13B * 12 bytes = 182 GB total.
    - Sharded payload per GPU = 182 GB / 32 = about 5.7 GB before metadata.
    - Conservative local checkpoint cost = about 20 seconds end to end.
    - Young's interval = sqrt(2 * 7200s * 20s) = sqrt(288,000) = about 537 seconds, or 9 minutes.
    - On-demand daily cost = 32 * $3/hr * 24 = $2,304; 70% spot discount saves about $1,613/day.

    **Conclusion & Interpretation:**
    - **Result: checkpoint locally about every 9-10 minutes and always checkpoint on the 2-minute warning**. Periodic checkpoints cap sudden-failure loss, while the warning path should preserve nearly all progress for normal spot interruptions.
