title: 'Disaggregated Serving Observability: Key Metrics Dashboard'
scenario: You are onboarding an SRE to a disaggregated serving system. They ask what the key operational metrics are and how to distinguish prefill-pool problems from decode-pool problems in the dashboard.
question: "Which operational metrics should an SRE watch to distinguish prefill-pool, KV-transfer, and decode-pool problems?"
details:
  realistic_solution: 'Disaggregated serving metric taxonomy: Prefill pool: (1) prefill_queue_depth — requests waiting for prefill. High = pool undersized. (2) prefill_compute_utilization — GPU MFU during prefill. Low (<50%) = inefficient batching. KV transfer: (4) kv_transfer_latency_ms — Spike = network congestion. Decode pool: (6) decode_queue_depth — requests waiting for decode slot. (7) tpot_ms — time per output token. High = memory bandwidth saturated. Aggregated: (9) e2e_ttft_p99.'
  common_mistake: |
    **The Pitfall:** Monitoring only aggregate TTFT and TPOT without separating prefill and decode pool metrics.
    **The Rationale:** Standard endpoints obfuscate the internal cluster dynamics of disaggregated serving.
    **The Consequence:** When TTFT degrades, SREs cannot tell if it's a prefill compute issue, a KV transfer bottleneck, or a decode pool full condition.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Disaggregated pools with separated queues and network transfer bounds.
    2. **Calculations:**
       * High TTFT + High Prefill Queue = Prefill bottleneck.
       * High TTFT + High KV Transfer Latency = Network bottleneck.
       * High TPOT + Decode Bandwidth 100% = Decode memory bottleneck.
    3. **Conclusion & Interpretation:** **Result: Metric Isolation (Latency-Bound)**. Precise telemetry isolates the bounding constraint.
