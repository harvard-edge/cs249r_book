title: Speculative Decoding in Disaggregated Architecture
scenario: A disaggregated serving system uses a 70B target model on decode nodes and a 7B draft model for speculative decoding.
question: Where should the 7B draft model run in disaggregated speculative decoding, how should KV caches interact, and what failure modes arise?
details:
  realistic_solution: 'Prefer co-locating the 7B draft model with the 70B target on decode nodes when memory allows, because it avoids sending speculative token streams and KV state across the prefill/decode boundary. A separate lightweight draft tier can work only if network latency is hidden and decode-node cache ownership remains explicit. Draft and target keep separate KV caches: the draft proposes up to gamma tokens, the target verifies them in one pass, advances its KV cache for the accepted prefix, writes the correction token when rejection occurs, and discards or rolls back draft-only KV. New failure modes include cache desynchronization during preemption, partial-accept rollback bugs, unstable batch shapes, and rejection-rate spikes that turn draft compute into wasted work.'
  common_mistake: |
    **The Pitfall:** Placing the draft model on the prefill nodes.
    **The Rationale:** Assuming that because the draft model is smaller, it should be grouped with other initial processing steps like prefill.
    **The Consequence:** Prefill nodes, sized for compute-bound workloads, become underutilized for memory-bound draft decode steps, and the scheduling contract breaks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B draft throughput: 378 tokens/s.
    - Target speedup: \gamma=4, acceptance rate \alpha=0.8.
    - Approximate draft cost as 10% of a target decode step per generated token.

    **Calculations:**
    - E[tokens/step] = (1 - \alpha^(\gamma+1)) / (1 - \alpha) = (1 - 0.32768) / 0.2 = 3.36.
    - Target verification advances 3.36 tokens on average per target call.
    - Draft overhead for 4 proposed tokens ≈ 4 * 0.1 = 0.4 target-step equivalents.
    - Approximate speedup = 3.36 tokens / (1.0 target verification + 0.4 draft work) = 2.4x before batching and scheduling losses.

    **Conclusion & Interpretation:**
    - **Result: Speculation-Bound.** Under these assumptions, speculative decoding can approach a 2.4x TPOT improvement, but only if draft overhead, verification batching, and KV-cache advancement stay local and well synchronized.
