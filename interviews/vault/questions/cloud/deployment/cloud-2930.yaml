title: Specifying Resource Limits to Prevent GPU Memory OOM Eviction
scenario: An inference service runs vLLM on 80 GB nodes inside Kubernetes. Operations notices pods are occasionally OOMKilled and restarted, causing 30-second cold-start latency spikes. The pod spec currently sets CPU/RAM limits but no GPU memory limits.
question: What Kubernetes resource and readiness configuration would reduce vLLM OOMKilled restarts on A100 nodes without over-provisioning?
details:
  realistic_solution: 'Set `resources.requests.memory` and `resources.limits.memory` to at least 2x the model''s CPU-resident data: for a 7B parameter model in BF16 (14 GB) with a ~34 GB KV cache, set RAM limit to 64 Gi. Set `resources.requests.nvidia.com/gpu: 1` and `limits.nvidia.com/gpu: 1`. Use `LimitRange` at the namespace level to enforce a floor. Add a readiness probe on the vLLM health endpoint so Kubernetes withholds traffic during KV cache warmup.'
  common_mistake: |
    **The Pitfall:** Setting only the GPU limits (`nvidia.com/gpu`) and neglecting the container's CPU memory limit.
    **The Rationale:** Developers assume LLM serving is entirely GPU-bound and forget that vLLM pins large CPU RAM buffers for KV cache paging and weight loading.
    **The Consequence:** The Linux OOM killer terminates the host process due to RAM exhaustion, crashing the GPU allocation and spiking latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights: 14 GB.
    - KV cache + activations: ~34 GB. Total GPU: 48 GB.

    **Calculations:**
    - CPU RAM required: model loading (14 GB) + swap/buffers = ~24 GB.
    - Safety margin limit: 64 Gi.

    **Conclusion & Interpretation:**
    - **Result: 64 Gi RAM limit (Memory Capacity-Bound)**. Setting the CPU RAM limit to 64 Gi provides generous headroom and prevents the Linux OOM killer.
