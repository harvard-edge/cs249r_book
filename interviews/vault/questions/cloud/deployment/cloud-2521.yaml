title: Cloud vs. Edge Inference Deployment Trade-offs
scenario: A product manager asks why you don't just run inference in the cloud too, since you already have the GPU cluster. The edge deployment adds complexity (model export, quantization, OTA updates). Evaluate cloud-only vs. train-cloud/serve-edge.
question: When should you choose train-cloud/serve-edge over cloud-only inference despite the added deployment complexity?
details:
  realistic_solution: Cloud inference is simpler to deploy and can run the full-precision model, but it adds 50-200 ms network latency, requires connectivity, and costs about $0.001-$0.01/query. At 10M daily queries and $0.003/query, cloud serving is about $30K/day, $900K/month, or $10.95M/year. Edge inference adds quantization, export, OTA, and fleet observability work, but after device purchase its marginal serving cost is near zero; the stated edge platform cost is about $50K/year before hardware/support. Choose train-cloud/serve-edge when latency, offline operation, privacy, or annualized query volume makes the edge payback period shorter than the product horizon.
  common_mistake: |
    **The Pitfall:** Ignoring network latency and availability.
    **The Rationale:** Engineers assume cloud inference is always better due to simpler deployment logistics.
    **The Consequence:** Cloud inference adds 50-200 ms round-trip latency, making it unacceptable for real-time edge applications like autonomous driving.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M queries/day.
    - Cloud cost: $0.003/query.
    - Edge quantization + OTA infra: ~$50K/year, excluding device hardware, support, and maintenance.
    **Calculations:**
    - Cloud cost: 10M * $0.003 = $30K/day ≈ $900K/month ≈ $10.95M/year.
    - Edge infra cost: ~$50K/year, before device hardware/support/maintenance.
    - Payback on edge platform cost alone: $50K / $30K/day ≈ 1.7 days.
    **Conclusion & Interpretation:**
    - **Result: Edge serving can be much cheaper at this query volume, but the final decision must include device hardware, support, maintenance, and OTA risk before treating the 1.7-day platform payback as sufficient.**
