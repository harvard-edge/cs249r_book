title: The Serverless Inference Trade-off
scenario: We are choosing between AWS SageMaker Serverless (pay-per-invocation, scales to zero) and a dedicated ml.g5.2xlarge instance (1x A10G, $1.52/hr always-on) for serving a 7B model. Traffic is bursty with 500 QPS during business hours (4 hrs/day) and near-zero overnight.
question: What is the cost break-even point between SageMaker Serverless and a dedicated A10G, and which option wins for this workload?
details:
  realistic_solution: 'At 500 QPS for 4 hours, a batched dedicated fleet (63 instances) costs ~$69K/month. Serverless costs ~$34.5K/month — about 50% cheaper, but with cold-start penalties degrading UX. The break-even point is ~2.64 QPS sustained per instance: below that, serverless wins; above, dedicated wins. Since the 24-hour average (~1.3 QPS per instance) is below the threshold, serverless is cheaper. To balance cost and UX, a hybrid strategy (e.g., 20 dedicated instances for base load, plus serverless for overflow) minimizes cold starts while preserving savings.'
  common_mistake: |
    **The Pitfall:** Believing serverless is universally cheaper because you "don't pay for idle".
    **The Rationale:** Cloud marketing heavily emphasizes zero-scale savings without highlighting per-invocation premiums.
    **The Consequence:** Deploying high-throughput workloads on serverless and paying massive premiums over reserved, heavily-batched dedicated instances.
  napkin_math: |
    **Assumptions & Constraints:**
    - A10G Dedicated: $1,094/mo. Serverless: $0.0001/inv + $0.00003/sec.
    - 500 QPS * 4h/day * 30 days = 216M requests.

    **Calculations:**
    - Dedicated (63 instances) = $68,922/mo.
    - Serverless (2s/req) = 216M * $0.00016 = $34,560/mo.
    - Break-even = $1.52/hr / (3600 * $0.00016) = ~2.64 QPS sustained per instance.

    **Conclusion & Interpretation:**
    - **Result: Break-even ~2.64 QPS (Cost-Bound)**. However, cold-start latency must be weighed against cost savings.
