title: Diagnosing Context Amnesia in Canary Rollouts
scenario: Your team rolls out a 70B conversational LLM across 3 regions using a 10% canary deployment. Users report 'context amnesia' where the model misinterprets multi-turn conversations midway through. Telemetry shows prompt template mismatches between v1 and v2 models, despite the client sending the full history.
question: What is causing the context amnesia during the 10% canary, and what networking-level fix would you implement?
details:
  realistic_solution: The ingress load balancer uses random or round-robin routing, causing session mismatches mid-conversation. Implement sticky routing (session affinity) via consistent hashing at the API gateway to keep a user pinned to the same model version.
  common_mistake: |
    **The Pitfall:** Blaming backend databases or trying to synchronize session state across regions.
    **The Rationale:** Candidates miss the detail that the client sends full context, ignoring routing mechanics at the API gateway.
    **The Consequence:** Over-engineering a stateful storage solution instead of fixing the load balancer routing logic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10% canary deployment (90% v1, 10% v2).
       - 5-turn conversation.
    2. **Calculations:**
       - Routing probability: Random routing to v1 (90%) and v2 (10%).
       - Consistent session probability: To stay on the same model for a 5-turn conversation: (0.9^5) + (0.1^5).
       - Math: 0.59049 (v1) + 0.00001 (v2) ≈ 59%.
    3. **Conclusion & Interpretation:**
       - **~41% of multi-turn sessions experience a version mismatch and fail due to lack of sticky routing.**
       - **Result: State-Bound**
