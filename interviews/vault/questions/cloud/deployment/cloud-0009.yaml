title: The Blue/Green Memory Budget
scenario: You are deploying an updated 7-billion parameter LLM to your company's RAG-based
  chatbot service. The model is served in FP16 precision. Your Kubernetes cluster
  uses a blue/green deployment strategy, where the new model pod must be healthy and
  running before traffic is switched over from the old one. To ensure a smooth rollout
  without evicting other pods, you need to calculate the peak GPU memory required
  on a single multi-model node during this transition. Explain how you would calculate
  the total GPU memory required to hold both the old and the new models simultaneously
  during the update.
question: What peak GPU memory is required to hold both old and new FP16 7B model
  weights during the blue/green rollout?
details:
  realistic_solution: To calculate the peak memory, you need to account for both models
    co-existing on the same GPU. For a 7B parameter model in FP16 (which uses 2 bytes
    per parameter), a single instance requires 14 GB of memory. Since a blue/green
    deployment requires both the old and new versions to be resident before traffic
    switchover, the total required memory is double that of a single instance.
  common_mistake: The most common mistake is to calculate the memory for only a single
    model instance. This forgets that during a blue/green deployment, the node must
    have enough capacity to hold both the old and new model containers in memory at
    the same time before the old one is terminated. Another common error is using
    the memory footprint for a different precision, like INT8 (1 byte/param) or FP32
    (4 bytes/param), instead of the specified FP16.
  napkin_math: 1. **Memory for one model:** 7 Billion parameters × 2 bytes/parameter
    (for FP16) = 14 GB.
  options:
  - 14 GB. The new model replaces the old one, so you only need space for one.
  - 7 GB. A 7B model requires 7GB of memory.
  - 28 GB. Both the old and new 14 GB models must be in memory at the same time.
  - 56 GB. An FP16 model uses 4 bytes/param, and you need two of them.
  correct_index: 2
