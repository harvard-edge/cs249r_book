title: The Embedding Model Serving
scenario: We're deploying a 335M parameter embedding model for our search engine. Unlike LLMs, there's no autoregressive decode — it's a single forward pass. The team sized the GPU as if it were an LLM workload and provisioned a high-end compute GPU. Is that the right hardware? What's the optimal batch size?
question: "Is a high-end GPU the right hardware for a 335M embedding model, and what batch size should you target?"
details:
  realistic_solution: |
    Embedding inference is a single forward pass with no autoregressive loop. The workload is compute-bound at moderate batch sizes because the full sequence is processed in parallel (like LLM prefill, not decode). This means: (1) batch size directly increases throughput with near-linear scaling until you hit compute saturation, (2) an A10G ($0.75/hr) at high batch sizes can match H100 throughput-per-dollar because you're not paying for unused HBM bandwidth, and (3) CPU inference (with ONNX Runtime) is viable for low-QPS workloads.
  common_mistake: |
    **The Pitfall:** Treating embedding models exactly like autoregressive LLMs.
    **The Rationale:** Engineers assume all transformers are memory-bandwidth bound, ignoring that embeddings are a single forward pass without the autoregressive decode loop.
    **The Consequence:** Drastic overprovisioning of HBM bandwidth, leading to poor throughput-per-dollar.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 335M params, FP16 = 670 MB.
       - Batch size 64, sequence length 512.
    2. **Calculations:**
       - Total memory footprint = 670 MB (weights) + ~2 GB (activations) < 3 GB.
       - Compute is fully utilized as a single large parallel matrix multiplication.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. Since there is no autoregressive decode, the workload is pure dense compute, meaning a cheaper GPU like an A10G maximizes throughput per dollar.
