title: The Agent Tool-Call Latency Budget
scenario: Your AI agent can call up to 5 tools per user query. Each tool call requires a full LLM inference (TTFT 200ms + 50-token reasoning at 25ms/token = 1.45s per step), plus tool execution (avg 300ms). The user expects a response within 10 seconds.
question: How many sequential tool calls can you afford, and how do you design the system to stay within budget?
details:
  realistic_solution: 'Each tool-call round costs: LLM inference (1.45s) + tool execution (0.3s) = 1.75s. Within a 10s budget: 10 / 1.75 = 5.7, so 5 rounds fit — barely. But this ignores the final synthesis step (200ms TTFT + 200-token generation at 25ms/token = 5.2s). Realistic budget: 10s - 5.2s final generation = 4.8s for tool calls → 4.8 / 1.75 = 2.74 → 2 tool rounds. Solutions: (1) use speculative tool calling — predict likely tool calls and execute them in parallel before the LLM decides, (2) use a smaller/faster ''routing'' model (TTFT 30ms, 15ms/token) for tool selection, reserving the large model for final synthesis, (3) stream intermediate results to the user to hide latency, (4) cache frequent tool-call results (e.g., same SQL query within a session).'
  common_mistake: |
    **The Pitfall:** Assuming multiple tool calls can be executed in parallel.
    **The Rationale:** Candidates automatically look for parallelization opportunities to optimize latency.
    **The Consequence:** They fundamentally break the agentic workflow, as the LLM must condition its next tool decision on the output of the previous tool.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total budget: 10 seconds.
    - Tool reasoning: TTFT 200ms + 50×25ms = 1.45s.
    - Tool execution: 300ms.
    - Final synthesis: TTFT 200ms + 200×25ms = 5.2s.

    **Calculations:**
    - Single tool loop: 1.45s + 0.3s = 1.75s.
    - Final synthesis step: 5.2s.
    - For N=2 tools: (2 × 1.75s) + 5.2s = 8.7s (Fits).
    - For N=3 tools: (3 × 1.75s) + 5.2s = 10.45s (Fails).

    **Conclusion & Interpretation:**
    - **Result: Maximum 2 sequential tool calls (Latency-Bound)**.
