title: Multi-Cluster GPU Federation Scheduling
scenario: 'Your organization has three heterogeneous GPU clusters: Cluster A (Region A, FP8 support), Cluster B (Region B, max memory), and Cluster C (Region C, legacy/cheapest).'
question: How would you design a federated scheduler to route jobs across the clusters based on job characteristics?
details:
  realistic_solution: 'Federated scheduler architecture: (1) Job classification layer: parse job requirements (memory needs, precision, training vs inference). (2) Hardware matching: routing FP8 to Cluster A, memory-heavy (large KV cache) to Cluster B, cost-sensitive to Cluster C.'
  common_mistake: |
    **The Pitfall:** Treating all GPUs as strictly equivalent compute pools.
    **The Rationale:** Candidates focus entirely on aggregate FLOPS and ignore the massive differences in HBM capacity, interconnect topology, and precision support.
    **The Consequence:** Stranding large-memory inference jobs on multi-GPU setups while wasting top-tier compute accelerators on simple fine-tuning runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster A supports FP8.
    - Cluster B has high-memory GPUs with 192GB HBM per GPU.
    - Cluster C has lower-cost legacy GPUs with 80GB HBM per GPU.

    **Calculations:**
    - Memory-heavy inference with a large KV cache should prefer Cluster B because one 192GB GPU may avoid tensor parallelism.
    - The same job on 80GB GPUs may require multiple GPUs or a smaller batch, increasing coordination overhead.
    - FP8-capable training or fine-tuning should prefer Cluster A when precision requirements allow it.
    - Cost-sensitive jobs without high memory or FP8 needs should prefer Cluster C.

    **Conclusion & Interpretation:**
    - **Result: route by measured constraints, not aggregate GPU count**. Memory-bound jobs go to high-HBM GPUs, FP8-friendly jobs go to FP8 hardware, and flexible jobs use the cheapest acceptable cluster.
