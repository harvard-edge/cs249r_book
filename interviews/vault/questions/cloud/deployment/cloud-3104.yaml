title: 'TCO Optimization: Training Efficiency vs Infrastructure Cost'
scenario: A 30B parameter model is being trained on H100 (700W, $2.50/hr). Current MFU is 35%. The team is considering investing 2 engineer-months ($60K) to optimize the training stack and reach 55% MFU.
question: What is the break-even total infrastructure budget required to justify the $60K engineering investment, and what are the ongoing cost savings?
details:
  realistic_solution: 'Calculate the relative reduction in required GPU-hours. An MFU improvement from 35% to 55% directly scales down the critical path time by 35/55. Apply this ratio to the total infrastructure cost to establish the break-even TCO baseline.'
  common_mistake: |
    **The Pitfall:** Calculating savings as an absolute percentage reduction rather than a relative time reduction.
    **The Rationale:** Candidates subtract the percentages (55% - 35% = 20%) instead of calculating the ratio of time saved.
    **The Consequence:** They underestimate the financial impact of the optimization, potentially rejecting a highly profitable engineering investment.
  napkin_math: |
    **Assumptions & Constraints:**
    - H100 cost: $2.50/hr. MFU improves from 35% to 55%.
    - Engineering cost: $60,000.

    **Calculations:**
    - New training time relative to old: 35 / 55 = 0.636 (63.6%).
    - Relative savings: 1.0 - 0.636 = 0.364 (36.4%).
    - Break-even formula: 0.364 * Old_Budget = $60,000.
    - Old_Budget = $60,000 / 0.364 = $164,835.

    **Conclusion & Interpretation:**
    - **Result: $165,000 break-even budget (TCO-Bound)**. The investment is highly ROI-positive for any training run exceeding this threshold.
