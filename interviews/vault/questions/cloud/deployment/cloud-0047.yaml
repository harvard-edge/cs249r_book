title: The Static Batching Latency Tax
scenario: 'You are designing an LLM serving system on a single H100 GPU. The team has decided to use a simple, time-based static batching strategy to improve throughput. The system collects all incoming requests for a fixed window of 50ms and then dispatches them as a single batch. Assume that computing the first token for this batch takes exactly 25ms.'
question: 'For a request arriving just after the 50ms static batching window opens, what components make up its worst-case TTFT?'
details:
  realistic_solution: 'The total Time-To-First-Token (TTFT) is the sum of the time waiting for the batch window to fill (up to 50ms) and the time to compute the first token (25ms). For a request arriving just after the window opens, it waits the full 50ms, resulting in a worst-case TTFT of 75ms.'
  common_mistake: |
    **The Pitfall:** Conflating system throughput processing time with user-perceived latency.
    **The Rationale:** Engineers often only calculate the GPU processing time (25ms) and forget the queueing component.
    **The Consequence:** Promises to product teams are broken because the actual user-perceived TTFT is much higher than the raw compute time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Static batching window: 50 ms.
       - Compute time for first token: 25 ms.
    2. **Calculations:**
       - Queue Wait Time (worst case) = 50 ms (request arrives right after window opens).
       - Base Compute Time = 25 ms.
       - Total TTFT = 50 ms + 25 ms = 75 ms.
    3. **Conclusion & Interpretation:** **Result: Latency-Bound**. The worst-case TTFT is 75 ms, demonstrating how fixed-window batching intrinsically degrades user-perceived tail latency.
  options:
  - 25ms
  - 50ms
  - 75ms
  - 100ms
