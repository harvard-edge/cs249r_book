title: Topology-Aware Scheduling on DGX H100
scenario: >-
  A DGX H100 node has 8 GPUs connected via NVSwitch with full mesh NVLink.
  A 4-GPU distributed training job is scheduled.
question: >-
  Does NVLink topology matter for placement on this node, or are all 4-GPU subsets equivalent?
details:
  realistic_solution: 'On DGX H100 with NVSwitch: all 8 GPUs have full mesh NVLink connectivity (900 GB/s bidirectional per GPU pair). Any 4-GPU subset gets equal NVLink bandwidth for AllReduce. However, NUMA topology still matters. In a 2-socket system, GPUs 0-3 are typically on NUMA node 0 and GPUs 4-7 on NUMA node 1. A 4-GPU job on GPUs {0,1,4,5} spans NUMA nodes, meaning CPU-GPU data transfers for 2 GPUs cross the UPI/xGMI link between CPU sockets — adding ~50% latency for host-to-device copies. Best practice: prefer GPUs within the same NUMA node (GPUs {0,1,2,3} or {4,5,6,7}) for 4-GPU jobs. This optimizes: (a) DataLoader CPU-to-GPU transfers, (b) pinned memory allocation locality, (c) PCIe P2P if used alongside NVLink. Slurm implements this via gres/gpu with --gpu-bind=closest or CUDA_VISIBLE_DEVICES + numactl --cpunodebind.'
  common_mistake: |
    **The Pitfall:** Assuming all NVLink topologies are full mesh and ignoring CPU NUMA domains.
    **The Rationale:** While DGX H100 has full mesh NVLink, NUMA node affinity (which CPU socket the GPU connects to) heavily impacts host-to-device transfer performance.
    **The Consequence:** Unnecessary PCIe bottlenecks causing DataLoader stalls and dropping overall training throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cross-NUMA transfer speed is ~20 GB/s (PCIe 5.0).
    - Same-NUMA transfer speed is ~30 GB/s.
    - DataLoader pushes 1 GB/s.

    **Calculations:**
    - Same-NUMA transfer time = 1 GB / 30 GB/s = 33 ms.
    - Cross-NUMA transfer time = 1 GB / 20 GB/s = 50 ms.

    **Conclusion & Interpretation:**
    - **Result: 50 ms per batch (I/O-Bound)**. Spanning NUMA nodes incurs a ~50% latency penalty per batch for CPU-GPU transfers, making same-NUMA subsets highly preferable.
