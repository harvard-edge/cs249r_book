title: KV-Cache Transfer Compression to Reduce Network Bottleneck
scenario: In a disaggregated serving cluster, KV-cache transfer from prefill to decode GPUs uses 400 Gbps
  InfiniBand. A 70B model with 512-token prompt has KV cache that takes 3.2ms to transfer, adding 16%
  to TTFT.
question: What KV-cache compression scheme would reduce the 3.2 ms prefill-to-decode transfer over 400
  Gbps InfiniBand and lower TTFT overhead?
details:
  realistic_solution: 'KV cache compression strategies: (1) Quantization: KV caches can be quantized to
    INT8 without significant quality loss. INT8 KV = 2× compression. (2) Head pruning: Drop bottom 20%
    of heads by attention entropy variance: 1.25× compression. Combined: INT8 (2×) + 20% head pruning
    (1.25×) = 2.5× compression. Transfer time: 3.2ms / 2.5 = 1.28ms. TTFT overhead drops from 16% to 6.4%.'
  common_mistake: '**The Pitfall:** Applying general-purpose compression algorithms like LZ4 or Zstd to
    KV cache tensors.

    **The Rationale:** Treating floating-point tensors like standard textual or binary data.

    **The Consequence:** Achieving poor compression ratios (1.1-1.3x) where the compute overhead of compression
    massively exceeds the network transfer savings.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 70B model: 80 layers, 64 heads, 128 head_dim.

    - 512 tokens, 2 bytes/param (FP16).

    - Transfer time: 3.2ms.

    - 2.5x compression (INT8 + 20% head pruning).

    **Calculations:**

    - KV cache size = 2 * 80 * 64 * 128 * 512 * 2 bytes = 1.25 GiB.

    - New transfer time (INT8 + pruning) = 3.2ms / 2.5 = 1.28ms.

    **Conclusion & Interpretation:**

    - **Result: 1.28ms transfer time with INT8 and pruning (Network-Bandwidth-Bound).**

    '
