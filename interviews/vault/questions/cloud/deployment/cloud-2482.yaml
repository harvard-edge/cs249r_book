title: Fleet-Wide Heterogeneous Deployment
scenario: A cloud deployment pipeline serves a 20M parameter BERT model to 5M mobile users for on-device NLP. The fleet spans 15 different Android SoCs. Using a generic TFLite model with NNAPI delegate yields 80ms latency on average, but high variance (P99 800ms) and severe battery drain because NNAPI falls back to CPU for unsupported LayerNorm operations on certain chipsets.
question: "How would you redesign the mobile BERT deployment pipeline to reduce P99 latency and battery drain across 15 Android SoCs?"
details:
  realistic_solution: Execute a hardware-compiler co-design. First, algorithmically fuse or replace the unsupported LayerNorm operations with ops native to mobile NPUs. Second, implement an Ahead-of-Time (AOT) compiler pipeline (using TVM or MLIR) to generate hardware-specific binaries for the top 5 SoCs (covering the bulk of the fleet), bypassing on-device JIT overhead. Retain the generic TFLite model only as a fallback for the long-tail devices.
  common_mistake: |
    **The Pitfall:** Forcing the entire model to run on the CPU to achieve "consistent" latency.
    **The Rationale:** Engineers prioritize predictable latency metrics on dashboards, sacrificing the massive efficiency gains of hardware accelerators.
    **The Consequence:** Destroyed battery life, thermal throttling, and massive app uninstalls due to device overheating.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Top 5 SoCs = 80% of 5M users = 4M users.
       - CPU power: 2.0W. NPU power: 0.5W.
       - Inference time: 0.8 seconds (CPU fallback).
       - Usage: 100 queries/day per user.
    2. **Calculations:**
       - Power difference: 2.0W - 0.5W = 1.5W saved per inference.
       - Energy saved per query: 1.5W * 0.8s = 1.2 Joules.
       - Daily savings fleet-wide: 1.2 J * 100 queries * 4,000,000 users = 480,000,000 Joules.
    3. **Conclusion & Interpretation:**
       - **Result: 480 Megajoules/day saved.** The deployment is fundamentally **Power-Bound** on the edge; utilizing the NPU is strictly required to preserve user device thermals.
