title: The Normalization Mismatch
scenario: Your image classification model achieves 91% accuracy in the training notebook but only 72% when deployed to a Flask serving endpoint on the same A100 GPU. Same model weights, same test images (you verified by saving the raw bytes). The training team uses PyTorch, the serving team uses ONNX Runtime.
question: 'What''s the most likely preprocessing bug?'
details:
  realistic_solution: 'The serving pipeline applies different input normalization than training. The most common variant: the training pipeline normalizes images to [0, 1] range and then applies ImageNet mean/std normalization. The serving pipeline either: (1) forgets the mean/std normalization entirely (passes [0, 1] values directly); (2) applies normalization but in the wrong channel order (RGB vs BGR — OpenCV loads BGR by default, PIL loads RGB); or (3) normalizes to [-1, 1] instead of using ImageNet statistics. Any of these produces inputs that are statistically different from what the model saw during training. Fix: extract the exact preprocessing pipeline from the training code and replicate it byte-for-byte in the serving code.'
  common_mistake: '"ONNX Runtime must have a conversion bug" or "The model needs to be re-exported." ONNX conversion for standard architectures is well-tested and unlikely to cause a 19-point drop. The model is fine — the *input* is wrong.'
  napkin_math: |
    **Assumptions & Constraints:**
    - ImageNet normalization: pixel value 128 (mid-gray).

    **Calculations:**
    - Expected: (128/255 - 0.485) / 0.229 = 0.074.
    - Without normalization: the model receives 0.502 instead of 0.074 — a 6.8x magnitude error.
    - With BGR instead of RGB: the red channel's mean (0.485) is applied to the blue channel (which has mean 0.406). Error per pixel: (0.406 - 0.485) / 0.229 = -0.345 systematic bias.

    **Conclusion & Interpretation:**
    - **Result: 6.8x magnitude error or 0.3 per-pixel bias (Data Mismatch)**. For a model trained on correctly normalized inputs, this is equivalent to adding a colored filter to every image, explaining the drop to 72%.
