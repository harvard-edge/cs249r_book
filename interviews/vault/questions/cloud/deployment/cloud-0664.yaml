title: The CPU-Bound Generation Loop
scenario: Your PyTorch LLM inference script runs `model.generate()`. The GPU is extremely powerful, but your Time-Per-Output-Token is hovering around 10ms. You want it to be 2ms. You look at `nvtop` and see the GPU utilization is only 15%. The GPU isn't doing much work.
question: What part of the Python generate loop is physically preventing the GPU from running faster?
details:
  realistic_solution: 'The GPU is starved by host-side dispatch overhead in the Python generation loop. The `model.generate()` loop is autoregressive: for each token, Python repeatedly calls into PyTorch/CUDA for the layer stack and associated kernels. Each launch or dispatch boundary can cost ~20-50 microseconds before the GPU sees work. Across an 80-layer model, even one launch boundary per layer is 1.6-4.0ms of CPU-side overhead per token, and real unfused layers can have more. The fix is to use CUDA Graphs to replay the forward pass, or a C++ inference engine such as vLLM or TensorRT-LLM that fuses kernels and removes the Python loop from the critical path.'
  common_mistake: |
    **The Pitfall:** Looking only at GPU kernel time and ignoring the gaps between kernels.
    **The Rationale:** Candidates see each individual operation as fast and miss that Python/CUDA launch dispatch is serialized on the host for every generated token.
    **The Consequence:** Wasting time micro-optimizing kernels while the GPU is mostly waiting for the CPU to submit the next piece of work.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model layers: 80.
       - Target TPOT: 2 ms. Observed TPOT: 10 ms.
       - Python interpreter overhead: ~20-50 µs per launch.
    2. **Calculations:**
       - Lower-bound host overhead with one dispatch per layer: 80 * 20 µs = 1.6 ms per token.
       - Upper-bound host overhead with one dispatch per layer: 80 * 50 µs = 4.0 ms per token.
       - This range is only the dispatch gap; actual TPOT also includes GPU kernel execution, memory movement, sampling, and any extra unfused kernel launches.
    3. **Conclusion & Interpretation:**
       - **Result: Host-Dispatch Bottleneck.** Python/CUDA launch overhead alone can consume most or all of a 2ms TPOT budget and contributes to the observed 10ms TPOT by leaving the GPU underfed between kernels.
