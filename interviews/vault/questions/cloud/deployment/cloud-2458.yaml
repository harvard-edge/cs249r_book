title: The Edge Fleet Compilation Dilemma
scenario: Your cloud platform manages a fleet of 50,000 retail smart cameras across 4 different hardware generations (varying NPUs and OS versions). You push daily updates for a 45MB object detection model. Currently, the cloud pushes the raw ONNX model, and the edge device compiles it locally using TensorRT/TFLite. This causes a 10-minute downtime per device, spiking edge CPU to 100% and causing thermal throttling. You want to move compilation to the cloud, but your initial test of cloud-side Ahead-Of-Time (AOT) compilation resulted in a massive CI/CD bottleneck and deployment failures on 15% of the fleet.
question: How would you move edge model compilation to the cloud without 10-minute device downtime or 15% deployment failures?
details:
  realistic_solution: |
    Move compilation into the cloud as a fingerprinted artifact pipeline, not as one generic AOT build. Inventory each camera by hardware generation, NPU/compiler backend, OS image, runtime, and driver version, then precompile artifacts for each supported fingerprint. Store the binaries in a versioned artifact cache keyed by model hash plus fleet fingerprint, and have devices download only the matching artifact.

    To avoid the CI/CD bottleneck, run the target builds in parallel across compiler workers or a representative hardware/device farm, and reuse cached artifacts when the model or runtime fingerprint has not changed. To reduce the 15% deployment failure rate, gate each artifact with compatibility tests, staged canaries per fingerprint, health checks, and automatic rollback to the prior compiled binary. This removes the 10-minute device-side compile outage while making mismatches visible before broad rollout.
  common_mistake: |
    **The Pitfall:** Assuming cloud AOT compilation just means running the compiler once in a Docker container.
    **The Rationale:** Candidates often forget that edge compilers tightly bind to the specific micro-architecture, OS kernel, and driver version of the target device.
    **The Consequence:** Deploying generic binaries that crash or silently fall back to the CPU on devices with mismatched driver versions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet combinations: 4 NPU gens * 3 driver versions = 12 targets.
    - Cloud compilation time per target: 5 mins, if run on a single compiler worker.
    - With at least 12 compiler workers or cached artifacts, the 12 target builds can run in parallel; with fewer workers, CI/CD time scales by available capacity.
    - Edge CPU power during local compilation: 10W.
    - Only the compile portion of the 10-minute outage is eligible for energy savings; install, verification, and traffic switchover still require staged rollout time.

    **Calculations:**
    - Sequential compile wall time: 12 targets * 5 mins = 60 mins.
    - Fully parallel compile wall time: max(5 mins per target) = ~5 mins plus packaging and validation.
    - Storage overhead in cloud: 12 distinct 60MB compiled binaries = 720MB.
    - If local compilation consumed the full 600 seconds, the upper-bound energy saved per device is 10W * 600 seconds = 6,000 Joules.
    - Fleet upper-bound compile energy shifted off devices: 6,000 Joules * 50,000 devices = 300 MJ.

    **Conclusion & Interpretation:**
    - **Result: Reduced Device Downtime and Bounded CI/CD Cost**. Cloud AOT can shift up to 300 MJ of compile energy off the fleet and remove the compile portion of the outage, but rollout still needs per-device install, validation, and staged switchover. The deployment plan should precompile artifacts by exact hardware/driver fingerprint, cache them, and size compiler capacity so cloud compilation does not become the new bottleneck.
