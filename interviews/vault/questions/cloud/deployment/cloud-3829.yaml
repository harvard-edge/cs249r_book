title: Shadow Deployment PCIe Bottleneck
scenario: A cloud recommendation service is serving a model on a single H100 GPU. The application sends 20 GB/s of user context data from the CPU to the GPU over PCIe Gen5 x16 (which provides 32 GB/s unidirectional bandwidth). To safely evaluate a new model version, the team uses a shadow deployment strategy where the application duplicates the incoming traffic on the CPU and sends a second copy of the 20 GB/s context data to the shadow model co-located on the same H100. Upon enabling 100% shadow traffic, the primary model's latency doubles and throughput drops, despite the H100's 989 TFLOPS FP16 being only 30% utilized and its 3.35 TB/s HBM3 bandwidth being mostly free.
question: Why does enabling 100% shadow traffic degrade performance despite low H100 compute utilization and free HBM bandwidth?
details:
  realistic_solution: The degradation occurs because the shadow deployment architecture creates a PCIe bandwidth bottleneck. By duplicating the traffic on the CPU, the system attempts to push 40 GB/s across a bus that only supports 32 GB/s in one direction. The architecture should be modified to send a single copy of the data over PCIe and duplicate it within the GPU's high-bandwidth HBM3 memory.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck must be GPU compute or memory capacity.
    **The Rationale:** Engineers focus heavily on GPU limits and ignore the host-to-device data transfer pathway.
    **The Consequence:** They misdiagnose the performance drop and fail to realize the PCIe bus is actively queuing requests due to unidirectional bandwidth exhaustion.
  napkin_math: |
    - Primary data transfer = 20 GB/s.
    - Shadow data transfer = 20 GB/s.
    - Total required CPU-to-GPU bandwidth = 20 + 20 = 40 GB/s.
    - Available PCIe Gen5 x16 unidirectional bandwidth = 32 GB/s.
    - **Bandwidth deficit = 40 GB/s - 32 GB/s = 8 GB/s, causing requests to queue and latency to spike.**
