title: KV-Cache Affinity in Canary Rollouts
scenario: You are rolling out a new conversational LLM version across a multi-region cluster currently running on 200 inference nodes. The system heavily relies on KV-cache affinity to minimize latency for multi-turn chats. You add 10 new nodes running the canary version.
question: How many sessions lose KV-cache affinity when adding 10 canary nodes with modulo hashing versus consistent hashing?
details:
  realistic_solution: 'Implement a consistent hashing ring. This ensures that adding new model nodes only disrupts the sessions mapped to the specific ring segments they take over, preserving the KV-cache for the vast majority of ongoing multi-turn conversations.'
  common_mistake: |
    **The Pitfall:** Using naive modulo hashing (`hash(user_id) % num_nodes`) for session routing.
    **The Rationale:** It is the simplest load balancing method to implement and works perfectly—until the node count changes.
    **The Consequence:** Every time a node is added or removed during deployments, the entire cluster experiences catastrophic KV-cache invalidation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Nodes (N): 200.
    - Nodes Added: 10 (Total 210).

    **Calculations:**
    - Naive Modulo (N=200 to N=210): ~200/210 = 95.2% of users map to a different node.
    - Consistent Hashing: Redistributes only the fraction of the ring owned by the new nodes (10/210 = 4.7%).

    **Conclusion & Interpretation:**
    - **Result: 95.3% Affinity Preserved (Cache-Miss Bound)**. Consistent hashing preserves 95.3% of the cache, whereas modulo hashing causes 95.2% of sessions to lose affinity.
