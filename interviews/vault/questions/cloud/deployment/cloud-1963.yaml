title: KV-Cache Affinity in Canary Rollouts
scenario: You are rolling out a new conversational LLM version across a multi-region cluster currently running on 200 inference nodes. The system heavily relies on KV-cache affinity to minimize latency for multi-turn chats. You add 10 new nodes running the canary version.
question: How many sessions lose KV-cache affinity when adding 10 canary nodes with modulo hashing versus consistent hashing?
details:
  realistic_solution: With naive modulo routing, changing the modulus from 200 to 210 changes the assignment for about 95.2% of uniformly hashed sessions, so nearly all active KV caches lose affinity. With consistent hashing, only the new nodes' share of the ring moves, about 10/210 = 4.8% of sessions. Use a consistent hashing ring for the canary rollout so roughly 95.2% of ongoing multi-turn conversations keep their KV-cache affinity.
  common_mistake: |
    **The Pitfall:** Using naive modulo hashing (`hash(user_id) % num_nodes`) for session routing.
    **The Rationale:** It is the simplest load balancing method to implement and works perfectly—until the node count changes.
    **The Consequence:** Every time a node is added or removed during deployments, the entire cluster experiences catastrophic KV-cache invalidation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Nodes (N): 200.
    - Nodes Added: 10 (Total 210).

    **Calculations:**
    - Naive modulo changes the routing function from hash % 200 to hash % 210.
    - Over one least-common-multiple cycle of 4,200 hash values, only the 200 values where hash % 200 equals hash % 210 keep the same node assignment.
    - Modulo affinity kept = 200 / 4,200 = 4.8%, so affinity lost = 95.2% of sessions.
    - Consistent hashing redistributes only the fraction of the ring owned by the new nodes: 10/210 = 4.8% lose affinity.
    - Consistent hashing therefore preserves about 200/210 = 95.2% of sessions.

    **Conclusion & Interpretation:**
    - **Result: Cache-Miss Bound.** Modulo hashing loses affinity for about 95.2% of sessions, while consistent hashing loses only about 4.8% and preserves about 95.2%.
