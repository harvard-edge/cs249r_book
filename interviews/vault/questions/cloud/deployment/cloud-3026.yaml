title: 'MLOps Lifecycle: Specify a Model Evaluation Gate for Production Promotion on H100'
scenario: 'You need to define quantitative promotion criteria for automatically promoting a new 13B LLM checkpoint to production on a cluster of 80GB GPUs. The system serves 10M requests/day.'
question: 'What quantitative promotion thresholds should automatically gate a new 13B checkpoint for benchmark, latency, memory, quality, and errors?'
details:
  realistic_solution: 'Benchmark regression: no more than 2% relative drop on any of 5 suites (at 5000 eval examples). Latency: P99 TTFT < 200ms, TPOT < 30ms measured over 10K shadow requests. Memory: model must fit in 80GB HBM with batch 16 (26GB model + 53.7GB KV). Win rate: > 45% on GPT-4 judge eval. Error rate: < 0.01% over 100K shadow requests.'
  common_mistake: |
    **The Pitfall:** Setting thresholds arbitrarily (e.g., "must be within 2%") without statistical grounding.
    **The Rationale:** Teams often pick round, intuitive numbers for passing/failing criteria without analyzing the dataset's variance.
    **The Consequence:** The evaluation gate either rejects perfectly good models due to normal statistical noise or passes degraded models by failing to account for the evaluation set's confidence intervals.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model checkpoint, 80GB GPUs.
    - 5000 evaluation examples.
    - Metric standard deviation is ~7%.

    **Calculations:**
    - KV cache at batch 32: 32(b) * 4096(ctx) * 2(KV) * 5120(dim) * 2(bytes) * 40(layers) = 107GB (OOM on 80GB GPU).
    - KV cache at batch 16: 16 * 4096 * 2 * 5120 * 2 * 40 = 53.7GB.
    - Memory threshold: Model (26GB) + KV (53.7GB) = 79.7GB < 80GB. Batch 16 fits safely.
    - Standard Error of Mean (SEM): 7% / sqrt(5000) = 0.1%.

    **Conclusion & Interpretation:**
    - **Result: 2% regression threshold (Statistical-Bound)**. A 2% regression threshold represents a safe 20-sigma bound, minimizing false positives.
