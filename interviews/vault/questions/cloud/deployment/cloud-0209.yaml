title: The A/B Testing at Scale
scenario: We want to A/B test our current 13B model against a new 70B model in shadow mode. The product team says 'just mirror 100% of traffic to both models for a week to gather data.'
question: Why is this statistically unnecessary but infrastructure-ruinous, and how does the GPU memory asymmetry between these models dictate your A/B testing architecture?
details:
  realistic_solution: The infrastructure cost of an A/B test is dominated by hardware provisioning, not the statistical sample size. A 13B model fits on a single A100 (40GB) with room for KV-cache. A 70B model requires tensor parallelism across at least 4× A100s (80GB) or 2× H100s just to fit the weights, plus massive KV-cache overhead. Mirroring 100% of traffic means provisioning a 70B cluster that is 5-8× larger and more expensive than your production 13B cluster, just for a test. Instead, use an asymmetric traffic split (e.g., 95/5) or sample-based shadow routing. You only need to route enough traffic to the 70B model to reach statistical significance, which is typically a few thousand requests.
  common_mistake: |
    **The Pitfall:** Blindly mirroring 100% of traffic to the shadow deployment.
    **The Rationale:** Engineers follow standard web-service A/B testing practices, forgetting the massive, non-linear hardware cost of LLM inference.
    **The Consequence:** Hundreds of thousands of dollars are wasted on GPU compute to gather millions of statistically redundant data points.
  napkin_math: |
    1. Memory Asymmetry: 13B FP16 = 26 GB (Fits 1x 40GB A100). 70B FP16 = 140 GB (Requires 4x 40GB A100s).
    2. The 70B model requires 4x the GPUs per replica.
    3. Mirrored Traffic Cost: If prod is 1,000 QPS on 50 A100s, 100% mirroring to 70B needs ~200 H100s. At $4/hr, that's ~$168k/week.
    4. Statistical Sample Size: To detect a 3% improvement with 80% power requires ~3,200 samples per arm.
    5. **Result: Routing 1 QPS (0.1% traffic) to a single 70B deployment gathers 3,200 samples in <1 hour for ~$10.**
