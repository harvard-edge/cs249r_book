title: Optimal Prefill Batch Size for TTFT
scenario: 'On an H100 SXM5 running prefill for a 13B parameter FP16 model, you want to choose the batch size that maximizes GPU utilization without hurting TTFT.'
question: 'At what sequence length and batch size does the prefill become compute-bound versus memory-bandwidth-bound?'
details:
  realistic_solution: 'For attention and MLP layers combined, GEMMs dominate the forward pass. FLOPs = 2 × N_params × B × S. Memory reads ≈ N_params × 2 bytes (FP16). Calculate the hardware ridge point and set Arithmetic Intensity equal to the ridge point to find the crossover sequence length. Prefill typically operates deep in the compute-bound regime.'
  common_mistake: |
    **The Pitfall:** Using total model capacity instead of analyzing the FLOPs-to-Bytes ratio of the forward pass.
    **The Rationale:** Treating the forward pass as a black box and failing to decompose memory reads vs matrix multiplications.
    **The Consequence:** Incorrectly optimizing memory pipelines when the prefill phase is actually bound by tensor core FLOPs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: H100 SXM5 (989 TFLOPS FP16, 3.35 TB/s HBM3).
       - Model: 13B parameters, FP16 (2 bytes).
       - Scenario: Batch size (B) = 1, Sequence length (S) = 512.
    2. **Calculations:**
       - H100 Ridge Point: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte.
       - FLOPs (B=1, S=512): 2 × 13e9 × 512 = 13.3 TFLOPs.
       - Bytes (Weights): 13e9 × 2 bytes = 26 GB.
       - Arithmetic Intensity: 13.3e12 / 26e9 = 512 FLOP/byte.
       - Crossover S: S = 295 × (2 × 13e9) / (2 × 13e9) = 295 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. The arithmetic intensity (512) exceeds the ridge point (295). Prefill is compute-bound for any sequence ≥ 295 tokens at B=1.**
