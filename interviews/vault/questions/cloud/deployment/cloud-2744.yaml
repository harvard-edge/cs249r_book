title: Continuous Training Triggers
scenario: Your recommendation model's click-through rate has been slowly declining over 3 weeks. A colleague suggests switching from scheduled weekly retraining to continuous training.
question: What should trigger continuous training for the declining CTR model, and how would it reduce staleness?
details:
  realistic_solution: 'Continuous training automates the retraining pipeline with two main trigger types: (1) Schedule-based: retrain every N hours/days regardless of performance. Simple but may retrain unnecessarily or too late. (2) Drift/performance-based: monitor key metrics (prediction distribution shift, feature drift, or business metrics like CTR) and trigger retraining when they degrade beyond a threshold. For your declining CTR case, the weekly schedule is too slow — user behavior patterns change faster. A continuous training pipeline would: detect the CTR drift within days, automatically trigger data ingestion of recent interaction data, launch a training job, validate the new model against the old one, and promote it if it passes quality gates. The key components are: a drift detector, an orchestrator (Airflow/Kubeflow), automated data ingestion, training job launcher, and validation gates.'
  common_mistake: |
    **The Pitfall:** Assuming continuous training implies the GPU cluster is training the model 24/7.
    **The Rationale:** Candidates confuse the term "continuous" with constant compute utilization, rather than an automated, event-driven CI/CD pipeline.
    **The Consequence:** Architecting a massively expensive and redundant training loop instead of a smart, drift-triggered retraining pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current staleness = 7 days
    - Drift-triggered pipeline detects in ~1 day, retrains in ~4h, deploys in ~1h

    **Calculations:**
    - Continuous staleness = 24h (detect) + 4h (train) + 1h (deploy) = 29 hours (~1.2 days)

    **Conclusion & Interpretation:**
    - **Result: ~1.2 days (Freshness-Bound)**. Automated drift detection cuts model staleness from 7 days to ~1.2 days, recovering the CTR drop.
