title: The Retrieval Scaling Wall
scenario: Your RAG system works well at 10M documents. The company acquires a dataset and the corpus grows to 1B documents. Retrieval latency goes from 5ms to 120ms, and retrieval quality (recall @ 10) drops from 0.92 to 0.71, even after re-building the HNSW index.
question: Why does 100x more data cause both latency and quality to degrade, and what architectural changes are needed?
details:
  realistic_solution: 'Two compounding problems: (1) Latency: the raw vector store grows from about 61GB at 10M vectors to about 6.1TB at 1B vectors, before graph overhead. Once the graph, vectors, or posting lists no longer fit in RAM, HNSW-style traversal becomes dominated by cache misses, paging, SSD access, and cross-shard fan-out rather than distance-compute FLOPs. HNSW is not a simple guaranteed O(log N) service-latency story at this scale. (2) Quality: with a much larger corpus, a fixed HNSW configuration explores a smaller fraction of the candidate space, and approximation, quantization, memory pressure, and sharding choices can all lower recall. The architectural response is tiered ANN: keep coarse routing structures and hot metadata in RAM, shard by vector locality, use compression such as PQ/SQ for the large candidate store, rerank a bounded candidate set with higher-fidelity vectors where needed, and tune ef_search/partition counts against measured recall and latency.'
  common_mistake: |
    **The Pitfall:** Assuming HNSW scales linearly and treating the degradation as a bug.
    **The Rationale:** Candidates think "HNSW is O(log N), so 100x more data should only be slightly slower," completely ignoring the hardware memory hierarchy cliff (RAM to SSD).
    **The Consequence:** Wasting time tuning HNSW parameters instead of migrating to a tiered architecture (IVF/PQ) or a distributed sharded cluster.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw vector size: 1536 dims * 4 bytes = 6,144 bytes per vector.
    - HNSW graph/index metadata adds overhead beyond raw vectors.
    - RAM-resident random access is much cheaper than SSD-backed or paged random access.

    **Calculations:**
    - 10M raw vectors: 10M * 6,144B = 61.44 GB, before graph overhead.
    - 1B raw vectors: 1B * 6,144B = 6.144 TB, before graph overhead.
    - Growth factor = 6.144 TB / 61.44 GB = 100x.
    - If the working set no longer fits in RAM, the search path pays many more high-latency random accesses and often needs sharding or compression.

    **Conclusion & Interpretation:**
    - **Result: memory-hierarchy and approximation limits dominate (I/O/Recall-Bound)**. The fix is not just retuning HNSW; it is a tiered, sharded, compressed ANN design with recall-preserving reranking where the SLA allows it.
