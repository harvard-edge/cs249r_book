title: Build Custom vs Use Off-the-Shelf ML Package
scenario: A fintech company uses an off-the-shelf AutoML package for credit scoring, wrapped in 6,000 lines of glue code for data formatting, feature engineering, and compliance logging. A senior engineer proposes replacing AutoML with a custom model (2,000 lines) that natively handles the company's data schema, reducing glue to 1,500 lines.
question: Should they do it?
details:
  realistic_solution: |
    Switch only if the custom model preserves or improves credit-risk performance, satisfies audit and explainability requirements, and reduces end-to-end operational burden after validation. The line-count reduction is a useful signal: current code is 6.5K lines versus 3.5K proposed, a 46% reduction. But fewer lines do not automatically justify replacing a validated credit-scoring system. The team must compare accuracy, calibration, bias/fair-lending evidence, latency, monitoring, model-risk governance, retraining procedures, and ownership cost. If the packaged AutoML solution is already explainable enough under the firm's controls and the custom model adds validation risk or maintenance burden, keep the packaged solution and reduce glue code incrementally. If the custom model meets the same governance bar and removes brittle integration code, then switching is defensible.
  common_mistake: |
    **The Pitfall:** Making the build-vs-buy decision from line count alone.
    **The Rationale:** Glue code is real technical debt, but credit-risk models also carry validation, audit, monitoring, fairness, and model-risk obligations.
    **The Consequence:** The team may replace a governed system with a custom one that is smaller in code but riskier or more expensive to operate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current: 6K glue + 500 model = 6.5K lines.
    - Proposed: 1.5K glue + 2K model = 3.5K lines.
    - Defect rate scales roughly linearly with lines of code.

    **Calculations:**
    - Total reduction in code: (6.5K - 3.5K) / 6.5K = 46% reduction.

    **Conclusion & Interpretation:**
    - **Result: 46% reduction in code size.** This supports investigating a custom model, but the switch is justified only if performance, auditability, and operational ownership remain at least as strong as the current system.
