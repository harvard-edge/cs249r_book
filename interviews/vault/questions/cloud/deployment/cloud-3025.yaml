title: 'MLOps Lifecycle: Concretely Size Model Registry Storage for a Large ML Organization'
scenario: A ML platform team at a large company runs 200 experiments/week across model sizes ranging from 1B to 70B parameters on cluster nodes.
question: How much registry storage is needed for 200 experiments per week over a year, and what tiering strategy minimizes cost?
details:
  realistic_solution: 'Average model: 13B FP16 = 26GB. Best-5 checkpoints per experiment: 130GB. 200 experiments/week = 26TB/week of new hot artifacts. If all checkpoints are retained for the full year, peak year-end registry storage is 26TB/week × 52 = 1.35PB, and storing that full retained set in standard S3 would cost about $31,100 per month at $0.023/GB. A cost-effective lifecycle is: (1) keep all 5 checkpoints in standard storage for 30 days; (2) keep only the best-1 checkpoint in standard storage for days 31-90; (3) transition that best-1 checkpoint to Glacier at $0.004/GB after 90 days and delete the other four. At steady state this keeps about 158TB in standard storage and 203TB in archive, for about 361TB retained and roughly $4,450/month.'
  common_mistake: |
    **The Pitfall:** Calculating total storage without applying lifecycle policies.
    **The Rationale:** Engineers often calculate peak theoretical capacity without considering the diminishing value of old ML experiments.
    **The Consequence:** Storing all experiments indefinitely in hot storage, incurring $31k/month in unnecessary infrastructure costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Average model size (13B FP16): 26 GB.
       - Best-5 checkpoints per experiment: 130 GB.
       - 200 experiments/week.
    2. **Calculations:**
       - New artifacts: 200 experiments/week * 130 GB = 26,000 GB/week = 26 TB/week.
       - No lifecycle peak after 52 weeks: 26 TB/week * 52 = 1,352 TB (1.35 PB).
       - No lifecycle standard-storage bill at year end: 1,352,000 GB * $0.023/GB = $31,096/month.
       - First 30 days, keep best-5: 26 TB/week * (30/7 weeks) ≈ 111 TB standard.
       - Days 31-90, keep best-1: 200 experiments/week * 26 GB * (60/7 weeks) ≈ 45 TB standard.
       - Older than 90 days through year end, archive best-1: 200 experiments/week * 26 GB * (275/7 weeks) ≈ 204 TB Glacier.
       - Standard total: 111 TB + 45 TB ≈ 156 TB; archive total: ≈204 TB.
       - Tiered monthly bill: (156,000 GB * $0.023) + (204,000 GB * $0.004) ≈ $4,404/month.
    3. **Conclusion & Interpretation:** **Result: Storage-Bound Cost**. Tiering reduces peak retained storage from 1.35 PB hot to about 360 TB retained across standard and archive, dropping the monthly bill from ~$31.1k to ~$4.4k.
