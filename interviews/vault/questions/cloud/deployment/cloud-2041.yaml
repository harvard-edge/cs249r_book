title: The Multi-Model GPU Packing Problem
scenario: 'A compound AI pipeline uses 4 models per request: an embedding model (400MB), a classifier
  (200MB), a reranker (1.3GB), and an LLM (28GB in INT4). You have an 80GB A100. The LLM uses 28GB of
  VRAM plus up to 40GB for KV-cache at peak load. Can you fit all 4 models on one GPU, and what happens
  if you try?'
question: "Can you fit all 4 models on one GPU, and what happens if you try?"
details:
  realistic_solution: 'Static weight memory is only part of the story. The LLM needs 28GB weights +
    up to 40GB KV-cache = 68GB at peak concurrent requests. The other 3 models need 1.9GB weights +
    ~2GB activation memory during inference = ~4GB. Total at peak: 72GB — technically fits in 80GB
    with 8GB headroom. But the real problem is GPU compute contention: when the LLM is running continuous
    batching, its CUDA kernels dominate the SM occupancy. The small models can''t get GPU time without
    preempting LLM batches, causing LLM throughput to drop by 30-50%. Fix: (1) run embedding model
    and classifier on CPU (they''re small and batch-friendly), (2) dedicate the GPU to LLM + reranker
    only, (3) use MPS (Multi-Process Service) or MIG to partition the A100 into isolated compute slices,
    (4) use separate inference instances with request routing.'
  common_mistake: 'Adding static model sizes: 400MB + 200MB + 1.3GB + 28GB = ~30GB. The A100 has 80GB,
    so ''obviously it fits.'''
  napkin_math: 'A100 80GB partitioned with MIG: Cannot give LLM 68GB and leave enough for others because
    MIG enforces strict geometries (e.g., 4x20GB or 1x40GB+2x20GB). Better: A100 for LLM only (68GB peak),
    T4 16GB for the 3 small models (1.9GB weights + 2GB activations = 3.9GB). T4 cost: $0.50/hr vs A100
    $3.50/hr — 7× cheaper for the small model tier.'
