title: Evaluating Interleaving vs A/B Testing
scenario: Your e-commerce search platform processes 10,000 QPS. You are evaluating a new ranking model (Model B) that adds a cross-attention layer, increasing P99 latency by 45ms over the production Model A (currently at 80ms). Offline NDCG improved by 2.5%, but you need to detect a 0.5% CTR lift with 95% confidence. A traditional A/B test requires 14 days of traffic.
question: Would you use interleaving or A/B testing for Model B under a strict 150ms P99 SLA, and how would you manage the tradeoffs?
details:
  realistic_solution: Use interleaving as a rapid, early-stage filter on a very small traffic allocation (e.g., 1%) to determine relative user preference in 24-48 hours. Run models in parallel to keep total latency at max(80ms, 125ms) + merge overhead = ~135ms, satisfying the 150ms SLA. If Model B wins, promote it to a standard A/B test to measure absolute CTR and revenue lift.
  common_mistake: |
    **The Pitfall:** Blindly recommending interleaving for its statistical efficiency.
    **The Rationale:** Candidates fail to realize interleaving runs both models simultaneously, pushing the P99 latency dangerously close to the SLA, and they forget it cannot measure absolute metrics.
    **The Consequence:** Breaching the 150ms SLA and failing to measure the true absolute revenue lift.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A latency: 80 ms.
    - Model B latency: 80 + 45 = 125 ms.
    - Interleaving overhead: ~10 ms.
    - SLA: 150 ms.

    **Calculations:**
    - Interleaving Latency: max(80, 125) + 10 = 135 ms.
    - 135 ms < 150 ms SLA.
    - Interleaving sample reduction: 10x (14 days -> 1.4 days).
    - Compute cost: +100% per request during the test.

    **Conclusion & Interpretation:**
    - **Result: 135 ms Total (Compute-Bound)**. Interleaving fits within the 150ms SLA (135ms total) and reduces test time to 1.4 days, but doubles the compute cost for the interleaved traffic segment.
