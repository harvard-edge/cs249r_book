title: Optimizing MoE Training on Kubernetes with Google TPU v5e
scenario: 'Your team is deploying a large-scale, memory-intensive Mixture-of-Experts (MoE) model for natural language processing on a Kubernetes cluster. This cluster is equipped with Google TPU v5e devices. The training job is configured to distribute the model across multiple TPU hosts, but you''re encountering significant challenges: intermittent TPU underutilization and sporadic HBM capacity issues on individual v5e devices, even when total cluster memory seems sufficient.'
question: How would you diagnose TPU v5e underutilization and HBM issues for a distributed MoE model, and optimize the Kubernetes deployment?
details:
  realistic_solution: '1.  **Verify TPU Device Plugin**: Ensure the Google Cloud TPU device plugin for Kubernetes is correctly installed and exposes TPU resources (e.g., `google.com/tpu`) as schedulable units. This enables Kubernetes to understand TPU topology and capabilities. 2.  **Resource Allocation**: Precisely define `resource.limits` for TPU v5e devices in pod specifications. Monitor host CPU/RAM as TPU pods can also be bottlenecked by insufficient host resources for data preprocessing. 3.  **Node Affinity & Topology**: Utilize `nodeSelector` or `nodeAffinity` to target pods to nodes with TPU v5e devices. For distributed jobs, employ `podAntiAffinity` to spread out TPU pods across different physical hosts if they share host CPU/memory resources, or `podAffinity` to co-locate interdependent pods to minimize network latency for inter-TPU communication. For larger slices, consider topology-aware scheduling to place TPU hosts in the same network quadrant. 4.  **Memory Optimization (HBM)**:
    Profile the MoE model''s memory footprint on a single TPU v5e using tools like `tf.profiler` or JAX/PyTorch equivalents to understand parameter, activation, and optimizer state HBM usage. Adjust batch sizes, consider techniques like gradient checkpointing or recomputation to trade compute for memory, and ensure efficient data loading that streams directly to HBM without intermediate host memory copies where possible. Use BF16 effectively. 5.  **Distributed Strategy**: For MoE, ensure the chosen distributed training framework (e.g., JAX/Flax, PyTorch/XLA) correctly leverages TPU-specific communication primitives (e.g., `all_reduce`, `all_gather`) and handles expert sharding efficiently. 6.  **Job Scheduling for ML**: If standard Kubernetes scheduling is insufficient for multi-pod distributed training (e.g., requiring gang scheduling), explore custom schedulers or open-source solutions like Volcano that provide advanced features for batch workloads, ensuring all required TPU workers start
    simultaneously.'
  common_mistake: |
    **The Pitfall:** Overlooking the specific memory hierarchy of TPUs and treating them identically to GPUs.
    **The Rationale:** Candidates assume a flat memory model and neglect proper TPU device plugin installation, node affinity, or TPU-specific communication primitives.
    **The Consequence:** This leads to misdiagnosis of HBM capacity issues and continued underutilization of the TPU hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e HBM per chip: 16 GB.
    - 100B BF16 parameters require about 200 GB for weights alone.
    - Training also needs optimizer state, gradients, activations, and MoE routing buffers.
    - Example sharding: 32 TPU chips.

    **Calculations:**
    - Weight shard per chip = 200 GB / 32 = 6.25 GB.
    - If gradients add another BF16 copy, parameter plus gradient storage is about 12.5 GB per chip.
    - Remaining HBM before optimizer state and activations = 16 GB - 12.5 GB = 3.5 GB.
    - Any unsharded optimizer state, oversized expert shard, or activation spike above 3.5 GB can trigger local HBM pressure even when aggregate cluster HBM is large.

    **Conclusion & Interpretation:**
    - **Result: Local HBM-capacity-bound.** Diagnose per-chip memory, expert placement, activation peaks, and host input stalls separately; Kubernetes topology and gang scheduling should keep the intended TPU slice together while the framework shards the MoE state correctly.
