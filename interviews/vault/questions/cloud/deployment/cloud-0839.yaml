title: Evaluating A/B Test Trade-offs for Heavy Models
scenario: Your team is evaluating a new two-tower recommendation model that increases offline AUC by 2% but requires 4x the inference FLOPs and adds 15ms of P99 latency compared to the baseline. Marketing wants to run an A/B test on 20% of the 5,000 QPS peak traffic for two weeks to prove a 0.5% CTR lift. The baseline runs on 20 L4 GPUs.
question: Should the 20% two-week A/B test proceed as requested, or is an alternative architecture needed?
details:
  realistic_solution: Do not run the 20% A/B test as requested. First shadow the model to measure true serving latency and resource use, then either optimize the architecture or use a more sensitive experiment such as interleaving. The offline AUC gain is not enough by itself because the candidate model needs about 4x the GPUs for the same QPS, and the 15ms P99 increase may reduce or erase the target CTR lift.
  common_mistake: |
    **The Pitfall:** Focusing solely on statistical significance.
    **The Rationale:** Candidates often approach experiments purely as data scientists, ignoring the computational burden of heavy models.
    **The Consequence:** They approve an experiment that introduces severe infrastructure cost multipliers and ignores the conversion penalty of the added latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline fleet: 20 L4s for 5,000 QPS, or 250 QPS/GPU.
    - Test traffic: 20% of 5,000 QPS = 1,000 QPS.
    - New model requires 4x inference FLOPs, so assume 4x GPUs for the same QPS.
    - Treat the 15ms latency-to-CTR impact as a risk estimate that must be measured, not a universal constant.

    **Calculations:**
    - Baseline capacity for 1,000 QPS = 1,000 / 250 = 4 L4s.
    - New model capacity for 1,000 QPS = 4 * 4 = 16 L4s.
    - Two-week GPU cost = 16 GPUs * 336 hrs * $0.75/hr = $4,032, before engineering and rollback overhead.
    - If the team's measured latency sensitivity is 0.01% CTR per ms, 15ms could reduce CTR by ~0.15%.
    - Net detectable lift would fall from 0.50% to ~0.35%; sample size scales roughly with 1 / effect^2, so (0.50 / 0.35)^2 ≈ 2x more traffic or time.

    **Conclusion & Interpretation:**
    - **Result: do not proceed as requested (Latency-and-Capacity-Bound).** The 20% test may need about 16 L4s and, if latency hurts CTR, roughly twice the originally planned exposure. Shadow, optimize, or use a more sensitive experiment before committing production traffic.
