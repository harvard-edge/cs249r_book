title: 'TCO Mastery: Build vs Buy Decision for LLM Training Infrastructure'
scenario: Calculate the annual electricity cost for a 256-GPU cluster running continuously. Each GPU draws 700W, electricity costs $0.08/kWh, and datacenter PUE is 1.3.
question: What is the correct annual power cost for a 256-GPU cluster at 700W per GPU, $0.08/kWh, and PUE 1.3?
details:
  realistic_solution: |
    The annual power cost is 256 GPUs * 0.7 kW/GPU * 8760 hours/year * $0.08/kWh * 1.3 PUE = $163,258.37 per year, or about $163.3K/year. This is only the electricity component of TCO, not the full build-vs-buy decision.
  common_mistake: |
    **The Pitfall:** Comparing total CapEx vs rental without normalizing to actual utilization and miscalculating power by an order of magnitude.
    **The Rationale:** Candidates often forget that the build option may be dramatically over-provisioned if the cluster sits idle between training runs, and easily make a 10x math error in the power cost calculation.
    **The Consequence:** Recommending a $30M CapEx build for a cluster that will sit largely idle, resulting in millions of dollars in wasted capital.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs at 700W (0.7 kW) each.
    - Energy cost: $0.08/kWh.
    - Datacenter PUE: 1.3.
    - Annual uptime: 8760 hours.

    **Calculations:**
    - Base power: 256 * 0.7 kW = 179.2 kW.
    - Annual energy: 179.2 kW * 8760 hr = 1,569,792 kWh.
    - Raw energy cost: 1,569,792 kWh * $0.08/kWh = $125,583.36.
    - Total power cost with PUE: $125,583.36 * 1.3 = $163,258.37.

    **Conclusion & Interpretation:**
    - **Result: $163.2K/yr (TCO-Bound)**. The annual power cost must be factored into the build-vs-buy model.
