title: The Fleet Update Cost Dilemma
scenario: 'You are the ML Systems Engineer for an autonomous vehicle company with a fleet of 10,000 cars. Your team needs to roll out a critical monthly update to the perception model, which is packaged as a 4 GB container image. You are evaluating two cloud providers for distributing this update: Provider A charges $0.09 per GB of data egress. Provider B offers a flat-rate CDN plan at $1,000/month for unlimited egress.'
question: Which provider should you choose?
details:
  realistic_solution: 'Calculate the total data egress required for the entire fleet and then compare costs. Total egress = 10,000 * 4 GB = 40 TB. At $0.09/GB, Provider A costs $3,600/month. Provider B''s flat rate of $1,000/month is 3.6x cheaper.'
  common_mistake: |
    **The Pitfall:** Misjudging the scale of the operation by forgetting to multiply the image size by the fleet size.
    **The Rationale:** It's easy to focus on the cost per GB and the 4 GB file size while neglecting the multiplier effect of 10,000 vehicles.
    **The Consequence:** Making a massively expensive choice by opting for pay-per-GB pricing at fleet scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 10,000 cars.
    - Image size: 4 GB.
    - Provider A cost: $0.09/GB.
    - Provider B cost: $1,000/month flat.

    **Calculations:**
    - Total egress per month: 10,000 * 4 GB = 40,000 GB (40 TB).
    - Provider A: 40,000 GB * $0.09/GB = $3,600/month.
    - Breakeven point: $1,000 / $0.09 = 11,111 GB (~2,778 cars).

    **Conclusion & Interpretation:**
    - **Result: 2,778 Cars Breakeven (Cost-Bound)**. Provider B is $2,600 cheaper per month, as flat-rate scales infinitely better for large fleet rollouts.
  options:
  - "$36,000 via Provider A, making Provider B the cheaper option."
  - "$0.36 via Provider A, as you only pay for the 4 GB image once."
  - "$3,600 via Provider A, meaning Provider B's $1,000/month flat-rate plan is significantly cheaper."
  - "$5,000 via Provider B, because flat-rate plans are designed for and are always superior for large-scale rollouts."
