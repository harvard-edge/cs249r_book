title: Evaluating Custom Serving Engine ROI
scenario: Your startup recently spent $2.5M training a custom 70B parameter LLM on a cluster of 1,024 H100 GPUs. The business team wants to deploy the model immediately to serve a projected 1,000 queries per second (QPS) with an average output length of 1,024 tokens. The engineering team proposes delaying the launch by 3 months to develop a highly optimized inference engine leveraging custom speculative decoding, which they claim will double token throughput per node compared to the off-the-shelf vLLM baseline.
question: Is a 3-month delay to build a 2x-throughput inference engine financially justified at 1,000 QPS and 1,024 output tokens?
details:
  realistic_solution: Treat the prompt's 1,024 tokens as output generation demand, so the served load is about 1.024M output tokens/sec before adding any prefill/input-token budget. Using an explicit planning baseline of 10K output tokens/sec per 8xH100 node at $30/hr, the deployment needs about 103 nodes. Doubling throughput reduces that to about 52 nodes, saving roughly $13.4M/year. The 3-month delay is justified only if the business opportunity cost of waiting is below the expected savings; one quarter of the annual infrastructure savings is about $3.35M. If real benchmarked throughput or cloud pricing differs, the ROI should be recomputed.
  common_mistake: |
    **The Pitfall:** Focusing purely on the $2.5M training cost as the primary expense.
    **The Rationale:** Arguing that time-to-market is paramount and ignoring long-term operational expenditures (OpEx).
    **The Consequence:** Completely missing that inference compute costs at 1,000 QPS will eclipse the entire training cost within weeks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Demand modeled here is output generation only: 1,000 QPS * 1,024 output tokens = 1,024,000 output tokens/sec.
    - Prefill/input tokens, KV-cache limits, batching, and latency SLOs are excluded and would need a separate capacity model.
    - Planning baseline for this exercise: one 8xH100 node yields ~10,000 output tokens/sec for this 70B model under the off-the-shelf engine.
    - Cost baseline for this exercise: $30/hr per 8xH100 node, so annual cost per node = $30/hr * 8760 hrs = $262,800/year.

    **Calculations:**
    - Baseline nodes needed: 1,024,000 / 10,000 = 102.4 -> 103 nodes.
    - Baseline annual cost: 103 nodes * $262,800 = $27.07M/year.
    - Optimized capacity: 20,000 tokens/sec -> 1,024,000 / 20,000 = 51.2 -> 52 nodes.
    - Optimized annual cost: 52 nodes * $262,800 = $13.67M/year.
    - Annual savings: $27.07M - $13.67M = $13.40M/year; three months of savings is about $3.35M.

    **Conclusion & Interpretation:**
    - **Result: ~$13.4M/year savings under the stated output-only baseline (Cost-Bound)**. A 3-month delay is financially justified only if the launch-delay opportunity cost is less than the expected savings, with ~$3.35M as the three-month infrastructure-savings benchmark.
