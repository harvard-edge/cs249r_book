title: TTFT and TPOT for the 20th Output Token
scenario: You are operating a chatbot service backed by a 7B parameter LLM. The prefill phase takes a fixed 150ms, and the time per output token (TPOT) is 30ms.
question: How long until the user receives the 20th output token with 150ms prefill and 30ms TPOT?
details:
  realistic_solution: 'Use the convention that the 30ms TPOT is the time for each output-token decode step, including the first token. TTFT is therefore prefill plus one decode step: 150ms + 30ms = 180ms. The 20th output token arrives after 20 decode steps total, so the latency is 150ms + 20 * 30ms = 750ms. That corresponds to option 2, 750ms.'
  common_mistake: |
    **The Pitfall:** Calculating token times without acknowledging prefill, or missing the boundary condition.
    **The Rationale:** Engineers compute just the generation loop (20 * 30ms) completely ignoring the mandatory prompt processing step upfront.
    **The Consequence:** Providing drastically optimistic latency estimates that fail immediately upon deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prefill = 150ms.
    - TPOT = 30ms per output-token decode step, including the first token.
    - Target = 20 total tokens.

    **Calculations:**
    - First token arrival, or TTFT, = 150ms + 1 * 30ms = 180ms.
    - The 20th token requires 20 decode steps total.
    - Total = prefill + 20 * TPOT = 150ms + 20 * 30ms = 750ms.

    **Conclusion & Interpretation:**
    - **Result: Total Latency = 750ms (Sequential Token Generation)**. Bottleneck: Sequential Token Generation.
  options:
    - 600ms
    - 180ms
    - 750ms
    - 780ms
  correct_index: 2
