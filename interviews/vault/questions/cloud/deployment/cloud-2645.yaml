title: Scoring a Production ML System
scenario: A team has automated training pipeline (1 pt), model unit tests (1 pt), data schema validation (1 pt), but no feature monitoring (0 pt), no fairness tests (0 pt), no data drift detection (0 pt), no canary deployment (0 pt), no slice-level evaluation (0 pt). They pass 8 of 28 total tests.
question: "What is the team's ML Test Score, and how long will it take to reach a production-ready score of 20?"
details:
  realistic_solution: 'Current ML Test Score: 8/28 = 0.286 (29%). Production-ready target: 20/28 = 0.714 (71%). Gap: 12 tests to implement. Category breakdown of the gap: Data monitoring = 3 tests, ~2 weeks each. Model quality = 3 tests, ~2 weeks each. Infrastructure = 3 tests, ~3 weeks each. Monitoring = 3 tests, ~1 week each. Total estimated time: 24 engineer-weeks ≈ 6 months with one dedicated ML platform engineer.'
  common_mistake: |
    **The Pitfall:** Treating all 28 tests as equally important.
    **The Rationale:** Candidates fail to prioritize data and monitoring tests that catch silent data degradation.
    **The Consequence:** The team spends months building CI/CD while ignoring critical production data shifts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current score: 8/28 tests. Target score: 20/28 tests.
       - Gap: 12 tests.
       - Implementation time: ~2 weeks per test.
    2. **Calculations:**
       - Total engineer-weeks required: 12 tests × 2 weeks/test = 24 engineer-weeks.
       - Time with 1 engineer: 24 weeks ≈ 6 months.
       - Time with 2 engineers: 12 weeks ≈ 3 months.
    3. **Conclusion & Interpretation:** **It will take 24 engineer-weeks to pay down the MLOps infrastructure debt. Result: Engineering-Time-Bound.**
