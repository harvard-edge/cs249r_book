title: 'TCO Specification: Design Cost-Optimal Inference for SLO'
scenario: 'Specify the minimum-cost H100 inference configuration for LLaMA-65B (FP16: 4 H100s/pod, INT4: 1 H100/pod) with SLO: P99 under 2s, P50 under 500ms, and throughput at least 1000 tokens/s. Each FP16 pod delivers 500 tok/s at $10/hr (4 GPUs). Each INT4 pod delivers 800 tok/s at $2.50/hr. Pure INT4 fleets miss latency targets at peak load (P50 650ms, P99 2.4s), while any fleet with at least one FP16 pod can route latency-sensitive requests to meet P50 450ms and P99 1.8s.'
question: What is the minimum-cost fleet mix of FP16 and INT4 pods to meet the throughput and latency SLOs, and what is its cost?
details:
  realistic_solution: 'The cheapest throughput-only answer is 2 INT4 pods: 1600 tok/s for $5/hr. It is not feasible because the scenario states pure INT4 fleets miss both latency targets at peak load (P50 650ms and P99 2.4s). Feasible fleets therefore need at least one FP16 pod. One FP16 pod alone provides only 500 tok/s, so the cheapest feasible addition is one INT4 pod. The minimum-cost valid mix is 1 FP16 pod plus 1 INT4 pod, delivering 1300 tok/s and meeting the routed latency targets of P50 450ms and P99 1.8s for $12.50/hr. The next simple feasible alternative, 2 FP16 pods, costs $20/hr for only 1000 tok/s, so the hybrid mix is cheaper.'
  common_mistake: |
    **The Pitfall:** Choosing purely on throughput-per-dollar without verifying that INT4 quantization meets the latency SLO.
    **The Rationale:** Candidates often assume that because INT4 pods are cheaper per token, a homogeneous INT4 fleet is optimal, ignoring that quantization adds dequantization overhead.
    **The Consequence:** The resulting fleet fails the P99 latency SLO during peak load.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLO target: P99 < 2s, P50 < 500ms, throughput >= 1000 tokens/s.
    - Pure INT4 fleets fail latency at peak load: P50 650ms and P99 2.4s.
    - Fleets with at least one FP16 pod can route latency-sensitive requests and meet P50 450ms and P99 1.8s.

    **Calculations:**
    - Pure INT4 throughput candidate: 2 INT4 pods = 2 * 800 = 1600 tok/s at 2 * $2.50 = $5/hr, but it is infeasible because P50 and P99 both miss the SLO.
    - One FP16 pod alone: 500 tok/s at $10/hr, infeasible because throughput is below 1000 tok/s.
    - Hybrid candidate: 1 FP16 pod + 1 INT4 pod = 500 + 800 = 1300 tok/s at $10 + $2.50 = $12.50/hr. Latency is feasible by the routed FP16 path.
    - FP16-only candidate: 2 FP16 pods = 1000 tok/s at 2 * $10 = $20/hr. Feasible but more expensive than the hybrid.

    **Conclusion & Interpretation:**
    - **Result: 1 FP16 pod + 1 INT4 pod is the minimum-cost feasible fleet at $12.50/hr.**
