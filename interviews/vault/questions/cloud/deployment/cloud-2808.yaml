title: Pipeline Parallel 7B Serving over PCIe Gen3
scenario: You need to build a low-cost serving pipeline for a 7B model using older GPUs. The model weights barely fit in a single GPU's VRAM, limiting the maximum sequence length.
question: How would you design a pipeline parallel serving architecture to maximize throughput and minimize latency for a 7B model?
details:
  realistic_solution: 'Implement a continuous-batching Pipeline Parallel (PP=2) architecture across two GPUs connected via PCIe Gen3. Split the transformer layers equally after profiling stage latency, not just by layer count, and keep INT8 weights to leave room for KV cache and workspace on each 16GB GPU. Use a scheduler with separate prefill and decode queues: admit larger prefill micro-batches when the queue is deep, cap decode batch size for latency-sensitive requests, and drain oldest requests first to bound tail latency. Overlap the single pipeline-boundary hidden-state transfer with compute, but keep micro-batches small enough that queueing delay does not erase the latency benefit. This maximizes throughput by continuous batching while preserving latency through admission control and batch-size caps.'
  common_mistake: |
    **The Pitfall:** Using Tensor Parallelism (TP) over PCIe instead of Pipeline Parallelism (PP).
    **The Rationale:** Candidates default to TP because it is standard on NVLink-connected H100s, ignoring the slow PCIe Gen3 interconnect on older hardware.
    **The Consequence:** The synchronous all-reduce operations required for every layer in TP over PCIe catastrophically bottleneck the system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model in INT8 = 7 GB.
       - Hardware: 16 GB VRAM, PCIe Gen3 (16 GB/s).
       - PP=2 distributes the load across 2 GPUs.
    2. **Calculations:**
       - PP=2 uses about 3.5 GB of weights per GPU, leaving roughly 12 GB per GPU for KV cache and runtime workspace after allocator overhead.
       - Per-token boundary activation for batch=32 and hidden_size=4096 in FP16 is 32 * 4096 * 2 bytes ≈ 262 KB.
       - Transfer time over PCIe Gen3 x16: 262 KB / 16 GB/s ≈ 16 microseconds per pipeline boundary transfer, before software overhead.
       - For a generated sequence of 100 tokens, the raw boundary traffic is about 26 MB, which is small compared with PCIe capacity; latency depends on kernel scheduling and pipeline bubbles rather than the bulk bytes alone.
    3. **Conclusion & Interpretation:** **Result: PCIe Transfer Is Small but Not Automatically Free.** PP=2 is reasonable on PCIe because it avoids per-layer TP all-reduces, and micro-batching can overlap the boundary activation transfer when compute per stage is larger than the transfer plus launch overhead.
