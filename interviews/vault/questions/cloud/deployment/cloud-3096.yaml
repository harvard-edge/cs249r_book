title: 'TCO Analyze: Why Cloud GPUs May Be Cheaper Than On-Prem for Startups'
scenario: Analyze the TCO break-even point between renting H100 GPUs at $2.50/hr on
  AWS and purchasing an on-premises H100 cluster (8-GPU DGX H100 system, $400,000).
  Assume 3-year amortization, 40% average utilization, power at $0.10/kWh, and 1 FTE
  for maintenance at $150K/year. At what utilization does cloud become cheaper?
question: At what utilization does cloud become cheaper?
details:
  realistic_solution: 'Hardware purchase never breaks even under these parameters. The break-even utilization is 172%, meaning you would need to run the hardware 1.72x continuously (which is physically impossible) to justify the purchase. Cloud is significantly cheaper at the expected 40% utilization.'
  common_mistake: Comparing only hardware cost vs rental cost without including power,
    cooling (typically 1.1-1.4x PUE overhead), real estate, networking, and staff
    costs in the on-prem TCO.
  napkin_math: 'Cloud cost: 8 GPUs × $2.50/hr = $20/hr. On-prem fixed annual cost: ($400,000/3 yrs) + $150,000 FTE = $283,333/yr. On-prem variable cost: DGX H100 ~10kW × 1.2 PUE = 12kW × $0.10/kWh = $1.20/hr. Break-even hours = Fixed / (Cloud/hr - On-prem/hr) = 283,333 / (20 - 1.20) = 15,070 hours/yr. Since a year has 8,760 hours, break-even utilization is 15,070 / 8,760 = 172%. At the expected 40% utilization (3,504 hours/yr), cloud costs ~$70k/yr while on-prem costs ~$287k/yr.'
