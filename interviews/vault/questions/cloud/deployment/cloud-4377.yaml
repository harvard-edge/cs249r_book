title: 'MI300X for Mixture-of-Experts: Expert Capacity and Memory Layout'
scenario: 'A Mixtral 8×7B MoE model has 8 experts, each 7B parameters, with top-2 routing (2 experts activated per token). Full model size: 8 × 14GB (FP16) = 112GB. On an H100 (80GB), this requires 2-GPU tensor parallel to hold the model. On a single MI300X (192GB), the full model fits with 80GB spare.'
question: What serving configuration should you use for Mixtral 8×7B on H100 versus MI300X, and what decode throughput should each deliver?
details:
  realistic_solution: |
    Use expert parallelism rather than treating Mixtral like a dense 112GB model. On H100, place four experts on each of two 80GB GPUs, with dense/shared layers replicated or lightly tensor-parallel as needed. Tokens whose top-2 experts span GPUs require an activation exchange, but the payload is activations, not a full gradient or expert-weight AllReduce. On MI300X, keep all eight experts on one 192GB GPU and avoid cross-GPU routing. For a simple upper-bound decode estimate, assume large-batch serving is dominated by streaming the two active FP16 experts: 2 * 7B * 2 bytes = 28GB/token. Balanced H100 expert parallelism streams about half of that per GPU, so the bottleneck estimate is 3350GB/s / 14GB = 239 tokens/s before routing overhead. MI300X streams the full 28GB locally, giving 5300GB/s / 28GB = 189 tokens/s. These are bandwidth-ceiling estimates; real throughput also depends on batch size, router balance, dense-layer cost, kernel efficiency, and activation exchange.
  common_mistake: |
    **The Pitfall:** Treating MoE serving the same as dense model serving.
    **The Rationale:** Candidates ignore expert routing overhead and forget that inactive expert weights occupy memory without contributing to compute.
    **The Consequence:** Overestimating effective FLOPs/byte and miscalculating TP configurations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Top-2 routing activates 2 of 8 experts per token.
    - Active expert weight traffic upper bound: 2 * 7B * 2 bytes = 28GB/token.
    - H100 design: 2-GPU expert parallelism, four experts per GPU, about 14GB/token per GPU when routing is balanced.
    - MI300X design: single GPU holds all 112GB of experts, about 28GB/token local expert traffic.

    **Calculations:**
    - H100 bandwidth ceiling: 3350 GB/s / 14GB per token = 239 tok/sec for the 2-GPU service before routing and dense-layer overhead.
    - MI300X bandwidth ceiling: 5300 GB/s / 28GB per token = 189 tok/sec before dense-layer and kernel overhead.
    - Cross-GPU H100 routing moves activation tensors, not expert weights; for hidden size 8192 and FP16, activation payload is about 16KB/token, small compared with expert-weight traffic but still latency-sensitive at small batch.
    - Cost per million tokens using the ceilings: MI300X = $5.50 / (189 * 3600) * 1M = $8.08; H100 pair = $7.00 / (239 * 3600) * 1M = $8.13.

    **Conclusion & Interpretation:**
    - **Result: MoE expert-placement tradeoff.** H100 expert parallelism has the higher bandwidth ceiling, while single-GPU MI300X avoids cross-GPU routing and is roughly comparable on cost per token. Treat the numbers as serving ceilings, not guaranteed benchmark throughput.
