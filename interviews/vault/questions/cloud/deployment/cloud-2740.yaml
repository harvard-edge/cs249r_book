title: Technical Debt Reduction Strategy
scenario: 'Your ML platform has severe technical debt: pipeline jungles, configuration sprawl, and no data lineage tracking. Leadership gives you 6 months and 4 engineers. Options: (A) full rewrite from scratch, (B) incremental strangler pattern migration, (C) focus only on adding observability without refactoring.'
question: 'Should the team choose a full rewrite, strangler migration, or observability-only for the 6-month debt effort, and why?'
details:
  realistic_solution: 'Option B (Strangler Pattern) is the superior architectural choice. Full rewrites (Option A) face Second-System Syndrome and require dual-maintenance, virtually guaranteeing failure with only 4 engineers. Option C treats symptoms without removing the structural debt. The Strangler Pattern iteratively wraps and replaces the highest-debt components. It delivers continuous, de-risked value; if the timeline expires, you retain partial architectural improvements rather than an unfinished prototype.'
  common_mistake: |
    **The Pitfall:** Choosing the full rewrite (Option A).
    **The Rationale:** Engineers routinely underestimate the hidden complexity of legacy systems and overestimate their ability to build a flawless replacement quickly.
    **The Consequence:** The rewrite takes 3x longer than estimated, the old system degrades further, and the project is ultimately abandoned.
  napkin_math: |
    **Assumptions & Constraints:**
    - 6-month timeline, 4 engineers.

    **Calculations:**
    - Option A: Requires maintaining 2 systems (100% overhead). High risk.
    - Option B: Delivers value monthly, yielding ~60% measurable debt reduction.
    - Option C: Yields ~20% visibility improvement, 0% structural fix.

    **Conclusion & Interpretation:**
    - **Result: Option B maximizes ROI while minimizing deployment risk (Execution-Bound).**
