title: Model Cache Hit Rate and Latency Impact
scenario: 'A serving platform has 80GB GPU VRAM. Model sizes: 50 small models (500MB each), 10 medium models (4GB each), 2 large models (20GB each). Traffic: 60% to small, 30% to medium, 10% to large.'
question: With 80GB VRAM and an LRU strategy proportional to traffic, how many models of each size fit, and what hit rate and average latency result?
details:
  realistic_solution: Allocate VRAM proportional to traffic (48GB small, 24GB medium, 8GB large). Small models only need 25GB (50 exist), so remaining budget loads 8 medium and 1 large model. Hit rate is 89%. However, if the miss penalty is 5 seconds and hit latency is 20ms, the 11% miss rate dominates the average latency profile.
  common_mistake: |
    **The Pitfall:** Celebrating an 89% cache hit rate as a system success.
    **The Rationale:** Wrongly applying standard web caching intuition (where an 89% hit rate is excellent) to ML model serving.
    **The Consequence:** Ignoring the immense model loading latency penalty, meaning the 11% miss rate utterly dominates and ruins the average user latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - VRAM: 80GB. Traffic Split: 60% small, 30% medium, 10% large.
       - Loaded: 50 small (25GB), 8 medium (32GB), 1 large (20GB). Total: 77GB.
       - Latency: Hit = 20ms, Miss Penalty = 5000ms.
    2. **Calculations:**
       - Hit Rate: 60%(1.0) + 30%(0.8) + 10%(0.5) = 60% + 24% + 5% = 89%.
       - Miss Rate: 11%.
       - Average Latency: (0.89 * 20ms) + (0.11 * 5000ms) = 17.8ms + 550ms = 567.8ms.
    3. **Conclusion & Interpretation:**
       - **Result: Miss-Penalty Bound.** The system average latency is 567.8ms. The massive 5-second IO penalty for model swapping renders the high hit rate irrelevant.
