title: Model Cache Hit Rate and Latency Impact
scenario: 'A serving platform has 80GB GPU VRAM. Model sizes: 50 small models (500MB each), 10 medium models (4GB each), 2 large models (20GB each). Traffic: 60% to small, 30% to medium, 10% to large.'
question: With 80GB VRAM and cache space allocated roughly proportional to traffic, how many models of each size fit, and what hit rate and average latency result?
details:
  realistic_solution: |
    Allocate the 80GB cache roughly proportional to traffic, then use unused space where a class has fewer models than its allocation requires. A 60/30/10 split gives 48GB for small, 24GB for medium, and 8GB for large. All 50 small models fit in 25GB, leaving 23GB unused from the small allocation. Medium models get 24GB, enough for 6 of 10 medium models. The remaining 23GB plus the 8GB large allocation can hold 1 large model (20GB), leaving 11GB unused because a second large model would need another 20GB. Loaded cache: 50 small, 6 medium, 1 large, using 25GB + 24GB + 20GB = 69GB. Assuming traffic is uniform within each size class, hit rate = 60% * 50/50 + 30% * 6/10 + 10% * 1/2 = 83%. If hit latency is 20ms and miss latency is 5000ms, average latency = 0.83 * 20ms + 0.17 * 5000ms = 866.6ms, so misses dominate despite a high hit rate.
  common_mistake: |
    **The Pitfall:** Celebrating an 83% cache hit rate as a system success.
    **The Rationale:** Wrongly applying standard web caching intuition, where a high hit rate can be excellent, to ML model serving.
    **The Consequence:** Ignoring the immense model loading latency penalty, meaning the 17% miss rate utterly dominates and ruins the average user latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - VRAM: 80GB. Traffic Split: 60% small, 30% medium, 10% large.
       - Cache allocation target: 60% small, 30% medium, 10% large.
       - Latency: Hit = 20ms, Miss Penalty = 5000ms.
    2. **Calculations:**
       - Small allocation target: 80GB * 60% = 48GB. All 50 small models fit: 50 * 0.5GB = 25GB.
       - Medium allocation target: 80GB * 30% = 24GB. Medium models loaded: 24GB / 4GB = 6 models.
       - Large allocation target plus unused small space: 8GB + (48GB - 25GB) = 31GB. Large models loaded: floor(31GB / 20GB) = 1 model.
       - Loaded total: 25GB + 24GB + 20GB = 69GB. The remaining 11GB cannot fit another 20GB large model.
       - Hit Rate: 60% * (50/50) + 30% * (6/10) + 10% * (1/2) = 60% + 18% + 5% = 83%.
       - Miss Rate: 17%.
       - Average Latency: (0.83 * 20ms) + (0.17 * 5000ms) = 16.6ms + 850ms = 866.6ms.
    3. **Conclusion & Interpretation:**
       - **Result: Miss-Penalty Bound.** The system average latency is 866.6ms. The 5-second load penalty makes the 17% miss rate dominate user latency.
