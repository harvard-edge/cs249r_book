title: The Structured Pruning Recovery Budget
scenario: You structurally prune 30% of attention heads and 25% of FFN intermediate dimensions from a 13B LLM, reducing it to ~9B effective parameters. Perplexity increases from 6.2 to 8.1. You fine-tune on 10B tokens and recover to 6.8 — but your target is 6.4 or better. Your manager asks whether more fine-tuning data will close the gap, or whether you pruned too aggressively.
question: How do you determine if more data will close the gap or if you pruned too much, and how do you systematically set the ratio?
details:
  realistic_solution: |
    Treat this as a recovery-curve diagnosis, not a yes/no guess. Continue the current pruning ratio only if perplexity is still improving at a useful slope near 10B tokens and extrapolates toward 6.4. If the curve from recent checkpoints has flattened well above 6.4, the pruned architecture has likely hit a capacity floor and more data is unlikely to close the gap. To set the ratio systematically, run a small grid of pruning ratios and token budgets: for example lighter, current, and heavier pruning, each evaluated after short and medium fine-tuning budgets. Compare immediate damage, recovery slope, and final plateau. Choose the most aggressive ratio whose recovery curve is still on track to meet 6.4 with the available fine-tuning budget. The key evidence is the shape of the curve and ablations by pruning ratio, not a fixed universal pruning threshold.
  common_mistake: |
    **The Pitfall:** Throwing more data at the problem without diagnostic analysis.
    **The Rationale:** Engineers often assume that more fine-tuning will always help, or conversely guess that they pruned too much, without a principled framework.
    **The Consequence:** Wasting hundreds of GPU-hours on blind fine-tuning runs that fail to recover accuracy because the model's structural capacity has been fundamentally broken.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline perplexity: 6.2; target after pruning recovery: <= 6.4.
       - Current pruned model: 8.1 immediately after pruning, 6.8 after 10B fine-tuning tokens.
       - Checkpoints are available at multiple token counts and pruning ratios.
    2. **Calculations:**
       - Remaining gap at 10B tokens = 6.8 - 6.4 = 0.4 perplexity.
       - If recent checkpoints show material improvement, e.g. 7.0 at 8B tokens to 6.8 at 10B tokens, the slope is 0.1 perplexity per 1B tokens; reaching 6.4 would need roughly 4B more tokens if the slope holds.
       - If recent checkpoints are flat, e.g. 6.82 at 8B tokens to 6.80 at 10B tokens, the slope is 0.01 perplexity per 1B tokens; reaching 6.4 would need about 40B more tokens and the plateau suggests the extrapolation is unreliable.
       - A lighter-pruning ablation that reaches <=6.4 at the same token budget indicates the current 30%/25% pruning point is too aggressive for the target.
    3. **Conclusion & Interpretation:**
       - **Result: Curve-Diagnosis Required.** More data is justified only if the recovery slope is still strong enough to plausibly reach 6.4; plateauing curves and better lighter-pruning ablations indicate a capacity-limited pruning ratio.
