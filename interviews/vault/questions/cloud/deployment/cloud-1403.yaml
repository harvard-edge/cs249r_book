title: Imperative Scheduling Topology Constraints
scenario: 'An LLM training team submits an imperative scheduling request for 64 GPUs, strictly specifying an exact topology of 8 physical nodes with 8 GPUs each to maximize intra-node NVLink bandwidth. The cluster telemetry reports 100 idle GPUs currently distributed evenly across 25 nodes (4 idle GPUs per node).'
question: 'Why does the 64-GPU job stay Pending even though 100 GPUs are idle?'
details:
  realistic_solution: 'Imperative schedulers directly allocate exactly what is requested without altering the workload''s specified shape. Because the user explicitly required 8 GPUs per node, and the maximum available on any single node is 4, zero nodes qualify. The job is blocked by cluster fragmentation.'
  common_mistake: |
    **The Pitfall:** Assuming the scheduler will automatically partition the 64-GPU request across 16 partially idle nodes (4 GPUs each).
    **The Rationale:** Candidates conflate elastic/declarative workloads with imperative scheduling, failing to realize imperative managers rigidly enforce exact hardware topology constraints.
    **The Consequence:** The job remains permanently blocked in Pending state, and the cluster wastes 100 idle GPUs due to severe fragmentation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Request: 8 nodes, exactly 8 GPUs per node (64 total).
       - Cluster Availability: 25 nodes, exactly 4 idle GPUs per node (100 total).
    2. **Calculations:**
       - Scheduler Check: Does any node have ≥ 8 idle GPUs? No (4 < 8).
       - Qualified Nodes: 0.
    3. **Conclusion & Interpretation:**
       - **Result: Topology-Fragmentation-Bound. Despite having 100 idle GPUs, the rigid imperative scheduler rejects the job because zero nodes satisfy the 8-GPU structural constraint.**
