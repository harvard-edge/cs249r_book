title: Scheduling for Heterogeneous GPU Clusters
scenario: 'Your cluster has 3 GPU types: 32x H100 (80 GB, 989 TFLOPS BF16), 16x MI300X (192 GB, 1.3 PFLOPS BF16), and 64x A100 (80 GB, 312 TFLOPS BF16).'
question: How would you design a heterogeneous scheduler to maximize throughput-per-dollar across H100, MI300X, and A100 GPUs for a mixed workload of LLM training, inference, and fine-tuning?
details:
  realistic_solution: 'Design the scheduler around measured throughput per dollar, not fixed affinity constants. (1) Classify each job from declared needs and short profiling runs: required HBM, precision support, interconnect sensitivity, latency target, batch shape, and checkpoint/preemption tolerance. (2) Maintain per-GPU-type benchmark records for each workload class: tokens/sec, jobs/sec, latency, memory headroom, failure rate, and actual hourly price. (3) Score feasible placements as measured throughput divided by hourly cost, with penalties for queue delay, SLA risk, fragmentation, and cross-node communication. (4) Place memory-heavy long-context inference on GPUs with enough HBM when that avoids tensor parallelism; place FP8-capable training/fine-tuning on hardware where measured speedup offsets cost; place flexible and small jobs on the cheapest GPU type meeting the SLO. (5) Add fallback rules: after a bounded wait, allow the next-best feasible type if the throughput-per-dollar
    loss is acceptable; checkpoint/preempt lower-priority flexible work for urgent inference. Accounting should charge actual GPU-hours at actual prices, optionally reported with workload-normalized efficiency, rather than converting TFLOPS ratios into cost equivalents.'
  common_mistake: |
    **The Pitfall:** Implementing simple priority queuing across all GPU types without affinity.
    **The Rationale:** Candidates might treat all GPUs as generic compute resources without recognizing their distinct architectural advantages.
    **The Consequence:** Placing a memory-bound workload on a compute-optimized GPU (wasting its capabilities) or vice-versa, destroying fleet-wide cost efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Scheduler objective: maximize measured throughput per dollar.
    - Each candidate placement has measured throughput and actual hourly GPU price.
    - A placement is feasible only if it satisfies memory, precision, topology, and SLO constraints.

    **Calculations:**
    - Placement score = measured job throughput / actual dollars per hour, after feasibility filters.
    - Example: if H100 gives 1.8x the tokens/sec of A100 but costs 2.2x as much, A100 has better throughput per dollar for that job.
    - If MI300X avoids tensor parallelism for a long-context inference job, compare its measured single-GPU throughput per dollar against the measured multi-GPU H100/A100 alternatives.
    - Queue and SLA penalties lower the score for placements that would miss latency or deadline targets.

    **Conclusion & Interpretation:**
    - **Result: choose the feasible GPU type with the best measured throughput per dollar for each workload class**. The scheduler should learn from profiling data instead of relying on theoretical TFLOPS ratios alone.
