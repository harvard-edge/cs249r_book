title: Kubernetes Pod Placement and Resource Allocation for Large Language Model Training on NVIDIA H100s
scenario: You are tasked with deploying a distributed training job for a large language model (LLM) on a Kubernetes cluster with NVIDIA H100 nodes. The LLM requires a total of 8 H100 GPUs for optimal training performance and memory footprint.
question: How would you configure Kubernetes pods, GPU resources, and node affinity for an 8-H100 distributed LLM training job?
details:
  realistic_solution: 'Utilize the NVIDIA k8s-device-plugin to expose `nvidia.com/gpu` resources. Define a single-node Pod or Job worker requesting `nvidia.com/gpu: 8`; Kubernetes can only satisfy that request on one node, so the target node must actually advertise 8 allocatable GPUs. Enforce locality with `nodeAffinity` or `nodeSelector` labels that identify 8-H100 NVLink nodes, and use tolerations for GPU-tainted nodes. If the job must span nodes, do not rely on one pod request: run multiple workers with explicit distributed training configuration, rendezvous, and topology-aware scheduling.'
  common_mistake: |
    **The Pitfall:** Requesting `nvidia.com/gpu: 8` without specifying node topology constraints.
    **The Rationale:** Assuming Kubernetes schedules GPU resources contiguously by default.
    **The Consequence:** Pods may be spread across multiple nodes or stuck pending, leading to network-bottlenecked inter-node communication and severely degraded performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - The training worker requires 8 H100 GPUs in one process group.
    - Candidate node A advertises 8 allocatable GPUs; node B advertises 4.
    - Kubernetes GPU requests are allocated within a single node for one pod.

    **Calculations:**
    - Pod request: `nvidia.com/gpu: 8`.
    - Node A feasibility: 8 requested <= 8 allocatable, so the pod can be placed there if labels, taints, and other resources match.
    - Node B feasibility: 8 requested > 4 allocatable, so the pod remains pending rather than being split across two 4-GPU nodes.
    - For multi-node training, use 2 pods x 4 GPUs or similar, with the training framework configured for distributed ranks and networking.

    **Conclusion & Interpretation:**
    - **Result: Placement-bound.** The key check is allocatable GPU count and topology labels, not peak HBM bandwidth; spanning nodes requires an explicit distributed job design.
