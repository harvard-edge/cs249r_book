title: The Model Cascade Routing Decision
scenario: 'You serve a customer support chatbot with a 3-tier model cascade: a 1B model ($0.0002/request, 85% accuracy), a 7B model ($0.002/request, 93% accuracy), and a 70B model ($0.02/request, 98% accuracy). Your traffic is 100K requests/day.'
question: What routing strategy achieves 95% effective accuracy while minimizing cost?
details:
  realistic_solution: Choose the predictive router policy rather than routing everything to 70B. A naive cascade keeping 60% of queries at 1B (with 85% accuracy on that slice), 25% at 7B (93% accuracy), and 15% at 70B (98% accuracy) yields only 89.0% effective accuracy, so it misses the target. The selected policy is a lightweight router that assigns about 35% of requests to 1B, 35% to 7B, and 30% to 70B based on query complexity. Under the stated slice accuracies, it achieves 0.35 × 0.92 + 0.35 × 0.95 + 0.30 × 0.98 = 0.9495, approximately the 95% target, at much lower cost than sending all requests to 70B.
  common_mistake: |
    **The Pitfall:** Relying purely on sequential cascading or routing everything to the largest model.
    **The Rationale:** Engineers assume confidence scores from tiny models are reliable enough for routing, or they simply throw money at the problem by relying solely on the 70B model.
    **The Consequence:** They suffer massive tail latencies from re-running queries or burn through budget needlessly ($2,000/day vs $400/day).
  napkin_math: |
    **Assumptions & Constraints:**
    - 100K requests/day.
    - Model costs: 1B=$0.0002, 7B=$0.002, 70B=$0.02, Router=$0.00005 ($5/100K).
    - Target effective accuracy: 95%.
    **Calculations:**
    - All 70B: 100K * $0.02 = $2,000/day.
    - Naive cascade (60/25/15): cost = $12 + $50 + $300 = $362/day; accuracy = 0.60*0.85 + 0.25*0.93 + 0.15*0.98 = 88.95%, about 89.0%.
    - Predictive router (35K/35K/30K): cost = $7 + $70 + $600 + $5 router = $682/day.
    - Effective accuracy: (35K*0.92 + 35K*0.95 + 30K*0.98)/100K = 94.95%, effectively meeting a 95% target.
    **Conclusion & Interpretation:**
    - Threshold tuning reaches the 95% target for about $682/day, a 66% cost reduction versus routing all traffic to the 70B model.
