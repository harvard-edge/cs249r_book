title: Global Gateway Rollback Impact Calculation
scenario: An active-active multi-region inference gateway routing 20,000 global requests/sec deploys a flawed model version that increases P99 latency by 500ms. An automated rollback is triggered. Global load balancer routing updates take 45 seconds to fully propagate. Once propagated, the regional API gateways take 60 seconds to linearly drain existing connections from the bad model instances.
question: How many requests experience degraded latency during the 45-second routing propagation and 60-second linear drain rollback?
details:
  realistic_solution: Account for both the static delay period (100% traffic) and the linear drain period (average 50% traffic) to find the total sum of impacted requests.
  common_mistake: |
    **The Pitfall:** Only calculating the drain period and forgetting the static routing propagation delay.
    **The Rationale:** Candidates often overlook DNS or BGP propagation times, or they calculate the drain period at 100% traffic instead of computing the integral (average 50%) of a linear drain.
    **The Consequence:** Severely underestimating the blast radius of a failed deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global traffic: 20,000 requests/sec.
    - Propagation Phase: 45 seconds.
    - Linear Drain Phase: 60 seconds.

    **Calculations:**
    - Propagation Phase Impact: 45s * 20,000 req/s = 900,000 requests.
    - Linear Drain Phase Impact: 60s * (20,000 req/s / 2) = 600,000 requests.
    - Total Degraded: 900,000 + 600,000 = 1,500,000 requests.

    **Conclusion & Interpretation:**
    - **Result: 1.5M Requests Degraded (System Reliability).** 1,500,000 requests experience degraded latency during the rollback.
