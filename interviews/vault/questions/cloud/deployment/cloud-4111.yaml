title: MIG Partitioning for Inference Multiplexing
scenario: You have 4 A100-80GB GPUs and need to serve 12 different small models (each <7B parameters, ~14 GB in FP16).
question: How would you use MIG to partition 4 A100-80GB GPUs to run 12 concurrent <7B model instances with isolation?
details:
  realistic_solution: 'Use a supported A100-80GB MIG layout that creates three 2g.20gb instances per GPU. Across 4 GPUs, that yields 12 isolated 20 GB model slots. This is appropriate only if each <7B model is quantized or otherwise profiled to fit comfortably within 20 GB including weights, runtime overhead, and KV cache; a full 7B FP16 model may be too tight in practice. The scheduler should place one model server per 2g.20gb MIG device and reject placements whose measured memory headroom is unsafe. Key benefits: hardware memory isolation, separate CUDA device contexts, and reduced cross-model interference. Tradeoff: throughput per model is lower than on a full GPU, and the actual performance share must be validated for the model rather than treated as a fixed 2/7 rule.'
  common_mistake: |
    **The Pitfall:** Assuming MIG can create arbitrary partition sizes.
    **The Rationale:** Treating GPU partitioning like standard container memory requests.
    **The Consequence:** Attempting to specify invalid configurations that the A100 hardware does not support.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 GPUs, 3 MIG instances (2g.20gb) per GPU.

    **Calculations:**
    - 4 GPUs × 3 MIG instances = 12 instances.
    - Each instance exposes a 20 GB MIG device; 12 model servers require 12 such devices.
    - Memory fit must be verified against total runtime footprint, not just FP16 weight size.

    **Conclusion & Interpretation:**
    - **Result: 12 isolated model slots using supported 2g.20gb MIG devices**. This satisfies the concurrency goal if profiling confirms each model fits within 20 GB with safe headroom.
