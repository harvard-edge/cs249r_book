title: The RAG Fleet Update Bill
scenario: You are the systems engineer for a fleet of 10,000 autonomous vehicles. Each uses a RAG system with a static 7B parameter LLM and a vector index. You need to push a monthly Over-the-Air update that refreshes the vector index. The compressed vector index payload is 500 MB.
question: What total data egress is billed to push a 500 MB vector index update to 10,000 vehicles?
details:
  realistic_solution: The key is to multiply the size of the update payload by the number of devices in the fleet. The size of the 7B LLM is a distractor, as the scenario specifies only the vector index is being updated. This is a common and efficient strategy; updating a data artifact (the RAG index) is much cheaper than re-deploying a full multi-gigabyte model.
  common_mistake: |
    **The Pitfall:** Calculating cost for a single device, or using the massive LLM size instead of the payload size.
    **The Rationale:** Engineers either forget to multiply by the fleet size scale, or confuse the core model artifacts with the mutable data index in RAG systems.
    **The Consequence:** Operational costs are either underestimated by orders of magnitude, or overestimated so severely that the business kills the update feature.
  napkin_math: |
    - **Per-Device Payload:** $500\text{ MB}$ (Static 7B LLM is not transferred).
    - **Fleet Multiplier:** $10,000\text{ vehicles} \times 500\text{ MB/vehicle} = 5,000,000\text{ MB}$.
    - **Conversion:** $5,000,000\text{ MB} / 1,000\text{ MB/GB} = 5,000\text{ GB} = 5\text{ TB}$.
    - **Conclusion:** **Total data egress is 5 TB.**
  options:
  - '500 MB (Misconception: Calculates for a single device, ignoring the fleet)'
  - '140 TB (Misconception: Calculates using the 14GB model size instead of the 500MB index size)'
  - 5 TB
  - '50 TB (Misconception: Unit conversion or arithmetic error)'
  correct_index: 2
