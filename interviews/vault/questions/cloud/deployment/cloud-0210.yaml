title: The Rate Limiting Design
scenario: Our LLM API rate-limits users to 100 requests per minute. A power user sends 100 requests, each
  with a 50,000-token prompt and requesting 4,000 output tokens. A casual user sends 100 requests with
  100-token prompts and 50 output tokens. Both hit the same rate limit, but one costs 1,000x more GPU
  time.
question: How do you design a fair rate limiter?
details:
  realistic_solution: Implement token-based rate limiting with separate budgets for input tokens (prefill
    cost) and output tokens (decode cost). Each user gets a token budget per time window (e.g., 1M input
    tokens + 100K output tokens per minute). This aligns rate limiting with actual resource consumption.
    Weight input and output tokens differently because prefill is compute-bound (cheaper per token at
    high batch sizes) while decode is memory-bandwidth-bound (expensive per token regardless of batch
    size).
  common_mistake: '**The Pitfall:** Using standard request-based rate limiting.

    **The Rationale:** Candidates assume "all requests are equal," ignoring the massive variance in resource
    consumption. A request with 50K input tokens consumes ~500x more prefill compute and ~80x more decode
    compute than a 100-token request.

    **The Consequence:** Request-count rate limiting lets heavy users subsidize their costs with the same
    limits as light users, monopolizing the GPU and degrading latency.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Prefill requires 140 GFLOPs per token at 989 TFLOPS.

    - Decode requires loading 140 GB weights from HBM at 3.35 TB/s (at BS=1).

    - Power user requests 50K input + 4K output tokens 100 times, casual user requests 100 input + 50
    output tokens 100 times.


    **Calculations:**

    - Prefill cost per token: 0.14ms/token.

    - Decode cost per token: 42ms/token.

    - Power user prefill: 100 * 50,000 * 0.14ms = 700 seconds.

    - Power user decode: 100 * 4,000 * 42ms = 16,800 seconds.

    - Casual user prefill: 100 * 100 * 0.14ms = 1.4 seconds.

    - Casual user decode: 100 * 50 * 42ms = 210 seconds.

    - Cost ratio: (700 + 16,800) / (1.4 + 210) = 83x more GPU time.


    **Conclusion:** A token-based limit of 500K input tokens/min and 50K output tokens/min accurately
    and fairly restrains the power user to ~10 requests while allowing the casual user all 100.'
