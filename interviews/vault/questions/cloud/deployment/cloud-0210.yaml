title: Token-Based Rate Limiting for LLM APIs
scenario: Our LLM API rate-limits users to 100 requests per minute. A power user sends 100 requests, each with a 50,000-token prompt and requesting 4,000 output tokens. A casual user sends 100 requests with 100-token prompts and 50 output tokens. Both hit the same rate limit, but one costs 1,000x more GPU time.
question: How do you design a fair rate limiter?
details:
  realistic_solution: Implement token-based rate limiting with separate budgets for input tokens (prefill cost) and output tokens (decode cost). Each user gets a token budget per time window (e.g., 1M input tokens + 100K output tokens per minute). This aligns rate limiting with actual resource consumption. Weight input and output tokens differently because prefill is compute-bound (cheaper per token at high batch sizes) while decode is memory-bandwidth-bound (expensive per token regardless of batch size).
  common_mistake: |
    **The Pitfall:** Using standard request-based rate limiting.
    **The Rationale:** Candidates assume "all requests are equal," ignoring the massive variance in resource consumption. A request with 50K input tokens consumes ~500x more prefill compute and ~80x more decode compute than a 100-token request.
    **The Consequence:** Request-count rate limiting lets heavy users subsidize their costs with the same limits as light users, monopolizing the GPU and degrading latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use accounting units rather than exact wall-clock GPU time.
    - Charge 1 unit per input token for prefill.
    - Charge 10 units per output token for decode because decode is harder to batch and repeatedly touches model state/KV cache.
    - Power user requests 50K input + 4K output tokens 100 times, casual user requests 100 input + 50 output tokens 100 times.

    **Calculations:**
    - Power user input tokens: 100 * 50,000 = 5,000,000.
    - Power user output tokens: 100 * 4,000 = 400,000.
    - Power user weighted units: 5,000,000 + 10 * 400,000 = 9,000,000 units.
    - Casual user input tokens: 100 * 100 = 10,000.
    - Casual user output tokens: 100 * 50 = 5,000.
    - Casual user weighted units: 10,000 + 10 * 5,000 = 60,000 units.
    - Weighted cost ratio: 9,000,000 / 60,000 = 150x.
    - Raw token ratio: (5,000,000 + 400,000) / (10,000 + 5,000) = 360x, showing why request counts are misleading even before output weighting.

    **Conclusion & Interpretation:**
    - **Result: Request Limits Are Not Fair.** Use separate input-token and output-token budgets, optionally converted into weighted cost units. A budget such as 500K input tokens/min and 50K output tokens/min allows the casual user's 100 requests while limiting the power user to about 10 long-prompt requests or 12 high-output requests.
