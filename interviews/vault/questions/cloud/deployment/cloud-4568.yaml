title: Dynamic Batching Configuration for A100 SLA
scenario: You deploy a ResNet-152 image classifier on a single A100 80GB. Max throughput is bottlenecked by kernel launch overhead at batch size 1.
question: Apply dynamic batching configuration (batch size and timeout) assuming incoming requests arrive at 100 req/sec and SLA latency is 50 ms.
details:
  realistic_solution: A 100 req/sec rate implies an inter-arrival time of 10 ms. Set the max batch size to 4 and wait timeout to ~30 ms. This guarantees that inference starts within 40 ms at most, keeping the end-to-end processing within the strict 50 ms SLA.
  common_mistake: |
    **The Pitfall:** Setting a large batch size with no timeout, causing low-traffic periods to trigger massive latency spikes.
    **The Rationale:** This mistake focuses on the surface symptom instead of the governing ML-systems constraint.
    **The Consequence:** The resulting design, estimate, or diagnosis can miss the real bottleneck and lead to incorrect deployment decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use the quantities and constraints stated in the scenario.

    **Calculations:**
    10ms * 4 = 40ms < 50ms

    **Conclusion & Interpretation:**
    - The calculation identifies the limiting systems constraint for this question.
