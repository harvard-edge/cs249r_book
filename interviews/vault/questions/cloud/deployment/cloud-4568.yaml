title: Dynamic Batching Configuration for A100 SLA
scenario: You deploy a ResNet-152 image classifier on a single A100 80GB. Max throughput
  is bottlenecked by kernel launch overhead at batch size 1.
question: Apply dynamic batching configuration (batch size and timeout) assuming incoming
  requests arrive at 100 req/sec and SLA latency is 50 ms.
details:
  realistic_solution: A 100 req/sec rate implies an inter-arrival time of 10 ms. Set
    the max batch size to 4 and wait timeout to ~30 ms. This guarantees that inference
    starts within 40 ms at most, keeping the end-to-end processing within the strict
    50 ms SLA.
  common_mistake: Setting a large batch size with no timeout, causing low-traffic
    periods to trigger massive latency spikes.
  napkin_math: 10ms * 4 = 40ms < 50ms
