title: Optimizing Retraining Interval for E-Commerce
scenario: 'An e-commerce recommendation model generates $50,000 in daily revenue. The model''s accuracy degrades over time, causing a revenue drop of $200 per day for each day the model is stale (Day 1: $0 loss, Day 2: $200 loss, Day 3: $400 loss, etc.). Retraining the model requires 20 hours on a compute instance, costing exactly $1,000.'
question: What retraining interval minimizes average daily compute plus staleness cost for the recommendation model?
details:
  realistic_solution: 'Model the total cost as the sum of the fixed retraining cost and the cumulative quadratic staleness cost, then find the interval that minimizes the average daily cost.'
  common_mistake: |
    **The Pitfall:** Retraining daily to maximize accuracy.
    **The Rationale:** Candidates assume that avoiding any performance degradation is optimal, completely ignoring the massive fixed compute cost of daily retraining.
    **The Consequence:** The candidate spends $1,000 daily to prevent a $200 revenue loss, destroying the system's ROI.
  napkin_math: |
    **Assumptions & Constraints:**
    - Retraining cost: $1,000.
    - Daily staleness penalty: $200 x t.

    **Calculations:**
    - Cumulative Staleness: 100 x T^2.
    - Average Daily Cost = (1000 + 100 T^2) / T = 1000/T + 100T.
    - Derivative: -1000/T^2 + 100 = 0.
    - T^2 = 10, T =~ 3.16.

    **Conclusion & Interpretation:**
    - **Result: ~3 days (ROI-Bound)**. The optimal retraining interval is roughly 3 days.
