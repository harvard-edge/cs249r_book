title: The Compound System Tail Latency Amplification
scenario: Your compound AI pipeline has 5 serial stages, each with P50=20ms, P90=50ms, P99=200ms. The product team asks for an end-to-end P99 under 500ms. A junior engineer claims that since each stage's P99 is 200ms and the budget is 500ms, two stages hitting their P99 will still fit within the budget.
question: Is the junior engineer's P99 analysis correct, and what should you do to meet the 500ms P99 target?
details:
  realistic_solution: |
    The junior engineer's reasoning is not correct. Percentiles from serial stages are not directly additive, and the exact end-to-end P99 cannot be computed from only each stage's P50/P90/P99. It depends on the full latency distributions and correlations between stages. What the given data does show is that tail risk compounds: if stages were independent, about 1-(0.99)^5 = 4.9% of requests would have at least one stage above its per-stage P99 threshold. To manage the 500ms target, measure or model the full E2E distribution, reduce the slowest stage tails, parallelize independent stages, propagate deadlines so late stages degrade gracefully, and use hedged requests for critical-path calls.
  common_mistake: |
    **The Pitfall:** Adding P99 latencies of individual stages to estimate the end-to-end P99.
    **The Rationale:** Engineers assume percentiles are directly additive, completely failing to understand the joint probability distributions of sequential events.
    **The Consequence:** The system is massively over-engineered to lower individual stage latencies, wasting engineering effort on an E2E latency that already meets the 500ms SLA statistically.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 serial stages.
    - Each stage has P50=20ms, P90=50ms, P99=200ms.
    - Target E2E P99 = 500ms.
    - Full distributions and stage correlations are not provided.

    **Calculations:**
    - Under independence, P(all 5 stages are below their own P99 threshold) = 0.99^5 = 0.951.
    - Therefore, about 4.9% of requests would have at least one stage above 200ms.
    - This proves tail events are common somewhere in the pipeline, but it does not determine the 99th percentile of the sum.
    - Bounds from the marginals alone are loose; a defensible E2E P99 requires sampled traces, histograms, or an explicit latency model.

    **Conclusion & Interpretation:**
    - **Result: Distribution-Bound**. The junior engineer's percentile argument is invalid, and the exact E2E P99 is under-specified from the given summaries. Instrument the full pipeline and reduce or bypass tail-heavy stages to meet the 500ms target.
