title: Continuous Deployment VRAM Constraints
scenario: You are designing a continuous deployment pipeline for a 15GB CTR prediction model serving 100,000 QPS across a fleet of 150 NVIDIA L4 (24GB VRAM) instances. The model is continuously trained on fresh user data and needs to be deployed to production every 4 hours.
question: Which deployment strategy should you use for 15GB CTR model updates on 24GB L4s to avoid OOMs and P99 latency spikes?
details:
  realistic_solution: Evaluate a phased Canary rollout at the node level. By provisioning 10% new nodes (15 instances) equipped with the new model, warming them up, and gradually shifting traffic before decommissioning old nodes, you maintain safe VRAM limits and control infrastructure costs.
  common_mistake: |
    **The Pitfall:** Recommending an in-place hot-swap of the model weights.
    **The Rationale:** Candidates assume model weights can be seamlessly swapped in memory like standard software binaries, forgetting the additive memory requirements of holding two models during the transition.
    **The Consequence:** The deployment process crashes the 24GB GPUs with OOM errors, causing a massive production outage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old model VRAM: 15GB.
    - New model VRAM: 15GB.
    - GPU capacity: 24GB (L4).
    **Calculations:**
    - Single resident model headroom: 24GB - 15GB = 9GB before runtime overhead.
    - In-place hot-swap VRAM needed: 15GB + 15GB = 30GB, which exceeds 24GB by 6GB before runtime overhead.
    - A 10% canary phase duplicates serving capacity on separate nodes: 150 * 0.1 = 15 extra L4 instances, each running only one 15GB model.
    **Conclusion & Interpretation:**
    - **Result: Use node-level canary or Blue/Green rollout.** The OOM avoidance comes from never co-loading old and new 15GB models on the same 24GB GPU; the 15 extra L4 instances are capacity overhead for a 10% canary phase, not proof that hot-swapping is safe.
