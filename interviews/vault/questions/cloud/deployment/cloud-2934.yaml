title: 'Fluency: Translating a PyTorch DDP Job into a Kubernetes Manifest'
scenario: A researcher hands you a `torchrun --nproc_per_node=8 --nnodes=4 --rdzv_backend=c10d train.py` launch command. They need it translated into a production Kubernetes manifest using the Training Operator's `PyTorchJob` CRD.
question: How would you translate the 4-node, 8-GPU-per-node torchrun command into a Training Operator PyTorchJob manifest?
details:
  realistic_solution: |
    Use a `kubeflow.org/v1` `PyTorchJob` with `spec.pytorchReplicaSpecs` and separate the node count from per-node GPU count. Define a `Master` replica with `replicas: 1`, `restartPolicy: OnFailure`, and a container that requests/limits `nvidia.com/gpu: 8`. Define `Worker` with `replicas: 3`, `restartPolicy: OnFailure`, the same 8-GPU resource request, and the same training image/command. The world size is still 32 GPUs, but the replica count is 4 pods total, not 4 workers plus a master. Put accelerator placement under each replica template, e.g. `spec.pytorchReplicaSpecs.Worker.template.spec.affinity.nodeAffinity`, and pass `--nproc_per_node=8`, `--nnodes=4`, and `--rdzv_backend=c10d` in the container command or training args. Do not rely on a blanket claim that the operator supplies every `torchrun` environment variable; specify the PyTorchJob replica layout and rendezvous settings explicitly.
  common_mistake: |
    **The Pitfall:** Manually constructing StatefulSets with custom rendezvous init containers.
    **The Rationale:** Engineers unfamiliar with the Training Operator assume they must manually replicate the `torchrun` distributed logic in raw Kubernetes primitives.
    **The Consequence:** A fragile, overly complex deployment that fails to handle fault tolerance or native environment variable injection correctly.
  napkin_math: |
    **Assumptions & Constraints:**
    - The torchrun command requests 4 nodes and 8 processes per node.
    - In a PyTorchJob, one pod maps to one node-level replica in this design.

    **Calculations:**
    - Total GPUs = 4 * 8 = 32.
    - Replica layout = 1 Master pod + 3 Worker pods = 4 pods.
    - GPU request per pod = 8, so aggregate GPU request = 4 pods * 8 GPUs/pod = 32 GPUs.

    **Conclusion & Interpretation:**
    - **Result: Manifest Mapping Confirmed.** The CRD should encode 4 total replicas with 8 GPUs each, using `spec.pytorchReplicaSpecs.<role>.restartPolicy` and per-role pod templates.
