title: 'The Vector Index Staleness Window'
scenario: 'Your RAG-powered customer support system uses a nightly batch job to re-index updated knowledge base articles into a vector database. A new product launches at 9 AM with updated documentation, but the RAG system keeps citing the old product specs all day. Users are frustrated.'
question: 'What is the systems root cause, and what architectural pattern solves it?'
details:
  realistic_solution: 'The root cause is batch-indexed vector databases have an inherent staleness window equal to the indexing interval (24 hours in this case). Unlike a keyword index (which can update in seconds), HNSW indexes require expensive graph reconnection on insert. The fix: implement a hybrid architecture with a (1) bulk HNSW index for the stable corpus rebuilt nightly, and (2) a real-time flat/IVF index for documents modified in the last 24 hours. At query time, search both indexes and merge results. The real-time index is small enough (<10K docs) that brute-force or IVF search is fast. Alternatively, use a vector DB that supports streaming inserts (e.g., Milvus, Weaviate) with background compaction.'
  common_mistake: |
    **The Pitfall:** Blaming the embedding model or retrieval quality.
    **The Rationale:** Thinking the model is hallucinating or failing to understand the query.
    **The Consequence:** Spending weeks tuning prompts or fine-tuning models when the issue is purely an indexing staleness window.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nightly rebuild of 5M docs HNSW index takes ~2 hours.
    - Real-time flat search on 500 changed docs: 500 * 1536 dims * 2 FLOPs = 1,536,000 FLOPs.

    **Calculations:**
    - At modern CPU speeds, 1.536 MFLOPs takes <1ms.

    **Conclusion & Interpretation:**
    - **Result: <1ms latency penalty (Compute-Bound)**. Combining HNSW base search with an exhaustively searched real-time delta reduces staleness from 24h to seconds.
