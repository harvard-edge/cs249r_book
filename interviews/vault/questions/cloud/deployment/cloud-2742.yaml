title: Training vs Serving GPU Split
scenario: 'Your ML platform serves 10 models. Training: each model retrains weekly for 8 hours on 8 GPUs. Serving: average 1,000 QPS total, each query takes 10ms on 1 GPU.'
question: What minimum GPU allocation is required for training and serving at a 70% utilization target?
details:
  realistic_solution: 'Training: 10 models * 8 GPUs * 8 hours/week = 640 GPU-hours/week. Spread over 168 hours/week: 640/168 = 3.8 GPUs average. At a 70% utilization target: 3.8/0.7 = 5.4 -> 6 GPUs by average utilization. However, each retraining job requires 8 GPUs in parallel, so the minimum usable training allocation is 8 GPUs. Serving: 1,000 QPS * 10ms/query = 10 GPU-seconds per second = 10 GPUs at 100% utilization. At 70% target: 10/0.7 = 14.3 -> 15 GPUs for serving. Total: 8 (training) + 15 (serving) = 23 GPUs minimum. Key insight: serving dominates (65% of GPUs) despite training being burstier because the training floor is set by job shape while serving is set by always-on steady-state capacity.'
  common_mistake: |
    **The Pitfall:** Not accounting for utilization targets or minimum job sizing.
    **The Rationale:** Calculating raw 100% capacity needs, which leaves no headroom for bursts, maintenance, or parallel execution constraints.
    **The Consequence:** Severe production bottlenecks where queues explode during daily peaks because the fleet runs too hot.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70% utilization target.
       - Minimum parallel batch of 8 GPUs for training.
    2. **Calculations:**
       - Training by Utilization: 640 GPU-hrs/wk averages 640 / 168 = 3.8 GPUs. At 70% util: 3.8 / 0.7 = 5.4 -> 6 GPUs.
       - Training by Job Shape: each training job needs 8 GPUs in parallel, so the allocation floor is 8 GPUs.
       - Serving Baseline: 1,000 QPS * 10ms = 10 GPUs constantly active.
       - Serving Capacity (70%): 10 / 0.7 = 14.3 -> 15 GPUs.
       - Total Capacity: 8 (Training) + 15 (Serving) = 23 GPUs.
    3. **Conclusion & Interpretation:**
       **23 GPUs total.** Training needs 6 GPUs by utilization but 8 GPUs by minimum parallel job size; serving needs 15 GPUs.
