title: Multi-Node Training Job Orchestration in K8s
scenario: 'You need to run a 64-GPU PyTorch DDP training job across 8 Kubernetes nodes (8 GPUs each) using MI300X GPUs. You must evaluate three orchestration approaches: (A) raw Kubernetes Deployment, (B) Kubeflow PyTorchJob, (C) LeaderWorkerSet.'
question: Which orchestration approach is most appropriate for the multi-node PyTorch job and why?
details:
  realistic_solution: '(B) Kubeflow PyTorchJob is recommended. It creates a CRD with master and worker specs, automatically setting MASTER_ADDR, MASTER_PORT, WORLD_SIZE, and RANK for each pod. It uses a headless Service for DNS-based discovery and properly handles restart semantics (if one worker fails, all workers are restarted). For MI300X, ensure ROCm container images are used and the PyTorchJob spec requests `amd.com/gpu: 8` per pod.'
  common_mistake: |
    **The Pitfall:** Using a raw Kubernetes Deployment for distributed ML workloads.
    **The Rationale:** Treating ML jobs like generic stateless microservices due to familiarity.
    **The Consequence:** Deployments provide no master-worker coordination, resulting in random pod naming and a failure to handle distributed semantics properly (e.g., if one worker dies, the job hangs indefinitely).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8 nodes, 8 GPUs/node = 64 GPUs.
       - Framework: PyTorch DDP.
    2. **Calculations:**
       - Pod Count: 1 master + 7 workers = 8 total pods.
       - GPU Count: 8 pods * 8 GPUs/pod = 64 total GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Automated Coordination.** Kubeflow PyTorchJob automatically injects `MASTER_ADDR=worker-0.svc`, `WORLD_SIZE=64`, and explicit `RANK` assignments, eliminating manual environment variable orchestration.
