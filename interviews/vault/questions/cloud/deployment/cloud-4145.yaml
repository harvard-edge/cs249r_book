title: GPU Operator vs Manual Driver Management in K8s
scenario: 'You are comparing two approaches for managing NVIDIA drivers and tooling in a Kubernetes GPU cluster: (A) pre-installing drivers on the host OS of each node, or (B) using the NVIDIA GPU Operator.'
question: What does the GPU Operator manage that manual installation does not?
details:
  realistic_solution: 'Manual installation (A): install NVIDIA driver on host OS, install nvidia-container-toolkit, deploy device plugin DaemonSet, deploy DCGM exporter separately, manually configure MIG, manually update drivers (requires node drain and reboot). Works but is fragile: driver version mismatches between nodes, manual update process, no self-healing. GPU Operator (B): deploys as a single Helm chart and manages: (1) NVIDIA driver (as a container or pre-installed detection), (2) nvidia-container-toolkit, (3) NVIDIA device plugin, (4) DCGM exporter (GPU metrics for Prometheus), (5) GPU Feature Discovery (labels nodes with GPU model, driver version, CUDA version, MIG capability), (6) MIG Manager (reconfigures MIG profiles via CRD without manual SSH), (7) Node Feature Discovery integration, (8) Validator (runs GPU health checks on node startup). Key advantage: when adding a new bare-metal node to the cluster, the GPU Operator automatically installs drivers and configures everything. No manual SSH needed. The Operator also handles driver upgrades by draining nodes, updating the driver pod, and uncordoning — fully automated. For production: always use GPU Operator. Manual installation only for air-gapped or highly customized environments.'
  common_mistake: |
    **The Pitfall:** Assuming the GPU Operator only handles the primary graphics driver.
    **The Rationale:** Engineers unfamiliar with K8s assume driver operators don't extend past the core OS driver injection.
    **The Consequence:** Teams end up manually managing complex tooling like device plugins, DCGM monitoring, MIG managers, and node discovery, negating the primary benefits of automation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100-node cluster.
    - GPU Operator requires 1 Helm install taking 5 minutes total.

    **Calculations:**
    - Manual setup per node = driver install (10 min) + toolkit (5 min) + config (10 min) = 25 minutes/node.
    - Total manual time = 100 * 25 = 2500 minutes (~42 hours).

    **Conclusion & Interpretation:**
    - **Result: ~42 hours vs the automated 5 minutes (Operational Scaling)**. Bottleneck: Operational Scaling.
