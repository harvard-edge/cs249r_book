title: Technical Debt Maintenance Cost
scenario: Your 10-engineer ML platform team spends 80% of time on maintenance at $200K/engineer/year. A 3-month refactoring project (3 engineers full-time) promises to reduce maintenance burden to 50%.
question: What is the refactoring break-even point and annual savings, and should the team prioritize it?
details:
  realistic_solution: 'Current state: 10 engineers * $200K * 80% = $1.6M/year on maintenance. Available for features: $400K/year equivalent. Refactoring cost: 3 engineers * $200K * (3/12) = $150K. During the 3-month refactor, only 7 engineers remain for maintenance and feature work, so the team must tolerate a temporary execution slowdown. Post-refactoring: 10 engineers * $200K * 50% = $1.0M/year on maintenance. Available for features: $1.0M/year equivalent. Annual steady-state savings: $1.6M - $1.0M = $600K/year in freed engineering capacity. Payback after completion: $150K investment / $600K annual return = 0.25 years = 3 months. Because the project itself takes 3 months, net benefit is reached about 6 months from project start. This is a strong ROI if the team can absorb the temporary maintenance burden, so the refactoring should be prioritized.'
  common_mistake: |
    **The Pitfall:** Ignoring the opportunity cost of the refactoring period.
    **The Rationale:** Candidates calculate raw monetary savings but forget that executing the project temporarily pulls engineers away from active feature work.
    **The Consequence:** Presenting an incomplete ROI model that fails to account for the increased maintenance burden on the remaining 7 engineers during the 3-month refactor phase.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 engineers at $200K/yr.
       - Current Burden: 80%. Target: 50%.
       - Project: 3 engineers for 3 months.
    2. **Calculations:**
       - Maintenance Savings: (0.80 - 0.50) * 10 * 200K = $600K/yr.
       - Refactor Cost: 3 * 200K * (3/12) = $150K.
       - Payback After Completion: 150 / 600 = 0.25 years = 3 months.
       - Timeline From Start: 3 months implementation + 3 months payback = 6 months.
       - Operational Constraint: 7 engineers cover maintenance during the refactor, so the ROI assumes the team can absorb that short-term burden.
    3. **Conclusion & Interpretation:**
       - **Result: Capital-Bound ROI.** Steady-state savings are $600K/year; the project pays back 3 months after completion, or about 6 months from project start.
