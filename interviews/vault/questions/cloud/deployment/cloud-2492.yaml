title: OTA Model Patching for Flash Constraints
scenario: You push daily 200KB model updates to devices with 512KB Flash. Firmware occupies 250KB. A standard dual-bank OTA requires 650KB, exceeding limits.
question: How would you deliver updates without needing dual-bank Flash?
details:
  realistic_solution: Design a Cloud-to-Edge diffing architecture with single-bank safety metadata. The cloud computes a small signed binary weight delta patch, and the device downloads it in chunks into a small staging area with a manifest, checksum, target-version marker, and boot-safe rollback flag. The device verifies each chunk before applying it to inactive pages or recoverable segments of the existing model, commits the new version only after full-image verification passes, and keeps enough metadata to resume or reject a partial update after power loss.
  common_mistake: |
    **The Pitfall:** Overwriting the active model in-place without an A/B bank.
    **The Rationale:** Candidates attempt to solve constraints by deleting the old model during download.
    **The Consequence:** Completely bricking the device if network or power drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 KB total Flash.
    - Firmware occupies 250 KB, leaving 512 KB - 250 KB = 262 KB for model storage, patch staging, metadata, and rollback markers.
    - A full dual-bank image would require 650 KB, which cannot fit.
    - Patch safety budget: 15 KB patch + 4 KB manifest/checkpoints + 8 KB scratch/rollback metadata = 27 KB.

    **Calculations:**
    - Daily model image size: 200 KB.
    - Sparse-encoded patch size: ~15 KB.
    - Single-bank safe-update overhead: 15 KB + 4 KB + 8 KB = 27 KB.
    - Fit check for patch staging and rollback metadata: 27 KB < 262 KB available outside firmware.
    - The device must not blindly overwrite active pages; it applies verified chunks only to recoverable pages or an inactive segment and commits only after the full-image hash passes.

    **Conclusion & Interpretation:**
    - **Result: A 27 KB safe patch budget fits within the 262 KB non-firmware Flash budget, while a 650 KB dual-bank OTA does not (Storage-Bound).** Diffing plus chunked staging can avoid dual-bank Flash only when paired with manifests, integrity checks, and rollback metadata.
