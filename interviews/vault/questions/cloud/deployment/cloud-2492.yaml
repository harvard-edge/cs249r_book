title: OTA Model Patching for Flash Constraints
scenario: You push daily 200KB model updates to devices with 512KB Flash. Firmware occupies 250KB. A standard dual-bank OTA requires 650KB, exceeding limits.
question: How would you deliver updates without needing dual-bank Flash?
details:
  realistic_solution: Design a Cloud-to-Edge diffing architecture. The cloud computes a small binary weight delta patch. The device applies the patch to the existing model in a rolling fashion via a small SRAM staging area.
  common_mistake: |
    **The Pitfall:** Overwriting the active model in-place without an A/B bank.
    **The Rationale:** Candidates attempt to solve constraints by deleting the old model during download.
    **The Consequence:** Completely bricking the device if network or power drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - 512 KB total Flash.
    - Firmware occupies 250 KB, leaving 512 KB - 250 KB = 262 KB for model storage, patch staging, metadata, and rollback markers.
    - A full dual-bank image would require 650 KB, which cannot fit.

    **Calculations:**
    - Daily model image size: 200 KB.
    - Sparse-encoded patch size: ~15 KB.
    - Fit check for patch staging: 15 KB < 262 KB available outside firmware.
    - The device applies the patch in chunks from the staging area and keeps integrity metadata so it does not need a second full 200 KB model bank.

    **Conclusion & Interpretation:**
    - **Result: A 15 KB patch fits within the 262 KB non-firmware Flash budget, while a 650 KB dual-bank OTA does not (Storage-Bound).** Diffing plus chunked staging avoids requiring dual-bank Flash.
