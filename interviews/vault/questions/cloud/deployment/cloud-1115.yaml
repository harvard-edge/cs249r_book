title: Evaluating Declarative API Sidecar Overheads
scenario: Your team is evaluating a Declarative Deployment API to manage 500 low-traffic classification models on GPUs. The API abstracts orchestration but automatically injects a networking sidecar into every pod to manage scale-to-zero and traffic splitting.
question: Does declarative scale-to-zero justify the per-pod sidecar overhead for 500 low-traffic models, and what trade-off gates adoption?
details:
  realistic_solution: Quantify the sidecar overhead against the GPU savings. For 500 models with 80% idle time, declarative scale-to-zero saves 400 GPUs. The CPU RAM overhead for the remaining 100 active sidecars is trivial. The true design trade-off is whether upstream clients can tolerate the ~10-15s VRAM weight-loading cold start latency when scaling from zero.
  common_mistake: |
    **The Pitfall:** Focusing entirely on the sidecar's memory tax while ignoring cold-start latency.
    **The Rationale:** Engineers often evaluate physical resource overheads (CPU/RAM) as the primary trade-off for sidecars.
    **The Consequence:** Adopting the architecture without verifying if upstream clients can tolerate the ~10-15s VRAM weight-loading cold starts, leading to SLA violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: 500 pods, 80% idle.
       - Hardware: GPU = $0.75/hr.
       - Sidecar: 100 MB CPU RAM per pod.
    2. **Calculations:**
       - Static Cost: 500 * $0.75 = $375/hr.
       - Scaled Cost: 100 * $0.75 = $75/hr.
       - Sidecar RAM Cost: 10 GB total (<$0.10/hr).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Optimization.** The massive $300/hr infrastructure savings dictate adoption, contingent entirely on the upstream services surviving the 10-15s VRAM cold-start penalty.
