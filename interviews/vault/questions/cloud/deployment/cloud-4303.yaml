title: Network Topology for KV Transfer at Scale
scenario: You are deploying a disaggregated serving cluster with 64 prefill H100s and 128 decode MI300Xs
  connected over a two-tier fat-tree InfiniBand network (400 Gbps per link, 2:1 oversubscription at the
  spine). At peak load, 500 requests/s each transfer 384 MB of KV-cache from prefill to decode. Determine
  whether the network is a bottleneck, and design a mitigation if it is.
question: At 500 req/s transferring 384 MB of KV-cache each, is the 400 Gbps 2:1 oversubscribed InfiniBand
  network a bottleneck, and how would you mitigate it?
details:
  realistic_solution: 'Total KV transfer bandwidth demand: 500 req/s × 384 MB = 192 GB/s. With 64 prefill
    nodes uniformly loaded, each sends 3 GB/s, well within the 50 GB/s link rate and 25 GB/s effective
    spine bisection. However, if a single prefill node acts as a hot-spot handling all 500 req/s, it generates
    192 GB/s of egress traffic, exceeding the 50 GB/s link limit by 3.8×. To mitigate this, implement
    load-balancing to ensure max per-node KV egress stays below 40 GB/s.'
  common_mistake: '**The Pitfall:** Assuming full bisection bandwidth is available.

    **The Rationale:** Candidates forget that 2:1 oversubscription halves the effective bandwidth for
    cross-switch traffic.

    **The Consequence:** Designing a network that bottlenecks under load because not all prefill-to-decode
    transfers are local to the same ToR switch.'
  napkin_math: '**Assumptions & Constraints:**

    - 500 req/s, 384 MB each = 192 GB/s total.

    - 64 prefill nodes, 400 Gbps (50 GB/s) per link.

    - 2:1 oversubscription leaves 25 GB/s effective bisection.

    **Calculations:**

    - Average load per node: 192 / 64 = 3 GB/s (Safe, 3 << 25).

    - Hot-spot load (500 req/s to 1 node): 500 * 384 MB/s = 192 GB/s.

    **Conclusion & Interpretation:**

    - **Result:** Network is not a bottleneck under uniform load, but a hot-spot of 500 req/s on a single
    node requires 192 GB/s, drastically exceeding the 50 GB/s link rate.'
