title: GPU Lease Duration and Scheduling Efficiency
scenario: Your MI300X cluster allows job wall times from 1 hour to 7 days. You observe that jobs with 7-day wall times have 15% actual runtime utilization (they finish early but reserved GPUs remain idle).
question: What wall-time policy would improve efficiency when 7-day MI300X jobs only use 15% of their reserved runtime?
details:
  realistic_solution: 'Implement wall time right-sizing and proactive resource reclamation. Track actual runtime distributions per user/job-type and enforce strict time-boxing with automatic requeue. Require job epilog scripts using rocm-smi to verify GPU release. Utilize backfill scheduling to place short workloads in the shadow of long reservations.'
  common_mistake: |
    **The Pitfall:** Simply capping wall times at a short duration.
    **The Rationale:** Administrators think a hard limit will enforce efficiency.
    **The Consequence:** This forces users to implement complex checkpointing and restart logic, increasing job failure rates and reducing user satisfaction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Long-running jobs: 7-day wall time.
    - Actual utilization: 15%.
    - Cluster proportion: 30% of the cluster runs these jobs.

    **Calculations:**
    - Wasted time per 7-day job: 100% - 15% = 85%.
    - Overall cluster waste from these jobs: 30% * 85% = 25.5%.
    - Ideal right-sized allocation: Requested time becomes 15% / 0.85 = 17.6% of original.
    - Recovered capacity cluster-wide: 30% * (100% - 17.6%) = 24.7%.

    **Conclusion & Interpretation:**
    - **Result: ~25% capacity recovered (Scheduling Fragmentation Bottleneck)**. Right-sizing wall times reclaims massive capacity.
