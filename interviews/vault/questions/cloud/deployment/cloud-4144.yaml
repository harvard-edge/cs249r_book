title: Persistent Volume Strategy for Training Checkpoints
scenario: Your 32-GPU Kubernetes training job produces 26 GB checkpoints every 30 minutes. The job runs for 3 days.
question: "How would you configure PersistentVolumes for 26 GB checkpoints every 30 minutes over a 3-day, 32-GPU job?"
details:
  realistic_solution: 'Storage architecture: (1) Checkpoint volume: use ReadWriteMany (RWX) PersistentVolume backed by a parallel filesystem (CephFS, GlusterFS, or cloud equivalent like AWS EFS/FSx for Lustre). All 32 pods mount the same PVC and write their shards concurrently. (2) Alternative: local NVMe + async sync to S3/GCS in the background. (3) Capacity planning: Keep only last 3 checkpoints and archive older ones. (4) StorageClass: set reclaimPolicy=Retain so checkpoints survive pod deletion.'
  common_mistake: |
    **The Pitfall:** Using a ReadWriteOnce (RWO) PVC or standard slow HDD storage.
    **The Rationale:** Standard web application habits, forgetting that distributed training requires all pods to concurrently write their own shards simultaneously.
    **The Consequence:** Only one pod can write at a time (or training completely stalls during slow disk writes), destroying iteration speed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * 26 GB checkpoints every 30 minutes.
       * 60 seconds max allowed blocking time.
       * Duration: 3 days.
    2. **Calculations:**
       * Aggregate Write Speed Demand: 26 GB / 60s = 433 MB/s.
       * Total Capacity Required: 26 GB * 2/hour * 24 hours * 3 days = 3.74 TB.
       * Transfer Time (Parallel FS): 26 GB / 500 MB/s = ~52 seconds.
       * Transfer Time (Slow Storage): 26 GB / 100 MB/s = ~260 seconds.
    3. **Conclusion & Interpretation:** **Result: 433 MB/s Demand (I/O-Bound)**. Slow storage would block training for 4.3 minutes every half hour, heavily justifying the parallel filesystem.
