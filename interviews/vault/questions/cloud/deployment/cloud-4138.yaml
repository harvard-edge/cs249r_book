title: Kubernetes GPU Scheduling with Limits Only
scenario: In Kubernetes, CPU and memory support both 'requests' (scheduling guarantee) and 'limits' (hard cap). GPU resources only support 'limits.' Why this asymmetry, and what does it mean for GPU scheduling?
question: Why this asymmetry, and what does it mean for GPU scheduling?
details:
  realistic_solution: 'GPUs are fundamentally different from CPU/memory: (1) Non-compressible: CPU can be time-shared (a pod using ''less than requested'' still allows other pods to use the slack). A device plugin allocation normally reserves a concrete GPU device or MIG slice for the pod even if utilization is low. (2) No generic overcommit: CPU allows requests < limits, enabling oversubscription. Kubernetes extended resources such as nvidia.com/gpu are normally scheduled as integer limits, and device-plugin implementations typically require the requested and limited device count to match. If you ask for 2 GPUs, the scheduler must place the pod where 2 allocatable devices or MIG instances are available. (3) No native fractional allocation: CPU supports milliCPU, while GPUs need explicit hardware partitioning or a sharing plugin. Implications: GPU bin-packing is coarser, idle allocated GPUs are hard to reclaim, and fractional sharing must be made explicit with MIG, MPS, or time-slicing policy
    rather than inferred from CPU-style requests.'
  common_mistake: |
    **The Pitfall:** Treating nvidia.com/gpu like CPU by setting only resources.requests.
    **The Rationale:** Kubernetes device resources are normally allocated as integer devices through limits, with any sharing or MIG partitioning exposed as explicit allocatable resources.
    **The Consequence:** The pod may fail validation or scheduling, or it may not express the intended GPU allocation policy.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-GPU node serving pods requesting 1 GPU each.

    **Calculations:**
    - Max 8 pods regardless of utilization.
    - With MIG, capacity depends on the GPU SKU and configured profile. Example only: an H100-style 1g.10gb layout with 7 slices/GPU would allow 8 * 7 = 56 one-slice pods.
    - With time-slicing (10 replicas per GPU): max 80 pods.

    **Conclusion & Interpretation:**
    - **Result: GPU bin-packing is strictly bound by whole devices or explicit partitions, unlike CPU milli-cores.**
