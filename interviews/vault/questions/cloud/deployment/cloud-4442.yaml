title: Fault Tolerance for In-Flight Requests During Decode Node Failure
scenario: A decode node fails mid-generation with 200 active requests, each at different token positions (50-1500 tokens generated). The KV cache for these requests is in the failed node's GPU memory.
question: How would you recover the 200 active generations after a decode node failure without restarting them from scratch?
details:
  realistic_solution: 'Implement asynchronous KV cache checkpoints directly into HBM/DRAM or distributed KV stores. Re-prefill is computationally ruinous for long sequences; continuous state replication guarantees millisecond-scale failover.'
  common_mistake: |
    **The Pitfall:** Restarting all 200 requests from scratch (re-prefill).
    **The Rationale:** Candidates opt for the simplest software retry mechanism without considering the accumulated state.
    **The Consequence:** For requests that have already generated 1000+ tokens, re-prefill adds 5-10 seconds of latency and wastes significant GPU-hours, breaking user SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 active requests. Average position: 500 tokens. 70B model.
    - NVMe checkpoint throughput: 7 GB/s. HBM bandwidth: 3.35 TB/s.

    **Calculations:**
    - KV cache size at 500 tokens: 2 (K,V) * 80 layers * 64 heads * 128 dim * 500 * 2 bytes = 1.31 GB per request.
    - Total KV cache for 200 requests: 200 * 1.31 GB = 262 GB.
    - Synchronous NVMe checkpoint time: 262 GB / 7 GB/s = 37.4 seconds (SLA violation).
    - DRAM/HBM checkpoint time: 262 GB / 3.35 TB/s = 0.078 seconds.

    **Conclusion & Interpretation:**
    - **Result: Re-prefill is computationally ruinous; HBM/DRAM checkpointing takes <100ms (Compute-Bound)**. The system prevents a failover cascade via rapid state restoration.
