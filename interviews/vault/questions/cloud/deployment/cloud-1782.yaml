title: Multi-Dimensional Resource Fragmentation and GPU Stranding
scenario: 'You manage a Kubernetes cluster with 50 nodes. Your workloads consist of Job A (Distributed Training: 4 GPUs, 64 CPUs, 512GB RAM) and Job B (Batch Inference: 1 GPU, 24 CPUs, 150GB RAM). Currently, overall GPU utilization is stuck at 50% because pending Job A pods cannot schedule, despite 200+ idle GPUs across the cluster.'
question: Why are Job A pods pending despite 200 idle GPUs, and should you fix it with scheduler bin-packing, re-profiling Job B, or both?
details:
  realistic_solution: 'The pending Job A pods are caused by multi-resource fragmentation: Job B consumes 1 GPU but a heavier share of CPU and RAM than the node''s natural 1 GPU slice. Use a bin-packing scheduler such as MostAllocated to avoid scattering Job B, and re-profile Job B only if measurement shows its 24 CPU / 150GB RAM request is inflated. Do not blindly reduce requests below the workload''s real requirement.'
  common_mistake: |
    **The Pitfall:** Suggesting purely algorithmic scheduling fixes like pod preemption, migration, or defragmentation.
    **The Rationale:** Candidates fail to realize the dimensional imbalance: Job B's CPU/RAM requests are disproportionately high relative to the node's natural resource ratio.
    **The Consequence:** Migration alone will simply shift the problem around, recreating the same "stranded" GPUs on different nodes because the underlying resource exhaustion remains.
  napkin_math: |
    **Assumptions & Constraints:**
       - Node Capacity: 8 GPUs, 128 CPUs, 1024GB RAM (Ratio 1 GPU : 16 CPUs : 128GB RAM).
       - Job A: 4 GPUs, 64 CPUs, 512GB RAM (Ratio 1 GPU : 16 CPUs : 128GB RAM).
       - Job B: 1 GPU, 24 CPUs, 150GB RAM (Mismatched: CPU-heavy and RAM-heavy versus a 1-GPU slice).
    **Calculations:**
       - Node Allocation (4x Job B): consumes 4 GPUs, 96 CPUs, and 600GB RAM.
       - Remaining on Node: 4 GPUs, 32 CPUs, and 424GB RAM.
       - Job A requirement: 4 GPUs, 64 CPUs, and 512GB RAM.
       - The node is short 32 CPUs and 88GB RAM even though it has enough GPUs.
    **Conclusion & Interpretation:**
       - **Result: multi-resource fragmentation.** Bin-packing can reduce fragmentation, but right-sizing Job B is valid only if profiling proves the current CPU/RAM requests are overestimates.
