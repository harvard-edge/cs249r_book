title: The Structured Output Parsing Tax
scenario: You implement a constrained decoding wrapper that forces an LLM to only select tokens valid under your JSON schema. The outputs are now perfect JSON, but the Time-Per-Output-Token (TPOT) has doubled.
question: What is the CPU doing that takes so much time?
details:
  realistic_solution: The bottleneck is CPU-side vocabulary masking. After each GPU forward pass (~15ms), the logits for all 32k tokens are transferred to the CPU (~1ms), where a Python regex engine checks every vocabulary string against the JSON schema grammar to build a valid-token mask (~25ms). This mask is sent back to the GPU for sampling. The CPU parsing of 32k strings takes nearly double the GPU's neural network computation. The fix is to precompile the grammar into a finite-state machine and run the masking on the GPU, eliminating the CPU round-trip entirely.
  common_mistake: |
    **The Pitfall:** Believing the model is doing extra computation to "think" about the JSON structure.
    **The Rationale:** Constrained decoding abstracts away the masking process, making it look like an innate model capability.
    **The Consequence:** Engineers waste time trying to optimize the model weights or prompts instead of fixing the inefficient CPU-side vocabulary masking bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Generation: ~21ms.
       - Interconnect: 32k FP16 logits over PCIe Gen4 (32GB/s).
    2. **Calculations:**
       - Transfer Time: 64KB / 32GB/s = ~2µs.
       - CPU Regex Parsing: ~20ms.
       - Total TPOT: 21ms + 20ms = 41ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU Processing-Bound.** Synchronous host-side parsing essentially halves system throughput. Compiling the FSM directly to the GPU is required.
