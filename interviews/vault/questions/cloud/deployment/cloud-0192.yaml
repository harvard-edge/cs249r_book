title: The Two-Tier SLA Conundrum
scenario: You are the founding ML Systems Engineer at a well-funded startup. Your first product is an API powered by a 70B parameter LLM, running on a fixed cluster of 16 modern GPUs. The product has two tiers with conflicting requirements.
question: 'How would you architect serving for the two product tiers on 16 GPUs without one tier hurting the other''s SLA?'
details:
  realistic_solution: 'The core challenge is that the two tiers have fundamentally incompatible optimization targets: one is latency-bound, the other is throughput-bound. A robust architecture must create isolation between them.'
  common_mistake: |
    **The Pitfall:** Proposing a single, unified serving cluster for both traffic types.
    **The Rationale:** Less experienced engineers assume that a modern continuous batching server can handle both workloads by itself.
    **The Consequence:** 'Head-of-Line Blocking' occurs, where a single large, long-running batch job (Standard Tier) can occupy a GPU for seconds, causing interactive requests (Premium Tier) to miss strict latency deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Two tiers with incompatible targets: latency-bound vs throughput-bound.

    **Calculations:**
    - A unified queue is quantitatively non-viable.

    **Conclusion & Interpretation:**
    - **Result: Head-of-Line Blocking (Queueing Delay)**. Justification for physical or logical partitioning is critical to prevent SLA breaches.
