title: Multi-Tenant LoRA Base Model Calibration
scenario: You host a multi-tenant service with 1 base 13B LLM and 500 active LoRA adapters (code, medical, chat). To save GPU memory, you quantize the base model to INT8 (W8A8). You calibrate using a generic Wikipedia dataset. Adapters for code generation see a 15% drop in pass@1, while chat adapters are unaffected.
question: Why do code LoRA adapters lose pass@1 after INT8 base quantization while chat is fine, and how should you calibrate?
details:
  realistic_solution: 'The activation distributions of the base model change significantly depending on the specific downstream task the LoRA adapter is driving. Calibrating the base model''s activation scales using Wikipedia creates clipping/rounding errors for the specific activation pathways activated by code-generation inputs. You cannot use a single global static activation scale for all LoRAs. You must either: 1) Switch to dynamic activation quantization (W8A8 dynamic), computing scales on-the-fly per token (costing some compute overhead but fixing accuracy), or 2) If using static PTQ, collect calibration data across the heterogeneous tasks and use a percentile-based calibration (e.g., 99.9th percentile) rather than min-max.'
  common_mistake: |
    **The Pitfall:** Fine-tuning the LoRA adapters further to compensate for the quantization error.
    **The Rationale:** Candidates assume the adapters can simply "re-learn" the lost precision, ignoring that the base model's static scales mathematically clip extreme activations before they reach the adapter.
    **The Consequence:** Wasting massive compute on retraining 500 adapters, which ultimately fails to recover the lost accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model uses W8A8 quantization with activation scales calibrated on generic Wikipedia text.
    - Code prompts exercise different activation ranges than chat or Wikipedia prompts.
    - Dynamic activation quantization recomputes scales from the current token/block instead of using one static calibration scale.

    **Calculations:**
    - Static scale failure mode: if code activations exceed the Wikipedia-calibrated range, values are clipped before the LoRA adapter can use them.
    - Dynamic scale cost: each quantized activation block needs a max/absmax reduction and scale application.
    - Calibration fix: collect adapter/task-representative samples, especially code-generation prompts, and use percentile or per-group scales to avoid code-path clipping.

    **Conclusion & Interpretation:**
    - **Result: calibration-bound activation error.** Static Wikipedia calibration clips code-specific activation pathways; dynamic activation quantization or task-mixed percentile calibration targets the pass@1 drop without relying on an unsupported fixed timing overhead estimate.
