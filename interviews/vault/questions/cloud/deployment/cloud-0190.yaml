title: The Conversational AI Traffic Jam
scenario: 'You are the lead ML Systems Engineer designing the cloud backend for a
  new in-car voice assistant. The product requirement is a P99 Time-To-First-Token
  (TTFT) of 500ms. The system must support 10,000 concurrent users with a 70B parameter
  model. Traffic is highly variable: 80% are short commands, while 20% are long, generative
  queries.'
question: What is your core architectural choice for request handling and batching
  to meet a 500ms P99 TTFT with highly variable query lengths, and why?
details:
  realistic_solution: The correct architectural choice is to build the system around
    continuous batching (also known as in-flight batching), likely using a framework
    like vLLM with PagedAttention. The justification is that it is the only way to
    solve the Head-of-Line (HoL) blocking problem that makes static batching non-viable
    for this workload.
  common_mistake: '**The Pitfall:** Proposing static batching and drastically over-provisioning
    GPUs to brute-force latency.

    **The Rationale:** Mistaking a fundamental queueing logic problem for a raw throughput
    or hardware problem.

    **The Consequence:** This creates an incredibly expensive system where GPUs sit
    idle, and it entirely fails to solve the Head-of-Line (HoL) blocking that breaks
    the P99 latency target.

    '
  napkin_math: '1. **Assumptions & Constraints:** P99 TTFT < 500ms SLA. 10K users,
    70B model. Extreme variance in request length (short vs long).

    2. **Calculations:** Under Static Batching (HoL Blocking), a 100ms short query
    queued behind a 2000ms long query waits 2000ms to exit the batch, failing the
    500ms SLA. Continuous Batching evaluates and evicts at the token iteration level,
    allowing the short query to exit in ~100ms.

    3. **Conclusion & Interpretation:** **Result: Continuous batching prevents SLA
    breaches by ending HoL blocking. Queue-Latency-Bound.**

    '
