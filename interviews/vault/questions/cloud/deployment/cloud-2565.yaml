title: Cloud Gpu Virtualization L3 0
scenario: You want to serve a 7B model (14 GB FP16 weights) and a 1B model (2 GB FP16 weights) on a single A100 using MIG.
question: What MIG partition scheme should serve a 14 GB 7B model and a 2 GB 1B model on one A100?
details:
  realistic_solution: '7B model needs 14 GB for weights + KV cache headroom ≈ 20 GB minimum. Smallest MIG instance that fits: 3g.40gb. 1B model needs 2 GB + overhead ≈ 5 GB. Fits in 1g.10gb. Total: 3g.40gb + 1g.10gb = 4/7 of GPU, leaving 3/7 available.'
  common_mistake: |
    **The Pitfall:** Sizing instances based purely on model weight size.
    **The Rationale:** Engineers allocate an instance that exactly fits the weights, ignoring the dynamic memory required for the KV cache during inference.
    **The Consequence:** The model loads successfully but immediately OOMs as soon as inference begins and the KV cache grows.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B Model weights: 14 GB.
    - 1B Model weights: 2 GB.
    - KV cache headroom required for both.

    **Calculations:**
    - 7B needs 14 GB + ~6 GB KV cache = 20 GB -> fits 3g.40gb (3/7 compute, 40 GB memory).
    - 1B needs 2 GB + ~3 GB KV cache = 5 GB -> fits 1g.10gb (1/7 compute, 10 GB memory).
    - Total Allocation: 3g.40gb + 1g.10gb = 4/7 of GPU.

    **Conclusion & Interpretation:**
    - **Result: 4/7 GPU Allocation (Memory-Bound)**. Use 3g.40gb for the 7B model and 1g.10gb for the 1B model, leaving 3/7 compute available.
