title: Cloud Gpu Virtualization L2 0
scenario: Your company serves 20 different ML models, each using <10% of a GPU's compute. Currently each gets a dedicated GPU, resulting in over 90% waste.
question: How can GPU virtualization improve utilization when 20 models each use less than 10% of a modern GPU?
details:
  realistic_solution: 'GPU virtualization partitions a single physical GPU into multiple isolated instances. NVIDIA MIG (Multi-Instance GPU) hardware-partitions an A100 into up to 7 instances, each with dedicated compute, memory, and memory bandwidth — full isolation. MPS (Multi-Process Service) allows multiple CUDA processes to share a GPU cooperatively but without memory isolation. vGPU provides VM-level GPU sharing for cloud providers. For your scenario: MIG can host 7 models per GPU, reducing 20 models from 20 GPUs to 3 GPUs. Utilization jumps from <10% to ~70%. Each instance gets guaranteed resources — no noisy-neighbor interference.'
  common_mistake: |
    **The Pitfall:** Confusing MIG (Multi-Instance GPU) with basic time-sharing (MPS).
    **The Rationale:** It's easy to assume all GPU sharing mechanisms just rapidly switch contexts between processes.
    **The Consequence:** Failing to use MIG for strong isolation, which guarantees memory and compute partitioning, avoiding noisy-neighbor interference that plagues time-sharing.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 models on 20 dedicated GPUs at <10% utilization.
    - Multi-Instance GPU (MIG) hardware-partitions a GPU into up to 7 isolated instances.

    **Calculations:**
    - Current setup: 20 GPUs.
    - MIG setup: 20 models / 7 instances per GPU = 3 GPUs needed (rounded up).
    - Savings: 17 GPUs × $2/hr = $34/hr = ~$298K/year.

    **Conclusion & Interpretation:**
    - **Result: Utilization-Bound.** Average GPU utilization jumps from <10% to ~70%, securely packing models using hardware-level isolation.
