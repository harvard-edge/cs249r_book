title: Implement a Kubernetes scheduler plugin for H100 GPU topology
scenario: Your data center has 16-GPU H100 nodes interconnected via NVLink Switch (900 GB/s all-to-all). A multi-node training job spans 4 nodes and must maximize NVLink bandwidth within each node while minimizing cross-node RDMA traffic. The default Kubernetes scheduler is topology-unaware.
question: How would you implement a Kubernetes scheduler extension that scores H100 nodes by GPU-to-GPU bandwidth topology for the 4-node training job?
details:
  realistic_solution: Implement this as a Kubernetes scheduler framework plugin, with a gang scheduler or queueing controller such as Volcano/Kueue coordinating the 4-node job as a group of pods. A DaemonSet collects GPU topology from NVML or `nvidia-smi topo -m` and publishes node labels or a topology CRD. The plugin uses Filter/Score phases to prefer nodes whose requested GPUs have full NVSwitch/NVLink connectivity, scoring each candidate node 0-100 from the available GPU-to-GPU bandwidth matrix. The gang layer reserves or admits the 4 pods together, then aggregates the per-node scores and adds a placement penalty for cross-node RDMA traffic so the job receives four high-scoring nodes rather than four independently scheduled pods. Refresh topology data on node changes and validate placement by checking assigned GPU IDs and measured all-reduce bandwidth.
  common_mistake: |
    **The Pitfall:** Scoring one pod at a time and assuming Kubernetes will automatically choose the best 4-node set.
    **The Rationale:** The default scheduler makes independent pod placement decisions, so a topology-aware node score alone does not provide gang admission or group-level optimization for distributed training.
    **The Consequence:** The job can land on individually acceptable nodes while still suffering poor cross-node communication or partial allocation delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVLink all-to-all: 900 GB/s.
    - InfiniBand HDR inter-node: 200 Gb/s = 25 GB/s.
    **Calculations:**
    - Bandwidth ratio: 900 / 25 = 36x difference.
    - Latency impact: An AllReduce on a 1 GB tensor takes ~1.1 ms intra-node vs ~40 ms over IB.
    **Conclusion & Interpretation:**
    - **Topology-aware scheduling avoids a 36x latency penalty by keeping dense communication entirely within the 16-GPU NVLink domain.**
