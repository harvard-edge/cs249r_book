title: Real-time LLM Deployment on Google TPU v5e with MLOps
scenario: You are designing an MLOps pipeline for real-time LLM inference on TPU v5e. The system requires frequent updates with strict latency targets (under 50ms).
question: How would you design an end-to-end MLOps pipeline to ensure TPU v5e hardware constraints are validated automatically and training-serving consistency is maintained?
details:
  realistic_solution: Use a dedicated model registry and CI/CD pipelines to automate testing and deployment. Crucially, pipelines must include TPU-specific performance benchmarks (e.g., verifying BF16 compatibility and measuring HBM transfers). Containerized environments guarantee training-serving parity.
  common_mistake: |
    **The Pitfall:** Overlooking hardware-specific optimizations like BF16 precision and HBM limits.
    **The Rationale:** Candidates design generic MLOps pipelines without integrating TPU-specific performance benchmarks or validation.
    **The Consequence:** Suboptimal throughput, OOM crashes, and deployed models that silently regress in performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: TPU v5e (16 GB HBM, 197 TFLOPS BF16 peak, 1.6 TB/s memory bandwidth).
       - Strict latency target: < 50ms.
    2. **Calculations:**
       - Memory Transfer (8 GB weights) = 8e9 bytes / 1.6e12 bytes/s = 5ms transfer time.
       - Compute Limit (assuming 10 TFLOPS inference) = 197 TFLOPS / 10 TFLOPS ≈ 19.7 inferences/sec per core (max).
    3. **Conclusion & Interpretation:** **Integrating the 5ms transfer and 19.7 inf/sec compute bounds strictly into the CI/CD pipeline guarantees hardware-aware validation, preventing silent production regressions.**
