title: The Multi-Tenant GPU Sharing Problem
scenario: 'You manage an inference platform serving 7 different small models (each <10GB). Your finance team wants to consolidate them onto a single A100-80GB using MIG (Multi-Instance GPU) to save costs. Each MIG slice gets 1/7th of the GPU: ~11 GB memory, ~45 TFLOPS. After deployment, while average throughput scales down predictably, two of the seven models experience severe, unpredictable tail latency spikes.'
question: What went wrong?
details:
  realistic_solution: MIG does not isolate the shared L2 cache or the memory bandwidth. The A100's 40 MB L2 cache is shared across all MIG instances. Two of the seven models are memory-bandwidth-bound (low arithmetic intensity), and they're now competing for the same 2 TB/s of HBM bandwidth. With 7 tenants, each effectively gets ~285 GB/s — far less than the 2 TB/s they had on a dedicated GPU. The compute-bound models are fine because their bottleneck (Tensor Cores) is properly partitioned.
  common_mistake: |
    **The Pitfall:** "MIG provides perfect isolation, so each model should perform as if it has a dedicated 1/7th GPU."
    **The Rationale:** MIG isolates compute and memory capacity.
    **The Consequence:** But it does not isolate all resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100-80GB specs: 2 TB/s bandwidth, 312 TFLOPS FP16.
    - Ridge point = 312 TFLOPS / 2 TB/s = 156 Ops/Byte.
    - MIG 1g.10gb slice: ~45 TFLOPS (1/7 of compute, isolated), Effective bandwidth: ~285 GB/s.

    **Calculations:**
    - Slice ridge point from partitioned compute and proportional bandwidth would be 45 TFLOPS / 0.285 TB/s = 158 Ops/Byte, roughly the same as the full GPU.
    - Memory-bound model (AI = 5 Ops/Byte): full GPU roof = 5 Ops/Byte * 2 TB/s = 10 TOPS effective throughput. If 7 tenants contend evenly, effective bandwidth is about 2 TB/s / 7 = 0.285 TB/s, so the memory roof falls to 5 * 0.285 = 1.43 TOPS, a 10 / 1.43 = 7x capacity loss. Uneven L2/HBM contention causes tail spikes.
    - Compute-bound model (AI = 300 Ops/Byte): demand is above the ridge point, so it is limited mostly by the isolated MIG compute slice. It receives about 45 TFLOPS instead of 312 TFLOPS, a predictable 312 / 45 = 6.9x capacity reduction rather than bursty shared-memory tail latency.

    **Conclusion & Interpretation:**
    - **Result: compute-bound models slow down predictably with the smaller compute slice, while memory-bound models see shared L2/HBM contention and unpredictable tail latency spikes (Memory-Bandwidth-Bound)**. MIG isolates compute and memory capacity, but shared cache and memory bandwidth can still couple tenants.
