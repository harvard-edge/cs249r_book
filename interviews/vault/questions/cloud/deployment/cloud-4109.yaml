title: 'GPU Scheduling: FIFO vs Shortest-Job-First'
scenario: Your ML platform uses FIFO scheduling for GPU jobs. A 64-GPU training job arrives and waits for resources while three 1-GPU inference jobs queue behind it. Average queue wait time is 4 hours.
question: What scheduling policy would reduce the 4-hour FIFO wait for small inference jobs, and what tradeoff does it introduce?
details:
  realistic_solution: 'Switch to a priority-based scheduler with backfill. Backfill scheduling (used by Slurm): the large 64-GPU job retains its priority, but while waiting for 64 GPUs to free up, the scheduler checks if any smaller jobs can complete before the large job''s expected start time. If so, the small inference jobs (1 GPU, short runtime) run in the ''holes'' without delaying the large job. This reduces average wait time for small jobs from hours to minutes while preserving FIFO ordering for large jobs. Key tradeoff: backfill requires runtime estimates. If a backfilled job exceeds its estimate, it gets preempted (killed), wasting its compute. Alternative: multi-level feedback queue — separate queues for interactive (inference, <1h), development (<8h), and production (>8h) with different priorities and GPU limits per queue.'
  common_mistake: |
    **The Pitfall:** Blindly switching to Shortest-Job-First (SJF) to solve small job wait times.
    **The Rationale:** Candidates realize SJF pushes small inference jobs through quickly but fail to consider the global queue dynamics.
    **The Consequence:** Severe starvation for large, critical training jobs, which may never run if small jobs continuously arrive.
  napkin_math: |
    - Baseline (FIFO): 3 inference jobs wait 4h each = 12 GPU-hours wasted waiting.
    - Backfill scheduling: The 64-GPU job's priority is maintained, but small jobs run in the "holes" of currently available GPUs while the big job gathers its full 64.
    - Backfill impact: Inference jobs start in <5 min and run for 10 min.
    - **Conclusion: Backfill scheduling saves 11.75 GPU-hours of wait time without starving the large job, at the cost of requiring strict runtime estimates.**
