title: 'Mastery: Designing a Zero-Downtime GPU Cluster Upgrade Strategy'
scenario: You must upgrade the NVIDIA GPU driver from 525 to 550 on a production 512-GPU H100 cluster (64 nodes, 8 GPUs each) running 24/7 ML inference and batch training workloads. The cluster cannot tolerate more than 5 minutes of total inference downtime and cannot lose training job progress.
question: How would you roll out the NVIDIA 525-to-550 driver upgrade across 64 H100 nodes without >5 minutes inference downtime or lost training progress?
details:
  realistic_solution: |
    Strategy: (1) Cordon and drain one node at a time using `kubectl drain --grace-period=300 --ignore-daemonsets`. (2) Inference pods: use PodDisruptionBudget with `minAvailable: 90%` to ensure 90% of inference capacity remains during drain. With 64 nodes, draining 1 node at a time leaves 63/64 = 98% capacity. (3) Training pods: configure elastic training (`torchrun` with fault tolerance) or checkpoint-and-preempt: save checkpoint, evict, relaunch on upgraded node. (4) Upgrade driver via GPU Operator's `ClusterPolicy` with rolling update strategy — set `maxUnavailable: 1` on the driver DaemonSet. (5) Validate each node: run `nvidia-smi` + NCCL bandwidth test before uncordoning. (6) Rollback: maintain previous driver image tag in GPU Operator config; redeploy DaemonSet with old tag if error rate increases.
  common_mistake: |
    **The Pitfall:** Draining too many GPU nodes at once or skipping disruption budgets and training checkpoints.
    **The Rationale:** Driver upgrades usually require evicting GPU workloads from each node, and some upgrades require a reboot or kernel module reload. The mistake is treating the rollout as a fleet-level maintenance event instead of a capacity-bounded rolling change.
    **The Consequence:** Inference capacity can fall below the SLA and training jobs can restart from scratch even if the cluster itself never has a full hard outage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Time per Node: Drain (3m) + Reboot/driver reload (5m) + Validate (2m) = 10 minutes.
    - Inference Capacity: Rolling 1 node at a time maintains 63/64 = 98.4% capacity.
    - SLA: no more than 5 minutes total inference downtime, not a 5-minute total maintenance window.

    **Calculations:**
    - Total Window: 64 nodes * 10 min = 640 min = 10.7 hours total upgrade window.
    - Simultaneous unavailable capacity: 1/64 = 1.56%, so a PDB with `minAvailable: 90%` has enough headroom.
    - Inference downtime during a healthy rolling drain should be 0 minutes because traffic is shifted before each node is upgraded; the 10-minute node outage is absorbed by spare capacity.

    **Conclusion & Interpretation:**
    - **Result: 10.7-hour rollout with downtime bounded below the 5-minute SLA.** The total maintenance window is long, but availability is preserved by upgrading one node at a time and checkpointing or elastically restarting training workloads.
