title: 'The Blue/Green Memory Squeeze'
scenario: 'You are managing a fleet of H100 GPUs. Your current service runs a 15-billion parameter model served in FP16 precision. The team wants to upgrade to a 30-billion parameter model using a blue/green deployment strategy on each node. This means that for a brief period, both the old and new models must be loaded into a single GPU''s memory simultaneously before traffic is switched.'
question: 'Can a single 80 GB H100 support a blue/green deployment switching from a 15B to a 30B FP16 model?'
details:
  realistic_solution: 'No, a single H100 cannot support this strategy. The total memory required during the transition exceeds the GPU''s capacity.'
  common_mistake: |
    **The Pitfall:** Only calculating the memory required for the *new* model and checking if it fits.
    **The Rationale:** Candidates forget the fundamental nature of a blue/green deployment, which requires holding both the old and new deployments concurrently before draining traffic.
    **The Consequence:** Approving a deployment that causes instantaneous Out-Of-Memory (OOM) crashes across the entire production fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Memory: 80 GB (H100)
    - Old Model: 15 billion parameters
    - New Model: 30 billion parameters
    - Precision: FP16 (2 bytes/parameter)

    **Calculations:**
    - Old Model Memory = 15B * 2 bytes = 30 GB
    - New Model Memory = 30B * 2 bytes = 60 GB
    - Total Memory Required = 30 GB + 60 GB = 90 GB

    **Conclusion & Interpretation:**
    - **Result: 90 GB (Memory-Bound)**. 90 GB > 80 GB HBM capacity, so the deployment will fail with an OOM error.
  options:
  - 'Yes, the new 60 GB model fits within the 80 GB capacity.'
  - 'Yes, the total memory needed is only 45 GB (15 GB + 30 GB).'
  - 'No, the combined 90 GB footprint exceeds the 80 GB capacity.'
  - 'Yes, there is 50 GB free, and the new model is only 30 GB larger.'
