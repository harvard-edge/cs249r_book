title: 'MI300X MIG vs H100 MIG: Multi-Tenant Serving Partitioning'
scenario: H100 supports Multi-Instance GPU (MIG) partitioning into up to 7 GPU instances. AMD MI300X does not natively support MIG-equivalent hardware partitioning. A cloud operator needs to serve 14 concurrent small (7GB) models to different tenants.
question: How would you serve 14 tenant-isolated 7GB models on H100 MIG versus MI300X, and what MI300X multi-tenant design would you use?
details:
  realistic_solution: 'H100 MIG approach: use 2 H100s, each split into 7 MIG instances, to provide 14 hardware-isolated tenants. Each 7GB model fits inside a 10GB-class slice with hard memory and fault isolation. MI300X does not provide MIG-equivalent tenant slices, so the realistic design is software isolation: one process/container per tenant, explicit per-process memory admission control, cgroup and scheduler limits, and VM or SR-IOV isolation only where the platform exposes it. A single 192GB MI300X can hold all 14 model copies with substantial memory headroom, but it should be described as weaker software isolation with shared-GPU contention, not as MIG-like hardware partitioning or guaranteed higher throughput.'
  common_mistake: |
    **The Pitfall:** Assuming hardware MIG (H100) is universally superior to software partitioning (MI300X).
    **The Rationale:** Candidates prioritize strong fault isolation but ignore the immense memory fragmentation and bandwidth stranding caused by fixed-size hardware slices.
    **The Consequence:** Over-provisioning hardware (requiring 2x GPUs) and wasting massive memory headroom that could have stored KV caches.
  napkin_math: |
    **Assumptions & Constraints:**
    - 14 models, 7GB each. H100 MIG capacity: up to 7 instances per GPU. MI300X memory: 192GB total.
    - This is a capacity and isolation design question; no valid token/sec benchmark is provided.

    **Calculations:**
    - H100: ceil(14 / 7) = 2 GPUs. Model storage = 14 * 7GB = 98GB; allocated MIG memory is about 14 * 10GB = 140GB, so about 42GB is slice fragmentation.
    - MI300X: 14 * 7GB = 98GB of model storage inside one 192GB GPU, leaving about 94GB for runtime overhead and KV cache.
    - MI300X isolation is process/container/VM-level and admission-control based; the prompt does not establish hardware-enforced MIG-style partitions or a defensible throughput multiplier.

    **Conclusion & Interpretation:**
    - **Result: Capacity-isolation tradeoff.** H100 needs 2 GPUs for 14 hardware-isolated MIG tenants. One MI300X can fit the models more efficiently, but only with weaker software isolation and shared-resource contention; do not claim MIG-like protection or unsupported decode throughput.
