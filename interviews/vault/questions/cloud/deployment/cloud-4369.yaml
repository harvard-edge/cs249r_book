title: 'MI300X MIG vs H100 MIG: Multi-Tenant Serving Partitioning'
scenario: 'H100 supports Multi-Instance GPU (MIG) partitioning into up to 7 GPU instances. AMD MI300X does not natively support MIG-equivalent hardware partitioning. A cloud operator needs to serve 14 concurrent small (7GB) models to different tenants.'
question: 'How would you serve 14 tenant-isolated 7GB models on H100 MIG versus MI300X, and what MI300X multi-tenant design would you use?'
details:
  realistic_solution: 'H100 MIG approach: 2 H100s x 7 MIG instances each = 14 instances. Hardware memory isolation guarantees one tenant cannot affect others. MI300X software approach: 1 MI300X x 192GB unified pool. ROCm compute partition modes (CPX mode) can assign XCDs to processes. For 14 models, use 1 MI300X with MPS (Multi-Process Service equivalent in ROCm) + memory protection via IOMMU. MI300X advantage: 3x better memory utilization, 1.58x higher aggregate decode throughput, but weaker isolation guarantees.'
  common_mistake: |
    **The Pitfall:** Assuming hardware MIG (H100) is universally superior to software partitioning (MI300X).
    **The Rationale:** Candidates prioritize strong fault isolation but ignore the immense memory fragmentation and bandwidth stranding caused by fixed-size hardware slices.
    **The Consequence:** Over-provisioning hardware (requiring 2x GPUs) and wasting massive memory headroom that could have stored KV caches.
  napkin_math: |
    **Assumptions & Constraints:**
    - 14 models, 7GB each. H100 instance: 10GB. MI300X: 192GB total.
    - H100 instance BW: 479 GB/s. MI300X total BW: 5300 GB/s.

    **Calculations:**
    - H100 (2 GPUs): 14 instances * 10GB = 140GB allocated. 14 * 7GB = 98GB used (42GB wasted). Decode throughput: 479 * 0.8 / 14 GFLOP = 27.4 tok/sec/model.
    - MI300X (1 GPU): 98GB used out of 192GB (94GB free). Shared BW per model: 5300 / 14 = 379 GB/s. Decode: 379 * 0.8 / 14 = 21.7 tok/sec/model.

    **Conclusion & Interpretation:**
    - **Result: Single MI300X serves 14 models at ~80% the per-model speed of 2 H100s, but halves hardware cost and eliminates fragmentation. (Memory-Capacity-Bound Utilization)**. Software partitioning allows dramatically more efficient memory packing.
