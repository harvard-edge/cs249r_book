title: Cloud Red Teaming L5 0
scenario: 'Your team debates red teaming approaches for a model serving 5M requests/day: (A) human red teamers ($200K/year), (B) automated LLM-based red teaming (100K attacks/day for $3.6K/year), or (C) a hybrid approach using human templates expanded by LLMs.'
question: For a model serving 5M requests/day, how do human, automated LLM-based, and hybrid red teaming compare in coverage and cost?
details:
  realistic_solution: 'Option A (human only): experts find subtle, creative attacks that automated systems miss. Throughput is low: ~300 creative attacks/day. Coverage: 300 / 5M = 0.006%. Option B (automated): generates 100K adversarial prompts/day at $3.6K/year compute. High coverage of known attack patterns, but misses novel attacks. Coverage: 100K / 5M = 2%. Option C (hybrid): humans design attack categories and seed templates; automated system generates variations at scale. 300 human templates * 1,000 variations = 300K attacks/day. Coverage: 6%. Cost: $200K (humans) + $10.8K (compute for 300K/day) = $210.8K/year. Best ROI: human creativity guides automated scale.'
  common_mistake: |
    **The Pitfall:** Relying solely on automated red teaming.
    **The Rationale:** Teams see the incredibly low cost-per-attack and assume scale equals security.
    **The Consequence:** They miss novel, emergent risks like multi-turn manipulation, because automated systems excel at known patterns but lack human creativity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 5M requests/day.
    - Human limit: 300 attacks/day ($200K/yr).
    - Automated limit: 100K attacks/day ($3.6K/yr).
    - Hybrid variations: 1,000 per human template.

    **Calculations:**
    - Human cost per attack: $200K / 109,500 = $1.83.
    - Automated cost per attack: $3.6K / 36.5M = $0.0001.
    - Hybrid attacks: 300 * 1,000 = 300K attacks/day (109.5M/yr).
    - Hybrid Cost: ($200K + $10.8K compute) / 109.5M = $0.0019 per attack.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound Coverage**. Hybrid provides 300x the coverage of humans alone for less than a penny per attack.
