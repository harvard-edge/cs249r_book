title: Absorbing Traffic Spikes with CPU Reactive Scaling
scenario: A viral event spikes your recommendation API traffic from 100 QPS to 2,500 QPS within 2 minutes. Your baseline GPU auto-scaling group takes 5 minutes to provision and load the 5GB model weights. GPU instances cost $0.52/hour and serve 400 QPS. To avoid dropping requests, you trigger a reactive scaling policy using fast-booting CPU instances (8 vCPUs, $0.34/hour). The model takes 200ms per inference on a single vCPU.
question: How many 8-vCPU CPU instances are needed for the 2,400 QPS overflow, and how does CPU cost per inference compare with GPU?
details:
  realistic_solution: Provision 60 CPU instances to cover the 2,400 QPS overflow while GPUs are warming. Each 8-vCPU instance can run 8 independent single-vCPU inferences, so throughput is 8 / 0.2s = 40 QPS. CPU cost is about $0.00000236 per inference versus $0.00000036 on the GPU baseline, or roughly 6.5x higher, so CPUs are best used as a temporary shock absorber.
  common_mistake: |
    **The Pitfall:** Relying purely on GPU auto-scaling without an intermediate CPU buffer strategy.
    **The Rationale:** Candidates strictly focus on the compute efficiency of the GPU and completely ignore the 5-minute cold start wall-clock time required to boot and load 5GB weights into VRAM.
    **The Consequence:** Massive request dropping and API failures occur precisely during the peak burst window, degrading the user experience when it matters most.
  napkin_math: |
    **Assumptions & Constraints:**
    - Overflow above baseline = 2,500 - 100 = 2,400 QPS.
    - CPU instance: 8 vCPUs, $0.34/hr, 200ms per single-vCPU inference.
    - Assume all 8 vCPUs run independent inferences concurrently.
    - GPU baseline: $0.52/hr for 400 QPS.

    **Calculations:**
    - CPU throughput: 8 vCPUs / 0.2s = 40 QPS per instance.
    - Instances needed: 2,400 QPS / 40 QPS = 60 instances.
    - CPU cost/inference: ($0.34 / 3600s) / 40 QPS = $0.00000236.
    - GPU cost/inference: ($0.52 / 3600s) / 400 QPS = $0.00000036.
    - Cost ratio: $0.00000236 / $0.00000036 ~= 6.5x.

    **Conclusion & Interpretation:**
    - **Result: 60 CPU instances and ~6.5x higher CPU cost/inference**. The CPU pool covers the 5-minute GPU provisioning delay despite worse unit economics.
