title: Continuous Decode Batching TPOT Fairness Impact
scenario: In a continuous batching decode pool, 10 requests complete their generation while 90 ongoing requests are mid-decode. The scheduler adds 15 new requests to the next step.
question: What fairness and TPOT impact does adding 15 new requests to a 90-request continuous decode batch have?
details:
  realistic_solution: |
    Adding the 15 requests increases every next decode step for the 90 existing requests because continuous batching shares the same model and KV bandwidth. With 524KB/token KV, the baseline working set is about 47.2GB KV plus 16GB weights, so TPOT is about 18.9ms at 3.35TB/s. The new requests add 15 * 512 * 524KB ~= 4.0GB, raising the step to about 20.1ms. That is +1.2ms, or about +6.3%, for the existing 90 requests. Fairness impact: the scheduler is spending slack from in-flight users to admit new users, so admission should be capped by a TPOT budget such as (N * avg_context * kv_per_token) / HBM_BW <= allowed TPOT inflation.
  common_mistake: |
    **The Pitfall:** Assuming adding new requests to a continuous batch is free or only impacts prefill latency.
    **The Rationale:** Candidates forget that each new request adds to the per-step memory bandwidth consumption by requiring more KV pages to be loaded.
    **The Consequence:** Existing requests suffer from TPOT inflation, which can silently violate latency SLAs if admission control is unbounded.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 90 requests * 1024 tokens * 524KB/token ~= 47.2GB KV.
    - Model load: 16GB for an 8B BF16 model.
    - Memory bandwidth: 3.35TB/s.

    **Calculations:**
    - Convert bandwidth: 3.35TB/s ~= 3350GB/s, so 1GB of traffic costs 1 / 3350 seconds = 0.299ms.
    - Baseline load: 47.2GB KV + 16GB weights = 63.2GB.
    - Baseline step time: 63.2GB / 3350GB/s = 0.0189s = 18.9ms/step.
    - Added KV: 15 requests * 512 tokens * 524KB/token ~= 4.0GB.
    - Added step time: 4.0GB / 3350GB/s = 0.00119s = 1.19ms.
    - New step time: (63.2GB + 4.0GB) / 3350GB/s = 0.0201s = 20.1ms/step.
    - TPOT inflation: 20.1ms - 18.9ms = 1.2ms, or 1.2 / 18.9 = 6.3%.

    **Conclusion & Interpretation:**
    - **Result: the 15 admissions add about 1.2ms TPOT (+6.3%) to all 90 existing requests.** The fairness policy should admit new work only while this shared TPOT inflation stays within the existing requests' slack.
