title: Optimizing ML Workloads on Kubernetes with Google TPU v5e
scenario: Your team is deploying a large-scale ML model training job on a Kubernetes cluster configured with Google TPU v5e accelerators. The cluster utilizes a pod architecture where the interconnect fabric provides 1.6 TB/s bisection bandwidth. The training job requires significant compute and memory resources.
question: How would you use Kubernetes device plugins, node affinity, and scheduling to run TPU v5e training efficiently?
details:
  realistic_solution: Implement a specialized Kubernetes device plugin for Google TPUs. Utilize NodeAffinity or PodAffinity/AntiAffinity rules to place training pods. Employ custom schedulers to manage distributed training, ensure gang scheduling, and optimize resource allocation based on TPU-specific metrics.
  common_mistake: |
    **The Pitfall:** Treating TPUs like generic GPUs or standard nodes during scheduling.
    **The Rationale:** Candidates rely on standard K8s scheduling plugins, failing to understand that TPUs require strict gang scheduling and topology-aware placement to leverage their custom interconnects.
    **The Consequence:** Pods are scattered across the cluster, destroying interconnect bandwidth and severely fragmenting resources, leading to massive training bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Target: 1 PFLOP/s (BF16).
    - TPU v5e: 197 TFLOPS/chip, 16GB HBM.
    - Interconnect: 1.6 TB/s bisection bandwidth.
    - Model size: 90 GB.
    - Training overhead for parameters, gradients, optimizer state, activations, and runtime reserve is at least 3x model size unless sharded aggressively.

    **Calculations:**
    - Chips Required = 1000 TFLOPS / 197 = 5.07 -> 6 chips.
    - Raw HBM across 6 chips = 6 * 16GB = 96GB.
    - Estimated training memory = 90GB * 3 = 270GB before extra activation peaks.
    - Memory-limited chip count = 270GB / 16GB = 16.9 -> at least 17 chips, plus placement headroom.
    - Bisection bandwidth constrains distributed collectives between placed chips; it is not a model-load-time denominator.

    **Conclusion & Interpretation:**
    - **Result: Memory and Topology Constrained.** Kubernetes scheduling should gang-place a sufficiently large TPU slice with topology affinity so sharded training has enough HBM and predictable collective bandwidth.
