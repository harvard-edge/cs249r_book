title: The GC Pause Latency Spike
scenario: Your Python-based inference server on an A100 serves a 7B model with P50 latency of 40 ms. But every ~30 seconds, a burst of requests hits P99 latency of 800 ms — 20× the normal. The GPU utilization trace shows brief drops to 0% that correlate exactly with the spikes. The model and batch size haven't changed.
question: What's stealing 760 ms from your GPU?
details:
  realistic_solution: 'This is a CPython garbage collector (GC) stop-the-world pause. Python''s cyclic GC (triggered by `gc.collect()` or automatically when the generation-2 threshold is reached) freezes *all* Python threads while it traces object references. During this pause, no new CUDA kernels can be launched because the Python threads that submit them are frozen. The GPU drains its kernel queue in ~1–2 ms and then sits idle until the GC completes. With a large Python heap (serving frameworks maintain request queues, tokenizer caches, and KV-cache metadata as Python objects), a gen-2 collection can take 500–800 ms. The ~30-second interval matches the default gen-2 threshold: after 10 gen-1 collections (each triggered by ~700 allocations), a gen-2 sweep runs. Fix: (1) disable automatic GC (`gc.disable()`) and run `gc.collect()` explicitly during low-traffic windows; (2) reduce Python-side object churn by pre-allocating buffers; (3) move the hot path to C++/Rust (like vLLM''s C++ scheduler)
    so the GC has fewer objects to trace.'
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling or network congestion.
    **The Rationale:** Engineers unfamiliar with CPython's GIL and GC behavior assume infrastructure-level disruptions.
    **The Consequence:** They waste time profiling hardware, missing the fact that thermal throttling is gradual (not a sharp 0% drop) and network issues wouldn't zero out GPU utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    1. Normal request latency is ~40 ms; spike latency is ~800 ms, so the missing time is ~760 ms.
    2. A large Python serving heap contains ~5M reachable objects.
    3. Gen-2 GC tracing throughput during the pause is roughly 6.6M objects/s on this workload.
    **Calculations:**
    4. Gen-2 pause time = 5M objects / 6.6M objects/s = ~0.76 s = 760 ms.
    5. GPU kernel queue depth ≈ 20 kernels × 0.05 ms each = drains in ~1 ms.
    6. GPU idle time during the pause is therefore ~759 ms, matching the observed drop to 0% utilization.
    7. Requests queuing at 100 req/s during 760 ms: 100 * 0.760 = ~76 requests affected.
    8. If hot-path object state is reduced to 500K objects, the same scaling predicts 500K / 6.6M = ~76 ms pauses; scheduling GC in low-traffic windows removes those pauses from P99.
    **Conclusion & Interpretation:**
    9. **Result: The 760 ms is a CPython gen-2 GC pause.** The queue drains almost immediately, then the GPU sits idle until Python can launch kernels again. Fix by disabling automatic GC on the hot path, collecting during low-traffic windows, and reducing Python object churn or moving scheduler state out of Python.
