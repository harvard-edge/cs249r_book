title: The Continuous Batching Starvation
scenario: You implement Continuous Batching for an LLM server to maximize GPU utilization. However, users requesting very short 10-token answers experience incredibly long wait times, despite their requests requiring minimal compute.
question: How did your batching algorithm starve the easy requests?
details:
  realistic_solution: 'Continuous batching with FCFS scheduling causes head-of-line blocking. When large workloads occupy the batch, simple requests must wait for slots to open. The fix is preemptive scheduling: prioritize short requests or implement shortest-job-first policies.'
  common_mistake: |
    **The Pitfall:** Blaming GPU architecture for prioritizing larger matrix math.
    **The Rationale:** Engineers assume the hardware itself is deferring small workloads in favor of large ones.
    **The Consequence:** Attempting to tweak CUDA kernels when the actual issue is a classic head-of-line blocking problem in the software scheduler.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 32 users request 2,000 tokens each.
       - Generation time: 20ms per token.
       - New user requests 10 tokens.
    2. **Calculations:**
       - Batch completion time: 2,000 tokens * 20ms/token = 40 seconds.
       - New user compute required: 10 tokens * 20ms/token = 0.2 seconds.
       - Wait time for new user: Up to 40 seconds (if FCFS scheduling is used).
    3. **Conclusion & Interpretation:**
       - **Result: Queueing-Bound.** First-Come-First-Serve continuous batching causes severe head-of-line blocking; preemptive or shortest-job-first scheduling is required.
