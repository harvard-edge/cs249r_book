title: 4K Visual Tokens Blow Up VLM TTFT
scenario: You are serving a LLaVA-1.5 13B model. Users uploading 4K images experience an 8-second TTFT, while the text-only version has a 200ms TTFT.
question: Where are the 7.8 extra seconds going?
details:
  realistic_solution: 'VLMs convert images into visual tokens via a vision encoder (typically ViT), then concatenate these with text tokens for the LLM. With a 14x14 patch size and ceil padding, a 3840x2160 image produces ceil(3840/14) * ceil(2160/14) = 275 * 155 = 42,625 visual tokens. The LLM must prefill all of these, similar to a 42K-token text prompt. The vision encoder itself takes ~50ms; the LLM prefill takes ~7.1 seconds at the stated effective compute, with the remaining gap to 8 seconds coming from attention/KV memory overhead, scheduling, and communication. The fix: downsample images, use adaptive resolution only where needed, or use a vision encoder with larger patch sizes.'
  common_mistake: |
    **The Pitfall:** Blaming the vision encoder (ViT) for being slow and trying to swap it for a smaller vision model.
    **The Rationale:** Not realizing that the vision encoder itself is fast, but it generates an enormous number of tokens that the LLM must process.
    **The Consequence:** Wasting time tuning the encoder while ignoring the massive O(N²) LLM prefill bottleneck caused by visual tokens.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K Image: 3840x2160. ViT patch size: 14x14.
    - 13B parameter LLM. A100 effective compute: ~156 TFLOPS.

    **Calculations:**
    - Patch grid with ceil padding: ceil(3840/14) * ceil(2160/14) = 275 * 155 = 42,625 visual tokens.
    - LLM Prefill FLOPs: 2 * 13B * 42,625 = ~1,108 TFLOPs for the dense projection work, before attention overhead.
    - Dense prefill time: 1,108 TFLOPs / 156 TFLOPS = ~7.1 seconds.
    - ViT Time: ~50ms.
    - Remaining gap to ~8s is plausible attention/KV memory overhead, scheduling, and communication, not the vision encoder.

    **Conclusion & Interpretation:**
    - **Result: Visual-Token Prefill Bottleneck.** The extra TTFT is dominated by LLM prefill over roughly 42.6K visual tokens, with memory/attention overhead filling the gap from the ~7.1s dense-FLOP estimate to the observed ~8s.
