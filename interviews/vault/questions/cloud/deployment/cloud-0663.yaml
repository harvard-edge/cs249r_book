title: The Vision-Language Model Serving
scenario: You are serving a LLaVA-1.5 13B model. Users uploading 4K images experience an 8-second TTFT, while the text-only version has a 200ms TTFT.
question: Where are the 7.8 extra seconds going?
details:
  realistic_solution: 'VLMs convert images into visual tokens via a vision encoder (typically ViT), then concatenate these with text tokens for the LLM. A 4K image at the default patch size (14×14 pixels) produces (3840/14) * (2160/14) = 274 * 154 = 42,196 visual tokens. The LLM must prefill all of these — the same as a 42K-token text prompt. The vision encoder itself takes ~50ms; the remaining 7.75 seconds is pure LLM prefill over 42K visual tokens. The fix: downsample images, use adaptive resolution (only high-res where needed), or use a vision encoder with larger patch sizes.'
  common_mistake: |
    **The Pitfall:** Blaming the vision encoder (ViT) for being slow and trying to swap it for a smaller vision model.
    **The Rationale:** Not realizing that the vision encoder itself is fast, but it generates an enormous number of tokens that the LLM must process.
    **The Consequence:** Wasting time tuning the encoder while ignoring the massive O(N²) LLM prefill bottleneck caused by visual tokens.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K Image: 3840x2160. ViT patch size: 14x14.
    - 13B parameter LLM. A100 effective compute: ~156 TFLOPS.

    **Calculations:**
    - Visual tokens: (3840/14) * (2160/14) = 274 * 154 = 42,196 tokens.
    - LLM Prefill FLOPs: 2 * 13B * 42,196 = ~1,097 TFLOPs.
    - Prefill Time: 1,097 TFLOPs / 156 TFLOPS = ~7.0 seconds.
    - ViT Time: ~50ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (O(N²) Prefill).** The 7.8s delay is overwhelmingly dominated by the massive 1,097 TFLOP LLM prefill for 42K visual tokens.
