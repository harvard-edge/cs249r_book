title: 'Multi-Model Disaggregated Serving Isolation'
scenario: 'You run a platform serving 5 different LLM models (7B, 13B, 34B, 70B, 140B) to thousands of tenants with different SLOs.'
question: 'How would you architect disaggregated serving for 5 LLMs and thousands of tenants while isolating KV caches and capacity across SLOs?'
details:
  realistic_solution: 'Use a two-level architecture: (1) Physical pools: prefill pool (H100s optimized for compute) and decode pool (MI300X for memory capacity). Both pools are shared across models. (2) Logical isolation via virtual queues per model with reserved + burstable capacity. Each model gets a reserved capacity slice (e.g., 20% for each of 5 models) and can burst into unused capacity. (3) Model loading: maintain all models hot on decode nodes using fractional GPU allocation. 140B requires TP=2 on MI300X (140 GB < 192 GB each, 2 GPUs for safety margin). 7B fits in 14 GB — multiplex 6 instances per MI300X GPU. (4) KV-cache isolation: per-tenant KV namespaces with HBM quotas enforced by the PagedAttention block allocator. Blocks are tagged with tenant ID; cross-tenant block reuse is disabled. (5) Capacity allocation: weighted fair queuing at the prefill scheduler; decode assignments respect per-model KV quotas. A load spike on the 70B model can consume up to 150% of its reserved capacity (burst) but triggers autoscaling before consuming 200%.'
  common_mistake: |
    **The Pitfall:** Statically partitioning prefill and decode hardware pools per model.
    **The Rationale:** Statically assigning resources (e.g., 5 dedicated pools for 5 models) seems like the easiest way to ensure strict isolation and predictable performance.
    **The Consequence:** This drastically wastes compute capacity when models have non-simultaneous traffic peaks, severely impacting the cost-efficiency of the platform.
  napkin_math: |
    **Assumptions & Constraints:**
    - Decode Node: 192 GB HBM.
    - 140B model requires 280 GB total (TP=2).
    - 7B model requires 14 GB.
    
    **Calculations:**
    - 140B KV cache: 192 GB - 140 GB = 52 GB per GPU.
    - 7B Model Multiplexing: 6 instances * 14 GB = 84 GB weights, leaving 108 GB for KV cache.
    - Baseline Sizing: 70B model needs ~10 decode GPUs for 500 RPS.
    
    **Conclusion & Interpretation:**
    - **Result: ~35 decode GPUs + ~15 prefill GPUs (Memory-Bound)**. Intelligent model multiplexing minimizes fragmented memory and reduces the overall cluster footprint.
