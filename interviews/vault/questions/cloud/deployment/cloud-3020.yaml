title: 'MLOps Lifecycle: Design a CI/CD Pipeline for LLM Fine-Tuning'
scenario: 'Design a CI/CD pipeline for continuous fine-tuning of a 7B LLaMA model on a cluster. The pipeline must support: nightly fine-tuning runs on new data, automated evaluation against 5 benchmark suites, canary deployment (5% traffic), and rollback in < 5 minutes.'
question: What CI/CD pipeline would support nightly 7B fine-tuning, benchmark evaluation, 5% canaries, rollback under 5 minutes, and what are its storage and runtime budgets?
details:
  realistic_solution: 'Pipeline stages: (1) Data validation (5min, CPU), (2) Fine-tuning (LoRA rank 64, 1 epoch, 100K examples, 8 GPUs, ~2hrs), (3) Checkpoint to S3 (14GB × 3 checkpoints = 42GB, at 10GB/s = 4.2s), (4) Benchmark eval (5 suites, parallel on 2 GPUs, 30min), (5) Canary deploy via shadow traffic (automated), (6) Promote or rollback. Total pipeline: ~3.5hrs. Storage: 14GB × 30 daily checkpoints = 420GB/month. Rollback: swap model pointer in registry < 1min.'
  common_mistake: |
    **The Pitfall:** Designing a generic software CI/CD pipeline.
    **The Rationale:** Engineers apply standard software engineering practices without accounting for ML-specific resource constraints.
    **The Consequence:** The pipeline fails to handle massive checkpoint storage sizes, GPU reservation overhead, and non-deterministic evaluation scores, leading to fragile and excessively expensive deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 model checkpoint is 14GB.
    - Fine-tuning runs 100K examples, batch 16, 8 GPUs.
    - Evaluation covers 5 suites (5000 examples).

    **Calculations:**
    - Storage: 14GB * 30 daily checkpoints = 420GB/month.
    - Fine-Tuning Runtime: 781 steps at 3s/step = ~39 minutes.
    - Evaluation Runtime: 5000 examples at 780ms/example = 65 mins on 1 GPU. Parallelized on 2 GPUs = 32.5 minutes.
    - Total pipeline time = 39 min + 32.5 min + data validation = ~1.5 to 2 hours.

    **Conclusion & Interpretation:**
    - **Result: 1.5 to 2 hours (Orchestration-Bound)**. Total pipeline time is roughly 1.5 to 2 hours and requires 420GB/month storage, fitting easily within a nightly window.
