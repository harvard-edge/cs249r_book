title: Monitoring Architecture for Multi-Model Fleet
scenario: Your platform grew from 10 to 500 models. The existing flat monitoring (all metrics in one dashboard) is unusable, creating too many alerts and no clear escalation path.
question: "How would you design monitoring for 500 models, and which of per-model dashboards, anomaly detection, or SLOs should be primary?"
details:
  realistic_solution: 'Implement SLO-based monitoring with error budgets as the primary framework, augmented with fleet-wide anomaly detection. Group the 500 models into 3-4 criticality tiers (e.g., Tier 1: 99.9% accuracy). Track error budget burn rates; if a model burns >50% of its budget in 24 hours, it triggers an actionable alert. This completely eliminates alert noise from healthy models. Anomaly detection provides a secondary catch-all for unknown-unknowns without requiring manual threshold tuning.'
  common_mistake: |
    **The Pitfall:** Scaling up the existing system by creating 500 individual per-model dashboards.
    **The Rationale:** Engineers lean on their experience with microservices, assuming every deployed artifact needs its own granular glass pane.
    **The Consequence:** Massive alert fatigue. Dashboards are ignored, critical failures are lost in the noise, and on-call engineers burn out.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 500 models.
       - Option A (Dashboards): 1 per model.
       - Option B (Anomaly): 1 fleet view, ~5-10 statistical alerts/day.
       - Option C (SLOs): 3-4 Tiers, alerts only on burn rate.
    2. **Calculations:**
       - Option A overhead: 500 dashboards = 100% guarantee of alert fatigue and unmanageable maintenance.
       - Option C (SLOs) alerts: ~10-15 highly actionable, severity-mapped alerts per day across the entire fleet.
    3. **Conclusion & Interpretation:**
       - **Result: SLOs + Error Budgets.** The operations team is **Human-Attention-Bound**; error budgets mathematically restrict alerts to genuine SLA-threatening events.
