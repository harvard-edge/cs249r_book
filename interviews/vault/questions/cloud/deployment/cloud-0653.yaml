title: The Inference Batch Size Sweet Spot
scenario: You are serving a 7B parameter LLM on a single H100 for a chat application. At batch size 1, you get 40 tokens/second but the GPU is only 5% utilized. At batch size 256, you get 2,000 tokens/second but latency per request is 3 seconds. Your SLA requires <500ms latency.
question: How would you use roofline analysis to find the batch-size sweet spot for the 7B LLM on one H100 under the <500ms SLA?
details:
  realistic_solution: Roofline analysis explains why batching helps, but the ridge point is not the serving sweet spot by itself. Use roofline to estimate whether decode is memory-bound or compute-bound as batch grows, then run measured latency/throughput sweeps and choose the knee of the curve that still satisfies the <500ms SLA. In the given observations, batch 256 is far outside the latency budget, so the practical cap is a smaller batch that improves arithmetic intensity while keeping measured P99 latency under 500ms.
  common_mistake: |
    **The Pitfall:** Blindly maximizing batch size until the latency SLA is violated.
    **The Rationale:** Engineers treat the problem as a linear search without understanding the underlying phase transition.
    **The Consequence:** The system operates in a highly variable compute-bound regime where slight load spikes cause cascading SLA violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA: <500ms latency. 7B LLM on H100.
    - Roofline is used for capacity reasoning; the serving batch cap comes from measured latency.

    **Calculations:**
    - Decode FLOPs per generated token: about 2 * 7B = 14 GFLOPs per sequence.
    - Weight bytes streamed per decode step: about 7B params * 2 bytes = 14 GB if the weights are read once and reused across the batch.
    - Batch-dependent arithmetic intensity: AI(B) ≈ (B * 14 GFLOPs) / 14 GB = B FLOPs/byte.
    - H100 ridge point: 989 TFLOP/s / 3.35 TB/s ≈ 295 FLOPs/byte, so pure decode reaches the ridge only near batch 295.
    - But the measured batch-256 point has 3s latency, which violates the 500ms SLA by 6x.
    - A crude interpolation gives an upper search region near 256 * 0.5 / 3 ≈ 43 requests, but the real choice must come from the measured P99 latency curve.
    - Candidate batches around 16, 32, and 48 should be benchmarked; select the highest-throughput point before P99 crosses 500ms.

    **Conclusion & Interpretation:**
    - **Result: Choose the SLA Knee, Not the Ridge Alone.** Roofline shows larger batches improve hardware efficiency while decode remains memory-bound, but production batch size is the measured latency/throughput knee below 500ms, likely well below the roofline ridge near 295.
