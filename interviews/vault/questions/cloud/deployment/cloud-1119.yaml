title: Control Loop Thrashing in Gang Scheduling
scenario: You operate an ML cluster with 1,024 A100 GPUs across 128 nodes. Distributed training jobs use a declarative CRD requiring gang-scheduling. A user requests a 32-GPU job. The cluster has 40 fragmented GPUs available. The controller creates 32 Pods. The default scheduler binds 24 Pods but leaves 8 Pending. After a 60-second timeout, the controller deletes the 24 bound Pods and recreates the full set of 32, triggering a continuous cycle.
question: What flaw causes the 32-GPU job's control-plane thrashing, what is the impact, and how would you fix it?
details:
  realistic_solution: Decouple resource reservation from pod creation. Introduce a PodGroup or Queueing CRD (e.g., Kueue or Volcano). The controller creates the PodGroup first. The scheduler evaluates the 32-GPU requirement atomically and only provisions the actual Pods when the full gang can be topologically satisfied, eliminating partial state thrashing.
  common_mistake: |
    **The Pitfall:** Focusing purely on node defragmentation while ignoring control-plane mechanics.
    **The Rationale:** Engineers assume the problem is a lack of contiguous GPUs, completely overlooking the infinite retry loop programmed into the eager pod creation controller.
    **The Consequence:** The API server is hammered with endless create/bind/delete requests, artificially inflating latency and bringing down the entire cluster control plane.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each 60s retry creates 32 Pods.
    - The scheduler binds 24 Pods and leaves 8 Pending.
    - The controller then deletes the 24 bound Pods and recreates the full 32-Pod set.
    **Calculations:**
    - Per retry cycle: 32 creates + 24 binds + 24 deletes = 80 control-plane object updates per minute.
    - The 8 Pending Pods are not deleted in this simplified count; including status updates would only increase API-server load.
    **Conclusion & Interpretation:**
    - **Result: The thrashing inflates API server latency.** A PodGroup or queueing CRD avoids these 80 repeated updates per minute by admitting the gang only when all 32 GPUs can be scheduled together.
