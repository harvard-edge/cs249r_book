title: Thermal-Limited GPU Power Capping
scenario: Your 256-GPU cluster normally runs 700W GPUs. During a heatwave, the facility cooling system can reject only 250 kW for this cluster, including GPUs, CPUs, networking, and cooling overhead.
question: How do you adjust GPU scheduling to stay within the 250 kW thermal rejection limit?
details:
  realistic_solution: |
    Power management strategy: (1) Power cap GPUs: use the cluster's supported power-limit tooling to reduce the limit from 700W to about 390W. If profiling shows this costs roughly 25% throughput, new GPU power is 256 x 390W = 99.8 kW. Total with 90 kW of non-GPU load and PUE 1.3 is (99.8 + 90) x 1.3 = 246.7 kW, leaving a small margin below the 250 kW thermal rejection limit. (2) Selective throttling: power-cap batch training jobs first while preserving SLA-critical inference where possible. (3) Consolidate efficient jobs and defer low-priority batch work until cooling capacity returns.
  common_mistake: |
    **The Pitfall:** Shutting down GPUs entirely.
    **The Rationale:** Reacting to the thermal limit by killing jobs rather than optimizing the performance-per-watt curve.
    **The Consequence:** Drastically reduced cluster throughput and wasted idle compute capacity, violating SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs at 700W. Thermal limit: 250 kW.
    - Power cap at 390W reduces throughput by ~25% based on workload profiling.
    - Overhead: 90 kW, PUE: 1.3.

    **Calculations:**
    - Capped GPU power: 256 * 390W = 99.84 kW.
    - Total facility power: (99.84 kW + 90 kW) * 1.3 = 246.79 kW.
    - Full-power GPU draw alone would be 256 * 700W = 179.2 kW, before non-GPU load and cooling overhead, so the cluster must be capped or partially scheduled.
    - The 390W cap keeps estimated facility heat below the cooling limit with only the profiled throughput loss.

    **Conclusion & Interpretation:**
    - **Result: about 246.8 kW total facility power, below the 250 kW thermal limit**. Power capping and low-priority job deferral keep the cluster within the facility cooling constraint.
