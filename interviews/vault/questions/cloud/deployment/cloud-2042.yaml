title: The Product Quantization Memory Tradeoff
scenario: Your 100M-vector index (768-dim, FP32) requires 306 GB of RAM. The infrastructure team says you can have at most 64 GB. A colleague suggests Product Quantization (PQ) with 96 subquantizers and 256 centroids each.
question: How much memory does the PQ-compressed index require, and what is the recall cost?
details:
  realistic_solution: 'PQ with 96 subquantizers (each covering 768/96 = 8 dimensions) and 256 centroids per subquantizer encodes each vector as 96 bytes (one uint8 centroid ID per subquantizer). Memory: 100M × 96 bytes = 9.6 GB — a 32× compression from the original 306 GB. This easily fits in 64 GB with room for HNSW graph overhead and IVF lists. The recall cost: typical recall drops from ~0.95 (HNSW on raw vectors) to ~0.80-0.85 with PQ alone. Mitigation: use IVF-PQ with HNSW on centroids, and add a reranking step that re-scores the top-100 PQ results against the original vectors (stored on SSD). This gets recall back to ~0.93 at the cost of ~5ms additional SSD reads.'
  common_mistake: |
    **The Pitfall:** Confusing Product Quantization with simple scalar quantization.
    **The Rationale:** Engineers assume PQ just reduces precision of each float to an integer.
    **The Consequence:** They underestimate the extreme compression PQ offers by replacing subvectors with centroid IDs, failing to realize it operates on an entirely different mechanism of approximate distance computation.
  napkin_math: |
    - **Original Memory:** 100M × 768 × 4B = 307.2 GB.
    - **PQ Memory:** PQ-96 encodes each vector as 96 bytes: 100M × 96B = 9.6 GB (32× compression).
    - **Codebook Memory:** 96 subquantizers × 256 centroids × 8 dims × 4B = 768 KB (negligible).
    - **Total Index:** IVF with 16K lists + PQ + HNSW adds some overhead, totaling ~12 GB.
    - **Result:** **The ~12 GB index easily fits in 64 GB. Reranking SSD read overhead for top-100 × 3 KB/vector = 300 KB ≈ 1ms on NVMe.**
