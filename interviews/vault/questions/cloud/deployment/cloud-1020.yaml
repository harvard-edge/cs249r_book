title: In-Place Rolling Deployment VRAM Saturation
scenario: An in-place rolling deployment updates a 15GB DLRM model on a fleet of 16GB GPUs handling 10k QPS. During the rollout, the new model is loaded before the old is unloaded, causing P99 latency to spike from 50ms to over 500ms.
question: Why does the in-place zero-downtime rollout of two 15GB DLRM models on 16GB GPUs spike P99 latency, and what architecture fixes it?
details:
  realistic_solution: 'The 16GB VRAM cannot hold two 15GB models simultaneously. The system falls back to PCIe unified memory (swapping to system RAM), drastically reducing bandwidth (e.g., 320GB/s VRAM to 16GB/s PCIe) and causing latency spikes. The fix is to use true Blue/Green deployment on separate instances, or drain the node, unload the old model, load the new model, and re-introduce the node to the load balancer.'
  common_mistake: |
    **The Pitfall:** Blaming model warm-up overhead or network bandwidth instead of hard memory limits.
    **The Rationale:** Zero-downtime deployments often experience brief CPU or network congestion during handoff.
    **The Consequence:** Masking the true hardware constraint. VRAM swapping cripples inference throughput and leads to random OutOfMemory crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16GB VRAM capacity.
    - Models: 15GB (old) + 15GB (new).

    **Calculations:**
    - VRAM Required = 30GB. VRAM Deficit = 14GB.
    - Driver falls back to unified memory swapping over PCIe (e.g., 16 GB/s vs native 320 GB/s).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** The hard VRAM constraint forces massive PCIe swapping, causing severe latency spikes. Fix requires Blue/Green deployment on separate instances.
