title: In-Place Rolling Deployment VRAM Saturation
scenario: An in-place rolling deployment updates a 15GB DLRM model on a fleet of 16GB GPUs handling 10k QPS. During the rollout, the new model is loaded before the old is unloaded, causing P99 latency to spike from 50ms to over 500ms.
question: Why does the in-place zero-downtime rollout of two 15GB DLRM models on 16GB GPUs spike P99 latency, and what architecture fixes it?
details:
  realistic_solution: The 16GB VRAM cannot hold two 15GB models simultaneously, even before accounting for runtime activation, framework, and allocator overhead. Depending on the serving stack, the rollout either OOMs or spills/offloads memory over PCIe, drastically reducing effective bandwidth and causing latency spikes. The fix is to use true Blue/Green deployment on separate instances, or drain the node, unload the old model, load the new model, and re-introduce the node to the load balancer.
  common_mistake: |
    **The Pitfall:** Blaming model warm-up overhead or network bandwidth instead of hard memory limits.
    **The Rationale:** Zero-downtime deployments often experience brief CPU or network congestion during handoff.
    **The Consequence:** Masking the true hardware constraint. VRAM swapping cripples inference throughput and leads to random OutOfMemory crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16GB VRAM capacity.
    - Models: 15GB (old) + 15GB (new).

    **Calculations:**
    - VRAM Required for weights alone = 30GB.
    - Minimum VRAM deficit before runtime overhead = 30GB - 16GB = 14GB.
    - The serving stack must either fail with OOM or page/offload model memory over a much slower path such as PCIe.

    **Conclusion & Interpretation:**
    - **Result: 30GB > 16GB by at least 14GB.** The hard VRAM constraint makes in-place zero-downtime loading unsafe; paging/offload causes severe latency spikes when available, and otherwise the process OOMs. Fix requires Blue/Green deployment on separate instances.
