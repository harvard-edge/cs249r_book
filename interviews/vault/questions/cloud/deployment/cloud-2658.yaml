title: Preventing Undeclared Dependencies at Scale
scenario: 'Your organization has 50 ML models consuming features from 200+ upstream data sources. Option A: build a centralized feature store with versioned feature schemas ($500K, 6 months). Option B: add statistical monitoring on all model inputs ($100K, 2 months). Option C: require upstream teams to register all schema/logic changes in a shared catalog ($50K, 1 month).'
question: Which strategy best prevents silent failures at scale?
details:
  realistic_solution: 'Option A, the centralized feature store with versioned feature schemas, is the best single strategy for preventing silent failures at scale. It lets each model pin a known feature definition, so upstream schema or logic changes create a new version instead of silently changing production inputs. Option C, the shared catalog, is a useful cheaper complement because it improves coordination, but it depends on upstream teams consistently registering changes and therefore is weaker as a primary control. Option B, statistical monitoring, is valuable as a reactive safety net: it can detect drift or broken inputs after they affect production, but it does not prevent the upstream change from reaching models. The $500K feature-store investment is justified when silent failures are high impact, but exact payback depends on the organization''s observed incident frequency and business cost.'
  common_mistake: |
    **The Pitfall:** Choosing monitoring (Option B) over prevention (Option A).
    **The Rationale:** Monitoring is significantly cheaper and faster to implement than a full feature store.
    **The Consequence:** Detecting a broken feature after predictions degrade is far more expensive in terms of business impact than preventing the breakage via versioned schemas.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A: feature store, $500K, 6 months, prevents many schema-versioning failures before they reach models.
    - Option B: statistical monitoring, $100K, 2 months, detects distribution changes after they affect inputs.
    - Option C: shared catalog, $50K, 1 month, reduces coordination failures but depends on upstream teams registering changes.
    - The prompt does not provide a defensible per-dependency incident rate, so incident counts should not be multiplied from the 200+ sources.

    **Calculations:**
    - Prevention strength: A is strongest because versioned schemas let models pin known-good feature definitions.
    - Cost/time: C is cheapest and fastest, while A is highest-cost and slowest.
    - Detection role: B is valuable coverage, but it is reactive and does not prevent the upstream change from reaching production.
    - If A prevents even a few high-impact silent failures over its lifetime, the larger implementation cost can be justified; exact payback requires observed incident frequency and impact.

    **Conclusion & Interpretation:**
    - **Result:** A feature store is the strongest single preventive control at scale, C is a low-cost governance complement, and B should be treated as a safety net rather than the primary prevention mechanism.
