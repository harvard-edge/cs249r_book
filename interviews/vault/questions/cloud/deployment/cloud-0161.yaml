title: The Code Assistant's Latency Crisis
scenario: You are leading the ML Systems team for a new AI code assistant. The product requirement is a P99 Time-To-First-Token (TTFT) of under 200ms. The service runs a 13B parameter model on GPUs. Individual prefill takes 55ms and decode takes 8ms per token.
question: "What queueing failure causes the 13B code assistant to miss its 200ms P99 TTFT SLO despite fast per-request inference?"
details:
  realistic_solution: 'The root cause is a queueing theory concept: the system''s traffic intensity is greater than 1 during micro-bursts, leading to an unstable queue. Although individual prefill (TTFT) takes 55ms, when multiple requests arrive concurrently, the GPU can only process them sequentially or in batches that increase the per-request prefill time. If arrival rate exceeds service rate, queueing delay dominates TTFT.'
  common_mistake: |
    **The Pitfall:** Assuming that fast individual components (55ms prefill) guarantee a fast overall system latency.
    **The Rationale:** Engineers often ignore queueing theory, believing that latency is just a static sum of processing times regardless of arrival rate.
    **The Consequence:** Missing the P99 SLO during micro-bursts because the system operates too close to its maximum service rate, causing queueing delays to skyrocket.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single request prefill takes 55ms.
    - Max service rate = 1 / 0.055s = 18.1 req/s per GPU.

    **Calculations:**
    - If peak traffic hits 20 req/s, traffic intensity ρ = 20 / 18.1 = 1.1 (the queue grows infinitely).
    - Even under normal load (ρ = 0.9, 16.3 req/s), an M/M/1 queue yields Average Time = 55ms / (1 - 0.9) = 550ms.

    **Conclusion & Interpretation:**
    - **Result: Queueing-Bound**. Even under normal high load, the average wait time jumps to 550ms, easily violating the 200ms P99 TTFT SLO.
