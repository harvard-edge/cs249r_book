title: Evaluating ONNX Runtime for Heterogeneous Fleet Serving
scenario: You are designing a heterogeneous serving fleet for a suite of transformer models (e.g., BERT-Large, 340M parameters) deployed across Intel Xeon CPUs, NVIDIA T4 GPUs, and AWS Inferentia instances. You must evaluate whether to maintain separate native deployment pipelines (PyTorch, TensorRT, Neuron SDK) or unify them under ONNX Runtime (ORT) using Execution Providers (EPs).
question: Should the heterogeneous serving fleet use separate native pipelines or unify under ONNX Runtime Execution Providers, and what risks must be managed?
details:
  realistic_solution: 'Unify under ORT to reduce deployment complexity, but strictly profile graph partitioning for each Execution Provider (e.g., TensorRT EP, OpenVINO EP). Ensure transformer blocks are entirely offloaded to the accelerator to prevent middle-of-graph CPU fallbacks, using custom ops or graph rewriting if necessary.'
  common_mistake: 'Assuming ONNX Runtime automatically achieves peak native performance across all backends without realizing that unsupported operators fall back to the CPU provider, introducing severe device-to-host memory copy overheads.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Pure TensorRT on T4: 2ms per transformer block.
    - Model: 24 transformer blocks.
    - CPU fallback for LayerNorm adds 1ms compute + 2ms PCIe transfers per block.

    **Calculations:**
    - Total latency (Pure TRT) = 2ms * 24 blocks = 48ms.
    - Total latency (with CPU fallback) = (2ms TRT + 1ms CPU + 2ms PCIe) * 24 blocks = 5ms * 24 = 120ms.

    **Conclusion & Interpretation:**
    - **Result: 120ms total latency with fallback (PCIe-Bandwidth-Bound)**. CPU fallback causes a 2.5x degradation due to device-to-host memory copy overheads.
