title: Batched PRNG Collisions in Logit Watermarking
scenario: You deploy a 70B LLM using continuous batching and implement a Kirchenbauer logit watermark. The PRNG for the green-list partition is seeded using the hash of the preceding token. In staging (B=1), the watermark z-score is >6.0. In production (dynamic batching up to B=64), the average z-score plummets to ~0.1, rendering it undetectable despite high text quality.
question: Why does the watermark z-score collapse from >6 at batch size 1 to ~0.1 under continuous batching with B=64?
details:
  realistic_solution: The PRNG state for the green-list generation is inadvertently synchronized across the batch dimension. If the implementation seeds a global PRNG using only the first sequence's token, sequence 0 gets a valid watermark, but sequences 1 to 63 get uncorrelated noise, destroying their watermarks. The fix is to vectorize the PRNG generation so each sequence applies a uniquely seeded green-list mask.
  common_mistake: |
    **The Pitfall:** Blaming advanced serving engine features (like PagedAttention) for watermarking failure.
    **The Rationale:** Candidates assume memory optimizations corrupt the precise logit adjustments needed for watermarking.
    **The Consequence:** Wasting time on complex architectural workarounds instead of addressing the fundamental vectorization bug in the PRNG initialization state.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Green-list ratio γ = 0.5. Sequence length N = 200 tokens.
       - Expected green tokens (Valid) μ = 100.
       - Standard deviation σ = √(200 * 0.5 * 0.5) ≈ 7.1.
    2. **Calculations:**
       - Correct watermark hits ~145 green tokens: z = (145 - 100) / 7.1 ≈ 6.3.
       - Uncorrelated noise (invalid seed) hits ~100 green tokens: z = 0.
       - At B=64, if only index 0 is seeded correctly: Batch avg z-score = (6.3 + 63 * 0) / 64 ≈ 0.1.
    3. **Conclusion & Interpretation:**
       - **Result: Algorithmic Logic Error.** The PRNG is synchronously seeded across the batch, invalidating the watermark for 63 out of 64 sequences. Vectorizing the PRNG generation is required.
