title: Strict vs Lenient Validation Gates
scenario: 'Your validation gates block 40% of model candidates. The ML team complains this slows iteration. Management wants to relax thresholds. Options: (A) relax all thresholds by 20%, (B) make fairness and latency gates strict but relax accuracy threshold, (C) add a ''provisional deploy'' path with enhanced monitoring.'
question: "Should management relax all gates, selectively relax accuracy, or add provisional deploys to reduce the 40% block rate?"
details:
  realistic_solution: Option B is best. Keep fairness and latency gates strict due to regulatory and SLA constraints. Relax accuracy threshold from 'must improve' to 'must not regress by more than 0.5%'. This safely drops the blocking rate to ~25%.
  common_mistake: |
    **The Pitfall:** Uniformly relaxing all thresholds.
    **The Rationale:** Treating all validation metrics as having equal risk profiles.
    **The Consequence:** Allowing discriminatory models into production, causing legal and reputational damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline block rate is 40%.

    **Calculations:**
    - Option A: Reduces block rate to 20% (Unacceptable safety risk).
    - Option B: Reduces block rate to 25% (Safe).
    - Option C: Reduces block rate to 10% (High monitoring overhead).

    **Conclusion & Interpretation:**
    - **Result: Option B balances iteration speed with critical safety and compliance (Process-Bound)**.
