title: Progressive Rollout of a Large Language Model with Fast Rollback
scenario: Your team has developed a larger version of a proprietary LLM critical for a high-traffic inference service. You are tasked with deploying this updated model to a production environment. The goal is to roll out this new model with minimal user-facing impact, high availability, and rapid rollback capability.
question: What progressive rollout strategy would you use to deploy the larger LLM with high availability and fast rollback?
details:
  realistic_solution: Separate shadowing from canarying. First deploy the new model beside the old version and mirror a sampled copy of live traffic to it asynchronously, discarding responses while measuring correctness, TTFT, TPOT, error rate, saturation, and memory headroom. After shadow metrics pass, route a small live canary such as 1% to 5% of user traffic to the new model while the old model continues serving the rest. Increase traffic in controlled steps only when latency, error, quality, and resource gates remain within the production budget. Rollback must be a fast routing change that sends all live traffic back to warm old-model replicas, with automated abort criteria for P99/TTFT regression, elevated failures, capacity loss, or correctness drift.
  common_mistake: |
    **The Pitfall:** Performing a "big bang" deployment or replacing instances simultaneously.
    **The Rationale:** Candidates underestimate the risk of silent performance regressions or resource consumption spikes in production.
    **The Consequence:** A catastrophic service outage requiring a slow and complex rollback, breaking the high-availability SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shadow traffic executes the new model but does not return responses to users.
    - Live canary traffic does return responses and must meet the production latency/error budget.
    - Rollback should be a routing change, not a model reload.

    **Calculations:**
    - Phase 1: mirror a small traffic sample to warm and measure the new deployment without user-visible impact.
    - Phase 2: route 1% to 5% live canary traffic only after shadow metrics show acceptable TTFT, TPOT, error rate, and HBM headroom.
    - Phase 3: increase live traffic gradually while keeping the old model serving the remaining traffic for fast rollback.

    **Conclusion & Interpretation:**
    - **Result: Rollout-risk-bound.** Shadowing validates performance and correctness signals, while live canary percentages consume serving capacity and should advance only when SLO metrics stay within thresholds.
