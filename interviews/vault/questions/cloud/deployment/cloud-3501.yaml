title: Progressive Rollout of a Large Language Model on AMD MI300X Cluster
scenario: 'Your team has developed a larger version of a proprietary LLM critical for a high-traffic inference service. You are tasked with deploying this updated model to a production environment. The goal is to roll out this new model with minimal user-facing impact, high availability, and rapid rollback capability.'
question: 'What progressive rollout strategy would you use to deploy the larger LLM with high availability and fast rollback?'
details:
  realistic_solution: 'Implement a Canary Deployment combined with shadow traffic (Dark Launching). Deploy the new model to a 5% canary subset and mirror live traffic to it asynchronously, discarding responses. Monitor key telemetry (TTFT, TPOT, HBM utilization). If stable, gradually route live user traffic (10%, 25%, 100%). By hosting the model entirely on single large-memory instances where possible, you avoid cross-device model parallelism complexities during the rollout.'
  common_mistake: |
    **The Pitfall:** Performing a "big bang" deployment or replacing instances simultaneously.
    **The Rationale:** Candidates underestimate the risk of silent performance regressions or resource consumption spikes in production.
    **The Consequence:** A catastrophic service outage requiring a slow and complex rollback, breaking the high-availability SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter LLM requires ~140 GB in FP16.
    - Hardware: 192 GB HBM accelerators.

    **Calculations:**
    - Model fits on a single accelerator (140 GB < 192 GB).
    - 5% canary on a 100-node cluster uses 5 isolated nodes.

    **Conclusion & Interpretation:**
    - **Result: Shadowing 5% traffic ensures safe capacity scaling before wider rollout without risking user impact (Availability-Bound).**
