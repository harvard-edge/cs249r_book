title: Decode Preemption and KV Swap
scenario: Under heavy load, your decode scheduler preempts low-priority in-flight sequences by swapping their KV-cache to CPU DRAM to free HBM for new high-priority requests. Users report that preempted requests, when resumed, have TPOT 8x higher than normal for the first 20 tokens before recovering.
question: Why do resumed preempted sequences have 8x TPOT for the first 20 tokens, and how would you fix it?
details:
  realistic_solution: 'When a preempted sequence resumes, its KV-cache must be swapped back from CPU DRAM to GPU HBM over PCIe. The true 8x slowdown is due to page-fault stalls if using demand paging. Fix: (1) Use asynchronous KV swap with double-buffering. (2) Reduce swap frequency by increasing HBM KV pool. (3) Use NVLink-attached CPU memory pools.'
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to CPU-GPU synchronization overhead or Python scheduler latency.
    **The Rationale:** Candidates often jump to software overheads when seeing latency spikes upon resuming a task, forgetting hardware data movement.
    **The Consequence:** The real cause (PCIe bandwidth saturation or page faults) is ignored, leading to ineffective software-only fixes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Preempted sequence resumes, swapping KV-cache over PCIe.
    - HBM bandwidth is 3.35 TB/s. PCIe bandwidth is ~64 GB/s.
    - Model size 140 GB.

    **Calculations:**
    - Normal Step Time: 140 GB / 3.35 TB/s = 41.8 ms.
    - PCIe Contention: Effective HBM bandwidth drops to ~2 TB/s during swap-in.
    - Step time becomes 140 / 2.0 = 70 ms. Ratio: 70 / 41.8 = 1.67x.
    - True Slowdown: Demand paging causes page-fault stalls. Stall per fault * 20 pages ≈ 8x overhead.

    **Conclusion & Interpretation:**
    - **Result: 8x Overhead (Memory-Bound)**. The real cause is page-fault stalls from demand paging, leading to an ~8x overhead that cannot be explained by PCIe bandwidth saturation alone.
