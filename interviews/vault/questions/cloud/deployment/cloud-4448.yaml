title: MI300X vs H100 Decode Pool Economics
scenario: 'Your team is choosing between H100 SXM5 and MI300X for the decode pool of a 70B disaggregated serving cluster. Cost: H100 ~$3/hr, MI300X ~$4/hr.'
question: Which GPU would you choose for the 70B decode pool, H100 SXM5 or MI300X, based on cost per token and memory capacity?
details:
  realistic_solution: 'Decode is usually memory-bandwidth bound once batching is high enough, and the 70B BF16 weights are about 140GB. A single 80GB H100 cannot hold the model, so use 2x H100 with tensor parallelism: about 6.7 TB/s aggregate HBM before TP overhead at $6/hr. A single MI300X fits the model in 192GB HBM with about 52GB left for KV cache, provides 5.3 TB/s, and costs about $4/hr. Normalized by bandwidth per dollar, H100 TP=2 gives 6.7 / 6 = 1.12 TB/s per $/hr, while MI300X gives 5.3 / 4 = 1.33 TB/s per $/hr, about 19% better before accounting for avoided TP communication. Choose MI300X for this decode pool if software maturity and kernel coverage are acceptable.'
  common_mistake: |
    **The Pitfall:** Comparing the GPUs solely on their peak TFLOPS compute capability instead of their Memory Bandwidth (GB/s per dollar).
    **The Rationale:** Engineers default to evaluating hardware by raw compute power, failing to recognize that LLM auto-regressive decoding is strictly memory-bandwidth bound at typical serving batch sizes.
    **The Consequence:** Procurement makes an inefficient multi-million dollar capital expenditure on hardware that yields significantly lower tokens-per-second per dollar.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B params (140GB in BF16).
    - H100 SXM5: 80GB HBM, 3.35 TB/s bandwidth, ~$3/hr.
    - MI300X: 192GB HBM, 5.3 TB/s bandwidth, ~$4/hr.

    **Calculations:**
    - H100 requires 2 GPUs (TP=2) to fit the 140GB model. Cost = $6/hr.
    - MI300X fits the 140GB model on a single GPU. Cost = $4/hr.
    - H100 (TP=2) aggregate bandwidth ≈ 6.7 TB/s before tensor-parallel communication overhead.
    - MI300X single-GPU bandwidth ≈ 5.3 TB/s and avoids TP all-reduce overhead.
    - Bandwidth per dollar: H100 pair = 6.7 / 6 = 1.12 TB/s per $/hr.
    - Bandwidth per dollar: MI300X = 5.3 / 4 = 1.33 TB/s per $/hr.
    - Relative cost efficiency: 1.33 / 1.12 - 1 ≈ 19% better for MI300X under bandwidth-bound decode.
    - If a benchmark gives H100 TP=2 about 6000 tok/sec, proportional MI300X throughput is 6000 * 5.3 / 6.7 ≈ 4746 tok/sec before TP-overhead adjustments.
    - Cost per 1000 tokens: H100 pair = 6 / (6000 * 3600) * 1000 = $0.000278; MI300X = 4 / (4746 * 3600) * 1000 = $0.000234.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity & Bandwidth Bound.** MI300X is about 16-19% cheaper per token under these assumptions and has enough memory for model weights plus KV headroom.
