title: MI300X vs H100 Decode Pool Economics
scenario: 'Your team is choosing between H100 SXM5 and MI300X for the decode pool of a 70B disaggregated serving cluster. Cost: H100 ~$3/hr, MI300X ~$4/hr.'
question: 'Which GPU would you choose for the 70B decode pool, H100 SXM5 or MI300X, based on cost per token and memory capacity?'
details:
  realistic_solution: 'Decode is memory-bandwidth bound: throughput proportional to HBM bandwidth. H100 decode tokens/sec per GPU: bandwidth / model_bytes_per_token = 3.35TB/s / (70B*2B) = 3.35e12 / 140e9 = 23.9 tok/sec at batch=1. MI300X: 5.3TB/s / 140GB = 37.9 tok/sec at batch=1. At large batches, both scale roughly proportionally with bandwidth. Cost comparison: H100 pair (TP=2) at $6/hr vs MI300X single at $4/hr. For single-GPU batch decode, MI300X 19% more cost-efficient. Memory capacity advantage: MI300X 192GB vs H100 80GB. 70B model weights: 140GB BF16. H100: needs 2×H100 (TP=2) for 70B decode. MI300X: fits on single GPU with 52GB KV headroom. H100 pair: $6/hr at TP=2. MI300X single: $4/hr. MI300X wins decisively for 70B decode.'
  common_mistake: |
    **The Pitfall:** Comparing the GPUs solely on their peak TFLOPS compute capability instead of their Memory Bandwidth (GB/s per dollar).
    **The Rationale:** Engineers default to evaluating hardware by raw compute power, failing to recognize that LLM auto-regressive decoding is strictly memory-bandwidth bound at typical serving batch sizes.
    **The Consequence:** Procurement makes an inefficient multi-million dollar capital expenditure on hardware that yields significantly lower tokens-per-second per dollar.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B params (140GB in BF16).
    - H100 SXM5: 80GB HBM, 3.35 TB/s bandwidth, ~$3/hr.
    - MI300X: 192GB HBM, 5.3 TB/s bandwidth, ~$4/hr.

    **Calculations:**
    - H100 requires 2 GPUs (TP=2) to fit the 140GB model. Cost = $6/hr.
    - MI300X fits the 140GB model on a single GPU. Cost = $4/hr.
    - H100 (TP=2) effective bandwidth ≈ 6.7 TB/s (minus sync overhead).
    - At high batch sizes (e.g., 128), H100 TP=2 yields ~6,000 tok/sec ($0.000272/K-tok).
    - MI300X single yields ~4,800 tok/sec ($0.000229/K-tok).

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity & Bandwidth Bound**. The MI300X wins decisively. By fitting the model on a single node, it avoids tensor-parallel overhead and provides a ~16% cheaper cost-per-token for 70B decoding.
