title: The KV-Cache OOM Attack
scenario: Your LLM serving endpoint supports 32k context. On Monday, your cluster starts OOM-killing pods every few minutes. The traffic volume hasn't increased, but you notice a handful of users sending prompts that are exactly 32,000 tokens — the maximum. Before Monday, average prompt length was 500 tokens.
question: "How does a 64x increase in prompt length from a few users crash the entire cluster, and what's your emergency response?"
details:
  realistic_solution: 'The KV-cache memory for a single request scales linearly with sequence length. A 32k-token request consumes 64x the KV-cache of a 500-token request. If the scheduler admits requests based on *count* rather than *memory*, a few 32k requests can exhaust the entire KV-cache budget. Emergency response: implement admission control based on *memory budget*.'
  common_mistake: |
    **The Pitfall:** "Just reject prompts over a certain length" or "Add more GPUs to handle the load."
    **The Rationale:** Candidates treat symptoms instead of identifying the underlying resource allocation logic flaw.
    **The Consequence:** Rejecting long prompts breaks legitimate use cases, and adding GPUs doesn't solve the underlying scheduler vulnerability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model on 80GB GPU. Weights = ~14 GB. Free for KV-cache = ~66 GB.
       - KV-cache per token: 32 layers, 32 heads, 128 dim, FP16.
    2. **Calculations:**
       - KV size per token: 2 × 32 × 32 × 128 × 2B = 524,288 bytes (512 KiB).
       - Normal load (500 tokens): 500 × 512 KiB = ~250 MiB/request.
       - Adversarial load (32k tokens): 32,000 × 512 KiB = ~15.6 GiB/request.
       - 5 adversarial requests: 5 × 15.6 GiB = 78 GiB.
    3. **Conclusion & Interpretation:** **Just 5 maximum-length requests consume 78 GiB, instantly exceeding the 66 GB budget and triggering an OOM. Result: Memory-Bound.**
