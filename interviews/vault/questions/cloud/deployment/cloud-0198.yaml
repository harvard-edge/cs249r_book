title: The Streaming vs Batch Inference
scenario: Our chatbot returns the full response only after all tokens are generated. Users say it feels 'broken' — they stare at a blank screen for 8 seconds. A colleague suggests streaming tokens as they're generated.
question: When does token streaming reduce perceived latency for the 8-second chatbot response, and when can it hurt?
details:
  realistic_solution: 'Streaming decouples perceived latency from total latency. The user sees the first token after TTFT (prefill time), then each subsequent token arrives at TPOT intervals. The *perceived* wait is TTFT (~200ms), not the total generation time. But streaming adds: (1) SSE/WebSocket framing overhead (~0.5ms/token), (2) client-side rendering cost, and (3) inability to retry or filter the full response before sending. For short responses, the total time with streaming overhead can exceed the non-streaming total time.'
  common_mistake: |
    **The Pitfall:** Assuming that streaming always strictly improves the user experience.
    **The Rationale:** Candidates understand that streaming improves Time-To-First-Token (TTFT), but forget the network and client-side overhead (SSE framing, DOM updates) incurred per token.
    **The Consequence:** Implementing streaming for micro-responses (e.g., boolean outputs), resulting in a slower and more complex system than simple batching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Short response (5 tokens).
    - Prefill time: 200ms. Decode time: 40ms. RTT: 50ms.
    - Streaming overhead: 5ms per token.

    **Calculations:**
    - Batch Response: 200ms + 40ms + 50ms = 290ms total.
    - Streamed Response: 200ms + 40ms + 50ms + (5 * 5ms) = 315ms total.

    **Conclusion & Interpretation:**
    - **Result: 315ms vs 290ms (Network Overhead).** Streaming adds measurable overhead per token, making it perceptibly slower for very short responses, but it drastically improves perceived wait for long responses.
