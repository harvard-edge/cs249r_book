title: The Embedding Model Drift Crisis
scenario: Your team upgrades the embedding model from v1 to v2. You have 200M documents embedded with v1 and new documents arriving at 100K/day embedded with v2. Re-embedding all 200M documents at once costs $20K compute and 3 days of downtime.
question: How do you manage the transition to the new embedding model without degrading retrieval quality or causing downtime?
details:
  realistic_solution: 'Multi-phase migration strategy: (1) Learn a lightweight alignment transform (linear projection matrix W that maps v2 embeddings into v1 space, trained on 50K paired documents embedded with both models). Apply W to new documents and queries so they remain comparable with the existing v1 index during migration. (2) Background re-embedding: re-embed 200M documents with native v2 embeddings and build a v2 index without taking search offline. (3) Shadow validation: run v2 retrieval in parallel for evaluation only, measuring recall, ranking quality, latency, and business metrics against v1. (4) Cutover: switch traffic to the v2 index only after coverage is complete and quality gates pass, then retire the v1 index and alignment transform.'
  common_mistake: |
    **The Pitfall:** Running both embedding models and searching both indexes for every query.
    **The Rationale:** Relevance scores across different embedding spaces are not comparable, breaking rank logic.
    **The Consequence:** This doubles query latency and compute cost indefinitely, degrading search quality.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200M existing documents at $0.0001 per re-embed.
    - 100K new documents/day.
    - Alignment transform uses a 1536x1536 matrix trained from paired embeddings.

    **Calculations:**
    - Background re-embed cost: 200M * $0.0001 = $20,000.
    - Query-time transform work per embedding: 1536 * 1536 = 2.36M multiply-adds, or about 4.72M FLOPs if multiply and add are counted separately.
    - New-document transform volume: 100K/day * 2.36M multiply-adds = 236B multiply-adds/day, separate from the $20K re-embed job.
    - The per-query latency impact depends on implementation, batching, memory locality, and hardware; it is not derivable from FLOP count alone.

    **Conclusion & Interpretation:**
    - **Result: Migration-Bound**. The alignment transform can avoid downtime while the 200M-document re-embed runs in the background, but its query-time overhead must be benchmarked rather than claimed as <1ms from these assumptions.
