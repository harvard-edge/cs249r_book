title: Kubernetes Orchestration for High-Performance ML Training with NVIDIA A100
scenario: Your team is tasked with designing a scalable and efficient machine learning training platform on Kubernetes. The platform needs to support multiple research teams running diverse deep learning workloads on nodes equipped with NVIDIA A100 GPUs (80 GB HBM2e, 400W TDP).
question: How would you design the Kubernetes configuration, including GPU device plugins, node affinity, and job scheduling policies, to maximize utilization and minimize turnaround times?
details:
  realistic_solution: 'The solution involves several components: 1. **NVIDIA Device Plugin:** Ensure the official NVIDIA device plugin is installed to expose GPUs as schedulable resources (e.g., `nvidia.com/gpu`). 2. **Resource Management:** Enforce strict `resource requests` and `limits` for GPU memory and compute for each ML training pod to prevent oversubscription and ensure fair allocation. 3. **Node Affinity/Selectors:** Use `nodeSelector` or `nodeAffinity` to target nodes with A100 GPUs. For more complex scenarios, `taints` and `tolerations` can isolate specific GPU types or prevent non-GPU workloads from running on GPU nodes. 4. **Pod Priority and Preemption:** Implement Pod Priority and Preemption to ensure critical training jobs (e.g., production model training) get preference over lower-priority research jobs. 5. **Advanced Scheduling (Optional but Recommended):** For maximizing utilization and ensuring fairness, consider: Scheduler Extenders (apply specific policies like gang
    scheduling or bin-packing) or Volcano (an open-source batch system built on Kubernetes for ML workloads). 6. **Monitoring:** Deploy monitoring (e.g., Prometheus and Grafana) to track GPU utilization, memory usage, temperature, and power consumption per GPU and node to identify bottlenecks and optimize resource allocation. 7. **Container Runtimes:** Ensure `containerd` is configured to use the `nvidia-container-runtime`.'
  common_mistake: |
    **The Pitfall:** Installing the NVIDIA device plugin without configuring proper resource requests, limits, or advanced schedulers.
    **The Rationale:** Engineers assume default Kubernetes scheduling is sufficient for complex, high-demand GPU workloads.
    **The Consequence:** Jobs are poorly distributed, leading to severe GPU underutilization, resource contention, and starvation for critical training tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each training pod requests exactly 1 A100.
    - The cluster has 16 A100s available during a scheduling window.
    - Incoming jobs request [8, 4, 2, 2] GPUs.

    **Calculations:**
    - Gang scheduling starts the 8-GPU job only when all 8 GPUs are available, avoiding partial allocation with idle workers.
    - Bin-packing the remaining jobs uses 4 + 2 + 2 = 8 GPUs on the other available capacity.
    - Packed utilization during the window = (8 + 4 + 2 + 2) / 16 = 100%.
    - If the scheduler fragments the 4-, 2-, and 2-GPU jobs across nodes needed by the 8-GPU job, the 8-GPU job waits and effective utilization can drop to 8 / 16 = 50% while capacity is stranded.

    **Conclusion & Interpretation:**
    - **Result: Scheduling-bound utilization.** Device plugins expose GPUs, but gang scheduling, priority, and topology-aware bin-packing determine whether A100 capacity is used efficiently and whether large jobs avoid long queue delays.
