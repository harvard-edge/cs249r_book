title: Cloud Train Serve Split L2 0
scenario: Your company trains a 7B parameter language model in the cloud but wants to deploy inference on edge devices.
question: What is the train-serve split architecture, and why does it work for deploying a cloud-trained 7B model on edge devices?
details:
  realistic_solution: 'Train-serve split separates the compute-intensive training phase (requiring many GPUs, large datasets, high bandwidth) from the inference phase (requiring low latency, lower compute). Training stays in the cloud because it needs massive parallelism (hundreds of GPUs), huge datasets, and runs for days/weeks. Inference runs locally because it needs low latency, works offline, and the model (after quantization) fits on edge hardware. The bridge is model export: train in FP16/BF16, quantize to INT8/INT4, and deploy the compressed model.'
  common_mistake: |
    **The Pitfall:** Assuming the train-serve split is a fire-and-forget process where the edge device never receives updates.
    **The Rationale:** Engineers focus purely on the immediate hardware constraint (fitting the model on the phone) without considering the lifecycle.
    **The Consequence:** The model drifts over time and degrades in accuracy, requiring a complex retroactive engineering effort to build an edge update pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameter model.
    - AdamW optimizer for training. INT4 quantization for edge.

    **Calculations:**
    - Training Memory: 7B params * 16 bytes/param (AdamW) = ~112 GB VRAM.
    - Inference Memory: 7B params * 0.5 bytes/param (INT4) = ~3.5 GB RAM.

    **Conclusion & Interpretation:**
    - **Result: 3.5 GB RAM (Memory-Bound)**. Training strictly requires cloud multi-GPU, but INT4 fits seamlessly on a 6 GB smartphone.
