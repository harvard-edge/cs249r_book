title: The Blue/Green Memory Tax
scenario: Your team is serving a 7-billion parameter language model using FP16 precision. You are planning a blue/green deployment to roll out an updated version.
question: How much GPU memory is required for FP16 weights during the blue/green rollout of the 7B model?
details:
  realistic_solution: A 7B model in FP16 precision requires 2 bytes per parameter. This results in 14 GB of memory for a single model's weights. Because a blue/green deployment requires both the old and new models to be loaded simultaneously to ensure a seamless traffic switch, you must have enough memory for both. Therefore, the peak memory requirement is double that of a single model, which is 28 GB.
  common_mistake: |
    **The Pitfall:** Calculating the memory needed for a single model instance and forgetting the duplication required for blue/green.
    **The Rationale:** Engineers provision capacity only for the final running state, not the transient state where both versions exist simultaneously.
    **The Consequence:** OutOfMemory errors or pending pods in Kubernetes during the critical rollout phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters.
    - Precision: FP16 (2 bytes per parameter).
    - Blue/Green deployment: requires both versions loaded.

    **Calculations:**
    - Memory for one model = 7B * 2 bytes = 14 GB.
    - Total memory for blue/green = 14 GB * 2 = 28 GB.

    **Conclusion & Interpretation:**
    - **Result: 28 GB (Memory Capacity-Bound)**. The transient peak memory requirement is 28 GB.
  options:
  - 14 GB
  - 7 GB
  - 28 GB
  - 56 GB
  correct_index: 2
