title: Calculating the Training vs. Inference Cost Crossover
scenario: You are the platform lead for a new 70B parameter LLM API. The model was trained from scratch over 30 days on a 1024-GPU cluster at $3/GPU-hour. To meet expected traffic, the serving infrastructure requires an active fleet of 500 8-GPU nodes.
question: "In how many days will inference costs exceed the initial 30-day training cost for the 70B LLM API?"
details:
  realistic_solution: Calculate total training cost and hourly inference cost, dividing to find that inference costs exceed training costs in just over a week (7.6 days), proving that inference optimization should be the highest operational priority.
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing the initial training phase.
    **The Rationale:** Training visually consumes massive bulk-compute allocations up front.
    **The Consequence:** Treating serving efficiency as an afterthought when it is mathematically the primary cost driver over the product's lifecycle.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs for 30 days, $3/hr. Serving fleet of 500 8-GPU nodes.

    **Calculations:**
    - Training cost = 1024 * $3 * 24 * 30 = $2.21M.
    - Serving cost = 4000 * $3 = $12k/hr. Crossover = 2.21M / 12k = 184.3 hours = 7.68 days.

    **Conclusion & Interpretation:**
    - **Result: TCO-Bound.** Inference costs eclipse total training CapEx in just 7.6 days.
