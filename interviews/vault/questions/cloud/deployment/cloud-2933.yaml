title: Evaluating Horizontal Pod Autoscaler for GPU Inference Scaling
scenario: An ML platform team is debating whether to use Kubernetes HPA based on GPU utilization metrics to auto-scale a vLLM inference deployment. The service receives bursty traffic with 10× spikes lasting 2–3 minutes.
question: "Is HPA on GPU utilization the right autoscaling signal for bursty 2–3 minute vLLM traffic spikes, and what should you use instead?"
details:
  realistic_solution: Use queue depth or pending request count as the HPA metric via a custom metrics adapter (e.g., KEDA). Set scale-up triggers based on queue depth and pre-provision warm standby pods. GPU utilization works as a scale-down signal, but not scale-up.
  common_mistake: |
    **The Pitfall:** Using GPU utilization as the primary scale-up metric.
    **The Rationale:** Treating GPU metrics like CPU web servers, ignoring that a GPU at 95% means the queue is already severely backed up.
    **The Consequence:** The autoscaler responds too late, missing the 2-3 minute burst entirely while cold-starting instances.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic spike 120-180s. HPA GPU lag 15s. Pod start + load 90s.

    **Calculations:**
    - HPA total latency = 15s + 30s (schedule) + 60s (load) = 105s.
    - KEDA queue-based with warm pods = 15s + 5s = 20s.

    **Conclusion & Interpretation:**
    - **Result: Proactive scaling captures 85%+ of the spike duration (Deployment-Bound)**. Standard HPA misses it completely.
