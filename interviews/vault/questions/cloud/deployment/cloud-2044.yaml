title: The RAG Cache Invalidation Dilemma
scenario: Your RAG system caches LLM responses keyed on (query_embedding_hash, top_k_doc_ids). A single sentence changes in a 2000-word document, barely shifting its embedding (cosine similarity 0.997). The cache hit rate is 60% with 10K queries/hr.
question: How does this update propagate through the caching system, and what is the correct invalidation strategy?
details:
  realistic_solution: 'The cache key includes doc_ids but not doc content hashes. When a document is updated, the doc_id stays the same, so the cache key matches and returns the old LLM response based on the old document content. This is a classic ABA problem. Fix: (1) Include a content hash (or version number) in the cache key: (query_hash, [(doc_id, doc_version), ...]). This causes automatic cache miss on any document update. Cost: cache hit rate drops from 60% to ~45% because document updates invalidate all queries that referenced that document. (2) Selective invalidation: maintain an inverted index of cache_key → doc_ids. When doc X is updated, invalidate only cache entries that reference doc X. (3) TTL-based: set cache TTL to match your staleness tolerance (e.g., 1 hour). Trade some compute cost for bounded staleness.'
  common_mistake: |
    **The Pitfall:** Relying solely on embedding similarity to detect document staleness.
    **The Rationale:** Engineers assume minor text changes won't shift the vector significantly, failing to realize the LLM answer itself might critically depend on that single altered sentence.
    **The Consequence:** The system serves hallucinated or outdated responses indefinitely (a classic ABA cache problem).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 queries/hr, 60% hit rate.
       - Cost savings: $0.003/hit.
    2. **Calculations:**
       - Current Savings: 6,000 hits * $0.003/hit = $18/hr saved.
       - Hash-Key Cost: Adding doc content hashes drops hit rate to ~45%, reducing savings to $13.50/hr.
       - Thundering Herd Risk: A bulk import of 10K docs invalidates 40% of the cache instantly.
    3. **Conclusion & Interpretation:**
       - Without selective invalidation, a bulk update triggers 4,000 cache misses directly to the expensive LLM.
       - **Result: Cache Invalidation Storm (ABA Problem)**
