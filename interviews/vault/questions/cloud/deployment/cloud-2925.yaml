title: Cold Start Latency for Serverless Compound AI on A100
scenario: 'A serverless compound AI deployment has a cold start latency of 18 seconds: model weight loading from NVMe takes 10.8s, FAISS index loading takes 3.3s, and warm-up inference takes 3.9s. Traffic is bursty with many hours having zero requests.'
question: What keep-warm strategy would reduce the 18s cold start for the bursty serverless deployment without paying for always-on GPU time?
details:
  realistic_solution: |
    Tiered warm strategy: keep a cheap CPU-only service warm with the model weights and FAISS index already resident in RAM, but allocate the GPU only on demand. On the first request in a burst, transfer the 13GB model from pinned CPU memory to the GPU, attach to the already loaded FAISS index in CPU RAM, and run the normal GPU warm-up inference. Use traffic prediction only to start this transfer shortly before likely bursts; do not keep a GPU allocated through idle hours. Effective cold start: 0.2s CPU-to-GPU transfer + 3.9s warm-up = 4.1s, with the original 10.8s NVMe weight load and 3.3s FAISS index load avoided because those assets are already warm in CPU memory.
  common_mistake: |
    **The Pitfall:** Treating cold starts as a binary choice between fully cold instances and expensive always-on GPUs.
    **The Rationale:** It's assumed that the full model must reside entirely in GPU memory at all times to guarantee fast inference.
    **The Consequence:** Either paying exorbitant idle costs ($84/day for zero traffic) or subjecting users to unacceptable 18-second wait times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 13GB. NVMe read: 1.2 GB/s (10.8s). PCIe bandwidth: 64 GB/s.
    - CPU always-on is cheap ($0.05/hr); GPU always-on is expensive ($3.50/hr).

    **Calculations:**
    - Keep weights and FAISS index loaded in CPU RAM, avoiding 10.8s NVMe weight load and 3.3s FAISS index load during request cold start.
    - PCIe CPU→GPU transfer: 13GB / 64 GB/s = 0.2s.
    - Effective cold start: 0.2s (transfer) + 3.9s (warm-up) = 4.1s.
    - Reduction: (18.0s - 4.1s) / 18.0s = 77.2%.
    - Always-on monthly cost comparison: GPU $3.50/hr * 720hr = $2,520; CPU warm tier $0.05/hr * 720hr = $36.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound.** A CPU RAM warm tier drops the request-path cold start by about 77% while avoiding always-on GPU cost; the FAISS load is removed only because the index stays resident in CPU memory.
