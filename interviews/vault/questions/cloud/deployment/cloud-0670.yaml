title: The Decoding Bottleneck
scenario: We are heavily memory-bandwidth bound during LLM decoding.
question: How can we generate tokens faster without changing the model weights, quantizing, or losing exact mathematical accuracy?
details:
  realistic_solution: 'Speculative Decoding. You use a tiny, fast "draft" model to guess the next K tokens. You then pass these K tokens to your massive target model in a single forward pass. The large model verifies the guesses in parallel, yielding 2-3x speedups.'
  common_mistake: |
    **The Pitfall:** Suggesting "Use a faster GPU" or "Increase the batch size."
    **The Rationale:** These are standard solutions for throughput issues.
    **The Consequence:** A faster GPU won't help if the workload is memory-bandwidth bound, and larger batches increase throughput but do not improve per-request latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weight size: 140 GB.
    - Memory Bandwidth: 3.35 TB/s.
    - Normal decode: 1 token per forward pass.
    - Speculative decode: K=5, averages 4 accepted tokens per pass.

    **Calculations:**
    - Normal 100 tokens: 100 passes * 140 GB / 3.35 TB/s = 4.18 seconds.
    - Speculative 100 tokens: ~25 passes * 140 GB / 3.35 TB/s = 1.04 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~4x Speedup (Memory-Bandwidth Bound)**. Speculative decoding trades excess compute to yield a ~4x speedup in latency without altering outputs.
