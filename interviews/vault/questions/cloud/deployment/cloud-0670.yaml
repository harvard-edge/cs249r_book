title: The Decoding Bottleneck
scenario: We are heavily memory-bandwidth bound during LLM decoding.
question: How can we generate tokens faster without changing the model weights, quantizing, or losing exact mathematical accuracy?
details:
  realistic_solution: Speculative decoding. Use a tiny, fast draft model to propose a K-token window, then run the target model once to verify those candidates before emitting them. Exactness is preserved because only tokens accepted by the original target-model distribution are emitted; rejected candidates fall back to the target model. Under the stated bandwidth-bound assumptions, accepting about 4 tokens per target pass with 15% draft overhead yields roughly a 3.5x latency speedup.
  common_mistake: |
    **The Pitfall:** Suggesting "Use a faster GPU" or "Increase the batch size."
    **The Rationale:** These are standard solutions for throughput issues.
    **The Consequence:** A faster GPU won't help if the workload is memory-bandwidth bound, and larger batches increase throughput but do not improve per-request latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weight size: 140 GB.
    - Memory Bandwidth: 3.35 TB/s.
    - Normal decode: 1 token per forward pass.
    - Speculative decode: the draft model proposes a K=5 token window, and target verification accepts an average of 4 emitted tokens from each window.
    - Draft-model overhead is assumed to be 15% of the target-model verification time.

    **Calculations:**
    - Normal 100 tokens: 100 passes * 140 GB / 3.35 TB/s = 4.18 seconds.
    - Expected verification steps: ceil(100 emitted tokens / 4 accepted tokens per K=5 proposal window) = 25 target-model passes.
    - Target-model verification time: 25 * 140 GB / 3.35 TB/s = 1.04 seconds.
    - Draft-model overhead: 0.15 * 1.04 seconds = 0.16 seconds.
    - Total speculative time: 1.04 + 0.16 = 1.20 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~3.5x Speedup (Memory-Bandwidth Bound)**. Speculative decoding reduces the number of expensive target-model weight reads, but the speedup is less than the accepted-token ratio once draft-model work and verification overhead are included.
