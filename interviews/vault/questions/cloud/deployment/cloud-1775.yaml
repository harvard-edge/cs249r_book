title: CPU Reactive Burst Scaling vs GPU Pre-provisioning
scenario: You manage an NLP feature extraction service using a BERT-base model. Steady-state traffic is 200 QPS, currently handled by 4 GPUs. A product launch creates a sudden traffic spike to 5,000 QPS in under 10 seconds. Your GPU auto-scaling group takes 4 minutes to spin up new nodes, pull the container, and load the model. To prevent timeouts, you can route the overflow to fast-booting CPU instances that are ready in 15 seconds, but they have a 5x higher cost-per-inference compared to the GPUs.
question: Should you absorb the 5,000 QPS launch spike with fast CPU spillover or pre-provision enough GPUs, and what is the cost trade-off?
details:
  realistic_solution: Deploy a hybrid architecture where fast-starting CPU instances act as a temporary shock absorber for overflow traffic until the GPU auto-scaling group is ready. While CPU inference is 5x more expensive per request, the premium is paid only during the short provisioning gap after the CPU fleet boots, not 24/7. Compare this against the incremental cost of keeping 96 extra GPUs online all month to cover rare spikes; under the given assumptions, temporary CPU spillover is far cheaper while still avoiding dropped requests.
  common_mistake: |
    **The Pitfall:** Rejecting the CPU option by looking only at the 5x worse cost-per-inference.
    **The Rationale:** This fails to factor in the massive savings from eliminating 24/7 idle GPU headroom.
    **The Consequence:** Over-provisioning expensive GPUs to handle rare spikes, dramatically increasing overall monthly costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base capacity: 200 QPS / 4 GPUs = 50 QPS/GPU.
    - Spike capacity needed: 5,000 QPS / 50 QPS/GPU = 100 GPUs total.
    - Incremental overflow beyond baseline: 5,000 - 200 = 4,800 QPS.
    - CPU instance cost: $0.68/hr (handles ~10 QPS per instance -> needs 480 instances for overflow).
    - GPU cost: $0.50/hr; month = 730 hours.
    - GPU provisioning time: 4 minutes; CPU spillover starts after a 15-second boot delay.

    **Calculations:**
    - Pre-provisioned 100 GPUs: 100 * $0.50/hr * 730 hr/mo = $36,500/mo total.
    - Incremental pre-provisioning above the existing 4 GPUs: 96 * $0.50/hr * 730 hr/mo = $35,040/mo.
    - CPU burst window after startup: 4.0 min - 0.25 min = 3.75 min.
    - CPU burst cost: 480 CPUs * $0.68/hr * (3.75 mins / 60 mins) = $20.40 per spike.
    - Monthly spike cost (100 spikes): $2,040.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound Auto-Scaling**. Reactive CPU spillover covers the GPU provisioning gap for about $2.0k/month at 100 spikes, versus $35.0k/month to keep the incremental 96-GPU spike headroom online, saving about $33.0k/month under these assumptions.
