title: Evaluating Gang Scheduling vs. Elastic Training Tradeoffs
scenario: 'Your team must choose between strict gang scheduling (Volcano) and elastic distributed training (PyTorch Elastic / torchrun with --nnodes=4:8) for a shared H100 cluster running week-long LLM fine-tunes. The cluster has 128 H100 GPUs across 16 nodes and experiences a 5% node failure rate per week.'
question: 'For week-long fine-tunes on the 128-H100 cluster with a 5% weekly node failure rate, should you use Volcano gang scheduling or elastic training, and why?'
details:
  realistic_solution: 'With a 5% weekly failure rate per node, the probability of at least one failure in an 8-node job during a 7-day run is 1 - (0.95)^8 \approx 33.6%. Gang scheduling means a 33.6% chance of full restart. Elastic training with `--nnodes=4:8` lets the job continue on 7 nodes after a failure, accepting a ~12.5% throughput drop. For long runs, elastic training amortizes checkpoint overhead and maintains forward progress. Prefer elastic for week-long jobs; reserve gang scheduling for short (<4 hr) jobs where setup overhead dominates.'
  common_mistake: |
    **The Pitfall:** Defaulting to gang scheduling because it is simpler to configure.
    **The Rationale:** Engineers assume checkpoint/restart overhead is small (just reloading weights), failing to account for the queue waiting time in a shared cluster.
    **The Consequence:** A single node failure causes a full job restart, forcing the job to wait in the queue for a full block of nodes, vastly extending wall-clock completion time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5% weekly failure rate per node.
    - 8-node job running for 7 days.

    **Calculations:**
    - Probability of 1 failure among 8 nodes over 7 days: 1 - (0.95)^8 \approx 33.6%.
    - If gang scheduled, wait time for healthy 8-node block could be 12-24 hours.
    - If elastic, job drops to 7 nodes, losing 12.5% throughput (equivalent to ~21 hours of lost compute over 7 days).

    **Conclusion & Interpretation:**
    - **Result: 12.5% Throughput Loss (Elastic Training Superiority)**. Elastic training is superior because a single 24-hour queue wait for gang scheduling wastes more time than the 12.5% throughput drop.
