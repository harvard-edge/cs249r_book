title: 'TCO Design: Spot vs On-Demand vs Reserved Instance Strategy'
scenario: 'Design a cost-optimal GPU procurement strategy for a company training LLMs 24/7. Requirements: 1000 effective H100-hours/day and at least 90% of those hours from non-interruptible capacity; the remaining work is fault-tolerant and can use Spot. Spot H100: $0.75/hr with a 30% hourly interruption probability and 45 minutes of lost work per interruption. On-Demand: $2.50/hr, 1-year Reserved: $1.50/hr, 3-year Reserved: $1.00/hr.'
question: What Spot, On-Demand, and Reserved H100 mix meets the 90% reliable-capacity floor, and what is the effective cost per H100-hour?
details:
  realistic_solution: Treat the 90% availability requirement as a reliable-capacity floor, not as a linear average of Spot uptime. The cheapest reliable capacity is 3-year Reserved at $1.00/hr; 1-year Reserved is $1.50/hr and On-Demand is $2.50/hr, so neither should be used for the steady base load. Reserve 900 H100-hours/day to satisfy the 90% reliable floor, then run the remaining 100 effective H100-hours/day on fault-tolerant Spot because its interruption-adjusted cost is $0.75 / (1 - 0.30*0.75) = $0.968/effective hour. That requires 100/0.775 = 129.0 billed Spot hours/day. Total daily cost is 900*$1.00 + 129.0*$0.75 = $996.77, or about $1.00 per effective H100-hour. The optimal mix under these assumptions is 90% 3-year Reserved reliable capacity, 0% On-Demand, and 10% effective Spot work with retries.
  common_mistake: |
    **The Pitfall:** Using all Spot instances without mathematically modeling the checkpoint recovery overhead.
    **The Rationale:** Naively multiplying the hourly Spot rate by the required hours, ignoring throughput degradation from 30% interruptions.
    **The Consequence:** Missing deadlines due to constant rollbacks and drastically underestimating the true TCO of spot training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 1000 effective H100-hours/day.
    - Availability target: at least 90% reliable capacity, with Spot counted only for fault-tolerant effective work.
    - Spot penalty: 45 mins (0.75 hrs) lost per interruption at 30% hourly interruption probability.
    - Pricing: Spot $0.75/hr, On-Demand $2.50/hr, 1-year Reserved $1.50/hr, 3-year Reserved $1.00/hr.

    **Calculations:**
    - Spot effective yield = 1 - 0.30 * 0.75 = 0.775 effective hrs per billed hr.
    - Effective Spot cost = $0.75 / 0.775 = $0.968/effective-hr for retryable work.
    - Reliable capacity options: 3-year Reserved $1.00/hr, 1-year Reserved $1.50/hr, On-Demand $2.50/hr.
    - Cheapest reliable floor: 900 effective hrs/day on 3-year Reserved.
    - Remaining retryable work: 100 effective hrs/day on Spot requires 100 / 0.775 = 129.0 billed hrs/day.
    - Daily Reserved cost = 900 * $1.00 = $900.
    - Daily On-Demand cost = $0 because it is more expensive than Reserved for base capacity.
    - Daily Spot cost = 129.0 * $0.75 = $96.77.
    - Total daily cost = $996.77; blended effective cost = $996.77 / 1000 = $0.997/effective H100-hour.

    **Conclusion & Interpretation:**
    - **Result: SLA-Backed Mixed Fleet.** A 90% 3-year Reserved reliable floor plus 10% effective Spot retryable work meets the target at about $1.00 per effective H100-hour.
