title: 'TCO Design: Spot vs On-Demand vs Reserved Instance Strategy'
scenario: 'Design a cost-optimal GPU procurement strategy for a company training LLMs 24/7. Requirements: 90% availability, 1000 H100-hours/day, fault-tolerant training. Spot H100: $0.75/hr (30% interruption rate per hour), On-Demand: $2.50/hr, 1-year Reserved: $1.50/hr, 3-year Reserved: $1.00/hr.'
question: What fleet mix of Spot, On-Demand, and Reserved H100s meets 90% availability for 1000 H100-hours/day, and what is the effective cost per H100-hour?
details:
  realistic_solution: Use 90% 3-year Reserved for the SLA-backed base load, 5% On-Demand as reliable elastic capacity, and 5% Spot for fault-tolerant opportunistic work. With the prompt's interruption model, one billed Spot hour yields 1 - 0.30*0.75 = 0.775 effective H100-hours, so Spot costs $0.75/0.775 = $0.968 per effective hour. Daily cost for 1000 effective H100-hours is 900*$1.00 + 50*$2.50 + (50/0.775)*$0.75 = $1073.39, or $1.07 per effective H100-hour. The 95% reliable Reserved+On-Demand share exceeds the 90% availability requirement; Spot is used only where retries are acceptable.
  common_mistake: |
    **The Pitfall:** Using all Spot instances without mathematically modeling the checkpoint recovery overhead.
    **The Rationale:** Naively multiplying the hourly Spot rate by the required hours, ignoring throughput degradation from 30% interruptions.
    **The Consequence:** Missing deadlines due to constant rollbacks and drastically underestimating the true TCO of spot training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 1000 effective H100-hours/day.
    - Availability target: at least 90% reliable capacity.
    - Spot penalty: 45 mins (0.75 hrs) lost per interruption at 30% hourly interruption probability.
    - Pricing: Spot $0.75/hr, On-Demand $2.50/hr, 3-year Reserved $1.00/hr.

    **Calculations:**
    - Spot effective yield = 1 - 0.30 * 0.75 = 0.775 effective hrs per billed hr.
    - Effective Spot cost = $0.75 / 0.775 = $0.968/effective-hr.
    - Fleet mix: 90% Reserved, 5% On-Demand, 5% Spot.
    - Reliable capacity = 90% Reserved + 5% On-Demand = 95%, satisfying the 90% availability requirement.
    - Daily Reserved cost = 900 * $1.00 = $900.
    - Daily On-Demand cost = 50 * $2.50 = $125.
    - Daily Spot cost = (50 / 0.775) billed hrs * $0.75 = $48.39.
    - Total daily cost = $1073.39; blended effective cost = $1073.39 / 1000 = $1.07/effective H100-hour.

    **Conclusion & Interpretation:**
    - **Result: SLA-Backed Mixed Fleet.** A 90/5/5 Reserved/On-Demand/Spot mix meets the availability target at about $1.07 per effective H100-hour.
