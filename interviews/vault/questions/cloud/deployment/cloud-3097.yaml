title: 'TCO Design: Spot vs On-Demand vs Reserved Instance Strategy'
scenario: 'Design a cost-optimal GPU procurement strategy for a company training LLMs 24/7. Requirements: 90% availability, 1000 H100-hours/day, fault-tolerant training. Spot H100: $0.75/hr (30% interruption rate per hour), On-Demand: $2.50/hr, 1-year Reserved: $1.50/hr, 3-year Reserved: $1.00/hr.'
question: 'What fleet mix of Spot, On-Demand, and Reserved H100s meets 90% availability for 1000 H100-hours/day, and what is the effective cost per H100-hour?'
details:
  realistic_solution: 'Calculate effective yield of Spot instances considering checkpoint rollback overhead. Create a mixed fleet: use 3-year Reserved instances for the guaranteed 90% base load to ensure SLA compliance, and utilize Spot instances strictly for burst capacity to minimize overall TCO.'
  common_mistake: |
    **The Pitfall:** Using all Spot instances without mathematically modeling the checkpoint recovery overhead.
    **The Rationale:** Naively multiplying the hourly Spot rate by the required hours, ignoring throughput degradation from 30% interruptions.
    **The Consequence:** Missing deadlines due to constant rollbacks and drastically underestimating the true TCO of spot training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 1000 effective H100-hours/day, 90% guaranteed availability.
       - Spot penalty: 45 mins (0.75 hrs) lost per interruption at 30% hourly rate.
       - Pricing: Spot ($0.75/hr), 3-year Reserved ($1.00/hr).
    2. **Calculations:**
       - Spot Effective Yield: 1 hr - (0.3 × 0.75 hrs) = 0.775 effective hrs per billed hr.
       - Effective Spot Cost: $0.75 / 0.775 = $0.968/effective-hr.
       - Fleet Mix: 70% Reserved ($1.00) + 30% Spot ($0.968) achieves the 90% guarantee safely.
       - Daily Cost: 700 Reserved hrs × $1.00 + (300 effective / 0.775) actual spot hrs × $0.75 = $700 + $290.32 = $990.32/day.
       - Blended Cost: $990.32 / 1000 hrs = ~$0.99/hr.
    3. **Conclusion & Interpretation:**
       - **Result: TCO-Optimized. A 70/30 Reserved-to-Spot mix yields an effective cost of ~$0.99/hr, beating on-demand pricing by 60% while meeting SLAs.**
