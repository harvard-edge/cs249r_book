title: Progressive Rollout of a Large Language Model on AMD MI300X
scenario: Your production environment uses 100 AMD MI300X GPUs to serve an LLM at 100,000 requests per second. You need to progressively roll out a new, slightly larger 150 GB version of the LLM.
question: How would you progressively roll out the 150 GB LLM on MI300X while monitoring performance and enabling rapid rollback?
details:
  realistic_solution: |
    Start with shadow traffic to warm the 150 GB model and measure correctness, TTFT/TPOT, error rate, HBM3 usage, KV-cache growth, and memory bandwidth without returning responses. Then reserve one MI300X replica or shard for the 1% live canary, because 1% of 100,000 RPS is one existing GPU's nominal 1,000 RPS load. Do not rely on the raw 150 GB < 192 GB fit alone; require explicit headroom for KV cache, batching, runtime buffers, and rollback coexistence. Advance through 1%, 5%, 10%, 25%, and 50% only when P99 latency, error rate, saturation, and HBM headroom stay within thresholds. Rollback should be a routing or service-mesh weight change back to the old model, with the old replicas kept warm until the new version has passed the full rollout window.
  common_mistake: |
    **The Pitfall:** Rolling out the new model directly to 100% of traffic or without robust GPU-specific monitoring.
    **The Rationale:** Candidates underestimate the risk of performance regressions or resource exhaustion on specialized hardware (MI300X) and fail to monitor HBM3 utilization or compute efficiency.
    **The Consequence:** The deployment causes widespread service degradation or outages because rollback triggers are poorly defined.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 MI300X GPUs processing 100,000 RPS.
    - New model is 150GB (fits in 192GB HBM3 MI300X).
    - Initial canary target: 1% of traffic.

    **Calculations:**
    - Fleet scale for canary: 1% of 100 GPUs = 1 GPU.
    - Traffic per GPU: 100,000 RPS / 100 = 1,000 RPS.
    - 1% traffic = 1,000 RPS (exactly 1 GPU worth of load).

    **Conclusion & Interpretation:**
    - **Result: 1 existing GPU worth of canary load.** Route about 1,000 RPS to one MI300X already in the fleet or reserve one existing GPU for the initial canary; the math does not imply extra capacity is required.
