title: 'MLOps Lifecycle: Compare MLflow vs. Weights & Biases for LLM Experiment Tracking at Scale'
scenario: A team running 50 concurrent LLM fine-tuning experiments (each producing 50GB of checkpoints, 10MB of metrics per run) evaluates MLflow (self-hosted) vs. Weights & Biases (SaaS) for experiment tracking.
question: How do self-hosted MLflow and W&B compare on operational overhead, storage cost, and best-run query latency for 1000 experiments?
details:
  realistic_solution: 'Self-hosted MLflow: 1000 experiments × 10MB metrics = 10GB in Postgres. Query performance: indexes on run_id/metrics, P99 query ~500ms. Artifact storage: 1000 × 50GB = 50TB in S3 ($1150/month). Ops overhead: 0.1 FTE for DB maintenance. W&B SaaS: $50/seat/month for 10 engineers = $500/month, hosted storage at 1TB included, overage $0.06/GB -> 49,000GB × $0.06 = $2940/month overage. Total W&B = $3440/month. Total MLflow = $1150 + ops. Self-hosted wins on cost at this scale; W&B wins on zero ops overhead.'
  common_mistake: |
    **The Pitfall:** Evaluating platforms solely on feature parity without quantifying operational or hidden data storage costs at scale.
    **The Rationale:** Teams focus on the UI and basic seat pricing ($50/month), ignoring the massive footprint of LLM checkpoints (50GB each).
    **The Consequence:** SaaS bills explode due to storage overages, forcing emergency migrations back to self-hosted solutions mid-project.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1000 runs, 50GB checkpoints per run.
    - S3 cost: $0.023/GB.
    - W&B SaaS: $50/seat (10 seats), 1TB included, $0.06/GB overage.
    - MLflow Ops cost: 0.1 FTE at $150K/year ($1,250/month).

    **Calculations:**
    - Artifact volume: 1000 * 50GB = 50TB.
    - MLflow S3 Storage: 50,000 GB * $0.023 = $1,150/mo. Total MLflow = $1,150 + $1,250 = $2,400/mo.
    - W&B Storage Overage: 49,000 GB * $0.06 = $2,940/mo. Total W&B = $500 + $2,940 = $3,440/mo.

    **Conclusion & Interpretation:**
    - **Result: $1,040/month saved (Financial-Bound)**. Self-hosted MLflow saves ~$1,040/month, balancing cost vs zero-ops SaaS.
