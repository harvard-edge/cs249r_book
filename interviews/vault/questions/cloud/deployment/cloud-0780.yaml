title: Global Scale Real-Time Two-Tower Recommendation
scenario: We are re-architecting a recommendation retrieval system to support 50 billion candidates globally, served from 12+ datacenters. We want to use a massive 500B parameter two-tower model to improve relevance.
question: How would you decouple item embeddings from the TPU serving path while meeting sub-50ms p99 latency for a 50B-candidate two-tower recommender?
details:
  realistic_solution: Completely decouple the user and item towers for inference. The item tower's embeddings for the 50B candidates must be pre-computed strictly offline via batch jobs and loaded into a globally distributed, sharded in-memory vector database (e.g., ScaNN / Vertex Vector Search). The TPUs are reserved exclusively for executing the user tower in real-time, utilizing Tensor Parallelism to fit the user weights across multiple chips and broadcasting the resulting query vector to the fast ANN retrieval tier.
  common_mistake: |
    **The Pitfall:** Attempting to serve both towers dynamically in real-time.
    **The Rationale:** Candidates treat retrieval models like generative LLMs, assuming all 500B parameters must be loaded into device HBM and executed simultaneously per request.
    **The Consequence:** Catastrophic HBM fragmentation, impossible real-time cross-node communication overhead, and missing the 50ms latency SLA by orders of magnitude.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 500B params. User tower: ~100B params.
       - Items: 50B. Dimensions: 256.
       - TPU v5e: 16 GB HBM per chip. Keep no more than ~12 GB/chip for weights so activations, buffers, and runtime overhead fit.
       - SLA: <50ms p99; the TPU path must leave budget for ANN lookup and cross-service RPC.
    2. **Calculations:**
       - User tower weights (INT8): 100B * 1 byte = 100 GB.
       - Minimum chips by usable HBM: ceil(100 GB / 12 GB) = 9 chips, so a practical user-tower slice needs at least 9 v5e chips plus topology and runtime headroom.
       - Full-precision item vectors: 50 billion * 256 dimensions * 4 bytes = 51.2e12 bytes, or 51.2 decimal TB, before ANN index structures, replication, metadata, and caching.
       - With INT8/PQ-style compression, raw vector payload can be closer to 50 billion * 256 * 1 byte = 12.8e12 bytes, or 12.8 decimal TB, but the ANN service still lives in a sharded retrieval tier, not TPU HBM.
       - Feasible p99 budget target: reserve roughly 20-25ms for TPU user-tower execution, 5-10ms for RPC/fanout, and 10-15ms for ANN top-K, leaving a small tail-latency margin under 50ms.
    3. **Conclusion & Interpretation:**
       - **Result: Offline item compute plus a sharded ANN tier.** The user tower needs multi-chip TP with HBM headroom, while the 12.8-51.2 TB item-vector footprint is a retrieval-system memory problem, not a TPU-HBM placement problem.
