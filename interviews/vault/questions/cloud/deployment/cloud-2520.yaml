title: Cloud Train Serve Split L3 0
scenario: You train a 3B model in the cloud, then deploy it on an NVIDIA Jetson AGX Orin.
question: What are the estimated FP16 and INT8 inference memory footprints and throughputs for the 3B model?
details:
  realistic_solution: 'FP16 deployment: 3B * 2 bytes = 6 GB model weights + KV cache. Fits on Orin''s 32 GB. Throughput limited by memory bandwidth (Orin: 204.8 GB/s). Decode: 6 GB / 204.8 GB/s = 29.3 ms/token -> 34 tok/s. INT8 deployment: 3B * 1 byte = 3 GB weights. Decode: 3 GB / 204.8 GB/s = 14.6 ms/token -> 68 tok/s. INT8 halves memory and doubles decode throughput. Both fit comfortably; INT8 is preferred for edge latency targets.'
  common_mistake: |
    **The Pitfall:** Assuming models require the same memory for inference as they do for training.
    **The Rationale:** Forgetting that training memory includes optimizer states, gradients, and activations, which make it 10-20x larger than inference memory.
    **The Consequence:** Over-provisioning inference hardware or incorrectly concluding a model cannot run on edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B parameter model.
    - Edge device: 32 GB memory, 204.8 GB/s bandwidth.

    **Calculations:**
    - FP16 memory: 3B * 2 bytes = 6 GB.
    - FP16 decode throughput: 6 GB / 204.8 GB/s = 29.3 ms/token -> 34 tokens/s.
    - INT8 memory: 3B * 1 byte = 3 GB.
    - INT8 decode throughput: 3 GB / 204.8 GB/s = 14.6 ms/token -> 68 tokens/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound.** INT8 quantization halves memory and doubles decode throughput, comfortably fitting edge latency targets.
