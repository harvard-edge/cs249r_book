title: The RAG Context Window Overflow
scenario: Your RAG system retrieves top-20 documents (avg 800 tokens each) and stuffs them into a 32K-context LLM. Users report degraded answer quality on complex queries despite high retrieval recall.
question: What is the primary cause of the degraded answer quality despite being within the context window limit?
details:
  realistic_solution: 'The ''lost in the middle'' problem: LLMs attend most strongly to tokens at the beginning and end of the context, with significantly degraded attention to information in the middle. At 16K tokens with 20 documents, the most relevant documents (ranked #5-#15) land in the attention dead zone. Additionally, more retrieved context increases prefill compute quadratically with attention. The fix: (1) rerank and keep only top-5 documents, (2) place the most relevant document at the beginning of the context, (3) use a map-reduce pattern — summarize each document individually, then synthesize. This reduces context to ~2K tokens while preserving information from all 20 sources.'
  common_mistake: |
    **The Pitfall:** Assuming that as long as the prompt fits within the maximum context window, the model will use all information perfectly.
    **The Rationale:** Relying solely on technical limits rather than understanding the 'lost in the middle' phenomenon of LLM attention.
    **The Consequence:** Feeding excessive context degrades both response quality and compute efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 documents, 800 tokens each = 16K context tokens.
    - Standard attention prefill FLOPs scale quadratically with sequence length.

    **Calculations:**
    - Current FLOPs: (16K)^2 = 256M attention FLOPs relative unit.
    - Optimized FLOPs (Top-5 docs): (4K)^2 = 16M attention FLOPs.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (Quadratic Scaling).** Stuffing 20 documents takes 16x more attention compute for worse quality and drastically increases TTFT.
