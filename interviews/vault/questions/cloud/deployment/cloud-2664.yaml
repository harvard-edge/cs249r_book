title: Pipelining vs Batching Trade-off
scenario: 'An inference server handles 200 req/s. Option A: request pipelining (overlap CPU/GPU stages) achieving 250 req/s max at 18ms p50 latency. Option B: dynamic batching (batch size up to 32) achieving 400 req/s max at 35ms p50 latency. Your SLA requires p99 < 50ms.'
question: "Which serving optimization approach should be chosen to meet the p99 SLA while maximizing throughput headroom?"
details:
  realistic_solution: 'The decision depends on the traffic pattern and SLA strictness. Option A (pipelining): 250 req/s with 18ms p50 latency. Pipelining has predictable latency — p99 is typically 1.5-2x p50 = 27-36ms, well within SLA. But at 200 req/s load, utilization is 80% — close to the throughput ceiling with little headroom for traffic spikes. Option B (batching): 400 req/s with 35ms p50. Batching latency is more variable — p99 depends on batch filling time. With dynamic batching, worst case is waiting for the batch timeout. If timeout=10ms: p99 ≈ 35ms + 10ms = 45ms, barely under SLA. But throughput headroom is 2x (400 vs 200 req/s). Best approach: combine both — pipeline the CPU/GPU overlap AND batch requests at the GPU stage. This achieves ~350 req/s at ~25ms p50 and ~40ms p99. Both SLA and throughput requirements are met with headroom.'
  common_mistake: |
    **The Pitfall:** Treating pipelining and batching as mutually exclusive strategies.
    **The Rationale:** Candidates force a binary choice between overlapping execution stages (pipelining) and amortizing work (batching).
    **The Consequence:** The resulting system either flirts with violating the P99 SLA (Option B) or lacks the throughput headroom to survive traffic spikes (Option A).
  napkin_math: |
    - Option A (Pipelining): 250 req/s ceiling. At 200 req/s load, utilization is 80%. P99 is ~30ms (Safe SLA).
    - Option B (Batching): 400 req/s ceiling. If dynamic batch timeout is 10ms, P99 ≈ 35ms + 10ms = 45ms (Risky, barely meets SLA).
    - **Combined A+B: Pipelining overlaps stages, batching amortizes GPU overhead. Yields ~350 req/s, P99 ≈ 40ms. Meets SLA with strong headroom.**
