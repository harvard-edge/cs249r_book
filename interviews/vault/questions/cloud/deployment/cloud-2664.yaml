title: Pipelining vs Batching Trade-off
scenario: 'An inference server handles 200 req/s. Option A: request pipelining (overlap CPU/GPU stages) achieving 250 req/s max at 18ms p50 latency. Option B: dynamic batching (batch size up to 32) achieving 400 req/s max at 35ms p50 latency. Your SLA requires p99 < 50ms.'
question: Which serving optimization approach should be chosen to meet the p99 SLA while maximizing throughput headroom?
details:
  realistic_solution: Choose Option B if the dynamic batching timeout is capped tightly enough to keep p99 below 50ms. Option A (pipelining) reaches 250 req/s with 18ms p50. Its p99 is likely safer, roughly 27-36ms if p99 is 1.5-2x p50, but at 200 req/s load it is already at 80% utilization and has only 50 req/s of headroom. Option B (dynamic batching) reaches 400 req/s with 35ms p50. Its p99 depends on queueing and batch-fill timeout; with a 10ms timeout, p99 is roughly 35ms + 10ms = 45ms, which meets the p99 < 50ms SLA while leaving 200 req/s of headroom. If the timeout cannot be bounded or observed p99 drifts above the SLA, fall back to Option A. Under the stated objective of meeting the SLA while maximizing throughput headroom, Option B is the better choice with strict timeout controls.
  common_mistake: |
    **The Pitfall:** Choosing the lower p50 option without checking throughput headroom and p99 behavior.
    **The Rationale:** Option A looks safer because its median latency is lower, but the question asks for the best choice that still satisfies p99 while maximizing headroom.
    **The Consequence:** The system may meet latency in the steady state but run too close to capacity, making normal traffic spikes cause saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current load: 200 req/s.
    - SLA: p99 < 50ms.
    - Option A: 250 req/s ceiling, 18ms p50.
    - Option B: 400 req/s ceiling, 35ms p50, assume a 10ms dynamic-batch timeout.

    **Calculations:**
    - Option A utilization: 200 / 250 = 80%; headroom = 50 req/s.
    - Option A p99 estimate: 18ms * 1.5 to 2.0 = 27-36ms, within SLA.
    - Option B utilization: 200 / 400 = 50%; headroom = 200 req/s.
    - Option B p99 estimate: 35ms + 10ms queue timeout = 45ms, within SLA if timeout is enforced.

    **Conclusion & Interpretation:**
    - **Result:** Option B provides the most throughput headroom while still meeting the p99 SLA under the stated timeout assumption. Option A is safer on latency but has much less capacity margin.
