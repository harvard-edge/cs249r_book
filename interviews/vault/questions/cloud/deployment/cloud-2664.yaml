title: Pipelining vs Batching Trade-off
scenario: 'An inference server handles 200 req/s. Option A: request pipelining achieves 250 req/s max, 18ms p50, and 44ms measured p99. Option B: dynamic batching achieves 400 req/s max, 35ms p50, and 45ms measured p99 with a 10ms batch timeout. Your SLA requires p99 < 50ms.'
question: Which serving optimization should be chosen to meet p99 < 50 ms while maximizing throughput headroom?
details:
  realistic_solution: |
    Choose Option B. Both options meet the p99 < 50ms SLA in the stated load test: Option A measures 44ms p99 and Option B measures 45ms p99 with a 10ms batch timeout. The differentiator is throughput headroom. At 200 req/s, Option A uses 200/250 = 80% of capacity and leaves only 50 req/s of headroom. Option B uses 200/400 = 50% of capacity and leaves 200 req/s of headroom. If the batching timeout or measured p99 cannot be enforced in production, fall back to Option A; under the stated measurements, Option B best satisfies the SLA while maximizing headroom.
  common_mistake: |
    **The Pitfall:** Choosing the lower p50 option without checking throughput headroom and p99 behavior.
    **The Rationale:** Option A looks safer because its median latency is lower, but the question asks for the best choice that still satisfies p99 while maximizing headroom.
    **The Consequence:** The system may meet latency in the steady state but run too close to capacity, making normal traffic spikes cause saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current load: 200 req/s.
    - SLA: p99 < 50ms.
    - Option A: 250 req/s ceiling, 44ms measured p99.
    - Option B: 400 req/s ceiling, 45ms measured p99 with a 10ms dynamic-batch timeout.

    **Calculations:**
    - Option A utilization: 200 / 250 = 80%; headroom = 50 req/s.
    - Option A p99 check: 44ms < 50ms, within SLA.
    - Option B utilization: 200 / 400 = 50%; headroom = 200 req/s.
    - Option B p99 check: 45ms < 50ms, within SLA under the enforced timeout.

    **Conclusion & Interpretation:**
    - **Result:** Option B provides the most throughput headroom while still meeting the p99 SLA under the stated measured p99 and timeout controls. Option A also meets latency but has much less capacity margin.
