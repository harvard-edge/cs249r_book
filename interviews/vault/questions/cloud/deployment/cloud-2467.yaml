title: Optimizing Edge CI/CD Device Farm Costs
scenario: Your team deploys vision models to 250+ distinct mobile device profiles. Running a physical device farm costs $5/device/hour. Running the full test suite (1 hour) on every PR for 50 active developers costs $1,250,000/month.
question: "How would you redesign the device-farm deployment pipeline to cut testing cost by 80% without letting NPU-crashing models ship?"
details:
  realistic_solution: 'Architect a multi-tiered Hardware-in-the-Loop (HIL) pipeline. Tier 1 (PR Level): Use cloud CPU emulators and cross-compilation checks (e.g., TVM/XLA graph validation) to catch shape and op-support errors (Cost: ~$0). Tier 2 (Merge to Main): Test on a minimal spanning tree of ~10 physical devices representing unique SoC families (e.g., Snapdragon, Apple A-series, MediaTek, Exynos) rather than all 250+ OEMs. Tier 3 (Release Candidate): Run the full 250+ device farm only on weekly/bi-weekly release candidates. Collect telemetry from Tier 3 to continually refine the Tier 2 minimal spanning tree.'
  common_mistake: |
    **The Pitfall:** Moving entirely to emulators to save costs.
    **The Rationale:** Engineers assume CPU emulators accurately reflect edge behavior.
    **The Consequence:** Emulators completely fail to test specific NPU/DSP delegates (NNAPI, CoreML) and hardware-specific quantization bugs, allowing crashing models into production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 PRs/day (1000 PRs/mo), 250 devices, $5/hr.

    **Calculations:**
    - Old cost = 1000 * 250 * 1 * $5 = $1.25M.
    - New cost: Tier 2 (10 devices) = 1000 * 10 * 1 * $5 = $50k. Tier 3 (4 RCs, 250 devices) = 4 * 250 * 1 * $5 = $5k. Total = $55k/mo.

    **Conclusion & Interpretation:**
    - **Result: Cost Optimization.** Reduces testing cost by 95.6% without sacrificing NPU validation.
