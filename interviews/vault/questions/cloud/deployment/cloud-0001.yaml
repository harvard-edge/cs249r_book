title: The Continuous Batching Target
scenario: A user of your LLM API complains about the long initial wait before their generated text starts appearing. A teammate suggests implementing continuous batching to specifically reduce this initial wait time.
question: Which of the following metrics is continuous batching designed to primarily improve?
details:
  realistic_solution: Continuous batching primarily improves overall throughput, which is measured in tokens per second across all concurrent users. This has the effect of reducing the average 'Time Per Output Token' (TPOT). It achieves this by eliminating head-of-line blocking and ensuring the GPU is always busy decoding *some* token for *some* user, rather than waiting for a full batch to complete. The initial wait (TTFT) is dominated by the prefill stage for the new prompt, which is not the primary target of this optimization.
  common_mistake: |
    **The Pitfall:** Believing that any batching technique will speed up all aspects of inference.
    **The Rationale:** Misunderstanding that continuous batching optimizes system utilization rather than the latency of a single, isolated request.
    **The Consequence:** Incorrectly assuming continuous batching will reduce the Time To First Token (TTFT) for a new request.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prompt prefill time: 500 ms.
    - Token decode time: 50 ms.
    - Static batching waits for full batch completion.

    **Calculations:**
    - With static batching, short requests pad and wait for long requests, maximizing GPU idle time.
    - Continuous batching evicts completed requests and immediately slots new prefills into the idle time.

    **Conclusion & Interpretation:**
    - **Result: Throughput-Bound**. Continuous batching maximizes overall system throughput (TPOT) by keeping the GPU busy, but it does not inherently lower the Time To First Token (TTFT) for isolated requests.
  options:
  - Time To First Token (TTFT)
  - System Throughput / Average Time Per Output Token (TPOT)
  - Model Loading Time
  - GPU Idle Time
