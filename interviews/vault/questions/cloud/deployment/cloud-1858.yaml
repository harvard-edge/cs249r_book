title: Autoscaling Ramp-up and Boot Time Lag Calculation
scenario: You are serving a BERT-base model on a fleet of AWS instances. Each node has a strict capacity of 50 RPS to maintain a P99 latency SLA of <200ms. Traffic is currently stable at 500 RPS (10 nodes active, utilization is 100% of target). A sudden traffic spike hits, increasing traffic linearly by 300 RPS per minute. Your reactive autoscaler adds nodes when utilization exceeds 80%, but new nodes take 3 minutes to boot, load the 2GB model, and become healthy.
question: "How much buffer capacity in RPS and nodes is required to avoid SLA violations during the 3-minute autoscaling boot window?"
details:
  realistic_solution: Calculate the total traffic increase during the system's reaction time (boot time) and maintain that as a continuous capacity buffer. For a 3-minute boot time and 300 RPS/min ramp rate, the system must continuously maintain a buffer of 900 RPS (18 idle nodes).
  common_mistake: |
    **The Pitfall:** Assuming reactive target-tracking scaling is sufficient for spiky traffic, forgetting to account for the capacity 'blind spot' introduced by node boot and model loading times.
    **The Rationale:** Candidates often calculate capacity based on average utilization without factoring in the derivative of traffic (ramp rate).
    **The Consequence:** The system experiences severe SLA violations during the 3-minute boot window because new capacity arrives too late.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Boot Time (T_boot) = 3 minutes.
       - Traffic Ramp Rate (R) = 300 RPS / minute.
       - Node Capacity = 50 RPS / node.
    2. **Calculations:**
       - Required Headroom = T_boot * R = 3 mins * 300 RPS/min = 900 RPS.
       - Required Buffer Nodes = 900 RPS / 50 RPS/node = 18 nodes.
    3. **Conclusion & Interpretation:**
       - **Result: 900 RPS (18 nodes) buffer capacity required.** The system must absorb the spike before autoscaling takes effect.
