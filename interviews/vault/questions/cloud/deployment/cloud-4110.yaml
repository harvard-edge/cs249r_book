title: Bin-Packing GPUs for Mixed Workloads
scenario: 'You manage a cluster of 8-GPU nodes. Incoming jobs request 1, 2, 4, or 8 GPUs. Using naive allocation (assign jobs to the first node with free GPUs), you observe 35% average GPU utilization.'
question: Why does first-fit GPU allocation produce low utilization for 1-, 2-, 4-, and 8-GPU jobs, and how does bin-packing improve it?
details:
  realistic_solution: 'Naive allocation causes NVLink topology fragmentation, degrading multi-GPU job performance. Best-fit decreasing sorts jobs by GPU count, assigning each to the node with the least free GPUs that still fits. Topology-aware packing prefers allocations that preserve NVLink groups. Bin-packing elevates GPU utilization because large jobs find contiguous allocations and small jobs are consolidated.'
  common_mistake: |
    **The Pitfall:** Assuming fragmentation is only about unused GPUs.
    **The Rationale:** Schedulers often treat all GPUs as homogeneous without understanding interconnect topology.
    **The Consequence:** A 4-GPU job might get placed on non-adjacent GPUs, severely degrading training throughput due to missing NVLink connectivity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 nodes * 8 GPUs = 80 GPUs.
    
    **Calculations:**
    - Naive: 35% util = 28 GPUs active.
    - Bin-packed: 70% util = 56 GPUs active.
    
    **Conclusion & Interpretation:**
    - **Result: 56 GPUs active (Resource-Bound)**. Consolidating allocations is equivalent to adding 3.5 more nodes of capacity for free.
