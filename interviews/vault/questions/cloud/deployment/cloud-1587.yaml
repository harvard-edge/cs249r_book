title: Model Card Disaggregated Performance SLA
scenario: 'You are creating a Model Card for a cloud-based clinical triage NLP model deployed on AWS Inferentia2 instances. The model reports an impressive 92% overall accuracy on a 100,000-patient test set. The hospital''s SLA mandates a minimum 85% accuracy across all demographic subgroups to ensure equitable care. The test set comprises three demographics: Group A (80,000 patients, 94% accuracy), Group B (15,000 patients, 86% accuracy), and Group C (5,000 patients).'
question: 'What is Group C''s disaggregated accuracy, and does the clinical triage model meet the 85% subgroup SLA?'
details:
  realistic_solution: 'Calculate the exact accuracy for Group C, which reveals a hidden performance degradation (78%). This violates the SLA, meaning the model card must document this limitation and deployment must be blocked pending targeted retraining.'
  common_mistake: |
    **The Pitfall:** Reporting only the aggregate 92% accuracy in the model card and approving the deployment.
    **The Rationale:** Candidates falsely assume the high overall score guarantees all minority subgroups meet the 85% SLA threshold.
    **The Consequence:** Hidden performance degradation violates the SLA and equitability requirements, potentially leading to biased care and deployment rollbacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total population: 100,000. Aggregate accuracy: 92%.
    - Group A (80k): 94%. Group B (15k): 86%. Group C (5k).
    - SLA Threshold: 85%.

    **Calculations:**
    - Total correct: 100,000 * 0.92 = 92,000.
    - Group A correct: 80,000 * 0.94 = 75,200.
    - Group B correct: 15,000 * 0.86 = 12,900.
    - Group C correct: 92,000 - 75,200 - 12,900 = 3,900.
    - Group C accuracy: 3,900 / 5,000 = 78%.

    **Conclusion & Interpretation:**
    - **Result: SLA Violation.** Group C's hidden 78% accuracy falls far below the 85% SLA, mandating targeted retraining before deployment.
