title: The RAG Rollback Reflex
scenario: Your team manages a customer-facing chatbot that uses a RAG (Retrieval-Augmented Generation) architecture. You've just pushed a daily update to the vector database with new product information. Immediately, monitoring alerts fire for a massive spike in nonsensical or 'hallucinated' answers.
question: "What is the standard, most immediate operational response to this incident?"
details:
  realistic_solution: The correct and most immediate response is to roll back the data update to the last known good version. In a production RAG system, data is a form of deployment artifact and must be versioned and have a rapid rollback mechanism, just like code. Restoring the service to a working state is always the first priority; root-cause analysis happens *after* the system is stable.
  common_mistake: |
    **The Pitfall:** Instinctively attempting to debug the data pipeline before restoring the service.
    **The Rationale:** Engineers prioritize root-cause analysis over immediate mitigation.
    **The Consequence:** Prolonging a customer-facing outage by orders of magnitude, violently violating the principle of 'stop the bleeding'.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic: 100 queries/sec.
       - Cost of Bad Answer: $0.10.
       - Rollback Time: 5 minutes.
       - Debugging Time: 2 hours (120 minutes).
    2. **Calculations:**
       - Rollback Cost = 5 mins * 60 sec * 100 q/s * $0.10 = $3,000.
       - Debugging Cost = 120 mins * 60 sec * 100 q/s * $0.10 = $72,000.
    3. **Conclusion & Interpretation:**
       - **Result: $72,000 Loss (Operational-SLA-Bound).** Attempting to debug live instead of instantly rolling back costs the business 24x more in degraded customer trust.
  options:
  - Begin a root-cause analysis by inspecting the new data file for corruption.
  - Take the entire chatbot system offline to prevent more bad answers.
  - Immediately trigger an automated rollback to the previous version of the vector database.
  - Fine-tune the base LLM with the new information to teach it the correct behavior.
  correct_index: 2
