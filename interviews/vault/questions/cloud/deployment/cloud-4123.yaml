title: Scheduling Deadline-Aware Training Jobs
scenario: A research team needs their 70B model trained to 1T tokens before a conference deadline in 14 days. They estimate needing 128 GPUs continuously. Your cluster has 200 GPUs available.
question: Can 128 GPUs train the 70B model on 1T tokens within 14 days, and how would you schedule around the deadline?
details:
  realistic_solution: 'Phase 1: Capacity planning. 70B model at 1T tokens: FLOPs = 6 × 70B × 1T = 4.2 × 10^23 FLOPs. 128 GPUs at 989 TFLOPS BF16, 50% MFU: 128 × 989e12 × 0.5 = 6.33 × 10^16 FLOPs/sec (63.3 PFLOPS). Time required: 4.2e23 / 6.33e16 = 6,635,000 seconds = 1,843 hours = 76.8 days. Even with all 200 GPUs, time required is 4.2e23 / (200 × 989e12 × 0.5) = 4,247,000 seconds = 49.2 days. The 14-day deadline is physically impossible with 200 GPUs. Resolution: the team must drastically reduce scope (e.g., to about 285B tokens for the same model and hardware) or procure more GPUs; the 14-day run needs about 702 GPUs at the stated MFU. As the scheduler, inform the team the job cannot meet the deadline and negotiate a smaller dataset, more GPUs, or a longer timeline.'
  common_mistake: |
    **The Pitfall:** Dedicating GPUs exclusively for a job without verifying if the compute required physically fits within the time window.
    **The Rationale:** Trusting user estimates without performing basic floating-point math validation on model scale and dataset size.
    **The Consequence:** Wasting cluster resources on an impossible job, guaranteeing a missed deadline and angry stakeholders.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters, Dataset: 1T tokens.
    - Deadline: 14 days = 1,209,600 seconds.
    - Hardware performance at 50% MFU: 989 TFLOPS * 0.5 = 494.5 TFLOPS per GPU.

    **Calculations:**
    - Total compute = 6 * 70B * 1T = 4.2e23 FLOPs.
    - Throughput with 128 GPUs = 128 * 494.5e12 = 6.33e16 FLOPs/sec.
    - Time with 128 GPUs = 4.2e23 / 6.33e16 = 6.63e6 seconds = 76.8 days.
    - Time with 200 GPUs = 4.2e23 / (200 * 494.5e12) = 4.25e6 seconds = 49.2 days.
    - Required GPUs for 14 days = 4.2e23 / (1,209,600 * 494.5e12) = about 702 GPUs.

    **Conclusion & Interpretation:**
    - **Result: Impossible with 200 GPUs (Compute-Bound).** The 14-day deadline requires about 702 GPUs under the stated throughput assumptions.
