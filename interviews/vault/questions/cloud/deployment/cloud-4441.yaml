title: 'Decode Pool Scaling Policy Under Variable Output Length'
scenario: 'A disaggregated decode pool processes requests with highly variable output lengths. 10% of requests generate 2000+ tokens (long-tail), occupying decode GPU slots for 40x longer than median requests and causing P99 TTOT to spike.'
question: 'How would you schedule the decode pool to prevent 2000+ token long-tail requests from spiking P99 TTOT?'
details:
  realistic_solution: 'Implement preemptive multi-queue scheduling: (1) Use lightweight length prediction at prefill. (2) Assign to priority queues. (3) Preempt long requests (checkpoint KV cache + pause) after N tokens if short requests are waiting. (4) Short requests run to completion.'
  common_mistake: |
    **The Pitfall:** Using strict FIFO scheduling in the decode pool.
    **The Rationale:** Candidates often assume that fairness (first-in, first-out) is the optimal scheduling strategy, ignoring the impact of variable workload lengths.
    **The Consequence:** Long requests that arrive early block short requests from completing, inflating P99 tail latency for the majority of users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Decode speed: 100 tokens/sec.
    - Long request: 2000 tokens (20s duration).
    - Short request: 50 tokens (0.5s duration).
    - Preemption quantum: 50 tokens.

    **Calculations:**
    - FIFO P99 wait time: Short request blocked by 20s long request = 20.5s completion.
    - Preemptive wait time: Long request yields after 50 tokens (0.5s). Short completes in +0.5s.
    - Total preemptive completion = 1.0s.

    **Conclusion & Interpretation:**
    - **Result: 1s vs 20s latency (Head-of-Line-Blocking-Bound)**. Yields a 20x P99 latency improvement via preemption.
