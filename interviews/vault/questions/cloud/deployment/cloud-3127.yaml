title: Diagnose TCO Anomaly from Checkpoint I/O Costs on Cloud
scenario: 'A 70B model training run on 128 H100 GPUs (3 months, $0.50M GPU cost) shows an unexpected $180K in cloud storage and egress charges. Checkpoints are saved every 500 steps (10 min intervals) to S3 with 14-day rolling retention. Model checkpoint size: 70B params × 4B (FP32) + optimizer states × 2 (Adam) + gradient buffer = 70B×16B = 1.12TB per checkpoint. Storage cost: $0.023/GB/month.'
question: Is checkpoint frequency or storage retention the primary driver of the $180K storage and egress bill?
details:
  realistic_solution: |
    Retained capacity is the main cost driver. The job writes 144 checkpoints/day, so a 14-day retention window keeps 2,016 checkpoints live. At 1.12 TB = 1,120 GB each, retained capacity is 2,257,920 GB, which costs 2,257,920 x $0.023 = $51,932/month. Over three months that is about $155,800 before egress. If evaluations export 300 checkpoints during the quarter, egress is 300 x 1,120 GB x $0.09 = $30,240, giving a total near $186K. Tightening retention to 7 days keeps 1,008 checkpoints, or about $25,966/month and $77,900 over three months; the same egress would bring the quarter to about $108K. Frequency controls write volume and how fast the retention window fills, but once the cadence is fixed, storage-month charges scale with retained checkpoints.
  common_mistake: |
    **The Pitfall:** Attempting to optimize checkpoint frequency (write rate) to reduce storage costs.
    **The Rationale:** Misunderstanding that S3 storage bills are based on total retained capacity over time, not the rate of PUT requests.
    **The Consequence:** Failing to meaningfully reduce the $180K bill because old checkpoints continue to accumulate and compound the storage footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 1.12TB. Frequency: 144/day.
    - Retention model: 14-day rolling window, so only the live retained capacity is billed each month.
    - Storage Cost: $0.023/GB/month.
    - Target Cost Reduction: Slash the $180K bill.
    **Calculations:**
    - Checkpoints/day: 24 hours * 6/hour = 144.
    - 14-day retention: 144 * 14 = 2,016 retained checkpoints.
    - Retained bytes: 2,016 * 1,120 GB = 2,257,920 GB.
    - Storage bill: 2,257,920 GB * $0.023/GB-month = $51,932/month, or $155,796 over 3 months.
    - Example egress: 300 exported checkpoints * 1,120 GB * $0.09/GB = $30,240.
    - 3-month total: $155,796 + $30,240 = $186,036, consistent with an approximately $180K bill.
    - 7-day retention: 1,008 retained checkpoints * 1,120 GB * $0.023 = $25,966/month, or $77,898 over 3 months before egress.
    **Conclusion & Interpretation:**
    - **Result: Storage-Bound Costs.** Checkpoint frequency creates write volume, but retained checkpoint count drives the storage-month bill; halving retention roughly halves storage cost.
