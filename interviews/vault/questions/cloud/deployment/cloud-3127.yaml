title: Diagnose TCO Anomaly from Checkpoint I/O Costs on Cloud
scenario: 'A 70B model training run on 128 H100 GPUs (3 months, $0.50M GPU cost) shows an unexpected $180K in cloud storage and egress charges. Checkpoints are saved every 500 steps (10 min intervals) to S3. Model checkpoint size: 70B params × 4B (FP32) + optimizer states × 2 (Adam) + gradient buffer = 70B×16B = 1.12TB per checkpoint. Storage cost: $0.023/GB/month.'
question: Is checkpoint frequency or storage retention the primary driver of the $180K storage and egress bill?
details:
  realistic_solution: 'Steps per 3 months: 3×30×24×6 = 12,960 checkpoints. Each 1.12TB. If no retention policy existed, storage would grow linearly to 14.5 PB, costing over $500K. The $180K bill suggests an intermediate retention policy (e.g., 14-day). With a 14-day policy: 2,016 checkpoints are stored simultaneously, costing ~$52K/month, which over 3 months plus egress totals ~$180K. To fix this, retention must be tightened. With a strict 7-day retention: only 1,008 checkpoints are stored. Storage Cost: 1,008 × 1,120 GB × $0.023/month = ~$26K/month (approx $78K for 3 months). Egress for evaluations: 100 checkpoints × 1,120 GB × $0.09/GB = $10K. Total: ~$88K. Fix: 7-day rolling retention + bf16 checkpoints (560GB) → 50% cost reduction to ~$44K.'
  common_mistake: |
    **The Pitfall:** Attempting to optimize checkpoint frequency (write rate) to reduce storage costs.
    **The Rationale:** Misunderstanding that S3 storage bills are based on total retained capacity over time, not the rate of PUT requests.
    **The Consequence:** Failing to meaningfully reduce the $180K bill because old checkpoints continue to accumulate and compound the storage footprint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 1.12TB. Frequency: 144/day.
       - Storage Cost: $0.023/GB/month.
       - Target Cost Reduction: Slash the $180K bill.
    2. **Calculations:**
       - 14-day Retention Storage: 2,016 checkpoints * 1.12TB * $0.023/GB = ~$52K/month + egress = ~$180K over 3 months.
       - 7-day Retention Storage: 1,008 checkpoints * 1.12TB * $0.023/GB = ~$26K/month + egress = ~$88K over 3 months.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Bound Costs.** Strict retention policies drive cost down linearly; a 7-day policy halves the storage bill.
