title: The Tool-Use Timeout Cascade
scenario: 'Your AI agent has access to 5 tools: a SQL database (P50=50ms, P99=2s), a web search API (P50=300ms, P99=5s), a calculator (P50=1ms, P99=5ms), a code interpreter (P50=500ms, P99=10s), and a knowledge base (P50=30ms, P99=200ms). The agent decides to call web search and code interpreter in sequence. Your overall request timeout is 15 seconds. Assume independent log-normal tool latencies fitted to each tool''s P50 and P99.'
question: What is the probability that this 2-tool sequence completes within the timeout, and how should you set per-tool timeouts?
details:
  realistic_solution: With the stated log-normal and independence assumptions, the probability that web search plus code interpreter finishes within 15s is about 99.5%. Do not infer that from P99 values alone; it follows only after choosing a distributional model. For timeouts, use an absolute request deadline and pass the remaining budget to each sequential tool. A practical policy is a soft web-search budget around its 5s P99, then give the code interpreter the remaining time up to the 15s deadline. Fixed per-tool limits such as 6s and 12s are invalid because they exceed the total sequential budget.
  common_mistake: |
    **The Pitfall:** Setting each tool timeout equal to the overall timeout (15s each) or dividing it equally (7.5s each) without regard to individual latency distributions.
    **The Rationale:** Developers often assume that standard web timeouts apply uniformly, failing to account for the compound probabilities of tool sequence latencies.
    **The Consequence:** A slow web search combined with a slow code interpreter will massively exceed the 15s budget, severely degrading the P99 reliability of the AI agent.
  napkin_math: |
    **Assumptions & Constraints:**
    - Web search P99 = 5s.
    - Code interpreter P99 = 10s.
    - Total budget = 15s.
    - Independent log-normal latencies fitted from P50 and P99.

    **Calculations:**
    - Web search: median 0.3s, P99 5s, so sigma = ln(5/0.3) / 2.326 ≈ 1.21.
    - Code interpreter: median 0.5s, P99 10s, so sigma = ln(10/0.5) / 2.326 ≈ 1.29.
    - Under these fitted distributions, numerical integration or simulation gives P(web + code <= 15s) ≈ 0.995.
    - If enforcing hard per-tool caps of 5s and 10s, success is about 0.99 * 0.99 = 0.980, because some globally valid requests are cut off early.

    **Conclusion & Interpretation:**
    - **Result: about 99.5% sequence completion under the fitted model (Latency-Budget-Bound)**. Use a shared deadline and remaining-budget propagation; per-tool caps should protect the sequence without exceeding the 15s total.
