title: Disaggregated Serving Graceful Degradation Under Partial Failure
scenario: A disaggregated serving cluster loses 30% of its decode pool due to a network partition. The remaining 70% of decode capacity cannot serve all requests.
question: How would you gracefully degrade service after losing 30% of decode capacity while serving as many users as possible?
details:
  realistic_solution: 'Graceful degradation protocol: (1) Immediate detection: decode pool health monitor detects 30% node loss within 10 seconds. (2) Capacity recomputation: new capacity = 70% of baseline. If baseline handles 500 RPS, new capacity = 350 RPS. (3) Triage by SLA tier: (a) Premium tier (typically 20% of requests): serve at full SLA: 100 RPS if premium is 20% of 500. Within 350 RPS capacity. (b) Standard tier: admit up to 250 RPS after premium and return HTTP 429 with Retry-After: 5s for excess standard requests. (4) Model fallback: route a chosen slice of admitted low-priority standard traffic to an 8B model running on the same surviving nodes. Because 8B decode is 5x faster, 30 standard RPS consumes only 6 RPS-equivalents of the 70B budget; this preserves the hard 350 RPS admission cap while freeing capacity headroom for queue drain and latency spikes.'
  common_mistake: |
    **The Pitfall:** Treating partial failure as binary and indiscriminately routing all requests until the surviving shards collapse under the unmanaged load.
    **The Rationale:** Engineers lean into naive load-balancing algorithms (like round-robin) that blindly push traffic without dynamically capping admission based on survived capacity limits and tier priority.
    **The Consequence:** The remaining 70% of the cluster completely OOMs or queues to infinity, cascading a 30% localized failure into a 100% global catastrophic outage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline capacity: 500 RPS. Premium: 100 RPS (20%), Standard: 400 RPS (80%).
    - 30% capacity lost (70% remaining).
    - Fallback 8B model is 5x faster in decode throughput, so 1 RPS-equivalent of 70B capacity can serve 5 RPS on 8B.

    **Calculations:**
    - Post-Failure Capacity: 500 RPS * 0.70 = 350 RPS.
    - Premium allocation: reserve 100 RPS-equivalents for premium on 70B.
    - Standard admission cap left: 350 - 100 = 250 standard RPS.
    - If 30 admitted standard RPS use 8B fallback, they consume 30 / 5 = 6 RPS-equivalents.
    - Remaining 70B standard service: 250 - 30 = 220 standard RPS, consuming 220 RPS-equivalents.
    - Total served: 100 premium RPS + 220 standard RPS on 70B + 30 standard RPS on 8B = 350 RPS.
    - Capacity consumed: 100 + 220 + 6 = 326 RPS-equivalents, leaving 24 RPS-equivalents of headroom.

    **Conclusion & Interpretation:**
    - **Result: the service admits 350 total RPS: 100 premium plus 250 standard, with 30 standard RPS degraded to 8B.** The fallback is not additive traffic beyond the failed cluster budget; it conserves capacity and creates 24 RPS-equivalents of latency headroom.
