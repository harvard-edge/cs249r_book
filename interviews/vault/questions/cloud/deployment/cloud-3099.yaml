title: 'TCO Evaluation: H100 vs TPU v5e for Training Cost'
scenario: Compare the training cost for a 7B parameter model (100B token dataset, 4.2 ZFLOPs total compute) on H100 ($2.50/hr) vs TPU v5e ($0.42/hr on GCP). Assume 40% MFU on both platforms.
question: What is the training time, compute cost, and cost per effective FLOP for H100 vs TPU v5e?
details:
  realistic_solution: Assume prices and peak FLOPS are per chip. H100 effective throughput is 989 TFLOPS * 40% = 395.6 TFLOPS. Training time for 4.2 ZFLOPs is 4.2e21 / 395.6e12 = 10.62M seconds = 2949 hours, costing 2949*$2.50 = $7,372 per chip-equivalent run. It produces 395.6 TFLOP/s * 3600 = 1424 effective PFLOP per chip-hour, so cost is $2.50/1424 = $0.00175 per effective PFLOP. TPU v5e effective throughput is 78.8 TFLOPS, time is 14,805 hours, cost is $6,218, and cost is $0.42/(78.8*3600/1000) = $0.00148 per effective PFLOP. TPU v5e is about 15% cheaper per effective FLOP but 5x slower per chip.
  common_mistake: |
    **The Pitfall:** Comparing raw peak TFLOPS without adjusting for MFU, or directly comparing hourly rental prices without converting to the fundamental "cost-per-effective-TFLOP".
    **The Rationale:** Engineers intuitively equate a cheaper hourly price with a cheaper overall run, ignoring that slower hardware must run significantly longer to complete the identical mathematical workload.
    **The Consequence:** The team blindly selects the "cheaper" TPU, not realizing the run will take 5x as long to converge, entirely ruining tight development iteration cycles for a meager 15% cost savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4.2 ZFLOPs workload.
    - H100: 989 TFLOPS, $2.50/hr. TPU v5e: 197 TFLOPS, $0.42/hr. 40% MFU.

    **Calculations:**
    - H100 Effective Speed: 989 * 0.4 = 395.6 TFLOPS.
    - H100 Time: 4.2e21 / 395.6e12 / 3600 = 2949 hrs. Cost: 2949 * $2.50 = $7,372.
    - TPU Effective Speed: 197 * 0.4 = 78.8 TFLOPS.
    - TPU Time: 4.2e21 / 78.8e12 / 3600 = 14,805 hrs. Cost: 14805 * $0.42 = $6,218.
    - H100 effective PFLOP per chip-hour = 395.6 TFLOP/s * 3600s / 1000 = 1424 PFLOP/hr.
    - H100 cost per effective PFLOP = $2.50 / 1424 = $0.00175/PFLOP.
    - TPU effective PFLOP per chip-hour = 78.8 TFLOP/s * 3600s / 1000 = 283.7 PFLOP/hr.
    - TPU cost per effective PFLOP = $0.42 / 283.7 = $0.00148/PFLOP.

    **Conclusion & Interpretation:**
    - **Result: 5x Time Penalty.** TPU v5e is about 15% cheaper per effective PFLOP but much slower per chip; cluster size must be normalized before comparing wall-clock schedules.
