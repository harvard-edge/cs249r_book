title: Disaggregated Serving Cost Model
scenario: 'Build a cost model for a disaggregated serving deployment at 10,000 requests/hour, 70B FP16 model, mixed workload (50% short: 256 input/64 output; 50% long: 2048 input/512 output). GPU costs: H100 at $3.50/hr, MI300X at $4.50/hr.'
question: What H100 prefill to MI300X decode pool ratio minimizes cost at 10,000 req/hr while meeting 200 ms TTFT and 50 ms TPOT?
details:
  realistic_solution: 'Step 1: Characterize load. 10k req/hr = 2.78 req/s. Short: 1.39 req/s × 256 input = 356 tok/s prefill, 1.39 × 64 = 89 tok/s decode. Long: 1.39 × 2048 = 2847 tok/s prefill, 1.39 × 512 = 711 tok/s decode. Total: prefill = 3203 tok/s, decode = 800 tok/s. Step 2: Capacity per GPU. H100 prefill: 200k tok/s per GPU (compute-bound, 70B, mixed lengths). Required prefill GPUs at 75% util: 3203 / (200k × 0.75) = 0.021 GPUs — trivially 1 GPU handles this load. MI300X decode: 37.8 tok/s per sequence, concurrent sequences = 135 per MI300X. At 800 tok/s and 512 avg output (0.78 s per sequence): concurrent sequences = 800 × 0.78 = 624 sequences. MI300X needed: 624/135 = 4.6 → 5 MI300X at 75% util. Step 3: Cost. 1 H100 × $3.50/hr + 5 MI300X × $4.50/hr = $3.50 + $22.50 = $26/hr. Cost per request: $26/hr / 10k req/hr = $0.0026/request. Validate SLOs: TTFT for long (2048 tok): 2048/200k = 10.2 ms << 200 ms. TPOT: 5 MI300X serving 624 sequences: step time = 140 GB / 5.3 TB/s = 26.4 ms < 50 ms. Both SLOs met.'
  common_mistake: |
    **The Pitfall:** Optimizing GPU count without accounting for varying utilization bounds.
    **The Rationale:** Engineers assume they can drive both prefill and decode GPUs to 100% capacity identically.
    **The Consequence:** Driving decode at 90%+ utilization causes catastrophic queuing latency explosions; they must be conservatively sized to 70-80%.
  napkin_math: |
    - Prefill load: 3203 tok/s. H100 capacity: 200k tok/s. GPUs needed: 1 (easily handles load).
    - Decode load: 800 tok/s. Avg decode time: short = 1.69s, long = 13.5s.
    - Concurrent sequences (Little's Law): short = 1.39 * 1.69 = 2.3. long = 1.39 * 13.5 = 18.8. Total = 21.
    - MI300X holds 135 sequences. 1 MI300X is completely sufficient!
    - **Cost: 1 H100 + 1 MI300X = $3.50 + $4.50 = $8/hr. (At scaled 100k req/hr, cost is 10x $3.50 + 2x $4.50 = $44/hr).**
