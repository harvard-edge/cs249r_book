title: Canary Rollout Time Estimation
scenario: 'You implement continuous deployment for a dynamic pricing model on a 40-node Kubernetes cluster. Each update is rolled out via a progressive canary: 1%, 10%, 50%, then 100% traffic. To automatically promote to the next stage, the system must observe at least 5,000 inference requests without a latency SLO violation, OR bake for a minimum of 10 minutes (600 seconds), whichever is LONGER.'
question: 'How much total time is required to reach 100% traffic at 400 RPS under the 5,000-request and 10-minute bake rules?'
details:
  realistic_solution: 'Calculate the duration for each stage individually. The 1% stage is bounded by the request count (1250 seconds), while the 10% and 50% stages are bounded by the minimum bake time (600 seconds each), resulting in roughly 41 minutes total.'
  common_mistake: |
    **The Pitfall:** Simply multiplying the number of stages by the minimum bake time.
    **The Rationale:** Candidates see the "10-minute minimum" and assume it is the dominant factor across all rollout stages.
    **The Consequence:** Failing to calculate if low-traffic stages actually satisfy the minimum request threshold, leading to incorrect deployment time estimations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic is 400 RPS. Target is 5,000 requests OR 600 seconds.
    - Stage 1 (1%): 4 RPS. Stage 2 (10%): 40 RPS. Stage 3 (50%): 200 RPS.

    **Calculations:**
    - Stage 1: 5,000 / 4 = 1,250s (bounded by requests).
    - Stage 2: 5,000 / 40 = 125s (bounded by 600s minimum).
    - Stage 3: 5,000 / 200 = 25s (bounded by 600s minimum).
    - Total = 1,250s + 600s + 600s = 2,450 seconds.

    **Conclusion & Interpretation:**
    - **Result: 2,450 seconds (~40.8 minutes)**. The rollout takes ~40.8 minutes, dominated by request bounds in early stages and time bounds in later stages.
