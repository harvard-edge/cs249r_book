title: A/B Testing FWER Correction
scenario: Your ML serving platform handles 10,000 req/sec. You are evaluating 20 new
  candidate ranking models concurrently against the baseline production model using
  A/B testing. For each candidate, you test 4 different metrics (CTR, conversion,
  latency, and revenue). You are using a standard significance level of alpha = 0.05
  for each individual hypothesis test.
question: How many false discoveries are expected across 20 models and 4 metrics at
  alpha=0.05, and what Bonferroni alpha controls FWER at 0.05?
details:
  realistic_solution: Recognize that m = 20 models * 4 metrics = 80 independent tests.
    Without correction, you will likely deploy 4 false positive models. Apply the
    Bonferroni correction to strictly bound the FWER to 5% by dividing the target
    α by m. In practice, due to Bonferroni's strictness reducing statistical power,
    controlling the False Discovery Rate (FDR) via the Benjamini-Hochberg procedure
    is often preferred for ML experiment platforms.
  common_mistake: '**The Pitfall:** Failing to account for the multiplicative effect
    of checking both multiple models and multiple metrics.

    **The Rationale:** Practitioners often run multiple A/B tests simultaneously and
    assume the overall false positive rate remains at the baseline alpha = 0.05.

    **The Consequence:** Without correction, the platform will likely deploy several
    false positive models, degrading production performance over time.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Models tested: 20.

    - Metrics per model: 4.

    - Target alpha: 0.05.


    **Calculations:**

    - Total Independent Tests (m): 20 * 4 = 80.

    - Expected False Positives: 80 * 0.05 = 4.

    - Uncorrected FWER: 1 - (1 - 0.05)^80 = 98.4%.

    - Bonferroni Correction: 0.05 / 80 = 0.000625.


    **Conclusion & Interpretation:**

    - **Result: 0.000625 corrected alpha (Statistical Significance)**. 4 expected
    false positives; corrected alpha is 0.000625.

    '
