title: Monitoring Cardinality at Scale
scenario: 'You monitor 100 models, each with 4 business metrics, 6 model metrics, 10 data quality metrics, and 8 system metrics. Metrics are collected every 60 seconds and retained for 30 days.'
question: What are the estimated time-series count and 30-day storage requirement after accounting for metric cardinality?
details:
  realistic_solution: |
    Calculate the base metrics per model and multiply by the total number of models. Apply a cardinality multiplier to account for dimensions like demographic slices or endpoint variants, which drastically increases the series count. Finally, calculate the total data points over 30 days and the resulting storage overhead. The real challenge is typically the alert evaluation load on the time-series database, not just raw storage.
  common_mistake: |
    **The Pitfall:** Forgetting that each metric may have multiple dimensions (e.g., per-slice, per-endpoint).
    **The Rationale:** Candidates calculate raw time-series counts without applying a cardinality multiplier.
    **The Consequence:** Massive under-provisioning of monitoring database memory and alert evaluation compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base metrics per model: 4 + 6 + 10 + 8 = 28 metrics.
    - Base time series: 100 models * 28 = 2,800 series.
    - Applying a 3x cardinality multiplier: 2,800 * 3 = 8,400 series.

    **Calculations:**
    - Data points per series (30 days): 60 * 24 * 30 = 43,200 points.
    - Total points: 8,400 * 43,200 = 362.9 million.
    - Storage: 362.9M * 8 bytes = 2.9 GB raw.
    - Alert evaluations: 8,400 series / 60s = 140 evaluations per second.

    **Conclusion & Interpretation:**
    - **Result: 140 evaluations/sec (Compute-Bound)**. The true challenge is not the ~2.9 GB storage, but the cardinality-driven alert evaluation overhead.
