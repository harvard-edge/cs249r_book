title: The Compound System Evaluation Problem
scenario: 'Your RAG system''s end-to-end accuracy dropped from 82% to 74% after a routine update. The system has 4 components: embedding model, vector index, reranker, and LLM. Nothing was intentionally changed in the LLM or reranker.'
question: How do you isolate which component caused the regression, and why is this fundamentally harder than debugging a single model?
details:
  realistic_solution: 'Compound systems have a credit assignment problem — end-to-end metrics don''t attribute failure to individual components. You need per-component evaluation with held-out ground truth. Debug process: (1) Retrieval evaluation: run the same queries against the old and new index. Measure recall @interviews/vault/questions/global/global-0102.yaml and MRR independently. If retrieval recall dropped (e.g., from 0.90 to 0.78), the embedding model or index is the culprit. (2) Reranker evaluation: feed the same retrieved documents to the reranker; compare ranking quality. (3) LLM evaluation: feed the same (query, context) pairs to the LLM; compare answer quality. In this case, the ''routine update'' likely involved re-indexing with a new embedding model version (e.g., auto-updated dependency) that shifted the embedding space, making old and new embeddings incompatible in the same index. The fix: pin embedding model versions and re-embed the entire corpus when upgrading.'
  common_mistake: |
    **The Pitfall:** Running E2E evaluations and trying to correlate the accuracy drop with the update timestamp.
    **The Rationale:** Standard software debugging relies heavily on temporal correlation with recent commits.
    **The Consequence:** E2E metrics tell you WHEN a compound system broke, but not WHERE or WHY, leading to days of wasted debugging.
  napkin_math: |
    **Assumptions & Constraints:**
    - Debugging Time (E2E only): 2-3 days of trial-and-error.
    - Debugging Time (Per-component): Retrieval recall test takes 1 hour, isolating embedding shift in 2 hours total.

    **Calculations:**
    - Cost of Re-embedding: 500M docs * $0.0001/embedding = $50,000.
    - Cost of Delay: An 8% accuracy drop at 100K queries/day can cost $200K/month.

    **Conclusion & Interpretation:**
    - **Result: 2 hours vs 2-3 days (Evaluation-Bound)**. Per-component evaluation isolates the root cause (embedding shift) in hours instead of days.
