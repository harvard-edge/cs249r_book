title: Diagnosing Latency Spikes in Synchronous Shadow Deployments
scenario: A new recommendation model is deployed in shadow mode alongside the production model to evaluate its accuracy on live traffic (5,000 QPS). The API gateway is configured to duplicate incoming requests to both models and return the production model's response to the user. Shortly after the shadow deployment begins, monitoring alerts indicate a 25ms increase in the P99 latency for user-facing requests, despite the shadow model's predictions being entirely discarded.
question: Why did 100% shadow deployment add 25ms to user-facing P99 latency even though the shadow predictions are discarded?
details:
  realistic_solution: 'Decouple the traffic mirroring from the critical path. Implement asynchronous traffic shadowing using a sidecar proxy (e.g., Envoy''s request mirroring) or an out-of-band message broker (e.g., Kafka) to ensure the shadow request is "fire-and-forget" and does not block the primary response.'
  common_mistake: |
    **The Pitfall:** Assuming discarding the response makes the execution asynchronous.
    **The Rationale:** Engineers think that ignoring the output of a function call automatically isolates its latency from the critical path.
    **The Consequence:** Synchronous fan-out causes the slower of the two models to bottleneck the entire request, violating user SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Synchronous Fan-Out Logic: User_Latency = max(T_prod, T_shadow) + T_network.
    - Production P99: 50ms.
    - Shadow P99: 75ms.

    **Calculations:**
    - Resulting User Latency: max(50, 75) = 75ms.
    - Regression: 75ms - 50ms = 25ms.

    **Conclusion & Interpretation:**
    - **Result: 25ms regression (Latency-Bound)**. Solely driven by the synchronous shadow call.
