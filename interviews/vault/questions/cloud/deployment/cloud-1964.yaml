title: Evaluating L7 Sticky Routing for LLM Canary Rollouts
scenario: You are rolling out an updated 70B parameter LLM (v2) across 3 global regions
  serving 10,000 concurrent conversational sessions, backed by 64 H100 GPUs per region.
  During a 10% canary rollout, users report abrupt context and persona shifts mid-chat.
question: Should you pin chats with L7 consistent-hash sticky routing on session_id
  or a model-version JWT during the 10% canary, and why?
details:
  realistic_solution: Implement Layer 7 routing at the ingress proxy using a consistent
    ring hash on a session cookie or header. This ensures multi-turn conversations
    stay pinned to the exact same model replica, while the consistent hash minimizes
    session rebalancing when the canary pool scales up or down.
  common_mistake: '**The Pitfall:** Relying on L4 (IP-based) sticky sessions or standard
    round-robin routing.

    **The Rationale:** Network engineers default to standard load-balancing techniques
    that work for stateless microservices but fail for conversational AI clients using
    NAT/VPNs.

    **The Consequence:** Users randomly bounce between v1 and v2 model personas mid-conversation,
    destroying the user experience.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 10% canary rollout.\n   -\
    \ 10-turn conversation.\n2. **Calculations:**\n   - Probability of request hitting\
    \ v1 = 0.9.\n   - Probability of 10-turn conversation staying entirely on v1:\
    \ (0.9)^10 ≈ 34.8%.\n3. **Conclusion & Interpretation:**\n   - **Result: 65% Failure\
    \ Rate. Over 65% of canary users will experience a jarring mid-conversation model\
    \ switch without sticky routing.**\n"
