title: Decode Pool Autoscaling Lag
scenario: Your decode pool autoscales based on average TPOT over a 60-second window. During traffic ramps, TPOT degrades for 2-3 minutes before new decode instances warm up and register.
question: What leading indicator should trigger decode autoscaling before TPOT degrades?
details:
  realistic_solution: 'TPOT is a lagging indicator: by the time it degrades, the decode queue is already backed up, and the 60-second averaging window delays the trigger further. Use decode queue pressure as the leading autoscaling signal: in-flight sequences waiting for their next token step, normalized by sustainable decode capacity and optionally combined with queue growth rate. Trigger before saturation when queue pressure is persistently rising, with the exact threshold calibrated from arrival rate, per-instance token capacity, and warm-up time. This gives the scaler lead time during traffic ramps without claiming a fixed 70% threshold or a precise SLO-duration reduction that the scenario does not provide.'
  common_mistake: |
    **The Pitfall:** Maximizing chunk size strictly to minimize TTFT or using lagging metrics for autoscaling.
    **The Rationale:** Candidates fail to realize large chunks starve concurrent decode requests, and they use TPOT as a trigger instead of a queue metric.
    **The Consequence:** Autoscaling triggers too late, resulting in extended SLA violations for end users.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPOT is averaged over 60 seconds.
    - New decode instances take 2-3 minutes to warm up and register.
    - No arrival-rate, queue-growth-rate, or per-instance capacity numbers are provided.

    **Calculations:**
    - A TPOT trigger fires only after latency degradation is visible and then smoothed by the 60s window.
    - Queue pressure rises before TPOT crosses the SLO because waiting sequences accumulate before token time visibly degrades.
    - A proactive trigger should use normalized queue depth and positive queue growth rate, calibrated so scale-out begins at least one warm-up interval before expected saturation when possible.
    - A numeric reduction cannot be derived without queue growth and capacity parameters.

    **Conclusion & Interpretation:**
    - **Result: queue-pressure-triggered autoscaling.** Shifting from TPOT to queue depth and queue growth provides earlier scale-out, but the SLO reduction is workload-dependent unless the ramp rate and capacity are specified.
