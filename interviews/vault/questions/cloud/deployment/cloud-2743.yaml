title: On-Prem vs Cloud Capacity Decision
scenario: Your steady-state GPU demand is 100 A100s, with peaks of 300 during quarterly model retraining.
question: Which of the on-prem (300 GPUs), hybrid burst (100 on-prem + 200 cloud), or all-cloud options minimizes 3-year cost, and what are the trade-offs?
details:
  realistic_solution: 'Option A (300 on-prem): Capex: 300 x $25K = $7.5M. The fleet serves 300 GPUs for 8 weeks/year and 100 GPUs for the other 44 weeks, so average utilization is ((300 x 8) + (100 x 44)) / (300 x 52) = 43.6%. 3-year cost: $7.5M + ($1M/yr ops x 3 yrs) = $10.5M. Option B (100 on-prem + cloud burst): On-prem capex: 100 x $25K = $2.5M. Cloud burst: 200 GPUs x 8 weeks/year x 168h/week x $3/h = $806.4K/year, or $2.419M over 3 years. 3-year total: $2.5M + $2.419M cloud + ($200K/yr ops x 3) = $5.519M. Option C (all cloud): 100 GPUs x 8,760h x $3 = $2.628M/yr steady state. Burst: $806.4K/yr. 3-year total: ($2.628M + $806.4K) x 3 = $10.303M. Recommendation: B is optimal - on-prem for baseline (cheapest per GPU-hour at high utilization), cloud for peaks (pay only when needed). B saves about $5.0M vs A and $4.8M vs C over 3 years.'
  common_mistake: |
    **The Pitfall:** Only comparing direct dollar costs without considering utilization and agility.
    **The Rationale:** Over-provisioning on-prem hardware for rare peaks leads to massive idle capacity, while full cloud for steady-state workloads is unnecessarily expensive.
    **The Consequence:** Wasting millions of dollars in capex for idle hardware or excessive cloud operational costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Steady-state: 100 A100s. Peak: 300 A100s (8 weeks/year).
    - Cloud Cost: $3/h. On-prem Capex: $25K/GPU.

    **Calculations:**
    - Annual Hours: 52 * 168 = 8,736 hours for this weekly peak model.
    - Option A Utilization: ((300 * 8) + (100 * 44)) / (300 * 52) = 43.6%.
    - Option A (300 on-prem): Capex $7.5M + Ops $3M = $10.5M total.
    - Option C (all cloud): Steady 100 * 8,760h * $3 = $2.628M/yr; burst 200 * 8 * 168h * $3 = $806.4K/yr. 3-year total: $10.303M.
    - Option B (hybrid): Capex $2.5M + cloud burst ($806.4K * 3 = $2.419M) + Ops $0.6M = $5.519M.

    **Conclusion & Interpretation:**
    - **Result: Option B Hybrid (Cost-Bound)**. The hybrid model saves about $5.0M versus full on-prem and $4.8M versus all-cloud by avoiding idle on-prem hardware while serving base load cheaply.
