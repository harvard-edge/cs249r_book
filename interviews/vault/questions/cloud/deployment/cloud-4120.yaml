title: Scheduler Interaction with NCCL Timeout
scenario: Your 64-GPU training job fails with NCCL timeout errors (default 30 minutes). The scheduler log shows all 64 GPUs were allocated, but 4 GPUs on one node had a prior job's cleanup process still running.
question: How can stale CUDA processes on 4 allocated GPUs cause a 64-GPU NCCL timeout, and what scheduler checks prevent it?
details:
  realistic_solution: 'The chain of events: (1) Previous job on the node was killed but left zombie CUDA processes holding GPU memory. (2) Scheduler marked GPUs as ''free'' based on job completion, not GPU state. (3) New job''s 4 ranks on the affected node call torch.cuda.init() but fail (CUDA_ERROR_NOT_INITIALIZED or CUDA_ERROR_OUT_OF_MEMORY). (4) These 4 ranks never call ncclCommInitRank. (5) The other 60 ranks block in ncclCommInitRank waiting for all 64. (6) After 30 minutes: NCCL timeout. Prevention: (a) Epilogue scripts: Slurm''s task/cgroup plugin with TaskEpilog that kills leftover processes with GPU contexts and, where the cluster permits it, performs a GPU reset. (b) Health checks: before allocating a GPU, run a quick CUDA initialization test (allocate and free 1 MB). If it fails, mark the GPU as ''draining'' and schedule repair. (c) NCCL_ASYNC_ERROR_HANDLING=1: fail fast instead of waiting 30 minutes. Each rank detects the timeout quickly and reports which ranks are missing.'
  common_mistake: |
    **The Pitfall:** Assuming an NCCL timeout inherently means there is an InfiniBand or physical networking failure.
    **The Rationale:** Because NCCL is a communication library, engineers jump straight to debugging network fabrics, forgetting that NCCL blocks completely if a subset of GPUs fail to initialize their local CUDA contexts.
    **The Consequence:** Massive amounts of cluster time are wasted debugging networks when the issue is local zombie processes holding GPU memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Timeout duration: 30 minutes.
    - 4 allocated GPUs fail local CUDA initialization because stale processes still hold contexts.
    - The other 60 ranks initialize and wait at NCCL rendezvous for the missing ranks.

    **Calculations:**
    - Visible NCCL stall waste on ranks that initialized: 60 ranks * 0.5 hours = 30 GPU-hours waiting per incident.
    - The 4 blocked GPUs are the root cause because their ranks never reach ncclCommInitRank.
    - Epilogue cleanup with process killing and cluster-permitted GPU reset prevents the stale context before scheduling.
    - A pre-flight CUDA initialization test detects the bad GPUs in <1 min, reducing stall waste to <1 GPU-hour for the 60 waiting ranks.

    **Conclusion & Interpretation:**
    - **Result: the timeout is caused by missing ranks, not a 64-way network failure.** Health checks and epilogue scripts prevent stale CUDA contexts from turning 4 bad local inits into a 60-rank NCCL wait.
