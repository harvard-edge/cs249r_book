title: 'Graceful Degradation in ML Serving'
scenario: You are designing the reliability architecture for a production ML serving system.
question: Why do production ML systems need fallback strategies, and what is the typical fallback hierarchy from most to least sophisticated?
details:
  realistic_solution: 'Production ML systems can fail in multiple ways: model serving errors, latency spikes, OOM crashes, or distribution shift. Without fallbacks, any failure returns errors to users. The typical fallback hierarchy: (1) Primary model. (2) Distilled/smaller model. (3) Heuristic/rule-based system. (4) Cached responses. (5) Default/static response. Each level trades prediction quality for reliability and latency.'
  common_mistake: |
    **The Pitfall:** Having only one fallback (or none).
    **The Rationale:** Engineers assume a single fallback is sufficient for high availability.
    **The Consequence:** A single fallback that also fails leaves users with hard errors; without a static, non-failing final tier, reliability guarantees cannot be met.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary: 50ms, 95% quality. Distilled: 10ms, 85%.
    - Heuristic: 1ms, 60%. Cached: <1ms, 70%. Default: <1ms, 40%.
    
    **Calculations:**
    - System Reliability trades linear quality drop for exponential latency and availability gains across tiers.
    
    **Conclusion & Interpretation:**
    - **Result: Non-failing default (Reliability-Bound)**. Fallback cascade ensures a non-failing default always meets strict P99 latency bounds.
