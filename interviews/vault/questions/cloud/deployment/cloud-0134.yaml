title: The Chatbot's Unresponsive Start
scenario: You manage an AI chatbot service with a strict P99 Time-To-First-Token (TTFT) SLO of 250ms. Users complain the bot feels laggy to start. Your dashboard shows 90% GPU utilization and excellent token throughput, but the P99 TTFT has spiked to 500ms. Your serving stack uses a static batching strategy with a batch size of 32 and a fixed 400ms timeout window.
question: What is the most likely cause of the 500ms P99 TTFT when static batching uses batch size 32 and a fixed 400ms timeout?
details:
  realistic_solution: The direct cause is the fixed 400ms static batching timeout. Requests arriving early wait the full 400ms before processing begins, instantly violating the 250ms SLO. The solution is migrating to a continuous batching scheduler (like vLLM) to decouple queueing from fixed timeouts.
  common_mistake: |
    **The Pitfall:** Misattributing latency issues to model size or hardware performance while fixating on high hardware utilization.
    **The Rationale:** Engineers assume that if the GPU is 90% utilized, it's doing useful work, missing that static batching forces early-arriving requests to sit idle in a queue for the timeout window.
    **The Consequence:** Teams waste time optimizing models or buying more GPUs when the queuing strategy itself is the bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLO: 250ms TTFT.
       - Timeout window: 400ms.
    2. **Calculations:**
       - Queue delay = 400ms for early requests.
       - P99 TTFT Floor = Queue (400ms) + Compute (>0ms) = >400ms.
    3. **Conclusion & Interpretation:**
       - **Result: The 400ms timeout inherently violates the 250ms SLO.** (Queue-Bound)
  options:
  - The Llama-70B model's per-token processing time is too high, and a smaller model is needed.
  - The network connection between the load balancer and inference servers adds latency.
  - The static batching window forces early-arriving requests to wait for the timeout, causing high queuing delay that violates the TTFT SLO.
  - The H100's memory bandwidth is saturated, causing delays in loading model weights for each batch.
  correct_index: 2
