title: The Batching Window Trap
scenario: 'You are designing the serving infrastructure for a 7B parameter LLM on a single GPU. The product team has a strict requirement: Time To First Token (TTFT) must be under 200ms to feel ''real-time''. You implement a simple timed (or ''slotted'') batching strategy: every 150ms, the server groups any waiting requests into a batch and sends it to the GPU. Your profiling shows that the pre-fill stage for a typical batch of this size takes 80ms.'
question: What is the worst-case TTFT with 150ms slotted batching and 80ms prefill, and does it satisfy the 200ms real-time requirement?
details:
  realistic_solution: The total latency a user experiences is the sum of the time they spend waiting in the queue and the actual GPU processing time for their request. For a 150ms batching window and 80ms prefill, the worst-case queuing delay is 150ms, meaning the worst-case TTFT is 150ms + 80ms = 230ms. This clearly exceeds the 200ms real-time requirement.
  common_mistake: |
    **The Pitfall:** Only considering the GPU compute time.
    **The Rationale:** Engineers often calculate TTFT based purely on the pre-fill processing time, ignoring queueing theory and batching windows.
    **The Consequence:** The system is deployed but violates the 200ms real-time deadline because head-of-line blocking pushes the user-experienced latency higher.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batching window = 150ms.
       - Pre-fill GPU time = 80ms.
       - TTFT SLA = < 200ms.
    2. **Calculations:**
       - Worst-case queueing delay = 150ms (request arrives just after previous window closed).
       - Worst-case TTFT = Queue Delay + Pre-fill Time.
       - Worst-case TTFT = 150ms + 80ms = 230ms.
    3. **Conclusion & Interpretation:**
       - **Result: 230ms > 200ms SLA.** The system fails the requirement due to queueing delays.
  options:
  - 80 ms. The TTFT is simply the pre-fill computation time.
  - 150 ms. The TTFT is determined by the batching window, as it's the longest delay.
  - 230 ms. The worst case is the full batch window delay plus the pre-fill time.
  - 70 ms. The available time is the batch window minus the compute time.
  correct_index: 2
