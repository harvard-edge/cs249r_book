title: Optimizing LLM Training on Kubernetes with AMD MI300X
scenario: Your team is deploying a large language model (LLM) training job on a Kubernetes cluster. The cluster nodes are equipped with AMD MI300X accelerators. After initial deployment, you observe that the training job's throughput is significantly lower than anticipated, with GPU utilization consistently below 50%. The current Kubernetes setup uses standard GPU device plugins, and pods are scheduled without specific node affinity rules. The LLM model has over 70 billion parameters and requires frequent data transfers between GPUs for distributed training.
question: Why is the MI300X LLM training job below 50% GPU utilization, and what concrete Kubernetes and data-pipeline fixes would you apply?
details:
  realistic_solution: 'To diagnose and fix the bottleneck: 1. Monitor & Profile: Use `rocm-smi` or ROCm SMI tooling inside the pod and integrate cluster-wide GPU metrics such as utilization, HBM bandwidth, XGMI traffic, PCIe traffic, and compute activity into Prometheus/Grafana. This separates compute, memory, communication, and input-pipeline bottlenecks. 2. Device Plugin and Runtime: Install the AMD GPU device plugin and ROCm-compatible container runtime so pods request the vendor GPU resource exposed by the cluster; do not invent separate HBM3 pod limits unless the platform actually supports them. 3. Kubernetes Placement: Use node labels, `nodeSelector` or `nodeAffinity`, taints/tolerations, and topology-aware scheduling or gang scheduling so distributed workers land on MI300X nodes with the intended GPU count and interconnect locality. 4. Isolation: Prevent unrelated workloads from sharing training nodes when they would interfere with CPU, network, storage, or accelerator communication.
    5. Data and Communication Optimization: Increase or rebalance global batch size only after checking memory headroom, use asynchronous and prefetched data loading, stage data close to the workers, tune distributed training collectives for ROCm/RCCL, and use graph/compiler optimizations such as `torch.compile` when they improve kernel fusion and launch overhead.'
  common_mistake: |
    **The Pitfall:** Treating high-performance GPUs like MI300X as generic compute resources.
    **The Rationale:** Engineers fail to optimize the Kubernetes scheduler, device plugins, and application-level data pipelines for specific hardware characteristics.
    **The Consequence:** This leads to incorrect resource requests, lack of node affinity, and suboptimal data pipelining, ultimately wasting expensive hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - A training step spends 400 ms total.
    - GPU kernels are active for 180 ms and idle or waiting for input/collectives for 220 ms.
    - Target utilization is at least 70%.

    **Calculations:**
    - Observed utilization estimate = 180 ms / 400 ms = 45%.
    - To reach 70% with the same useful GPU work, total step time must be 180 ms / 0.70 = 257 ms.
    - Required reduction in non-compute wait time = 400 ms - 257 ms = 143 ms per step.
    - Kubernetes placement fixes target communication wait; data prefetching and local staging target input wait.

    **Conclusion & Interpretation:**
    - **Result: Wait-time-bound utilization.** The release-quality fix is to measure and reduce input or collective stalls, not to schedule HBM3 as a fake Kubernetes resource.
