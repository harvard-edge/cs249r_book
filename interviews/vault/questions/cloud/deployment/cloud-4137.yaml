title: MIG Partitioning in Kubernetes
scenario: You have a Kubernetes node with 4 GPUs (80GB each) and want to expose MIG partitions as schedulable resources. Each GPU should be split into 3g.40gb instances.
question: How would you configure MIG on the node and have pods request the specific 3g.40gb partitions?
details:
  realistic_solution: 'Setup: (1) Enable MIG on each GPU: nvidia-smi -i 0,1,2,3 -mig 1 (requires GPU reset). (2) Create two 3g.40gb GPU instances per A100 80GB GPU using the supported MIG profile layout, then create the corresponding compute instances. Repeat for GPUs 1-3, yielding 8 total 3g.40gb instances. (3) Configure the NVIDIA device plugin with migStrategy=mixed when pods must request named MIG profiles such as nvidia.com/mig-3g.40gb. (4) Pod spec: resources.limits: nvidia.com/mig-3g.40gb: 1 requests one 3g.40gb partition. The container sees one MIG device with 40 GB memory and 3/7 compute capacity. Use single strategy only when the node is intentionally homogeneous and a generic GPU resource name is acceptable; do not rely on it when the scheduler must distinguish MIG profiles. Operational consideration: changing MIG profiles requires draining the node, resetting GPUs, and reconfiguring; plan profiles around the workload mix.'
  common_mistake: |
    **The Pitfall:** Assuming standard `nvidia.com/gpu` resource requests work dynamically with MIG without configuring device plugins.
    **The Rationale:** Engineers accustomed to simple GPU pass-through assume Kubernetes naturally understands sub-GPU partitioning.
    **The Consequence:** Pods fail to schedule because MIG instances are exposed as different resource types (e.g., `nvidia.com/mig-3g.40gb`), requiring specific device plugin configurations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 GPUs, 80GB each.
    - Partition target: 3g.40gb (40GB memory, 3/7 compute).

    **Calculations:**
    - On an A100 80GB, the supported 3g.40gb MIG layout allows 2 such instances per GPU.
    - Total instances: 4 GPUs * 2 supported 3g.40gb instances/GPU = 8 instances.
    - Kubernetes resource to request with mixed strategy: nvidia.com/mig-3g.40gb.

    **Conclusion & Interpretation:**
    - **Result: 8 schedulable nvidia.com/mig-3g.40gb instances.** Capacity comes from the GPU's supported MIG profile layout, not from naive memory division alone.
