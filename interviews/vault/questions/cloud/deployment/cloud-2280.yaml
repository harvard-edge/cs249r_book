title: The Compression Pipeline Ordering Trap
scenario: 'You plan to apply both pruning and quantization to a 13B parameter model before deploying it on a single A100. A junior engineer asks: ''Does it matter whether we prune first and then quantize, or quantize first and then prune?'' Explain why the order matters and which sequence is generally preferred.'
question: Does it matter whether we prune first and then quantize, or quantize first and then prune?
details:
  realistic_solution: 'Order matters because each compression step alters the statistical properties of the weights. The standard pipeline is: (1) prune first, (2) fine-tune to recover accuracy, (3) quantize. Pruning removes weights based on magnitude or sensitivity analysis of the full-precision model, where the signal is clearest. If you quantize first, the reduced precision introduces noise into the weight magnitudes, making pruning decisions less reliable — you may prune weights that only appear small due to quantization rounding. Additionally, quantization calibration should be performed on the final weight distribution (post-pruning), since pruning changes the activation distributions that calibration statistics depend on. Reversing the order means your quantization ranges are calibrated for a model that no longer exists after pruning.'
  common_mistake: |
    **The Pitfall:** Treating compression techniques as independent and order-agnostic.
    **The Rationale:** Candidates assume you can 'just apply both and the savings multiply', ignoring that each technique changes the weight distribution that the next technique must operate on.
    **The Consequence:** Applying quantization before pruning can make pruning decisions less reliable and forces calibration to be redone on a changed model distribution.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameter model.
    - Pruning ratio: 50%.
    - Quantization: INT4 (0.5 bytes/param).
    - Size reduction from pruning assumes structured pruning or a sparse-aware storage/runtime format; masks alone may not shrink dense files.
    **Calculations:**
    - FP16 Baseline: 13B * 2 bytes = 26 GB.
    - Prune then fine-tune: 6.5B retained parameters if pruning physically removes weights.
    - Quantize the final pruned model: 6.5B * 0.5 bytes = 3.25 GB.
    - Quantize then prune can reach the same nominal 3.25 GB only if the pruning step also removes or sparsely stores weights, but the pruning scores and quantization calibration were computed on the wrong distribution.
    **Conclusion & Interpretation:**
    - **Result: Order affects quality, not just size arithmetic.** Prefer pruning in full precision, fine-tuning to recover, then quantizing and calibrating the final model.
