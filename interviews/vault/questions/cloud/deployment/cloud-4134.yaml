title: Kubernetes GPU Device Plugin Architecture
scenario: A Kubernetes cluster is configured with the NVIDIA GPU device plugin to manage GPU resources.
question: 'When a pod requests nvidia.com/gpu: 2, what is the sequence of events from pod scheduling to GPU availability inside the container?'
details:
  realistic_solution: 'Sequence: (1) NVIDIA device plugin DaemonSet runs on every GPU node. On startup, it calls kubelet''s Registration API to register ''nvidia.com/gpu'' as an extended resource, reporting the count of available GPUs (e.g., 8 per node). (2) Pod spec requests nvidia.com/gpu: 2 in resources.limits. (3) kube-scheduler finds a node with ≥2 available nvidia.com/gpu resources and binds the pod. (4) kubelet calls the device plugin''s Allocate() RPC with the device IDs of 2 selected GPUs. (5) The device plugin returns: container environment variables (NVIDIA_VISIBLE_DEVICES=GPU-uuid1,GPU-uuid2), device mounts (/dev/nvidia0, /dev/nvidia1), and volume mounts for NVIDIA driver libraries. (6) kubelet creates the container with these environment variables and device mounts. (7) The NVIDIA container runtime (nvidia-container-runtime) intercepts the container creation, reads NVIDIA_VISIBLE_DEVICES, and sets up the GPU namespace so the container only sees 2 GPUs (appears as cuda:0 and cuda:1 inside the container). Important: GPU allocation is exclusive — a GPU assigned to one pod cannot be shared with another pod (unlike CPU, which is time-shared).'
  common_mistake: |
    **The Pitfall:** Thinking Kubernetes natively understands and manages GPUs out of the box.
    **The Rationale:** Candidates don't realize that Kubernetes only understands CPU/RAM natively; it requires a DaemonSet device plugin to register extended resources like GPUs.
    **The Consequence:** Misconfiguring clusters, attempting to fractionalize GPUs natively, or failing to debug basic GPU scheduling errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Node Capacity: 8 GPUs per node.
    - Pod Request: 2 GPUs.

    **Calculations:**
    - Available After Allocation: 8 - 2 = 6 GPUs available.
    - Max Pods per Node: 8 / 2 = 4 pods.

    **Conclusion & Interpretation:**
    - **Result: Exclusive Allocation (Resource Allocation).** GPU allocation is strictly exclusive and cannot be oversubscribed like CPUs.
