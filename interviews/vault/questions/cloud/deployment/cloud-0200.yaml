title: The Warm-up Request Strategy
scenario: We just deployed a new model version. The first inference request takes 12 seconds, but subsequent requests take 200ms. Our health check passed.
question: Why is the first real request 60× slower after health check passes, and how many warm-up requests are needed before production traffic?
details:
  realistic_solution: 'The first-request penalty comes from three sources: (1) **CUDA kernel JIT compilation:** PyTorch/TensorRT compiles and caches GPU kernels on first use. Different input shapes trigger different kernels. (2) **CUDA context and memory pool initialization:** The first `cudaMalloc` initializes the memory allocator, and the first kernel launch initializes the CUDA context on each GPU. (3) **cuBLAS handle and workspace allocation:** The first GEMM operation allocates cuBLAS workspace buffers. After the first request, all of these are cached. You need warm-up requests that cover all expected input shapes (different sequence lengths, batch sizes) to trigger compilation of all kernel variants.'
  common_mistake: |
    **The Pitfall:** Assuming the model needs to "warm up" its internal caches like a CPU cache.
    **The Rationale:** Terminology from general software engineering misleads engineers into thinking inference has CPU-like caching semantics.
    **The Consequence:** Engineers fail to craft proper warm-up requests that cover all expected input shapes to trigger compilation of all kernel variants.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: H100. Model: 13B.
       - First request initiates JIT compilation and context allocation.
    2. **Calculations:**
       - CUDA context init: ~1-2s.
       - cuBLAS/cuDNN workspace allocation: ~1-2s.
       - JIT kernel compilation for specific sequence length: ~5-8s.
       - Total first request penalty: 1+1+5 to 2+2+8 = 7s to 12s.
    3. **Conclusion & Interpretation:**
       - **Result: Setup-Bound. Subsequent requests reuse context and compiled kernels, achieving ~200ms forward passes.**
