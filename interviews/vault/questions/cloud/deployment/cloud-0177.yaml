title: The Continuous Batching Death Spiral
scenario: Your team runs a real-time translation service using a 70B parameter model.
  The business requires a strict P99 Time-To-First-Token (TTFT) of under 500ms. To
  improve cost-efficiency, you replace static batching with continuous batching. Under
  normal load, GPU utilization jumps to 85% and P99 TTFT is ~250ms. During a traffic
  spike, GPU utilization hits 99%, but P99 TTFT explodes to over 8 seconds.
question: Why did an optimization designed for high throughput result in a catastrophic
  latency failure, and what fundamental law of systems have your team forgotten?
details:
  realistic_solution: This is a classic 'Queueing Death Spiral'. The team forgot that
    any service with a finite capacity is governed by Queueing Theory. The continuous
    batching engine, while efficient, has a maximum service rate (μ), measured in
    requests per second. Under normal load, the arrival rate (λ) is well below μ,
    so the queue of incoming requests is short, and wait times are minimal.
  common_mistake: '**The Pitfall:** Viewing the system purely as a GPU execution unit
    and misinterpreting 99% utilization as a universal good.

    **The Rationale:** Engineers focus on the GPU''s internal mechanics (batch size,
    KV cache evictions) but forget fundamental Queueing Theory: when arrival rate
    meets maximum service rate, latency explodes.

    **The Consequence:** Designing systems that operate perfectly under average load
    but catastrophically fail under variance, breaching SLAs.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Service Time (W_s): Single GPU (3.35 TB/s) serving 70B (140GB) decode = ~41.8ms/token.
    100 tokens = ~4.18s.

    - Service Rate (μ): At max batch 64, max throughput is 15 requests/sec.


    **Calculations:**

    - Normal Arrival Rate (λ): 10 requests/sec. (Queue is stable).

    - Spike Arrival Rate (λ): 15 requests/sec (Utilization = 1.0).


    **Conclusion & Interpretation:**

    - **Result: Queueing Death Spiral (Latency-Bound)**. As utilization approaches
    1.0, queueing theory dictates that wait time (queue length) approaches infinity.

    '
