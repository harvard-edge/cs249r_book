title: 'Serving a 70B Model: MI300X PCIe TP=2 vs H100 NVLink TP=2'
scenario: 'A 70B LLM (FP16, 140GB) must be served at 200 req/s with p99 latency < 200ms. Option A: 2x MI300X (192GB each, 5.3 TB/s each) with tensor parallelism TP=2 via PCIe. Option B: 2x H100 (80GB each, 3.35 TB/s each) with TP=2 via NVLink 4.0 (900 GB/s).'
question: For the 70B LLM at 200 req/s and p99 <200 ms, how do MI300X PCIe TP=2 and H100 NVLink TP=2 compare, and what should you deploy?
details:
  realistic_solution: Compare the two stated TP=2 deployments first. With tensor parallel sharding, each GPU holds roughly half of the 140GB FP16 weights, or 70GB before KV cache, activations, runtime workspace, and fragmentation. MI300X has ample memory headroom per card, but PCIe tensor-parallel communication is the likely latency limiter. H100 has only about 10GB headroom per card after weights, so KV cache must be tightly managed, but NVLink gives much lower TP synchronization overhead. Using the problem's simplified communication model, a 268MB AllReduce over PCIe 5.0 at 128 GB/s takes about 2.1ms; 160 such synchronizations would add about 336ms and violate the 200ms p99 target. The same traffic over idealized H100 NVLink bandwidth at 900 GB/s is about 0.30ms each, or 47ms total. Among the two listed TP=2 options, deploy H100 NVLink TP=2 if the KV budget is validated. If the scenario allows changing the deployment shape, a single MI300X is a strong alternative because the 140GB model
    fits without TP communication, but that is outside the two TP=2 options being compared.
  common_mistake: |
    **The Pitfall:** Assuming TP=2 communication overhead is negligible on both platforms.
    **The Rationale:** Candidates fail to check if the model fits on a single card (which eliminates TP entirely) or ignore the massive bandwidth gap between PCIe 5.0 and NVLink 4.0.
    **The Consequence:** Deploying a multi-GPU PCIe topology that violates the latency SLA due to inter-GPU communication bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - MI300X (192GB, 5.3 TB/s) with TP=2 over PCIe 5.0.
    - H100 (80GB, 3.35 TB/s) with TP=2 over NVLink 4.0.
    - Model: 70B FP16 = 140GB.
    - Simplified TP communication estimate: 268MB per AllReduce, 160 AllReduces per pass.

    **Calculations:**
    - TP=2 weight shard per GPU = 140GB / 2 = 70GB.
    - MI300X memory headroom per GPU = 192 - 70 = 122GB before runtime overhead.
    - H100 memory headroom per GPU = 80 - 70 = 10GB before runtime overhead, so KV capacity is tight and must be checked.
    - MI300X PCIe (128 GB/s): 268MB / 128 GB/s = 2.1ms. Total = 160 × 2.1ms = 336ms. (Exceeds 200ms SLA).
    - H100 NVLink (900 GB/s): 268MB / 900 GB/s = 0.30ms. Total = 160 × 0.30ms = 47ms.

    **Conclusion & Interpretation:**
    - **Recommendation:** Among the stated TP=2 choices, H100 NVLink TP=2 is the lower-latency deployment, while MI300X PCIe TP=2 is communication-bound. A single-card MI300X may be better if allowed, but it is an alternative to the specified TP=2 comparison.
