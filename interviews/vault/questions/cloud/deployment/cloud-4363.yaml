title: 'Serving a 70B Model: MI300X Single-Card vs H100 Tensor Parallel'
scenario: 'A 70B LLM (FP16, 140GB) must be served at 200 req/s with p99 latency < 200ms. Option A: 2x
  MI300X (192GB each, 5.3 TB/s each) with tensor parallelism TP=2 via PCIe. Option B: 2x H100 (80GB each,
  3.35 TB/s each) with TP=2 via NVLink 4.0 (900 GB/s).'
question: For the 70B LLM at 200 req/s and p99 <200 ms, how do MI300X PCIe TP=2 and H100 NVLink TP=2 compare,
  and what should you deploy?
details:
  realistic_solution: 'Memory per card: MI300X option: 70GB per card (fits in 192GB with 122GB slack).
    H100 option: 70GB per card (fits in 80GB with 10GB slack). Communication analysis: AllReduce per transformer
    layer: tensor size = 268MB. Per 80-layer model: 160 AllReduces. MI300X PCIe 5.0 (128 GB/s): 2.1ms
    per AllReduce, total 336ms. H100 NVLink (900 GB/s): 0.30ms per AllReduce, total 47ms. Recommendation:
    single MI300X (70GB fits, 50GB+ KV cache headroom) with no TP. Single-card eliminates communication
    overhead entirely and leverages bandwidth for decode.'
  common_mistake: '**The Pitfall:** Assuming TP=2 communication overhead is negligible on both platforms.

    **The Rationale:** Candidates fail to check if the model fits on a single card (which eliminates TP
    entirely) or ignore the massive bandwidth gap between PCIe 5.0 and NVLink 4.0.

    **The Consequence:** Deploying a multi-GPU PCIe topology that violates the latency SLA due to inter-GPU
    communication bottlenecks.

    '
  napkin_math: '**Assumptions & Constraints:**

    - MI300X (192GB, 5.3 TB/s). H100 (80GB, 3.35 TB/s).

    - Model: 70B (140GB).


    **Calculations:**

    - MI300X (192GB): Model fits on 1x MI300X (140GB < 192GB). KV cache headroom: 192 - 140 = 52GB.

    - H100 (80GB): 140GB > 80GB, so minimum H100 TP=2 is required.

    - AllReduce overhead (TP=2): 268MB per AllReduce. 160 AllReduces per pass.

    - MI300X PCIe (128 GB/s): 268MB / 128 GB/s = 2.1ms. Total = 160 × 2.1ms = 336ms. (Exceeds 200ms SLA).

    - H100 NVLink (900 GB/s): 268MB / 900 GB/s = 0.30ms. Total = 160 × 0.30ms = 47ms.


    **Conclusion & Interpretation:**

    - **Recommendation:** Use single-card MI300X instances (no TP) to eliminate communication overhead
    and fit the 200ms SLA.'
