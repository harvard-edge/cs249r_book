title: Cloud New 0009
scenario: Architect a multi-modal serving platform (Vision + Text) on H100s. The vision encoder extracts features, and the LLM auto-regressively generates text.
question: How would you design a decoupled H100 serving pipeline for a vision encoder feeding an autoregressive LLM?
details:
  realistic_solution: 'Separate the vision encoder and LLM into distinct service pools. Route image inputs to an encoder pool optimized for high-throughput batching, outputting feature embeddings. Stream these embeddings into an LLM pool designed with continuous batching for text generation. Use an asynchronous message queue between them. Scale the pools independently: dynamically allocate more H100s to the LLM pool since auto-regressive generation is much slower than single-pass vision encoding.'
  common_mistake: |
    **The Pitfall:** Colocating the vision encoder and LLM in the same GPU process.
    **The Rationale:** Engineers assume multi-modal models must run as a single monolithic block on the same hardware.
    **The Consequence:** Locking up VRAM and forcing the extremely fast vision encoder to wait on slow, memory-bound autoregressive text decoding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vision encoder (ViT): ~1B params = 2 GB FP16.
       - LLM (70B): 140 GB FP16.
    2. **Calculations:**
       - Single pass on H100 (989 TFLOPS) is micro-seconds for Vision.
       - Decoding relies on 3.35 TB/s HBM3 and takes significantly longer.
    3. **Conclusion & Interpretation:**
       - **Result: 10:1 Ratio Required. The latency disparity means the ratio of LLM to Vision nodes should be heavily skewed towards LLM.**
