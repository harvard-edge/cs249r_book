title: The Continuous Batching Scheduler
scenario: 'We serve a 13B model with static batching: we collect 32 requests, run them together, and return all results when the longest sequence finishes. Average latency is 4 seconds, but P99 is 12 seconds. The team wants to try vLLM''s continuous batching.'
question: 'How does continuous batching reduce the 13B model''s static-batching latency, and what improvement should you expect?'
details:
  realistic_solution: 'Continuous batching (iteration-level scheduling) operates at the granularity of individual decode steps. After each token generation step, the scheduler evicts completed requests immediately, freeing KV-cache memory, and instantly admits new requests from the queue. The GPU is never idle padding completed requests.'
  common_mistake: |
    **The Pitfall:** Claiming that continuous batching simply uses a larger static batch size to increase overall throughput.
    **The Rationale:** Candidates confuse the static concept of "batch size" with the scheduling dynamics of "iteration-level" slot reuse.
    **The Consequence:** Engineers might attempt to just increase the static batch size limit, which mathematically worsens P99 latency and exacerbates memory fragmentation without solving the idle-slot problem.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Static batch size: 32. Max request duration: 10s.
    2. **Calculations:**
       - Static Throughput: 32 requests / 10s = 3.2 req/s.
       - GPU Utilization: Drops rapidly as short requests finish in 1s, leaving slots idle for 9s.
       - Continuous Batching: Evicts requests immediately, backfilling slots instantly.
       - Effective Throughput: Avoids idle padding slots, pushing throughput to ~7-8 req/s.
    3. **Conclusion & Interpretation:**
       - **Result: Utilization-Bound. Continuous batching eliminates slot idling, generating a ~2.5x throughput increase and significantly dropping P99 latency.**
