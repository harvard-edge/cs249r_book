title: Diagnosing Low GPU SM Utilization and Right-Sizing
scenario: You observe that 40% of GPU jobs on your compute cluster show <20% GPU utilization (SM activity).
question: What are three common causes of <20% GPU utilization, and what right-sizing action would you take for each?
details:
  realistic_solution: 'Cause 1: CPU-bound data preprocessing. The DataLoader cannot feed data fast enough, leaving GPUs idle between batches. GPU util cycles between 0% and 100%. Fix: increase num_workers, use prefetching, move preprocessing to GPU (DALI/cuDF), or use WebDataset for pre-processed shards before shrinking the GPU. Cause 2: batch size or model work is too small for the allocated accelerator. A 3B model with a small batch may use little SM time even though it fits easily in memory. Fix: increase batch size if latency allows, consolidate multiple compatible jobs on one GPU, or move the job to a smaller GPU class or a supported partitioned GPU SKU. Cause 3: inference serving has low QPS and large gaps between requests. The GPU computes a forward pass in 5 ms but waits 200 ms between requests, so average utilization is 5/205 = 2.4%. Fix: enable dynamic batching, colocate multiple low-QPS models, or route the service to a smaller accelerator. Right-sizing policy: jobs consistently
    below 30% utilization for >1 hour get flagged with a recommendation to reduce GPU allocation.'
  common_mistake: |
    **The Pitfall:** Assuming low GPU utilization strictly means the user requested more GPU compute than their model requires.
    **The Rationale:** Administrators look at SM utilization in isolation, ignoring that GPUs often sit idle waiting for slow CPU data loaders or network synchronization.
    **The Consequence:** Blindly shrinking GPU allocations, which fails to solve data bottlenecks and simply makes the jobs run even slower.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40% of the cluster is running at 20% utilization.
    - 100-GPU cluster at $3/hr per GPU.

    **Calculations:**
    - Effective waste = 0.40 * (1.00 - 0.20) = 32% of total cluster capacity.
    - Hourly waste: 100 GPUs * 32% * $3/hr = $96/hr.
    - Yearly waste: $96/hr * 8760 hrs ≈ $840,960.

    **Conclusion & Interpretation:**
    - **Result: Utilization-Bound**. This inefficiency wastes approximately $840,000 per year, prioritizing the need for aggressive right-sizing.
