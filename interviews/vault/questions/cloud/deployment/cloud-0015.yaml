title: The FP16 Memory Footprint
scenario: Your team is upgrading a production language model from 7B to 13B parameters as part of a new rollout. The model is served in FP16 precision.
question: "How much HBM is needed for the FP16 weights of the new 13B model, and does it fit on a single 80GB GPU?"
details:
  realistic_solution: The new 13B model will require 26 GB of HBM to store the model weights. This is a significant increase from the 14 GB required by the 7B model, but it still fits comfortably within the 80 GB of HBM available on a single GPU. This calculation is critical for capacity planning in your orchestration system (like Kubernetes) to ensure pods are scheduled on nodes with sufficient available GPU memory.
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for inference with training.
    **The Rationale:** During training with the Adam optimizer, memory usage is ~16 bytes per parameter. For inference, it's only the model weights.
    **The Consequence:** Massive over-provisioning of GPU hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Model Size: 13 Billion parameters.
       * Data Type: FP16 = 2 bytes per parameter.
       * GPU Capacity: 80 GB HBM.
    2. **Calculations:**
       * Total Weight Memory: 13 * 10^9 * 2 bytes = 26 GB.
       * Utilization: 26 GB / 80 GB = 32.5%.
    3. **Conclusion & Interpretation:** **Result: 26 GB (Capacity-Bound)**. It fits easily onto a single 80GB GPU.
  options:
  - '13 GB. (Calculated trap: Assumes 1 byte per parameter, as with INT8 quantization)'
  - '52 GB. (Calculated trap: Assumes 4 bytes per parameter, as with FP32 precision)'
  - '26 GB. (Correct: 13 billion parameters * 2 bytes for FP16 precision)'
  - '208 GB. (Calculated trap: Confuses inference memory with training memory using the Adam optimizer, which needs ~16 bytes/param)'
  correct_index: 2
