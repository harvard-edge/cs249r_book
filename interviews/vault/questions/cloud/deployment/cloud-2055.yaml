title: The RAG vs Fine-Tuning Breakeven Analysis
scenario: 'Your team debates whether to use RAG or fine-tune a model on 100K domain-specific documents. RAG adds retrieval latency and ongoing vector DB costs. Fine-tuning eliminates retrieval latency but costs $5K per training run, needs monthly retraining, and bakes knowledge into weights. Traffic is 50K queries/day with a 6-month horizon.'
question: 'Which approach has lower TCO, and at what query volume does the breakeven point shift?'
details:
  realistic_solution: 'Execute a full TCO cross-over analysis. RAG avoids fixed CapEx training costs but incurs higher OpEx due to larger context windows. Fine-tuning saves money per query because prompts omit the retrieved context tokens. The best architecture is typically hybrid: fine-tune for domain vocabulary, but use RAG for factual grounding.'
  common_mistake: |
    **The Pitfall:** Comparing only inference latency or only the upfront training costs.
    **The Rationale:** Over-indexing on either CapEx (training) or OpEx (inference) without doing a rigorous break-even mathematical analysis.
    **The Consequence:** Choosing an architecture that is deeply uneconomical based on the actual production scale of user traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - RAG Cost: $0.006 (LLM context) + $0.00006 (retrieval) = $0.00606/query.
       - Fine-Tuned Cost: $0.0015/query (shorter prompt).
       - Training CapEx: $5,000/month.
       - Traffic: 50,000 queries/day.
    2. **Calculations:**
       - Savings Per Query (FT): $0.00606 - $0.0015 = $0.00456.
       - Break-even Volume: $5,000 / $0.00456 = ~1.1M queries.
       - Break-even Time at 50K/day: 1,100,000 / 50,000 = 22 days.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound TCO. Fine-tuning recoups its CapEx in 22 days and saves $1,840/month net at 50K queries/day. RAG is only cheaper at volumes below ~36K queries/day.**
