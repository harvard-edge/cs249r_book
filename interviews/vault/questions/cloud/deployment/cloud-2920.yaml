title: Router Model Accuracy vs Latency Tradeoff in Multi-Model Pipeline
scenario: >-
  A cloud pipeline routes queries between GPT-4-class (2000ms, $0.03/query)
  and a fine-tuned 7B model on A100 (80GB HBM2e, 180ms, $0.002/query). The router
  itself is a 350M classifier running at 8ms. Current routing accuracy is 91% — 9%
  of complex queries incorrectly go to the cheap model and require a fallback retry,
  adding 180ms+2000ms=2180ms latency.
question: >-
  Is 91% router accuracy sufficient for the GPT-4-class versus 7B routing
  setup, given expected latency, P95, and cost?
details:
  realistic_solution: 'Compute expected latency per query: 0.91*(8+180) + 0.09*(8+180+2000) = 0.91*188 + 0.09*2188 = 171 + 197 = 368ms expected. Compare to always-large: 2008ms. Always-small: 188ms (but quality failure). The 9% misroute inflates P95 significantly — at P95 you hit the fallback path. To hit a 300ms P95: need fallback rate < 5% or a confidence-threshold abort (send to large immediately if router confidence < 0.85).'
  common_mistake: |
    **The Pitfall:** Optimizing for router accuracy without computing the latency cost of misroutes.
    **The Rationale:** A 9% error rate sounds small, but because the fallback path requires sequential execution, it entirely dominates the P95 tail latency.
    **The Consequence:** Deploying a routing system that looks good on average but violently violates P95 service level agreements (SLAs).
  napkin_math: |
    **Assumptions & Constraints:**
    - GPT-4 latency: 2000ms, cost: $0.03/query.
    - 7B latency: 180ms, cost: $0.002/query.
    - Router latency: 8ms, accuracy: 91% (9% fallback).

    **Calculations:**
    - Expected latency = 0.91 × (8+180) + 0.09 × (8+180+2000) = 171.08 + 196.92 = 368ms.
    - Expected cost = 0.91 × $0.002 + 0.09 × ($0.002+$0.03) = $0.0047/query.
    - P95 Latency = Since error rate is 9%, the 95th percentile hits the fallback path.

    **Conclusion & Interpretation:**
    - **Result: 2188ms P95 (Latency-Bound)**. While average latency and cost are excellent, the 9% error rate completely blows out P95 SLAs.
