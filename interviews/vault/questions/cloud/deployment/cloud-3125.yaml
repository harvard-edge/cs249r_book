title: Recall TCO CapEx vs OpEx Split for GPU Cloud Training
scenario: During a cloud ML infrastructure interview, you are asked to calculate the fully-loaded hourly cost for an on-premises H100 cluster. The setup involves 8 GPUs at $30,000/GPU, a 3-year depreciation cycle, 70% average utilization, $0.12/kWh electricity, 700W TDP per GPU, and a 1.4 PUE data center overhead.
question: What is the fully-loaded hourly cost per GPU including CapEx amortization and OpEx?
details:
  realistic_solution: |
    Calculate fully-loaded cost by amortizing hardware CapEx across purely utilized hours, factoring in the datacenter premium (racks, networking), and compounding power draw by the PUE overhead. At 70% utilization, on-prem deployment runs ~$2.56/h per GPU, which is surprisingly higher than cloud spot pricing (~$2.00-2.50/h) unless utilized >80%.
  common_mistake: |
    **The Pitfall:** Computing only hardware cost without including power, cooling overhead (PUE), and the utilization discount.
    **The Rationale:** Many engineers naive to TCO modeling simply divide hardware costs by calendar hours (8760h/year), forgetting that idle time does not generate value and power usage is a continuous expense.
    **The Consequence:** The calculated cost significantly underestimates true TCO, leading to faulty build-vs-buy decisions that financially penalize the organization.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU CapEx: $30,000.
    - Amortization: 3 years at 70% utilization.
    - Datacenter Overhead: 1.5x multiplier on hardware.
    - Power: 700W TDP per GPU, 1.4 PUE, $0.12/kWh.

    **Calculations:**
    - Useful Hours: 3 years * 8760 hours * 0.70 = 18,396 hours.
    - Amortized Base CapEx/h: $30,000 / 18,396 hours = $1.63/h.
    - Loaded CapEx/h (1.5x): $1.63 * 1.5 = $2.44/h.
    - OpEx Power: 700W * 1.4 = 980W (0.98 kW).
    - Power Cost: 0.98 kW * $0.12/kWh = $0.12/h.
    - Total Fully-Loaded TCO: $2.44 + $0.12 = $2.56/h.

    **Conclusion & Interpretation:**
    - **Result: Utilization-Bound.** The fully loaded cost is $2.56/GPU/hr. If cluster utilization drops below 70%, the amortized CapEx per useful hour spikes, making on-prem deployment significantly more expensive than cloud spot pricing (~$2.00/h).
