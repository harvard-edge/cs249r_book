title: The Embedding Index Memory Budget
scenario: You have 50 million document embeddings, each 1536 dimensions in FP32. You want to load the entire HNSW index into RAM for sub-10ms retrieval.
question: "How much memory does just the raw vector data require, before any graph overhead?"
details:
  realistic_solution: Multiply the count by the dimensions, and crucially, by 4 bytes per FP32 dimension to find the raw size in bytes.
  common_mistake: |
    **The Pitfall:** Forgetting the FP32 4-byte multiplier.
    **The Rationale:** Confusing vector count or dimensions directly with byte size.
    **The Consequence:** Under-provisioning RAM by 4x, leading to massive OOM failures during index load.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50,000,000 vectors.
    - 1536 dimensions, FP32 format.

    **Calculations:**
    - Raw vector size = 1536 * 4 bytes = 6,144 bytes.
    - Total raw memory = 50,000,000 * 6,144 bytes = 307.2 GB.

    **Conclusion & Interpretation:**
    - **Result: Raw data requires 307.2 GB of RAM (Memory-Capacity-Bound)**. Compute-Bound indexing follows memory provisioning.
