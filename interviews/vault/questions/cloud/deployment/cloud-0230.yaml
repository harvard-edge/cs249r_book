title: The Speculative Decoding Accept Rate Crash
scenario: 'You implement Speculative Decoding to speed up an LLM. You use a 1B draft model to guess 5 tokens, and a 70B target model to verify them in a single pass. On standard English text, it yields a 2.5x speedup. When you deploy it to your coding assistant API, the overall throughput drops by 15% compared to not using Speculative Decoding at all.'
question: 'Why did the Speculative Decoding optimization become a performance penalty for the coding assistant?'
details:
  realistic_solution: 'Speculative decoding becomes a penalty when the draft model''s acceptance rate drops below the break-even threshold. For code, with strict syntax and low-entropy distributions, acceptance drops significantly. This tiny latency gain is completely wiped out by the draft model''s KV-cache consuming GPU memory, which reduces batch capacity and drops overall throughput by 15%.'
  common_mistake: |
    **The Pitfall:** Dismissing the issue simply as "code is harder to generate."
    **The Rationale:** Recognizing the entropy shift but failing to do the math on the break-even threshold for latency vs KV-cache overhead.
    **The Consequence:** Leaving a performance-degrading "optimization" enabled because its failure mode isn't quantitatively understood.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle: 5ms draft + 20ms target verify = 25ms total.
    - Standard decoding: 20ms/token.

    **Calculations:**
    - Break-even: 25ms / 20ms = 1.25 tokens generated per cycle.
    - If code entropy causes 0 draft tokens accepted (1 target total): 25ms/tok.
    - 25ms/tok is 20% slower than baseline.

    **Conclusion & Interpretation:**
    - **Result: 15% Throughput Drop (Memory-Capacity-Bound)**. 25ms/tok is slower than baseline, and the draft model's VRAM overhead reduces batch capacity, combining for a 15% overall throughput drop.
