title: The Speculative Decoding Accept Rate Crash
scenario: You implement Speculative Decoding to speed up an LLM. You use a 1B draft model to guess 5 tokens,
  and a 70B target model to verify them in a single pass. On standard English text, it yields a 2.5x speedup.
  When you deploy it to your coding assistant API, the overall throughput drops by 15% compared to not
  using Speculative Decoding at all.
question: Why did the Speculative Decoding optimization become a performance penalty for the coding assistant?
details:
  realistic_solution: Speculative decoding becomes a penalty when the draft model's acceptance rate drops
    below the break-even threshold. For code, with strict syntax and low-entropy distributions, acceptance
    drops significantly. This tiny latency gain is outweighed by the overhead. The draft model's KV-cache
    consumes GPU memory, reducing batch capacity, combining with higher per-token latency to cause a 15%
    overall throughput drop.
  common_mistake: '**The Pitfall:** Dismissing the issue simply as "code is harder to generate."

    **The Rationale:** Recognizing the entropy shift but failing to do the math on the break-even threshold
    for latency vs KV-cache overhead.

    **The Consequence:** Leaving a performance-degrading "optimization" enabled because its failure mode
    isn''t quantitatively understood.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Cycle: 5ms draft + 20ms target verify = 25ms total.

    - Standard decoding: 20ms/token.


    **Calculations:**

    - Break-even: 25ms / 20ms = 1.25 tokens generated per cycle.

    - With low acceptance, say 1.12 tokens per cycle: 25ms / 1.12 = ~22.3ms/tok.

    - 22.3ms/tok is a ~10% drop in throughput compared to the 20ms baseline.

    - The draft model''s VRAM overhead reduces batch capacity by ~5%.

    - Total throughput = 0.90 * 0.95 = ~0.85 (a 15% drop).


    **Conclusion & Interpretation:**

    - **Result: 15% Throughput Drop (Memory-Capacity-Bound)**. The slightly worse latency per token combines
    with the batch capacity reduction to yield a 15% overall throughput drop.'
