title: The Chatbot Lag Spike
scenario: 'You are the Staff ML Systems Engineer for a popular AI chatbot service running a 70B parameter model. Users are complaining that the service "feels laggy to start". The system uses static batching with a batch size of 64 at 95% GPU utilization. You measure Time-To-First-Token (TTFT) and find P50 TTFT is 150ms, but P99 TTFT is 2.5 seconds.'
question: 'What explains the huge gap between 150ms P50 TTFT and 2.5s P99 TTFT with static batching of 64 at 95% GPU utilization?'
details:
  realistic_solution: 'The primary cause is head-of-line blocking from the static batching strategy in an overloaded system. A new request that arrives just after a large batch has started must wait in a queue for the entire batch to complete its generation. The solution is continuous batching (e.g., ORCA/PagedAttention) to dynamically add requests.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing TTFT spikes as a pure hardware or prefill computation bottleneck.
    **The Rationale:** High TTFT usually means the prefill stage is slow, so engineers look to kernel fusion or GPU upgrades.
    **The Consequence:** Wasting resources on hardware upgrades or kernel optimizations while the actual bottleneck—queue wait time caused by static batching—remains unaddressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batching policy: Static batching (size 64).
    - Average generation: 100 tokens at 20ms/token.
    - Base Prefill Time: 150ms.

    **Calculations:**
    - Generation Time: 100 tokens * 20ms = 2.0 seconds.
    - Static Batching Delay: A request arriving just after a batch starts waits the entire 2.0s generation time.
    - P99 TTFT: Queue Time (2000ms) + Prefill Time (150ms) = 2150ms (2.15s).

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. The massive P99 spike is driven entirely by queueing delays from static batching, not compute bottlenecks.
  options:
  - 'The prefill computation is stalling at 2.15s due to unoptimized attention kernels. (Mistaking queue time for compute time).'
  - 'The system is experiencing severe head-of-line blocking due to its static batching policy, causing 2.0s queue delays.'
  - 'The GPUs are throttling, causing a 16x degradation from 150ms to 2500ms. (Ignoring the static batching pipeline).'
  - 'Network I/O is saturated at the ingress, dropping the request packets. (Misdiagnosing system-level queueing as network congestion).'
  correct_index: 1
