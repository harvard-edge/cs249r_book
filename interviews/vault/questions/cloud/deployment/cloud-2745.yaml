title: Continuous Training Cost Model
scenario: You switch a model from weekly retraining (full retrain, 8h on 8 A100s) to continuous training triggered by drift detection (incremental fine-tune, 2h on 4 A100s, average 3 triggers/week). Calculate the change in weekly GPU cost at $3/GPU-hour and include the auxiliary monitoring, data pipeline, and validation overhead.
question: What is the weekly GPU cost change, and does continuous training save money once monitoring, data pipeline, and validation overhead are included?
details:
  realistic_solution: 'Weekly full retrain: 8 GPUs × 8h × $3 = $192/week. Continuous retraining: 3 triggers/week × 4 GPUs × 2h × $3 = $72/week. Direct GPU savings are $192 - $72 = $120/week ($6,240/year). Under the stated overhead assumptions, continuous retraining also adds drift monitoring (modeled as an illustrative always-on 0.5 GPU equivalent = $3 × 0.5 × 168h = $252/week), data pipeline compute for incremental ingestion (~$50/week), and model validation per trigger (3 × 0.5h × 1 GPU × $3 = $4.5/week). Total continuous retraining cost is $72 + $252 + $50 + $4.5 = $378.5/week, so continuous minus weekly retraining is $378.5 - $192 = $186.5/week more expensive. It does not save money under this trigger rate and overhead model; the case would have to come from fresher models improving business metrics or from lower monitoring/pipeline costs.'
  common_mistake: |
    **The Pitfall:** Only comparing direct GPU training costs.
    **The Rationale:** Forgetting that event-driven retraining requires always-on auxiliary infrastructure to detect drift and stage data.
    **The Consequence:** Significantly underestimating the TCO of continuous training and making a flawed ROI argument.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Cost: $3/hr.
    - Weekly Retrain: 8 GPUs * 8h.
    - Continuous Retraining: 3 triggers/wk * 4 GPUs * 2h.
    - Continuous Overhead: monitoring, pipeline, validation.
    - Monitoring is modeled as an illustrative always-on 0.5 GPU equivalent.

    **Calculations:**
    - Weekly Retrain GPU Cost: 8 * 8 * $3 = $192/wk.
    - Continuous Retraining GPU Cost: 3 * 4 * 2 * $3 = $72/wk.
    - Continuous Overhead: Always-on monitoring (~$252/wk), data pipeline (~$50/wk), and validation (~$4.5/wk) total ~$306.5/wk.
    - Total Continuous Cost: $72 + $306.5 = $378.5/wk.

    **Conclusion & Interpretation:**
    - **Result: continuous retraining costs $186.5/wk more than weekly retraining (Cost-Bound)**. Under the stated trigger rate and overhead assumptions, continuous retraining does not save money; the conclusion could change with lower monitoring cost, fewer triggers, or higher business value from reduced staleness.
