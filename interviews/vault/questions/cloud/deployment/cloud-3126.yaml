title: Implement Cost Allocation Per Training Run on Shared H100 Cluster
scenario: You must implement a cost accounting system for a shared 64-GPU cluster ($1.80/GPU/h fully-loaded). A 175B GPT training run uses 32 GPUs for 14 days. A 7B fine-tuning run uses 8 GPUs for 3 days and overlaps with the large run. Storage checkpoint writes cost an additional overhead of $0.10/GPU/h.
question: How would you calculate per-job costs, allocate shared overhead, and attribute idle time on the 64-GPU cluster?
details:
  realistic_solution: |
    Price each job as base GPU-hours plus the storage overhead allocated on the same GPU-hour basis. The 175B run uses 32 GPUs for 336 hours: base GPU cost is 32 x 336 x $1.80 = $19,353.60, storage overhead is 32 x 336 x $0.10 = $1,075.20, and total allocated job cost is $20,428.80. The 7B run uses 8 GPUs for 72 hours: base GPU cost is 8 x 72 x $1.80 = $1,036.80, storage overhead is 8 x 72 x $0.10 = $57.60, and total allocated job cost is $1,094.40. Idle time on the 64-GPU cluster should be attributed by reservation ownership: GPUs reserved by a team are charged to that team even if their job is not running, while unreserved/unscheduled idle capacity remains in the platform operations budget. For example, 24 unreserved GPUs idle for 14 days cost 24 x 336 x $1.80 = $14,515.20 to the ops budget.
  common_mistake: |
    **The Pitfall:** Charging teams only for raw GPU-hours without allocating shared infrastructure overhead.
    **The Rationale:** Accounting systems are often built naively based on cloud provider instance pricing, ignoring the massive shared costs of high-performance storage and idle cluster time.
    **The Consequence:** The central platform team ends up subsidizing massive hidden storage and idle costs, destroying the financial viability of the internal AI platform.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base cost: $1.80/GPU/h. Storage overhead: $0.10/GPU/h.
    - 175B Job: 32 GPUs, 14 days (336 hrs).
    - 7B Job: 8 GPUs, 3 days (72 hrs).

    **Calculations:**
    - 175B base GPU cost: 32 * 336 * $1.80 = $19,353.60.
    - 175B storage overhead: 32 * 336 * $0.10 = $1,075.20.
    - 175B allocated total: $19,353.60 + $1,075.20 = $20,428.80.
    - 7B base GPU cost: 8 * 72 * $1.80 = $1,036.80.
    - 7B storage overhead: 8 * 72 * $0.10 = $57.60.
    - 7B allocated total: $1,036.80 + $57.60 = $1,094.40.
    - Idle Cost (24 GPUs for 14 days): 24 * 336 * $1.80 = $14,515.20.

    **Conclusion & Interpretation:**
    - **Result: TCO-Allocation-Bound**. Job bills must separate base GPU cost from shared overhead, and idle cost follows reservation ownership rather than being silently folded into completed job cost.
