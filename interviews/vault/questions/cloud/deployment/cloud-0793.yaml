title: 'The Ephemeral Storage I/O Cliff'
scenario: 'You are training a model on a massive cloud VM with 8x GPUs. You download your 1 TB dataset from S3 to the VM''s attached local NVMe drive (ephemeral storage). 12 hours into training, the VM is preempted as a Spot Instance. When the orchestration system resumes training from the checkpoint, it crashes because the dataset file is missing.'
question: 'Why is the 1 TB dataset missing after the spot instance is preempted and training resumes?'
details:
  realistic_solution: 'Ephemeral storage is physically attached to the host hardware. Preemption destroys the VM and re-creates it on a new physical host with a blank NVMe drive. Use persistent storage or implement startup scripts to re-download from S3.'
  common_mistake: |
    **The Pitfall:** Assuming the dataset simply failed to mount on the new instance.
    **The Rationale:** Candidates often misunderstand the ephemeral nature of local NVMe drives attached to spot instances, mistaking them for persistent network storage.
    **The Consequence:** Automated pipelines fail to account for data loss upon preemption, breaking the resume-from-checkpoint process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset size: 1 TB (1000 GB).
    - S3 network bandwidth: 10 Gbps (1.25 GB/s).

    **Calculations:**
    - Download time: 1000 GB / 1.25 GB/s = 800 seconds (~13.3 minutes).

    **Conclusion & Interpretation:**
    - **Result: 13.3 minutes of download time (Network-Bandwidth-Bound)**. Every preemption causes idle time waiting for re-download.
