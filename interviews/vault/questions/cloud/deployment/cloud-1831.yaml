title: Evaluating Confidential Computing for LLM Deployments
scenario: You are designing an architecture for a 140GB medical LLM on H100s. The CISO mandates hypervisor admins cannot dump weights from RAM. Evaluate the PCIe transfer overhead vs token generation latency for Confidential Computing.
question: Should you enable Confidential Computing for the 70B medical LLM, and will it keep p99 latency under 200ms/token?
details:
  realistic_solution: Enable Confidential Computing to protect weights from host and hypervisor memory inspection, but evaluate it against token-generation telemetry rather than a one-time 140GB transfer. The PCIe or secure-load penalty mainly affects startup and weight movement; steady-state decode should stay under 200ms/token only if the added TEE overhead on the measured baseline leaves headroom. For example, a 170ms/token baseline with 5% overhead becomes about 179ms/token, while a 195ms/token baseline would miss the SLA.
  common_mistake: |
    **The Pitfall:** Assuming standard disk and transit encryption is sufficient.
    **The Rationale:** Relying on basic AES/TLS compliance.
    **The Consequence:** Leaving 140GB of weights exposed in RAM to compromised host operating systems.
  napkin_math: |
    **Assumptions & Constraints:**
    - Security requirement: host admins must not be able to dump plaintext weights from RAM.
    - Existing measured p99 decode latency before CC: 170ms/token.
    - Expected steady-state CC overhead on token generation: 5%.
    - The 140GB transfer is startup or weight movement cost, not per-token latency.

    **Calculations:**
    - One-time lower-bound HBM scan time: 140GB / 3.18TB/s = 0.044s, or 44ms. This does not represent p99 token latency.
    - Estimated p99 with CC: 170ms/token * 1.05 = 178.5ms/token.
    - SLA headroom: 200ms - 178.5ms = 21.5ms/token.

    **Conclusion & Interpretation:**
    - **Result: enable CC if measured decode overhead keeps p99 below 200ms/token (Security and Latency Tradeoff)**. The sample baseline has enough headroom, but the 44ms model-size calculation only describes a transfer lower bound, not generation latency.
