title: The RAG Retrieval Tax
scenario: 'A user query to a production RAG system must first retrieve context from a vector database before hitting the LLM. This retrieval happens over the data center network.'
question: 'What is the approximate latency of a single cross-rack InfiniBand network hop to the vector database server?'
details:
  realistic_solution: 'The latency for a cross-rack InfiniBand NDR hop is approximately 5,000 nanoseconds (5 microseconds). This is a fundamental number in distributed systems design, representing the irreducible tax for any remote procedure call within the data center, even before the remote server does any work.'
  common_mistake: |
    **The Pitfall:** Confusing latency scales (ns, µs, ms).
    **The Rationale:** Engineers often mix up on-chip latency (nanoseconds), data center network latency (microseconds), and wide-area network latency (milliseconds).
    **The Consequence:** Misarchitecting distributed systems by severely underestimating or overestimating the cost of remote procedure calls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Single cross-rack InfiniBand NDR network hop.

    **Calculations:**
    - Direct table lookup for InfiniBand NDR latency: ~5,000 ns (5 microseconds).

    **Conclusion & Interpretation:**
    - **Result: ~5,000 ns (5 µs). (Network-Bound Latency Tax)**. Network RPC latency creates an irreducible floor for RAG latency.
  options:
  - '~300 ns'
  - '~5,000 ns (5 µs)'
  - '~100,000 ns (100 µs)'
  - '~40,000,000 ns (40 ms)'
