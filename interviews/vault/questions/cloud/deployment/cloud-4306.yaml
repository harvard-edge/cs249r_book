title: Batching Strategy Across Prefill Nodes
scenario: Requests arrive at a router with variable input lengths (50-8192 tokens, Zipf-distributed). Your prefill pool has 8 GPUs.
question: How would you batch 50-8192-token prefill requests on 8 GPUs to maximize throughput while keeping TTFT variation within 3x?
details:
  realistic_solution: 'Length-bucketed batching: sort incoming requests into length buckets. Batch requests within the same bucket together. Short requests are padded at most 2.56x, not 163x. Within each bucket, use continuous batching to avoid waiting for a full batch.'
  common_mistake: |
    **The Pitfall:** Padding all requests to the maximum length in a batch.
    **The Rationale:** It simplifies the implementation of batching logic to treat all sequences uniformly.
    **The Consequence:** A batch with one 8192-token request and several 50-token requests wastes nearly all its compute cycles on padding, destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batching 50 to 8192 tokens across 8 GPUs.
    - Compare one mixed batch of 7 short requests and 1 long request against length-bucketed batches.

    **Calculations:**
    - Naive padding for 7 x 50-token requests plus 1 x 8192-token request: (7*50 + 8192) / (8*8192) = 8542 / 65536 = 13.0% payload tokens overall, and only 350 / 57344 = 0.6% useful work on the short requests.
    - Bucketed padding separates the 7 short requests into a <=128-token bucket: 350 / (7*128) = 39.1% useful compute for that short-request batch.
    - The long request still runs in an 8192-token bucket, so overall gain depends on the live mix of short and long buckets and how continuously the scheduler fills each bucket.

    **Conclusion & Interpretation:**
    - **Result: higher short-request efficiency with bounded padding (Compute-Bound)**. Bucketing can materially improve throughput and TTFT variance, but the exact gain is an illustrative estimate that depends on bucket composition, scheduling policy, and utilization.
