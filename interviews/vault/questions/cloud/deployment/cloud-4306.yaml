title: Length Buckets for 50-8192 Token Prefill
scenario: Requests arrive at a router with variable input lengths (50-8192 tokens, Zipf-distributed). Your prefill pool has 8 GPUs.
question: How would you batch 50-8192-token prefill requests on 8 GPUs to maximize throughput while keeping TTFT variation within 3x?
details:
  realistic_solution: 'Use length buckets with admission control: for example <=128, <=256, <=512, <=1024, <=2048, <=4096, and <=8192 tokens. Batch only within a bucket, use continuous batching inside each bucket, and dispatch a partial batch when its oldest request approaches the TTFT budget. Reserve at least one prefill slot or weighted queue share for short buckets so long prompts cannot head-of-line-block 50-token requests. Adjacent buckets differ by at most 2x in padded work, leaving scheduling slack for queueing while keeping TTFT variation within the 3x target.'
  common_mistake: |
    **The Pitfall:** Padding all requests to the maximum length in a batch.
    **The Rationale:** It simplifies the implementation of batching logic to treat all sequences uniformly.
    **The Consequence:** A batch with one 8192-token request and several 50-token requests wastes nearly all its compute cycles on padding, destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batching 50 to 8192 tokens across 8 GPUs.
    - Use power-of-two-ish buckets: 128, 256, 512, 1024, 2048, 4096, 8192.
    - Compare padding waste and TTFT control against one mixed batch of 7 short requests and 1 long request.

    **Calculations:**
    - Naive padding for 7 x 50-token requests plus 1 x 8192-token request: (7*50 + 8192) / (8*8192) = 8542 / 65536 = 13.0% payload tokens overall, and only 350 / 57344 = 0.6% useful work on the short requests.
    - Bucketed padding separates the 7 short requests into a <=128-token bucket: 350 / (7*128) = 39.1% useful compute for that short-request batch.
    - A request is padded by at most about 2x within a bucket instead of up to 8192/50 = 164x across the whole range.
    - TTFT variation is controlled by queue policy, not padding alone: dispatch partial batches on age deadlines and reserve short-bucket capacity so the short queue is not blocked behind 4096-8192-token prefill work.

    **Conclusion & Interpretation:**
    - **Result: higher short-request efficiency with bounded padding (Compute-Bound)**. Bucketing improves throughput, while per-bucket age deadlines and reserved short-bucket capacity are what cap TTFT variation within the 3x target.
