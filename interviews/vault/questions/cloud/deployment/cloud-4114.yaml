title: GPU Preemption for Priority Inference
scenario: Your GPU cluster serves both latency-sensitive inference and batch training workloads. A high-priority inference model needs 8 MI300X GPUs immediately, but all GPUs are currently running training jobs.
question: How would you preempt training jobs to free 8 MI300X GPUs for urgent inference while minimizing wasted compute and meeting the SLA?
details:
  realistic_solution: Use scheduler-level priority preemption, not NVIDIA-specific sharing. Select the lowest-priority checkpointable training jobs occupying 8 MI300X GPUs, send a preemption notice, give them the configured 2-minute checkpoint/drain window, write checkpoints to fast local or shared storage, then evict the jobs and start the inference deployment on the freed GPUs. If the SLA cannot tolerate the drain window, keep an 8-GPU reserved inference pool or preempt already-checkpointed/restartable jobs first. Resume evicted training from checkpoints after the urgent inference window ends.
  common_mistake: |
    **The Pitfall:** Killing training jobs immediately via SIGKILL to rush the inference start.
    **The Rationale:** Schedulers assume batch jobs are entirely disposable and optimizing for time-to-start is the only metric.
    **The Consequence:** This wastes all compute performed since the last periodic checkpoint (potentially hours of multi-GPU training), dwarfing the value of the fast inference start.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA gap with graceful checkpoint: 2 min checkpoint + 1 min restart = 3 min.
    - Time since last checkpoint: 2 hours.
    - GPUs preempted: 8 MI300X.

    **Calculations:**
    - Wasted training compute (checkpointed): 8 GPUs * 3 min = 24 GPU-minutes.
    - Wasted training compute (immediate kill): 8 GPUs * 2 hr = 16 GPU-hours.
    - 24 GPU-minutes = 0.4 GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: Prefer checkpoint-and-evict preemption**. Graceful checkpointing reduces lost work from 16 GPU-hours to about 24 GPU-minutes while still freeing 8 MI300X GPUs for the urgent inference job.
