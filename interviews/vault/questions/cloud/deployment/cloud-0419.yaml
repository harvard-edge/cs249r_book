title: The RAG Update Memory Footprint
scenario: You are operating a critical safety service for an autonomous fleet that uses Retrieval-Augmented Generation (RAG). An urgent update requires you to re-index 1,000,000 documents. Your system generates 4096-dimensional embeddings in FP16. Your rollout strategy is blue-green.
question: What are the memory implications of the blue-green re-index, and how much extra storage is needed for 1M FP16 4096-d embeddings?
details:
  realistic_solution: The problem requires calculating the storage size for the new vector index. A blue-green deployment means we need to allocate this much *additional* memory to build the new index before tearing down the old one. The calculation is a direct multiplication of the number of documents, the dimensions per document, and the bytes required for the specified precision (FP16). FP16 requires 2 bytes per value.
  common_mistake: |
    **The Pitfall:** Confusing the memory footprints of different data types or systems.
    **The Rationale:** Engineers miscalculate bytes per dimension (e.g., using 4 bytes for FP16) or forget that blue-green deployments require 2x the memory capacity during the transition.
    **The Consequence:** Causing an Out-Of-Memory (OOM) crash during the critical safety update.
  napkin_math: |
    **Assumptions & Constraints:**
    - Documents: 1,000,000.
    - Dimensions: 4,096.
    - Precision: FP16 (2 bytes per dimension).

    **Calculations:**
    - Vector size: 4,096 * 2 bytes = 8,192 bytes.
    - Total new index size: 1,000,000 * 8,192 bytes = 8,192,000,000 bytes.
    - Convert to GB: 8,192,000,000 / (1024^3) = ~7.63 GiB (or ~8.19 GB decimal).

    **Conclusion & Interpretation:**
    - **Result: ~8.2 GB (Capacity-Bound)**. The system strictly requires an additional ~8.2 GB of memory to hold the new blue index concurrently before the green index is destroyed.
  options:
  - ~4.1 GB
  - ~16.4 GB
  - ~8.2 GB
  - ~0 GB
  correct_index: 2
