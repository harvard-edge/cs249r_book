title: The KV Cache Memory Trap
scenario: You are serving a 7B parameter LLM on a single GPU. A user makes a request with a very long context window of 128k tokens.
question: For a 7B FP16 model with a 128k-token request on an 80 GB GPU, what component is the primary OOM driver?
details:
  realistic_solution: The KV Cache is the largest memory consumer. While the model weights are fixed, the KV cache must store the key and value vectors for every token in the input sequence. For a 7B model, the weights are ~14 GB, but the KV cache for a 128k token sequence is ~67.1 GB. In multi-query attention (MQA) or grouped-query attention (GQA) architectures this is mitigated, but standard multi-head attention KV caches grow linearly with sequence length.
  common_mistake: |
    **The Pitfall:** Anchoring on the model's parameter count as the main driver of memory usage.
    **The Rationale:** Engineers often think a 7B model is "small" and forget that the KV cache size scales linearly with sequence length.
    **The Consequence:** They underestimate the memory required for long-context windows and fail to provision or optimize the KV cache properly.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B FP16 model (2 bytes/param).
    - 128k tokens, 32 layers, 32 heads, 128 dim.
    - GPU capacity: 80 GB.

    **Calculations:**
    - Weights Memory: 7B * 2 bytes = 14 GB.
    - KV Cache Memory: 128,000 * 32 * 32 * 128 * 2 * 2 bytes = ~67.1 GB.
    - Total: 14 + 67.1 = 81.1 GB.

    **Conclusion & Interpretation:**
    - **Result: 81.1 GB (Memory-Bound)**. KV cache size exceeds the 80 GB hardware limit.
  options:
  - 'Model parameters (weights)'
  - 'Optimizer state (e.g., Adam)'
  - 'The KV Cache'
  - 'Intermediate activations for the final token'
