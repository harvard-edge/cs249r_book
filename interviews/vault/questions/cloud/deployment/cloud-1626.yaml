title: Global Large Model Rollout and Rollback Evaluation
scenario: You manage a global recommendations API powered by a 30B parameter model (60GB FP16 weights) deployed on clusters of 8xH100 instances across 3 global regions. You are rolling out v2 of the model. The business SLA demands a global P99 latency of <150ms and a strict global rollback time of <60 seconds if catastrophic metric regressions are detected.
question: How should you distribute and roll back 60GB model weights across 3 regions to guarantee a sub-60-second global rollback?
details:
  realistic_solution: 'Decouple the infrastructure deployment from the model release. Pre-stage the 60GB v2 weights to regional object stores, and deploy v2 inference nodes alongside v1 nodes. Use a global L7 load balancer or service mesh to logically shift traffic percentages. A rollback is simply an API call to the load balancer to revert traffic routing back to 100% v1, bypassing infrastructure redeployment entirely.'
  common_mistake: |
    **The Pitfall:** Relying on a CI/CD pipeline to redeploy container images for rollback.
    **The Rationale:** Candidates apply standard microservice rollback strategies without considering the massive size of LLM weights.
    **The Consequence:** This ignores WAN transfer speeds and GPU memory loading times, guaranteeing a severe SLA violation during an outage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights size: 60 GB (FP16).
    - WAN bandwidth: 5 Gbps (0.625 GB/s).
    - Local NVMe to HBM3 bandwidth (PCIe Gen5): ~60 GB/s.
    - SLA: Global rollback < 60 seconds.

    **Calculations:**
    - WAN transfer time: 60 GB / 0.625 GB/s = 96 seconds.
    - VRAM load time: 60 GB / 60 GB/s = 1 second.
    - Total container redeploy time: 96s + 1s = 97 seconds (violates 60s SLA).
    - L7 Load Balancer routing update time: < 15 seconds.

    **Conclusion & Interpretation:**
    - **Result: < 15 seconds (Deployment Bottleneck)**. Network latency makes redeployment unviable; L7 traffic shifting ensures rollback < 60s.
