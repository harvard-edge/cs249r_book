title: The Multi-Model Serving Platform
scenario: Your company runs 12 different LLMs in production (ranging from 1B to 70B parameters) serving 50,000 QPS total across all models. Currently each model has its own dedicated GPU pool. The CFO says GPU costs are $2M/month.
question: How would you design a multi-model serving platform that cuts the $2M/month GPU bill by at least 40% without violating SLAs?
details:
  realistic_solution: 'A multi-model platform needs three architectural layers: (1) **Model tiering** — group models by size and latency SLA. Tier 1 (1B–7B, <100ms): always resident in VRAM, share GPUs via MPS or time-slicing. Tier 2 (13B–30B, <500ms): resident on dedicated GPUs with overflow to CPU offload. Tier 3 (70B, <2s): tensor-parallel across multi-GPU, dedicated but right-sized. (2) **Predictive autoscaling** — use traffic forecasting (not reactive scaling) to pre-warm models 10 minutes before demand spikes. (3) **KV-cache sharing** — for models serving similar prompts (e.g., system prompts), cache the KV-state of common prefixes across requests.'
  common_mistake: |
    **The Pitfall:** Naive co-location of all models onto the same multiplexed GPUs.
    **The Rationale:** Engineers think simply packing all models onto instances maximizes utilization.
    **The Consequence:** Severe memory fragmentation and SLA violations as massive 70B models evict smaller 1B models from VRAM, destroying P99 latencies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 700 GPUs total. $4/hr per GPU. 720 hours/month.
    2. **Calculations:**
       - Current Cost: 700 GPUs * $4/hr * 720 hours/month = $2,016,000/month.
       - Tier 1: Consolidate from 200 to 75. Savings: 125 GPUs.
       - Tier 2: Right-size from 200 to 120. Savings: 80 GPUs.
       - Tier 3: Reduce from 300 to 200. Savings: 100 GPUs.
       - Total Savings: 305 GPUs * $4/hr * 720 hours/month = $878,400/month.
    3. **Conclusion & Interpretation:**
       - **Result: 43.6% Cost Reduction. A $878,400 / $2,016,000 reduction is achieved by tiering and rightsizing pools.**
