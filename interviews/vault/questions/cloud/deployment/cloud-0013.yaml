title: The TPOT Memory Wall
scenario: Your team is serving an INT4-quantized 70B parameter LLM on a single GPU. A user complains that while the first token appears almost instantly, the subsequent text generates very slowly, making the chatbot feel sluggish. They expect a comfortable reading speed of at least 20 tokens per second.
question: "What is the primary hardware bottleneck for Time Per Output Token (TPOT), and can the GPU theoretically meet this user's expectation?"
details:
  realistic_solution: 'The user''s complaint correctly distinguishes between TTFT (fast) and TPOT (slow). The bottleneck for TPOT in autoregressive models is memory bandwidth, as generating each token requires reading all model parameters from High Bandwidth Memory (HBM).'
  common_mistake: |
    **The Pitfall:** Assuming that token generation is compute-bound.
    **The Rationale:** Engineers try to calculate the FLOPs required per token and divide by the GPU's TFLOPS rating, ignoring that autoregressive decoding is a memory-bound operation.
    **The Consequence:** They optimize the wrong bottleneck or mistakenly conclude the hardware cannot meet the performance requirement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model in INT4 precision (~35 GB memory footprint).
       - GPU with 3.35 TB/s memory bandwidth.
    2. **Calculations:**
       - Autoregressive token generation (TPOT) requires reading all weights.
       - Time per token = 35 GB / 3350 GB/s ≈ 10.4 ms/token.
       - Max tokens/sec = 1 / 0.0104 ≈ 95 tokens/sec.
    3. **Conclusion & Interpretation:** **The hardware can easily support ~95 tokens/sec, far exceeding the 20 tokens/sec expectation. Result: Memory-Bound.**
  options:
  - "No, the GPU is compute-bound during generation and is limited to ~15 tokens/sec."
  - "No, FP16 memory reads (140GB) limit the GPU to ~24 tokens/sec, just barely meeting the demand."
  - "Yes, the GPU's memory bandwidth supports a theoretical speed of ~95 tokens/sec, so the issue is likely in the software."
  - "Yes, because the KV-cache makes all subsequent token generation instantaneous."
