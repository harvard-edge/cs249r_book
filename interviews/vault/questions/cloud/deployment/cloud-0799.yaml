title: Optimizing Retraining Cadence from Drift and GPU Cost
scenario: A production model degrades by 1% accuracy every week. Retraining the model costs $50,000 in GPU time. A 1% accuracy drop costs the business $100,000 a week, but the retraining platform has limited GPU quota, data-validation gates, and rollback risk when new models underperform.
question: How would you design an automated retraining policy that uses the cost optimum as a trigger, while accounting for validation gates, GPU quota, and rollback risk?
details:
  realistic_solution: Cost-aware automation. You do not retrain based only on a calendar; you trigger when the expected cumulative cost of performance degradation exceeds the fixed retraining cost, subject to guardrails. The MLOps policy should estimate drift cost continuously, reserve GPU quota for the next run, require data-quality and offline-evaluation gates, canary the candidate model, and roll back if online metrics regress. The cost optimum provides the default cadence, but the production policy should delay or block retraining when validation fails and accelerate it when observed drift is worse than forecast.
  common_mistake: |
    **The Pitfall:** Triggering retraining based on a static calendar schedule.
    **The Rationale:** Candidates default to simple chron-jobs (e.g., "retrain monthly") without mathematically modeling the intersection of degradation costs and compute costs.
    **The Consequence:** The business either burns money on unnecessary GPU time or leaks revenue to unmitigated model drift.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cost of degradation is $100k/week per week of staleness.
    - Retraining cost is $50k per run.
    - Average cost per week = (Retraining Cost + Cumulative Degradation) / T.

    **Calculations:**
    - Continuous formulation: (50k + integral from 0 to T of 100k * t dt) / T = (50k + 50k * T^2) / T = 50k/T + 50k*T.
    - Optimization: derivative is -50k/T^2 + 50k. Setting it to zero gives T^2 = 1.

    **Conclusion:** The economic default is a 1-week retraining interval, implemented as a thresholded policy with validation, quota, and rollback gates rather than an unconditional cron job.
