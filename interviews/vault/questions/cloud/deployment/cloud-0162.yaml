title: The Real-Time Voice Assistant Stutter
scenario: You are the lead ML Systems Engineer for a new real-time voice assistant powered by a 7B parameter LLM, hosted on H100 GPUs. The product mandate is a P99 Time-To-First-Token (TTFT) of under 500ms to feel responsive. Your operations team reports that GPU utilization is stuck at a mediocre 40%, and they are proposing to increase the static batch size from 8 to 32 to improve throughput and cost-efficiency. However, user feedback indicates the assistant already feels sluggish to start talking. Your Grafana dashboard shows the arrival rate is about 20 requests/second.
question: Why is increasing static batch size from 8 to 32 the wrong fix for 40% GPU utilization, and what batching change should you make?
details:
  realistic_solution: |
    The core conflict is head-of-line blocking imposed by static batching. To achieve high SM utilization, the system must wait for a large batch to assemble, but this waiting time directly contributes to TTFT, violating the SLO.
    The architectural solution is to implement Continuous Batching (in-flight batching) via an engine like vLLM. This decouples the arrival of requests from the batch dispatch schedule, dynamically injecting new requests at the iteration level, maximizing SM utilization without exploding queue latency.
  common_mistake: |
    **The Pitfall:** Focusing only on compute time and suggesting a smaller static batch size or arbitrary hardware upgrades.
    **The Rationale:** Candidates high GPU utilization combined with latency spikes logically points inexperienced engineers toward a lack of compute resources, masking the underlying scheduling architecture flaw.
    **The Consequence:** Shrinking the batch size destroys overall throughput, resulting in longer queues and worsening the P99 latency, while adding hardware is an expensive band-aid over a solvable software issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (λ): 20 req/s (1 request every 50ms).
    - Target static batch size: 32.
    - SLO: 500ms P99 TTFT.

    **Calculations:**
    - Batch Assembly Wait: Waiting for 31 subsequent requests to form a batch of 32 takes 31 * 50ms = 1,550 ms (1.55 seconds).
    - Total Wait Time: 1.55 seconds + computation time.

    **Conclusion & Interpretation:**
    - **Result: Queue-Bound.** The static batching architecture introduces a massive 1.55s head-of-line blocking penalty. Moving to continuous (in-flight) batching is required to decouple arrival rate from batch execution.
  options:
  - "The 13B model exceeds the H100's SRAM cache, forcing 500ms roundtrips to HBM."
  - "The static batching timeout is causing head-of-line blocking. Switch to continuous batching."
  - "The 90% utilization proves the GPU is compute-bound. Downsize the model to 7B."
  - "The 100ms timeout is too short to assemble optimal batches. Increase it to 500ms."
  correct_index: 1
