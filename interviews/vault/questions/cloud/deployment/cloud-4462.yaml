title: Prefill Warmup and JIT Compilation Latency at Service Start
scenario: A newly deployed prefill node takes 45 seconds to serve its first request due to JIT compilation and CUDA graph capture. During this time, the load balancer routes traffic to the node anyway, causing 45 seconds of 30x higher latency.
question: How should the deployment readiness lifecycle prevent traffic routing before JIT compilation and CUDA graph warmup complete?
details:
  realistic_solution: The readiness lifecycle should separate process health from serving readiness. The node can be alive after the HTTP server starts, but it should not enter the load-balancer pool until model loading, JIT compilation, CUDA graph capture, and representative warmup requests have completed. The readiness signal should be emitted only after that warmup finishes; until then the readinessProbe fails and Kubernetes excludes the pod from Service endpoints. This keeps the 45-second cold-start penalty out of live traffic, while capacity planning handles the longer time before a new pod becomes usable.
  common_mistake: |
    **The Pitfall:** Using a simple HTTP health check as the readiness signal.
    **The Rationale:** Most standard web services are ready once the HTTP server binds to the port, so developers reuse this pattern, forgetting that ML models require massive asynchronous compilation after the port opens.
    **The Consequence:** The load balancer floods a compiling node with traffic, destroying P99 latency for 45 seconds during every scale-up event.
  napkin_math: |
    **Assumptions & Constraints:**
    - The scenario says each new prefill node has a 45-second JIT/CUDA graph warmup delay before it can serve normally.
    - If traffic is routed during that window, requests see 30x higher latency.

    **Calculations:**
    - Without readiness gating: every scale-up exposes users to 45 seconds of cold-node service.
    - Latency impact during exposure: cold-node latency = 30 * warmed-node latency.
    - With a readinessProbe tied to the post-warmup signal: routed cold time = 0 seconds, because the pod is excluded from endpoints until warmup completes.

    **Conclusion & Interpretation:**
    - **Result: readiness gating removes the 45-second, 30x-latency exposure from live traffic.** The deployment may still take 45 seconds to become ready, so capacity planning can use warm standby pods if that delay is too long for scale-up.
