title: Prefill Pool GPU Count Formula for TTFT SLO
scenario: A disaggregated serving system handles 500 RPS with average prompt length 512 tokens and P95 TTFT SLO of 200ms.
question: How many H100s do you need in the prefill pool?
details:
  realistic_solution: Model the prefill pool as multiple load-balanced H100 workers, then cap per-GPU arrival rate so each worker's queueing tail fits inside the 200ms TTFT SLO. With a 16.5ms mean prefill service time, an independent-worker M/M/1 approximation gives about 45.6 RPS per H100 at P95, so 500 RPS needs 11 GPUs before operational headroom. Round to 12 H100s and validate with a multi-server simulation or production trace replay.
  common_mistake: |
    **The Pitfall:** Sizing the prefill pool based on average load without a queuing model.
    **The Rationale:** Engineers assume an average utilization of 80% is safe and omit the M/M/1 queuing term from the sizing calculation.
    **The Consequence:** At P95, queue depth causes TTFT to exceed the SLO.
  napkin_math: |
    **Assumptions & Constraints:**
    - Disaggregated serving system. Target 500 RPS.
    - Average prompt length 512 tokens. P95 TTFT SLO is 200ms.
    - Assume 8B model. Service time per request on one H100 is 16.5ms (mu = 60.6 RPS).
    - Requests are load-balanced across identical H100 prefill workers.
    - Approximate each worker as an independent M/M/1 queue for a conservative sizing pass.

    **Calculations:**
    - Target P95 TTFT: < 200ms.
    - Per-worker M/M/1 response-time P95 for an exponential tail: ln(20) / (mu - lambda_worker) < 0.2s.
    - ln(20) / (60.6 - lambda_worker) < 0.2s -> 14.98 < 60.6 - lambda_worker -> lambda_worker < 45.62 RPS per H100.
    - Multi-server pool size from capped per-worker load: 500 / 45.62 = 10.96 H100s.
    - Add 10-20% operational headroom: round up to 12 H100s.

    **Conclusion & Interpretation:**
    - **Result: 12 H100s required (Queue-Bound).** The derivation is a multi-worker sizing rule using an M/M/1 approximation per load-balanced H100; validate the final count with trace replay because real prefill service times are not perfectly exponential.
