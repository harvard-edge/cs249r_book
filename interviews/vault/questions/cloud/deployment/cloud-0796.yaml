title: The Training-Serving Skew
scenario: Our model achieves 95% accuracy when evaluated offline on an A100 cluster, but drops to 70% when deployed to production on T4 GPUs. The model weights and the Python feature code are identical.
question: How do the different hardware paths cause this numerical divergence?
details:
  realistic_solution: 'Hardware-induced Training-Serving Skew. Even with identical Python code, the underlying hardware and runtime execute the math differently. The A100 offline evaluation likely used PyTorch with TF32 (TensorFloat-32) enabled by default, which truncates the mantissa to 10 bits. The production T4 (which doesn''t support TF32) might be running a TensorRT compiled engine in FP16, or falling back to FP32. Furthermore, different CUDA versions or cuDNN libraries between the clusters can select different convolution algorithms (e.g., Winograd vs. GEMM) which accumulate floating-point rounding errors differently. Over a 50-layer network, these micro-differences compound into completely different activation distributions at the final classification layer.'
  common_mistake: |
    **The Pitfall:** Blaming the test set or distribution shift for the accuracy drop.
    **The Rationale:** Candidates fail to realize that differing CUDA versions or hardware architectures execute floating-point math with micro-differences.
    **The Consequence:** Wasting weeks debugging feature pipelines when the root cause is silent hardware-level numerical divergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 (uses TF32, 10-bit mantissa), T4 (uses FP16 or FP32 fallback, no TF32), ResNet-50 (10^9 MAC operations)

    **Calculations:**
    - Relative error per FP32/FP16 operation is ~10^-4
    - Compounded over 10^9 MACs with different rounding/accumulation paths, logit values can drift by 5-10%

    **Conclusion & Interpretation:**
    - **Result: 5-10% drift (Hardware-Induced Skew)**. Micro-differences in Tensor Core math compound over 50 layers, flipping argmax classifications.
