title: The ANN Recall-Latency Tradeoff
scenario: 'Your vector search returns results in 2ms with recall @interviews/vault/questions/cloud/cloud-1047.yaml of 0.85. The product team wants recall @interviews/vault/questions/cloud/cloud-1047.yaml above 0.95. You increase the HNSW ef_search parameter from 64 to 256. Latency jumps to 12ms.'
question: 'Why does improving recall have such a steep latency cost, and what is the fundamental tradeoff?'
details:
  realistic_solution: 'HNSW search works by greedily traversing the proximity graph. ef_search controls how many candidate nodes the algorithm evaluates before returning results. Increasing ef_search from 64 to 256 means 4× more graph hops, each requiring a random memory read of a 1536-dim FP32 vector (6 KB). At ~100ns per cache-miss DRAM access, 256 hops × 6 KB per hop strains memory bandwidth. The fundamental tradeoff: exact search (recall=1.0) requires brute-force O(N) comparison — at 50M vectors that''s seconds, not milliseconds. ANN trades recall for speed by searching a subgraph. The Pareto frontier is: recall × 1/latency. Product quantization (PQ) or dimensionality reduction can shift this frontier.'
  common_mistake: |
    **The Pitfall:** Assuming recall improvement is mathematically "cheap" and just requires searching more neighbors.
    **The Rationale:** Engineers often focus on the low FLOP count of distance calculations, ignoring the cost of random memory access.
    **The Consequence:** Increasing search parameters without anticipating that HNSW recall scales linearly with `ef_search`, leading to unacceptable latency spikes driven by random DRAM reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - ef_search=64 requires ~64 vector comparisons.
    - Memory reads = 64 random 6KB reads.

    **Calculations:**
    - Compute (ef=64) = 64 * 1536 dims * 2 FLOPs = 196K FLOPs.
    - Compute (ef=256) requires ~256 comparisons = 786K FLOPs + 256 random reads.

    **Conclusion & Interpretation:**
    - **Result: 4x Random Memory Reads (Memory Latency Bound)**. The 4x increase in random memory access dominates the latency jump to 12ms, as RAM latency drastically outweighs the trivial FLOPs.
