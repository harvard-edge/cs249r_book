title: The ANN Recall-Latency Tradeoff
scenario: Your vector search returns results in 2ms with recall@10 of 0.85. The product team wants recall@10 above 0.95. You increase the HNSW ef_search parameter from 64 to 256. Latency jumps to 12ms.
question: Why does improving recall have such a steep latency cost, and what is the fundamental tradeoff?
details:
  realistic_solution: HNSW search works by greedily traversing a proximity graph while maintaining a candidate set. ef_search controls how many candidates can be expanded and evaluated before returning results. Increasing ef_search from 64 to 256 can require roughly 4× more candidate expansions, random graph-node/adjacency accesses, and distance evaluations. The latency cost is steep because these accesses are pointer-heavy and cache-unfriendly, not because every hop necessarily reads a full 6 KB vector from DRAM. The fundamental tradeoff is that higher recall requires exploring more of the graph and evaluating more candidates, with diminishing returns as ef_search rises. Exact search would compare against the full corpus, while ANN accepts some recall loss for millisecond latency. Product quantization, dimensionality reduction, better graph construction, or more memory-local layouts can shift this frontier.
  common_mistake: |
    **The Pitfall:** Assuming recall improvement is mathematically "cheap" and just requires searching more neighbors.
    **The Rationale:** Engineers often focus on the low FLOP count of distance calculations, ignoring the cost of random graph traversal and candidate-set maintenance.
    **The Consequence:** Increasing search parameters without anticipating diminishing returns, leading to unacceptable latency spikes driven by cache-unfriendly memory access.
  napkin_math: |
    **Assumptions & Constraints:**
    - ef_search=64 permits about 64 candidate expansions/evaluations.
    - ef_search=256 permits about 256 candidate expansions/evaluations.
    - A 1536-dim FP32 vector is about 6 KB, but HNSW latency also includes adjacency lists, candidate queues, and random node metadata accesses.

    **Calculations:**
    - Distance work at ef=64: 64 * 1536 dims * 2 FLOPs = about 196K FLOPs.
    - Distance work at ef=256: 256 * 1536 dims * 2 FLOPs = about 786K FLOPs.
    - Candidate work rises roughly 4x, but recall usually improves with diminishing returns rather than linearly.

    **Conclusion & Interpretation:**
    - **Result: about 4x more candidate work (Memory-Latency-Bound)**. The latency jump is driven by additional random graph/node accesses and candidate evaluation, while the incremental FLOPs remain small.
