title: The Pre-computation Trade-off
scenario: We are deploying a photo classification model. Running it in real-time on user upload costs us $10,000 a month in GPU compute.
question: How do we reduce inference compute costs without losing model accuracy?
details:
  realistic_solution: Shift from Dynamic (Real-time) to Static (Batch) inference. Batch inference is dramatically cheaper because it increases arithmetic intensity. At batch=1, the full model weights load from HBM per input, severely bottlenecking on memory. At batch=256, the same weight load is reused across 256 inputs, pushing arithmetic intensity into the compute-bound regime. Run periodically on cheap spot instances with large batches, and cache results.
  common_mistake: |
    **The Pitfall:** Defaulting to INT8 quantization as the primary cost-saving mechanism.
    **The Rationale:** Treating quantization as a universal cure-all based on popular hype.
    **The Consequence:** Saving perhaps 50% on compute via quantization, completely ignoring the potential 3400% architectural savings achieved by fixing the core arithmetic intensity issue via batching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current State: Batch=1 (Real-time). ~5% GPU Utilization. Cost: $1,440/month per GPU.
       - Target State: Batch=256 (Offline). ~70% GPU Utilization. Spot Instance Cost: $42/month.
    2. **Calculations:**
       - Batch=1 Arithmetic Intensity: ~1 Op/Byte.
       - Batch=256 Arithmetic Intensity: ~200 Ops/Byte.
       - Utilization Gain: 70% / 5% = 14x better compute efficiency.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound via Batching.** Shifting to batch=256 moves the workload off the memory-bandwidth floor, unlocking massive compute utilization and achieving a 34x total cost reduction.
