title: Hedged Request Latency Improvement
scenario: A service has p50=5ms, p95=20ms, p99=80ms. You implement hedged requests, sending a duplicate request to a different server after 15ms with no response.
question: Assuming independent latency distributions, what is the approximate new p99 latency and extra backend load?
details:
  realistic_solution: 'Without hedging, p99 = 80ms. With a 15ms hedge threshold, the user latency for hedged requests is min(original_latency, 15ms + duplicate_latency). Extra backend load is approximately the hedge trigger rate: since 15ms is below p95=20ms but above p50=5ms, a rough estimate is about 8-10% duplicate requests, or 1.08-1.10x backend load. For t > 15ms, P(hedged response > t) = P(original > t) × P(duplicate > t - 15ms), assuming independence. At t=35ms, P(original > 35ms) is between 1% and 5%; P(duplicate > 20ms) = 5%; product is below 0.25%, so 35ms is safely beyond the new p99. At t=20ms, P(duplicate > 5ms) = 50%, and P(original > 20ms) = 5%, giving 2.5% still slower than 20ms. Therefore the new p99 lies between 20ms and 35ms; a reasonable approximation is around 30ms, with about 8-10% extra backend load.'
  common_mistake: |
    **The Pitfall:** Setting the hedge threshold too low, such as at the p50 mark.
    **The Rationale:** Engineers often aggressively hedge to minimize latency without modeling the mathematical probability of a slow request or the resulting backend strain.
    **The Consequence:** Hedging at p50 doubles the total backend load for minimal latency improvement, potentially causing cascading system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: p50=5ms, p95=20ms, p99=80ms.
    - Hedging threshold = 15ms.
    - Duplicate latency is independent and drawn from the same distribution.

    **Calculations:**
    - Hedge trigger rate: 15ms is between p50=5ms and p95=20ms, estimate about 8-10%.
    - Backend load: 100% original traffic + 8-10% duplicates = 1.08-1.10x.
    - For t > 15ms: P(response > t) = P(original > t) * P(duplicate > t - 15ms).
    - At t=20ms: P(original > 20ms) = 0.05 and P(duplicate > 5ms) = 0.50, so P(response > 20ms) = 0.025; this is still above 1%.
    - At t=35ms: P(original > 35ms) is between 0.01 and 0.05, and P(duplicate > 20ms) = 0.05, so P(response > 35ms) is between 0.0005 and 0.0025; this is below 1%.

    **Conclusion & Interpretation:**
    - **Result:** The new p99 is between 20ms and 35ms, roughly around 30ms under this coarse percentile interpolation, with about 8-10% extra backend load.
