title: The Serverless Freeze
scenario: Our serverless inference endpoint scales down to 0 replicas to save money.
  However, the first user request after scaling back up takes 30 seconds to process.
question: What is causing this delay?
details:
  realistic_solution: Cold Start Latency. The system must provision the container
    and load the Python runtime, but most importantly, it must transfer the massive
    model weights (gigabytes of data) from network storage into the GPU's HBM *before*
    the first forward pass can execute. You must use persistent warm replicas or optimized
    weight loading strategies to fix this.
  common_mistake: '**The Pitfall:** Assuming the delay is caused by "warming up caches."

    **The Rationale:** Developers accustomed to traditional web services often default
    to JIT compilation or cache warming as the cause of cold starts.

    **The Consequence:** Implementing ineffective application-level warmup logic instead
    of addressing the massive I/O bottleneck of loading model weights.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 70B model in FP16 = 140 GB.\n\
    \   - Cloud storage download bandwidth: ~5 GB/s.\n   - PCIe Gen4 transfer to GPU\
    \ VRAM: 32 GB/s.\n2. **Calculations:**\n   - Download from cloud storage: 140\
    \ GB / 5 GB/s = 28 seconds.\n   - PCIe Gen4 transfer to GPU VRAM: 140 GB / 32\
    \ GB/s = 4.3 seconds (can be pipelined).\n   - Container startup and CUDA initialization\
    \ adds 1-2 seconds.\n3. **Conclusion & Interpretation:**\n   - **Result: I/O-Bound.\
    \ Total cold start time is ~30 seconds, perfectly matching the observed delay\
    \ due to massive I/O bottlenecks.**\n"
