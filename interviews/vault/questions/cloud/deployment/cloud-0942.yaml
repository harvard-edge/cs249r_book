title: Capacity Planning for Canary Deployments
scenario: You are deploying a new recommendation model (v2) on an EKS cluster currently running 50 instances. The existing model (v1) handles 10,000 requests per second (RPS) with a strict p99 latency SLA of 200ms. Each v1 instance safely processes 250 RPS to meet this SLA. You plan to route 5% of live production traffic to a canary v2 deployment. Assume v2 is computationally heavier and has a 10% lower throughput per instance than v1.
question: How many dedicated g5.xlarge instances are required for the 5% v2 canary to guarantee the 200ms SLA?
details:
  realistic_solution: Calculate the absolute RPS the canary must handle, determine the derated safe throughput capacity for a single v2 instance, and calculate the required replica count. Since horizontal pod scaling requires whole integer allocations, apply a ceiling function to the result to guarantee the P99 SLA under load.
  common_mistake: |
    **The Pitfall:** Simply allocating 5% of the total existing instances for the canary (i.e., 50 * 0.05 = 2.5 nodes -> 3 nodes, or just rounding to 2).
    **The Rationale:** Assuming the new model will have the exact same performance profile as the old one, or ignoring the fractional arithmetic.
    **The Consequence:** Failing to factor in the new model's degraded throughput profile leads to immediate queue saturation and SLA breaches in the canary group.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total traffic: 10,000 RPS.
    - Canary routing: 5% of total traffic.
    - v1 Safe Capacity: 250 RPS/instance.
    - v2 Derating: 10% lower throughput.

    **Calculations:**
    - Canary Traffic Load: 10,000 * 0.05 = 500 RPS.
    - v2 Safe Capacity: 250 * 0.90 = 225 RPS/instance.
    - Required Replicas: 500 / 225 = 2.22 instances.

    **Conclusion & Interpretation:**
    - **Result: 3 nodes (Capacity-Provisioning Bound)**. Since partial nodes cannot be provisioned, you must round up to 3 nodes to guarantee the 200ms SLA.
