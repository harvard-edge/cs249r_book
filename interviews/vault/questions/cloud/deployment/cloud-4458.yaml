title: Request Migration Between Decode Nodes for Load Balancing
scenario: 'A decode pool has 8 nodes with unequal KV cache utilization: nodes 1-3 at 95%, nodes 4-8 at 50%. You need to migrate live decode requests from nodes 1-3 to nodes 4-8 without dropping requests.'
question: "How would you live-migrate decode requests from nodes 1-3 to nodes 4-8?"
details:
  realistic_solution: 'Implement an incremental request migration protocol. Identify candidates from overloaded nodes, pause decode slots, transfer KV cache, register with the destination scheduler, and resume. Throttle migration to avoid saturating InfiniBand.'
  common_mistake: |
    **The Pitfall:** Attempting to migrate all requests atomically by checkpointing all KV caches simultaneously.
    **The Rationale:** Candidates treat request migration like a database failover rather than an incremental load-balancing operation.
    **The Consequence:** Saturated network links and 10+ second pauses in generation, causing severe service interruptions for users.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Migrate ~96 requests. 512 tokens × KV size = 268 MB per request.
       - InfiniBand: 50 GB/s.
    2. **Calculations:**
       - Migration time per request: 268 MB / 50 GB/s = 5.4 ms.
       - Throttle rate: 10 requests/sec requires 2.68 GB/s (5% of InfiniBand limit).
    3. **Conclusion & Interpretation:**
       **Result: Network Bandwidth Bound. The full migration completes safely in 9.6 seconds with imperceptible pauses.**
