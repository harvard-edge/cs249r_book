title: Diagnosing High TTFT in Confidential GPU Enclaves
scenario: You deployed a Llama-3 70B model on an 8x H100 node with NVIDIA Confidential Computing (CC) enabled to protect proprietary weights and patient data. During profiling, you observe that the model's Time-To-First-Token (TTFT) has spiked from 0.5s to over 3.0s, and total host-to-device memory bandwidth utilization during weight loading is only ~15 GB/s per GPU instead of the expected PCIe Gen5 limits. However, the auto-regressive decoding phase maintains its normal 15 tokens/s rate.
question: What is causing the TTFT regression with Confidential Computing enabled while decoding throughput remains normal?
details:
  realistic_solution: The bottleneck is Confidential Computing setup and host-to-device transfer overhead before the first token, not steady-state decode compute. Encrypted data moving from host memory into the GPU's secure memory region can hit synchronization stalls and limited effective transfer bandwidth, with bounce-buffering a likely contributor during model loading and initial prompt processing.
  common_mistake: |
    **The Pitfall:** Treating the TTFT spike as a decode-time compute or HBM bandwidth problem.
    **The Rationale:** Candidates see Confidential Computing and assume every matrix multiplication is slowed by encryption, even though steady-state decoding throughput is unchanged.
    **The Consequence:** They tune CUDA kernels or quantization while missing the host-to-device transfer stalls and bounce-buffer behavior that affect loading and prompt setup.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama-3 70B weights are roughly 140GB total.
    - On 8 GPUs, a simple tensor-parallel shard is about 17.5GB/GPU.
    - Observed CC host-to-device bandwidth is about 15GB/s/GPU during affected transfers.
    - Decode throughput remains 15 tokens/s, so the hot decode loop is not the bottleneck.

    **Calculations:**
    - Lower-bound time to move one 17.5GB shard at 15GB/s is 17.5 / 15 = 1.17s.
    - The observed TTFT increase is over 2.5s, so a single clean shard transfer does not fully explain it.
    - Repeated secure copies, bounce-buffer synchronization, page setup, and prompt/KV initialization can add stalls before the first token while leaving later decode throughput normal.

    **Conclusion & Interpretation:**
    - **Result: TTFT is dominated by CC host-to-device transfer stalls, not decode compute**. The transfer math gives a plausible lower bound, but the multi-second regression requires CC setup and bounce-buffer overhead beyond a single ideal transfer.
