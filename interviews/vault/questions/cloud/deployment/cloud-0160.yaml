title: The Tyranny of Throughput
scenario: You are the tech lead for a new real-time AI coding assistant. The service has a strict P99 Time-To-First-Token (TTFT) SLO of 200ms. Your dashboards show fantastic system health, high utilization, and throughput metrics exceeding targets. However, user feedback is overwhelmingly negative, with frequent complaints of "lag" and "unresponsiveness." Your team is using a classic static batching strategy with a batching timeout of 150ms.
question: "Why do high GPU utilization and TPS still produce lag under a 150ms static batching timeout with a 200ms TTFT SLO?"
details:
  realistic_solution: The core problem is the conflict between the goals of maximizing hardware utilization and minimizing user latency, a conflict that static batching handles poorly for real-time services. The 150ms batching timeout is an artificial queueing delay imposed on every single request to build a larger, more efficient batch. While this maximizes the H100's throughput (many tokens generated per second *across all users*), it front-loads a massive latency penalty on each user's TTFT.
  common_mistake: |
    **The Pitfall:** Confusing high throughput (Tokens-Per-Second) with low latency (TTFT).
    **The Rationale:** Believing that high GPU utilization automatically translates to a responsive, real-time user experience.
    **The Consequence:** Maximizing hardware efficiency by introducing massive artificial queueing delays, completely destroying the interactive feel of the application.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - P99 TTFT SLO: 200ms.
       - Static batching timeout (artificial queueing): 150ms.
       - Prefill compute time for a standard prompt: ~141ms.
    2. **Calculations:**
       - TTFT = T_wait + T_batch + T_prefill
       - Total TTFT = 0ms + 150ms + 141ms = 291ms.
    3. **Conclusion & Interpretation:**
       - **Result: 291ms TTFT (Latency-Bound).** The 150ms artificial batching delay consumes 75% of the latency budget, making the 200ms SLO physically impossible to meet.
