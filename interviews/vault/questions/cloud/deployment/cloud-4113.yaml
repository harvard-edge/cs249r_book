title: Fair-Share Scheduling Across Teams
scenario: 'Three teams share a 100-GPU H100 cluster with allocations: Team A (50%), Team B (30%), Team C (20%). Team A is only using 20 GPUs currently, while Team B has 40 GPUs worth of jobs queued.'
question: How should fair-share scheduling handle Team B borrowing Team A's idle GPUs, and what happens when Team A submits a large job?
details:
  realistic_solution: |
    Fair-share scheduling uses soft quotas with preemption priorities. When Team A underuses its share, Team B's jobs can borrow the excess GPUs (Team B gets 30 allocated + 30 borrowed = 60 GPUs). When Team A submits a large job needing its full 50 GPUs: the scheduler must reclaim 30 GPUs from Team B. Policies: (1) Graceful preemption: Team B's borrowing jobs receive SIGTERM with a grace period (e.g., 5 minutes) to checkpoint. After grace period, SIGKILL. Jobs restart when GPUs become available. (2) Priority drain: Team B's borrowing jobs continue until they finish or hit a time limit, but no new Team B jobs start on borrowed GPUs. New Team A jobs get next-free GPU. (3) Slurm implementation: QOS (Quality of Service) with GrpTRES=gpu=50 for Team A, UsageFactor tracking historical usage. Teams that underused their share get a priority boost (fair-share factor > 1.0). Teams that overused get deprioritized. This naturally balances toward target allocations over time windows.
  common_mistake: |
    **The Pitfall:** Enforcing hard quotas on cluster resources.
    
    **The Rationale:** Simplifying cluster management by strictly dividing nodes, preventing any cross-team borrowing.
    
    **The Consequence:** Idle GPUs sit unused while other teams have queued jobs, massively wasting expensive compute resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Cost: 100 GPUs at $3/hr = $300/hr.
    - Wasted Capacity: 30 idle GPUs (Team A).

    **Calculations:**
    - Wasted cost: 30 GPUs * $3/hr = $90/hr.
    - Annual Savings: $90/hr * 8,760 hours = $788,400.

    **Conclusion & Interpretation:**
    - **Result: $788,400 Savings (Resource-Bound)**. Fair-share with borrowing saves ~$788K annually by reducing idle time to near zero.
