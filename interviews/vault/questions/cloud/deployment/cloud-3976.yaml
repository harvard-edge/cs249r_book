title: GPU Pod Rollout Budget For LLM Serving
scenario: An LLM service runs 24 pods, each handling 30 requests/s at the target latency. A canary deployment drains 2 pods at a time for 6 minutes while they reload a new 14 GB model image. Peak demand is 650 requests/s.
question: Is it safe to drain 2 of 24 pods during rollout while serving 650 requests/s, or should the rollout be smaller?
details:
  realistic_solution: With all pods, capacity is 24 x 30 = 720 requests/s. Draining 2 pods leaves 22 x 30 = 660 requests/s, only 10 requests/s above peak demand, which is 98.5% utilization. That is arithmetically possible but not safe for tail latency. A safer rollout drains 1 pod at a time or temporarily adds pods before rollout.
  common_mistake: |
    **The Pitfall:** Assuming that as long as capacity > demand, the system is safe.
    **The Rationale:** Candidates check the arithmetic (660 > 650) but ignore queueing theory, which dictates that latency approaches infinity as utilization nears 100%.
    **The Consequence:** The service experiences catastrophic P99 latency spikes during the 6-minute model rollout.
  napkin_math: |
    - Full capacity: 24 pods * 30 rps/pod = 720 rps.
    - Capacity with 2 drained pods: 22 pods * 30 rps/pod = 660 rps.
    - Peak traffic: 650 rps.
    - Utilization during rollout: 650 / 660 = 98.5%.
    - **Result: 98.5% utilization leaves no queueing headroom and will cause severe tail latency spikes. Draining 1 pod (94% utilization) is safer.**
