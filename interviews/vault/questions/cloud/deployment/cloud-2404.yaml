title: Secure ML Model Supply Chain
scenario: Your platform serves 200+ microservices that dynamically load PyTorch models (average 2GB each) from a centralized cloud object store at 100 pulls/minute. Models are currently loaded using `torch.load` (Pickle), exposing the cluster to remote code execution (RCE).
question: How would you secure PyTorch model loading against Pickle RCE without exceeding the 15s P99 pod startup SLA?
details:
  realistic_solution: Mandate a migration from Pickle to `.safetensors` for all models. Safetensors prevents RCE by only storing data tensors (no executable code) and uses memory mapping for zero-copy loading. Implement a centralized admission controller (Kubernetes Mutating Webhook) that intercepts pod creation, verifies cryptographic signatures (e.g., Sigstore/Cosign) of the model artifact against a trusted keyless authority, and blocks unverified or Pickle-based models. The tradeoff is the operational overhead of a one-time offline conversion pipeline for legacy models, but the runtime benefit is a completely eliminated RCE attack surface and actually *improved* startup latency due to mmap, offsetting the signature verification overhead.
  common_mistake: |
    **The Pitfall:** Running models through a dynamic sandbox/VM during load to detect malicious behavior.
    **The Rationale:** Engineers assume complex runtime sandboxing is the only way to secure code execution.
    **The Consequence:** The overhead adds multi-second latency per pull, severely degrading horizontal autoscaling capabilities and violating the 15s startup SLA.
  napkin_math: |
    - Legacy `torch.load` (2GB): ~2 seconds for disk I/O + ~1.5 seconds CPU deserialization = 3.5s.
    - `.safetensors` load: zero-copy memory mapping (mmap) takes <0.1s.
    - Signature verification (Cosign) takes ~0.2s.
    - Network transfer (2GB at 10Gbps line rate) = ~1.6s.
    - **Total secure startup: 1.6s (network) + 0.2s (verify) + 0.1s (mmap) = 1.9s, easily supporting the SLA.**
