title: Cloud Gpu Virtualization L5 0
scenario: 'You are evaluating multi-tenant GPU sharing options: (A) MIG with static partitions, (B) MPS with cooperative sharing, and (C) Kubernetes time-slicing with GPU operator. The cluster workloads vary significantly, from 5% to 60% GPU utilization.'
question: For multi-tenant GPU sharing with workloads from 5% to 60% utilization, how do MIG, MPS, and Kubernetes time-slicing compare?
details:
  realistic_solution: 'Option A (MIG): hardware isolation, but static partitions cannot dynamically rebalance. Option B (MPS): allows work-conserving sharing, but no memory isolation. Option C (time-slicing): High context-switching overhead, no isolation. Best for bursty trusted workloads is MPS.'
  common_mistake: |
    **The Pitfall:** Using MIG for highly variable workloads.
    **The Rationale:** Candidates often assume MIG's hardware isolation is always superior, forgetting that its static partitions cannot dynamically rebalance.
    **The Consequence:** Severe overall underutilization as partitions sit idle while others starve.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload varies between 5% and 60% utilization.

    **Calculations:**
    - At 5% utilization, MIG wastes 95% of its allocated slice.
    - Time-slicing penalty: 10-20% context switch overhead.

    **Conclusion & Interpretation:**
    - **Result: ~80%+ (Utilization-Bound)**. MPS provides significantly higher efficiency (~80%+) for bursty, trusted workloads.
