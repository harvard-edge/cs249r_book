title: Consistent Hashing for Model-Aware Request Routing
scenario: Your inference platform serves 20 fine-tuned model variants across 32 GPUs. Loading a model cold takes 3 seconds. You use consistent hashing to route requests to the same GPU.
question: How does consistent hashing reduce model remapping when a GPU fails, and how would you mitigate the 3-second cold-start penalty?
details:
  realistic_solution: 'With modular hashing (model_id % 32), removing one GPU changes the mapping for ~31 of 32 GPUs (97% disruption). With consistent hashing, each GPU occupies points on a hash ring. Removing one GPU only remaps its models to the next GPU on the ring — affecting only 1/32 ≈ 3% of mappings. Using virtual nodes (150-200 per physical GPU), the load stays balanced. Cold-start mitigation: (1) when a GPU is flagged for replacement, pre-warm the replacement by proactively loading the models that will hash to it, (2) maintain a shadow copy of each model on a secondary GPU (replica ring), so failover is instant, (3) use the mmap approach — models stay in host page cache, and remapped models load in <0.5s instead of 3s if pages are warm. Trade-off: shadow copies cost 2× GPU memory but eliminate cold starts entirely.'
  common_mistake: |
    **The Pitfall:** Using basic modular hashing (model_id % num_gpus).
    **The Rationale:** Standard round-robin or modulo arithmetic is computationally simple to route.
    **The Consequence:** A single hardware failure shuffles nearly all model-to-GPU mappings, causing a cluster-wide storm of 3-second cold starts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 GPUs, 3s cold start.

    **Calculations:**
    - Modular hash (mod 32): 1 failure remaps ~31 GPUs (97%). 19 cold starts × 3s = 57s disruption.
    - Consistent hash: 1 failure remaps only 1/32 (3%). 1 cold start × 3s = 3s disruption.
    - With mmap warm cache, cold start = 0.5s. With shadow replicas = 0s.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound.** Consistent hashing drastically minimizes the blast radius of a failure. Combining it with shadow replicas completely eliminates the cold-start penalty.
