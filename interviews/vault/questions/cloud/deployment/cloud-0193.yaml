title: The Blackwell Disappointment
scenario: You are the Staff ML Systems Engineer leading the serving infrastructure team at a major AI provider. Your company just deployed its first large cluster of B200 GPUs, intending to replace an existing A100-based stack. The primary goal is a 3x reduction in cost-per-million-tokens for your flagship multi-tenant LLM product.
question: How would you diagnose and redesign the serving stack to achieve a 3x cost-per-token reduction without latency regressions?
details:
  realistic_solution: |
    Start by measuring where the B200 stack is losing the expected cost gain: separate prefill, decode, scheduler queueing, KV-cache allocation, kernel launch overhead, tensor-parallel communication, memory bandwidth, MFU, and acceptance rates by tenant and sequence length. Compare A100 and B200 traces at the same prompt/output mix rather than relying on peak FLOPS. The redesign should keep the B200 fed with larger continuous batches, paged KV cache, fused attention/decode kernels, CUDA graphs where possible, tenant-aware admission control, and prefix/KV reuse for repeated prompts. Speculative decoding is a strong candidate, but it is not magic: use a small draft model only if its cost plus rejected tokens still improves end-to-end accepted tokens per second. The goal is to reduce target-model decode passes per accepted token while preserving TTFT and TPOT SLOs, not to claim the workload becomes perfectly compute-bound.
  common_mistake: |
    **The Pitfall:** Blaming the hardware for latency regressions or looking for a single silver bullet.
    **The Rationale:** Assuming the B200 is just a "faster A100" without realizing its architectural changes (compute drastically outstripping memory bandwidth scaling) shift the system bottleneck.
    **The Consequence:** Failing to redesign the software stack (e.g., speculative decoding, aggressive kernel fusion) to fully exploit the new hardware, leaving massive compute potential stranded.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B target model decode step takes 17.5 ms/token for batch-1 style serving.
    - A draft model proposes 5 tokens in 5 ms total.
    - Target verification of the 5-token block costs 20 ms including attention, launch, and sampling overhead.
    - Average acceptance is 3 tokens per verification pass.

    **Calculations:**
    - Autoregressive baseline: 3 tokens * 17.5ms = 52.5ms.
    - Speculative path for 3 accepted tokens: 5 ms draft + 20 ms target verification = 25 ms.
    - Time per accepted token = 25 ms / 3 = 8.3 ms.
    - Speedup = 52.5 ms / 25 ms = 2.1x before other serving improvements.
    - The remaining gap to 3x must come from higher continuous-batch occupancy, kernel fusion, lower queueing waste, and better KV-cache utilization.

    **Conclusion & Interpretation:**
    - **Result: Speculation Helps but Must Be Measured End-to-End.** With these assumptions, speculative decoding cuts per-token decode latency from 17.5 ms to about 8.3 ms, a 2.1x gain. A defensible 3x cost reduction requires both acceptable draft-model hit rate and serving-stack efficiency gains.
