title: Multi-modal Candidate Generation at Billion-Scale
scenario: We have a corpus of 10s of billions of videos, each with distinct video, audio, and text features. The retrieval system needs to fetch the top 1000 relevant candidates for a user in under 50ms at a peak load of 100,000 QPS.
question: How do you design the embedding architecture, index, and serving infrastructure to support multi-modal retrieval at this scale for Instagram Reels?
details:
  realistic_solution: 'Use a Two-Tower architecture with early fusion on the item side to project user history and multi-modal item features into a single, shared embedding space offline. Partition the corpus into tiered Approximate Nearest Neighbor (ANN) indexes: a "hot" index for recent/viral content kept in RAM, and a "warm/cold" index on SSDs. Implement a two-phase retrieval where the fast "hot" index handles the bulk of real-time requests. To maintain P99 latency during traffic spikes, implement graceful degradation.'
  common_mistake: |
    **The Pitfall:** Proposing late-fusion of separate text, video, and audio embeddings at inference time.
    **The Rationale:** Candidates think splitting modalities allows more precise search, completely failing to account for the multiplicative cost of performing multiple nearest-neighbor searches per query.
    **The Consequence:** Explosive fan-out and unpredictable tail latencies that instantly violate the 50ms SLA at 100k QPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - "Hot" corpus: 1B videos. Embedding: 256-dim float16 (512 bytes).
    - Peak load: 100,000 QPS. Node capacity: 2,000 QPS for ANN search.

    **Calculations:**
    - Raw vectors: 1B * 512B = 512GB.
    - Compressed IVFPQ index: ~50GB (fits in node RAM).
    - Compute replicas needed: 100,000 / 2,000 = 50 nodes.

    **Conclusion & Interpretation:**
    - **Result: 50 nodes (Compute-Bound)**. 50 replicas of the hot index are required purely to handle the compute-bound query throughput.
