title: Slurm GPU Resource Configuration
scenario: 'You are configuring Slurm for a new 10-node H100 cluster. Each node has 8 H100 GPUs, 2 TB RAM, and 128 CPU cores.'
question: 'What key slurm.conf and gres.conf entries enable GPU-aware, topology-aware scheduling for the 10-node H100 cluster?'
details:
  realistic_solution: 'gres.conf (per node): Name=gpu Type=h100 File=/dev/nvidia[0-7] Count=8. This registers 8 H100 GPUs as schedulable resources. slurm.conf key entries: SelectType=select/cons_tres (enables GPU-aware scheduling), GresTypes=gpu (enable GPU GRES), SelectTypeParameters=CR_Core_Memory (schedule by core and memory), DefMemPerCPU=16000 (default 16 GB per CPU core), TaskPlugin=task/cgroup,task/affinity (enable cgroup isolation and CPU affinity), PrologFlags=Alloc (run prolog on allocation for GPU cleanup), TopologyPlugin=topology/tree (enable network topology awareness). Job submission: #SBATCH --gres=gpu:h100:4 (request 4 H100s), #SBATCH --ntasks-per-node=4, #SBATCH --gpus-per-task=1, #SBATCH --gpu-bind=closest (bind each task to its nearest GPU). For MIG support, add: Name=gpu Type=h100_3g.40gb File=/dev/nvidia[0-7] Count=16 (2 MIG instances per GPU). The topology/tree plugin uses a topology.conf file defining switch hierarchy so multi-node jobs prefer nodes on the same leaf switch.'
  common_mistake: |
    **The Pitfall:** Configuring GPUs as generic resources without specifying types or topology plugins.
    **The Rationale:** Administrators might take a shortcut, relying on basic core/memory scheduling instead of configuring `SelectType=select/cons_tres` and topology trees.
    **The Consequence:** Preventing heterogeneous GPU scheduling and forcing multi-node jobs onto sub-optimal, cross-switch topologies.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 nodes.
    - 8 H100 GPUs, 128 CPU cores, 2 TB RAM per node.
    - MIG configuration: e.g., 3g.40gb slices each GPU into 2.

    **Calculations:**
    - Base schedulable GPUs: 10 nodes * 8 GPUs = 80 GPUs.
    - MIG schedulable instances: 80 * 2 = 160 instances.
    - Total tracking requirements: 80 GPUs + 1280 CPU cores + 20 TB RAM.

    **Conclusion & Interpretation:**
    - **Result: High Scheduling Complexity** (Slurm must track 80 physical GPUs or 160 MIG instances along with thousands of CPU cores).
