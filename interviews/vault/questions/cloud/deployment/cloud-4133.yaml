title: Slurm H100 GRES and MIG Scheduling Configuration
scenario: You are configuring Slurm for a new 10-node H100 cluster. Each node has 8 H100 GPUs, 2 TB RAM, and 128 CPU cores.
question: What key slurm.conf and gres.conf entries enable GPU-aware, topology-aware scheduling for the 10-node H100 cluster?
details:
  realistic_solution: gres.conf should either enumerate the physical GPUs, for example Name=gpu Type=h100 File=/dev/nvidia[0-7], or use AutoDetect=nvml when the installed Slurm/NVIDIA stack supports the desired physical-GPU or MIG discovery mode. slurm.conf key entries include SelectType=select/cons_tres, GresTypes=gpu, NodeName=<nodes> Gres=gpu:h100:8 CPUs=128 RealMemory=<usable_MB>, TaskPlugin=task/cgroup,task/affinity, and a topology plugin such as TopologyPlugin=topology/tree. The topology plugin must be paired with topology.conf so multi-node jobs prefer nearby nodes. A four-GPU-per-node job can request either --gres=gpu:h100:4 or a task mapping such as --ntasks-per-node=4 with --gpus-per-task=1 and --gpu-bind=closest, which means one GPU is allocated and bound per task. For MIG, do not double-count /dev/nvidia[0-7]; expose the actual MIG devices or AutoDetect=nvml-discovered MIG GRES as separate typed resources for each MIG profile.
  common_mistake: |
    **The Pitfall:** Configuring GPUs as generic resources without specifying types or topology plugins.
    **The Rationale:** Administrators might take a shortcut, relying on basic core/memory scheduling instead of configuring `SelectType=select/cons_tres` and topology trees.
    **The Consequence:** Preventing heterogeneous GPU scheduling and forcing multi-node jobs onto sub-optimal, cross-switch topologies.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 nodes.
    - 8 H100 GPUs, 128 CPU cores, 2 TB RAM per node.
    - Optional MIG mode requires separate schedulable MIG devices.

    **Calculations:**
    - Base schedulable GPUs: 10 nodes * 8 GPUs = 80 GPUs.
    - CPU tracking: 10 nodes * 128 cores = 1,280 CPU cores.
    - Memory tracking: 10 nodes * 2 TB = 20 TB RAM.
    - If each physical GPU is intentionally split into 2 supported MIG devices, schedulable GPU-like resources become 80 * 2 = 160 MIG devices, modeled separately from the physical GPU device files.

    **Conclusion & Interpretation:**
    - **Result: Slurm should track 80 typed physical GPUs, or explicitly configured MIG devices if MIG is enabled**. GPU-aware scheduling comes from cons_tres plus correct GRES and topology configuration.
