title: Warm 70B Replica vs Scale-to-Zero Break-Even
scenario: Our LLM endpoint on Kubernetes has a scale-to-zero policy to save money overnight. But the first morning request takes 45 seconds. The SRE team proposes keeping 1 warm replica 24/7. The finance team says that wastes $2,500/month.
question: Is keeping one warm 70B replica 24/7 worth the $2,500/month, and what is the break-even versus scale-to-zero?
details:
  realistic_solution: |
    Keeping one warm replica is worth it only if the avoided cold-start harm exceeds $2,500/month. Use an explicit business cost for a 45-second cold start: for example, estimated lost revenue, support cost, or an internal productivity value per delayed first request. If one cold start is valued at $5 of harm, the break-even is about 17 cold starts/day; if it is valued at $1, the break-even is about 83/day. Below that, scale-to-zero is cheaper and you should use scheduled pre-warming for predictable morning traffic or a small fallback model while the 70B replica starts. Above that, a warm replica is economically justified because the latency failures cost more than idle GPU capacity.
  common_mistake: |
    **The Pitfall:** Blindly asserting "always keep warm replicas — cold starts are unacceptable."
    **The Rationale:** Candidates prioritize latency above all else, ignoring the massive cloud cost for idle workloads.
    **The Consequence:** The company burns thousands of dollars a month on idle compute for sparsely utilized internal endpoints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Warm 70B replica cost is given by finance: $2,500/month.
    - Month length: 30 days.
    - Cold start penalty: 45 seconds for the first request after scale-to-zero.
    - Let C be the business cost of one cold start, measured in dollars per delayed first request.

    **Calculations:**
    - Break-even cold starts/month = $2,500 / C.
    - Break-even cold starts/day = $2,500 / (30 * C).
    - If C = $1 per cold start: $2,500 / (30 * $1) = ~83 cold starts/day.
    - If C = $5 per cold start: $2,500 / (30 * $5) = ~17 cold starts/day.
    - If C = $25 per cold start for a high-value customer workflow: $2,500 / (30 * $25) = ~3.3 cold starts/day.

    **Conclusion & Interpretation:**
    - **Result: Break-Even Depends on Cold-Start Harm.** At $5 of harm per 45-second cold start, keep the replica warm only above ~17 cold starts/day. Otherwise prefer scale-to-zero with scheduled warming or a degraded fallback path.
