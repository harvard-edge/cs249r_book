title: 'The Rollout Memory Budget'
scenario: 'You are planning an update for a fleet of 500 serving instances. You need to replace an existing 7B parameter LLM with a 13B parameter LLM, both served in FP16 precision.'
question: 'How much total additional HBM is required across 500 FP16 instances when upgrading from a 7B to a 13B model?'
details:
  realistic_solution: 'Calculate the parameter memory delta per instance (6B params * 2 bytes for FP16 = 12GB), then scale by the fleet size (500 instances) to determine the exact aggregate HBM capacity needed for the rollout.'
  common_mistake: |
    **The Pitfall:** Calculating the total memory required for the new fleet instead of the additional memory needed.
    **The Rationale:** Candidates often skip the subtraction step or forget to multiply the parameter count by the bytes-per-parameter for the given precision.
    **The Consequence:** The team vastly over-provisions and requests far more hardware capacity than is actually necessary for the upgrade.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 serving instances.
    - Old model: 7B parameters. New model: 13B parameters.
    - Precision: FP16 (2 bytes/parameter).

    **Calculations:**
    - Parameter increase: 13B - 7B = 6B parameters.
    - Memory delta per instance: 6B × 2 bytes/param = 12 GB.
    - Total fleet memory delta: 12 GB × 500 instances = 6000 GB (6 TB).

    **Conclusion & Interpretation:**
    - **Result: 6 TB additional HBM (Memory-Capacity-Bound)**. Hardware rollout is bottle-necked by memory capacity scaling.
  options:
  - '3 TB'
  - '13 TB'
  - '6 TB'
  - '12 TB'
  correct_index: 2
