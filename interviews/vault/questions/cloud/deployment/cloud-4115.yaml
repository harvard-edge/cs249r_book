title: GPU Time-Slicing vs MIG vs MPS
scenario: 'You need to compare three GPU sharing mechanisms for inference workloads: CUDA time-slicing, MIG, and MPS.'
question: "How do CUDA time-slicing, MIG, and MPS differ in isolation, overhead, and best use case?"
details:
  realistic_solution: 'CUDA Time-Slicing: Context-switches workloads with no memory isolation. Context switch takes 10-25 μs. MIG (Multi-Instance GPU): Hardware partitioning of SMs and memory with full isolation and no context switching overhead. MPS (Multi-Process Service): Daemon process sharing SMs and memory bandwidth with partial isolation and low overhead (~5%). MIG guarantees resources, MPS shares resources, and time-slicing alternates resources.'
  common_mistake: |
    **The Pitfall:** Treating MIG and time-slicing as equivalent.
    **The Rationale:** Candidates assume any sharing mechanism provides safety and isolation.
    **The Consequence:** Deploying time-slicing in production can cause one workload to OOM and crash all others, whereas MIG provides hardware-level memory and compute partitioning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 GPU.
       - Target inference latency: 10 ms.
    2. **Calculations:**
       - Time-slicing context switch per swap = 10-25 μs.
       - Time-slicing overhead = 10-25 μs / 10,000 μs = 0.1-0.25%.
       - MIG overhead = 0%.
    3. **Conclusion & Interpretation:** **Time-slicing adds 0.1-0.25% overhead, while MIG adds 0%. Result: Architecture-Bound.**
