title: The Embedding Cache Hit Rate Cliff
scenario: 'You add an embedding cache (Redis, 64 GB) to avoid re-computing embeddings. Initially the hit rate is 72%. After expanding to 10x more users, the hit rate drops to 8% even though total query volume increased 10x. The cache size hasn''t changed.'
question: 'Why did scaling users destroy your cache economics, and how do you fix the hit rate collapse?'
details:
  realistic_solution: 'A larger user base flattens the query distribution (higher entropy), destroying the Zipfian skew that made caching viable. The effective working set grows superlinearly with user count. Fixes include semantic caching (clustering similar queries via Locality-Sensitive Hashing) or tiered caching. At massive scale, native GPU embedding generation is often strictly cheaper than maintaining massive Redis clusters for poor hit rates.'
  common_mistake: |
    **The Pitfall:** Thinking the cache is just too small and naive scaling ("10x users = 10x cache") is the answer.
    **The Rationale:** Candidates fail to understand distribution shifts; a larger user base flattens the query distribution, increasing the unique working set superlinearly.
    **The Consequence:** Paying for massive cache infrastructure that continues to suffer high eviction rates and poor economic returns.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 GB cache, 1536-dim FP32 embeddings (~6 KB each).
    - Traffic: 10K QPS (36M queries/hour).

    **Calculations:**
    - Capacity: 64 GB / 6 KB = ~10.7M entries.
    - At 10x scale, unique queries/hour jump from 1M to 33M.

    **Conclusion & Interpretation:**
    - **Result: 33M unique queries aggressively thrash the 10.7M capacity, crashing the hit rate to ~8% (Capacity-Bound).**
