title: The Vector DB Sharding Strategy
scenario: Your vector index has grown to 500M embeddings (1536-dim FP32, ~3 TB raw). You need sub-20ms P99 search latency at 5,000 QPS. A single machine can hold at most 384 GB in RAM.
question: Are range-based or hash-based shards enough, or should the vector DB use locality-aware sharding?
details:
  realistic_solution: 'Neither — you should shard by embedding space clustering. Range-based sharding on document ID gives even distribution but searches must fan out to all shards because any shard might contain the nearest neighbor. Hash-based sharding has the same problem. With 10 shards and scatter-gather, request latency is governed by the slowest shard response plus merge overhead, so tail latency is amplified. Better: use IVF-style sharding where vectors are clustered using k-means and each shard holds one or more clusters. At query time, the query is compared to cluster centroids in a routing layer and routed to only the most relevant shards. Raw storage is 500M × 1536 × 4B = about 3.07 TB total, or about 307 GB per shard across 10 shards. If PQ compression is applied before sharding at a 32× ratio, the compressed payload is about 96 GB total, or about 9.6 GB per shard, before graph/list metadata and any full-vector reranking store.'
  common_mistake: |
    **The Pitfall:** Choosing hash-based sharding because 'it distributes load evenly.'
    **The Rationale:** For vector search, even load distribution is less important than minimizing fan-out.
    **The Consequence:** Tail latency amplification because P99 = max(P99 of all shards).
  napkin_math: |
    **Assumptions & Constraints:**
    - 500M vectors, 1536-dim FP32.
    - A single machine can hold at most 384 GB in RAM.
    - Use 10 shards as a simple capacity example.

    **Calculations:**
    - Raw memory = 500M × 1536 × 4B = 3.072 TB.
    - Raw memory per 10 shards = 3.072 TB / 10 = about 307 GB per shard, before index overhead.
    - Range or hash sharding does not preserve vector locality, so nearest-neighbor search must scatter to all 10 shards and wait for the slowest shard plus merge time.
    - Cluster-based routing preserves locality, so the query can target a smaller candidate shard set instead of all shards.

    **Conclusion & Interpretation:**
    - **Result: range/hash sharding causes scatter-gather tail amplification (Latency-Bound)**. The key design requirement is locality-aware routing, not merely even document distribution.
