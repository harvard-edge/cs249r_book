title: KV Cache Eviction Policy for Decode Pool Memory Management
scenario: A decode pool running vLLM shows increasing preemptions when long-context requests arrive (>4K tokens). KV cache utilization is at 95% when preemptions begin.
question: Why do >4K-token arrivals trigger vLLM preemption cascades at 95% KV utilization, and how would you fix it?
details:
  realistic_solution: vLLM KV cache is paged (PagedAttention), and prefill plus ongoing decode growth consume the same KV block budget. At 95% KV utilization, a >4K-token arrival needs hundreds of new blocks during prefill while existing decode requests still need one more token of KV each step. That exhausts headroom and forces vLLM to preempt lower-priority work, often causing recomputation rather than a simple PCIe swap. Fix it by reserving KV headroom for decode growth, lowering the maximum KV utilization target, limiting long-context concurrency, and using admission control or routing for long-prefill requests.
  common_mistake: |
    **The Pitfall:** Reducing the maximum context length to avoid preemptions.
    **The Rationale:** Engineers view hard limits as the easiest way to prevent memory exhaustion.
    **The Consequence:** This artificially limits the product's capabilities and does not address the root cause: the KV cache allocator fails to reserve headroom for token generation in existing requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU: H100 80GB. Model: 8B (16GB BF16 weights). Overhead: 4GB.
    - KV Cache Available Memory: 80 - 16 - 4 = 60 GB.
    - Attention shape: 32 layers, 32 heads, 128 dim. BF16 (2 bytes).
    - Paged KV block size: 16 tokens.

    **Calculations:**
    - KV memory per token: 2 (K+V) * 32 layers * 32 heads * 128 dim * 2 bytes = 524,288 bytes = 512 KiB.
    - Total token capacity: 60 GiB / 512 KiB = 122,880 tokens.
    - At 95% utilization, free capacity is only 5% * 122,880 ≈ 6,144 tokens.
    - One 4K-token prefill consumes 4,096 tokens of KV, leaving about 2,048 tokens for all active decode growth and allocator fragmentation.
    - If 256 active sequences each need 8 more decode tokens before completion, that is another 2,048 tokens, exhausting the remaining headroom.

    **Conclusion & Interpretation:**
    - **Result: KV headroom exhaustion (Memory-Bound Preemption Cascades).** Long-prefill arrivals at 95% KV utilization can consume the slack needed by ongoing decodes, so reserve headroom or limit admission before the allocator reaches this state.
