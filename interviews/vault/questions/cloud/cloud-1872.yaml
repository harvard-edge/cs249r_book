title: Architecting Shadow Deployments for Latency-Sensitive APIs
scenario: You are evaluating architecture designs for a shadow deployment of a new Transformer-based fraud
  detection model. Production (an XGBoost model) handles 5,000 QPS with a strict 50ms p99 SLA running
  on 20 c5.4xlarge instances. The new model runs on NVIDIA L4 GPUs with an estimated 40ms p50, but unknown
  tail latency. A junior engineer proposes modifying the application code to call both models concurrently,
  return the XGBoost prediction as soon as it completes, and use a background application thread to wait
  for the Transformer model before logging both results to an S3 bucket. Evaluate the system-level risks
  of this design and propose a production-grade alternative.
details:
  realistic_solution: Implement network-layer traffic mirroring (e.g., using Envoy, Istio, or an API Gateway)
    to duplicate requests out-of-band. Alternatively, publish requests to a distributed log (like Kafka)
    where the shadow model consumes events at its own pace, physically decoupling the shadow compute from
    the primary API's resources.
  common_mistake: Accepting application-layer asynchronous calls (e.g., async/await or background threads)
    without recognizing the severe risks of thread pool exhaustion and memory pressure if the shadow model
    experiences latency spikes or capacity constraints.
  napkin_math: 'Using Little''s Law (Concurrency = QPS * Latency): At 5,000 QPS, if the shadow model''s
    tail latency spikes to 500ms due to unoptimized GPU batching, the concurrency L = 5,000 * 0.5s = 2,500
    active connections. The proposed application-layer approach would tie up 2,500 application threads
    waiting for the shadow model. This would quickly exhaust a standard web server thread pool (e.g.,
    typically 200-1000), causing legitimate production requests to queue and severely violating the 50ms
    SLA.'
