title: Continuous Training Cost Model
scenario: You switch a model from weekly retraining (full retrain, 8h on 8 A100s) to continuous training triggered by drift detection (incremental fine-tune, 2h on 4 A100s, average 3 triggers/week). Calculate the change in weekly GPU cost at $3/GPU-hour and the storage cost of maintaining rolling data windows.
question: What is the weekly GPU cost change, and does continuous training save money once monitoring, data pipeline, and validation overhead are included?
details:
  realistic_solution: Weekly full retrain: 8 GPUs × 8h × $3 = $192/week. Continuous training: 3 triggers/week × 4 GPUs × 2h × $3 = $72/week. GPU savings: $192 - $72 = $120/week ($6,240/year). However, continuous training adds: drift monitoring (always-on, ~0.5 GPU equivalent = $3 × 0.5 × 168h = $252/week), data pipeline for incremental ingestion (~$50/week in compute), and model validation per trigger (3 × 0.5h × 1 GPU × $3 = $4.5/week). Total continuous training cost: $72 + $252 + $50 + $4.5 = $378.5/week. This is actually $186.5/week MORE than weekly retraining. The value is not GPU cost savings — it is the 5x reduction in model staleness that improves business metrics (CTR, revenue).
  common_mistake: |
    **The Pitfall:** Only comparing direct GPU training costs.
    **The Rationale:** Forgetting that event-driven retraining requires always-on auxiliary infrastructure to detect drift and stage data.
    **The Consequence:** Significantly underestimating the TCO of continuous training and making a flawed ROI argument.
  napkin_math: |
    - **Weekly Retrain GPU Cost**: 8 GPUs × 8h × $3 = $192/wk.
    - **Continuous Training GPU Cost**: 3 triggers/wk × 4 GPUs × 2h × $3 = $72/wk.
    - **GPU Savings**: $192 - $72 = $120/wk.
    - **Continuous Overhead**: Always-on monitoring (~$252/wk), data pipeline (~$50/wk), and validation (~$4.5/wk) total ~$306.5/wk extra.
    - **Total Continuous Cost**: $72 + $306.5 = $378.5/wk.
    - **Result**: Continuous training costs **$186.5/wk MORE** than weekly retraining, justified by the 5× reduction in model staleness.
