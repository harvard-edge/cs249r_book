title: The Fairness Impossibility Tradeoff
scenario: Your team's loan approval model must satisfy both demographic parity (equal approval rates across groups) and equalized odds (equal True Positive Rate and False Positive Rate across groups). A fairness researcher notes that satisfying both simultaneously is mathematically impossible except in trivial cases.
question: Why are demographic parity and equalized odds impossible to satisfy together except in trivial cases?
details:
  realistic_solution: |
    The Chouldechova-Kleinberg impossibility theorem (2016-2017) proves that when base rates differ between groups (e.g., different default rates across demographics), you cannot simultaneously satisfy calibration, equalized odds, and demographic parity. Intuitively: if Group A has a 5% default rate and Group B has 15%, equalizing approval rates (demographic parity) forces different score thresholds per group, which breaks equalized odds. Conversely, enforcing equal error rates across groups with different base rates necessarily produces unequal approval rates. This means every fairness-aware system must make an explicit policy choice about which fairness criterion to prioritize — this is a design decision, not a technical optimization.
  common_mistake: |
    **The Pitfall:** Assuming threshold tuning can satisfy all fairness criteria simultaneously.
    **The Rationale:** Engineers treat fairness as an optimization problem, believing that with enough compute and data, an optimal threshold exists for every constraint.
    **The Consequence:** They waste engineering effort attempting to solve a mathematically impossible theorem (Chouldechova-Kleinberg), delaying the necessary policy decision on which criterion to prioritize.
  napkin_math: |
    - **Base default rates:** Group A = 5%, Group B = 15%.
    - **Constraint 1 (Demographic Parity):** Equal approval rates, e.g., 80% for both.
    - **The Conflict:** To reach 80% approval in the riskier Group B, the model must drastically lower its threshold compared to Group A.
    - **Constraint 2 (Equalized Odds broken):** A lower threshold naturally increases the False Positive Rate.
    - **Conclusion:** **FPR_B now heavily exceeds FPR_A, mathematically breaking Equalized Odds.**
