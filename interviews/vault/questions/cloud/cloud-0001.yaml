title: The Continuous Batching Target
scenario: A user of your LLM API complains about the long initial wait before their generated text starts
  appearing. A teammate suggests implementing continuous batching to specifically reduce this initial
  wait time. Which of the following metrics is continuous batching designed to primarily improve?
question: "Which of the following metrics is continuous batching designed to primarily improve?"
details:
  realistic_solution: Continuous batching primarily improves overall throughput, which is measured in
    tokens per second across all concurrent users. This has the effect of reducing the average 'Time Per
    Output Token' (TPOT). It achieves this by eliminating head-of-line blocking and ensuring the GPU is
    always busy decoding *some* token for *some* user, rather than waiting for a full batch to complete.
    The initial wait (TTFT) is dominated by the prefill stage for the new prompt, which is not the primary
    target of this optimization.
  common_mistake: Engineers often believe that any batching technique will speed up all aspects of inference.
    They incorrectly assume continuous batching will reduce the 'Time To First Token' (TTFT) for a new
    request, when its main benefit lies in improving overall system efficiency rather than the latency
    of a single, isolated request.
  napkin_math: Imagine a GPU that can process one prompt prefill in 500ms or one token decoding in 50ms.
  options:
  - Time To First Token (TTFT)
  - System Throughput / Average Time Per Output Token (TPOT)
  - Model Loading Time
  - GPU Idle Time
