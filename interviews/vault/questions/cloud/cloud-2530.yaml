title: Cloud Transient Loads L5 0
scenario: To mitigate transient power loads, your team proposes three options. Option A is battery/supercapacitor banks to buffer spikes. Option B is staggered AllReduce operations across rack groups with 50 ms offsets. Option C is power-capping GPUs to 80% TDP.
question: Which transient-power mitigation—buffering, staggered AllReduce, or 80% power caps—would you choose, and why?
details:
  realistic_solution: Option A (energy buffering): eliminates transient impact on grid, zero training performance loss, but costs $200-500K for MW-scale buffering and requires floor space. Option B (staggered AllReduce): reduces peak power by spreading transitions over time, but adds 50 ms × N_groups latency to each AllReduce, increasing communication overhead by 5-15%. For a 1-second training step, this is a 1-3% throughput hit. Option C (power capping at 80%): reduces both steady-state and transient power, but caps compute throughput at ~80%, directly losing 20% training speed — 30-day job becomes 37.5 days. Best choice: A if capital budget allows, B as a software-only alternative with small perf hit, C only as last resort.
  common_mistake: |
    **The Pitfall:** Choosing power capping because it is the simplest to implement.
    **The Rationale:** Candidates focus on immediate implementation ease and overlook the compounding cost of reduced training throughput.
    **The Consequence:** A 20% throughput loss compounds over weeks of training, ultimately costing millions of dollars more than hardware buffering.
  napkin_math: |
    1. Option A: $300K capex, 0% perf loss.
    2. Option B: +100-200 ms per AllReduce, ~2% slower.
    3. Option C: 20% throughput loss, extending 30 days to 37.5 days.
    4. Extra GPU cost of Option C: 7.5 days * 4096 GPUs * $2/GPU-hr * 24h = $1.47M.
    **Option C's compute cost far exceeds Option A's capital expenditure.**
