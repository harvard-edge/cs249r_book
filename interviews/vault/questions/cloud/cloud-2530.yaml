title: Cloud Transient Loads L5 0
scenario: 'To mitigate transient power loads, your team proposes: (A) install battery/supercapacitor banks
  to buffer spikes, (B) stagger AllReduce operations across rack groups with 50 ms offsets, (C) power-cap
  GPUs to 80% TDP. Evaluate each approach''s impact on training performance and cost.'
details:
  realistic_solution: 'Option A (energy buffering): eliminates transient impact on grid, zero training
    performance loss, but costs $200-500K for MW-scale buffering and requires floor space. Option B (staggered
    AllReduce): reduces peak power by spreading transitions over time, but adds 50 ms × N_groups latency
    to each AllReduce, increasing communication overhead by 5-15%. For a 1-second training step, this
    is a 1-3% throughput hit. Option C (power capping at 80%): reduces both steady-state and transient
    power, but caps compute throughput at ~80%, directly losing 20% training speed — 30-day job becomes
    37.5 days. Best choice: A if capital budget allows, B as a software-only alternative with small perf
    hit, C only as last resort.'
  common_mistake: Choosing power capping because it is the simplest to implement. The 20% throughput loss
    compounds over weeks of training and costs far more than hardware buffering solutions.
  napkin_math: 'A: $300K capex, 0% perf loss. B: +100-200 ms per AllReduce, ~2% slower. C: 20% throughput
    loss, 30 days → 37.5 days. Extra GPU cost of C: 7.5 days × 4096 GPUs × $2/GPU-hr × 24h = $1.47M —
    far more than option A''s cost.'
