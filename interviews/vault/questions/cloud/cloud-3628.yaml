title: RoCEv2 vs InfiniBand Latency and Congestion on H100 Training Cluster
scenario: 'A new training cluster will use either native InfiniBand (HDR 200Gbps) or RoCEv2 over 200GbE. Both support RDMA. The infrastructure team prefers RoCEv2 because it reuses Ethernet switches.'
question: 'Should the new training cluster use native InfiniBand or RoCEv2 over 200GbE, and how do they compare for ML training?'
details:
  realistic_solution: 'InfiniBand uses a native lossless fabric with credit-based flow control, yielding 1-2μs predictable latency without packet loss. RoCEv2 runs over Ethernet and requires Priority Flow Control (PFC) and ECN (DCQCN) to prevent packet drops. Under heavy AllReduce loads, PFC can trigger head-of-line blocking cascades (PFC storms), degrading P99 latency. For large-scale distributed training (>256 GPUs), InfiniBand is preferred for deterministic performance, while RoCEv2 requires meticulous switch-level tuning to avoid throughput collapse.'
  common_mistake: |
    **The Pitfall:** Treating InfiniBand and RoCEv2 as entirely equivalent because both support RDMA.
    **The Rationale:** Candidates ignore that RoCEv2 relies on lossless Ethernet (PFC/ECN) while IB has native credit-based flow control built for predictable latencies.
    **The Consequence:** Deploying RoCEv2 for a large-scale cluster without proper tuning, leading to PFC storms and severe throughput collapse.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128 GPUs, 200Gbps (25GB/s) per node. Ring AllReduce for 40GB.
    2. **Calculations:**
       - Shared bandwidth = 3.125GB/s/GPU.
       - IB Ring AllReduce: 2 * (127/128) * 40GB / 3.125GB/s = 25.4s.
       - RoCEv2 adds 10-20% latency overhead due to PFC pauses.
    3. **Conclusion & Interpretation:**
       - **Result: RoCEv2 offers identical peak bandwidth but incurs 28-31s step times under load due to PFC pauses (Latency-Bound).**
