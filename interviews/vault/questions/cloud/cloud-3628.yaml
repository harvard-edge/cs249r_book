title: RoCEv2 vs InfiniBand Latency and Congestion on H100 Training Cluster
scenario: 'A new H100 training cluster will use either native InfiniBand (HDR 200Gbps) or RoCEv2 over 200GbE. Both support RDMA. The infrastructure team prefers RoCEv2 because it reuses Ethernet switches.'
question: 'Should the new H100 training cluster use native InfiniBand or RoCEv2 over 200GbE, and how do they compare for ML training?'
details:
  realistic_solution: 'InfiniBand: native lossless fabric, credit-based flow control, 1-2μs baseline latency, purpose-built for RDMA, adaptive routing built-in. No packet loss → predictable AllReduce latency. RoCEv2: runs over Ethernet, requires Priority Flow Control (PFC) to prevent packet drops. PFC can cause head-of-line blocking cascades (PFC storms). ECN (DCQCN) for congestion control adds complexity. Latency: 3-5μs baseline, P99 degrades under load without careful tuning. Operational: RoCEv2 requires careful PFC/ECN configuration on all switches; misconfig causes throughput collapse. For large-scale training (>256 GPUs), IB is preferred for deterministic performance. RoCEv2 works well for <128 GPU clusters with careful tuning.'
  common_mistake: |
    **The Pitfall:** Treating InfiniBand and RoCEv2 as entirely equivalent because both support RDMA.
    **The Rationale:** Candidates ignore that RoCEv2 relies on lossless Ethernet (PFC/ECN) while IB has native credit-based flow control built for predictable latencies.
    **The Consequence:** Deploying RoCEv2 for a large-scale cluster without proper tuning, leading to PFC storms and throughput collapse.
  napkin_math: |
    * 128 GPUs (16 nodes, 8 GPUs/node). IB 200Gbps = 25GB/s per node.
    * Shared bandwidth = 3.125GB/s/GPU.
    * Ring AllReduce for 40GB: `2 × (127/128) × 40GB / 3.125GB/s = 25.4s`.
    * **RoCEv2 offers the same bandwidth but adds 10-20% latency overhead (28-31s) due to PFC pauses.**
