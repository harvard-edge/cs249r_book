title: RoCEv2 vs InfiniBand Latency and Congestion on H100 Training Cluster
scenario: A new H100 training cluster will use either native InfiniBand (HDR 200Gbps)
  or RoCEv2 over 200GbE. Both support RDMA. The infrastructure team prefers RoCEv2
  because it reuses Ethernet switches. Compare the two for ML training workloads on
  latency, congestion control, and operational complexity.
question: Should the new H100 training cluster use native InfiniBand or RoCEv2 over
  200GbE, and how do they compare for ML training?
details:
  realistic_solution: 'InfiniBand: native lossless fabric, credit-based flow control,
    1-2μs baseline latency, purpose-built for RDMA, adaptive routing built-in. No
    packet loss → predictable AllReduce latency. RoCEv2: runs over Ethernet, requires
    Priority Flow Control (PFC) to prevent packet drops. PFC can cause head-of-line
    blocking cascades (PFC storms). ECN (DCQCN) for congestion control adds complexity.
    Latency: 3-5μs baseline, P99 degrades under load without careful tuning. Operational:
    RoCEv2 requires careful PFC/ECN configuration on all switches; misconfig causes
    throughput collapse. For large-scale training (>256 GPUs), IB is preferred for
    deterministic performance. RoCEv2 works well for <128 GPU clusters with careful
    tuning.'
  common_mistake: Treating IB and RoCEv2 as equivalent because both support RDMA;
    ignoring that RoCEv2 relies on lossless Ethernet (PFC/ECN) while IB has native
    flow control.
  napkin_math: 'IB AllReduce for 40GB, 16 nodes: 40GB/(8×25GB/s)×1.75=0.35s. No, bandwidth
    limited. Per-node IB 200Gbps=25GB/s. Ring over 16 nodes: 2×15/16×40GB/25GB/s=3s.
    Wait — 8 H100s/node, 16 nodes =128 GPUs. IB per node 200Gbps shared across 8 GPUs=3.125GB/s/GPU.
    Ring time=2×127/128×40GB/3.125GB/s=25.4s. RoCEv2 same bandwidth but P99 adds 10-20%
    from PFC pauses → 28-31s. Latency difference matters more for small-message collectives.'
