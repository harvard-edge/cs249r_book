title: The RAG Pod Memory Footprint
scenario: 'You''re deploying a Retrieval-Augmented Generation (RAG) system for an in-vehicle diagnostic assistant. The system consists of two models running on the same GPU for inference: a 300 million parameter embedding model for document retrieval, and a 7 billion parameter LLM for generating answers.'
question: Assuming both inference models use FP16 weights, what total GPU memory is needed to load the 300M embedding model and 7B LLM?
details:
  realistic_solution: To find the total memory, you must calculate the memory footprint for each model individually and then sum them up. Both models use FP16 precision, which requires 2 bytes per parameter.
  common_mistake: |
    **The Pitfall:** Forgetting the memory cost of the smaller embedding model or using the memory multiplier for training.
    **The Rationale:** Candidates often only calculate the memory for the large language model or mistakenly assume 16 bytes/param (Adam optimizer state) instead of the 2 bytes/param required for FP16 inference.
    **The Consequence:** Overprovisioning or underprovisioning the VRAM required for the deployment pod.
  napkin_math: |
    - **Embedding Model:** 300e6 params * 2 bytes/param = **0.6 GB**.
    - **LLM:** 7e9 params * 2 bytes/param = **14.0 GB**.
    - **Total Memory:** 0.6 GB + 14.0 GB = **14.6 GB**.
  options:
  - 14.0 GB
  - 7.3 GB
  - 14.6 GB
  - 116.8 GB
  correct_index: 2
