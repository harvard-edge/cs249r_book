title: The RAG Pod Memory Footprint
scenario: 'You''re deploying a Retrieval-Augmented Generation (RAG) system for an in-vehicle diagnostic
  assistant. The system consists of two models running on the same GPU for inference:

  1. A 300 million parameter embedding model for document retrieval.

  2. A 7 billion parameter LLM for generating answers.'
details:
  realistic_solution: To find the total memory, you must calculate the memory footprint for each model
    individually and then sum them up. Both models use FP16 precision, which requires 2 bytes per parameter.
  common_mistake: The most common mistake is to forget the memory cost of the smaller, but essential,
    embedding model, and only calculate the memory for the large language model. Another frequent error
    is using the memory multiplier for training (e.g., 16 bytes/param for Adam optimizer state) instead
    of the much smaller multiplier for inference (2 bytes/param for FP16 weights).
  napkin_math: 'Embedding Model: 300e6 params * 2 bytes/param = 0.6 GB'
  options:
  - 14.0 GB
  - 7.3 GB
  - 14.6 GB
  - 116.8 GB
  correct_index: 2
