title: Flash Attention with Variable-Length Sequences and Padding Masks
scenario: You're using Flash Attention (via xformers or flash-attn library) in a training pipeline on
  A100 (80GB HBM2e, 2TB/s) with variable-length text sequences. Batches are padded to the maximum sequence
  length in the batch. You observe that actual speedup from Flash Attention is only 1.8x vs the theoretical
  4x at seq_len=2048.
details:
  realistic_solution: Use flash_attn_varlen_qkvpacked_func with cu_seqlens (cumulative sequence lengths)
    to process only valid tokens. Pack all sequences into a single flattened tensor without padding. This
    eliminates compute on padding tokens entirely. On typical NLP datasets where average length is 60%
    of max, this recovers ~40% of wasted compute.
  common_mistake: Not using the 'varlen' (variable-length) Flash Attention API. With standard padding
    to max length, Flash Attention still processes all padded tokens, wasting compute on padding. The
    theoretical speedup assumes dense sequences.
  napkin_math: 'Batch of 32 sequences, max_len=2048, avg_len=1200 (60% of max). Standard Flash Attention:
    processes 32*2048 = 65536 tokens. Attention is O(n^2): wasted compute per sequence = (2048^2 - 1200^2)
    / 2048^2 = 65.6% waste. Varlen Flash Attention: processes 32*1200 = 38400 tokens. Speedup from varlen
    = (65536/38400)^? — attention is quadratic: speedup ≈ (2048/1200)^2 = 2.92x vs 1.8x baseline. Matches
    the expected 4x theoretical.'
