title: Specifying Activation Memory Budget for a Multi-Tenant Training Cluster on H100
scenario: You are writing memory budget specifications for a shared H100 training cluster that will run jobs from multiple teams with models ranging from 1B to 70B parameters. Each H100 GPU has 80 GB HBM3. You need to define a per-job activation memory allocation policy that accounts for model size, sequence length, batch size, and gradient checkpointing configuration, and that can be enforced by the cluster scheduler before job launch.
question: What activation memory allocation policy should the scheduler enforce for H100 jobs across model size, sequence length, batch, and checkpointing?
details:
  realistic_solution: 'Define activation memory spec as: M_act = N_layers_stored × (M_residual + M_attention + M_mlp) × safety_factor, where N_layers_stored = ceil(N_layers / checkpoint_interval), M_residual = 2×B×S×H×dtype_bytes, M_attention = 0 if FlashAttention else num_heads×B×S²×dtype_bytes, M_mlp = 8×B×S×H×dtype_bytes, safety_factor = 1.2 for fragmentation. Add peak_gradient_buffer = M_largest_parameter_tensor × 2 for backward workspace. Enforce via CUDA memory fraction limit: `torch.cuda.set_per_process_memory_fraction(M_act_budget / 80e9)` in the job launch wrapper.'
  common_mistake: |
    **The Pitfall:** Specifying only peak theoretical activation memory.
    **The Rationale:** Candidates forget to account for memory fragmentation overhead (typically 10-20%), intermediate workspace buffers for fused kernels, and gradient buffers that co-exist at the backward-pass peak.
    **The Consequence:** Setting a rigid memory boundary that causes jobs to randomly OOM during training spikes.
  napkin_math: |
    - **7B Model Spec:** $N_{stored} = 8$ (checkpoint every 4 of 32 layers).
    - **Layer memory:** $M_{residual} = 2 \times 4 \times 2048 \times 4096 \times 2 = 128$ MB. $M_{mlp} = 8 \times 4 \times 2048 \times 4096 \times 2 = 512$ MB.
    - **Total (7B):** 8 layers * 640 MB * 1.2 (Safety) = **6.1 GB.**
    - **70B Model Spec:** $N_{stored} = 10$ (checkpoint every 8 of 80 layers).
    - **Total (70B):** $(256 + 1024)$ MB/layer * 10 layers * 1.2 = **15.4 GB.**
    - **Result:** **Both fit easily alongside weights in the 80 GB HBM3.**
