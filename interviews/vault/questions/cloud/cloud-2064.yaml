title: The Data Cascade Failure
scenario: A team discovers that their NLP model's accuracy has dropped 4% over the past month. No code changes were made. Investigation reveals that an upstream data pipeline team changed the text normalization logic (switching from Unicode NFKC to NFC normalization) without notifying the ML team. This is an example of what the ML systems literature calls a 'data cascade.'
question: Why are data cascades particularly dangerous in ML workflows, and what structural practice would have caught this?
details:
  realistic_solution: "Data cascades are dangerous because: (1) They are silent — no error, no crash, just gradual degradation. (2) They violate the stationarity assumption: the model was trained on NFKC-normalized text but now receives NFC-normalized text, creating a distribution shift at the character level. (3) They compound: a small normalization change affects tokenization, which changes embeddings, which changes model behavior in unpredictable ways. The structural fix is schema validation at the pipeline boundary: compute statistical fingerprints (token distribution, character frequency, feature means/stddevs) of training data and assert that incoming data matches within tolerance. This is 'data testing' — the analog of unit testing for data contracts."
  common_mistake: |
    **The Pitfall:** Thinking this is just a communication problem ("they should have told us").
    **The Rationale:** Viewing ML systems purely as code, rather than as systems with rigid but implicit contracts on external data distributions.
    **The Consequence:** Repeated silent failures and model degradation, as manual communication inherently fails at scale.
  napkin_math: |
    *   **Character Differences:** NFKC and NFC differ on ~2% of Unicode characters.
    *   **Corpus Impact:** If 5% of training examples contain affected characters, approximately $0.05 \times 0.02$ = 0.1% of tokens change.
    *   **Model Sensitivity:** For a model with sensitivity to token changes of ~40× (empirical), effective input drift $\approx$ **4%**.
    *   **Conclusion:** This directly maps to the observed 4% accuracy drop.
