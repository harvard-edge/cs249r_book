title: The Data Cascade Failure
scenario: A team discovers that their NLP model's accuracy has dropped 4% over the past month. No code changes were made. Investigation reveals that an upstream data pipeline team changed the text normalization logic (switching from Unicode NFKC to NFC normalization) without notifying the ML team. This is an example of what the ML systems literature calls a 'data cascade.'
question: Why are data cascades particularly dangerous in ML workflows, and what structural practice would have caught this?
details:
  realistic_solution: "Data cascades are dangerous because: (1) They are silent \u2014 no error, no crash, just gradual degradation. (2) They violate the stationarity assumption: the model was trained on NFKC-normalized text but now receives NFC-normalized text, creating a distribution shift at the character level. (3) They compound: a small normalization change affects tokenization, which changes embeddings, which changes model behavior in unpredictable ways. The structural fix is schema validation at the pipeline boundary: compute statistical fingerprints (token distribution, character frequency, feature means/stddevs) of training data and assert that incoming data matches within tolerance. This is 'data testing' \u2014 the analog of unit testing for data contracts."
  common_mistake: |
    **The Pitfall:** Thinking this is just a communication problem ("they should have told us").
    **The Rationale:** Viewing ML systems purely as code, rather than as systems with rigid but implicit contracts on external data distributions.
    **The Consequence:** Repeated silent failures and model degradation, as manual communication inherently fails at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - NFKC and NFC normalization differ on ~2% of Unicode characters.
    - Assume 5% of training examples contain affected characters.
    - Empirical model sensitivity to token changes: ~40x multiplier.

    **Calculations:**
    - Token shift rate: 0.05 \times 0.02 = 0.1% of total tokens change identity.
    - Effective Input Drift: 0.1% token shift \times 40x sensitivity = 4% accuracy shift.

    **Conclusion & Interpretation:**
    - **Result: 4% accuracy drop (Distribution-Drift-Bound)**. The 4% accuracy drop perfectly aligns with the character distribution drift.
