title: 'Queueing Theory Realization: Compute vs Memory Bottleneck in Queued Requests'
scenario: Concretely determine whether an H100 serving Mistral-7B is compute-bound or memory-bandwidth-bound during the decode phase, and how this changes the M/M/1 service time distribution (coefficient of variation). Arrival rate λ=200 req/s, mean output 150 tokens. Use this to select the correct queueing model (M/M/1 vs M/D/1).
question: Is an H100 serving Mistral-7B decode compute-bound or memory-bound, and how does this dictate using an M/D/1 instead of an M/M/1 queueing model?
details:
  realistic_solution: 'During the autoregressive decode phase, Mistral-7B is heavily memory-bandwidth-bound because it must load the entire 7B parameter weight matrix for every single generated token. The arithmetic intensity is ~1 FLOP/byte, far below the H100''s ridge point of 295 FLOPs/byte (based on 989 TFLOPS FP16 and 3.35 TB/s HBM3). Because decode is bottlenecked by the deterministic speed of HBM reading fixed-size matrices, the service time variance approaches zero. Therefore, an M/D/1 queue (deterministic service times) is mathematically correct, whereas M/M/1 (exponential service times) overestimates tail latency.'
  common_mistake: |
    **The Pitfall:** Blindly applying an M/M/1 queueing model (which assumes exponential service times) to a memory-bound decode process.
    **The Rationale:** Candidates default to standard M/M/1 formulas without realizing that memory-bandwidth-bound autoregressive decoding is highly deterministic.
    **The Consequence:** Latency estimates are wildly inaccurate because an M/D/1 model (deterministic service time) is the mathematically correct fit.
  napkin_math: |
    - **H100 Specs:** 989 TFLOPS FP16 peak, 3.35 TB/s HBM3 bandwidth.
    - **Ridge Point:** 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/byte.
    - **Decode AI:** ~1 FLOP/byte (massively memory bound).
    - **Service Time:** Dominated by memory bandwidth. Reading 14GB at 3.35 TB/s = ~4.1ms per token, extremely deterministic.
    - **Queueing Impact:** Because service time variance is near zero, M/D/1 is the correct model. M/M/1 will incorrectly predict massive tail latencies.
