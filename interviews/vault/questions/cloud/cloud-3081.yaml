title: 'Queueing Theory Realization: Compute vs Memory Bottleneck in Queued Requests'
scenario: Concretely determine whether an H100 serving Mistral-7B is compute-bound or memory-bandwidth-bound during the decode phase, and how this changes the M/M/1 service time distribution (coefficient of variation). Arrival rate λ=200 req/s, mean output 150 tokens. Use this to select the correct queueing model (M/M/1 vs M/D/1).
question: What H100 FP16 throughput should be used as the authoritative spec for this decode-boundness analysis?
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. This is the authoritative spec for all H100 FP16 calculations.'
  common_mistake: |
    **The Pitfall:** Blindly applying an M/M/1 queueing model (which assumes exponential service times) to a memory-bound decode process.
    **The Rationale:** Candidates default to standard M/M/1 formulas without realizing that memory-bandwidth-bound autoregressive decoding is highly deterministic.
    **The Consequence:** Latency estimates are wildly inaccurate because an M/D/1 model (deterministic service time) is the mathematically correct fit.
  napkin_math: |
    1. The authoritative peak spec for H100 FP16 is 989 TFLOPS (dense).
    2. Training efficiency is measured as Model FLOPs Utilization (MFU) = actual_flops / theoretical_peak.
    3. Assuming an aggressive 40% MFU, effective compute is 989 TFLOPS * 0.40 = ~395.6 TFLOPS.
    **Using the correct 989 TFLOPS baseline is critical; doubling it to 1979 TFLOPS (FP8/Sparse) creates massive theoretical errors.**
