title: Evaluating GPU Upgrades vs Software Batching for MLPs
scenario: You are evaluating an inference pipeline that relies heavily on a dense 8192x8192 FP16 MLP projection
  layer. The current deployment on A100-SXM4 GPUs (312 TFLOPS FP16, 2.0 TB/s bandwidth) processes requests
  at batch size 1. An infrastructure proposal suggests upgrading to H100-SXM5 GPUs (989 TFLOPS FP16, 3.35
  TB/s bandwidth) to achieve a >3x reduction in latency. Evaluate this proposal against an alternative
  software engineering investment to implement continuous batching up to batch size 64.
details:
  realistic_solution: Reject the hardware upgrade for the stated goal of 3x latency reduction. At batch=1,
    the 8192x8192 FP16 projection has arithmetic intensity of ~1 FLOP/byte — far below the A100 ridge
    point of 156 FLOPs/byte. The operation is purely memory-bound, so an H100 (3.35 TB/s) yields only
    1.67x speedup over A100 (2.0 TB/s), not 3.1x. Instead, invest in continuous batching software to batch
    up to 64 requests, achieving 64x throughput with virtually zero added per-request latency on existing
    A100 hardware.
  common_mistake: Candidates mistakenly evaluate the expected speedup using the ratio of peak TFLOPS (989/312
    = 3.1x), failing to calculate the arithmetic intensity and recognize that memory-bound operations
    scale only with bandwidth ratio (3.35/2.0 = 1.67x).
  napkin_math: 'Weights = 8192 * 8192 * 2 Bytes = 134.2 MB.

    At B=1: FLOPs = 134.2M. Arithmetic Intensity (AI) = FLOPs / Mem = 1 FLOP/Byte.

    A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte.

    Since AI (1) << 156, it''s purely memory-bound.

    A100 Time = 134.2 MB / 2.0 TB/s = 67us.

    H100 Time = 134.2 MB / 3.35 TB/s = 40us (1.67x speedup, not 3.1x).

    At B=64: Compute time = 134.2M * 64 / 312T = 27.5us. Memory time = 67us. Max bottleneck is still 67us.
    We achieve 64x throughput with virtually zero added latency penalty on the existing hardware.'
