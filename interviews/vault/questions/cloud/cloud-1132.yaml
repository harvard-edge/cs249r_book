title: Evaluating GPU Upgrades vs Software Batching for MLPs
scenario: You are evaluating an inference pipeline that relies heavily on a dense 8192x8192 FP16 MLP projection layer. The current deployment on A100-SXM4 GPUs processes requests at batch size 1. An infrastructure proposal suggests upgrading to H100-SXM5 GPUs to achieve a >3x reduction in latency. Evaluate this proposal against an alternative software engineering investment to implement continuous batching up to batch size 64.
question: Will upgrading from A100 to H100 deliver a >3x latency reduction for batch-1 8192x8192 FP16 inference, or should you implement continuous batching?
details:
  realistic_solution: Reject the hardware upgrade for the stated goal of 3x latency reduction. At batch=1, the 8192x8192 FP16 projection has arithmetic intensity of ~1 FLOP/byte — far below the A100 ridge point of 156 FLOPs/byte. The operation is purely memory-bound, so an H100 (3.35 TB/s) yields only 1.67x speedup over A100 (2.0 TB/s), not 3.1x. Instead, invest in continuous batching software to batch up to 64 requests, achieving 64x throughput with virtually zero added per-request latency on existing A100 hardware.
  common_mistake: |
    **The Pitfall:** Evaluating expected speedup using the ratio of peak TFLOPS (989/312 = 3.1x).
    **The Rationale:** Candidates fail to calculate the arithmetic intensity of the workload.
    **The Consequence:** They recommend an expensive hardware upgrade for a memory-bound operation that scales only with the bandwidth ratio (1.67x).
  napkin_math: |
    1. **Weights:** 8192 * 8192 * 2 Bytes = 134.2 MB.
    2. **Batch 1 FLOPs:** 134.2M FLOPs.
    3. **Arithmetic Intensity (B=1):** 134.2M FLOPs / 134.2 MB = 1 FLOP/Byte.
    4. **A100 Ridge Point:** 312 TFLOPS / 2.0 TB/s = 156 FLOPs/Byte (Purely memory-bound).
    5. **A100 Time:** 134.2 MB / 2.0 TB/s = 67 us.
    6. **H100 Time:** 134.2 MB / 3.35 TB/s = 40 us (1.67x speedup, not 3.1x).
    7. **Batch 64 Time (A100):** Compute time = 134.2M * 64 / 312T = 27.5 us. Memory time = 67 us. Max bottleneck = 67 us.
    8. **Conclusion:** **We achieve 64x throughput with virtually zero added latency penalty on existing hardware.**
