title: LLM Injection Defense Architecture
scenario: Your LLM application processes both user queries and retrieves external documents (RAG). Both channels are vulnerable to injection. Options: (A) fine-tune the LLM to be injection-resistant, (B) separate the LLM into two instances (one for retrieval parsing, one for response generation with strict isolation), (C) apply input/output classifiers on all channels.
question: How should you evaluate fine-tuning, dual-instance isolation, and classifiers for prompt injection in a RAG application?
details:
  realistic_solution: 'Option A (fine-tune for resistance): Trains the model to refuse injection patterns. Works for known attacks but fails on novel ones. Each new attack requires retraining. Also risks making the model over-cautious, refusing legitimate queries that resemble injections. Fragile and not forward-looking. Option B (dual-instance isolation): One LLM instance parses retrieved documents into structured facts (with strict output format constraints). A second instance generates responses using only the structured facts, never raw document text. This architecturally prevents injection from propagating through the retrieval channel. More expensive (2x inference) but fundamentally more secure because raw external text never reaches the response generator. Option C (input/output classifiers): Adds detection layers on all channels. As shown in the precision calculation, low base rates make classifiers produce many false positives. Helps but cannot be the sole defense. Recommendation: B as the architectural foundation (eliminates the indirect injection channel), augmented with C for the direct user input channel. A is not recommended as a primary defense.'
  common_mistake: |
    **The Pitfall:** Relying primarily on fine-tuning for injection resistance.
    **The Rationale:** Developers often treat prompt injection as a standard classification problem that can be solved with more training data.
    **The Consequence:** An arms-race scenario where novel attacks continually bypass the fine-tuned defenses, while the model's general capabilities degrade.
  napkin_math: |
    * Assume a 1% base rate of injection attacks.
    * A classifier with 95% True Positive Rate and 20% False Positive Rate.
    * True Positives: 0.01 × 0.95 = 0.0095
    * False Positives: 0.99 × 0.20 = 0.198
    * Precision: 0.0095 / (0.0095 + 0.198) ≈ 4.5%
    * **Conclusion: Classifiers produce overwhelming false positives due to low base rates; structural isolation (Option B) is the only robust defense.**
