title: LLM Injection Defense Architecture
scenario: 'Your LLM application processes both user queries and retrieves external documents (RAG). Both
  channels are vulnerable to injection. Options: (A) fine-tune the LLM to be injection-resistant, (B)
  separate the LLM into two instances (one for retrieval parsing, one for response generation with strict
  isolation), (C) apply input/output classifiers on all channels. Evaluate.'
details:
  realistic_solution: 'Option A (fine-tune for resistance): Trains the model to refuse injection patterns.
    Works for known attacks but fails on novel ones. Each new attack requires retraining. Also risks making
    the model over-cautious, refusing legitimate queries that resemble injections. Fragile and not forward-looking.
    Option B (dual-instance isolation): One LLM instance parses retrieved documents into structured facts
    (with strict output format constraints). A second instance generates responses using only the structured
    facts, never raw document text. This architecturally prevents injection from propagating through the
    retrieval channel. More expensive (2x inference) but fundamentally more secure because raw external
    text never reaches the response generator. Option C (input/output classifiers): Adds detection layers
    on all channels. As shown in the precision calculation, low base rates make classifiers produce many
    false positives. Helps but cannot be the sole defense. Recommendation: B as the architectural foundation
    (eliminates the indirect injection channel), augmented with C for the direct user input channel. A
    is not recommended as a primary defense.'
  common_mistake: Fine-tuning for injection resistance (A). This is an arms race — new injection techniques
    emerge constantly, and fine-tuning on known attacks does not generalize to novel ones. It also degrades
    model capability on legitimate tasks.
  napkin_math: 'A (fine-tune): arms race, ~80% coverage of known attacks. B (dual-instance isolation):
    structurally eliminates indirect injection, 2x cost. Input/output classifiers (C): 95% TPR but 4.5%
    precision at low base rate. B + classifiers is optimal.'
