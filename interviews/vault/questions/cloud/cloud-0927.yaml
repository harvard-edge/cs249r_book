title: Diagnosing Implicit Data Dependency Failures
scenario: A cloud recommendation system runs across 64 A100 GPUs serving millions of requests. An upstream
  microservice team updates an 'is_premium' user feature from a binary value (0.0 or 1.0) to a continuous
  engagement score [0.0-1.0]. The gRPC schema (Float32) is perfectly maintained, so no integration tests
  fail. However, the downstream recommendation model's click-through rate (CTR) immediately plunges by
  15%. No code, weights, or infrastructure changes occurred in the downstream service. Analyze the root
  cause of this failure and explain how system modularity broke down.
question: "What caused the 15% CTR drop after is_premium changed semantics, and how should the service boundary be protected?"
details:
  realistic_solution: Diagnose the boundary erosion by analyzing the input feature distributions. The
    failure occurred because ML models depend on implicit data semantics. Implement statistical data validation
    (e.g., schema assertions for min/max/variance or expected categorical values) at the boundary to catch
    semantic shifts before they poison the inference pipeline.
  common_mistake: Relying exclusively on programmatic API contracts (like Float32 data types) to verify
    system boundaries, failing to recognize that ML systems are fundamentally coupled by data semantics
    and distributions.
  napkin_math: 'Pre-change: feature is 0.0 (90%) or 1.0 (10%). Model split node: `if feature > 0.5`, correctly
    identifying 10% premium users. Post-change: feature is uniform [0.0, 1.0]. Model split `if feature
    > 0.5` now randomly flags 50% of all users as ''premium'', effectively converting a high-signal feature
    into random noise and destroying the feature''s predictive weight.'
