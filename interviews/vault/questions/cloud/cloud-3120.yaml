title: Design Interleaved Pipeline Schedule for Reduced Bubble
scenario: A 48-layer transformer trains on 8 H100 GPUs with standard 1F1B achieving
  46.7% bubble ratio (m=8, p=8). You propose interleaved pipeline parallelism with
  v=2 virtual stages per GPU (each GPU handles 2 non-contiguous layer chunks of 3
  layers each). The interleaved bubble ratio formula is (p-1)/(mxv+p-1). Calculate
  the new bubble ratio and steady-state efficiency, and identify the additional communication
  cost from doubled pipeline boundaries.
question: With v=2 interleaving, what are the new bubble ratio, steady-state efficiency,
  and added communication cost?
details:
  realistic_solution: 'Standard 1F1B bubble: (8-1)/(8+8-1) = 7/15 = 46.7%. Interleaved
    with v=2: (8-1)/(8x2+8-1) = 7/23 = 30.4% — same as GPipe with m=16. Efficiency:
    69.6% vs 53.3%. Improvement: 16.3pp. Communication cost: standard 1F1B has 2x(p-1)=14
    activation transfers per pipeline pass. Interleaved v=2: 2x(v*p-1)=30 transfers.
    With NVLink 450 GB/s per direction between H100s and 2M activation elements at BF16 (4MB): each
    transfer = 4MB/450GB/s = 8.8μs. Extra latency: 16x8.8μs=140.8μs per step — negligible
    vs 16ms stage time (0.8% overhead).'
  common_mistake: Assuming interleaved scheduling reduces bubble to zero; it reduces
    bubble ratio by factor v but increases pipeline communication volume at stage boundaries.
  napkin_math: 'Interleaved bubble: (p-1)/(mv+p-1) = 7/23 = 30.4%. Standard: 7/15
    = 46.7%. Reduction: 16.3pp. Communication overhead: 16 extra transfers x 8.8μs
    = 141μs / 16,000μs stage = 0.8% overhead. Net gain: +16.3% efficiency - 0.8% comm
    = +15.5% throughput improvement.'
