title: Chiplet Architecture and Multi-Tenant Isolation
scenario: A cloud provider wants to offer 1/8 MI300X slices (one XCD per tenant) for smaller inference workloads.
question: "What architectural challenges arise from XCD-level multi-tenancy?"
details:
  realistic_solution: 'XCD isolation requires: (1) page table separation enforced by IOMMU per XCD, (2) bandwidth QoS on Infinity Fabric to prevent one tenant''s XCD from starving others, (3) HBM partition tables in MCDs to enforce memory isolation. AMD''s CDX (Compute Die eXtension) spec provides hardware isolation primitives but full tenant isolation requires hypervisor support that is not yet standardized in ROCm.'
  common_mistake: |
    **The Pitfall:** Assuming XCDs are fully independent and isolated like separate GPUs.
    **The Rationale:** Engineers mistakenly equate AMD's modular chiplets (XCDs) with distinct physical PCIe devices.
    **The Consequence:** Deployments suffer from severe side-channel vulnerabilities and performance interference because coherency fabrics and L3 caches are shared.
  napkin_math: |
    *   **Memory Isolation:** 8 tenants $\times$ 24 GB = 192 GB (straightforward).
    *   **Bandwidth Isolation:** 896 GB/s total fabric / 8 tenants = 112 GB/s guaranteed per tenant.
    *   **Snoop Overhead:** Cross-tenant coherency traffic can consume an additional 10-15% of bandwidth.
    *   **Result:** **Hardware enforces baseline isolation, but shared fabric snoops introduce performance jitter.**
