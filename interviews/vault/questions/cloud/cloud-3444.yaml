title: Designing a Multi-Tenant ML Platform with AMD MI300X
scenario: 'Your team is building a multi-tenant machine learning platform in the cloud. Each tenant requires access to high-performance GPU resources for training and inference. You have a cluster of AMD MI300X accelerators, each boasting 192 GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth.'
question: "How would you design MI300X resource management for multi-tenant ML with GPU partitioning, gang scheduling, preemption, and isolation?"
details:
  realistic_solution: 'A hierarchical scheduling approach would be effective. At the lowest level, implement a custom GPU partitioning mechanism leveraging AMD''s hardware features (e.g., defining virtual GPU instances or dedicated compute units within the MI300X, similar to how software/firmware could define virtual GPUs) to allow multiple tenants to share a single physical GPU with strong memory and compute isolation. Integrate this with a cluster scheduler (e.g., Kubernetes with custom device plugins or Slurm) that supports gang scheduling for distributed training jobs. Implement preemption policies based on job priority and resource utilization, ensuring graceful checkpointing/restoring for preempted jobs. Utilize cgroups-like mechanisms for resource limits and continuously monitor GPU metrics (utilization, memory consumption, HBM bandwidth) to dynamically adjust allocations and detect noisy neighbors, ensuring fair resource distribution.'
  common_mistake: |
    **The Pitfall:** Ignoring the specific hardware capabilities and limitations of the AMD MI300X.
    **The Rationale:** Candidates default to NVIDIA-specific tooling (like MIG) and fail to account for context switching overhead.
    **The Consequence:** Suboptimal partitioning strategies and 'noisy neighbor' issues leading to poor multi-tenant isolation.
  napkin_math: |
    1. Usable HBM3: 192 GB * 0.8 (20% system overhead) = 153.6 GB.
    2. Memory required per tenant pair: 48 GB + 96 GB = 144 GB.
    3. Number of pairs: 153.6 GB / 144 GB ≈ **1.06**.
    4. **Result:** Accommodating even one pair leaves little room, emphasizing the need for dynamic partitioning.
status: archived
deletion_reason: 'Generic LLM-template phrasing ("Your team is building...", "Design a robust...") and no concrete numerical bottleneck. The realistic_solution invents an MI300X partitioning capability (virtual GPU instances "similar to MIG") that is not a shipping AMD feature — propagating that misinformation is worse than archiving. Multi-tenant orchestration content is better covered by cloud-3449 (TPU v5e contention with concrete ICI numbers) and cloud-3448 (H100 MIG vs MPS), both rewritten in this pass.'
