title: 'Kernel Fusion: Optimize Fusion Strategy for Multi-Query Attention'
scenario: You are optimizing Multi-Query Attention (MQA) on H100 for a 13B LLM. MQA uses 1 KV head shared across 32 query heads, reducing KV cache by 32×.
question: How do fused and unfused MQA kernels differ in decode mode for the 13B LLM, and how much KV-cache bandwidth does MQA save?
details:
  realistic_solution: 'In decode mode, MQA loads 1 K head and 1 V head (vs 32 in MHA). This dramatically reduces KV cache reads. The fusion opportunity is different: fuse the query projection + attention score computation to avoid intermediate storage.'
  common_mistake: |
    **The Pitfall:** Applying the same memory bandwidth analysis as full multi-head attention.
    **The Rationale:** Candidates fail to account for the dramatically different KV cache access pattern in MQA.
    **The Consequence:** They over-optimize for kernel fusion on intermediate states when the main benefit is purely the structural KV bandwidth reduction.
  napkin_math: |
    1. Decode mode, batch=1, 1 new token, seq_len=2048.
    2. MHA KV bandwidth: 2 × 32 heads × 2048 × 128 dim × 2B = 33.6 MB.
    3. MQA KV bandwidth: 2 × 1 head × 2048 × 128 dim × 2B = 1.05 MB.
    4. Unfused MQA writes intermediate Q before attention (32 × 128 × 2B = 8 KB). Fusion saves 8 KB write + 8 KB read = 16 KB.
    5. **MQA fundamentally saves 32.5 MB of KV bandwidth per step, making the 16 KB fusion savings negligible in comparison.**
