title: Tensor Parallel Memory Split
scenario: A 96 GB model must run on GPUs with 40 GB HBM. Tensor parallelism splits weights evenly across N GPUs. Determine the minimum tensor-parallel degree for weights alone.
question: What tensor-parallel degree is needed to fit 96 GB of weights on 40 GB GPUs?
details:
  realistic_solution: Weights require at least ceil(96/40) = 3 GPUs, giving 32 GB of weights per GPU. In practice, consider extra degree or more GPUs for KV cache, activations, framework overhead, and topology/library preferences; power-of-two TP is a convenience in some stacks, not a universal rule.
  common_mistake: Sizing only to the exact weight split and forgetting runtime memory headroom.
  napkin_math: 96/40 = 2.4, so minimum N = 3 for weights alone.
