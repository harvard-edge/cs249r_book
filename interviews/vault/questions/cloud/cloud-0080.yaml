title: 'The 7B Model Memory Footprint: Model Serving Infrastructure'
scenario: You've been tasked with deploying a 7-billion parameter Large Language Model for a new RAG-based chatbot.
question: "What absolute minimum memory is required to load the 7B model weights for FP16 inference before orchestration or KV cache?"
details:
  realistic_solution: 'A 7-billion parameter model requires approximately 14 GB of memory for inference in FP16. Each parameter in FP16 (half-precision floating-point) format takes up 2 bytes of memory.'
  common_mistake: |
    **The Pitfall:** Confusing the memory requirements for training with those for inference.
    **The Rationale:** Engineers assume optimizer states and gradients are needed, or mix up FP16 (2 bytes) with INT8 (1 byte) or FP32 (4 bytes).
    **The Consequence:** Over-provisioning hardware or incorrectly sizing inference nodes.
  napkin_math: |
    1. **Assumptions & Constraints:** 7-billion parameter model, FP16 format (2 bytes per parameter).
    2. **Calculations:** 7,000,000,000 parameters x 2 bytes/parameter = 14,000,000,000 bytes = 14 GB.
    3. **Conclusion & Interpretation:** **Result: 14 GB.** This is the theoretical floor; extra VRAM is required for the KV cache in practice.
  options:
  - 112 GB
  - 7 GB
  - 14 GB
  - 28 GB
  correct_index: 2
