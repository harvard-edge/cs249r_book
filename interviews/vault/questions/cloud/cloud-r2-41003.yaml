title: Row-Parallel vs Column-Parallel Weight Splitting
scenario: Explain the difference between column-parallel and row-parallel linear layers in Megatron-LM.
  For a weight matrix W of shape [H_in, H_out] split across 4 GPUs, what does each GPU hold, and what
  collective is needed after each?
details:
  realistic_solution: 'Column-parallel: W is split along columns (output dimension). Each GPU holds W_i
    of shape [H_in, H_out/4]. Input x is replicated on all GPUs. Each GPU computes y_i = x @ W_i, producing
    shape [batch, H_out/4]. An AllGather concatenates these into the full [batch, H_out]. Row-parallel:
    W is split along rows (input dimension). Each GPU holds W_i of shape [H_in/4, H_out]. Input x must
    be split: each GPU gets x_i of shape [batch, H_in/4]. Each GPU computes y_i = x_i @ W_i, producing
    a partial sum of shape [batch, H_out]. An AllReduce sums these partials into the final result. Megatron
    pairs column→row to eliminate one collective: the column output is already naturally partitioned to
    serve as row input.'
  common_mistake: Mixing up which dimension is split. Column-parallel splits along H_out (each GPU gets
    full H_in but H_out/4). Row-parallel splits along H_in (each GPU gets H_in/4 but full H_out).
  napkin_math: 'For H_in=H_out=8192, TP=4: Column-parallel shards are [8192, 2048] (8192×2048 = 16.78M
    params). Row-parallel shards are [2048, 8192] (16.78M params). Both are 16.78M params × 2B = 33.6
    MB per GPU.'
