title: The Live Caption Deadline
scenario: 'You are designing a service that provides live audio transcriptions for video calls. The system has a hard real-time deadline: 99% of 10-second audio chunks must be transcribed and returned in under 500ms. Your model, running on a single H100, can process one 10s chunk in 250ms (service time). The service receives an average of 3 requests per second (arrival rate), following a Poisson process.'
question: What is the minimum number of H100 servers (c) needed to keep 99% of 10-second transcription chunks under 500ms at 3 RPS, based on M/M/c queuing?
details:
  realistic_solution: |
    This is a capacity planning problem that can be modeled with M/M/c queues. We need to find the number of servers 'c' that keeps the tail of the response time distribution within our SLA.

    1. **Define Rates:** Arrival Rate \u03bb = 3 req/s. Service Rate per server \u03bc = 1 / 0.250s = 4 req/s.

    2. **Analyze c=1 Server:** The load \u03c1 = \u03bb / \u03bc = 3/4 = 75%. For an M/M/1 queue, the average time a request spends in the system (wait + service) is W = 1 / (\u03bc - \u03bb) = 1 / (4-3) = 1 second (1000ms). Since the *average* response time already fails the 500ms P99 deadline, one server is not enough.

    3. **Analyze c=2 Servers:** The total system service rate is c\u03bc = 2 * 4 = 8 req/s. The load \u03c1 = \u03bb / (c\u03bc) = 3 / 8 = 0.375. At this much lower load, the probability of a request having to wait in the queue drops dramatically. The response time will be dominated by the 250ms service time, and the long tail of queuing delay will be short enough to meet the 500ms P99 SLA.
  common_mistake: |
    **The Pitfall:** Provisioning based solely on average utilization limits.
    **The Rationale:** Engineers see that 1 server handles 4 req/s and average load is 3 req/s (75%), assuming that leaves plenty of headroom.
    **The Consequence:** The unpredictable Poisson arrival of requests causes queues to build up rapidly, massively violating the P99 latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (\u03bb): 3 req/s.
    - Service Time: 250ms.
    - Service Rate per Server (\u03bc): 1 / 0.250s = 4 req/s.

    **Calculations:**
    - c=1 Server Load (\u03c1): 3 / 4 = 75%.
    - c=1 Average Wait (M/M/1): 1 / (\u03bc - \u03bb) = 1 / (4 - 3) = 1.0 second (1000ms). This already fails the 500ms average, let alone P99.
    - c=2 Servers Load (\u03c1): 3 / (2 * 4) = 3 / 8 = 37.5%.

    **Conclusion & Interpretation:**
    - **Result: c=2 (Latency-Bound)**. At c=2, the massive reduction in queue probability allows the service to easily hit the 500ms P99 deadline.
