title: Diagnosing Single-Threaded Consumer Lag in Kafka
scenario: A real-time fraud detection pipeline ingests 100,000 events/sec from Kafka. Events are JSON-encoded,
  averaging 1KB each. The ingestion service runs on `c6i.4xlarge` (16 vCPU, 32GB RAM) instances. During
  peak bursts, consumer lag spikes drastically, and p99 ingestion latency jumps from 50ms to over 2 seconds,
  triggering backpressure. System metrics show one CPU core pegged at 100% while the remaining 15 are
  nearly idle. Network I/O is steady at ~100 MB/s. Diagnose the root cause of this ingestion bottleneck.
question: "What is the root cause of the ingestion bottleneck when one CPU core is pegged and the other 15 are idle?"
details:
  realistic_solution: The root cause is a single-threaded consumer loop bottlenecked by CPU-intensive
    JSON deserialization. The solution is to decouple the Kafka network polling thread from the processing
    logic using a worker thread pool, distributing the deserialization across all 16 vCPUs, and ideally
    migrating from JSON to a faster binary format like Protobuf.
  common_mistake: Assuming network bandwidth is saturated by the event volume, or blindly scaling horizontally
    by adding more instances instead of fixing the application's concurrency model.
  napkin_math: 'Network: 100,000 msgs/s * 1 KB = 100 MB/s (easily handled by 12.5 Gbps instance limits).
    CPU cost: Deserializing a 1KB JSON payload typically takes ~10µs. 100,000 msgs * 10µs = 1,000,000µs
    = 1.0 CPU seconds. A single thread reaches exactly 100% utilization just parsing the data, causing
    immediate backpressure.'
