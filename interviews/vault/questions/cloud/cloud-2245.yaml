title: Bootstrapping a Quality Classifier for Trillion-Token Corpora
scenario: You are filtering a 15 trillion token raw crawl to build a 3 trillion token LLM corpus. You plan to train a FastText classifier using 'Wikipedia + curated books' as positive and 'random web' as negative. A senior researcher warns of systematic bias.
question: What is the bias, and how do you build a more robust quality scoring pipeline at this scale?
details:
  realistic_solution: 'The bias is domain-quality conflation. The classifier favors encyclopedic style, destroying high-quality diverse domains (forums, fiction). Use multi-signal scoring (heuristics + smaller LLM perplexity), stratified sampling, and enforce domain diversity constraints.'
  common_mistake: |
    **The Pitfall:** Treating Wikipedia style as the absolute ground truth for "quality."
    **The Rationale:** Engineers confuse formal, citation-heavy encyclopedic domain style with universal text quality.
    **The Consequence:** Systematically filtering out high-quality conversational, scientific, or literary text, crippling the model's domain coverage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 15T tokens = ~60 TB raw data.
       - Pre-training run on 2,000 GPUs costs ~$2M.
    2. **Calculations:**
       - FastText filter is cheap (~5 mins on cluster).
       - A biased 2% model degradation ruins the $2M compute investment.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Quality Bound (Bias costs orders of magnitude more than fast filtering saves).**
  options:
  - 'The bias is over-sampling short documents. Chunk into 512-token segments.'
  - 'The bias is language imbalance. Translate all data to English before filtering.'
  - 'The bias favors massive SEO spam. Enforce strict maximum length thresholds.'
  - 'The bias is domain-quality conflation. Use multi-signal heuristics and stratified sampling.'
  correct_index: 3
