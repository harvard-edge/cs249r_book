title: Optimizing Data Loading for Large-Scale A100 Training
scenario: 'You manage a critical training workload on a GPU cluster. The training data consists of high-resolution images stored as uncompressed TFRecord files in an S3 bucket. You observe significant GPU underutilization (low SM occupancy) and identify data loading from S3 as the primary bottleneck.'
question: "How would you fix the S3 TFRecord data-loading bottleneck that is starving the training cluster?"
details:
  realistic_solution: 'Transitioning from uncompressed TFRecord to a more columnar, compressed format like Parquet (or optimized TFRecord with appropriate compression like `ZLIB` or `GZIP` at record level, or `LZ4`/`Snappy` at block level) stored in an S3-compatible object storage optimized for large reads. Utilize a multi-threaded or multi-process data loader (e.g., `tf.data` API with `interleave` and `prefetch`) to parallelize data fetching and preprocessing. For image data, storing raw bytes within Parquet/TFRecord or using a format like WebP/JPEG2000 for compression before embedding. Leveraging a caching layer (e.g., local NVMe SSDs on compute instances, or an S3-accelerated file system) could also significantly reduce latency for frequently accessed data.'
  common_mistake: |
    **The Pitfall:** Assuming TFRecord is always optimal or failing to consider I/O patterns and compression.
    **The Rationale:** Overlooking the high memory bandwidth (2.0 TB/s) of the GPU, which rapidly outpaces network storage throughput.
    **The Consequence:** The GPU sits idle waiting for network reads, wasting expensive compute resources.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network download speed = 100 MB/s.
       - GPU Memory Bandwidth = 2.0 TB/s.
    2. **Calculations:**
       - 1 GB batch load time = 1000 MB / 100 MB/s = 10 seconds.
       - GPU process time = 1 GB / 2000 GB/s = 0.5 ms.
       - GPU Idle Time = 10s / (10s + 0.0005s) ≈ 99.99%.
    3. **Conclusion & Interpretation:**
       - **Result: 99.99% GPU idle time waiting for network (I/O-Bound).**
