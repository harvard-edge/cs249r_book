title: Diagnosing Workload Bottlenecks on NVIDIA H100 with Roofline Analysis
scenario: You are tasked with optimizing a large language model (LLM) inference workload on a single NVIDIA
  H100 GPU. The model uses FP16 precision. Initial profiling shows that despite the H100's peak FP16 dense
  compute of 989 TFLOPS and 3.35 TB/s of HBM3 bandwidth (80 GB HBM3 memory), your application is only
  achieving 50 TFLOPS. Describe how you would use the Roofline Model to analyze if this workload is compute-bound
  or memory-bound. Provide a specific example of an operation (e.g., matrix multiplication, element-wise
  addition) that would be memory-bound and another that would be compute-bound given the H100's specifications.
question: "How would you use a roofline model on the H100 to diagnose the 50 TFLOPS FP16 workload and give memory-bound and compute-bound examples?"
details:
  realistic_solution: "1.  **Characterize Workload Operational Intensity (OI)**: For the critical kernels\
    \ of the LLM inference, calculate the ratio of floating-point operations (FLOPS) to the bytes transferred\
    \ from/to global memory (HBM3). This is typically expressed as FLOPS/byte. Tools like NVIDIA Nsight\
    \ Compute can help gather these metrics. \n2.  **Construct H100 Roofline Model**: Using the H100's\
    \ peak FP16 dense compute (989 TFLOPS) and peak HBM3 bandwidth (3.35 TB/s), plot the Roofline chart.\
    \ The 'roof' has two segments: the memory-bound region (performance limited by bandwidth: Bandwidth\
    \ * OI) and the compute-bound region (performance limited by TFLOPS: Peak TFLOPS). \n3.  **Plot Workload\
    \ on Roofline Chart**: Place the measured OI and observed performance (50 TFLOPS) onto the Roofline\
    \ graph. \n4.  **Diagnose Bottleneck**: \n    *   If the workload's performance point falls on or\
    \ near the memory bandwidth ceiling, it is memory-bound. Optimization efforts should focus on reducing\
    \ data movement, increasing data reuse (e.g., tiling, caching), or using lower precision data types\
    \ if feasible. \n    *   If it falls on or near the compute ceiling, it is compute-bound. Focus on\
    \ maximizing arithmetic intensity, using Tensor Cores effectively, improving instruction-level parallelism,\
    \ or finding algorithmic optimizations. \n    *   If it falls significantly below both ceilings, there\
    \ are likely other inefficiencies (e.g., poor kernel launch configuration, low occupancy, synchronization\
    \ overheads, non-optimal kernel implementations)."
  common_mistake: A common mistake is to exclusively focus on optimizing compute kernels or improving
    parallelism without first quantifying the operational intensity of the workload. This can lead to
    efforts wasted on compute-bound optimizations for a memory-bound problem, or vice-versa, on a high-performance
    accelerator like the H100.
  napkin_math: "Let's illustrate with two common operations on the H100:\n\n**1. Memory-Bound Example:\
    \ Vector Addition (`C = A + B`)**\nAssume N elements, FP16 precision (2 bytes/element).\n*   **FLOPS**:\
    \ N additions.\n*   **Data Movement**: 3 * N * 2 bytes (A read, B read, C written).\n*   **Operational\
    \ Intensity (OI)** = N FLOPS / (6 * N bytes) = 1/6 FLOPS/byte ≈ 0.167 FLOPS/byte.\n*   **Memory-Bound\
    \ Performance**: Peak Bandwidth * OI = (3.35 * 10^12 bytes/s) * (1/6 FLOPS/byte) ≈ 0.558 * 10^12 FLOPS\
    \ = 0.558 TFLOPS.\nSince 0.558 TFLOPS is significantly less than the H100's peak FP16 compute (989\
    \ TFLOPS), a simple vector addition is highly memory-bound on the H100.\n\n**2. Compute-Bound Example:\
    \ Dense Matrix Multiplication (`C = A * B`)**\nAssume `M=K=N=1024`, FP16 precision. \n*   **FLOPS**:\
    \ `2 * M * K * N` (roughly) = `2 * 1024^3` ≈ `2.147 * 10^9` FLOPS.\n*   **Data Movement**: Assuming\
    \ A, B, C are read/written once from HBM: `(M*K + K*N + M*N) * 2 bytes` = `(3 * 1024^2) * 2` ≈ `6.29\
    \ * 10^6` bytes.\n*   **Operational Intensity (OI)** = `(2.147 * 10^9 FLOPS) / (6.29 * 10^6 bytes)`\
    \ ≈ `341 FLOPS/byte`.\n*   **Memory-Bound Performance**: Peak Bandwidth * OI = (3.35 * 10^12 bytes/s)\
    \ * (341 FLOPS/byte) ≈ `1142 * 10^12` FLOPS = `1142 TFLOPS`.\nSince the memory-bound performance (1142\
    \ TFLOPS) is much higher than the H100's peak FP16 compute (989 TFLOPS), this dense matrix multiplication\
    \ is compute-bound, meaning its performance will be limited by the GPU's processing power rather than\
    \ memory bandwidth."
