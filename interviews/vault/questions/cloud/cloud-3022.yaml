title: 'MLOps Lifecycle: Compare Blue-Green vs. Rolling Deployment for LLM API on H100'
scenario: A team deploys a 13B model on 16 H100 GPUs using spot instances. They need to calculate the extra cost of an on-demand fallback if spot instances are interrupted. The on-demand instances carry a $3/hr premium over spot prices.
question: What is the correct extra cost of an on-demand fallback for the 16-GPU deployment for a one-hour interruption?
details:
  realistic_solution: 'Spot interruption recovery cost depends on replacement duration and price differential. 16 GPUs \times $3/hr premium \times 1hr = $48 extra cost.'
  common_mistake: |
    **The Pitfall:** Calculating $96 as the extra cost.
    **The Rationale:** Candidates often double the duration or the premium, or confuse the cost of maintaining a full parallel blue-green fleet with the single-fleet fallback premium.
    **The Consequence:** Overestimating the cost of on-demand fallbacks, potentially leading to incorrect infrastructure architectural choices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet Size: 16 H100 GPUs.
    - Pricing: On-Demand premium is $3/hr extra over spot price per GPU.
    - Interruption duration: 1 hour.

    **Calculations:**
    - Extra cost calculation: 16 GPUs * $3/hr premium * 1 hour.

    **Conclusion & Interpretation:**
    - **Result: $48 Extra Cost (Financial).** The fallback premium for the interruption is $48.
