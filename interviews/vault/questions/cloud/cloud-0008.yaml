title: The Speed of Light Constraint in RAG
scenario: You're designing a RAG system. The core LLM is in Virginia, but the vector database for European users is in Ireland. You must consider the physics-imposed round-trip time (RTT) across the Atlantic.
question: Ignoring compute, disk I/O, and queuing, what is the approximate minimum RTT for a single retrieval across the Atlantic?
details:
  realistic_solution: The absolute minimum round-trip latency is dictated by the speed of light through fiber optic cables. A trip across the US is roughly 40ms, and across the Atlantic is similar or slightly longer. The closest order-of-magnitude answer is ~40ms. This is a hard physical floor on performance for any synchronous, cross-continental operation.
  common_mistake: |
    **The Pitfall:** Drastically underestimating the non-optimizable delay imposed by the speed of light in fiber.
    **The Rationale:** Engineers often confuse inter-rack latency (microseconds) with cross-continental latency.
    **The Consequence:** Designing synchronous, cross-continental architectures that unavoidably fail latency SLAs.
  napkin_math: |
    - A cross-country or trans-Atlantic fiber round trip is roughly 40 milliseconds.
    - 40 ms = 40,000,000 ns.
    - **This ~40ms represents a hard physical floor on performance for cross-continental operations.**
  options:
  - ~5 µs
  - ~1 ms
  - ~40 ms
  - ~500 ms
  correct_index: 2
