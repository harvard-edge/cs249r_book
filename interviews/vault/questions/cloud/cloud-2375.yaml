title: 3D Torus Bisection Bandwidth Limitation
scenario: A legacy supercomputer uses a 3D Torus topology interconnecting 4,096 GPUs (16x16x16 grid).
  Each link is 200 Gbps. You are porting a modern 175B LLM training workload that uses heavily optimized
  Ring All-Reduce spanning all 4,096 GPUs. Evaluate the tradeoff of running this workload on the 3D Torus
  compared to migrating to a Non-Blocking Fat-Tree cluster, focusing specifically on bisection bandwidth
  and routing constraints.
details:
  realistic_solution: "A 3D Torus connects each node to 6 neighbors (X, Y, Z dimensions). It is highly\
    \ cost-effective for workloads with nearest-neighbor communication (like traditional fluid dynamics).\
    \ \n\nHowever, ML training with large models relies on All-Reduce. While a single large ring can theoretically\
    \ be embedded in a Torus, a 4,096-hop ring has massive latency accumulation (4096 * ~1us = ~4ms per\
    \ step), severely degrading performance. To mitigate this, ML workloads use Hierarchical All-Reduce\
    \ or 2D/3D Torus-optimized All-Reduce (reduce-scatter along X, then Y, then Z). \n\nThe critical limitation\
    \ is bisection bandwidth. In a 16x16x16 Torus, cutting the network in half slices through 2 * 16 *\
    \ 16 = 512 links. At 200 Gbps each, the bisection bandwidth is 102 Tbps. In contrast, a fully non-blocking\
    \ Fat-Tree with 4096 nodes at 200 Gbps has a bisection bandwidth of 409 Tbps (4096 * 200 / 2). \n\n\
    The Tradeoff: The Torus saves massive capital cost (no expensive core switches, mostly short copper\
    \ cables between neighbors). However, the Fat-Tree provides 4x the bisection bandwidth and uniform\
    \ latency between any two nodes. For data-parallel ML training that generates global, uniformly distributed\
    \ traffic, the Torus will heavily bottleneck the inter-dimensional reduction phases, extending training\
    \ time significantly compared to the Fat-Tree."
  common_mistake: Assuming Ring All-Reduce works perfectly on a Torus because rings map naturally to a
    Torus, forgetting that a single massive 4096-node ring has unacceptable latency, and hierarchical
    rings are bottlenecked by the Torus's low bisection bandwidth.
  napkin_math: 'Torus Bisection: Surface area of the cut = 2 planes * 16 * 16 = 512 links. 512 * 200 Gbps
    = 102.4 Tbps. Fat-Tree Bisection: 4096 nodes / 2 * 200 Gbps = 409.6 Tbps. The Fat-Tree offers exactly
    4x the cross-sectional bandwidth.'
