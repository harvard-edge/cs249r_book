title: Fairness Penalty Training Slowdown
scenario: A ranking model trains in 20 hours on 128 GPUs. Adding a fairness regularizer requires computing subgroup losses over 12 slices and increases dataloader CPU time from 8 ms to 70 ms per step. GPU compute remains 110 ms per step. Diagnose whether the slowdown is a GPU or input-pipeline problem.
question: Is a fairness-regularized training slowdown caused by GPU compute or by subgroup dataloader work when CPU time rises from 8 ms to 70 ms per step?
details:
  realistic_solution: The primary new bottleneck is input-pipeline or CPU-side subgroup computation. GPU compute remains 110 ms, but CPU prep rises to 70 ms and may stop overlapping fully with GPU work. If 30 ms of that CPU work becomes exposed on the critical path, step time rises from about 110 ms to 140 ms, turning a 20-hour run into roughly 25.5 hours. The fairness motivation is real, but the diagnosed wall is the data pipeline.
  common_mistake: Assuming fairness regularization always slows training through GPU math, not through subgroup construction and dataloader work.
  napkin_math: Baseline critical path ≈ 110 ms if 8 ms CPU work is hidden under GPU compute. If 30 ms of the new 70 ms CPU work is exposed, step time ≈ 140 ms. Runtime multiplier = 140/110 = 1.27, so 20 hours becomes about 25.5 hours.
