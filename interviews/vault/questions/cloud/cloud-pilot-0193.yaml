title: Fairness Penalty Training Slowdown
scenario: A ranking model trains in 20 hours on 128 GPUs. Adding a fairness regularizer requires computing subgroup losses over 12 slices and increases dataloader CPU time from 8 ms to 70 ms per step. GPU compute remains 110 ms per step. Diagnose whether the slowdown is a GPU or input-pipeline problem.
question: Is a fairness-regularized training slowdown caused by GPU compute or by subgroup dataloader work when CPU time rises from 8 ms to 70 ms per step?
details:
  realistic_solution: The primary new bottleneck is input-pipeline or CPU-side subgroup computation. GPU compute remains 110 ms, but CPU prep rises to 70 ms and may stop overlapping fully with GPU work. If the pipeline previously hid 8 ms but cannot hide 70 ms, step time increases even without new GPU kernels dominating.
  common_mistake: Assuming fairness regularization always slows training through GPU math, not through subgroup construction and dataloader work.
  napkin_math: If 70 ms CPU work cannot overlap with 110 ms GPU compute, exposed CPU time can add up to 70 ms. Even partial exposure, such as 30 ms, turns 20 hours into about 25.5 hours.
