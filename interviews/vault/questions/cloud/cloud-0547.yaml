title: The Speculative Backfire
scenario: Your team is tasked with reducing inference latency for a 70B parameter LLM hosted on H100s.
  You implement speculative decoding using a much smaller, co-hosted 1.3B 'draft' model, with a speculation
  length of k=4. During testing on a standard summarization benchmark, the system is a huge success, reducing
  time-per-token by nearly 4x. The feature is shipped. A week later, P99 latency alerts start firing.
  You find that for a subset of traffic — complex, multi-turn code generation — the effective time-per-token
  has actually *increased* by over 10% compared to the baseline without speculation. Assess your team's
  rollout strategy and justify why this performance degradation is happening for this specific traffic
  pattern.
details:
  realistic_solution: The optimization backfired due to a catastrophic drop in the draft acceptance rate.
    The testing strategy was flawed because it only used a benchmark (summarization) where the draft model's
    predictions aligned well with the large model's. For complex code generation, the 1.3B model is a
    poor proxy for the 70B model; its drafted tokens are almost always wrong.
  common_mistake: Blaming secondary overheads like the network call between the models or the cost of
    the verification step. While these exist, they are microseconds of overhead. The catastrophic failure
    is due to a fundamental breakdown in the speculative process itself, which costs tens ofmilliseconds
    per step.
  napkin_math: 'Draft 4 tokens with 1.3B model (2.6GB weights): 4 * (2.6GB / 3.35TB/s) = 3.1ms. Verifying
    4 tokens on 70B model (140GB weights across 2 H100s): 140GB / (2 * 3.35TB/s) = 20.9ms. Total spec
    step = 24ms. Standard 1 token gen = 20.9ms. If acceptance rate is low, 24ms > 20.9ms, inherently increasing
    latency rather than reducing it.'
