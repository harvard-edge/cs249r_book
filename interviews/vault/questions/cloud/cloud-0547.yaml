title: The Speculative Backfire
scenario: "You implement speculative decoding for a 70B parameter LLM on H100s using a co-hosted 1.3B 'draft' model (k=4). During testing on a standard summarization benchmark, time-per-token is reduced by nearly 4x. However, in production, for complex multi-turn code generation, the effective time-per-token increases by over 10% compared to the baseline without speculation."
question: "What was wrong with the speculative decoding rollout, and why does multi-turn code generation see worse time-per-token?"
details:
  realistic_solution: The optimization backfired due to a catastrophic drop in the draft acceptance rate. The testing strategy was flawed because it only used a benchmark (summarization) where the draft model's predictions aligned well with the large model's. For complex code generation, the 1.3B model is a poor proxy for the 70B model; its drafted tokens are almost always wrong.
  common_mistake: |
    **The Pitfall:** Blaming secondary overheads like network calls or verification step latency for the performance degradation.
    **The Rationale:** Candidates assume the underlying speculation math is sound and focus on micro-optimizations, missing the fundamental breakdown in draft acceptance.
    **The Consequence:** Engineering effort is wasted optimizing fast paths while the system continues to process computationally expensive mispredictions.
  napkin_math: |
    - **Calculate draft latency:** Drafting 4 tokens with 1.3B model (2.6GB weights): 4 * (2.6GB / 3.35TB/s) = 3.1ms.
    - **Calculate verification latency:** Verifying 4 tokens on 70B model (140GB weights across 2 H100s): 140GB / (2 * 3.35TB/s) = 20.9ms.
    - **Calculate total speculation step:** 3.1ms + 20.9ms = 24ms.
    - **Compare to baseline:** Standard 1 token generation takes 20.9ms. If the draft tokens are rejected, a 24ms step yields only 1 token (or 0), meaning **24ms > 20.9ms**, fundamentally increasing latency.
