title: Evaluating Free Cooling Feasibility for H100 Liquid-Cooled Deployments
scenario: A facilities team evaluates whether they can use free cooling (dry coolers with no mechanical
  refrigeration) for a DLC-equipped H100 cluster in Austin, Texas. H100 DLC cold plates require water
  supply at ≤45°C inlet temperature. Austin's wet-bulb temperature exceeds 25°C for ~1,200 hours per year.
  Evaluate the viability and quantify the free cooling hours achievable.
question: "Is year-round free cooling viable for a DLC-equipped H100 cluster in Austin with ≤45°C inlet water, and how many hours need mechanical assist?"
details:
  realistic_solution: 'Dry cooler outlet temperature ≈ wet-bulb temperature + 5–8°C approach temperature.
    For a 45°C supply temperature limit: max allowable wet-bulb = 45 − 7 = 38°C. Austin''s maximum wet-bulb
    is ~26°C in peak summer, well below 38°C. However, evaluation must use 99th percentile wet-bulb to
    ensure reliability. ASHRAE data for Austin: 1% wet-bulb design = 24.6°C, giving cooler outlet = 24.6
    + 7 = 31.6°C — acceptable. Full free cooling is viable year-round in Austin for 45°C supply. Hours
    where mechanical assist needed: <50 hr/yr at extreme peaks. This enables PUE ≈ 1.1–1.15 vs. 1.3–1.4
    for compressor-based chilled water.'
  common_mistake: Using dry-bulb ambient temperature for free cooling feasibility analysis; cooling tower
    and dry cooler performance is governed by wet-bulb temperature, which in humid climates like Austin
    is much closer to the 45°C limit than dry-bulb suggests.
  napkin_math: 'Austin climate: ~7,500/8,760 hours with wet-bulb < 22°C → free cooling outlet ≤ 29°C,
    well within 45°C limit. Mechanical cooling hours: ~50 hr/yr worst case. Dry cooler fan power at 358.4
    kW load: ~18 kW fan + 5 kW pump = 23 kW overhead. PUE contribution: 23/358.4 = 0.064 → PUE = 1.064
    for cooling system alone. Total facility PUE ≈ 1.064 + 0.05 (PDU losses) + 0.03 (lighting/misc) =
    ~1.14. Mechanical chiller adds 35–60 kW when needed: max PUE = 1.17 for 50 peak hours.'
