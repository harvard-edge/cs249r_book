title: H100 Multimodal Pipeline Pre-fetching
scenario: An 8x H100 SXM cluster trains a multimodal MoE model. The H100s ingest uncompressed
  4K video batches. Each GPU has 3.35 TB/s HBM bandwidth but shares a PCIe Gen5 x16
  (64 GB/s) host connection.
question: Design a data loading and staging pipeline to prevent the 989 TFLOP/s compute
  units from starving while handling the heavy video IO footprint.
details:
  realistic_solution: The design must decouple host decoding from GPU memory ingress.
    It requires a dedicated host process using NVDEC on the GPU to decode compressed
    video streams directly in VRAM, bypassing the uncompressed PCIe bottleneck. A
    double-buffered pre-fetching queue inside the HBM ensures that while step N is
    executing using the 3.35 TB/s bandwidth, step N+1 is trickling in over the 64
    GB/s PCIe bus and being hardware-decoded.
  common_mistake: Designing a pipeline that decodes uncompressed video on the CPU
    and sends it over PCIe, immediately saturating the 64 GB/s link.
  napkin_math: 8 GPUs * 64 GB/s = 512 GB/s limit, far below HBM speeds.
