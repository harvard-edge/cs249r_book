title: H100 Multimodal Pipeline Pre-fetching
scenario: An 8x GPU cluster trains a multimodal MoE model. The GPUs ingest uncompressed 4K video batches. Each GPU shares a host PCIe Gen5 x16 connection.
question: How do you design a data loading and staging pipeline to prevent the compute units from starving while handling massive video IO?
details:
  realistic_solution: The design must decouple host decoding from GPU memory ingress. It requires a dedicated host process using NVDEC on the GPU to decode compressed video streams directly in VRAM, bypassing the uncompressed PCIe bottleneck. A double-buffered pre-fetching queue inside the HBM ensures that while step N is executing using the 3.35 TB/s bandwidth, step N+1 is trickling in over the 64 GB/s PCIe bus and being hardware-decoded.
  common_mistake: |
    **The Pitfall:** Designing a pipeline that decodes uncompressed video on the CPU and sends it over PCIe.
    **The Rationale:** Candidates follow standard image-training paradigms (CPU decoding) and fail to realize raw 4K video bandwidth vastly exceeds PCIe Gen5 limits.
    **The Consequence:** The PCIe bus instantly saturates, starving the GPUs and dropping cluster utilization to near zero.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Host-to-GPU bandwidth: 64 GB/s (PCIe limit).
       - GPU internal HBM bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - Uncompressed 4K video streams instantly saturate the 64 GB/s PCIe ceiling.
       - HBM (3.35 TB/s) has 50x more bandwidth than PCIe.
    3. **Conclusion & Interpretation:**
       - **Result: PCIe Bandwidth-Bound.** The 64 GB/s PCIe bus is the bottleneck and must be bypassed via on-GPU hardware decoding.
