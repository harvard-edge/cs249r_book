title: The GPU Utilization Paradox
scenario: Your team rents 64 A100 GPUs to train a large vision model for a month. The cloud bill is ~$92,000, but average GPU compute utilization was only 23%. The team swears the training loop code is perfectly optimized.
question: Where did 77% of your GPU-hours go, and what is the root cause?
details:
  realistic_solution: 'The GPU is idle because the *surrounding infrastructure* can''t feed it fast enough. In production ML systems, the model code is roughly 5% of the system (per Google''s "Hidden Technical Debt" paper). The other 95% — data ingestion, preprocessing, feature extraction, checkpointing, logging, and gradient synchronization — creates the actual bottleneck. Common culprits: CPU-bound image decoding (8 CPU cores can''t decode fast enough for 8 GPUs), slow NFS reads during shuffling, synchronous checkpointing that stalls all GPUs every N steps, and Python GIL contention in the data loader.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck must be inside the model architecture or that the batch size needs increasing.
    **The Rationale:** ML engineers focus entirely on the neural network code, ignoring that data ingestion, decoding, and preprocessing (the "other 95%" of the system) often fail to keep up with raw GPU FLOPs.
    **The Consequence:** Tens of thousands of dollars are burned on idle GPU time while waiting for CPU-bound data pipelines to deliver batches.
  napkin_math: |
    * **Financial Waste:** 64 GPUs × 720h × $2/hr = $92,160. At 23% use, $70,963 is wasted on idle silicon.
    * **Data Requirements:** Batch=64 takes ~200ms per step. GPUs need 320 images/s/GPU. 64 GPUs need 20,480 images/s.
    * **CPU Bottleneck:** If standard CPU JPEG decode tops out at 5,000 images/s, GPUs only receive 5,000 / 20,480 = 24.4% of needed data.
    * **Conclusion:** The GPUs are starved by a **CPU-bound data ingestion pipeline**, causing the exact ~23% utilization observed.
