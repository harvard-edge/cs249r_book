title: LSTM Sequential Latency Bound on A100 GPUs
scenario: You are optimizing an LSTM-based sequence-to-sequence model for real-time translation on an
  NVIDIA A100 GPU. The model uses a hidden size of 2048 and processes sequences of length 512. Profiling
  shows that a single LSTM cell state update (dominated by a 2048x2048 matrix multiplication) takes 5
  microseconds on the A100. A junior engineer suggests increasing the batch size to 256 to fully saturate
  the GPU's tensor cores and drastically reduce the end-to-end latency of processing a 512-token sequence.
  Calculate the theoretical minimum latency for a single sequence and evaluate the engineer's claim.
details:
  realistic_solution: Batching increases throughput but cannot bypass the sequential dependency constraint
    where the hidden state h_t relies on h_{t-1}. The minimum latency is strictly bounded by the number
    of time steps multiplied by the computation time of a single step.
  common_mistake: Assuming that massive parallel compute capacity or increased batch size can parallelize
    operations across the time dimension of an LSTM, thereby reducing end-to-end sequence latency.
  napkin_math: Time per step = 5 µs. Sequence length (N) = 512. Minimum sequence latency = N * 5 µs =
    512 * 5 µs = 2560 µs = 2.56 ms. Batching to 256 improves overall sequences/sec (throughput) but the
    latency for processing any individual 512-token sequence remains bounded at 2.56 ms. The engineer
    is incorrect.
