title: 'Model Size Estimation: Analyze Why 70B Model Needs 140GB but Only 80GB Fits in H100'
scenario: A new engineer asks why a 70B parameter model requires 140GB of GPU memory in FP16 but a single
  H100 has only 80GB HBM3. Explain the relationship between parameter count, precision, and memory, and
  explain what strategies enable inference of 70B models on hardware with less VRAM than the model size.
question: "For H100 tensor parallel inference, what NVLink bandwidth should you use when estimating all-reduce communication overhead?"
details:
  realistic_solution: H100 uses NVLink 4.0 at 900 GB/s total bidirectional. A100 uses NVLink 3.0 at 600
    GB/s. Always use 900 GB/s for H100 NVLink calculations.
  common_mistake: Assuming the model can simply be split evenly across GPUs without understanding that
    tensor parallelism requires all-reduce communication overhead, and pipeline parallelism introduces
    micro-batch latency.
  napkin_math: 'H100 NVLink 4.0: 900 GB/s bidirectional total across all NVLink connections (not 600 GB/s
    which is A100 NVLink 3.0). 8-way tensor parallel AllReduce: 2 × (8-1)/8 × data / 900 GB/s. For 1GB
    activation: 1.75 × 1GB / 900 GB/s = 1.94ms.'
