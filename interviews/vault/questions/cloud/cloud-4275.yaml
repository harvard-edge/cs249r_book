title: Cross-Die Prefetching for LLM Decode
scenario: LLM decode on MI300X is memory-bandwidth-limited. You want to hide Infinity Fabric latency for KV-cache access during autoregressive generation.
question: How would you prefetch remote-XCD KV-cache blocks to hide Infinity Fabric latency during MI300X autoregressive decode?
details:
  realistic_solution: 'Use speculative prefetch: during the compute phase of token T, launch async DMA transfers from remote XCDs for KV blocks of the top-K most likely next tokens (determined by logit distribution at T-1). With K=4 and speculation accuracy ~60%, ~60% of KV fetches arrive before decode begins. This overlaps 100ns Infinity Fabric latency with ~500µs compute for typical sequence lengths.'
  common_mistake: |
    **The Pitfall:** Using simple sequential prefetch for the next token's KV block.
    **The Rationale:** Sequential prefetch works well for contiguous memory access, but not for top-p sampling.
    **The Consequence:** Autoregressive decode has unpredictable next-token positions, making sequential prefetch highly ineffective and leaving the Infinity Fabric latency unhidden.
  napkin_math: |
    - **KV cache fetch latency:** Remote XCD 100ns + HBM access ~200ns = 300ns per KV block.
    - **Compute per token:** ~500µs for a 70B model on MI300X.
    - **Prefetch overlap window:** 500µs / 0.3µs = 1667 KV blocks can be prefetched during compute.
    - **Top-4 speculation cost:** 4 * 300ns = 1.2µs prefetch cost.
    - **Conclusion:** The 1.2µs cost is negligible compared to the **300ns * K miss penalty avoided** when speculation is correct.
