title: Cross-Die Prefetching for LLM Decode
scenario: LLM decode on MI300X is memory-bandwidth-limited. You want to hide Infinity Fabric latency for KV-cache access during autoregressive generation.
question: How would you prefetch remote-XCD KV-cache blocks to hide Infinity Fabric latency during MI300X autoregressive decode?
details:
  realistic_solution: Use speculative prefetch for the top-K most likely next tokens based on logit distributions. This effectively overlaps the fabric latency with compute.
  common_mistake: |
    **The Pitfall:** Using simple sequential prefetch.
    **The Rationale:** Assuming contiguous memory access patterns apply to top-p autoregressive sampling.
    **The Consequence:** High prefetch miss rates leaving the Infinity Fabric latency completely unhidden.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV fetch = 300ns. Compute = 500us. Top-4 spec cost = 1.2us.
    2. **Calculations:**
       - 500us compute window overlaps with 1667 KV blocks.
    3. **Conclusion & Interpretation:**
       - **Result: 1.2us prefetch cost easily avoids the 300ns miss penalty when correct.**
