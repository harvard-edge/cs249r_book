title: The CapEx Baseline
scenario: When planning a new large-scale training cluster, your first step is to estimate the capital expenditure (CapEx).
question: What is the approximate unit cost for a single NVIDIA H100 GPU, which forms the baseline for your Total Cost of Ownership (TCO) calculation?
details:
  realistic_solution: |
    The correct answer is ~$30,000. This is the foundational enterprise unit cost for datacenter GPUs like the H100. While prices fluctuate with volume commitments, utilizing ~$30,000 is architecturally standard for TCO amortization modeling.
  common_mistake: |
    **The Pitfall:** Anchoring on consumer-grade GPU prices (e.g., $2,000-$5,000) when estimating enterprise infrastructure costs.
    **The Rationale:** Engineers who mostly work locally or with gaming hardware often lack visibility into enterprise markups.
    **The Consequence:** The infrastructure budget is drastically underestimated, severely delaying or canceling planned training operations when real quotes arrive.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Enterprise Datacenter GPU: NVIDIA H100 (80GB).
       - Pricing model: Direct purchase CapEx (not cloud OpEx).
    2. **Calculations:**
       - Unit Cost per H100: ~$30,000.
       - HGX Baseboard (8 GPUs): 8 * $30,000 = $240,000 (excluding CPU/RAM/Network).
    3. **Conclusion & Interpretation:**
       - **Result: Budget-Bound.** Failing to anchor on the $30,000 enterprise unit cost leads to catastrophic under-budgeting, as an 8-GPU node approaches $300k fully loaded.
  options:
  - "~$3,000 (Assuming consumer-grade hardware pricing)"
  - "~$10,000 (Assuming previous generation A100 pricing)"
  - "~$30,000 (Accurate H100 enterprise baseline)"
  - "~$240,000 (Mistaking an 8-GPU HGX baseboard for a single GPU)"
  correct_index: 2
