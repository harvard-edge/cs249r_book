title: The CapEx Baseline
scenario: When planning a new large-scale training cluster, your first step is to estimate the capital expenditure (CapEx).
question: What is the approximate unit cost for a single NVIDIA H100 GPU, which forms the baseline for your Total Cost of Ownership (TCO) calculation?
details:
  realistic_solution: The correct answer is ~$30,000. This is the foundational unit cost for datacenter GPUs like the H100. While prices fluctuate with market conditions, this is the correct order of magnitude for budgeting and TCO analysis.
  common_mistake: |
    **The Pitfall:** Anchoring on consumer-grade GPU prices (e.g., $2,000-$5,000) when estimating enterprise infrastructure costs.
    
    **The Rationale:** Engineers who mostly work locally or with gaming hardware often lack visibility into enterprise markups.
    
    **The Consequence:** The infrastructure budget is drastically underestimated, severely delaying or canceling planned training operations when real quotes arrive.
  napkin_math: |
    - **H100 Unit Cost**: A single NVIDIA H100 80GB GPU generally costs between $25,000 and $30,000.
    - **HGX Baseboard**: For an 8-GPU node, the total CapEx is roughly 8 * $30,000 = **$240,000**.
    - **Result**: The $30k figure is the foundational multiplier for all modern AI cluster TCO calculations.
  options:
  - ~$3,000
  - ~$10,000
  - ~$30,000
  - ~$100,000
  correct_index: 2
