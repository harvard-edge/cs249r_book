title: The AI Analyst's Deadline
scenario: You are the Principal Engineer at a new FinTech startup building a unified 'AI Analyst' API. The API must serve two workloads with conflicting demands: real-time news summarization (strict 500ms latency deadline) and deep financial report generation (100k context, high throughput).
question: What are your first three scheduling and capacity decisions for serving real-time news and long report jobs simultaneously on a shared cluster without violating the 500ms deadline?
details:
  realistic_solution: 'The core of the problem is isolating the latency-sensitive workload from the throughput-oriented workload. Decisions: (1) Priority queuing with preemption: Implement a multi-level priority queue where real-time news requests preempt long-running report generation. (2) Dedicated capacity partitioning: Reserve a subset of GPUs exclusively for real-time requests to guarantee latency SLOs. (3) Request-aware continuous batching: Use a scheduling policy that limits the maximum prefill length admitted into a batch to cap the compute time per iteration.'
  common_mistake: |
    **The Pitfall:** Using a single, simple FIFO queue for all requests.
    **The Rationale:** Candidates prioritize simplicity but fail to realize that long-running reports will cause severe head-of-line blocking for real-time requests.
    **The Consequence:** Real-time requests frequently violate their 500ms latency deadline, rendering the system unusable for news workloads.
  napkin_math: |
    - **Real-Time Prefill:** For 500 tokens on a 70B model with TP=2 H100 (1978 TFLOPS peak). FLOPs = 2 × 70e9 × 500 = 70 TFLOPs. Time at 50% MFU = 70 / 989 ≈ 71 ms.
    - **Report Prefill:** For 100,000 tokens. FLOPs = 2 × 70e9 × 100,000 = 14,000 TFLOPs. Time at 50% MFU = 14,000 / 989 ≈ 14.2 seconds.
    - **Head-of-Line Blocking:** A single report prefill blocks the GPU for ~14.2 seconds. At 100 req/s, ~1,400 real-time requests queue up and miss their 500ms deadline.
    - **Real-Time Capacity:** 71 ms prefill + (200 tokens × 20.9 ms/token decode) = 4.25 seconds per request. Max throughput per TP=2 instance = 0.235 req/s.
    - **Result:** Serving 100 req/s requires **~425 TP=2 instances** dedicated strictly to the real-time tier.
