title: H100 UVM Graph Streaming
scenario: 'You are designing the memory layout for a massive graph neural network running on an H100 SXM. The node features fit in HBM3, but the adjacency matrix requires 500GB.'
question: Specify a hardware-aware memory strategy utilizing the memory hierarchy to train this model efficiently without running out of HBM.
details:
  realistic_solution: Pin the 500GB adjacency matrix in host DRAM and stream the required graph neighborhoods over the PCIe Gen5 bus to the HBM3 buffer using Unified Virtual Memory (UVM). Store the hot node features directly in HBM3 to maximize compute utilization.
  common_mistake: |
    **The Pitfall:** Trying to partition the graph across multiple GPUs.
    
    **The Rationale:** When faced with an out-of-memory error, engineers immediately reach for multi-GPU scaling without evaluating if host RAM streaming is sufficient and cheaper.
    
    **The Consequence:** Unnecessary multi-GPU communication overhead and significantly inflated hardware costs.
  napkin_math: |
    * **Adjacency Matrix Size:** 500 GB
    * **H100 HBM3 Capacity:** 80 GB
    * **Result:** **500 GB > 80 GB, strictly requiring host RAM streaming over PCIe via UVM.**
