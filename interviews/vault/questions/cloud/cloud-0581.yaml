title: 'The Blackwell Bet: A Datacenter Dilemma'
scenario: You are the Principal Engineer for Autonomous Vehicle Foundation Models
  at a major automaker. Your team is training a 200B parameter multi-modal 'World
  Model' on a large, current-generation H100 cluster. Training runs take 4 months,
  which is too slow to meet critical safety and feature velocity targets. The board
  has approved a massive budget to cut this training time in half.
question: How would you evaluate whether B200s or more H100 capacity can actually
  halve the 200B world-model training time?
details:
  realistic_solution: The correct approach is to first deeply characterize the *current*
    workload, then use that to model the two future scenarios.
  common_mistake: 'Focusing exclusively on the advertised peak TFLOPS of the new hardware.
    A common answer is: ''The B200 offers over 2x the peak FP16 TFLOPS of the H100,
    so it''s the obvious choice to meet our 2x speedup goal.'' This answer completely
    ignores whether the workload can actually leverage that compute. It fails to consider
    the system''s Arithmetic Intensity, the role of memory bandwidth, and the total
    cost of ownership (TCO) including power and datacenter footprint.'
  napkin_math: "1. **Define Roofline Constants:**\n   - **H100:** Peak FP16 = 989\
    \ TFLOPS, HBM BW = 3.35 TB/s, Ridge Point = 989 / 3.35 = **295 FLOP/Byte**, TDP\
    \ = 700W.\n   - **B200:** Peak FP16 = 2,250 TFLOPS, HBM BW = 8.0 TB/s, Ridge Point\
    \ = 2,250 / 8.0 = **281 FLOP/Byte**, TDP = 1,000W.\n2. **Characterize the Current\
    \ Workload's Arithmetic Intensity (AI):**\n   A 200B multi-modal World Model's\
    \ large matrix multiplications (GEMMs in attention and FFN layers) have high AI\
    \ (~200-500 FLOP/Byte), placing them near or above the ridge point — **compute-bound**.\
    \ However, embedding lookups, layer norms, and attention score computations have\
    \ low AI (~5-20 FLOP/Byte) — **memory-bound**.\n3. **Model the Speedup for Each\
    \ Regime:**\n   - **Compute-bound ops:** Speedup = B200 TFLOPS / H100 TFLOPS =\
    \ 2,250 / 989 = **2.27x**.\n   - **Memory-bound ops:** Speedup = B200 BW / H100\
    \ BW = 8.0 / 3.35 = **2.39x**.\n   - If the workload is 70% compute-bound and\
    \ 30% memory-bound: Effective speedup = 1 / (0.7/2.27 + 0.3/2.39) = **2.30x**.\n\
    4. **TCO Analysis (Power and Density):**\n   - H100 cluster (current): assume\
    \ 1,000 GPUs × 700W = 700 kW.\n   - B200 cluster for same throughput: ~440 GPUs\
    \ × 1,000W = 440 kW.\n   - B200 delivers 2.27x compute at 1.43x power per chip,\
    \ so TFLOPS/W improves by ~1.59x.\n   - Fewer GPUs also means fewer nodes, switches,\
    \ and cooling — ~30% reduction in datacenter footprint.\n5. **Final Recommendation:**\n\
    \   - The B200 can meet the 2x training time reduction goal (2.3x effective speedup\
    \ > 2x target).\n   - The power envelope is manageable (440 kW < 700 kW current\
    \ draw).\n   - But the real risk is software readiness: new CUDA kernels, updated\
    \ NCCL collectives, and compiler support for the new FP4/FP8 formats must be validated\
    \ on this specific workload before committing the budget."
