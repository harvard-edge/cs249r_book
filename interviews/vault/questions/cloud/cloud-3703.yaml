title: Memory-Bound vs Compute-Bound Classification for Attention
scenario: A team runs multi-head attention with sequence length 2048, 32 heads, head_dim=128 on an accelerator with 312 TFLOPS BF16 and 2 TB/s HBM bandwidth. The QK^T matmul produces a 2048x2048 attention matrix per head. The observed throughput is only 45 TFLOPS.
question: Is the 2048-token, 32-head QK^T attention operation compute- or memory-bound, and what should you use to improve it?
details:
  realistic_solution: The operation is heavily memory-bound. While the GEMM itself has high arithmetic intensity, materializing the full 2048x2048 attention matrix to HBM for all 32 heads dominates the runtime. The arithmetic intensity (114 FLOPs/byte) is below the hardware's ridge point (156 FLOPs/byte). To improve this, use FlashAttention to avoid materializing the attention matrix entirely, which dramatically boosts the arithmetic intensity and moves the operation into the compute-bound regime.
  common_mistake: |
    **The Pitfall:** Treating the full attention operation as one dense GEMM and ignoring HBM reads/writes.
    **The Rationale:** Candidates look at the matrix multiplication FLOPs and assume it must be compute-bound without accounting for the massive bandwidth cost of writing the QK^T matrix to memory before the softmax.
    **The Consequence:** Engineers fail to diagnose the root bottleneck and attempt to tune block sizes instead of applying FlashAttention.
  napkin_math: |
    1. **Ridge point:** 312 TFLOPS / 2 TB/s = 156 FLOPs/byte.
    2. **Q, K, V read sizes:** 2048 tokens * 128 dim * 2 bytes = 512 KB each.
    3. **Attention matrix write size:** 2048 * 2048 * 2 bytes = 8.39 MB.
    4. **Memory per head:** 512 KB + 512 KB + 8.39 MB = 9.41 MB.
    5. **Total Memory (32 heads):** 32 * 9.41 MB = 301.1 MB (or ~302 million bytes).
    6. **Total FLOPs:** 2 * 32 * 2048 * 2048 * 128 = 34.36 GFLOPs.
    7. **Arithmetic Intensity:** 34.36 GFLOPs / 301.1 MB = 114 FLOPs/byte.
    8. **Conclusion:** 114 < 156, so the operation is **memory-bound**.
