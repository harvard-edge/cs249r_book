title: Feature Store Backfill Strategy
scenario: You're adding a new feature 'user_lifetime_value' to the feature store. Training requires 2 years of historical values (point-in-time correct), but the feature pipeline only started computing this feature today. You have raw transaction logs going back 3 years in S3 (200 TB).
question: How do you backfill the feature store efficiently?
details:
  realistic_solution: 'Partition the backfill by time windows (e.g., daily or weekly chunks) and process them independently. Steps: (1) write the feature computation as a pure function of (entity_id, event_timestamp, raw_events) — ensuring determinism and point-in-time correctness; (2) partition the 200 TB log into daily slices (~275 GB/day); (3) run parallel Spark jobs, one per day, writing to a partitioned offline store (Delta Lake with event_time partition); (4) validate by spot-checking known entities against manual calculations; (5) register the feature with the feature store metadata, enabling point-in-time joins for training. Use spot instances for the backfill since it''s a one-time, fault-tolerant batch job.'
  common_mistake: |
    **The Pitfall:** Running the current feature pipeline code against 2 years of historical data in one massive batch job.
    **The Rationale:** Candidates treat backfilling as a simple loop over historical data, failing to anticipate memory exhaustion, idempotency issues, and spot-instance preemption.
    **The Consequence:** The massive job fails halfway through, costs thousands of dollars in wasted compute, and corrupts the offline store with partially complete, non-idempotent writes.
  napkin_math: |
    - **Data Partitioning:** 200 TB / 730 days = 275 GB/day.
    - **Spark Throughput:** ~100 GB/hr per 10-node spot cluster.
    - **Time per Daily Batch:** 275 GB / 100 GB/hr = 2.75 hours.
    - **Parallel Execution:** Running 30 clusters in parallel = 25 serial batches.
    - **Total Wall Time:** 2.75 hours × 25 batches = **~69 hours total execution**.
    - **Spot Compute Cost:** 30 clusters × 10 nodes × $0.30/hr × 2.75 hrs × 25 = **~$6,188**.
