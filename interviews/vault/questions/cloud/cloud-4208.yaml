title: Feature Store Backfill Strategy
scenario: You're adding a new feature 'user_lifetime_value' to the feature store. Training requires 2 years of historical values (point-in-time correct), but the feature pipeline only started computing this feature today. You have raw transaction logs going back 3 years in S3 (200 TB).
question: How do you backfill the feature store efficiently?
details:
  realistic_solution: |
    Partition the backfill by time windows (e.g., daily or weekly chunks) and process them independently using Delta Lake or Iceberg. 1) Write the feature computation as a pure deterministic function of (entity_id, event_timestamp, raw_events) to ensure point-in-time correctness. 2) Partition the 200 TB log into daily slices (~274 GB/day). 3) Run parallel Spark jobs on ephemeral spot clusters, writing to a partitioned offline store. 4) Register the feature with the feature store metadata (e.g., Feast), enabling point-in-time joins for training.
  common_mistake: |
    **The Pitfall:** Running the current feature pipeline code against 2 years of historical data in one massive batch job.
    **The Rationale:** Candidates treat backfilling as a simple for-loop over historical data, failing to anticipate memory exhaustion, idempotency issues, and spot-instance preemption.
    **The Consequence:** The massive job fails halfway through, costs thousands of dollars in wasted compute, and corrupts the offline store with partially complete, non-idempotent writes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Historical data volume: 200 TB over 2 years (730 days).
    - Spark throughput: ~100 GB/hr per 10-node spot cluster.
    - Cluster count: 30 parallel clusters.

    **Calculations:**
    - Daily Partition Size: 200 TB / 730 days = 274 GB/day.
    - Processing Time per Partition: 274 GB / 100 GB/hr = 2.74 hours.
    - Parallel Batches: 730 days / 30 clusters = 24.3 (25 serial batches).
    - Total Execution Time: 25 batches * 2.74 hours = 68.5 hours.
    - Compute Cost: 30 clusters * 10 nodes * $0.30/hr * 68.5 hours = ~$6,165.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound Distributed Batch.** The backfill will take ~69 hours of wall-clock time and cost ~$6,200 using spot instances, ensuring point-in-time correctness without OOMing a monolithic job.
