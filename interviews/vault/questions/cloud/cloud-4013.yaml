title: Switch Buffer Sizing for ML Incast
scenario: 'A ToR switch connects 8 A100 GPUs, each with a 200Gbps RDMA NIC. During AllReduce, all 8 GPUs may send to the same uplink port simultaneously. The switch has a single shared buffer pool.'
question: What minimum shared buffer is needed to absorb the 8-to-1 incast burst for one 4μs RTT without packet drops?
details:
  realistic_solution: 'Each A100 NIC sends at 200Gbps = 25 GB/s. With 8 senders targeting one 200Gbps uplink, the aggregate ingress is 8 x 25 = 200 GB/s, but the port can only drain at 25 GB/s. The excess rate is 175 GB/s. During one RTT (4μs), the buffer must absorb: 175 GB/s x 4μs = 700 KB. Adding 20% headroom for scheduling overhead: ~840 KB minimum. In practice, switches like the Broadcom Tomahawk have 64-132MB of shared buffer, which is sufficient, but the buffer must be correctly allocated per-port using dynamic thresholds (alpha = 8 is typical for ML workloads).'
  common_mistake: |
    **The Pitfall:** Only accounting for one sender's bandwidth-delay product.
    **The Rationale:** Incast means N senders simultaneously target one port. The buffer must absorb `(N-1) * BDP` worth of excess traffic, since only one sender's worth can drain in real time.
    **The Consequence:** Severe packet drops during collective communications, forcing expensive TCP/RoCE retransmissions and tanking training throughput.
  napkin_math: |
    - **Inbound vs Outbound Rate**: 8 senders at 200Gbps (25 GB/s) = 200 GB/s. Drain rate = 25 GB/s.
    - **Excess Rate**: `200 - 25 = 175 GB/s`.
    - **Buffer for 1 RTT**: `175 GB/s * 4\mu s = 700 KB`.
    - **Final Result**: A minimum of **700 KB per incast event** is needed (or ~22.4 MB for 32 active ports on a switch).
