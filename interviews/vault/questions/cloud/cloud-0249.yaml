title: The Gradient Memory Tax
scenario: You are training a large model with a parameter count 'P'. After the forward pass, you have
  a certain peak memory usage. When you initiate the backward pass (e.g., with `loss.backward()`), how
  much *additional* memory must be allocated specifically for the gradients, assuming you are training
  in FP16 precision? Contrast this with the memory used by the parameters themselves.
details:
  realistic_solution: The backward pass will allocate additional memory equal in size to the model's parameters.
    Since the model has 'P' parameters and is being trained in FP16 (2 bytes per parameter), the model
    weights themselves consume `P × 2` bytes.
  common_mistake: A common mistake is to think that gradients are just temporary, small values. Engineers
    forget that for every single parameter in the model, a corresponding gradient must be stored in memory,
    effectively doubling the memory footprint of the weights alone.
  napkin_math: '1. The model has P parameters.

    2. Training in FP16 means each parameter uses 2 bytes.

    3. Model weights memory = P * 2 bytes = 2P bytes.

    4. Gradients have the same shape and type as the weights.

    5. Therefore, the backward pass must allocate an additional P * 2 bytes (2P bytes) strictly for the
    gradients, doubling the footprint of the parameters alone.'
  options:
  - A small, fixed amount of memory, like a few MB.
  - An amount equal to the size of the model parameters.
  - Half the size of the model parameters.
  - Double the size of the model parameters.
  correct_index: 1
