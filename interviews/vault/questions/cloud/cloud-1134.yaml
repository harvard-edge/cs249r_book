title: Intra-Rack 400G Cabling Power and Cost
scenario: You are designing the intra-rack networking for a dense AI training rack containing 8 GPU servers. Each server requires four 400G Ethernet connections to a Top-of-Rack (ToR) switch. The longest cable run required is 2.5 meters. Assume a passive DAC cable costs $150 and uses negligible active power. An AOC costs $400 and its optical transceivers consume 8W per end.
question: For 32 intra-rack 400G links under 2.5 m, should you use passive DAC or AOC, and what cost and power differences drive the choice?
details:
  realistic_solution: Use passive DAC for all intra-rack connections under 3 meters. This eliminates transceiver conversion latency and significantly reduces rack power density and CapEx.
  common_mistake: |
    **The Pitfall:** Defaulting to optical cables (AOCs) for all high-bandwidth (400G+) links.
    **The Rationale:** Candidates assume that modern high-speed links always require optics to maintain signal integrity, ignoring that DACs perfectly support 400G at short, intra-rack distances (< 3m).
    **The Consequence:** Introducing massive aggregate power consumption overhead from electro-optical conversion, increasing cooling demands and wasting CapEx.
  napkin_math: |
    - **Total Connections:** 8 servers × 4 NICs = 32 links.
    - **Cost Difference:** AOC ($400) vs DAC ($150) = $250 savings per link.
    - **Total Cost Savings:** 32 links × $250 = **$8,000 per rack**.
    - **Power Overhead (AOC):** 8W per end × 2 ends = 16W per link.
    - **Total Power Savings:** 32 links × 16W = **512W per rack**.
