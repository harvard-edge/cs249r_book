title: Attention Matrix Allocation
scenario: You are profiling a Transformer model's inference step on an NVIDIA A100 GPU (40MB L2 Cache,
  80GB HBM). A specific attention layer materializes a query-key attention score matrix of size B x H
  x S x S. Given a batch size B=16, number of heads H=16, sequence length S=4096, and FP16 precision,
  calculate the exact memory footprint of this matrix. Will it fit entirely within the L2 cache, or must
  it be spilled to HBM?
question: "What is the FP16 memory footprint of the B=16, H=16, S=4096 attention score matrix, and will it fit in the 40MB L2 cache?"
details:
  realistic_solution: The full attention matrix requires ~8.58 GB of memory, which far exceeds the 40MB
    L2 cache and must spill to HBM. To avoid this massive memory bandwidth bottleneck, IO-aware algorithms
    like FlashAttention are used to tile the computation and keep intermediate blocks strictly in SRAM.
  common_mistake: Only calculating the size of a single sequence or head, or forgetting that the attention
    matrix scales quadratically with sequence length, leading to the incorrect assumption that it fits
    in SRAM.
  napkin_math: Memory = B * H * S^2 * 2 bytes = 16 * 16 * (4096)^2 * 2 = 256 * 16,777,216 * 2 = 8,589,934,592
    bytes (approx 8.58 GB). 8.58 GB >> 40 MB L2 cache.
