title: Diagnosing torch.compile Graph Breaks
scenario: Your team is optimizing a transformer model on an NVIDIA GPU using PyTorch 2.0's `torch.compile`. To implement an early exit condition during generation, a developer adds a data-dependent `if` statement to check intermediate activation values. Immediately, inference throughput plummets from 3,500 tokens/sec to 800 tokens/sec, and GPU utilization drops from 95% to 35%.
question: "Why did adding a data-dependent if statement to the torch.compile Transformer collapse throughput from 3,500 to 800 tokens/sec, and how should you fix it?"
details:
  realistic_solution: Use `TORCH_LOGS="graph_breaks"` to identify the exact line causing the fallback. Refactor the data-dependent `if` statement into a tensor operation using `torch.where` or `torch.cond` to ensure the entire forward pass remains a single compiled, fused graph.
  common_mistake: |
    **The Pitfall:** Assuming the early exit logic itself is computationally expensive or causes uncoalesced memory access.
    **The Rationale:** The data-dependent Python control flow forced a graph break, causing a fallback to eager execution and exposing severe CPU dispatch overhead.
    **The Consequence:** Massive performance regression due to lost graph fusion and high CPU overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compiled ops: 100 small operations.
       - CUDA launch overhead: 5 µs per launch.
       - Pure compute time: 100 µs.
    2. **Calculations:**
       - Fully compiled fused kernel: 1 launch * 5 µs = 5 µs overhead. Total = 105 µs.
       - Graph break (eager execution): 100 launches * 5 µs = 500 µs overhead. Total = 600 µs.
       - Throughput drop: 600 µs / 105 µs = ~5.7x slowdown (explains the 4.5x drop).
    3. **Conclusion & Interpretation:**
       - **Result: Dispatch-Bound Fallback**. Data-dependent control flow triggers a graph break, forcing eager execution and catastrophic CPU overhead.
