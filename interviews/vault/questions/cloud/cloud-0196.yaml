title: The OOMing Generator
scenario: You're responsible for deploying a large language model (LLM) on a GPU cluster for real-time
  inference. Under high concurrent user requests, you observe frequent Out-Of-Memory (OOM) errors on the
  GPUs, despite the total memory of the model weights fitting comfortably. What is the most likely cause
  of these OOMs, and what advanced technique would you implement to mitigate this?
question: "What is the most likely cause of these OOMs, and what advanced technique would you implement to mitigate this?"
details:
  realistic_solution: The most likely cause is the **Key-Value (KV) Cache** for attention mechanisms.
    During auto-regressive decoding, each generated token requires re-computing attention over all previous
    tokens. To optimize this, the Keys and Values of the attention mechanism for previous tokens are cached
    in GPU memory. This KV cache grows with the sequence length for *each concurrent request*. Under high
    concurrency, the sum of all individual KV caches quickly exhausts GPU memory.
  common_mistake: '"The model weights are too large, we need model parallelism." While true for extremely
    large models, the prompt states weights fit comfortably. The OOMs under *concurrent requests* point
    to a per-request memory overhead that scales with the number of users, rather than just the model
    size itself.'
  napkin_math: For a 7B LLM (e.g., Llama-2-7B with 32 layers, 32 KV heads, 128 head dim, FP16), the KV
    cache size per token is `32 layers × 2 (K+V) × 32 heads × 128 dim × 2 bytes/FP16 = 524 KB/token`.
