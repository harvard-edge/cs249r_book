title: The OOMing Generator
scenario: You are deploying a large language model (LLM) on a GPU cluster for real-time inference. Under high concurrent user requests, you observe frequent Out-Of-Memory (OOM) errors on the GPUs, despite the total memory of the model weights fitting comfortably.
question: What is the most likely cause of these OOMs under high concurrency, and what technique mitigates this?
details:
  realistic_solution: The most likely cause is the **Key-Value (KV) Cache** for attention mechanisms. During auto-regressive decoding, each generated token requires re-computing attention over all previous tokens. To optimize this, the Keys and Values of the attention mechanism for previous tokens are cached in GPU memory. This KV cache grows with the sequence length for *each concurrent request*. Under high concurrency, the sum of all individual KV caches quickly exhausts GPU memory.
  common_mistake: |
    **The Pitfall:** Blaming the model weights and suggesting model parallelism to solve the OOM.
    **The Rationale:** Candidates know large models require parallelism, but miss that the OOM only occurs under concurrent load, which points to dynamic request state.
    **The Consequence:** Implementing unnecessary distributed serving architectures that increase latency and cost without solving the root memory fragmentation issue.
  napkin_math: |
    1. For a 7B LLM (32 layers, 32 KV heads, 128 head dim, FP16).
    2. KV cache size per token = 32 layers × 2 (K+V) × 32 heads × 128 dim × 2 bytes.
    3. Size = 524,288 bytes = 512 KB per token.
    4. For 100 concurrent requests of 1000 tokens each: 100 × 1000 × 512 KB = 51.2 GB of dynamic memory.
    5. **The rapidly growing, unmanaged KV cache exhausts VRAM; PagedAttention mitigates this by eliminating memory fragmentation.**
