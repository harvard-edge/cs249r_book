title: TPU v5e AllReduce over ICI Torus
scenario: A TPU v5e pod slice has 256 chips arranged in a 16x16 2D torus, each with 1.6 Tbps ICI bandwidth.
question: Compare the AllReduce time for a 1GB gradient on this torus versus 256 H100s connected via 400Gbps switched Ethernet, and analyze why the torus topology affects algorithm selection differently than a Clos network.
details:
  realistic_solution: 'TPU v5e uses dimension-ordered AllReduce. Phase 1 — reduce along X-axis. Phase 2 — reduce along Y-axis. Torus topology enables independent axis reduction, achieving predictable scaling with zero contention (dedicated links), whereas Clos networks experience congestion.'
  common_mistake: |
    **The Pitfall:** Using the ring AllReduce formula directly for a torus.
    **The Rationale:** Engineers default to the standard flat ring algorithm without recognizing multi-dimensional topology.
    **The Consequence:** Miscalculating communication overhead and selecting sub-optimal communication algorithms for torus hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1GB gradient on 256 nodes.
       - TPU torus: 200 GB/s per direction.
       - H100 Ethernet: 50 GB/s.
    2. **Calculations:**
       - TPU torus 2D AllReduce: ~10ms for 1GB.
       - H100 8-rail Clos: ~5ms for 1GB.
    3. **Conclusion & Interpretation:**
       - **Result: TPU Torus is theoretically 2x slower, but achieves 100% predictability compared to Clos congestion.**
