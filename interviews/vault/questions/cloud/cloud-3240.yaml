title: Diagnosing Workload Bottlenecks on NVIDIA H100 with Roofline Analysis
scenario: You are optimizing an FP16 large language model inference workload on a single NVIDIA H100 GPU (989 TFLOPS peak dense compute, 3.35 TB/s HBM3 bandwidth). Initial profiling shows your application is only achieving 50 TFLOPS.
question: How would you use a roofline model on the H100 to diagnose the 50 TFLOPS FP16 workload, and what are examples of memory-bound versus compute-bound operations?
details:
  realistic_solution: "1.  **Characterize Workload Operational Intensity (OI)**: For\
    \ the critical kernels of the LLM inference, calculate the ratio of floating-point\
    \ operations (FLOPS) to the bytes transferred from/to global memory (HBM3). This\
    \ is typically expressed as FLOPS/byte. Tools like NVIDIA Nsight Compute can help\
    \ gather these metrics. \n2.  **Construct H100 Roofline Model**: Using the H100's\
    \ peak FP16 dense compute (989 TFLOPS) and peak HBM3 bandwidth (3.35 TB/s), plot\
    \ the Roofline chart. The 'roof' has two segments: the memory-bound region (performance\
    \ limited by bandwidth: Bandwidth * OI) and the compute-bound region (performance\
    \ limited by TFLOPS: Peak TFLOPS). \n3.  **Plot Workload on Roofline Chart**:\n\
    \ Place the measured OI and observed performance (50 TFLOPS) onto the Roofline\
    \ graph. \n4.  **Diagnose Bottleneck**: \n    *   If the workload's performance\
    \ point falls on or near the memory bandwidth ceiling, it is memory-bound. Optimization\
    \ efforts should focus on reducing data movement, increasing data reuse (e.g.,\
    \ tiling, caching), or using lower precision data types if feasible. \n    * \
    \  If it falls on or near the compute ceiling, it is compute-bound. Focus on maximizing\
    \ arithmetic intensity, using Tensor Cores effectively, improving instruction-level\
    \ parallelism, or finding algorithmic optimizations. \n    *   If it falls significantly\
    \ below both ceilings, there are likely other inefficiencies (e.g., poor kernel\
    \ launch configuration, low occupancy, synchronization overheads, non-optimal\
    \ kernel implementations)."
  common_mistake: |
    **The Pitfall:** Exclusively focusing on optimizing compute kernels or improving parallelism without quantifying operational intensity.
    **The Rationale:** Engineers see low FLOPS and immediately assume the compute units are underutilized, rather than starving for data.
    **The Consequence:** Wasting effort on compute-bound optimizations for a memory-bound problem on a high-performance accelerator.
  napkin_math: |
    1. **Roofline ridge point**: 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/byte.
    2. **Memory-Bound Example (Vector Addition, C = A + B)**:
       - 1 FLOP (addition) per 3 memory accesses (read A, read B, write C).
       - FP16 elements = 2 bytes each. Total bytes = 6 bytes.
       - Operational Intensity (OI) = 1 / 6 ≈ 0.167 FLOPs/byte.
       - 0.167 << 295, firmly memory-bound. Max performance = 3.35 TB/s × 0.167 = 0.56 TFLOPS.
    3. **Compute-Bound Example (Dense MatMul, 1024x1024)**:
       - FLOPS = 2 × 1024³ ≈ 2.147 GFLOPs.
       - Data Movement = 3 matrices × 1024² × 2 bytes ≈ 6.29 MB.
       - OI = 2.147 GFLOPs / 6.29 MB ≈ 341 FLOPs/byte.
       - **341 > 295, making the matrix multiplication compute-bound on the H100.**
