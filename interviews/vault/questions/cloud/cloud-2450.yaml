title: The Embedding Layer Bandwidth Illusion
scenario: An ML engineer profiles an embedding lookup table for a recommendation model on an H100 GPU
  (3.35 TB/s peak bandwidth). The batch size is 65,536 and the embedding dimension is 128 (FP32). Profiling
  shows the operation takes 1.5ms. The engineer calculates the throughput at ~22.3 GB/s. Seeing this is
  less than 1% of the H100's peak bandwidth, they conclude the PyTorch kernel is terribly unoptimized
  and spend weeks rewriting it in Triton, achieving zero speedup.
question: "Why is the embedding lookup limited to about 22.3 GB/s on H100 despite 3.35 TB/s peak bandwidth?"
details:
  realistic_solution: The engineer is confusing sequential/coalesced memory bandwidth with random access
    (gather) memory bandwidth. The roofline model's peak memory bandwidth (3.35 TB/s) assumes perfect,
    contiguous, coalesced reads where the memory bus is fully saturated. Embedding lookups require gathering
    non-contiguous rows from HBM based on random indices. For random accesses of 128 floats (512 bytes),
    the GPU must fetch entire cache lines (often 32-128 bytes each, depending on architecture) from disparate
    locations, breaking coalescing rules and causing massive cache thrashing. The memory controllers cannot
    saturate the bus under these conditions. The 'effective' memory bandwidth ceiling for random gather
    operations is orders of magnitude lower than the theoretical peak. The operation was already optimal
    for the hardware's random access capabilities.
  common_mistake: Applying the theoretical peak memory bandwidth from the roofline model to random access
    (gather) workloads.
  napkin_math: Data moved = 65,536 indices * 128 floats * 4 bytes/float = 33,554,432 bytes (~33.5 MB).
    Measured Bandwidth = 33.5 MB / 0.0015 s = 22.3 GB/s. 22.3 GB/s / 3350 GB/s = 0.66% utilization of
    peak bandwidth. However, random access latency for HBM is ~200-300ns. The bottleneck is memory latency
    and transaction limits, not bus width.
