title: Evaluating RDMA Kernel Bypass for H100 Clusters
scenario: You are designing the cross-node transport for a distributed training cluster of H100 GPUs,
  each equipped with a single InfiniBand NDR NIC (50 GB/s). During each training iteration, a 16 GB tensor
  must be transmitted to an adjacent node under a strict 600 ms budget. Design A uses standard TCP sockets
  over the InfiniBand network (IPoIB), staging data through host memory with a known 50% throughput penalty
  due to CPU TCP/kernel context switching overhead. Design B uses InfiniBand verbs with GPUDirect RDMA,
  bypassing the OS kernel entirely. Evaluate the effective throughput of both designs, factoring in the
  PCIe Gen5 x16 (32 GB/s unidirectional) links, and determine which architecture meets the latency budget.
question: "Which transport design meets the 600 ms budget for sending a 16 GB tensor, TCP/IPoIB staging or GPUDirect RDMA?"
details:
  realistic_solution: Design B (GPUDirect RDMA) is the only architecture that meets the latency budget.
    In Design A, the lack of kernel bypass forces data to be staged in host RAM and processed by the kernel,
    driving the effective throughput down to 16 GB/s and failing the budget. Design B utilizes zero-copy
    networking to stream directly from the GPU HBM3 to the NIC over the PCIe switch. Because the 50 GB/s
    NDR link outpaces the PCIe Gen5 bus, the transfer is bottlenecked strictly by the 32 GB/s PCIe unidirectional
    limit, safely coming in under the 600 ms requirement.
  common_mistake: Candidates often incorrectly assume the 50 GB/s InfiniBand network bandwidth is the
    primary bottleneck, ignoring that a single PCIe Gen5 x16 slot caps out at 32 GB/s. They also frequently
    fail to account for the dual-PCIe traversal (GPU to Host, Host to NIC) and memory copies required
    by non-RDMA TCP/IP stacks.
  napkin_math: 'Design A (IPoIB/TCP): The baseline PCIe Gen5 bandwidth is 32 GB/s. With the 50% CPU/TCP
    overhead penalty, effective throughput = 16 GB/s. Total time = 16 GB / 16 GB/s = 1.0 seconds (1000
    ms), which misses the 600 ms budget. Design B (GPUDirect RDMA): Data flows directly from GPU to NIC
    via PCIe Gen5. The bottleneck is the PCIe Gen5 unidir bandwidth (32 GB/s), not the network (50 GB/s).
    Total time = 16 GB / 32 GB/s = 0.5 seconds (500 ms). Since 500 ms < 600 ms, Design B successfully
    meets the budget.'
