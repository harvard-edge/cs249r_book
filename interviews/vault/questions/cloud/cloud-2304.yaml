title: The Silent Redis Feature Skew
scenario: Your cloud-based recommender system serves 10,000 QPS with a strict 50ms p99 latency SLA. Yesterday, you deployed a new model version that had a +2% offline AUC improvement. However, production CTR immediately dropped by 15%. Interestingly, latency actually improved to 35ms p99. Standard drift metrics on the raw input stream show no covariate shift.
question: What is the likely cause of the 15% CTR drop despite improved latency and green raw drift metrics, and how would you detect it?
details:
  realistic_solution: |
    The root cause is a training-serving skew induced by an infrastructure failure, specifically a caching layer issue. The latency drop (50ms to 35ms) is the primary clue. In production, historical user features are fetched from a Redis cluster. A recent configuration change or memory limit caused a massive spike in Redis evictions. When the serving pipeline experiences a cache miss, it defaults the `user_historical_ctr` feature to 0 to meet the strict SLA, rather than querying the slower persistent store. The offline training data uses exact historical aggregates, while the online model is suddenly predicting on zero-imputed data for a huge percentage of traffic. The fix requires implementing point-in-time correct logging (logging the exact feature vectors used at inference) and running continuous statistical tests (e.g., KS tests) between the logged serving features and the training data distributions.
  common_mistake: |
    **The Pitfall:** Rolling back the model and blaming an offline-online metric mismatch.
    **The Rationale:** Candidates assume the model simply overfit the training data without checking the serving infrastructure that feeds it.
    **The Consequence:** The true root cause (infrastructure failure) remains undetected, and all subsequent models will fail in exactly the same way.
  napkin_math: |
    - **Cache Setup:** 100M user profiles × 1KB each = 100 GB.
    - **Misconfiguration Impact:** If Redis is capped at 60 GB, 40% of the working set is continuously evicted.
    - **Cache Miss Rate:** 40% of 10,000 QPS = 4,000 requests/sec miss the cache.
    - **Result:** **Defaulting to 0 saves ~15ms of persistent DB lookup time (explaining the p99 latency drop from 50ms to 35ms), but corrupts the most predictive feature for 40% of traffic.**
