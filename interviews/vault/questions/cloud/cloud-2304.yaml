title: The Silent Redis Feature Skew
scenario: 'A recommender serves 10,000 QPS with a 50ms p99 SLA. A new model version with better offline AUC is deployed. Production CTR drops 15%, but p99 latency improves to 35ms. Raw feature streams show no drift.'
question: 'What is the likely cause of the CTR drop despite improved latency and green raw drift metrics?'
details:
  realistic_solution: 'A training-serving skew induced by infrastructure failure. A Redis caching issue caused massive evictions. The serving pipeline defaulted the user_historical_ctr feature to 0 to meet the strict SLA during cache misses. Implement point-in-time correct logging to detect this.'
  common_mistake: |
    **The Pitfall:** Blaming the model for offline-online mismatch and rolling back.
    **The Rationale:** Candidates assume the model overfit without checking serving infrastructure.
    **The Consequence:** The infrastructure root cause remains undetected, ensuring all future models fail similarly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cache: 100 GB. Capped at 60 GB.
    - QPS: 10,000.
    
    **Calculations:**
    - Cache Miss Rate: 40% (4,000 req/s).
    - Latency Impact: Defaulting to 0 saves 15ms persistent DB lookup time (explaining 50ms to 35ms drop).
    
    **Conclusion & Interpretation:**
    - **Result: 40% of traffic predicted on corrupted features (Infrastructure-Bound)**. SLA fallback logic silently destroyed predictive accuracy.
