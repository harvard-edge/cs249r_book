title: 'TPU v5e vs H100: Systolic Array Efficiency for Transformer Training'
scenario: 'TPU v5e delivers 197 TFLOPS BF16 with 819 GB/s HBM bandwidth. H100 SXM5 delivers 989 TFLOPS FP16 with 3,350 GB/s HBM bandwidth. You are analyzing a 7B transformer training workload (attention + FFN layers) with an arithmetic intensity of roughly 100 FLOPs/byte on the full forward+backward pass.'
question: 'At AI≈100 FLOP/byte for 7B transformer training, which accelerator delivers higher effective throughput and MFU, and why?'
details:
  realistic_solution: 'At AI=100 FLOP/byte: Ridge points: TPU v5e: 197T/819G = 240.5 FLOP/byte. H100: 989T/3350G = 295.2 FLOP/byte. Both above AI=100, so both are memory-bound at this intensity — but only marginally. Effective throughput in memory-bound regime: TPU v5e: 819 GB/s × 100 = 81.9 TFLOPS. H100: 3,350 × 100 = 335 TFLOPS. H100 wins 4.1× on throughput. However, for the compute-bound portion of transformer training (large matmuls where AI >> ridge point, e.g., GEMM in FFN layers with AI=200+): TPU v5e MFU ≈ 55% → 108 TFLOPS actual. H100 MFU ≈ 45% → 445 TFLOPS actual. H100 still wins. TPU v5e advantage: per-dollar cost (v5e is significantly cheaper per TFLOPS than H100), ICI interconnect enables multi-TPU pods with 1,600 Gbps bidirectional bandwidth vs NVLink''s 900 GB/s, better for pipeline-parallel training of very large models across many chips.'
  common_mistake: |
    **The Pitfall:** Directly comparing peak TFLOPS without accounting for Model FLOP Utilization (MFU) differences.
    **The Rationale:** Ignoring how different hardware architectures (systolic array vs SIMT) achieve different utilization rates for transformer workloads.
    **The Consequence:** Misestimating actual training times because TPU v5e achieves 45-60% MFU due to systolic array design, whereas H100 achieves 35-55% MFU due to warp scheduling overhead.
  napkin_math: |
    * H100 vs TPU v5e TFLOPS ratio: 989/197 = 5.02×. BW ratio: 3350/819 = 4.09×.
    * At AI=100 (memory-bound): effective throughput ratio follows BW = 4.09× (H100 wins).
    * At AI=300 (compute-bound, e.g. FFN GEMM): follows TFLOPS = 5.02× (H100 wins).
    * MFU Adjustment: TPU v5e MFU ≈ 55% -> 108 TFLOPS actual. H100 MFU ≈ 45% -> 445 TFLOPS actual.
    * **Result: H100 delivers ~4.1× higher effective throughput, but TPU v5e can achieve higher MFU and better cost efficiency per dollar.**
