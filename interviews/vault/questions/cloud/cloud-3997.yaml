title: Serving SLA Hardware Synthesis
scenario: A SaaS product requires P99 time-to-first-token under 150 ms for prompts up to 2,000 tokens on a 13B model. As an approximate component budget, prefill takes 70 ms, queueing contributes about 50 ms near P99, and network adds 25 ms.
question: What serving architecture change keeps P99 TTFT under 150 ms with 30 ms headroom when prefill is 70 ms, queueing 50 ms, and network 25 ms?
details:
  realistic_solution: 'The approximate component budget totals 145 ms, leaving only 5 ms headroom, not the required 30 ms. The safe engineering move is to reduce the most flexible component: queueing. To reach a 120 ms budget, queueing must fall from 50 ms to at most 25 ms if prefill and network stay fixed, which points to adding replicas, admission control, or regional capacity.'
  common_mistake: |
    **The Pitfall:** Attempting to optimize model prefill latency first.
    **The Rationale:** Engineers often default to optimizing the core ML compute component instead of examining the broader system bottlenecks.
    **The Consequence:** Wasting time trying to squeeze milliseconds out of GPU compute when queueing is the largest flexible component and the easiest target for architectural reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA: P99 TTFT <= 150 ms.
       - Headroom required: 30 ms.
       - Components: prefill = 70 ms, network = 25 ms, queueing = 50 ms.
    2. **Calculations:**
       - Target Latency (with Headroom) = 150 ms - 30 ms = 120 ms.
       - Current Latency = 70 ms + 50 ms + 25 ms = 145 ms.
       - Required Queueing Latency = Target (120) - Prefill (70) - Network (25) = 25 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queueing Bottleneck.** To meet the 120 ms target, queueing must be reduced to <= 25 ms via added replicas or admission control.
