title: Evaluating Data Compilation Strategies
scenario: You are training a large multimodal model on a cluster of 64 H100 GPUs. The training data consists of 500 million raw 5MB JPEG images and separate JSON metadata files stored in object storage (S3). The target training throughput is 2,000 samples/sec per GPU. The current data pipeline fetches individual JPEGs and JSONs, decodes them, resizes them to 224x224, and applies augmentations on the host CPUs (96 cores per node). Currently, GPU utilization is stuck at 30% while host CPUs are pinned at 100%.
question: Should you upgrade to 192-core CPU nodes or use offline dataset compilation for the 64-GPU image pipeline, and why?
details:
  realistic_solution: 'Reject the CPU upgrade. Instead, introduce an offline data compilation phase: pre-resize images to the target 224x224 resolution (~150KB each) and serialize them alongside metadata into large contiguous sharded formats (e.g., WebDataset tarballs). This reduces per-image I/O from 5MB to 150KB (33x reduction) and eliminates millions of small-file HTTP GET requests, cutting required bandwidth from 640 GB/s to 19.2 GB/s — easily achievable with standard cloud networking.'
  common_mistake: |
    **The Pitfall:** Focusing purely on host compute bottlenecks and suggesting massive CPU upgrades.
    **The Rationale:** Candidates jump to scaling up CPU cores or moving augmentations to the GPU without analyzing network I/O amplification.
    **The Consequence:** The system remains severely network bound from fetching 5MB raw images when only 150KB is actually needed, wasting money on CPU scale-up.
  napkin_math: |
    1. **Assumptions & Constraints:** 64 GPUs. Target throughput = 2,000 imgs/sec/GPU (128,000 total). Raw image = 5 MB. Compiled/resized image = 150 KB.
    2. **Calculations:** Raw I/O Requirement = 128,000 imgs/sec × 5 MB = 640 GB/s (saturates standard networking). Compiled I/O Requirement = 128,000 imgs/sec × 150 KB = 19.2 GB/s. Reduction in network calls = >6000x fewer HTTP GETs via 1GB shards.
    3. **Conclusion & Interpretation:** **Result: Compiled shards drop network load to 19.2 GB/s. Network-I/O-Bound.**
