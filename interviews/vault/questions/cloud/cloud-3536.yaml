title: Designing a High-Throughput Data Quality Gate for AMD MI300X
scenario: Your team is deploying a large-scale ML model on an AMD MI300X accelerator for real-time inference. The model's performance is critically dependent on the quality of incoming features. You are tasked with designing a data quality gate that performs schema validation, checks for basic data type anomalies (e.g., unexpected nulls, out-of-range values), and tags data with lineage information. The raw incoming data stream, after initial ingestion and light preprocessing, averages 2 TB/hour.
question: What architecture and throughput calculation would ensure a 2 TB/hour data quality gate does not bottleneck the MI300X inference stream?
details:
  realistic_solution: A distributed, horizontally scalable streaming data validation service (e.g., using Apache Flink, Spark Streaming, or Kafka Streams) deployed on a cloud environment. This service would consume data from a message queue, perform validation checks (schema, range, type), potentially sample data for more intensive anomaly detection, enrich with lineage metadata, and then publish validated data to another message queue for the MI300X consumer. Key strategies include lightweight, compiled validation rules for high throughput and a monitoring system to scale validator instances dynamically based on backlog and throughput metrics.
  common_mistake: |
    **The Pitfall:** Underestimating the required throughput of the data quality gate.
    **The Rationale:** Candidates often focus too much on complex validation rules and ignore the raw throughput requirement to keep the downstream MI300X accelerator fed.
    **The Consequence:** The validation service becomes a bottleneck, starving the expensive MI300X accelerator and reducing overall system utilization.
  napkin_math: |
    - **Identify the incoming data rate (R_in):** 2 TB/hour.
    - **Convert to gigabytes (GB):** 2 TB * 1024 GB/TB = 2048 GB.
    - **Convert to seconds (s):** 1 hour = 3600 seconds.
    - **Calculate required throughput (T_DQG):** 2048 GB / 3600 s &approx; 0.5689 GB/s.
    - **Conclusion:** The data quality gate must sustain a processing throughput of at least **0.57 GB/s (or 570 MB/s)**.
