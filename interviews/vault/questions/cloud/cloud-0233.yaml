title: The Speculative Memory Trade-off
scenario: You implement speculative decoding for a 70B LLM using a 1.5B draft model. At batch size 1, generation speed increases 2.5x, but at batch size 64, it is slower than standard autoregressive decoding.
question: Why does speculative decoding degrade throughput at high batch sizes?
details:
  realistic_solution: Speculative decoding trades spare compute (ALU cycles) for memory bandwidth. At batch size 1, LLM inference is severely memory-bandwidth bound, so the A100's ALUs are mostly idle. Using those idle ALUs to run a small draft model and verify multiple tokens in one memory sweep of the 70B model is a massive win. However, at batch size 64, the arithmetic intensity of the workload increases significantly. The system becomes compute-bound. Now, running the draft model steals precious ALU cycles away from the main model's generation, and the overhead of verifying rejected tokens actually reduces overall throughput.
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding always provides a speedup because it reduces the number of forward passes of the large model.
    **The Rationale:** Failing to understand the roofline model and the shift from memory-bound to compute-bound execution at higher batch sizes.
    **The Consequence:** Deploying speculative decoding to high-throughput endpoints and unintentionally bottlenecking the system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Draft model: 1.5B parameters. Target model: 70B.
       - A100 memory bound up to 156 FLOPs/byte.
    2. **Calculations:**
       - Batch 1 arithmetic intensity: ~1 FLOP/byte (Memory-Bound).
       - Batch 64 arithmetic intensity: 64 FLOPs/byte (Compute-Bound).
       - Draft compute cost: 1.5B * 2 = 3 GFLOPs per token.
       - At BS=64: 64 * 3 GFLOPs = 192 GFLOPs of pure overhead per step.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound.** At high batch sizes, the system shifts from memory-bound to compute-bound, making the draft model's arithmetic overhead a net loss.
