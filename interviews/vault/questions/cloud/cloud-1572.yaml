title: Estimating Mixed-Precision Memory Footprint
scenario: You are migrating a 10-billion parameter Transformer model to Mixed-Precision Training (AMP)
  using the Adam optimizer on a cluster of A100 GPUs. A junior engineer estimates that since FP16 uses
  half the bytes of FP32, the memory footprint for weights, gradients, and optimizer states will drop
  from 160 GB to 80 GB, theoretically allowing the model to fit on a single 80GB GPU with extreme activation
  checkpointing. Calculate the actual static memory footprint for these components under standard AMP.
details:
  realistic_solution: The static memory footprint for weights, gradients, and optimizer states actually
    remains exactly the same at 16 bytes per parameter (160 GB total). It will still not fit on a single
    80GB GPU. The true memory savings of AMP come primarily from storing forward activations in half-precision
    (FP16/BF16).
  common_mistake: Assuming that Mixed-Precision Training halves all memory requirements. Candidates often
    forget that AMP requires maintaining an FP32 master copy of the weights alongside the FP32 Adam moments
    (momentum and variance) to prevent underflow during gradient updates.
  napkin_math: 'Pure FP32 Training:

    - Weights: 4B

    - Gradients: 4B

    - Adam (Momentum + Variance): 4B + 4B = 8B

    Total = 16 Bytes/param.


    Mixed-Precision (AMP):

    - FP16 Weights: 2B

    - FP16 Gradients: 2B

    - FP32 Master Weights: 4B

    - FP32 Adam States: 8B

    Total = 16 Bytes/param.


    Total for 10B parameters = 10 * 10^9 * 16 bytes ≈ 160 GB in both configurations.'
