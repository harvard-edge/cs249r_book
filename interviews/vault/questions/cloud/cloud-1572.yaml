title: Estimating Mixed-Precision Memory Footprint
scenario: You are migrating a 10-billion parameter Transformer model to Mixed-Precision Training (AMP) using the Adam optimizer on a cluster of A100 GPUs. A junior engineer estimates that since FP16 uses half the bytes of FP32, the memory footprint for weights, gradients, and optimizer states will drop from 160 GB to 80 GB, theoretically allowing the model to fit on a single 80GB GPU with extreme activation checkpointing.
question: What is the actual static memory footprint for 10B parameters under standard AMP with Adam, and can it fit on one 80GB A100?
details:
  realistic_solution: The static memory footprint for weights, gradients, and optimizer states actually remains exactly the same at 16 bytes per parameter (160 GB total). It will still not fit on a single 80GB GPU. The true memory savings of AMP come primarily from storing forward activations in half-precision (FP16/BF16).
  common_mistake: |
    **The Pitfall:** Assuming that Mixed-Precision Training (AMP) halves all memory requirements.
    **The Rationale:** Candidates often forget that AMP requires maintaining an FP32 master copy of the weights alongside the FP32 Adam moments to prevent underflow during gradient updates.
    **The Consequence:** Massively underestimating VRAM requirements, resulting in OOM errors and failed deployment topologies.
  napkin_math: |
    * **Pure FP32 Training:**
      * Weights: 4 bytes
      * Gradients: 4 bytes
      * Adam (Momentum + Variance): 4 + 4 = 8 bytes
      * Total = 16 bytes/parameter.
    * **Mixed-Precision (AMP):**
      * FP16 Weights: 2 bytes
      * FP16 Gradients: 2 bytes
      * FP32 Master Weights: 4 bytes
      * FP32 Adam States: 8 bytes
      * Total = 16 bytes/parameter.
    * For 10B parameters: 10 × 10^9 × 16 bytes ≈ 160 GB.
    * **Conclusion: The static memory footprint remains exactly 160 GB; it will not fit on a single 80GB GPU.**
