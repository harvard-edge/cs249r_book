title: Estimating Mixed-Precision Memory Footprint
scenario: You are migrating a 10-billion parameter Transformer model to Mixed-Precision Training (AMP) using the Adam optimizer. A junior engineer estimates that since FP16 uses half the bytes of FP32, the memory footprint will drop from 160 GB to 80 GB, theoretically allowing the model to fit on a single GPU with extreme activation checkpointing.
question: What is the actual static memory footprint for 10B parameters under standard AMP with Adam, and can it fit on one GPU?
details:
  realistic_solution: The static memory footprint for weights, gradients, and optimizer states actually remains exactly the same at 16 bytes per parameter (160 GB total). The true memory savings of AMP come primarily from storing forward activations in half-precision.
  common_mistake: |
    **The Pitfall:** Assuming that Mixed-Precision Training (AMP) halves all memory requirements.
    **The Rationale:** Candidates often forget that AMP requires maintaining an FP32 master copy of the weights alongside the FP32 Adam moments to prevent underflow during gradient updates.
    **The Consequence:** Massively underestimating VRAM requirements, resulting in OOM errors and failed deployment topologies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10B parameters.
       - Mixed-Precision Training (AMP) with Adam.
    2. **Calculations:**
       - Pure FP32: 4B (weights) + 4B (gradients) + 8B (Adam) = 16 bytes/param.
       - AMP: 2B (FP16 weights) + 2B (FP16 gradients) + 4B (FP32 master weights) + 8B (FP32 Adam) = 16 bytes/param.
       - Total for 10B parameters = 10 * 10^9 * 16 bytes = 160 GB.
    3. **Conclusion & Interpretation:**
       - **Result: The static memory footprint remains exactly 160 GB; it will mathematically not fit on a single 80 GB GPU. Bottleneck: Memory Capacity-Bound.**
