title: 'Feature Store: Design a Low-Latency Feature Store for Real-Time LLM Serving'
scenario: 'You are designing a feature store for a recommendation LLM serving 100K requests/second on
  H100s (80GB HBM3, 3.35 TB/s). Each request requires 500 pre-computed user features (retrieval latency
  SLA: < 5ms p99). Design the feature store architecture: storage tier, caching, serialization format,
  and compute placement.'
details:
  realistic_solution: GPU power costs are a small fraction of cloud compute costs. At $0.10/kWh and 700W
    per H100, electricity is ~$0.07/hr per GPU, far below the $2–4/hr cloud rental price.
  common_mistake: Using a feature store that adds 20-50ms retrieval latency (e.g., DynamoDB without caching)
    for a system requiring < 5ms. Not co-locating feature store with serving infrastructure.
  napkin_math: 'H100 SXM5: 700W TDP. At $0.10/kWh: $0.10 × 0.7kW = $0.07/hr electricity per GPU. For 256
    H100s: $0.07 × 256 = $17.92/hr electricity. Cloud instance cost (H100 × 8 per node): ~$32/hr per 8-GPU
    node × 32 nodes = $1,024/hr. Power cost as fraction: $17.92/$1,024 = 1.75% of compute cost. Single
    H100 power: 700W at $0.10/kWh = $0.07/hr = $0.396/hr at PUE 1.3 × 4.37 factor... correction: $0.10/kWh
    × 0.7kW × 1.3 PUE = $0.091/hr ≈ $0.09/hr per GPU (not $396/hr).'
