title: Cloud Vector Operations L5 0
scenario: Your model has a custom activation function with an if-else branch per element. Profiling shows
  this kernel is 5x slower than standard ReLU on GPU despite similar FLOP count. Diagnose the issue and
  evaluate solutions.
details:
  realistic_solution: 'The branching activation causes warp divergence — threads in a 32-thread warp take
    different paths through the if-else, serializing execution. ReLU uses a branchless max() intrinsic.
    Solutions: (A) Rewrite as branchless using select/ternary: if(x>0, f(x), g(x)) → blend both results
    with a mask. This eliminates divergence. (B) Use torch.where() which compiles to a predicated select.
    (C) Approximate with a smooth function (e.g., SiLU) that has no branches. Option A is best — maintains
    exact semantics with no divergence. The 5x slowdown is consistent with ~50% of warps having divergent
    threads, each taking 2x cycles.'
  common_mistake: Assuming GPU branching works like CPU branching with branch prediction. GPUs have no
    branch predictor — all threads in a warp must execute both paths if any thread diverges.
  napkin_math: '32 threads per warp. If 50% take branch A, 50% take branch B: both branches execute sequentially
    → 2x slowdown per warp. With additional register pressure and instruction cache misses from two code
    paths: ~3-5x total slowdown. Branchless: 1x (all threads execute same instruction).'
