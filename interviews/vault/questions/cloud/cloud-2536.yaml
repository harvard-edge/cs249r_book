title: Cloud Vector Operations L5 0
scenario: >-
  Your model has a custom activation function with an if-else branch per element. Profiling shows
  this kernel is 5x slower than standard ReLU on GPU despite similar FLOP count.
question: >-
  Why is the custom if-else activation kernel 5x slower than ReLU on GPU, and what fixes would you evaluate?
details:
  realistic_solution: 'The branching activation causes warp divergence — threads in a 32-thread warp take different paths through the if-else, serializing execution. ReLU uses a branchless max() intrinsic. Solutions: (A) Rewrite as branchless using select/ternary: if(x>0, f(x), g(x)) → blend both results with a mask. This eliminates divergence. (B) Use torch.where() which compiles to a predicated select. (C) Approximate with a smooth function (e.g., SiLU) that has no branches. Option A is best — maintains exact semantics with no divergence. The 5x slowdown is consistent with ~50% of warps having divergent threads, each taking 2x cycles.'
  common_mistake: |
    **The Pitfall:** Assuming GPU branching works like CPU branch prediction.
    **The Rationale:** GPUs have no branch predictor — all threads in a warp must execute both paths if any thread diverges (warp divergence).
    **The Consequence:** Writing control-flow heavy kernels that destroy GPU SIMT efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU execution occurs in warps of 32 threads.
    - Branching causes warp divergence if threads take different paths.
    - Assume 50% take branch A and 50% take branch B.

    **Calculations:**
    - Branching penalty = Both paths execute sequentially -> 2x slowdown per warp.
    - Total slowdown including register pressure and instruction cache misses -> 3-5x total slowdown.
    - Branchless fix = 1x execution time (all threads execute identically).

    **Conclusion & Interpretation:**
    - **Result: ~3-5x slowdown (Compute-Bound)**. Warp divergence destroys GPU SIMT efficiency; using branchless operations (e.g., select/mask) restores performance.
