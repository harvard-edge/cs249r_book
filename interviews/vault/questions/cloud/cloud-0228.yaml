title: The KV-Cache OOM Attack
scenario: Your LLM serving endpoint supports 32k context. On Monday, your cluster starts OOM-killing pods every few minutes. The traffic volume hasn't increased, but you notice a handful of users sending prompts that are exactly 32,000 tokens — the maximum. Before Monday, average prompt length was 500 tokens.
question: "How does a 64× increase in prompt length from a few users crash the entire cluster, and what's your emergency response?"
details:
  realistic_solution: 'The KV-cache memory for a single request scales linearly with sequence length. A 32k-token request consumes 64× the KV-cache of a 500-token request. If the scheduler admits requests based on *count* rather than *memory*, a few 32k requests can exhaust the entire KV-cache budget. Emergency response: implement admission control based on *memory budget*.'
  common_mistake: |
    **The Pitfall:** "Just reject prompts over a certain length" or "Add more GPUs to handle the load."
    **The Rationale:** Candidates treat symptoms instead of identifying the underlying resource allocation logic flaw.
    **The Consequence:** Rejecting long prompts breaks legitimate use cases, and adding GPUs doesn't solve the underlying scheduler vulnerability.
  napkin_math: |
    1. 7B model on A100 80 GB. Weights = 14 GB. Free for KV-cache = 66 GB.
    2. KV-cache per token (32 layers, 32 heads, d=128, FP16): 2 * 32 * 32 * 128 * 2 = 524,288 bytes (~512 KiB).
    3. At 500-token avg: ~256 MB/request. A batch of 32 requests uses ~8.2 GB (fits easily).
    4. At 32k tokens: ~16.8 GB/request.
    5. **Just 4 adversarial requests consume ~67.2 GB, exceeding the 66 GB budget and triggering an OOM.**
