title: The KV-Cache OOM Attack
scenario: Your LLM serving endpoint supports 32k context. On Monday, your cluster starts OOM-killing pods
  every few minutes. The traffic volume hasn't increased, but you notice a handful of users sending prompts
  that are exactly 32,000 tokens — the maximum. Before Monday, average prompt length was 500 tokens. How
  does a 64× increase in prompt length from a few users crash the entire cluster, and what's your emergency
  response?
details:
  realistic_solution: 'The KV-cache memory for a single request scales linearly with sequence length.
    A 32k-token request consumes 64× the KV-cache of a 500-token request. If the scheduler admits requests
    based on *count* (e.g., "batch up to 32 requests") rather than *memory*, a few 32k requests can exhaust
    the entire KV-cache budget that normally serves hundreds of short requests. This is effectively a
    resource exhaustion attack — intentional or not. The cluster crashes because: (1) the scheduler admits
    32 requests including several 32k-token ones; (2) KV-cache allocation exceeds VRAM; (3) the CUDA OOM
    kills the serving process; (4) Kubernetes restarts the pod, which immediately admits the same queued
    requests and crashes again (crash loop). Emergency response: (1) implement admission control based
    on *memory budget*, not request count — estimate KV-cache cost before admitting: $\text{KV\_bytes}
    = 2 \times L \times H \times d_h \times S \times 2$; (2) set per-user rate limits on total token throughput,
    not just request count; (3) implement preemption — if a new request would cause OOM, preempt (pause
    and swap to CPU) the lowest-priority in-flight request.'
  common_mistake: '"Just reject prompts over a certain length" or "Add more GPUs to handle the load."
    Rejecting long prompts breaks legitimate use cases, and adding GPUs doesn''t help if the scheduling
    algorithm is the problem.'
  napkin_math: '7B model on A100 80 GB. Weights = 14 GB. Free for KV-cache = 66 GB. KV-cache per token
    per request (32 layers, 32 heads, d=128, FP16): $2 \times 32 \times 32 \times 128 \times 2 = $ **524
    KB/token**. At 500-token avg: **262 MB/request**. Batch of 32 normal requests: $32 \times 262\text{
    MB} = $ **8.4 GB** — fits easily. At 32k tokens: **16.8 GB/request**. Just 4 adversarial requests:
    $4 \times 16.8 = $ **67.2 GB** — exceeds the 66 GB budget → **OOM**. Those 4 requests consume more
    memory than 256 normal requests. Memory-aware scheduling: admit requests until $\sum_i \text{KV}(S_i)
    \leq 66\text{ GB}$. This limits concurrent 32k requests to 3, while allowing 250+ concurrent 500-token
    requests. PagedAttention (vLLM) helps by allocating KV-cache in 4 KB pages on-demand rather than pre-allocating
    for max length, reducing waste from requests that don''t use their full context window.'
