title: Cloud Deepspeed Zero L5 0
scenario: 'For a 30B model on 64 GPUs across 8 nodes (NVLink intra-node, 100 Gbps inter-node), compare:
  (A) ZeRO-3 across all 64 GPUs vs. (B) ZeRO-2 intra-node + ZeRO-1 inter-node (hierarchical). Evaluate
  communication efficiency.'
question: "Which is more communication-efficient for the 30B model: flat ZeRO-3 across 64 GPUs or hierarchical ZeRO, and why?"
details:
  realistic_solution: 'Option A (flat ZeRO-3): every layer requires all-gather across all 64 GPUs. Total
    param traffic: 60 GB × 3 (fwd gather + bwd gather + gradient reduce-scatter) = 180 GB per step. Inter-node
    time: 180 × (7/8) / 12.5 = 12.6s. Option B (hierarchical): ZeRO-2 within each 8-GPU node — params
    replicated intra-node (60 GB per GPU, fits in 80 GB). Gradient reduce-scatter within node at NVLink
    speed (fast). ZeRO-1 across nodes — only optimizer states sharded cross-node. Cross-node traffic:
    gradient AllReduce = 2 × (7/8) × 60 GB = 105 GB. Inter-node time = 105 / 12.5 GB/s = 8.4s. Option
    B cuts cross-node traffic by 33% and keeps parameter all-gathers strictly on fast NVLink.'
  common_mistake: Applying ZeRO-3 uniformly without considering network topology. Hierarchical ZeRO matches
    communication patterns to available bandwidth — heavy traffic on fast NVLink, minimal traffic on slow
    inter-node links.
  napkin_math: 'A: 180 GB per GPU comm volume, cross-node is 157.5 GB at 12.5 GB/s = 12.6s overhead. B:
    Gradient AllReduce cross-node is 105 GB = 8.4s. Speedup: 1.5x on inter-node communication. If step
    is heavily comm-bound, B saves >4s per step.'
