title: Tensor Parallelism Degree Selection for 70B Model on H100
scenario: "You're serving a 70B Llama-2 model (140GB FP16) on 8-GPU nodes. You must choose tensor parallelism degree: TP=2, TP=4, or TP=8. Each degree has different communication overhead. Batch size is 1 for latency-sensitive serving."
question: Which tensor-parallelism degree (TP=2, TP=4, or TP=8) would you choose for batch-1 70B serving, and why?
details:
  realistic_solution: 'TP=2 or TP=4 is optimal for latency at batch=1. TP=8 introduces severe AllReduce overhead. Use TP=4 for memory fit with minimal communication overhead.'
  common_mistake: |
    **The Pitfall:** Choosing TP=8 to maximize memory distribution blindly.
    **The Rationale:** Candidates assume higher TP always equals better performance.
    **The Consequence:** At batch=1, the model is memory-bandwidth-bound, and TP communication overhead dominates, destroying latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model = 140GB FP16.
       - GPU HBM: 80GB.
    2. **Calculations:**
       - TP=2: 70GB/GPU (tight).
       - TP=4: 35GB/GPU (comfortable).
       - TP=8: 17.5GB/GPU (wastes memory, high communication).
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound at TP=8. TP=4 provides the best balance of memory fit and latency.**
status: archived
deletion_reason: 'Fatal conceptual error in tensor-parallelism mechanics: napkin math claims that "weight
  shards in MLP: 8192*32768*2 = 512MB per layer → 512MB/900GB/s = 0.57ms per all-reduce" — but in TP,
  weights are partitioned and stay resident on each rank; only *activations* are AllReduced (typically
  ~16 KB per layer at hidden_dim=8192 batch=1, not 512 MB). The whole TP-degree-selection argument is
  built on an AllReduce traffic estimate that is roughly 30,000x too large. Also uses the forbidden
  canonical "Llama-70B on 4×H100" framing per PARALLELISM_RULES. Archiving rather than rewriting because
  the TP-degree-selection-at-batch-1 question is well covered by the rewritten cloud-0899.'
