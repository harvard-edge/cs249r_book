title: HBM Bandwidth Savings with FlashAttention
scenario: You are training a transformer model on NVIDIA A100 GPUs (192KB shared memory/SRAM per SM, 2.0
  TB/s HBM bandwidth) with a sequence length of N = 8192 and head dimension d = 128. Standard attention
  materializes the N x N attention scores matrix S = QK^T and the attention probabilities P = softmax(S)
  in HBM. For a single attention head in FP16 (2 bytes per element), calculate the volume of data transferred
  to and from HBM for the S and P matrices during the forward pass, and calculate the HBM traffic reduction
  achieved by FlashAttention.
details:
  realistic_solution: With N=8192, the N x N matrix has 67.1M elements. In FP16, this is 134.2 MB. Standard
    attention writes S (134.2 MB), reads S and writes P (268.4 MB), and reads P for the final matrix multiplication
    (134.2 MB), totaling 536.8 MB of HBM traffic per head just for intermediate matrices. FlashAttention
    uses tiling and online softmax to load blocks of Q, K, and V into the 192KB SM shared memory, computing
    the output O directly without materializing S and P in HBM.
  common_mistake: Focusing purely on the O(N^2 * d) FLOPs of the matrix multiplications and assuming attention
    is compute-bound, rather than calculating the O(N^2) memory traffic which makes standard attention
    heavily memory-bandwidth bound.
  napkin_math: 'Standard attention fully materializes the N x N attention matrix S in HBM. For N=8192,
    S size = 8192^2 * 2 bytes = 134 MB. Total HBM traffic (read/write Q, K, V, S, P) is ~536 MB. FlashAttention
    fuses operations, keeping S in the A100''s 192KB SRAM per SM. HBM traffic reduces to just reading
    Q, K, V and writing O: 4 * (8192 * 128) * 2 bytes = 8.4 MB. The A100 saves 64x in HBM bandwidth (536
    / 8.4).'
