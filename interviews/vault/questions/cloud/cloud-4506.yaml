title: Block-wise FP8 KV Cache Quantization
scenario: 'You are optimizing a MoE LLM deployed on MI300X GPUs to support massive sequence lengths.'
question: Formulate a block-wise FP8 quantization scheme for the KV cache to maximize sequence length while avoiding attention outlier degradation.
details:
  realistic_solution: "Divide KV cache tensors into small blocks (e.g., 1x32) and compute an independent FP16 scaling factor for each. This isolates massive attention outliers into specific blocks, preventing them from destroying the 8-bit precision of the entire tensor. This safely cuts memory footprint by half, doubling max context length on the 192GB HBM3."
  common_mistake: |
    **The Pitfall:** Using standard per-tensor INT8/FP8 quantization for the KV cache.
    **The Rationale:** LLM attention matrices contain massive, systematic outliers. Per-tensor scaling crushes the precision of normal values to accommodate the outliers.
    **The Consequence:** Catastrophic degradation in model generation quality, making the memory savings useless.
  napkin_math: |
    - **Base Element Size**: FP16 = 2 bytes.
    - **Block Quantization (1x32)**: 1 byte for FP8 value + `(2 bytes for FP16 scale / 32 elements)`.
    - **Final Result**: Effective size is **1.0625 bytes per element**, cutting memory usage almost in half while preserving precision.
