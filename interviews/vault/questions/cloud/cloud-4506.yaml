title: Block-wise FP8 KV Cache Quantization
scenario: You are optimizing a MoE LLM deployed on MI300X GPUs to support massive
  sequence lengths.
question: Formulate a block-wise FP8 quantization scheme for the KV cache to maximize
  sequence length while avoiding attention outlier degradation.
details:
  realistic_solution: Divide KV cache tensors into small blocks (e.g., 1x32) and compute
    an independent FP16 scaling factor for each. This isolates massive attention outliers
    into specific blocks, preventing them from destroying the 8-bit precision of the
    entire tensor. This safely cuts memory footprint by half, doubling max context
    length on the 192GB HBM3.
  common_mistake: Using standard per-tensor INT8 quantization which fails catastrophically
    on LLM attention outliers, or using blocks so small the scale factors consume
    the memory savings.
  napkin_math: 2 bytes -> 1 byte + (2 bytes / 32) = 1.0625 bytes per element.
