title: Diagnosing the I/O Wall in Vision Training
scenario: >
  You are training a large Vision Transformer on a single node equipped with 8x H100 GPUs. Each GPU is capable of processing 2,500 images per second at peak compute. Your training dataset consists of JPEG images with an average size of 200 KB, stored on a centralized Network Attached Storage (NAS) volume that is provisioned for a maximum of 2 GB/s read throughput.
question: >
  What storage bandwidth does the 8-H100 ViT training loop require, and will a 2GB/s NAS cause an I/O wall?
details:
  realistic_solution: |
    First, calculate the aggregate image consumption: 8 GPUs * 2,500 images/sec = 20,000 images/sec. Then, calculate the required bandwidth: 20,000 images/sec * 200 KB/image = 4 GB/s. Since the required 4 GB/s throughput exceeds the NAS provisioned limit of 2 GB/s, the GPUs will starve for data (the I/O wall). The solution is to either cache the dataset on the node's local NVMe drives or upgrade to a high-performance parallel file system.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck will be GPU compute or inter-GPU communication.
    **The Rationale:** Engineers neglect to calculate the aggregate storage bandwidth required to feed accelerators at full utilization.
    **The Consequence:** The GPUs are starved for data, wasting massive compute resources and causing training to stall.
  napkin_math: |
    - **Aggregate Image Consumption:** 8 GPUs * 2,500 images/sec = 20,000 images/sec.
    - **Required Bandwidth:** 20,000 images/sec * 200 KB/image = 4,000,000 KB/s = 4.0 GB/s.
    - **Available Bandwidth:** 2.0 GB/s.
    - **Result:** **4.0 GB/s > 2.0 GB/s, meaning the system is heavily I/O bound.**
