title: Carbon-Aware Autoscaling for Inference Endpoints
scenario: You operate an inference endpoint serving a non-latency-critical batch transcription workload (user uploads audio, gets transcript within 6 hours). The endpoint runs on cloud spot instances. Current autoscaling policy: scale to maintain queue depth < 1,000 jobs.
question: How would you redesign spot-instance autoscaling to use real-time carbon intensity while meeting the 6-hour SLA for 99% of transcription jobs?
details:
  realistic_solution: 'Carbon-aware autoscaling with SLA forecasting: (1) Augment the autoscaling objective: instead of minimizing queue depth alone, minimize λ·carbon_cost + (1-λ)·latency_cost, where λ is adjusted based on SLA headroom. (2) SLA headroom calculation: at each 5-minute tick, estimate time-to-complete the current backlog at current scale. If headroom > 3 hours (slack to 6hr SLA), allow scale-down during high-carbon periods. If headroom < 1 hour, override carbon optimization and scale up aggressively. (3) Predictive pre-scaling: when carbon intensity forecast shows a low-carbon window in 2-4 hours, pre-scale up 30 minutes early to drain backlog before the window and take advantage of the low-carbon period. (4) Carbon budget per job: expose a per-job SLA ''carbon-flex'' API parameter — premium users get immediate processing, standard users allow up to 6-hour deferral for carbon optimization.'
  common_mistake: |
    **The Pitfall:** Treating carbon-aware scheduling as binary (run/don't run) rather than as a continuous cost signal with SLA forecasting.
    **The Rationale:** Engineers often simply turn off instances during high-carbon periods without predicting the queue buildup.
    **The Consequence:** Severe SLA violations as the backlog builds up unmanageably during extended high-carbon periods.
  napkin_math: |
    * Batch transcription: 10K jobs/hour, each 30s audio = 15s GPU time.
    * 50 GPUs capacity: 50 × 3600s / 15s = 12,000 jobs/hr (covers the 10K/hr arrival).
    * 6hr SLA: can defer up to 5hrs 50min.
    * High Carbon (hours 1-3): Defer jobs. Queue builds to 3 × 10K = 30K jobs.
    * Low Carbon (hours 4-6): Scale to 250 spot GPUs. Capacity = 250 × 240 = 60,000 jobs/hr.
    * Time to clear 30K backlog: 30,000 / 60,000 = 0.5 hours (30 minutes).
    * **Conclusion: Backlog clears within 30 minutes during the low-carbon window, safely maintaining the 6hr SLA.**
