title: 'Power Delivery: UPS Efficiency at Partial Load'
scenario: 'You are designing the power delivery chain for a new 5 MW GPU training
  facility. The UPS system is 97% efficient at full load but drops to 92% at 30% load.
  Your training cluster runs bursty workloads: peak 5 MW during training (60% of the time), 1.5 MW during
  checkpointing and data staging (40% of the time). What is the annual energy wasted in UPS conversion
  losses, and how do you architect around this?'
question: What is the annual energy wasted in UPS conversion losses, and how do you
  architect around this?
details:
  realistic_solution: 'Assume 60% time at peak (5 MW, 97% efficient) and 40% at low
    (1.5 MW, 92% efficient). Peak losses: 5 MW × 3% = 150 kW for 60% of time. Low
    losses: 1.5 MW × 8% = 120 kW for 40% of time. Weighted average loss: (150 × 0.6
    + 120 × 0.4) = 138 kW continuous. Annual waste: 138 kW × 8760 h = 1.21 GWh = ~$72K/year
    at $0.06/kWh. Plus cooling the UPS waste heat adds ~30% more. Solutions: (1) Modular
    UPS that adds/removes modules to match load, maintaining >95% efficiency at all
    loads. (2) Direct DC distribution (eliminate AC-DC-AC conversion). (3) Google''s
    approach: battery backup at server level, eliminating central UPS entirely. (4)
    Lithium-ion UPS with wider efficient operating range vs legacy lead-acid.'
  common_mistake: Sizing UPS for peak and ignoring partial-load efficiency degradation.
    Also forgetting that UPS losses generate heat that requires additional cooling,
    compounding the energy waste.
  napkin_math: 'Peak: 5 MW × 3% loss = 150 kW. Low: 1.5 MW × 8% loss = 120 kW. Assuming 60% time at peak and 40% at low: Weighted loss = (150 × 0.6) + (120 × 0.4) = 138 kW. Annual: 138 kW × 8760h = 1.21 GWh. At $0.06/kWh = $72.5K wasted + cooling overhead.'
