title: Estimating Prefix Caching Savings
scenario: 'You are serving Llama-3-70B (80 layers, 8 KV heads, 128 head dimension, FP16 precision) on an 8x H100 cluster. You are processing a batch of 256 concurrent requests, all of which share the exact same 2048-token system prompt.'
question: "How much KV cache memory is saved when 256 requests share the same 2048-token system prompt via prefix caching?"
details:
  realistic_solution: Calculate the per-token KV cache size, multiply by the system prompt length to find the size per request, and then multiply by (Batch Size - 1) to find the redundant memory that is saved.
  common_mistake: |
    **The Pitfall:** Using the number of Query heads instead of KV heads, forgetting to multiply by the number of layers, or failing to subtract the 1 copy of the prompt that must be kept.
    **The Rationale:** Group Query Attention (GQA) means KV heads != Query heads. Caching calculations require precise accounting of all dimensions.
    **The Consequence:** Drastically overestimating or underestimating the memory savings from prefix caching, leading to incorrect batch size configurations and OOMs.
  napkin_math: |
    1. **Bytes per Token (per layer):** 2 (K and V) * 8 (KV heads) * 128 (head dim) * 2 bytes (FP16) = 4,096 bytes (4 KB).
    2. **Total per Token:** 4 KB * 80 layers = 320 KB.
    3. **Prompt Size:** 320 KB * 2048 tokens = 655,360 KB (640 MB).
    4. **Redundant Copies:** 256 requests - 1 kept copy = 255 redundant copies.
    5. **Total Savings:** 255 * 640 MB = 163,200 MB ≈ **159.3 GB** saved across the cluster.
