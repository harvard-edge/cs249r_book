title: Megatron-LM Column vs Row Parallelism for MLP Layers
scenario: A team is implementing Megatron-style tensor parallelism for a 13B model on A100 GPUs with TP=4. They are confused about whether to use column parallelism or row parallelism for the two linear layers in the MLP block (W1 of shape [H, 4H] and W2 of shape [4H, H]).
question: How should W1 and W2 in the TP=4 MLP block be split between column and row parallelism, and what communication is required?
details:
  realistic_solution: 'Apply column parallelism to W1 (split the output 4H dimension across GPUs) so no communication is needed before W1. Apply row parallelism to W2 (split the input 4H dimension). This pattern requires exactly one all-reduce operation after W2 to sum the partial results. This is the core elegance of Megatron-LM.'
  common_mistake: |
    **The Pitfall:** Applying column parallelism to both W1 and W2.
    **The Rationale:** It seems consistent to slice all matrices in the same dimension.
    **The Consequence:** This requires a massive all-gather before W2 to reconstruct the full intermediate activations, doubling the communication overhead per MLP block.
  napkin_math: |
    1. 13B model: Hidden H = 5120. FFN 4H = 20480. TP=4.
    2. **Column-parallel W1:** Each GPU holds [5120, 5120]. Output is [B, 5120] per GPU. No all-reduce needed.
    3. **Row-parallel W2:** Each GPU computes a partial output [B, 5120]. All-reduce sums these into the final [B, 5120].
    4. All-reduce payload size: $B \times 5120 \times 2\text{ bytes}$.
    5. At B=1, it is 10KB. At B=1024, it is 10MB.
    6. **10MB over 900GB/s NVLink takes just $\sim 11\mu\text{s}$, confirming the design's efficiency.**
