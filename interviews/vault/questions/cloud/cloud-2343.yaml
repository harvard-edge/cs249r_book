title: PCIe Switch Oversubscription in KV Paging
scenario: You are designing an LLM serving architecture on an 8-GPU PCIe server (PCIe Gen5 x16, 64 GB/s
  theoretical per GPU). To support massive concurrent batch sizes, you page KV caches (2 MB per token,
  4000 tokens = 8 GB per request) between Host RAM and GPU HBM. When serving 16 concurrent requests across
  the 8 GPUs, the host-to-device transfer latency spikes from 130ms to over 600ms, severely stalling token
  generation.
question: "Why do KV-cache host-to-GPU transfers spike above 600ms with 16 concurrent requests, and how should the allocator/scheduler account for PCIe topology?"
details:
  realistic_solution: 'The bottleneck is PCIe switch oversubscription. In standard 8-GPU servers, GPUs
    are grouped under PCIe switches (e.g., 4 GPUs per switch). While each GPU has a Gen5 x16 link to the
    switch, the switch itself often connects to the CPU Root Complex via a single Gen5 x16 upstream link.
    When multiple GPUs on the same switch pull from host memory simultaneously, they contend for this
    single upstream link. To resolve this, you must architect the memory allocator to be PCIe-topology
    aware: schedule DMA transfers to avoid concurrent host-to-device pulls on the same PCIe switch, or
    partition the KV cache workload so that GPUs primarily exchange data peer-to-peer via NVLink rather
    than falling back to host memory.'
  common_mistake: Assuming the host CPU memory bandwidth is the bottleneck, and trying to fix it by buying
    faster DDR5 RAM without analyzing the PCIe tree topology.
  napkin_math: 8 GPUs pulling 8 GB each = 64 GB total. If 4 GPUs share one PCIe Gen5 x16 upstream link
    (64 GB/s theoretical, ~50 GB/s practical limit), the transfer takes 32 GB / 50 GB/s = 640ms. If links
    were strictly independent, 8 GB / 50 GB/s = 160ms. The 4x slowdown exactly matches the 4:1 oversubscription
    ratio of the PCIe switch.
