title: RDMA Write vs RDMA Send for AllReduce
scenario: RDMA supports two one-sided operations: RDMA Write (sender writes directly to remote memory) and RDMA Read (sender reads from remote memory), plus two-sided Send/Receive. NCCL primarily uses RDMA Write for AllReduce data transfer.
question: Why does NCCL prefer RDMA Write over Send/Receive for a 256MB gradient transfer, and how much overhead does it avoid?
details:
  realistic_solution: '256MB at 400Gbps (50 GB/s): transfer time = 256MB/50GB/s = 5.12ms (not 51.2ms). At 5.12ms transfer, the 19.7ms Send/Recv overhead is 3.85× the transfer time — showing why RDMA Write is mandatory.'
  common_mistake: |
    **The Pitfall:** Thinking RDMA Write and Send/Receive are equivalent for bulk network transfers.
    **The Rationale:** Candidates assume that because both use the RDMA fabric, their performance is identical, failing to realize Send requires synchronous receiver involvement (pre-posted buffers).
    **The Consequence:** Using Send/Receive blocks the sender if the receiver is late, destroying asynchronous pipelining and bottlenecking the distributed training loop.
  napkin_math: |
    - **Transfer Time:** 256MB at 400Gbps (50 GB/s) = 256MB / 50 GB/s = **5.12ms**.
    - **Overhead Calculation:** Send/Recv extra overhead = post_recv (200ns) + recv_completion (100ns) = 300ns per message.
    - **Total Overhead (65,536 messages):** 65,536 × 300ns = **19.7ms**.
    - **Result:** The 19.7ms of polling overhead avoided by RDMA Write is nearly 4× larger than the 5.12ms transfer time itself.
