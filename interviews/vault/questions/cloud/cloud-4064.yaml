title: RDMA Write vs RDMA Send for AllReduce
scenario: 'RDMA supports two one-sided operations: RDMA Write (sender writes directly
  to remote memory) and RDMA Read (sender reads from remote memory), plus two-sided
  Send/Receive. NCCL primarily uses RDMA Write for AllReduce data transfer. Explain
  why RDMA Write is preferred over Send/Receive for bulk gradient transfers and what
  tradeoff this creates.'
question: Why does NCCL prefer RDMA Write over Send/Receive for a 256MB gradient transfer,
  and how much overhead does it avoid?
details:
  realistic_solution: '256MB at 400Gbps (50 GB/s): transfer time = 256MB/50GB/s =
    5.12ms (not 51.2ms). At 5.12ms transfer, the 19.7ms Send/Recv overhead is 3.85×
    the transfer time — showing why RDMA Write is mandatory.'
  common_mistake: Thinking RDMA Write and Send are equivalent for bulk transfers.
    Send requires the receiver to pre-post receive buffers (ibv_post_recv) before
    data arrives — if the receiver is late, the sender blocks. RDMA Write needs no
    receiver involvement, enabling asynchronous pipelining.
  napkin_math: 'Send/Recv overhead per message: post_recv = 200ns + recv_completion
    = 100ns. RDMA Write: just post_send = 200ns. For 65,536 messages in a 256MB transfer:
    Send/Recv extra overhead = 65,536 × 300ns = 19.7ms. At 400Gbps (50 GB/s), 256MB
    transfer takes 256MB/50GB/s = 5.12ms — the 19.7ms saving exceeds transfer time,
    showing polling overhead dominates for this message rate.'
