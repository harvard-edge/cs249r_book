title: MoE Capacity Factor Communication Overhead
scenario: >-
  You are training an 8-expert MoE model on an 8x A100 node (80 GB HBM2e,
  2.0 TB/s bandwidth, NVLink 900 GB/s), with 1 expert per GPU using expert parallelism.
  The global batch size is 16 and sequence length is 2048 (total 32,768 tokens). To
  reduce token dropping, the team increases the capacity factor from 1.0 to 1.5. However,
  profiling shows that the latency of the All-To-All communication step increases
  by exactly 50%, even though the total number of valid tokens routed among the GPUs
  remains exactly the same.
question: >-
  Why does raising the MoE capacity factor from 1.0 to 1.5 increase All-To-All
  latency by 50% even though valid routed tokens are unchanged?
details:
  realistic_solution: 'In standard expert parallelism, collective communication operations (like All-To-All) require statically sized buffers to avoid dynamic allocation and synchronization overheads. The buffer size for each expert is determined by the capacity factor: Capacity = (Total Tokens / Num Experts) * Capacity Factor. When the capacity factor increases from 1.0 to 1.5, the allocated buffer size increases proportionally. Because the system must transmit the entire buffer, including padding tokens used when an expert doesn''t reach full capacity, the total communication volume and latency increase by 50% regardless of the actual valid token distribution.'
  common_mistake: |
    **The Pitfall:** Assuming only valid, routed tokens are transmitted over the network.
    **The Rationale:** Candidates incorrectly attribute the slowdown to computation imbalance (load balancing) or NVLink congestion, failing to realize collective communication uses statically sized buffers including padding.
    **The Consequence:** Misdiagnosing network bottlenecks in MoE models and failing to optimize capacity factors properly.
  napkin_math: |
    1. **Total tokens:** 16 × 2048 = 32,768.
    2. **Base capacity per expert (CF=1.0):** 32,768 / 8 = 4,096 tokens.
    3. **With CF=1.5 capacity:** 4,096 × 1.5 = 6,144 tokens.
    4. **All-To-All buffer sent per GPU (CF=1.0):** 8 experts × 4096 tokens × 8192 B = 268.4 MB.
    5. **All-To-All buffer sent per GPU (CF=1.5):** 8 experts × 6144 tokens × 8192 B = 402.6 MB.
    6. **Increase:** 402.6 / 268.4 = **1.5x increase in communication volume.**
