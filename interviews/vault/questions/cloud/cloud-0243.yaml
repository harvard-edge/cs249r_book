title: The B200's Architectural Balance
scenario: NVIDIA's B200 GPU is specified with 2,250 TFLOPS of FP16 compute and 8.0 TB/s of HBM3e memory bandwidth.
question: What is the B200's ridge point from 2,250 TFLOPS and 8.0 TB/s, and what does it imply for efficient workloads?
details:
  realistic_solution: The ridge point defines the architectural balance of an accelerator by calculating the ratio of its peak compute to its peak memory bandwidth. It tells you the minimum arithmetic intensity (measured in Ops/Byte) a workload must have to become compute-bound rather than memory-bound. For the B200, you divide its FP16 TFLOPS by its HBM TB/s. The resulting value means that for every byte of data moved from HBM, a program must perform at least 281 floating-point operations to fully saturate the compute units.
  common_mistake: |
    **The Pitfall:** Mismatching units or inverting the ratio when calculating the ridge point.
    **The Rationale:** Candidates often confuse Terabits per second (Tb/s) with Terabytes per second (TB/s), resulting in an 8x error, or they calculate Bytes/Op instead of Ops/Byte, which obscures the meaning of arithmetic intensity.
    **The Consequence:** Incorrectly predicting whether a workload will be compute-bound or memory-bound on the target hardware.
  napkin_math: |
    - **Peak Compute:** 2,250 × 10^12 FLOPS.
    - **Peak Bandwidth:** 8.0 × 10^12 Bytes/s.
    - **Ridge Point Calculation:** (2,250 × 10^12) / (8.0 × 10^12) = **281.25 FLOPs/Byte**.
    - **Conclusion:** For every byte fetched from HBM3e memory, the B200 must perform at least **~281** floating-point operations to fully utilize its compute cores.
  options:
  - ~295 Ops/Byte, because it's similar to the H100.
  - ~2,250 Ops/Byte, assuming bandwidth was specified in Tb/s.
  - ~0.0035 Bytes/Op, because the ratio was inverted.
  - ~281 Ops/Byte, indicating it's a compute-bound architecture.
  correct_index: 3
