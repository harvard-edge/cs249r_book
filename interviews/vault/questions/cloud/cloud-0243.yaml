title: The B200's Architectural Balance
scenario: NVIDIA's B200 GPU is specified with 2,250 TFLOPS of FP16 compute and 8.0 TB/s of HBM3e memory
  bandwidth. Explain how to calculate the GPU's ridge point and interpret what this value tells you about
  the types of workloads that will run efficiently on it.
question: "What is the B200's ridge point from 2,250 TFLOPS and 8.0 TB/s, and what does it imply for efficient workloads?"
details:
  realistic_solution: The ridge point defines the architectural balance of an accelerator by calculating
    the ratio of its peak compute to its peak memory bandwidth. It tells you the minimum arithmetic intensity
    (measured in Ops/Byte) a workload must have to become compute-bound rather than memory-bound. For
    the B200, you divide its FP16 TFLOPS by its HBM TB/s. The resulting value of ~281 Ops/Byte means that
    for every byte of data moved from HBM, a program must perform at least 281 floating-point operations
    to fully saturate the compute units.
  common_mistake: A frequent error is mismatching units, such as confusing Terabits per second (Tb/s)
    with Terabytes per second (TB/s), which results in an 8x error. Another is inverting the ratio, calculating
    Bytes/Op instead of Ops/Byte, which obscures the meaning of arithmetic intensity.
  napkin_math: Ridge Point = (2,250 * 10^12 FLOPS) / (8.0 * 10^12 Bytes/s) = 281.25 FLOPs/Byte. This means
    for every byte of data fetched from HBM3e memory, the B200 must perform at least 281.25 floating-point
    operations to fully utilize its compute cores. If a workload has a lower ratio, the 2,250 TFLOPS cannot
    be reached, and performance is bottlenecked by the 8.0 TB/s memory wall.
  options:
  - ~295 Ops/Byte, because it's similar to the H100.
  - ~2,250 Ops/Byte, assuming bandwidth was specified in Tb/s.
  - ~0.0035 Bytes/Op, because the ratio was inverted.
  - ~281 Ops/Byte, indicating it's a compute-bound architecture.
  correct_index: 3
