title: MoE Shared Expert Architecture
scenario: DeepSeek-V3 uses a 'shared expert' design where 1 expert is always activated
  for every token alongside 8 routed experts selected from 256. Your team is designing
  a new MoE architecture and debates whether to include shared experts. What are the
  system-level implications?
question: Does adding one shared expert alongside 8 routed experts reduce MoE all-to-all
  communication, and what bottleneck can it introduce?
details:
  realistic_solution: Both routing configurations send 8 experts' worth of all-to-all
    communication. The communication reduction claim is incorrect — routing 8 experts
    via all-to-all in both configs produces similar communication volume.
  common_mistake: 'Viewing shared experts as purely a model quality decision. The
    systems implications are significant: the shared expert becomes a serialization
    bottleneck since every token must pass through it.'
  napkin_math: 'MoE routing: 8 experts, top-2 routing. Expert parallelism: each GPU
    handles some experts. All-to-all communication volume = tokens × top-k × hidden_dim
    × 2 (send + receive). For batch=1024 tokens, hidden=4096, top-2: 1024 × 2 × 4096
    × 2B = 16MB per all-to-all. Both standard EP=8 and EP=16 configurations route
    same tokens to 2 experts each — total communication reduction claim is incorrect
    when expert count changes don''t affect top-k.'
