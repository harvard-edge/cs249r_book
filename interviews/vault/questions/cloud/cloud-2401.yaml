title: TEEs for Cloud Medical Inference
scenario: Deploying a 5GB Vision Transformer (ViT-L) for medical image diagnosis (1024x1024 resolution)
  on public cloud infrastructure. Strict HIPAA mandates require data-in-use encryption. Expected peak
  load is 200 QPS. You must utilize Trusted Execution Environments (TEEs) but mitigate the severe performance
  and memory bottlenecks inherent to enclave boundaries.
details:
  realistic_solution: Utilize Confidential VMs (e.g., AMD SEV-SNP or Intel TDX) paired with Confidential
    GPUs (e.g., NVIDIA H100 with CC enabled). CPU TEEs strictly limit enclave memory (often 128MB-512MB
    natively without paging penalties) and lack parallel compute. Confidential GPUs provide full memory
    encryption at hardware speed but introduce latency during CPU-to-GPU memory transfers via PCIe due
    to bounce buffers and encryption overhead. To amortize this PCIe encryption penalty, implement dynamic
    batching. The tradeoff here is slightly increased baseline latency (waiting for the batch window)
    in exchange for massively higher throughput and strict compliance with data-in-use encryption regulations.
  common_mistake: Using CPU-based TEEs (like Intel SGX) for the entire model, which lacks the memory bandwidth
    and compute required for ViT-L, resulting in massive OOMs and multi-second latencies.
  napkin_math: 1024x1024x3 image = ~3MB. Target batch size = 8 (24MB total). PCIe 5.0 x16 theoretical
    bandwidth is 64GB/s, but C-GPU encryption bounce-buffer overhead drops effective bandwidth to ~10GB/s.
    Transferring 24MB takes ~2.4ms. ViT-L forward pass on H100 for BS=8 is ~15ms. Total hardware execution
    time per batch = ~17.4ms. To support 200 QPS, we need 200/8 = 25 batches/sec (40ms interval). Dynamic
    batching window of 40ms + 17.4ms execution = 57.4ms worst-case end-to-end latency, easily supporting
    the throughput while maintaining TEE protections.
