title: Real-time ML Output Drift Detection on AMD MI300X
scenario: Your team is responsible for a critical generative AI service deployed on AMD MI300X accelerators in a cloud environment. This service processes millions of requests per second, generating 1024-dimensional FP16 embeddings as part of its output. You need to ensure the reliability of these outputs by detecting data drift in real-time.
question: How would you build real-time drift detection for 1024-D FP16 embeddings on MI300X while minimizing serving overhead?
details:
  realistic_solution: Implement a real-time drift detection pipeline that samples
    a statistically significant fraction of the MI300X's output embeddings directly
    from HBM3 buffers. Utilize statistical metrics like KL divergence or Population
    Stability Index (PSI) to compare the current distribution of embeddings against
    a known baseline. Integrate this with an automated alerting system that triggers
    when drift exceeds predefined thresholds, allowing for immediate investigation
    and potential model retraining or rollback. This entire process should be optimized
    to run efficiently on the MI300X itself, minimizing overhead.
  common_mistake: |
    **The Pitfall:** Neglecting to implement continuous, low-latency monitoring directly on the accelerator.
    **The Rationale:** Candidates assume post-deployment A/B tests or CPU-bound offline validation are sufficient for high-velocity output monitoring.
    **The Consequence:** Silent degradation of model quality and negative user experiences before distribution drift is detected.
  napkin_math: |
    1. **Assumptions & Constraints:** 1024-dimensional FP16 embeddings (2 KB each), MI300X with 192 GB HBM3, 50% allocated to monitoring.
    2. **Calculations:** Embedding size = 1024 * 2 bytes = 2 KB. HBM3 limit = 192 GB. 50% allocation = 96 GB. Total embeddings in 96 GB = 96 GB / 2 KB = 48 million.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound (Capacity). The HBM3 can hold 48 batches of 1 million embeddings, enabling zero-copy real-time statistical tests like KL divergence.**
