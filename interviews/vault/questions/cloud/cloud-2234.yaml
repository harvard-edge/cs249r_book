title: The Data Gravity Problem
scenario: Your organization trains models on an on-premise GPU cluster (2,048 H100s) but stores all training
  data in a cloud object store (S3) because it is cheaper and 'infinitely scalable.' The cluster connects
  to the cloud via a 400 Gbps dedicated link. A new multimodal training job requires 200 TB of image-text
  pairs. The team estimates 8 epochs over 2 weeks. After starting, they discover the job will take 6 weeks
  instead. Diagnose the bottleneck and propose a storage architecture that resolves the data gravity problem.
details:
  realistic_solution: 'The 400 Gbps link provides 50 GB/s — respectable for one-time transfers, but catastrophic
    for iterative training. Each epoch reads the full 200 TB dataset. Over 8 epochs: $200 \times 8 = 1{,}600$
    TB of data must traverse the link. At 50 GB/s: $1{,}600{,}000 \text{ GB} / 50 \text{ GB/s} = 32{,}000\text{s}
    = 8.9$ hours per epoch just for data transfer. But training compute per epoch might only be 4-5 hours
    — data transfer dominates. With contention, retries, and S3 GET latency, effective throughput drops
    to ~30 GB/s, pushing epoch data time to ~15 hours. The fix is a hierarchical caching architecture:
    (1) One-time bulk transfer: copy the entire 200 TB dataset to on-premise Lustre before training starts
    (takes ~67 minutes at 50 GB/s). (2) Lustre serves as the warm tier at 500 GB/s aggregate. (3) Each
    node caches its data shards on local NVMe after the first epoch. (4) S3 remains the source of truth
    for versioning and durability. This eliminates repeated cross-WAN reads and keeps all 8 epochs at
    local storage speed.'
  common_mistake: Trying to fix this by adding more network bandwidth. The fundamental issue is that 200
    TB of data has 'gravitational pull' — it is cheaper to move compute to where the data lives than to
    continuously pipe data to where the compute lives.
  napkin_math: 'One-time S3→Lustre copy: $200\text{ TB} / 50\text{ GB/s} = 4{,}000\text{s} \approx 67\text{
    min}$. Per-epoch from Lustre: $200\text{ TB} / 500\text{ GB/s} = 400\text{s} \approx 7\text{ min}$
    aggregate (pipelined with compute, effectively hidden). Per-epoch from S3: $200\text{ TB} / 30\text{
    GB/s} = 6{,}667\text{s} \approx 1.85\text{ hours}$ (not hideable — dominates). 8 epochs from S3: $8
    \times 1.85 = 14.8$ hours of pure I/O wait. 8 epochs from Lustre: 0 hours (fully pipelined). The 67-minute
    one-time copy saves 14.8 hours of training time worth $\sim\$20{,}000$ in GPU-hours.'
  options:
  - 'FSDP (Fully Sharded Data Parallel) is PyTorch''s implementation of ZeRO Stage 3: it shards parameters,
    gradients, and optimizer states across all GPUs. Before each forward/backward layer computation, FSDP
    executes an AllGather to reconstruct full parameters from all shards, computes, then discards the
    non-local shards. After backward, a ReduceScatter synchronizes gradients. Per-GPU memory is reduced
    by ~N× for N GPUs.'
  - FSDP shards only the optimizer states (like ZeRO Stage 1); parameter and gradient sharding is handled
    separately by PyTorch's DDP module running on top of FSDP
  - FSDP reduces memory by offloading parameters to CPU between layers; the 'sharding' refers to distributing
    CPU offload buffers across machines, not GPU-to-GPU partitioning
  - FSDP requires all GPUs to be on the same node connected via NVLink; it cannot work across nodes because
    AllGather latency over InfiniBand would be prohibitively high
