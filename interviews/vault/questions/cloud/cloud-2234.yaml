title: The Data Gravity Problem
scenario: Your organization trains models on an on-premise GPU cluster (2,048 H100s) but stores all training
  data in a cloud object store (S3) because it is cheaper and 'infinitely scalable.' The cluster connects
  to the cloud via a 400 Gbps dedicated link. A new multimodal training job requires 200 TB of image-text
  pairs. The team estimates 8 epochs over 40 hours. After starting, they discover the job will take 55 hours instead. Diagnose the bottleneck and propose a storage architecture that resolves the data gravity problem.
question: "What bottleneck made the 200 TB S3-backed training job slip to 55 hours, and what storage architecture fixes the data gravity problem?"
details:
  realistic_solution: 'The 400 Gbps link provides 50 GB/s — respectable for large sequential transfers, but catastrophic for iterative training with small files. While compute takes 5 hours per epoch (40 hours / 8), streaming from S3 encounters contention and GET latency. Effective throughput drops to ~8 GB/s, pushing epoch data time to ~6.9 hours. Because data loading is slower than compute, the GPUs are starved, and each epoch takes 6.9 hours (total ~55 hours). The fix is a hierarchical caching architecture: (1) One-time bulk transfer: copy the entire 200 TB dataset to on-premise Lustre before training starts (takes ~67 minutes at 50 GB/s using sequential reads). (2) Lustre serves as the warm tier at 500 GB/s aggregate. (3) Each node caches its data shards on local NVMe after the first epoch. (4) S3 remains the source of truth for versioning and durability. This eliminates repeated cross-WAN reads and keeps all 8 epochs compute-bound.'
  common_mistake: Trying to fix this by adding more network bandwidth. The fundamental issue is that 200
    TB of data has 'gravitational pull' — it is cheaper to move compute to where the data lives than to
    continuously pipe data to where the compute lives.
  napkin_math: 'Compute time per epoch: 40 hrs / 8 = 5 hrs. One-time S3→Lustre copy (sequential): 200 TB / 50 GB/s = 4,000s ≈ 67 min. Per-epoch from Lustre: 200 TB / 500 GB/s = 400s (fully hidden behind 5 hr compute). Per-epoch from S3 (random GETs): throughput drops to ~8 GB/s. 200 TB / 8 GB/s = 25,000s ≈ 6.9 hours. Since 6.9 hrs > 5 hrs compute, data loading becomes the bottleneck, extending epoch time by ~1.9 hours. 8 epochs * 1.9 hrs = 15.2 hours of pure I/O wait. The 67-minute one-time copy saves ~15 hours of training time, saving >$90,000 in GPU-hours (2048 GPUs * 15 hrs * $3/hr).'
