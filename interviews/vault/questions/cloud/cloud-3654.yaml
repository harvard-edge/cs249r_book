title: Kubernetes GPU Scheduling Fragmentation with H100 MIG
scenario: Your Kubernetes cluster has 8 H100 (80GB HBM3) nodes, each with 8 GPUs configured with MIG in a 3g.40gb profile (2 instances per GPU). A deployment requests 14 GPUs. The pod fails to schedule even though 16 MIG instances are available. GPU utilization across the cluster is 60%.
question: Why does the 14-GPU pod fail to schedule despite 16 MIG instances, and how would you fix the Kubernetes configuration?
details:
  realistic_solution: 'Deploy the NVIDIA MIG Kubernetes device plugin which exposes resources as nvidia.com/mig-3g.40gb. Update pod spec to request nvidia.com/mig-3g.40gb: 14. Ensure node labels reflect MIG configuration and that the GPU Operator is installed to manage MIG mode dynamically. Use node affinity to route MIG workloads to MIG-configured nodes.'
  common_mistake: |
    **The Pitfall:** Assuming Kubernetes' default GPU plugin can schedule MIG instances.
    **The Rationale:** The standard nvidia.com/gpu resource does not understand MIG profiles.
    **The Consequence:** Kubernetes sees only full GPUs, causing scheduling failure despite available capacity.
  napkin_math: |
    - 8 nodes * 8 GPUs * 2 MIG instances = 128 MIG instances total.
    - At 60% utilization: 77 in use, 51 available.
    - Request of 14 MIG instances.
    - Each 3g.40gb MIG slice gets 40GB HBM + ~420GB/s bandwidth (3/7 of full H100).
    - Result: **Scheduling fails on resource type mismatch, not capacity.**
