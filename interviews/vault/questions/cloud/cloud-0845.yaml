title: Calculate Activation Checkpointing Memory Savings
scenario: You are training a 2B parameter Transformer on a single 80GB A100 GPU using mixed precision
  (FP16). The model state (weights, gradients, Adam optimizer) consumes 32GB. Your batch size is 32, sequence
  length is 2048, and the model has 24 layers. Without checkpointing, the forward pass stores 4.5GB of
  activations per layer. If you apply activation checkpointing at every layer boundary, where the boundary
  tensor size is 256MB, calculate the peak activation memory during training and determine if the model
  will OOM.
question: "What is the peak activation memory with layer-boundary checkpointing, and will the 2B model OOM on an 80GB A100?"
details:
  realistic_solution: 'Calculate the stored checkpoint memory: 24 layers * 256MB/layer = 6.0GB. Add the
    peak memory required to recompute a single layer during the backward pass: 4.5GB. Total peak activation
    memory is 6.0GB + 4.5GB = 10.5GB. Total GPU memory is 32GB (model state) + 10.5GB = 42.5GB, which
    fits well within the 80GB A100 limit without OOM.'
  common_mistake: Candidates often forget to add the memory of the currently executing layer's full activations
    to the total size of the stored checkpoints, assuming only the checkpoints consume memory.
  napkin_math: Stored checkpoints = 24 * 0.25GB = 6GB. Recomputation peak = 4.5GB. Total activation memory
    = 6GB + 4.5GB = 10.5GB. Total peak GPU memory = 32GB (model) + 10.5GB (activations) = 42.5GB < 80GB
    (No OOM).
