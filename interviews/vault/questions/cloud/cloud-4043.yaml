title: Local SGD vs AllReduce at Scale
scenario: 'Compare two gradient synchronization strategies for a 2048-MI300X cluster
  training a 70B LLM: (A) AllReduce every iteration with 4GB gradients, and (B) Local
  SGD where each GPU trains independently for K=16 iterations, then synchronizes by
  averaging model weights. Evaluate wall-clock time, convergence, and network utilization.'
question: For the 2048-MI300X 70B LLM run, how do AllReduce every iteration and Local
  SGD with K=16 compare in time, convergence, and network use?
details:
  realistic_solution: 'Strategy A (AllReduce every iteration): Communication per iteration:
    2 × 2047/2048 × 4GB / 50GB/s = 160ms. Computation: ~300ms for 70B model forward+backward
    on MI300X. Iteration time: max(300, 160) with ~85% overlap = 300 + 160×0.15 =
    324ms. Strategy B (Local SGD, K=16): Communication every 16 iterations: model
    weight sync = 70B × 2 bytes FP16 = 140GB AllReduce = 2 × 2047/2048 × 140GB / 50GB/s
    = 5.6 seconds. Amortized per iteration: 5.6s/16 = 350ms. Local iteration time:
    300ms (no communication). Effective iteration time: 300 + 21.9ms = 321.9ms — similar!
    But convergence: Local SGD with K=16 on a 70B model typically requires 1.5-2×
    more total iterations, so 170K vs 100K. Total network traffic for Local SGD: 170K/16
    × 140GB = 1,487 TB vs AllReduce 400 TB — Local SGD uses 3.7× more total bandwidth.
    Net wall-clock: A = 324ms × I. B = 321.9ms × 1.7I — B is 1.69× slower. Verdict:
    AllReduce wins for 70B LLMs.'
  common_mistake: Assuming Local SGD and AllReduce produce identical models. Local
    SGD allows model replicas to diverge for K iterations, which introduces implicit
    regularization but can also cause model divergence if K is too large or learning
    rate is too high.
  napkin_math: 'AllReduce: 324ms/iter × 100K iters = 9 hours. Local SGD: 322ms/iter
    × 170K iters = 15.2 hours. Network traffic: AllReduce = 4GB × 100K = 400 TB. Local
    SGD = 170K/16 × 140GB = 140GB × 10,625 syncs = 1,487 TB. Local SGD uses 3.7× more
    network traffic despite communicating less frequently because it syncs full weights
    (140GB) instead of gradients (4GB), and requires 1.7× more iterations.'
