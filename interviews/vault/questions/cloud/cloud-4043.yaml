title: Local SGD vs AllReduce at Scale
scenario: 'Compare two gradient synchronization strategies for a 2048-GPU cluster training a 70B LLM: (A) AllReduce every iteration with 4GB gradients, and (B) Local SGD where each GPU trains independently for K=16 iterations, then synchronizes by averaging model weights.'
question: "Evaluate wall-clock time, convergence, and network utilization to determine whether AllReduce or Local SGD is superior for this run."
details:
  realistic_solution: Strategy A (AllReduce every iteration) is superior. While Local SGD reduces synchronization frequency, it requires transmitting the full model weights (140GB for FP16) rather than gradients (4GB) at each sync. Furthermore, Local SGD on massive LLMs typically requires 1.5-2x more total iterations to converge due to implicit regularization divergence.
  common_mistake: |
    **The Pitfall:** Assuming Local SGD always reduces network overhead just because it syncs less frequently.
    **The Rationale:** Candidates focus on the K=16 interval but forget that Local SGD must synchronize the full weights (140GB) rather than gradients (4GB), and ignores the convergence penalty (1.5-2x more iterations).
    **The Consequence:** Choosing an architecture that severely inflates network traffic and extends total training wall-clock time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2048 GPUs, 70B LLM.
       - AllReduce gradients: 4 GB per iteration.
       - Local SGD weights: 140 GB per sync, every 16 iterations.
       - Convergence: Local SGD needs ~1.7x more iterations (170K vs 100K).
    2. **Calculations:**
       - AllReduce traffic: 4 GB * 100,000 = 400 TB total.
       - Local SGD syncs: 170,000 / 16 = 10,625 syncs.
       - Local SGD traffic: 10,625 * 140 GB = 1,487 TB total.
       - Network traffic multiplier: 1,487 TB / 400 TB = ~3.7x more traffic.
    3. **Conclusion & Interpretation:**
       - **Result: AllReduce Wins.** Local SGD is **Network-Bound** overall, consuming 3.7x more total bandwidth and taking ~1.69x longer wall-clock time to converge.
