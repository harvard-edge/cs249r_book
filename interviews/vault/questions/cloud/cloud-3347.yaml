title: NVIDIA H100 Rack Power and PUE Analysis
scenario: Your team is planning to deploy a new AI training cluster for large language models. You opt for NVIDIA H100 GPUs, each consuming a peak of 700W. The existing datacenter has a Power Usage Effectiveness (PUE) of 1.6, and its infrastructure has a strict power limit of 15 kW per rack. You intend to populate each rack with 16 GPUs.
question: How would you calculate whether 16 700W H100s fit in a 15 kW rack and estimate grid power at PUE 1.6?
details:
  realistic_solution: A realistic solution requires calculating the total IT load per rack (16 GPUs * 700W/GPU plus a reasonable overhead for CPU/memory/networking – let's assume 10% overhead for simplicity). This total IT load is then compared against the 15 kW rack budget. The total power drawn from the utility grid is estimated by multiplying the IT load by the datacenter's PUE (1.6). If the rack's IT load exceeds its power budget, options include reducing the number of GPUs per rack, upgrading power infrastructure, or exploring advanced cooling solutions like liquid cooling (which could also lower PUE) to increase rack density.
  common_mistake: |
    **The Pitfall:** Neglecting the datacenter PUE factor when calculating the power draw, or ignoring per-rack limits.
    **The Rationale:** Infrastructure engineers focus purely on the IT load (GPU + CPU wattage) and forget the massive cooling and distribution overhead required by the building.
    **The Consequence:** The deployment causes catastrophic breaker trips, or the team faces massive hidden operational costs from the utility grid.
  napkin_math: |
    1. Calculate GPU IT load per rack: 16 GPUs * 700 W/GPU = 11,200 W = 11.2 kW.
    2. Verify against the rack budget: The 11.2 kW load safely fits under the 15 kW physical rack limit.
    3. Calculate total utility grid power required per rack using PUE: 11.2 kW (IT Load) * 1.6 (PUE) = 17.92 kW.
    **Each rack will pull 17.92 kW from the utility grid, resulting in high cooling/overhead costs.**
