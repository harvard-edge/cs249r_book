title: InfiniBand Architecture Fundamentals
scenario: InfiniBand is the dominant interconnect for large-scale ML training clusters.
question: What are HCAs, subnet managers, queue pairs, and virtual lanes in InfiniBand, and how do they enable RDMA on a 256-H100 cluster?
details:
  realistic_solution: 'Key components: (1) HCA (Host Channel Adapter): the IB equivalent of a NIC. On H100 systems, ConnectX-7 HCAs provide 400Gbps (NDR) with hardware RDMA engines. Each H100 node has 8 HCAs. (2) Subnet Manager (SM): a centralized controller that discovers the fabric topology, computes routes, and programs every switch. (3) Queue Pairs (QPs): the fundamental communication abstraction. Each connection between two GPUs uses a QP pair. NCCL creates one QP per peer per rail. (4) Virtual Lanes (VLs): IB supports up to 16 VLs per port for traffic isolation and deadlock avoidance, using credit-based flow control.'
  common_mistake: |
    **The Pitfall:** Treating InfiniBand as "just a fast Ethernet."
    **The Rationale:** Engineers with web-scale networking backgrounds assume best-effort packet switching applies everywhere.
    **The Consequence:** Failing to understand that InfiniBand is a channel-based fabric with centralized deterministic routing and hardware-enforced flow control, leading to sub-optimal topology designs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 256 H100 nodes, 8 HCAs per node.
       - 400 Gbps per HCA.
    2. **Calculations:**
       - Total HCA ports: 256 * 8 = 2048 ports.
       - Fabric bandwidth: 2048 * 400 Gbps = 819.2 Tbps.
       - QPs per node (8 rails, 255 peers): 255 * 8 = 2040 QPs.
       - QP memory footprint on HCA (~1KB/QP): 2040 * 1KB ~ 2MB.
       - SM routing table entries: 2048 * 2048 = ~4M entries.
    3. **Conclusion & Interpretation:**
       - **Result: Scale-Bound. The centralized Subnet Manager must compute and distribute a ~4M entry deterministic routing table, contrasting sharply with distributed Ethernet spanning trees.**
