title: 'Systolic Array Analyze: Why TPU v5e Outperforms GPU for Matrix Multiply'
scenario: Explain why a TPU v5e (197 TFLOPS BF16) can often outperform an H100 (1979 TFLOPS BF16) for
  inference on a BERT-large workload, despite having 10x lower peak FLOP rate. Use arithmetic intensity,
  data reuse, and the weight-stationary dataflow to analyze the performance gap.
question: "What H100 FP16 throughput and aggregate effective PFLOPs should be used for 256 H100s at 45% MFU?"
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. 256 H100s at 45% MFU provide 113.8 PFLOPs/s aggregate.'
  common_mistake: Equating peak TFLOPS with real-world throughput without considering that the systolic
    array's weight-stationary dataflow achieves near-100% weight reuse, eliminating memory bandwidth as
    a bottleneck for batch inference.
  napkin_math: 'H100 at 989 TFLOPS FP16 (not 1979). Training time for 65B model on 256 H100s: 6×65B×tokens
    / (989T×256×MFU). At MFU=0.45: effective = 989×256×0.45 = 113,810 TFLOPS = 113.8 PFLOPs/s. For 1.4T
    tokens: 6×65B×1.4T = 5.46×10^23 FLOPs. Time = 5.46×10^23/1.138×10^17 = 4.8×10^6s = 55 days.'
