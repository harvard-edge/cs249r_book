title: MoE AllToAll Communication Time
scenario: You are deploying a Mixture-of-Experts (MoE) model on an 8-GPU HGX A100 node connected via NVSwitch.
  Each GPU provides 600 GB/s of bidirectional NVLink bandwidth. During the expert routing phase, each
  GPU must send exactly 1.5 GB of token data to each of the other 7 GPUs in the node. Calculate the minimum
  theoretical time required to complete this AllToAll communication step.
details:
  realistic_solution: In an AllToAll operation on a fully connected topology like NVSwitch, the bottleneck
    is the individual GPU's network interface. Each GPU sends 1.5 GB to 7 peers, totaling 10.5 GB of egress
    data. The correct bandwidth to use is the unidirectional egress bandwidth (300 GB/s, half of the bidirectional
    600 GB/s spec), since the egress payload travels in one direction. Transfer time = 10.5 GB / 300 GB/s
    = 35 ms.
  common_mistake: Calculating the aggregate data across the entire node (84 GB) and dividing by an aggregate
    bandwidth metric, or mistakenly assuming a GPU must send data to itself over the network.
  napkin_math: In an AllToAll operation on a fully non-blocking topology like NVSwitch, each of the 8
    GPUs sends 1.5 GB to 7 peers simultaneously. Total egress per GPU = 1.5 GB * 7 = 10.5 GB. The bottleneck
    is the GPU's unidirectional egress bandwidth of 300 GB/s (half of the 600 GB/s bidirectional spec).
    The theoretical minimum transfer time is 10.5 GB / 300 GB/s = 0.035 seconds, or 35 ms.
