math_issues:
- 'Dimensional logic error: The time to transmit 10.5 GB of egress data in an AllToAll operation is limited
  by the unidirectional egress bandwidth (300 GB/s), not the combined bidirectional bandwidth (600 GB/s).
  Dividing the one-way payload by the bidirectional bandwidth yields an impossible 17.5 ms transfer time;
  it should be 10.5 / 300 = 35 ms.'
