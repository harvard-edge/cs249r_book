title: The Translation Service Traffic Jam
scenario: You are the ML Systems Engineer for a new real-time translation API that uses a 13B parameter
  LLM hosted on H100 GPUs. Users are complaining about unpredictable freezes, where the service feels
  responsive one moment and hangs the next. Your dashboard shows that average Time To First Token (TTFT)
  is acceptable at ~110ms, but the P99 TTFT is spiking to over 500ms during peak traffic. The service
  uses static batching with a fixed timeout of 100ms to collect requests. GPU utilization is consistently
  high (90%+). Based on this data, diagnose the most likely cause of the P99 latency spikes.
details:
  realistic_solution: The most likely cause is head-of-line blocking due to the static 100ms batching
    timeout. A request arriving at the beginning of a window must wait the full 100ms for the batch to
    be dispatched, even if the GPU is free. Under load, this wait time cascades, causing a long queue
    to form and leading to high P99 latency. The correct solution is to replace static batching with continuous
    batching (also known as in-flight batching). This allows the system to add new requests to the currently
    running batch, decoupling the arrival of requests from the batch dispatch schedule and minimizing
    idle time and queue length.
  common_mistake: Engineers often misdiagnose this as a raw throughput problem and try to solve it by
    either adding more hardware (which doesn't fix the scheduling issue) or by shrinking the batch size
    (which destroys throughput and makes the queue even longer). They fail to see that the core issue
    is head-of-line blocking caused by the static batching window.
  napkin_math: 'Let''s analyze the worst-case scenario for a single request with static batching:'
  options:
  - The model is too large for the H100, causing compute delays. We should use a smaller model or upgrade
    to B200s.
  - The static batching timeout is causing head-of-line blocking. We should switch to a continuous batching
    strategy.
  - Network latency between the user and the server is fluctuating, causing the P99 spikes.
  - The batch size is too large. We should reduce the batch size to process individual requests faster.
  correct_index: 1
