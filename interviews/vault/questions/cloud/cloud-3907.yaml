title: Cross-Platform Model Numerics Divergence Debugging
scenario: Your model produces identical outputs on A100 and H100 but gives slightly different logits on MI300X (max absolute difference of 0.003 in FP16). Quality metrics drop by 0.2% on MI300X.
question: How would you determine whether the 0.003 FP16 logit difference and 0.2% quality drop on MI300X are a bug or numerical noise?
details:
  realistic_solution: 'Systematic debugging: (1) Run in FP32 on both platforms — if differences vanish, it is FP16 reduction-order sensitivity, not a bug. (2) Check if the difference is in specific layers (often softmax or LayerNorm, which are numerically sensitive). (3) MI300X''s MFMA instructions use different accumulation orders than NVIDIA''s Tensor Cores, causing legally different FP16 rounding. (4) The 0.2% quality drop may be within noise — run statistical significance tests over 1000+ samples. Typically, differences <10 epsilon with no statistically significant quality impact are acceptable numerical noise.'
  common_mistake: |
    **The Pitfall:** Declaring any numerical difference as a bug.
    **The Rationale:** Engineers assume floating-point math is perfectly deterministic across different architectures.
    **The Consequence:** Wasting weeks trying to fix acceptable hardware-level accumulation variations.
  napkin_math: |
    1. FP16 relative epsilon: 2^(-10) = 9.77e-4.
    2. Calculate relative error: Max diff 0.003 on logit values ~1.0 = 0.3%.
    3. Evaluate epsilon threshold: 0.3% ≈ 3 epsilon.
    **Final Result: ~3 epsilon difference is within normal floating-point non-determinism for different hardware.**
