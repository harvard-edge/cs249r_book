title: Cross-Platform Model Numerics Divergence Debugging
scenario: Your model produces identical outputs on NVIDIA GPUs but gives slightly different logits on AMD MI300X (max absolute diff of 0.003 in FP16). Quality metrics drop by 0.2%.
question: How would you determine whether the 0.003 FP16 logit difference and 0.2% quality drop are a bug or numerical noise?
details:
  realistic_solution: 'Run in FP32. If differences vanish, it is hardware-level FP16 reduction-order sensitivity (MFMA vs Tensor Cores), not a bug. Differences <10 epsilon are standard hardware noise.'
  common_mistake: |
    **The Pitfall:** Declaring any numerical difference as a bug.
    **The Rationale:** Engineers assume floating-point math is perfectly deterministic across different hardware architectures.
    **The Consequence:** Wasting weeks trying to fix acceptable hardware-level accumulation variations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max difference = 0.003 on logits around 1.0.
    - FP16 epsilon = 9.77e-4.

    **Calculations:**
    - Relative error = 0.003 / 1.0 = 0.3%.
    - Epsilon scale = 0.003 / 0.000977 = ~3.07 epsilons.

    **Conclusion & Interpretation:**
    - **Result: Hardware Noise (~3 epsilon difference is acceptable non-determinism).**
