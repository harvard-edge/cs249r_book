title: 'The RAG Retrieval Tax: Compound AI Systems'
scenario: 'Your team is deploying a new Retrieval-Augmented Generation (RAG) model. During the rollout, you notice P99 latency is much higher than expected. A profiler shows that the ''retrieval'' step, which fetches context from an NVMe SSD-backed vector database, is the bottleneck.'
question: "Roughly how much slower is a single read from an NVMe SSD compared to the model accessing its own parameters in HBM3 memory?"
details:
  realistic_solution: An NVMe SSD read is approximately 333x slower than an HBM3 access. A typical HBM3 access is around 300 ns, while a read from an NVMe SSD is about 100,000 ns (100 μs). This three-orders-of-magnitude gap is a foundational constraint in designing performant RAG systems, necessitating aggressive caching and optimization of the retrieval step.
  common_mistake: |
    **The Pitfall:** Confusing the SSD-vs-HBM latency gap with the SSD-vs-L1 cache gap, or drastically underestimating it.
    **The Rationale:** Modern SSDs are "fast", so engineers often assume they are only 10-50x slower than GPU memory.
    **The Consequence:** Designing RAG systems without aggressive caching, causing massive I/O stalls because going off-chip over PCIe is fundamentally slower.
  napkin_math: |
    1. **HBM3 Access:** Typical access is ≈ 300 ns.
    2. **NVMe SSD Read:** Typical read is ≈ 100,000 ns (100 μs).
    3. **Ratio:** 100,000 ns / 300 ns ≈ **333x slower**.
  options:
  - ~30x slower
  - ~300x slower
  - ~3,000x slower
  - ~30,000x slower
  correct_index: 1
