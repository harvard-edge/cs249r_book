title: 'The RAG Retrieval Tax: Compound AI Systems'
scenario: Your team is deploying a new Retrieval-Augmented Generation (RAG) model. During the rollout,
  you notice P99 latency is much higher than expected. A profiler shows that the 'retrieval' step, which
  fetches context from an NVMe SSD-backed vector database, is the bottleneck. To build intuition for the
  performance review, roughly how much slower is a single read from that NVMe SSD compared to the model
  accessing its own parameters in HBM3 memory?
details:
  realistic_solution: An NVMe SSD read is approximately 333x slower than an HBM3 access. A typical HBM3
    access is around 300 ns, while a read from an NVMe SSD is about 100,000 ns (100 µs). This three-orders-of-magnitude
    gap is a foundational constraint in designing performant RAG systems, necessitating aggressive caching
    and optimization of the retrieval step.
  common_mistake: Engineers often confuse the SSD-vs-HBM gap with the much larger SSD-vs-L1 cache gap
    (~100,000x) or vastly underestimate it, thinking modern SSDs are only about 10-50x slower than GPU
    memory. This misses the fundamental latency cost of going from on-package HBM to an off-chip peripheral
    over PCIe.
  napkin_math: Latency Ratio = (NVMe SSD Read Latency) / (HBM3 Memory Access Latency) = 100,000 ns / 300
    ns ≈ 333x. If an HBM access were scaled to 5 minutes, waiting for the SSD read would be like waiting
    1.1 days.
  options:
  - ~30x slower
  - ~300x slower
  - ~3,000x slower
  - ~30,000x slower
  correct_index: 1
