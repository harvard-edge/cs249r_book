title: Diagnosing Frequent Recompilations in Dynamic Transformers
scenario: Your team is deploying a 1B parameter Transformer inference service on NVIDIA A100 GPUs. To
  meet strict latency SLAs, you enable `torch.compile` to fuse kernels and reduce CPU overhead. However,
  production metrics show severe latency spikes (p99 > 500ms), and the overall GPU utilization sits around
  40%. Profiling reveals that the JIT compiler is frequently triggering recompilations during inference,
  defeating the purpose of the optimization. How do you analyze and resolve the root cause of these latency
  spikes?
question: "How do you analyze and resolve the root cause of these latency spikes?"
details:
  realistic_solution: Use `TORCH_LOGS="recompiles"` or `torch._dynamo.explain` to identify the exact Python
    control flow (e.g., `if x.sum() > 0:`) or unbacked dynamic shapes causing graph breaks. Refactor the
    code to use tensor-native operations (e.g., `torch.where`) and pad input sequence lengths to a fixed
    set of bucket sizes (e.g., 128, 256, 512) to ensure a finite number of compiled graphs and eliminate
    continuous recompilation.
  common_mistake: Assuming graph compilation is a guaranteed zero-overhead static optimization and overlooking
    'graph breaks' caused by data-dependent Python control flow or completely unconstrained dynamic input
    shapes.
  napkin_math: Baseline uncompiled latency = 10ms. Compiled GPU execution = 5ms. Recompilation time =
    500ms. If just 2% of requests trigger a recompile due to novel sequence lengths, average latency =
    (0.98 * 5ms) + (0.02 * (5ms + 500ms)) = 4.9ms + 10.1ms = 15.0ms. The 'optimized' model is 50% slower
    on average than the baseline.
