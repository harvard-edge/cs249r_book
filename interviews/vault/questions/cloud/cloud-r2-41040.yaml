title: Power-Aware GPU Scheduling
scenario: 'Your data center has a 2 MW power budget for 256 H100 GPUs (each 700W TDP). At full load: 256
  × 700W = 179.2 kW for GPUs alone, plus ~90 kW for CPUs, networking, and cooling (PUE 1.3). Total: ~350
  kW — well within budget. But during a heatwave, the cooling system can only reject 1.5 MW. How do you
  adjust GPU scheduling?'
question: "How do you adjust GPU scheduling?"
details:
  realistic_solution: 'Power management strategy: (1) Power cap GPUs: use nvidia-smi -pl to reduce power
    limit from 700W to 500W. At 500W, H100 loses ~15-20% throughput (the GPU throttles boost clocks but
    Tensor Cores still operate efficiently). New GPU power: 256 × 500W = 128 kW. Total with overhead at
    PUE 1.3: 128 × 1.3 + 40 (non-GPU) = 206 kW — under 1.5 MW easily. (2) Selective throttling: power-cap
    batch training jobs (latency-insensitive) to 400W while keeping inference GPUs at 700W. Training loses
    ~25% throughput; inference maintains SLA. (3) Workload consolidation: during power constraints, consolidate
    inference onto fewer GPUs with higher power budgets. Use remaining GPUs at reduced power for training.
    (4) Job deferral: delay new low-priority training jobs during peak thermal hours (2-6 PM), allowing
    the cluster to run fewer GPUs at higher efficiency. NVIDIA DCGM provides per-GPU power monitoring
    and dynamic power capping APIs that integrate with Slurm via job prolog/epilog scripts.'
  common_mistake: Shutting down GPUs entirely. A smarter approach is to reduce power per GPU (power capping)
    and prioritize high-efficiency workloads.
  napkin_math: '700W → 500W per GPU: 29% power reduction, ~18% throughput loss. 256 GPUs at 500W: 128
    kW vs 179.2 kW. Throughput per watt improves by (82/71) = 15%.'
