title: Optimizing Tensor Core Utilization via Dimension Padding
scenario: Your team is pre-training a custom Transformer on a cluster of NVIDIA GPUs using FP16 mixed precision. To strictly limit the parameter count, the model architecture specifies a hidden size of 768 and an intermediate Feed-Forward Network (FFN) size of 3000 (instead of the standard 3072). Profiling reveals that the FFN linear layers achieve only 25% of peak Tensor Core TFLOPS.
question: Should you pad the FFN intermediate dimension from 3000 to 3072, and how do the Tensor Core trade-offs justify it?
details:
  realistic_solution: Pad the intermediate dimension to 3072. Tensor Cores execute operations in fixed-size blocks (e.g., 16x16x16 for FP16). A dimension of 3000 is not cleanly divisible by optimal tile sizes (e.g., 64, 128, or 256 for optimal wave quantization), leading to highly inefficient tile processing, thread divergence, and underutilized SMs. Padding increases theoretical FLOPs by 2.4% but allows the scheduler to dispatch dense, fully-utilized Tensor Core instructions.
  common_mistake: |
    **The Pitfall:** Assuming a smaller matrix dimension (3000 vs 3072) guarantees lower latency and memory bandwidth.
    **The Rationale:** Candidates focus purely on FLOP count while ignoring the strict tile size alignment required for hardware acceleration.
    **The Consequence:** Deploying unoptimized kernels that heavily underutilize Tensor Cores.
  napkin_math: |
    1. **Unpadded FLOPs:** 2 × 768 × 3000 = 4.6M. At 25% efficiency (78 TFLOPS), time = ~59 ns.
    2. **Padded FLOPs:** 2 × 768 × 3072 = 4.7M (+2.4%).
    3. **Padded Efficiency:** 3072 cleanly aligns, reaching 70% efficiency (218 TFLOPS).
    4. **Padded Time:** 4.7M / 218 TFLOPS = ~21.6 ns.
    5. **Result:** Adding 2.4% more math yields a **~2.7x speedup**.
