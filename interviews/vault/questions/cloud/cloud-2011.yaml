title: Optimizing Tensor Core Utilization via Dimension Padding
scenario: Your team is pre-training a custom Transformer on a cluster of NVIDIA A100 GPUs using FP16 mixed
  precision. To strictly limit the parameter count, the model architecture specifies a hidden size of
  768 and an intermediate Feed-Forward Network (FFN) size of 3000 (instead of the standard 3072). Profiling
  reveals that the FFN linear layers achieve only 25% of peak Tensor Core TFLOPS. You are tasked with
  evaluating the trade-off of padding the FFN dimension to 3072 versus maintaining the 3000 dimension,
  justifying the architectural change using hardware-specific quantitative reasoning.
details:
  realistic_solution: Pad the intermediate dimension to 3072. Tensor Cores execute operations in fixed-size
    blocks (e.g., 16x16x16 for FP16). A dimension of 3000 is not cleanly divisible by optimal tile sizes
    (e.g., 64, 128, or 256 for optimal wave quantization), leading to highly inefficient tile processing,
    thread divergence, and underutilized SMs. Padding increases theoretical FLOPs by 2.4% but allows the
    scheduler to dispatch dense, fully-utilized Tensor Core instructions.
  common_mistake: Assuming that a smaller matrix dimension (3000 vs 3072) guarantees lower latency and
    memory bandwidth usage by saving FLOPs, while ignoring the strict tile size alignment requirements
    necessary to instantiate optimized Tensor Core MMA (Matrix Multiply-Accumulate) instructions.
  napkin_math: 'Unpadded FLOPs per token: 2 * 768 × 3,000 = 4,608,000. At 25% of A100 FP16 peak (312 TFLOPS
    * 0.25 = 78 TFLOPS), time = ~59 ns. Padded FLOPs per token: 2 * 768 × 3,072 = 4,718,592 (+2.4%). With
    3072 aligned to multiples of 64/128, efficiency can easily reach 70% (218 TFLOPS), resulting in a
    compute time of ~21.6 ns. Adding 2.4% more math yields a ~2.7x practical speedup.'
