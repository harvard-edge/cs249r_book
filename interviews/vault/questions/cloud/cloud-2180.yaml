title: The Ring AllReduce Bandwidth Cost
scenario: You have 8 GPUs performing data-parallel training. Each GPU produces a 1 GB gradient tensor
  that must be synchronized across all GPUs using Ring AllReduce. How much total data does each GPU send
  and receive during one AllReduce operation?
question: "How much total data does each GPU send and receive during one AllReduce operation?"
details:
  realistic_solution: 'In Ring AllReduce, each GPU sends and receives exactly $2 \times \frac{N-1}{N}
    \times D$ bytes total, where $N$ is the number of GPUs and $D$ is the data size. The algorithm has
    two phases: ReduceScatter (each GPU sends $\frac{N-1}{N} \times D$) and AllGather (each GPU sends
    $\frac{N-1}{N} \times D$ again). For 8 GPUs with 1 GB gradients: each GPU sends $2 \times \frac{7}{8}
    \times 1\text{ GB} = 1.75\text{ GB}$ total. This is bandwidth-optimal — no algorithm can do better.'
  common_mistake: Assuming each GPU must send the entire 1 GB to every other GPU, leading to an estimate
    of 7 GB sent per GPU. This confuses AllReduce with a naive broadcast.
  napkin_math: 'For Ring AllReduce on N=8 GPUs with an S=1 GB tensor: Reduce-Scatter transfers (N-1)/N
    * S = 7/8 * 1024 MB = 896 MB per GPU. All-Gather transfers another 896 MB. Total data sent per GPU
    = 1.79 GB. With H100 NVLink providing 900 GB/s bidirectional bandwidth, the theoretical transfer time
    is 1.79 GB / 900 GB/s = ~1.99 ms. Protocol overhead might add micro-seconds, but total sync time remains
    ~2 ms.'
