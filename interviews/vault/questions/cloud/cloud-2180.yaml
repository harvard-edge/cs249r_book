title: The Ring AllReduce Bandwidth Cost
scenario: You have 8 GPUs performing data-parallel training. Each GPU produces a 1 GB gradient tensor that must be synchronized across all GPUs using Ring AllReduce.
question: "How much total data does each GPU send and receive during one AllReduce operation?"
details:
  realistic_solution: 'In Ring AllReduce, each GPU sends and receives exactly 2 × ((N-1)/N) × D bytes total, where N is the number of GPUs and D is the data size. The algorithm has two phases: ReduceScatter (each GPU sends ((N-1)/N) × D) and AllGather (each GPU sends ((N-1)/N) × D again). For 8 GPUs with 1 GB gradients: each GPU sends 2 × (7/8) × 1 GB = 1.75 GB total. This is bandwidth-optimal — no algorithm can do better.'
  common_mistake: |
    **The Pitfall:** Assuming each GPU must send the entire 1 GB to every other GPU.
    **The Rationale:** Confusing the highly optimized Ring AllReduce with a naive broadcast mechanism.
    **The Consequence:** Overestimating network bandwidth requirements by a factor of 4x.
  napkin_math: |
    **Assumptions & Constraints:**
    - N=8 GPUs, S=1 GB tensor.
    - Ring AllReduce topology.

    **Calculations:**
    - Reduce-Scatter transfers = (N-1)/N * S = 7/8 * 1024 MB = 896 MB.
    - All-Gather transfers another 896 MB.
    - Total data sent per GPU = 1.75 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.75 GB transferred per GPU (Network-Bound)**. Ring AllReduce asymptotically approaches exactly 2x the tensor size independent of node count.
