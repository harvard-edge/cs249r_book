title: 'Cloud Benchmark Run Rules L3 0'
scenario: 'MLPerf Training requires ResNet-50 to reach 75.9% top-1 accuracy on ImageNet. Team A trains to 75.9% in 30 seconds on 1024 GPUs. Team B reaches 76.5% in 25 seconds on 1024 GPUs but uses a modified augmentation pipeline not in the allowed rules.'
question: 'Who wins the MLPerf ResNet-50 benchmark, Team A or Team B, and what is the cost difference if both were valid?'
details:
  realistic_solution: 'Team A wins because Team B violated run rules by using unauthorized augmentation. Benchmark validity requires strict adherence to allowed modifications. Team B''s result would be flagged and rejected.'
  common_mistake: |
    **The Pitfall:** Comparing raw training speed without verifying that both teams followed the benchmark's run rules.
    **The Rationale:** Candidates assume that faster convergence is always superior, failing to realize that MLPerf measures system capability, not algorithmic novelty.
    **The Consequence:** The benchmark results become meaningless because they measure different algorithms rather than differing hardware/system efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1024 GPUs used by both teams at $2/hr.
       - Team A time: 30s. Team B time: 25s.
    2. **Calculations:**
       - Team A cost: 1024 × (30s / 3600) = 8.53 GPU-hrs × $2/hr = $17.07.
       - Team B cost: 1024 × (25s / 3600) = 7.11 GPU-hrs × $2/hr = $14.22.
       - Difference: Team B is $2.85 cheaper (17% savings).
    3. **Conclusion & Interpretation:**
       - **Result: Team A wins due to disqualification of Team B, despite Team B being $2.85 cheaper. Benchmark is Compliance-Bound.**
