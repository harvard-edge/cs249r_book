title: FP8 MoE Routing Collapse
scenario: 'You are pre-training an 8x7B Sparse Mixture of Experts (MoE) model on a cluster of H100s using
  FP8 mixed precision. At step 15,000, training loss abruptly spikes, and telemetry reveals a routing
  collapse: 99% of tokens are being sent to Expert 3. You verify the load balancing loss coefficient is
  correct. The forward pass uses FP8 for all linear layers. What is the cause of this sudden routing degeneration,
  and how do you fix the precision configuration?'
question: "What is the cause of this sudden routing degeneration, and how do you fix the precision configuration?"
details:
  realistic_solution: 'The cause is dynamic range mismatch in the FP8 formats. H100 supports two FP8 types:
    E4M3 (higher precision, lower range, max ~448) and E5M2 (lower precision, higher range, max ~57344).
    If E4M3 is used for routing logits or gradients, the values can easily underflow to zero or overflow,
    causing the softmax probabilities in the router to degenerate into one-hot vectors or NaNs, leading
    to routing collapse. The solution is to cast the MoE router logits and all gradient tensors to E5M2
    (or keep them in FP32/BF16, since the router is a tiny fraction of total compute), while keeping the
    heavy GEMMs (weights/activations of the experts) in E4M3.'
  common_mistake: Increasing the capacity factor or load balancing loss weight, ignoring the precision
    underflow happening in the router.
  napkin_math: MoE routers use softmax to compute expert assignment probabilities. FP8 E4M3 has a strict
    maximum of 448 and minimum of ~0.0019. If router logits exceed ln(448) = 6.1, the exp(x) calculation
    overflows to NaN. If logits are too negative, they instantly underflow to 0.0. This destroys the softmax
    denominator, forcing probabilities to degenerate into 1.0 for a single expert. Router logits must
    be FP32.
