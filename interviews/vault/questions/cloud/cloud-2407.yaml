title: FP8 MoE Routing Collapse
scenario: You are pre-training an 8x7B Sparse Mixture of Experts (MoE) model on a cluster of H100s using FP8 mixed precision. At step 15,000, training loss abruptly spikes, and telemetry reveals a routing collapse: 99% of tokens are being sent to Expert 3. You verify the load balancing loss coefficient is correct. The forward pass uses FP8 for all linear layers.
question: "What is the cause of this sudden routing degeneration, and how do you fix the precision configuration?"
details:
  realistic_solution: The cause is dynamic range mismatch in the FP8 formats. H100 supports E4M3 (max ~448) and E5M2 (max ~57344). If E4M3 is used for router logits, the values easily overflow or underflow, causing softmax probabilities to degenerate into NaNs or one-hot vectors. Fix: Cast the MoE router logits to FP32 or BF16. The router is a tiny fraction of total compute, so this doesn't impact performance, while the heavy expert GEMMs can safely remain in E4M3.
  common_mistake: |
    **The Pitfall:** Increasing the capacity factor or load balancing loss weight.
    **The Rationale:** Candidates recognize a routing imbalance and attempt to fix it using standard algorithmic hyperparameter tuning.
    **The Consequence:** The routing remains completely broken because the underlying issue is hardware-level numerical overflow inside the FP8 representation.
  napkin_math: |
    1. **E4M3 Limits:** Max value is 448. Minimum positive value is ~0.0019.
    2. **Softmax Overflow:** Router logits use exp(x). If a logit exceeds ln(448) ≈ 6.1, exp(x) overflows to NaN or Inf.
    3. **Softmax Underflow:** If a logit is highly negative, it underflows to 0.0.
    4. **Result:** Softmax denominator collapses, forcing probabilities to degenerate into **1.0 for a single expert**.
