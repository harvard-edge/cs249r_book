title: A/B Rollout Capacity For A New Ranker
scenario: A search team wants to A/B test a new neural ranker on 10% of traffic using a dedicated canary pool. The service receives 40,000 queries/s at peak. The old ranker costs 4 ms CPU time per query, while the new ranker costs 18 ms on one CPU core. Each serving pod has 16 usable cores and should run below 60% CPU.
question: How many 16-core pods must the new-ranker canary pool have to serve 10% of 40,000 queries/s?
details:
  realistic_solution: Experiment traffic is 4,000 queries/s. The dedicated new-ranker pool needs 4,000 x 18 ms = 72 CPU-seconds per second, or 72 fully utilized cores. At 60% target utilization, required cores are 72 / 0.6 = 120 cores. With 16 usable cores per pod, the test needs 7.5 pods, so provision 8 canary pods plus rollout headroom.
  common_mistake: |
    **The Pitfall:** Computing only the marginal CPU difference, or forgetting the utilization headroom.
    **The Rationale:** Since it's an A/B test, it's easy to mistakenly calculate only the "extra" 14ms of CPU cost, or to divide by 100% utilization, forgetting that production services require burst headroom.
    **The Consequence:** The dedicated canary pool is drastically underprovisioned, causing the new ranker to throttle, fail latencies, and incorrectly look like a regression during the test.
  napkin_math: |
    - **Canary Traffic:** $10\% \text{ of } 40,000 = 4,000\text{ q/s}$.
    - **Raw CPU Demand:** $4,000\text{ q/s} \times 0.018\text{ s/query} = 72\text{ CPU cores}$.
    - **Required Capacity at 60%:** $72 / 0.6 = 120\text{ cores}$.
    - **Pod Count:** $120\text{ cores} / 16\text{ cores/pod} = 7.5\text{ pods}$.
    - **Conclusion:** **Provision 8 pods** for the canary pool.
