title: Mixed Precision Optimizer State Underflow
scenario: You are pre-training a 10B parameter model. To fit the training job onto 8x 40GB A100 GPUs,
  you aggressively cast the Adam optimizer states (momentum, variance) and the master weights from FP32
  to FP16, saving ~80GB of memory. After 5,000 steps, the training loss plateaus completely.
question: "Why does casting Adam states and master weights to FP16 cause the 10B model's loss to plateau after 5,000 steps?"
details:
  realistic_solution: The training has stalled due to weight update underflow, sometimes called 'swamping'.
    In deep networks, the optimizer weight updates (learning rate * gradient / sqrt(variance)) become
    extremely small as training progresses. FP16 has only 10 bits of mantissa precision. When adding a
    tiny update to a relatively large weight, the update falls below the precision gap (machine epsilon)
    of the weight's current FP16 value, resulting in an effective update of exactly zero. The architecture
    must maintain the master weights in FP32 so that these tiny high-precision updates can be accumulated
    over many steps until they are large enough to be reflected when cast down to FP16 for the forward
    pass.
  common_mistake: Believing that the learning rate is too high and causing FP16 overflow in the gradients.
  napkin_math: In FP16, there are 10 mantissa bits. For a weight W around 1.0, the distance to the next
    representable number is 2^-10 ~ 0.000976. If the Adam learning rate is low, a typical weight update
    might be 1e-4 (0.0001). Adding 1.0 + 0.0001 in FP16 results in exactly 1.0, because the update is
    smaller than the precision gap. This 'weight stagnation' stalls loss. Keeping master weights in FP32
    fixes this.
