title: The Lustre Stripe Throughput
scenario: A Lustre parallel filesystem has 100 Object Storage Targets (OSTs), each capable of 1 GB/s sequential
  read throughput. A training job reads a single large file that has been striped across 50 of these OSTs.
  What is the maximum aggregate read throughput the job can achieve from this file? What happens if the
  file is stored on only 1 OST?
question: "What aggregate read throughput can the 50-OST-striped file achieve, and what happens if it is stored on only 1 OST?"
details:
  realistic_solution: 'Maximum throughput is 50 GB/s, because the file is striped across 50 OSTs, each
    contributing up to 1 GB/s. If the file were stored on a single OST, throughput would be limited to
    1 GB/s — a 50x reduction. This is why parallel filesystems stripe large files across many targets:
    it converts a sequential I/O bottleneck into a parallel one. Conversely, millions of small files that
    each land on a single OST create a metadata and throughput bottleneck, which is the ''small file problem''
    in ML data pipelines.'
  common_mistake: Assuming you get the full 100 GB/s aggregate bandwidth regardless of how the file is
    striped. A file can only read in parallel from the OSTs it actually spans.
  napkin_math: '50 OSTs $\times$ 1 GB/s per OST = 50 GB/s aggregate. Single OST: 1 GB/s. To feed 1,000
    GPUs each needing 50 MB/s of training data: $1{,}000 \times 50\text{ MB/s} = 50\text{ GB/s}$ — exactly
    the capacity of the 50-OST stripe. Under-striping would starve the cluster.'
