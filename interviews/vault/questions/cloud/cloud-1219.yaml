title: Evaluating Post-Processing for Equalized Odds in Loan Approvals
scenario: You are evaluating an automated loan approval ML model deployed on a cloud inference cluster handling 10,000 requests/sec. An audit reveals disparities between demographic groups A and B. For Group A, the True Positive Rate (TPR) is 90% and False Positive Rate (FPR) is 10%. For Group B, TPR is 80% and FPR is 20%. Legal requires satisfying the 'Equalized Odds' fairness metric (equal TPR and equal FPR across groups) before the model can be scaled to 50,000 requests/sec.
question: How would you satisfy Equalized Odds, and what accuracy cost would strict post-processing impose on Group A versus retraining?
details:
  realistic_solution: Calculate the ROC convex hull for both groups and find the intersection point that aligns TPR and FPR. Strictly matching Group B's rates via post-processing forces Group A's TPR from 0.9 to 0.8 and FPR from 0.1 to 0.2, dropping overall accuracy from 85% to 80% — generating 500 incorrect loan decisions per 10,000 requests. If this exceeds an accuracy SLA, consider relaxed Equalized Odds with a tolerance band, or invest in model improvements that lift Group B's performance rather than degrading Group A's.
  common_mistake: |
    **The Pitfall:** Confusing Equalized Odds with Demographic Parity, or failing to realize post-processing degrades the better group.
    **The Rationale:** Candidates assume fairness adjustments only lift up underperforming groups, rather than artificially lowering the accuracy of well-performing groups to reach parity.
    **The Consequence:** Implementing a strict post-processing fairness patch that drastically reduces overall system accuracy and violates business SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50% base loan approval rate.
    2. **Calculations:**
       - Group A Original Accuracy: 0.9 * 0.5 + (1 - 0.1) * 0.5 = 0.90.
       - Group B Original Accuracy: 0.8 * 0.5 + (1 - 0.2) * 0.5 = 0.80. Overall: 0.85.
       - Strict Match (Group A forced to B): TPR 0.8, FPR 0.2. Accuracy drops to 0.80.
    3. **Conclusion & Interpretation:**
       - **Result: 5% accuracy drop causes 500 incorrect decisions per 10,000 requests.**
