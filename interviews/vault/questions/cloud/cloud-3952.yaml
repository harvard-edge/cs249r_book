title: Compute-Communication Overlap in Distributed Inference with Speculative Decoding
scenario: In speculative decoding, a small draft model generates K candidate tokens, then a large target model verifies them in one forward pass. When the target model is distributed across 4 GPUs, the draft model runs on a single GPU.
question: How would you overlap the draft model's K-token generation with the 4-GPU target model's previous verification?
details:
  realistic_solution: Pipeline the draft and verification. While target model verifies batch N, draft model generates batch N+1 speculatively. If batch N rejects all tokens, mitigate by generating N+1 from the most likely accepted prefix.
  common_mistake: |
    **The Pitfall:** Running draft and verification sequentially.
    **The Rationale:** It's the simplest logical flow.
    **The Consequence:** Wasting draft GPU compute during verification and target GPU compute during draft generation, heavily penalizing throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Draft generation = ~20ms.
       - Target verification = ~30ms.
       - K=5 tokens, 70% acceptance.
    2. **Calculations:**
       - Sequential: 20 + 30 = 50ms per batch. Throughput: 3.5 / 50ms = 70 tok/s.
       - Overlapped: max(30, 20) = 30ms per batch. Throughput: 3.5 / 30ms = 117 tok/s.
    3. **Conclusion & Interpretation:**
       - **Result: Overlap yields a 1.67x speedup in token throughput.**
