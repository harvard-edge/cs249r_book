title: The New Hotness vs. The Incumbent
scenario: 'You are the head of ML Platforms at a large AI research lab with a massive cluster of H100
  GPUs. A startup pitches you their new accelerator, the ''Prometheus-1'', claiming it achieves 5x the
  peak FP16 TFLOPS of an H100, but with only 2x the memory bandwidth. It comes at a 3x price premium over
  the H100. Your CFO and research leads are asking for your recommendation: should you invest in a new
  cluster of these chips?'
question: "Your CFO and research leads are asking for your recommendation: should you invest in a new cluster of these chips?"
details:
  realistic_solution: The correct approach is to design a suite of benchmarks with varying arithmetic
    intensities to map out the chip's performance curve and identify its effective ridge point. The proposal
    must be nuanced, recommending the chip only for workloads where its strengths can be realized.
  common_mistake: The most common mistake is being seduced by the headline '5x TFLOPS' number. Engineers
    will often propose benchmarking only their main production model, failing to understand that a single
    workload can't reveal the chip's true performance profile. They may recommend a full purchase based
    on the peak compute number, ignoring that performance is dictated by the relationship between compute
    and memory bandwidth (the Roofline model).
  napkin_math: 'First, calculate the theoretical ridge points. **H100:** Peak FP16 = 989 TFLOPS. Memory
    bandwidth = 3.35 TB/s. Ridge point = 989,000 GFLOPs / 3,350 GB/s = **295 FLOPs/byte**. **Prometheus-1:**
    Peak FP16 = 5 × 989 = 4,945 TFLOPS. Memory bandwidth = 2 × 3.35 = 6.7 TB/s. Ridge point = 4,945,000
    / 6,700 = **738 FLOPs/byte**. **Analysis:** Any workload with arithmetic intensity below 738 FLOPs/byte
    is memory-bound on the Prometheus-1 and cannot exploit its 5× compute advantage. Between 295 and 738
    FLOPs/byte: the workload is compute-bound on H100 (benefiting from peak FLOPs) but memory-bound on
    Prometheus-1 (limited by bandwidth). The Prometheus-1 only achieves its advertised 5× speedup for
    workloads ABOVE 738 FLOPs/byte. **Practical workloads:** LLM decode (batch=1): AI ≈ 1 FLOP/byte →
    memory-bound on both. Prometheus-1 speedup = 6.7/3.35 = **2× at 3× cost — net loss**. LLM training
    (large batch): AI ≈ 200–500 FLOPs/byte → compute-bound on H100 (989 TFLOPS), but memory-bound on Prometheus-1.
    For AI=500, Prometheus-1 achieves 500 FLOPs/byte × 6,700 GB/s = 3,350 TFLOPS. Speedup = 3,350 / 989
    = **3.38×**. At a 3× cost premium, this is a marginal 1.12× improvement in cost-efficiency, nowhere
    near the headline 5×. Only dense matmuls at batch >1024: AI > 738 FLOPs/byte → compute-bound on both,
    yielding the full **5× speedup at 3× cost = 1.67× better cost-efficiency**. **Recommendation:** Purchase
    only if >60% of workload hours are large-batch training or dense inference at high batch sizes.'
