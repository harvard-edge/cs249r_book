title: The Little's Law Bottleneck
scenario: You're operating an LLM inference service on a single H100 GPU. The service has a strict P99 SLO that the Time-To-First-Token (TTFT) must be under 100ms. From profiling, you know that the GPU can process a single request and generate the first token in 10ms.
question: What happens to queue wait time as arrivals approach the 100 req/s service rate with a 10ms first-token service time?
details:
  realistic_solution: The maximum service rate (μ) is 1 request / 10ms = 100 requests/sec. As the arrival rate (λ) gets closer and closer to 100 req/s, the system utilization (ρ = λ / μ) approaches 1. According to queueing theory, the expected wait time in the queue grows exponentially as utilization nears 100%. A small increase in arrival rate from 90 req/s (ρ=0.9) to 95 req/s (ρ=0.95) will cause a much larger increase in average wait time than an increase from 10 req/s to 15 req/s. To maintain the 100ms P99 SLO, the system must be provisioned to operate at a utilization significantly below 100% (typically 70-80%) to absorb bursts and keep queue times from exploding and violating the latency budget.
  common_mistake: |
    **The Pitfall:** Assuming that as long as the arrival rate is slightly less than the service rate, the system is healthy.
    **The Rationale:** Engineers think linearly, failing to account for the exponential explosion in queue wait times ("tail at scale" effects) as system utilization approaches 100%.
    **The Consequence:** The system will wildly violate the 100ms P99 SLO during minor traffic bursts, causing sudden and unpredictable latency spikes for users.
  napkin_math: |
    1. Service Rate (μ): 1 request / 10ms = 100 requests/sec.
    2. Utilization (ρ): Arrival Rate (λ) / Service Rate (μ).
    3. M/M/1 Queue Theory: As λ → 100, ρ → 1. Queue wait time grows exponentially (W = 1 / (μ - λ)).
    4. **Example: At 90 req/s, wait = 1 / (100 - 90) = 100ms. At 95 req/s, wait = 1 / (100 - 95) = 200ms.**
  options:
  - User wait time increases linearly with the arrival rate.
  - User wait time remains near zero as long as the arrival rate is below the service rate.
  - User wait time grows exponentially as the arrival rate approaches the service rate, quickly exceeding the latency budget.
  - The system can handle an arrival rate of 99 requests/sec without violating the 100ms SLO.
