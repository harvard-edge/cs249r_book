title: The Little's Law Bottleneck
scenario: You're operating an LLM inference service on a single H100 GPU. The service has a strict P99
  SLO that the Time-To-First-Token (TTFT) must be under 100ms. From profiling, you know that the GPU can
  process a single request and generate the first token in 10ms (this is the service time, T_service).
  Using basic queueing theory, explain what happens to the user wait time as the average request arrival
  rate approaches the system's maximum service rate.
details:
  realistic_solution: The maximum service rate (μ) is 1 request / 10ms = 100 requests/sec. As the arrival
    rate (λ) gets closer and closer to 100 req/s, the system utilization (ρ = λ / μ) approaches 1. According
    to queueing theory, the expected wait time in the queue grows exponentially as utilization nears 100%.
    A small increase in arrival rate from 90 req/s (ρ=0.9) to 95 req/s (ρ=0.95) will cause a much larger
    increase in average wait time than an increase from 10 req/s to 15 req/s. To maintain the 100ms P99
    SLO, the system must be provisioned to operate at a utilization significantly below 100% (typically
    70-80%) to absorb bursts and keep queue times from exploding and violating the latency budget.
  common_mistake: Assuming that as long as the arrival rate is less than the service rate (e.g., 99 requests/sec
    when the service rate is 100 requests/sec), the system is fine. This ignores the non-linear, exponential
    explosion in queue wait times as system utilization approaches 100%. Engineers often think linearly
    and don't account for the 'tail at scale' effects on latency caused by queueing.
  napkin_math: We can model the wait time using the M/M/1 queue approximation.
  options:
  - User wait time increases linearly with the arrival rate.
  - User wait time remains near zero as long as the arrival rate is below the service rate.
  - User wait time grows exponentially as the arrival rate approaches the service rate, quickly exceeding
    the latency budget.
  - The system can handle an arrival rate of 99 requests/sec without violating the 100ms SLO.
  correct_index: 2
