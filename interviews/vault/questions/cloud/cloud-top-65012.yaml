title: Chiplet Roofline Model for Mixed Precision LLM Training
scenario: You are comparing BF16 training performance on MI300X (8 XCDs, 5.3 TB/s, ~1826 TFLOPS BF16)
  vs H100 SXM5 (989 TFLOPS BF16, 3.35 TB/s). For a batch of transformer forward passes with arithmetic
  intensity 120 FLOP/byte, predict which accelerator is bandwidth-bound vs compute-bound.
details:
  realistic_solution: 'Ridge point = Peak TFLOPS / Peak BW. H100: 989 TFLOPS / 3.35 TB/s = 295 FLOP/byte.
    MI300X: 1826 TFLOPS / 5.3 TB/s = 345 FLOP/byte. Arithmetic intensity = 120 FLOP/byte. Both accelerators:
    120 < 295 (H100 ridge) and 120 < 345 (MI300X ridge) → both are memory-bandwidth bound at this intensity.
    Achieved TFLOPS = BW * arithmetic_intensity. H100: 3.35 TB/s * 120 = 402 TFLOPS. MI300X: 5.3 TB/s
    * 120 = 636 TFLOPS. MI300X is 58% faster for this workload — primarily due to its 58% higher memory
    bandwidth, not its compute advantage.'
  common_mistake: Comparing peak TFLOPS directly and concluding MI300X always wins. The ridge point (compute/bandwidth
    ratio) determines whether a workload is compute or memory bound, and the two accelerators have very
    different ridge points due to their different chiplet architectures.
  napkin_math: 'Memory bandwidth bound: achieved_TFLOPS = BW * AI. H100: 3.35e12 * 120 = 402 TFLOPS (41%
    of peak). MI300X: 5.3e12 * 120 = 636 TFLOPS (35% of peak). MI300X advantage = 636/402 = 1.58x. Crossover
    to compute-bound: H100 at AI=295, MI300X at AI=345. LLM inference decode (AI ~5) → strongly memory
    bound. LLM training large-batch (AI ~500) → compute bound.'
