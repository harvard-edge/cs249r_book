title: NCCL vs MPI AllReduce Performance for Mixed-Precision Training on H100
scenario: 'A team trains a 13B model on 64 H100s (8 nodes × 8 GPUs) and chooses between NCCL-based AllReduce
  (intra-node via NVLink 450 GB/s, inter-node via InfiniBand HDR200 at 200 Gbps=25 GB/s) vs tree-based
  MPI reduction. Gradient size: 52GB (FP16). Calculate times for each strategy.'
question: "How long should NCCL hierarchical AllReduce and tree-based MPI reduction take for 52GB gradients on the 64-H100 cluster?"
details:
  realistic_solution: 'Two-level hierarchical AllReduce (NCCL strategy): Level 1 (intra-node, NVLink):
    8-GPU ring within each node. Ring AllReduce 52GB on NVLink: 2×(7/8)×52GB/450GB/s = 0.203s. After:
    each of 8 nodes has locally reduced 52GB. Level 2 (inter-node, IB): ReduceScatter across 8 nodes (52GB/8
    = 6.5GB each). IB AllReduce: 2×(7/8)×52GB/25GB/s = 3.64s. Total NCCL: 0.203 + 3.64 = 3.84s. MPI tree
    reduction (8-level binary tree, bottleneck = root node 25 GB/s link): 52GB/25GB/s × log2(64) = 2.08
    × 6 = 12.5s. NCCL 3.5× faster than naive MPI tree due to parallel ring algorithms.'
  common_mistake: Treating the 64-GPU AllReduce as operating on a single flat topology; the hierarchical
    nature (NVLink within nodes, IB across nodes) requires a two-level AllReduce strategy.
  napkin_math: 'NCCL: intra-node ring 0.203s + inter-node IB ring 3.64s = 3.84s. MPI tree: 52GB/25GB/s
    × 6 hops = 12.5s. NCCL wins 3.3×. Bottleneck is always inter-node IB bandwidth. Adding more nodes:
    scale IB allocation or use rail-optimized topology.'
