title: Benchmarking Quantization Degradation in Generative LLMs
scenario: You are evaluating a new INT8 SmoothQuant strategy for a 70B LLM. Offline benchmarks (MMLU) show a negligible 0.5% accuracy drop compared to the FP16 baseline. However, a canary deployment for code-completion shows a 15% increase in syntax errors and a 30% drop in user acceptance.
question: Why did offline quantization benchmarks miss the code-completion regression, and how should you benchmark INT8 model quality?
details:
  realistic_solution: Transition from static multiple-choice tests to execution-based evaluations (e.g., HumanEval) and generative benchmarks (e.g., MT-Bench). Additionally, measure the KL-divergence of the output logits between the FP16 teacher and INT8 model on a representative sample of production prompts to detect long-tail degradation.
  common_mistake: |
    **The Pitfall:** Assuming static, multiple-choice benchmarks like MMLU adequately measure the generative quality of a quantized LLM.
    **The Rationale:** Candidates trust top-line metrics without considering the difference between short-context classification and long-context autoregressive generation.
    **The Consequence:** Small per-token quantization errors go unnoticed in offline tests but compound exponentially during production text generation, destroying output quality.
  napkin_math: |
    1. Baseline per-token error rate: Let FP16 e = 0.001, INT8 e = 0.005.
    2. Short-sequence (1-token MMLU): INT8 success is (1 - 0.005) = 99.5%.
    3. Long-sequence (200-token code): Sequence success P = (1 - e)^200.
    4. FP16 Success: 0.999^200 ≈ 81.8%.
    5. INT8 Success: 0.995^200 ≈ 36.7%.
    6. **Conclusion: A tiny per-token error increase causes a massive exponential drop in long-sequence accuracy.**
