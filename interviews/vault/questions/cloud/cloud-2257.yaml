title: The Triton vs CUDA Tradeoff
scenario: Your team needs to write a custom fused attention kernel. The senior GPU engineer proposes writing
  it in CUDA; a newer team member suggests Triton. The CUDA version will take 3 weeks of engineering time
  and achieve 85% of peak H100 FLOPS. Estimate what fraction of peak FLOPS a Triton implementation would
  likely achieve, and explain why the abstraction gap creates this performance difference.
question: "If hand-tuned CUDA reaches 85% of H100 peak, what peak-FLOPS fraction should Triton achieve, and why is there a gap?"
details:
  realistic_solution: 'A well-written Triton kernel typically achieves 70-80% of peak FLOPS — about 5-15%
    behind hand-tuned CUDA. The performance gap comes from the abstraction level: Triton programs operate
    on tiles of data (block-level programming) while CUDA operates on individual threads. This means Triton''s
    compiler must infer the optimal shared memory usage, pipeline scheduling, and register allocation
    from the tile-level description. For standard patterns (GEMM, reduction, elementwise fusion), the
    Triton compiler''s heuristics are excellent and close the gap to <5%. The gap widens for irregular
    patterns (sparse attention, variable-length sequences) where CUDA''s explicit thread-level control
    enables hand-tuned memory access patterns that Triton''s block-level abstraction cannot express. The
    engineering tradeoff is stark: the Triton version takes 2-3 days instead of 3 weeks, enabling faster
    iteration on algorithmic ideas. For most teams, 75% of peak in 2 days beats 85% of peak in 3 weeks.'
  common_mistake: '"Triton is just a wrapper around CUDA, so it should achieve the same performance."
    Triton operates at a higher abstraction level, which means certain hardware-specific optimizations
    are harder to express.'
  napkin_math: 'H100 FP16 peak: 989 TFLOPS. CUDA hand-tuned: $989 \times 0.85 = 841$ TFLOPS (3 weeks effort).
    Triton: $989 \times 0.75 = 742$ TFLOPS (2-3 days effort). Performance gap: $841 - 742 = 99$ TFLOPS
    (12% relative). Engineering efficiency: CUDA = $841/15\text{ eng-days} = 56$ TFLOPS/eng-day. Triton
    = $742/2.5\text{ eng-days} = 297$ TFLOPS/eng-day. Triton is $5.3\times$ more engineer-efficient.'
