title: The Triton vs CUDA Tradeoff
scenario: "Your team needs to write a custom fused attention kernel. The senior GPU engineer proposes writing it in CUDA; a newer team member suggests Triton. The CUDA version will take 3 weeks of engineering time and achieve 85% of peak H100 FLOPS."
question: "If hand-tuned CUDA reaches 85% of H100 peak, what peak-FLOPS fraction should Triton achieve, and why is there a gap?"
details:
  realistic_solution: "A well-written Triton kernel typically achieves 70-80% of peak FLOPS — about 5-15% behind hand-tuned CUDA. The performance gap comes from the abstraction level: Triton programs operate on tiles of data (block-level programming) while CUDA operates on individual threads. This means Triton's compiler must infer the optimal shared memory usage, pipeline scheduling, and register allocation from the tile-level description. For standard patterns (GEMM, reduction, elementwise fusion), the Triton compiler's heuristics are excellent and close the gap to <5%. The gap widens for irregular patterns (sparse attention, variable-length sequences) where CUDA's explicit thread-level control enables hand-tuned memory access patterns that Triton's block-level abstraction cannot express. The engineering tradeoff is stark: the Triton version takes 2-3 days instead of 3 weeks, enabling faster iteration on algorithmic ideas. For most teams, 75% of peak in 2 days beats 85% of peak in 3 weeks."
  common_mistake: |
    **The Pitfall:** Believing Triton is just a wrapper around CUDA that guarantees identical performance.
    **The Rationale:** Engineers ignore that Triton operates at a higher abstraction level (block-level vs thread-level).
    **The Consequence:** Expecting hand-tuned CUDA performance for irregular patterns, or conversely, wasting 3 weeks writing CUDA for a 10% gain when Triton was "good enough" in 3 days.
  napkin_math: |
    *   **H100 FP16 peak:** 989 TFLOPS.
    *   **CUDA Performance:** 989 × 0.85 = 841 TFLOPS (in 15 eng-days = 56 TFLOPS/day).
    *   **Triton Performance (Est. 75%):** 989 × 0.75 = 742 TFLOPS (in 2.5 eng-days = 297 TFLOPS/day).
    *   **Performance Gap:** 841 - 742 = 99 TFLOPS (12% relative slowdown).
    *   **Result:** **Triton is ~5.3x more engineer-efficient, making it superior for rapid iteration.**
