id: cloud-2312
title: Periodic Latency Spikes in Feature Store
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: 'In our real-time fraud detection pipeline, features flow via Kafka -> Flink -> Redis. Base
  ingestion latency is 15ms. However, exactly every 5 minutes, P99 latency spikes to 3000ms, causing fraud
  prediction timeouts (SLA: 100ms) at our peak load of 100,000 events/sec.'
details:
  realistic_solution: The symptom of highly periodic, massive latency spikes in a streaming system almost
    always points to background maintenance tasks blocking the main execution thread. Given the Kafka->Flink->Redis
    architecture, the 5-minute interval strongly correlates with Redis BGSAVE (RDB snapshotting) or Flink
    checkpointing. At 100,000 writes/sec, a Redis BGSAVE triggers a fork. The heavy write volume causes
    massive copy-on-write page faults, saturating memory bandwidth and blocking Redis's single-threaded
    event loop. To resolve this, we must disable BGSAVE on the master node handling ingestion. Persistence
    should be delegated to a read-replica, or shifted to Append-Only File (AOF) with incremental fsync.
    Additionally, modifying Flink to write to Redis in micro-batches (pipelines) rather than row-by-row
    reduces network round-trips and CPU interrupts.
  common_mistake: Scaling out the Flink cluster by adding more TaskManagers, assuming the compute layer
    is falling behind the Kafka stream.
  napkin_math: 100,000 events/sec * 1KB per event = 100MB/s write throughput. During a 60-second Redis
    BGSAVE operation, 6GB of memory is modified. Because of copy-on-write semantics during the OS fork,
    the system must duplicate 6GB of RAM pages. This heavy memory allocation stalls the main Redis thread,
    causing the queue to back up and latency to spike from 15ms to 3000ms.
