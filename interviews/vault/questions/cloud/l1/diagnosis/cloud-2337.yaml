id: cloud-2337
title: 3D Convolution L2 Cache Thrashing
topic: vram-budgeting
status: published
provenance: imported
scenario: You are optimizing a 3D medical imaging CNN on an NVIDIA A100 (40MB L2 cache). The input volume
  is 256x256x256 FP32. Profiling via Nsight Compute reveals an abysmal 8% SM compute utilization, accompanied
  by a 94% L2 cache miss rate and massive HBM read volumes that exceed theoretical requirements by 8x.
details:
  realistic_solution: The symptom (massive L2 miss rate and 8x HBM read amplification) is caused by strided
    memory access patterns inherent in naive 3D convolutions. Memory in GPUs is fetched in 32-byte cache
    lines. When traversing the Z-axis (depth) of a 3D volume laid out linearly in memory (e.g., NDHWC
    or NCDHW), reading adjacent elements in the Z-dimension means jumping by X*Y*sizeof(FP32) bytes. For
    a 256x256 image, this is 262KB per stride. The GPU fetches a 32-byte cache line from HBM but only
    uses 4 bytes (1 float), discarding the rest as the L2 cache quickly fills and evicts lines due to
    the massive stride. This results in exactly 1/8th (12.5%) effective memory bandwidth and 8x fetch
    amplification. The co-design solution is to use blocked memory layouts (like NCHWc, e.g., NCHW32)
    or Morton Z-order curves, ensuring that spatially adjacent 3D voxels are contiguous in linear memory,
    allowing the kernel to utilize the full 32-byte cache line.
  common_mistake: Assuming the model needs more HBM bandwidth and switching to A100 80GB or H100, without
    fixing the memory layout.
  napkin_math: Input volume = 256 * 256 * 256 * 4 bytes = 67 MB. This exceeds the 40MB L2 cache. Z-axis
    stride = 256 * 256 * 4 = 262,144 bytes. To compute a 3x3x3 kernel, the thread needs elements separated
    by 262KB. Fetching 1 element pulls 32 bytes. Useful data = 4 bytes. Waste = 28 bytes. Effective bandwidth
    drops from 2.0 TB/s to 250 GB/s. SMs stall waiting for HBM.
