schema_version: 1
id: cloud-2306
title: The Silent String-to-Hash Collision
topic: data-quality-validation
status: published
provenance: imported
scenario: An Ad CTR prediction system processing 1M QPS experiences a sudden collapse in prediction variance;
  the model starts outputting a nearly constant probability of 0.05 for all users. The data validation
  pipeline (Great Expectations) passes successfully because all required schema fields are present and
  non-null.
details:
  realistic_solution: The root cause is a silent schema mutation that bypassed basic existence checks.
    An upstream client team changed the `device_version` feature from an integer (e.g., 14, 15) to a semantic
    version string (e.g., '14.1.0'). The ingestion pipeline's Protobuf parser or feature hashing logic
    was overly permissive. When it encounters a string where an int is expected, it throws a suppressed
    warning and falls back to a default value (like NaN or 0), or hashes the unparseable string to a single
    default bucket. This causes massive collisions in the embedding table for what is likely the most
    predictive categorical feature. The fix requires strict type enforcement in the data contracts (schema
    validation must check data types, not just presence) and monitoring the activation distributions of
    the embedding layers to detect when 100% of traffic hits a single bucket.
  common_mistake: Assuming the model weights have been corrupted in memory or that the final calibration
    layer is misconfigured, leading to an unnecessary rollback of the model server.
  napkin_math: With 1M QPS, the feature `device_version` normally hashes across 10,000 embedding buckets.
    If the string parsing fails and defaults to `hash(NaN) -> 0`, then 1,000,000 requests per second are
    hitting bucket 0. The embedding vector for bucket 0 gets updated to the global average CTR during
    any online learning, and during serving, the model loses all user-segmentation power, collapsing predictions
    to the base rate of 5% (0.05).
