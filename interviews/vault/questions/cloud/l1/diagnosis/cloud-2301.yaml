schema_version: 1
id: cloud-2301
title: Diagnosing Gradient Checkpointing Bypasses
topic: vram-budgeting
status: published
provenance: imported
scenario: You are supporting a cloud customer training a custom 40-layer Transformer (hidden size = 8192)
  on an 80GB A100 cluster. They use batch size 16, sequence length 4096, and BF16 precision. To fit within
  memory, they enabled gradient checkpointing for every transformer block. Theoretically, activation memory
  should be minimal. However, telemetry shows GPU memory usage climbing linearly by ~1GB per layer during
  the forward pass, hitting 70GB total before OOMing during the early backward pass. The checkpointing
  API is correctly applied to the layer modules. Diagnose the root cause of this symptom and quantify
  the memory impact.
details:
  realistic_solution: "The symptom—linear memory growth during the forward pass exactly matching layer\
    \ output sizes despite checkpointing—indicates that the computational graph is retaining references\
    \ to the output tensors of every layer. Because the checkpointing API itself is correctly applied,\
    \ the root cause is a structural bypass in the user's graph definition. \n\nThis almost always occurs\
    \ when users collect intermediate activations in a standard Python list to compute a custom loss at\
    \ the end of the forward pass (e.g., layer-wise knowledge distillation or auxiliary routing losses).\
    \ When these intermediate tensors are used in the final loss calculation (`loss = main_loss + sum(intermediate_losses)`),\
    \ Autograd forms a dependency edge. Even though the internal activations of each layer are dropped\
    \ by the checkpointing mechanism, the *output* tensor of every layer is kept alive because it is required\
    \ for the backward pass of the intermediate loss. \n\nTo resolve this, the intermediate loss computation\
    \ must be moved *inside* the checkpointed function so that only the scalar loss is returned and accumulated,\
    \ severing the graph's hold on the massive intermediate activation tensors."
  common_mistake: Assuming PyTorch's memory allocator is fragmented or that the checkpointing API is broken,
    leading to attempts to tune `PYTORCH_CUDA_ALLOC_CONF` instead of fixing the graph topology.
  napkin_math: 'Layer output tensor size: 16 (BS) * 4096 (Seq) * 8192 (Hidden) * 2 bytes (BF16) = 1,073,741,824
    bytes (~1.07 GB).

    Total retained activation memory due to the graph bypass: 1.07 GB * 40 layers = 42.8 GB.

    Expected checkpointed activation memory: ~1.07 GB (only one layer''s activations materialized at a
    time).

    Excess memory causing the OOM: 42.8 GB - 1.07 GB = 41.73 GB.

    Base model footprint (weights + optimizer states for ~32B parameters) takes up the remaining ~28 GB,
    pushing total memory to 70GB before the backward pass even allocates gradient buffers.'
