schema_version: 1
id: cloud-2309
title: Cross-Region Training Latency
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are training a 10B parameter LLM in us-west-2 (where 512 H100s are available), but the 50TB
  cleaned text dataset resides in us-east-1 S3. Training is taking 3x longer than expected, and cloud
  egress costs have unexpectedly jumped by $80,000 this month. GPU utilization is erratic.
details:
  realistic_solution: The symptom of massively inflated egress costs and high latency indicates a failure
    to respect data gravity. The training cluster is pulling the dataset across cloud regions on every
    single epoch. Because cross-region bandwidth is heavily metered and subject to higher latency jitter,
    the dataloaders cannot keep the GPUs saturated, and the company is paying per-GB egress fees repeatedly.
    The solution is to decouple storage from training geographically. First, pre-process, tokenize, and
    heavily compress (e.g., Zstandard + Parquet) the data in us-east-1. Second, perform a one-time asynchronous
    bulk replication of the 50TB dataset to a us-west-2 S3 bucket or a high-performance parallel file
    system (like FSx for Lustre) co-located with the H100 cluster. Training should only read from the
    local us-west-2 storage.
  common_mistake: Trying to compress data on the fly at the dataloader level or increasing dataloader
    prefetch buffers without changing the network topology.
  napkin_math: Dataset = 50TB. Training for 4 epochs = 200TB of cross-region reads. Cross-region egress
    is ~$0.02/GB. 200,000 GB * $0.02 = $4,000 per run. If running 20 hyperparameter tuning jobs, costs
    hit $80k. Latency across US is ~60ms vs <1ms in-region. A one-time 50TB transfer costs $1,000 and
    subsequent local reads (even multiple epochs) incur $0 egress.
