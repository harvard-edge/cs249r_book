schema_version: 1
id: cloud-2304
title: The Silent Redis Feature Skew
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You own a cloud-based recommender system serving 10,000 QPS with a strict 50ms p99 latency SLA.
  Yesterday, you deployed a new model version that had a +2% offline AUC improvement. However, production
  CTR immediately dropped by 15%. Interestingly, latency actually improved to 35ms p99. Standard drift
  metrics on the raw input stream show no covariate shift.
details:
  realistic_solution: The root cause is a training-serving skew induced by an infrastructure failure,
    specifically a caching layer issue. The latency drop (50ms to 35ms) is the primary clue. In production,
    historical user features are fetched from a Redis cluster. A recent configuration change or memory
    limit caused a massive spike in Redis evictions. When the serving pipeline experiences a cache miss,
    it defaults the `user_historical_ctr` feature to 0 to meet the strict SLA, rather than querying the
    slower persistent store. The offline training data uses exact historical aggregates, while the online
    model is suddenly predicting on zero-imputed data for a huge percentage of traffic. The fix requires
    implementing point-in-time correct logging (logging the exact feature vectors used at inference) and
    running continuous statistical tests (e.g., KS tests) between the logged serving features and the
    training data distributions, not just monitoring the raw upstream data.
  common_mistake: Rolling back the model and blaming an offline-online metric mismatch, or assuming the
    model overfit the training data without checking the serving infrastructure.
  napkin_math: Traffic is 10,000 QPS. Redis cache stores 100M user profiles at 1KB each = 100GB. If a
    misconfiguration capped Redis at 60GB, 40% of the working set is continuously evicted. 40% of 10,000
    QPS = 4,000 requests/sec experience cache misses. Defaulting to 0 saves 15ms of persistent DB lookup
    time (explaining the p99 latency drop), but corrupts 40% of the most predictive feature.
