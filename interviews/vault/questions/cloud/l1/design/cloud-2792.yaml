id: cloud-2792
title: Cloud New 0005
topic: graph-compilation
status: published
provenance: imported
scenario: Design a hybrid AOT/JIT compilation architecture for serving a 13B model on A100s with highly
  dynamic sequence lengths (10 to 8000). The goal is to minimize both kernel launch overhead and compilation
  latency.
details:
  realistic_solution: Architect a bucketing system combined with PTX JIT compilation. Pre-compile (AOT)
    kernels for a fixed set of sequence length buckets (e.g., 32, 128, 512, 2048, 8192) using fixed shapes
    to maximize A100 register utilization. Route requests to the nearest upper bucket. For extremely large
    or irregular shapes that cause high memory fragmentation in buckets, trigger a background JIT compilation
    cache. Pad inputs to the bucket size to reuse the highly optimized AOT kernels.
  common_mistake: Attempting to JIT compile kernels on-the-fly for every unique sequence length, introducing
    massive CPU bottlenecks and latency spikes.
  napkin_math: 13B model = 26GB FP16. Max bucket 8192 context. KV cache per token = 800KB. 8192 * 800KB
    = 6.5GB. Padding from 4000 to 8192 wastes ~3.3GB per request but saves compilation overhead. A100
    80GB holds ~8 such requests.
