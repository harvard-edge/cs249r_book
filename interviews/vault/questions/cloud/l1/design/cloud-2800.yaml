id: cloud-2800
title: Cloud New 0015
topic: federated-learning
status: published
provenance: imported
scenario: Design a serverless inference architecture for highly sparse, bursty LLM (7B) workloads. Maximize
  utilization of idle A100s while maintaining low cold-start times. Utilize PCIe Gen4 for weight offloading.
details:
  realistic_solution: 'Architect a host-memory model zoo. Keep the weights of dozens of 7B models in the
    host CPU RAM of an A100 node. The A100 runs a generic execution engine. When a bursty request arrives
    for Model X, stream the weights dynamically from host RAM to A100 VRAM via PCIe Gen4. Pipeline the
    weight transfer with layer-by-layer execution: as Layer 1 computes, stream Layer 2 over PCIe. This
    zero-copy execution model allows one A100 to multiplex hundreds of low-traffic models without OOMing.'
  common_mistake: Loading and unloading entire models synchronously into VRAM on every request, creating
    massive cold-start latencies and stalling the GPU.
  napkin_math: 7B FP16 = 14GB. PCIe Gen4 runs at 32GB/s. Full weight transfer takes 14 / 32 = 0.43s (cold
    start). By pipelining, execution starts after Layer 1 transfers (<10ms). A 1TB Host RAM server can
    store ~70 different 7B models concurrently.
