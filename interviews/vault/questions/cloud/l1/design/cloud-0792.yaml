schema_version: 1
id: cloud-0792
title: The Memory Illusion
topic: transformer-systems-cost
status: published
provenance: imported
scenario: We are deploying a 200B parameter model on an NVIDIA GH200 Grace Hopper Superchip. It has 72
  GB of HBM3 and 480 GB of LPDDR5X CPU RAM, sharing a unified memory space. The weights are 400 GB in
  FP16. Your colleague says we can serve this on a single chip without tensor parallelism since it 'fits'
  in memory. What is the throughput reality of this design?
details:
  realistic_solution: You will hit the **C2C Bandwidth Wall**. While the model "fits," the GPU must fetch
    weights from the CPU's LPDDR5X memory over the 900 GB/s C2C link for every token during the decode
    phase. This is ~4.4x slower than fetching from local HBM3 (4,000 GB/s). Your token-per-second throughput
    will be limited by the C2C link, not the GPU's compute. For high-throughput serving, you still need
    Tensor Parallelism to keep weights in HBM.
  common_mistake: '"Unified memory means the GPU can read all 480 GB at HBM speeds." Unified memory means
    addressing is shared, but physical bandwidth limits still apply.'
  napkin_math: In Decode, latency is roughly $\text{Weights} / \text{Bandwidth}$. HBM3 (4 TB/s) → ~0.1s
    per token. C2C (0.9 TB/s) → ~0.44s per token. Your "fits on one chip" design is 4x slower than a standard
    multi-GPU HBM design.
