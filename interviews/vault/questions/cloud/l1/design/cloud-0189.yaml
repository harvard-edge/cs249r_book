title: The Copilot Latency Paradox
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You are the new Staff ML Systems Engineer at a startup building a real-time AI coding assistant
  to compete with GitHub Copilot. The key feature is streaming multi-line code suggestions. The product
  team has a strict user experience mandate: when a developer pauses typing for 500ms, a suggestion must
  *begin* to appear (Time-To-First-Token) within a P99 deadline of 200ms, and then stream at 15 tokens/second.'
details:
  realistic_solution: The problem is Head-of-Line (HOL) blocking from static batching. A single long-running
    request (e.g., generating a full function) forces all other quick, interactive requests in the same
    batch to wait, killing TTFT. The low utilization comes from the GPU being idle while waiting for a
    full static batch to assemble.
  common_mistake: 'The most common mistake is to think linearly: ''high latency means we need more GPUs''
    or ''low utilization means we can''t afford this model.'' This fails to identify the core systems-level
    problem. The paradox of high latency coexisting with low utilization is a classic sign of a queueing
    bottleneck caused by an inefficient scheduling or batching strategy, specifically Head-of-Line (HOL)
    blocking. Simply adding more machines will not solve HOL blocking and will only worsen the cost issue.'
  napkin_math: 'Here''s how I''d justify this to the CFO and Product Manager:'
