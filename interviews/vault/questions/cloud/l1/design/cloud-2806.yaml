title: Cloud New 0023
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Architect a distributed tracing architecture for a 70B LLM serving platform across A100 nodes
  to debug strict P99 latency SLAs. Identify anomalies in tensor parallelism syncs and KV-cache allocations
  in real-time.
details:
  realistic_solution: 'Implement a low-overhead, zero-allocation tracing framework using eBPF and CUDA
    event hooks. Inject unique request IDs at the gateway. Propagate these IDs through the custom CUDA
    kernels using PTX payload registers. Trace critical path boundaries: NCCL all-reduce times (TP sync),
    KV-cache PCIe transfer latencies, and kernel launch queues. Aggregate the traces asynchronously to
    a time-series database. Define SLA thresholds and trigger automated dump sequences when P99 tail latency
    spikes occur.'
  common_mistake: Using heavy CPU-based synchronous logging within the token generation loop, artificially
    inflating the P99 latency you are trying to measure.
  napkin_math: 70B model with TP=8 on A100s. NCCL All-Reduce for TP sync occurs ~80 times per token. At
    600GB/s NVLink, expected sync latency is ~5-10us. If tracing shows 50us syncs, P99 latency for a 100-token
    generation jumps from 50ms to >100ms.
