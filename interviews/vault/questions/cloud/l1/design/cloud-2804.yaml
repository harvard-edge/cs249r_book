title: Cloud New 0020
topic: pruning-sparsity
status: published
provenance: imported
scenario: Architect an auto-tuning compilation pass for custom Mixture of Experts (MoE) routing layers
  on H100s. Maximize the utilization of the 3.35TB/s HBM3 by optimizing unpredictable sparse memory access
  patterns.
details:
  realistic_solution: Design an AOT compiler with an integrated offline profile-guided optimization (PGO)
    loop. The compiler generates multiple kernel variants for the MoE router with different tile sizes,
    unrolling factors, and L2 cache prefetching strategies. Deploy a tuning harness that runs these variants
    on the H100 using representative routing distributions. The harness measures HBM3 bandwidth utilization
    via hardware performance counters and locks in the optimal kernel configuration for production deployment.
  common_mistake: Relying on generic cuBLAS kernels for MoE routing, which are optimized for dense contiguous
    matrices and perform abysmally on scattered sparse memory reads.
  napkin_math: H100 provides 3.35TB/s HBM3. Unoptimized sparse reads might only achieve 500GB/s due to
    cache misses. Tuning the tile size to fit the 50MB L2 cache ensures that expert weights and routed
    tokens maximize the >3TB/s theoretical limit.
