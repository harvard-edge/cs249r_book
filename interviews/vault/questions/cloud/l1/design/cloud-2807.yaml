schema_version: 1
id: cloud-2807
title: Cloud New 0025
topic: data-parallelism
status: published
provenance: imported
scenario: Architect an activation recomputation strategy to train a 200B parameter model on 128 A100 80GB
  GPUs. Prevent OOM errors while minimizing the compute overhead on the 312 TFLOPS hardware.
details:
  realistic_solution: Design a selective activation recomputation architecture. Instead of recomputing
    all layers or completely discarding activations, profile the model to identify operators with high
    memory footprints but low compute intensity (e.g., LayerNorm, Dropout, Softmax). Discard these activations
    to save VRAM and recompute them on-the-fly during the backward pass. Retain the activations of heavy
    compute operators (like MatMuls) in HBM. Checkpoint only the boundaries of Transformer blocks.
  common_mistake: Checkpointing absolutely no activations and recomputing the entire forward pass natively,
    wasting almost 50% of your compute budget redundantly.
  napkin_math: 200B model across 128 GPUs requires complex 3D parallelism. Assuming DP=2, PP=8, TP=8.
    Softmax/LayerNorm activations consume ~30% of VRAM but only represent <2% of the 312 TFLOPS compute.
    Selective recomputation saves ~20GB VRAM per GPU.
