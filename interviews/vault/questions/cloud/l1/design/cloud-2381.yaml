id: cloud-2381
title: Distributed Sensor Fusion over LoRaWAN
topic: federated-learning
status: published
provenance: imported
scenario: 1,000 agricultural soil sensors (Cortex-M0+, 32KB SRAM). LoRaWAN payload is max 51 bytes per
  message. Duty cycle allows 1 message/hour. The cloud needs to run a global irrigation model based on
  1-minute resolution soil moisture data (16-bit float). Architect the locality split.
details:
  realistic_solution: Shift compute to the edge. The MCU samples every minute, but runs a local statistical
    aggregation or a tiny decision tree (1KB model) to extract features (mean, variance, trend slope)
    over the hour. The sensor sends a highly compressed 10-byte feature vector to the cloud gateway, which
    aggregates all 1000 nodes for the global model.
  common_mistake: Attempting to buffer 60 minutes of raw 16-bit data and send it over LoRaWAN, which exceeds
    the 51-byte payload limit.
  napkin_math: 'Raw data: 60 samples * 2 bytes = 120 bytes > 51 bytes (LoRaWAN limit). Edge feature extraction:
    Mean (2B), Variance (2B), Min (2B), Max (2B), Trend slope (2B) = 10 bytes total. 10B < 51B limit,
    allowing reliable transmission.'
