id: cloud-2811
title: Cloud New 0029
topic: pipeline-parallelism
status: published
provenance: imported
scenario: 'Architect a distributed fine-tuning framework for a 65B model using a highly asymmetric cluster:
  4x V100 32GB nodes and 2x A100 80GB nodes. Maximize total system throughput without stragglers.'
details:
  realistic_solution: Design a load-imbalanced Pipeline Parallel architecture. Map the 65B model across
    the heterogeneous nodes by assigning vastly different layer counts based on compute/memory capacity.
    Place the heavy first/last transformer blocks and embedding layers on the A100s (utilizing 312 TFLOPS
    and 80GB). Assign a small fraction of middle layers to the V100s. Implement dynamic micro-batch size
    adjustments so the processing latency of an A100 stage matches the V100 stage, eliminating pipeline
    bubbles.
  common_mistake: Using synchronous Data Parallelism across the mixed fleet, which throttles the massive
    A100 compute down to the speed of the slowest V100 node.
  napkin_math: A100 (312 TFLOPS) is ~2.5x faster than V100 (125 TFLOPS). A100 80GB holds ~2.5x more layers
    than V100 32GB. For an 80-layer model, assign ~23 layers to each A100 and ~8 layers to each V100.
    Micro-batch timing naturally synchronizes.
