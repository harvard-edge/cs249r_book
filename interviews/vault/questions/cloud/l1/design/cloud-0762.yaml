id: cloud-0762
title: The MTBF Crisis
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: We are scaling our training from 1,000 to 10,000 GPUs. Our current strategy pauses training
  for 5 minutes every hour to save a checkpoint. Is this viable at 10k scale?
details:
  realistic_solution: 'No. As node count ($N$) increases, the Mean Time Between Failures ($MTBF$) decreases:
    $MTBF_{cluster} = MTBF_{node} / N$. At 10,000 GPUs, failures happen constantly. You must use the **Young-Daly
    equation** to balance the checkpoint overhead against the cost of lost work, which usually demands
    asynchronous, in-memory checkpointing to avoid stalling the training loop.'
  common_mistake: '"5 minutes per hour is only 8% overhead — that''s fine at any scale." This ignores
    how failure rates scale with node count.'
  napkin_math: If $MTBF_{node}$ = 1000 hours, then $MTBF_{cluster}$ at 1,000 GPUs = 1 hour. At 10,000
    GPUs = 6 minutes. Your 1-hour checkpoint interval means you lose an average of 3 minutes of work per
    failure at 1k GPUs, but at 10k GPUs you fail every 6 minutes — you'll never complete an hour of training
    between checkpoints.
