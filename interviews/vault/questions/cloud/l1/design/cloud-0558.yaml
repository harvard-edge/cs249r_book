id: cloud-0558
title: The Quantization Bias Amplifier
topic: federated-learning
status: published
provenance: imported
scenario: Your medical imaging model achieves 94% accuracy across all demographic groups in FP32. You
  quantize to INT8 for deployment on edge devices in rural clinics. Overall accuracy drops to 92% — acceptable.
  But a post-deployment audit reveals accuracy for dark-skinned patients dropped from 91% to 72%, while
  light-skinned patients only dropped from 96% to 94%. How did quantization amplify a bias that barely
  existed in the original model?
details:
  realistic_solution: 'Quantization maps continuous activations to discrete bins. The bin boundaries are
    set by calibration data, which is dominated by the majority subgroup. Features that distinguish dark-skinned
    patients (subtle contrast differences, different melanin-related color distributions) occupy a narrow,
    low-magnitude region of the activation space. When you quantize, these fine-grained distinctions get
    crushed into the same bin — the model literally can''t tell them apart anymore. Meanwhile, high-contrast
    features (dominant in light-skinned patients) span multiple bins and survive quantization. The fix:
    per-subgroup calibration data, mixed-precision (keep sensitive layers in FP16), or quantization-aware
    training with subgroup-balanced batches.'
  common_mistake: '"Quantization is a uniform operation — it should degrade all subgroups equally." This
    assumes all subgroups occupy the same region of the activation space.'
  napkin_math: FP32 has ~7 decimal digits of precision. INT8 has 256 levels. If dark-skin features cluster
    in a 0.01-wide activation range and INT8 bin width is 0.02, those features collapse to 1 bin (binary
    output). Light-skin features spanning a 0.5-wide range get 25 bins — plenty of resolution. The quantization
    error is 25× worse for the minority subgroup.
