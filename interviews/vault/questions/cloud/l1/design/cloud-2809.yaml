schema_version: 1
id: cloud-2809
title: Cloud New 0027
topic: vram-budgeting
status: published
provenance: imported
scenario: Architect a shared KV-cache architecture for an AI NPC engine. 1000s of users interact with
  a 13B model on A100s. Contexts share a massive world state prompt but branch into unique multi-turn
  user dialogues.
details:
  realistic_solution: Design a hierarchical, copy-on-write KV-cache using PagedAttention. Pre-compute
    the KV-blocks for the massive world state and lock them in A100 HBM2e as read-only. Assign a unique
    logical block table to each active user session. Map the first N logical blocks of every user to the
    shared physical world state blocks. As users chat, uniquely allocate new physical blocks for their
    individual dialogues. Only evict user-specific blocks via LRU when sessions end or VRAM fills up.
  common_mistake: Duplicating the massive world state KV-cache for every single user session, instantly
    triggering OOM errors on the A100 instances.
  napkin_math: 13B model = 26GB. A100 80GB leaves 54GB. World state (10k tokens) takes ~1.6GB. 1000 users
    with 500 token unique history = 1000 * 80MB = 80GB (OOM). Requires multi-node scaling or offloading,
    but sharing the 1.6GB base saves 1.6TB of VRAM logically.
