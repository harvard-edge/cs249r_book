schema_version: 1
id: cloud-2793
title: Cloud New 0006
topic: data-parallelism
status: published
provenance: imported
scenario: Architect a distributed training network topology for a 300B Mixture of Experts (MoE) model
  across 128 H100 nodes (1024 GPUs). Design the mapping of expert parallelism to NVLink and IB NDR to
  avoid all-to-all congestion.
details:
  realistic_solution: Constrain Expert Parallelism (EP) exclusively within the boundaries of a single
    node to utilize the high-speed 900GB/s NVLink. Place 8 experts per node (1 per GPU). Use Data Parallelism
    (DP) and Pipeline Parallelism (PP) across the 400Gbps IB NDR interconnect. By doing this, the massive
    all-to-all token routing required by MoE routing is strictly localized to the intra-node NVLink fabric,
    heavily mitigating network congestion on the slower IB fabric.
  common_mistake: Distributing experts across nodes, forcing every MoE layer to perform an expensive all-to-all
    token exchange over the limited IB NDR.
  napkin_math: NVLink provides 900GB/s bisection bandwidth per node. All-to-all token routing of a 4K
    sequence at hidden size 8192 = 64MB per layer. Over NVLink, this routing takes < 0.1ms. Over 50GB/s
    IB, it takes ~1.3ms.
