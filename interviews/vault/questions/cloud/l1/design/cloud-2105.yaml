id: cloud-2105
title: DLRM Training Pipeline End-to-End Design
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Design the training infrastructure for a production DLRM at social scale: 12 embedding tables
  totaling 4 TB, an MLP bottom/top network of 50M parameters, training on 10B examples/day. The system
  must support hourly model updates. Identify the three most critical systems bottlenecks and how architecture
  choices address each.'
details:
  realistic_solution: 'Bottleneck 1 — Embedding table memory (4 TB): Cannot fit on any single node. Must
    use model-parallel embedding sharding across ~64+ GPUs (80 GB each). Table-wise sharding with row-wise
    sharding for oversized tables. AllToAll for cross-table feature interaction. Bottleneck 2 — Sparse
    gradient communication: Embedding gradients are extremely sparse (only rows accessed in the batch
    get gradients). Standard AllReduce is wasteful. Use sparse AllReduce or parameter-server-style gradient
    aggregation. At 10B examples/day with 50 lookups each: ~500B sparse updates/day. Bottleneck 3 — Data
    pipeline I/O: 10B examples × ~1 KB each = 10 TB/day = 115 MB/s sustained. Must pre-shuffle and pre-batch
    on distributed storage. Hourly refresh requires training pipeline to process ~420M examples/hour.
    Architecture: Model-parallel embeddings + data-parallel MLPs (ZeRO-1). Dedicated parameter server
    nodes for embedding update aggregation. RDMA-capable interconnect for AllToAll.'
  common_mistake: Treating DLRM like a dense model training problem. The embedding tables dominate memory
    (4 TB vs 200 MB for MLPs) and create fundamentally different parallelism and communication requirements.
  napkin_math: '4 TB embeddings / 80 GB per GPU = 50 GPUs minimum just for embeddings. | Data-parallel
    MLPs: 50M × 16B (BF16 + optimizer) = 800 MB — fits on 1 GPU. | AllToAll per step: batch_size × 12
    tables × 128 dim × 2B = batch_size × 3 KB. At batch 64K: 192 MB AllToAll per step. | 10B examples
    / 86400s = 115K examples/s throughput requirement.'
