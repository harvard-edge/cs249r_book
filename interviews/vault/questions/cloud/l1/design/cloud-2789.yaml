schema_version: 1
id: cloud-2789
title: Cloud New 0002
topic: 3d-parallelism
status: published
provenance: imported
scenario: Architect a 3D parallelism strategy for training a 500B parameter dense model on a cluster of
  1024 A100 80GB GPUs connected via NVLink within nodes and 400Gbps IB NDR across nodes. Maximize hardware
  utilization and minimize communication bottlenecks.
details:
  realistic_solution: Combine Tensor Parallelism (TP=8) strictly within a single node to leverage the
    600GB/s NVLink. Use Pipeline Parallelism (PP=16) across nodes to partition the 500B model, utilizing
    micro-batching (1F1B) to reduce bubble time. Finally, use Data Parallelism (DP=8) across the remaining
    dimensions. Map PP stages across the 400Gbps IB NDR fabric, ensuring gradient synchronization for
    DP uses overlapping communication and computation architectures like ZeRO-1.
  common_mistake: Splitting Tensor Parallelism across nodes, causing the 50GB/s IB NDR to severely bottleneck
    the intense all-gather/reduce operations required for every layer.
  napkin_math: 500B model = 1TB FP16 params. Adam states + grads = 16 bytes/param = 8TB. Cluster has 1024
    * 80GB = 81.9TB memory. TP=8 * PP=16 = 128 GPUs per replica. 1TB / 128 = 7.8GB model per GPU. NVLink
    600GB/s handles TP.
