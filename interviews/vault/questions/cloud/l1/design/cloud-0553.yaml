id: cloud-0553
title: The Roofline Shift
topic: roofline-analysis
status: published
provenance: imported
scenario: We upgraded our serving fleet from A100s to H100s. The H100 has 3x more FP16 TFLOPS. However,
  our LLM decode throughput only got ~67% faster instead of 3x. How is that physically possible?
details:
  realistic_solution: The ridge point of the Roofline shifted right. Your workload was already memory-bandwidth
    bound on the A100 (Arithmetic Intensity < Ridge Point). The H100 has over 3x more compute, but only
    ~1.67x more memory bandwidth. Because LLM decoding is bandwidth-starved ($I \approx 1$), faster ALUs
    cannot do any additional work, and performance scales exactly with the increase in memory bandwidth
    (67%).
  common_mistake: '"The drivers must be misconfigured" or "We need to re-optimize the CUDA kernels for
    H100." Both miss the fundamental physics.'
  napkin_math: A100 ridge point = 312 TFLOPS / 2 TB/s ≈ 156 Ops/Byte. H100 ridge point = 989 TFLOPS /
    3.35 TB/s ≈ 295 Ops/Byte. LLM decode has $I \approx 1$ Ops/Byte — orders of magnitude below both ridge
    points. You are deep in the memory-bandwidth ceiling. H100 bandwidth (3.35 TB/s) is ~1.67x of A100
    (2.0 TB/s), so throughput scales exactly with bandwidth (67%), not FLOPS (300%).
