id: cloud-new-50015
title: CI/CD Pipeline Design for Multi-Accelerator Kernel Testing
topic: software-portability
status: published
provenance: imported
scenario: Your team maintains 80 custom GPU kernels that must work on H100, MI300X, and TPU v5e. Design
  a CI/CD pipeline that tests correctness and performance across all three backends without requiring
  dedicated hardware in CI.
details:
  realistic_solution: 'Three-tier CI: (1) Every PR: CPU-emulated correctness tests using reference implementations
    (PyTorch CPU) — catches logic bugs in seconds. (2) Nightly: GPU correctness on NVIDIA (cheapest, most
    available). AMD ROCm correctness via cloud MI300X instances (spot pricing). TPU correctness via GCP
    TPU VMs. (3) Weekly: Full performance regression suite on all three backends with statistical comparison
    (>5 runs per kernel per backend). Use artifact caching to diff performance against the previous week.
    Budget: ~$500/month for nightly + weekly GPU CI.'
  common_mistake: Trying to run full hardware-in-the-loop CI on all three backends for every PR. GPU CI
    runners are expensive ($3-8/hour per GPU instance), and TPU access is limited.
  napkin_math: '80 kernels x 3 backends x 5 performance runs = 1200 kernel runs per week. At ~30 seconds
    per kernel test: 10 hours total GPU time. At $3/hour average: $30/week = $120/month for performance
    CI alone.'
