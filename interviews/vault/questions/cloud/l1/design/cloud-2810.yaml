schema_version: 1
id: cloud-2810
title: Cloud New 0028
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Design a resilient KV-cache migration architecture for stateful LLM serving on H100s. Instances
  are preemptible. Ensure active user sessions don't lose context or experience massive latency spikes
  on preemption.
details:
  realistic_solution: Architect a continuous, asynchronous background snapshotting service. As tokens
    are generated and appended to the KV-cache in HBM3, mirror the newly allocated PagedAttention blocks
    to host memory via a low-priority PCIe Gen4 stream. Periodically sync host memory to a distributed
    fast-key-value store (like Redis). If an H100 is preempted, the router seamlessly forwards the session
    ID to a new node, which hydrates its KV-cache from Redis, restoring state without full prompt recomputation.
  common_mistake: Forcing the user client to resubmit the entire conversation history to a new node, causing
    a massive 10+ second prefill latency spike.
  napkin_math: 1 block (16 tokens) = 1MB. H100 PCIe Gen4 runs at 32GB/s. Background streaming of 1MB takes
    30 microseconds, completely invisible to the 989 TFLOPS compute. Restoring a 1GB context from Redis
    over 400Gbps network takes ~20ms on cold start.
