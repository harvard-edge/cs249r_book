schema_version: 1
id: cloud-0669
title: The Disaggregated Serving Architecture
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: In our LLM deployment, users sending very long prompts are causing massive latency spikes for
  other users who are currently in the middle of generating tokens. How do we isolate these workloads?
details:
  realistic_solution: Disaggregated Serving. The prompt phase (Prefill) is heavily compute-bound and monopolizes
    the GPU ALUs, starving the token generation phase (Decode), which is memory-bandwidth bound. You must
    split Prefill and Decode onto entirely separate GPU clusters, computing the KV-Cache on the Prefill
    nodes and transmitting it over the network to the Decode nodes.
  common_mistake: '"Rate-limit long prompts" or "Add more GPUs to the pool." Neither addresses the fundamental
    resource contention.'
  napkin_math: 'Prefill for a 10k-token prompt on a 70B model: ~2 seconds of pure compute, consuming 100%
    of GPU ALUs. During those 2 seconds, every concurrent decode request (which needs ~5ms per token)
    is blocked. With 50 concurrent users, that''s 50 × 2s = 100 user-seconds of stalled generation from
    a single long prompt.'
