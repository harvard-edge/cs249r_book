id: cloud-0776
title: The Global Model
topic: collective-communication
status: published
provenance: imported
scenario: Your company operates globally, and due to data residency regulations (e.g., GDPR, CCPA), raw
  training data cannot be moved outside its originating geographic region (US, EU, APAC). You need to
  train a single, unified, large-scale foundation model that learns from all this distributed data. Describe
  the architectural challenges and propose a robust solution for cross-region distributed training.
details:
  realistic_solution: Training a unified model across geographically dispersed data centers with data
    residency constraints presents significant challenges primarily due to **high WAN latency** and **limited
    WAN bandwidth** compared to internal data center networks.
  common_mistake: '"Just copy all the data to one region and train there." This ignores data residency
    laws. "Train locally and average models." This is a starting point but lacks detail on WAN optimization
    and convergence.'
  napkin_math: '- **Model:** 100B parameters, FP16 = 200GB. | - **Gradient Update:** If sending full FP16
    gradients, 200GB per update. | - **WAN Link:** 1Gbps (125MB/s) between regions. | - **Latency:** 200ms
    RTT. | - **Full Gradient Transfer Time:** 200GB / 125MB/s = 1600 seconds = 26.6 minutes *per update*
    (ignoring latency). With latency, this would be even worse for synchronous updates. | - **Compressed
    Gradient (e.g., 100x compression):** 2GB. Transfer time: 2GB / 125MB/s = 16 seconds. This is much
    more feasible for asynchronous updates, allowing updates every few minutes.'
