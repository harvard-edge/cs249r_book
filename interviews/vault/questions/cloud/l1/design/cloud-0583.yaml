id: cloud-0583
title: The Hypersensitive Hyperscaler
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'You are the principal architect for a cloud provider''s flagship inference service. A top-tier
  client wants to deploy their new, proprietary 105B parameter foundation model. Your service is built
  on H100 GPUs (80GB HBM). The client has two non-negotiable demands: 1) the absolute lowest possible
  cost-per-token, which points to aggressive quantization, and 2) a strict accuracy SLO where any detectable
  degradation compared to their FP16 golden reference is a breach of contract. A naive INT8 quantization
  of the 105B model would fit on two H100s, but initial tests show catastrophic accuracy drops on certain
  prompts. Propose a production-ready system design that meets both the cost and accuracy constraints.
  How do you formulate the quantization strategy, what hardware configuration do you propose, and what
  mechanisms do you build to guarantee the accuracy SLO is never violated?'
details:
  realistic_solution: The correct approach is to design a dynamic, multi-layered defense system that acknowledges
    quantization is a statistical process vulnerable to distribution shifts.
  common_mistake: A purely static solution, like 'Find the bad layers, keep them in FP16, and quantize
    the rest to INT8.' This is a good start but fails the L6+ bar. It lacks a 'systems' perspective. It
    doesn't account for data drift, new usage patterns invalidating the initial calibration, or provide
    a mechanism to *guarantee* the SLO. It's a point-in-time fix, not a resilient system.
  napkin_math: 105B params in FP16 = 210GB weights. Requires 3x 80GB H100s (240GB total, 30GB left for
    KV cache). Quantizing to INT8 or FP8 reduces weights to 105GB, fitting on 2x H100s (160GB total, 55GB
    for KV cache), a 33% hardware cost reduction. However, aggressive quantization degrades accuracy on
    outlier tokens, violating the non-negotiable demand.
