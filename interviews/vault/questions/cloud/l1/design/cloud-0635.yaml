schema_version: 1
id: cloud-0635
title: The Gradient Checkpointing Boundary
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: We need to train a 70B model on 8× H100 80 GB GPUs. The team enabled ZeRO-3 and claims it'll
  fit. Walk me through the actual per-GPU memory budget and tell me where it breaks.
details:
  realistic_solution: 'With ZeRO-3, the model state (weights + gradients + optimizer) is sharded across
    all 8 GPUs. The mixed-precision training footprint per parameter is 2 (FP16 weights) + 2 (FP16 gradients)
    + 4 (FP32 master weights) + 8 (FP32 Adam m + v) = 16 bytes. Sharded: 70B × 16 / 8 = **140 GB** — exceeds
    80 GB. But ZeRO-3 doesn''t hold all shards resident simultaneously; during a forward/backward pass,
    parameters are gathered on-demand and discarded. Peak *resident* model state is much lower (~20–25
    GB). The real memory pressure comes from **activations**: without checkpointing, storing all intermediate
    activations for 80 transformer layers at reasonable batch sizes can consume 60+ GB. Gradient checkpointing
    trades 33% extra compute to store activations only at checkpoint boundaries (every $\sqrt{L}$ ≈ 9
    layers), reducing activation memory by ~9×.'
  common_mistake: '"ZeRO-3 shards everything evenly — 70B × 16 bytes / 8 GPUs = 140 GB per GPU. It doesn''t
    fit, so we need more GPUs." This is the right calculation for the *sharded state*, but it misses that
    gradient checkpointing changes the equation for activations, which is where the real design decision
    lives.'
  napkin_math: 'Per-GPU with ZeRO-3 (resident): sharded optimizer ≈ 70B × 12 / 8 = **105 GB** — too much
    if fully materialized, but ZeRO-3 streams shards. Peak resident model state ≈ **20–25 GB** (one layer''s
    params gathered at a time). Activations without checkpointing (batch=1, seq=2048): ~**60 GB**. With
    checkpointing every 9 layers: ~**7 GB**. Total per-GPU: 25 + 7 + overhead ≈ **35–40 GB**. Fits in
    80 GB with room for micro-batch size 2–4. The design knob: checkpoint every $N$ layers, where $N$
    balances recomputation overhead (33% at $N = \sqrt{L}$) against activation memory.'
