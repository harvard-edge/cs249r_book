title: Cloud New 0030
topic: federated-learning
status: published
provenance: imported
scenario: Architect an auto-scaling cost optimizer for serving a 7B chat model. Traffic fluctuates wildly
  10x throughout the day. You have access to reserved T4s and spot T4s. Design the scaling and request
  routing architecture.
details:
  realistic_solution: Implement a predictive load balancer with a two-tier queue. Provision reserved T4
    instances to handle the baseline (trough) traffic to guarantee baseline SLA. For daily spikes, aggressively
    scale preemptible spot T4 instances. Route interactive, latency-sensitive chats to reserved instances.
    Route background batch-processing (summaries, offline extraction) to spot instances. If spot nodes
    drop, queue the offline tasks until prices drop or baseline instances free up.
  common_mistake: Mixing real-time user chat requests onto spot instances without a fallback routing mechanism,
    causing dropped websockets and failed generations when preempted.
  napkin_math: T4 has 16GB, fits 7B INT8 (7GB) easily. Throughput is ~20 tokens/sec per stream. 10x traffic
    spike from 1,000 to 10,000 req/sec. Reserved fleet = 50 T4s. Spot fleet scales to 450 T4s. Segregating
    batch vs interactive prevents spot drops affecting real users.
