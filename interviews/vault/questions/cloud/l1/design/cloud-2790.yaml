id: cloud-2790
title: Cloud New 0003
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are designing an asynchronous checkpointing architecture for a 175B model training continuously
  on 256 H100 80GB GPUs. Node failures are frequent. Design a system to save checkpoints without stalling
  the massive 989 TFLOPS training loop.
details:
  realistic_solution: Architect a multi-tiered async checkpointing system. Introduce a dedicated CPU thread
    per node that pins a region of host memory. During training, GPUs copy state asynchronously via PCIe
    Gen4 to pinned host memory. A background process then streams this data to durable distributed storage.
    Use NVMe SSDs as a middle tier. Implement ring-buffer versioning so training immediately proceeds
    once the PCIe transfer completes, hiding the slow object storage network I/O.
  common_mistake: Blocking the main training loop to write directly to network storage, effectively idling
    the massive 989 TFLOPS compute engines for several minutes per checkpoint.
  napkin_math: 175B model state = 16 bytes/param = 2.8TB total. Across 256 GPUs, each H100 holds ~11GB
    of state. PCIe Gen4 runs at 32GB/s. GPU to Host RAM transfer takes 11GB / 32GB/s = 0.34 seconds. This
    completely hides the network sync.
