schema_version: 1
id: cloud-0720
title: Dimensioning the 3D Cube
topic: 3d-parallelism
status: published
provenance: imported
scenario: We have 1,024 GPUs. How do you allocate the dimensions for Data ($D$), Tensor ($T$), and Pipeline
  ($P$) parallelism for a 175B model?
details:
  realistic_solution: You solve a physical constraint satisfaction problem. $T$ is strictly bounded by
    the NVLink domain (usually $T=8$ per node). $P$ is bounded by the number of transformer layers and
    the microbatch count required to hide the bubble (e.g., $P=16$). Data parallelism ($D$) gets the remainder.
    Total GPUs = $D \times T \times P$, so $D = 1024 / (8 \times 16) = 8$.
  common_mistake: '"Split evenly: $D=T=P$ or just use Data Parallelism for everything." Even splits ignore
    physical constraints; pure DP won''t fit the model.'
  napkin_math: '175B params × 2 bytes = 350 GB weights. One H100 has 80 GB. Minimum TP to fit weights:
    $350/80 \approx 5$, round up to $T=8$ (NVLink domain). With 96 transformer layers and $P=16$ stages:
    6 layers per stage, bubble = $(16-1)/(M+16-1)$. Need $M \geq 45$ to keep bubble under 25%. $D = 1024/(8
    \times 16) = 8$ data-parallel replicas.'
