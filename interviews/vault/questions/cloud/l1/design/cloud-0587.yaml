id: cloud-0587
title: The Silent Quantization Failure
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'You are the tech lead for the ads personalization team. Your team is responsible for a massive
  DLRM-style recommendation model with a 100B-parameter dense network and 1.5TB of embedding tables. To
  reduce serving costs on your H100 fleet, the team embarks on a project to quantize the dense part of
  the model from FP16 to INT8 using Post-Training Quantization (PTQ). They use a standard 10,000-sample
  dataset scraped from production traffic for calibration. Offline metrics are fantastic, with a negligible
  drop in AUC. The model is deployed to a 1% shadow fleet. Within an hour, you get an alert: recommendation
  quality has cratered, but only for a specific segment of ''power users''. The model seems to be outputting
  garbage predictions for them. The VP of Engineering wants a plan on her desk by EOD. Propose a concrete,
  three-step plan to diagnose, mitigate, and solve this problem. Justify your architectural choices with
  quantitative reasoning.'
details:
  realistic_solution: The catastrophic failure for 'power users' strongly suggests an activation overflow
    problem. Power users, with their deep history and high feature cardinality, generate activation values
    with a much wider dynamic range than the 'average' users in the calibration set. The INT8 format,
    with its `[-127, 127]` range, cannot represent these outlier activations, causing them to be 'clipped'
    or 'saturated' to the max value. This saturation corrupts the information flow through the network,
    leading to garbage outputs for this specific user segment.
  common_mistake: The most common L4/L5 answer is to 'get a better calibration dataset' or 'use Quantization-Aware
    Training (QAT)'. These are not wrong, but they are sledgehammer solutions that don't diagnose the
    root cause and are extremely expensive. An L6+ engineer must first precisely identify the failure
    mode and propose a more surgical, cost-effective fix.
  napkin_math: Let's quantify the impact of a single overflow event. Assume a layer's activations are
    calibrated to a range of `[-10, 10]` based on average users. The scaling factor `S` for symmetric
    INT8 is `S = 127 / 10 = 12.7`. Now, a power user generates an activation value of `30.0`. The quantized
    value should be `30.0 * 12.7 = 381`. However, this is clipped to the INT8 max of `127`. When this
    value is de-quantized for the next layer, it becomes `127 / S = 127 / 12.7 = 10.0`. The error introduced
    for this single value is `30.0 - 10.0 = 20.0`, a 67% relative error that cascades through the network.
