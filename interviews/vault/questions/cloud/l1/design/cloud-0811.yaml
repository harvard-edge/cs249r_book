id: cloud-0811
title: The Energy Economics
topic: tco-cost-modeling
status: published
provenance: imported
scenario: We are purchasing a $100M cluster of H100 GPUs. The CFO wants to know the Total Cost of Ownership
  (TCO) over a 3-year lifecycle. Why is the $100M figure severely underestimating the budget?
details:
  realistic_solution: You forgot the OpEx (Operating Expenses), specifically power and cooling. Over a
    3-year lifespan, the electricity required to run a massive cluster at high utilization — plus the
    power to cool it — frequently matches or exceeds the initial CapEx (hardware cost). System efficiency
    ($\eta$) isn't just about training speed; it's the primary lever for financial viability.
  common_mistake: '"Add 20% for networking and storage." Infrastructure costs matter, but the biggest
    hidden cost is ongoing.'
  napkin_math: '10,000 H100s × 700W TDP = 7 MW compute. With PUE of 1.3 (cooling overhead): 9.1 MW total.
    At $0.10/kWh: 9,100 kW × $0.10 = $910/hour = $7.97M/year = **$23.9M over 3 years** in electricity
    alone. That''s ~24% of the hardware cost, but still a massive ongoing expense. True TCO ≈ $100M (CapEx)
    + $23.9M (power) + networking/staff = **$150M+**.'
