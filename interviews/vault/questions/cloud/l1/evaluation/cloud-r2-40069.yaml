schema_version: 1
id: cloud-r2-40069
title: Ultra Ethernet Consortium for ML Training
topic: rdma-transport
status: published
provenance: imported
scenario: The Ultra Ethernet Consortium (UEC) is designing a new RDMA transport specifically for AI/ML
  workloads, addressing RoCE v2's PFC dependency and InfiniBand's vendor lock-in. UEC proposes packet
  spraying (per-packet load balancing), hardware-based selective retransmission, and multi-path transport.
  Evaluate UEC's architecture for a hypothetical 8192-MI300X training cluster compared to RoCE v2 and
  InfiniBand.
details:
  realistic_solution: 'UEC key innovations and evaluation: (1) Packet spraying: distributes individual
    packets across all available paths, achieving perfect load balancing without ECMP hash collisions.
    Benefit: eliminates the hash polarization problem that causes 10-20% throughput loss with ECMP at
    >1024 GPUs. Concern: requires hardware reordering buffers at every receiver — each 400G port needs
    ~4MB of reorder buffer, adding to switch silicon cost. (2) Selective retransmission: retransmits only
    lost packets (vs RDMA RC''s go-back-N which retransmits entire windows). Benefit: reduces retransmission
    overhead from O(window) to O(1). For AllReduce with 0.01% loss rate: RC retransmits ~655 extra packets
    per 256MB, selective retransmits ~65. 10× reduction. (3) Multi-path transport: single connection uses
    multiple physical paths natively. Eliminates the need for NCCL to manage per-rail QPs manually. Benefit:
    automatic failover and load balancing without application changes. Overall: UEC addresses real pain
    points, especially PFC elimination and vendor independence. For 8192 MI300X: UEC''s packet spraying
    alone would improve AllReduce throughput by 15-25% vs ECMP-based RoCE v2. But timeline risk: UEC silicon
    expected 2026-2027, first production deployments 2028+. IB and RoCE will advance 2 generations by
    then.'
  common_mistake: Evaluating UEC purely on paper specifications without considering the maturity gap.
    RoCE v2 and InfiniBand have 15+ years of production hardening, while UEC is pre-silicon. Paper specs
    always look better than deployed systems.
  napkin_math: '8192 MI300X cluster: AllReduce with ECMP (RoCE): ~15% throughput loss from hash collisions
    at scale. AllReduce with packet spray (UEC): ~2% overhead from reordering. Net improvement: 13% throughput
    gain. Training cost for 70B model: $10M (estimate). 13% faster training: saves $1.3M. UEC''s incremental
    NIC/switch cost: ~$2M for 8192-GPU cluster. Payback: 1.5 training runs.'
