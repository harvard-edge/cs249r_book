id: cloud-2366
title: Dragonfly Topology for MoE Routing
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: Your team is building a 32,000 GPU cluster dedicated to Mixture of Experts (MoE) LLM training.
  The MoE workload requires massive All-to-All communication (100 MB per GPU per forward pass). You are
  deciding between a Folded Clos (Fat-Tree) and a Dragonfly topology. Dragonfly reduces the number of
  expensive long-reach optical links by 60%, but requires Adaptive Routing (AR) to prevent congestion.
  Analyze the tradeoff between structural cost and latency variance under MoE workloads.
details:
  realistic_solution: 'Dragonfly topology exploits locality by grouping routers into high-bandwidth local
    chassis and using a sparse global mesh of long-reach optical links. This topology is highly cost-effective
    for workloads with high spatial locality. However, MoE relies heavily on All-to-All communication,
    which generates uniformly distributed global traffic. In a Dragonfly network, global traffic must
    traverse the sparse inter-group links. To avoid bottlenecks, Adaptive Routing (AR) uses non-minimal
    routing (routing traffic through intermediate groups), which increases the hop count from 1 (minimal)
    to up to 3 (non-minimal). This increases latency variance significantly. For synchronous All-to-All,
    the operation is bound by the tail latency of the slowest packet. While AR increases total throughput
    by utilizing non-minimal paths, the out-of-order packet delivery and latency jitter can severely degrade
    MoE performance unless the network interface (NIC) has advanced hardware reordering buffers. The tradeoff:
    Dragonfly saves millions in optical CAPEX but requires advanced DPUs/NICs with deep packet reordering
    buffers and highly tuned AR algorithms to prevent tail-latency-induced stragglers in MoE.'
  common_mistake: Choosing Dragonfly solely for the 60% optical link cost reduction without considering
    that All-to-All communication patterns defeat the localized traffic advantages of Dragonfly, causing
    severe congestion.
  napkin_math: 'Minimal route hop latency: ~1us. Non-minimal route (3 global hops): ~3-4us. Packet reordering
    buffer needed = Bandwidth * Delay Product. 400 Gbps * 3us = 1.2 Mb (150 KB) per flow. For 32,000 simultaneous
    flows in All-to-All, memory required on switch/NIC for reassembly scales dramatically, risking buffer
    overruns.'
