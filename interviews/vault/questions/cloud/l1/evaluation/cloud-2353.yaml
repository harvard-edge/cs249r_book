schema_version: 1
id: cloud-2353
title: Petabyte-Scale Multimodal Streaming
topic: storage-format-selection
status: published
provenance: imported
scenario: You are designing the data ingestion layer for training a multimodal model on a dynamic cloud
  cluster of 4,000 GPUs (500 nodes). The dataset is 20 PB, consisting of 2MB images and 10MB video clips
  stored in Cloud Object Storage (S3/GCS). Each GPU processes 500 MB/s. Nodes are preemptible, causing
  frequent cluster resizing. Design a locality-aware data ingestion architecture that sustains 2 TB/s
  aggregate throughput without hitting cloud API rate limits, excessive costs, or cache-warming latency
  spikes.
details:
  realistic_solution: 'Adopt a streaming-first architecture using large sequential shards to transform
    the access pattern from IOPS-bound to throughput-bound. Group the small files into 2GB uncompressed
    tarballs (e.g., WebDataset format). Locality design: Cloud Object Store acts as the primary tier.
    Each node streams 2GB tarballs directly into host memory via HTTPS, bypassing local disk entirely
    for the primary read path. Because nodes are preemptible, relying on a local NVMe cache would incur
    massive cache-warming penalties upon respawning. Instead, local NVMe is strictly utilized as a constrained
    ring buffer for cross-shard shuffling (holding ~200GB of recent samples), allowing instant resumption
    of training on new nodes while maintaining sequential streaming efficiency from the cloud.'
  common_mistake: Deploying a POSIX-compliant parallel filesystem to cache the 20PB dataset, or issuing
    random API GET requests for individual 2MB/10MB files directly from the object store, leading to IOPS
    throttling and massive API costs.
  napkin_math: 'Aggregate throughput needed: 4,000 GPUs * 500 MB/s = 2 TB/s. Small files approach (avg
    size 5MB): 2 TB/s / 5MB = 400,000 GET requests/sec. S3 charges ~$0.0004 per 1,000 GETs = $0.16/sec
    (~$13.8K/day) in API costs. Tarball approach (2GB shards): 2 TB/s / 2GB = 1,000 GET requests/sec =
    $0.0004/sec (~$35/day). Per-node bandwidth: 8 GPUs * 500 MB/s = 4 GB/s (32 Gbps), easily handled by
    a standard 100 Gbps cloud NIC without relying on local disk reads.'
