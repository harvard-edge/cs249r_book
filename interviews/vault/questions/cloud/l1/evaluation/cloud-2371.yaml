schema_version: 1
id: cloud-2371
title: AEC vs AOC for 800G Leaf Links
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing the physical layer for a 24,000 GPU cluster. The links from the GPU NICs to
  the Leaf switches operate at 800 Gbps (PAM4 modulation). The physical distance is between 1.5 and 2.5
  meters. You must choose between Active Electrical Cables (AECs) and Active Optical Cables (AOCs) for
  these 24,000 links. Evaluate the tradeoff considering signal integrity, power consumption, and thermal
  limits of the racks.
details:
  realistic_solution: "At 800 Gbps using PAM4 modulation, signal integrity degrades rapidly over copper.\
    \ Passive Direct Attach Copper (DAC) cannot reliably span the 2.5m needed to reach the Top-of-Rack\
    \ switch without unacceptable Bit Error Rates (BER). \n\nThe choices are Active Electrical Cables\
    \ (AEC) or Active Optical Cables (AOC). AECs use retimers (DSP chips) inside the cable heads to clean\
    \ and amplify the electrical signal, extending copper reach to ~3 meters. AOCs convert the electrical\
    \ signal to optical via transceivers. \n\nThe Tradeoff: Power vs. Reach/Bulk. An 800G AOC consumes\
    \ ~15W per end (30W per link). An 800G AEC consumes ~7W per end (14W per link). For 24,000 links,\
    \ AOCs consume 720 kW of power, while AECs consume 336 kW. Saving ~380 kW is massive for data center\
    \ power budgets (allowing more power for GPUs). Additionally, optical transceivers are more prone\
    \ to thermal failure if rack temperatures spike. However, AECs are physically much thicker and heavier\
    \ than fiber, creating cable routing and airflow blockage issues in dense racks. The optimal tradeoff\
    \ for 2.5m is AEC to save power and thermal budget, provided the rack design can accommodate the cable\
    \ bulk."
  common_mistake: Assuming passive copper (DAC) is always best for short ranges, ignoring that at 800G
    PAM4, passive copper signal degradation limits reach to <1 meter, requiring active components.
  napkin_math: '24,000 800Gbps links to Leaf switches. Active Optical Cables (AOC) use ~30W per link for
    laser transceivers. Active Electrical Cables (AEC) use ~14W. Saving: 16W * 24,000 = 384 kW. In a power-constrained
    datacenter, saving 384 kW of networking power (plus cooling overhead) frees up enough power to rack
    an additional 548 H100 GPUs (at 700W each). For 2-meter runs, AECs massively improve GPU density.'
