id: cloud-2384
title: Privacy-Preserving Health Wearable FL
topic: federated-learning
status: published
provenance: imported
scenario: 1M smart rings (128KB SRAM, 20mAh battery) collect PPG (50Hz) and Temp (1Hz). Cloud orchestrates
  Federated Learning to train a sleep stage model. Transmitting raw data via BLE (10mA) drains the tiny
  battery. Architect the distributed training system.
details:
  realistic_solution: Use cross-device Federated Learning with edge feature extraction. The ring extracts
    low-dimensional features (e.g., Heart Rate, HRV, avg temp per minute) locally. During the night, while
    charging, the ring performs local SGD on a lightweight model using these features. It then syncs the
    model weight updates via BLE to the phone, which proxies to the cloud FL server.
  common_mistake: Uploading raw PPG data over BLE to a phone gateway for centralized cloud training, destroying
    battery life.
  napkin_math: 'Raw PPG: 50Hz * 2B = 100 B/s = 8.6 MB/day. BLE tx (~60 KB/s practical) takes ~140s. Energy
    = 140s * 10mA = 1400 mAs = 0.388 mAh (~2% of 20mAh battery per day, which is massive for a 7-day wearable).
    Extracted features: 4 bytes/min = 5.7 KB/day. Local training + sending 10KB weight update takes <1s
    of BLE active time = 10 mAs = 0.0027 mAh. Negligible battery impact.'
