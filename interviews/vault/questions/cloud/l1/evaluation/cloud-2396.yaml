schema_version: 1
id: cloud-2396
title: Carbon-Aware Multi-Region Routing
topic: federated-learning
status: published
provenance: imported
scenario: You run a weekly batch data processing job requiring 10,000 A100 GPU-hours (at 400W each) to
  process a 50TB dataset currently residing in US-East. You can run it in US-East (PUE 1.3, Grid Carbon
  450g CO2/kWh, Power $0.10/kWh) or transfer the data to EU-North (PUE 1.15, Grid Carbon 50g CO2/kWh,
  Power $0.15/kWh). Cross-region data transfer costs $0.02/GB. You must minimize total carbon footprint
  while justifying the financial tradeoff to your leadership.
details:
  realistic_solution: 'To make a carbon-aware scheduling decision, you must calculate the total facility
    energy (IT Power * PUE) for both regions. EU-North offers a massive 90% reduction in carbon footprint
    compared to US-East, making it the clear winner for sustainability. However, this comes at a steep
    financial cost. While the compute energy cost in EU-North is slightly higher due to the $0.15/kWh
    rate, the real penalty is the data transfer cost for 50TB. As a Staff engineer, you must present this
    tradeoff: saving ~2.1 metric tons of CO2 costs an additional $1,170. You could propose an optimization:
    instead of moving the raw data weekly, process it incrementally, compress it aggressively, or replicate
    the ingestion pipeline directly to EU-North to avoid recurring egress fees.'
  common_mistake: Calculating carbon footprint based solely on IT power (ignoring PUE) or failing to account
    for the massive financial cost of inter-region data egress.
  napkin_math: "Compute Energy = 10,000 hrs * 400W = 4,000 kWh. \nUS-East: Total Energy = 4,000 * 1.3\
    \ = 5,200 kWh. Carbon = 5,200 * 450g = 2,340 kg. Compute Cost = 5,200 * $0.10 = $520. Egress = $0.\n\
    EU-North: Total Energy = 4,000 * 1.15 = 4,600 kWh. Carbon = 4,600 * 50g = 230 kg. Compute Cost = 4,600\
    \ * $0.15 = $690. Egress = 50,000 GB * $0.02 = $1,000. Total Cost = $1,690.\nTradeoff: Save 2,110\
    \ kg of CO2 for an extra $1,170 ($1690 - $520)."
