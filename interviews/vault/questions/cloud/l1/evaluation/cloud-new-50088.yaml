schema_version: 1
id: cloud-new-50088
title: Overlap-Aware Job Scheduling on Shared GPU Clusters
topic: communication-computation-overlap
status: published
provenance: imported
scenario: Your GPU cluster runs multiple DDP training jobs. Job A (8 GPUs, 200ms backward, 100ms AllReduce)
  and Job B (8 GPUs, 50ms backward, 100ms AllReduce) share the same InfiniBand fabric. When both run simultaneously,
  Job A's AllReduce time jumps to 180ms because of fabric contention. Job A's overlap breaks. Evaluate
  cluster scheduling policies to protect overlap efficiency.
details:
  realistic_solution: 'Network-aware scheduling: (1) Topology-aware placement: assign jobs to GPU groups
    that share dedicated IB switches (locality). Job A on switches 1-2, Job B on switches 3-4. No contention.
    (2) Time-division multiplexing: schedule communication-heavy jobs to stagger their AllReduce phases.
    If Job A''s AllReduce is at t=200ms and Job B''s at t=50ms, they naturally stagger. (3) Network isolation:
    use IB partitioning (PKeys) to guarantee bandwidth per job. (4) Priority-based QoS: mark Job A''s
    NCCL traffic as high-priority in IB''s SL-to-VL mapping. (5) Evaluation: topology-aware placement
    is simplest and most effective — it eliminates contention with zero runtime overhead. Modern schedulers
    (Slurm + topology plugin, Kubernetes + network topology awareness) support this.'
  common_mistake: Scheduling jobs purely based on GPU availability without considering network topology.
    Two communication-heavy jobs sharing the same IB switches destroy each other's overlap efficiency.
  napkin_math: 'Job A with contention: 200ms backward + 80ms exposed AllReduce (180ms - 100ms overlap
    capacity) = 280ms/step. Without contention: max(200, 100) = 200ms/step. Contention cost: 80ms/step
    = 40% throughput loss. For a 24-hour job: 9.6 hours wasted on network contention.'
