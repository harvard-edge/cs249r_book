id: cloud-fill2-32018
title: Pipeline Bubble in Zero-Bubble Scheduling
topic: pipeline-parallelism
status: published
provenance: imported
scenario: 'Recent work on zero-bubble pipeline parallelism (ZB-H1, ZB-H2) claims to eliminate pipeline
  bubbles by splitting the backward pass into two parts: backward-for-input (B) and backward-for-weights
  (W), then scheduling W during what would have been bubble time. Explain the mechanism, its memory cost,
  and whether it truly achieves zero bubble.'
details:
  realistic_solution: 'In standard 1F1B, the backward pass computes both dL/dx (input gradient, needed
    by previous stage) and dL/dW (weight gradient, needed for optimizer step) together. Zero-bubble scheduling
    splits these: B (backward-input) runs during the normal schedule to maintain pipeline flow, while
    W (backward-weight) is deferred to fill bubble slots. This works because dL/dW doesn''t block the
    pipeline — no other stage depends on it. The result: the pipeline bubble (P-1 slots) is filled with
    W computations. Memory cost: each deferred W must store the activations needed for the weight gradient,
    requiring ~(P-1) additional micro-batches of activation storage. For P=8, this is 7 extra activation
    copies. It is not truly zero-bubble in the strict sense — it trades memory for bubble elimination
    and requires enough deferred W work to fill the bubble slots exactly. In practice, it achieves >95%
    pipeline utilization vs ~70-85% for standard 1F1B.'
  common_mistake: Assuming zero-bubble means zero overhead. The W pass requires storing an extra set of
    weight gradients and introduces memory pressure. Also, the W passes accumulated during bubble slots
    introduce gradient staleness if not carefully synchronized.
  napkin_math: 'Standard 1F1B: bubble = (P-1)/(M+P-1). P=8, M=24: bubble = 7/31 = 22.6%. Zero-bubble:
    fills 7 bubble slots with W passes. Extra memory: 7 × activation_per_microbatch. If act = 2 GB: 14
    GB extra. Utilization: ~97-99% vs 77.4%.'
