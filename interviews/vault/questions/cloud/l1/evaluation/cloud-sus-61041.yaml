id: cloud-sus-61041
title: Mixture of LoRA Experts (MoLoRA) Architecture
topic: model-adaptation-systems
status: published
provenance: imported
scenario: Design a mixture-of-adapters system where each input token is routed to one of 8 specialized
  LoRA adapters. Analyze the computational overhead and routing mechanism.
details:
  realistic_solution: 'MoLoRA uses a lightweight router (2-layer MLP, 256 hidden) that maps input embeddings
    to a soft assignment over K=8 adapters. Top-2 routing with load balancing loss (like MoE). Forward
    pass: for each token, compute 2 adapter outputs and sum. Memory: 8 rank-16 adapters per layer × 32
    layers = 256 adapter matrices = 8× single-adapter memory (67.1 MB total vs 8.4 MB). Inference overhead:
    router (256 params per layer, negligible) + 2 adapter forward passes per token. Net overhead: 2× single-adapter
    compute, 8× memory.'
  common_mistake: Implementing token-level routing with a separate learned router per layer, ignoring
    that 8 adapters per layer × 32 layers = 256 routing decisions per forward pass, each requiring its
    own compute.
  napkin_math: 'Single rank-16 adapter per layer: 2×16×4096 = 131K params × 2B = 256 KB. 32 layers single
    adapter: 131K × 32 = 4.19M params × 2B = 8.4 MB. 8 MoLoRA adapters: 8 × 4.19M × 2B = 67.1 MB for adapters.
    Router: 32 × (4096×256 + 256×8) = 32 × 1.05M = 33.6M params → 67.1 MB. Total MoLoRA overhead: 134
    MB vs 8.4 MB single adapter = 16× more memory but routes each token to its specialized adapter.'
