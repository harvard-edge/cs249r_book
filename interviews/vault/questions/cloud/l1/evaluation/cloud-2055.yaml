title: The RAG vs Fine-Tuning Breakeven Analysis
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your team debates whether to use RAG or fine-tune a model on 100K domain-specific documents.
  RAG adds retrieval latency and ongoing vector DB costs but requires no training. Fine-tuning eliminates
  retrieval latency but costs $5K per training run, needs retraining monthly as documents change, and
  bakes knowledge into weights (no easy update). At 50K queries/day with a 6-month planning horizon, which
  approach has lower TCO, and at what query volume does the breakeven point shift?
details:
  realistic_solution: 'Full TCO comparison over 6 months: RAG: (1) Initial embedding: 100K docs Ã— $0.0001
    = $10. (2) Vector DB: 100K docs at 768-dim PQ = 6.4 MB â€” fits on a single small instance, $200/month.
    (3) Per-query retrieval overhead: embedding ($0.00005) + search ($0.00001) = $0.00006/query. At 50K/day:
    $3/day = $90/month. (4) Re-embedding updates: 5K docs/month Ã— $0.0001 = $0.50/month. (5) LLM inference
    (2K input tokens with context): $0.006/query = $300/day = $9,000/month. Total RAG: $10 + 6 Ã— ($200
    + $90 + $9,000) = $55,740 over 6 months. Fine-tuning: (1) Initial training: $5,000. (2) Monthly retraining:
    $5,000 Ã— 6 = $30,000. (3) LLM inference (shorter prompt, no retrieval context, ~500 tokens): $0.0015/query
    = $75/day = $2,250/month. (4) Evaluation and validation per retrain: $500 Ã— 6 = $3,000. Total Fine-tuning:
    $5,000 + $30,000 + 6 Ã— $2,250 + $3,000 = $51,500 over 6 months. Surprisingly close! But fine-tuning
    has hidden costs: knowledge staleness between monthly retrains (stale for ~2 weeks on average), hallucination
    risk (fine-tuned models can''t cite sources), and 2-3 days of downtime risk per retrain. The breakeven
    shifts: at <30K queries/day, RAG is cheaper (fixed vector DB cost is small relative to per-query LLM
    savings). At >100K queries/day, fine-tuning''s per-query savings dominate. The best answer for most
    teams: RAG with a fine-tuned base model â€” fine-tune for domain vocabulary and reasoning patterns,
    but still retrieve for factual grounding.'
  common_mistake: Comparing only inference latency and concluding 'fine-tuning is faster, so it's better.'
    Or comparing only training cost and concluding 'RAG requires no training, so it's cheaper.' Both ignore
    the full cost picture.
  napkin_math: 'RAG per-query cost: $0.006 (LLM) + $0.00006 (retrieval) = $0.00606. Fine-tuned per-query:
    $0.0015 (shorter prompt). Savings per query: $0.00456. Queries to recoup $5K training: $5,000 / $0.00456
    = 1.1M queries. At 50K/day: 22 days to breakeven per training run. With monthly retraining: net savings
    = 30 Ã— 50K Ã— $0.00456 - $5,000 = $1,840/month.'
