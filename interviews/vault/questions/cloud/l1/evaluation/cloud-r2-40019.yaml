schema_version: 1
id: cloud-r2-40019
title: Congestion Control at 800G and Beyond
topic: congestion-control
status: published
provenance: imported
scenario: Next-generation ML clusters will use 800Gbps links (2 × 400G PAM4 lanes). At 800Gbps with 4KB
  packets, the inter-packet gap shrinks to ~41ns. Evaluate whether current congestion control mechanisms
  (PFC, DCQCN, ECN) can scale to 800G, or if fundamental redesign is needed. Consider switch buffer sizes,
  reaction times, and marking accuracy.
details:
  realistic_solution: 'The bandwidth-delay product doubles at 800G while switch buffers grow slowly (~2×
    per 2-3 generations). At 800Gbps: BDP = 800 Gbps × 5μs RTT = 500 KB per flow. Switch buffers: current
    Tomahawk-5 has 132MB, next-gen may have 200MB. The ratio is manageable for now. Key challenges: (1)
    PFC reaction time: PFC pause propagation takes 2-3μs; at 800G, 200-300 KB drains during this time
    — PFC headroom must double. (2) ECN marking: 800G with 4KB packets = 24.4M packets/sec per port, requiring
    faster ASIC pipelines (already at physical limits). (3) DCQCN: CNP generation rate may need to increase
    since flows fill buffers faster. Verdict: current mechanisms can scale to 800G with parameter tuning
    (double PFC headroom, halve ECN thresholds), but 1.6T links will likely require credit-based flow
    control (like InfiniBand) or in-network congestion signaling (programmable switches with P4). Ultra
    Ethernet Consortium is already defining these next-gen protocols.'
  common_mistake: Assuming linear scaling — that doubling link speed just requires doubling buffer and
    everything works. The challenge is that reaction times (RTT, PFC propagation) remain constant while
    the data rate doubles, meaning buffers fill twice as fast relative to the control loop.
  napkin_math: '800G with 4KB MTU: 24.4M pkt/sec. Buffer fill time: 200MB / 100 GB/s = 2ms (vs 4ms at
    400G with same buffer). PFC headroom at 800G: 800Gbps × 3μs = 300 KB (vs 150 KB at 400G). ECN threshold
    must be 2× earlier relative to buffer to maintain same reaction margin. At 1.6T: fill time drops to
    1ms — approaching PFC propagation time, making PFC nearly useless.'
