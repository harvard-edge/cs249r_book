schema_version: 1
id: cloud-2382
title: Federated Personalization of Wake Words
topic: federated-learning
status: published
provenance: imported
scenario: Smart earbuds (Cortex-M4, 256KB SRAM) must personalize a 50KB TFLite Micro keyword spotting
  model to a user's voice without sending audio to the cloud. The companion phone app orchestrates Federated
  Learning. A standard backprop pass for a 50KB model requires ~150KB of memory for activations.
details:
  realistic_solution: Use transfer learning with federated averaging. The cloud freezes the feature extractor
    layers of the model. The MCU only updates the final fully connected classifier layer (e.g., 1KB of
    weights). This drastically reduces the activation memory footprint. The phone aggregates these 1KB
    local gradients and sends them to the cloud for FedAvg.
  common_mistake: Attempting to run full backpropagation on the MCU, which exceeds the 256KB SRAM when
    combined with the OS and audio buffers.
  napkin_math: Cortex-M4 has 256KB SRAM. The base OS, buffers, and the 50KB model consume ~150KB, leaving
    ~100KB. For on-device personalization, we only train the final dense layer. If the layer maps a 64-dim
    embedding to 12 classes, it has 64*12 = 768 weights. At 8-bit precision, weights = 768 bytes. A batch
    size 1 backprop requires storing activations (64 + 12 = 76 bytes). Total training RAM is <1KB, easily
    fitting.
