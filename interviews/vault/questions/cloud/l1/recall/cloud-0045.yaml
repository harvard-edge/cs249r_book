id: cloud-0045
title: The Iceberg of Inference Cost
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are deploying a new RAG-based customer support chatbot that uses a 7B parameter model for
  generation. The service must be available 24/7. From a Total Cost of Ownership (TCO) perspective, identify
  the dominant, long-term cost for this system.
details:
  realistic_solution: The dominant long-term cost is running the GPU for inference 24/7. While training
    is a significant one-time cost and vector database storage is relatively cheap, the operational expense
    of keeping a GPU active for inference accumulates to become the largest part of the TCO over the system's
    lifecycle.
  common_mistake: Engineers often focus heavily on the one-time, upfront cost of model training, which
    is computationally intensive and memorable, while underestimating that the continuous, operational
    cost of running inference 24/7 quickly eclipses it. They see training as the 'big expense' and forget
    the system is 'always on'.
  napkin_math: A 7B parameter model requires approximately 14 GB of VRAM in FP16 (7B params × 2 bytes/param).
    This fits on a single cloud GPU. Assuming a conservative cost of ~$2/hour for that GPU, the annual
    inference cost is $2/hr × 24 hr/day × 365 days/yr = $17,520/year. This recurring operational expense
    quickly surpasses the one-time training cost (often in the tens of thousands for a model this size)
    and dwarfs the storage cost for embeddings (typically a few hundred dollars per year).
