title: 'Queueing Theory Mastery: Inference System Capacity Planning End-to-End'
topic: queueing-theory
status: published
provenance: imported
scenario: 'Design a complete inference capacity plan for a GPT-4-scale service (1.8T parameter MoE model,
  routed to ~200B active params) on H100s (80GB HBM3). Requirements: λ=5000 req/s peak, P99 < 3s, mean
  output 500 tokens. Model requires 200GB VRAM for active params across 4 H100s per pod. Use Little''s
  Law and M/M/c to size the fleet, determine utilization target, and estimate $/1M tokens.'
details:
  realistic_solution: 'Each pod = 4 H100s (fits 200GB model). Mean service time per pod: prefill 2048
    tokens + decode 500 tokens at ~20ms/tok = 10s. μ_pod = 0.1 req/s. For P99<3s with M/M/c: need many
    pods. Set ρ=0.7 (safe operating point for P99 constraint). μ_cluster = λ/ρ = 5000/0.7 = 7143 req/s
    cluster capacity. Pods needed: 7143/0.1 = 71,430 pods. Each pod = 4 H100s: 285,720 H100s. Cost: at
    $2/hr/H100 = $571,440/hr. Revenue at 5000 req/s * 500 tok/req * $0.01/1K tok = $25/s = $90,000/hr.
    Note: real GPT-4 uses MoE to reduce compute per request.'
  common_mistake: Not accounting for model sharding requiring multiple GPUs per 'server unit' and treating
    each H100 independently as a separate server in M/M/c analysis.
  napkin_math: 'Service time: 500 output tokens * 20ms/tok = 10s per request. μ=0.1 req/s per pod. At
    ρ=0.7: pods = λ/(ρ*μ) = 5000/(0.7*0.1) = 71,429 pods = 285,714 H100s. Cost/hr: 285,714 * $2 = $571,428/hr.
    Revenue: 5000 req/s * 500 tok * 3600s * $0.01/1000 = $90,000/hr. Margin: ($90k - $571k)/hr = -$481k/hr
    negative! Real systems use speculative decoding, MoE routing, and 10x more efficient decode (5ms/tok
    target) to close this gap.'
