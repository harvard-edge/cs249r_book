id: cloud-0195
title: The Underutilized Accelerator
topic: batching-strategies
status: published
provenance: imported
scenario: You're optimizing an LLM inference service running on A100 GPUs. You've already implemented
  dynamic batching, where requests are grouped together until the GPU queue is full or a timeout is reached.
  However, under bursty traffic with highly variable input sequence lengths, you still observe significant
  GPU underutilization and high tail latencies. What is the fundamental limitation of standard dynamic
  batching in this scenario, and what advanced technique would you propose to maximize GPU throughput
  and reduce tail latency?
details:
  realistic_solution: The fundamental limitation of standard dynamic batching is that it processes requests
    sequentially within a batch and waits for *all* sequences in a batch to complete before moving to
    the next. For LLMs, sequences have variable lengths and generate tokens one by one. If one sequence
    in a batch finishes early, its allocated GPU memory and compute resources remain idle while other,
    longer sequences in the same batch continue decoding. This leads to **memory fragmentation** and **GPU
    underutilization** for the entire batch.
  common_mistake: '"We need to use larger batch sizes." While larger batches increase throughput for homogeneous
    requests, standard dynamic batching still struggles with variable lengths and bursty traffic, leading
    to idle GPU cycles and increased tail latency as the system waits for full batches.'
  napkin_math: Consider a batch of 4 requests, with sequence lengths `[100, 200, 300, 400]` tokens.
