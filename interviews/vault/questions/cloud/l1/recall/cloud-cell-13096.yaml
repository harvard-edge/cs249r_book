title: 'TCO Mastery: Carbon Cost and Sustainable AI Infrastructure'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Calculate the total carbon footprint and carbon cost for training GPT-3 (175B params, 3.14
  * 10^23 FLOPs) on H100s (700W, 80% MFU). Compare: (1) coal-powered datacenter (0.82 kgCO2/kWh), (2)
  renewable-powered datacenter (0.05 kgCO2/kWh), (3) cost of carbon offsets at $50/ton CO2. Include both
  operational (training power) and embodied carbon (GPU manufacturing: ~50 kg CO2 per H100).'
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS. 8-GPU aggregate at 45% MFU: 3,560 TFLOPS.'
  common_mistake: Only counting operational energy during training without including the embodied carbon
    from GPU manufacturing and the power consumption of cooling infrastructure (PUE factor).
  napkin_math: 'H100 at 989 TFLOPS FP16 (not 1979). System throughput = 989 TFLOPS × num_GPUs × MFU. For
    8 H100s at 45% MFU: 8 × 989 × 0.45 = 3,560 TFLOPS aggregate.'
