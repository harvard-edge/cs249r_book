schema_version: 1
id: cloud-r2-42041
title: Multi-Tenant Network Isolation on Shared Clusters
topic: interconnect-topology
status: published
provenance: imported
scenario: 'Your MI300X cluster serves 4 tenants: one running 175B training (needs 128 GPUs with full bisection
  bandwidth AllReduce), another running inference (32 GPUs, latency-sensitive), and two running small
  fine-tuning jobs (16 GPUs each). The fat-tree has 400 Gbps links. Design the network partitioning, traffic
  isolation, and QoS policies to prevent the training job''s AllReduce bursts from causing inference latency
  spikes.'
details:
  realistic_solution: 'Multi-layer isolation: (1) Physical partitioning — dedicate spine switch ports
    to tenant tiers. Training tier: 8 spine switches (full bisection for 128 GPUs). Inference tier: 2
    spine switches (guaranteed bandwidth). Fine-tuning: 2 shared spine switches. (2) QoS with strict priority
    — inference traffic marked DSCP EF (Expedited Forwarding) gets strict priority queuing on any shared
    link. Training traffic marked DSCP AF11 (best-effort bulk). Switch queues: 80% capacity for training
    (bulk), 15% for inference (priority), 5% for management. (3) Rate limiting — training AllReduce capped
    at 350 Gbps per link (leaving 50 Gbps headroom). (4) Topology-aware placement — inference GPUs placed
    in pods that don''t share leaf switches with training GPUs. Infinity Fabric within each MI300X node
    is tenant-exclusive (no sharing). (5) Monitoring: per-tenant bandwidth counters, alert if inference
    P99 exceeds 5ms network RTT.'
  common_mistake: Using VLANs alone for isolation. VLANs provide logical separation but share physical
    bandwidth — the training job's AllReduce bursts will still saturate shared spine links, causing inference
    packets to queue.
  napkin_math: 'Training AllReduce: 128 GPUs, 2 GB gradient, hierarchical: needs 8 spine switches at 400
    Gbps each during burst (50ms every 200ms). Inference: 32 GPUs, 10K req/s, each request = 1 KB cross-network.
    Bandwidth: 10 MB/s — trivial but latency-critical. Without isolation: AllReduce saturates spines for
    50ms, inference packets queue 5-10ms. With physical partition: inference spine never sees training
    traffic. Inference network RTT: 2μs (guaranteed). Cost: 2 extra spine switches × $15K = $30K. Inference
    SLA value: $100K/month.'
