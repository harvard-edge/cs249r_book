id: cloud-top-65095
title: 'Full-Stack Personalization Infrastructure: Greenfield Design'
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: You are the first ML engineer at a 50-person startup building a content recommendation system
  for a video platform. The platform has 1M users, 10M videos, and is growing 10x per year. Design the
  full recommendation system architecture for the first 18 months.
details:
  realistic_solution: 'Phase 1 (Month 1-3, 1M users): Collaborative filtering using matrix factorization
    (SVD++ or ALS). Open-source: Surprise or implicit library. Model size: 1M users × 64-dim + 10M videos
    × 64-dim = 0.7GB. Runs on 1 GPU or even CPU. Offline batch: retrain daily. ALS computation: ~10 TFLOP,
    completes in ~0.02 seconds on H100. Serving: pre-compute top-100 recommendations per user nightly.
    Store in Redis (1M × 100 × 8B video_id = 800MB). P99 latency: 5ms (Redis GET). Phase 2 (Month 4-9,
    5M users, 50M videos): Add two-tower real-time model. Phase 3 (Month 10-18, 10M users, 100M videos):
    Multi-stage pipeline with feature store. Phase 4 (beyond 18 months): DLRM-style architecture.'
  common_mistake: Building the most sophisticated system from day one (DLRM with 100TB embedding tables,
    custom ANN indexes, real-time feature stores). Startups that over-engineer early recommendations spend
    months on infrastructure that serves 1M users, when a simple collaborative filtering or content-based
    system can ship in 2 weeks and serve 10M users.
  napkin_math: 'Phase 1 compute cost: daily batch retraining on 1M × 10M implicit feedback matrix (sparse).
    ALS on 1M × 10M with 64 factors: ~10 TFLOP. Single H100: 989 TFLOPS at 50% MFU → 10T / (989T × 0.5)
    ≈ 0.02 seconds. Cost: $3/hr × 0.02/3600 hr = $0.0000167 per retraining. Serving: Redis at $0.02/hr
    (small instance) = $14.4/month. Total Phase 1 ML infrastructure: <$200/month. Phase 3 cost estimate:
    continuous serving at 50K QPS on H100: 50K × 9ms = 450 GPU-seconds/sec = 450 GPUs needed (not 1 H100).
    Model training: daily on 100M events. Storage: feature store (100M users × 200 features × 4B) = 80GB
    Redis.'
