id: cloud-r2-41048
title: Scheduling for Heterogeneous GPU Clusters
topic: scheduling-resource-management
status: published
provenance: imported
scenario: 'Your cluster has 3 GPU types: 32× H100 (80 GB, 989 TFLOPS BF16), 16× MI300X (192 GB, 1.3 PFLOPS
  BF16), and 64× A100 (80 GB, 312 TFLOPS BF16). Design a scheduler that maximizes fleet-wide throughput-per-dollar
  for a mixed workload of LLM training, LLM inference, and fine-tuning jobs.'
details:
  realistic_solution: 'Affinity-based heterogeneous scheduler: (1) Job profiling: classify each job by
    resource bottleneck — compute-bound (training large models), memory-bound (long-context inference),
    or balanced (fine-tuning). (2) GPU affinity matrix: H100: best for FP8 training (Transformer Engine),
    compute-bound prefill, medium-batch inference. Affinity: training=0.9, inference=0.7, fine-tuning=0.6.
    MI300X: best for memory-bound decode (5.3 TB/s bandwidth, 192 GB capacity), long-context inference,
    large-batch training. Affinity: training=0.85, inference=0.95, fine-tuning=0.5. A100: best for fine-tuning
    (cost-effective), small model inference, data preprocessing. Affinity: training=0.5, inference=0.6,
    fine-tuning=0.9. (3) Scheduling algorithm: for each incoming job, compute score = affinity × (1 /
    queue_wait_time) × (1 / cost_per_gpu_hour) for each GPU type. Assign to highest-scoring GPU type with
    available capacity. (4) Cost normalization: normalize job accounting by GPU-equivalent-hours. 1 H100-hour
    = 3.17 A100-hours (990/312 TFLOPS ratio). Charge teams in normalized units so they are indifferent
    to GPU assignment. (5) Fallback: if preferred GPU type is full, allow placement on next-best type
    with a 10-minute queue wait before fallback triggers.'
  common_mistake: Simple priority queuing across all GPU types. Each GPU type has different strengths,
    and placing a memory-bound workload on a compute-optimized GPU wastes its capabilities.
  napkin_math: '70B decode on MI300X: 1 GPU (192 GB fits model). On H100: 2 GPUs (TP=2). On A100: 2 GPUs
    (TP=2). Cost ratio: MI300X 1× vs H100 2× vs A100 2×. MI300X wins for memory-bound inference.'
