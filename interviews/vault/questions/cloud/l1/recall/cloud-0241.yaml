id: cloud-0241
title: The Role of HBM Bandwidth
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: In the context of the GPU roofline model, what aspect of performance does the HBM (High Bandwidth
  Memory) bandwidth primarily determine?
details:
  realistic_solution: HBM bandwidth determines the **slope of the roofline for memory-bound workloads**.
    This sloped section represents the performance limit for any application whose arithmetic intensity
    is below the ridge point. A higher memory bandwidth leads to a steeper slope, which means higher achievable
    performance for the same (low) arithmetic intensity. It essentially defines the performance ceiling
    for data-starved applications.
  common_mistake: Engineers sometimes confuse memory bandwidth (a rate, in TB/s) with memory capacity
    (a size, in GB). Another common mistake is thinking that bandwidth sets the absolute peak performance
    (the flat ceiling of the roofline), when in fact that is the job of the compute cores.
  napkin_math: 'Compare two GPUs on a workload with Arithmetic Intensity of 50 FLOPs/Byte. GPU A (2.0
    TB/s) limits performance to: 2.0 TB/s * 50 = 100 TFLOPS. GPU B (3.35 TB/s) lifts that limit to: 3.35
    TB/s * 50 = 167.5 TFLOPS. HBM bandwidth directly dictates the sloped line of the roofline.'
