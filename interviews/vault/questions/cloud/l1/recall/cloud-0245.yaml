schema_version: 1
id: cloud-0245
title: The Optimizer's Tax
topic: vram-budgeting
status: published
provenance: imported
scenario: You need to train a 70 billion parameter LLM using the standard Adam optimizer. State the approximate
  VRAM required just for the optimizer states and gradients, excluding the model weights themselves.
details:
  realistic_solution: 'For Adam optimizer states and gradients (excluding the model weights themselves):
    each parameter requires 2 bytes for the FP16 gradient, 4 bytes for the FP32 first moment (momentum),
    and 4 bytes for the FP32 second moment (variance) — totaling 10 bytes per parameter. For a 70B model:
    70B × 10 = 700 GB just for optimizer states and gradients. This is 5× the FP16 model weight size (140
    GB), which is why simply fitting the model for inference tells you nothing about training memory requirements.'
  common_mistake: Engineers often dramatically underestimate training memory requirements, thinking only
    of the model's weight size (e.g., 70B params × 2 bytes/param for FP16 ≈ 140 GB). They forget that
    the Adam optimizer needs to store not just gradients, but also first-moment (momentum) and second-moment
    (variance) estimates, which are typically kept in FP32 for stability, massively increasing the memory
    footprint.
  napkin_math: '**Adam optimizer memory per parameter:** | Gradients: 2 bytes (FP16) | First moment (momentum,
    m): 4 bytes (FP32) | Second moment (variance, v): 4 bytes (FP32) | Total for optimizer states + gradients:
    2 + 4 + 4 = 10 bytes/param | **For 70B parameters:** | Optimizer states + gradients = 70 × 10⁹ × 10
    bytes = 700 GB | Breakdown: Gradients = 140 GB, Momentum = 280 GB, Variance = 280 GB | **Note:** The
    full training memory also includes: | FP16 model weights: 70B × 2 = 140 GB | FP32 master weights (for
    mixed precision): 70B × 4 = 280 GB | Grand total (weights + optimizer + gradients): 140 + 280 + 700
    = 1,120 GB ≈ 1.1 TB | This is why distributed training (ZeRO, FSDP) is essential for large models.'
