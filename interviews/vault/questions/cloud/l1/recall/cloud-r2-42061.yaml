id: cloud-r2-42061
title: FP8 Tensor Core Precision on H100 and MI300X
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: 'H100 supports FP8 (E4M3 and E5M2) at 1,979 TFLOPS — 2× FP16. MI300X supports FP8 at 2,615 TFLOPS.
  You want to train a 70B model in FP8 mixed precision. Design the precision strategy: which tensors use
  E4M3 vs E5M2, where do you keep FP16/FP32 master weights, and calculate the memory savings and throughput
  improvement over FP16 training on each platform.'
details:
  realistic_solution: 'H100 FP8: 1,978 TFLOPS (exactly 2 × 989 TFLOPS FP16). The original states 1979
    — use 1978.'
  common_mistake: Using E4M3 everywhere. E4M3 has only 3 mantissa bits (8 values per exponent range),
    which is too coarse for gradient accumulation where small values matter. E5M2 has wider dynamic range
    (5 exponent bits) needed for gradients that span many orders of magnitude.
  napkin_math: 'H100 FP8 = 1,978 TFLOPS (2 × 989 FP16) — the specification says 1978, not 1979 (which
    appeared in the original question). Recalculate with 1978: time = compute_demand / 1978 TFLOPS.'
