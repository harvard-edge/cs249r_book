schema_version: 1
id: cloud-2369
title: Rail-Optimized vs Standard Leaf-Spine
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You are connecting 1,024 nodes, each with 8 GPUs (8,192 GPUs total). Each GPU has a dedicated
  400 Gbps NIC. You are designing the Leaf-Spine topology. Option A connects all 8 NICs of a node to the
  same Top-of-Rack (ToR) switch. Option B is a 'Rail-Optimized' topology where NIC0 from all nodes connects
  to Leaf0, NIC1 to Leaf1, up to NIC7 to Leaf7. Design the tradeoff analysis for these two layouts, focusing
  on All-Reduce performance and fault tolerance.
details:
  realistic_solution: "In an 8-GPU node, intra-node communication (GPU0 to GPU7) is handled entirely by\
    \ NVLink/NVSwitch at ~900 GB/s. The network NICs are strictly used for inter-node communication (scaling\
    \ out). \n\nIf we use Option A (Standard), inter-node All-Reduce requires traffic from Node 1 to Node\
    \ 2 to flow up to the ToR, then to the spine, and back down to the destination ToR. This puts heavy\
    \ pressure on the leaf-spine uplinks and increases hop counts. \n\nOption B (Rail-Optimized) physically\
    \ aligns the network with the workload's logical rings. In Data Parallelism or Tensor Parallelism\
    \ spanning nodes, GPU0 on Node A talks to GPU0 on Node B. Because both connect to Leaf0, this traffic\
    \ only requires a single switch hop (Leaf0) and does not need to traverse the Spine. This creates\
    \ 8 parallel, non-blocking network planes. \n\nThe Tradeoff: Rail-optimized networks drastically reduce\
    \ latency and spine bandwidth requirements for matched-rank collectives (All-Reduce rings stay within\
    \ a single leaf switch plane). However, fault tolerance is significantly worse. If Leaf0 fails, GPU0\
    \ on *every* rack loses network connectivity, degrading the entire cluster's ability to run 8-way\
    \ parallelism. Standard ToR wiring isolates switch failures to a single rack. Thus, Rail-Optimized\
    \ trades reliability and cabling complexity for maximum collective performance."
  common_mistake: Assuming Option A is better because intra-node traffic stays in the same ToR switch,
    forgetting that intra-node traffic is handled by NVLink, not the network.
  napkin_math: 'Hop count in Standard: Source NIC -> ToR -> Spine -> Dest ToR -> Dest NIC (3 switch hops).
    Hop count in Rail-Optimized: Source NIC0 -> Leaf0 -> Dest NIC0 (1 switch hop). Latency per hop ~500ns.
    Saves ~1us per inter-node transfer, significantly accelerating highly sensitive synchronization barriers.'
