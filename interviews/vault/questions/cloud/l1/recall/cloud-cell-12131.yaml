title: 'Network Bandwidth Bottlenecks: Recall PCIe and NVLink Bandwidth Specs for H100'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'A systems engineer asks: ''What are the key bandwidth specifications for H100 GPU interconnects:
  PCIe 5.0, NVLink 4.0, and NVSwitch, and when does each limit ML training performance?'' Provide exact
  numbers.'
details:
  realistic_solution: 'PCIe 5.0 ×16: 64GB/s bidirectional (32GB/s per direction). NVLink 4.0 per GPU:
    900GB/s bidirectional total (18 links × 50GB/s each = 900GB/s). NVSwitch (DGX H100): 3.6TB/s non-blocking
    all-to-all across 8 GPUs. When each limits: PCIe limits during data loading for very large batch sizes
    or model checkpoint saves/loads. NVLink limits during tensor-parallel all-reduces with large hidden
    dims. NVSwitch enables full NVLink bandwidth between all 8 GPUs simultaneously.'
  common_mistake: Quoting NVLink bandwidth as unidirectional when the spec is bidirectional; H100 NVLink
    4.0 is 900GB/s total bidirectional = 450GB/s per direction.
  napkin_math: 'PCIe 5.0: 64GB/s bidir. NVLink: 900GB/s bidir per GPU. NVSwitch: 3.6TB/s. Ratio NVLink/PCIe:
    900/64=14×. For 26GB checkpoint save via PCIe to CPU: 26/32=812ms (PCIe bottleneck). Via NVLink to
    another GPU: 26/450=57.8ms. Checkpoint saves should use NVLink paths when possible.'
