id: cloud-sus-62039
title: Model Parallelism Strategy for 100TB Embedding Cluster
topic: recommendation-systems-engineering
status: published
provenance: imported
scenario: 'Design the full training parallelism strategy for a DLRM with 100 TB of embedding tables and
  a 10B parameter dense MLP. You have 512 H100s (80 GB each) and 512 CPU nodes (2 TB DRAM each). Specify:
  embedding sharding strategy, MLP parallelism, gradient synchronization protocol, and expected training
  throughput in samples/second.'
details:
  realistic_solution: 'Hybrid parallelism: (1) Embedding model parallelism: 100 TB / (512 H100s × 80 GB
    + 512 CPU nodes × 2 TB) = 100 TB / (40.96 TB GPU + 1024 TB CPU). Hot embeddings on GPU HBM (40.96
    TB fits ~41% of tables by frequency). Cold embeddings on CPU DRAM. Row-wise sharding: each GPU/CPU
    holds a disjoint row range per table. (2) MLP data parallelism: 10B params at FP16 = 20 GB — fits
    on a single H100 with room for activations. Replicate MLP across all 512 H100s. Data-parallel batches:
    512 replicas × batch_size_per_replica. (3) Gradient sync: MLP: standard all-reduce across 512 GPUs
    (NCCL ring-allreduce, ~20 GB / 512 GPUs = 39 MB each, ~39 ms on 400 Gbps). Embeddings: sparse row-wise
    updates sent to the GPU/CPU holding that row (parameter server pattern, no all-reduce needed). (4)
    Throughput: assume each H100 processes 4096 samples/step at 10 ms/step (dominated by embedding all-to-all):
    4096 × 512 / 0.010 = 209M samples/s aggregate. Realistic with communication: ~50M samples/s.'
  common_mistake: Applying data parallelism uniformly — data parallelism for 100 TB embeddings requires
    all-to-all communication that scales poorly. The embeddings need model parallelism, while the MLP
    needs data parallelism.
  napkin_math: 'MLP backward all-reduce: 10B params × 2 bytes × 2 (gradient buffer) = 40 GB total. Ring-allreduce
    on 512 GPUs: each sends/receives 40 GB × 2 × (N-1)/N / N ≈ 40 GB / 512 = 78 MB. At 400 Gbps: 78 MB
    / 50 GB/s = 1.56 ms — fast. Embedding all-to-all: 512 GPUs × batch=4096 × 500 features × 256 bytes
    = 256 GB exchanged per step. At 400 Gbps (50 GB/s): 256 GB / 50 = 5.12 s — too slow! Must reduce:
    use 8-bit embedding gradients (64 GB / 50 GB/s = 1.28 s) or reduce batch to 256 (16 GB / 50 GB/s =
    0.32 s). With batch=256: throughput = 256 × 512 / 0.32 s = 409k samples/s.'
