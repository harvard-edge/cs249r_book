schema_version: 1
id: cloud-cell-13185
title: 'Transformer Cost Mastery: Full Training and Inference Cost Analysis for LLM Product'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Build a complete financial model for a 30B parameter transformer LLM product: training cost
  on H100s, inference cost at 1000 req/s with 500 output tokens, and break-even monthly revenue. Training:
  1T tokens, 40% MFU on H100 ($2.50/hr). Inference: H100 $2.50/hr, INT4 quantization (15GB model), target
  P99 < 2s. Structure as a complete business case.'
details:
  realistic_solution: 'Training: 6*30B*1T=1.8e23 FLOPs. At 1000 H100 at 40% MFU: time=1.8e23/(1000*792e12)=227,272s=63.1hr=2.63
    days. Cost: 1000*$2.50*63.1=$157,750. Inference: INT4 30B=15GB. Decode: 15GB/3350GB/s=4.48ms/token.
    500 tokens: 2.24s > 2s target! Need batch or speculative decoding. With speculative (4x speedup):
    560ms per request. ρ to handle 1000 req/s: need 1000/(1/0.560s)=560 H100s minimum. At ρ=0.7: 1000/(0.7*(1/0.56))=800
    H100s. Monthly inference cost: 800*$2.50*730=$1.46M/month. Revenue to cover: $1.46M/month at 40% gross
    margin: $2.43M/month. Inference dominates (monthly) vs training ($158K one-time or quarterly).'
  common_mistake: Calculating training cost once and ignoring that models need periodic retraining (monthly
    or quarterly) and that inference costs at 1000 req/s are ongoing monthly expenses that dwarf one-time
    training costs.
  napkin_math: 'Training: 6*30e9*1e12=1.8e23. Time@1000H100: 1.8e23/7.92e17=227K s=63.1hr. Cost: 1000*$2.50*63.1=$157,750.
    Quarterly training: $631K/yr. Inference: 15GB (INT4). Decode BW: 15/3350=4.48ms/tok. 500 tok: 2.24s
    (over 2s SLO). Speculative decoding (4x): 560ms. At 1000 req/s: service time=560ms, need 560 servers
    for ρ=1. At ρ=0.7: 800 H100s. Monthly: 800*$2.50*730=$1.46M. Annual: $17.52M. Revenue at 40% margin:
    $29.2M/yr. Per 1M tokens: $1.46M/(1000 req/s*500tok*3600*24*30/1e6)=$1.46M/(1296M tok/month*1e-6)=$1.46M/1296=$1.13/1M
    tokens. vs market $0.50/1M. Need 2x efficiency gain.'
