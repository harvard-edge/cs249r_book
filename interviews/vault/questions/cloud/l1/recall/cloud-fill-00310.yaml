title: 'LLM Training on AMD MI300X: Memory Pressure Management'
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are tasked with training a multi-billion parameter Large Language Model (LLM) on a cluster
  equipped with AMD MI300X accelerators. Each MI300X features 192 GB HBM3 memory with a staggering 5.3
  TB/s bandwidth and can achieve up to 1,307 TFLOPS FP16 sparse performance. During initial training runs,
  you frequently encounter Out-Of-Memory (OOM) errors even when using a seemingly modest global batch
  size. Describe your approach to diagnosing and mitigating these memory pressure issues, specifically
  considering memory fragmentation, potential gradient accumulation strategies to fully utilize the MI300X's
  HBM3, and how OS-level eviction policies might impact your training stability and throughput.
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1) Utilize profiling tools
    (e.g., ROCm profilers, custom memory allocators) to identify exact memory consumption at different
    stages and pinpoint fragmentation issues. 2) Implement gradient accumulation to achieve a larger effective
    batch size while keeping individual micro-batches within the 192 GB HBM3 limits. 3) Employ mixed-precision
    training (FP16/BF16) to halve the memory footprint of weights, activations, and gradients. The AMD
    MI300X delivers up to 1,307 TFLOPS FP16 sparse, so ensuring efficient sparse operation mapping is
    key. 4) Consider custom memory allocation strategies or adjust system-level memory configurations
    (e.g., huge pages, memory cgroups) to minimize OS-level interference or eviction for critical tensors
    on the MI300X.'
  common_mistake: A common mistake is to exclusively focus on reducing the batch size or immediately resorting
    to model parallelism without first thoroughly analyzing memory usage patterns, accounting for memory
    fragmentation overheads, or exploring optimization techniques like mixed-precision training or efficient
    gradient accumulation strategies tailored to the accelerator's architecture.
  napkin_math: Given a 100 billion parameter LLM where each parameter is stored in FP16 (2 bytes), the
    model weights alone require 100 * 10^9 * 2 bytes = 200 GB. Since a single AMD MI300X has 192 GB HBM3,
    how would this initial calculation influence your strategy for placing model parameters, optimizers,
    and activations on the accelerator, assuming no offloading or sharding initially?
