title: The AI Startup's Cost of Goods Sold Crisis
topic: activation-memory
status: published
provenance: imported
scenario: 'You are the new Tech Lead for the ''LLM Efficiency'' team at a major AI startup. Your flagship
  product, a 70B parameter coding assistant, is hemorrhaging money due to inference costs on a large fleet
  of H100 GPUs serving the vanilla FP16 model. The CFO''s mandate is stark: ''Reduce inference cost-per-user
  by 50% within 6 months without a noticeable drop in code-generation quality.'''
details:
  realistic_solution: A strategic, phased approach demonstrates senior-level thinking. The optimal plan
    prioritizes the highest-impact, lowest-effort changes first, stacking their benefits before committing
    to high-risk, high-cost options like distillation.
  common_mistake: Proposing only one 'silver bullet' solution, like immediately starting a massive distillation
    project. This approach ignores lower-hanging fruit, underestimates the risk and time cost of retraining,
    and fails to recognize the powerful multiplicative effects of stacking compatible optimizations. Another
    common mistake is failing to prioritize based on risk and effort, for instance, suggesting architectural
    changes like pruning before implementing library-level changes like FlashAttention or low-risk techniques
    like speculative decoding.
  napkin_math: '70B model in FP16 = 140GB. Spans 2x 80GB H100s. A 50% cost reduction means running on
    1x H100 or doubling throughput. Phase 1: Implement PagedAttention and INT8 KV-cache to double batch
    size, avoiding 140GB/3.35TB/s memory-bound stalls. Phase 2: Quantize weights to INT8 or FP8 (70GB),
    fitting the entire model on a single 80GB H100.'
