schema_version: 1
id: cloud-fill-01419
title: 'A100 Inference Performance Degradation: Monitoring & Anomaly Detection'
topic: monitoring-observability
status: published
provenance: imported
scenario: You are leading the MLOps team for a critical real-time inference service deployed on a cluster
  of NVIDIA A100 GPUs (each with 80 GB HBM2e memory, 312 TFLOPS FP16 peak performance, 2.0 TB/s memory
  bandwidth, and 400W TDP). The service processes high-volume requests for a large language model. Recently,
  users have reported intermittent latency spikes and 'straggler' requests that take significantly longer
  to complete, impacting user experience and SLA adherence. Design a comprehensive monitoring and observability
  strategy to proactively detect these performance degradations, diagnose their root causes (e.g., GPU
  thermal throttling, memory saturation, network bottlenecks, software issues), and minimize MTTR. How
  would you leverage telemetry, alerting, and production health dashboards to ensure service reliability?
details:
  realistic_solution: 'Implement a multi-layered monitoring system: 1) **GPU-level telemetry:** Utilize
    NVIDIA DCGM or similar tools to collect real-time metrics like GPU utilization, memory usage (HBM2e
    bandwidth/saturation), temperature, power consumption (400W TDP limit), PCIe bandwidth, and Tensor
    Core activity per A100. 2) **Application-level telemetry:** Instrument the inference code to track
    model forward pass time, pre/post-processing latency, batching efficiency, and individual request
    completion times. 3) **Straggler detection:** Implement percentile-based latency monitoring (e.g.,
    p99, p99.9) with distributed tracing to identify and isolate slow requests. Use canary deployments
    or synthetic transactions for proactive health checks. 4) **Alerting:** Configure threshold-based
    alerts for critical GPU metrics (e.g., sustained high temperature, HBM2e saturation, low utilization
    due to queuing) and anomaly detection for deviations in latency percentiles. Use context-rich alerts
    that include relevant dashboards. 5) **Dashboards:** Create hierarchical dashboards showing service-level
    KPIs, per-GPU health, and drill-down capabilities for problematic instances. Integrate MTBF/MTTR tracking
    into incident management. 6) **Post-mortem analysis:** Centralize logs, traces, and metrics for efficient
    root cause analysis.'
  common_mistake: A common mistake is to rely solely on high-level service metrics (e.g., overall latency,
    error rate) without granular, GPU-specific telemetry. This often leads to reactive debugging, prolonged
    MTTR, and an inability to distinguish between hardware, software, or data-related issues. Over-alerting
    or under-alerting due to poorly defined thresholds or insufficient context is also frequent.
  napkin_math: Consider an A100 processing 1000 inference requests per second (RPS) for a specific model.
    If the average latency is 10ms, but the p99 latency spikes to 100ms, this means 1% of requests are
    taking 10x longer. For a fleet of 100 A100s, this translates to 1000 slow requests per second. If
    each straggler occupies a GPU for an additional 90ms (100ms-10ms), it effectively occupies 90 GPU-request
    slots concurrently (1000 slow_requests/sec × 0.090 sec/slow_request = 90 concurrent occupied slots),
    reducing effective throughput capacity proportionally, highlighting the significant impact of stragglers
    on overall throughput and efficiency, especially given the 400W TDP limit per card when GPUs are fully
    utilized.
