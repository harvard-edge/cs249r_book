title: 'The Roofline Litmus Test: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: You've calculated the Arithmetic Intensity (AI) of a new GPU kernel, measured in FLOPs per Byte.
  To determine if this kernel will be compute-bound or memory-bound on a specific GPU like the NVIDIA
  H100, what is the name of the specific hardware metric you must compare your kernel's AI against?
details:
  realistic_solution: 'The metric is called the Ridge Point (or machine balance point). For the H100,
    it equals peak FLOPS divided by peak memory bandwidth: 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/Byte. If
    your kernel''s arithmetic intensity exceeds 295 FLOPs/Byte, it is compute-bound (limited by FLOPS).
    If it is below 295, it is memory-bound (limited by bandwidth). This single ratio is the fulcrum of
    the roofline model and determines which hardware resource limits your kernel''s performance.'
  common_mistake: Engineers often forget that being 'bound' is a relationship between the *workload* and
    the *hardware*. They might look at raw hardware specs like TFLOPS or Memory Bandwidth in isolation.
    However, the critical value for this test is the hardware's specific ratio of compute to memory bandwidth,
    which has a specific name in roofline analysis.
  napkin_math: 'The Ridge Point is calculated by dividing the GPU''s peak compute by its memory bandwidth.
