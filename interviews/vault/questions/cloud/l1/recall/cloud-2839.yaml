scenario: Google's TPUs and many cloud deployments utilize XLA. State what XLA stands for and recall its
  primary purpose in a machine learning stack.
details:
  realistic_solution: XLA stands for Accelerated Linear Algebra. It is a domain-specific compiler designed
    specifically for linear algebra operations used in machine learning. Its primary purpose is to optimize
    TensorFlow or PyTorch computations by analyzing the whole execution graph and generating highly optimized,
    fused machine code for specific hardware architectures.
  common_mistake: Assuming XLA is a new hardware chip or a programming language, rather than a compiler
    backend.
  napkin_math: If a graph has 4 element-wise ops taking 1ms each due to HBM reads (A100 2.0TB/s), XLA
    fuses them. The combined kernel takes ~1.2ms instead of 4.0ms, yielding a >3x speedup by minimizing
    memory bottlenecks.
