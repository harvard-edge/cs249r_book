schema_version: 1
id: cloud-2373
title: Scale-Up vs Scale-Out for 256 GPUs
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'You are building a 256-GPU pod for training large models. Option A: 32 standard nodes (8 GPUs
  each, connected via intra-node NVLink), networked together via 400 Gbps InfiniBand (Scale-Out). Option
  B: A massive single-chassis scale-up architecture where all 256 GPUs are connected via a 2-tier NVSwitch
  fabric (Scale-Up). Both have 256 GPUs. Analyze the tradeoff between these architectures for a workload
  utilizing 8-way Tensor Parallelism (TP) and 32-way Pipeline Parallelism (PP).'
details:
  realistic_solution: "Option A (Scale-Out) provides an intra-node NVLink domain of 8 GPUs with ~900 GB/s\
    \ bandwidth, and an inter-node InfiniBand domain with 50 GB/s (400 Gbps) per GPU. Option B (Scale-Up)\
    \ provides a flat, fully non-blocking NVLink domain of 256 GPUs, all communicating at ~900 GB/s. \n\
    \nFor a workload using 8-way TP and 32-way PP: Tensor Parallelism requires massive bandwidth and low\
    \ latency for continuous All-Reduce operations. Since TP=8, the entire TP group fits perfectly inside\
    \ a single 8-GPU node in Option A, utilizing the 900 GB/s NVLink. Pipeline Parallelism (PP=32) involves\
    \ passing relatively small microbatch activations between TP groups. PP is highly bandwidth-insensitive.\
    \ Thus, the 50 GB/s InfiniBand inter-node links in Option A are more than sufficient to handle the\
    \ PP traffic without bottlenecking. \n\nThe Tradeoff: Option B (256-GPU NVSwitch) costs significantly\
    \ more, requires exotic cooling and massive custom chassis, and introduces a single massive failure\
    \ domain. For a workload where TP <= 8, Option A provides identical performance because the network\
    \ bounds match the parallelism requirements perfectly. Option B only becomes necessary if the model\
    \ architecture forces TP > 8 (e.g., massive single-layer MoE or highly un-sharded attention mechanisms)\
    \ that cannot tolerate crossing the 50 GB/s IB boundary."
  common_mistake: Assuming Option B is strictly necessary for all large models, ignoring that Pipeline
    Parallelism is latency/bandwidth insensitive and does not benefit from NVSwitch scale-up.
  napkin_math: TP=8 requires All-Reduce inside the group. In Option A, 900 GB/s intra-node NVLink handles
    this. PP=32 requires sending activations of size [batch, seq, hidden] = [4, 4096, 8192] * 2 bytes
    = 268 MB per microbatch. Sending 268 MB over 50 GB/s IB takes ~5.3 ms, which is easily overlapped
    with compute. Option B provides no practical speedup for this specific layout.
