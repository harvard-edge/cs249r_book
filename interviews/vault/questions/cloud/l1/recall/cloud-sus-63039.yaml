id: cloud-sus-63039
title: TPU v5e Pod AllReduce Topology for 1T Model Training
topic: collective-communication
status: published
provenance: imported
scenario: 'Training a 1T MoE model requires 2,048 TPU v5e chips using 3D model parallelism: TP=8, PP=16,
  EP=16 (expert parallelism). Each dimension requires distinct collective communication patterns. The
  ICI topology is a 3D torus (16×16×8). Map each parallelism dimension to the torus axes, calculate the
  communication volume per step, and compare against an equivalent H100 cluster using NVLink for TP and
  InfiniBand for PP+EP.'
details:
  realistic_solution: 'Torus mapping: TP=8 → 8-chip axis (lowest latency, highest bandwidth within node-equivalent
    group). PP=16 → one 16-chip axis (point-to-point pipeline sends, latency-tolerant). EP=16 → remaining
    16-chip axis (all-to-all for expert routing). Communication per step: TP AllReduce: 2 × (8-1)/8 ×
    (hidden=16384 × seq=2048 × 2 bytes) = 2 × 0.875 × 67MB = 117MB per layer × 128 layers = 15GB total.
    At ICI 1600 Gbps = 200 GB/s per chip: T_TP = 15GB/200 = 75ms (ring across 8 chips). PP bubble overhead:
    with PP=16, micro-batch pipeline has (PP-1)/PP = 93.75% efficiency with 1F1B. EP all-to-all: route
    to 16 experts, each forward/backward = 2 × MoE_input × top-k/16. H100 comparison: TP=8 via NVLink
    (900 GB/s per pair): T_TP = 15GB/450 = 33ms. PP and EP via 400Gbps InfiniBand: T_PP = point-to-point
    100GB/50GB/s = 2s — catastrophically slow for pipeline. TPU v5e wins by using ICI (200 GB/s) for PP
    instead of InfiniBand (50 GB/s), making the H100 cluster ~4× slower for pipeline-parallel steps.'
  common_mistake: Mapping tensor parallelism to the highest-latency torus dimension. TP requires the most
    frequent and latency-sensitive AllReduces (every transformer layer, every forward pass). TP must be
    mapped to the dimension with lowest hop count and highest bandwidth — the shortest torus axis.
  napkin_math: 'MoE 1T params: 1T × 2 bytes FP16 = 2TB. Distributed across 2048 chips: 1GB/chip average.
    TP AllReduce per layer: 2 × (N-1)/N × activation_size. Activation: 2048 tokens × 16384 hidden × 2
    bytes = 67MB. TP=8: 2 × 7/8 × 67MB = 117MB. 128 layers: 15GB. ICI ring: 15GB / 200GB/s = 75ms. H100
    NVLink: 15GB / 450GB/s = 33ms. But H100 PP=16 over IB: pipeline stage activation = 2048×16384×2 =
    67MB. IB: 67MB/50GB/s = 1.3ms per stage × 16 stages = 21ms pipeline latency per micro-batch. TPU:
    67MB/200GB/s = 0.34ms × 16 = 5.4ms. TPU 4× faster for PP. For 2048 micro-batches: H100 PP overhead
    = 2048 × 21ms = 43s. TPU = 11s. Training throughput impact is dominated by PP latency at this scale.'
