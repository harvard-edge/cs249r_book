id: cloud-top-65064
title: 'Disaggregated Serving Cost Model: Build vs Buy'
topic: disaggregated-serving
status: published
provenance: imported
scenario: 'A startup is considering building a disaggregated LLM serving system vs using a managed inference
  API (e.g., Bedrock, Together AI). Monthly traffic: 1B output tokens. Model: Llama-3 70B. Perform a build
  vs buy cost analysis.'
details:
  realistic_solution: 'Build cost analysis: GPU cost: 1B tokens/month / (H100 decode 23.9 tok/sec × 3600
    × 24 × 30) = 16.2 H100-months. At $3/hr H100: 16.2 × 720 × $3 = $34,992/month for compute. Add: 2×
    redundancy = $70K. InfiniBand networking: ~$82K/month. Engineering: 2 FTEs at $250K/year = $41.7K/month.
    Total build: ~$194K/month. Buy cost: Together AI pricing ~$0.90 per million output tokens (Llama-3
    70B). 1B tokens: $900/month. Managed API wins at this scale by 215×. Build makes sense at: 1T tokens/month
    ($900K managed) vs build: ~$200K + engineering. Break-even: ~500B tokens/month. Conclusion: below
    100B tokens/month, use managed API; above 500B tokens/month, build is cost-effective.'
  common_mistake: 'Comparing only raw GPU compute costs without including: engineering time to build and
    maintain the disaggregated system, redundancy costs for high availability, bandwidth costs for KV
    cache transfer, and the opportunity cost of not using that engineering time for product development.'
  napkin_math: 'Build variable compute cost: 1B tokens / (23.9 tok/sec × 3600 × 24 × 30) = 16.2 H100-months.
    At $3/hr: 16.2 × 720 hrs × $3 = $34,992/month GPU compute. True variable cost per million tokens ≈
    $34.99/M, not $0.03/M. Break-even analysis: build fixed = ~$52K/month (engineering + infrastructure).
    Build total = $52K + $35K compute = $87K/month. Buy = $900/month at $0.90/M. Managed API wins at 1B
    tokens/month by 97×. Break-even: ~500B tokens/month (build ≈ $87K + scale compute vs buy at $450K).'
