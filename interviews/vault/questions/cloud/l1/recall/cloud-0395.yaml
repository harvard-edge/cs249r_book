title: The TCO Iceberg (cloud-0395)
topic: tco-cost-modeling
status: draft
provenance: imported
scenario: When evaluating the total economic footprint of a large-scale generative AI model (like a 70B
  parameter LLM) over a three-year production lifespan, which component typically represents the largest
  single share of the Total Cost of Ownership (TCO)?
details:
  realistic_solution: The cumulative cost of inference is almost always the largest part of the TCO. A
    successful model serves billions or trillions of requests over its production lifetime. The cost of
    the GPU fleet, electricity (power and cooling), and network bandwidth required to maintain the serving
    SLOs for years far outweighs the one-time, albeit massive, cost of the initial training phase. The
    ratio can easily be 5:1 or even 10:1, inference OpEx to training CapEx.
  common_mistake: Engineers often fixate on the high and very visible upfront cost of the initial training
    run (Capital Expenditure or CapEx), which can run into the tens of millions of dollars. They underestimate
    how the continuous, lower-margin costs of running inference at scale (Operational Expenditure or OpEx)
    accumulate over several years to become the dominant expense.
  napkin_math: Let's model a simplified 3-year TCO.
