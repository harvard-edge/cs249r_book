id: cloud-fill-01125
title: Scaling High-Throughput LLM Inference on Google TPU v5e
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is deploying a large language model (LLM) for a high-volume, low-latency Generative
  AI application. You've selected Google TPU v5e, known for its performance characteristics (16 GB HBM,
  197 TFLOPS BF16, 1.6 TB/s memory bandwidth). Design an end-to-end inference serving system that effectively
  utilizes these TPUs. The system must handle unpredictable request patterns, minimize cold start times
  for new inference instances, and efficiently manage model loading, dynamic batching, and autoscaling
  to meet strict latency and throughput SLAs. Discuss the architectural components and trade-offs.
details:
  realistic_solution: Implement a serving architecture leveraging a high-performance inference server
    like Triton Inference Server, custom-tuned for JAX/TensorFlow on TPUs. Employ dynamic batching based
    on real-time request queue depth to maximize TPU utilization. For model loading, use strategies like
    streaming loading from GCS to HBM, or pre-loading common models into HBM via persistent volumes. Implement
    an autoscaling solution that monitors QPS, latency, and TPU core utilization, aggressively scaling
    out pre-warmed instances to handle spikes. Cold start optimization involves maintaining a minimum
    pool of 'warm' TPU instances with models already loaded, ready to serve, or employing techniques like
    model checkpoints/snapshots for rapid resumption.
  common_mistake: A common mistake is treating TPUs like general-purpose GPUs, leading to suboptimal batching
    strategies (e.g., static batching or batch sizes too small/large) that underutilize BF16 performance
    or HBM bandwidth. Inefficient model loading into HBM, lack of pre-warming for instances, or not accounting
    for the specific I/O and memory hierarchy of TPUs can result in significant cold start delays and
    wasted compute cycles.
  napkin_math: A typical 10-billion parameter LLM, stored in BF16 (2 bytes per parameter), has a size
    of 20 GB. Given a single Google TPU v5e has 16 GB HBM, the model cannot fit entirely, necessitating
    model parallelism or offloading. If we assume a batch size of 4 and an inference time of 50ms per
    token generation on a single v5e, and a target QPS of 1000, we would need (1000 QPS * 50ms / token)
    / (4 tokens/batch) = 12.5 TPU-seconds per second, implying a minimum of 13 active TPU v5e instances
    just for inference, not accounting for overhead or cold starts.
