id: cloud-0269
title: The 700W Question
topic: power-budgeting
status: published
provenance: imported
scenario: When planning a new AI cluster, one of the first things you need to know is the power budget
  per server. What is the approximate Thermal Design Power (TDP) you should state for a single modern
  datacenter GPU, like the NVIDIA H100, to correctly inform the datacenter facilities team?
details:
  realistic_solution: The correct answer is approximately 700 W. This high power consumption is a critical
    parameter for datacenter design. It dictates rack power density and is a primary reason why modern
    AI clusters require specialized high-density racks and often direct liquid cooling, as traditional
    air cooling becomes ineffective and inefficient at this wattage.
  common_mistake: Engineers often anchor on consumer or desktop GPU power figures (~300W) or even older
    server GPUs. They fail to internalize that modern datacenter accelerators operate at a completely
    different power scale, closer to a kilowatt per chip, which fundamentally changes the requirements
    for power delivery and cooling.
  napkin_math: A single H100 GPU draws about as much power as a powerful household microwave oven. A standard
    server rack with 8 of these GPUs will have a GPU power load of `8 * 700W = 5.6 kW`. Including the
    host CPU and other components, the rack's total power can easily exceed 7-8 kW, necessitating specialized
    power infrastructure.
