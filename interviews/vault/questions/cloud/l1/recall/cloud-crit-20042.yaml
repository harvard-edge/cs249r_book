schema_version: 1
id: cloud-crit-20042
title: Speculative Decoding with Continuous Batching
topic: speculative-decoding
status: published
provenance: imported
scenario: 'You run vLLM on 4x H100 with continuous batching and want to add speculative decoding. The
  challenge: different requests in the batch have different draft token counts (some K=5, some K=3 after
  early rejection). Design the batched verification strategy that handles variable-length speculation
  within a single forward pass.'
details:
  realistic_solution: 'Challenge: verification needs one forward pass with different numbers of draft
    tokens per request. Solutions: (1) Padding with masking: pad all to K_max, use attention mask to ignore
    pad tokens. Compute waste: (K_max - K_avg)/K_max. If K_max=5, K_avg=3.5: 30% waste. Simple but inefficient.
    (2) Bucketing: group requests by K value (K=3, K=4, K=5) and run separate verification passes. 3 passes
    at smaller batch sizes. Trade-off: less waste but more kernel launches. (3) Variable-length sequence
    packing (like Sarathi): pack all draft tokens into a single sequence dimension with position IDs.
    Batch of 100 requests with total 350 draft tokens: run as if batch=100 with variable seq_lens. FlashAttention-2
    supports variable sequence lengths via cu_seqlens parameter. This achieves ~95% efficiency. Implementation:
    sort by K, pack with cu_seqlens = cumsum([K1+1, K2+1, ...]), run single forward pass.'
  common_mistake: Padding all requests to max K in the batch, which wastes compute on pad tokens. A batch
    of 100 requests padded from avg K=3 to K=5 wastes 40% of verification compute.
  napkin_math: '100 requests, avg K=3.5, K_max=5. Padding: 100x6 = 600 tokens, 30% waste. Packing: 100x4.5
    = 450 tokens, 0% waste. Savings: 150 tokens x 140 GFLOP = 21 TFLOP. At 3.96 PFLOPS: 5.3ms saved per
    round.'
