id: cloud-0069
title: The RAG Retrieval Tax (cloud-0069)
topic: compound-ai-systems
status: published
provenance: imported
scenario: You're designing a Retrieval-Augmented Generation (RAG) system for an automotive recall analysis
  chatbot. The vector database is stored on local NVMe SSDs. To meet your overall latency budget, you
  must first know the baseline cost of the retrieval step. What is the approximate latency for a single
  random read from an NVMe SSD?
details:
  realistic_solution: The latency is approximately 100 microseconds (100,000 nanoseconds). This is a fundamental
    number for system design involving fast storage. While orders of magnitude slower than memory access
    (~300 ns for HBM), it is significantly faster than traditional hard drives or long-distance network
    calls (~40 ms). In a RAG system, this retrieval latency is often a significant portion of the total
    time-to-first-token.
  common_mistake: Engineers often confuse storage latency with memory or network latency. A common error
    is to assume SSD reads are in the nanosecond range (like HBM/DRAM) or the multi-millisecond range
    (like a cross-continent network call). The correct answer is in the distinct microsecond range.
  napkin_math: If an L1 cache read on the CPU took 1 second, a single read from the NVMe SSD would take
    approximately 1.1 days (100,000 ns vs 1 ns). This illustrates why minimizing I/O, even to fast SSDs,
    is a critical design constraint for low-latency applications.
