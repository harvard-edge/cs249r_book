id: cloud-0014
title: The RAG Retrieval Step-Cost
topic: compound-ai-systems
status: published
provenance: imported
scenario: You're debugging a slow Retrieval-Augmented Generation (RAG) pipeline. The system takes a user
  query, retrieves relevant documents from a vector index, and then feeds them to an LLM. The vector index
  is too large for memory and is stored on a datacenter-grade NVMe SSD. What is the approximate latency
  you should expect for a single, random read from this SSD to retrieve a document chunk?
details:
  realistic_solution: The expected latency is around 100,000 nanoseconds (100 µs). This is a fundamental
    physical limitation of current flash storage technology in datacenters. While a full RAG pipeline
    has many components (embedding, LLM inference), isolating the retrieval step shows that I/O can be
    a significant bottleneck compared to on-chip operations.
  common_mistake: Engineers often underestimate I/O latency, thinking of it in the single-digit microsecond
    range. They confuse the speed of storage I/O with much faster network or memory access, failing to
    realize that reading from flash is orders of magnitude slower than HBM or even DRAM.
  napkin_math: Based on the standard ML Latency Hierarchy, an L1 cache access is ~1 ns. A read from an
    NVMe SSD is ~100,000 ns. If you scale that to human time where 1 ns is 1 second, the L1 access takes
    1 second, but the SSD read takes over a day (1.1 days). This is the 'cost' of going to storage.
