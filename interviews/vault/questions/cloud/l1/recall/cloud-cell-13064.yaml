schema_version: 1
id: cloud-cell-13064
title: 'Systolic Array Mastery: Full Transformer Layer Analysis on TPU'
topic: systolic-dataflow
status: published
provenance: imported
scenario: Perform a complete performance analysis of a single transformer layer (hidden=4096, FFN=16384,
  heads=32, seq=2048, batch=16) on TPU v5e (16GB HBM, 197 TFLOPS BF16). Break down FLOPs and bandwidth
  for attention and FFN sub-layers, identify the bottleneck, and specify the optimal XLA tile size and
  dataflow.
details:
  realistic_solution: 'Attention: QKV projection = 3*(2*batch*seq*hidden^2) = 3*2*16*2048*4096^2 = 3.22
    TFLOP. AI = 3.22T / (3*4096^2*2) = 3.22T/100.7MB = 31,977 FLOPs/byte. Compute bound. QK^T = 2*heads*batch*seq^2*head_dim
    = 2*32*16*2048^2*128 = 8.59 TFLOP. Hmm: head_dim=4096/32=128. AI = 8.59T / (batch*seq^2*heads*2 =
    16*2048^2*32*2 = 4.3GB) = 2.0 FLOPs/byte. Memory bound! FFN: 2*(2*batch*seq*hidden*ffn_dim) = 2*2*16*2048*4096*16384
    = 17.2 TFLOP. AI>>ridge. Compute bound. Bottleneck: softmax attention score computation (QK^T and
    softmax/V) is memory-bandwidth bound. Fix: FlashAttention fused kernel.'
  common_mistake: Treating the entire transformer layer as a monolithic operation instead of decomposing
    into sub-operations with different arithmetic intensities (attention is often memory-bound while FFN
    is compute-bound).
  napkin_math: 'QKV proj: 3*2*16*2048*4096^2/4096_notright. QKV: each projection is (batch,seq,hidden)*(hidden,hidden):
    FLOPs=2*16*2048*4096*4096=1.1T each, 3x=3.3T. AI=3.3T/100MB=33000. Compute bound. QK^T: (batch,heads,seq,head_dim)*(batch,heads,head_dim,seq):
    FLOPs=2*16*32*2048*2048*128=8.59T. BW: Q=(16*32*2048*128*2)=268MB, K=268MB, output=(16*32*2048^2*2)=4.3GB.
    Total BW≈4.8GB. AI=8.59T/4.8G=1789 FLOPs/byte. Actually compute bound! (Above 240 ridge). Time = 8.59T/197T=43.6ms.
    FFN: 2*2*16*2048*4096*16384=17.2T. Time=87.3ms. Total ≈ 130ms per layer. 24 layers: 3.1s per forward
    pass.'
