id: cloud-2107
title: KV Cache Quantization Quality-Throughput Frontier
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Your 70B LLM serving fleet is KV-cache-limited: at BF16, each H100 can batch only 8 concurrent
  8K-context requests. Product wants to 4× the throughput without adding GPUs. Evaluate quantizing the
  KV cache to INT8, INT4, and FP8 (E4M3). Design a system that maximizes throughput while bounding quality
  degradation to <1% on your eval suite.'
details:
  realistic_solution: 'Step 1 — Profile per-layer sensitivity: Run eval suite with per-layer KV cache
    quantization. Typically, the first 5-10% and last 5-10% of layers are most sensitive (they handle
    input normalization and output logit formation). Middle layers are robust to aggressive quantization.
    Step 2 — Mixed-precision KV cache: Keep early/late layers at BF16 or FP8, quantize middle layers to
    INT4. This gives ~3× compression (not 4×, due to the BF16 layers) with <0.5% quality loss typically.
    Step 3 — FP8 (E4M3) as compromise: FP8 gives 2× compression with near-zero quality loss (maintains
    dynamic range better than INT8). Combined with INT4 for robust middle layers: ~3.5× compression. Step
    4 — Measure: 3.5× KV cache compression → 3.5× batch size → ~3.5× throughput. To reach 4×, also implement
    paged KV cache (vLLM-style) to eliminate fragmentation overhead (~10-15% waste), achieving the remaining
    throughput gap.'
  common_mistake: Blindly quantizing all KV cache to INT4 for maximum compression. Different layers and
    attention heads have different sensitivity to quantization. Uniform quantization often causes disproportionate
    quality loss in early layers.
  napkin_math: '70B at 8K context, BF16 KV: ~2.5 GB per request. | 80 GB HBM − 42 GB weights = 38 GB for
    KV. Batch 8 = 20 GB + overhead. | INT4 KV: ~0.63 GB/request → batch 32 → 4× throughput. | Mixed BF16/INT4:
    ~0.72 GB/request → batch 28 → 3.5× throughput. | + Paged attention (eliminate 15% fragmentation):
    batch 32 → 4×. ✓'
