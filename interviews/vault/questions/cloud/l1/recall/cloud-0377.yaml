id: cloud-0377
title: The RAG Rollback Reflex
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your team manages a customer-facing chatbot that uses a RAG (Retrieval-Augmented Generation)
  architecture. You've just pushed a daily update to the vector database with new product information.
  Immediately, monitoring alerts fire for a massive spike in nonsensical or 'hallucinated' answers. What
  is the standard, most immediate operational response to this incident?
details:
  realistic_solution: The correct and most immediate response is to roll back the data update to the last
    known good version. In a production RAG system, data is a form of deployment artifact and must be
    versioned and have a rapid rollback mechanism, just like code. Restoring the service to a working
    state is always the first priority; root-cause analysis happens *after* the system is stable.
  common_mistake: Engineers, especially those new to operations, often instinctively try to debug the
    problem immediately. They'll start inspecting the new data, checking the ETL pipeline, or analyzing
    the model's outputs. This prioritizes root-cause analysis over immediate service restoration, leading
    to prolonged customer-facing outages and violating the principle of 'stop the bleeding'.
  napkin_math: Let's quantify the cost of making the wrong choice. Assume the chatbot handles 100 queries/sec
    and each bad answer costs $0.10 in user trust/lost revenue. A data rollback takes 5 minutes via an
    automated pipeline. Debugging the new data file to find a subtle corruption takes 2 hours.
