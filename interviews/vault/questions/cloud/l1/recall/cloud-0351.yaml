title: 'The Interconnect Latency Ladder: Network Bandwidth Bottlenecks'
topic: network-bandwidth-bottlenecks
status: draft
provenance: imported
scenario: You're profiling a multi-GPU training job and trying to identify communication bottlenecks.
  To start, you need a baseline understanding of the hardware's latency costs. What is the approximate
  latency for a data transfer between two GPUs connected via NVLink 4.0?
details:
  realistic_solution: An NVLink 4.0 transfer has a latency of approximately 500 nanoseconds. This is about
    2x faster than a PCIe Gen5 transfer (~1,000 ns) and 10x faster than a cross-rack InfiniBand NDR network
    hop (~5,000 ns). Knowing these orders of magnitude is critical for reasoning about scale-up vs. scale-out
    performance.
  common_mistake: Confusing the latencies of different interconnects or assuming all 'fast' interconnects
    are roughly the same. Engineers often know NVLink is for GPU-to-GPU communication but may incorrectly
    equate its latency to that of PCIe (which is slower) or InfiniBand (which is much slower).
