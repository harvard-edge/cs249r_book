id: cloud-0822
title: The Kernel Fusion Memory Savings
topic: graph-compilation
status: published
provenance: imported
scenario: 'You are interviewing for an ML infrastructure role. The interviewer asks: a LayerNorm operation
  without kernel fusion requires four separate HBM read/write passes over a tensor. With fusion, it requires
  only two. For a hidden dimension of 4096, sequence length of 2048, in FP16, how much HBM traffic does
  fusion eliminate?'
details:
  realistic_solution: 'Fusion saves ~50% of HBM traffic. The tensor is 4096 * 2048 * 2 bytes = 16.8 MB.
    Unfused: 4 passes * 16.8 MB = 67 MB of traffic. Fused: 2 passes * 16.8 MB = 34 MB. Savings = 33 MB,
    a 50% reduction.'
  common_mistake: Thinking operator fusion is only about reducing kernel launch overhead. The dominant
    benefit is eliminating redundant memory traffic to HBM, which is the actual bottleneck for memory-bound
    operations.
  napkin_math: Tensor = 4096 * 2048 * 2 bytes = 16.8 MB. Unfused = 4 * 16.8 = 67 MB. Fused = 2 * 16.8
    = 34 MB. Savings = 50%.
