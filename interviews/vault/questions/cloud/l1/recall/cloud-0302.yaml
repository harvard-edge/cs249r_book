id: cloud-0302
title: Identifying the Roofline's Axis
topic: roofline-analysis
status: published
provenance: imported
scenario: To optimize a workload on a new H100 GPU, you need to know if it's compute-bound or memory-bound.
  Which fundamental metric determines this, and what is its definition?
details:
  realistic_solution: The key metric is **Arithmetic Intensity (AI)**, defined as the number of arithmetic
    operations (FLOPs) performed per byte of data moved from main memory (HBM).
  common_mistake: Engineers often confuse a workload's intensity with its raw throughput (TOPS) or its
    power efficiency (TOPS/W). Another common error is inverting the ratio, thinking in terms of memory
    pressure per operation (Bytes/FLOP) rather than operational density per byte.
  napkin_math: '1. The H100''s peak compute is 989 TFLOPS (FP16).

    2. The H100''s peak memory bandwidth is 3.35 TB/s (HBM3).

    3. Ridge Point = 989 TFLOPS / 3.35 TB/s = 295.2 FLOPs/Byte.

    This represents the hardware''s intrinsic Arithmetic Intensity. If your workload computes fewer than
    295 operations per byte fetched, it is bottlenecked by memory speed. If greater, it is bound by compute
    cores.'
