id: cloud-cell-10205
title: Memory Capacity Planning for Concurrent RAG Agents on H100
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are deploying a compound AI system on a single H100 node (8x H100 80GB, NVLink) where 16
  concurrent agent sessions each run a 13B LLM plus a shared 7B reranker. Each agent session holds 8192-token
  KV cache. The 13B model in bf16 requires 26GB weights, the 7B reranker requires 14GB weights. Calculate
  whether all components fit and design a memory allocation strategy with tensor parallelism.
details:
  realistic_solution: 'Per 13B model shard across 4 GPUs: 26GB/4=6.5GB weights per GPU. Per 7B reranker
    shard across 2 GPUs: 14GB/2=7GB per GPU. KV cache per session for 13B (40 layers, 128 head_dim, bf16):
    2*40*128*2*8192=167MB per session. 16 sessions: 16*167MB=2.67GB. Total per GPU on 13B shards: 6.5+0.67+activation=~9GB.
    Feasible on 80GB. Reranker GPUs: 7GB weights + batch KV for concurrent reranks. NVLink enables all-reduce
    across shards at 600GB/s.'
  common_mistake: Forgetting to account for KV cache memory when planning model parallelism. Teams allocate
    GPU memory for model weights and activation memory but neglect that 16 concurrent sessions each holding
    8192-token KV caches can consume more memory than the model weights themselves.
  napkin_math: '13B model bf16: 13B*2 bytes=26GB, tensor parallel across 4 GPUs: 6.5GB/GPU. KV per session:
    2(K+V)*40 layers*128 head_dim*2 bytes*8192 tokens = 2*40*128*2*8192 = 167,772,160 bytes ≈ 160MB. 16
    sessions: 2.56GB KV total, distributed across 4 GPUs = 640MB/GPU. Activation memory ~2GB/GPU. Total
    per GPU: 6.5+0.64+2=9.14GB. Remaining: 70.86GB for batching headroom. Reranker: 14GB/2=7GB/GPU + KV.'
