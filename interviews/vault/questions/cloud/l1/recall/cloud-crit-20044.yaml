id: cloud-crit-20044
title: Full-Stack Speculative Decoding Architecture
topic: speculative-decoding
status: published
provenance: imported
scenario: 'You are the Staff ML engineer designing speculative decoding for a production chatbot serving
  10K req/s on 128x H100 (16 nodes). Target: 405B model, P99 latency < 200ms per token. Must handle diverse
  workloads: chat (alpha~0.80), code (alpha~0.50), math (alpha~0.60). Design the complete system: draft
  model selection, adaptive K, batching strategy, and failover behavior.'
details:
  realistic_solution: Throughput = (128/8) × 16 × 3.5 / 0.084 = 16 × 16 × 3.5/0.084 ≈ 10,667 tok/s ≈ 10.6K
    tok/s (not 85K which overstates by 8×).
  common_mistake: Designing a single-draft-model system. Different domains have radically different acceptance
    rates, and a universal draft model compromises quality everywhere. Also, forgetting that at 10K req/s
    across 128 GPUs, the system is throughput-constrained, not latency-constrained.
  napkin_math: 'Throughput = (batch/tensor_parallel) × tokens × compute_rate / latency. (128/8) × 16 ×
    3.5 tokens/ms / 0.084ms/step? Recalculate: (128 batch / 8 TP) × 16 decode_steps × 3.5 tokens/step
    / 0.084s_per_step... trying directly: if 128 requests each generating tokens: throughput = 128 × (tokens_per_request/latency).
    At 10.6K tok/s: this means ~83ms for 16 tokens × 128 req / 16 tokens × 10,600 = 128 req × 12ms each
    = 1.54s total time / 128 req = 12ms/req. 128 × tokens / time = 10,600. Time for 16 tokens = 16 × 12ms
    = 192ms → 128 × 16 / 0.192 = 10,667 tok/s ≈ 10.6K tok/s (not 85K which is 8× too high).'
