title: Cloud New 0008
topic: collective-communication
status: published
provenance: imported
scenario: You are designing a custom cloud instance for medium-sized model inference. You must state the
  difference in primary use case and bandwidth between NVLink and PCIe Gen4 on an A100 system.
details:
  realistic_solution: PCIe Gen4 connects the CPU host to the GPU device with a bandwidth of 32 GB/s, primarily
    used for initial data loading and host-device coordination. NVLink connects GPUs directly to other
    GPUs with a massive 600 GB/s bandwidth on the A100, primarily used for high-speed collective communications
    like All-Reduce in distributed training or tensor parallelism.
  common_mistake: Assuming PCIe Gen4 can be used for efficient Tensor Parallelism, which requires the
    massive bandwidth of NVLink.
  napkin_math: An All-Reduce operation for 4GB of gradients across GPUs via PCIe Gen4 would take roughly
    4GB / 32GB/s = 125ms. Via A100 NVLink, it takes 4GB / 300GB/s (unidirectional) = 13.3ms, a nearly
    10x improvement.
