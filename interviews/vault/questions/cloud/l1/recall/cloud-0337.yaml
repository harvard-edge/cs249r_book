id: cloud-0337
title: The On-Node vs. Off-Node Interconnect Gap
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: In a modern AI datacenter, you have NVLink connecting GPUs within a server and InfiniBand connecting
  servers across racks. Roughly how much faster is a typical NVLink transfer compared to a cross-rack
  InfiniBand transfer in terms of latency?
details:
  realistic_solution: An NVLink 4.0 transfer is about 10 times faster than a cross-rack InfiniBand transfer.
    NVLink latency is around 500 ns, as it's a direct, on-board connection between GPUs. In contrast,
    an InfiniBand transfer must leave the server, traverse NICs, optical cables, and one or more network
    switches, pushing its latency to around 5,000 ns (5 µs).
  common_mistake: Engineers often underestimate the 'datacenter tax,' assuming all high-speed networks
    are roughly equivalent in performance. A common mistake is to confuse the latency of an on-board interconnect
    (like NVLink or PCIe) with a switched fabric network (like InfiniBand), which involves significantly
    more overhead from NICs, cables, and switches.
  napkin_math: 'From the ML Latency Hierarchy:

    1. **Intra-node NVLink Latency:** ~500 ns (0.5 µs) for GPUs in the same server.

    2. **Cross-rack InfiniBand Latency:** ~5,000 ns (5 µs) across switches.

    3. **Comparison:** 5,000 ns / 500 ns = 10x slower.

    NVLink provides an order-of-magnitude lower latency because it avoids NIC traversal, optical transceivers,
    and switch hopping.'
