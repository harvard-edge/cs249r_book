id: cloud-0278
title: The Meaning of TOPS/W
topic: energy-per-operation
status: published
provenance: imported
scenario: You are doing a cost analysis for a new datacenter build-out. An NVIDIA H100 GPU provides about
  989 TFLOPS of FP16 performance with a 700W TDP. What does the TFLOPS/W metric primarily allow you to
  calculate?
details:
  realistic_solution: The TFLOPS/W metric defines the power efficiency of the processor. It allows you
    to calculate how much sustained throughput you can achieve within a given power budget. A higher TFLOPS/W
    is more desirable for maximizing performance within a fixed power envelope, which is the fundamental
    constraint in any large-scale deployment.
  common_mistake: Assuming that the GPU with the highest peak TFLOPS is always the most performant choice,
    ignoring the severe constraints of power delivery and cooling at the rack and datacenter level. This
    leads to poor total cost of ownership (TCO) calculations.
  napkin_math: An H100 GPU's efficiency is 989 TFLOPS / 700 W ≈ 1.4 TFLOPS/W. If your rack has a power
    budget of 70 kW (70,000 W), and assuming 100 GPUs per rack isn't feasible due to physical space, you
    could theoretically power 100 H100s. The rack's total potential compute would be 100 GPUs * 989 TFLOPS/GPU
    = 98.9 PFLOPS, but this is only achievable if the 70kW power budget (700W * 100) is available, which
    it is in modern AI racks.
