id: cloud-0341
title: Defining Arithmetic Intensity (cloud-0341)
topic: roofline-analysis
status: draft
provenance: imported
scenario: When analyzing GPU kernel performance, we often need to determine if a workload is limited by
  compute power or memory bandwidth. What is the definition of 'Arithmetic Intensity', the key metric
  used for this analysis?
details:
  realistic_solution: Arithmetic Intensity is the ratio of total floating-point operations (FLOPs) performed
    to the total bytes of data moved from memory (DRAM). It is expressed in Ops/Byte. A high arithmetic
    intensity means an operation is likely compute-bound (limited by processor speed), while a low intensity
    means it is memory-bound (limited by memory bandwidth).
  common_mistake: Engineers often confuse Arithmetic Intensity with related metrics like raw FLOPs or
    power efficiency (TOPS/W), or they invert the ratio (Bytes/Op instead of Ops/Byte). The key is to
    remember it's a measure of *how much work you do per byte of data you fetch*.
  napkin_math: The H100 GPU has a peak throughput of 989 TFLOPS (FP16) and a memory bandwidth of 3.35
    TB/s. The ratio of these two numbers gives the 'ridge point' of the GPU's roofline model, which is
    the hardware's own arithmetic intensity.
