id: cloud-0240
title: Identifying the Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: A workload running on an H100 GPU has an arithmetic intensity of 40 FLOPs/Byte. Given the H100's
  ridge point is about 295 FLOPs/Byte, state whether the workload is compute-bound or memory-bound.
details:
  realistic_solution: The workload is **memory-bound**. Its arithmetic intensity (40 FLOPs/Byte) is significantly
    lower than the H100's ridge point (295 FLOPs/Byte). This places it on the left side of the roofline
    model, where the performance is dictated by the sloped line representing memory bandwidth limitations.
    The GPU's powerful compute cores are starved for data and cannot run at their full potential.
  common_mistake: 'A common misconception is to invert the logic: thinking that a low arithmetic intensity
    means the workload isn''t doing much compute, so it must be ''compute-bound'' (i.e., limited by a
    lack of compute). The reality is the opposite: the low ratio of compute-to-memory-access means the
    GPU spends most of its time waiting for data.'
  napkin_math: 'The performance of a memory-bound workload is limited by bandwidth * arithmetic intensity.
    With an AI of 40 FLOPs/Byte on an H100 (3.35 TB/s bandwidth): Achievable Compute = 3.35 TB/s * 40
    FLOPs/Byte = 134 TFLOPS. Since 134 TFLOPS < 989 TFLOPS peak, it''s memory-bound.'
