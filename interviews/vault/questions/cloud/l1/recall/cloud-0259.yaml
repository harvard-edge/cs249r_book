schema_version: 1
id: cloud-0259
title: The MoE Compute Fallacy
topic: mixture-of-experts
status: published
provenance: imported
scenario: You are planning the training run for a new Mixture-of-Experts (MoE) LLM. The model has a total
  of 1 Trillion parameters, composed of 10 experts of 100B parameters each. During a forward pass, the
  router sends each token to the 2 best experts.
details:
  realistic_solution: 'The Chinchilla scaling law for training compute is `C ≈ 6 * P * D`, where `P` is
    the active parameter count and `D` is the optimal number of tokens (`D ≈ 20 * P`). For an MoE model,
    the active parameter count is the number of parameters a single token ''sees'' during a forward pass.
    Here, with 2 active experts of 100B each, `P_active = 200B`. The total training compute is therefore
    based on 200B active parameters, not the full 1T total parameters. This is the key insight: MoE models
    achieve the quality of a dense model with far less compute, because the router ensures only a fraction
    of the network is active for each token.'
  common_mistake: The most common mistake is to use the total parameter count (1T) in the scaling law
    formula, rather than the active parameter count (200B). This overestimates the required compute by
    a significant margin, leading to a wildly incorrect budget and resource allocation. Another mistake
    is forgetting the factor of 6 for the forward and backward pass, underestimating the compute needed.
  napkin_math: '1. **Identify Active Parameters (P):** 2 experts × 100B params/expert = 200B params. 2.
    **Calculate optimal tokens (D):** D = 20 × P = 20 × 200B = 4 Trillion tokens. 3. **Calculate training
    compute (C):** C = 6 × P × D = 6 × 200 × 10^9 × 4 × 10^12 = 4.8 × 10^24 FLOPs = **4.8 YottaFLOPs**.
    4. **Compare with naive (incorrect) calculation using total params:** C_wrong = 6 × 1T × 20T = 1.2
    × 10^26 FLOPs — a **25x overestimate**. 5. **GPU-hours estimate:** On H100 at 989 TFLOPS (50% utilization):
    4.8e24 / (989e12 × 0.5) = 9.7 × 10^9 seconds ≈ **307 GPU-years**. With 1,000 GPUs: ~112 days. 6. **Key
    takeaway:** The MoE ''compute fallacy'' — using total parameters instead of active parameters — would
    lead to budgeting for 25x more compute than actually needed.'
