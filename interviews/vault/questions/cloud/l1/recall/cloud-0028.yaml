id: cloud-0028
title: The Interconnect Latency Ladder
topic: collective-communication
status: published
provenance: imported
scenario: 'You''re profiling a distributed training job and see latency spikes from three different sources:
  GPU-to-GPU data transfers within a single server, GPU-to-CPU memory copies, and server-to-server communication
  across the cluster network. Which of these communication links typically has the highest latency?'
details:
  realistic_solution: A server-to-server InfiniBand NDR transfer has the highest latency, around 5,000
    ns (5 µs). This is because the signal must travel meters of fiber optic cable and pass through multiple
    network switches and NICs. In contrast, on-server transfers like NVLink (~500 ns) and PCIe Gen5 (~1,000
    ns) are an order of magnitude faster because the physical distance is just centimeters of copper on
    a PCB.
  common_mistake: Engineers often conflate bandwidth with latency, assuming high-bandwidth interconnects
    must have low latency. A common error is to think the general-purpose PCIe bus is the main bottleneck,
    without appreciating the immense latency cost of going 'off-box' to another server, even over a fast
    network like InfiniBand.
  napkin_math: 'Using the ''1 ns = 1 second'' human-scale analogy from the playbook: A fast NVLink transfer
    takes about 8 minutes. A PCIe transfer takes about 16 minutes. A cross-rack InfiniBand transfer takes
    about 1.4 hours. The physics of distance makes the server-to-server trip dramatically slower.'
