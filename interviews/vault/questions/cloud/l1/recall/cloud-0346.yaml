id: cloud-0346
title: 'The Ridge Point Rule: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: You're profiling a model component on an NVIDIA H100 GPU. The profiler reports that it executes
  50 floating-point operations for every byte of data it reads from HBM. How do you classify this workload's
  primary bottleneck?
details:
  realistic_solution: The workload is **memory-bound**. A workload's performance is limited by memory
    bandwidth if its Arithmetic Intensity (AI) is less than the hardware's ridge point. For an H100, the
    ridge point is ~295 Ops/Byte. Since this workload's AI (50 Ops/Byte) is significantly below that threshold,
    its performance is limited by how fast it can fetch data from memory (HBM bandwidth), not by the GPU's
    raw computational power.
  common_mistake: Engineers often see a number like '50 FLOPs' and assume it must be a high amount of
    work, thus making the workload compute-bound. They fail to compare the workload's Arithmetic Intensity
    to the hardware's Ridge Point, which is the actual threshold for being compute-bound on that specific
    chip. They mistake absolute work for relative intensity.
  napkin_math: Workload Arithmetic Intensity (AI) = 50 FLOPs/Byte.
