schema_version: 1
id: cloud-0003
title: The KV-Cache Memory Bomb
topic: vram-budgeting
status: draft
provenance: imported
scenario: You are planning the deployment for a 70-billion parameter LLM. A product requirement is to
  support very long context windows up to 128,000 tokens. For a single user request with a full context
  window, what is the approximate VRAM required just to store the KV-cache?
details:
  realistic_solution: 'The KV-cache for a single 128k-token request on Llama-70B (GQA with 8 KV heads)
    requires approximately ~42 GB of VRAM. This is a substantial fraction of a single 80 GB GPU — and
    that''s before accounting for model weights (~140 GB in FP16). This is why serving models with long
    context windows is extremely challenging: even a single request''s KV-cache can consume a significant
    portion of available VRAM, and with multiple concurrent users the memory pressure compounds rapidly.'
  common_mistake: A common mistake is to only consider the model's weight memory (~140GB for a 70B model
    in FP16), completely forgetting that the KV-cache's memory footprint scales linearly with the sequence
    length and can easily surpass the model weight memory.
  napkin_math: 'KV Cache = 2 × layers × kv_heads × head_dim × seq_len × bytes_per_param | Llama-70B specs:
    80 layers, 8 KV heads (GQA), 128 head_dim, FP16 (2 bytes) | = 2 × 80 × 8 × 128 × 128,000 × 2 bytes
    | Step by step: 2 × 80 = 160 | 160 × 8 = 1,280 | 1,280 × 128 = 163,840 | 163,840 × 128,000 = 20,971,520,000
    | × 2 bytes = 41,943,040,000 bytes | ≈ 42 GB per request | Note: With GQA (8 KV heads instead of 64
    query heads), the KV-cache is 8× smaller than it would be with full MHA.'
