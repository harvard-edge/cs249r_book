title: Cloud New 0037
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: To mitigate the compute stall caused by saving model states, asynchronous checkpointing is used.
  Define asynchronous checkpointing and how it differs from the synchronous method.
details:
  realistic_solution: Asynchronous checkpointing allows the training job to continue processing the next
    batch of data while the state from the previous step is being written to durable storage in the background.
    A snapshot is typically quickly copied from GPU HBM to host CPU RAM, freeing the GPU. A separate host
    CPU thread then slowly transfers the data to persistent cloud storage.
  common_mistake: Thinking asynchronous checkpointing prevents hardware failures altogether, rather than
    just hiding the I/O latency penalty associated with saving the model state.
  napkin_math: Copying a 140GB model state from GPU to Host RAM over PCIe Gen4 (32GB/s) takes 4.3 seconds.
    The GPU is only blocked for 4.3s, instead of waiting 42 seconds for the network write.
