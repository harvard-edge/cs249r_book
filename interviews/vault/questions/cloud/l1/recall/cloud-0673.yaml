id: cloud-0673
title: The PCIe Switch Starvation
topic: collective-communication
status: published
provenance: imported
scenario: You are building an 8-GPU server for training. You buy 8x H100 GPUs and a dual-socket CPU motherboard.
  You plug 4 GPUs into the PCIe slots wired to CPU 0, and 4 GPUs into the slots wired to CPU 1. When you
  run NCCL AllReduce to sync gradients, the training is 3x slower than the same 8 GPUs running in an official
  Nvidia DGX system. `nvidia-smi` shows the GPUs are mostly idle. Where is the bottleneck?
details:
  realistic_solution: You forced GPU-to-GPU traffic over the slow CPU interconnect. In a dual-socket system,
    the PCIe lanes are split between the two CPUs. GPU 0 (on CPU 0) can talk to GPU 3 (on CPU 0) directly
    via a PCIe switch at high speed. However, for GPU 0 to send a gradient to GPU 4 (on CPU 1), the data
    must physically travel from GPU 0, into CPU 0, across the QPI/UPI (Ultra Path Interconnect) bridge
    to CPU 1, and then down to GPU 4. The UPI bridge is drastically slower than PCIe/NVLink and becomes
    an extreme choke point for ring or tree AllReduce topologies.
  common_mistake: '"Assuming that as long as all GPUs are plugged into the same motherboard, they can
    talk to each other at full PCIe speeds."'
  napkin_math: A standard PCIe Gen 5 x16 slot provides `~128 GB/s` of bidirectional bandwidth (`~64 GB/s`
    in each direction). An Nvidia NVLink switch (like in a DGX) provides `900 GB/s` of GPU-to-GPU bandwidth.
    The Intel UPI link connecting two CPUs might only provide `~20-40 GB/s` of practical throughput, and
    it is shared with all other system traffic. Your communication bottleneck is the physical wire between
    the two CPU sockets.
