schema_version: 1
id: cloud-fill-02043
title: 'Gradient Synchronization Mastery: Pipeline Parallelism + AllReduce Co-Design'
topic: gradient-synchronization
status: published
provenance: imported
scenario: You are designing a 1024-H100 training system for a 175B parameter model using 3D parallelism
  (tensor-parallel=8, pipeline-parallel=16, data-parallel=8). Each H100 has NVLink (900GB/s) intra-node
  and 400Gbps IB inter-node. Analyze the gradient synchronization requirements for each parallelism dimension
  and design the communication schedule.
details:
  realistic_solution: 'TP (tensor parallel, 8 GPUs): AllReduce within node for each attention/MLP layer.
    Volume: activation size per layer ≈ batch×seq×d_model = 4×2048×12288×2B = 200MB. Time on NVLink: 200MB
    × 2×7/8 / 450GB/s = 0.77ms per layer × 96 layers = 74ms total TP comm. PP (pipeline, 16 stages): P2P
    activation passing ≈ 200MB per micro-batch forward + backward. Time: 200MB/50GB/s (IB) = 4ms × 2 ×
    16 stages × 4 micro-batches = 512ms pipeline bubble. DP (data parallel, 8 DP groups): AllReduce 175B×2B=350GB
    gradients over 8 nodes. Time: 2×7/8×350GB/(8×50GB/s IB) = 76s! Gradient compression mandatory for
    DP dimension. With PowerSGD rank-8: 350GB→350MB → 76ms. Total with compression: TP=74ms, PP=512ms,
    DP=76ms. Dominant cost is pipeline bubble.'
  common_mistake: Applying a single AllReduce across all 1024 GPUs; not recognizing that each parallelism
    dimension has different communication patterns and bandwidth requirements.
  napkin_math: '175B params, BF16: 350GB. DP AllReduce over 8 nodes (400Gbps=50GB/s/node): 2×7/8×350/50=12.25s
    uncompressed. Compress 1000×: 12.25ms. TP per layer: 200MB over NVLink 450GB/s: 200/450000=0.44ms
    ×96 layers=42ms. PP bubble: depends on micro-batches. With 4 micro-batches: bubble≈(PP_stages-1)/PP_stages×batch_time=15/16×step.
    Schedule: overlap DP AllReduce with PP flush phase.'
