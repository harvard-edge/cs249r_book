schema_version: 1
id: cloud-0670
title: The Decoding Bottleneck
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: We are heavily memory-bandwidth bound during LLM decoding. How can we generate tokens faster
  without changing the model weights, quantizing, or losing exact mathematical accuracy?
details:
  realistic_solution: Speculative Decoding. You use a tiny, fast "draft" model to guess the next $K$ tokens.
    You then pass these $K$ tokens to your massive target model in a *single forward pass*. The large
    model verifies the guesses in parallel (trading spare ALU compute capacity to save memory fetches).
    All correct tokens are accepted, maintaining identical output distributions but yielding 2-3x speedups.
  common_mistake: '"Use a faster GPU" or "Increase the batch size." A faster GPU won''t help if you''re
    bandwidth-bound (Round 1: Roofline Shift), and larger batches increase throughput but not per-request
    latency.'
  napkin_math: 'Normal decode: 1 token per forward pass, each pass loads all 140 GB of weights from HBM.
    100 tokens = 100 weight loads = $100 \times 140\text{GB} / 3.35\text{TB/s} = 4.2$ seconds. Speculative
    decode with $K=5$ and an average of 4 tokens accepted per pass: ~100 tokens in 25 forward passes =
    $25 \times 140\text{GB} / 3.35\text{TB/s} = 1.04$ seconds. **4× speedup**.'
