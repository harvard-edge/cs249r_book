id: cloud-0823
title: The Gradient AllReduce Time
topic: 3d-parallelism
status: published
provenance: imported
scenario: You are running data-parallel training of a 7B model across 8 H100 GPUs in a single node connected
  via NVLink 4.0 (900 GB/s bidirectional). Gradients are in FP32. How long does the AllReduce synchronization
  take?
details:
  realistic_solution: 'About 54 ms. Gradient size = 7B * 4 bytes = 28 GB. Ring AllReduce sends 2*(N-1)/N
    * data volume = 2*(7/8)*28 = 49 GB over the ring. At 900 GB/s NVLink: 49/900 ~ 54 ms.'
  common_mistake: Using FP16 gradient size instead of FP32, or forgetting the 2*(N-1)/N ring AllReduce
    overhead factor. Some candidates also confuse bidirectional bandwidth with unidirectional.
  napkin_math: Gradients = 7B * 4 bytes (FP32) = 28 GB. Ring AllReduce factor = 2*(8-1)/8 = 1.75. Total
    traffic = 1.75 * 28 = 49 GB. Time = 49 GB / 900 GB/s ≈ 0.054 s ≈ 54 ms.
