schema_version: 1
id: cloud-0305
title: The Blue-Green Pull Time
topic: compound-ai-systems
status: published
provenance: imported
scenario: Your team is performing a blue-green deployment for a new 70-billion parameter RAG model. The
  model is packaged as a 150 GB container image. To bring the new 'green' stack online, you need to pull
  this image from the container registry to a fresh set of H100 servers across the rack. Approximately
  how long does it take for a single server to download this container image over a modern datacenter
  network like InfiniBand NDR?
details:
  realistic_solution: A single server can pull the container in approximately 3 seconds. Datacenter networks
    are extremely fast. The 'NUMBERS.md' playbook states that InfiniBand NDR provides about 400 Gbps,
    which is 50 GB/s of bandwidth. The time to transfer is the total size divided by the bandwidth.
  common_mistake: Engineers often underestimate modern datacenter network speeds. They might base their
    intuition on their home internet (e.g., 1 Gbps or ~125 MB/s) or older datacenter Ethernet (10-40 GbE),
    not realizing that high-performance fabrics like InfiniBand are orders of magnitude faster. This leads
    them to overestimate pull times to be in the minutes, not seconds.
  napkin_math: 'Model Container Size: 150 GB | Network Bandwidth: 400 Gbps (50 GB/s) from InfiniBand NDR
    specification'
