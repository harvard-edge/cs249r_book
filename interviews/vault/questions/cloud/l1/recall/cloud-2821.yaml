title: Cloud New 0011
topic: data-parallelism
status: published
provenance: imported
scenario: When scaling a training job in the cloud, Data Parallelism is the most common technique. Define
  the core concept of Data Parallelism and recall what happens to the model weights across GPUs.
details:
  realistic_solution: In Data Parallelism, exact replicas of the entire model (weights) are placed on
    every participating GPU. The global training batch is divided into smaller micro-batches, and each
    GPU processes its own micro-batch independently. During the backward pass, gradients from all GPUs
    are aggregated to update the weights consistently across all replicas.
  common_mistake: Thinking that the model weights are split into pieces across the GPUs; in standard Data
    Parallelism, the full model is duplicated.
  napkin_math: Training a 7B model (14GB weights in FP16) on 8 A100s requires 14GB of memory on each of
    the 8 GPUs just for the weights. The global batch size is 8 times the micro-batch size processed per
    GPU.
