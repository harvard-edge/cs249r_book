id: cloud-0044
title: The Interconnect Latency Ladder (cloud-0044)
topic: collective-communication
status: draft
provenance: imported
scenario: Identify the approximate latency of a local GPU-to-GPU transfer using NVLink 4.0 versus a cross-rack,
  server-to-server transfer using InfiniBand NDR.
details:
  realistic_solution: An NVLink 4.0 transfer has a latency of approximately 500 ns, while a cross-rack
    InfiniBand NDR transfer is about 5,000 ns (5 µs). Therefore, the local NVLink transfer is roughly
    10 times faster than the cross-rack InfiniBand transfer. This order-of-magnitude difference is fundamental
    to understanding network topology and optimizing distributed workloads.
  common_mistake: Engineers often underestimate the 'local vs. remote' latency gap, even for high-performance
    networks. They might treat all 'high-speed interconnects' as roughly equivalent, failing to appreciate
    that crossing a physical server boundary, even with RDMA and InfiniBand, imposes a significant and
    predictable latency penalty compared to on-node communication over a specialized bus like NVLink.
  napkin_math: A single hop over an on-node NVLink 4.0 connection has a latency of roughly 500 nanoseconds.
    A cross-rack server-to-server transfer via InfiniBand NDR takes about 5,000 nanoseconds (5 microseconds).
    5,000 ns / 500 ns = 10x. Data leaving the physical server motherboard incurs a massive 10x latency
    penalty.
