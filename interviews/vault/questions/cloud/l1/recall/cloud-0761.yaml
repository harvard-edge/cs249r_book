id: cloud-0761
title: The Optimal Checkpoint Interval
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You're training on 512 GPUs. The mean time between failures (MTBF) for the cluster is 2 hours.
  Checkpointing takes 5 minutes and pauses all training. Derive the optimal checkpoint interval that minimizes
  total wasted time (checkpoint overhead + expected lost work from failures).
details:
  realistic_solution: 'This is a classic optimization problem. Let $\tau$ = checkpoint interval, $\delta$
    = checkpoint duration (5 min), $\lambda$ = failure rate (1/MTBF = 0.5/hr). The total wasted time per
    unit of training has two components: (1) checkpoint overhead = $\delta / \tau$, and (2) expected lost
    work per failure = $\tau/2$ (uniform distribution of failure within interval) × failure rate = $\lambda
    \tau / 2$. Minimize $f(\tau) = \delta/\tau + \lambda\tau/2$.'
  common_mistake: '"Checkpoint every 5 minutes to minimize lost work." This maximizes checkpoint overhead
    — you''d spend 50% of time checkpointing.'
  napkin_math: '$f(\tau) = \delta/\tau + \lambda\tau/2$. Take derivative: $f''(\tau) = -\delta/\tau^2
    + \lambda/2 = 0$. Solve: $\tau^* = \sqrt{2\delta/\lambda}$. With $\delta = 5$ min = 1/12 hr, $\lambda
    = 0.5$/hr: $\tau^* = \sqrt{2 \times (1/12) / 0.5} = \sqrt{1/3} = 0.577$ hr ≈ **34.6 minutes**. Wasted
    time at optimal: $f(\tau^*) = (1/12)/0.577 + 0.5 \times 0.577/2 = 0.144 + 0.144 = 0.289$ → **28.9%
    overhead**. Compare: checkpoint every 10 min: $f = (1/12)/(1/6) + 0.5 \times (1/6)/2 = 0.5 + 0.042
    = 54.2\%$ — checkpoint overhead dominates. Checkpoint every 2 hrs: $f = (1/12)/2 + 0.5 \times 2/2
    = 0.042 + 0.5 = 54.2\%$ — lost work dominates. The optimal balances both at 28.9%. With **async checkpointing**
    ($\delta_{\text{effective}} \approx 0.5$ min): $\tau^* = \sqrt{2 \times (1/120) / 0.5} = 0.183$ hr
    ≈ **11 min**, overhead drops to **9.1%**.'
