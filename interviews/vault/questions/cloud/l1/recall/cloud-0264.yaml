id: cloud-0264
title: The HBM Latency Penalty
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're debugging a GPU kernel and suspect it's memory-bound due to random memory access patterns.
  To build intuition, what is the approximate latency you should recall for a single memory access to
  HBM3 on a modern datacenter GPU like an H100?
details:
  realistic_solution: A single random memory access to HBM3 takes approximately 300 nanoseconds. While
    this sounds fast, it's orders of magnitude slower than accessing on-chip caches.
  common_mistake: Engineers often underestimate this latency, confusing it with on-chip cache speeds.
    They might guess 10-50ns, failing to appreciate the 'penalty' for going off-chip to the HBM stacks,
    which is a major factor in kernel optimization.
  napkin_math: The key is the ratio. If an L1 cache access (~1ns) took 1 second in human time, an L2 cache
    access (~4ns) would take 4 seconds. That HBM3 access (~300ns) would take 5 minutes. This highlights
    why data locality is critical for performance.
