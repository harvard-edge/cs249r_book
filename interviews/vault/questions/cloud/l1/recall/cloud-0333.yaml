id: cloud-0333
title: The Annual Maintenance Tax
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You are scoping the Total Cost of Ownership (TCO) for a new, on-premise 16-GPU H100 server.
  Based on industry rules of thumb, what is the approximate *annual maintenance cost* you should budget
  for this server, separate from power and operational costs?
details:
  realistic_solution: The standard industry rule of thumb for annual hardware maintenance is ~5% of the
    initial CapEx. This covers service contracts, non-warranty component swaps, and general upkeep. It's
    a critical part of the TCO calculation beyond the initial purchase.
  common_mistake: Engineers often focus solely on the initial Capital Expenditure (CapEx) of the hardware
    and forget to budget for ongoing maintenance. This 'Day 0' thinking leads to underfunded operations
    and unexpected costs when service contracts come due or components need non-warranty replacement.
  napkin_math: '1. Assume a single H100 GPU has a CapEx of ~$30,000.

    2. Server CapEx (ignoring base chassis for simplicity) ~ 16 GPUs * $30,000 = $480,000.

    3. The industry rule of thumb for annual maintenance is ~5% of hardware CapEx.

    4. Annual Maintenance = $480,000 * 0.05 = $24,000.

    You should budget roughly $24k per year for support, parts, and maintenance overhead for this single
    16-GPU box.'
