id: cloud-0253
title: Identifying a Memory-Bound Workload
topic: roofline-analysis
status: published
provenance: imported
scenario: You're analyzing a GPU kernel using a roofline plot. You observe that its performance (in GFLOPS)
  directly increases with its Arithmetic Intensity and lies on the slanted portion of the 'roof'. What
  does this tell you about the workload?
details:
  realistic_solution: The workload is **memory-bound**. The slanted part of the roofline represents the
    performance limit imposed by the memory subsystem's bandwidth. In this region, the compute units are
    starved for data; they are waiting for operands to arrive from HBM. Performance is determined entirely
    by how fast the GPU can supply data, which is the product of its memory bandwidth (Bytes/sec) and
    the kernel's arithmetic intensity (FLOPs/Byte).
  common_mistake: A common misconception is that any workload running on a powerful GPU must be limited
    by its compute power. Engineers sometimes forget that the roofline has two distinct regions, and most
    real-world models have parts that are heavily constrained by memory speed, not just FLOPS.
  napkin_math: An H100 GPU has a memory bandwidth of 3.35 TB/s. If a kernel has a low Arithmetic Intensity
    of 10 FLOPs/Byte, its maximum achievable performance is `3.35e12 Bytes/s * 10 FLOPs/Byte = 33.5 TFLOPS`.
    This is far below the H100's peak of 989 TFLOPS. The only way to improve performance is to increase
    the Arithmetic Intensity (e.g., through operator fusion) or wait for a GPU with higher memory bandwidth.
    The workload is on the slanted part of the roof because its AI is far below the H100's ridge point
    of ~295 FLOPs/Byte.
