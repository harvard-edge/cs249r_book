title: Cloud New 0035
topic: pruning-sparsity
status: published
provenance: imported
scenario: Libraries like cuDNN and compilers like TVM use auto-tuning to achieve peak hardware performance.
  Recall the basic definition of auto-tuning in the context of ML compilation.
details:
  realistic_solution: Auto-tuning is an optimization process where the compiler dynamically generates
    multiple different algorithmic variations of a specific kernel (such as changing loop unrolling factors
    or block sizes). It runs all these variations briefly on the actual target hardware to measure performance,
    and permanently selects the configuration that achieved the lowest latency.
  common_mistake: Believing auto-tuning refers to hyperparameter tuning for model accuracy (like grid
    search for learning rates) rather than hardware-level kernel optimization.
  napkin_math: 'Matrix Multiplications can be tiled differently. An auto-tuner tests Tile sizes: 16x16
    (takes 5ms), 32x32 (takes 3ms), 64x64 (takes 8ms due to SRAM spilling). It picks 32x32, saving 2ms
    per operation.'
