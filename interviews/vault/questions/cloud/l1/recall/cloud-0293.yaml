id: cloud-0293
title: The Core Motivation for Federated Learning
topic: federated-learning
status: published
provenance: imported
scenario: 'An automotive company wants to improve its driver assistance models using data from its global
  fleet of cars. They are considering two approaches: uploading all the raw sensor data to their cloud
  servers for centralized training, or using Federated Learning (FL) to train on the cars directly. From
  a privacy and data governance perspective, what is the primary motivation for using FL in this scenario?'
details:
  realistic_solution: The primary motivation for Federated Learning is to train a model on decentralized
    data without the raw data ever leaving the local device (the car, in this case). Only the model updates
    (gradients or weights) are sent to the central server. This preserves user privacy and helps comply
    with regulations like GDPR, as sensitive sensor data (e.g., camera footage, GPS logs) is not collected
    and stored centrally.
  common_mistake: Confusing the primary goal (privacy) with secondary benefits. Engineers sometimes assume
    FL's main purpose is to reduce network bandwidth costs or to improve model accuracy. While it can
    affect those, its fundamental reason for existing is to enable training where data cannot be centralized
    due to privacy regulations or user trust concerns.
  napkin_math: Let's quantify the *risk* that FL avoids. A major data breach costs a company ~$4.45M on
    average (IBM, 2023). For an automotive company, a breach involving driver footage would be catastrophic
    from both a financial and trust perspective. If we estimate a 1% chance of such a breach occurring
    over 5 years with a centralized dataset, the expected financial risk is `0.01 * $4,450,000 = $44,500`.
    Federated Learning fundamentally drives this specific risk toward zero by never centralizing the raw
    data, making it a powerful tool for economic risk mitigation.
