id: cloud-sus-63047
title: 'Vendor Lock-In Analysis: TPU v5e vs MI300X vs H100 for a 5-Year Infrastructure Plan'
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'A large ML platform team must choose a primary accelerator for a 5-year infrastructure commitment.
  They will train and serve models from 7B to 100B parameters at 1B tokens/day. Candidates: H100/H200
  (CUDA ecosystem, wide software support), MI300X (ROCm, AMD), TPU v5e (XLA/JAX only, GCP-locked). Conduct
  a multi-axis vendor risk analysis covering: software ecosystem maturity, hardware upgrade path, workload
  portability, and total cost of ownership. Recommend a primary and hedge strategy.'
details:
  realistic_solution: 'H100/H200 (CUDA): Ecosystem: 95%+ of open-source ML frameworks support CUDA natively.
    PyTorch, TensorFlow, JAX all run on CUDA without modification. Software risk: LOW. Upgrade path: H200
    (141GB HBM3e, 4.8 TB/s) is backward-compatible. B200 planned. Hardware risk: LOW. Portability: code
    runs on any NVIDIA GPU from A10 to H200. Lock-in: NVIDIA-only, but CUDA runs on cloud (AWS, GCP, Azure)
    — cloud portability HIGH. MI300X (ROCm): Ecosystem: ROCm supports most PyTorch ops but with occasional
    fallbacks to CPU for unsupported kernels. vLLM, DeepSpeed have ROCm ports at ~3-6 month lag from CUDA
    releases. Software risk: MEDIUM (improving rapidly). Hardware risk: LOW (AMD roadmap: MI400X). Cloud
    availability: Azure + Oracle, not GCP. TPU v5e (XLA): Ecosystem: JAX-first, PyTorch-XLA requires significant
    code adaptation. Most HuggingFace models require porting. Software risk: HIGH for non-JAX codebases.
    Lock-in: GCP-only, no on-prem option. Portability: near-zero without rewrite. Recommendation: Primary
    H100/H200 (low risk, maximum optionality). Hedge 20% of workload on MI300X (price pressure on NVIDIA,
    improving ROCm). Avoid TPU as primary unless already JAX-native.'
  common_mistake: Making the decision purely on TFLOPS/dollar or memory bandwidth. For a 5-year commitment,
    ecosystem lock-in, software compatibility, and upgrade path risk often dominate pure hardware metrics.
    A 20% performance advantage is worthless if your entire model training stack requires 18 months to
    port.
  napkin_math: '5-year TCO comparison (1,000 GPU equivalent, 100B tok/day): H100 cloud: 1,000 × $3.50/hr
    × 8,760 × 5 = $153M. MI300X cloud: equivalent capacity at 1.58× throughput/GPU → 633 GPUs × $5.50
    × 8,760 × 5 = $152M — essentially tied. TPU v5e equivalent: 5,000 chips × $1.20 × 8,760 × 5 = $263M
    (requires more chips due to 16GB constraint). Migration cost (if pivot needed at year 3): H100→H200:
    $0 code change. H100→MI300X: 6-12 month eng effort ($2-5M). H100→TPU: 18-24 month rewrite ($10-20M).
    Risk-adjusted TCO: H100 = $153M + low migration risk. TPU = $263M + high lock-in risk. Decision: H100
    primary.'
