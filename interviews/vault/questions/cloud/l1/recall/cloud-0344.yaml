id: cloud-0344
title: 'The TCO Blindspot: Hardware Maintenance'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your team is building a Total Cost of Ownership (TCO) model for a new GPU cluster. Using standard
  industry rules of thumb, what is the approximate *annual maintenance cost* for a single H100 server,
  which has a capital expenditure (CapEx) of about $30,000?
details:
  realistic_solution: The standard industry rule of thumb for annual hardware maintenance is ~5% of the
    initial capital expenditure. This covers part replacements, technician time, and support contracts
    needed to maintain fleet health at scale.
  common_mistake: Engineers often focus only on the initial purchase price (CapEx) and energy costs, completely
    forgetting to budget for ongoing hardware maintenance. They might assume it's negligible or covered
    by a basic warranty, failing to account for the ~5% rule of thumb for enterprise hardware upkeep.
  napkin_math: CapEx = $30,000 | Maintenance Ratio = 5% | Annual Maintenance Cost = $30,000 × 0.05 = $1,500
