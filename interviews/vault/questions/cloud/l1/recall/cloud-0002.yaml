schema_version: 1
id: cloud-0002
title: The KV-Cache Memory Hog
topic: vram-budgeting
status: published
provenance: imported
scenario: An LLM with 80 layers is processing a single inference request with a context (sequence length)
  of 100,000 tokens. Each token's state is represented by Key and Value vectors totaling 32KB per layer.
  What is the approximate VRAM consumed by the KV cache for this single request?
details:
  realistic_solution: 'The KV-cache stores the Key and Value vectors for every token in the sequence at
    every layer of the model. This allows the model to attend to previous tokens without re-computing
    their states.

    The total size is the memory per token per layer, multiplied by the number of layers and the number
    of tokens.'
  common_mistake: A common mistake is an order-of-magnitude error, either by calculating the memory for
    a single layer and forgetting to multiply by the number of layers, or by misplacing the decimal when
    converting from MB to GB. Another error is to calculate the memory for just one token instead of the
    full sequence.
  napkin_math: Memory per token = 32 KB/layer * 80 layers = 2,560 KB (~2.56 MB). For a sequence length
    of 100,000 tokens, the total KV cache size = 2.56 MB/token * 100,000 tokens = 256,000 MB, or roughly
    256 GB. Since an H100 or A100 only has 80 GB of HBM, this single request's KV cache far exceeds the
    capacity of a single GPU, requiring multi-GPU deployment.
