id: cloud-0324
title: The Roofline Litmus Test (cloud-0324)
topic: roofline-analysis
status: draft
provenance: imported
scenario: An H100 GPU has a roofline 'ridge point' of approximately 295 Ops/Byte for FP16 calculations.
  If your model has an arithmetic intensity of 50 Ops/Byte, is its performance primarily limited by the
  GPU's memory bandwidth or its computational throughput?
details:
  realistic_solution: The model is memory-bound. The 'ridge point' is the critical value for arithmetic
    intensity on a given piece of hardware. If a workload's arithmetic intensity is lower than the ridge
    point, it means it performs relatively few operations for each byte of data it reads from memory.
    It cannot fetch data fast enough to keep the powerful compute cores saturated, making memory bandwidth
    the bottleneck.
  common_mistake: Engineers often assume that a powerful GPU like an H100 is always compute-bound because
    of its high TFLOPS rating. They forget that you can't compute on data you can't fetch. A low arithmetic
    intensity means the model isn't reusing data effectively, making it starve the compute units.
  napkin_math: '1. Identify Workload AI: Model Arithmetic Intensity (AI) = 50 Ops/Byte.

    2. Identify Hardware Ridge Point: H100 FP16 Ridge Point = 295 Ops/Byte.

    3. Compare: 50 Ops/Byte < 295 Ops/Byte.

    Because the model performs fewer operations per byte than the hardware requires to saturate compute,
    the GPU''s memory bandwidth (HBM3) will throttle performance. The workload is strictly memory-bound.'
