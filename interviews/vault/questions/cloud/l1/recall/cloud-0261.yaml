id: cloud-0261
title: The H100 Ridge Point
topic: roofline-analysis
status: draft
provenance: imported
scenario: On a roofline plot for an NVIDIA H100 GPU, what does the 'ridge point' represent, and what is
  its approximate value for FP16 operations?
details:
  realistic_solution: The ridge point is the point of minimum arithmetic intensity (the ratio of compute
    operations to data movement) required to achieve the processor's peak computational performance. Below
    this intensity, a workload is memory-bound; above it, it becomes compute-bound.
  common_mistake: Engineers often confuse the ridge point with either the peak computational performance
    (TFLOPS) or the peak memory bandwidth (TB/s). They see it as just another performance number rather
    than the critical ratio that determines the boundary between being memory-bound and compute-bound.
  napkin_math: '1. Ridge Point = Peak Compute / Peak Memory Bandwidth.

    2. For an NVIDIA H100, the peak FP16 Tensor Core throughput is 989 TFLOPS (TeraFLOPs/sec).

    3. The H100''s HBM3 memory bandwidth is 3.35 TB/s (TeraBytes/sec).

    4. Ridge Point = 989 * 10^12 FLOPs / 3.35 * 10^12 Bytes = 295.2 FLOPs/Byte.

    A workload needs > 295.2 operations per byte to be compute-bound.'
