title: The RAG Latency Trap
topic: compound-ai-systems
status: draft
provenance: imported
scenario: You're designing a Retrieval-Augmented Generation (RAG) system for a real-time chatbot. To ground
  the LLM's response, you need to fetch a document chunk. Roughly how much slower is retrieving that chunk
  from a local NVMe SSD compared to fetching it from an in-memory cache stored in HBM?
details:
  realistic_solution: An NVMe SSD read is approximately 333 times slower than an HBM access. This huge
    performance gap is fundamental to ML systems design. For a P99 latency target of 100ms, you cannot
    afford to go to disk. The RAG context must be served from an in-memory system (like Redis or directly
    in HBM/DRAM) to meet the budget.
  common_mistake: Engineers often underestimate the storage hierarchy gap, thinking SSDs are 'fast' and
    maybe only 10-50x slower than HBM. They fail to internalize that for a GPU, any I/O operation that
    leaves the memory subsystem is an eternity, making disk-based lookups totally infeasible for low-latency
    serving without aggressive caching.
