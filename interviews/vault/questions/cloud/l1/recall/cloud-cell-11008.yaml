title: 'Dataset Curation: Mastery — End-to-End Pre-Training Data Strategy for 100B Model'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You are the ML lead responsible for data strategy for a 100B parameter LLM to be trained on
  512 H100s (80GB HBM3, 3.35 TB/s) for 3 months. The model must excel at code, math, and instruction following.
  Design the complete data curation strategy: sourcing, quality filtering, deduplication, mixing, and
  versioning. Quantify every decision.'
details:
  realistic_solution: 'Source: 10T raw tokens (web 70%, code 15%, math 5%, books 7%, instructions 3%).
    Filter: language ID (keep 6 languages) → heuristic (65% pass) → KenLM perplexity < 300 (70% pass)
    → MinHash dedup (75% pass). Final: ~3.4T unique tokens. Chinchilla for 100B model: 2T tokens optimal.
    Mix with quality weighting: code/math 3×. Pipeline must sustain 512 H100s training at 35% MFU.'
  common_mistake: Under-investing in data quality vs model architecture; not versioning datasets; not
    monitoring data pipeline throughput vs training throughput.
  napkin_math: '512 H100s at 35% MFU: 512 × 989 TFLOPS × 0.35 = 177,228.8 TFLOPS. 100B model, 6 FLOPs/token:
    tokens/sec = 177,228.8T / (6 × 100B) = 177,228.8T / 600B = 295,595 tokens/sec. Over 3 months = 90
    days × 86,400s = 7.78M seconds × 295,595 tokens/s = 2.3T tokens. Data pipeline must sustain 295K tokens/sec
    = 1.18MB/s (at 4 bytes/token) — trivially achievable with NFS. Budget: 512 × $3/hr × 2,160hr = $3.32M
    compute.'
