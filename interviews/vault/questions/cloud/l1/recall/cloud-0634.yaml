schema_version: 1
id: cloud-0634
title: The Fragmentation Crisis
topic: vram-budgeting
status: published
provenance: imported
scenario: We are serving a chatbot. Even though we have 40GB of free VRAM, our inference server refuses
  to accept new concurrent requests, citing an 'Out of Memory' error. What is consuming our VRAM invisibly,
  and how do we fix it?
details:
  realistic_solution: KV-Cache memory fragmentation. Standard attention allocates contiguous VRAM for
    the *maximum possible* sequence length of every request. Because actual sequence lengths are unpredictable,
    this wastes 60-80% of memory. You must implement PagedAttention (like vLLM), which maps virtual KV-cache
    blocks to non-contiguous physical blocks, allowing near-zero fragmentation and 2-3x higher batch sizes.
  common_mistake: '"There must be a memory leak in the serving framework." It''s not a leak — it''s by
    design.'
  napkin_math: 'Max sequence = 8192 tokens. Average actual sequence = 500 tokens. Waste per request =
    $(8192 - 500)/8192 = 93.9\%$. With 40 GB free and each max-length reservation taking ~13 GB, you can
    only serve 3 concurrent requests. With PagedAttention, you allocate only what''s used: 3 requests
    × 500 tokens = 1500 tokens worth of cache — leaving room for 20+ more concurrent requests.'
