id: cloud-0257
title: The Energy Cost of Precision
topic: extreme-quantization
status: draft
provenance: imported
scenario: When optimizing a model for energy efficiency on a cloud GPU, you're considering quantizing
  parts of your network from 32-bit floating point (FP32) to 8-bit integer (INT8). Roughly how much more
  energy does a single FP32 compute operation consume compared to a single INT8 operation?
details:
  realistic_solution: An FP32 operation consumes approximately 18 times more energy than an INT8 operation.
    This non-linear relationship is a fundamental principle of digital logic design, where the energy
    cost of arithmetic units like multipliers grows quadratically, not linearly, with the number of bits.
  common_mistake: Engineers often mistakenly assume that energy scales linearly with bit width, leading
    them to believe the cost is 4× (32 bits / 8 bits). They forget that the complexity and energy draw
    of the underlying multiplier circuits do not scale linearly. The energy is dominated by the switching
    activity in the multiplier array, which grows much faster than the bit width.
  napkin_math: '1. Based on silicon physics, an INT8 multiplication or addition takes very little energy.

    2. A single 32-bit floating point (FP32) operation consumes approximately 18 times more energy than
    an 8-bit integer (INT8) operation.

    3. For example, if INT8 takes ~0.1 picojoules (pJ), FP32 will take ~1.8 pJ.

    4. When doing trillions of operations (TFLOPS), this 18x gap dictates energy costs.'
