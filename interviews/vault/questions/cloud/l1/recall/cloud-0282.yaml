id: cloud-0282
title: The Intra-Node Speed Advantage
topic: collective-communication
status: published
provenance: imported
scenario: Identify the approximate latency for a data transfer using NVLink 4.0 within an HGX server,
  compared to a transfer between servers using cross-rack InfiniBand NDR.
details:
  realistic_solution: An NVLink 4.0 transfer has a latency of about 500 ns. A cross-rack InfiniBand NDR
    transfer is roughly 5,000 ns (5 µs). Therefore, the on-node (intra-server) transfer is approximately
    10 times faster from a latency perspective than the inter-server transfer.
  common_mistake: Engineers often underestimate the 'leaving the box' penalty. They might know NVLink
    is faster but assume it's a small difference, like 2-3×. They anchor on PCIe latency (~1,000 ns) and
    incorrectly assume a modern datacenter network is nearly as fast. In reality, the physics of signaling
    across racks, through switches, and via optical cables imposes a significant, order-of-magnitude latency
    penalty compared to the tightly integrated on-board NVLink fabric.
  napkin_math: 'Using the ''1 ns = 1 second'' human-scale analogy: an NVLink transfer takes about 8 minutes
    (500 ns), while a cross-rack InfiniBand trip takes about 1.4 hours (5,000 ns).'
