schema_version: 1
id: cloud-r2-41024
title: TP + Pipeline Parallelism Interaction
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: Design the complete parallelism layout for training a 405B parameter model (126 layers, hidden=16384,
  128 heads) on 128 MI300X GPUs across 16 nodes (8 GPUs each). Specify TP, PP, and DP degrees, justify
  each choice, and estimate the training throughput.
details:
  realistic_solution: 'Model memory: 405B × 16B (AdamW mixed precision) = 6.48 TB. Per-node memory: 8
    × 192 GB = 1.536 TB. Need at least 6.48/1.536 = 5 nodes for parameters alone. Layout: TP=8 (intra-node,
    exploit MI300X Infinity Fabric 400 GB/s), PP=4 (126 layers / 4 = ~32 layers per stage, across 4 nodes),
    DP=4 (4 pipeline replicas across remaining nodes). Total GPUs: 8 × 4 × 4 = 128. Memory per GPU: 405B
    / (8×4) × 16B = 405B/32 × 16B ≈ 202.5 GB. MI300X has 192 GB → tight! Enable ZeRO Stage 1 to partition
    optimizer states across DP=4: optimizer memory per GPU drops from 12.66B × 12B = 152 GB to 152/4 =
    38 GB. Weight + gradient: 12.66B × 4B = 50.6 GB. Total per GPU: 38 + 50.6 = 88.6 GB. Activations +
    KV cache fit in remaining 103.4 GB with activation checkpointing. Throughput estimate: MI300X BF16
    peak ≈ 1.3 PFLOPS. At 45% MFU (realistic with 3D parallelism): 128 × 1300 × 0.45 = 74.9 PFLOPS effective.
    FLOPs per token: 6 × 405B = 2.43 TFLOPS. Tokens per second: 74,900 / 2.43 = 30,823 tokens/s.'
  common_mistake: Using a single parallelism strategy. 405B parameters × 16 bytes (mixed precision training)
    = 6.48 TB — far exceeding any single node's memory. You need all three parallelism dimensions.
  napkin_math: 'TP=8, PP=4, DP=4 = 128 GPUs. Per-GPU params: 405B/32 = 12.66B. With ZeRO-1: 88.6 GB/GPU
    < 192 GB. Throughput: ~31K tokens/s at 45% MFU.'
