id: cloud-cell-13022
title: 'Queueing Theory Mastery: Speculative Decoding Impact on Queue Dynamics'
topic: queueing-theory
status: published
provenance: imported
scenario: 'Analyze how speculative decoding changes the queueing dynamics of an H100 LLaMA-70B inference
  server. Without speculation: μ=10 req/s, exponential service, ρ=0.8. With speculative decoding (draft
  model accepts 4 tokens per verify step): μ increases to 35 req/s with near-deterministic service (CV≈0.2).
  Compare M/M/1 vs M/G/1 results using Pollaczek-Khinchine. What is the P99 improvement?'
details:
  realistic_solution: 'Without speculation: M/M/1, ρ=0.8, μ=10. Wq = 0.8/(10*0.2) = 0.4s. W = 0.4 + 0.1
    = 0.5s. P99 ≈ 4.6 * 0.5 = 2.3s. With speculation: λ same, μ=35, ρ=λ/35. If λ=8 (same as before): ρ=8/35=0.229.
    M/G/1 P-K: Wq = λ*E[S²]/(2(1-ρ)). E[S²] = E[S]²(1+CV²) = (1/35)²*(1+0.04) = 0.000849. Wq = 8*0.000849/(2*0.771)
    = 0.0044s = 4.4ms. W = 4.4ms + 28.6ms = 33ms. P99 ≈ 4.6*33 = 152ms. Improvement: 2300ms → 152ms =
    15x.'
  common_mistake: Applying M/M/1 to speculative decoding workloads without recognizing that speculation
    makes service times more deterministic (lower coefficient of variation), which the P-K formula captures.
  napkin_math: 'Without speculation: μ=10, ρ=0.8, Wq=400ms, W=500ms, P99=2.3s. With speculation: μ=35,
    same λ=8 req/s (ρ=0.229). P-K Wq = 8*(1/35)²*(1.04)/(2*0.771) = 8*0.000849/1.542 = 4.4ms. W=33ms.
    P99=152ms. 15x improvement. Cost: draft model (7B) uses ~14GB extra VRAM on H100 (still fits in 80GB
    alongside 70B at INT4=35GB). Net: +14GB VRAM for 15x latency improvement.'
