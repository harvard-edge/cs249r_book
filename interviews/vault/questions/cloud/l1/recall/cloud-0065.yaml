id: cloud-0065
title: The Cold Start Penalty
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: During a blue-green deployment of a new foundational model, a request is routed to a new server
  instance. The model weights are not yet loaded in the GPU's HBM and must be read from the local NVMe
  SSD. Roughly how much slower is this initial read from the SSD compared to a subsequent read from HBM?
details:
  realistic_solution: An NVMe SSD read takes approximately 100,000 ns, whereas an HBM3 memory access is
    around 300 ns. This results in a latency difference of about 333x. This 'cold start' penalty is why
    techniques like pre-warming caches and keeping models resident in memory are critical for low-latency
    serving systems.
  common_mistake: Engineers often underestimate the massive latency gap between fast storage and high-bandwidth
    memory. While NVMe is fast compared to spinning disks, it is orders of magnitude slower than HBM.
    A common mistake is to think the difference is small, like 10-20x, failing to grasp the physics of
    on-chip vs. off-chip vs. storage access.
  napkin_math: 'HBM3 Access Latency: ~300 ns. NVMe SSD Read Latency: ~100,000 ns. Ratio: 100,000 ns /
    300 ns ≈ 333x. Using the human-scale analogy: if an HBM read took 5 minutes, the ''cold'' read from
    NVMe would take ~1.1 days.'
