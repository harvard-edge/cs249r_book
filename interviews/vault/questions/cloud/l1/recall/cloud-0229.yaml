id: cloud-0229
title: The Batching Dilemma
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: We use static batching for our LLM API. If a request generating 5 tokens is batched with a request
  generating 500 tokens, the 5-token request sits in VRAM until the 500-token request finishes. How do
  we fix this idle capacity?
details:
  realistic_solution: Implement Continuous (or In-Flight) Batching. Instead of waiting for all requests
    in a batch to finish, continuous batching operates at the iteration level. As soon as the 5-token
    request finishes and emits its `<EOS>` token, it is immediately evicted from the batch, and a new
    request from the queue is slotted in for the very next forward pass.
  common_mistake: '"Set a maximum generation length to keep batch members similar." This caps functionality
    and still wastes compute on padding.'
  napkin_math: 'Static batch of 8 requests: shortest = 5 tokens, longest = 500 tokens. Wasted compute
    = 7 requests × (500 - avg_length) × cost_per_token. With continuous batching, the 5-token request
    is done in 5 iterations and replaced — the slot processes ~100 different short requests in the time
    the long request takes, increasing effective throughput by 2-4×.'
