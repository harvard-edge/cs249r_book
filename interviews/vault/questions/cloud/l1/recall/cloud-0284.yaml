title: The TCO Iceberg
topic: tco-cost-modeling
status: draft
provenance: imported
scenario: A team is evaluating the 3-year Total Cost of Ownership (TCO) for a new, large-scale language
  model feature. A junior engineer argues the biggest expense will be the initial multi-million dollar
  purchase of H100s for training. When considering the entire lifecycle of a successful production ML
  system, which component typically dominates the TCO?
details:
  realistic_solution: Inference. For any widely adopted product, the cumulative operational cost of running
    inference servers 24/7 for millions of users over several years almost always outweighs the one-time
    (or periodic) capital expense of training. The sheer volume of inference requests makes it the dominant
    factor in the system's TCO.
  common_mistake: Engineers often fixate on the high, visible upfront cost of training (CapEx). They underestimate
    how the small, recurring cost of inference (OpEx) accumulates to a much larger number over a product's
    multi-year lifecycle, especially with millions of users. The training cluster is just the tip of the
    TCO iceberg.
  napkin_math: Consider a simplified 3-year TCO model.
