id: cloud-0007
title: 'The Network Tax: NVLink vs. InfiniBand'
topic: collective-communication
status: published
provenance: imported
scenario: You are optimizing a large-scale LLM training job. To make informed decisions about your communication
  strategy, you need to know your hardware's limits. Roughly how much slower is a cross-rack data transfer
  using InfiniBand NDR compared to a GPU-to-GPU transfer within the same server using NVLink 4.0?
details:
  realistic_solution: A cross-rack InfiniBand NDR transfer is approximately 10 times slower than an intra-server
    NVLink 4.0 transfer. NVLink latency is ~500 ns, while crossing racks over InfiniBand takes ~5,000
    ns (5 µs). This 'network tax' is a fundamental constraint in distributed systems design and dictates
    choices like communication-avoiding algorithms and network topology-aware scheduling.
  common_mistake: Engineers often conflate different types of interconnects, assuming all 'fast networks'
    are roughly equivalent. They might underestimate the significant latency penalty of leaving the server
    chassis and traversing the data center fabric, assuming it's a minor difference (e.g., 2x) rather
    than an order-of-magnitude jump.
