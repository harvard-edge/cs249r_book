id: cloud-0074
title: The 7B Model Memory Footprint
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: You're tasked with deploying a 7-billion parameter language model for a new Retrieval-Augmented
  Generation (RAG) feature. Before considering orchestration or the KV cache, what is the absolute minimum
  GPU memory required just to load the model's weights for inference using half-precision (FP16)?
details:
  realistic_solution: The standard rule of thumb for FP16 inference is that each parameter requires 2
    bytes of memory. Therefore, a 7-billion parameter model requires 14 billion bytes, or 14 GB of GPU
    memory, just to hold the weights. This is a baseline before accounting for activations or the KV cache.
  common_mistake: Engineers often confuse the memory requirements for inference with those for training,
    which are much larger (e.g., 16 bytes/param with the Adam optimizer). Another common mistake is using
    the wrong number of bytes for a given precision, such as assuming 1 byte/param (for INT8) or 4 bytes/param
    (for FP32) when FP16 is specified.
  napkin_math: 'The model contains 7 billion parameters. In half-precision (FP16), each parameter occupies
    2 bytes of memory. Minimum weight memory = 7,000,000,000 parameters * 2 bytes/parameter = 14,000,000,000
    bytes. Converting to gigabytes: 14 GB. This fits comfortably on a 16GB T4 GPU, leaving 2GB for limited
    KV cache and activations.'
