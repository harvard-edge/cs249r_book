id: cloud-0010
title: The Geographic Skew Tax
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'You''re debugging a production model and suspect training-serving skew. Your offline training
  pipeline pulls raw logs from a cheap archival storage system located in a different country, while your
  online serving system uses a feature store running on local NVMe SSDs. To quantify the data access bottleneck,
  state the approximate latency difference: how much slower is a single read from the cross-country archive
  compared to the local SSD?'
details:
  realistic_solution: A read from the cross-country archive is approximately 400 times slower. A cross-country
    fiber round-trip takes about 40ms, while a local NVMe SSD read is about 100µs. The difference is a
    factor of 400, highlighting a massive potential source of training-serving skew if data preprocessing
    differs.
  common_mistake: Engineers often underestimate the speed-of-light penalty for wide-area networks (WANs).
    They might intuitively guess it's 10-50x slower, failing to realize that a cross-country round trip
    is hundreds of times slower than even 'slow' local storage like SSDs.
  napkin_math: Cross-country Fiber RTT ≈ 40,000,000 ns
