id: cloud-0820
title: The Tokenizer Throughput Ceiling
topic: mlops-lifecycle
status: published
provenance: imported
scenario: You are profiling an LLM training pipeline on an H100. The GPU utilization is only 40%. A colleague
  suggests the tokenizer running on CPU might be the bottleneck. Roughly how many tokens per second must
  the CPU tokenizer produce to keep an H100 busy on a 7B model?
details:
  realistic_solution: Approximately 70,000 tokens/sec. A 7B model requires ~14 GFLOPS per token (2 * 7B
    FLOPs). The H100 delivers 989 TFLOPS FP16, so it can theoretically process 989e12 / 14e9 ~ 70,000
    tokens/sec. The CPU tokenizer must match this rate.
  common_mistake: Assuming the tokenizer is always fast enough because 'it is just string processing.'
    In reality, the H100 can consume tokens at enormous rates, and a single-threaded Python tokenizer
    can easily fall behind.
  napkin_math: FLOPs per token = 2 * 7B = 14 GFLOPS. H100 peak = 989 TFLOPS. Max throughput = 989e12 /
    14e9 ~ 70,600 tokens/sec.
