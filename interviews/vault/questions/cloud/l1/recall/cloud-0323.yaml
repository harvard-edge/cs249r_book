schema_version: 1
id: cloud-0323
title: The Datacenter Cooling Tax (PUE)
topic: power-budgeting
status: published
provenance: imported
scenario: Your team is deploying a new cluster of H100s in a state-of-the-art, liquid-cooled datacenter.
  The facility manager quotes you a Power Usage Effectiveness (PUE) for the new racks. What is a realistic
  PUE value for such a facility, and what does it physically represent?
details:
  realistic_solution: A realistic PUE for a modern, liquid-cooled AI datacenter is between 1.06 and 1.2.
    A value of ~1.1 is a good rule of thumb. This number represents the ratio of total facility power
    to the power delivered to the IT equipment. A PUE of 1.1 means that for every 1 Watt consumed by a
    GPU, an additional 0.1 Watts is consumed by the cooling infrastructure (pumps, chillers) and other
    overhead like power distribution losses.
  common_mistake: Engineers often confuse modern PUE with legacy values. A decade ago, PUEs of 1.5-2.0
    in air-cooled datacenters were common, meaning 50-100% of the IT power was wasted on overhead. Others
    assume it's nearly 1.0, ignoring the second-law of thermodynamics and the real-world costs of moving
    heat.
  napkin_math: A single AI rack can draw 70 kW of power. With a PUE of 1.1, the total power drawn from
    the grid is not 70 kW, but `70 kW * 1.1 = 77 kW`. That extra 7 kW is the 'cooling tax' required to
    keep the hardware from melting. For a 10,000 GPU cluster, where each GPU consumes 700W, the IT load
    is `10,000 * 700W = 7 MW`. The total facility load is `7 MW * 1.1 = 7.7 MW`. The cooling overhead
    alone is 700 kW, enough to power hundreds of homes.
