id: cloud-fill-00365
title: Optimizing Batching Strategies for LLM Inference on Google TPU v5e
topic: batching-strategies
status: published
provenance: imported
scenario: You are deploying a large language model (LLM) for real-time inference on a Google TPU v5e with
  16 GB HBM2e memory (819.2 GB/s bandwidth) and 197 TFLOPS BF16 peak compute. The model has varying input
  sequence lengths and a strict P99 latency requirement of 100ms. You need to design an optimal batching
  strategy to maximize throughput while staying within the latency constraints. Discuss the trade-offs
  between static, dynamic, and continuous batching in this specific hardware context.
details:
  realistic_solution: A realistic solution would involve a hybrid approach, potentially starting with
    dynamic batching to group similar-length sequences, coupled with continuous batching for the most
    latency-sensitive requests. For the TPU v5e, optimizing for memory bandwidth (819.2 GB/s) and BF16
    compute (197 TFLOPS) is critical. Implement a custom scheduler that monitors current TPU utilization
    and incoming request queue characteristics (e.g., average sequence length, P99 latency) to dynamically
    adjust batching aggressiveness. Leverage padding efficiently, perhaps by quantizing sequence lengths
    into a few bins, to minimize wasted compute from padding. Consider using techniques like speculative
    decoding or attention caching within the continuous batching framework to further reduce effective
    latency and increase throughput. Profile memory usage carefully to ensure the 16 GB HBM2e is not oversubscribed,
    especially with larger effective batch sizes.
  common_mistake: A common mistake is applying a fixed static batch size without considering the highly
    variable nature of LLM input sequence lengths, leading to underutilization of the TPU for short sequences
    or tail latency spikes for long sequences due to insufficient memory or compute capacity for larger
    batches. Another mistake is ignoring the overheads associated with dynamic batching (e.g., batch creation,
    padded tensor transfers) or continuous batching (e.g., complex scheduling, memory fragmentation) and
    assuming they are negligible.
  napkin_math: "Given the 197 TFLOPS (BF16) peak compute and 16 GB HBM2e with 819.2 GB/s bandwidth: \n\
    1. **Compute-bound vs. Memory-bound:** For a BF16 LLM, a single matrix multiplication (NxK * KxM)\
    \ involves 2*N*K*M FLOPs. Estimate the FLOPs per token generated/processed by your LLM. If the model\
    \ is large (e.g., hundreds of billions of parameters), it's likely memory-bound during weight loading/attention,\
    \ especially for inference. Calculate the ratio of FLOPs to bytes accessed for your model to determine\
    \ the limiting factor.\n2. **Effective Throughput:** If a single token generation takes `T_op` (FLOPs)\
    \ and your TPU has `C` (TFLOPS) compute, ideal tokens/second = `C / T_op`. If memory bandwidth `B`\
    \ (GB/s) is the bottleneck and `M_bytes` is memory accessed per token, ideal tokens/second = `B /\
    \ M_bytes`. Your actual throughput will be limited by the minimum of these.\n3. **Batch Size vs. Latency:**\
    \ For a P99 latency of 100ms, your model must process a batch within this time. If processing a single\
    \ token takes `t` ms, and you process `L` tokens in a sequence, a batch of `B` requests takes `L *\
    \ t / B` time for the compute part. Account for data transfer and overheads. This demonstrates the\
    \ trade-off: larger `B` increases throughput but can increase `t` due to memory contention and also\
    \ tail latency if not handled correctly (e.g. if one request in the batch is much longer than others).\n\
    4. **Memory Capacity:** 16 GB HBM2e must hold model weights, activations, and KV cache for the entire\
    \ batch. Estimate memory usage per token/layer/head to determine the maximum feasible batch size for\
    \ a given sequence length."
