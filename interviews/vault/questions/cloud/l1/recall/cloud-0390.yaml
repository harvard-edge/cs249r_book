title: The Hidden Cost of Hardware
topic: tco-cost-modeling
status: published
provenance: imported
scenario: When calculating the Total Cost of Ownership (TCO) for a large GPU cluster, beyond the initial
  capital expenditure, we must account for operational costs like maintenance. Based on industry rules
  of thumb, what is the approximate annual maintenance cost for a single H100 server GPU?
details:
  realistic_solution: The correct answer is approximately $1,500. A standard rule of thumb for hardware
    is that annual maintenance costs are around 5% of the initial capital expenditure. Given an H100 GPU's
    cost of about $30,000, the maintenance is 5% of that.
  common_mistake: Engineers often focus solely on the initial purchase price (CapEx) of hardware and neglect
    the significant ongoing operational costs (OpEx). They might assume maintenance is a negligible cost
    (less than 1%) or confuse it with much larger expenses like power or facility overhead.
  napkin_math: H100 CapEx ≈ $30,000 | Annual Maintenance Ratio ≈ 5% | Annual Cost = $30,000 × 0.05 = $1,500
