title: The On-Node Interconnect Ladder
topic: collective-communication
status: published
provenance: imported
scenario: 'When analyzing a performance trace on a modern multi-GPU server, you notice two distinct latency
  buckets for data transfers between components: one taking approximately 500 nanoseconds and another
  taking approximately 1,000 nanoseconds (1 microsecond). Which interconnects most likely correspond to
  these two latencies?'
details:
  realistic_solution: The ~500 ns latency corresponds to an NVLink 4.0 transfer. This is the specialized,
    high-bandwidth, low-latency interconnect for direct GPU-to-GPU communication within a server, like
    on an NVIDIA HGX baseboard. The ~1,000 ns (1 µs) latency corresponds to a transfer over the PCIe Gen5
    bus, which connects GPUs to the CPU or to other peripherals. The 2x latency penalty for using PCIe
    is a critical factor in system topology design.
  common_mistake: 'A common mistake is to assume all on-server interconnects are roughly equivalent in
    performance or to confuse their roles. Some engineers might incorrectly guess PCIe is faster due to
    its ubiquity, or misremember the magnitude of the difference, thinking it''s 10x or more. They are
    fundamentally different: NVLink is a specialized GPU-to-GPU interconnect, while PCIe is a general-purpose
    bus.'
  napkin_math: 'The numbers are recalled directly from the ''ML Latency Hierarchy''. NVLink 4.0 latency
    is ~500 ns, while PCIe Gen5 is ~1,000 ns. This represents a 2x latency difference. Using the human-scale
    analogy where 1 ns = 1 second: an L1 cache access is 1 second, an NVLink transfer takes ~8 minutes,
    and a PCIe transfer takes ~16 minutes. A trip across the country via InfiniBand would take 1.4 hours
    in comparison.'
