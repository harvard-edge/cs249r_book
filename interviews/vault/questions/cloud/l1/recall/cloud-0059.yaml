id: cloud-0059
title: The Basic Inference Memory Footprint
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're scoping the GPU requirements for a new RAG-based chatbot service. The core of the service
  uses a 7-billion parameter Llama model for generation. Before even considering the KV cache or the retrieval
  index, what is the minimum memory required just to load the model's weights for inference using FP16
  precision?
details:
  realistic_solution: The correct answer is approximately 14 GB. A 7-billion parameter model has 7e9 parameters.
    In FP16 (half-precision floating point), each parameter requires 2 bytes of storage. Therefore, the
    total memory for the weights is 7 billion × 2 bytes, which is 14 billion bytes or 14 GB.
  common_mistake: Engineers often confuse the memory requirements for *training* with those for *inference*.
    Training memory is dominated by optimizer states (like Adam), which can require 16 bytes or more per
    parameter. Another common mistake is to assume a more aggressive quantization (like INT8) by default,
    which would halve the requirement.
  napkin_math: 7B params × 2 bytes/param (for FP16) = 14 GB
