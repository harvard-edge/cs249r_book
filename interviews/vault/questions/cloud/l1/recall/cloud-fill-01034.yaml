id: cloud-fill-01034
title: Optimizing Large Language Model Pipeline Parallelism on AMD MI300X
topic: pipeline-parallelism
status: published
provenance: imported
scenario: 'You are tasked with deploying an extremely large language model (LLM) with 500 billion FP16
  parameters for real-time inference in a cloud environment. The chosen hardware platform is a cluster
  of AMD MI300X accelerators. Each MI300X features 192 GB HBM3, delivers 1,307 TFLOPS FP16 sparse performance,
  and boasts 5.3 TB/s memory bandwidth. Due to the LLM''s immense size, it must be distributed across
  multiple MI300X devices using pipeline parallelism.


  Your current baseline implementation uses a naive pipeline setup with a micro-batch size of 1. This
  configuration results in substantial pipeline bubble overhead, leading to unacceptably high end-to-end
  inference latency and low device utilization.


  Design an optimized pipeline parallelism strategy for this LLM on the AMD MI300X cluster. Detail how
  you would effectively mitigate bubble overhead, improve overall throughput, and reduce inference latency.
  Your design should specifically leverage the hardware capabilities (192 GB HBM3 capacity, 1,307 TFLOPS
  FP16 sparse, 5.3 TB/s memory bandwidth) of the MI300X. Propose an interleaved schedule for the pipeline
  and discuss the critical trade-offs involved in selecting an optimal micro-batch size and intelligently
  partitioning the model stages across the available devices.'
details:
  realistic_solution: A realistic solution involves implementing an interleaved pipeline schedule (e.g.,
    a variant of GPipe or PipeDream) with a carefully selected micro-batch size greater than 1. The micro-batch
    size should be optimized to balance latency requirements with pipeline efficiency, ideally being significantly
    larger than the number of pipeline stages. The model should be partitioned across MI300X devices such
    that both computational load and memory transfer requirements (especially for intermediate activations)
    are balanced. Leveraging the 192 GB HBM3 for large activation storage and the 5.3 TB/s bandwidth for
    rapid tensor communication between stages, coupled with asynchronous communication, will help hide
    latency and maximize throughput.
  common_mistake: A common mistake is assuming that a micro-batch size of 1 is optimal for inference latency
    or failing to recognize how it severely exacerbates pipeline bubble overhead. Additionally, not carefully
    considering the activation memory footprint vs. recomputation cost for intermediate tensors across
    pipeline stages can lead to OOM errors or unnecessary recomputations, negating potential gains.
  napkin_math: '1. Model Weights: 500 billion FP16 parameters * 2 bytes/parameter = 1 TB. Each MI300X
    has 192 GB HBM3, so at least ceil(1000 GB / 192 GB/device) = 6 MI300X devices are needed just for
    model weights.

    2. Pipeline Efficiency: For P stages and micro-batch size M, the ideal efficiency is M / (M + P -
    1). If P=6 and M=1, efficiency is 1/(1+6-1) = 1/6 (16.7%). If M=16, efficiency is 16/(16+6-1) = 16/21
    (76%).

    3. Memory Transfer Latency: Assume an intermediate activation tensor is 10 GB. Transfer time via NVLink/Infinity
    Fabric inter-GPU links: 10 GB / 5300 GB/s (HBM3 bandwidth as upper bound) ≈ 1.88 milliseconds. Actual
    inter-node transfer over Infinity Fabric or network would be slower. This needs to be compared against
    the compute time of a stage to ensure transfers don''t become the bottleneck. The MI300X''s 1,307
    TFLOPS FP16 sparse ensures each pipeline stage has ample compute capacity.'
