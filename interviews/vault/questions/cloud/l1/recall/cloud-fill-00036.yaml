id: cloud-fill-00036
title: Optimizing Large Language Model Inference on NVIDIA H100 for High-Throughput
topic: gpu-compute-architecture
status: published
provenance: imported
scenario: 'You are leading the deployment of a new large language model (LLM) for real-time inference,
  targeting high throughput on a single NVIDIA H100 GPU. The model, with 60 GB of parameters, primarily
  relies on FP16 matrix multiplications. Initial benchmarks show suboptimal performance and low GPU utilization.
  Given the NVIDIA H100''s specifications (80 GB HBM3, 989 TFLOPS FP16 dense, 3.35 TB/s memory bandwidth,
  700W TDP), detail your strategy to analyze and optimize the LLM inference kernel. Specifically, address
  how you would:

  1.  Maximize GPU occupancy and justify your approach with respect to warps and thread blocks.

  2.  Effectively leverage Tensor Cores for FP16 operations.

  3.  Ensure optimal memory coalescing for global memory accesses to utilize the HBM3 bandwidth efficiently.

  4.  Discuss the trade-offs and interplay between these optimization techniques and their impact on overall
  inference throughput and latency.'
details:
  realistic_solution: A realistic approach involves a systematic profiling workflow. First, use NVIDIA
    Nsight Systems or Nsight Compute to identify bottlenecks (e.g., compute-bound vs. memory-bound). For
    occupancy, experiment with thread block sizes that are multiples of 32 (warp size), considering shared
    memory usage and register pressure to keep multiple warps active per SM. To leverage Tensor Cores,
    ensure matrix multiplication kernels are implemented using `__half` or `__nv_bfloat16` data types
    and utilize `nvcuda::wmma` API or cuBLAS/cuDNN for fused multiply-add operations. Memory coalescing
    requires structuring data such that threads within a warp access contiguous memory locations from
    global memory. This often involves row-major access for column-major data or vice-versa, or using
    shared memory as a cache to stage global memory reads into coalesced patterns, significantly improving
    the effective 3.35 TB/s HBM3 bandwidth.
  common_mistake: Candidates often fail to connect theoretical concepts like warps and thread blocks to
    practical occupancy optimizations, leading to underutilized Streaming Multiprocessors (SMs). A frequent
    pitfall is neglecting to align FP16 operations to Tensor Core requirements, defaulting to CUDA Cores
    and losing significant throughput. Additionally, many overlook memory access patterns, resulting in
    uncoalesced global memory reads/writes that drastically reduce effective HBM3 bandwidth, despite the
    H100's high peak bandwidth.
  napkin_math: '1. **Memory Bandwidth Limit**: If an inference pass requires loading 60 GB of weights,
    the theoretical minimum time just for data transfer (ignoring compute and data reuse) on H100''s 3.35
    TB/s bandwidth is `60 GB / 3.35 TB/s = 60 / 3350 seconds ≈ 17.9 ms`. Poor coalescing can make this
    5-10x worse.

    2. **Tensor Core Throughput**: H100 provides 989 TFLOPS FP16 dense via Tensor Cores. If an LLM''s
    core FP16 matrix multiplication performs `2 * 4096^3` operations (e.g., for a 4096x4096 GEMM), the
    theoretical compute time is `2 * 4096^3 / (989 * 10^12) seconds ≈ 0.139 ms`.

    3. **Occupancy vs. Performance**: If actual occupancy is only 30% due to inefficient kernel launch
    configuration or excessive register usage, the effective TFLOPS achieved will be a fraction of the
    peak, directly impacting the throughput. A simple calculation: 30% of 989 TFLOPS is ~296.7 TFLOPS,
    significantly slowing down compute-bound kernels.'
