id: cloud-0048
title: The RAG Retrieval Bottleneck
topic: compound-ai-systems
status: published
provenance: imported
scenario: You are debugging a new RAG-powered chatbot in a cloud environment. The application retrieves
  context documents from a vector database running on a server with NVMe SSDs in the same datacenter rack
  before passing the context to an LLM. A user complains about high response latency. Identify the most
  likely source of this latency from the options below.
details:
  realistic_solution: The retrieval step involving the NVMe SSD read is the dominant source of latency.
    The ML Latency Hierarchy shows that while HBM access for the model is in the hundreds of nanoseconds,
    an NVMe read is in the hundreds of *microseconds*—a nearly 1000x difference that overshadows the rest
    of the pipeline.
  common_mistake: Engineers, especially those new to systems design, often assume the LLM inference itself
    is the bottleneck due to its massive parameter count. They underestimate the profound latency cost
    of I/O operations, even with fast storage like NVMe SSDs, compared to the speed of on-chip and HBM
    memory access.
  napkin_math: Let's compare the numbers from the hierarchy. An HBM3 memory access for the LLM is ~300
    ns. A cross-rack InfiniBand hop to the database server is ~5,000 ns. A single NVMe SSD read is ~100,000
    ns. Therefore, the SSD read is **~20x slower** than the network transfer and **~333x slower** than
    a memory access for the model's weights. The I/O for retrieval is the clear bottleneck.
