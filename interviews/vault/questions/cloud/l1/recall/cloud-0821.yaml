id: cloud-0821
title: The PCIe Transfer Bottleneck
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are training an image classification model with batch size 2048. Each image is 224x224x3
  in FP32. How long does it take to transfer a single batch from CPU to GPU over PCIe Gen5 x16 (64 GB/s
  unidirectional)?
details:
  realistic_solution: 'About 19 ms. Each image is 224 * 224 * 3 * 4 = 12 bytes (~0.6 MB). A batch of 2048
    images = 2048 * 0.6 MB = 1.23 GB. Over 64 GB/s PCIe: 1.23 / 64 = 19.2 ms. This is fast enough for
    most training loops but must be overlapped with compute.'
  common_mistake: Not computing the actual batch size in bytes. Candidates often guess 'milliseconds'
    without doing the math, or forget that FP32 means 4 bytes per value.
  napkin_math: Image = 224 * 224 * 3 * 4 bytes = 0.6 MB. Batch = 2048 * 0.6 MB = 1.23 GB. Transfer time
    = 1.23 GB / 64 GB/s = 19.3 ms.
