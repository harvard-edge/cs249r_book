title: The CapEx Baseline
topic: tco-cost-modeling
status: published
provenance: imported
scenario: When planning a new large-scale training cluster, your first step is to estimate the capital
  expenditure (CapEx). What is the approximate unit cost for a single NVIDIA H100 GPU, which forms the
  baseline for your Total Cost of Ownership (TCO) calculation?
details:
  realistic_solution: The correct answer is ~$30,000. This is the foundational unit cost for datacenter
    GPUs like the H100. While prices fluctuate with market conditions, this is the correct order of magnitude
    for budgeting and TCO analysis.
  common_mistake: Engineers often anchor on consumer-grade GPU prices (e.g., $2,000-$5,000), drastically
    underestimating the cost of enterprise-grade hardware. They fail to account for the premium on performance,
    massive HBM memory, reliability, and interconnects required for large-scale AI.
  napkin_math: A single NVIDIA H100 80GB GPU generally costs between $25,000 and $30,000 depending on
    volume and vendor. For an 8-GPU HGX baseboard, the total CapEx is roughly 8 * $30,000 = $240,000,
    excluding the host CPUs, RAM, networking (InfiniBand NDR), and storage. This $30k figure is the foundational
    multiplier for all modern AI cluster TCO calculations.
