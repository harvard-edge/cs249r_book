schema_version: 1
id: cloud-r2-43013
title: Feature Store Migration from Monolith
topic: feature-store-management
status: published
provenance: imported
scenario: Your company's ML features are scattered across 15 microservices, each computing features in
  application code at serving time. This causes inconsistent feature definitions (3 services compute 'user_age'
  differently), no feature reuse, and 200ms+ latency from cascading service calls. You're tasked with
  migrating to a centralized feature store serving 50 models. How do you execute this migration without
  disrupting production?
details:
  realistic_solution: 'Strangler fig pattern applied to feature infrastructure. Phase 1 (weeks 1-4): Deploy
    feature store infrastructure (Feast + Redis + S3) alongside existing services. Identify the top 5
    highest-value features used by the most models. Implement shadow mode — feature store computes and
    logs values but doesn''t serve. Validate against existing service outputs. Phase 2 (weeks 5-12): Migrate
    5 features to live serving. Each model team adds a feature store client alongside their existing code,
    with a feature flag to switch between sources. Run A/B: old path vs feature store path. Phase 3 (weeks
    13-26): Scale to 50 features, then 200, then full catalog. Decommission service-computed features
    only after all consumers migrate. Phase 4 (ongoing): Enforce governance — new features must go through
    the feature store. Canonical definitions prevent the ''user_age computed 3 ways'' problem.'
  common_mistake: Big-bang migration — building the entire feature store, then switching all 50 models
    at once. This is high-risk, takes months before any value is delivered, and any bug affects all models
    simultaneously.
  napkin_math: 'Current: 15 services × 200ms cascading calls = 200ms feature latency. Feature store: 1
    MGET to Redis = 3ms. Latency improvement: 66×. Engineering effort: 2 engineers × 26 weeks = 52 person-weeks.
    Revenue impact of 200ms → 3ms latency improvement (e-commerce): ~1-2% conversion lift × $10M/month
    = $100-200K/month. Payback period: 52 weeks × $3K/week engineering cost = $156K, vs. $100K+/month
    revenue lift. ROI positive in month 2.'
