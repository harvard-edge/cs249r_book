id: cloud-0008
title: The Speed of Light Constraint in RAG
topic: compound-ai-systems
status: published
provenance: imported
scenario: You're designing a Retrieval-Augmented Generation (RAG) system. The core LLM is in a datacenter
  in Virginia, but to satisfy data residency requirements, the vector database for European users is hosted
  in a datacenter in Ireland. Ignoring all other sources of latency (compute, disk I/O, queuing), what
  is the approximate, physics-imposed round-trip time (RTT) for a single document retrieval across the
  Atlantic?
details:
  realistic_solution: The absolute minimum round-trip latency is dictated by the speed of light through
    fiber optic cables. A trip across the US is roughly 40ms, and across the Atlantic is similar or slightly
    longer. The closest order-of-magnitude answer is ~40ms. This is a hard physical floor on performance
    for any synchronous, cross-continental operation.
  common_mistake: Engineers often confuse inter-rack latency (microseconds) with cross-continental latency
    (tens of milliseconds). They dramatically underestimate the non-optimizable delay imposed by the speed
    of light in fiber, assuming it's a few milliseconds at most.
  napkin_math: From the 'ML Latency Hierarchy' numbers, a cross-country fiber round trip in the US is
    ~40,000,000 ns (40 ms).
