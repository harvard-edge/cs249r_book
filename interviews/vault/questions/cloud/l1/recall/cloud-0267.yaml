id: cloud-0267
title: The Chinchilla Data-Compute Ratio
topic: attention-scaling
status: published
provenance: imported
scenario: You're planning a training run for a new 70-billion-parameter LLM. To ensure you're not compute-or-data-limited,
  you recall the Chinchilla scaling laws. State the approximate number of training tokens required for
  a model of this size.
details:
  realistic_solution: According to the Chinchilla scaling law, the optimal number of training tokens (D)
    is approximately 20 times the number of model parameters (P). For a 70B parameter model, this is 1.4
    Trillion tokens.
  common_mistake: A common mistake is to assume a 1:1 relationship between parameters and tokens (e.g.,
    70B parameters need 70B tokens), or to misremember the scaling constant by an order of magnitude.
    The Chinchilla paper established that for optimal training, data should scale linearly with model
    size, but with a specific constant (~20) that is larger than 1.
  napkin_math: 'Parameters (P) = 70B | Optimal Tokens (D) ≈ 20 × P | D ≈ 20 × 70,000,000,000 = 1,400,000,000,000
    | **Result: ~1.4 Trillion tokens**'
