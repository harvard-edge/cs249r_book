id: cloud-0286
title: The Roofline Litmus Test
topic: roofline-analysis
status: published
provenance: imported
scenario: When analyzing a new model's performance on a GPU like the H100, what is the single most important
  metric you would calculate to determine if the workload is likely to be compute-bound or memory-bound?
details:
  realistic_solution: The key metric is **Arithmetic Intensity (AI)**, which is the ratio of floating-point
    operations (FLOPs) to bytes of data moved from memory. If a workload's AI is greater than the GPU's
    'ridge point' (Peak TFLOPS / Memory Bandwidth), it is compute-bound. If the AI is lower, it is memory-bound,
    meaning performance is limited by how fast data can be fed to the compute units, not by the speed
    of the compute units themselves.
  common_mistake: Engineers often conflate the sheer size of a model (parameter count) or its peak theoretical
    throughput (TFLOPS) with its performance character. They assume 'bigger model means compute-bound.'
    However, the actual bottleneck is determined by the ratio of computation to memory access, not the
    absolute value of either.
  napkin_math: An H100 has a peak FP16 performance of 989 TFLOPS and HBM3 bandwidth of 3.35 TB/s. Its
    ridge point is `989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte`. A workload like BERT-Large inference at
    batch size 1 might have an AI of ~40 FLOPs/Byte. Since `40 < 295`, it's memory-bound. A large matrix
    multiply within a different model might have an AI of 400 FLOPs/Byte. Since `400 > 295`, it's compute-bound.
