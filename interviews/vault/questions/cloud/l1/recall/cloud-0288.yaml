id: cloud-0288
title: The Quantization Memory Dividend
topic: quantization-fundamentals
status: published
provenance: imported
scenario: A large language model is stored in FP16 format. To reduce its memory footprint for inference,
  you are considering quantizing the model weights to INT8. State the approximate reduction factor in
  memory usage for the model's weights after this quantization.
details:
  realistic_solution: The reduction factor is exactly 2x. FP16 (half-precision floating-point) uses 16
    bits, or 2 bytes, to store each parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte. By changing
    the data type from FP16 to INT8, you halve the storage requirement for each parameter.
  common_mistake: Engineers often confuse the memory reduction ratios between different formats. A common
    error is to mistake the FP16-to-INT8 reduction with the FP32-to-INT8 reduction (which is 4x) or to
    simply underestimate the savings, not realizing it's a direct consequence of the data type's byte
    size.
  napkin_math: 'Given a 7B parameter model: | FP16 memory: 7,000,000,000 params × 2 bytes/param = 14 GB
    | INT8 memory: 7,000,000,000 params × 1 byte/param = 7 GB | Reduction Factor = 14 GB / 7 GB = 2x'
