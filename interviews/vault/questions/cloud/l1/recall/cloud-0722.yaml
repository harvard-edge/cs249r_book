id: cloud-0722
title: The ZeRO-3 Cross-Node Thrashing
topic: 3d-parallelism
status: published
provenance: imported
scenario: You are training a 500B model using DeepSpeed ZeRO-3 across 256 GPUs. ZeRO-3 shards all parameters
  across all GPUs. The training speed is acceptable. However, when you increase the batch size slightly
  to improve utilization, the training time per step skyrockets by 500%. You haven't run out of memory
  (OOM). Why did a slight batch size increase destroy the network?
details:
  realistic_solution: The batch size increase exhausted the GPU's spare memory that ZeRO-3 uses for weight
    prefetching. ZeRO-3 shards all parameters across 256 GPUs, so each GPU stores only 4GB of weights
    but needs the full ~15GB per layer during compute. ZeRO-3 hides this by prefetching the next layer's
    weights via AllGather while computing the current layer. A larger batch size increases activation
    memory, squeezing out the prefetch buffer. Without prefetch overlap, each layer must wait for a full
    AllGather (300ms at 50 GB/s for 15GB), and with 80+ layers, the GPU spends most of its time idle waiting
    for network transfers — a 500% slowdown.
  common_mistake: '"Larger batches take longer to compute." Compute scales linearly. A 500% spike implies
    a phase transition from compute-bound to network-bound.'
  napkin_math: 500B model = 1TB FP16 weights. Sharded over 256 GPUs = 4 GB of weights stored per GPU.
    However, to compute Layer N, the GPU needs the full 15 GB weight matrix for that specific layer. If
    the network bandwidth is 50 GB/s, fetching the layer takes 300ms. If compute takes 200ms, and you
    don't have RAM to prefetch, the GPU spends 100ms completely idle per layer.
