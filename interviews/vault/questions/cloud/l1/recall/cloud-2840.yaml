scenario: Graph optimization passes happen under the hood when a model is exported. Recall the concept
  of Constant Folding and how it simplifies the computational graph before inference.
details:
  realistic_solution: Constant Folding is a compiler optimization technique where expressions that contain
    only constant values are evaluated exactly once at compile-time rather than at runtime. If certain
    graph nodes represent fixed transformations (like scaling by a fixed hyperparameter), the compiler
    computes the result upfront and replaces the subgraph with a single constant tensor.
  common_mistake: Confusing constant folding with operator fusion or assuming it updates the learned weights
    during backpropagation.
  napkin_math: If a graph contains a step `X = Y + (A * B)` where A and B are fixed 1MB tensors, computing
    `A * B` dynamically on a V100 costs ~1ms. Constant folding computes it during compilation, saving
    1ms on every single request.
