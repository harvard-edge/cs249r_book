id: cloud-0631
title: The Disaggregated Memory Architecture
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: 'Your company is evaluating CXL-attached memory pools for ML inference. The pitch: ''Expand
  GPU-accessible memory to terabytes at DRAM cost.'' CXL 2.0 memory has ~200ns access latency vs HBM''s
  ~50ns and local DDR5''s ~100ns. For which ML workloads does CXL memory make sense, and for which is
  it a trap?'
details:
  realistic_solution: 'CXL memory makes sense for capacity-bound workloads with low bandwidth requirements:
    embedding tables for recommendation models (terabytes of parameters, sparse random access), KV-cache
    overflow for long-context LLM serving (sequential writes, infrequent reads), and model weight storage
    for rarely-accessed experts in MoE models. CXL is a trap for bandwidth-bound workloads: LLM decode
    (needs maximum streaming bandwidth), training (activations streamed at full speed), and any workload
    where the memory bus is the bottleneck.'
  common_mistake: '"200ns is close enough to 100ns DRAM — CXL memory is basically the same as local RAM."
    This ignores how latency compounds in bandwidth-sensitive workloads and the difference between latency
    and throughput.'
  napkin_math: 'CXL 2.0 bandwidth per link: ~64 GB/s (PCIe 5.0 x16). HBM3 on H100: 3,350 GB/s. Ratio:
    CXL is 52× slower in bandwidth. For embedding lookup (recommendation model): 1000 lookups/batch ×
    128-dim × 4 bytes = 512 KB per batch. At 64 GB/s: $0.5\text{ MB} / 64\text{ GB/s} = 8\mu s$ — acceptable
    for a 10ms inference budget. For LLM decode (7B model): must stream 14 GB of weights per token. At
    64 GB/s: $14 / 64 = 219\text{ ms}$ per token — catastrophic (HBM does it in $14 / 3350 = 4.2\text{
    ms}$). CXL makes the decode 52× slower. For KV-cache overflow: writing 819 KB per token at 64 GB/s
    = $13\mu s$ — fine for prefill, where you generate many tokens in parallel and the write is amortized.'
