id: cloud-0300
title: The 7B Inference Memory Check
topic: activation-memory
status: published
provenance: imported
scenario: You're planning the deployment of a 7-billion parameter LLM for a new RAG feature. As a first
  step, you need to select a GPU. What is the minimum VRAM required to simply load the model's weights
  in FP16 precision?
details:
  realistic_solution: Approximately 14 GB. Each parameter in FP16 (half-precision floating-point) requires
    2 bytes of storage. This is the baseline just for the model weights; a production deployment would
    also need to account for the KV cache, operating system overhead, and the CUDA runtime.
  common_mistake: Confusing the memory requirements for inference with those for training. Training with
    an optimizer like Adam requires storing gradients and optimizer states, leading to a much larger memory
    footprint (~16 bytes per parameter). Another common error is using the rule for INT8 quantization
    (1 byte/param) instead of FP16 (2 bytes/param).
  napkin_math: 7 Billion Parameters × 2 Bytes/Parameter = 14 Billion Bytes = 14 GB.
