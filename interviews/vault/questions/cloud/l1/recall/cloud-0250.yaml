id: cloud-0250
title: The Datacenter Power Wall
topic: energy-per-operation
status: published
provenance: imported
scenario: You are designing a new server rack for training large language models. The facilities team
  needs to know the power budget for a standard 8-GPU server. To start, what is the approximate Thermal
  Design Power (TDP) of a single modern datacenter GPU like the NVIDIA H100?
details:
  realistic_solution: A single NVIDIA H100 GPU has a TDP of approximately 700W. This is a critical number
    for datacenter design, as it dictates power delivery, cooling infrastructure, and ultimately, operational
    cost.
  common_mistake: Candidates often underestimate the power draw of datacenter GPUs, confusing them with
    consumer or workstation cards. They might guess a number in the 100-300W range, failing to realize
    that modern accelerators have pushed power consumption to the physical limits of air cooling, necessitating
    entirely new datacenter infrastructure like liquid cooling.
  napkin_math: '1. A single NVIDIA H100 GPU has a Thermal Design Power (TDP) of 700W.

    2. An 8-GPU server will draw: 8 GPUs * 700W/GPU = 5,600W (5.6 kW) just for the accelerators.

    3. Factoring in dual CPUs (~350W each), RAM, NVMe, and networking, the total server power easily reaches
    7 kW to 8 kW. This dictates heavy duty rack power provisioning.'
