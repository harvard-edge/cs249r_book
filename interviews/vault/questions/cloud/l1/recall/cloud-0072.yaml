id: cloud-0072
title: The Inference Memory Footprint
topic: compound-ai-systems
status: published
provenance: imported
scenario: You're preparing to deploy a standard 7 Billion parameter Large Language Model for an RAG application.
  For basic inference using half-precision (FP16), how much GPU memory should you budget just to load
  the model weights?
details:
  realistic_solution: For FP16 (or BF16) inference, each parameter requires 2 bytes of memory. Therefore,
    a 7 Billion parameter model requires 14 GB of GPU memory just to load the weights. This is a critical
    baseline for selecting a cloud GPU instance (e.g., an NVIDIA A10G with 24GB would suffice, but a T4
    with 16GB would be very tight). This static cost doesn't include the dynamic memory needed for the
    KV-cache, which grows with the sequence length and batch size.
  common_mistake: Engineers often confuse the memory requirements for *training* with those for *inference*.
    Training requires storing gradients and optimizer states (like Adam), which can be 8-10x more memory
    than just the model weights. Another common error is using the wrong number of bytes for the given
    precision (e.g., 4 for FP32 or 1 for INT8 instead of 2 for FP16).
  napkin_math: 7 Billion parameters × 2 bytes/parameter = 14 Billion bytes = 14 GB.
