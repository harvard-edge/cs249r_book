id: cloud-fill-01100
title: 'LLM Inference Scaling: H100 Load Balancing & Routing for P99 Latency'
topic: load-balancing
status: published
provenance: imported
scenario: You are tasked with designing the inference serving architecture for a large language model
  (LLM) at scale. The system must handle a sustained load of 10,000 requests per second (RPS) and achieve
  a P99 latency of 100ms. Your inference fleet consists of NVIDIA H100 GPUs, each with 80 GB HBM3, 989
  TFLOPS FP16 dense performance, and 3.35 TB/s memory bandwidth. A single inference call on an H100 typically
  takes 50ms. How would you design the request routing and load balancing strategy to meet these requirements,
  considering the specific characteristics of the H100 and inference traffic patterns?
details:
  realistic_solution: 'A robust solution would involve a multi-layered approach: (1) A proxy layer with
    intelligent request routing using consistent hashing combined with dynamic, weighted distribution
    based on real-time GPU metrics (e.g., HBM utilization, compute utilization, inference queue depth,
    and health checks). (2) A control plane that continuously monitors GPU fleet health and performance,
    dynamically adjusts weights, and can quickly re-route traffic away from overloaded or failing H100
    instances. (3) Implementing adaptive batching on the inference servers to optimize H100 throughput
    while carefully managing batch sizes to stay within P99 latency targets. (4) Prioritizing requests
    or implementing QoS for critical traffic, and using circuit breakers to prevent cascading failures.'
  common_mistake: A common mistake is to apply generic CPU-centric load balancing strategies (e.g., simple
    round-robin) without accounting for GPU-specific bottlenecks like HBM bandwidth saturation, varying
    model sizes, or the non-linear relationship between GPU utilization and latency. Ignoring tail latency
    implications of queuing or failing to implement dynamic weighting based on real-time GPU load and
    health can lead to severe performance degradation under high throughput.
  napkin_math: 'Minimum H100s for throughput: Each H100 processes 1 request / 0.05s = 20 RPS. For 10,000
    RPS, you need 10,000 / 20 = 500 H100s. However, to achieve P99 latency of 100ms with a 50ms inference
    time, you have only 50ms for queuing, network, and software overhead. This suggests you cannot run
    GPUs at 100% utilization without incurring significant queuing delays. Assuming you aim for an average
    GPU utilization of ~50% to maintain low queue times and headroom for spikes, you would need approximately
    500 / 0.5 = 1000 H100s. This calculation doesn''t account for batching efficiency or heterogeneous
    request types, which would further refine the fleet size.'
