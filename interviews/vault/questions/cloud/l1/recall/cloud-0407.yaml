id: cloud-0407
title: The CapEx Foundation of TCO
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You're building the first-year Total Cost of Ownership (TCO) model for a new LLM service. The
  first and largest line item is often the hardware Capital Expenditure (CapEx). What is the approximate
  unit cost for a single NVIDIA H100 GPU that you would use as the baseline for this calculation?
details:
  realistic_solution: The correct baseline cost for an H100 GPU is approximately $30,000. This is the
    foundational number for any CapEx calculation before factoring in the full server, networking, and
    datacenter overhead (PUE, cooling, etc.).
  common_mistake: Engineers often anchor on consumer GPU prices (like a GeForce 4090 at ~$2k) or generic
    server prices (~$10k), underestimating the specialized cost of datacenter-grade AI accelerators by
    an order of magnitude. Conversely, some might overestimate it by thinking of the cost of an entire
    multi-GPU server system.
  napkin_math: For an LLM service, the primary CapEx is the GPUs. One H100 80GB GPU costs ~$30,000. A
    standard 8-GPU HGX node costs 8 * $30k = $240,000. For a medium-scale serving fleet of 64 GPUs, the
    GPU CapEx alone is 64 * $30k = $1.92M. Host systems, 400G networking, and storage typically add another
    20-30%, bringing the total hardware CapEx to roughly $2.5M.
