title: The Roofline Litmus Test (cloud-0361)
topic: roofline-analysis
status: draft
provenance: imported
scenario: An engineer is analyzing two models on an NVIDIA H100 GPU, which has a Roofline 'ridge point'
  of approximately 295 Ops/Byte. Model A has an arithmetic intensity of 400 Ops/Byte, while Model B has
  an arithmetic intensity of 150 Ops/Byte. Determine the limiting factor for each model.
details:
  realistic_solution: The hardware's ridge point is the critical threshold. A model is compute-bound if
    its arithmetic intensity is *greater* than the ridge point, and memory-bound if it's *less*.
  common_mistake: 'Engineers often confuse the relationship, thinking that a high arithmetic intensity
    (many operations per byte) means the model is *waiting* for data, thus making it memory-bound. The
    opposite is true: high arithmetic intensity means the model has plenty of work to do for each byte
    it fetches, so the processor''s speed (compute) is the bottleneck.'
