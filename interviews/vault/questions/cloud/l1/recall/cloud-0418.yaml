id: cloud-0418
title: The 70B Inference Footprint
topic: activation-memory
status: published
provenance: imported
scenario: You are deploying a 70 billion parameter Large Language Model for a new Retrieval-Augmented
  Generation (RAG) service. To select the right GPU instance, you first need to estimate the basic memory
  requirement. What is the approximate memory needed just to load the model weights for inference in half-precision
  (FP16)?
details:
  realistic_solution: The correct answer is approximately 140 GB. For inference, the primary memory cost
    is storing the model parameters. With 70 billion parameters and using half-precision (FP16), each
    parameter requires 2 bytes.
  common_mistake: Engineers often confuse the memory requirements for inference with those for training,
    which are much larger due to storing optimizer states, gradients, and activations. Another common
    error is using the wrong number of bytes for the given precision (e.g., using 1 byte/param for FP16
    instead of 2, which would be correct for INT8).
