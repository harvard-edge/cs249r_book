title: 'The Interconnect Latency Ladder: Collective Communication'
topic: collective-communication
status: draft
provenance: imported
scenario: 'You''re debugging a distributed training job and notice that nodes are waiting on each other.
  You suspect network latency. To build your intuition, your tech lead asks a quick question: ''Roughly
  how much slower is a cross-rack InfiniBand NDR transfer compared to a local, on-node NVLink 4.0 transfer
  between two GPUs?'''
details:
  realistic_solution: 'A cross-rack InfiniBand transfer is approximately 10 times slower than an on-node
    NVLink transfer. NVLink 4.0 latency is around 500 nanoseconds, whereas a trip across the datacenter
    rack fabric via InfiniBand NDR is about 5,000 nanoseconds (5 microseconds). This 10x gap is a fundamental
    reality of datacenter topology: on-node communication is always significantly faster than node-to-node
    communication.'
  common_mistake: Engineers often underestimate the latency penalty for going 'off-node'. They might mentally
    group all high-speed interconnects together, assuming their latencies are roughly comparable (e.g.,
    within 2-3x of each other). They forget that crossing from an on-node electrical interconnect (NVLink)
    to an optical, cross-rack network (InfiniBand) involves significantly more protocol overhead and physical
    distance, pushing the latency up by an order of magnitude.
  napkin_math: 'Local NVLink 4.0 latency is roughly 500 ns. Cross-rack InfiniBand NDR involves traversing
    NICs, switches, and fiber, taking roughly 5,000 ns (5 microseconds). Ratio: 5,000 ns / 500 ns = 10x
    slower. In human time (1ns = 1s), NVLink takes 8 minutes, while an IB NDR hop takes nearly 1.5 hours!'
