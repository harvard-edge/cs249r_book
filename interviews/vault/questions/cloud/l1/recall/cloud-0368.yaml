id: cloud-0368
title: Defining Arithmetic Intensity (cloud-0368)
topic: roofline-analysis
status: draft
provenance: imported
scenario: A junior engineer on your team is trying to optimize a model on an H100 GPU. They say, 'This
  model has a huge number of FLOPs, so it must be compute-bound.'
details:
  realistic_solution: Arithmetic Intensity (AI) is the ratio of floating-point operations (FLOPs) performed
    to the number of bytes accessed from memory (Bytes). It is a property of the *workload*, not the hardware.
    It tells you how much useful computation is done for every byte moved. A high AI means the workload
    is likely to be compute-bound, while a low AI means it is likely to be memory-bound.
  common_mistake: Engineers often confuse a model's total computational cost (FLOPs) with its performance
    characteristics on hardware. A model can have trillions of FLOPs but still be bottlenecked by memory
    if it doesn't perform enough work for each byte it fetches. They also mistake Arithmetic Intensity
    for a measure of the GPU's peak TFLOPS or its memory bandwidth, rather than the ratio between the
    two for a *specific workload*.
  napkin_math: The H100 GPU has a 'ridge point' of roughly 295 Ops/Byte. This is a property of the hardware.
