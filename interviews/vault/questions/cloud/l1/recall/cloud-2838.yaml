id: cloud-2838
title: Cloud New 0032
topic: graph-compilation
status: published
provenance: imported
scenario: PyTorch 2.0 introduced `torch.compile`, changing how PyTorch runs Python code. Recall the definition
  of JIT (Just-In-Time) compilation and how it differs from AOT (Ahead-Of-Time) compilation.
details:
  realistic_solution: Just-In-Time (JIT) compilation analyzes and compiles the computational graph at
    runtime (during the first few execution steps), tailoring the generated machine code to the specific
    input shapes encountered. Ahead-Of-Time (AOT) compilation requires compiling the model graph completely
    into a static binary or library before the program is ever run.
  common_mistake: Confusing JIT with an interpreter (like standard eager Python) which executes code line-by-line
    without compiling an optimized graph.
  napkin_math: JIT compiling a graph taking 5s initially. If a single training step on an A100 (312 TFLOPS)
    drops from 100ms to 80ms due to fusion, the 20ms savings pays off the 5s compile time after just 250
    iterations.
