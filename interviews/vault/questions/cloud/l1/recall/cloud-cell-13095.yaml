id: cloud-cell-13095
title: 'TCO Mastery: Build vs Buy Decision for LLM Training Infrastructure'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Make a data-driven build-vs-buy decision for a company planning to train a 70B model quarterly.
  Build: $30M for 256 H100 cluster (DGX SuperPOD equivalent), 5-year lifespan, 0.25 FTE ops, 500kW datacenter
  contract at $80/kW-month. Buy: $2.50/hr/H100. Training run: 2 weeks on 256 H100s. Assume 4 runs/year.'
details:
  realistic_solution: 'Power cost: 256 H100s × 700W × 8760hr × $0.08/kWh × PUE 1.3 = ~$163,200/yr (not
    $1.61M which is 10× inflated).'
  common_mistake: Comparing total CapEx vs rental without normalizing to the actual utilization — the
    build option may be dramatically over-provisioned if the cluster sits idle 95% of the time between
    training runs.
  napkin_math: 'Power cost for 256 H100s: 256 × 0.7kW × 8760hr × $0.08/kWh × PUE=1.3 = 256 × 0.7 × 8760
    × 0.08 × 1.3 = 256 × 634.85 = $162,522 ≈ $163,200/yr (not $1.61M — that is 10× too high, likely a
    ×10 error somewhere in the calculation).'
