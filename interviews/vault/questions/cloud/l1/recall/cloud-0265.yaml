id: cloud-0265
title: 'The Energy Cost of Precision: Extreme Quantization'
topic: extreme-quantization
status: published
provenance: imported
scenario: An LLM inference request executes a large matrix multiplication. From a pure energy consumption
  perspective, what is the approximate energy savings per operation if you can perform the compute using
  INT8 versus FP32?
details:
  realistic_solution: An FP32 operation consumes roughly 18 times more energy than an INT8 operation.
    This is a fundamental physical invariant. The energy cost of a digital operation is proportional to
    the number of transistors switching, and the hardware for an 8-bit integer multiplication is far simpler
    than that for a 32-bit floating-point multiplication, which must handle a wide dynamic range via exponents
    and mantissas.
  common_mistake: Engineers often confuse the 4x memory footprint reduction (32 bits vs 8 bits) or the
    4x theoretical throughput gain (on SIMD units) with the energy savings. The actual energy saving per
    operation is much larger because an FP32 multiplier is significantly more complex and energy-intensive
    than an INT8 multiplier due to the hardware required for handling the exponent and mantissa.
  napkin_math: '1. The energy required to perform arithmetic operations scales with the hardware complexity
    of the data format.

    2. Integer arithmetic (INT8) is physically much simpler than floating-point math (FP32), which requires
    alignment and exponent tracking.

    3. A single FP32 operation requires roughly 18x more energy than an INT8 operation.

    4. Swapping FP32 for INT8 cuts compute energy by ~94%.'
