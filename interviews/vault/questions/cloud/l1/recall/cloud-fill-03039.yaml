schema_version: 1
id: cloud-fill-03039
title: TP+PP Combined Parallelism Strategy for 540B Model
topic: model-tensor-parallelism
status: published
provenance: imported
scenario: 'Design a parallelism strategy for training a 540B PaLM-scale model on a 256-GPU cluster of
  H100s (80GB HBM3, NVLink 900GB/s intra-node, InfiniBand 400Gbps inter-node). The model has 118 transformer
  layers, hidden_size=18432, 48 heads. Target: MFU > 40%.'
details:
  realistic_solution: 'Use 3D parallelism: TP=8 within a node (NVLink), PP=4 across nodes (pipeline stages
    of ~30 layers each), DP=8 (data parallelism across 8 DP replicas). Total: 8*4*8=256 GPUs. TP=8 uses
    NVLink at 900GB/s (fast). PP uses InfiniBand but only for activations (forward) and gradients (backward)
    between pipeline stages — not weight all-reduces. DP all-reduce for gradients overlaps with pipeline
    bubbles.'
  common_mistake: Maximizing TP degree across all GPUs (TP=256) to minimize memory per GPU. This creates
    an all-reduce graph that spans the entire cluster over InfiniBand, and TP communication becomes 100%
    of training time since all-reduces are on the critical path.
  napkin_math: '540B model at BF16 = 1.08TB. Per GPU: 1.08TB / 256 = 4.2GB — way under 80GB. TP=8, PP=4,
    DP=8: per GPU = 1.08TB / (8*4) = 33.75GB. Fits. Pipeline bubble: PP=4, micro_batches=16: bubble fraction
    = (PP-1)/(micro_batches+PP-1) = 3/19 = 15.8%. TP communication per layer: activation [B, seq, hidden/8]
    all-reduce = B*seq*2304*2 bytes. At batch=2048, seq=2048: 2048*2048*2304*2 = 19GB → 19GB/900GB/s =
    21ms per all-reduce, 118 layers * 2 = 4.9s comm. Compute: 540B * 6 FLOPs * 2048 tokens = 6.6 PFLOP.
    At 40% MFU (989 TFLOPS * 256 * 0.4 = 101 PFLOPS): 6.6P/101P = 65ms per step. Communication (21ms)
    / step (65ms) = 32% — acceptable if overlapped.'
