id: cloud-0180
title: The Multi-Tenant SLO Crisis
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are the Principal Engineer for the AI Serving Platform at a major cloud provider. Your
  platform serves two models on the same H100 GPU cluster:'
details:
  realistic_solution: The correct architecture replaces the standard batching server with one that supports
    **fine-grained, preemptive scheduling**, like the mechanisms found in modern engines such as vLLM
    or Orca. This is often called 'continuous batching'.
  common_mistake: 'A common but insufficient proposal is to simply add a priority queue. While this ensures
    ''Swift'' requests are picked before ''Deep'' requests from the waiting queue, it doesn''t solve the
    fundamental problem: **Head-of-Line Blocking**. If a ''Deep'' model prefill has already started, the
    non-preemptive nature of standard batching means the ''Swift'' request must wait for the entire multi-hundred-millisecond
    ''Deep'' computation to finish, violating the SLO.'
  napkin_math: 'Compare worst-case queue time. Under standard batching, if a ''Heavy'' request (e.g.,
    10k token prefill on 70B) is dispatched, it runs as a single kernel. Compute time: 2 * 70B * 10,000
    / 989 TFLOPS = 1.4 seconds. The ''Swift'' request waits the full 1.4s. With fine-grained preemptive
    continuous batching, the ''Heavy'' prefill is chunked, interleaving Swift in ms.'
