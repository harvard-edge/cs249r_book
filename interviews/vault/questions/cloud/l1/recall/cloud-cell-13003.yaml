id: cloud-cell-13003
title: 'Pipeline Parallelism Mastery: End-to-End Training System Design'
topic: pipeline-parallelism
status: published
provenance: imported
scenario: Design a 3D parallel training system (data + tensor + pipeline) for a 530B parameter model (GPT-3
  scale) using 512 H100 GPUs (80GB HBM3, 3.35TB/s, NVLink 600GB/s intra-node, 400Gb/s IB inter-node).
  Specify the parallelism degrees, bubble overhead, memory per device, and expected MFU. Justify every
  design choice quantitatively.
details:
  realistic_solution: '530B params at BF16 = 1060GB total. With Adam optimizer: 12 bytes/param = 6360GB
    optimizer states. Recommended: TP=8 (within NVLink node), PP=8 stages (inter-node), DP=8 (gradient
    all-reduce). Total GPUs = 8*8*8 = 512. Per device: 530B/(8*8) = 8.28B params = 16.6GB weights. Optimizer
    states: 6360GB/512 = 12.4GB. Activations (recomputed): ~8GB. Total: ~37GB — fits in 80GB. Bubble with
    m=64: (8-1)/(64+7) = 9.9%. Target MFU: 45-55% for large models.'
  common_mistake: Choosing parallelism degrees without verifying memory fits, ignoring that tensor parallelism
    requires NVLink for efficiency, and forgetting optimizer state memory (Adam = 12 bytes/param).
  napkin_math: 'Model memory: 530B * 2 = 1060GB. Optimizer (Adam FP32): 530B * 12 = 6360GB. Total across
    512 GPUs: 7420GB / 512 = 14.5GB base + activations. TP=8 splits weight matrices, needs NVLink (600GB/s
    >> 400Gb/s IB). PP=8 stages, m=64 micro-batches: bubble = 7/71 = 9.9%. DP=8: gradient all-reduce over
    IB. Per-device peak: ~45-55GB, safely within 80GB H100.'
