schema_version: 1
id: cloud-gen-mast-0197
title: VLM-Based Automated Curation at 100B Scale
topic: dataset-curation
status: published
provenance: imported
scenario: You are tasked with designing an automated data curation pipeline for a new multimodal foundation
  model. You have a raw data lake of 100 billion image-text pairs (average 200KB per pair) in object storage.
  You need to use a 10B parameter Vision-Language Model (VLM) running in FP16 to score and filter this
  dataset down to the highest quality 5%. The VLM requires approximately 6 TFLOPs per sample for the forward
  pass. Design the end-to-end distributed curation architecture, identify the primary system bottleneck,
  and calculate the exact number of A100 (80GB) GPUs required to complete this job in exactly 14 days.
details:
  realistic_solution: 'For a 10B VLM in FP16, the weights require ~20GB. The 80GB HBM2e on the A100 permits
    very large batch sizes, pushing the arithmetic intensity well past the A100''s ridge point of 156
    FLOPs/Byte, making the workload strictly compute-bound. The architecture should utilize a decoupled
    pattern: a distributed queue streams metadata/URLs to stateless GPU worker nodes, which asynchronously
    pull raw bytes from S3, run inference batches, and sink the quality scores to a fast key-value store
    or analytical database.'
  common_mistake: Candidates often misidentify the bottleneck as object storage I/O or memory bandwidth
    without calculating the arithmetic intensity of a large-batch inference workload. They also frequently
    fail to apply a realistic hardware utilization factor (MFU), erroneously assuming the theoretical
    peak of 312 TFLOPS can be achieved.
  napkin_math: '1. Total Compute: 100B samples × 6 TFLOPs/sample = 600 ZFLOPs. 2. Effective Throughput:
    A100 peak is 312 TFLOPS FP16; assuming a realistic 40% MFU, we get ~125 TFLOPS per GPU. 3. Processing
    Rate: 125 TFLOPS / 6 TFLOPs = ~20.8 samples/sec per GPU. 4. Time Constraint: 14 days = 1,209,600 seconds.
    5. Samples per GPU: 20.8 × 1,209,600 = ~25.1 million samples. 6. Total GPUs: 100B / 25.1M = 3,984
    A100 GPUs (provision 4,000 GPUs or 500 8-GPU nodes). 7. Network I/O Check: 20.8 samples/s × 200KB
    = ~4.1 MB/s per GPU (~33 MB/s per node), verifying network is not the bottleneck.'
