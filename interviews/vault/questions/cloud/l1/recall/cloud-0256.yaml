id: cloud-0256
title: The 16x VRAM Multiplier for Training
topic: vram-budgeting
status: published
provenance: imported
scenario: You are planning the training run for a 70B parameter LLM using the Adam optimizer with full
  FP32 precision. State the approximate VRAM required *just* to store the model weights, gradients, and
  optimizer states.
details:
  realistic_solution: 'For each parameter in the model, the training process needs to store four separate
    FP32 values:

    1. The parameter (weight) itself (4 bytes).

    2. The gradient for that parameter (4 bytes).

    3. The Adam optimizer''s first moment estimate (momentum) (4 bytes).

    4. The Adam optimizer''s second moment estimate (variance) (4 bytes).'
  common_mistake: The most common mistake is to forget that the Adam optimizer stores two state variables
    (momentum and variance) for each model parameter, in addition to the parameters themselves and their
    gradients. A candidate might only account for the parameters (4 bytes/param) or parameters plus gradients
    (8 bytes/param), leading to a significant underestimation.
  napkin_math: 70B parameters in FP32 = 70B * 4 bytes = 280GB. Gradients in FP32 = 280GB. Adam optimizer
    states (momentum and variance) = 70B * 4 bytes * 2 = 560GB. Total VRAM needed = 280 + 280 + 560 =
    1120GB. Since an H100 has 80GB, you need 1120 / 80 = 14 H100s minimum just to hold the state, showing
    why mixed-precision (FP16/BF16) and ZeRO sharding are mandatory.
