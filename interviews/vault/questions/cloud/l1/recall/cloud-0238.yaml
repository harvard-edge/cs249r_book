id: cloud-0238
title: Applying Little's Law to Inference Servers
topic: latency-decomposition
status: published
provenance: imported
scenario: According to Little's Law ($L = \lambda W$), if our LLM inference server has an average arrival
  rate of 10 requests per second ($\lambda$) and each request takes an average of 5 seconds to process
  ($W$), what does the system need to support in terms of concurrent requests ($L$) to remain stable?
details:
  realistic_solution: "Little's Law states that the average number of items in the system ($L$) equals\
    \ the arrival rate multiplied by the average time spent in the system. $10 \text{ req/s} \times 5\
    \ \text{ s} = 50$ concurrent requests."
  common_mistake: Confusing the arrival rate with throughput or thinking the server only needs to handle
    the arrival rate concurrently.
  napkin_math: '- L = λ × W = 10 req/s × 5s = 50 concurrent requests. | - If each request needs ~1.5 GB
    KV cache memory: 50 × 1.5 GB = 75 GB. Requires at least one 80 GB H100. | - => Under-provisioning
    (e.g., max 30 concurrent) causes queue buildup: queue length grows at 10 − 30/5 = 4 req/s.'
