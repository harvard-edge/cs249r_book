id: cloud-0405
title: 'The Great Divide: Intra-Node vs. Inter-Node'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: In a modern AI datacenter, you have multiple ways to move data. If you need to transfer a large
  tensor between two H100 GPUs located *within the same physical server*, which interconnect is designed
  to provide the highest bandwidth for this specific task?
details:
  realistic_solution: NVLink is the correct answer. It is a proprietary, high-speed interconnect developed
    by NVIDIA specifically for direct GPU-to-GPU communication within a single server (intra-node). Its
    primary purpose is to create a unified memory space for multiple GPUs and provide bandwidth that far
    exceeds what the general-purpose PCIe bus or external networking can offer for this task.
  common_mistake: Confusing the roles of different interconnects. Engineers often mix up the system bus
    (PCIe), the GPU-to-GPU bridge (NVLink), and the server-to-server network (InfiniBand). They might
    incorrectly assume all 'communication' happens over 'the network' (InfiniBand) or that the CPU's main
    bus (PCIe) is the only path.
  napkin_math: 'A simple bandwidth comparison from the playbook''s numbers tells the story:

    1. **NVLink Bandwidth:** H100 NVLink achieves up to 900 GB/s.

    2. **PCIe Bandwidth:** PCIe Gen4/Gen5 ranges from ~32 GB/s to ~64 GB/s.

    3. **InfiniBand Bandwidth:** NDR provides ~50 GB/s.

    NVLink offers 900 GB/s, which is >14x faster than the PCIe bus and >18x faster than the networking
    interconnect.'
