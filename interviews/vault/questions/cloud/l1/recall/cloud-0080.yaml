id: cloud-0080
title: 'The 7B Model Memory Footprint: Model Serving Infrastructure'
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You've been tasked with deploying a 7-billion parameter Large Language Model for a new RAG-based
  chatbot. Before you even think about container orchestration or KV cache, what is the *absolute minimum*
  memory (RAM or HBM) required to simply load the model weights for inference using a standard FP16 format?
details:
  realistic_solution: A 7-billion parameter model requires approximately 14 GB of memory for inference
    in FP16. Each parameter in FP16 (half-precision floating-point) format takes up 2 bytes of memory.
  common_mistake: Engineers often confuse the memory requirements for *training* with *inference*. During
    training with optimizers like Adam, memory usage is much higher (around 16 bytes per parameter) to
    store gradients and optimizer states. For simple inference, you only need to store the model weights
    themselves. Another common error is mixing up FP16 (2 bytes) with INT8 (1 byte) or FP32 (4 bytes).
  napkin_math: Calculating weight memory requires multiplying the parameter count by the precision size.
    For FP16 (16-bit float), each parameter is 2 bytes. 7 billion parameters * 2 bytes/parameter = 14,000,000,000
    bytes = 14 GB. This 14 GB is the absolute theoretical floor; in practice, inference requires extra
    VRAM for the KV cache.
