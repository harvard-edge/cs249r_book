id: cloud-0246
title: The Voracious KV-Cache
topic: vram-budgeting
status: published
provenance: imported
scenario: When serving an LLM, a significant portion of VRAM is consumed by the KV-cache. Recall which
  of these factors is the primary driver of the KV-cache's memory size.
details:
  realistic_solution: The KV-cache stores the key (K) and value (V) vectors for every token processed
    so far. Its size is a direct function of the sequence length. The formula is `Memory_KV = 2 × sequence_length
    × num_layers × hidden_dim`. As `sequence_length` increases, the memory usage scales linearly and can
    become enormous, far exceeding the static memory cost of the weights.
  common_mistake: Many engineers incorrectly assume the model's parameter count is the dominant factor
    for all memory components. While it defines the dimensions of the key/value vectors, the cache's total
    size grows linearly with the number of tokens in the input sequence. For modern LLMs with very long
    context windows, the sequence length quickly becomes the bottleneck, causing the KV-cache to consume
    more memory than the model weights themselves.
  napkin_math: 'Llama-70B has 80 layers and hidden_dim of 8192. Each token requires storing a Key and
    Value vector in FP16 (2 bytes per element).

    Memory per token = 2 (K,V) * 80 layers * 8192 dim * 2 bytes = 2,621,440 bytes (~2.62 MB).

    For a sequence length of 8192 tokens: 2.62 MB * 8192 = 21.4 GB.

    This consumes over 26% of an 80GB A100/H100 just for a single request''s KV cache!'
