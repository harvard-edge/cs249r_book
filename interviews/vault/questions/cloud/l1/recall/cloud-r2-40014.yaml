schema_version: 1
id: cloud-r2-40014
title: Congestion-Aware Adaptive Routing on InfiniBand
topic: congestion-control
status: published
provenance: imported
scenario: You are evaluating NVIDIA's Adaptive Routing (AR) on Quantum-2 InfiniBand switches for a 4096-H100
  cluster against static routing with ECMP. AR uses real-time port load telemetry to reroute packets,
  but introduces potential packet reordering. For a workload mixing AllReduce (90% of traffic) with parameter-server
  updates (10%), evaluate the full tradeoff space and make an architectural recommendation.
details:
  realistic_solution: 'Recommendation: Enable AR selectively. For AllReduce (UD transport in NCCL over
    IB): AR is safe because NCCL handles reordering at the application layer, and the throughput gain
    (15-25% in congested scenarios) outweighs the overhead. For parameter-server RC connections: disable
    AR because RC transport''s go-back-N retransmission makes reordering catastrophically expensive. Implementation:
    (1) Configure AR on Quantum-2 with per-SL (Service Level) policies: SL0 (AllReduce) = AR enabled,
    SL1 (param server) = AR disabled. (2) Set the AR aggressiveness to medium: reroute when port load
    exceeds 80% (not 50%, to avoid flapping). (3) Enable AR with packet-spray mode for UD (NCCL) traffic
    — packets within a message can take different paths. (4) Monitor with IB performance counters: PortXmitWait
    and PortRcvSwitchRelayErrors. Expected result: 18% throughput improvement for AllReduce under congestion,
    zero reordering overhead for param server traffic.'
  common_mistake: Assuming adaptive routing is universally better. AR introduces packet reordering, which
    triggers retransmissions in protocols that assume in-order delivery. For RDMA (IB transport), reordering
    causes the responder to generate duplicate ACKs, which the requester interprets as packet loss, triggering
    go-back-N retransmission — far more expensive than the original congestion.
  napkin_math: '4096 H100s, 8 rails each = 32,768 active ports. Static ECMP: average path utilization
    variance σ ≈ 15% due to hash collisions. AR: variance drops to σ ≈ 3%. For AllReduce with 2GB gradients:
    ECMP worst-case path takes 2GB/25GB/s = 80ms, AR keeps all paths near average = 2GB/40GB/s = 50ms
    (37.5% faster for tail flows). Training throughput improvement: ~8-12% at scale due to reduced AllReduce
    tail latency.'
