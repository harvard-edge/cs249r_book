title: Calculate Mixed-Precision Memory Footprint for Adam Training
scenario: You are tasked with setting up standard mixed-precision training (FP16) for a 7 billion parameter
  language model using the Adam optimizer. Your hardware is a single A100 GPU with 80 GB HBM2e. Standard
  mixed-precision maintains FP16 weights and gradients for the forward and backward passes, alongside
  FP32 master weights and FP32 Adam moments (first and second). Calculate the exact memory in GB required
  strictly for storing the weights, gradients, and optimizer states, and determine if it fits on this
  GPU.
details:
  realistic_solution: In standard mixed-precision training with Adam, each parameter requires 16 bytes
    of memory. This consists of 2 bytes for the FP16 weight, 2 bytes for the FP16 gradient, 4 bytes for
    the FP32 master weight, and 8 bytes for the FP32 Adam moments (momentum and variance). For a 7 billion
    parameter model, this requires 112 GB of memory in total. This heavily exceeds the 80 GB HBM2e capacity
    of a single A100, meaning the training process will OOM even before allocating memory for activations.
  common_mistake: Candidates often only calculate the memory for the FP16 weights (14 GB) or forget that
    Adam requires two FP32 states per parameter plus an FP32 master weight copy. They fail to recognize
    the 16 bytes per parameter multiplier required for the full mixed-precision training state, mistakenly
    assuming the model easily fits in 80 GB.
  napkin_math: 'FP16 Weights: 7e9 parameters * 2 bytes = 14 GB

    FP16 Gradients: 7e9 parameters * 2 bytes = 14 GB

    FP32 Master Weights: 7e9 parameters * 4 bytes = 28 GB

    FP32 Adam First Moment: 7e9 parameters * 4 bytes = 28 GB

    FP32 Adam Second Moment: 7e9 parameters * 4 bytes = 28 GB

    Total Memory = 14 + 14 + 28 + 28 + 28 = 112 GB

    112 GB > 80 GB (A100 capacity), so it will not fit.'
