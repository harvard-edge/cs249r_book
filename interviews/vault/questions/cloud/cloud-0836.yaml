title: A/B Test Duration with Asymmetric Traffic Splitting
scenario: You are testing a new computationally heavy ranking model against a baseline. The baseline has
  a 5.0% click-through rate. To detect a 0.2% absolute improvement with 80% power and 95% significance,
  your power analysis dictates a required sample size of 1,500,000 impressions per variant. If your platform
  receives 500,000 queries per day and you allocate a conservative 10% traffic split to the new variant
  (to limit the blast radius of potential latency regressions), how many days will the A/B test take to
  reach statistical significance?
question: "With 500,000 daily queries and 10% treatment traffic, how many days are needed for the treatment to reach 1,500,000 impressions?"
details:
  realistic_solution: The test duration is strictly bottlenecked by the variant receiving the least traffic.
    With a 10% allocation, the treatment variant receives 50,000 queries per day, meaning it will take
    30 days to collect enough data.
  common_mistake: Calculating duration based on a 50/50 traffic split (yielding 6 days) or dividing the
    combined required sample size (3M) by the total daily traffic (500k).
  napkin_math: Treatment traffic = 10% of 500,000 = 50,000 queries/day. Required impressions = 1,500,000.
    Duration = 1,500,000 / 50,000 = 30 days. (The control variant gets 450k/day and hits the threshold
    in 3.3 days, but the test cannot conclude until the treatment also reaches 1.5M).
