title: A/B Test Duration with Asymmetric Traffic Splitting
scenario: You are testing a new computationally heavy ranking model against a baseline. The baseline has a 5.0% click-through rate. To detect a 0.2% absolute improvement with 80% power and 95% significance, your power analysis dictates a required sample size of 1,500,000 impressions per variant. The platform receives 500,000 queries per day, and you allocate a conservative 10% traffic split to the new variant to limit the blast radius of potential latency regressions.
question: With 500,000 daily queries and 10% treatment traffic, how many days are needed for the treatment to reach 1,500,000 impressions?
details:
  realistic_solution: The test duration is strictly bottlenecked by the variant receiving the least traffic. With a 10% allocation, the treatment variant receives 50,000 queries per day, meaning it will take 30 days to collect enough data.
  common_mistake: |
    **The Pitfall:** Calculating duration based on a symmetrical 50/50 split or blindly dividing the aggregate sample pool by the total daily traffic.
    
    **The Rationale:** Engineers often treat A/B testing purely as a mathematical aggregate without mapping the theoretical volume back to the strict physical routing pipelines enforcing the asymmetric split.
    
    **The Consequence:** The team commits to ending the experiment in 6 days, failing to realize the treatment arm will be drastically underpowered and statistically invalid when they look at the results.
  napkin_math: |
    - **Treatment Traffic**: 10% of 500,000 = 50,000 queries/day.
    - **Required Impressions**: 1,500,000.
    - **Duration Calculation**: 1,500,000 / 50,000 = **30 days**.
    - **Result**: The test cannot safely conclude until the treatment bottleneck is satisfied at 30 days, even though the control reaches it in ~3.3 days.
