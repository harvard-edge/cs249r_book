title: The Hybrid Search Score Fusion Problem
scenario: Your RAG system uses both BM25 keyword search and dense vector search. BM25 returns scores in the range [0, 25] while cosine similarity returns scores in [0, 1]. When you naively add the scores, BM25 dominates every query.
question: How do you combine these heterogeneous score distributions for meaningful ranking?
details:
  realistic_solution: 'Use Reciprocal Rank Fusion (RRF) instead of score-based fusion. RRF ignores raw scores entirely and uses only rank positions: score(doc) = \Sigma 1/(k + rank_i) where k=60 is typical. This is distribution-agnostic \u2014 it doesn''t matter if BM25 ranges [0,25] or [0,5]. Alternatively, use per-query min-max normalization (normalize within each result set per query, not globally). A third option: learn a lightweight cross-encoder reranker that takes the union of top-K from both retrievers and produces calibrated relevance scores.'
  common_mistake: |
    **The Pitfall:** Simply normalizing both scores to [0,1] by dividing by the maximum global score.
    **The Rationale:** Candidates apply basic min-max normalization, ignoring that max BM25 scores fluctuate wildly depending on whether a search term is common or rare.
    **The Consequence:** Dense and sparse retrieval signals remain severely miscalibrated, destroying the relevance of the final ranking.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - BM25 range: [0, 25]. Dense range: [0, 1].
       - RRF constant: k=60.
    2. **Calculations:**
       - Reciprocal Rank Fusion (RRF): score = 1/(k + rank).
       - Top match in both: 1/61 + 1/61 = 0.0328.
       - Divergent rank (#1 and #50): 1/61 + 1/110 = 0.0255.
    3. **Conclusion & Interpretation:**
       - **Result: Distribution-Bound.** RRF mathematically grounds the combination, making disparate scores safely comparable.
