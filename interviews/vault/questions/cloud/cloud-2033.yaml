title: The Hybrid Search Score Fusion Problem
scenario: Your RAG system uses both BM25 keyword search and dense vector search. BM25 returns scores in
  range [0, 25] while cosine similarity returns scores in [0, 1]. When you naively add the scores, BM25
  dominates every query. How do you combine these heterogeneous score distributions for meaningful ranking?
details:
  realistic_solution: 'Use Reciprocal Rank Fusion (RRF) instead of score-based fusion. RRF ignores raw
    scores entirely and uses only rank positions: score(doc) = Σ 1/(k + rank_i) where k=60 is typical.
    This is distribution-agnostic — it doesn''t matter if BM25 ranges [0,25] or [0,5]. Alternatively,
    use per-query min-max normalization (normalize within each result set per query, not globally). A
    third option: learn a lightweight cross-encoder reranker that takes the union of top-K from both retrievers
    and produces calibrated relevance scores.'
  common_mistake: Just normalizing both scores to [0,1] by dividing by the maximum. This is fragile because
    the max BM25 score varies wildly per query (a rare term might score 22, a common term might max at
    5).
  napkin_math: 'RRF with k=60: doc ranked #1 in both → 1/61 + 1/61 = 0.0328. Doc ranked #1 in BM25 only,
    #50 in dense → 1/61 + 1/110 = 0.0255. The rank-based scoring is naturally bounded and comparable without
    any normalization.'
