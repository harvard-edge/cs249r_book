title: Multimodal Pipeline Bottlenecks
scenario: A training pipeline on 8x H100s consumes 10,000 images/sec. Images are fetched
  from S3 (500KB compressed), decoded on the CPU (3MB uncompressed), and sent over
  PCIe to the GPUs.
question: Calculate the required S3 network bandwidth in GB/s and determine the minimum
  number of CPU cores required if each core decodes 200 images/second.
visual:
  kind: svg
  path: cloud-2859.svg
  alt: Bar chart comparing the throughput capacities of S3 read, CPU decode, PCIe
    Gen5 transfer, and GPU processing stages against a target horizontal line.
  caption: Data Pipeline Throughput vs Bottleneck Target
details:
  realistic_solution: To sustain the pipeline, the S3 network read bandwidth must
    handle 10,000 images/sec * 500KB = 5 GB/s (or 40 Gbps). For CPU decoding, 10,000
    images/sec divided by 200 images/core/sec requires 50 CPU cores strictly for decoding.
    The host-to-device transfer is 30 GB/s, which easily fits inside the PCIe Gen5
    bandwidth.
  common_mistake: Calculating the network bandwidth using the uncompressed 3MB size
    rather than the compressed 500KB size.
  napkin_math: 'Network: 10,000 * 0.5 MB/s = 5,000 MB/s = 5 GB/s. CPU Cores: 10,000
    / 200 = 50 cores.'
