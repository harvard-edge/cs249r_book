title: Rail-Optimized Network for GPU Clusters
scenario: You are designing a 512-GPU MI300X cluster's network. Each node has 8 MI300X GPUs connected
  via Infinity Fabric internally. You must choose between a traditional fat-tree connecting all 64 nodes
  and a rail-optimized topology where GPU 0 of every node connects to switch rail 0, GPU 1 to rail 1,
  etc. Specify the topology, calculate the switch count, and explain which AllReduce algorithm maps best
  to each.
details:
  realistic_solution: 'Rail-optimized: 8 independent networks (rails), each connecting 64 GPUs (one per
    node). Each rail is a 2-tier fat-tree of 64-port switches: 2 leaf + 2 spine = 4 switches per rail
    × 8 rails = 32 switches total. Fat-tree for all 512 GPUs: 3-tier, needs 128 leaf + 64 spine + 32 core
    = 224 switches. Rail-optimized saves 86% on switches. AllReduce mapping: (1) Intra-node AllReduce
    across 8 GPUs via Infinity Fabric (896 GB/s) — reduces to 1/8 of gradient. (2) Inter-node AllReduce
    on each rail independently — 64 GPUs per rail, ring AllReduce over the rail''s fat-tree. Each rail
    carries only 1/8 of the total gradient, so bandwidth per rail = 1/8 of total. (3) Intra-node broadcast
    via Infinity Fabric. This hierarchical AllReduce uses Infinity Fabric for the high-bandwidth step
    and Ethernet/IB for the long-haul step, matching bandwidth to distance.'
  common_mistake: Assuming rail-optimized is simply a wiring convenience. It fundamentally changes the
    AllReduce algorithm — each rail carries only GPU-rank-matched traffic, eliminating cross-rail contention
    that plagues fat-trees during AllReduce.
  napkin_math: 'Rail-optimized: 8 rails × 4 switches = 32 switches. Fat-tree: 224 switches. Savings: 192
    switches × $15K = $2.88M. AllReduce for 1 GB gradient: intra-node reduce on Infinity Fabric (896 GB/s):
    1 GB × 7/8 / 896 = 0.98ms. Inter-node ring on rail (400 Gbps per link): 125 MB × 63/64 / 50 GB/s =
    2.45ms. Intra-node broadcast: 125 MB / 896 GB/s = 0.14ms. Total: 3.57ms. Fat-tree AllReduce: 2 × 1
    GB × 511/512 / 50 GB/s = 40.9ms. Rail-optimized is 11.5× faster.'
