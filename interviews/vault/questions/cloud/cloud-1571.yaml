title: Diagnosing p99 Latency Spikes in Mixed-Flow Networks
scenario: A cloud-native ML inference cluster handles a mix of real-time user requests (mice flows, avg
  2KB, 50k QPS) and background batch data ingestion (elephant flows, 5GB bursts). Both share 100 Gbps
  Top-of-Rack (ToR) switches with 16MB packet buffers. During data ingestion, average ToR link utilization
  peaks at just 40%, yet the p99 latency for real-time inference requests spikes from 20ms to over 500ms.
  Analyze the root cause of this p99 latency degradation despite the low overall bandwidth utilization.
question: "Why does p99 inference latency spike during 5GB ingestion bursts even though ToR utilization averages only 40%, and how should you fix it?"
details:
  realistic_solution: Identify that bursty elephant flows from batch ingestion cause microbursts that
    instantly saturate the 16MB ToR switch buffer (only 1.28ms of traffic at 100 Gbps). When buffers overflow,
    latency-sensitive 2KB mice flow packets are tail-dropped. A single dropped TCP packet triggers a 200ms
    RTO, explaining the >500ms P99 spikes. Fix by implementing DSCP-based priority queuing (QoS) on the
    ToR switch to give strict priority to mice flows, and rate-limit the elephant flows to prevent microburst
    buffer saturation.
  common_mistake: Relying on average link utilization (40%) to rule out network congestion, and incorrectly
    attributing the latency spikes to application-level issues (GC pauses, connection pooling). Average
    utilization masks the microsecond-scale burst behavior that causes tail drops.
  napkin_math: Buffer capacity at 100 Gbps = 16 MB / 100 Gbps = (16 * 8) Mb / 100,000 Mb/s = 1.28 ms of
    traffic. A sudden burst from the batch job fills this shallow buffer almost instantly. When a 2KB
    mice flow packet is dropped, the TCP Retransmission Timeout (RTO) is triggered (typically 200ms minimum
    in Linux). A single dropped packet instantly adds 200ms of latency, easily explaining the >500ms p99
    spikes when compounded.
