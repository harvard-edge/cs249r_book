title: Diagnosing p99 Latency Spikes in Mixed-Flow Networks
scenario: A cloud-native ML inference cluster handles a mix of real-time user requests (mice flows, avg 2KB, 50k QPS) and background batch data ingestion (elephant flows, 5GB bursts). Both share 100 Gbps Top-of-Rack (ToR) switches with 16MB packet buffers. During data ingestion, average ToR link utilization peaks at just 40%, yet the p99 latency for real-time inference requests spikes from 20ms to over 500ms.
question: Why does p99 inference latency spike during 5GB ingestion bursts even though ToR utilization averages only 40%, and how should you fix it?
details:
  realistic_solution: Identify that bursty elephant flows from batch ingestion cause microbursts that instantly saturate the 16MB ToR switch buffer (only 1.28ms of traffic at 100 Gbps). When buffers overflow, latency-sensitive 2KB mice flow packets are tail-dropped. A single dropped TCP packet triggers a 200ms RTO, explaining the >500ms P99 spikes. Fix by implementing DSCP-based priority queuing (QoS) on the ToR switch to give strict priority to mice flows, and rate-limit the elephant flows to prevent microburst buffer saturation.
  common_mistake: |
    **The Pitfall:** Relying on average link utilization to rule out network congestion.
    **The Rationale:** Candidates incorrectly attribute latency spikes to application-level issues like GC pauses because the 40% average utilization masks microsecond-scale burst behavior.
    **The Consequence:** Wasting time debugging applications while ignoring microbursts causing switch buffer tail-drops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Switch speed: 100 Gbps.
       - Buffer size: 16 MB.
       - Base TCP RTO: ~200 ms.
    2. **Calculations:**
       - Buffer capacity in bits: 16 MB * 8 = 128 Mb.
       - Time to fill buffer at 100 Gbps: 128 Mb / 100,000 Mb/s = 1.28 ms.
       - Elephant flow burst (5GB) instantly saturates 16MB buffer.
       - Dropped mice packets trigger TCP RTO (200ms+ penalty).
    3. **Conclusion & Interpretation:**
       - **Result: Network-Buffer-Bound**. Elephant flows cause microbursts that fill the shallow 1.28 ms buffer, leading to tail-dropped mice flows and massive TCP retransmission penalties.
