title: Evaluating WAN Links for Multi-Datacenter LLM Training
scenario: To train a 175B parameter model, your infrastructure team proposes linking two existing datacenters (DC-East and DC-West, 1000 km apart) to pool their 4,000 GPUs each, instead of building a new 8,000 GPU facility. They propose installing a dedicated 800 Gbps WAN link to match the aggregate bandwidth of a single datacenter's spine tier.
question: Can the two datacenters be pooled for synchronous 175B training, and how should TP, DP, and PP be mapped?
details:
  realistic_solution: |
    Reject the proposal for naive synchronous training. The speed of light in fiber dictates a ~10ms RTT for 1000km. High bandwidth cannot overcome this latency for frequent synchronizations. The correct architectural decision is to restrict Tensor Parallelism (TP) and Data Parallelism (DP) strictly within a single datacenter, and only map Pipeline Parallelism (PP) across the WAN, using large micro-batches to hide the inter-datacenter latency.
  common_mistake: |
    **The Pitfall:** Assuming raw bandwidth is sufficient for synchronous distributed training.
    **The Rationale:** Candidates focus entirely on Gbps, ignoring the speed-of-light latency constraints over distance.
    **The Consequence:** GPUs sit idle waiting for frequent AllReduce collectives, effectively crashing training utilization to near zero.
  napkin_math: |
    - Speed of light in fiber ≈ 200,000 km/s (~5 μs/km).
    - One-way latency for 1000 km = 5 ms. RTT = 10 ms.
    - Intra-DC InfiniBand RTT is ~2 μs (WAN is 5,000x slower).
    - Bandwidth-Delay Product (BDP) = 800 Gbps * 10 ms = 8 Gb (1 GB) of data in flight needed to utilize the link.
    - **Synchronous TP AllReduce messages are small and blocking, meaning GPUs will idle for 10ms on every collective, destroying utilization.**
