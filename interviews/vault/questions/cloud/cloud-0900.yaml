title: Evaluating WAN Links for Multi-Datacenter LLM Training
scenario: To train a 175B parameter model, your infrastructure team proposes linking two existing datacenters
  (DC-East and DC-West, 1000 km apart) to pool their 4,000 A100 GPUs each, instead of building a new 8,000
  GPU facility. They point out that installing a dedicated 800 Gbps WAN link will provide the exact same
  aggregate bandwidth as the spine tier in a single datacenter. Evaluate this proposal, detailing the
  impact of the bandwidth-distance product on synchronous training parallelism strategies.
details:
  realistic_solution: Reject the proposal for naive synchronous training. The speed of light in fiber
    dictates a ~10ms RTT for 1000km. High bandwidth cannot overcome this latency for frequent synchronizations.
    The correct architectural decision is to restrict Tensor Parallelism (TP) and Data Parallelism (DP)
    strictly within a single datacenter, and only map Pipeline Parallelism (PP) across the WAN, using
    large micro-batches to hide the inter-datacenter latency.
  common_mistake: Assuming that matching the raw bandwidth (800 Gbps) is sufficient for synchronous distributed
    training, ignoring the speed-of-light latency constraints that severely bottleneck frequent collective
    operations like AllReduce.
  napkin_math: Speed of light in fiber ≈ 200,000 km/s (~5 µs/km). For 1000 km, one-way latency is 5 ms,
    so RTT = 10 ms. Intra-DC InfiniBand RTT is ~2 µs. The WAN latency is 5,000x worse. Bandwidth-Delay
    Product (BDP) = 800 Gbps * 10 ms = 8 Gb (1 GB). To fully utilize the link, 1 GB of data must be in
    flight. Synchronous TP AllReduce messages are typically smaller and require blocking, meaning GPUs
    will idle for 10ms on every collective, reducing utilization to near zero.
