title: Decode Straggler Detection in Large Batch Disaggregated Serving
scenario: Decode pool P99 TPOT is 3x higher than median TPOT. Profiling shows most requests complete in 40ms/token but 1% take 120ms/token. GPU utilization shows no idle time.
question: What is likely causing 1% of decode requests to see 120ms/token while the median is 40ms/token?
details:
  realistic_solution: 'In continuous batching, the token generation step for all batched requests completes together (synchronized per-step). If 1% of requests have 3x higher TPOT, it means those requests are in a batch where the per-step compute takes 3x longer. Possible causes: (1) Long sequence KV cache access: requests with 10K+ context tokens require loading more KV pages per step, increasing memory bandwidth consumption beyond HBM capacity for that batch. (2) CPU-offloaded KV: if some KV pages were swapped to CPU DRAM and not yet restored, the GPU stalls waiting for PCIe transfer. (3) Kernel launch serialization: if certain requests trigger fallback kernels (e.g., unsupported attention patterns), those kernels serialize on the GPU. Diagnosis: check (a) per-request context length distribution for the slow 1%; (b) KV cache swap metrics; (c) CUDA kernel timeline for serialization. Fix: (1) If long context: separate long-context requests into a dedicated decode pool with smaller batch size; (2) If KV swap: increase KV cache capacity or reduce batch size; (3) If kernel fallback: update attention implementation.'
  common_mistake: |
    **The Pitfall:** Assuming the 1% slow requests are simply longer sequences requiring more memory.
    **The Rationale:** In continuous batching, all requests in a batch proceed token-by-token together.
    **The Consequence:** A single slow operation delays the entire batch, meaning the bottleneck impacts overall throughput, not just the isolated request.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Batch of 128 requests: 127 have 512 context, 1 has 10K context.
       * Normal request KV load per step: 2 * 32 * 32 * 128 * 512 * 2 bytes = 268 MB.
    2. **Calculations:**
       * 10K context request KV load: 268 MB * (10000/512) = 5.23 GB.
       * Total batch KV load per step: 127 * 268 MB + 1 * 5.23 GB = 34 GB + 5.23 GB = 39.23 GB.
       * Time per step at 3.35 TB/s: 39.23 GB / 3350 GB/s = 11.7 ms.
       * Time without 10K request: 34 GB / 3350 GB/s = 10.1 ms.
    3. **Conclusion & Interpretation:**
       * **Result: PCIe Bottleneck.** The single long-context request adds only 1.6 ms (16% overhead), not 3x. 3x TPOT points to KV swap (PCIe bottleneck) rather than sequence length.
