title: Decode Straggler Detection in Large Batch Disaggregated Serving
scenario: Decode pool P99 TPOT is 3x higher than median TPOT. Profiling shows most
  requests complete in 40ms/token but 1% take 120ms/token. GPU utilization shows no
  idle time. Diagnose the straggler cause.
question: What is likely causing 1% of decode requests to see 120ms/token while the
  median is 40ms/token?
details:
  realistic_solution: 'In continuous batching, the token generation step for all batched
    requests completes together (synchronized per-step). If 1% of requests have 3x
    higher TPOT, it means those requests are in a batch where the per-step compute
    takes 3x longer. Possible causes: (1) Long sequence KV cache access: requests
    with 10K+ context tokens require loading more KV pages per step, increasing memory
    bandwidth consumption beyond HBM capacity for that batch. (2) CPU-offloaded KV:
    if some KV pages were swapped to CPU DRAM and not yet restored, the GPU stalls
    waiting for PCIe transfer. (3) Kernel launch serialization: if certain requests
    trigger fallback kernels (e.g., unsupported attention patterns), those kernels
    serialize on the GPU. Diagnosis: check (a) per-request context length distribution
    for the slow 1%; (b) KV cache swap metrics; (c) CUDA kernel timeline for serialization.
    Fix: (1) If long context: separate long-context requests into a dedicated decode
    pool with smaller batch size; (2) If KV swap: increase KV cache capacity or reduce
    batch size; (3) If kernel fallback: update attention implementation.'
  common_mistake: Assuming the 1% slow requests are simply longer sequences requiring
    more memory. In continuous batching, all requests in a batch proceed token-by-token
    together — a single slow operation delays the entire batch, not just the slow
    request.
  napkin_math: 'Batch of 128 requests, 127 have 512 context, 1 has 10K context. Memory
    bandwidth per step: normal request KV load = 2*32*32*128*512*2B = 268MB. 10K context
    request: 268MB * 20 = 5.36GB. Total batch KV load per step: 127*268MB + 1*5360MB
    = 34GB + 5.36GB = 39.4GB. At 3.35TB/s: 39.4GB/3350GB = 11.8ms per step. Without
    10K request: 34GB/3350GB = 10.1ms. The single long-context request adds only 1.7ms
    (17% overhead), not 3x. 3x TPOT points to KV swap (PCIe bottleneck) rather than
    sequence length.'
