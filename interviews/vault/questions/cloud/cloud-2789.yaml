title: Cloud New 0002
scenario: You need to architect a 3D parallelism strategy for training a 500B parameter dense model on a cluster of 1024 80GB GPUs. They are connected via NVLink within nodes and 400Gbps IB NDR across nodes.
question: What 3D parallelism strategy would you use to train the 500B dense model to maximize hardware utilization and minimize communication bottlenecks?
details:
  realistic_solution: "Combine Tensor Parallelism (TP=8) strictly within a single node to leverage the 600GB/s NVLink. Use Pipeline Parallelism (PP=16) across nodes to partition the 500B model, utilizing micro-batching (1F1B) to reduce bubble time. Finally, use Data Parallelism (DP=8) across the remaining dimensions. Map PP stages across the 400Gbps IB NDR fabric, ensuring gradient synchronization for DP uses overlapping communication and computation architectures like ZeRO-1."
  common_mistake: |
    **The Pitfall:** Splitting Tensor Parallelism across nodes.
    **The Rationale:** Focusing strictly on mathematically dividing the layers without considering the physical interconnect topology.
    **The Consequence:** The 50GB/s IB NDR fabric severely bottlenecks the intense all-gather/reduce operations required for every layer, crippling training throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Model: 500B FP16 = 1TB weights.
       * Optimizer State: Adam (16 bytes/param) = 8TB.
       * Network: 600GB/s NVLink intra-node, 50GB/s (400Gbps) IB NDR inter-node.
    2. **Calculations:**
       * Cluster Memory: 1024 \times 80GB = 81.9TB.
       * Parallelism Split: TP=8 (node size) \times PP=16 = 128 GPUs per replica.
       * Model footprint per GPU: 1TB / 128 = ~7.8GB.
    3. **Conclusion & Interpretation:**
       * TP=8 keeps intense All-Reduce traffic strictly within the **600GB/s NVLink domain**, preventing the 50GB/s IB fabric from bottlenecking. **Result: Network-Topology-Bound**.
