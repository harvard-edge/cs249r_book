title: Serving Diversity vs Relevance Tradeoff in Re-ranking
scenario: A recommendation system's relevance ranker returns the top 20 items but 18 of 20 are from the same content category (fashion). Users are exposed to no diversity.
question: How would you design a re-ranking algorithm that balances relevance and diversity when 18 of the top 20 items are fashion?
details:
  realistic_solution: 'Context-adaptive diversity re-ranking: (1) Maximal Marginal Relevance (MMR): iteratively select items that maximize lambda × relevance_score - (1-lambda) × similarity_to_already_selected. Lambda is a diversity parameter. (2) Adaptive lambda: if user''s session shows single-category browsing for last 5 items (session_diversity_score < 0.2): set lambda=0.9 (relevance-heavy). If session shows multi-category browsing: lambda=0.6 (diversity-balanced). (3) Category diversity constraint: hard constraint: at most K items from the same category in top N. K=5 for N=20. Implement as post-processing: run greedy selection with category budget. (4) Slot-specific diversity: even in single-category preference, ensure items 15-20 are more diverse (exploration slots). (5) Evaluation: A/B test diversity vs baseline. Measure: per-session click rate (may drop slightly), unique categories explored (should increase), return visit rate (proxy for long-term satisfaction).'
  common_mistake: |
    **The Pitfall:** Applying a rigid, uniform diversity penalty to all users and all contexts.
    **The Rationale:** Candidates implement a basic score deduction for duplicate categories, ignoring that some users are in a genuine, high-intent "deep dive" session.
    **The Consequence:** Recommendations degrade for power users actively researching a single topic, driving down engagement.
  napkin_math: |
    1. MMR requires comparing each of the ~500 candidates against all K previously selected items.
    2. Comparisons for 20 slots: 500*1 + 500*2 + ... + 500*19 ≈ 500 * (19 * 20 / 2) = 95,000 comparisons.
    3. Similarity computation (Cosine on 128-dim embeddings): 128 FLOPs per comparison.
    4. Total MMR Compute: 95,000 comparisons * 128 = ~12.2 million FLOPs.
    **On a 989 TFLOPS chip, 12.2M FLOPs takes 0.012ms—a completely negligible overhead for dynamic re-ranking.**
