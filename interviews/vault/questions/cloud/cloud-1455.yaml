title: Calculating JIT Kernel Fusion Latency
scenario: You are optimizing a PyTorch-based Transformer inference service running on NVIDIA A10G GPUs
  (125 TFLOPs FP16). Under eager execution, a single inference request takes 15.0ms. Profiling reveals
  that 8.0ms is spent on CPU-side Python framework dispatch overhead, while actual GPU kernel execution
  takes 7.0ms. You apply `torch.compile` to JIT-compile the model. If the JIT trace completely eliminates
  the Python dispatch overhead and kernel fusion (e.g., fusing LayerNorm and GeLU) reduces the GPU execution
  time by 20%, calculate the new inference latency and the total latency reduction achieved after the
  initial warmup phase.
details:
  realistic_solution: The new inference latency drops to 5.6ms, achieving a total reduction of 9.4ms.
    JIT compilation removes the 8.0ms CPU dispatch overhead entirely and shrinks the 7.0ms GPU execution
    time to 5.6ms via kernel fusion.
  common_mistake: Assuming JIT compilation only speeds up the GPU execution time via kernel fusion, while
    forgetting that its primary benefit in eager frameworks is bypassing the CPU-bound Python dispatch
    overhead.
  napkin_math: 'Under eager execution, total latency = 8.0ms CPU dispatch + 7.0ms GPU compute = 15.0ms.
    GPU utilization is poor due to CPU overhead. JIT compilation (e.g., TorchScript/CUDA graphs) eliminates
    the 8.0ms CPU dispatch. Kernel fusion typically speeds up GPU compute by ~20%: 7.0ms * 0.8 = 5.6ms.
    New latency = 0ms + 5.6ms = 5.6ms. Total reduction = 15.0ms - 5.6ms = 9.4ms (a 2.6x speedup).'
