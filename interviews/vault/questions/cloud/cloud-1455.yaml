title: Calculating JIT Kernel Fusion Latency
scenario: You are optimizing a PyTorch inference service running on A10G GPUs. Under eager execution, a request takes 15.0ms (8.0ms CPU Python dispatch overhead, 7.0ms GPU execution). You apply `torch.compile` which eliminates the dispatch overhead and provides a 20% kernel fusion speedup on the GPU execution.
question: After JIT warmup, what is the new inference latency and total latency reduction from eliminating dispatch and fusing kernels?
details:
  realistic_solution: The new inference latency drops to 5.6ms, achieving a total reduction of 9.4ms. JIT compilation removes the 8.0ms CPU dispatch overhead entirely and shrinks the 7.0ms GPU execution time to 5.6ms via kernel fusion.
  common_mistake: |
    **The Pitfall:** Assuming JIT compilation only speeds up GPU execution time via kernel fusion.
    **The Rationale:** Candidates forget that the primary benefit of JIT tracing in eager frameworks is bypassing the CPU-bound Python dispatch overhead.
    **The Consequence:** Underestimating the total latency reduction and misdiagnosing the primary system bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Eager Latency: 15.0ms (8.0ms CPU + 7.0ms GPU).
       - `torch.compile` impact: Eliminates CPU dispatch (0ms).
       - Kernel Fusion Speedup: 20% on GPU execution.
    2. **Calculations:**
       - Fused GPU Compute = 7.0ms * (1 - 0.20) = 5.6ms.
       - New Total Latency = 0ms (CPU) + 5.6ms (GPU) = 5.6ms.
       - Total Reduction = 15.0ms - 5.6ms = 9.4ms.
    3. **Conclusion & Interpretation:** **The total latency is reduced by 9.4ms, dropping the end-to-end request time to 5.6ms.**
