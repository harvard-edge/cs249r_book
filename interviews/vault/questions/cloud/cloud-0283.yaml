title: The I/O-Bound Cost Fallacy
scenario: Your team needs to run a feature engineering job on a 100 TB dataset stored in a cloud bucket. The job will run on a single cloud instance, which costs $4.10 per hour. The node is connected to the storage with a 400 Gbps network link.
question: "Assuming the job is entirely bottlenecked by loading the data from storage, what is the cost of one run?"
details:
  realistic_solution: First, determine the true data transfer rate in the correct units (GB/s), then calculate the total time required to transfer the dataset, and finally convert that time into a cost based on the hourly instance rate.
  common_mistake: |
    **The Pitfall:** Confusing bits (Gbps) and bytes (GB/s) or failing to convert hourly costs to seconds.
    **The Rationale:** Engineers often read "400 Gbps" as "400 GB/s", skipping the divide-by-8 step, or multiply seconds directly by the hourly rate.
    **The Consequence:** An 8x underestimation of the data transfer time and cost, or a massive 3600x overestimation of the final bill.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset size: 100 TB (100,000 GB).
       - Network bandwidth: 400 Gbps.
       - Instance cost: $4.10 / hour.
    2. **Calculations:**
       - Bandwidth in bytes: 400 Gbps / 8 = 50 GB/s.
       - Transfer time: 100,000 GB / 50 GB/s = 2,000 seconds.
       - Time in hours: 2,000 / 3,600 = 0.555 hours.
       - Cost: 0.555 hours * $4.10/hour = $2.277.
    3. **Conclusion & Interpretation:**
       - **Result: $2.28.** The operation is strictly **I/O-Bound**, and the minimum transfer cost dictates the job's expense.
  options:
  - $0.28
  - $8,200.00
  - $2.28
  - $18.22
