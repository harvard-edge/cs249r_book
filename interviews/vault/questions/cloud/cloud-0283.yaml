title: The I/O-Bound Cost Fallacy
scenario: Your team needs to run a feature engineering job on a 100 TB dataset stored in a cloud bucket.
  The job will run on a single H100 instance, which costs $4.10 per hour. The node is connected to the
  storage with a 400 Gbps InfiniBand link. Assuming the job is entirely bottlenecked by loading the data
  from storage, calculate the cost of a single run and explain your reasoning.
details:
  realistic_solution: The correct approach is to first determine the true data transfer rate in the correct
    units (GB/s), then calculate the total time required to transfer the dataset, and finally convert
    that time into a cost.
  common_mistake: The most common mistake is confusing bits (Gbps) and bytes (GB/s). Network bandwidth
    is specified in bits per second, while storage and memory are measured in bytes. Forgetting to divide
    by 8 leads to an 8x error in time and cost estimation. A second mistake is failing to convert cost
    from dollars-per-hour to dollars-per-second, leading to a massive overestimation.
  napkin_math: '1. Network bandwidth: 400 Gbps / 8 = 50 GigaBytes per second (GB/s).

    2. Dataset size: 100 TB = 100,000 GB.

    3. Time to transfer = 100,000 GB / 50 GB/s = 2,000 seconds.

    4. Convert to hours: 2,000 seconds / 3,600 seconds/hour = 0.555 hours.

    5. Compute cost: 0.555 hours * $4.10/hour = $2.28.

    The network transfer alone dictates the job will cost a minimum of $2.28.'
  options:
  - $0.29
  - $8,396.80
  - $2.33
  - The cost is negligible as compute is fast.
  correct_index: 2
