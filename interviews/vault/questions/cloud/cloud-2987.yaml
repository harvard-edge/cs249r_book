title: 'Kernel Fusion: Recall — What is Operator Fusion and Why Does It Matter?'
scenario: In the context of H100 (80GB HBM3, 3.35 TB/s) LLM inference, what is operator
  (kernel) fusion, what is the key memory bottleneck it addresses, and what is the
  memory bandwidth savings formula for a fused vs unfused elementwise sequence?
question: What is kernel fusion, which HBM bottleneck does it address, and what bandwidth-saving
  formula applies?
details:
  realistic_solution: 'Operator fusion: combine multiple kernels (e.g., LayerNorm
    + GELU + dropout) into one kernel. Each kernel normally reads tensor from HBM,
    computes, writes back. Fused kernel: reads once, applies all ops in registers/L2,
    writes once. Primary benefit: reduce HBM bandwidth, not compute.'
  common_mistake: Describing fusion as purely a compute optimization; missing that
    the primary benefit for elementwise ops is reducing HBM round trips, not FLOPs.
  napkin_math: 'Unfused: N elementwise ops on tensor T (size S bytes). Each op: read
    S + write S = 2S bytes. Total: N × 2S bytes HBM. Fused: read S + write S = 2S
    bytes total regardless of N. Savings: (N-1) × 2S bytes. For N=5 ops (LayerNorm+bias+GELU+dropout+residual),
    S=1GB: unfused = 10GB HBM traffic. Fused = 2GB. 5× reduction. At H100 3.35 TB/s:
    unfused = 10GB/3.35TB/s = 3ms. Fused = 0.6ms. 2.4ms saved per layer. 32-layer
    LLM: 32 × 2.4ms = 76.8ms latency reduction per forward pass.'
