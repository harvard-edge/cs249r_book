title: 'Kernel Fusion: Recall — What is Operator Fusion and Why Does It Matter?'
scenario: In the context of H100 LLM inference, operator (kernel) fusion is often used to combine multiple operations (e.g., LayerNorm + GELU + dropout).
question: What is kernel fusion, which HBM bottleneck does it address, and what bandwidth-saving formula applies?
details:
  realistic_solution: 'Operator fusion: combine multiple kernels (e.g., LayerNorm + GELU + dropout) into one kernel. Each kernel normally reads tensor from HBM, computes, writes back. Fused kernel: reads once, applies all ops in registers/L2, writes once. Primary benefit: reduce HBM bandwidth, not compute.'
  common_mistake: |
    **The Pitfall:** Describing fusion as purely a compute optimization (reducing FLOPs).
    **The Rationale:** Assuming that combining kernels simply removes instruction overhead or mathematical operations.
    **The Consequence:** Misunderstanding that the primary benefit for elementwise operations is strictly reducing HBM round trips, which is critical for memory-bandwidth-bound inference.
  napkin_math: |
    - **Unfused HBM Traffic**: N elementwise ops on tensor T (size S bytes). Each op requires reading S and writing S. Total = `N × 2S` bytes.
    - **Fused HBM Traffic**: Reads S into registers, applies all N ops, writes S once. Total = `2S` bytes.
    - **Savings**: `(N-1) × 2S` bytes.
    - **Example (N=5, S=1GB)**: Unfused = 10GB HBM traffic. Fused = 2GB. A 5× reduction.
    - **Latency Impact**: At H100 3.35 TB/s, unfused takes 3ms; fused takes 0.6ms. Saves 2.4ms per layer.
    - **Result**: For a 32-layer LLM, fusion saves **76.8ms** per forward pass.
