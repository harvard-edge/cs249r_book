title: RDMA Write vs Send Semantics on InfiniBand for H100 Parameter Server
scenario: 'A parameter server uses InfiniBand for gradient exchange with 64 A100 workers.'
question: 'Should the parameter server use RDMA Write or RDMA Send for gradient pushes, and what are the key differences?'
details:
  realistic_solution: 'RDMA Write: one-sided, initiator writes directly to registered remote memory without receiver CPU involvement. No receive buffer posting needed. Receiver may not know write occurred without explicit signaling. Use: pushing parameters to known memory addresses (known layout, pull model). RDMA Send: two-sided, receiver must post receive buffer before sender sends. Completion on both sides. Use: when receiver needs notification and message size/layout varies. For parameter server gradient push: RDMA Write preferred — workers know server memory layout, can write gradients directly to server DRAM at line rate. CPU on server stays free for aggregation. Typical latency: RDMA Write ≈2-4µs vs TCP ≈40-100µs.'
  common_mistake: |
    **The Pitfall:** Treating RDMA Write and Send as equivalent.
    **The Rationale:** Not knowing that RDMA Write is one-sided (no CPU involvement on receiver) while Send requires the receiver to post a receive buffer.
    **The Consequence:** Wasting host CPU cycles on the parameter server to handle incoming memory layout allocations.
  napkin_math: |
    * RDMA Write latency: 2µs. TCP latency: 50µs.
    * For 10,000 gradient update messages/s per worker:
    * RDMA overhead = 10k × 2µs = 20ms CPU equivalent.
    * TCP overhead = 10k × 50µs = 500ms.
    * **Result: RDMA Write eliminates the 500ms CPU bottleneck entirely since CPU is bypassed.**
