title: Prompt Injection Defense Architecture
scenario: 'Your LLM has tool-use capabilities (search, email, file access). A prompt injection through
  a web search result could trigger tool calls. Options: (A) classifier-based input filtering, (B) sandboxed
  tool execution with human-in-the-loop for sensitive actions, (C) instruction hierarchy where tool-call
  requests from user content are always rejected. Evaluate.'
question: "How would you evaluate classifier filtering, sandboxed tools, and instruction hierarchy for tool-use prompt injection?"
details:
  realistic_solution: 'Option A (classifier filtering): Catches known injection patterns but fails against
    novel attacks. Adversaries can craft injections that bypass any classifier — this is a fundamental
    limitation of detection-based defenses. Necessary but insufficient. Option B (sandboxed execution
    + HITL): All tool calls execute in a sandbox with limited permissions. Sensitive actions (email send,
    file write, external API calls) require human approval. This is an architectural defense — even if
    injection succeeds and triggers a tool call, the damage is contained. Cost: latency for human approval
    (minutes) and operational burden. Option C (instruction hierarchy): Architecturally separate ''system
    instructions'' from ''user content.'' Tool calls can only be triggered by system-level instructions,
    never by content parsed from external sources. This is the strongest defense — it makes indirect injection
    structurally impossible for tool calls. Limitation: hard to implement perfectly in current LLM architectures.
    Recommendation: C as the ideal architecture, B as the practical implementation today, A as an additional
    signal. Defense in depth: all three layers together.'
  common_mistake: Relying solely on input filtering (A). Adversarial prompt injection is an arms race
    — classifiers can always be bypassed with new phrasing. You need architectural defenses, not just
    detection.
  napkin_math: 'A alone: bypassed by novel attacks (~5-10% miss rate). B: limits blast radius even when
    A fails. C: structurally prevents tool-call injection. C+B+A: defense in depth.'
