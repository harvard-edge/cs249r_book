title: Prompt Injection Defense Architecture
scenario: 'Your LLM has tool-use capabilities. A prompt injection through a web search result could trigger tool calls.'
question: 'You must choose a defense: (A) classifier-based input filtering, (B) sandboxed tool execution with human-in-the-loop, or (C) an instruction hierarchy where tool-call requests from user content are always rejected. How would you evaluate classifier filtering, sandboxed tools, and instruction hierarchy for tool-use prompt injection?'
details:
  realistic_solution: 'Option A (classifier filtering): Catches known injection patterns but fails against novel attacks. Adversaries can craft injections that bypass any classifier — this is a fundamental limitation of detection-based defenses. Necessary but insufficient. Option B (sandboxed execution + HITL): All tool calls execute in a sandbox with limited permissions. Sensitive actions (email send, file write, external API calls) require human approval. This is an architectural defense — even if injection succeeds and triggers a tool call, the damage is contained. Cost: latency for human approval (minutes) and operational burden. Option C (instruction hierarchy): Architecturally separate ''system instructions'' from ''user content.'' Tool calls can only be triggered by system-level instructions, never by content parsed from external sources. This is the strongest defense — it makes indirect injection structurally impossible for tool calls. Limitation: hard to implement perfectly in current LLM architectures. Recommendation: C as the ideal architecture, B as the practical implementation today, A as an additional signal. Defense in depth: all three layers together.'
  common_mistake: |
    **The Pitfall:** Relying solely on input filtering (Option A) to prevent prompt injection.
    **The Rationale:** Developers often treat prompt injection as a standard malware/spam detection problem that can be solved by training a better classifier.
    **The Consequence:** Adversaries continuously craft new injections that bypass the classifier, leading to compromised systems and unauthorized tool execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A (Filtering): ~5-10% miss rate against novel attacks.
    - Option B (Sandbox + HITL): Limits blast radius.
    - Option C (Hierarchy): Structurally prevents injection.

    **Calculations:**
    - Effectiveness = 1 - (Miss Rate A * Miss Rate B * Miss Rate C).

    **Conclusion & Interpretation:**
    - **Result: Defense in Depth Required** (Combine C architectural + B containment + A detection).
