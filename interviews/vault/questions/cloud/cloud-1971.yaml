title: Diagnosing Cross-Silo Straggler Bottlenecks
scenario: A cross-silo federated learning pipeline coordinates 2,000 GPUs globally using synchronous FedAvg. The median local update takes 250ms, but the global aggregation step blocks for >6 seconds due to 2-3% of nodes experiencing transient network partitions.
question: How do you mitigate this straggler effect while preserving the statistical contribution of high-latency nodes?
details:
  realistic_solution: Implement Buffered Asynchronous Aggregation (FedBuff). The cloud aggregator updates the global model whenever a concurrency buffer of K updates fills, allowing slow clients to contribute stale updates that are incorporated with staleness-aware learning rate dampening.
  common_mistake: |
    **The Pitfall:** Switching to fully asynchronous SGD or aggressively dropping slow clients.
    **The Rationale:** Attempting to force speed over accuracy by ignoring stragglers completely.
    **The Consequence:** Destabilizing convergence due to extreme gradient staleness or introducing severe geographic bias.
  napkin_math: |
    - Synchronous step time = $\max(t_1 \dots t_N) = 6000\text{ms}$.
    - Using a concurrency buffer of $K=50$ updates out of $N$ nodes, the effective step time drops to the 50th fastest response (~300ms).
    - Training 10,000 rounds drops from 16.6 hours to 50 minutes.
    - **This is a 20× speedup while safely handling staleness.**
