title: The Multi-GPU Scaling Curve
scenario: You scale a training job from 1 to 2, 4, 8, 16, and 32 H100 GPUs using data
  parallelism. At 1 GPU, throughput is 1,000 samples/sec. Predict the throughput at
  each scale, accounting for communication overhead. The interconnect is NVLink within
  8-GPU nodes and InfiniBand (400 Gb/s) between nodes.
question: What throughput do you predict at 1, 2, 4, 8, 16, and 32 H100 GPUs with
  NVLink inside nodes and 400 Gb/s InfiniBand between nodes?
details:
  realistic_solution: Scaling efficiency = actual throughput / (N × single-GPU throughput).
    Within a node (NVLink), AllReduce is fast and overlaps well with compute. Across
    nodes (InfiniBand), bandwidth drops ~18× and latency increases, creating a scaling
    cliff at the node boundary.
  common_mistake: '"Linear scaling — 32 GPUs = 32,000 samples/sec." This ignores that
    communication overhead grows with GPU count and that crossing the node boundary
    (NVLink → InfiniBand) causes a discontinuous drop in scaling efficiency.'
  napkin_math: 'Model: 7B params, 14 GB gradients (FP16). Single-GPU step: 100 ms compute. **Intra-node (NVLink 4.0, unidirectional 450 GB/s):** Ring AllReduce time for N GPUs = 2*(N-1)/N * 14 GB / 450 GB/s. 2 GPUs: 31.1 ms; 4 GPUs: 46.7 ms; 8 GPUs: 54.4 ms. With 70% overlapped (30% exposed): exposed overheads are 2→9.3 ms, 4→14.0 ms, 8→16.3 ms. Throughput = N * 1000 * 100 / (100 + exposed). 2 GPUs: 2000 * 100 / 109.3 = 1,830 (91.5%). 4 GPUs: 4000 * 100 / 114.0 = 3,509 (87.7%). 8 GPUs: 8000 * 100 / 116.3 = 6,879 (86.0%). **Inter-node (16 GPUs, 2 nodes):** IB NDR 50 GB/s (unidirectional). Flat ring AllReduce across 16 GPUs: 2*(15/16)*14 GB / 50 GB/s = 525 ms. Exposed overhead (assuming 30% exposed) = 157.5 ms. Throughput = 16 * 1000 * 100 / (100 + 157.5) = 6,213 (38.8%). The massive drop from 450 GB/s NVLink to 50 GB/s InfiniBand creates the scaling cliff.'
