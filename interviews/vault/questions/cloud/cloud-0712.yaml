title: The Multi-GPU Scaling Curve
scenario: You scale a training job from 1 to 2, 4, 8, 16, and 32 H100 GPUs using data parallelism. At
  1 GPU, throughput is 1,000 samples/sec. Predict the throughput at each scale, accounting for communication
  overhead. The interconnect is NVLink within 8-GPU nodes and InfiniBand (400 Gb/s) between nodes.
details:
  realistic_solution: Scaling efficiency = actual throughput / (N × single-GPU throughput). Within a node
    (NVLink), AllReduce is fast and overlaps well with compute. Across nodes (InfiniBand), bandwidth drops
    ~18× and latency increases, creating a scaling cliff at the node boundary.
  common_mistake: '"Linear scaling — 32 GPUs = 32,000 samples/sec." This ignores that communication overhead
    grows with GPU count and that crossing the node boundary (NVLink → InfiniBand) causes a discontinuous
    drop in scaling efficiency.'
  napkin_math: 'Model: 7B params, 14 GB gradients (FP16). Single-GPU step: 100 ms compute. **Intra-node
    (NVLink 900 GB/s):** AllReduce time for $N$ GPUs: $2(N-1)/N \times 14\text{GB} / 900\text{GB/s}$ (bus
    bandwidth). 2 GPUs: 15.6 ms. 4 GPUs: 23.3 ms. 8 GPUs: 27.2 ms. With overlap: ~30% exposed. Effective
    overhead: 2→4.7ms, 4→7ms, 8→8.2ms. Throughput (N × 1000 × 100 / (100+overhead)): 2→1,910 (95.5%),
    4→3,738 (93.5%), 8→7,393 (92.4%). **Inter-node (InfiniBand 50 GB/s effective):** 16 GPUs (2 nodes):
    AllReduce across nodes: 14 GB / 50 GB/s = 280 ms — longer than compute! Must use hierarchical AllReduce:
    intra-node (8.2 ms) + inter-node of reduced gradients (28 ms) = 36.2 ms exposed. Throughput: 16→11,747
    (73.4%). **The NVLink→InfiniBand boundary at GPU 9 causes scaling to drop significantly.**'
