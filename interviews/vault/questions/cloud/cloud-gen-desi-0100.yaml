title: Architecting RDMA Transport for H100 Distributed Training
scenario: Architect the RDMA transport layer for a distributed training cluster composed of 128 nodes,
  where each node has 8x H100 GPUs (80 GB HBM3) connected via NVLink 4.0 (900 GB/s). Inter-node networking
  uses 8x InfiniBand NDR HCAs per node, providing 50 GB/s per port in a rail-optimized topology. Design
  the memory registration (MR) strategy, select the appropriate RDMA verbs (one-sided vs. two-sided),
  and define the buffering architecture to overlap the 900 GB/s intra-node collective phases with the
  slower 400 GB/s total inter-node bandwidth during a massive Ring All-Reduce operation.
details:
  realistic_solution: The optimal design uses one-sided RDMA Write operations directly to pre-registered
    GPU memory buffers (GPUDirect RDMA) to achieve zero-copy kernel bypass. For the rail-optimized topology,
    the architecture should pipeline the intra-node Reduce-Scatter (using NVLink) into small chunks, which
    are then pushed via RDMA Write across the IB NDR links to the corresponding rail-aligned GPU on the
    next node, hiding the slower network bandwidth behind NVLink speed.
  common_mistake: Candidates often propose two-sided Send/Recv semantics which incur CPU overhead, or
    suggest dynamically registering memory regions during the collective, which adds severe latency on
    the critical path.
  napkin_math: Total inter-node bandwidth per node = 8 ports * 50 GB/s = 400 GB/s. Intra-node NVLink bandwidth
    = 900 GB/s per GPU. For an All-Reduce of a 16 GB gradient array across N nodes, the network transfer
    volume per node is 2 * 16 GB * ((N-1)/N). Assuming large N, this is ~32 GB. Minimum network time =
    32 GB / 400 GB/s = 80 ms. By pipelining, the 900 GB/s NVLink operations (taking ~17 ms) are completely
    hidden, making the 80 ms network transfer the bounding factor.
