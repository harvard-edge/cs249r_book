title: Custom ASIC SRAM Tiling
scenario: You are writing the compiler for a new cloud NPU. The NPU has 16MB of ultra-fast SRAM (scratchpad)
  and 500GB/s HBM. Running self-attention on a sequence length of 4096 (hidden dim 1024, FP16) results
  in heavy HBM spilling. The attention block takes 45ms, severely underperforming the theoretical compute
  limit of 5ms.
details:
  realistic_solution: The latency is dominated by intermediate memory reads/writes to HBM because the
    full attention matrix does not fit in SRAM. Q, K, and V alone take up 24MB. The tradeoff is compute
    operations versus memory bandwidth. The hardware-compiler co-design solution is to implement FlashAttention-style
    tiling explicitly sized for the 16MB SRAM. By computing the softmax and attention weights in smaller
    blocks (e.g., 1024x1024 tiles), you keep the intermediate O(N^2) attention matrix entirely in SRAM.
    You trade an increase in FLOPs (recomputing the softmax denominator iteratively) for a massive reduction
    in HBM traffic, turning a memory-bound operation into an SRAM/compute-bound operation.
  common_mistake: Adding more HBM bandwidth to the chip design, which increases packaging costs and power
    consumption drastically.
  napkin_math: 'Standard attention memory: Q, K, V are each 4096 * 1024 * 2 bytes = 8MB (Total 24MB).
    Attention matrix S = 4096 * 4096 * 2 bytes = 33MB. Total memory needed = 57MB. This heavily spills
    the 16MB SRAM. Tiling to 1024x1024 blocks requires only 1024*1024*2 = 2MB for S_tile, easily fitting
    in the 16MB SRAM and preventing 33MB of HBM roundtrips.'
