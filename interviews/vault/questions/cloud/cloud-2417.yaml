title: Custom ASIC SRAM Tiling
scenario: You are writing the compiler for a new cloud NPU. The NPU has 16MB of ultra-fast SRAM and 500GB/s HBM. Running self-attention on a sequence length of 4096 (hidden dim 1024, FP16) results in heavy HBM spilling. The attention block takes 45ms, severely underperforming the theoretical compute limit of 5ms.
question: How should the compiler map self-attention for sequence length 4096 onto the 16MB SRAM to avoid HBM spilling?
details:
  realistic_solution: The latency is dominated by intermediate memory reads/writes to HBM because the full attention matrix does not fit in SRAM. Q, K, and V alone take up 24MB. The tradeoff is compute operations versus memory bandwidth. The hardware-compiler co-design solution is to implement FlashAttention-style tiling explicitly sized for the 16MB SRAM. By computing the softmax and attention weights in smaller blocks (e.g., 1024x1024 tiles), you keep the intermediate O(N^2) attention matrix entirely in SRAM. You trade an increase in FLOPs (recomputing the softmax denominator iteratively) for a massive reduction in HBM traffic, turning a memory-bound operation into an SRAM/compute-bound operation.
  common_mistake: |
    **The Pitfall:** Adding more HBM bandwidth to the chip design to solve the problem.
    **The Rationale:** Hardware solutions increase packaging costs and power consumption drastically.
    **The Consequence:** Fails to utilize efficient hardware-compiler co-design (e.g., tiling), leading to an unnecessarily expensive and power-hungry chip.
  napkin_math: |
    - **Standard Attention Memory:** Q, K, V are each 4096 * 1024 * 2 bytes = 8MB (24MB total).
    - **Attention Matrix (S):** 4096 * 4096 * 2 bytes = 32MB.
    - **Total Required:** 56MB (Spills 16MB SRAM).
    - **Tiled Approach (1024x1024):** Requires 1024 * 1024 * 2 bytes = 2MB.
    - **Final Result:** **Tiling prevents 32MB of HBM roundtrips by fitting within the 16MB SRAM.**
