title: 'Tracing vs. capture: choosing between torch.jit.trace and torch.compile for production'
scenario: Your team has an inference cluster serving a BERT-based NLP model. You need to choose between torch.jit.trace, torch.jit.script, and torch.compile for production deployment. The model has some data-dependent control flow in its tokenizer post-processing but the core transformer is static.
question: Which PyTorch graph/deployment path would you use for the static BERT transformer and data-dependent post-processing?
details:
  realistic_solution: Use torch.compile for the transformer backbone (handles dynamic shapes natively, best performance on modern hardware via TorchInductor). Use torch.jit.script for the post-processing logic with control flow (script captures all branches symbolically). Alternatively, factor the model so the traced portion has no branching. Validate with torch.jit.verify_usages() and test across diverse inputs.
  common_mistake: |
    **The Pitfall:** Using `torch.jit.trace` on a model with data-dependent control flow.
    **The Rationale:** Candidates fail to understand that tracing only records the execution path for a specific input and bakes that path into the graph.
    **The Consequence:** The deployed model silently produces incorrect results for inputs that require different execution branches in the post-processing logic.
  napkin_math: |
    * BERT-base forward at batch=32, seq=128: eager ≈ 8 ms.
    * torch.compile ≈ 4.5 ms (44% speedup from kernel fusion).
    * torch.jit.trace ≈ 5 ms.
    * For an inference service at 1000 QPS, compile saves: (8 - 4.5) ms * 1000 = **3.5 GPU-seconds/second**.
    * **Result:** This means ~3.5 fewer GPUs needed at scale.
