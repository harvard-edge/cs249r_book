title: Kubernetes Pod Affinity and GPU Bandwidth
scenario: An engineer uses Kubernetes to deploy a distributed PyTorch training job
  requesting 4 pods, each with 1 A100 GPU (80 GB HBM2e, 312 TFLOPS). The cluster nodes
  each have 8 A100s connected via NVLink 4.0 (900 GB/s). Nodes are connected to each
  other via standard 100 Gbps (12.5 GB/s) Ethernet. With default Kubernetes scheduling
  (spreading pods across 4 nodes for high availability), the training step time is
  500ms. After applying a strict `podAffinity` rule to schedule all 4 pods onto a
  single node, the step time drops to 105ms. Given a 100ms compute time per step and
  a 5 GB gradient synchronization payload, explain why the default scheduler caused
  a bottleneck and how the affinity rule resolved it.
question: Why did default Kubernetes pod spreading bottleneck training, and how did
  co-locating the 4 pods on one NVLink node fix it?
details:
  realistic_solution: The default Kubernetes scheduler prioritizes high availability
    by spreading pods across nodes, forcing the 5 GB gradient synchronization to traverse
    the slow 12.5 GB/s Ethernet network. By using pod affinity to co-locate the pods
    on a single node, the workload can utilize the intra-node NVLink 4.0 network instead.
    The engineer correctly trades off node-level high availability for a massive reduction
    in communication latency.
  common_mistake: Candidates often generally state that local communication is faster
    without quantifying the difference or recognizing that standard Kubernetes scheduling
    policies (spread for HA) fundamentally conflict with the communication topology
    needs of ML workloads.
  napkin_math: 'Inter-node (Ethernet) comms time: 5 GB / 12.5 GB/s = 400 ms. Total
    spread step time = 100 ms compute + 400 ms comms = 500 ms. Intra-node (NVLink)
    comms time: 5 GB / 900 GB/s ≈ 5.5 ms. Total co-located step time = 100 ms compute
    + 5.5 ms comms = 105.5 ms. The affinity rule eliminates ~394 ms of network overhead.'
