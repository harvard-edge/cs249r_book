title: Analyzing Activation Memory OOM at Scale
scenario: You are training a ResNet-50 model on a single NVIDIA A100 (40GB VRAM) using mixed precision.
  The model parameters (25M) and Adam optimizer states consume less than 1 GB of VRAM. At a batch size
  of 64, GPU compute utilization is only 45%. To fully saturate the GPU's tensor cores, you increase the
  batch size to 512. The job immediately crashes with a CUDA Out of Memory (OOM) error. Analyze the root
  cause of this failure given the small parameter footprint.
details:
  realistic_solution: Identify that intermediate activations saved for the backward pass scale linearly
    with batch size. To fix this, implement Gradient/Activation Checkpointing to discard and recompute
    intermediate activations, trading a 20-30% compute overhead for a massive reduction in activation
    memory, which allows the larger batch size to fit.
  common_mistake: Candidates often assume that because the model weights and optimizer states are small,
    VRAM is practically infinite, completely neglecting the memory required to store forward-pass activations
    for backpropagation.
  napkin_math: ResNet-50 forward activations consume ~110MB per image in FP16. At BS=64, activations use
    64 * 110MB ≈ 7GB. At BS=512, activations use 512 * 110MB ≈ 56.3GB. 56.3GB (Activations) + 1.0GB (Weights/Opt)
    = 57.3GB, which heavily exceeds the 40GB A100 capacity, causing the OOM.
