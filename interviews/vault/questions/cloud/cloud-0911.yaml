title: Analyzing Activation Memory OOM at Scale
scenario: You are training a ResNet-50 model on a single NVIDIA A100 using mixed precision. The model parameters (25M) and Adam optimizer states consume less than 1 GB of VRAM. At a batch size of 64, GPU compute utilization is only 45%. To fully saturate the GPU's tensor cores, you increase the batch size to 512. The job immediately crashes with a CUDA Out of Memory (OOM) error.
question: Why does ResNet-50 OOM at batch size 512 despite under 1GB of weights and optimizer state, and how would you fix it?
details:
  realistic_solution: Identify that intermediate activations saved for the backward pass scale linearly with batch size. To fix this, implement Gradient/Activation Checkpointing to discard and recompute intermediate activations, trading a 20-30% compute overhead for a massive reduction in activation memory, which allows the larger batch size to fit.
  common_mistake: |
    **The Pitfall:** Focusing purely on the size of the model parameters and optimizer states.
    **The Rationale:** The parameter footprint is heavily documented, leading engineers to ignore transient forward-pass variables.
    **The Consequence:** The memory required to store forward-pass activations for backpropagation grows linearly with batch size, resulting in an unexplained OOM wall.
  napkin_math: |
    **Assumptions & Constraints:**
    - VRAM available: 40 GB.
    - ResNet-50 forward activations: ~110MB per image in FP16.
    - Weights/Opt memory: 1.0 GB.

    **Calculations:**
    - At BS=64: activations use 64 * 110MB = 7.04 GB.
    - At BS=512: activations use 512 * 110MB = 56.32 GB.
    - Total VRAM at BS=512: 56.32 GB + 1.0 GB = 57.32 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory Capacity Bound**. 57.3 GB heavily exceeds the 40 GB A100 capacity, causing an immediate crash.
