title: NCCL AllReduce Tuning for H100 Multi-Rail InfiniBand
scenario: A 128-H100 training cluster uses 8 InfiniBand ports per node (8x400Gbps
  = 3.2Tbps/node). NCCL AllReduce achieves 85% of theoretical bandwidth. A team wants
  to improve to 95%. Profile the NCCL performance and identify tuning levers including
  NCCL_ALGO, NCCL_PROTO, and message size thresholds.
question: How would you tune NCCL_ALGO, NCCL_PROTO, and message thresholds to improve
  128-H100 AllReduce bandwidth from 85% toward 95%?
details:
  realistic_solution: 'NCCL selects algorithm based on message size: Small (<256KB):
    TREE algorithm, LL (low latency) protocol. Medium (256KB-8MB): RING with LL128
    protocol. Large (>8MB): RING with SIMPLE protocol. For 100B param gradient (400GB):
    use RING+SIMPLE. NCCL_BUFFSIZE controls chunk size — larger buffers reduce pipeline
    overhead. Set NCCL_BUFFSIZE=67108864 (64MB) for large messages. Multi-rail: NCCL_NET_PLUGIN
    for stripe across 8 IB rails. Key tuning: NCCL_CROSS_NIC=1 (enable cross-NIC communication),
    NCCL_IB_QPS_PER_CONNECTION=4 (4 QPs per rail for throughput). Expected improvement:
    85%->93% with tuned settings.'
  common_mistake: Assuming default NCCL settings are optimal for all message sizes;
    not knowing that NCCL switches algorithms based on NCCL_ALGO and message size
    thresholds.
  napkin_math: 'Theoretical: 8x400Gbps=3.2Tbps/node=400GB/s/node. At 85%: 340GB/s
    effective. 400GB gradients ring over 16 nodes: time=2x15/16x400GB/340GB/s=2.2s.
    At 95%: 380GB/s -> 2.0s. Improvement: 0.2s/step. At 1000 steps/day: 200s=3.3min
    saved/day. Small but compounds over weeks of training.'
