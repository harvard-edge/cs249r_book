title: Google TPU v5e Thermal Limits and Sustained Performance Recall
scenario: A Google TPU v5e executes long-duration, high-intensity workloads that reveal a gap between its peak burst performance and sustained performance. Ambient temperature increases further impact these operational limits.
question: What thermal mechanisms limit TPU v5e burst vs sustained BF16 performance, and how would higher ambient temperature affect them?
details:
  realistic_solution: To ensure stable and predictable performance, ML engineers should monitor TPU temperature and power consumption, especially during workload profiling. Implementing dynamic workload management, such as batching adjustments or introducing brief idle periods, can help manage heat generation. Optimizing models for lower computational intensity when possible, or strategically utilizing data center cooling to maintain lower ambient temperatures, are key strategies. Understanding the TPU's thermal envelope and designing workloads within its sustained power limits is crucial for continuous operation.
  common_mistake: |
    **The Pitfall:** Assuming published peak TFLOPS represents achievable indefinite performance.
    **The Rationale:** Engineers often overlook thermal constraints and the difference between burst and sustained execution.
    **The Consequence:** Burst performance is only achievable for short durations before thermal throttling reduces clock speeds and power draw, leading to missed performance targets.
  napkin_math: |
    - **Peak performance:** 197 TFLOPS BF16.
    - **Thermal throttling reduction:** Reduces sustained performance by 20-30% under continuous load.
    - **Sustained performance:** 197 TFLOPS * (1 - 0.25) = **~147.75 TFLOPS BF16**.
    - **Ambient increase:** A 5°C increase in ambient temperature might further reduce sustained performance by 5-10%.
