title: Evaluating Staged Pipeline Bottlenecks
scenario: 'You are architecting a staged training pipeline for a vision model on a DGX A100 node (8x A100
  GPUs, 2x 64-core CPUs, PCIe Gen4). The pipeline overlaps Data Loading (CPU), Host-to-Device Transfer
  (PCIe), and Computation (GPU). For a batch of 256 images per GPU, the stage times are: CPU augmentation
  takes 80ms (using 16 dedicated CPU cores per GPU), H2D transfer takes 5ms, and GPU computation takes
  65ms. You must evaluate how to improve throughput. Options: A) Upgrade to a PCIe Gen5 system, B) Increase
  PyTorch `num_workers` to 32 per GPU, or C) Offload augmentation to the GPU via NVIDIA DALI.'
details:
  realistic_solution: 'Evaluate the pipeline using the bottleneck: max(T_cpu, T_h2d, T_gpu) = 80ms. CPU
    augmentation is the bottleneck. The node only has 128 CPU cores, so 16 cores/GPU already maxes out
    the CPU. The correct architectural decision is C) Offload augmentation to the GPU via DALI, shifting
    the bottleneck to the GPU and maximizing hardware utilization.'
  common_mistake: 'Candidates incorrectly evaluate the system limits: they either recommend upgrading
    PCIe (ignoring that H2D is not the bottleneck) or suggest doubling num_workers to 32 per GPU (which
    would require 256 CPU cores, exceeding the 128 available physical cores and causing severe context
    switching degradation).'
  napkin_math: Pipeline latency = max(80ms CPU, 5ms PCIe, 65ms GPU) = 80ms. GPU utilization = 65/80 =
    81%. Increasing workers to 32 requires 32*8=256 cores (system has 128). Upgrading to PCIe Gen5 halves
    H2D to 2.5ms but Pipeline latency remains max(80, 2.5, 65) = 80ms. Offloading to GPU (DALI) changes
    it to max(~5ms CPU, 5ms PCIe, ~70ms GPU) = 70ms, yielding a 14% throughput gain.
