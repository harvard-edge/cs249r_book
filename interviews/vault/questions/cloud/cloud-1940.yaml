title: Evaluating Staged Pipeline Bottlenecks
scenario: You are architecting a staged training pipeline for a vision model on a DGX A100 node (8x A100 GPUs, 2x 64-core CPUs, PCIe Gen4). The pipeline overlaps Data Loading (CPU), Host-to-Device Transfer (PCIe), and Computation (GPU). For a batch of 256 images per GPU, the stage times are: CPU augmentation takes 80ms (using 16 dedicated CPU cores per GPU), H2D transfer takes 5ms, and GPU computation takes 65ms.
question: Which throughput improvement option—PCIe Gen5, more num_workers, or GPU DALI augmentation—should you choose, and why?
details:
  realistic_solution: 'Evaluate the pipeline using the bottleneck: max(T_cpu, T_h2d, T_gpu) = 80ms. CPU augmentation is the bottleneck. The node only has 128 CPU cores, so 16 cores/GPU already maxes out the CPU. The correct architectural decision is C) Offload augmentation to the GPU via DALI, shifting the bottleneck to the GPU and maximizing hardware utilization.'
  common_mistake: |
    **The Pitfall:** Suggesting an increase to `num_workers` or upgrading to PCIe Gen5.
    **The Rationale:** Candidates fail to evaluate the node's hard physical limits (128 total physical CPU cores) or misidentify the bottleneck stage.
    **The Consequence:** Increasing `num_workers` would require 256 cores, causing severe context switching degradation; upgrading PCIe fixes a stage (5ms) that isn't the bottleneck.
  napkin_math: |
    *   **Current Bottleneck:** Pipeline latency = $\max(80\text{ms}, 5\text{ms}, 65\text{ms})$ = **80ms** (CPU Bound).
    *   **GPU Utilization:** $65 / 80 =$ **81%**.
    *   **Option A (PCIe Gen5):** H2D drops to 2.5ms. Latency = $\max(80, 2.5, 65)$ = 80ms (No gain).
    *   **Option B (32 Workers):** Requires $32 \times 8 = 256$ CPU cores. Node only has 128. Results in thrashing.
    *   **Option C (GPU DALI):** Shifts aug to GPU. Latency = $\max(\sim5\text{ms}, 5\text{ms}, \sim70\text{ms})$ = **70ms**.
    *   **Result:** Option C yields a $\sim$**14% throughput gain**.
