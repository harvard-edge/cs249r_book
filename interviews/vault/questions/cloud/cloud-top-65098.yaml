title: Recall Metric Selection for Production Retrieval Evaluation
scenario: A retrieval team uses Recall@100 as their primary offline metric. An engineer proposes switching
  to NDCG@20 to better align with the final ranking stage output. Another proposes Hit Rate@10. Compare
  these metrics for retrieval evaluation.
question: "How would you compare Recall@100, NDCG@20, and Hit Rate@10 for evaluating the retrieval stage?"
details:
  realistic_solution: 'Metric comparison: (1) Recall@K: measures fraction of relevant items that appear
    in top-K retrieved. Directly evaluates retrieval''s job: ensure relevant items are available for downstream
    ranking. K should match the number of items passed to the next stage. If retrieval passes 10K to light
    ranker: Recall@10K is the correct metric. Limitation: treats all relevant items equally regardless
    of rank within the retrieved set. (2) NDCG@K: measures ranking quality. For retrieval, ordering within
    the top-K matters only if you are doing weighted retrieval (e.g., pre-ranked retrieval). Standard
    ANN retrieval does not guarantee order within top-K. NDCG@K is more appropriate for the ranker, not
    retrieval. (3) Hit Rate@K: measures whether at least one relevant item appears in top-K. Useful for
    ''at least one good recommendation'' SLA. Less informative for multi-item recommendation (hit rate
    is 1 even if only 1 relevant item is retrieved). (4) Recommendation: use Recall@K where K = retrieval
    output size. Additionally report Mean Reciprocal Rank (MRR) within the retrieved set if retrieval
    returns a ranked list.'
  common_mistake: 'Using final ranking metrics (NDCG@20) to evaluate retrieval quality. NDCG@20 requires
    knowing the relevance of each item in the top-20 final output, which depends on the ranker as well
    as the retrieval. Retrieval should be evaluated on its own objective: did it find relevant items for
    the ranker to consider?'
  napkin_math: 'Recall@10K = 0.70 (current system). If the ranker converts 70% of relevant retrieved items
    into top-20 clicks: final NDCG improvement from improving retrieval recall from 70% to 90% is proportional:
    20%/70% = 28.6% more relevant items available = ~28.6% * ranker_efficiency improvement in final NDCG.
    Ranker efficiency (fraction of retrieved relevants that make it to top-20): if 10K retrieved, 70%
    relevant = 7000 relevant. Final 20 slots: 20/7000 = 0.3% selection rate from retrieved relevants.
    With 90% recall: 9000 relevant, same selection rate: top-20 quality similar (selection not recall-limited
    at this K). Conclusion: improving Recall@10K from 70% to 90% has minimal impact if 7000 relevant items
    already saturate the ranker''s capacity.'
