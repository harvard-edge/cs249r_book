title: The W16A8 Quantization Trap
scenario: Your team is optimizing a 70B parameter LLM for single-batch autoregressive decoding on an H100 GPU (3.35 TB/s, 989 TFLOPS FP16, 1978 TOPS INT8). They implement W16A8 quantization (weights remain FP16, activations are dynamically quantized to INT8) to leverage the 2x faster INT8 Tensor Cores. They expect a noticeable decrease in token generation latency. Instead, latency remains at exactly ~42ms per token, with a slight CPU overhead increase.
question: "Why does W16A8 quantization fail to reduce batch-1 TPOT for the 70B model on H100, and what quantization would help?"
details:
  realistic_solution: The failure occurs because autoregressive decoding at batch size 1 is fundamentally weight-memory-bandwidth bound, not compute-bound. The arithmetic intensity of BS=1 decoding is approximately 1 FLOP/byte. The H100's ridge point for FP16 is ~295 FLOPs/byte (989 T / 3.35 T). Since 1 << 295, the time is entirely dictated by reading the weights from HBM. Because the implementation used W16A8, the weights are still stored and loaded in FP16. The memory traffic (140GB) is completely unchanged. Speeding up the math units from 989 TFLOPS to 1978 TOPS does absolutely nothing for end-to-end latency because the SMs were already starved for data. To speed up BS=1 decoding, you must use Weight-Only Quantization (e.g., W8A16 or W4A16) to reduce the memory payload.
  common_mistake: |
    **The Pitfall:** Assuming that doubling compute throughput (TOPS) via activation quantization speeds up all operations.
    **The Rationale:** Failing to apply the roofline model to understand whether a specific phase of inference is compute-bound or memory-bandwidth bound.
    **The Consequence:** Implementing W16A8 quantization for a memory-bound task, achieving zero latency reduction while adding overhead.
  napkin_math: |
    1. **FP16 Memory Time:** 70B params * 2 bytes = 140 GB. 140 GB / 3.35 TB/s = 41.7 ms.
    2. **FP16 Compute Time:** 140 GFLOPs / 989 TFLOPS = 0.14 ms.
    3. **Total FP16 Time:** max(41.7, 0.14) = 41.7 ms (Memory Bound).
    4. **W16A8 Compute Time:** 140 GFLOPs / 1978 TOPS = 0.07 ms.
    5. **Total W16A8 Time:** max(41.7, 0.07) = 41.7 ms.
    6. **Conclusion:** **Because weights remain in FP16, the 140 GB memory transfer is unchanged, so W16A8 provides exactly 0% latency improvement.**
