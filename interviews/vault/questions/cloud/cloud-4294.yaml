title: Prefill Stall During Decode Migration
scenario: After deploying disaggregated serving, you observe that TTFT is fine at P50 (120 ms) but P99 TTFT spikes to 4 seconds intermittently. Profiling shows the spikes correlate with periods when all decode GPUs have high memory utilization. There are no network errors.
question: What causes intermittent 4-second P99 TTFT spikes when decode GPUs have high memory utilization, and how would you fix it?
details:
  realistic_solution: |
    When all decode GPUs are at high memory utilization, new KV-cache blocks from completed prefills cannot be placed because the decode pool has no free HBM. The prefill GPU finishes work and waits, holding the request in a "prefill stall". The fix is back-pressure signaling: the decode pool must advertise free KV-block capacity to the prefill scheduler, throttling new prefills when decode-side free capacity falls below a threshold.
  common_mistake: |
    **The Pitfall:** Blaming network congestion or KV transfer failures.
    **The Rationale:** Candidates ignore the correlation with decode memory utilization, which is the key signal distinguishing a stall from a network drop.
    **The Consequence:** Wasted time debugging RDMA/network fabrics while the system continues to experience hard stalls under load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model, FP16, Tensor Parallel = 2.
       - Sequence length: 4096 tokens.
       - Free KV pool per GPU: ~10 GB.
    2. **Calculations:**
       - True KV cache per request = 2 * 8 * 128 * 4096 * 80 * 2B ≈ 1.34 GB.
       - With TP=2, per GPU KV size = ~0.67 GB.
       - Capacity = 10 GB / 0.67 GB ≈ 14 concurrent sequences.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Stall).** Throttling at 12 slots (~85% watermark) prevents the 4-second stall.
