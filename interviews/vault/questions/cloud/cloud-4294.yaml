title: Prefill Stall During Decode Migration
scenario: After deploying disaggregated serving, you observe that TTFT is fine at
  P50 (120 ms) but P99 TTFT spikes to 4 seconds intermittently. Profiling shows the
  spikes correlate with periods when all decode GPUs have high memory utilization.
  There are no network errors. Diagnose the root cause and propose a fix.
question: What causes intermittent 4-second P99 TTFT spikes when decode GPUs have
  high memory utilization, and how would you fix it?
details:
  realistic_solution: 'When all decode GPUs are at high memory utilization, new KV-cache
    blocks from completed prefills cannot be placed — the decode pool has no free
    HBM to accept the transfer. The prefill GPU finishes work and then waits, holding
    the request in limbo (the ''prefill stall''). The prefill GPU is effectively blocked:
    it cannot start the next prefill because the current request''s KV-cache has nowhere
    to go. The fix is back-pressure signaling: the decode pool advertises free KV-block
    capacity to the prefill scheduler. The prefill scheduler throttles new prefills
    when decode-side free capacity falls below a threshold (e.g., 2× the max KV size
    of a single request). This converts a hard stall into a controlled queue.'
  common_mistake: Blaming network congestion or KV transfer failures. The correlation
    with decode memory utilization is the key signal — network errors would show different
    patterns.
  napkin_math: If a decode GPU has 80 GB HBM, model weights for 70B at FP16 = 140
    GB (needs 2 GPUs for tensor parallel), so per-GPU weight footprint ≈ 70 GB. Free
    KV pool ≈ 10 GB. At 4096 tokens, the true KV cache per request = 2 × 8 × 128 ×
    4096 × 96 × 2B ≈ 1.61 GB, and with TP=2 per GPU = ~0.8 GB per GPU. The pool holds
    ~10GB / 0.8GB ≈ 12 concurrent sequences. Throttle at 10 slots (83% watermark)
    to prevent stall.
