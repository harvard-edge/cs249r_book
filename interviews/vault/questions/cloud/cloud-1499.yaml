title: Evaluating the Learnability Gap
scenario: 'Your team is training a foundation model on 5 million high-res (1024x1024x3) satellite images
  using a cluster of 256 H100 GPUs. A researcher proposes a massive 100-layer flat Multi-Layer Perceptron
  (MLP) with 50B parameters, citing the Universal Approximation Theorem. They argue it has strictly higher
  theoretical capacity than a 5B parameter Vision Transformer (ViT) and will yield higher accuracy given
  your massive compute budget. Evaluate this proposal: why will the MLP fail in practice despite its capacity,
  and how do you quantitatively justify choosing the ViT?'
details:
  realistic_solution: Reject the MLP due to the learnability gap. While the MLP can theoretically represent
    any function, its lack of inductive biases (like translation invariance or attention over patches)
    makes its optimization landscape practically intractable with finite data. The ViT intentionally restricts
    the theoretical hypothesis space to make the model actually optimizable via SGD.
  common_mistake: Assuming that theoretical representational capacity guarantees practical convergence,
    and ignoring the massive sample complexity required to learn spatial invariants without structural
    inductive biases.
  napkin_math: For a 1024x1024x3 image (3.14M inputs), an MLP's first dense layer to just 8192 hidden
    units requires (3.14e6 * 8192) ≈ 25.7 Billion weights in layer 1 alone. The model must independently
    learn to recognize a tractor at coordinate (0,0) and (100,100), effectively requiring O(Pixels^2)
    more data. A ViT splits this into 4096 (16x16) patches, applying a shared projection matrix and attention,
    reducing sample complexity requirements by orders of magnitude.
