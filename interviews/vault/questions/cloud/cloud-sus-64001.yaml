title: PUE Decomposition for Dense H100 Clusters
scenario: Your team is reviewing datacenter efficiency metrics for a 1,000-node H100 cluster. The facility
  reports a PUE of 1.4. Each 8×H100 node draws 8 kW IT load. Calculate the total facility power consumption,
  identify the overhead power consumed by non-IT infrastructure, and explain what PUE components (cooling,
  power distribution, lighting) typically dominate in a GPU-dense facility versus a traditional compute
  facility.
details:
  realistic_solution: IT load = 1,000 nodes × 8 kW = 8 MW. Total facility power = 8 MW × 1.4 = 11.2 MW.
    Overhead = 11.2 - 8.0 = 3.2 MW. In GPU-dense clusters, cooling systems (chillers, CRAC/CRAH units,
    CDUs for liquid-cooled racks) typically represent 60-75% of the overhead versus ~45% in traditional
    compute. Power distribution losses (UPS, PDUs, transformers) are similar at 15-25%. Reducing PUE from
    1.4 to 1.2 would save 1.6 MW of overhead, equivalent to running ~200 additional nodes.
  common_mistake: Candidates multiply IT load by PUE instead of understanding PUE = Total Facility Power
    / IT Load, so they compute the overhead fraction incorrectly. Another error is assuming cooling dominates
    equally in all facilities—GPU clusters generate 3-5× the heat density of traditional servers, making
    cooling a larger fraction of PUE overhead.
  napkin_math: 'IT Load: 1,000 × 8 kW = 8,000 kW = 8 MW. Total Facility: 8 MW × 1.4 = 11.2 MW. Overhead:
    3.2 MW. PUE 1.2 scenario: Total = 8 × 1.2 = 9.6 MW. Savings vs PUE 1.4: 11.2 - 9.6 = 1.6 MW. Equivalent
    nodes: 1,600 kW / 8 kW = 200 nodes of free capacity. At $0.10/kWh, 1.6 MW continuous = $1.4M/year
    saved.'
