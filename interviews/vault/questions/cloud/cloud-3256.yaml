title: AMD MI300X HBM/Compute Bottleneck and Cost Analysis for LLM Inference
scenario: 'You are designing an inference service for a large language model (LLM)
  on an AMD MI300X GPU. The model has an FP16 precision, requires 100 TFLOPs of computation
  per inference, and has an active memory footprint of 100 GB. Each inference involves
  reading the 100 GB model data from HBM.


  The AMD MI300X offers:

  *   1,300 TFLOPS FP16 dense performance (assume 50% utilization efficiency for dense operations).

  *   192 GB HBM3.

  *   5.3 TB/s peak memory bandwidth.

  *   The operational cost for an AMD MI300X GPU is $30 per hour.


  Analyze the primary bottleneck (compute or memory bandwidth) for maximizing inference
  throughput. Then, calculate the theoretical maximum inferences per second and the
  corresponding cost per inference ($) based on this bottleneck.'
question: Is the 100 TFLOP, 100 GB-per-inference MI300X service compute-bound or memory-bound,
  and what are the max inferences/sec and cost/inference?
details:
  realistic_solution: '1.  **Compute Throughput:** Effective dense FP16 TFLOPS = 1,300
    TFLOPS dense * 0.5 = 650 TFLOPS. Compute inferences/second = 650 TFLOPS /
    100 TFLOPs/inference = 6.5 inferences/second.

    2.  **Memory Bandwidth Throughput:** Memory bandwidth = 5.3 TB/s = 5300 GB/s.
    Data read per inference = 100 GB. Memory inferences/second = 5300 GB/s / 100 GB/inference
    = 53 inferences/second.

    3.  **Identify Bottleneck:** Compute is the primary bottleneck (~6.5 inferences/second)
    as it''s lower than memory (53 inferences/second).

    4.  **Maximum Inferences/Second:** ~6.5 inferences/second.

    5.  **Cost per Inference:** Inferences per hour = 6.5 inferences/second * 3600
    seconds/hour = 23,400 inferences/hour. Cost per inference = $30/hour / 23,400
    inferences/hour \approx $0.00128 per inference.'
  common_mistake: Incorrectly assuming either compute or memory bandwidth is the bottleneck
    without calculation; not accounting for the utilization efficiency factor for
    FP16 TFLOPS; errors in unit conversion (TFLOPs to TFLOPS, TB/s to GB/s, seconds
    to hours); miscalculating cost per inference by dividing total cost by an incorrect
    throughput.
  napkin_math: '1. Compute Capacity (TFLOPS_effective) = Peak_TFLOPS_dense * Compute_Efficiency.

    2. Compute Inferences/s = TFLOPS_effective / TFLOPs_per_inference.

    3. Memory Bandwidth (GB/s) = Peak_Bandwidth (TB/s) * 1000.

    4. Memory Inferences/s = Memory_Bandwidth (GB/s) / Data_per_inference (GB).

    5. Bottleneck Inferences/s = MIN(Compute Inferences/s, Memory Inferences/s).

    6. Inferences/hour = Bottleneck_Inferences/s * 3600.

    7. Cost/Inference = Hourly_Rate / Inferences/hour.'
