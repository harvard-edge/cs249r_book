title: Decode Pool Autoscaling Lag
scenario: Your decode pool autoscales based on average TPOT over a 60-second window.
  During traffic ramps, TPOT degrades for 2-3 minutes before new decode instances
  warm up and register. Propose a leading indicator metric that would trigger autoscaling
  before TPOT degrades, and quantify the improvement in worst-case SLO violation duration.
question: What leading indicator should trigger decode autoscaling before TPOT degrades,
  and how much would it reduce SLO violation duration?
details:
  realistic_solution: 'TPOT is a lagging indicator — by the time it degrades, the
    decode queue is already backed up. The leading indicator is decode queue depth
    (number of in-flight sequences waiting for their next token step). When this exceeds
    a threshold — e.g., 80% of the decode pool''s maximum concurrent sequence capacity
    — autoscaling triggers immediately. A secondary signal is the ratio of prefill
    completions per second to decode token emissions per second: if prefill output
    rate > decode absorption rate, the decode queue will grow. Set the autoscale trigger
    at queue_depth > 0.7 × max_capacity. GPU warm-up takes ~90 s (model load + NCCL
    init). Old SLO violation window: 180 s. With leading indicator at 70% queue depth,
    trigger fires ~30 s before degradation onset. New violation window: max(0, 90
    - 30) = 60 s — a 67% reduction. On MI300X decode nodes (192 GB HBM), the larger
    KV pool (52 GB vs 10 GB on H100 TP=1) increases time-to-saturation, giving more
    lead time before the leading indicator fires.'
  common_mistake: Using CPU/memory utilization as the leading indicator — decode is
    GPU-bound and CPU metrics lag or are irrelevant. Using instantaneous TPOT P50
    instead of a leading queue metric.
  napkin_math: 'If peak traffic grows at 20% per minute and queue fills in 90 s, leading
    indicator at 70% capacity fires at 90×0.7/1.0 = 63 s before saturation. Warm-up
    = 90 s. Net: we''re 63 s early but warm-up takes 90 s, so we still have a 27 s
    exposure window vs 90 s before — a 70% reduction in SLO violation duration.'
