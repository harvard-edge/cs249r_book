title: Decode Pool Autoscaling Lag
scenario: Your decode pool autoscales based on average TPOT over a 60-second window.
  During traffic ramps, TPOT degrades for 2-3 minutes before new decode instances
  warm up and register. Propose a leading indicator metric that would trigger autoscaling
  before TPOT degrades, and quantify the improvement in worst-case SLO violation duration.
question: What leading indicator should trigger decode autoscaling before TPOT degrades,
  and how much would it reduce SLO violation duration?
details:
  realistic_solution: 'TPOT is a lagging indicator — by the time it degrades, the
    decode queue is already backed up, and the 60-second averaging window delays the
    trigger further. The leading indicator is decode queue depth (number of in-flight
    sequences waiting for their next token step). Set the autoscale trigger
    at queue_depth > 0.7 × max_capacity. Old system: TPOT degrades at saturation, triggers 60s
    later, then 90s warm-up = 150s of SLO violation. New system: queue hits 70% and
    triggers ~27s before saturation. New nodes arrive 90s after trigger, which is only
    63s after saturation (90s warm-up - 27s lead time = 63s violation). This reduces
    the SLO violation window from 150s to 63s (a 58% reduction).'
  common_mistake: Using CPU/memory utilization as the leading indicator — decode is
    GPU-bound and CPU metrics lag or are irrelevant. Using instantaneous TPOT P50
    instead of a leading queue metric.
  napkin_math: 'Assume queue fills in 90s. Saturation occurs at t=90s.
    Old system: 60s TPOT average delays trigger to t=150s. 90s warm-up means capacity
    arrives at t=240s. Violation window = 240s - 90s = 150s.
    New system: 70% queue depth triggers instantly at t=63s (27s lead time). 90s warm-up
    means capacity arrives at t=153s. Violation window = 153s - 90s = 63s.
    Reduction: 63s vs 150s = 58% reduction in SLO violation duration.'
