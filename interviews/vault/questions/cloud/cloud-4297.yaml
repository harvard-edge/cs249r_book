title: Decode Pool Autoscaling Lag
scenario: Your decode pool autoscales based on average TPOT over a 60-second window. During traffic ramps, TPOT degrades for 2-3 minutes before new decode instances warm up and register.
question: What leading indicator should trigger decode autoscaling before TPOT degrades, and how much would it reduce SLO violation duration?
details:
  realistic_solution: 'TPOT is a lagging indicator — by the time it degrades, the decode queue is already backed up, and the 60-second averaging window delays the trigger further. The leading indicator is decode queue depth (number of in-flight sequences waiting for their next token step). Set the autoscale trigger at queue_depth > 0.7 × max_capacity. Old system: TPOT degrades at saturation, triggers 60s later, then 90s warm-up = 150s of SLO violation. New system: queue hits 70% and triggers ~27s before saturation. New nodes arrive 90s after trigger, which is only 63s after saturation (90s warm-up - 27s lead time = 63s violation). This reduces the SLO violation window from 150s to 63s (a 58% reduction).'
  common_mistake: |
    **The Pitfall:** Maximizing chunk size strictly to minimize TTFT or using lagging metrics for autoscaling.
    **The Rationale:** Candidates fail to realize large chunks starve concurrent decode requests, and they use TPOT as a trigger instead of a queue metric.
    **The Consequence:** Autoscaling triggers too late, resulting in extended SLA violations for end users.
  napkin_math: |
    1. **Old System (TPOT Lag):** 60s averaging + 90s warm-up = 150s violation window.
    2. **New System (Queue Lead):** 70% queue depth triggers at t=63s (27s lead time).
    3. **New Violation:** 153s capacity arrival - 90s saturation = 63s.
    4. **Result:** A **58% reduction** in SLO violation duration.
