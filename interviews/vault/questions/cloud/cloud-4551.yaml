title: HBM Sharding for MoE Serving
scenario: An 8-GPU H100 SXM node (80GB HBM3 each) serves an 8x100B parameter MoE model. Traffic patterns show 90% of requests route to just 2 specific experts.
question: Propose a memory sharding and offloading strategy to maximize throughput for the skewed traffic while supporting full model routing.
details:
  realistic_solution: |
    The model in FP16 requires 1.6 TB, vastly exceeding the 640 GB total HBM3. You should pin the 2 hot experts (200B params = 400 GB) directly in the GPUs' HBM3 using tensor parallelism. The remaining 6 cold experts (1.2 TB) must be offloaded to CPU RAM and fetched dynamically via PCIe Gen5 when the 10% routing requests them.
  common_mistake: |
    **The Pitfall:** Attempting to fit the entire model using naive pipeline parallelism or ignoring the extreme capacity limits of 640GB.
    **The Rationale:** Candidates overlook that the model requires 1.6 TB in FP16, which is far beyond the cluster's physical HBM capacity.
    **The Consequence:** Catastrophic out-of-memory errors on deployment or complete inability to serve the model.
  napkin_math: |
    - **Total HBM Available:** 8 GPUs * 80GB = **640GB**.
    - **Total Model Size:** 800B parameters * 2 bytes (FP16) = **1600GB** (Does not fit).
    - **Hot Experts Size:** 2 experts * 100B params * 2 bytes = **400GB**.
    - **Strategy:** 400GB easily fits in the 640GB HBM. Pin the 2 hot experts in HBM, offload the remaining 1200GB (6 experts) to CPU RAM via PCIe Gen5 for the 10% rare traffic.
