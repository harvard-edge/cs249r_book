title: HBM Sharding for MoE Serving
scenario: An 8-GPU H100 SXM node (80GB HBM3 each) serves an 8x100B parameter MoE model.
  Traffic patterns show 90% of requests route to just 2 specific experts.
question: Propose a memory sharding and offloading strategy to maximize throughput
  for the skewed traffic while supporting full model routing.
details:
  realistic_solution: The model in FP16 requires 1.6 TB, vastly exceeding the 640
    GB total HBM3. You should pin the 2 hot experts (200B params = 400 GB) directly
    in the GPUs' HBM3 using tensor parallelism. The remaining 6 cold experts (1.2
    TB) must be offloaded to CPU RAM and fetched dynamically via PCIe Gen5 when the
    10% routing requests them.
  common_mistake: Attempting to fit the entire model using naive pipeline parallelism
    or ignoring the extreme capacity limits of 640GB.
  napkin_math: 8 * 80 = 640GB < 1600GB. 2 hot experts = 400GB fits in HBM.
