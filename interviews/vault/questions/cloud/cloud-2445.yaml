title: FlashAttention Head Dimension Spillage
scenario: 'A researcher designs a custom Transformer. They change the attention head dimension from d=128 to d=256, while halving the number of heads to keep the total hidden dimension and FLOPs exactly identical to the baseline. Despite using FlashAttention-2 and identical FLOP counts, the training step time increases by 45%.'
question: Why does doubling the attention head dimension from 128 to 256 slow FlashAttention-2 training by 45% despite identical FLOPs?
details:
  realistic_solution: The root cause is SRAM capacity overflow leading to a degradation in effective arithmetic intensity. FlashAttention tiles the Q, K, and V blocks into the fast but limited SRAM on the GPU's Streaming Multiprocessors (SMs). When d is doubled to 256, the minimum memory required for a single token's Q, K, V vectors doubles. To fit within the strict 228KB SRAM limit of an H100 SM, the block size must be significantly reduced, drastically increasing the number of times the K and V matrices are read from HBM.
  common_mistake: |
    **The Pitfall:** Assuming that identical FLOP counts guarantee identical performance.
    **The Rationale:** Candidates forget to consider the strict SRAM capacity constraints of fused kernels like FlashAttention.
    **The Consequence:** Deploying suboptimal model dimensions that silently spill to HBM and bottleneck training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fixed SRAM size = 228KB (H100 SM).
       - Head dimension (d) doubles from 128 to 256.
    2. **Calculations:**
       - HBM traffic scales as O(N² * d / M).
       - With d doubling, the minimum memory for vectors doubles.
       - SRAM capacity forces drastically smaller block sizes, doubling HBM reads/writes.
    3. **Conclusion & Interpretation:**
       - **Result: Effective Arithmetic Intensity drops by 50% (SRAM-Capacity-Bound).**
