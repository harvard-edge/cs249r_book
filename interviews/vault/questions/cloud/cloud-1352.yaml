title: Diagnosing Power Discrepancies in Sub-second Inference
scenario: Your team is profiling the energy consumption of a micro-batched LLM inference service running
  on H100 GPUs. The service processes requests with an average latency of 15ms. Using `nvidia-smi` at
  a 100ms polling interval, the team calculates an average power draw of 300W per GPU. However, datacenter-level
  PDU (Power Distribution Unit) metrics indicate the nodes are drawing significantly more power than the
  sum of these software estimates, leading to tripped rack breakers. Diagnose the root cause of this discrepancy.
question: "Why do 100 ms nvidia-smi samples report 300 W while the PDU shows much higher node power for 15 ms inference bursts?"
details:
  realistic_solution: Diagnose the issue as temporal aliasing. `nvidia-smi` takes instantaneous power
    snapshots. To debug and accurately profile, query the dedicated on-chip hardware power counters (e.g.,
    via NVML's high-resolution energy metrics or Intel RAPL) which integrate total joules consumed at
    microsecond resolution directly in hardware.
  common_mistake: Candidates often attribute the discrepancy to power supply inefficiency (PUE) or CPU
    overhead, failing to realize that low-frequency software polling aliases over rapid, high-power GPU
    transients during inference.
  napkin_math: 'Inference takes 15ms: 5ms matrix multiply (700W spike) and 10ms memory read (200W). True
    energy per request = (700W * 0.005s) + (200W * 0.010s) = 5.5 Joules. Average true power = 5.5J / 0.015s
    = 366W. If the 100ms `nvidia-smi` snapshot consistently lands during the 10ms memory phase due to
    synchronization or aliasing, it reports an instantaneous 200W, severely underestimating the true 366W
    thermal load and 700W transients.'
