title: Diagnosing Power Discrepancies in Sub-second Inference
scenario: Your team is profiling the energy consumption of a micro-batched LLM inference service running on H100 GPUs. The service processes requests with an average latency of 15ms. Datacenter-level PDU metrics indicate the nodes are drawing significantly more power than the sum of `nvidia-smi` estimates (sampled at 100ms), leading to tripped rack breakers.
question: Why do 100ms nvidia-smi samples report 300W while the PDU shows much higher node power for 15ms inference bursts?
details:
  realistic_solution: Diagnose the issue as temporal aliasing. `nvidia-smi` takes instantaneous power snapshots. To debug and accurately profile, query the dedicated on-chip hardware power counters (e.g., via NVML's high-resolution energy metrics or Intel RAPL) which integrate total joules consumed at microsecond resolution directly in hardware.
  common_mistake: |
    **The Pitfall:** Relying on low-frequency software polling (like default `nvidia-smi`) for sub-second workloads.
    **The Rationale:** Attributing power discrepancies to PUE or CPU overhead without realizing that software polling completely misses rapid, high-power GPU transients.
    **The Consequence:** Under-provisioning rack power capacity, resulting in tripped breakers, hardware throttling, and unexpected datacenter outages.
  napkin_math: |
    - **Inference Profile**: 15ms total (5ms matrix multiply @ 700W + 10ms memory read @ 200W).
    - **True Energy per Request**: (700W × 0.005s) + (200W × 0.010s) = 3.5J + 2.0J = 5.5 Joules.
    - **True Average Power**: 5.5J / 0.015s = **366W**.
    - **Aliasing Effect**: If the 100ms `nvidia-smi` snapshot consistently lands during the 10ms memory phase (due to sync/aliasing), it reports 200W.
    - **Result**: Software polling severely underestimates both the true 366W average thermal load and the massive 700W transient spikes.
