title: The CapEx vs. OpEx Blind Spot
scenario: Your team is considering purchasing a small, dedicated 8-GPU pod of H100s for a three-year research
  project instead of using on-demand cloud instances. As the Staff Engineer, you're asked to calculate
  the estimated 3-year Total Cost of Ownership (TCO) to inform the 'build vs. buy' decision. You are given
  an electricity cost of $0.12/kWh. Using the standard hardware constants, what is the approximate TCO
  for this pod?
question: "Using the standard hardware constants, what is the approximate TCO for this pod?"
details:
  realistic_solution: The TCO is the sum of the initial hardware cost (CapEx) and all operational costs
    (OpEx) over the three-year period. This includes the GPUs themselves, annual maintenance, and the
    cost of electricity, which must also account for the cooling overhead (PUE).
  common_mistake: The most common mistake is focusing solely on the upfront hardware cost (Capital Expenditure
    or CapEx) and completely ignoring the ongoing operational costs (Operational Expenditure or OpEx),
    such as power, cooling, and maintenance. Over a multi-year horizon, OpEx can be a substantial fraction
    of the TCO.
  napkin_math: 'CapEx: 8x H100s @ $30k = $240k. Maintenance: 5% of CapEx/yr = $12k/yr * 3 = $36k. Power:
    H100 draws 700W max. 8 GPUs = 5.6kW. Add 20% for CPU/cooling (PUE 1.2) = 6.72kW. 3 years = 26,280
    hours. Total energy = 176,601 kWh. At $0.12/kWh = $21,192. Total 3-Year TCO = $240,000 + $36,000 +
    $21,192 = $297,192. CapEx severely dominates the power costs.'
  options:
  - $240,000
  - $276,000
  - $297,000
  - $258,000
  correct_index: 2
