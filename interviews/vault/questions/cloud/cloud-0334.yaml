title: The CapEx vs. OpEx Blind Spot
scenario: Your team is considering purchasing a small, dedicated 8-GPU pod of H100s for a three-year research project instead of using on-demand cloud instances. You are given an electricity cost of $0.12/kWh.
question: "Using the standard hardware constants, what is the approximate TCO for this pod?"
details:
  realistic_solution: The TCO is the sum of the initial hardware cost (CapEx) and all operational costs (OpEx) over the three-year period. This includes the GPUs themselves, annual maintenance, and the cost of electricity, which must also account for the cooling overhead (PUE).
  common_mistake: |
    **The Pitfall:** Focusing solely on the upfront hardware CapEx.
    **The Rationale:** Candidates completely ignore OpEx (power, cooling, maintenance) over multi-year horizons.
    **The Consequence:** Severely underestimating the true Total Cost of Ownership (TCO) of on-premise hardware vs cloud instances.
  napkin_math: |
    - **CapEx:** 8x H100s @ $30,000 = $240,000.
    - **Maintenance:** 5% of CapEx/yr = $12,000/yr * 3 = $36,000.
    - **Power Draw:** 8 GPUs * 700 W = 5.6 kW.
    - **Cooling (PUE 1.2):** 5.6 kW * 1.2 = 6.72 kW.
    - **Energy Consumed:** 6.72 kW * 26,280 hours (3 years) = 176,601 kWh.
    - **Energy Cost:** 176,601 kWh * $0.12/kWh = $21,192.
    - **Result:** **$240,000 + $36,000 + $21,192 = $297,192 Total 3-Year TCO.**
  options:
  - $240,000
  - $276,000
  - $297,000
  - $258,000
  correct_index: 2
