title: Gradient Sparsification Compute Bottleneck
scenario: You are distributed training a 10B parameter model across 16 nodes equipped with 8x A100 GPUs
  and 100 Gbps Ethernet. Profiling shows the FP16 Ring AllReduce for the 20GB gradient tensors takes ~3.2
  seconds per step. To alleviate this network bottleneck, the team implements Top-1% gradient sparsification,
  which successfully reduces the network payload to just 200MB. However, after deployment, the total step
  time actually degrades by over 2 seconds, and profiling reveals the network is now mostly idle. Diagnose
  the root cause of this performance regression.
details:
  realistic_solution: The computational overhead of identifying the Top-1% elements (e.g., via radix sort
    or quickselect) across 10 billion parameters completely overwhelms the network bandwidth savings.
    The system shifted from a network bandwidth bottleneck to a severe GPU compute bottleneck.
  common_mistake: Candidates often assume the regression is due to the network latency of sending scattered
    sparse indices or protocol overhead, failing to realize the massive GPU compute cost required to calculate
    the Top-K elements.
  napkin_math: Ethernet bandwidth = 100 Gbps = 12.5 GB/s. Ring AllReduce data volume ≈ 2 * 20GB = 40GB.
    Baseline comms = 40GB / 12.5GB/s = 3.2s. Top-K sorting 10B params (20GB) at ~2B keys/s on A100 takes
    10B / 2B = 5.0s compute. Sparse AllGather of 200MB across 16 nodes takes ≈ 0.25s. Total time = 5.0s
    + 0.25s = 5.25s. This is 2.05s slower than the 3.2s baseline, causing a regression.
