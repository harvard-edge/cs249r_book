title: 'Model Size Estimation: Diagnose OOM Error During Fine-Tuning on H100'
scenario: 'A team hits OOM (out of memory) on H100 (80GB HBM3) while fine-tuning a 13B model with batch
  size 8, sequence length 2048, using full FP16 training (no mixed precision). Memory profiler shows:
  weights 26GB, gradients 26GB, optimizer states 52GB — total 104GB. Diagnose and quantify the minimum
  changes to fit in 80GB.'
details:
  realistic_solution: 'Full FP16 training (wrong for stability): weights 26GB + grads 26GB + Adam FP32
    states 104GB? No: full FP16 Adam has FP16 m+v = 13B×2B×2=52GB. Total: 104GB > 80GB. Fix options: (1)
    8-bit Adam (bitsandbytes): optimizer states 13B×1B×2=26GB. New total: 26+26+26=78GB < 80GB ✓ (barely).
    (2) LoRA: only train 2% of params. LoRA grads: 0.26B×2B=520MB. LoRA optimizer: 1.04GB. Total: 26+0.52+1.04=27.56GB
    ✓ massively. Recommend LoRA for minimal overhead.'
  common_mistake: Immediately switching to ZeRO-3 (complex, adds communication overhead) when simpler
    fixes (8-bit Adam, gradient checkpointing) may suffice within a single GPU.
  napkin_math: 'Full FP16 Adam: weights 26GB + grads 26GB + m (FP16) 26GB + v (FP16) 26GB = 104GB. 8-bit
    Adam: m (INT8) 13GB + v (INT8) 13GB. Total: 26+26+13+13=78GB < 80GB. With 2GB activations at batch=8:
    80GB exactly. Very tight. LoRA rank 64: trainable params = 2×64×5120×80 layers/2 (half layers) = 52M.
    Grads: 0.1GB. Adam: 0.2GB. Total: 26+0.1+0.2=26.3GB. 53.7GB headroom.'
