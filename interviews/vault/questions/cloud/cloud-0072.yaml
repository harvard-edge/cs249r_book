title: The Inference Memory Footprint
scenario: You're preparing to deploy a standard 7 Billion parameter Large Language Model for an RAG application.
question: For basic inference using half-precision (FP16), how much GPU memory should you budget just to load the model weights?
details:
  realistic_solution: For FP16 (or BF16) inference, each parameter requires 2 bytes of memory. Therefore, a 7 Billion parameter model requires 14 GB of GPU memory just to load the weights. This is a critical baseline for selecting a cloud GPU instance (e.g., an NVIDIA A10G with 24GB would suffice, but a T4 with 16GB would be very tight). This static cost doesn't include the dynamic memory needed for the KV-cache, which grows with the sequence length and batch size.
  common_mistake: |
    **The Pitfall:** Confusing memory requirements for training with those for inference, or using the wrong byte size.
    **The Rationale:** Training requires storing optimizer states and gradients, and standard FP32 takes 4 bytes.
    **The Consequence:** Engineers massively over-provision GPU instances (e.g., buying 80GB when 24GB is sufficient), skyrocketing cloud costs, or they under-provision by assuming INT8 precision implicitly.
  napkin_math: |
    - **Parameters:** 7 Billion.
    - **Precision:** FP16 = 2 bytes per parameter.
    - **Total Weight Memory:** 7,000,000,000 &times; 2 bytes = 14,000,000,000 bytes = **14 GB**.
  options:
  - 7 GB
  - 28 GB
  - 112 GB
  - 14 GB
  correct_index: 3
