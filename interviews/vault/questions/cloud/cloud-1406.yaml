title: Feature Store Audit Trail Bottleneck
scenario: >
  A HIPAA-compliant clinical ML system serves 20,000 predictions per second. To satisfy regulatory requirements for an immutable audit trail, the feature store synchronously writes a 1.5KB access record (user ID, accessed features, timestamp, and cryptographic signature) to an append-only table in a centralized PostgreSQL database. After enabling this, the feature store's P99 latency degraded from 15ms to 450ms, causing upstream prediction timeouts. The database metrics show only 25% CPU utilization and 40% IOPS utilization.
question: >
  What is causing the P99 latency spike after synchronous PostgreSQL audit logging, and what compliant architecture avoids it?
details:
  realistic_solution: |
    Decouple auditing from the critical path by writing logs asynchronously to a high-throughput broker (e.g., Kafka) or local memory-mapped buffer. A background worker then batches and flushes these logs to WORM-enabled (Write Once Read Many) object storage like S3 with Object Lock, natively satisfying immutability requirements.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a database IO bottleneck and suggesting vertical scaling.
    **The Rationale:** Candidates see a database added to the critical path and immediately jump to hardware limitations, ignoring connection pooling.
    **The Consequence:** Wasting resources on scaling the database without solving the network round-trip exhaustion of the serving layer's connection pool.
  napkin_math: |
    - **Request Rate:** 20,000 req/s.
    - **Synchronous DB Round-Trip:** 5ms.
    - **In-flight Connections:** 20,000 req/s * 0.005 s = 100 continuous in-flight DB connections, exhausting standard connection pools.
    - **Data Stream:** 20,000 req/s * 1.5 KB = 30,000 KB/s = 30 MB/s.
    - **Result:** **Asynchronous batching to S3 once per second reduces 20,000 DB writes to 1 API call per second.**
