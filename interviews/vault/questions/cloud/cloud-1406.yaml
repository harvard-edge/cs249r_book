title: Feature Store Audit Trail Bottleneck
scenario: A HIPAA-compliant clinical ML system serves 20,000 predictions per second. To satisfy regulatory requirements, the feature store synchronously writes a 1.5KB access record to an append-only PostgreSQL database. After enabling this, the feature store's P99 latency degraded from 15ms to 450ms, causing prediction timeouts. Database metrics show only 25% CPU utilization and 40% IOPS utilization.
question: What is causing the P99 latency spike after synchronous PostgreSQL audit logging, and what compliant architecture avoids it?
details:
  realistic_solution: 'Decouple auditing from the critical path by writing logs asynchronously to a high-throughput broker (e.g., Kafka). A background worker then batches and flushes these logs to WORM-enabled object storage like S3 with Object Lock, satisfying immutability requirements.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as a database IO bottleneck and suggesting vertical scaling.
    **The Rationale:** Candidates see a database added to the critical path and immediately jump to hardware limitations, ignoring connection pooling.
    **The Consequence:** Wasting resources on scaling the database without solving the network round-trip exhaustion of the connection pool.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Request Rate: 20,000 req/s.
       - Sync DB round-trip: 5ms.
       - Payload: 1.5 KB/req.
    2. **Calculations:**
       - In-flight connections: 20,000 req/s * 0.005 s = 100 continuous connections.
       - Data Stream: 20,000 req/s * 1.5 KB = 30 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Connection-Pool-Bound.** Asynchronous batching to S3 reduces 20,000 DB writes to 1 API call per second.
