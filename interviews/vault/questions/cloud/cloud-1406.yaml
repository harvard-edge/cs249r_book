title: Feature Store Audit Trail Bottleneck
scenario: A HIPAA-compliant clinical ML system serves 20,000 predictions per second. To satisfy regulatory
  requirements for an immutable audit trail, the feature store synchronously writes a 1.5KB access record
  (user ID, accessed features, timestamp, and cryptographic signature) to an append-only table in a centralized
  PostgreSQL database. After enabling this, the feature store's P99 latency degraded from 15ms to 450ms,
  causing upstream prediction timeouts. The database metrics show only 25% CPU utilization and 40% IOPS
  utilization. Diagnose the root cause of the latency spike and propose an architecture that ensures compliance
  without impacting serving latency.
question: "What is causing the P99 latency spike after synchronous PostgreSQL audit logging, and what compliant architecture avoids it?"
details:
  realistic_solution: Decouple auditing from the critical path by writing logs asynchronously to a high-throughput
    broker (e.g., Kafka) or local memory-mapped buffer. A background worker then batches and flushes these
    logs to WORM-enabled (Write Once Read Many) object storage like S3 with Object Lock, natively satisfying
    immutability requirements.
  common_mistake: Misdiagnosing the issue as a database IO bottleneck and suggesting vertical scaling,
    failing to realize that synchronous network round-trips for logging exhaust the serving layer's connection
    pool.
  napkin_math: At 20,000 req/s, synchronous logging with a 5ms DB round-trip requires 20,000 * 0.005 =
    100 continuous in-flight DB connections. This easily exhausts standard connection pools, causing request
    queueing (the 450ms P99). By batching asynchronously, the 30 MB/s (20,000 * 1.5KB) data stream can
    be flushed to S3 once per second, reducing 20,000 DB writes to just 1 API call per second.
