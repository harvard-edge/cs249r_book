title: Tail Latency Budgeting Across Microservices
scenario: "You are designing an ML serving architecture with 3 microservices in series: tokenizer (CPU), model inference (H100), and post-processing (CPU). End-to-end P99 target is 100ms. Each service has different tail characteristics."
question: "What per-service latency budgets and alert thresholds would you set for the tokenizer, H100 inference, and post-processing services?"
details:
  realistic_solution: "Analyze empirical tail distributions: tokenizer P50=2ms, P99=8ms (tight); inference P50=40ms, P99=85ms (heavy tail); post-processing P50=3ms, P99=10ms (tight). Budget allocation weighted by tail heaviness: tokenizer=8ms, inference=80ms, post-processing=12ms, total=100ms. But tail amplification across 3 stages means we need ~15% headroom: set budgets to tokenizer=7ms, inference=75ms, post-processing=10ms = 92ms, leaving 8ms buffer. Alert thresholds: set at 80% of budget — tokenizer P99 > 5.6ms, inference P99 > 60ms, post-processing P99 > 8ms. Monitor P99.9 independently to catch emerging tail issues before they breach P99."
  common_mistake: |
    **The Pitfall:** Dividing the budget equally (33ms each).
    **The Rationale:** It seems fair, but service tail distributions differ wildly — CPU services have tighter distributions, GPU inference has heavier tails.
    **The Consequence:** Wasting budget on services that don't need it (tokenizer), while continuously triggering false alerts on services that inherently have higher variance (GPU inference).
  napkin_math: |
    *   **Empirical Distributions:** Tokenizer P99=8ms, Inference P99=85ms, Post-proc P99=10ms.
    *   **Proportional Split:** 8% / 82% / 10% (Sum = 103ms, exceeds 100ms).
    *   **Tail Amplification Buffer:** ~8ms needed. Allocate 92ms: Tokenizer 7ms, Inference 75ms, Post-proc 10ms.
    *   **Alert Thresholds (80% of budget):** Tokenizer 5.6ms, Inference 60ms, Post-proc 8ms.
    *   **Result:** **Budgets [7ms, 75ms, 10ms], Alerts [5.6ms, 60ms, 8ms].**
