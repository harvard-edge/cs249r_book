title: The Scaling Efficiency Collapse
scenario: 'You are scaling the training of a 70B parameter model from a single node to a 16-node cluster. Compute time is 6 seconds. With 400 Gbps InfiniBand, total step time is 11.3 seconds. When you switch to 100 Gbps Ethernet, total step time balloons to over 27 seconds.'
question: 'Why does switching from 400Gbps InfiniBand to 100Gbps Ethernet balloon step time from 11.3s to over 27s?'
details:
  realistic_solution: 'Standard 100Gbps Ethernet lacks RDMA (Remote Direct Memory Access). During AllReduce, gradients must be copied from GPU VRAM to host RAM, processed through the slow CPU TCP/IP stack, sent over the wire, and reversed on the destination. This CPU-mediated communication creates immense protocol overhead. InfiniBand uses RDMA via GPUDirect, bypassing the CPU entirely and enabling direct GPU-to-GPU memory transfers.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the advertised bandwidth difference (4x).
    **The Rationale:** Candidates calculate the raw link speed but forget the critical role of the network protocol and CPU overhead, failing to realize standard Ethernet lacks RDMA.
    **The Consequence:** Misdiagnosing network scaling issues and missing the fundamental requirement for RDMA in distributed ML.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradients for 70B FP16 = 140GB. AllReduce transfers ~280GB.
    - IB (50 GB/s) vs Ethernet (12.5 GB/s).

    **Calculations:**
    - IB time: 280GB / 50 GB/s = 5.6s (Total step: 6s + 5.6s = 11.6s).
    - Eth time (ideal): 280GB / 12.5 GB/s = 22.4s.
    - Eth actual > 27s due to TCP/IP CPU stack overhead.

    **Conclusion & Interpretation:**
    - **Result: The lack of RDMA forces CPU mediation, destroying scaling efficiency well beyond raw bandwidth limits (Protocol-Bound).**
options:
- The cluster's storage (NVMe) is too slow for writing checkpoints at each step.
- The PCIe bus on each node is saturated from transferring data to the network card.
- The Ethernet cluster lacks RDMA, forcing slow, CPU-mediated data transfers for gradient synchronization.
- The 4x reduction in raw bandwidth strictly forces a 4x increase in total step time.
