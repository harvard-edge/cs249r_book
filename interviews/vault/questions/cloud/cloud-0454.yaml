title: The Scaling Efficiency Collapse
scenario: 'You are scaling the training of a 70B parameter model from a single node to a 16-node cluster. Your forward and backward pass compute time is 6 seconds. When you use a cluster with 400 Gbps NDR InfiniBand, the total step time is about 11.3 seconds. When you switch to a cluster with 100 Gbps Ethernet, the total step time balloons to over 27 seconds.'
question: 'Why does switching from 400Gbps NDR InfiniBand to 100Gbps Ethernet balloon step time from 11.3s to over 27s?'
details:
  realistic_solution: 'The root cause is the lack of RDMA in the Ethernet cluster. During the all-reduce step, GPUs must synchronize 140 GB of gradient data. With InfiniBand, RDMA allows GPUs in one node to directly access the memory of GPUs in another node, bypassing the host CPU entirely. On the Ethernet cluster, data must be copied from GPU VRAM to host CPU RAM, then processed through the slow kernel TCP/IP stack, sent over the wire, and the process is reversed on the destination node. This CPU-mediated communication, combined with the lower bandwidth, makes the gradient synchronization step prohibitively slow and kills scaling efficiency.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the advertised bandwidth difference (4x).
    **The Rationale:** Candidates forget the critical role of the network protocol and CPU overhead, failing to realize that standard Ethernet lacks RDMA.
    **The Consequence:** Misdiagnosing network scaling issues and missing the fundamental need for RDMA in distributed training.
  napkin_math: |
    * Gradients for 70B FP16 = 140GB. All-reduce transfers ~280GB.
    * InfiniBand (50 GB/s): 280GB / 50 GB/s = 5.6s. Total step ~11.6s.
    * 100Gbps Ethernet (12.5 GB/s): 280GB / 12.5 GB/s = 22.4s + severe CPU overhead.
    * **The lack of RDMA forces CPU mediation, destroying scaling efficiency and ballooning the step time.**
options:
- The cluster's storage (NVMe) is too slow for writing checkpoints at each step.
- The PCIe bus on each node is saturated from transferring data to the network card.
- The Ethernet cluster lacks RDMA, forcing slow, CPU-mediated data transfers for gradient synchronization.
- The power budget of the Ethernet cluster is lower, causing the GPUs to be thermally throttled.
