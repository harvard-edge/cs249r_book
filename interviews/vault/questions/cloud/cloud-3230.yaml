title: KV-Cache and Speculative Decoding Interaction
scenario: You use speculative decoding with a 1B draft model and a 70B verifier for serving. The draft model generates 8 candidate tokens, then the verifier checks them in a single forward pass.
question: How should speculative decoding manage draft and verifier KV-caches when 5 of 8 candidate tokens are accepted?
details:
  realistic_solution: 'KV-cache management for speculative decoding: (1) Draft model: maintains its own lightweight KV-cache (1B model, ~8 KB per token). After verification, the draft KV-cache is irrelevant — it is overwritten for the next speculation round. Cost: negligible. (2) Verifier model: processes all 8 speculative tokens in one forward pass, generating KV entries for all 8. If 5 are accepted and 3 rejected: the KV-cache must be truncated — remove entries for positions 6, 7, 8 (the rejected tokens). With PagedAttention, this means freeing the blocks containing rejected tokens'' KV entries. If those blocks also contain accepted tokens (block_size=16 means tokens 6-8 share a block with accepted tokens), the block cannot be freed — only the logical length is updated. (3) Memory overhead: the verifier must allocate KV-cache for all 8 speculative tokens upfront, even though 3 may be rejected. Peak KV memory = position + 8 speculation tokens. At 70B scale: 8 extra tokens × 320 KB = 2.56 MB overhead per request — negligible. (4) Throughput benefit: 5 accepted tokens in one forward pass means 5× decode throughput (amortizing the 140 GB weight load over 5 tokens instead of 1).'
  common_mistake: |
    **The Pitfall:** Forgetting that rejected speculative tokens create orphaned KV-cache entries.
    **The Rationale:** It's easy to assume the verifier only caches what it approves.
    **The Consequence:** The verifier's KV-cache fills with garbage tokens from rejected drafts, causing corrupted outputs and rapid Out-Of-Memory errors. It must be managed transactionally.
  napkin_math: |
    * Speculative KV overhead: The verifier pre-allocates KV for all 8 tokens.
    * Memory cost: 8 tokens × 320 KB/token = 2.56 MB per request.
    * Rollback cost: 3 rejected tokens means freeing 3 tokens' KV (960 KB), which is just a fast pointer update in PagedAttention.
    * Throughput gain: 5 accepted tokens per 1 verifier forward pass = 5× improvement.
    * **Net result: A trivial 2.56 MB overhead and fast pointer rollbacks yield a 5× decode throughput gain.**
