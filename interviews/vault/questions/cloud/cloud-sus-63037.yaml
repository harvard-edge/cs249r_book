title: ROCm vs CUDA Ecosystem Overhead for MI300X Deployment
scenario: A team evaluating MI300X for production serving finds that vLLM on ROCm achieves 85% of the
  throughput of vLLM on H100 despite the MI300X having 58% more memory bandwidth. A CUDA kernel profiler
  shows the H100 run uses FlashAttention-2 (custom CUDA kernel), while the ROCm run falls back to a naive
  attention implementation. Quantify the performance gap attributable to software maturity vs hardware
  capability, and estimate the timeline to close it.
details:
  realistic_solution: 'FlashAttention-2 impact: naive attention is O(N²) memory I/O (materializes full
    N×N attention matrix per head). FlashAttention-2 is O(N) memory I/O via tiled SRAM-based computation.
    For N=2048 with 64 heads, naive attention writes/reads N²×num_heads×2bytes = 2048²×64×2 = 512 MB per
    layer per forward pass. FlashAttention-2: tiles fit in SRAM, reduces to ~67 MB per layer. Bandwidth
    savings: ~7.6×. If H100 uses FlashAttention-2 and MI300X falls back to naive: H100 effective attention
    BW use: 67 MB per layer. MI300X: 512 MB per layer. On H100: 67 MB / 3,350 GB/s = 0.02ms/layer. On
    MI300X: 512 MB / 5,300 GB/s = 0.097ms/layer. MI300X is ~5× slower on attention despite superior bandwidth
    — this largely explains the 85% throughput gap. With proper FlashAttention on ROCm: expected MI300X
    throughput = 1.58× H100.'
  common_mistake: Attributing hardware capability differences when the bottleneck is clearly software
    (kernel availability). The roofline analysis shows MI300X should be faster, so any throughput deficit
    is a software/ecosystem issue, not a hardware limitation.
  napkin_math: 'Attention FLOPs for 70B, N=2048, 80 layers: naive attention memory = N² × num_heads ×
    L × 2 bytes (attention scores, not N²×d). For 64 heads: N²×64×80×2 = 4M×64×80×2 = 42.9 GB — impossible
    to materialize. Scaled to single layer (batch=1): N²×64×2 = 4M×128 = 512MB per layer. FlashAttention:
    uses SRAM tiles, memory traffic ≈ 2×N×d_head×num_heads×2 = 2×2048×128×64×2 = 67MB per layer — 7.6×
    less. The real gain is avoiding slow HBM random access. Without FlashAttention on ROCm, HBM access
    patterns are suboptimal.'
