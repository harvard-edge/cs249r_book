title: The Continuous Batching Dilemma
scenario: Your team is serving a 7B parameter LLM on an H100 GPU using continuous batching for a chat application. The goal is to maximize token throughput. The current system waits up to 20ms to collect incoming requests before dispatching a batch for processing. A junior engineer proposes increasing this wait time to 100ms, arguing that bigger batches lead to higher throughput. Explain the impact of this change on both user-perceived latency (Time to First Token) and overall system throughput (Tokens per second).
question: "What happens to TTFT and token throughput if the batching wait window increases from 20ms to 100ms?"
details:
  realistic_solution: 'Increasing the batching window from 20ms to 100ms will likely increase the system''s maximum theoretical throughput (tokens/second) because the GPU spends more time in efficient, parallel computation and less time on launch overhead. However, it will worsen the user-perceived latency (TTFT) for *every* user. A user whose request arrives at the beginning of the 100ms window now has to wait an additional 80ms before their request even *starts* processing, directly adding to their TTFT. This creates a classic trade-off: higher system efficiency vs. worse individual user experience.'
  common_mistake: The common mistake is to focus solely on the increased computational efficiency of larger batches (higher throughput) while ignoring the 'wait tax' this imposes on every single user, which directly increases the Time-To-First-Token (TTFT). Engineers often forget that user-perceived latency starts the moment the request is sent, not when the GPU starts processing it.
  napkin_math: 'With a 20ms wait window, the average wait time for a uniformly arriving request is 20ms / 2 = 10ms. With a 100ms wait window, the average wait time is 100ms / 2 = 50ms. Thus, increasing the window size directly adds 40ms to the average TTFT. The user-perceived latency increases significantly even before GPU processing begins.'
  options:
  - It improves both throughput and user latency because the GPU is more efficient.
  - It has no significant effect, as inference time is measured in microseconds and dominates latency.
  - It worsens average queue wait time by 5x (increasing user latency), but increases the system's maximum token throughput.
  - It only improves throughput if the request arrival rate is very high; otherwise, it has no effect.
  correct_index: 2
