title: The Continuous Batching Dilemma
scenario: Your team is serving a 7B parameter LLM on an H100 GPU using continuous batching for a chat application. The goal is to maximize token throughput. The current system waits up to 20ms to collect incoming requests before dispatching a batch for processing. A junior engineer proposes increasing this wait time to 100ms, arguing that bigger batches lead to higher throughput.
question: "What happens to TTFT and token throughput if the batching wait window increases from 20ms to 100ms?"
details:
  realistic_solution: 'Increasing the batching window from 20ms to 100ms will likely increase the system''s maximum theoretical throughput (tokens/second) because the GPU spends more time in efficient, parallel computation and less time on launch overhead. However, it will worsen the user-perceived latency (TTFT) for *every* user. A user whose request arrives at the beginning of the 100ms window now has to wait an additional 80ms before their request even *starts* processing, directly adding to their TTFT. This creates a classic trade-off: higher system efficiency vs. worse individual user experience.'
  common_mistake: |
    **The Pitfall:** Focusing solely on system throughput while ignoring user-perceived latency.
    **The Rationale:** Larger batches increase GPU computational efficiency, but engineers forget that user wait time begins when the request is sent.
    **The Consequence:** The 'wait tax' significantly increases Time-To-First-Token (TTFT), degrading the individual user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline (20ms window) uniform arrival.
       - Proposed (100ms window) uniform arrival.
    2. **Calculations:**
       - Baseline: Average wait time is 20ms / 2 = 10ms.
       - Proposed: Average wait time is 100ms / 2 = 50ms.
       - Difference: 50ms - 10ms = 40ms additional wait time.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound. Increasing the window directly adds 40ms to the average TTFT before GPU processing even begins.**
  options:
  - Average wait time decreases by 10ms.
  - Average wait time remains 20ms.
  - Average wait time increases by 40ms.
  - Average wait time increases by 100ms.
