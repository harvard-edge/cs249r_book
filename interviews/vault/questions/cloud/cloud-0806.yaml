title: The PUE Dollar Cost
scenario: Our CFO asks: 'We're spending $86M a year on electricity for our 10,000-GPU training cluster. The facilities team says they can reduce PUE from 1.4 to 1.1 by switching to liquid cooling, but the retrofit costs $5M. Is it worth it?'
question: Is the $5M liquid-cooling retrofit worth it for reducing PUE from 1.4 to 1.1, and what is the payback period?
details:
  realistic_solution: 'PUE (Power Usage Effectiveness) is the ratio of total facility power to IT equipment power. A PUE of 1.4 means for every 1W of compute, you pay for 1.4W total - the extra 0.4W goes to cooling, lighting, and power distribution. For a 10,000-GPU cluster, that 0.4W multiplier translates to millions of dollars per year. The CFO''s question is a straightforward ROI calculation: compute the annual savings from the PUE reduction and compare to the retrofit cost.'
  common_mistake: |
    **The Pitfall:** Dismissing PUE as a purely facilities-level concern.
    **The Rationale:** ML engineers assume power delivery infrastructure doesn't affect training cluster ROI or system design.
    **The Consequence:** Organizations bleed millions in unnecessary operational costs and miscalculate the long-term TCO of their compute investments.
  napkin_math: |
    - **Calculate IT load:** 10,000 H100s * 700W = **7 MW**.
    - **Calculate Total Power (PUE 1.4):** 7 MW * 1.4 = **9.8 MW**.
    - **Calculate Total Power (PUE 1.1):** 7 MW * 1.1 = **7.7 MW**.
    - **Calculate Savings:** `9.8 MW - 7.7 MW = 2.1 MW`.
    - **Calculate Annual Financial Savings:** 2.1 MW * 8,760 hours * $0.10/kWh = **$1.84M/year**.
    - **Calculate Payback Period:** $5M / $1.84M \u2248 **2.7 years**.
