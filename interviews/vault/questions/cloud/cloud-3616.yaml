title: Ring vs Tree AllReduce Trade-off on Multi-Node H100 Cluster
scenario: A 64-GPU training cluster uses 8 H100s per node (NVLink intra-node, 400Gbps
  InfiniBand inter-node). Compare ring-AllReduce vs tree-AllReduce for gradient synchronization
  of a 13B parameter model (FP32 gradients = 52GB). Which algorithm wins and why?
question: Which algorithm wins and why?
details:
  realistic_solution: 'Ring-AllReduce: bandwidth optimal, 2×(N-1)/N × 52GB per GPU.
    For large gradients (52GB), bandwidth dominates. Ring time ≈ 2×63/64×52GB / min(NVLink_BW,
    IB_BW_per_GPU). IB: 64 GPUs, 8 nodes × 400Gbps = 50GB/s/node / 8 GPUs = 6.25GB/s/GPU.
    Ring: 2×0.984×52GB/6.25GB/s = 16.4s. Tree-AllReduce: O(log N) steps = 6 steps,
    each step transmits 52GB/2 → total per node ≈ 52GB×6/8 = 39GB, time = 39GB/50GB/s
    = 0.78s per step... but tree is bandwidth-suboptimal. For large gradient tensors,
    ring wins. For small messages (<1MB), tree wins due to lower latency steps.'
  common_mistake: Applying ring-AllReduce analysis without considering that ring-AllReduce
    has O(N) latency steps while tree has O(log N) — ring wins on bandwidth, tree
    wins on latency for small messages.
  napkin_math: '52GB gradients at 6.25GB/s IB per GPU: ring time ≈ 2×52GB/6.25=16.6s
    per AllReduce. Tree: log2(64)=6 steps × ~8.7GB/step/node / 50GB/s = 1s total.
    Ring wins for large messages (52GB >> log2(N) threshold) 16× for these specs!
    Ring assumes full bisection bandwidth which 400Gbps IB provides per node not per
    GPU. Key insight: inter-node bandwidth is the bottleneck; tree better utilizes
    it for large models.'
