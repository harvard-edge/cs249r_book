title: The Experiment-to-Production Gap
scenario: 'A research team publishes a paper showing their new model architecture achieves state-of-the-art
  on ImageNet. Your team tries to reproduce the results for production use. After 3 weeks, you can match
  the paper''s accuracy but discover: (1) training requires 2× the compute they reported, (2) the model
  is 40% slower at inference than their benchmark claims, and (3) accuracy drops 8% on your production
  data distribution. Explain why each of these gaps exists and how the ML development lifecycle systematically
  produces them.'
question: "Why do the reported compute, latency, and accuracy gaps exist, and how does the ML development lifecycle produce them?"
details:
  realistic_solution: 'Three structural gaps: (1) Compute gap (2×): Research papers report the final successful
    run, not the dozens of failed experiments that informed hyperparameter choices. The authors effectively
    amortized their search cost over the reported result. When you start from scratch, you must pay the
    full search tax. Also, papers often use aggressive mixed-precision or custom kernels optimized for
    their specific hardware that do not transfer to your setup. (2) Latency gap (40%): Benchmark latency
    is measured in ideal conditions: single batch, warm GPU, no concurrent requests, no preprocessing.
    Production inference includes batching overhead, KV-cache management, preprocessing, postprocessing,
    and network round-trips. The ''40% slower'' is actually typical — production tax on inference is 30-50%.
    (3) Accuracy gap (8%): ImageNet is a curated, IID benchmark. Your production data has distribution
    shift (different lighting, angles, classes), label noise, and long-tail distributions. The model was
    overfit to the benchmark distribution. The lifecycle lesson: the experiment → production gap is not
    a bug but a feature of how ML research optimizes for benchmark performance rather than production
    robustness.'
  common_mistake: Assuming the paper authors were dishonest. These gaps are structural, not fraudulent
    — they emerge from the incentive structure and methodology of ML research.
  napkin_math: 'Research reported: 32 H100-hours. Actual reproduction: 64 H100-hours (2× = search tax).
    At $3/GPU-hr: $96 vs $192 for one run. Including your own hyperparameter search (20 trials): 20 ×
    64 = 1,280 H100-hours = $3,840 vs the paper''s implied $96. True reproduction cost: 40× what the paper
    suggests.'
