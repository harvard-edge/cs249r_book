title: SM Occupancy vs Achieved Throughput
scenario: Your H100 CUDA kernel achieves 75% occupancy but only 40% of peak TFLOPS. A colleague's kernel achieves 50% occupancy but 85% of peak TFLOPS.
question: Why can a 50%-occupancy H100 kernel reach 85% peak TFLOPS while a 75%-occupancy kernel reaches only 40%?
details:
  realistic_solution: 'Your kernel (75% occupancy, 40% TFLOPS): high occupancy means many warps are resident, but if each warp frequently stalls on memory loads (low arithmetic intensity), the SM spends most cycles waiting. The warps are present but not productive. Colleague''s kernel (50% occupancy, 85% TFLOPS): fewer warps, but each warp has high instruction-level parallelism (ILP). The SM pipeline stays full with fewer warps because each warp issues multiple independent instructions per cycle. Key insight: H100 SMs can issue 4 warp instructions per cycle. With high ILP, 50% occupancy provides enough warps to keep all 4 issue slots busy.'
  common_mistake: |
    **The Pitfall:** Optimizing for occupancy as a proxy for performance.
    **The Rationale:** Occupancy measures how many warps are resident on an SM, leading candidates to believe more warps equal more compute.
    **The Consequence:** A kernel can have maximum occupancy but poor instruction-level parallelism, causing all warps to stall simultaneously and throughput to remain low.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 SM: 64 warps max. 4 issue slots.
       - Kernel 1: 75% occupancy (48 warps), 60% stall.
       - Kernel 2: 50% occupancy (32 warps), 10% stall.
    2. **Calculations:**
       - Effective Warps (Kernel 1): 48 * 0.4 = 19.2 warps.
       - Effective Warps (Kernel 2): 32 * 0.9 = 28.8 warps.
       - Threshold: ~24 active warps to saturate 4 issue slots.
       - Throughput Ratio: 28.8 / 19.2 = 1.5x.
    3. **Conclusion & Interpretation:**
       - **Throughput ratio exactly matches the 85%/40% performance difference. Result: Compute-Bound (Issue Slots).**
