title: KV-Cache Aware Autoscaling Policy
scenario: 'Your LLM serving cluster autoscales based on GPU utilization (threshold:
  70%). During a traffic spike, GPU utilization is only 45% but requests are being
  rejected. Your SRE team increases the GPU utilization threshold, making the problem
  worse. Specify the correct autoscaling metric.'
question: What autoscaling metric should replace GPU utilization when requests are
  rejected at 45% GPU utilization during a traffic spike?
details:
  realistic_solution: 'The correct autoscaling metric for LLM serving is KV-cache
    memory utilization, not GPU compute utilization. At 45% GPU utilization, the system
    is rejecting requests because all available KV-cache memory is consumed by existing
    long-context requests. Adding GPU utilization threshold just prevents scale-up,
    making rejection worse. Specification: (1) Primary metric: KV-cache pool utilization
    = allocated_blocks / total_blocks. Scale up when >80%. (2) Secondary metric: request
    queue depth. Scale up when queue > 10 requests for > 5 seconds. (3) Tertiary:
    P99 TTFT latency. Scale up when >2× SLA target. (4) Scale-down: when KV-cache
    utilization < 40% for 5 minutes (prevent thrashing). (5) Pre-warming: new instances
    need 30-60s to load model weights — scale up preemptively based on traffic prediction.
    Implementation: expose KV-cache block utilization as a Prometheus metric from
    vLLM/TensorRT-LLM. Configure HPA (Horizontal Pod Autoscaler) with custom metrics.
    Consider scale-to-zero during off-peak if cold start latency is acceptable.'
  common_mistake: Using GPU compute utilization as the autoscaling signal for LLM
    serving. LLM decode is memory-bandwidth-bound — GPU compute utilization can be
    low while the system is fully saturated on memory capacity.
  napkin_math: 'GPU util at 45%: looks underutilized, but KV-cache at 95%: no room
    for new requests. Queue depth growing. Correct signal: KV-cache pool >80% → add
    GPU. With proper metric: scale from 4 to 8 GPUs, doubling KV-cache capacity and
    request throughput.'
