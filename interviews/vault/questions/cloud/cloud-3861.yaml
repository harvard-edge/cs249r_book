title: Rack-Level Thermal Architecture for Dense H100 Clusters
scenario: 'Architect a thermal management and workload scheduling system for an AI training cluster using H100 GPUs (700W TDP). The datacenter supports up to 40 kW of power delivery per rack, but the legacy air-cooling infrastructure can only dissipate 30 kW of heat per rack. Racks have 5 nodes (8x H100 per node, ~7 kW total per node).'
question: 'How would you schedule and power-cap the 5-node H100 racks to maximize throughput without exceeding the 30 kW cooling limit?'
details:
  realistic_solution: 'Implement dynamic software-defined power capping tied to rack thermal telemetry. Cap GPUs to 575W during steady state to stay under 30kW, but lift caps to 700W for transient bursts during memory-bound phases, using heat sink thermal mass to absorb the spikes.'
  common_mistake: |
    **The Pitfall:** Proposing physical upgrades to liquid cooling, or using strict static power caps.
    **The Rationale:** Air-cooling limits feel rigid, and static caps are easy to implement in BMC/IPMI.
    **The Consequence:** Ignoring the prompt's constraint, or sacrificing burst performance during less compute-intensive phases of the workload, leaving throughput on the table.
  napkin_math: |
    **Assumptions & Constraints:**
    - Racks: 5 nodes, 8 GPUs/node.
    - Node overhead: 1.4 kW system board.
    - Cooling limit: 30.0 kW per rack.

    **Calculations:**
    - Rack Peak Power: 5 nodes * 7.0 kW/node = 35.0 kW (Exceeds 30.0 kW limit).
    - Continuous Power Limit: 30.0 kW / 5 nodes = 6.0 kW per node.
    - Available GPU Power: 6.0 kW - 1.4 kW system overhead = 4.6 kW.
    - Static GPU Cap: 4.6 kW / 8 GPUs = 575W per H100.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. Cap GPUs at 575W but use dynamic scheduling to allow brief 700W bursts.
