title: Rack-Level Thermal Architecture for Dense H100 Clusters
scenario: 'Architect a thermal management and workload scheduling system for an AI training cluster using H100 GPUs (700W TDP). The datacenter supports up to 40 kW of power delivery per rack, but the legacy air-cooling infrastructure can only dissipate 30 kW of heat per rack before ambient temperatures cause thermal throttling. Racks have 5 nodes (8x H100 per node, ~7 kW total per node).'
question: "How would you schedule and power-cap the 5-node H100 racks to maximize throughput without exceeding the 30 kW cooling limit?"
details:
  realistic_solution: Design a software-defined thermal management system that integrates with the cluster scheduler. Deploy 5 nodes per rack (35 kW peak) to maximize power utilization, but implement a dynamic power-capping daemon based on rack-level thermal telemetry. During compute-heavy LLM training phases, cap GPU power limits to 575W to stay within the 30 kW cooling limit. During communication or memory-bound phases where actual power draw drops, lift the cap to allow transient bursts up to 700W, relying on the thermal mass of the heat sinks to absorb short-term heat spikes.
  common_mistake: |
    **The Pitfall:** Proposing physical upgrades to liquid cooling, or using strict static power caps.
    **The Rationale:** Air-cooling limits feel rigid, and static caps are easy to implement in BMC/IPMI.
    **The Consequence:** Ignoring the prompt's constraint, or sacrificing burst performance during less compute-intensive phases of the workload, leaving throughput on the table.
  napkin_math: |
    1. **Rack Peak Power:** 5 nodes * 7.0 kW/node = 35.0 kW (Exceeds 30.0 kW limit).
    2. **Continuous Power Limit:** 30.0 kW / 5 nodes = 6.0 kW per node.
    3. **System Overhead:** 6.0 kW - 1.4 kW system board = 4.6 kW available for GPUs.
    4. **Static GPU Cap:** 4.6 kW / 8 GPUs = **575W per H100**. (Dynamic capping allows bursting to 700W during memory-bound phases).
