title: 3D Convolution L2 Cache Thrashing
scenario: You are optimizing a 3D medical imaging CNN on an NVIDIA A100 (40MB L2 cache). The input volume is 256x256x256 FP32. Profiling via Nsight Compute reveals an abysmal 8% SM compute utilization, accompanied by a 94% L2 cache miss rate and massive HBM read volumes that exceed theoretical requirements by 8x.
question: What causes the 94% L2 miss rate and 8x HBM read amplification in the 256x256x256 3D CNN, and how would you change the layout?
details:
  realistic_solution: The symptom (massive L2 miss rate and 8x HBM read amplification) is caused by strided memory access patterns inherent in naive 3D convolutions. Memory in GPUs is fetched in 32-byte cache lines. When traversing the Z-axis (depth) of a 3D volume laid out linearly in memory (e.g., NDHWC or NCDHW), reading adjacent elements in the Z-dimension means jumping by X*Y*sizeof(FP32) bytes. For a 256x256 image, this is 262KB per stride. The GPU fetches a 32-byte cache line from HBM but only uses 4 bytes (1 float), discarding the rest as the L2 cache quickly fills and evicts lines due to the massive stride. This results in exactly 1/8th (12.5%) effective memory bandwidth and 8x fetch amplification. The co-design solution is to use blocked memory layouts (like NCHWc, e.g., NCHW32) or Morton Z-order curves, ensuring that spatially adjacent 3D voxels are contiguous in linear memory, allowing the kernel to utilize the full 32-byte cache line.
  common_mistake: |
    **The Pitfall:** Assuming the model inherently requires massive bandwidth and upgrading the hardware blindly.
    **The Rationale:** Candidates see severe memory bottlenecks and immediately assume the 2.0 TB/s of the A100 is "too slow," completely missing the memory layout access pattern.
    **The Consequence:** The team wastes capital upgrading to H100s and still experiences an identical 8x architectural penalty due to memory thrashing.
  napkin_math: |
    1. **Input Size:** $256 \times 256 \times 256 \times 4$ bytes = 67 MB, exceeding the 40 MB L2 cache.
    2. **Z-Axis Stride:** Traversing depth requires jumping by $256 \times 256 \times 4$ = 262,144 bytes.
    3. **Fetch Waste:** The GPU fetches a full 32-byte cache line to read a single 4-byte float, wasting 28 bytes.
    4. **Bandwidth Collapse:** Effective memory bandwidth drops to $4/32 =$ **12.5%** of peak (from 2.0 TB/s down to 250 GB/s).
    5. **Fix:** Use blocked layouts (e.g., NCHW32) to ensure spatially adjacent 3D voxels share contiguous 32-byte cache lines.
