title: Formulate GDS video ingestion to eliminate CPU decode bottlenecks
scenario: A distributed training job on an 8x H100 SXM node processes petabytes of video data. The current pipeline reads MP4s directly from AWS S3, decodes them on the CPU, and sends FP16 frames to the GPU, causing GPUs to idle at 40% utilization.
question: Formulate a data ingestion specification that shifts the bottleneck away from the CPU and maximizes H100 utilization.
details:
  realistic_solution: Store the dataset as pre-chunked binary records on local high-speed NVMe arrays. Implement GPU Direct Storage (GDS) to stream compressed video chunks directly to the H100's memory over PCIe, bypassing the CPU bounce buffers. Then, utilize the H100's 7 NVDEC engines per GPU to decode directly into GPU memory in parallel. With 8 H100s on the node, the system has 56 NVDEC engines, plus 14 NVJPG engines per GPU for image-coded sub-streams.
  common_mistake: |
    **The Pitfall:** Recommending more CPU workers or RAM to solve the bottleneck.
    **The Rationale:** Candidates under-count the hardware decode capacity of the H100, assuming only one decoder per GPU instead of seven.
    **The Consequence:** Wasting money on massive CPU instances while leaving the dedicated GPU hardware decoders completely unutilized.
  napkin_math: |
    - 1. Identify NVDEC hardware: The NVIDIA H100 contains 7 dedicated NVDEC engines per GPU.
    - 2. Calculate node-level decode capacity: 8 GPUs * 7 NVDEC engines = 56 hardware decoders per node.
    - 3. Estimate stream throughput: Assuming ~250 1080p60 streams per NVDEC engine.
    - 4. Conclusion: The node can theoretically decode **14,000 simultaneous video streams**, far exceeding any realistic CPU-based decoding pipeline.
