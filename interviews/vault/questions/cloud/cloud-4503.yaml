title: Formulate GDS video ingestion to eliminate CPU decode bottlenecks
scenario: A distributed training job on an 8-GPU node processes petabytes of video data. The current pipeline reads MP4s directly from AWS S3, decodes them on the CPU, and sends FP16 frames to the GPU, causing GPUs to idle at 40% utilization.
question: Formulate a data ingestion specification that shifts the bottleneck away from the CPU and maximizes GPU utilization.
details:
  realistic_solution: 'Store the dataset as pre-chunked binary records on local high-speed NVMe arrays. Implement GPU Direct Storage (GDS) to stream compressed video chunks directly to the GPU''s memory over PCIe, bypassing the CPU bounce buffers. Then, utilize the hardware decode engines per GPU to decode directly into GPU memory in parallel. With 8 GPUs on the node, the system can utilize 56 decode engines, plus 14 JPEG engines per GPU for image-coded sub-streams.'
  common_mistake: |
    **The Pitfall:** Recommending more CPU workers or RAM to solve the bottleneck.
    **The Rationale:** Candidates under-count the hardware decode capacity of modern GPUs, assuming only one decoder per GPU instead of seven.
    **The Consequence:** Wasting money on massive CPU instances while leaving the dedicated GPU hardware decoders completely unutilized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 GPUs per node.
       - 7 NVDEC hardware decode engines per GPU.
    2. **Calculations:**
       - Node-level decode capacity: 8 GPUs * 7 NVDEC engines = 56 hardware decoders.
       - Stream throughput: ~250 streams per NVDEC engine.
       - Total simultaneous streams: 56 decoders * 250 streams/decoder = 14,000 streams.
    3. **Conclusion & Interpretation:** **The node can decode 14,000 simultaneous streams via hardware**. Result: **Compute-Bound**.
