title: Formulate GDS video ingestion to eliminate CPU decode bottlenecks
scenario: A distributed training job on an 8x H100 SXM node processes petabytes of
  video data. The current pipeline reads MP4s directly from AWS S3, decodes them on
  the CPU, and sends FP16 frames to the GPU, causing GPUs to idle at 40% utilization.
question: Formulate a data ingestion specification that shifts the bottleneck away
  from the CPU and maximizes H100 utilization.
details:
  realistic_solution: Store the dataset as pre-chunked binary records on local high-speed
    NVMe arrays. Implement GPU Direct Storage (GDS) to stream compressed video chunks
    directly to the H100's memory over PCIe, bypassing the CPU bounce buffers. Then,
    utilize the H100's 7 NVDEC engines per GPU to decode directly into GPU memory
    in parallel. With 8 H100s on the node, the system has 56 NVDEC engines, plus
    14 NVJPG engines per GPU for image-coded sub-streams.
  common_mistake: Recommending adding more CPU workers or RAM without moving the heavy
    decode step to the H100's dedicated hardware, or under-counting NVDEC capacity
    by assuming one decoder per GPU instead of seven.
  napkin_math: 8 H100 GPUs * 7 NVDEC engines = 56 hardware decoders per node; assuming
    each NVDEC sustains ~250 1080p60 streams, the node-level decode ceiling is 14,000
    streams - far above any realistic CPU-decode pipeline.
