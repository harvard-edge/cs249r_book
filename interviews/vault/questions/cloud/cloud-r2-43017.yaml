title: Columnar vs Row Format for Feature Tables
scenario: A tabular dataset has 500 columns and 100M rows (200 GB uncompressed). Your training pipeline
  only uses 20 columns. How much I/O does a columnar format (Parquet) save versus a row format (CSV/TFRecord),
  and what enables this savings?
question: "How much I/O does a columnar format (Parquet) save versus a row format (CSV/TFRecord), and what enables this savings?"
details:
  realistic_solution: 'Columnar formats store each column contiguously, enabling column pruning — reading
    only the 20 needed columns skips 96% of the data. For 200 GB uncompressed: Parquet reads ~8 GB of
    raw column data (200 GB × 20/500). But Parquet also compresses far better than row formats because
    adjacent values in a column are the same type and often have low entropy (e.g., a ''country'' column
    with 200 unique values compresses to near-zero with dictionary encoding). Typical Parquet compression:
    3-10× for tabular data. So 8 GB raw → ~1.5 GB compressed. CSV/TFRecord would read all 200 GB, compressed
    to ~60 GB. Effective I/O savings: 1.5 GB vs 60 GB = 40×, not just 25×.'
  common_mistake: Assuming the savings is exactly 20/500 = 96%. This ignores Parquet metadata overhead,
    row group structure, and the fact that compression ratios differ between columnar and row layouts.
  napkin_math: 'Row format (CSV): read 200 GB, compressed ~3× → 67 GB I/O. Column format (Parquet): read
    20/500 columns = 8 GB, compressed ~5× → 1.6 GB I/O. Speedup: 67 / 1.6 = 42×. At 2 GB/s S3 throughput:
    CSV = 33 seconds, Parquet = 0.8 seconds. For iterative training (100 epochs): CSV = 55 minutes I/O,
    Parquet = 80 seconds I/O. Column pruning + compression = the two multipliers.'
