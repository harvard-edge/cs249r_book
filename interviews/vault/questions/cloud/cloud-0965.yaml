title: Diagnosing Thread Exhaustion Cascades
scenario: Your ML serving tier, consisting of 50 Kubernetes pods (each with 100 worker threads), processes 10,000 queries per second. For a new hybrid model, each request queries a remote feature store API. The feature store suddenly experiences high load, causing its p99 latency to spike from 15ms to 5,000ms. Within seconds, all 50 serving pods become unresponsive with `ThreadExhaustion` errors, completely bringing down the user-facing API.
question: What caused the total ThreadExhaustion outage when the feature store p99 hit 5s, and what mechanism contains it?
details:
  realistic_solution: Implement the Circuit Breaker pattern. Configure it to monitor the failure/timeout rate. If the error rate exceeds a threshold (e.g., 20% over a 10-second rolling window), the circuit 'opens'. Subsequent requests fail instantly (fast-fail) without consuming a worker thread, allowing the serving API to seamlessly return fallback predictions.
  common_mistake: |
    **The Pitfall:** Adding naive retries or relying solely on a 5-second timeout to fix the upstream delay.
    **The Rationale:** Engineers think a timeout will free up resources, but a 5-second timeout still holds the thread hostage for 5 seconds, which is far too long at 200 QPS.
    **The Consequence:** Retries amplify the thundering herd on the degraded service, and the threads are still exhausted instantly, causing a total cascade failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 pods, 100 threads/pod.
       - Load: 10,000 QPS (200 QPS/pod).
       - Feature store latency jumps from 15ms to 5s.
    2. **Calculations:**
       - Normal Threads Used: 200 QPS/pod * 0.015s = 3 threads concurrent.
       - Degraded Threads Required: 200 QPS/pod * 5s = 1,000 threads.
       - Exhaustion Time: 100 threads / 200 QPS = 0.5 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Full ThreadExhaustion in 0.5 seconds, proving a Concurrency-Bound cascade failure without a Circuit Breaker.**
