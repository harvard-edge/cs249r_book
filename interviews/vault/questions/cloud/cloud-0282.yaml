title: 'The Intra-Node Speed Advantage'
scenario: 'You are comparing the latency for a data transfer using NVLink 4.0 within an HGX server to a transfer between servers using cross-rack InfiniBand NDR.'
question: 'What are the approximate latencies of NVLink 4.0 within an HGX server and cross-rack InfiniBand NDR, and how do they compare?'
details:
  realistic_solution: 'An NVLink 4.0 transfer has a latency of about 500 ns. A cross-rack InfiniBand NDR transfer is roughly 5,000 ns (5 µs). Therefore, the on-node (intra-server) transfer is approximately 10 times faster from a latency perspective than the inter-server transfer.'
  common_mistake: |
    **The Pitfall:** Underestimating the "leaving the box" penalty.
    **The Rationale:** Engineers know NVLink is faster but often anchor on PCIe latency (~1,000 ns) and assume a modern datacenter network is nearly as fast.
    **The Consequence:** Designing distributed systems that over-communicate across the network, severely bottlenecking latency-bound operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVLink 4.0 used for intra-node transfer.
    - InfiniBand NDR used for cross-rack inter-node transfer.

    **Calculations:**
    - NVLink 4.0 Latency: ~500 ns.
    - InfiniBand NDR Latency: ~5,000 ns.
    - 5,000 ns / 500 ns = 10.

    **Conclusion & Interpretation:**
    - **Result: ~10x faster (Latency-Bound)**. On-node transfer avoids the significant "leaving the box" network latency penalty.
  options:
  - 'NVLink: ~500 ns, InfiniBand: ~1,000 ns'
  - 'NVLink: ~5,000 ns, InfiniBand: ~500 ns'
  - 'NVLink: ~500 ns, InfiniBand: ~5,000 ns'
  - 'NVLink: ~1 ns, InfiniBand: ~5,000 ns'
