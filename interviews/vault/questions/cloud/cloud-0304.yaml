title: The Data Center Rack Power Budget
scenario: A data center operator is provisioning a new liquid-cooled AI rack which has a maximum power
  delivery of 70 kW. You are tasked with determining how many H100 GPUs can be installed. The data center
  has a modern, efficient Power Usage Effectiveness (PUE) of 1.1. Explain how you would calculate the
  maximum number of H100s that can safely operate in this single rack.
details:
  realistic_solution: The correct approach is to first calculate the power available to the IT equipment
    (the GPUs) by accounting for the PUE. A PUE of 1.1 means that for every 1 Watt delivered to the GPU,
    an additional 0.1 Watts is needed for cooling and other overhead. Therefore, the usable IT power is
    the total rack power divided by the PUE. Then, divide this usable power by the power consumption of
    a single H100 GPU.
  common_mistake: The most common mistake is to ignore the Power Usage Effectiveness (PUE) and divide
    the total rack power directly by the GPU's power draw. This overestimates the capacity because it
    fails to account for the power consumed by cooling systems, which is a significant factor in high-density
    AI racks.
  napkin_math: 1. **Calculate IT Power Budget:** The total power is 70,000 Watts, and the PUE is 1.1.
    The power available for the actual compute hardware is `70,000 W / 1.1 = 63,636 W`.
  options:
  - 100 GPUs. (Calculated by 70,000W / 700W)
  - 110 GPUs. (Calculated by 70,000W * 1.1 / 700W)
  - 90 GPUs. (Calculated by 70,000W / 1.1 / 700W)
  - 83 GPUs. (Incorrectly assumes a less efficient PUE of 1.2)
  correct_index: 2
