title: The Data Center Rack Power Budget
scenario: A data center operator is provisioning a new liquid-cooled AI rack which has a maximum power delivery of 70 kW. The data center has a Power Usage Effectiveness (PUE) of 1.1. You are tasked with determining how many 700 W GPUs can be installed.
question: With a 70 kW rack power limit and PUE 1.1, how many 700 W H100 GPUs can safely operate in the rack?
details:
  realistic_solution: The correct approach is to first calculate the power available to the IT equipment (the GPUs) by accounting for the PUE. A PUE of 1.1 means that for every 1 Watt delivered to the GPU, an additional 0.1 Watts is needed for cooling and other overhead. Therefore, the usable IT power is the total rack power divided by the PUE. Then, divide this usable power by the power consumption of a single H100 GPU.
  common_mistake: |
    **The Pitfall:** Ignoring the Power Usage Effectiveness (PUE).
    **The Rationale:** Candidates divide the total rack power directly by the GPU's power draw.
    **The Consequence:** Overestimating capacity by failing to account for the power consumed by cooling and infrastructure, leading to tripped breakers.
  napkin_math: |
    1. **Total Power:** 70,000 W.
    2. **IT Power Budget:** The usable power for compute is Total Power / PUE. $70,000 / 1.1 \approx 63,636\text{ W}$.
    3. **GPU Capacity:** Usable Power / GPU Power. $63,636\text{ W} / 700\text{ W/GPU} = 90.9\text{ GPUs}$.
    4. **Conclusion:** **90 GPUs can safely operate.**
  options:
  - 100 GPUs. (Calculated by 70,000W / 700W)
  - 110 GPUs. (Calculated by 70,000W * 1.1 / 700W)
  - 90 GPUs. (Calculated by 70,000W / 1.1 / 700W)
  - 83 GPUs. (Incorrectly assumes a less efficient PUE of 1.2)
  correct_index: 2
