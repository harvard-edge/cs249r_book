title: The LLM Canary Trap
scenario: You are deploying a fine-tuned 70B LLM to replace your production 13B model. A 5% canary rollout shows no latency or error spikes. After full rollout, users report the new model hallucinates wildly long, repetitive outputs.
question: Why do standard infra metrics miss LLM quality regressions, and how could you use the GPU's KV-cache memory profile as a hardware-level canary signal?
details:
  realistic_solution: Traditional canary metrics (latency, error rate, throughput) measure infrastructure health, not output quality. A model that suddenly starts outputting repetitive garbage will still return HTTP 200s and keep the GPU busy. However, LLM quality regressions often manifest as changes in generation length. You can use the GPU's KV-cache memory allocation as a proxy metric for output behavior. If the new model is hallucinating longer responses, the average KV-cache blocks allocated per request will spike. Monitoring the physical memory footprint provides a real-time, hardware-level signal of behavioral changes before users complain.
  common_mistake: |
    **The Pitfall:** Relying exclusively on HTTP status codes and API latency for LLM canaries.
    **The Rationale:** Engineers apply traditional microservice monitoring principles to generative AI.
    **The Consequence:** Promoting functionally broken models that generate garbage text while maintaining perfect infrastructure health scores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline model generation: 200 tokens/request.
       - Canary model generation (bugged): 800 tokens/request.
       - KV-cache footprint: ~1 MB per token.
    2. **Calculations:**
       - Baseline KV usage: 200 tokens * 1 MB = 200 MB per request.
       - Canary KV usage: 800 tokens * 1 MB = 800 MB per request.
       - Saturation velocity: Canary instances consume HBM 4x faster per request.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. A 4x spike in per-request KV-cache allocation provides a direct, low-latency hardware signal that the model's behavioral length distribution has catastrophically degraded.
