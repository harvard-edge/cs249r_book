title: 'KV-Cache: Mastery — Design KV Cache Infrastructure for 100K RPS LLM Platform'
scenario: 'You are designing KV cache infrastructure for a 7B LLM serving platform
  targeting 100K requests/second on a fleet of H100 servers. Average request: 256
  input tokens, 128 output tokens. Design the complete KV cache strategy: per-request
  sizing, caching policy, eviction, prefix sharing, and hardware allocation.'
question: What complete KV-cache strategy would you use to serve 100K RPS with 256-token
  inputs and 128-token outputs?
details:
  realistic_solution: 'Per-request KV: (256+128) × 32 × 2 × 8 × 128 × 2B = 384 tokens
    × 32KB per token = 12.3MB per request. Fleet sizing: target 100ms latency → at
    100K RPS, concurrent requests = 100K × 0.1s = 10K requests simultaneously. Total
    KV: 10K × 12.3MB = 123GB. Number of H100s: 7B weights = 14GB per server, KV =
    123GB/N_servers per server + 14GB ≤ 80GB.'
  common_mistake: Not calculating the aggregate KV cache requirements across the fleet;
    treating KV cache as a single-server problem rather than a distributed fleet problem.
  napkin_math: 'Solve: 14GB + 123GB/N ≤ 80GB. 123GB/N ≤ 66GB. N ≥ 123/66 = 1.86 →
    minimum 2 H100s for KV alone. But for 100K RPS throughput: decode rate = 100K
    × 128 tokens/100ms = 128M tokens/sec needed. Per H100 decode: 7B at batch=? tokens/sec.
    At H100 bandwidth: weight load 14GB per pass. KV per step: 10K×12.3MB... this
    is the full KV, per step you read current position only: 10K × 384 tokens × 32KB
    = wait: per step KV read = 10K requests × (avg attended tokens) × KV_per_token.
    At step 64 (mid-decode), attend to 320 tokens: 10K × 320 × 32B (per-layer per-token
    KV = 2×8×128×2B=4KB wait no per-token-per-all-layers=32KB) = 10K × 320 × 32KB
    = 102GB per decode step. At 3.35 TB/s: 102GB / 3.35TB/s = 30.4ms per step → 100K
    × 128 steps / (1000ms / 30.4ms) = 100K × 128 / 32.9 = 389K active tokens per step
    / 100K RPS = need ~4-5 H100s for decode bandwidth.'
