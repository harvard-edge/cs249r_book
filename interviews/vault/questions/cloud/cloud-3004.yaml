title: 'KV-Cache: Mastery — Design KV Cache Infrastructure for 100K RPS LLM Platform'
scenario: You are designing KV cache infrastructure for a 7B LLM serving platform targeting 100K requests/second on a fleet of H100 servers. Average request is 256 input tokens, 128 output tokens.
question: What complete KV-cache strategy would you use to serve 100K RPS with 256-token inputs and 128-token outputs?
details:
  realistic_solution: 'Calculate concurrent requests based on target latency, derive the total KV cache fleet requirement, and size the GPUs accordingly. A complete strategy requires calculating active decode memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Treating KV cache sizing as a single-server problem.
    **The Rationale:** Engineers fail to calculate aggregate fleet requirements derived from Little's Law for target RPS.
    **The Consequence:** Massive under-provisioning of inference fleet memory capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Token sizes: 256 in + 128 out = 384 tokens.
       - Cache per token = 32 KB.
       - Target latency = 100 ms.
    2. **Calculations:**
       - Concurrency = 100K RPS * 0.1s = 10K active requests.
       - Total KV Memory = 10K * 384 tokens * 32 KB = 123 GB.
       - Decode bandwidth check: 102 GB read per step / 3.35 TB/s = ~30.4 ms/step.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound (Requires minimum 2x 80GB GPUs just to hold the 123GB active KV state).**
