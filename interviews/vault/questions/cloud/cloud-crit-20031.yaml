title: Speculative Decoding Throughput Degradation Under Load
scenario: Your 70B model serves 200 concurrent requests on 4x H100. Without speculation, decode is memory-bound
  at 100 tok/s per request. With K=5 speculation using a 7B draft model on the same GPUs, single-request
  latency improves 2.5x but total throughput drops 15%. Analyze why speculation hurts throughput at high
  batch sizes.
question: "Why can K=5 speculative decoding with a 7B draft reduce throughput by 15% for 200 concurrent requests on 4x H100?"
details:
  realistic_solution: 'Without speculation, batch=200 decode: KV read per step = 200 x 640MB = 128GB at
    4x3.35=13.4 TB/s = 9.6ms. Compute: 200 x 140 GFLOP = 28 TFLOP at 4x989=3.96 PFLOPS = 7.1ms. Compute/IO
    ratio: 0.74 — approaching compute-bound. With speculation: each request generates K=5 draft tokens,
    then verifies K+1=6 tokens in one pass. Verification batch: 200 x 6 = 1,200 effective tokens. Compute:
    1,200 x 140G = 168 TFLOP at 3.96 PFLOPS = 42.4ms. Plus draft cost: 200 x 5 x 14 GFLOP = 14 TFLOP =
    3.5ms. Total: 45.9ms for ~740 tokens (200 x 3.7 avg). Without speculation: 9.6ms for 200 tokens. Throughput:
    speculation = 740/45.9 = 16.1K tok/s, no-spec = 200/9.6 = 20.8K tok/s. Speculation is 22% worse on
    throughput.'
  common_mistake: Thinking speculative decoding is always beneficial. At high batch sizes, decode becomes
    compute-bound, eliminating the memory-bandwidth headroom that speculation exploits.
  napkin_math: 'Batch=200 no-spec: 200 tok / 9.6ms = 20.8K tok/s. With spec: 740 tok / 45.9ms = 16.1K
    tok/s. 22% throughput loss. Speculation only helps when decode is deeply memory-bound (low batch).'
