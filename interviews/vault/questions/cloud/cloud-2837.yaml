title: Cloud New 0031
scenario: Machine learning compilers like Triton or XLA drastically speed up execution. Recall and define
  the concept of Operator Fusion and why it improves performance for memory-bound workloads.
details:
  realistic_solution: Operator Fusion is a compiler optimization technique where multiple sequential mathematical
    operations (e.g., a matrix multiplication followed by an activation function like GELU) are combined
    into a single, fused GPU kernel. This prevents intermediate results from being written back to the
    slow HBM and read again. The intermediate data remains in the ultra-fast SRAM.
  common_mistake: Believing operator fusion increases the mathematical FLOPs required or that it applies
    strictly to distributing layers across multiple GPUs.
  napkin_math: 'Unfused: Read 2MB, Compute, Write 2MB. Read 2MB, Compute Activation, Write 2MB. Total
    memory traffic = 8MB. Fused: Read 2MB, Compute both operations in SRAM, Write 2MB. Total traffic =
    4MB. HBM traffic is halved!'
