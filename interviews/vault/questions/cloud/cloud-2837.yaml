title: Cloud New 0031
scenario: Machine learning compilers like Triton or XLA drastically speed up execution of deep learning models on modern hardware.
question: What is Operator Fusion, and why does it improve performance for memory-bound workloads?
details:
  realistic_solution: 'Operator Fusion is a compiler optimization technique where multiple sequential mathematical operations (e.g., a matrix multiplication followed by an activation function like GELU) are combined into a single, fused GPU kernel. This prevents intermediate results from being written back to the slow HBM and read again.'
  common_mistake: |
    **The Pitfall:** Believing operator fusion increases mathematical FLOPs or applies strictly to distributing layers across GPUs.
    **The Rationale:** "Fusion" sounds like doing more compute simultaneously or merging nodes in a distributed system.
    **The Consequence:** Misunderstanding hardware utilization, leading to incorrect optimization strategies that focus on compute rather than memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence: Matrix Multiply -> GELU.
       - Inputs and Outputs: 2 MB chunks.
    2. **Calculations:**
       - Unfused traffic: Read 2 MB (in), Write 2 MB (mid), Read 2 MB (mid), Write 2 MB (out) = 8 MB total.
       - Fused traffic: Read 2 MB (in), Compute MatMul+GELU in SRAM, Write 2 MB (out) = 4 MB total.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound. Operator fusion halves HBM traffic by keeping intermediate data in SRAM, directly doubling execution speed.**
