title: H100 Inference SLA Degradation Under Noisy Neighbor CPU Contention
scenario: Your LLM serving system on H100 has been meeting p99 < 150ms for weeks. After a co-tenant's batch analytics job is scheduled on the same physical host's CPUs, you observe p99 latency spiking to 380ms while p50 remains at 42ms. GPU utilization on nvidia-smi is unchanged at 45%. The analytics job uses no GPUs.
question: "What is causing the p99 latency spike to 380 ms with unchanged p50 and GPU utilization, and how would you mitigate it immediately and systemically?"
details:
  realistic_solution: 'Root cause: CPU core contention between the inference serving process and the analytics job is causing scheduling latency for CUDA kernel launches and pre-processing steps. The long tail (p99) blooms because CPU stalls are bursty and rare, not because average GPU work increased. Evidence: p50 unchanged (most requests complete before CPU is preempted), GPU util unchanged (GPU work finishes fast when CPU isn''t stalled). Immediate: use cgroups or Kubernetes CPU limits to isolate the serving process to dedicated CPU cores (e.g., numactl --cpunodebind=0). Systemic: request CPU isolation guarantees from cloud provider (dedicated host or CPU-pinned pods), add CPU scheduling jitter to your SLO monitoring.'
  common_mistake: |
    **The Pitfall:** Assuming GPU-only workloads cannot be affected by CPU contention.
    **The Rationale:** Focusing solely on `nvidia-smi` GPU utilization and ignoring CPU-bound overhead.
    **The Consequence:** Misdiagnosing latency spikes and failing to isolate the serving process to dedicated CPU cores.
  napkin_math: |
    1. p99/p50 ratio = 380/42 = 9.05×. Queue theory predicts ~2-3× at 45% util, implying external latency injection.
    2. CPU scheduling quantum: Linux CFS default 4ms per 100ms period = 4% CPU time.
    3. If analytics takes 95% cores, serving gets 5%. 5ms CPU work / 0.05 = 100ms stall.
    4. Bursty preemptions push p99 to 42ms (GPU) + 338ms (Stall) = **380ms**.
