title: H100 Inference SLA Degradation Under Noisy Neighbor CPU Contention
scenario: Your LLM serving system on H100 has been meeting p99 < 150ms for weeks.
  After a co-tenant's batch analytics job is scheduled on the same physical host's
  CPUs, you observe p99 latency spiking to 380ms while p50 remains at 42ms. GPU utilization
  on nvidia-smi is unchanged at 45%. The analytics job uses no GPUs. Diagnose the
  root cause of the latency spike and propose both immediate and systemic mitigations.
question: What is causing the p99 latency spike to 380 ms with unchanged p50 and GPU
  utilization, and how would you mitigate it immediately and systemically?
details:
  realistic_solution: 'Root cause: CPU core contention between the inference serving
    process and the analytics job is causing scheduling latency for CUDA kernel launches
    and pre-processing steps. The long tail (p99) blooms because CPU stalls are bursty
    and rare, not because average GPU work increased. Evidence: p50 unchanged (most
    requests complete before CPU is preempted), GPU util unchanged (GPU work finishes
    fast when CPU isn''t stalled). Immediate: use cgroups or Kubernetes CPU limits
    to isolate the serving process to dedicated CPU cores (e.g., numactl --cpunodebind=0).
    Systemic: request CPU isolation guarantees from cloud provider (dedicated host
    or CPU-pinned pods), add CPU scheduling jitter to your SLO monitoring.'
  common_mistake: 'Assuming GPU-only workloads cannot be affected by CPU contention.
    Modern LLM serving has significant CPU-side overhead: tokenization, KV cache management,
    request scheduling, tensor deserialization, and CUDA kernel launch all run on
    CPU cores. p99 spikes with stable p50 and stable GPU utilization is a classic
    sign of CPU scheduling jitter, not GPU pressure.'
  napkin_math: 'p99/p50 ratio: 380/42 = 9.05×. In an M/M/1 queue, p99/p50 ≈ log2(100)/log2(2)
    = log2(100) ≈ 6.64× at heavy load—but at 45% GPU util, queue theory predicts p99/p50
    ≈ 2-3×. Actual 9× ratio implies external latency injection, not queueing. CPU
    scheduling quantum: Linux CFS default 4ms per 100ms period = 4% CPU time minimum.
    If analytics job takes 95% of shared cores, serving gets 5% of CPU time. CPU work
    per request: ~5ms (tokenization + launch). At 5% CPU allocation: 5ms / 0.05 =
    100ms CPU wait. p99 = 42ms GPU + 100ms CPU stall = 142ms... but analytics job
    is bursty → p99 can hit 42 + 338 = 380ms when preempted at worst moment.'
