title: H100 Inference SLA Degradation Under Noisy Neighbor CPU Contention
scenario: Your LLM serving system has been meeting p99 < 150ms for weeks. After a co-tenant's batch analytics job is scheduled on the same physical host's CPUs, you observe p99 latency spiking to 380ms while p50 remains at 42ms. GPU utilization on nvidia-smi is unchanged at 45%. The analytics job uses no GPUs.
question: "What is causing the p99 latency spike to 380 ms with unchanged p50 and GPU utilization, and how would you mitigate it immediately and systemically?"
details:
  realistic_solution: 'Root cause: CPU core contention between the inference serving process and the analytics job is causing scheduling latency for CUDA kernel launches and pre-processing steps. The long tail (p99) blooms because CPU stalls are bursty and rare, not because average GPU work increased. Immediate: use cgroups or Kubernetes CPU limits to isolate the serving process to dedicated CPU cores. Systemic: request CPU isolation guarantees from cloud provider, add CPU scheduling jitter to your SLO monitoring.'
  common_mistake: |
    **The Pitfall:** Assuming GPU-only workloads cannot be affected by CPU contention.
    **The Rationale:** Focusing solely on `nvidia-smi` GPU utilization and ignoring CPU-bound overhead.
    **The Consequence:** Misdiagnosing latency spikes and failing to isolate the serving process to dedicated CPU cores.
  napkin_math: |
    1. **Assumptions & Constraints:** p50=42ms, p99=380ms. GPU util=45%. Linux CFS default 4ms per 100ms period.
    2. **Calculations:** p99/p50 ratio = 380/42 = 9.05x. If analytics takes 95% of cores, serving gets 5%. 5ms CPU work / 0.05 = 100ms stall. Bursty preemptions push p99 to 42ms (GPU) + 338ms (Stall) = 380ms.
    3. **Conclusion & Interpretation:** **Result: CPU stall dominates p99.** CPU isolation is strictly required even for seemingly pure GPU workloads.
