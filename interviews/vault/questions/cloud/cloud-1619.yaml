title: Evaluating LLM Watermark Sequence Requirements
scenario: You implement a token-level watermarking scheme on an LLM API with an empirical 80% green tokens and green list fraction $\gamma = 0.5$. The legal team requires a $Z$-score $\ge 4$, but the average API response length is 20 tokens.
question: Why is the watermark undetectable on 20-token responses, and what minimum sequence length is needed to reach $Z \ge 4$?
details:
  realistic_solution: The implementation fails because 20 tokens do not provide enough statistical significance to distinguish the watermark from random chance at a $Z \ge 4$ confidence level. The architectural solution is to either accumulate tokens across an entire user session before running the detection test, or drastically increase $\gamma$ (which severely degrades perplexity). The math proves 45 tokens are required.
  common_mistake: |
    **The Pitfall:** Focusing solely on the latency or compute overhead of watermarking.
    **The Rationale:** Ignoring the fundamental statistical limitations of the z-test on short generation sequences.
    **The Consequence:** Deploying a complex watermarking system that provides a false sense of security and zero legal protection.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Z-score: $\ge 4$.
    - Green list fraction ($\gamma$): 0.5.
    - Expected green tokens ($|G|$): $0.8T$ (empirical 80%).

    **Calculations:**
    - $Z = (|G| - \gamma T) / \sqrt{\gamma(1-\gamma)T}$
    - $4 \le (0.8T - 0.5T) / \sqrt{0.5 \times 0.5 \times T}$
    - $4 \le 0.3T / 0.5\sqrt{T} \implies 4 \le 0.6\sqrt{T}$
    - $\sqrt{T} \ge 6.667 \implies T \ge 44.44$

    **Conclusion & Interpretation:**
    - **Result: Statistically-Bound.** At least 45 contiguous tokens are required, meaning the 20-token average response is completely undetectable.
