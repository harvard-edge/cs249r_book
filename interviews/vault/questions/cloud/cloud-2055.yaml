title: The RAG vs Fine-Tuning Breakeven Analysis
scenario: 'Your team debates whether to use RAG or fine-tune a model on 100K domain-specific documents. RAG adds retrieval latency and ongoing vector DB costs but requires no training. Fine-tuning eliminates retrieval latency but costs $5K per training run, needs retraining monthly as documents change, and bakes knowledge into weights. Traffic is 50K queries/day with a 6-month horizon.'
question: 'Which approach has lower TCO, and at what query volume does the breakeven point shift?'
details:
  realistic_solution: 'RAG is cheaper overall at lower query volumes due to avoiding fixed training costs, but fine-tuning saves money per query because prompts omit the retrieved context tokens. At >100K queries/day, fine-tuning\'s per-query savings dominate. The best answer for most teams: RAG with a fine-tuned base model — fine-tune for domain vocabulary, but retrieve for factual grounding.'
  common_mistake: |
    **The Pitfall:** Comparing only inference latency or only training costs.
    **The Rationale:** Over-indexing on either CapEx (training) or OpEx (inference) without doing a full TCO cross-over analysis.
    **The Consequence:** Choosing an architecture that is deeply uneconomical based on the actual scale of user traffic.
  napkin_math: |
    - **RAG Per-Query Cost:** $0.006 (LLM) + $0.00006 (retrieval) = $0.00606.
    - **Fine-Tuned Per-Query:** $0.0015 (shorter prompt).
    - **Savings Per Query:** $0.00606 - $0.0015 = $0.00456.
    - **Training Cost Recoup:** $5,000 / $0.00456 = ~1.1 Million queries.
    - **Breakeven Time (50K/day):** 1,100,000 / 50,000 = 22 days per training run.
    - **Conclusion:** Fine-tuning saves $1,840/month net, making it slightly cheaper at 50K/day. RAG is cheaper at <30K queries/day.
