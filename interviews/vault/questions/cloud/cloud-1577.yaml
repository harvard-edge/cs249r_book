title: MoE Active Parameter Bandwidth
scenario: You are deploying a 160B parameter Mixture of Experts (MoE) LLM on a node with 8x A100 80GB
  GPUs. The architecture consists of 40B shared parameters (attention and embeddings) and 8 experts sharing
  the remaining 120B parameters equally. The router selects the top-2 experts per token. Assuming FP16
  precision (2 bytes/parameter) and a batch size of 1, calculate both the total GPU memory required to
  host the model weights and the memory bandwidth consumed to generate a single token during decoding.
details:
  realistic_solution: Calculate the memory footprint for weights using the total parameter count, but
    calculate the decoding bandwidth using only the active parameter count. The active parameters per
    token are the 40B shared parameters plus 2 selected experts at 15B each (120B / 8 experts), totaling
    70B active parameters. At FP16, generating one token requires reading 140GB of weights.
  common_mistake: Assuming memory bandwidth per token requires reading all 160B parameters (320GB) like
    a dense model, rather than calculating based only on the active parameter count.
  napkin_math: 'Total Weight Memory = 160B params * 2 bytes = 320GB.

    Expert Size = 120B / 8 = 15B params.

    Active Params = 40B (shared) + 2 * 15B (experts) = 70B params.

    Bandwidth per token (BS=1) = 70B * 2 bytes = 140GB.'
