title: Diagnosing Memory and Latency Blowup in FHE Inference
scenario: You are debugging a healthcare inference pipeline running an FHE-encrypted CNN (CKKS scheme)
  on a 128-core AWS c6i.32xlarge. The plaintext model processes an image in 20ms using 150MB of RAM. Under
  FHE, inference takes 45 minutes and consumes 120GB of RAM per image, causing OOM kills when concurrent
  requests > 1. Profiling shows 90% of time and memory is consumed by `Bootstrap` and `EvalMult` operations
  evaluating non-linear activations.
details:
  realistic_solution: The root cause is the high multiplicative depth required to approximate non-linear
    ReLU activations using high-degree Taylor polynomials in FHE. Each ReLU requires a degree-7 polynomial
    (multiplicative depth 3), causing rapid noise growth that triggers expensive bootstrapping operations
    (~30-60s and >5GB RAM each). Replacing ReLU with x^2 (depth 1) enables Leveled FHE to run the entire
    network without any bootstrapping, reducing memory from 120GB to <15GB and latency from 45 minutes
    to under 2 minutes.
  common_mistake: Candidates often suggest scaling up hardware (e.g., moving to instances with more RAM
    or GPUs) without realizing that FHE bootstrapping costs grow exponentially with multiplicative depth,
    making hardware scaling ineffective without first reducing the circuit depth.
  napkin_math: Standard FHE ciphertext expansion factor is ~10,000x over plaintext. Approximating ReLU
    requires degree-7 polynomials (multiplicative depth 3), causing rapid noise growth. Bootstrapping
    to reset noise takes ~30-60s and >5GB RAM per occurrence. Replacing ReLU with $x^2$ (depth 1) allows
    Leveled FHE (LHE) to run the entire network without a single bootstrap operation, dropping memory
    overhead from 120GB to <15GB and latency from 45 mins to <2 mins.
