title: Diagnosing Memory and Latency Blowup in FHE Inference
scenario: >
  You are debugging a healthcare inference pipeline running an FHE-encrypted CNN (CKKS scheme) on a 128-core AWS c6i.32xlarge. The plaintext model processes an image in 20ms using 150MB of RAM. Under FHE, inference takes 45 minutes and consumes 120GB of RAM per image, causing OOM kills when concurrent requests > 1. Profiling shows 90% of time and memory is consumed by `Bootstrap` and `EvalMult` operations evaluating non-linear activations.
question: >
  Why does the FHE CNN take 45 minutes and 120GB per image, and what model change would make it practical?
details:
  realistic_solution: |
    The root cause is the high multiplicative depth required to approximate non-linear ReLU activations using high-degree Taylor polynomials in FHE. Each ReLU requires a degree-7 polynomial (multiplicative depth 3), causing rapid noise growth that triggers expensive bootstrapping operations (~30-60s and >5GB RAM each). Replacing ReLU with x^2 (depth 1) enables Leveled FHE to run the entire network without any bootstrapping, reducing memory from 120GB to <15GB and latency from 45 minutes to under 2 minutes.
  common_mistake: |
    **The Pitfall:** Attempting to solve FHE overhead by simply scaling up hardware.
    **The Rationale:** Cloud engineers are accustomed to solving OOM and CPU bottlenecks by throwing larger instances at the problem.
    **The Consequence:** Failing to realize that FHE bootstrapping costs grow exponentially with multiplicative depth, making hardware scaling useless without algorithmic circuit depth reduction.
  napkin_math: |
    - **FHE Expansion:** Standard FHE ciphertext expansion is ~10,000x over plaintext.
    - **Polynomial Approximation:** ReLU requires degree-7 polynomials (multiplicative depth 3), causing rapid noise growth.
    - **Bootstrapping Cost:** Resetting noise takes ~30-60s and >5GB RAM per occurrence.
    - **Result:** **Replacing ReLU with x^2 (depth 1) allows Leveled FHE (no bootstrapping), dropping memory from 120GB to <15GB and latency from 45 mins to <2 mins.**
