title: Why Glue Code Dominates ML Systems
scenario: "Google's technical debt paper found that in many ML systems, only 5% of the code is actual ML model code while 95% is 'glue code'."
question: "Why is only about 5% of many ML systems actual model code, and what makes up the remaining glue code?"
details:
  realistic_solution: 'ML models are typically implemented using off-the-shelf packages (sklearn, PyTorch, TensorFlow) that handle training and inference in few lines. The remaining 95% consists of: (1) Data collection and validation — ingestion pipelines, schema enforcement, missing value handling. (2) Feature extraction — transforming raw data into model-ready features with business logic. (3) Configuration management — hyperparameter configs, feature flags, model version routing. (4) Serving infrastructure — API endpoints, batching, caching, load balancing. (5) Monitoring — prediction logging, drift detection, alerting. (6) Integration adapters — converting between the ML library''s data format and the company''s internal systems. The ratio is extreme because ML libraries provide a powerful but generic abstraction; adapting that abstraction to a specific business domain requires extensive custom code. This glue code is the source of most bugs and maintenance burden because it has no standardized testing framework.'
  common_mistake: |
    **The Pitfall:** Believing the solution to technical debt is simply writing less glue code.
    **The Rationale:** Engineers assume that reducing lines of code automatically improves system health, without realizing that glue code serves critical infrastructure functions.
    **The Consequence:** Systems lack proper ingestion, monitoring, and serving infrastructure, leading to brittle and unmaintainable deployments.
  napkin_math: |
    - **Typical ML service breakdown:** ~200 lines model code, ~4,000 lines infrastructure/glue code.
    - **Calculate model code ratio:** 200 / 4200 = 4.8%.
    - **Calculate glue code ratio:** 4000 / 4200 = **95.2%**.
