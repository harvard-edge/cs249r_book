title: Embodied Carbon Concept
scenario: Your company wants to report the carbon footprint of its AI training, but the sustainability team currently only measures operational electricity emissions.
question: What is embodied carbon, and why does extending AI hardware lifespan effectively reduce annualized emissions?
details:
  realistic_solution: 'Embodied carbon is the total greenhouse gas emissions from manufacturing the hardware. This is a fixed, one-time emission that occurs regardless of usage length. Amortization means spreading this fixed emission over the operational lifetime. Extending hardware lifespans is the most effective way to reduce embodied carbon per unit of useful work.'
  common_mistake: |
    **The Pitfall:** Only counting operational carbon (electricity) in sustainability reports.
    **The Rationale:** Candidates overlook that manufacturing a GPU produces a massive fixed upfront cost (embodied carbon).
    **The Consequence:** Falsely claiming "zero carbon" on green grids while ignoring the immense manufacturing impact.
  napkin_math: |
    - **Embodied Carbon:** ~150 kg CO2e to manufacture an H100 GPU.
    - **3-Year Life:** Amortized = 150 / 3 = 50 kg CO2e/year.
    - **5-Year Life:** Amortized = 150 / 5 = 30 kg CO2e/year.
    - **Result:** Extending the lifespan by just two years yields a **40% reduction** in annualized embodied carbon.
