title: Embodied Carbon Concept
scenario: Your company wants to report the carbon footprint of its AI training. The sustainability team
  only measures operational electricity emissions. Explain what embodied carbon is and why extending hardware
  lifespan reduces it.
details:
  realistic_solution: 'Embodied carbon is the total greenhouse gas emissions from manufacturing a piece
    of hardware: mining raw materials, refining silicon, fabricating chips, assembling servers, shipping,
    and installation. For a GPU like the H100, embodied carbon is estimated at 150-200 kg CO2e per unit.
    This is a fixed, one-time emission that occurs regardless of how long the hardware is used. Amortization
    means spreading this fixed emission over the operational lifetime. Example: a GPU with 150 kg CO2e
    embodied carbon used for 3 years: 150/3 = 50 kg CO2e/year. If extended to 5 years: 150/5 = 30 kg CO2e/year
    — a 40% reduction in annualized embodied carbon. This matters because as grids get greener (more renewable
    energy), operational carbon drops but embodied carbon stays constant. At some point, embodied carbon
    becomes the dominant component. Extending hardware lifespans is the most effective way to reduce embodied
    carbon per unit of useful work.'
  common_mistake: Only counting operational carbon (electricity). Manufacturing a GPU produces 100-200
    kg CO2e — a fixed upfront cost that is often comparable to years of operational emissions.
  napkin_math: 'GPU: 150 kg CO2e to manufacture. 3-year life: 50 kg/yr. 5-year life: 30 kg/yr. 40% reduction
    just by using it 2 years longer.'
