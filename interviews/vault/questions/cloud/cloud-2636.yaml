title: BatchNorm Statistics Divergence
scenario: A BatchNorm layer has running_mean=2.0 (accumulated over 100K training steps, momentum=0.1). A single eval batch has batch mean=5.0.
question: What value does BatchNorm use for normalization in train mode vs eval mode?
details:
  realistic_solution: 'In eval mode: Uses running_mean = 2.0. The batch mean (5.0) is irrelevant - eval mode always uses the stored running statistics for deterministic behavior. In train mode: Uses the current batch mean = 5.0 for normalization. Additionally, it updates the running statistics: new_running_mean = (1 - momentum) * running_mean + momentum * batch_mean = 0.9 * 2.0 + 0.1 * 5.0 = 1.8 + 0.5 = 2.3. So training mode both uses batch statistics (noisy) AND updates the running statistics as a side effect. This is why running BatchNorm in training mode during inference is doubly wrong: predictions are batch-dependent, AND it corrupts the stored statistics that were carefully accumulated during training.'
  common_mistake: |
    **The Pitfall:** Misunderstanding the PyTorch momentum convention for BatchNorm.
    **The Rationale:** Candidates often think momentum=0.1 means 10% of the running average is kept, instead of the actual formula `new = (1-momentum) * old + momentum * batch`.
    **The Consequence:** Incorrect calculation of the running statistics and a misunderstanding of how training mode affects accumulated statistics.
  napkin_math: |
    - **Eval mode:** Uses the stored running mean = **2.0**.
    - **Train mode normalization:** Uses the current batch mean = **5.0**.
    - **Train mode running update:** `new_running_mean = (1 - momentum) * running_mean + momentum * batch_mean`.
    - **Calculate update:** `0.9 * 2.0 + 0.1 * 5.0 = 1.8 + 0.5` = **2.3**.
