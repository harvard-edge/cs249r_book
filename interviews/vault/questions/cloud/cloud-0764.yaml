title: The Silent Data Corruption at Scale
scenario: 'We are 60 days into a 90-day training run on 10,000 H100 GPUs. The loss curve looks normal, but when we evaluate on our held-out benchmark, accuracy is 8 points below the expected scaling law prediction. No crashes, no NaNs, no obvious errors in the logs.'
question: 'What could cause a model to silently underperform, and how would you detect it?'
details:
  realistic_solution: 'At 10,000-GPU scale, silent hardware errors are not rare events — they''re statistical certainties. HBM bit flips, intermittent PCIe errors, and faulty Tensor Cores can corrupt individual gradient or activation values without triggering ECC errors or NaN checks. A single corrupted gradient in one AllReduce poisons the update for all GPUs. The training loss may still decrease (SGD is robust to some noise), but the model learns subtly wrong representations. Detection requires **active monitoring beyond loss curves**: (1) periodic evaluation on a fixed validation set (not just training loss); (2) gradient norm tracking per GPU — a GPU with faulty memory will show anomalous gradient statistics; (3) checksum-based AllReduce verification — compare AllReduce results across redundant computation paths; (4) "canary" computations — run a fixed input through the model every N steps and compare output to a known-good reference.'
  common_mistake: |
    **The Pitfall:** Assuming the scaling law prediction must be wrong or the benchmark is noisy.
    **The Rationale:** Candidates dismiss silent data corruption (SDC) because they expect hardware errors to manifest as explicit crashes or NaNs.
    **The Consequence:** Discarding a $50M+ training run or releasing a permanently degraded model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Google reports ~1.5 SDC events per 1,000 GPU-days.
    - 10,000 GPUs * 90 days = 900,000 GPU-days.

    **Calculations:**
    - Total Events: 900 * 1.5 = 1,350 silent corruption events.
    - Critical Events: Even if 99% are benign, 1% cause meaningful gradient corruption = ~14 poisoning events.
    - Detection Cost: 1,000-example eval every 100 steps on 70B model = 140 TFLOPs = ~0.14 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~14 poisoning events (Reliability-Bound)**. Monitoring overhead is <0.1% of training time; the cost of not monitoring is catastrophic.
