title: The Roofline Diagnostic
scenario: You profile a custom CUDA kernel and measure 50 TFLOPS achieved throughput on an H100. Your kernel's arithmetic intensity is 8 FLOPs/byte.
question: Is this kernel compute-bound or memory-bound, and what is its theoretical attainable performance according to the roofline model?
details:
  realistic_solution: 'Calculate the memory-bandwidth ceiling: 8 FLOPs/byte x 3.35 TB/s = 26.8 TFLOPS. The ridge point is 989 / 3.35 = 295 FLOPs/byte. Since 8 << 295, this kernel is deeply memory-bound. The theoretical attainable performance is 26.8 TFLOPS, not 989 TFLOPS. Achieving 50 TFLOPS means the kernel is actually performing at 1.87x the naive bandwidth ceiling — likely exploiting L2 cache hits. The kernel is well-optimized; adding more compute won''t help. The fix is to increase arithmetic intensity (e.g., through operator fusion or tiling).'
  common_mistake: |
    **The Pitfall:** Assuming a kernel is poorly optimized just because achieved TFLOPS is far below peak TFLOPS.
    **The Rationale:** Candidates see 50 TFLOPS vs 989 TFLOPS peak and ignore the roofline model's memory bandwidth ceiling.
    **The Consequence:** Wasting time trying to optimize compute instructions when the kernel is actually memory-bound.
  napkin_math: |
    - 1. Calculate bandwidth ceiling: 8 FLOPs/byte * 3.35 TB/s (3,350 GB/s) = 26.8 TFLOPS.
    - 2. Calculate ridge point: 989 TFLOPS / 3.35 TB/s = 295 FLOPs/byte.
    - 3. Analyze AI: 8 FLOPs/byte << 295 FLOPs/byte, so the kernel is deeply memory-bound.
    - 4. Conclusion: The theoretical maximum is **26.8 TFLOPS**. Achieving 50 TFLOPS means the kernel is already exceptionally optimized and leveraging L2 cache hits.
