title: 'The Roofline Litmus Test'
scenario: 'You are analyzing a new model''s performance on an NVIDIA H100 GPU.'
question: 'What metric determines whether an H100 workload is compute-bound or memory-bound?'
details:
  realistic_solution: 'The key metric is Arithmetic Intensity (AI), which is the ratio of floating-point operations (FLOPs) to bytes of data moved from memory. If AI > Ridge Point, it is compute-bound.'
  common_mistake: |
    **The Pitfall:** Conflating model parameter count or theoretical peak TFLOPS with its performance character.
    **The Rationale:** Engineers assume that a 'bigger model' naturally means a compute-bound workload, ignoring the ratio of computation to memory access.
    **The Consequence:** The workload's bottleneck is misidentified, leading to ineffective optimization strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - H100 Hardware Specs: 989 TFLOPS peak, 3.35 TB/s memory bandwidth.
    2. **Calculations:**
       - Ridge Point: 989 TFLOPS / 3.35 TB/s = ~295 FLOPs/Byte.
       - Memory-bound example (BERT inference, batch 1): AI = 40 FLOPs/Byte (40 < 295).
       - Compute-bound example (Large Matrix Multiply): AI = 400 FLOPs/Byte (400 > 295).
    3. **Conclusion & Interpretation:**
       - **Result: Arithmetic Intensity determines the limit. Below 295 FLOPs/Byte is Memory-Bound; above is Compute-Bound.**
  options:
  - Total parameter count of the model
  - The model's theoretical peak throughput (TFLOPS)
  - Arithmetic Intensity (FLOPs per Byte)
  - Power efficiency in TOPS/Watt
  correct_index: 2
