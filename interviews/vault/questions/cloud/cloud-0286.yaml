title: The Roofline Litmus Test
scenario: "You are analyzing a new model's performance on an NVIDIA H100 GPU."
question: "What metric determines whether an H100 workload is compute-bound or memory-bound?"
details:
  realistic_solution: The key metric is **Arithmetic Intensity (AI)**, which is the ratio of floating-point operations (FLOPs) to bytes of data moved from memory. If a workload's AI is greater than the GPU's 'ridge point' (Peak TFLOPS / Memory Bandwidth), it is compute-bound. If the AI is lower, it is memory-bound, meaning performance is limited by how fast data can be fed to the compute units, not by the speed of the compute units themselves.
  common_mistake: |
    **The Pitfall:** Conflating model parameter count or theoretical peak TFLOPS with its performance character.
    **The Rationale:** Engineers assume that a 'bigger model' naturally means a compute-bound workload, ignoring the ratio of computation to memory access.
    **The Consequence:** The workload's bottleneck is misidentified, leading to ineffective optimization strategies (e.g., trying to speed up ALUs when memory is the limit).
  napkin_math: |
    - **Calculate GPU Ridge Point:** An H100 has 989 TFLOPS and 3.35 TB/s bandwidth. 989 TFLOPS / 3.35 TB/s ≈ 295 FLOPs/Byte.
    - **Analyze Memory-Bound workload:** BERT-Large inference (batch 1) might have an AI of ~40 FLOPs/Byte. Since 40 < 295, it is memory-bound.
    - **Analyze Compute-Bound workload:** A large matrix multiply might have an AI of 400 FLOPs/Byte. Since 400 > 295, it is **compute-bound**.
  options:
  - Total parameter count of the model
  - The model's theoretical peak throughput (TFLOPS)
  - Arithmetic Intensity (FLOPs per Byte)
  - Power efficiency in TOPS/Watt
  correct_index: 2
