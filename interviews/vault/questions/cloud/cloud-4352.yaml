title: Operational vs Embodied Carbon in a 1,000-GPU Training Cluster
scenario: Your team is deciding whether to train a 70B model on a 1,000-GPU H100 cluster in a region with 50gCO2e/kWh grid intensity (30 days) or a 500-GPU A100 cluster in a region with 450gCO2e/kWh (90 days). Assume a datacenter PUE of 1.2.
question: What are the operational and embodied carbon emissions for the H100 and A100 training options, and which is more carbon-efficient over a 3-year hardware lifecycle?
details:
  realistic_solution: 'Calculate both operational and embodied carbon. For modern accelerators, embodied carbon from manufacturing (fabrication, PCBs, cooling) can represent 30-70% of the lifetime footprint, especially when operated on clean grids. Even factoring in the massive embodied cost of 1,000 H100s, the operational savings from the clean grid make the H100 option far superior.'
  common_mistake: |
    **The Pitfall:** Ignoring embodied carbon entirely and only comparing operational emissions.
    **The Rationale:** Cloud provider dashboards heavily feature operational usage, obscuring the massive carbon cost of manufacturing the hardware itself.
    **The Consequence:** Selecting hardware or upgrade cycles that appear "green" operationally but have a catastrophic lifetime carbon footprint due to intense manufacturing costs.
  napkin_math: |
    1. H100 operational: $1000 \times 0.7\text{kW} \times 720\text{hr} \times 1.2\text{ PUE} \times 0.050\text{kg} = 30,240\text{ kgCO2e}$.
    2. A100 operational: $500 \times 0.4\text{kW} \times 2160\text{hr} \times 1.2\text{ PUE} \times 0.450\text{kg} = 233,280\text{ kgCO2e}$.
    3. H100 embodied (amortized for 10 runs over 3 years): $150\text{ kg/GPU} \times 1000 = 150,000\text{ kg}$.
    4. A100 embodied (amortized for 10 runs over 3 years): $80\text{ kg/GPU} \times 500 = 40,000\text{ kg}$.
    5. H100 lifecycle (10 runs): $150,000 + (10 \times 30,240) = 452,400\text{ kgCO2e}$.
    6. A100 lifecycle (10 runs): $40,000 + (10 \times 233,280) = 2,372,800\text{ kgCO2e}$.
    7. **The H100 cluster on renewables is ~5.2x more carbon-efficient over its lifecycle.**
