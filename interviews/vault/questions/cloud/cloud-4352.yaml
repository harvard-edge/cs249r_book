title: Operational vs Embodied Carbon in a 1,000-GPU Training Cluster
scenario: Your team is deciding whether to train a 70B model on a 1,000-GPU H100 cluster
  in a region with 50gCO2e/kWh grid intensity (nearly all renewables) or a 500-GPU
  A100 cluster in a region with 450gCO2e/kWh (coal-heavy grid). Training takes 30
  days on H100s or 90 days on A100s. Estimate the operational carbon for each option.
  Then estimate embodied carbon for the hardware and determine which decision is more
  carbon-efficient over a 3-year hardware lifecycle.
question: What are the operational and embodied carbon emissions for the H100 and
  A100 training options, and which is more carbon-efficient over 3 years?
details:
  realistic_solution: 'Operational carbon: H100 cluster: 1,000 × 700W × 24hr × 30
    days × PUE 1.2 = 1,000 × 0.7kW × 720hr × 1.2 = 604,800 kWh × 0.050 kgCO2e/kWh
    = 30,240 kgCO2e. A100 cluster: 500 × 400W × 24hr × 90 days × 1.2 = 500 × 0.4 ×
    2,160 × 1.2 = 518,400 kWh × 0.450 = 233,280 kgCO2e. Embodied carbon: H100 SXM5
    ≈ 150 kgCO2e per GPU (advanced 4nm TSMC node, HBM3 stacks) × 1,000 = 150,000 kg
    amortized over 3 years = 50,000 kg/year. A100 ≈ 80 kgCO2e/GPU × 500 = 40,000 kg,
    amortized = 13,333 kg/year. H100 is still better operationally (8× less operational
    carbon), but embodied costs matter at scale.'
  common_mistake: Ignoring embodied carbon entirely and only comparing operational
    emissions. For modern accelerators, embodied carbon from manufacturing (the 'embodied'
    cost of chip fabrication, PCBs, cooling hardware) can represent 30-70% of lifetime
    carbon footprint, especially when the hardware is operated on clean grids.
  napkin_math: 'H100 operational: 604,800 kWh × 0.05 = 30,240 kgCO2e. A100 operational:
    518,400 kWh × 0.45 = 233,280 kgCO2e. Operational ratio: A100/H100 = 7.7×. 3-year
    embodied: H100 total = 150,000 kg vs A100 = 40,000 kg. Embodied + operational
    (3 years, assume 10 training runs/year): H100 = 150,000 + 10×30,240 = 452,400
    kg. A100 = 40,000 + 10×233,280 = 2,372,800 kg. H100 on renewables still wins 5.2×
    over full lifecycle.'
