title: Triple Modular Redundancy Calculation
scenario: "You are operating a cloud-based inference service for critical healthcare diagnostics using GPUs. To protect against silent data corruption (SDC) and transient hardware faults, you implement Triple Modular Redundancy (TMR) across 3 independent GPU instances with a majority voting circuit. Historically, a single GPU instance has a 1% probability of producing a faulty output under sustained load during a 30-day window (p = 0.01). Assume the voting circuit is perfectly reliable and GPU failures are independent."
question: "What is the probability that the 3-GPU TMR system produces an incorrect majority output in a 30-day window?"
details:
  realistic_solution: "Use the binomial probability formula for 2 or more failures. The system fails if exactly 2 or exactly 3 instances fail. P(system fails) = 3 * p^2 * (1-p) + p^3. With p = 0.01, the failure probability is exactly 0.000298."
  common_mistake: |
    **The Pitfall:** Calculating only the probability of all three GPUs failing (p^3 = 0.000001).
    **The Rationale:** Misunderstanding how majority voting works, assuming the system survives as long as *any* node is alive.
    **The Consequence:** Underestimating the true failure rate by nearly 300x, leading to false confidence in critical healthcare system reliability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3-node TMR setup, requires majority (2 out of 3) correct to survive.
       - Individual failure probability p = 0.01.
    2. **Calculations:**
       - Single GPU Success Prob (1-p): 0.99.
       - Prob of exactly 2 failing: 3 * (0.01)^2 * (0.99) = 3 * 0.0001 * 0.99 = 0.000297.
       - Prob of exactly 3 failing: (0.01)^3 = 0.000001.
       - Total System Failure Prob: 0.000297 + 0.000001 = 0.000298.
    3. **Conclusion & Interpretation:**
       **0.0298% probability of TMR failure. Result: Reliability-Bound.**
