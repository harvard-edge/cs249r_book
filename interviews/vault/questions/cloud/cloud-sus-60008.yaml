title: Profiling autograd overhead in a training loop to identify bottlenecks
scenario: A researcher trains a custom graph neural network on H100 where each step takes 450ms. PyTorch
  profiler shows that backward() accounts for 280ms — far more than the expected ~2× forward time of 120ms.
  The model uses dynamic graph construction based on input edge lists.
question: "How would you diagnose and reduce the 280 ms backward time in this dynamic GNN on H100?"
details:
  realistic_solution: Use torch.profiler to separate CUDA time from Python overhead. If Python-side autograd
    bookkeeping exceeds 30% of backward time, restructure to use sparse tensor operations (torch.sparse_csr_tensor)
    that express the graph operation as a single differentiable op. Use pre-allocated tensor pools and
    update values in-place rather than creating new graph nodes.
  common_mistake: Building new Python-side autograd operations for each unique graph topology in every
    batch (e.g., reinitializing edge weight tensors, creating new Parameter objects mid-forward). This
    creates massive Python overhead in the autograd engine's bookkeeping, not CUDA compute.
  napkin_math: H100 backward for a 50M param GNN should take ~80ms at full utilization (matching ~40ms
    forward × 2). Observed 280ms means 200ms of overhead — likely Python autograd engine building/traversing
    a graph with 10,000+ nodes/edges creating O(N) Python objects.
