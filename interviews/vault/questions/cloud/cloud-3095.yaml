title: 'Systolic Array Specification: Design for 99% Compute Utilization on TPU'
scenario: Specify the minimum batch size and sequence length to achieve ≥99% compute
  utilization (vs memory bandwidth) on a TPU v5e (197 TFLOPS BF16, 819 GB/s, ridge
  point = 240 FLOPs/byte) for a transformer FFN layer with hidden=4096 and FFN_dim=16384.
  Derive the arithmetic intensity formula and solve for batch*seq.
question: What batch×sequence size is needed for the FFN layer to be compute-bound
  at ≥99% utilization on TPU v5e, and how do you derive it?
details:
  realistic_solution: 'FFN layer consists of two GEMMs. Let''s analyze the first: (BS, 4096) * (4096, 16384).
    FLOPs = 2 * BS * 4096 * 16384 = BS * 134.2M.
    Memory Bytes = BS*4096*2 (input) + 4096*16384*2 (weight) + BS*16384*2 (output) = BS*40,960 + 134.2M.
    AI = (BS * 134.2M) / (BS * 40,960 + 134.2M).
    To be compute-bound, we need AI ≥ Ridge Point (240 FLOPs/byte).
    240 = (BS * 134.2M) / (BS * 40,960 + 134.2M) => BS ≈ 259.
    So, a batch*sequence size of at least 259 is required just to reach the ridge point. To achieve ≥99% compute utilization, AI typically needs to be significantly higher than the ridge point (e.g., 2-3x higher, depending on the kernel and scheduler). If we target AI = 720 (3x ridge), solving for BS gives BS ≈ 922. The theoretical maximum AI (as BS → ∞) is 134.2M / 40,960 ≈ 3277 FLOPs/byte.'
  common_mistake: 'Assuming that any small batch size is sufficient to reach peak compute, or confusing the theoretical maximum AI with the actual AI at a finite batch size. Setting AI exactly equal to the ridge point only guarantees ~50% compute utilization in practice; reaching 99% requires operating well to the right of the ridge.'
  napkin_math: 'AI formula: (BS * 134.2M) / (BS * 40,960 + 134.2M).
    At BS=1: AI = 134.2M / (40,960 + 134.2M) ≈ 0.999 FLOPs/byte. Very memory bound!
    At BS=128: AI = 17.17B / (128 * 40,960 + 134.2M) = 17.17B / 139.4M ≈ 123 FLOPs/byte. Still memory bound (123 < 240).
    At BS=259: AI = 34.76B / (259 * 40,960 + 134.2M) ≈ 240 FLOPs/byte. Crossover point to compute bound!
    As BS → ∞, AI → 134.2M / 40,960 = 3277 FLOPs/byte.
    To guarantee ≥99% compute utilization, we want to operate well to the right of the ridge point, requiring a batch size of ~1024 or higher.'
