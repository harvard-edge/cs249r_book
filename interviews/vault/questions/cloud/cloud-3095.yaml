title: 'Systolic Array Specification: Design for 99% Compute Utilization on TPU'
scenario: You are tasked with analyzing compute utilization for a transformer FFN layer with hidden=4096 and FFN_dim=16384 on a TPU v5e (197 TFLOPS BF16, 819 GB/s, ridge point = 240 FLOPs/byte).
question: "What batch * sequence size is needed for the FFN layer to be compute-bound at ≥99% utilization on TPU v5e, and how do you derive it?"
details:
  realistic_solution: To be compute-bound, Arithmetic Intensity (AI) must exceed the hardware ridge point. Setting AI exactly at the ridge point only yields ~50% utilization; achieving ≥99% utilization requires operating well to the right of the ridge point (e.g., 3x the ridge point). A batch*sequence size of at least 259 reaches the ridge point, but a size closer to 1024 is needed for 99% utilization.
  common_mistake: |
    **The Pitfall:** Calculating the exact batch size where AI equals the ridge point and stopping there.
    **The Rationale:** Candidates misinterpret the Roofline model, assuming that perfectly hitting the ridge point guarantees 100% compute utilization.
    **The Consequence:** The model deployed in production hits only ~50% utilization due to scheduling overheads and imperfect memory access patterns.
  napkin_math: |
    1. **FLOPs (First GEMM):** 2 * BS * 4096 * 16384 = BS * 134.2M FLOPs.
    2. **Memory Bytes:** BS*4096*2 (input) + 4096*16384*2 (weight) + BS*16384*2 (output) = BS*40,960 + 134.2M.
    3. **AI Formula:** (BS * 134.2M) / (BS * 40,960 + 134.2M).
    4. **Ridge Point Constraint:** 240 = (BS * 134.2M) / (BS * 40,960 + 134.2M).
    5. **Solving for BS:** BS ≈ **259** (Crossover to compute-bound).
    6. **Targeting ≥99%:** We target 3x ridge (AI = 720). Solving gives BS ≈ **922**.
