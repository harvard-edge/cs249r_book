title: Diagnosing Loan Approval Parity
scenario: 'You are deploying a 5B parameter credit scoring model to process real-time loan applications. The approval rate is 45% for Group A (privileged) and 30% for Group B. A product manager notes the model''s overall accuracy is 92% and argues the system is performing optimally.'
question: 'What is the Statistical Parity Difference for Groups A and B, and why is 92% accuracy not enough for compliance?'
details:
  realistic_solution: 'Calculate the exact Statistical Parity Difference (SPD) to quantify the bias. Global accuracy metrics obscure sub-population performance. The system requires Post-Processing threshold optimization to align the positive classification rates, ensuring the model satisfies Equal Opportunity or Demographic Parity constraints mandated by fair lending regulations.'
  common_mistake: |
    **The Pitfall:** Assuming high overall model accuracy implies fairness.
    **The Rationale:** Candidates and product managers often look at global aggregate metrics (like 92% accuracy) and assume the model behaves equally well for all subpopulations.
    **The Consequence:** They overlook severe disparities in outcomes (Statistical Parity Difference), leaving the company exposed to compliance failures and regulatory penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - P(Approval | Group A): 0.45.
    - P(Approval | Group B): 0.30.
    - Target compliance SPD < 0.05.

    **Calculations:**
    - Statistical Parity Difference (SPD) = |0.30 - 0.45| = 0.15.

    **Conclusion & Interpretation:**
    - **Result: 0.15 SPD (Algorithmic-Bias-Bound)**. SPD is 0.15, massively violating the 0.05 compliance threshold; accuracy metrics mask this disparity.
