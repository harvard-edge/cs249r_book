title: The Compilation Overhead
scenario: You move a PyTorch training loop from a CPU to a GPU. The first few batches take 500ms each,
  but suddenly the latency drops to 10ms per batch. What happened inside the framework?
details:
  realistic_solution: Just-In-Time (JIT) compilation overhead. The framework spends the first few iterations
    tracing the computation graph and compiling optimized CUDA kernels for the specific tensor shapes
    you provided. Once cached, the dispatch overhead disappears.
  common_mistake: '"The GPU was warming up" or "caches were cold." GPUs don''t have a warm-up period in
    the CPU sense.'
  napkin_math: '- torch.compile tracing + Triton kernel generation: ~2-5 seconds for a typical model graph.
    | - Amortized over 3 warm-up batches: 500ms × 3 = 1.5s visible overhead (rest overlaps with first
    forward passes). | - => After compilation, kernel dispatch drops from ~50μs (eager) to ~5μs (cached),
    giving 10ms/batch steady state vs 500ms during tracing.'
