title: Debugging Randomized Smoothing Radius Collapse
scenario: Your team deployed a cloud-based fraud detection vision API providing L2 certified robustness
  using Randomized Smoothing (ResNet-50, variance σ=0.25). Under a peak load of 5,000 req/sec on an autoscaling
  group of AWS g5.2xlarge instances, the reported certified radius R unexpectedly collapses to 0 for inputs
  that normally guarantee R > 0.5. Telemetry shows a latency SLA enforcer is aggressively truncating the
  Monte Carlo noise samples (N) per inference from 100,000 down to 200 to keep p99 latency under 200ms.
question: "Why does truncating randomized-smoothing samples from 100,000 to 200 collapse the certified radius to 0, and how should you fix it?"
details:
  realistic_solution: Identify that truncating N to meet latency SLAs widens the statistical confidence
    interval for the top class probability. If the lower bound of the top class probability drops below
    0.5, the certified radius mathematically evaluates to 0. The solution is to decouple the smoothing
    inference from the synchronous API, or batch the N noise samples across multiple GPUs using tensor
    parallelism to ensure N=100,000 completes within the 200ms SLA.
  common_mistake: Assuming the model weights degraded or that sophisticated adversarial attacks are actively
    occurring, failing to analyze the mathematical relationship between the number of Monte Carlo samples
    (N) and the statistical confidence bounds required for certified robustness.
  napkin_math: 'Radius R = σ Φ⁻¹(p_lower). Using Hoeffding''s inequality for a true top-class probability
    of p=0.6 and confidence α=0.001: For N=100,000, margin of error ≈ √(ln(2/0.001)/(2*100000)) ≈ 0.006,
    so p_lower = 0.594 → R > 0. For truncated N=200, margin of error ≈ √(7.6/400) ≈ 0.137, so p_lower
    = 0.6 - 0.137 = 0.463. Since p_lower < 0.5, the certified radius R evaluates to 0.'
