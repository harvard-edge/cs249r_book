title: Debugging Randomized Smoothing Radius Collapse
scenario: Your team deployed a cloud-based fraud detection vision API providing L2 certified robustness using Randomized Smoothing (ResNet-50, variance σ=0.25). Under a peak load of 5,000 req/sec, the reported certified radius R unexpectedly collapses to 0 for inputs that normally guarantee R > 0.5. Telemetry shows a latency SLA enforcer is aggressively truncating the Monte Carlo noise samples (N) per inference from 100,000 down to 200 to keep p99 latency under 200ms.
question: Why does truncating randomized-smoothing samples from 100,000 to 200 collapse the certified radius to 0, and how should you fix it?
details:
  realistic_solution: Identify that truncating N to meet latency SLAs widens the statistical confidence interval for the top class probability. If the lower bound of the top class probability drops below 0.5, the certified radius mathematically evaluates to 0. The solution is to decouple the smoothing inference from the synchronous API, or batch the N noise samples across multiple GPUs using tensor parallelism to ensure N=100,000 completes within the 200ms SLA.
  common_mistake: |
    **The Pitfall:** Assuming model weights degraded or adversarial attacks are actively occurring.
    **The Rationale:** Engineers default to ML-specific issues rather than analyzing the statistical mechanics of the robustness algorithm.
    **The Consequence:** They miss the mathematical relationship between Monte Carlo samples and confidence bounds, failing to realize the system is functioning correctly but is statistically starved.
  napkin_math: |
    1. **Radius Formula:** R = σ Φ⁻¹(p_lower).
    2. **Original Margin (N=100,000):** Using Hoeffding's inequality for p=0.6, α=0.001: Margin of error ≈ √(ln(2/0.001)/(2×100000)) ≈ 0.006. Thus p_lower = 0.594 → R > 0.
    3. **Truncated Margin (N=200):** Margin of error ≈ √(7.6/400) ≈ 0.137. Thus p_lower = 0.6 - 0.137 = 0.463.
    4. **Conclusion:** **Because p_lower < 0.5, the certified radius R mathematically collapses to 0.** The fix is to decouple smoothing from the synchronous API or use tensor parallelism to batch the N=100,000 samples within the SLA.
