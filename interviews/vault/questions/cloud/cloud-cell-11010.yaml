title: 'Dataset Curation: Mastery — Data Flywheel Architecture for Production LLM'
scenario: You are designing a data flywheel for a production LLM serving 10M users/day on H100 clusters.
  User interactions generate 50M queries/day. Design the pipeline that converts user signals into training
  data, ensuring quality, privacy, and freshness. The model should be updated weekly.
details:
  realistic_solution: 'Pipeline: 1) Anonymize (k-anonymity, differential privacy ε=1.0) 2) Consent filter
    (keep opted-in users only, ~20%) 3) Quality gate: perplexity + length filters 4) Dedup vs existing
    corpus 5) Human review sample (1%) 6) Weekly fine-tuning run 7) A/B test before full rollout.'
  common_mistake: Collecting all user data without consent or privacy filtering; not having a quality
    gate; not measuring data freshness vs model staleness.
  napkin_math: '50M queries/day × 20% opted-in = 10M/day. Quality filter keeps 60% = 6M/day. Dedup removes
    30% = 4.2M/day. Human review: 1% = 42K/day × $0.10/review = $4,200/day = $29,400/week. Weekly dataset:
    4.2M × 7 = 29.4M new examples. Fine-tuning: 7B model, 29.4M examples × 512 tokens = 15B tokens. At
    512 H100s, 295K tokens/sec → 51,000 seconds ≈ 14 hours/week. Fits comfortably in weekend maintenance
    window.'
