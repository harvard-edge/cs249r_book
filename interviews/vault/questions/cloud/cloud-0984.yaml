title: Diagnosing High Communication-Computation Ratio in 3D Parallelism
scenario: You are profiling a 3D-parallel training run for a 175B parameter LLM on a cluster of 128 nodes (1024 GPUs). Each node has 8 GPUs connected via NVLink (300 GB/s per direction), and nodes are networked via InfiniBand (25 GB/s per GPU). Profiling reveals GPU compute utilization (SM active) is stuck at 25%, while inter-node network bandwidth utilization is pegged at 98%. The pipeline parallel bubble is minimal. The team's configuration uses Tensor Parallelism (TP)=16, Pipeline Parallelism (PP)=16, and Data Parallelism (DP)=4.
question: What is causing the 25% SM utilization, and how would you change TP/PP placement to avoid inter-node tensor-parallel AllReduce?
details:
  realistic_solution: The root cause is the TP=16 configuration, which forces high-frequency, synchronous AllReduce operations across the slow inter-node InfiniBand (25 GB/s per GPU) instead of confining them to the fast intra-node NVLink (300 GB/s per direction). Reducing TP to 8 (within one node) and compensating with PP=2 across nodes shifts the communication pattern from latency-critical AllReduce to pipeline-friendly point-to-point transfers.
  common_mistake: |
    **The Pitfall:** Recommending gradient accumulation, sequence length reduction, or overlapping communication.
    **The Rationale:** Candidates recognize a communication bottleneck but fail to map the parallel topology (TP=16) to the physical hardware boundaries (8 GPUs per node).
    **The Consequence:** The structural flaw remains; TP continues to force massive, latency-critical AllReduce operations across the slow inter-node InfiniBand links.
  napkin_math: |
    - **Activation payload per layer:** 4 (microbatch) * 2048 (seq_len) * 12288 (hidden) * 2 bytes &approx; 200MB.
    - **TP AllReduce transfers:** 2x data = ~400MB.
    - **Intra-node NVLink transfer time:** 400MB / 300 GB/s &approx; 1.3ms.
    - **Inter-node IB transfer time:** 400MB / 25 GB/s = 16ms.
    - **Baseline ratio:** Assuming layer compute takes 5ms, the communication-computation ratio on NVLink is 1.3ms / 5ms = 0.26.
    - **Conclusion:** **When TP crosses the node boundary, the ratio spikes to 16ms / 5ms = 3.2, severely bottlenecking the GPU.**
