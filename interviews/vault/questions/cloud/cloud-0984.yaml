title: Diagnosing High Communication-Computation Ratio in 3D Parallelism
scenario: You are profiling a 3D-parallel training run for a 175B parameter LLM on a cluster of 128 nodes
  (1024 A100 80GB GPUs). Each node has 8 GPUs connected via NVLink (600 GB/s bidirectional), and nodes
  are networked via 4x 200 Gbps InfiniBand (100 GB/s total per node). Profiling reveals GPU compute utilization
  (SM active) is stuck at 25%, while inter-node network bandwidth utilization is pegged at 98%. The pipeline
  parallel bubble is minimal. The team's configuration uses Tensor Parallelism (TP)=16, Pipeline Parallelism
  (PP)=16, and Data Parallelism (DP)=4.
details:
  realistic_solution: The root cause is the TP=16 configuration, which forces high-frequency, synchronous
    AllReduce operations across the slow inter-node InfiniBand (25 GB/s per GPU) instead of confining
    them to the fast intra-node NVLink (300 GB/s per direction). Reducing TP to 8 (within one node) and
    compensating with PP=2 across nodes shifts the communication pattern from latency-critical AllReduce
    to pipeline-friendly point-to-point transfers.
  common_mistake: Recommending techniques like gradient accumulation, sequence length reduction, or overlapping
    communication without identifying the structural flaw in the parallelism topology that places TP boundaries
    across slow inter-node links.
  napkin_math: TP requires an AllReduce per transformer block. For a hidden dimension of 12288, seq_len
    2048, and microbatch 4, the activation payload is 4 * 2048 * 12288 * 2B ≈ 200MB. An AllReduce transfers
    roughly 2x data = 400MB. On intra-node NVLink (~300 GB/s per direction), this takes ~1.3ms. On inter-node
    IB (25 GB/s per GPU), it takes 16ms. If layer compute takes 5ms, the communication-computation ratio
    spikes from 0.26 (compute-bound) to 3.2 (network-bound) when TP crosses the node boundary.
