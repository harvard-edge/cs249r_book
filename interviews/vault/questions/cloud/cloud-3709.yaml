title: MI300X Unified Memory Architecture for Large Model Inference
scenario: 'AMD MI300X offers 192GB HBM3 at 5.3 TB/s. A team wants to run a 70B parameter model (140GB at FP16) on a single MI300X without tensor parallelism.'
question: "Can a single MI300X serve the 70B FP16 model without tensor parallelism, and how does its decode throughput compare to 2x H100s with tensor parallelism?"
details:
  realistic_solution: 'MI300X single: 140GB model fits in 192GB (52GB remaining for KV cache). Decode throughput: 140GB / 5.3 TB/s = 26.4ms/token = 37.9 tok/s. No communication overhead. 2×H100 tensor parallel: each holds 70GB. Compute: 2×989 TFLOPS = 1978 TFLOPS. NVLink 4.0: 900 GB/s. Per-layer all-reduce: 2×d_model×2B = 2×8192×2B = 32KB. At 900 GB/s: 35ns overhead per layer — negligible. Memory BW: 2×3.35 TB/s = 6.7 TB/s. 2×H100 decode: 140GB/6.7TB/s = 20.9ms = 47.8 tok/s. Winner: 2×H100 at 47.8 tok/s vs MI300X at 37.9 tok/s, despite single-device simplicity of MI300X.'
  common_mistake: |
    **The Pitfall:** Assuming that staying on a single massive GPU (MI300X) is automatically faster than tensor parallelism across two smaller GPUs (H100s) because it avoids network communication overhead.
    **The Rationale:** Network overhead is usually the enemy of scaling, so avoiding it seems strictly better.
    **The Consequence:** Choosing the wrong hardware architecture for maximum throughput, ignoring the massive memory bandwidth advantage of aggregating multiple GPUs.
  napkin_math: |
    1. **MI300X Single:** 140GB model fits in 192GB. Decode throughput = 140GB / 5.3 TB/s = 26.4ms/token = **37.9 tokens/sec**.
    2. **2x H100 TP (Compute):** 2 * 989 TFLOPS = 1978 TFLOPS. Memory Bandwidth = 2 * 3.35 TB/s = 6.7 TB/s.
    3. **NVLink Overhead:** Per-layer all-reduce is 2 * d_model * 2B = 2 * 8192 * 2 = 32KB. At 900 GB/s NVLink, this is 35ns per layer (negligible).
    4. **2x H100 Decode:** 140GB / 6.7 TB/s = 20.9ms/token = **47.8 tokens/sec**. (2x H100 wins).
