title: MoE Parameter Count vs Active FLOPs Scaling
scenario: 'You are comparing scaling strategies: training a dense 70B model vs an MoE with 70B active
  parameters and 8× expert multiplier (560B total). Both train on the same data and compute budget. Calculate
  the per-token FLOP cost and total parameter count for each, and explain why MoE can match quality at
  lower training cost.'
details:
  realistic_solution: 'Dense 70B: Per-token FLOPs ≈ 6 × 70B = 420 GFLOPs (forward + backward). Total params:
    70B. MoE 8×70B: Per-token FLOPs ≈ 6 × 70B = 420 GFLOPs (same — only active expert params contribute
    to FLOPs). Total params: ~560B. The MoE model has 8× more parameters but identical per-token compute
    cost. More parameters means more capacity to memorize and represent patterns in the training data.
    Chinchilla scaling laws show that model quality scales with both data and parameters. MoE decouples
    parameter count from compute cost, allowing you to scale parameters ''for free'' (in FLOPs) at the
    cost of memory. This is why Mixtral 8x7B (47B params) matches Llama 2 70B quality while using only
    13B active FLOPs — it has 3.6× less compute cost per token but comparable quality through parameter
    scaling.'
  common_mistake: Confusing total parameters with training FLOPs. MoE's advantage is that it has more
    total parameters (better representation capacity) while using the same per-token FLOPs as a much smaller
    dense model.
  napkin_math: 'Dense 70B FLOPs/token: 6 × 70B = 420 GFLOPs. MoE 8×70B FLOPs/token: 6 × 70B = 420 GFLOPs
    (same). Parameter ratio: 560B/70B = 8×. FLOP ratio: 1.0×. Training speedup at iso-quality: ~2-3× (empirically,
    MoE reaches same loss in fewer tokens due to higher capacity).'
