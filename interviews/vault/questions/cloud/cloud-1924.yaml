title: Syscall Overhead from Spectre Mitigations
scenario: 'Your multi-tenant ML API runs on Intel Xeon CPUs (2.9 GHz). To secure user data against Speculative Execution flaws, you enable IBRS (Indirect Branch Restricted Speculation). Your inference pipeline involves 600 system calls per request. IBRS adds a penalty of 3,500 cycles per ring transition. The baseline inference latency is 14ms.'
question: "What is the expected latency after enabling IBRS with 600 syscalls per request on a 2.9 GHz CPU?"
details:
  realistic_solution: 'Calculate the total cycle penalty from all ring transitions and convert it to milliseconds using the CPU frequency. To resolve it, switch to hardware with eIBRS or use Retpolines to reduce the syscall penalty.'
  common_mistake: |
    **The Pitfall:** Assuming speculative execution patches only affect context switches between tenants.
    **The Rationale:** Developers often abstract away kernel interactions as zero-cost.
    **The Consequence:** Ignoring the severe cycle penalty incurred on every single user-space to kernel-space transition (syscalls) within a single request, leading to unexpected >10% latency regressions.
  napkin_math: |
    1. **Transitions:** 600 syscalls × 2 (user→kernel and kernel→user) = 1,200 transitions.
    2. **Total Penalty Cycles:** 1,200 × 3,500 = 4,200,000 cycles.
    3. **CPU Clock:** 2.9 GHz = 2,900,000,000 cycles/sec.
    4. **Time Penalty:** 4,200,000 / 2,900,000,000 ≈ 0.001448 seconds ≈ 1.45 ms.
    5. **New Latency:** 14 ms + 1.45 ms = 15.45 ms.
    
    **Final Result: The mitigation adds ~1.45ms of overhead, bringing the latency to 15.45ms.**
