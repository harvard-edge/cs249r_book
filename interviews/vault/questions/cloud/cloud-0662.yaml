title: The Multi-LoRA Serving
scenario: We run a multi-tenant LLM platform. Each of our 100 enterprise customers has a fine-tuned LoRA adapter for a shared Llama-70B base model. We need to serve all 100 adapters from the same GPU cluster.
question: "How would you serve 100 LoRA adapters for a shared Llama-70B base model, including memory, swapping, and batching across adapters?"
details:
  realistic_solution: 'Batch the base model computation across all requests, then apply per-adapter corrections using a batched SGMV (Segmented Gather Matrix-Vector) kernel like in S-LoRA or Punica. The base model weights W are shared; only B and A differ per adapter.'
  common_mistake: |
    **The Pitfall:** Assuming 100 small LoRA adapters can be naively loaded and batched together.
    **The Rationale:** Candidates forget that standard batching requires identical weights across all requests.
    **The Consequence:** Drastically reduced throughput due to unbatched sequential processing or OOM from memory fragmentation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Llama-70B base model = 140 GB (FP16).
       - 100 LoRA adapters (rank-16, ~160MB each).
       - Total VRAM available = 160 GB (2x H100 80GB).
    2. **Calculations:**
       - Base model memory = 140 GB.
       - Total adapters memory = 100 * 160 MB = 16 GB.
       - Total weights memory = 156 GB.
       - Remaining VRAM for KV cache = 160 GB - 156 GB = 4 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 4 GB KV cache remaining.** The bottleneck is **VRAM Capacity-Bound**. Requires 4x H100s or CPU offloading.
