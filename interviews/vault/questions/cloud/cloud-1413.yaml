title: Dynamic Batching Latency Budget
scenario: You are configuring a dynamic batching inference server (like Triton) for a fraud detection model on an NVIDIA T4 GPU. The system has a strict P99 latency SLA of 50ms. Client-to-server network routing and API gateway overhead consumes 15ms. The model's batch execution time scales linearly as $T_{exec} = 4\text{ms} + (\text{batch\_size} \times 0.5\text{ms})$.
question: What is the maximum safe `max_batch_delay` you can set with a batch size of 32 to maximize throughput without violating the 50ms P99 SLA?
details:
  realistic_solution: The maximum safe batch delay is 15ms. The delay must be calculated by subtracting both the network overhead and the worst-case batch execution time from the total SLA latency budget.
  common_mistake: |
    **The Pitfall:** Setting the `max_batch_delay` to the full remaining SLA after network overhead (35ms).
    **The Rationale:** Candidates forget that the delay budget must also account for the worst-case execution time of the maximum possible batch.
    **The Consequence:** The first request in the queue waits the full delay, then waits for the large batch to compute, resulting in SLA violations.
  napkin_math: |
    - **Total SLA Budget:** 50 ms.
    - **Network Overhead:** 15 ms.
    - **Available Server Budget:** 50 ms - 15 ms = 35 ms.
    - **Worst-Case Execution (batch=32):** 4 ms + (32 $\times$ 0.5 ms) = 20 ms.
    - **Result: Max Safe Delay = Server Budget (35 ms) - Max Execution Time (20 ms) = 15 ms.**
