title: Dynamic Batching Latency Budget
scenario: 'You are configuring a dynamic batching inference server (like Triton) for a fraud detection
  model on an NVIDIA T4 GPU. The system has a strict P99 latency SLA of 50ms. Client-to-server network
  routing and API gateway overhead consumes 15ms. The model''s batch execution time scales linearly: T_exec
  = 4ms + (batch_size * 0.5ms). If you configure the server to allow a maximum batch size of 32, what
  is the maximum ''max_batch_delay'' you can safely set to maximize throughput without violating the SLA
  for the first request in the batch queue?'
question: "What is the maximum safe max_batch_delay with batch size 32 under the 50ms P99 SLA?"
details:
  realistic_solution: The maximum safe batch delay is 15ms. The delay must be calculated by subtracting
    both the network overhead and the worst-case batch execution time from the total SLA latency budget.
  common_mistake: Setting the max_batch_delay to the full remaining SLA after network overhead (35ms),
    forgetting that the delay must also leave room for the worst-case execution time of the maximum batch.
  napkin_math: 'Total SLA = 50ms

    Network Overhead = 15ms

    Available Server Budget = 50ms - 15ms = 35ms

    Worst-case execution time (batch=32) = 4ms + (32 * 0.5ms) = 20ms

    Max safe delay = Server Budget (35ms) - Max T_exec (20ms) = 15ms'
