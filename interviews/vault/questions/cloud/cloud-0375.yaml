title: The 70kW Rack Limit
scenario: 'You are designing a new AI cluster. Your data center provider gives you a standard rack with a maximum power and cooling budget of 70 kW. You plan to populate this rack with NVIDIA H100 GPUs. The data center has a Power Usage Effectiveness (PUE) of 1.2.'
question: 'How many 700W H100 GPUs can you safely install in a 70 kW rack when PUE is 1.2?'
details:
  realistic_solution: 'The correct approach is to account for the total power draw per GPU as seen by the data center''s infrastructure, which includes the overhead captured by the PUE. The H100''s 700W TDP must be multiplied by the PUE of 1.2. Dividing the rack''s total 70kW budget by this corrected power footprint gives the maximum number of GPUs.'
  common_mistake: |
    **The Pitfall:** Ignoring Power Usage Effectiveness (PUE) when calculating capacity.
    **The Rationale:** Engineers calculate the number of GPUs based solely on the GPU's stated TDP.
    **The Consequence:** Under-provisioning cooling and exceeding the rack's limits, causing thermal throttling or circuit breaker trips.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Rack Capacity: 70 kW (70,000W).
       - Data Center PUE: 1.2.
       - GPU TDP: 700W.
    2. **Calculations:**
       - Total Power Footprint per GPU = GPU TDP * PUE.
       - Footprint = 700W * 1.2 = 840W per GPU.
       - Rack Capacity = 70,000W / 840W = 83.33.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound. 83 GPUs can be safely installed.**
  options:
  - 100 GPUs
  - 120 GPUs
  - 83 GPUs
  - 87 GPUs
