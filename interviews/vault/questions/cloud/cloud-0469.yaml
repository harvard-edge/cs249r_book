title: The Privacy vs. Profit A/B Test
scenario: 'You are an ML Systems Engineer at a large financial institution. Your team runs a fraud detection model serving all 100 million users from a centralized GPU cluster. Management wants to evaluate replacing this with a Federated Learning (FL) approach for improved data privacy.'
question: 'Which approach has the lower 3-year TCO, and what is the cost of the privacy premium?'
details:
  realistic_solution: 'Calculate a strict 3-year TCO for both architectures. The centralized approach benefits from massive economies of scale and highly optimized inference hardware. The Federated Learning approach introduces a severe "privacy premium" via massive R&D personnel costs, coordination server clustering, and increased statistical overhead (requiring more training rounds). The centralized approach is dramatically more economical.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the privacy benefits of Federated Learning without quantifying its massive upfront R&D and infrastructure costs.
    **The Rationale:** Engineers often assume decentralized compute is "free" without factoring in the coordination servers, engineering time, and reduced statistical efficiency.
    **The Consequence:** Recommending a massively more expensive architecture without making the "privacy premium" explicit to management.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Option A (Centralized): 8 GPUs training (24hrs/wk), 16 GPUs inference (24/7) @ $2.50/hr.
       * Option B (Federated): 5 Eng R&D ($250k/ea), 4 GPUs coord (24/7), 20% training overhead, 1 SRE ($200k/yr).
    2. **Calculations:**
       * Centralized TCO: Training (8*24*52*3*2.5) + Inference (16*8760*3*2.5) ≈ $75k + $1.05M = $1.13M.
       * Federated TCO: R&D ($1.25M) + Coord (4*8760*3*2.5) + Training ($90k) + SRE ($600k) ≈ $2.20M.
    3. **Conclusion & Interpretation:**
       * **Result: Federated Learning is ~$1.08M more expensive, representing the explicit 3-year privacy premium.**
  options:
  - $1.13M Centralized TCO. $200k Federated TCO. (Missed R&D and SRE costs)
  - $4.70M Centralized TCO. $2.20M Federated TCO. (Miscalculated massive A100 fleet for inference)
  - $1.13M Centralized TCO. $2.20M Federated TCO. The privacy premium is ~$1.08M over 3 years.
  - $1.13M Centralized TCO. $1.13M Federated TCO. (Assumed equal costs)
  correct_index: 2
