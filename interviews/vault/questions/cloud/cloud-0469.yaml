title: The Privacy vs. Profit A/B Test
scenario: 'You are an ML Systems Engineer at a large financial institution. Your team runs a fraud detection
  model serving all 100 million users from a centralized GPU cluster. Management wants to evaluate replacing
  this with a Federated Learning (FL) approach for improved data privacy. You need to compare the 3-year
  Total Cost of Ownership (TCO) for two options. Option A (Centralized): Your current cluster uses 8 A100
  GPUs for training (re-trained weekly) and 16 A100 GPUs for inference, at a cloud cost of $2.50/GPU-hour.
  Option B (Federated): FL requires a 12-month R&D effort with a team of 5 engineers (average fully-loaded
  cost: $250K/year each), a coordination server cluster of 4 A100 GPUs running continuously, 20% more
  training rounds due to non-IID data across clients, and ongoing operational overhead of 1 additional
  SRE ($200K/year). Which approach has the lower 3-year TCO, and what is the cost of the privacy premium?'
details:
  realistic_solution: 'Option A (Centralized) 3-year TCO: Training (weekly, 24 hrs/run): 8 GPUs × 24 hrs
    × 52 wks × 3 yrs × $2.50 = $74,880. Inference (24/7): 16 GPUs × 8,760 hrs × 3 yrs × $2.50 = $1,051,200.
    Total A ≈ $1.13M. Option B (Federated) 3-year TCO: R&D: 5 × $250K = $1.25M. Coordination server: 4
    GPUs × 8,760 × 3 × $2.50 = $262,800. FL training: $74,880 × 1.2 = $89,856. SRE: $200K × 3 = $600K.
    Total B ≈ $2.20M. The privacy premium is ~$1.08M over 3 years (~$360K/yr). The centralized approach
    is dramatically more economical; management must decide if the privacy benefit justifies nearly doubling
    the cost.'
  common_mistake: Engineers often focus solely on the privacy benefits of Federated Learning without quantifying
    its massive upfront R&D and infrastructure costs. Conversely, they may underestimate the long-term
    operational costs (power, cooling, maintenance) of a large, centralized GPU fleet. This question forces
    a direct, quantitative comparison of the TCO.
  napkin_math: '1. **Centralized Cost (3 years):** Training: 8 GPUs × 24 hrs/week × 52 weeks/yr × 3 yrs
    = 29,952 GPU-hrs. Cost: 29,952 × $2.50 = $74,880. Inference: 16 GPUs × 8,760 hrs/yr × 3 yrs = 420,480
    GPU-hrs. Cost: 420,480 × $2.50 = $1,051,200. Total centralized = $74,880 + $1,051,200 = $1,126,080
    ≈ $1.13M. 2. **Federated Cost (3 years):** R&D (one-time): 5 × $250K = $1,250,000. Coordination server:
    4 GPUs × 8,760 hrs/yr × 3 yrs × $2.50 = $262,800. FL training (1.2× overhead): $74,880 × 1.2 = $89,856.
    Additional SRE: $200K × 3 yrs = $600,000. Total federated = $1,250,000 + $262,800 + $89,856 + $600,000
    = $2,202,656 ≈ $2.20M. 3. **Privacy premium:** $2.20M − $1.13M ≈ $1.08M over 3 years.'
  options:
  - The TCO calculation is a secondary concern. The federated approach is superior because sending raw
    financial data to a central server is an unacceptable security risk.
  - Centralized is more expensive. The calculation requires serving the entire 100M user base, which needs
    ~60 H100s and results in a 3-year TCO of over $4.7 million.
  - Federated is the better long-term financial decision. Although the initial R&D cost is high, its annual
    operational cost is lower than the centralized option's, meaning it will eventually break even.
  - Centralized TCO is ~$1.13M and Federated TCO is ~$2.20M. The federated approach costs nearly 2× more,
    with a privacy premium of ~$1.08M over 3 years.
  correct_index: 3
