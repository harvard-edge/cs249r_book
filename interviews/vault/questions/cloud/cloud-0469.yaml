title: The Privacy vs. Profit A/B Test
scenario: You are an ML Systems Engineer at a large financial institution. Your team runs a fraud detection model serving all 100 million users from a centralized GPU cluster. Management wants to evaluate replacing this with a Federated Learning (FL) approach for improved data privacy. Option A (Centralized): Your current cluster uses 8 A100 GPUs for training (re-trained weekly) and 16 A100 GPUs for inference, at a cloud cost of $2.50/GPU-hour. Option B (Federated): FL requires a 12-month R&D effort with a team of 5 engineers (average fully-loaded cost: $250K/year each), a coordination server cluster of 4 A100 GPUs running continuously, 20% more training rounds due to non-IID data across clients, and ongoing operational overhead of 1 additional SRE ($200K/year).
question: Which approach has the lower 3-year TCO, and what is the cost of the privacy premium?
details:
  realistic_solution: 'Option A (Centralized) 3-year TCO: Training (weekly, 24 hrs/run): 8 GPUs × 24 hrs × 52 wks × 3 yrs × $2.50 = $74,880. Inference (24/7): 16 GPUs × 8,760 hrs × 3 yrs × $2.50 = $1,051,200. Total A ≈ $1.13M. Option B (Federated) 3-year TCO: R&D: 5 × $250K = $1.25M. Coordination server: 4 GPUs × 8,760 × 3 × $2.50 = $262,800. FL training: $74,880 × 1.2 = $89,856. SRE: $200K × 3 = $600K. Total B ≈ $2.20M. The privacy premium is ~$1.08M over 3 years (~$360K/yr). The centralized approach is dramatically more economical; management must decide if the privacy benefit justifies nearly doubling the cost.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the privacy benefits of Federated Learning without quantifying its massive upfront R&D and infrastructure costs.
    **The Rationale:** Engineers often assume decentralized compute is "free" without factoring in the coordination servers, engineering time, and reduced statistical efficiency (more rounds).
    **The Consequence:** Recommending a massively more expensive architecture without making the "privacy premium" explicit to management.
  napkin_math: |
    1. **Centralized Training:** 8 GPUs × 24 hrs/week × 52 weeks × 3 yrs = 29,952 GPU-hrs × $2.50 = $74,880.
    2. **Centralized Inference:** 16 GPUs × 8,760 hrs/yr × 3 yrs = 420,480 GPU-hrs × $2.50 = $1,051,200.
    3. **Total Centralized (Option A):** $74,880 + $1,051,200 = ~$1.13M.
    4. **Federated R&D:** 5 engineers × $250,000/yr × 1 yr = $1,250,000. (Assuming R&D is 1 year cost).
    5. **Federated Server:** 4 GPUs × 8,760 hrs × 3 yrs × $2.50 = $262,800.
    6. **Federated Training:** $74,880 × 1.2 = $89,856.
    7. **Federated Ops:** 1 SRE × $200,000/yr × 3 yrs = $600,000.
    8. **Total Federated (Option B):** $1,250,000 + $262,800 + $89,856 + $600,000 = ~$2.20M.
    9. **Conclusion:** **Federated is roughly $1.08M more expensive, representing the 3-year privacy premium.**
  options:
  - The TCO calculation is a secondary concern. The federated approach is superior because sending raw financial data to a central server is an unacceptable security risk.
  - Centralized is more expensive. The calculation requires serving the entire 100M user base, which needs ~60 H100s and results in a 3-year TCO of over $4.7 million.
  - Federated is the better long-term financial decision. Although the initial R&D cost is high, its annual operational cost is lower than the centralized option's, meaning it will eventually break even.
  - Centralized TCO is ~$1.13M and Federated TCO is ~$2.20M. The federated approach costs nearly 2x more, with a privacy premium of ~$1.08M over 3 years.
