title: Cloud Through Silicon Vias L5 0
scenario: Your team is choosing between an accelerator with 6 HBM3 stacks (5 TB/s) and one with 4 HBM3 stacks (3.35 TB/s) for serving a memory-bandwidth-bound 70B LLM.
question: How do you evaluate the cost-performance trade-off between the 6-stack and 4-stack HBM3 accelerators for serving a 70B LLM?
details:
  realistic_solution: '70B model in FP16 = 140 GB. At batch=1 autoregressive decode, each token reads all weights once. With 3.35 TB/s: 140 GB / 3.35 TB/s = 41.8 ms/token ≈ 24 tok/s. With 5.0 TB/s: 140 GB / 5.0 TB/s = 28 ms/token ≈ 36 tok/s. The 6-stack design gives 50% more tokens/s. Cost per token: if 6-stack costs 40% more but serves 50% more tokens, it is more cost-efficient at high utilization.'
  common_mistake: |
    **The Pitfall:** Assuming compute (FLOPS) is the bottleneck for LLM decode.
    **The Rationale:** Candidates often look at the TFLOPS specs.
    **The Consequence:** They miss that at batch=1, decode is purely memory-bandwidth-bound since each weight is used only once per token.
  napkin_math: |
    - 1. **Model Size:** 70B params × 2 bytes/param = 140 GB.
    - 2. **4-stack throughput:** 140 GB / 3.35 TB/s = 41.8 ms/token ≈ 24 tok/s.
    - 3. **6-stack throughput:** 140 GB / 5.0 TB/s = 28 ms/token ≈ 36 tok/s.
    - 4. **Trade-off:** **50% throughput gain for the 6-stack design**.
