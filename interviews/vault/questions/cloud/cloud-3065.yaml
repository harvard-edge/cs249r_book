title: 'Pipeline Parallelism Fluency: Rapid Bubble Estimation'
scenario: 'Without a calculator, estimate from memory: (1) bubble fraction for p=8
  stages and m=56 micro-batches, (2) what micro-batch count achieves <5% bubble for
  p=4, and (3) how much throughput is lost to bubble for a 500 TFLOP/s effective cluster
  with 12% bubble overhead. H100 peak: 1979 TFLOPs BF16.'
question: What H100 FP16 TFLOPS number should you use for throughput estimates instead
  of 1979 TFLOPs?
details:
  realistic_solution: 'H100 FP16: 989 TFLOPS (not 1979). All throughput calculations
    should use 989 TFLOPS as the H100 FP16 spec.'
  common_mistake: Reaching for a calculator instead of applying the formula algebraically
    and rounding to sensible precision for napkin estimates.
  napkin_math: 'H100 at 989 TFLOPS FP16 (corrected from 1979). Training throughput
    for 7B model: 6×7B×tokens/s = compute. At 989T × 0.45 MFU = 445 TFLOPS. Tokens/s
    = 445T/(6×7B) = 445T/42B = 10,595 tokens/s per GPU.'
