title: 'Pipeline Parallelism Fluency: Rapid Bubble Estimation'
scenario: 'Without a calculator, estimate from memory: (1) bubble fraction for p=8 stages and m=56 micro-batches, (2) what micro-batch count achieves <5% bubble for p=4, and (3) how much throughput is lost to bubble for a 500 TFLOP/s effective cluster with 12% bubble overhead. H100 peak: 1979 TFLOPs BF16.'
question: What are the estimates for the bubble fraction (p=8, m=56), the micro-batch count for <5% bubble (p=4), and the throughput lost to a 12% bubble on a 500 TFLOP/s cluster?
details:
  realistic_solution: '(1) Bubble fraction = (p-1)/(m+p-1). For p=8, m=56: 7 / (56+8-1) = 7/63 = 1/9 ≈ 11.1%. (2) For p=4, bubble = 3/(m+3) < 0.05. So m+3 > 60 => m > 57. Thus m=58 or higher (often rounded to 60 or 64). (3) A 12% bubble overhead means the throughput lost is simply 12% of 500, which is 60 TFLOP/s.'
  common_mistake: Reaching for a calculator instead of applying the formula algebraically and rounding to sensible precision for napkin estimates.
  napkin_math: '(1) (8-1)/(56+8-1) = 7/63 = 1/9 = 11.1%. (2) 3/(m+3) < 0.05 => m+3 > 60 => m > 57. (3) 0.12 * 500 = 60 TFLOP/s lost.'
