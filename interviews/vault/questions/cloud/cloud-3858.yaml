title: Architecting RDMA Transport for H100 Distributed Training
scenario: Architect the RDMA transport layer for a distributed training cluster of 128 nodes, where each node has 8 GPUs connected via NVLink (900 GB/s). Inter-node networking uses 8x InfiniBand HCAs per node, providing 50 GB/s per port.
question: How would you design the RDMA transport, memory registration, and buffering for the 128-node ring all-reduce?
details:
  realistic_solution: The optimal design uses one-sided RDMA Write operations directly to pre-registered GPU memory buffers (GPUDirect RDMA) to achieve zero-copy kernel bypass. For the rail-optimized topology, the architecture should pipeline the intra-node Reduce-Scatter (using NVLink) into small chunks, which are then pushed via RDMA Write across the IB NDR links to the corresponding rail-aligned GPU on the next node, hiding the slower network bandwidth behind NVLink speed.
  common_mistake: |
    **The Pitfall:** Proposing two-sided Send/Recv semantics or dynamically registering memory regions during the collective.
    **The Rationale:** Candidates default to standard message passing paradigms and ignore the CPU and PCIe bottlenecks inherent to two-sided verbs.
    **The Consequence:** Severe latency on the critical path, throttling the 900 GB/s NVLink down to host memory speeds.
  napkin_math: |
    1. Total inter-node bandwidth per node = 8 ports * 50 GB/s = 400 GB/s.
    2. Intra-node NVLink bandwidth = 900 GB/s per GPU.
    3. For an All-Reduce of a 16 GB gradient array across N nodes, network transfer per node is 2 * 16 GB * ((N-1)/N) ≈ 32 GB.
    4. Minimum network time = 32 GB / 400 GB/s = 80 ms.
    5. By pipelining, the 900 GB/s NVLink operations (~17 ms) are completely hidden.
    **The 80 ms network transfer becomes the absolute bounding factor.**
