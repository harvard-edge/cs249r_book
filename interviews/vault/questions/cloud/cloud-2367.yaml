title: ECMP vs Adaptive Routing for Elephant Flows
scenario: In a 4,096 GPU cluster using 400 Gbps RoCEv2 over a 2-tier Fat-Tree, you observe that link utilization rarely exceeds 60% during 3D-parallel LLM training, yet the GPUs are network-bound. The network uses static ECMP (Equal-Cost Multi-Path) routing based on 5-tuple hashing. Tensor Parallelism generates massive 100 Gbps 'elephant flows'.
question: Should you replace static ECMP with packet-level adaptive routing to push RoCEv2 utilization above 60%, and what hardware tradeoff does it create?
details:
  realistic_solution: |
    The 60% utilization ceiling is a classic symptom of ECMP hash collisions. Because ECMP routes per-flow (based on the 5-tuple: source/dest IP, source/dest port, protocol), large ML workloads generating a small number of massive 'elephant flows' (like Tensor Parallelism transfers) do not hash evenly across available uplinks. Multiple 100 Gbps flows hash to the same 400 Gbps uplink, causing microbursts and PFC (Priority Flow Control) pauses, while other links remain idle.

    Switching to packet-level Adaptive Routing (AR) sprays packets of a single flow across all available paths based on switch queue depths. This perfectly balances the load and can push utilization near 100%. However, the tradeoff is that packets arrive out-of-order. RoCEv2 NICs expect in-order delivery; out-of-order packets trigger NAKs and retransmissions in standard RoCE. To support AR, the receiving NICs (or DPUs) must possess massive reordering buffers and silicon capable of line-rate reassembly. If the NICs lack this hardware support, AR will actually collapse performance due to CPU overhead or dropped packets. The architectural tradeoff is between the simplicity and in-order guarantee of ECMP (at the cost of over-provisioning bandwidth to absorb collisions) versus the high utilization of AR (at the cost of requiring expensive, specialized NIC hardware).
  common_mistake: |
    **The Pitfall:** Assuming Adaptive Routing simply increases utilization to 100% without severe hardware tradeoffs.
    **The Rationale:** Engineers recognize the hash collision problem of ECMP and assume dynamic routing is a free software fix.
    **The Consequence:** Deploying Adaptive Routing without hardware support for out-of-order packet reassembly, which causes massive retransmissions and completely collapses network performance.
  napkin_math: |
    - **ECMP Hashing:** Static ECMP hashes packet headers to distribute flows.
    - **Collision Probability:** If a switch has 4 uplinks and needs to route 4 massive elephant flows, the probability of perfect balance (no collisions) = 4! / 4^4 = 24 / 256 = 9.3%.
    - **Conclusion: 90.7% of the time, multiple flows collide on the same uplink, creating severe microbursts and artificially capping overall utilization at ~60%.**
