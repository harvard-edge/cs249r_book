validation_issues:
- The 'Llama-70B has 80 layers and hidden_dim of 8192' in Napkin Math is incorrect; Llama-2 70B has 80
  layers and hidden_dim of 8192, but it has 8 KV heads, not 80.
- The KV cache memory calculation uses `8192 dim`, but the standard formula uses `head_dim`, not `hidden_dim`.
  For Llama 2 70B with 8 KV heads, `head_dim` is `8192 / 8 = 1024` or (for GQA) `8192 / num_attention_heads`.
