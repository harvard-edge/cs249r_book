title: MI300X OAM Module Thermal Interface and Cooling Validation
scenario: You are qualifying a new MI300X OAM (Open Accelerator Module) server for production. The vendor
  spec states a maximum junction temperature of 110°C and a thermal design current (TDC) of 750W at 25°C
  ambient. Your datacenter runs at 30°C ambient supply air. During burn-in tests, the HBM stack temperature
  (visible via AMD SMI) reaches 95°C at 90% GPU utilization, but the die temperature is 82°C. Implement
  a monitoring policy that prevents thermal throttling, identify the thermal margin remaining, and calculate
  the maximum safe utilization given your ambient conditions.
details:
  realistic_solution: 'Two thermal limits to monitor: die junction = 110°C limit (current: 82°C, margin
    = 28°C). HBM temperature = 85°C typical soft limit (current: 95°C—already over limit!). Root cause:
    HBM at 95°C is above the 85°C performance threshold—MI300X may already be throttling memory bandwidth
    by 10-20%. At 30°C ambient (5°C over 25°C TDC baseline), derate TDP by ~5W/°C × 5°C = ~25W, so effective
    TDC = 725W. Policy: alert at HBM ≥ 80°C, throttle workload at 85°C, emergency shutdown at 95°C. Adjust
    fan curve for 30°C ambient to maintain HBM < 80°C at 90% util.'
  common_mistake: Using junction temperature (die temp) as the only throttle indicator while ignoring
    HBM stack temperature. MI300X has separate thermal limits for the compute die (~110°C) and HBM3 stacks
    (~85-90°C). HBM throttling often triggers before die throttling in memory-bandwidth-heavy workloads.
  napkin_math: 'HBM thermal margin: limit 85°C, current 95°C → -10°C (over limit). Die thermal margin:
    110 - 82 = 28°C remaining. At 5°C ambient increase: typical thermal resistance GPU die-to-ambient
    ≈ 0.1°C/W. To reduce die temp by 10°C: reduce power by 100W. 90% util at 750W = 675W. Target: 575W
    (reduce util to ~77%). Or increase cooling airflow: doubling airflow reduces θja by ~30% → could recover
    8-9°C headroom. AMD SMI monitoring: amd-smi metric --gpu -m TEMP | grep -E ''HBM|junction''. Alert
    threshold: HBM > 78°C (7°C below limit for reaction time).'
