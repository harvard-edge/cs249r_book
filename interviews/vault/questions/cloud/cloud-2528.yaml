title: Cloud Transient Loads L2 0
scenario: A datacenter operator reports that when a 10,000-GPU training cluster starts an AllReduce synchronization,
  the facility's power draw spikes by 2 MW for 500 ms. Explain transient loads and why they are a problem.
details:
  realistic_solution: 'Transient loads are sudden, short-duration power demand spikes caused by synchronized
    operations across many accelerators. During AllReduce, all GPUs transition from compute (high power)
    to network I/O (lower power) and back simultaneously. The synchronized return to compute creates a
    coordinated power spike. This matters because: (1) grid infrastructure is provisioned for average
    power, not peak spikes, (2) voltage regulators and UPS systems have finite response times, and (3)
    repeated transients can trigger breaker trips or damage power distribution equipment.'
  common_mistake: Thinking power management is only about total energy consumption. The rate of change
    (dP/dt) of power draw is often more dangerous to infrastructure than the absolute magnitude.
  napkin_math: 'H100 TDP: 700W. 10,000 GPUs idle-to-compute swing: ~300W each. Synchronized spike: 10,000
    × 300W = 3 MW transient. Grid expects steady 5 MW average but sees 3-8 MW oscillation. Capacitor banks
    needed: 3 MW × 0.5s = 1.5 MJ of buffering.'
