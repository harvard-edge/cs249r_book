title: 'DP-SGD Deployment on AMD MI300X: Budgeting Epsilon and Performance Impact'
scenario: Your team is deploying a large language model (LLM) fine-tuning service for a highly sensitive medical dataset. You must implement Differential Privacy Stochastic Gradient Descent (DP-SGD) during training. The model has 70B parameters, and you use a micro-batch size of 16. You need to achieve an overall privacy budget of ε=8 with δ=1e-5 over 10 epochs on an AMD MI300X GPU (192 GB HBM3).
question: "How would you configure DP-SGD for the 70B LLM on MI300X to meet epsilon=8, delta=1e-5 over 10 epochs while preserving throughput and quality?"
details:
  realistic_solution: To address the MI300X's memory and compute, use a gradient clipping strategy that can be efficiently implemented (e.g., layer-wise clipping or per-sample clipping for small micro-batches). Carefully select the noise scale based on the desired ε, δ, and the number of training steps (epochs * data_size / effective_batch_size). Given 192 GB HBM3, a 70B parameter model in FP16 (140GB) is feasible, leaving room for gradients and activations. Leverage the 1,307 TFLOPS FP16 sparse compute for optimized training, potentially using mixed-precision training. The 5.3 TB/s bandwidth is crucial for frequent data movement during micro-batch processing. Optimize custom kernels for gradient clipping and noise addition where possible to maximize MI300X throughput. Utilize libraries like Opacus or Hugging Face's PEFT with DP-SGD support, ensuring their implementation is hardware-aware.
  common_mistake: |
    **The Pitfall:** Overlooking the massive computational and memory overhead of per-sample gradient clipping.
    **The Rationale:** Engineers unfamiliar with DP-SGD assume it operates similarly to standard SGD, without realizing that gradients must be instantiated *per sample* before averaging.
    **The Consequence:** The training job immediately triggers an Out-Of-Memory error, or grinds to a halt due to the extreme overhead of managing and clipping un-aggregated gradients.
  napkin_math: |
    - Standard Memory: 70B model in FP16 = 140 GB. Gradients = 140 GB. Total = 280 GB.
    - 280 GB already exceeds the MI300X's 192 GB limit, requiring gradient accumulation or offloading even *without* privacy.
    - DP-SGD Memory: Per-sample clipping requires instantiating gradients for each of the 16 items in the micro-batch simultaneously.
    - Memory footprint scales massively: 140 GB × 16 = 2,240 GB of transient memory required.
    - **DP-SGD on a 70B model requires extreme optimization (like Ghost Clipping or LoRA adapters) because naive per-sample gradients will instantly OOM the 192 GB hardware.**
