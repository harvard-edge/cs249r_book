title: 'DP-SGD Deployment on AMD MI300X: Budgeting Epsilon and Performance Impact'
scenario: Your team is deploying a large language model (LLM) fine-tuning service
  for a highly sensitive medical dataset. Due to stringent privacy regulations, you
  must implement Differential Privacy Stochastic Gradient Descent (DP-SGD) during
  training. The target hardware for this training is an AMD MI300X GPU, boasting 192
  GB HBM3 memory, 1,307 TFLOPS FP16 sparse compute, and 5.3 TB/s memory bandwidth.
  The model has 70B parameters, and you've decided on a micro-batch size of 16 for
  DP-SGD. You need to achieve an overall privacy budget of ε=8 with δ=1e-5 over 10
  epochs. Design a strategy to configure DP-SGD parameters (clipping norm, noise scale,
  batch size) to maintain the privacy budget, utilize the MI300X's capabilities effectively,
  and minimize the privacy-utility tradeoff. Specifically, how would you size your
  training run considering the memory and computational constraints of the MI300X,
  and what impact would your chosen DP parameters have on training throughput and
  model quality?
question: How would you configure DP-SGD for the 70B LLM on MI300X to meet epsilon=8,
  delta=1e-5 over 10 epochs while preserving throughput and quality?
details:
  realistic_solution: To address the MI300X's memory and compute, use a gradient clipping
    strategy that can be efficiently implemented (e.g., layer-wise clipping or per-sample
    clipping for small micro-batches). Carefully select the noise scale based on the
    desired ε, δ, and the number of training steps (epochs * data_size / effective_batch_size).
    Given 192 GB HBM3, a 70B parameter model in FP16 (140GB) is feasible, leaving
    room for gradients and activations. Leverage the 1,307 TFLOPS FP16 sparse compute
    for optimized training, potentially using mixed-precision training. The 5.3 TB/s
    bandwidth is crucial for frequent data movement during micro-batch processing.
    Optimize custom kernels for gradient clipping and noise addition where possible
    to maximize MI300X throughput. Utilize libraries like Opacus or Hugging Face's
    PEFT with DP-SGD support, ensuring their implementation is hardware-aware.
  common_mistake: Overlooking the computational overhead of gradient clipping and
    noise addition, leading to significant slowdowns or out-of-memory errors on the
    specified hardware. Another common mistake is miscalculating the noise scale required
    for a given privacy budget and number of steps, or failing to account for the
    impact of micro-batching on effective batch size and gradient accumulation.
  napkin_math: 'A 70B parameter model in FP16 requires approximately 70 * 10^9 * 2
    bytes = 140 GB for parameters. If gradients are also FP16, that''s another 140
    GB. This already exceeds the 192 GB HBM3 if stored simultaneously, implying gradient
    accumulation or offloading. With micro-batching and per-sample clipping, the memory
    footprint scales. For noise addition, a common formula for Gaussian noise scale
    (σ) relates to ε, δ, and the number of steps (T): σ ≈ (T * log(1/δ))^0.5 / ε.
    Assuming a dataset size of 10^6 samples and an effective batch size of 256 (from
    micro-batches), T = 10 epochs * 10^6 samples / 256 batch_size ≈ 39,062 steps.
    Using the moments accountant method, calculate σ more precisely to hit ε=8. The
    additional compute for clipping and noise scales with the number of parameters
    and micro-batch size. For a micro-batch of 16, this overhead is noticeable but
    manageable compared to larger micro-batches.'
