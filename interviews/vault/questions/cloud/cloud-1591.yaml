title: 40B Model Cold-Start Latency Calculation
scenario: You are provisioning a new inference node with a single PCIe Gen5 x16 GPU to serve a 40B parameter model in FP16. The node must fetch the model checkpoint from a remote object store over a 100 Gbps network interface during cold-start.
question: What is the minimum theoretical cold-start latency to load the 40B FP16 model into HBM over the 100Gbps network and PCIe Gen5?
details:
  realistic_solution: Identify the slowest component in the data path (the network). Convert the 40B FP16 model to its byte size, convert network speed to GB/s, and calculate the latency based on the network bottleneck.
  common_mistake: |
    **The Pitfall:** Failing to convert between gigabits (Gbps) and gigabytes (GB/s).
    **The Rationale:** Engineers often use the HBM bandwidth or incorrectly divide by factors other than 8 when calculating network throughput.
    **The Consequence:** An 8x underestimation of cold-start latency, leading to broken SLA guarantees during auto-scaling events.
  napkin_math: |
    1. **Calculate Model Size:** 40B parameters × 2 bytes/param (FP16) = 80 GB.
    2. **Calculate Network Bandwidth:** 100 Gbps / 8 = 12.5 GB/s.
    3. **Identify Bottleneck:** Network (12.5 GB/s) is slower than PCIe Gen5 (64 GB/s).
    4. **Calculate Cold-Start Time:** 80 GB / 12.5 GB/s = 6.4 seconds.
    **Final Result: The minimum theoretical cold-start latency is 6.4 seconds.**
