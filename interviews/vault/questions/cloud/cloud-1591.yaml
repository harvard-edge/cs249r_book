title: 40B Model Cold-Start Latency Calculation
scenario: You are provisioning a new inference node with a single PCIe H100 GPU (PCIe Gen5 x16, 64 GB/s)
  to serve a 40B parameter model in FP16. The node must fetch the model checkpoint from a remote object
  store over a 100 Gbps network interface during cold-start. Assuming perfectly pipelined downloading
  and host-to-device transfers, calculate the minimum theoretical cold-start latency before the model
  is fully resident in HBM.
question: "What is the minimum theoretical cold-start latency to load the 40B FP16 model into HBM over the 100Gbps network and PCIe Gen5?"
details:
  realistic_solution: Identify the slowest component in the data path (the network). Convert the 40B FP16
    model to its byte size (80 GB), convert network speed to GB/s (12.5 GB/s), and calculate the latency
    based on the network bottleneck.
  common_mistake: Candidates often use the HBM bandwidth or PCIe bandwidth to calculate the loading time,
    ignoring the network interface bottleneck. Another common error is failing to divide by 8 to convert
    100 Gbps to 12.5 GB/s.
  napkin_math: '1. Model Size = 40B parameters * 2 bytes/param (FP16) = 80 GB.

    2. Network Bandwidth = 100 Gbps / 8 = 12.5 GB/s.

    3. PCIe Gen5 Bandwidth = 64 GB/s (faster than network, not the bottleneck).

    4. Cold-Start Time = 80 GB / 12.5 GB/s = 6.4 seconds.'
