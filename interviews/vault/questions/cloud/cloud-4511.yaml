title: Asymmetric INT8 Quantization Kernels
scenario: You are implementing weight-only asymmetric INT8 quantization for a dense
  LLM layer to run on A100 Tensor Cores.
question: Derive the basic mathematical formulation to convert FP16 weights to INT8,
  and explain how they are dequantized during the GEMM.
details:
  realistic_solution: Compute the scale S = (W_max - W_min) / 255 and zero-point Z
    = round(-W_min / S). The quantized weight is Q = round(W / S) + Z. Inside the
    GEMM kernel, load Q, instantly dequantize via W_approx = S * (Q - Z), and perform
    the multiply-accumulate in FP16.
  common_mistake: Assuming symmetric quantization (no zero-point) or attempting to
    do the GEMM entirely in INT8 without quantizing activations.
  napkin_math: 2^8 = 256 levels
