title: Asymmetric INT8 Quantization Kernels
scenario: You are implementing weight-only asymmetric INT8 quantization for a dense LLM layer to run on A100 Tensor Cores.
question: Derive the basic mathematical formulation to convert FP16 weights to INT8, and explain how they are dequantized during the GEMM.
details:
  realistic_solution: 'Compute the scale S = (W_max - W_min) / 255 and zero-point Z = round(-W_min / S). The quantized weight is Q = round(W / S) + Z. Inside the GEMM kernel, load Q, instantly dequantize via W_approx = S * (Q - Z), and perform the multiply-accumulate in FP16.'
  common_mistake: |
    **The Pitfall:** Assuming symmetric quantization (omitting the zero-point) or attempting to do the GEMM entirely in INT8.
    **The Rationale:** Candidates simplify the math too much or misunderstand the hardware constraints of mixed-precision tensor cores.
    **The Consequence:** The model suffers severe accuracy degradation due to unhandled asymmetric weight distributions, or fails to execute efficiently.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Source format: FP16 weights.
       - Target format: INT8 quantized weights (0 to 255).
       - Execution hardware: FP16 Tensor Cores.
    2. **Calculations:**
       - Scale (S) = (W_max - W_min) / 255.
       - Zero-Point (Z) = round(-W_min / S).
       - Quantize: Q = round(W / S) + Z.
       - Dequantize (in kernel): W_approx = S * (Q - Z).
    3. **Conclusion & Interpretation:**
       **Result: Memory bandwidth halved (Memory-Bound Mitigated).** By dynamically dequantizing back to FP16 in registers, the GEMM executes accurately using FP16 Tensor Cores while saving memory bandwidth.
