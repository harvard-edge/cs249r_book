title: Capacity Reduction and Abstention
scenario: 'You are designing a cloud-based clinical diagnosis model. To prevent training data extraction attacks, you propose early architectural changes: reducing model capacity from 1B to 200M parameters and adding an explicit abstention class for out-of-distribution queries. The original 1B model memorizes 1.5% of the 2,000,000 sensitive training records. Empirical testing shows that the 200M parameter model reduces this memorization by 80%. Additionally, the abstention mechanism successfully identifies and drops 95% of targeted extraction queries.'
question: "If an attacker systematically queries the API, how many records are vulnerable before and after reducing capacity and adding abstention?"
details:
  realistic_solution: Design the architecture with the minimum viable parameter count to strictly limit memorization capacity, and build an abstention (reject) mechanism directly into the model's classification head for low-confidence predictions.
  common_mistake: |
    **The Pitfall:** Relying solely on post-training output filters or network-level WAFs to block attacks.
    **The Rationale:** Post-hoc security patches are easier to implement than fundamentally altering the model architecture and capacity.
    **The Consequence:** Determined attackers can easily bypass output filters, successfully extracting memorized sensitive data.
  napkin_math: |
    * **Initial Vulnerable Records:** 2,000,000 × 1.5% = 30,000 records
    * **After Capacity Reduction:** 30,000 × (1 - 0.80) = 6,000 records
    * **After Abstention:** 6,000 × (1 - 0.95) = 300 records
    * **Result:** **The combined architectural changes yield a 99% reduction in the attack surface, dropping vulnerable records to 300.**
