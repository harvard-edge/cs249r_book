title: Capacity Reduction and Abstention
scenario: 'You are designing a cloud-based clinical diagnosis model. To prevent training data extraction
  attacks, you propose early architectural changes: reducing model capacity from 1B to 200M parameters
  and adding an explicit abstention class for out-of-distribution queries. The original 1B model memorizes
  1.5% of the 2,000,000 sensitive training records. Empirical testing shows that the 200M parameter model
  reduces this memorization by 80%. Additionally, the abstention mechanism successfully identifies and
  drops 95% of targeted extraction queries. If an attacker systematically queries the API to extract all
  initially memorized records, calculate the final number of vulnerable records before and after applying
  these secure design choices.'
details:
  realistic_solution: Design the architecture with the minimum viable parameter count to strictly limit
    memorization capacity, and build an abstention (reject) mechanism directly into the model's classification
    head for low-confidence predictions.
  common_mistake: Relying solely on post-training output filters or network-level WAFs to block attacks,
    rather than fundamentally reducing the model's capacity to memorize sensitive data in the first place.
  napkin_math: 'Initial vulnerable records: 2,000,000 * 0.015 = 30,000 records.

    Records memorized after capacity reduction: 30,000 * (1 - 0.80) = 6,000 records.

    Records successfully extracted after abstention blocks 95% of queries: 6,000 * (1 - 0.95) = 300 records.

    The architectural changes reduce vulnerable records from 30,000 to 300 (a 99% reduction in attack
    surface).'
