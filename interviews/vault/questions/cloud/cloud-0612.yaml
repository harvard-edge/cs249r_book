title: The Gradient Checkpoint Trade-off
scenario: You're training a 32-layer transformer and running out of memory. Your colleague suggests gradient checkpointing.
question: For a 32-layer transformer, how much memory does gradient checkpointing every k layers save, and what compute overhead does it add?
details:
  realistic_solution: Without checkpointing, you store activations for all 32 layers. With checkpointing every $k$ layers, you store activations at $\lceil 32/k \rceil$ checkpoint boundaries plus recompute the $k-1$ layers between checkpoints during the backward pass. Memory scales as $O(32/k + k)$ instead of $O(32)$. While continuous math suggests $k = \sqrt{32} \approx 5.6$, discrete layer counting shows $k=4, 5, 6,$ and $8$ all require exactly 11 layers of memory capacity. Therefore, $k=4$ is optimal as it achieves the minimum memory footprint while requiring the least recomputation.
  common_mistake: |
    **The Pitfall:** Believing gradient checkpointing eliminates all activation memory.
    **The Rationale:** Candidates don't understand that checkpointing trades recomputation for memory by storing activations only at specific boundaries.
    **The Consequence:** They miscalculate memory requirements and fail to optimize the checkpointing interval $k$, leading to excessive recomputation overhead.
  napkin_math: |
    * **Baseline (No Checkpointing):** 32 layers × 128 MB/layer = 4,096 MB (4 GB) activations. Recompute overhead: 0%.
    * **Checkpoint Every k=4 (Optimal):** Store 8 checkpoints (layers 0, 4, ... 28) = 8 × 128 MB = 1,024 MB. Buffer for 3 recomputed layers = 384 MB. Total: 1,408 MB (1.4 GB). Savings: 65%. Recompute overhead: ~25% training time increase.
    * **Checkpoint Every k=6:** Store 6 checkpoints (768 MB) + 5 layers buffer (640 MB) = 1,408 MB (1.4 GB). Savings: 65%. Recompute overhead: ~28% increase (worse compute, same memory as k=4).
    * **Conclusion:** Checkpointing every **k=4** minimizes memory footprint (1.4 GB) with the least recompute penalty.
