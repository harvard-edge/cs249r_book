title: The Gradient Checkpoint Trade-off
scenario: You're training a 32-layer transformer and running out of memory. Your colleague suggests gradient checkpointing. How much memory does it save, and what's the compute cost? Calculate both for checkpointing every $k$ layers.
question: "For a 32-layer transformer, how much memory does gradient checkpointing every k layers save, and what compute overhead does it add?"
details:
  realistic_solution: Without checkpointing, you store activations for all 32 layers. With checkpointing every $k$ layers, you store activations at $\lceil 32/k \rceil$ checkpoint boundaries plus recompute the $k-1$ layers between checkpoints during the backward pass. Memory scales as $O(32/k + k)$ instead of $O(32)$. While continuous math suggests $k = \sqrt{32} \approx 5.6$, discrete layer counting shows $k=4, 5, 6,$ and $8$ all require exactly 11 layers of memory capacity. Therefore, $k=4$ is optimal as it achieves the minimum memory footprint while requiring the least recomputation.
  common_mistake: '"Gradient checkpointing saves all activation memory." It doesn''t save all — it trades recomputation for memory by only storing activations at checkpoint boundaries.'
  napkin_math: 'Per-layer activation size for a transformer (batch=8, seq=2048, hidden=4096, FP16): 8 \u00d7 2048 \u00d7 4096 \u00d7 2 = 134.2 MB \u2248 128 MB. 32 layers: **4,096 MB = 4 GB** of activations. **No checkpointing:** 4 GB activations, 0% recompute overhead. **Checkpoint every k=4 (optimal):** Store 8 checkpoints (layers 0, 4, 8...28) \u00d7 128 MB + 3 layers of recompute buffer = 1,024 + 384 = 1,408 MB \u2248 **1.4 GB**. Savings: 65%. Recompute: 75% of forward pass \u2192 ~25% total training time increase. **Checkpoint every k=6:** Store 6 checkpoints (layers 0, 6, 12...30) \u00d7 128 MB + 5 layers buffer = 768 + 640 = 1,408 MB \u2248 **1.4 GB**. Savings: 65%. Recompute: 83% of forward \u2192 ~28% overhead (same memory as k=4 but strictly worse compute). **Checkpoint entire model (k=32):** Store 1 checkpoint + 31 layers of recompute buffer = 128 + 3968 = **4,096 MB**. Savings: 0%. Recompute: 97% of forward \u2192 ~32% overhead.'
