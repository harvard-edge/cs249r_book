title: The Gradient Checkpoint Trade-off
scenario: You're training a 32-layer transformer and running out of memory. Your colleague suggests gradient
  checkpointing. How much memory does it save, and what's the compute cost? Calculate both for checkpointing
  every $k$ layers.
details:
  realistic_solution: Without checkpointing, you store activations for all 32 layers. With checkpointing
    every $k$ layers, you store activations at $32/k$ checkpoint boundaries plus recompute the $k-1$ layers
    between checkpoints during the backward pass. Memory scales as $O(32/k + k)$ instead of $O(32)$. The
    optimal $k = \sqrt{32} \approx 6$ minimizes the sum.
  common_mistake: '"Gradient checkpointing saves all activation memory." It doesn''t save all — it trades
    recomputation for memory by only storing activations at checkpoint boundaries.'
  napkin_math: 'Per-layer activation size for a transformer (batch=8, seq=2048, hidden=4096, FP16): $8
    \times 2048 \times 4096 \times 2 = 128$ MB. 32 layers: **4,096 MB = 4 GB** of activations. **No checkpointing:**
    4 GB activations, 0% recompute overhead. **Checkpoint every $k=4$:** Store 8 checkpoints × 128 MB
    + 3 layers of recompute buffer = 1,408 MB ≈ **1.4 GB**. Savings: 65%. Recompute: 75% of forward pass
    → ~25% total training time increase. **Checkpoint every $k=6$ (optimal):** Store ~5.3 checkpoints
    × 128 MB + 5 layers buffer = 1,320 MB ≈ **1.3 GB**. Savings: 68%. Recompute: 83% of forward → ~28%
    overhead (optimal balances memory and compute). **Checkpoint every layer ($k=32$):** Store 1 checkpoint
    + recompute all 31 layers = 128 + 128 = **256 MB**. Savings: 94%. Recompute: 97% of forward → ~32%
    overhead.'
