title: Speculative Decoding Verification Compute Cost
scenario: You are evaluating speculative decoding for a 70B target model.
question: Why does verifying K=5 draft tokens take about the same wall-clock time as one batch-1 autoregressive step, and what is the cost?
details:
  realistic_solution: 'Single autoregressive step (batch=1): IO = 140GB (read all weights). Compute = 2 x 70B = 140 GFLOP. Time = max(140GB/3.35TB, 140G/989T) = max(41.8ms, 0.14ms) = 41.8ms. Memory-bound. Verification of K+1=6 tokens: IO = 140GB (same weight read, amortized) + 6 x KV_per_token (negligible). Compute = 6 x 140G = 840 GFLOP. Time = max(140GB/3.35TB, 840G/989T) = max(41.8ms, 0.85ms) = 41.8ms. Still memory-bound! The extra 5x compute (840G vs 140G) is invisible because we''re IO-bound. This is why verification is essentially free.'
  common_mistake: |
    **The Pitfall:** Thinking verification costs K times more than a single step.
    **The Rationale:** Candidates focus entirely on FLOP count, forgetting that batch=1 decoding is utterly memory-bound.
    **The Consequence:** Incorrectly dismissing speculative decoding because they believe the verification step is computationally prohibitive.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Model: 70B parameters.
       - Memory Bandwidth: 3.35 TB/s.
       - Peak Compute: 989 TFLOPS.
    2. **Calculations:**
       - Single Step (Batch 1): IO = 140GB (read weights). Compute = 140 GFLOP. Time = max(140GB/3.35TB/s, 140G/989TFLOPS) = max(41.8ms, 0.14ms) = 41.8ms.
       - Verification Step (6 tokens): IO = 140GB (same weight read, amortized). Compute = 6 * 140 GFLOP = 840 GFLOP. Time = max(140GB/3.35TB/s, 840G/989TFLOPS) = max(41.8ms, 0.85ms) = 41.8ms.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound.** Both are memory-bound at 41.8ms. The 5x extra compute is "free" because the tensor cores are otherwise idle waiting for memory.
