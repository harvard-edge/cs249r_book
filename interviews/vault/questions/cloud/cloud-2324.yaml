title: BF16 Accumulation Precision Loss in Massive GEMMs
scenario: You are replacing a standard dense layer with a massive 16384 x 16384 linear projection. The
  inputs and weights are in BF16. To maximize Tensor Core throughput on a custom accelerator, you configure
  the hardware to accumulate the dot products natively in BF16 rather than FP32. The model trains 20%
  faster, but final validation accuracy drops by 4% compared to the baseline.
question: "Why does BF16 accumulation in the 16384 x 16384 projection hurt validation accuracy, and what accumulation precision should be used?"
details:
  realistic_solution: While BF16 prevents overflow due to its 8-bit exponent, its major weakness is its
    7-bit mantissa, which provides extremely low precision. In a 16384-dimension dot product, you are
    accumulating 16,384 products into a single sum. As the running sum grows larger, the precision gap
    (machine epsilon) scales up. Eventually, the sum becomes so large that adding the next small product
    falls entirely below the precision threshold, effectively adding zero (swamping). This truncates a
    massive amount of information. To fix this, the architecture must dictate that while inputs/weights
    are BF16, the inner loop accumulation inside the Tensor Core must occur in FP32, only casting back
    to BF16 upon writing the final result to memory.
  common_mistake: Assuming BF16's large dynamic range prevents overflow, meaning the accuracy drop must
    be due to a bug in the data loader or random seed initialization.
  napkin_math: BF16 precision is ~1/128. If the running sum reaches 256.0, the next representable number
    is 256.0 + (256 * 2^-7) = 258.0. If the next dot product is 0.5, 256.0 + 0.5 = 256.0 in BF16. The
    0.5 is completely lost.
