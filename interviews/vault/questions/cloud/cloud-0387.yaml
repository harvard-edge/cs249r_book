title: The CapEx of an A/B Test
scenario: Your team is proposing an A/B test for a new, much larger recommendation model. To get a clean signal, you need to run a shadow serving stack for the new model, which requires a dedicated fleet of 100 H100 GPUs (assume an H100 costs $30,000 per unit).
question: What initial GPU CapEx is required for a three-month shadow-serving experiment that needs 100 H100 GPUs?
details:
  realistic_solution: The solution is a straightforward multiplication of the number of required GPUs by their unit cost. This calculation provides a baseline 'cost of entry' for the experiment, which is a critical input for deciding if the potential gains from the new model justify the test itself. It separates the one-time hardware cost from ongoing operational costs. Assuming an H100 costs approximately $30,000 per unit: CapEx = 100 GPUs × $30,000/GPU = $3,000,000. This $3M figure represents only the hardware acquisition cost. The total cost of the three-month experiment would also include operational expenses (power, cooling, engineering time), but the CapEx alone demonstrates that even 'just testing' a large model requires significant capital commitment.
  common_mistake: |
    **The Pitfall:** Ignoring the massive capital investment required to test a new model.
    **The Rationale:** Engineers often focus solely on the theoretical performance uplift of the model.
    **The Consequence:** Confusing capital expenditure (one-time hardware purchase) with operational expenditure (ongoing costs) or miscalculating by an order of magnitude.
  napkin_math: |
    - **Identify Required Units:** The experiment requires 100 H100 GPUs.
    - **Look Up Unit Cost:** H100 GPU ≈ $30,000 per unit.
    - **Calculate CapEx:** 100 × $30,000 = **$3,000,000**.
    - **Context Check:** This $3M is just the hardware purchase price.
    - **Calculate OpEx (Optional Context):** Power = 100 × 700W × 1.1 PUE × 2,190 hours × $0.10/kWh ≈ $16,863. Total 3-month experiment cost ≈ $3,016,863.
    - **Decision Framework:** The A/B test must be expected to generate more than $3M in incremental value to justify the investment.
  options:
  - $30,000
  - $300,000
  - $3,000,000
  - $150,000
  correct_index: 2
