title: Recall EfficientNet compound scaling constraints and baseline architecture
scenario: Your team is onboarding a new research engineer. They ask what distinguishes EfficientNet's scaling strategy from simply making a model wider or deeper.
question: How does EfficientNet's compound scaling differ from simply widening or deepening a baseline model like B0, and what do the coefficients represent?
details:
  realistic_solution: 'EfficientNet uniformly scales depth, width, and resolution using a compound coefficient φ. Depth scales by α^φ, width by β^φ, and resolution by γ^φ. By constraining α·β²·γ² ≈ 2, scaling the model by a compound coefficient φ increases total compute by approximately 2^φ.'
  common_mistake: |
    **The Pitfall:** Misidentifying the scaling constraint as linear (α·β·γ=2).
    **The Rationale:** Forgetting that FLOPs scale quadratically with width and resolution.
    **The Consequence:** Applying incorrect scaling factors, leading to massive parameter explosion or under-utilization.
  napkin_math: |
    - 1. **Baseline Values:** α=1.2 (depth), β=1.1 (width), γ=1.15 (resolution).
    - 2. **FLOPs Scaling Factor:** α · β² · γ² = 1.2 × (1.1)² × (1.15)² = 1.2 × 1.21 × 1.3225 ≈ 1.92 ≈ 2.
    - 3. **Result:** **Scaling the compound coefficient φ by 1 doubles total compute (~2^φ) while keeping dimensions balanced**.
