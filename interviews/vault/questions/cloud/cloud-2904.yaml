title: Recall EfficientNet compound scaling constraints and baseline architecture
scenario: Your team is onboarding a new research engineer. They ask what distinguishes
  EfficientNet's scaling strategy from simply making a model wider or deeper. Explain
  the compound scaling constraint α·β²·γ²≈2 and what each coefficient controls, referencing
  EfficientNet-B0 as the baseline (5.3M params, 0.39 GFLOPs, 224×224 input).
question: How does EfficientNet compound scaling differ from simply widening or deepening
  B0, and how do α, β, γ satisfy α·β²·γ²≈2?
details:
  realistic_solution: 'EfficientNet uniformly scales depth, width, and resolution using a compound coefficient φ. Depth scales by α^φ, width by β^φ, and resolution by γ^φ. Because FLOPs scale linearly with depth (α) but quadratically with width (β) and resolution (γ), the total FLOPs increase by (α·β²·γ²)^φ. By constraining α·β²·γ² ≈ 2, scaling the model by a compound coefficient φ increases total compute by approximately 2^φ.'
  common_mistake: Misidentifying which coefficient controls which dimension, or stating
    the constraint as α·β·γ=2 (linear) instead of α·β²·γ²≈2 (accounting for the quadratic
    scaling of FLOPs with resolution and width²).
  napkin_math: 'EfficientNet baseline values are α=1.2, β=1.1, γ=1.15. FLOPs scaling factor = α · β² · γ² = 1.2 × (1.1)² × (1.15)² = 1.2 × 1.21 × 1.3225 ≈ 1.92 ≈ 2. If we scale by φ=1 (B1), FLOPs approximately double. If we simply doubled depth instead, FLOPs would double but capacity and receptive field wouldn''t be balanced.'
