title: Cloud Transformation Lineage L3 0
scenario: 'Your data pipeline has 8 transformation steps. Each step reads its input, processes it, and writes output. You want to add lineage metadata (hash, timestamp, code version, params) to each step.'
question: 'What storage and latency overhead would lineage metadata add to an 8-step pipeline?'
details:
  realistic_solution: 'Per-step lineage metadata: SHA-256 hash of input (32 bytes) + output hash (32 bytes) + timestamp (8 bytes) + code git SHA (20 bytes) + params JSON (~500 bytes) ≈ 600 bytes per step. 8 steps = 4.8 KB per pipeline run. If you run 1000 pipeline runs/day: 4.8 MB/day = ~1.75 GB/year. Latency: computing SHA-256 on a 10 GB dataset at ~1 GB/s = 10s per hash, 2 hashes per step = 20s, 8 steps = 160s total. This is the main cost — hashing large intermediate datasets.'
  common_mistake: |
    **The Pitfall:** Storing full copies of intermediate datasets for lineage instead of just hashes.
    **The Rationale:** Assuming full data retention is the only way to guarantee exact reproducibility.
    **The Consequence:** Exploding storage costs—a hash is 32 bytes vs. gigabytes for the actual data.
  napkin_math: |
    * Per-step metadata: SHA-256 hash of input (32B) + output hash (32B) + timestamp (8B) + git SHA (20B) + params (~500B) ≈ 600 bytes.
    * 8 steps = 4.8 KB per pipeline run.
    * For 1000 runs/day: 4.8 MB/day = ~1.75 GB/year.
    * Latency: hashing 10 GB at 1 GB/s = 10s per hash. 8 steps × 2 hashes × 10s = 160s.
    * **Result: Storage is negligible (4.8 KB/run); latency overhead (160s) is dominated entirely by hashing intermediate datasets.**
