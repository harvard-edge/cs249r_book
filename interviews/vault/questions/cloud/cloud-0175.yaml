title: The Continuous Batching Paradox (cloud-0175)
scenario: A real-time translation service must render a 50-token sentence in under 500ms (P99). To maximize GPU utilization, an engineer tunes `max_batched_tokens` to 8192 on the continuous batching server. While GPU utilization hits 95%, P99 latency spikes to over 1.5 seconds, failing the SLA.
question: Why did increasing batch size and GPU utilization lead to a catastrophic failure to meet the real-time deadline?
details:
  realistic_solution: This is a classic queueing theory failure. By setting `max_batched_tokens` too high for a low-latency workload, the continuous batching engine waits too long to accumulate a 'full' batch from incoming requests before launching a forward pass. For a real-time service with a strict P99 deadline, per-request latency is the primary metric, not aggregate system throughput.
  common_mistake: |
    **The Pitfall:** Optimizing for aggregate throughput at the expense of per-request latency.
    **The Rationale:** Engineers assume high GPU utilization (e.g., 95%) inherently means the system is performing optimally for all metrics.
    **The Consequence:** The continuous batching engine waits too long to build a large batch, introducing severe head-of-line blocking and violating strict real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SLA: 50 tokens in <500ms (Max TPOT = 10ms).
       - Model: 70B FP16 (140GB).
       - Bandwidth: 6.7 TB/s (2x H100).
    2. **Calculations:**
       - Time to read weights once: 140 GB / 6.7 TB/s = 20.8 ms.
       - Because 20.8ms > 10ms, the SLA is physically impossible regardless of batch size.
       - A large batch size (8192) forces requests to wait while the large batch is processed, pushing the latency far above 20.8ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Bandwidth).** The system is fundamentally bottlenecked by memory bandwidth; increasing batch size exacerbates queueing delays without fixing the core limitation.
