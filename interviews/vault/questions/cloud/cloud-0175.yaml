validation_issues:
- The 'Napkin Math' states 'TPOT memory bound = 140GB / 6.7TB/s = 21ms for just the weights' for a 70B
  FP16 model on 2xH100. This 21ms is the time to read the model weights *once* for *one token* generation
  step across the entire batch, not the time per output token *per request*.
- The conclusion '21ms > 10ms SLA before adding queueing delays or overheads. The SLA is physically impossible
  for 70B without more GPUs to increase bandwidth' is correct, but the initial reasoning for `max_batched_tokens`
  being too high is not directly addressed by this memory bandwidth calculation.
