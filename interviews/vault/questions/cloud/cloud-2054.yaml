title: The Model Cascade Routing Decision
scenario: 'You serve a customer support chatbot with a 3-tier model cascade: a 1B model ($0.0002/request,
  85% accuracy), a 7B model ($0.002/request, 93% accuracy), and a 70B model ($0.02/request, 98% accuracy).
  Design a routing system that achieves 95% effective accuracy while minimizing cost. Your traffic is
  100K requests/day. What routing strategy achieves the best cost-accuracy Pareto frontier?'
question: "What routing strategy achieves the best cost-accuracy Pareto frontier?"
details:
  realistic_solution: 'Confidence-based cascading: Route every request to the 1B model first. If confidence
    > 0.9, return the response (most simple questions). If confidence 0.7-0.9, escalate to 7B. If confidence
    < 0.7 from 7B, escalate to 70B. Typical traffic distribution: 60% of requests are simple (1B handles
    with high confidence), 25% are medium complexity (need 7B), 15% are complex (need 70B). Effective
    accuracy: 0.60 × 0.85 + 0.25 × 0.93 + 0.15 × 0.98 = 0.51 + 0.2325 + 0.147 = 0.89 — too low! The problem:
    the 1B model''s 85% accuracy on the ''easy'' queries it keeps actually means it''s wrong on 15% of
    60K requests/day = 9K wrong answers. Fix: train a separate lightweight router model (~100M params,
    1ms inference) that predicts query complexity. Or use a hybrid: 1B model generates + 1B classifier
    checks consistency. If inconsistent, escalate. With a well-trained router: 65% → 1B, 20% → 7B, 15%
    → 70B, and the router correctly identifies difficulty, achieving 0.65 × 0.92 + 0.20 × 0.95 + 0.15
    × 0.98 = 0.95 effective accuracy.'
  common_mistake: Always routing to the 70B model for guaranteed 98% accuracy. This costs $2,000/day.
    Or routing everything to 1B to save cost, accepting 85% accuracy.
  napkin_math: 'All 70B: 100K * $0.02 = $2,000/day. Naive cascade (sequential, escalate on low confidence):
    100K queries all hit 1B ($20). Of those, 40K escalate to 7B ($80). Of those, 15K escalate to 70B ($300).
    Total: $20 + $80 + $300 = $400/day. Accuracy: the 60K kept by 1B have 85% accuracy; the 25K kept by
    7B have 93%; the 15K resolved by 70B have 98%. Effective: (60K*0.85 + 25K*0.93 + 15K*0.98)/100K =
    89.0%. With trained router: 65K -> 1B (easy queries, 92% accuracy on these), 20K -> 7B (medium, 95%
    accuracy), 15K -> 70B (hard, 98% accuracy). Cost: 65K*$0.0002 + 20K*$0.002 + 15K*$0.02 + $5 router
    = $13 + $40 + $300 + $5 = $358/day. Effective accuracy: (65K*0.92 + 20K*0.95 + 15K*0.98)/100K = 93.5%.
    To reach 95%: route fewer to 1B (50K at 92%) and more to 7B (35K at 95%) and 70B (15K at 98%): (50K*0.92
    + 35K*0.95 + 15K*0.98)/100K = 93.95%. Further tuning the router threshold gets to 95%. Cost for the
    50/35/15 split: $10 + $70 + $300 + $5 = $385/day. Savings vs all-70B: 81%.'
