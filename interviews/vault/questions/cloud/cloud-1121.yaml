title: Calculating Demographic Parity for Resume Screening
scenario: You are deploying a cloud-based automated resume screening API that processes 100,000 applications daily. The applicant pool consists of 80,000 candidates from Group X (historical qualification rate of 30%) and 20,000 from Group Y (historical qualification rate of 15%). The current baseline model perfectly predicts these historical qualifications.
question: If business rules mandate strict Demographic Parity while maintaining the exact same total number of daily accepted resumes, how many candidates from Group Y must be accepted daily, and how many of those will be 'unqualified' according to historical labels?
details:
  realistic_solution: Calculate the global average acceptance rate across all groups, then apply this rate uniformly. For Group Y, you must accept 27% of their pool (5,400 candidates), meaning 2,400 historically unqualified candidates will be advanced to achieve strict parity.
  common_mistake: |
    **The Pitfall:** Confusing Demographic Parity with Equal Opportunity or equalizing raw counts.
    **The Rationale:** Candidates attempt to equalize true positive rates or raw accepted candidate numbers rather than the overall acceptance proportions across groups.
    **The Consequence:** Deploying a biased model that violates strict legal or business demographic parity requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total applications: 100,000.
       - Group X: 80,000 (30% qualified).
       - Group Y: 20,000 (15% qualified).
    2. **Calculations:**
       - Total currently accepted: (80,000 * 0.30) + (20,000 * 0.15) = 24,000 + 3,000 = 27,000.
       - Global acceptance rate required: 27,000 / 100,000 = 27%.
       - Parity requirement for Group Y: 20,000 * 0.27 = 5,400 accepted.
       - Historically unqualified Group Y accepted: 5,400 - 3,000 = 2,400.
    3. **Conclusion & Interpretation:**
       - **Result: Policy-Bound**. To achieve Demographic Parity, 5,400 Group Y candidates must be accepted, 2,400 of whom are historically unqualified.
