title: Profiling Microsecond Kernel Power Draw
scenario: You are profiling a custom FlashAttention CUDA kernel on an NVIDIA H100 GPU to optimize its
  energy efficiency. The kernel execution time is exactly 800 microseconds. Software-based polling via
  NVML reports an average power draw of 400 W, but it polls at a coarse 1-10 ms resolution, missing high-frequency
  transients. By reading the on-chip hardware power counters via Nsight Compute, you observe that the
  kernel execution actually consumed exactly 480 millijoules of energy. Calculate the true average power
  consumption of your kernel and the percentage difference from the software-polled estimate.
question: "What is the true average power consumption of the 800 µs kernel, and how much higher is it than the 400 W NVML estimate?"
details:
  realistic_solution: Convert the total energy to Joules (480 mJ = 0.48 J) and execution time to seconds
    (800 µs = 0.0008 s). Divide Energy by Time to calculate 600 Watts. This reveals the true power draw
    is 50% higher than the NVML estimate.
  common_mistake: Relying on low-resolution software polling tools like NVML for microsecond-scale kernels,
    or failing to properly convert between millijoules, microseconds, and Watts during the calculation.
  napkin_math: True Power = Energy / Time = 0.480 J / 0.0008 s = 600 W. Difference = (600 W - 400 W) /
    400 W = +50% underestimation by NVML.
