title: Queuing Model for Prefill-Decode Disaggregation on H100
scenario: You are designing a disaggregated LLM serving system on H100 (700W, 80GB HBM3). Prefill requests arrive at 200/s with mean 50ms service. Decode requests arrive at 2000/s (10x fanout) with mean 5ms service. You have a pool of 26 H100s to allocate.
question: Using queuing theory, how would you split 26 H100s between prefill and decode workers to maintain P99 latency SLAs?
details:
  realistic_solution: 'Prefill load = 200/s × 0.05s = 10 server-equivalents. Decode load = 2000/s × 0.005s = 10 server-equivalents. Equal load but different bottlenecks: prefill is compute-bound (use fewer high-utilization nodes), decode is memory-bandwidth bound (needs HBM3 bandwidth). Split: 12 H100s for prefill at 83% utilization, 14 H100s for decode at 71% utilization. Target ρ<0.75 for each pool to keep p99<3× mean.'
  common_mistake: |
    **The Pitfall:** Allocating H100s equally (50/50) without modeling arrival rates and service times.
    **The Rationale:** Candidates assume equal total compute load means equal node allocation, ignoring the differing variance and queueing dynamics of prefill (compute-bound) vs decode (memory-bound).
    **The Consequence:** One pool will suffer severe queueing delays and P99 SLA violations due to higher utilization $\rho$.
  napkin_math: |
    1. **Prefill Load:** 200 req/s * 0.05s = 10 server-equivalents.
    2. **Decode Load:** 2000 req/s * 0.005s = 10 server-equivalents.
    3. **Queueing Target:** Keep utilization $\rho < 0.75$ to manage P99 latency.
    4. **Allocation:** 12 H100s for prefill ($\rho = 10/12 = 0.83$), 14 H100s for decode ($\rho = 10/14 = 0.71$).
    5. **Conclusion:** **Split is 12 for prefill and 14 for decode to balance tail latency.**
