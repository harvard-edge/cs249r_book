title: Calculating Feature Drift with Population Stability Index
scenario: You are monitoring a cloud-based credit scoring model evaluating 5,000 transactions/sec.
  The model relies on a binned 'income bracket' feature. In your baseline reference
  dataset, the distribution across two core bins was 80% (Bin 1) and 20% (Bin 2).
  In today's production data window, the distribution shifted to 50% (Bin 1) and 50%
  (Bin 2).
question: What is the PSI for the income-bracket shift from 80/20 to 50/50, and does
  it exceed the 0.2 drift threshold?
details:
  realistic_solution: 'Apply the PSI formula: Sum of (Actual_% - Expected_%) * ln(Actual_%
    / Expected_%) for each bin. Calculate the individual bin components, sum them
    up, and trigger a retraining alert since the resulting value is far above the
    0.20 threshold.'
  common_mistake: '**The Pitfall:** Calculating simple absolute percentage differences.

    **The Rationale:** Candidates are unfamiliar with the logarithmic weighting of
    the Population Stability Index (PSI).

    **The Consequence:** Failing to correctly quantify and trigger alerts for significant
    data drift.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Baseline distribution: 80% (Bin 1), 20% (Bin 2).

    - Production distribution: 50% (Bin 1), 50% (Bin 2).

    - Drift threshold: 0.2.


    **Calculations:**

    - Bin 1 PSI: (0.5 - 0.8) * ln(0.5 / 0.8) = -0.3 * -0.470 = 0.141.

    - Bin 2 PSI: (0.5 - 0.2) * ln(0.5 / 0.2) = 0.3 * 0.916 = 0.275.

    - Total PSI: 0.141 + 0.275 = 0.416.


    **Conclusion & Interpretation:**

    - **Result: 0.416 > 0.2, indicating significant data drift (Drift-Bound)**.

    '
