title: The Deterministic Global Shuffle at Trillion-Token Scale
scenario: Your LLM pre-training uses 2,048 GPUs with data parallelism. Each GPU must see a unique, non-overlapping subset of the 2 trillion token corpus per epoch, and the global ordering must be deterministically shuffled.
question: How do you implement a deterministic, coordinator-free global shuffle for 2M shards and 2,048 GPUs, and handle elastic GPU-count changes?
details:
  realistic_solution: 'Use a pseudorandom permutation function (PRP) that maps (epoch, global_index) -> shard_index without materializing the full permutation. A Feistel-style bijection keyed by epoch works if it covers the shard index domain. For a fixed world size, GPU rank r processes global positions r, r + world_size, r + 2 * world_size, ... through the epoch permutation, so assignments are deterministic and non-overlapping. For elastic scaling, checkpoint a tiny shared progress record: epoch, next_global_position, world_size/version, and training step. After resizing from N1 to N2 GPUs, all ranks resume from the same next_global_position and claim the disjoint strided positions next_global_position + r, next_global_position + r + N2, and so on. Already-consumed positions are before the cursor and are never reassigned; remaining positions are partitioned under the new world size. This is coordinator-light rather than magically stateless: the data plane is coordinator-free, but resize
    and recovery require a durable cursor/checkpoint.'
  common_mistake: |
    **The Pitfall:** Having each GPU independently shuffle its assigned shards using the same random seed.
    **The Rationale:** Candidates assume local shuffling is sufficient, missing the need for a global permutation.
    **The Consequence:** Documents assigned to GPU 0 in epoch 1 stay on GPU 0 in epoch 2, creating data ordering correlations that harm convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2M shards, 2,048 GPUs.
    - PRP (Pseudorandom Permutation) approach.

    **Calculations:**
    - Materialized permutation size: 2M shard ids * 8 bytes = 16 MB.
    - Broadcasting that list to 2,048 GPUs costs 16 MB per GPU, or 16 MB * 2,048 = 32,768 MB ~= 32 GB aggregate traffic per epoch.
    - Fixed-size PRP work per epoch: 2M / 2,048 ~= 977 shard-index evaluations per GPU.
    - If a PRP evaluation costs about 0.5 to 2 microseconds in host-side scheduling code, per-GPU overhead is roughly 0.5 to 2 ms per epoch, still negligible compared with shard I/O.

    **Conclusion & Interpretation:**
    - **Result: Coordination-Bound**. The PRP avoids broadcasting the permutation and gives deterministic non-overlap, but elastic resizing is correct only with a durable epoch cursor that excludes already-consumed global positions.
