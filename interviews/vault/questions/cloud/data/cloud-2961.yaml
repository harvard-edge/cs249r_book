title: 'Dataset Curation: Mastery — End-to-End Pre-Training Data Strategy for 100B Model'
scenario: You are designing the data strategy for a 100B parameter LLM to be trained on 512 GPUs for 3 months. The model must excel at code, math, and instruction following.
question: What complete data curation strategy (sourcing, filtering, deduplication, mixing) is required, and what throughput must the pipeline sustain?
details:
  realistic_solution: Target about 2.0T high-quality tokens for a Chinchilla-style 100B run, with an over-collected pool for mixing and ablations. Source roughly 8-10T raw tokens (web 65%, code 15%, math 7%, books/papers 8%, instruction/dialog 5%). Apply language and license filters, quality classifiers/KenLM thresholds, exact and MinHash dedup, PII removal, contamination checks, and domain-aware mixing with code/math upweighted. With the stated 512 H100 SXM GPUs at 35% MFU, the compute-limited training rate is only about 295 tokens/sec for a 100B model, so a 90-day run would consume about 2.3B tokens, not 2T. The online loader bandwidth for that run is only about 2.4 KB/s of token ids plus prefetching overhead; producing a full 2T-token corpus within 90 days is a separate offline requirement of about 257K accepted tokens/sec, with much higher burst capacity for reprocessing.
  common_mistake: |
    **The Pitfall:** Under-investing in data quality scaling compared to model architecture scaling.
    **The Rationale:** Assuming that simply dumping petabytes of raw text into a dataloader will yield an intelligent model.
    **The Consequence:** The model memorizes garbage data, and the data loading pipeline throttles the expensive 512-GPU cluster.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 512 H100 SXM GPUs, 989 TFLOP/s bf16 peak each, 35% MFU.
    - Model: 100B params. Training compute: ~6 * params FLOPs/token = 600B FLOPs/token.
    - Training duration: 90 days = 7.78M seconds.
    - Tokenized samples stored as int32 token ids plus masks/packing metadata, budget ~8 bytes/token delivered to the loader.

    **Calculations:**
    - Effective compute: 512 * 989 TFLOP/s * 0.35 = 177,178 TFLOP/s.
    - Training throughput: 177,178e12 FLOP/s / 600e9 FLOP/token = ~295 tokens/sec.
    - Tokens consumed in 90 days: 295 tokens/sec * 7.78M sec = ~2.3B tokens if running continuously.
    - Chinchilla target for 100B params: ~2.0T tokens, so the stated 512-GPU, 35% MFU setup is far short of the compute needed to consume that corpus in 90 days.
    - Online DataLoader bandwidth: 295 tokens/sec * 8 bytes/token = ~2.4 KB/s before filesystem/request overhead.
    - Offline accepted-token production for a 2T-token corpus over 90 days: 2T / 7.78M = ~257K accepted tokens/sec. At a 25% end-to-end pass rate, raw processing must average ~1.0M raw tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: Compute-Limited for Training, Curation-Throughput Bound for Corpus Production.** Under the stated hardware and MFU, the training run consumes only about 2.3B tokens in 90 days; building a 2T-token quality-controlled pool over the same wall-clock period still requires about 1M raw tokens/sec at a 25% pass rate.
