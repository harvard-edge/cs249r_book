title: The Feature Version Mismatch
scenario: Your feature engineering team deploys a new version of the 'user_engagement_score' feature that changes the normalization from min-max to z-score. The model serving system immediately starts using the new feature values, but the model was trained on min-max normalized values. The ranking model's click-through rate drops 15% before anyone notices.
question: How would you design feature versioning so models trained on min-max values cannot silently receive z-score values?
details:
  realistic_solution: 'Implement a strict **feature contract system**. (1) Assign immutable version tags to all feature store schemas (e.g., `engagement_v2`). (2) Enforce model-feature binding where the ML artifact declares explicit version dependencies in its metadata. (3) The inference serving layer must resolve feature lookups using the declared artifact metadata, not "latest". (4) Implement CI/CD compatibility gates preventing deprecation of `v1` features until zero active models depend on them.'
  common_mistake: |
    **The Pitfall:** Relying on manual coordination and tribal knowledge ("just Slack the ML team when feature pipelines change").
    **The Rationale:** For early-stage teams, verbal communication feels faster and requires less infrastructure than building strict API contracts.
    **The Consequence:** At scale, asynchronous deployments guarantee eventual mismatch, leading to silent, catastrophic model degradation that bypasses unit tests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ecosystem: 300 online features, 20 models in production.
    - Churn: Uncoordinated feature changes happen 5x/week.
    - Failure Rate: 10% chance of mismatch per change.

    **Calculations:**
    - Expected mismatches per week: 5 * 0.10 = 0.5 mismatches.
    - Expected time to silent incident: 1 / 0.5 = 2 weeks.

    **Conclusion & Interpretation:**
    - **Result: MTTD = 0 (CI/CD Pipeline Bound)**. Explicit feature versioning contracts catch mismatches at deploy-time, reducing Mean Time To Detect (MTTD) to 0.
