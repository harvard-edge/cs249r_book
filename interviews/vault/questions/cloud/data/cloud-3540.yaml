title: Optimizing Dataset Curation for Bias Mitigation on Google TPU v5e
scenario: Your team is curating a large-scale image dataset (several TBs) for a medical imaging classification model to be trained on an accelerator. Initial analysis suggests potential demographic biases. To mitigate this, an active learning pipeline is proposed where the model's uncertainty scores guide the selection of new samples for annotation.
question: How should the TPU v5e's 16 GB HBM, BF16 compute, and 1.6 TB/s bandwidth shape active-learning selection and annotation to reduce dataset bias?
details:
  realistic_solution: A realistic solution involves designing a multi-stage data curation and loading pipeline that is 'TPU-aware'. For data selection, prioritize samples that are high-uncertainty AND demographically diverse. To feed the TPU efficiently, implement sharding and preprocessing (e.g., TFRecords) to saturate the 1.6 TB/s memory bandwidth. Data should be pre-fetched, and batch sizes carefully tuned to fit within the 16 GB HBM per chip, employing mixed-precision training (BF16) from the outset to maximize the compute.
  common_mistake: |
    **The Pitfall:** Designing complex data augmentation and active learning pipelines without considering accelerator I/O bounds.
    **The Rationale:** Engineers focus purely on the theoretical statistical benefits of active learning while ignoring the hardware data-loading mechanics.
    **The Consequence:** The TPU starves for data (CPU bottleneck), or encounters Out-Of-Memory errors because the active-learning batches exceed the rigid 16GB HBM limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory bandwidth = 1.6 TB/s (1.6 * 10^12 bytes/sec).
    - Image sample size = 1 MB (10^6 bytes).
    - HBM capacity = 16 GB.

    **Calculations:**
    - Theoretical ingestion = 1.6 million samples/sec.
    - Max batch capacity = ~16,000 images in memory, minus model weights and activations.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound (Memory-Bound)**. To avoid bottlenecks, the data loader must pre-fetch actively-selected TFRecords rapidly enough to approach the 1.6 TB/s ingest rate.
