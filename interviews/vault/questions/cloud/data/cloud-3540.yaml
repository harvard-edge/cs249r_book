title: Optimizing Dataset Curation for Bias Mitigation on Google TPU v5e
scenario: Your team is curating a large-scale image dataset (several TBs) for a medical imaging classification model to be trained on an accelerator. Initial analysis suggests potential demographic biases. To mitigate this, an active learning pipeline is proposed where the model's uncertainty scores guide the selection of new samples for annotation.
question: How should the TPU v5e's 16 GB HBM, BF16 compute, and 1.6 TB/s bandwidth shape active-learning selection and annotation to reduce dataset bias?
details:
  realistic_solution: A realistic solution involves designing a multi-stage data curation and loading pipeline that is 'TPU-aware'. For data selection, prioritize samples that are high-uncertainty AND demographically diverse, with per-slice quotas so active learning does not amplify existing bias. Use sharded, preprocessed TFRecords and host-side prefetching to keep the TPU fed, but size batches from measured model weights, activations, and image tensor memory rather than assuming raw input loading can approach peak HBM bandwidth. Employ BF16 training and monitor input-pipeline utilization, HBM headroom, and subgroup coverage together.
  common_mistake: |
    **The Pitfall:** Designing complex data augmentation and active learning pipelines without considering accelerator I/O bounds.
    **The Rationale:** Engineers focus purely on the theoretical statistical benefits of active learning while ignoring the hardware data-loading mechanics.
    **The Consequence:** The TPU starves for data (CPU bottleneck), or encounters Out-Of-Memory errors because the active-learning batches exceed the rigid 16GB HBM limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM capacity = 16 GB per TPU v5e chip.
    - Example preprocessed image tensor: 224 × 224 × 3 × BF16 ≈ 301 KB.
    - Reserve 10 GB for model weights, activations, optimizer state, and runtime workspace during training.
    - Remaining HBM for input tensors and staging: about 6 GB.

    **Calculations:**
    - Input tensor capacity upper bound = 6 GB / 301 KB ≈ 19,900 images, before augmentation buffers and framework overhead.
    - A practical batch must be much smaller after activation and pipeline buffers are included, so measure HBM headroom under the chosen model.
    - Host input throughput target should match training step consumption, not the 1.6 TB/s HBM peak.

    **Conclusion & Interpretation:**
    - **Result: HBM-fit and input-pipeline constrained.** Active-learning selection should balance uncertainty with demographic coverage, then choose batch and prefetch sizes that fit measured HBM headroom and keep the TPU fed without claiming the workload is memory-bound from peak bandwidth alone.
