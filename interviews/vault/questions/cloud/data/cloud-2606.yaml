title: Active Learning vs Random Sampling
scenario: 'Your team needs to label 100K images for a medical imaging classifier. A junior engineer proposes randomly sampling from the unlabeled pool.'
question: 'Why would uncertainty-based active learning label the 100K medical images more efficiently than random sampling?'
details:
  realistic_solution: "Active learning selects the most informative samples — those near the model's decision boundary where uncertainty is highest. By labeling these ambiguous cases first, the model learns discriminative features faster than from random samples, many of which are 'easy' and redundant. Empirically, active learning often reaches the same accuracy with 2-5x fewer labeled samples. For medical imaging at $5-10/label (expert radiologists), labeling 30K informative samples instead of 100K random ones saves $350K-$700K while reaching equivalent model quality."
  common_mistake: |
    **The Pitfall:** Assuming all unlabeled samples are equally valuable and randomly sampling from the pool.
    **The Rationale:** Most random samples fall in regions the model already handles well and provide redundant information.
    **The Consequence:** Hundreds of thousands of dollars are wasted on labeling 'easy' examples that don't improve the model's decision boundary.
  napkin_math: |
    **Assumptions & Constraints:**
    - Random Sampling Target: 100K labels.
    - Active Learning Target: 30K informative labels.
    - Cost: $7/label.

    **Calculations:**
    - Random Sampling Cost: 100K * $7 = $700K.
    - Active Learning Cost: 30K * $7 = $210K.

    **Conclusion & Interpretation:**
    - **Result: $490K savings (Cost-Bound)**. Focusing on the decision boundary drastically cuts labeling budgets while reaching the same accuracy.
