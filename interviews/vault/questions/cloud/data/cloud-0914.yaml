title: Quantifying LLM Benchmark Contamination
scenario: Your team trained a 34B parameter LLM on a 2T token corpus. Evaluation on a standard 500-question benchmark yields a reported accuracy of 65%. Suspecting benchmark contamination, you run a 13-gram exact match filter between the benchmark and the training corpus, identifying exactly 100 contaminated questions. Further analysis shows the model achieved 97% accuracy on this contaminated subset.
question: "What is the model's true accuracy on the 400 clean benchmark questions, and how much absolute accuracy inflation came from contamination?"
details:
  realistic_solution: 'Calculate the total correct answers (325) and subtract the correct contaminated answers (97) to find the clean correct answers (228). Divide by the clean question count (400) to get the true accuracy (57%), revealing an 8% absolute inflation.'
  common_mistake: |
    **The Pitfall:** Assuming reported accuracy applies uniformly across the benchmark.
    **The Rationale:** Failing to isolate the raw number of correct answers in the uncontaminated subset.
    **The Consequence:** Miscalculating the true accuracy by applying relative instead of absolute inflation metrics.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 total questions at 65% accuracy.
    - 100 contaminated questions at 97% accuracy.

    **Calculations:**
    - Total correct = 500 * 0.65 = 325.
    - Contaminated correct = 100 * 0.97 = 97.
    - Clean correct = 325 - 97 = 228.
    - Clean accuracy = 228 / 400 = 0.57 (57%).
    - Absolute inflation = 65% - 57% = 8%.

    **Conclusion & Interpretation:**
    - **Result: 8% absolute inflation (Evaluation Quality)**. Contaminated data severely skews reported model capabilities.
