title: Point-in-Time Correctness for Training
scenario: Your ML team discovers their churn prediction model performs 15% better offline than in production. The training pipeline joins features with labels using the label timestamp, but the feature store only keeps the latest feature values.
question: What data leakage pattern is occurring, and how do you architect point-in-time correct feature retrieval?
details:
  realistic_solution: 'The model sees the future: when training on a churn event from January 15, it reads the user''s current feature values (April 1) instead of the values available on January 15. This means features like ''days_since_last_login'' reflect months of post-churn inactivity, making churn trivially predictable in training but impossible in production. The fix requires a time-travel feature store that versions feature values with timestamps. For each training example at time T, the feature retrieval query must return the latest feature values with timestamp <= T. Implementation: store features in a columnar format (Parquet/Delta Lake) partitioned by entity + event_time, and use an AS OF TIMESTAMP query pattern.'
  common_mistake: |
    **The Pitfall:** Using the feature store's current values for historical training labels.
    **The Rationale:** Engineers assume the latest state is sufficient, failing to realize that features change between the historical event time and the present day.
    **The Consequence:** The model trains on future data (target leakage), leading to artificially high offline performance and catastrophic real-world failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Feature store: 10M entities, 200 features, 4 bytes/feature.
       - 365 daily snapshots required for time-travel.
    2. **Calculations:**
       - Naive Versioning Storage: 10M * 200 * 4 bytes * 365 = 2.92 TB/year.
       - Log-based Versioning: Storing only deltas reduces this to ~0.3 TB/year.
       - Query Cost: Point-in-time join on 1M examples takes ~5 minutes on a 16-core cluster vs. 30 seconds for latest-only.
    3. **Conclusion & Interpretation:**
       - Time-travel queries eliminate target leakage at the cost of slower queries and more storage.
       - **Result: Target Leakage (Data Quality Bound)**
