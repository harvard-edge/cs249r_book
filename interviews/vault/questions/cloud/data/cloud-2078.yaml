title: The Experiment-to-Production Gap
scenario: 'A research team publishes a paper showing their new model architecture achieves state-of-the-art on ImageNet. Your team tries to reproduce the results for production use. After 3 weeks, you match the paper''s accuracy but discover: (1) training requires 2x the compute they reported, (2) the model is 40% slower at inference than their benchmark claims, and (3) accuracy drops 8% on your production data distribution.'
question: Why do the reported compute, latency, and accuracy gaps exist, and how does the ML development lifecycle fundamentally produce them?
details:
  realistic_solution: 'Three structural gaps: (1) Compute gap (2×): Research papers report the final successful run, not the dozens of failed experiments that informed hyperparameter choices. The authors effectively amortized their search cost over the reported result. (2) Latency gap (40%): Benchmark latency is measured in ideal conditions: single batch, warm GPU, no concurrent requests, no preprocessing. Production inference includes batching overhead, KV-cache management, preprocessing, and network round-trips. (3) Accuracy gap (8%): ImageNet is a curated, IID benchmark. Your production data has distribution shift, label noise, and long-tail distributions. The model was overfit to the benchmark distribution. The lifecycle lesson: the experiment → production gap is a feature of how ML research optimizes for benchmark environments.'
  common_mistake: |
    **The Pitfall:** Assuming the paper authors were dishonest or that your infrastructure is broken.
    **The Rationale:** The discrepancies are so large that engineers assume foul play or critical configuration errors in their own pipeline.
    **The Consequence:** Teams waste weeks attempting to debug hardware or "fix" hyperparameter code instead of accepting that these gaps are structural artifacts of the research-to-production transition.
  napkin_math: |
    **Assumptions & Constraints:**
    - Research reported cost: 32 GPU-hours.
    - Actual reproduction cost per run: 64 GPU-hours (2x = unstated optimizations lost).
    - Hyperparameter search to reproduce: 20 trials.

    **Calculations:**
    - Total compute to reproduce: 20 * 64 = 1,280 GPU-hours.
    - At $3/GPU-hr: $3,840 for full search vs the paper's implied $96 single-run cost.

    **Conclusion & Interpretation:**
    - **Result: Hidden Research Costs (Compute-Bound)**. True reproduction requires ~40x the compute budget implied by the paper.
