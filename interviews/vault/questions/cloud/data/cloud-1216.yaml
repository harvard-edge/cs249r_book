title: Diagnosing TPR Disparities in Cloud Screening APIs
scenario: A cloud-hosted automated loan approval API running on a cluster of 8 AWS g4dn.2xlarge instances processes 100,000 applications daily. The model predicts 'creditworthy' (Y=1). Demographic Group A has a base creditworthy rate of 20%, while Group B has 10%. An audit reveals that the False Positive Rate (FPR) is perfectly balanced at 5% for both groups. However, qualified applicants in Group B have a True Positive Rate (TPR) of only 40%, compared to 80% for Group A. The system currently uses a single global decision threshold of 0.5.
question: Why does the loan model fail Equality of Opportunity despite equal 5% FPRs, and what threshold intervention is required?
details:
  realistic_solution: 'Diagnose that the model''s predicted probability distributions for actual positives differ by group due to variance in feature representation. The post-processing solution is to decouple decision thresholds: lower the threshold for Group B (e.g., from 0.5 to 0.35) until their TPR reaches 80%, satisfying Equality of Opportunity, while accepting the mathematical trade-off of an increased FPR for Group B.'
  common_mistake: |
    **The Pitfall:** Confusing Equality of Opportunity with Demographic Parity or Equalized Odds.
    **The Rationale:** Candidates incorrectly suggest equalizing the base prediction rates or forcing both TPR and FPR to match simultaneously, not recognizing that differing base rates make perfect Equalized Odds mathematically impossible.
    **The Consequence:** The proposed intervention will mathematically fail, leaving the deployed model biased against qualified applicants in Group B.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100k daily apps
    - Group A: 80k, 20% base rate
    - Group B: 20k, 10% base rate

    **Calculations:**
    - Group B Positives = 20k * 10% = 2,000 actual positives
    - To hit 80% TPR (Equality of Opportunity), 2000 * 0.80 = 1,600 approved

    **Conclusion & Interpretation:**
    - **Result: 1,600 approved (Calibration-Bound)**. Group B's threshold must be lowered to approve 1,600 of its actual positives.
