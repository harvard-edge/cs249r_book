title: 'Optimizing LLM Training on A100s: Coreset vs. Synthetic Data for the Data Wall Problem'
scenario: 'Your team is designing the pre-training pipeline for a 500B parameter multi-modal foundation model using A100 GPUs. The challenge is the ''data wall problem'' – real-world data is prohibitively expensive, risking model collapse without massive volume. Two strategies are proposed: (1) **Coreset Selection**, which violently filters the dataset by 30% using intensive offline computation to isolate representative samples; (2) **Synthetic Data Generation**, utilizing a generative model to synthetically augment the dataset by 2x.'
question: How would you evaluate coreset selection versus synthetic data generation on A100s, and would you choose one or a hybrid strategy?
details:
  realistic_solution: 'Coreset selection is the default choice if the filtered 70% corpus preserves coverage: it costs 100 A100-hours up front but cuts the 1000 A100-hour run to about 700 A100-hours, for an 800 A100-hour net cost and 20% savings. Synthetic 2x augmentation is not a compute-saving strategy by itself because it doubles tokens/images to train on and adds generator plus filtering costs; choose it only for measured coverage gaps, rare modalities, or safety slices where real data is missing. The practical recommendation is a hybrid: train the main run on the validated coreset, add a capped and quality-filtered synthetic slice for underrepresented regions, and run ablations on held-out real eval sets to catch distribution drift or collapse.'
  common_mistake: |
    **The Pitfall:** Treating data pruning or synthetic augmentation as a purely "offline" problem that magically improves the model without its own infrastructural compute overhead.
    **The Rationale:** Data Scientists often analyze algorithms by epoch convergence, while ignoring that filtering 10TB of raw multimodal data using neural embeddings actively burns massive amounts of A100-hours upfront.
    **The Consequence:** The team successfully reduces total training time but ultimately wastes double that amount of GPU-hours performing the exorbitant offline selection metrics, leading to a disastrously negative Net Compute ROI.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline run: 10TB dataset, 1000 A100-hours.
    - Coreset removes 30% of raw data, reducing the corpus to 7TB.
    - Offline coreset scoring costs 100 A100-hours.
    - Synthetic augmentation can improve coverage but must be quality-filtered to avoid collapse.

    **Calculations:**
    - If training cost scales with examples, coreset-only training cost is 1000 * 0.70 = 700 A100-hours.
    - Net coreset cost = 700 + 100 = 800 A100-hours.
    - Savings versus baseline = (1000 - 800) / 1000 = 20%.
    - Synthetic 2x augmentation doubles sample count unless filtered or curriculum-scheduled, so its value must come from better quality or coverage, not cheaper I/O.

    **Conclusion & Interpretation:**
    - **Result: Coreset selection gives 20% net compute savings under these assumptions.** A hybrid is preferable when synthetic data fills real coverage gaps, but it should be capped and validated rather than treated as free volume.
