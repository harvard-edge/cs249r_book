title: Diagnosing Small File Metadata Starvation
scenario: 'A deep learning team is training a vision model on a node with 8x A100 GPUs, loading a dataset of 10 million individual 100KB JPEG files from a network-attached parallel file system. The storage cluster advertises 20 GB/s of sequential read throughput and a metadata server limit of 10,000 file open operations per second. During training, the GPUs are starved, running at 15% utilization. Network monitoring shows storage throughput peaking at barely 1 GB/s, while CPU `iowait` is extremely high.'
question: 'Why are the A100s starved despite 20GB/s storage bandwidth, and how should the 10M JPEGs be stored instead?'
details:
  realistic_solution: 'Aggregate the individual JPEGs into large sequential container formats (like WebDataset, TFRecord, or Petastorm) to convert millions of metadata operations into a few large sequential reads, bypassing the IOPS bottleneck.'
  common_mistake: |
    **The Pitfall:** Attempting to solve the issue by upgrading the storage network bandwidth or adding more parallel data loader workers.
    **The Rationale:** Engineers often equate slow I/O directly with a lack of bandwidth or insufficient parallel workers, ignoring the overhead of individual file operations.
    **The Consequence:** This actually exacerbates the metadata server bottleneck, leading to no improvement or even worse performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - To feed 8x A100s, assume a target of 20,000 images/sec.
    - At 1 file/image, this requires 20,000 file opens/sec.
    - The DFS metadata server is capped at 10,000 opens/sec.

    **Calculations:**
    - The maximum achievable throughput is therefore 10,000 opens/sec × 100 KB = 1 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 1 GB/s (Metadata IOPS Bottleneck)**. The metadata IOPS limit caps throughput at 1 GB/s, leaving 95% of bandwidth unutilized; individual JPEGs must be aggregated into large sequential archives.
