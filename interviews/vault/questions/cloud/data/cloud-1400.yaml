title: Immutable Audit Trail Storage Scaling
scenario: A financial ML platform processes 5,000 fraud detection inference requests per second. Every inference event requires an immutable audit log averaging 2 KB per entry. The logs must be stored in an append-only WORM object storage system with a 7-year retention policy.
question: How should you design the audit logging path, and what write throughput and 7-year WORM storage are required?
details:
  realistic_solution: |
    Decouple logging using an asynchronous message queue that batches logs and flushes them to WORM object storage (like S3 Object Lock). The required write throughput is 10 MB/s, and the 7-year storage footprint is approximately 2.2 PB.
  common_mistake: |
    **The Pitfall:** Attempting to write every 2 KB log synchronously to a relational database.
    **The Rationale:** Relational databases are the default for structured transactional data, making them an easy crutch.
    **The Consequence:** Synchronous DB writes will heavily bottleneck the strict inference latency, and storing petabytes in a standard RDBMS is prohibitively expensive compared to object storage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Volume: 5,000 req/s.
       - Log Size: 2 KB.
       - Retention: 7 Years (WORM).
    2. **Calculations:**
       - Throughput: 5,000 * 2 KB = 10 MB/s.
       - Daily Storage: 10 MB/s * 86,400s = 864 GB/day.
       - Yearly Storage: 864 GB * 365 = 315 TB/yr.
       - Total Retention: 315 TB * 7 = 2,205 TB.
    3. **Conclusion & Interpretation:**
       - **Result: I/O Bottleneck.** The 10 MB/s stream completely demands an asynchronous message queue feeding 2.2 PB of raw WORM object storage, bypassing synchronous RDBMS paths.
