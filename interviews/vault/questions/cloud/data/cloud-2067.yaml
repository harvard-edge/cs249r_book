title: The Cost of Rolling Back a Model Deployment
scenario: Your team deploys a new recommendation model on Monday. By Wednesday, business metrics (revenue per session) have dropped 3%. The team waits until Friday to confirm statistical significance, then rolls back to the previous model. The e-commerce platform has $10M daily revenue.
question: What is the cost of waiting until Friday to roll back the 3% revenue regression, and how would a canary reduce the blast radius?
details:
  realistic_solution: 'Direct revenue impact: $10M/day × 3% × 3 days (Wednesday-Friday) = $900K in lost revenue. But the real cost is higher: (1) Monday-Tuesday was also impacted, adding $600K (2 days × $10M × 3%), bringing total direct loss to $1.5M. (2) After rollback, the team needs to debug the regression, which takes 1-2 weeks of engineering time. (3) The confidence loss delays future model launches. The fix: automated canary deployments with business-metric-driven rollback triggers. A canary serving 1% of traffic for 24 hours limits exposure to $10M × 3% × 1% × 1 day = $3,000 — a 500× reduction in blast radius.'
  common_mistake: |
    **The Pitfall:** Only counting the direct revenue loss from the moment the regression is noticed.
    **The Rationale:** Teams focus on the decision-making period (Wednesday-Friday) and ignore the accumulated losses since deployment.
    **The Consequence:** They underestimate the massive opportunity cost of manual, delayed rollbacks and underinvest in automated canary infrastructure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daily revenue: $10M.
    - Regression drop: 3%.
    - Rollback delay: 5 days (Monday-Friday).
    - Canary release: 1% traffic for 24 hours.

    **Calculations:**
    - Full blast radius loss: 5 days * $10M/day * 3% = $1.5M.
    - Canary release loss: 1 day * $10M/day * 3% * 1% = $3,000.
    - Risk reduction: $1.5M / $3,000 = 500x.

    **Conclusion & Interpretation:**
    - **Result: Risk-Bound Deployment**. Automated canary deployments provide a 500x reduction in blast radius.
