title: Training Time Estimation with Local NVMe Caching
scenario: Your 8-node cluster is training a model for 10 epochs on a 64TB dataset stored in S3. Each node has a 50 Gbps (6.25 GB/s) network link to S3 and a local 10TB NVMe SSD with 20 GB/s read bandwidth.
question: 'How long does 10-epoch training take with a local NVMe warm cache versus reading the 64TB dataset from S3 every epoch?'
details:
  realistic_solution: 'Calculate Epoch 1 at the network-limited speed (6.25 GB/s) and Epochs 2-10 at the GPU compute-limited speed (16 GB/s), as the 8TB data shard fits entirely within the 10TB NVMe cache.'
  common_mistake: |
    **The Pitfall:** Using the theoretical maximum NVMe bandwidth (20 GB/s) for calculation.
    **The Rationale:** Candidates forget that once data is local, the training speed is bottlenecked by the GPU compute throughput (16 GB/s), not the SSD max speed.
    **The Consequence:** Underestimating the cached epoch time and calculating an impossible overall speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 TB dataset over 8 nodes.
    - S3 network link: 6.25 GB/s.
    - Local NVMe SSD read: 20 GB/s, GPU compute limits data processing to 16 GB/s.

    **Calculations:**
    - Data Per Node: 64 TB / 8 nodes = 8 TB (8000 GB). Fits in 10TB NVMe cache.
    - Without Cache (S3 Bottleneck): 8000 GB / 6.25 GB/s = 1280s per epoch. Total = 1280 * 10 = 12,800s.
    - With Cache (Epoch 1): S3 bottlenecked = 1280s.
    - With Cache (Epochs 2-10): Read from NVMe, bottlenecked by GPU compute (16 GB/s). 8000 GB / 16 GB/s = 500s per epoch.
    - Total Time With Cache: 1280s + (9 * 500s) = 5780s.

    **Conclusion & Interpretation:**
    - **Result: 5780s (Compute-Bound)**. Time saved is 12,800 - 5780 = 7020 seconds.
