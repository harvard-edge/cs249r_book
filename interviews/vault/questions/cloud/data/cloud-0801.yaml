title: The Deduplication Economics
scenario: A 10TB pre-training dataset contains ~30% near-duplicate content. The ML lead claims duplicates don't matter and more data is better. The infrastructure lead claims deduplicating everything will save 30% on training compute.
question: Who is right, and what is the economically optimal deduplication strategy?
details:
  realistic_solution: 'Neither is right. Research (Lee et al., 2022; Penedo et al., 2023) shows that moderate deduplication *improves* model quality (reduces memorization, improves generalization), but aggressive deduplication *hurts* it (removes legitimate repeated patterns like common phrases, code idioms). The optimal strategy is **fuzzy deduplication with a similarity threshold**: use MinHash LSH to identify near-duplicate clusters (Jaccard similarity >0.8), keep one representative from each cluster, but preserve exact duplicates below the threshold. The economics: deduplication itself is not free — running MinHash on 10TB requires significant compute. The decision framework is: compare the cost of deduplication compute against the savings in training compute, weighted by the quality impact.'
  common_mistake: |
    **The Pitfall:** Endorsing absolute extremes: either deduplicate everything or keep all duplicates.
    **The Rationale:** Candidates treat data volume vs compute cost as a binary tradeoff, missing the non-linear impact of data diversity on model generalization.
    **The Consequence:** Aggressive dedup harms model quality by removing common idioms; zero dedup wastes millions of dollars memorizing redundant data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset size: 10TB.
    - Deduped size: 7TB.
    - Compute costs: $2/hr for A100, $0.05/hr for CPU.

    **Calculations:**
    - Baseline training (10TB): ~3,000 A100-hours * $2/hr = $6,000.
    - Deduped training (7TB): ~2,100 A100-hours * $2/hr = $4,200. Savings = $1,800/run.
    - Dedup compute (MinHash LSH): ~200 CPU-hours * $0.05/hr = $10.
    - ROI: $1,800 / $10 = 180:1.

    **Conclusion & Interpretation:**
    - **Result: 180:1 Compute ROI (Compute-Bound)**. A fuzzy deduplication strategy yields massive ROI while preventing the quality degradation caused by absolute deduplication.
