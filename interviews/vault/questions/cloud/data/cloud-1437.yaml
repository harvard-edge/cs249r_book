title: Intersectional Bias Mitigation in Identity APIs
scenario: 'A cloud identity verification API processes 5M requests/day using a ResNet-101 model. The model achieves 99.2% overall accuracy and satisfies demographic parity across gender and skin tone independently. An audit reveals the false rejection rate (FRR) for darker-skinned females is 12.5%, compared to 0.5% for lighter-skinned males.'
question: 'What remediation would you choose for the 12.5% FRR intersectional gap given a 3-month data delay and 280ms MoE latency?'
details:
  realistic_solution: 'Implement a Minimax optimization objective (e.g., via Group DRO) during fine-tuning to explicitly minimize the loss of the worst-performing intersectional subgroup, accepting a slight degradation in overall accuracy to reduce the worst-case FRR below 2%, avoiding architecture changes that violate the serving SLO.'
  common_mistake: |
    **The Pitfall:** Assuming that achieving demographic parity on individual marginal distributions guarantees fairness across their intersections.
    **The Rationale:** Engineers rely on high-level aggregate metrics and fail to disaggregate performance across overlapping identity groups.
    **The Consequence:** Deploying a model that systematically discriminates against a specific intersectional subgroup, leading to compliance violations and severe reputational damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1M training images, marginals P(Female) = 0.5, P(Dark) = 0.5.
    - Independent probability: P(Female ∩ Dark) = 0.25.
    - Actual skewed joint distribution: P(Female ∩ Dark) = 0.04 (40k images).
    - Batch size: 256.

    **Calculations:**
    - Expected samples per batch = 256 * 0.04 = 10.24 samples/batch.
    - Oversampling required to reach uniform joint (25%): 0.25 / 0.04 = 6.25x.

    **Conclusion & Interpretation:**
    - **Result: >6x oversampling (Data Representation-Bound)**. Achieving stable gradients requires massive oversampling, risking severe overfitting unless addressed via Group DRO.
