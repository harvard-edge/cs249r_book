title: The Feature Backfill Cost
scenario: You add a new feature 'user_lifetime_spend_percentile' to your ranking model. Training needs 6 months of historical feature values. The raw transaction logs exist in your data lake.
question: What infrastructure cost is needed to backfill user_lifetime_spend_percentile for 100M users over 180 days?
details:
  realistic_solution: |
    The compute cost is driven by scanning 180B transaction rows and maintaining a cumulative per-user spend distribution for point-in-time correctness. At 200 bytes per transaction, the backfill scans about 36 TB; using a 100-node distributed job for roughly 4 hours at $3/node-hour gives about $1,200 of compute plus about $180 of scan I/O, or roughly $1.4K infrastructure cost. The 100M users matter because the job must maintain and emit per-user historical feature state, but the dominant read cost comes from the 1B transactions/day input.
  common_mistake: |
    **The Pitfall:** Assuming backfill is a simple, cheap SQL query.
    **The Rationale:** Candidates underestimate the massive I/O overhead and the necessity of point-in-time correctness to prevent label leakage.
    **The Consequence:** Incurring extreme cloud compute costs and introducing target leakage into the training dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - 180 days * 1B logs/day = 180 billion logs.
    - Row size: 200 bytes.
    - S3 scan cost: $5/TB.

    **Calculations:**
    - Total data: 180 billion * 200 bytes = 36 TB.
    - Storage scan cost: 36 TB * $5/TB = $180.
    - Distributed compute: 100 nodes * 4 hours * $3/hr = $1,200.
    - Output scale if writing daily user features: 100M users * 180 days = 18B feature rows.
    - At 16 bytes per output row, feature output is about 288 GB, much smaller than the 36 TB input scan.
    - Total estimated infrastructure cost: $180 + $1,200 = $1,380.

    **Conclusion & Interpretation:**
    - **Result: About $1.4K Infrastructure Cost**. The numeric compute estimate comes from scanning 36 TB and running a distributed aggregation; engineering effort for point-in-time correctness is separate and can exceed the raw infrastructure bill.
