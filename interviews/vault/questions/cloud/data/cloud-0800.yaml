title: The Stale Feature Store
scenario: Your company operates a critical real-time fraud detection model. Features are sourced from an online feature store and an offline batch feature store. Recently, you've observed that the online model's performance degrades significantly shortly after a new batch of features is pushed to the offline store, even though the model itself hasn't changed.
question: What architectural flaw causes online fraud model degradation after offline feature pushes, and how would you keep features fresh and consistent?
details:
  realistic_solution: |
    The flaw is train-serve skew due to asynchronous or inconsistent updates between the online and offline feature stores. When new features are generated offline, they are used to retrain the model but not immediately propagated online, leading to stale serving features. Fix it by making the feature definition and materialization path consistent: use a single feature registry/source of truth, publish feature updates through CDC or an event log, version feature values and model artifacts together, and only promote a model when the online store has the matching feature version.
  common_mistake: |
    **The Pitfall:** Blaming the model or the data quality directly.
    **The Rationale:** Engineers often fail to recognize the train-serve skew caused by asynchronous or inconsistent updates between online and offline stores.
    **The Consequence:** Endless debugging of the model architecture while the fundamental data pipeline synchronization issue persists.
  napkin_math: |
    **Assumptions & Constraints:**
    - The scenario gives no batch runtime or propagation latency, so the only defensible bound is the allowed skew SLA.
    - Fraud serving requires online features to match the version used at training/promotion time.

    **Calculations:**
    - If offline feature version V+1 is used for training while the online store still serves V, the skew window lasts until V+1 is materialized online and acknowledged.
    - To meet a sub-second freshness target, the promotion gate must require online materialization lag < 1s for critical features, or route both training and serving through the same event-derived feature version.
    - A CDC/event-log path gives a measurable lag: event time to online-store commit time. The model should not be promoted while that lag or feature version mismatch violates the SLA.

    **Conclusion & Interpretation:**
    - **Result: Train-Serve Skew.** The fix is not a fabricated 6-hour batch estimate; it is versioned, event-driven feature materialization with promotion blocked until online and offline feature versions are consistent.
