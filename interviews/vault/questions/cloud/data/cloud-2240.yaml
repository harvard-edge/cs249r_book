title: The Shuffle Data Volume Calculation
scenario: You are running a distributed Spark job to join a 10 TB user-activity table with a 500 GB user-profile table, both partitioned by user_id across 200 nodes. The join key is user_id.
question: How much data moves across the network during the shuffle phase, and what determines whether this is a broadcast join or a shuffle join?
details:
  realistic_solution: |
    Given the scenario, the shuffle phase should move approximately 0 bytes: both tables are already partitioned by user_id across the same 200-node layout, so a co-partitioned join can be executed locally within matching partitions. Broadcast versus shuffle is a separate optimizer choice. Spark broadcasts only when one side is small enough to fit safely in executor memory and below the broadcast threshold. When the inputs are not compatibly partitioned and neither side is broadcastable, Spark uses a shuffle join that repartitions the required side or both sides by the join key.
  common_mistake: |
    **The Pitfall:** Assuming both tables must be shuffled, moving 10.5 TB across the network.
    **The Rationale:** Candidates ignore the broadcast join optimization for cases where one table is small enough to fit in memory.
    **The Consequence:** Severe network congestion and slow job execution times due to unnecessary large shuffles.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 TB activity table and 500 GB profile table.
    - Both are already partitioned by user_id across the same 200-node partitioning scheme.

    **Calculations:**
    - Co-partitioned join shuffle: 0 TB, because matching user_id partitions are already co-located.
    - If not co-partitioned, shuffling both sides would move roughly 10 TB + 0.5 TB = 10.5 TB.
    - Broadcasting the 500 GB side to 200 nodes would move 500 GB * 200 = 100 TB aggregate traffic and is usually too large for executor memory.

    **Conclusion & Interpretation:**
    - **Result: Partitioning-Bound**. The correct answer for this setup is ~0 shuffle bytes; broadcast is chosen only for genuinely small inputs, while shuffle joins are used when compatible partitioning is absent and both sides must be keyed by user_id.
