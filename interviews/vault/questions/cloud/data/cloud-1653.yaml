title: Diagnosing Object Storage Prefix Rate Limits in Streaming
scenario: A training job on an 8x GPU node streams a 50TB dataset directly from AWS S3 using concurrent HTTP byte-range requests. The dataset is stored as a single massive file. The data loader fetches 2MB chunks concurrently. Despite having 50 GB/s of available instance network bandwidth, the data loading throughput flatlines at exactly 11 GB/s, causing severe GPU starvation.
question: "Why does S3 streaming flatline at exactly 11 GB/s despite 50 GB/s instance networking, and how should the dataset be laid out?"
details:
  realistic_solution: The bottleneck is the object storage partition rate limit. S3 caps GET requests at 5,500 per second per prefix. The solution is to shard the dataset across multiple prefixes (e.g., `s3://bucket/data/shard_0001/`) and increase the HTTP byte-range chunk size (e.g., to 16MB) to maximize throughput per request.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the instance network interface or TCP window scaling.
    **The Rationale:** Engineers default to node-level or OS-level bottlenecks, forgetting that cloud object stores aggressively throttle metadata operations per prefix.
    **The Consequence:** Wasting time tuning Python's GIL or kernel parameters instead of optimizing data layout for cloud limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * S3 Prefix Limit: 5,500 GETs/sec.
       * Chunk Size: 2 MB.
    2. **Calculations:**
       * Max Throughput: 5,500 req/sec * 2 MB/req = 11,000 MB/s = 11 GB/s.
       * Min Chunk Size for 50 GB/s: 50,000 MB/s / 5,500 req/s = ~9.1 MB.
    3. **Conclusion & Interpretation:** **Result: 11 GB/s (I/O-Bound)**. The storage prefix rate limits flatline the throughput entirely.
