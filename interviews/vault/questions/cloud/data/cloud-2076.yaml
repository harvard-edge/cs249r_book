title: The End-to-End Iteration Tax Audit
scenario: 'You are asked to reduce the team''s model development cycle from 6 weeks to 2 weeks. The current serial breakdown is: data collection (1 wk), cleaning (1 wk), feature engineering (1 wk), training/tuning (1.5 wks), eval (0.5 wks), deployment (1 wk).'
question: Where do you invest engineering effort, and how do you achieve a 3x speedup when every phase seems equally important?
details:
  realistic_solution: Transition from a waterfall ML pipeline to a continuous CI/CD pipeline. Parallelize independent phases, process incrementally, shift evaluation left into training, and automate pre-validated deployments.
  common_mistake: |
    **The Pitfall:** Attempting to optimize each phase equally or focusing solely on the longest phase (training).
    **The Rationale:** Candidates treat the pipeline as fundamentally serial, ignoring opportunities for concurrency.
    **The Consequence:** Achieving only marginal speedups (diminishing returns) instead of the mandated 3x reduction in cycle time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current serial pipeline: 1 + 1 + 1 + 1.5 + 0.5 + 1 = 6 weeks.
    - Target cycle time: 2 weeks, or a 3x speedup.
    - Engineering work can make data collection continuous, combine cleaning and feature generation into a reusable pipeline, embed evaluation during training, and automate deployment.

    **Calculations:**
    - Non-blocking data collection: maintain a continuously refreshed dataset, so the next iteration does not wait a full new week for collection.
    - Blocking data/feature readiness after automation: cleaning + feature engineering shrink from 2 weeks serial to 0.5 weeks on the critical path.
    - Training/tuning with embedded eval: 1.5 + 0.5 weeks becomes 1.25 weeks because evaluation runs during training and only final acceptance remains.
    - Deployment automation: 1 week becomes 0.25 weeks for pre-validated rollout.
    - New critical path: 0.5 + 1.25 + 0.25 = 2.0 weeks.
    - Speedup: 6 / 2 = 3x.

    **Conclusion & Interpretation:**
    - **Result: Process-Bound**. The 3x speedup comes from removing serial waits and shrinking the critical path, not from optimizing every phase equally.
