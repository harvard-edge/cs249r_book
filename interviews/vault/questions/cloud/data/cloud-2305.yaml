title: The Automated Fraud Label Loop
scenario: 'Your fraud detection API processes 50,000 QPS. Over the last 3 weeks, precision has degraded from 95% to 70%. Your automated drift detection dashboards, which run KS tests on all 200 input features, are completely green. You trigger a full pipeline retrain on the most recent 3 weeks of data, but the newly deployed model performs even worse (65% precision).'
question: 'Why did precision fall from 95% to 70% with green feature drift dashboards, and why did retraining make it worse?'
details:
  realistic_solution: |
    The root cause is upstream label pollution creating a negative feedback loop. Because the feature distributions (X) haven't shifted, the drift must be in the target variable (Y) or the P(Y|X) relationship caused by corrupted ground truth. Three weeks ago, an upstream operations team implemented an automated, rule-based chargeback system that automatically tags certain transactions as 'fraud' based on a static heuristic to save human reviewer time. These heuristic labels are now flowing directly into your training data pipeline as ground truth. The ML model is no longer learning actual fraud; it is learning to perfectly mimic the simplistic, lower-precision rule-based system. To resolve this, you must audit the data lineage of the labels, separate human-reviewed labels from auto-labels, and either filter out the auto-labels during training or use sample weighting to heavily penalize them.
  common_mistake: |
    **The Pitfall:** Assuming concept drift has occurred in a non-linear way that KS tests missed.
    **The Rationale:** Candidates attempt to fix performance drops by moving to more complex model architectures rather than questioning ground truth integrity.
    **The Consequence:** The real issue (label pollution) is ignored, and the new model confidently memorizes the corrupted heuristic rules.
  napkin_math: |
    **Assumptions & Constraints:**
    - Traffic: 50,000 QPS at 1% true fraud rate = 500 fraud cases/sec.
    - Pollution: Upstream rule-based system auto-labels 450 cases/sec (with 150 false positives).

    **Calculations:**
    - Heuristic precision: 300 / 450 = 66.6%.
    - The model's precision aggressively regresses toward the heuristic's precision.

    **Conclusion & Interpretation:**
    - **Result: ~70% precision (Data-Bound)**. The model perfectly mimics the corrupted heuristic rules, dropping overall pipeline precision.
  options:
  - 'The model is suffering from complex, non-linear concept drift that KS tests cannot detect. The solution is to move to a more complex architecture like a deep neural network to capture the shifted feature relationships.'
  - 'Upstream label pollution has occurred. A new rule-based system is automatically tagging transactions, and these heuristic labels are now acting as ground truth. The model is learning the lower-precision heuristic, so you must separate and filter out these auto-labels.'
  - 'The training pipeline is corrupting the feature data during the backfill process, causing a mismatch between training and serving features. The solution is to use the exact same feature extraction code for both.'
  - 'The 50,000 QPS load is causing request timeouts and missing feature values during inference. The KS tests ignore missing values, hiding the drift. The solution is to scale up the inference cluster to reduce latency.'
  correct_index: 1
