title: Feature Skew Between Training and Serving
scenario: Your ad ranking model was trained on features computed from a Spark batch pipeline using a 1-hour aggregation window for user activity counts. In serving, the feature store computes the same aggregation over a rolling 1-hour window using a streaming Flink pipeline. Model performance in production is 8% lower AUC than offline evaluation. You suspect training-serving skew.
question: How do you confirm and fix the training-serving skew?
details:
  realistic_solution: |
    Log both training-time feature values and serving-time feature values for the same user-item pairs over a 48-hour shadow period. Compute feature distribution statistics (mean, p50, p99, Jensen-Shannon divergence) between training and serving distributions. Key fixes: (1) align watermark settings between Spark and Flink, (2) use point-in-time joins in training to match exactly the features available at serving time, (3) validate with a feature monitoring dashboard.
  common_mistake: |
    **The Pitfall:** Assuming that 'same feature logic' means 'same feature values.'
    **The Rationale:** Batch pipelines and streaming pipelines process the code identically but manage internal temporal boundaries differently.
    **The Consequence:** A 1-hour window ending at 12:00 in batch might include late events up to 12:05, while the streaming window strictly cuts at 12:00, causing silent feature skew.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline offline AUC = 0.78.
    - Production AUC is 8% lower, interpreted as a relative drop unless the metric owner says otherwise.
    - Shadow logging samples 1% of 50K RPS, with 200 numeric features at 4 bytes each.

    **Calculations:**
    - Relative AUC drop: 0.78 × (1 - 0.08) = 0.7176, about 0.718 production AUC.
    - Absolute AUC drop would be 0.78 - 0.08 = 0.70, so the dashboard must clarify relative vs absolute.
    - Shadow logging rate: 50,000 RPS × 1% = 500 requests/s.
    - Feature payload: 200 features × 4 bytes = 800 bytes/request.
    - Logging bandwidth: 500 × 800 = 400,000 bytes/s ≈ 0.4 MB/s before metadata and compression.
    - Revenue impact cannot be inferred from AUC alone without an experiment or calibrated business metric.

    **Conclusion & Interpretation:**
    - **Result: ~0.4 MB/s feature payload logging (Skew-Bound)**. Shadow logging is manageable and provides paired distributions for fixing watermarks and point-in-time joins.
