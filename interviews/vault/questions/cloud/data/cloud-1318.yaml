title: Analytical Gradient Inversion Complexity
scenario: 'A cloud federated learning aggregator receives unencrypted FP32 gradients from a mobile client training a neural network for financial profile classification. A rogue server admin attempts an analytical gradient inversion attack on a client update where the batch size B=1.'
question: "For batch size 1, how many FLOPs are needed to reconstruct the 4,096-dimensional input from dW and db?"
details:
  realistic_solution: 'Recognize that for a dense layer with B=1, the weight gradient is simply the outer product of the bias gradient (which equals the activation gradient) and the input vector. Reconstructing x using analytical gradient inversion requires only a single vector-scalar division across the input dimension.'
  common_mistake: |
    **The Pitfall:** Assuming gradient inversion strictly requires an expensive iterative optimization process.
    **The Rationale:** Modern deep leakage attacks usually rely on L-BFGS to match dummy gradients over thousands of steps.
    **The Consequence:** Falsely believing the system is safe because "the attacker doesn't have enough compute," missing the closed-form vulnerability of the first dense layer at B=1.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input size 4,096, Batch size 1.
    2. **Calculations:**
       - Chain Rule: ∇W = ∇b ⊗ x^T.
       - Reconstruction uses x_j = ∇W_{i,j} / ∇b_i.
       - Operations required: Exactly 4,096 floating-point divisions.
    3. **Conclusion & Interpretation:**
       **Result: Compute Bound. Perfect reconstruction takes only 4,096 FLOPs (4 KFLOPs).**
