title: 'Cloud Data Quality As Code L2 0'
scenario: 'Your ML pipeline silently ingested a batch of training data where 15% of labels were corrupted due to an upstream database migration. The model trained on this data for 3 days before anyone noticed.'
question: 'How would data quality as code have caught the 15% label corruption before the 3-day training run started?'
details:
  realistic_solution: 'Data quality as code means encoding validation rules in version-controlled configuration that runs automatically in the pipeline: (1) Schema validation — check that label values are from the expected set (e.g., labels ∈ {0,1,...,9}), (2) Statistical bounds — assert that class distribution doesn''t shift by more than 5% between batches (15% corruption would trigger this), (3) Null/anomaly checks — detect unexpected nulls, NaNs, or out-of-range values, (4) Data unit tests — specific assertions like ''image dimensions are 224×224'' or ''text length < 512 tokens.'' These checks run as a pipeline stage BEFORE training starts, with hard failures that block the pipeline. Without them, validation depends on humans noticing quality issues — which took 3 days in your case.'
  common_mistake: |
    **The Pitfall:** Implementing data checks as one-off scripts rather than version-controlled pipeline stages.
    **The Rationale:** Treating validation as a manual, ad-hoc process rather than an automated requirement.
    **The Consequence:** One-off scripts get lost, skipped, or outdated. Without pipeline-enforced hard failures, validation depends on humans noticing quality issues, leading to expensive wasted training runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 A100s at $2/hr.
    - 3 days (72h) of wasted training.
    - Data validation stage scans 1 TB at 3.3 GB/s (~5 minutes).

    **Calculations:**
    - Wasted compute: 64 GPUs × $2/hr × 72h = $9,216.
    - Cost of validation: 5 min × $128/hr (64 GPUs idle) = $10.67.
    - Prevention ROI: $9,216 / $10.67 = 864x.

    **Conclusion & Interpretation:**
    - **Result: 864x ROI (Cost-Bound)**. Pipeline-enforced hard failures for validation prevent expensive wasted training runs.
