title: Rolling Window Dynamic Benchmarking Cost
scenario: 'You are designing a dynamic benchmarking system for a cloud-based LLM. The system generates 500 fresh evaluation prompts daily using an Oracle model (generation cost: $0.03/prompt). Your candidate model is evaluated once daily on a rolling window of the last N days of prompts. Evaluating the candidate model costs $0.002 per prompt. Your strict 30-day monthly budget for this pipeline is $1,500.'
question: What is the maximum rolling window N you can afford under the $1,500 monthly dynamic benchmarking budget?
details:
  realistic_solution: Deduct the fixed monthly prompt generation cost from the total budget, then account for the rolling-window evaluation cost. Each day the candidate model evaluates N days of prompts, so the monthly evaluation cost is 30 days times N window-days times the cost of one day's 500-prompt batch. This gives a maximum affordable window of 35 days.
  common_mistake: |
    **The Pitfall:** Ignoring the cumulative daily inference costs.
    **The Rationale:** Candidates often only consider the flat rate of generating new prompts and forget that the candidate model re-evaluates the entire window every day.
    **The Consequence:** The candidate drastically overestimates the affordable window size by missing the O(N) scaling factor for evaluation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Oracle cost: $0.03/prompt. Evaluation cost: $0.002/prompt. Generation: 500 prompts/day.
    - Budget: $1500 for 30 days.
    **Calculations:**
    * Monthly Oracle generation: 30 days × 500 prompts × $0.03 = $450.
    * Remaining monthly budget: $1500 - $450 = $1050.
    * Cost to evaluate one day's batch: 500 × $0.002 = $1.00.
    * Daily rolling-window evaluation cost: N × $1.00.
    * Monthly rolling-window evaluation cost: 30 × N × $1.00 = $30N.
    * Budget constraint: $450 + $30N ≤ $1500, so N ≤ 35.
    **Conclusion & Interpretation:**
    * **Result: 35 days (Budget-Bound)**. The candidate re-evaluates all N days every day, so the rolling window scales linearly with N.
