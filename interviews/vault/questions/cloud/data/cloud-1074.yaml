title: Data Lineage Overhead at Scale
scenario: A global financial institution processes 50,000 transactions per second (TPS) through a fraud detection model. Regulatory compliance requires full data lineage tracking for every inference, capturing the origin and transformation steps of all 150 features. The raw transaction payload is 2KB, but the lineage metadata graph adds an additional 8KB per event. The system runs 24/7.
question: What daily lineage storage overhead and ingest bandwidth does 50,000 TPS create, and how should you reduce it?
details:
  realistic_solution: "Batch and compress the lineage events at the edge of the inference service before shipping to the metadata store. Highly structured lineage graphs compress exceptionally well (often 10x using Parquet/Snappy), reducing network ingress to 40 MB/s and daily storage to ~3.5 TB."
  common_mistake: |
    **The Pitfall:** Assuming metadata is negligible compared to raw data and failing to account for the network bottleneck.
    **The Rationale:** Treating lineage tracking as a simple logging exercise rather than a massive data streaming problem.
    **The Consequence:** A 400 MB/s network ingress requirement that bottlenecks the centralized metadata registry and blows up storage costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Transaction rate: 50,000 TPS.
    - Lineage metadata size: 8 KB per event.
    - Continuous operation: 86,400 seconds/day.

    **Calculations:**
    - Raw Lineage Bandwidth: 50,000 TPS \times 8 KB = 400 MB/s.
    - Daily Raw Storage: 400 MB/s \times 86,400 sec/day = 34.56 TB/day.
    - Compressed Storage: Using a 10x compression ratio (e.g., Parquet/Snappy), 34.56 TB / 10 = ~3.46 TB/day.

    **Conclusion & Interpretation:**
    - **Result: ~3.46 TB/day (Storage-Capacity-Bound)**. Compression reduces the 34.56 TB/day burden to ~3.46 TB/day.
