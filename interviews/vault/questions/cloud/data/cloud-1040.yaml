title: Evaluating Covariate Shift Mitigation in CTR Prediction
scenario: Your team is running a large-scale Click-Through Rate (CTR) prediction model (DLRM) served on 64x A100 instances for an e-commerce platform. Over the last 48 hours, a new ad campaign drastically shifted the distribution of user demographic features (e.g., age and location inputs) without changing the underlying click-through probability for those specific demographics. The Population Stability Index (PSI) for the 'age' feature spiked from 0.05 to 0.35. The system handles 100K QPS, and retraining from scratch costs $5,000 and takes 12 hours.
question: For a PSI of 0.35 with unchanged P(Y|X), should you fully retrain the CTR model or use importance weighting, and why?
details:
  realistic_solution: Implement Importance Weighting (Density Ratio Estimation) to reweigh the loss function during an incremental update. Since P(Y|X) is unchanged, reweighting historical data to match the new P(X) avoids the 12-hour, $5,000 full retraining cost while adapting to the new demographic distribution.
  common_mistake: |
    **The Pitfall:** Assuming covariate shift automatically necessitates immediate full retraining.
    **The Rationale:** Candidates see a high PSI and assume model degradation without realizing that if P(Y|X) is constant, importance weighting can efficiently adjust the decision boundary.
    **The Consequence:** Wasting 12 hours and $4,500 on an unnecessary full retrain while the model remains degraded during the wait.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full Retraining Cost: $5,000 and 12h time-to-deploy.
    - Importance Weighting incrementally updates the model by computing w(x) = P_new(x) / P_old(x).

    **Calculations:**
    - Applying these weights over a 1h fine-tuning job recovers performance at <10% the cost ($500) and time.

    **Conclusion & Interpretation:**
    - **Result: System-Bound.** Avoids the 12-hour full retraining while adapting to the new demographic distribution.
