title: Optimizing S3 Throughput with Data Sharding
scenario: You are training a distributed vision model on an 8x A100 GPU node. The training loop consumes 4,000 images per second. The dataset consists of 50 million individual 100KB JPEG images stored in an AWS S3 bucket. S3 provides a time-to-first-byte (TTFB) latency of 50ms per GET request, but the EC2 instance has a 10 GB/s network bandwidth capacity. Currently, the I/O pipeline is severely bottlenecking the GPUs.
question: What single-thread throughput do 100KB S3 reads achieve versus 500MB shards, and how does sharding fix the bottleneck?
details:
  realistic_solution: Pack the individual 100KB images into large, uncompressed sequential shards (e.g., 500MB TFRecord or WebDataset tar files). Individual reads deliver only about 20 images/sec from one serial reader, far below the 4,000 images/sec training target. A 500MB shard contains about 5,000 images and takes about 100ms to fetch in this simplified model, so one serial shard reader can supply about 50,000 images/sec before decompression and parsing overheads.
  common_mistake: |
    **The Pitfall:** Attempting to solve the small-file bottleneck by massively scaling up the number of prefetch worker threads.
    **The Rationale:** Candidates think more threads equal more throughput, without understanding that S3 has strict API rate limits (e.g., 5,500 GETs/second per prefix).
    **The Consequence:** The system hits S3 API rate limits and suffers from massive CPU context-switching overhead without fixing the poor latency-to-bandwidth ratio.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target rate: 4,000 images/sec (100KB per image).
    - S3 TTFB latency: 50ms.
    - EC2 Network limit: 10 GB/s.

    **Calculations:**
    - Network limit: 10 GB/s ~= 10,000 MB/s.
    - Target payload rate: 4,000 images/sec * 0.1 MB/image = 400 MB/s.
    - Small file payload: 100KB ~= 0.1 MB.
    - Small file transfer time: 0.1 MB / 10,000 MB/s = 0.00001s = 0.01ms.
    - Small file total time: 50ms TTFB + 0.01ms ~= 50ms. Single-thread throughput: 0.1 MB / 0.05001s ~= 2 MB/s.
    - Small-file image rate: 2 MB/s / 0.1 MB per image ~= 20 images/sec.
    - Shard payload: 500MB.
    - Images per shard: 500 MB / 0.1 MB per image = 5,000 images.
    - Shard transfer time: 500 MB / 10,000 MB/s = 0.05s = 50ms.
    - Shard total time: 50ms TTFB + 50ms transfer = 100ms. Single-thread throughput: 500 MB / 0.1s = 5,000 MB/s.
    - Shard image rate: 5,000 images / 0.1s = 50,000 images/sec.
    - Throughput improvement: 5,000 MB/s / 2 MB/s = 2,500x.

    **Conclusion & Interpretation:**
    - **Result: Latency amortization.** Sharding improves one serial reader from about 20 images/sec to about 50,000 images/sec in this model, easily exceeding the 4,000 images/sec target before decode and training-pipeline overheads.
