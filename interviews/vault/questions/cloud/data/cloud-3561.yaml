title: Optimizing Large-Scale Foundation Model Training with Data Efficiency on Google TPU v5e
scenario: You are leading the ML engineering effort for a new large-scale foundation model (e.g., a vision transformer). The training dataset spans petabytes of raw, heterogeneous data. You've identified a 'data wall' where adding more data no longer yields proportional performance gains, and data loading is a bottleneck. Your compute resources are a cluster of TPU accelerators.
question: What data selection strategy would train the petabyte-scale model on the accelerators within 100 TPU-days while maximizing Information-Compute Ratio (ICR) and avoiding collapse?
details:
  realistic_solution: |
    Use an explicit data-efficiency gate before full training. Embed or score the corpus with a smaller proxy model, deduplicate near-neighbor samples, reject low-quality or redundant data, and keep a diverse coreset stratified by domain, rarity, and difficulty. Add synthetic data only for measured coverage gaps, cap its fraction per domain, and require validation against held-out real distributions plus collapse monitors such as diversity metrics, memorization checks, and downstream eval regressions. The 100 TPU-day budget should drive a token/sample schedule: spend early compute on broad coverage, then raise the sampling probability of examples with high loss, high gradient novelty, or rare-domain value. The input pipeline should use pre-sharded records, host prefetch, and accelerator-side overlap so data loading no longer determines the effective ICR.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on architectural improvements or compute scaling without addressing data quality.
    **The Rationale:** Engineers often treat data as a static blob and try to optimize the model architecture or distributed training setup instead.
    **The Consequence:** The TPU spends significant time processing redundant/noisy samples, and high memory bandwidth is severely underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget is 100 TPU-days.
    - A TPU accelerator provides about 197 TFLOP/s BF16 peak for this estimate.
    - Effective training throughput after utilization losses is 50% of peak.
    - Average training sample is 300KB, but ICR depends on useful information per FLOP, not raw HBM bandwidth.

    **Calculations:**
    - Compute budget = 100 * 24 * 3600 * 197e12 = about 1.70e21 peak FLOPs.
    - At 50% utilization, usable compute is about 8.5e20 FLOPs.
    - If a candidate sample costs 2e9 FLOPs end-to-end, the budget covers about 4.25e11 sample presentations.
    - Raw HBM bandwidth alone would allow millions of 300KB samples per second, so it does not prove the job is FLOP-bound or data-bound.

    **Conclusion & Interpretation:**
    - **Result: The constraint is useful examples per compute budget.** Select and schedule data by measured information gain, and use synthetic data only where it fills validated coverage gaps without reducing diversity.
