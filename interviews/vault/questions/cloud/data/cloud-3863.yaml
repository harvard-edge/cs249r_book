title: Synthetic Data PCIe Bottleneck in 3D Imaging
scenario: A team uses on-the-fly synthetic data generation to combat model collapse in a 3D medical imaging
  model. A CPU cluster generates batches of 32 synthetic 3D volumes, each with shape [4, 256, 256, 256]
  in FP16, and streams them to a single H100 (989 TFLOPS FP16, PCIe Gen5 x16). The forward and backward
  pass for one batch requires 15 TFLOPs of compute. The CPU cluster generates these batches with zero
  latency, yet the H100 achieves only ~22% MFU. Diagnose the root cause of the poor utilization.
question: Why does the H100 reach only about 22% MFU when synthetic 3D batches are generated with zero
  CPU latency?
details:
  realistic_solution: The root cause is a severe host-to-device PCIe bandwidth bottleneck. The generated
    3D volumes are extremely large, and transferring them across the PCIe Gen5 bus takes significantly
    longer than the actual GPU compute time, leaving the H100 starved for data. A realistic fix is to
    generate the synthetic data directly on the GPU or to pass random seeds/compressed latent representations
    across the PCIe bus and decode them on the GPU.
  common_mistake: '**The Pitfall:** Assuming the CPU generation is the bottleneck despite the prompt stating
    zero latency, or confusing device HBM3 bandwidth with host-to-device PCIe bandwidth.

    **The Rationale:** Engineers often anchor on the compute generation step or the massive GPU memory
    bandwidth, ignoring the narrow PCIe pipe in between.

    **The Consequence:** Wasting effort optimizing CPU generation or GPU compute when the system is entirely
    I/O bound on the PCIe bus.'
  napkin_math: '**Assumptions & Constraints:**

    - 32 volumes, 4 channels, 256x256x256, FP16 (2 bytes).

    - PCIe Gen5 x16 (64 GB/s unidirectional).

    - Compute: 15 TFLOPs on 989 TFLOPS GPU.


    **Calculations:**

    - Elements per batch: 32 × 4 × 256 × 256 × 256 = 2,147,483,648 elements.

    - Batch size in bytes: 2,147,483,648 × 2 = ~4.29 GB.

    - PCIe transfer time: 4.29 GB / 64 GB/s = ~67 ms.

    - GPU compute time: 15 TFLOPs / 989 TFLOPS = ~15.1 ms.

    - Maximum overlapped MFU: 15.1 ms / 67 ms = ~22.5%.


    **Conclusion & Interpretation:**

    - **Result: PCIe Bottleneck**. Transfer takes 4.5x longer than compute, capping MFU at ~22.5%.'
