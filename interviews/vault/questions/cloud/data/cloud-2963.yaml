title: 'Dataset Curation: Mastery — Data Flywheel Architecture for Production LLM'
scenario: 'You are designing a data flywheel for a production LLM serving 10M users/day on H100 clusters. User interactions generate 50M queries/day.'
question: 'How would you design a weekly data flywheel that turns 50M daily user queries into private, high-quality, fresh training data?'
details:
  realistic_solution: 'Pipeline: 1) Anonymize (k-anonymity, differential privacy \epsilon=1.0) 2) Consent filter (keep opted-in users only, ~20%) 3) Quality gate: perplexity + length filters 4) Dedup vs existing corpus 5) Human review sample (1%) 6) Weekly fine-tuning run 7) A/B test before full rollout.'
  common_mistake: |
    **The Pitfall:** Collecting all user data without consent filtering or quality gates.
    **The Rationale:** Data engineers prioritize volume over curation, assuming more data automatically yields better models.
    **The Consequence:** The model trains on garbage data and the company violates user privacy laws.
  napkin_math: |
    **Assumptions & Constraints:**
    - Queries: 50M/day.
    - Tokens per example: 512.
    - Hardware: 512 H100s (295K tok/s).
    
    **Calculations:**
    - Volume Funnel: 50M queries $\rightarrow$ 20% opted-in (10M) $\rightarrow$ 60% quality (6M) $\rightarrow$ 30% removed in dedup (4.2M/day).
    - Weekly Dataset: 4.2M $\times$ 7 = 29.4M new examples.
    - Compute Cost: 29.4M $\times$ 512 tokens = 15B tokens. At 295K tok/s, training takes $\approx 14$ hours.
    
    **Conclusion & Interpretation:**
    - **Result: 14 Hours (Compute-Bound)**. The flywheel safely fits within a standard weekend maintenance window.
