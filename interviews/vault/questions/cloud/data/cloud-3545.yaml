title: Optimizing Active Learning for Large-Scale Model Training on Google TPU v5e
scenario: Your team is developing a foundational vision model requiring a massive, high-quality labeled dataset. You've identified that manual annotation is a significant bottleneck, and initial sampling shows considerable class imbalance. To accelerate development and improve data efficiency, you decide to implement an active learning pipeline. The training infrastructure is built on a cluster of Google TPU v5e accelerators.
question: "How would you prioritize samples for annotation to maximize model performance gains while minimizing labeling costs?"
details:
  realistic_solution: 'A realistic solution would involve: 1) **Efficient Data Encoding & Storage**: Store unlabeled data in highly optimized, compressed formats (e.g., TFRecords with quantization) and leverage Google Cloud Storage''s high throughput. 2) **Batch Querying**: Implement active learning strategies that query for large batches of samples (e.g., uncertainty sampling, diversity sampling, or a combination) rather than individual samples, to amortize communication overhead. 3) **On-TPU Uncertainty Inference**: Perform the uncertainty estimation directly on the TPU for large pools of unlabeled data, leveraging its peak compute and memory bandwidth to quickly identify the most informative samples. 4) **Distributed Annotation Workflows**: Integrate with human-in-the-loop annotation platforms. 5) **Bias-Aware Selection**: Incorporate fairness metrics into selection criteria to prevent dataset bias.'
  common_mistake: |
    **The Pitfall:** Designing an active learning loop that becomes I/O bound.
    **The Rationale:** Treating the TPU just as a compute engine and ignoring the host-device bottleneck.
    **The Consequence:** Sending full, uncompressed data continuously, massively underutilizing the TPU's peak TFLOPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU v5e HBM = 16 GB.
    - Image size = 500 KB.
    - TPU Bandwidth = 819 GB/s.
    - Network link = 100 Gbps (12.5 GB/s).

    **Calculations:**
    - HBM capacity = 16 GB / 500 KB = 32,000 images.
    - Theoretical read throughput = 819 GB/s / 500 KB = 1.638 million images/s.
    - Network link throughput = 12.5 GB/s / 500 KB = 25,000 images/s.
    - HBM is ~65x faster than the network.

    **Conclusion & Interpretation:**
    - **Result: HBM is 65x faster than network (I/O-Bound)**. Batch querying directly from local memory is strictly required to avoid I/O bottlenecks.
