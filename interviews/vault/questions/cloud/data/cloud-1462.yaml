title: 'Diagnosing Silent Accuracy Drops using KL Divergence'
scenario: 'Your cloud-based recommendation model serves 10,000 requests/sec from a cluster of GPUs. Recently, the CTR dropped by 15% silently, with no system alerts firing. You compute the KL Divergence between the training embedding distribution (Q) and the production embedding distribution (P) for user features over a 1-hour window. The KL divergence spiked from its historical average of 0.05 nats to 1.2 nats.'
question: 'What does the spike in KL(Production||Training) to 1.2 nats imply, and how would you diagnose the CTR drop?'
details:
  realistic_solution: 'Analyze the direction of the KL divergence. A massive spike in KL(Production || Training) indicates the emergence of out-of-vocabulary (OOV) categorical features or new user segments in production that were absent or smoothed to near-zero probability in training data. Even 5 such OOV features appearing at 2% frequency can contribute >1.0 nats to the KL divergence. Root cause this by decomposing the KL into per-feature contributions and trace back to the upstream data pipeline for schema or mapping changes.'
  common_mistake: |
    **The Pitfall:** Assuming KL divergence is symmetric or that it directly correlates with overall feature importance.
    **The Rationale:** Candidates forget that KL(P||Q) heavily penalizes regions where P has mass but Q assigns near-zero probability—exactly the out-of-vocabulary scenario.
    **The Consequence:** Searching for subtle distribution shifts in continuous features while missing a massive categorical feature ingestion bug upstream.
  napkin_math: |
    **Assumptions & Constraints:**
    - Historical KL Divergence: 0.05 nats.
    - Spiked KL Divergence: 1.2 nats.
    - KL(P||Q) = sum(P(x) * log(P(x)/Q(x))).

    **Calculations:**
    - Let P(x) = 0.02 (a new out-of-vocabulary feature occurring 2% of the time).
    - Let Q(x) = 1e-6 (smoothed near-zero probability in training).
    - Penalty for one OOV feature: 0.02 * log(0.02 / 1e-6) =~ 0.02 * 9.9 =~ 0.198 nats.
    - Total OOV features needed for 1.0 nat spike: 1.0 / 0.198 =~ 5 features.

    **Conclusion & Interpretation:**
    - **Result: Data-Distribution Bound**. Just 5 categorical features missing from training but appearing at 2% frequency in production will spike KL > 1.0 nats, indicating a severe upstream data ingestion bug.
