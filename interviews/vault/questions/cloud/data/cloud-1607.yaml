title: Mitigating PII Memorization in Clinical LLMs
scenario: 'You are training a 7B parameter clinical LLM from scratch on 500B tokens of raw medical records using a large GPU cluster. The security and compliance teams mandate that the resulting model must not regurgitate patient PII under targeted prompt injection attacks.'
question: How would you evaluate three distinct mitigations (aggressive corpus deduplication/scrubbing, Differential Privacy training (DP-SGD), and post-training RLHF refusal guardrails) and justify your primary architectural choice quantitatively based on compute budget, utility degradation, and verifiable privacy guarantees?
details:
  realistic_solution: 'Prioritize aggressive n-gram deduplication and strict PII scrubbing (NER/regex) on the pre-training corpus. Deduplication prevents the frequency-based over-indexing that drives memorization. Avoid DP-SGD for base pre-training due to its high compute multiplier and utility drop. RLHF should only be applied as a secondary defense layer.'
  common_mistake: |
    **The Pitfall:** Assuming post-training RLHF or DP-SGD for base training are optimal.
    **The Rationale:** Practitioners rely on RLHF for alignment or theoretical privacy of DP-SGD without calculating scale overhead.
    **The Consequence:** Unacceptable compute multipliers and severe utility degradation at the 7B scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B params, 500B tokens.
    - 256 H100s (~4e14 FLOPS effective each).
    
    **Calculations:**
    - Standard FLOPs: 6 * 7e9 * 5e11 = 2.1e22 FLOPs.
    - Standard time: 2.1e22 / (256 * 4e14) ≈ 2.4 days.
    - DP-SGD overhead: 3-4x compute multiplier -> ~10 days.
    
    **Conclusion & Interpretation:**
    - **Result: ~10 days (Compute-Bound)**. DP-SGD compute overhead and utility drop are prohibitive for base pre-training.
