title: Diagnosing GPU Starvation in Vision Training
scenario: You are training a ResNet-50 variant on a cloud instance with 8 GPUs. The training script processes batches of high-resolution medical images. To keep the GPUs at >90% utilization, the node must ingest 2,000 images/sec. The dataset is stored in a cloud object store, and the compute instance has a 50 Gbps network bandwidth limit. Despite optimizing the PyTorch DataLoader with maximum CPU workers, pinned memory, and prefetching, GPU utilization averages only 40%.
question: Why are the GPUs averaging only 40% utilization despite DataLoader tuning, and what I/O change is needed?
details:
  realistic_solution: Identify that the instance's network bandwidth is the hard bottleneck. Implement a high-performance local NVMe caching tier or distributed file system (like FSx for Lustre), or upgrade to a 100+ Gbps instance to meet the 8 GB/s ingestion requirement.
  common_mistake: |
    **The Pitfall:** Blaming CPU-side data augmentation bottlenecks, python GIL, or DataLoader thread contention.
    **The Rationale:** Candidates focus on software-level DataLoader tuning instead of calculating the raw network I/O constraints of the compute instance.
    **The Consequence:** Wasting time tuning software when the physical network link is fundamentally incapable of supplying the required data rate.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 4 MB.
    - Target ingestion rate: 2,000 images/sec.
    - Instance network limit: 50 Gbps.

    **Calculations:**
    - Required Bandwidth: 2,000 images/sec × 4 MB = 8,000 MB/s (8.0 GB/s).
    - Available Bandwidth: 50 Gbps / 8 bits/byte = 6.25 GB/s.
    - Deficit: 8.0 GB/s > 6.25 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Network-Bandwidth-Bound**. The instance's 50 Gbps physical network link strictly limits throughput, capping GPU utilization below 80%.
