title: Evaluating Ingestion Schema Validation for High-Throughput Streams
scenario: An ad-tech ML pipeline ingests 500,000 JSON bid requests per second (avg 2KB/request). Downstream ML models require 50 specific features. Currently, unexpected categorical strings cause embedding lookup failures, crashing the feature engineering pipeline.
question: How would you split schema validation between the edge API gateway and stream processor for 500,000 JSON bid requests/sec?
details:
  realistic_solution: |
    Keep the edge API compatible with JSON and run only lightweight checks there: valid JSON, size limits, required envelope fields, authentication, and obvious type checks needed to reject malformed traffic cheaply. Push the full 50-feature schema checks, categorical allowlists, range checks, and feature compatibility rules into the stream processor, where records can be validated in parallel and bad payloads routed to a DLQ or quarantine topic without crashing feature engineering.
  common_mistake: |
    **The Pitfall:** Enforcing strict, synchronous JSON validation at the API gateway.
    **The Rationale:** Engineers instinctively try to catch errors as early as possible at the edge to protect downstream systems.
    **The Consequence:** Full JSON schema validation at this scale requires massive CPU overhead, drastically increasing edge latency and infrastructure costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 500,000 RPS. Payload: 2KB.
    - Full JSON schema and semantic validation at the edge: ~1ms per payload.
    - Lightweight edge parsing/envelope checks: ~0.05ms per payload.

    **Calculations:**
    - Full synchronous edge validation: 500,000 RPS * 0.001s = 500 CPU cores fully saturated.
    - Lightweight edge checks: 500,000 RPS * 0.00005s = 25 CPU cores.
    - Stream validation can be horizontally scaled and can emit invalid records to a DLQ instead of failing the online ingress path.

    **Conclusion & Interpretation:**
    - **Result: keep deep validation off the edge hot path (Compute-Bound)**. The split preserves JSON compatibility while reducing edge CPU by about 20x versus full synchronous validation.
