title: Evaluating Ingestion Schema Validation for High-Throughput Streams
scenario: 'An ad-tech ML pipeline ingests 500,000 JSON bid requests per second (avg 2KB/request). Downstream ML models require 50 specific features. Currently, unexpected categorical strings cause embedding lookup failures, crashing the feature engineering pipeline.'
question: 'How would you split schema validation between the edge API gateway and stream processor for 500,000 JSON bid requests/sec?'
details:
  realistic_solution: 'Perform strict structural validation via binary serialization (e.g., Protobuf or Avro) directly at the edge API gateway, which inherently enforces schema with minimal CPU footprint. Then, perform deeper semantic validation (e.g., categorical bounds checking) asynchronously within the stream processor, routing invalid payloads to a Dead Letter Queue (DLQ) to prevent pipeline crashes.'
  common_mistake: |
    **The Pitfall:** Enforcing strict, synchronous JSON validation at the API gateway.
    **The Rationale:** Engineers instinctively try to catch errors as early as possible at the edge to protect downstream systems.
    **The Consequence:** Full JSON schema validation at this scale requires massive CPU overhead, drastically increasing edge latency and infrastructure costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Load: 500,000 RPS. Payload: 2KB.
    - JSON validation CPU time: ~1ms per payload.
    - Binary parsing (Protobuf/Avro) CPU time: ~100ns per payload.

    **Calculations:**
    - JSON edge CPU load: 500,000 RPS * 0.001s = 500 CPU cores fully saturated.
    - Binary edge CPU load: 500,000 RPS * 0.0000001s = 0.05 CPU cores.

    **Conclusion & Interpretation:**
    - **Result: 0.05 CPU cores vs 500 CPU cores (Compute-Bound)**. Transitioning to binary serialization reduces edge compute required for structural validation by 99.9%.
