title: Local NVMe Caching for Multi-Epoch Training
scenario: 'Your team is training a computer vision model on a 15TB dataset stored in S3 across a cluster of 8 compute nodes. Each node has 4x A100 GPUs that collectively require 4 GB/s of sustained read throughput to prevent starvation. The nodes have a 100 Gbps network interface and 4x 4TB local NVMe drives. During the 100-epoch training run, direct S3 streaming causes frequent GPU idle time due to network jitter and incurs high GET API costs.'
question: Should you use node-local NVMe warm caching, a Redis-style distributed cache, or Lustre for the 15TB S3 vision dataset, and why?
details:
  realistic_solution: 'Utilize the 16TB of local NVMe storage on each node as a warm cache. Implement a cache-on-first-read policy during epoch 1 (reading from S3). Epochs 2-100 will read entirely from local NVMe, which delivers >10 GB/s aggregate read throughput — easily exceeding the 4 GB/s GPU consumption rate. This eliminates S3 API costs ($60/epoch * 99 saved epochs = $5,940 saved), removes network jitter as a GPU stall source, and requires zero additional infrastructure.'
  common_mistake: 'Recommending an expensive in-memory distributed cache cluster or Lustre deployment, ignoring that local NVMe read bandwidth (>10 GB/s) already far exceeds the GPU consumption rate (4 GB/s) and the dataset fits within the available 16TB local storage.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 15TB (~150M files).
    - Storage: 4x 4TB NVMe per node (16TB total, >10 GB/s read).
    - GPU throughput requirement: 4 GB/s.
    - S3 API Cost: ~$60/epoch.
    
    **Calculations:**
    - Local NVMe capacity: 16TB > 15TB dataset (Fits entirely in warm cache).
    - Read bandwidth margin: >10 GB/s available > 4 GB/s required (No starvation).
    - Direct S3 cost (100 epochs): $60 * 100 = $6,000.
    - Cached S3 cost (1 epoch fetch): $60 * 1 = $60.
    - Savings: $6,000 - $60 = $5,940.
    
    **Conclusion & Interpretation:**
    - **Result: $5,940 Saved (I/O-Bandwidth Bound)**. The node-local NVMe capacity and bandwidth comfortably exceed the requirements, making expensive distributed caches or parallel file systems unnecessary.
