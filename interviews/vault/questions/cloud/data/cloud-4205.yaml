title: Feature Store Infrastructure Cost Optimization
scenario: 'Your organization spends $120K/month on feature store infrastructure: $40K on Redis (online), $50K on Spark (batch), and $30K on S3 (offline). You must cut costs by 40% without increasing serving latency. You evaluate replacing Redis with DynamoDB, moving Spark to spot instances, and pruning unused features.'
question: How would you compare DynamoDB, spot Spark, and feature pruning to cut the $120K/month feature store spend by 40% without increasing latency?
details:
  realistic_solution: 'Evaluate each option against both cost and serving latency. (1) DynamoDB: if the online workload is 550K 4KB reads/s and each request maps to a billed read, on-demand pricing at $0.25 per 1M strong reads is 550K × 2.592M seconds/month / 1M × $0.25 = ~$356K/month. Even if batching or eventually consistent reads reduce that, it must be benchmarked against the p99 latency target; do not replace Redis blindly. (2) Spot Spark: batch jobs tolerate interruption with checkpointing, so moving Spark workers to spot can save about 60% of eligible Spark spend. (3) Feature pruning: removing unused features reduces Spark, S3, and some Redis memory. Apply pruning first, then spot only to the remaining Spark spend to avoid double-counting. Pruning saves $30K, remaining Spark is $35K, spot saves $21K, total savings are $51K/month or 42.5%, meeting the 40% target without increasing online latency.'
  common_mistake: |
    **The Pitfall:** Choosing only one approach and trying to optimize it to the limit.
    **The Rationale:** Engineers often look for a single "silver bullet" infrastructure switch to solve cost problems.
    **The Consequence:** Failing to hit the 40% savings target, because aggressive single-axis optimization usually introduces unacceptable latency or stability trade-offs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline costs: Redis ($40K), Spark ($50K), S3 ($30K). Total: $120K.
    - Target: 40% cost reduction = $48K/month savings.
    - Feature pruning removes 30% of Spark work, 30% of S3 storage, and 15% of Redis memory.
    - Spot discount is 60%, applied only after pruning to avoid double-counting the same Spark dollars.
    - DynamoDB comparison assumes 550K 4KB online reads/s billed at $0.25 per 1M strong reads.

    **Calculations:**
    - DynamoDB on-demand read cost: 550K * 2,592,000 sec/month / 1,000,000 * $0.25 = ~$356K/month, before writes/storage.
    - Feature pruning savings: 0.30 * $50K + 0.30 * $30K + 0.15 * $40K = $15K + $9K + $6K = $30K.
    - Remaining Spark spend after pruning: $50K - $15K = $35K.
    - Spot savings on remaining Spark: $35K * 0.60 = $21K.
    - Combined savings without double-counting: $30K + $21K = $51K/month.

    **Conclusion & Interpretation:**
    - **Result: $51K/month savings, or 42.5% of $120K.** Keep Redis for latency, prune unused features, and move eligible batch Spark workers to spot with checkpointing.
