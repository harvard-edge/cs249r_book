title: The Training Pipeline Observability Gap
scenario: A training job that normally takes 24 hours has been running for 40 hours and loss is still decreasing slowly. The engineer is unsure whether to kill it or let it continue. There are no intermediate evaluation checkpoints — just the training loss curve.
question: What instrumentation should have been in place, and how would you make the kill-vs-continue decision with only the training loss curve?
details:
  realistic_solution: 'The missing instrumentation: (1) periodic validation loss or eval checkpoints to detect generalization regressions, (2) learning-rate schedule visualization to verify optimizer phase, (3) gradient norm tracking to detect instability, and (4) GPU utilization plus throughput to detect hardware degradation or data stalls. With only the training loss curve, you cannot directly diagnose overfitting. Make the kill-vs-continue decision from trend evidence: compare the current loss and slope to historical successful runs, estimate the marginal improvement per extra hour, and continue only if that slope is still large enough to justify the $24/hour marginal cost and the run is following a known convergence pattern. Kill or pause if the loss has effectively plateaued, the slope is far worse than historical runs at the same step count, or the curve shows discontinuities suggesting a data or training bug.'
  common_mistake: |
    **The Pitfall:** Waiting indefinitely because "loss is still decreasing."
    **The Rationale:** Candidates conflate training loss with generalization capability.
    **The Consequence:** Wasting hundreds of dollars on compute while the model aggressively overfits, resulting in a useless production artifact.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expected runtime: 24 hours.
    - Current runtime: 40 hours.
    - Hardware: 8 GPUs at $3/GPU-hr.
    - Only the training loss curve is available; validation/generalization cannot be inferred directly.

    **Calculations:**
    - Expected cost: 24h * 8 * $3 = $576.
    - Current cost: 40h * 8 * $3 = $960.
    - Marginal cost per hour: 8 * $3 = $24/hr.
    - Extra cost already incurred: (40h - 24h) * $24/hr = $384.
    - Continue only if the observed training-loss improvement expected over the next hour is worth at least $24 and matches historical convergence behavior.
    - If the slope is near zero or abnormal versus prior successful runs, the rational move is to stop or checkpoint and investigate before spending more.

    **Conclusion & Interpretation:**
    - **Result: Marginal-Value-Bound**. Without validation loss, the decision is not "is it overfitting" but whether the training-loss slope justifies another $24/hour of compute under historical convergence expectations.
