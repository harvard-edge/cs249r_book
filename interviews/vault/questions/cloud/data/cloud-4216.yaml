title: Columnar vs Row Format for Feature Tables
scenario: A tabular dataset has 500 columns and 100M rows (200 GB uncompressed). Your training pipeline only uses 20 columns.
question: How much I/O does a columnar format save versus a row format, and what enables this savings?
details:
  realistic_solution: 'Columnar formats like Parquet store data by column rather than by row. This enables column pruning: when the training job needs 20 of 500 columns, the reader can load only those column chunks instead of reading full rows. Compression techniques such as dictionary encoding and RLE can further reduce bytes read, but the primary I/O-saving mechanism is the physical columnar layout plus projection pushdown. The exact savings depend on column sizes, compression, row-group metadata, and storage layout; it is a rough byte-read reduction, not a guaranteed runtime speedup.'
  common_mistake: |
    **The Pitfall:** Assuming the savings is exactly the ratio of columns used (20/500 = 96%).
    **The Rationale:** Candidates accurately understand column pruning but completely ignore the drastic differences in compression ratios between columnar and row formats.
    **The Consequence:** They underestimate the true I/O savings, missing the multiplicative effect of highly efficient dictionary encoding on adjacent columnar data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 GB uncompressed dataset (500 cols).
    - Pipeline uses 20 columns.
    - Row format compression: ~3x.
    - Column format compression: ~5x.

    **Calculations:**
    - Column fraction used: 20 / 500 = 4% of columns.
    - If columns are similarly sized, column pruning reduces raw bytes from 200 GB to about 200 GB * 4% = 8 GB before compression.
    - A row format generally must read and decompress substantially more of each row to access the 20 columns, so it cannot assume the same 96% physical skip.
    - Compression can further reduce bytes, but the exact ratio is data-dependent and should not be treated as a guaranteed runtime multiplier.

    **Conclusion & Interpretation:**
    - **Result: large byte-read reduction, not a fixed speedup.** Columnar layout plus column pruning is the core savings mechanism; dictionary/RLE compression is an additional benefit.
