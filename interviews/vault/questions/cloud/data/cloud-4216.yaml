title: Columnar vs Row Format for Feature Tables
scenario: 'A tabular dataset has 500 columns and 100M rows (200 GB uncompressed). Your training pipeline only uses 20 columns.'
question: 'How much I/O does a columnar format save versus a row format, and what enables this savings?'
details:
  realistic_solution: 'Columnar formats like Parquet store data sequentially by column rather than by row. This enables Column Pruning: the I/O reader strictly bypasses the 480 unused columns on disk, skipping 96% of the raw data. Furthermore, adjacent data of the same type possesses extremely low entropy, allowing Parquet to leverage dictionary encoding and run-length encoding (RLE) to achieve far superior compression ratios (often 3-10x) compared to CSV/TFRecord.'
  common_mistake: |
    **The Pitfall:** Assuming the savings is exactly the ratio of columns used (20/500 = 96%).
    **The Rationale:** Candidates accurately understand column pruning but completely ignore the drastic differences in compression ratios between columnar and row formats.
    **The Consequence:** They underestimate the true I/O savings, missing the multiplicative effect of highly efficient dictionary encoding on adjacent columnar data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 200 GB uncompressed dataset (500 cols).
    - Pipeline uses 20 columns.
    - Row format compression: ~3x.
    - Column format compression: ~5x.

    **Calculations:**
    - Row format (CSV): Must read all 200 GB. Compressed = 200 / 3 = ~67 GB I/O.
    - Column format (Parquet): Reads 20/500 cols = 8 GB raw. Compressed = 8 / 5 = 1.6 GB I/O.
    - Speedup multiplier: 67 GB / 1.6 GB = 42x speedup.

    **Conclusion & Interpretation:**
    - **Result: 42x speedup (Disk-I/O-Bound)**. I/O-Bound mitigation yields a 42x speedup by combining column pruning with dictionary encoding.
