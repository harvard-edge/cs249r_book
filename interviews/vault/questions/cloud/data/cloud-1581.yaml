title: 'Diagnosing NVMe Cache Thrashing in CV Training'
scenario: 'A team is training a CV model on 256 A100 GPUs across 32 nodes. The 150TB dataset is in S3. They add 4TB of local NVMe storage per node as an LRU cache, but GPU utilization remains stuck at 30% and `iostat` shows 100% NVMe write utilization. The framework uses a true global random shuffle every epoch.'
question: 'Why did adding 4TB NVMe caches per node barely improve utilization, and what data access pattern should replace global random shuffling?'
details:
  realistic_solution: 'The global random shuffle causes severe cache thrashing. The team should implement deterministic node-level sharding (assigning a fixed subset of data to each node per epoch) and shuffle locally, or adopt a sequential streaming format like WebDataset to bypass local caching for single-epoch random reads.'
  common_mistake: |
    **The Pitfall:** Assuming that inserting a high-speed NVMe tier automatically mitigates object storage latency.
    **The Rationale:** Relying on standard caching heuristics without calculating the cache hit rate under a true uniform random distribution.
    **The Consequence:** Wasting money on NVMe hardware that just thrashes, while the GPUs remain starved for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - 150TB total dataset in S3.
    - 4TB local NVMe cache per node.
    - Global random shuffle applied every epoch.

    **Calculations:**
    - Cache hit probability: 4TB / 150TB = ~2.6%.
    - Cache miss rate: ~97.4%.
    - Every miss forces a fetch from S3 and an eviction/write on NVMe.

    **Conclusion & Interpretation:**
    - **Result: 97.4% miss rate (Storage-Bound)**. The uniform random access pattern guarantees massive cache misses, resulting in severe NVMe write thrashing and bottlenecking the GPU pipeline.
