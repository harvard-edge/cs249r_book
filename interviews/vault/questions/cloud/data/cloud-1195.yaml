title: Resource Exhaustion in ELT Feature Generation
scenario: A machine learning team has adopted an ELT architecture, loading 20 TB of raw, highly nested application telemetry data (JSON) daily directly into BigQuery's native JSON/VARIANT columns. They run complex SQL transformations to generate user embeddings and feature vectors directly in the warehouse. Recently, their daily feature generation DAG has started failing with "Resource Exceeded" errors during the transformation phase, despite slot limits being increased to 2000.
question: What is the root cause of the resource exhaustion, and how should the transformation pipeline be restructured to handle this scale?
details:
  realistic_solution: 'The root cause is the CPU and memory overhead of repeatedly parsing large nested JSON objects during complex joins and aggregations. Scanning 20TB of raw JSON to extract 5 fields requires full row evaluation. The solution is a multi-hop ELT (Medallion architecture): materialize the required fields into a columnar format, plausibly reducing the repeatedly scanned subset to about 2% of the original size (~400GB) if those fields are narrow and well-encoded. Subsequent analytical queries scan far less data and avoid repeated JSON parsing during multi-way joins.'
  common_mistake: |
    **The Pitfall:** Assuming the data warehouse can infinitely scale complex aggregations on nested JSON structures.
    **The Rationale:** Candidates try to fix the issue by throwing more compute slots at the problem rather than restructuring the data layout.
    **The Consequence:** Spiraling cloud compute costs and persistent pipeline failures due to memory exhaustion during multi-way joins.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total JSON volume: 20 TB.
    - Materialized columnar subset size: estimated at 2% of original (~400 GB) for the required fields.
    - Use a normalized scan-throughput model rather than assuming an exact GB/s per slot.

    **Calculations:**
    - Raw scan volume: 20 TB = ~20,000 GB of nested JSON, plus repeated parse CPU and intermediate memory pressure.
    - Materialized scan volume: 20 TB * 2% = 0.4 TB = ~400 GB.
    - Scan-volume reduction: 20,000 GB / 400 GB = 50x.

    **Conclusion & Interpretation:**
    - **Result: 50x less data scanned for the feature subset.** Materialized columnar tables reduce parse CPU, shuffle width, and join memory pressure; the exact wall-clock speedup depends on query shape and warehouse execution.
