title: Resource Exhaustion in ELT Feature Generation
scenario: 'A machine learning team has adopted an ELT architecture, loading 20 TB of raw, highly nested application telemetry data (JSON) daily directly into BigQuery''s native JSON/VARIANT columns. They run complex SQL transformations to generate user embeddings and feature vectors directly in the warehouse. Recently, their daily feature generation DAG has started failing with "Resource Exceeded" errors during the transformation phase, despite slot limits being increased to 2000.'
question: 'What is the root cause of the resource exhaustion, and how should the transformation pipeline be restructured to handle this scale?'
details:
  realistic_solution: 'The root cause is the CPU and memory overhead of repeatedly parsing large nested JSON objects during complex joins and aggregations. Scanning 20TB of raw JSON to extract 5 fields requires full row evaluation. The solution is a multi-hop ELT (Medallion architecture): materialize the 5 required fields into a columnar format where they represent just 2% of the original size (~400GB). Subsequent analytical queries scan 400GB instead of 20TB, eliminating memory exhaustion during multi-way joins.'
  common_mistake: |
    **The Pitfall:** Assuming the data warehouse can infinitely scale complex aggregations on nested JSON structures.
    **The Rationale:** Candidates try to fix the issue by throwing more compute slots at the problem rather than restructuring the data layout.
    **The Consequence:** Spiraling cloud compute costs and persistent pipeline failures due to memory exhaustion during multi-way joins.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total JSON volume: 20 TB. Processing slots: 2000 (~20 GB/s).
    - Materialized columnar subset size: 2% of original (~400 GB).

    **Calculations:**
    - Scanning 20 TB JSON: 20,000 GB / 20 GB/s = 1000s slot time.
    - Scanning 400 GB columns: 400 GB / 20 GB/s = 20s slot time.

    **Conclusion & Interpretation:**
    - **Result: Memory/CPU Exhaustion Avoided**. Materialized columnar formats eliminate memory exhaustion and speed up joins by 50x.
