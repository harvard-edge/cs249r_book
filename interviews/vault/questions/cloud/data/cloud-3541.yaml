title: Optimizing Active Learning Dataset Curation on NVIDIA H100s
scenario: Your team is tasked with rapidly curating a large-scale dataset for an autonomous driving perception model using active learning. The active learning model running on a single GPU can process 500 images per second to determine uncertainty scores. You have a pool of 100 annotators, each working 8 hours a day. An average image annotation takes 30 seconds. Inter-annotator agreement (IAA) targets result in 20% of all annotated samples requiring a re-annotation, consuming an additional 15 seconds per re-annotated image. You have allocated a maximum of 10 GPUs for the inference component.
question: "With 10 GPUs, 100 annotators, and a 20% re-annotation rate, where is the bottleneck and how would you maximize labeled-image throughput?"
details:
  realistic_solution: 'A realistic solution would involve optimizing the annotation workflow, establishing clear guidelines, continuous annotator training, and a robust arbitration system to reduce the re-annotation rate. Human annotation is the obvious primary bottleneck.'
  common_mistake: |
    **The Pitfall:** Neglecting the cumulative cost of re-annotation/arbitration on overall throughput.
    **The Rationale:** Candidates focus only on base annotation times and GPU specs, overlooking real-world human operational bottlenecks.
    **The Consequence:** The throughput projections are overly optimistic and misaligned with actual delivery schedules.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100 annotators, 8 hours/day (3600 seconds/hour).
       - Base annotation: 30s. Re-annotation: 15s (20% rate).
       - GPU capacity: 10 GPUs × 500 images/sec.
    2. **Calculations:**
       - Total annotator seconds/day: 100 × 8 × 3600 = 2,880,000 seconds/day.
       - Effective time per image: 30s + (0.20 × 15s) = 33s.
       - Human throughput: 2,880,000 / 33 ≈ 87,272 images/day.
       - GPU throughput: 10 × 500 × 3600 × 8 = 144,000,000 images/day.
    3. **Conclusion & Interpretation:** **Human annotation caps at ~87K images/day, which is drastically slower than the 144M GPU capacity. Result: Human-I/O-Bound.**
