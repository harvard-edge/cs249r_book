title: Diagnosing Stale Features in Real-time H100 Model Deployment
scenario: 'A real-time bidding model is deployed on a cluster of GPUs. The model requires ultra-low latency features from an online feature store. The bid acceptance rate has dropped by 15%. Initial investigations show GPUs are only hitting 40% utilization, and model inference times are well within the millisecond budget. However, predictions reveal that the features used are frequently 3-5 minutes old, despite feature pipelines reporting successful runs and feature store dashboards appearing green.'
question: 'How would you diagnose the root cause of these stale features impacting the real-time model given GPU under-utilization and a healthy feature store?'
details:
  realistic_solution: 'The diagnosis should involve instrumenting and monitoring feature lineage from source to model input. This includes: 1. Verifying the actual timestamp of features *at the point of consumption* by the H100 inference service, not just within the feature store. 2. Investigating client-side caching (e.g., Redis, in-memory caches) at the inference service that might be serving stale data. 3. Examining the feature fetching logic for batching or aggregation delays. 4. Checking for network latency issues between the feature store and the H100 cluster that might delay feature arrival, even if the feature store itself is fresh. 5. Comparing the feature store''s ''freshness'' metric definition against the actual ''point-in-time correctness'' required by the model. 6. Ensuring proper garbage collection/eviction policies in any intermediate caches.'
  common_mistake: |
    **The Pitfall:** Blaming the model, hardware, or feature store infrastructure without checking end-to-end data lineage.
    **The Rationale:** When a system degrades, engineers look at the biggest components (GPUs, database clusters) and assume if their top-level health metrics are green, the problem must be elsewhere.
    **The Consequence:** They overlook intermediate caching layers or client-side fetch logic, allowing silently stale data to severely degrade model performance and business revenue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Feature propagation latency is 180,000ms.
    - Critical decision window is 100ms.
    - System handles 10,000 QPS, fetching 100 features per query at 1KB per feature.
    - GPU memory bandwidth is 3.35 TB/s.

    **Calculations:**
    - Data rate: 10,000 QPS * 100 features * 1KB = 1 GB/s feature data.
    - 1 GB/s << 3.35 TB/s memory bandwidth.

    **Conclusion & Interpretation:**
    - **Result: Data-Delivery Bound** (Bottleneck is network/caching latency, not raw bandwidth or compute).
