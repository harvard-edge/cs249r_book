title: Evaluating ELT Architecture for ML Feature Agility
scenario: Your team ingests 50TB of raw telemetry data daily. An ETL pipeline uses a 100-node Spark cluster to pre-process data, dropping 60% of raw fields. ML engineers frequently request historical access to dropped fields, requiring expensive 6-month backfills.
question: Should you transition to ELT for 50TB/day raw telemetry, and what are the cost/flexibility trade-offs?
details:
  realistic_solution: |
    Implement ELT by retaining raw compressed data in S3 and using a distributed query engine (e.g., Databricks SQL) to transform data on demand. This decouples storage from compute and enables immediate historical experimentation. The trade-off is not storage-only cost: ELT replaces always-on ETL compute with cheaper raw retention plus query and transform compute when teams actually need derived features or backfills.
  common_mistake: |
    **The Pitfall:** Assuming ELT is strictly more expensive due to retaining 100% of raw data.
    **The Rationale:** Candidates hyper-focus on ballooning S3 storage costs without calculating compute savings.
    **The Consequence:** Clinging to an inflexible pipeline, ignoring savings from removing always-on clusters and backfill engineering cycles.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 nodes at $0.768/hr.
    - 50TB/day S3 storage at $23/TB/mo.
    - Compare monthly costs on the same time basis; ELT still has on-demand transform/query compute.

    **Calculations:**
    - Current ETL compute: 100 * $0.768/hr * 24 hr/day = $1,843/day.
    - Monthly ETL compute: $1,843/day * 30 days = ~$55.3k/mo.
    - One day's retained raw data: 50 TB * $23/TB-mo = $1,150/mo for that 50 TB slice.
    - Longer retention scales with retained volume, while transform cost is paid when queries/backfills run rather than by a fixed always-on ETL cluster.

    **Conclusion & Interpretation:**
    - **Result: ROI and agility trade-off.** ELT shifts spend from ~$55.3k/mo of always-on ETL compute to raw storage plus on-demand query/transform compute. It improves flexibility for historical fields, but the final ROI depends on retention period, compression, and query volume.
