title: Migrating Microservice Features to a Centralized Feature Store
scenario: Your company's ML features are scattered across 15 microservices, each computing features in application code at serving time. This causes inconsistent feature definitions (3 services compute 'user_age' differently), no feature reuse, and 200ms+ latency from cascading service calls. You're tasked with migrating to a centralized feature store serving 50 models.
question: How do you execute this migration without disrupting production?
details:
  realistic_solution: 'Strangler fig pattern applied to feature infrastructure. Phase 1 (weeks 1-4): Deploy feature store infrastructure (Feast + Redis + S3) alongside existing services. Identify the top 5 highest-value features used by the most models. Implement shadow mode — feature store computes and logs values but doesn''t serve. Validate against existing service outputs. Phase 2 (weeks 5-12): Migrate 5 features to live serving. Each model team adds a feature store client alongside their existing code, with a feature flag to switch between sources. Run A/B: old path vs feature store path. Phase 3 (weeks 13-26): Scale to 50 features, then 200, then full catalog. Decommission service-computed features only after all consumers migrate. Phase 4 (ongoing): Enforce governance — new features must go through the feature store. Canonical definitions prevent the ''user_age computed 3 ways'' problem.'
  common_mistake: |
    **The Pitfall:** A big-bang migration approach.
    **The Rationale:** Engineers often want to build the entire feature store and switch all 50 models at once to avoid maintaining dual systems.
    **The Consequence:** High risk, months of delay before delivering any value, and catastrophic systemic failure if a bug affects all models simultaneously.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current feature path already has measured 200ms+ latency from cascading service calls.
    - A centralized online feature fetch should use one or a small number of Redis/MGET calls, typically single-digit milliseconds after features are materialized.
    - Migration must keep old and new paths running until shadow comparisons and A/B checks pass.

    **Calculations:**
    - Current path: 15 service-owned feature definitions create many network boundaries and inconsistent semantics.
    - Target path for migrated features: precompute once, store canonical values, and serve through one feature-store client call per request.
    - Latency target is not derived from 15 * service latency; it must be verified per migrated feature group with shadow reads.
    - Migration order should prioritize features used by many models or causing the largest latency/skew problems, then expand in batches.

    **Conclusion & Interpretation:**
    - **Result: Incremental migration, not big-bang replacement.** Shadow mode, feature flags, parity checks, and staged rollout reduce production risk while converging on centralized definitions and lower serving latency.
