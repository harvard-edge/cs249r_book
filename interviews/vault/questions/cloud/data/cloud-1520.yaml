title: Delay Scheduling Break-even Calculation
scenario: A batch scheduler handles a CV training job requiring a 500GB dataset. The cluster uses a 10 Gbps Ethernet fabric (1.25 GB/s). Compute nodes have local NVMe SSDs capable of 5 GB/s sequential reads. A node with the dataset already cached on its NVMe is busy but will free up in T seconds. All other idle nodes have cold caches.
question: What is the maximum wait time T (in seconds) the scheduler should tolerate before falling back to scheduling the job on an idle node and pulling the dataset over the network?
details:
  realistic_solution: The optimal scheduling decision compares the total time-to-start for both options. You must calculate the time to pull the dataset over the network and subtract the time to read from the local NVMe cache to find the break-even wait time.
  common_mistake: |
    **The Pitfall:** Ignoring the local read time from NVMe.
    **The Rationale:** Engineers assume that if data is "cached" locally, it is instantly available in memory.
    **The Consequence:** Miscalculating the break-even point by equating the max wait time to the full network transfer time, causing suboptimal scheduling and pipeline delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset size: 500 GB.
    - Network fabric bandwidth: 10 Gbps (1.25 GB/s).
    - Local NVMe SSD read bandwidth: 5 GB/s.

    **Calculations:**
    - Network Pull Time: 500 GB / 1.25 GB/s = 400 seconds.
    - Local NVMe Read Time: 500 GB / 5.0 GB/s = 100 seconds.
    - Break-even Wait Time (T): 400s - 100s = 300 seconds.

    **Conclusion & Interpretation:**
    - **Result: 300 seconds (Time-Optimized)**. If the cached node frees up in under 300 seconds, wait for it; otherwise, schedule on a cold node.
