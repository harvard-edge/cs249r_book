title: LLM Data Ingestion with Sequential Streaming Formats
scenario: You are designing the data ingestion pipeline for training a 70B parameter LLM on a 1024-GPU cluster. Your current pipeline uses 100 million individually compressed JSON files stored in Amazon S3, totaling 10TB of text data. During a test run, GPU utilization hovers at 20% because data loading workers are bottlenecked.
question: "How do the metadata overhead and throughput differ between fetching 100M individual 100KB JSON files versus streaming 10,000 sequential 1GB shards?"
details:
  realistic_solution: Repackaging the 100 million JSON files into 10,000 1GB sequentially readable shards eliminates per-file GET request latency and maximizes streaming bandwidth for ML workloads.
  common_mistake: |
    **The Pitfall:** Assuming network bandwidth is the bottleneck and upgrading networking hardware.
    **The Rationale:** When data loading is slow, engineers intuitively blame the pipe width rather than the protocol overhead.
    **The Consequence:** Hardware upgrades fail to improve throughput, as the system is bound by small-file metadata lookups and Time-To-First-Byte (TTFB) overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current state: 100 million JSON files (100KB each).
       - Proposed state: 10,000 shards (1GB each).
       - S3 TTFB (Time-To-First-Byte): 50ms.
    2. **Calculations:**
       - Individual files latency: 100,000,000 GETs * 50ms = 5,000,000 seconds penalty.
       - Sharded files latency: 10,000 GETs * 50ms = 500 seconds penalty.
       - Sequential throughput: 1GB sequential reads can saturate a 100Gbps NIC at ~10 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Metadata-Bound Ingestion.** The system is bound by small-file metadata lookups and TTFB. Repackaging into 1GB sequential shards eliminates 99.99% of the request overhead, maximizing streaming bandwidth.
