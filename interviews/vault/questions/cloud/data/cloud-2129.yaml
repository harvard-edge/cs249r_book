title: The Training-Serving Skew Trap
scenario: During training, your feature pipeline computes 'user_avg_session_duration' using a Spark batch job that runs nightly. At serving time, the same feature is computed in real time from the last 24 hours of clickstream data. After deployment, the model's conversion rate drops 8%.
question: What is the most likely cause of the conversion rate drop?
details:
  realistic_solution: 'Diagnose Training-Serving Skew. The batch Spark job and the real-time computation use different time windows and aggregation logic, creating a systematic bias. Fix by unifying the feature engineering logic across train and serve.'
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or hyperparameters.
    **The Rationale:** Engineers assume the model didn't learn properly, failing to realize the input data distribution has subtly changed.
    **The Consequence:** Wasted time tuning the model when the features it sees at serving time are subtly different from what it saw during training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Feature values shift 10% between batch (midnight-to-midnight) and real-time (rolling 24h).
    - Model feature importance weight for 'user_avg_session_duration' is 0.8.

    **Calculations:**
    - Impact on logit = 10% shift * 0.8 weight = 8% divergence in prediction probability.

    **Conclusion & Interpretation:**
    - **Result: 8% drop in conversion rate (Training-Serving-Skew-Bound)**. The model suffers from degradation.
