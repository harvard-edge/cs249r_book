title: Small File Metadata Overhead in Object Storage
scenario: Your team is training a vision model on a cloud GPU cluster using a dataset of 10 million 50KB images stored individually in a cloud object storage bucket. The training pipeline is heavily IO-bound. The EC2 instance has a 25 Gbps network interface, but the object storage has an average metadata latency of 20ms per GET request.
question: What throughput limit does 20ms per-file S3 latency impose, and how should you restructure the 10M-image dataset to fix it?
details:
  realistic_solution: 'Consolidate the small image files into larger sequential formats (like TFRecords, Parquet, or WebDataset tar archives) sized around 100MB to 1GB each. This amortizes the 20ms metadata overhead across thousands of images, allowing the pipeline to utilize the full network bandwidth.'
  common_mistake: |
    **The Pitfall:** Calculating theoretical throughput based solely on the 25 Gbps network bandwidth.
    **The Rationale:** Ignoring the per-file metadata latency and assuming object storage behaves like a local block device.
    **The Consequence:** The system becomes IOPS-bound rather than bandwidth-bound, severely starving the GPUs during training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network BW: 25 Gbps (3.125 GB/s).
    - Transfer per image: 50KB. Metadata latency: 20ms (0.02s).

    **Calculations:**
    - Transfer time = 50KB / 3.125 GB/s = 0.016ms.
    - Total latency per image = 20ms + 0.016ms = ~20ms.
    - Single thread throughput = 1 / 0.02s = 50 images/sec.

    **Conclusion & Interpretation:**
    - **Result: 50 images/sec (I/O-Bound)**. Metadata latency dominates >99.9% of I/O time; images must be consolidated into large archives to achieve full bandwidth.
