title: Diagnosing Covariate Shift in Fraud Detection
scenario: 'A cloud-hosted XGBoost fraud detection model processing 2,500 TPS experiences a sudden precision drop from 94% to 81% following a marketing campaign that attracted a new demographic. The ops team assumes the fundamental patterns of fraud have changed (concept drift) and plans to delay action for 4 weeks to collect 500,000 new labeled examples for an architectural rewrite. However, you notice the relationship P(fraud|features) is unchanged, but feature distributions have shifted drastically (e.g., the core ''transaction_amount'' bin shifted from 50% expected to 10% actual).'
question: Is the fraud model suffering concept drift or covariate shift, and how would you diagnose and adapt without waiting 4 weeks for labels?
details:
  realistic_solution: |
    Diagnose covariate shift by calculating Population Stability Index (PSI) on unlabelled data. If PSI > 0.25, use density ratio estimation to reweight the existing historical source data during retraining, requiring only a minimal validation set of new labels.
  common_mistake: |
    **The Pitfall:** Misdiagnosing covariate shift as concept drift.
    **The Rationale:** Candidates assume any sudden accuracy drop means the model's fundamental logic is wrong.
    **The Consequence:** Wasting weeks waiting for massive labeled datasets and discarding valuable historical data for an unnecessary rewrite.
  napkin_math: |
    **Assumptions & Constraints:**
    - Feature bin shifting from 50% (Expected) to 10% (Actual).
    - PSI threshold for covariate shift is 0.25.

    **Calculations:**
    - PSI contribution = (0.1 - 0.5) * ln(0.1 / 0.5) = (-0.4) * (-1.61) = 0.644.

    **Conclusion & Interpretation:**
    - **Result: PSI = 0.644 (Data-Bound)**. Since 0.644 > 0.25 threshold, critical covariate shift is confirmed mathematically using only unlabelled data.
