title: Diagnosing Label Shift in E-Commerce Content Moderation
scenario: 'An e-commerce platform''s content moderation model shows a sudden performance drop. Accuracy dropped from 95% to 82%. The incidence of ''spam'' listings surged from 5% to 40% due to a botnet, but the visual characteristics haven''t changed. The model''s P(Y|X) remains accurate, but the marginal P(Y) has shifted.'
question: 'What label-shift correction should you apply when the spam prior jumps from 5% to 40% while P(Y|X) stays accurate?'
details:
  realistic_solution: 'This is pure Label Shift. Apply Black Box Shift Estimation (BBSE) to estimate the new label marginals P_new(Y) on the unlabelled test data. Because P(Y|X) is invariant, you simply reweight the model''s predictions by the importance ratio of new to old marginals `P_new(Y) / P_old(Y)`. This algebraically corrects the calibration without expensive retraining.'
  common_mistake: |
    **The Pitfall:** Assuming covariate shift and unnecessarily retraining the entire model with new data.
    **The Rationale:** Candidates mistake a fundamental change in label frequency for a change in underlying feature distributions.
    **The Consequence:** Wasting expensive GPU hours on full retraining when a trivial mathematical reweighting achieves perfect calibration.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old spam prior P_old(spam) = 0.05. New spam prior P_new(spam) = 0.40.

    **Calculations:**
    - Importance weight for spam = 0.40 / 0.05 = 8.0.
    - Importance weight for legitimate = (1 - 0.40) / (1 - 0.05) = 0.60 / 0.95 = ~0.63.

    **Conclusion & Interpretation:**
    - **Result: Multiplying predictions by these weights fully corrects the label shift with zero retraining (Math-Bound).**
