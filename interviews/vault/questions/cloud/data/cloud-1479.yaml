title: Diagnosing Label Shift in E-Commerce Content Moderation
scenario: An e-commerce platform's content moderation model shows a sudden performance drop. Accuracy dropped from 95% to 82%. The incidence of 'spam' listings surged from 5% to 40% due to a botnet, but the visual characteristics haven't changed. The model's P(Y|X) remains accurate, but the marginal P(Y) has shifted.
question: What label-shift correction should you apply when the spam prior jumps from 5% to 40% while P(Y|X) stays accurate?
details:
  realistic_solution: |
    This is pure label shift. Apply BBSE or use the known new prior to compute class-prior weights, then adjust posterior probabilities with Bayes reweighting and renormalization: p_new(y|x) = w_y * p_old(y|x) / sum_j w_j * p_old(j|x), where w_y = P_new(y) / P_old(y). This recalibrates outputs without retraining when the label-shift assumption holds.
  common_mistake: |
    **The Pitfall:** Assuming covariate shift and unnecessarily retraining the entire model with new data.
    **The Rationale:** Candidates mistake a fundamental change in label frequency for a change in underlying feature distributions.
    **The Consequence:** Wasting expensive GPU hours on full retraining instead of applying a normalized posterior correction for the changed class prior.
  napkin_math: |
    **Assumptions & Constraints:**
    - Old spam prior P_old(spam) = 0.05. New spam prior P_new(spam) = 0.40.

    **Calculations:**
    - Importance weight for spam = 0.40 / 0.05 = 8.0.
    - Importance weight for legitimate = (1 - 0.40) / (1 - 0.05) = 0.60 / 0.95 = ~0.63.
    - Corrected posterior: p_new(spam|x) = 8.0 * p_old(spam|x) / [8.0 * p_old(spam|x) + 0.63 * p_old(legit|x)].
    - Example: if p_old(spam|x)=0.20, p_new(spam|x)=1.6 / (1.6 + 0.63 * 0.80) ≈ 0.76.

    **Conclusion & Interpretation:**
    - **Result: Normalized posterior reweighting (Math-Bound).** Multiply by class-prior ratios and renormalize across classes; raw multiplication alone is not a calibrated probability.
