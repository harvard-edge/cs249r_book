title: 'Evaluating Backdoor Mitigations in Cloud Code Gen'
scenario: 'You are deploying a 15B parameter code generation LLM trained on 500B tokens using a cluster of 512 A100 GPUs. The security team suspects a sophisticated backdoor attack: a specific, seemingly benign docstring trigger causes the model to generate insecure cryptographic implementations. The estimated contamination rate in the training data is 0.005%.'
question: 'Should you use activation-clustering sanitization or inference-time prompt perturbation to neutralize the docstring backdoor, and why?'
details:
  realistic_solution: 'Compute spectral signatures of latent activations on the training data to identify and filter the backdoor-contaminated samples, then fine-tune the existing model on a small trusted clean dataset to unlearn the malicious behavior. This approach costs ~2.2 days of offline compute with zero inference latency penalty, completely avoiding the accuracy degradation that inference-time perturbation would cause on benign coding queries.'
  common_mistake: |
    **The Pitfall:** Proposing full retraining from scratch after applying a naive keyword filter.
    **The Rationale:** Candidates ignore that triggers can be semantically obfuscated and fail to quantify the massive compute cost of full retraining.
    **The Consequence:** Wasting enormous amounts of compute (weeks of cluster time) when targeted unlearning via activation clustering and fine-tuning is orders of magnitude cheaper and faster.
  napkin_math: |
    **Assumptions & Constraints:**
    - Retraining: 15B params, 500B tokens, 512 GPUs @ 150 TFLOPs.
    - Fine-tuning: 15B params, 1B trusted tokens.

    **Calculations:**
    - Retraining FLOPs: 15B * 500B * 6 = 4.5e22 FLOPs.
    - Retraining Time: 4.5e22 / (512 * 150 TFLOPs) = ~6.7 days.
    - Fine-tuning FLOPs: 15B * 1B * 6 = 9e19 FLOPs (<20 minutes).
    - Clustering FLOPs: Forward pass = 1.5e22 FLOPs (~2.2 days).

    **Conclusion & Interpretation:**
    - **Result: 4.5 days saved (Compute-Bound)**. Offline clustering + fine-tuning saves ~4.5 days of compute vs. retraining.
