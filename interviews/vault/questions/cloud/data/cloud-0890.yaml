title: Evaluating Backdoor Mitigations in Cloud Code Gen
scenario: 'You are deploying a 15B parameter code generation LLM trained on 500B tokens using a cluster of 512 A100 GPUs. The security team suspects a sophisticated backdoor attack: a specific, seemingly benign docstring trigger causes the model to generate insecure cryptographic implementations. The estimated contamination rate in the training data is 0.005%.'
question: Should you use activation-clustering sanitization or inference-time prompt perturbation to neutralize the docstring backdoor, and why?
details:
  realistic_solution: Prefer activation-clustering sanitization if you have access to the training corpus or a large representative activation set. Compute spectral signatures of latent activations to identify suspicious docstring-triggered samples, filter or down-weight them, then fine-tune on trusted clean code to unlearn the behavior. Inference-time prompt perturbation is a useful stopgap when offline remediation is impossible, but it adds serving overhead, can change benign code-generation prompts, and may miss semantically robust triggers. Offline sanitization has no steady-state per-request latency penalty, but it still needs validation for residual backdoor success rate and benign accuracy.
  common_mistake: |
    **The Pitfall:** Proposing full retraining from scratch after applying a naive keyword filter.
    **The Rationale:** Candidates ignore that triggers can be semantically obfuscated and fail to quantify the massive compute cost of full retraining.
    **The Consequence:** Wasting enormous amounts of compute (weeks of cluster time) when targeted unlearning via activation clustering and fine-tuning is orders of magnitude cheaper and faster.
  napkin_math: |
    **Assumptions & Constraints:**
    - Retraining: 15B params, 500B tokens, 512 GPUs @ 150 TFLOPs.
    - Fine-tuning: 15B params, 1B trusted tokens.
    - Training FLOPs estimate: 6 * params * tokens.
    - Activation pass estimate for clustering: 2 * params * tokens.
    - Cluster throughput: 512 * 150 TFLOP/s = 7.68e16 FLOP/s.

    **Calculations:**
    - Retraining FLOPs: 15B * 500B * 6 = 4.5e22 FLOPs.
    - Retraining Time: 4.5e22 / 7.68e16 = 585,938 seconds ≈ 6.8 days.
    - Fine-tuning FLOPs: 15B * 1B * 6 = 9e19 FLOPs (<20 minutes).
    - Fine-tuning Time: 9e19 / 7.68e16 = 1,172 seconds ≈ 19.5 minutes.
    - Clustering FLOPs: activation forward pass = 15B * 500B * 2 = 1.5e22 FLOPs.
    - Clustering Time: 1.5e22 / 7.68e16 = 195,312 seconds ≈ 2.3 days.
    - Offline remediation total: 2.3 days + 0.014 days ≈ 2.3 days.

    **Conclusion & Interpretation:**
    - **Result: ~4.5 days saved versus full retraining.** Activation clustering plus fine-tuning is compute-bounded but much cheaper than retraining, and it directly targets the suspected poisoned examples; prompt perturbation trades lower offline cost for ongoing latency, utility risk, and weaker assurance.
