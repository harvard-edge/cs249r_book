title: Sizing Cloud Shard Shuffle Buffers
scenario: 'You are training a multimodal model on a 10 TB dataset stored in an S3 bucket. The data is pre-processed into 500 MB shards. Each training node has a 10 Gbps network link and 64 GB of CPU RAM available for the data loading pipeline. Individual samples average 1 MB in size. Global shuffling by requesting random individual samples drops throughput to <50 MB/s due to S3''s 80ms time-to-first-byte latency. You implement shard-level shuffling: reading a pool of K shards concurrently, buffering about 64 MB per stream, and maintaining a local sample buffer of size B.'
question: What K and B would you configure to maximize randomness under 64GB RAM while saturating the 10Gbps S3 link?
details:
  realistic_solution: Configure about K=20 concurrent shard streams to hide S3 latency and saturate the 10 Gbps link, with each stream holding only an in-flight read window rather than a whole 500 MB shard. Use a local sample buffer of about B=40,000 samples (roughly 40 GB at 1 MB/sample), leaving memory for stream buffers, workers, decompression, and OS overhead.
  common_mistake: |
    **The Pitfall:** Allocating the entire 64 GB to the sample buffer B.
    **The Rationale:** Candidates focus purely on maximizing the buffer size for randomness, forgetting that concurrent shard streams (K) also consume substantial memory.
    **The Consequence:** The node aggressively swaps to disk or is killed by the OOM killer, crashing the entire training job.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network Link: 10 Gbps (1.25 GB/s).
    - CPU RAM: 64 GB.
    - Shard Size: 500 MB, but each active stream buffers about 64 MB in memory.
    - S3 shard-level stream throughput: ~100 MB/s.
    - Reserve about 8 GB for workers, decompression, and OS overhead.

    **Calculations:**
    - Minimum K to saturate link: 1.25 GB/s / 100 MB/s = 12.5 streams. Use K=20 for reliability.
    - RAM used by K active stream windows: 20 * 64 MB = 1.28 GB.
    - Memory after stream windows and overhead: 64 GB - 1.28 GB - 8 GB ≈ 54.7 GB.
    - Safe buffer B: about 40 GB / 1 MB per sample = 40,000 samples, leaving roughly 14 GB of headroom.

    **Conclusion & Interpretation:**
    - **Result: IO/Memory Bound**. K=20 hides S3 latency and saturates the 10Gbps link, while B=40,000 maximizes shuffling randomness without triggering the OS OOM killer.
