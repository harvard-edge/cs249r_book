title: Double-Buffered Feature Prefetch for A100 Inference
scenario: Your search ranking model on A100 GPUs processes 10K QPS. Each query retrieves 500 candidate documents with 100 features each from the feature store, then runs inference. GPU utilization is only 35% because the model waits for feature fetches. The feature fetch takes 8ms but inference takes only 3ms.
question: How would you design a prefetch architecture to overlap the 8ms feature fetch with 3ms GPU inference and raise utilization above 80%?
details:
  realistic_solution: Use asynchronous prefetch with a bounded queue, not just more fetch threads. While the GPU runs inference for batch N, CPU workers fetch and assemble features for batches N+1 through N+3, then stage tensors in pinned host memory for faster asynchronous host-to-GPU copies. Because each fetch takes 8ms and compute takes 3ms, a single next-batch buffer is not enough; the service needs at least ceil(8/3) = 3 fetches in flight per GPU to keep a ready batch available. If the feature store has enough throughput for that concurrency, steady-state GPU idle time drops from waiting on every 8ms fetch to only queue underflow and transfer overhead, making >80% utilization plausible. Do not claim 100% utilization without measuring feature-store throughput, tensor assembly, transfer time, and batch scheduler overhead.
  common_mistake: |
    **The Pitfall:** Simply adding more CPU threads for feature fetching.
    **The Rationale:** Engineers assume parallelizing the fetch will fix the stall.
    **The Consequence:** This reduces average latency but fails to overlap fetch with compute, leaving the GPU idle during each request's fetch phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Scenario says current GPU utilization is 35%.
    - Per batch: 8ms feature fetch and 3ms GPU inference.
    - Feature fetches can run concurrently if the feature store and CPU thread pool have enough capacity.
    - Host-to-GPU transfer uses pinned host memory and asynchronous copies; transfer overhead is not assumed to be zero.

    **Calculations:**
    - No-overlap latency model: 8ms fetch + 3ms compute = 11ms wall time per batch.
    - Simple no-overlap compute fraction: 3ms / 11ms = 27%; observed 35% implies some existing overlap or measurement averaging.
    - Required fetch queue depth to hide latency: ceil(8ms fetch / 3ms compute) = 3 concurrent future batches.
    - With 3+ ready/prefetching batches, steady-state throughput can approach one completed batch every ~3ms plus transfer/scheduling overhead.
    - If overhead leaves 0.5ms idle per batch, utilization is 3ms / 3.5ms = 86%, which clears the >80% target.

    **Conclusion & Interpretation:**
    - **Result: Queue-depth-bound overlap.** Double-buffering alone may be insufficient; use deeper asynchronous prefetch, pinned-memory staging, and backpressure. Utilization can exceed 80% if feature-store throughput sustains the required in-flight fetches, but 100% is not guaranteed.
