title: Calculating Storage Bloat from Non-Idempotent Appends
scenario: A distributed data pipeline processes 10TB of raw logs daily on a 100-node cluster, appending
  2TB of transformed features to a data lake. Spot instance preemptions cause task failures and automatic
  retries. If the output operation is a non-idempotent 'append', a retried task duplicates 20GB of data
  per failure. With an average of 50 task failures per day, calculate the accumulated storage bloat over
  a 30-day month and the volume of data that must be shuffled to deduplicate the dataset, compared to
  using an idempotent 'overwrite' strategy.
question: "How much 30-day storage bloat and deduplication shuffle does non-idempotent append create, and what write strategy avoids it?"
details:
  realistic_solution: Implement idempotent writes using atomic partition overwrites (e.g., `INSERT OVERWRITE`
    or Apache Iceberg MERGE). This guarantees exactly-once semantics, resulting in 0TB of storage bloat
    and eliminating the need for downstream deduplication.
  common_mistake: Assuming append-only operations are safe in distributed systems with task retries, completely
    missing the massive downstream shuffle costs required to deduplicate the resulting bloat.
  napkin_math: 'Daily Bloat = 50 failures * 20GB/failure = 1TB/day.

    Monthly Bloat = 1TB/day * 30 days = 30TB.

    True Monthly Data = 2TB/day * 30 days = 60TB.

    Total Dataset Size = 60TB + 30TB = 90TB.

    Deduplicating requires a massive 90TB network shuffle. Idempotent overwrites eliminate the 30TB bloat
    and the 90TB shuffle entirely.'
