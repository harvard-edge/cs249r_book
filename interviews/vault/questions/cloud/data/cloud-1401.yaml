title: Calculating Storage Bloat from Non-Idempotent Appends
scenario: A distributed data pipeline processes 10TB of raw logs daily on a 100-node cluster, appending 2TB of transformed features to a data lake. Spot instance preemptions cause task failures and automatic retries. If the output operation is a non-idempotent 'append', a retried task duplicates 20GB of data per failure. With an average of 50 task failures per day, calculate the accumulated storage bloat over a 30-day month and the volume of data that must be shuffled to deduplicate the dataset, compared to using an idempotent 'overwrite' strategy.
question: How much 30-day storage bloat and deduplication shuffle does non-idempotent append create, and what write strategy avoids it?
details:
  realistic_solution: Non-idempotent append creates 1TB/day of duplicate output, or 30TB over 30 days. The deduplication job must scan and shuffle the resulting 90TB dataset (60TB true monthly data plus 30TB duplicates) under the stated full-shuffle assumption. Idempotent writes using atomic partition overwrites (e.g., `INSERT OVERWRITE` or Apache Iceberg MERGE) avoid accumulating those duplicate retry outputs and therefore avoid the downstream deduplication shuffle for new runs.
  common_mistake: |
    **The Pitfall:** Assuming append-only operations are safe in distributed systems with task retries.
    **The Rationale:** Engineers focus on the simplicity of append operations without considering failure handling.
    **The Consequence:** Completely missing the massive downstream shuffle costs required to deduplicate the resulting bloat.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 task failures per day.
    - 20GB duplicated per failure.
    - 30-day month.
    - 2TB transformed features per day.

    **Calculations:**
    - Daily Bloat = 50 failures * 20GB/failure = 1TB/day.
    - Monthly Bloat = 1TB/day * 30 days = 30TB.
    - True Monthly Data = 2TB/day * 30 days = 60TB.
    - Total Dataset Size = 60TB + 30TB = 90TB.

    **Conclusion & Interpretation:**
    - **Result:** Non-idempotent append creates 30TB of duplicate bloat. If deduplication repartitions the full affected monthly dataset, it must shuffle 90TB total. Idempotent overwrites prevent new duplicate accumulation, so future runs avoid both the 30TB bloat and the dedup shuffle.
