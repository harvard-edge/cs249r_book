title: 'Migrating Feature Pipelines: ETL vs ELT Costs'
scenario: An ML team is migrating a daily 20 TB log ingestion pipeline from ETL to
  ELT to speed up feature engineering experiments. In the old ETL pipeline, a dedicated
  Spark cluster transformed the data before loading, costing $200 and taking 4 hours
  per 20 TB batch. When ML engineers needed to test a new feature definition on 30
  days of historical data (600 TB), backfilling required 120 hours of compute time
  and cost $6,000. In the new ELT architecture, raw JSON logs are loaded directly
  into a cloud data warehouse. The warehouse charges $5 per TB scanned for SQL-based
  transformations and can scan 50 TB per minute.
question: What cost and wall-clock time would ELT require to run the 30-day, 600TB
  feature extraction backfill?
details:
  realistic_solution: 'Use the ELT approach to run the transformation directly in
    the target data warehouse. It will cost $3,000 and take only 12 minutes, saving
    50% in costs and drastically accelerating experimentation.

    '
  common_mistake: '**The Pitfall:** Assuming ELT is slower or more expensive due to
    data warehouse pricing.

    **The Rationale:** Candidates don''t realize that raw data is already resident
    in the warehouse and massive parallelism avoids cluster spin-up overhead.

    **The Consequence:** The team avoids ELT and sticks to slow, expensive ETL backfills,
    bottlenecking ML experimentation.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 30 days × 20 TB = 600 TB data.

    - Cost: $5/TB scanned.

    - Speed: 50 TB/min.


    **Calculations:**

    - ELT Cost: 600 TB × $5 = $3,000.

    - ELT Time: 600 TB / 50 TB/min = 12 minutes.


    **Conclusion & Interpretation:**

    - **Result: IO-Bound**. ELT halves the cost to $3,000 and reduces time to 12 minutes.

    '
